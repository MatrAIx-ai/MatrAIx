personas:
  professional: Juan Martinez, a budding 13‑year‑old coder, blends curiosity with practicality by designing simple Scratch games that map real‑world physics while faithfully meeting school project deadlines
    and eagerly collaborating with classmates during after‑school coding clubs.
  sports: Juan Martinez plays forward for the Caguas Young Strikers U‑13 soccer team and pitches for the Caguas Tigers youth baseball league, cheers on the Puerto Rico national baseball squad, follows the
    MLB New York Mets, and joins a weekend trail‑running group that meets at the foothills of Cerro Las Tres.
  arts: Juan Martinez drums on a homemade cajón to the beats of Bad Bunny, Don Omar, and Gilberto Santa Rosa while immersing themselves in graphic novels like Saga and Ms. Marvel, drawing inspiration from
    local bomba and salsa rhythms that echo through community festivals.
  travel: Juan Martinez savors weekend hikes through the tropical trails of the Valle de Caguas, often trekking to the summit of Cerro Las Tres and exploring the misty canopies of El Yunque National Forest,
    and dreams of swapping the island’s hills for surf‑filled waves on the famed beaches of Rincón.
  culinary: Juan Martinez’s palate favors classic island fare such as mofongo with succulent shrimp, arroz con gandules, and crispy tostones, and they enjoy experimenting in the kitchen by rolling their
    own pastelitos, while a fresh mango or guava slice is the perfect study‑break snack.
  core: Juan Martinez is a socially‑balanced teen who fuses the discipline of organized coding with spontaneous outdoor adventures, all while juggling a modest allowance, mild asthma, and a love for rhythmic
    drumming and graphic storytelling.
background:
  cultural: Juan grew up in Caguas, a vibrant municipality in Puerto Rico known for its strong family bonds, lively musical traditions, and scenic surroundings. His household celebrates Puerto Rican festivals
    such as the Three Kings Day parade and the Feria de la Tulipán, where he helps prepare classic dishes like arroz con gandules, alcapurrias, and pasteles. Raised bilingual, he navigates both Spanish
    at home and English at school, giving him a dual cultural perspective. Catholic values and community gatherings shape his sense of harmony and cooperation. The island’s love for salsa, bomba, and reggaetón
    influences his musical tastes, while the communal spirit of Caguas fuels his desire to give back to his neighborhood.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Basic digital literacy and Scratch programming", "Problem‑solving in math and science", "Team collaboration and project organization", "Simple DIY
