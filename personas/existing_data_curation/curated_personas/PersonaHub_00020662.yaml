persona_description: A philosopher who specializes in the philosophy of color, particularly the conflict between physical and phenomenal determinants of color. The philosopher is critical of the recent
  "phenomenological" criticism of Eric Rubenstein's view that color is complex, and defends Jonathan Westphal's view that color is complex. The philosopher is interested in the physics and psychophysics
  of color, and argues that the content of what our concepts of colors are concepts of cannot be exhausted by the purely phenomenal. The philosopher is also interested in the logic of the compossibility
  of what is given in reflection and absorption spectra, and is willing to reject the claim that necessary truths about colors cannot be explained without reference to this logic.
