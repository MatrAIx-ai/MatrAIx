  hobbies: '[''Gardening'', ''Reading historical non-fiction and classic literature'', ''Genealogy research'', ''Woodworking'', ''Community choir participation'', ''Volunteering at senior center (computer
    tutoring)'', ''Birdwatching'', ''Listening to classical music'', ''Cooking family recipes'']'
  career_goals: As a retired scholar and community elder, Max seeks to leave a lasting legacy by documenting the oral histories of longtime Albany residents, compiling them into a publicly accessible volume.
    He aims to mentor younger historians and volunteers, offering guidance on research methods and ethical archival practices. He plans to complete a memoir that weaves his personal life story with the
    broader narrative of mid‑20th‑century American society. Furthermore, he aspires to become an advisory board member for the Albany Historical Museum, helping design exhibits that bridge generational
    gaps. On a personal level, he wishes to maintain his intellectual vitality by attending continuing education courses in digital humanities and to deepen his genealogical research to trace his Irish
    roots for his grandchildren.
