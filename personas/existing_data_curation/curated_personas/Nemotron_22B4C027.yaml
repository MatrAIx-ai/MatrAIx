personas:
  professional: Deborah Singletary is a human resources professional who blends her practical, structured approach to employee onboarding and benefits administration with a naturally sociable, talkative
    demeanor, using BambooHR and ADP to keep processes smooth while turning unexpected staffing hiccups into opportunities for team‑building.
  sports: Deborah Singletary stays active by attending weekly yoga classes at a local community center, joining a casual pick‑up basketball league that supports the Philadelphia 76ers, and cheering on the
    Eagles and Phillies on game days, using these social sport experiences as a counterbalance to her work‑related stress.
  arts: Deborah Singletary channels her love of community and performance into karaoke nights where she belts out Beyoncé and John Legend, regularly attends live shows by regional acts like The Menzingers,
    and enjoys soulful theater productions, allowing her expressive side to replenish her social energy.
  travel: Deborah Singletary prefers spur‑of‑the‑moment weekend getaways with friends, often booking last‑minute Airbnb stays in Philadelphia’s historic Old City or the Pocono Mountains, while dreaming
    of a future solo trip to New Orleans to soak in its jazz scene and occasionally fretting over the cost of such adventures despite her modest budget.
  culinary: Deborah Singletary, an intermediate home chef, delights in crafting shrimp scampi with fresh garlic and lemon, simmering hearty jambalaya seasoned with smoked sausage and cayenne, and experimenting
    with vegan avocado toast topped with radish and microgreens, while also finding the act of cooking a soothing antidote to work stress and occasionally treating herself to late‑night food‑truck falafel
    and BBQ ribs in Camden.
  core: Deborah Singletary balances a meticulously structured HR career with a spontaneous, talk‑heavy social life, often worrying over details yet embracing last‑minute karaoke nights and weekend river
    walks as her antidote to stress.
background:
  cultural: Deborah is a white American from Camden, New Jersey, raised in a working‑class family with deep roots in the Northeast. Her upbringing combined modest, practical values with a strong sense of
    community, reflecting the diverse urban culture of Camden. She grew up near a mix of ethnic neighborhoods, which gave her an appreciation for cultural diversity and a collaborative spirit. Her cultural
    identity is shaped by a blend of traditional Mid‑Atlantic customs, a close‑knit neighborhood network, and a personal commitment to community involvement and resilience.
attributes:
  skills: '[''Employee onboarding'', ''Benefits administration'', ''Conflict resolution'', ''Recruitment support'', ''Employee relations'', ''HRIS management (BambooHR, ADP)'', ''Scheduling and timekeeping'',
