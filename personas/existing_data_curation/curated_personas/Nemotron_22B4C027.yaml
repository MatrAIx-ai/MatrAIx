  hobbies: '[''Karaoke nights'', ''Local dance classes (e.g., salsa)'', ''Volunteering with youth mentorship programs'', ''Cooking and experimenting with new recipes'', ''Yoga for stress relief'', ''Walking
    along the Delaware River waterfront'', ''Attending live music concerts'', ''Spontaneous weekend road trips with friends'', ''DIY home décor projects'', ''Socializing at local cafes and community gatherings'']'
  career_goals: Deborah aims to become a certified HR professional (SHRM‑CP) within the next two years, which will enable her to step into an HR coordinator role and eventually a HR manager position. She
    wants to deepen her knowledge of employment law and employee wellness initiatives so she can design programs that reduce stress and improve morale in her organization. Long‑term, she envisions starting
    a small HR consulting firm that serves local small businesses in Camden, helping them build structured yet flexible HR practices that reflect the community’s diverse needs. She also plans to obtain
    her GED and explore further education to broaden her career prospects.
