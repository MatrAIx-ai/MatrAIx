  career_goals: Lora aims to transition into a senior leadership role where she can steer large‑scale sustainable infrastructure projects that blend engineering rigor with artistic expression. She envisions
    establishing a multidisciplinary studio that partners with architects, artists, and community groups to create environmentally‑friendly public spaces in Richmond and beyond. Additionally, she aspires
    to mentor emerging Latina engineers, publish research on integrating aesthetic concepts into engineering design, and serve as an advocate for culturally inclusive engineering practices within professional
    societies.
