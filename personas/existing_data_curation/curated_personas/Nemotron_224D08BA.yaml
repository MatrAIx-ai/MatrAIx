personas:
  professional: Lora Mercado, a seasoned structural and systems engineer, they leverage their vivid abstract imagination and sociable charisma to lead interdisciplinary teams, orchestrating sustainable
    infrastructure designs that blend rigorous technical analysis with aesthetic flourishes, while their competitive edge drives them to champion culturally inclusive engineering standards.
  sports: Lora Mercado embraces outdoor fitness, they hike the Blue Ridge Mountains on weekends, join the Richmond Flying Squirrels fan club for community runs, and practice weekly yoga at the local studio,
    balancing a love for nature with support for the Capitals during hockey season.
  arts: Lora Mercado channels their creative pulse into abstract Maya‑inspired canvases, street photography that captures the vibrancy of Richmond’s 17th Street, and pop‑up installations at the Richmond
    Folk Festival, they draw inspiration from Frida Kahlo, Vivian Maier, and the lyrical rhythms of Celia Cruz.
  travel: Lora Mercado plans trips with a blend of meticulous itineraries and spontaneous detours, they favor cultural immersion trips like a culinary tour of Oaxaca, a hiking expedition in the Canadian
    Rockies, and a weekend escape to the historic streets of Savannah, while budgeting constraints keep overseas adventures to a few per year.
  culinary: Lora Mercado’s palate gravitates toward rich, earthy flavors, they expertly prepare pepian with roasted tomatillos and plantains in their garden‑to‑table kitchen, while also mastering the perfect
    porchetta‑style pork roast and savoring spontaneous tacos al pastor at local food trucks.
  core: Lora Mercado is an imaginative engineer‑artist who fuses technical discipline with flamboyant creativity, they negotiate life with a competitive spark, and balance community devotion with a penchant
    for late‑night salsa and occasional financial procrastination.
background:
  cultural: Lora was born in a small town near Lake Atitlán to a family that traces its roots to both Kaqchikel Maya ancestors and Spanish colonial heritage. Raised in a bilingual household, she grew up
    celebrating Día de los Muertos, Semana Santa, and the vibrant festivals of Antigua, while also absorbing the communal values of guatemalan campesino life. After moving to the United States for her university
    education, she has maintained close ties to her heritage through language, traditional weaving crafts, and active participation in Richmond’s Guatemalan diaspora. Her cultural identity informs her worldview,
    fostering a deep respect for collective responsibility, storytelling, and the intersection of tradition with modern innovation.
