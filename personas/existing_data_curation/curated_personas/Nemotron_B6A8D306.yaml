personas:
  professional: Aya Ali is a budding storyteller and LEGO architect who turns weekend afternoons into imaginative quests, and they sketch fantastical beasts, build elaborate brick kingdoms, and delight
    friends with improvised theatrical performances that showcase their sociable spirit and kindness.
  sports: Aya Ali dribbles a soccer ball for the Monroe Mini-Stars youth league, cheers loudly for the Atlanta Braves on game night, and enjoys weekend bike rides along pine-lined trails, though they sometimes
    skip stretching because they'd rather keep playing.
  arts: Aya Ali immerses themselves in fantasy art, drawing creatures inspired by Studio Ghibli's Totoro and listening to the soundtracks of Pixar's 'Coco' while performing karaoke renditions of Disney
    classics at family gatherings, often losing track of time in vivid daydreams.
  travel: Aya Ali loves family road trips that blend beach days on Tybee Island with exploring historic Savannah, and they daydream about wandering Windsor Castle in England, though their parents keep travel
    modest to fit the school-year budget.
  culinary: Aya Ali prefers finger foods like chicken nuggets, mac-and-cheese, and peach cobbler, enjoys helping their mom blend honey into barbecue sauce for weekend cookouts, and proudly boasts a secret
    recipe for rock-shaped fruit kebabs they invent from collected berries and grapes.
  core: Aya Ali is a nine-year-old imagination powerhouse who blends art, LEGO, and storytelling into a relentless quest for wonder, while worrying about tiny setbacks and managing a colorful stash of allowance.
background:
  cultural: Aya was born and raised in Monroe, a small town in Walton County, Georgia. She grew up in a predominantly White Southern environment where community events, church gatherings, school activities,
    and family traditions like weekend barbecues and seasonal festivals are central. The local culture emphasizes friendliness, cooperation, and respect for neighbors, aligning with Aya’s kind and harmonious
    nature. While her daily life reflects Southern customs, exposure to diverse media, books, and school programs provides her with a broader cultural perspective.
attributes:
  skills: '["Creative storytelling","Watercolor and crayon painting","Digital art with child-friendly apps","LEGO building and design","Basic Scratch programming","Peer facilitation and empathy"]'
  hobbies: '["Drawing and painting","Creative writing (short stories)","LEGO building","Improvisational playacting","Exploring nature (collecting leaves and rocks)","Singing karaoke","Reading fantasy books","Watching
    animated movies"]'
  career_goals: Aya dreams of becoming a children’s book author and illustrator, creating stories that ignite imagination and provide comfort to other kids. She also hopes to work as a youth art teacher
    or community arts coordinator, using her sociable nature to inspire confidence and harmony among her peers.
