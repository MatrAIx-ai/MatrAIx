persona_description: A teacher looking for primary History lesson plans that align with the DfE guidelines for KS1 and KS2. They are interested in using Hoghton Tower as a resource to teach children about
  significant historical events, people, and places in their own locality. They are looking for differentiated activities and lesson plans that will help children learn how to question the past to see how
  it shaped the future. They are also interested in using the secondary resource of the tower guides to deepen their knowledge and understanding of the past. They are looking for a way to deliver the historical
  curriculum in a way that is engaging and interactive for the children. They are interested in using Hoghton Tower as a way to demonstrate how the locality has been influenced and shaped by the people
  that lived and worked there.
