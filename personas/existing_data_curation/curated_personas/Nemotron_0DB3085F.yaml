  career_goals: Arkadiusz aims to transition from his current managerial role to an executive director position at a regional cultural institution such as the Asbury Park Cultural Alliance, where he can
    shape the artistic vision of the community. He is determined to launch a cross‑disciplinary arts hub that blends visual art, music, and technology, securing major grants to fund community outreach programs
    that serve underrepresented groups. Long‑term, he envisions curating a traveling exhibition that positions Asbury Park on the global art map while mentoring emerging arts professionals. He also seeks
    to enhance his public speaking and strategic planning skills to better advocate for sustained arts funding and preserve local heritage.
