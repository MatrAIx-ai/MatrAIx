  career_goals: Joanne aims to become a senior director of operations within a large, networked health system in New York City, where she can shape policies that prioritize equity and compassionate care.
    She aspires to lead large‑scale quality improvement projects that integrate innovative technologies, such as AI‑driven patient triage and remote monitoring, while preserving a human touch. Joanne plans
    to earn the Certified Professional in Healthcare Quality (CPHQ) credential and enroll in a part‑time Master of Health Administration to deepen her sector‑specific expertise. In the longer term, she
    envisions launching her own consulting firm focused on helping community health centers implement sustainable, patient‑centered operational models that bridge cultural and socioeconomic gaps.
