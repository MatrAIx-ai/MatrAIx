  career_goals: Jennifer aspires to combine her love for art with her desire to help others by pursuing a career in art therapy or community‑based visual storytelling. She hopes to attend a liberal arts
    college where she can major in visual arts and psychology, developing interdisciplinary projects that use illustration and narrative to promote mental‑health awareness among youth. In the longer term,
    she aims to work for a nonprofit organization or a school, designing workshops, therapeutic art programs, and advocacy campaigns. She also dreams of publishing a graphic novel that tackles themes of
    anxiety, compassion, and personal growth, and hopes to travel to gain new cultural perspectives that can enrich her work.
