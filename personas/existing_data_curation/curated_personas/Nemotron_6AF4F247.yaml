personas:
  professional: Iris Dunston, a budding junior scientist who spends afternoons turning backyard sand into makeshift volcanoes, asks relentless why questions, and joyfully sketches observations, yet often
    abandons experiments mid‑way when a new game beckons, reflecting their spontaneous resistance to structure.
  sports: Iris Dunston, a five‑year‑old member of the Little Rascals kids soccer club, proudly wears an orange jersey while cheering for the New Mexico United soccer team and the Albuquerque Isotopes baseball
    club, dashes through hopscotch games at the park, and prefers spontaneous tag over rigid drills, highlighting their energetic yet competitive spirit.
  arts: Iris Dunston, a budding little artist who splashes watercolors in desert‑bright hues inspired by Georgia O’Keeffe, collects glow‑in‑the‑dark balloons from the International Balloon Fiesta for creative
    projects, and sings along to Raffi’s Baby Beluga while listening to Pueblo drum storytelling, showing a love for diverse artistic traditions.
  travel: Iris Dunston, an adventurous five‑year‑old who delights in family picnics at the Sandia Mountains, dreams of riding the carousel at Santa Fe’s Plaza, longs to see the giant hot‑air balloons up
    close at the Albuquerque Balloon Fiesta, but often resists long car rides, preferring short, spontaneous detours to local parks and playgrounds.
  culinary: Iris Dunston, a five‑year‑old with a boundless appetite for green chile cheese quesadillas, loves dipping churro sticks in cinnamon sugar, pretends to stir a pot of chicken posole in play kitchen,
    yet gets picky about broccoli and hoards snack crackers in a secret stash under the bed.
  core: Iris Dunston, a curious, hyper‑energetic five‑year‑old who blends balloon‑inspired imagination with a fierce love of glitter stickers, often trades bedtime for extra playtime, and fiercely competes
    in games while hesitating to finish neatly organized color‑by‑number pages.
background:
  cultural: Iris comes from a White, Anglo‑American family residing in Albuquerque, New Mexico. While her ancestry is primarily of European origin, she grows up in a multicultural Southwestern community
    where she is exposed to local traditions such as New Mexican cuisine, Spanish language greetings, Pueblo storytelling, and community festivals like the Balloon Fiesta. This blend of cultural influences
    enriches her appreciation for diverse art forms, music, and the natural landscape of the high desert.
