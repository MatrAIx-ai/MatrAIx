  career_goals: She often talks about being an artist who paints big, colorful pictures and travels to see different places. She also dreams of exploring nature like a scientist, finding bugs and rocks,
    and sometimes imagines being a teacher who shares stories with friends. These aspirations reflect her curiosity, love of art, and desire to lead in group activities.
