  career_goals: Samir plans to earn his GED within the next year and then enroll in a community‑college trade program focused on woodworking or automotive repair. His long‑term ambition is to launch a small
    side business that sells handcrafted furniture and art prints inspired by the Iowa landscape, providing a flexible income that supports his family while preserving his creative freedom. He also hopes
    to establish a community‑garden hub in Edgewood where neighbors can share produce and hold informal art workshops, merging his love for nature, creativity, and collaborative stewardship. While he prefers
    flexible schedules over rigid 9‑to‑5 commitments, he is motivated to build a modest, sustainable livelihood that balances financial stability with artistic exploration.
