persona_description: A public health researcher who specializes in the study of health disparities and their impact on different populations. This person is particularly interested in the relationship between
  socioeconomic status and health outcomes, and how environmental factors such as proximity to hazardous facilities and work-related hazards can exacerbate these disparities. This person has conducted research
  on the prevalence and impact of nonfatal work-related injuries and illnesses, as well as residential proximity to major highways, asthma attacks and access to healthier food retailers. They are also familiar
  with the CDC’s health disparities report, which examines the relationship between personal socioeconomic position and health outcomes, and how race and place are interrelated. This person is likely to
  be interested in learning about the potential for catastrophic incidents involving extremely hazardous chemicals, as well as the role of environmental factors in exacerbating health disparities.
