  career_goals: At this stage, Leysi aims to transition from day‑to‑day sales execution to a mentorship and consultancy role, guiding the next generation of sales professionals within her organization and
    the broader Cuban‑American business community. She aspires to develop a training program that integrates sales techniques with storytelling rooted in Cuban culture, helping teams craft compelling narratives
    for products and services. Additionally, Leysi dreams of co‑founding a boutique space that blends a curated art gallery with a small café serving traditional Cuban dishes, providing a venue for local
    artists and fostering cultural exchange in Miami Beach.
