personas:
  professional: Jason Carbone, a full‑stack software engineer based in Asheville, leverages JavaScript, React, Node.js, and AWS to create visually striking web applications, and their curious, easy‑going
    temperament fuels spontaneous brainstorming where they blend artistic flair with agile mentorship to guide junior developers toward innovative solutions.
  sports: Jason Carbone conquers the Blue Ridge trails during spring hikes, pedals with the Asheville Mountain Bikers club in summer, follows the Asheville Tourists minor‑league baseball team and the Carolina
    Panthers for football, and they join friends for pickup soccer at the community field, balancing a love for outdoor adventure with a relaxed, community‑focused approach to fitness.
  arts: Jason Carbone spends Friday nights strumming acoustic guitar at St. Michael’s Tavern’s open‑mic, curates a modest collection of contemporary works by painter Kayla Ryan, attends live shows featuring
    folk legends the Avett Brothers, and they draw inspiration from cinematic scores by Hans Zimmer, weaving these artistic encounters into both their code aesthetics and personal worldview.
  travel: Jason Carbone enjoys spontaneous weekend road trips along the Blue Ridge Parkway and casual escapes to Charleston’s historic district, while dreaming of a cultural immersion in Tuscany’s vineyards
    and a tech‑art conference in Tokyo, and they balance family responsibilities with a flexible budgeting approach that prioritizes experience over meticulous itineraries.
  culinary: Jason Carbone, an avid home cook, often hand‑rolls gnocchi tossed in sage‑brown butter, slow‑roasts pork shoulder with a Carolina‑style dry rub, and crafts seasonal salads featuring heirloom
    tomatoes and fresh basil, and they delight in farm‑to‑table brunches at Asheville’s White Duck Taco Shop, reflecting a palate that blends Southern comfort with Mediterranean zest.
  core: Jason Carbone fuses technical precision with artistic spontaneity, regularly juggling code commits and paintbrushes, while their habit of forgetting to water houseplants is offset by a relentless
    curiosity that drives them to explore new digital canvases and mountain trails alike.
background:
  cultural: Jason comes from an Italian‑American heritage, reflected in his family’s emphasis on close‑knit relationships and appreciation for food and tradition. Growing up in the southern suburbs of North
    Carolina, he blends Southern hospitality with the progressive, arts‑focused culture of the Asheville region. This mix influences his warm, outgoing demeanor, his love for community gatherings, and his
    openness to unconventional ideas. His marriage and roots in Buncombe County provide a stable foundation that supports his adventurous and collaborative spirit.
