  career_goals: Jason aims to advance to a senior engineering or technical lead role within the next three years, where he can shape product strategy and mentor junior developers. He aspires to blend his
    love for art and technology by spearheading projects that create interactive digital experiences, such as immersive art installations or creative platforms. Long‑term, he envisions founding a startup
    that leverages AI and design to empower independent artists, while maintaining a flexible work schedule that supports his family life and outdoor pursuits.
