    farm‑to‑table meals'']'
  career_goals: As she approaches retirement, Dorothy aims to shift from daily hands‑on repairs to a mentorship and legacy role. She plans to establish a formal apprenticeship program that encourages young
    women and underrepresented groups to enter automotive trades, emphasizing both technical skill and artistic expression. Dorothy also intends to modernize her shop with greener practices, such as adopting
    water‑based paints and implementing metal scrap recycling, positioning it as a sustainability model in Humboldt County. Additionally, she hopes to curate a community exhibition showcasing automotive
    art, merge her love of cars with visual creativity, and document her career in a memoir that traces the evolution of auto body work over five decades.
