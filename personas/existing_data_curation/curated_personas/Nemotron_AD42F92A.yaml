  career_goals: Mohan aims to deepen his expertise in supply chain management by earning an APICS CPIM certification within the next year and completing a bachelor’s degree in Business Administration with
    a focus on logistics. He envisions progressing to a logistics coordinator role, where he can lead scheduling and carrier negotiations, and eventually step into a warehouse supervisor position overseeing
    a team. His long‑term ambition is to become a supply chain manager, implementing cost‑saving initiatives and technology-driven efficiencies that benefit both his employer and the broader community he
    serves. Throughout his career growth, he seeks stable advancement that allows him to provide for his family while maintaining a balanced, harmonious work environment.
