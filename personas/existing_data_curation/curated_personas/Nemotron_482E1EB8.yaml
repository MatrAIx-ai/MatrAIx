personas:
  professional: Cassidy Torres is an emerging visual storyteller who merges hand‑drawn watercolor illustrations with Scratch programming, using their curious mind and balanced organization to craft short
    animated narratives for school presentations and community garden signage, while confidently presenting ideas in group settings and assertively refining artistic concepts.
  sports: Cassidy Torres participates in a co‑ed after‑school soccer league at the local community center, enjoys weekend bike rides along the Mississippi Riverfront Trail for both exercise and photo inspiration,
    and follows the St. Louis Cardinals with enthusiasm, wearing a well‑worn blue cap during games; they also dabble in yoga once a week to keep flexible for long sketching sessions.
  arts: Cassidy Torres devotes their free time to exploring St. Louis murals—especially works by local street artist ‘Tagger’—and draws inspiration from graphic novelists such as Jeff Smith’s ‘Bone’ and
    Noelle Stevenson’s ‘Nimona’, while their ukulele playlists echo indie folk artists like Sufjan Stevens and Jack Johnson; they regularly attend the Saint Louis Art Museum’s youth workshops, experiment
    with watercolor, markers, and digital Scratch animation, and keep a sketchbook filled with quick cityscape studies inspired by the works of Edward Hopper and contemporary illustrator Kelli Anderson.
  travel: Cassidy Torres has taken family road trips to Chicago to explore the Art Institute’s modern wing, visited Nashville for a weekend music festival, and joined a school field trip to the National
    Great Plains Museum in Kansas City; they dream of strolling through New York City’s Metropolitan Museum to see classical paintings, wandering Barcelona’s Park Güell for mosaic inspiration, and someday
    journaling the cherry blossoms of Kyoto—yet they balance these aspirations with a modest budget, often opting for weekend staycations at nearby state parks where they can capture sunrise cityscapes
    with their smartphone.
  culinary: Cassidy Torres favors a mix of classic kid‑friendly fare and adventurous bites, regularly ordering pepperoni pizza with a side of pineapple, savoring street‑taco al pastor with cilantro and
    lime, and whipping up quick smoothie bowls featuring mango, spinach, and chia seeds; they enjoy experimenting with colorful frosting on cupcakes as a canvas for edible art, but they also have a guilty
    habit of snacking on gummy bears while sketching late into the night.
  core: Cassidy Torres is a curious, art‑obsessed 13‑year‑old who blends watercolor, digital animation, and community garden design, balances a tidy allowance plan with spontaneous marker splurges, and
    stays emotionally steady while juggling school, sketchbooks, and weekend bike rides.
background:
  cultural: Cassidy is a white American raised in St. Louis County, Missouri. Her family emphasizes education, community involvement, and the value of creative expression. Growing up in a Midwestern city
    known for its vibrant musical and artistic heritage, she has been exposed to local jazz festivals, folk celebrations, and a diverse array of public art projects. This environment has fostered her appreciation
    for cultural diversity, civic participation, and the role of art in bringing people together. Her upbringing reflects a blend of traditional Midwestern values and an openness to contemporary artistic
    influences.
attributes:
  skills: '["Sketching", "Digital illustration (Procreate)", "Basic coding and animation (Scratch)", "Project organization", "Public speaking", "Collaboration", "Critical thinking"]'
  hobbies: '["Drawing", "Painting", "Visiting art museums and murals", "Reading graphic novels", "Digital animation (Scratch)", "Playing ukulele", "Photography", "Community gardening"]'
  career_goals: 'Cassidy aspires to attend a specialized high school focused on visual arts, where she can deepen her illustration and digital media skills. She plans to build a strong portfolio of artwork
    and animated projects, aiming to pursue a career as a graphic designer, concept artist, or multimedia storyteller. She also hopes to combine her artistic passion with technology by exploring interactive
    design and eventually work on projects that blend visual storytelling with user experience.


    Her long‑term ambition includes contributing to community art initiatives in St. Louis, using her talents to create public murals or youth workshops that inspire creativity in others.'
