personas:
  professional: Yanet Espada is a budding robotics enthusiast who applies their practical mindset and love for structure to design simple, programmable machines in the school STEM club, often sketching
    blueprints before building.
  sports: Yanet Espada loves playing soccer at the local park with friends, follows the matches of Manchester United and the national women's team, and participates in a weekend youth league where they
    practice dribbling drills and teamwork, while also joining a school fitness club that includes jogging on the track.
  arts: Yanet Espada enjoys dancing salsa and merengue at family gatherings and beginner classes, they listen to the rhythms of Celia Cruz and Victor Yturri, love reading adventure novels by Enid Blyton,
    and spend free moments sketching characters like Harry Potter and detective heroes from their mystery books, often sharing their drawings with classmates.
  travel: Yanet Espada prefers day trips that blend adventure and nature, having explored the nearby Blue Ridge Trail and the historic lighthouse town of Cape Harmony, they dream of visiting the bustling
    streets of Tokyo and the iconic pyramids of Egypt, and they usually plan trips with detailed checklists created weeks in advance.
  culinary: Yanet Espada enjoys baking traditional arepas with their mother, expertly mixing corn masa with water and salt, stuffing them with shredded cheese, black beans, and avocado slices, and they
    also experiment with sweet banana bread and homemade guava jam, proudly serving their creations at family gatherings.
  core: Yanet Espada, the organized yet energetic 11‑year‑old, balances a love for soccer, dance, robotics, and reading while habitually over‑packing snacks for outings and occasionally procrastinating
    on homework.
background:
  cultural: Yanet is a first‑generation Venezuelan‑American raised in Frisco, Texas. At home, her family speaks Spanish and keeps Venezuelan traditions alive through food, music, and celebrations such as
    Carnaval and Día de la Independencia. She enjoys helping her mother prepare arepas and learns about Venezuelan folklore and dances. While she embraces her heritage, Yanet also participates fully in
    her American school community, celebrating holidays like Thanksgiving and Fourth of July, and she enjoys sharing Venezuelan customs with her classmates. This blend of cultures gives her a bicultural
    perspective that enriches her social interactions and personal identity.
