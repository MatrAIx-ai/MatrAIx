  hobbies: '["Soccer", "Salsa and merengue dancing", "Reading adventure/mystery books", "Drawing and illustration", "Baking arepas and empanadas", "Exploring nature trails", "STEM club robotics projects"]'
  career_goals: Yanet dreams of a future where she can work closely with animals and people. She is fascinated by veterinarians and hopes to study science in middle school so she can eventually become a
    veterinarian who helps pets in her community. She also imagines herself as a science educator, sharing her love for hands‑on experiments with younger students, and she aspires to earn a scholarship
    that will let her attend a summer STEM camp.
