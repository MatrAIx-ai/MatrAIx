  hobbies: '["crayon drawing", "watercolor painting", "block tower building", "storytime listening", "backyard nature exploration", "collecting leaves and stones", "watching animated science videos", "singing
    nursery rhymes", "dancing to music"]'
  career_goals: Although only four, Timothy often talks about what he wants to be when he grows up. He dreams of becoming an artist who can paint big pictures, a builder who constructs towers, and sometimes
    a teacher who helps other children learn. These early aspirations mirror his love of creativity, his enjoyment of structured activities, and his desire to help and guide others.
