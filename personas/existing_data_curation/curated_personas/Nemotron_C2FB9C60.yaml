personas:
  professional: Ronnie Hanchett is a veteran emergency and community nurse who blends two decades of hands‑on patient care with a pragmatic curiosity for health‑tech, mentoring new staff while navigating
    the fast‑paced demands of Albuquerque’s diverse patient population with assertive compassion and a flexible, spontaneous approach to problem‑solving.
  sports: Ronnie Hanchett is an avid mountain biker and hiker of the Sandia Mountains who follows the New Mexico United soccer team, regularly attends Albuquerque Isotopes baseball games, and participates
    in a local mountain‑bike club that meets every Saturday, using the trail workouts to balance their high‑stress nursing shifts with endurance training.
  arts: Ronnie Hanchett immerses themselves in jazz, blues, and R&B, often listening to John Coltrane, B.B. King, and Erykah Badu while quietly playing the saxophone at home for relaxation, and they frequently
    attend live performances at local venues such as the Luna Theatre and the Downtown Jazz Club, drawing inspiration for both their nursing practice and culinary experiments.
  travel: Ronnie Hanchett prefers spontaneous, nature‑focused getaways, having explored the Grand Canyon, Santa Fe’s art districts, and a recent road trip to the red rocks of Sedona, while dreaming of trekking
    Patagonia’s national parks and visiting Japan’s historic temples to study traditional medicine practices, usually planning trips on a flexible itinerary rather than rigid schedules.
  culinary: Ronnie Hanchett enjoys cooking soul‑food staples infused with Southwestern chile flavors, regularly preparing dishes like collard greens with roasted Hatch green chile, black‑eyed pea jambalaya
    with chipotle, and sweet potato cornbread spiced with cumin and coriander, while experimenting with fresh garden herbs such as sage and cilantro, and they often host casual backyard barbecues for friends
    and neighbors.
  core: Ronnie Hanchett is a 50‑year‑old emergency nurse who fuses a spontaneous love of the outdoors, soulful cooking, and healing arts into a resilient, community‑centric life, balancing disciplined health
    habits with occasional impulsive gear splurges and a saxophone‑filled sanctuary for personal unwind.
background:
  cultural: Ronnie grew up in a close‑knit African American family rooted in the Southwest, where church, music, and stories of resilience shaped his values of community service, faith, and cultural pride.
    In Albuquerque, he blends this heritage with the city’s rich tapestry of Hispanic and Native American influences, often engaging in bilingual patient interactions and participating in events like the
    Gathering of Nations. As an active member of the National Black Nurses Association, he celebrates Juneteenth, shares soul‑food traditions alongside New Mexican chile cuisine, and mentors fellow Black
    healthcare professionals. His cultural identity is a dynamic mix of African American heritage and the multicultural environment of New Mexico, informing both his professional approach and personal passions.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound and ostomy care'', ''Medication administration'', ''Emergency triage'', ''Electronic medical records (Epic, Cerner)'', ''Patient education and
    health literacy'', ''Cross‑cultural communication'', ''Mentorship and preceptorship'', ''Stress management and resilience'']'
  hobbies: '[''Hiking and mountain biking in the Sandia Mountains'', ''Cooking soul food and Southwestern dishes'', ''Listening to jazz, blues, and R&B'', ''Reading African American and local history'',
    ''Playing the saxophone'', ''Volunteering at community health fairs'', ''Gardening in the backyard'', ''Attending local cultural festivals'']'
  career_goals: Ronnie aims to complete his Bachelor of Science in Nursing (BSN) to formalize his academic foundation, followed by certification as a Certified Emergency Nurse (CEN) and a Nurse Educator.
    He envisions stepping into a Clinical Nurse Specialist role that blends direct patient care with evidence‑based practice development, particularly in chronic disease management for underserved communities.
    Passionate about community health, he plans to launch a neighborhood health‑literacy program that leverages his storytelling ability and cultural insight. While open to leadership positions such as
    charge nurse or unit manager, he seeks arrangements that preserve his flexibility and allow spontaneous, hands‑on involvement rather than rigid administrative duties.
