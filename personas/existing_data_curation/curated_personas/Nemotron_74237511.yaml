  career_goals: Jing aims to transition from a senior technician role into a research program manager position where she can shape interdisciplinary projects that blend cutting‑edge science with visual
    storytelling. She envisions establishing a laboratory unit that integrates artistic design with experimental research, fostering innovative approaches to data presentation and public outreach. Mentorship
    remains central to her ambition; she wants to develop structured onboarding and wellbeing programs for junior staff, promoting flexible work practices that accommodate diverse life circumstances. Long‑term,
    Jing hopes to lead a grant‑funded initiative that partners academic labs with local art institutions to create community‑focused science communication exhibits.
