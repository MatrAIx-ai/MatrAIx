  hobbies: '[''Digital illustration'', ''Speculative fiction reading'', ''Mixed media collage'', ''Board game strategy (RPGs)'', ''Arduino tinkering'', ''Yoga'', ''Journaling'', ''Local art gallery visits'',
    ''Creative writing (short stories)'', ''Urban gardening'']'
  career_goals: Charletha aims to transition into a pharmacy manager role within five years, where she can lead a team in implementing innovative, visually driven patient‑education programs. She plans to
    pursue a part‑time PharmD while developing expertise in clinical compounding for dermatological therapies. Ultimately, she envisions opening a community‑focused wellness space that merges health services
    with creative workshops for underserved youth, and becoming a certified medication safety specialist to champion safer pharmacy practices.
