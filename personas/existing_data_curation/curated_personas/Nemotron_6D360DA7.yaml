personas:
  professional: Charletha Domino, a certified pharmacy technician in Saint Petersburg, blends precise prescription verification and compounding expertise with a love for digital molecular illustration,
    channeling their imaginative yet competitive nature into crafting visually driven patient‑education programs while meticulously tracking workflow metrics for her eventual manager role.
  sports: Charletha Domino follows the Tampa Bay Buccaneers in the fall, the Rays in the summer, and the Lightning during hockey season, trains at the Pinellas County Community Center's indoor cycling class,
    and participates in the St. Petersburg Cycling Club and the Pinellas Yoga Collective, illustrating a disciplined yet socially selective fitness routine.
  arts: Charletha Domino immerses herself in downtown St. Pete's art scene, collecting limited‑edition prints by Kehinde Wiley, drawing inspiration from the abstract works of Julie Mehretu, and relaxing
    with the soulful jazz of Esperanza Spalding and the experimental electronica of Flying Lotus, which fuels her speculative fiction illustrations and mixed‑media collages.
  travel: Charletha Domino favors meticulously planned short‑haul trips that combine cultural immersion and artistic exploration, such as a weekend in New Orleans' French Quarter to study Creole cuisine,
    a literary pilgrimage to Medellín, Colombia to visit Gabriel García Márquez's haunts, and an annual family reunion in Jamaica where she reconnects with Caribbean rhythms, reflecting her curiosity and
    budget‑conscious approach.
  culinary: Charletha Domino enjoys crafting aromatic oxtail stew with Scotch bonnet peppers and plantain mofongo, skillfully balances flavors using fresh herbs like thyme and cilantro, and seeks out farm‑to‑table
    spots in St. Petersburg that serve heirloom tomatoes and smoked catfish, while occasionally binge‑eating spicy ramen during late‑night coding sessions.
  core: Charletha Domino is a competitively driven pharmacy technician who merges scientific precision with artistic flair, balancing disciplined budgets and health routines with a solitary love of abstract
    art and speculative fiction.
background:
  cultural: Charletha identifies as African American and was raised in the vibrant Black community of the Tampa Bay area. She grew up with gospel and jazz music, celebrates Juneteenth and Kwanzaa with family
    gatherings featuring soul food and storytelling, and embraces Caribbean influences—particularly Haitian and Jamaican rhythms—that shape her musical taste and occasional cooking of oxtail stew and plantains.
    Living in Saint Petersburg, FL, she values the resilience and support of Black women's networks in Pinellas County, often volunteering at community health fairs and mentoring local Black teens interested
    in STEM fields.
attributes:
  skills: '[''Prescription verification'', ''Sterile and non‑sterile compounding'', ''Pharmacy inventory management'', ''Pharmacy software operation (QS/1, PioneerRx)'', ''Medication safety analysis'',
