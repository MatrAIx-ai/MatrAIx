personas:
  professional: Kenneth Grissom, a 27‑year‑old welding specialist, merges hands‑on fabrication with meticulous blueprint reading, leveraging MIG, TIG, and stick techniques to produce aerospace‑grade components
    while chasing journeyman and CWI certifications and eyeing a future supervisory role in his own boutique workshop.
  sports: Kenneth Grissom, an avid desert hiker, tackles trail loops in Red Rock Canyon and occasionally joins the Las Vegas Trail Runners club, while they cheer on the Las Vegas Raiders and enjoy the occasional
    pickup basketball game at the community center, despite a general preference for solitary exercise.
  arts: Kenneth Grissom channels creative energy into forging custom knives and compact metal sculptures inspired by the kinetic art of Anthony Caro, while they listen to the industrial‑ambient tracks of
    Boards of Canada and devour the latest Philip K. Dick novel for speculative inspiration.
  travel: Kenneth Grissom favors low‑key road trips to the stark beauty of Death Valley and the intricate metal‑work exhibits at FABTECH in Chicago, planning itineraries loosely around workshop deadlines,
    and they dream of a future pilgrimage to the precision‑engineered factories of Stuttgart, Germany.
  culinary: Kenneth Grissom gravitates toward hearty, protein‑rich meals like a smoked rosemary‑infused ribeye paired with a quinoa salad tossed with toasted pumpkin seeds, and they enjoy crafting a spicy
    chipotle aioli for his occasional home‑cooked Mexican night, while rarely venturing beyond the local farmers market for fresh ingredients.
  core: Kenneth Grissom is a solitary, curiosity‑driven metal artisan who balances rugged hands‑on creation with a laid‑back approach to finances, health, and life, occasionally slipping into disorganization,
    but they always return to the forge.
background:
  cultural: Kenneth grew up in the suburban neighborhoods of North Las Vegas, Nevada, in a blue‑collar family where his parents worked in automotive repair and construction. The region's desert landscape
    and the nearby mining and building industries fostered an early appreciation for hands‑on trades and self‑reliance. He completed high school locally and entered a community apprenticeship program that
    introduced him to welding, reinforcing the pragmatic, independent values common among Southwest labor communities. While he was raised in a nominally Catholic household, he now identifies as secular,
    focusing on personal competence and the quiet confidence derived from mastering a skilled trade. His cultural outlook blends mainstream American work ethic with the eclectic, low‑key sensibilities of
    Nevada's quieter outskirts.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding", "Brazing", "Electronic soldering", "Blueprint reading", "Metal fabrication", "Material selection (steel, aluminum, stainless)", "Welding equipment
    maintenance", "OSHA safety compliance", "Problem solving & troubleshooting"]'
  hobbies: '["Arduino and electronics projects", "Custom knife forging", "Metal sculpture", "Desert hiking", "Photography (landscape)", "Science fiction reading", "Podcasts on engineering", "Single-player
    video gaming", "Model railroading"]'
  career_goals: Kenneth aims to earn a journeyman welding certification within the next year and pursue the Certified Welding Inspector (CWI) credential to broaden his qualifications. He envisions transitioning
    from line‑item shop work to a supervisory role where he can mentor apprentices while maintaining a degree of autonomy. Ultimately, he hopes to open a modest boutique workshop that specializes in custom
    metal art, precision aerospace‑grade components, and small‑batch fabrication for local craftsmen. This venture would let him control his schedule, work largely independently, and continue exploring
    innovative welding methods without the constraints of a large corporate environment.
