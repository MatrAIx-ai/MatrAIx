persona_description: A chemist who specializes in the study of organic chemistry, particularly the reactions and transformations of organic compounds. Their research interests include, but are not limited
  to, the structure, properties, and reactions of organic compounds, the synthesis of new organic compounds, and the development of new analytical methods for the identification and quantification of organic
  compounds. They are skilled in the use of analytical techniques such as spectroscopy, chromatography, and mass spectrometry to analyze organic compounds and determine their properties and structures.
  They are also knowledgeable in the use of organic synthesis techniques to create new compounds and understand the reactions that occur within organic compounds.
