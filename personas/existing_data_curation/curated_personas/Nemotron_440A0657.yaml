    and teaching'', ''Community outreach and animal welfare advocacy'', ''Development of educational materials'']'
  hobbies: '[''Watercolor painting and animal sketching'', ''Reading speculative fiction and philosophy'', ''Birdwatching and wildlife observation'', ''Hiking and beach walks on Long Island'', ''Gardening
    and native plant cultivation'', ''Yoga and mindfulness practice'', ''Volunteering at animal rescue organizations'', ''Cooking and exploring international cuisines'', ''Maintaining a creative veterinary
    blog'']'
  career_goals: Dr. Carter aspires to transform her clinic into a boutique practice that integrates holistic, evidence‑based veterinary care with artistic and educational experiences for clients. She plans
    to pursue board certification in small‑animal internal medicine, launch a community program that pairs animal‑assisted therapy with creative workshops, and contribute to veterinary curriculum design
    that emphasizes interdisciplinary thinking. Long‑term, she hopes to become a state‑wide veterinary association leader, publish a book linking animal behavior science with imaginative storytelling, and
    mentor the next generation of veterinarians to balance scientific rigor with creative curiosity.
