  hobbies: '[''Hiking in the Sierra Nevada'', ''Skiing at Mt. Rose'', ''Community volunteering (food bank)'', ''Cooking Italian cuisine for friends'', ''Salsa dancing classes'', ''DIY home renovation projects'',
