personas:
  professional: Celina Inzenga is a civil engineer who specializes in structural design and site development, expertly wielding AutoCAD, Revit, and GIS while leading multidisciplinary teams with an upbeat,
    people‑centric style, yet they often wrestle with keeping their project timelines organized because their love of routine clashes with an occasional spur‑of‑the‑moment approach to problem‑solving.
  sports: Celina Inzenga is an avid hiker with the Sierra Trail Club, a regular skier at Mt. Rose, and a seasonal supporter of the Reno Aces baseball team, balancing their love of outdoor adventure with
    weekly yoga sessions at a local studio to stay fit, and they often share photos from the trails on social media.
  arts: Celina Inzenga finds creative release in salsa dancing to the rhythms of Celia Cruz, captures the Sierra Nevada’s golden light with a DSLR reminiscent of Ansel Adams, and often cooks family‑style
    risotto while listening to Andrea Bocelli and the classic rock of the Rolling Stones, weaving music, photography, and food into their social gatherings, and they frequently host themed potlucks for
    friends.
  travel: Celina Inzenga plans most trips on a tight weekend schedule, favoring road‑filled adventures to Yellowstone and Yosemite, while dreaming of a summer pilgrimage to the Tuscan countryside to explore
    the vineyards that inspired their family’s recipes, and they have saved enough to book a future solo trek through Patagonia’s Torres del Paine.
  culinary: Celina Inzenga is a confident home chef who perfects homemade fettuccine al pomodoro with San Marzano tomatoes, fresh basil, and Parmigiano‑Reggiano, regularly hosts dinner parties where they
    pair the dishes with local Nevada craft beers, and they occasionally experiment with spicy Mexican street tacos to honor the vibrant Hispanic community around them.
  core: Celina Inzenga blends a methodical work ethic with spontaneous bursts of adventure, channeling their love for community, outdoor thrills, and hearty cooking into a dynamic, sometimes stress‑laden,
    but always personable lifestyle, and they never miss an opportunity to share a freshly baked loaf with neighbors.
background:
  cultural: Celina is a white American of mixed European ancestry, with strong Italian roots reflected in her family’s traditions, especially in food and holiday celebrations. Raised in the Midwest, she
    internalized a practical, work‑ethic‑oriented mindset that aligns with her preference for routine and tangible results. Since moving to Reno, she has embraced the western frontier spirit of Nevada,
    appreciating the blend of outdoors culture, the growing Hispanic community, and the values of self‑reliance and community service. Her cultural outlook combines a respect for family heritage with an
    openness to the diverse influences of her local environment.
