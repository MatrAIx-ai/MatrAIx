  career_goals: Celina aims to advance to a senior project manager role within the next five years, where she can oversee large‑scale public infrastructure projects that integrate sustainable and resilient
    design. She plans to earn her Project Management Professional (PMP) certification to strengthen her project planning capabilities, and she aspires to lead initiatives that improve Reno’s transportation
    and water systems while fostering community participation. Long‑term, she envisions taking on a principal engineer position that bridges technical excellence with mentorship, helping junior engineers
    develop both technical and interpersonal skills.
