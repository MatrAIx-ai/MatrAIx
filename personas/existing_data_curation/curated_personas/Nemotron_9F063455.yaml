  career_goals: Kathleen aims to secure a senior maintenance technician or foreman position within her building’s management team, where she can oversee a small crew, mentor newer workers, and ensure that
    maintenance protocols are consistently followed. She is interested in obtaining a City of New York Building Maintenance certification and completing an OSHA 30‑hour safety course to formalize her expertise.
    Long‑term, she hopes to transition into a supervisory role that emphasizes training and safety rather than heavy physical labor, allowing her to share her practical knowledge while maintaining a stable
    income for her family.
