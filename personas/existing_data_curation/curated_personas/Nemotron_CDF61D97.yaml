personas:
  professional: Amber Frazier, an aspiring young naturalist who spends weekends collecting leaves, rocks, and pinecones, channels their curiosity and practical mindset into sketching and cataloguing tiny
    ecosystems, while their relaxed approach to obligations lets them explore ideas freely without rigid schedules.
  sports: Amber Frazier, a member of the town’s Kids Soccer Club feeding into the Greenfield Tigers youth program, loves chasing a ball in the backyard, climbing trees in spring, and joining cooperative
    games with a small group of friends, preferring free‑play exploration over rigid drills.
  arts: Amber Frazier, a budding illustrator who eagerly colors picture books and recreates scenes from Dr. Seuss, Eric Carle, and Beatrix Potter, channels their solitary creativity into detailed nature
    sketches and enjoys listening to the whimsical scores of Disney’s The Lion King while drawing.
  travel: Amber Frazier, who loves spontaneous family road trips to Yellowstone National Park, a nearby farm where they help feed goats, and the seaside town of Cape Cod, prefers exploring natural wonders
    over theme parks and often packs a small backpack with crayons and a leaf journal for on‑the‑go sketches.
  culinary: Amber Frazier, who delights in macaroni and cheese sprinkled with cheddar, crunchy apple slices with peanut butter, and helping stir batter for blueberry muffins, shows modest cooking skills,
    frequently asks for an extra pinch of pine nuts on salads, yet can be fussy about broccoli.
  core: Amber Frazier, a curious six‑year‑old who blends solitary nature‑collecting with occasional leadership in block games, balances a relaxed attitude toward rules with bursts of assertiveness, and
    occasionally forgets to tidy up their treasure stash.
background:
  cultural: Amber grew up in a small, close‑knit community in Bronson, Michigan, where family traditions, Midwestern values, and seasonal celebrations are central. Her family often observes holidays like
    Thanksgiving, Christmas, and Fourth of July with community picnics and church gatherings. She experiences a blend of rural life—farm visits and outdoor play—and suburban influences, such as school events
    and local library story times. The cultural emphasis on modesty, practicality, and community service subtly shapes her outlook.
attributes:
  skills: '[''Reading short sentences'', ''Counting to 20'', ''Drawing animals and plants'', ''Following step‑by‑step craft instructions'', ''Using a tablet for educational games'', ''Asking detailed curiosity‑driven
    questions'', ''Sorting and categorizing natural objects'']'
  hobbies: '[''Coloring and drawing'', ''Collecting leaves, rocks, and pinecones'', ''Reading picture books about animals and adventure'', ''Exploring the backyard and local farm'', ''Building forts and
    structures with sticks'', ''Playing cooperative building‑block games with a few friends'']'
  career_goals: Although still young, Amber loves animals and nature and often talks about becoming a veterinarian or a wildlife researcher one day, hoping to help sick animals and explore the outdoors.
    She also enjoys storytelling and sometimes imagines being a teacher who can share what she learns with others. Her practical side makes her think about learning useful skills now, like caring for a
    pet or helping in a community garden, as stepping stones toward those future ambitions.
