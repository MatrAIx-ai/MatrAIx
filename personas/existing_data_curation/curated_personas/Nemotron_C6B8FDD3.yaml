personas:
  professional: Misty Pinkstaff is an aspiring game designer, channeling their practical, routine‑loving mindset into meticulously planned Minecraft and Stardew Valley world‑building projects, while their
    competitive nature pushes them to craft challenge‑filled levels, even as their relaxed attitude toward obligations sometimes leads them to miss class assignments in favor of late‑night coding sprints.
  sports: Misty Pinkstaff is a dedicated midfielder for the Riverdale Youth Soccer Club, fiercely competitive on the field and aspiring to emulate the play style of Megan Rapinoe, while also cheering for
    the local professional team, the Lakeview Lions, and spending Saturday mornings biking to the community park for extra drills, and they often review match footage in the evenings to refine their technique.
  arts: Misty Pinkstaff immerses herself in the world of YA literature, re‑reading the Harry Potter series while humming along to current pop hits from Billie Eilish and Olivia Rodrigo, and they often knit
    scarves while listening to Taylor Swift, collecting stickers that feature artwork from favorite series and local fair artists.
  travel: Misty Pinkstaff prefers short, well‑planned day trips on their bike to nearby nature trails and the annual county fair, yet dreams of a family vacation to the Wizarding World at Universal Orlando
    Resort and a future backpacking adventure through the national parks of the Pacific Northwest, balancing their love of familiar routines with a yearning for structured exploration, and they keep a scrapbook
    of past trips to remind themselves of beloved routes.
  culinary: Misty Pinkstaff is a budding baker who excels at whipping up chocolate‑chip cookies, oat‑and‑honey granola bars, and experimental cupcakes flavored with matcha or peanut butter, often using
    fresh garden mint from their family’s backyard and they proudly share their treats with friends after soccer practice.
  core: Misty Pinkstaff, a 13‑year‑old routine‑loving, competitive soccer player who bakes cookies, knits scarves, and builds virtual farms, balances a skeptical eye toward others with a flexible, sometimes
    disorganized approach that makes them both reliably practical and delightfully unpredictable.
background:
  cultural: Misty was raised in Harlan, a small, predominantly white town in Shelby County, Iowa. Her family has deep Midwestern roots, with generations involved in agriculture and local community activities.
    The town’s culture emphasizes self‑reliance, hard work, and close‑knit community events such as the county fair, church potlucks, and high‑school sports games. Family gatherings often center around
    home‑cooked meals and seasonal celebrations. Growing up in this environment, Misty has absorbed traditional Midwestern values, a practical outlook, and a strong sense of belonging to her rural hometown.
