  career_goals: Misty aims to finish high school with a respectable GPA and earn a scholarship to study agricultural science or veterinary technology at a community college. She envisions a future where
    she can work on a local farm or in a veterinary clinic, combining her practical skills with a routine‑oriented job. In the longer term, she dreams of running a small farm stand selling produce she grows
    and offering basic pet‑care services to neighbors. She also hopes to become a leader on her high‑school soccer team, earning a captaincy and possibly a varsity scholarship. Ultimately, Misty wants a
    steady, hands‑on career that lets her stay connected to her rural community while providing financial stability.
