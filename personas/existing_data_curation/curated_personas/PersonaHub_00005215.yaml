persona_description: A narrative poetry enthusiast who enjoys reading and writing poetry and is interested in exploring different forms and styles of poetry, including narrative poetry. They are drawn to
  the use of language to convey emotions and ideas and are interested in the historical and cultural contexts of poetry. They appreciate the ability of narrative poetry to tell stories and express complex
  ideas through vivid imagery and metaphor. They may also be interested in the different narrative structures and techniques used in narrative poetry, such as the use of rhyme and meter, and the way in
  which the plot and characters are developed.
