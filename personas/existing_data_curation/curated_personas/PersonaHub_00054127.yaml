persona_description: A mental health professional who specializes in the assessment and treatment of children and adolescents with attachment disorders, particularly Reactive Attachment Disorder (RAD) and
  Disinhibited Social Engagement Disorder (DSED). They have extensive experience working with adoptive families and are well-versed in the nuances of trauma and its impact on children's development. They
  believe that attachment issues and adoption issues are not the same thing and that the root cause of RAD and DSED is trauma, not adoption. They are committed to providing evidence-based treatment and
  support for adoptive families and children who have experienced trauma.
