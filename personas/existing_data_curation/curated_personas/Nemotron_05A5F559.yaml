personas:
  professional: Nora Rojas, 78, blends a lifelong foundation in data analysis and bilingual communication with a hands‑on, community‑oriented approach, mentoring youth in STEM while orchestrating cultural
    events and senior programs that balance her love of structure with a pragmatic flexibility.
  sports: Nora Rojas, 78, stays active by strolling the fall‑colored paths of Branch Brook Park and dancing salsa and bomba on weekends, while cheering for the New York Yankees and rooting for the New Jersey
    Devils during the winter season.
  arts: Nora Rojas, 78, finds artistic fulfillment singing in a community choir, dancing to the rhythms of Celia Cruz and Marc Anthony, and escaping into mystery novels by Agatha Christie, all of which
    enrich her vibrant social calendar.
  travel: Nora Rojas, 78, enjoys leisurely trips that blend visits to family in the Caribbean with comfortable tours of the Jersey Shore and the historic streets of Old Town Newark, preferring well‑planned
    itineraries that allow for relaxed exploration.
  culinary: Nora Rojas, 78, delights in cultivating a small herb garden to season classic island dishes like arroz con gandules, pernil, and plantain‑based empanadas, while baking flan and pan de agua for
    gatherings, showcasing a home‑cooking style that balances tradition with fresh, home‑grown flavors.
  core: Nora Rojas, 78, is an energetic, structure‑loving elder who blends scientific rigor, cultural vibrancy, and community mentorship while juggling a gentle worry‑laden heart and a penchant for salsa,
    herb‑spiced cooking, and modest financial prudence.
background:
  cultural: Nora is a third‑generation Puerto Rican‑American who was born and raised in Newark’s vibrant Hispanic neighborhoods. She grew up bilingual, speaking Spanish at home while navigating English‑dominant
    schools, which gave her a deep appreciation for both cultures. Family gatherings centered around music, dance, and food have shaped her identity, and she continues to celebrate traditional holidays
    such as Three Kings Day and the Feast of San Juan. The strong communal spirit of Newark’s Latino community, combined with the city’s multicultural landscape, has reinforced her commitment to outreach
    and cultural preservation. Nora’s Catholic upbringing informs her values of service and compassion, and she maintains close ties with relatives on the island, often sharing stories and recipes across
    generations.
