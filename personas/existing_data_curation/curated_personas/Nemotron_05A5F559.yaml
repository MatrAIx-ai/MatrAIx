  career_goals: Although retired, Nora aims to remain actively involved in her community. She hopes to mentor high‑school and college students interested in science, lead a senior‑center program that teaches
    Puerto Rican dance, music, and cooking, and compile a small cookbook of family recipes. Nora also wants to become a volunteer coordinator for health‑screening events in Newark, advocate for senior‑friendly
    city policies, and deepen her digital skills to keep close contact with relatives in Puerto Rico. Her overarching ambition is to preserve and share her cultural heritage while empowering the next generation.
