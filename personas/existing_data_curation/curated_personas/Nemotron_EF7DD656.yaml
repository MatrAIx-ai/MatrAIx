    design'', ''DevOps practices (CI/CD, Docker, Kubernetes)'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Reading speculative fiction and philosophy'', ''Photography (street and nature)'', ''Visiting art galleries and museums'', ''Playing chess'',
    ''Gardening'', ''Volunteering in STEM mentorship programs for underrepresented youth'', ''Listening to jazz and blues music'', ''Exploring new culinary recipes'']'
  career_goals: Roshni aims to transition into a senior architect or technology evangelist role, where she can shape the strategic direction of innovative products that merge art and technology, such as
    interactive visualization platforms or immersive VR experiences. She is passionate about championing diversity in tech and plans to establish a mentorship program for Black women engineers in the St.
    Louis area. Over the next five years, she envisions publishing thought pieces on the convergence of business strategy and emerging tech, speaking at niche conferences, and possibly launching a boutique
    consultancy that helps mid‑size companies adopt cutting‑edge, data‑driven solutions while maintaining a human‑centered design approach.
