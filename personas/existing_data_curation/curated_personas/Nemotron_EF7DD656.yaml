personas:
  professional: Roshni Crutcher, a 61‑year‑old full‑stack developer specializing in React, Node.js, and cloud platforms, channels her methodical Agile discipline and vivid imagination into crafting interactive
    data‑visualization experiences that fuse business insight with artistic expression, while steadfastly mentoring emerging talent from underrepresented groups.
  sports: Roshni Crutcher, a member of the St. Louis Walking Club and an avid Saturday‑morning tennis player at the St. Louis City Club, stays active through low‑impact cardio and yoga, while cheering on
    the St. Louis Cardinals in spring and the St. Louis Blues during hockey season, treating fitness as a structured yet meditative counterbalance to her analytical work.
  arts: Roshni Crutcher, whose evenings often blend sketching in historic neighborhoods with listening to Miles Davis’s Kind of Blue and John Coltrane’s A Love Supreme, draws aesthetic inspiration from
    abstract master Mark Rothko and digital visionary Beeple, while regularly attending gallery openings featuring installations by Yayoi Kusama and performances by Marina Abramović, integrating this vibrant
    artistic diet into her own abstract paintings and digital illustrations.
  travel: Roshni Crutcher prefers meticulously planned solo museum journeys, having spent weeks wandering Kyoto’s Nishijin district, strolling Florence’s Uffizi galleries, and photographing the rugged vistas
    of Yosemite, while dreaming of future expeditions to Patagonia’s glaciers and Norway’s fjords, always budgeting trips within her modest retirement fund yet allowing occasional splurges on boutique hotel
    stays near cultural landmarks.
  culinary: Roshni Crutcher, an avid home‑chef with a garden full of basil, thyme, and heirloom tomatoes, delights in crafting quinoa‑and‑roasted‑beet salads, miso‑glazed salmon with shiitake mushrooms,
    and occasional paella spiced with smoked paprika and saffron, often pairing meals with a glass of natural Pinot Noir while listening to live jazz at downtown bistros.
  core: Roshni Crutcher blends a disciplined tech mind with an ever‑curious artistic spirit, juggling late‑night chess games, a habit of sketching every train ride, and a tendency to hoard vintage jazz
    vinyls that often crowd her home office.
background:
  cultural: Roshni is an African‑American woman rooted in the rich cultural tapestry of St. Louis. Growing up in a community that prized resilience, education, and artistic expression, she was influenced
    by the city's historic Black neighborhoods, the soulful legacy of blues and jazz, and the vibrant local art scene. Her family traditions emphasize communal support, church involvement, and a deep respect
    for ancestral heritage, which she honors through participation in the St. Louis Black Museum and local cultural festivals. As a Black professional in tech, Roshni navigates the intersection of race
    and gender with confidence, actively contributing to networks like Black Women in Tech and mentoring the next generation of Black engineers.
attributes:
  skills: '[''Full-stack web development (JavaScript, React, Node.js)'', ''Cloud architecture (AWS, Azure)'', ''Agile project management (Scrum Master)'', ''Business analysis and data-driven decision making'',
