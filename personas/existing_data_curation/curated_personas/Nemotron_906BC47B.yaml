  hobbies: '[''Soccer (community league)'', ''Cooking Mexican cuisine'', ''Hiking in Sierra foothills'', ''Fishing at local lakes'', ''Playing acoustic guitar'', ''Attending cultural festivals (Día de los
    Muertos, Cinco de Mayo)'', ''Watching Los Angeles Dodgers baseball games'', ''Reading true‑crime literature'', ''Volunteering for youth mentorship programs'', ''Family gatherings and barbecues'']'
  career_goals: Orlando aims to advance to the rank of police captain within the Visalia Police Department, where he can shape department policy and deepen community-policing initiatives. He envisions establishing
    a formal mentorship program that pairs experienced detectives with new recruits, fostering professional growth and retention. Leveraging his business acumen, he plans to introduce data‑analytics tools
    to streamline investigations and resource allocation. Over the longer term, he aspires to transition into a consultancy role, advising municipal agencies on public‑safety strategy and organizational
    efficiency after his retirement from active duty.
