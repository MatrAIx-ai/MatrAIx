persona_description: A Norwegian-led research team who has developed a novel and effective vaccine against the deadly Ebola virus, which has claimed thousands of lives in West Africa. The team's study,
  published in The Lancet, is based on data from the vaccination of 4,000 people in Guinea. The result is considerably better than expected, with a single vaccination providing complete protection against
  the disease. The Norwegian Institute of Public Health has guided the research, and the vaccine was originally developed by the Canadian Institute of Public Health, which has licensed it to the US pharmaceutical
  firm Merck. The research has been praised by the Foreign Minister of Norway and the Guinean ministry of Health.
