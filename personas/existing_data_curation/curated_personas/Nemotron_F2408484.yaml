personas:
  professional: Jean Jones is a seasoned case manager in Manatee County’s healthcare system who blends meticulous client assessment, evidence‑based crisis intervention, and a preference for solitary, research‑driven
    work into flexible care plans, and they strategically position themselves for a senior program‑coordinator role and a future tele‑health service they hope to launch.
  sports: Jean Jones participates in gentle yoga classes at Manatee Flow Yoga, walks the Cedar Creek Reserve as part of the Manatee Trail Walking Club, occasionally watches the Tampa Bay Rays on game nights,
    and they follow the Florida Gulf Coast Eagles basketball team, preferring low‑impact fitness that fits their solitary rhythm.
  arts: Jean Jones frequents the Ringling Museum of Art and the Bradenton Artists’ Gallery, collects contemporary literary fiction by authors such as Zadie Smith and Yaa Gyasi, attends community workshops
    on sustainable crafts, enjoys the folk‑rock storytelling of Anaïs Mitchell, and they find solace in soft piano recordings by Ludovico Einaudi while knitting.
  travel: Jean Jones prefers low‑key travel that balances solitude with modest adventure, often day‑trips to Anna Maria Island and Myakka River State Park, dreams of a quiet hike through the Great Smoky Mountains
    and a reflective stay at a traditional tea house in Kyoto, plans trips months in advance to stay within budget, and they enjoy traveling solo or with a close friend who respects their need for quiet.
  culinary: Jean Jones cooks primarily plant‑based meals using vegetables from their garden, favors dishes like roasted beet and goat‑cheese salad with fresh rosemary, quinoa pilaf with turmeric and cilantro,
    and occasional comfort food such as baked mac and cheese, and they relish experimenting with herbs like sage and thyme while pairing meals with a cup of herbal chamomile tea.
  core: Jean Jones, a 43‑year‑old case manager who balances meticulous solitude with proactive care, spends evenings knitting scarves, journaling, and they worry about the next crisis to pre‑empt.
background:
  cultural: Jean Louise grew up in a middle‑class, white family in the suburban South Florida region, absorbing a blend of traditional Southern hospitality and the multicultural rhythm of coastal Florida.
    Her upbringing emphasized self‑reliance, community service, and modesty. Married for over a decade, she shares a stable home life in Palmetto, where family and church gatherings remain important. The
    local culture of Manatee County, with its emphasis on outdoor recreation and close‑knit neighborhoods, shapes her appreciation for nature and community‑based support. While she identifies with mainstream
    American cultural norms, she actively respects the diverse backgrounds of the clients she serves.
attributes:
  skills: '["Client Assessment", "Case Management", "Crisis Intervention", "Community Resource Navigation", "Patient Advocacy", "Care Plan Development", "Interdisciplinary Coordination", "Trauma-informed
    Counseling", "Documentation and Record Keeping", "Self-care and Stress Management", "Conflict Resolution", "Evidence-Based Practice Research"]'
  hobbies: '["Reading", "Gardening", "Birdwatching", "Journaling", "Yoga", "Meditation", "Knitting", "Art Gallery Visits", "Sustainable Living Workshops"]'
  career_goals: Jean Louise aims to advance to a senior case manager or program coordinator role where she can design and oversee community outreach initiatives for underserved populations in Manatee County.
    She plans to earn a Bachelor of Social Work through a part‑time online program and obtain licensure as a Clinical Social Worker, allowing her to provide direct mental‑health counseling while still leveraging
    her strength in organized, evidence‑based practice. Long‑term, she hopes to develop a tele‑health support service that minimizes face‑to‑face stress for both staff and clients, and to mentor new social
    workers in managing occupational stress and maintaining professional boundaries.
