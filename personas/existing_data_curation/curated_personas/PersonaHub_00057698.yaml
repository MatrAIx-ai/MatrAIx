persona_description: Mate Erdelyi, a chemist and researcher who is leading a major research project that covers everything from natural African remedies to new methods for combating antibiotic resistance,
  involving every continent. His research puts him in a variety of unusual situations, including finding the best way to get Maasai healers to talk about their natural remedies and studying natural African
  remedies and plants to find substances that are effective against malaria, cancer, and tuberculosis. His team at the Department of Chemistry and Molecular Biology works in Kenya, Tanzania, and Uganda,
  where young researchers gather the plants. Active substances are then extracted and assessed. A large number of molecules have proven to be active, and are now undergoing further testing. There are some
  plant families that researchers know have an antimalarial effect. If they are too toxic to treat malaria, they could be used in the fight against cancer. His team also involves young African doctoral
  students coming to work with the team in Gothenburg.
