  hobbies: '[''Reading mystery and science‑fiction books'', ''Solving puzzles and brain teasers'', ''Drawing nature sketches'', ''LEGO building'', ''Scratch game development'', ''Cooking traditional Mexican
    dishes with family'', ''Birdwatching and insect observation in local parks'']'
  career_goals: Silvana’s long‑term ambition is to become a scientist who merges technology and environmental stewardship. She hopes to win regional science fairs with projects on water conservation, attend
    a robotics camp, and eventually study wildlife biology or environmental engineering. She also dreams of using her bilingual abilities to bridge scientific outreach between her Texas community and Mexican
    peers, helping younger students explore STEM fields.
