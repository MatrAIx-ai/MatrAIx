persona_description: A team of interdisciplinary scientists and engineers at the University of Wisconsin-Madison, particularly focused on studying the complex interplay between the water system and various
  factors such as land use, climate change, human activities, and ecosystems. Their research is particularly relevant to the Yahara watershed, which includes all of Madison's lakes. The project aims to
  better understand and predict the effects of policy decisions and human activities, especially within the context of a changing climate.
