personas:
  professional: Ruti Epling, a certified hazardous‑materials specialist with HAZWOPER certification and GIS mapping expertise, channels her artistic eye and disciplined organization into clear, visually‑rich
    safety protocols while assertively mentoring junior crew members across Kentucky’s remediation projects, and they consistently integrate creative problem‑solving into complex site assessments.
  sports: Ruti Epling blends a love of solitary hikes at Natural Bridge State Resort Park and home yoga practice with spirited support for the Kentucky Wildcats basketball team, occasional participation
    in the Louisville Road Runners club’s weekend trail runs, and a fondness for watching the Louisville Bats minor‑league baseball games during the summer, and they relish the occasional post‑run coffee
    with fellow runners.
  arts: Ruti Epling spends evenings capturing the atmospheric light of Thomas Cole’s landscapes in acrylic and watercolor, draws inspiration from contemporary installation artist Refik Anadol during local
    museum visits, devours speculative fiction by N.K. Jemisin, and unwinds with the ethereal folk sounds of Bon Iver, while they often journal visual ideas in a sketchbook tucked beside their yoga mat.
  travel: Ruti Epling prefers meticulously planned, low‑key escapes that marry artistic inspiration with nature, such as weekend trips to Taos, New Mexico’s art colony, solo hikes through the Great Smoky
    Mountains, and dreaming of a future retreat in Iceland’s volcanic landscapes to sketch aurora‑lit horizons, and they usually draft detailed itineraries on a spreadsheet before each departure.
  culinary: Ruti Epling, an adept home chef, favors farm‑to‑table meals built around heirloom tomatoes, fresh basil, and locally sourced free‑range eggs, routinely preparing rustic ratatouille and hearty
    Kentucky bourbon‑glazed chicken, while they occasionally splurge on sushi rolls featuring uni and toro during rare dining‑out evenings.
  core: Ruti Epling balances a high‑risk hazardous‑materials safety career with a quiet passion for painting, often burning the midnight oil after diving into speculative fiction, and they habitually reorganize
    their toolbox before every field deployment, a ritual that both soothes and delays the start of work.
background:
  cultural: Ruti grew up in a small town in central Kentucky, rooted in a white, Appalachian‑influenced family that values self‑reliance, community, and a strong work ethic. Raised in a Baptist household,
    she was taught the importance of service, modesty, and community gatherings. The region’s rich folk music, storytelling traditions, and county fairs shaped her appreciation for narrative and the arts.
    While she identifies with mainstream American culture, she retains a connection to local customs such as bluegrass music, outdoor recreation, and regional culinary traditions. Her associate’s degree
    from a community college reflects the accessible educational pathways common in her area. This blend of rural humility, openness to new ideas, and respect for environmental stewardship informs both
    her personal worldview and professional approach.
attributes:
  skills: '["Hazardous materials identification and classification", "HAZWOPER certification and compliance", "Use of personal protective equipment (PPE) and decontamination procedures", "Operation of specialized
    extraction and containment equipment", "Environmental monitoring (air, soil, water)", "EPA and Kentucky state hazardous waste regulations knowledge", "Site assessment and risk analysis", "Safety protocol
    development and implementation", "Training and mentoring junior crew members", "Technical documentation and reporting", "GIS mapping and digital recordkeeping", "Problem‑solving under field conditions",
    "Physical stamina and manual dexterity", "Artistic visualization for reports"]'
  hobbies: '["Landscape painting (acrylic and watercolor)", "Visiting art museums and attending artist talks", "Reading science‑fiction and speculative fiction", "Hiking and birdwatching in local parks",
    "Gardening (heirloom vegetables)", "Home yoga practice", "Participating in a small book club", "Volunteering for safety workshops at high schools"]'
  career_goals: Ruti aims to advance to a senior safety manager role overseeing multiple hazardous‑removal projects across Kentucky, eventually leading a regional compliance team. She plans to earn the
    Certified Industrial Hygienist (CIH) credential and complete a bachelor’s degree in environmental health to deepen her technical expertise. A long‑term ambition is to launch a nonprofit outreach program
    that educates small businesses and schools about hazardous‑waste safety, while also contributing to state policy development for stronger protective standards. Ruti envisions transitioning into consultancy
    for complex remediation projects, where she can blend her technical knowledge with a passion for teaching. Additionally, she hopes to mentor women entering the trades by establishing a local mentorship
    network for under‑represented workers in hazardous‑material handling.
