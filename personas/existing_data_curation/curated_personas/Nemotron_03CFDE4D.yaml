personas:
  professional: Kaven Lozada is a budding robotics hobbyist and competitive gamer who translates the fast‑paced tactical decision‑making from Fortnite and Rocket League into meticulous LEGO Technic builds
    and sensor‑wiring projects, while their love of structure helps them follow step‑by‑step instructions even as they occasionally procrastinate on school chores.
  sports: Kaven Lozada spends afternoons shooting hoops at the local park and joining the East Florida Youth Basketball League, follows the Jacksonville Jaguars in the fall and the Jacksonville Jumbo Shrimp
    during baseball season, and they keep fit by biking county trails, balancing competitive solo practice with team pick‑up games.
  arts: Kaven Lozada enjoys dancing to reggaeton hits by Bad Bunny and J Balvin, salsa classics from Marc Anthony, and Southern pop anthems by Luke Bryan, often practicing choreography at family gatherings
    while also collecting LEGO Technic designs as a creative outlet, and they sometimes remix the beats on their phone for fun.
  travel: Kaven Lozada has visited Disney World in Orlando and spent a weekend fishing on the St. John River, dreams of exploring the historic streets of Mexico City and the beaches of San Juan, and they
    prefer short, budget‑friendly trips planned on the fly rather than long‑term itineraries.
  culinary: Kaven Lozada loves helping their mother prepare tacos with carne asada, fresh cilantro and lime, hearty arroz con pollo flavored with saffron, and crispy empanadas stuffed with cheese, often
    perfecting homemade guacamole with ripe avocados, jalapeños, and red onion, though they admit to over‑seasoning their own snack bowls.
  core: Kaven Lozada is a competitive teen gamer and budding builder who blends disciplined project steps with a laid‑back approach to chores, loves spicy family meals, and occasionally forgets to tidy
    up their gaming area.
background:
  cultural: 'Kaven was raised in a bilingual Hispanic household in Macclenny, Florida. His parents, who emigrated from Mexico and Puerto Rico, keep strong Latino traditions alive—celebrating holidays like
    Día de los Muertos, cooking home‑cooked meals such as tacos, arroz con pollo, and empanadas, and playing Latin music at family gatherings. At the same time, the family embraces Southern Florida customs:
    church attendance, community barbecues, and love for football and fishing. Spanish is spoken at home, giving him fluency alongside his English schooling, and this bicultural upbringing shapes his language
    skills, food preferences, and social values.'
attributes:
  skills: '["Computer troubleshooting", "Basic programming (Scratch/Python)", "Bilingual communication (Spanish/English)", "Robotics and mechanical project assembly", "Bike and small engine maintenance",
    "Strategic video gaming"]'
  hobbies: '["Competitive video gaming (Fortnite, Rocket League)", "Basketball (pick‑up and practice)", "Bike riding and maintenance", "Fishing at the Santa Fe River", "Building LEGO Technic sets", "Listening
    to reggaeton, salsa, and Southern pop", "Cooking traditional Latin dishes with family", "Robotics club tinkering"]'
  career_goals: Kaven aspires to turn his love for building and hands‑on work into a career. In the medium term, he plans to earn a certification in automotive or small‑engine repair and eventually run
    a weekend repair service for neighbors, giving him both income and practical experience. Long‑term, he hopes to study mechanical or civil engineering, where he can design structures and machines that
    solve real‑world problems. Parallel to that, his competitive drive fuels an ambition to become a professional esports player or gaming content creator after high school, using his strategic gaming skills
    to earn sponsorships. He also aims to make the varsity basketball team in high school, combining his athletic drive with teamwork experience.
