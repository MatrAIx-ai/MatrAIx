persona_description: A livestock breeder who specializes in the domestication and breeding of mithan bulls and siri cows, particularly in the eastern section of Bhutan. They are knowledgeable about the
  breeding and management of these animals and have a deep understanding of their characteristics, including their high milk production, adaptability to difficult terrain, and ability to maintain themselves
  in small herds. They are also interested in the genetic relationship of mithans to other breeds and the need for research and conservation efforts to better characterize and define their productivity.
