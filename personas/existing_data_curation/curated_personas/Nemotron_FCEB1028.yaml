  hobbies: '[''Watercolor painting'', ''Landscape hiking'', ''Birdwatching'', ''Gardening'', ''Creative writing (poetry)'', ''Attending theater and concerts'', ''Cooking with seasonal produce'', ''Yoga'',
    ''Volunteering at community center'', ''Participating in book clubs'']'
  career_goals: Although retired from formal employment, Chelsey aims to deepen her impact on the Berkshire cultural scene. She hopes to become the coordinator of an intergenerational arts program at the
    local community center, curate an annual art and craft festival that showcases regional talent, and mentor younger artists and volunteers. She also dreams of publishing a collection of poetry and nature-inspired
    sketches, and she plans to complete a mindfulness certification to better manage her stress and share coping strategies with peers. Ultimately, she seeks to leave a lasting, collaborative legacy that
    enriches community life in Great Barrington.
