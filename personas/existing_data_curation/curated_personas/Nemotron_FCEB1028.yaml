personas:
  professional: Chelsey Savage, a retired community organizer turned intergenerational arts program champion, they leverage their meticulous event‑planning expertise, watercolor artistry, and knack for
    inclusive collaboration to design vibrant festivals and mentorship workshops that enrich Great Barrington’s cultural fabric.
  sports: Chelsey Savage, an avid hiker and birdwatcher, they belong to the Berkshire Trailblazers walking club, tackle the Mount Greylock loop each spring, cheer on the Boston Red Sox, and volunteer as
    a line‑usher for the Springfield Soccer Club’s weekend matches.
  arts: Chelsey Savage, a dedicated watercolorist and mixed‑media collage creator, they draw inspiration from Claude Monet’s hazy lily ponds and Georgia O’Keeffe’s bold desert hues, frequent the Berkshire
    Museum’s rotating exhibitions, and regularly perform poetry readings of Mary Oliver and Rumi at the local theater’s open‑mic nights.
  travel: Chelsey Savage, a meticulous road‑trip planner, they have explored the historic charm of Newport, Rhode Island, driven the scenic Blue Ridge Parkway in autumn, dream of wandering Tuscany’s vineyards
    and medieval towns, and balance their wanderlust with limited breaks between book‑club commitments.
  culinary: Chelsey Savage, a seasonal cook who relishes heirloom tomatoes, fresh basil, and roasted root vegetables, they often prepare apple‑cider glazed pork shoulder and preserve strawberry‑rhubarb
    jam, and experiment with fermented kimchi using locally sourced napa cabbage.
  core: Chelsey Savage, a methodical yet worry‑prone retiree, they blend their love of nature, art, and community service into a routine of hiking, painting, organizing festivals, and mindfulness practice—though
    they sometimes overcommit and splurge on pricey pigments.
background:
  cultural: Chelsey comes from a multi‑generational New England family of English and Irish descent that has lived in the Berkshire region for several generations. Raised in Great Barrington, she absorbed
    the area's blend of historic New England values—self‑reliance, civic duty, and respect for the natural environment—while being immersed in a vibrant local arts community. Her upbringing emphasized community
    participation, appreciation for the outdoors, and a love of the region's cultural institutions such as the local library, museums, and seasonal festivals. This background informs her commitment to preserving
    the town's heritage and fostering creative expression among neighbors.
