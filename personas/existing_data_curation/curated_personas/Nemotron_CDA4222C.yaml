personas:
  professional: Adrian Jackson, a 36‑year‑old personal care assistant in South Florida, blends meticulous care planning with a curiosity for emerging health‑tech, delivering culturally attuned support to
    seniors while they leverage conversational Spanish to bridge communication gaps and balance practical routine with innovative solutions.
  sports: Adrian Jackson enjoys sunrise jogs along Miami Beach, participates in the Miami Beach Running Club’s weekly 5‑k sessions, follows the Miami Heat and Inter Miami CF passionately, and they occasionally
    join a weekend beach volleyball league, balancing individual endurance with occasional team play.
  arts: Adrian Jackson immerses themselves in classic jazz (John Coltrane), soul (Marvin Gaye), and reggae (Bob Marley), attends local Caribbean festivals for live steel‑drum performances, collects limited‑edition
    prints by Caribbean painter Wifredo Lam, and they host quiet board‑game evenings that double as opportunities to showcase their growing appreciation for storytelling through game design.
  travel: Adrian Jackson favors a mix of purposeful and restorative travel, planning low‑cost trips to nearby Caribbean islands like the Bahamas for cultural immersion, taking weekend road trips to New
    Orleans to soak in jazz heritage, and they dream of a solo pilgrimage to Spain’s Andalusian coast once the boutique home‑health agency is established.
  culinary: Adrian Jackson enjoys cooking Afro‑Caribbean dishes such as jerk chicken with scotch bonnet peppers, plantain mofongo, and saltfish ackee, skillfully blends spices like allspice and thyme, and
    they often experiment with fresh catch from the Miami fish market to create vibrant, soulful meals for themselves and visiting friends.
  core: Adrian Jackson is a calm, curiosity‑driven caregiver who balances meticulous organization with flexible creativity, quietly pursues professional advancement, and they nurture a soulful life through
    sunrise jogs, jazz playlists, and Afro‑Caribbean cooking, all while occasionally indulging in late‑night board‑game marathons.
background:
  cultural: Adrian is a Black American raised in South Florida, with family roots that trace back to the Southern United States and the Caribbean. He celebrates cultural traditions such as Juneteenth, Caribbean
    festivals, and gospel music gatherings. Growing up in a multilingual neighborhood, he became proficient in conversational Spanish, which enhances his ability to serve both Black and Latino clients.
    His cultural heritage instills a strong sense of community responsibility and informs his commitment to delivering compassionate, culturally aware personal care.
attributes:
  skills: '[''personal hygiene assistance'', ''mobility and transfer techniques'', ''vital signs monitoring'', ''medication reminder management'', ''electronic health record documentation'', ''first aid'',
    ''CPR certification'', ''infection control'', ''bilingual Spanish communication'', ''time management'', ''conflict resolution'', ''caregiver technology adoption'']'
  hobbies: '[''reading health‑science literature'', ''Afro‑Caribbean cooking'', ''early‑morning beach jogging'', ''listening to jazz, soul, reggae'', ''mindfulness meditation'', ''small‑group board game
    nights'', ''community garden volunteering'', ''mentoring youth'']'
  career_goals: Adrian aims to earn his Certified Nursing Assistant (CNA) credential and complete a GED, paving the way for an associate degree in nursing or health services administration. He aspires to
    move into a supervisory care‑coordinator role, where he can design care plans that reflect cultural competence for Black and Hispanic seniors. Long‑term, he dreams of launching a boutique home‑health
    agency that integrates holistic wellness practices and mentors newly hired aides, thereby improving service quality and community health equity.
