  hobbies: '[''Gardening'', ''Cooking Honduran cuisine'', ''Church volunteer work'', ''Walking in local parks'', ''Watching telenovelas'', ''Bingo nights'', ''Reading romance novels'', ''Crocheting'', ''Family
