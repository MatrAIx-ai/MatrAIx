personas:
  professional: Cynthia Alvarado, a seasoned retail cashier with three decades of point-of-sale expertise, leverages their bilingual fluency and calm conflict-resolution style to mentor new staff while
    preserving meticulous cash accuracy within a structured yet adaptable checkout environment.
  sports: Cynthia Alvarado enjoys leisurely strolls through Lake Eola Park, follows the Orlando Magic for basketball, cheers for the Tampa Bay Buccaneers during football season, and participates in a senior-center
    bowling league, balancing gentle activity with community sports enthusiasm.
  arts: Cynthia Alvarado spends evenings immersed in telenovelas starring Thalía, devours romance novels by Nora Roberts, joins the church choir to sing hymns with fellow congregants, and crochets blankets
    inspired by folk motifs, weaving popular media and handcrafted art into their cultural expression.
  travel: Cynthia Alvarado favors short, well-planned getaways such as a historic tour of St. Augustine's cobblestone streets and an annual family trip to Costa Rica's cloud forests, balancing travel excitement
    with budgeting constraints and church volunteer obligations.
  culinary: Cynthia Alvarado delights in preparing traditional dishes like baleadas, sopa de caracol, and pastelitos, seasoning them with home-grown tomatoes, chilies, and cilantro, often serving them alongside
    fresh corn tortillas and avocado salsa for family gatherings.
  core: Cynthia Alvarado balances a meticulous cash-handling career with a garden-to-table lifestyle, a nightly habit of telenovela marathons, and a tendency to forget to water herbs when a new bingo night
    beckons.
background:
  cultural: Cynthia’s identity is rooted in her Honduran heritage, shaped by the values of family cohesion, respect for elders, and a strong Catholic faith. She grew up celebrating traditional holidays
    such as Semana Santa, Día de la Madre, and the Feria Juniana with music, food, and community dances, preserving the rhythms of punta and balboa in her household. After moving to Central Florida, she
    integrated into the vibrant Hispanic enclave of Orlando, where Spanish remains the language of the home and local church. Her bicultural experience blends the warmth of Honduran customs—like sharing
    meals and storytelling—with the practical, goal‑oriented mindset of her American environment, influencing her everyday interactions and her desire to nurture both her family and the broader community.
