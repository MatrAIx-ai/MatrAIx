  career_goals: Cynthia aims to transition into a part‑time senior cashier or trainer role that allows her to mentor newer staff while reducing the physical demands of full‑time work. She hopes to earn
    a certification in retail management to qualify for supervisory responsibilities, focusing on creating a supportive work environment that minimizes stress for both employees and customers. Long‑term,
    she plans to secure enough savings to retire comfortably, ensuring financial stability for her family and the ability to spend more time on her hobbies and community volunteering.
