  hobbies: '["Hiking on local trails", "Fishing on Chautauqua Lake", "Home brewing craft beer", "Herb gardening", "Woodworking (custom cutting boards)", "Reading food history", "Food and nature photography",
    "Volunteering at community kitchen", "Playing acoustic guitar"]'
  career_goals: He aims to become a head chef at a boutique farm‑to‑table restaurant within the next three years, and eventually open his own sustainable bistro in Chautauqua County that highlights lake‑caught
    fish, local orchard fruits, and heirloom vegetables. To support this vision, Rafael plans to earn an advanced ServSafe certification and enroll in part‑time culinary courses at the Culinary Institute
    of America. He also hopes to launch a small catering service for community events, publish a cookbook focused on Western New York regional cuisine, and mentor emerging cooks from his hometown.
