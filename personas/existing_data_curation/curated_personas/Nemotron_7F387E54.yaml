personas:
  professional: Rafael Sheehan is a 28‑year‑old line cook turned kitchen manager who channels a curiosity for Western New York’s seasonal bounty into meticulously cost‑controlled, farm‑to‑table menus, while
    methodically training junior staff and balancing creative experimentation with proven classic techniques.
  sports: Rafael Sheehan spends weekends hiking the Allegheny Plateau, fishing on Chautauqua Lake, and cheering for the Buffalo Bills while also playing shortstop for a community softball league and following
    the Rochester Red Wings for a taste of minor‑league baseball.
  arts: Rafael Sheehan nurtures a love for folk music, strumming acoustic guitar around campfires to the tunes of Townes Van Zandt and John Prine, captures sunrise over the lake with a Nikon D5600, and
    draws inspiration from food historian M. F. K. Fisher and photographer Annie Leibovitz.
  travel: Rafael Sheehan enjoys meticulously planned weekend getaways to Letchworth State Park, Niagara Falls, and the Green Mountains of Vermont, while dreaming of a culinary pilgrimage to Tuscany’s vineyards,
    balancing budget constraints with a willingness to splurge on authentic regional meals.
  culinary: Rafael Sheehan excels at crafting pan‑seared walleye with an apple‑cider reduction, heirloom carrot‑and‑beet salads drizzled with goat cheese, and hearty Irish soda bread made with a sourdough
    starter, blending modest home‑brew expertise with a strong command of classic sauté, braise, and pastry techniques.
  core: Rafael Sheehan blends methodical planning with a relentless curiosity for local flavors, channeling that balance into a disciplined career, frugal finances, diligent health habits, and occasional
    late‑night guitar jams that reveal a quiet, self‑aware quirk.
background:
  cultural: Rafael descends from a long line of Irish‑American families who settled in western New York generations ago. Growing up in Sherman, he was surrounded by a tight‑knit farming community that prized
    self‑reliance, seasonal cooking, and communal meals. Family gatherings centered around hearty Sunday dinners featuring locally sourced meats, lake fish, apples, and dairy—a tradition that shaped his
    culinary palate. Though his name reflects a multicultural family influence, his cultural identity aligns with the modest, hardworking values of the upstate New York region, celebrating holidays such
    as Thanksgiving, Fourth of July, and St. Patrick’s Day with a blend of American and Irish customs.
attributes:
  skills: '["Sautéing, braising, grilling, and basic pastry techniques", "Seasonal menu development", "Farm-to-table ingredient sourcing", "Food safety & HACCP compliance", "Inventory management and cost
