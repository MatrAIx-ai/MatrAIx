  career_goals: In the short term, Michaela aims to earn a Lean Six Sigma Green Belt certification and complete her associate degree in industrial technology, positioning herself for a team‑lead or shift‑supervisor
    role within the next two years. She hopes to mentor a small crew, spearhead efficiency projects, and contribute to a safer, more innovative work environment. Long‑term, she envisions moving into plant‑manager
    or production‑manager positions, where she can blend operational expertise with her passion for creative problem‑solving. Concurrently, she plans to finish a bachelor's degree in business administration
    to broaden her strategic perspective and eventually launch a community‑focused art studio that offers workshops for local youth, merging her industrial experience with her artistic interests.
