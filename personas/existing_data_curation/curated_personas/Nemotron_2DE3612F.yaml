personas:
  professional: A budding graphic designer and illustrator, Margaurite Benton applies their methodical planning, self-taught sketching and beginner digital illustration skills, and deep empathy to create
    nature-inspired visual stories while they use structured creative sessions to navigate intense emotions.
  sports: A quiet nature enthusiast, Margaurite Benton spends Saturday mornings strolling the trails of Trail Creek Park, they occasionally join the local River Run running club for light cardio, and they
    cheer for the Indiana State Sycamores basketball team as a modest fan.
  arts: An introspective visual artist, Margaurite Benton immerses themselves in drawing countryside scenes while listening to indie folk icons like Bon Iver and Sufjan Stevens, they share watercolor experiments
    on online art forums, and they frequent local art fairs to connect with fellow creators.
  travel: A careful planner, Margaurite Benton prefers weekend day trips to Indiana state parks such as Shades State Park for sketching sessions, they dream of a spring pilgrimage to the rolling hills of
    Tuscany, and they balance travel ambitions with a modest budget and parental permission requirements.
  culinary: A simple-cook home chef, Margaurite Benton enjoys preparing herb-infused avocado toast, rustic lentil soup with fresh basil from their indoor garden, and they occasionally experiment with a
    DIY pesto sauce, all while they perfect the art of timing through a well-used kitchen timer.
  core: A deeply introspective 17-year-old artist, Margaurite Benton channels anxiety into meticulous nature sketches, savors quiet routines, and they balance thrift-driven ambition with a love for indie
    folk melodies.
background:
  cultural: Margaurite grew up in Terre Haute, Indiana, within a white, Midwestern family that values modesty, community, and self-reliance. The region's blend of small-town traditions—county fairs, local
    library programs, church gatherings—and the nearby university's cultural events have shaped her appreciation for both local folk art and broader artistic movements. Her upbringing in a relatively homogeneous
    environment has fostered a strong sense of place, while her curiosity drives her to seek diverse ideas through online communities and occasional visits to galleries in larger nearby cities.
