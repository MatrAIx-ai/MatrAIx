  career_goals: Margaurite aims to obtain her GED within the next year, then enroll in a community college program focused on graphic design or illustration. She aspires to build a freelance illustration
    portfolio that blends her love for nature and introspective storytelling, and eventually secure a position with a local publishing house or art studio. In the longer term, she hopes to combine her artistic
    talents with her empathy by training as an art therapist or youth arts coordinator, helping others manage emotional challenges through creative expression. She also seeks personal stability, a supportive
    network, and strategies to manage her anxiety.
