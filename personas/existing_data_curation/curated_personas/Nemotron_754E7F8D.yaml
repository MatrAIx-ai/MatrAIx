  hobbies: '[''Japanese‑style garden care'', ''Gayageum practice'', ''Reading classic Korean poetry and Western philosophy'', ''Hiking in the Bay Area (Mount Diablo)'', ''Vintage radio kit building'', ''Cooking
    Korean dishes'', ''Technology tutoring for seniors'', ''Nature photography'']'
  career_goals: Kyunghoon plans to transition from day‑to‑day design work to a senior advisory role where he can shape sustainability initiatives in manufacturing and guide the conversion of legacy plants
    to hybrid solar‑plus‑grid systems. He aims to develop best‑practice guides for resilient power design that blend technical rigor with human‑centered considerations. A personal ambition is to establish
    a scholarship for Korean‑American students pursuing STEM fields and to serve as an adjunct professor at a local community college teaching engineering ethics and technical communication. He also hopes
    to author a concrete guidebook that integrates his engineering expertise with his humanities background, leaving a lasting legacy for both his profession and his community.
