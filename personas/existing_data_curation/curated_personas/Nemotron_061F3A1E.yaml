  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading contemporary fiction and poetry'', ''Yoga and mindfulness meditation'', ''Nature walks and hiking'', ''Gardening'',
    ''Cooking experimental cuisines'', ''Knitting and quilting'', ''Participating in book clubs'', ''Volunteering at senior center art workshops'']'
  career_goals: Donna aspires to transition into a nurse educator role while spearheading a pilot program that embeds visual‑arts therapy into recovery pathways for older adults. She aims to attain certification
    in Nursing Informatics to further bridge technology and patient‑centered care, and to lead a hospital innovation team that designs flexible, low‑stress work models for staff. Long‑term, she hopes to
    teach part‑time at a local nursing college, develop community workshops that combine health education with creative expression, and achieve a sustainable balance between her professional ambitions and
    personal well‑being.
