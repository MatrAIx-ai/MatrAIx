  hobbies: '[''Drawing and comic illustration'', ''Visiting museums and science centers'', ''Playing soccer'', ''Strategic board games (e.g., Settlers of Catan Junior)'', ''LEGO Boost robotics building'',
    ''Scratch programming projects'', ''Indian classical dance class (Bharatanatyam basics)'', ''Helping with family cooking during festivals'', ''Puzzle solving'', ''Mindfulness breathing exercises'']'
  career_goals: Nabil dreams of one day designing the robots that explore other planets or creating interactive video games that teach kids about art and science. He hopes to combine his love for art, storytelling,
    and engineering by becoming a multidisciplinary creator—perhaps a future robotics engineer who also illustrates the journeys of his inventions. He is also drawn to helping peers who feel anxious about
    schoolwork, so he imagines volunteering as a “buddy” in later years, using his organized, compassionate nature to mentor younger students.
