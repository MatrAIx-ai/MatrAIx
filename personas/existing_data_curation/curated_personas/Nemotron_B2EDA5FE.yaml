personas:
  professional: An aspiring young comic artist and budding robotics hobbyist, Nabil Ramaswamy channels their curiosity and methodical planning into drawing vivid superhero panels while simultaneously programming
    LEGO Boost creations, balancing creative imagination with disciplined project timelines.
  sports: Nabil Ramaswamy proudly plays forward for the Greenfield Youth Soccer Club U10 team, drills after school at the local park, and cheers for the River City Raptors baseball team, while also participating
    in weekend dance classes to improve agility and coordination.
  arts: An enthusiastic comic‑style illustrator, Nabil Ramaswamy draws inspiration from creators like Stan Lee, Jim Lee, and Hayao Miyazaki, frequently visits the downtown museum to study illustrated exhibits,
    and enjoys humming classic Disney soundtracks while sketching.
  travel: Nabil Ramaswamy loves weekend family trips to the Capital City Science Museum, annual outings to the coastal dunes of Seaview State Park, and dreams of exploring the futuristic exhibits at Tokyo's
    Miraikan, blending a passion for hands‑on learning with excitement for new environments.
  culinary: When it comes to cooking, Nabil Ramaswamy enjoys helping prepare festive spiced lentil fritters and sweet rice pudding during holidays, experimenting with bright turmeric and cardamom flavors
    while also mastering the art of drawing food illustrations for their comic strips.
  core: Nabil Ramaswamy is a curious, organized nine‑year‑old who blends comic art, robot building, and soccer with a habit of worrying about the little things and a heart that beats for vibrant stories
    and community play.
background:
  cultural: Nabil is a second‑generation South Asian American of Indian descent, growing up in a bilingual household where Tamil (or Hindi) and English are spoken. His family celebrates Diwali, Holi, and
    Navratri with lights, sweets, and cultural performances, and they attend a local Hindu temple that offers youth programs. The household places a high value on education and respect for elders, while
    also encouraging curiosity and independent thinking. Living in Naperville, IL, Nabil experiences a blend of Indian traditions—such as listening to Bollywood music and playing cricket with neighborhood
    friends—and Midwestern American life, like school field trips to the DuPage Children’s Museum and community sports leagues.
