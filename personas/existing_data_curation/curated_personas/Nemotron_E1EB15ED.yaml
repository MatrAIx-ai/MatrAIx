  hobbies: '[''Mixed‑media painting'', ''Experimental photography'', ''Reading speculative fiction'', ''Exploring contemporary art galleries'', ''Arduino/Raspberry Pi tinkering'', ''Tech meet‑ups'', ''Yoga'',
    ''Hiking'', ''Cooking fusion recipes'', ''Board game strategy nights'']'
  career_goals: She aims to leverage her technical acumen and retail insights to transition into a product management or e‑commerce analytics role within a forward‑thinking retail brand. Over the next five
    years she plans to lead cross‑functional teams that design data‑driven merchandising strategies, launch innovative digital shopping experiences, and eventually launch her own boutique concept that merges
    technology, art, and sustainable fashion. Her competitive drive pushes her to obtain certifications in UX design and data science to accelerate this trajectory.
