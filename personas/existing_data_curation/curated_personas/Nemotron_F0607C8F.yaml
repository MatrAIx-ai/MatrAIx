    BI)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''Photography (urban and nature)'', ''Attending live music and theater performances'', ''Practicing yoga and mindfulness
    meditation'', ''Hiking in Cook County forest preserves'', ''Exploring diverse cuisines and cooking at home'', ''Reading contemporary fiction and science non-fiction'', ''Listening to podcasts on creativity
    and technology'', ''Volunteering for community arts workshops'']'
  career_goals: She aims to transition into a senior leadership role—such as Director of Marketing or VP of Brand Strategy—where she can shape data‑informed creative direction for larger brands. Ruth is
    passionate about integrating emerging technologies like AI‑driven content personalization into campaigns while maintaining an ethical, inclusive approach. She also hopes to launch a mentorship program
    for women in advertising and eventually start a boutique agency that blends art, technology, and socially responsible storytelling, all while maintaining a healthier work‑life balance.
