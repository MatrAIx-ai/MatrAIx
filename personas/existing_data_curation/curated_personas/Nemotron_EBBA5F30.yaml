personas:
  professional: Randi Salisbury, a 33-year-old seasoned machine operator in food processing, blends practical mechanical expertise with a curious drive to optimize baking and drying equipment, and they
    lead teams with cooperative yet assertive confidence while planning for a supervisory role and a future Certified Food Safety Professional credential.
  sports: Randi Salisbury enjoys solitary hikes on the Maumee Valley trails and occasional weekend runs with the local 'Valley Runners' club, they cheer for the Cleveland Browns and the Columbus Blue Jackets,
    and they keep a modest membership at a community gym for strength work.
  arts: Randi Salisbury finds quiet inspiration in historical fiction by Hilary Mantel and nature documentaries narrated by David Attenborough, they gravitate toward folk musicians like Gillian Welch, and
    they occasionally attend a local independent theater showcasing plays by emerging playwrights.
  travel: Randi Salisbury prefers flexible, solo or small-group trips that blend culinary discovery with scenic relaxation, they have explored the Amish farms of Lancaster, the Great Lakes shoreline of
    Michigan's Upper Peninsula, and they dream of a summer bakery-focused study tour in Provence, France.
  culinary: Randi Salisbury is a hands-on sourdough enthusiast who experiments with rye starter, hydrates dough to 78% for a rustic boule, incorporates heirloom tomatoes and fresh herbs from their garden
    into focaccia, and they love cooking heritage chicken in a slow-roasted butter-herb glaze.
  core: Randi Salisbury is a curious yet practical 33-year-old who balances solitary baking experiments with a laid-back approach to money, health, and life, often forgetting schedules but never missing
    a chance to photograph a sunrise over a fresh loaf.
background:
  cultural: Randi grew up in the rural Midwest, part of a white, working‑class community that values hard work, modesty, and close‑knit family ties. Her upbringing in Fayette, Ohio, exposed her to a blend
    of agricultural traditions and small‑town industrial life, fostering a pragmatic outlook and a respect for local customs. She celebrates regional holidays with simple, home‑cooked meals and maintains
    strong connections to church and community events, though she prefers intimate gatherings over large celebrations. This cultural setting reinforces her appreciation for practical skills, self‑reliance,
    and the steady rhythm of Midwestern life.
attributes:
  skills: '[''Industrial food equipment operation'', ''Preventive maintenance and minor mechanical repairs'', ''Food safety compliance (USDA/FDA)'', ''Process data logging and analysis'', ''Troubleshooting
    of roasting/baking/drying systems'', ''Basic PLC programming'', ''Team coordination and shift supervision'']'
  hobbies: '[''Artisan bread baking'', ''Home vegetable gardening'', ''Heritage chicken keeping'', ''Reading historical fiction'', ''Watching nature documentaries'', ''Small‑group book club participation'',
    ''Hiking and landscape photography'']'
  career_goals: Randi aims to advance to a supervisory role on the plant floor, where she can lead a small team of operators and drive process‑improvement projects. She plans to obtain a Certified Food
    Safety Professional (CFSP) credential and eventually enroll in a bachelor’s program in Food Science to deepen her technical expertise. In the longer term, Randi dreams of opening a boutique bakery that
    blends traditional Midwestern recipes with innovative baking techniques she discovers through her industry work, allowing her to merge her professional skills with her personal passion for cooking.
