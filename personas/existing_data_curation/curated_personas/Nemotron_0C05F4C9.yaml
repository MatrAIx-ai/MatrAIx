personas:
  professional: Ariane Glenn is a data‑driven project and program manager at an innovation‑focused tech‑arts firm, leveraging advanced Excel, Python, and SQL to streamline operations while their energetic,
    compassionate personality fuels inclusive team leadership, mentorship, and the strategic pursuit of senior roles like Director of Operations.
  sports: Ariane Glenn fuels their high energy by spinning at Pedal Power Studio, joining Saturday dance cardio at the community center, cheering on the Portland Trail Blazers and Portland Timbers, and
    occasionally running the city’s weekly 5K while they maintain a disciplined schedule that balances cardio with restorative yoga.
  arts: Ariane Glenn immerses themselves in the arts by frequenting the Museum of Contemporary Art’s rotating exhibits—from Ai Weiwei installations to a Van Gogh retrospective—attending live theatre productions
    starring Lin‑Manuel Miranda, enjoying jazz nights featuring the John Coltrane Quartet, and channeling their own creativity through weekend pottery workshops with local ceramicist Maya Parker.
  travel: Ariane Glenn meticulously plans culinary‑focused trips using spreadsheets, having already explored Barcelona’s Gaudí architecture, Kyoto’s tea houses, and New Orleans’ jazz scene, while they dream
    of immersing in Marrakech’s spice markets and Florence’s Renaissance art, balancing structured itineraries with spontaneous street‑food adventures.
  culinary: Ariane Glenn, an avid home chef, alternates between mastering homemade ramen with pork belly and miso broth, perfecting Spanish paella with saffron‑infused rice, and whipping up Ethiopian injera
    topped with spiced lentils, all while savoring seasonal farmer‑market finds like heirloom tomatoes, fresh basil, and smoked paprika, and they often cap evenings with a glass of natural orange wine.
  core: Ariane Glenn blends analytical precision with artistic flair, juggling data dashboards and paintbrushes, thriving on group energy yet habitually over‑booking their calendar, and they’re as likely
    to troubleshoot a Python script as to lose themselves in a midnight pottery glaze session.
background:
  cultural: Ariane identifies as Black and grew up in a multicultural environment that celebrated African-American heritage and broader diaspora traditions. She maintains strong ties to her community in
    Hunterdon County, participating in local cultural festivals, jazz and R&B events, and historical commemorations. Her background informs her worldview, fostering a deep appreciation for storytelling,
    music, and visual arts rooted in Black culture. This cultural lens shapes her professional ethos, driving her commitment to mentorship, diversity, and creating inclusive spaces both within her organization
    and the broader community.
