  hobbies: '[''Painting'', ''Sketching'', ''Mixed media art'', ''Creative writing'', ''Reading literary fiction'', ''Poetry'', ''Community theater (set design, script reading)'', ''Hiking'', ''Fishing'',
    ''Experimental cooking'', ''Art gallery visits'', ''Philosophy podcasts'']'
  career_goals: Andrew aims to deepen his impact on secondary education by moving into curriculum leadership and eventually becoming an instructional coordinator. He hopes to develop a school‑wide STEAM
    program that integrates visual arts and philosophy into science and math classes. Over the next five years he plans to complete a master’s degree in Educational Technology, publish a guide on fostering
    imagination in adolescent learners, and launch an after‑school creative writing and art club that serves both his students and the broader Jasper community. Long‑term, he envisions consulting for rural
    school districts to help them embed flexible, student‑centered learning models.
