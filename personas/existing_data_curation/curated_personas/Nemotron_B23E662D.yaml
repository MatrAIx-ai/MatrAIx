personas:
  professional: Andrew Tan, a secondary‑school teacher with a flair for interdisciplinary design, crafts STEAM curricula that intertwine literature, visual arts, and philosophy, leveraging digital platforms
    and a relaxed, student‑centered classroom vibe while subtly battling their own scattered planning habit.
  sports: Andrew Tan, an avid hiker of the Appalachian foothills and occasional fly‑fisher who roots for the Atlanta Braves and the Charlotte Hornets, participates in a local weekend hiking club and occasionally
    joins a community softball league for light exercise.
  arts: Andrew Tan, a passionate painter and community‑theater set designer, regularly attends gallery openings featuring artists like Kara Walker and Banksy, while they also pen speculative short stories
    inspired by the poetry of Sylvia Plath and the visual narratives of Frida Kahlo.
  travel: Andrew Tan, an adventure‑curious traveler who balances spur‑of‑the‑moment weekend hikes in Asheville with meticulously planned trips to European art hubs like Florence and Paris, often books budget
    hostels but will splurge on a cooking class in Oaxaca, and dreams of exploring the Scottish Highlands for inspiration.
  culinary: Andrew Tan, an intermediate home chef, delights in merging Southern comfort foods such as shrimp‑and‑grits or collard greens with global flavors like Korean gochujang, Thai lemongrass, or Moroccan
    harissa, frequently experimenting with ingredients like smoked paprika and miso to craft dishes like miso‑glazed grits and jambalaya‑style paella.
  core: Andrew Tan is a creatively driven, slightly disorganized teacher‑artist who weaves philosophy into education, chases flavors, hikes trails, and lives by the mantra that curiosity beats rigid schedules.
background:
  cultural: Andrew grew up in Jasper, Alabama, a small-town environment steeped in Southern hospitality, church-centered community life, and a strong appreciation for local traditions such as high-school
    football and county fairs. As a white Southern male, his early cultural influences include a mix of rural values—emphasis on neighborliness, resilience, and modesty—and exposure to Southern literature
    and folk music. His humanities education broadened his worldview, encouraging him to incorporate multicultural perspectives into his teaching while still honoring the close‑knit, cooperative spirit
    of his hometown. His marriage and involvement in community activities reflect a family-oriented, service-driven ethos typical of many residents of Winston County.
attributes:
  skills: '[''Curriculum design'', ''Interdisciplinary instruction'', ''Project‑based learning'', ''Classroom management'', ''Empathy‑based conflict resolution'', ''Digital education tools'', ''Multimedia
