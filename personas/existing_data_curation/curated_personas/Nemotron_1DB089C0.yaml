  career_goals: Scotty aspires to combine his love for the ocean with his practical skill set by pursuing a career in marine environmental science or coastal engineering. He dreams of attending a university
    with a strong marine biology program and eventually working on projects that protect New Jersey’s shoreline ecosystems. In the short term, he plans to earn a certification as an EMT to reinforce his
    commitment to community service and to gain hands‑on experience in emergency response. He also hopes to secure a summer internship with the local environmental non‑profit, where he can apply his organizational
    talents to larger conservation initiatives.
