personas:
  professional: Scotty Fox, a 16‑year‑old aspiring marine environmental scientist, leverages their carpentry knack, beginner‑level Python projects, and youth first‑aid certification to coordinate beach
    clean‑ups and school group work, blending methodical planning with a deep compassion for safeguarding New Jersey’s shoreline, and they consistently seek to apply practical solutions to environmental
    challenges.
  sports: Scotty Fox spends weekends surfing with the Point Pleasant Youth Surf Club, they also play competitive basketball at the community center while rooting for the New York Knicks, and they track
    the New York Yankees and New Jersey Devils as their favorite professional teams, using each sport to stay fit and socially connected.
  arts: Scotty Fox captures sunrise shots inspired by Chris Burkard, they listen to Jack Johnson and The Beach Boys while building miniature wooden boats, and they admire the whimsical illustrations of
    Shaun Tan, finding that art fuels their environmental advocacy and personal creativity.
  travel: Scotty Fox meticulously plans weekend road trips, they have explored the Jersey Shore’s Cape May and Monterey Bay’s kelp forests, and they now dream of snorkeling in the Galápagos Islands, balancing
    budget constraints with a love for coastal adventure.
  culinary: Scotty Fox enjoys preparing fresh fish tacos with lime‑marinated cod, homemade guacamole, and a sprinkling of dill, they can craft a decent clam chowder from scratch, and they favor dining at
    local seafood shacks where the catch of the day includes oysters and mahi‑mahi.
  core: Scotty Fox balances a methodical mind with a surf‑infused soul, they habitually scroll through marine‑science podcasts before bedtime while occasionally forgetting to water their potted succulents,
    a quirky reminder of their busy schedule.
background:
  cultural: Scotty comes from a white, middle‑class American family rooted in New Jersey’s coastal culture. His upbringing in Point Pleasant Beach has immersed him in a community that values beach‑side
    recreation, seasonal tourism, and strong neighborhood ties. Family traditions include summer barbecues, attending local festivals, and participating in community service projects. He has been exposed
    to a blend of suburban and maritime influences, fostering a pragmatic outlook tempered by a deep appreciation for the natural environment. The area’s cultural emphasis on volunteerism and environmental
    stewardship aligns closely with his compassionate and cooperative personality.
attributes:
  skills: '[''organizational planning'', ''time management'', ''basic carpentry'', ''Python programming (beginner)'', ''first aid/CPR'', ''team coordination'', ''public speaking (school presentations)'']'
