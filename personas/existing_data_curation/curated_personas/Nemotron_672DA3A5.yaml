    & Coaching"]'
  hobbies: '["Hiking (Catalina Mountains)", "Birdwatching", "Landscape Photography", "Desert Gardening", "Cooking (Southwestern cuisine)", "Chess", "Reading (History & Science biographies)", "Community
    volunteering (Math tutoring)", "Travel to national parks (Grand Canyon, Saguaro)", "DIY woodworking"]'
  career_goals: Nicholas aims to step into a senior leadership role where he can lead a cross‑functional analytics team and shape strategic decisions for sustainable resource management in the Arizona region.
    He plans to formalize a mentorship program for emerging analysts, publish case studies on the application of OR to desert water conservation, and eventually transition to a part‑time consultancy focused
    on efficiency and sustainability projects before fully retiring. Balancing his professional drive with family life, he seeks to secure a legacy of both technical contributions and a supportive, knowledge‑sharing
    culture within his organization.
