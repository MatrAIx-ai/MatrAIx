  career_goals: Looking ahead, Vanessa aims to transition into a senior advisory role where she can mentor emerging project managers, especially those from immigrant backgrounds. She intends to complete
    the Project Management Professional (PMP) certification to formalize her expertise and expand her consulting services to small Latin‑American businesses seeking to navigate U.S. regulatory landscapes.
    Vanessa also hopes to spearhead a regional cultural‑heritage grant program that blends her project‑management acumen with her passion for the arts, fostering cross‑generational art collaborations in
    South Florida. Ultimately, she envisions leaving a legacy of inclusive, well‑executed community projects that celebrate the rich tapestry of Venezuelan and broader Latino cultures.
