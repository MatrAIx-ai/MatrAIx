personas:
  professional: Vanessa Grosskopf, a veteran project manager with over three decades of experience spanning private‑sector construction and nonprofit cultural initiatives, leverages bilingual fluency, Agile/Scrum
    expertise, and meticulous data‑driven scheduling in Microsoft Project, Asana, and Power BI to deliver on‑time, on‑budget community arts projects while mentoring emerging talent.
  sports: Vanessa Grosskopf, a devoted salsa dancer and gentle yoga practitioner, spends her mornings walking along Miami Beach and supports the Miami Heat and Miami Marlins, while also participating in
    a senior cycling club that meets every Thursday.
  arts: Vanessa Grosskopf, an avid patron of the visual arts, frequents the Pérez Art Museum Miami to study works by contemporary Venezuelan painters such as Carlos Cruz‑Diego and Teresa Margolles, curates
    a personal collection of watercolor landscapes inspired by Caracas and the Florida coast, and devotes evenings to reading novels by Jorge Luis Borges and poetry by Octavio Paz.
  travel: Vanessa Grosskopf, who prefers culturally immersive trips planned with spreadsheets and a modest budget, has visited Caracas, Granada, and the Galápagos Islands, dreams of a slow‑travel itinerary
    through the Andean highlands, and often returns to Miami’s Little Havana for weekend explorations.
  culinary: Vanessa Grosskopf, an enthusiastic home cook, prepares arepas with almojábana cheese, pabellón criollo featuring shredded beef, black beans, sweet plantains, and cheese, and painstakingly rolls
    hallacas each December, savoring the aromas of cumin, annatto, and recaito while occasionally over‑seasoning the sofrito.
  core: Vanessa Grosskopf blends disciplined project leadership, a lifelong love of Latin American arts, and a pragmatic yet adventurous spirit, all while navigating the quirks of aging knees and a penchant
    for over‑seasoned sauces.
background:
  cultural: Born and raised in Venezuela, Vanessa grew up immersed in a culture that values family closeness, vibrant music, and expressive cuisine. She immigrated to the United States during her late thirties,
    settling in Hialeah, where she quickly became part of a supportive diaspora network of Venezuelan expatriates and the broader Latino community. Her daily life reflects a blend of Venezuelan traditions—such
    as celebrating Día de la Independencia with festive meals—and Floridian influences, including participation in local festivals like Carnaval Miami. Bilingualism is central to her identity; she maintains
    fluency in Spanish while comfortably navigating English‑dominant professional settings. Vanessa's cultural experience informs her empathy for immigrant challenges, her dedication to preserving Venezuelan
    heritage in a new environment, and her ability to bridge cultural gaps within the multicultural tapestry of Miami‑Dade County.
