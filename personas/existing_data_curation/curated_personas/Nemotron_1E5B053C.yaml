personas:
  professional: Teresa Hicks is a budding marketing professional whose knack for persuasive communication and event coordination shines in campus tech meetups, where they blend data‑driven insights with
    a pragmatic, competitive edge to orchestrate memorable product launches.
  sports: Teresa Hicks is an avid hiker with the East Bay Trail Hikers, a salsa enthusiast at El Mercado, and a loyal Golden State Warriors fan who also snaps up a membership at the Berkeley Cycling Club
    to stay fit year‑round, and they often log their progress in a Strava app to stay motivated.
  arts: Teresa Hicks immerses themselves in the Bay Area arts scene by attending live shows at the Great American Music Hall featuring indie acts like Phoebe Bridgers, dancing to salsa rhythms, and curating
    board‑game nights where they quote favorite sci‑fi authors such as N.K. Jemisin.
  travel: Teresa Hicks prefers impulsive weekend getaways, having explored Napa’s vineyards, the snowy trails of Lake Tahoe, and a tech‑focused tour of Tokyo, always booking budget‑friendly stays through
    Airbnb while leveraging student discounts on Amtrak, and they keep a travel journal to document each adventure.
  culinary: Teresa Hicks enjoys weekend cooking sessions where they whip up shakshuka with fresh herbs, experiment with ramen broth, and perfect a sourdough starter, pairing each dish with locally roasted
    coffee beans and occasional food‑truck tacos.
  core: Teresa Hicks balances a restless curiosity with a pragmatic streak, turning every social event into a networking opportunity while habitually checking their phone for the latest tech news, even
    if it means missing a few hours of sleep, and they often double‑book commitments in their enthusiasm.
background:
  cultural: Teresa is a white, second‑generation American raised in Fremont, California. Her family’s roots trace back to Irish and Italian ancestry, and she grew up in a middle‑class suburban environment
    that valued education, independence, and community involvement. Living in the culturally diverse Bay Area has exposed her to a wide range of traditions, cuisines, and perspectives, fostering an appreciation
    for multiculturalism while maintaining a core identity grounded in contemporary American values. As a Gen Z individual, she is digitally native, socially conscious, and attuned to progressive ideas,
    often integrating inclusive practices into her personal and professional interactions.
