  career_goals: Teresa aims to finish her bachelor’s degree in Business Administration with a concentration in Marketing or Product Management within the next two years. She plans to secure an entry‑level
    role at a tech startup or a fast‑growing company in the Bay Area where she can combine her event‑coordination background with digital marketing and product launch responsibilities. In the medium term,
    she aspires to lead cross‑functional project teams, drive data‑informed campaigns, and eventually launch her own community‑focused platform that connects young professionals with mentorship and skill‑building
    opportunities. Her ambition is fueled by a desire to be recognized for measurable results while staying grounded in practical, user‑centered solutions.
