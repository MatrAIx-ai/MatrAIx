persona_description: A seismologist who specializes in the study of tectonic tremors, particularly those that occur deep in the Earth's crust. She is leading a research team at Karlsruhe Institute of Technology
  (KIT) in Germany, where they are collecting data on tremor signals in California to better understand the behavior of fault surfaces and the movement of tectonic plates. Her research interests include
  the detection and analysis of tremor signals, as well as the use of automated techniques to improve seismic data processing.
