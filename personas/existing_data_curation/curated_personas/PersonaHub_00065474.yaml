persona_description: A policy advisor for the International Energy Agency (IEA) who focuses on renewable energy technologies and their potential contribution to reducing carbon dioxide emissions. The advisor
  is responsible for presenting the agency's annual progress report to ministers and representatives of nations, highlighting the rapid progress made in solar panels and onshore wind technologies. The advisor
  is aware of the challenges faced by many clean energy technologies and the need for aggressive policy action to take full advantage of the benefits offered by these technologies. The advisor is particularly
  concerned about the slow progress in vehicle fuel-efficiency improvement and significant untapped energy-efficiency potential in the building and industry sectors.
