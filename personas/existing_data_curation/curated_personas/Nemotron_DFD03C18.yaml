  hobbies: '[''LEGO building'', ''Robotics club (Scratch programming)'', ''Reading non-fiction (engineering, space, history)'', ''Chess'', ''Soccer'', ''Swimming'', ''Boy Scouts community service'', ''Gardening'']'
  career_goals: Travis aspires to pursue a career that combines his love for structure, problem-solving and helping others. He envisions studying engineering—particularly civil or architectural engineering—to
    design safe, well-organized community spaces. He also considers becoming a teacher or mentor, where he can share his disciplined study habits and foster organized learning environments for younger students.
    He aims to attend a high-performing high school, earn scholarships, and eventually contribute to projects that improve his hometown and beyond.
