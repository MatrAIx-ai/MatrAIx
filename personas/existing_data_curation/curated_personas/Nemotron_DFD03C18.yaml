personas:
  professional: Travis Suber is a budding robotics enthusiast who leverages meticulous LEGO building skills and Scratch programming to design and test simple autonomous robots, channeling their disciplined,
    structured mindset into every project.
  sports: Travis Suber thrives on structured team sports, playing midfield for the Maplewood Tigers youth soccer league in the fall and training with the Riverbend Aquatics swim club in the summer, and
    they follow professional soccer through Manchester United while modeling their own discipline on the regimented routines of their favorite local swimming cohort.
  arts: Travis Suber expresses a love for structured creativity through building LEGO Architecture models, admiring the mathematically inspired art of M.C. Escher, and frequently re-watching the whimsical
    storytelling of 'The LEGO Movie' while listening to the melodic rhythms of Imagine Dragons and the piano compositions of Yiruma.
  travel: Travis Suber favors meticulously planned family trips, having explored the Smithsonian National Air and Space Museum in Washington, D.C., the interactive exhibits at the Kennedy Space Center in
    Florida, and dreaming of a future visit to the European Space Agency's launch site in French Guiana, always drafting detailed itineraries and packing checklists to ensure every educational stop is covered.
  culinary: Travis Suber enjoys simple yet structured cooking, expertly preparing homemade pepperoni pizza on a pre-made crust with mozzarella, oregano, and fresh basil, savoring spaghetti Bolognese with
    ground beef, tomatoes, and garlic, and taking pride in harvesting crisp carrots and lettuce from their garden to sprinkle into salads.
  core: Travis Suber is a methodical 11-year-old who balances a love for precise LEGO builds and robotics with a disciplined savings habit, a penchant for organized sports, and a quiet curiosity that fuels
    both academic ambition and garden stewardship.
background:
  cultural: Travis was raised in Bellevue, Nebraska, a suburban community in Sarpy County with predominantly Midwestern American values. His family background includes German and Irish ancestry, emphasizing
    hard work, modesty, and community involvement. Local traditions such as church gatherings, neighborhood block parties and volunteer service projects have shaped his outlook. He participates in regional
    events like the county fair and local youth programs, reflecting a cultural environment that values cooperation, stewardship of the land and respect for personal responsibility.
attributes:
