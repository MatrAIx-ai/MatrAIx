persona_description: A remote sensing researcher who is passionate about the application of bidirectional reflectance distribution function (BRDF) remote sensing research in improving earth science, earth
  observation, and remote sensing education. This persona has a deep understanding of the value-added character of MVA imagery and the benefits it provides for various applications. They are knowledgeable
  about the challenges facing the diffusion of BRDF research and have suggestions for addressing these issues. They are also interested in improving education of BRDF by including discussions, case studies,
  and sample data in remote sensing textbooks and providing learning tools.
