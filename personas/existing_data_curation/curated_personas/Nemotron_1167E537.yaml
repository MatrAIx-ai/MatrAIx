personas:
  professional: Luis Santos, a budding five‑year‑old architect of block towers, channels their vivid imagination into designing elaborate LEGO cities, handles the occasional tantrum when structures collapse,
    and they thrive on the freedom to reshape creations on the fly.
  sports: Luis Santos, an energetic junior footballer on the Little Tigers Soccer Club, loves chasing a ball in the spring league, cheers for the hometown basketball team the River Runners, but they often
    forget to tie shoes before practice, leading to comical mishaps.
  arts: Luis Santos, an imaginative mini‑artist who spends afternoons drawing fantastical dinosaurs with Crayola markers, sings along to Disney soundtracks like "Let It Go" and "Circle of Life", and they
    maintain a secret stash of stickers featuring the Pixar character Buzz Lightyear.
  travel: Luis Santos, a curious little traveler who has visited the nearby beach resort of Sunny Shores with family, explored the giant aquarium in the city, dreams of a future trip to Disney World in
    Orlando, and they often pack a favorite plush dinosaur for comfort on road trips.
  culinary: Luis Santos, a budding foodie who relishes peanut butter‑banana sandwiches, chicken nuggets with ketchup, spaghetti topped with hidden veggies, and they can whip up a simple batch of chocolate
    chip cookies with Grandma's help, though they sometimes over‑indulge in sugary cereal.
  core: Luis Santos, a five‑year‑old whirlwind of imagination who builds LEGO kingdoms, saves coins for superhero toys, battles allergies with sticker charts, scores goals for the Little Tigers, creates
    crayon masterpieces, and they dream of Disney adventures, all while worrying about the next snack.
background:
  cultural: Luis grows up in a bilingual Colombian household in Miami. At home, Spanish is spoken, and his family celebrates Colombian traditions such as Carnaval de Barranquilla, cooking arepas, empanadas,
    and listening to vallenato and cumbia music. The vibrant multicultural neighborhood provides exposure to a mix of Latin American and American cultures, fostering his curiosity and flexibility. Community
    gatherings, family meals, and stories of his heritage shape his identity while the diverse city environment encourages open‑mindedness and a love for novelty.
attributes:
  skills: '[''basic reading and phonics'', ''letter and word recognition (Spanish & English)'', ''counting and simple addition'', ''storytelling and imaginative narration'', ''drawing basic shapes and characters'',
    ''bilingual communication'', ''using educational tablet apps'']'
  hobbies: '[''drawing'', ''LEGO building'', ''listening to story podcasts'', ''park exploration'', ''dancing to cumbia and reggaetón'', ''educational tablet games'', ''reading picture books'']'
  career_goals: Guided by his love of art, novelty, and abstract ideas, Luis dreams of becoming a creator—perhaps a picture‑book author, a cartoon illustrator, or an astronaut who can explore new worlds.
    He envisions a future where he can blend imagination with learning, using his artistic talents to inspire other children while staying flexible and free to follow his curiosity.
