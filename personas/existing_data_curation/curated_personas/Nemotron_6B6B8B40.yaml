  hobbies: '[''Reading non‑fiction'', ''Journaling'', ''Coastal walking'', ''Hiking'', ''Cooking Mexican cuisine'', ''Volunteer tutoring'', ''Mindfulness meditation'', ''Yoga'']'
  career_goals: Sergio aims to transition from a senior analyst role to a director-level position overseeing strategic operations, where he can shape organizational efficiency at a higher level. He is considering
    pursuing an MBA part-time to formalize his leadership credentials and expand his network. Long‑term, he envisions launching a boutique consultancy focused on helping small businesses in the San Diego
    region streamline processes and adopt data‑centric strategies, allowing him to blend his analytical expertise with his desire to support his community.
