personas:
  professional: Francis Meservey, a budding mini‑architect in preschool, builds elaborate block structures with meticulous planning, demonstrates natural leadership during collaborative play, and approaches
    each construction challenge with organized, methodical precision while competitively ensuring their tower outshines peers' creations.
  sports: Francis Meservey, an enthusiastic member of the neighborhood preschool soccer club, idolizes Lionel Messi, practices penalty kicks after school, cheers loudly for the Chicago Cubs during weekend
    TV games, and insists on wearing the team’s cap for extra luck, while energetically running laps around the playground with a competitive spark.
  arts: Francis Meservey, a curious little artist, spends afternoons drawing whimsical creatures inspired by Dr. Seuss and Van Gogh’s swirled skies, sings along to The Beatles and Disney movie soundtracks,
    and eagerly attends storytime sessions where they reenact scenes with dramatic flair, finding comfort in the vivid colors and melodies.
  travel: Francis Meservey, an adventurous four‑year‑old, has already explored Disneyland’s Magic Kingdom with family, adored the towering red rocks of Red Rock Canyon on a weekend hike, dreams of seeing
    the Eiffel Tower in Paris, and prefers planned itineraries that include frequent snack breaks and interactive museum stops, while occasionally feeling anxious about travel delays.
  culinary: Francis Meservey, a budding food explorer, loves crispy chicken nuggets dipped in honey‑mustard, adores mac‑and‑cheese topped with crunchy breadcrumbs, enjoys helping whisk pancake batter with
    a tiny wooden spoon, and is fascinated by the bright orange hue of carrots and the sweet scent of fresh strawberries.
  core: Francis Meservey, a meticulous yet worry‑prone four‑year‑old, channels boundless curiosity into building towering block cities, obsessively saves coins in a pink piggy bank, battles eczema with
    nightly rituals, and constantly seeks approval while fiercely competing with peers in every game.
background:
  cultural: Francis comes from a white Midwestern family in Perry, Iowa, a small town in Boone County with strong agricultural roots. His family participates in local community traditions such as the county
    fair, church gatherings, and school events, emphasizing values of hard work, friendliness, and modesty. He has been exposed to rural American culture, including farm life, community service, and a close‑knit
    neighborhood, while also receiving early encouragement in the arts through the local library and community center programs.
