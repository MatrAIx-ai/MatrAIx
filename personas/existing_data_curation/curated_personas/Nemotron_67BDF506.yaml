  career_goals: John aims to finish high school with a solid GPA and then enroll in a technical college to study automotive technology or a related skilled trade. He values a predictable, stable career
    that lets him apply his practical skills, ideally working as a mechanic serving the local farming community or as a maintenance specialist for a regional agribusiness. He also envisions obtaining certifications
    that will allow him to start his own small repair service in his hometown after gaining experience.
