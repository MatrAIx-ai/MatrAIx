personas:
  professional: John Payne, an aspiring robotics enthusiast and budding engineer, channels his love for structured challenges into designing competition robots, leveraging his knack for detailed model building
    and strategic video gaming while balancing school responsibilities.
  sports: John Payne plays on the Saint Anne High School Tigers basketball team, idolizes the Chicago Bulls and follows the Chicago Bears, and spends weekends fishing on the nearby Kankakee River, using
    the quiet time to reset after a fast‑paced school week.
  arts: John Payne enjoys listening to the cinematic scores of John Williams while assembling model kits, and occasionally watches indie animation like Studio Ghibli’s *Princess Mononoke*, finding inspiration
    for his robotic designs.
  travel: John Payne prefers meticulously planned road trips, such as family outings to Starved Rock State Park and a weekend visit to Chicago’s Museum of Science and Industry, while dreaming of a future
    adventure to Seattle’s robotics expos.
  culinary: John Payne favors comfort foods like cheese‑laden pizza, homemade chicken‑fried steak, and buttery corn on the cob, and can whip up a decent grilled cheese with sharp cheddar and crisp bacon
    during late‑night gaming marathons.
  core: John Payne blends methodical engineering curiosity with Midwestern pragmatism, balancing structured robotics projects, disciplined savings, and occasional lazy gaming nights, all while staying rooted
    in community values and a love for calm, outdoor fishing.
background:
  cultural: John was raised in Saint Anne, a small, close‑knit community in Iroquois County, Illinois. His family’s roots reflect typical white Midwestern heritage, with values emphasizing hard work, self‑reliance,
    and community involvement. Rural life, local church gatherings, and school‑centric events shape his worldview. The agricultural surroundings and the town’s tradition of neighborly support influence
    his pragmatic outlook and his desire to contribute to the community through reliable, hands‑on work.
