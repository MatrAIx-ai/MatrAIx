  hobbies: '[''Coaching youth soccer league'', ''Volunteering at local food bank'', ''Organizing neighborhood block parties'', ''Hiking in Mohican State Park'', ''Cooking and experimenting with recipes'',
    ''Playing acoustic guitar'', ''Collecting vintage vinyl records'', ''Gardening (vegetable garden)'', ''Reading self‑development books'']'
  career_goals: Riley aims to become a senior regional event director, overseeing large‑scale conventions that draw attendees from across the Midwest. He plans to earn the Certified Meeting Professional
    (CMP) credential and eventually launch his own boutique event‑planning firm that specializes in community‑focused, inclusive gatherings. A personal ambition is to develop a stress‑resilience training
    program for event staff, reflecting his own experience with worry and pressure, and to mentor emerging planners in his hometown of Dover.
