personas:
  professional: Riley Kelso, a seasoned event coordinator in Ohio, leverages a decade of convention‑planning expertise, meticulous budgeting, vendor negotiation and real‑time problem solving, while their
    blend of curiosity and practicality lets them innovate within strict timelines and their compassionate, outgoing nature turns stressful logistics into collaborative, harmonious experiences for clients
    and staff alike.
  sports: Riley Kelso, an enthusiastic youth soccer coach for the Dover Soccer Club, maintains fitness by leading weekend practices, cheering on the Cleveland Guardians and Cleveland Browns, and joining
    a local adult recreational basketball league, and they balance a competitive spirit with a community‑first mindset.
  arts: Riley Kelso, a vinyl‑collecting acoustic guitarist, fills evenings with renditions of Bob Dylan and Nina Simone classics, curates mixtapes featuring The Beatles and Joni Mitchell, and regularly
    attends performances at the Cleveland Play House, and they let music and theater anchor their social gatherings and personal reflection.
  travel: Riley Kelso favors thoughtfully planned road trips that blend adventure and family time, favoring destinations like the scenic Mohican State Park, historic Mackinac Island, and occasional escapes
    to Lisbon for its fado music scene, while budget constraints keep long‑haul travel occasional, but they eagerly anticipate each overseas adventure.
  culinary: Riley Kelso, an avid home cook, experiments with seasonal recipes such as rosemary‑infused roasted chicken, homemade gnocchi with fresh garden tomatoes, and a signature beet‑and goat‑cheese
    salad, and they skillfully balance a modest culinary skill set with a love for fresh ingredients and occasional indulgent food‑truck tacos.
  core: Riley Kelso channels a high‑energy, community‑driven spirit into event mastery while wrestling with chronic worry, a habit of checking their phone for stress‑relief podcasts, and they indulge in
    a guilty pleasure for late‑night vinyl browsing.
background:
  cultural: Riley grew up in a white, Midwestern family in northeastern Ohio, with ancestral roots in German and Irish communities that settled the region in the late 19th century. Raised in a close‑knit
    small‑town environment, he was steeped in values of hard work, reliability, and neighborly friendliness. Frequent participation in church activities and local civic groups reinforced his sense of service,
    cooperation, and community harmony. This cultural backdrop shapes his pragmatic yet compassionate approach to both his professional event planning career and his personal life.
attributes:
  skills: '[''Event logistics coordination'', ''Budget development and control'', ''Vendor sourcing and negotiation'', ''Risk assessment and crisis management'', ''Client relationship management'', ''Team
