persona_description: A teacher who is passionate about mathematics and has a deep understanding of polynomial functions, particularly their zeros, degrees, and end behavior. They are skilled in using the
  clicker and have experience teaching students how to determine the degree of a polynomial function and write possible equations for a polynomial function given its zeros. They are also proficient in writing
  the equations in factored form and are familiar with the relationship between factors with exponents and the graph. The teacher is dedicated to helping students solidify their understanding of these concepts
  and assess their progress through independent work and clicker questions.
