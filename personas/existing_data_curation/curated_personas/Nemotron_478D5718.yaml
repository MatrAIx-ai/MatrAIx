personas:
  professional: Tina Shalhoub, a budding carpenter with a knack for precise joinery and SketchUp drafting, blends a disciplined, safety‑first mindset with a relaxed attitude toward scheduling, turning their
    love of solitary woodwork into a path toward journeyman certification and a future sustainable furniture studio.
  sports: Tina Shalhoub fuels their love of the outdoors by hiking the Watchung Reservation with the local Watchung Trails Hiking Club, supports the New York Yankees and New Jersey Devils from a solitary
    balcony, and keeps fit through weekend trail runs and occasional yoga sessions at a nearby community center.
  arts: Tina Shalhoub nurtures their creative side by sketching furniture designs inspired by Sam Maloof and Bauhaus icons, listening to folk‑indie artist Bon Iver while reading classic novels like Pride
    and Prejudice, and attending occasional street art festivals that add texture to their visual palette.
  travel: Tina Shalhoub prefers low‑key, self‑planned trips that blend nature and craft, having trekked the Blue Ridge Mountains, explored Copenhagen's sustainable design scene, and dreaming of a solo pilgrimage
    to Kyoto’s ancient carpentry workshops.
  culinary: Tina Shalhoub enjoys farm‑to‑table cooking, mastering a modest repertoire that includes roasting beet and carrot medleys with goat cheese, hand‑kneading sourdough bread infused with rosemary,
    and pairing meals with honey‑glazed carrots harvested from their own garden.
  core: Tina Shalhoub is a quiet‑minded woodworker who balances meticulous craftsmanship with a laid‑back approach to planning, often forgetting to file receipts but never overlooking a grain pattern.
background:
  cultural: Tina comes from a Lebanese‑American family that settled in New Jersey a few generations ago. While identifying as white American, her upbringing incorporated values of craftsmanship, close‑knit
    family ties, and respect for heritage. Her parents emphasized practical skills and education, and she grew up attending a Maronite Catholic church, celebrating traditional holidays such as Christmas
    and Easter with Syrian‑Arabian culinary traditions. This cultural mix nurtured her appreciation for hands‑on work, community service, and a balanced perspective between individuality and collective
    responsibility.
attributes:
  skills: '[''framing'', ''cabinet making'', ''dovetail joinery'', ''mortise-and-tenon joinery'', ''hand tool operation'', ''power tool operation'', ''blueprint reading'', ''basic CAD (SketchUp)'', ''material
    estimation'', ''wood finishing (staining, varnishing)'', ''OSHA safety compliance'']'
  hobbies: '[''sketching furniture designs'', ''reading woodworking journals'', ''building small wooden models'', ''restoring vintage furniture'', ''hiking'', ''nature photography'', ''vegetable gardening'',
    ''reading classic literature'', ''journaling'']'
  career_goals: She aims to become a certified journeyman carpenter within the next three years and eventually open her own small workshop specializing in sustainable, custom‑made furniture. Tina plans
    to complete her associate degree in construction technology while gaining apprenticeship experience, and she hopes to mentor other young women interested in the trade. Long‑term, she envisions expanding
    her business to include limited‑run designs that blend modern aesthetics with traditional craftsmanship, allowing her to work primarily in a quiet, solitary studio environment.
