personas:
  professional: Kathleen Hunsaker, a spirited senior‑center event coordinator, blends her practical knack for organizing bingo nights, craft workshops, and potluck meals with a curious, people‑focused mindset,
    and now channels that energy into launching low‑sodium cooking classes while mentoring volunteers, though she often leaves detailed schedules to the last minute.
  sports: Energetic line‑dancer and avid birdwatcher, Kathleen Hunsaker joins the Sunset Trail Walkers club for gentle hikes, roots for the Miami Dolphins and the Orlando Magic, and occasionally participates
    in low‑impact senior yoga sessions at the community center.
  arts: Kathleen Hunsaker weaves crochet blankets for charity while singing in the church choir, immerses herself in Agatha Christie mysteries, and spends evenings watching classic Hollywood gems such as
    Casablanca and the performances of Audrey Hepburn, often sharing her own quilt‑making tutorials on a modest social‑media page.
  travel: Kathleen Hunsaker dreams of a leisurely road trip along the Overseas Highway to the Florida Keys with her church group, while regularly joining senior‑center outings to the historic streets of
    St. Augustine and the tranquil bird‑watching spots at Everglades National Park, preferring group travel that balances adventure with comfort.
  culinary: Kathleen Hunsaker delights in Southern comfort cooking, perfecting chicken and dumplings, buttery biscuits, peach cobbler, and collard greens seasoned with rosemary and thyme, while adapting
    recipes to low‑sodium versions for senior health and proudly serving her signature pecan pie at family gatherings.
  core: Kathleen Hunsaker is an energetic, crafty, community‑oriented senior whose curiosity fuels practical service, yet anxiety sometimes drives impulsive yarn purchases and a tendency toward disorganization.
background:
  cultural: Kathleen is a white American who grew up in the mid‑mid‑20th‑century Midwest before relocating to Florida in her thirties. Her cultural identity is shaped by traditional American values—celebrating
    holidays such as Thanksgiving, Independence Day, and Christmas—and a strong connection to her local Methodist church community. The Southern culinary traditions she embraces reflect her post‑war upbringing,
    while her love of outdoor activities aligns with the Floridian “snowbird” lifestyle. She maintains a blend of Midwestern practicality and Southern hospitality, both of which inform her community‑focused
    way of life.
