    novels'', ''watching classic films'', ''birdwatching'', ''cooking comfort foods'']'
  career_goals: Although retired, Kathleen aims to deepen her involvement at the senior center by launching a low‑sodium cooking class tailored for older adults and by mentoring newer volunteers. She wishes
    to become more comfortable with a tablet to facilitate video calls with distant relatives and to digitize family photographs for a personal archive. Kathleen also aspires to publish a small cookbook
    of her favorite recipes and to take a short road trip to the Florida Keys with friends from her church group.
