    User 1: I''ve always wanted to visit a dairy farm.

    User 2: You''re welcome to come see mine sometime.

    User 1: I''d love that!

    User 2: Great! I''ll give you my number and you can set it up.

    User 1: Okay, sounds good.

    User 2: So, what else do you like to do for fun?

    User 1: I like to read, go to the movies, and spend time with my friends.

    User 2: That sounds like fun. I like to read and go to the movies too.

    User 1: What are some of your favorite books?

    User 2: I like to read historical fiction and mysteries.

    User 1: I like those too! I''ve been reading a lot of historical fiction lately.

    User 2: Oh, really? What have you been reading?

    User 1: I''ve been reading a book called "The Nightingale" by Kristin Hannah. It''s about two sisters who live in France during World War II.

    User 2: Oh, I''ve heard good things about that book. I''ve been meaning to read it.

    User 1: I highly recommend it!

    User 2: I''ll have to check it out.'
