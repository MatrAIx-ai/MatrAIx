persona_description: A scientist who specializes in the study of human health responses to environmental pollutants, particularly thirdhand smoke. She is currently working on a clinical investigation to
  evaluate the molecular biomarkers associated with early-stage activation of skin diseases caused by dermal exposure to thirdhand smoke. Her research interests include the impact of environmental pollutants
  on human health, the development of regulatory policies dealing with indoor environments contaminated with thirdhand smoke, and the evaluation of the effects of electronic cigarettes on human skin.
