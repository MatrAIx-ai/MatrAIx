persona_description: A scientist studying plant ecology and mycorrhizal symbiosis, particularly focusing on the seasonal changes in fungal abundance in the showy orchid Galearis spectabilis. This person
  is interested in understanding the specificity of mycorrhizal symbiosis between the orchid and its fungus, as well as the potential benefits or drawbacks of this symbiosis. They have experience working
  with DNA sequencing data and have a background in biology with a specialization in conservation biology. Their research interests include studying the structure of finite groups, representation theory
  of groups, and isomorphism problems. They are looking for funding to develop a methodology to determine if the fungus digests the senescing plant tissue.
