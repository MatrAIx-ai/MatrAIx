  career_goals: Michael aims to transition into a senior advisory role where he can shape strategic initiatives that blend operational excellence with creative problem‑solving. Over the next five years
    he plans to earn a Lean Six Sigma Black Belt, lead a company‑wide digital transformation project, and establish a mentorship program for emerging managers. Ultimately he envisions scaling back his day‑to‑day
    responsibilities to work part‑time as a consultant, helping midsized firms improve efficiency while fostering a culture of flexibility and innovation.
