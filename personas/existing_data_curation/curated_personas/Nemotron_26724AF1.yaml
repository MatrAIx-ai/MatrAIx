    communication and service'']'
  hobbies: '[''Basketball'', ''Soccer'', ''Hiking'', ''DIY home improvement'', ''Playing guitar'', ''Community clean‑up volunteering'', ''Nature photography'']'
  career_goals: Ronald aims to advance from a crew member to a supervisory role within the next three years, obtaining certifications such as the Certified Landscape Technician (CLT) and a New York State
    landscaping license. He plans to enroll in an associate program in horticulture to complement his hands‑on experience. In the long term, he aspires to launch his own environmentally sustainable landscaping
    business that focuses on native plantings and water‑wise designs, eventually overseeing a team that serves both residential and commercial clients in Westchester County.
