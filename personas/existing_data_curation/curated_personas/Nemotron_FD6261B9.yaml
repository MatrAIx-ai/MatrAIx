  hobbies: '[''Drawing and sketching'', ''Reading fantasy novels'', ''Soccer'', ''Playing Minecraft and Roblox'', ''Listening to pop and country music'', ''Volunteering at animal shelter'']'
  career_goals: Florence dreams of working closely with animals, aspiring to become a veterinarian, and she plans to attend a high school with an animal‑care program to gain early experience. At the same
    time, her love for art fuels an ambition to study graphic design or digital illustration in college, hoping to blend her scientific interest with creative expression. She aims to graduate high school
    with strong academic and extracurricular credentials, then pursue a degree that allows her to combine animal welfare and visual storytelling, perhaps creating educational content for youth animal programs.
