personas:
  professional: Jorge Restrepo, a retired community organizer and seasoned storyteller, blends their humanities background, bilingual fluency, and hands‑on experience in event coordination to serve as a
    cultural liaison for the Hispanic community in Sarasota County, where they moderate panels, design outreach flyers, and mentor seniors through workshops, all while balancing practical reliability with
    a lively, talkative presence.
  sports: Jorge Restrepo, an avid early‑morning beach walker, joins the Sarasota Sunrise Walking Club, follows the Tampa Bay Buccaneers and Tampa Bay Rays, participates in a local senior softball league
    on weekends, and occasionally volunteers as a photographer for the community’s bird‑watching competitions, reflecting their love of gentle fitness, regional sports culture, and the soothing rhythm of
    sunrise walks.
  arts: Jorge Restrepo, a devoted participant in a Spanish‑language book club and community theater, finds inspiration in the poetry of Pablo Neruda, the magical realism of Gabriel García Márquez, and the
    visual storytelling of Frida Kahlo, while contributing graphic‑design flair to promote cultural events and occasionally narrating plays as a senior voice master, showcasing their vibrant, talkative
    personality.
  travel: Jorge Restrepo balances carefully planned trips with spontaneous wanderings, favoring cultural immersion in historic colonial towns such as Antigua, the vibrant markets of Oaxaca, and Caribbean
    islands, while constraints of a fixed retirement income steer them toward budget‑friendly road trips and weekend bird‑watching excursions to nearby Everglades National Park, reflecting their mix of
    curiosity and practical budgeting.
  culinary: Jorge Restrepo, a skilled home chef, delights neighbors with pepian, tamales, and atol—recipes passed down from their family's homeland—while incorporating fresh herbs from a backyard garden
    like cilantro, oregano, and epazote, and often pairing meals with locally caught grouper or mango‑lime salsa for a vibrant, home‑grown feast, showcasing their love of tradition and spontaneous culinary
    experimentation.
  core: Jorge Restrepo, a socially vibrant 59‑year‑old storyteller, blends meticulous community organizing with spontaneous cultural cooking, sunrise beach walks, and a deeply empathetic yet sometimes anxiety‑driven
    nature that fuels their mission to create a multilingual cultural hub.
background:
  cultural: Jorge was born in the highlands of Guatemala, where his family’s roots trace back to the Maya‑Ladino community of Quetzaltenango. Raised in a household that celebrated Catholic festivals, marimba
    music, and vibrant culinary traditions, he carried these customs with him when he immigrated to the United States in his early thirties. Settling in the Gulf Coast region of Florida, he has blended
    his Guatemalan heritage with local coastal culture, maintaining fluency in Spanish while mastering the nuances of Southern American English. His identity is anchored in strong family ties, communal
    reciprocity, and a deep respect for storytelling as a means of preserving history. He continues to observe Guatemalan holidays such as Día de los Muertos and Semana Santa, invites relatives to share
    meals, and actively mentors younger immigrants, serving as a cultural bridge between his homeland and his adopted community.
