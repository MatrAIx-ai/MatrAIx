  skills: '[''Bilingual communication (Spanish/English)'', ''Cultural storytelling and oral history preservation'', ''Community event planning and facilitation'', ''Public speaking and workshop moderation'',
    ''Mentorship and peer support for older adults'', ''Traditional Guatemalan cooking'', ''Horticulture of tropical and native plants'', ''Basic graphic design for community materials'', ''Literary analysis
    and discussion leadership'', ''Social media engagement for cultural groups'']'
  hobbies: '[''Cooking Guatemalan cuisine'', ''Gardening tropical and native plants'', ''Walking on Nokomis Beach and birdwatching'', ''Photography of nature and cultural events'', ''Reading Latin American
    literature and poetry'', ''Participating in a Spanish‑language book club'', ''Volunteering at senior community centers'', ''Leading storytelling and oral history workshops'', ''Attending and organizing
    cultural festivals'', ''Contributing to community theater as a narrator'']'
  career_goals: Though retired from formal employment, Jorge aims to channel his curiosity and practicality into a lasting community impact. He aspires to become a cultural liaison for the Guatemalan and
    broader Hispanic community in Sarasota County, coordinating festivals, language‑exchange programs, and intergenerational storytelling projects. He plans to author a memoir and a series of reflective
    essays on the immigrant experience, blending his literary training with personal insight. Recognizing his own emotional reactivity, he also seeks certification in community health counseling or art‑therapy
    facilitation, enabling him to advocate for mental‑health resources tailored to senior immigrants. Ultimately, he hopes to establish a grassroots cultural hub that offers workshops, a community garden,
    and a safe space for dialogue, positioning himself as both a leader and a supportive mentor.
