persona_description: A global health researcher who studies the factors influencing infant size and growth, particularly in relation to environmental and socioeconomic factors. This person is interested
  in understanding the impact of genetic differences on infant growth and is looking for evidence to support the idea that extreme size differences are not due to genetic differences but rather to factors
  that disproportionately affect certain ethnic groups, such as poverty, malnutrition, and pollution.
