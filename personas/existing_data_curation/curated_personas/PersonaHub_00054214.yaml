persona_description: A health system professional who is interested in promoting human rights and justice, focusing on intersectionality and the resilience of health systems. They are aware of the importance
  of everyday resilience and the need for a self-regulatory and adaptable healthcare system. They have experience in health policy analysis and are interested in the role of information systems and epidemiological
  monitoring in building health system resilience. They are also familiar with the concept of universal health coverage and the importance of investing in "slow variables" to build a stable foundation for
  health care delivery.
