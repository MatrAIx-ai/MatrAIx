  career_goals: Although retired, Ashley remains goal‑oriented. She aims to establish a sustainable community garden that supplies fresh produce to local seniors and the school lunch program in Isabela.
    She hopes to compile a community book preserving oral histories, family recipes, and folk stories of the San Antonio barrio. Ashley also aspires to lead youth cultural workshops that teach traditional
    dance, music, and crafts, fostering pride in local heritage. Finally, she wishes to travel across Puerto Rico visiting historic sites and undertaking short courses on island ecology, enriching her lifelong
    curiosity with practical experiences.
