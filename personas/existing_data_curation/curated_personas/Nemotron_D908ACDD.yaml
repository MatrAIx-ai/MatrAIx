personas:
  professional: Ashley Shea blends organic gardening expertise, bilingual event planning, and traditional culinary skill to orchestrate neighborhood festivals, senior garden initiatives, and a lively church
    newsletter, while they lead with a relaxed, people‑centric style that values harmony and flexibility.
  sports: Ashley Shea stays active through salsa and plena dance sessions at the local community center, daily sunrise walks along the nearby beach, and occasional friendly beach volleyball games, cheering
    on the Cangrejeros de Santurce baseball team during spring, while they treat dancing as their primary cardio workout and view casual sports as a fun way to maintain social bonds.
  arts: Ashley Shea sings in the church choir, enjoys the bolero sounds of Pablo Milanés, the salsa rhythms of Celia Cruz, and the contemporary folk ballads of Luis Fonsi, reads historical novels by Ken
    Follett and memoirs by Isabel Allende, and leads crochet circles where they often thread patterns inspired by the vibrant paintings of José Campeche.
  travel: Ashley Shea loves weekend trips across the island, having explored Old San Juan’s forts, the El Yunque rainforest, and the historic plaza of Ponce, while they dream of attending a marine ecology
    workshop in Vieques and taking a short course on sustainable agriculture in Cabo Rojo, preferring relaxed itineraries with friends and using senior discounts to keep travel affordable.
  culinary: Ashley Shea excels at preparing classic dishes such as arroz con gandules, pasteles, lechón, and mofongo, seasoning each with homemade sofrito, adobo, and a pinch of achiote, while they experiment
    with new vegetable varieties from their garden, often serving fresh herb‑infused sauces alongside traditional fare, and they take pride in sharing meals at potluck gatherings where friends rave about
    their succulent pork and fragrant rice.
  core: Ashley Shea, a 70‑year‑old garden‑guru and community catalyst, juggles a love for salsa dancing, seed‑packet hoarding, and occasional birthday‑gift forgetfulness, all while they radiate warmth,
    flexibility, and a relentless drive to keep tradition alive.
background:
  cultural: Ashley Shea identifies as a white Puerto Rican of Spanish‑European descent, raised in the coastal barrio of San Antonio in the municipality of Isabela. Her upbringing was steeped in Puerto Rican
    customs, Catholic traditions, and the vibrant communal life of the island. She embraces the blended cultural influences of the United States and the Caribbean, speaking both Spanish and English fluently.
    Family and community ties are central to her identity, and she participates actively in local fiestas patronales, Carnaval celebrations, and intergenerational gatherings that preserve the island’s heritage
    while fostering a sense of belonging.
