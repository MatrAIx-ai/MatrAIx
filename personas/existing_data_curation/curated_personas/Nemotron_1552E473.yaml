personas:
  professional: Sandro Perez, a 1-year-old toddler, enthusiastically explores building blocks and sorts shapes by color and size, revealing an early penchant for systematic problem‑solving that hints at
    a future career in engineering or architecture where they will let their curiosity, practicality, and methodical nature drive meticulous design.
  sports: Sandro Perez, a 1-year-old, does not yet play organized sports but enjoys parent‑guided infant swim classes at the community recreation center and often watches the New York Yankees on TV with
    their caregiver, quietly rooting for the team as they clap their tiny hands at each home run.
  arts: Sandro Perez, a 1-year-old, delights in the gentle folk melodies of Raffi and coos along to Mozart’s "Eine kleine Nachtmusik," while also being captivated by the bright illustrations of Eric Carle’s
    "The Very Hungry Caterpillar," and they often reach out to touch the vivid pictures.
  travel: Sandro Perez, a 1-year-old, has taken short family trips to the local beach in Santa Monica and to Disneyland in Anaheim, and they dream of one day seeing the towering red rocks of the Grand Canyon,
    preferring stroller‑friendly outings that balance adventure with the comfort of familiar routines.
  culinary: Sandro Perez, a 1-year-old, prefers smooth purees of carrots, sweet potatoes, and ripe bananas, shows a particular fondness for avocado mash, and while they cannot cook yet, they enjoy the sensory
    experience of tasting colorful, nutrient‑rich baby foods.
  core: Sandro Perez, a 1-year-old, blends early curiosity with methodical play, worries over minor discomforts, and quietly cultivates habits—like sorting toys and saving coins—that they will carry into
    a thoughtful, organized personality with a hint of perfectionist fussiness.
background:
  cultural: Sandro is raised in a Mexican-American household in Hayward, California. His family maintains bilingual communication, speaking both Spanish and English at home, and celebrates Mexican traditions
    such as Día de los Muertos, quinceañeras, and holiday feasts. These cultural practices shape his early experiences, providing him with a rich tapestry of foods, music, and storytelling that reinforce
    his sense of identity while exposing him to the diverse community of Alameda County.
