personas:
  professional: Jorge Deboyrie is a 19‑year‑old patrol officer in Elizabeth, NJ, whose bilingual fluency, sharp observational skills, and curiosity about forensic tech drive a pragmatic yet competitive
    approach to policing, and they channel this drive into a rapid pursuit of detective promotion and cyber‑crime specialization despite a relaxed attitude toward rigid scheduling.
  sports: Jorge Deboyrie is a 19‑year‑old who spends weekends shooting at the local range, playing pick‑up basketball at the Elizabeth Community Center, and logging long‑distance runs through Union County,
    they cheer for the New York Knicks and New Jersey Devils while treating each workout as a personal competition against their own best times.
  arts: Jorge Deboyrie is a 19‑year‑old who immerses themselves in traditional highland folk music at family gatherings, streams modern Latin pop from artists like Juanes and Shakira, and enjoys the strategic
    storytelling of games like Civilization VI, they find creative release in both cooking and the occasional karaoke night at local festivals.
  travel: Jorge Deboyrie is a 19‑year‑old who prefers spontaneous road trips to nearby New York City museums and occasional visits to their parents' hometown in the South‑American highlands, they dream
    of trekking the Andes while budgeting travel through discount airline apps and using frequent‑flyer points.
  culinary: Jorge Deboyrie is a 19‑year‑old who loves cooking ceviche with fresh lime, cilantro, and ají, perfecting empanadas stuffed with seasoned beef, and experimenting with quinoa‑based salads, they
    occasionally over‑spice dishes when their competitive focus on mastering new recipes overrides patience.
  core: Jorge Deboyrie is a 19‑year‑old bilingual patrol officer whose curiosity, competitive drive, and laid‑back disorganization combine into a pragmatic, skeptical approach to both law enforcement and
    life, they constantly balance flexibility with a relentless pursuit of personal excellence.
background:
  cultural: Jorge is a first‑generation American, born to parents who emigrated from the highlands of Ecuador before settling in Elizabeth, NJ. Growing up in a bilingual household, he speaks Spanish at
    home and English at school, giving him a deep appreciation for both cultures. Family gatherings feature traditional music, folk dances, and foods like ceviche and empanadas. The multicultural environment
    of Elizabeth, with its large Latino population, has shaped his identity, making him fluent in navigating both Ecuadorian traditions and the urban American context. This dual cultural lens informs his
    approach to policing, especially in building trust with the city's Hispanic residents.
