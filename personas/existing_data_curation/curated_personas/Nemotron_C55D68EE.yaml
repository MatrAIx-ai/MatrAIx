  hobbies: '[''shooting range practice'', ''basketball'', ''running'', ''strategy video games'', ''chess'', ''cooking Ecuadorian cuisine'', ''volunteering at cultural festivals'']'
  career_goals: Jorge aims to advance quickly within the Elizabeth Police Department, targeting promotion to detective within the next five years. He is especially interested in joining the cyber‑crime
    unit to combine his curiosity about technology with law‑enforcement work. Long‑term, he envisions earning a bachelor’s degree in criminal justice and eventually becoming a sergeant or field training
    officer, where he can mentor newer recruits and shape department policies. He also hopes to become a liaison officer for the Hispanic community, improving trust and cooperation between residents and
    police while leveraging his competitive drive to earn commendations and recognition.
