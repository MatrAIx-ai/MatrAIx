persona_description: A historian interested in the study of slavery and its abolition, particularly in the context of colonial empires. This person is interested in the experiences of emancipated slaves
  and their descendants across different European empires and is looking for a deeper understanding of the similarities and differences in their life experiences. They are also interested in the broader
  social, economic, and political contexts in which these events occurred and how they impacted the lives of enslaved people.
