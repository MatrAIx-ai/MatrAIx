  career_goals: Phyllis aims to leverage her operational track record to advance to a regional food-service director role within the next five years, overseeing multiple locations across upstate New York.
    She plans to earn the Certified Food-Service Executive (CFSE) credential, spearhead a farm-to-table sustainability initiative that reduces waste by 30%, and eventually open her own boutique café that
    melds her love for humanities with culinary storytelling—featuring literary-themed menus and community events.
