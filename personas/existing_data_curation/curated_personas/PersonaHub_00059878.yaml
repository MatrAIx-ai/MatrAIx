persona_description: A microbiologist who specializes in the study of pathogenic microbes, particularly those that cause human disease. They have a deep understanding of the mechanisms by which these microbes
  invade and damage healthy tissues, as well as their interactions with the human immune system. They are particularly interested in the classification and classification of secondary pathogens, and their
  ability to cause severe infections in the immune-compromised. They have a strong background in immunology and have published extensively on the topic of opportunistic pathogens and their role in causing
  severe infections.
