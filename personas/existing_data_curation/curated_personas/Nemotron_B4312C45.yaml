personas:
  professional: James Bostwick, a 25‑year‑old personal care aide with a talent for weaving visual art into daily routines, blends compassionate caregiving with an improvisational, curiosity‑driven mindset,
    using sketch prompts and resin‑craft projects to engage clients while navigating a loosely structured work schedule.
  sports: James Bostwick, an avid early‑morning hiker with the Sonoran Desert Trail Club, prefers solitary desert treks for fitness and mental clarity, and supports the Arizona Diamondbacks (MLB) and Phoenix
    Suns (NBA) from the comfort of a backyard patio during the off‑season.
  arts: James Bostwick channels an abstract painter’s love for color experiments, drawing inspiration from James Turrell’s light installations, creates digital illustrations with Procreate referencing artists
    like Bee Bee Frog and listens to indie folk icons Bon Iver and experimental pianist Nils Frahm to fuel his nocturnal poetry sessions.
  travel: James Bostwick, a solitary traveler fascinated by desert skies, plans loosely‑structured trips such as sunrise shoots in Joshua Tree, a night‑sky pilgrimage to Iceland’s Aurora Borealis, and weekend
    escapes to Sedona’s red‑rock canyons, favoring flexible itineraries over rigid schedules.
  culinary: James Bostwick, who enjoys modest culinary experiments, frequently prepares quinoa‑black bean bowls with lime‑cilantro dressing, avocado toast with poached eggs, and brews chamomile tea, while
    occasionally incorporating exotic spices like sumac into his resin‑based edible art projects.
  core: James Bostwick, a 25‑year‑old dream‑chasing caregiver‑artist, balances a restless imagination and chronic worry with spontaneous art‑therapy ideas, solitary desert hikes, and an ever‑messy budget
    that still funds occasional creative splurges.
background:
  cultural: James was raised in a middle‑class white family on the outskirts of Phoenix, Arizona. The Sun‑baked Sonoran Desert environment and the multicultural fabric of the Southwest—particularly the
    vibrant Mexican‑American and Native American communities—have shaped his appreciation for outdoor recreation, regional festivals, and a diverse culinary palette. While his household followed mainstream
    American cultural norms, frequent visits to the University of Arizona campus, local farmers markets, and community art events exposed him to a blend of Southwestern regional culture and contemporary
    artistic movements. This background informs his open‑minded yet grounded worldview.
attributes:
  skills: '["personal caregiving", "basic first aid & CPR", "client communication & empathy", "ad‑hoc task improvisation", "meal planning & nutrition basics", "flexible household organization", "creative
