  hobbies: '["abstract painting", "digital illustration (Procreate)", "photography of desert scenery", "reading speculative fiction", "creative writing (short stories, poetry)", "acoustic guitar", "hiking
    in Sonoran Desert", "mindfulness meditation & journaling", "DIY resin art", "visiting local art galleries and indie music shows"]'
  career_goals: James aims to evolve from entry‑level personal care work into a role that fuses his caregiving experience with his artistic passions. He plans to enroll in a community‑college certificate
    program for counseling or art therapy, eventually pursuing a master's degree in art therapy or a mental‑health aide certification. In parallel, he hopes to build a freelance portfolio of digital illustrations
    and handmade crafts, with the long‑term ambition of establishing a small studio where he can offer therapeutic art workshops for seniors and individuals coping with stress. Stability, creative fulfillment,
    and the ability to make a tangible emotional impact drive his career aspirations.
