persona_description: A nuclear power plant operator who is familiar with the operational procedures and safety measures of nuclear power plants, particularly those of the Fukushima No. 1 nuclear power plant.
  They are knowledgeable in the design and operation of nuclear reactors, and have experience dealing with emergency situations and disaster response. They are also aware of the potential risks and hazards
  associated with nuclear power plants and the potential consequences of accidents and meltdowns. They have a keen interest in understanding the causes and mechanisms of accidents and meltdowns, and are
  interested in contributing to the safety and reliability of nuclear power plants.
