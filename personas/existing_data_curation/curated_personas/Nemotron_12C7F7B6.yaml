  hobbies: '[''Mexican folk dancing (ballet folklorico)'', ''Attending local art exhibits and museum tours'', ''Cooking and teaching traditional Mexican dishes'', ''Gardening (native plants and culinary
    herbs)'', ''Volunteering at senior community center'', ''Playing bridge and bingo tournaments'', ''Reading historical novels and biographies'', ''Traveling to cultural festivals in the Pacific Northwest'',
    ''Family genealogy research'', ''Crafts such as knitting and crocheting'']'
  career_goals: Although retired, Maria aims to expand her impact by establishing a multicultural arts workshop series for seniors in Everett, preserving Mexican traditions through intergenerational storytelling,
    and mentoring younger volunteers in event organization. She hopes to author a memoir of her family's migration story and to become a recognized cultural ambassador within Snohomish County's Hispanic
    community. Additionally, she plans to learn more advanced digital tools to document and share local histories online.
