personas:
  professional: Maria Ibarra, a retired community event planner turned cultural ambassador, leverages their bilingual fluency and meticulous budgeting, and they orchestrate intergenerational arts workshops
    for seniors, weaving structured organization with spontaneous storytelling to keep participants engaged.
  sports: Maria Ibarra enjoys low‑impact movement such as strolling the Evergreen arboretum trails, and they play in a senior bocce league at the Everett Community Center, dance lively folk circles that
    double as cardio, while cheering for the Seattle Seahawks and the Seattle Sounders FC during game nights.
  arts: Maria Ibarra frequently visits the Seattle Art Museum and the Museum of History & Industry, and they volunteer as a docent sharing the storytelling power of the muralist traditions from their homeland,
    drawing inspiration from artists like Diego Rivera and Frida Kahlo, and they regularly attend community theater productions featuring works by contemporary playwrights such as Lin‑Manuel Miranda.
  travel: Maria Ibarra prefers well‑planned journeys that blend cultural immersion with scenic relaxation, having traveled to Oaxaca to experience the Day of the Dead celebrations and now eyeing future
    trips to the San Juan Islands and Vancouver, all while budgeting senior‑discount travel vouchers and coordinating visits to align with their sister’s family gatherings.
  culinary: Maria Ibarra, an accomplished home chef, delights in preparing traditional mole, tamales, and pozole using heirloom chilies, epazote, and fresh cilantro harvested from their garden, and they
    teach cooking classes where they often over‑season to satisfy their love of bold flavors and pair dishes with steaming horchata and homemade pan dulce.
  core: Maria Ibarra is a spirited, community‑focused storyteller who balances meticulous organization with a love for spontaneous group dance, and they have a quietly skeptical eye that fuels a competitive
    streak in bridge tournaments, and they habitually quote old family proverbs while polishing their garden’s rosemary.
background:
  cultural: Maria was born in Jalisco, Mexico, and immigrated to the United States in her early twenties. She has retained strong ties to Mexican cultural traditions, celebrating Día de los Muertos, Cinco
    de Mayo, and religious holidays with family and community. Her bilingual upbringing informs her daily life, and she actively promotes Mexican heritage through cooking, storytelling, and participation
    in local cultural festivals. Living in Everett, WA, she blends her Mexican roots with the Pacific Northwest's diverse community, fostering cross‑cultural understanding while maintaining the familial,
    Catholic, and communal values central to her identity.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Community event planning and coordination'', ''Art appreciation and museum guiding'', ''Basic computer literacy (email, social media, digital archiving)'',
