persona_description: A scientist who specializes in tropical hydrology, specifically the study of river-borne sediment and its impact on water supply systems. He has conducted extensive research on the
  causes of landslides and their effects on water supply, and has published several papers on the topic. He is currently working on a project to map the landslide risk of future storms in the Panama Canal
  watershed, which will help to minimize the impact of future floods on the water supply. He is also interested in the potential impacts of prolonged tropical storms on the water supply in the region.
