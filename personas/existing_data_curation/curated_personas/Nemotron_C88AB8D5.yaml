personas:
  professional: Jessica Mateoperez, a budding community health worker-in-training, combines meticulous event‑planning expertise, fluent Spanish‑English communication, and a reliable, methodical work ethic
    to coordinate bilingual health outreach programs for local families while navigating the anxiety of a career shift.
  sports: Jessica Mateoperez enjoys hiking the Sandia Mountains on weekends, participates in a local yoga club, roots for the University of New Mexico Lobos basketball team and the Albuquerque Isotopes
    baseball club, and channels her energetic side into occasional beginner’s salsa fitness classes, blending outdoor adventure with community‑spirit sports fandom.
  arts: Jessica Mateoperez immerses herself in the rhythms of traditional folk music by artists such as Lila Downs and Natalia Lafourcade, creates hand‑made papel picado for neighborhood festivals, and
    designs eye‑catching flyers in Adobe Spark for community events, letting artistic expression reinforce her cultural pride and event‑planning flair.
  travel: Jessica Mateoperez prefers road‑trip getaways to nearby cultural sites like Taos Pueblo, the historic downtown of Santa Fe, and the Grand Canyon, while dreaming of a culinary pilgrimage to Oaxaca's
    markets, yet budget constraints and family responsibilities often shape her travel plans toward short, purposeful excursions.
  culinary: Jessica Mateoperez's kitchen is a laboratory for modern twists on classic dishes like mole‑glazed chicken, savory tamales, and chilaquiles, where she pairs fresh chilies, corn masa, and locally
    sourced heirloom tomatoes, while her self‑taught graphic design skills let her craft vibrant menu cards for each potluck.
  core: Jessica Mateoperez balances boundless community energy and meticulous organization with a heartbeat of anxiety, turning cultural cooking and salsa steps into both a coping mechanism and a catalyst
    for neighborhood connection.
background:
  cultural: Jessica was raised in a Mexican‑American household in Albuquerque, where Spanish was spoken alongside English. Her family maintains strong ties to Mexican traditions such as Día de los Muertos,
    quinceañeras, and weekly family meals featuring dishes like tamales, pozole, and mole. She participates actively in the local Hispanic community, attending cultural events at the New Mexico Museum of
    Art and supporting the annual Albuquerque International Balloon Fiesta with a Mexican‑themed pavilion. Her cultural identity informs her values of family solidarity, hospitality, and community service,
    and she often incorporates Mexican motifs into her crafts and cooking.
attributes:
  skills: '[''Event planning'', ''Household budgeting'', ''Bilingual (Spanish-English) communication'', ''Volunteer coordination'', ''Basic digital literacy (MS Office, Google Suite, social media)'', ''Cooking
    and traditional Mexican cuisine'', ''Crafting (embroidery, papel picado)'', ''Conflict resolution'', ''Caregiving and family support'']'
  hobbies: '[''Salsa dancing'', ''Community gardening'', ''Yoga and mindfulness'', ''Cooking Mexican cuisine'', ''Handcrafting papel picado'', ''Volunteering as a reading buddy'', ''Hiking in the Sandia
    Mountains'', ''Attending cultural festivals'', ''Listening to folk music'', ''Participating in local book clubs'']'
  career_goals: Jessica aims to complete her associate degree in Business Administration and obtain a certification as a Community Health Worker or Certified Family Support Specialist. She envisions transitioning
    from full‑time homemaker to a part‑time role within a local nonprofit or community organization where she can leverage her event‑planning and bilingual skills to support Mexican‑American families. Long‑term,
    she hopes to launch a home‑based catering business that blends modern culinary techniques with traditional Mexican dishes, providing both economic stability for her family and a cultural gathering space
    for the neighborhood.
