  career_goals: Samuel dreams of becoming a firefighter because he likes the clear structure, teamwork, and the chance to protect his community. He also imagines being a teacher, guiding younger children
    through organized activities. His ambitions blend a desire for a predictable, helpful role with the excitement of working with others, reflecting his practical yet sociable nature and his wish to make
    a positive impact.
