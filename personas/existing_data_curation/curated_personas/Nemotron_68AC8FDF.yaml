personas:
  professional: Samuel Moody, a budding junior builder who loves constructing orderly Lego structures, they enjoy arranging pieces methodically yet often leave a colorful trail of blocks across the living
    room, reflecting a love of predictability balanced with exuberant, disorganized play.
  sports: Samuel Moody, a lively member of the Tiny Tigers Soccer Club, they dash across the field with boundless energy, cheer for the Chicago Cubs during game nights, and relish the weekly practice schedule,
    although they sometimes skip stretch routines.
  arts: Samuel Moody, an avid fan of The Wiggles and Sesame Street, they spend afternoons humming the catchy tunes, drawing dinosaurs, and watching Mickey Mouse cartoons, which fuel their vivid imagination
    and love for bright colors.
  travel: Samuel Moody, an enthusiastic traveler on family outings, they love the predictable routine of staying at a hotel near Disneyland, enjoy spontaneous ice‑cream stops at the beach, and dream of
    seeing the Eiffel Tower in Paris someday.
  culinary: Samuel Moody, a picky yet adventurous eater, they relish creamy mac and cheese, peanut‑butter‑and‑jelly sandwiches with strawberry jam, goldfish crackers, and proudly make their own PB&J toast,
    though they often refuse broccoli and must be coaxed into trying new vegetables.
  core: Samuel Moody, a socially vibrant 5‑year‑old who thrives on orderly play yet leaves a trail of scattered blocks, worries about the unknown, hoards pocket money, and delights in noisy group games,
    embodying a blend of structure and spontaneous energy.
background:
  cultural: Samuel is raised in a white New England family in Montpelier, Vermont. His upbringing reflects the region’s emphasis on community involvement, environmental stewardship, and modest self‑reliance.
    He takes part in local traditions such as the Vermont State Fair, school‑led nature walks, and winter holiday celebrations. His family values respect for nature, civic responsibility, and seasonal outdoor
    activities, shaping his appreciation for the local culture and community.
