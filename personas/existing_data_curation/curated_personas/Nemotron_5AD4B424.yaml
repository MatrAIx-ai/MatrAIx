personas:
  professional: Chidinma Dor is a data‑driven operations leader who leverages process optimization, Agile methodology, and design‑thinking inspired by a love of art to turn complex workflows into elegant,
    metrics‑focused solutions while fostering inclusive, collaborative teams.
  sports: Chidinma Dor runs with the Port St. Lucie 5K Club, regularly competes in the coastal 5K series, cheers on the Florida Panthers and Miami Dolphins, and plays in a co‑ed recreational soccer league
    where they balance competitive spirit with team camaraderie.
  arts: Chidinma Dor explores the local art scene by frequenting the St. Lucie County Art Museum, sketching Floridian wetlands in watercolor, photographing street portraits in the style of Vivian Maier,
    and dancing to Afrobeat and salsa classes, drawing inspiration from artists like Kehinde Wiley and the music of Fela Kuti.
  travel: Chidinma Dor plans trips that blend cultural immersion and adventure, having visited New Orleans for jazz, Lisbon for azulejo tiles, and the Caribbean for culinary festivals, while mapping future
    itineraries to Japan’s art islands, balancing meticulous planning with spontaneous photo walks when budget permits.
  culinary: Chidinma Dor cooks jollof rice with a secret blend of Scotch bonnet and thyme, prepares succulent suya using a homemade peanut rub, experiments with Caribbean jerk chicken, and often rounds
    out meals with fresh mango salsa, while admitting a habit of over‑seasoning when inspired by a new playlist.
  core: Chidinma Dor is a methodical operations strategist who fuses art‑inspired creativity with analytical rigor, channeling curiosity into data, culture, and community while juggling a disciplined financial
    plan, active lifestyle, and occasional over‑seasoned cooking experiments.
background:
  cultural: Chidinma is a first‑generation American of Nigerian Igbo descent, born and raised in Florida. Her family maintains strong ties to Nigerian traditions—celebrating holidays such as the New Yam
    Festival, speaking Igbo at home, and preparing classic dishes like egusi soup and pepper soup. She also embraces broader African‑American cultural practices, participating in church life, Juneteenth
    celebrations, and local Black community events in Port St. Lucie. This blend of Afro‑Nigerian heritage and Southern US influences shapes her values of community, resilience, and creativity, and informs
    her love for storytelling, music, and communal food sharing.
