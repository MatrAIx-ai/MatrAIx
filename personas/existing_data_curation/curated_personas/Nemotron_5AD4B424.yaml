    Students", "Organizing Community Cultural Festivals", "Travel", "Reading Contemporary Fiction"]'
  career_goals: Chidinma aspires to advance into senior operational leadership, targeting roles such as Director of Operations or Vice President of Business Operations within a growth‑focused technology
    or consumer‑services firm. She aims to spearhead large‑scale digital transformation initiatives that leverage automation, advanced analytics, and sustainable practices to improve efficiency and customer
    experience. To support this trajectory, she plans to earn a PMP certification and attain Lean Six Sigma Black Belt status. Additionally, she is passionate about mentoring the next generation of women
    and people of color in operational roles, and eventually hopes to launch her own consultancy that blends data‑driven process design with creative, art‑inspired problem solving.
