  hobbies: '[''Literary fiction and poetry reading'', ''Creative writing and journaling'', ''Watercolor painting (abstract nature themes)'', ''Native Texas gardening (bluebonnets, prickly pear)'', ''Birdwatching
    along the San Antonio River'', ''Small‑group book club participation'', ''Genealogy research'', ''Mindfulness meditation and stress‑relief journaling'']'
  career_goals: Although formally retired, Christiana aims to leave a lasting intellectual and artistic legacy. She plans to compile a memoir that weaves her experiences as an educator with reflections
    on art, nature, and aging. She also aspires to publish a collection of poems inspired by her solitary walks in San Antonio’s River Walk and the native Texas landscape. On the community front, she seeks
    to establish a modest art‑education program at the local senior center, integrating watercolor workshops with mindfulness practices to help fellow retirees manage stress. Additionally, she hopes to
    mentor a small cohort of early‑career teachers through monthly advisory circles, fostering a culture of curiosity and compassionate pedagogy.
