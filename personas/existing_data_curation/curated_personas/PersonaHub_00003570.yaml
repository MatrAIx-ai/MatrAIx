persona_description: A scientist who studies the impact of climate change on food supplies and ancient civilizations. This persona is interested in the research conducted by WSU archaeologist Jade D'Alpoim
  Guedes, who has found evidence that cooling global temperatures around 2000 B.C. would have made it impossible for ancient people on the Tibetan Plateau to cultivate millet, their primary food source.
  This discovery could potentially help in understanding the effects of climate change on food production and food security.
