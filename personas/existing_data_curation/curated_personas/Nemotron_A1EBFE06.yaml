  hobbies: '[''Cooking Mexican cuisine'', ''Fishing on local bayous'', ''Playing guitar'', ''Dancing to zydeco and mariachi music'', ''DIY home improvement projects'', ''Volunteering at parish charity events'',
    ''Attending local soccer and football games with friends'', ''Watching construction tutorial videos'', ''Participating in Cajun festivals'']'
  career_goals: Sujay aims to advance from a skilled finisher to a crew foreman within the next three years, obtaining certifications such as OSHA 30-hour, NCCER Concrete Finishing, and a Green Building
    certification. He aspires to lead larger commercial projects, specialize in decorative concrete and terrazzo art, and eventually start his own small contracting business that offers sustainable concrete
    solutions to local builders and homeowners. He also hopes to mentor younger workers, sharing his practical knowledge and encouraging a safety culture.
