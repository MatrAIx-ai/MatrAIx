personas:
  professional: Sujay Interiano, a 33-year-old cement mason and concrete finisher, combines methodical precision with an outgoing, team‑oriented style to deliver polished terrazzo floors, mentor crew members,
    and actively pursue OSHA and green‑building certifications, and they see these credentials as a stepping stone toward foremanship.
  sports: Sujay Interiano enjoys weekend fishing on the bayous, supports the New Orleans Saints and Pelicans, joins a local adult soccer league that meets after work, follows the LSU Tigers football season
    with enthusiastic fandom, and they maintain a basic strength‑training routine at the community center.
  arts: Sujay Interiano spends evenings strumming guitar at the community center, dancing to zydeco bands like Boozoo Chavis at Cajun festivals, and listening to Mexican icons such as Luis Miguel and Café
    Tacvba, which fuels their appreciation for rhythmic storytelling, and they often incorporate those influences into spontaneous jam sessions.
  travel: Sujay Interiano prefers short road trips to nearby cultural hotspots, having explored the historic French Quarter of New Orleans, the vibrant markets of San Antonio, and dreaming of a future eco‑tour
    of the Yucatán Peninsula, all planned around weekend availability, and they keep a modest travel budget.
  culinary: Sujay Interiano showcases a solid home‑cooking skill set by preparing authentic tamales with corn masa, slow‑cooked mole sauce rich in chilies and chocolate, and hearty Cajun jambalaya with
    Andouille sausage and crawfish, while they love experimenting with locally sourced seafood and fresh herbs.
  core: Sujay Interiano blends a practical, organized work ethic with a sociable, curious spirit, often juggling concrete projects, backyard fishing, and spontaneous guitar jam sessions, though they sometimes
    overcommit to DIY tasks at the expense of rest.
background:
  cultural: Sujay is a first-generation Mexican-American whose family settled in Southwest Louisiana. He grew up bilingual, speaking Spanish at home and English in school, and was immersed in both Mexican
    traditions—such as Día de los Muertos, quinceañeras, and family-centered gatherings—and Southern Louisiana customs, including Catholic parish life, Cajun cuisine, and community festivals. This blend
    influences his values of family respect, hospitality, hard work, and community service. He often incorporates Mexican flavors into his cooking while also enjoying gumbo and jambalaya, reflecting his
    dual cultural heritage.
attributes:
  skills: '[''Concrete mixing and placement'', ''Concrete finishing'', ''Terrazzo installation and polishing'', ''Blueprint reading'', ''Formwork construction'', ''Safety compliance (OSHA)'', ''Equipment
