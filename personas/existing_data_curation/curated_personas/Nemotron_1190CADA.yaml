personas:
  professional: Timothy Haney, a retired construction foreman turned community volunteer, leverages his meticulous site‑planning, crew‑coordination, and safety‑compliance expertise to mentor apprentices
    and deliver well‑organized workshops, while they naturally engage audiences with talkative flair and comfort as a center of attention at senior‑center events.
  sports: Timothy Haney stays active through weekly walks with the senior‑center fitness club, practices recreational fishing on the Susquehanna River during spring, enjoys casual rounds of golf at the
    local country club in summer, and they passionately root for the Baltimore Ravens and Orioles, often debating game stats at the community bar after matches.
  arts: Timothy Haney, an avid attendee of Civil War reenactments and local history talks, finds artistic inspiration in the music of Johnny Cash and the paintings of Winslow Homer, frequently attending
    performances by the Baltimore Symphony Orchestra and regional theater productions starring John Goodman, while they use their talkative nature to lead lively post‑show discussions.
  travel: Timothy Haney plans his trips with meticulous itineraries, preferring guided tours of historic towns like St. Michaels, Annapolis, and Williamsburg, and weekend getaways to coastal spots such
    as Cape Cod and Charleston, balancing his love for history with their wife’s desire for relaxed beach walks, all while they stay within a modest retirement travel budget.
  culinary: Timothy Haney showcases his seasoned grilling skills by slow‑roasting herb‑marinated chicken, serving classic Maryland crab cakes with Old Bay seasoning, and perfecting a tangy barbecue sauce
    made from apple cider vinegar, ketchup, and brown sugar, while they draw fresh tomatoes and basil from their garden to enrich every summer dish.
  core: Timothy Haney blends methodical planning with sociable storytelling, turning his hands‑on love for building, gardening, and history into community‑centered mentorship, even if they occasionally
    over‑schedule their weekend barbecues.
background:
  cultural: Timothy comes from a multi‑generational white American family with Irish and German ancestry that settled in Maryland during the early 20th century. Raised in a Protestant middle‑class neighborhood,
    he grew up celebrating traditional American holidays and participating in Chesapeake Bay seafood traditions, local county fairs, and church community events. These cultural roots shape his appreciation
    for historic preservation, regional cuisine, and community service.
