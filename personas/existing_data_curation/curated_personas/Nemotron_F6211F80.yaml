personas:
  professional: Darryl Hayes, a veteran elementary and middle school humanities teacher with over 30 years of experience, meticulously designs data‑driven curricula aligned to Georgia standards, mentors
    new teachers, writes successful grants, leads community outreach, and is strategically pursuing the department chair position and a district‑wide literacy initiative, all while employing their methodical,
    routine‑focused approach that helps mitigate their constant worry about student outcomes and personal career progression.
  sports: Darryl Hayes, an avid fisherman who spends quiet mornings on nearby lakes, walks their dog along country roads, supports the Atlanta Braves and Bowdon High School football, and participates in
    a community slow‑pitch softball league, approaches fitness as low‑intensity, routine‑based activities that suit their preference for solitude and modest exertion.
  arts: Darryl Hayes, a choir member who finds solace in gospel harmonies of Mahalia Jackson and Kirk Franklin, spends weekend evenings watching classic black‑and‑white films such as Casablanca and Citizen
    Kane, and reads African‑American history and Southern literature by authors like James Baldwin and William Faulkner, weaving these artistic influences into a reflective, routine‑oriented cultural identity.
  travel: Darryl Hayes, who plans trips with meticulous itineraries, enjoys weekend getaways to Savannah’s historic district and the Blue Ridge Mountains, dreams of a research‑focused visit to Washington,
    D.C.’s National Archives, and prefers low‑key, culturally enriching travel over spontaneous vacations, often traveling alone or with a small group of like‑minded friends.
  culinary: Darryl Hayes, a kitchen enthusiast who regularly prepares traditional Southern fare such as fried catfish with hush‑puppy batter, slow‑cooked collard greens seasoned with smoked ham hocks, buttery
    cornbread, and peach cobbler made with fresh garden peaches, approaches cooking with the same methodical precision as their lesson planning, yet occasionally over‑spices in an attempt to impress their
    choir mates.
  core: Darryl Hayes blends a disciplined, routine‑driven mindset with a quiet love for history, gospel music, and hands‑on crafts, navigating life’s stresses through structured habits, modest indulgences,
    and a steadfast commitment to community.
background:
  cultural: Darryl is a Black man whose family has deep roots in rural Georgia. His grandparents participated in the civil‑rights movement of the 1960s and were active members of a historically Black Baptist
    church in Heard County. Growing up, he was immersed in Southern Black church traditions, oral storytelling, and a strong emphasis on community service. This heritage informs his commitment to inclusive
    curricula that highlight African‑American contributions and his dedication to fostering resilience and pride in his students. Darryl’s cultural identity blends the legacy of the Great Migration, Southern
    hospitality, and a reverence for education as a pathway to empowerment.
attributes:
  skills: '[''Classroom management'', ''Curriculum development'', ''Differentiated instruction'', ''Assessment design'', ''Data‑driven instruction'', ''Parent‑teacher communication'', ''Mentoring new teachers'',
