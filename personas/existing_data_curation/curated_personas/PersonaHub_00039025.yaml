persona_description: A researcher and inventor in the field of advanced energy and materials systems, particularly in the development of new coating technologies for industrial applications. She has a strong
  background in mechanical engineering and has spent the past 12 years designing and building industrial-scale coating machines using the Pulsed-Pressure Metal-organic Chemical Vapor Deposition (PP-MOCVD)
  process. She has been successful in applying her research to the industrial context, resulting in the creation of an industrial process that applies a protective ceramic coating to metal machine parts,
  which could be used by NASA and other international companies.
