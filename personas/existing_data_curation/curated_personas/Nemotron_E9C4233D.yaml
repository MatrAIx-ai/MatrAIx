  career_goals: Donald aims to advance to a senior systems architect role where he can design scalable, secure solutions for organizations that serve the public good, such as healthcare providers or nonprofit
    agencies. In the next two years he plans to earn CBAP and ITIL certifications, lead a cross‑functional implementation project, and mentor junior analysts. Long‑term, he envisions a leadership position—such
    as Director of IT or Chief Technology Officer—where he can align technology strategy with community impact while maintaining a balanced family life.
