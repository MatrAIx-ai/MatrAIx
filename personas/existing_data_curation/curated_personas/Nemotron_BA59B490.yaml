personas:
  professional: Mary Jenkins, an inquisitive preschooler who loves building block towers and tinkering with puzzles, blends curiosity with a practical "just get it done" attitude, often favoring free-play
    experiments over rigid classroom instructions while they subtly compete with peers to see who can finish a shape sorter first.
  sports: Mary Jenkins enthusiastically joins the neighborhood kids' soccer clinic on Saturday mornings, they cheer for the Detroit Tigers during family game nights, and they prefer spontaneous backyard
    races over structured practice, embodying a competitive yet laid-back approach to fitness.
  arts: Mary Jenkins delights in drawing colorful pictures of cartoon cats, sings along to the Frozen soundtrack, and watches Sesame Street episodes, where they admire the creativity of Lin-Manuel Miranda's
    songs and occasionally mimic the expressive gestures of playful puppets.
  travel: Mary Jenkins loves weekend trips to the Henry Ford Museum in Dearborn and a summer visit to the shoreline of Lake St. Clair, and they daydream about a future Disneyland adventure, balancing family-planned
    itineraries with spontaneous stops at ice-cream trucks along the way.
  culinary: Mary Jenkins prefers macaroni & cheese, chicken nuggets, and apple slices, often helping stir batter for sugar cookies while they sprinkle extra chocolate chips, yet they habitually leave crumbs
    on the kitchen floor, reflecting both enthusiasm for cooking and a slight messiness.
  core: Mary Jenkins blends fierce curiosity with practical shortcuts, they compete quietly in sandbox games, avoid cluttered plans, and enjoy solitary play punctuated by occasional messes and snack-driven
    impulsivity.
background:
  cultural: 'Mary is raised in a middle‑class, predominantly white suburban neighborhood in Livonia, Michigan. Her family reflects typical Midwestern values: a focus on modesty, hard work, and community
    participation. She attends a local preschool where children are encouraged to be independent yet kind, and she celebrates American holidays such as Thanksgiving, Halloween, and the Fourth of July with
    family traditions. The environment blends a love of outdoor activities, like park visits and backyard exploration, with a practical, down‑to‑earth approach to daily life.'
