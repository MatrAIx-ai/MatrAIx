  hobbies: '[''Duplo block building'', ''Crayon drawing'', ''Picture book reading'', ''Nature walks'', ''Simple jigsaw and shape‑sorter puzzles'', ''Sticker collecting'', ''Pretend cooking with play kitchen'']'
  career_goals: Mary often talks about becoming an astronaut or a young inventor when she grows up, because she loves exploring the unknown while also figuring out how things work in a practical way. She
    dreams of designing rockets, building clever contraptions, and winning science‑fair prizes. Her competitive nature pushes her to imagine herself as a future engineer who creates useful gadgets and solves
    problems on her own terms.
