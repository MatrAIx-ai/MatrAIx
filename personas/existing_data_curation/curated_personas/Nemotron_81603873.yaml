  hobbies: '[''Gardening and orchard care'', ''Fishing'', ''Hiking and bird‑watching'', ''Community church potlucks'', ''Reading historical fiction and local history'', ''Collecting vintage vinyl records'',
    ''Playing checkers'', ''Cooking Southern cuisine'', ''Digital photography'']'
  career_goals: Although retired, Marvin aims to stay active and purposeful. He plans to mentor younger neighbors in gardening and basic home‑maintenance skills, contribute his bookkeeping know‑how to the
    local community garden, and help organize intergenerational events at the senior center. He hopes to complete a memoir of life in rural North Carolina, capturing family stories and regional cultural
    heritage. Maintaining health and independence is a priority, so he sets goals for regular walks, routine medical check‑ups, and staying socially connected with friends and extended family. Occasionally,
    he wishes to take short road trips to historic sites in the state, satisfying his curiosity while honoring his roots.
