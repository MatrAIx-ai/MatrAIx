  career_goals: Over the next two years Pin Pen aims to earn a regional Southern Hospitality award for her restaurant by launching a farm‑to‑table menu that fuses Korean flavors with Appalachian ingredients.
    She plans to formalize a mentorship apprenticeship program for emerging food‑service managers, leveraging her critical eye to raise industry standards. After retirement she intends to open a boutique
    tea lounge that showcases traditional Korean tea ceremonies paired with locally sourced mountain herbs, and to author a cookbook that chronicles her multicultural culinary journey while preserving the
    recipes of her late husband and her Korean heritage.
