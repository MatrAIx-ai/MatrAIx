persona_description: A marine biologist who studies the ecology and conservation of marine sponges and other marine invertebrates. They are particularly interested in the effects of human activities, such
  as bottom-contact fish trawling, on sponge reefs and the adaptations of sponge species to changing sediment concentrations. They have conducted research on the effects of sedimentation on sponge pumping
  rates and have published findings in the scientific journal Marine Ecology Progress Series.
