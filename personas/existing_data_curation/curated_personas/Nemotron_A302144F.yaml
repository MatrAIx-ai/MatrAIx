personas:
  professional: Rebecca Wilkinson is a civil engineer who leverages her meticulous organization, mastery of AutoCAD, Civil 3D, and GIS, and her humanities‑infused communication skills to steer community‑focused
    infrastructure projects, consistently meeting tight deadlines while championing sustainability and stakeholder harmony.
  sports: Rebecca Wilkinson fuels her love for the outdoors by kayaking with the Spokane River Kayakers, hitting the trails around Medical Lake on weekends, cheering on the Seattle Seahawks in the fall
    and the Seattle Sounders FC during summer, and keeps fit through yoga sessions that double as stress‑relief practice despite occasionally skipping leg day after long project weeks.
  arts: Rebecca Wilkinson expresses her creative side on the community theater stage, relishes reading classics like Pride and Prejudice alongside contemporary novels such as The Vanishing Half, and finds
    inspiration in musicians like Bon Iver and Nina Simone while admiring Meryl Streep’s performances, often weaving these artistic influences into her engineering presentations.
  travel: Rebecca Wilkinson prefers structured yet adventurous trips, having trekked the Canadian Rockies on a guided hike, explored the historic streets of Kyoto during a solo weekend, and plans a future
    road‑trip across the Pacific Northwest to visit the Oregon Coast, always balancing itinerary details with spontaneous detours to local farmer’s markets.
  culinary: Rebecca Wilkinson channels her baking passion into perfecting sourdough loaves and lemon bars, regularly incorporates garden‑fresh heirloom tomatoes, kale, and rosemary into wholesome meals,
    and while she classifies herself as a competent home chef, she occasionally over‑proofs dough when stress spikes, leading to a few flat loaves.
  core: Rebecca Wilkinson is a detail‑driven civil engineer who blends disciplined project leadership with a love for outdoor group activities, community arts, and mindful self‑care, yet wrestles with chronic
    worry that fuels both her meticulousness and occasional stress‑driven indulgences.
background:
  cultural: Rebecca grew up in the Pacific Northwest, where the regional culture emphasizes outdoor recreation, environmental stewardship, and community involvement. Her white, middle-class upbringing in
    Spokane County exposed her to values of self-reliance, punctuality, and a strong work ethic. Influenced by the area's rich Native American heritage, she holds a deep respect for local history and strives
    to incorporate inclusive, culturally sensitive practices in her professional projects. Her liberal arts education fostered an appreciation for diverse perspectives, which she blends with her technical
    expertise to promote collaborative, people-focused engineering solutions.
attributes:
  skills: '[''AutoCAD'', ''Civil 3D'', ''GIS mapping'', ''Structural analysis'', ''Construction project management'', ''Building code compliance'', ''Technical report writing'', ''Public speaking'', ''Team
    leadership'', ''Problem solving'', ''Time management'']'
  hobbies: '[''Hiking'', ''Kayaking on Medical Lake'', ''Community theater'', ''Yoga'', ''Cooking (baking)'', ''Gardening'', ''Book club (classic and contemporary literature)'', ''Volunteering with Habitat
    for Humanity'', ''STEM mentorship for high school students'', ''Board game nights'']'
  career_goals: Rebecca aims to obtain her Professional Engineer (PE) license within the next two years and progress to a senior project manager role overseeing large-scale infrastructure projects, particularly
    those that improve community resilience such as flood mitigation and affordable housing. She aspires to lead multidisciplinary teams, mentor junior engineers—especially women in STEM—and eventually
    establish a consultancy focused on sustainable, community-oriented design. Balancing ambition with her need for structure, she seeks a position that offers clear career pathways, predictable work schedules,
    and opportunities for professional development.
