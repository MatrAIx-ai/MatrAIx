  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Reading historical fiction and Caribbean literature'', ''Salsa dancing'', ''Balcony gardening'', ''Hiking in El Yunque and coastal trails'',
    ''Volunteering for heritage preservation projects'']'
  career_goals: Sofia aims to transition from a specialist role to senior leadership within the next five years, targeting a PMO Director position in a municipal agency or a strategic consultancy focused
    on infrastructure and cultural preservation. She plans to earn her PMP certification and pursue an MBA with an emphasis on strategic management. Her ambition is to lead a portfolio of projects that
    embed sustainability, disaster resilience, and community participation, building on her experience with hurricane recovery efforts. Additionally, she aspires to mentor women and under‑represented Puerto
    Rican professionals in project management and, eventually, launch her own consultancy that provides tailored project services to non‑profits and cultural institutions.
