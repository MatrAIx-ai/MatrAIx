personas:
  professional: Sofia Rodriguez, a seasoned project manager with over twenty years steering public‑private infrastructure initiatives across Guaynabo and beyond, channels their rigorous planning in MS Project
    and bilingual stakeholder negotiations into culturally attuned disaster‑recovery programs, all while maintaining a competitive edge that drives them toward a future PMO director role.
  sports: Sofia Rodriguez fuels their fitness by trekking the misty trails of El Yunque and the coastal cliffs near Guaynabo on weekends, supports the local baseball team Cangrejeros de Santurce, and belongs
    to a community running club that meets for sunrise jogs, reflecting a blend of solo endurance pursuits and team spirit.
  arts: Sofia Rodriguez immerses themselves in the island’s artistic pulse by attending salsa nights featuring the music of Tito Puente, reading historical fiction by Esmeralda Santiago and Junot Díaz,
    and catching performances by the Ballets de San Juan, all of which reinforce their appreciation for rhythm, narrative, and visual storytelling.
  travel: Sofia Rodriguez plans their trips with the same spreadsheet discipline they use at work, favoring culturally rich destinations like Old San Juan, Cartagena’s historic quarter, and Seville’s Semana
    Santa, while balancing weekend getaways to the nearby coast with occasional family trips to the U.S. Virgin Islands, showing a preference for structured itineraries and meaningful cultural immersion.
  culinary: Sofia Rodriguez crafts traditional arroz con gandules and pasteles in their kitchen, often swapping pork shoulder for lean turkey and adding quinoa and extra herbs from their balcony garden,
    while savoring the aroma of sofrito and the crispness of tostones, showcasing their commitment to health‑conscious cooking anchored in cherished flavors.
  core: Sofia Rodriguez blends a disciplined, project‑driven mindset with a deep love for island rhythms, hiking, and community storytelling, occasionally letting competitive instincts sidetrack their relaxed
    moments, but always returning to structured plans and cultural roots.
background:
  cultural: Sofia identifies strongly with her Puerto Rican roots, having been raised in Guaynabo in a family that honors both Spanish colonial traditions and Afro‑Caribbean rhythms. Her upbringing included
    celebrations of religious festivals such as San Juan and participation in the vibrant Festival de la Calle San Sebastián, fostering a lifelong love for music, dance, and storytelling. Bilingual fluency
    in Spanish and English enables her to navigate both local and international settings with ease. The collective island experience of natural disasters, especially Hurricane Maria, shaped a pragmatic
    resilience that drives her commitment to disaster recovery and community rebuilding through project management. Her humanities degree deepened her appreciation for Puerto Rico's diverse cultural narratives,
    influencing her inclusive stakeholder communication and culturally sensitive project design.
