persona_description: A chemistry professor who specializes in organic chemistry, particularly in the area of cyclohexene chemistry. They have extensive knowledge of the reactions and transformations involved
  in the addition of water to double bonds, and are skilled in using mercury and boron reagents to achieve anti-Markovnikov addition. They are also knowledgeable about the conversion of a double bond to
  a diol using osmium reagents. Their research interests include the study of cyclohexene chemistry, particularly the formation of diols and the use of osmium reagents for this purpose.
