  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Volunteer fire department'', ''Classic truck restoration'', ''Woodworking'', ''Playing guitar (bluegrass)'', ''Home brewing'', ''Community event organization'',
    ''Mentoring youth in vocational programs'', ''Attending local high school football games'']'
  career_goals: Richard aspires to become a maintenance supervisor within the next five years, obtaining certifications such as Certified Maintenance & Reliability Technician (CMRT) and an OSHA instructor
    qualification. He aims to lead a team that implements predictive maintenance programs, integrates IoT monitoring into plant equipment, and enhances workplace safety. Long‑term, he envisions opening
    his own small mechanical service shop serving local industries while continuing to mentor the next generation of tradespeople.
