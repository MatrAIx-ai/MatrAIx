personas:
  professional: Diana Rodriguez, a veteran insurance sales agent with over two decades of experience in Mayagüez, leverages her methodical, bilingual communication and knack for detailed risk assessments
    to build trust with clients, while her outgoing energy fuels community outreach and her assertiveness closes deals, all directed toward her goal of becoming a regional branch manager within five years.
  sports: Diana Rodriguez stays active through weekly salsa dancing classes at the community center, cheers for the Indios de Mayagüez baseball team, and participates in a local sunrise walking club that
    follows the waterfront trail, deliberately balancing high‑energy dancing with low‑impact cardio to protect her joints at age 48.
  arts: Diana Rodriguez merges her love for music and storytelling by taking the mic at karaoke nights, where she belts out classic salsa hits from Marc Anthony and Luis Miguel, while at home she unwinds
    with contemporary romance novels by Nora Roberts and streams concerts by Jennifer Lopez to keep her spirit uplifted.
  travel: Diana Rodriguez prefers meticulously planned short getaways, such as weekend trips to the historic streets of Old San Juan, a relaxed cruise to the Virgin Islands, and a curated road trip through
    the pine‑forested mountains of western Puerto Rico, balancing her craving for cultural immersion with a budget that prioritizes family savings and future security.
  culinary: Diana Rodriguez delights in cooking traditional island fare—arroz con gandules, pasteles, and lechón—using fresh cilantro, oregano, and habanero peppers harvested from her backyard garden, and
    she often hosts potluck evenings where friends sample her seasoned caramelized pork and homemade sofrito.
  core: Diana Rodriguez channels her disciplined, routine‑driven spirit into a vibrant blend of community‑center salsa, meticulous insurance work, and heartfelt cooking, all while managing lingering worries
    with yoga and a never‑ending appetite for romance novels.
background:
  cultural: Diana is a native of Mayagüez, Puerto Rico, a city known as "La Sultana del Oeste" for its historic ties to agriculture and commerce. Growing up in a close‑knit, predominantly Catholic community,
    she internalized strong family values, respect for tradition, and a deep sense of communal responsibility. Her household celebrated local festivals such as Fiestas de la Cosecha and the lively San Juan
    Bautista fiesta, where music, dancing, and shared meals reinforced cultural pride. Puerto Rican Spanish is her primary language, but she developed conversational English through her insurance career,
    enabling her to serve both local clients and tourists. The island’s rich culinary heritage—sopesas, mofongo, and the use of sofrito—shapes her cooking interests, while the rhythmic beats of salsa, plena,
    and bomba influence her love for dance. Diana’s cultural identity also includes a pragmatic outlook shaped by the island’s economic challenges; she values self‑reliance, financial security, and practical
    solutions, which align with her professional dedication to providing reliable insurance coverage for her community.
