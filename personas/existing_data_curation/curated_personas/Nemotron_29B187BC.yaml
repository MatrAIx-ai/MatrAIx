  career_goals: Diana aims to advance to a regional branch manager position within the next five years, leveraging her reliable track record and organized leadership style to oversee a team of agents. She
    is pursuing the Chartered Life Underwriter (CLU) designation to deepen her technical expertise and gain credibility in complex insurance solutions. Long‑term, she envisions opening a boutique agency
    that offers personalized coverage to local families, allowing her to create a stable, low‑stress work environment that aligns with her routine‑oriented lifestyle. Additionally, Diana is committed to
    mentoring younger, especially female, agents to foster a supportive community and improve retention in the industry.
