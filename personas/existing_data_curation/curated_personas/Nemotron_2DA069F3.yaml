  hobbies: '[''Metal sculpture'', ''Visiting art galleries and murals'', ''Cooking traditional Mexican dishes'', ''Gardening'', ''Reading design and technology magazines'', ''Hiking local trails'', ''Fishing'',
    ''Listening to Tejano music'', ''Family gatherings and cultural celebrations'']'
  career_goals: Carlos aims to move into a supervisory or training position within the next few years, where he can lead a team of fabricators, implement continuous‑improvement initiatives, and introduce
    artistic metalwork into the company's product line. He is pursuing an industrial safety certification and plans to enroll in a small‑business management course to eventually open his own boutique metal‑art
    studio, serving local businesses and community events while preserving his technical expertise.
