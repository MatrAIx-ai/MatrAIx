  career_goals: John aspires to advance into a supervisory or managerial role within retail, such as shift manager or store manager, where he can blend his operational expertise with his enthusiasm for
    creating an inviting, art‑infused shopping environment. He aims to lead a team, train new employees, and introduce community art displays in the store to foster local engagement. Looking farther ahead,
    John dreams of opening a small coffee‑and‑art space that serves as a gathering spot for residents to share ideas, hold workshops, and showcase regional artists. To support these ambitions, he plans
    to enroll in a part‑time management course at the nearby community college and seek mentorship from an experienced retail manager.
