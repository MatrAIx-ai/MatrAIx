    empathy'']'
  hobbies: '[''Reading speculative fiction'', ''Digital illustration'', ''Sketching abstract concepts'', ''Visiting art galleries'', ''Listening to experimental jazz and hip hop'', ''Writing poetry and
    journaling'', ''Playing chess and strategy board games'', ''Solving puzzles and brain teasers'', ''Exploring emerging tech (AI, VR)'', ''Cooking experimental dishes'', ''Mentoring local youth in creative
    workshops'']'
  career_goals: In the short term, William aims to obtain his high school equivalency and complete community college courses in business communication, positioning himself for a senior customer service
    role and eventual team lead promotion. He seeks internal recognition for performance, targeting top-performer awards and mentorship opportunities. Long term, he aspires to transition into product development
    or user experience research, where he can blend his analytical rigor with his love for novelty and abstract thinking. He envisions earning a bachelor's degree in marketing or communications, then securing
    a position that allows him to influence product design and brand strategy. Ultimately, William hopes to launch his own digital content platform that showcases artistic expression tied to social issues,
    providing both creative fulfillment and a voice for underrepresented communities.
