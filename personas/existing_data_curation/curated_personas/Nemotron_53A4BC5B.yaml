  hobbies: '[''Woodworking'', ''Gardening'', ''Hiking'', ''Reading historical non-fiction'', ''Playing chess'', ''Volunteering at community garden'', ''Attending country fairs'', ''Fishing'']'
  career_goals: Looking ahead, John aims to expand the program’s focus to include electric-vehicle maintenance and advanced manufacturing techniques, ensuring his students are prepared for the evolving
    job market in the Rust Belt. He aspires to take on a program-director role, where he can shape strategic partnerships with local businesses and secure funding for state-of-the-art workshop facilities.
    While valuing practical outcomes, he also plans to pursue a master's degree in education leadership to deepen his expertise in curriculum innovation and faculty development, all while maintaining a
    balanced work-life schedule that supports his family and community commitments.
