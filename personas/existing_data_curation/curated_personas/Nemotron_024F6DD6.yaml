personas:
  professional: Vy Lee is a data‑driven HR strategist who blends analytical rigor with empathetic people management, leveraging Excel, SQL, and HRIS expertise to design DEI programs and performance dashboards
    while their organized, methodical nature ensures meticulous execution of change‑management initiatives.
  sports: Vy Lee is an avid trail runner who logs weekly long runs in the Poway trail system, supports the San Diego Padres and San Diego Wave FC, and belongs to the San Diego Hiking and Running Club, balancing
    competitive spirit with restorative weekend hikes.
  arts: Vy Lee is a regular visitor to San Diego’s contemporary galleries, practices traditional calligraphy on the side, and finds inspiration from artists like Ai Weiwei, Yayoi Kusama, and the ambient
    soundscapes of Brian Eno, shaping their creative outlook.
  travel: Vy Lee prefers meticulously planned cultural trips, having explored Kyoto’s temples, the coastal villages of Cinque Terre, and a recent road‑trip through Arizona’s red‑rock parks, while dreaming
    of a future solo trek across Iceland’s volcanic landscapes.
  culinary: Vy Lee is a confident home chef who crafts Korean‑Southern‑California fusion dishes such as kimchi‑topped avocado toast and gochujang‑glazed salmon tacos, experimenting with miso, citrus, and
    fresh herbs while sourcing ingredients from local farmers’ markets.
  core: Vy Lee blends analytical HR leadership with an artistic curiosity, balancing meticulous data‑driven work by day with nightly calligraphy, fusion cooking, and trail runs, though they sometimes forget
    to schedule routine health check‑ups.
background:
  cultural: Vy is the daughter of Korean immigrants who settled in Southern California in the 1980s. Her upbringing emphasized respect for elders, the importance of education, and a collectivist sense of
    family responsibility. She celebrates Korean holidays such as Chuseok and Lunar New Year while also embracing the multicultural environment of San Diego. This blend of Korean heritage and American life
    influences her values of harmony, cooperation, and appreciation for diverse perspectives, which she brings to both her professional and personal interactions.
