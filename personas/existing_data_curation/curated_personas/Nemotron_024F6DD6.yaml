  career_goals: Vy aims to advance to a senior HR leadership role—such as HR Director or VP of People—within a technology‑focused organization. She wants to champion data‑centric HR strategies, expand diversity,
    equity, and inclusion programs, and build a culture of continuous learning. Over the next five years she plans to earn certifications in HR analytics and strategic HR, mentor emerging HR professionals,
    and spearhead initiatives that align employee experience with the company’s innovation goals.
