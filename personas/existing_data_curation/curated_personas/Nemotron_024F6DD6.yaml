  hobbies: '[''Visiting art museums'', ''Calligraphy'', ''Hiking in Torrey Pines'', ''Cooking fusion cuisine'', ''Reading science fiction'', ''Photography'', ''Yoga'', ''Learning Mandarin'', ''Gardening'',
