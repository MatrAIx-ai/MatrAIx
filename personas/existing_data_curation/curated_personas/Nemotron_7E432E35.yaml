  career_goals: Shankar aims to move from frontline housekeeping to a supervisory role within a cleaning company, eventually overseeing a small team and coordinating schedules for multiple clients. He plans
    to obtain a Certified Professional Cleaner credential and a Green Cleaning Technician certification to deepen his expertise and boost his marketability. In the longer term, he dreams of starting his
    own neighborhood cleaning service that emphasizes reliability, cultural sensitivity, and environmentally safe practices. Financially, he wants to increase his earnings to support his children’s higher‑education
    goals and to provide a more stable, less stressful livelihood for his family. He also hopes to improve his organizational habits to reduce personal anxiety and enhance work‑life balance.
