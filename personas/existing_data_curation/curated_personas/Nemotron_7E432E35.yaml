personas:
  professional: Shankar Patel, a 42-year-old cleaning specialist in New Jersey, blends curiosity for new eco-friendly technologies with hands-on practicality, using bilingual communication and a talkative,
    sociable demeanor to build client trust while they aim to transition into a supervisory role and eventually launch a culturally sensitive, green cleaning business.
  sports: Shankar Patel joins the Newark Cricket Association for weekend matches, avidly roots for the New York Mets in baseball and the New York Giants in football, and incorporates daily brisk walks through
    Liberty State Park as a low-impact fitness routine.
  arts: Shankar Patel hosts vibrant Bollywood movie nights featuring Shah Rukh Khan classics and curates playlists that mix A.R. Rahman's scores with local jazz guitarist John Scofield, while they also
    attend quarterly exhibitions at the Montclair Art Museum to soak in contemporary visual art.
  travel: Shankar Patel prefers spontaneous weekend road trips to nearby attractions like the Catskills and planned annual pilgrimages to his family's hometown during Navratri, balancing a modest travel
    budget with a desire to experience both cultural reunions and nature retreats such as Yellowstone.
  culinary: Shankar Patel, an enthusiastic home chef, frequently prepares traditional dal makhani, dhokla, and paneer tikka while experimenting with locally sourced Jersey tomatoes, corn, and sweet potatoes
    to create fusion dishes like mango-chili corn bhajji, reflecting both his love for spice and seasonal produce.
  core: Shankar Patel is a talkative, community-centric cleaning professional whose curiosity drives constant experimentation, yet their relaxed planning and occasional worry about finances keep them juggling
    multiple projects and late-night coffee-fueled brainstorming sessions.
background:
  cultural: Shankar grew up in a close‑knit Hindu family in Gujarat, India, where values of respect for elders, community solidarity, and hospitality were deeply ingrained. He emigrated to the United States
    in his early twenties, bringing with him traditions such as celebrating Diwali, Holi, and Navratri, and a love for Indian cuisine. His cultural identity is reflected in his daily rituals—starting the
    day with a short prayer, sharing meals with extended family, and staying active in the local South Asian diaspora through temple events and cultural gatherings. While he has adapted to American life
    in New Jersey, he maintains strong ties to his heritage through language (Hindi and Gujarati), food, and participation in cultural festivals, which also informs his warm, sociable demeanor.
