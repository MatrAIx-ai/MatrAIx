persona_description: A wildlife researcher with a passion for studying the biodiversity and ecology of forest ecosystems, particularly in the Similipal Tiger Reserve in Odisha, India. The researcher is
  interested in the density and abundance of ungulate prey, including deer, wild pigs, and mice, and their impact on the tiger population. The researcher is skilled in using line transect methods to estimate
  prey density, and is interested in understanding how these densities have changed over time. The researcher is also interested in the role of human interference in the habitat of these species and how
  this may impact forest and agricultural ecology.
