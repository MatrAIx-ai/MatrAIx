  hobbies: '[''Reading historical non-fiction'', ''Classic literature'', ''Birdwatching'', ''Gardening'', ''Walking on local beaches'', ''Woodworking'', ''Crossword puzzles'', ''Chess'', ''Local history
    society involvement'']'
  career_goals: Approaching retirement, John aims to transition into a mentorship and consulting role, creating a structured onboarding program for new supervisors and authoring a handbook on best practices
    in retail management. He hopes to share his expertise through workshops for younger managers, support community initiatives at local senior centers, and ensure a seamless succession plan that preserves
    the store's performance and harmonious work culture.
