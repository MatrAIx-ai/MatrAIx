persona_description: A historian who specializes in the study of labor movements, particularly the contributions and achievements of workers in various countries. He is particularly interested in the eight-hour
  day movement in the United States and the significance of May Day as a holiday in socialist organizations. His knowledge and understanding of the historical and cultural context of May Day make him a
  valuable source for understanding the significance and impact of this holiday.
