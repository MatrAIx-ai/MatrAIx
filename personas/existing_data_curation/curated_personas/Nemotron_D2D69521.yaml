  hobbies: '[''Abstract painting'', ''Sketching'', ''Visiting art museums and galleries'', ''Reading speculative fiction and philosophy'', ''Yoga and meditation'', ''Herb and succulent gardening'', ''Creative
    cooking'', ''Volunteering at art‑therapy programs'', ''Exploring live music and theater events'', ''Spontaneous weekend road trips'']'
  career_goals: Silvana aims to become a leader in community health innovation within Philadelphia. She envisions establishing a multidisciplinary clinic that blends conventional primary care with artistic
    and integrative therapies, improving mental and emotional well‑being. To support this vision, she plans to pursue a Doctor of Nursing Practice (DNP) degree focusing on health service design and to secure
    grant funding for research on the impact of creative interventions on chronic disease outcomes. She also aspires to mentor junior nurse practitioners, publish articles on patient‑centered design, and
    eventually assume a director‑level role that shapes policy for holistic care delivery.
