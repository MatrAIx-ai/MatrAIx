  career_goals: Even at seven, Sunder dreams of becoming a robotics engineer or software developer who can design robots that win local competitions. He aims to lead his class’s science fair projects, earn
    top honors in math contests, and one day build technology that helps solve real‑world problems, fueling his competitive spirit and desire for personal achievement.
