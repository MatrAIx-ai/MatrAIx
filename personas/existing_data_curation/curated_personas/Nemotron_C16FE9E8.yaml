personas:
  professional: Sunder Hossain, a budding LEGO engineer, combines a love for building moving‑set models with strategic video game planning, channeling curiosity and practical organization into early prototype
    designs that impress classmates and teachers alike, and they often document their builds in a notebook.
  sports: Sunder Hossain, a spirited member of the Williamsburg Youth Soccer Club, practices dribbling drills after school, cheers for the Washington Capitals and New York Yankees, and they balance competitive
    drive on the field with a cautious approach to injury, often stretching before games.
  arts: Sunder Hossain delights in the imaginative worlds of The LEGO Movie, the adventurous tales of Star Wars, and the whimsical music of Disney soundtracks, and they often reenact favorite scenes using
    LEGO bricks, showcasing a critical eye for detail and competitive storytelling.
  travel: Sunder Hossain prefers family trips that blend adventure with learning, having explored Colonial Williamsburg, the natural trails of Shenandoah National Park, and dreaming of a future visit to
    Tokyo's futuristic districts, while they meticulously plan itineraries with maps and checklists.
  culinary: Sunder Hossain favors cheesy macaroni, pepperoni pizza, and homemade chicken nuggets, can assemble a simple peanut butter and jelly sandwich with surprising precision, yet they are picky about
    vegetables, often refusing broccoli, reflecting a practical taste palate shaped by comfort foods.
  core: Sunder Hossain is a curious, competitive 7‑year‑old who builds moving LEGO sets, masters puzzles, worries about perfection, balances a love of structured play with occasional impulsive splurges,
    and they often seek new challenges.
background:
  cultural: Sunder comes from a South Asian family with roots in Bangladesh, bringing a rich blend of cultural traditions to his life in Williamsburg, Iowa. His household celebrates festivals such as Eid
    and Durga Puja, and he occasionally hears Bengali lullabies and stories at home. While he speaks fluent English at school, he also understands basic Bengali phrases taught by his parents. This multicultural
    environment nurtures a respect for family values, a strong emphasis on education, and a curiosity about both his heritage and the broader world.
