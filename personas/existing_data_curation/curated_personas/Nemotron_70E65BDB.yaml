personas:
  professional: Alaric Lee is an aspiring automotive technician who blends hands-on mechanical know-how - oil changes, tire rotations, and simple diagnostic work - with a naturally organized, responsibility-driven
    mindset honed through volunteering at the neighborhood food bank, making them a dependable candidate for future apprenticeships.
  sports: Alaric Lee plays pickup basketball at a nearby park with a close-knit group, follows the Houston Rockets and the Houston Astros for professional inspiration, and maintains a modest fitness routine
    by shooting free throws twice a week and jogging in the evenings before school.
  arts: Alaric Lee curates their soundtrack with hip-hop icons like Kendrick Lamar and J. Cole, finds solace in R&B singers such as H.E.R., indulges in graphic novels like "Saga" and "Ms. Marvel" for visual
    storytelling, and occasionally attends intimate shows at local Houston venues featuring emerging rap talent.
  travel: Alaric Lee prefers budget-friendly road trips, having driven to Austin for live-music festivals, explored New Orleans' historic French Quarter for its jazz and culinary scene, and dreaming of
    a future visit to Detroit's Henry Ford Museum to deepen their automotive passion, all while balancing travel with school responsibilities.
  culinary: Alaric Lee confidently prepares Southern staples such as collard greens seasoned with smoked paprika, a hearty gumbo thickened with okra, and smoked brisket glazed with a sweet-spicy BBQ sauce,
    often experimenting with extra hot sauce even as they sometimes over-salt the beans.
  core: Alaric Lee blends a disciplined, community-oriented mindset with a love for detailed hobbies - gaming narratives, LEGO builds, and flavor-rich cooking - yet occasionally over-commits to projects,
    forgets to rest, and indulges in late-night snack runs.
background:
  cultural: Alaric is an African‑American teenager raised in Houston's diverse, historically Black neighborhoods of Harris County. He grew up immersed in Southern Black cultural traditions, including church
    gatherings, soulful cuisine like collard greens, gumbo, and smoked brisket, and the local hip‑hop scene. Family and church have reinforced values of humility, cooperation, and community resilience.
    While he prefers quieter settings, he remains connected to his cultural roots through family celebrations, community center events, and the shared language patterns of African‑American Vernacular English
    common in his peer group.
attributes:
  skills: '["Basic computer operation","Internet research","Troubleshooting electronics","Routine automotive maintenance","Cooking familiar family dishes","Time‑management and scheduling","Peer tutoring
    and mentorship","Cash handling for small errands","Teamwork in small‑group settings"]'
  hobbies: '["Video gaming (solo and small‑group)","Hip‑hop & R&B music","Reading graphic novels and sci‑fi books","Model car and LEGO building","Pickup basketball with a small group","Cooking Southern
    family recipes","Volunteering at the local food bank"]'
  career_goals: Alaric aims to earn his GED within the next two years and then enroll in a vocational program focused on automotive technology or HVAC systems. He wants to secure an apprenticeship after
    the program, become a licensed technician, and eventually run his own small repair shop to provide reliable services to his community. In parallel, he hopes to remain a mentor for younger kids at the
    local community center, using his organizational skills to run after‑school workshops. The stability of a trade career appeals to his desire for structure, while the community‑service aspect aligns
    with his cooperative nature.
