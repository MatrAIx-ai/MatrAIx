personas:
  professional: Aaron Irizarry is a pharmacy technician at a busy community pharmacy who combines meticulous compounding expertise, fluent Spanish patient counseling, and an artistic problem‑solving mindset
    to streamline workflows, train new staff, and pursue certification in sterile compounding with the goal of leading a culturally responsive pharmacy.
  sports: Aaron Irizarry avidly follows the Houston Astros, Rockets, and Texans, participates in a weekend running club that meets at Memorial Park, and hikes the Sam Houston National Forest on Saturdays,
    treating fitness as a structured yet solitary escape from the pharmacy floor.
  arts: Aaron Irizarry spends weekends strolling through Houston’s mural districts, sketching urban landscapes while listening to Natalia Lafourcade and The Strokes, draws creative inspiration from Frida
    Kahlo’s vibrant storytelling, and regularly visits exhibitions at the Contemporary Arts Museum Houston.
  travel: Aaron Irizarry prefers meticulously planned road trips that blend cultural immersion and artistic discovery, having explored Oaxaca’s bustling markets and San Antonio’s historic missions, while
    dreaming of a solo backpacking journey through Barcelona’s street‑art neighborhoods.
  culinary: Aaron Irizarry cooks at an intermediate level, reinventing classic dishes such as carnitas tacos with chipotle‑mango salsa and a dark chocolate‑infused mole, savoring fresh cilantro, roasted
    corn, and occasionally rewarding himself with sushi after a demanding shift.
  core: Aaron Irizarry balances a disciplined pharmacy career with a solitary love for sketching murals, meticulous budgeting yet occasional indulgence in art supplies, and channels cultural pride into
    bilingual health outreach while navigating occasional sleep‑loss from late‑night creativity.
background:
  cultural: Aaron grew up in a Mexican‑American household in Houston’s East End, where Spanish was spoken at home and family gatherings centered around traditional foods, music, and celebrations like Día
    de los Muertos and Cinco de Mayo. His parents immigrated from the state of Jalisco, instilling a strong sense of cultural pride and community responsibility. While his formal schooling was limited,
    he learned practical skills through family trade work and community programs. Living in a multicultural city, Aaron blends Mexican customs with Texan influences, often participating in local festivals,
    supporting bilingual community initiatives, and maintaining close ties with extended family. His cultural identity informs his compassionate approach to patient care, especially for Spanish‑speaking
    clients, and fuels his desire to give back through health education and culturally relevant services.
attributes:
  skills: '[''Medication dispensing'', ''Prescription verification'', ''Compounding (sterile & non-sterile)'', ''Pharmacy software (PioneerRX, QS/1)'', ''Inventory management'', ''HIPAA & OSHA compliance'',
    ''Bilingual patient counseling (Spanish/English)'', ''Medication adherence counseling'', ''Quality control and accuracy checks'', ''Staff training and mentorship'', ''Continuous learning on new drug
    therapies'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Sketching and digital illustration'', ''Cooking Mexican cuisine with creative variations'', ''Listening to diverse music genres'', ''Reading
    science and health podcasts'', ''Attending local science talks'', ''Journaling and puzzle solving'', ''Hiking in nature preserves'', ''Volunteering at community health fairs'', ''Mentoring youth in
    the neighborhood'']'
  career_goals: Aaron aims to become a certified pharmacy technician (CPhT) and eventually pursue a bachelor's degree in health sciences so he can qualify for a pharmacy technician supervisory role. In
    the next five years, he hopes to obtain certification in sterile compounding and take on responsibilities as a lead technician, overseeing inventory, training, and quality assurance. He is also interested
    in developing a community health outreach program that provides medication education and free health screenings to underserved Mexican‑American neighborhoods in Houston. Long‑term, he envisions opening
    a culturally responsive pharmacy that blends his love for art and health by offering health‑focused workshops, art‑therapy sessions, and bilingual educational materials.
