personas:
  professional: Sonya Johnston, a veteran producer‑director in regional film and television, blends two decades of script development, crew coordination, and post‑production mastery with a curiosity for
    drone and VR storytelling while maintaining pragmatic budget discipline and a relaxed, sometimes disorganized, workflow that still delivers on time.
  sports: Sonya Johnston’s athletic life centers on solitary activities like early‑morning river kayaking with the Ouachita River Kayak Club and weekend tennis at the West Monroe Community Tennis Club,
    while they avidly follow the New Orleans Saints, LSU Tigers football, and New Orleans Pelicans, cheering from home during the season.
  arts: Sonya Johnston’s artistic world intertwines photography of Louisiana’s mist‑soaked bayous, quilting inspired by traditional patterns, and a deep devotion to jazz and blues legends such as Louis
    Armstrong, B.B. King, and the Preservation Hall Jazz Band, which soundtracks their walks through nature reserves.
  travel: Sonya Johnston prefers low‑key, solo journeys that blend heritage research with natural scenery, having trekked the historic streets of New Orleans’ French Quarter, the antebellum charm of Savannah,
    the lavender fields of Provence, and the quiet temples of Kyoto, while future plans include a road‑trip along the Great River Road to capture the state’s riverine folklore.
  culinary: Sonya Johnston’s kitchen showcases a seasoned command of Southern staples—fried catfish, collard greens, and cornbread—paired with adventurous Cajun dishes like shrimp étouffée and gumbo seasoned
    with home‑grown okra and andouille sausage, reflecting a modest but confident cooking skill that embraces heirloom vegetables from their garden.
  core: Sonya Johnston embodies a calm, curiosity‑driven filmmaker who balances solitary reflection, modest spending, and a relaxed approach to obligations while quietly championing Louisiana’s stories
    through lens, garden, and garden‑table.
background:
  cultural: Sonya grew up in a small, predominantly white community in northern Louisiana, where the values of self‑reliance, modesty, and hospitality were woven into daily life. Her family’s roots trace
    back several generations to the post‑Civil‑War settlement of the region, giving her a deep appreciation for local traditions and oral histories. While she identifies with broader Southern cultural norms—such
    as an emphasis on community, church participation, and a love for regional cuisine—her career in media has exposed her to a wide range of perspectives, fostering a balanced view that respects both her
    heritage and the diverse stories she seeks to tell. The quiet, rural environment of West Monroe shapes her preference for solitude and reflective spaces, while the vibrant cultural tapestry of Louisiana,
    including Cajun and Creole influences, informs her artistic sensibilities.
