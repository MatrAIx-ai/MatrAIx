  hobbies: '[''Gardening'',''Birdwatching'',''Historical Non-fiction Reading'',''Southern Cooking'',''Photography'',''Quilting'',''Local History Research'',''Nature Walks'',''Jazz & Blues Listening'',''Genealogy'']'
  career_goals: Sonya aims to establish an independent production house that focuses on documentary and narrative projects highlighting the cultural and natural heritage of Ouachita Parish and the broader
    North Louisiana region. She hopes to produce a feature‑length documentary series on the histories of rural Louisiana families, leveraging her interest in genealogy and local history. In parallel, she
    plans to mentor emerging filmmakers through workshops at the community college she once attended, eventually teaching a part‑time course on low‑budget storytelling. Long‑term, she envisions her company
    becoming a hub for collaborative, low‑key productions that respect both creative curiosity and practical resource management.
