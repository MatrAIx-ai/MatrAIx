    (EV) battery and powertrain repair'']'
  hobbies: '[''Restoring classic cars'', ''Attending automotive and art exhibitions'', ''Photography (automotive and landscape)'', ''Painting and sketching'', ''Playing pickup basketball and softball'',
    ''Hiking Sonoran desert trails'', ''Volunteer stagehand for community theater'', ''Mentoring youth in vocational programs'']'
  career_goals: Randy aims to achieve ASE Master Technician certification within the next year to formalize his expertise. He aspires to become the lead mechanic at his current shop, overseeing a team and
    shaping service standards. In the longer term, Randy envisions opening his own boutique garage that specializes in both classic car restoration and emerging electric vehicle technologies, integrating
    sustainable practices like solar‑powered diagnostics. He also hopes to mentor the next generation of mechanics by establishing a local apprenticeship program and occasionally teaching introductory automotive
    courses at a community college.
