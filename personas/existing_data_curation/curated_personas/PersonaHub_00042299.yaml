persona_description: A botanist or environmental scientist interested in native plant species, particularly those found in wetland habitats. This persona is knowledgeable about the characteristics, benefits,
  and risks associated with native plants and their role in wetland ecosystems. They may be interested in studying the interactions between native plants and their natural environments, as well as the potential
  impacts of invasive species on wetland biodiversity. This persona is also likely to be familiar with the U.S. Army Corps of Engineers National Wetland Plant List and other resources for identifying and
  studying native plants in wetland environments.
