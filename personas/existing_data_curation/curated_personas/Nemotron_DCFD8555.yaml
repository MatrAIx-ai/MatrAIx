personas:
  professional: Leonica Manghram, a 26‑year‑old residential and short‑term‑rental cleaning specialist in Savannah, merges meticulous eco‑friendly cleaning expertise with a sharp eye for historic interior
    aesthetics and a competitive drive to become the top housekeeping supervisor, balancing rigorous organization with a curious, art‑inspired flexibility.
  sports: Leonica Manghram stays active through early‑morning jogs with the Savannah Trail Runners club, weekly yoga sessions at Downtown Savannah Yoga, and cheering for the Savannah Bananas during summer
    exhibition games, while they rarely join organized team sports, favoring solitary routines that match their reserved yet disciplined nature.
  arts: Leonica Manghram immerses herself in Savannah’s vibrant art scene by frequenting SCAD Museum exhibitions, exploring murals by local artists such as Big T and MadArt, drawing inspiration from poets
    like Tracy K. Smith and musicians such as Amy Winehouse, and regularly contributing sketches and photographs to an intimate four‑person book club where their competitive eye for composition sparks lively
    debates.
  travel: Leonica Manghram prefers culturally rich, low‑key getaways, often planning weekend train trips to Charleston and Asheville and day‑long road excursions to historic Savannah districts, while dreaming
    of a solo exploration of Barcelona’s Gothic Quarter, budgeting meticulously through a spreadsheet and opting for affordable guesthouse stays over luxury hotels.
  culinary: Leonica Manghram enjoys cooking Southern staples such as shrimp and grits and fried chicken, elevating them with bold spices like smoked paprika, sumac, and harissa, plating each dish with precision
    inspired by cooking shows like Chef’s Table, and often garnishing with fresh basil and thyme from their balcony herb garden.
  core: Leonica Manghram is a detail‑obsessed cleaner with an artist’s eye and a competitive streak, who meticulously stages every room they touch while secretly rearranging furniture at friends’ houses
    for the thrill of perfection.
background:
  cultural: Leonica is an African‑American woman whose family has deep roots in Savannah, Georgia. Growing up in a close‑knit Black community, she experienced the rich traditions of Southern hospitality,
    gospel music, and soul food that were celebrated at church gatherings, Juneteenth festivities, and Black History Month events. The historic African‑American neighborhoods of Savannah, such as Beach
    Street and the Westside, shaped her sense of pride and place. She draws artistic inspiration from Black Southern writers and visual artists, often attending local cultural events that honor her heritage.
    This background instills in her a strong work ethic, resilience, and a commitment to serving her community with dignity and excellence.
attributes:
  skills: '["Residential cleaning", "Deep‑cleaning techniques", "Eco‑friendly product usage", "Time and task scheduling", "Inventory management", "Basic home maintenance", "Customer service", "Detail orientation",
    "Observational awareness", "Basic photo editing", "Art appreciation", "Digital organization"]'
  hobbies: '["Art gallery visits", "Sketching and drawing", "Photography", "Reading contemporary fiction and African‑American literature", "Small‑group book club", "Cooking Southern cuisine with a modern
    twist", "Journaling", "Home yoga practice", "Balcony gardening", "Sustainable living workshops"]'
  career_goals: Leonica aims to become a certified housekeeping supervisor within the next two years, earning credentials such as the IICRC Cleaning Technician and Green Cleaning Specialist certifications.
    She plans to complete her associate degree in Hospitality Management or Business Administration, which will open pathways to property‑management and home‑staging roles. Leveraging her art interest,
    she envisions launching a boutique cleaning‑and‑staging service that caters to Savannah’s historic homes, combining meticulous cleaning with curated interior aesthetics. In the short term, she strives
    to be the top performer on her current team, earning employee‑of‑the‑month recognitions and building a reputation for reliability, quality, and innovative problem‑solving.
