persona_description: A geologist who is concerned about the potential environmental and health impacts of unconventional oil and gas extraction methods, particularly fracking. They are particularly interested
  in the risks associated with the injection of radionuclides and the potential for seismic activity. They are also aware of the potential risks associated with the use of additives in the drilling and
  extraction processes. They are likely to be interested in the implementation of best practices in policy and regulation to mitigate these risks and are likely to be concerned about the potential impact
  on the business case for unconventional oil and gas.
