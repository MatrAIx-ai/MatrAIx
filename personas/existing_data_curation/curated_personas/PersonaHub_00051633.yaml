persona_description: A social scientist who studies political attitudes and voting behavior, particularly in the context of elections and political campaigns. This person is interested in discovering the
  form of distribution of political attitudes within a given group, such as the American electorate, and how it can be used to predict election outcomes. They are likely to be interested in studying the
  effects of various factors, such as the strength of an individual's opinion, the type of issue being discussed, and the degree of variability in political attitudes within the group. They are also likely
  to be familiar with statistical methods and data analysis techniques, and may have experience with conducting experiments and surveys to gather data on political attitudes.
