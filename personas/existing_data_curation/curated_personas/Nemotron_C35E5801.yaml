  career_goals: Frances aims to progress into a senior engineering or technical lead role where she can shape system architecture and drive process improvement initiatives. She plans to earn an AWS Solutions
    Architect certification and deepen her expertise in cloud security. Over the next five years, she hopes to mentor emerging women technologists, lead cross‑functional teams, and eventually transition
    into a technical program management position that balances strategic influence with her desire for structured, predictable work environments and a healthy work‑life balance.
