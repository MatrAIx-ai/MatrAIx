personas:
  professional: Frances Thornton, a meticulous full‑stack software engineer, leverages their methodical project‑planning and risk‑assessment skills to design scalable cloud architectures while championing
    clear documentation and dependable CI/CD pipelines, embodying the same reliability and community‑oriented mindset they cultivated in their tightly‑knit suburban upbringing.
  sports: Frances Thornton, an avid hiker of the Wasatch ranges and devoted yoga practitioner, supports the Utah Jazz and Real Salt Lake, joins a local weekend trail‑run club for cardio, and follows a structured
    workout schedule that balances mountain cardio with strength training to maintain predictability in their fitness routine.
  arts: Frances Thornton, who unwinds by delving into science‑fiction works by authors like N.K. Jemisin and watching performances by the Utah Symphony, also enjoys board game nights featuring Settlers
    of Catan with close friends, and finds solace in the ambient folk sounds of Bon Iver and the minimalist piano pieces of Philip Glass.
  travel: Frances Thornton favors meticulously planned trips that blend outdoor adventure with cultural immersion, having trekked the Icelandic Highlands and explored the Swiss Alps, they now dream of a
    guided trek through Patagonia while budgeting carefully to keep their travel within a sustainable mid‑30s savings plan.
  culinary: Frances Thornton, a competent home cook, loves harvesting cherry tomatoes from their low‑maintenance garden to craft fresh caprese salads, pairs them with grilled salmon and quinoa bowls, and
    indulges in occasional Swiss cheese fondue nights, while relying on meal‑prep routines to maintain nutritional predictability.
  core: Frances Thornton combines a love of structured problem‑solving with a quiet, risk‑averse demeanor, juggling a knack for meticulous engineering, a habit of over‑planning, and a lingering tendency
    to ruminate over minor setbacks.
background:
  cultural: Frances grew up in a middle‑class, predominantly white suburb of Utah, with German‑Scandinavian ancestry and a secular upbringing that still respected the region's strong community values. While
    not religious herself, she is familiar with the cultural rhythms of the LDS majority and appreciates the emphasis on family, reliability, and service. Her upbringing reinforced a practical, independent
    outlook and an appreciation for the outdoors that is characteristic of Salt Lake City life. These cultural influences, combined with her analytical STEM education, shape her blend of pragmatic ambition
    and a desire for structured, supportive communities.
