  career_goals: He aims to build a stable, hands‑on career that blends his curiosity for how things work with his practical outlook. In the next two years he plans to enroll in a community‑college vocational
    program in renewable energy technology or HVAC, earn a certification, and secure an entry‑level field technician role with a local utility or service company. Long‑term, he hopes to run his own small‑scale
    maintenance and solar‑installation business serving rural households in Conejos County, while staying close to his community and maintaining a balanced, low‑stress lifestyle.
