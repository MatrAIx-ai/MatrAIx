personas:
  professional: Krishna Suttleff, a budding junior scientist in the sandbox, merges an insatiable curiosity about how toy blocks interlock with a practical habit of sorting them by color before play, though
    they often leave a few scattered due to a relaxed attitude toward tidy up.
  sports: Krishna Suttleff participates in the Bright Beginnings Soccer Club, fiercely competing in sandbox races against neighborhood friends, they cheer for the nearby professional baseball team the Chicago
    Cubs, and, despite a tendency to forget their water bottle, always want to be the first to start a game, showcasing a competitive spirit over cooperative play.
  arts: Krishna Suttleff loves listening to children's musician Raffi and the playful tunes of The Wiggles, they often draw vibrant crayon dinosaurs inspired by the animated series Octonauts, humming Baby
    Shark during snack time, and proudly display their latest artwork on the refrigerator.
  travel: Krishna Suttleff enjoys spontaneous trips to the local zoo and the family's annual beach getaway to Destin, Florida, they prefer unstructured sandcastle building over strict itineraries, while
    dreaming of visiting Disneyland and the Eiffel Tower someday, yet their parents' budgeting sometimes limits the scope of these adventures.
  culinary: Krishna Suttleff prefers peanut butter and banana sandwiches, they delight in cheesy mac and cheese, can butter toast with surprising dexterity for a three-year-old, yet they stubbornly refuse
    broccoli unless it’s cut into dinosaur shapes, reflecting a selective palate and a playful approach to food.
  core: Krishna Suttleff is a curious, practical three-year-old who balances imaginative play with a love for order; they compete eagerly in games, occasionally rebel against routines, and navigate the
    world with a mix of skepticism and resilience.
background:
  cultural: Krishna is raised in an African American family in Macon, GA. His upbringing is steeped in the Southern Black tradition of church‑centered community, gospel music, and storytelling. Family gatherings
    feature soulful food, music, and oral histories that celebrate resilience and creativity, shaping his early worldview and sense of identity.
