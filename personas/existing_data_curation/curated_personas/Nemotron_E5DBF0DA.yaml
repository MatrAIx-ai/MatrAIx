  career_goals: Even at three, Krishna often talks about big‑dream jobs. He loves pretending to be a firefighter who rescues people, an astronaut who explores space, or a builder who constructs tall towers.
    These imaginings reflect his curiosity about how things work and his desire to help others, hinting at future ambitions in safety, exploration, or engineering.
