personas:
  professional: Terri Ashman, a senior IT strategist and community tech mentor, blends graduate-level business acumen with hands‑on expertise in hardware, software, and network troubleshooting to design
    cost‑effective solutions, lead disciplined help‑desk teams, deliver clear training for seniors, and foster a collaborative, curiosity‑driven environment that encourages practical learning and mentorship.
  sports: Terri Ashman stays fit through weekly ballroom and swing dance classes at the community center, cheers on the Milwaukee Bucks during the basketball season, and supplements dancing with low‑impact
    senior yoga, though their packed schedule sometimes leads them to skip a stretching session.
  arts: Terri Ashman immerses in classic Motown hits by Diana Ross, jazz sessions at local clubs featuring saxophonist Alex Johnson, and enriches their literary palate with contemporary fiction and works
    by Toni Morrison in a lively book club, while occasionally attending community theater productions that fuel their creative spark.
  travel: Terri Ashman favors organized road trips to Midwestern historic towns like Galena and the jazz‑rich streets of New Orleans, balances travel planning with a modest budget and family commitments,
    and dreams of a guided tour of Detroit’s Motown legacy next summer.
  culinary: Terri Ashman loves preparing soul‑food staples such as collard greens simmered with smoked turkey, sweet potato pie, and cornbread, seasoning each dish with fresh herbs from their garden like
    thyme and rosemary, and while their cooking is lovingly received at neighborhood potlucks, they occasionally over‑season in the excitement of sharing.
  core: Terri Ashman blends tech expertise with vibrant community involvement, balancing disciplined organization and curiosity with lively dancing, gardening, and occasional record‑shop splurges, all while
    mentoring the next generation of IT professionals.
background:
  cultural: Terri is a Black woman who grew up in Milwaukee during the civil‑rights era, witnessing the power of community activism and the importance of education as a pathway to empowerment. Her cultural
    identity is rooted in African‑American traditions of storytelling, music, and communal support, often expressed through church involvement, family gatherings, and participation in local cultural events
    such as Juneteenth celebrations and Black History Month programs. She values intergenerational mentorship, drawing on her heritage to foster harmony, cooperation, and mutual respect within her family
    and professional circles. Terri’s background informs her commitment to bridging the digital divide, ensuring that technology serves as an inclusive tool that uplifts her community.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware repair and maintenance'', ''Software installation and configuration'', ''Network setup and security'', ''Help‑desk ticket management'', ''Customer service
    and communication'', ''IT training and mentorship'', ''Process improvement and workflow analysis'', ''Project management'', ''Budgeting and cost analysis'', ''Vendor negotiation'', ''Documentation and
    SOP development'', ''Data backup and recovery'', ''Basic cybersecurity awareness'', ''Digital literacy instruction'']'
  hobbies: '[''Book club (African‑American literature)'', ''Gardening (herbs and vegetables)'', ''Cooking soul‑food with husband'', ''Attending live jazz and Motown concerts'', ''Ballroom and swing dancing
    classes'', ''Volunteering at senior center for digital literacy'', ''Participating in African American historical society events'', ''Technology workshops and webinars'']'
  career_goals: Terri aims to leverage her extensive experience to mentor the next generation of IT professionals, especially those from underrepresented backgrounds, by establishing a community‑based technology
    mentorship program in Milwaukee. She plans to transition into a senior advisory role within her organization, guiding strategic initiatives that improve technology accessibility for seniors and small
    businesses. Additionally, she hopes to author a concise guide on practical computer support for everyday users and to volunteer regularly at local senior centers, teaching basic digital skills and fostering
    intergenerational learning.
