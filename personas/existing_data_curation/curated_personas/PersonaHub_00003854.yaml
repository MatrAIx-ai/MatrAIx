persona_description: A powder coating application professional who has extensive experience in controlling film thickness during the application process. They understand the importance of earth ground,
  hook and hanger points, part geometry, gun flow rate, distance from the part, and training in manual application. They are familiar with the National Fire Protection Association and Powder Coating Institute
  recommendations for efficient application and have a deep understanding of the electrostatic behavior of the powder and the Faraday cage effect. They are skilled at optimizing gun settings, maintaining
  a good flow rate, and keeping the gun in good repair to achieve consistent film thickness. They are also familiar with the PCI handbook and the Chemical Coaters Association International's powder coating
  manual, and may have attended regular workshops on application and spray control.
