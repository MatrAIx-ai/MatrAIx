personas:
  professional: Nicholas Adams is a budding ten‑year‑old world‑builder, weaving intricate fantasy maps on paper and in LEGO, whose natural curiosity fuels early experiments with game design and simple Scratch
    animations, making them a future creative technologist in the making.
  sports: Nicholas Adams enjoys low‑impact fitness through weekend hikes around Red Rock Canyon, proudly cheering for the Las Vegas Golden Knights and the Las Vegas Raiders while they occasionally practice
    soccer drills with the Clark County Junior Soccer Club, preferring solitary trail runs over team sports.
  arts: Nicholas Adams delves into creative expression by sketching dragons and starships inspired by authors like Brandon Sanderson and J.K. Rowling, listening to piano pieces by Yiruma and Ludovico Einaudi
    while they experiment with Scratch animations reminiscent of Hayao Miyazaki’s storytelling, and they adore the music of Imagine Dragons and the artwork of Alex Ross.
  travel: Nicholas Adams prefers thoughtfully planned trips, having explored the Grand Canyon and Las Vegas’s Neon Museum with their family, while dreaming of a future adventure to Kyoto’s Gion district
    to see traditional tea houses and the futuristic Akihabara district, balancing a love for desert landscapes with a curiosity for far‑off cultures.
  culinary: Nicholas Adams delights in building his own pizza with mozzarella, pepperoni, and fresh basil, whipping up quick cheese quesadillas and strawberry‑banana smoothies in the kitchen, yet they frequently
    snack on chocolate chip cookies and sugary cereal, showing a penchant for both creative cooking and indulgent treats.
  core: Nicholas Adams is an imaginative ten‑year‑old who channels boundless curiosity into fantasy art, LEGO, and coding while battling a sweet‑tooth habit and occasional forgetfulness about glasses.
background:
  cultural: Nicholas is raised in a predominantly Anglo‑American household in Las Vegas, Nevada. While his family follows mainstream American customs—celebrating holidays such as Thanksgiving, Christmas,
    and the Fourth of July—he is also exposed to the city’s vibrant multicultural atmosphere, including influences from neighboring Native American desert cultures, Hispanic communities, and the entertainment
    industry that defines Las Vegas. Weekend trips to nearby Red Rock Canyon and visits to local science museums nurture his curiosity, and the diverse community of his school provides a blend of perspectives
    that shape his worldview.
