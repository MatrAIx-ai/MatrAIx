personas:
  professional: Noriyuki Lo is a budding digital artist and self‑taught game‑modder who blends manga aesthetics with 3D modeling in Blender, channeling their curiosity and methodical planning into weekly
    hackathon projects while thriving on the competitive drive of multiplayer gaming.
  sports: Noriyuki Lo spikes their energy on Saturday evenings at the local Thunderbolt Youth Soccer Club, idolizes Manchester United’s attacking flair while also cheering for the Los Angeles Lakers, and
    incorporates daily 20‑minute HIIT sessions to stay competitive on the field.
  arts: Noriyuki Lo sketches manga‑style heroes inspired by Katsuhiro Otomo and Studio Ghibli’s Miyazaki, spends weekends recreating those characters in Blender after visiting the Modern Art Museum’s anime
    exhibit, and loves analyzing street art by Banksy for fresh visual twists.
  travel: Noriyuki Lo plans family trips with the precision of a game strategy, having already explored the interactive science museum in Chicago, the historic streets of Kyoto during a spring festival,
    and dreaming of a future backpacking adventure across Europe’s comic‑book conventions.
  culinary: Noriyuki Lo enjoys whipping up quick ramen bowls with miso broth and topping them with soft‑boiled eggs, mastering a decent pepperoni pizza from scratch, and snacking on matcha‑flavored KitKats
    while streaming Rocket League, though they often forget to drink water.
  core: Noriyuki Lo is a curious, organized teen who blends manga art with 3D tech, devours games and science podcasts, and balances a competitive streak with a steady, methodical approach to life.
background:
  cultural: Noriyuki is a second‑generation Japanese‑American raised in Mountain View, California. His household blends traditional Japanese customs—such as celebrating Obon and the New Year with family
    meals, learning basic Japanese language, and enjoying anime and manga—with typical Californian practices and the high‑tech environment of Silicon Valley. This multicultural upbringing cultivates both
    a respect for discipline and education common in East Asian families and an openness to the innovative, collaborative spirit of his community.
