  career_goals: He aspires to become a software engineer or interactive media designer who creates tools that merge art and technology. In the short term, he aims to lead his middle school's robotics team
    to win competitions, contribute to a student-run coding club, and earn a place in a prestigious STEM-focused high school. Long‑term, he dreams of studying computer science at a top university such as
    Stanford, developing AI‑driven creative applications, and eventually launching his own tech startup that makes learning through gamified art experiences accessible worldwide.
