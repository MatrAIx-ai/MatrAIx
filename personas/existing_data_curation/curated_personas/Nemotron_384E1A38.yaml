  career_goals: While still very young, Donald frequently expresses a desire to "build things that work" during play. He dreams of becoming a builder or construction worker, often arranging his block sets
    into orderly structures and saying he wants to "make big houses". He also shows an imaginative interest in helping others organize, hinting at a future role like a teacher or caretaker who keeps things
    tidy and predictable. These ambitions mirror his methodical nature and love for solitary, purposeful activities.
