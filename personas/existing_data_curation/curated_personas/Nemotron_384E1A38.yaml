personas:
  professional: Donald Thompson, they are a budding three‑year‑old who treats the world of building blocks and pretend kitchen as a tiny enterprise, demonstrating methodical planning by sorting Legos by
    color and size, channeling curiosity into cause‑and‑effect experiments, and preferring quiet solo play over noisy group activities.
  sports: Donald Thompson, they attend a local preschool soccer program on Tuesday afternoons, idolize the Houston Dynamo, love splash‑pad water play, but they prefer solitary climbing on the playground’s
    low wall over noisy team drills.
  arts: Donald Thompson, they spend afternoons drawing dinosaurs and listening to the soothing piano lullabies of Ludovico Einaudi, sing along to Disney’s Let It Go, and attend a weekly story‑time at the
    community library where the calm atmosphere fuels their love for quiet creative expression.
  travel: Donald Thompson, they have visited the Houston Museum of Natural Science and taken a family beach trip to Galveston, love the excitement of riding the carousel at the local fair, and dream of
    a future adventure to Disney World, preferring well‑planned day trips over spontaneous travel.
  culinary: Donald Thompson, they prefer the buttery crunch of chicken nuggets and mac & cheese, are a self‑declared fan of apple slices with peanut butter, stubbornly reject peas, and enjoy helping Mom
    stir the pot in the kitchen while listening to country‑flavored playlists.
  core: Donald Thompson, they are a quiet, methodical three‑year‑old who balances relentless curiosity with a love for solitary play, meticulous organization, and a selective palate.
background:
  cultural: Donald was raised in a suburban neighborhood of Houston, Texas, within a middle‑class, English‑speaking white family. The household blends traditional Southern hospitality—such as weekend family
    meals and community gatherings—with the multicultural vibrancy of Houston, exposing him to diverse cultural festivals and occasional Spanish language snippets through local programs. He celebrates common
    American holidays like Thanksgiving and Christmas and participates in community events that reflect the city's diversity, while his daily life is shaped by the values of reliability, order, and quiet
    family time.
