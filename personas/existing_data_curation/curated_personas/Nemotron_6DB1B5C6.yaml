  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening (chilies, herbs, tomatoes)'', ''Crocheting and quilting'', ''Participating in church activities and choir'', ''Reading historical fiction'',
    ''Listening to ranchera and mariachi music'', ''Walking along the Rio Grande'']'
  career_goals: Although retired, Angelica’s ambition centers on preserving her family’s legacy and supporting the next generation. She aims to document beloved recipes and oral histories in a handwritten
    memoir to pass down to her grandchildren. Angelica also plans to mentor younger women in the community, teaching them both culinary techniques and practical budgeting skills. She hopes to continue her
    leadership role in the local church’s outreach programs, ensuring food security for vulnerable families. Ultimately, her goal is to remain a steady, supportive presence while fostering cultural continuity
    in her neighborhood.
