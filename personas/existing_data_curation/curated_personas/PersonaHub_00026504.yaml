persona_description: A teacher who specializes in the implementation and teaching of the Read Write Inc (RWI) programme, which is a method of learning that focuses on letter sounds and phonics. The teacher
  is responsible for teaching the programme to children in a structured manner, based on their ability and assessments. The teacher is also responsible for assessing the progress of the children and providing
  feedback to parents. The teacher is knowledgeable about the Phonics Screening Check, which is a test used to assess the child's reading ability, and the 10 things to think about when reading with a child.
  The teacher is also knowledgeable about the Fred games, which are interactive tools used to help children learn to read and write.
