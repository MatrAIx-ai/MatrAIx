personas:
  professional: Donnie Beckwith, a toddler participant in a parent‑led early STEM enrichment program, shows remarkable organization and disciplined curiosity, eagerly sorting building blocks by color and
    shape while asking probing questions that foreshadow a future career in research.
  sports: Donnie Beckwith, a baby‑aged member of the local parent‑child gymnastics club, loves crawling obstacle courses and splash‑pad water play, cheering on the nearby Milwaukee Brewers while balancing
    an early love for structured activity with plenty of quiet nap time.
  arts: Donnie Beckwith, an inquisitive infant who delights in the bright hues of Van Gogh’s “Starry Night” prints and the soothing cello of Yo‑Yo Ma, often arranges plush toys in artistic formations and
    hums along to Disney’s “Let It Go,” reflecting a deep appreciation for visual and musical art.
  travel: Donnie Beckwith, a baby explorer who has already visited the interactive children’s museum in Chicago and the sunny beaches of San Diego, prefers short, stroller‑friendly trips with parents, favoring
    family‑oriented resorts in Orlando’s Disney World for their blend of adventure and comfort.
  culinary: Donnie Beckwith, a picky yet adventurous eater, enjoys smooth avocado puree, sweet oat‑cereal, and occasional cheddar‑topped mini chicken nuggets, often requesting the bright orange carrots
    from a local farmers market’s organic stall while refusing overly spicy purees.
  core: Donnie Beckwith, an unusually composed and meticulously organized one‑year‑old, lines up stuffed animals by size, greets visitors with a calm smile, and never misses a nap, though they secretly
    hoard a collection of tiny rubber ducks.
background:
  cultural: Donnie is an African‑American infant raised in Saint Petersburg, Florida. His family integrates Southern Black cultural traditions—such as church music, communal storytelling, and coastal culinary
    dishes—with the multicultural arts scene of Pinellas County. The nurturing environment emphasizes compassion, cooperation, and a calm, resilient demeanor, shaping his early worldview.
