  career_goals: Kevin aims to enroll in a community college culinary program within the next year to earn an associate degree in culinary arts. His short‑term goal is to advance from line cook to sous chef
    at a farm‑to‑table restaurant, where he can deepen his expertise in sustainable sourcing and seasonal menu development. Long‑term, he dreams of opening his own small bistro in Perry County that blends
    his Italian family heritage with Midwestern comfort food, emphasizing locally sourced ingredients and a welcoming communal dining experience. He also intends to compete in regional cooking contests
    to sharpen his competitive edge and gain recognition for his innovative yet practical dishes.
