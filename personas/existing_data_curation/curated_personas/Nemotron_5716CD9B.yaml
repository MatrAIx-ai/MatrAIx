  hobbies: '[''hiking on local trails'', ''crossword and sudoku puzzles'', ''baking nutritious meals'', ''yoga'', ''volunteering at free clinic'', ''organizing health‑education workshops'', ''watercolor
    painting'']'
  career_goals: Patricia aims to obtain her Clinical Laboratory Scientist (CLS) certification within the next two years and to assume a lead technologist role in a regional hospital. She plans to pursue
    a master’s degree in Biomedical Informatics to integrate data‑driven solutions into laboratory workflows. Long‑term, she envisions leading a quality‑improvement team that optimizes testing efficiency
    and patient safety, and eventually moving into healthcare administration where she can shape policies that enhance service delivery for underserved rural communities.
