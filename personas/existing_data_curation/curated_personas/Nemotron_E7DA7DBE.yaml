  hobbies: '["Book club", "Senior gardening group", "Choir singing", "Neighborhood walking tours", "Quilting and knitting", "Cooking classes", "Potluck gatherings"]'
  career_goals: Although retired, Carmen remains goal‑driven. She aims to deepen her involvement with the local senior center by leading its volunteer program, preserving the community’s history through
    a personal memoir and oral‑history project, and mentoring younger volunteers in organizational skills. She also hopes to travel with her husband to California’s national parks, maintaining an active
    lifestyle while giving back to the community through charitable fundraising events.
