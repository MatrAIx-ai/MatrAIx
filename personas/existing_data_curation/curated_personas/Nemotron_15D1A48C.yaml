  hobbies: '[''Art Museum Visits'', ''Sketching'', ''Poetry Readings'', ''Backyard Gardening'', ''Birdwatching'', ''Collecting Vintage Postcards'', ''Bridge (Card Game)'', ''Short Road Trips to Cultural
    Sites'']'
  career_goals: In retirement, Joseph aims to leverage his business expertise to support local arts and small‑business ecosystems. He aspires to serve on the advisory board of the nearby Waterman Art Center,
    mentor younger entrepreneurs through the Rhode Island Small Business Development Center, and develop a community grant‑writing workshop series. He also hopes to author a modest memoir that captures
    the evolution of Pascoag’s commercial landscape, blending historical research with his love for storytelling.
