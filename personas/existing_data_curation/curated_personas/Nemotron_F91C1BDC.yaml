personas:
  professional: Paul Rooke is a budding junior coder who creates structured Scratch games, applies their methodical chess thinking to debug logic, and organizes their weekend coding club meetings with the
    same reliability they show in school projects.
  sports: Paul Rooke plays as a midfielder for the Oakwood Youth Soccer Club, follows the English Premier League team Manchester United, and commits to a predictable twice‑weekly training schedule that
    balances their love of structured practice with a hobby of collecting baseball cards of their favorite MLB team, the New York Yankees.
  arts: Paul Rooke nurtures their creative side by taking beginner piano lessons where they love playing simplified versions of Beethoven’s 'Für Elise,' immerses themselves in adventure novels like 'Percy
    Jackson,' and curates LEGO dioramas inspired by the cinematic scores of Hans Zimmer, often humming the melodies while building.
  travel: Paul Rooke enjoys family road trips to amusement parks such as Legoland California, prefers meticulously planned itineraries that include scheduled breaks for LEGO building sessions, and dreams
    of visiting the historic city of Oxford to explore the real‑world inspirations behind their favorite mystery books.
  culinary: Paul Rooke favors pizza topped with pepperoni and extra cheese, enjoys snacking on carrot sticks with hummus, and occasionally helps their parents bake chocolate chip cookies shaped like LEGO
    bricks, though they stubbornly refuse to try broccoli.
  core: Paul Rooke is a methodical nine‑year‑old who balances a love of structured soccer drills and LEGO engineering with a penchant for saving allowance in a piggy bank, all while occasionally neglecting
    broccoli and forgetting to wear their glasses.
background:
  cultural: Paul was raised in Bowling Green, Kentucky, within a tight‑knit, middle‑class family that values community, school, and modest Southern hospitality. His upbringing includes regular participation
    in local church events, attendance at the county fair, and involvement in community service projects, reflecting the region’s emphasis on neighborly support and tradition. The cultural milieu blends
    Midwestern practicality with a touch of Appalachian heritage, promoting respect for routine, teamwork, and a strong sense of belonging.
