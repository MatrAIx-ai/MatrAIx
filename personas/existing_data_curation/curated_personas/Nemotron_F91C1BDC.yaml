  career_goals: Paul imagines a future where he can combine his love of helping others, teamwork, and problem‑solving. He often talks about wanting to become a firefighter or a civil engineer because he
    enjoys building things and protecting his community. He also expresses interest in roles that involve clear structures and reliable service, such as a police officer or a teacher, and he hopes to continue
    excelling in school and eventually join a robotics or engineering club.
