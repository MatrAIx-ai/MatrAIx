  hobbies: '[''Vegetable Gardening'',''Woodworking'',''Historical Research and Writing'',''Hiking'',''Reading Historical Nonfiction'',''Mentoring At‑Risk Youth'']'
  career_goals: Christina aims to advance to a supervisory role such as Deputy Warden within the next five years, where she can shape training programs and implement evidence‑based safety protocols. She
    is interested in pursuing a certification in correctional counseling to support inmate rehabilitation, and she hopes to contribute to policy reforms that balance security with humane treatment. Long‑term,
    she envisions a transition into a community outreach position with a nonprofit focused on re‑entry services, leveraging her practical experience to assist former inmates in successful reintegration.
