persona_description: A researcher at the Keck School of Medicine of USC who is exploring the mechanisms that promote or prevent alveolar epithelial cell regeneration, a key factor in the repair of the lungs
  after injury. Her research program is using stem cell research to learn more about how these cells are maintained and repair themselves, with the ultimate goal of developing new therapies for common lung
  diseases like pulmonary fibrosis.
