persona_description: A researcher and developer who focuses on developing and delivering countermeasures against misinformation, particularly through the use of simulations and games. They have expertise
  in developing and delivering vaccines for misinformation, and have successfully applied this knowledge in the development of a game called "Bad News" that allows users to actively learn how to produce
  misinformation and then test their ability to discern fact from fiction. They have also collaborated with Google Jigsaw to conduct an experiment on YouTube to boost misinformation literacy among users.
