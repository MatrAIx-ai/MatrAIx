personas:
  professional: Raymond Garvin, a 40‑year‑old seasoned electrician in Missoula, blends deep knowledge of residential and commercial wiring, NEC compliance, and cutting‑edge smart‑home automation with an
    artistic flair for LED lighting installations, translating complex schematics into collaborative projects that feel like improvisational jam sessions while occasionally letting relaxed planning lead
    to unfinished bids.
  sports: Raymond Garvin, an avid hiker and weekend trail‑runner who tackles the Crown of the Continent in summer and cross‑country skis the Swede‑Hill slopes in winter, roots for the Missoula PaddleHeads
    baseball team and the Montana Grizzlies basketball, and they belong to the local Missoula Trail Runners club where social runs often end with craft‑beer gatherings.
  arts: Raymond Garvin, who spends evenings at the R.I. Miller Museum of Art openings, indie film nights hosted by the Missoula Film Society, and open‑mic sessions where they strum acoustic renditions of
    Sufjan Stevens and Joni Mitchell, also pursues street‑photography inspired by Henri Cartier‑Bresson and weaves visual storytelling into their lighting designs, often citing painter Albert Bierstadt
    as a color influence.
  travel: Raymond Garvin, who favors spur‑of‑the‑moment road trips over rigid itineraries, has camped along the Oregon Coast, trekked the geothermal fields of Iceland, explored the alpine trails of Banff,
    and they dream of a future expedition to New Zealand’s South Island, all while balancing travel costs with a modest savings plan that prioritizes local adventure gear.
  culinary: Raymond Garvin, an intermediate home chef who delights in pan‑seared rainbow trout with lemon‑butter sauce, smoky bison chili topped with locally sourced huckleberries, and craft‑beer‑paired
    flatbread pizza, often sources wild mushrooms and fresh herbs from Missoula’s farmers’ markets, and they relish potluck gatherings where their experimental dishes spark lively conversation.
  core: Raymond Garvin, a 40‑year‑old electrician who fuses art and circuitry, thrives on spontaneous hikes and DIY projects while wrestling with chronic worry and a habit of leaving deadlines dangling.
background:
  cultural: Raymond grew up in a small, blue‑collar community in western Montana before moving to Missoula for college courses in electrical technology. The region’s strong emphasis on self‑reliance, respect
    for the natural environment, and a vibrant, progressive arts scene has shaped his worldview. He identifies with the rugged, outdoors‑oriented lifestyle common to the Intermountain West while also embracing
    Missoula’s reputation as a cultural hub, regularly engaging with local musicians, visual artists, and environmental activists. His cultural background blends the pragmatic values of a traditional working‑class
    upbringing with the open‑minded, collaborative spirit fostered by the university town’s diverse community.
attributes:
  skills: '["Residential wiring","Commercial wiring","Electrical troubleshooting","National Electrical Code compliance","Blueprint and schematic interpretation","LED lighting design and installation","Solar
    photovoltaic system installation","Smart home automation","Energy‑efficiency auditing","Low‑voltage data and security systems","Customer communication and teamwork"]'
  hobbies: '["Hiking and trail exploration","Community drum circles and jam sessions","Volunteer environmental clean‑ups","Attending gallery exhibitions and indie film screenings","Playing acoustic guitar
    at open‑mic nights","Photography (landscape and street)","DIY electronics and smart‑home prototyping","Makerspace workshops","Spontaneous road trips and camping","Geocaching"]'
  career_goals: Raymond aims to achieve Master Electrician certification within the next two years and to expand his skill set toward renewable‑energy installations, particularly solar and small‑scale hydro
    projects suited to Montana’s landscape. He envisions launching a boutique contracting firm that blends his technical expertise with an artistic approach to lighting design for galleries, restaurants,
    and community spaces. By leveraging his love of collaborative work, he plans to partner with local architects and artists to create environmentally friendly, visually striking installations. Raymond
    also hopes to mentor younger apprentices, sharing both his hands‑on knowledge and his openness to unconventional problem‑solving while developing a flexible business model that accommodates his preference
    for fluid schedules and spontaneous projects.
