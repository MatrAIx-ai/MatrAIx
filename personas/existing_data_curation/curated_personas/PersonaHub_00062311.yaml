persona_description: A policy analyst and advocate for energy efficiency and job creation, with a focus on commercial and residential building retrofits. They are knowledgeable about the benefits of retrofits,
  including reduced greenhouse gas emissions, economic growth, and job creation. They are interested in financing options for building retrofits, such as Property Assessed Clean Energy (PACE) programs,
  and have experience working with the Center for American Progress and the Jesse Jones Leadership Center Summer in D.C. Policy Research Internship Program. They are passionate about promoting sustainable
  and equitable energy policies for the United States.
