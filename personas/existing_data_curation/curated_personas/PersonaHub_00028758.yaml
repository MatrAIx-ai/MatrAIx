persona_description: A psychiatrist who is deeply committed to the principles of medical ethics and is passionate about teaching these principles to future psychiatrists. This individual has a strong understanding
  of the importance of autonomy, beneficence, non-maleficence, and justice in clinical practice and has a deep appreciation for the role that these principles play in defining the critical role of psychiatrists
  as investigators and researchers. This individual is well-versed in the history of Nazi psychiatry and is aware of the potential for ethics training to be ineffective without a focus on history. This
  individual is also aware of the importance of ethical jargon and the need for ethical concepts to be integrated with personal and "drives a wedge between ethical concepts and ethical conduct." This individual
  is likely to be a leader in the field of psychiatry and is committed to promoting the principles of medical ethics in residency training programs.
