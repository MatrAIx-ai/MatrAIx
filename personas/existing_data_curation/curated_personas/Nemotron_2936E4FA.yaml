  career_goals: Leonard plans to enroll in a four‑year bachelor's program in Computer Science or Electrical Engineering at a nearby university, aiming to graduate with a focus on sustainable technology.
    He aspires to secure a software engineering internship at a midsize tech firm where he can apply his practical problem‑solving skills, eventually moving into a role that blends research and product
    development, such as developing energy‑efficient IoT devices. He also hopes to contribute to his hometown by creating tech solutions for local environmental monitoring.
