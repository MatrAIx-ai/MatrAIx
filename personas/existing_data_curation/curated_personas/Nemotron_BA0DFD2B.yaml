personas:
  professional: An organized and curious computer systems analyst, Dolly Miller leverages their strong humanities background and technical expertise in SQL, Python, and cloud platforms to translate complex
    business requirements into clear UML and BPMN models, while championing user‑experience research and agile sprint facilitation at their mid‑size tech firm.
  sports: A sociable competitor, Dolly Miller plays forward in a co‑ed soccer league, roots for the Tampa Bay Rowdies and Buccaneers, joins sunrise yoga classes in the park during summer, and uses a Strava
    account to log weekly runs while they never miss the Saturday community pickup games.
  arts: An enthusiastic art advocate, Dolly Miller volunteers at the local museum to design interactive tech‑driven exhibits, paints vivid acrylic cityscapes inspired by the murals of Carlos Lizarraga,
    attends live shows by the indie band The Glides and the salsa rhythms of Celia Cruz, and constantly sketches street art in Ybor City while they listen to the playlists of Banksy and Frida Kahlo documentaries.
  travel: An adventurous planner, Dolly Miller prefers weekend road trips to Florida’s Gulf Coast—like the pastel sunsets of Siesta Key and the historic charm of St. Petersburg’s Dali Museum—while they
    budget for annual trips abroad to Barcelona’s Gothic Quarter and Oaxaca’s culinary markets, balancing a love for cultural immersion with a moderate travel budget.
  culinary: A curious home chef, Dolly Miller experiments with Caribbean jerk chicken, Mexican street‑taco al pastor, and Southern shrimp‑and‑grits, skillfully balancing fresh plantains, smoked paprika,
    and citrus zest, yet often they over‑salt the paella in pursuit of bold flavor, sharing the results at lively potlucks.
  core: Dolly Miller blends analytical rigor with a vibrant love for art, community, and flavor, navigating life with disciplined organization, social energy, and a habit of turning every project—and dinner—into
    a creative collaboration that they cherish.
background:
  cultural: Dolly grew up in suburban Florida, raised in a middle‑class white family with strong ties to community and education. Her upbringing combined the laid‑back, multicultural vibe of the Tampa Bay
    area—exposed to Latin Caribbean influences in food, music, and festivals—with a classic American emphasis on individual achievement and civic involvement. She attended public schools where she participated
    in arts programs, fostering an early appreciation for visual and performing arts. Her college experience in the humanities broadened her perspective on cultural narratives, social theory, and critical
    analysis, informing both her professional communication style and her personal interest in diverse artistic expressions.
