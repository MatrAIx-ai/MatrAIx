  hobbies: '[''Painting (acrylic)'', ''Street art exploration'', ''Live music concerts'', ''Photography workshops'', ''Digital illustration'', ''Creative coding (p5.js)'', ''Co‑ed soccer league'', ''Game
    nights'', ''Reading contemporary fiction'', ''Philosophy podcasts'', ''Cooking diverse cuisines'', ''Museum volunteering'']'
  career_goals: Dolly aims to advance to senior analyst and eventually solution architect roles, leading interdisciplinary teams to design user‑centered IT solutions. She seeks to deepen her expertise with
    certifications such as CBAP and AWS Solutions Architect while steering high‑impact projects that improve operational efficiency and deliver engaging digital experiences. Long‑term, she envisions transitioning
    into product management, where she can merge her analytical, creative, and people‑skills to shape innovative technology products that blend art and data storytelling.
