  career_goals: Stephen often talks about wanting to become an astronaut who explores space, a painter who creates big murals, or a scientist who discovers new animals. He imagines using his curiosity and
    kindness to help people, maybe as a doctor or teacher. While his ideas shift often, his underlying ambition is to learn new things and share his discoveries with friends and family.
