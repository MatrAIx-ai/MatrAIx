personas:
  professional: Stephen Gilbert, a five‑year‑old budding architect, meticulously arranges block towers and sketches simple floor plans on graph paper, channeling his organized, methodical nature into playful
    construction projects that he proudly completes before snack time.
  sports: Stephen Gilbert darts around the community soccer field every Saturday with the Little Tots Soccer Club, cheers for the nearby professional team the Seattle Sounders, and enjoys weekly swimming
    lessons at the neighborhood pool during the summer months.
  arts: Stephen Gilbert devotes Saturday mornings to drawing whimsical creatures with Crayola crayons, is mesmerized by Disney classics like "The Lion King" and "Moana," and can recite the lyrics to "Let
    It Go" from Frozen with unabashed confidence.
  travel: Stephen Gilbert has taken a family road trip to the Monterey Bay Aquarium, spent a weekend camping at a state park, and dreams of visiting Disneyland in California, preferring excursions that
    combine short car rides with hands‑on exploration of animals and rides.
  culinary: Stephen Gilbert loves simple comforts such as cheesy pizza, mac and cheese, and crunchy apple slices, can proudly assemble his own peanut‑butter‑and‑jelly sandwich, and insists on adding a dash
    of ketchup to his scrambled eggs, often requesting extra cheese on everything.
  core: Stephen Gilbert blends childlike curiosity with an adult‑like knack for organization, turning everyday play into methodical projects while juggling pocket money, allergies, soccer drills, crayon
    sketches, and a longing for theme‑park adventures.
background:
  cultural: Stephen is raised in a middle-class, white American family in Houston, Texas. His household blends typical Southern hospitality with multicultural influences from the diverse city, celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and community events. He attends a local preschool where he is exposed to a mix of cultural stories and activities,
    and his parents encourage trips to the Houston Museum of Natural Science and the Children's Museum, fostering an appreciation for art and science. The family's values emphasize kindness, cooperation,
    and a love of learning, which shape Stephen's outlook and interests.
