personas:
  professional: Joe Husketh is a budding robotics enthusiast who applies their love of routine and high standards to the school robotics club, systematically programming simple autonomous moves for LEGO
    Technic‑inspired bots, consistently meeting project deadlines and striving for top placement at local STEM competitions.
  sports: Joe Husketh is an energetic midfielder on the Rocky Mountain Rovers youth soccer team, idolizes the Colorado Rapids and mimics their tactical formations, attends home games whenever possible,
    and spends weekends hiking the Alpine Trail in Rocky Mountain National Park to build stamina, often planning the routes with a topographic map to maximize cardio benefits.
  arts: Joe Husketh expresses creative flair by assembling intricate LEGO Technic models while listening to Billie Eilish’s Bad Guy and the ambient Minecraft soundtrack by C418, regularly watching JANG’s
    stop‑motion builds on YouTube and adapting his storytelling techniques for school science projects.
  travel: Joe Husketh plans trips that blend structured itineraries with spontaneous nature discoveries, having hiked the Alpine Loop in Rocky Mountain National Park and camped near Old Faithful in Yellowstone,
    and dreaming of visiting the high‑tech exhibitions at Tokyo’s Akihabara district, always prioritizing family‑friendly lodging and modest budgets that fit within a custodial allowance.
  culinary: Joe Husketh enjoys cooking simple comfort foods such as mac and cheese loaded with extra cheddar, homemade pepperoni pizza topped with a dash of hot sauce, and strawberry‑banana smoothies blended
    with Greek yogurt, showing competent kitchen skills for their age but occasionally overindulging in sugary cereal and sports drinks before a weekend gaming marathon.
  core: Joe Husketh is a disciplined, routine‑driven 11‑year‑old whose competitive streak fuels a love for soccer, robotics, and meticulously organized hobbies, even as they occasionally surrender to sugary
    snacks and a skeptical curiosity.
background:
  cultural: Joe grows up in a middle‑class white family in Parker, Colorado, a suburban community that values outdoor recreation, school sports, and community involvement. Local culture encourages participation
    in youth organizations like Boy Scouts, emphasizes personal responsibility, and celebrates practical skills such as DIY projects and first‑aid knowledge. This environment supports his preference for
    routine, tradition, and achievement within familiar settings.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic Scratch programming'', ''Soccer fundamentals and team coordination'', ''Leadership in group activities'', ''First-aid basics'', ''Public
