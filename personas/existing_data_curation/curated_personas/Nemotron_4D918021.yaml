  hobbies: '[''Soccer'', ''Boy Scouts activities'', ''LEGO Technic model building'', ''Competitive video gaming (Minecraft, Fortnite)'', ''Robotics club (basic coding)'', ''Family garage organization'',
    ''Hiking in local trails'']'
  career_goals: Joe envisions a future where he can combine his love for organization and teamwork, aiming to become a coach or a team captain for a sports team. He is also interested in roles that involve
    planning and leadership, such as a future school principal or a community program coordinator. In the short term, he dreams of earning a scout merit badge in leadership and improving his soccer skills
    to try out for a regional youth league.
