personas:
  professional: Frankie Ramos, a meticulous receptionist at a bustling downtown office, leverages their methodical calendar management and data‑entry expertise to streamline front‑desk operations while
    eyeing a supervisory role in arts administration within the next two years.
  sports: Frankie Ramos follows the Milwaukee Bucks fervently, tracks Brewers game stats, participates in a weekend intramural volleyball league at the University of Wisconsin‑Milwaukee, and runs the weekly
    Milwaukee Marathon training group, blending competitive spirit with community fitness.
  arts: Frankie Ramos regularly explores the Milwaukee Art Museum's new modern art installations, gathers inspiration from the works of Kehinde Wiley and Carrie Mae Weems, spends evenings sketching architectural
    details of downtown in their bullet journal, and listens to contemporary jazz artists like Kamasi Washington while curating personal playlists for creative focus.
  travel: Frankie Ramos prefers well‑researched, budget‑friendly cultural trips, often spending long weekends in Chicago to visit the Art Institute, savoring the historic neighborhoods of Door County, and
    dreaming of an eventual European pilgrimage to Paris' Louvre and the streets of Florence.
  culinary: Frankie Ramos enjoys hunting for cheese curds at the Milwaukee Public Market, perfects a weekend spaghetti carbonara with pancetta and Pecorino, experiments with homemade kimchi for probiotic
    benefits, and never says no to a craft IPA from local breweries, though they often forget to drink enough water between tasting sessions.
  core: Frankie Ramos is a detail‑driven art enthusiast whose competitive edge fuels meticulous planning, from bullet‑journaling gallery visits to budgeting every coffee, while a quiet skepticism keeps
    them vigilant and a love of yoga grounds their restless curiosity.
background:
  cultural: Frankie was raised in Waukesha, Wisconsin, a suburban community with strong German‑American and broader Midwestern roots. Her family values reflect the region’s emphasis on hard work, modesty,
    and community involvement. While her upbringing was largely secular, she participated in local church events and community festivals, which introduced her to regional crafts and folk art. The proximity
    to Milwaukee’s vibrant cultural scene has fostered her appreciation for contemporary art and independent galleries. This blend of Midwestern pragmatism and exposure to diverse artistic influences shapes
    her balanced outlook, combining a methodical approach to daily life with an open curiosity toward new ideas and experiences.
attributes:
  skills: '["Front‑desk reception", "Multi‑line phone handling", "Customer service", "Calendar and schedule management", "Microsoft Office Suite proficiency", "Google Workspace proficiency", "Data entry
    and database maintenance", "Basic bookkeeping", "Research and fact‑checking", "Process improvement and workflow optimization"]'
  hobbies: '["Visiting art museums and galleries", "Bullet journaling", "Photography (urban architecture)", "Reading art history and design theory", "Puzzle solving (crosswords, Sudoku)", "Podcast listening
    (innovation, psychology)", "Small‑group board game nights", "Yoga"]'
  career_goals: Frankie intends to leverage her administrative experience into a supervisory role within the next two years, aiming to become an office manager at a cultural or nonprofit organization. She
    plans to enroll part‑time at the University of Wisconsin‑Milwaukee to complete a Bachelor of Business Administration, with a focus on organizational management and arts administration. Long‑term, she
    aspires to coordinate operations for an art gallery or museum, where she can combine her love of art with her systematic, competitive drive to create efficient visitor experiences and curatorial support.
    She also hopes to earn certifications in project management (CAPM) and office technology (Microsoft Office Specialist) to bolster her qualifications.
