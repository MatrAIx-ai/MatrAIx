persona_description: A professional with expertise in the management and control of Southern turfgrass insects, Mark Coffelt, Ph.D., is a leading authority on the biology, behaviors, and chemical and integrated
  pest management options for these pests. He brings a deep understanding of the Southern insects and their impact on turfgrass, making him an invaluable resource for those looking to prevent and control
  these pests in their turfgrass landscapes. With 25 years of experience in pest management product development and research, Coffelt has a wealth of knowledge and expertise in the field, making him a sought-after
  expert for professionals in the industry.
