  career_goals: Although retired, Alvaro’s ambition is to stay active and useful within his community and family. He hopes to become a regular mentor at the Springfield senior center, teaching Spanish phrases
    and traditional cooking to younger volunteers. He aims to preserve his cultural heritage by documenting family stories and leading annual Puerto Rican holiday celebrations. He also wants to maintain
    his health by walking daily, attend weekly church services, and occasionally travel back to Puerto Rico to reconnect with relatives. Ultimately, his goal is to leave a lasting legacy of family pride,
    cultural continuity, and community participation.
