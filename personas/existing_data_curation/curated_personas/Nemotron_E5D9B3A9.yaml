  hobbies: '[''Drawing and painting'', ''Singing songs'', ''Dancing'', ''Pretend play (teacher, veterinarian, doctor)'', ''Puzzle solving'', ''Reading picture books'', ''Playing at the park'', ''Visiting
    the Sacramento Zoo'', ''Interactive tablet games'', ''Storytelling with friends'', ''Collecting stickers'']'
  career_goals: Elenamaria dreams of growing up in a role that blends structure with creativity. She imagines becoming a kindergarten teacher who can create comforting routines for young children while
    leading lively songs and stories, a children's performer who loves being the center of attention on stage, or a veterinarian who cares for animals and shares gentle routines with pets. Her long‑term
    ambition is to help others feel safe and happy, whether through teaching, performing, or caring for animals.
