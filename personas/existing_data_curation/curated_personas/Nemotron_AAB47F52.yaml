  career_goals: Pedro aims to progress to a senior director role within the next five years, leading large‑scale digital transformation initiatives across multiple business units. He is motivated to build
    a high‑performance culture that blends data‑driven decision making with practical execution. Additionally, he plans to mentor emerging engineers and managers, eventually establishing a boutique consulting
    firm that assists midsize manufacturing firms in adopting lean and agile practices while honoring their unique workplace cultures.
