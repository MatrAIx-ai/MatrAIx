persona_description: A public engagement with science professional who has developed and implemented citizen science programs, including the Cascades Pika Watch, and has worked with students at Jane Goodall
  Environmental Middle School in Oregon to engage underserved audiences in science. She has also used journalism to engage with diverse audiences and empower participants in the entire process of science.
  Varner is a leader in the field of public engagement with science and has received recognition for her contributions, including the EcoService Award from the Ecological Society of America and the Union
  of Concerned Scientists.
