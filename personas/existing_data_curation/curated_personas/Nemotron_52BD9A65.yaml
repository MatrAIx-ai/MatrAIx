personas:
  professional: Tonya Blicharski, an aspiring junior game developer, blends her love of drawing, watercolor painting, and comic storytelling to craft whimsical Scratch projects, thriving in collaborative
    school clubs while often leaving sketches half‑finished because she prefers the excitement of spontaneous idea‑hopping over meticulous planning.
  sports: Tonya Blicharski loves weekend bike rides along Peachtree City’s expansive paved trail network, cheers enthusiastically for the Atlanta United soccer team and the Georgia Bulldogs football squad,
    and occasionally joins the local middle‑school cheerleading club where her energetic dancing to pop hits shines.
  arts: Tonya Blicharski immerses herself in the arts by creating watercolor portraits of imagined characters, drawing inspiration from the whimsical illustration style of Hayao Miyazaki, the vibrant colors
    of Frida Kahlo’s paintings, and the catchy pop anthems of Ariana Grande, while regularly attending the Peachtree City Art Fair and performing in school drama productions.
  travel: Tonya Blicharski’s travel style mixes spontaneous bike explorations of nearby parks with family road trips to the Georgia Aquarium in Atlanta and the historic squares of Savannah, while dreaming
    of a future adventure to the Eiffel Tower in Paris, balancing her love for unplanned discovery with the need for parental planning.
  culinary: Tonya Blicharski enjoys crafting easy snacks like peanut‑butter‑jelly sandwiches and rainbow fruit kebabs using strawberries, grapes, and blueberries, while her favorite meals are cheesy pizza
    with pepperoni and chocolate‑chip cookies, and she often experiments with bright smoothies blended from mango, orange juice, and a splash of vanilla yogurt.
  core: Tonya Blicharski is a curious, socially magnetic 10‑year‑old artist‑coder who turns everyday moments into colorful stories, juggling spontaneous creativity with a charming habit of leaving projects
    half‑done.
background:
  cultural: Tonya grows up in a white, middle‑class family in Peachtree City, Georgia, where Southern hospitality and community involvement are common. Her family values family gatherings, church events,
    and neighborhood festivals, while also encouraging curiosity and openness to new ideas through school and online resources. The local culture blends traditional Southern friendliness with the modern,
    connected world of the internet, giving her a balanced perspective on both local traditions and broader artistic trends.
