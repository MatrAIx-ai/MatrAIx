  career_goals: Tonya dreams of turning her love for art and performance into a future career. She imagines becoming a professional illustrator or animator who can bring stories to life, and she also sees
    herself leading community events or school productions where she can inspire others. Her ambition is to keep exploring unconventional ideas, eventually studying visual arts and possibly a creative leadership
    path that blends art, technology, and social engagement.
