  career_goals: Cindy aims to transition into a supervisory or facilities coordinator role within her current employer or a similar organization, where she can lead a small team and formalize a green cleaning
    program. She hopes to serve as a mentor for younger custodial staff, sharing her decades of practical knowledge while fostering a culture of accountability that aligns with her competitive nature. To
    strengthen her credentials, she plans to earn a GED and enroll in community‑college courses focused on environmental health and sustainable facilities management. In the longer term, she envisions consulting
    for historic homes in Summerville, offering specialized cleaning and preservation guidelines that respect the town’s architectural heritage and allow her to integrate her artistic interests into her
    work.
