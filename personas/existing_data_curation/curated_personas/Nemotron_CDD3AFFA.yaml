personas:
  professional: Cindy Mcdaniel, a veteran facilities custodian with three decades of expertise in systematic cleaning, floor care, and preventive maintenance, they channel their meticulous, competitive
    nature into crafting detailed green‑cleaning checklists while mentoring new staff with a skeptical yet supportive eye.
  sports: Cindy Mcdaniel, who favors low‑impact fitness like morning walks through the historic district and occasional senior‑league pickleball at the local community center, they cheer for the Charleston
    Battery soccer team and, due to their methodical nature, adhere to a weekly schedule that balances activity with rest.
  arts: Cindy Mcdaniel, a dedicated watercolorist who sketches Charleston’s historic facades and draws inspiration from Georgia O’Keeffe’s bold color fields and regional folk artist Emily Wheelock, they
    regularly attend gallery openings and devour art‑history documentaries on PBS.
  travel: Cindy Mcdaniel, an avid traveler of historic locales, they meticulously plan intimate weekend getaways to heritage sites like Savannah, Asheville, and the colonial streets of Edinburgh, favoring
    small‑group tours that allow quiet reflection while staying within a modest travel budget.
  culinary: Cindy Mcdaniel, a modestly skilled home chef who delights in Southern staples such as shrimp‑and‑grits and collard greens seasoned with garden‑fresh thyme and sorrel, they often experiment with
    unconventional watercolor‑inspired plating while occasionally over‑salting their soups.
  core: Cindy Mcdaniel, a meticulous, art‑infused facilities veteran whose competitive curiosity fuels a green‑cleaning vision, they balance a solitary temperament with bouts of anxiety that color both
    work and leisure.
background:
  cultural: Cindy grew up in the Lowcountry region of South Carolina, where the rhythm of small‑town life, close‑knit community ties, and a respect for historic Southern architecture shaped her sensibilities.
    Her family background is rooted in several generations of white working‑class residents who valued hard work, self‑reliance, and modest hospitality. The cultural milieu of Summerville—marked by its
    historic homes, local festivals celebrating Southern arts and crafts, and a tradition of community churches—has fostered her appreciation for art, her methodical work ethic, and her preference for intimate
    social settings. While she does not identify with any particular ethnic traditions beyond the broader Southern American cultural fabric, these regional influences inform her worldview, values, and everyday
    practices.
