personas:
  professional: Joseph Johnson, a middle‑school robotics enthusiast, blends meticulous planning with hands‑on building to design small autonomous bots, channeling their love for structure and compassion
    into team projects that prioritize safety and inclusivity, and they eagerly share progress with classmates.
  sports: Joseph Johnson, a midfielder on their middle‑school soccer team, trains five days a week, draws tactical inspiration from FC Barcelona and follows the local Badger Hawks, while also tackling weekend
    hikes in the Badger Mountains to build endurance and balance, and they relish the camaraderie of post‑game gatherings.
  arts: Joseph Johnson, a budding guitarist who strums basic chords to songs by Ed Sheeran and spends evenings immersed in mystery novels like the Sherlock Holmes series, also channels creativity into intricate
    LEGO builds, showing how music, literature, and building merge into a distinctive artistic outlet, and they often stage impromptu performances for family.
  travel: Joseph Johnson prefers meticulously planned weekend getaways, having trekked the Badger Mountains and camped in Yosemite National Park, and now dreams of attending a robotics competition in Osaka,
    Japan, balancing adventure with structured itineraries, and they keep a travel scrapbook to document each trip.
  culinary: Joseph Johnson, a self‑taught junior chef, often whips up pepperoni pizza with mozzarella and a dash of oregano, perfects chocolate‑chip cookies using high‑quality vanilla extract, and enjoys
    exploring new flavors at the local farmers’ market, though they sometimes forget to set a timer, resulting in occasional burnt edges.
  core: Joseph Johnson is a structured, compassion‑driven teen who balances robotics, soccer, and community service with a penchant for meticulous planning and occasional snack‑related mischief, and they
    often organize their study desk by color.
background:
  cultural: Joseph comes from a white, Midwestern American background in Onalaska, Wisconsin. The community emphasizes modesty, hard work, and public service, with strong ties to local churches, school
    events, and outdoor recreation such as fishing and snowmobiling. Family values include responsibility, politeness, and volunteering, which shape his compassionate and cooperative outlook.
