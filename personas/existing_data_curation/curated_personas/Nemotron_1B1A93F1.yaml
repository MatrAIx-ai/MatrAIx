  career_goals: Joseph aspires to a career that blends his compassion with practical problem‑solving. He hopes to become a healthcare professional—such as a pediatric nurse or a community health worker—so
    he can directly help others in his town. Long‑term, he envisions earning a degree in health sciences or education, returning to Onalaska to support youth development through mentorship, school programs,
    or community health initiatives.
