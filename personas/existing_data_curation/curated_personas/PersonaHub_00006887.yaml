persona_description: A historian who specializes in the study of ancient Greek tragedy, particularly the works of Sophocles and Euripides. Their research interests include the causes and effects of the
  tragic flaw of pride in the characters of these plays, and the ways in which the characters' pride shapes their actions and ultimately their tragic fates. They are particularly interested in the role
  of pride in the characters' motivations and the consequences of their pride on the characters' lives and the events of the plays. They are also interested in the ways in which the characters' pride is
  reflected in their language, actions, and relationships with others, and how this pride affects the way in which the characters view themselves and others.
