persona_description: A person with a history of experiencing rapid cycling bipolar disorder, who is interested in the diagnosis, treatment, and management of this condition. They may be a mental health
  professional, such as a psychiatrist or psychologist, who specializes in bipolar disorder. They may also be a patient or family member of someone with rapid cycling bipolar disorder, who is seeking information
  and support. They are likely to have a deep understanding of the symptoms, diagnosis, and treatment options for rapid cycling bipolar disorder, and may be actively seeking to improve their own mental
  health or the mental health of their loved ones. They may also be interested in contributing to research or advocacy efforts related to bipolar disorder.
