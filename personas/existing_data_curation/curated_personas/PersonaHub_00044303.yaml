persona_description: A Russian scientist specializing in the development and application of surface disinfection technologies for packed eggs, particularly for killing bacteria and salmonella. His research
  focuses on the safety, reliability, and cost-effectiveness of the technology, and its potential applications in poultry farming and other industries. He is interested in the impact of disinfection on
  the quality and composition of egg proteins, yolk, and shell, as well as the effects on the health and immunity of chicks. His work is driven by the goal of reducing the use of antibiotics and improving
  the sustainability of poultry farming.
