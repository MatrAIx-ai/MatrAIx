persona_description: A maritime historian and archaeologist who specializes in the study of Viking ships, particularly their rig designs and construction techniques. They are knowledgeable about the transition
  from rowing to sailing ships in the 7th and 8th centuries and the influence of Phoenician and Roman ship designs on these innovations. They have a particular interest in the Bayeux Tapestry and its depiction
  of Viking ships, and have a deep understanding of the complexities of the design and construction of these vessels. They are also skilled at replicating Viking ship designs and have experience with the
  construction and analysis of Viking ships.
