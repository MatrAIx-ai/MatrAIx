personas:
  professional: Charlie Wilson, a seasoned janitor and building cleaner in Baltimore, combines a systematic, detail‑oriented work style with a curiosity for eco‑friendly practices, expertly operates a range
    of commercial equipment, trains new staff with clear, assertive guidance, and pursues CPC and LEED Green Associate certifications to transition into facilities‑management leadership.
  sports: Charlie Wilson, a regular at the neighborhood community center where they join a tight‑knit pickup basketball squad each Thursday, follows the Baltimore Ravens and the Orioles, keeps a simple
    fitness routine centered on basketball drills and weekend jogs, and values the camaraderie and low‑pressure competition as a vital stress outlet.
  arts: Charlie Wilson, an avid collector of soundtracks ranging from Miles Davis and Aretha Franklin to Kendrick Lamar, spends evenings editing urban photographs that echo the compositional style of Henri Cartier‑Bresson
    while diving into sci‑fi novels by Octavia Butler and historical works by Frederick Douglass, letting these artistic influences shape their creative eye and reflective downtime.
  travel: Charlie Wilson, who prefers carefully planned short trips that combine historical exploration and photography opportunities, has road‑tripped to Savannah and Washington, D.C., dreams of a solo
    weekend in New Orleans to capture jazz‑filled streets, and keeps future European itineraries—like Lisbon and Edinburgh—on a modest savings list because of budget‑conscious habits.
  culinary: Charlie Wilson, who enjoys moderate‑level home cooking, often prepares soul‑food staples such as collard greens with smoked turkey, cornbread, and shrimp‑and‑grits while curating a playlist
    of classic jazz, and on rainy days experiments with spice blends like smoked paprika and cayenne to give familiar dishes a subtle twist.
  core: Charlie Wilson, a diligent yet introspective Baltimore janitorial professional, blends a love for solitary creativity, eco‑conscious ambition, and cautious optimism into a life shaped by quiet curiosity
    and occasional stress‑driven quirks.
background:
  cultural: Charlie is an African‑American who was raised in Baltimore’s Eastside neighborhoods. His family’s roots trace back to the Great Migration, and stories of resilience and community activism were
    a regular part of his upbringing. He grew up attending a Baptist church where gospel music and communal service shaped his values of solidarity and self‑reliance. Baltimore’s rich cultural tapestry—its
    jazz clubs, street art, and historic sites—has given him a strong sense of place. He is aware of the socioeconomic challenges faced by many black residents in the city, which fuels his desire to contribute
    positively through stable employment and community mentorship. His cultural identity influences his taste in music, culinary preferences, and his commitment to uplifting younger members of his neighborhood.
attributes:
  skills: '[''Commercial floor cleaning'', ''Carpet extraction and stain removal'', ''Operation of ride‑on floor scrubbers'', ''Pressure washing'', ''HVAC filter maintenance'', ''Basic plumbing repairs'',
    ''Safety inspections (fire extinguishers, emergency lighting)'', ''Inventory management'', ''OSHA compliance'', ''Training of junior staff'', ''Use of eco‑friendly cleaning products'']'
  hobbies: '[''Reading (science‑fiction, African‑American history)'', ''Pickup basketball'', ''Listening to jazz, soul, and hip‑hop'', ''Cooking soul‑food'', ''Urban photography'', ''Model train building'',
    ''Basic electronics tinkering'', ''Volunteering at after‑school programs'']'
  career_goals: Charlie aspires to move beyond entry‑level cleaning work into a supervisory or facilities‑management role. He plans to obtain the Certified Professional Cleaner (CPC) credential and a LEED
    Green Associate certification within the next two years. He is considering enrolling in a part‑time associate’s program in Facilities Management or Business Administration to complement his hands‑on
    experience. His long‑term ambition is to become a Facilities Manager for a multi‑tenant office complex in Baltimore, where he can implement sustainable cleaning practices, oversee maintenance crews,
    and improve building efficiency. He also entertains the idea of starting his own small cleaning business focused on environmentally responsible services for local schools and community centers.
