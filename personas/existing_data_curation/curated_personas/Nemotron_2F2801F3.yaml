personas:
  professional: Diana Pace is a seasoned detective in St. Joseph County who blends rigorous forensic expertise—ranging from crime scene documentation to digital forensics—with a teacher's knack for clear,
    educational training modules, while her critical, skeptical nature and disciplined organization drive her to constantly refine protocols and pursue ambitious case‑clearance goals.
  sports: Diana Pace competes in half‑marathons with the South Bend Runners Club, practices Krav Maga three times a week at the Heartland Defense Center, and roots for the Indianapolis Colts and the Indiana
    Hoosiers basketball team, using each training session as a tactical rehearsal for the field.
  arts: Diana Pace fuels her investigative mind with true‑crime novels by Ann Rule, Patricia Cornwell, and Gillian Flynn, devours episodes of Forensic Files and The Staircase, captures Indiana Dunes sunsets
    in the style of Ansel Adams, builds simple wooden coffee tables inspired by mid‑century modern design, and relaxes to the gritty blues of The Black Keys while sketching case notes.
  travel: Diana Pace favors purposeful travel that blends work‑related curiosity with recreation, having traced crime‑scene histories on a tour of New York City’s Museum of Crime, attended the International
    Crime Writing Festival in Edinburgh, blazed trail runs through Colorado’s Rocky Mountain National Park, and plans a future trek to the Canadian Rockies, all while booking modest boutique hotels through
    a meticulous planning spreadsheet to stay within departmental leave budgets.
  culinary: Diana Pace prefers high‑protein, quick meals that fuel her training, often preparing grilled salmon with quinoa and roasted Brussels sprouts seasoned with smoked paprika, cooking a hearty chili
    con carne on Sundays, enjoying avocado toast with a poached egg for breakfast, and occasionally indulging in a triple‑shot espresso from a local roastery, while her moderate cooking skill leads her
    to experiment with recipes from Serious Eats after a long case.
  core: Diana Pace, a 34‑year‑old detective, merges a forensic‑focused mind with a love for puzzles, relentless fitness, and a drive to mentor women in law enforcement, yet sometimes over‑analyzes even
    the simplest coffee order.
background:
  cultural: Diana grew up in a middle‑class, predominantly white Midwestern community in northern Indiana, where values such as self‑reliance, practical problem‑solving, and a strong work ethic were emphasized.
    Her family heritage includes German and Irish ancestry, and her upbringing was marked by an appreciation for community responsibility and modesty. The regional culture—characterized by straightforward
    communication, respect for privacy, and a balanced approach to work and leisure—shapes her pragmatic outlook and competitive spirit while fostering a deep respect for education and personal achievement.
attributes:
  skills: '[''Crime scene documentation'', ''Forensic evidence collection'', ''Digital forensics'', ''Interrogation techniques'', ''Analytical reasoning'', ''Investigative report writing'', ''Training curriculum
    development'', ''Case management'', ''Critical thinking'', ''Stress resilience'', ''Adaptive problem‑solving'']'
  hobbies: '[''Escape rooms'', ''Chess'', ''Crossword puzzles'', ''True‑crime reading'', ''Forensic documentaries'', ''Half‑marathon running'', ''Krav maga'', ''Adult‑learning workshops'', ''Journaling'',
    ''Landscape photography'', ''Woodworking'']'
  career_goals: Diana aims to rise to the rank of senior detective and eventually head a specialized investigative unit focused on cold‑case homicides and cyber‑enabled crimes in St. Joseph County. She
    plans to earn certifications in digital forensics and forensic psychology, and to author a training handbook that integrates educational theory with law‑enforcement best practices. Long‑term, she envisions
    establishing a mentorship program for women entering investigative fields and consulting with regional agencies to implement evidence‑based investigative protocols. Her competitive drive pushes her
    to achieve measurable case‑clearance rates that set new standards for the department.
