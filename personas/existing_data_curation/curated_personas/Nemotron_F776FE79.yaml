  hobbies: '["Reading contemporary fiction and medical literature", "Gardening", "Yoga and meditation", "Birdwatching", "Knitting", "Hiking on local trails", "Cooking Cajun-inspired dishes", "Journaling"]'
  career_goals: Andrea aims to advance her nursing career by earning a Bachelor of Science in Nursing (BSN) and subsequently obtaining certification as a Nurse Practitioner with a focus on primary and preventive
    care. She is particularly interested in community health initiatives that serve the rural populations of St. Tammany Parish, where she can apply her structured approach to improve health outcomes. Over
    the next five years, she envisions transitioning into a leadership role such as a nurse manager or clinical educator, where she can mentor new staff and develop evidence‑based protocols that enhance
    patient safety. Andrea also plans to pursue specialized training in hospice and palliative care, aligning her professional path with her preference for quieter, patient‑centered environments.
