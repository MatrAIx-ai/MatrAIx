personas:
  professional: Andrea Howlett, a 28‑year‑old registered nurse proficient in acute and community care, combines precise assessment, IV therapy expertise, and EMR efficiency to lead quality‑improvement projects
    while mentoring newcomers in a structured, patient‑centered environment, and they consistently apply their meticulous attention to detail to every shift.
  sports: Andrea Howlett prefers low‑impact exercise, attends a local yoga studio three times a week, follows the New Orleans Pelicans and Saints for community spirit, participates in the St Tammany Birdwatchers
    club's spring hikes, and they occasionally join a neighborhood walking group for sunrise strolls along the bayou.
  arts: Andrea Howlett expresses their creative side through watercolor paintings reminiscent of Monet and O'Keeffe, knits while listening to classical guitarists like Andrés Segovia, finds literary refuge
    in contemporary novels by Sally Rooney and Chimamanda Ngozi Adichie, and they occasionally attend performances by the New Orleans Chamber Music Society.
  travel: Andrea Howlett plans their trips with meticulous itineraries, favors weekend retreats to coastal towns such as Grand Isle, seeks bird‑watching excursions in the Everglades, dreams of exploring
    the vineyards of Provence, and they balance their modest travel budget by traveling off‑season and using credit‑card rewards.
  culinary: Andrea Howlett, an avid gardener, experiments with Cajun‑inspired dishes like shrimp étouffée, chicken and andouille sausage jambalaya, and gumbo seasoned with filé powder, often incorporating
    garden‑fresh okra and tomatoes, yet they sometimes over‑spice their creations in the pursuit of authentic flavor.
  core: Andrea Howlett is a meticulous, introverted nurse who integrates their love of quiet caregiving, gardening, and creative crafts into a purpose‑driven yet occasionally over‑structured lifestyle.
background:
  cultural: Andrea was raised in Covington, Louisiana, within a middle‑class family that embodies classic Southern values of hospitality, community responsibility, and a strong work ethic. Her upbringing
    combined traditional Protestant cultural norms with the distinctive Cajun and Creole influences of St. Tammany Parish, exposing her to regional cuisine like gumbo and jambalaya, as well as music genres
    such as zydeco and jazz. She attended the local public schools and a community college where she began her nursing studies. While she respects the close‑knit social fabric of her hometown, Andrea’s
    introspective nature leads her to seek quiet, reflective spaces. This blend of Southern cultural heritage and personal preference for solitude shapes her worldview, fostering a deep appreciation for
    both communal ties and personal peace.
attributes:
  skills: '["Patient assessment", "IV therapy", "Medication administration", "Electronic Medical Records (EMR) documentation", "Wound care", "Infection control protocols", "Patient education", "Critical
