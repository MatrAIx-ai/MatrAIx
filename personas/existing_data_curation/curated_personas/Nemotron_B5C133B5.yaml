  career_goals: Jimmy aims to advance from crew member to shift supervisor within the next year, leveraging his reliability and organizational skills. His medium‑term goal is to become an assistant manager
    and eventually a restaurant manager, where he can implement efficient processes and foster a supportive team environment. He is also considering part‑time coursework in hospitality management to broaden
    his qualifications, with a long‑term ambition of owning a small independent diner that serves the Dewitt community while maintaining a predictable work schedule.
