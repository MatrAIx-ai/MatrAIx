persona_description: A researcher in the field of cancer stem cells, specifically focused on the isolation and characterization of peripheral blood cancer stem cells from recurrent breast cancer patients.
  The researcher has expertise in gene expression profiling and has developed new tools for cancer stem cell diagnostics. The researcher is interested in studying the properties of these cancer stem cells,
  their potential as targets for therapy, and their correlation with tumorigenicity, chemotherapy resistance, and motility assays. The researcher is seeking to access large numbers of these cancer stem
  cells from recurrent breast cancer patients to carry out gene expression profiling and link particular gene expression signatures with the transformed properties of these cells.
