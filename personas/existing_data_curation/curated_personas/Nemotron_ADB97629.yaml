personas:
  professional: Cleveland Voigt is an aspiring indie game developer and budding software consultant who leverages a self‑taught Python and hardware prototyping toolkit, a critical and competitive mindset,
    and a spontaneous work style to sprint through hackathon challenges while constantly battling an aversion to rigid deadlines.
  sports: A weekend mountain biker and occasional hiker, Cleveland Voigt is a member of the Burlington Youth Trail Club, follows the New England Patriots and Boston Red Sox for the thrill of competition,
    and treats fitness as a flexible side quest to balance screen time, preferring solo trail runs over organized team sports.
  arts: A digital illustrator who idolizes Studio Ghibli’s animation, emulates the pixel‑art style of Toby Fox, and playlists featuring Daft Punk, Grimes, and Anamanaguchi, Cleveland Voigt channels that
    visual and auditory inspiration into weekend concept art for indie game prototypes.
  travel: Cleveland Voigt plans trips like strategic level‑ups, mapping budget‑friendly routes to hike the Green Mountains, bike the Carpathian Trail in Romania, and attend game‑dev meet‑ups in Tokyo, balancing
    the adventure of new cultures with the practical need to save for future hardware upgrades.
  culinary: A self‑taught kitchen experimenter, Cleveland Voigt whips up avocado toast topped with smoked salmon and a drizzle of sriracha, perfects quick homemade ramen broth using miso and matcha, and
    indulges in Vermont maple‑glazed pancakes, while rarely venturing beyond take‑out pizza on late‑night coding marathons.
  core: Cleveland Voigt is a fiercely curious, competition‑driven teen who codes, sketches, and bikes with sprint‑like energy, yet habitually procrastinates on deadlines and hoards a growing pile of unfinished
    Arduino projects.
background:
  cultural: Cleveland grew up in the rural‑suburban setting of Colchester, Vermont, within a predominantly white, New England community that values self‑reliance, outdoor recreation, and modesty. The region’s
    seasonal climate and close‑knit neighborhoods have shaped her appreciation for solitary reflection in nature as well as her pragmatic approach to problem‑solving. While her family background emphasizes
    independence and practical skills, she also draws from the area’s progressive educational resources, such as community makerspaces and local libraries, which have supported her self‑directed learning.
    Her cultural influences blend traditional New England thrift and resilience with a modern, tech‑savvy outlook.
