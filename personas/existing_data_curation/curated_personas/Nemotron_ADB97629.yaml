  career_goals: Cleveland aims to become an independent software developer focusing on indie game creation and custom automation tools for local businesses. She plans to obtain industry certifications such
    as CompTIA A+ and Cisco CCENT, build a robust portfolio of self‑initiated projects, and eventually launch a boutique tech consultancy that leverages her hands‑on expertise and competitive drive. In
    the short term, she seeks to master full‑stack development, deepen her proficiency with hardware prototyping, and participate in hackathons that reward creative, practical solutions.
