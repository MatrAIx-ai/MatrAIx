persona_description: Bernadette Macartney, a mother of a child with disabilities who is also an early childhood teacher. She has conducted a qualitative, interview-based study of two families who have a
  young child with disabilities, focusing on the experiences of early childhood education from the perspective of one of the mothers. Bernadette is a social constructionist and uses discourse theory and
  analysis to reflect on the social construction of disability within early childhood centres. She is knowledgeable about the concepts of deficit and inclusion in early childhood education and has a unique
  perspective on the experiences of children with disabilities.
