  hobbies: '[''Adult soccer league'', ''Weekly bowling nights'', ''Backyard gardening'', ''Woodworking and furniture making'', ''Mindfulness meditation and stress‑reduction class'', ''Daily journaling'',
    ''Listening to classic rock music'', ''Healthcare innovation podcasts'']'
  career_goals: Victor aims to leverage his extensive nursing‑assistant background to advance into a Licensed Practical Nurse (LPN) role within the next two years by completing an accredited LPN program
    and obtaining the state license. He aspires to become a charge nurse for the geriatric unit, where he can combine his practical skills with his competitive drive to improve patient outcomes and mentor
    staff. Long‑term, he envisions a transition into healthcare administration, perhaps as a patient‑care manager, focusing on quality‑improvement initiatives that balance evidence‑based practice with the
    human side of care. He also plans to attend stress‑management workshops and seek counseling to better handle his emotional reactivity, ensuring his career growth does not compromise his mental health.
