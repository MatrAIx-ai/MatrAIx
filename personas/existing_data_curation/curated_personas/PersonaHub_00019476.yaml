persona_description: A researcher who conducts water quality monitoring and analysis at a treatment plant. The researcher is particularly interested in the use of particle counters and turbidimeters to
  measure the quality of water. The researcher is knowledgeable in particulate pre-concentration methods and has experience with the use of different types of particle counters. The researcher is also familiar
  with inorganic analysis and has conducted microwave digestion and analysis of the digested filtrate. The researcher is interested in the effects of particulate mass and volatile suspended solids on water
  quality.
