    games"]'
  career_goals: She dreams of becoming a visual storyteller—such as a children’s book illustrator, graphic novelist, or concept artist for immersive media—where she can blend her love for fantasy, abstract
    concepts, and emotional depth. Emelda hopes to study fine arts and multimedia design, eventually working freelance to retain the flexibility she values while also learning techniques to support emotional
    well‑being, perhaps by creating therapeutic art programs for kids who feel anxiety or sadness.
