personas:
  professional: Emelda Donaldson, a budding digital storyteller, turns her sci‑fi and fantasy tales into simple Scratch games, blending colorful tablet illustrations with code, while they often let deadlines
    slip, saving projects for spontaneous bursts of late‑night inspiration.
  sports: Emelda Donaldson, a member of the Riverdale Rovers youth soccer club, loves weekend matches, dreams of cheering for the New York Knicks during basketball season, and spends free afternoons cycling
    through the local park trails, though they sometimes skip practice in favor of sketching the scenery.
  arts: Emelda Donaldson, an avid fan of Studio Ghibli films and the graphic novel series Saga, spends hours drawing vibrant characters inspired by Hayao Miyazaki’s worlds, collecting limited‑edition art
    prints from Banksy, and listening to the eclectic playlists of indie band Tame Impala while crafting stories for school assignments.
  travel: Emelda Donaldson has explored the canyons of the Grand Canyon on a family road trip and now daydreams about witnessing the Northern Lights in Iceland and navigating the neon streets of Tokyo,
    preferring spontaneous sketch‑filled stops over rigid itineraries, yet budget constraints mean most adventures remain local weekend getaways.
  culinary: Emelda Donaldson’s palate delights in rainbow fruit smoothies, sushi rolls with avocado and cucumber, and homemade mac and cheese, often attempting to recreate their favorite dishes like pepperoni
    pizza from a YouTube tutorial, though they sometimes burn the cheese while multitasking between drawing and gaming.
  core: Emelda Donaldson, the imaginative 12‑year‑old artist‑coder, blends color, story, and code into whimsical worlds, yet their anxiety and habit of leaving projects half‑finished keep them juggling
    dreams and reality.
background:
  cultural: Emelda grows up in a middle‑class suburban family in Springfield, Virginia, within the culturally diverse Fairfax County. Her household reflects typical American suburban values—emphasis on
    education, community involvement, and holiday traditions such as Thanksgiving and Fourth of July celebrations—while also being open to the multicultural influences present in her school and neighborhood.
    She has Anglo‑American heritage, which informs her exposure to classic literature and folk art, but she also appreciates the variety of perspectives offered by the diverse peers around her, fostering
    an inclusive outlook and a broad appreciation for different artistic styles.
