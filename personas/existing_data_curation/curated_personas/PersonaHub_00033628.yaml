persona_description: A person who is interested in water management and water accounting, particularly in the Melbourne region. They are likely to be a member of the Melbourne Water management team or a
  researcher studying the impact of climate change on water resources in the region. They would be familiar with the Bureau's data and would be interested in comparing the rainfall data provided by Melbourne
  Water with the Bureau's estimates. They would also be interested in the dynamic storage surface areas calculated from the levels and capacity tables and the restatement of the rainfall volumes due to
  an error in the 2010–11 year volume published in the 2011 Account.
