persona_description: A materials scientist with expertise in the field of encapsulant degradation and testing. They are conducting research on the impact of UV exposure and other environmental factors on
  encapsulant materials used in PV modules. They are proposing changes to a test sequence to evaluate the durability of encapsulants and frontsheets in the field. The persona is focused on developing tests
  that can accurately predict the long-term performance of encapsulant materials in outdoor environments. They are likely to have a deep understanding of the properties of encapsulants and their degradation
  mechanisms, as well as the testing methodologies and equipment needed to conduct these tests.
