personas:
  professional: Jose Ayala is an aspiring teen game designer who blends strategic thinking from Minecraft with a disciplined yet flexible approach to schoolwork, using their curiosity and pragmatic mindset
    to prototype redstone circuits and code simple mods, all while staying reliable in meeting assignment deadlines.
  sports: Jose Ayala thrives on the soccer field at the neighborhood park, playing as a midfielder in the local youth league while cheering for D.C. United, merging competitive drive with teamwork and using
    off‑season bike rides to stay fit.
  arts: Jose Ayala channels creativity into sketching sci‑fi comic strips inspired by the visual storytelling of Akira Toriyama and the narrative depth of Neil Gaiman, while practicing acoustic guitar with
    a repertoire of traditional Latin ballads and contemporary folk tunes from artists like Joan Baez, balancing disciplined practice with spontaneous improvisation.
  travel: Jose Ayala enjoys family road trips to Washington, D.C. for the annual Salvadoran Festival and a summer visit to Mexico City’s historic center, yet they eagerly plan a future solo adventure to
    Tokyo’s Akihabara district to explore video‑game culture and anime museums, balancing the comfort of familiar holidays with a curiosity for new horizons.
  culinary: Jose Ayala helps prepare pupusas stuffed with queso fresco and loroco, steams tamales wrapped in corn husks, and experiments with seasoning blends of achiote and cumin, balancing a growing culinary
    confidence with a habit of taste‑testing every spoonful.
  core: Jose Ayala melds a strategic gamer’s mind with a soccer player’s teamwork, a budding guitarist’s rhythm, and a teen’s burgeoning independence, all while juggling school, a pocket allowance, and
    occasional forgetfulness about inhalers.
background:
  cultural: Jose comes from a Salvadoran family that values close‑knit relationships, respect for elders, and a strong sense of community. Spanish is spoken at home, and family gatherings often feature
    traditional foods like pupusas, yuca frita, and horchata, as well as music ranging from cumbia to reggaetón. Catholic celebrations such as Semana Santa and the feast of the Virgin of Guadalupe hold
    special importance, and the family participates in local Salvadoran events in the Washington, D.C. area. Living in Capitol Heights, a diverse suburb of Prince George's County, has exposed Jose to a
    blend of Latino cultures and broader American influences, shaping a bicultural identity that honors his Salvadoran roots while embracing opportunities in his U.S. community.
