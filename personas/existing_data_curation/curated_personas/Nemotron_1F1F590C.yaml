  career_goals: Jose aims to finish high school with strong grades in math and science, join his school's robotics club, and earn a certification in Python programming. He envisions using his bilingual
    abilities and technical skills to develop mobile apps or software solutions that help his community access resources in both Spanish and English, such as translation tools or neighborhood information
    platforms. He is also intrigued by civil engineering and hopes to contribute to infrastructure improvements in Capitol Heights. Ultimately, he aspires to become a software engineer or technology entrepreneur
    who creates socially impactful products while staying connected to his cultural roots.
