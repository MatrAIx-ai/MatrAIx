personas:
  professional: A seasoned systems engineer and data analytics specialist, Eric Canales channels a methodical mindset and an imaginative spark into leading complex technical projects, crafting clear documentation,
    and mentoring budding tech entrepreneurs, while seamlessly weaving abstract artistic concepts into practical product designs; they are known for bridging engineering with art in community STEAM initiatives.
  sports: An avid outdoor enthusiast and community sports fan, Eric Canales hikes the Franklin Mountains with the local climbing group, runs in the El Paso Half Marathon with the Franklin Mountains Running
    Club, and passionately follows the El Paso Chihuahuas baseball team and the San Antonio Spurs, while their competitive streak drives them to dominate weekend pick‑up basketball games at the community
    center.
  arts: A multidisciplinary creator, Eric Canales paints abstract canvases inspired by Frida Kahlo’s color palettes, captures candid street moments reminiscent of Banksy’s urban edge, and strums acoustic
    guitar in a local mariachi ensemble covering classics by Carlos Santana and Juan Gabriel, regularly attending openings at the Cielo Gallery and dancing salsa to the rhythms of Celia Cruz; they often
    merge digital illustration with Arduino‑driven light installations for community art shows.
  travel: An adventurous planner with a love for cultural immersion, Eric Canales maps out road trips that blend desert hikes in Big Bend, art festivals in Santa Fe, and culinary tours in Oaxaca, while
    also savoring weekend getaways to Tokyo for its tech scene and Barcelona for its architecture; they balance family obligations with a desire to explore, preferring itineraries that allow time for spontaneous
    photography stops.
  culinary: A home‑cooking aficionado, Eric Canales masterfully prepares mole poblano, carne asada tacos, and chiles rellenos, often using fresh corn masa and a blend of ancho and pasilla chilies; they
    enjoy pairing dishes with homemade horchata and mezcal, and while their kitchen skills are solid, they sometimes over‑spice a sauce in the pursuit of bold flavor.
  core: Eric Canales, a 51‑year‑old engineer‑artist, merges analytical rigor with vibrant traditions, sketching ideas on napkins while scaling mountain trails and mentoring the next wave of tech innovators.
background:
  cultural: Eric is a Mexican-American who grew up in the culturally rich border city of El Paso. Bilingual in Spanish and English, he maintains strong family ties and celebrates Mexican traditions such
    as Día de los Muertos, Cinco de Mayo, and traditional religious holidays. His upbringing blends Mexican heritage—music, cuisine, and community values—with the broader Texan and American cultural landscape,
    shaping his identity and community involvement.
