  hobbies: '[''Abstract painting'', ''Street photography'', ''Acoustic guitar (Mariachi)'', ''Maker meetups and Arduino projects'', ''Hiking (Franklin Mountains)'', ''Cooking Mexican cuisine'', ''Art gallery
