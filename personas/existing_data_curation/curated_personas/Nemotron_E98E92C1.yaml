    Live Concerts"]'
  career_goals: Craig aims to move from his current first‑line supervisory role to store manager within the next two years, then advance to district manager overseeing multiple locations in the Midwest.
    He plans to enroll in an MBA program focused on operations to deepen his strategic skills. Long‑term, he envisions opening his own retail franchise or serving as a regional operations director, where
    he can shape company culture, drive performance, and mentor future leaders while maintaining a healthier work‑life balance.
