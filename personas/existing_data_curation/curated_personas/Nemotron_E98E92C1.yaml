personas:
  professional: Craig Wells, a 42‑year‑old retail supervisor with a graduate business background, channels their love of structure, data‑driven merchandising, and charismatic public speaking into leading
    store teams, meticulously tracking performance metrics while constantly worrying about hitting sales targets and preparing for the next promotion to manager.
  sports: Craig Wells coaches their high‑school daughter’s soccer team, enjoys weekend rounds at the Des Moines Golf Club, roots for the Iowa Hawkeyes football squad and the Des Moines Menace soccer club,
    and spends tranquil evenings fishing the Des Moines River, balancing competitive drive with relaxed outdoor recreation.
  arts: Craig Wells, a classic‑rock enthusiast who sings Led Zeppelin at karaoke and performs with the Des Moines Community Playhouse, delights in the works of actors Tom Hanks and Meryl Streep, using theater
    and music as a social outlet that amplifies their talkative, center‑stage personality.
  travel: Craig Wells prefers meticulously planned road trips to Midwestern wonders like the Badlands and Lake Michigan, occasionally treats themselves to a weekend in New York City for a Broadway show,
    while family responsibilities keep longer international voyages on the back‑burner.
  culinary: Craig Wells, a self‑described grill‑master, showcases their skill at weekly barbecues with smoked brisket seasoned by hickory chips, catfish tacos topped with fresh cilantro, and butter‑glazed
    corn on the cob, while occasionally experimenting with rosemary‑infused lamb, revealing both confidence and a penchant for over‑ambitious dishes.
  core: Craig Wells blends a structured, data‑focused work ethic with a sociable, talkative energy, constantly juggling leadership ambitions, community service, and lingering worries about performance metrics,
    all while indulging in classic‑rock concerts, weekend barbecues, and sometimes over‑planning their schedule.
background:
  cultural: Craig grew up in a Midwestern, white American family in Iowa, where community involvement, hard work, and modesty are central values. His ancestry includes German and Scandinavian roots common
    to the region, fostering an emphasis on punctuality, reliability, and a strong sense of neighborly support. He participates in local church activities, values traditional family gatherings, and appreciates
    the agricultural heritage of Polk County while integrating contemporary business practices into his professional life.
