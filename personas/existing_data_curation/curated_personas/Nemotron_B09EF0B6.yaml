personas:
  professional: Okcha Kim, a 19‑year‑old school bus driver with a budding passion for urban planning, blends meticulous route planning, first‑aid certification, and bilingual communication with a compassionate,
    detail‑oriented approach that makes each morning commute a lesson in safety and community care.
  sports: Okcha Kim, an occasional weekend runner, cheers for the Tampa Bay Buccaneers and supports the local soccer club Tampa Bay Rowdies, participates in a casual pick‑up basketball league at the community
    center, and maintains fitness through yoga rather than competitive sports.
  arts: Okcha Kim, an avid follower of Tampa’s street‑art scene, regularly sketches murals along the Riverwalk, cites Banksy’s stencil work and the vibrant paintings of Kehinde Wiley as inspirations, attends
    indie gigs at The Ritz where the band White Ocean performs, and never misses the monthly indie‑film showcase at the Tampa Theatre featuring directors like Bong Joon‑ho and Greta Gerwig.
  travel: Okcha Kim, who prefers immersive short trips over long flights, spends weekends exploring the Gulf Coast’s Clearwater Beach and the historic streets of St. Augustine, dreams of a cultural pilgrimage
    to Seoul’s design districts, and plans a future backpacking route through the Pacific Northwest’s national parks.
  culinary: Okcha Kim, a home‑cooking enthusiast, blends her Korean roots by perfecting kimchi jjigae and bulgogi with Southern twists like shrimp and grits, delights in crafting heaping bowls of gumbo
    with Andouille, and often experiments with fresh herbs yet occasionally forgets to clean the wok promptly.
  core: Okcha Kim channels a quiet, detail‑driven spirit into every bus route, sketch, and community project, balancing a love for art and public service with a penchant for yoga, thoughtful budgeting,
    and occasional coffee‑shop impulse buys.
background:
  cultural: Okcha is a second‑generation Korean American raised in Tampa’s multicultural neighborhoods. Her household blended Korean traditions—celebrating Lunar New Year, speaking Korean at home, and cooking
    kimchi, bibimbap, and other dishes—with Southern Floridian customs like weekend barbecues and community festivals. She attended Korean language school on weekends while being immersed in Tampa’s diverse
    arts community, fostering a bicultural identity that values family, collectivism, and community harmony. This background influences her compassionate outlook, her love for sharing cultural experiences,
    and her dedication to serving both her local and heritage communities.
