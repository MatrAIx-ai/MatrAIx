  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Reading contemporary fiction'', ''Studying philosophy'', ''Exploring design thinking'', ''Yoga'', ''Meditation'', ''Volunteering as a tutor'', ''Korean
    calligraphy'', ''Cooking Korean dishes'', ''Experimenting with Southern cuisine'', ''Attending indie film screenings'', ''Enjoying small live music sessions'']'
  career_goals: Okcha aims to complete a bachelor’s degree in urban planning or public administration, building on her hands‑on experience as a school bus driver. She envisions moving into transportation
    planning or a supervisory role within a school district, where she can design equitable, sustainable transit solutions that improve access for students and underserved communities. Long‑term, she hopes
    to assume a leadership position that integrates her love of art by coordinating community‑based public‑space projects—such as school murals, cultural festivals, or art installations—that foster harmony,
    creative expression, and civic pride.
