  hobbies: '[''LEGO building'', ''Chess'', ''Scratch programming'', ''Reading non-fiction (science/engineering)'', ''Baseball'', ''Community service (clean-up projects)'']'
  career_goals: Mark is intrigued by careers that combine logical structure with a tangible impact. He aspires to become a civil engineer, designing safe and organized infrastructure, or a school teacher
    who can provide clear, dependable guidance to younger students. He envisions attending a university to study mathematics and engineering, joining clubs that develop his leadership and technical abilities,
    and volunteering in community service projects that reinforce his desire to help others within a reliable framework.
