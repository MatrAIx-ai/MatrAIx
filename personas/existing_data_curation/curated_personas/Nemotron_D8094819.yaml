personas:
  professional: A budding actress and junior game developer, Ingred Butler channels her love for the school drama club and Scratch programming into self-directed performances and interactive stories, leveraging
    her organized, methodical nature to rehearse scripts on schedule and debug code line by line while thriving on the attention of her classmates.
  sports: As a committed midfielder for the Riverside Lions U9 soccer team, Ingred Butler revels in Saturday-morning drills and weekly matches, often cheering for the professional Manchester United women's
    side and using her hip-hop dance flexibility to improve footwork, while keeping a meticulously logged practice journal.
  arts: A vibrant member of the school drama club and hip-hop dance class, Ingred Butler draws inspiration from Lin-Manuel Miranda's rhythmic storytelling and the whimsical art of Dr. Seuss, frequently
    crafting friendship bracelets while sketching colorful characters for her upcoming school play.
  travel: When planning a family getaway, Ingred Butler fills a scrapbook with doodles of the Grand Canyon, the local science museum she visited last summer, and a dream itinerary for a future trip to Disney
    World, preferring organized itineraries with plenty of time for photo-ops and snack breaks.
  culinary: An enthusiastic junior baker, Ingred Butler follows chocolate chip cookie recipes to the letter - measuring flour, butter, and dark chocolate chunks with a ruler-marked spoon, sprinkling sea
    salt for extra flavor, and proudly serving the warm treats to her drama-club friends after rehearsals.
  core: Structured routines, sociable charisma, a love for drama, coding, soccer, and cookies combine in nine-year-old Ingred Butler, who balances meticulous planning with spontaneous bursts of chatter.
background:
  cultural: Ingred is a Black child raised in Bakersfield, California, within a supportive African‑American family that places a high value on education, faith, and community. Family gatherings often include
    storytelling, music, and celebrations of cultural traditions such as Juneteenth and Kwanzaa. Regular attendance at a local historically Black church provides her with exposure to gospel music, choir
    singing, and community service projects. Living in the diverse environment of Kern County, she also interacts with Hispanic and other cultural groups, enriching her perspective and fostering an inclusive
    outlook.
attributes:
  skills: '[''Organizational proficiency'', ''Peer communication'', ''Basic digital literacy'', ''Storytelling and presentation'', ''Early leadership in group projects'']'
  hobbies: '[''Drama club'', ''Soccer'', ''Reading adventure books'', ''Scratch coding'', ''Crafting friendship bracelets'', ''Hip‑hop dance'', ''Baking with family'']'
  career_goals: Inspired by teachers and community mentors, Ingred dreams of becoming an elementary school teacher who creates a structured, fun learning environment for kids. She also imagines working
    as a youth program coordinator at a local community center, organizing events that bring children together. Additionally, her love for animals leads her to consider a future as a veterinarian, caring
    for pets in her neighborhood.
