persona_description: A professional in the field of architecture and engineering who is committed to designing and implementing energy-efficient building designs. This individual is likely to be interested
  in the latest energy-saving designs and technologies, and the potential benefits of incorporating them into commercial building projects. They may be looking for ways to reduce greenhouse gas emissions
  and save money on energy bills, and may be interested in participating in the EPA's Designed to Earn the ENERGY STAR program. This persona may also be interested in learning more about the benefits of
  using EPA's online tools, such as Target Finder and Portfolio Manager, to monitor and verify the energy performance of completed projects.
