    and experimental prototyping'']'
  hobbies: '[''Abstract watercolor painting'', ''Digital illustration and generative art'', ''Science‑fiction and philosophical reading'', ''Virtual reality art exhibitions'', ''Korean calligraphy'', ''Bonsai
    gardening'', ''Mindfulness meditation'', ''Volunteer STEM workshops'', ''Attending cultural festivals'', ''Nature hiking and photography'']'
  career_goals: Even in retirement, Yeng aims to channel his curiosity into lifelong learning and community impact. He plans to mentor senior students and underrepresented groups in STEM through workshops
    and one‑on‑one tutoring, while also developing a collaborative art‑technology installation that explores abstract concepts of time and memory. He hopes to publish a reflective memoir that weaves his
    scientific career with his artistic passions, and to serve as an advisory volunteer for local cultural and tech nonprofits, fostering harmony between innovation and tradition.
