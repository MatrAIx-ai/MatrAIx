personas:
  professional: Yeng Park, a retired computational research scientist turned interdisciplinary art‑tech mentor, spends his days designing algorithmic art installations and guiding senior learners through
    data‑driven creative workshops, blending rigorous statistical modeling, machine‑learning expertise, and digital illustration skills with a calm, imaginative demeanor to foster innovative, harmonious
    projects.
  sports: Yeng Park, an avid senior hiker who joins the Trailblazers Senior Hiking Club for weekly treks through the nearby hills, follows the Seattle Mariners baseball season and cheers on the Seattle
    Seahawks football team, and supplements his outings with gentle tai chi sessions in the park to maintain flexibility and balance.
  arts: Yeng Park, whose artistic practice fuses abstract watercolor works reminiscent of Helen Frankenthaler with algorithmic digital illustrations inspired by Beeple, devotes evenings to traditional East
    Asian calligraphy and tending a bonsai garden, regularly attends virtual reality exhibitions of James Turrell’s light installations, and finds creative fuel in the sci‑fi narratives of Philip K. Dick
    and the classical cello melodies of Yo‑Yo Ma.
  travel: Yeng Park, a thoughtful traveler who prefers meticulously planned trips that blend cultural immersion with serene landscapes, has visited ink‑brush workshops in Kyoto, explored the volcanic vistas
    of Iceland, wandered the tranquil gardens of Suzhou, and dreams of a slow‑paced pilgrimage to the ancient monasteries of Bhutan, balancing travel costs with his modest retirement budget.
  culinary: Yeng Park, who enjoys a refined yet modest palate, often prepares simple yet flavorful dishes such as miso‑glazed salmon with pickled daikon, hand‑rolled sushi with avocado and cucumber, and
    herb‑infused green tea, while his cooking skill sits at an enthusiastic home‑chef level, and he delights in tasting artisanal fermented vegetables and earthy mushroom risotto at local farm‑to‑table
    bistros.
  core: Yeng Park blends a lifelong love of algorithmic precision with boundless artistic curiosity, channels his calm resilience into community mentorship, habitually carries a sketchbook and a pocket‑size
    bonsai pruning kit, and occasionally forgets to water his bonsai during late‑night coding sessions.
background:
  cultural: Yeng is a first‑generation Korean American who grew up in the Bay Area, where his family preserved many traditional customs such as celebrating Chuseok and Lunar New Year, cooking kimchi, and
    practicing Korean language and calligraphy. The blend of Confucian respect for education and communal harmony with the innovative spirit of Silicon Valley shaped his values of diligent learning, cooperation,
    and openness to novelty. He remains active in the local Korean community association, sharing both his technical expertise and artistic interests while bridging his heritage with the multicultural fabric
    of Santa Clara County.
attributes:
  skills: '[''Advanced Python programming'', ''Machine learning model development'', ''Statistical analysis and data modeling'', ''Data visualization and interactive dashboards'', ''Technical writing and
