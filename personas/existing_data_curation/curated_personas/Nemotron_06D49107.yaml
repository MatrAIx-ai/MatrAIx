personas:
  professional: Sharon Hernandez, a budding young engineer, merges her love of chess strategy, LEGO architecture, and robotics club projects into methodical problem‑solving, applying the same disciplined
    precision she brings to her ballet rehearsals.
  sports: Sharon Hernandez channels her disciplined energy into twice‑weekly ballet classes, supports the local youth soccer team the Riverside Runners, and follows the Los Angeles Lakers, preferring structured,
    measurable progress in all her fitness activities.
  arts: Sharon Hernandez, an avid ballet enthusiast who looks up to Misty Copeland, enjoys listening to Ludovico Einaudi’s piano pieces while assembling LEGO architecture sets, and delights in reading aloud
    Roald Dahl stories during library volunteer story‑time events.
  travel: Sharon Hernandez plans her family’s summer adventures down to the day, favoring destinations like the Grand Canyon for its clear trails, the Smithsonian museums in Washington, D.C., and dreaming
    of a future cultural tour of Barcelona’s iconic architecture.
  culinary: Sharon Hernandez, a meticulous young cook, loves to bake banana bread using exact gram measurements and to assemble spaghetti Bolognese with fresh basil, oregano, and mozzarella, treating each
    recipe like a puzzle that must fit perfectly.
  core: Sharon Hernandez is a calm, methodical 12‑year‑old who thrives on structure, turning puzzles, robotics, ballet, and precise budgeting into a disciplined pursuit of measurable progress while quietly
    challenging herself to excel.
background:
  cultural: Sharon was raised in the suburban town of Wakefield, Massachusetts, within a middle-class white family of primarily Irish and German ancestry. Her community places a high value on education,
    punctuality, and civic involvement. Seasonal local traditions such as Fourth of July parades, Thanksgiving potlucks, and town clean-up days are part of her upbringing, as are family customs that emphasize
    personal responsibility, volunteerism, and a strong work ethic.
attributes:
  skills: '[''Organizational planning'', ''Mathematical reasoning'', ''Computer basics (word processing, spreadsheets)'', ''Strategic thinking (chess)'', ''Time management'', ''Leadership in group projects'']'
  hobbies: '[''Chess'', ''LEGO building'', ''Puzzle solving'', ''Robotics club'', ''Ballet'', ''Library volunteer (event planning)'']'
  career_goals: Sharon aims to pursue a career that leverages her love for structure and planning. She is interested in fields such as architecture, civil engineering, or project management, where she can
    design efficient spaces, coordinate teams, and oversee detailed processes. In the short term, she wants to excel in advanced math courses, win school competitions like science fairs and chess tournaments,
    and develop a portfolio of design projects.
