persona_description: A researcher who is interested in studying the greenhouse gas emissions from agricultural land, particularly on Andosol soil types. This researcher is particularly interested in comparing
  the CO2 flux from vegetable gardens, forests, and bare land, and also in comparing the CO2 flux from peat soils with those of mineral soils. This researcher is also interested in studying the soil respiration
  and microbial populations in the soils of vegetable gardens and forests, and how these factors may impact the CO2 flux. This researcher is likely to have a background in agricultural science, soil science,
  and environmental science, and may have expertise in using chamber methods and CO2 analyzers for measuring gas fluxes.
