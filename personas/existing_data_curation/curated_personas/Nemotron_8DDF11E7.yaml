  hobbies: '["Hiking in the Blue Ridge Mountains", "Landscape gardening", "Historic building photography", "Writing architecture articles", "Reading contemporary design journals", "Woodworking", "Playing
    piano", "Traveling to architectural landmarks", "Cooking Southern cuisine", "Attending community theater"]'
  career_goals: Laura aims to transition from senior project leadership to a partnership role where she can influence the strategic direction of her firm. She is intent on establishing a boutique practice
    focused on environmentally responsible civic architecture that reflects the cultural heritage of the American South. Winning a national AIA award for innovative sustainable design is a milestone she
    aspires to achieve within the next five years. Simultaneously, she wishes to mentor the next generation of architects, particularly women in STEM, and to serve on regional planning commissions to shape
    community development policies.
