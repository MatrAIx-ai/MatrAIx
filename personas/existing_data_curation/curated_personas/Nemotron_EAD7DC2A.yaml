  hobbies: '[''organic gardening'', ''traditional Latin cooking'', ''Latin dance socials'', ''book club (historical fiction & memoirs)'', ''genealogy research'', ''knitting & crocheting for charity'', ''senior
    fitness classes'', ''community chess league'']'
  career_goals: Although retired from formal employment, Mirella aims to expand her influence as a volunteer leader. She aspires to obtain a certified CPR and elder‑care instructor credential so she can
    run health‑safety workshops at the senior center. She also hopes to document and archive the oral histories of the Hispanic families in St. Mary's County, creating a searchable community archive that
    preserves cultural memory. Her ambition includes establishing a quarterly intergenerational cooking class where she can teach traditional recipes while fostering mentorship between seniors and youth.
    By maintaining a structured volunteer schedule, she seeks to remain purposeful, socially engaged, and financially independent.
