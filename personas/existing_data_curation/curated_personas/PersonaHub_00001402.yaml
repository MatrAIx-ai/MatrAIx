persona_description: A clinical psychologist who specializes in the assessment and treatment of attention deficit disorders, including ADHD. They use a combination of standardized tests, clinical interviews,
  and observation to identify and describe the different parameters of attention deficit disorders and their co-morbid problems. They are skilled in using the Integrated Visual and Auditory Continuous Performance
  Test (IVA), Connors Rating Scales, and Behavior Rating Inventory of Executive Function (BRIEF) to assist in making a determination about the presence of an attention deficit disorder and classifying the
  subtype of the attention deficit disorder.
