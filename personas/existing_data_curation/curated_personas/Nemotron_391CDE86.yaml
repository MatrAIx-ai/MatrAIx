  hobbies: '[''Oil painting'', ''Photography'', ''Traditional South Asian cooking'', ''Reading science and philosophy books'', ''Gardening'', ''Yoga and meditation'', ''Attending community theater'', ''Walking
    and bird‑watching'']'
  career_goals: Bhavik aims to transition into a senior training and mentorship role within his fire‑rescue department, where he can integrate his love of art and unconventional thinking into emergency
    response training—such as incorporating visual storytelling and mindfulness techniques to improve team cohesion and patient rapport. He also aspires to develop a county‑wide community health outreach
    program that blends basic emergency preparedness with culturally tailored education, and hopes to author a series of articles on the psychological well‑being of first responders.
