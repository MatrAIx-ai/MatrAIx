  career_goals: Charles aims to build a career at the intersection of art and technology. In the next five years, he plans to complete a Bachelor of Fine Arts in Visual Communication, develop a robust freelance
    portfolio, and secure a junior role at a creative agency or production studio in Los Angeles. He aspires to later become a senior art director or creative director, overseeing interdisciplinary projects
    that blend digital media, interactive installations, and community‑focused art events. He also hopes to launch occasional pop‑up galleries that showcase emerging local artists, reflecting his commitment
    to unconventional ideas and collaborative spaces.
