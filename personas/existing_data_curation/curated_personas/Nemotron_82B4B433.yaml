personas:
  professional: A budding young inventor, Rodney Shields channels their curiosity and methodical mindset into building intricate LEGO creations and coding Scratch animations, always planning each step like
    a miniature engineer.
  sports: A spirited youth soccer player, Rodney Shields practices twice weekly with the Colby Cubs Youth Soccer Club, admires the disciplined play of the Green Bay Packers and the teamwork of the Milwaukee
    Brewers, and they dedicate Saturday mornings to bike rides along the Fox River for extra cardio.
  arts: An enthusiastic amateur musician, Rodney Shields strums simple acoustic guitar chords while humming along to folk tunes by Woody Guthrie and listening to the "Adventure Time" soundtrack, and they
    often illustrate scenes from favorite adventure books like "The Hobbit" in a well‑worn sketchbook.
  travel: An organized explorer, Rodney Shields plans family trips to nearby lakes such as Lake Koshkonong for fishing and kayaking, has visited the Wisconsin Dells amusement parks, and dreams of backpacking
    through Yellowstone and the Grand Canyon, always packing a meticulous checklist of gear and snacks.
  culinary: A budding home chef, Rodney Shields loves whipping up cheese curds on a skillet, making buttered fish sticks after weekend lake trips, and experimenting with simple recipes like pancake batter
    infused with fresh blueberries, while occasionally hoarding a secret stash of gummy bears for a rainy‑day movie marathon.
  core: Rodney Shields is a methodical ten‑year‑old who balances a love for nature, LEGO engineering, and acoustic guitar with a diligent allowance habit, yet occasionally forgets to pack their inhaler
    for soccer practice.
background:
  cultural: Rodney was raised in Colby, Wisconsin, a small Midwestern town with strong community ties and a heritage rooted in German and Scandinavian ancestry. His family emphasizes modesty, hard work,
    and respect for nature, often engaging in activities such as fishing, local fairs, and church gatherings. The cultural environment encourages both independence and cooperation, shaping Rodney’s balanced
    approach to social interaction, responsibility, and personal ambition.
