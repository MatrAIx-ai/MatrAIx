  career_goals: Rodney dreams of becoming an engineer or architect who designs practical solutions for his community, inspired by his love of building and curiosity about how things work. In the short term,
    he aims to improve his math grades, join the school’s robotics club, and win a prize at the upcoming science fair. He also hopes to volunteer as a junior helper at local community events, developing
    a sense of civic responsibility that aligns with his balanced compassion and self‑interest.
