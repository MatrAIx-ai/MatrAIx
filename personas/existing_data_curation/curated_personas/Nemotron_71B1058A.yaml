  career_goals: Willie aims to translate his community‑focused skill set into a sustainable role that offers both financial security and personal fulfillment. Over the next two years, he plans to complete
    a short‑term certification in community health outreach or nonprofit management through a local community college or online platform. He hopes to secure a position as a community liaison or program
    coordinator for a nonprofit serving the African‑American community in Starkville, where he can design workshops that blend art, health education, and youth mentorship. In parallel, he dreams of starting
    a small side business offering customized event planning and catering services that highlight traditional Southern cuisine with a modern twist. Ultimately, Willie wants to build a career that lets him
    use his curiosity for new ideas while contributing to the well‑being and cultural enrichment of his family and neighbors.
