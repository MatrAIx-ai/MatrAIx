  career_goals: Erin aims to preserve her family’s heritage by documenting recipes, stories, and genealogical information for her grandchildren and great‑grandchildren. She wishes to keep her health and
    independence, continuing to tend her garden and manage her household. She also hopes to mentor younger members of her church in practical crafts and volunteer organization, ensuring the community’s
    traditions endure.
