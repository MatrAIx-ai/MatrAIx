persona_description: A genealogist or researcher who is interested in understanding the historical context of the 1911 census in Great Britain. They are particularly interested in the protest conducted
  by the Suffragettes during the census and how it affected the data collection. They are looking for information on women who boycotted the census and how their absence is likely to affect the accuracy
  of the census data. They are also interested in the additional information requested in the census, such as the fertility census and occupational questions, and how they can be used to gather more detailed
  information about the families being counted.
