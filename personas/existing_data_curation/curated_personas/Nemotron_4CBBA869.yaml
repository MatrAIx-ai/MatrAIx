  career_goals: Angel aims to become department chair within the next five years, leading a strategic overhaul of the college’s education programs. She plans to launch a fully online degree pathway that
    incorporates immersive AR/VR labs, securing a multi‑year grant to fund the initiative. Publishing a book on evidence‑based teaching practices and contributing to peer‑reviewed journals are key scholarly
    ambitions. She is committed to mentoring junior faculty, improving student retention and success rates, and establishing a wellness program that addresses faculty stress and promotes work‑life balance.
    Ultimately, she aspires to influence state‑wide educational policy through active participation in professional associations.
