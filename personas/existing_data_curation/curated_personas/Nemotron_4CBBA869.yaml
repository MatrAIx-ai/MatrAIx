personas:
  professional: Angel Carithers, a 40‑year‑old instructional design professor, leverages adult learning theory and emerging AR/VR tools to craft data‑driven curricula while channeling their sociable, talkative
    nature into dynamic workshops, committee leadership, and grant writing, balancing curiosity with practical implementation.
  sports: Angel Carithers, a dedicated weekend paddler with the Gulf Coast Paddle Club, balances sunrise kayak sessions and beach walks with regular yoga at Sunrise Flow studio, stays fit through occasional
    beach volleyball, and fervently supports the Tampa Bay Buccaneers and Tampa Bay Lightning, often timing workouts to the rhythm of game‑day excitement.
  arts: Angel Carithers channels a love of coastal photography into sun‑lit sunset captures inspired by Sebastião Salgado, immerses themselves in live sets by Leon Bridges at regional music festivals, and
    admires contemporary installations at Art Basel Miami Beach, all of which shape a vibrant, community‑focused aesthetic.
  travel: Angel Carithers prefers thoughtfully planned escapades that blend adventure and relaxation, having kayaked the crystal waters of Belize, strolled the historic streets of Charleston, photographed
    the sunrise over the Amalfi Coast, and dreaming of a meditative retreat beneath Iceland's aurora‑lit skies when family schedules allow.
  culinary: Angel Carithers, an adept home chef, curates dinner parties centered on Mediterranean flavors—think herb‑infused grilled swordfish with fresh basil‑lemon pesto, saffron‑rich paella brimming
    with shrimp and smoked paprika, and a seasonal herb garden that fuels their love for rosemary, thyme, and dill.
  core: Angel Carithers is a charismatic educator who transforms anxiety into relentless curiosity, juggling festival‑fuelled spontaneity with meticulous curriculum design, while obsessively arranging herb
    pots and snapping sunset photos.
background:
  cultural: Angel grew up in a middle‑class family on Florida's Gulf Coast, where Southern hospitality and strong community ties were emphasized. Her parents prized education and civic involvement, encouraging
    participation in school clubs and local volunteer projects. The coastal environment nurtured her love for nature, outdoor recreation, and seafood‑centric culinary traditions. Although identifying as
    white, she has been shaped by Florida's multicultural landscape, including Spanish influences and interactions with a diverse population of retirees, fishermen, and tourists. Active in a non‑denominational
    church, she values service, fellowship, and mentorship. These cultural experiences inform her inclusive teaching philosophy and her dedication to community engagement.
