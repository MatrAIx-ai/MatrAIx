  hobbies: '[''Book Club Leadership'', ''Toastmasters Membership'', ''Kayaking'', ''Paddleboarding'', ''Beach Walking'', ''Birdwatching'', ''Herb Gardening'', ''Hosting Dinner Parties'', ''Yoga'', ''Mindfulness
