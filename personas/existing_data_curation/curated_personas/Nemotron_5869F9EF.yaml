personas:
  professional: An experienced civil engineer named Hieu Tran applies rigorous structural analysis, seismic retrofitting, and BIM-driven sustainable design to complex Inland Empire projects, and they counterbalance
    their high emotional reactivity by meticulously double‑checking calculations and documentation to ensure safety.
  sports: An avid outdoors enthusiast named Hieu Tran enjoys walking the San Bernardino mountain trails, fishing at Lake Arrowhead, and cheering for the Los Angeles Lakers and Los Angeles Dodgers, while
    they belong to a local senior hiking club that meets bi‑weekly.
  arts: A culturally engaged retiree named Hieu Tran appreciates traditional Vietnamese poetry recitals, listens to the piano works of Lang Lang, and attends community theater productions featuring classic
    American plays, and they often discuss historical biographies with a small book club.
  travel: A seasoned traveler named Hieu Tran prefers low‑key road trips to nearby natural attractions like Yosemite National Park and the Pacific Coast Highway, while they dream of revisiting the historic
    Old Quarter of Hanoi and exploring the cherry blossoms of Kyoto during spring.
  culinary: A passionate home cook named Hieu Tran frequently prepares phở broth simmered with star anise and ginger, assembles bánh mì with crispy baguettes, pickled daikon, and lemongrass‑infused pork,
    and they relish experimenting with fresh basil, coriander, and Sriracha to balance flavors.
  core: A reflective engineer named Hieu Tran harmonizes meticulous professional standards with a gentle, garden‑tending soul, and they navigate anxiety through routine, community service, and carefully
    measured financial and health choices.
background:
  cultural: Hieu was born in California to Vietnamese refugee parents who arrived after the Vietnam War. Raised in a bilingual household, he grew up speaking both English and Vietnamese and celebrating
    traditions such as Tet, ancestor worship, and communal meals. The family emphasized education, respect for elders, and community service—values rooted in Confucian teachings and adapted to American
    cultural norms. Hieu remains active in the local Vietnamese community, attending a Buddhist temple and participating in cultural events. This bicultural upbringing informs his collaborative work style,
    his dedication to building safe, resilient infrastructure for diverse neighborhoods, and his commitment to giving back through mentorship and volunteerism.
