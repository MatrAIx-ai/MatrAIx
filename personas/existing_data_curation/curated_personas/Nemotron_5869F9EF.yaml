  career_goals: As he approaches retirement, Hieu aims to transition into a senior consultancy role focused on enhancing seismic resilience of public infrastructure in Fontana and surrounding communities.
    He aspires to mentor younger engineers, offering guided apprenticeships that blend technical rigor with emotional resilience. He also hopes to launch a small pro‑bono advisory service for local non‑profits
    building community centers, and to establish a scholarship for Southeast Asian students pursuing engineering. Ultimately, he wishes to leave a legacy of safer, more inclusive built environments while
    documenting his professional journey in a technical memoir.
