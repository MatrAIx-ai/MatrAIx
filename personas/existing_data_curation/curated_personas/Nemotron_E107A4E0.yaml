  hobbies: '[''Hunting and fishing'', ''Country and bluegrass music'', ''Classic truck restoration'', ''Woodworking'', ''Volunteering at the local church'', ''Family barbecues'', ''Watching football and
    NASCAR'', ''Local history research'']'
  career_goals: Amos aims to transition into a supervisory or driver‑trainer role within his current company over the next few years, leveraging his extensive on‑road experience to lead a small team and
    improve safety metrics. Simultaneously, he harbors a long‑term ambition to launch his own independent delivery service focused on serving the coal‑mining and rural communities of Logan County. To support
    these goals, he is working toward completing his GED, attending evening workshops on small‑business management, and saving for a modest down‑payment on a used straight‑truck. Ultimately, he hopes to
    secure a stable income that will allow a comfortable early retirement, giving him more time for family and his hobbies.
