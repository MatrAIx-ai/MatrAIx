persona_description: A lawyer with extensive experience in constitutional law and the interpretation of statutes. They have a deep understanding of the three-pronged test for determining the constitutionality
  of a statute, including the compelling governmental goal, narrowly tailored, and least restrictive means principles. They are well-versed in the Supreme Court's rulings on the application of strict scrutiny
  and intermediate scrutiny, including cases such as Adarand Constructors, Inc. v Pena. They have a passion for understanding and applying the principles of separation of powers within the context of the
  Constitution. They are skilled in analyzing complex legal issues and providing clear and concise legal advice to clients.
