    readings'', ''participating in community theater'']'
  career_goals: She aims to complete her undergraduate degree in Art History or Museum Studies, enabling her to transition into a part‑time role as a community arts coordinator or gallery assistant. Tonia
    also wishes to develop a small home‑based business offering curated art workshops and guided tours for seniors, blending her organizational strengths with her passion for art. Long‑term, she hopes to
    become an advocate for mental‑wellness through creative expression, perhaps obtaining certification in art therapy.
