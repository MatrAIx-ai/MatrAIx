personas:
  professional: Tonia Stewart, a 44‑year‑old community‑focused arts enthusiast, leverages their meticulous budgeting and event‑planning skills to curate home galleries, coordinate volunteer exhibitions,
    and teach informal art workshops, while their curiosity drives them toward a part‑time role as a gallery assistant once they complete an Art History degree.
  sports: Tonia Stewart, an avid member of the San Diego Hiking Club, spends weekends tackling the coastal trails of Torrey Pines, regularly signs up for the La Jolla Half Marathon, and cheers for the Padres
    and Wave FC while balancing their fitness routine with restorative yoga sessions.
  arts: Tonia Stewart, a mixed‑media collage artist and amateur curator, spends free hours at the Museum of Contemporary Art San Diego, draws inspiration from the works of Frida Kahlo and David Hockney,
    leads neighborhood children in informal photography lessons, and regularly attends poetry readings featuring spoken‑word artists like Sarah Kay.
  travel: Tonia Stewart favors weekend road trips along the Pacific Coast Highway, having explored La Jolla, Big Sur, and Santa Barbara, while dreaming of a cultural immersion tour of Oaxaca, Mexico, and
    plans trips with a modest budget and occasional travel grants for art‑related workshops.
  culinary: Tonia Stewart delights in crafting Californian‑Mexican fusion dishes such as grilled mahi‑mahi tacos with chipotle‑lime crema, avocado‑cucumber ceviche, and herb‑infused quinoa salads, yet often
    forgets to clean the kitchen promptly, resulting in a cluttered counter that mirrors their occasional overwhelm.
  core: Tonia Stewart blends meticulous organization, artistic curiosity, and a penchant for worrying into a life where curated home galleries, herb‑laden fusion meals, and mindful hikes coexist with occasional
    splurges and a lingering sense of stress.
background:
  cultural: Tonia identifies as white American with deep roots in the West Coast’s multicultural environment. Growing up in Southern California, she absorbed the region’s laid‑back beach lifestyle, an appreciation
    for outdoor recreation, and a respect for the diverse Hispanic influences that shape San Diego’s food, language, and community events. Her upbringing emphasized education, civic engagement, and an openness
    to artistic expression, which continue to inform her values and daily practices.
