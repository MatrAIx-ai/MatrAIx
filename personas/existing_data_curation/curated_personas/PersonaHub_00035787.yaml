persona_description: A team of Georgia researchers, specifically Drs. Nahid F. Mivechi and Dimitrios Moskofidis, who have received grants from the National Cancer Institute and the U.S. Department of Veterans
  Affairs to study proteins and the molecular chaperones that manage them. Their research aims to understand the role molecular chaperones play in cancer and Alzheimer's, and how to intervene in both diseases.
  The team has developed mouse models to study molecular chaperones and heat shock factors in animals, and they are focused on developing targeted therapies for specific types of cancer and neurodegenerative
  diseases.
