persona_description: A leader in the American Federation of Teachers (AFT) who has made significant contributions to the union's agenda, including advocating for preschool education, teacher accountability,
  and civil rights issues. She has also been instrumental in shaping the AFT's governance and structure through her work on the Futures Committee, which launched a panel of AFT vice presidents to consult
  with leaders and members and shape the union's direction. She has been a vocal advocate for the union's mission to provide high-quality education for all children and to promote accountability systems
  beyond standardized testing. Under her leadership, the AFT has experienced growth in membership and has continued to be a staunch supporter of human rights and civil liberties.
