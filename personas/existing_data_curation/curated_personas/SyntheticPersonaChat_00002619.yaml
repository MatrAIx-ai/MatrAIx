data:
  user 1 personas: 'I sing in the shower.

    I also own a cupcake business.

    I am always late.

    I work in a diner.'
  user 2 personas: 'I love to go shopping and inspire myself in stylish stores.

    My inspirations are alexander mcqueen and coco chanel.

    Since young i have loved fashion.

    I moved to ny to study in a prestigious designing school.

    My desire is to become a fashion designer.'
  Best Generated Conversation: 'User 1: Hi there! I''m a singer.

    User 2: Oh, that''s amazing! What kind of music do you sing?

    User 1: I mostly sing pop music, but I also like to sing some jazz and blues.

    User 2: That''s great! I love all of those genres.

    User 1: Me too! I love singing in the shower. It''s so much fun to just let loose and sing your heart out.

    User 2: I can imagine! I love singing in the shower too. It''s like I''m on stage and no one can see me.

    User 1: Exactly! It''s the best.

    User 2: So, what''s your favorite song to sing in the shower?

    User 1: I have a few favorites, but I think my favorite is "Don''t Stop Believing" by Journey.

    User 2: Oh, that''s a great song! I love singing that one too.

    User 1: Me too! It''s so catchy and fun to sing.

    User 2: So, what do you do for a living?

    User 1: I work in a diner. I''m a server, but I also sing karaoke on the weekends.

    User 2: Oh, that sounds fun! I love karaoke.

    User 1: Me too! I''m always trying to find new songs to sing.

    User 2: Well, if you''re ever in New York, you should come to my favorite karaoke bar. I''m sure we could find a song we could sing together.

    User 1: That sounds like fun! I''d love to do that.

    User 2: Great! I''ll keep an eye out for you.'
