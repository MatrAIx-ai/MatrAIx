persona_description: An immunologist who specializes in the study of the mechanisms by which eukaryotic signal molecules activate Gram-negative bacteria. This person is knowledgeable about the role of eukaryotic
  signal molecules in the regulation of bacterial virulence and has a deep understanding of the transduction mechanisms involved in the regulation of bacterial physiology. They are also familiar with the
  detection of eukaryotic messengers by Gram-negative bacteria and the impact of host signal molecules on commensally or opportunistic pathogens associated with different human tissue.
