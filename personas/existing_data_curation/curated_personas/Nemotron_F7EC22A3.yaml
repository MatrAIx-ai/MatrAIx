personas:
  professional: Shawn Price, a 52‑year‑old full‑stack developer with 28 years of experience in Python, JavaScript, C#, React, .NET Core, and cloud platforms, blends a spontaneous, rapid‑prototyping mindset
    with a strong UI/UX aesthetic, mentors junior engineers, and is aiming to transition into a technology architect role while founding a boutique consultancy that merges software engineering with interactive
    art installations.
  sports: Shawn Price spends weekends paddling the Chesapeake Bay with the Chesapeake Bay Paddle Club, hikes the Rappahannock Valley trails, follows the Washington Commanders in football season, the Washington
    Nationals during baseball, and the DC United for soccer, using these activities to balance spontaneous creative bursts with a structured physical routine.
  arts: Shawn Price paints watercolor landscapes inspired by J.M.W. Turner, creates digital illustrations that echo Alex Ross’s style, captures sunrise over the York River with a photographic eye reminiscent
    of Ansel Adams, strums acoustic guitar covering Nick Drake and John Mayer, frequents the Virginia Museum of Fine Arts and the National Gallery of Art for inspiration, and reads speculative works by
    Neal Stephenson to fuel artistic imagination.
  travel: Shawn Price enjoys spontaneous weekend getaways to historic colonial towns like Williamsburg and Yorktown, dreams of a month‑long artistic retreat in Kyoto, Japan, and a sailing adventure through
    the Greek Islands, often booking last‑minute flights to capture the thrill of uncertainty while keeping a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: Shawn Price experiments with modernist cooking, loves sous‑vide salmon with a miso glaze, seared scallops with citrus‑butter, incorporates smoked paprika, fresh basil, and pomegranate molasses
    into dishes, they cook at an intermediate level, swapping recipes with fellow coders, and they source seasonal produce from local farmers markets to inspire new culinary creations.
  core: Shawn Price is a curiosity‑driven technologist‑artist who toggles between code and canvas, thrives on spontaneous projects, occasionally misses deadlines due to a love of last‑minute inspiration,
    and infuses every part of life with a blend of analytical precision and aesthetic wonder.
background:
  cultural: Shawn grew up in a suburban community near the Chesapeake Bay in Virginia, where the region’s maritime heritage and historic colonial atmosphere shaped his early worldview. His family celebrated
    traditional Southern hospitality—shared meals of fresh seafood, community festivals, and storytelling—while also encouraging intellectual curiosity, leading him to tinker with his first home computer
    at a young age. He attended a state university in Virginia, earning a bachelor’s degree in a STEM field, and has lived most of his adult life in Gloucester County, a locale known for its blend of historic
    preservation and natural beauty. The local culture, with its emphasis on independence, self‑reliance, and appreciation for both history and the outdoors, complements his unconventional, exploratory
    mindset. While identifying as white American, Shawn embraces a broad cultural perspective, integrating the region’s artistic traditions, coastal lifestyle, and a progressive tech community into his
    personal identity.
