  career_goals: Shawn aims to evolve from a senior developer into a technology architect, leading cross‑functional teams in designing scalable, user‑centric systems. He envisions creating a boutique consultancy
    that merges software engineering with interactive art installations, allowing him to leverage his creative curiosity. In the next five years, he plans to earn cloud architect certifications (AWS Solutions
    Architect, Azure Architect) and contribute to open‑source projects focused on generative visualizations. He also hopes to mentor more junior developers, perhaps by establishing a local coding boot‑camp
    with an emphasis on creative coding. Ultimately, Shawn desires a flexible work arrangement—part‑time consulting and freelance projects—that affords him the freedom to pursue artistic ventures and spontaneous
    travel while maintaining a steady income.
