  hobbies: '[''Beach volleyball'', ''Zumba/dance classes'', ''Kayaking'', ''Paddle‑boarding'', ''Community festivals'', ''Karaoke nights'', ''TikTok content creation'', ''Journaling'', ''Yoga'', ''Guided
    meditation'', ''Reading young‑adult fiction'', ''Sunset photography'', ''DIY crafts'']'
  career_goals: Emily aims to combine her love for people, her practical curiosity, and her awareness of mental‑health challenges into a career that is both socially engaging and stable. She plans to enroll
    in a community‑college program in hospitality and tourism management, with the long‑term goal of becoming an event coordinator for beach‑side venues in Southwest Florida. At the same time, she wants
    to complete a certificate in mental‑health first aid so she can serve as a peer support leader on college campuses or within youth programs. Emily hopes to eventually launch a small consulting boutique
    that helps local businesses design inclusive, wellness‑focused events while also producing social‑media campaigns that raise awareness about anxiety and resilience among young adults.
