  career_goals: Michael aims to leverage his decades of construction experience to mentor the next generation of tradespeople in his community. He plans to become a part‑time safety consultant for local
    contractors, offering training on OSHA standards and modern sustainable building practices. He also hopes to lead a community workshop series on traditional wood‑frame techniques and historic restoration,
    preserving local heritage buildings. On a personal level, he wants to finish building a modest cabin in the woods as a legacy project for his family, and to write a memoir that captures his life on
    the job and his love of art and craftsmanship. Additionally, he dreams of traveling to major art museums in the Midwest and the East Coast, broadening his artistic horizons before fully retiring.
