personas:
  professional: Hannah Shin, a 73‑year‑old taxi driver in Plymouth, blends decades of road‑wise expertise with a storyteller’s flair, navigating rural backroads and downtown streets while they delight passengers
    with local history, mentor younger drivers, and sketch ideas for a guidebook of hidden town gems.
  sports: Hannah Shin enjoys daily walks in the local park, participates in the Plymouth Senior Walking Club during spring and fall, joins a seasonal community softball league called the Plymouth Pines,
    and they cheer on the Chicago Cubs and Chicago Bears while occasionally attending yoga classes for seniors at the neighborhood recreation center.
  arts: Hannah Shin spends afternoons painting watercolors of the Illinois countryside, quilting vibrant seasonal patterns inspired by Monet and O'Keeffe, devouring classic literature from Jane Austen to
    Walt Whitman, and they regularly attend folk music festivals where they sway to Bob Dylan and Joan Baez performances.
  travel: Hannah Shin favors short road trips that let them explore scenic spots like Starved Rock State Park, Lake Geneva, and the historic downtown of Galena, while they dream of a leisurely train journey
    to New Orleans for its jazz heritage, balancing travel with a modest budget and occasional family obligations.
  culinary: Hannah Shin delights in cooking garden‑fresh tomato basil soup, hearty chicken pot pie, and apple crisp topped with a crumbly oat streusel, and they treat themselves to a slice of Chicago deep‑dish
    pizza topped with pepperoni and mushrooms after a long day behind the wheel.
  core: Hannah Shin, a 73‑year‑old taxi driver and avid watercolorist, blends boundless curiosity with a laid‑back, slightly disorganized lifestyle, turning every ride into a story and every spare moment
    into a burst of creative color they eagerly share with passengers and friends.
background:
  cultural: Hannah is a white Midwestern American, raised in a small town in Illinois with a family heritage that includes German and Irish roots. Her upbringing emphasized community involvement, self‑reliance,
    and polite friendliness typical of the region, while her personal curiosity pushes her toward novelty and artistic expression. She values the traditional Midwestern work ethic and the close‑knit social
    fabric of Plymouth, yet she also embraces diverse cultural experiences through art, music, and storytelling, reflecting a blend of classic values and an open, imaginative spirit.
