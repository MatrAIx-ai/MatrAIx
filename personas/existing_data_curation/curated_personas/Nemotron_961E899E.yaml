personas:
  professional: Jack Backman, a budding teen technophile, applies their curiosity and methodical mindset to designing Arduino projects, debugging code, and crafting intricate model aircraft, and they balance
    innovative ideas with practical constraints.
  sports: Jack Backman rides the local Pocono Trail Riders club on weekends, follows the Philadelphia Eagles and the Philadelphia 76ers, and they balance competitive chess tournaments with moderate cardio
    runs on forest trails, preferring structured training over spontaneous play.
  arts: 'Jack Backman devours classic science‑fiction novels by Asimov and Liu Cixin, binge‑watches series like Star Trek: Discovery, and they draw inspiration from electronics‑themed concept art of artists
    such as Syd Mead, occasionally sketching circuit diagrams as a form of creative expression.'
  travel: Jack Backman plans trips with spreadsheets, favoring meticulously mapped road trips to nearby sites like the Liberty Science Center and the National Air and Space Museum, and they dream of a future
    backpacking adventure through the Swiss Alps to visit high‑altitude observatories.
  culinary: Jack Backman prefers quick, protein‑rich meals such as pepperoni pizza, chicken teriyaki bowls, and homemade ramen, boasting a modest cooking skill that allows them to assemble sushi rolls a
    few times a month, yet they often skip family dinners to game into the night.
  core: Jack Backman is a solitary, strategy‑obsessed teen who blends relentless curiosity with precise organization, and they obsessively tinker with electronics while occasionally neglecting social interaction
    and sleep.
background:
  cultural: Jack comes from a white, working‑class family with German‑Irish roots in Hawley, Pennsylvania. Raised in the rural Pocono region of Lackawanna County, he grew up in a community where self‑reliance,
    modesty, and practical hard work are valued. Family traditions include attending local county fairs, participating in community sports events, and a respect for the outdoors, though Jack’s personal
    preferences lean toward quieter, solitary pursuits. The cultural environment emphasizes education, resilience, and a balanced respect for both innovation and tradition.
