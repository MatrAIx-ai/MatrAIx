  hobbies: '[''Arduino projects'', ''Strategy video games'', ''Science fiction reading'', ''Model aircraft building'', ''Cycling'', ''Hiking'', ''Chess'', ''Puzzle solving'']'
  career_goals: Jack aims to channel his curiosity and practical skills into a career in engineering or technology. He wants to attend a high school with strong STEM programs, earn a scholarship to study
    computer engineering or robotics, and eventually work as a software developer or robotics technician. He is motivated to win local robotics competitions and to gain certifications in computer hardware
    repair. In the long term, he hopes to design innovative tech solutions that blend creativity with functional design.
