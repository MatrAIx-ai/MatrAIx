personas:
  professional: Shannon Smith, a seasoned management analyst in Sevierville’s tourism sector, translates complex data into clear reports using Excel, Power BI, and Tableau while weaving curiosity‑driven
    exploration of new business models with a practical Lean mindset; their spontaneous, people‑centric style shines in stakeholder workshops where they mediate conflicts, even as a natural resistance to
    rigid deadlines sometimes prompts last‑minute sprint sessions.
  sports: Shannon Smith embraces the outdoors by hiking the Great Smoky Mountains with the local Senior Hiking Club, follows the Tennessee Smokies minor‑league baseball team and the Sevierville High School
    football games, and balances these activities with gentle yoga sessions at the community center.
  arts: Shannon Smith immerses themselves in the arts through a community theater troupe where they play classic Southern roles, sings in a church choir performing hymns and gospel arrangements, and fills
    spare time quilting inspired by Appalachian folk motifs while enjoying the music of Dolly Parton, Johnny Cash, and the Broadway scores of Stephen Sondheim.
  travel: Shannon Smith prefers road‑trip adventures that mix planned visits to nearby national parks like Shenandoah and the Finger Lakes with spontaneous detours to craft fairs in Asheville, balancing
    a modest consulting income with occasional splurges on a weekend getaway to Savannah, all while traveling with friends who share their love for community festivals.
  culinary: Shannon Smith delights in cooking classic Southern fare such as smoked pork shoulder, fried green tomatoes, and collard greens, while also experimenting with Thai green curry and Mediterranean
    salads, often harvesting basil, rosemary, and mint from their backyard garden and leading a weekly senior‑center cooking class where they encourage participants to try new spice blends.
  core: Shannon Smith blends analytical rigor with community‑driven spontaneity, juggling curiosity, a caring nature, and occasional anxiety‑fuelled overcommitment into a life rich in mentorship, local
    traditions, and creative pursuits.
background:
  cultural: Shannon grew up in a small town in East Tennessee, immersed in Appalachian and Southern traditions. Her upbringing emphasized hospitality, community involvement, and a strong work ethic rooted
    in the region’s agrarian and tourism‑driven economy. She identifies with the cultural values of the Appalachian foothills—storytelling, music, and close‑knit family ties—while also embracing contemporary
    ideas through her business education. Her faith community, a Protestant congregation, plays a central role in her life, shaping her cooperative and considerate outlook. Living in Sevierville, she blends
    these heritage influences with a modern, curious perspective on the evolving tourism landscape.
attributes:
  skills: '[''Data analysis and reporting'', ''Process improvement'', ''Strategic planning'', ''Stakeholder communication'', ''Conflict resolution'', ''Team building'', ''Project coordination'', ''Tourism
    industry knowledge'', ''Community outreach'', ''Emotional intelligence'']'
  hobbies: '[''Hiking'', ''Community theater'', ''Cooking'', ''Gardening'', ''Volunteering'', ''Church choir'', ''Reading mystery novels'', ''Quilting'', ''Yoga'', ''Attending music festivals'']'
  career_goals: Shannon aims to transition from day‑to‑day analysis to a senior advisory role where she can mentor emerging analysts and guide regional tourism initiatives. She plans to obtain a certification
    in project management or organizational development to strengthen her ability to meet deadlines, while also building a part‑time consulting practice that helps local family‑owned businesses adapt to
    changing market demands. Ultimately, she hopes to serve on the board of a community non‑profit, shaping policies that balance economic growth with the well‑being of residents, and to maintain a flexible
    schedule that supports her own mental‑health needs.
