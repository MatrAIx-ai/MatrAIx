  hobbies: '["Watercolor Painting", "Digital Illustration (Procreate)", "Reading Speculative Fiction and Philosophy", "Photography (Urban & Cultural Subjects)", "Salsa Dancing", "Cooking Traditional Mexican
    Cuisine with Modern Twists", "Volunteering at Community Center (Computer Skills Mentoring)", "Journaling and Creative Writing", "Participating in Local Art Exhibitions", "Community Mural Projects"]'
  career_goals: Luz aspires to transition from her current supervisory role into a senior operations manager position within the next five years, leveraging her organizational strengths and creative mindset
    to drive innovation in workplace processes. She plans to complete her bachelor's degree in Business Administration, with a concentration in Organizational Leadership, while earning certifications in
    Project Management (PMP) and Lean Six Sigma. Long‑term, she hopes to lead cross‑functional initiatives that integrate technology and design thinking to improve employee experience and operational efficiency.
    Luz also dreams of mentoring young professionals, especially first‑generation college students, and eventually launching a community workshop series that blends administrative best practices with creative
    problem‑solving techniques.
