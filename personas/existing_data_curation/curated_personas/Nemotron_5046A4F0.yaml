personas:
  professional: Deronda Miller is a seasoned assembler and fabricator who transforms technical drawings into precision‑built components on CNC machines and manual lathes, leveraging a knack for creative
    problem‑solving and lean workflow to mentor new hires, while pursuing Six Sigma and OSHA certifications to step up as a lead fabricator and eventually supervise a maker‑space studio that fuses art installations
    with sustainable manufacturing.
  sports: Deronda Miller enjoys weekend volleyball matches with the Sandia Valley Volleyball Club, tackles seasonal hikes up the Sandia Mountains, roots for New Mexico United soccer, and balances high‑intensity
    cardio with occasional yoga classes at the local community center to keep their competitive edge sharp.
  arts: Deronda Miller immerses themselves in abstract painting and mixed‑media collage, drawing inspiration from the vibrant murals of the Albuquerque Arts District and the Southwestern tones of Georgia
    O’Keeffe, while regularly attending improv theater sessions at the UNM Playhouse, dancing to the experimental sounds of Flying Lotus and the folk storytelling of Brandi Carlile.
  travel: Deronda Miller plans trips with a blend of meticulous itinerary notebooks and spontaneous side‑quests, having hiked the red‑rock canyons of Sedona, explored the turquoise streets of Chefchaouen,
    and yearning to experience the geothermal springs of Iceland’s Blue Lagoon, all while balancing travel costs against the savings goal for their future maker‑space studio.
  culinary: Deronda Miller’s palate gravitates toward bold Southwestern flavors like roasted green chile enchilada with carne adovada, while they experiment at home by infusing quinoa‑stuffed peppers with
    prickly‑pear salsa, and they indulge in occasional sushi rolls featuring jalapeño‑marinated tuna at the city’s farm‑to‑table spot, The Desert Bloom, though a habit of late‑night snacking on trail mix
    often sabotages their diet plan.
  core: Deronda Miller is a competitive, imagination‑driven fabricator‑artist who blends precision engineering with bold creative projects, thriving on community collaboration while gently wrestling with
    occasional over‑commitment and skepticism.
background:
  cultural: Deronda grew up in a middle‑class white family in Albuquerque, New Mexico, where she was exposed to the region’s blend of Southwestern and Native American cultures. Her upbringing included participation
    in local festivals like the Balloon Fiesta and familiarity with the area’s distinctive art scene, from folk art museums to public murals. While maintaining a mainstream American cultural foundation,
    she embraces the multicultural atmosphere of the Southwest, influencing her appreciation for diverse artistic expressions and community‑oriented activities.
attributes:
  skills: '["Technical drawing interpretation", "CNC machine operation", "Manual lathe and milling", "Precision hand assembly", "Mechanical troubleshooting", "Quality inspection and control", "Lean manufacturing
    practices", "Custom fixture design", "Training and mentoring", "Basic 3D printing", "Robotics integration basics", "Safety compliance", "Workflow optimization"]'
  hobbies: '["Abstract painting", "Mixed-media collage", "Community improv theater", "Dance classes", "Recreational volleyball", "Hobbyist robotics", "Personal 3D printing projects", "Hiking in Sandia Mountains",
    "Attending Albuquerque International Balloon Fiesta", "Reading speculative fiction"]'
  career_goals: Deronda aims to progress from an assembler to a lead fabricator and eventually a production supervisor within the next five years. She plans to obtain Six Sigma and OSHA certifications,
    lead a team that collaborates on artistic installation projects, and ultimately open a small maker‑space studio where local artists and fabricators can co‑create innovative works. She also aspires to
    be recognized regionally for pioneering sustainable fabrication methods.
