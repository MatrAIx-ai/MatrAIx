  career_goals: Although still an infant, Alejandra’s family envisions a future where she pursues a stable, community-oriented career that aligns with her love for routine, practicality, and her competitive
    streak. She expresses an early fascination with organized environments, hinting at aspirations to become a teacher, librarian, or medical assistant—professions that require structure, reliability, and
    the opportunity to excel academically. Her competitive nature motivates her to aim for academic scholarships and professional certification, while her cautious personality drives her toward roles that
    offer clear expectations and minimize unexpected stress.
