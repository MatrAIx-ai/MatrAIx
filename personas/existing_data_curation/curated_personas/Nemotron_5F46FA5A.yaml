  career_goals: Marilyn aims to transition into a Lead Software Engineer or Solutions Architect role within the next three years, where she can shape technical strategy and mentor junior developers. She
    plans to obtain AWS Solutions Architect and Certified Kubernetes Administrator certifications to broaden her cloud expertise. Long-term, she envisions launching a consultancy that offers practical,
    data-driven software solutions for the agricultural and logistics sectors in the Midwest, leveraging her competitive drive to build a reputation for high-performance, reliable systems.
