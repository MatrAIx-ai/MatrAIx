personas:
  professional: Marilyn Acevedo, a full‑stack software developer adept in Python, Java, and C#, leverages her methodical, competitive drive to architect scalable APIs, enforce rigorous code‑quality standards,
    and mentor junior engineers as she targets a Lead Engineer or Solutions Architect role.
  sports: Marilyn Acevedo hikes Nebraska’s state parks on weekends, trains with the Lincoln Trail Runners club in the spring, fervently supports the Nebraska Cornhuskers football team, and applies her disciplined,
    goal‑oriented mindset to a regular cardio routine that mirrors her professional rigor.
  arts: Marilyn Acevedo devours science‑fiction novels by Octavia Butler, relaxes to the synth‑driven beats of Daft Punk, enjoys strategic board‑game nights featuring Terraforming Mars, and attends local
    gallery openings that showcase Midwestern impressionist painters.
  travel: Marilyn Acevedo meticulously plans weekend road trips to Chimney Rock and annual excursions to Yellowstone, while nurturing a long‑standing dream of a tech‑focused sabbatical in Tokyo to explore
    AI labs and savor authentic sushi.
  culinary: Marilyn Acevedo, a confident home chef, turns garden‑fresh kale and heirloom tomatoes into dishes ranging from spicy Korean bibimbap to a velvety mushroom risotto, and occasionally treats herself
    to a gourmet burger at Omaha’s top‑rated joint as a well‑earned indulgence.
  core: Marilyn Acevedo blends relentless curiosity with pragmatic precision, balancing methodical code reviews and late‑night puzzle marathons with garden‑to‑table meals, while occasionally succumbing
    to credit‑card splurges on the latest dev gadgets.
background:
  cultural: Marilyn grew up in a Midwestern white family with German-Irish roots that emphasized hard work, self-reliance, and community involvement. Living in Omaha, she absorbs the city’s blend of pragmatic
    entrepreneurship and friendly neighborhood culture. Her upbringing instilled a practical outlook, an appreciation for local traditions such as county fairs and seasonal festivals, and a commitment to
    giving back through volunteerism. These cultural influences shape her balanced approach to both professional challenges and personal pursuits.
