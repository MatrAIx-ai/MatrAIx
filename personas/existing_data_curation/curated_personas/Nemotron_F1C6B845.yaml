  career_goals: Joseph aims to advance to a Director of Finance role within the next three years, positioning himself for eventual promotion to Vice President of Finance or Chief Financial Officer. He seeks
    to lead larger, cross-functional finance teams, drive the adoption of advanced analytics and automation tools, and enhance the organization’s profitability through strategic cost-management. Additionally,
    he intends to obtain the Certified Public Accountant (CPA) credential to broaden his expertise and, long-term, to launch a boutique financial consulting firm that advises midsized Midwestern manufacturers
    on financial planning and operational efficiency.
