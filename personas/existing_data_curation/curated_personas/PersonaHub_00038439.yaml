persona_description: A Danish historian and genealogist who specializes in the study of royal families and dynastic marriages. They are particularly interested in the history of Denmark and the dynastic
  marriages between Denmark and Brandenburg. They have a deep understanding of the life and reign of Agnes of Brandenburg, including her regency during her son's minority, her marriage to count Gerhard
  II of Holstein-Plön, and her death and burial in Denmark. They have a strong interest in the details and nuances of her life and reign, and are knowledgeable about the historical context in which she
  lived.
