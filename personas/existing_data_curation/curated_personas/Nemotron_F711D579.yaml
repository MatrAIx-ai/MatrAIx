personas:
  professional: Kelly Moore is a budding digital storyteller who uses Scratch to animate whimsical tales, applies methodical planning learned from school projects to code, and channels their curiosity and
    competitive spirit into creating intricate interactive narratives.
  sports: Kelly Moore enjoys cheering on the Tuttle Tigers football team on Friday night lights, participates in a community youth soccer league, and balances their love for outdoor exploration with a disciplined
    approach to fitness by doing daily stretching routines and occasional bike rides along the local creek, treating each activity as a puzzle to master.
  arts: Kelly Moore’s artistic world is colored by watercolor landscapes inspired by the prairie, fantasy novels by JK Rowling, the cinematic wonder of Hayao Miyazaki’s films, and a growing collection of
    LEGO creations, while they spend weekends at the library’s art workshop and practice piano pieces by Beethoven, expressing their emotions through each brushstroke and melody.
  travel: Kelly Moore dreams of road‑tripping to the Oklahoma City Zoo and the towering red rocks of Sedona, while their recent family visit to the state fair in Tulsa left them fascinated by the bustling
    midway rides and regional cuisine, and they prefer trips that blend structured itineraries with spontaneous creek‑side discoveries.
  culinary: Kelly Moore favors hearty comfort foods like chicken fried steak, cheesy pizza, and homemade apple pie, delights in mixing fresh berries into their midnight snacks, and enjoys experimenting
    with simple recipes such as lemonade and trail mix during camping adventures, yet often forgets to finish vegetables on their plate.
  core: Kelly Moore is a fiercely curious ten‑year‑old whose competitive spirit drives meticulous art projects, budget‑savvy allowance habits, and a vivid imagination that fuels both digital storytelling
    and occasional anxiety‑induced meltdowns.
background:
  cultural: 'Kelly grew up in Tuttle, a small community in Grady County, Oklahoma, where family and school events shape daily life. Her household reflects a blend of Midwestern and Southern American traditions:
    celebrating holidays like Fourth of July with community fireworks, attending county fair activities, and participating in church gatherings that emphasize community service. While the town''s cultural
    fabric includes agricultural roots and a strong sense of neighborliness, Kelly also has access to modern resources through the local library and the internet, allowing her to explore diverse ideas beyond
    her surroundings. Her family values self‑reliance, education, and personal expression, providing a supportive environment for her artistic curiosity and organized approach to challenges.'
