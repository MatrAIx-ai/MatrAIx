  career_goals: Kelly dreams of a future where she can merge her love for art and curiosity about the world. She aspires to become an architect or a wildlife illustrator, designing spaces or drawings that
    inspire and educate. She also imagines studying scientific fields such as environmental science or engineering to understand how things work, and later hopes to combine those interests by creating educational
    illustrations or interactive digital experiences for kids. Her long‑term ambition includes using her creativity and empathy to help other children express themselves and manage strong emotions.
