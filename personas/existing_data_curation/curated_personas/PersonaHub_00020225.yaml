persona_description: A neuroscientist and geneticist who studies the impact of common genetic variation on developing neurobiological circuits and the functional symptoms of autism. They are particularly
  interested in the role of the MET gene in social and emotional functions and the environmental risk factors that combine with genetic susceptibility to impact gene expression and brain development. They
  use behavioral and electrophysiological studies to investigate the functional impact of altering levels of MET expression through genetic and environmental means, and combine this with air pollutant exposures
  to determine the environmental risk factors that impact gene expression and brain development.
