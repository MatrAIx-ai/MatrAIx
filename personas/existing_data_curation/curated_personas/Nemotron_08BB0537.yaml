  hobbies: '[''Watercolor Painting'', ''Digital Illustration'', ''Speculative Fiction Reading'', ''Urban Photography'', ''Pottery'', ''Mechanical Model Building'', ''STEM Mentorship'', ''Hiking'', ''Journaling'']'
  career_goals: Bette aims to leverage her STEM background to move into a leadership role within the school transportation department, such as a Mobility Coordinator or Training Supervisor, where she can
    design safety curricula and implement data‑driven route efficiency programs. She also hopes to develop a community outreach initiative that combines art and STEM education for elementary students, creating
    after‑school workshops that inspire creativity and curiosity. Long‑term, she envisions obtaining certification as a commercial driver trainer and pursuing a master’s degree in Transportation Engineering
    to influence district‑wide policy on eco‑friendly bus fleets.
