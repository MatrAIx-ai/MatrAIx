personas:
  professional: Bette Walker, a seasoned school bus driver in Atlanta, blends technical problem‑solving and route‑optimization expertise with an imaginative, empathetic approach to child supervision, positioning
    them to champion data‑driven safety curricula as a future Mobility Coordinator, and they already mentor young riders on STEM concepts.
  sports: Bette Walker enjoys leisurely weekend hikes in Stone Mountain State Park and follows the Atlanta Hawks and Atlanta United, and they occasionally join a local co‑ed softball league for light cardio,
    reflecting a balanced yet low‑key fitness routine.
  arts: Bette Walker finds inspiration in the dreamy watercolors of Georgia O'Keeffe, the soulful folk of Leon Bridges, and the speculative worlds of N.K. Jemisin, and they channel that into their own whimsical
    digital illustrations and pottery projects while attending monthly photo walks and local art fairs.
  travel: Bette Walker prefers carefully planned road trips that blend scenic driving with artistic inspiration, having already explored Savannah’s historic squares, Asheville’s mountain studios, and New Orleans’
    jazz districts, and they dream of a future pilgrimage to the Icelandic highlands for its stark, otherworldly landscapes.
  culinary: Bette Walker’s palate balances Southern comfort—savory fried chicken, smoky pulled pork, collard greens with a splash of apple cider vinegar—and adventurous global flavors like Thai green curry,
    which they often experiment with in their modest kitchen, favoring fresh herbs like basil and cilantro while treating themselves to occasional brunches featuring avocado toast and poached eggs.
  core: Bette Walker is a creatively driven, data‑savvy school bus driver who channels their love for watercolor whimsy and STEM problem‑solving into community art‑STEM workshops, and they quietly battle
    a habit of over‑packing their backpack with puzzle kits.
background:
  cultural: Bette grew up in suburban Atlanta, raised in a middle‑class white family with deep Southern roots. Her upbringing blended traditional Southern hospitality—church gatherings, family barbecues,
    and a love for soulful cuisine—with exposure to the diverse cultural tapestry of DeKalb County. Attending a public high school in a multicultural neighborhood sparked her early interest in inclusivity
    and community service. Her STEM education at a state university broadened her worldview, and her marriage to a local high‑school teacher further connects her to the educational community. She values
    the mix of Southern tradition and progressive, multicultural influences that shape Atlanta’s identity.
attributes:
