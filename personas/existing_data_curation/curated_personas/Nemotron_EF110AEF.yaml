  hobbies: '[''Urban photography'', ''Visiting contemporary art galleries'', ''Listening to jazz and hip‑hop'', ''Improvisational drumming'', ''Pick‑up basketball'', ''DIY upcycling projects'', ''Cooking
    soul‑food recipes'', ''Attending poetry slams and open‑mic nights'', ''Reading books on design thinking'']'
  career_goals: Louis aims to transition from a line packer to a shift‑supervisor role where he can champion innovative and eco‑friendly packaging solutions. He plans to earn an official forklift certification
    and complete a short course in lean‑manufacturing to strengthen his credibility. Leveraging his love for art, Louis envisions launching a side venture that offers custom, artist‑collaborated packaging
    for local businesses and gift‑giving occasions. Long‑term, he hopes to be recognized as a go‑to resource for creative process improvements, while securing enough seniority to negotiate a more flexible
    schedule that accommodates his spontaneous lifestyle and personal projects.
