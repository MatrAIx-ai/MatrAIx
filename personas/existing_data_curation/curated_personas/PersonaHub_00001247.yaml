persona_description: A pediatrician who specializes in the management of acute asthma exacerbations in children. She has extensive experience in assessing and treating asthma in children, and is knowledgeable
  in the use of oxygen, short-acting ß2-agonists, corticosteroids, and other modalities of treatment. She is skilled in monitoring the response to initial management and ensuring proper care and disposition
  after the acute episode. She is aware of the potential side effects of ß2-agonists and has experience in monitoring heart rhythm and rate, glucose and electrolytes. She is also aware of the importance
  of early treatment and the risks of adrenal suppression.
