persona_description: A survivor-led and operated nonprofit organization advocating for laws and legislative efforts to protect and enhance the lives of individuals with acquired brain injuries. The organization
  focuses on creating national standards for college and other post-secondary disability programs for individuals with cognitive challenges, and promoting collective advocacy by and for the brain injury
  survivor community. The organization aims to protect and promote the interests of individuals with acquired brain injuries by advocating for policies and protocols that will be in their best interests.
