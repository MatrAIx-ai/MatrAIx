  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Reading Historical Fiction'', ''Gardening'', ''Hiking'', ''Cooking'', ''Hosting Dinner Parties'', ''Volunteering at Senior
    Center'', ''Knitting'']'
  career_goals: Although retired, Angela aims to deepen her involvement in the arts and education of her community. She plans to become a certified docent at the nearby Adirondack Museum, launch a weekly
    seniors' art studio offering watercolor and sketching workshops, and earn a certificate in art therapy for older adults. She also hopes to author a memoir that weaves together her teaching career, love
    of art, and the stories of the people she has mentored, while traveling to key cultural destinations such as Florence and Kyoto to broaden her artistic perspective.
