  career_goals: Jeffrey aims to complete his degree in construction management and obtain a licensed general contractor credential within the next five years. He aspires to transition from a hands‑on carpenter
    to a foreman or project supervisor, eventually launching his own boutique renovation firm that specializes in sustainable, high‑end residential projects. He also plans to earn LEED Accredited Professional
    certification to incorporate green building practices into his work.
