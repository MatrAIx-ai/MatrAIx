  career_goals: Matthew dreams of becoming an engineer who designs sustainable solutions for rural communities. He is fascinated by how structures are built and wants to study civil or environmental engineering
    to create safe bridges, barns, and renewable energy systems for places like Okeene. He also hopes to combine his love for animals with engineering by developing better habitats for livestock. His long‑term
    goal is to give back to his hometown by improving infrastructure while maintaining its small‑town character.
