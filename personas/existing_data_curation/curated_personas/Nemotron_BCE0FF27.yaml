personas:
  professional: Matthew Markham is an aspiring junior technologist who merges his love for birdwatching and plant identification with his talent for building LEGO robotics and creating Scratch games, applying
    the same practical, self‑reliant mindset they learn from helping on the family farm.
  sports: Matthew Markham plays on the Okeene Middle School basketball team, idolizes the Oklahoma City Thunder, and spends Saturday mornings shooting hoops at the community gym, while also cheering loudly
    for the local high‑school Bobcats during football season, and they never miss a game after school.
  arts: Matthew Markham strums acoustic guitar on weekends, drawing inspiration from folk artists like John Denver and modern indie band The Avett Brothers, and immerses themselves in sci‑fi novels by Isaac
    Asimov and the vivid world‑building of Brandon Sanderson, often sketching album covers for their own compositions.
  travel: Matthew Markham loves weekend road trips to the nearby Tallgrass Prairie Preserve, dreams of visiting Yellowstone National Park with their family, and has a growing list of interstate fairs—like
    the State Fair of Texas—they hope to explore once they save enough from chores.
  culinary: Matthew Markham enjoys helping cook hearty chicken fried steak with granny‑style corn muffins, delights in the crisp snap of fresh garden tomatoes in a BLT, and proudly masters the perfect skillet‑fried
    eggs for their morning meals, though they admit to sneaking extra cookies from the pantry when no one’s watching.
  core: Matthew Markham is a curious, practical 11‑year‑old who balances nature‑exploration, LEGO engineering, and weekend guitar jams while juggling a modest allowance, mild allergies, and a penchant for
    sneaking cookies, and they always find time for a quick sketch of a bird in their notebook.
background:
  cultural: Matthew is a white, Midwestern youth raised in the tight‑knit community of Okeene, Oklahoma. His family’s roots are in agriculture, and local traditions such as church gatherings, high‑school
    sports, and the annual Blaine County Fair play a central role in his upbringing. The community values self‑reliance, neighborly support, and a blend of traditional rural life with modern technology,
    all of which shape his worldview and daily experiences.
