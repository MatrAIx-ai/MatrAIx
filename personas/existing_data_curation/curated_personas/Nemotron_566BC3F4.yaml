personas:
  professional: Mark Baker, the veteran building‑maintenance specialist turned community docent, blends his hands‑on carpentry, basic plumbing, and electrical troubleshooting expertise with an organized,
    methodical approach to coordinate senior art‑appreciation tours at local galleries, mentor woodworking and photography workshops, and meticulously plan volunteer projects for the senior center, and
    they never miss a deadline.
  sports: Mark Baker, an avid fan of the San Diego Padres and the San Diego Wave, attends occasional baseball and soccer games, belongs to the Sunset Senior Swimming Club for low‑impact water aerobics,
    enjoys walking the coastal trail for birdwatching, and they keep a regular schedule of gentle stretching to manage osteoarthritis.
  arts: Mark Baker, a devoted gallery‑goer, frequently visits the Museum of Contemporary Art San Diego and the San Diego Museum of Art to study works by Ansel Adams, Georgia O'Keeffe, and local photographer
    Michael Levin, leads art‑appreciation talks that weave stories of art history with personal anecdotes, and they find inspiration for their own digital photography in the interplay of light and shadow.
  travel: Mark Baker, a methodical traveler, plans weekend road trips to regional art festivals such as the Laguna Beach Festival of Arts, historic sites like the Mission San Juan Capistrano, and scenic
    drives along the Pacific Coast Highway, prefers staying in modest B&Bs to keep costs low, and they travel primarily by car to maintain independence.
  culinary: Mark Baker, who enjoys simple Mediterranean cooking, often prepares grilled sardines with lemon‑olive oil, caprese salad with fresh basil and heirloom tomatoes, chickpea‑and‑feta mezze with
    olives, and they cultivate rosemary and thyme in their succulent garden to flavor dishes.
  core: Mark Baker is a curious, methodical 71‑year‑old handyman‑volunteer who blends his love for art, woodworking, and photography into a disciplined routine of senior mentorship, while occasionally forgetting
    to take prescribed medication but never missing a museum tour.
background:
  cultural: Mark grew up in a Midwestern town in the 1950s and 60s, shaped by post‑World War II American values of hard work, self‑reliance, and community service. He later moved to San Diego in the 1980s,
    where he absorbed the region’s laid‑back coastal lifestyle and multicultural influences, especially the vibrant Mexican‑American culture evident in local festivals, food, and language. As a white American
    baby‑boomer, he identifies with mainstream U.S. traditions—celebrating Thanksgiving, the Fourth of July, and Christmas—while also appreciating the diverse artistic and cultural tapestry of Southern
    California. His widowed status has deepened his appreciation for family connections and community involvement.
