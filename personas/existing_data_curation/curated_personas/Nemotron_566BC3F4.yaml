  hobbies: '[''visiting art galleries'', ''digital photography'', ''gardening'', ''chess'', ''reading historical fiction'', ''community theater'', ''volunteering at senior center'', ''birdwatching'', ''woodworking'',
    ''cooking Mediterranean dishes'']'
  career_goals: Mark aims to deepen his knowledge of visual arts by completing a community‑college course in art history and becoming a volunteer docent at the San Diego Museum of Art, where he can share
    his passion with visitors. He also wishes to mentor younger hobbyists in woodworking and photography through a weekly seniors' workshop he plans to organize. Additionally, he hopes to document his life
    experiences in a memoir and to travel to regional art festivals and historic sites across California, blending his love of learning with his desire to stay active and connected.
