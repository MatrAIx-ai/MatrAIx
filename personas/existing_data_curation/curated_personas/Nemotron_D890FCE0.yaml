  career_goals: Over the next few years Amanda plans to earn her GED and enroll in a vocational program for automotive technology or culinary arts, fields that blend hands‑on problem solving with creativity.
    She aims to become a certified technician or chef, eventually opening a small community workshop or pop‑up food stall that serves as a social hub for her friends. She also wants to build a personal
    brand on social media, sharing DIY tutorials and behind‑the‑scenes looks at local events, leveraging her outgoing personality and competitive drive to grow a following.
