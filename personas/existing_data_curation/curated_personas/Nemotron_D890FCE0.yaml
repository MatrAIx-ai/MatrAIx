personas:
  professional: Amanda Norris plans to trade the high school diploma for a vocational certificate in automotive technology or culinary arts, leveraging their natural knack for troubleshooting, event organization,
    and team motivation to eventually run a community workshop‑café that doubles as a social hub while growing a DIY tutorial brand on social media.
  sports: Amanda Norris thrills on a co‑ed soccer team in the Minneapolis youth league, sharpens edges at the local ice rink while cheering for the Minnesota Wild, follows the Minnesota Vikings and Minnesota
    Twins for inspiration, and treats fitness as a competitive game, often organizing pick‑up drills and pushing teammates hard in practice.
  arts: Amanda Norris energizes the downtown improv scene, regularly attends shows at the Mixed Blood Theatre and cites improvisational masters like Colin Mochri, while also vibing to live performances
    by Bon Iver, local indie rock band The Reverb Junkies, and classic acts like Prince, letting music and theater fuel their creative spark.
  travel: Amanda Norris loves weekend day‑trips to the North Shore's Superior shoreline and biking on the Midtown Greenway, dreams of a summer road trip to Seattle’s music festivals but balances those plans
    with a modest family budget, preferring a mix of spontaneous lake swims and carefully researched hostel stays over luxury travel.
  culinary: Amanda Norris craves the buttery crunch of cheese curds, the sweet‑and‑spicy kick of mango salsa tacos, and the nostalgic scent of corn dogs at the Minnesota State Fair, cooks simple but flavorful
    dishes like stir‑fried ramen with garlic and sriracha at home, experiments with grilling techniques learned from YouTube tutorials, and displays their penchant for over‑seasoning every plate.
  core: Amanda Norris blends restless energy, a competitive streak, and a love for community‑centric DIY projects into a life that swings between improvisational theater, fast‑paced sports, and a budding
    social‑media brand, all while juggling their relaxed approach to planning and occasional impulsive splurges.
background:
  cultural: Amanda grew up in a middle‑class, white family in the Minneapolis metropolitan area, with German‑Scandinavian roots common among many residents of the region. The Midwestern emphasis on community,
    self‑reliance, and practicality shaped her outlook, while the city’s vibrant arts scene and progressive atmosphere encouraged curiosity and openness to new ideas. Seasonal outdoor life—long winters
    spent ice skating and snowshoeing, and warm‑season lake activities—has given her a strong appreciation for the local environment and a social network built around neighborhood sports leagues, community
    centers, and local festivals.
