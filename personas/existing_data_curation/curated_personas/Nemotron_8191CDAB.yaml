  career_goals: He aims to pursue a career in healthcare—ideally as a physician assistant or community health worker—so he can directly help people in his neighborhood, especially those who face language
    barriers. He is also fascinated by technology and hopes to combine engineering skills with compassion to create practical solutions for his community, such as affordable health‑monitoring devices or
    educational tools.
