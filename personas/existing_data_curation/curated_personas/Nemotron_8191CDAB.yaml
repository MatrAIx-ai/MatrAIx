personas:
  professional: Getulio Sanchez is a budding indie game developer who codes simple games in Scratch and Unity, blending their curiosity about sci‑fi worlds with practical project planning, and channels
    their compassionate nature into creating gameplay that encourages teamwork and community problem‑solving.
  sports: Getulio Sanchez plays forward for the Los Fresnos Youth Soccer Club, idolizes the Houston Dynamo and Club América, trains three times a week at the local park, and they spend weekends cheering
    on the Los Fresnos High Wildcats basketball team.
  arts: Getulio Sanchez spends evenings strumming acoustic guitar to the tunes of Los Tigres del Norte and Banda El Recodo, sketches sci‑fi inspired comic panels in a Moleskine journal, and devours novels
    by Isaac Asimov and Becky Chambers, feeding their artistic imagination and love for storytelling.
  travel: Getulio Sanchez prefers weekend road trips to nearby natural spots like Laguna Madre and the Corpus Christi bay, dreams of exploring the historic streets of San Antonio’s River Walk and the vibrant
    markets of Oaxaca, and they carefully plan each journey on a shared family spreadsheet to balance school, chores, and budget.
  culinary: Getulio Sanchez enjoys helping prepare tamales, chilaquiles, and carnitas with their family, has a knack for seasoning with cumin, chilies, and fresh cilantro, and often experiments by adding
    a dash of lime to classic quesadillas for extra zing.
  core: Getulio Sanchez is a compassionate, curiosity‑driven teen who blends tech creativity, community service, and family traditions while they constantly worry about getting every detail right.
background:
  cultural: Getulio grew up in a Mexican‑American household in Los Fresnos, Texas, a border town where Mexican and U.S. cultures intertwine. He is fluently bilingual, celebrates both American holidays and
    Mexican traditions such as Día de los Muertos, Posadas, and Cinco de Mayo, and participates in family gatherings centered around Mexican cuisine. The community’s strong emphasis on family, respect,
    and mutual aid, combined with exposure to regional music like norteño and banda, shapes his values of compassion, cooperation, and a desire to give back to his community.
