  career_goals: While still very young, Shanda frequently expresses dreams of helping and creating. She loves watching her mother read to children and often says she wants to \"be a teacher\" when she grows
    up. She also shows fascination with animals during visits to the zoo, saying she would like to \"be a vet\". Her practical side steers her toward building things, so she sometimes imagines becoming
    an \"engineer\" who designs playgrounds. These aspirations are nurtured by her parents, who encourage her curiosity with educational toys and support her methodical approach to tasks. As she matures,
    she is likely to pursue a career that combines caring for others with tangible problem‑solving, such as early childhood education, veterinary medicine, or a design‑focused engineering field.
