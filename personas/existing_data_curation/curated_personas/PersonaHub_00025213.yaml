persona_description: A genealogist or historian researching the lives of women in colonial Victoria, particularly focusing on the experiences of British or European women who arrived in the state between
  1835 and 1860. They are interested in the hardships and triumphs of these women, as well as their interactions with Aboriginal Australians. They are likely to be familiar with the records of the pioneer
  women of Victoria and the book "Records of the Pioneer Women of Victoria" compiled by the Historical Committee of the Women's Centenary Council in 1937. They may also have a background in Australian history
  and literature, and be interested in the broader context of Victoria's colonial period.
