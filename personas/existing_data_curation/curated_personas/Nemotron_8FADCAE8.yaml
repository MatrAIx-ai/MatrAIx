  hobbies: '[''Hiking'', ''Nature photography'', ''Sketching'', ''Reading philosophy and non‑fiction'', ''Reflective journaling'', ''Attending theater performances'', ''Volunteering at the Ashland library'',
    ''Yoga'', ''Mindfulness meditation'', ''Puzzle board games'']'
  career_goals: Tom aspires to move from his current management analyst role into a senior strategic analyst position within the next three years, positioning himself to lead organization‑wide performance
    improvement initiatives. He plans to pursue an MBA with a focus on sustainability to deepen his expertise in environmental impact analytics, aiming to become a director of operations or a sustainability
    program manager for a regional nonprofit or forward‑thinking corporation. He also hopes to publish thought‑leadership articles and present at industry conferences, using his strong writing background
    to influence best practices in data‑driven decision making.
