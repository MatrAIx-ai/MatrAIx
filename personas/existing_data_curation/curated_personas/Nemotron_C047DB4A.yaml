  hobbies: '["Visiting Art Museums and Galleries", "Reading Historical Fiction and Biographies", "Gardening", "Cooking International Cuisine", "Volunteering at Senior Art Programs", "Traveling", "Yoga and
    Meditation"]'
  career_goals: Catherine aims to transition into a nursing management role within the next three years, leveraging her business degree to become a nurse manager or director of nursing for a community health
    center in the Newark‑Passaic region. She plans to obtain certification as a Certified Nurse Manager and Clinical Leader (CNML) and to lead initiatives that integrate art therapy and holistic wellness
    into patient care. Long‑term, she envisions establishing a consultancy that advises long‑term care facilities on improving patient outcomes through efficient workflow design, staff development, and
    culturally responsive care. She also hopes to mentor younger nurses, particularly women re‑entering the workforce, and to engage in community outreach programs that promote preventive health education.
