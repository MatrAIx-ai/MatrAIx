personas:
  professional: Catherine Lee, a seasoned licensed practical nurse with a graduate business degree, blends meticulous patient assessments, wound‑care expertise, and chronic disease management with budgeting
    savvy and workflow optimization, channeling their curiosity into pioneering art‑therapy initiatives and using their balanced assertiveness to lead interdisciplinary teams toward evidence‑based practice,
    and they continuously seek ways to merge clinical rigor with creative expression.
  sports: Catherine Lee enjoys low‑impact cardio through weekly hikes with the Hudson Valley Walking Club, follows the New York Giants, New York Yankees, and New York Knicks with enthusiastic devotion,
    plays casual tennis at the local community center each spring, and embraces seasonal cross‑country walking in the fall to maintain fitness without straining their arthritic knees, and they feel energized
    after each stride.
  arts: Catherine Lee frequently immerses themselves in the works of Claude Monet at the Newark Museum, draws creative inspiration from contemporary artist Kara Walker’s installations, unwinds to Yo‑Yo Ma’s
    cello sonatas and occasional live jazz at the Blue Note, and weaves these artistic experiences into patient workshops that blend visual art with therapeutic storytelling, allowing them to translate
    visual wonder into holistic care.
  travel: Catherine Lee favors meticulously planned art‑focused getaways, having recently explored the Renaissance galleries of Florence and the historic tea houses of Kyoto, while weekend escapes to the
    Hudson Valley’s wineries and the tranquil beaches of Cape Cod satisfy their desire for both cultural immersion and quiet reflection, and they always return home with a notebook of sketch ideas.
  culinary: Catherine Lee, an adventurous home chef, regularly crafts Thai green curry with fresh lemongrass and Thai basil, Moroccan lamb tagine spiced with preserved lemon and dried apricots, and meticulously
    rolls sushi with avocado and ahi tuna, showcasing their confident technique that occasionally falters when an overly salty broth threatens a perfectly balanced pho, and they often laugh at the kitchen
    mishaps.
  core: Catherine Lee channels boundless curiosity into art‑infused nursing leadership, balances disciplined finances with occasional splurges on creative pursuits, manages chronic health concerns through
    yoga and vigilant monitoring, and they combat a habit of forgetting to water their garden on rainy days with a weekly reminder system.
background:
  cultural: Catherine comes from a white Anglo‑American background with deep roots in the Northeastern United States. Raised in a middle‑class suburban setting, her family emphasized education, hard work,
    and community service. Traditional American holidays such as Thanksgiving and Christmas feature prominently in her cultural upbringing, underscoring values of family cohesion and gratitude. Living in
    Clifton, NJ, a melting‑pot of ethnicities, she has developed a keen appreciation for multicultural perspectives, which informs her compassionate nursing practice and her interest in bridging cultural
    gaps through art and health education.
attributes:
  skills: '["Patient Assessment", "Medication Administration", "Wound Care", "Chronic Disease Management", "Care Coordination", "Patient Education", "Electronic Medical Record Management", "Healthcare Quality
