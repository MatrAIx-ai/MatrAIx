persona_description: A public water system operator who is responsible for ensuring the safe and clean delivery of drinking water to their community. They are responsible for monitoring and managing their
  distribution system to meet the maximum contaminant levels (MCLs) for disinfection byproducts (DBPs), which include trihalomethanes (TTHM) and five haloacetic acids (HAA5). The operator must conduct an
  Initial Distribution System Evaluation (IDSE) to identify the locations with high disinfection byproduct concentrations and then use these locations as the sampling sites for compliance monitoring. The
  operator must also determine if they have exceeded an operational evaluation level and take corrective actions if necessary, such as simple management or operational changes or major construction. The
  operator must be aware of the costs associated with the Stage 2 DBP rule, which will result in increased costs to public water systems and states.
