persona_description: A person who is interested in social class and inequality, and seeks to understand the reasons behind poverty and wealth inequality in society. They are likely to be a sociologist,
  economist, or policy analyst who is interested in the social and economic dynamics of a society. They are interested in understanding how social class and economic status are determined and how they are
  influenced by factors such as education, race, gender, geography, and more. They are also interested in the impact of poverty and wealth inequality on individuals, families, and communities. They are
  open to different perspectives and approaches to understanding poverty and inequality and are willing to engage in critical thinking and analysis to arrive at a deeper understanding.
