persona_description: A geologist who specializes in the study of the glacial history of the Cairngorms, particularly the formation of roche moutonnées and their relationship to patterns of former ice flow.
  Their research interests include the investigation of the patterns of ice flow, the orientation of roche moutonnées, and the effects of rock structure on the development of ice-moulded hills. They are
  particularly interested in the use of curved sheet joints of granite spurs as indicators of the preglacial form of roche moutonnées and the evolution of large roche moutonnées. They have conducted research
  on the depths of glacial erosion, the presence of sliding ice and meltwater, and the age of features in the Cairngorms.
