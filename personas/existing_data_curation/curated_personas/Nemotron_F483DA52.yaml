  career_goals: Frances aims to secure a data analyst or quality‑assurance engineering role within a structured, mission‑driven organization—ideally in the public‑health or environmental sector where her
    analytical skills can directly benefit community well‑being. She plans to pursue a master’s degree in Data Science to deepen her expertise and ultimately lead a cross‑functional team that develops data‑driven
    solutions for local challenges. Long‑term, she envisions a career that balances technical rigor with a positive social impact, allowing her to contribute to projects that improve public health outcomes
    and environmental sustainability.
