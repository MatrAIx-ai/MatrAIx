personas:
  professional: Frances Figueroa is an aspiring data analyst who leverages Python, SQL, and Tableau to build rigorously documented, quality‑assured data pipelines for public‑health projects, applying their
    methodical, organized mindset and bilingual communication to bridge technical teams and community stakeholders.
  sports: Frances Figueroa follows the Dallas Cowboys, watches the Texas Rangers, plays pickup soccer with FC Dallas fans, dedicates weekends to hiking with the North Texas Trail Club, and practices yoga
    three times a week for flexibility.
  arts: Frances Figueroa is an avid fan of mystery novels, devouring Agatha Christie and Gillian Flynn, frequently attends live performances by local indie folk bands at the Arlington Cultural Center, and
    finds inspiration in vibrant mural art displayed during community festivals.
  travel: Frances Figueroa prefers meticulously planned trips, often using spreadsheets to schedule weekend getaways to Big Bend National Park or a spontaneous road‑trip to Austin’s music scene, while dreaming
    of a culturally immersive semester in Granada, Spain, balancing travel with a modest student budget and family obligations.
  culinary: Frances Figueroa enjoys cooking intermediate‑level traditional dishes such as pozole with hominy, chicken tacos al pastor marinated in achiote, and fresh guacamole with ripe avocados and serrano
    chilies, often sourcing fresh corn masa from a local farmers market.
  core: Frances Figueroa blends methodical data‑analysis expertise with a community‑first mindset, balancing structured routines, anxiety‑driven caution, and a love for cultural traditions, yoga, and mystery
    novels.
background:
  cultural: Frances is a first‑generation Mexican‑American who grew up in a bilingual household in Arlington, Texas. Her family celebrates traditional Mexican holidays such as Día de los Muertos and Cinco
    de Mayo, and she regularly participates in community events at the local Mexican cultural center. Fluent in Spanish and English, she values family cohesion, hospitality, and community service—principles
    that shape her collaborative and considerate nature. While embracing her Mexican heritage, she also identifies with the broader Texan cultural landscape, blending local customs with her cultural roots.
