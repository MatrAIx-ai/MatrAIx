  hobbies: '["Watercolor painting", "Herbal and vegetable gardening", "Traditional cooking", "Listening to Ecuadorian folk music and jazz", "Reading art history", "Attending community theater", "Gentle
    yoga for seniors", "Knitting and crocheting", "Volunteering at senior center", "Storytelling circles"]'
  career_goals: Though retired, Amairani aims to preserve and share her cultural heritage by documenting family recipes in a handwritten cookbook for future generations. She aspires to lead a weekly multicultural
    storytelling circle at the Ocala senior center and to partner with the local art museum on an exhibit showcasing Ecuadorian folk art. Traveling to Ecuador for the annual Carnaval and visiting her birthplace
    remain a cherished personal ambition. Additionally, she hopes to expand the community garden she tends, turning it into a space for intergenerational learning about sustainable gardening practices.
