  hobbies: '[''Photography'', ''Visiting Art Galleries and Street-Mural Tours'', ''Listening to Jazz, Soul, and Hip-Hop'', ''Playing Basketball'', ''Cooking Soul-Food Recipes'', ''Urban Gardening'', ''Mindfulness
    Meditation and Journaling'', ''Reading Contemporary Fiction'', ''Podcast Listening (Entrepreneurship & Mental Health)'']'
  career_goals: As a forward-looking operations manager, Joseph aims to step into a senior leadership role—such as Director of Operations or Regional Operations Vice-President—within the next three to five
    years. He is focused on scaling his expertise in lean transformation across multiple facilities, driving measurable efficiency gains, and embedding employee well‑being initiatives that incorporate arts
    and mindfulness to reduce workplace stress. Long‑term, Joseph envisions founding a consulting practice that helps small‑to‑mid‑size businesses in Baltimore adopt sustainable operations while strengthening
    ties to the local community and supporting youth mentorship programs.
