personas:
  professional: Breana Dorsey is a full-stack software developer whose routine-driven mindset shines through meticulous test-driven development, reliable AWS cloud deployments, and a steady climb toward
    a senior engineer role where they plan to lead a high-performing team with pragmatic architecture.
  sports: Breana Dorsey regularly joins the Washington Trails Club for weekend hikes in the Cascades, roots for the Seattle Seahawks and Seattle Kraken, and squeezes in occasional yoga sessions at a local
    studio to balance the competitive edge they bring from strategic board games.
  arts: Breana Dorsey unwinds by listening to contemporary jazz artist Kamasi Washington, indie folk singer Phoebe Bridgers, and classic blues guitarist B.B. King while occasionally attending a local community
    theater production of 'A Raisin in the Sun' to stay connected with storytelling.
  travel: Breana Dorsey prefers meticulously planned short-haul trips, having already hiked the Alpine Lakes Wilderness, explored Portland’s food scene, and booked a future weekend getaway to Asheville’s
    Blue Ridge Mountains, balancing adventure with an affordable budget that leaves room for a potential tech conference in Austin.
  culinary: Breana Dorsey cooks a weekly lineup of Southern comfort food such as buttermilk fried chicken, collard greens with smoked turkey, and sweet potato pie, adding modern twists like miso-glazed
    carrots or quinoa-infused cornbread while tending a balcony herb garden that supplies fresh thyme, cilantro, and basil for each dish.
  core: Breana Dorsey is a routine-loving, competitively driven full-stack developer who blends Southern culinary tradition with tech mentorship, strategic board-game tactics, and disciplined financial
    habits, all while conquering the Cascades on a schedule as precise as their code.
background:
  cultural: Breana grew up in a close‑knit Black family that emphasized both academic achievement and the preservation of cultural heritage. Her parents, both college‑educated professionals, encouraged
    a strong work ethic and practical problem‑solving, values that align with her routine‑focused personality. She celebrates Juneteenth, Kwanzaa, and family reunions with soulful cooking, storytelling,
    and music, reinforcing a sense of identity and community. In Seattle, she navigates the city’s tech scene while staying connected to local Black professional networks such as the Seattle chapter of
    Blacks in Tech, which provides mentorship opportunities and advocacy for diversity. Her cultural background influences her desire to mentor emerging Black developers and to infuse her projects with
    inclusive design principles.
attributes:
  skills: '[''JavaScript'', ''TypeScript'', ''React'', ''Vue.js'', ''Node.js'', ''Express'', ''Python'', ''AWS (Lambda, DynamoDB, S3)'', ''CI/CD (GitHub Actions)'', ''Test‑Driven Development'', ''Automated
    Testing (Jest, PyTest)'', ''Performance Profiling'', ''Code Refactoring'', ''Agile Scrum'', ''Technical Documentation'', ''Mentoring'']'
  hobbies: '[''Cooking traditional Southern and African‑American cuisine'', ''Urban balcony gardening'', ''Cascades hiking'', ''Chess puzzles and strategic board games'', ''Seattle Black tech community
    meetups'', ''Mentoring and community panel participation'']'
  career_goals: Breana aims to progress to a senior software engineer role within the next two years, focusing on designing scalable, fault‑tolerant systems for enterprise clients. She aspires to become
    a technical lead, overseeing a small, high‑performing team where she can apply her competitive drive to deliver reliable products on schedule. Long‑term, she plans to earn AWS Solutions Architect certification
    and transition into a software architect position, shaping system architecture with a pragmatic, routine‑oriented approach. She also envisions mentoring underrepresented developers in Seattle and eventually
    launching a consulting boutique that helps small businesses implement robust, maintainable software solutions.
