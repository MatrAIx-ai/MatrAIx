persona_description: A medical professional who specializes in the treatment of allergies and related conditions, particularly those related to latex allergy. They have a deep understanding of the symptoms,
  causes, and treatments of latex allergy, and are well-versed in the use of antihistamines, soothing lotions, and injectable epinephrine in managing allergic reactions. They are knowledgeable about the
  history of non-medication related anaphylactic reactions during anaesthesia and are familiar with the symptoms of skin rash, hives, flushing, and other allergic reactions. They are also aware of the growth
  in the latex allergy problem and its relation to the rising demand and use of latex products.
