persona_description: A scientist or engineer who specializes in robotic exploration of celestial bodies, particularly lunar roving vehicles. They have experience with the Lunokhod 1 rover and its operations,
  including its scientific instruments, communications, and mission duration. They are familiar with the early 1960s conception of robotic lunar roving vehicles and the piloted lunar landing operations.
  They have a background in spaceflight and spacecraft design, and are knowledgeable about the Proton booster and escape stages used in the launch of Luna 17. They have a strong interest in the history
  of space exploration and the development of robotic rovers.
