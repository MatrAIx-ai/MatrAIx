personas:
  professional: Roy Swinton is an aspiring robotics engineer who applies his methodical, rule‑focused mindset to design and program competition‑grade bots, while his strategic chess experience sharpens
    his problem‑solving and his competitive edge drives him to excel in every project.
  sports: Roy Swinton is a point guard on his high‑school basketball team who trains three times a week, idolizes the Golden State Warriors for their disciplined play, competes in local 3‑on‑3 tournaments,
    and follows the League of Legends e‑sports circuit for its strategic parallels.
  arts: Roy Swinton is a sci‑fi aficionado who devours novels by Isaac Asimov and Liu Cixin, streams epic film scores by Hans Zimmer, and studies game art design, channeling that inspiration into the storytelling
    elements of his Python games.
  travel: Roy Swinton is a budget‑conscious travel enthusiast who has visited the Smithsonian’s National Air and Space Museum, dreams of touring Osaka’s Science Museum robotics exhibit, and plans a school
    trip to the International Robot Challenge in Tokyo.
  culinary: Roy Swinton is a casual cook who perfects homemade pepperoni pizza with a crisp crust, experiments with a spicy ramen broth, snacks on trail mix while gaming, yet habitually over‑seasons dishes
    and skips vegetables.
  core: Roy Swinton is a rule‑driven teen who blends competitive chess tactics with code, methodically plans every move in life, yet occasionally forgets to power down devices before bedtime.
background:
  cultural: Roy is an African‑American teenager growing up in Cotati, California. His family maintains ties to Black cultural traditions, celebrating events like Juneteenth and Black History Month, and
    he listens to a mix of contemporary hip‑hop and classic soul music at home. The diverse, progressive atmosphere of Sonoma County provides him with exposure to multicultural perspectives, while his local
    community center offers mentorship programs for Black youth. These cultural influences shape his sense of identity and his desire to give back through future engineering projects that benefit underserved
    neighborhoods.
