persona_description: A hands-on, experiential learning platform designed for students to practice skills in all learning modalities through writing, speaking, touching, and seeing their own learning. The
  platform uses a patented narration process to enhance learning, with videos being the perfect tool for learning. The platform's lessons creator allows educators to segment each lesson into clear steps,
  providing several benefits such as improved metacognitive processes and time-saving in assessing. The platform's built-in reflection questions improve deeper learning and understanding, and it asks students
  to create short videos, forcing them into a metacognitive process to think about what they are going to show and say. The platform is unique in its focus on learning by limiting manual video editing features
  to trimming only and not allowing filters, fancy stickers, or colors that distract from learning.
