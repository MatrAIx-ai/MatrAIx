persona_description: A highly knowledgeable and experienced educator who has extensively researched and taught about Direct Instruction, a highly controlled instructional model that groups children by ability,
  breaks learning into discrete components, requires relentless assessment, and even scripts teacher instruction. The educator has worked with students in Direct Instruction classrooms and has seen the
  benefits and limitations of the program, including the narrow aims of education and the lack of creativity and play in the classroom. The educator is committed to promoting literacy, numeracy, and the
  development of skills, but also wants to ensure that students are able to see school as a place of exploration and wonder, to develop their passions, to cultivate their interests, and to delight in their
  own discoveries. The educator recognizes the stark choices that schools serving low-income students have to make, and is committed to promoting freedom, play, and spontaneity in education, even if it
  means sacrificing basic competencies.
