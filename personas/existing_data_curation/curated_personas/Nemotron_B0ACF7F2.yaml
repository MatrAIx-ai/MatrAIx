  career_goals: Estrella aims to advance into a senior safety leadership role within a large manufacturing firm, where she can shape a proactive safety culture and integrate emerging technologies such as
    IoT sensors for real‑time hazard detection. She plans to earn Certified Safety Professional (CSP) credentials and lead cross‑functional continuous‑improvement initiatives that reduce injuries and downtime.
    Beyond corporate advancement, she envisions mentoring younger engineers, speaking at industry conferences, and eventually launching her own consultancy focused on culturally inclusive safety programs
    for diverse workforces.
