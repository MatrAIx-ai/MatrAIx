  hobbies: '[''Painting (folk motifs)'', ''Community Chess'', ''Trivia Nights'', ''Traditional Mexican Dance'', ''Salsa Dancing'', ''Bridge and Card Games'', ''Tai Chi'', ''Culinary Experimentation (Mexican‑Californian
    fusion)'', ''Heirloom Gardening'', ''Local Art Fair Attendance'']'
  career_goals: Although officially retired, Juan aims to stay actively involved in his community. He plans to volunteer as a mentor for newly retired teachers, offering guidance on navigating retirement
    while staying intellectually engaged. He wants to spearhead a series of intergenerational art workshops that blend traditional Mexican folk motifs with contemporary techniques, fostering creativity
    among seniors and youth alike. Juan also hopes to write a memoir that reflects on his decades in education, the evolution of bilingual teaching, and the cultural shifts he has witnessed in Bakersfield.
    Finally, he aspires to enroll in a digital illustration course to expand his artistic repertoire and to occasionally substitute‑teach in bilingual classrooms to keep his teaching skills sharp.
