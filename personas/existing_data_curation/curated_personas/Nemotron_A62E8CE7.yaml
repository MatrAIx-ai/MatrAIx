  hobbies: '[''Gardening'', ''Quilting'', ''Birdwatching'', ''Reading historical fiction'', ''Church choir'', ''Volunteering at senior center'', ''Cooking'', ''Walking in nature'', ''Attending county fairs'']'
  career_goals: Julie aims to transition into a supervisory role, such as office manager or senior administrative coordinator, where she can mentor newer staff and streamline office processes. She plans
    to enhance her technical skill set by mastering advanced Excel functions, QuickBooks, and digital workflow tools to increase efficiency. Over the next few years, she hopes to lead small projects that
    improve the office’s organization, and eventually explore part‑time consulting for local non‑profits, leveraging her experience to support community initiatives while maintaining a stable, predictable
    work schedule.
