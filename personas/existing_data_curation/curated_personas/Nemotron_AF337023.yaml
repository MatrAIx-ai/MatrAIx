  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Reading medical journals'', ''Church choir participation'', ''Hospice volunteering'', ''Cooking soul food with healthy twists'', ''Quilting'',
    ''Yoga'', ''Nature walks'', ''Crossword puzzles'', ''Photography'']'
  career_goals: Bernadette aims to transition into a leadership role that leverages her blend of curiosity and practicality. Over the next five years she plans to obtain a Master’s degree in Nursing Education
    or Health Informatics, allowing her to design evidence‑based curricula for new nurses and integrate digital health tools into her hospital’s practice. She also aspires to spearhead a community‑based
    wellness program in Mansfield that provides health education and support groups for widowed seniors, reflecting her commitment to harmony and others’ needs. Ultimately, she seeks to influence policy
    at the county level to improve access to culturally competent care for the Black community.
