  hobbies: '["Sketching urban and rural landscapes","Reading literature and philosophy","Writing reflective journal entries","Playing the harmonica","Visiting art galleries and jazz venues","Gardening","Walking
    and mindfulness on the Cooper River Trail","Playing chess at the seniors'' club"]'
  career_goals: Thomas envisions transitioning to a part‑time, flexible driving schedule that frees up afternoons for his artistic pursuits and community involvement. He aims to compile a small collection
    of his ride‑inspired sketches and stories into a self‑published booklet to share the hidden narratives of Sedalia. Over the next few years, he hopes to organize a modest local gallery exhibition showcasing
    his watercolor landscapes, possibly collaborating with the Sedalia community arts center. Thomas also aspires to become a volunteer driver for a senior‑citizen outreach program, using his empathetic
    nature to provide companionship and safe transport. Additionally, he is interested in taking night classes in digital illustration to broaden his creative toolkit and, eventually, teach an informal
    art workshop for adult learners at the local library.
