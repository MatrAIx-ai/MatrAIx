persona_description: A veterinarian with expertise in the management of immune-mediated hemolytic anemia and immune-mediated thrombocytopenia, and a dedicated advocate for pet owners facing the devastating
  effects of these diseases. This person has a wealth of knowledge and experience in the field, having worked with Dr. Robert Murtaugh and Dr. Rozanski, and has helped to create materials for others to
  learn about this terrible disease and its impact on pets. They are passionate about improving the quality of life for animals with these diseases and are committed to providing the best possible care
  and treatment for their patients.
