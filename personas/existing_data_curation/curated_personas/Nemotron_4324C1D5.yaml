personas:
  professional: Cory Poole, an aspiring community arts manager, leverages their vibrant charisma and keen eye for street‑art to ignite grassroots events, while their love of spontaneity often clashes with
    the administrative discipline needed for grant writing and budgeting.
  sports: Cory Poole, a dedicated community‑center basketball player, drills with the local Harrisburg Cougars, cheers on the Philadelphia 76ers during the NBA season, and swaps the occasional pick‑up game
    for weekend park runs, preferring informal play over regimented training.
  arts: Cory Poole immerses themselves in the pulse of modern creativity, curating street‑art tours inspired by Banksy and Basquiat, spinning DJ sets that honor Kendrick Lamar and Janelle Monáe, and penning
    spoken‑word verses that echo the cadence of Maya Angelou.
  travel: Cory Poole favors spontaneous road trips to nearby gems like Gettysburg’s historic district, Lancaster’s farmer’s markets, and Asheville’s vibrant arts scene, balancing a modest travel budget
    with a desire to uncover hidden galleries and eclectic food trucks wherever the highway leads.
  culinary: Cory Poole blends soulful Southern staples such as collard greens, smoked pork ribs, and sweet potato pie with unexpected twists like kimchi‑infused cornbread, relishing the sizzle of hot sauce
    and smoked paprika while proudly hosting neighborhood potlucks that double as informal art showcases.
  core: Cory Poole is a 41‑year‑old community‑centric art enthusiast whose boundless curiosity and spontaneous spirit fuel creative projects, even as occasional disorganization and impulsive spending keep
    life delightfully unpredictable.
background:
  cultural: Cory was raised in a tight‑knit African‑American community in Harrisburg, where church gatherings, gospel music, and local block parties shaped his worldview. His family traces its roots back
    to the Great Migration, with grandparents who moved from the South to Pennsylvania in search of industrial jobs. This heritage imbues Cory with a strong sense of resilience, community solidarity, and
    pride in Black artistic expression. He regularly participates in the Harrisburg African American Heritage Festival and draws inspiration from the city’s historic Black neighborhoods, local chefs, and
    musicians. While he values traditions passed down through generations, he also embraces contemporary Black culture, from hip‑hop and spoken‑word poetry to digital art, reflecting a blend of reverence
    for the past and curiosity for new artistic frontiers.
