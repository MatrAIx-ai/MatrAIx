  career_goals: Cory aims to turn his love of art and people into a sustainable career. He envisions opening a community art space in Harrisburg that doubles as a pop‑up café where local musicians, poets,
    and visual artists can showcase their work. To achieve this, he plans to earn a GED and enroll in a community‑college certificate program in arts administration or nonprofit management. In the short
    term, he wants to work part‑time as a program assistant for a local cultural nonprofit, gain experience in grant writing, and build a network of artists. Ultimately, Cory hopes to become a recognized
    cultural liaison who bridges the city’s African‑American heritage with emerging creative voices, perhaps even curating city‑wide festivals.
