  hobbies: '[''Rooftop herb gardening'', ''Reading historical fiction and culinary memoirs'', ''Listening to jazz, soul, and gospel music'', ''Singing in church choir'', ''Volunteering at local food bank'',
    ''Saturday dance classes'', ''Traveling to explore regional bakeries'', ''Experimental recipe testing'']'
  career_goals: Keira aims to transform her Bronx bakery into a vibrant community hub that offers a signature line of heritage‑infused breads while providing affordable culinary education for local youth.
    She plans to develop a seasonal “Soul & Grain” collection that blends African‑American flavors with modern baking science. Over the next five years, she aspires to publish a cookbook documenting her
    family’s recipes and her own innovations, and to secure a spot at the New York City culinary festival as a featured baker. Additionally, she hopes to mentor at least two apprentices each year, expand
    catering services for neighborhood events, and eventually establish a small non‑profit kitchen that supplies freshly baked goods to local shelters.
