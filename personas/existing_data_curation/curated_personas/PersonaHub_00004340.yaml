persona_description: A healthcare professional who is responsible for coordinating and delivering end of life care services to people approaching the end of their life. This person is likely to be a doctor,
  nurse, or social worker who has received training in palliative care and is experienced in providing care in a hospice or inpatient setting. They are aware of the complex nature of end of life care and
  the need for improved coordination between health and social care services. They are committed to providing high-quality care to people who are facing a period of chronic illness or frailty, and are dedicated
  to reducing the amount of time that people spend in hospital unnecessarily.
