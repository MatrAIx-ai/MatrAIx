personas:
  professional: Araminta Otero is a self‑taught visual artist and community facilitator in Riverton, leveraging bilingual fluency, watercolor and mixed‑media collage expertise, and a relaxed improvisational
    style to run spontaneous art workshops and cultural events while pursuing a GED and dreaming of opening a modest community studio.
  sports: Araminta Otero enjoys weekend river hikes with the Riverton Trailblazers club, occasional winter snowshoeing, and follows the Colorado Rockies and Denver Broncos on television, using these moments
    as social bonding opportunities rather than committing to rigorous training routines.
  arts: Araminta Otero immerses themselves in watercolor landscapes inspired by Frida Kahlo’s bold palette, attends local poetry nights featuring spoken‑word artists such as Andrea Gibson, creates surreal
    collages echoing Hannah Höch’s style, and dances to folk bands like Lila Downs at community festivals.
  travel: Araminta Otero prefers spontaneous road trips, often back‑packing across the Southwest’s desert canyons, dreams of future visits to Oaxaca’s vibrant markets and Chile’s Atacama Desert night skies,
    all while balancing a modest budget and family obligations.
  culinary: Araminta Otero delights in crafting mole poblano with roasted chilies and chocolate, experimenting with quinoa‑filled tamales and smoky chipotle arancini, and pairs these homemade dishes with
    locally sourced wildflower honey and mezcal‑infused cocktails at community potlucks, though they sometimes neglect proper food storage amidst a busy schedule.
  core: Araminta Otero blends wandering imagination with a love of communal rituals, juggling vibrant art projects, spontaneous generosity, and occasional disorganization into a life that feels like a living
    collage of colors, stories, and desert‑cactus altars.
background:
  cultural: Araminta’s Mexican heritage runs deep through her family roots in Jalisco, which she honors through language, food, and celebration. Raised in a bilingual household, she grew up hearing traditional
    stories, music, and the rhythms of Día de los Muertos, which fostered a strong sense of community and reverence for ancestors. Though she now lives in Riverton, Wyoming, she weaves Mexican customs into
    her daily life—from preparing mole and tamales for neighbors, to teaching children Arroz con Leche at community events, to organizing a yearly Día de los Muertos altar that blends desert cacti with
    traditional papel picado. This cultural blend informs her artistic style, social interactions, and her commitment to fostering multicultural understanding in her town.
attributes:
  skills: '["Watercolor and acrylic painting", "Mixed-media collage and sculpture", "Spanish-English translation", "Community art workshop facilitation", "Traditional Mexican cuisine preparation", "Social
