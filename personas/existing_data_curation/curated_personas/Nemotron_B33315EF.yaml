  hobbies: '["Watercolor painting", "Mixed-media collage creation", "Jewelry making", "Attending local music and poetry events", "Dancing to Mexican folk music", "Hiking and nature walks", "Reading speculative
    fiction and philosophy", "Cooking innovative Mexican dishes", "Gardening native wildflowers", "Volunteering as an art workshop leader"]'
  career_goals: Araminta aspires to formalize her artistic practice by completing a GED and enrolling in community‑college fine‑arts workshops, with the longer‑term goal of opening a modest community art
    studio in Riverton that offers free after‑school art classes for Mexican‑American youth. She also hopes to develop a sustainable side business selling her hand‑crafted jewelry, ceramics, and decorative
    paintings through online platforms and local markets. Additionally, she aims to become a cultural liaison, organizing annual events such as Día de los Muertos and Mexican folk‑dance celebrations that
    strengthen the town’s multicultural fabric, while maintaining a flexible schedule that respects her need for spontaneity.
