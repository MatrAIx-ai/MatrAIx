  career_goals: Deborah hopes to turn her love of art and technology into a career that lets her tell stories and inspire others. She dreams of becoming a concept artist or illustrator for video games,
    animation, or graphic novels, and she is also curious about working as a museum educator or community outreach coordinator where she can share art and science with the public. In the longer term, she
    imagines combining creativity with problem‑solving in fields such as environmental design or interactive media, using her artistic talent to make a positive impact.
