personas:
  professional: Deborah Smithson, an aspiring digital comic creator, channels their curiosity and organized planning into detailed storyboard layouts before experimenting with bold, unconventional color
    schemes on their tablet, confidently sharing drafts with peers while staying flexible enough to incorporate spontaneous feedback.
  sports: Deborah Smithson energizes Saturdays by playing forward for the Leavenworth Tigers youth soccer team and cheering on the Kansas City Royals with family, while also cycling solo along the Kansas
    River trail for personal fitness, though they occasionally skip swim practice to finish a comic panel.
  arts: Deborah Smithson, a budding comic artist, draws inspiration from the dynamic panels of Jim Lee, the whimsical worlds of Studio Ghibli, and the emotive piano compositions of Ludovico Einaudi, confidently
    presenting work at the Fort Leavenworth Museum’s children’s events and assertively seeking critique to refine their style.
  travel: Deborah Smithson enjoys planned weekend road trips to historic forts near Leavenworth and science exhibits in Kansas City, while they dream of attending Comic‑Con in San Diego and exploring the
    coral reefs of Belize, balancing organized itineraries with spontaneous photo‑stops along the Kansas River.
  culinary: Deborah Smithson loves crafting cheesy pizza slices, experimenting with simple sushi rolls using cucumber and shrimp, and blending strawberry‑banana smoothies, often over‑seasoning the rice
    but proudly showcasing creations to art club friends, though they frequently forget to clean up the kitchen afterward.
  core: Deborah Smithson, a 12‑year‑old with a vivid imagination, merges a love for comics, science, and digital worlds into daily sketches, music, and nature walks, while they juggle occasional procrastination
    on homework and a secret stash of glitter pens.
background:
  cultural: Deborah grows up as a white Midwestern child in Fort Leavenworth, Kansas, a community closely tied to the nearby U.S. Army installation. The town's mix of military families and local residents
    gives her exposure to a disciplined, service‑oriented environment, while also offering a variety of cultural events at the base's community center and the historic Fort Leavenworth museum. She participates
    in school activities typical of the region, such as county fairs, football games, and local service projects, and she celebrates national holidays with a sense of patriotism common among military communities.
    The Midwestern values of friendliness, hard work, and respect for tradition shape her outlook, while the diverse backgrounds of her neighbors broaden her appreciation for different cultures and ideas.
