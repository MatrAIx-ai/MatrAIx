persona_description: A renowned Renaissance painter, Raphael was born in Urbino, Italy, in 1483. His father, Giovanni Santi, was a painter himself, and he was his son's first teacher. Raphael's meteoric
  career was marked by his ability to develop a dramatic language full of expression in his frescoes, such as "Bourg Fire," "The School of Athens," and "Transfiguration." His portraits, such as the "Velata,"
  are equally innovative and show a unique tenderness and intimacy. He was known for his devotion to large frescoes with humanistic themes intended for more public viewing, but he didn't abandon painting
  private, devotional pieces. Raphael's art of portraiture is considered remarkable for its psychological depth and unique tenderness, with portraits of friends such as Marguerita Luti, the banker Bindo
  Altoviti, and the humanist Baldassare Castiglione. He is the first and one of few artists who knew fame during his lifetime, and his works have stood the test of time.
