persona_description: A researcher and engineer at Los Alamos National Laboratory, specialized in the development and fabrication of radioisotope heat sources, particularly plutonium-238 based units for
  NASA's Mars missions. This persona is responsible for overseeing the aqueous scrap recovery, fuel processing, and analysis capabilities at Los Alamos, ensuring the production and purification of plutonium-238
  fuel for NASA's space applications. This persona is highly skilled in the use of chemical and physical parameters to ensure the quality and safety of the heat sources, and has extensive experience in
  the development and testing of these units for use in space missions.
