  hobbies: '["Watercolor painting", "Reading poetry and philosophy", "Creative journaling", "Nature sketching and hiking", "Piano playing", "Knitting", "Crossword and Sudoku solving", "Small book club gatherings",
    "Indie film watching", "Vintage postcard collecting", "Jam making"]'
  career_goals: Even at 93, Molly’s ambitions center on leaving a lasting artistic and literary imprint. She aims to finalize and self‑publish a memoir that weaves her imaginative reflections with the history
    of her community, and to organize a small exhibition of her watercolors at the Loveland Art Center. She hopes to mentor a few local high‑school artists through informal workshops, and to establish a
    modest scholarship for students pursuing visual arts. Ultimately, Molly seeks to preserve her creative voice while maintaining independence and mental sharpness.
