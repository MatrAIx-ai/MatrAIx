personas:
  professional: Molly Brooks, a 93‑year‑old self‑taught watercolorist and memoir writer in Fort Collins, channels their vivid imagination and competitive puzzle‑solving mindset into abstract mountain landscapes
    for a forthcoming self‑published memoir while informally mentoring high‑school artists, despite a habit of misplacing supplies and a relaxed attitude toward deadlines.
  sports: Molly Brooks, who treasures solitary sunrise hikes along the Poudre River trail and occasionally joins a senior walking club, follows the Colorado Rockies baseball season and the Denver Broncos,
    and incorporates gentle stretching routines to keep their joints limber while maintaining a modest competitive edge through weekly crossword races.
  arts: Molly Brooks, an avid watercolorist inspired by Monet and Ansel Adams, spends afternoons in their sunlit studio sketching alpine flora, enjoys simple piano renditions of Debussy’s Clair de Lune,
    attends indie film screenings featuring Wes Anderson, and curates a vintage postcard collection that fuels their nostalgic storytelling.
  travel: Molly Brooks prefers leisurely, self‑planned road trips to nearby mountain towns like Estes Park and artistic getaways such as Santa Fe, dreams of a Paris art pilgrimage to view Monet’s works,
    and often travels with their grandchildren, balancing their love for nature with a modest travel budget and a penchant for spontaneous detours.
  culinary: Molly Brooks, who enjoys medium‑skill cooking, frequently prepares herb‑infused Colorado trout, homemade apple crisp with cinnamon, and a rotating series of jam flavors such as blackberry‑lavender
    and rhubarb‑ginger, savoring fresh basil, thyme, and sage harvested from their garden while delighting in the comforting simplicity of a well‑steeped chamomile tea.
  core: Molly Brooks is a fiercely imaginative nonagenarian who transforms worry‑laden thoughts into watercolor dreams, tackles crossword battles with relentless speed, yet habitually misplaces their knitting
    needles and embraces a delightfully disorganized, flexible lifestyle.
background:
  cultural: Molly grew up in post‑war America, raised in a white, middle‑class family in the Midwest before moving to Colorado in her twenties. Her upbringing emphasized self‑reliance, community service,
    and a respect for the natural landscape. The cultural fabric of Loveland—with its strong outdoor ethic, vibrant local arts scene, and small‑town solidarity—has shaped her values of independence, creative
    expression, and modest civic involvement. While she cherishes traditional American folk customs, she also embraces the eclectic, progressive spirit of Colorado’s artistic communities.
attributes:
  skills: '["Watercolor painting (abstract landscapes)", "Creative writing (poetry, memoir, short stories)", "Literary analysis", "Native Colorado gardening", "Knitting and crochet", "Advanced puzzle solving
