  hobbies: '[''Volunteering at community events'', ''Cooking and hosting potluck gatherings'', ''Gardening (vegetables and flowers)'', ''Book club participation'', ''Casual hiking on Blue Ridge trails'',
    ''Attending live music performances'']'
  career_goals: Theresa aims to earn her GED within the next year and pursue a vocational certificate in office administration to formalize her experience. She aspires to advance to a supervisory role,
    such as Office Manager or Team Lead, within the city’s municipal offices or a local small business. Additionally, she plans to develop expertise in digital records management and explore part‑time coursework
    in business administration to broaden her career prospects. Theresa also hopes to mentor new clerical staff, using her outgoing personality to promote a supportive workplace culture.
