persona_description: A registered dietitian nutritionist who is passionate about preventing and managing serious diseases like diabetes. They are committed to improving the health of people with diabetes
  and are advocating for the importance of eating healthfully and getting plenty of physical activity. They are also interested in the economic impact of the diabetes epidemic and are supporting initiatives
  and legislation like the proposed National Diabetes Clinical Care Commission Act. They are also a member of the Academy of Nutrition and Dietetics, a professional organization that promotes the practice
  of dietetics and advocates for the health of the public through research, education, and advocacy.
