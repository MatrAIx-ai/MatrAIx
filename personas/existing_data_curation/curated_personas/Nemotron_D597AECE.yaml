personas:
  professional: Lyan Echevarria, an aspiring robotics hobbyist and digital illustrator, combines meticulous organization with a curious, skeptical edge to turn after‑school club projects into clever robot
    creations while simultaneously drafting vibrant comic characters on a tablet.
  sports: Lyan Echevarria laces up for the Tampa Bay United youth soccer league each weekend, cheers for the Tampa Bay Lightning during hockey season and the Buccaneers in fall, and avidly follows the Rays
    in summer, balancing a competitive edge on the field with a relaxed fandom.
  arts: Lyan Echevarria immerses themselves in graphic novels by Brian K. Vaughan and manga by Masashi Kishimoto, sketches original heroes inspired by the storytelling of Neil Gaiman, and alternates between
    listening to traditional folk ballads from their family's heritage and modern pop hits like Ariana Grande, letting each rhythm fuel their artistic experiments.
  travel: Lyan Echevarria spends weekends exploring Tampa's museum district and art fairs, has taken day trips to the Everglades and a family vacation in Orlando's theme parks, and dreams of backpacking
    through the historic streets of Barcelona and the bustling markets of Tokyo, preferring a mix of structured itineraries and spontaneous detours.
  culinary: Lyan Echevarria enjoys helping at home to prepare cornmeal arepas stuffed with cheese and avocado, simmering hearty soup with yucca and plantains, and experimenting with homemade pizza topped
    with fresh basil, showcasing a modest culinary skill set that mixes family‑rooted recipes with adventurous flavors.
  core: Lyan Echevarria is a fiercely curious 11‑year‑old who transforms spare LEGO bricks into secret prototypes, obsessively catalogs robot schematics, yet sometimes neglects snack breaks and naps, blending
    competitive drive with a relaxed, artistic soul.
background:
  cultural: Lyan’s Colombian heritage is a vibrant part of her identity. She celebrates festivals like Carnaval de Barranquilla with her family, enjoys weekend meals of arepas, empanadas, and coffee, and
    keeps Spanish as the language of home. Living in Tampa, she blends Colombian traditions with Floridian culture, participating in local community events while preserving her family's values of family
    closeness, respect for elders, and a love for music and dance.
attributes:
  skills: '["sketching and drawing","digital illustration using tablets","basic programming in Scratch and Python","bilingual communication (Spanish and English)","critical thinking and problem solving","project
