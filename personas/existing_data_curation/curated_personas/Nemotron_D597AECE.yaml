  hobbies: '["drawing and character design","digital art and illustration","building robots and coding projects","reading graphic novels and sci‑fi books","listening to Colombian folk music and pop","visiting
    museums and art fairs","cooking Colombian recipes with family","playing soccer with friends"]'
  career_goals: Lyan dreams of a future where she can combine art, technology, and her cultural roots. She aspires to become a multimedia designer or architect, creating spaces and visual stories that reflect
    diverse ideas. Her competitive streak fuels a desire to win scholarships for STEM and art programs, and she hopes to eventually lead community workshops that teach other kids how to blend creativity
    with coding.
