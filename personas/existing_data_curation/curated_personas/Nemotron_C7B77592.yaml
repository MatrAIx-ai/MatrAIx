  career_goals: Madison aims to leverage her extensive cabin experience into a leadership role within the airline. Over the next five years she hopes to become a senior crew member and eventually a training
    instructor, where she can mentor new attendants and develop safety curricula. She is also interested in transitioning to a ground‑operations supervisory position, such as a gate manager or customer‑experience
    coordinator, to broaden her impact on the travel experience. Long‑term, Madison envisions opening a boutique travel consultancy that offers personalized trip planning for families, combining her industry
    knowledge with her love for exploring new destinations. She plans to pursue supplemental certifications in aviation safety management and hospitality management to support these goals.
