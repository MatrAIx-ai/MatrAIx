  hobbies: '[''Yoga'', ''Line dancing'', ''Salsa dancing'', ''Travel blogging'', ''Reading travel memoirs and self‑help books'', ''Cooking Tex‑Mex cuisine'', ''Attending Houston Livestock Show and Rodeo'',
