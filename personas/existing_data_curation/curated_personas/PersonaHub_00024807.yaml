persona_description: A historian who is interested in studying the religious practices and beliefs regarding death and the dead in Ancient Egypt, particularly focusing on the interaction between the living
  and the dead. They are fascinated by the evidence for the mortuary cult and veneration of ancestors, the rituals, statues, ancestor busts, and stelae used to analyse the relationship between the living
  and the dead. They are also keen to understand the attitudes towards the dead, including the impacts of tomb robbery, desecration, tomb reuse, and the death and burial of children. They appreciate the
  use of black-and-white and color illustrations and a comprehensive bibliography to support their research.
