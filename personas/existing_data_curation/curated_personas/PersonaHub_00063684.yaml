persona_description: A healthcare professional with a keen interest in obesity research and prevention. This person is highly educated in public health and epidemiology, with a focus on understanding the
  causes and consequences of obesity. They have a deep understanding of the global burden of obesity, including the projected increases in obesity-related diseases and the enormous health care costs associated
  with them. This person is also interested in the molecular and pre-clinical aspects of obesity research, as well as the clinical applications of obesity prevention and management. They are committed to
  finding effective strategies to decrease weight and improve the health of populations around the world.
