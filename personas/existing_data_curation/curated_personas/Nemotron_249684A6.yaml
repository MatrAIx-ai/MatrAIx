  career_goals: Although Stephen is officially retired, he remains driven to apply his expertise in ways that benefit his community and satisfy his curiosity. His primary goal is to mentor high‑school and
    college students in Marietta through after‑school STEM workshops and one‑on‑one tutoring. He also hopes to help launch a neighborhood makerspace where retirees and youth can collaborate on hands‑on
    projects. In addition, Stephen plans to deepen his knowledge of renewable energy and smart home technologies through online courses, and he aspires to author a memoir that chronicles his experiences
    as a Black engineer navigating the Southern tech landscape.
