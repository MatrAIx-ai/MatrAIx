  career_goals: She aims to move into a district-level curriculum specialist role where she can champion innovative art-infused teaching strategies across schools. Over the next five years she plans to
    lead a pilot STEAM program that blends visual arts with science and mathematics, publish her findings in peer‑reviewed education journals, and influence state policy on arts integration while preserving
    time for her own scholarly inquiry.
