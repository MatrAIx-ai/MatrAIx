persona_description: A historian who is interested in the history of public assistance institutions, particularly the Birkenhead Union Workhouse and St. Catherine's Hospital. She is knowledgeable about
  the establishment and development of these institutions, the role of the Poor Law Commission, and the history of local government in the UK. She is interested in the role of chaplains in the institution
  and the development of the creeds register. She is also interested in the history of the hospital and its transformation from a workhouse to a municipal hospital. She is knowledgeable about the hospital's
  treatment of geriatric and psychiatric patients and its history as a hospital in the Wirral area.
