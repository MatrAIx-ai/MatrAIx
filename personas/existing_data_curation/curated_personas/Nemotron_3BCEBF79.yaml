personas:
  professional: Janette Voss is an aircraft maintenance technician with eight years of hands-on experience diagnosing intricate mechanical and avionics faults, leading junior colleagues, and championing
    FAA compliance, while channeling her curious, competitive nature into artistic aircraft paint schemes and relentlessly pursuing advanced certifications to become a senior lead technician and A&P inspector.
  sports: Janette Voss enjoys seasonal hiking in the White Mountains, follows the New England Patriots and Boston Red Sox, and plays on a local adult recreational softball league, using weekend trail runs
    and sports viewings as essential outlets for her high-energy emotional state.
  arts: Janette Voss expresses creativity through oil paintings of aircraft silhouettes, landscape photography, acoustic guitar sessions, and frequent visits to galleries showcasing Ansel Adams and installations
    by contemporary artist Olafur Eliasson, while drawing speculative fiction influences from authors like N.K. Jemisin into her artistic vision.
  travel: Janette Voss prefers meticulously planned trips that combine aviation history tours at venues such as the Smithsonian's National Air and Space Museum with scenic hikes in the Canadian Rockies,
    while budgeting for spontaneous weekend getaways to Portland's indie music scene, balancing a modest travel fund with demanding work schedules.
  culinary: Janette Voss gravitates toward hearty New England clam chowder, rosemary-infused roasted chicken, and experiments with avocado-and-honey glaze for grilled vegetables, yet often skips meals during
    long maintenance shifts, relying on coffee and protein bars to sustain her energy.
  core: Janette Voss is a detail-driven aircraft mechanic who fuses an artistic soul, relentless curiosity, and a high-octane emotional landscape into meticulously crafted planes, painted canvases, and
    a drive to champion mental-health support for aviation technicians.
background:
  cultural: Janette grew up in a small town in the New England region, where a blend of traditional New England work ethic and a growing appreciation for arts and outdoor recreation shaped her worldview.
    Her family, of Anglo‑American descent, emphasized self‑reliance, community involvement, and respect for nature, which fostered her love for hiking and seasonal traditions. The local culture’s pragmatic
    approach to problem‑solving and the region’s vibrant independent art scene influenced her curiosity and openness to unconventional ideas. This background also instilled a healthy skepticism and a competitive
    drive that she carries into her aviation career.
attributes:
  skills: '[''Airframe structural repair'', ''Hydraulic system maintenance and troubleshooting'', ''Engine diagnostics and overhauls (turbine and piston)'', ''Avionics and electrical system troubleshooting'',
    ''FAA compliance documentation and record‑keeping'', ''Technical blueprint reading and interpretation'', ''Use of maintenance management software (e.g., AMOS)'', ''Welding and metal fabrication'', ''Non‑destructive
    testing (NDT) methods'', ''Critical problem‑solving under pressure'', ''Team collaboration and training of junior staff'', ''Basic CNC machining and part fabrication'', ''Safety inspection and quality
    assurance'']'
  hobbies: '[''Oil painting'', ''Aviation photography'', ''Scale model aircraft building'', ''Hiking in the White Mountains'', ''Visiting art galleries and museums'', ''Playing acoustic guitar'', ''Journaling'',
    ''Listening to aviation history podcasts'', ''Reading speculative fiction'', ''Attending indie music shows'']'
  career_goals: Janette aims to become a senior lead technician and eventually an FAA‑certified Airframe and Powerplant (A&P) inspector. She plans to obtain additional certifications such as the Maintenance
    Management Accreditation (MMA) and pursue an associate degree in aviation maintenance technology to broaden her qualifications. In the long term, she hopes to open her own maintenance and custom paint‑shop
    that combines technical excellence with artistic aircraft finishing, while also advocating for mental‑health support programs for aviation technicians. She is also interested in becoming an instructor
    at a community college to mentor the next generation of mechanics.
