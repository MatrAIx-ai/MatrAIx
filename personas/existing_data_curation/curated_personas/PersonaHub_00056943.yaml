persona_description: A conservation biologist who is interested in studying the effects of natural variations in reproductive output on marine populations, particularly in the context of fostering eggs
  and chicks between nests to ensure the survival and success of offspring. They are familiar with the principles of cross-fostering and the potential benefits and challenges of this intervention. They
  are also interested in the impact of supplementary feeding on gannet chicks and may have expertise in the field of marine biology and conservation.
