  hobbies: '["Reading classic literature","Creative writing","Book club participation","Gardening (vegetable and flower)","Hiking local trails","Cooking and baking","Volunteering as a tutor","Yoga practice"]'
  career_goals: Tiffany aims to earn a Ph.D. in Humanities or Education within the next five years, positioning herself for a tenure‑track professorship. She envisions designing interdisciplinary courses
    that blend literature, cultural studies, and digital media, and hopes to publish scholarly articles that bridge theory and classroom practice. Additionally, she aspires to lead community outreach programs
    that bring humanities education to local schools and adult learners, while maintaining a balanced family life and flexible work schedule that honors her personal resilience and need for occasional spontaneity.
