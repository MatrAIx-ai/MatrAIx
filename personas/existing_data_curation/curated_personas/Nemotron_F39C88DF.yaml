    at the local senior center'']'
  career_goals: Looking ahead, Cathryn aims to transition into a supervisory or training role within her practice before retiring, using her reliable track record to mentor younger staff. She plans to obtain
    a Certified Medical Assistant credential and lead a clinic‑wide quality‑improvement initiative focused on patient flow efficiency. Cathryn also hopes to contribute to community health by organizing
    health‑screening events for seniors in New Bedford. Ultimately, she seeks a balanced part‑time schedule that lets her maintain her professional contributions while spending more time on family and personal
    interests.
