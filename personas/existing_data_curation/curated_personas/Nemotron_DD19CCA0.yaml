personas:
  professional: A veteran visual artist and community organizer, Rodrick Weetom leverages his decades of self-directed mastery in painting, sculpture, and mixed media to design inclusive art curricula,
    secure grants, and coordinate festivals that empower emerging artists while preserving Southern cultural memory.
  sports: A lifelong fan of the New Orleans Saints and a regular participant in community basketball pick-up games at the church gym, Rodrick Weetom also enjoys gentle morning walks along the nearby river
    trail and prioritizes low-impact exercises that accommodate their joints.
  arts: An ardent blues harmonica player and vinyl collector, Rodrick Weetom spends evenings curating playlists of gospel, early rock 'n' roll, and classic jazz while also performing in church choir rehearsals,
    drawing inspiration for his portraiture and Southern landscapes.
  travel: A methodical planner who prefers weekend road trips to historic sites like the Natchez Trace and local museums, Rodrick Weetom often travels with a notebook to sketch scenes, yet they occasionally
    splurge on a short-haul flight to New York City for a major art exhibition, balancing curiosity with budget constraints.
  culinary: A dedicated Southern-cuisine enthusiast, Rodrick Weetom cultivates heirloom tomatoes and collard greens in his garden, frequently prepares gumbo, fried catfish, and cornbread, enjoys experimenting
    with spice rubs, and occasionally over-indulges in sweet tea and pecan pie during holidays.
  core: Rodrick Weetom blends relentless curiosity, disciplined organization, and a gregarious spirit into a life of creative mentorship, gardening, and community stewardship, never missing a chance to
    share a story or a laugh, even if it means a few extra late-night studio sessions.
background:
  cultural: Rodrick is an African‑American who grew up in the heart of the Mississippi Delta during the tail end of the Jim Crow era. His family traces its roots to the Reconstruction period, and the legacy
    of resilience, faith, and community solidarity shaped his worldview. Immersed in gospel music, church life, and the oral storytelling tradition, he absorbed a rich cultural tapestry that blends African
    rhythms with Southern folk motifs. The civil‑rights movement of his youth left an indelible mark, fueling his commitment to social uplift through the arts. His work often reflects the Black Southern
    experience—celebrating everyday life, honoring ancestors, and exploring the interplay of race, place, and identity. He remains deeply connected to local festivals, church gatherings, and intergenerational
    gatherings that keep his cultural heritage alive and evolving.
