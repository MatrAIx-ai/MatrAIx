  career_goals: Rodrick aims to cement his artistic legacy by establishing a permanent studio‑gallery in Mooreville that serves both as a showcase for his lifelong body of work and as a hub for emerging
    Black artists in the region. He plans to launch a mentorship program that pairs seasoned artists with at‑risk youth, using art as a pathway to academic and personal growth. Over the next few years he
    hopes to curate a traveling exhibition of African‑American Southern art that highlights stories of resilience and tradition. He also intends to write a memoir chronicling his personal journey from a
    self‑taught painter to a community cultural leader, and to secure funding to digitize his archive for future generations. Ultimately, his ambition is to be recognized as a cultural steward who bridges
    historic Southern heritage with contemporary artistic expression.
