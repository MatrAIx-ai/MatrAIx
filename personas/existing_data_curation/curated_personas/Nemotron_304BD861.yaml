personas:
  professional: Carlos Ponce, a retired cultural liaison and handyman, leverages fluency in both Spanish and English, culinary storytelling, and artistic curiosity to mentor seniors and coordinate community
    workshops, approaching tasks with relaxed flexibility and a penchant for spontaneous creativity, and they are known for their generous spirit and occasional forgetfulness about meeting schedules.
  sports: Carlos Ponce enjoys leisurely walks along Spring Grove’s township trails, follows the Chicago Cubs and Chicago Bears with seasonal enthusiasm, and they participate in the local senior center’s
    low‑impact fitness class, preferring gentle activity and community camaraderie over competitive sports.
  arts: Carlos Ponce frequents the Art Institute of Chicago, sketching works by Frida Kahlo and Georgia O'Keeffe while listening to the soulful jazz of Miles Davis and the heartfelt ranchera ballads of
    Vicente Fernández, weaving these inspirations into modest watercolor landscapes that they proudly display at community gatherings.
  travel: Carlos Ponce plans a nostalgic trip back to the small town where they were born, cherishes past road trips to the Grand Canyon, and looks forward to a week‑long cultural tour of San Miguel de
    Allende, favoring relaxed itineraries that allow ample time for family reunions and local culinary explorations.
  culinary: Carlos Ponce, an avid home chef, perfects mole poblano and tamales for family gatherings, experiments with corn‑tortilla‑based fusion tacos using locally sourced heirloom tomatoes and Midwestern
    cheese, and delights in adding fresh cilantro, roasted chilies, and a splash of mezcal to elevate traditional sauces.
  core: Carlos Ponce blends a lifelong love of art, gardening, and traditional cuisine with a relaxed, slightly disorganized rhythm, often losing track of paperwork but never missing a chance to share stories
    over a steaming bowl of pozole.
background:
  cultural: Carlos was born in a small town in central Mexico, likely in the state of Jalisco, and grew up in a bilingual household where Spanish was spoken at home and English was learned at school. His
    upbringing emphasized family solidarity, respect for elders, Catholic traditions, and vibrant celebrations such as Día de los Muertos, Cinco de Mayo, and local fiestas. After moving to the United States
    in his early adulthood, he settled in the Midwest, eventually making his home in Spring Grove, Illinois. There, he has blended his Mexican heritage with Midwestern customs, participating in church activities,
    community events, and local volunteer initiatives while preserving Mexican culinary, musical, and storytelling traditions. Carlos’s cultural identity is a harmonious mix of Mexican roots and American
    experiences, which he actively shares with his family and community.
