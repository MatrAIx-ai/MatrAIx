  hobbies: '["Visiting art galleries and museums", "Sketching and urban photography", "Writing art reviews and blog posts", "Listening to indie/alternative music", "Playing narrative-driven video games",
    "Hiking in state parks", "Cooking experimental Southern dishes", "Volunteering at community art events"]'
  career_goals: William aims to turn his passion for art and media into a career that blends curation, storytelling, and digital creativity. He plans to complete a bachelor’s degree in visual communications
    or museum studies, securing internships at local galleries, community arts centers, or regional museums to gain hands‑on experience. His long‑term ambition is to work as a curator or art‑program coordinator,
    designing engaging exhibitions and educational programs, or to become a digital content strategist who produces compelling visual narratives for cultural institutions. Additionally, he hopes to launch
    his own online platform that spotlights emerging artists and provides thoughtful commentary, eventually traveling to attend international art festivals to broaden his perspective.
