personas:
  professional: An aspiring museum curator-in-training, William Mendelsohn leverages budding skills in photography, video editing, and graphic design to craft immersive exhibition narratives, while their
    naturally curious and flexible mindset fuels innovative programming even as a tendency toward disorganization occasionally delays project timelines.
  sports: A weekend hiker and casual basketball enthusiast, William Mendelsohn climbs Crowders Mountain with the local Charlotte Hiking Club, follows the Charlotte Hornets and Carolina Panthers on TV, and
    occasionally joins pick-up games at the community center, preferring unstructured outdoor activity over regimented gym routines and often using their hikes to clear their mind.
  arts: An avid gallery-hopper and indie-music curator, William Mendelsohn writes reviews of exhibitions featuring artists like Kehinde Wiley and Yayoi Kusama on their blog, curates playlists that blend
    Arctic Monkeys, Tame Impala, and local Charlotte indie bands, and attends live shows at the Neighborhood Theatre, letting visual and auditory experiences shape their creative identity.
  travel: An adventurous yet budget-conscious traveler, William Mendelsohn has trekked the Blue Ridge Parkway, explored Savannah's historic squares, and sampled street art in New Orleans, while they dream
    of wandering the canals of Venice and the neon streets of Tokyo, favoring spontaneous weekend road trips over meticulously planned overseas tours due to limited student funds.
  culinary: A budding Southern-inspired home cook, William Mendelsohn experiments with shrimp-and-grits, fried green tomatoes, and smoked paprika-spiced collard greens, often pairing dishes with craft bourbon
    cocktails, yet they sometimes over-salt their sauces, reflecting an enthusiastic but imperfect culinary approach.
  core: A curious 18-year-old art-obsessed explorer, William Mendelsohn balances a love for spontaneous creativity with a habit of leaving sketches and deadlines scattered across their dorm floor.
background:
  cultural: William grew up in Gastonia, a suburban city in Gaston County, North Carolina, where Southern hospitality and community ties are woven into everyday life. His family background is middle‑class
    white, with values that emphasize close‑knit family relationships, modest self‑reliance, and participation in local traditions such as high‑school football games and regional festivals. At the same
    time, his college experience and online interests have exposed him to a broader cultural spectrum, including contemporary art movements, indie music scenes, and global perspectives. This blend of Southern
    roots and growing cosmopolitan curiosity shapes his worldview, making him both grounded in his local community and eager to explore ideas beyond his hometown.
attributes:
  skills: '["Digital photography", "Video editing (Premiere Pro)", "Graphic design (Photoshop, Canva)", "Creative writing and art criticism", "Academic research and critical analysis", "Group collaboration
