    Problem Solving'']'
  hobbies: '[''Hiking in nearby state parks'', ''Kayaking along the Intracoastal Waterway'', ''Photography (nature and street scenes)'', ''Reading technology, business, and travel books'', ''Gardening with
    native Southern plants'', ''Cooking Southern cuisine with a modern twist'', ''Playing acoustic guitar'', ''Volunteering at the local community center'', ''Attending live music festivals'', ''Exploring
    podcasts on leadership and creativity'']'
  career_goals: Carolyn aims to earn her Project Management Professional (PMP) certification within the next year and leverage it to move into a senior project manager role overseeing multi‑disciplinary
    teams in Horry County. She is particularly interested in leading sustainability‑focused infrastructure projects that balance economic growth with environmental stewardship. Over the longer term, she
    envisions founding a boutique consulting firm that helps small non‑profits and local businesses implement flexible, low‑overhead project frameworks. Throughout her career path, she seeks a healthy work‑life
    balance that allows her to continue exploring new ideas while staying rooted in her community.
