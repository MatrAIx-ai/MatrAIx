personas:
  professional: Carolyn Schneider is a project management specialist who blends curiosity with practicality, using Agile, Scrum, and waterfall methods in Asana, Trello, and Microsoft Project to craft adaptable
    plans while navigating the occasional disorganization that comes with a love for flexibility, and they aim to earn a PMP and lead sustainability‑focused infrastructure projects in Horry County.
  sports: Carolyn Schneider enjoys kayaking the Intracoastal Waterway, hiking state parks in the off‑season, and cheering on the Carolina Panthers and Myrtle Beach Pelicans, while participating in a local
    run‑club that meets for sunrise jogs along the beach, embodying a relaxed yet consistent approach to fitness that they maintain alongside their weekend paddling.
  arts: Carolyn Schneider strums an acoustic guitar to the tunes of Jason Isbell and Iron & Wine, captures sunrise moments in nature photography inspired by Ansel Adams, and attends community theater productions
    featuring local talent, often quoting lines from the latest Margaret Atwood novel during casual gatherings they host.
  travel: Carolyn Schneider prefers road‑trip adventures that blend schedule‑free spontaneity with budget‑friendly planning, having explored Charleston’s historic district, Asheville’s mountain art scene,
    and the coastal charm of Kiawah Island, while eyeing a future trip to Austin’s music festivals and the Pacific Northwest’s hiking trails, a plan they keep in a travel journal.
  culinary: Carolyn Schneider cooks regional comfort foods with a health‑conscious spin—think shrimp & grits over cauliflower rice, collard greens sautéed in olive oil, and peach cobbler topped with oat
    crumble—while growing heirloom tomatoes and sweet potatoes in their garden, and occasionally indulges in smoked pulled pork from the local BBQ joint, a guilty pleasure they allow on Sunday evenings.
  core: Carolyn Schneider balances a love for flexible, community‑focused project work with a penchant for spontaneous outdoor pursuits, occasional disorganization, and a habit of turning regional traditions
    into modern, health‑savvy experiences that they share with neighbors.
background:
  cultural: Carolyn grew up in Green Sea, a small town in Horry County, South Carolina, within a white Southern family that values community, hospitality, and a strong work ethic. Her surname, Schneider,
    reflects German ancestry, but her upbringing was shaped by Southern traditions—church gatherings, county fairs, and a love for the coastal environment. She attended a local public high school and later
    pursued some college coursework at a community college, where she was exposed to broader business concepts. The region’s emphasis on outdoor recreation and close‑knit community networks influences her
    interests in nature, local volunteerism, and maintaining a balance between personal ambition and collective well‑being.
attributes:
