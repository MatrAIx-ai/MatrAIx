persona_description: A passionate environmentalist and educator who is dedicated to promoting science education through hands-on, experiential learning. Mary Brinegar, the president and CEO of the Dallas
  Arboretum, is an expert in creating educational spaces that engage and inspire children to learn about nature and science. Her goal is to help boost science test scores by providing a rich, immersive
  environment that fosters curiosity and learning. Mary is known for her innovative approach to teaching, which combines nature-based experiences with science education to make learning more engaging and
  memorable for children. She is also interested in studying the impact of her garden on science education and the impact of nature-based learning on children's understanding of the natural world.
