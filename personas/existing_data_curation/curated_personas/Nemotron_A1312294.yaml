  hobbies: '[''Football'', ''Multiplayer video gaming'', ''Fishing'', ''Camping'', ''Playing rhythm guitar'', ''Community jam sessions'', ''Volunteer event planning'', ''County fair participation'']'
  career_goals: Horace wants to turn his practical curiosity into a stable, hands‑on career. He is considering enrolling in a community college automotive technology program or a trade apprenticeship in
    automotive mechanics, aiming to become a certified technician within the next five years. He also entertains the idea of managing a local auto repair shop one day, blending his technical skills with
    his sociable nature. While he values flexibility and is wary of overly rigid structures, he sees the benefits of a clear career pathway for financial security and as a way to reduce his worry about
    the future. He remains open to further education in business management to eventually take on a supervisory or ownership role.
