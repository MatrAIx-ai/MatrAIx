  hobbies: '[''swing and salsa dancing'', ''hiking state parks and the Appalachian Trail'', ''volunteering at the Biddeford Food Bank'', ''cooking New England seafood recipes'', ''yoga and mindfulness meditation'',
    ''reading self-help and personal development books'', ''attending live music and open-mic nights'', ''participating in community-theater improv'']'
  career_goals: Magan aims to formalize her education by completing a GED within the next year, then enrolling part‑time in a community‑college program in business management. Professionally, she envisions
    moving from shift manager to store manager within two years, and eventually to district manager overseeing multiple locations in Maine. Her long‑term ambition is to open a community‑focused boutique
    café that combines sustainable sourcing with a flexible, employee‑centric work culture—a goal that aligns with her curiosity for innovative business models and her desire to create a supportive environment.
    She also plans to develop mentorship skills to help younger employees cope with workplace stress, turning her own experiences with worry into constructive leadership.
