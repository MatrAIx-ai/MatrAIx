personas:
  professional: Magan Durocher, a 22‑year‑old shift manager at a bustling Biddeford retail store, leverages her curiosity‑driven practicality to lead a dynamic team, optimize inventory with spreadsheets,
    and boost foot traffic through self‑taught social‑media campaigns, all while balancing a flexible schedule that favors spontaneous problem‑solving over rigid planning.
  sports: Magan Durocher spends weekends trekking the Appalachian Trail and exploring Acadia National Park with the Biddeford Hiking Club, cheers for the Portland Sea Dogs at local games, and mixes in swing
    and salsa sessions at the community studio, balancing an outdoor‑focused fitness routine with a love for New England sports culture.
  arts: Magan Durocher fuels her artistic side by attending live sets at Bunker Hall featuring artists like Jack Johnson and Mumford & Sons, participating in improv nights with the Biddeford Improv Society,
    and binge‑watching performances of Emma Stone’s films, which together keep her curiosity alive and provide a creative outlet for her social energy.
  travel: Magan Durocher’s travel style is impulsive yet purposeful, often booking a last‑minute weekend getaway to coastal Maine towns like Portland or distant spots such as Charleston, SC, after scrolling
    through Instagram travel reels, while budgeting modestly through a travel‑savings jar and dreaming of a future solo trek along the Pacific Crest Trail.
  culinary: Magan Durocher experiments in the kitchen with an intermediate skill set, regularly crafting lobster rolls with butter‑soaked brioche, hearty New England clam chowder laden with fresh potatoes,
    bacon, and thyme, and occasionally over‑seasoning while juggling a salsa playlist, reflecting her love of seafood, creativity, and multitasking.
  core: Magan Durocher is a socially charged, curiosity‑driven 22‑year‑old who balances spontaneous adventure and community‑focused ambition with a habit of worrying about every detail—from inventory forecasts
    to the perfect clam chowder—yet never lets that stop her from dancing, hiking, and dreaming big.
background:
  cultural: Magan grew up in a working‑class family in Biddeford, a small coastal city in southern Maine, where the cultural fabric blends Anglo‑American traditions with a noticeable French‑Canadian influence
    common in York County. The town’s close‑knit community, seasonal festivals such as lobster boils and the annual Portland Sea & Sail Festival, and an emerging arts scene at the University of Southern
    Maine have shaped her values of independence, self‑reliance, and communal support. While she identifies as white, she is attuned to the growing diversity of the region, including immigrant populations
    and indigenous Wabanaki heritage, which informs her inclusive outlook. Her upbringing in a coastal environment fosters a practical appreciation for the outdoors, seasonal rhythms, and local cuisine,
    all of which feed into her curiosity for new ideas while honoring established regional customs.
attributes:
