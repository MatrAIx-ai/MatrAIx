persona_description: A researcher in educational assessment and evaluation, Cathy O’Neil, who is concerned about the reliability and validity of value-added models (VAMs) used in teacher education. She
  is interested in the potential for VAMs to be used to unfairly reward or punish teachers based on their students' performance, and is seeking ways to quantify and reduce uncertainty in such approaches.
  O’Neil's blog and research have raised concerns about the lack of reproducibility and validity of VAMs, and she is advocating for alternative methods to evaluate teachers that are based on direct measurement
  of students' performance and avoid using residuals-based assessments.
