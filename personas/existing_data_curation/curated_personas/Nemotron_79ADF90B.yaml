  career_goals: Allan aims to turn his passion for the humanities into a sustainable freelance career, focusing on scholarly writing, curating digital exhibitions, and consulting for cultural institutions.
    He aspires to publish a collection of essays on 19th‑century American literature, secure a research fellowship, and eventually pursue a Ph.D. in American Studies, allowing him to work independently
    while contributing original scholarship.
