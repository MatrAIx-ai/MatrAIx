personas:
  professional: Chynna Howell, an aspiring little vocalist who delights in gospel, zydeco, and jazz, channels their curious yet practical nature into preschool music sessions, effortlessly leading classmates
    in sing‑alls while keeping their tiny tambourine in place, yet they prefer the unstructured free‑play moments over rigid schedules, thriving as the natural centre of attention.
  sports: Chynna Howell, a four‑year‑old who loves splashy summer playgrounds, joins the local Little Pelicans toddler soccer group, cheers enthusiastically for the New Orleans Saints and the New Orleans
    Pelicans during family game nights, and often pretends to be a zydeco dancer while sliding down the community pool, showing a playful, flexible approach to fitness without rigid training.
  arts: Chynna Howell, a budding four‑year‑old songbird, sings along to gospel hymns at church, bounces to zydeco tunes during Mardi Gras parades, and spends rainy afternoons drawing bright crayon portraits
    of accordion players like Clifton Chenier, using music as the backdrop for creative expression and thriving on the attention of family and friends.
  travel: Chynna Howell, an adventurous four‑year‑old, loves short road trips with the family to the Gulf Coast beaches of Gulf Shores, Alabama, eagerly collects shells for the church’s Sunday school nature
    project, dreams of returning to New Orleans for the next Mardi Gras parade, and prefers the excitement of new sights over the comfort of staying home, though limited by the need for a car seat and parental
    schedule.
  culinary: Chynna Howell, a food‑loving four‑year‑old, adores the salty‑sweet taste of jambalaya and the buttery crunch of cornbread, proudly eats a spoonful of red beans and rice at church potlucks, can
    carefully stir pancake batter with a plastic whisk, yet they often beg for extra frosting on cupcakes, showing a developing palate that mixes traditional Creole dishes with sugary treats.
  core: Chynna Howell, a talkative and caring four‑year‑old who thrives on music, community gatherings, and spontaneous play, balances curiosity with a love for routine while they occasionally worry about
    new experiences.
background:
  cultural: Chynna is an African American child growing up in Eunice, Louisiana, a town where Black, Creole, and Cajun cultures intersect. Her family maintains strong ties to the local African American
    church community, attending gospel services, Sunday school, and church potlucks that feature soul food and regional dishes. Seasonal celebrations such as Mardi Mardi and local 'krewe' parades expose
    her to zydeco and jazz music, while family gatherings often include storytelling traditions that pass down oral histories from her grandparents. The rhythm of southern hospitality, emphasis on community
    support, and the blend of gospel, zydeco, and country music shape her daily experiences and inform her love for music, singing, and communal activities.
