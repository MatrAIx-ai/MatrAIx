  career_goals: Despite her young age, Chynna already imagines future roles that align with her caring nature and love of being in the spotlight. She often says she wants to be a teacher who helps children
    learn, a nurse who makes people feel better, or a performer who sings and dances on stage. She expresses a desire to 'help everyone' and 'make people smile', indicating early ambitions toward community‑focused
    careers that blend creativity with service.
