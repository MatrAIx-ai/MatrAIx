  career_goals: Zoraya aims to become a Store Manager within the next two years, leveraging her analytical background to boost store profitability and employee engagement. She plans to enroll in an MBA
    program focused on Operations Management to prepare for a future District Manager role overseeing multiple locations. Long‑term, she hopes to lead a regional pilot program that integrates advanced inventory
    analytics across the chain and eventually mentor emerging female leaders in retail. She also envisions opening a small community‑oriented boutique after retirement, where she can apply her process‑improvement
    expertise on a personal scale.
