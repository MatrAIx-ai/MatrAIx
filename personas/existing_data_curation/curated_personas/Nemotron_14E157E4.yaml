  career_goals: Jay’s long‑term goal is to turn his practical interests into a career. He plans to graduate high school with a solid academic record, earn a scholarship to a technical college, and obtain
    an associate’s degree in automotive technology. He hopes to become a certified automotive technician, work at a reputable repair shop to gain experience, and eventually open his own garage serving the
    Camden community. He also feels drawn to the disciplined environment of the U.S. Army’s mechanical forces, seeing it as a way to further develop his technical skills while serving his country. Alongside
    his career plans, Jay wants to stay involved in his local church and mentor younger students, reflecting his desire to contribute positively to his community.
