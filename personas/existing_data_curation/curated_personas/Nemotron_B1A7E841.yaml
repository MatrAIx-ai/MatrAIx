personas:
  professional: Carma Rios, a budding explorer in the early learning stage, is already honing fine‑motor coordination and early communication skills, and they display spontaneous curiosity and a calm composure
    that suggest future strengths in collaborative creative fields.
  sports: Carma Rios, a toddler who delights in the rhythmic beats of a parent‑led baby gymnastics class at the local community center and cheerfully watches the regional baseball team, the Royals, from
    the high chair, demonstrates a love for movement while preferring small, supportive play groups over large noisy arenas, and they thrive on gentle encouragement from caregivers.
  arts: Carma Rios, an infant who lights up at the sound of Mozart’s Symphony No. 40 and the gentle strumming of folk guitarist John Mayer, frequently claps along to lullabies by Ella Fitzgerald, enjoys
    colorful picture books by Eric Carle, and they find artistic expression in spontaneous rhythm and vivid visuals.
  travel: Carma Rios, a curious one‑year‑old who has already experienced a weekend family trip to the seaside town of Santa Catalina and a short flight to San Francisco’s Golden Gate Park, prefers spontaneous
    stroller walks in local parks over meticulously planned vacations, and they dream of exploring bright sand dunes and gentle waves.
  culinary: Carma Rios, a baby with a budding palate, loves the sweet taste of pureed mango, the creamy texture of avocado mash, and the comforting aroma of chicken noodle soup, often reaches for bright‑colored
    spoonfuls of carrots and peas during mealtime, and they relish the playful mess that comes with discovering new flavors.
  core: Carma Rios embodies a serene curiosity, effortlessly blending spontaneous exploration with gentle compassion, preferring quiet moments and small‑group interactions while remaining remarkably calm
    and resilient, and they inspire calmness in those around them.
background:
  cultural: Carma is raised in a predominantly white, middle‑class family in Hot Springs, Arkansas, where Southern hospitality and a strong sense of community are core values. Her family emphasizes respect
    for the natural landscape, frequent visits to the thermal springs, and participation in local festivals that celebrate regional folk arts such as quilting, woodworking, and community murals. The household
    regularly attends community gatherings and church services, fostering a compassionate and cooperative outlook. This cultural environment nurtures Carma's appreciation for art, nature, and harmonious
    social interactions, while also supporting her calm and resilient temperament.
