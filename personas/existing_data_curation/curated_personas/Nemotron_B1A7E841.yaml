  career_goals: While still a toddler, Carma's caregivers notice her early fascination with art, music, and helping others, which points toward a future desire to blend creativity with service. She dreams
    of growing up to become someone who uses artistic expression to foster community well‑being—potentially as an art therapist, early‑childhood educator who incorporates visual arts, or a community muralist
    who brings people together. Her long‑term ambition is to maintain harmony and compassion in any professional role she chooses, prioritizing environments that value collaboration and emotional resilience.
