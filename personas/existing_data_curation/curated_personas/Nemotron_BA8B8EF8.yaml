  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Hiking in Wasatch foothills'', ''Photography'', ''Reading contemporary literature and philosophy'', ''Book
    club participation'', ''Youth theatre set design'', ''Backstage organization'', ''Pottery'', ''Learning basic coding'']'
  career_goals: Gloria aims to complete her high school diploma within the next year and pursue a degree in museum studies or visual arts at a university. She envisions a career as a curator or education
    coordinator at a cultural institution, where she can blend her love for art with her organizational strengths. In the longer term, she aspires to develop community outreach programs that bring diverse
    artistic experiences to underserved audiences in Utah. She also contemplates establishing her own freelance design studio, offering graphic design and photography services, while maintaining a disciplined
    schedule that supports continuous learning and creative exploration.
