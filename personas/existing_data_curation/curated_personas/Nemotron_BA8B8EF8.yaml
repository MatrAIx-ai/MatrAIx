personas:
  professional: Gloria Hamilton is an aspiring museum curator and visual arts coordinator who leverages her disciplined project planning, proficiency in Adobe Photoshop and Illustrator, and meticulous research
    abilities to design engaging exhibitions while balancing collaborative teamwork with decisive leadership.
  sports: Gloria Hamilton dedicates Saturday mornings to trail running with the Wasatch Hiking Club, caps the winter season with occasional ski trips to Park City, and follows the Utah Jazz and Real Salt
    Lake avidly, using game nights as social anchors for her otherwise solitary routine.
  arts: Gloria Hamilton immerses herself in contemporary art by sketching museum pieces inspired by Yayoi Kusama's immersive installations, designing youth theatre backdrops that echo James Turrell's light
    work, photographing urban murals in the style of Banksy, and drawing literary inspiration from Haruki Murakami and philosophical ideas of Michel Foucault.
  travel: Gloria Hamilton prefers meticulously planned weekend escapes to national wonders like Zion and Bryce Canyon, savoring sunrise hikes before returning to her Utah home, while dreaming of a spring
    study tour of Paris's Louvre and a cultural pilgrimage to Kyoto's temples, balancing budget constraints with a love for curated travel itineraries.
  culinary: Gloria Hamilton enjoys crafting Mediterranean quinoa bowls topped with heirloom tomatoes, feta, and roasted chickpeas, delights in baking flaky almond croissants on lazy Sundays, and often pairs
    her design marathons with a steady supply of salted pistachios, though she admits to binge‑snacking on artisanal popcorn while editing photos.
  core: Gloria Hamilton blends relentless curiosity with disciplined organization, channeling an artistic soul into curated experiences while meticulously balancing solitary creation with strategic social
    engagement.
background:
  cultural: Gloria grew up in a middle‑class white family in Salt Lake City, surrounded by a blend of traditional Utah culture and a growing appreciation for the arts. Her community places value on self‑reliance,
    outdoor recreation, and civic involvement, which has shaped her disciplined work ethic and love for nature. Exposure to the city’s vibrant and diverse artistic scene—museums, local galleries, and cultural
    festivals—has cultivated her curiosity and appreciation for varied perspectives. While her family’s cultural roots are anchored in mainstream American values, she embraces the inclusive, progressive
    elements of Salt Lake’s youth culture, fostering an open‑minded, globally aware outlook.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''HTML/CSS basics'', ''Research and information synthesis'', ''Written communication'', ''Photography'',
