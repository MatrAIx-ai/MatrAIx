personas:
  professional: Chun Huang, a senior management analyst with two decades of consulting experience, translates complex data into strategic insights using Excel, SQL, Python, and Tableau, frequently double‑checking
    forecasts to soothe a natural tendency to worry, and they champion inclusive team culture and employee well‑being as a stepping stone toward a future director‑level role.
  sports: Chun Huang enjoys a weekly 18‑hole round at the local country club, follows the Houston Astros and Houston Dynamo with enthusiasm, and they participate in a community chess club where strategic
    thinking on the board mirrors their analytical work.
  arts: Chun Huang frequents the city’s performing arts center to see productions ranging from contemporary dance to classic Shakespeare, collects limited‑edition calligraphy sets, and they listen to the
    music of Yo‑Yo Ma, Lang Lang, and cross‑genre artists like the Piano Guys who blend classical motifs with modern beats.
  travel: Chun Huang prefers carefully planned trips that blend cultural immersion—such as a month‑long culinary tour of Mexico’s Oaxaca region—with low‑stress getaways to Texas Hill Country vineyards,
    often using airline miles and reward points to stretch a modest travel budget while they balance work commitments.
  culinary: Chun Huang delights in hand‑rolling dim sum and then re‑imagining it with Tex‑Mex twists, crafting pork char‑siu tacos topped with cilantro‑lime salsa and a drizzle of hoisin, while they master
    Cantonese sauces and perfect corn tortillas for a seamless cultural fusion.
  core: Chun Huang is a data‑driven strategist who balances meticulous analysis with heartfelt community service, and they often wrestle with a lingering worry about missing hidden insights.
background:
  cultural: Chun Keung was born to immigrant parents who moved from Taiwan to the United States in the late 1970s. He grew up in a bilingual household in Houston, where Mandarin and Cantonese were spoken
    at home alongside English. The family upheld traditional East Asian values such as respect for elders, collectivism, and the importance of education, while also embracing the multicultural environment
    of Texas. He actively participates in the local Asian community, celebrating Lunar New Year, Mid‑Autumn Festival, and attending the annual Texas Chinese New Year Parade in Houston. His cultural identity
    influences his professional demeanor—emphasizing harmony, cooperation, and respect in interpersonal interactions—and informs his interest in community service and cross‑cultural dialogue.
