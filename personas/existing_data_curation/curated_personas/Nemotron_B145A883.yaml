  career_goals: Chun Keung aims to transition from a senior management analyst role to a director of analytics or chief operating officer position within the next five years, where he can shape organizational
    strategy and champion employee well‑being initiatives. He is committed to building high‑performing, inclusive teams that prioritize harmony and collaboration, and he hopes to mentor emerging analysts,
    especially those from underrepresented backgrounds. Additionally, he aspires to lead the development of a community‑focused CSR program that supports local Asian‑American families in Sugar Land, providing
    educational scholarships and mental‑health resources. Balancing his ambition with personal well‑being, he also envisions a gradual shift toward consulting for small businesses, helping them adopt data‑driven
    decision making while preserving a healthy work‑life balance.
