persona_description: A member of the Mumbai Climate Action Plan (MCAP) team who is responsible for developing strategies and policies to mitigate and adapt to the impacts of climate change in the city.
  They are skilled in urban planning, environmental science, and policy development, and have experience in preparing climate action plans for other cities. They have a deep understanding of the city's
  unique challenges and opportunities related to climate change, and are committed to making significant changes to the energy grid and transport sector to achieve net zero emissions by 2050. They are also
  focused on promoting sustainable waste management, urban greening and biodiversity, and air quality, and encouraging the use of green buildings and electric vehicles.
