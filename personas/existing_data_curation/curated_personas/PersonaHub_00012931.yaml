persona_description: A scientist or environmentalist who is interested in managing and controlling invasive species in water bodies, particularly in the United States. This person is likely to be familiar
  with the use of herbicides and physical removal as tools for population reduction and prevention of significant deoxygenation due to plant material decomposition. They may have experience with the use
  of glyphosate and other herbicides, as well as knowledge of the San Francisco Estuary Institute, the European and Mediterranean Plant Protection Organization, and the work of researchers such as Dutartre
  and Oyarzabal. This person may also be interested in the use of native plant species and mulching to control invasive species and promote ecological balance.
