  career_goals: Even at 91, Daniel aims to remain an active voice in Sarasota’s cultural life. He hopes to author a memoir that weaves together his personal history, the evolution of the local arts scene,
    and lessons from his research, and to see it published through a community press. He aspires to serve on the board of a nonprofit arts organization, guiding strategic planning and youth outreach. He
    also wishes to expand his docent work by curating a small traveling exhibit of regional historical photographs for senior centers, thereby preserving local heritage and fostering intergenerational connections.
