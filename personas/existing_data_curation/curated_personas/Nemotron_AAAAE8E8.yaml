personas:
  professional: Oscar Samper, an aspiring comic illustrator, melds meticulous panel planning with spontaneous character design, using both sketchbooks and tablet apps, and thrives in intimate after‑school
    art clubs where their curiosity fuels unconventional storytelling while their organized side keeps projects on schedule.
  sports: Oscar Samper, a casual skateboarder and member of the El Paso Soccer Club’s U12 team, enjoys weekly practice drills, roots for the local El Paso Locomotive FC during weekends, and balances fitness
    with sketching sessions, often using short bike rides as a creative reset.
  arts: Oscar Samper, a budding comic creator, draws inspiration from the bold lines of Jack Kirby, the narrative depth of Neil Gaiman’s Sandman, the vibrant beats of bomba and plena rhythms, reggaeton
    hits by Bad Bunny, and regular visits to the El Paso Museum of Art, especially works by Diego Rivera, to fuel their visual imagination.
  travel: Oscar Samper favors well‑planned family trips that blend art and adventure, recalling a memorable weekend in Santa Fe’s historic plaza, dreaming of a future visit to Tokyo’s Akihabara to immerse
    in manga culture, and prioritizing destinations where they can sketch local street scenes while enjoying rhythmic plaza music.
  culinary: Oscar Samper, a budding home‑chef, prefers quick meals like cheesy quesadillas, pepper‑filled tacos al pastor with fresh cilantro and lime, and sweet churros dipped in dark chocolate, all while
    listening to reggaeton beats in the kitchen, though they often skip breakfast to stay up sketching late into the night.
  core: Oscar Samper channels a vivid imagination into comics while juggling intense anxiety that fuels late‑night sketch marathons and occasional impulsive snack binges, a reserved yet assertive teen who
    finds solace in rhythm‑driven music and LEGO builds.
background:
  cultural: 'Oscar’s family maintains strong Puerto Rican roots: Spanish is spoken at home, traditional foods such as arroz con gandules and pasteles are prepared for holidays, and rhythmic bomba and plena
    music fill celebrations. Growing up in El Paso, he also experiences the city’s Mexican‑American influences—enjoying Tex‑Mex cuisine, celebrating Cinco de Mayo, and hearing both Spanish dialects. This
    bicultural environment fosters his bilingual proficiency and nurtures an appreciation for diverse artistic expressions. He often attends community festivals that blend Puerto Rican and local traditions,
    giving him a rich tapestry of cultural references that informs his art and personal identity.'
attributes:
  skills: '[''drawing and sketching'', ''digital illustration basics'', ''basic coding with Scratch'', ''bilingual communication (Spanish & English)'', ''creative writing'']'
  hobbies: '[''drawing/sketching'', ''digital illustration'', ''reading graphic novels'', ''story‑driven video games'', ''listening to Puerto Rican music'', ''building LEGO models'', ''visiting local museums'',
    ''participating in small art clubs'']'
  career_goals: Oscar dreams of turning his passion for art and stories into a future career as an animator or graphic‑novel author. He envisions creating characters and worlds that reflect his Puerto Rican
    heritage and the vibrant multicultural life of El Paso, hoping his work can inspire other kids who feel caught between cultures. In the longer term, he hopes to use his art to support community programs—perhaps
    leading workshops that teach drawing or digital storytelling to younger children—combining his creative drive with a desire to give back. He also sees himself studying visual arts or media design in
    high school and eventually college, aiming to develop the technical and narrative skills needed for professional animation or illustration.
