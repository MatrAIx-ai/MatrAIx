  hobbies: '["Playing soccer", "Building LEGO models", "Reading adventure and animal books", "Simple home science experiments", "Drawing and cartooning", "Community garden volunteering", "Recorder practice
    in school band", "After‑school group games and storytelling"]'
  career_goals: Eric envisions a future where he can combine his curiosity about how things work with his deep desire to help others. He often dreams of becoming a teacher who makes learning exciting, a
    veterinarian who cares for animals, or a community firefighter who protects neighbors. He is also intrigued by designing safe, fun playgrounds, hinting at an interest in architecture. His long‑term
    ambition is to pursue a career that balances creative problem‑solving with compassionate service to his community.
