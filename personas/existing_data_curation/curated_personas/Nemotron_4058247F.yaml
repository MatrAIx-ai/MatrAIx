personas:
  professional: Eric Horn, an aspiring young engineer, channels a blend of curiosity and practicality into intricate LEGO builds, demonstrating organized problem‑solving, cooperative teamwork, and a compassionate
    yet sometimes worry‑prone approach to group projects, while they readily assist classmates in troubleshooting designs.
  sports: Eric Horn, a midfield enthusiast for the Oak Grove Youth Soccer Club, spends Saturday mornings mastering passes at the neighborhood park, idolizes FC Barcelona’s youth system, and cheers for the
    hometown baseball team, the River City Raptors, while they balance schoolwork with practice.
  arts: Eric Horn, a budding LEGO designer and cartoonist, admires the whimsical tales of Roald Dahl, the playful tunes of The Wiggles, the clever strips of Bill Watterson’s Calvin & Hobbes, and recreates
    scenes from Disney’s Moana in both brick creations and sketches, while they take recorder lessons to blend music with visual art.
  travel: Eric Horn, an enthusiastic day‑tripper, has explored the waterfall trail in nearby Greenleaf State Park, visited the Smithsonian museums during a family trip to Washington, D.C., dreams of camping
    in Yosemite National Park, and keeps a scrapbook of postcards from a beach vacation in Cancun, while they balance curiosity about nature with family‑budget constraints.
  culinary: Eric Horn, a budding junior chef, loves crafting spaghetti Bolognese with fresh garden tomatoes, blending peanut butter‑banana smoothies, and baking crispy carrot sticks, yet they often forget
    to wash hands before cooking and occasionally sneak extra chocolate chips into the dough for a sweet surprise.
  core: Eric Horn is an energetic, compassionate eight‑year‑old who merges relentless curiosity with a practical streak, thrives in group activities, and they wrestle with worry‑driven overthinking and
    occasional forgetfulness.
background:
  cultural: Eric grows up in a diverse, urban New York City neighborhood, surrounded by a tapestry of cultures and languages. His family is of white Anglo‑American background with roots in the northeastern
    United States, and they celebrate traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with family meals and seasonal activities. Living in the city, Eric is regularly exposed
    to multicultural events through his school and community center, which host cultural festivals, storytelling sessions, and language clubs. This environment enriches his perspective, fostering openness
    and respect for all backgrounds while preserving the family’s own customs and values.
attributes:
  skills: '["Reading comprehension (grade 3)", "Basic arithmetic (addition, subtraction, multiplication)", "Tablet and educational app proficiency", "Collaborative group work and peer mediation", "LEGO
