  hobbies: '[''Gardening'', ''Reading fiction and medical literature'', ''Yoga and mindfulness meditation'', ''Knitting'', ''Crossword and Sudoku puzzles'', ''Hiking in local nature trails'', ''Cooking
    simple family meals'', ''Volunteering at community health events'']'
  career_goals: Stacy aims to advance her nursing career into a leadership role within the rural health system of Grant Parish. Over the next five years she plans to obtain a Master of Science in Nursing
    with a concentration in Nurse Management or Family Nurse Practitioner, allowing her to supervise staff, develop evidence‑based protocols, and expand telehealth services for underserved patients. She
    is also passionate about integrating mental‑health support into primary care, and hopes to design a community outreach program that addresses anxiety and depression among residents, drawing on her own
    experiences with emotional distress. Ultimately, she seeks a balanced professional path that combines clinical expertise, mentorship, and improved patient outcomes while preserving time for family.
