  hobbies: '[''cooking Mexican dishes'', ''herb gardening'', ''reading historical fiction'', ''volunteering at food pantry'', ''walking Ionia River trail'', ''crafting papel picado'', ''community dancing'']'
  career_goals: Maria aims to channel her organized nature and compassion into leading a community nutrition education program at the Ionia Senior Center, where she can teach budgeting and healthy cooking
    to seniors. She also aspires to launch a monthly cooking workshop that shares traditional Mexican recipes with local families, creating a cross-cultural bridge. Over the next few years she hopes to
    serve on the board of the local food pantry to shape its outreach strategy, and to mentor younger volunteers, especially those from immigrant backgrounds, in effective project management.
