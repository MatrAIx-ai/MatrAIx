persona_description: A scientist interested in the study of signaling pathways in plants, particularly nutrient uptake and protein interactions. Mendoza and Peck's collaboration is an example of how timing
  can lead to novel and innovative research. They are eager to adapt a new technology, BioID2, to study signaling pathways in plant cells. Their project has the potential to revolutionize the field of plant
  biology by providing a real-time protein-tagging method that allows plant scientists to observe protein interactions in their native environment.
