  hobbies: '["Backyard gardening (roses, seasonal vegetables)", "Baking classic family recipes and jam preservation", "Reading classic literature and historical non‑fiction", "Participating in a local book
    club", "Solving crosswords and Sudoku puzzles", "Volunteering at a senior center (meal service)", "Attending church community events and charitable outreach", "Walking the Brandywine Trail for light
    exercise"]'
  career_goals: Approaching retirement, Denise aims to leave a lasting legacy by establishing a structured mentorship program for junior staff and creating a comprehensive operations manual for the restaurant.
    She hopes to transition into a part‑time consulting role, offering her expertise to neighboring food‑service establishments looking to improve efficiency and safety. Additionally, she is interested
    in assisting the current owners with succession planning to ensure the business continues to thrive after she steps back.
