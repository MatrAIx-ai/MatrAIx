personas:
  professional: Denise Curtis, a veteran food-service manager, leverages three decades of expertise in streamlining kitchen operations, rigorous food-safety compliance, and meticulous budgeting, and they
    channel their love of routine and methodical mindset into a calm, conflict-free workplace while mentoring junior staff with patient, step-by-step guidance.
  sports: Denise Curtis, a loyal supporter of the local minor league baseball team the River City Cats, attends the weekly senior walking group, enjoys gentle gardening-related cardio, and they participate
    in a community bridge tournament that they consider a mental sport, while avoiding high-impact activities due to joint concerns.
  arts: Denise Curtis, an avid member of her town’s book club, devotes evenings to dissecting classic novels by Jane Austen and historical biographies by Doris Kearns Goodwin, enjoys listening to Mozart’s
    Symphony No. 40, and they occasionally attend the community theater’s production of "Our Town," finding artistic appreciation a soothing complement to their structured routine.
  travel: Denise Curtis, a planner-oriented traveler, prefers well-charted destinations like the historic gardens of Charleston, the coastal charm of Myrtle Beach, and a yearly pilgrimage to her family’s
    cabin in the Adirondacks, and they book trips months in advance, balancing a modest travel budget with a desire for familiar, low-stress experiences.
  culinary: Denise Curtis, a skilled home baker, faithfully reproduces her grandmother’s almond cake, preserves raspberry-rose jam using heirloom jars, and they relish cooking seasonal vegetable soups with
    fresh rosemary and thyme, while occasionally over-salting a stew—a quirk they humorously blame on an overly eager pinch of sea salt.
  core: Denise Curtis, a 67-year-old methodical mentor, blends a love of routine with quiet generosity, habitually checks off daily checklists, over-cooks her jam to a perfect consistency, and they quietly
    shuffle through crossword puzzles while keeping a secret stash of extra garden fertilizer.
background:
  cultural: Denise identifies with a mid‑western American upbringing rooted in traditional, middle‑class values. Her family heritage traces back to early European immigrants who settled in the Mid‑Atlantic
    region, and she has spent most of her life in Delaware. She was raised in a Protestant (mainly Methodist) household, which emphasized community service, modesty, and dedication to hard work. Celebrations
    such as Thanksgiving, Christmas, and the Fourth of July hold special meaning for her, as does participation in local Delaware traditions like the Dover Mummers Parade and county fairs.
attributes:
  skills: '["Food safety compliance (ServSafe certified)", "Staff scheduling and shift management", "Inventory control and procurement", "Budgeting and cost analysis", "Point‑of‑sale (POS) system operation",
