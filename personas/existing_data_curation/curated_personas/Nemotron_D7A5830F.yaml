personas:
  professional: Cody Garcia is an aspiring retail manager who leverages nine years of front‑line cashier experience at a bustling tourist‑centric shop in St. Augustine to master POS systems, inventory control,
    and customer de‑escalation, while their curiosity about emerging retail technology and relaxed, flexible approach to scheduling fuels a drive toward a supervisory role within two years, and they plan
    to earn a Retail Management certificate, obtain the Certified Retail Manager credential, and eventually open a community‑focused convenience store that doubles as a local hub.
  sports: Cody Garcia’s athletic routine blends pickup basketball at the historic St. Augustine park, summer beach volleyball with the St. Augustine Beach Volleyball Club, and weekend kayak excursions along
    the Atlantic, while they cheer on the Tampa Bay Rays, Jacksonville Jaguars, and Miami Heat, and treat fitness as a social outlet rather than a rigid regimen.
  arts: Cody Garcia’s artistic side shines through a love for live music gigs that showcase indie folk acts like The Lumineers and blues legends such as Gary Clark Jr., wandering the historic district to
    admire 19th‑century architecture, and a passionate hobby of collecting vintage postcards featuring works by Alphonse Mucha, all of which color their evenings after video‑game sessions and inspire their
    creative grilling experiments.
  travel: Cody Garcia favors short, spontaneous getaways—like a weekend road trip to Key West for tarpon fishing, a night in Savannah to savor low‑country cuisine, and an annual January escape to Barcelona
    for its historic streets—while budgeting constraints steer them toward road‑trip deals and off‑season flights, and they rely on a loosely organized travel checklist that mirrors their flexible outlook
    on life.
  culinary: Cody Garcia’s culinary persona is that of a backyard grill master who confidently sears Gulf shrimp, blackens red snapper, and slow‑cooks Southern‑style BBQ ribs with a secret family rub of
    brown sugar, smoked paprika, and cayenne, while also experimenting with gumbo stew featuring okra and Andouille sausage, pairing each dish with fresh lemon‑herb butter and collard greens, proudly hosting
    monthly 'Seafood Sundays' for friends, yet occasionally over‑smoking the fish when distracted by a video‑game tournament.
  core: Cody Garcia is a sociable, curiosity‑driven 30‑year‑old retail professional who balances community‑centered ambition with a love for sports, music, grilling, and occasional financial forgetfulness,
    navigating life with a laid‑back, compassionate outlook.
background:
  cultural: Cody is a white American with deep roots in the Southeast, and his surname reflects a distant Hispanic lineage that he celebrates during family gatherings. He was raised in a coastal Florida
    environment where tourism, historic preservation, and Southern hospitality intersect. His upbringing emphasized community involvement, respect for tradition, and a relaxed, flexible approach to life—values
    reflected in his easygoing demeanor. He identifies with mainstream American cultural practices such as celebrating Thanksgiving and Christmas, while also participating in local traditions like the St.
    Augustine Spanish Festival and the historic “Nights of Lights.” His cultural identity is grounded in a blend of Southern friendliness, coastal laid‑back lifestyle, and an appreciation for the multicultural
    fabric of his hometown.
