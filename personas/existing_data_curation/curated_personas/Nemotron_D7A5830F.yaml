  career_goals: Cody aims to transition from a front‑line cashier to a supervisory role within the next two years. He plans to enroll in a community‑college certificate program in Retail Management and
    pursue the Certified Retail Manager (CRM) credential. His long‑term ambition is to become an assistant store manager and eventually a full store manager, where he can shape team culture around collaboration
    and customer‑centric service. Additionally, he hopes to blend his passion for community service with his career by leading store‑based charitable initiatives, such as food‑bank drives and local youth
    mentorship programs. If circumstances allow, he envisions opening a small neighborhood convenience store that doubles as a community hub.
