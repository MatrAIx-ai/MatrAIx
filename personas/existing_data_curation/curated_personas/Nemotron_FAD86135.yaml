  career_goals: Davie aims to become a licensed journeyman electrician within the next two years and to earn his master electrician certification within five years. He is especially interested in specializing
    in residential energy‑efficiency upgrades and solar‑panel installations, seeing a growing market in Kentucky’s suburban neighborhoods. Ultimately, he hopes to start his own small contracting business
    that can offer flexible, customer‑focused service, allowing him to blend his technical curiosity with his desire for a relaxed, autonomous work schedule. He also plans to take occasional continuing‑education
    courses in emerging smart‑home technologies to stay ahead of industry trends.
