personas:
  professional: Davie Gandy, a 22‑year‑old apprentice electrician in Owensboro, blends hands‑on curiosity with practical code knowledge, excelling at residential wiring, conduit bending and troubleshooting
    while occasionally juggling multiple tool orders due to a relaxed, somewhat disorganized schedule; their ambition to become a journeyman and later a master electrician drives them to experiment with
    solar‑panel retrofits and smart‑home tech, all while leading small crews with a cooperative yet assertive style.
  sports: At 22, Davie Gandy is a devoted fan of the Kentucky Wildcats basketball team and the Owensboro High School football squad, frequently cheering from the bleachers on Friday nights; they also play
    pickup basketball at the community center, join a local fishing club that meets on the Ohio River, and occasionally ride their vintage motorcycle in informal club rides, blending competitive spirit
    with relaxed recreational pursuits.
  arts: Davie Gandy strums a battered electric guitar in a garage band that covers classic rock favorites like Led Zeppelin and AC/DC, while also enjoying the soulful twang of country‑rock artists such
    as Chris Stapleton and the blues stylings of B.B. King at local bar venues; their musical outings often double as social gatherings where they organize impromptu jam sessions after neighborhood barbecues.
  travel: With a penchant for low‑cost road trips, Davie Gandy has taken the vintage motorcycle on weekend rides to the Mammoth Cave National Park, a weekend getaway to Nashville for live music, and a spontaneous
    family camping trip to the Red River Gorge, preferring spontaneous itineraries over rigid planning, but still dreaming of a future cross‑country tour to the Pacific Northwest once their contracting
    business is stable.
  culinary: Davie Gandy's palate sways between smoky barbecue ribs, tangy pulled pork, and freshly grilled catfish seasoned with a blend of paprika, brown sugar, and cayenne; they can fire up a charcoal
    grill with ease, often experimenting with homemade dry rubs and side dishes like coleslaw and baked beans, while their kitchen skills hover at a confident home‑cook level, occasionally attempting more
    elaborate dishes like shrimp étouffée during community pot‑luck nights.
  core: Davie Gandy is a sociable, curiosity‑driven apprentice electrician who balances hands‑on tinkering with a laid‑back, slightly chaotic lifestyle, constantly juggling tools, guitars, and community
    events while dreaming of a future solar‑focused contracting business.
background:
  cultural: Davie grew up in Owensboro, a small‑city community in western Kentucky with strong Southern‑Midwestern cultural roots. His family’s values emphasize hard work, modesty, and loyalty to the local
    community. He was raised with a mix of rural and small‑town influences—church gatherings, family‑cooked barbecue, and a love for the region’s music, especially country and bluegrass. The local ‘Southern
    hospitality’ outlook is evident in his easy‑going, sociable demeanor and his preference for flexible, people‑oriented interactions. This background also informs his practical work ethic as an electrician
    and his comfort with community‑based activities.
