  hobbies: '[''sketching'', ''landscape photography'', ''playing acoustic guitar'', ''participating in local jam sessions'', ''community baseball league'', ''fishing'', ''hiking'', ''camping'', ''volunteering
    at church'', ''organizing community festivals'']'
  career_goals: Joseph aims to become a certified forklift operator and advance to a supervisory role within his current warehouse within the next two years. He plans to complete an associate’s degree in
    logistics or supply chain management at a nearby community college, which will enable him to transition into a logistics coordinator position. In the long term, he envisions managing a regional distribution
    center or launching his own small moving and storage business that incorporates a creative side, such as custom furniture design, allowing him to blend his logistical expertise with his passion for
    art.
