  hobbies: '[''Soccer'', ''Community Volunteering'', ''Photography'', ''Reading Non‑Fiction'', ''Networking Events'', ''Cooking'', ''Trivia Nights'', ''Road Biking'']'
  career_goals: Frederic aims to transition from his current period of unemployment into a mid‑level product management or consulting role within the Gainesville‑Alachua region, where he can leverage his
    strategic planning and data analysis strengths. Over the next two years, he plans to earn a Project Management Professional (PMP) certification and complete a short executive program in product innovation
    to enhance his credentials. Ultimately, he aspires to launch his own boutique consulting firm that helps local small businesses adopt data‑driven strategies and improve operational efficiency, blending
    his curiosity for new ideas with a practical, results‑focused mindset.
