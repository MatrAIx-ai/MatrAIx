personas:
  professional: Frederic Kinsey, a data‑driven strategist transitioning from unemployment to a product management or consulting role in the Gainesville–Alachua area, channels their strong analytical skills
    in Excel, Power BI, and Tableau together with polished public‑speaking and negotiation abilities to lead cross‑functional projects, while their methodical planning and sociable energy ensure they meet
    deadlines, build stakeholder rapport, and stay curious about emerging business trends.
  sports: Frederic Kinsey competes weekly in the Gainesville Soccer Club’s intramural league, pedals the Alachua County Nature Trail network for road‑bike endurance rides, and roots for the Florida Gators
    football and Orlando Magic while balancing a disciplined fitness routine with a love for team camaraderie.
  arts: Frederic Kinsey’s creative outlet flourishes through urban and landscape photography inspired by Ansel Adams and Steve McCurry, regular visits to the Harn Museum, and a playlist that mixes The Beatles
    with Miles Davis, which together shape both their visual aesthetic and reflective mindset.
  travel: Frederic Kinsey prefers meticulously planned weekend getaways that blend adventure and relaxation—like hiking the Blue Ridge Mountains, exploring the espresso‑centric streets of Portland, and
    savoring the historic charm of Savannah—while using budget airlines and a travel‑app itinerary to stay within a modest travel budget.
  culinary: Frederic Kinsey, an intermediate home chef, delights in crafting Mediterranean‑inspired dishes such as ratatouille with heirloom tomatoes and basil, spiced lentil stew featuring cumin and saffron,
    and experiments with fermentation after evenings spent swapping recipes with friends at local farmers’ markets.
  core: Frederic Kinsey is a hyper‑organized, socially vibrant data enthusiast who balances relentless curiosity with pragmatic spreadsheets, bites into gourmet experiments, and occasionally overcommits
    to projects, only to be rescued by a late‑night bike ride and a camera click.
background:
  cultural: Frederic was raised in a middle‑class white family in central Florida, experiencing a blend of Southern hospitality and the dynamic, university‑town atmosphere of Alachua County. He identifies
    strongly with American values of individual achievement while maintaining deep ties to local community traditions and outdoor activities. Exposure to the diverse student population at the University
    of Florida fostered an openness to new ideas, yet his upbringing emphasized reliability, practical problem‑solving, and a collaborative spirit rooted in regional community life.
