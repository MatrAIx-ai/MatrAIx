  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Reading contemporary fiction and philosophy'', ''Cooking Mexican and fusion cuisine'', ''Exploring multicultural
    neighborhoods in Queens'', ''Photography of urban street art'', ''Practicing yoga and meditation'', ''Attending jazz and Latin fusion concerts'']'
  career_goals: Roselia’s primary ambition is to become a senior underwriting manager within the next five years, leading a specialized team that focuses on emerging risks such as climate‑related property
    exposure and the gig economy. She intends to earn the Chartered Property‑Casualty Underwriter (CPCU) designation and to champion the integration of AI risk‑modeling tools to enhance pricing accuracy
    and operational efficiency. Long‑term, she aspires to a director‑level role where she can influence industry standards, develop niche insurance products for cultural and artistic assets, and mentor
    Latinx talent entering the insurance sector. Her competitive drive pushes her to continuously exceed performance metrics while maintaining the calm resilience that defines her work ethic.
