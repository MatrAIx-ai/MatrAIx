personas:
  professional: Roselia Perez blends rigorous underwriting expertise with a creative, artistic sensibility, leveraging advanced Excel modeling, SQL data queries, and AI‑driven risk scoring while fluently
    communicating in Spanish and English to design specialized coverage for cultural institutions, all with a calm, resilient demeanor that fuels their ambition to become a senior underwriting manager and
    eventually a director shaping industry standards.
  sports: Roselia Perez enjoys a balanced fitness regimen that includes sunrise yoga sessions at the East River, weekend pick‑up basketball games at a Queens community center, and avidly follows the New
    York Knicks and NYCFC, occasionally cheering from the stands with friends.
  arts: Roselia Perez immerses herself in New York’s vibrant art scene, sketching watercolors of the city’s architecture after visits to MoMA and the Whitney, while drawing inspiration from contemporary
    creators like Kehinde Wiley, Banksy, and the improvisational jazz of Esperanza Spalding in live performances.
  travel: Roselia Perez curates travel experiences that blend cultural depth and culinary curiosity, having explored the historic streets of Oaxaca for its mole traditions, strolling through the colorful
    neighborhoods of Barcelona’s El Raval, and routinely discovers hidden gastronomic gems in Queens’ multicultural enclaves during weekend day trips.
  culinary: Roselia Perez transforms classic dishes such as chiles en nogada and carnitas tacos into modern plates by incorporating smoked chipotle sauces, quinoa‑based masas, and a garnish of micro‑herbs,
    while mastering the delicate balance of flavors in homemade churro doughs infused with orange zest.
  core: Roselia Perez is a calm, analytically sharp underwriter who channels an artistic curiosity into every facet of life, from sketching cityscapes during lunch breaks to meticulously budgeting for creative
    pursuits, all while maintaining a healthy skepticism and a habit of meditative coffee breaks.
background:
  cultural: Roselia is a first‑generation Mexican‑American raised in Woodside, Queens, where her family preserved many traditions from their northern Mexico origins. Growing up, she celebrated Día de los
    Muertos, Las Posadas, and other festivals, often sharing stories, music, and home‑cooked meals with neighbors from diverse backgrounds. Bilingual at home, she developed fluency in both Spanish and English,
    which later became a professional asset. Her upbringing emphasized respect for community, the importance of education, and an appreciation for artistic expression, from the murals lining neighborhood
    streets to classic Mexican folk art. These cultural influences inform her worldview, fostering a curiosity for varied experiences, a competitive spirit to excel, and a resilient calm that helps her
    navigate both personal and professional challenges.
attributes:
  skills: '[''Risk assessment'', ''Policy formulation'', ''Data analytics (Excel, SQL)'', ''AI‑driven underwriting tools'', ''Regulatory compliance'', ''Bilingual communication (Spanish/English)'', ''Creative
