  hobbies: '[''Soccer (adult league)'',''Hiking'',''Salsa dancing'',''Cooking Venezuelan cuisine'',''Volunteering at food bank'',''STEM mentorship (robotics club)'',''Tech meetups'',''Cycling'',''Fishing'',''Road
    trips with family'']'
  career_goals: Wilfredo aims to advance to a senior director or vice‑presidential role overseeing operations and digital transformation within a mid‑size manufacturing or technology firm. He plans to earn
    an MBA to deepen his strategic and financial acumen, while also pursuing certification in Advanced Supply Chain Management. He is passionate about mentoring emerging managers and hopes to champion sustainability
    initiatives that reduce waste and improve energy efficiency. Long‑term, he envisions founding a consultancy that helps regional businesses adopt lean, data‑driven practices, leveraging his bilingual
    background to serve both local and Latin American partners.
