  career_goals: Eliseo aims to move into a supervisory role within the next three years, becoming a lead janitorial coordinator for a larger multi‑site property. He plans to obtain an OSHA certification
    and a Certified Facilities Manager credential to broaden his expertise. Over the longer term, he hopes to launch his own small‑scale cleaning business that serves both commercial and residential clients
    in the Middlesex County area, leveraging his strong reputation for reliability and his network within the Dominican community. Financial stability and a structured retirement plan are also important
    goals, so he is saving consistently and exploring employer‑sponsored pension options.
