  hobbies: '[''Watercolor Painting'', ''Acrylic Painting'', ''Reading Fantasy and Science Fiction'', ''Gardening'', ''Hiking'', ''Community Theater'', ''Book Club Participation'', ''Baking'', ''Visiting
    Art Galleries'', ''Volunteer Teaching'']'
  career_goals: Driven by her curiosity and passion for innovative education, Judith aims to move into instructional leadership as a curriculum coordinator focused on district‑wide arts integration. She
    plans to earn a master's degree in Educational Administration to become a principal and to launch a community‑based after‑school program that blends visual arts, storytelling, and STEAM activities for
    underserved students. She also aspires to present her work at regional conferences, publish a guide on creative teaching strategies, and mentor a network of teachers across Montgomery County.
