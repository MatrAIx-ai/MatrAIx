  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading historical fiction'', ''Community volunteering'', ''Mentoring adult learners'', ''Attending cultural festivals'', ''Yoga'', ''Walking in
    parks'']'
  career_goals: Lesly aims to advance to a senior project management role within a large educational or nonprofit organization, where she can lead multi‑disciplinary teams that design and implement community‑based
    learning programs. She plans to obtain the Project Management Professional (PMP) certification and pursue a master’s degree in Educational Leadership to deepen her strategic influence. Over the next
    five years, she hopes to spearhead a city‑wide initiative that expands STEM education access for underrepresented students in Houston, while mentoring emerging project managers—especially women and
    minorities. Long‑term, she envisions establishing her own consultancy focused on culturally responsive educational project design and implementation.
