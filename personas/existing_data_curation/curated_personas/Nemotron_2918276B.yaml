personas:
  professional: Lesly Izquierdo is a veteran educational project manager with three decades of experience in strategic planning, meticulous budgeting, risk mitigation, and bilingual stakeholder engagement,
    and they bring a steadfast preference for structure and methodical execution that guarantees community learning programs launch on schedule and within scope.
  sports: Lesly Izquierdo follows the Houston Astros, Houston Rockets, and Houston Dynamo with loyal enthusiasm, participates in a weekly walking club at Hermann Park, plays casual tennis at a local community
    center, and they schedule seasonal bike rides, approaching fitness with the same reliable routine they apply to project timelines.
  arts: Lesly Izquierdo is an avid reader of historical fiction and biographies, regularly visits the Museum of Fine Arts, Houston, enjoys performances by the Houston Symphony, and they listen to artists
    such as Lila Downs, Natalia Lafourcade, and classic painter Frida Kahlo, finding inspiration for both curriculum design and garden layouts.
  travel: Lesly Izquierdo prefers meticulously planned trips, having explored Oaxaca’s mercados, the historic San Antonio Missions, and the Hill Country wine trail, while dreaming of a cultural tour of
    Seville and a weekend getaway to Austin’s music scene, and they always balance adventure with budget-conscious itineraries.
  culinary: Lesly Izquierdo skillfully prepares traditional dishes like pozole, mole poblano, and carnitas, seasoning with fresh cilantro, epazote, and chipotle from their herb garden, experimenting with
    family recipes while preserving authentic flavors, and they enjoy occasional culinary challenges such as making fresh corn tortillas from scratch.
  core: Lesly Izquierdo blends a methodical project‑management mindset with a love for gardening, cooking, and community mentorship, navigating life’s complexities through structure, steady routines, and
    occasional indulgent quirks like nightly coffee binges, and they remain emotionally stable even under pressure.
background:
  cultural: Lesly is a first‑generation Mexican‑American whose parents immigrated from Jalisco, Mexico, in the 1970s. Raised in Houston's vibrant Mexican community, she grew up bilingual and regularly celebrated
    traditions such as Día de los Muertos, Las Posadas, and quinceañeras. Family gatherings centered around food, music, and storytelling have shaped her identity, and she maintains strong ties with relatives
    both in Texas and Mexico, often traveling to visit them. Her heritage informs her professional commitment to equitable education and her active involvement in cultural organizations that promote Mexican
    arts and community empowerment.
