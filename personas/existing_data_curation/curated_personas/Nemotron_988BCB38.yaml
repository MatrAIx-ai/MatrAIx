personas:
  professional: Thomas Hosseini is an aspiring digital storyteller who merges hand‑drawn character sketches with Minecraft and Roblox world‑building, while editing short video clips for friends, channeling
    their curiosity and balanced blend of organization and spontaneity into creative projects.
  sports: Thomas Hosseini plays point guard for the Greene Wildcats middle‑school basketball team, attends after‑school practices with enthusiasm, follows the Los Angeles Lakers and the NBA season, and
    balances team workouts with occasional pick‑up games at the local park.
  arts: Thomas Hosseini devours graphic novels like 'Saga' and 'Watchmen', streams Studio Ghibli films such as 'Spirited Away', follows digital illustrators on ArtStation like 'Loish', and often reenacts
    scenes from Pixar movies, letting the works shape their own artistic style.
  travel: Thomas Hosseini loves weekend trips to capture autumn foliage at Greene State Park, enjoys family road trips to Yellowstone National Park, dreams of exploring Tokyo’s anime districts, and prefers
    backpacking with friends on a modest budget that balances adventure and safety.
  culinary: Thomas Hosseini helps the family prepare traditional dishes for Nowruz such as sabzi polo with herbs and feta, experiments with sweet baklava layers, while also perfecting homemade pepperoni
    pizza and mixing fresh pomegranate‑seed smoothies, though they sometimes forget to turn off the stove after cooking.
  core: Thomas Hosseini is a curious, sociable teen who fuses analog drawing with digital worlds, balances schoolwork and creative hobbies, and navigates teenage life with a blend of organized planning
    and spontaneous bursts of artistic energy.
background:
  cultural: Thomas comes from a mixed cultural heritage. His family’s surname, Hosseini, reflects Iranian roots, and he grew up with Persian traditions such as celebrating Nowruz, preparing dishes like
    sabzi‑polow, and hearing Farsi spoken at home. At the same time, living in the rural town of Greene, New York, he is immersed in a predominantly white, small‑town American environment, participating
    in local school events, community fairs, and sports. This blend of Persian household customs and the broader American culture gives Thomas a bicultural perspective; he values the hospitality and artistic
    appreciation common in his family while also embracing the independence and community spirit of his hometown.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Basic photography'', ''Public speaking'', ''Team collaboration'', ''Time management'', ''Basic coding (Scratch)'', ''Creative problem solving'']'
  hobbies: '[''Drawing and sketching'', ''Digital art and illustration'', ''Minecraft and Roblox world‑building'', ''Photography of nature'', ''Basketball'', ''Drama club acting'', ''Reading graphic novels'',
    ''Video editing'', ''Cooking Persian dishes'', ''Learning Farsi'']'
  career_goals: Thomas dreams of turning his love of art and technology into a career as a visual storyteller. He hopes to attend a high‑school art program, study graphic design or animation, and eventually
    work as a concept artist, comic illustrator, or video‑game level designer. He also envisions creating a YouTube channel where he can share tutorials, short animated films, and cultural insights, combining
    his creative talents with his desire to connect with a wider audience. In the longer term, he would like to use his skills to promote cross‑cultural understanding, perhaps by producing documentaries
    or exhibitions that highlight diverse artistic traditions.
