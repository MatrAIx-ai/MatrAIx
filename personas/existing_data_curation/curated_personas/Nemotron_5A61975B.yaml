  career_goals: Cindy aims to rise to a senior leadership role—such as Director of Operations or Regional Health Services Manager—within the next five years, leveraging her curiosity for new healthcare
    technologies while maintaining practical, patient‑focused solutions. She plans to earn a Master's in Health Administration and obtain Certified Medical Manager (CMM) credentials to deepen her expertise.
    Her long‑term ambition is to spearhead system‑wide quality improvement programs that enhance patient experience and staff well‑being, and eventually launch a consultancy that helps smaller clinics adopt
    efficient, compassionate care models.
