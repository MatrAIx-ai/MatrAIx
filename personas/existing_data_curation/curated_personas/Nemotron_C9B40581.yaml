  hobbies: '["Book Club Participation", "Live Music (Jazz/Folk) Attendance", "Cooking and Wine Pairing", "Balcony Herb Gardening", "Volunteer Literacy Workshops", "Historical Neighborhood Walking Tours",
    "Museum Visits", "Improv Theatre Workshops", "Mindfulness Meditation"]'
  career_goals: Matthew aims to spearhead the creation of an interdisciplinary program titled 'Urban Narratives in the Digital Age' that bridges literary studies with emerging media analysis. He plans to
    publish a monograph on American literary modernism that incorporates digital textual analysis, and to secure a multi-year research grant to support collaborative faculty projects. Over the next five
    years, he hopes to assume a department chair role that emphasizes faculty well-being and inclusive pedagogy, while eventually transitioning to an emeritus status that allows him to focus on public scholarship,
    community outreach, and occasional guest lecturing. Reducing administrative burdens to better manage his stress and maintain his energy for teaching is also a personal priority.
