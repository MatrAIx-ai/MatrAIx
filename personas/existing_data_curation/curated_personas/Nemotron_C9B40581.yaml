personas:
  professional: Matthew Lanier, a seasoned literary scholar and digital humanities educator, synthesizes their curiosity for emerging media with practical curriculum design, leading interdisciplinary seminars
    and grant‑writing initiatives while navigating departmental politics with a flexible, sociable style that masks a lingering anxiety about workload.
  sports: Matthew Lanier, an enthusiastic member of a local walking club who regularly strolls through historic neighborhoods and occasionally plays friendly tennis at the community center, supports the
    New York Knicks and follows the Mets, viewing seasonal sports as a social ritual rather than a rigorous fitness regimen.
  arts: Matthew Lanier, a devoted aficionado of New York’s live jazz scene featuring artists like Miles Davis tributes and folk performances by Ani DiFranco, regularly participates in improv theatre workshops
    and frequents the Metropolitan Museum for modern art exhibitions, drawing creative inspiration from the works of poet Ocean Vuong and painter Kerry James Marshall.
  travel: Matthew Lanier, a passionate traveler who prefers flexible, last‑minute planning and enjoys weekend getaways to historic Boston and Savannah as well as longer wine‑focused trips to Napa Valley
    and Bordeaux, balances their wanderlust with a modest travel budget and a desire to share experiences with their spouse.
  culinary: Matthew Lanier, an enthusiastic home chef who, together with their spouse, experiments with international dishes such as Spanish paella, Japanese ramen, and Mexican birria tacos—infusing balcony‑grown
    herbs like rosemary, thyme, and basil—and pairs each meal with boutique wines from producers like Domaine Serene and Château Margaux.
  core: Matthew Lanier, a curious yet worry‑prone literary scholar, channels their sociable energy into vibrant cultural pursuits and community teaching while juggling a relaxed approach to organization
    that sometimes leaves deadlines precariously balanced.
background:
  cultural: Matthew is a White American of Anglo‑Irish ancestry, raised in the diverse neighborhoods of Brooklyn and Queens during the 1960s and 1970s. His mother was an elementary school teacher and his
    father a carpenter, exposing him early to the value of both practical skills and education. Attending a Catholic school introduced him to classic European literature and philosophy, which later shaped
    his pursuit of an arts and humanities graduate degree. Living his adult life in New York City, he has absorbed the city's multicultural arts scene, embracing its blend of tradition and innovation. His
    cultural identity is marked by a respect for historical literary canons alongside a commitment to inclusive, community‑focused scholarship.
attributes:
  skills: '["Literary Criticism", "Curriculum Development", "Digital Humanities (text mining, TEI)", "Public Speaking", "Grant Writing", "Mentorship", "Committee Leadership", "Conflict Resolution", "Event
