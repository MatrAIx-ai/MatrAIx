persona_description: A legal scholar who is interested in the history and evolution of international humanitarian law, particularly the development of the Geneva Conventions and their commentary. They are
  knowledgeable about the history of the conflict between nations and the need for peace and prevention of armed conflicts. They are also interested in revising and clarifying the general laws and customs
  of war on land, particularly in light of the desire to serve humanity and the progressive needs of civilization. They have a deep understanding of the principles of the law of nations and the usages established
  among civilized peoples, as well as the dictates of the public conscience. They have been appointed as Plenipotentiaries by the High Contracting Parties to the International Committee of the Red Cross
  (ICRC) to draft a new Convention on the protection of the inhabitants and the belligerents in cases not covered by the current Regulations.
