personas:
  professional: Brandon Hackenberg is an aspiring junior game creator who translates his love for Minecraft architecture and Scratch animation into school coding club projects, applying his preference for
    structure while enjoying the flexibility of creative problem‑solving, and they occasionally misplace project files due to a relaxed approach to organization.
  sports: Brandon Hackenberg plays forward for the Rigby Middle School Wolves soccer team, trains with the local YMCA youth soccer club in the fall, enjoys weekend fishing trips along the Snake River and
    hikes in nearby state parks, cheers on the Idaho State Bengals football team, and they look forward to trying snowboarding at Sun Valley during winter break.
  arts: Brandon Hackenberg immerses in creative building by crafting elaborate Minecraft redstone contraptions, assembling LEGO bridge kits and wooden birdhouses, while listening to Imagine Dragons, Billie
    Eilish, and the Harry Potter soundtrack, and they often draw inspiration from YouTubers like Dream and Mumbo Jumbo for their own Scratch animated stories.
  travel: Brandon Hackenberg loves weekend getaways to Idaho’s Hells Canyon and annual camping at Bruneau Dunes State Park, dreams of exploring Yellowstone’s geysers and the Grand Canyon’s rim, and they
    hope to join a school‑organized trip to Washington, D.C.’s Smithsonian museums next summer.
  culinary: Brandon Hackenberg favors simple, hearty meals like grilled trout with lemon butter caught on a Saturday morning, campfire s’mores after a hike, and classic mac‑and‑cheese at home, and they
    can confidently follow a basic recipe for a peanut‑butter‑jelly sandwich but often forget to add the second slice of bread.
  core: Brandon Hackenberg blends a structured love for Minecraft engineering with spontaneous outdoor fishing and hiking, balancing meticulous DIY projects with occasional forgetfulness about schoolwork,
    and they constantly crave grilled trout after a day on the river.
background:
  cultural: Brandon grows up in a typical white, middle‑class family in Rigby, Idaho, where community values emphasize self‑reliance, outdoor recreation, and involvement in local events such as school fairs,
    Fourth of July celebrations, and church gatherings. The rural setting fosters a strong connection to nature and practical skills, while the small‑town school environment encourages teamwork and cooperative
    learning. His family traditions include weekend trips to nearby state parks, seasonal fishing outings, and participation in community volunteer projects.
attributes:
  skills: '[''Basic arithmetic'', ''Reading comprehension'', ''Strategic problem solving (Minecraft)'', ''Team coordination (soccer)'', ''Basic woodworking and model building'', ''Introductory coding (Scratch)'']'
  hobbies: '[''Minecraft building and redstone experiments'', ''Soccer practice and matches'', ''Fishing on the Snake River'', ''Hiking local trails'', ''Model kit construction (LEGO, wooden birdhouses)'',
    ''Creating animated stories in Scratch'']'
  career_goals: Brandon dreams of becoming an engineer, ideally a civil or environmental engineer who designs safe bridges, parks, and sustainable community projects. He is drawn to careers that blend practical,
    structured problem‑solving with tangible, real‑world impact. He also imagines one day coaching a youth soccer team, combining his love for teamwork, leadership, and community service. These ambitions
    reflect his desire for predictable outcomes, his cooperative nature, and his willingness to take assertive roles when opportunities arise.
