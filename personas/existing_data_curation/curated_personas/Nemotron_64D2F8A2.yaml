  hobbies: '[''surfing'', ''beach volleyball'', ''dance (bachata, reggaeton, hula)'', ''cooking (Spanish and Hawaiian cuisine)'', ''social media content creation'', ''volunteering for marine conservation'',
    ''hiking'', ''reading (marine biology, Spanish literature)'']'
  career_goals: Greta dreams of a career that lets her blend her love for people, the ocean, and digital storytelling. She hopes to study environmental communications or marine tourism, eventually working
    as a community‑based eco‑tour guide or a content creator who promotes sustainable beach culture. In the short term, she wants to intern with local conservation groups, volunteer for beach clean‑ups,
    and build a portfolio of travel‑and‑food videos that highlight both her Spanish heritage and Hawaiian surroundings. While she values flexibility and keeps her options open, she aims to make a positive
    impact on her community and the environment.
