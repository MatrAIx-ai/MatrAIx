personas:
  professional: Greta Claros is an aspiring environmental communicator who leverages bilingual fluency, a knack for short‑form video storytelling, and natural sociability to create engaging beach‑culture
    content, while their relaxed attitude toward planning leads them to improvise on the fly.
  sports: Greta Claros spends weekends surfing the waves at Waikiki and playing beach volleyball with friends, follows the Honolulu Seals basketball team and the Hawaiʻi Rainbow Warriors football program,
    and maintains a spontaneous fitness routine that blends impromptu beach workouts with occasional hikes up Diamond Head.
  arts: Greta Claros blends a love for dancing bachata to Romeo Santos, reggaeton hits by Bad Bunny, and traditional Hawaiian hula performed to Hoʻokena by Keali‘i Reichel, while curating Instagram reels
    inspired by cinematographer Emmanuel Lubezki and reading novels by contemporary Spanish authors like Carlos Ruiz Zafón.
  travel: Greta Claros prefers spontaneous, budget‑friendly road trips with friends, has explored the North Shore of Oʻahu and hiking trails on Maui, and dreams of backpacking through Costa Rica’s rainforests
    and the coastal towns of Valencia, Spain, while balancing limited pocket money with a desire for adventure.
  culinary: Greta Claros enjoys cooking quick paella with saffron, chorizo, and mussels and assembling poke bowls featuring ahi tuna, sushi‑grade rice, seaweed, and avocado, experimenting with bold flavor
    pairings yet often improvises when a recipe calls for precise measurements.
  core: Greta Claros is a sun‑kissed, bilingual teen who melds surf culture with digital storytelling, juggling spontaneous creativity with a chronic habit of misplacing their surfboard leash.
background:
  cultural: Greta comes from a Spanish‑Californian family that settled in Honolulu when she was a child. She grew up bilingual, speaking Spanish at home and English at school, and has been exposed to Hawaiian
    customs through school programs and community events. Her family celebrates traditional Spanish holidays like Día de los Reyes and adds local twists, such as incorporating tropical fruits into festive
    dishes. Greta participates in Lei Day festivities, learns basic Hawaiian phrases, and respects the island’s connection to the ocean. This blend of Mediterranean warmth and Polynesian respect for nature
    shapes her identity, giving her a unique perspective on community, food, and the environment.
attributes:
