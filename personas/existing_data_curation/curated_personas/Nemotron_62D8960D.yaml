personas:
  professional: Elisa Muhi is a seasoned human‑resources leader in Montana’s tourism sector, blending a decade of employee‑relations expertise with a deep love of art and nature to design wellness programs
    that include mindfulness hikes, watercolor‑inspired creativity workshops, and flexible policies that reflect the community‑first values of her frontier upbringing.
  sports: Elisa Muhi enjoys solitary hikes on Yellowstone’s trail network, participates in a local outdoor club that meets monthly for guided bird‑watching walks, follows the Montana Grizzlies football
    team and the Boise State Broncos for occasional game nights, and occasionally joins a weekend snowshoe group at Big Sky Resort.
  arts: Elisa Muhi spends evenings listening to Beethoven’s symphonies and the folk duo The Milk Carton Kids while watercolor‑painting Yellowstone’s geysers, regularly visits the Gardiner Art Gallery to
    study contemporary art books, and knits patterned scarves inspired by traditional Nordic motifs during quiet evenings.
  travel: Elisa Muhi prefers low‑key, nature‑focused travel, having explored the depths of Yellowstone, taken a road trip to Glacier National Park, and planning a future expedition to the Canadian Rockies,
    while she avoids crowded tourist hotspots in favor of secluded cabins and off‑beat café stops.
  culinary: Elisa Muhi delights in foraging wild mushrooms and preparing pan‑seared trout with fresh dill, enjoys baking crusty rye bread, savors a hearty elk stew on cold evenings, and regularly orders
    a lavender‑infused latte at the local café, though she sometimes forgets to refrigerate leftovers.
  core: Elisa Muhi is a detail‑oriented HR professional who finds balance through mountain hikes, watercolor art, and mindful budgeting, yet often worries about deadlines, embraces solitude, and occasionally
    misplaces paperwork.
background:
  cultural: Elisa comes from a white, American background typical of rural Western Montana. Her family’s roots trace back to German and Scandinavian immigrants who settled in the region in the early 20th
    century, bringing a tradition of craftsmanship, folk music and a deep respect for the natural environment. Raised in a small‑town setting, she internalized values of self‑reliance, community cooperation,
    and an appreciation for the outdoors. Local cultural celebrations, frontier resilience, and the modest, tight‑knit community of Gardiner shape her worldview, emphasizing harmony, modesty and a quiet,
    reflective lifestyle.
