  hobbies: '[''Hiking in Yellowstone & surrounding trails'', ''Landscape Photography'', ''Watercolor painting'', ''Reading contemporary art and philosophy'', ''Journaling/Creative Writing'', ''Birdwatching'',
    ''Mindfulness meditation'', ''Local History research'', ''Knitting'', ''Listening to classical and folk music'', ''Exploring small-town cafés for new culinary experiences'']'
  career_goals: Elisa aims to move into a senior HR leadership role—ideally as an HR manager or director for a regional tourism organization or non‑profit—where she can influence strategic workforce planning
    and employee wellbeing. She plans to earn an SHRM‑CP or PHR certification to formalize her expertise. A key ambition is to design a comprehensive wellness program that blends mindfulness, nature‑based
    activities, and creative expression to reduce stress among staff. Over the next five years she hopes to mentor younger HR professionals in rural Montana and possibly transition to part‑time consulting,
    helping small businesses implement flexible yet compliant HR practices while maintaining the personal, community‑focused culture she values.
