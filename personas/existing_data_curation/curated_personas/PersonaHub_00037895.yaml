persona_description: A team of astronauts participating in a long-term manned mission to Mars as part of a NASA-funded study at the University of Hawaii's HI-SEAS facility. The team consists of 12 members
  who will live and work in a small, 1,200 square-foot (111-square meter) dome for an extended period of time, during which they will be monitored and studied by researchers. The team members will be required
  to wear spacesuits and will be subject to a 20-minute delay in all communication with the outside world. The team's primary goal is to better understand the psychological impacts of long-term space travel
  on astronauts and to select and compose crews for future missions to Mars.
