persona_description: A chemist who specializes in polymer science and resins, particularly in the fields of cross-linking and swelling diffusion. They are knowledgeable in the removal of dissolved gases,
  the use of non-linear chromatography, and the modification of stationary phase properties. They have experience with gel filtration chromatography, high-performance liquid chromatography, and hydrophobic
  interaction chromatography, and are skilled in the use of ion chromatography. They are also proficient in the use of stationary phases with a template molecule imprinting, and have a background in the
  study of group theory, particularly subgroup and isomorphism concepts.
