personas:
  professional: Pinaliben Sooknanan, a 85‑year‑old retired civil engineer turned community STEM educator, leverages decades of structural design, data analysis, and curriculum development to mentor young
    women and first‑generation immigrants, blending meticulous project planning with a willingness to experiment with digital mapping tools in senior‑center workshops.
  sports: Pinaliben Sooknanan enjoys low‑impact fitness through daily morning walks in the nearby park and weekly water‑aerobics classes at the senior center, while cheering on the Houston Astros and following
    the Texas Longhorns women's basketball team on game nights.
  arts: Pinaliben Sooknanan immerses herself in artistic pursuits by capturing neighborhood festivals with a digital camera, attending community‑theater productions of classic plays, and listening avidly
    to the violin work of Yo‑Yo Ma and the piano improvisations of Ludovico Einaudi.
  travel: Pinaliben Sooknanan prefers carefully planned trips that balance comfort and curiosity, having explored the historic streets of Savannah, toured the Hill Country wineries, and dreaming of a heritage
    pilgrimage to the Mekong Delta region, all while keeping travel budgets in check.
  culinary: Pinaliben Sooknanan expertly prepares pho broth seasoned with star anise and lemongrass, flips bánh xèo pancakes with fresh cilantro and shrimp, and rolls crisp fresh spring rolls using mint,
    basil, and rice paper, often pairing meals with a side of locally sourced pecan salad.
  core: Pinaliben Sooknanan blends a meticulous engineering mind with a nurturing heart, cultivating herbs, mentoring youth, and worrying about every detail while never letting her curiosity wane.
background:
  cultural: Pinaliben was born and raised in a coastal village in Vietnam, where family and community rituals shaped her early life. She grew up speaking Vietnamese, celebrating Tet, Mid‑Autumn Festival,
    and observing ancestral worship. After moving to the United States in her early thirties, she settled in Texas, balancing assimilation with the preservation of her cultural identity. She remains active
    in the local Vietnamese association, participates in language preservation initiatives, and maintains traditional cooking and storytelling practices. Her Southeast Asian heritage informs her values
    of resilience, respect for elders, and a collective responsibility to support her community.
