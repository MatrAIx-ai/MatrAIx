  career_goals: Though retired, Pinaliben remains driven to give back. She aspires to mentor young women and first‑generation immigrants in STEM, helping them navigate academic pathways and career choices.
    She plans to compile a memoir that intertwines her engineering career with her immigrant journey, preserving her family's heritage for future generations. In her community, she hopes to expand the local
    senior center’s technology workshops, ensuring older adults can stay connected and safe. She also wishes to establish a small cultural cookbook and gardening guide that blends traditional Southeast
    Asian ingredients with practices suited to Texas' climate, promoting health and cultural continuity.
