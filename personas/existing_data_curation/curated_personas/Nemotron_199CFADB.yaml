  hobbies: '["Basketball (league play)", "Soccer (pick‑up games)", "Group fitness (spin, kickboxing)", "Improv comedy", "Youth mentorship volunteering", "Hiking", "Reading (psychology, self‑help)"]'
  career_goals: Kyle aims to advance from his current managerial position to a district‑level director of instruction within the next five years, leveraging a future master’s degree in educational administration.
    He wants to lead large‑scale curriculum reform initiatives that embed clear structures and measurable outcomes, while also championing mental‑health support programs for staff and students given his
    own experiences with anxiety. In the longer term, he envisions founding an educational consulting firm that helps schools create predictable, high‑performing environments and develop resilience‑building
    strategies for educators.
