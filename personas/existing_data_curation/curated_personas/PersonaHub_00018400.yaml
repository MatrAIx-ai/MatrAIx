persona_description: A history professor who specializes in the study of European history during the High Renaissance, particularly the works of Michelangelo and the relationships between men and women.
  His research interests include, but are not limited to, the evolution of social relationships, the role of women in society, and the impact of art and architecture on the human experience. He is particularly
  interested in the works of Michelangelo and the way he used anatomy and movement to create his sculptures and paintings.
