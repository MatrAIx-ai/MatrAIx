personas:
  professional: Tommy Prissert, a seasoned high‑school humanities teacher, blends their love of classic literature with data‑driven assessment, designing interdisciplinary curricula that align with state
    standards while flexibly adapting lessons on the fly, and leverages interactive whiteboards and Google Classroom to keep students engaged, all while their competitive, skeptical nature pushes them to
    constantly refine instructional methods.
  sports: Tommy Prissert jogs the Oak Lawn trail five mornings a week, plays pick‑up basketball at the community center during the winter, roots for the Chicago Bears in the fall, the Chicago Cubs in the
    spring, and the Chicago Fire during the soccer season, and belongs to the local running club that trains for the annual Chicago Marathon, balancing a competitive drive with a practical routine they
    maintain.
  arts: Tommy Prissert volunteers as a supporting actor in community theatre productions of classic plays, enjoys the works of Shakespeare and Arthur Miller, listens to Beethoven symphonies and folk songs
    reminiscent of their family's heritage, and regularly attends performances by the Chicago Symphony Orchestra featuring soloists like Yo‑Yo Ma, all of which satisfy their creative curiosity while their
    meticulous rehearsal habit reflects their organized side.
  travel: Tommy Prissert prefers well‑planned road trips that blend heritage exploration—such as a winter visit to Bavaria for family roots and a summer tour of Kraków’s historic districts—with occasional
    spontaneous weekend getaways to the Wisconsin Dells or a cultural pilgrimage to Washington, D.C., always budgeting carefully yet allowing room for unplanned detours that feed their curiosity.
  culinary: Tommy Prissert enjoys cooking hearty mid‑western meals, often preparing roasted pork with sauerkraut and potato dumplings for holiday gatherings, tossing garden‑fresh tomatoes and kale into
    homemade ratatouille, and baking rye bread using a sourdough starter, while their woodworking hobby gives them a steel‑handed appreciation for culinary tools and they occasionally indulge in fine dining
    at Chicago’s steakhouses to reward themselves after a tough grading week.
  core: Tommy Prissert is a detail‑oriented, curiosity‑driven educator who balances disciplined routine with flexible creativity, wrestles with chronic stress, and channels their competitive spirit into
    both the classroom and their personal pursuits.
background:
  cultural: Tommy grew up in a white, middle‑class family in the Chicago suburb of Oak Lawn. His grandparents emigrated from Germany and Poland, and family traditions include annual holidays centered on
    hearty home‑cooked meals and community gatherings at the local Catholic church. The Midwest’s emphasis on practicality, self‑reliance, and civic responsibility shaped his work ethic and his view of
    education as a cornerstone of community stability. Living in Cook County, he has been exposed to the region’s cultural diversity, which informs his inclusive teaching style while still valuing the modest,
    down‑to‑earth sensibilities of his own upbringing.
attributes:
  skills: '[''Curriculum development for humanities'', ''Differentiated instruction'', ''Classroom management'', ''Educational technology integration (Google Classroom, interactive whiteboards)'', ''Formative
