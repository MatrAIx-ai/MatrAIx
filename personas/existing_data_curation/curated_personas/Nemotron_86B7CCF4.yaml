    teachers'']'
  hobbies: '[''Chess (club and tournament play)'', ''Reading classic literature and historical biographies'', ''Community theater acting'', ''Woodworking and DIY furniture building'', ''Jogging (Oak Lawn
    Trail)'', ''Urban gardening (vegetable garden)'', ''Book club participation'', ''Volunteer tutoring at local library'']'
  career_goals: Tommy aims to transition into a school‑wide leadership role within the next five to seven years, targeting the position of assistant principal or director of curriculum. He plans to earn
    a master's degree in Educational Leadership to deepen his strategic planning capabilities. His ambition includes spearheading a district‑wide humanities initiative that emphasizes critical thinking
    and civic engagement, publishing several articles in educational journals on blending traditional texts with digital tools, and establishing a mentorship program that cultivates competitive yet collaborative
    teachers. He is also driven to improve student outcomes on standardized tests, as a measure of his own effectiveness, while managing his own stress through better work‑life balance.
