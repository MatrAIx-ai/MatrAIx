personas:
  professional: Jeremy Manning, a registered nurse renowned for his meticulous IV therapy and wound‑care expertise, channels his calm, methodical temperament and curiosity for emerging medical technologies
    into precise clinical documentation, evidence‑based patient safety initiatives, and mentorship of junior staff.
  sports: Jeremy Manning, an avid hiker and weekend fisherman, trains with the Bowling Green Outdoor Enthusiasts Club, follows the Western Kentucky Hilltoppers basketball team, plays pick‑up basketball
    at the local gym, and maintains fitness through trail runs and functional‑strength workouts designed to prevent back strain.
  arts: Jeremy Manning, a weekend acoustic‑guitar player, often covers folk classics by Bob Dylan and Joni Mitchell at local open‑mic nights, listens to popular‑science podcasts hosted by Neil deGrasse
    Tyson and Bill Bryson, and enjoys classic cinema featuring Tom Hanks and Meryl Streep.
  travel: Jeremy Manning, a meticulous planner, favors short nature‑focused road trips to nearby state parks like Mammoth Cave and the Red River Gorge, dreams of solo hiking the Appalachian Trail, and hopes
    to explore Edinburgh, Scotland, each journey carefully budgeted and booked well in advance.
  culinary: Jeremy Manning, a self‑taught home chef, blends Southern comfort dishes such as shrimp‑and‑grits, smoked pork belly, and collard greens with precise spice measurements, sources fresh catfish
    from local streams, and experiments with sous‑vide techniques to achieve perfect texture.
  core: Jeremy Manning, a methodical yet curious nurse who balances precise patient care with puzzle‑solving, outdoor pursuits, and Southern‑style culinary experiments, maintains an unusually calm demeanor
    while occasionally over‑planning every detail.
background:
  cultural: Jeremy grew up in a middle‑class, white family in Bowling Green, Kentucky, with roots in the American South. His heritage is a mix of Irish and German ancestry, and he was raised in a Baptist
    community that emphasized hospitality, hard work, and service to others. He attended local public schools, participated in church youth groups, and learned the values of modesty, reliability, and community
    involvement. While he respects traditional Southern customs, his curiosity and practical mindset also draw him toward progressive ideas in healthcare and personal development.
attributes:
  skills: '[''Patient Assessment'', ''Intravenous Therapy'', ''Wound Care'', ''Emergency Response'', ''Electronic Medical Records (EMR) Management'', ''Patient Education'', ''Team Coordination'', ''Evidence-Based
    Practice Implementation'', ''Time Management'', ''Clinical Documentation'']'
  hobbies: '[''Hiking'', ''Fishing'', ''Reading Medical Journals'', ''Playing Acoustic Guitar'', ''Cooking Southern Cuisine'', ''Volunteer at Community Health Fairs'', ''Puzzles (Crosswords, Sudoku)'',
    ''Documentary Watching'', ''Cooperative Video Gaming'']'
  career_goals: Jeremy aims to earn a Bachelor of Science in Nursing within the next two years and become a Certified Critical Care Registered Nurse (CCRN) shortly thereafter. He aspires to take on leadership
    roles such as charge nurse or unit manager, and eventually pursue a Nurse Practitioner degree with a focus on acute care. He is motivated to develop and implement patient safety initiatives, mentor
    new nurses, and contribute to community health outreach programs in Bowling Green.
