  career_goals: Vanessa aims to achieve tenure and subsequently serve as department chair, where she can shape the direction of the humanities program. She plans to develop a cross‑departmental initiative
    that links art history with digital media, fostering new modes of creative inquiry. Publishing a monograph on 20th‑century American art is a key scholarly ambition, as is securing a multi‑year grant
    to support a community arts partnership that brings local artists and students together. Long‑term, she hopes to mentor emerging scholars, expand the college’s public engagement through a seasonal lecture
    series, and leave a lasting impact on students’ critical thinking and creative confidence.
