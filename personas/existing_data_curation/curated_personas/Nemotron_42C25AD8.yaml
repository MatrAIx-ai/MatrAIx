  career_goals: Robert aims to graduate high school with solid grades, especially in social studies and health, and to earn a scholarship for college. In the short term, he plans to take on leadership roles
    in student council and continue volunteering at the local community center, aiming to gain certifications in first aid and CPR. His long‑term ambition is to pursue a degree in social work or education,
    with the goal of becoming a high school teacher or school counselor where he can combine his passion for helping others with his communication strengths. Ultimately, he envisions a stable career in
    the public sector, such as a community outreach coordinator or social worker, providing consistent support to individuals and families in his hometown.
