personas:
  professional: Robert Bennett, a 14‑year‑old volunteer tutor at the local community center, merges his love for routine and storytelling into a budding peer‑mentor role, using reliable organization and
    talkative charm to lead study sessions and coordinate art workshops for younger children.
  sports: Robert Bennett, the point guard for Eastside Middle School’s basketball team, follows a structured drill schedule inspired by the Chicago Bulls, idolizes LeBron James’s training regimen, and supplements
    his on‑court practice with weekend skate‑park sessions at the local recreation club to boost agility.
  arts: Robert Bennett, the drama club’s leading actor, channels his love for classic rock by humming Queen’s “Bohemian Rhapsody” during rehearsals, collects graphic novels by Stan Lee and Frank Miller,
    and frequently reenacts Shakespearean soliloquies while riffing on classic pop hits.
  travel: Robert Bennett dreams of swapping his routine school week for a road trip to the Grand Canyon and a weekend at Orlando’s theme parks, but currently saves his allowance for a family vacation to
    Washington, D.C., where he plans to tour the Smithsonian museums and snap photos of historic monuments.
  culinary: Robert Bennett enjoys preparing simple yet crowd‑pleasing dishes like pepperoni pizza, buttery garlic pasta with fresh basil, and classic American pancakes, often experimenting with mozzarella
    and tomato for homemade Margherita slices, and proudly showcases his culinary flair during weekend brunches for friends.
  core: Robert Bennett is a routine‑loving, talkative teen who balances basketball, drama, and model‑car tinkering with journaling, occasional late‑night snack binges, and a worry‑prone mind that fuels
    both his compassion and his stress.
background:
  cultural: Robert comes from a middle‑class white New England family with deep roots in Worcester, Massachusetts. His ancestry includes Irish immigrants who settled in the region in the early 1900s, and
    his family maintains a modest cultural heritage that includes celebrating St. Patrick's Day and enjoying Irish folk music during family gatherings. Raised in a Catholic parish, he attended weekly mass
    and participated in parish‑organized service projects, fostering a strong sense of community and responsibility. The local Worcester culture—emphasizing hard work, practical problem‑solving, community
    involvement, and a love for regional sports and seasonal celebrations—has shaped his values and outlook.
