  hobbies: '["Watercolor painting", "Cooking traditional Guatemalan cuisine", "Visiting art galleries and museums", "Attending cultural festivals", "Volunteer storytelling at senior centers", "Playing chess",
    "Gardening", "Participating in community art workshops"]'
  career_goals: Even at 70, Axel aims to expand his independent delivery service to specialize in transporting artisanal goods for local makers, providing reliable logistics that highlight cultural products.
    He plans to develop a small consulting practice offering logistics training to community nonprofits and senior citizen groups. Over the next five years, he wishes to establish a scholarship fund for
    Guatemalan-American youth interested in transportation careers, while continuing to share his love of art through occasional speaking engagements at local museums and cultural festivals.
