personas:
  professional: Axel Vera, a veteran long‑haul truck driver and logistics consultant, they combine meticulous route‑planning expertise, hazardous‑materials certification, and a talkative, mentorship‑focused
    demeanor that turns each delivery into an opportunity to nurture relationships with local artisans and junior drivers while laying groundwork for a specialized artisanal‑goods transport service.
  sports: Axel Vera, an active senior who favors low‑impact exercise, they jog the coastal trail in Marin each spring, join a weekly senior softball league with the Marin County Mariners, and follow the
    San Francisco Giants and Golden State Warriors with spirited enthusiasm.
  arts: Axel Vera, a dedicated watercolorist and community cultural enthusiast, they spend weekends painting mountain ranges and Pacific cliffs, regularly visit the de Young Museum to study works by Frida
    Kahlo and Ansel Adams, and volunteer as a storyteller at the San Rafael senior center, weaving art and narrative into community life.
  travel: Axel Vera, a methodical road‑trip planner with a taste for cultural immersion, they have explored the culinary markets of Oaxaca, toured the historic villages of Cinque Terre, and envision a guided
    Andean journey to source authentic textiles for their upcoming logistics venture.
  culinary: Axel Vera, a seasoned home chef, they specialize in traditional pepian, tamales de elote, and enchiladas verdes—seasoned with fresh cilantro, ancho chilies, and roasted cumin—while also mastering
    a California‑style grilled salmon drizzled with lemon‑herb butter.
  core: Axel Vera balances decades of logistics precision with a vibrant curiosity for art, food, and community, turning every route, brushstroke, and story into a bridge that celebrates shared culture.
background:
  cultural: Axel was born in Guatemala and grew up immersed in the rich tapestry of Mayan traditions, Spanish colonial influences, and vibrant local festivals. He migrated to the United States in his early
    twenties, carrying with him the warmth of family gatherings, the rhythms of marimba music, and a deep respect for communal harmony. In Marin County, he blends his heritage with the multicultural environment,
    celebrating Día de los Muertos, sharing Guatemalan recipes, and speaking both Spanish and English fluently. His lifelong appreciation for art reflects the colorful textiles and folk art of his youth,
    and he actively promotes Guatemalan culture through community events and mentorship.
attributes:
  skills: '["Commercial Driving (CDL with endorsements)", "Route planning and GPS navigation", "Vehicle maintenance and safety inspection", "Customer service and sales negotiation", "Spanish-English bilingual
