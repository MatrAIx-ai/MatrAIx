    "Reading about social justice and art"]'
  career_goals: Felix aims to complete his GED within the next year and enroll in a community college program focused on social work or community development. He aspires to become a youth mentor or community
    organizer, using his artistic talents and compassionate nature to create safe, creative spaces for at‑risk teens in Penitas. Long‑term, he dreams of establishing a nonprofit arts center that offers
    workshops, counseling, and cultural programming, while also continuing his own growth as a visual artist.
