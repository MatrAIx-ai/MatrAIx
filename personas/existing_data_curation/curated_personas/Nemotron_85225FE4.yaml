personas:
  professional: Felix Mata, an aspiring community development student, blends basic computer literacy, bilingual communication, and a knack for organizing grassroots events to create inclusive art‑based
    programs for at‑risk teens, reflecting their compassionate, cooperative nature and knack for balancing structure with flexibility.
  sports: Felix Mata, a devoted fan of the Houston Dynamo and a regular participant in Penitas Youth Soccer Club pick‑up games, stays active by playing informal soccer on weekends, follows MLS season closely,
    and mixes occasional basketball at the local gym into their routine, balancing competitive enthusiasm with a laid‑back approach to fitness.
  arts: Felix Mata, a sketch‑loving visual storyteller who devotes free hours to capturing street life, draws inspiration from Frida Kahlo’s emotive color palettes, Banksy’s street‑art rebellion, and the
    acoustic melodies of Jimi Hendrix, integrating these influences into their own guitar playing and community art displays.
  travel: Felix Mata prefers low‑cost road trips and weekend getaways, having explored the vibrant murals of Austin, the historic River Walk in San Antonio, and dreaming of a cultural immersion in Oaxaca’s
    markets, all while meticulously budgeting travel expenses around a part‑time income.
  culinary: Felix Mata, a self‑taught home cook, especially enjoys perfecting mole poblano with ancho chilies and chocolate, rolling soft corn‑based tamales stuffed with pork and coriander, and often experiments
    with fresh avocado and lime to create vibrant salsas, while sharing these meals at community gatherings.
  core: Felix Mata is a compassionate, bilingual teen who channels curiosity and artistic flair into community work, balancing disciplined study with spontaneous creativity, occasional impulsive spending
    on art supplies, and a habit of late‑night sketching after soccer matches.
background:
  cultural: Felix is a first‑generation Mexican‑American raised in Penitas, Texas, a tight‑knit border community where Spanish and English intermingle. His family maintains strong ties to Mexican traditions,
    celebrating holidays such as Día de los Muertos, quinceañeras, and Las Posadas, while also embracing Tex‑Mex cultural elements like barbecues and local music. Catholic values and close‑family bonds
    shape his worldview, and he regularly attends community gatherings at the local church and the annual Hidalgo County Fair. This bicultural upbringing informs his identity, artistic expression, and desire
    to give back to his community.
