personas:
  professional: Xavier Blue is an aspiring junior engineer who channels their love for LEGO and rule‑based puzzles into designing intricate builds, and their practical, organized nature makes them a reliable
    team member in school science club projects.
  sports: Xavier Blue enjoys weekend bike rides on the bayou trail, plays on the Baton Rouge Junior Soccer Club in the spring, and follows the New Orleans Saints and Pelicans for inspiration, while preferring
    low‑key, structured practice sessions over large, noisy gym classes.
  arts: Xavier Blue brings their imagination to life by sketching comic‑style panels inspired by Stan Lee’s heroes, recreating scenes from Adventure Time, and building LEGO dioramas while humming the catchy
    tunes of Disney’s "Let It Go" from Frozen.
  travel: Xavier Blue prefers short, well‑planned excursions like weekend trips to the Atchafalaya National Wildlife Refuge and a family visit to Walt Disney World, while dreaming of an adventure to the
    Grand Canyon’s rim during a school break.
  culinary: Xavier Blue loves the creamy comfort of homemade mac and cheese sprinkled with fresh peas from the garden, enjoys crafting peanut‑butter‑jelly sandwiches with ripe strawberries, and can reliably
    follow a simple pizza‑making recipe that layers mozzarella, tomato sauce, and basil.
  core: Xavier Blue is a detail‑obsessed LEGO builder who meticulously plans each piece, worries about unfinished projects, hoards stray bricks, and occasionally forgets to put away their puzzle pieces,
    turning their quiet determination into both strength and a charming mess.
background:
  cultural: Xavier grows up in Church Point, Louisiana, a town celebrated for its Cajun heritage and strong Catholic roots. Though his family identifies as white, the community’s language, food, and festivals
    reflect a blend of Southern and French‑Canadian traditions. He attends a local church where weekly services, community potlucks, and events like the annual Courge Festival are central to his social
    life. Family meals often feature gumbo, jambalaya, and boudin, and he hears Zydeco music at family gatherings. The emphasis on hospitality, respect for elders, and cooperation shapes his values, while
    the rural surroundings foster an appreciation for nature, fishing, and small‑scale farming. This cultural backdrop reinforces his desire for order, community harmony, and practical contributions to
    his hometown.
