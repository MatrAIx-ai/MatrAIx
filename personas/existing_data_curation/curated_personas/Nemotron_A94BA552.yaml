  career_goals: He dreams of one day becoming someone who helps others, such as a teacher, a community health worker, or a veterinarian. He is drawn to careers that provide clear structure, allow him to
    care for animals or people, and contribute to the well‑being of his small town. He imagines working in a school where he can keep classrooms organized and support classmates who feel stressed, or in
    a clinic where he can comfort patients and ensure they follow treatment plans. He hopes to stay close to his family and community while making a positive, dependable impact.
