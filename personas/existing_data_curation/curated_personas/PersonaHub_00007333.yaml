persona_description: A geologist who specializes in the study of sedimentary rocks, particularly the formation and fossilization of ancient forests and trees. His research interests include, but are not
  limited to, the mechanisms by which ancient forests and trees were transported, buried, and fossilized, and the unique mechanisms by which marine and land creature fossils can be found in the same location
  and strata. He has conducted extensive fieldwork in locations such as the Puyango Petrified Forest and the central mountains of Ecuador, where he has found evidence of ancient forests and trees, as well
  as marine and land creature fossils. He is also interested in the Canopy Theory and the mathematical model of excessive heat accumulation in the pre-flood world.
