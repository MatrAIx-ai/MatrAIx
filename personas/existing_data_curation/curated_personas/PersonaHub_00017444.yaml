persona_description: A veterinarian with expertise in the treatment of noninflammatory alopecic disorders affecting the pinna in dogs and cats, particularly Miniature Poodles, Siamese cats, Dachshunds,
  Chihuahuas, Italian Greyhounds, Whippets, and cats. The veterinarian has extensive knowledge of periodic pinnal alopecia, pattern baldness, and alopecia associated with melanoderma, and has reported anecdotal
  success with pentoxifylline, melatonin, and topical minoxidil in treating these conditions. The veterinarian is well-versed in the treatment of alopecia associated with melanoderma in Yorkshire Terriers
  and Doberman Pinchers, and has reported that the condition tends to worsen with age and is not typically self-resolving.
