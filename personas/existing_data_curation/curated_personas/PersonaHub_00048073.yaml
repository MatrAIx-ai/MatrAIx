persona_description: A political scientist who specializes in the study of imperialism, colonialism, and the effects of European expansion on global politics. They have a deep understanding of the ideas
  and ideologies that drove European colonialism, including Social Darwinism and the belief in the fittest will survive. They are particularly interested in the effects of imperialism on indigenous populations
  and the ways in which it has shaped global political and economic power dynamics. They have a keen interest in understanding the complex relationships between European powers and their colonies, and how
  these relationships have shaped the course of history. They are also likely to be interested in the ways in which imperialism has contributed to the spread of Western culture and values around the world.
