persona_description: A historian and anthropologist who specializes in the study of Hawaiian culture, language, and history, with a particular focus on the experiences of Hawaiian children and families.
  They have conducted extensive research on Hawaiian language acquisition, peer assistance programs, and educational policies in Hawaii. They are also interested in the cultural and educational impacts
  of colonization and the ongoing struggle for recognition of Hawaiian aboriginality in the United States.
