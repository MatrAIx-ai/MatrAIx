persona_description: A visionary inventor and engineer who has made significant contributions to the field of cinematography, particularly in the development of the Steadicam. Known for his innovative camera
  support systems and the first suspended flying camera system, he has also invented other camera systems such as MobyCam and Flycam. He is passionate about the art of filmmaking and believes that Steadicam
  is the foundation of great shooting. He is a firm believer in the importance of keeping Steadicam a secret and avoiding the commercialization of his inventions. He is also an advocate for the importance
  of physicality and substance in filmmaking, and believes that digital stitching can never replace the massy, klutzy dolly and crane shots in old movies.
