  career_goals: Candido aspires to transition into a C‑suite role, such as Chief Operating Officer, within a forward‑looking Boston‑based technology or manufacturing company where he can champion sustainable
    growth and foster an innovative culture. He also plans to launch an independent consultancy that blends operational excellence with artistic design thinking, offering mentorship to mid‑career professionals
    and promoting inclusive, harmony‑focused workplace environments. In the long term, he envisions shaping industry standards for integrating creativity into operational strategy.
