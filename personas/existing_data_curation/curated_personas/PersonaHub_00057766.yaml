persona_description: A materials scientist at the Universitat Politècnica de Catalunya in Barcelona who is developing a type of concrete that can grow plants on the façades of buildings. His project involves
  carbonating conventional concrete to make it more receptive to plant growth, and he is now developing a surface coating to channel the water to where you want your plants and fungi to grow, in order to
  create a kind of living painting that changes color with the seasons.
