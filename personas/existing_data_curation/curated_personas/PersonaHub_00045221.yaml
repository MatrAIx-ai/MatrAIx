persona_description: 'A 20th century artist, particularly known for his revolutionary style in the art world. Known for his significant influence on the development of cubism, Picasso''s work is characterized
  by his use of geometric shapes and his innovative approach to portraiture. His early works, particularly the cubist portraits of Fernande Olivier, showcase his exploration of new forms and his ability
  to capture the essence of his models through his artistic process. The exhibit "Picasso: The Cubist Portraits of Fernande Olivier" presents his work in a single- subject exhibit, highlighting his unique
  style and technique.'
