    Rican dishes for neighbors", "Attending weekly Catholic mass", "Reading local newspaper and political commentary", "Volunteering to train new restaurant staff"]'
  career_goals: Roberto’s primary goal is to secure a stable income that will sustain his modest retirement savings and cover health‑related expenses. In the near future he hopes to transition to a lighter,
    part‑time schedule that reduces physical strain while still allowing him to stay connected to his workplace community. He dreams of eventually opening a small kiosk at the local marketplace where he
    can sell traditional Puerto Rican snacks he enjoys preparing, such as alcapurrias and empanadillas, combining his culinary passion with his cultural roots. Additionally, he wishes to mentor younger
    waitstaff, imparting the disciplined work habits and practical problem‑solving skills he has honed over decades.
