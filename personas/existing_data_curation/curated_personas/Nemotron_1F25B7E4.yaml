  hobbies: '[''Chess'', ''Go (Weiqi)'', ''Sudoku puzzles'', ''Logic brainteasers'', ''Model kit building (scale trains, Gundam)'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Cooking Chinese cuisine'',
    ''Cycling around Brooklyn'', ''Productivity meetups'', ''Tech community volunteering'']'
  career_goals: Yuchun aims to translate his methodical skill set into a full-time role in IT support or technical project coordination within a Brooklyn-based small business or nonprofit. In the next 12
    months, he plans to earn the CompTIA Network+ certification and complete a part-time bachelor's program in Information Technology, which will broaden his qualifications for roles such as Systems Administrator
    or Junior Project Manager. His longer-term ambition is to launch a boutique IT consultancy that offers structured, reliability-focused services—such as network setup, hardware maintenance, and workflow
    automation—to local entrepreneurs. Throughout this journey, he targets incremental milestones, including leading a small team on a community tech-education project, achieving PMP certification, and
    eventually attaining a senior managerial position that leverages his competitive drive and critical thinking.
