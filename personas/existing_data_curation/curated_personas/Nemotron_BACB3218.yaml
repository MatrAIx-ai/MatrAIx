personas:
  professional: Arul Patel, a veteran business manager and operational efficiency specialist, leverages two decades of corporate and entrepreneurial experience, advanced Excel and SQL analytics, and a methodical,
    risk-aware approach to provide structured, pro-bono consulting for start-ups and non-profits while mentoring emerging entrepreneurs.
  sports: Arul Patel follows the Indian Premier League with fervor, holds a season ticket for the Atlanta Braves, participates in a neighborhood cricket league on weekends, and incorporates daily lawn walks
    into their fitness routine as a practical extension of gardening.
  arts: Arul Patel enjoys listening to Ravi Shankar’s sitar performances, attends Bollywood cinema premieres featuring actors like Ranveer Singh, and occasionally attends the Atlanta Symphony Orchestra’s
    concerts, finding that these artistic experiences complement their structured lifestyle.
  travel: Arul Patel prefers well-planned, culturally immersive trips such as a pilgrimage to Tirupati, a culinary tour of Kerala’s spice markets, and a recent family vacation to New Zealand’s lakes, while
    always budgeting travel expenses and balancing time constraints of temple duties.
  culinary: Arul Patel demonstrates advanced cooking skills, regularly preparing traditional dishes like chicken biryani, masala dosa, and aloo gobi using staple ingredients such as turmeric, cumin, and
    mustard seeds, and often experiments with fusion twists like avocado raita for family gatherings.
  core: Arul Patel blends a routine-driven, methodical mindset with a deep commitment to cultural heritage, applying disciplined planning to business consulting, gardening, and finances while occasionally
    indulging in spontaneous culinary experiments.
background:
  cultural: 'Arul is a first‑generation Indian American with a mixed Gujarati‑Tamil heritage: his father hails from the Patel community of Gujarat while his mother comes from Tamil Nadu. Raised in a household
    that blended North‑Indian and South‑Indian Hindu customs, he observes festivals such as Navratri, Diwali, Pongal, and Ganesh Chaturthi. The family placed great importance on education, hard work, and
    community service, values that continue to shape his life in Atlanta’s vibrant DeKalb County South Asian community.'
