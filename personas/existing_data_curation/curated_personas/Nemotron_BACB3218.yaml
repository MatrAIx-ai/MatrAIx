  career_goals: Although currently not in the formal workforce, Arul aims to leverage his business acumen by providing pro‑bono consulting to local start‑ups and non‑profits, focusing on financial sustainability
    and operational best practices. He aspires to mentor younger entrepreneurs, especially within the South Asian community, and to serve on the board of a cultural organization in Atlanta. He also plans
    to complete a Certified Financial Planner (CFP) credential to formalize his expertise and ensure a stable legacy for his family.
