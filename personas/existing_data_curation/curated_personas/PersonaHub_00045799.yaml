persona_description: A large-scale pilot project to test the feasibility and effectiveness of using unlicensed, low-frequency bands in the radio-frequency spectrum (TV white space) to bring wireless service
  to underserved rural areas. The pilot is being conducted by the Gigabit Libraries Network (GLN), which has accepted proposals from library systems in six states, including Colorado, Mississippi, Illinois,
  California, New Hampshire, and Kansas. The pilot aims to assess Super Wi-Fi's ability to help bridge the digital divide by providing free wireless service to libraries and other publicly accessible places.
  The project is significant in demonstrating how combining Wi-Fi compatibility with the far-reaching signals of the TV white spaces can deliver free wireless service.
