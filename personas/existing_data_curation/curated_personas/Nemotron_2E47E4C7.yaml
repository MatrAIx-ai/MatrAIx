  hobbies: '[''Acrylic Painting'', ''Digital Illustration'', ''Travel Photography'', ''Soccer (local league)'', ''Pickup Basketball'', ''Strategic Board Games (Dungeons & Dragons, Settlers of Catan)'',
    ''Reading Science Fiction and Philosophy'', ''Writing Travel Blog Posts'', ''Mindfulness Meditation'', ''Improv Workshops'']'
  career_goals: Robert aims to earn his certified dispatcher qualification within the next year and move into a logistics supervisor position, overseeing a small fleet of trucks. He plans to pursue an associate’s
    degree in Transportation Management to deepen his understanding of supply‑chain operations. Long‑term, he dreams of launching his own boutique delivery service that combines eco‑friendly transportation
    with custom, artist‑designed packaging, merging his practical driving expertise with his creative passions. He also hopes to expand his personal art brand, selling prints and digital designs online,
    and eventually transition to a role that blends logistics strategy with creative marketing.
