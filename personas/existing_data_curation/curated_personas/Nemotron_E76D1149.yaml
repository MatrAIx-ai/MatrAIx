personas:
  professional: A seven-year-old budding engineer named Juan Fernandez loves assembling LEGO sets with methodical precision, applies the same step-by-step logic to Minecraft Education challenges, and dreams
    of designing soccer fields, all while balancing spontaneous playtime with a surprisingly organized notebook of ideas, and they often sketch out plans during quiet moments.
  sports: A soccer-loving seven-year-old named Juan Fernandez dominates the local park games with friends, cheers for the Phoenix Rising FC on TV, proudly wears a kid’s jersey of the Arizona Diamondbacks
    during baseball season, and they occasionally join a community youth soccer club after school, balancing weekly drills with spontaneous desert trail hikes.
  arts: A creative seven-year-old named Juan Fernandez spends afternoons drawing comic strips inspired by the bold panels of Alex Ross and the adventurous spirit of Stan Lee, while listening to marimba
    melodies by the group Los Rumbos, and they often recite passages from adventure books by Jules Verne in both languages during family story time.
  travel: An adventurous seven-year-old named Juan Fernandez has explored the nearby Sonoran Desert trails and a weekend excursion to the Grand Canyon, dreams of wandering the ancient ruins of Machu Picchu
    someday, and they prefer short, family-planned trips over spontaneous long journeys because their schedule thrives on routine.
  culinary: A kitchen-enthusiast seven-year-old named Juan Fernandez helps their mother fold masa into tamales, stir creamy atole flavored with cinnamon and vanilla, and they proudly master the art of rolling
    cinnamon-sprinkled churro dough, yet they often sneak extra chocolate chips into the batter when no one watches.
  core: Juan Fernandez, a seven-year-old who balances a love for structured LEGO builds with spontaneous desert adventures, always keeps a pocketful of change for LEGO, forgets sunscreen, and can switch
    from sketching superheroes to scoring the winning goal in a blink.
background:
  cultural: Juan is a first‑generation Guatemalan‑American raised in a bilingual household in Las Vegas. Spanish is spoken at home, and he celebrates Guatemalan traditions such as Día de la Independencia
    on September 15, family gatherings featuring dishes like tamales, pepian, and atole, and listening to marimba music. His grandparents share stories of Guatemala's highlands, instilling pride in his
    heritage. While attending a public elementary school that offers Spanish support, Juan experiences the multicultural environment of Las Vegas, yet maintains strong ties to his Guatemalan roots through
    language, food, and community festivals.
