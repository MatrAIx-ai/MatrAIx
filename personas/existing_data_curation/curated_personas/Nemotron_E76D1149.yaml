  career_goals: Juan dreams of designing big bridges and skyscrapers one day, inspired by his love of LEGO, and imagines playing on a professional soccer team someday. He also enjoys helping classmates
    understand new ideas and sometimes says he might become a teacher. His ambitions blend a desire for a stable, creative career that lets him build, collaborate, and make a positive impact on others.
