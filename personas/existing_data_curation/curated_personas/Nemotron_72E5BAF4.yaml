personas:
  professional: Sara Mincey is a middle‑school science teacher who designs project‑based lessons that blend Arduino‑driven experiments with real‑world problem solving, using their calm, resilient demeanor
    to mediate classroom dynamics, their sociable energy to foster collaborative learning, and a flexible, sometimes disorganized planning approach that values practicality as much as curiosity.
  sports: Sara Mincey enjoys weekly hikes along the Maumee River with their husband and friends, practices yoga three times a week to stay flexible, follows the Toledo Mud Hens baseball team and the Ohio
    State Buckeyes football program, and occasionally joins the local “Toledo Trailblazers” running club for weekend 5K runs, reflecting their energetic, sociable, and practical approach to fitness.
  arts: Sara Mincey engages in creative expression through volunteering at the Toledo Children’s Museum science demos, attending performances by the Toledo Symphony Orchestra, listening to indie folk artist
    Phoebe Bridgers and folk‑rock band Mumford & Sons, and discussing popular‑science books like “Sapiens” in a book club, weaving their curiosity, sociability, and calm disposition into a rich artistic
    life.
  travel: Sara Mincey prefers flexible, spontaneous road trips that blend weekend hikes in Indiana Dunes, cultural stops at Chicago’s Museum of Science and Industry, and occasional visits to family in Detroit,
    while dreaming of a longer‑term adventure to Kyoto’s science museums, illustrating their love of experiential learning, sociable outings, and relaxed planning.
  culinary: Sara Mincey loves cooking Midwestern comfort meals such as chicken pot pie with a miso‑infused crust or pork tenderloin glazed with apple cider and sumac, experimenting with seasonal corn, Lake
    Erie perch, and rosemary while occasionally using an Arduino‑controlled sous‑vide setup, reflecting their curiosity, communal spirit, and occasional disorganized pantry that leads to surprise flavor
    pairings.
  core: Sara Mincey is a calm, sociable STEM educator who blends hands‑on curiosity with practical flexibility, often juggling spontaneous hikes, maker‑fair projects, and experimental cooking while occasionally
    forgetting appointments.
background:
  cultural: Sara grew up in a small town in northwestern Ohio, steeped in Midwestern values of community, modesty, and practicality. Her white, American heritage includes a strong emphasis on family cohesion
    and participation in local traditions such as county fairs, high‑school sports events, and church gatherings. The industrial legacy of the Toledo region has shaped her appreciation for hands‑on, applied
    learning, while the surrounding lakes and farmland foster a love for outdoors activities. These cultural roots blend with a progressive outlook, encouraging her to balance respect for established methods
    with curiosity for new educational ideas.
attributes:
  skills: '["STEM curriculum design", "Project‑based learning implementation", "Classroom technology integration", "Differentiated instruction", "Collaborative group facilitation", "Science lab safety management",
    "Student mentorship and counseling", "Parent‑teacher communication", "Conflict resolution", "Formative and summative assessment"]'
  hobbies: '["Hiking and nature walks", "Maker‑fair volunteering", "Arduino and DIY electronics projects", "Book club (science & history)", "Cooking experimental family meals", "Yoga", "Volunteer science
    demonstrations at local museum", "Community gardening"]'
  career_goals: Sara aims to move into a district‑wide STEM coordination role where she can shape curriculum across multiple schools and expand hands‑on learning opportunities. She plans to earn a Master’s
    in Educational Leadership within the next three years, positioning herself for future school‑wide leadership positions such as principal. Additionally, she hopes to launch a community robotics outreach
    program that partners with local manufacturers in Toledo, providing after‑school workshops for middle‑school students. Continual professional growth in emerging educational technologies and inclusive
    pedagogies remains a central ambition.
