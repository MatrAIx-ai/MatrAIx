personas:
  professional: Debra Jordan is a retired office administrator turned community archivist who leverages meticulous budgeting, systematic genealogical research, and a disciplined quilting mindset to coordinate
    senior centre workshops, mentor younger relatives, and champion senior advocacy, while they maintain a healthy dose of skeptical vigilance and a competitive drive to see projects completed on schedule.
  sports: Debra Jordan follows the Milwaukee Brewers in spring and the Milwaukee Bucks during winter, participates in a neighborhood senior walking club that meets twice weekly, enjoys gentle yoga classes
    at the community center, and they occasionally join a local senior softball league, balancing their love of low‑impact exercise with a competitive spirit for staying active.
  arts: Debra Jordan expresses their artistic side through quilting inspired by the patterns of Faith Ringgold, sings Gospel hymns in the church choir alongside renditions of Mahalia Jackson, listens avidly
    to B.B. King and Aretha Franklin, and they spend leisure time reading novels by James Baldwin, all of which shape a quiet yet richly textured cultural life.
  travel: Debra Jordan prefers low‑key, culturally immersive trips—they have taken a nostalgic weekend to New Orleans to savor live jazz, spent a reflective week exploring the Mississippi Delta's historical
    markers, enjoy frequent day trips to nearby Door County for its serene landscapes, and they dream of a future pilgrimage to the historic Charleston district, all planned with meticulous budgeting and
    senior travel discounts.
  culinary: Debra Jordan, an avid home cook of moderate skill, delights in preparing soul‑food staples such as slow‑cooked collard greens seasoned with smoked ham hocks, sweet potato pie spiced with cinnamon
    and nutmeg, and cornbread made with stone‑ground cornmeal, while they frequently harvest tomatoes, basil, and kale from their own vegetable garden to incorporate into fresh salads and hearty stews.
  core: Debra Jordan is a diligent, garden‑toting archivist whose relentless pursuit of order coexists with a tendency to over‑worry, a competitive streak that fuels quilting marathons, and they have an
    occasional habit of hoarding vintage fabric swatches despite limited closet space.
background:
  cultural: Debra was born and raised in Milwaukee’s historic Bronzeville neighborhood, growing up in a Black family whose roots trace back to the Great Migration from the Southern United States. Her parents
    were active members of the local Baptist church and community organizers who instilled a strong sense of duty, resilience, and pride in African American heritage. She came of age during the civil rights
    era, which fostered a cautious skepticism toward institutions while reinforcing her competitive drive to excel in personal endeavors. Milwaukee’s rich blues and jazz scene, together with family traditions
    of soul food cooking, storytelling, and church fellowship, have shaped her cultural identity. She maintains these traditions through quilting projects for church, preserving oral histories, and participating
    in community celebrations that honor the city's Black legacy.
