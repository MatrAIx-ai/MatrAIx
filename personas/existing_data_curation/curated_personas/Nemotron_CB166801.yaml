    ]'
  career_goals: Even in retirement, Debra is driven to compile a comprehensive family memoir that preserves the stories of her ancestors and the local Black community in Milwaukee, with the ambition of
    publishing it through the senior center’s small press. She aspires to mentor younger relatives and community members interested in genealogy, offering informal workshops at the Milwaukee Public Library.
    Furthermore, she hopes to apply her organizational talent by serving on the council of a local seniors' advocacy group to improve program planning and resource allocation, while also developing personal
    coping strategies to manage her worry and stress.
