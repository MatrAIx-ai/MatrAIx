personas:
  professional: Sean Davis blends a solid grounding in molecular biology with a knack for turning raw data into visual stories, using Python, SQL, and Tableau to build dashboards for local nonprofits while
    charming coworkers with impromptu music breaks and a relaxed, sometimes chaotic, planning style.
  sports: Sean Davis dominates the neighborhood park’s pickup basketball court, roots for the South Carolina Gamecocks basketball team and the Charlotte Hornets, and they hike the boardwalks of Congaree
    National Park every other weekend to stay fit.
  arts: Sean Davis spins vinyl at friends’ gatherings, citing Kendrick Lamar, J‑Cole, and H.E.R. as inspirations, and never misses the annual Columbia Hip‑Hop Festival where they network, perform, and soak
    up fresh beats.
  travel: Sean Davis prefers spontaneous road trips, having driven the Blue Ridge Parkway to Asheville and sampled the culinary scene of New Orleans, while they dream of an inexpensive backpacking adventure
    through the vibrant street markets of Mexico City.
  culinary: Sean Davis whips up classic Southern soul‑food like fried chicken, collard greens seasoned with smoked paprika, and shrimp‑and‑grits, treating each dish as a lab experiment with precise seasoning
    ratios and always pairing meals with a splash of hot sauce.
  core: Sean Davis is a talkative data‑driven optimist who turns every code bug, basketball game, and kitchen mishap into a collaborative learning moment, even if they sometimes misplace their keys.
background:
  cultural: Growing up in Columbia’s historically African‑American neighborhoods, Sean was shaped by a blend of Southern hospitality and the resilient spirit of the Black community. Family gatherings centered
    around soulful cuisine, storytelling, and music—from gospel hymns in the local Baptist church to the rhythmic beats of hip‑hop—instilled a strong sense of identity and community responsibility. He’s
    deeply aware of the civil‑rights legacy in South Carolina, which fuels his commitment to education and social uplift. While embracing contemporary urban culture, he also honors traditions such as Juneteenth
    celebrations and the communal values taught by his elders, reflecting a nuanced African‑American Southern heritage that informs his worldview and interactions.
