    and coding meetups'', ''STEM mentorship at a community center'', ''Multiplayer online gaming'', ''Reading science‑fiction novels'', ''Hiking in Congaree National Park'']'
  career_goals: Sean aims to transition from his current period of unemployment into a role where his analytical capabilities and people‑centric approach can thrive. In the short term, he is targeting entry‑level
    data analyst or junior software developer positions that offer flexible schedules and a collaborative culture, while pursuing certifications in cloud platforms (AWS) and advanced data‑science tools.
    Long‑term, he envisions leading data‑driven community initiatives or launching a tech‑for‑social‑impact startup that leverages his STEM background to address local challenges in education and economic
    equity. He is also committed to continual learning and hopes to mentor younger students from his neighborhood, bridging his career growth with community uplift.
