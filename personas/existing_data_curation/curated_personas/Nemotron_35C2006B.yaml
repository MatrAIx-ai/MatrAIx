    Hispanic cultural festivals'', ''Solving puzzles (crosswords, Sudoku)'']'
  career_goals: Approaching retirement, Luisa aims to transition into a senior administrative leadership role, such as Office Manager or Executive Coordinator for a local nonprofit or community college,
    where she can apply her systematic expertise to larger organizational challenges. She plans to earn the Certified Administrative Professional (CAP) credential to formalize her skill set and to mentor
    younger staff, establishing a structured onboarding program that reflects her high standards. Luisa also intends to develop a digital filing and workflow system that will be adopted department‑wide,
    improving efficiency for the organization. After stepping back from full‑time work, she hopes to volunteer as a board secretary for Hispanic cultural groups in the Rock Island area, offering pro‑bono
    administrative support and sharing her knowledge with emerging community leaders.
