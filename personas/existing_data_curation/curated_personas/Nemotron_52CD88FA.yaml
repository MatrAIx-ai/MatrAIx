personas:
  professional: Reynaldo Azcona, a one-year-old with a budding fascination for arranging wooden blocks, already exhibits the analytical mindset of a future architect, methodically planning miniature structures
    while their innate curiosity drives them to experiment with unconventional shapes.
  sports: Reynaldo Azcona attends a toddler gymnastics class at the neighborhood community center, cheers quietly for the local baseball team, the City Bats, during family outings, and loves splashing in
    the kiddie pool during the summer season to stay active.
  arts: Reynaldo Azcona loves finger-painting guided by the vibrant palettes of Henri Matisse, smiles at the lullaby Baby performed by Beyonce, and eagerly watches Studio Ghibli's animated classic My Neighbor
    Totoro, which together shape a nascent appreciation for color, rhythm, and narrative.
  travel: Reynaldo Azcona's travel log includes weekend stroller-friendly hikes in Rocky Mountain National Park, a family beach getaway to Santa Monica's gentle shoreline, and a future wish to cruise the
    canal-lined streets of Amsterdam aboard a baby-safe boat tour.
  culinary: Reynaldo Azcona prefers soft pureed carrots, creamy mashed sweet potatoes, and tiny bites of avocado toast cut into squares, delights in the sweet aroma of simmering mango puree, yet can only
    manage feeding themselves with a small ergonomic spoon.
  core: Reynaldo Azcona, a quietly curious one-year-old, builds meticulous block towers while humming forgotten lullabies, only to giggle and scatter the pieces the moment a new texture catches their eye.
background:
  cultural: Reynaldo is raised in a bilingual Guatemalan household in Norwalk, California. At home, Spanish is spoken and traditional Guatemalan songs, stories, and celebrations (such as Día de los Muertos
    and Guatemalan Independence Day) are part of his daily life. He is exposed to Guatemalan cuisine, textiles, and folklore, which enrich his cultural identity while he also engages with the multicultural
    environment of Southern California.
