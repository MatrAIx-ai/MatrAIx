    entry and documentation'']'
  hobbies: '[''Basketball (league and pick‑up games)'', ''Live‑music events (jazz, R&B, hip‑hop)'', ''Community health‑fair volunteering'', ''DIY home improvement and organization'', ''Health‑tech podcasts'',
    ''Reading biographies of Black leaders'', ''Trivia nights'', ''Cooking soul food for friends and family'']'
  career_goals: Jerry aims to transition from a frontline support role into a supervisory and leadership position within the hospital’s patient services department. Over the next five years, he plans to
    earn a bachelor’s degree in health administration while obtaining certifications in healthcare management and quality improvement. He aspires to become a patient care services manager, leading a multidisciplinary
    team to optimize patient flow, implement evidence‑based practice, and drive performance metrics. He also hopes to launch a community health outreach initiative in Portsmouth that leverages his practical
    curiosity for new health‑tech solutions to improve chronic disease management among underserved residents. His ambition is to be recognized as a top performer who elevates standards of care while mentoring
    the next generation of support staff.
