personas:
  professional: Jerry Kelly is a Certified Nursing Assistant and patient care technician who excels at streamlining hospital operations, from mastering Epic and Cerner to redesigning staff schedules, applying
    a data‑driven, meticulous approach while mentoring newcomers, all driven by a competitive desire to lead the patient services department within five years.
  sports: Jerry Kelly dominates the local basketball league with the Portsmouth Hoops, participates in pick‑up games at the city recreation center, roots for the Boston Celtics and follows the New England
    Patriots for football, while also joining a seasonal adult softball league every summer, reflecting a competitive spirit and love for team sports.
  arts: Jerry Kelly is a regular at the Harbor Jazz Club, where they soak in live performances by artists like Kamasi Washington, Kendrick Lamar, and Lalah Hathaway, attend R&B shows at the downtown lounge,
    and spend evenings at trivia nights reciting facts from biographies of social‑justice pioneers, blending musical passion with intellectual curiosity.
  travel: Jerry Kelly prefers well‑planned road trips that combine culture and cuisine, having already toured New Orleans for its jazz heritage, visited Charleston for historic tours, and taken a weekend
    getaway to the Maine coast for lobster feasts, while dreaming of a future trip to Austin to explore its tech startup scene and vibrant music festivals.
  culinary: Jerry Kelly enjoys cooking Southern‑inspired seafood, regularly preparing New England clam chowder with fresh clams, potatoes, and thyme, as well as spicy shrimp jambalaya with okra and cayenne,
    and they relish the occasional barbecue of pulled pork using a dry rub of paprika, brown sugar, and garlic.
  core: Jerry Kelly blends razor‑sharp organization, competitive drive, and community spirit, juggling hospital workflow upgrades, basketball victories, concert nights, and DIY home projects while never
    missing a chance to mentor a teammate or snag a new tech gadget.
background:
  cultural: Jerry grew up in Portsmouth’s historically Black neighborhoods, where church, family gatherings, and community solidarity shaped his identity. He was raised on a diet of gospel music, soul food,
    and stories of the civil‑rights movement in Virginia, instilling a deep sense of pride in his heritage. The city’s naval presence exposed him to a diverse, disciplined environment, reinforcing his appreciation
    for structure and teamwork. He maintains strong ties to the local Black church, participating in choir and outreach programs, and he celebrates cultural traditions such as Juneteenth gatherings and
    annual family cook‑outs. His background informs his commitment to uplifting underserved populations and mentoring young people within his community.
attributes:
  skills: '[''Certified Nursing Assistant (CNA)'', ''Patient Care Technician'', ''Vital signs monitoring'', ''Infection control'', ''Emergency response'', ''Medical supply inventory management'', ''Staff
