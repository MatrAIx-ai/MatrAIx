  career_goals: Greville aims to enroll in a community-college electrical technology program and secure an apprenticeship with a local contractor. Over the next three years he plans to earn a journeyman
    electrician license and certifications in residential wiring and solar-panel installation. His long-term ambition is to open his own small electrical-services business in Baldwyn, providing reliable,
    affordable services to his community while also completing a business-management certificate to support his entrepreneurial goals.
