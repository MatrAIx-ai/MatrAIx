personas:
  professional: David Boroughs, a 21‑year‑old actor who balances stage and on‑camera work, leverages strong script analysis, dialect coaching, and stage combat skills while organizing auditions, directing
    a quarterly short‑film series, and actively pursuing an agent to transition into independent film and streaming roles.
  sports: David Boroughs jogs the Indianapolis Cultural Trail three times a week, joins a local pick‑up basketball league that includes Indianapolis Colts fans during the fall, follows the Pacers, Colts,
    and Indiana Fever with a blend of casual loyalty and analytical interest, and participates in seasonal community 5K runs.
  arts: David Boroughs spends evenings strumming acoustic guitar inspired by Nick Drake, captures urban architecture and street scenes in the Canal district with a vintage 35mm camera, draws creative fuel
    from modernist playwrights like Samuel Beckett and contemporary musicians such as Sufjan Stevens, and mentors youth theater workshops to nurture emerging talent.
  travel: David Boroughs favors short, budget‑friendly road trips—such as a weekend music‑filled escape to Nashville and a spring theater‑centric visit to Chicago—while keeping a long‑term dream of a summer
    festival tour across Europe, especially the Edinburgh Fringe, on his travel wish list.
  culinary: David Boroughs enjoys quick yet flavorful meals like avocado toast with poached eggs, chicken piccata with capers, and vegetarian tacos topped with mango salsa, pairs them with cold‑brew coffee,
    and often explores local food‑truck tacos and craft beer selections on weekends.
  core: David Boroughs balances relentless creative curiosity with practical organization, turning late‑night rehearsals into disciplined routines while indulging in a coffee‑driven, slightly chaotic lifestyle.
background:
  cultural: David grew up in a middle‑class family in Indianapolis with deep Midwestern roots. His ancestry is primarily German and Irish, and his family has long emphasized community involvement, modesty,
    and a strong work ethic. The cultural fabric of the city—its vibrant theater scene, diverse neighborhoods, and emphasis on practicality—has shaped his outlook. While he identifies as white American,
    he values the multicultural influences of the local arts community, integrating these perspectives into his performances and personal philosophy.
attributes:
  skills: '["Acting (stage and film)", "Improvisation", "Script analysis", "Voice training and dialect work", "Stage combat", "Movement and choreography", "Public speaking", "Workshop facilitation", "Project
    management for productions", "Basic filmmaking"]'
  hobbies: '["Reading classic and contemporary literature", "Attending live music and theater performances", "Playing acoustic guitar", "Participating in improv comedy sessions", "Yoga and running", "Urban
    photography", "Traveling to historic sites", "Cooking new cuisines", "Mentoring youth in community theater"]'
  career_goals: David aims to secure an agent within the next twelve months and transition from regional theater to supporting roles in independent films and streaming series. He plans to build a diverse
    portfolio that showcases his range, from contemporary drama to period pieces, while also developing a personal brand through social media and a quarterly short‑film series he writes and directs with
    fellow actors. In the longer term, he envisions directing a community theater production and eventually pursuing a lead role on a major network series, balancing artistic fulfillment with a sustainable
    and practical career path.
