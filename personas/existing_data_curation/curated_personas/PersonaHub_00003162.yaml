persona_description: A pediatrician who is passionate about obesity prevention and treatment in children and adolescents, and has a strong interest in research and training in this field. They are dedicated
  to improving the health and well-being of children and adolescents, and are committed to providing evidence-based interventions to prevent and treat obesity. They are aware of the major consequences of
  childhood obesity on health and well-being, and are willing to give a high priority to research on obesity in children and adolescents, as well as to public and private funding agencies. They are also
  aware of the need for further training of pediatricians and other health care workers, as well as for improving awareness and competence among parents, teachers, and the general public.
