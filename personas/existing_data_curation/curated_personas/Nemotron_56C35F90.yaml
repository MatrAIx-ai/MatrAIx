personas:
  professional: Johnny Habersham, a seasoned telecommunications line installer and repair technician with expertise in fiber‑optic splicing, copper cabling, and network troubleshooting, blends meticulous
    blueprint reading and OSHA‑compliant safety with a calm, collaborative demeanor that makes them a reliable field leader and aspiring BICSI specialist.
  sports: Johnny Habersham, an avid pickup basketball player at the neighborhood park and a devout supporter of the Oklahoma City Thunder, also spends early mornings fishing for bass at Lake Hefner and
    joins a local gym for strength training, which they pursue as a seasonal mix of team sports, individual recreation, and a commitment to staying active.
  arts: Johnny Habersham, a dedicated choir member at their church, finds inspiration in classic R&B legends like Marvin Gaye and Aretha Franklin, contemporary hip‑hop artists such as Kendrick Lamar, and
    gospel choirs, often attending the annual Oklahoma City Cultural Festival to celebrate local musical heritage and art, which they consider a vital part of their identity.
  travel: Johnny Habersham, who prefers planned road trips over spontaneous flights, enjoys weekend getaways to Memphis for its blues scene, annual family reunions in Louisiana's bayou region, and seasonal
    fishing lodges on the Texas coast, while dreaming of a future cultural tour of Nashville's songwriting landmarks, which they view as both relaxation and enrichment.
  culinary: Johnny Habersham, a home‑cooking enthusiast, regularly crafts southern comfort dishes like fried chicken, collard greens, cornbread, and shrimp étouffée, experimenting with smoked paprika, hot
    sauce, and fresh herbs to add a modern twist to family favorites, and they delight in sharing meals at church potlucks.
  core: Johnny Habersham is a structure‑loving, community‑driven technician who balances meticulous work with a lively social life, yet battles frequent worry that fuels both their dedication and occasional
    over‑commitment.
background:
  cultural: Johnny is an African‑American man rooted in the vibrant Black community of Oklahoma City. His family traces its lineage to the Great Migration and the historic Tulsa Black Wall Street area,
    fostering a deep sense of resilience and pride. The church plays a central role in his life, shaping his values of cooperation, kindness, and service to others. Cultural traditions such as family gatherings,
    soul food cooking, and the celebration of African‑American music and art are integral to his identity. Johnny also engages with local initiatives that honor Black history in Oklahoma, mentoring youths
    and participating in cultural festivals that highlight the contributions of Black Oklahomans to the state’s social fabric.
attributes:
  skills: '[''Fiber‑optic splicing'', ''Copper cabling installation'', ''Network troubleshooting'', ''Blueprint and schematic reading'', ''OSHA safety compliance'', ''Hand and power tool proficiency'',
