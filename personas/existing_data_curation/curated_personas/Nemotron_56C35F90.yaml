  hobbies: '[''Pickup basketball'', ''Church choir singing'', ''Community event organization'', ''Cooking southern comfort food'', ''Fishing at Lake Hefner'', ''Model car kit building'', ''Home improvement
    projects'', ''Listening to R&B, gospel, and hip‑hop'', ''Online multiplayer gaming'']'
  career_goals: Johnny aims to become a certified BICSI specialist and earn a Level 2 fiber‑optic technician credential within the next two years. He aspires to move into a supervisory role where he can
    lead a team of line installers, mentor new hires, and streamline field operations for greater efficiency. Long‑term, he envisions launching his own small telecom contracting business to provide stable,
    well‑paid jobs for his community. He also hopes to develop a local apprenticeship program that introduces youth to STEM fields and trades, reinforcing his commitment to family, community stability,
    and economic empowerment.
