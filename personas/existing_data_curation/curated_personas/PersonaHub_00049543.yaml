persona_description: A person interested in economic comparisons between countries using the principles of Purchasing Power Parity (PPP) and interested in understanding the factors influencing the relative
  economic size of countries. This person is likely to be a statistician, economist, or a researcher who is familiar with the methodology of comparing countries' GDP per capita using PPPs and is interested
  in exploring the differences in economic performance between high-income and low-income countries. This person may have a background in econometrics or statistics and may have experience using data on
  GDP, exchange rates, and price levels to make comparative economic analyses.
