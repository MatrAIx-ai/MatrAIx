personas:
  professional: Judee Roman, a 17‑year‑old high‑school junior, channels their empathy and digital savviness into volunteer work at the local animal shelter while drafting simple social‑media posts and coordinating
    adoption events, setting the stage for a future veterinary assistant certification and part‑time youth peer counselor role.
  sports: Judee Roman enjoys walking dogs at the shelter as low‑impact cardio, supports the hometown Wildcats high‑school basketball team, and participates in the community’s youth soccer league during
    spring, while they occasionally join weekend ice‑skating sessions at the local rink.
  arts: Judee Roman finds creative release in sketching neighborhood scenes and listening to the music of Billie Eilish and the storytelling of author Sarah J. Mason, while they attend a youth‑group drama
    club that stages performances of classic Broadway tunes like ‘Memory’ from Cats.
  travel: Judee Roman dreams of visiting the San Diego Zoo Safari Park to study animal care, has taken weekend trips to the nearby state park for hiking and sketching, and they plan a summer road‑trip to
    Portland to explore its indie bookshops and vegan café scene, all within a family‑budget framework.
  culinary: Judee Roman’s kitchen experiments range from nutrient‑dense quinoa‑black‑bean salads with avocado and lime dressing to baking vanilla‑cocoa cupcakes topped with homemade buttercream, showcasing
    a moderate cooking skill set that balances healthy meals for their siblings with occasional indulgent treats.
  core: Judee Roman is a conscientious teen who balances a love for animals, anxiety‑driven mindfulness, and a penchant for sketching, often juggling cupcake‑baking side‑hustles and meticulous budgeting
    despite occasional stress‑induced procrastination, and they keep a notebook of coping strategies for anxious moments.
background:
  cultural: 'Judee was raised in Norcross, GA, a suburban community on the edge of Atlanta that blends traditional Southern values with a growing, diverse metro culture. Her family’s heritage reflects the
    small‑town white Southern tradition of hospitality, strong church involvement, and a practical work ethic rooted in self‑reliance. Growing up, she learned to value community service, respect for elders,
    and a polite, courteous demeanor. At the same time, the multicultural environment of Gwinnett County exposed her to a range of cultures and perspectives, encouraging openness and adaptability. These
    influences shape her identity: she balances a respect for familiar customs with a curiosity about new ideas and people.'
