  hobbies: '[''Journaling'', ''Sketching'', ''Listening to mental‑health and animal‑welfare podcasts'', ''Volunteering at a local animal shelter'', ''Cooking and baking'', ''Church youth group activities'',
    ''Book club (young‑adult fiction)'', ''Mindfulness meditation'']'
  career_goals: Judee aims to earn her GED within the next year and then pursue a certification program to become a veterinary assistant, combining her love for animals with a stable, hands‑on career. She
    also wants to explore courses in mental‑health support so she can eventually work part‑time as a youth peer counselor, using her personal experience with anxiety to help other teenagers find coping
    strategies. Her long‑term ambition is to build a career that blends practical service with continual learning, allowing her to support her community while satisfying her curiosity about animal care
    and emotional wellbeing.
