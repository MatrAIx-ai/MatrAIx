  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Hiking along Lake Huron'', ''Nature photography'', ''Volunteering at local senior center'', ''Reading philosophy and science'',
    ''Playing acoustic guitar at open‑mic nights'', ''DIY home‑improvement projects'', ''Participating in community discussion groups'']'
  career_goals: Clayton aims to transition from a front‑line janitorial role to a supervisory or facilities‑manager position within the next five years. He plans to obtain certifications in green cleaning
    and occupational health and safety, and to lead a team that implements sustainable, low‑impact cleaning practices throughout public and private buildings in Cheboygan County. His long‑term ambition
    is to start his own small cleaning business that emphasizes community service, employing local youth and providing free or discounted services to senior centers and non‑profits. Throughout his career
    progression, he hopes to integrate his love for art by curating inviting and aesthetically pleasing communal spaces, such as lobby displays or community‑center galleries, that promote harmony and well‑being.
