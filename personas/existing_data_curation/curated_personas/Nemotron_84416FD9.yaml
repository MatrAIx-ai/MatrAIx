  career_goals: Though retired from formal employment, David aims to continue contributing his expertise to the Chehalis community. He hopes to mentor emerging entrepreneurs through a local small‑business
    incubator, serve on the board of a regional nonprofit focused on arts and cultural heritage, and develop a mentorship program that connects retirees with youth interested in business and civic engagement.
    He also looks forward to occasional consulting for family‑run enterprises that value his balanced approach to organization and flexibility.
