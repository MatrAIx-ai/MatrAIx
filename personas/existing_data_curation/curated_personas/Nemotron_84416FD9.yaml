personas:
  professional: David Gedney is a retired small‑business manager who leverages decades of strategic planning, budgeting, and volunteer coordination to mentor emerging entrepreneurs at a local incubator,
    serve on the board of a regional arts nonprofit, and design mentorship programs that bridge retirees and youth, blending meticulous organization with a flexible, community‑first mindset.
  sports: David Gedney is an avid outdoor enthusiast who spends spring mornings hiking the Cascades with the Chehalis Senior Hiking Club, casts trout in the Cowlitz River during autumn, supports the Seattle
    Seahawks and Seattle Sounders as a faithful fan, and joins a weekly pickleball league at the local senior center to keep his joints limber.
  arts: David Gedney is a watercolor hobbyist who admires Monet’s pastel palettes, captures everyday scenes with a Nikon DSLR echoing Ansel Adams’ contrast, volunteers as backstage crew for the Chehalis
    Community Theater’s productions of ‘Our Town’ and ‘The Music Man,’ and fills evenings with classic jazz from Miles Davis and folk tunes by Joni Mitchell.
  travel: David Gedney is a methodical traveler who prefers to plan trips around off‑peak seasons, enjoys leisurely road trips to Oregon’s Columbia River Gorge and weekend stays at historic B&Bs in the
    Willamette Valley, has toured the art museums of Paris and the gardens of Kyoto, and now dreams of a guided river cruise through the Norwegian fjords.
  culinary: David Gedney is a confident home cook who blends garden‑fresh vegetables into dishes like ratatouille with heirloom tomatoes, zucchini, and basil, seasons grilled salmon with dill and lemon,
    and treats himself to a slice of raspberry cheesecake topped with fresh mint after a community potluck.
  core: David Gedney is a curiosity‑driven retiree whose habit of pausing to photograph every street corner often leaves him misplacing his glasses, yet his generous spirit and relentless quest for community
    connection keep the Chehalis arts scene vibrant.
background:
  cultural: David grew up in a middle‑class family in the Pacific Northwest, with German‑Irish ancestry on his mother’s side and Portuguese roots on his father’s side, which is reflected in his middle name,
    Fernando. Raised in a community that values self‑reliance, environmental appreciation, and civic participation, he was encouraged to explore both practical skills and artistic interests. His upbringing
    combined traditional American values of hard work and community service with a subtle appreciation of multicultural heritage, shaping his inclusive outlook and ongoing commitment to local cultural initiatives.
