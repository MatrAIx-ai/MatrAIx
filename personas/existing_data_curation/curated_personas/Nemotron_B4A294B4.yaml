  career_goals: Alejandro dreams of turning his love for art and technology into a career that lets him create worlds for others. He envisions becoming a comic‑book illustrator or a video‑game concept artist,
    where he can blend storytelling with visual design. He is also intrigued by animation and hopes to one day produce short animated films that explore whimsical ideas while promoting kindness and empathy.
    His long‑term ambition includes using his creative skills to develop inclusive, imaginative content that can help children cope with stress and celebrate cultural diversity.
