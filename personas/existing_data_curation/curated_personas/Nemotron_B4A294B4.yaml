personas:
  professional: Alejandro Cao, an aspiring comic creator, merges sketching, LEGO city design, and Scratch programming to prototype fantastical story worlds, channeling boundless imagination while casually
    juggling schoolwork and often postponing deadlines in favor of creative spontaneity.
  sports: Alejandro Cao, a playful member of the Queens Knights Soccer Club, enjoys weekend pick‑up basketball games while cheering for the New York Yankees, preferring spontaneous park scrimmages over
    regimented training and using sports as a fun outlet to release creative energy.
  arts: Alejandro Cao, a budding visual storyteller, devours graphic novels from creators like Stan Lee and Alex Ross, tunes into cumbia beats alongside video‑game soundtracks by Koji Kondo, and idolizes
    animated films by Hayao Miyazaki, letting these influences shape his imaginative comic panels and LEGO narratives.
  travel: Alejandro Cao, who loves exploring Queens parks such as Flushing Meadows and dreaming of a magical trip to Tokyo’s anime districts, favors spontaneous day‑trips over meticulously planned vacations,
    yet saves a portion of his allowance for the future adventure to Disney World.
  culinary: Alejandro Cao, an enthusiastic junior chef, helps whisk together golden arepas and cheesy empanadas with family, while also mastering the art of perfect pizza slices topped with pepperoni and
    mozzarella, and often experiments with adding mango salsa to his snacks for a burst of sweet‑spicy flavor.
  core: Alejandro Cao, a ten‑year‑old imagination powerhouse, balances whimsical LEGO city‑building and comic storytelling with occasional worry‑filled overthinking, kind cooperation, and a habit of leaving
    school projects unfinished in favor of spontaneous creative bursts.
background:
  cultural: Alejandro is a first‑generation Colombian‑American growing up in Queens Village, a multicultural mosaic of New York City. At home, Spanish is spoken alongside English, and his family maintains
    Colombian traditions—celebrating holidays such as Carnaval de Barranquilla, sharing stories about Colombian folklore like El Dorado, and cooking foods like arepas, empanadas, and buñuelos. He participates
    in a bilingual after‑school program that reinforces his heritage while exposing him to the diverse cultures of his neighborhood. The blend of Colombian music, dance, and community festivals with the
    vibrant, multicultural energy of Queens shapes his worldview, fostering both a deep appreciation for his roots and an openness to new ideas.
