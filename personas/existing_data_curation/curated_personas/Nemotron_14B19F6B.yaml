  hobbies: '[''Drawing and coloring'', ''Watercolor painting'', ''Lego building (vehicles and animals)'', ''Collecting rocks and leaves'', ''Bird-watching'', ''Jigsaw puzzle solving'', ''Educational tablet
    games'', ''Listening to music while drawing'', ''Attending community art fairs'', ''Reading picture books about space and nature'']'
  career_goals: Roman dreams of growing into a curious explorer who blends art and science. He often talks about becoming an astronaut who can sketch the planets he visits, a wildlife biologist who studies
    the birds of the Sangre de Cristo Mountains, or a museum curator who designs interactive exhibits for his town. He is eager to develop the kind of methodical thinking that will let him invent simple
    devices that protect the environment, and he aspires to use his artistic talents to communicate scientific ideas. Though he is only six, his ambition is already shaped by a desire to learn continuously,
    help others in his community, and turn his curiosity into purposeful projects.
