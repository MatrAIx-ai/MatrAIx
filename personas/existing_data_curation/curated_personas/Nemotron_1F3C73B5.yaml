personas:
  professional: Eliza Poutre, a 51‑year‑old seasoned teaching assistant, leverages her calm resilience, practical structure, and competitive drive to streamline classroom logistics, integrate educational
    technology, and mentor new aides as she pursues a lead instructional coordinator role.
  sports: Eliza Poutre competes in the Beaver County Softball Rockets league each spring, cheering on the Pittsburgh Steelers and Pirates as hometown favorites, they supplement the competitive schedule
    with Tuesday night yoga and weekend bike rides to maintain overall fitness.
  arts: Eliza Poutre stars and manages backstage for the local Beaver County Playhouse, where they relish bringing classics by Shakespeare to life and draw inspiration from performers like Lin‑Manuel Miranda
    and Meryl Streep to hone their own craft.
  travel: Eliza Poutre plans trips that blend cultural immersion with leisure, having visited the Edinburgh Festival Fringe and the Kyoto Gion Matsuri, they favor flexible itineraries that allow spontaneous
    cooking workshops and community art tours, while budgeting carefully to accommodate family commitments.
  culinary: Eliza Poutre delights in preparing Asian‑inspired dishes such as lemongrass‑infused tofu stir‑fry and turmeric‑spiced vegetable rice, using fresh herbs like cilantro, mint, and Thai basil harvested
    from their backyard garden, and they experiment with family recipes that meld east‑Asian aromatics and South‑Asian spices.
  core: Eliza Poutre balances a steady, calm demeanor with a competitive edge, channeling sociable energy into community theater, softball, and creative cooking, while their occasional disorganization and
    relaxed attitude toward deadlines reveal a quirky, adaptable spirit.
background:
  cultural: Eliza identifies as Asian‑American with a mixed heritage that includes Chinese and Indian roots. Her family maintains traditions such as celebrating Lunar New Year and Diwali, while also embracing
    American customs, creating a hybrid cultural lens through which she views the world. Growing up in a bicultural household in the United States, she developed fluency in Mandarin and a basic understanding
    of Hindi, which informs her sensitivity to multicultural dynamics in the classroom. She often incorporates elements of her heritage—like sharing stories, music, and cuisine—into her teaching and community
    activities, fostering an inclusive atmosphere for students from diverse backgrounds.
attributes:
