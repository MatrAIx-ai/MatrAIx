  hobbies: '[''Community Volunteering'', ''Local Theater Participation'', ''Recreational Softball League'', ''Cooking Asian Cuisine'', ''Gardening'', ''Traveling to Cultural Festivals'', ''Reading Historical
    Fiction'', ''Trivia Nights'', ''Chess'', ''Yoga'']'
  career_goals: Eliza aims to advance from teaching assistant to a lead instructional coordinator within the next five years, leveraging her experience to design inclusive curricula and mentor new aides.
    She is pursuing a part-time master's in education administration to qualify for a certified teaching position, with a particular interest in STEM outreach programs for underrepresented students in Beaver
    County. Additionally, she hopes to spearhead community-based adult learning workshops that blend practical skills with cultural enrichment, positioning herself as a recognized advocate for lifelong
    learning in her region.
