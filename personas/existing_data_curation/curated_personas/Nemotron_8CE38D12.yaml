  career_goals: Elizabeth aims to progress to a lead engineering role within the next three years, where she can shape architecture decisions and mentor a small, collaborative team. She is also pursuing
    a bachelor's degree in computer science to deepen her theoretical understanding. A long-term ambition is to launch a consultancy that helps local Arkansas small businesses modernise their digital presence,
    with a focus on accessible and secure solutions. Additionally, she hopes to become a speaker at regional meet-ups that promote inclusive tech practices and to contribute to open-source projects that
    improve accessibility.
