personas:
  professional: Elizabeth Sonye, a 37‑year‑old full‑stack web developer, they blend a curiosity for emerging tech with a pragmatic, methodical mindset, delivering clean Python, JavaScript, and C# code while
    championing accessibility standards and quietly mentoring junior teammates in Agile sprints.
  sports: Elizabeth Sonye, an avid hiker with the Ozark Foothills Trail Club, they enjoy weekend treks in the Ozarks, support the Arkansas Razorbacks basketball team and the St. Louis Cardinals, and complete
    weekly yoga sessions to counterbalance sedentary coding days.
  arts: Elizabeth Sonye, who relaxes with classic novels by Jane Austen, modern sci‑fi from William Gibson, and playlists ranging from Bonnie Raitt’s blues to Ludovico Einaudi’s piano, they often curate
    a personal photo gallery of native flora, and attend occasional performances at the Little Rock Musical Theatre.
  travel: Elizabeth Sonye, who plans trips in her bullet journal, they favor low‑key escapes like a sunrise hike in Great Smoky Mountains, a culinary weekend in Savannah, Georgia, and a literary pilgrimage
    to Edinburgh, Scotland, balancing a modest travel budget with a yearning for quiet discovery.
  culinary: Elizabeth Sonye, a moderate home‑chef inspired by Southern cuisine, they regularly prepare shrimp and grits with heirloom tomatoes, smoked paprika‑spiced catfish, and pecan pie, relish experimenting
    with fresh garden herbs, and host intimate dinner gatherings where bourbon‑infused desserts become the highlight.
  core: Elizabeth Sonye, a quietly curious software engineer, they balance a love of order with spontaneous culinary experiments, but sometimes over‑plan their schedule, leaving little room for spontaneous
    social outings.
background:
  cultural: Elizabeth grew up in a close-knit community in southeast Arkansas, where Southern hospitality, modesty, and a strong work ethic are core values. Her family's roots trace back to midwestern European
    immigrants who settled in the region during the early 20th century, instilling respect for tradition and community service. While she embraces the region's love of outdoor recreation and home-cooked
    meals, her professional life has exposed her to the broader, diverse tech culture, shaping an inclusive outlook that blends local humility with global collaboration.
