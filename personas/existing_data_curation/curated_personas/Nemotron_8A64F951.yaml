  hobbies: '[''Watching Steelers football'', ''Attending Pirates baseball games'', ''Pickup basketball'', ''Hiking in Frick Park'', ''Amateur radio hobby'', ''Drone piloting'', ''Trivia nights'', ''Board
    game meetups'', ''Volunteering for community emergency preparedness'']'
  career_goals: Joshua aims to advance into a supervisory role within the dispatch center, eventually becoming a trainer who mentors new dispatchers and implements best‑practice protocols. He plans to earn
    his GED and pursue certifications in emergency management and public‑safety communications, with a long‑term goal of moving into a public safety communications manager position or a regional emergency
    management coordinator role. Throughout his career progression, he intends to blend his curiosity for emerging technologies with practical improvements that enhance response efficiency and team performance.
