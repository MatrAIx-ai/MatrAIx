persona_description: A Rwandan community health worker who has been serving her community for over 12 years. She is a respected figure in her community, known for her dedication and commitment to providing
  basic health services, conducting antenatal check-ups, diagnosing and treating malaria, diarrhoea, and pneumonia, and referring complex cases to health posts, clinics, and hospitals. She is also a community
  leader and is responsible for conducting monthly health updates from her community to her supervisor. She is a strong advocate for community-based health care and is passionate about improving the health
  outcomes of her community.
