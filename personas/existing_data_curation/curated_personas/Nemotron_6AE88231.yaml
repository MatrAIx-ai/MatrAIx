  career_goals: Katia aims to advance to a senior patent examiner role where she can lead a team focused on high‑impact technology sectors. She is passionate about integrating AI‑driven tools to improve
    search efficiency and accuracy, and she hopes to author a guide on best practices for modern patent examination. Over the next few years, she plans to expand her mentorship program for new examiners
    and contribute to policy discussions on intellectual‑property standards at national conferences.
