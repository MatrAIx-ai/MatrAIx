  career_goals: Approaching retirement, Jordan aims to transition into a mentorship role where he can share his practical knowledge of warehouse safety and logistics with younger workers. He plans to earn
    an OSHA Outreach Trainer certification within the next year and hopes to become a part‑time safety consultant for local businesses. He also wants to secure a stable part‑time position that allows him
    to apply his organizational skills while giving him enough flexibility to pursue personal interests and support his future financial security. In the longer term, Jordan hopes to volunteer with the
    local community college’s vocational program, helping to design hands‑on training modules for material‑handling careers.
