personas:
  professional: Robert Cothren, a seasoned electrician with a talent for merging traditional residential wiring expertise and cutting‑edge renewable‑energy installations, leverages their practical curiosity
    and balanced organization to lead crews, troubleshoot complex systems, and mentor apprentices while staying grounded in safety protocols and community values.
  sports: Robert Cothren passionately supports the Tampa Bay Buccaneers and the Miami Marlins, spends Saturday mornings on a local fishing club’s Gulf charter, and they keep fit by joining a community senior
    softball league and taking early‑morning jogs along the waterfront, balancing competitive spirit with low‑impact workouts that suit a seasoned, yet health‑conscious, 52‑year‑old.
  arts: Robert Cothren curates a classic‑rock vinyl collection featuring the Rolling Stones, Led Zeppelin, and Neil Young, spends weekends restoring vintage guitars and building handcrafted furniture, and
    they occasionally attend live blues performances at local craft‑brew festivals while finding artistic inspiration in the nautical paintings of Winslow Homer displayed at the regional museum.
  travel: Robert Cothren prefers meticulously planned getaways that blend outdoor adventure with relaxation, having already explored the Florida Keys, the Bahamas, and a weekend camping trek in the Appalachian
    Mountains, and they now dream of a guided eco‑tour of the Everglades and a leisurely cruise through historic Gulf‑coast towns.
  culinary: Robert Cothren delights in cooking their daily catch of grouper with lemon‑butter sauce, mastering shrimp étouffée seasoned with Cajun paprika and garlic, and they pair these seafood feasts
    with craft‑brew IPAs while occasionally treating themselves to a perfectly seared ribeye steak topped with rosemary‑infused butter.
  core: Robert Cothren is a pragmatic yet curious electrician who balances early‑morning fishing trips with garage tinkering, obsessively checks their multimeter for accuracy, and they can’t resist a cold
    craft‑brew after a long day, even if it means a few extra late‑night work orders linger.
background:
  cultural: Robert grew up in a working‑class Gulf‑Coast community in Florida, where Southern hospitality and coastal lifestyle intersect. His upbringing emphasized self‑reliance, a strong work ethic, and
    a respect for community ties, reinforced by regular attendance at a local Methodist church and participation in county fairs. The regional culture of seafood cuisine, outdoor recreation, and a pragmatic
    approach to problem‑solving informs both his personal habits and professional outlook, while his partial college education reflects a blend of formal technical training and hands‑on apprenticeship typical
    of the area.
attributes:
  skills: '["Electrical wiring", "Conduit installation", "NEC code compliance", "Blueprint reading", "Circuit troubleshooting", "Load calculation", "Solar PV system installation", "EV charger installation",
