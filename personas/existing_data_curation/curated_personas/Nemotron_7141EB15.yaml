  hobbies: '["Fishing", "Boating", "Woodworking", "Model RC car hobby", "DIY home automation projects", "Reading about renewable energy technologies", "Camping and nature walks", "Classic rock vinyl collection",
    "Volunteering with Habitat for Humanity", "Gardening"]'
  career_goals: Robert aims to secure his master electrician license within the next two years and transition from a journeyman role to owning a boutique contracting firm that specializes in renewable‑energy
    retrofits and smart‑home upgrades for homes along Florida’s Gulf Coast. He plans to earn NABCEP certification for solar installations, mentor apprentices at his local technical college, and build a
    reputation for reliable, forward‑thinking service. Financially, he seeks a stable income stream that will support a comfortable early retirement while allowing him to fund community‑service projects
    such as energy‑efficiency upgrades for low‑income households.
