personas:
  professional: Evelio Alam leverages decades of hands‑on project management and budgeting expertise, blending meticulous organization with bilingual fluency to coordinate community events and act as an
    informal curator of Latin American art at local museums.
  sports: Evelio Alam stays fit by walking the Buffalo Bayou trails most mornings, playing weekly pickleball at the senior center, cheering the Houston Astros and Rockets, and occasionally joining a local
    senior cycling group for weekend rides, though they admit to skipping a scheduled run after a late night photographing a family gathering.
  arts: Evelio Alam immerses in Houston’s art scene, regularly attending exhibitions at the Museum of Fine Arts and the Contemporary Arts Museum, collecting prints by Frida Kahlo and Diego Rivera, and reveling
    in live mariachi performances at La Calle and jazz sets by local saxophonist Jeff Sipe, while they occasionally critique curatorial choices with a sharp, yet respectful, eye.
  travel: Evelio Alam favors well‑planned, culturally rich trips, often exploring historic sites in San Antonio and Austin, dreaming of a culinary pilgrimage to Oaxaca, and enjoying occasional family cruises
    to the Caribbean, but they tend to overpack and rely on a trusted travel agent to keep itineraries smooth.
  culinary: Evelio Alam cooks traditional Mexican dishes like pozole, mole poblano, and chiles en nogada with ingredients harvested from their own garden—fresh cilantro, tomatoes, and chilies—while they
    experiment with fusion twists, though they occasionally over‑salt a batch of salsa in their enthusiasm.
  core: Evelio Alam is a curious, methodical retiree who blends art appreciation, community leadership, and gardening, yet habitually forgets to water the orchids when lost in a photography project.
background:
  cultural: Born in Jalisco, Mexico, Evelio immigrated to Houston in the early 1970s with his family. He grew up in a bilingual household, celebrating Mexican traditions such as Día de los Muertos, quinceañeras,
    and posadas, while adapting to the multicultural environment of Houston. His Catholic upbringing informs his sense of community and family responsibility. He remains actively involved in the Mexican‑American
    community, participating in local festivals, sharing traditional cuisine, and volunteering at cultural organizations to preserve and promote his heritage.
attributes:
  skills: '["Project management", "Budgeting and financial planning", "Technical troubleshooting", "Bilingual communication (Spanish-English)", "Art appreciation and informal curation", "Digital photography",
