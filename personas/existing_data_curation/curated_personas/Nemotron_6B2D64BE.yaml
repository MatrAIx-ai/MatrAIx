  hobbies: '[''Gardening (herbs and succulents)'', ''Cooking traditional Mexican cuisine'', ''Reading mystery and historical fiction novels'', ''Knitting scarves and blankets'', ''Crossword puzzles and
    Sudoku'', ''Walking in local parks'', ''Attending Mexican cultural festivals'', ''Church services'', ''Senior‑center bingo'']'
  career_goals: As she approaches retirement, Josefa aims to be formally recognized as a senior administrative specialist, earning the Certified Administrative Professional (CAP) credential to validate
    her expertise. She hopes to mentor younger clerical staff, leaving a documented workflow guide that will sustain office efficiency after she reduces her hours. Additionally, she aspires to receive an
    "Employee of the Year" award for her consistent reliability and to contribute to a community volunteer program that offers administrative assistance to local Mexican‑American families.
