personas:
  professional: Delores Stone is a pharmacy technician whose meticulous prescription verification and sterile compounding skills are tempered by a curious, art‑loving side that brings creative stress‑relief
    ideas to the pharmacy, making them a reliable yet innovative team member who often sketches quick watercolor scenes during quiet moments to keep the workspace lively.
  sports: Delores Stone enjoys hiking the sand dunes of Sleeping Bear Dunes and the pine‑covered trails of Pictured Rocks National Lakeshore during summer, supports the Detroit Lions and the Detroit Red
    Wings, and participates in a local community walking club that meets twice a week, and they balance moderate cardio with a love for Midwest sports loyalties.
  arts: Delores Stone finds inspiration in the impressionist works of Claude Monet and the soft palettes of contemporary watercolorist Stephanie Pui‑Mun Law, often attending exhibitions at the Detroit Institute
    of Arts and listening to folk singer‑songwriter Gillian Welch while painting, which fuels their belief that art can soothe both patients and themselves.
  travel: Delores Stone prefers meticulously planning road trips that combine scenic drives through Michigan’s Upper Peninsula with stops at local art fairs, having already explored the historic streets
    of Quebec City and the serene shoreline of Door County, while dreaming of a future autumn retreat in Vermont’s Green Mountains, and they often map each stop on a phone app before setting out.
  culinary: Delores Stone enjoys cooking with fresh rosemary, thyme, and basil from their own herb garden, often preparing lemon‑rosemary roasted chicken, herb‑infused olive oil pasta, and seasonal vegetable
    soups, while occasionally indulging in a butter‑laden mac and cheese at local diners, reflecting a home‑cooked, moderately adventurous palate.
  core: Delores Stone blends scientific precision with an artist’s imagination, swapping prescription labels for watercolor sketches during quiet afternoons, yet they occasionally forget to water their
    herbs, resulting in a laughable wilted patch on the windowsill.
background:
  cultural: Delores grew up in a small Midwestern town in Michigan, raised in a white family that valued community, modesty, and reliability. Her upbringing emphasized participation in church and civic
    events, fostering a sense of cooperation and harmony. The region’s seasonal changes nurtured her appreciation for outdoor activities, while her parents encouraged educational pursuits, leading her to
    earn a STEM bachelor’s degree. These cultural influences blend with her reserved nature, making her comfortable in close‑knit groups and dedicated to contributing positively to her local community.
attributes:
  skills: '["Prescription verification", "Medication dispensing", "Sterile compounding", "Inventory management", "Pharmacy software (PioneerRx, QS/1)", "Drug interaction analysis", "Patient counseling",
    "HIPAA compliance", "Data entry and record keeping", "Basic lab techniques (spectrophotometry)"]'
  hobbies: '["Visiting local art galleries", "Watercolor painting", "Reading scientific journals and contemporary fiction", "Gardening (herb garden)", "Hiking in Michigan state parks", "Volunteering at
    community health fairs", "Cooking experimental recipes", "Attending intimate jazz concerts"]'
  career_goals: Delores aims to pursue a PharmD degree within the next five years, with the long‑term goal of transitioning into a pharmacy manager role at a community pharmacy. She is passionate about
    expanding preventive health services, such as medication therapy management workshops, and hopes to integrate creative wellness initiatives—like art‑based stress reduction programs—into her pharmacy
    practice. Additionally, she aspires to mentor new pharmacy technicians, fostering a collaborative and supportive work environment.
