  career_goals: Although retired, Staci aims to curate a local seniors' art exhibition that showcases community members' creative work and to complete a comprehensive family history memoir for future generations.
    She wishes to mentor younger volunteers in project planning and event management, and to stay intellectually active by taking occasional courses on contemporary art and digital storytelling. Maintaining
    an active role in her community and leaving a lasting cultural legacy are central to her ambitions.
