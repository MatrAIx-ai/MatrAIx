personas:
  professional: An aspiring robotics engineer in middle school, David Taylor applies their structured mindset and teamwork skills from soccer to lead building and programming LEGO‑based automatons, while
    balancing their love of clear goals with creative problem‑solving.
  sports: David Taylor attacks the midfield as a forward for the Cedar Creek Middle School soccer team, follows the Dallas Cowboys for NFL excitement, and trains with the Cedar Creek Youth Athletics Club
    for cross‑country running during the fall season, always emphasizing teamwork and disciplined practice.
  arts: David Taylor drums in their family’s garage band, idolizing Travis Barker and listening to Imagine Dragons and Daft Punk while also devouring sci‑fi novels by Isaac Asimov and Octavia Butler, integrating
    rhythmic beats into their storytelling imagination.
  travel: David Taylor prefers organized family road trips, having trekked the Grand Canyon and visited Disneyland, and dreams of a summer excursion to Kyoto, Japan, to explore historic temples and anime
    culture, always packing a detailed itinerary with plenty of snack breaks.
  culinary: David Taylor enjoys building their own pizza with pepperoni, mozzarella, and pineapple, experimenting with taco night featuring seasoned ground beef, cheddar, and fresh cilantro, yet still relies
    on microwavable mac and cheese for late‑night gaming sessions.
  core: David Taylor blends a love for structured play—soccer, robotics, and LEGO—with a quiet creativity in drumming and sci‑fi reading, all while juggling a meticulous allowance budget and occasional
    snack‑induced impulsivity.
background:
  cultural: David comes from a white, primarily Anglo‑American family rooted in the Pacific Northwest. Growing up in Puyallup, Washington, he has been influenced by the region’s outdoor lifestyle, seasonal
    rain, and community‑center activities. His family values punctuality, responsibility, and mutual respect, which are reflected in his cooperative demeanor. While his household celebrates typical American
    holidays, they also acknowledge the local Puyallup tribal heritage through school lessons and occasional community events. The suburban setting provides access to school clubs, sports leagues, and nature
    areas that shape his balanced, structured yet flexible outlook.
