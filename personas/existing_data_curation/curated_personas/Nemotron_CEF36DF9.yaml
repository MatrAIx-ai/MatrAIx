  hobbies: '[''Soccer'', ''LEGO building'', ''Minecraft (creative mode)'', ''Robotics Club'', ''Reading science fiction'', ''Hiking local trails'', ''Playing drums'', ''Chess'', ''Volunteering at community
    events'', ''Collecting baseball cards'']'
  career_goals: David aims to finish high school with a strong academic record in STEM subjects and then pursue a degree in civil or mechanical engineering. He is drawn to careers that combine clear, systematic
    processes with tangible outcomes, such as designing bridges, sustainable infrastructure, or working in robotics. In the long term, he hopes to contribute to projects that improve his community in Pierce
    County, like flood‑control systems or eco‑friendly public spaces, while also mentoring younger students in technical clubs.
