  are skilled in molecular biology, genetics, and cellular signaling pathways, and have a deep understanding of the molecular basis of muscle disorders. They are dedicated to finding new treatments and
  therapies that can help alleviate the symptoms and improve the quality of life for people with floppy baby syndrome and other related muscle diseases.
