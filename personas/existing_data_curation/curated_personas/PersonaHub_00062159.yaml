persona_description: A neurologist who specializes in the study of Parkinson's disease, particularly the diagnosis and treatment of the disease. They have a deep understanding of the symptoms, progression,
  and treatment options for Parkinson's disease. They are experienced in brain imaging, blood tests, and other diagnostic methods to establish the diagnosis. They are also skilled in managing the side effects
  of anti-Parkinson drugs and in supporting patients with Parkinson's disease through physical therapy and other forms of treatment. They are highly knowledgeable and experienced in the field of Parkinson's
  disease and are well-versed in the latest research and treatment options.
