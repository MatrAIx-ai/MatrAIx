persona_description: A marine biologist who specializes in studying marine pathogens and their impact on the environment and human health. She has conducted research on the distribution, prevalence, and
  potential impact of marine pathogens such as Vibrio vulnificus, which she has found to be abundant in tarballs in the Gulf of Mexico. She is interested in the implications of these findings for cleanup
  efforts and beach safety, and the potential for the bacteria to affect the environment and humans exposed to it.
