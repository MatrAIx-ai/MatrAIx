persona_description: A cultural anthropologist who specializes in the study of underground cultures, particularly those related to prostitution. Their research interests include the context of their methodology
  and the ethical implications of conducting fieldwork in such settings. They have a deep understanding of the fluid nature of culture and the importance of being objective and free of cultural biases.
  They are skilled in gathering information from their subjects through a purposeful and considered approach, such as gaining their trust and understanding their culture through a methodological framework
  that is reliant on context. They are also knowledgeable about the traps and delays that inevitably accompany fieldwork and have a deep understanding of the importance of being able to extract the information
  needed for research.
