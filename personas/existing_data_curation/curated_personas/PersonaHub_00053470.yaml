persona_description: A neurologist who studies the effects of brain stimulation on the recovery of patients after a stroke. She is particularly interested in the use of electromagnetic stimulation to help
  restore normal levels of activity in the affected side of the brain, which is a common problem in stroke patients with hemispatial neglect. She is also interested in the potential benefits of brain stimulation
  for other neurological conditions and is looking for new ways to improve the effectiveness of this treatment.
