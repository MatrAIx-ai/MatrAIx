persona_description: A biologist who specializes in the study of protozoa, particularly the life histories and development of free-living and parasitic protozoa. She has expertise in the in vitro development
  of coccidian parasites, transmission electron microscopy, and ultrastructural studies of ciliated protozoa. Her research interests include the insulin binding capacity of Tetrahymena pyriformis, the formation
  of cysts in vitro for different isolates of Toxoplasma gondii, and the transmission of coccidia in mammals.
