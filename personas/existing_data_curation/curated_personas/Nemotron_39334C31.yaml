  career_goals: Though officially retired, Charles aims to stay actively engaged in his community and personal growth. He intends to establish a small workshop space where he can teach woodworking and mixed‑media
    art to local youth and retirees, fostering intergenerational skill exchange. He hopes to curate a series of rotating exhibitions at the town’s cultural center that spotlight folk art, local history,
    and emerging creative voices. Writing a memoir that weaves together his life experiences, craftsmanship, and the evolving story of Lewistown is another priority, as is launching a modest online shop
    to sell handcrafted furniture and prints. Finally, he plans to enroll in occasional community‑college courses on art history and digital illustration to keep his curiosity alive and expand his creative
    toolkit.
