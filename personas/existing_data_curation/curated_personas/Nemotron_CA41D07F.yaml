  hobbies: '["Gardening","Traditional Soul‑Food Cooking","Quilting","Church Choir Participation","Jazz & Gospel Listening","Yoga & Mindfulness","Dog Walking","Visiting Farmer’s Market","Reading (Self‑Help
    & African‑American Literature)"]'
  career_goals: Candace aims to re‑enter the workforce through a role that leverages her organizational talent and people‑focused skills, such as a community outreach coordinator for a local nonprofit or
    a program manager for a youth mentorship initiative. She plans to pursue a bachelor's degree in social work or community development to deepen her impact. Long‑term, she envisions launching a small
    community‑center café that offers affordable, culturally resonant meals while providing a safe space for local families and elder care resources. She also hopes to become a recognized leader within
    Iowa City's African‑American cultural organizations, mentoring the next generation of community advocates.
