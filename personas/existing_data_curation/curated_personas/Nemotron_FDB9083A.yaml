personas:
  professional: Allen Kotas is a methodical budding UX designer who blends strong digital illustration skills with a keen eye for user research, channeling their high emotional intelligence into empathetic
    design solutions while meticulously planning each freelance project and internship to build a portfolio aimed at museum curation and mental‑well‑being‑focused experiences.
  sports: Allen Kotas enjoys low‑impact fitness, jogging along the Hudson River Greenway five times a week, practicing yoga at a local studio affiliated with the community center, and cheering for the New
    York Knicks and Rangers while occasionally joining a weekend pick‑up basketball game at a nearby park, favoring small‑group activity over large crowds.
  arts: Allen Kotas immerses themselves in contemporary art, regularly sketching at MoMo (Museum of Modern Art) and attending installations by Olafur Eliasson and Ai Weiwei, while their playlists feature
    The National, Sufjan Stevens, and experimental electronic tracks by Aphex Twin, and they capture street scenes with a Nikon Z6, drawing inspiration from Banksy’s urban commentary.
  travel: Allen Kotas plans trips with spreadsheets, favoring culturally rich city breaks like a weekend in Boston’s Freedom Trail, a three‑day art pilgrimage to Berlin’s galleries, and a summer visit to
    Kyoto’s temples for photography, yet they also love spontaneous subway rides through Manhattan’s neighborhoods, constrained only by a modest travel budget and a desire to return home for family gatherings.
  culinary: Allen Kotas loves experimenting in the kitchen, often whipping up avocado toast topped with smoked salmon and za’atar, preparing homemade ramen with miso broth and chili oil, and enjoying a
    spicy tuna roll at a local sushi bar, while their pantry staples include almond butter, quinoa, and fresh basil for quick Mediterranean‑style pasta dishes.
  core: Allen Kotas is a detail‑oriented 22‑year‑old artist‑designer whose curiosity fuels creative projects, whose anxiety drives meticulous planning, and whose quiet kindness shines through community
    art workshops and carefully curated coffee shop visits.
background:
  cultural: Allen is a White American raised in Port Chester, Westchester County, New York. His upbringing reflects a middle‑class suburban environment with easy access to the cultural diversity of nearby
    New York City. Exposure to the city’s vibrant art scene, indie music venues, and multicultural communities has shaped his appreciation for contemporary art and progressive ideas while maintaining traditional
    American family values.
