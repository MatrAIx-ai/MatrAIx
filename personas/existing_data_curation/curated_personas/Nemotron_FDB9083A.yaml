  career_goals: Allen aims to merge his artistic passion with his organized, methodical approach by pursuing a career in user experience (UX) design or art therapy. He plans to complete a bachelor’s degree
    in a related field, build a portfolio through freelance and internship projects, and eventually work as a UX researcher or museum curator focusing on contemporary media installations. In the long term,
    he hopes to lead small interdisciplinary teams that prioritize mental well‑being, inclusive collaboration, and community‑focused art programs, while maintaining a balanced lifestyle that supports his
    emotional health.
