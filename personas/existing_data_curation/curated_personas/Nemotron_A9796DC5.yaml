personas:
  professional: Barbara Johnson, a seasoned carpenter renowned for structural framing, precision finish work, and mentorship, channels their disciplined organization, competitive drive, and pragmatic curiosity
    into running a boutique reclaimed‑wood furniture studio that consistently meets tight deadlines while experimenting with CNC‑assisted joinery.
  sports: Barbara Johnson stays fit by leading weekly hikes with the Blue Ridge Trailblazers club, joining a recreational tennis league at the Greenville Country Club, and cheering for the Carolina Panthers,
    Charlotte Hornets, and Greenville Drive while balancing their competitive spirit with a disciplined, schedule‑driven workout routine, and they also schedule monthly strength‑training sessions at the
    local gym.
  arts: Barbara Johnson immerses themselves in the arts by acting in productions such as ‘Our Town’ with the Spartanburg Community Theatre, coordinating set design backstage, and attending live shows featuring
    performers like Bruce Springsteen and local blues guitarist Jamal Johnson, while their book‑club discussions often revolve around works by authors like Toni Morrison and contemporary playwright Lin‑Manuel
    Miranda.
  travel: Barbara Johnson plans their travel with the same spreadsheet precision they use on a job site, favoring organized road‑trip itineraries that combine Appalachian hiking in Asheville, culinary tours
    of Nashville’s hot‑chicken scene, and relaxing beach stays in Charleston, while dreaming of a future cultural pilgrimage to Edinburgh’s historic festivals.
  culinary: Barbara Johnson’s culinary repertoire showcases expert Southern barbecue, where they meticulously smoke pork ribs and brisket over hickory using a dry rub of paprika, brown sugar, and garlic,
    while pairing the meat with garden‑fresh collard greens, corn succotash, and a bourbon‑infused peach glaze that reflects their love for bold flavors and precise technique.
  core: Barbara Johnson blends a relentless competitive edge with calm, meticulous organization, obsessively cataloguing every screw and sketch before a build while occasionally over‑spending on expensive
    hand tools that they never fully use.
background:
  cultural: Barbara grew up in a working-class family in Spartanburg, South Carolina, where the values of hard work, self-reliance, and community support are deeply ingrained. The region's Southern hospitality
    and strong church-centered social life shaped her sociable personality, while family traditions of seasonal barbecues, football Saturdays, and outdoor pursuits fostered a love for gathering and group
    activities. Though she left formal schooling before completing ninth grade, she learned the carpentry trade early by helping relatives on construction sites, developing a practical skill set that reflects
    the local emphasis on hands-on trades. Her cultural identity blends a respect for established Southern customs with a curiosity about new techniques, allowing her to balance tradition with innovation
    in both her work and personal life.
