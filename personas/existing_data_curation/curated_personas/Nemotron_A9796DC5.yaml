  career_goals: Barbara seeks to turn her decades of hands-on experience into a recognized legacy. Within the next two years she aims to earn the state-issued Master Carpenter certification and to launch
    a boutique workshop that produces custom reclaimed-wood furniture blending Southern vernacular style with modern design. Her competitive spirit drives her to enter the annual Southern Builders Competition,
    showcasing innovative joinery techniques. Long-term she plans to establish a formal apprenticeship program in partnership with the local community college, providing structured training for aspiring
    carpenters. She also aspires to serve on the board of the Spartanburg Homebuilders Association, influencing safety and sustainability standards while mentoring the next generation of tradespeople.
