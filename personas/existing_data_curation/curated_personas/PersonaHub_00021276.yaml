persona_description: A geologist who specializes in the study of meteorites and their impact on the Earth's surface. He is particularly interested in the formation and dating of meteorite craters, and has
  conducted research on the age of Wolfe Creek Crater using two geochronological dating techniques. His work has implications for understanding the frequency and rate of large impact events on the Earth,
  and has led to the recalculation of the age of Meteor Crater.
