  career_goals: Nancy aims to become the district’s lead STEM coordinator, where she can shape a school‑wide program that blends innovative, curiosity‑centered projects with the practical needs of budget
    and staffing. She hopes to secure grant funding to build a modest, low‑noise maker lab that serves both active and introverted students, and to author a guide on creating quiet, focused learning spaces
    for elementary educators. In the long term, she envisions presenting her work at regional education conferences and mentoring a new generation of teachers who value both creativity and practicality.
