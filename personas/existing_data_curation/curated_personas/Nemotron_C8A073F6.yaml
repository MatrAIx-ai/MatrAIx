personas:
  professional: Nancy Mccormick brings over thirty years of elementary and middle school STEM teaching to the Winchester district, designing inquiry‑based curricula and low‑stimulus maker labs while mentoring
    newcomers and balancing curiosity‑driven innovation with budgetary practicality, a blend that mirrors their quiet yet assertive classroom demeanor.
  sports: Nancy Mccormick prefers low‑key fitness activities like hiking Shenandoah National Park trails and walking with a local senior walking club, wins occasional attendance at Washington Nationals
    games, and avoids high‑energy team sports, aligning with their preference for solitude and steady endurance.
  arts: Nancy Mccormick captures the changing seasons through nature photography inspired by Ansel Adams, reads mystery novels by Agatha Christie and science histories by James Gleick, knits quietly to
    the tunes of Yo-Yo Ma's cello suites, and attends the Shenandoah Valley Music Festival once a year, weaving artistic appreciation into their solitary leisure time.
  travel: Nancy Mccormick favors meticulously planned road trips to quiet destinations such as Acadia National Park, the ancient gardens of Kyoto, and historic Monticello, often staying at cozy bed‑and‑breakfasts
    and using a portable telescope for stargazing evenings, a travel style that balances adventure with comfort and budget consciousness.
  culinary: Nancy Mccormick delights in cooking garden‑fresh heirloom tomato salads with basil, rosemary‑infused roasted chicken, and hearty ratatouille, while expertly knitting herbal teas from mint and
    chamomile, occasionally treating themselves to artisanal cheese boards, reflecting a preference for wholesome, plant‑forward meals and simple culinary creativity.
  core: Nancy Mccormick is a seasoned STEM educator who blends quiet curiosity with pragmatic budgeting, tending a garden, photographing nature, and crafting a balanced life of meticulous planning and solitary
    rejuvenation.
background:
  cultural: Nancy was raised in a multigenerational, middle‑class family with deep roots in the Shenandoah Valley. Her ancestry traces back to early English and German settlers who arrived in Virginia in
    the 18th century, and she grew up attending local community gatherings, historical reenactments, and church events that emphasized stewardship, education, and modesty. The region’s blend of Appalachian
    folk traditions and Mid‑Atlantic colonial heritage fostered her appreciation for both historical continuity and forward‑looking innovation, an outlook that informs her teaching philosophy and personal
    life.
