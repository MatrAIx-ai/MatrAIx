personas:
  professional: Wayne Howard is a seasoned construction supervisor with over 20 years of hands‑on experience coordinating crews, interpreting blueprints, and operating heavy equipment, who balances a curiosity
    for modular framing with a practical, safety‑first mindset, while they often improvise solutions on the job site due to a relaxed attitude toward strict schedules.
  sports: Wayne Howard is an avid outdoorsman who spends early mornings fishing the Atchafalaya Bayou and weekend hunting with the Bayou Outdoors Club, while they cheer the LSU Tigers football team on Saturdays
    and never miss a New Orleans Saints game, using these communal rituals to balance their physically demanding work life.
  arts: Wayne Howard is a devoted fan of zydeco and swamp pop, often attending local dances featuring the sounds of Clifton Chenier and Buckwheat Zydeco, and they also appreciate the storytelling of folk
    singer‑songwriter Zachary Richard, which fuels their own DIY creativity in the garage.
  travel: Wayne Howard favors spontaneous, low‑key road trips that let them blend fishing expeditions with cultural stops, having already explored the jazz districts of New Orleans, the music scene in Austin,
    and the historic river towns of the Mississippi Delta, while they dream of a guided canoe adventure through Canada’s Algonquin Park and a culinary tour of the Basque Country in Spain.
  culinary: Wayne Howard is an intermediate home‑chef who loves simmering a rich gumbo with okra, andouille sausage, and a dark roux, crafting a perfect étouffée with fresh crawfish, and they often round
    out meals with homemade cornbread and a dash of cayenne, turning family dinners into lively culinary celebrations.
  core: Wayne Howard blends a practical, hands‑on construction mindset with a laid‑back love for fishing, zydeco dancing, and spontaneous tool tinkering, though their habit of misplacing paperwork sometimes
    clashes with their big‑picture ambitions of running a community‑focused contracting firm.
background:
  cultural: Wayne’s roots run deep in Saint Martinville, a historic Acadian settlement in Iberia Parish. Though he identifies as white, his family has lived in the region for generations, absorbing the
    French-Acadian (Cajun) culture that shapes the local community. He grew up attending a Catholic parish, speaking a bit of Cajun French at family gatherings, and participating in traditional celebrations
    such as Mardi Gras and the Courir de Cochon. The close-knit, hospitality-oriented atmosphere of southern Louisiana influences his emphasis on teamwork, community support, and a love for regional food
    and music.
attributes:
  skills: '[''Construction site supervision'', ''Heavy equipment operation (backhoe, excavator)'', ''Blueprint reading and interpretation'', ''Safety compliance (OSHA standards)'', ''Crew scheduling and
    coordination'', ''Material logistics and inventory management'', ''Cost estimation and budgeting'', ''Problem-solving on-site'', ''Implementation of practical construction innovations'']'
  hobbies: '[''Fishing on the Bayou'', ''Hunting trips'', ''Woodworking and tool restoration'', ''Attending zydeco and Cajun music events'', ''Cooking Cajun cuisine'', ''Reading DIY and trade magazines'',
    ''Watching LSU football'', ''Volunteer work at the local church'']'
  career_goals: Wayne aims to obtain a formal certification in construction management and eventually transition into a project manager role overseeing larger commercial builds. He dreams of one day launching
    his own small contracting firm that emphasizes safety, efficiency, and community-oriented hiring practices. To support this, he plans to enroll in evening courses at a local community college, earn
    his OSHA 30-hour trainer certification, and mentor younger workers on the job site. He also hopes to improve his organization skills to better balance his flexible work style with the demands of larger
    projects.
