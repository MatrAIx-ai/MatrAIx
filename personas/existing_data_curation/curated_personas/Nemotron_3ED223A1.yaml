  career_goals: She aims to move into a senior HR Business Partner role within a technology‑focused firm, leading people‑analytics initiatives that blend data science with creative employee experience design.
    Sharon plans to earn a master’s degree in Organizational Development or an MBA, publish thought‑leadership pieces on innovative HR practices, and eventually become a Director of People Strategy or Chief
    People Officer, shaping culture through art‑infused engagement programs while championing inclusive, data‑backed talent strategies.
