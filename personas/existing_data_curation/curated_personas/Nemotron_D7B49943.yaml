  hobbies: '[''cooking Korean dishes'', ''listening to K‑pop and Korean dramas'', ''urban photography'', ''walking and hiking local trails'', ''volunteering at community food bank'', ''yoga and meditation'',
    ''reading self‑help books'', ''journaling'']'
  career_goals: Eun hopes to advance within the USPS, aiming for a supervisory role within the next three years. She plans to enroll in a community‑college associate program in supply chain management or
    business administration, to deepen her understanding of logistics and potentially transition to a planning or operations manager position. At the same time, she wants to combine her compassion for others
    by leading community‑service initiatives, such as organizing volunteer delivery programs for the elderly or coordinating disaster‑relief mail services. She also seeks to develop better stress‑management
    habits to sustain her career growth.
