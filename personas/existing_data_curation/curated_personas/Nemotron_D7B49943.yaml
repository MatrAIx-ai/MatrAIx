personas:
  professional: Eun Lu is a 20‑year‑old postal service mail carrier who leverages their bilingual fluency, route‑optimizing curiosity, and friendly demeanor to reliably deliver parcels across Charlotte
    while they quietly brainstorm efficiency tweaks for a future supervisory role.
  sports: Eun Lu enjoys casual fitness through weekly yoga classes, leisurely walks in Freedom Park, and cheering on the Charlotte Hornets, and they occasionally join a local community‑run soccer pick‑up
    league that satisfies their curiosity for team play.
  arts: Eun Lu immerses themselves in K‑pop hits from BTS and Blackpink, binge‑watches Korean dramas like 'Crash Landing on You', and they capture street scenes with their smartphone, often inspired by
    the vibrant color palettes of photographer Vivian Maier.
  travel: Eun Lu loves exploring the urban murals of Charlotte and weekend road trips to the Blue Ridge Mountains, dreams of a culinary pilgrimage to Seoul to taste authentic street food, and they plan
    a future solo adventure to New Orleans to blend Southern jazz with their love of cultural immersion.
  culinary: Eun Lu passionately cooks kimchi and bulgogi, often experimenting by marinating pork belly with gochujang and smoky Carolina BBQ sauce, they delight in crafting kimchi fried rice topped with
    collard greens, while their most prized pantry staples include gochugaru, garlic, and fresh cilantro.
  core: Eun Lu balances a curious, practical mind with a compassionate heart, yet they often relax obligations, let disorganization creep in, and struggle with chronic worry, making stress management a
    daily juggling act.
background:
  cultural: Eun Lu was raised in a Korean‑American household in the Charlotte metropolitan area. Her parents immigrated from South Korea and instilled values of respect for elders, community harmony, and
    hard work. She grew up bilingual, celebrating Korean holidays like Chuseok and Lunar New Year while also participating in local American traditions. The close‑knit Korean community in Mecklenburg County
    provides her with cultural events, language schools, and a network of supportive friends. These influences shape her compassionate nature, her appreciation for group harmony, and her tendency to seek
    balance between her heritage and the broader American culture.
attributes:
  skills: '[''route navigation'', ''package handling'', ''customer service'', ''bilingual communication (English/Korean)'', ''basic data entry and barcode scanning'', ''physical stamina'', ''problem solving
