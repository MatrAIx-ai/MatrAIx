  career_goals: She aims to transition into a principal engineer role where she can shape system architecture and mentor junior developers through structured, one‑on‑one code reviews. Over the next five
    years, Cassandra plans to obtain AWS Certified Solutions Architect – Professional and deepen her expertise in serverless computing. While she values technical leadership, she prefers maintaining a low‑profile,
    focused environment rather than a people‑centric management track. Her long‑term ambition is to lead a high‑performance engineering team that delivers reliable, high‑throughput services for fintech
    applications, aligning with her competitive drive for technical excellence.
