persona_description: A business owner or manager who is interested in improving employee productivity, engagement, and overall wellbeing through the implementation of outdoor activities and sunlight exposure.
  They are aware of the negative effects of seasonal affective disorder (SAD) and are willing to take steps to mitigate its impact on their employees. They are proactive in organizing outdoor activities
  and encouraging their employees to take advantage of the natural light during the day. They understand the importance of mental health and wellbeing and are willing to provide support and resources to
  their employees who may be suffering from conditions such as SAD.
