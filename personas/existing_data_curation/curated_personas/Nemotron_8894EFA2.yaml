  career_goals: Even at 72, Gloria aims to leave a lasting professional legacy. She plans to transition to a part‑time consulting role focused on helping local small businesses navigate tax changes and
    implement efficient bookkeeping systems. Gloria also aspires to mentor the next generation of accountants through a community‑based apprenticeship program and to author a practical guide on small‑business
    accounting for seniors. Additionally, she seeks a seat on the board of a regional nonprofit where her financial acumen can support strategic growth, all while maintaining a balanced work‑life rhythm
    that respects her need for personal reflection.
