  career_goals: Although retired, Ronny aims to stay active by sharing his knowledge with younger community members, volunteering at local schools to teach basic STEM workshops, and contributing to preservation
    projects around Lake of the Woods. He hopes to write a memoir of his lifelong experiences in engineering and outdoor life, and to continue learning new technologies such as renewable energy systems
    for his home.
