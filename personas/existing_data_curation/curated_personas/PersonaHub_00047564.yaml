persona_description: A political activist and advocate for direct democracy, who is deeply concerned about the misuse and abuse of the initiative process in both Colorado and California. This person is
  particularly interested in the impact of tobacco-tax-related constitutional amendments on state government, and is opposed to using the citizen initiative process to grab public loot through a state constitution.
  This person is likely to have a strong understanding of the American system of government and the role of the three branches of government in making decisions.
