personas:
  professional: Tod Littleton, an aspiring mechanical engineer and product design student, leverages basic Python scripting, Arduino prototyping, and DIY woodworking to rapidly iterate low‑cost solutions,
    channeling their competitive drive and relaxed, flexible approach to turn chaotic project timelines into functional prototypes.
  sports: Tod Littleton fuels their competitive edge on the intramural basketball court as a member of the campus' Aggie Aces club, while cheering for the Texas Rangers, Houston Texans, and Dallas Cowboys,
    and occasionally joins a weekend pickup soccer league at the local park.
  arts: Tod Littleton finds creative release in capturing sunset photos and unwinding to classic rock legends like Led Zeppelin and The Rolling Stones, as well as indie folk icons Bon Iver and Fleet Foxes,
    while occasionally watching indie films starring Greta Gerwig.
  travel: Tod Littleton prefers spontaneous weekend road trips, having already explored Austin, New Orleans, and a camping adventure in the Texas Hill Country, while dreaming of a future backpacking trek
    through Japan’s countryside and an Icelandic aurora‑hunting expedition, all balanced against a modest student budget and occasional family obligations.
  culinary: Tod Littleton enjoys a modestly skilled kitchen, regularly cooking grilled trout with lemon‑dill sauce, spicing up Texas‑style chili with black beans and cumin, and crafting homemade pizza topped
    with fresh mozzarella, basil, and smoked sausage, while also savoring weekend fish tacos drizzled with cilantro‑lime crema.
  core: Tod Littleton is a competitively curious tinkerer who flips between high‑energy gaming marathons and quiet woodworking sessions, often juggling disorganized schedules, occasional impulsive spending
    on hobby parts, and a relentless drive to turn ideas into low‑cost, sustainable solutions.
background:
  cultural: Tod grew up in a middle‑class family in the Texas Hill Country, with a blend of Southern and Midwestern influences. His parents emphasized self‑reliance, community, and a love for outdoor activities,
    typical of a Texan upbringing. Living in College Station introduced him to Aggie traditions, a strong sense of school spirit, and a diverse student body, broadening his worldview while reinforcing regional
    values like hospitality and informal friendliness. His cultural identity is rooted in American Southern culture—BBQ gatherings, college football, and country music—yet his curiosity drives him to explore
    ideas beyond his immediate environment.
attributes:
  skills: '[''Python programming'', ''Arduino prototyping'', ''Basic automotive maintenance'', ''Microsoft Office Suite'', ''Team sports coordination'', ''DIY woodworking'', ''Project‑based problem solving'']'
  hobbies: '[''Competitive video gaming (strategy & simulation)'', ''Drone piloting'', ''Hiking local trails'', ''Fishing at Lake Bryan'', ''Intramural basketball'', ''Reading entrepreneurship biographies'',
    ''DIY woodworking'', ''Photography of sunsets'', ''Listening to classic rock and indie folk'']'
  career_goals: Tod wants to turn his tinkering into a career. He plans to declare a major in mechanical engineering or product design by the end of his sophomore year, aiming to develop low‑cost, sustainable
    tools for agriculture or home automation. After graduation, he hopes to join a tech‑focused startup where he can prototype quickly, or eventually launch his own small business that offers custom electronic
    solutions for local farmers and hobbyists. He values a role that lets him stay flexible, keep learning, and apply practical problem‑solving.
