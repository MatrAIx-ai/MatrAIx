personas:
  professional: Johnny Jackson, a 19-year-old business administration associate and aspiring digital-media marketer, leverages his curiosity-driven mastery of Adobe Photoshop, Illustrator, and Python alongside
    his reliable, flexible project-planning experience from community sports leagues to craft data-informed, visually striking campaigns for Houston tech startups, while they ensure each deliverable respects
    budget constraints and team morale.
  sports: Johnny Jackson stays active by playing pickup basketball at Terry Hershey Park in the East End Community Center League and cheering on the Houston Rockets, while they also channel their energy
    into hip-hop dance classes at a downtown studio, viewing both as complementary ways to maintain cardio fitness and rhythmic coordination.
  arts: Johnny Jackson’s artistic side shines through their graphic-design work inspired by bold colors and their avid attendance at live shows featuring artists like H.E.R., John Coltrane, and Anderson
    .Paak, while they unwind with sci-fi novels by Neal Stephenson and create hip-hop choreography that blends storytelling with rhythm.
  travel: Johnny Jackson prefers budget-friendly, spontaneous road trips, having already driven to Austin for its live-music scene on South Congress and to New Orleans to soak up jazz in the French Quarter,
    while they dream of a future backpacking adventure through Mexico City’s street-food markets and a tech-focused visit to Tokyo’s Akihabara district.
  culinary: Johnny Jackson delights in exploring Houston’s vibrant food-truck scene—frequently grabbing Korean BBQ tacos with gochujang and jalapeno, or spicy jerk chicken tacos drizzled with lime—while
    they experiment at home by perfecting a honey-glazed pork belly using smoked paprika and fresh cilantro, showcasing a solid intermediate cooking skill that blends soulful flavors with creative twists.
  core: Johnny Jackson is a 19-year-old tech-savvy community builder who balances meticulous project planning with spontaneous creativity, never missing a food-truck bite yet often pulling all-nighters
    perfecting custom PC rigs.
background:
  cultural: Johnny grew up in Houston’s Third Ward, a historically African‑American neighborhood with deep roots in Southern culture and civil‑rights activism. His family traditions blend gospel music at
    church, soulful home‑cooked meals, and annual celebrations of Juneteenth and Kwanzaa. Surrounded by a multilingual city, he’s picked up conversational Spanish from local friends and enjoys the city’s
    rich culinary diversity. The blend of Southern hospitality, community solidarity, and the vibrant urban arts scene shapes his outlook and daily life.
