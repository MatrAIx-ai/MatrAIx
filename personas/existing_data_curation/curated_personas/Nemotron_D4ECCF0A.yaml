  hobbies: '[''Basketball (community leagues)'', ''Hip‑hop dancing'', ''Cooking (soul food and fusion)'', ''Volunteering as youth mentor'', ''Attending live music concerts'', ''PC building and gaming'',
    ''Reading science‑fiction'']'
  career_goals: Johnny aims to finish his associate degree in Business Administration while building a professional portfolio in digital media and community outreach. In the next five years he hopes to
    secure an entry‑level position as a marketing coordinator or project assistant at a tech‑focused agency in Houston, eventually moving into a project manager role where he can blend his practical problem‑solving
    with creative campaigns. He also dreams of launching a community‑center initiative that offers free workshops on digital literacy and entrepreneurship for local youth.
