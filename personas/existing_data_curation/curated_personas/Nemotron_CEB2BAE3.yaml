  skills: '[''Mixed Media Painting'', ''Digital Illustration'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Art Exhibition Curation'', ''Grant Writing'', ''Studio Management'', ''Printmaking
    (Screenprinting, Etching)'', ''Photography and Photo Editing'', ''Artistic Concept Development'', ''Client Commission Management'', ''Art Marketing and Social Media Strategy'', ''Workshop Facilitation'',
    ''Project Scheduling and Inventory Control'']'
  hobbies: '[''Coastal Hiking'', ''Yoga'', ''Reading Contemporary Philosophy and Art Theory'', ''Playing Chess'', ''Collecting Vintage Film Cameras'', ''Photography'', ''Experimental Cooking'', ''Volunteer
    Art Workshops'', ''Attending Gallery Openings and Artist Talks'', ''Gardening (Herbs and Succulents)'']'
  career_goals: Amber aims to secure a solo exhibition at a prominent New England gallery within the next two years while winning a nationally competitive artist fellowship to fund a large‑scale public
    art project. She plans to expand her studio into a sustainably run creative space that offers residencies and community workshops, establishing herself as a mentor for emerging artists. Long‑term, she
    envisions publishing a monograph of her mixed‑media work, teaching part‑time at a regional college, and building a diversified income stream through commissions, licensing, and strategic art‑marketing
    partnerships. Her ambitious goals are supported by detailed project plans, measurable milestones, and a competitive drive to outperform peers in grant applications and exhibition opportunities.
