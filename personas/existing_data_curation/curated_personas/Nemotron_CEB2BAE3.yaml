personas:
  professional: Amber Lampe, a 31‑year‑old mixed‑media painter and digital illustrator, they channel their razor‑sharp organization, competitive drive, and curiosity for both analog and digital processes
    into grant‑winning proposals, meticulous studio inventories, and immersive exhibitions that blend vintage film photography with contemporary collage, continually pushing the New England art scene.
  sports: Amber Lampe stays fit by hiking the rugged coastal trails of Rhode Island, attending weekly yoga sessions at a local studio, and joining the Providence Running Club’s winter half‑marathon training,
    they cheer for the New England Patriots and the Boston Celtics, and sometimes play in a casual beach‑volleyball league during summer weekends.
  arts: Amber Lampe immerses themselves in the contemporary art world, regularly attending gallery openings featuring artists like Ai Weiwei, Julie Mehretu, and Kerry James Marshall, collecting vintage
    film cameras to experiment with analog processes, and drawing inspiration from the philosophical writings of Slavoj Žižek and art theorist Rosalind Krauss, shaping a mixed‑media practice with a critical,
    skeptical eye.
  travel: Amber Lampe prefers meticulously planned trips that balance artistic inspiration with personal rejuvenation, they have explored the historic studios of Florence, Italy, the modern art museums
    of Kyoto, Japan, and enjoyed a weekend retreat on Martha’s Vineyard, while dreaming of a future artist‑in‑residence program in the Scottish Highlands that blends hiking and sketching.
  culinary: Amber Lampe enjoys experimenting in the kitchen, often using herbs from their small garden—rosemary, thyme, and sage—to craft Mediterranean‑inspired dishes such as herb‑crusted lamb and lemon‑basil
    pasta, they are proficient at plating with a photographer’s eye but tend to over‑season when stressed, and they love pairing meals with a crisp local Rhode Island farm‑to‑table wine.
  core: Amber Lampe is a fiercely organized, competitively driven mixed‑media artist who balances relentless ambition with yoga‑induced calm, over‑schedules studio hours, hoards vintage cameras, and never
    lets a missed deadline tarnish their reputation.
background:
  cultural: Amber grew up in Warwick, Rhode Island, in a middle‑class family with Irish and English ancestry. The suburban New England environment, with its maritime heritage and vibrant Providence art
    scene, shaped her appreciation for both local tradition and broader artistic movements. She participated in community art programs, frequented the Rhode Island School of Design events, and is active
    in local cultural groups such as the Warwick Arts Collaborative. Her cultural identity blends pragmatic New England values—self‑reliance, organization, and a respect for heritage—with an openness to
    global art trends and diverse perspectives.
