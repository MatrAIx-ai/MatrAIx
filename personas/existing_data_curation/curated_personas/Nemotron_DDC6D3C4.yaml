  hobbies: '[''watercolor sketching'', ''vintage tractor restoration'', ''hand-painting custom designs'', ''woodworking'', ''senior art workshops'', ''Rotary Club potlucks'', ''karaoke singing'', ''hiking'',
    ''photography'', ''following electric vehicle technology'']'
  career_goals: Looking ahead, Timothy aims to shift from day-to-day equipment operation to a senior safety trainer role, where he can formalize his extensive knowledge into curriculum for new hires and
    veteran operators. He also aspires to become a shift supervisor, leveraging his organizational strengths to streamline workflow and improve morale. Off the clock, he hopes to launch a small vintage-tractor
    restoration business that blends his mechanical expertise with his love of classic design, eventually showcasing the restored pieces at local art-and-history fairs. At the community level, Timothy seeks
    to develop an art-in-the-workplace program for senior employees, encouraging creative expression as a stress-relief tool. Ultimately, he wishes to mentor the next generation of operators while preserving
    the cultural heritage of Texas-style industrial craftsmanship.
