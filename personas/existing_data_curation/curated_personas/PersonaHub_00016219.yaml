persona_description: A United Nations official working on climate change adaptation and its impact on livelihoods and food security in the Sahel and West Africa. This person is responsible for analyzing
  regional trends in temperature, rainfall, droughts, and flooding over the past four decades and their implications for the availability of natural resources, livelihoods, migration, and conflict in 17
  West African countries. They use an innovative mapping process to identify 19 "climate hotspots" where climatic changes have been the most severe and warrant focused adaptation planning and other follow-up
  activities. This person is committed to reducing the risk of conflict and forced migration and ensuring that governments stay on a course to reach a new international climate agreement.
