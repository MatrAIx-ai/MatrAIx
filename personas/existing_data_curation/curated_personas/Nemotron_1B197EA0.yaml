personas:
  professional: Judy Yon is a seasoned office administrator transitioning to part‑time consulting, using their three‑decades‑long expertise in calendar coordination, digital filing, and event planning to
    design structured onboarding programs and compassionate office cultures for Scranton‑area nonprofits and senior centers.
  sports: Judy Yon stays active by walking the Lackawanna River Trail three times a week with friends, cheering on the Scranton/Wilkes‑Barre RailRiders minor‑league baseball team, and joining a senior bowling
    league for social sport.
  arts: Judy Yon expresses creativity through knitting, quilting, and reading, participates in a monthly book club discussing contemporary fiction and classics by Jane Austen, volunteers to read stories
    to children, and listens to folk ballads and opera recordings by Enya and Luciano Pavarotti while they work on a new quilt.
  travel: Judy Yon prefers leisurely, well‑planned trips using senior discounts, has explored the historic sites of Washington, D.C., enjoys weekend retreats to the Poconos and Finger Lakes, and dreams
    of tracing their Irish‑Italian ancestry in County Clare, Ireland.
  culinary: Judy Yon cooks hearty casseroles like chicken and broccoli bake, traditional minestrone soup with garden vegetables, and Sunday pot roast, favoring fresh rosemary, garlic, and seasonal tomatoes,
    though they sometimes over‑salt dishes and rely heavily on their trusty Dutch oven.
  core: Judy Yon blends disciplined organization with community warmth, tending gardens, quilts, and spreadsheets alike, while occasionally letting a stray yarn ball or garden impulse slip through their
    otherwise meticulous routine.
background:
  cultural: Judy is a lifelong resident of Scranton, Pennsylvania, raised in a working-class, white American family with Irish and Italian roots. The region's heritage of steel-town solidarity and community
    churches shaped her values of hard work, modesty, and mutual support. She grew up attending local parishes, celebrating ethnic holidays like St. Patrick's Day and Italian feast days, and participating
    in neighborhood events such as block parties and high-school sports games. This cultural milieu emphasized reliability, cooperation, and a strong sense of belonging, all of which continue to inform
    her compassionate approach to work and community involvement.
attributes:
  skills: '["Office Administration", "Calendar Management", "Travel Coordination", "Document Preparation", "Record Keeping", "Microsoft Office Suite Proficiency", "Multi-line Phone System Operation", "Event
    Planning", "Basic Budgeting", "Staff Training & Mentoring", "Conflict Resolution", "Process Improvement"]'
  hobbies: '["Gardening", "Knitting/Crocheting", "Quilting", "Walking/Hiking", "Book Club", "Genealogy Research", "Cooking", "Volunteer Reading Program", "Community Choir", "Local History Exploration"]'
  career_goals: As she approaches the next phase of her life, Judy aims to transition from full-time secretary work to a part-time consulting and mentorship role, offering her extensive administrative expertise
    to local non-profits and small businesses in Scranton. She wants to create structured onboarding programs for new administrative staff, share best-practice workflows, and help organizations build reliable,
    compassionate office cultures. Additionally, she hopes to continue volunteering as a volunteer coordinator for senior-center events, ensuring that community activities remain organized, inclusive, and
    supportive for older adults.
