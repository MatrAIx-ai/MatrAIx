personas:
  professional: Patricia Burton, a research administration coordinator who blends meticulous office workflow management with basic coding and data analysis, channels her curiosity for emerging technologies
    into supporting interdisciplinary science-art projects at a coastal museum while preserving a low-stress, structured environment and asserting herself when project timelines require clear boundaries.
  sports: Patricia Burton, a dedicated member of the Lewes Coastal Hikers club, spends weekends on low-intensity trail runs and bird-watching walks, follows the Philadelphia Eagles for football Sundays,
    and occasionally joins a community-center yoga class to maintain flexibility and calm.
  arts: Patricia Burton, an amateur watercolorist inspired by Winslow Homer's coastal scenes, enjoys photographing historic dunes, listens to Max Richter's ambient compositions while painting, and devours
    science-fiction works by Octavia Butler and Ursula K. Le Guin, all of which shape her unique blend of artistic and scientific curiosity.
  travel: Patricia Burton prefers low-key, self-guided trips to historic coastal towns, having explored Bruges' medieval canals, the lighthouse-lined cliffs of Cape Cod, and the tea-garden island of Miyajima,
    and she plans future visits to the remote dunes of Namibia's Skeleton Coast while budgeting carefully and seeking quiet, reflective experiences.
  culinary: Patricia Burton, an avid herb gardener and modest home chef, frequently prepares lemon-thyme grilled salmon, Mediterranean quinoa bowls with olives and feta, and spinach-and-goat-cheese tartlets,
    while savoring a cup of Earl Grey infused with lavender and indulging in fresh Delaware Bay oysters on special occasions.
  core: Patricia Burton is a quiet-minded curator-in-training who trades social chatter for watercolor waves, meticulous spreadsheets, and an end-of-day habit of over-cataloguing every stray feather she
    discovers.
background:
  cultural: Patricia grew up in a modest‑middle‑class family on Delaware’s Eastern Shore, where the blend of colonial heritage, maritime culture, and close‑knit community shaped her values. Her parents
    emphasized education and self‑reliance, encouraging her pursuit of a STEM degree while maintaining a respect for tradition and the natural environment. The region’s quiet coastal towns and historic
    sites fostered her appreciation for history, art, and solitary reflection. She identifies with mainstream White American cultural norms of the Mid‑Atlantic, valuing independence, modesty, and a strong
    work ethic.
attributes:
  skills: '[''Calendar Management'', ''Executive Support'', ''Document Preparation'', ''Spreadsheet Analysis (Excel, Google Sheets)'', ''Database Management (Access, Airtable)'', ''Basic Python Scripting'',
    ''Research Coordination'', ''Technical Writing'', ''Project Tracking'', ''Digital File Organization'', ''Graphic Design Basics (Adobe Photoshop, Illustrator)'']'
  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Reading (Science Fiction & Non-fiction)'', ''Science and Art Podcasts'', ''Hiking'', ''Birdwatching'', ''Yoga'', ''Digital Illustration'',
    ''Volunteer Archiving'', ''Herb Gardening'']'
  career_goals: Patricia aims to transition from a general administrative role to a specialized research administration position within a scientific organization or museum on the Delaware coast. Over the
    next few years she plans to pursue a master's degree in Health Informatics or Museum Studies to deepen her technical expertise and curatorial knowledge. Her long-term ambition is to become a program
    manager or chief administrative officer, overseeing interdisciplinary projects that bridge science and art while maintaining a structured, low-stress work environment.
