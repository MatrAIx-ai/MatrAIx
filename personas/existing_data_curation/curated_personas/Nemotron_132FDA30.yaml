  hobbies: '["Traditional pottery", "Beadwork", "Contemporary painting", "Digital photography", "Hiking", "Native plant gardening", "Cooking heritage recipes", "Board‑game nights", "Volunteer tutoring"]'
  career_goals: Even in retirement, Raianne aims to cement her legacy by establishing a community‑based heritage education program that pairs elders with youth to share traditional stories, crafts, and
    language. She hopes to mentor emerging teachers on culturally responsive pedagogy, launch an intergenerational art workshop at the local senior center, and produce a memoir that documents her tribe's
    oral histories. Additionally, she aspires to advocate for greater elder representation in local policymaking and continue expanding her own knowledge through art courses and technology workshops.
