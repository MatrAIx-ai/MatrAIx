personas:
  professional: Raianne Mangubat, a veteran educator turned community heritage advocate, leverages three decades of curriculum design and bilingual instruction to embed tribal language and cultural narratives
    into intergenerational workshops, while their methodical planning and assertive yet compassionate demeanor ensures every program runs like clockwork.
  sports: Raianne Mangubat, an enthusiastic hiker of the Sandia Mountains and member of the Albuquerque Senior Walk Club, cheers for New Mexico United soccer and the Albuquerque Isotopes baseball, and they
    maintain fitness through weekly hill walks, gentle senior‑center yoga, and a disciplined stretching routine to keep their osteoarthritis at bay.
  arts: Raianne Mangubat, a prolific potter and beadworker who blends classic tribal motifs with the vivid palettes of Georgia O'Keeffe and the dynamic compositions of contemporary digital artist Refik
    Anadol, spends afternoons capturing New Mexico’s high‑desert light in photographs reminiscent of Ansel Adams, and regularly attends local galleries showcasing Indigenous artists.
  travel: Raianne Mangubat, an avid traveler who meticulously plans annual road trips to Santa Fe’s art districts, the Grand Canyon’s rim, and the historic pueblos of Taos, while dreaming of a leisurely
    pilgrimage to Oaxaca, Mexico to study traditional cuisine, balances limited mobility with renting mobility‑friendly vans and traveling with a companion.
  culinary: Raianne Mangubat, an accomplished home chef, expertly prepares blue‑corn enchiladas, roasted chiles rellenos, and honey‑glazed pork tenderloin using heirloom herbs like epazote and oregano,
    takes pride in preserving red‑chile sauces, yet occasionally over‑spices dishes when experimenting with new flavor pairings.
  core: Raianne Mangubat, the organized, curious octogenarian who intertwines art, education, and community service, persistently mentors youth while juggling a treasure trove of craft supplies, a meticulous
    expense ledger, and an unwavering love for the Sandia trails.
background:
  cultural: Raianne comes from a proud American Indian lineage rooted in the Southwest, with tribal affiliations to the Pueblo peoples of New Mexico. Her upbringing was steeped in ceremonial practices,
    oral storytelling, and the arts of pottery, weaving, and dance. She grew up speaking both English and her tribal language, which she has preserved through community classes and intergenerational exchanges.
    The values of respect for the land, communal responsibility, and reverence for ancestral knowledge shape her worldview and inform her contributions to cultural preservation and education in Albuquerque.
attributes:
