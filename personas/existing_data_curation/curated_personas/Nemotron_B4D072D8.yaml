personas:
  professional: Ronald Iannotti, a 34‑year‑old Class A truck driver with a decade of freight expertise, merges practical curiosity and disciplined organization to excel at route optimization, vehicle maintenance,
    and customer negotiations, while positioning himself for a transition to fleet‑operations management within the next five years.
  sports: Ronald Iannotti follows IndyCar and NASCAR avidly, roots for the Dallas Cowboys and the Houston Astros, and maintains a weekend membership with the Galveston Anglers Club, combining high‑octane
    motorsport fandom with the quiet patience of Gulf‑coast fishing.
  arts: Ronald Iannotti’s artistic palate leans toward classic country legends like Johnny Cash and modern Americana storytellers such as Sturgill Simpson, while he enjoys attending local vintage‑car shows
    that double as pop‑up galleries for photographers like Bruce McClure, and he routinely absorbs logistics and personal‑development podcasts that fuel his creative problem‑solving.
  travel: Ronald Iannotti prefers self‑planned road trips that trace Texas’s freight arteries—from Austin to Amarillo for truck expos—and coastal getaways to Galveston and New Orleans for fishing, while
    dreaming of a future adventure to the Pacific Northwest’s Seattle port to study maritime logistics.
  culinary: Ronald Iannotti delights in Texas‑style barbecue—smoked brisket seasoned with a rub of cumin, brown sugar, and chili powder—paired with Gulf shrimp po’boys and fresh catfish steaks, and while
    they possess solid grill skills, their tendency to experiment with unconventional wood chips sometimes results in overly smoky flavors.
  core: Ronald Iannotti is a solitary, competition‑driven logistics veteran who fuses his love of vintage trucks, meticulous budgeting, and podcast‑fuelled curiosity into a disciplined, yet occasionally
    back‑pain‑induced, routine.
background:
  cultural: Ronald grew up in a working‑class, Italian‑American family in the suburbs of Houston. His parents emphasized hard work, self‑reliance, and respect for tradition, values that align closely with
    Texas’ frontier spirit. While his household celebrated Italian holidays and cuisine, the broader community exposed him to Southern hospitality, Tex‑Mex flavors, and the regional love of trucks and road
    travel. His high‑school education included a vocational auto‑mechanics program that sparked his hands‑on interest in vehicle repair. The blend of Italian heritage and Texan upbringing informs his appreciation
    for family meals, community gatherings, and a pragmatic approach to problem‑solving.
attributes:
  skills: '["Class A Commercial Driver''s License (CDL)", "Advanced route optimization with telematics", "Vehicle maintenance and minor repairs", "DOT safety compliance", "Customer service and sales negotiation",
