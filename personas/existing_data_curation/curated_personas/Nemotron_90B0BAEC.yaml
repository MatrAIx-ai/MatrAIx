  career_goals: In retirement, William aims to transform his creative energy into lasting community impact. He plans to organize a collaborative mural on a former refinery wall that celebrates the Baytown
    landscape. He hopes to publish a collection of poems and sketches that explore his emotional highs and lows. He is working toward becoming a certified volunteer art therapist to help fellow seniors
    process anxiety through visual expression. Additionally, he wishes to host a monthly open‑mic night at the local community center, travel to regional art festivals such as the Houston Art Car Parade,
    and mentor emerging local artists through a small grant program he hopes to launch.
