persona_description: A researcher or historian who is interested in the history and development of timekeeping systems, particularly those related to the Roman Catholic Church and its influence on the world.
  This individual is knowledgeable about the Anno Mundi calendar, the Gregorian calendar, and the adoption of the Julian calendar in the early centuries of Christianity. They are also familiar with the
  use of historical dates in the Western world and the various ways in which these dates have been interpreted and adapted over time. This persona is likely to have a strong interest in the intersection
  of religion, history, and the development of calendars.
