  career_goals: Tommy dreams of a future where he can create practical solutions for the natural world. He is fascinated by the idea of becoming an environmental engineer or a wildlife biologist—careers
    that allow him to work independently, observe ecosystems, and apply his problem‑solving skills. He also entertains the possibility of designing simple devices that protect prairie habitats or developing
    educational computer games, reflecting his blend of curiosity about nature and interest in technology.
