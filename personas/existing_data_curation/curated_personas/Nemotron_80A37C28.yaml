  career_goals: Although retired, Angela aims to remain an active pillar of her community. She plans to continue mentoring younger volunteers at the senior center, expand the Boone County historical archive
    by collecting oral histories, and complete a series of watercolor paintings inspired by the Nebraska plains. Additionally, she hopes to publish a memoir that captures her family's genealogy and the
    cultural legacy of her hometown for future generations.
