  hobbies: '[''Participating in local cultural festivals'', ''Folklorico dance'', ''Mexican cuisine cooking'', ''Gardening'', ''Hiking in the San Bernardino hills'', ''Reading self-help and psychology books'',
    ''Volunteering at community art workshops'', ''Attending live music performances'', ''Creating papel picado decorations'']'
  career_goals: Nellie aims to obtain her GED within the next year and pursue a certification as a Community Health Worker or Cultural Program Coordinator. Her ambition is to secure a part‑time position
    with the Fontana Community Services Agency, where she can blend her outreach experience with her passion for the arts to develop culturally relevant wellness workshops for underserved residents. Long‑term,
    she dreams of opening a modest storefront that showcases handmade Mexican crafts and offers weekly art‑making classes, creating a sustainable space that celebrates her heritage while fostering community
    connection. She also seeks personal growth through stress‑management training and counseling to better balance her sensitive nature with her professional aspirations.
