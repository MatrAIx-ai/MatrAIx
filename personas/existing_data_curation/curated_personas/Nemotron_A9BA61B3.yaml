personas:
  professional: John Gaumond is a seasoned firefighter and EMT‑Basic who combines their hands‑on expertise in fire suppression, interior search and rescue, and hazardous‑materials awareness with a natural
    knack for mentoring recruits, leading incident‑command drills, and delivering community fire‑prevention workshops, all while navigating their preference for routine and occasional disorganization.
  sports: John Gaumond is a regular attendee of the Dallas Cowboys games, plays in the Lone Star Hoops recreational basketball league, jogs each morning in the local park, proudly supports the community
    baseball team the Hill County Barons, and occasionally joins a weekend fishing tournament at Lake Livingston.
  arts: John Gaumond’s artistic palate leans toward classic country icons like Johnny Cash, Willie Nelson, and Dolly Parton, and they never miss the annual Texas Folk Music Festival where they enjoy live
    gospel performances and traditional storytelling.
  travel: John Gaumond favors weekend road trips in their customized pickup, often heading to the Piney Woods for deer hunts or to Marfa for an art‑installations weekend, planning trips on the fly but always
    ensuring a backup route for emergency call‑outs.
  culinary: John Gaumond’s favorite dishes include Texas‑style smoked brisket seasoned with a rub of paprika, brown sugar, and garlic, complemented by jalapeño cornbread, and their grilling technique showcases
    a penchant for using hickory wood chips and a secret mustard base.
  core: John Gaumond is a high‑energy firefighter who balances a love for grunt‑work outdoor hobbies, spontaneous spending, and a competitive streak with a deeply rooted routine that rebels against strict
    planning, all while wrestling with intense anxiety and a penchant for late‑night barbecue experiments.
background:
  cultural: John was raised in a close‑knit, white, working‑class community in East Texas, where Southern Protestant values and Texan traditions shape daily life. He grew up with a strong sense of family,
    community service, and self‑reliance, frequently participating in church activities and local volunteer events. The region’s cultural staples—Friday night football, backyard barbecues, country music,
    and an appreciation for the outdoors—are integral to his identity. While rooted in traditional Texan customs, John respectfully embraces the multicultural tapestry of the state, incorporating Hispanic
    culinary influences into his cooking and engaging with diverse neighbors through his fire department duties.
