  career_goals: John aims to advance within his department to become a fire captain within the next five years, seeking a leadership role that offers more schedule stability for his family. He plans to
    earn Firefighter III and advanced EMT‑Paramedic certifications, and to complete a Hazardous Materials Technician course. John also aspires to develop a citywide fire‑prevention program that incorporates
    school drills and community workshops, and to serve as an instructor at the regional fire academy. His long‑term ambition is to shape a safer, more resilient community while establishing a predictable
    routine that helps him manage his anxiety.
