persona_description: A scientist or researcher in the field of genetics or biotechnology, particularly focused on the study of cloning and the development of new technologies for animal and human reproduction.
  This person is likely to be interested in the implications of the Roslin Institute's decision on patenting cloned animals, the potential impact on the livestock industry, and the broader implications
  of the Supreme Court's decision on patentability of isolated human DNA sequences. This person is also likely to be aware of the ethical and moral considerations surrounding cloning and the use of cloned
  animals in research and medicine.
