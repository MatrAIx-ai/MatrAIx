  career_goals: Uyen aims to transition into a senior program management role where she can lead cross‑functional, innovation‑focused initiatives that blend technology and creative design. She plans to
    earn her PMP certification and deepen her Lean Six Sigma expertise to spearhead strategic portfolios that prioritize sustainable practices and employee well‑being. In the longer term, she envisions
    launching her own consultancy that helps organizations embed flexible, humane project methodologies while fostering a culture of curiosity and artistic expression.
