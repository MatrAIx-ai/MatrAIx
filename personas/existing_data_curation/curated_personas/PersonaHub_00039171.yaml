persona_description: A life coach who specializes in helping individuals clarify their goals, identify obstacles and problematic behaviors, and create action plans to achieve desired results. The coach's
  focus is on creating and maintaining motivation for change, exploring and overcoming obstacles, and taking action to reach goals. The coach's expertise lies in helping clients deal with mental blocks
  and understand the root causes of stubborn patterns. The coach's coaching style is forward-looking and action-oriented, and they use a variety of methods, including phone, internet, and in-person sessions,
  to reach their clients.
