  career_goals: Although retired from formal employment, Natasha remains driven to contribute and grow. She plans to complete a digital photography workshop and create a photo‑essay of Baltimore’s historic
    Black neighborhoods. She hopes to write and self‑publish a memoir that captures her family’s Great Migration story and the city’s cultural evolution. At the local senior center she aspires to expand
    her mentorship program for youth volunteers, and she wants to spearhead a community garden that provides fresh produce to neighbors. Maintaining her health, deepening family bonds, and preserving local
    cultural heritage are core ambitions for the coming years.
