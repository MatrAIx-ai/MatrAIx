persona_description: A global survey researcher who is interested in understanding the impacts of alien invasive species on mountain regions and the perspectives of stakeholders. They are looking for insights
  on how invasive species affect ecosystem functions and services, human well-being, and their role in resource provisioning, human safety, human health, recreation, and culture. They are interested in
  the differences in perceptions of impacts between IPBES regions and stakeholder groups, as well as the sources of information guiding invasive species management. They are also interested in the involvement
  of different stakeholders in invasive species management and the funding mechanisms for such activities.
