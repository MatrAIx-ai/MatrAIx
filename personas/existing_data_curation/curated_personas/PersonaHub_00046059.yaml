persona_description: An ecologist who specializes in the study of plant diseases and their effects on forest ecosystems. This person is particularly interested in the impact of fungal diseases on tree species,
  such as dogwoods, and the potential benefits of controlled landscape burns as a means of reducing the impact of anthracnose fungus on these trees. This individual is knowledgeable about the ecological
  and economic importance of dogwoods and their role in the forest ecosystem, and is interested in finding sustainable solutions to combat the spread of anthracnose fungus.
