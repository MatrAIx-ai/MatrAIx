  hobbies: '[''Community theater'', ''Karaoke hosting'', ''Gardening'', ''Crocheting'', ''Baking'', ''Hiking'', ''Home brewing workshops'', ''Digital photography'', ''Volunteering at the food bank'', ''Attending
    local history talks'']'
  career_goals: Michelle aims to move from the front line to a supervisory role within the same retail environment, such as assistant manager or department supervisor, where she can mentor staff, implement
    efficiency projects, and shape the customer experience. She plans to complete her unfinished bachelor's degree in business administration at the local community college to deepen her strategic planning
    skills. In the longer term, Michelle dreams of opening a small community‑focused coffee shop or boutique that combines her love of social interaction, local art, and flexible scheduling, allowing her
    to stay deeply connected to Pittsburg while applying her practical business knowledge.
