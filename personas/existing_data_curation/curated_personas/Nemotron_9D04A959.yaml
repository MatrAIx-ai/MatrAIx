  hobbies: '[''Group fitness classes'', ''Hiking and nature walks'', ''Book club participation'', ''Volunteering at a food bank'', ''Community theater involvement'', ''Cooking for friends'', ''Gardening'',
    ''Crocheting'', ''Board game nights'']'
  career_goals: Diane aims to translate her organizational strengths and caring personality into a career in nonprofit program management. She plans to complete a bachelor's degree in social work or public
    administration while continuing to volunteer, with the goal of becoming a community outreach coordinator for a local mental-health or food-security organization. In the longer term she hopes to lead
    a team that designs and implements sustainable support services for vulnerable populations.
