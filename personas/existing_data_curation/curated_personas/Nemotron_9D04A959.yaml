personas:
  professional: A nonprofit program manager in training, Diane Resnick, 23, channels their associate's degree in Business Administration, meticulous scheduling and record-keeping abilities, and compassionate
    conflict-mediation style into coordinating volunteer events and community outreach, always adhering to reliable routines and planning ahead, and they pride themselves on turning organization into tangible
    community impact.
  sports: An active fitness enthusiast, Diane Resnick, 23, attends spin classes at a downtown studio, practices yoga at the community center, hikes the foothills of the Rockies on weekends, follows the
    Colorado Rockies and Denver Broncos, competes in the Fort Collins Running Club’s seasonal 5K events, and they channel their energetic, routine-oriented personality into regular physical activity.
  arts: A community-theater aficionado, Diane Resnick, 23, volunteers backstage for local productions of 'Our Town' and 'The Glass Menagerie', reads contemporary fiction by Chimamanda Ngozi Adichie in a
    book club, knits to the acoustic folk of John Denver, and they stream indie pop duo Tegan and Sara during board-game nights, intertwining their sociable, compassionate nature with creative expression.
  travel: An adventure-balanced traveler, Diane Resnick, 23, plans weekend road trips to mountain towns like Estes Park and Trinidad for hiking, saves for a future cross-country tour of the Grand Canyon,
    uses discount student flights and couch-surfing to keep costs low, and they prioritize itineraries that blend outdoor exploration with local festivals, reflecting their love of routine, social connection,
    and the outdoors.
  culinary: A home-cooking enthusiast, Diane Resnick, 23, cultivates a modest herb garden of basil, rosemary, and thyme, frequently prepares hearty quinoa-black-bean bowls, roasted sweet potatoes glazed
    with honey, and sea-salt-sprinkled chocolate chip cookies, and they host board-game evenings where they pair dishes with locally brewed craft beers, blending their organized meal-planning with a sociable,
    comforting atmosphere.
  core: An organized community-oriented planner, Diane Resnick, 23, blends Midwestern practicality and Colorado’s outdoor spirit into a life of careful budgeting, proactive self-care, and lively social
    gatherings, though they sometimes over-worry about minor details.
background:
  cultural: Diane was raised in a middle‑class, white, suburban family in the Midwest before moving to Fort Collins for college. Her upbringing emphasized practicality, reliability, and community service,
    reflecting broader mainstream American values. She identifies with a blend of Midwestern work ethic and the progressive, outdoor‑focused culture of northern Colorado, celebrating holidays and traditions
    with her family while embracing the region’s emphasis on volunteerism and environmental stewardship.
