  career_goals: Hitomi aims to complete her associate’s degree in Business Administration and later pursue a bachelor’s degree in Finance. She plans to obtain a Certified Financial Services Counselor (CFSC)
    credential within the next three years, positioning herself for a transition to a personal banker role. Over the next five to seven years she targets a branch manager position, where she can lead a
    team and develop community‑focused financial products. Her competitive drive pushes her to exceed performance metrics, while her sociable nature fuels a desire to mentor newer tellers and enhance customer
    relationships, especially within the growing Asian‑American community in Harford County.
