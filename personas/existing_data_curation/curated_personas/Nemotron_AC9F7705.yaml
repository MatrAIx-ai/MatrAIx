  career_goals: Although still early in her schooling, Amy dreams of a future that combines her love of the ocean with her analytical mindset. She aspires to become a marine biologist or environmental scientist
    to study coastal ecosystems and contribute to conservation efforts. She is also interested in science outreach or teaching, hoping to share her curiosity with younger students. In the short term, she
    aims to excel in science classes, join a school environmental club, and participate in local beach clean‑up projects.
