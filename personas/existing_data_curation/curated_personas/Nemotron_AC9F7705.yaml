personas:
  professional: Amy Porter is an aspiring marine biologist‑in‑training who blends her love for tide‑pool exploration with practical Scratch programming to create simple interactive marine life simulations,
    channeling her curiosity and practicality while occasionally leaving sketches unfinished due to a relaxed, disorganized approach.
  sports: Amy Porter swims three times a week with the Seabrook Sharks youth swim club, joins casual beach‑volleyball games in summer, cheers for the Seattle Mariners baseball team, and prefers relaxed,
    fun‑focused exercise over intense competition, often sketching their own workout plans that get misplaced.
  arts: Amy Porter spends afternoons sketching detailed seashells and fish after studying marine artist Wyland’s murals, reads adventure novels by Jules Verne and sci‑fi classics by Isaac Asimov, writes
    short stories inspired by author Becky Albertalli, and listens to a mix of Billie Eilish, Imagine Dragons, and the whimsical songs of They Might Be Giants while drawing.
  travel: Amy Porter favors low‑key, family‑oriented beach getaways, having explored the tide‑rich coves of Sunset Cove and visited the Monterey Bay Aquarium on a school field trip, they dream of snorkeling
    the Great Barrier Reef and strolling the lavender fields of Provence, preferring simple itineraries sketched on notebook paper over elaborate bookings.
  culinary: Amy Porter loves fresh coastal meals, often helping their family grill salmon seasoned with lemon, dill, and sea salt, make shrimp tacos with corn tortillas, avocado, and cilantro, and stir
    a creamy clam chowder with potatoes and thyme, while their favorite snack is a strawberry‑banana smoothie blended with Greek yogurt.
  core: Amy Porter is a quiet, curiosity‑driven tide‑pool explorer who blends sketching, coding, and storytelling into a solitary yet cooperative world, often misplacing their notebooks but always returning
    to the sea for inspiration.
background:
  cultural: Amy grew up in a predominantly white, middle‑class family in Seabrook, New Hampshire, a small coastal community with deep New England roots. Her ancestry includes Anglo‑American and Irish heritage,
    and the local culture values modesty, self‑reliance, and respect for nature. Community traditions such as beach clean‑ups, Fourth of July parades, and school fairs have shaped her sense of civic responsibility.
    The coastal lifestyle—fishing, sailing, and a strong connection to the Atlantic shoreline—infuses her daily life and informs her emerging interest in marine conservation.
