  hobbies: '[''Reading young adult fiction'', ''Journaling'', ''Sketching and illustration'', ''Cooking traditional Mexican dishes'', ''Gardening (cacti and succulents)'', ''Volunteering at community center'',
    ''Listening to music (regional Mexican, pop)'']'
  career_goals: Gricell aims to graduate high school with strong grades and earn a scholarship to study a health‑oriented field such as nursing, public health, or social work. She wants to combine her bilingual
    abilities, organizational strengths, and compassionate disposition to become a bilingual health educator or community outreach coordinator who supports underserved Mexican‑American families in Phoenix.
    In the long term, she envisions working in a community clinic or nonprofit organization, helping individuals navigate health resources and promoting preventive care.
