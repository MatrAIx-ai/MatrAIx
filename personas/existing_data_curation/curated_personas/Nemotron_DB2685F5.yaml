  career_goals: Although retired, Miguel aims to channel his practical skills into volunteer work at the local senior center, offering home‑repair workshops for low‑income seniors and mentoring younger
    immigrants on basic household maintenance. He also aspires to document his family's traditional recipes in a small community cookbook, preserving Peruvian culinary heritage for future generations. On
    a personal level, he wants to improve his digital literacy to stay connected with distant relatives and to use telehealth resources for managing his anxiety and grief.
