personas:
  professional: Miguel Adames, a 66‑year‑old retired building caretaker in Newark, leverages decades of hands‑on maintenance expertise and fluent bilingual communication to run free home‑repair workshops
    for low‑income seniors, while mentoring newcomers on essential household fixes, balancing his curiosity for new solutions with a practical, organized approach.
  sports: Miguel Adames follows the soccer club Club Universitario passionately, watches broadcast matches on weekends, joins a local senior walking group that meets at the park for light cardio, and supports
    the Newark Bears minor league baseball team, maintaining his health through daily strolls in the nearby gardens.
  arts: Miguel Adames is an avid listener of música criolla, particularly the classic songs of Chabuca Granda, and teaches traditional folk dances to younger community members one‑on‑one, while occasionally
    attending community theater productions featuring Latin American playwrights such as Eduardo Pavlovsky.
  travel: Miguel Adames enjoys planning low‑cost visits to historic coastal towns like Trujillo and the highland city of Cusco during holidays, but currently focuses on regional trips to New York’s botanical
    gardens and weekend drives to the Hudson Valley, balancing his love for adventure with a modest travel budget and family obligations.
  culinary: Miguel Adames devotes hours to perfecting his signature lomo saltado, causa rellena, and chupe de camarón, using aji amarillo, cilantro, and freshly harvested chilies from his balcony garden,
    though his occasional tendency to over‑salt the ceviche reveals his relentless pursuit of flavor perfection.
  core: Miguel Adames is a retired building caretaker whose methodical expertise, love for traditional coastal cooking, and earnest yet anxious nature drive him to quietly serve his community through hands‑on
    workshops, diligent budgeting, and heartfelt family gatherings.
background:
  cultural: Miguel was born in the coastal city of Trujillo, Peru, and immigrated to the United States in his early 30s, joining a close‑knit Peruvian diaspora in Newark. He grew up with Andean folklore,
    Catholic traditions, and a strong emphasis on family meals, particularly the preparation of ceviche and ayacucho‑style roasts. In Newark, he maintains these traditions through community celebrations
    of Día de la Canción Criolla and by cooking for neighbors during holidays. His heritage informs his values of hospitality, resilience, and respect for communal ties, while his experience as an immigrant
    shapes his practical, adaptable outlook on life.
