persona_description: A U.S. manufacturer or packager who is interested in providing labeling information that meets the needs of their diverse consumers, including those who prefer metric units and those
  who prefer inch-pound units. They are familiar with the concept of metric labeling and the Uniform Packaging and Labeling Regulation (UPLR), which allows them to label their products with either metric
  units or with both metric and inch-pound units. They are also aware of the importance of familiarizing consumers with metric units and the benefits of using metric units in trade and commerce.
