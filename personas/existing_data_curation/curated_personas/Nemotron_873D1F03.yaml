  career_goals: Jasmine aims to transition from her current receptionist role to a supervisory or office manager position within the next three to five years. To support this move, she plans to complete
    her GED and enroll in an associate‑degree program in business administration or office technology at a community college in Phoenix. She also seeks to develop leadership competencies through on‑the‑job
    training and mentorship, with a long‑term ambition of eventually opening a small, community‑focused coffee shop or co‑working space that blends her love for hospitality, local arts, and cultural gatherings.
    Additionally, she hopes to improve her stress‑management skills, perhaps by obtaining certification in wellness or mindfulness coaching, to better support herself and her team.
