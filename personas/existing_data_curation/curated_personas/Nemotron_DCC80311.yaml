  career_goals: Myra aims to complete her undergraduate degree in art history, turning her long‑standing curiosity into formal credentials. She aspires to curate a yearly community art showcase in Elk Grove
    that highlights emerging local artists and promotes cultural dialogue. Publishing a memoir that intertwines her personal journey with reflections on art and quiet living is another ambition. In the
    longer term, she hopes to become a certified docent at a regional museum, sharing her knowledge while continuing to mentor younger volunteers in project management and archival practices.
