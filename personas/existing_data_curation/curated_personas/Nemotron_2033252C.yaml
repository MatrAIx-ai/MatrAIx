personas:
  professional: Khamil Canty, a seasoned land surveyor and GIS specialist with four decades of field, GPS, and remote-sensing expertise, blends meticulous data accuracy with a storyteller’s curiosity, delivering
    heritage-focused maps that balance practical utility with cultural depth, and they mentor junior technicians while championing equitable land-use planning.
  sports: Khamil Canty favors low-impact activity, joining the Gwinnett County Heritage Walking Club for early-morning hikes, cheering the Atlanta Falcons on Sundays and the Atlanta Braves in the spring,
    and occasionally playing casual ping-pong at the community center, while they avoid high-intensity gym routines due to knee discomfort.
  arts: Khamil Canty nurtures a quiet creative side through landscape photography inspired by Ansel Adams, devotes evenings to reading Southern literature by William Faulkner and contemporary works on African-American
    history, attends the local history museum’s rotating exhibit on regional art, and they enjoy listening to folk guitarist James Taylor while editing photos in ArcGIS.
  travel: Khamil Canty prefers meticulously planned road trips that combine historic site visits with leisurely garden stops, having explored Savannah’s historic squares, the civil-rights landmarks of Montgomery,
    and dreaming of a future pilgrimage to Ghana’s Cape Coast Castle, while they favor mid-week travel to avoid crowds and keep expenses manageable on a fixed retirement budget.
  culinary: Khamil Canty delights in farm-to-table cooking, regularly preparing heirloom tomato gazpacho, sautéed collard greens with smoked turkey, and peach cobbler spiced with cinnamon, and they tend
    a modest vegetable garden where they harvest sweet potatoes and okra, though they sometimes over-salt dishes in an effort to compensate for diminished taste buds.
  core: Khamil Canty is a methodical yet curious GIS veteran who balances precise mapping work with a solitary love of photography, garden stewardship, and quiet community mentorship, while occasionally
    indulging in camera gear splurges and neglecting scheduled physiotherapy.
background:
  cultural: Khamil grew up in the Atlanta suburbs during the civil‑rights era, where the African‑American church and community organizations played a central role in shaping his values. The rich cultural
    tapestry of the South—its music, cuisine, storytelling traditions, and a deep respect for family—has remained a constant influence throughout his life. As a lifelong resident of Gwinnett County, he
    has witnessed the rapid demographic changes of the region and values preserving the historical narratives of Black neighborhoods through his mapping work. His heritage informs his commitment to documenting
    places of cultural significance, ensuring that the stories of his community are reflected accurately on the modern map.
attributes:
  skills: '[''Land surveying'', ''GPS/GNSS data collection'', ''Geographic Information Systems (GIS) analysis'', ''Remote sensing interpretation'', ''Cartographic design'', ''CAD drafting'', ''Technical
    report writing'', ''Project coordination'', ''Data quality assurance'', ''Historical and cultural mapping'']'
  hobbies: '[''Landscape photography'', ''Gardening'', ''Reading historical and literary works'', ''Birdwatching'', ''Playing chess'', ''Woodworking'', ''Volunteer community mapping'', ''Attending small
    heritage tours'', ''Listening to jazz and gospel music'', ''Cooking Southern soul food'']'
  career_goals: Khamil aims to transition from day‑to‑day field work to a mentorship and consultancy role that allows him to share his decades‑long knowledge with emerging technicians. He hopes to lead
    a small team on community‑focused mapping projects that document and preserve African‑American historic sites in Gwinnett County, while also pursuing professional certification as a GIS Professional
    (GISP) to formalize his expertise before he retires. Ultimately, he envisions his work contributing to more equitable land‑use planning and serving as a lasting resource for local historians and planners.
