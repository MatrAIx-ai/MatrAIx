  hobbies: '[''Gardening'', ''Cooking Puerto Rican dishes'', ''Salsa dancing'', ''Reading historical fiction'', ''Hiking'', ''Podcast listening'', ''Chess'', ''After‑school tutoring volunteer'', ''DIY home
