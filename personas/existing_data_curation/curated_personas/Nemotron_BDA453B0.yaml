  career_goals: Anyel aims to transition from daily driving to a leadership role within the district’s transportation department. She plans to complete her associate degree in transportation management,
    obtain driver‑trainer certification, and spearhead a pilot program introducing electric school buses and GPS‑based route analytics in Fitchburg. Additionally, she hopes to mentor new drivers, develop
    safety workshops for students and parents, and eventually serve as a safety coordinator, blending her practical experience with her curiosity for emerging mobility solutions.
