  hobbies: '["Gardening herbs and chilies","Participating in local food festivals","Playing dominoes with friends","Attending Texas Rangers baseball games","Listening to mariachi and country music","Dancing
    salsa and cumbia","Fishing on local lakes","Woodworking for kitchen tools"]'
  career_goals: Luis aims to solidify his reputation as a culinary bridge between his Mexican roots and the Texas food scene by publishing a family‑recipe cookbook and hosting community cooking workshops.
    He hopes to mentor the next generation of chefs at local culinary schools, win a state‑level cooking competition to showcase his signature dishes, and eventually transition into a consulting role that
    allows him to influence menu concepts across multiple restaurants while still holding a hands‑on presence in the kitchen he loves.
