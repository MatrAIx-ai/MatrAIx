    Troubleshooting (Hardware, Software)'', ''Educational Research and Publication'']'
  hobbies: '[''Sketching and Drawing'', ''Acoustic Guitar Playing'', ''Reading Science Fiction & Popular Science'', ''Model Rocket Building'', ''Woodworking Projects'', ''Hiking in the Appalachian Foothills'',
    ''Gardening (Herbs and Vegetables)'', ''Chess and Puzzles'', ''Photography (Landscape and Macro)'', ''Community Maker Workshops'', ''Local Theater Attendance'']'
  career_goals: Kenneth aims to become a department chair and eventually a school administrator, using his leadership skills to champion STEAM integration across the district. He plans to pursue a master's
    degree in Educational Leadership to deepen his understanding of curriculum policy and school management. His long‑term ambition includes establishing a community makerspace that partners local manufacturing
    firms with high‑school students, securing sustainable grant funding, and publishing research on the impact of art‑infused STEM instruction. He also hopes to mentor a cohort of teachers in innovative
    pedagogy, contributing to a culture of continuous improvement within his school and the broader Tuscarawas County education community.
