persona_description: A neurologist who specializes in the diagnosis and treatment of neurological diseases, particularly those that can mimic psychiatric conditions. They have a deep understanding of the
  neurological and psychiatric disorders, and are skilled in the use of paraclinical research methods to accurately assess the neurological status of patients. They are aware of the importance of not only
  the neurological manifestations of neurological diseases but also their mental manifestations, and have a comprehensive approach to helping patients. They collaborate closely with psychiatrists to provide
  effective treatment for neurologically ill patients.
