personas:
  professional: Jose Pomares, a methodical nine‑year‑old, channels his love for structure into leading his after‑school soccer team and meticulously planning elaborate LEGO builds, dreaming of becoming
    a future architect or youth coach.
  sports: Jose Pomares chases every after‑school soccer game with the local Little Legends Soccer Club, idolizes FC Barcelona and follows the MLS team LA Galaxy, while also dabbling in weekend basketball
    at the community park during the winter months.
  arts: Jose Pomares blends his imagination and rhythm by sketching cartoon characters from shows like 'SpongeBob SquarePants', constructing detailed LEGO cityscapes, and dancing to cumbia hits by Los Ángeles
    Azules and reggaeton tracks from Bad Bunny, which shape his creative downtime.
  travel: Jose Pomares loves the predictability of family road trips, planning each stop on a hand‑drawn map that includes the nearby state park's picnic area and dreaming of future adventures to the beaches
    of Costa Rica and the historic streets of Granada.
  culinary: Jose Pomares enjoys the hands‑on role of flipping pupusas filled with cheese, loroco and pork during weekend kitchen sessions, while also mastering the art of making peanut butter‑banana sandwiches,
    and proudly flavors his LEGO‑themed birthday cake with chocolate sprinkles.
  core: Jose Pomares is an organized, sociable nine‑year‑old who balances soccer, LEGO engineering, and family cooking while secretly hoarding extra change for his next big build.
background:
  cultural: Jose is a first‑generation American of Salvadoran descent. His parents immigrated from El Salvador and preserve many traditions at home, such as speaking Spanish, celebrating holidays like Semana
    Santa and Día de la Madre, and preparing dishes like pupusas and yuca frita. Living in Pacoima, he blends his Salvadoran heritage with the multicultural environment of Los Angeles, participating in
    community festivals, neighborhood soccer games, and school activities that reflect both cultures.
attributes:
  skills: '[''Organizational abilities'', ''Reliability in teamwork'', ''Bilingual Spanish‑English'', ''Basic computer usage'', ''Following procedural instructions'', ''LEGO construction'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing'', ''Listening to Salvadoran music'', ''Cooking with family'', ''Church youth group activities'']'
  career_goals: Jose dreams of becoming a community‑focused leader, such as a teacher or a city planner, who can create safe, organized spaces for kids in Pacoima. He imagines designing playgrounds and
    community centers that blend his love for structure with his desire to help others. In the long term, he hopes to study engineering or education so he can turn his ideas into reality and give back to
    his neighborhood.
