  hobbies: '[''Reading medical journals'', ''Science‑fiction literature'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Texas Hill Country'', ''Herb gardening'', ''Amateur photography'', ''Volunteering
    at community health fairs'']'
  career_goals: Raúl aims to expand access to high‑quality primary care for underserved Hispanic neighborhoods in Bexar County. He envisions establishing a community health clinic that integrates culturally
    responsive services, telemedicine, and preventive education. Over the next five years, he hopes to secure research funding to study diabetes prevention strategies tailored to Mexican‑American lifestyles,
    mentor medical students from similar backgrounds, and assume a leadership role in a regional health equity coalition. His ambitions balance curiosity about innovative care models with the practical
    need for sustainable, community‑focused health solutions.
