  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Coastal birdwatching'', ''Gardening in community plot'', ''Walking the Monterey Bay shoreline'', ''Volunteer tutoring for STEM students'',
    ''Senior center bridge club'', ''Participating in local cultural festivals'']'
  career_goals: Although retired, Eugenio aims to leave a lasting impact by establishing a scholarship for Mexican‑American students pursuing STEM degrees in Monterey County and by leading a weekly STEM
    mentorship program at the local senior center. He also plans to author a memoir that blends his engineering career with stories of his cultural heritage, and he seeks to stay competitively sharp by
    topping the senior bridge tournament rankings each season.
