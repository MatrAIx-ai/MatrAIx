  hobbies: '[''Building towers with wooden blocks'', ''Sandbox and beach sand play'', ''Singing and dancing to children’s songs'', ''Watching animated adventure shows'', ''Drawing and coloring with crayons'',
    ''Kicking a soft soccer ball'', ''Pretend role‑play (firefighter, chef, explorer)'', ''Reading picture books with parents'', ''Participating in playdates'']'
  career_goals: Even at his age, Michael imagines himself in future roles that combine his love for helping others and his fascination with adventure. He often talks about becoming a firefighter because
    he admires the bright trucks and the idea of keeping people safe. He also expresses a desire to read storybooks on his own, to explore nature on beach outings, and to be a friend who can make others
    smile. His parents nurture these ambitions by providing books, building sets, and safe exploration opportunities, while also maintaining predictable daily routines that help him manage his occasional
    worries about new experiences.
