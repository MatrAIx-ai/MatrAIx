personas:
  professional: Michael Tallent, a three‑year‑old with a budding passion for building, channels curiosity and practicality into daily block‑construction sessions, reliably sorting pieces by size while energetically
    leading peers in collaborative play, and when they assert their ideas, brief squabbles sometimes arise.
  sports: Michael Tallent loves watching the city’s professional baseball team, the Tigers, during family outings, proudly wears their cap, and they chase the ball with boundless energy each week at the
    Tiny Tykes Soccer Club.
  arts: Michael Tallent delights in the catchy tunes of Sesame Street and the animated adventures of Peppa Pig, sings along to the Baby Shark song, beams when watching Pixar’s Toy Story, and they often
    request the "Let It Go" performance by Idina Menzel during playtime.
  travel: Michael Tallent prefers short, family‑friendly road trips to familiar spots like the local zoo and the beach, dreams of a future adventure at Walt Disney World in Orlando, and they eagerly pack
    a tiny backpack with snacks and a favorite stuffed animal for every journey.
  culinary: Michael Tallent adores macaroni and cheese made with sharp cheddar, delights in chicken nuggets coated in breadcrumbs, insists on adding a drizzle of ketchup to their scrambled eggs, and they
    proudly attempt to stir pancake batter using a wooden spoon.
  core: Michael Tallent, a three‑year‑old bundle of curiosity and practicality, thrives on structured play yet worries about the unknown, leads peers with energetic confidence, and they sneak extra cookies
    when no one watches.
background:
  cultural: Michael is raised in a middle‑class white family in Fort Lauderdale, Florida, where the year‑round warm climate and coastal lifestyle shape many of his daily experiences. His family celebrates
    mainstream American holidays such as Thanksgiving, Christmas, and the Fourth of July, often incorporating beach picnics and outdoor gatherings that reflect the local culture. While his household primarily
    follows typical American customs, the diverse community of Broward County exposes him to a variety of languages, foods, and traditions, fostering an early appreciation for multiculturalism. His parents,
    who have European ancestry, value both structured routines—providing the security Michael seeks—and opportunities for open-ended play that satisfy his curiosity and sociable nature.
attributes:
  skills: '[''Running and climbing'', ''Fine motor coordination (stacking blocks, linking rings)'', ''Early language development (vocabulary ~500 words, simple sentences)'', ''Counting 1‑10'', ''Color and
