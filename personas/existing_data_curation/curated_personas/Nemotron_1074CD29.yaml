  career_goals: Although officially retired, Eric is driven to leave a lasting intellectual and artistic legacy. He plans to author a memoir that intertwines his engineering career with his lifelong love
    of art, aiming to publish it through a regional university press. He also intends to curate a community exhibition of his landscape photography, highlighting the Palouse’s subtle beauty. In parallel,
    Eric seeks to formalize a volunteer mentorship program at Washington State University, where he will coach undergraduates in data analysis and research ethics, setting clear performance metrics to satisfy
    his competitive streak. To counterbalance his tendency toward worry, he has enrolled in a mindfulness‑based stress reduction certification, hoping to achieve personal well‑being alongside these public
    contributions.
