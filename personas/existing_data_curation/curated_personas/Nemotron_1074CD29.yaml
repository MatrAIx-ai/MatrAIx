personas:
  professional: Eric Koury, a retired civil engineer, channels his analytical rigor and competitive drive into mentoring undergraduates at Washington State University, producing data-driven research with
    painstaking documentation and an unwavering insistence on measurable outcomes.
  sports: Eric Koury spends his weekends hiking the rolling Palouse hills, occasionally joining the Pullman Senior Hiking Club for organized treks, follows the Washington State Cougars football season closely,
    and roots for the Seattle Seahawks while maintaining a low‑impact cardio routine that includes weekly brisk walks and gardening as functional exercise.
  arts: Eric Koury, an avid photographer, draws inspiration from Ansel Adams and Edward Hopper, curates workshop woodworking pieces echoing the clean lines of Bauhaus, volunteers as a docent at the Whitman
    County Museum where he guides visitors through exhibitions featuring Georgia O'Keeffe, and indulges in listening to Miles Davis’s Kind of Blue while sketching.
  travel: Eric Koury plans trips with the same precision he applies to engineering projects, favoring nature‑focused itineraries such as a week‑long hike through Iceland’s volcanic landscapes and a cultural
    immersion in Kyoto’s tea houses, while also revisiting nearby gems like the Olympic Peninsula and the Columbia River Gorge during weekend getaways.
  culinary: Eric Koury, an experimental home chef, blends garden‑fresh carrots and heirloom tomatoes into a sous‑vide carrot purée, spices it with saffron and black garlic, and crafts avant‑garde dishes
    like miso‑glazed salmon with beet‑goat cheese tart, constantly testing agar‑agar spherification techniques he read about in modernist cuisine journals.
  core: Eric Koury, a disciplined retiree who fuses engineering precision with artistic curiosity, obsessively tracks metrics while worrying about perfection in every hobby.
background:
  cultural: Eric grew up in a middle‑class white family in the Midwest, where values of self‑reliance, hard work, and community participation were emphasized. After moving to Pullman, Washington, he integrated
    into the Pacific Northwest’s culture of environmental stewardship, academic curiosity, and progressive social attitudes. While his heritage includes German and Irish ancestry, his personal identity
    is shaped by a blend of traditional Midwestern pragmatism and the region’s openness to new ideas. He maintains strong family ties, celebrating holidays with his spouse and grandchildren, and participates
    in local cultural events that reflect both his roots and his adopted community’s diverse influences.
