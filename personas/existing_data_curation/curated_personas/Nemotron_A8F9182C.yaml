personas:
  professional: Tabetha Flux, an aspiring digital storyteller and budding young creator, merges imaginative sketching of fantastical beasts with Scratch programming to craft interactive comic adventures,
    approaching each project with boundless curiosity, flexible planning, and a compassionate desire to share joy with peers.
  sports: Tabetha Flux, an enthusiastic member of the local youth soccer club “Riverdale Runners” and a casual fan of the regional basketball team the “Hometown Hawks”, spends weekends exploring forest
    trails, collects pinecone textures for art, and balances active play with a love for building LEGO sets during rainy days.
  arts: Tabetha Flux, a creative prodigy who fills sketchbooks with Ghibli‑inspired creatures, playlists indie folk tracks from Bon Iver, Mumford & Sons, and Phoebe Bridgers while painting on a tablet,
    and showcases their comic strips at the school art fair, often borrowing visual motifs from Studio Ghibli and the works of Hayao Miyazaki.
  travel: Tabetha Flux, a curious wanderer who has trekked through the nearby state forest, photographed mossy log textures, and dreams of visiting Yosemite’s towering sequoias and the misty landscapes
    of Scotland’s Isle of Skye, prefers spontaneous road trips over rigid itineraries, and saves allowance pennies for future family camping adventures.
  culinary: Tabetha Flux, a budding home‑chef who loves whipping up quick banana‑cinnamon pancakes topped with fresh blueberries, enjoys classic pepperoni pizza, experiments with making simple sushi rolls
    using cucumber and avocado, and favors snack combos of apple slices and peanut butter during sketching marathons.
  core: Tabetha Flux, a restless 12‑year‑old dream‑weaver, fuses sketchbooks, LEGO bricks, and Scratch code into vivid worlds, juggles scattered notebooks and friendship bracelets, and habitually forgets
    to finish chores, yet radiates compassion in every collaboration.
background:
  cultural: Tabitha’s cultural background is rooted in the Midwestern values of small‑town Ohio. Growing up in Batavia, Clermont County, she experiences a close‑knit community where neighborly cooperation,
    modesty, and a love for local traditions such as county fairs, seasonal festivals, and backyard barbecues are commonplace. Her family’s heritage reflects typical white American cultural norms, with
    celebrations of holidays like Thanksgiving, Fourth of July, and Christmas emphasizing family gatherings and community involvement. The rural landscape, with its fields, forests, and the nearby Ohio
    River, nurtures her appreciation for nature, which feeds into her imaginative pursuits. At school, she participates in community service and art clubs that reinforce a collaborative spirit and a desire
    to help others.
