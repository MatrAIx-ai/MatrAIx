  career_goals: She dreams of turning her love for art and storytelling into a career that also helps others. Tabitha hopes to become a children’s book author and illustrator, creating stories that foster
    compassion and imagination. She also envisions working as a community arts coordinator or educational content creator, designing workshops and interactive media that encourage creativity in young people.
    To achieve these goals, she plans to attend art-focused summer programs, improve her drawing and coding skills, and eventually pursue a high‑school visual‑arts track followed by a degree in illustration
    or game design.
