personas:
  professional: Lara Linero, a diligent building cleaner, leverages her expertise in carpet extraction, floor polishing, and green‑cleaning protocols to keep a high‑rise complex spotless while meticulously
    managing inventory logs and safety checklists, and she is already charting a path toward a certified janitorial supervisor credential to transition into a low‑stress supervisory role.
  sports: Lara Linero enjoys leisurely weekend walks in nearby parks, participates in a community walking club on Saturdays, tunes in to Miami Heat NBA games and Inter Miami CF soccer matches, and occasionally
    joins a low‑impact Zumba class to add variety to her fitness routine.
  arts: Lara Linero unwinds to classic cumbia and vallenato while cooking, favoring artists such as Carlos Vives, Shakira, and Juanes, binge‑watches telenovelas like "La Usurpadora," and immerses herself
    in contemporary fiction by Sally Rooney and self‑help titles like "The Power of Now," which together shape her emotional coping toolkit.
  travel: Lara Linero favors short, budget‑friendly getaways to coastal Florida beaches and Caribbean islands for relaxation, has a wish list that includes a pilgrimage to her hometown in Colombia to reconnect
    with roots, and dreams of exploring New York City's museums and Broadway shows when finances allow.
  culinary: Lara Linero expertly prepares traditional dishes such as bandeja paisa—featuring chicharrón, black beans, rice, avocado, and a fried egg—and fluffy arepas stuffed with cheese, seasoning them
    with fresh cilantro and oregano from her balcony garden, while occasionally experimenting with sushi rolls for a culinary treat.
  core: Lara Linero blends meticulous organization with a quiet love for solo hobbies, soothing anxiety through yoga and cooking, while secretly indulging in impulse purchases of gourmet foods and dreaming
    of a future where she leads a small cleaning team on her own terms.
background:
  cultural: Lara was born to Colombian immigrant parents who settled in New York before moving to Bridgeport when she was a child. She grew up speaking Spanish at home and celebrating Colombian customs,
    such as Carnaval de Barranquilla, Día de la Independencia, and family gatherings centered around food and music. The Catholic faith, passed down by her family, informs many of her values, including
    respect for elders and a strong sense of community. While she has adapted to American life—attending public high school, working in the local service sector, and integrating into the multicultural fabric
    of Fairfield County—she maintains a bicultural identity. Her Colombian heritage influences her cooking, language, and social interactions, while her American upbringing shapes her emphasis on punctuality,
    structure, and personal responsibility. Lara frequently visits a local Colombian social club and keeps close ties with relatives in Bogotá, sending remittances and staying connected through video calls.
attributes:
  skills: '[''Cleaning and sanitation'', ''Floor care'', ''Chemical safety and PPE usage'', ''Inventory management'', ''Schedule coordination'', ''Basic maintenance (light fixtures, filters)'', ''OSHA compliance
    knowledge'', ''Bilingual communication (Spanish/English)'', ''Record keeping and documentation'', ''Customer service in small group settings'']'
  hobbies: '[''Cooking traditional Colombian dishes'', ''Listening to music'', ''Reading contemporary fiction'', ''Gardening on balcony'', ''Yoga and meditation'', ''Walking in local parks'', ''Watching
    telenovelas'', ''Knitting'', ''Volunteering at community center'']'
  career_goals: Lara aims to progress within the facilities services field while maintaining a predictable and low‑stress work environment. Over the next few years she plans to obtain a certified janitorial
    supervisor credential, such as an IICRC or OSHA 10‑hour certification, which would qualify her for a lead‑janitor or floor‑supervisor position in a larger property management company. In parallel she
    hopes to enroll in evening courses to earn an associate degree in facilities management or business administration, eventually enabling her to oversee multiple sites or launch a small cleaning enterprise
    with her husband. A key personal ambition is to secure a stable, daytime schedule that allows her to spend evenings with her family, help with childcare, and send regular remittances to relatives in
    Colombia.
