  career_goals: Although approaching retirement, Omar plans to continue working part‑time to stay active and maintain a steady income for his modest expenses. He aims to earn a Green Cleaning Certification
    so he can advise his employer on eco‑friendly products and methods. Over the next few years he hopes to transition into a supervisory role, where he can formalize his mentorship of younger custodial
    staff and ensure that safety and quality standards are upheld. Beyond his job, Omar wishes to volunteer with the local senior center, offering cleaning assistance and organizing community‑clean‑up events,
    thereby giving back to the neighborhood he has served for many decades.
