  hobbies: '[''Gardening'', ''River Trail walking'', ''Reading historical fiction'', ''Writing personal essays'', ''Playing piano'', ''Cooking'', ''Set painting for local theater'', ''Volunteering at food
    pantry'']'
  career_goals: Joshua aims to solidify his legacy by establishing a modest community art center in Rochester that offers free workshops for seniors and underserved youth. He hopes to secure recurring funding
    through local arts grants and partnerships with city cultural agencies, ensuring the program's sustainability. Additionally, he plans to curate a retrospective exhibition of his work that highlights
    the evolution of his style from figurative realism to abstract expressionism, and to develop an online archive that makes his portfolio accessible to a broader audience.
