persona_description: A processor who specializes in making natural and co-extruded sausages, with a focus on using cellulose casings for smoking and flavoring, and using non-permeable casings for removing
  skinless hot dogs and sausages. The processor is knowledgeable about the different types of casings available and their use in different parts of the sausage making process, and is interested in finding
  the right casing for a given application based on factors such as the product's skin status, the need for smoking or flavoring, and whether the casing will be removed by the consumer or not. The processor
  is also interested in the latest developments in casing materials, such as co-extrusion lines that offer a greater choice in casings.
