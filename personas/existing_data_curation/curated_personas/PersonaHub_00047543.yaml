persona_description: A former member of the Royal Irish Rifles who experienced the horrors of World War I and wrote about his survival in a memoir titled "There’s a Devil in the Drum". The memoir describes
  his experiences during the Great War, including his brother's death, the battles of Mons and Le Cateau, the retreat to the Marne, and the Battle of the Aisne, where his battalion virtually ceased to exist.
  He was also sent to Ypres, where his reinforced battalion suffered the same fate again. The memoir is considered among the best of published war memoirs.
