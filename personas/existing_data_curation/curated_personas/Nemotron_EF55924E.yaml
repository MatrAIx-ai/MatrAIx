personas:
  professional: Jonathan Lattimer is a budding robotics enthusiast who spends weekends engineering LEGO Technic models, augmenting them with custom 3D‑printed gears, and coding simple Scratch games that
    showcase their analytical mind and disciplined approach to problem‑solving.
  sports: Jonathan Lattimer trains with the Bayview Beach Swim Club during summer, competes in regional age‑group swim meets, and roots for the San Diego Padres while also following the Los Angeles Lakers'
    basketball season, embodying a disciplined yet low‑key sports enthusiasm.
  arts: Jonathan Lattimer unwinds by listening to classic hip‑hop legends like A Tribe Called Quest, Nas, and Erykah Badu, while also sketching LEGO‑inspired designs and occasionally attending local open‑mic
    R&B sessions, allowing structured creativity to shape their artistic identity.
  travel: Jonathan Lattimer prefers meticulously planned weekend road trips, having already visited the Monterey Bay Aquarium and the historic shipyard in San Diego, and dreams of attending the RoboJam
    Expo in Hakone, Japan, balancing a love for marine exploration with a fascination for cutting‑edge robotics.
  culinary: Jonathan Lattimer enjoys assisting with family meals, methodically measuring ingredients for dishes like spaghetti carbonara, guacamole, and grilled salmon, and takes pride in perfecting the
    timing of each step, though they sometimes get distracted by tweaking LEGO mechanisms mid‑cook.
  core: Jonathan Lattimer blends a love for precise LEGO engineering, disciplined budgeting, and structured learning with a quiet confidence that hides a penchant for late‑night coding marathons and occasional
    sleep‑deprived slip‑ups.
background:
  cultural: Jonathan is a Black teenager raised in Pensacola, Florida, within a close‑knit family that values education, community, and faith. His family has deep roots in the Gulf Coast region, participating
    in local traditions such as church gatherings, Juneteenth celebrations, and the annual Pensacola Beach Festival. The Southern African American heritage of storytelling, resilience, and collective support
    shapes his worldview and his emphasis on personal achievement. Exposure to the maritime culture of the area—through the nearby Naval Air Station and local fishing community—has sparked his interest
    in marine science and engineering. These cultural influences, combined with the supportive network of friends, teachers, and mentors, reinforce his disciplined approach to schooling and his aspiration
    to give back to his community.
attributes:
  skills: '["Mathematics (pre‑algebra and geometry)", "Scientific reasoning (environmental science)", "Organizational planning and time management", "Basic coding (Scratch)", "Problem solving (chess and
    puzzles)", "Effective communication in small groups", "Presentation of research projects"]'
  hobbies: '["Building LEGO Technic sets", "Scratch coding", "Chess", "Reading non‑fiction (technology, history, marine science)", "Swimming", "Community robotics club", "Listening to classic hip‑hop and
    R&B", "Cooking with family"]'
  career_goals: Jonathan aims to attend a rigorous STEM‑focused high school and earn scholarships that will enable him to pursue a degree in engineering or marine science. He is fascinated by the nearby
    Naval Air Station and the Gulf ecosystem, so he dreams of becoming an aerospace engineer or a marine biologist who can design innovative solutions for coastal preservation. In the longer term, he hopes
    to combine his technical expertise with mentorship, giving back to his community by leading youth STEM programs and serving as a role model for younger Black students in Pensacola.
