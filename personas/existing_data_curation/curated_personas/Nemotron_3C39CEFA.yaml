  career_goals: Malcolm aims to earn his GED within the next year and enroll in a community‑college culinary program to deepen his cooking techniques. He dreams of one day launching a food‑truck that blends
    Southern comfort dishes with contemporary flavors, using the truck as a moving gallery for local Black artists’ murals. In the short term, he hopes to advance to shift‑lead or manager at his current
    restaurant, gaining leadership experience while continuing to develop his artistic side through evening workshops in graphic design. Ultimately, he envisions a career that merges his love for food,
    community interaction, and visual art, allowing him to create spaces where people gather, eat, and experience culture.
