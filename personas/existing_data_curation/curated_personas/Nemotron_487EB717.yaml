  hobbies: '[''Street photography'', ''Visiting art galleries and museums'', ''Live music and performance events'', ''Competitive video gaming'', ''Beach volleyball'', ''Yoga and mindfulness meditation'',
    ''Reading psychology and philosophy'', ''Hosting social game nights'', ''Volunteer art workshops'', ''Exploring culinary scenes (especially Italian cuisine)'']'
  career_goals: Austyn aims to break into the Las Vegas entertainment and hospitality sector as a marketing strategist, leveraging his business acumen and artistic sensibility to create immersive brand
    experiences. In the short term, he seeks a junior marketing role that offers exposure to experiential campaigns and data analytics. Over the next five years, he plans to pursue an MBA to sharpen his
    leadership skills and eventually launch his own boutique agency that fuses data‑driven marketing with interactive art installations, positioning himself as a creative entrepreneur within the vibrant
    local scene.
