personas:
  professional: Brenda Tejeda, a seasoned custodial technician with decades of expertise in floor care, supply management, and basic plumbing, applies her routine‑focused mindset and meticulous attention
    to detail to keep facilities spotless, train new staff, and pursue a supervisory role supported by an upcoming OSHA certification.
  sports: Brenda Tejeda enjoys low‑key fitness through weekly hikes with the Apache Junction Desert Trails walking club and stays sport‑savvy by cheering on the Arizona Cardinals, Phoenix Suns, and Arizona
    Diamondbacks, though she prefers watching games at home over attending stadiums.
  arts: Brenda Tejeda immerses herself in classic Westerns starring John Wayne and Clint Eastwood, follows popular telenovelas like 'La Usurpadora', devours Agatha Christie mysteries, and occasionally listens
    to traditional ranchera ballads by Pedro Infante while cooking, letting those narratives shape her evenings.
  travel: Brenda Tejeda prefers well‑structured road trips that balance cultural discovery with the serenity of the desert, often heading to the historic mission towns of Southern Arizona, the vibrant arts
    scene of Santa Fe, and the sun‑kissed beaches of Baja for seafood festivals, always booking modest inns and timing travels around family commitments.
  culinary: Brenda Tejeda delights in cooking authentic dishes such as pork carnitas, chicken mole poblano, tamales wrapped in corn husks, and fresh salsa verde made from home‑grown chilies, tomatoes, and
    cilantro, often pairing these meals with a neat glass of mezcal, while occasionally over‑seasoning with too much dried oregano—a quirk her family lovingly teases.
  core: Brenda Tejeda, a meticulous custodian with a quiet competitive streak, balances steadfast routines, garden‑fresh cooking, and solitary desert walks while quietly nurturing community ties, and they
    never miss a chance to plan the next potluck.
background:
  cultural: Brenda’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she grew up celebrating Día de los Muertos, Las Posadas, and other Mexican holidays with family
    rituals that emphasize respect for elders and strong community ties. Her Catholic upbringing informs her values of humility, responsibility, and service to others. Living in Arizona’s Sonoran desert,
    she blends her cultural roots with the Southwest’s regional customs, such as enjoying the local mezcal market and participating in neighborhood fiestas that fuse Mexican and Arizona influences. These
    cultural touchstones shape her practical, family‑oriented outlook and reinforce her preference for routine, close‑knit relationships, and modest but meaningful celebrations.
attributes:
  skills: '[''Floor care (scrubbing, waxing, buffing)'', ''Carpet and upholstery cleaning'', ''Restroom sanitation and supply management'', ''Hazardous chemical handling and OSHA compliance'', ''Basic plumbing
    repairs (leaky faucets, clogged drains)'', ''Electrical troubleshooting for lighting fixtures'', ''Inventory control for cleaning supplies'', ''Time management and daily task scheduling'', ''Training
    and mentoring new custodial staff'', ''Customer interaction in small residential/commercial settings'']'
  hobbies: '[''Traditional Mexican cooking (tamales, mole, salsas)'', ''Backyard gardening (chilies, tomatoes, herbs)'', ''Small church Bible study group'', ''Community potluck volunteering'', ''Watching
    classic Westerns and telenovelas'', ''Reading mystery novels'', ''Desert trail walking'']'
  career_goals: Brenda aims to move into a supervisory or lead custodial position within the facility she serves, where she can oversee a small team, implement streamlined cleaning schedules, and ensure
    consistent safety standards. She plans to obtain an OSHA certification and a certified custodial technician credential to bolster her qualifications. Long‑term, she hopes to mentor younger workers,
    particularly those from similar cultural backgrounds, and perhaps launch a modest, family‑run cleaning service that serves nearby small businesses and residential properties, allowing her to retain
    the routine she values while exercising a greater degree of leadership.
