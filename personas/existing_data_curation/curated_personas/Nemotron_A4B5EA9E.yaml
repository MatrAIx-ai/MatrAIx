  hobbies: '[''scale model kit building'', ''woodworking'', ''fly fishing'', ''birdwatching'', ''reading technical non-fiction'', ''mechanical puzzles'', ''mindfulness meditation'', ''reflective journaling'']'
  career_goals: Approaching retirement, Darren aims to solidify his financial security while transitioning to a part‑time consulting role where he can share his expertise with small manufacturers in the
    Delaware County area. He hopes to learn the basics of additive manufacturing and 3D‑printing to stay current with industry trends. Additionally, Darren wishes to formalize a mentorship program for apprentices,
    passing on the balance of practical skills and inventive problem‑solving that has defined his career.
