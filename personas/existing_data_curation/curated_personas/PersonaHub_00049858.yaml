persona_description: A social studies educator who is passionate about teaching and learning in the field of social studies. They are knowledgeable about the Maine Department of Education's commitment to
  social studies education and are interested in the resources available to support effective K-12 social studies instructional programs. They are interested in engaging students in the study of civics
  and government, economics, geography, and history, and how these disciplines can be applied in authentic contexts. They are committed to teaching students how to think, not just what to think, and are
  looking for opportunities to learn about their world and become active and involved members of their local and global communities.
