personas:
  professional: Blake Ridley is a seasoned hospitality veteran who runs a historic inn with a flair for creative decor, uses storytelling to mentor staff, and embraces a flexible, imaginative approach to
    guest relations that blends local art and community spirit, and they prioritize harmony over rigid schedules.
  sports: Blake Ridley enjoys gentle morning walks along the Roanoke River Trail, participates in a senior softball league at the local community center, cheerfully follows the Roanoke Rail Yard Dawgs minor‑league
    hockey team and roots for the Virginia Tech Hokies football squad, and they treat fitness as a social, low‑key activity rather than a competitive pursuit.
  arts: Blake Ridley channels their imagination into painting Appalachian landscapes in the style of Thomas Cole, captures the Blue Ridge Mountains with a Nikon DSLR inspired by Ansel Adams, plucks the
    banjo at bluegrass jams paying homage to Bill Monroe, avidly reads Agatha Christie mysteries, and they find creative renewal in every brushstroke, photograph, and song.
  travel: Blake Ridley prefers leisurely road trips to nearby cultural gems like Shenandoah National Park and Asheville's River Arts District, harbors a long‑standing dream of strolling Dublin's cobblestones
    after hearing Celtic folk tunes, and they plan travel with loosely sketched itineraries that favor spontaneous art fairs and local music gatherings over rigid schedules.
  culinary: Blake Ridley delights in Southern kitchen classics, frequently whipping up fried chicken, collard greens, and peach cobbler seasoned with fresh rosemary and thyme, expertly crafts rosehip jam
    from garden blooms, and they enjoy sharing hearty meals with friends at the inn's communal table, though they sometimes forget to balance indulgent dishes with lighter salads.
  core: Blake Ridley is a charismatic, art‑loving innkeeper who weaves storytelling into hospitality, lives flexibly with a splurge‑on‑hobby habit, and they cherish community fellowship above all else.
background:
  cultural: Blake grew up in a working-class white family in Roanoke during the 1930s and 1940s, steeped in Southern and Appalachian traditions. The region's emphasis on hospitality, community storytelling,
    and folk music shaped his values. He identifies with the Protestant Baptist heritage of the area, respects the local history of the railroad and coal towns, and incorporates Appalachian crafts and cuisine
    into his personal and professional life.
attributes:
