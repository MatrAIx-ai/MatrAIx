  hobbies: '[''Painting'', ''Photography'', ''Banjo playing'', ''Hiking'', ''Gardening'', ''Reading mystery novels'', ''Crossword puzzles'', ''Storytelling'', ''Volunteer work'', ''Attending bluegrass concerts'']'
  career_goals: At 79, Blake's primary ambition is to ensure that the historic inn he manages remains a vibrant community hub for future generations. He hopes to mentor a younger manager to carry on his
    philosophy of hospitality blended with local art, to document his fifty-year career in a memoir, and to collaborate with the Roanoke tourism board on preserving the city's heritage sites.
