  career_goals: He aims to achieve master technician status within the next two years, acquire additional certifications in electric vehicle maintenance, and later transition to a supervisory role where
    he can mentor junior mechanics. Long‑term, Dong dreams of opening his own boutique auto‑repair shop in the Los Angeles area that specializes in Asian‑make vehicles and electric conversions, while building
    a reputation for reliability, transparency, and community involvement.
