personas:
  professional: Hector Capretta is a meticulous manufacturing assembler who leverages his expertise in mechanical assembly, welding (MIG/TIG), CNC basics, and lean principles to streamline production lines,
    while his curiosity for new techniques and outgoing, team‑oriented nature make him a natural mentor and aspiring shift supervisor.
  sports: Hector Capretta plays forward for the Lakeview Hoops Club in the regional basketball league, volunteers as a youth coach with Riverside Youth Sports, follows the Chicago Bulls, Chicago Bears,
    and Chicago Cubs, and maintains his fitness through weekly pickup games, weekend fishing trips, and occasional strength training at the local gym.
  arts: Hector Capretta is a devoted classic‑rock enthusiast who fills his playlists with Led Zeppelin, The Rolling Stones, and AC/DC, regularly attends live shows by regional acts like The River Runners,
    and enjoys re‑watching movies starring Clint Eastwood and John Wayne to unwind after a shift.
  travel: Hector Capretta prefers meticulously planned road trips in his restored ’69 Mustang, has already toured the Florida Keys for fishing, explored the historic car museums of Stuttgart, and dreams
    of a cross‑country ride along Route 66 to attend vintage‑car rallies in Oklahoma and Texas.
  culinary: Hector Capretta loves hearty, smoky flavors, often grilling rib‑eye steak with garlic‑butter, smoking brisket using a DIY pellet smoker, and preparing fresh trout with lemon and dill after a
    fishing day, while his cooking skill sits at an enthusiastic amateur level using cast‑iron skillets and a modest spice rack that includes smoked paprika and black pepper.
  core: Hector Capretta blends hands‑on mechanical expertise, community spirit, and a love for classic cars into a practical yet curious worldview, though their tendency to over‑commit to projects sometimes
    leaves their own garage a work‑in‑progress.
background:
  cultural: Hector comes from an Italian‑American family with deep roots in Michigan’s Midwest. Raised in a Catholic household, he grew up celebrating traditional Italian holidays and Midwestern customs,
    emphasizing family gatherings, community involvement, and a strong work ethic. The town of Perrinton’s close‑knit community and its agricultural and manufacturing heritage have shaped his values of
    reliability, cooperation, and practicality.
