  skills: '[''Mechanical assembly'', ''MIG/TIG welding'', ''Blueprint reading'', ''Quality inspection'', ''Hand and power tool operation'', ''Basic CNC operation'', ''Lean manufacturing'', ''Troubleshooting'',
    ''Safety compliance'', ''Inventory management'', ''Team communication'']'
  hobbies: '[''Car and motorcycle restoration'', ''Woodworking'', ''Fishing'', ''Basketball'', ''Youth sports coaching'', ''Community events'', ''Classic rock music'', ''Live music shows'', ''Video gaming'']'
  career_goals: Hector aims to advance from assembler to shift supervisor within the next two years, and eventually to a production manager role. He plans to earn certifications in CNC programming and advanced
    welding techniques, and to develop leadership skills through on‑the‑job training. Long‑term, he hopes to open his own custom metal‑fabrication shop that serves local manufacturers and hobbyists, leveraging
    his practical expertise and community connections.
