    ''Cooking Southern cuisine'']'
  career_goals: Alexa aims to complete a bachelor’s degree in Business Administration with a focus on marketing analytics. She plans to secure an internship at a regional firm to gain practical experience,
    then move into a marketing analyst role where she can leverage data‑driven insights to craft effective campaigns. Long‑term, she aspires to become a marketing manager and eventually launch her own e‑commerce
    brand that blends Southern lifestyle products with modern digital strategies.
