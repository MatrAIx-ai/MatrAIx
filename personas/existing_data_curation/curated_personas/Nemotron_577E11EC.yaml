personas:
  professional: Alexa Cooke is a data‑savvy marketing analytics student who blends curiosity for emerging digital trends with practical Excel and Tableau expertise, leveraging the strategic mindset honed
    from competitive online gaming to deliver data‑driven campaign insights, and they orchestrate group projects and a stress‑focused blog with meticulous yet adaptable planning.
  sports: Alexa Cooke is a competitive online gamer who follows the Cloud9 League of Legends roster, regularly hikes the boardwalks of Congaree National Park with the university outdoor club, and roots
    for the Carolina Panthers, channeling both solitary endurance and team‑spirit dynamics into their fitness routine.
  arts: Alexa Cooke devotes evenings to dissecting contemporary and speculative fiction by authors such as N.K. Jemisin and Ted Chiang, while their blog reflects a love for literary analysis intertwined
    with the atmospheric sounds of The National and the cinematic scores of Hans Zimmer, shaping a creative outlet that balances introspective solitude with occasional online literary discussions.
  travel: Alexa Cooke prefers budget‑friendly road trips, having explored the historic streets of Savannah, sampled the arts scene in Asheville, and trekked the swamps of Congaree, while dreaming of a solo
    backpacking adventure across Iceland’s volcanic landscapes once their savings and study schedule permit.
  culinary: Alexa Cooke experiments in the kitchen with an intermediate skill set, perfecting low‑country shrimp‑and‑grits using fresh Gulf shrimp, stone‑ground grits, smoked andouille sausage, and a dash
    of hot sauce, and they often accompany the dish with buttery collard greens seasoned with smoked paprika, reflecting a methodical yet adventurous culinary approach.
  core: Alexa Cooke is a 19‑year‑old marketing analytics student whose competitive gaming edge, anxiety‑driven self‑care rituals, and love for Southern cooking converge to shape a data‑focused yet creatively
    reflective life trajectory.
background:
  cultural: Alexa grew up in a suburban family in Lexington County, South Carolina, where Southern hospitality, church gatherings, and community events such as high‑school football games shaped her early
    social experiences. The region’s emphasis on family meals, barbecue traditions, and a strong sense of local pride influences her appreciation for Southern food and community service. At college, she
    has been exposed to a broader cultural spectrum, balancing her regional roots with a growing interest in national trends and diverse perspectives.
