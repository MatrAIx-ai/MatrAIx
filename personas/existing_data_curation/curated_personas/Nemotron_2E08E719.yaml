personas:
  professional: Miguel Molina, an EMT‑Paramedic with a biomedical engineering background, channels rapid decision‑making, bilingual communication, and inventive problem‑solving into emergency care while
    they eye a future as a critical‑care supervisor who will prototype data‑driven EMS tools.
  sports: Miguel Molina powers through weekend recreational soccer matches with the South Beach Strikers, sweeps the salsa floor at the local Afro‑Latin dance club, roots for Inter Miami CF and the Miami
    Heat, and they blend competitive drive with a love for group camaraderie in fitness.
  arts: Miguel Molina explores street photography at Wynwood Walls, sketches graffiti in community workshops, crowds at the annual Art Basel Miami, and they draw creative inspiration from the vibrant beats
    of Celia Cruz and the visual narratives of Banksy, while considering art a constant source of fresh ideas.
  travel: Miguel Molina prefers spontaneous road trips to Caribbean islands like the Bahamas, weekend escapes to Key West, and cultural pilgrimages to Barcelona and Mexico City, planning loosely around
    friends’ schedules and a modest travel fund, and they balance adventure with an eye on work‑shift constraints.
  culinary: Miguel Molina whips up island‑inspired dishes such as mojo‑marinated pork tenderloin with lime‑infused glaze, crispy yuca croquettes topped with cilantro‑garlic aioli, and plantain‑based tofu
    tacos, showcasing an intermediate cooking skill that fuses tradition with modern plating, while they love experimenting with fresh cilantro, lime, and smoked paprika.
  core: Miguel Molina is a high‑energy, curiosity‑driven EMT‑Paramedic who blends creative problem‑solving, competitive zest, and a love for community art and spontaneous adventure, all while they juggle
    a relaxed approach to organization and occasional financial impulse buys.
background:
  cultural: Miguel was raised in Hialeah’s vibrant Cuban‑American community, growing up bilingual and deeply rooted in Cuban traditions of music, dance, and family solidarity. His upbringing emphasized
    respect (respeto) and strong family bonds (familismo), which shape his sociable and community‑oriented nature. At the same time, living in a multicultural Miami environment has nurtured his openness
    to new ideas, art, and unconventional thinking, allowing him to blend his heritage with contemporary American influences in both his professional and personal life.
attributes:
  skills: '[''Emergency medical assessment'', ''Advanced CPR and defibrillation'', ''Trauma stabilization'', ''Medical device operation (ventilators, monitors)'', ''Electronic health record documentation'',
