    training'', ''Basic equipment maintenance'']'
  hobbies: '[''Salsa dancing'', ''Recreational soccer'', ''Street photography'', ''Graffiti art workshops'', ''Cooking Cuban cuisine'', ''Live music concerts'', ''Community health outreach'', ''DIY electronics
    projects'', ''Reading science‑fiction graphic novels'', ''Baking'', ''Volunteering at local art galleries'']'
  career_goals: Miguel aims to advance from EMT‑Paramedic to a critical care paramedic and eventually a supervisory or training role within Miami‑Dade Fire Rescue, where he can mentor new responders and
    shape protocol development. He also aspires to integrate his engineering knowledge by collaborating on innovative EMS technologies, such as portable diagnostics or data‑driven response systems, and
    to earn a Master’s in Public Health to broaden his impact on community health preparedness.
