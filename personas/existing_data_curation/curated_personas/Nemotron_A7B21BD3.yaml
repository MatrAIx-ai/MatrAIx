personas:
  professional: Marilyn Bell is an aspiring freelance graphic designer and illustrator who transforms her vivid imagination into whimsical digital and watercolor artworks for local small businesses, while
    her strong organization and empathic listening skills help her coordinate community art‑therapy sessions and future workshops.
  sports: Marilyn Bell enjoys weekend hikes with the Ouachita Trails Club, attends community yoga classes, and casually follows the Oklahoma City Thunder, Tulsa Drillers, and FC Tulsa, using a light jogging
    routine to stay fit without committing to competitive sports.
  arts: Marilyn Bell is constantly sketching with a palette inspired by Claude Monet’s soft pastels, creates digital illustrations in the style of Loish while indulging in indie folk soundtracks from Sufjan
    Stevens and Iron & Wine, and finds narrative fuel in the fantasy worlds of Neil Gaiman and Brandon Sanderson, which together shape her eclectic artistic voice.
  travel: Marilyn Bell prefers low‑cost, self‑planned road trips that blend scenic hiking with cultural stops, having explored the Ouachita foothills and a music‑filled weekend in New Orleans, while dreaming
    of a spring trek through Iceland’s waterfalls and an artistic pilgrimage to Kyoto’s historic temples.
  culinary: Marilyn Bell, a self‑taught kitchen enthusiast, often prepares avocado toast topped with radish and feta, experiments with cilantro‑lime quinoa bowls, and bakes chocolate‑mint brownies for community
    bake‑sales, while delighting in fresh strawberries drizzled with honey as a sweet treat.
  core: Marilyn Bell is an 18‑year‑old dream‑driven artist who swaps bedtime for midnight sketch marathons, hoards stray coffee cups as impromptu canvases, and balances disciplined GED study with impulsive
    watercolor experiments, even as they occasionally procrastinate their coursework to wander through imagined fantasy realms.
background:
  cultural: Marilyn grew up in Atoka, a small town in southeastern Oklahoma, where Southern‑style community values and a close‑knit, largely white population shape daily life. Her family participates in
    church gatherings and local festivals, emphasizing humility, mutual support, and respect for tradition. At the same time, the rural setting offers ample natural scenery that sparks her artistic curiosity.
    This blend of modest, community‑centered upbringing with exposure to regional folk art and the broader internet’s creative currents informs her sense of identity and her desire to give back through
    art.
