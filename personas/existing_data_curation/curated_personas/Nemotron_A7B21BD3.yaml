  hobbies: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''reading fantasy literature'', ''hiking'', ''nature photography'', ''poetry journaling'', ''indie folk music'', ''volunteering
    at community center'']'
  career_goals: Marilyn aims to earn her GED within the next year and then enroll in a community college visual arts program in Tulsa. She envisions a career as a freelance graphic designer and illustrator,
    blending her love for novelty and abstract concepts into client work and personal projects. In the longer term, she hopes to launch a community art initiative in Atoka that offers free workshops for
    youth, using art as a means to foster creativity, mental well‑being, and social connection. She also aspires to develop a modest online storefront (e.g., Etsy) to sell her original prints and handcrafted
    items, eventually achieving financial independence while staying rooted in her hometown.
