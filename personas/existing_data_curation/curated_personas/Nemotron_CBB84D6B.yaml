personas:
  professional: Louis Mancini is a seasoned mechanical and systems engineer who leverages CAD, finite‑element analysis, and Python automation to lead cross‑functional teams in creating art‑infused sustainable
    installations, while championing unconventional ideas and mentoring younger engineers with a relaxed, community‑focused approach.
  sports: Louis Mancini is an avid weekend hiker of the Texas Hill Country, a seasonal disc‑golf enthusiast who plays at the San Antonio Public Disc Golf Course, roots for the San Antonio Spurs and the
    Texas Rangers, and blends casual jogging with a weekly yoga class to stay flexible despite occasional back stiffness.
  arts: Louis Mancini is a passionate devotee of San Antonio’s River Walk live‑music scene, frequently attending performances by the Texas Tornados and local jazz trio The Lazy Maroons, volunteers as a
    guide for historic art walking tours featuring murals by local artists Diego Suarez and Marisol Torres, and channels that inspiration into photography that captures chiaroscuro on urban murals.
  travel: Louis Mancini is a spontaneous traveler who prefers loosely planned road trips across the Texas Hill Country and occasional weekend getaways to Santa Fe for its Pueblo‑style architecture, while
    dreaming of a future visit to Barcelona’s street art districts, funding these adventures with a mix of saved vacation days and a modest travel fund that often dips into his hobby budget.
  culinary: Louis Mancini is a self‑taught home chef who skillfully fuses Tex‑Mex staples like carne asada tacos with Italian classics such as spaghetti carbonara, relishes cooking with chiles guajillos,
    fresh cilantro, pecorino romano, and homemade salsa, and enjoys hosting casual dinner parties where friends sample his experimental dishes, though they often forget to clear the kitchen afterward.
  core: Louis Mancini is a curious, sociable engineer whose love for art and hands‑on creation fuels a flexible, sometimes messy lifestyle that blends community mentorship with a penchant for late‑night
    live‑music jams and DIY projects.
background:
  cultural: Louis comes from an Italian‑American family that settled in Texas after his grandparents emigrated from Southern Italy in the 1950s. Growing up in San Antonio, he was immersed in a blend of
    Texan and Italian cultural traditions—family gatherings centered around homemade pasta and sauce, celebrations of Italian holidays, and an appreciation for the vibrant Hispanic influences that shape
    the city's food, music, and festivals. This multicultural upbringing fuels his curiosity about art and his comfort navigating diverse social settings. He identifies as a white American with strong ties
    to both his Italian heritage and the broader Texas community.
