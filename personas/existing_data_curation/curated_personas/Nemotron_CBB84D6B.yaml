  hobbies: '[''Live music concerts'', ''Tabletop gaming'', ''Photography'', ''Woodworking'', ''Custom electric bike building'', ''Cooking Tex‑Mex and Italian cuisine'', ''Hiking'', ''Mentoring robotics
    club'', ''Art walking tours'']'
  career_goals: In the next five years, Louis aims to transition into a senior technical leadership role—such as Director of Engineering or Chief Engineer—where he can shape the strategic direction of large‑scale,
    interdisciplinary projects, particularly those that fuse technology with sustainable design and community‑oriented art installations. He also hopes to launch a mentorship program within his company
    to foster innovative thinking among mid‑career engineers and to collaborate with local art institutions on interactive public‑space projects.
