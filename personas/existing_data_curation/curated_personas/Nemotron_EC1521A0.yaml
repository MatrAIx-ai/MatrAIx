personas:
  professional: A budding architect in the making, Joseph Mills spends hours arranging Lego bricks in a quiet corner, balancing inventive designs with tidy aisles of blocks, and they often explain the practical
    reasons behind each construction to their stuffed audience.
  sports: An avid fan of the local Little Tigers Soccer Club, Joseph Mills enjoys quiet afternoons practicing dribbling drills solo on the grass, cheers for the Chicago Cubs during family game nights, and
    they attend weekend swimming lessons at the community pool to stay fit.
  arts: A creative soul, Joseph Mills delights in drawing whimsical animals after watching The Wiggles, hums along to the catchy tune of 'Baby Shark' while coloring, and they occasionally tinker with a
    small xylophone, integrating quiet artistic expression with joyful music.
  travel: A thoughtful explorer, Joseph Mills loves family trips to Disneyland for the rides, dreams of seeing the Eiffel Tower someday, prefers itineraries with built-in nap times, and they often collect
    a pebble from each visited park as a quiet memento.
  culinary: A selective eater, Joseph Mills favors creamy macaroni and cheese, crunchy carrot sticks, and strawberry ice cream, enjoys helping stir batter for pancakes on weekend mornings, yet they stubbornly
    refuse broccoli, showcasing a blend of curiosity and practicality in the kitchen.
  core: Joseph Mills is a quietly curious 5-year-old who blends organized play with imaginative building, prefers solitary moments but always shares a smile and a snack with others.
background:
  cultural: Joseph grows up in a white American family in the suburban community of Monmouth Junction, New Jersey. His household reflects middle‑class suburban values, emphasizing politeness, cooperation,
    and respect for others. He celebrates typical American holidays, participates in community events, and attends a local public kindergarten. While the area is culturally diverse, his family traditions
    are rooted in European‑American customs, such as holiday meals, backyard barbecues, and seasonal outings.
