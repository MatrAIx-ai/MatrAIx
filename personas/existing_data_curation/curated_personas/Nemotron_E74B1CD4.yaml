  career_goals: Christopher dreams of a future where he can combine his love of building things with helping others. He aspires to become a civil engineer or architect, fascinated by how bridges and buildings
    hold communities together, and he plans to win his school's science fair with a functional model of a wind‑powered water pump. He also imagines exploring outer space as an astronaut, motivated by his
    curiosity about the universe. In the short term, he wants to join a middle‑school robotics club to develop his technical skills and to become a team captain on his soccer team, reflecting his competitive
    drive. Ultimately, he hopes to pursue a career that lets him solve practical problems, lead projects, and contribute to his community.
