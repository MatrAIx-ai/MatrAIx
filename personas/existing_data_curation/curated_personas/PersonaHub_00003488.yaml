persona_description: A survivor of the September 11th terrorist attacks on the World Trade Center towers, who experienced long-term post-traumatic stress symptoms and PTSD. The survivor is a woman of color
  who was on the 78th floor of the South Tower when the attacks occurred. She witnessed the collapse of the towers and the aftermath of the terrorist attacks, and experienced the fear, helplessness, and
  horror associated with these events. The survivor is likely to be interested in the psychological impact of the attacks on survivors, the development of PTSD, and the impact of the attacks on the mental
  health of people of color.
