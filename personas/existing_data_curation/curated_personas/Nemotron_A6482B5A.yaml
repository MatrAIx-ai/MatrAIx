personas:
  professional: Gladys Velazquez, a retired community event coordinator in Phillipsburg, channels their meticulous organizational talent, bilingual fluency, and fervent love for storytelling into leading
    intergenerational cooking workshops, recording oral histories of elders, and mentoring volunteers to cement a lasting cultural legacy.
  sports: Gladys Velazquez stays fit by dancing salsa, merengue, and bachata at community gatherings, strolling the nearby park trails with their senior walking group, and cheering passionately for the
    New York Giants, the New York Knicks, and the New Jersey Devils on weekend game nights.
  arts: Gladys Velazquez frequents the Sussex County Museum of Art, where they passionately discuss the vivid palettes of Frida Kahlo and the daring brushwork of Pablo Picasso, while also attending jazz
    evenings featuring lively Afro-Cuban rhythms that inspire their culinary flair.
  travel: Gladys Velazquez plans relaxed journeys that combine reunions on the Caribbean island of their youth with cultural excursions to Washington, D.C. and a long-standing dream of exploring Barcelona's
    historic streets, always packing a small pouch of fresh cilantro and oregano to flavor their kitchen wherever they land.
  culinary: Gladys Velazquez masterfully crafts their family's beloved stew of root vegetables and meat - sancocho - alongside creamy mashed plantains (mangú), seasoning each bowl with fresh cilantro, oregano,
    and a splash of sour orange, while recent online cooking class experiments have led them to reinvent the classic arroz con habichuelas using quinoa and roasted red peppers.
  core: Gladys Velazquez is an organized, socially vibrant 86-year-old who blends a love of dance, cooking, and community storytelling into a competitive yet warm pursuit of preserving their island heritage
    in Phillipsburg.
background:
  cultural: Gladys Ileana Velazquez was born in the Dominican Republic and grew up immersed in its vibrant culture—its music, cuisine, language, and Catholic traditions. She emigrated to the United States
    in the early 1970s, settling in the New York-New Jersey corridor where a sizable Dominican community thrived. Over the decades she has woven her Dominican roots with her American experiences, preserving
    family rituals such as celebrating Dominican Independence Day, using Spanish in daily conversation, and preparing classic dishes like sancocho and mangú, while also embracing local customs and the diverse
    cultural fabric of Phillipsburg. Her identity reflects a blend of Dominican warmth and community-focused values, tempered by the pragmatic, organized mindset shaped by her life in the United States.
attributes:
  skills: '["Community event coordination", "Bilingual Spanish-English communication", "Traditional Dominican cuisine preparation", "Volunteer caregiving", "Budget management", "Basic computer and smartphone
