  hobbies: '["Cooking traditional Dominican dishes", "Salsa, merengue, and bachata dancing", "Visiting art galleries and museums", "Reading historical novels and biographies", "Herb gardening", "Birdwatching
    in local parks", "Playing bridge and mahjong", "Volunteer storytelling at senior center", "Genealogy research"]'
  career_goals: Even though she is retired from formal employment, Gladys remains driven by a desire to leave a lasting cultural legacy. Her primary ambition is to become a recognized cultural ambassador
    in Phillipsburg, organizing intergenerational cooking workshops that celebrate Dominican cuisine, recording oral histories of local Dominican elders, and mentoring younger volunteers at the senior center.
    She also hopes to earn a community-service certificate in senior advocacy, enabling her to advocate for senior needs at the county level, and to publish a small memoir that captures her life’s journey
    and the evolution of Dominican-American identity in New Jersey.
