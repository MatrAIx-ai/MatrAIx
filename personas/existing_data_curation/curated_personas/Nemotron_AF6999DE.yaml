personas:
  professional: An experienced community elder and informal counselor, Kareen Hunter leverages her lifelong mastery of traditional cooking, gardening, and quilting alongside her social‑science background
    to mediate neighbor disputes, organize church events, and lead cultural workshops, all while navigating her relaxed approach to obligations with a warm, cooperative demeanor they bring to every interaction.
  sports: Kareen Hunter enjoys low‑impact morning walks along the local nature trail with the Atlanta Parks Seniors Walking Club, follows the Atlanta Falcons and Atlanta Braves on television for spirited
    community bonding, and joins the town’s seasonal pickleball league for seniors each spring, balancing gentle activity with a love for hometown team pride they cherish.
  arts: Kareen Hunter immerses herself in the soulful sounds of Mahalia Jackson, B.B. King, and Al Green on her vintage record player, reads memoirs by Maya Angelou and Alex Haley, and participates in a
    monthly quilting circle where they exchange patterns inspired by traditional Southern folk art, all of which fuel their creative spirit and deep connection to oral and visual storytelling.
  travel: Kareen Hunter prefers relaxed, heritage‑focused trips, planning her journeys with modest budgets and a flexible itinerary that includes revisiting Savannah’s historic squares, a pilgrimage to
    Sea Islands’ cultural sites, and a dream to explore the jazz heritage of New Orleans, while they often postpone longer vacations due to anxiety about travel logistics.
  culinary: Kareen Hunter delights in preparing low‑country classics such as shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie, skillfully blends heirloom herbs like sage
    and rosemary into dishes, and treats cooking sessions as both a therapeutic ritual and a way to honor ancestors, though they occasionally over‑salt in their enthusiasm for bold flavors.
  core: Kareen Hunter is a gentle, curiosity‑driven elder who weaves gardening, quilting, and storytelling into daily life, yet they wrestle with anxiety that sometimes derails their otherwise harmonious
    routine.
background:
  cultural: Kareen grew up in the Gullah‑Geechee enclave of McIntosh County, where African‑derived language, cuisine, and storytelling are integral to community life. Her family's roots trace back to the
    Sea Islands, and she was raised on the rhythms of gospel, blues, and work songs that accompany daily chores and celebrations. The Black church has been a central pillar, shaping her values of cooperation,
    harmony, and service. She lived through the civil‑rights movement in rural Georgia, which left an imprint of resilience and collective action. Today, she identifies strongly with Southern Black traditions—soul
    food, quilting circles, garden festivals, and oral history—while also embracing the broader African American experience of migration, family networks, and faith‑based community support.
