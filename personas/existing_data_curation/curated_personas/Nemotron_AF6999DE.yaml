  hobbies: '["Gardening (vegetables, herbs, native plants)","Traditional Gullah cooking","Quilting and textile arts","Reading historical fiction and memoirs","Genealogy research","Birdwatching","Church
    choir singing","Journaling","Participating in small quilting circles"]'
  career_goals: Although retired, Kareen aims to become a cultural elder in Townsend, passing on Gullah stories, recipes, and quilting techniques to younger generations. She hopes to organize a monthly
    storytelling circle at the local community center and to lead a small class on traditional cooking for seniors. Kareen also plans to complete a short certificate in mental‑health first aid so she can
    formally support peers struggling with anxiety and grief. Traveling to historic sites on the Sea Islands and documenting her family's genealogy are personal ambitions that tie her practical curiosity
    to her desire for legacy.
