personas:
  professional: Roy Butler is a seasoned building cleaner who has mastered floor care, chemical safety, and minor facility repairs, and now leverages his hands‑on curiosity and cooperative leadership style
    to pursue a Certified Facility Manager credential and lead sustainability initiatives within a large campus environment.
  sports: Roy Butler spends his weekends casting lines on the York River and joining friends for deer hunts in the fall, follows the Virginia Cavaliers football team with a loyal fan’s heart, and occasionally
    participates in a community senior softball league, preferring low‑impact activity that balances camaraderie with the quiet of nature.
  arts: Roy Butler unwinds by devouring mystery novels like Agatha Christie’s classics and Michael Connelly’s thrillers, attends seasonal Colonial Williamsburg reenactments, and enjoys the soulful strains
    of Johnny Cash and B.B. King, which together shape a quiet appreciation for storytelling.
  travel: Roy Butler favors spontaneous road trips to historic towns such as Boston, Charleston, and the colonial streets of York, England, while also taking weekend getaways to Shenandoah National Park,
    balancing a love for heritage with the practical need to keep travel costs low and family commitments in mind.
  culinary: Roy Butler enjoys rolling his own barbecue rubs with brown sugar and paprika, grilling smoked brisket on the patio, whipping up Chesapeake‑style crab cakes with Old Bay and lemon, and occasionally
    cooking fresh‑caught shrimp with garlic and butter, reflecting a practical but enthusiastic approach to Southern coastal cuisine.
  core: Roy Butler is a hands‑on, eco‑curious facility veteran who balances a love for history and quiet fishing with a laid‑back approach to planning, often forgetting to file paperwork but never missing
    a chance to fire up the grill.
background:
  cultural: Roy grew up in James City County, a region steeped in Southern and colonial heritage. His family hails from a working‑class background, with generations of tradespeople who value hard work,
    community, and modesty. He was raised with Southern hospitality traditions—politeness, neighborly help, and a love for regional foods like barbecue and seafood. Local churches and community events have
    shaped his cooperative nature, and his upbringing in a historically rich area fuels his interest in the area's colonial past. While he identifies as white, he embraces the multicultural aspects of Williamsburg’s
    tourism industry, which has broadened his perspective and reinforced his practical, inclusive outlook.
attributes:
  skills: '["Floor care (stripping, waxing, polishing)", "Carpet steam cleaning", "Restroom sanitation", "Chemical handling and safety", "Equipment maintenance (vacuum, floor scrubbers)", "Minor facility
    repairs (light bulbs, plumbing leaks)", "Inventory management of cleaning supplies", "Green cleaning practices", "Basic computer skills for work‑order systems", "Team leadership and crew training"]'
  hobbies: '["Fishing", "Hunting trips", "Visiting Colonial Williamsburg and local historical sites", "Genealogy research", "DIY home projects (furniture building, minor repairs)", "Gardening", "Reading
    mystery novels", "Board game nights with family"]'
  career_goals: Roy aims to move from hands‑on cleaning to a supervisory role in facilities management. He plans to earn a Certified Facility Manager (CFM) credential and obtain LEED Green Building training
    so he can lead sustainability initiatives at his workplace. Long‑term, he hopes to become a facilities manager for a larger campus or start his own small cleaning business that emphasizes environmentally
    friendly practices. These goals align with his desire for stability, increased responsibility, and the chance to apply his curiosity about new cleaning technologies.
