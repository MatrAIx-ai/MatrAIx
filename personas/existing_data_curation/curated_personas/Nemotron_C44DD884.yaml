  career_goals: Alejandrina aspires to a career that blends her love for helping others with her interest in science and community well‑being. She dreams of becoming a pediatric nurse or a bilingual community
    health educator, envisioning herself working in a clinic that serves diverse families in the Washington, DC metro area. She also considers teaching elementary school, where she could share her curiosity
    for learning and support students' emotional health. Her ambition is to use her bilingual skills and compassionate nature to bridge gaps in health education and foster a supportive environment for children.
