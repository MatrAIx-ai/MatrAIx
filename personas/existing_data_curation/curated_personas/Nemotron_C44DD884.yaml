personas:
  professional: Alejandrina Gomez, a curious 12‑year‑old budding coder and comic‑strip creator, balances her love of adventure sci‑fi reading with practical problem‑solving as she builds Scratch projects
    for school and volunteers at the library, showcasing reliability and a cooperative spirit.
  sports: Alejandrina Gomez plays midfield for the Saturday Kids Soccer Club in the local park, idolizes the hometown team City United FC, and spends Saturday mornings sprinting after the ball while also
    cheering for the school's basketball team during pep rallies.
  arts: Alejandrina Gomez draws vibrant cartoon panels inspired by Raina Telgemeier and Stan Lee, grooves to salsa legends like Celia Cruz and Marc Anthony at family gatherings, and loses herself in adventure
    novels by Jules Verne, weaving these influences into her own imaginative stories.
  travel: Alejandrina Gomez prefers quick weekend getaways to nearby nature spots such as Pine Ridge Trail, dreams of exploring the historic streets of Cartagena, and often plans trips with a mix of spontaneous
    hiking and structured museum visits, balancing her love of adventure with the comfort of family routines.
  culinary: Alejandrina Gomez enjoys cooking arroz con gandules with her mother, experiments with homemade empanadas stuffed with cheese and plantains, and proudly serves her family a salsa‑spiced chicken
    dish flavored with cumin and cilantro, reflecting a growing confidence in the kitchen.
  core: Alejandrina Gomez is a curiosity‑driven 12‑year‑old who blends coding, comic art, and salsa dancing with a practical streak, a caring nature, and occasional worries that make her both organized
    and delightfully spontaneous.
background:
  cultural: Alejandrina comes from a Puerto Rican family that maintains strong ties to the island's traditions while living in Springfield, Virginia. Her parents immigrated to the United States, and they
    celebrate Puerto Rican holidays such as Three Kings Day and the San Juan festival, often preparing dishes like arroz con gandules, pernil, and tembleque. She speaks Spanish at home and English at school,
    giving her a bilingual identity that shapes her worldview. The close‑knit family environment emphasizes community, respect, and sharing, and she participates in local Latino community events and school
    multicultural programs, reinforcing her pride in her heritage.
