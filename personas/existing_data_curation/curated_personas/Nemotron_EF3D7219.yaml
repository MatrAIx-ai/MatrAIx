  career_goals: Kim Jean dreams of becoming an astronaut who can explore distant planets, a painter who brings her imaginative worlds to life, or a scientist who discovers new species. She hopes to use
    her creativity to inspire others and, one day, to teach younger kids how to think outside the box. Her ambitions are shaped by her love of novelty, art, and abstract ideas, and she often imagines herself
    leading a space‑art laboratory where she designs both rockets and the murals that decorate them.
