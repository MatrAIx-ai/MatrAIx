personas:
  professional: Kim Davis is a budding architect-in-training who uses their love of LEGO city-building and detailed sketching to design intricate play‑worlds, balancing meticulous organization with boundless
    imagination while reliably meeting school project deadlines.
  sports: Kim Davis participates in the local youth soccer club, the River Valley Rangers, and cheers for the Chicago Cubs during the baseball season, using weekly practices as a healthy outlet for stress
    while also enjoying weekend hikes in nearby forests.
  arts: Kim Davis is a creative spark in the school’s art club, drawing fantastical characters inspired by documentaries on space and dinosaurs, and finds musical inspiration in gospel legends like Mahalia
    Jackson and jazz icons such as Ella Fitzgerald.
  travel: Kim Davis dreams of exploring the towering red rocks of Sedona, visiting the Kennedy Space Center to see rockets up close, and enjoys family road trips to nearby state parks where they can hunt
    for unique rocks and insects.
  culinary: Kim Davis loves helping their grandmother bake family‑tradition cookies—soft chocolate chip, buttery shortbread, and spiced ginger snaps—while mastering the use of cinnamon, cocoa powder, and
    fresh berries in creative kitchen experiments.
  core: Kim Davis is an endlessly curious eight‑year‑old whose boundless imagination fuels LEGO cityscapes and sketchbooks, yet they often wrestle with worry that turns bedtime reading into both refuge
    and source of restless thoughts.
background:
  cultural: Kim Jean is a Black girl raised in Hampton, a small town in Spalding County, Georgia. She belongs to a close‑knit African‑American community where church, family gatherings, and neighborhood
    barbecues shape daily life. Her family celebrates cultural traditions such as storytelling from elders, gospel music, and Southern cuisine like collard greens and peach cobbler. Growing up, she hears
    stories about the Civil Rights Movement from her grandparents and participates in local festivals that honor Black heritage, which fuels both her pride and her curiosity about history and identity.
