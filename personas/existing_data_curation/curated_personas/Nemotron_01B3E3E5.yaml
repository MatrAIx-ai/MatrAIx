  career_goals: Neima dreams of one day becoming a veterinarian because she loves caring for her family’s dog and enjoys learning about animal health. At the same time, she is fascinated by how technology
    can make everyday life easier, so she also hopes to explore a future in engineering or robotics, where she can design tools that help protect animals and people. She aspires to combine her compassion
    for living beings with her practical curiosity for how things work.
