personas:
  professional: Neima Phillips, an aspiring junior game developer, channels their love for structure and imagination into creating simple Scratch games that follow clear level designs while they delight
    friends with occasional unexpected glitches.
  sports: Neima Phillips plays forward for the Riverbend Youth Soccer Club, cheers on the local Thunderhawks soccer team, and they supplement weekend practices with bike rides on the community trail and
    occasional backyard frisbee sessions with friends.
  arts: Neima Phillips devours the magical worlds of J.K. Rowling and Rick Riordan, sketches whimsical characters inspired by Bill Watterson’s Calvin and Hobbes, and they binge‑watch Adventure Time for
    visual inspiration while doodling in their sketchbook.
  travel: Neima Phillips enjoys weekend family hikes in Redwood National Forest, dreams of exploring the rock formations at the Grand Canyon, and they plan a future road trip to Europe’s historic castles,
    balancing curiosity with the comfort of familiar routines.
  culinary: Neima Phillips prefers bite‑sized favorites like cheese pizza and chicken nuggets, enjoys helping parents assemble homemade tacos with fresh salsa, and they experiment with LEGO‑inspired fruit
    kebabs using grapes, strawberries and melon cubes.
  core: Neima Phillips blends a love for structured adventures with spontaneous creativity, often juggling unfinished LEGO projects while they daydream about the next fantasy quest.
background:
  cultural: Neima comes from a white Midwestern family rooted in Dayton, Ohio. Her household reflects typical Midwestern values such as community involvement, friendliness, and a strong work ethic. She
    regularly participates in local events like the Dayton Air Show and community fairs, and she has attended church‑based youth groups that emphasize service and togetherness. While her ancestry includes
    German and Irish roots, her family identity is shaped primarily by contemporary American Midwest culture, with an emphasis on school activities, neighborhood friendships, and a love for seasonal traditions
    like pumpkin patches in the fall and outdoor concerts in the summer.
