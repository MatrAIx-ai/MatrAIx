  career_goals: Andy aims to become an executive chef at a renowned farm‑to‑table restaurant within the next five years, where he can shape the entire culinary vision and mentor a talented team. He plans
    to enter national cooking competitions to test his skills against top peers, leveraging his competitive nature. Long‑term, he dreams of opening his own boutique eatery in Lake Elsinore that emphasizes
    locally sourced ingredients, innovative plating inspired by modern art, and a rotating seasonal menu that keeps guests engaged and curious. He also hopes to develop a culinary curriculum or workshop
    series that bridges cooking techniques with artistic expression, reflecting his desire for both structure and creative freedom.
