  career_goals: He aspires to move from front‑line cleaning to a supervisory and eventually a facilities‑management role within an institution that values art and science, such as a museum, university,
    or research center in Flagstaff. He plans to earn a Certified Facility Manager (CFM) credential and become LEED‑Accredited, enabling him to champion sustainability in building operations. He envisions
    launching a small consulting service that offers green‑cleaning solutions and specialized care for galleries and historic buildings. He also hopes to mentor younger workers and lead community workshops
    on eco‑friendly cleaning and basic facility upkeep.
