personas:
  professional: Simon Shields, a 21‑year‑old line cook in a fast‑paced kitchen, blends methodical time‑management and precise knife skills with a curiosity for seasonal Pacific Northwest ingredients, positioning
    them as a reliable team player ready to transition into a sous‑chef role.
  sports: Simon Shields, an avid outdoor enthusiast, spends weekends hiking the forested trails around Mason County and fishing in local streams, follows the Seattle Kraken and Seattle Sounders FC for winter
    sport inspiration, and belongs to a community rowing club where they maintain a modest cardio routine, though they admit to skipping gym days after long shifts.
  arts: Simon Shields captures the misty Pacific coastline through nature photography inspired by Ansel Adams, immerses themselves in culinary documentaries like Netflix's Chef's Table, and devotes quiet
    evenings to woodworking while listening to indie folk duo The Staves, integrating visual and auditory art into their culinary imagination.
  travel: Simon Shields prefers low‑key, nature‑focused trips, having backpacked the Oregon Coast Trail and kayaked the San Juan Islands, while dreaming of a culinary pilgrimage to Hokkaido’s seafood markets
    and a weekend getaway to the historic town of Leavenworth, WA; they plan trips meticulously in a shared Google Sheet but often delay bookings when work gets hectic.
  culinary: Simon Shields experiments with cedar‑plank salmon, Dungeness crab bisque, and wild mushroom risotto, honing their knife precision and portion control while balancing a habit of over‑seasoning
    with hearty aromatics, and they proudly cook a perfect sous‑vide halibut that showcases their dedication to Pacific Northwest flavors.
  core: Simon Shields is a methodical yet curious 21‑year‑old culinary enthusiast who blends forest hikes, precise knife work, and a spreadsheet‑driven budget into a calm, solo‑driven pursuit of seasonal
    Pacific Northwest cuisine, even if they occasionally binge‑watch food documentaries into the early morning.
background:
  cultural: Simon grew up in a working‑class family in Shelton, Washington. His heritage is primarily of European descent, with family roots tracing back to the Midwest and the Pacific Northwest. The region’s
    strong connection to the outdoors, timber industry, and local farming has shaped his values of hard work, self‑reliance, and community. Local traditions such as weekend barbecues, fish fries, and community
    fairs have reinforced his appreciation for simple, wholesome food and modest, neighborly gatherings.
attributes:
  skills: '[''Food safety and hygiene compliance'', ''Knife handling and precision cutting'', ''Vegetable and meat preparation'', ''Basic cooking techniques (grilling, sautéing, baking)'', ''Recipe scaling
    and portion control'', ''Inventory management and stock rotation'', ''Time management and order prioritization'', ''Sanitation and cleaning protocols'', ''Team coordination and communication'', ''Problem
    solving under pressure'']'
  hobbies: '[''Experimenting with recipes'', ''Cooking Pacific Northwest seafood dishes'', ''Hiking'', ''Fishing'', ''Nature photography'', ''Reading food history'', ''Watching culinary documentaries'',
    ''Woodworking'']'
  career_goals: Simon aims to earn his ServSafe certification within the next year and enroll in a culinary associate program at a community college to deepen his technical knowledge. He envisions progressing
    to a supervisory role—such as kitchen manager or sous chef—at a reputable restaurant where he can lead a small, cohesive team. Long‑term, Simon dreams of opening a modest farm‑to‑table café in Shelton
    that showcases seasonal Pacific Northwest produce, offers a calm gathering space for the community, and reflects his blend of curiosity, practicality, and culinary passion.
