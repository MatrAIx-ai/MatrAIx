  hobbies: '[''Gardening'', ''Cooking Traditional Guatemalan Cuisine'', ''Walking in Parks'', ''Reading Historical Fiction'', ''Knitting and Quilting'', ''Volunteering at Community Centers'', ''Language
    Exchange (Spanish-English)'', ''Attending Cultural Festivals'']'
  career_goals: Although she is no longer in the formal workforce, Azul remains driven to make a lasting impact. Her primary ambition is to serve as a cultural ambassador for the Guatemalan community in
    Redwood City, organizing intergenerational workshops that teach traditional cooking, weaving, and Spanish language basics. She hopes to mentor younger volunteers at the local senior center, sharing
    her event-planning know-how and fostering a sense of continuity. Azul also aspires to document her family’s oral histories, creating a small archive that can be shared with local museums or libraries.
    On a personal level, she aims to maintain her health through regular walking and gardening, and to keep her financial affairs in order to ensure stability for her husband and extended family. Ultimately,
    she wishes to leave a legacy of organized, compassionate community service that reflects both her practical nature and her cultural heritage.
