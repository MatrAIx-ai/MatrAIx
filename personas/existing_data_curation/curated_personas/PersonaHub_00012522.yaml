persona_description: A researcher or policy analyst focused on sustainable land use and bioenergy, particularly in the context of African countries and their efforts towards restoring degraded land. They
  are interested in understanding the potential for bioenergy crops in land restoration and how it can strengthen economic incentives for restoration efforts. They are familiar with the Bonn Challenge and
  African Forest Landscape Restoration initiatives, and have applied methodologies such as the Resource Opportunities Assessment Methodology (ROAM) to evaluate restoration options for Rwanda and Kenya.
  They are also aware of the potential for agroforestry to produce a high-yielding mix of food and fuel crops while enhancing biodiversity.
