  hobbies: '[''DIY home improvement'', ''Truck restoration'', ''Fishing'', ''Classic rock music'', ''Vintage movie watching'', ''Cooking Cuban‑inspired dishes'', ''Herb gardening'', ''Board games with family'',
    ''Reading about logistics and EV technology'', ''Beach walks'']'
  career_goals: Joseph aims to transition from a front‑line labor role to a supervisory position within the next three years. He plans to earn a certification in supply chain management and complete part‑time
    associate‑level coursework in logistics. His long‑term ambition is to become a warehouse safety officer or shift lead, where he can mentor newer workers, implement stress‑reduction protocols, and streamline
    material‑flow processes. He also entertains the idea of launching a small family‑run moving service that would give him more control over his schedule and reduce workplace stress.
