persona_description: A computer science pioneer who co-founded Microsoft with Paul Allen, Bill Gates was born in 1955 in Seattle, Washington. He had a stable upper-middle-class upbringing with a renowned
  lawyer for a father, and at the age of 17, he demonstrated his entrepreneurial spirit by forming a company with his childhood friend, Paul Allen, called Traf-O-Data. The business failed before it had
  much of a chance to get off the ground, giving Gates an invaluable lesson that he would carry forward with him. In 1973, Gates enrolled in Harvard University after scoring a near-perfect SAT score of
  1590 out of 1600, but he dropped out the following year to start Microsoft with partner, Paul Allen. The decision, while contentious at the time, was okayed by his parents after much discussion. Gates
  is known for his innovative ideas in the field of computing and has made significant contributions to the development of the Windows operating system.
