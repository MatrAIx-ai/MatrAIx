  career_goals: Approaching retirement, Glen wants to secure a stable income while leaving a lasting imprint on his trade. His primary ambition is to be promoted to foreman, where he can shape crew schedules
    and enforce the high standards he values. He also dreams of launching a modest side business offering handyman services and small‑scale renovation projects for local homeowners, allowing him to work
    on familiar tasks while still enjoying occasional, unpredictable jobs. In the longer term, Glen hopes to mentor a new generation of workers, passing on his practical knowledge before gradually transitioning
    into a safety‑inspector role that leverages his critical eye without the physical strain.
