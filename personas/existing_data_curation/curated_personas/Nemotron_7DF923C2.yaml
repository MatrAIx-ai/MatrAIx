personas:
  professional: Glen Strong is a seasoned construction professional whose three‑decades‑long mastery of framing, concrete forming, and heavy‑equipment operation translates into a reliable foreman‑in‑waiting,
    leveraging a critical eye for inefficiencies while flexibly adapting to on‑site changes, even if his love of routine sometimes clashes with the rush of tight deadlines.
  sports: Glen Strong channels competitive energy into weekly bowling league nights at the local alley, participates in seasonal bass‑fishing tournaments on Lake Charlevoix where they target smallmouth
    bass with custom‑tuned lures, follows the Detroit Lions and Detroit Tigers loyally, and joins a weekend hunting club to trek the Upper Peninsula’s forests for whitetail deer, all while keeping a weather‑app
    handy for spontaneous outings.
  arts: Glen Strong relaxes after a day on the site by tuning into classic‑rock stations that spin Led Zeppelin, The Rolling Stones, and AC/DC, enjoys occasional trips to the community theater for performances
    of “Our Town,” and keeps a faded poster of Jimi Hendrix in the garage where they sometimes strum a battered electric guitar while fixing a tractor, letting music punctuate the rhythm of their hands‑on
    work.
  travel: Glen Strong favors low‑key getaways that blend practicality with nature, such as weekend trips to the Porcupine Mountains for rugged hikes, a seasonal pilgrimage to Door County’s cherry orchards
    for apple‑cider tasting, and a planned winter escape to Florida’s Gulf Coast to escape Michigan’s cold, all organized on short notice through a simple checklist rather than elaborate itineraries.
  culinary: Glen Strong’s palate leans toward hearty, home‑cooked fare—pan‑seared walleye caught on their own lake, venison stew slow‑cooked with root vegetables, a side of buttery corn casserole, and a
    classic apple pie topped with a flaky crust—reflecting moderate cooking skills that shine when using fresh, seasonal ingredients from their backyard garden and local farmers’ markets.
  core: Glen Strong is a pragmatic, detail‑driven construction veteran who balances a love for routine with spur‑of‑the‑moment outdoor pursuits, obsessively hones efficiency, and quietly worries about health
    and retirement while indulging in classic rock, bowls for fun, and fixes anything that breaks.
background:
  cultural: Glen hails from a multigenerational family of German‑ and Irish‑descended settlers who established farms and small‑town businesses in the Upper Midwest. Growing up in Mc Bain, Michigan, he absorbed
    the region’s Midwestern values of hard work, self‑reliance, and modesty. The local culture emphasizes practicality, community gatherings such as county fairs and picnics, and a strong attachment to
    seasonal traditions like hunting season and winter snowmobiling. The Protestant church plays a central role in his community life, reinforcing a straightforward, no‑nonsense approach to both work and
    family. These cultural influences shape Glen’s preference for routine, his pragmatic outlook, and his inclination to balance personal ambition with a sense of local responsibility.
