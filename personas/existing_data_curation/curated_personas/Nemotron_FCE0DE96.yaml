personas:
  professional: Joyce Smith is an aspiring teen visual artist who blends traditional watercolor landscapes of the Charleston lowcountry with digital illustrations, using basic coding skills to create interactive
    storybooks, and they thrive in quiet, solitary studio spaces while maintaining a meticulous schedule for school projects and art deadlines.
  sports: Joyce Smith channels their energy into solitary coastal trail runs, weekend tide‑pool hikes, and early‑morning practices with a local youth rowing club while cheering for the Charleston Battery
    soccer team and the South Carolina Gamecocks football squad, and they prefer personal endurance activities over competitive team sports.
  arts: Joyce Smith immerses themselves in visual storytelling, drawing watercolor inspiration from Claude Monet's light, narrative depth from Shaun Tan's illustrations, and imaginative themes from Neil Gaiman's
    fantasy novels, regularly visiting the Gibbes Museum of Art and local workshops, and they frequently curate a digital sketchbook of fan art for the Legend of Zelda series.
  travel: Joyce Smith favors low‑key, self‑guided trips that pair nature photography with historic exploration, having trekked the Savannah riverfront, the Outer Banks, and camped in Asheville’s Blue Ridge
    Mountains, and they dream of a future study‑tour to Italy’s misty Cinque Terre coast to capture coastal light.
  culinary: Joyce Smith delights in lowcountry comfort foods, often cooking shrimp and grits with a dash of hot sauce and simmering gumbo with homemade spice blends, while also baking lemon‑blueberry scones
    and experimenting with watercolor‑inspired plating, though they sometimes skip meals when lost in an art project.
  core: Joyce Smith is a solitary, imagination‑driven teen who channels curiosity into watercolor landscapes, digital art, and quiet nature hikes, and they balance meticulous organization with a love for
    solitary creative flow.
background:
  cultural: Joyce grew up in Dorchester County, a suburban part of the Charleston metropolitan area in South Carolina. Her family’s cultural roots are typical of the white Southern middle class, emphasizing
    hospitality, community, and a reverence for tradition. The lowcountry’s coastal landscape, historic architecture, and the lingering presence of Gullah culture shape her appreciation for natural beauty
    and storytelling. She attends a public middle school that integrates regional history into its curriculum, and she is familiar with local customs such as attending the Charleston Marathon, enjoying
    shrimp and grits, and participating in community events like Spoleto Festival USA. While her upbringing reflects mainstream Southern values, Joyce’s strong curiosity and artistic leanings lead her to
    seek broader perspectives through literature and digital media.
