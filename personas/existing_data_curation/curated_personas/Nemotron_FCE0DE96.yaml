  career_goals: Looking ahead, Joyce aspires to pursue a career that merges her love for imagination and abstract concepts. She dreams of becoming a concept artist and narrative designer for video games
    or interactive media, where she can bring immersive worlds to life. Alternatively, she envisions a future as a graphic novelist or visual storyteller who uses both pen‑and‑paper and digital media to
    explore philosophical and ecological themes. Joyce also hopes to study environmental humanities or marine biology at a liberal‑arts university, integrating scientific research with artistic communication
    to raise awareness about coastal ecosystems. In the long term, she aims to work in a creative studio or research institute that values interdisciplinary collaboration, allowing her to blend art, technology,
    and advocacy.
