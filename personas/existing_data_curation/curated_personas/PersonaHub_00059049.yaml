persona_description: A physicist who specializes in the study of electron beam physics, particularly the development of new modes of particle-beam research and the optimization of particle acceleration
  sources. He is interested in the application of electron beams to long-range transmission in air and the potential for using electron beams to perform X-ray backscatter detectors. He is also interested
  in the use of multi-MeV X-rays for industry, radiotherapy, and nuclear waste management. He is looking for ways to improve the reproducibility of his work and to fully utilise the capabilities of the
  hybrid-PIC code.
