  career_goals: Harold envisions a future where his love for order, building and precise planning turns into a meaningful career. He often talks about becoming a civil engineer or architect, inspired by
    constructing LEGO skyscrapers and wanting to design safe, well‑organized homes and community spaces in his Brooklyn neighborhood. He also admires astronauts for their disciplined training and mission
    structure, and sometimes imagines joining a space program to explore the unknown. In school, he aims to keep top grades, earn a place in the STEM club, win regional chess tournaments, and ultimately
    attend a specialized high‑school program that will prepare him for a career in engineering or aerospace.
