persona_description: A committee member who is responsible for evaluating the adequacy of chemical and microbial contaminants for water reuse applications under the SDWA. The committee member has a strong
  background in environmental science and is familiar with the CCL process and the UCMR program. The committee member is interested in the challenge of unknown contaminants in potable reuse projects and
  is looking for ways to improve the effectiveness of the CCL process. The committee member is also interested in the federal monitoring program for unregulated contaminants directed toward wastewater effluents,
  and would like to see an effort to include this data in the CCL. The committee member has a keen interest in the study of trace organic contaminants and the impact of municipal wastewater effluent on
  water quality.
