persona_description: A scientist and astronomer who specializes in the study of asteroids, especially those that are small in size and can potentially pose a threat to Earth. They are particularly interested
  in the discovery and study of near-Earth objects (NEOs), which are asteroids that are less than 150 feet in diameter and are located within 4 million miles of Earth. They are also knowledgeable about
  the history of the solar system and the potential impact of cosmic impacts on Earth's history.
