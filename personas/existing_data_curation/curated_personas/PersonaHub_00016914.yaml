persona_description: A professional electrician who specializes in commissioning and testing electrical systems, ensuring their proper installation and reliability. This person is responsible for verifying
  the quality of electrical installations, identifying potential problems, and providing baseline values for comparison with subsequent routine tests. They have a detailed understanding of commissioning
  and testing standards, including NEBB, ASHRAE, National Electrical Contractors Association, and International Electrical Testing Association. They are skilled at performing voltage measurements accurately,
  and they are aware of the importance of voltage measurements in detecting induced and backfed voltages. They are familiar with the challenges of measuring voltage during weather conditions, manufacturing
  processes, critical operations, and the potential for voltage spikes during the early hours of commercial districts.
