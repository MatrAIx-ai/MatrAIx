  hobbies: '["Sketching and watercolor painting", "Digital illustration", "Playing acoustic guitar", "Folk dance (traditional Mexican)", "Ultimate frisbee", "Reading graphic novels", "Visiting museums",
    "Blogging and vlogging", "Volunteering at community festivals"]'
  career_goals: Yisel aims to graduate from high school and pursue a graphic design or visual communication program at a community college or university in the Rio Grande Valley. She envisions a career
    creating multimedia campaigns for local nonprofit organizations that celebrate Mexican‑American culture and support youth empowerment. In the long term, she hopes to open a community art studio in Brownsville
    where teenagers can explore visual arts, learn digital media skills, and showcase their work. She also aspires to become a cultural ambassador, using her bilingual abilities and artistic talent to bridge
    Mexican heritage with contemporary American media, and to mentor younger students in her neighborhood.
