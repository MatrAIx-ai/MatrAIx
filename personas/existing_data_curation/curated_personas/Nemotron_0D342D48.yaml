personas:
  professional: Yisel Lopez is an aspiring visual storyteller who merges watercolor cityscapes with digital illustration to capture the lively border town atmosphere, and they use their organized, methodical
    mindset to schedule weekly sketch sessions and lead community mural projects.
  sports: Yisel Lopez is a dedicated ultimate frisbee player with the Brownsville Youth Flyers, enjoys swimming at the community pool in summer, and follows the San Antonio Spurs, Houston Astros, and Dallas
    Cowboys, often wearing their jerseys while cheering at local watch parties.
  arts: Yisel Lopez immerses themselves in folk dance rehearsals that celebrate regional traditions, strums acoustic guitar to a mix of cumbia, norteña, and modern pop hits by artists like Selena and Taylor
    Swift, and fills sketchbooks with watercolor portraits of local wildlife inspired by graphic novel masters such as Marjane Satrapi.
  travel: Yisel Lopez has explored San Antonio’s River Walk and a school exchange in Mexico City, dreams of attending Día de los Muertos festivities in Oaxaca, and plans future trips to New York’s Museum
    of Modern Art, always crafting low-budget itineraries that balance family obligations with their love for cultural immersion.
  culinary: Yisel Lopez loves cooking tamales and tacos al pastor with fresh cilantro and lime, whips up guacamole for friends, enjoys sipping horchata during late-night study sessions, and rates themselves
    as an intermediate home chef who still burns the edges of quesadillas when distracted by music.
  core: Yisel Lopez blends border rhythms into vibrant art, stays meticulously organized yet occasionally procrastinates on schoolwork, and channels their outgoing energy into community projects while never
    missing a chance to strum a guitar before bedtime.
background:
  cultural: Yisel grew up in a bilingual Mexican‑American household in Brownsville, Texas, a city that sits on the U.S.-Mexico border. Her family maintains strong ties to Mexican traditions, celebrating
    holidays such as Día de los Muertos, Las Posadas, and her own quinceañera, while also embracing local Texan customs. She is immersed in the rhythms of border life—listening to norteña and cumbia, sharing
    meals that feature tacos al pastor and tamales, and participating in community events like Charro Days and the annual Rio Grande Valley Music Festival. This blend of Mexican heritage and American influences
    shapes her worldview, language use, and artistic expression, fostering a deep appreciation for cultural hybridity.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Drawing and watercolor painting", "Digital illustration (Procreate, Canva)", "Event planning and coordination", "Team leadership and facilitation",
