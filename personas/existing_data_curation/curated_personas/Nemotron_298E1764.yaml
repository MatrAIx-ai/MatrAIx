personas:
  professional: Jose Camargo is a seasoned maintenance and repair professional with over four decades of hands‑on experience in HVAC, electrical, plumbing and facility upkeep, who couples relentless curiosity
    for new diagnostic techniques with reliable, time‑tested methods, uses his bilingual fluency to bridge gaps between vendors and crews, and now channels that mix of practicality and innovation into mentoring
    younger technicians as he pursues a certified maintenance supervisor credential.
  sports: Jose Camargo stays active by playing in a community soccer league called the 'Coral Gables Kickers' during the winter, cheering on Inter Miami CF and the Miami Heat on game nights, and prefers
    informal fitness like gardening and weekend dominoes tournaments over regimented gym routines.
  arts: Jose Camargo is a lively patron of the arts, always first on the dance floor at local festivals where he spins salsa to the rhythms of Rey Ruiz and grooves to punta beats from Polinesia, while his
    weekend hobby of assembling DIY electronic music devices reflects his hands‑on curiosity for sound.
  travel: Jose Camargo prefers short, relaxed getaways over long voyages, often spending a weekend driving down to the Florida Keys for fresh seafood and sunset views, dreaming of a future trip to Cartagena’s
    historic walled city to explore its vibrant Caribbean culture while keeping travel costs modest.
  culinary: Jose Camargo is an enthusiastic home cook who perfects the classic baleada—flour tortilla folded around refried beans, creamy queso blanco, scrambled eggs and a drizzle of salsa verde—while
    experimenting with fresh cilantro, ripe avocado, and locally sourced shrimp in his backyard garden kitchen.
  core: Jose Camargo blends seasoned hands‑on expertise with a restless curiosity, juggling community gossip at barbecues while occasionally misplacing tools in his garage, and despite a laid‑back approach
    to scheduling, he never skips a chance to mentor a younger technician.
background:
  cultural: Jose grew up in a small town in Honduras before moving to Florida, carrying with him a strong sense of Honduran identity. He celebrates Honduran holidays such as Independence Day and La Feria
    Juniana, and maintains the Spanish language as his primary means of communication at home. His Catholic faith, love for family, and appreciation for community solidarity shape his daily life, while
    his experiences in Miami‑Dade have blended his traditions with the vibrant multicultural fabric of the city.
