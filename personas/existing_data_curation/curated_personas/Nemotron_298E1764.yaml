    cooking'', ''Attending local festivals'']'
  career_goals: Looking ahead, Jose aims to transition into a supervisory role where he can mentor younger technicians and formalize his knowledge through a certified maintenance supervisor credential.
    He also hopes to launch a small side business offering handyman services to local residents, giving him the flexibility to set his own schedule while staying active in his community. Ultimately, he
    wishes to be recognized as a go‑to expert for energy‑saving retrofits in Miami‑Dade’s residential buildings.
