personas:
  professional: Hale Wheat, a 16-year-old aspiring diesel-engine technician, leverages meticulous step-by-step problem-solving, solid time-management, and calm mediation skills to excel in hobbyist automotive
    repairs and model kit assembly, foreshadowing a future as a reliable, structure-driven mechanic for local farms.
  sports: Hale Wheat enjoys low-key outdoor pursuits, spending weekends fishing at Lake Alice with the Brookings Youth Fishing Club and cheering on the local high school Bulldogs football team, while they
    maintain a modest fitness routine of weekend hikes and occasional pick-up basketball games.
  arts: Hale Wheat’s creative outlet centers on building detailed Revell model kits of classic aircraft and vintage cars, complemented by strategic gaming in Minecraft survival mode and a fondness for classic
    rock legends like The Beatles and country storyteller Bob Dylan, which together shape a disciplined yet imaginative leisure identity for them.
  travel: Hale Wheat prefers planned, budget-conscious getaways, often road-tripping to state parks such as Yellowstone or the historic automotive museum in Detroit, where they blend their love of nature,
    engine history, and hands-on exploration while saving for future college visits.
  culinary: Hale Wheat favors hearty, straightforward meals like homemade chili with ground beef, baked potatoes with sour cream, and grilled trout freshly caught from Lake Alice, cooking at a beginner’s
    level using clear, step-by-step recipes and a favorite pantry of canned beans, garlic, and paprika, which they enjoy preparing after a day on the lake.
  core: Hale Wheat is a structure-loving teen who balances meticulous model-building, fishing calm, and future-focused mechanic ambitions, yet they wrestle with persistent worry and occasional impulse spending.
background:
  cultural: Hale was raised in Brookings, South Dakota, a small Midwestern city with deep agricultural roots and a tight-knit community ethos. His family's background traces back to German-Scandinavian
    farm families that settled the region, valuing hard work, self-reliance, punctuality, and modesty. Local cultural staples—including the county fair, high-school sports, church gatherings, and community
    service events—shape his worldview. The regional emphasis on practicality, straightforward communication, and predictable routines aligns closely with Hale's own preference for structure and order.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Routine automotive maintenance'', ''Event organization'', ''Time management'', ''Clear communication'', ''Step-by-step procedural execution'', ''Basic woodworking'']'
  hobbies: '[''Model kit building'', ''Strategy video gaming'', ''Fishing'', ''4-H club volunteering'', ''Reading self-help books'', ''Youth meditation group'']'
  career_goals: To improve his future prospects, Hale aims to earn his GED within the next year and then enroll in a technical college program focused on diesel-engine or farm-equipment technology. He sees
    himself working as a certified mechanic for a local agricultural service provider, a role that offers predictable schedules and stable income. Over the longer term, he hopes to start a modest side business
    providing seasonal equipment maintenance for nearby farms, giving him both financial independence and a structured, reliable work routine.
