persona_description: A materials scientist who specializes in the creation and manipulation of carbon-based materials, particularly in the development of new electronic display technologies and the creation
  of single-crystal diamond objects. He is currently working on a study that aims to create Q-carbon, a new solid phase of carbon that is promising for developing new electronic display technologies and
  has potential applications in the field of medicine. He is also interested in the properties and potential applications of Q-carbon and is currently studying its properties further in depth before making
  any conclusions.
