  skills: '[''digital illustration'', ''basic Python programming'', ''guitar playing'', ''critical analysis'', ''problem solving'', ''project organization'', ''strategic video‑gaming'']'
  hobbies: '[''digital drawing'', ''3D modeling'', ''guitar playing'', ''competitive video gaming'', ''science‑fiction reading'', ''robotics club'', ''nature photography'', ''landscape sketching'', ''library
    volunteering'']'
  career_goals: Richard aspires to blend his artistic talent with technology by pursuing a career in video-game concept art or interactive media design. He plans to build a strong portfolio of digital artwork
    and develop more advanced programming skills in order to create his own indie games. In the longer term, he hopes to attend a university known for both fine‑arts and computer‑science programs, secure
    a scholarship, and eventually work for a game studio where he can influence narrative and visual direction. He also dreams of launching a YouTube channel that teaches beginner artists and programmers,
    turning his love for sharing knowledge into a sustainable side income.
