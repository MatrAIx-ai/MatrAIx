personas:
  professional: Richard Eberhart, a budding robotics club member and self‑taught 3D modeler, spends his afternoons sketching characters and riffing on a rhythm guitar, and they channel their curiosity and
    competitive streak into designing autonomous vehicle prototypes while maintaining a meticulous notebook of code revisions and art concepts.
  sports: Richard Eberhart, a fan of the Charlotte Hornets NBA team and the UNC Tar Heels basketball program, plays pickup basketball at the local YMCA on Friday evenings, follows Catawba College football
    on weekends, and they occasionally join family hikes in the foothills of the Blue Ridge Mountains, balancing competitive sports enthusiasm with a love for outdoor endurance activities.
  arts: Richard Eberhart, an aspiring digital artist and rhythm guitarist, draws inspiration from Hayao Miyazaki’s animated worlds, Neil Gaiman’s speculative storytelling, and the soulful riffs of John
    Mayer, while they spend weekends mastering Blender for 3D character sculpting and practicing guitar chords that echo Jimi Hendrix’s improvisational flair, forging a unique blend of visual and musical
    creativity.
  travel: Richard Eberhart, who dreams of exploring both natural wonders and bustling cities, has trekked the trails of Great Smoky Mountains National Park, visited the historic monuments of Washington
    D.C., and hopes to photograph cherry blossoms in Kyoto, Japan, while they favor adventurous, DIY‑planned trips that let them capture wildlife on the camera and sketch landscapes on the go.
  culinary: Richard Eberhart, a budding home‑cook who favors comfort foods like creamy mac and cheese, pepperoni pizza with fresh basil, and sushi rolls with avocado and cucumber, enjoys experimenting with
    spice blends in homemade ramen bowls, but they often skip proper kitchen cleanup, leaving a trail of utensils on the counter after late‑night snack sessions.
  core: Richard Eberhart, a tech‑savvy, competitively minded teen who sketches in the woods, codes autonomous bots, strums rhythm guitar, and balances a meticulous budget with occasional impulsive game
    splurges, embodies a curious yet pragmatically skeptical outlook on life.
background:
  cultural: Richard comes from a white, Southern-American family in China Grove, a small town in Rowan County, North Carolina. His upbringing blends typical Southern cultural values—community gatherings,
    high-school football nights, and a love for barbecue—with a modern, tech-savvy outlook shaped by online communities and digital media. He attends a public middle school where he participates in art
    and robotics electives, and his family encourages independent thinking and self‑initiative, allowing him to explore both conventional Southern traditions and unconventional creative pursuits.
