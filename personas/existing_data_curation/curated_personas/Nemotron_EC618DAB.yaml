personas:
  professional: Michel Benitez, a ten‑year‑old budding game developer, spends weekends coding simple Python‑based games and designing intricate LEGO robots, channeling their analytical curiosity and practical
    mindset into self‑directed projects while preferring solitary, focused work over group collaborations.
  sports: Michel Benitez embraces solo fitness through mountain‑bike rides on the Ventura County hills, occasionally joining the local junior cycling club and cheering for the Los Angeles Dodgers and the
    LA Lakers from their bedroom, while avoiding team sports that feel socially draining.
  arts: Michel Benitez finds creative refuge in playing piano extracts of Bach and Debussy, listening to folk ballads from their family's tradition, and devouring sci‑fi graphic novels by artists like H.R.
    Giger, blending a love of classic composition with futuristic visuals.
  travel: Michel Benitez prefers low‑key, nature‑focused trips, having explored the red rocks of Joshua Tree and the coastal trails of Santa Barbara, while dreaming of a future adventure to Kyoto’s bamboo
    forests to experience the anime culture that fuels their coding imagination.
  culinary: Michel Benitez enjoys hands‑on kitchen time, mastering the art of steaming tamales with masa and pork, tossing together homemade guacamole with ripe avocados and lime, and occasionally experimenting
    with pepperoni pizza, yet they admit to over‑relying on instant noodles when homework piles up.
  core: Michel Benitez is a solitary, curiosity‑driven ten‑year‑old who balances LEGO engineering, code‑craft, and quiet piano practice with a competitive edge in video gaming, all while juggling a modest
    allowance and occasional allergy woes.
background:
  cultural: Michel grows up in a Mexican‑American household in Newbury Park, where Spanish is spoken alongside English. His family celebrates cultural traditions such as Día de los Muertos, Christmas Posadas,
    and enjoys Mexican cuisine, especially tacos, tamales, and atole. He attends a public elementary school where he participates in bilingual programs, giving him fluency in both languages. The blend of
    his parents’ Mexican heritage and the suburban Californian environment influences his worldview, fostering appreciation for both Mexican cultural values like family cohesion and the individualistic,
    innovative spirit of the tech‑focused community in Ventura County.
