  hobbies: '[''Reading science‑fiction'', ''LEGO model building'', ''Coding small games'', ''Chess (online)'', ''Bicycle riding in Ventura County'', ''Listening to Mexican folk music'', ''Piano practice'',
    ''Competitive strategy video games'', ''Cooking traditional Mexican dishes'']'
  career_goals: Michel dreams of becoming a robotics engineer or software developer who creates innovative technology that bridges his Mexican heritage with cutting‑edge AI, perhaps designing educational
    tools for bilingual students. He aims to attend a top university for computer science, participate in robotics competitions like FIRST LEGO League, and eventually work at a leading tech company or start
    his own venture. His competitive nature also fuels an ambition to become a professional esports player in strategy games, while his practical mindset keeps him focused on achievable milestones like
    mastering Python, earning certifications, and building a portfolio of personal projects.
