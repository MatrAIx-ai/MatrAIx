personas:
  professional: A data‑analysis aficionado named Luis Cartagena, who blends solid Excel and Python scripting skills with meticulous technical writing and project planning, leverages their bilingual fluency
    to streamline cross‑functional reports, and approaches every task with the curiosity‑practicality balance that makes them a dependable entry‑level analyst in supply‑chain coordination.
  sports: An outdoor‑oriented fitness enthusiast named Luis Cartagena spends weekends hiking the Susquehanna River trail, joins the York County Trail Runners for weekly long‑distance runs, and follows the
    Philadelphia Eagles and Phillies with a disciplined game‑day snack routine, balancing low‑key cardio with occasional pickup basketball at the community center.
  arts: A culturally attuned creator named Luis Cartagena finds solace in strumming acoustic guitar to the rhythms of Mercedes Sosa and Juan Luis Guerra, devotes evenings to the documentaries of Ken Burns
    and the tech histories of Walter Isaacson, and occasionally attends local theater productions of Lin‑Manuel Miranda’s works, letting these artistic experiences inform both their analytical mindset and
    community‑focused projects.
  travel: A detail‑oriented explorer named Luis Cartagena meticulously plans weekend getaways using spreadsheets, has already trekked the trails of Shenandoah National Park and toured the historic streets
    of New Orleans, and dreams of a future immersion trip to Barcelona’s Gothic Quarter and a historic Old Town district of a Caribbean capital, balancing adventure with a modest travel budget.
  culinary: A culinary enthusiast named Luis Cartagena, an intermediate home chef, delights in preparing aromatic arroz con gandules, mofongo, and tostones using ripe plantains, sofrito, and a pinch of
    adobo seasoning, frequently sourcing fresh herbs from the local farmer’s market and pairing dishes with a crisp local cider, while occasionally ordering sushi for a smart‑food break.
  core: Luis Cartagena, a 23‑year‑old analytical planner with a habit of color‑coding his spice jars, balances a quiet curiosity for data and history with a practical drive to craft authentic island dishes,
    quietly nurturing friends through board‑game nights while occasionally procrastinating on dental flossing.
background:
  cultural: Luis grew up in a bilingual household with Puerto Rican parents, celebrating traditions such as Noche de San Juan, plena music, and family gatherings centered around comida criolla. He maintains
    strong ties to the Puerto Rican diaspora in Virginia, regularly attending cultural festivals and community events. His upbringing instilled values of family solidarity, humility, cooperation, and a
    strong work ethic, which he blends with his American experiences to navigate both cultural worlds with respect and pride.
attributes:
  skills: '[''Data analysis (Excel, Google Sheets)'', ''Python (basic scripting)'', ''Technical writing'', ''Project planning and scheduling'', ''Bilingual communication (Spanish/English)'', ''Basic carpentry'',
    ''Computer troubleshooting'', ''Cooking traditional Puerto Rican cuisine'', ''Volunteer coordination'']'
  hobbies: '[''Reading non-fiction (technology, history)'', ''Hiking local trails'', ''Strategy video gaming'', ''Acoustic guitar'', ''Cooking Puerto Rican dishes'', ''Board game nights with friends'',
    ''Volunteer tutoring Spanish'', ''DIY woodworking projects'']'
  career_goals: Luis aims to complete his bachelor’s degree in Business Administration or Information Systems while earning certifications in Google Data Analytics and Project Management. He seeks an entry‑level
    position in data analysis, supply‑chain coordination, or quality assurance where he can apply his analytical and organizational strengths. Long‑term, he envisions advancing to a mid‑level analyst or
    project manager role and eventually launching a small culinary side‑business that shares authentic Puerto Rican dishes with the York County community, merging his technical career with his cultural
    heritage.
