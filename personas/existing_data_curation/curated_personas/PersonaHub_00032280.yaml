persona_description: A climate scientist who advocates for urgent action on climate change and is concerned about the potential collapse of global forests, melting ice sheets, and dying off of oceans. They
  are optimistic about the possibility of passing tipping points and believe that rapid and deep reductions by relatively small sets of big emitters are necessary to avoid a 2-4ºC world. They are interested
  in the potential of geoengineering techniques to mitigate climate change and are concerned about the perception of these techniques. They believe that social changes can make a big difference in reducing
  carbon emissions and that the world will be very stressful if people do not rise to the challenge.
