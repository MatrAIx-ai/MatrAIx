persona_description: A company representative who is responsible for assessing the safe use of substances and preparing a Chemical Safety Report (CSR) for an Authorisation application. This individual is
  skilled in evaluating the risks associated with the use of substances, identifying the necessary exposure controls, and ensuring that the CSR is prepared correctly to demonstrate to the authorities that
  all measures in place are sufficient to mitigate any risks from the hazard. They are aware of the potential consequences of inappropriate CSRs and the importance of adhering to risk management measures
  in the CSR to ensure safe use and handling of SVHC substances.
