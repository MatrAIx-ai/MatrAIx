persona_description: A permafrost scientist or researcher who is passionate about understanding the processes that govern the formation and thawing of permafrost, and how these processes impact carbon storage
  and emissions to the atmosphere. They are interested in the role of permafrost in the carbon cycle and its potential to mitigate climate change through the sequestration of carbon. They may also be interested
  in the interdisciplinary aspects of permafrost research, such as the connection between permafrost and global warming, and the use of permafrost data and insights in other scientific fields.
