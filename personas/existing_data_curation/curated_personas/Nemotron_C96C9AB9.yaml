  career_goals: Benjamin aims to rise to a regional or district manager position within a national restaurant chain over the next three to five years, leveraging his STEM background to drive efficiency
    and innovation across multiple locations. He is competitive and wants to be recognized as a top performer in sales growth and operational excellence. In the longer term, he plans to launch his own tech‑forward
    restaurant concept that merges data analytics, smart kitchen equipment, and a community‑centric dining experience. To support these ambitions, he is considering an MBA or a certification in hospitality
    management, and he intends to mentor emerging talent from under‑represented backgrounds.
