personas:
  professional: Benjamin Spears, a 26-year-old operations specialist at a national restaurant chain, leverages a STEM background and a knack for smart-kitchen tech to cut costs and boost sales, while their
    laid-back scheduling and healthy skepticism drive them to constantly validate data as they chase the top regional manager spot.
  sports: Benjamin Spears plays pickup basketball at the east‑side community court, coaches a youth league team affiliated with the local youth center, and follows the Detroit Pistons, Detroit Lions, and
    Detroit Tigers, while also cheering for the NBA’s Miami Heat during the playoffs.
  arts: Benjamin Spears curates playlists that blend R&B icons like D'Angelo and H.E.R., hip‑hop verses from J. Cole, and jazz classics from John Coltrane, frequently attending live shows at Detroit’s The
    Fillmore and local spoken‑word nights, letting music fuel both their cooking experiments and community mentoring.
  travel: Benjamin Spears plans most trips on a whim, hitting the road for weekend escapes to New Orleans for its Creole cuisine, a Michigan Upper Peninsula hike in summer, and dreaming of a future culinary‑tech
    tour in Barcelona, balancing low‑budget spontaneity with occasional savvy bookings on Airbnb.
  culinary: Benjamin Spears, an intermediate home chef, blends Southern soul‑food staples like fried chicken and collard greens with Michigan’s seasonal produce—think shrimp and white‑fish grits topped
    with smoked paprika and fresh apple slaw—while experimenting with smart‑oven sous‑vide techniques and perfecting their signature honey‑glazed BBQ ribs.
  core: Benjamin Spears is a sociable, data‑driven food‑service leader who mixes tech curiosity with a laid‑back, sometimes disorganized hustle, turning community barbecues and basketball games into both
    a playground and a proving ground for their competitive ambitions.
background:
  cultural: Benjamin is a second‑generation African‑American who grew up in the Detroit metropolitan area before moving to Farmington. His family’s Southern roots and the vibrant Black community in Michigan
    have instilled a strong sense of cultural pride, emphasizing music, storytelling, and soul‑food traditions. He celebrates cultural milestones such as Juneteenth and Kwanzaa, enjoys gathering with friends
    and family around shared meals, and incorporates Midwestern values of hard work and community support into his everyday life. This blend of heritage informs his outgoing personality, his love for communal
    dining experiences, and his commitment to uplifting others through mentorship.
