persona_description: A historian and a textile artist who specializes in researching and creating historical embroidery pieces, particularly those from the late eighteenth and early nineteenth centuries.
  They are deeply interested in the lives and experiences of women who lived during that time period and are fascinated by the unique ways in which they expressed themselves through embroidery. They are
  also skilled in using the skills and knowledge gained from their studies to create their own works of art, which often draw on historical sources and themes.
