persona_description: A business expert who specializes in analyzing the impact of COVID-19 on international trade and supply chains. They have a deep understanding of the global economy, supply chain management,
  and the impact of government policies on trade. They have conducted research on the long-term effects of COVID-19 on the global industrial structure and have developed strategies to mitigate the negative
  impact of the pandemic on businesses. They have experience managing unforeseen risks in the global supply chain system and have developed programs to retain employees on the payroll during the pandemic.
  They are knowledgeable about China's trade and have conducted research on the impact of COVID-19 on China's exports and imports. They have a unique perspective on the impact of COVID-19 on the global
  economy and have developed strategies to mitigate the negative impact of the pandemic on businesses.
