  hobbies: '[''drawing and coloring'', ''reading adventure books'', ''playing soccer'', ''building with LEGO'', ''singing and listening to music'', ''exploring nature and collecting items'', ''helping in
    the kitchen'', ''participating in cultural festivals'']'
  career_goals: Fidencio dreams of becoming someone who can blend creativity and curiosity. He often says he wants to be an artist who paints vibrant pictures of his family and community, or an astronaut
    exploring new worlds. He also imagines helping others as a teacher, sharing his love for stories and art. In the near term, he aims to improve his reading level, master more complex drawing techniques,
    and learn to play a simple musical instrument. He aspires to be a role model for younger kids in his neighborhood, organizing small art workshops or community games.
