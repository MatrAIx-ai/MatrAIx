  hobbies: '["Playing at the park with peers", "Circle games and group dancing", "Storytime at the local library", "Building forts and LEGO construction", "Crafting (hand‑made cards, paper mache)", "Exploring
    nature and backyard gardening", "Helping in the kitchen with pupusa preparation"]'
  career_goals: Sandy often talks about grown‑up jobs she admires. She says she wants to be a teacher because she loves helping friends learn new words, and she also dreams of being a veterinarian because
    she cares deeply for animals at her family’s pet store. She imagines herself someday leading a community garden in Saunderstown, where she can share fresh vegetables and Salvadoran recipes with neighbors.
    In the short term, her ambition is to finish preschool with a “Super Star” badge for kindness and to learn to tie her shoes, balancing her natural curiosity with a practical step‑by‑step approach.
