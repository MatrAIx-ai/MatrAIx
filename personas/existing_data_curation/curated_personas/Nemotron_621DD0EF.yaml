personas:
  professional: Sandy Moralesmorales, a budding playground architect, channels their curiosity and practicality by designing elaborate forts with building blocks that are both creative and structurally
    sound, while responsibly sharing the materials with friends.
  sports: Sandy Moralesmorales loves the burst of energy in springtime when they run in the preschool's Little Kickers soccer club, proudly sporting a tiny jersey with the colors of the local River City
    Raptors while also cheering for the Chicago Cubs during baseball season, and they delight in weekly dance classes that double as cardio play.
  arts: Sandy Moralesmorales spends afternoons humming the tunes of 'Let It Go' from Frozen and 'You’ve Got a Friend in Me' from Toy Story, drawing vivid pictures of their favorite Disney princesses, and
    they eagerly watch live performances of The Lion King whenever the family trips to the city theater.
  travel: Sandy Moralesmorales loves family road trips that balance playful stops at the local aquarium with longer adventures like visiting Disneyland in California, and they dream of exploring the bright
    colors of the Great Barrier Reef on a future beach vacation, though they usually rely on parents' bus schedules and bring along their favorite stuffed bunny for comfort.
  culinary: Sandy Moralesmorales eagerly devours spaghetti with marinara sauce topped with a sprinkle of parmesan, dips apple slices in peanut butter, and, in their limited kitchen experiments, mixes cereal
    with milk and adds a dash of cinnamon for extra flavor, while occasionally trading a bite of chicken nuggets for a sticker with a friend.
  core: Sandy Moralesmorales is a curious, sociable preschooler who balances imaginative play with practical organization, often arranging toys by size while never missing a chance to chat with new friends,
    and they have a habit of humming the same tune during bedtime.
background:
  cultural: Sandy comes from a Salvadoran family that maintains strong cultural ties while living in Saunderstown, Rhode Island. She grows up hearing both Spanish and English at home, celebrating traditions
    such as Día de los Muertos with simple altars and enjoying dishes like pupusas and arroz con pollo at family gatherings. Her grandparents share Salvadoran lullabies and stories, reinforcing a sense
    of heritage. The local Hispanic community center and the town’s multicultural events give her opportunities to wear traditional dresses during festivals and learn basic folkloric dances, blending her
    Salvadoran roots with the broader New England environment.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Basic counting and number recognition", "Early reading of picture books", "Fine motor skills (cutting, coloring, LEGO building)", "Social cooperation
