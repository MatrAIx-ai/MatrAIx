  career_goals: Although retired from full-time teaching, Mirsada aims to continue contributing to education through volunteer tutoring, establishing an intergenerational reading program, and mentoring
    novice teachers in the Chester‑Chesterfield area. She hopes to compile a collection of short stories inspired by her childhood in rural Virginia and publish them for local school libraries. Additionally,
    she aspires to lead a community garden project that promotes mental well‑being for seniors, and to complete a certificate in gerontology to better support aging peers.
