  hobbies: '[''Reading historical fiction'', ''Poetry'', ''Gardening'', ''Birdwatching'', ''Knitting'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Small-group book club'', ''Adult reading tutoring'',
