persona_description: A Michigan State University associate professor and Great Lakes Bioenergy Research Center (GLBRC) scientist who specializes in the engineering of poplars for digestibility and the development
  of more energy-efficient ways to convert biomass into fuel. His research focuses on the use of exotic genes to alter the lignin polymer in predesigned but plant-compatible ways, essentially "designing
  lignin for chemical deconstruction." His work is notable for being the direct result of a collaboration funded by the Great Lakes Bioenergy Research Center, one of three U.S. Department of Energy-funded
  Bioenergy Research Centers created to make transformational breakthroughs in new cellulosic biofuels technology.
