personas:
  professional: Olga Merced, a community liaison‑in‑training who harnesses bilingual fluency and razor‑sharp event‑planning to orchestrate neighborhood festivals, church gatherings, and volunteer initiatives,
    while nurturing a side venture to cater authentic pupusas and tamales from her kitchen.
  sports: Olga Merced, a fervent supporter of the local soccer club Los Angeles FC who never misses the weekend watch parties, adds a weekly salsa‑dance class to stay active, and tends to swap her garden
    chores for a brisk neighborhood stroll.
  arts: Olga Merced, whose evenings oscillate between knitting vibrant scarves while watching telenovelas like *María la del Barrio*, swaying to cumbia beats from Celia Cruz and salsa rhythms of Marc Anthony,
    and devouring romance novels by Nora Roberts, finds artistic expression as a thread that weaves her community spirit together.
  travel: Olga Merced, a budget‑savvy traveler who alternates weekend getaways to nearby state parks and annual pilgrimages to cultural festivals in New Orleans, while nurturing a dream to explore the cobblestone
    streets of Antigua, Guatemala, on a group tour with her church friends.
  culinary: Olga Merced, a kitchen maestro who perfects pupusas with fresh masa, slow‑cooks tamales seasoned with roasted chilies and oregano, and harvests her own cilantro, parsley, and jalapeños to infuse
    every family feast with authentic flavor.
  core: Olga Merced blends meticulous organization with a zest for lively community rituals, letting her love of dance, cooking, and charitable knitting offset a tendency to overbook her calendar.
background:
  cultural: Olga was born to Salvadoran parents who immigrated to Houston in the 1970s, growing up in a close‑knit Hispanic community in Harris County. Her upbringing was steeped in Catholic traditions,
    family gatherings, and Salvadoran customs such as celebrating La Fiesta de San Salvador and preparing pupusas for holidays. She maintains strong ties to her heritage through language, food, and participation
    in cultural festivals organized by the Salvadoran consulate and local community groups. Her Salvadoran roots shape her values of family cohesion, hospitality, and mutual support, while her Houston environment
    adds a blend of multicultural influences that she embraces in her daily life.
