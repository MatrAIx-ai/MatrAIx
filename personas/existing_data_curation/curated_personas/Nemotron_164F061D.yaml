  hobbies: '[''Dancing to cumbia and salsa'', ''Attending church and community events'', ''Cooking traditional Salvadoran dishes'', ''Gardening herbs and vegetables'', ''Reading romance novels'', ''Watching
    telenovelas'', ''Knitting scarves and blankets for charity'', ''Playing card games with neighbors'', ''Participating in neighborhood block parties'']'
  career_goals: Olga aspires to translate her organizational talents and community spirit into a part‑time role as a community liaison or volunteer coordinator for a local nonprofit serving the Hispanic
    population. She hopes to launch a small home‑based catering venture featuring authentic Salvadoran dishes, providing both income and cultural outreach. Further, she aims to enhance her digital literacy
    through a community college course and to mentor younger women in her neighborhood, sharing her practical life skills and cultural heritage.
