personas:
  professional: A budding junior game creator, Bruce Johnson uses his love for Minecraft's block-building and basic Roblox scripting to design simple adventure maps, applying his preference for clear rules
    while letting spontaneous ideas slip in during playtesting.
  sports: An energetic soccer enthusiast, Bruce Johnson plays on the Beaumont Youth Soccer League's Under-12 team, cheers for the Houston Dynamo, and spends weekends biking the Sabine Trail while occasionally
    joining a local junior climbing club.
  arts: A creative LEGO builder, Bruce Johnson spends evenings constructing mechanized LEGO models while listening to pop hits from Taylor Swift, BTS, and Billie Eilish, and frequently reads the Percy Jackson
    series for narrative inspiration.
  travel: A spontaneous explorer, Bruce Johnson has visited Galveston's beachside boardwalk and the Space Center Houston with his family, loves planning impromptu bike trips to nearby hiking spots, and
    dreams of a future adventure to the castles of Scotland.
  culinary: A budding home chef, Bruce Johnson enjoys making pepperoni pizza and cheesy macaroni with fresh tomatoes from the garden, often practicing his grilled-cheese technique and occasionally burning
    the edges when distracted.
  core: Bruce Johnson, an 11-year-old LEGO-loving gamer, balances a love for structured building with a laid-back approach to chores, money, and friendships, often forgetting helmets but never forgetting
    a new LEGO kit.
background:
  cultural: Bruce comes from a white, middle-class family in Beaumont, California, a community with strong ties to the agricultural heritage of Riverside County. His family celebrates typical American holidays
    such as Thanksgiving, Halloween, and the Fourth of July, often with barbecues and community events. He attends a local public school where multicultural awareness is encouraged, though his immediate
    cultural influences are primarily suburban American values, emphasizing kindness, cooperation, and civic responsibility.
