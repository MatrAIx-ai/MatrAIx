  career_goals: Bruce dreams of a career that blends clear structure, teamwork, and helping others. He is fascinated by the role of firefighters and hopes to join the local fire department one day, attracted
    by the predictable routines, training, and community service. At the same time, his love for video games has sparked an ambition to learn coding and eventually design his own games, allowing him to
    combine creativity with the logical problem-solving skills he enjoys.
