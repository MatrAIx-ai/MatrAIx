persona_description: A member of the scientific community who is dedicated to the study of biology and evolution, and is concerned about the scientific standards and the teaching of science in schools.
  They are opposed to any attempts to redefine the scientific process or broaden the science curriculum to include non-scientific explanations, and stand with their colleagues in the National Academy of
  Sciences, the American Association for the Advancement of Science, and other scientific organizations. They are also concerned about the impact of science on the global economy and the importance of a
  first-class science education for children.
