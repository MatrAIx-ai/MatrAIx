  career_goals: Shane aims to join his high school robotics team and eventually pursue a degree in mechanical engineering or computer science at a university known for strong STEM programs. He hopes his
    competitive drive will earn him a varsity spot on the basketball team, opening potential scholarship opportunities. Long‑term, he envisions a career designing innovative technology—perhaps in automotive
    or aerospace engineering—where he can blend his hands‑on problem‑solving skills with his programming knowledge. Additionally, he aspires to develop leadership experience through student council or future
    entrepreneurship, allowing him to apply his practical mindset to real‑world challenges.
