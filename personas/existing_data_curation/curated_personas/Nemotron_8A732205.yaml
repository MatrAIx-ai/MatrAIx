personas:
  professional: Shane Mounts is an aspiring teenage technologist who channels his practical curiosity into building LEGO robotics and writing Python scripts, approaching each project with organized flexibility
    while frequently challenging teammates’ ideas to sharpen his solutions.
  sports: Shane Mounts spends his afternoons as point guard for the local junior basketball league, idolizing the Golden State Warriors, while clocking laps at the municipal pool and following the NBA’s
    Los Angeles Lakers, maintaining a disciplined routine of drills and swims to stay competitive.
  arts: Shane Mounts dives into speculative fiction, devouring Andy Weir novels, listening to Daft Punk’s electronic tracks while constructing Minecraft worlds, and watching Neil deGrasse Tyson-narrated
    space documentaries, all of which shape his creative problem-solving style.
  travel: Shane Mounts prefers action-packed, educational trips, such as a weekend road-trip to the Grand Canyon for stargazing and a summer visit to Washington, D.C.’s Smithsonian National Air and Space
    Museum, seeking destinations that blend adventure with scientific inspiration.
  culinary: Shane Mounts favors pepperoni pizza with extra cheese and garlic knots, occasionally attempts homemade brownies with dark chocolate chips, yet often reverts to instant noodles microwaved at
    2 minutes, reflecting his blend of culinary curiosity and quick-fix habit.
  core: Shane Mounts is a competitively driven, curiosity-fueled teen who balances organized tinkering with spontaneous play, yet sometimes lets skepticism and a love for fast food steer his choices.
background:
  cultural: Shane was raised in Crystal Lake, Illinois, a suburban community in McHenry County that reflects the broader Midwestern values of self‑reliance, community involvement, and an appreciation for
    both work and play. His family’s cultural background is rooted in typical white American Midwest traditions—celebrating holidays like Thanksgiving with large family gatherings, attending local community
    events such as the summer county fair, and supporting regional high‑school sports. The area’s emphasis on school extracurriculars and access to public resources, like the community recreation center
    and library, has shaped his interests in team sports, robotics, and technology. While he enjoys the close‑knit, neighborly atmosphere of his town, he also feels the regional push towards practical achievement
    and personal responsibility, which dovetails with his personality’s blend of curiosity and pragmatism.
