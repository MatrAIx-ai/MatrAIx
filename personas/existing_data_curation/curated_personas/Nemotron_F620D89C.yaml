personas:
  professional: Hung Wang, a senior teaching assistant in a university engineering department, leverages their methodical precision, curiosity for emerging AI, and love of solitary, structured learning
    environments to design rigorous curricula and mentor students through one‑on‑one coding workshops.
  sports: Hung Wang, an avid solo hiker, spends weekends traversing the Santa Cruz Mountains, logs elevation gain with a smartwatch, is a member of the Bay Area Trail Runners club, supports the San Francisco
    Giants and Golden State Warriors from the comfort of home, and complements their routine with light weight‑training sessions at a local community gym.
  arts: Hung Wang, a dedicated practitioner of calligraphy and Romantic‑era piano, regularly interprets Chopin’s Nocturnes, draws inspiration from the brushwork of calligraphic masters, finds solace in
    the literary worlds of Jane Austen and Haruki Murakami, while occasionally attending a local chamber music recital featuring violinist Hilary Hahn.
  travel: Hung Wang, a meticulous planner, prefers off‑peak, low‑crowd trips and has explored the tranquil gardens of Kyoto, hiked the fjords of Norway’s Lofoten Islands, and aims to visit the historic
    libraries of Florence and the ancient ruins of Petra, always booking accommodations that offer quiet study spaces.
  culinary: Hung Wang, an adept home cook, delights in brewing gongfu‑style Oolong tea, prepares precise recipes such as miso‑glazed salmon with fresh ginger, hand‑rolls sushi with avocado and cucumber,
    and occasionally savors a simple yet perfect spaghetti carbonara featuring guanciale, Pecorino Romano, and black pepper.
  core: Hung Wang, a methodical solitary scholar, blends curiosity with practicality, turning quiet hobbies like bonsai and puzzles into disciplined rituals while navigating life with meticulous planning,
    occasional stubbornness, and a penchant for late‑night tea.
background:
  cultural: Hung was born to Taiwanese immigrant parents who settled in the Bay Area during the early 1970s. Growing up bilingual in Mandarin and English, he internalized a Confucian emphasis on education,
    perseverance, and respect for collective well‐being, while also absorbing the innovative, individualistic spirit of Silicon Valley. He participates in local cultural celebrations such as Lunar New Year
    and the Mid‑Autumn Festival, and he maintains close ties to a community of East Asian academics. This dual heritage shapes his balanced worldview, blending a reverence for time‑tested methods with an
    openness to new ideas, and informs his commitment to fostering inclusive, high‑quality STEM learning.
