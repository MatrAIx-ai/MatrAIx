  career_goals: Hung aims to transition from a teaching assistant role to a tenure‑track faculty position where he can shape the future of STEM education. He aspires to develop a interdisciplinary course
    that integrates artificial intelligence with ethical reasoning, publish research on effective solitary learning environments, and lead a university‑industry partnership that brings real‑world engineering
    projects into the classroom. Long‑term, he envisions mentoring a new generation of underrepresented engineers and eventually serving as a department chair or senior educational consultant for tech firms,
    leveraging his blend of curiosity and practical implementation.
