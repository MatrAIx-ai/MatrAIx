  hobbies: '[''Visiting art museums and galleries'', ''Watercolor sketching'', ''Film photography'', ''Reading popular science and sci-fi books'', ''Attending public lectures on art and technology'', ''Gardening
    (vegetables and herbs)'', ''Crossword and puzzle solving'', ''Volunteering at the public library (art displays)'', ''Coding small data-visualization projects'']'
  career_goals: Driven by her competitive streak and high personal standards, Briana aims to transition from front‑line cashier duties to a supervisory or analytical role within retail operations. She plans
    to obtain a data‑analytics certification within the next year, apply her STEM background to develop data‑driven scheduling and inventory systems, and ultimately become a store manager or regional operations
    analyst for a mid‑size retailer in the Champaign‑Urbana area. Parallel to her professional ascent, she aspires to launch an online platform that sells limited‑edition prints of local artwork, merging
    her technical skills with her passion for art. To sustain these ambitions she is also focused on building resilience against stress through regular mindfulness practice and structured time‑blocking.
