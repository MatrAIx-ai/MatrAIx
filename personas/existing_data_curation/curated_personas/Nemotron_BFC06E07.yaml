  hobbies: '[''abstract painting'', ''metal & plastic sculpture'', ''hiking'', ''backcountry skiing'', ''reading speculative fiction'', ''writing short stories'', ''visiting art galleries'', ''participating
    in maker fairs'', ''mindfulness meditation'', ''photographing mountain vistas'']'
  career_goals: Susan aims to become a senior technical specialist and eventually a workshop manager, overseeing a small team that blends industrial production with artistic creation. She plans to earn
    a certification in CNC programming and pursue coursework in industrial design to formalize her design skills. Long‑term, she envisions opening a boutique studio in Park City where she can produce custom
    metal‑plastic installations for public spaces and high‑end clients, while also offering workshops that merge craftsmanship with creative expression.
