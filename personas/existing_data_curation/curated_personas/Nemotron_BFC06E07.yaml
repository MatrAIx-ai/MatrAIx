personas:
  professional: Susan Smith is a senior CNC specialist who blends precise metal‑plastic fabrication with abstract art, leveraging SolidWorks and Fusion 360 to turn speculative designs into high‑quality
    installations while mentoring apprentices, championing safety, and competitively pushing process innovations in a calm, resilient manner.
  sports: Susan Smith pursues backcountry skiing on Park City’s powdery slopes and rugged hikes with the Wasatch Mountain Club, follows the Utah Jazz and Real Salt Lake with a competitive edge, and maintains
    a steady fitness routine that balances solitary trail workouts with occasional trail‑run events, reflecting their love of solitary reflection and resilient stamina.
  arts: Susan Smith channels an imaginative drive into abstract painting inspired by Mark Rothko and Clyfford Still while sculpting metal‑plastic forms at community maker fairs, regularly visits galleries
    showcasing Jill Woodruff, and finds artistic rhythm listening to Radiohead and The National Parks, intertwining speculative fiction narratives with visual art to fuel their creative identity.
  travel: Susan Smith favors meticulously planned trips to iconic landscapes like Yosemite and Grand Canyon while dreaming of Iceland’s volcanic vistas and Japan’s design studios, often blending weekend
    backcountry ski expeditions in the Wasatch with occasional art‑focused pilgrimages to Venice Biennale and Art Basel Miami, balancing limited studio funds with a thirst for inspiration.
  culinary: Susan Smith enjoys crafting alpine‑inspired meals such as elk stew with juniper berries, pan‑seared trout with sage‑butter, and wild‑mushroom risotto, showcasing advanced cooking skills that
    blend meticulous plating with experimental flavor pairings, while also savoring artisanal sourdough and occasional Japanese ramen as a palate‑expanding treat.
  core: Susan Smith is a calm, fiercely imaginative maker who turns rugged Utah vistas into metal‑plastic sculptures, competes subtly in art fairs, obsessively catalogs old CNC manuals, and rarely feels
    anxiety, though they sometimes forget to water their succulents.
background:
  cultural: Susan grew up in a Midwestern white American family that valued hard work, self‑reliance, and a strong sense of community. Her parents taught her basic woodworking and metal repair, fostering
    an early respect for craftsmanship. After completing some college coursework in engineering technology, she moved to Park City for the vibrant mix of outdoor recreation and artistic community. The town's
    seasonal influx of tourists and its supportive arts scene have broadened her cultural outlook, allowing her to blend traditional American industriousness with a forward‑thinking, creative ethos.
attributes:
  skills: '[''CNC machining'', ''Metal welding'', ''Injection molding'', ''CAD (SolidWorks, Fusion 360)'', ''Technical drawing interpretation'', ''Material selection and testing'', ''Process optimization'',
