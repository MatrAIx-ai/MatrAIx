  hobbies: '[''reading mystery novels'', ''journaling'', ''drawing sketches'', ''origami crafting'', ''baking Mexican family recipes'', ''playing piano'', ''small‑group board games'', ''youth soccer practice'']'
  career_goals: Melanie is motivated by stability and a desire to serve her community. She aspires to become an elementary school teacher, focusing on math and reading, so she can provide a structured,
    supportive learning environment for younger children. She plans to pursue a degree in education and hopes to incorporate bilingual instruction to help bridge language gaps in her border‑town school
    district. Over the long term, she envisions contributing to community health initiatives, reflecting her practical and compassionate outlook.
