persona_description: A researcher from the Department of Zoology and Ecology at the University of Navarre who specializes in the study of acarines, particularly the Macronyssidae (Mesostigmata) family.
  The researcher has published a paper on the discovery of a new acarine species, Ophionyssus schreibericolus, that feeds off and lives on black green lizards from the Iberian Peninsula. The researcher's
  work is important in understanding the importance of these parasites in the transmission of diseases, host resistance mechanisms, and evolutionary mechanisms.
