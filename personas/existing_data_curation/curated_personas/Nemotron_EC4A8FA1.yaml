personas:
  professional: Erick Ordonez is a lead housekeeper in a Houston property‑management firm, where their mastery of deep‑cleaning, floor‑care, and inventory checklists combines with bilingual communication
    and a warm, hospitality‑driven service style that reflects a commitment to community and precision.
  sports: Erick Ordonez plays forward for the community soccer league team ‘Houston United’ every Saturday, cheering on the Houston Dynamo during the MLS season and staying fit with nightly stretches, though
    they admit to skipping cardio on rainy days and can be overly competitive when the game gets heated.
  arts: Erick Ordonez enjoys attending live performances of cumbia and salsa bands like Los Tigres del Norte and celebrates regional folk music on their playlist while also reading leadership books by Simon
    Sinek and John Maxwell, and they occasionally join local dance circles to practice steps learned at neighborhood festivals.
  travel: Erick Ordonez prefers road trips to culturally rich destinations such as San Antonio’s River Walk, New Mexico’s Santa Fe for its art markets, and occasionally visits family across the border,
    balancing travel planning with work schedules by booking weekend getaways that fit their budget and allow time for garden duties.
  culinary: Erick Ordonez crafts homemade tacos al pastor, slow‑cooked mole, and hand‑rolled tamales, often seasoning with fresh cilantro, roasted chilies, and a hint of pineapple, and they experiment by
    adding quinoa to the masa or using a sous‑vide method for pork, while also growing their own cilantro and jalapeño peppers in the backyard garden.
  core: Erick Ordonez is a hyper‑organized, community‑focused professional who balances relentless checklists with spontaneous dance sessions, a penchant for perfecting mole recipes, and a habit of staying
    up late reading self‑help books, sometimes at the expense of a full night’s sleep, and they often joke that the mop is their most reliable sidekick.
background:
  cultural: Born to Mexican parents who settled in Houston, Erick grew up in a bilingual household that celebrated Día de los Muertos, quinceañeras, and other Mexican traditions. He maintains strong family
    ties and values collectivist principles such as hospitality, respect, and community support. This cultural foundation influences his work ethic, emphasizing warmth and attentiveness in home care. Erick
    seamlessly blends Mexican heritage with Texan influences, staying active in local Hispanic cultural festivals, preserving Spanish language use at home, and incorporating traditional recipes and customs
    into his everyday life.
