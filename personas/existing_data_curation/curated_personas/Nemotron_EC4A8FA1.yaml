  career_goals: Erick aims to advance to a lead housekeeper or supervisory role within a reputable property‑management company in Houston, earning a Certified Professional Cleaner credential. Long‑term,
    he envisions launching his own boutique cleaning service that caters specifically to Hispanic families, integrating culturally respectful practices. He also plans to pursue night courses in hospitality
    management to broaden his business acumen, secure homeownership for his family, and mentor other immigrant workers entering the cleaning industry.
