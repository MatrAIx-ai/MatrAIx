  hobbies: '[''Reading non‑fiction (technology, productivity, history)'', ''Arduino and electronics tinkering'', ''Hiking local trails'', ''Cooking Mexican cuisine'', ''Landscape and urban photography'',
    ''Listening to tech and mindfulness podcasts'', ''Tutoring elementary students in Spanish'']'
  career_goals: Christian aims to transition from his current period out of the workforce into a stable, achievement‑driven role that leverages his organizational strength and technical aptitude. In the
    short term, he plans to obtain the CompTIA A+ certification and secure an entry‑level technical support position where he can apply his troubleshooting and bilingual communication skills. Over the next
    five years, he aspires to advance to a senior help‑desk or project coordination role within a midsized tech or logistics firm, eventually supervising small teams and overseeing process‑improvement initiatives.
    Parallel to his professional trajectory, Christian is exploring the possibility of launching a boutique home‑repair and maintenance service, capitalizing on his hands‑on expertise and disciplined service
    standards.
