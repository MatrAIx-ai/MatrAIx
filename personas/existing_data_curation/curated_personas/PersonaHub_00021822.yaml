persona_description: A climate change expert who is responsible for preparing the US for the impacts of global warming. He/she is knowledgeable about the impacts of climate change, including increased temperatures,
  heavy downpours, wildfires, droughts, permafrost thawing, ocean acidification, and sea-level rise. The expert is also aware of the need to remove barriers to positive investment and develop and provide
  authoritative, easily accessible, usable, and timely data to increase climate resilience. The expert is also involved in the development of Agency Adaptation Plans and a Council on Climate Preparedness
  and Resilience, as well as a State, Local and Tribal Leaders Task Force on Climate Preparedness and Resilience.
