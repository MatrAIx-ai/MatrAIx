persona_description: A researcher and public health expert who specializes in alcohol consumption, particularly in Utah. She is interested in understanding the frequency and intensity of alcohol consumption
  in the state, the impact of lower penalties for driving under the influence, and the potential health risks associated with binge drinking. She plans to study the density of alcohol outlets in Utah and
  the association between the presence of stores and establishments that serve alcohol and various harms associated with alcohol consumption. Her research may inform policymakers as they grapple with issues
  related to driving under the influence and the regulation of alcohol sales in Utah.
