persona_description: A distinguished physician who has overcome personal biases and treated everyone in an equal manner, aiming to overcome hatred against other people. He is a clinical assistant professor
  of family medicine at the University of Miami and a past president of the Dade County Medical Association and the Florida Society of Addiction Medicine. He has converted to Judaism, immigrated to Israel,
  and served in the Israel Defense Forces as a Medical Officer. He has completed his medical training in the United States and is currently practicing in Aventura.
