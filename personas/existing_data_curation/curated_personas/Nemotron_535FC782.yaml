personas:
  professional: Maria Flores is an aspiring visual storyteller who blends whimsical watercolor sketches with digital art, channeling her love of fantasy narratives into school projects and community workshops,
    while her natural curiosity fuels ongoing self‑learning in character design and storytelling.
  sports: Maria Flores hits the Wasatch trails on weekends with the Junior Outdoor Club, cheers for the Utah Jazz and Real Salt Lake, and runs on the high‑school cross‑country team, preferring rugged hikes
    over structured team sports but still enjoys occasional pick‑up basketball games at the community center.
  arts: Maria Flores infuses her sketchbook with vibrant, folkloric motifs inspired by family gatherings, performs acoustic guitar renditions of Shakira and contemporary pop hits at school talent shows,
    dances salsa at cultural festivals, and acts in the drama club’s production of 'A Midsummer Night's Dream,' while drawing artistic influence from Frida Kahlo and Hayao Miyazaki.
  travel: Maria Flores dreams of backpacking through the high‑altitude villages of Peru after exploring Zion National Park’s red cliffs and a family road‑trip to Santa Fe’s art markets, favoring spontaneous
    itineraries over meticulously planned tours, though budget constraints mean most adventures are weekend day‑trips within the Intermountain West.
  culinary: Maria Flores delights in helping prepare home‑cooked baleadas with refried beans, cheese, and plantains during family holidays, while also mastering the art of avocado toast and mango salsa
    for friends, balancing a moderate cooking skill set with a penchant for trying eclectic dishes like ramen and homemade guacamole.
  core: Maria Flores channels boundless imagination into vivid art, juggles a chaotic allowance with bursts of competitive spirit, and navigates teenage life with a love for spontaneous hikes, lively salsa
    rhythms, and a habit of losing track of deadlines.
background:
  cultural: Maria comes from a Honduran family that maintains strong ties to its Central American roots while embracing life in Salt Lake City. At home, she speaks Spanish with her parents and grandparents,
    celebrates traditional holidays such as Semana Santa and Día de la Madre, and helps prepare Honduran dishes like baleadas and tamales. These cultural practices enrich her artistic perspective, inspiring
    her to incorporate vibrant colors and folkloric motifs into her work. At the same time, she navigates the multicultural landscape of Utah, forming friendships across diverse backgrounds and integrating
    local influences into her creative expression.
attributes:
  skills: '["digital illustration (tablet)", "creative writing and poetry", "bilingual communication (Spanish/English)", "basic graphic design", "improvisational acting", "group brainstorming and collaboration",
