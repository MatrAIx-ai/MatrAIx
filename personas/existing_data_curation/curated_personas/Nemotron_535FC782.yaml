  hobbies: '["sketching and digital painting", "creative writing (short stories, poetry)", "playing acoustic guitar", "Salsa and contemporary dance", "hiking in the Wasatch Mountains", "school drama club",
    "participating in community art workshops", "creating YouTube content about art and culture"]'
  career_goals: Maria aspires to become a multidisciplinary visual artist who merges digital media, illustration, and storytelling. She dreams of attending a specialized arts high school, earning scholarships
    for her artwork, and eventually working as a concept artist or graphic designer for video games or animation studios. She also hopes to create a YouTube channel that showcases her art and shares cultural
    stories from her Honduran heritage, aiming to inspire other young creators.
