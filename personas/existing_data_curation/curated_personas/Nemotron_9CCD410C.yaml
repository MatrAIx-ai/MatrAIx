personas:
  professional: An experienced data analyst turned community tech mentor, Janice Basco leverages their R and Python expertise, project‑management savvy, and outgoing personality to design hands‑on workshops
    that translate scientific concepts into practical DIY solutions for neighborhood residents.
  sports: Janice Basco stays fit by joining the local Hiking and Nature Photography Club for spring trail treks, attending weekly yoga classes, and cheering for the Chicago Cubs and Milwaukee Bucks, a regimen
    they relish as a mix of active outdoor pursuits and loyal Midwestern fan devotion.
  arts: Janice Basco expresses their creative side through leading roles in community theater productions of classics like 'Our Town', while they unwind by listening to the folk‑indie sounds of Bon Iver
    and the timeless jazz of Miles Davis, and they regularly attend gallery openings featuring contemporary artist Kehinde Wiley.
  travel: Janice Basco plans meticulously for vacation trips, favoring organized itineraries that include visits to national science museums such as the Smithsonian in Washington, D.C., and the Exploratorium
    in San Francisco, while also carving out spontaneous weekend getaways to nearby Door County's lakeside galleries, balancing their thirst for cultural enrichment with a love for relaxed, nature‑filled
    retreats.
  culinary: Janice Basco, an enthusiastic home chef, delights in reinventing Midwestern staples—like layering cornbread with kimchi and adding a hint of sriracha to classic chicken pot pie—while they frequently
    source fresh heirloom tomatoes and smoked paprika at the farmer’s market, showcasing their skillful blend of comfort and global flair.
  core: Janice Basco is a pragmatic curiosity‑driven community catalyst who can instantly troubleshoot a smart thermostat, yet habitually forgets to water their houseplants while never missing a friend’s
    birthday.
background:
  cultural: Janice grew up in a Midwestern small‑town environment in Missouri, raised in a family of European descent with Protestant roots. The region’s emphasis on community involvement, self‑reliance,
    and a strong work ethic shaped her values. She has deep ties to local churches and civic organizations, which fostered a sense of service and collaboration. While she respects traditional Midwest customs—such
    as family gatherings, seasonal festivals, and a love for home‑cooked meals—she remains open to new ideas and cultural experiences, reflecting the blend of curiosity and practicality that defines her
    outlook.
