  hobbies: '["Community gardening", "Experimental cooking", "Science and history book club", "Youth robotics mentorship", "Community theater acting", "Hiking", "Yoga", "Nature photography", "Crafts workshops",
    "Travel to cultural events and museums"]'
  career_goals: Although retired from full‑time employment, Janice aims to expand her impact in the community by establishing a regional STEM mentorship program for middle‑school students, serving on the
    board of a local environmental nonprofit, and authoring a guidebook on integrating technology into everyday home projects. She also hopes to travel to national science museums and cultural festivals
    while maintaining her health and staying active in local civic groups. Her long‑term ambition is to be recognized as a bridge between scientific knowledge and practical community solutions.
