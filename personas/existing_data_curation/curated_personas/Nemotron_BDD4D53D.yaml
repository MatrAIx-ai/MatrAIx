  hobbies: '[''Basketball'', ''Youth Mentoring'', ''Playing Bass Guitar'', ''Cooking Southern Cuisine'', ''Hosting Barbecues'', ''Gardening'', ''Reading Contemporary Fiction'', ''Attending Live Music Events'',
    ''Group Fitness Classes'', ''Hiking'']'
  career_goals: Derrick aims to formalize his credentials by completing a teaching certification and earning a bachelor's degree in Education within the next three years. He aspires to become a lead teacher
    or department head for the Social Studies department, where he can shape curriculum and mentor new teachers. Long‑term, he envisions moving into school administration as an assistant principal, driving
    equity‑focused policies at the district level. He also plans to launch a mentorship program for at‑risk youth and expand culturally responsive pedagogy and technology integration across the school.
