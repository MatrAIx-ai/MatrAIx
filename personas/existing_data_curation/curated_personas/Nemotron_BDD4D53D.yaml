personas:
  professional: Derrick Harrell, an organized secondary school teacher who excels at data‑driven lesson planning, classroom management, and technology integration, uses their calm resilience and sociable
    nature to create predictable yet inclusive learning environments, and they consistently mentor students while coordinating community outreach.
  sports: Derrick Harrell plays forward in a local adult basketball league, regularly follows the Atlanta Hawks and Georgia Bulldogs football teams, participates in weekly group fitness classes at the community
    center, and they join a trail‑hiking club for weekend outings, balancing competitive play with social exercise.
  arts: Derrick Harrell plays bass guitar in his church’s gospel band, often covering songs by Kirk Franklin and Mavis Staples, enjoys live concerts featuring John Legend and local jazz ensembles, and they
    spend evenings reading contemporary fiction by Colson Whitehead and historical biographies by David McCullough, allowing music and literature to shape their cultural perspective.
  travel: Derrick Harrell prefers structured weekend getaways, planning trips with detailed itineraries that blend history and cuisine, has visited New Orleans for its jazz scene and Washington, D.C. for
    its museums, dreams of exploring Savannah’s historic districts and the Blue Ridge Mountains, and they seek a mix of relaxation and adventure in each destination.
  culinary: Derrick Harrell is a confident home cook who specializes in Southern comfort dishes such as smoked pulled‑pork BBQ, collard greens sautéed with smoked turkey, creamy corn‑bread, and fried catfish,
    often experimenting with fresh herbs from their garden and hosting lively barbecues for friends, and they constantly tweak recipes to achieve the perfect balance of flavor.
  core: Derrick Harrell is a structured, community‑focused educator who balances a calm, resilient demeanor with a love for social sports, gospel music, Southern cooking, and meticulous financial planning,
    and they nurture a playful spirit that sometimes leads to spontaneous indulgences.
background:
  cultural: Derrick is an African American who grew up in West Columbia, South Carolina, immersed in the region's rich Black Southern heritage. He was raised in a historic Black church where gospel music,
    community service, and collective celebration shaped his values. Family gatherings, church potlucks, and local festivals such as Juneteenth and the Lexington County Gullah Festival are central to his
    cultural identity. He honors the legacy of the Great Migration and the civil‑rights movement, embodying the resilience, cooperative spirit, and emphasis on education that characterize his community.
    While embracing contemporary Southern customs—like barbecues and Southern cuisine—he also weaves African‑American traditions of mentorship, communal uplift, and cultural pride into his daily life.
attributes:
