  career_goals: Melinda dreams of turning her imagination into a career that blends art and technology. She envisions herself as a video‑game narrative designer or an illustrator for graphic novels, where
    she can craft immersive worlds that spark curiosity in others. She also day‑dreams about becoming a science communicator who uses visual storytelling to make complex ideas accessible to kids. Her competitive
    streak pushes her to aim for state‑level art competitions and science fairs, while her sensitivity fuels a desire to create works that help peers manage anxiety and express emotions.
