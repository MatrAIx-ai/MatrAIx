  career_goals: Laura aspires to advance to a lead teacher or program coordinator role within a childcare center, and eventually pursue an associate's degree in Early Childhood Education to qualify for
    supervisory positions. She dreams of opening a community-focused daycare that integrates art therapy and creative workshops for children, especially those from underserved families. Additionally, she
    aims to strengthen her stress‑management techniques through professional development, so she can maintain her reliability and support her future family plans.
