personas:
  professional: Scott Pirzada is an aspiring young roboticist who transforms LEGO kits into programmable creations, blending his love for space‑themed science reading with hands‑on engineering while navigating
    projects at his own relaxed pace, often overlooking deadlines but reveling in solving technical puzzles.
  sports: Scott Pirzada is an avid fan of the Seattle Mariners and occasionally watches Seattle Sounders matches, yet channels his physical energy into solo weekend hikes at the nearby state park and a
    weekly bike ride with friends from his community nature club, deliberately steering clear of competitive team sports.
  arts: Scott Pirzada sketches wildlife and landscapes during nature walks, drawing inspiration from John James Audubon’s bird illustrations and Ansel Adams’ black‑and‑white photography, while composing
    simple melodies on the keyboard to instrumental pieces by Vangelis and Claude Debussy, merging visual art with musical expression.
  travel: Scott Pirzada favors low‑key family road trips that leave room for impromptu detours, like a weekend drive to the nearby national forest for rock collecting, while harboring a long‑term goal to
    explore the Kennedy Space Center in Florida and the towering cliffs of Grand Canyon National Park, balancing an unstructured itinerary with occasional pre‑planned science museum visits.
  culinary: Scott Pirzada enjoys snacking on a custom trail mix of almonds, dried cherries, toasted pumpkin seeds, and dark chocolate chips, helps his parents whip up a simple spaghetti with marinara sauce
    seasoned with fresh basil and oregano, and delights in making rock candy at home to watch sugar crystals grow, treating each sweet experiment as a tasty science project.
  core: Scott Pirzada is a quiet, curiosity‑driven eleven‑year‑old who stitches together science, art, and nature in solitary pursuits, occasionally stumbling over disorganization but always returning to
    his love of rockets, birds, and LEGO creations.
background:
  cultural: Scott grows up in Rutherford, New Jersey, a suburban community in Bergen County with a predominantly middle‑class, diverse population. His family follows typical American cultural traditions,
    celebrating holidays like Thanksgiving, the Fourth of July, and Christmas, while also participating in local community events such as library reading programs and town fairs. The suburb values education,
    personal responsibility, and community harmony, which align with Scott’s cooperative and considerate personality. While his ethnic background is white, his upbringing includes exposure to a multicultural
    environment through school and community activities, fostering an appreciation for diverse perspectives.
