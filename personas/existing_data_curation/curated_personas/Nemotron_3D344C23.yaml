  career_goals: Scott envisions a future where he can blend his love of curiosity with practical problem solving. He aspires to become a software or robotics engineer, creating tools that help people and
    protect the environment. He also imagines exploring wildlife biology, as it would let him study nature in quiet, solitary settings. Scott wants a career that offers flexibility and the ability to work
    remotely, so he can design, code, and experiment without the constraints of a rigid schedule. To reach these goals, he aims to deepen his coding skills, join STEM clubs, and attend summer tech camps.
