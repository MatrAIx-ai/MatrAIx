persona_description: A scientist and engineer who specializes in fuel cell technology, particularly in the field of solid oxide fuel cells. He is part of the Lawrence Berkeley National Laboratory's Environmental
  Energy Technologies Division and is working on a project to develop a detailed assessment of fuel cell design and manufacturing that takes into account both intrinsic and external benefits. The project
  aims to quantify the total, "big picture" costs of fuel cells for potential users, and to provide a working tool that can be used by designers, manufacturers and building owners as they make decisions
  around producing and implementing fuel cells.
