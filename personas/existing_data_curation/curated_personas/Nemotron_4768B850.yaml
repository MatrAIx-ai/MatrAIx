  skills: '[''Python'', ''C#'', ''.NET'', ''JavaScript'', ''HTML/CSS'', ''SQL'', ''Agile Project Management'', ''Test‑Driven Development'', ''Technical Documentation'', ''Digital Humanities Integration'']'
  hobbies: '[''Vegetable gardening'', ''Jazz music listening'', ''Reading African‑American literature'', ''Cooking Southern comfort food'', ''Community coding workshops'', ''Walking his Labrador'', ''Church
    choir participation'', ''Historical documentary watching'']'
  career_goals: Approaching retirement, James aims to transition from full‑time development to a part‑time consultancy focused on nonprofit and community‑based tech projects. He wants to mentor junior developers—particularly
    those from underrepresented backgrounds—and to create a scholarship fund for aspiring Black programmers in Louisville. Additionally, James plans to author a series of essays on the ethical intersections
    of technology and the humanities, positioning himself as a bridge between his arts education and his software expertise. He seeks a balanced professional life that sustains his financial security while
    allowing ample time for community service and personal interests.
