personas:
  professional: Jacqueline Jimenes, a bilingual hospitality professional known for her razor‑sharp reliability, uses her methodical approach to POS systems, cash reconciliation, and food‑safety compliance
    to consistently anticipate guest needs and smoothly lead small shifts while training new teammates.
  sports: Jacqueline Jimenes, an avid supporter of Orlando Magic basketball and Orlando City soccer, joins a local weekend kickball league, jogs along Lake Eola three times a week, and treats herself to
    a post‑run smoothie packed with mint and ginger to stay energized.
  arts: Jacqueline Jimenes, a lover of vibrant punta rhythms and classic merengue, fills her kitchen with the sounds of Juan Luis Guerra and Grupo Karibe while binge‑watching Gordon Ramsay’s cooking shows
    and devouring romance novels by Nora Roberts, and she occasionally attends community theatre productions of ‘West Side Story.’
  travel: Jacqueline Jimenes, whose travel style blends careful budgeting with a thirst for culinary immersion, has explored the street food markets of Mexico City, the beachfront cafés of Costa Rica, and
    dreams of a week‑long gastronomic tour in Andalusia, Spain, all while juggling family commitments in Orlando.
  culinary: Jacqueline Jimenes, a passionate home chef, perfects traditional baleadas, crab soup, and hand‑rolled tamales using home‑grown cilantro and oregano, bakes flaky pastries with a secret butter‑cream
    frosting, and experiments with fusion dishes that pair plantain chips with avocado‑lime crema.
  core: Jacqueline Jimenes, a methodical hospitality specialist who balances routine‑driven career ambitions with a love for family‑centric cooking, crafting, and community service, navigates life with
    an organized yet occasionally indulgent flair.
background:
  cultural: Born to Honduran parents, Jacqueline grew up in a bicultural household that blends Central American traditions with American influences. She is fluent in Spanish and maintains strong ties to
    the Honduran diaspora in Orlando, participating in community gatherings such as the annual Honduran Independence Day celebration and the Feria Juniana. Her Catholic faith shapes many of her family rituals,
    and she observes Semana Santa with devotion. Culinary heritage is central to her identity—she regularly prepares classic dishes for holidays like Día de la Virgen de Suyapa and shares them with friends.
    While embracing U.S. customs, Jacqueline preserves the importance of family solidarity, respect for elders, and the hospitality ethic that defines Honduran culture.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Customer service", "POS system operation", "Food safety compliance", "Multitasking and time management", "Cash handling and reconciliation", "Team
