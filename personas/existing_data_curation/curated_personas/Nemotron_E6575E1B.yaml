  hobbies: '["Cooking traditional Honduran dishes", "Baking pastries", "Attending cultural festivals", "Family and church activities", "Crocheting", "Gardening", "Watching culinary TV shows", "Reading romance
    novels", "Evening walks", "Volunteering at food banks"]'
  career_goals: Jacqueline aims to build a stable, upward career within the hospitality sector. In the next two years she plans to become a shift supervisor, leveraging her organizational strengths to manage
    schedules and ensure consistent service quality. Her longer‑term ambition is to attain a restaurant manager position, overseeing a full-service venue where she can introduce efficient SOPs and staff
    development programs. She is also considering completing a bachelor’s degree in hospitality management to deepen her business knowledge. Ultimately, Jacqueline dreams of opening a family‑run café in
    Orlando that celebrates Honduran cuisine, providing a familiar, routine‑oriented environment for both her community and her family.
