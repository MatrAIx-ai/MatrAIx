persona_description: A soil scientist or engineer interested in the application of geosynthetic reinforcement to improve the engineering properties of various types of soil, particularly for fine-grained
  soils. This persona is interested in the direct shear test results, the soil-geosynthetic interface parameters, and the concurrent effects of lime stabilization and geosynthetic reinforcement. They are
  also interested in the positive effects of adding lime to fine-grained soils and their reinforcement by geosynthetic, and the potential for developing the usage of fine-grained soils.
