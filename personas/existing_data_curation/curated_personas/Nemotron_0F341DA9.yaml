  hobbies: '[''Reading (non-fiction, history)'', ''Woodworking'', ''Birdwatching'', ''Gardening (vegetable beds)'', ''Fishing'', ''Playing acoustic guitar'', ''Crossword puzzles'', ''Community clean-up
    volunteering'', ''Local history lectures'']'
  career_goals: Simon aims to transition from frontline cleaning to a supervisory facilities role, ideally as a maintenance coordinator for a larger institution such as the University of Northern Iowa.
    To achieve this, he plans to obtain certifications in green cleaning methods and OSHA safety, as well as complete a short‑term facilities management course offered by a community college. He envisions
    mentoring younger janitorial staff and implementing sustainable cleaning protocols that reduce chemical waste. In the longer term, Simon is considering launching a modest independent cleaning service
    that focuses on environmentally friendly practices, providing him with a stable retirement income while allowing him to share his expertise.
