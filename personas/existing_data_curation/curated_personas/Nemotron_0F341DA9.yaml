personas:
  professional: Simon Scott is a seasoned facilities maintenance specialist who blends three decades of hands‑on cleaning expertise with a practical curiosity for eco‑friendly technologies, and now leverages
    their meticulous organization and calm resilience to mentor junior staff while charting a path toward a supervisory coordinator role at a larger institution.
  sports: Simon Scott enjoys early‑morning jogs along the Cedar River trails, is a regular member of the Cedar River Anglers Club where he seasons his Saturdays with bass fishing, follows the Iowa Hawkeyes
    football and basketball with loyal devotion, and occasionally catches a Des Moines Menace soccer match for a dash of competitive spirit.
  arts: Simon Scott finds solace strumming classic folk tunes by Bob Dylan and John Denver on his acoustic guitar, attends monthly performances by the Cedar Rapids Community Theater, and frequents the local
    historical society’s exhibit openings featuring works by photographer Ansel Adams, all of which enrich his quiet appreciation for storytelling through music and visual art.
  travel: Simon Scott plans budget‑friendly road trips with a spare‑time calendar, favoring serene destinations such as the Badlands National Park, Door County’s lighthouses, and the historic river towns
    of Wisconsin, while reserving occasional family visits to his sister in Minnesota as his primary long‑distance travel priority.
  culinary: Simon Scott, a competent home cook, frequently harvests backyard tomatoes, carrots, and beans to create rustic vegetable soups, bakes rosemary‑infused roasted chicken, and perfects a classic
    apple crisp dessert, while occasionally trading his homemade potluck casserole for a slice of locally brewed craft beer.
  core: Simon Scott combines a calm, resilient Midwest work ethic with a meticulous curiosity for green practices, savoring solitary birdwatching and crossword puzzles while secretly hoarding every spare
    screwdriver for future DIY projects.
background:
  cultural: Simon grew up in a small Midwestern town in Iowa, born to parents of German and Irish ancestry. Raised in a modest, Protestant (Lutheran) household, he internalized values of self‑reliance,
    hard work, and community service typical of the region. He cherishes local traditions such as county fairs, high school football games, and potluck gatherings, though his reserved nature leads him to
    enjoy these in small groups. His cultural identity emphasizes practicality, thrift, and a respect for the land—attributes reflected in his gardening and appreciation for sustainable cleaning. Simon's
    upbringing in the heartland has shaped his calm, resilient demeanor and his balanced blend of curiosity and practicality.
attributes:
