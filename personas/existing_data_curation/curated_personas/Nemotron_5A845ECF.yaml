  career_goals: Mary aims to transition from her current food preparation role to a supervisory position such as sous‑chef within the next three years, focusing on designing innovative, concept‑driven menus
    that blend Texas flavors with global influences. She plans to complete a culinary certificate program, deepen her knowledge of food science, and eventually launch a boutique catering and pop‑up dining
    venture that showcases her artistic culinary vision. She also hopes to build a strong online presence through a food blog and video series, positioning herself as a creative culinary influencer.
