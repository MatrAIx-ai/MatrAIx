    music while studying'']'
  career_goals: Shane envisions a future where his love for structure and competition translates into a career in technology. He aims to earn advanced coding certifications, win regional chess tournaments,
    and secure top placements in national math competitions. In the long term, he hopes to study computer science at a university, eventually becoming a software engineer or data analyst who designs reliable,
    efficient systems. His short‑term goals include completing a personal robotics project, publishing a small program that automates a daily task, and maintaining a high GPA in STEM subjects.
