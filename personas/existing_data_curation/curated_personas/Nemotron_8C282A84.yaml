personas:
  professional: A budding technologist, Shane Long spends weekends coding Scratch games, assembling intricate LEGO Technic challenges, and competing in junior robotics contests, channeling his love for
    structure and competitive strategy into early engineering projects; they often document each build in a detailed journal, which reflects their methodical mindset.
  sports: A disciplined runner, Shane Long joins the middle‑school cross‑country team for early morning jogs, practices archery at the local club, and follows the Los Angeles Lakers as his favorite professional
    sports team, treating each training session like a logical puzzle to master; they prefer solitary practice over team sports, yet they keep a detailed log of personal bests and aim to improve their stamina.
  arts: An avid sci‑fi enthusiast, Shane Long immerses himself in the works of Isaac Asimov and the cinematic scores of Hans Zimmer, spends free time sketching futuristic spacecraft designs, and collects
    limited‑edition Star Wars action figures, letting imaginative storytelling shape his creative outlet; they occasionally swap drawings with fellow club members, though they relish the quiet of solitary
    creation.
  travel: A meticulous planner, Shane Long has already visited the regional planetarium and spent a weekend camping at the nearby state park where he set up his telescope for clear night skies, and dreams
    of traveling to the Mauna Kea Observatory in Hawaii and the Atacama Desert in Chile to experience world‑class stargazing under pristine conditions; they carefully map each trip in a journal, balancing
    curiosity with a budget that preserves savings for future LEGO projects.
  culinary: A practical eater with a sweet spot for cheese, Shane Long prefers assembling his own meals like layered taco cups, enjoys classic comfort foods such as macaroni and cheese, pepperoni pizza,
    and chocolate chip pancakes, and experiments with space‑themed snacks such as galaxy‑glazed popcorn and chocolate‑coated pretzel rods; they are picky about vegetables unless cut into fun shapes, but
    they gladly help in the kitchen to design “edible engineering” projects.
  core: Shane Long, an 11‑year‑old puzzle‑loving strategist, channels his love for structure into solitary tech projects, meticulous saving, and calm resilience, while secretly hoarding extra LEGO pieces
    for late‑night builds.
background:
  cultural: Shane comes from a suburban white family in Jacksonville, Florida. His upbringing reflects a blend of Southern hospitality and emphasis on self‑reliance. Family traditions include attending
    a local Protestant church, celebrating holidays such as Thanksgiving and the Fourth of July with community fireworks, and enjoying regional foods like fresh seafood and key‑lime pie. Growing up near
    the Atlantic coast has fostered an appreciation for nature, while the city's diverse cultural scene has subtly exposed him to a range of perspectives, reinforcing his competitive drive and preference
    for structured, quiet environments.
