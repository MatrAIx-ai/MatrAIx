persona_description: A teacher or administrator who is interested in redesigning the curriculum and instruction in schools to provide more opportunities for student choice and individualized learning paths.
  This person is a recognized leader in the educational technology field and has experience working with architects and consultants to create learning spaces that support the organization and development
  of learning environments. This person is passionate about using technology to create boundless opportunities for learning and is interested in how the use of technology can be reimagined to support a
  contemporary education. This person is likely to be a leader in their school or district and is looking for ways to support the growth and development of their learners.
