personas:
  professional: Carolyn Gawlowski, a 30‑year‑old elementary and middle‑school teacher, blends differentiated instruction and project‑based learning with watercolor art projects and Google Classroom tools,
    while their spontaneous, compassionate nature fuels a collaborative, arts‑integrated classroom that sometimes wrestles with tight deadlines.
  sports: Carolyn Gawlowski enjoys hiking the Lake St. Clair trail network through the local Lake St. Clair Hiking Club, practices yoga in the spring, follows the Detroit Lions, Detroit Tigers, Detroit
    Pistons, and Detroit Red Wings, and cheers on Detroit City FC during summer league matches.
  arts: Carolyn Gawlowski immerses themselves in watercolor painting inspired by Georgia O'Keeffe and the vibrant installations of Yayoi Kusama at the Detroit Institute of Arts, while listening to Miles Davis,
    Kamasi Washington, and enjoying Broadway revivals like “Hamilton,” and they knit scarves while humming choral arrangements of ‘Amazing Grace.’
  travel: Carolyn Gawlowski plans spontaneous weekend road trips to cultural festivals such as the Ann Arbor Art Fair, Saugatuck Gulliver Festival, and the New Orleans Jazz & Heritage Festival, while dreaming
    of a summer visit to Edinburgh's Fringe, always balancing travel with a modest budget and limited vacation days.
  culinary: Carolyn Gawlowski whips up Mediterranean-inspired dishes like roasted beet and feta salad and experiments with homemade kimchi, enjoys cooking simple weeknight meals with fresh lake‑caught trout,
    yet their cooking skill is often improvised as they sprinkle in herbs from their herb garden while humming jazz standards.
  core: Carolyn Gawlowski, a 30‑year‑old teacher, channels a boundless artistic curiosity into community‑focused teaching while battling a chronic bout of disorganization that fuels both spontaneous creativity
    and occasional missed deadlines.
background:
  cultural: Carolyn grew up in a middle‑class family in the greater Detroit area, where her parents—her father a union electrician and her mother a nurse—instilled a strong work ethic and a value for community
    service. She was raised in the Midwest's blend of modesty, cooperation, and appreciation for the arts, often attending family trips to the Detroit Institute of Arts and local theater productions. Her
    cultural roots include German‑Polish ancestry common in Michigan, and she maintains traditions such as Sunday family meals, involvement in a United Methodist congregation, and yearly participation in
    regional fairs and volunteer initiatives.
attributes:
  skills: '["Lesson planning","Differentiated instruction","Project‑based learning","STEAM integration","Classroom management","Social‑emotional learning facilitation","Parent‑teacher communication","Technology
