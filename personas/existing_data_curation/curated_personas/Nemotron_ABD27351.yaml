  hobbies: '["Watercolor painting","DIY crafts (knitting, upcycling)","Hiking local trails","Visiting museums and art galleries","Reading contemporary fiction","Playing board games with friends","Cooking
    experimental dishes","Participating in community choir","Attending live music (jazz, indie)","Volunteering at local food pantry"]'
  career_goals: Carolyn aims to become a curriculum leader within her district, designing interdisciplinary STEAM units that empower teachers to blend art and creativity into standard subjects. She plans
    to pursue a master's in instructional technology or educational leadership, with the long‑term ambition of moving into a school administrator role that champions inclusive, arts‑rich learning environments.
    Alongside that, she hopes to mentor new teachers and run professional‑development workshops focused on creative pedagogy and social‑emotional support.
