personas:
  professional: Camelia Jimenez is a meticulous residential cleaning specialist who leverages her competitive streak and love for routine to set performance benchmarks, while her sociable nature makes her
    a trusted point‑of‑contact for clients and a natural mentor for new staff.
  sports: Camelia Jimenez joins a community soccer league called the Parkside Kickers, follows the national women's soccer team for inspiration, and balances her competitive drive with a thrice‑weekly yoga
    class that keeps her flexible for the occasional weekend match.
  arts: Camelia Jimenez immerses herself in Latin dance nights to the beats of Celia Cruz and Marc Anthony, binge‑watches dramatic telenovelas starring Thalía and Fernando Colunga, and curates a small collection
    of Frida Kahlo prints that she proudly displays at her home gatherings.
  travel: Camelia Jimenez prefers structured weekend getaways, planning each trip in a detailed spreadsheet and opting for culturally rich coastal cities such as Cartagena and Cusco, while secretly dreaming
    of a solo backpacking trek through the Andes once her schedule eases.
  culinary: Camelia Jimenez enjoys the hands‑on challenge of preparing ceviche with fresh citrus, cilantro, and firm white fish, perfecting seco de chivo with slow‑cooked goat and achiote, and serving llapingachos
    topped with cheese, while she also explores fusion tacos at local food trucks for inspiration.
  core: Camelia Jimenez is a routine‑obsessed, socially magnetic cleaning pro who channels her competitive edge into salsa spins, spontaneous culinary experiments, and a spreadsheet‑driven approach to money,
    even if she occasionally forgets to water her houseplants.
background:
  cultural: Camellia was born to Ecuadorian parents who immigrated to the United States in the early 1990s. Her family maintains strong ties to their Andean roots, celebrating holidays such as Día de los
    Difuntos, Carnaval de Guaranda, and patron saint festivals with traditional music, dance, and cuisine. Spanish is spoken at home, and she grew up bilingual, which helps her navigate both the local community
    in Methuen, Massachusetts, and the broader Hispanic population in the area. The values of hard work, family loyalty, and practicality emphasized by her parents shape her everyday approach to life. While
    she embraces American customs and works within the U.S. service sector, Camelia stays connected to her heritage through regular participation in Ecuadorian community events, cooking family recipes,
    and attending church gatherings that blend Catholic traditions from both cultures.
