  career_goals: Camelia’s career aspirations blend her desire for stability, advancement, and personal recognition within the housekeeping field. In the next three to five years she plans to earn certifications
    in green cleaning and occupational safety, positioning herself for a senior supervisory role at a reputable residential cleaning firm. She aims to develop a structured training program for new cleaners,
    leveraging her competitive drive to elevate overall team performance. Looking further ahead, Camelia envisions launching her own boutique cleaning service that emphasizes routine‑driven excellence and
    personalized client experiences, allowing her to increase earnings while retaining control over her schedule. Throughout her journey she focuses on practical skill development and measurable performance
    goals.
