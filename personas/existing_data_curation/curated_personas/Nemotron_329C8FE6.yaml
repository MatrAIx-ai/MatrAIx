  hobbies: '[''Volunteering at Guatemalan cultural association'', ''Cooking traditional Guatemalan dishes'', ''Soccer watching and senior pick-up league'', ''Walking along the Cliff Walk and local parks'',
    ''Gardening (vegetable garden)'', ''Reading business and self-improvement books'', ''Community dance classes (salsa, merengue)'', ''Playing board games and dominoes at senior center'']'
  career_goals: Looking ahead, Julio aims to leverage his extensive experience to advance into a senior customer experience or operations management role within the next two years, focusing on elevating
    service quality and mentoring staff. He plans to earn a Six Sigma Green Belt certification to formalize his process-improvement expertise and to explore emerging technologies such as AI-driven chatbots
    that can enhance efficiency. Ultimately, Julio envisions a phased transition into part-time consulting, helping small businesses—particularly Guatemalan entrepreneurs in the Providence area—optimize
    their operations while allowing him more flexibility to prioritize family time and stress-reduction.
