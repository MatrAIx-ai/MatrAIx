personas:
  professional: Ellinor Goncalves, a senior at a North Carolina high school, channels her curiosity and practicality into leading the environmental club while designing simple HTML/CSS webpages for school
    projects, volunteering at a community garden, and honing communication skills that make her a natural mediator in group initiatives, all aimed at a future in environmental health and public outreach.
  sports: Ellinor Goncalves enjoys hiking the trails of Crowders Mountain State Park, participates in the school’s cross‑country team during the fall, supports the Gastonia Honey Hunters minor league baseball
    club, and balances fitness with weekend yoga classes at the community center.
  arts: Ellinor Goncalves expresses creativity through acoustic guitar jams of John Mayer and Mumford & Sons, sketching the mountain vistas in a weathered Moleskine, acting in school drama productions of
    Shakespeare’s *A Midsummer Night’s Dream*, and curating a digital photo collage of friends using Canva, all while devouring YA titles by Sarah J. Maas and sci‑fi epics by N.K. Jemisin.
  travel: Ellinor Goncalves prefers budget‑friendly weekend getaways, having explored Asheville’s art scene, camped in the Blue Ridge Mountains, dreamed of visiting the Smithsonian museums in Washington,
    D.C., and plans an eco‑tour of Costa Rica’s rainforests once college finances allow.
  culinary: Ellinor Goncalves enjoys cooking simple yet nutritious meals like quinoa‑black bean bowls, avocado toast topped with fresh herbs from the garden, and spicy ramen, while occasionally baking chocolate
    brownies for friends, demonstrating a moderate skill level that blends experimentation with favorite ingredients such as turmeric and chickpeas.
  core: Ellinor Goncalves blends teenage curiosity with pragmatic organization, leading school initiatives, strumming guitar under sunrise skies, and meticulously budgeting each dollar, all while juggling
    a love for nature, art, and a penchant for late‑night sketching.
background:
  cultural: Ellinor was raised in Gastonia, North Carolina, in a Southern American household with Portuguese ancestry reflected in her surname Goncalves. Her family blends Southern traditions—like attending
    a local Methodist church, celebrating Thanksgiving, and enjoying Carolina-style barbecue—with Portuguese customs such as preparing bacalhau and pastel de nata during family gatherings. She participates
    in community festivals across Gaston County, values the close‑knit friendliness of the Piedmont region, and appreciates a multicultural heritage that encourages both community service and a love for
    diverse cuisines and music.
attributes:
  skills: '["Effective communication (verbal and written)", "Microsoft Office and Google Suite proficiency", "Basic photo editing (Canva)", "Creative writing for school newsletter", "HTML/CSS web development",
    "Time‑management and organization", "Problem solving through DIY experiments", "Leadership in environmental club"]'
  hobbies: '["Hiking and nature walks", "Sketching landscapes", "Acoustic guitar and jam sessions", "Reading YA and science‑fiction novels", "DIY chemistry experiments", "Personal web development", "Community
    garden volunteering", "Drama club acting"]'
  career_goals: Ellinor aims to blend her practical interest in community health and sustainability with her curiosity about technology. After graduating high school, she plans to attend a community college
    in North Carolina to earn an associate degree in environmental health, then transfer to a university for a bachelor's in environmental science or public health. She intends to acquire certifications
    in GIS and digital media to broaden her skill set. Her long‑term ambition is to work as a sustainability coordinator or community outreach specialist for a local government agency or nonprofit, designing
    programs that improve public health and environmental outcomes in Gaston County.
