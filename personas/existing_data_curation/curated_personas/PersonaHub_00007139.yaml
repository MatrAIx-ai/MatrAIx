persona_description: 'An agronomist who specializes in the study of alternative treatment technologies for controlling bioavailable phosphorus in animal manure. They are interested in reviewing established
  animal production and manure management approaches and identifying alternative manure treatments and on-farm management practices for manure-amended fields to control agricultural P environmental dispersion.
  They aim to develop integrated solutions to the problem of excess phosphorus in manure, focusing on the five broad categories of bioavailable P reduction strategies: physical treatments, chemical additives,
  structural practices, biofilters, and other biological nutrient reduction methods.'
