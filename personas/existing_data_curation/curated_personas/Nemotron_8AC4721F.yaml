  career_goals: Genesis aims to advance from first‑line supervisor to district manager within the next five years, leveraging her leadership strengths to mentor a larger cohort of retail staff. She plans
    to complete her bachelor's degree in Business Administration to solidify her strategic expertise. Long‑term, she envisions creating a mentorship program that pairs experienced associates with new hires,
    emphasizing compassionate leadership and cultural inclusion. Additionally, she hopes to spearhead community outreach initiatives that connect the store with local Costa‑Rican and broader Bay Area communities,
    enhancing brand loyalty while celebrating diversity.
