  career_goals: In the next five years, Bianca aims to transition from a clerk‑level role to a senior production planner or scheduling supervisor position within her current organization or a similar manufacturing
    firm. She plans to earn the APICS Certified in Production and Inventory Management (CPIM) credential to formalize her expertise. Bianca also hopes to lead a cross‑functional lean‑process improvement
    team that reduces lead‑time and scrap rates, demonstrating her ability to balance practicality with innovative problem solving. Long‑term, she envisions achieving a stable managerial role that offers
    a predictable schedule, allowing her to maintain financial independence and devote more time to her personal interests.
