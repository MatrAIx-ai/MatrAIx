  hobbies: '[''Reading legal thrillers'', ''Crossword puzzles'', ''Chess'', ''Hiking'', ''Nature photography'', ''Short story writing'', ''Book club'', ''Yoga'', ''Journaling'']'
  career_goals: With a budding interest in law and a practical outlook, Cynthia aims to complete her bachelor's degree in political science or pre‑law within the next two years, then enroll in a JD program
    at a state university. Her long‑term ambition is to become a magistrate in Kenosha County, focusing on family and juvenile cases where she can blend her competitive drive with a desire for fair outcomes.
    She also hopes to develop expertise in alternative dispute resolution, eventually leading a small team that modernizes court processes through technology. In the short term, she plans to secure a clerkship
    with a seasoned judge to deepen her procedural knowledge and build a professional network.
