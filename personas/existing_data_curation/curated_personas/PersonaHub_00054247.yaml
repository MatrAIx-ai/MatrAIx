persona_description: A geneticist or medical geneticist who specializes in the evaluation and diagnosis of genetic conditions, particularly those related to miscarriage. They are skilled in performing molecular
  biology techniques such as polymerase chain reaction (PCR) and next-generation sequencing (NGS) to detect chromosomal defects and sex of the fetus in miscarriage cases. They are recommended to conduct
  testing for genetic conditions in cases of miscarriage where the genetic causes are suspected.
