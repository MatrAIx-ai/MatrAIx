personas:
  professional: Sawai Goli, a retired elementary school teacher turned community mentor, leverages four decades of curriculum design and art‑integration expertise, using their methodical curiosity to create
    structured, intergenerational workshops that blend storytelling, visual culture, and hands‑on learning while maintaining a reliable, organized approach.
  sports: Sawai Goli enjoys gentle morning walks with the Henrico County Senior Walkers Club, follows the Washington Capitals hockey team and the Virginia Cavaliers women's basketball season, and they practice
    light stretching and tai chi twice a week to manage arthritis, though enthusiasm sometimes wanes on rainy days.
  arts: Sawai Goli immerses themselves in visual arts by frequent visits to the Virginia Museum of Fine Arts, admiring Monet’s Water Lilies and O’Keeffe’s Desert Flowers, while listening to sitar performances
    by Ravi Shankar at home, and they often lead intergenerational art‑therapy sessions that blend classic masterpieces with local craft traditions.
  travel: Sawai Goli prefers well‑planned, low‑stress trips, having revisited New York City’s historic neighborhoods, taken a leisurely road‑trip to Niagara Falls, and joined a senior group tour to Kyoto’s
    gardens, while dreaming of a gentle cruise along the Norwegian fjords once health permits.
  culinary: Sawai Goli delights in preparing traditional lentil dal, fragrant biryani with saffron and cumin, and spiced samosas, balancing these with home‑grown tomatoes and basil from the garden, and
    they enjoy savoring a cup of chai with cardamom after a hearty serving of butter chicken.
  core: Sawai Goli is a 90‑year‑old retired educator who curates art, gardens, and heritage recipes with meticulous curiosity, nurturing community ties while managing a persistent worry about health and
    finances.
background:
  cultural: Sawai was born in a small town in Punjab, India, into a close‑knit joint family that valued education, hospitality, and communal celebrations. She immigrated to the United States in the early
    1960s, settling first in New York before moving to Henrico County, Virginia, with her husband. Throughout her life she has woven South Asian traditions—such as observing Diwali, preparing festive foods,
    and speaking Hindi at home—into the fabric of American suburban life. Her cultural identity reflects a blend of Indian heritage and decades of community involvement in the U.S., giving her a nuanced
    perspective that honors both her roots and her adopted home.
