  hobbies: '[''Painting'', ''Visiting art galleries'', ''Photography'', ''Hiking'', ''Gardening'', ''Reading (historical nonfiction and science)'', ''Knitting'', ''Cooking experimental recipes'', ''Volunteering
    at the local historical society'', ''Attending community festivals'']'
  career_goals: Ruth aims to advance into a senior leadership role within the King George County Fire Department, with the long‑term goal of becoming fire chief. She plans to pursue a bachelor's degree
    in public administration to deepen her understanding of emergency management policy and to champion initiatives that improve firefighter mental health and resilience. Ruth is passionate about expanding
    the department’s community education program by incorporating local art projects—such as fire‑safety murals and interactive workshops— to strengthen public awareness. She also envisions mentoring the
    next generation of firefighters, especially women, and eventually transitioning into a teaching position at a regional fire academy upon retirement.
