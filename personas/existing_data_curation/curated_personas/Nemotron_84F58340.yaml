  hobbies: '[''Reading music biographies and Mexican literature'', ''Gardening desert native plants'', ''Cooking traditional Mexican dishes'', ''Yoga and meditation'', ''Photography (landscape and candid)'',
    ''Collecting vintage vinyl records'', ''Walking in nearby trails for quiet reflection'']'
  career_goals: Myriam aims to release a concept album that fuses contemporary pop with traditional Mexican folk elements, featuring bilingual lyrics that honor her heritage. She plans to secure a regular
    residency at a boutique Las Vegas venue where she can perform intimate, acoustic sets for a discerning audience. Additionally, she aspires to open a small recording studio to support emerging local
    artists, while expanding her reach on streaming platforms through strategic digital marketing. In the longer term, Myriam hopes to mentor younger musicians through mentorship programs and to compose
    music for regional theater productions.
