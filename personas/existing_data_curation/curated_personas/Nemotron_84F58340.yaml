personas:
  professional: Myriam Johnson, a seasoned vocalist and bilingual songwriter who also masters audio engineering and project management, channels their methodical planning and preference for solitary focus
    into meticulously arranged bilingual albums, while assertively mentoring emerging artists with compassionate guidance.
  sports: Myriam Johnson prefers low‑impact fitness, attending weekly Desert Rose Yoga sessions and hiking Red Rock Canyon, while energetically supporting the Vegas Golden Knights and the Las Vegas Aces
    from the comfort of their living room.
  arts: Myriam Johnson curates a cherished collection of vintage vinyl from legends such as Bill Evans, Nina Simone, and Juan Gabriel, channels that reverence into nightly listening rituals, captures desert
    landscapes in photographs inspired by Ansel Adams, and finds creative rejuvenation attending community theater productions that echo the storytelling traditions they weave into their own songwriting.
  travel: Myriam Johnson plans trips with meticulous itineraries, favoring culturally immersive stays such as a quiet retreat in Oaxaca, a weekend photo expedition to Sedona, and occasional flights to Barcelona
    for artistic inspiration, all while balancing travel costs with the modest budget of their fledgling studio venture.
  culinary: Myriam Johnson, an adept home chef, perfects mole poblano and hand‑rolled tamales while experimenting with fusion creations like quinoa‑based pozole, and their meticulous palate relishes ingredients
    such as pasilla chilies, epazote, roasted cacao nibs, and agave nectar.
  core: Myriam Johnson balances a disciplined, methodical work ethic with a solitary love for midnight vinyl sessions, often losing track of time in the garden while they hum bilingual melodies.
background:
  cultural: Myriam was born to Mexican immigrant parents from Jalisco who settled in Nevada before her birth. Bilingual from childhood, she grew up speaking Spanish at home while attending English-speaking
    schools, giving her a bicultural perspective. Family traditions such as Día de los Muertos altars, posada celebrations, and cooking gourmet mole have been central to her identity. Music from her heritage—rancheras,
    boleros, and mariachi—has been woven into her artistic voice, and she frequently incorporates Spanish verses and traditional melodic motifs in her songwriting. As an active member of the local Mexican-American
    community in Las Vegas, Myriam participates in cultural festivals, performs at community events, and mentors youth interested in preserving Mexican musical traditions.
attributes:
  skills: '[''Vocal performance'', ''Songwriting'', ''Music theory and arrangement'', ''Audio engineering (mixing & mastering)'', ''Project management for musical productions'', ''Multilingual (English/Spanish)
