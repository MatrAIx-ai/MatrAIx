persona_description: A woman who was a human computer during World War II, working on the Electronic Numerical Integrator and Computer (ENIAC) at the University of Pennsylvania and later contributing to
  its development as a programmer. She was a talented mathematician who overcame societal barriers to achieve her career goals, becoming one of the first programmers of the ENIAC and later recognized as
  a model for the military. Her story is an inspiring tale of perseverance and innovation in the face of adversity.
