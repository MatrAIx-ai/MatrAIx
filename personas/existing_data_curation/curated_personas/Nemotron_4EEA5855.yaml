  hobbies: '[''Woodworking'', ''DIY electronics'', ''Reading non‑fiction (technology, history, finance)'', ''Fishing'', ''Gardening'', ''Chess'', ''Cooking Mexican cuisine'']'
  career_goals: Julio aims to turn his technical know‑how into a small, home‑based repair business that serves the Fort Worth community, with a focus on Spanish‑speaking customers. He plans to complete
    his associate degree in Business Administration to gain formal training in entrepreneurship and financial management. In the next few years, he hopes to obtain CompTIA A+ and ASE certifications to boost
    credibility, expand his workshop into a modest storefront, and hire a couple of apprentices. Ultimately, he wants to achieve a stable income that provides financial security for his family, enables
    him to purchase a larger home, and allows him to support his children’s education. He also aspires to mentor local youth interested in hands‑on trades, sharing both his practical skills and his competitive
    mindset.
