    a welcoming reception environment'', ''Adaptable workflow management'', ''Organizational skills with a flexible approach'', ''Calm, resilient demeanor under pressure'']'
  hobbies: '[''Church socials and potluck gatherings'', ''Participating in the Franklin Parish Fair'', ''Cooking Southern cuisine (jambalaya, gumbo, biscuits)'', ''Gardening (vegetable patch, herbs)'',
    ''Bingo nights at the community hall'', ''Quilting circles and craft projects'', ''Volunteering at the community center for seniors'', ''Bird-watching in local wetlands'', ''Reading mystery and romance
    novels'']'
  career_goals: Looking ahead, Camille aims to translate her extensive front‑desk experience into a supervisory role, such as office manager or front‑desk team lead, within the next three to five years.
    To strengthen her credentials, she plans to pursue a Certified Administrative Professional (CAP) certification and attend workshops on advanced office technology and leadership. Camille also wishes
    to expand her community involvement by coordinating informational sessions at the local library and senior center, assisting residents in navigating municipal services. In the longer term, she envisions
    using her networking skills to launch a small boutique consultancy that helps seniors and small businesses with appointment scheduling, paperwork, and resource referrals, allowing her to blend her professional
    expertise with her passion for community service.
