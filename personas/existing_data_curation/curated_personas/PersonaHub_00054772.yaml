persona_description: A researcher and musicologist who specializes in the use of computers to analyze and search for music, particularly in the field of musicology. He has a background in music theory,
  and his work involves creating a database of music scores and analyzing them using computer algorithms. His project, SIMSSA, aims to make this data accessible to musicologists and researchers, and he
  uses resources from Compute Canada and Calcul Québec to do his work. He is also interested in the transmission and spread of music over time, and has experience working with damaged musical scores.
