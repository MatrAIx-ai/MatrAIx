  career_goals: He hopes to pursue a career that merges his love of technology with community service, such as becoming an IT support specialist for local schools or a youth tech mentor. Long-term, he dreams
    of launching a community center that offers coding workshops and after-school programs for kids in Winston-Salem, allowing him to give back while staying flexible and creative. He also envisions studying
    computer science or information technology at a community college, keeping open the possibility of working in creative media like game design.
