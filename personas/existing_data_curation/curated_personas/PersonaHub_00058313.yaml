persona_description: A researcher who studies the long-term effects of bullying on both those who were bullied and those who did the bullying. The individual is skeptical about the lasting emotional effects
  of bullying, but acknowledges that they may still have hidden emotional effects from it. The researcher is interested in the effectiveness of anti-bullying campaigns and is willing to help prevent bullying
  and prevent depression and suicide.
