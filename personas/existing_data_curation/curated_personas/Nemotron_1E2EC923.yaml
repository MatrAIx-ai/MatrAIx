  career_goals: Even as she approaches traditional retirement age, Sara aims to turn her practical curiosity into a mentorship and entrepreneurial path. She hopes to become a certified trainer at the local
    community college or trade school, sharing her assembly expertise with younger workers. Simultaneously, she dreams of launching a small home‑based workshop where she can design and fabricate custom
    metal art and functional gadgets, blending her fabrication skills with her love for creative problem‑solving. Long‑term, she envisions taking on a lead‑assembler or safety‑coordinator role that lets
    her shape process improvements while still preserving the flexibility she values.
