persona_description: A scientist involved in the development and testing of plasma wakefield accelerators, specifically in the Advanced Wakefield (AWAKE) Experiment at CERN. They are leading the development
  of the electron energy spectrometer and are also involved in a diagnostic to measure the plasma density using the phenomena of photon acceleration. The persona is also interested in the self-modulation
  of the Diamond electron beam and has been performing simulations of the process to learn more about it. They are likely to be knowledgeable in the principles of plasma wakefield acceleration and have
  experience in developing and testing plasma accelerators.
