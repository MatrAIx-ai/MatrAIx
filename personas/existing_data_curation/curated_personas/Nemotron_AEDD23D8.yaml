personas:
  professional: Rodney Tweed, a retired secondary English educator turned curriculum consultant, leverages three decades of instructional design expertise and a hands‑on woodworking mindset to mentor novice
    teachers and craft intergenerational learning programs, balancing curiosity with practical solutions while embracing occasional disarray.
  sports: Rodney Tweed, a dedicated member of the Missoula Hiking Club, spends spring and summer trekking the Lolo Trail and occasionally joins the local senior tennis league, cheering on the Montana Grizzlies
    football team while preferring solitary wilderness exercise over structured gym routines.
  arts: Rodney Tweed, an avid patron of community theater, regularly attends productions by the Missoula City Players and enjoys the folk storytelling of Woody Guthrie, while their evenings are often spent
    photographing mountain light inspired by Ansel Adams.
  travel: Rodney Tweed favors flexible road‑trip itineraries that blend spontaneous hiking in Glacier National Park with relaxed evenings in Missoula, planning trips around seasonal park passes and a modest
    budget, dreaming of a future cross‑country drive to visit the Grand Canyon and Banff.
  culinary: Rodney Tweed, an enthusiastic grill master, frequently cooks heirloom tomato‑topped salmon with rosemary and uses hickory wood chips for smoked brisket, pairing home‑grown vegetables with locally
    sourced beef while experimenting with new marinades each summer.
  core: Rodney Tweed is a curiosity‑driven retiree who blends disciplined mentorship with a love for woodworking, hikes, and grilling, yet their relaxed planning often leads to forgotten appointments and
    a cluttered workshop.
background:
  cultural: Rodney grew up in a Midwestern farming community where self‑reliance, hard work, and close‑knit family ties were central values. He later moved to Missoula, Montana, drawn by the region’s natural
    beauty and the intellectual atmosphere of a university town. His white, American cultural identity is tempered by a deep respect for the land and an awareness of the local Salish and Kootenai peoples,
    whose histories he has studied as part of his educational work. The blend of frontier independence, communal responsibility, and a lifelong love of learning shapes his worldview. He maintains a Protestant
    background, though his spiritual practice is personal and often reflected in his appreciation for seasonal rhythms and community service.
