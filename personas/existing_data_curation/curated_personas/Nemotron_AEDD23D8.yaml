  career_goals: Now retired, Rodney aims to remain engaged by volunteering as a mentor for early‑career teachers and by launching an intergenerational learning program that pairs seniors with middle‑school
    students for shared history projects. He wants to complete a senior‑coach certification to offer informal counseling to community members navigating life transitions. A lifelong learner, he plans to
    enroll in a short‑course on documentary photography and to finish a memoir that reflects on his decades in education and the evolution of teaching practices. Travel to the national parks of the Rocky
    Mountains remains a personal ambition, as does maintaining his health through regular hikes.
