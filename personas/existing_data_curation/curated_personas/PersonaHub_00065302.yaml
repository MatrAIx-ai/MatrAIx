persona_description: A researcher or educator interested in comparative education, particularly those who are interested in the development of rigorous and productive studies in this field. This person
  is likely to have a background in education or a related field, and is interested in understanding the history and development of comparative education, the purposes of comparative education, the pitfalls
  of comparing education across cultural and national boundaries, and the alternative methods open to developing studies in this field. This person is also likely to have a background in comparative studies,
  and is interested in the approaches associated with Isaac Kandel, Nicholas Hans, and G. Z. F. Bereday, Brian Holmes, Edmund King, Harold Noah, and Max Eckstein. This person is also likely to be interested
  in the methods of comparative education, particularly the problem approach, a scientific means to educational reform, contributing to decision-making in education, comparative education as a social science,
  and exploring the methods of comparative education.
