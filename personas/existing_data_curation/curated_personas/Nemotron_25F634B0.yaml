    (business, psychology)'']'
  career_goals: Michael aims to complete a Bachelor’s degree in Business Administration or Marketing within the next three years while earning certifications such as Certified Customer Experience Professional
    (CCXP) and Project Management Professional (PMP). He plans to advance from his current customer service representative role to a team lead position, then to a Customer Experience Manager overseeing
    a regional support operation. Long‑term, he envisions transitioning into a product or UX research role where he can blend his curiosity for user behavior with his practical experience in service delivery.
    Additionally, Michael is interested in launching a small e‑commerce side business that leverages his knowledge of digital marketing and customer insights, allowing him to apply his skills in a entrepreneurial
    context.
