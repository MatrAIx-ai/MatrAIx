personas:
  professional: Shelton Lunyong is a community‑oriented cultural liaison in the making, blending street‑photography flair, improv spontaneity, and multilingual empathy to design pop‑up art events and mediate
    neighborhood collaborations, even while their love of spontaneity often leaves grant proposals and deadlines gathering dust.
  sports: Shelton Lunyong fuels their energy by playing pickup basketball with the Long Beach Street Hoops crew, cheering on the Los Angeles Lakers and LA Galaxy on game nights, and tackling weekend hikes
    along the Pacific Coast Trail, preferring a mix of spontaneous outdoor adventure over regimented gym routines.
  arts: Cultural curiosity drives Shelton Lunyong to wander Long Beach galleries, sketch graffiti murals inspired by Banksy and Frida Kahlo, improv with The Groundlings, and dance salsa to Celia Cruz, weaving
    these artistic threads into a vibrant personal identity that fuels weekend Instagram posts.
  travel: Shelton Lunyong prefers spontaneous weekend road trips to coastal towns like Santa Barbara and desert escapes in Joshua Tree, while dreaming of immersive street‑art tours in Bangkok, night markets
    in Kyoto, and the mural‑laden alleys of Valparaíso, often booking last‑minute flights to chase fresh inspiration.
  culinary: Shelton Lunyong, a self‑taught home chef, whips up fragrant pho broth, spicy laksa, and tamarind‑glazed adobo for friends, delighting in lemongrass, kaffir lime, and fresh cilantro, while occasionally
    over‑salting a dish after a late‑night art session.
  core: Shelton Lunyong is a 35‑year‑old kinetic connector who trades deadlines for spontaneous murals, salsa spins, and community hugs, often juggling coffee‑fueled brainstorms with missed rent reminders.
background:
  cultural: Shelton grew up in a tight‑knit Southeast Asian household in Long Beach, where family gatherings featured Lao and Filipino dishes, holiday rituals, and storytelling that emphasized community
    harmony. Surrounded by a vibrant mosaic of Asian cultures in Los Angeles County, he absorbed influences from Vietnamese, Thai, and Chinese neighbors, shaping a multicultural outlook that celebrates
    both his ancestral roots and American urban life. This blend of collectivist values, respect for elders, and an appreciation for artistic expression informs his compassionate nature and his drive to
    create inclusive, culturally resonant community spaces.
