    volunteering'', ''Coastal hiking'', ''Pickup basketball'']'
  career_goals: Shelton aims to turn his passion for community art and social connection into a sustainable role, such as a cultural liaison or program coordinator for a nonprofit arts center in Long Beach.
    He plans to enroll in community‑college courses on nonprofit management and grant writing while building a portfolio of public‑art projects that celebrate Southeast Asian heritage. Long‑term, he envisions
    creating a grassroots community space where artists, youth, and elders collaborate on murals, workshops, and cultural festivals, contributing to neighborhood cohesion and personal fulfillment.
