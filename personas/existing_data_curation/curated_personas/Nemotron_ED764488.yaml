  career_goals: Chris aims to transition into healthcare administration within the next three to five years, targeting roles such as nurse manager or director of patient services. He plans to pursue a Master
    of Science in Nursing with a leadership focus and obtain Lean Six Sigma certification to drive operational efficiency. His long‑term ambition is to become a chief operating officer for a regional health
    system, where he can integrate technology, advance patient‑centered care, and champion diversity and equity. Additionally, he hopes to launch a community health outreach program in King County that
    provides preventive care and health education tailored to the South Asian population.
