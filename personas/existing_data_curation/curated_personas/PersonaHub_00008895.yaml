persona_description: A neuroscientist who studies the brain's neural mechanisms and is interested in the development of more sensitive and accurate imaging technologies, the impact of genetics on normal
  mental processes and disease, and the use of computational techniques to understand the neuronal bases of behavior. The individual is dedicated to bridging the gap between the genetic basis of life and
  the brain's neural processes and is interested in understanding how the brain's neural mechanisms lead to normal cognition, thought, language, perception of beauty, and the development of debilitating
  brain diseases such as Alzheimer's. The individual is also interested in understanding how habits are formed and how addictions form through the operations of neurons in the basal ganglia.
