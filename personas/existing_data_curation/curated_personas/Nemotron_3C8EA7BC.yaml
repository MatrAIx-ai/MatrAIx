  hobbies: '[''Woodworking'', ''Scale model building'', ''Technical reading (fire science, true crime)'', ''Solo hiking'', ''Trail running'', ''Weightlifting'', ''Marksmanship'', ''Strategic video gaming'',
    ''Cooking'', ''Craft brewery tastings'']'
  career_goals: Christopher aims to formalize his education by completing an associate degree in fire science and eventually earning a bachelor's in fire administration. He plans to obtain Fire Officer
    I and II certifications, become a certified paramedic, and join the department’s specialized Urban Search and Rescue (USAR) team. Within the next five years, he aspires to be promoted to fire captain,
    focusing on integrating technology—such as GIS mapping and predictive analytics—into response strategies. Long‑term, he envisions becoming fire chief, where he can champion firefighter wellness programs,
    advanced training curricula, and community risk‑reduction initiatives while upholding the high standards he sets for himself.
