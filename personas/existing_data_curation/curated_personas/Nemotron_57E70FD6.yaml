  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Cooking traditional and fusion South Asian dishes'', ''Herb gardening'', ''Playing bridge'', ''Reading poetry and classic
    literature'', ''Attending cultural festivals'', ''Genealogy research'', ''Puzzle solving (crosswords, jigsaw)'']'
  career_goals: Although retired, Shailaja aims to compile a family cookbook that blends classic South Asian recipes with her own artistic twists, volunteer as a docent at the Princeton Art Museum to share
    her love of art with visitors, and lead informal art‑craft workshops for seniors at the local community center. She also hopes to mentor younger South Asian women in preserving cultural heritage and
    to organize a small multicultural exhibition that showcases regional art and cuisine.
