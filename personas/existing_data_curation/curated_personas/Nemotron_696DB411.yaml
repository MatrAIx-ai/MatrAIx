personas:
  professional: Vixay Tanglao, a seasoned substance‑abuse counselor proficient in CBT, DBT, and motivational interviewing, blends a structured assessment framework with a surprisingly flexible, client‑centered
    style that leverages their humanities background to foster deep empathy, while assertively pursuing LCSW licensure and a future doctoral research agenda.
  sports: Vixay Tanglao enjoys solitary jogs along Lake Eola Park, avidly follows the Orlando Magic and Orlando City SC, and occasionally joins a low‑key community basketball pick‑up game, balancing personal
    cardio with modest team interaction.
  arts: Vixay Tanglao spends evenings strumming a ukulele while listening to Jack Johnson, devotes weekends to photographing Orlando’s contrast of glass skyscrapers and swaying palms, and participates in
    a small book‑club where they discuss contemporary works by Margaret Atwood, Jonathan Franzen, and Zadie Smith.
  travel: Vixay Tanglao has taken weekend road trips to Savannah’s historic squares, explored the volcanic landscapes of Iceland, and dreams of a leisurely drive along the Florida Keys, balancing a love
    for cultural immersion with a need for low‑key, budget‑friendly travel.
  culinary: Vixay Tanglao delights in cooking family‑passed herb‑laden rice, slow‑braised pork shoulder, and a spiced coconut chicken stew flavored with turmeric, lemongrass, and kaffir‑lime leaves, often
    experimenting with fresh basil and galangal while keeping a modest, well‑stocked spice rack.
  core: Vixay Tanglao, a 30‑year‑old substance‑abuse counselor who mixes disciplined therapeutic routines with an occasional scramble of photography gear purchases, finds balance in daily meditation, ukulele
    chords, and a pragmatic, albeit occasionally lax, approach to budgeting and self‑care.
background:
  cultural: 'Vixay was raised in a Southeast Asian immigrant household (Filipino‑Vietnamese heritage) and grew up bilingual in English and Tagalog. His family places a high value on respect for elders,
    communal responsibility, and storytelling—principles that shape his empathetic counseling style. He actively participates in local cultural festivals such as Tet and Barrio Thai, and maintains ties
    with a supportive diaspora community in Orlando. Vixay’s cultural lens informs his practice: he emphasizes holistic well‑being, acknowledges stigma surrounding mental health in his community, and incorporates
    culturally relevant metaphors and traditional health concepts when working with clients. His marriage reflects a blend of Western individuality and Southeast Asian family orientation, reinforcing his
    commitment to balance personal autonomy with collective harmony.'
attributes:
  skills: '["Motivational Interviewing", "Cognitive Behavioral Therapy (CBT)", "Dialectical Behavior Therapy (DBT) fundamentals", "Crisis Intervention", "Substance Abuse Assessment", "Case Management",
    "Group Facilitation", "Cultural Competency", "Active Listening", "Documentation and Record Keeping", "Interdisciplinary Collaboration", "Relapse Prevention Planning", "Program Development"]'
  hobbies: '["Reading contemporary literature", "Writing personal essays", "Cooking traditional Southeast Asian dishes", "Gardening", "Meditation and mindfulness practice", "Walking/hiking in local parks",
    "Photography of urban and natural scenes", "Playing the ukulele", "Participating in small book clubs", "Volunteering at community outreach programs"]'
  career_goals: Vixay aims to become a licensed clinical social worker (LCSW) within the next two years and eventually pursue a doctoral degree in counseling psychology to deepen his research expertise.
    He aspires to lead the development of a community‑based relapse‑prevention program tailored for Southeast Asian immigrants in Central Florida, incorporating expressive‑arts therapies and culturally
    informed interventions. Long‑term, he envisions taking on a director role at a regional addiction‑treatment center, publishing scholarly articles on culturally responsive care, and advocating for policy
    changes that reduce stigma around mental health in minority communities.
