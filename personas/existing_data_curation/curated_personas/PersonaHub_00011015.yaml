persona_description: A historian with a specialization in the prehistory and history of the Americas, particularly focusing on the development of civilizations in the New World before the arrival of Columbus.
  This person is interested in the study of pre-Columbian contact between the Old World and the New, and is particularly drawn to the similarities and differences between New World and Old World cultures.
  They are also interested in the use of various kinds of data, such as archaeology, botany, geography, and history, to investigate this topic.
