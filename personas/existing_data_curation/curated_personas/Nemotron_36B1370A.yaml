  hobbies: '[''Drawing'', ''Watercolor painting'', ''Digital collage creation'', ''Visiting museums'', ''Reading biographies of Black artists'', ''Creative writing (short stories, poetry)'', ''Journaling'',
    ''Scratch game development'', ''Python learning'', ''Piano practice'', ''Listening to jazz/neo‑soul/hip‑hop'', ''Youth book club'', ''Volunteering at after‑school program'']'
  career_goals: Bobbylee aims to blend her love of art with her organizational strengths by pursuing a career as a museum curator or art therapist. In the short term, she plans to attend a rigorous high
    school, earn a scholarship, and build a strong portfolio of visual art and community projects. Long‑term, she envisions earning a degree in Art History or Creative Arts Therapy, curating exhibitions
    that highlight African‑American contributions, and establishing outreach programs that use art to support youth mental health.
