personas:
  professional: Bobbylee London, a 14‑year‑old aspiring digital artist and budding game developer, combines disciplined organization with an open‑minded curiosity, using watercolors, manga drawing, Scratch,
    and early Python skills to craft narrative‑driven mini‑games for their youth book club, while channeling the communal spirit of their neighborhood's art workshops into collaborative projects.
  sports: Bobbylee London enjoys staying active by playing pick‑up basketball at the Oak Cliff community court, cheering on the Dallas Mavericks during the NBA season, dribbling alongside the youth soccer
    club Armstrong FC, and committing to a disciplined after‑school yoga routine to balance the stress from schoolwork, though they occasionally skip weekend runs when a new art project demands attention.
  arts: Bobbylee London immerses themselves in art by drawing manga‑style characters inspired by Hayao Miyazaki’s storytelling, experimenting with watercolors reminiscent of Kehinde Wiley’s portraiture,
    attending exhibitions featuring the works of contemporary painter Amy Sherald at the Dallas Museum of Art, listening to jazz legends like Miles Davis and neo‑soul singer Erykah Badu while practicing
    piano, and writing poetry that echoes the rhythm of Kendrick Lamar’s verses.
  travel: Bobbylee London savors weekend trips that blend cultural discovery and family time, having explored the historic River Walk in San Antonio and the vibrant murals of Mexico City on a school‑organized
    field trip, while dreaming of a solo pilgrimage to Kyoto to attend a manga convention and taste authentic matcha, though their travel plans stay modest due to school responsibilities and a modest allowance.
  culinary: Bobbylee London has a palate that craves Tex‑Mex comfort and artistic plating, often whipping up quesadillas with fresh jalapeños, cilantro, and roasted corn, experimenting with lavender‑infused
    cupcakes that echo watercolor hues, and occasionally attempting to recreate soul‑food classics such as collard greens seasoned with smoked paprika, yet they sometimes over‑salt dishes while multitasking
    between sketching and cooking.
  core: Bobbylee London is a hyper‑organized teenage creator who blends discipline with boundless curiosity, juggling art, code, and community service while they wrestle with a worry‑prone mind and the
    occasional impulse to splurge on the newest digital tools.
background:
  cultural: Bobbylee is a Black teen raised in Dallas' Oak Cliff neighborhood, a community rich in African‑American traditions and Southern culture. Her family celebrates Juneteenth, church gatherings,
    and the legacy of the civil‑rights movement, while also engaging with Dallas’ vibrant arts scene. She has been influenced by local hip‑hop, gospel music, and the city's murals and galleries. Her upbringing
    blends Southern hospitality, Tex‑Mex cuisine at family gatherings, and a strong emphasis on education and community service, granting her a multicultural perspective rooted in the Black American experience
    of the South.
attributes:
  skills: '[''Time management'', ''Project planning'', ''Advanced reading comprehension'', ''Analytical writing'', ''Sketching'', ''Digital illustration'', ''Basic Python programming'', ''Scratch coding'',
