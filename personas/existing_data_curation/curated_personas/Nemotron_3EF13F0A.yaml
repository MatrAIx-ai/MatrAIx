personas:
  professional: Wesam Keller, a budding LEGO architect, meticulously organizes blocks, follows step‑by‑step instructions, and creates detailed building plans before play, showcasing their preference for
    structure, reliability, and practical focus while gently soothing their worries with predictable outcomes.
  sports: Wesam Keller, an enthusiastic participant in the Little Rockets youth soccer club who also cheers for the New York Yankees, enjoys organized practice sessions on Saturday mornings, loves the predictability
    of a weekly game schedule, and balances active play with quiet reading time to recharge.
  arts: Wesam Keller, an avid fan of Disney’s Frozen (especially the song 'Let It Go') and a budding doodler who recreates favorite characters from Dr. Seuss books, spends afternoons drawing with colored
    pencils in a tidy sketchbook, and finds comfort in the familiar rhythm of sing‑along movie nights.
  travel: Wesam Keller, a curious explorer who prefers short family trips with a clear itinerary, has visited Disneyland in Anaheim, the sandy shores of Myrtle Beach, and grandparents’ countryside cottage,
    and always packs a favorite stuffed animal for reassurance, reflecting their love of structured adventures and need for emotional safety.
  culinary: Wesam Keller, a budding junior chef who loves making creamy macaroni and cheese with cheddar, spreading peanut butter and jelly on whole‑wheat bread, and blending banana‑strawberry smoothies,
    often helps stir ingredients in a small bowl while insisting on a tidy kitchen and a consistent recipe step order.
  core: Wesam Keller is a meticulous, worry‑prone five‑year‑old whose love for order shapes every play, save, and snack.
background:
  cultural: Wesam was raised in a middle-class, predominantly white suburban community in Randolph, New Jersey. His family emphasizes punctuality, organization, and community involvement, reflecting typical
    American suburban values. He attends a local preschool where multicultural holidays are recognized, giving him exposure to diverse traditions while his primary cultural influences remain those of his
    family's American heritage, such as celebrating Thanksgiving and Fourth of July and participating in community sports leagues.
