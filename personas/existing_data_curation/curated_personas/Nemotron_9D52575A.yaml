  career_goals: Jennifer aims to advance from hands‑on fabricator to a lead supervisor role, leveraging her competitive drive to earn certifications such as Certified Manufacturing Technician and Certified
    Welder. She envisions integrating her artistic sensibility into her career by establishing a small boutique studio that creates custom metal art and functional pieces for local galleries and interior
    designers. Additionally, she seeks to spearhead lean process improvements on the production line, positioning herself as an innovative problem‑solver who bridges practical fabrication with creative
    design.
