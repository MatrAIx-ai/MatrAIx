  hobbies: '[''Gardening (herbs, chilies, seasonal vegetables)'', ''Cooking Mexican recipes & personal cookbook development'', ''Journaling'', ''Reading mystery novels'', ''Crossword & Sudoku puzzles'',
    ''Hiking high desert trails'', ''Landscape photography'', ''Acoustic guitar (folk & ranchera)'', ''Chess club'']'
  career_goals: Aileen aims to finish her associate’s degree in Business Administration within the next two years, followed by a certification in agricultural business management. In the short term, she
    plans to work part‑time as a community outreach coordinator for a local non‑profit, helping Spanish‑speaking residents navigate social services and employment resources. Her longer‑term ambition is
    to open a modest, community‑focused grocery and café that showcases Mexican staples alongside locally sourced Oregon produce, creating a cultural bridge and modest economic hub in Vale. She also hopes
    to mentor other young Latina women in rural areas, encouraging them to pursue education and entrepreneurship.
