  hobbies: '[''Hiking and nature photography'', ''Desert xeriscape gardening'', ''Reading historical mystery novels'', ''Craft fairs and handmade jewelry making'', ''Southwestern cooking'', ''Yoga and meditation'',
    ''Volunteering with senior community'']'
  career_goals: Maryann aims to transform her current station into a boutique salon that reflects her love for both innovative and classic hair artistry. She plans to earn a master colorist certification
    within the next two years, enabling her to offer advanced coloring services like multi-dimensional balayage while staying grounded in practical technique. Additionally, she hopes to launch a small line
    of natural, desert-inspired hair care products and to mentor younger stylists through informal apprenticeships, ensuring the salon remains a community hub that balances profitability with compassionate
    service.
