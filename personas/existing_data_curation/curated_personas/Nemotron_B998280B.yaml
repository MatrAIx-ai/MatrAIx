personas:
  professional: Maryann Nunn is a seasoned hairdresser with over three decades of experience; they blend curiosity for modern techniques like balayage and hair‑tattoo shading with a practical focus on timeless
    silhouettes, delivering personalized consultations, precise color formulation, and meticulous sanitation while managing a flexible, often spontaneous schedule.
  sports: Maryann Nunn enjoys hiking the Superstition Mountains and strolling the Gila River trails; they practice gentle yoga at sunrise and root for the Phoenix Suns, Arizona Diamondbacks, and Phoenix
    Rising FC, occasionally joining a local hiking club for seasonal desert treks.
  arts: Maryann Nunn showcases handmade silver jewelry at Globe’s annual art and craft fairs; they draw artistic inspiration from the desert’s layered geology and the works of Georgia O'Keeffe and Frida
    Kahlo, and unwind with historical mystery novels by authors like C.J. Sansom while curating a small photo portfolio of sunrise landscapes.
  travel: Maryann Nunn prefers spontaneous road trips across the Southwest; they have explored Sedona, Monument Valley, and Joshua Tree, and dream of trekking Patagonia’s national park while occasionally
    venturing to Oaxaca, Mexico for culinary inspiration, always packing a camera and a lightweight water bottle.
  culinary: Maryann Nunn experiments with southwestern cuisine; they regularly prepare green chile enchiladas, cactus (nopales) salad, and masa‑based tamales seasoned with mesquite honey, while their xeriscape
    garden yields agave syrup they use both in cooking and in their emerging line of natural hair‑care products.
  core: Maryann Nunn balances desert‑wanderer curiosity with practical salon expertise; they improvise schedules, mentor younger stylists, and blend a love of hiking, craft fairs, and spicy southwestern
    cooking into a uniquely flexible lifestyle.
background:
  cultural: Maryann grew up in a rural part of Arizona, part of a multi-generational white American family that settled in the Southwest, absorbing the region's values of self-reliance, community ties,
    and appreciation for the desert environment. Her cultural identity is shaped by the blend of a traditional Midwestern work ethic and the relaxed, outdoorsy lifestyle of the Arizona high desert. Local
    customs—such as community potlucks, holiday parades in Globe, and the close‑knit nature of Gila County—inform her sense of belonging; at the same time, she respects the diverse cultural heritage of
    the area, occasionally attending Native American pow‑wows and celebrating regional holidays.
attributes:
