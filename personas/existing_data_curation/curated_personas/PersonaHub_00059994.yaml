persona_description: A space scientist who works at Brown University and is currently involved in the analysis and interpretation of the data from NASA's Wide-field Infrared Survey Explorer (WISE) mission.
  He is particularly interested in the detection of quasars and the study of dusty, cold and distant objects, which are often invisible to regular telescopes. He has been mining the database for quasars
  and has observed that if a galaxy has highly ionized gas clouds in its outskirts and no infrared evidence of a hidden quasar, it is a sign that the quasar has essentially shut down in the last 30,000
  to 50,000 years.
