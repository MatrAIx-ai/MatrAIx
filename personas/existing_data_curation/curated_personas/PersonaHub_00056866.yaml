persona_description: A marine geologist and oceanographer who specializes in the study of tectonic plate movements and their effects on the ocean floor. She has extensive knowledge of the dynamics of tsunamis
  and their impact on coastal communities. Her research interests include the study of the behavior of tsunamis, the role of tectonic plate movements in generating tsunamis, and the impact of tsunamis on
  coastal communities. She has published several papers on the topic and has testified before Congress on the topic. She is highly respected in her field and has received numerous awards for her contributions
  to the study of tsunamis.
