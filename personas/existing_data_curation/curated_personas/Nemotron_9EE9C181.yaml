personas:
  professional: Curtis Combs, a seasoned facilities manager with 25+ years of hands‑on experience in commercial and industrial operations across the Inland Empire, leverages deep HVAC, plumbing, and building‑automation
    expertise alongside a knack for low‑cost, creative fixes, and channels their competitive drive and improvisational problem‑solving into surpassing cost‑saving targets while mentoring crews and integrating
    local art into upgrades.
  sports: Curtis Combs, an avid hiker of the San Berardino foothills and member of the local Trail Runners club, enjoys weekend pick‑up basketball at the Riverside community center, follows the Los Angeles Rams
    and Dodgers faithfully, and mixes solitary trail runs with occasional weekend bike rides with the San Bernardino Mountain Biking Club to keep fit.
  arts: Curtis Combs immerses himself in the Riverside‑Los Angeles art scene, attending gallery openings featuring Shepard Fairey‑inspired murals, collecting Led Zeppelin and Pink Floyd vinyls, strumming
    acoustic renditions of classic rock for friends, and collaborating with local muralists to embed community art into facility upgrades.
  travel: Curtis Combs favors spontaneous road trips that blend adventure and relaxation, having already explored Joshua Tree’s desert flora, photographed the Grand Canyon’s sunrise, and ventured to Oaxaca
    for its vibrant street art, while they keep a bucket list entry for the Pacific Coast Highway drive to watch the sunset at Big Sur.
  culinary: Curtis Combs showcases inventive barbecuing skills, frequently smoking brisket with mesquite wood, glazing pulled pork with chipotle‑honey, and seasoning ribs with rosemary, thyme, and smoked
    paprika, while pairing dishes with craft beers from local microbreweries and occasionally whipping up a homemade whiskey‑infused BBQ sauce.
  core: Curtis Combs is a pragmatic, art‑loving DIY enthusiast whose competitive edge fuels cost‑saving facility innovations, yet a relaxed, disorganized streak and healthy skepticism color both work and
    personal life.
background:
  cultural: Curtis is a third‑generation white American raised in the modest, working‑class neighborhoods of Patton, California. His family traces its roots to Irish and English immigrants who settled in
    Southern California after World II. Growing up he absorbed a blend of frontier practicality—valuing self‑reliance, hands‑on skills, and frugality—and the multicultural vibe of the Inland Empire, where
    Hispanic, Latino, and Asian cultural influences are woven into everyday life. This background nurtured his respect for hard work, a competitive spirit, and an appreciation for the diverse artistic expressions
    that now enrich his personal and professional world.
attributes:
  skills: '["Facilities operations management", "Preventive maintenance planning", "Vendor negotiation and contract oversight", "Budgeting and cost control", "Health, safety, and regulatory compliance",
    "Project coordination and site oversight", "HVAC and mechanical systems fundamentals", "Basic electrical troubleshooting", "Emergency response planning", "Sustainability and energy‑efficiency initiatives",
    "Creative space design and art integration", "Improvisational problem‑solving", "Flexible decision‑making under uncertainty"]'
  hobbies: '["Visiting art galleries and museum exhibitions", "Exploring street‑art murals and public installations", "DIY home‑improvement and woodworking projects", "Hiking and nature photography in the
    San Bernardino mountains", "Listening to and collecting vintage rock vinyl", "Playing acoustic guitar", "Attending community‑theatre productions", "Experimenting with grilling and barbecue recipes",
    "Learning and testing smart‑home/IoT devices", "Reading science‑fiction and technology non‑fiction"]'
  career_goals: Looking ahead, Curtis aims to step into a regional facilities director role that would let him oversee multiple sites across San Bernardino County. He is actively pursuing the Certified
    Facility Manager (CFM) credential to formalize his expertise and plans to lead a pilot sustainability program that reduces overall energy use by 15% within three years. Concurrently, he wants to mentor
    younger maintenance staff, establishing a hands‑on apprenticeship track to pass on his pragmatic knowledge. If the opportunity arises, Curtis also envisions launching a boutique consulting firm that
    helps small‑to‑mid‑size property owners implement flexible, cost‑effective maintenance solutions while integrating local art to enhance community identity.
