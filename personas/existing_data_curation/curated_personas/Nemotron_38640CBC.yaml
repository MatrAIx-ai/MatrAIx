personas:
  professional: Kenyasha Poitier is an aspiring junior game developer who channels curiosity and practicality into building simple Scratch games, using meticulous planning balanced with creative flexibility,
    while their reserved nature makes them a thoughtful collaborator in the coding club.
  sports: Kenyasha Poitier enjoys weekend hikes along the Natchez Trace, follows the Nashville Predators on TV, and participates in the North Nashville Youth Soccer Club's Saturday practices, balancing
    a love for quiet outdoor exercise with occasional team sports for social connection.
  arts: Kenyasha Poitier sketches watercolor landscapes of local wildlife while listening to classic soul legends like Aretha Franklin and Stevie Wonder, reads historical fiction and poetry by Maya Angelou,
    and finds inspiration in the emotive storytelling of contemporary R&B artist H.E.R.
  travel: Kenyasha Poitier prefers low‑key, self‑planned adventures, often mapping day‑trips to the Great Smoky Mountains, exploring the historic neighborhoods of Nashville, and dreaming of a future visit
    to the civil rights landmarks in Washington, D.C., all while juggling school responsibilities.
  culinary: Kenyasha Poitier loves whipping up flaky buttermilk biscuits and smoky collard greens seasoned with smoked paprika, experimenting with simple flavor pairings like honey‑brown butter drizzle,
    and occasionally baking ginger cookies to share with coding club friends.
  core: Kenyasha Poitier is a quiet, inquisitive teen who blends literary imagination with artistic flair, worries about the future, yet finds calm in sketching, coding, and the rhythm of soulful music.
background:
  cultural: Kenyasha is a Black teenager raised in Vicksburg, Mississippi, where the legacy of the civil‑rights movement and Southern African‑American culture shapes her worldview. Her family values church
    fellowship, storytelling, and community service, often celebrating holidays like Juneteenth and participating in local festivals such as the Vicksburg Blues Festival. She grew up hearing the oral histories
    of her grandparents, learning about the importance of resilience and mutual support. This cultural heritage informs her love for gospel music, comfort foods like collard greens and cornbread, and a
    strong sense of responsibility toward her community.
