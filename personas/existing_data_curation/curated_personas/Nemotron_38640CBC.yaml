  career_goals: Kenyasha hopes to attend college and study psychology or social work with the aim of becoming a community mental‑health advocate for teens. She wants to create safe spaces in her hometown
    where young people can discuss stress and anxiety, and eventually work as a youth counselor or school psychologist. In the short term, she plans to volunteer at the local library’s after‑school program,
    take on leadership roles in her church’s youth group, and earn a scholarship that will support her higher‑education goals.
