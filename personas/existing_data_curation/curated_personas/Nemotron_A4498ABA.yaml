personas:
  professional: Ian Wilkinson, a 46‑year‑old with a toolbox of self‑taught carpentry and handyman skills, blends calm reliability with a knack for organized event facilitation as they prepare to launch
    a community‑focused maintenance business while eyeing a part‑time coordination role with Boise Parks and Recreation.
  sports: Ian Wilkinson, an avid outdoorsman, leads a weekly hiking crew through the Boise foothills, plays midfield for the Boise Bolt Soccer Club, cheers on the Boise State Broncos football team, volunteers
    as a trail steward for the Idaho Department of Parks and Recreation, and they treat each match and hike as a chance to reinforce community bonds.
  arts: Ian Wilkinson, a regular at Boise’s Egyptian Theatre and Neon Prison, enjoys live sets from folk‑rock artists like Brandi Carlile and John Mayer, curates a small collection of handmade folk art
    in his garage, occasionally joins a community drum circle, and they find that music fuels both their social gatherings and the rhythm of their woodworking projects.
  travel: Ian Wilkinson, who prefers low‑key road trips over distant flights, has camped the Sawtooth Wilderness, explored historic Sun Valley and Craters of the Moon, dreams of a spring hike in the Maroon
    Bells, plans each getaway with a detailed packing list that balances gear weight against the desire to sample local food markets, and they relish the anticipation of mapping out new trails on a well‑worn
    notebook.
  culinary: Ian Wilkinson, a garden‑to‑table enthusiast, regularly harvests heirloom tomatoes, rainbow carrots, and beans to craft rustic ratatouille, grilled trout with lemon‑herb butter, and a signature
    chili topped with locally sourced jalapeños, proudly admits a habit of over‑seasoning dishes with smoked paprika, and they love sharing surplus harvest with neighbors during potluck gatherings.
  core: Ian Wilkinson, a 46‑year‑old calm‑minded handyman who blends structured budgeting, community‑driven projects, and a love for hiking, soccer, and home‑cooked garden meals into a life that’s practical
    yet peppered with occasional over‑seasoned culinary experiments, and they stay reliably sociable while quietly indulging in a penchant for late‑night woodworking.
background:
  cultural: Ian was raised in a predominantly Anglo-American family in Idaho, with roots tracing back to early European settlers from England and Germany. The regional culture of self-reliance, outdoor
    recreation, and close-knit community participation shaped his values, while his involvement in local church gatherings and civic clubs reinforced a moderate, cooperative outlook. Living in Boise, he
    blends the conservative-midwestern work ethic with the progressive, environmentally conscious vibe of the Pacific Northwest, resulting in a cultural identity that values practicality, community service,
    and a deep respect for the natural landscape.
attributes:
  skills: '[''Home repair & maintenance'', ''Carpentry & DIY woodworking'', ''Basic automotive maintenance'', ''Event planning and coordination'', ''Group facilitation'', ''Conflict mediation'', ''First-aid
    and emergency response'', ''Budget management for small projects'', ''Outdoor navigation and wilderness survival'', ''Community outreach'']'
  hobbies: '[''Hiking and trail exploration'', ''Recreational soccer'', ''Community gardening'', ''Food bank volunteering'', ''Organizing potluck gatherings'', ''Woodworking projects'', ''Attending live
    music events'', ''Camping trips'', ''Participating in local festivals'']'
  career_goals: Ian aims to formalize his practical knowledge by obtaining a GED and then pursuing an apprenticeship in carpentry or HVAC. His primary ambition is to launch a small, locally-owned maintenance
    and repair business that offers reliable services to Boise residents, leveraging his reputation for reliability and calm professionalism. In parallel, he hopes to secure a part-time role as a community
    program coordinator with the Boise Parks and Recreation department, where he can apply his organizational skills and love for group activities.
