persona_description: A political analyst who specializes in the study of presidential elections and their impact on American politics, particularly focusing on the relationship between the two main political
  parties, the Republicans and the Democrats, and their respective presidential candidates. They have a deep understanding of the history of presidential elections in the United States, including the roles
  and actions of past Republican and Democratic presidents, and how their policies and actions influenced the political landscape of the country. They also have a keen interest in the impact of economic
  policies, civil rights legislation, and other major legislative initiatives on the lives of ordinary Americans and the overall trajectory of the country.
