personas:
  professional: Rosalee Fye, a veteran security surveillance specialist with a decade of experience in casino monitoring, leverages their meticulous eye for detail, conflict de‑escalation skill, and pragmatic
    curiosity to design training workshops, implement AI video analytics, and drive safety metrics toward continuous improvement.
  sports: Rosalee Fye runs several miles each week on the Saginaw River trails, attends strength‑training sessions at the local community gym, follows the Detroit Lions and Michigan State Spartans basketball,
    and is a member of the Saginaw Women’s Recreational Running Club, prioritizing consistency over competition.
  arts: Rosalee Fye unwinds to the smooth sounds of John Coltrane, Miles Davis, and B.B. King on vinyl, attends the annual Saginaw Jazz & Blues Festival, and occasionally slips into an impromptu piano session
    at the café where they play chess, sharing their quiet appreciation for acoustic improvisation.
  travel: Rosalee Fye prefers short, purpose‑driven road trips—like a weekend hike through Michigan’s Upper Peninsula, a culinary tour of New Orleans for its jazz heritage, and a planned cultural immersion
    in Kyoto—balancing their love of history with a practical budget and a penchant for well‑researched itineraries.
  culinary: Rosalee Fye enjoys cooking Southern‑inspired dishes such as shrimp étouffée, smoked collard greens, and cornbread, skillfully blending their family‑passed spice mix of paprika, cayenne, and
    smoked salt, and they often experiment with fresh garden tomatoes in a peppery gazpacho for a twist.
  core: Rosalee Fye is a disciplined, data‑driven security professional whose competitive edge fuels a keen eye for detail, balanced by a quiet love for chess, gardening, and soulful blues.
background:
  cultural: Rosalee is a second‑generation African American who grew up in Saginaw, Michigan. Her grandparents migrated from the Southern United States during the Great Migration, settling in the industrial
    Midwest. She was raised in a close‑knit Black community anchored by churches, schools, and local community centers. Her mother, a dedicated teacher, instilled a deep respect for education and service.
    Rosalee celebrates cultural traditions such as Juneteenth, soul music, and family‑cooked meals that connect her to her heritage. While she has faced systemic challenges, the supportive network around
    her has fostered resilience, a competitive drive, and a pragmatic outlook. Her identity informs her commitment to mentoring youth, advocating for equitable workplace practices, and giving back to the
    community that shaped her.
