  career_goals: Rosalee aims to advance to a supervisory role within a regional casino, eventually overseeing multiple sites as a district security manager. She plans to earn the Certified Protection Professional
    (CPP) credential and pursue a master's degree in criminal justice to deepen her strategic expertise. Long‑term, she envisions creating a mentorship pipeline for underrepresented individuals in the security
    field and possibly launching a consulting firm that provides risk‑assessment services to small gambling venues. Throughout her career, she wants to be recognized for improving safety metrics, fostering
    a culture of accountability, and contributing to community safety initiatives in Saginaw.
