persona_description: A millennial who values health and wellness and is willing to pay for it, but is more concerned about cost and convenience than previous generations. They are health-conscious, motivated
  by social media and their busy schedules, and prioritize physical fitness and mental health. They tend to avoid regular medical appointments, preferring to self-diagnose and seek care from walk-in clinics
  or urgent care centers. They are more likely to seek preventive care and are concerned about the long-term effects of ignoring health issues. They are aware of the importance of a regular doctor-patient
  relationship and the risks of not keeping up with medical records. They are also aware of the potential consequences of not having a doctor familiar with their overall history and the need for better
  access to healthcare for millennials.
