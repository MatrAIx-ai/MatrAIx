  hobbies: '[''Home herb gardening'', ''Reading classic mystery novels'', ''Knitting scarves and blankets'', ''Walking the Chemung River trail'', ''Competing in regional baking contests'', ''Volunteering
    at the Elmira community kitchen'', ''Listening to big‑band and classic jazz music'', ''DIY home‑improvement projects'']'
  career_goals: Clara aims to cement her bakery’s reputation as the go‑to source for high‑quality, timeless baked goods in the Elmira area while ensuring steady, predictable revenue that eases her anxiety
    about financial stability. She plans to earn a Certified Master Baker credential, expand her product line to include a celebrated line of gluten‑free and heritage‑grain breads, and eventually publish
    a modest cookbook that documents her family’s recipes. Mentoring a young apprentice and possibly opening a second, modestly sized outlet before retirement are also key milestones, reflecting her competitive
    drive and desire for lasting legacy.
