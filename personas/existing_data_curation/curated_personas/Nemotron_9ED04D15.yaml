  hobbies: '[''Hiking'',''Cooking Mexican Cuisine'',''Folklórico Dancing'',''Volunteering at STEM Clubs'',''Reading Education Literature'',''Book Club'',''Yoga'',''Community Potlucks'',''Traveling'',''Gardening'']'
  career_goals: She aims to become a lead teacher and instructional coach, eventually pursuing a master’s in educational leadership to move into school administration. Angel hopes to develop a district-wide
    bilingual program that integrates Mexican cultural content, mentor new teachers, and present her innovative classroom practices at regional conferences. Long-term, she envisions influencing education
    policy to support multicultural and inclusive curricula in Utah’s schools.
