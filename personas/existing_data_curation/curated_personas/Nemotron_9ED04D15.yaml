personas:
  professional: Angel Tejero, a dedicated elementary and middle school teacher with a specialty in bilingual education, blends curiosity-driven lesson design with proven instructional methods, using data-driven
    assessment and meticulous classroom management to create culturally resonant curricula while leading community outreach projects and mentoring peers toward innovative teaching practices.
  sports: Angel Tejero, an avid outdoor enthusiast, hikes the red‑rock trails of Zion and Bryce almost every other weekend, participates in a local yoga group for flexibility, follows the Utah Jazz and
    Real Salt Lake with spirited weekend viewing parties, and volunteers as a score‑keeper for a community youth soccer league, combining casual competition with a love for staying active.
  arts: Angel Tejero, a vibrant member of a community folklórico dance troupe, regularly performs at local cultural festivals, finds inspiration in the murals of Frida Kahlo and the music of Lila Downs,
    attends productions at the Rocky Mountain Theatre Company, and fuels her creative energy by curating playlists featuring classic ranchera and contemporary folk artists.
  travel: Angel Tejero, whose travel style blends adventure and cultural immersion, spends her vacations exploring the striking canyons of the American Southwest—especially Arches and Canyonlands—while
    also planning a dream trip to Oaxaca to explore its culinary traditions, and she prefers road trips that allow spontaneous stops at small-town markets rather than rigid itineraries.
  culinary: Angel Tejero, a passionate home cook, delights in preparing traditional Mexican dishes such as mole poblano, tamales de elote, chiles en nogada, and tacos al pastor using fresh chilies, corn
    masa, and locally sourced spices, hosts neighborhood potlucks where she showcases these flavors, and despite her skill, she occasionally burns the edges of tortillas when juggling multiple pots.
  core: Angel Tejero, with a methodical yet energetic spirit, turns classroom innovation, community dance, and kitchen experiments into a lively, culturally rich tapestry of purpose‑driven living.
background:
  cultural: Angel is a first-generation Mexican-American who grew up bilingual in Spanish and English. Her family traditions—celebrating Día de los Muertos, preparing mole and tamales, and emphasizing familismo—remain
    central to her identity. Living in Cedar City, she blends her Mexican heritage with the outdoor, community-oriented culture of Southern Utah, often incorporating Mexican storytelling, music, and language
    into her classroom to foster cultural pride and cross-cultural understanding.
