personas:
  professional: Lisa Griffin, an aspiring young problem‑solver, channels her love for chess strategies, Scratch game design, and science fair projects into a budding expertise, demonstrating how they methodically
    break down challenges with disciplined precision.
  sports: Lisa Griffin, a disciplined swimmer who attends structured practice twice weekly at the community pool, competes in age‑group meets for the local Lakeside Swim Club, and hikes the Lake Jennings
    trails on weekends while cheering for the San Diego Wave Soccer team, shows how they blend competitive drive with outdoor exploration.
  arts: Lisa Griffin, whose creativity surfaces in intricate LEGO builds inspired by the kinetic sculptures of Nathan Sawaya and in composing Scratch game soundtracks set to the energetic violin riffs of
    Lindsey Stirling, shows how they blend tactile construction with musical imagination.
  travel: Lisa Griffin, who prefers meticulously planned family trips, enjoys weekend hikes around Lake Jennings, has visited the San Diego Air & Space Museum, dreams of exploring the Kennedy Space Center
    in Florida, and always drafts a checklist of activities before any vacation, highlighting how they balance curiosity with structured itineraries.
  culinary: Lisa Griffin, who favors predictable flavors, often measures out exact portions for homemade pizza topped with mozzarella, pepperoni, and oregano, enjoys a favorite snack of apple slices with
    peanut butter, and occasionally treats themselves to a bowl of spaghetti bolognese, showing how they apply the same precision to cooking as they do to puzzles.
  core: Lisa Griffin, a precision‑obsessed ten‑year‑old, treats daily tasks like chess openings—always planning several moves ahead—and sometimes skips spontaneous play because they prioritize structured
    challenges.
background:
  cultural: Lisa comes from a white, middle‑class family in Lakeside, a suburban community near San Diego. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, often incorporating family traditions like a holiday baking day and a community beach clean‑up. Growing up in Southern California, she enjoys the outdoors—beaches, hiking, and swimming are
    regular family activities. Her parents emphasize academic excellence and self‑discipline, encouraging participation in after‑school programs like robotics and sports. While her cultural roots are primarily
    Anglo‑American, the diverse environment of San Diego County exposes her to a variety of perspectives, fostering an open‑minded yet grounded worldview.
