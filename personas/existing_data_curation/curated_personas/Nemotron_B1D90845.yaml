  hobbies: '[''Chess'', ''Sudoku and logic puzzles'', ''LEGO building'', ''Coding with Scratch'', ''Science fair projects'', ''Swimming'', ''Hiking'', ''Reading science and space books'', ''Participating
    in math competitions'']'
  career_goals: Lisa dreams of turning her love for structure and problem solving into a future career in STEM. She aspires to become a software engineer, designing algorithms and interactive applications
    that solve real‑world challenges. Her fascination with space also fuels an ambition to become an astronaut or aerospace engineer, contributing to missions that explore the cosmos. In the longer term,
    she envisions leading a tech‑focused research team, earning scholarships for her academic achievements, and mentoring younger students in coding and robotics. Lisa is determined to maintain high academic
    standards throughout high school and college to reach these goals.
