  career_goals: Tiffany aspires to transition into a senior leadership role where she can shape enterprise-wide strategy, such as Director of Business Strategy or Chief Transformation Officer. She aims
    to obtain a PMP certification and pursue an executive MBA to deepen her strategic acumen. A long‑term ambition is to launch a consulting practice focused on helping midsize firms embed culturally responsive
    innovation and DEI principles into their operational frameworks. She also seeks to mentor and champion the advancement of Black women in analytics and management.
