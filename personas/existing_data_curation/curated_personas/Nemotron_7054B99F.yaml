personas:
  professional: Tiffany Lucear, a seasoned business strategist fluent in advanced Excel, SQL, Tableau, and predictive analytics, channels her curiosity and competitive drive into data‑driven strategic planning
    and bold process redesigns that balance rigorous efficiency with unconventional, creative solutions.
  sports: Tiffany Lucear, an avid supporter of the Indiana Pacers and the Fort Wayne TinCaps, combines her love for basketball season with early‑morning 5K runs in local parks, weekly yoga sessions, and
    occasional mixed‑doubles tennis at her neighborhood club.
  arts: Tiffany Lucear, a regular attendee of Fort Wayne’s art galleries and Civic Hall theater productions, fills her sketchbook with mixed‑media collages inspired by the bold colors of Alma Thomas, the
    narrative depth of Maya Angelou’s poetry, and the improvisational energy of Kamasi Washington’s jazz, while also leading community art workshops for youth.
  travel: Tiffany Lucear, who prefers curated experiences that blend culinary discovery with cultural immersion, has explored New Orleans for its Creole heritage, Kyoto for its tea ceremonies, Oaxaca for
    its vibrant markets, and she’s plotting a future trip to Savannah to trace the roots of Southern comfort cooking.
  culinary: Tiffany Lucear, an enthusiastic home chef who blends Southern comfort staples like collard greens and shrimp‑and‑grits with global twists such as miso‑infused butter and harissa‑spiced quinoa,
    routinely experiments with smoked paprika, fermented kimchi, and fresh basil, and has perfected a sweet‑potato pie with cardamom frosting that she serves at community potlucks.
  core: Tiffany Lucear merges data‑driven discipline with a love for mixed‑media collage, drives strategic change with a competitive spark, and habitually schedules creative R&R evenings where she cooks
    experimental dishes while scrolling through art blogs.
background:
  cultural: Tiffany is a second‑generation African‑American who grew up in the Midwest with deep ties to her family's Southern heritage. Her upbringing emphasized education, resilience, and community service,
    values that continue to shape her personal and professional life. She actively participates in the local Black cultural community, supporting Black artists, attending annual Juneteenth celebrations,
    and contributing to mentorship initiatives that empower Black youth in Fort Wayne. Her cultural identity informs her appreciation for African‑American art, music, and cuisine, and she weaves these influences
    into her creative pursuits and leadership philosophy.
