  hobbies: '[''Reading adventure and animal books'', ''Drawing and coloring'', ''Building LEGO models'', ''Solving puzzles'', ''Biking and outdoor exploration'', ''Nature walks and collecting natural items'',
    ''Helping with household chores'', ''Listening to music and dancing'', ''School art club'', ''School science club'']'
  career_goals: Linda dreams of a future where she can help others and explore the world. She often talks about becoming a veterinarian because she loves caring for animals, and she also imagines being
    a teacher who helps children learn. She is fascinated by space and science, so she sometimes says she would like to be an astronaut or a scientist who discovers new things. All of her aspirations reflect
    her compassionate nature, practical curiosity, and desire to make a positive impact on her community.
