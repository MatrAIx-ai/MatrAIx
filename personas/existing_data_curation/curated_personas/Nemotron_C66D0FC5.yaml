    ''helping friends with school projects'']'
  career_goals: Scott dreams of turning his love for art and nature into a career as a wildlife illustrator or a museum curator who creates interactive exhibits. He imagines designing murals and digital
    illustrations that spark curiosity in visitors of all ages. Over time, he hopes to lead community art projects that blend education and creativity, allowing him to share new ideas while fostering harmony
    and collaboration.
