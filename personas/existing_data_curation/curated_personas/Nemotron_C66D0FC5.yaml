personas:
  professional: Scott Breton, a ten‑year‑old budding urban designer, merges his love for sketching West Texas plains with elaborate LEGO city construction, and they bring a calm, collaborative spirit to
    school project teams despite a habitually cluttered desk.
  sports: Scott Breton, a ten‑year‑old active in the Lubbock Lone Star Soccer Club during the spring and a devoted fan of the Texas Tech Red Raiders football team, stays fit by biking around the Lubbock
    Lake Landmark, though they often skip a proper warm‑up before matches.
  arts: Scott Breton spends weekends sketching rolling mesquite‑dotted horizons after visits to the Buddy Holly Center, draws inspiration from the vibrant canvases of local folk artist Ruth Parker, and
    they unwind listening to a blend of Buddy Holly’s rock‑and‑roll classics, Chris Stapleton’s country ballads, and indie musician Mitski’s lyrical storytelling.
  travel: Scott Breton dreams of camping under the star‑filled skies of Big Bend, exploring the ancient limestone caves of Carlsbad, and taking weekend road trips to Santa Fe’s art galleries, favoring spontaneous,
    low‑cost adventures over meticulously planned vacations.
  culinary: Scott Breton delights in devouring smoky mesquite‑grilled brisket, cheesy chicken‑fried steak with buttery biscuits, and crunchy street‑taco al pasto, and they often try their hand at making
    homemade cinnamon‑sugar churros with a pinch of red‑pepper flakes for a daring twist.
  core: Scott Breton, a ten‑year‑old imaginative builder and calm collaborator, balances spontaneous LEGO city projects with a love for West Texas art, while occasionally letting disorganization slip into
    his daily routine.
background:
  cultural: Scott grew up in Lubbock, Texas, a city known for its blend of rural ranching heritage and vibrant arts community. His family embraces the Texan values of independence, hospitality, and respect
    for the outdoors, often spending weekends at nearby farms or community gatherings. The local culture, with its country music, western art, and community festivals, encourages a relaxed yet cooperative
    spirit. At school, emphasis on hands‑on learning and community service has reinforced his love for cooperative projects and appreciation for varied experiences. This environment has nurtured his curiosity,
    calm resilience, and openness to unconventional ideas, shaping a well‑rounded young individual who balances social interaction with quiet reflection.
