persona_description: A research psychologist who specializes in the study of sleep disorders and their impact on mental health, particularly among military personnel who have experienced combat. The researcher
  is interested in the relationship between pre-deployment insomnia symptoms and the development of new mental disorders after deployment, and is looking for ways to prevent or reduce the occurrence of
  PTSD, anxiety, and depression among service members. The researcher is also interested in the impact of short sleep duration on the development of mental disorders, and is seeking to develop and test
  preventive strategies for military personnel.
