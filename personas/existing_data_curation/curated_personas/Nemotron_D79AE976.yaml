personas:
  professional: A meticulous drafter, Omar Botero leverages AutoCAD, Revit, and SketchUp expertise together with bilingual communication to deliver precise construction drawings, while they infuse sustainable,
    culturally inspired design motifs and use brief mindfulness pauses to mitigate stress during tight deadlines.
  sports: An enthusiastic hiker, Omar Botero tackles the rugged trails of Great Falls Park on weekends, supports the Washington Capitals as a dedicated fan, and joins a local Ultimate Frisbee league where
    they blend cardio with camaraderie.
  arts: A devoted visual explorer, Omar Botero sketches urban skylines, frequents exhibitions featuring Ai Weiwei and local photographer Jane Smith at the Arlington Arts Center, and curates an Instagram
    feed that juxtaposes historic facades with contemporary street art, reflecting how they channel curiosity for unconventional aesthetics.
  travel: A meticulous planner, Omar Botero maps architecture‑focused journeys, having toured the colonial streets of Cartagena and the modernist precincts of Barcelona, while they budget wisely to fund
    an upcoming solo hike in the Canadian Rockies.
  culinary: A passionate home chef, Omar Botero masterfully prepares traditional empanadas, ají‑spiced sauces, and quinoa‑filled tamales for friends, blending fresh cilantro, lime, and locally sourced corn,
    while they occasionally unwind with sushi nights as a culinary indulgence.
  core: A detail‑driven, art‑obsessed architect‑in‑training, Omar Botero balances relentless curiosity with a habit of over‑thinking, channeling stress into late‑night cityscape sketches and strategic video‑game
    sessions while they occasionally succumb to coffee binges.
background:
  cultural: Born to Ecuadorian parents who moved to the United States, Omar grew up speaking Spanish at home while attending public schools in Maryland. His family celebrates traditional Ecuadorian festivals
    such as Carnaval and maintains culinary customs like preparing ceviche and hornado, which he continues to share with his social circle. This bicultural upbringing instills in him a deep appreciation
    for Latin American art, music, and community values, influencing his design sensibility towards incorporating vibrant colors, organic forms, and sustainable materials reminiscent of his heritage. While
    integrated into the diverse fabric of Gaithersburg, Omar remains connected to the Ecuadorian diaspora through local cultural events and bilingual community networks.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SketchUp'', ''Building Information Modeling (BIM)'', ''Construction drawing production'', ''Code compliance analysis'', ''Structural drafting'', ''3D rendering'', ''Technical
    illustration'', ''Bilingual communication (Spanish/English)'', ''Project coordination'', ''Problem solving under pressure'', ''Detail‑oriented documentation'', ''Time management'', ''Adaptability to
    unconventional design concepts'']'
  hobbies: '[''Sketching urban landscapes'', ''Visiting art galleries'', ''Photography of architectural subjects'', ''Hiking in Great Falls Park'', ''Cooking traditional Ecuadorian dishes'', ''Playing strategy
    video games'', ''Reading science fiction'', ''Attending design meetups'', ''Practicing yoga for stress relief'', ''Volunteering to teach drafting to youth'']'
  career_goals: Omar aims to transition from drafting to becoming a licensed architect with a focus on sustainable, culturally resonant design. He plans to earn an associate degree in architectural technology
    and subsequently pursue a bachelor's in architecture, targeting certifications such as Autodesk Certified Professional. In the next five years, he hopes to lead a design team on mixed‑use projects that
    blend modern construction methods with Ecuadorian architectural motifs, and eventually launch his own consultancy that offers bespoke drafting services and community‑focused design solutions in the
    Greater Washington area.
