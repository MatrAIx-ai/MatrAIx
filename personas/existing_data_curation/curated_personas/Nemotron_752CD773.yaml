personas:
  professional: Vincent Thomas, a budding visual storyteller, merges his knack for coding and sketching to create interactive comic strips, channeling his imaginative curiosity and collaborative spirit
    into playful digital narratives.
  sports: Vincent Thomas shoots hoops at the Nottingham community park with the Baltimore County Youth Basketball League, cheers for the Baltimore Ravens on Sundays, and follows the Orioles' spring training,
    balancing casual play with a love for team spirit.
  arts: Vincent Thomas devotes weekends to sketching characters inspired by Studio Ghibli's Hayao Miyazaki while listening to Miles Davis's "Kind of Blue" and Kendrick Lamar's lyricism, and collects graphic
    novels by Brian K. Vaughan, letting the music and stories fuel his creative sessions.
  travel: Vincent Thomas loves family road trips to historic sites like Washington D.C.'s National Mall and Boston's Freedom Trail, and dreams of a future adventure to London's Camden Market and Kyoto,
    Japan, preferring itineraries that blend cultural museums with interactive art installations.
  culinary: Vincent Thomas enjoys the comfort of homemade collard greens seasoned with smoked paprika, sweet potato pie, and cornbread, but when at home experiments with crafting a simple ramen broth, proudly
    claiming the title of "kid chef" while still debating whether to add extra hot sauce.
  core: Vincent Thomas is a curious, compassionate twelve‑year‑old who turns imagination into digital art and code, balances school responsibilities with creative play, and navigates life with a steady
    mix of organization, spontaneity, and a knack for turning everyday moments into stories.
background:
  cultural: Vincent is a second‑generation African‑American growing up in Nottingham, a suburb of Baltimore County. His family maintains strong ties to the local Black community, attending church services
    that feature gospel music and storytelling traditions. He often celebrates cultural events such as Juneteenth and the Baltimore Afro‑American Festival, where he is exposed to a rich tapestry of music,
    dance, and visual art. Family meals often feature soul food dishes that connect him to his heritage, and his parents encourage pride in African‑American history, sharing stories of figures like Thurgood
    Marshall and Katta Berry. This cultural milieu nurtures his compassion, collaborative spirit, and his desire to use art as a bridge between different experiences.
attributes:
  skills: '["hand sketching", "digital illustration (Procreate)", "creative writing", "basic programming (Scratch)", "puzzle solving", "peer mentorship", "collaborative project coordination", "visual storytelling"]'
  hobbies: '["sketching", "digital illustration", "reading sci-fi/fantasy", "building LEGO models", "playing Minecraft", "participating in school art club", "coding with Scratch", "peer mentoring", "listening
    to jazz and hip-hop", "playing basketball"]'
  career_goals: He dreams of turning his love for art and storytelling into a career as a children's book illustrator and multimedia creator. Vincent plans to attend a high‑school arts program, study graphic
    design and animation in college, and eventually produce illustrated books and interactive digital experiences that spark curiosity in other kids. He also wants to use his artistic talents to run community
    workshops, teaching under‑served youth how to express themselves through drawing and simple coding. Long‑term, he envisions a role that blends creativity with social impact, such as an art therapist
    or creative educator.
