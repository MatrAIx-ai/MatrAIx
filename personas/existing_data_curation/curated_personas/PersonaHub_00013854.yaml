persona_description: Sarah Garlick, PI of the PES @ LTERs project, is a science communicator and public engagement expert with a strong background in long-term ecological research. She has a track record
  of successfully integrating public engagement with science into research programs and has a keen interest in investigating public engagement with science as a transformative force on the cultures, practices,
  and institutions of science. She is an advocate for science communication, public engagement, and policy integration, and is committed to pushing these fields forward and addressing important questions
  related to science engagement.
