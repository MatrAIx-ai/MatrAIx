  hobbies: '[''Visiting art museums and galleries'', ''Attending live music and theater performances'', ''Walking and nature clubs'', ''Knitting and quilting'', ''Photography'', ''Genealogy and local history
    research'', ''Cooking and trying new recipes'', ''Volunteering as a community theatre docent'', ''Participating in senior group activities and workshops'']'
  career_goals: Although retired from formal employment, Jeanette aims to expand her impact on the local arts and senior community. She aspires to lead an intergenerational art program at the Minneapolis
    Public Library, mentor younger volunteers in event planning, and eventually author a memoir that weaves personal history with the cultural evolution of Anoka County. She also hopes to advocate for increased
    accessibility to cultural venues for older adults and to secure a small grant to fund traveling art tours for seniors.
