  career_goals: Tyler aims to advance into instructional leadership within the next five years, seeking a role as a department head or curriculum coordinator where he can shape school‑wide learning pathways.
    He plans to pursue a master’s degree in education leadership, with a focus on Social‑Emotional Learning (SEL) program development, leveraging his own experience with anxiety to create supportive environments
    for students. Additionally, he hopes to design and publish a series of online resources for teachers seeking practical, research‑based strategies that blend creativity with reliability. While pursuing
    these ambitions, he values maintaining a balanced schedule that preserves his need for quiet, reflective time.
