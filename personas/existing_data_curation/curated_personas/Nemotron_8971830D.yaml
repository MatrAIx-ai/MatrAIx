personas:
  professional: Cornelius Tarantola is a seasoned occupational health and safety specialist who leverages meticulous risk assessments, ergonomic expertise, and calm crisis response to keep a Midwest manufacturing
    plant compliant and its workers protected, and they apply a routine‑driven, methodical approach to every audit.
  sports: Cornelius Tarantola runs three miles each sunrise with the Dayton Road Runners, spends weekend afternoons fishing the Great Miami River, and fills the bleachers each Friday night cheering on the
    West Dayton Warriors high‑school football team while they remain a loyal fan of the Cincinnati Bengals.
  arts: Cornelius Tarantola finds artistic inspiration in classic rock legends like Bruce Springsteen, Johnny Cash, and The Rolling Stones, regularly flips through vintage car magazines for design cues,
    and occasionally attends community theater productions of classic American plays, which they cite as a relaxing counterpoint to their data‑driven work.
  travel: Cornelius Tarantola prefers meticulously planned road trips, has already driven historic Route 66 from Illinois to California, explored Nashville’s music scene, and now dreams of trekking the
    Great Smoky Mountains to combine hiking and fishing, all while they use a spreadsheet to budget each leg of the journey.
  culinary: Cornelius Tarantola enjoys cooking hearty family meals such as beef stew with root vegetables, smoked brisket seasoned with smoked paprika and garlic, and classic chicken pot pie, boasting a
    moderate cooking skill level that shines during weekend gatherings around the backyard fire pit, and they always finish the meal with a slice of homemade apple crisp.
  core: Cornelius Tarantola is a routine‑driven safety professional who balances calm resilience with a love for classic‑car restoration, DIY projects, and hearty meals, while they quietly manage a disciplined
    financial life and occasionally procrastinate on paperwork.
background:
  cultural: 'Cornelius grew up in a middle‑class, predominantly white, Midwestern community in southwestern Ohio. His family heritage blends German and Italian roots, reflected in family traditions such
    as holiday baked goods and a strong work ethic. He embraces the practical, no‑nonsense values typical of the region: punctuality, reliability, and a respect for established customs. Religion and community
    are important; he and his wife are active members of their local Protestant church, participating in service projects and seasonal celebrations. The culture of Butler County, with its emphasis on family,
    small‑town camaraderie, and pride in local industry, shapes his identity and informs his commitment to safety, stewardship, and steady, incremental progress.'
