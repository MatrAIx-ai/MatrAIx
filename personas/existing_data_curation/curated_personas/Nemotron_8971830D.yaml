  career_goals: Cornelius aims to attain Certified Safety Professional (CSP) status within the next two years and leverage that credential to advance into a senior safety manager role at a larger manufacturing
    facility in the Midwest. He is focused on building a proactive safety culture that integrates continuous improvement and employee involvement. Long‑term, he envisions establishing his own consultancy
    to help small Midwest firms implement practical, cost‑effective safety programs. He also hopes to mentor junior technicians, contribute to community safety education initiatives, and maintain a balanced
    work‑life schedule that supports his family and personal well‑being.
