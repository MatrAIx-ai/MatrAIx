  hobbies: '["drawing and sketching", "digital painting (Procreate, Photoshop)", "creating comic strips and storyboards", "reading sci‑fi and fantasy literature", "creative writing (short stories, poetry)",
    "playing chess at the youth club", "listening to jazz, soul, and hip‑hop", "volunteering at the community center art program"]'
  career_goals: Helen aspires to blend her love for art, storytelling, and technology into a career as a visual communicator. She hopes to attend a specialized arts high school or a college program that
    emphasizes graphic design and illustration, eventually working as a concept artist for video games, a graphic novelist, or a multimedia designer for community cultural projects. Helen also dreams of
    using her skills to mentor younger kids in her neighborhood, perhaps by leading art workshops at the local community center or library, thereby giving back to her community while pursuing her creative
    ambitions.
