personas:
  professional: Helen Thomas, an aspiring comic artist and narrative illustrator, channels their vivid imagination into detailed sketchbooks and digital panels while they volunteer at the Muskegon community
    center’s after‑school art program, balancing creative ambition with disciplined planning.
  sports: Helen Thomas, an active member of the local youth skate club who practices freestyle skating at the Muskegon skate park each Saturday, follows the Muskegon Lumberjacks hockey team and the Michigan
    State Spartans women's basketball, and they integrate three weekly 30‑minute jogs to stay fit while balancing a love for chess.
  arts: Helen Thomas, a dedicated doodler who spends after‑school hours sketching speculative‑fiction characters inspired by Jim Lee’s dynamic panels and Hayao Miyazaki’s whimsical worlds, curates playlists
    featuring Miles Davis, Erykah Badu, and Kendrick Lamar to fuel their creative flow, and they regularly contribute comics to the Muskegon community center art program, drawing on influences from Neil Gaiman’s
    narrative depth and Amanda Gorman’s lyrical poetry.
  travel: Helen Thomas, who plans weekend getaways with meticulously organized spreadsheets of bus schedules and budgets, enjoys day trips to the Great Lakes shoreline and annual family visits to Chicago’s
    Museum of Contemporary Art, while they dream of a future backpacking adventure through Kyoto’s historic shrines and Iceland’s surreal Golden Circle.
  culinary: Helen Thomas, an amateur cook who loves experimenting with vibrant dishes like homemade ramen topped with miso‑glazed tofu, avocado toast sprinkled with feta and chili flakes, and blueberry
    muffins infused with lemon zest, often swaps snack money for fresh ingredients at the local farmer’s market and they relish trying new flavors such as kimchi and Ethiopian injera when dining out with
    friends.
  core: Helen Thomas, a methodical daydreamer who fuses speculative‑fiction storytelling with disciplined sketch routines, balances a love for chess, jazz, and community art volunteering, and they occasionally
    procrastinate on school assignments while snacking on late‑night cereal.
background:
  cultural: Helen identifies as Black and grew up in a supportive African‑American family within Muskegon’s vibrant community. She participates in local cultural events such as Juneteenth celebrations and
    church gatherings that emphasize music, storytelling, and communal art. Helen draws inspiration from Black artists and writers, citing figures like Kara Walker, Ta-Nehisi Coates, and contemporary graphic
    novelists as role models. She values the traditions of oral history and community activism passed down through her family, which influence her desire to create artwork that reflects her heritage and
    promotes cultural pride.
attributes:
  skills: '["digital illustration (Procreate, Adobe Photoshop)", "watercolor and sketch drawing", "creative writing and storyboarding", "research and information synthesis", "project planning and time management",
