  career_goals: Though retired, Adrian aims to leave a lasting creative and cultural imprint. He wishes to complete a portfolio of paintings and hold a modest exhibition at a local community center, using
    the show to raise funds for a senior‑focused garden project. He aspires to write and self‑publish a memoir that weaves his family’s migration story with reflections on Miami’s evolving Black and Afro‑Caribbean
    neighborhoods. Mentoring younger artists through a weekly art‑club at the senior center and creating a digital archive of oral histories from longtime residents are also central to his aspirations.
