personas:
  professional: Adrian Robinson, a retired Miami handyman‑artist, merges his self‑taught oil painting, digital photography, and practical home‑maintenance skills to mentor local youth through weekly art
    workshops while curating a sunrise‑themed exhibition that will fund a senior‑oriented garden project.
  sports: Adrian Robinson follows the Miami Heat and the Florida Panthers, plays in a senior‑friendly pickleball league at the community center, jogs along the Rickenbacker Causeway each sunrise, and joins
    a local gardening club that doubles as a walking group in cooler months.
  arts: Adrian Robinson immerses himself in the sounds of Miles Davis and Nina Simone while painting, frequently studies the works of Claude Monet and Jacob Lawrence, curates a small collection of Afro‑Caribbean
    folk art for his studio, and attends monthly gallery openings at the Pérez Art Museum Miami.
  travel: Adrian Robinson prefers intentional, slow‑travel trips that blend cultural immersion with relaxation, having explored the historic streets of New Orleans, the botanical gardens of Santo Domingo,
    and the jazz clubs of Paris, while planning a future visit to the coastal villages of Belize to photograph sunrise over the Caribbean sea.
  culinary: Adrian Robinson enjoys experimenting with Southern collard greens seasoned with allspice, citrus‑marinated snapper, and plantain‑based mofongo, cooks at a confident medium level using fresh
    herbs from his garden, and treats himself to occasional dinner at a local soul‑food‑caribbean fusion restaurant.
  core: Adrian Robinson is a solitary yet community‑minded creator who balances meticulous garden‑care with spontaneous sunrise paintings, carefully budgets his retirement funds, and steadfastly manages
    his hypertension through disciplined routines.
background:
  cultural: Adrian is an African‑American who grew up in a working‑class family in South Florida, rooted in the traditions of the Deep South his grandparents brought with them during the Great Migration.
    Living in Miami for most of his adult life, he has been shaped by the city’s rich Afro‑Caribbean and Latino tapestry, absorbing rhythms of salsa, reggae, and gospel. He is an active member of his local
    Baptist church, where community service and choir singing are vital. His cultural identity blends Southern Black culinary heritage with Miami’s tropical flavors, and he takes pride in preserving the
    oral histories of his neighborhood’s longtime Black and Afro‑Caribbean residents.
