  career_goals: At 61, Isaac aims to transition from a front‑line sales role to a supervisory position that allows him to mentor younger associates while maintaining a predictable work routine. He hopes
    to secure a part‑time shift‑lead or floor‑manager role that provides steady income for retirement savings and offers enough flexibility to pursue his personal interests. Additionally, Isaac is interested
    in consulting for small, family‑owned stores in the area, offering his bilingual customer‑service expertise and practical store‑layout advice. He also wishes to give back to the local Dominican community
    by organizing occasional cultural pop‑up events within the store, blending his professional experience with his heritage.
