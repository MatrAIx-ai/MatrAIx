    curation for retail environments'']'
  hobbies: '[''Visiting museums and galleries (especially Mexican art)'', ''Watercolor painting'', ''Landscape photography'', ''Gardening (heirloom tomatoes, chilies, herbs)'', ''Cooking traditional Mexican
