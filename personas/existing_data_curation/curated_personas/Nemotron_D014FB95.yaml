personas:
  professional: An aspiring computer hardware tinkerer named Daniel Paquette, a 15‑year‑old high‑school sophomore, blends a practical curiosity for building custom PCs with disciplined schoolwork and a
    competitive streak from video‑gaming, and they aim to channel that blend into a future career in software engineering or esports technology.
  sports: Daniel Paquette is a point‑guard‑type player on his Louisiana high‑school basketball team, a devoted fan of the New Orleans Pelicans, and they spend weekends fishing at Lake D’Arbonne and joining
    family hunting trips, combining urban court tactics with rustic outdoor stamina.
  arts: Daniel Paquette dabbles on acoustic guitar while devouring sci‑fi novels by Andy Weir and listening to the soaring soundtracks of The Witcher series, often quoting lines from Star Wars and they
    attend youth‑group worship sessions that feature contemporary Christian artists like Lauren Daigle.
  travel: Daniel Paquette favors spontaneous weekend road trips to the Ouachita National Forest for camping and fishing, has visited New Orleans for a cultural festival, and they dream of backpacking through
    the Grand Canyon’s South Rim after graduation.
  culinary: Daniel Paquette’s palate swings between greasy pepperoni pizza, Cajun‑spiced catfish fillets, and quick‑fire nachos loaded with jalapeños, and they can whip up a one‑pot chili for their hunting
    buddies, though they often forget to refrigerate leftovers.
  core: Daniel Paquette is a competitive 15‑year‑old tech tinkerer who blends basketball, gaming, and outdoor adventures with a disciplined yet skeptical approach to money and health, and they are peppered
    by a penchant for late‑night gaming marathons.
background:
  cultural: Daniel grew up in Ruston, Louisiana, a small city in Lincoln Parish with a strong Southern Baptist influence and a touch of nearby Cajun culture. His family celebrates traditional Southern holidays
    with barbecue, fried catfish, and jambalaya, and they attend weekly church services that emphasize community, responsibility, and self‑reliance. He regularly watches and supports local high‑school football
    games, participates in community festivals like the Ruston Lions Club Christmas parade, and values the practical skills and close‑knit relationships typical of rural Southern life. This cultural backdrop
    shapes his balanced outlook—mixing curiosity for new ideas with a pragmatic, responsible approach to school, work, and personal growth.
attributes:
  skills: '[''Basic computer literacy (Windows, Google Suite, troubleshooting)'', ''Introductory Python programming'', ''Mechanical aptitude: bicycle and small engine maintenance'', ''Model building (LEGO,
    RC kits)'', ''Clear written and verbal communication'', ''Strategic thinking from competitive gaming'']'
  hobbies: '[''Basketball (school and pickup games)'', ''Fishing at local lakes'', ''Video gaming (FPS and strategy)'', ''Custom PC building and hardware troubleshooting'', ''Introductory coding projects'',
    ''Reading science‑fiction and adventure novels'', ''Playing acoustic guitar'', ''Church youth group and community service'']'
  career_goals: Daniel aims to earn his high‑school diploma or GED by the age of 17 and then enroll in a community‑college program in automotive technology or information technology. He plans to acquire
    ASE certification for automotive repair or a CompTIA A+ certification for IT support, targeting a role at a local dealership or a tech repair shop. In the longer term, he dreams of launching his own
    small business building custom PCs and offering freelance tech support for friends and neighbors. His competitive nature drives him to be top of his class and possibly join a robotics or coding club
    that could lead to scholarship opportunities, balancing his curiosity with a practical career path.
