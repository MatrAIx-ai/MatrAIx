personas:
  professional: Y Cheng, a 51‑year‑old facilities specialist with expertise in commercial cleaning, OSHA compliance, and bilingual client relations, leverages their curiosity about art and talkative confidence
    to champion eco‑friendly upkeep in museums while competitively seeking supervisory roles.
  sports: Y Cheng, a fan of the Los Angeles Lakers and Dodgers, jogs the Griffith Park trails three times a week, participates in a weekend tai chi group at the senior center, and uses a competitive spirit
    to track personal mileage on Strava, though occasional knee soreness sometimes curtails their routine.
  arts: Y Cheng, an avid visitor of LACMA and The Broad, draws inspiration from Ai Weiwei’s installations and Kehinde Wiley’s portraits, regularly sings karaoke to Mandarin pop star Jay Chou and indie band
    Vampire Weekend, and spends evenings curating street‑photography portfolios that capture the city’s vibrant murals.
  travel: Y Cheng prefers meticulously planned weekend getaways, having explored Kyoto’s historic temples, spent a week in Oaxaca sampling mezcal, and frequently revisits Santa Barbara’s coastal trails,
    while dreaming of a future solo road trip along the Pacific Coast Highway to experience the region’s diverse art scenes.
  culinary: Y Cheng, a proficient home cook, often prepares traditional Peking duck with hoisin sauce, experiments with mapo tofu spiced by Sichuan peppercorns, and fuses flavors by creating bao‑burger
    sliders topped with kimchi, showcasing both reverence for family recipes and a penchant for culinary innovation.
  core: Y Cheng blends an exacting clean‑room mindset and vibrant enthusiasm for the arts to navigate life, yet their competitive edge and chronic worry often fuel impulsive late‑night karaoke sessions
    and an ever‑growing collection of cleaning gadgets.
background:
  cultural: Y is a first‑generation American of East Asian descent, with family roots in China. Raised in a bilingual household in Los Angeles, she grew up speaking Mandarin at home while navigating English‑dominant
    schools and workplaces. Her upbringing emphasized respect for elders, hard work, and community solidarity, which she honors by celebrating Chinese New Year, Mid‑Autumn Festival, and participating in
    Chinatown's cultural events. The immigrant experience shaped her resilient, independent outlook, while her daily life blends traditional customs—such as cooking family recipes and observing festivals—with
    the multicultural fabric of Los Angeles. This bicultural identity fuels her curiosity about varied experiences and informs her sociable, yet sometimes skeptical, interactions.
