  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Karaoke with friends'', ''Cooking traditional Chinese dishes'', ''Reading art and history books'', ''Community volunteering
    (cleaning and event support)'', ''Attending cultural festivals (Lunar New Year, Mid‑Autumn)'', ''Listening to music (Mandarin pop, indie)'', ''Learning new cleaning technologies (green cleaning)'',
    ''Practicing mindfulness meditation'']'
  career_goals: Y aims to move from frontline janitorial work to a supervisory or facilities‑management role within the next five years, targeting positions at cultural institutions where she can blend
    her cleaning expertise with her love of art. She plans to earn OSHA and green‑cleaning certifications, complete a GED, and take community‑college courses in art history and facility management. In the
    longer term, she hopes to launch a small eco‑friendly cleaning business that serves local galleries, community centers, and small businesses, while also mentoring other immigrant workers and advocating
    for fair labor practices.
