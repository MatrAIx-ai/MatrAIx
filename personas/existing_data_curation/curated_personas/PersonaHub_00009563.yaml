persona_description: A paleontologist who specializes in the study of the evolution and distribution of ancient animal species, particularly those that lived during the carboniferous era. Their research
  interests include the identification and analysis of fossils, the understanding of climatic conditions during that era, and the comparison of these species with modern animals. They are particularly interested
  in the discovery of mammoth bones and shells in the Siberian tundra and the analysis of the fossils they find.
