  hobbies: '[''Abstract watercolor painting'', ''Sketching vehicle designs'', ''Digital photography'', ''Restoring classic motorcycles'', ''Attending gallery openings'', ''Community art workshops'', ''Tai
    Chi'', ''Fusion cooking'', ''Reading speculative fiction'', ''Philosophy study'']'
  career_goals: Chong aims to move into a supervisory role within the cleaning department, leading a team while implementing environmentally sustainable cleaning practices. He plans to obtain certification
    in green cleaning technologies and eventually start his own mobile eco-detailing business that combines his technical skill with artistic customization of vehicle interiors. Additionally, he intends
    to complete a bachelor's degree in environmental studies to deepen his expertise in sustainable operations.
