  hobbies: '[''Hiking in the White Mountains'', ''Cross‑country skiing'', ''Fishing in local lakes'', ''Woodworking'', ''Home‑brewing craft beer'', ''Reading historical nonfiction'', ''Attending community
    theater'', ''Volunteering with emergency‑response volunteer group'', ''Landscape photography'', ''Cooking New England seafood dishes'']'
  career_goals: Joe aims to leverage his reliability and leadership potential to move into a senior cabin crew lead position within the next three years, where he can shape crew scheduling and operational
    standards. He plans to complete a bachelor’s degree in Aviation Management to qualify for an airline operations or training manager role. Additionally, he hopes to become a certified flight safety instructor,
    mentor new flight attendants, and actively participate in union leadership to advocate for crew welfare and schedule predictability.
