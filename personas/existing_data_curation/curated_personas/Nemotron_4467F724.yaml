personas:
  professional: Frank Stumpf, a senior aerospace systems engineer with two decades of expertise in CFD, propulsion analysis, and high‑fidelity CAD, channels their methodical, organized nature into leading
    multidisciplinary design teams while mentoring junior engineers with clear, cooperative guidance.
  sports: Frank Stumpf tackles fitness through weekend trail runs with the Denver Mountaineering Club, occasional indoor rock‑climbing sessions, avidly supports the Colorado Avalanche and Denver Broncos,
    and they keep a casual softball league membership to stay socially active while respecting their solitary preference.
  arts: Frank Stumpf nurtures a quiet creative side by photographing mountain vistas inspired by Ansel Adams, immersing in classic sci‑fi novels by Isaac Asimov, listening to progressive rock icons like
    Pink Floyd and modern orchestral composer Hans Zimmer, and attending occasional local gallery openings.
  travel: Frank Stumpf plans travel with meticulous spreadsheets, favoring a blend of adventure and relaxation, such as weekend road trips to Rocky Mountain National Park, a recent stargazing expedition
    to Chile’s Atacama Desert, and future aspirations to explore Iceland’s volcanic landscapes and the Japanese Alps for both photography and model‑rocket inspiration.
  culinary: Frank Stumpf enjoys crafting seasonal craft beers with locally sourced hops and barley, cooks hearty Colorado dishes like bison chili and elk steak while experimenting with pumpkin‑infused malt
    for autumn brews, and their go‑to home‑cooking skill level sits between competent home chef and enthusiastic hobbyist.
  core: Frank Stumpf marries a methodical aerospace mind with a solitary love of mountain trails, model rockets, and home‑brewed experiments, often juggling spreadsheets, puzzle books, and a habit of double‑checking
    every checklist before bedtime.
background:
  cultural: Frank grew up in a middle‑class family in the Front Range region of Colorado, where a culture of individual responsibility, outdoor recreation, and community involvement shaped his outlook.
    His parents encouraged a practical approach to learning, valuing education and hands‑on problem solving, which led him to pursue a STEM degree at a state university. While his ethnic background is white,
    his cultural identity is woven from broader American values of self‑reliance and collaborative spirit, tempered by the regional ethos of respect for the natural environment. He participates in local
    volunteer efforts, such as STEM outreach programs for high‑school students, and celebrates regional traditions like the Denver County Fair and the annual Colorado Rockies baseball season, reflecting
    a grounded yet open‑minded cultural perspective.
attributes:
  skills: '["Computational fluid dynamics (CFD)", "Propulsion system design and analysis", "Finite element analysis (FEA) of structural components", "CAD modeling (SolidWorks, CATIA)", "MATLAB programming
