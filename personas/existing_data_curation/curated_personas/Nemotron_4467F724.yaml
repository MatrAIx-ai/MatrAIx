    documentation and compliance reporting", "Mentoring and team collaboration"]'
  hobbies: '["Hiking and mountain trail exploration", "Landscape and night‑sky photography", "Model rocketry design and launch", "Amateur astronomy (telescope observing)", "Reading (science‑fiction and
    aerospace journals)", "Homebrewing craft beer", "Puzzle solving (crosswords, sudoku, logic puzzles)"]'
  career_goals: Frank’s career ambition is to move from individual technical contributions to leading multidisciplinary design teams focused on next‑generation reusable launch vehicles and low‑emission
    propulsion technologies. He plans to obtain his Professional Engineer (PE) license and pursue a part‑time master’s degree in aerospace systems to deepen his expertise in sustainability. Over the next
    five years he envisions stepping into a senior systems engineer role, influencing industry standards through technical papers and conference presentations, and eventually becoming a program manager
    overseeing the full lifecycle of complex aerospace projects. While driven, he values work‑life integration, ensuring time for his personal interests and community involvement.
