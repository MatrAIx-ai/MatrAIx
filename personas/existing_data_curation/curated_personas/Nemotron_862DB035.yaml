personas:
  professional: Rosa Lujan, a budding two‑year‑old scientist‑in‑training, mixes inquisitive play with pragmatic problem‑solving as they experiment with building blocks, measure water flow with toy cups,
    and keep a loosely organized scrapbook of their findings.
  sports: Rosa Lujan, a curious two‑year‑old who loves crawling through the sandbox, joins a weekday toddler soccer group at the community center and proudly waves a tiny New York Yankees cap while they
    splash in the kiddie pool, embodying a playful, flexible approach to fitness.
  arts: Rosa Lujan, a bright‑eyed two‑year‑old who bursts into spontaneous dance to The Wiggles' songs, clutches a plush dinosaur while flipping through Eric Carle's 'The Very Hungry Caterpillar', and produces
    vivid crayon murals that reflect a natural curiosity blended with a love for familiar, repetitive melodies.
  travel: Rosa Lujan, an adventurous two‑year‑old who prefers spontaneous, short car trips to the nearby zoo or the bright lights of Disneyland over meticulously planned overseas vacations, yet eagerly
    points at maps of the Grand Canyon, dreaming of future family road trips.
  culinary: Rosa Lujan, a picky‑but‑curious two‑year‑old who delights in creamy mac and cheese, giggles while helping stir batter for banana pancakes, prefers bright orange sweet‑potato fries, and stubbornly
    refuses peas, reflecting both a love for familiar comfort foods and a playful willingness to explore new textures.
  core: Rosa Lujan, a two‑year‑old whose boundless curiosity mixes with a laid‑back, spontaneously organized temperament, turns every everyday moment into a mini‑experiment while occasionally forgetting
    to tidy up the crayons.
background:
  cultural: Rosa grows up in a Mexican‑American household in Longview, Texas, where Spanish and English intertwine in daily life. Family gatherings feature traditional dishes like tacos and tamales, and
    celebrations of holidays such as Día de los Muertos and Cinco de Mayo. Mexican music, lullabies, and cultural stories are part of her routine, fostering a strong sense of heritage while also integrating
    into the broader Texan community.
