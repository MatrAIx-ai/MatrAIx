persona_description: A scientist who specializes in the study of the Moon’s formation and its water content. They have expertise in analyzing chemical analyses of lunar samples collected during the Apollo
  missions, and have discovered new clues about how water originated and was redistributed on the Moon. Their findings could give experts a new tool to help unravel the processes that were involved in the
  Moon’s formation, as well as how the lunar crust cooled and the impact history of its surface.
