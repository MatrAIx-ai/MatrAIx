  hobbies: '[''Watercolor painting'', ''Sketching'', ''Nature photography'', ''Reading art history'', ''Literary fiction'', ''Journaling'', ''Hiking'', ''Birdwatching'', ''Knitting'', ''Listening to indie
    folk music'', ''Visiting local museums'', ''Attending community art workshops'']'
  career_goals: She intends to pursue a master's degree in education with a focus on art integration, aiming to transition from bus monitoring to a classroom teaching role where she can design interdisciplinary
    curricula that blend visual arts with core subjects. In the medium term, she hopes to obtain a commercial driver’s license and become a certified school bus driver, leveraging her experience to mentor
    new monitors. Long‑term, she aspires to become a curriculum specialist or community arts coordinator, bringing innovative, student‑centered art programs to rural schools in Texas and fostering partnerships
    with local cultural institutions.
