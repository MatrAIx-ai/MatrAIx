personas:
  professional: Moore Stepney, a detail-oriented dietetic and ophthalmic medical technician, applies their analytical mindset and competitive drive to streamline nutrition assessments and ocular screenings,
    constantly questioning protocols to boost clinic efficiency.
  sports: Moore Stepney rides the Fox River Trail each dawn as a member of the Fox River Cyclists Club, tracks mileage on a Garmin, and roots for the Chicago Bears and Chicago Bulls while occasionally joining
    a local pick-up basketball game with a small group of friends.
  arts: Moore Stepney's evenings are filled with the sounds of Miles Davis, John Coltrane, and B.B. King spinning on a vinyl turntable, while their bookshelf holds dystopian sci-fi staples like Margaret
    Atwood's The Handmaid’s Tale and Octavia Butler’s Parable of the Sower, reflecting a blend of analytical curiosity and soulful nostalgia.
  travel: Moore Stepney prefers low-key road trips that combine culinary stops—such as a farm-to-table dinner in Madison, Wisconsin—and occasional city breaks, having explored New Orleans for its jazz scene,
    a weekend in Austin for BBQ, and dreaming of a culinary pilgrimage to Kyoto to study traditional fermentation.
  culinary: Moore Stepney experiments in the kitchen by fusing Southern soul-food staples—like smoked collard greens and shrimp-and-grits—with Midwestern harvests, regularly preparing dishes such as cornbread-crusted
    pork chops with heirloom tomato relish, and mastering the use of smoked paprika, buttermilk, and locally sourced sweet potatoes.
  core: Moore Stepney is a competitive, detail-driven health technician who channels a love of solitary craftsmanship into woodworking, early-morning cycling, and experimental cooking, while juggling a
    disciplined yet occasionally lax financial routine and a quiet, skeptical outlook on life.
background:
  cultural: Moore grew up in a close-knit African-American family in the Midwest, rooted in church community and a tradition of resilience and service. His upbringing emphasized practical self-reliance,
    respect for education, and a strong sense of communal responsibility. Cultural food traditions—soul-food staples like collard greens, fried fish, and cornbread—remain central to his cooking, now adapted
    with locally sourced produce from Illinois farms. He draws inspiration from historic Black healthcare pioneers and values mentorship, often sharing his knowledge with younger members of his community.
    While embracing Midwestern modesty, he proudly celebrates his Black heritage through music, cuisine, and ongoing community involvement.
attributes:
  skills: '["Clinical Nutrition Assessment","Personalized Dietary Counseling","Health Education Program Development","Digital Fundus Photography","Visual Acuity and Refraction Assistance","Basic OCT and
    Visual Field Testing","Medical Equipment Calibration and Maintenance","Electronic Health Record Management","Quality Control and Compliance","Data Analysis Linking Nutrition and Ocular Health"]'
  hobbies: '["Woodworking","Cycling the Fox River Trail","Cooking Southern-Midwest fusion dishes","Reading science-fiction (dystopian) novels","Listening to jazz and blues music","Volunteering at community
    health fairs"]'
  career_goals: Moore aims to earn Certified Clinical Nutritionist (CCN) and Certified Ophthalmic Assistant (COA) credentials within the next two years, positioning himself for a supervisory role in a multidisciplinary
    vision-and-nutrition clinic. He wants to design integrated health-education programs that demonstrate how diet influences eye health, especially for underserved patients in rural Illinois. Over the
    longer term he plans to open a boutique consulting practice that blends nutrition counseling with ocular screening services, while continuing his education toward a bachelor's degree in nutrition or
    public health. His competitive drive pushes him to become a recognized expert who can influence practice standards and improve patient outcomes.
