persona_description: A social worker who specializes in juvenile delinquency, particularly in the area of preadjudication detention. This person is likely to be interested in the use of detention as a punishment,
  protection, and as a place to keep juveniles when more appropriate placements are unavailable, as well as the negative effects of being in detention and the overcrowded conditions in many detention centers.
  This person is likely to be knowledgeable about the use of detention for various reasons, including to ensure that a juvenile will show up for his or her hearing and to prevent reoffending prior to adjudication,
  as well as the negative effects of being in detention and the overcrowded conditions in many detention centers. This person is likely to be interested in the evaluation of alternatives to detention programs,
  as well as the use of detention for various reasons, and the negative effects of being in detention and the overcrowded conditions in many detention centers.
