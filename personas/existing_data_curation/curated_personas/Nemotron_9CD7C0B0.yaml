  career_goals: Magaly aspires to attend a university in California where she can study education or public health, aiming to become a bilingual elementary school teacher or community health advocate. She
    wants to combine her love for learning with practical service, helping younger students and families bridge language gaps. In the longer term, she also dreams of creating culturally‑focused social‑media
    content that celebrates Mexican heritage and promotes community wellness.
