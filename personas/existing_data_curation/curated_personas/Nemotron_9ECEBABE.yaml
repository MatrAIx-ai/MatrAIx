    a local range'', ''Cooking healthy meals'', ''DIY electronics and medical equipment tinkering'', ''Jogging for stress relief'']'
  career_goals: At this stage, Nicholas aims to transition from front‑line response to a leadership and mentorship role within the EMS community. He seeks certification as an EMS Training Officer to develop
    high‑fidelity simulation programs for paramedic continuing education in Orange County. Long‑term, he aspires to become an EMS Operations Manager, overseeing protocol development and advocating for mental‑health
    resources for first‑responders. He also hopes to obtain a Flight Paramedic certification to broaden his expertise and contribute to disaster‑response planning at the regional level.
