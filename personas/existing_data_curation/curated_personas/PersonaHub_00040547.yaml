persona_description: A person who is interested in sustainable agriculture and environmental impacts of livestock production. They are familiar with the GLEAM project and its focus on quantifying greenhouse
  gas emissions related to livestock sector supply chains. They are also aware of the current version of GLEAM and its future versions that will include other environmental impacts such as nutrient and
  water use or interactions with biodiversity. They are interested in the data generated by GLEAM for 11 commodities including meat and milk from cattle, sheep, goats, and buffaloes, meat from pigs, and
  meat and eggs from chicken. They are aware of the limitations of present data and the need for more comprehensive information. They are also aware of the emissions from other poultry and fiber production,
  which are not included in the current data.
