personas:
  professional: Isaac Mobley, a retired homesteader, shows how they turn decades of hands‑on expertise in carpentry, fence building, and small‑engine repair into a flexible neighborhood handyman service
    that satisfies their desire for predictable, practical tasks while tolerating occasional disorganization.
  sports: Isaac Mobley, an avid lawn‑bowler at the senior center and seasonal hunter and fisherman, shows how they follow the Louisville Cardinals basketball team and the Cincinnati Reds baseball club,
    while keeping active through weekend trips to the nearby Barren River for fishing and occasional deer‑season hunts.
  arts: Isaac Mobley, a woodturner and model‑ship builder, shows how they fill downtime with classic country playlists featuring Johnny Cash and Dolly Parton, solve daily crossword puzzles, and delve into
    Civil War biographies by James McPherson, allowing these artistic and literary pursuits to shape their reflective, solitary leisure.
  travel: Isaac Mobley, a low‑key traveler, shows how they prefer short road trips in their aging sedan to historic sites like Gettysburg, musical stops in Nashville, and natural retreats such as Mammoth
    Cave State Park, planning itineraries loosely and often packing at the last minute due to a relaxed approach to travel logistics.
  culinary: Isaac Mobley, a modest home cook, shows how they favor dishes such as corn‑meal cornbread, fried catfish with hush‑puppy batter, and blackberry cobbler, often using fresh sweet corn, collard
    greens, and home‑canned pickles from their garden, though they occasionally rely on frozen fish when time runs short.
  core: Isaac Mobley, a pragmatic yet slightly disorganized 74‑year‑old homesteader, shows how they balance a love of solitary outdoor crafts with a competitive, skeptical streak, relying on thrift, routine
    health checks, and a stubborn refusal to let stress dictate their self‑sufficient lifestyle.
background:
  cultural: 'Isaac grew up in a white, Southern Baptist family on a small farm in Scottsville, Kentucky. His upbringing reflects the rural Appalachian culture of the mid‑20th century: a strong emphasis
    on self‑reliance, practical skills, and modest, family‑centered values. Community life revolved around the church, county fairs, and seasonal hunting and fishing rituals. The local dialect, hospitality
    tempered by a reserved demeanor, and a conservative worldview shaped his perspectives. While he respects tradition, his critical and skeptical nature leads him to question authority and to prioritize
    his own interests, often resulting in a solitary but grounded lifestyle that balances the expectations of his cultural heritage with his personal disposition.'
attributes:
  skills: '["woodworking", "fence building", "general carpentry", "small engine repair", "mechanical troubleshooting", "vegetable gardening", "small-scale orchard care", "fishing", "hunting", "home plumbing
