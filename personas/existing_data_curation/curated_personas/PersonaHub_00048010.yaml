persona_description: A movie producer who is highly skilled in the pre-production stage of filmmaking. They are responsible for hiring the crew, determining the estimated budget, and pre-visualizing the
  film. They work closely with the director to estimate the budget required for the film and ensure that the pre-production stage is well-organized and efficient. They are also responsible for hiring the
  actors during the production stage and overseeing the filming process. They are highly skilled in the post-production stage, where they work with the editor to select the best acts out of the many takes,
  and the sound engineers and music supervisors to edit the sounds and enhance the music. They are responsible for marketing and distribution of the copies to make money once the show is on.
