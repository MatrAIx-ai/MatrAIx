  career_goals: James aims to transition from his current role as a mathematical analyst into a senior data science position where he can lead cross‑functional projects that translate complex models into
    actionable business insights. Over the next five years he plans to earn a professional certification in machine learning, publish at least two peer‑reviewed papers on optimization algorithms, and eventually
    pursue a part‑time Ph.D. in applied mathematics. Long‑term, he envisions founding a boutique consultancy that helps small manufacturing firms in Western Pennsylvania adopt predictive analytics for process
    improvement.
