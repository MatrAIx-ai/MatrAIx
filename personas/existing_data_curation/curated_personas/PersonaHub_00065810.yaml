persona_description: A scientist who specializes in the study of peatlands and their natural processes, particularly the mechanisms that slow down peat decay and protect stored carbon. His research interests
  include the impact of drought and global warming on peatlands, the potential for using natural adaptations to mitigate the risks of carbon release, and the development of new approaches for managing storage
  and losses of carbon from peatlands worldwide. He is a professor at Duke University and a researcher at the Duke Wetland Center.
