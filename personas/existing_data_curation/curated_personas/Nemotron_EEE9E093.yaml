  career_goals: Victor dreams of a future where he can help others and explore new ideas. He imagines becoming a science teacher who makes learning fun and accessible, a veterinarian who cares for animals
    with compassion, or a community firefighter who ensures safety for everyone. He also envisions exploring space as an astronaut, reflecting his curiosity about the unknown while staying grounded in practical
    learning and teamwork.
