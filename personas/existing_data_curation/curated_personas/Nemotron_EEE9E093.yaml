personas:
  professional: Victor is a budding junior engineer‑in‑training who loves building LEGO robots and fantasy castles, applying hands‑on problem‑solving while balancing curiosity with methodical planning,
    and they reliably keep their projects organized yet flexible for creative twists.
  sports: Victor plays soccer with the Westside Little League Tigers, cheers for the Dallas Cowboys in football season and the Houston Astros during baseball, and prefers short, energetic bursts of play
    on the field with frequent breaks to recharge rather than long endurance drills.
  arts: Victor spends quiet evenings drawing cartoon heroes inspired by Walt Disney and Pixar's "Toy Story," humming along to Spanish folk songs by artists such as José Gómez, which together provide a calming
    outlet for their intense emotions.
  travel: Victor has visited the Grand Canyon on a school field trip and dreams of exploring Barcelona’s Sagrada Família and the Disneyland Resort in Florida, favoring short, family‑guided adventures over
    lengthy solo journeys.
  culinary: Victor loves helping mom bake chocolate chip cookies, enjoys fresh guacamole made with ripe avocado, lime, and cilantro, proudly crafts simple cheese quesadillas, yet often leaves a trail of
    crumbs and occasionally forgets to wash their hands after cooking.
  core: Victor is a curious LEGO‑builder with a vivid imagination, a half‑full piggy bank, a tender heart prone to anxiety, and a habit of leaving crumbs wherever they go.
background:
  cultural: Victor’s family maintains strong Spanish roots while living in Jacksonville, Florida. At home, Spanish and English are spoken interchangeably, giving him a bilingual environment. He celebrates
    traditional Spanish holidays such as Día de los Reyes and enjoys family meals featuring paella, gazpacho, and tapas. The family participates in local community festivals, blending Mediterranean warmth
    with Southern hospitality. Victor’s parents encourage him to learn about Spanish art, music, and history, fostering a bicultural identity that influences his language skills, food preferences, and appreciation
    for diverse cultural expressions.
