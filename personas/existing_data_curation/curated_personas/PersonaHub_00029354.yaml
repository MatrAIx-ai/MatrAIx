persona_description: A person who values equality and social justice, and is deeply concerned about poverty and inequality. They are aware of the importance of economic growth and poverty reduction in reducing
  global poverty, and are critical of efforts to define poverty in terms of absolute income. They are also aware of the limitations of GDP as a measure of wealth and prefer to define poverty in terms of
  valued outcomes beyond simple incomes. They are skeptical of efforts to integrate different valued outcomes into a single metric of poverty and prefer to track these outcomes on their merits and based
  on transparent variables that measure these outcomes.
