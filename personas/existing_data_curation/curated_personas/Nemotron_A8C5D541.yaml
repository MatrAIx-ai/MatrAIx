  hobbies: '["Gardening","Sailing","Reading Historical Fiction","Attending Theater","Yoga","STEM Mentoring Volunteering","Birdwatching","Cooking Fusion Recipes"]'
  career_goals: Elecia aims to become department chair within the next five years, using that platform to champion innovative teaching methods and strengthen interdisciplinary collaboration. She plans to
    secure a federal grant to launch a new program that connects environmental science with community outreach, reflecting her practical curiosity. Long‑term, she hopes to author a textbook on applying
    educational psychology in real‑world classroom settings and to mentor emerging faculty members, ensuring a legacy of both scholarly rigor and practical impact.
