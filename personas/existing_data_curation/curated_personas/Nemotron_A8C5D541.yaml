personas:
  professional: Elecia Cohen, a veteran higher‑education strategist, leverages three decades of expertise in curriculum design and instructional technology to craft data‑driven interdisciplinary courses,
    while their competitive streak drives relentless grant pursuits and departmental leadership ambitions, even though they sometimes let their love of flexibility cause last‑minute syllabus tweaks.
  sports: Elecia Cohen supports the Miami Dolphins and Orlando Magic, rows with the Biscayne Bay Yacht Club in winter, joins the local senior tennis league in spring, and blends a love for flexible, low‑impact
    fitness—like sunrise yoga on their patio—with occasional spin classes at a downtown studio, because they always prioritize enjoyment over rigid training regimens.
  arts: Elecia Cohen regularly attends productions by the Orlando Shakespeare Company and the Florida Stage, delights in the melodies of James Taylor and local jazz pianist Marco Stroppa, collects prints
    from the downtown art collective, and spends quiet evenings reading historical novels by Hilary Mantel, allowing them to shape a reflective yet pragmatic worldview.
  travel: Elecia Cohen favors spontaneous coastal escapes—sailing the Bahamas, exploring historic Charleston, and weekend retreats to the Florida Keys' mangrove trails—yet they prefer to plan the basics
    just enough to secure a boat slip, leaving ample room for on‑the‑fly detours while balancing a modest travel budget after their children left home.
  culinary: Elecia Cohen enjoys cooking fresh grouper ceviche with Key lime juice, stir‑frying native Florida snap beans with dandelion greens, and perfecting their signature key‑lime pie, a skill they
    honed through weekend gardening trips that supply fresh herbs like lemon verbena and mint.
  core: Elecia Cohen blends a fiercely competitive academic drive with a laid‑back love of native gardening, sailing, and spontaneous discovery, resulting in a life where they balance meticulous data‑informed
    decisions with occasional disorganized, last‑minute improvisations.
background:
  cultural: Elecia grew up in a middle‑class suburban environment in the Northeastern United States, where a strong emphasis on education and community service shaped her values. As a white American, she
    carries the cultural traits of pragmatism and self‑reliance typical of that region. Relocating to Jupiter, Florida, she has adopted the coastal lifestyle, integrating an appreciation for outdoor recreation,
    environmental stewardship, and the diverse cultural tapestry of Palm Beach County into her personal and professional identity.
