personas:
  professional: Summer Ball, a 32‑year‑old educational strategist, leverages their methodical tutoring expertise in middle‑school mathematics and SAT preparation to design data‑driven curriculum solutions
    for the Houston Independent School District, balancing a curiosity for innovative ed‑tech with a competitive drive to surpass district benchmarks.
  sports: Summer Ball, a devoted member of the Houston Hiking Club, tackles the diverse terrains of Memorial Park and Brazos Bend on weekends, regularly attends Astros games at Minute Maid Park, supports
    the Rockets during the NBA season, and squeezes in weekly yoga sessions to balance competitive stamina with mindful recovery.
  arts: Summer Ball, an avid reader of contemporary fiction by Sally Rooney and historical narratives like Erik Larson’s works, finds inspiration in the soulful guitar of John Mayer, the cinematic storytelling
    of Greta Gerwig, and the vibrant murals of local Houston street artists, weaving these artistic influences into tutoring analogies to illuminate complex concepts.
  travel: Summer Ball meticulously plans weekend getaways, favoring nature‑focused trips such as a sunrise hike in Big Bend National Park or a cultural immersion weekend in San Miguel de Allende to practice
    Spanish, while dreaming of a long‑term itinerary that includes exploring the historic streets of Edinburgh and the literary cafés of Paris.
  culinary: Summer Ball, a self‑taught Tex‑Mex enthusiast, skillfully crafts homemade chicken enchiladas with fire‑roasted tomatillos, smoky chipotle sauce, and fresh cilantro, while frequently experimenting
    with DIY masa dough for street‑style tacos and perfecting guacamole using ripe Hass avocados and a dash of lime.
  core: Summer Ball is a data‑driven education champion whose competitive streak fuels meticulous tutoring, while their love of puzzles, relentless organization, and occasional midnight cravings for extra
    guacamole reveal a balanced blend of curiosity and practicality.
background:
  cultural: Summer was raised in a middle‑class, white suburban family in Texas, where Southern hospitality and a strong work ethic were emphasized. Her upbringing valued education, community service, and
    self‑reliance. Living in Houston, she has absorbed the city’s multicultural vibrancy, becoming comfortable navigating a diverse environment and fostering inclusive learning practices. While she respects
    traditional values such as family commitment and reliability, her curiosity drives her to engage with new ideas and technologies, reflecting a blend of classic Texan roots and contemporary, globally‑aware
    perspectives.
attributes:
  skills: '["Algebra tutoring", "Geometry tutoring", "SAT/ACT preparation", "Lesson planning", "Curriculum design", "Educational technology integration", "Student progress assessment", "Data‑driven instruction",
