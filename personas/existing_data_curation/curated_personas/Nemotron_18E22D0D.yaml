  hobbies: '["Reading contemporary fiction", "Historical non-fiction", "Cooking Tex‑Mex dishes", "Yoga", "Hiking in local parks", "DIY home organization", "Puzzle solving (crosswords, Sudoku)", "Strategy
    board games", "Volunteering in community literacy programs", "Road trips across Texas"]'
  career_goals: Summer aims to earn a master's degree in Education Leadership within the next three years, positioning herself for a role as a curriculum specialist or instructional designer within the
    Houston Independent School District. She aspires to develop a boutique tutoring network that incorporates blended learning models and data analytics to personalize instruction at scale. Long‑term, she
    hopes to influence district‑wide curriculum policies, mentor new educators, and contribute thought pieces on effective, evidence‑based teaching practices at education conferences.
