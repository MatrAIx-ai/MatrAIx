personas:
  professional: Francisco Ferina is a meticulous kitchen supervisor who blends a business graduate’s analytical mindset with hands‑on culinary management, excelling at operational planning, inventory control,
    and staff scheduling while rigorously enforcing ServSafe standards, and their competitive drive fuels a two‑year goal to become restaurant manager through data‑driven menu engineering and waste reduction.
  sports: Francisco Ferina follows Inter Miami CF in MLS, never misses a Honduras national team match, participates in a weekly pick‑up soccer league with the Miami Beach Soccer Club, and jogs with the
    Miami Waterfront Runners to stay fit, treating each game as a competitive benchmark for personal discipline.
  arts: Francisco Ferina immerses themselves in music by playing a curated playlist of Latin pop and classic rock—featuring artists like Shakira, Carlos Vives, and Fleetwood Mac—while cooking, attends occasional
    salsa nights at local venues, and keeps a collection of vintage vinyl that provides rhythmic motivation during long shifts.
  travel: Francisco Ferina prefers meticulously planned short getaways, often jetting to Key West for a weekend surf‑and‑sun escape, scheduling annual family trips to Orlando’s theme parks, dreaming of
    a culinary pilgrimage to Oaxaca to study regional cuisines, yet tight finances and work commitments keep long‑haul international travel on the back‑burner.
  culinary: Francisco Ferina delights in preparing traditional dishes such as baleadas and tamales for family gatherings, expertly balancing flour tortillas, refried beans, crumbled cheese, and plantain
    slices while experimenting with fresh cilantro, lime, and slow‑cooked pork, and they apply rigorous menu‑engineering metrics to reduce waste and boost profit margins.
  core: Francisco Ferina, a 36‑year‑old methodical kitchen supervisor, fuses data‑driven operations with a love for traditional cooking, battles stress‑induced hypertension, and channels a competitive spirit
    into both career advancement and fervent soccer fandom.
background:
  cultural: Francisco was born to Honduran immigrants and grew up in a bilingual household in Miami. He retains strong ties to his roots through language, food, and community celebrations such as Honduran
    Independence Day and the Feria del Atlántico. His family places high value on close‑knit relationships, respect for elders, and shared meals. He participates in the local Honduran cultural association,
    where he helps preserve traditional music and dance while also navigating the multicultural environment of South Florida.
attributes:
  skills: '[''Operational Planning'', ''Inventory Management'', ''Cost Control'', ''Team Leadership'', ''Staff Scheduling'', ''Food Safety (ServSafe) Compliance'', ''Process Improvement'', ''Bilingual Communication
    (Spanish/English)'', ''Training & Development'', ''Customer Service Management'']'
  hobbies: '[''Cooking Traditional Honduran Cuisine'', ''Watching Soccer (Honduras National Team, MLS)'', ''Jogging/Running'', ''Reading Business Strategy Books'', ''Volunteering at Community Center (Spanish
    Workshops)'']'
  career_goals: Francisco aims to move from first‑line supervision to a restaurant manager role within the next two years, focusing on boosting profit margins through data‑driven menu engineering and waste
    reduction. In the longer term, he aspires to become a regional operations manager for a multi‑unit hospitality group or to launch his own fast‑casual concept that highlights authentic Honduran cuisine
    while applying modern operational efficiencies. He plans to pursue an advanced certification in hospitality management to support these ambitions.
