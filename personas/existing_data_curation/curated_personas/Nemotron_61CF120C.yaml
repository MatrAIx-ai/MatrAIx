    meet-ups'', ''Adult literacy tutoring'']'
  career_goals: Khanh aspires to deepen her community impact by taking a leadership role in a local senior center or immigrant support organization, where she can design and run multicultural art and cooking
    programs. She plans to enroll in a community-college certificate in nonprofit management to strengthen her volunteer-coordination skills. Long-term, she hopes to launch a modest home-based catering
    service that offers authentic Vietnamese dishes for community events, and to document her life story and cultural heritage through a memoir blog that encourages intergenerational dialogue.
