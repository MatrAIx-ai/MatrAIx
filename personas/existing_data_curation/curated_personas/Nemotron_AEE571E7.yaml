  career_goals: Celeste aims to become the director of a community‑based preschool network in Contra Costa County, where she can scale her interdisciplinary curriculum model. She plans to earn a credential
    in early childhood education leadership within the next two years, and to author a guidebook on integrating visual arts and STEM for young learners. Additionally, she is interested in creating a low‑cost
    after‑school STEM lab that partners with the local library and museum, providing outreach to underserved families. Celeste also seeks to champion teacher wellness by establishing a peer‑support program
    that addresses stress and burnout.
