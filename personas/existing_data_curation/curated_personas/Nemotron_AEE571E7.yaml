  hobbies: '[''Watercolor painting'', ''Sketching'', ''Hiking (Diablo Vista Trail)'', ''Chess'', ''Jigsaw puzzles'', ''Yoga and mindfulness meditation'', ''Visiting art museums and science centers'', ''Attending
