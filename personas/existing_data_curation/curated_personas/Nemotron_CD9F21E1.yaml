  career_goals: Inspired by his love for helping others and his interest in structured environments, Hongnhung dreams of becoming a pediatrician who can support children in managing stress and emotions,
    while also contributing to community health education initiatives. He also envisions taking on leadership roles in school clubs or community events, where his organizational skills and sociable personality
    can create inclusive, well‑planned activities for peers.
