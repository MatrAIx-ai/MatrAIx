personas:
  professional: Hongnhung Dumond, a 9‑year‑old budding strategist, channels a love for structure and creativity into building intricate LEGO models and coding Scratch animations, showcasing early engineering
    instincts while confidently presenting ideas to classmates.
  sports: Hongnhung Dumond, an energetic member of the school soccer team, plays midfield for the local Riverside Rovers youth club, regularly attends after‑school drills, and balances game days with a
    disciplined routine of stretching and hydration.
  arts: Hongnhung Dumond shines in the drama club, relishing the spotlight in performances of classic children's plays, practices piano pieces by Mozart and Tchaikovsky, and enjoys watching Broadway productions
    featuring Lin‑Manuel Miranda.
  travel: Hongnhung Dumond dreams of visiting Japan’s cherry‑blossom festivals and the Great Wall of China, but due to school constraints opts for weekend trips to Shenandoah National Park, where they sketch
    the panoramic views in their journal.
  culinary: Hongnhung Dumond helps prepare the family’s fragrant noodle broth and delicate spring rolls at home, savoring the aroma of star anise and lemongrass while experimenting with caramelized onions
    for a creative twist on grilled cheese.
  core: Hongnhung Dumond, a structured yet socially vibrant 9‑year‑old, balances meticulous LEGO constructions and chess strategies with a love for performance, while wrestling with frequent worries that
    drive a habit of journaling.
background:
  cultural: Hongnhung is a first‑generation Vietnamese‑American raised in Houston's vibrant multicultural community. His household celebrates Vietnamese traditions, such as Tet (Lunar New Year) and family
    gatherings featuring dishes like pho and bánh chưng, while also embracing American holidays and school life. His parents emphasize the importance of education, respect for elders, and community harmony—values
    that shape his cooperative nature. Bilingual fluency in Vietnamese and English allows him to navigate both cultural contexts, fostering a strong sense of identity rooted in his heritage and his American
    environment.
