  hobbies: '[''reading historical non-fiction'', ''writing blog essays'', ''gardening'', ''puzzle solving'', ''bird watching'', ''visiting museums'', ''attending art exhibits'']'
  career_goals: Andrea aims to leverage her long‑standing retail experience and humanities education to move into a supervisory or administrative role within the store or a related community organization.
    In the next five years she hopes to become a shift supervisor, overseeing a small team while maintaining a calm, organized environment. She is also exploring a certificate in archival studies to eventually
    work part‑time as a volunteer archivist at the local historical society, allowing her to combine her curiosity for history with her methodical nature. Long‑term, she envisions a balanced career that
    offers stability, opportunities for quiet, focused work, and occasional community engagement.
