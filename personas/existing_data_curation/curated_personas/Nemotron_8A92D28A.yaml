  hobbies: '[''Gardening'', ''Cooking healthy soul food'', ''Walking her dog'', ''Gospel music and church choir'', ''Reading historical fiction'', ''Crocheting'', ''Bridge club'', ''Attending community
    festivals'', ''Health magazine reading'']'
  career_goals: Flora aims to open a boutique fitness studio in Hyattsville that focuses on inclusive, evidence‑based programs for older adults and under‑served Black communities. She plans to earn a senior
    fitness specialist certification, develop a community‑based wellness curriculum in Prince George’s County schools, and mentor emerging trainers. Over the next five years she wants to host monthly health
    workshops, partner with local churches for free fitness classes, and eventually transition to a consultancy role while maintaining a steady client base for personal training.
