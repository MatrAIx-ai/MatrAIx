personas:
  professional: Flora House, a seasoned group fitness instructor and personal trainer with 25 years of experience, designs meticulous, evidence-based exercise programs for seniors by applying their CPR/First-Aid
    certification, anatomy expertise, and competitive drive to track progress and push clients beyond their comfort zones, all while they maintain a reliable, routine-focused class schedule for their future
    boutique studio.
  sports: Flora House enjoys low-impact cardio classes, weekly 3-mile walks with their golden retriever, and is a loyal fan of the Washington Wizards and Washington Capitals, while also belonging to the
    Hyattsville Senior Walking Club and occasionally joining the local senior volleyball league for retirees.
  arts: Flora House finds solace in gospel music, regularly singing hymns by Kirk Franklin and Tasha Cobbs Leonard at church choir rehearsals, and also delights in historical fiction by Ken Follet and attending
    community theater productions featuring classics like 'A Raisin in the Sun', which they consider essential nourishment for the soul.
  travel: Flora House prefers well-planned road trips to culturally rich destinations such as Savannah, GA, Charleston, SC, and the Smithsonian museums in Washington, D.C., budgeting each escape through
    a dedicated travel fund and limiting vacations to long-weekend getaways to balance family commitments, which they find both refreshing and manageable.
  culinary: Flora House delights in preparing nutritious soul-food dishes like collard greens with smoked turkey, sweet-potato casserole, and black-eyed peas spiced with garlic and onion, expertly using
    fresh ingredients from their vegetable garden while experimenting with quinoa-kale salads topped with avocado and lemon vinaigrette, a cooking routine they cherish.
  core: Flora House is a routine-oriented fitness veteran who channels their competitive spirit into community wellness, balances meticulous budgeting with occasional indulgences, and navigates hypertension
    with disciplined self-care, all while fostering gospel-filled connections and a love for crocheting community blankets.
background:
  cultural: Flora grew up in a close‑knit African‑American community in the Washington, D.C. metropolitan area. Her family’s roots trace back to the rural South, and she carries forward traditions of strong
    church involvement, communal cooking, and neighborhood solidarity. Living in Prince George’s County, she is deeply connected to the local Black culture, celebrating events such as Juneteenth, Black
    History Month, and local church gatherings. She draws on this heritage in her fitness work, emphasizing community health, resilience, and culturally relevant wellness approaches, and she often incorporates
    music and dance styles familiar to her community into her classes.
attributes:
  skills: '[''Group fitness instruction'', ''Personal training'', ''Exercise program design'', ''Client assessment and progress tracking'', ''First aid & CPR certification'', ''Equipment maintenance and
