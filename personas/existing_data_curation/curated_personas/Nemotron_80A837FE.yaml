personas:
  professional: Kaleb is a two‑year‑old who delights in the predictable click of Duplo blocks, yet frequently abandons the set pattern to create off‑beat structures; they exhibit an early blend of practical
    focus and spontaneous creativity that hints at a future in engineering or design.
  sports: Kaleb is a two‑year‑old who participates in the local Mini Kickers soccer group during the fall, cheers for the Houston Astros on game nights, and prefers solo toddler playground sprints to large
    group activities; they embody a love of small‑group competition and quiet physical play.
  arts: Kaleb is a two‑year‑old who hums along to Beyoncé’s 'Single Ladies' during family barbecues, giggles at the animated antics of Sesame Street’s Elmo, and enjoys finger‑painting to the rhythm of Taylor
    Swift’s 'Shake It Off'; they reveal a playful yet selective artistic palate.
  travel: Kaleb is a two‑year‑old who relishes short family road trips to the Houston Museum of Natural Science and weekend visits to his grandma’s house in Austin, while dreaming of a future beach day
    at Galveston’s shoreline; they balance curiosity about new places with the comfort of familiar family routines.
  culinary: Kaleb is a two‑year‑old who adores buttery corn muffins, crispy chicken nuggets, and mac & cheese, but fiercely rejects broccoli, often using his favorite dinosaur‑shaped spoon to scoop peas
    into his mouth while requesting extra honey‑drizzled biscuits; they show a selective palate and a strong attachment to comfort foods.
  core: Kaleb is a two‑year‑old who balances a love for predictable routines with sudden bursts of spontaneity, hoards pennies, resists new foods, and meticulously arranges his toys only to later dismantle
    them in a joyful, chaotic swirl; they embody a quirky blend of order‑seeking and carefree play.
background:
  cultural: Kaleb is raised in a White, Southern‑Texas family in Sugar Land, Texas. His household celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, often incorporating
    local Texas traditions like backyard barbecues and community festivals. The family attends a local Christian church, enjoys family meals featuring Southern comfort foods, and lives in the diverse Fort Bend
    County community where multicultural neighbors provide occasional exposure to varied customs.
