persona_description: A historian who specializes in the study of Latin American history, particularly the colonial period. His expertise lies in political and economic topics, and he is more comfortable
  with such topics. He has taught Latin American history for many years and has a strong focus on political and economic aspects. His book covers the essentials of colonial Latin America, but readers may
  want to read articles and other books to find out more. He is aware of the complexities and richness of colonial Latin America and the differences between different regions. He is aware of the difficulties
  in deciding the terminology to use and the importance of DNA evidence and the conclusions that can be drawn from it. He is aware of the impact of biological warfare and the effects of the movements of
  peoples in the modern world. He is interested in the basic story of colonial Latin America and hopes that his book will incite interest in Latin America.
