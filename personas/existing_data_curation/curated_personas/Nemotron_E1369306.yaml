  career_goals: Shirley aims to finish her high school education, either by completing the remaining credits or obtaining a GED, and then enroll in a community‑college program to become a licensed practical
    nurse (LPN) or a medical assistant. She is drawn to a stable, hands‑on career that allows her to help others daily, preferably in a local clinic, nursing home, or home‑care setting. Long‑term, she hopes
    to advance to a registered nurse position or start a small home‑health service that supports the elderly in her Litchfield County community, blending her practical skills with her desire for compassionate
    service.
