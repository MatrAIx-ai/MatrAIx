  hobbies: '["Personal Woodworking Projects", "Antique Furniture Restoration", "Fishing", "Vegetable Gardening", "Reading Construction Manuals", "Listening to Classic Country and Rock Music", "Attending
    Local Craft Fairs", "Volunteer Neighborhood Repair Days"]'
  career_goals: Harley aims to achieve master carpenter certification, expand his reputation as a go‑to specialist for custom woodworking in Oklahoma City, and eventually open a small boutique workshop
    that produces handcrafted furniture. He also wants to formalize a mentorship program for young tradespeople and increase his involvement with Habitat for Humanity and local senior‑citizen repair initiatives.
