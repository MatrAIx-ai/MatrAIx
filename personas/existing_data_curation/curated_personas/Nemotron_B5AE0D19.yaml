personas:
  professional: Harley Zaretsky is a seasoned carpenter in Oklahoma City whose mastery of residential framing, finish carpentry, and custom cabinet making is matched by a methodical approach to blueprints,
    strict adherence to building codes, precise project scheduling, and a compassionate mentorship style that balances meticulous material management with hands‑on support for apprentices and community
    build initiatives.
  sports: Harley Zaretsky enjoys quiet weekend fishing trips at Lake Hefner, is a loyal supporter of the Oklahoma City Thunder and the Oklahoma Sooners football team, participates in a local Saturday morning
    pickleball league, and volunteers as a carpenter for community sports field repairs, combining their love of the outdoors with modest competitive activity.
  arts: Harley Zaretsky attends craft fairs, enjoys classic country tunes from Johnny Cash and Willie Nelson, rocks out to the Rolling Stones, loves folk‑rock artist Neil Young, collects vintage woodworking
    magazines, and finds inspiration in the paintings of Edward Hopper, often humming a favorite song while shaping wood.
  travel: Harley Zaretsky prefers road‑trip planning that balances budget and leisure, having explored the art deco architecture of Tulsa, the high desert of Santa Fe, and the breathtaking vistas of the
    Grand Canyon, while dreaming of a woodworking pilgrimage to the Swiss Alps to source rare timber, always packing a fold‑out workbench for impromptu projects along the way.
  culinary: Harley Zaretsky relishes cooking garden‑grown vegetables into roasted zucchini and heirloom tomato salads, pairing grilled lake trout with a smoky chipotle glaze, and finishing meals with a
    slice of homemade apple pie seasoned with cinnamon and nutmeg, while their trusted toolbox includes a cast‑iron skillet, a seasoned wooden spoon, and a secret stash of smoked paprika.
  core: Harley Zaretsky blends a carpenter’s disciplined love of structure with a compassionate, solitary spirit, hoarding scrap wood like treasure, occasionally over‑polishing tools to a gleam, and finding
    solace in the rhythmic hum of a lathe while guiding the next generation of tradespeople.
background:
  cultural: Harley grew up in a working‑class white family in the Oklahoma plains, where self‑reliance, community cooperation, and a strong work ethic were core values. His upbringing blended Midwestern
    practicality with the modest, faith‑inspired culture of small‑town churches. The region’s emphasis on helping neighbors and preserving craftsmanship has shaped his compassionate, cooperative outlook
    and his dedication to hands‑on, community‑focused work.
attributes:
