  career_goals: Andreco aims to advance from her current clerk role to a supervisory position within the claims department, where she can lead a small team focused on efficiency and accuracy. She plans
    to pursue a professional certification such as the CPCU (Chartered Property Casualty Underwriter) and complete a bachelor's degree in Risk Management or Business Administration. In the long term, she
    envisions shaping policy‑development strategies that incorporate innovative, data‑driven methods while maintaining the autonomy she values in her work environment.
