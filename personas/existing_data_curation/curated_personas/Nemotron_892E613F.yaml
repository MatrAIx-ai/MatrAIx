personas:
  professional: Nicolo Savransky, a 22‑year‑old youth basketball and soccer coach with a keen eye for talent, designs flexible practice plans that blend data‑driven drills with spontaneous game‑like scenarios,
    and they rely on their personable communication to build trust while occasionally juggling disorganized schedules.
  sports: Nicolo Savransky plays pickup basketball at the local YMCA, joins a weekend adult soccer league affiliated with the Kansas City Soccer Club, roots for the Kansas City Chiefs and Kansas City Royals,
    and they routinely hike the Ozark Trail to balance competitive play with endurance training.
  arts: Nicolo Savransky, an avid electric‑guitar hobbyist, frequents the Kansas City Jazz Festival where they admire performances by Kamau Kenyatta and Trombone Shorty, streams live covers of Jimi Hendrix
    and John Mayer on Twitch, and they also collect vintage baseball cards as a nostalgic artistic pursuit.
  travel: Nicolo Savransky enjoys weekend road trips to Branson and the Ozark National Forest, has backpacked through Asheville’s Blue Ridge Mountains, dreams of hiking Patagonia’s Torres del Paine, and
    they plan trips with minimal itineraries to keep flexibility for spontaneous BBQ pit stops.
  culinary: Nicolo Savransky’s palate revolves around Kansas City smoked brisket, burnt ends, and dry‑rubbed pork ribs, they experiment with custom rubs featuring paprika, brown sugar, and coffee grounds,
    and they often host backyard barbecues where they serve coleslaw and corn on the cob alongside a cold local craft beer.
  core: Nicolo Savransky blends a practical coaching mindset with a love for spontaneous BBQ sessions, juggling mild anxiety and a laid‑back habit of last‑minute planning, while they stay sociable through
    music, sports, and community gatherings.
background:
  cultural: Nicolo grew up in Clay County, a suburban area of Kansas City, in a middle-class family that blends typical Midwestern American values with his Eastern European heritage. His grandparents emigrated
    from Ukraine and settled in the Midwest, bringing traditions such as holiday gatherings, folk music, and a strong emphasis on community support. He was raised attending local community events, high-school
    sports games, and regional festivals like the American Royal. This background fostered a deep appreciation for teamwork, hospitality, and grassroots sports culture, shaping both his personal and professional
    outlook.
attributes:
  skills: '["Talent identification", "Youth coaching", "Practice planning", "Communication", "Motivational speaking", "Basic sports medicine", "Injury prevention", "Statistical analysis", "Event organization",
