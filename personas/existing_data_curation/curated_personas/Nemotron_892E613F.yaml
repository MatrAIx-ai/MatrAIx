    cards", "Playing sports video games"]'
  career_goals: He aims to earn a USA Coaching License (Level 1) within the next year and transition from part-time scouting to a full-time assistant coach position at a reputable high-school or junior
    college. Over the next five years he hopes to become a head coach of a varsity program, develop a regional scouting network for collegiate recruiters, and eventually launch his own sports development
    academy focused on integrating mental-wellness training with athletic skill development.
