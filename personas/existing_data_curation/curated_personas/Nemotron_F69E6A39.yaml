  hobbies: '[''Hiking in the Wasatch Range'', ''Experimental home cooking'', ''TikTok cooking videos'', ''Competitive strategy gaming'', ''Volunteer work at local food bank'', ''Reading sci‑fi novels'',
    ''Sketching food illustrations'']'
  career_goals: Donna aims to turn her hands‑on experience into a full culinary career. Within the next two years she plans to enroll in a culinary arts program or secure an apprenticeship that emphasizes
    farm‑to‑table and sustainable cooking. Long‑term, she wants to become a head chef at a restaurant that showcases Utah’s agricultural bounty or launch her own food‑truck offering innovative, health‑focused
    meals inspired by her Finnish heritage. Eventually she hopes to open a small café where experimental dishes meet practical business operations, allowing her to balance her spontaneous nature with the
    demands of running a successful food business.
