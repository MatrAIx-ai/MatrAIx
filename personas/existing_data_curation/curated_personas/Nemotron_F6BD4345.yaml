personas:
  professional: Dennis Perez is a budding young creator who blends cartoon sketching, watercolor experiments, LEGO construction, and Scratch coding into a playful portfolio that showcases their curiosity
    and willingness to try unconventional digital and analog projects, often leaving the finished pieces scattered around their bedroom in a creative but disorganized fashion.
  sports: Dennis Perez plays on the local youth soccer team called the Thunderbolts, idolizes the professional club Manchester United, and spends weekend afternoons at the community park practicing dribbling
    while also cheering for the city’s basketball team during televised games.
  arts: Dennis Perez is an aspiring cartoonist who admires classic comic artists like Osamu Tezuka and modern street art icons such as Banksy, regularly watches animated films by Hayao Miyazaki, and contributes
    original sketches to the school’s art club where they experiment with bold watercolor palettes.
  travel: Dennis Perez loves exploring nearby state parks to collect leaves and rocks, dreams of visiting the Grand Canyon for its vast vistas, and hopes to travel to Tokyo’s Akihabara district to experience
    the anime culture firsthand, all while preferring spontaneous day trips over meticulously planned vacations.
  culinary: Dennis Perez enjoys simple home‑cooked meals such as spaghetti with meatballs, cheese pizza, and fruit smoothies made with bananas and strawberries, can whip up a basic omelet with limited supervision,
    and often asks for extra ketchup on their fries.
  core: Dennis Perez is a curious, art‑obsessed ten‑year‑old who balances imagination with a relaxed, sometimes messy approach to life, juggling LEGO builds, video games, and nature hikes while occasionally
    forgetting chores.
background:
  cultural: Dennis was raised in Galloway, a suburban community on the outskirts of Columbus, Ohio. His family reflects a typical middle‑class white Midwestern upbringing, emphasizing community, school
    involvement, and family traditions. He regularly participates in local events such as the Franklin County fair, school sports games, and holiday celebrations like Thanksgiving and Christmas that involve
    extended family gatherings. The region’s blend of suburban life and proximity to the cultural amenities of Columbus exposes him to mainstream American media, public library programs, and school‑based
    art and STEM activities, fostering a balanced appreciation for both creative expression and scientific curiosity.
