  hobbies: '["Reading classic and modern literature","Cooking Mexican cuisine","Urban gardening","Hiking in local parks and nature preserves","Participating in a small book club","Yoga and mindfulness practice","Salsa
    dancing","Volunteer adult literacy tutoring"]'
  career_goals: Sonia aims to advance from private tutoring to a leadership role in educational program development, focusing on bilingual and multicultural initiatives in Lake County. She plans to pursue
    a master's degree in education to become a curriculum coordinator, and eventually launch a community‑driven nonprofit tutoring center that offers free after‑school support for underprivileged students,
    especially those from Mexican‑American families. She also hopes to publish articles on inclusive teaching practices that bridge American and Mexican cultural perspectives.
