persona_description: A psychologist or researcher who studies human behavior, particularly the effects of group pressure and conformity on individual decision-making. They are interested in understanding
  the factors that contribute to conformity and obedience, and how individuals can resist these pressures. They may conduct experiments to measure the effects of group pressure and conformity on decision-making,
  and may also analyze existing data to identify patterns and trends. They are likely to be familiar with the work of psychologists such as Stanley Milgram and would have a strong interest in understanding
  the psychological mechanisms behind conformity and obedience.
