  hobbies: '[''Hiking in the Guadalupe Mountains'', ''Cooking Chilean and Mexican dishes'', ''Participating in community dance events'', ''Photography of local landscapes'', ''Volunteering at senior center'',
    ''Gardening in community plot'', ''Attending art exhibitions'', ''Reading historical biographies'']'
  career_goals: Although Fredy is currently not in the formal workforce, he aspires to deepen his volunteer leadership by establishing a community cultural center that offers art workshops, cooking classes,
    and language exchange programs. He hopes to mentor younger members of the Hispanic community, sharing his knowledge of Chilean heritage and practical skills. Additionally, Fredy aims to document his
    life story and family history in a memoir, preserving the immigrant experience for future generations. He also plans to learn digital storytelling techniques to create video archives of local festivals
    and oral histories.
