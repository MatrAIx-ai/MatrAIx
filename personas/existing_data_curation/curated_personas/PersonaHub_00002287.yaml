persona_description: A historian or scholar who is interested in the study of Japanese history, specifically the period of the medieval period from the 14th to the 15th century. They are knowledgeable about
  the religious practices, rituals, and objects used in funerals during this time period and are interested in analyzing the relationship between these practices and the objects used in them. They are also
  interested in the material culture of death and the various types of objects used in memorial rituals. They are likely to be familiar with the works of Karen Gerhart and the study of medieval Japanese
  funerals and memorial rites.
