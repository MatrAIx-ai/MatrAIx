  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading historical novels'', ''Knitting'', ''Herb gardening'', ''Attending theater and gallery events'', ''Birdwatching'', ''Trail walking'', ''Library
    volunteering'', ''Cooking and baking'', ''Participating in book clubs'']'
  career_goals: Constance aims to deepen her artistic practice by learning advanced printmaking and digital illustration techniques, and to curate a series of intergenerational art workshops that pair senior
    participants with school‑age children. She hopes to author a memoir that weaves her family’s genealogical discoveries with reflections on Midwestern life, and to secure a modest scholarship fund for
    local art students. Continuing her role as a museum docent, she intends to develop a traveling exhibition of regional folk art, while maintaining her physical health through regular yoga and nature
    walks. Travel to regional art festivals and cultural events remains a cherished ambition.
