personas:
  professional: Constance Poyo, a 74‑year‑old watercolorist and museum docent, blends their deep art‑history expertise with event‑planning savvy to craft intergenerational art workshops, mentor younger
    volunteers in digital illustration, and maintain a meticulous yet flexible approach to their mixed‑media projects.
  sports: Constance Poyo joins the Silver Steps Senior Hiking Club for weekly walks along the Maryville Nature Trail, follows the Kansas City Royals faithfully during the baseball season, and maintains
    gentle cardio through low‑impact swimming at the community center, though they sometimes skip a session when a new knitting pattern captivates them.
  arts: Constance Poyo draws creative fuel from Georgia O'Keeffe's floral watercolors and Romare Bearden's collage techniques, attends every community theater production of 'Our Town', celebrates emerging
    regional talent like Maya Jensen at Midtown Gallery openings, and actively mentors youth in digital illustration workshops, all while infusing their own mixed‑media sensibility into each project.
  travel: Constance Poyo favors thoughtfully planned weekend escapes that blend museum visits and culinary discoveries, such as their annual pilgrimage to the Ohio Folk Art Festival in Marietta, a weekend
    stroll through Asheville's River Arts District, and a relaxed afternoon exploring Willow Springs Gardens in Missouri, while they occasionally delay travel when a genealogy breakthrough demands their
    attention.
  culinary: Constance Poyo, an adept baker, delights in whipping up classic Midwestern desserts like gooey rhubarb crisp and buttery sugar cream pie using fresh lavender and thyme from their herb garden,
    experiments with rosemary‑garlic roasted chicken, and sometimes over‑salts their spice blends in the exuberance of trying new recipes.
  core: Constance Poyo is a curious, art‑loving septuagenarian who balances meticulous organization with spontaneous creativity, occasionally misplaces their glasses while hunting for forgotten knitting
    needles, yet always finds time to mentor the next generation.
background:
  cultural: Constance grew up in a small farming community near Maryville, Missouri, in a family of German‑Irish descent that valued hard work, hospitality, and community service. The Midwest’s traditions—county
    fairs, church potlucks, and a reverence for the prairie landscape—shaped her appreciation for folk art and seasonal rhythms. While rooted in these values, she has embraced broader cultural experiences
    through museum visits, reading, and travel, blending the modest, pragmatic Midwestern ethos with a lifelong curiosity for new ideas and artistic expression.
