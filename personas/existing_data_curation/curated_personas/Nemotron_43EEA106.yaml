personas:
  professional: Shavell Velasco, a seasoned mechanical engineer with PMP certification, merges rigorous CAD and FEA expertise with a user‑centered aesthetic sensibility, driving projects to completion on
    schedule while championing inclusive design and mentoring junior staff.
  sports: Shavell Velasco, an enthusiastic participant in Zumba, kickboxing, and weekend hikes with the Raleigh Trailblazers club, roots for the Carolina Hurricanes and follows North Carolina FC, while
    cheering on the Duke Blue Devils during March Madness, reflecting a blend of community fitness and regional team pride.
  arts: Shavell Velasco, a regular at the North Carolina Museum of Art who sketches gallery scenes, captures vibrant street portraits inspired by Henri Cartier‑Bresson, and revels in live sets ranging from
    John Coltrane’s jazz trio to Kendrick Lamar’s hip‑hop showcases, finds artistic expression integral to both work and leisure.
  travel: Shavell Velasco, a detail‑oriented traveler who meticulously plans trips using a spreadsheet itinerary, enjoys weekend escapes to Asheville’s Blue Ridge trails and cultural festivals in New Orleans,
    has explored Barcelona’s architecture and Tokyo’s tech districts, and dreams of hiking Iceland’s volcanic landscapes while balancing family commitments.
  culinary: Shavell Velasco, a confident home cook who frequently prepares smoky paprika‑rubbed grilled chicken, homemade paella with saffron and chorizo, and experiments with matcha‑infused desserts, enjoys
    discovering farm‑to‑table restaurants serving seared scallops with lemon‑butter sauce, and relishes the occasional indulgence of a perfectly brewed Ethiopian coffee.
  core: Shavell Velasco blends rigorous engineering precision with a vivid artistic soul, juggling relentless project deadlines and a penchant for late‑night sketching, yet often battles perfectionist anxiety
    that fuels both her success and occasional sleepless evenings.
background:
  cultural: Shavell grew up in a close‑knit African‑American community in the greater Raleigh area, where family gatherings, church, and community festivals played a central role in her upbringing. The
    influences of Southern Black culture—rich traditions in music, storytelling, and visual arts—shaped her appreciation for artistic expression and collective resilience. Her parents emphasized the importance
    of education and perseverance, encouraging her to become the first in her family to earn a STEM degree. Participation in local Juneteenth celebrations and the annual Black Arts Festival reinforced her
    sense of cultural pride and the responsibility to uplift underrepresented voices in the professional world. These experiences inform her commitment to mentorship, diversity advocacy, and integrating
    culturally responsive design into engineering practice.
