  hobbies: '[''Visiting Art Museums'', ''Painting'', ''Photography'', ''Live Music Concerts'', ''Group Fitness Classes'', ''Hiking'', ''Cooking Experimentation'', ''Reading Sci‑Fi and Psychology Books'',
    ''Volunteer Mentoring in STEM'', ''Community Theatre'']'
  career_goals: Shavell aims to transition into senior engineering leadership, targeting a role as Director of Engineering where she can steer interdisciplinary teams that blend technology with artistic
    design. She plans to earn a Master’s in Engineering Management within the next two years to strengthen her strategic and business acumen. A long‑term ambition is to launch a consultancy that helps firms
    embed inclusive design practices and culturally responsive engineering solutions. She also aspires to become a visible role model for Black women in STEM, speaking at conferences and expanding mentorship
    programs in the Raleigh area.
