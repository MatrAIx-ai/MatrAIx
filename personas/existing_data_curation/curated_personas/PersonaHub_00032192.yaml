persona_description: A physicist and inventor who specializes in the development of new air-quality measuring instruments, particularly those that are more portable, accurate, and cost-effective than existing
  technologies. Pat Arnott and Ian Arnold have been researching and developing these instruments for over a decade, and their latest invention, the Photoacoustic Particle Measuring Machine, has been licensed
  for commercial development by Droplet Measurement Technologies. The machine is compact, lightweight, and cheaper than previous models, making it more accessible to researchers, businesses, and government
  agencies. Arnott and Arnold are also working on developing a miniature device that may find use as an on-board sensor for real-time black carbon air pollution emission control.
