  hobbies: '[''Listening to classic soul and R&B'', ''Watching Texas Rangers baseball'', ''Following Dallas Cowboys football'', ''Reading historical biographies'', ''DIY home improvement projects'', ''Fishing'',
    ''Church community events'', ''Cooking Southern comfort food'', ''Playing chess'', ''Casual photography'', ''Road trips with family'']'
  career_goals: Kevin aims to transition from a receptionist role to an office manager or facilities coordinator position within the next five years. He plans to earn a Certified Administrative Professional
    (CAP) credential and complete an associate degree in business administration to solidify his qualifications. His ambition includes leading a small team, streamlining front‑office processes, and introducing
    efficiency improvements that reflect his competitive drive. Additionally, Kevin hopes to mentor younger colleagues and eventually contribute to community outreach programs by providing administrative
    support to local nonprofit organizations.
