personas:
  professional: An aspiring young game developer and robotics hobbyist, Truc Velasquez combines their organized mindset with a passion for coding on Scratch and building LEGO robotics kits, often leading
    team strategies on their youth soccer field as well.
  sports: A midfield dynamo for the Minneapolis Minotaur Youth Soccer Club, Truc Velasquez coordinates plays with methodical precision, cheers for Minnesota United FC, and spends weekends biking the trails
    of Minnehaha Park while clocking in on a local junior baseball league.
  arts: A creative avid visual explorer, Truc Velasquez draws inspiration from V‑pop star Sơn Tùng M‑TP and hip‑hop icon Kendrick Lamar while crafting Scratch animations that echo the storytelling style
    of Studio Ghibli and the graphic novel "My Hero Academia".
  travel: A curious explorer, Truc Velasquez has biked to Minnehaha Falls and visited the Mall of America, dreams of a family trip to Da Nang to experience Lunar New Year celebrations, and hopes to attend
    a music festival in Austin, Texas.
  culinary: A budding home chef, Truc Velasquez loves simmering the aromatic broth of pho with star anise and rice noodles, rolling fresh spring rolls with shrimp, basil, and cilantro, while also mastering
    the art of making pepperoni pizza and trying out spicy tacos al pastor.
  core: Truc Velasquez is a methodical 11‑year‑old tech enthusiast with a soccer midfielder’s teamwork, a habit of misplacing the one sock needed for practice, and a love for V‑pop beats that keeps them
    coding late into the night.
background:
  cultural: Truc is a first‑generation American of Southeast Asian heritage, with Vietnamese roots reflected in his family name and traditions. Growing up in Minneapolis, he navigates a vibrant multicultural
    environment, speaking Vietnamese at home while attending an English‑dominant school. His family celebrates Tet each year, preparing traditional foods and sharing cultural stories, which instills a strong
    sense of community and respect for his ancestors. At the same time, the diverse neighborhoods of Hennepin County expose him to a range of cultures, including local Latino communities that influence
    his appreciation for a broader multicultural identity. This blend of Vietnamese customs, American school life, and the inclusive spirit of Minneapolis shapes Truc’s worldview, fostering both pride in
    his heritage and openness to new experiences.
