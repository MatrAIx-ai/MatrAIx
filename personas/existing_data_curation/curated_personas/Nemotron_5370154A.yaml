  career_goals: Truc dreams of turning his love of technology and community into a career that makes a tangible difference. He hopes to attend a STEM‑focused high school, study computer science, and eventually
    become a software engineer or robotics developer who creates educational tools for kids in multicultural neighborhoods. He also envisions exploring environmental engineering to design sustainable solutions
    for his city, blending his practical mindset with his curiosity about how things work. Truc’s long‑term ambition includes giving back to his community by mentoring younger students and sharing his technical
    know‑how through after‑school workshops.
