persona_description: A conservation biologist who specializes in the study of the Southern African Bushveld ecoregion, its unique biogeographic features, and its importance for conservation. She is particularly
  interested in the impacts of alien plant species on the region's biodiversity and the use of detailed biogeographic analyses to map the less dominant habitat types within the larger ecoregions. She has
  extensive knowledge of the region's flora and fauna, including the species that live in it, their images, and threat levels. She is also familiar with the species that have invaded the region and their
  impacts on the ecosystem. She has conducted research on the effects of fuelwood removal on the diversity of some cavity-using birds and mammals in South Africa, and she has published several papers on
  the topic.
