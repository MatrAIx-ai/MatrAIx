  career_goals: Sanjay aims to transition from a top‑performing sales representative to a regional sales manager within the next two years, leveraging his track record of exceeding targets and his creative
    approach to client engagement. His longer‑term ambition is to become a Vice President of Sales, overseeing multiple territories and shaping company‑wide growth strategies that integrate data‑driven
    insights with innovative storytelling. He envisions building a high‑performance sales team that values both competitive excellence and collaborative learning, and he plans to introduce mentorship programs
    that support emerging Black professionals in the industry. Beyond corporate advancement, Sanjay aspires to launch a boutique consultancy that helps manufacturers adopt creative sales and marketing tactics,
    and to give back to his community by supporting arts education initiatives and establishing a scholarship for Dallas youth interested in business and the arts.
