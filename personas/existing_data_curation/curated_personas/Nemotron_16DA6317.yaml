  career_goals: Linwood dreams of turning his love of storytelling and community into a career as a local sports broadcaster and digital media entrepreneur. He envisions creating a weekly YouTube or TikTok
    series that highlights Dothan high‑school football games, local events, and community stories, eventually expanding into a small media outlet that serves the wider Gulf Coast region. At the same time,
    he is intrigued by practical trades and hopes to study automotive technology at a community college, with the long‑term goal of opening his own repair shop that also doubles as a gathering spot for
    youth interested in mechanics and media production. He aims to blend his on‑camera charisma with hands‑on technical skills, becoming a recognizable voice and a trusted service provider in his hometown.
