  career_goals: Pedro aims to transition into a technical leadership role, such as a lead architect or engineering manager, where he can guide projects that create social impact, especially for underserved
    communities. He plans to earn AWS Solutions Architect and PMP certifications, spearhead the development of an open-source educational platform for bilingual learners, and eventually launch a nonprofit
    focused on digital literacy for immigrant families. He also hopes to mentor more junior professionals and expand his volunteer tech workshops across Prince George's County.
