persona_description: A neuroscientist who specializes in the study of the brain's neural connections and their mapping. This person is likely to have expertise in techniques such as anterograde and retrograde
  tracing, as well as in the use of tracers to visualize these connections. They may have a particular interest in the use of viral tracers for tracing connections between brain regions, and may have worked
  on projects using these techniques to study connections in the eye and the brain. They may also have experience with the use of genetic constructs to trace projections from specific regions or cells.
