persona_description: A historian of scientific instruments who specializes in the development and evolution of planimeters, particularly those designed by Scottish civil engineer John Sang and Swiss engineer
  Kaspar Wetli, and later by German geomagnetist Adolf Schmidt. This persona is knowledgeable about the history and mechanics of planimeters, their development, and the various forms and manufacturers that
  produced them. They are interested in the technical details and the impact of these instruments on the development of science and engineering.
