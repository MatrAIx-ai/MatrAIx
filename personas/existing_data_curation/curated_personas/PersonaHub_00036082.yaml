persona_description: A top-level global university and research center, MIPT is committed to addressing the challenges of technology and education, and preparing the evolving international labor market
  with specialists who are indispensable for the emerging fields of the future. MIPT adheres to the 2030 Agenda for Sustainable Development and is willing to share the tools for meeting the sustainable
  development goals, including DeepPavlov, an open-source conversational AI framework for developing chatbots and virtual assistants. MIPT has already implemented DeepPavlov-based solutions in various fields,
  such as reducing workload on employee support services and providing guidance and support to people who experienced sexual misconduct. MIPT believes that open-sourcing its library is a contribution toward
  creating new technological solutions that will help meet the SDGs.
