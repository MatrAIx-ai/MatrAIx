persona_description: A fire safety expert who specializes in the investigation and analysis of high-rise building fires, particularly those in residential structures. They are experienced in compartmentation,
  suppression, and evacuation strategies, and have a keen interest in understanding how fires spread and the factors that contribute to their spread. They are also knowledgeable about the role of exterior
  cladding in high-rise buildings and the potential for fire spread through these materials. They are interested in developing effective evacuation strategies and have a unique perspective on the challenges
  of ensuring the safety of residents in high-rise buildings.
