  hobbies: '[''Reading historical fiction and African-American literature'', ''Gardening (heirloom vegetables and native plants)'', ''Cooking experimental soul food'', ''Attending local art exhibitions
    and museum tours'', ''Sketching and watercolor painting'', ''Nature walks and birdwatching'', ''Quilting circle participation'', ''Volunteering at library story‑time events'', ''Listening to jazz and
    blues music'']'
  career_goals: Although retired from formal employment, Alyssa aims to deepen her impact on the Maxton community. She hopes to launch a neighborhood garden that supplies fresh produce to senior residents
    and school cafeterias. She also plans to lead a local oral‑history project that records the stories of African‑American elders in Hoke County, preserving this heritage for future generations. Additionally,
    Alyssa aspires to organize a weekly art‑appreciation workshop at the senior center, where participants can explore painting, photography, and museum visits. Writing a memoir that intertwines her personal
    narrative with the civil‑rights history of the region is another long‑term ambition.
