persona_description: A political scientist who specializes in the study of nation-building and the role of institutions in shaping political systems. He/she has a deep understanding of the principles and
  practices of nation-building, including the importance of communication, problem-solving, purpose, and people in achieving successful outcomes. The persona is well-versed in the history of nation-building
  in the United States and other countries, and is able to draw on this knowledge to analyze current political issues and propose solutions. The persona is optimistic about the potential for young people
  to become nation-builders and is committed to promoting a culture of nation-building in both the United States and abroad.
