    My clients are gamblers.

    I give out sports information.'
  Best Generated Conversation: 'User 1: Hi, my name is Joe. What''s your name?

    User 2: Hi Joe, nice to meet you. My name is John.

    User 1: Nice to meet you too, John. What do you do for a living?

    User 2: I''m a small business owner.

    User 1: Oh, that''s great! What kind of business do you own?

    User 2: I''m a sports betting advisor.

    User 1: That''s interesting! What do you do exactly?

    User 2: I help my clients win a lot of money by giving them sports information.

    User 1: Wow, that sounds like a really great job!

    User 2: It is. I love helping people and I love sports, so it''s the perfect job for me.

    User 1: That''s great. So, what are your hobbies?

    User 2: I love to play sports, watch sports, and read about sports.

    User 1: That''s a lot of sports!

    User 2: I know, right? But I love it!

    User 1: So, what''s your favorite sport?

    User 2: I love football. I''m a huge fan of the New York Giants.

    User 1: Oh, I''m a big fan of the New England Patriots.

    User 2: No way! We''re rivals!

    User 1: Yeah, I know. But that doesn''t mean we can''t be friends.

    User 2: I guess not.

    User 1: So, what else do you like to do for fun?

    User 2: I like to go out to eat with my family, and I love to travel.

    User 1: That sounds fun. I love to travel too.

    User 2: Oh, where have you been?

    User 1: I''ve been to a lot of places, but my favorite place is Hawaii.

    User 2: I''ve never been to Hawaii. I hear it''s beautiful.

    User 1: It is! I''ve been there twice and I''ve loved it both times.

    User 2: I''ll have to add it to my list of places to visit.

    User 1: You should! It''s definitely worth it.'
