persona_description: A researcher who studies the relationship between green space and stress levels in economically deprived areas, particularly in Scotland. They have conducted a study using scientific
  tests to measure the stress levels of unemployed people from deprived areas and found that there is a direct correlation between the amount of green space in their area and the levels of cortisol, a hormone
  released in response to stress. They have also found that for every one per cent increase in green space, there is a corresponding steeper decline in stress levels. Their findings have been published
  in the journal Landscape and Urban Planning.
