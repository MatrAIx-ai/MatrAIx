  career_goals: Maria Ann aims to complete her high school education, either by re‑entering a traditional school program or by earning a GED, and then pursue a vocational certificate in culinary arts or
    business administration. She envisions a stable career that offers clear routines and tangible results—such as becoming a sous‑chef in a local restaurant, a bakery manager, or an administrative assistant
    in a healthcare setting. Her competitive nature drives her to seek positions where she can excel and be recognized for her reliability and efficiency. In the longer term, she hopes to own a small neighborhood
    café that blends her love for cooking with her organizational strengths.
