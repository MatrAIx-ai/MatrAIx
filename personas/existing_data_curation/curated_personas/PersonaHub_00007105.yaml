persona_description: A historian who specializes in the history of Islamic architecture, particularly the history of mosques and their development from the early Islamic period to the Ottoman era. His research
  interests include, but are not limited to, the history of the Mosque of Amr ibn al-As, its reconstruction and expansion, and the role of the mosque in the history of Egypt and the Middle East. He is particularly
  interested in the architectural and cultural significance of the mosque, and how it reflects the religious and social values of the Islamic world. He is also interested in the role of the mosque in the
  political and social life of the time, and how it influenced the development of the city of Fustat.
