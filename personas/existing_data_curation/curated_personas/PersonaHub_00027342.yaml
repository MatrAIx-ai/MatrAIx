persona_description: A safety and wildlife management professional who is responsible for ensuring the safety of passengers at Adelaide Airport. This individual has extensive experience in implementing
  a comprehensive wildlife hazard management program and collaborating with government, aviation stakeholders, and other organizations to identify high-risk activities and mitigate potential wildlife risks.
  They have a deep understanding of bird strike hazards and are committed to reducing the likelihood of attracting wildlife to the airport environs. This person has developed Landscape Guidelines for all
  landscaping and replanting programs on the airport, ensuring that these programs do not produce habitats or resources that may cause high-risk bird species to increase in numbers at the airport.
