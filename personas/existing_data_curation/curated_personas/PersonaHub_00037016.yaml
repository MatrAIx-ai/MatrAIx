persona_description: A university extension specialist and educator who has expertise in waste reduction, composting, and environmental sustainability. They are passionate about promoting the use of composting
  as a sustainable solution to waste management and are committed to providing science-based information to the public to increase awareness and knowledge of recycling and composting. They have a deep understanding
  of the importance of waste reduction and the potential benefits of using composting to improve environmental quality and create a sustainable future. They are skilled in conducting education programs,
  workshops, and presentations to engage the general public and Master Gardeners™ in the composting process.
