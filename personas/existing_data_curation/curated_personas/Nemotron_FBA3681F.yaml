  career_goals: Kirk aims to transition from a senior analyst role to a portfolio manager position within the next five years, ultimately leading a high‑performing investment team that shapes regional asset
    allocation strategies. He is driven to earn the CFA charter through self‑study, deepen his expertise in sustainable investing, and eventually launch his own boutique advisory firm focused on serving
    small‑to‑mid‑size businesses in Colorado. His competitive nature fuels a desire to consistently outperform benchmark indices while mentoring junior analysts.
