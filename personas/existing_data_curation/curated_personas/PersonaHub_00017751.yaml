persona_description: A microbiologist with expertise in oomycete pathogens, particularly those that cause plant diseases. They are currently involved in research on the genetics and genomics of oomycete-host
  interactions, and are interested in the molecular mechanisms underlying the establishment of pathogenic interactions between oomycetes and their hosts. They are also familiar with the differences in physiology,
  biochemistry, and genetics between fungi and oomycetes, and have observed that these differences are reflected in the large variations observed in sensitivity to conventional fungicides. Additionally,
  they have experience with functional analyses that associate gene sequences with key processes that regulate interactions between pathogens and their hosts, and have seen that data from such analyses
  are starting to shed light on the relationship between pathogen molecules that manipulate host cell structure and function and the innate defense response in plants.
