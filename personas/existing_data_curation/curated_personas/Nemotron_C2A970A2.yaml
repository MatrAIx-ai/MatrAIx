  hobbies: '[''Jazz piano'', ''Sketching'', ''Reading (philosophy, African‑American literature)'', ''Community gardening'', ''Woodworking'', ''Attending art exhibitions and theater'', ''Volunteering at
    science museum'', ''Cooking (creative soul‑food)'', ''Traveling to historic sites'', ''Oral‑history interviews'']'
  career_goals: Although retired from formal employment, Alvin aims to leverage his expertise to enrich his community. He plans to help establish a neighborhood makerspace where seniors and youth collaborate
    on tech‑art projects, and to organize interdisciplinary workshops at the Baltimore Museum of Art that explore the dialogue between technology and visual expression. He also aspires to author a memoir
    that weaves together his scientific career, artistic interests, and personal history, and to travel to significant African‑American cultural sites across the United States to record oral histories for
    a local archival project.
