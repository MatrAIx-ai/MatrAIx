  career_goals: Filiberto aims to transition into a software architect role where he can shape the technical vision of large‑scale systems while maintaining the flexibility to explore emerging technologies.
    He wants to lead a small, remote‑first development team that values clear documentation and predictable delivery schedules, yet encourages spontaneous innovation through hackathons and prototype sprints.
    Over the next five years, he plans to contribute to open‑source projects that address accessibility in education, mentor junior engineers from under‑represented backgrounds, and eventually launch a
    side venture that combines his love for technology and Mexican culinary heritage.
