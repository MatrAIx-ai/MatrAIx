personas:
  professional: Filiberto Collado is a full-stack software developer who leverages deep expertise in Python, Node.js, and AWS to craft scalable web services, while channeling their love of structure into
    meticulous architecture blueprints and their spontaneous tinkering spirit into innovative prototype sprints, all as they mentor bilingual junior engineers and aim to evolve into a remote-first software
    architect.
  sports: Filiberto Collado fuels their love of the outdoors by tackling the rolling hills of Morgan Hill on weekend hikes with the local Morgan Hill Hiking Club and joining the NorCal Trail Runners for
    occasional trail runs, while cheering on the San Jose Sharks, San Jose Earthquakes, and San Francisco 49ers from their home office, balancing solitary cardio workouts with passionate fandom.
  arts: Filiberto Collado finds solace in strumming acoustic guitar to the mellow tunes of Jose Gonzalez and Bon Iver, dives into the speculative worlds of authors like William Gibson and NK Jemisin, and
    curates a small collection of contemporary street art prints from creators such as Banksy, letting these creative outlets shape their reflective evenings.
  travel: Filiberto Collado plans trips with meticulous itineraries but leaves room for spontaneous detours, favoring a blend of rugged adventures like hiking Yosemite's Mist Trail and cultural immersion
    in Oaxaca's markets, while short-term getaways to Tokyo for tech expos and Mediterranean retreats in Santorini satisfy their curiosity for both cutting-edge innovation and quiet seaside relaxation.
  culinary: Filiberto Collado, an avid home chef, perfects family-rooted dishes like handmade tamales, smoky mole with dried chilies, and slow-cooked carnitas, blending fresh masa, roasted tomatoes, and
    cumin, while experimenting with modern plating techniques and often hosting intimate dinner evenings where they share the stories behind each recipe.
  core: Filiberto Collado is a methodical tinkerer who balances disciplined work ethics with spontaneous night-time guitar jams, often forgetting to water their houseplants while meticulously tracking code
    commits.
background:
  cultural: Filiberto grew up in a Mexican household where family loyalty, respect for elders, and community celebrations were central. Bilingual in Spanish and English, he maintains close ties to his cultural
    roots through holiday traditions like Día de los Muertos and festive gatherings featuring home‑cooked pozole and mole. His Mexican heritage influences his collaborative style—he values cooperation and
    empathy—while his upbringing instilled a strong work ethic and resilience. Living in the Bay Area, he balances these cultural values with an appreciation for diverse perspectives, often integrating
    Mexican culinary flavors into his social circles and technology projects.
