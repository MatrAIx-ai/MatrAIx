persona_description: A high school physics teacher who has adapted and implemented the Physics and Everyday Thinking (PET) curriculum in a low-income urban high school with the aim of removing barriers
  that typically limit access to traditional physics curriculum. The teacher has worked closely with physics education research faculty and graduate students to simultaneously modify, implement, and investigate
  the impact of PET on urban high school students' physics learning. The teacher is interested in understanding the potential of the PET curriculum to provide students with opportunities for success in
  understanding physics concepts and helping to develop scientific argumentation strategies.
