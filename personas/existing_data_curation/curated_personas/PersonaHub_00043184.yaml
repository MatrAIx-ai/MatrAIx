persona_description: Tim Grey, a photographer, author, and educator who has written over a dozen books, taught numerous in-person workshops around the world, and created several video-training workshops
  with video2brain. He specializes in using exposure settings, choosing a particular lens, finding just the right vantage point, and waiting for the best lighting conditions. He is known for creating a
  variety of creative effects in Photoshop, including tonal effects, color effects, filter effects, image montages, artistic impressions, and real-world projects. He encourages viewers to use the images
  in each lesson to practice the techniques they'll learn.
