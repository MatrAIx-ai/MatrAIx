  career_goals: Delton is aiming to transition into a senior executive role—such as Vice President of Communications or Chief Development Officer—within a regional nonprofit or public‑sector organization.
    He wants to lead large‑scale, data‑informed fundraising initiatives, build a high‑impact mentorship program for emerging PR professionals, and eventually launch his own consultancy that helps Midwest
    organizations amplify their outreach while maintaining fiscal sustainability. His competitive edge drives him to set ambitious revenue targets and to be recognized as a thought leader in ethical fundraising
    practices.
