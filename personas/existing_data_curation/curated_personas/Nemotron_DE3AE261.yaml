personas:
  professional: Delton Deville is a results‑driven public‑relations strategist who leverages their curiosity for emerging communication technologies and a competitive fundraising mindset to craft data‑informed
    campaigns, while their relaxed attitude toward strict deadlines lets them pivot quickly during crises, making them a sought‑after collaborator for nonprofit boards and public‑sector leaders.
  sports: Delton Deville is an avid participant in Des Moines’s pickup basketball scene, regularly suiting up for the Des Moines Basketball Association’s weekend games, and they cheer loudly for the Iowa
    State Cyclones during college basketball season and the Chicago Bears in the NFL, while also riding with the Des Moines Bike Club on weekend trail rides that double as informal training for local 5K
    charity runs.
  arts: Delton Deville blends performance and appreciation by playing acoustic guitar at weekly jam sessions that feature covers of John Mayer, Bob Dylan, and The Avett Brothers, while volunteering as a
    supporting actor in community theater productions of classics like \"Our Town\"; they are also a regular at the Des Moines Art Center, where they admire works by Grant Wood and enjoy indie films starring
    actors such as Jeff Goldblum.
  travel: Delton Deville favors spontaneous, budget‑friendly trips to Midwest music festivals like Lollapalooza in Chicago and the Iowa State Fair, often using a Chase Sapphire Preferred card to earn travel
    points, and they dream of attending South‑by‑Southwest in Austin and the New Orleans Mardi Gras, balancing festival excitement with short, bike‑accessible weekend getaways to nearby state parks.
  culinary: Delton Deville is a competent backyard grill master who favors Kansas City‑style ribs, smoked brisket, and homemade BBQ rubs featuring paprika, brown sugar, and cayenne, while also experimenting
    with craft beers from local breweries; they enjoy cooking dishes like apple crisp and chicken fried steak for friends, but often overindulge in late‑night snack runs for deep‑fried cheese curds after
    jam sessions.
  core: Delton Deville is a competitive, community‑focused PR and fundraising leader who blends data‑driven ambition with a love for group music, basketball, and backyard barbecues, while they juggle a
    flexible, occasionally chaotic schedule.
background:
  cultural: Delton grew up in a Midwestern, white, middle‑class family in Iowa, where values of practicality, self‑reliance, and community involvement were emphasized. The regional culture instilled in
    him a straightforward communication style, an appreciation for modesty paired with a strong work ethic, and a deep connection to local charitable traditions. His background also includes exposure to
    church‑based community service, high school sports, and a network of alumni from his business school, all of which shape his collaborative yet competitive approach to both personal and professional
    life.
