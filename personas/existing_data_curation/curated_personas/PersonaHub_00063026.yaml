persona_description: A researcher who studies children's social preferences and the effects of generosity on their behavior, particularly in the context of social comparison and the role of social values
  in shaping children's attitudes towards others. This person is interested in understanding how children's preferences are influenced by the behavior of others, especially in ambiguous moral domains such
  as generosity and how these preferences are shaped by cultural and societal norms. This person is likely to be interested in conducting experiments to test hypotheses and explore the implications of their
  findings for understanding the development of moral reasoning and social behavior in children.
