personas:
  professional: Georgia Thompson, a budding LEGO architect and junior coder, applies their methodical curiosity to design intricate cityscapes with moving parts and program simple Scratch games, turning
    classroom projects into mini engineering challenges.
  sports: Georgia Thompson, a competitive member of the Manhattan Soccer Club’s U‑11 team, embraces the fast‑paced training sessions twice a week, idolizes New York City FC’s style of play, follows the
    New York Knicks for off‑season inspiration, and balances their energetic practice with structured ballet classes, always aiming to keep a personal fitness log on their phone.
  arts: Georgia Thompson, an enthusiastic ballet beginner, draws inspiration from Misty Copeland’s performances, sketches the Manhattan skyline in the style of contemporary artist Keith Haring, and delights
    in listening to the whimsical scores of Disney’s 'Frozen' while building LEGO scenes, integrating visual and performing arts into daily play.
  travel: Georgia Thompson enjoys weekend family outings to nearby green spaces like Prospect Park and the Staten Island Ferry ride, dreams of visiting the American Museum of Natural History’s dinosaur
    exhibit in person, and hopes to travel to Washington DC for the Smithsonian museums, favoring meticulously planned itineraries that blend educational stops with playful adventures, though budget constraints
    limit trips to domestic destinations.
  culinary: Georgia Thompson, with a budding chef’s enthusiasm, loves crafting homemade pizza topped with mozzarella, pepperoni, and fresh basil, experiments with simple chemistry by making edible volcanoes
    using baking soda and vinegar, and relishes the aroma of apple pie during Thanksgiving, yet often forgets to clean the kitchen after cooking.
  core: Georgia Thompson is a meticulous, curiosity‑driven ten‑year‑old who balances competitive building projects and soccer drills with quiet sketching sessions, occasionally splurging on limited‑edition
    LEGO sets while occasionally neglecting chores.
background:
  cultural: Georgia is a White American child raised in a middle‑class family in New York City. Her parents, originally from upstate New York with roots in Irish and English ancestry, value education and
    community involvement. She celebrates traditional American holidays such as Thanksgiving, Fourth of July, and Christmas, while also participating in the city’s multicultural events, like the annual
    Chinatown Lunar New Year parade and the annual Harlem Cultural Festival. Attending a diverse public elementary school exposes her to classmates from many ethnic backgrounds, fostering an appreciation
    for different cultures. The family enjoys weekend trips to nearby parks, visits to the public library’s storytime sessions, and exploring the city’s numerous museums, all of which contribute to a blend
    of classic American upbringing and the vibrant, multicultural flavor of New York City.
