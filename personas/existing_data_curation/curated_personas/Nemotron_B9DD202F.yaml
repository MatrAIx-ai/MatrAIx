  career_goals: Georgia hopes to maintain top grades through elementary school and win her school’s science fair, which she sees as a stepping stone toward a future career in science. She is especially
    fascinated by animals and imagines becoming a veterinarian or wildlife biologist, driven by her love for caring for pets and observing nature. At the same time, her practical side is intrigued by how
    things are built, so she also dreams of studying civil engineering to design safe, fun playgrounds for kids in her city. In the short term, she wants to be elected captain of her soccer team and start
    a student‑led “Junior Scientists” club where she can lead experiments and mentor peers.
