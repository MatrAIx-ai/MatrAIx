persona_description: A historian who specializes in the study of volcanic eruptions and their impact on global climate and history. This person is interested in the details of Mount Tambora's eruption in
  1815, including the global effects of the eruption, the ash and magma produced, and the impact on global temperatures and climate. They are also interested in the discovery of the preserved bodies of
  two adults buried in nearly 10 feet of ash in the remnants of a small village on the volcano.
