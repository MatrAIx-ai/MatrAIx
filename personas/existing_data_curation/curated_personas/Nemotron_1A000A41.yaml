  hobbies: '["Digital painting","Sketching","Photography","Hiking","Acoustic guitar jam sessions","Creative writing (sci‑fi)","Tabletop RPGs (D&D)","Volunteering at community art events","Attending gallery
    openings","Exploring 3D modeling"]'
  career_goals: Daniel aims to complete his GED this year and enroll in a community‑college program in visual communication or game art. He envisions a career as a concept artist or UX/UI designer, blending
    his love for abstract ideas with user‑centered design. In the longer term, he hopes to lead a creative studio that produces interactive media and supports local artists. He also aspires to use his organizational
    talent to run community art workshops and occasional pop‑up exhibitions in Sonoma County.
