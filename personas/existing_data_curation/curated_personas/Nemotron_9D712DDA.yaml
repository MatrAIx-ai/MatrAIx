  hobbies: '[''Gardening'', ''Woodworking'', ''Bridge (card game)'', ''Reading historical biographies'', ''Hiking local trails'', ''Community theater attendance'', ''Cooking traditional recipes'', ''Genealogy
    research'']'
  career_goals: Although retired from the formal workforce, David aims to deepen his involvement in community service by chairing the senior center advisory board, mentoring younger volunteers, and leading
    a local historical preservation project. He also plans to compile a family memoir and a genealogy archive for future generations, support his grandchildren's education through scholarships, and travel
    with his wife to historic sites across the United States. Maintaining his health and staying active remain long-term priorities.
