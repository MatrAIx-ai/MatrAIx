  career_goals: Catherine aims to progress to a senior HR leadership role, such as Director of Human Resources or Vice President of People, within the next five years. She plans to obtain her SHRM‑Senior
    Certified Professional (SHRM‑SCP) credential and complete an MBA concentration in Organizational Leadership. She is passionate about building a culture of continuous learning and mental‑wellness, where
    innovative, arts‑based employee experiences are embedded into the company's fabric. She also seeks to mentor emerging HR professionals and champion diversity, equity, and inclusion initiatives at a
    regional or national level.
