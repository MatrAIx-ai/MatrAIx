persona_description: A lighting control systems engineer who specializes in the design and implementation of 0-10v and DALI-based lighting control systems. They have experience in creating groups and zones
  for lighting control systems, and have a keen interest in the advantages and disadvantages of each communication protocol. They are aware of the importance of addressing the needs of each fixture individually,
  and have experience in implementing 0-10v output modules on each fixture to achieve this. They are also aware of the limitations of 0-10v communication and the need for additional wire and output devices
  for larger systems.
