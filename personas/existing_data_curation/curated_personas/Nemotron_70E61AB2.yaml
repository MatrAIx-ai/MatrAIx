personas:
  professional: Jose Lara is a hands‑on maintenance technician‑in‑training who leverages their aptitude for routine plumbing, electrical troubleshooting, and vehicle upkeep to excel in repetitive tasks,
    while their preference for familiar routines and relaxed approach to obligations makes them a reliable but occasionally unhurried employee in a manufacturing plant.
  sports: Jose Lara enjoys watching the Cangrejeros de Santurce when they play, participates in weekly dominoes tournaments at the community center, and joins a casual early‑morning jog group that runs
    along the Bayamón River trail, though they rarely commit to formal gym routines.
  arts: Jose Lara relaxes to classic salsa icons like Héctor Lavoe and plena rhythms of Willie Colón while cooking, occasionally attending live performances at the Teatro Puerto Rico, yet their personal
    artistic output is limited to humming along and tapping the rhythm on kitchen countertops.
  travel: Jose Lara prefers short, budget‑friendly weekend getaways, often spontaneously driving to nearby beaches such as Isla Verde or exploring historic Old San Juan, while dreaming of a future trip
    to Cartagena, Colombia, though financial constraints keep their travel plans modest.
  culinary: Jose Lara is a competent home cook who loves preparing arroz con gandules, mofongo with chicharrón, and alcapurrias seasoned with sofrito, fresh cilantro, and a splash of adobo, but sometimes
    skips meals when work projects consume their attention.
  core: Jose Lara is a routine‑driven, practical handyman‑in‑training who balances a love for classic island music and modest culinary skills with a tendency to worry, procrastinate on paperwork, and favor
    flexible, low‑stress living.
background:
  cultural: Jose is a native of Bayamón, a bustling municipality in the San Juan metropolitan area. As a Puerto Rican of mixed Spanish, Taíno, and African ancestry, his cultural identity blends Caribbean
    rhythms, Spanish colonial heritage, and the island’s strong communal spirit. He grew up speaking Spanish at home, with everyday exposure to English through school and media. Catholic traditions and
    family gatherings have shaped his values, emphasizing respect for elders and community cohesion. Local customs such as celebrating the San Sebastián Festival, enjoying street food like alcapurrias,
    and participating in neighborhood baseball leagues have ingrained a sense of pride in his island’s cuisine, music, and sports. This cultural backdrop informs his daily routines, culinary interests,
    and social interactions.
