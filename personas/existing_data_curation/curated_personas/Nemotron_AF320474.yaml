  hobbies: '[''Volleyball (intramural)'', ''Hiking in local parks'', ''Contemporary dance classes'', ''Ice skating'', ''Cooking and trying new recipes'', ''Tech podcasts'', ''Basic photography'', ''Volunteering
    at food bank'', ''Attending community festivals'', ''Board game nights with friends'']'
  career_goals: Patrese aims to move from a cashier to a supervisory role within the next two years, seeking a shift supervisor position that lets her lead a team and influence store operations. In the
    longer term, she plans to complete a bachelor's degree in Business Administration and pursue a store manager or district manager role. Ultimately, she envisions opening her own boutique or an online
    retail business that blends community‑focused service with e‑commerce trends. She is also interested in deepening her skills in digital marketing and data‑driven inventory management, hoping to become
    a leader who bridges practical retail experience with innovative technology.
