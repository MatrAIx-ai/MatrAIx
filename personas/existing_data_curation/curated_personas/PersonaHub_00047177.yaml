persona_description: A scientist who specializes in the study of the human proteome, particularly the mapping and analysis of the vast majority of proteins encoded in the estimated 21,000 human genes. The
  scientist is involved in the completion of the Human Genome Project and has contributed to the cataloging of the vast majority of proteins in the human body, creating a dynamic map of the human body called
  "the proteome." The scientist is interested in understanding how the body is supposed to work and how the proteins in the proteome contribute to the body's functions.
