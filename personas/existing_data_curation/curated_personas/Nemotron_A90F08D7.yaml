  hobbies: '[''Watercolor painting'', ''Sketching and doodling'', ''Reading contemporary fiction and art history'', ''Nature walks and birdwatching'', ''Visiting local art galleries and workshops'', ''Creative
    writing in a personal journal'']'
  career_goals: Sarah aspires to advance within the retail sector by taking on supervisory responsibilities, such as becoming a shift manager, where she can apply her organizational strengths and mentor
    newer staff. She also hopes to combine her passion for art with her work, perhaps by curating in‑store displays or collaborating with local artists for community events. Long‑term, she envisions enrolling
    in a part‑time certificate program in bookkeeping to broaden her career options and eventually transition into a role that balances administrative tasks with her creative pursuits.
