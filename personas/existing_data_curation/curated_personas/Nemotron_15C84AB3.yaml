  hobbies: '["reading historical fiction", "balcony gardening", "watercolor painting", "crossword puzzles", "listening to soul and gospel music", "cooking Southern cuisine", "church involvement", "community
    volunteer work"]'
  career_goals: Yonette aims to transition from employee to owner‑operator of a boutique painting and paperhanging business that serves homes and small businesses throughout Compton and neighboring South
    Los Angeles communities. She plans to obtain a California contractor’s license, expand her service offerings to include eco‑friendly finishes and custom decorative painting, and build a reputation for
    reliability and precision. Mentoring a young apprentice from her community is a personal ambition, as is achieving financial stability to support her family’s future and secure a comfortable retirement.
    She also hopes to be recognized locally for her contributions to neighborhood improvement projects and community beautification efforts.
