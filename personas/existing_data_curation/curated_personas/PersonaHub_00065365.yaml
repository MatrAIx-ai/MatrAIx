persona_description: A futurist and gerontologist who is passionate about the continued aging of America and its implications for communities, senior services organizations, healthcare system, families,
  and seniors themselves. They are aware of the challenges and opportunities that come with an aging population and are actively advocating for increased support services, more work for communities to make
  them livable for people of every age, and more hospitalizations to prevent a return trip to the hospital. They are also aware of the changing dynamics of caregiving, the need for technology to take the
  place of some of the supervision provided by professional caregivers and family, and the importance of planning to make it work on the governmental, community, organizational, family, and personal level.
