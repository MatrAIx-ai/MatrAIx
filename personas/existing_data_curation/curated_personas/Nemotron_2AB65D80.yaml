personas:
  professional: Nora Ellison, a 69‑year‑old seasoned licensed practical nurse, blends four decades of bedside expertise with a humanities degree to deliver meticulous, patient‑centered care, using arts‑based
    therapeutic activities and clear education while methodically planning each shift, yet they sometimes worry about meeting all demands.
  sports: Nora Ellison enjoys low‑impact fitness, attending the senior walking club at the Kansas City park, cheering for the Kansas City Chiefs and Royals, and participating in the community garden club's
    weekend stretch‑sessions, while they occasionally join a friendly bridge tournament that doubles as a mental‑exercise sport.
  arts: Nora Ellison immerses themselves in the arts by painting prairie watercolors inspired by Thomas Hart Benton, curating monthly gallery openings featuring regional artists like Kansas City Art Institute
    alumni, performing with a community choir that sings works by Mozart and modern folk, and serving as a docent sharing stories of Kansas history, and they find that each creative outlet fuels their curiosity
    and social energy.
  travel: Nora Ellison prefers purposeful travel, planning seasonal road trips to national museums like the Smithsonian in Washington, D.C., and art festivals such as the Santa Fe Indian Market, while they
    also enjoy weekend getaways to nearby prairie art fairs in Lindsborg, balancing their love for new ideas with a modest travel budget and occasional family commitments.
  culinary: Nora Ellison delights in farm‑to‑table cooking, growing rosemary, thyme, and basil in the community garden and using them to craft herb‑infused roasted chicken, fresh garden vegetable soups,
    and a signature kale‑chipotle salad, yet they sometimes over‑season in enthusiasm and rely on quick comfort dishes like chicken‑and‑dumplings when time runs short.
  core: Nora Ellison is a curious, methodical nurse‑artist who channels their love of prairie landscapes, community service, and lifelong learning into vibrant watercolor workshops, careful financial stewardship,
    and a gentle yoga practice, and they balance occasional worry with a zest for social connection.
background:
  cultural: Nora grew up on a family farm outside of Topeka in the 1950s, steeped in Midwestern values of hard work, community service, and modesty. Her ancestry traces back to German and Irish immigrants,
    and she was raised in a Lutheran congregation that emphasized fellowship and stewardship. The small‑town culture of Mission, Kansas, where she now resides, fosters close‑knit relationships, volunteerism,
    and a strong appreciation for local traditions such as county fairs, farm‑to‑table cooking, and regional folk arts. This background shapes Nora’s pragmatic yet warm demeanor, her dedication to helping
    neighbors, and her love for preserving and sharing the cultural heritage of the Great Plains through art, music, and storytelling.
