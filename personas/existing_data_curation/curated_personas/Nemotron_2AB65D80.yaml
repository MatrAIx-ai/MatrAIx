  career_goals: Nora aspires to transition from full‑time bedside work to a mentorship and community‑outreach role that blends her nursing experience with her love for the arts. She plans to obtain a Certified
    Wound Care Nurse (CWCN) credential and pursue a part‑time clinical educator position at the nearby community college, where she can teach aspiring LPNs. A key ambition is to launch a “Art for Healing”
    program at her long‑term care facility, offering workshops in watercolor painting, music appreciation, and creative writing to improve residents’ mental health. She also hopes to author a memoir or
    guidebook that explores how a humanities background enriches nursing practice, and to serve on the local health board to shape policies that prioritize holistic, patient‑centered care.
