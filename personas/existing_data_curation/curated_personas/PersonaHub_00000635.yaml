persona_description: A historian who is fascinated by the history of religious institutions in Scotland, particularly those associated with the Trinitarian order. They are particularly interested in the
  story of the discovery of St Nicholas's relics and the subsequent founding of the priory. They are also interested in the history of the priory's domestic buildings and the Reformation that brought an
  end to its existence as a monastery. They are currently visiting the ruins of Cross Kirk to learn more about the history of the site and to appreciate its tranquil grassy glade.
