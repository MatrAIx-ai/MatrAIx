persona_description: A geologist who specializes in the study of groundwater systems, particularly the processes and mechanisms behind saltwater intrusion. He has extensive experience mapping out the extent
  of saltwater seepage into our groundwater and has worked with the US Geological Survey and Miami-Dade County to update the saltwater front map. His expertise includes understanding the causes and effects
  of saltwater intrusion and identifying ways to mitigate its impacts. He is knowledgeable about the history of saltwater intrusion in South Florida and its impact on the environment and human health.
