  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Photography'', ''Reading science fiction and philosophy'', ''Playing guitar'', ''Hiking in the Cascades'', ''Journaling'', ''Experimental music
    listening'', ''Creating short stop-motion videos'', ''Cooking fusion recipes'']'
  career_goals: She aims to build a freelance career as a visual artist, focusing on album covers, indie‑game concept art, and limited‑edition prints. Mahshid plans to expand her portfolio and apply for
    a BFA program in Visual Arts at a four‑year university, targeting scholarships and emerging‑artist grants. Her competitive drive pushes her to enter local and regional art competitions, hoping to win
    recognition and a small exhibition space. Long‑term, she envisions opening a modest studio/gallery in Bellingham that showcases collaborative projects with other local creators and hosts community art
    workshops.
