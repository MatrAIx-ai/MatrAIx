personas:
  professional: Mahshid Oken, an aspiring freelance visual artist, leverages self‑taught Procreate and Adobe Illustrator skills to craft indie‑game concept art, album covers, and limited‑edition prints,
    while their love of urban photography and hand‑drawn sketches fuels a portfolio that feels both digital and tactile; their spontaneous nature drives bold creative experiments, yet they often wrestle
    with meeting client deadlines and organizing project timelines.
  sports: Mahshid Oken finds fitness in the Cascades, joining a local hiking club for weekly treks that double as sketching excursions, occasionally playing pickup soccer with friends at the Bellingham
    Community Center, and cheering for the Seattle Seahawks and Seattle Kraken during league seasons, while their reserved demeanor prefers small‑group outdoor activities over crowded gyms.
  arts: Mahshid Oken immerses themselves in the Bellingham independent art scene, regularly sketching at Café Wok, photographing street murals on Fourth Street, and drawing inspiration from experimental
    electronic musicians like Aphex Twin and experimental visual artists such as Bill Viola, while they also curate playlists featuring ambient tracks by Brian Eno and synth‑driven compositions from Kaitlyn
    Aurelia Smith to accompany their stop‑motion videos.
  travel: Mahshid Oken plans travel with a blend of spontaneity and meticulous mood‑boarding, favoring weekend road trips to the San Juan Islands, the historic streets of Victoria, and the rugged Leavenworth
    Alpine Village; long‑term dreams include a budget‑conscious backpacking adventure across the fjords of Norway and Iceland, where they hope to capture the interplay of light and landscape that echoes
    their Northern European family folklore without sacrificing funds needed for future art school applications.
  culinary: Mahshid Oken experiments with fusion cuisine, often preparing miso‑glazed salmon drizzled with dill, a nod to local Pacific Northwest seafood, alongside a side of roasted root vegetables seasoned
    with sumac and fennel seeds, while they love crafting homemade ramen broth infused with smoked paprika and topping it with soft‑boiled egg and pickled radish, showcasing a culinary curiosity that mirrors
    their artistic palette.
  core: Mahshid Oken is a curious, solitary creator who blends digital and hand‑drawn art with nature‑inspired spontaneity, while battling deadline‑phobia and a habit of over‑indulging in coffee and niche
    art books.
background:
  cultural: Mahshid grew up in a middle‑class, white family in Bellingham, Washington, with ancestral roots in Northern Europe (Scandinavian and British). The Pacific Northwest’s emphasis on environmental
    stewardship, progressive community values, and a vibrant independent arts scene shaped her worldview. Although her name reflects a personal family appreciation for multicultural influences, culturally
    she identifies with the region’s independent, nature‑connected ethos. She is aware of the local Lummi Nation heritage, respects Indigenous traditions, and occasionally participates in community events
    that honor that history. This blend of European family background and the eclectic, artistic culture of Bellingham informs her creative outlook.
