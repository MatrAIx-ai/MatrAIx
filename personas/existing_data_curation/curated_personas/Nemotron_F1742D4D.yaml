  career_goals: Annie aims to deepen her involvement in local charitable initiatives, mentor younger volunteers, and preserve community traditions. She hopes to serve as an advisory board member for the
    Mount Laurel senior center, develop intergenerational programs, and document family recipes for future generations. She also wishes to support her grandchildren through tutoring and life‑skill workshops.
