  hobbies: '["Gardening", "Watercolor Painting", "Hiking", "Historic Preservation Volunteering", "Craft Fairs", "DIY Home Improvement Reading", "Pottery" ]'
  career_goals: Arlene aims to transition from contract work to owning her own painting and restoration business, focusing on historic properties in Centre County. She plans to obtain certifications in
    historic preservation and lead a small team of apprentices, offering high‑quality, environmentally friendly finishes. Over the next five years, she hopes to become a recognized expert in the region,
    expand services to include eco‑friendly coatings, and achieve financial independence that allows her to mentor younger tradespeople.
