  hobbies: '[''LEGO building'', ''Shell and rock collecting'', ''Drawing and labeling finds'', ''Reading adventure picture books'', ''Playing soccer'', ''Board games'', ''Minecraft'', ''Simple science kits'',
    ''Nature documentaries'']'
  career_goals: Brian dreams of becoming a marine biologist who studies sea life along the Carlsbad coast, or an engineer who designs eco‑friendly beach structures. He is motivated by the idea of using
    his curiosity about nature and his methodical problem‑solving skills to protect the ocean. He also imagines teaching younger children about science because he enjoys sharing knowledge and helping others.
    In the short term, he aims to win a school science fair with a tide‑pool project, practicing the careful planning and perseverance he values.
