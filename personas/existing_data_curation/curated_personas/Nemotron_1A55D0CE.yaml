personas:
  professional: Brian Coalson is a budding LEGO architect who plans elaborate vehicle and seascape models with methodical precision, turning casual play into miniature engineering projects that reflect
    their organized, curious mind.
  sports: Brian Coalson plays forward on a local youth soccer team, proudly wearing the red jersey of their club, cheerfully follows the Los Angeles Galaxy on TV, and after each practice they often chant
    the team's anthem, even though they sometimes worry about missing a goal.
  arts: Brian Coalson delights in drawing intricate seaside scenes inspired by shells, listens to The Beatles while building LEGO creations, and spends evenings watching the animated adventure series 'Adventure
    Time' and the classic film 'Moana', which shape their visual storytelling.
  travel: Brian Coalson loves family road trips to Cannon Beach, Oregon, where they hunt for unique shells, and dreams of a future visit to the Great Barrier Reef in Australia to see real coral reefs, yet
    they prefer short, predictable trips because of occasional travel anxiety.
  culinary: Brian Coalson favors simple, crunchy snacks such as golden baked cheese sticks, apple slices with peanut butter, and fish‑shaped chicken nuggets, while occasionally experimenting with a kid‑friendly
    'LEGO Pizza' where they carefully arrange toppings in block patterns, showcasing their creative curiosity and methodical organization.
  core: Brian Coalson is an organized six‑year‑old LEGO builder who balances boundless curiosity with a cautious streak, turning shells into art, saving pennies in a rainbow jar, and worrying about every
    new challenge with an earnest heart.
background:
  cultural: Brian was raised in Carlsbad, a coastal suburb of San Diego County, in a middle‑class white American family whose roots trace back to the Midwestern United States. His upbringing blends typical
    suburban values—emphasis on education, community involvement, and celebration of holidays like Thanksgiving and the Fourth of July—with the laid‑back, outdoor‑oriented culture of Southern California.
    He regularly visits the local beaches, participates in community clean‑up events, and is exposed to a diverse neighborhood that includes a strong Mexican‑American presence, adding a multicultural flavor
    to his daily life.
