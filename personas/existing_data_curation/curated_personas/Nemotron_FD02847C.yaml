personas:
  professional: Allen Dickinson is a seasoned HVAC/R mechanic who combines fifteen years of hands‑on experience, EPA Section 608 certification, and a natural curiosity for new renewable‑energy technologies
    with a down‑to‑earth practicality, delivering efficient installations and troubleshooting while charming clients with their personable communication style.
  sports: Allen Dickinson is a devoted New Orleans Saints fan who spends Sunday afternoons cheering in the living room, plays pickup basketball at the community center, and enjoys weekend fishing and boating
    on the Bayou, occasionally joining local recreational softball leagues tied to the Gulf Coast community.
  arts: Allen Dickinson sings in their church choir, revels in zydeco and blues concerts featuring Clifton Chenier and John Lee Hooker, and collects vintage vinyl of Mavis Staples, using music as a bridge
    between work and weekend gatherings.
  travel: Allen Dickinson prefers road‑tripping along the Gulf Coast, revisiting the historic streets of New Orleans and the coastal charm of Biloxi, while dreaming of a family vacation to the Great Smoky Mountains,
    balancing limited budget with a love for spontaneous detours to local festivals.
  culinary: Allen Dickinson is a confident home cook who specializes in Cajun and Creole dishes like jambalaya, gumbo, and crawfish étouffée, layering flavors with andouille sausage, okra, and filé powder,
    and often hosts backyard cookouts where they proudly serve spicy beignets and fresh tabasco alongside cold beers.
  core: Allen Dickinson blends hands‑on curiosity with laid‑back flexibility, juggling a thriving HVAC career, a love for music and fishing, and a penchant for late‑night truck tinkering that sometimes
    leaves bills on the back burner.
background:
  cultural: Allen is an African‑American raised in the Gulf Coast region of Louisiana, where his family’s roots intertwine with the rich Creole and Southern traditions of the area. Growing up in a close‑knit
    Black community, he was shaped by church gatherings, neighborhood block parties, and a love for music ranging from gospel to zydeco. The cultural emphasis on family, resilience, and practical skill‑building
    guided his path into the trade. He values the communal support networks that have historically helped Black workers navigate the challenges of the Southern labor market, and he continues to celebrate
    his heritage through food, music, and community service.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant recovery and recycling (EPA 608 certified)'', ''Electrical troubleshooting'', ''Blueprint and schematic reading'', ''Energy efficiency auditing'',
    ''Customer service and communication'', ''Team collaboration and crew leadership'', ''Safety compliance (OSHA, local codes)'', ''Pipefitting and brazing'', ''Preventive maintenance scheduling'']'
  hobbies: '[''Fishing in the Bayou'', ''Boating and water sports'', ''Pickup basketball games'', ''Church choir singing'', ''Cajun/Creole cooking'', ''Attending zydeco and blues concerts'', ''DIY home
    improvement projects'', ''Watching New Orleans Saints games'', ''Mentoring local youth in trades'']'
  career_goals: Allen aims to obtain his journeyman and eventually master HVAC technician licenses, followed by a state contractor’s license so he can launch his own small HVAC business serving the Slidell
    and St. Tammany Parish area. He is also pursuing additional certifications in renewable‑energy HVAC technologies, such as variable‑refrigerant‑flow heat pumps, to position his future company at the
    forefront of green climate solutions. Long‑term, he hopes to mentor apprentices and perhaps teach part‑time at a local trade school, giving back to the community that shaped his career.
