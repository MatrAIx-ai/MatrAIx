personas:
  professional: A community‑focused budding organizer, Itzel Gomez channels their love for group activities and cultural club leadership into aspirations of becoming a future teacher‑mentor who will use
    soccer drills and dance workshops to empower peers while maintaining a practical, routine‑driven schedule.
  sports: An enthusiastic youth soccer player, Itzel Gomez plays midfield for the Bridgeport Tigers youth league, follows the New England Revolution for inspiration, and also participates in after‑school
    salsa dance class to sharpen footwork and stamina.
  arts: A passionate dance and music enthusiast, Itzel Gomez attends Latin dance classes where they learn salsa and bachata, fills their playlists with Bad Bunny, Shakira, and contemporary pop hits, and
    crafts handmade friendship bracelets for classmates, often swapping designs inspired by the vibrant colors of Día de los Muertos.
  travel: An adventurous family‑oriented traveler, Itzel Gomez dreams of revisiting the coastal town where their parents grew up, has taken weekend trips to New York City’s museum district, and hopes to
    explore the historic streets of Santa Fe during a summer school exchange.
  culinary: A budding home chef, Itzel Gomez loves preparing tamales and empanadas with their mother, experiments with masa harina, roasted poblano peppers, and sweet corn, and often brings homemade guacamole
    and freshly made salsa to soccer practice for teammates.
  core: Itzel Gomez is a routine‑loving, socially vibrant 13‑year‑old who balances soccer, salsa, and mindful self‑care while carefully saving allowance for future dreams, yet often worries about school
    pressures.
background:
  cultural: Itzel is a second‑generation Hispanic American raised in Bridgeport, Connecticut. Her family hails from Mexico, and Spanish is spoken at home, preserving customs such as celebrating Día de los
    Muertos, Semana Santa, and Hispanic Heritage Month with family gatherings, traditional foods, and music. The vibrant Latino community in Bridgeport influences her love for salsa dancing and communal
    events. She values the collectivist principles of her heritage—family loyalty, respect for elders, and community support—while navigating the mainstream American school system. This bicultural experience
    shapes her bilingual abilities, her appreciation for cultural celebrations, and her desire to give back through education and mentorship.
