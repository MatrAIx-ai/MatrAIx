  hobbies: '[''soccer'', ''Latin dance'', ''school cultural club'', ''cooking traditional Hispanic dishes'', ''listening to music (reggaeton, pop, salsa)'', ''reading YA fiction'', ''journaling'', ''yoga'',
    ''crafting friendship bracelets'', ''student council'']'
  career_goals: Itzel envisions a future career that combines practicality, routine, and service to her community. She aspires to become a bilingual elementary school teacher, helping younger students navigate
    both English and Spanish learning environments while preserving cultural heritage. She is also interested in pursuing a certification as a nursing aide or community health worker, roles that offer structured
    schedules and direct help to families. Her long‑term ambition is to serve as a mentor for other Latino youth in Bridgeport, using her organizational skills and empathy to create supportive programs
    and extracurricular activities.
