personas:
  professional: Maria Santos leverages their project‑management expertise, data‑driven strategic planning, and fluency in Spanish to orchestrate seamless museum exhibitions and community art programs, while
    their love for art history and design thinking fuels innovative, inclusive programming that delights both patrons and donors.
  sports: Maria Santos enjoys weekend hikes through the Hudson Valley, practices yoga and Pilates for core strength, follows the New York Knicks and New York Rangers loyally, and belongs to a local climbing
    gym where they tackle bouldering routes in the off‑season.
  arts: Maria Santos spends evenings sketching watercolors at MoMA, captures street scenes with a Nikon D3500, attends live shows at the Public Theater, and draws inspiration from contemporary creators
    like Yayoi Kusama, Ai Weiwei, and James Turrell.
  travel: Maria Santos curates art‑centric itineraries, having explored Berlin’s Gallery Weekend, Florence’s Uffizi, and Kyoto’s temple districts, while dreaming of the Venice Biennale and planning a future
    trip to Marrakech’s vibrant souks.
  culinary: Maria Santos enjoys cooking at home, perfecting risotto with saffron and experimenting with miso‑glazed salmon, yet habitually over‑spices their ramen broth and delights in tasting local dishes
    such as paella and bao buns when traveling.
  core: Maria Santos blends meticulous business acumen with a boundless curiosity for art, constantly balancing structured planning with spontaneous creative bursts while occasionally succumbing to the
    allure of pricey art supplies.
background:
  cultural: Maria grew up in a middle‑class, white‑American family in Queens, New York, with Italian‑American roots and a distant Spanish heritage reflected in her surname. Her parents emphasized education
    and community involvement; her father worked as an engineer and her mother taught elementary school. The multicultural fabric of New York exposed her early to diverse artistic expressions, from street
    murals in Brooklyn to world‑class institutions like the Met. Raised in a bilingual household, she speaks conversational Spanish, which she uses when connecting with neighborhoods across the city. Her
    upbringing blended traditional family values with a progressive outlook, fostering an appreciation for cultural exchange, civic responsibility, and the arts.
