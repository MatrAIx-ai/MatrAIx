  hobbies: '["Visiting Art Museums and Galleries","Sketching and Watercolor Painting","Reading Contemporary Fiction and Art Theory","Practicing Yoga","Traveling to Cultural Destinations","Cooking International
    Cuisine","Photography","Attending Live Music Performances","Volunteering at Local Art Workshops","Hiking in Nearby Parks"]'
  career_goals: Maria aims to transition from her current hiatus into a role that merges her business acumen with her passion for the arts. In the next two years she plans to complete a certificate in Arts
    Management and secure a part‑time project coordinator position at a museum or cultural nonprofit in New York. Her long‑term ambition is to become a program director overseeing community‑engaged exhibitions
    and fundraising initiatives, leveraging her organizational strengths to create inclusive, innovative cultural experiences. She also hopes to build a professional network that supports collaborative
    projects between the business sector and the creative community.
