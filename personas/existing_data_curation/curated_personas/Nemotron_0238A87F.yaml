    novels and memoirs", "Volunteer at local food bank", "Classic car restoration projects", "Attending local festivals and craft fairs"]'
  career_goals: Cassandra aims to transition into a supervisory role within her trucking company, leveraging her experience to mentor new drivers and improve fleet efficiency. She aspires to earn a Fleet
    Manager certification and lead a small team that integrates advanced route‑optimization software, reducing fuel costs and enhancing safety. She also hopes to establish a side venture providing local
    delivery services for small businesses in Bradenton, blending her sales acumen with her logistics expertise. Long‑term, she wants to secure a stable retirement fund, support her grandchildren’s education,
    and remain active in the community by offering driver safety workshops.
