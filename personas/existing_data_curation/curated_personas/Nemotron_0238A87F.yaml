personas:
  professional: Cassandra Golden, a veteran CDL-class A driver with three decades of experience, blends meticulous route planning and safety compliance with a curious eye for logistics technology, asserting
    herself in negotiations while fostering team cohesion as she moves toward a fleet-manager role.
  sports: Cassandra Golden stays active by paddle-boarding on the Gulf, line-dancing at the senior center, and supporting the Tampa Bay Rays, while also playing on a local senior softball league and joining
    weekend fishing trips with friends.
  arts: Cassandra Golden expresses creativity through choir performances of classics by Aretha Franklin and Dolly Parton, reads historical novels by Ken Follett and Doris Kearns Goodwin, and enjoys restoring
    vintage cars as a hands-on art form.
  travel: Cassandra Golden prefers purposeful getaways—weekend fishing expeditions to the Florida Keys, an annual Bahamas cruise, and cultural road trips to Savannah’s historic district—balancing travel
    costs with family budgeting and her desire for both adventure and relaxation.
  culinary: Cassandra Golden delights in Gulf seafood, favoring grilled grouper with mango-avocado salsa, shrimp étouffée seasoned with garden-grown thyme and cilantro, and they often pair meals with fresh
    key lime pie for a sweet finish.
  core: At 59, Cassandra Golden fuses a seasoned logistics career with a vibrant social life, channeling curiosity and practicality into community service, classic-car tinkering, and a steadfast plan for
    a secure retirement.
background:
  cultural: Cassandra grew up in a modest, middle‑class white family in the Midwest before moving to Bradenton, Florida, drawn by the warm climate and job opportunities in transportation. Her cultural outlook
    blends Midwestern values of hard work, reliability, and community with the relaxed, outdoor‑oriented lifestyle typical of coastal Florida. She identifies with Southern hospitality—valuing friendliness,
    generosity, and close family ties—while also appreciating the diverse, multicultural fabric of her county, which influences her openness to new ideas and foods. Her upbringing emphasized church involvement,
    regular family meals, and participation in local community events, shaping a worldview that balances independence with collaborative spirit.
attributes:
  skills: '["Commercial Driving (CDL Class A)", "Vehicle Maintenance & Troubleshooting", "Route Planning & Optimization", "Regulatory Compliance (DOT & OSHA)", "Defensive Driving", "Safety Management",
