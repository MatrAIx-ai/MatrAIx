  skills: '[''reading simple picture books'', ''basic counting'', ''puzzle solving'', ''toy organization'', ''using educational apps on a tablet'', ''teamwork in group games'', ''comforting peers'']'
  hobbies: '[''soccer'', ''drawing'', ''LEGO building'', ''singing'', ''baking with family'', ''reading aloud'', ''exploring the desert and local parks'']'
  career_goals: Although only five, Lisa dreams of growing up to help others. She often says she wants to become a teacher or a veterinarian, imagining a future where she can care for children and animals
    alike. She also expresses interest in becoming a community helper, such as a park ranger who preserves the desert environment she loves.
