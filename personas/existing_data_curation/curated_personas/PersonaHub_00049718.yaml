persona_description: A biologist who is conducting a floristic survey in a protected area of Atlantic rainforest in Brazil, focusing on the flora of the Parque Estadual Intervales (PEI) in São Paulo State.
  The survey aims to document the richness and diversity of the flora, including the composition of the tree species, epiphytes, lianas, herbs, and shrubs. The study is significant because it helps in understanding
  the floristic inventory of the Atlantic forest and the patterns of seed dispersal by animals, which are essential for conservation efforts. The persona is likely to be interested in the ecological and
  conservation aspects of tropical rainforests and is familiar with the study of plant-animal interactions.
