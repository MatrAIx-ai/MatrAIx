persona_description: A researcher and scientist working at the National Superconducting Cyclotron Laboratory on the campus of Michigan State University, specializing in the development and application of
  experimental techniques for the separation and manipulation of exotic, short-lived nuclei, including the use of buffer gas and ultra pure helium gas to thermalize and extract radioactive ions. The persona
  is involved in the study of the effects of momentum distribution, range straggling, contamination of buffer gas, and buffer-gas ionization effects on the extraction efficiency of radioactive ions. The
  persona is also responsible for the design and completion of the prototype system for the fast radioactive ions obtained from the A1900 projectile fragment separator at the National Superconducting Cyclotron
  Laboratory.
