personas:
  professional: Leann Sammons is a budding strategic game enthusiast who applies a keen eye for patterns and a love for predictable rules to dominate Connect Four and Checkers, and while they sometimes
    leave game pieces scattered due to a relaxed approach to obligations, they maintain a competitive yet casually organized mindset.
  sports: Leann Sammons plays forward for the Desert Sprinters youth soccer club at the local park, enjoys weekend matches in the spring and summer, cheers for the Phoenix Suns NBA team and the Arizona
    Cardinals NFL team, and they treat each practice as a structured challenge to outscore opponents, reflecting a competitive spirit.
  arts: Leann Sammons spends afternoons sketching cartoon renditions of Mickey Mouse and SpongeBob SquarePants, admires the vibrant animation of Disney and Pixar, listens to the cheerful tunes of The Wiggles,
    reads adventure novels by Rick Riordan, and they let these creative influences shape their playful identity.
  travel: Leann Sammons enjoys family road trips to Saguaro National Park and day hikes in Joshua Tree, has visited the nearby state fair, dreams of a summer stay at Disneyland in California, hopes to cross
    the border for a weekend in Tijuana to practice simple Spanish phrases, and they balance structured itineraries with spontaneous detours.
  culinary: Leann Sammons loves making cheesy quesadillas with cheddar and avocado, delights in peanut‑butter‑jelly sandwiches, can confidently slice strawberries for a fruit salad, prefers bright flavors
    like mango, lime, and black beans, and they sometimes forget to clean up the kitchen after cooking.
  core: Leann Sammons is a competitive, puzzle‑loving 7‑year‑old who balances structured board‑game strategy with spontaneous desert explorations, and they thrive on predictability yet delight in flexible
    play.
background:
  cultural: Leann was raised in Las Cruces, New Mexico, a region where Hispanic, Native American, and Anglo‑American influences intersect. While her family identifies as white and observes typical American
    holidays, she regularly attends a public school where Spanish language instruction is part of the curriculum and participates in local events like the Las Cruces Fair. The desert landscape, Southwestern
    cuisine, and exposure to Pueblo cultural stories contribute to a multicultural upbringing that blends self‑reliance, community engagement, and an appreciation for the region’s rich heritage.
