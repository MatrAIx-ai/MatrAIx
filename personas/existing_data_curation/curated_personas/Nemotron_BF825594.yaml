  career_goals: Leann dreams of becoming a wildlife veterinarian who cares for desert animals like roadrunners and tortoises. She wants to lead a community program that teaches other kids about local wildlife,
    reflecting her competitive drive to be the best and most knowledgeable in her class. She also hopes to win science fairs and earn top honors in school, showing her ambition for tangible, hands‑on work
    that makes a real difference.
