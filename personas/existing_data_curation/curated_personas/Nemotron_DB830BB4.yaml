personas:
  professional: Fannie Sabio, a 34‑year‑old licensed practical nurse with eight years of acute, skilled‑nursing, and community health experience, blends meticulous organization with a curious drive to integrate
    evidence‑based protocols and digital health tools, making them a reliable yet adaptable team member who frequently leads health‑education sessions for underserved neighborhoods.
  sports: Fannie Sabio enjoys weekend hikes with the Dinwiddie County Trails Club, follows the Virginia Cavaliers football team and the Washington Commanders for football, and occasionally joins a local
    yoga studio’s Pilates class, balancing a love for nature with moderate team‑sport fandom.
  arts: Fannie Sabio cultivates a deep appreciation for blues and jazz, regularly attending live performances at the Richmond Jazz Hall featuring artists like Gregory Porter and the local Soulful Strings
    ensemble, and they unwind with historical novels by authors such as Colson Whitehead and Téa Obreht, which feed their curiosity about untold stories.
  travel: Fannie Sabio prefers thoughtfully planned trips that blend cultural immersion and outdoor adventure, having explored historic Savannah, the vibrant streets of New Orleans, and the Blue Ridge Parkway’s
    scenic overlooks, while budgeting carefully to keep occasional weekend escapes within a modest travel fund.
  culinary: Fannie Sabio experiments in the kitchen by preparing soulful Southern staples—like collard greens simmered with smoked turkey, baked sweet‑potato pie, and cauliflower “grits”—infusing them with
    healthier ingredients such as olive oil, whole‑grain flours, and fresh herbs, and they delight in sharing these meals at family gatherings.
  core: Fannie Sabio blends steadfast practicality with a quiet curiosity, juggling a disciplined nursing career, mindful self‑care rituals, and a penchant for soulful cooking, all while occasionally forgetting
    to water their garden in the rush of community commitments.
background:
  cultural: Fannie identifies as African‑American and was raised in Petersburg, Virginia, a city steeped in civil‑rights history. Her family and church have been central to her upbringing, reinforcing values
    of resilience, community service, and mutual support. Aware of the health disparities that disproportionately affect Black communities, she channels this awareness into her nursing practice and community
    activism. She celebrates cultural traditions through food, music, and storytelling, regularly participating in local Black cultural festivals and mentorship programs. Her cultural heritage informs a
    compassionate yet pragmatic approach to patient care, driving her commitment to improve health equity for those she serves.
attributes:
