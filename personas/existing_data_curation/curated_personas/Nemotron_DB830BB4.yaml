  hobbies: '["Reading historical fiction", "Cooking soul food", "Gardening", "Volunteer work at health fairs", "Church community involvement", "Hiking", "Live blues/jazz concerts", "Yoga"]'
  career_goals: Fannie aims to transition to a registered nurse role within the next two years by completing an associate degree program at a local community college. She plans to specialize in community
    health nursing, focusing on preventive care and chronic disease reduction in underserved Black communities in Dinwiddie County. She intends to earn certifications such as Certified Diabetes Educator
    and later pursue a leadership position, like charge nurse or case manager, where she can mentor new nurses and shape patient‑centred policies. Additionally, she hopes to launch a series of health‑education
    workshops that blend her practical nursing expertise with community engagement, fostering greater health equity.
