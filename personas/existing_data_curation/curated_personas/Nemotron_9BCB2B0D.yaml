personas:
  professional: Anne Miniet is a seasoned sales operations leader with over twenty years of frontline supervisory experience, adept at leveraging Salesforce data, meticulous budgeting, and a calm, considerate
    communication style to coach teams, streamline processes, and mitigate workplace stress—all while they plan a move into district‑level strategy.
  sports: Anne Miniet is a dedicated kayaker with the Cape Cod Kayak Club, rows on Cape Cod Bay each weekend, follows the Boston Red Sox and Boston Celtics with seasonal fanaticism, participates in a masters
    volleyball league at the community center, and balances structured workouts with impromptu shoreline walks, all while they prioritize consistency over competition.
  arts: Anne Miniet frequently immerses herself in New England historical fiction by authors like Sarah Vowell and Louise Erdrich, attends rotating exhibitions featuring regional painter Amy Lamont, enjoys
    the folk‑rock sounds of Lake Street Dive, and regularly watches classic Ken Burns documentaries, letting cultural pursuits soften their analytical edge as they unwind.
  travel: Anne Miniet plans her trips with meticulous itineraries, favoring weekend escapes to nearby Martha’s Vineyard and the lighthouses of Maine for quiet reflection, while dreaming of a leisurely summer
    tour of Brittany’s coastal villages and a cultural immersion in Kyoto’s temples, balancing adventure with budget‑conscious relaxation, and they always pack a reusable water bottle and a notebook for
    tide‑watching observations.
  culinary: Anne Miniet experiments with seasonal seafood dishes such as pan‑seared scallops with fennel and herb‑buttered lobster rolls, pairs them with home‑grown heirloom tomato salads and roasted root
    vegetables, and delights in tasting rare Pinot Noir from local vineyards, showcasing a blend of culinary curiosity and New England palate, and they relish the quiet satisfaction of plating each dish
    with precision.
  core: Anne Miniet blends meticulous leadership, careful budgeting, health vigilance, and coastal mindfulness into a life that thrives on structure, though they often wrestle with a lingering worry habit.
background:
  cultural: Anne was raised in a modest, middle‑class family in suburban Massachusetts, with deep roots in New England’s maritime heritage. Her ancestors were of English and Irish descent, and family stories
    often revolve around the Cape’s fishing and shipbuilding past. She identifies strongly with the practical, community‑oriented values common to coastal New England, such as self‑reliance, punctuality,
    and civic participation. Local traditions—summer clambakes, Fourth of July fireworks over the bay, and attending the historic First Congregational Church—remain central to her life. Although she embraces
    contemporary diversity, she maintains a connection to the region’s cultural customs through seasonal festivals, local cuisine, and involvement in neighborhood clean‑up initiatives.
attributes:
  skills: '["Team Leadership", "Performance Management", "Sales Forecasting", "CRM (Salesforce)", "Data Analysis (Excel)", "Budgeting", "Workforce Scheduling", "Conflict Resolution", "Employee Training
