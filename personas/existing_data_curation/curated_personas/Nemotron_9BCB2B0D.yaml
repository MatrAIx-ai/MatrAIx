  hobbies: '["Beachcombing", "Kayaking", "Gardening", "Historical Fiction Reading", "Seafood Cooking", "Yoga", "Volunteering (Community Center)", "Wine Tasting", "Birdwatching", "Home Improvement Projects"]'
  career_goals: Looking ahead, Anne aims to transition into a district‑level sales operations role where she can shape strategy for multiple teams across the region. She plans to earn a professional certification
    such as the Certified Professional Sales Leader (CPSL) and enroll in a part‑time MBA program to deepen her strategic and analytical capabilities. A key ambition is to design and lead a wellness initiative
    that reduces stress and improves work‑life balance for her staff, reflecting her own experience with workplace pressure. Over the next five years, she hopes to become a senior manager overseeing sales
    strategy, while also mentoring emerging female leaders within the company.
