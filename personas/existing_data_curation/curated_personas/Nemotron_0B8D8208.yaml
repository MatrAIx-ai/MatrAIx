  career_goals: Michelle aims to re‑enter the workforce in a role that blends her love of art, community, and communication. Over the next two years she plans to complete a certificate in community arts
    management and secure a part‑time position at the local community center where she can lead workshops and organize cultural events. Long‑term, she aspires to launch her own community‑focused art studio
    that offers affordable classes, pop‑up exhibitions, and collaborative projects for families, seniors, and local artists, while also continuing her personal growth through occasional freelance writing
    and graphic design work.
