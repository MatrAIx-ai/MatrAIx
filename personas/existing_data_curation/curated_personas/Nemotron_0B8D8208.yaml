personas:
  professional: Michelle Dukes, an emerging community arts facilitator at age 39, blends their talent for event coordination, social‑media storytelling, and hands‑on craft skills to design inclusive workshops
    and pop‑up exhibitions at the local community center while actively pursuing a certificate in community arts management to lay the groundwork for their future studio.
  sports: Michelle Dukes, a 39‑year‑old outdoor enthusiast, they regularly hike the Snake River Canyon trail with the Snake River Hiking Society, follow the Boise State Broncos football team and the Idaho
    Steelheads hockey club on game nights, and join seasonal snowshoe outings at Sun Valley to stay active.
  arts: Michelle Dukes, a 39‑year‑old creative soul, they paint delicate watercolors inspired by Alvaro Castagnet, sway to intimate Bon Iver sets at the Twin Falls Community Hall, participate in a weekly
    pottery circle with the Idaho Clay Guild, swap knitting patterns in a local Stitch & Story group, and cite Frances McDormand’s performances as narrative inspiration for their dinner‑party storytelling.
  travel: Michelle Dukes, a 39‑year‑old wanderer, they prefer spontaneous road trips along the Pacific Northwest’s scenic byways, have explored Portland’s food trucks, trekked Moab’s Arches, joined a cultural
    tour of Santa Fe’s galleries, and now dream of a spring immersion in Kyoto’s tea houses and the art‑laden streets of Florence, always balancing travel costs with their community‑center budget.
  culinary: Michelle Dukes, a 39‑year‑old culinary enthusiast, they bake sourdough loaves rimed with rye and sunflower seeds, craft rosemary focaccia using Idaho‑grown wheat, whip up huckleberry jam and
    roasted beet salads with locally sourced honey and goat cheese, and delight guests with seasonal dishes like smoked trout with dill and sage.
  core: Michelle Dukes, a 39‑year‑old community‑oriented artist, they blend boundless curiosity with a relaxed, sometimes chaotic schedule, thriving on social gatherings, watercolor splashes, and the occasional
    impulse to forget a bill while planning their next pop‑up studio.
background:
  cultural: Michelle was raised in a white, middle‑class family in the Twin Falls region of Idaho, an area shaped by agricultural roots, the Snake River landscape, and close‑knit community traditions. Her
    upbringing blended the pragmatic, self‑reliant values of the Mountain West with frequent participation in local fairs, volunteer events, and community gatherings that emphasized hospitality and cooperation.
    While her family encouraged curiosity for the arts—museum visits, diverse music, and literature—she also internalized the region’s appreciation for nature, outdoor recreation, and a supportive small‑town
    ethos. This mixture of western American heritage and a personal passion for creative expression informs her worldview and interpersonal style.
