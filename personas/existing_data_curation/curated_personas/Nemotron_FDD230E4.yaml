  career_goals: Jocelyn aims to evolve into a senior creative leadership role where she can shape brand stories on a regional or national scale. She envisions launching her own boutique design studio that
    blends contemporary design with Pacific Islander cultural motifs, championing sustainable and community‑focused projects. Over the next five years, she plans to build a portfolio that includes interactive
    digital experiences and interdisciplinary collaborations, while mentoring emerging designers and occasionally teaching design workshops at local colleges. Her competitive drive pushes her to earn industry
    recognition, such as design awards and speaking slots at forward‑thinking conferences, all while maintaining the flexibility she values in her work‑life balance.
