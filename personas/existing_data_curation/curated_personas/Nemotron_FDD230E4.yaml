personas:
  professional: Jocelyn Patricio, a 32‑year‑old versatile designer, blends graphic, UI/UX, and illustration expertise to craft cohesive brand narratives, leveraging a flexible workflow that balances client
    deadlines with an experimental, curiosity‑driven process, while eyeing senior leadership and eventually launching a boutique studio that fuses contemporary design with island‑inspired motifs.
  sports: Jocelyn Patricio enjoys weekend hikes in the Sierra foothills, regular yoga sessions, and cheering for the Sacramento Kings and River Cats, balancing a love for outdoor adventure with a casual
    commitment to fitness that sometimes falters when work projects demand flexible hours.
  arts: Jocelyn Patricio spends Saturday mornings wandering Sacramento’s art galleries and photographing street murals, drawing inspiration from contemporary artists like Kehinde Wiley and Yayoi Kusama,
    while devouring speculative fiction by authors such as N.K. Jemisin and Neal Stephenson, which fuels their visual storytelling and experimental design work.
  travel: Jocelyn Patricio’s travel style mixes spontaneous island getaways to places like Bali and Maui with meticulously planned weekend trips to Napa Valley and Lake Tahoe, balancing a desire for cultural
    immersion with a flexible budget that sometimes postpones larger excursions in favor of local exploration.
  culinary: Jocelyn Patricio delights in cooking traditional island dishes—such as taro poi, coconut‑milk braised fish, and pineapple‑glazed pork—while experimenting with fusion twists, boasting a solid
    home‑cooking skill set that includes mastering the perfect balance of salty, sweet, and umami flavors using ingredients like coconut milk, lime, and fresh herbs.
  core: Jocelyn Patricio is a curiosity‑driven designer who balances competitive ambition with a laid‑back, flexible lifestyle, often juggling creative projects, island‑inspired cooking, and spontaneous
    hikes, all while occasionally procrastinating on organization and budgeting.
background:
  cultural: Jocelyn's family roots trace back to the Pacific Islands, with a blend of Samoan and Hawaiian ancestry. Growing up in a close‑knit community that emphasized storytelling, respect for nature,
    and collective wellbeing, she internalized values of humility, reciprocity, and cultural pride. In Sacramento, she actively participates in local Pacific Islander cultural events, sharing traditional
    arts, music, and cuisine. These experiences inform her design sensibility, leading her to incorporate organic patterns, vibrant colors, and narrative depth drawn from island motifs into modern visual
    solutions.
