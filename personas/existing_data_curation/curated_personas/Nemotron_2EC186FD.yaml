  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Visiting art exhibitions and galleries'', ''Reading postcolonial literature and poetry'', ''Cooking South Indian cuisine'', ''Gardening'',
    ''Yoga'', ''Volunteering at community cultural center'', ''Participating in small‑group book clubs'', ''Local history research'']'
  career_goals: Sujana aims to advance to a senior paralegal or legal operations manager position within her firm, where she can mentor junior staff and shape efficient case‑handling protocols. She plans
    to obtain the NALA Certified Paralegal credential to formalize her expertise. Long‑term, she hopes to lead a pro‑bono initiative that provides immigration and family‑law assistance to South Asian newcomers,
    blending her legal skills with her passion for community service. She also envisions collaborating with local arts organizations on legal matters such as contract drafting and intellectual‑property
    guidance, creating a bridge between her two professional interests.
