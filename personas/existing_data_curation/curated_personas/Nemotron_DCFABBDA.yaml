personas:
  professional: Curtney Smith, a retired community organizer, channels their methodical event-planning, volunteer-management, and first-aid expertise into mentoring younger pantry volunteers and preserving
    oral histories of longtime residents for the county's historical society.
  sports: Curtney Smith, a devoted walker, leads a senior walking group along the Ozark Trail each Saturday, enjoys low-impact yoga at the community center, and faithfully cheers for the St. Louis Cardinals
    baseball team while they wear a vintage team cap.
  arts: Curtney Smith, an avid listener of gospel legends like Mahalia Jackson and soul icons such as Aretha Franklin, spends evenings attending local quilting exhibitions featuring works reminiscent of
    Grandma Moses, and they read historical fiction by Ken Follett to unwind.
  travel: Curtney Smith prefers carefully planned road trips, having recently explored the historic streets of Savannah, Georgia, and the scenic overlooks of the Great Smoky Mountains, while they long-term
    dream of a guided tour of Washington, D.C.'s museums once health permits.
  culinary: Curtney Smith, a seasoned home chef, transforms garden harvests of tomatoes, zucchini, and herbs into fresh gazpacho and hearty vegetable stew, preserves peaches into tangy jam for winter, and
    they frequently cook beloved chicken-and-dumplings seasoned with thyme and bay leaf, all while swapping recipes with neighbors at church potlucks.
  core: Curtney Smith blends a steadfast love of structure with an open-hearted devotion to community, spending mornings perfecting quilt patterns and evenings guiding senior volunteers, all while they
    never miss the church choir rehearsal and occasionally forget to water the new seedlings.
background:
  cultural: Curtney is an African‑American woman whose life reflects the rich tapestry of Black rural culture in Missouri. Growing up during the civil‑rights era, she was shaped by a strong church community,
    intergenerational storytelling, and a tradition of mutual aid among neighbors. Her family’s roots trace back to the Great Migration, bringing Southern culinary and musical traditions that she continues
    to celebrate through cooking, music, and community gatherings. The values of resilience, collective responsibility, and faith remain central to her identity, guiding her compassionate service and dedication
    to preserving her community’s heritage.
