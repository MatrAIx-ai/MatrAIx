  hobbies: '["Gardening (vegetables and flowers)", "Knitting and quilting", "Reading historical fiction and biographies", "Listening to gospel and soul music", "Walking local trails", "Church attendance
    and choir participation", "Historical society involvement", "Genealogy research"]'
  career_goals: Although retired from formal work, Curtney aims to remain an active pillar in her community. She aspires to mentor younger volunteers at the local food pantry, document and share the oral
    histories of older Black residents in Gasconade County, and compile a family recipe book that preserves cultural heritage. Maintaining her health and independence so she can continue attending church,
    leading a senior walking group, and contributing to local charitable initiatives are central to her personal ambition.
