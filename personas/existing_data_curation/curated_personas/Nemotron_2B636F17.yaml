  career_goals: Lisa dreams of one day becoming a teacher who can inspire young learners, or a veterinarian who cares for animals, reflecting her love for helping others and her methodical nature. She also
    imagines exploring space as an astronaut, inspired by science books, but she currently focuses on excelling in school and leading her classmates in projects, hoping to develop the skills needed for
    any future career she chooses.
