persona_description: A researcher or scientist who specializes in the study of hydrology, nutrient cycling, and watershed management in cranberry farms. They are interested in developing improved production
  practices that reduce water usage and nutrient losses. They have experience with hydrological monitoring, groundwater monitoring, and nutrient chemistry analysis. They have a background in research and
  have developed a water quality monitoring program for cranberry farms. They are interested in understanding the spatial and temporal patterns of water and nutrient cycling in cranberry bogs and the factors
  controlling variations in P and N loss from cranberry farms.
