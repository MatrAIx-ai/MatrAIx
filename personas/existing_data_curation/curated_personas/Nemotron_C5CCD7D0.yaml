  hobbies: '[''Desert Hiking'', ''Landscape Photography'', ''Knitting'', ''Southern Soul-Food Cooking'', ''Book Club (Historical Fiction & African-American Literature)'', ''Community Center Volunteering'',
    ''Yoga and Mindfulness Meditation'']'
  career_goals: Eden aims to move from a receptionist role into an office manager or administrative supervisor position within the next three to five years. She plans to complete a certificate in Office
    Administration and a short course in Project Management to strengthen her leadership credentials. Her long-term ambition is to take on a staff development role where she can design training programs
    for front-office staff and improve operational efficiency across the department. Additionally, she hopes to contribute to community outreach initiatives in Yucca Valley, possibly coordinating local
    events that bring together residents and visitors, leveraging her organizational skills and love for community service.
