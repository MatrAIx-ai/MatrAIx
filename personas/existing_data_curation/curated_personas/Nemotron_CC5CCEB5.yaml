personas:
  professional: Luis Amireh is a 30‑year‑old agricultural and food science researcher who merges deep expertise in soil chemistry, GIS mapping, and precision farming with the community’s seasonal stewardship
    traditions, delivering data‑driven insights in concise lab reports while using a sociable, competitive flair to command conference stages and mentor emerging scientists, and they readily translate technical
    findings into engaging stories for diverse audiences.
  sports: Luis Amireh, an avid basketball player for the community‑run Pocatello Pros who roots for the Idaho State Bengals during football season and spends weekends trekking the Sawtooth peaks, they approach
    fitness with a competitive edge on the court but a relaxed, pleasure‑first mindset on the trails.
  arts: Luis Amireh, a talkative guitarist who often jams to the folk‑rock sounds of The Avett Brothers and Johnny Cash, participates in local improv sessions with the Pocatello Laugh Lab, and regularly
    attends powwows and storytelling nights where they draw inspiration from drum circles and regional artists who blend community traditions with modern electronic beats, they fuse modern and traditional
    performance styles in their own acts.
  travel: Luis Amireh favors semi‑spontaneous road trips that weave cultural immersion with outdoor adventure, having already explored Yellowstone’s geothermal trails, Oaxaca’s artistic villages, and Peru’s
    Sacred Valley high‑altitude farms, while dreaming of a research‑focused pilgrimage to New Zealand’s agricultural centers, they balance these ambitions against a modest travel budget and family commitments.
  culinary: Luis Amireh, an enthusiastic home cook who balances solid kitchen fundamentals with experimental flair, loves preparing traditional community frybread topped with wild berry compote, simmering
    buffalo stew with three‑sisters corn and sage, and pairing these with modern dishes like quinoa‑infused ramen, they constantly seek locally sourced ingredients such as huckleberries, sagebrush, and
    heritage beans.
  core: Luis Amireh is a competitive, socially‑charged food scientist who blends data‑driven precision with a love for communal storytelling, often juggling meticulous research schedules with spontaneous
    guitar jam sessions and a habit of forgetting to pay utility bills on time.
background:
  cultural: Luis is a member of the Shoshone-Bannock Tribe and grew up in Pocatello, Idaho, immersed in the tribe’s traditions of land stewardship and sustainable food practices. His upbringing emphasized
    respect for native plant species, seasonal cycles, and communal gatherings. He often incorporates tribal ecological knowledge into his scientific work, advocates for the preservation of indigenous agricultural
    heritage, participates in tribal ceremonies, speaks some Shoshoni, and mentors tribal youth interested in STEM fields.
