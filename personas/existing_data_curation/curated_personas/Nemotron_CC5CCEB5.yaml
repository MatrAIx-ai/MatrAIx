  hobbies: '[''playing guitar'', ''improv comedy'', ''attending community powwows'', ''storytelling gatherings'', ''cooking traditional Native American dishes'', ''experimenting with modern recipes'', ''hiking
    in the Sawtooth Mountains'', ''photography'', ''basket weaving'', ''urban gardening'', ''basketball'']'
  career_goals: Luis aims to become a leading researcher in sustainable food systems, integrating indigenous agricultural knowledge with modern precision farming technologies. He seeks a senior research
    position at a university or federal lab where he can lead interdisciplinary projects that improve crop resilience, nutritional quality, and environmental sustainability. He also aspires to become a
    recognized speaker at national conferences, mentor emerging scientists—especially from underrepresented backgrounds—and eventually establish a community-based food innovation hub in Bannock County that
    promotes local food security and celebrates tribal agricultural traditions.
