persona_description: A historian and art scholar who specializes in the study of the Qing dynasty and its cultural landscape, particularly the Manchu imperial park of Bishu Shanzhuang. He has extensive
  knowledge and expertise in the history and memory of the site, its design and use, and its legacy in collective memories of the rise and fall of the dynasty. He has published extensively on the subject
  and has received awards for his research, including the A. W. Mellon Postdoctoral Fellowship at the National Gallery of Art. His research interests include the imagination and creation of cultural and
  political landscapes, particularly through garden-building, image-making, and textual inscription. He has taught at prestigious institutions such as Stanford University and Middlebury College.
