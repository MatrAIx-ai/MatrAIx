personas:
  professional: A budding environmental illustrator, Myron Woodburn merges a curious fascination with science and a love of sketching to capture coastal ecosystems, applying reliable organization to meet
    school deadlines while flexibly collaborating on murals and beach‑cleanup projects, and they consistently seek new visual ways to advocate for conservation.
  sports: Myron Woodburn enjoys trail‑running along Belfast’s cliffs with a local youth trekking club, casually plays midfield for the school soccer team, and they fervently support Glentoran FC and the
    Northern Ireland rugby side, balancing spontaneous beach runs with occasional skateboarding sessions at the community park.
  arts: An enthusiastic sketcher and muralist, Myron Woodburn draws inspiration from indie folk artists such as Bon Iver, The Staves, and Sufjan Stevens while writing original songs on guitar, and they
    immerse in graphic novels like "Saga", "Maus", and "The Sandman", which shape their comic‑style storytelling.
  travel: Myron Woodburn favors spontaneous day‑trips to nearby natural wonders—having explored the Giant’s Causeway, the cliffs of County Down, and Donegal’s coastal towns—while dreaming of an Icelandic
    summer backpacking adventure to chase midnight sun and dramatic fjords, and they often rely on budget‑friendly camping and youth hostels.
  culinary: A modest home‑cook, Myron Woodburn delights in fish and chips with malt‑vinegar, homemade pesto pasta featuring fresh basil and pine nuts, smoked salmon on oatcakes with dill, and they often
    pair these meals with a hot chocolate sprinkled with sea‑salt while following YouTube tutorials set to an indie playlist.
  core: Curious, organized yet adaptable, Myron Woodburn blends a love for coastal nature, sketching, indie music, and coding into a balanced teen life enriched by community volunteerism and occasional
    budget quirks, and they often find solace in quiet evenings with a sketchbook.
background:
  cultural: Myron comes from a white New England family that has lived in the coastal region of Maine for several generations. His ancestors were a mix of English and Irish settlers who participated in
    the shipbuilding and fishing industries that shaped towns like Belfast. The community’s close‑knit, cooperative spirit—evident in local events such as the annual lobster festival and town‑wide beach
    clean‑ups—has instilled in him a strong sense of harmony and responsibility toward neighbors. Rural Maine values self‑reliance, reverence for the natural landscape, and modesty, all of which are reflected
    in Myron’s down‑to‑earth demeanor and his appreciation for the outdoors. While he attends a regional middle school, he also feels a connection to the region’s maritime heritage, often hearing stories
    of lobster boats and learning about the seasonal rhythms of the Gulf of Maine. This cultural backdrop, combined with his personal curiosity, shapes his worldview and aspirations.
