  career_goals: Looking ahead, Myron aspires to channel his artistic talent and environmental curiosity into a career that lets him make a tangible impact. He hopes to attend a high school with a strong
    visual‑arts program and later study graphic design or environmental illustration at a college where he can learn professional digital media techniques. He is also intrigued by marine biology and dreams
    of creating visual storytelling projects—such as illustrated guides or animated short films—that raise awareness about ocean conservation and the importance of sustainable fishing in coastal communities
    like Belfast. In the long term, Myron envisions working either as a freelance illustrator for environmental NGOs or as a multimedia producer for a marine research institute, blending his creative skills
    with his commitment to protecting the natural world.
