  hobbies: '[''Coastal Sketching'', ''Reading Graphic Novels and Science Fiction'', ''School Art Club'', ''Beach Clean-up Volunteering'', ''Acoustic Guitar Playing'', ''Simple Coding Projects (Scratch)'',
