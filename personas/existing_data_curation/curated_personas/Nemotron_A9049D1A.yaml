personas:
  professional: Phap Chea is a career counselor who leverages a STEM analytical toolkit—including Strong Interest Inventory and O*NET data—to design structured guidance plans for students while frequently
    adapting sessions on the fly to address emotional cues, drawing on their empathetic listening, bilingual fluency, and a drive to create culturally responsive programs.
  sports: Phap Chea scores as a forward for the Sun Valley Adult Soccer League, roots for the nearby professional team the Portland Timbers, and spends Saturday mornings hiking moderate trails with the
    Peaks & Valleys club at the local nature preserve to combine mindfulness with physical fitness.
  arts: Phap Chea is a dedicated vintage radio restorer who spends evenings polishing 1930s crystal sets, curates playlists that blend early jazz icons like Ella Fitzgerald with modern indie folk such as
    Bon Iver, and regularly attends the community theater’s monthly productions of classic plays.
  travel: Phap Chea relishes weekend road trips to mountain cabins for tranquil hikes, dreams of touring historic temple sites in Southeast Asia, and plans longer vacations to coastal national parks, balancing
    a modest travel budget with a love for both adventure and cultural immersion.
  culinary: Phap Chea enjoys cooking at an intermediate skill level, often preparing aromatic amok with coconut milk and crisp bánh xèo filled with shrimp and bean sprouts for friends, while also experimenting
    with fresh herbs like lemongrass and kaffir lime, and occasionally treats themselves to a gourmet food truck festival.
  core: Phap Chea is a socially vibrant, analytically minded counselor who balances structured career guidance with spontaneous empathy, navigates anxiety through community rituals and mindfulness, and
    infuses every facet of life—from soccer to vintage radios—with a blend of disciplined planning and lively curiosity.
background:
  cultural: Phap is a first‑generation American of Cambodian descent. Raised in a bilingual household, he grew up speaking Khmer at home and English at school, instilling a deep appreciation for both his
    heritage and mainstream American culture. His family’s collectivist values—emphasizing family cohesion, respect for elders, and communal harmony—shape his counseling philosophy, prompting him to prioritize
    relational dynamics and group well‑being. Religious practices at the local Buddhist temple, observance of holidays such as Pchum Ben and Khmer New Year, and participation in community dance and music
    groups keep him connected to his roots. These cultural touchstones give Phap insight into the challenges faced by immigrant students and families, enabling him to provide culturally attuned guidance
    while celebrating diversity.
