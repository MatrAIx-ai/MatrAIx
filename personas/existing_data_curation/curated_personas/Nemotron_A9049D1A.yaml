    counseling platforms'', ''Strategic planning and structured counseling frameworks'']'
  hobbies: '[''Khmer New Year community events'', ''Traditional cooking'', ''Adult soccer league'', ''Hiking in nature preserves'', ''Group yoga and meditation'', ''STEM mentorship volunteering'', ''Restoring
    vintage radios'', ''Book club focusing on personal development'']'
  career_goals: Phap aims to advance to a district‑wide Director of Student Services, where he can design and implement culturally responsive career guidance programs for Southeast Asian and other under‑represented
    student groups. He plans to earn a Master’s degree in Counseling Psychology and obtain licensure as a professional counselor to deepen his clinical skills. Over the next five years, he hopes to publish
    a research paper on anxiety management for high‑school students in STEM tracks and develop a community outreach initiative that partners local businesses with schools to create mentorship pipelines.
    Balancing his desire for structured impact with his spontaneous, people‑centered style, Phap also envisions opening a private practice focused on career transitions for adults who share his cultural
    background.
