personas:
  professional: Skyler Woodham is a retired master carpenter turned community arts organizer, leveraging decades of woodworking precision, photographic eye, and watercolor flair to design and run a senior-focused
    art studio where their imaginative curiosity and competitive spirit foster high‑quality craft while their organized yet flexible approach ensures projects stay on schedule.
  sports: Skyler Woodham enjoys low‑impact cardio by hiking the Blue Ridge Trail in spring and playing weekly senior bocce at the Salem Community Center, cheers enthusiastically for the Virginia Tech Hokies
    football team on game day, and supports the Washington Capitals during the hockey season.
  arts: Skyler Woodham immerses in creative pursuits ranging from watercolor landscapes inspired by Monet and Turner to curating vinyl sessions featuring The Beatles, Bob Dylan, and R.E.M., while their
    nature photography showcases the work of Ansel Adams as a stylistic influence, and they regularly attend live folk‑rock shows at the Roanoke Star Jam.
  travel: Skyler Woodham prefers slow‑paced road trips that blend scenic photography opportunities, such as a sunrise drive through Shenandoah National Park, with visits to historic sites like Williamsburg,
    and they dream of a spring pilgrimage to the lavender fields of Provence while budgeting trips carefully due to a fixed retirement income.
  culinary: Skyler Woodham loves farm‑to‑table cooking, often preparing heirloom tomato gazpacho, roasted bean and pepper medley, and a Sunday rosemary‑infused chicken stew, while experimenting with sourdough
    starter maintenance and indulging in smoked cheddar paired with artisanal crackers.
  core: Skyler Woodham channels a lifelong maker’s curiosity into a vibrant senior art studio, balancing meticulous craftsmanship with a playful skepticism, while occasionally over‑investing in vintage
    records and forgetting to schedule routine doctor visits.
background:
  cultural: Skyler grew up in a middle‑class white family in the Shenandoah Valley of Virginia, steeped in Appalachian folk traditions and Southern hospitality. His upbringing emphasized self‑reliance,
    community involvement, and respect for craftsmanship, especially woodworking and storytelling. He attended a local Methodist church, where family gatherings often featured home‑cooked meals and communal
    singing. The region’s natural beauty and heritage festivals fostered his love of art and the outdoors. While rooted in these traditions, Skyler has remained open to new ideas, blending his Southern
    cultural roots with a lifelong curiosity for novelty, abstract concepts, and creative exploration.
