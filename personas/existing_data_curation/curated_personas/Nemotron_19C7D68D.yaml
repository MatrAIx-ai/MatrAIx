  career_goals: Although officially retired, Skyler aims to create a community art studio in Salem where seniors can learn woodworking, painting, and photography together. He hopes to mentor a new generation
    of local artisans and curate an annual exhibition showcasing elder artists. Skyler also plans to write and self‑publish a memoir that weaves his personal history with reflections on art, rural life,
    and the changing cultural landscape of southwestern Virginia. He wants to continue expanding his artistic repertoire, exploring digital illustration and mixed‑media techniques, and to volunteer as a
    docent at the local historical museum, sharing his love of regional history with visitors.
