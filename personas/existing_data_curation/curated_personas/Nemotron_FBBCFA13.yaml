  hobbies: '[''Trail running'', ''Fly fishing in the Arbuckle Mountains'', ''Scale model kit building'', ''Woodworking'', ''Reading medical journals'', ''Reading science-fiction novels'', ''Journaling'',
    ''Mindfulness meditation'', ''Volunteering to teach first-aid classes'', ''Tabletop strategy games'']'
  career_goals: Robert plans to earn paramedic certification within the next 18 months and then pursue a supervisory role within the Stillwater EMS department. Long-term, he aims to develop a community-focused
    mental health support protocol for EMS personnel, earn a Master's in Public Health with an emphasis on emergency management, and lead data-driven quality improvement initiatives that reduce response
    times across rural Payne County.
