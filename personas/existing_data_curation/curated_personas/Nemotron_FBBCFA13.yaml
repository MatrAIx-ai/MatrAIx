personas:
  professional: An experienced paramedic in Stillwater with a STEM background, Robert Chandler leverages their BLS and ACLS certifications, rapid trauma triage skills, and methodical record‑keeping to lead
    data‑driven response improvements while maintaining a calm, organized presence on chaotic emergency scenes.
  sports: A dedicated trail runner and avid fly‑fisher, Robert Chandler trains on the Arbuckle Mountains during spring, supports the Oklahoma State Cowboys football team, follows the Oklahoma City Thunder
    basketball season, belongs to a local outdoor enthusiasts club that meets monthly for group hikes, and they often share equipment tips with fellow members.
  arts: A hands‑on hobbyist, Robert Chandler builds scale model kits of historic aircraft while listening to classic rock legends like Bruce Springsteen and country icons such as Garth Brooks, enjoys science‑fiction
    authors like Ursula K. Le Guin, and attends occasional community theater productions at their Methodist church, where they sometimes volunteer as a stagehand.
  travel: A pragmatic planner, Robert Chandler prefers short, well‑organized road trips to regional gems like the Rocky Mountain National Park and the historic town of Santa Fe, while dreaming of a longer
    adventure to New Zealand’s South Island when their EMS schedule permits, and they meticulously map each route in advance.
  culinary: A competent home cook with a penchant for hearty Midwestern fare, Robert Chandler frequently prepares smoked trout, chili‑con‑carne with beans, and cornbread using fresh rosemary and smoked
    paprika, while their limited cooking time often leads them to rely on quick skillet meals and occasional takeout from the local burger joint, and they enjoy experimenting with homemade barbecue rubs
    on weekends.
  core: Robert Chandler is a methodical, community‑driven paramedic who balances disciplined saving, routine outdoor fitness, and meticulous hobby crafting while quietly wrestling with stress‑induced worry,
    and they approach each challenge with quiet perseverance.
background:
  cultural: Robert was raised in a middle-class white family in central Oklahoma, where community ties, self-reliance, and a strong work ethic are core values. Growing up near the oil-and-agricultural economy
    of Payne County, he participated in county fairs, high school football events, and his local Methodist church. The presence of Oklahoma State University in Stillwater exposed him to a college-town atmosphere,
    fostering an appreciation for higher education while reinforcing traditional Midwestern values. These cultural influences shape his pragmatic outlook, sense of civic duty, and preference for structured,
    reliable environments.
attributes:
  skills: '[''Basic Life Support (BLS)'', ''Advanced Cardiac Life Support (ACLS)'', ''Prehospital Trauma Assessment'', ''Incident Command System (ICS) basics'', ''Emergency Vehicle Operation and Safety'',
