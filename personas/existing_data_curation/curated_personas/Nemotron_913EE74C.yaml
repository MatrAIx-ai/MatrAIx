  career_goals: Although still in infancy, Pauline's emerging aspirations revolve around continued exploration and creative expression. She is eager to master walking, expand her language to tell simple
    stories, and develop the confidence to draw and sing. Her long‑term wish, nurtured by her family, is to become someone who can share art and music with her community, perhaps as a teacher or community
    organizer who fosters harmony and creativity.
