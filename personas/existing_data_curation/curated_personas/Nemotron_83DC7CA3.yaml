  career_goals: June aims to transition from daily sales duties to a mentorship and advisory role within her company, guiding newer representatives and shaping regional sales strategy. She aspires to earn
    a senior consultant title that lets her advise on service design for local businesses and to eventually launch a small consultancy focused on helping small enterprises adopt efficient service solutions.
    Additionally, she seeks recognition from the Chipley Chamber of Commerce for her community contributions and wants to secure a comfortable financial foundation for her retirement, all while maintaining
    the practical, balanced approach that defines her work style.
