personas:
  professional: Israel Gomez, a 15‑year‑old budding digital illustrator, merges Mexican folk art motifs with contemporary graphic novel aesthetics on a tablet, drawing inspiration from refurbished retro
    gaming consoles while maintaining a disciplined schedule that balances school responsibilities and art practice.
  sports: Israel Gomez follows the Seattle Mariners and rallies behind the local high school cross‑country team, while personally training at a nearby climbing gym as a member of a youth climbing club,
    preferring solitary endurance workouts and indoor climbing over team sports.
  arts: Israel Gomez immerses themselves in alternative and Latin indie music, looping tracks by Tame Impala, Café Tacuba, and Julieta Venegas while sketching, and draws heavy inspiration from graphic‑novel
    masters like Jeff Lemire, Jillian Tamaki, and the storytelling flair of Neil Gaiman, creating a hybrid visual style that fuses folk patterns with modern comic lines.
  travel: Israel Gomez dreams of future trips that juxtapose cultural immersion and artistic discovery, such as a school‑organized excursion to Oaxaca’s artisan markets, a solo backpacking adventure through
    Kyoto’s retro‑game cafés, and a weekend road‑trip to Portland’s indie‑music festivals, all while navigating parental budget constraints and school‑related travel policies.
  culinary: Israel Gomez enjoys experimenting in the kitchen, perfecting homemade tacos al pastor with pineapple and chipotle, whipping up a spicy ramen broth infused with miso, and crafting sweet churro
    dough for late‑night study sessions, though they often over‑season dishes in the pursuit of bold flavor.
  core: Israel Gomez is a quietly competitive teen who channels solitary curiosity into digital art, strategic gaming, and eclectic music, balancing a tight budget with a penchant for vintage tech while
    navigating the ups and downs of teenage health and social skepticism.
background:
  cultural: Israel was raised in a Mexican‑American family in San Antonio, Texas, speaking Spanish at home and English at school. His household celebrates traditions such as Día de los Muertos, Cinco de
    Mayo, and religious holidays, and he grew up surrounded by vibrant Mexican mural art in his community. The bilingual environment fostered an appreciation for both his Mexican heritage and the multicultural
    dynamics of the Texas border region, shaping his identity and artistic perspective.
