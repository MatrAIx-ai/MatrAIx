  career_goals: He aspires to become a professional concept artist or visual designer for video games or animation. Israel plans to build a robust portfolio during high school, then enroll in a specialized
    art or graphic design program at a community college or art academy. He also aims to freelance for indie developers, valuing remote work that aligns with his preference for solitary, focused environments.
