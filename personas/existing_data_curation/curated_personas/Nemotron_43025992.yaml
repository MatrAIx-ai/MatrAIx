  hobbies: '[''Gardening'', ''Book club facilitation'', ''Reading historical fiction and memoirs'', ''Knitting and crocheting'', ''Walking on nature trails'', ''Senior dance classes'', ''Volunteer work
    at community library'', ''Seed‑swap and sustainable gardening projects'']'
  career_goals: Although she is not in the formal workforce, Joanne aims to deepen her impact in the community by taking on leadership roles in local nonprofit boards and mentoring younger volunteers. She
    hopes to complete a series of lifelong‑learning courses on senior health and wellness, which would allow her to design supportive programs for peers dealing with anxiety and depression. Joanne also
    dreams of turning her love of gardening into a small neighborhood seed‑swap initiative, combining her practical skills with her curiosity about sustainable practices.
