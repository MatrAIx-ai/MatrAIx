personas:
  professional: Alexa Samson, a 63‑year‑old veteran courier in Garland County, leverages her meticulous route‑planning, precise time‑keeping, and steady customer rapport to mentor new drivers, turning her
    love of routine and sociable leadership into a part‑time training program that prioritizes safety and efficiency.
  sports: Alexa Samson enjoys low‑impact exercise, trekking the Ozark trail network with the local "Ozark Trail Walkers" club, cheering on the Arkansas Razorbacks during football season and the St. Louis
    Cardinals in the spring, while attending weekly senior‑center yoga sessions to keep her joints supple.
  arts: Alexa Samson showcases her artistic side as a choir soprano in her church, devotes evenings to her book club discussions of Harper Lee and Eudora Welty, and finds inspiration in the soulful harmonies
    of the Blind Boys of Alabama and the brushwork of regional painter Wilbur Watkins, often weaving these influences into her quilting motifs.
  travel: Alexa Samson prefers relaxed, well‑planned road trips, having toured the historic streets of New Orleans for Mardi Gras, explored the gardens of Savannah, and dreaming of a scenic cruise along
    the Mississippi River that blends her love of southern cuisine and scenic vistas.
  culinary: Alexa Samson is a skilled home cook who perfects classic Southern dishes like fried chicken, collard greens simmered with smoked ham hocks, buttery cornbread, and peach cobbler, while lovingly
    incorporating garden‑fresh herbs such as thyme and basil into her recipes.
  core: Alexa Samson blends a love of routine with boundless sociability, juggling courier routes, garden rows, and quilting needles, all while humming church hymns, insisting on double‑checking every delivery
    log, and never missing a potluck invitation.
background:
  cultural: Raised in a small town in northern Arkansas, Alexa grew up in a close‑knit, predominantly White, Southern Baptist community that valued hard work, hospitality, and family traditions. Her upbringing
    emphasized self‑reliance, community service, and respect for local customs, shaping her practical outlook and strong sense of social cohesion. Though she now lives in Royal, Garland County, she continues
    to participate in regional traditions such as church activities, county fairs, and neighborhood gatherings.
attributes:
  skills: '[''Route planning'', ''Time management'', ''Customer service'', ''Vehicle maintenance'', ''Record keeping'', ''Local geography knowledge'', ''Basic logistics software operation'', ''Communication'',
