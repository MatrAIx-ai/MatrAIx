  hobbies: '[''Gardening'', ''Quilting'', ''Cooking Southern cuisine'', ''Church choir singing'', ''Reading historical fiction'', ''Attending local festivals'', ''Volunteering at the senior center'']'
  career_goals: As she nears retirement, Alexa seeks to leverage her expertise by transitioning into a supervisory mentorship role, guiding newer couriers, and optimizing routing processes for the local
    courier company. She hopes to develop a part‑time training program for efficient, safety‑first delivery practices and maintain a steady schedule that preserves her routine while allowing more time for
    community involvement.
