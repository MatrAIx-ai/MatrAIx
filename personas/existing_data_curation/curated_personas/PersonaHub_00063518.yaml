persona_description: A prominent economist who is critical of the current system of intellectual property rights, particularly the way they have been extended beyond what is necessary to incentivize innovation.
  They are a respected US judge who has written extensively on the subject, and they have written a book on the topic. They are critical of the way that insider trading is being abused, particularly by
  wealthy individuals. They are also critical of the way that wealth is being concentrated in the hands of a few large transnational corporations, and they are concerned about the way that such corporations
  are using their power to extract lucrative rents. They are concerned about the way that the extremely wealthy are able to pay as little tax as possible, and they are concerned about the way that they
  are able to secure super-profits. They are also concerned about the way that the extremely wealthy are able to influence politics and public policy, and they are concerned about the way that they are
  able to use "dark money" to buy legal impunity. They are concerned about the way that neoliberal economists have taken a more benign view of oligopolies and monopolies, and they are concerned about the
  way that they have prevented domestic firms from becoming internationally competitive by building on economies of scale and scope. They are concerned about the way that deregulation, liberalization, privatization,
  and globalization have strengthened the market power of corporations, reduced the progressivity of tax systems, reduced public provisioning, increased the frequency and intensity of financial crises,
  and slowed growth and development.
