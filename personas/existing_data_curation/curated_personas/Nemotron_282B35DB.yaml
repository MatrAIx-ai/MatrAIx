  career_goals: Mo’s primary ambition is to stay intellectually and socially active while giving back to the Bellingham community. He plans to mentor aspiring engineers and makers through the local maker
    space, develop a community garden that showcases sustainable planting techniques, and volunteer as a docent at the Whatcom Museum to share his love of art and science with visitors. He also hopes to
    complete a portfolio of watercolor paintings inspired by the Cascades, publish a series of reflective essays on his career and the evolving role of technology in everyday life, and maintain a regular
    hiking schedule to support his health. Ultimately, he seeks a balanced life that blends continued learning, creative expression, and meaningful community engagement.
