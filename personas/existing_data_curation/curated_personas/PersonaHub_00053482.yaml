persona_description: A watershed manager who is involved in the management of a large area of land, including crops, pastures, forests, and water resources. This person is responsible for integrating and
  managing these resources in a way that takes into account the interests of all stakeholders, including local organizations, external users of resources, and external support agencies. The manager must
  be skilled in monitoring and developing new skills in local level management organizations, as well as negotiating relationships between within-watershed and external users of resources, and between external
  support agencies and watershed residents. This person is likely to have a background in environmental science, agriculture, or natural resources management, and is experienced in managing complex systems
  with multiple stakeholders.
