personas:
  professional: Mison Mirzarostme, a 38‑year‑old data‑driven UX researcher and technical writer, bridges Python‑powered analytics with human‑centered design, using Agile scrum and mindfulness facilitation
    to keep cross‑functional teams on track while championing inclusive, ethical AI.
  sports: Mison Mirzarostme, an avid hiker who tackles Hill Country’s rugged trails on weekends, is a season ticket holder for the San Antonio Spurs and follows the Austin FC soccer club, while occasionally
    joining a local trail‑running group for early morning cardio sessions.
  arts: Mison Mirzarostme, a regular at Austin’s contemporary art gallery openings and the Zach Theatre’s productions, draws inspiration from the haunting soundscapes of Bon Iver, the dynamic choreography
    of Ballet Austin, and the storytelling of Lin‑Manuel Miranda’s Hamilton, weaving these experiences into their creative side projects.
  travel: Mison Mirzarostme, who favors meticulously planned weekend getaways that blend hiking, culinary exploration, and cultural immersion, has trekked the Santa Fe Trail, savored the vineyards of Napa
    Valley, and dreams of wandering the cobblestone streets of Barcelona while balancing a modest travel budget.
  culinary: Mison Mirzarostme, an intermediate home chef, cultivates a small herb garden to season Mediterranean chickpea stew, Thai lemongrass chicken, and occasional homemade sourdough, favoring fresh
    basil, oregano, turmeric, and ginger while reserving Friday evenings for a guilty‑pleasure slice of chocolate lava cake.
  core: Mison Mirzarostme, a 38‑year‑old data‑savvy UX researcher, balances a love for structured analytics with a longing for solitary reflection, often over‑thinking decisions yet finding calm in a nightly
    journal and a sprinkle of herb‑laden recipes.
background:
  cultural: Mison is a White American raised in the suburban environs of Austin, Texas. Her family traditions blend Southern hospitality—Sunday barbecues and holiday gatherings—with a Midwestern emphasis
    on self‑reliance and punctuality. Growing up in a culturally diverse region, she developed an early appreciation for varied perspectives, which later guided her humanities studies. She values education,
    community involvement, and the arts, regularly supporting local galleries and volunteering for community literacy programs. Her Texan roots influence her practical, down‑to‑earth outlook, while her
    academic background fuels a lifelong curiosity about literature, philosophy, and cultural dynamics.
