  career_goals: Mison aims to advance into a senior role—such as Senior UX Researcher, Product Manager, or Lead Technical Writer—where she can shape product strategy with a blend of data‑driven rigor and
    human‑centered insight. She is passionate about embedding inclusive design and ethical AI principles into development lifecycles, and she hopes to create systematic frameworks that reduce uncertainty
    for cross‑functional teams. Mentorship is a priority; she wants to coach junior staff on effective communication, project planning, and stress‑management techniques. Long‑term, she envisions launching
    a consultancy that helps tech companies integrate humanities perspectives into technology design, while maintaining a balanced, sustainable work life.
