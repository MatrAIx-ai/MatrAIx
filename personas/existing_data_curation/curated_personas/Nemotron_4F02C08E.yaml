personas:
  professional: Joseph Norman, an aspiring young robotics enthusiast who blends a love for LEGO building and Minecraft world‑design with a budding skill in programming, channels their curiosity and competitive
    streak into the school robotics club while methodically planning projects yet worries about meeting expectations.
  sports: Joseph Norman, a spirited youth soccer player for a local community league and an avid fan of San Antonio FC, pedals around the city's bike trails after school, approaching fitness with a competitive
    edge that drives them to out‑run opponents while occasionally questioning teammates' commitment.
  arts: Joseph Norman, a budding comic‑book illustrator who spends weekends sketching San Antonio cityscapes and attending workshops at the Museum of Art, immerses themselves in the worlds of creators like
    Stan Lee and Alan Lee while blasting classic rock legends such as The Rolling Stones and modern pop icons like Billie Eilish, letting music fuel their creative flow.
  travel: Joseph Norman, a curious 11‑year‑old explorer, spends summer weekends biking to nearby Austin for live music and has already taken a family road‑trip to Disney World and a day excursion to the
    historic San Miguel de Allende, dreaming of future adventures to the Grand Canyon while carefully budgeting each journey with their allowance.
  culinary: Joseph Norman, an enthusiastic junior kitchen assistant, delights in helping their family craft Tex‑Mex staples like chicken tacos with fresh cilantro, smoky chipotle salsa, and cheesy enchiladas,
    proudly claiming a knack for assembling perfect guacamole while occasionally over‑seasoning their creations in pursuit of bold flavor.
  core: Joseph Norman, an inquisitive yet anxious 11‑year‑old, balances a fierce competitive drive with a love for art and robotics, often overthinking decisions while channeling creativity into sketches
    and LEGO builds.
background:
  cultural: Joseph grew up in a predominantly Hispanic city, San Antonio, Texas, where his family, of Anglo‑American heritage, celebrates traditional holidays like Thanksgiving and Christmas while also
    participating in community events such as Fiesta San Antonio. The multicultural atmosphere exposes him to Spanish language signage, Mexican food, and regional music, which broaden his cultural awareness.
    His parents encourage academic achievement and love for the arts, enrolling him in after‑school programs at the local library and museum. He attends a public middle school with a diverse student body,
    fostering an appreciation for varied perspectives. The blend of Texan patriotism, Southern hospitality, and the vibrant Latino culture around him shapes his worldview, making him open‑minded yet occasionally
    cautious about new social dynamics.
