  career_goals: Joseph aspires to become a concept artist for video games or films, combining his love of drawing with storytelling. He also dreams of inventing interactive educational games, merging coding
    and creativity. Long‑term, he imagines attending a specialized high‑school for arts & technology, then studying animation or game design at college. He wants to win a state‑level science fair and eventually
    work at a major game studio like Blizzard. He also entertains the possibility of being an astronaut or a museum curator, reflecting his curiosity about the world.
