personas:
  professional: Sharon Guarnieri, a retired visual arts specialist and community curator, they channel their methodical planning and vivid imagination into organizing intergenerational watercolor workshops,
    curating inclusive exhibitions, and mentoring emerging artists while meticulously documenting each project with digital archives to reduce anxiety about unfinished work.
  sports: Sharon Guarnieri, an enthusiastic supporter of the Minnesota Twins, Vikings, Timberwolves, and Wild, they participate in the St. Paul Senior Walking Club’s weekly strolls, attend community ice‑skating
    sessions in winter, and keep their mind sharp with daily Sudoku, all while favoring low‑impact exercise to accommodate their osteoarthritis.
  arts: Sharon Guarnieri, a devoted aficionado of abstract watercolor, they draw inspiration from Wassily Kandinsky, Georgia O'Keeffe, and Mark Rothko, regularly attend exhibitions at the Minnesota History
    Center and the Walker Art Center, and share original poems and memoir excerpts at senior literary gatherings featuring works by Emily Dickinson and Yusef Komunyakaa.
  travel: Sharon Guarnieri, an organized traveler who prefers cultural immersion over spontaneous adventure, they have visited the Art Institute of Chicago, the historic streets of Florence, and the jazz‑filled
    neighborhoods of New Orleans, and they are planning a future trip to Kyoto’s zen gardens and Oaxaca’s mural‑rich plazas, always mapping out itineraries to soothe their worry about the unknown.
  culinary: Sharon Guarnieri, an intermediate home cook with a fondness for herb‑infused dishes, they enjoy preparing lavender‑scented lemon tea, rosemary‑seasoned salmon, a hearty vegetable minestrone
    with fresh basil, and baking apple‑cinnamon crumble, while occasionally treating themselves to a tasting menu at Minneapolis’s The Bachelor Farmer for inspiration.
  core: Sharon Guarnieri, a 74‑year‑old retired curator, blends boundless artistic imagination with a compulsive checklist habit, turning every gallery visit into a mental sketchbook while constantly fretting
    over unfinished projects.
background:
  cultural: Sharon was born and raised in Saint Paul, Minnesota, to a family of Italian descent. Her grandparents immigrated from Italy, bringing with them traditions of Catholic faith, a love for classic
    Italian art, and a strong sense of family cohesion. Growing up in the Midwestern United States, she blended these heritage influences with the region’s emphasis on community involvement, modesty, and
    public service. This cultural mix fostered her appreciation for both European artistic heritage and the inclusive, volunteer‑driven spirit of local American cultural institutions such as the Minnesota
    History Center and the Saint Paul Arts Council.
