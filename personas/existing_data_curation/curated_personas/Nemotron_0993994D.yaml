personas:
  professional: Michelle Ontko is a seasoned industrial and refractory machinery mechanic who excels at reading schematics, welding, and troubleshooting hydraulic systems, and they blend a pragmatic, safety‑first
    mindset with a spontaneous knack for improvising under pressure, often leading crews while occasionally battling deadline disorganization.
  sports: Michelle Ontko is an active member of the Carroll County Women’s Softball League, a weekend hiker on the Appalachian foothills, and a devoted fan of the Baltimore Ravens and Washington Capitals,
    often joining a local hiking club while balancing a casual routine of yoga and strength training to counter workplace physical demands.
  arts: Michelle Ontko enjoys curating themed dinner parties with playlists ranging from classic rock legends like Led Zeppelin and soul icons such as Aretha Franklin, they attend the local community theater’s
    productions of contemporary plays, and they frequently display an admiration for the artwork of regional folk painters whose motifs echo their love of craftsmanship.
  travel: Michelle Ontko favors spontaneous weekend road trips along the Blue Ridge Parkway and has a bucket‑list destination of the Scottish Highlands, while they also regularly visit nearby Gettysburg
    for historical tours and occasionally plan longer vacations to the Pacific Northwest to explore the Cascade Range.
  culinary: Michelle Ontko delights in cooking seasonal farm‑to‑table meals, often featuring fresh heirloom tomatoes, roasted rosemary garlic chicken, and homemade apple crisp, they proudly showcase classic
    Southern barbecue techniques like smoked brisket at themed dinner parties, and they experiment with handmade pasta using fresh eggs and durum wheat.
  core: Michelle Ontko is a hands‑on mechanic‑turned‑DIY enthusiast whose love for community, spontaneous road trips, and meticulously welded projects coexist with a habit of leaving toolboxes half‑packed
    and a knack for converting any gathering into a themed culinary celebration.
background:
  cultural: Michelle grew up in a middle‑class white family in rural Maryland, where community ties and self‑reliance were emphasized. Her upbringing blended traditional Mid‑Atlantic values with a strong
    work ethic inherited from generations of artisans and tradespeople. She participates in local traditions such as county fairs and neighborhood potlucks, and she values the close‑knit, collaborative
    spirit of Carroll County while appreciating the broader cultural heritage of the region.
attributes:
  skills: '[''Industrial machinery maintenance'', ''Refractory equipment repair'', ''Hydraulic & pneumatic system troubleshooting'', ''Blueprint and schematic interpretation'', ''Welding (MIG/TIG)'', ''Preventive
    maintenance scheduling'', ''Safety compliance and OSHA regulations'', ''CNC machine operation'', ''Team leadership'', ''Problem solving under time pressure'']'
  hobbies: '[''Softball league'', ''Hiking with friends'', ''DIY home improvement projects'', ''Cooking and hosting dinner parties'', ''Volunteer at local community events'', ''Classic car restoration'',
    ''Road trips'', ''Gardening'']'
  career_goals: Michelle aims to advance into a senior maintenance supervisor role within the next five years, obtaining certifications such as ASE and NADCA to broaden her technical credentials. She hopes
    to lead a team that implements predictive maintenance technologies, mentor apprentices from local trade schools, and eventually open a family‑run workshop that offers custom equipment repair and training
    services. Her long‑term ambition includes integrating automation solutions to improve efficiency while maintaining the hands‑on craftsmanship she values.
