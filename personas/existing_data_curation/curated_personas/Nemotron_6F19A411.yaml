personas:
  professional: Christina Dalton excels as a senior customer support specialist in a high‑volume call center, using her empathetic listening, rapid problem‑solving, and mastery of Salesforce and Zendesk
    to de‑escalate frustrated callers while juggling a flexible, sometimes chaotic schedule, and they actively mentor new hires, aiming to step up as a team lead within the next two years.
  sports: Christina Dalton enjoys weekend hikes in the nearby state park, volunteers as a line‑cook for charity bake‑sales organized by the local community center, and cheers on the regional soccer team,
    the Portland Timbers, while occasionally joining a beginner’s weekend cycling club that meets at the community center.
  arts: Christina Dalton indulges in mystery novels and true‑crime podcasts, frequently attends screenings of classic film noir at the historic downtown theater, and is a regular at the local indie‑music
    venue where they’re fond of listening to Sufjan Stevens and the contemporary folk duo The Staves, while also participating in a monthly book‑club discussion that often veers into literary analysis of
    Agatha Christie.
  travel: Christina Dalton prefers short, well‑planned weekend escapes to scenic destinations like the Oregon Coast and Yosemite National Park, using travel‑deal apps like Hopper to snag affordable flights
    and prioritizing family‑friendly itineraries over luxury, while dreaming of a culinary tour in Kyoto to master modern‑twist comfort foods.
  culinary: Christina Dalton experiments with comforting dishes such as miso‑glazed salmon with roasted root vegetables and quinoa‑infused shepherd’s pie, regularly incorporates fresh herbs from their garden
    into sauces and pestos, and enjoys mastering sous‑vide techniques on their new immersion circulator, often donating their best creations to community‑center bake sales.
  core: Christina Dalton balances a knack for calming stressed callers with a love for mystery novels and experimental comfort cooking, while managing anxiety through yoga, a flexible work style, and occasional
    financial splurges on gadgets.
background:
  cultural: Christina comes from a White, primarily Anglo‑American background typical of the Mid‑Atlantic region. Raised in a small town in New Jersey, she grew up with strong community ties, attending
    local schools, participating in church gatherings, and enjoying neighborhood events. Her family heritage includes Irish and English roots, reflected in holiday traditions and a love for classic American
    comfort food. Living in Northfield, Atlantic County, she is familiar with the coastal culture, the seasonal tourism economy, and the blend of suburban and rural lifestyles that characterize the area.
    Her upbringing emphasizes hard work, modesty, and a pragmatic outlook, aligning with her practical side.
