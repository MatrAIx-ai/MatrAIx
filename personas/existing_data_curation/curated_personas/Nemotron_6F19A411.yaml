  hobbies: '[''Reading mystery novels'', ''True‑crime podcasts'', ''Cooking and experimenting with recipes'', ''Gardening'', ''Yoga'', ''Journaling'', ''Volunteering at community center'', ''Hiking'', ''Exploring
    tech and productivity apps'', ''Baking for charity events'']'
  career_goals: Christina aims to move into a supervisory or team‑lead position within the next two to three years, focusing on elevating customer experience metrics and coaching her colleagues. She plans
    to obtain a Customer Success Management certification to deepen her strategic expertise. Long‑term, she envisions a remote customer experience manager role that offers greater flexibility and a healthier
    work‑life balance. To support these ambitions, she is considering part‑time MBA coursework that will expand her strategic management knowledge while allowing her to remain present for her family.
