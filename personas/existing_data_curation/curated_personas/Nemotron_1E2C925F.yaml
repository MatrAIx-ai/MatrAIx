  hobbies: '[''Gardening'', ''Scenic Driving'', ''Woodworking'', ''Community Clean‑up Volunteering'', ''Classic Country/Folk Music Listening'']'
  career_goals: Jared aims to deepen his expertise in facility management by pursuing certifications such as the Certified Facility Manager (CFM) credential. He envisions moving into a regional supervisory
    role where he can mentor multiple site supervisors, standardize best practices across locations, and introduce modest technology upgrades that streamline routine tasks. While he values stability, he
    also hopes to leave a legacy of a well‑organized, dependable housekeeping department that new staff can easily integrate into.
