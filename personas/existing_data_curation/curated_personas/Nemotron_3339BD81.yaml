  hobbies: '[''Gardening'', ''Cooking'', ''Reading practical non‑fiction'', ''Crossword puzzles'', ''Sudoku'', ''Quilting'', ''Church women’s bible study'', ''Volunteer at food bank'']'
  career_goals: Tina aims to translate her dependable performance into a leadership position within the call‑center environment. Over the next three to five years she plans to become a shift supervisor
    or quality‑assurance specialist, overseeing workflow consistency and training new agents. To support this, she intends to complete a certificate in Call‑Center Management and, if possible, pursue an
    associate’s degree in Business Administration, while maintaining the stable schedule that allows her to keep a balanced family life.
