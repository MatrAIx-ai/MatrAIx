persona_description: A historian who specializes in the history of military and civilian marksmanship from the 1870s until the 1920s, with a particular interest in the military-industrial complex, the relationship
  between the federal government and state militias, and the impact of these changes on civilian marksmanship programs. This individual is knowledgeable about the history of rifle marksmanship, the militarization
  of target shooting, and the profound changes in the relationships among industry, the federal government, and state militias that led to the militarization of civilian marksmanship programs.
