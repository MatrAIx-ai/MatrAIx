    "Team Leadership & Mentoring", "Mindfulness-Based Stress Management"]'
  hobbies: '["Watercolor Painting", "Street Photography", "Visiting Art Galleries and Museums", "Cooking Honduran Cuisine", "Latin Dance (Salsa/Bachata) Social Events", "Community Festival Participation",
    "Volunteer Facilitator for Youth Art Workshops", "Live Music Concert Attendance", "Reading (Science-Fiction & Design Thinking)", "Yoga and Mindfulness Meditation", "Hiking in Blue Ridge Mountains"]'
  career_goals: Francisco aims to transition into a senior leadership role, such as Director of Project Management or Head of Innovation, where he can shape strategic portfolios across Charlotte’s growing
    tech and renewable‑energy sectors. He aspires to obtain the PMP® certification (if not already) and to mentor a diverse next generation of project managers, particularly those from underrepresented
    Hispanic backgrounds. He is passionate about integrating cultural and artistic perspectives into project design, planning a community‑focused initiative that leverages technology to support local arts
    education and economic development in the Honduran diaspora. He also seeks to achieve a healthier work‑life balance, embedding personal well‑being practices into his leadership philosophy.
