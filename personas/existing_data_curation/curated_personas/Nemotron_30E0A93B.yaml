personas:
  professional: Francisco Bernal, a seasoned project manager in Charlotte's tech and engineering sectors, leverages Agile, design thinking, and bilingual communication to steer complex initiatives, and
    they regularly infuse artistic creativity and emotional intelligence into team dynamics.
  sports: Francisco Bernal, an avid weekend hiker, regularly conquers Blue Ridge trails with the Carolina Ramblers club, cheers for the Charlotte Hornets and Charlotte FC, and joins a community soccer league
    for casual matches, balancing seasonal outdoor pursuits with occasional indoor racquetball for cardio.
  arts: Francisco Bernal immerses themselves in visual arts by painting watercolors inspired by J.M.W. Turner's atmospheric tones and Banksy's urban edge, curates street photography echoing Gregory Crewdson's
    cinematic style, frequents live concerts featuring Tame Impala and Lila Downs, and mentors youth through art workshops referencing the narrative power of Frida Kahlo's work.
  travel: Francisco Bernal prefers semi-planned cultural escapes, having trekked the Blue Ridge Mountains, explored Barcelona's historic squares, snorkeled along Costa Rica's Pacific coast, and now dreams
    of photographing the aurora borealis in Iceland while balancing travel costs within a modest savings plan.
  culinary: Francisco Bernal, an accomplished home chef, expertly prepares baleadas (soft tortillas filled with refried black beans, queso fresco, avocado, and salsa verde) and a hearty sopa de caracol
    seasoned with coconut milk, cilantro, and lime, and they delight in experimenting with smoked paprika and plantain flour to create fusion twists on traditional fare.
  core: Francisco Bernal channels a restless curiosity and love for creative problem-solving into a career that blends engineering rigor with artistic flair, while periodic anxiety fuels both impulsive
    spending on art supplies and a disciplined mindfulness practice.
background:
  cultural: Francisco is a first‑generation Honduran‑American. He grew up hearing stories of his family’s life in Honduras and retains deep connections to Central‑American traditions, such as the celebration
    of Semana Santa, the importance of extended family gatherings, and the vibrant rhythms of punta and salsa. Fluent in Spanish, he maintains ties with the Honduran diaspora in Charlotte, often participating
    in cultural events at the Honduran Consulate and community centers. His upbringing combined the collectivist values of his heritage—respect, hospitality, and communal responsibility—with the individualistic
    and entrepreneurial spirit of the United States, shaping a bicultural identity that informs both his personal life and professional approach.
attributes:
