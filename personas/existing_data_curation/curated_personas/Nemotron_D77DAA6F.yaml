  career_goals: Sonya aspires to attend college and study education or public health, with a long-term ambition to become a community youth mentor or health worker in Memphis who designs after-school programs
    and wellness workshops for local teens. In the short term, she aims to win the student-council presidency, lead her school's service club, and earn a scholarship that will support her future studies.
