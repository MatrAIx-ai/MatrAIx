personas:
  professional: Sonya Moore, a 13‑year‑old middle school student, channels their practical mindset and love for teamwork into the school's robotics club, where they design and program competition bots while
    also serving as the junior point‑guard for the community center basketball team, balancing both pursuits with a disciplined after‑school schedule.
  sports: Sonya Moore guards the paint for the Memphis Youth Basketball League’s Blue Dazzle team, draws inspiration from the Memphis Grizzlies, and maintains fitness through after‑school drills, weekend
    pick‑up games, and a disciplined habit of stretching while listening to classic blues on a portable speaker.
  arts: Sonya Moore sings soulful harmonies in their church choir, studies the lyrical flow of Memphis hip‑hop legends like Three 6 Mafia, and fuels their imagination with graphic novels such as 'Saga'
    and 'Ms. Marvel', often sketching characters while humming gospel rhythms.
  travel: Sonya Moore prefers short, family‑focused road trips to nearby music hubs like Nashville and New Orleans for jazz festivals, dreaming of a future international pilgrimage to the historic streets
    of Dublin, yet current travel plans are shaped by school schedules and a modest budget.
  culinary: Sonya Moore experiments with traditional soul food staples—perfecting the crispiness of fried chicken, seasoning collard greens with smoked turkey, and baking sweet potato pie with a secret
    dash of cinnamon—while sharpening their kitchen skills by following YouTube tutorials and swapping recipes with neighbors during community garden gatherings.
  core: Sonya Moore blends a structured, community‑centered outlook with a vibrant love for robotics, gospel singing, and basketball, all while staying up late stitching TikTok stories and occasionally
    forgetting to finish homework on time.
background:
  cultural: Sonya's cultural background is shaped by her Southern African-American roots in Memphis, where church, gospel music, and soul food are central to family life. She grows up hearing stories of
    the city's blues and civil rights heritage, celebrating holidays with fried chicken, collard greens, and sweet potato pie, and participating in community events like the Memphis in May festival. Her
    identity is reinforced by weekly church services, local jazz and hip-hop influences, and a strong emphasis on family, neighborhood solidarity, and giving back to the community.
