  hobbies: '[''pottery'', ''photography'', ''hiking'', ''cooking Vietnamese dishes'', ''art‑history lectures'', ''museum tours'', ''yoga'', ''mindfulness meditation'', ''DIY home projects'']'
  career_goals: Thuy aims to transition from a laborer to a supervisory role within the next three years, seeking a foreman certification and additional training in construction project management. She
    hopes to leverage her growing design knowledge to specialize in remodels that blend functional construction with artistic detailing, eventually overseeing a small team that focuses on boutique residential
    projects. Long‑term, she envisions starting her own contractor business that emphasizes sustainable building practices and offers customized aesthetic solutions for homeowners in the Phoenix‑Metro area.
