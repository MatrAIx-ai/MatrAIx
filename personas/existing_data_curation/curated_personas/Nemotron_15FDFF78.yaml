personas:
  professional: Robert Hannah is a tech-savvy farm manager who leverages GPS-guided equipment, drone imaging, and data analytics to run a diversified mixed-crop and livestock operation, while their organized,
    methodical nature ensures meticulous budgeting, compliance, and collaborative leadership within the local agricultural cooperative.
  sports: Robert Hannah fuels their fitness through early-morning hikes with the Butte Trail Runners, occasional fly-fishing outings on the Clark Fork, and weekend games cheering for the Billings Mustangs
    while maintaining a self-designed rotational-grazing workout routine that blends functional strength with the demands of farm labor.
  arts: Robert Hannah captures the rugged Montana skyline through a lens inspired by Ansel Adams, translates those images into watercolor sketches reminiscent of Georgia O'Keeffe, strums acoustic renditions
    of John Denver at community theater rehearsals, and contributes set designs for local productions, weaving their artistic sensibility into everyday farm life.
  travel: Robert Hannah prefers meticulously planned road trips that blend adventure with learning, such as sunrise hikes in Yellowstone, a week-long photography workshop in Glacier National Park, and an
    eco-farm exchange in Germany's Black Forest, balancing their desire for immersive experiences with the practical constraints of a running farm and a modest agritourism budget.
  culinary: Robert Hannah delights in crafting farm-to-table meals like honey-glazed pork tenderloin with roasted heirloom carrots, quinoa-kale salad tossed with fresh goat cheese, and smoked trout paired
    with wild berry compote, using their modest culinary skill to showcase ingredients harvested from their own fields and beehives.
  core: Robert Hannah is a detail-driven farmer-artist who worries about every seed's future, secretly hoards vintage lenses for night shoots, and can't start a day without a double espresso and a splash
    of sunrise on the barn wall.
background:
  cultural: Robert was raised on a multi‑generational ranch near Butte, Montana, where the cultural fabric blends the rugged independence of the Western frontier with a growing appreciation for community
    collaboration and artistic expression. His ancestry traces back to German and Scandinavian immigrants who settled the region in the early 1900s, bringing traditions of hard work, stewardship of the
    land, and a respect for practical craftsmanship. Growing up in a town shaped by mining heritage and a strong Native American presence, Robert developed an awareness of the region’s diverse histories,
    often participating in local cultural events that honor both the indigenous peoples and the pioneer legacy. The local Catholic/Protestant mix, the values of self‑reliance, and the community’s emphasis
    on cooperation and harmony have influenced his cooperative mindset and his dedication to preserving the natural environment while embracing modern, forward‑thinking agricultural practices.
attributes:
