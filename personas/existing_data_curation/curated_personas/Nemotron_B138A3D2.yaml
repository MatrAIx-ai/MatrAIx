  hobbies: '[''Arduino/Raspberry Pi projects'', ''Home automation tinkering'', ''Fishing'', ''Hiking'', ''Acoustic guitar playing'', ''Reading technical magazines'', ''Reading sci‑fi novels'', ''Strategy
