  career_goals: David aims to earn his Journeyman Electrician license within the next year, followed by the Master Electrician certification. He aspires to specialize in renewable energy installations,
    particularly solar photovoltaic systems, to combine his practical skills with his interest in emerging technologies. In the long term, he hopes to open his own contracting business focused on sustainable
    residential projects, providing reliable service while creating a stable income that eases his anxiety. He also plans to take night courses in electrical engineering to deepen his technical knowledge.
