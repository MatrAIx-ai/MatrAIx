personas:
  professional: Lashauna Johnson is a highly organized registered nurse who leverages her STEM‑focused bachelor's degree to excel in patient assessment, IV therapy, wound care, and EHR management, and she
    leads quality‑improvement projects with data‑driven precision while mentoring new staff, balancing assertive leadership with cooperative teamwork as she pursues an MSN in healthcare administration and
    a future role as Nurse Manager.
  sports: Lashauna Johnson is an avid hiker who tackles the Shenandoah trails with the Shenandoah Hiking Club and competes in occasional 5K charity runs, while also holding a seasonal pass for the Washington
    Commanders and enjoying the Washington Capitals and Wizards on game nights, balancing active outdoor pursuits with occasional team‑sport fandom.
  arts: Lashauna Johnson is a devoted jazz and R&B aficionado who fills her evenings with Miles Davis, John Coltrane, Etta James, and modern soul artists like D'Angelo, while her literary palate savors
    historical fiction by Philippa Gregory, Ken Mantel, and Hilary Mantel; she also channels creative energy into quilting patterns inspired by Georgia O'Keeffe and attends the Virginia Jazz Festival each
    spring.
  travel: Lashauna Johnson prefers a blend of structured road‑trip itineraries and spontaneous weekend hikes, having explored Shenandoah National Park, the Blue Ridge Parkway, Savannah, Georgia, and New Orleans
    for culinary inspiration, and she dreams of a genealogy pilgrimage to Ghana and a cultural tour of Rome and Florence, always booking travel through TripIt and limiting trips to two weeks per year due
    to her demanding career.
  culinary: Lashauna Johnson cooks soul‑food classics with healthy twists, turning collard greens with smoked turkey into a kale‑rich side, swapping traditional black‑eyed peas for a quinoa‑and‑black‑bean
    mix, seasoning gumbo with garden‑fresh thyme and smoked paprika, and perfecting shrimp and grits using brown rice, all while maintaining an intermediate skill set that blends farmer’s‑market bounty
    with occasional dining at her favorite local soul‑food bistro.
  core: Lashauna Johnson blends methodical precision with garden‑grown serenity, balancing a demanding nursing career, data‑driven quality improvement, and a love of jazz, hiking, and soulful cooking, all
    while navigating the occasional financial splurge on quilting fabrics and the occasional missed dose of medication.
background:
  cultural: Lashauna is an African‑American woman raised in the rural South of Virginia. Her family’s history is intertwined with the African diaspora and the civil‑rights movement, fostering a strong sense
    of resilience and collective responsibility. Growing up in a close‑knit church community, she internalized values of education, service, and cultural pride. These influences shape her nursing practice;
    she is acutely aware of health disparities affecting Black patients, actively participates in the National Black Nurses Association, and incorporates cultural humility into patient care. She celebrates
    traditions such as family cookouts, gospel music, and storytelling, while also embracing contemporary professional development and community advocacy.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic health record (EHR) management'', ''Care coordination'', ''Discharge planning'', ''Infection
    control protocols'', ''Quality improvement initiatives'', ''Data analysis for clinical outcomes'', ''Team supervision and mentorship'']'
  hobbies: '[''Gardening'', ''Cooking'', ''Reading historical fiction'', ''Yoga'', ''Quilting'', ''Volunteer health education'', ''Hiking'', ''Jazz and R&B music'', ''Genealogy research'']'
  career_goals: Lashauna aims to earn a Master of Science in Nursing with a concentration in healthcare administration within the next three years, positioning herself for a Nurse Manager or Director of
    Quality Improvement role at her hospital. She plans to become a Certified Case Manager (CCM) and to spearhead community health outreach programs that address chronic disease prevention and health equity
    for the African‑American population in Sussex County. Long‑term, she envisions establishing a structured residency mentorship program for new nurses and contributing to policy advocacy through the National
    Black Nurses Association.
