  hobbies: '["Gardening", "Knitting", "Quilting", "Cooking Southern cuisine", "Baking desserts", "Reading mystery novels", "Volunteering at food pantry", "Walking in nature", "Journaling", "Watching classic
    movies"]'
  career_goals: Chelsea aims to transition from a stocker to a supervisory role within the logistics department, such as Shift Supervisor or Inventory Control Specialist, where she can lead a team and implement
    process improvements that enhance efficiency and workplace harmony. She plans to obtain a GED and pursue certification in logistics, such as the Certified in Logistics, Transportation and Distribution
    credential, to strengthen her qualifications. Long-term, she envisions a position that combines her organizational strengths with her passion for helping others, possibly overseeing community outreach
    programs for her employer or taking on a volunteer coordinator role in her local church. Throughout, she seeks a stable, predictable work environment that supports her mental well‑being and family life.
