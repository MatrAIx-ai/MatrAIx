  career_goals: Joaquin aims to leverage his two‑decade track record into a senior sales leadership role, such as Regional Sales Director or Vice President of Sales Operations, within the next five years.
    He is driven to expand his influence beyond day‑to‑day supervision by shaping company‑wide sales processes, championing data‑driven decision‑making, and formalizing a mentorship program for emerging
    talent. Recognizing his tendency toward spontaneity, he plans to strengthen his project‑management and time‑management capabilities, possibly by earning a Certified Sales Leader (CSL) credential or
    an executive MBA. In the longer term, Joaquin envisions launching a boutique sales consultancy that helps midsize firms adopt agile sales methodologies while maintaining proven relationship‑selling
    fundamentals. A personal ambition is to achieve a healthier work‑life balance that mitigates stress and supports his continued social engagement.
