personas:
  professional: Britainy Raines is a seasoned operations executive with 25 years of experience in strategic planning, budgeting, and process improvement, who blends meticulous, data‑driven decision‑making
    with a warm, community‑focused leadership style that makes stakeholder meetings feel like a Southern family gathering.
  sports: Britainy Raines follows the Tennessee Titans and Nashville Predators, participates in the Natchez Trace Hiking Club, joins a weekly pickleball league at the community center, and balances their
    love for seasonal hiking with charity walks that support the local food bank.
  arts: Britainy Raines volunteers on the stage crew of the local community theater, enjoys live performances by Dolly Parton and Jason Isbell, reads contemporary fiction such as "The Underground Railroad"
    by Colson Whitehead and business classics like "Good to Great", and knits quilts inspired by the patterns on Broadway set designs, which they proudly display at community events.
  travel: Britainy Raines prefers meticulously planned road trips that combine scenic hikes along the Blue Ridge Parkway, culinary stops in Asheville and Charleston, and occasional weekend getaways to New
    Orleans for jazz festivals, while they dream of a future cultural immersion trip to Seville, Spain.
  culinary: Britainy Raines is an adept home cook who delights in perfecting Southern staples like fried chicken, collard greens, shrimp and grits, and peach cobbler, often using garden‑fresh herbs such
    as basil and thyme and pairing meals with sweet tea or a splash of bourbon glaze, which they serve to friends at community gatherings.
  core: Britainy Raines blends Southern hospitality with corporate precision, worries about details yet finds calm in yoga, over‑commits to community events, and quietly holsters a competitive streak in
    both boardrooms and backyard gardens.
background:
  cultural: Britiany grew up in a close‑knit small‑town environment in Middle Tennessee, where Southern hospitality, community involvement, and a strong church presence shaped her values. Her upbringing
    emphasized family, respect for tradition, and a practical work ethic. While she embraces these cultural roots, her graduate education in business introduced her to a broader, corporate mindset. This
    blend results in a professional demeanor that balances Southern warmth and community focus with disciplined, data‑driven management practices.
attributes:
  skills: '[''Strategic Planning'', ''Financial Analysis'', ''Budgeting'', ''Process Improvement'', ''Performance Metrics'', ''Risk Management'', ''Data‑Driven Decision Making'', ''Stakeholder Communication'',
