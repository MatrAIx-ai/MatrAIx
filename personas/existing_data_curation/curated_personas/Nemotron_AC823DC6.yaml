  hobbies: '[''Gardening'', ''Cooking Southern recipes'', ''Book club'', ''Community theater volunteering'', ''Hiking'', ''Yoga for stress relief'', ''Volunteering at food bank'', ''Walking charity events'',
    ''Attending local music festivals'', ''Knitting and quilting'']'
  career_goals: Britiany aims to advance to a senior executive role, such as Director of Operations or Vice President of Business Development, within the next five years. She is motivated to lead company‑wide
    transformation initiatives that streamline processes and enhance profitability, especially for midsized firms in the Tennessee region. Long‑term, she envisions launching her own boutique consulting
    practice to help local businesses adopt best‑in‑class operational strategies while championing mentorship programs for mid‑career women. She also seeks to improve her own stress‑management skills, integrating
    wellness practices into her leadership style to foster a healthier workplace culture.
