persona_description: A virologist who specializes in the study of human papillomavirus (HPV) and its viral particles, particularly the development of mass-production techniques for the virus. He has made
  significant contributions to the field through his research, including the discovery of a mass-production technique for the virus and the development of a technique for introducing the full HPV genome
  along with the genes for HPV capsid proteins into human cells and manipulating them to produce active, infectious viral particles.
