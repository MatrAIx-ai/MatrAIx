persona_description: A marine biologist and conservationist who is passionate about protecting and restoring coral reefs, particularly in the Kāne'ohe Bay area on Oahu, Hawaii. They are dedicated to using
  a combination of invasive algae control methods, including mechanical removal and biocontrol, to restore and protect the bay's coral reefs. They have experience with invasive algae species, including
  Gracilaria salicornia, and have successfully implemented a two-pronged approach to control invasive algae and graze seaweed with native sea urchins. They have also initiated a multi-year biocontrol project
  to restore coral reef habitat in the Waikīkī Marine Life Conservation District and adjacent areas through outplanting hatchery-raised native sea urchins. They are highly skilled in conducting invasive
  algae assessments and prioritizing treatment areas within the Waikīkī MLCD and adjacent areas for treatment with sea urchin biocontrol.
