personas:
  professional: Janet Fell is a seasoned interview specialist in Denton's media and market‑research sector who leverages razor‑sharp active‑listening, incisive probing, and a calm, skeptical eye to uncover
    hidden motivations, while juggling multiple focus‑group schedules with the organized flexibility that lets them adapt techniques on the fly and position themselves as the go‑to professional for nuanced
    qualitative insights.
  sports: Janet Fell is a die‑hard supporter of the Dallas Mavericks and Dallas Cowboys, regularly attending game nights at the Galleria, participates in the local Denton County Rail Trail cycling club
    on weekends, and joins a co‑ed softball league where their energetic, talkative nature makes them a natural liaison on the field.
  arts: Janet Fell channels their love for performance into weekly karaoke battles and improv comedy workshops, draws inspiration from jazz legend Wynton Marsalis as featured at the Denton Arts & Jazz Festival,
    and reveres mystery author Gillian Flynn for the narrative twists that echo the storytelling skills they hone in professional interviews.
  travel: Janet Fell prefers spontaneous weekend getaways that blend adventure and relaxation, having hiked the Bluebonnet Trails in Waco, explored the vibrant food scene of Austin, and dreaming of a future
    trip to Oaxaca's street markets and the historic streets of Seville, while using a flexible itinerary app that leaves room for impromptu detours.
  culinary: Janet Fell is an avid home chef who perfects Tex‑Mex staples like carne asada tacos with freshly squeezed lime and cilantro, experiments with smoky barbecue rubs featuring chipotle, brown sugar,
    and cumin on brisket, and frequently hosts neighborhood potlucks where they showcase their signature queso fundido with chorizo.
  core: Janet Fell is a gregarious, competition‑driven interview pro who balances meticulous organization with on‑stage flair, turning every conversation and karaoke session into a chance to uncover stories,
    even if occasional skepticism and delayed dentist visits show their human side.
background:
  cultural: Janet grew up in the suburbs of Denton, Texas, in a middle‑class white family that valued hard work, community involvement, and a blend of Southern hospitality with the liberal, arts‑centric
    vibe of a college town. She was raised with traditions such as Friday night high‑school football, weekend trips to local state parks, and family gatherings centered around Texas‑style barbecue. The
    region’s strong music scene—country, rock, and the annual Denton Arts & Jazz Festival—shaped her love for live performance and social gatherings. While she identifies with the core values of Texan independence
    and friendliness, she also embraces the progressive, eclectic culture of Denton’s university community, which fuels her curiosity and competitive spirit.
