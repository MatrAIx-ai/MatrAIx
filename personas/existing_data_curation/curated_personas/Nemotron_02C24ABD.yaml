  hobbies: '[''Karaoke'', ''Improv Comedy'', ''Hiking'', ''Biking'', ''Cooking Tex‑Mex'', ''Barbecue Experimentation'', ''Reading Mystery Novels'', ''Attending Denton Arts & Jazz Festival'', ''Volunteering
    at Community Events'']'
  career_goals: Janet aims to progress from interview specialist to senior lead interviewer or research manager within the next three to five years, overseeing a team that conducts high‑stakes qualitative
    studies for regional brands. She hopes to leverage her competitive drive to develop a reputation as the go‑to professional for nuanced, insightful interviews. In the longer term, she envisions launching
    her own freelance interviewing consultancy or hosting a podcast that showcases community stories from Denton County, possibly earning a degree in communications to bolster her credibility.
