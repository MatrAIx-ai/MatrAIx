persona_description: A space engineer and astronaut who developed and tested a compact waste management system for the Shuttle, facing bureaucratic challenges and frustration with NASA's decision to proceed
  with a more expensive commercially developed unit. His work on the system was recognized with a NASA award, but it was never further developed. After NASA announced his resignation in 1994, he became
  a clinical professor of medicine at the University of Texas Medical Branch in Galveston, developing a computer-based self-teaching system for cardiovascular physical diagnosis. His work has been recognized
  with awards and has had a lasting impact on medical education.
