    center volunteering", "Experimenting with simple coding"]'
  career_goals: Stephanie aims to become a multidisciplinary creator who blends narrative, visual art, and interactive media. She envisions studying visual arts or game design in college, then working as
    a concept artist for video‑game studios or as a graphic novelist publishing indie comics. Long‑term, she hopes to maintain creative flexibility as a freelance storyteller, develop immersive web‑based
    experiences, and eventually mentor younger artists by running community workshops or a small indie studio focused on experimental narratives.
