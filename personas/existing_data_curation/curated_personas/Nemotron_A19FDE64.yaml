personas:
  professional: An aspiring digital illustrator and speculative fiction writer, Stephanie Miller channels their vivid imagination and love for ambient soundscapes into vibrant tablet paintings and short
    sci‑fi stories, thriving in their school’s art club’s collaborative projects while allowing the relaxed, flexible rhythm of their teen schedule to guide their creative process.
  sports: A devoted fan of the Dallas Cowboys and Texas Rangers, Stephanie Miller joins the Killeen community center’s after‑school intramural soccer league and takes early‑morning jogs along the Lampasas
    River trail, favoring low‑pressure, flexible workouts that fit around their sketching marathons.
  arts: A fervent creator and connoisseur of eclectic art, Stephanie Miller spends evenings sketching fan‑art inspired by digital masters Ross Tran and Loish, devours speculative fiction by N.K. Jemisin
    and Brandon Sanderson, and curates playlists featuring ambient pioneers Brian Eno, Tycho, and alternative acts Radiohead and Bon Iver to fuel their creative bursts.
  travel: When school permits, Stephanie Miller embarks on spontaneous weekend road trips to Austin’s South Congress music scene and the historic River Walk in San Antonio, while daydreaming about a future
    backpacking adventure through Tokyo’s neon districts and Kyoto’s tranquil temples, balancing their teen constraints with a love for immersive cultural experiences.
  culinary: A self‑taught kitchen explorer, Stephanie Miller alternates between whipping up classic Texas‑style brisket tacos with tangy pickled onions and experimenting with homemade matcha ramen bowls
    topped with soft‑boiled eggs and toasted sesame seeds, seasoning their creations with cilantro, lime, and a dash of smoked paprika.
  core: Stephanie Miller is a day‑dreaming teen artist who trades school deadlines for midnight sketch marathons, balancing a love for ambient soundscapes with occasional snack‑induced late‑night gaming
    binges that fuel their imagination.
background:
  cultural: Stephanie grew up in Killeen, Texas, a city shaped by the presence of Fort Hood and its diverse military community. While her family identifies as white, she has been exposed to a mosaic of
    cultures, languages, and traditions brought by families stationed at the base, fostering an openness to varied perspectives. Texan cultural threads—Southern hospitality, community fairs, and a strong
    musical heritage—infuse her upbringing, yet she gravitates toward more eclectic artistic expressions. Her household values independence and adaptability, reflecting both the frontier spirit of Central
    Texas and the transient nature of military life. These influences blend with her innate curiosity, creating a background that supports both local traditions and global artistic explorations.
