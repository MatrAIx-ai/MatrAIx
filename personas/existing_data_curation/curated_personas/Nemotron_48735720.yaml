  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Quilting'', ''Baking'', ''Reading historical fiction'', ''Book club participation'', ''Bird watching'', ''Hiking'', ''Church choir singing'', ''Volunteer
    greeting new residents'']'
  career_goals: Although retired, Wendy’s primary ambition is to stay actively engaged in her community while maintaining her health and independence. She aims to continue leading the senior‑center’s social‑activity
    committee, mentor younger volunteers, and preserve local history by contributing oral histories to the Clinton County historical society. She also hopes to complete a memoir of her life’s experiences
    for her grandchildren, and to ensure a stable, organized transition of household responsibilities for her and her husband’s later years.
