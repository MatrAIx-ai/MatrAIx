persona_description: A mathematics educator who conducts research on the development and improvement of calculus concepts among students at Further Education and Training (FET) level. This person is interested
  in analyzing students' responses to National Senior Certificate Examination (NSC) calculus items to identify and categorize their perturbable concepts. The study aims to formulate an error analysis protocol
  that describes the errors and misconceptions students make in answering calculus problems, providing a framework for addressing these issues in mathematics education. The persona is likely to be interested
  in developing an analytical protocol for student calculus errors grounded from the findings of the study.
