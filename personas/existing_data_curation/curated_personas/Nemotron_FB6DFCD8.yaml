personas:
  professional: Aree Patel is a budding visual artist and community organizer who leverages their digital illustration skills, bilingual communication, and empathetic nature to design inclusive art workshops
    and social media campaigns for youth arts programs while preparing for a future career in art therapy.
  sports: Aree Patel enjoys weekend hikes in the Santa Cruz Mountains, participates in a local yoga studio’s sunrise classes, and, as an avid fan, they passionately support the San Jose Earthquakes, the
    San Jose Sharks, and the Golden State Warriors.
  arts: Aree Patel immerses themselves in contemporary art, drawing inspiration from creators like Banksy, Yayoi Kusama, and Ai Weiwei, curates personal exhibitions featuring their urban sketches and digital
    paintings, and they find solace in indie playlists from Bon Iver and Alt‑J while reading poetry by Ocean Vuong.
  travel: Aree Patel prefers spontaneous road trips to nearby coastal towns like Half Moon Bay and weekend escapes to Portland’s indie art scene, while daydreaming about future visits to the street‑art
    haven of Oaxaca, Mexico, and the historic temples of Kyoto, Japan, and they often map out itineraries using sketchbooks and travel blogs.
  culinary: Aree Patel experiments with spice‑laden chickpea curry, cumin‑infused cauliflower pizza, and turmeric‑bright quinoa bowls, balancing a modest kitchen skill set with a love for sourcing fresh
    cilantro, mustard seeds, and locally sourced vegetables to reinterpret traditional flavors with a modern twist, and they proudly share their dishes at community potlucks.
  core: Aree Patel is a 20‑year‑old art‑enthusiast who channels anxiety into vibrant sketches, overdraws their student account on sketchbooks, and compulsively reorganizes journal pages at midnight.
background:
  cultural: Aree comes from a Gujarati Indian family that emigrated to the United States in the early 2000s. She was raised in a bilingual household where Hindi and Gujarati were spoken alongside English,
    and she celebrates cultural festivals such as Diwali, Navratri, and Holi with her extended family. Her parents value education, community service, and preserving cultural traditions, which have shaped
    Aree's respect for harmony and cooperation. Living in San Jose's vibrant multicultural environment, she blends South Asian customs with Californian influences, often participating in local cultural
    events, attending community workshops, and engaging with a diverse network of friends. This hybrid identity informs her artistic perspective and her commitment to inclusive community initiatives.
