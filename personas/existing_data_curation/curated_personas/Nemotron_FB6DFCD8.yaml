  career_goals: Aree aspires to merge her passion for art with her desire to help others by pursuing a career in art therapy or community arts coordination. She plans to enroll in a community college program
    in visual arts while taking introductory psychology courses, with the long‑term goal of earning a bachelor’s degree in art therapy or a related field. In the meantime, she hopes to secure an internship
    at a mental‑health nonprofit where she can develop outreach materials and lead creative workshops for youth. Ultimately, she aims to create a safe, expressive space for marginalized young people in
    the Bay Area and use her own experiences with anxiety to inform her practice.
