  hobbies: '[''Mural painting'', ''Sketching'', ''Street‑art photography walks'', ''Visiting art galleries'', ''DIY home improvement projects'', ''Hiking in Torrey Pines'', ''Cooking Southern comfort food'',
    ''Listening to jazz and hip‑hop'', ''Playing console video games'', ''Volunteering as a youth art mentor'']'
  career_goals: Leo aims to leverage his associate’s degree and on‑site experience to move into a foreman or crew‑lead role within the next two to three years. He plans to earn a Construction Management
    Certification and, eventually, a bachelor’s degree in construction management or architecture, which will enable him to obtain a general contractor’s license. His long‑term ambition is to launch a boutique
    contracting firm that specializes in renovating homes and community spaces with artistic touches, such as custom murals and design elements that celebrate Black cultural heritage in San Diego. He also
    hopes to create a mentorship program that pairs tradespeople with local youth interested in both construction and visual arts, providing both career pathways and creative outlets.
