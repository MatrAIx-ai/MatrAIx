personas:
  professional: Leo Jones, a 35‑year‑old construction specialist in San Diego, blends hands‑on expertise in framing, concrete forming, and operating heavy equipment with a passion for mural art, and they
    lead small crews through flexible, improvisational planning while balancing assertive direction and cooperative problem‑solving despite a tendency to be relaxed about strict deadlines.
  sports: Leo Jones, a 35‑year‑old outdoor enthusiast, powers through solo hikes along the Torrey Pines coastal trail, tracks the San Diego Padres during baseball season, and occasionally joins pick‑up
    basketball games at a local community center, though their relaxed approach to routine exercise means gym visits are sporadic and driven by mood rather than schedule, and they often rely on the endorphin
    boost from the hikes to stay motivated.
  arts: Leo Jones, a San Diego resident, spends weekends sketching murals inspired by the bold colors of Keith Haring and the street‑art energy of Shepard Fairey, immerses themselves in the sounds of Miles Davis
    and Kendrick Lamar while painting, and attends performances by the Old Globe Theatre, channeling these influences into community‑art workshops they lead each month.
  travel: Leo Jones prefers impromptu road trips along the Pacific Coast Highway with stops at Big Sur and Santa Barbara, saves for occasional backpacking adventures to Oaxaca’s vibrant art districts, and
    they balance their love of solitude with occasional weekend getaways with a small circle of close friends, all while budgeting travel expenses through a dedicated travel‑fund spreadsheet.
  culinary: Leo Jones, an amateur home chef, perfects Southern comfort staples like smoky chicken‑and‑dumplings, creamy collard greens, and buttery cornbread using heirloom cornmeal and hot sauce, and they
    experiment with fresh seafood paella after waterfront hikes, yet their habit of juggling multiple projects often leaves the kitchen a delightful mess.
  core: Leo Jones is a solitary, art‑infused builder who blends construction skill with mural creativity, worries about deadlines yet they thrive on spontaneous projects, and they find comfort in cooking
    hearty Southern dishes.
background:
  cultural: Leo is an African‑American who grew up in San Diego’s historic Skyline‑Hills neighborhood. His parents migrated from the American South during the post‑civil‑rights era, bringing with them Southern
    culinary traditions, gospel music, and a strong sense of community activism. Immersed in a culturally diverse city, Leo was exposed early to the city’s renowned mural culture and Black‑owned community
    events, which shaped his appreciation for visual storytelling and cultural pride. He identifies with the broader Black diaspora in Southern California, supports Black‑owned businesses, participates
    in local cultural festivals, and seeks to preserve and celebrate his heritage through his art and community work.
