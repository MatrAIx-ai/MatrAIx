persona_description: A historian who specializes in the study of colonialism and imperialism, particularly the impact of European powers on India and its neighboring countries. Their research interests
  include the social, economic, and political effects of colonialism on the indigenous populations, the role of foreign missionaries in the transition from 18th-century mercantile capitalism to 19th-century
  industrial capitalism in India, and the influence of mother tongue and first language on language proficiency and identity.
