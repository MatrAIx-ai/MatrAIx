  hobbies: '[''Visiting art galleries'', ''Photography'', ''Hiking'', ''Home cooking experiments'', ''Reading food history'', ''Indie music concerts'', ''Community potlucks'', ''Yoga'', ''Meditation'',
    ''Volunteer work at soup kitchen'']'
  career_goals: Casey aims to deepen her culinary expertise by completing a formal apprenticeship with a chef renowned for innovative farm‑to‑table cuisine. Within the next five years she hopes to become
    a sous chef at a respected Midwestern restaurant, eventually advancing to executive chef and launching her own small bistro that fuses art and food, featuring rotating menus inspired by her travels
    and local Wisconsin harvests. She also aspires to lead community cooking workshops that emphasize creativity, inclusivity, and mindful cooking practices.
