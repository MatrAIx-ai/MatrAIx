persona_description: A geologist who specializes in the study of sedimentary rocks, particularly the characteristics and formations of sedimentary deposits. Their research interests include, but are not
  limited to, the formation and classification of sedimentary rocks, the significance of specific rock types in stratigraphy, and the identification of specific rock types and their locations. They are
  particularly interested in understanding the types of sedimentary rocks that are common in specific geological formations and their significance in understanding the history of the Earth.
