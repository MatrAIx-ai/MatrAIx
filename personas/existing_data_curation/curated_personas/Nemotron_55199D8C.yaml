personas:
  professional: Jesse Henry, a senior machinist with over two decades of manual and CNC precision experience, blends a practical knack for troubleshooting and blueprint reading with a restless curiosity
    for CAD/CAM and automation, using those skills to boost shop reliability while battling a dislike of rigid schedules and occasional deadline slippage as they pursue a lead supervisory role.
  sports: Jesse Henry, an avid weekend angler and occasional deer hunter, stays fit through regular weight‑lifting at the Mobile Community Center gym and informal baseball scrimmages with the Mobile Bay
    Anglers Association, while cheering on the New Orleans Saints in football season and the Atlanta Braves during baseball, and maintains membership in the Gulf Coast Hunters club for seasonal outings.
  arts: Jesse Henry, a part‑time acoustic guitarist who performs at the Riverfront Blues Festival and local country open‑mic nights, draws musical inspiration from legends like B.B. King, Willie Nelson
    and Chris Stapleton, collects vintage Fender pedals, and often quotes the poetry of blues lyricist Robert Johnson while swapping stories with fellow makers at the Mobile Makerspace.
  travel: Jesse Henry prefers spontaneous road trips along the Gulf Coast—often stopping at Gulf Shores for fresh oysters or the historic French Quarter of New Orleans for live blues—while dreaming of a
    fishing expedition to the Bahamas and a scenic bike tour of the Blue Ridge Parkway, balancing a modest vacation budget with an appetite for unplanned adventure and a love of coastal culture.
  culinary: Jesse Henry, a confident home chef, specializes in Gulf‑style seafood boils with crab, shrimp, and andouille sausage seasoned with Old Bay and cayenne, pairs them with slow‑smoked hickory‑cured
    brisket glazed in bourbon‑molasses, and frequently shares these dishes at community fish‑fry events while experimenting with homemade dry‑rub blends and a secret mustard‑based BBQ sauce.
  core: Jesse Henry believes a perfectly tuned CNC machine and a well‑seasoned crab boil define a good day, yet their spontaneous nature often leaves tools scattered, deadlines missed, and a lingering habit
    of late‑night guitar riffs after long shifts.
background:
  cultural: Jesse is a white Southern male raised in Mobile, Alabama, coming from a multigenerational working‑class family with deep ties to the region’s shipbuilding and manufacturing sectors. He grew
    up with Southern Baptist (and community‑center) traditions that emphasize hard work, hospitality, and a strong sense of local pride. The coastal culture of Mobile—rich in Gulf Coast cuisine, Creole
    influences, and a tight‑knit community of fishermen and tradespeople—shapes his identity. He values self‑reliance and pragmatic problem‑solving, while also enjoying the communal aspects of football
    Saturdays, fish fries, and neighborhood barbecues.
attributes:
  skills: '[''Manual milling'', ''CNC programming (Fanuc, Haas)'', ''Blueprint reading'', ''Tool and die maintenance'', ''Welding (MIG/TIG)'', ''CAD/CAM (SolidWorks, Fusion 360)'', ''Additive manufacturing
    (3D printing)'', ''Machine troubleshooting'', ''Production line optimization'']'
  hobbies: '[''Fishing (bay and freshwater)'', ''Hunting (waterfowl, deer)'', ''Woodworking'', ''Classic car restoration'', ''Playing acoustic guitar'', ''3D printing hobby projects'', ''Makerspace workshops'',
    ''Southern cooking (seafood boil, BBQ)'', ''Reading industrial innovation articles'', ''Attending local live music events'']'
  career_goals: Jesse aims to transition from a senior machinist to a lead supervisory role where he can shape shop workflows and mentor younger technicians. He plans to earn a NIMS Certified Machinist
    credential and deepen his CNC programming skills to spearhead automation projects. Long‑term, he envisions opening a boutique machine shop in Mobile that specializes in custom marine and automotive
    parts, integrating his love for new technologies with the practical demands of local industry. He also hopes to contribute to local vocational training programs, sharing his blend of curiosity and hands‑on
    practicality with the next generation.
