  hobbies: '[''Sketching'', ''Photography'', ''Visiting art galleries'', ''Live music concerts'', ''Intramural basketball'', ''Improv theater'', ''Community volunteering'', ''Hiking'', ''Reading contemporary
    literature'', ''Experimental cooking'']'
  career_goals: Dean aims to complete his bachelor's degree in Art History or Education within the next two years, followed by a Master's in Fine Arts and eventually a PhD to become a tenure‑track professor.
    He aspires to design interdisciplinary courses that merge visual arts with emerging technologies, publish research on innovative teaching methods, and secure grant funding for community arts outreach
    programs in Oklahoma. Long‑term, Dean envisions a leadership role as department chair, where he can promote inclusive curricula and mentor the next generation of educators.
