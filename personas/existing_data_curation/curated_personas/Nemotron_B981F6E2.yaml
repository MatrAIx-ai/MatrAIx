personas:
  professional: Dean Carlisle is an aspiring art‑history instructor who leverages meticulous curriculum design, basic graphic‑design skills, and a naturally charismatic, sociable style to make interdisciplinary
    lessons that blend visual arts, technology, and cultural studies feel alive for their students.
  sports: Dean Carlisle enjoys staying active through intramural basketball during the fall, adheres to a routine of early‑morning jogs on the Ouachita trail system, and they root for the Oklahoma City
    Thunder and the Oklahoma State Cowboys basketball teams, balancing competitive spirit with a laid‑back, team‑oriented vibe.
  arts: Dean Carlisle spends weekends sketching at the Stillwater Art Center, curates a micro‑exhibit of street‑art prints by Banksy, and they draw inspiration from the music of The Strokes and Frida Kahlo’s
    paintings, often referencing these influences in class discussions and workshop projects.
  travel: Dean Carlisle prefers spontaneous, budget‑friendly road trips with friends, planning each stop on a shared Google map, and they have already backpacked through Austin and Santa Fe while dreaming
    of a spring study tour of Florence and the Tuscan countryside.
  culinary: Dean Carlisle loves experimental cooking, frequently making beet‑infused risotto with goat cheese, miso‑marinated cauliflower tacos, and hand‑rolled ramen broth seasoned with kombu and shiitake,
    and they source fresh herbs like rosemary and thyme from local farmers’ markets to enhance each dish.
  core: Dean Carlisle is a curious, organized, and sociable twenty‑two‑year‑old who fuses artistic experimentation with meticulous planning, yet they can’t resist late‑night espresso runs and occasional
    procrastination on paper grading.
background:
  cultural: Dean was raised in a middle‑class white family in the Oklahoma Midwest, where community ties, modesty, and a strong work ethic are valued. His upbringing combined Midwestern practicality with
    Southern hospitality typical of Stillwater, exposing him to both local cowboy culture and the university’s progressive arts environment. Family traditions emphasize education, church involvement, and
    community service, fostering his cooperative and considerate nature. He is aware of the region’s Native American heritage and incorporates respect for diverse cultural expressions into his teaching
    and personal life.
attributes:
