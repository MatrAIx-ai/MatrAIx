  hobbies: '["Playing basketball at the community center", "Coding simple games with Scratch", "Building LEGO models", "Reading superhero comic books", "Attending youth hip-hop dance classes", "Listening
    to jazz and classic hip-hop music", "Playing Minecraft with friends online"]'
  career_goals: James dreams of becoming a civil engineer who designs safe playgrounds and community spaces, driven by his love for building with LEGO and problem‑solving skills. He also aspires to be a
    varsity‑level basketball player, hoping to inspire other kids from his Brooklyn neighborhood. Academically, he is determined to win the upcoming math competition and help his class achieve the highest
    ranking, reflecting his competitive nature and high standards.
