personas:
  professional: Luis Perwich, an experienced procurement strategist, leverages three decades of sourcing expertise and a humanities‑infused sensitivity to cultural nuances to design structured, sustainability‑oriented
    vendor frameworks, while their calm, resilient demeanor and preference for predictable processes guide collaborative yet assertive negotiations, and their ambition to transition into senior advisory
    and teaching roles fuels mentorship of emerging procurement talent.
  sports: Luis Perwich enjoys low‑impact fitness through weekend hikes in the Sawtooth foothills and is a member of the Boise Hiking Club, occasionally cheering on the Idaho State Bengals football team
    while favoring the Colorado Rockies for baseball, and they participate in a senior walking group that meets at the local park each Thursday.
  arts: Luis Perwich immerses themselves in artistic expression by reading works of Octavio Paz and Juan Rulfo, photographing cultural moments, and listening to traditional mariachi ensembles alongside
    the blues of B.B. King, while their admiration for muralists like Diego Rivera inspires modest woodworking projects that blend function with folk motifs.
  travel: Luis Perwich plans travel loosely, favoring road trips that combine photography and nature, such as a recent journey to Yellowstone and a nostalgic visit to Oaxaca to study regional markets, while
    their dream itinerary includes the Patagonian Andes and a rail adventure across the Canadian Rockies.
  culinary: Luis Perwich showcases culinary skill by crafting authentic mole poblano and hand‑rolled tamales using locally sourced heirloom chilies, masa, and chocolate, complementing the dishes with Idaho
    potatoes and fresh farm‑grown tomatoes, and they delight in experimenting with spice blends while often over‑seasoning their sauces.
  core: Luis Perwich blends a structured procurement mind with a calm, solitary lifestyle, favoring sustainable sourcing, modest gardening, and occasional culinary forays, all while navigating a relaxed
    approach to planning and a habit of missing a few medication doses.
background:
  cultural: As the child of Mexican immigrants, Luis grew up bilingual in Spanish and English, steeped in Mexican traditions while navigating life in the Pacific Northwest. He maintains strong ties to his
    extended family in Mexico, celebrating Día de los Muertos and other holidays with authentic rituals adapted to his Idaho community. This bicultural upbringing fosters his appreciation for diverse perspectives,
    which he applies to ethical sourcing and respectful vendor interactions. Living in Garden City, Idaho, has also instilled a love for the region’s natural landscape and a self‑reliant mindset. Luis’s
    cultural identity is a quiet but steady influence on his values of humility, perseverance, and cooperative engagement.
attributes:
  skills: '[''Strategic sourcing'', ''Vendor evaluation and qualification'', ''Contract negotiation'', ''Cost‑benefit analysis'', ''Inventory control'', ''Sustainability sourcing'', ''Compliance and risk
    management'', ''Procurement software (SAP Ariba, Oracle Procurement Cloud)'', ''Advanced Excel and data modeling'', ''Cross‑cultural communication'']'
  hobbies: '[''Reading Mexican literature'', ''Cooking traditional Mexican dishes'', ''Gardening heirloom vegetables'', ''Hiking the Sawtooth foothills'', ''Landscape and cultural photography'', ''Participating
    in a small book club'', ''Volunteering at a Mexican cultural center'', ''Woodworking'', ''Listening to mariachi music'']'
  career_goals: Looking ahead, Luis aims to transition into a senior advisory role where he can shape ethical and sustainable procurement strategies for his organization. He plans to obtain the Certified
    Professional in Supply Management (CPSM) credential to formalize his expertise, lead the implementation of an integrated procurement platform that balances structure with flexibility, and mentor a new
    generation of purchasing professionals. Ultimately, he envisions a gradual move toward part‑time consulting or teaching procurement principles at a community college, ensuring his legacy of calm, resilient
    leadership endures.
