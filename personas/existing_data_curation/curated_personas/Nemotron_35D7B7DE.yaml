personas:
  professional: Juan Aluart is a senior maintenance supervisor who channels a blend of hands‑on HVAC, plumbing, and industrial equipment expertise with PMP‑level project management, using IoT‑enabled predictive
    tools to cut downtime, while their talkative, competitive spirit turns every crew meeting into a lively brainstorming session and makes them a natural trainer and stakeholder liaison.
  sports: Juan Aluart is a devoted soccer enthusiast who never misses a match of the national team and follows the local club San Juan FC, while also belonging to the Condado Runners Club for early‑morning
    boardwalk jogs and participating in weekend fishing tournaments that double as team‑building outings.
  arts: Juan Aluart channels their creative side through guitar, often performing at salsa nights and community festivals, drawing inspiration from artists such as Celia Cruz, Marc Anthony, and Carlos Santana,
    and they maintain a curated collection of vintage Latin jazz and salsa vinyl records that fuel their playlists.
  travel: 'Juan Aluart prefers a blend of planned and spontaneous escapes: they regularly weekend‑trip to nearby coastal towns like Vieques for fishing, have a bucket list that includes a tech conference
    in Barcelona and a cultural tour of Havana, yet family commitments keep most vacations within a short flight radius, prompting careful budgeting and advance booking.'
  culinary: Juan Aluart is an avid home chef who masters traditional dishes like mofongo relleno de camarones and arroz con gandules, seasoning with sofrito, plantain, and cilantro, while experimenting
    with sous‑vide for a perfect pernil, and they frequently host dinner nights where friends sample their signature tostones paired with local rum.
  core: Juan Aluart is a charismatic, tech‑savvy maintenance leader who balances competitive ambition with a love for salsa, early runs, and weekend fishing, but can be overly skeptical during negotiations
    and occasionally skips dental care.
background:
  cultural: Juan was raised in the vibrant urban setting of San Juan, where the rhythms of bomba, plena, and salsa blend with the island’s Spanish‑colonial heritage. He grew up bilingual, speaking Spanish
    at home and English at school, and his Puerto Rican identity is shaped by strong family ties, Catholic traditions, and a deep respect for the island’s resilience. The local cuisine, coastal lifestyle,
    and communal celebrations—such as the San Sebastián Festival—remain central to his worldview. Though divorced, he maintains close connections with his extended family and community, reflecting the collectivist
    values typical of Puerto Rican culture. His professional training in business further adds a mainland U.S. perspective, enabling him to navigate both local and global business environments.
attributes:
  skills: '["Mechanical systems troubleshooting", "Preventive and predictive maintenance planning", "Team leadership and conflict resolution", "Work order management (digital platforms)", "Safety and regulatory
    compliance (OSHA, local codes)", "Budgeting and cost control", "Project scheduling and resource allocation", "Vendor negotiation and contract management", "Process improvement (Lean, Six Sigma)", "Training
    and mentorship", "Bilingual communication (Spanish/English)", "Adoption of emerging maintenance technologies"]'
  hobbies: '["Salsa dancing", "Playing the guitar", "Cooking Puerto Rican cuisine", "Running along the Condado boardwalk", "Weekend fishing trips", "DIY home improvement projects", "Mentoring young mechanics",
    "Following soccer matches", "Attending community festivals", "Exploring historic Old San Juan"]'
  career_goals: He aims to advance from his current supervisory role to a senior operations or plant manager position within the next five years, overseeing larger facilities and multiple maintenance divisions.
    He plans to earn PMP certification and become a Certified Maintenance & Reliability Professional (CMRP) to enhance his credibility. Juan is also interested in piloting smart‑building and IoT predictive
    maintenance solutions for his organization, demonstrating tangible ROI. Ultimately, he envisions establishing his own boutique mechanical services firm that combines cutting‑edge technology with a strong
    emphasis on customer service and employee development, positioning himself as a thought leader in Puerto Rico’s maintenance industry.
