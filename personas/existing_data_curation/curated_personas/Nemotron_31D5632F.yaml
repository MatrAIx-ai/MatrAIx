  hobbies: '[''Reading classic novels'', ''Chess'', ''Gardening (roses)'', ''Watercolor painting'', ''Historical documentaries'', ''Local history research'', ''Cooking Italian cuisine'', ''Volunteer IT
    support for senior center'', ''Birdwatching'', ''Walking in forest preserves'']'
  career_goals: At 70, Jack aims to transition from full‑time management to selective consulting, mentoring emerging IT professionals, and volunteering his expertise to local nonprofit organizations focused
    on digital inclusion for seniors. He wishes to author a reflective guide on integrating humanities perspectives into technology leadership, fostering harmonious workplace cultures, and preserving the
    value of flexible, people‑centric management. His ambition is to leave a lasting imprint on the Schaumburg tech community through knowledge‑sharing and community service while maintaining a schedule
    that respects his preference for low‑key, structured commitments.
