personas:
  professional: Lilian Trabazo, a budding junior engineer, channels their love of LEGO building and puzzle solving into early experiments with simple mechanical concepts, applying disciplined, step‑by‑step
    planning and a high‑standard drive for perfection in every project.
  sports: Lilian Trabazo, a spirited defender for the Riverside Soccer Club’s Under‑7 team, thrives on the high‑energy group drills and weekend matches, cheering on their favorite professional squad, the
    City Strikers, while also admiring the national women’s team, the Stars, and eagerly counting down to the regional youth tournament each spring.
  arts: Lilian Trabazo, a lively participant in folkloric dance classes, delights in mastering traditional footwork to the rhythm of mariachi music and idolizes dancer Misty Copeland, while their evenings
    are filled with storybooks such as Ada Twist, Scientist and The Paper Bag Princess and their playlist features songs by Lin‑Manuel Miranda and the whimsical score of Pixar’s Coco.
  travel: Lilian Trabazo, an adventurous family‑trip planner, loves structured day‑out itineraries that include visits to nearby destinations like the hillside botanical garden in Santa Fe and the interactive
    science museum in Chicago, while dreaming of future excursions to the pyramids of Giza and the cherry‑blossom festivals of Kyoto, always packing a blank travel journal to sketch each new scene.
  culinary: Lilian Trabazo, an enthusiastic junior chef, loves mashing ripe avocados, lime juice, diced tomato, and cilantro into creamy guacamole, expertly garnishing it with a sprinkle of sea salt, and
    also delights in assembling cheesy quesadillas on a skillet while proudly mastering the art of butter‑toasted whole‑grain toast with strawberry jam.
  core: Lilian Trabazo blends a meticulous, LEGO‑building precision with a boundless love for team games and community festivals, yet occasionally battles a habit of reorganizing toys mid‑play, revealing
    a charming clash between order and spontaneity.
background:
  cultural: Lilian’s family is of Mexican descent, and she grows up in a bilingual home where Spanish is spoken alongside English. Family gatherings often feature traditional Mexican foods such as tamales
    and pozole, and celebrations like Día de los Muertos, Cinco de Mayo, and birthday piñatas reinforce her cultural pride. The values of familismo and respeto shape her cooperative and kind nature, encouraging
    her to consider the needs of others. Living in San Antonio, a city rich in Mexican‑American culture, she participates in local events such as Fiesta San Antonio, which expose her to mariachi music,
    dancing, and community art, further strengthening her connection to her heritage.
attributes:
  skills: '["Reading fluency", "Basic writing", "Basic arithmetic (addition/subtraction)", "Bilingual communication (English/Spanish)", "Following routines", "Organizing personal space", "Teamwork", "Puzzle
    solving", "LEGO building"]'
  hobbies: '["Playing with LEGO", "Solving jigsaw puzzles", "Soccer", "Folkloric dance", "Reading storybooks", "Helping in the kitchen", "Attending community festivals", "Crafts (beadwork)"]'
  career_goals: Nurturing her desire to help others and her love of structure, Lilian dreams of becoming a teacher one day, where she can organize lessons and support classmates, or a veterinarian, caring
    for animals with the same kindness she shows her pets. She aims to maintain high grades, win school awards, and join science clubs to explore biology, believing that disciplined study habits will lead
    her toward a future in a caring profession.
