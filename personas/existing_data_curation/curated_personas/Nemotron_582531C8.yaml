personas:
  professional: A seasoned retail professional named Tien Choi harnesses their meticulous organization, bilingual fluency, and vivid artistic vision to craft immersive store displays, set competitive sales
    targets, mentor staff, and shape a future boutique that fuses commerce with community art.
  sports: A passionate sports enthusiast Tien Choi enjoys playing golf at the Naples Country Club, jogging the Gulf shoreline with a senior fitness group, and cheering for the Miami Dolphins and Tampa Bay
    Rays, approaching personal fitness with a blend of social camaraderie and a quietly competitive drive.
  arts: An imaginative artist Tien Choi spends weekends capturing sunrise over the Gulf with a Nikon D5600, creating abstract watercolor series inspired by Claude Monet and Lee Krasner, volunteering at
    the Naples Museum of Art to curate community art walks, and performing in local improv theater while listening to Debussy and Yiruma to fuel their creative spark.
  travel: A meticulously planned traveler Tien Choi prefers curated cultural trips, having photographed sunrise in Key West, explored the historic streets of Kyoto, and trekked the vineyards of Tuscany,
    while balancing family gatherings and budgeting, always packing a sketchbook for spontaneous watercolor studies on the road.
  culinary: A culinary enthusiast Tien Choi expertly prepares Korean staples such as bibimbap and kimchi jjigae for family gatherings, complements them with fresh Gulf shrimp scampi and grilled mackerel,
    and cultivates succulent herbs for garnish, yet has a habit of over‑seasoning in pursuit of bold flavors.
  core: Tien Choi is a 63‑year‑old bilingual retail veteran with a vivid artistic soul, a competitive edge, and a sociable, organized flair that fuels their pursuit of community‑focused boutique dreams
    and lifelong curiosity.
background:
  cultural: Tien is a second-generation Korean American whose parents immigrated to the United States in the early 1970s. Raised in a bilingual household, he celebrates Korean holidays such as Chuseok and
    Seollal while fully embracing American customs in Florida. His cultural upbringing emphasizes respect for elders, the importance of education, and communal harmony, which influence his meticulous work
    ethic and sociable nature. The fusion of East Asian heritage with the vibrant, multicultural environment of Naples, FL, informs his artistic tastes, culinary preferences, and his dedication to fostering
    cross-cultural connections within the local community.
