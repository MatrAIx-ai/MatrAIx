  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Reading Classic Literature'', ''Cooking Korean Cuisine'', ''Mahjong'', ''Succulent Gardening'', ''Art Museum Volunteering'', ''Community
    Improv Theater'']'
  career_goals: Tien aims to transition from frontline retail to a management role where he can mentor younger employees and shape the store’s visual identity. He envisions opening a boutique that blends
    retail with local art exhibitions, creating a community hub for artists and shoppers. Over the next five years he hopes to earn recognition as an innovative retail leader in Collier County, develop
    a mentorship program for aspiring salespeople, and eventually author a guide on integrating artistic concepts into retail environments.
