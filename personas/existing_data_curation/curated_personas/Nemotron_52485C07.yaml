  hobbies: '[''Reading (science, history, fiction)'', ''Hiking & Nature Walks'', ''Birdwatching'', ''Chess'', ''Woodworking'', ''Photography'', ''Gardening (vegetable & native plants)'', ''Volunteering
    (STEM tutoring, community writing workshops)'', ''Attending local literary events'', ''Cooking (Tex-Mex & BBQ)'', ''Meditation and journaling'', ''Collecting vintage vinyl records'']'
  career_goals: Dallas aims to author a bestselling series that demystifies cutting‑edge STEM topics for adult learners, positioning himself as a trusted bridge between science and everyday life. He plans
    to secure a contract with a major publishing house for a comprehensive history of the Texas tech boom, while simultaneously developing supplemental digital resources and online courses. Over the next
    five years he hopes to earn recognition through literary awards and keynote invitations at science‑communication conferences. Dallas also wants to give back by establishing a local writer‑mentor program,
    offering workshops that blend disciplined writing practices with supportive community building. Ultimately, he envisions a balanced career where his published works sustain his financial independence
    and his mentorship efforts enrich the Plano literary scene.
