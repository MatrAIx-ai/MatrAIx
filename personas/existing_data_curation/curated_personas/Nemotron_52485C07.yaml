personas:
  professional: Dallas Manning, a 58‑year‑old veteran technical writer and narrative strategist, fuses a STEM bachelor's background with disciplined project management to distill cutting‑edge scientific
    research into clear nonfiction using Scrivener, LaTeX, and Adobe InDesign while mentoring emerging writers through structured workshops.
  sports: Dallas Manning, an avid hiker in the Texas Hill Country and member of the Plano Trailblazers Hiking Club, also follows the Dallas Mavericks and Dallas Cowboys, occasionally joins a local chess
    league that doubles as a mental‑fitness routine, and they schedule Friday morning bike rides to balance endurance with their love of the outdoors.
  arts: Dallas Manning cultivates creativity through woodworking projects, a cherished collection of vintage vinyl records featuring Willie Nelson, Stevie Ray Vaughan, and Johnny Cash, and active participation
    in a Plano book club that discusses both classic literature and contemporary science writing, all of which they credit with sharpening their narrative voice.
  travel: Dallas Manning prefers meticulously planned trips that blend adventure and cultural immersion, such as a recent road‑trip itinerary through Big Bend National Park, a culinary tour of Oaxaca, Mexico
    to explore authentic mole and mezcal, and a scheduled visit to the Smithsonian’s National Air and Space Museum, always booking accommodations months in advance to satisfy their need for structure.
  culinary: Dallas Manning enjoys experimenting with Tex‑Mex and barbecue recipes, regularly preparing dishes like smoked brisket tacos with pickled jalapeños, roasted corn elote with cotija cheese, and
    garden‑fresh rosemary potatoes, while their modest vegetable garden supplies herbs and tomatoes that they incorporate into weekly meals, reflecting a blend of creativity and routine.
  core: Dallas Manning, a meticulous 58‑year‑old writer, balances a relentless quest for knowledge with an organized, worry‑prone mind, channeling anxiety into disciplined writing, gardening, and vintage‑vinyl
    listening while occasionally procrastinating on flossing.
background:
  cultural: Dallas grew up in a middle‑class white family in the Midwest before moving to Plano, Texas for its thriving tech corridor and vibrant literary community. His upbringing blended traditional American
    values of self‑reliance and community service with the openness of academic environments he experienced during his STEM studies at a state university. Living in Collin County, he has embraced Texan
    hospitality, regional cuisine, and the area's affinity for both entrepreneurship and the outdoors. While his heritage ties him to broader Anglo‑American cultural norms, his personal narrative reflects
    a synthesis of Midwestern pragmatism, Southern conviviality, and the intellectual curiosity nurtured by his scientific education.
attributes:
  skills: '[''Technical Writing'', ''Creative Writing'', ''Research & Fact-Checking'', ''Editing & Proofreading'', ''Project Management'', ''Data Analysis'', ''Scientific Literacy'', ''Content Strategy'',
