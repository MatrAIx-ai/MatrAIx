personas:
  professional: A dedicated transit bus driver navigating the bustling arteries of Tulsa, Rhonda Jackson leverages their Class B CDL, thorough pre‑trip inspections, and keen knowledge of city routes to
    deliver safe rides while seamlessly weaving art commentary into passenger interactions, and they’re quietly charting a path toward a Class A license, a driver‑trainer role, and future studies in urban
    planning.
  sports: An engaged local sports fan who balances weekday driving with weekend hikes in the Ouachita foothills, Rhonda Jackson cheers for the Tulsa Drillers, follows FC Tulsa’s soccer matches, and occasionally
    joins a community pick‑up basketball game at the Memorial park, yet their flexible schedule means they sometimes miss a scheduled trail run.
  arts: A devoted art lover who spends evenings sketching murals in the Tulsa Arts District, listening to podcasts on art history, and photographing sunrise light on downtown streets, Rhonda Jackson frequently
    references works by Georgia O’Keeffe, Banksy, and local muralist Antonio Reyes, and they’re known to share spontaneous anecdotes about the Philbrook Museum with passengers.
  travel: A spontaneous weekend explorer who mixes impromptu road trips with purposeful art tours, Rhonda Jackson has driven the historic Route 66 to Amarillo, trekked the Ozark National Forest, and dreams
    of a weekend sabbatical in Santa Fe to study Pueblo architecture, but their laid‑back planning sometimes leaves packing for the next day.
  culinary: A creative home‑chef who whips up earthy meals using balcony‑grown basil and rosemary, Rhonda Jackson loves recooking a spicy black‑bean chili with cornbread, avocado toast topped with cherry
    tomatoes, and occasional homemade gumbo, while they still occasionally order a quick take‑out bite between routes due to time constraints.
  core: Rhonda Jackson fuses a love for art, a relaxed approach to life, and a drive to mentor future drivers, all while navigating the chaos of a busy schedule with a sketchpad in hand, and they often
    trade traffic anecdotes for spontaneous mural critiques.
background:
  cultural: Rhonda grew up in a modest, working‑class family in the Tulsa metropolitan area, absorbing the Midwestern values of independence, friendliness, and community involvement that characterize Oklahoma’s
    cultural landscape. As a white American from the Heartland, she was raised with an appreciation for country music, weekend barbecues, and local sports, while also being exposed to the city’s rich Native
    American heritage and vibrant arts scene. Her upbringing emphasized a strong work ethic, self‑reliance, and informal learning, which shaped her decision to enter the transit workforce without completing
    a high‑school diploma. Rhonda’s cultural identity blends the pragmatic, down‑to‑earth sensibility of rural Oklahoma with a curiosity for artistic expression and unconventional ideas that she encounters
    in Tulsa’s diverse neighborhoods.
attributes:
  skills: '[''Safe vehicle operation (Class B CDL)'', ''Route planning and navigation'', ''Pre‑trip vehicle inspection and basic maintenance'', ''Customer service and conflict resolution'', ''Fare collection
