    ''Adaptability and problem‑solving'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Photography (urban and landscape)'', ''Listening to art and culture podcasts'', ''Hiking in the Ouachita foothills'',
    ''Gardening on a balcony'', ''Wood‑burning crafts'', ''Attending open‑mic nights'', ''Participating in a commuter book club'']'
  career_goals: Rhonda aims to upgrade to a Class A CDL and eventually qualify as a driver trainer, mentoring new hires and sharing best‑practice safety techniques. She hopes to pursue a GED and enroll
    in community college courses in urban planning or transportation management, with a long‑term ambition to move into a supervisory role within Tulsa Transit’s operations department. Parallel to her transportation
    career, Rhonda dreams of curating community‑based art projects on buses and public spaces, leveraging her love of art to enhance riders’ experiences. She also envisions starting a weekend guided "art
    bus tour" that combines her driving expertise with her passion for local galleries and murals.
