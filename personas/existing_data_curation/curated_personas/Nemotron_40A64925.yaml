personas:
  professional: Shaquille People is a budding comic illustrator and self‑taught Python developer who blends hand‑drawn storytelling with interactive digital games, channeling their curiosity and methodical
    planning into weekly art‑tech workshops for classmates.
  sports: Shaquille People plays pickup basketball at the local park, competes in the neighborhood youth league affiliated with the New Orleans Pelicans' community outreach program, follows the Pelicans
    and LSU Tigers in college basketball, and practices weekend runs to improve stamina for both court and occasional skateboarding.
  arts: Shaquille People immerses themselves in comic art, drawing inspiration from legendary illustrator Alex Ross and independent creator Noelle Stevenson, while vibing to hip‑hop pioneer Kendrick Lamar,
    jazz saxophonist Kamasi Washington, and the brass sounds of the Rebirth Brass Band, regularly attending the New Orleans Museum of Art's youth workshops and the annual French Quarter Arts Festival.
  travel: Shaquille People explores the historic French Quarter on family outings, has taken a school field trip to the National WWII Museum, dreams of flying to Tokyo to visit the Ghibli Museum, and hopes
    to road‑trip along the Gulf Coast to catch sunrise at Gulf Islands National Seashore.
  culinary: Shaquille People enjoys cooking gumbo with roux, shrimp, andouille sausage, and okra, and whipping up jambalaya seasoned with cayenne, bell peppers, and thyme, mastering the simmering technique
    under Grandma’s guidance while also experimenting with beignets and cajun‑spiced mac and cheese.
  core: Shaquille People is a methodical teen artist who sketches comic panels on the back of math worksheets, hoards limited‑edition sneaker releases despite a modest allowance, and can’t resist the midnight
    urge to remix jazz beats into their school projects.
background:
  cultural: Shaquille is an African-American teen raised in Westwego, a modest city on the west bank of the Mississippi River in Jefferson Parish, Louisiana. His family's roots blend the deep traditions
    of the African-American community with the broader Cajun-Creole culture that characterizes the Gulf Coast. He grew up attending a Baptist church, where music, community service, and storytelling are
    central. The proximity to New Orleans exposes him to jazz, brass-band parades, Mardi Gras celebrations, and vibrant street art, all of which shape his appreciation for music and visual expression. Family
    gatherings often feature Creole cuisine like gumbo, red beans and rice, and communal cooking, reflecting a strong emphasis on food, hospitality, and shared heritage. Local festivals, second-line parades,
    and block parties reinforce a sense of neighborhood pride and cultural continuity, which Shaquille carries forward in his art and community aspirations.
attributes:
  skills: '["Hand-drawn sketching", "Digital illustration (Procreate, Photoshop)", "Basic Python programming", "Organizational planning and note-taking", "Team collaboration in school projects", "Basketball
    fundamentals", "Classroom assistance (materials organization)", "Public speaking (student council)"]'
  hobbies: '["Drawing comics", "Digital art experimentation", "Basketball", "Listening to hip‑hop, jazz, and brass band music", "Python coding projects (interactive stories, simple games)", "Reading graphic
    novels", "Attending community art fairs and museum visits", "Cooking Creole dishes (gumbo, jambalaya) with family", "Volunteering at church youth group (event organization, tutoring)"]'
  career_goals: Shaquille envisions a future where his passion for art, technology, and community intersect. He aims to earn a scholarship to a high-school program with strong visual-arts and computer-science
    tracks, then pursue a bachelor’s degree in graphic design or interactive media. His long-term ambition is to become a creative director or UX designer who creates culturally resonant visual campaigns
    and public murals that celebrate his neighborhood’s heritage. He also hopes to develop video-game concepts that tell stories rooted in African-American and Louisiana culture, and to mentor younger students
    in his community through art workshops.
