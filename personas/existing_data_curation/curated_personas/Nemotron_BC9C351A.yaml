  career_goals: Benjamin aims to pursue a graduate degree in computational neuroscience or artificial intelligence, with a long-term ambition to lead interdisciplinary research that bridges technology and
    the arts. He plans to secure a research internship that leverages his data-science expertise while exploring creative AI applications, eventually positioning himself for a post-doctoral role or a senior
    data-science position in an innovative startup. His competitive drive pushes him to publish in top conferences and build a portfolio that showcases both technical rigor and artistic insight.
