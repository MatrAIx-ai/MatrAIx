personas:
  professional: Benjamin Zorn, a 19‑year‑old computer‑science graduate with a B.S. in data science, deploys Python, R, MATLAB, and machine‑learning pipelines to extract neuroscientific insights while infusing
    his analytical work with artistic intuition, meticulously documenting every experiment to satisfy his exacting standards.
  sports: Benjamin Zorn finds solace on the Natchez Trace, completing 10‑mile hikes with the Middle Tennessee Trail Club, while cheering for the Nashville Predators in the NHL and the Tennessee Titans in
    the NFL, and joining weekend pick‑up basketball games that satisfy their competitive edge.
  arts: Benjamin Zorn draws inspiration from street muralist Banksy and light‑installation artist James Turrell, spends Saturday evenings at the Frist Art Museum, creates digital illustrations in Adobe
    Photoshop, plays acoustic guitar to the tunes of John Mayer, and produces ambient electronic tracks in Ableton Live that echo the minimalist soundscapes of Brian Eno.
  travel: Benjamin Zorn prefers intelligently planned trips that blend artistic immersion with quiet reflection, having documented a week‑long graffiti tour of Berlin’s Kreuzberg district, a meditation
    retreat in Kyoto’s Arashiyama bamboo forest, and a solo hiking expedition in Iceland’s Landmannalaugar, while budgeting each journey with a spreadsheet to avoid overspending.
  culinary: Benjamin Zorn balances modest kitchen skills with a love for bold flavors, cooking quinoa bowls with roasted sweet potatoes, black beans, and avocado, mastering perfect shakshuka using fresh
    tomatoes and feta, and treating themselves to occasional sushi rolls with tuna and wasabi during late‑night creative sessions.
  core: Benjamin Zorn, 19, merges disciplined data‑science expertise with an artistic heartbeat, channels intense anxiety into meticulous routines, competes fiercely in board games, and habitually over‑edits
    digital art at 2 a.m.
background:
  cultural: Benjamin grew up in Canton, Mississippi, a close‑knit, predominantly white Southern community where family, church, and local traditions play a central role. He was raised with Southern hospitality
    and a strong sense of responsibility, attending community events like high-school football games and church potlucks. While his cultural roots emphasize modesty, respect for elders, and community support,
    his exposure to online art and tech cultures has broadened his worldview, fostering an appreciation for diverse perspectives and unconventional ideas.
