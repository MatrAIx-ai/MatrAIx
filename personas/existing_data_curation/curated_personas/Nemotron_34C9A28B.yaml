personas:
  professional: Maria Villamil is a seasoned building inspector in Ohio who leverages deep expertise in the Ohio and International Building Codes, advanced digital tools—including drones and infrared thermography—and
    a disciplined, organized workflow to produce meticulous compliance reports, while their curious and competitive nature drives continuous learning in sustainable practices like LEED.
  sports: Maria Villamil energizes their competitive spirit through a co‑ed amateur softball league in the Columbus area, weekly hikes on the Ohio State Trail with the local hiking club, and cheering for
    the Cleveland Browns and Cleveland Cavaliers, while they also follow the Cincinnati Reds during baseball season.
  arts: Maria Villamil regularly visits the Cleveland Museum of Art and the Cincinnati Art Museum, captures architectural photography inspired by Julius Shulman and Annie Leibovitz, dances salsa to Celia
    Cruz and Willie Colón at Puerto Rican cultural festivals, and reads Caribbean literature by Edwidge Danticat and Spanish poetry by Pablo Neruda, weaving these artistic influences into their daily life.
  travel: Maria Villamil prefers meticulously planned trips that combine architectural exploration and sustainable tourism, having toured the historic streets of Old San Juan, the modernist marvels of Barcelona,
    and the volcanic landscapes of Iceland, while they dream of a future visit to Machu Picchu to study Inca stonework.
  culinary: Maria Villamil is an adept home cook who perfects traditional arroz con gandules, slow‑roasted pernil with adobo seasoning, and plantain mofongo, while also experimenting with farm‑to‑table
    salads featuring heirloom tomatoes and fresh basil, and they relish pairing these dishes with tropical fruit‑based cocktails.
  core: Maria Villamil blends a disciplined, code‑driven professional life with a vibrant love for salsa, photography, and community service, often juggling multiple projects and occasionally sacrificing
    sleep to meet deadlines, yet they remain emotionally steady and fiercely competitive.
background:
  cultural: Maria grew up in a bilingual Puerto Rican household, speaking both Spanish and English, and she carries a strong sense of Caribbean heritage while living in Amherst, Ohio. Her family traditions—celebrating
    Three Kings Day, enjoying plena and bomba music, and preparing classic Puerto Rican meals—remain central to her identity. She actively participates in the local Latinx community, helping to organize
    cultural events that blend Puerto Rican customs with Midwestern sensibilities. Maria's cultural background informs her appreciation for vibrant aesthetics and narrative storytelling, which she brings
    to her work by considering both functional and artistic aspects of the built environment. Her heritage also fuels her commitment to mentorship and fostering diversity within the construction and inspection
    fields.
attributes:
  skills: '[''Ohio Building Code Knowledge'', ''International Building Code Knowledge'', ''Structural Integrity Assessment'', ''Safety Compliance Inspection (Electrical, Fire, Accessibility)'', ''Digital
    Inspection Tools Operation'', ''Drone Aerial Surveying'', ''Construction Management Software Proficiency (Procore, PlanGrid)'', ''Detailed Report Writing and Documentation'', ''Project Scheduling and
    Deadline Management'', ''Public Speaking and Stakeholder Communication'', ''Conflict Resolution and Negotiation'', ''Training and Mentoring Junior Inspectors'', ''Sustainable Building Standards Integration
    (LEED, ENERGY STAR)'']'
  hobbies: '[''Art Museum and Gallery Visits'', ''Architectural Photography'', ''Salsa Dancing and Puerto Rican Cultural Festivals'', ''Cooking Traditional Puerto Rican Cuisine'', ''Volunteer Work with
    Habitat for Humanity'', ''Community Event Organization'', ''Amateur Softball League Participation'', ''Hiking and Nature Photography on Ohio State Trail'', ''DIY Home Renovation and Woodworking'', ''Reading
    Caribbean Literature and Spanish Poetry'', ''Following Construction Technology Podcasts'']'
  career_goals: Maria aims to become a certified building official (ICC Certified Building Official) and advance to a senior inspection manager role within her agency, overseeing a regional team of inspectors.
    She is pursuing LEED Accredited Professional credentials to specialize in green building inspections and hopes to lead the development of sustainable inspection protocols for Ohio. Over the long term,
    Maria envisions founding her own consulting firm focused on historic preservation and energy-efficient building assessments, providing mentorship programs for women entering the construction field,
    and serving on the local planning commission to influence community development while championing inclusive, culturally aware practices.
