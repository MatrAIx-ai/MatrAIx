  career_goals: Phillip aims to advance from his current nuclear technician role to a senior systems engineer or radiation safety officer within the next five years. He plans to complete a Bachelor’s degree
    in Nuclear Engineering, obtain NRC licensure, and acquire certifications such as the Certified Health Physicist (CHP). He is driven to lead a team responsible for optimizing reactor efficiency while
    integrating emerging technologies like advanced sensors and AI‑driven predictive maintenance. Long‑term, he envisions contributing to research on next‑generation nuclear reactors and potentially transitioning
    into a consultancy role that bridges technical expertise with public outreach, leveraging his artistic interests to communicate complex nuclear concepts to broader audiences.
