personas:
  professional: Kavitha Somera, an aspiring digital illustrator and theatre enthusiast, channels their curiosity and organized flexibility into creating detailed watercolor and pixel artworks for school
    projects while they confidently lead debate rehearsals and collaborative performances.
  sports: Kavitha Somera enjoys the rhythmic discipline of Bharatanatyam as daily movement, participates in their school's cross‑country team for endurance, plays weekend pick‑up soccer with the Burlington
    Youth Soccer Club, and avidly follows the Boston Celtics and New England Patriots, balancing structured training with a relaxed love for community sport.
  arts: Kavitha Somera immerses themselves in sketching museum exhibits, draws inspiration from watercolorist Yao Cheng and the animated storytelling of Studio Ghibli's Spirited Away, frequently revisits
    graphic novels by Marjane Satrapi, and finds solace in the Carnatic renditions of M S Subbulakshmi and the indie sounds of Tame Impala, and they weave these influences into their own digital illustrations
    and poetry.
  travel: Kavitha Somera prefers mixed itineraries that blend cultural immersion with creative exploration, often planning trips months ahead using Instagram mood boards, they have visited New York City’s
    Metropolitan Museum, the historic streets of Charleston, and a family pilgrimage to Chennai, while dreaming of a solo backpacking adventure through the Scottish Highlands and a future art‑focused study
    tour in Kyoto.
  culinary: Kavitha Somera delights in mastering family recipes like crisp dosa and spiced masala chai with their mother, experiments with fusion dishes such as avocado‑filled samosa and mango‑lassi pancakes,
    and they stock a well‑organized pantry of key ingredients like turmeric, moong dal, and fresh basil, reflecting a budding chef’s love for both traditional flavors and inventive twists.
  core: Kavitha Somera is a vibrant cultural bridge who channels boundless curiosity into art and storytelling, yet they sometimes binge‑watch anime into the early hours and over‑schedule their day, leading
    to occasional stress‑induced worry.
background:
  cultural: Kavitha is a second‑generation South Asian American, born in Burlington, Massachusetts, to parents who emigrated from Tamil Nadu, India. The household is bilingual; Tamil is spoken alongside
    English, and she celebrates major Hindu festivals such as Diwali, Pongal, and Navratri with traditional foods, rangoli, and prayers at the local temple. Her family maintains cultural practices through
    classical Bharatanatyam dance lessons and regular listening to Carnatic music, while also embracing American customs like Thanksgiving and Halloween. Growing up in a multicultural suburb, Kavitha has
    formed friendships across diverse backgrounds and often acts as a cultural bridge, sharing Indian recipes, stories, and arts with her peers. The community around her includes several South Asian families,
    a Hindu temple, and cultural organizations that host festivals and youth programs, which have shaped her appreciation for both her heritage and the broader American mosaic.
