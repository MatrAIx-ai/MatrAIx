  hobbies: '[''Sketching at museums'', ''Watercolor and digital art'', ''Reading fantasy and sci‑fi novels'', ''Creative writing (short stories, poetry)'', ''School theatre and debate clubs'', ''Volunteering
    at cultural festivals'', ''Yoga and Bharatanatyam dance'', ''Cooking Indian dishes with family'', ''Playing Minecraft with friends'']'
  career_goals: Kavitha aspires to turn her love for visual storytelling into a career. In the short term, she hopes to enroll in a high‑school arts program that offers advanced courses in graphic design
    and animation, and to build a strong portfolio of drawings, digital illustrations, and short animated clips. She dreams of studying visual communications or human‑centered design at a university where
    she can merge art with technology. Ultimately, Kavitha sees herself working as a multimedia artist or UI/UX designer for an organization that values social impact, perhaps creating educational content
    that helps teenagers cope with stress through creative expression. She is also drawn to the idea of becoming an art therapist or community‑arts facilitator, using her own experiences with anxiety to
    support peers. Internships at local design studios or volunteer projects in Burlington’s community centres are on her roadmap.
