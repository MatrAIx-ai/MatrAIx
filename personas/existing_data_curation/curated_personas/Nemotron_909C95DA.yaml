personas:
  professional: Jamila Bass, a 13‑year‑old aspiring strategic thinker, leverages a love of Sudoku, crosswords and online chess to excel in school group projects, and they apply methodical planning and a
    competitive edge to lead class presentations and tutoring sessions.
  sports: Jamila Bass runs the 400‑meter dash for the Midtown Middle School track team, follows the US Olympic track & field squad for inspiration, and they incorporate disciplined interval training with
    a personal‑best goal, while also cheering for the local professional basketball team, the Portland Trail Blazers, during the off‑season.
  arts: Jamila Bass sings in the church youth choir performing arrangements of hymns and contemporary Christian songs by Chris Tomlin, and they enjoy reading mystery novels by Agatha Christie and sci‑fi
    works by Isaac Asimov, while they find artistic fulfillment building intricate LEGO sets modeled after iconic architecture such as the Eiffel Tower, all of which shape a disciplined yet imaginative
    aesthetic.
  travel: Jamila Bass prefers meticulously planned family trips that balance educational stops with relaxation, having toured Washington, DC's museums on a school field trip and visited Yosemite National
    Park with parents, while they dream of a future solo adventure to Tokyo to explore sci‑fi culture and puzzle cafés.
  culinary: Jamila Bass enjoys practical meals like grilled cheese sandwiches, spaghetti Bolognese, and homemade chicken nuggets, can follow step‑by‑step recipes for banana bread and fruit smoothies, and
    they love adding sharp cheddar cheese and fresh basil to dishes, often tracking meals in their bullet journal.
  core: Jamila Bass is a meticulously organized 13‑year‑old whose love of puzzles, bullet journaling, and competitive track fuels a disciplined yet occasionally anxious outlook on life, and they constantly
    seek structure in everyday choices.
background:
  cultural: Jamila was raised in a close‑knit African‑American family in Columbus, Georgia. Her household blends Southern traditions with the rich heritage of the local Black community. Frequent church
    attendance at a historically Black Baptist congregation instills values of faith, service, and communal support. Family gatherings feature soul food staples such as collard greens, fried chicken, and
    cornbread, and weekends often include gospel music and stories about the civil‑rights legacy of Muscogee County. She participates in community events like the Columbus African American Heritage Festival,
    which celebrates Black art, music, and history. These cultural influences foster a strong sense of identity, resilience, and pride in her African‑American roots while emphasizing the importance of education,
    hard work, and giving back to the community.
