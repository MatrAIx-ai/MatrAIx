  career_goals: Jamila aspires to a career that blends her love for structure, precision, and tangible impact. She dreams of earning a scholarship to study civil engineering, where she can design safe,
    reliable infrastructure for her community. Her competitive nature drives her to aim for top academic honors, internships on construction sites, and eventually professional licensure as a civil engineer
    or project manager. She envisions leading community‑focused projects—such as building affordable housing or improving local parks—so that her methodical planning and attention to detail directly benefit
    the people of Columbus. In the long term, she hopes to secure a stable, well‑defined career path that offers clear milestones and opportunities for continual growth.
