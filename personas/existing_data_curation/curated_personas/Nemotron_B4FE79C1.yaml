personas:
  professional: A budding Montessori‑style learner, Roosevelt Etienne assembles colorful block towers and invents spontaneous narratives, showcasing early promise in creative problem‑solving and collaborative
    play while they habitually push back against rigid routines.
  sports: Roosevelt Etienne runs with the neighbourhood toddler soccer group “Playful Pioneers”, loves tossing a soft ball at the park in spring, enjoys gentle stroller jogs in summer, and idolises the
    Seattle Seahawks’ quarterback and the New York Knicks’ star player during family TV nights, enthusiastically cheering with an uncoordinated but earnest roar.
  arts: Roosevelt Etienne is captivated by the vivid murals at the local children’s museum, endlessly mimics the rhythmic claps of Sesame Street’s Elmo, giggles at the playful melody of “The Wheels on the
    Bus” by Super Simple Songs, and proudly displays crayon drawings of dinosaurs on the fridge, revealing a budding visual‑artist streak that they nurture during quiet afternoons.
  travel: Roosevelt Etienne, perched in a booster seat, watches maps unfold for upcoming family vacations, reminisces about a summer trip to the San Diego Zoo, day‑dreams about future visits to the snowy
    peaks of the Swiss Alps, and prefers short car rides with frequent stops for a squeaky toy over long flights, turning each journey into a miniature adventure that they eagerly embrace.
  culinary: Roosevelt Etienne loves the stretchy cheese pull of macaroni and cheese, the sweet bite of banana slices dipped in honey, the messy crunch of dinosaur‑shaped chicken nuggets, and proudly helps
    stir oatmeal with a tiny wooden spoon, often sneaking raisins from the pantry, showcasing a developing palate that they share enthusiastically at family meals.
  core: Roosevelt Etienne is a curious, spontaneously creative two‑year‑old who balances honeyed energy with occasional meltdowns, turning everyday moments into impromptu art projects and tiny adventures.
background:
  cultural: Roosevelt is an African‑American child raised in Walker, Louisiana, within a close‑knit extended family that blends Southern and Creole traditions. His household celebrates church life, with
    regular attendance at a local Baptist congregation where gospel music and community fellowship play central roles. Family meals feature soul‑food staples such as fried catfish, collard greens, and cornbread,
    while community festivals like Mardi Mardi and local Zydeco dances expose him to Cajun rhythms and French‑Creole influences. This cultural tapestry enriches his appreciation for music, storytelling,
    and communal gatherings, shaping his worldview and early interests.
