  career_goals: In his imaginative play, Roosevelt talks about becoming a firefighter because he loves bright trucks and helping people, a dream inspired by community fire stations he sees on walks. He
    also shows an artistic spark, often saying he wants to be an "artist" who paints with all the colors he uses in his crayons. Occasionally he mimics the church choir and expresses a desire to be a singer,
    reflecting his love of music and gospel sounds. These budding ambitions are guided by his curiosity, love of new ideas, and the supportive environment of his family and local community.
