personas:
  professional: Bryan Mckoy is a budding tech tinkerer who designs Scratch games, assembles Arduino prototypes, and plans elaborate LEGO builds with a methodical schedule, blending his curiosity for new
    gadgets with the practical need to keep up with schoolwork.
  sports: Bryan Mckoy channels boundless energy into pick‑up basketball at the neighborhood community center, roots for the Chicago Bulls and the South Side youth league, and practices free‑throw drills
    after school to sharpen their shooting consistency.
  arts: Bryan Mckoy captures creative flair through break‑dance moves inspired by B‑Boy Lil' Vicious, grooves to tracks by Kendrick Lamar, Burna Boy, and Miles Davis, and devours graphic novels like 'Ms.
    Marvel' and 'Spider‑Man', letting music and art fuel their next coding project.
  travel: Bryan Mckoy dreams of exploring the bustling market streets of Accra during the Homowo celebration and the lively music scene of New Orleans' French Quarter, yet their tendency to over‑plan often
    triggers stress about balancing school deadlines with vacation excitement.
  culinary: Bryan Mckoy loves whipping up aromatic jollof rice with tomatoes, bell peppers, and smoked turkey paired with sweet fried plantains, while also perfecting pepperoni pizza slices and caramel
    corn snacks, always measuring ingredients with a precision honed from LEGO building.
  core: Bryan Mckoy is a 12‑year‑old whose boundless enthusiasm for basketball, meticulous LEGO constructions, and habit of over‑thinking finances coexist with bouts of anxiety that drive a relentless pursuit
    of perfecting every hobby.
background:
  cultural: Bryan is a Black American with deep roots in both African American culture and his family’s Ghanaian heritage, reflected in his surname Acheampong. Growing up on Chicago’s South Side, he experiences
    the city’s vibrant mix of music, food, and community activism. Family traditions include celebrating Ghanaian holidays, wearing Kente cloth during special occasions, and preparing dishes such as jollof
    rice and plantain with his relatives. Simultaneously, he participates in local cultural events like Chicago’s Black History Month parades, attends a neighborhood church with gospel choirs, and enjoys
    the city’s renowned street festivals. This blend of multicultural influences nurtures his sense of identity, resilience, and a strong commitment to community uplift.
attributes:
  skills: '[''Organizational planning (uses a personal planner)'', ''Basic Scratch and Python programming'', ''Robotics kit assembly and programming (LEGO Mindstorms)'', ''Team leadership in basketball
    and soccer'', ''Effective communication and public speaking'', ''Conflict mediation among peers'', ''Science experiment design and execution'', ''Problem‑solving through puzzles and math challenges'']'
  hobbies: '[''Playing basketball'', ''Building LEGO models'', ''Tinkering with Arduino and robotics kits'', ''Scratch and introductory Python coding'', ''Reading fantasy and science‑fiction books'', ''Listening
    to hip‑hop, Afro‑beat, and jazz music'', ''Break‑dance and dance workshops'', ''Cooking Ghanaian dishes with family'', ''Volunteering at a community garden'']'
  career_goals: Bryan dreams of applying his love for building things to a future career as a civil engineer or robotics engineer, hoping to design sustainable infrastructure or assistive robots that benefit
    his neighborhood. He is motivated to earn a scholarship to a STEM‑focused high school and later study engineering at a university where he can combine practical problem‑solving with creative innovation.
    Beyond a technical career, Bryan wants to give back to his community by mentoring younger kids in STEM clubs and helping organize local youth programs that promote curiosity and teamwork.
