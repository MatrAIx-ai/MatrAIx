personas:
  professional: Lyna Hughes, a rural social worker in Kootenai County, blends evidence‑based practice with pragmatic client‑centered solutions, using meticulous documentation, flexible case planning, and
    community resource coordination to empower underserved families while steadily pursuing a BSW and a future MSW to become a licensed clinical social worker and regional program leader.
  sports: Lyna Hughes, an avid hiker, regularly tackles the Pend Oreille and Selkirk trails with the Kootenai Trail Club, participates in a local weekend mountain‑bike group, and roots for the Seattle Seahawks,
    the Idaho Vandals, and the Spokane Chiefs while occasionally joining community fun runs for charity.
  arts: Lyna Hughes, a dedicated amateur photographer, captures the shifting flora of the Pacific Northwest at sunrise, attends storytelling evenings at the county library featuring local historians, streams
    The Decemberists and Joni Mitchell for inspiration, and volunteers as a set‑builder for the regional community theater's seasonal productions.
  travel: Lyna Hughes, a weekend adventurer, loves self‑driven road trips to Glacier National Park and Vancouver's Stanley Park, dreams of trekking Patagonia's Torres del Paine, balances itineraries with
    a mix of camping under the stars and boutique stays in historic B&Bs, and always packs a portable hammock for spontaneous outdoor breaks.
  culinary: Lyna Hughes, a farm‑to‑table home chef, nurtures heirloom tomatoes, rainbow carrots, and heritage beans in a community garden plot, then transforms them into roasted beet and goat cheese salad,
    heirloom tomato ratatouille with fresh basil, and smoked trout with dill and lemon, all while experimenting with a sourdough starter and perfecting the art of seasoning with rosemary and thyme.
  core: Lyna Hughes, a pragmatic yet curious social worker, balances community advocacy, meticulous planning, and a love for hiking, garden‑to‑plate cooking, and spontaneous road trips, all while juggling
    spreadsheets, trail maps, and a steady stream of seasonal allergies.
background:
  cultural: Lyna was born in Spokane, Washington, and grew up in a close‑knit white working‑class family that valued community service, self‑reliance, and respect for the region’s natural environment. Her
    upbringing in the Pacific Northwest instilled an appreciation for the area’s indigenous heritage, and she regularly participates in cultural sensitivity workshops to better serve the Native American
    and immigrant populations in Kootenai County. Her marriage to a local craftsman and her involvement in town volunteer groups reflect a strong connection to regional traditions and a commitment to fostering
    inclusive community bonds.
attributes:
  skills: '[''Holistic Client Assessment'', ''Crisis Intervention'', ''Individualized Case Planning'', ''Community Resource Coordination'', ''Cultural Competency'', ''Advocacy and Policy Navigation'', ''Documentation
    & Data Management'', ''Team Facilitation'', ''Program Evaluation'']'
  hobbies: '[''Hiking and Backpacking'', ''Nature Photography'', ''Community Gardening'', ''Farm-to-Table Cooking'', ''Reading Historical Nonfiction'', ''DIY Home Improvement'', ''Storytelling Events'',
    ''Local History Exploration'']'
  career_goals: Lyna plans to earn a Bachelor of Social Work within the next two years, followed by a Master’s in Clinical Social Work to become a licensed clinical social worker (LCSW). Her long‑term ambition
    is to lead a regional family services program that integrates mental health, substance‑use support, and economic empowerment for underserved families in Kootenai County. She also hopes to develop a
    mentorship network for new social workers in rural Idaho, and to influence state policy on child welfare funding. Her practical mindset ensures she sets clear milestones, while her curiosity pushes
    her to explore innovative community‑based interventions.
