  hobbies: '[''basketball'', ''multiplayer video gaming'', ''acoustic guitar'', ''DIY electronics projects'', ''volunteering at community center'', ''hiking with friends'']'
  career_goals: David aims to pursue a career that blends his love for structure with his people‑focused strengths. He plans to enroll in a community college program in business administration or logistics,
    with the long‑term goal of becoming an operations manager or event planning professional. He is also interested in apprenticeship opportunities in the skilled trades, such as welding or electrical work,
    to gain hands‑on experience while leveraging his methodical approach. Ultimately, David envisions a role where he can coordinate teams, optimize processes, and contribute positively to his community.
