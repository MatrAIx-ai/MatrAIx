personas:
  professional: David Ferreira is an aspiring operations coordinator who channels his love for structure, team‑oriented sports, and hands‑on tech into organizing school events, community tournaments, and
    volunteer workshops, leveraging his knack for Microsoft Office, Google Workspace, and Canva to keep everything on schedule.
  sports: David Ferreira runs the point guard position for his high school Eagles basketball team, competes in weekend pickup games with the community‑center hoops club, draws inspiration from the Dallas
    Mavericks and Dallas Cowboys, and maintains fitness through weight‑training sessions and hikes in nearby park trails.
  arts: David Ferreira strums acoustic renditions of John Mayer and Ed Sheeran, designs vibrant concert flyers in Canva inspired by Banksy’s street art, and unwinds by binge‑watching Lin‑Manuel Miranda’s
    Broadway specials for creative spark.
  travel: David Ferreira prefers meticulously planned weekend road trips to nearby state parks such as Shenandoah for hiking, saves up for a spring backpacking adventure in Kyoto, Japan, and a misty waterfall
    tour of Iceland, while occasionally opting for spontaneous overnight stays in New York City to soak up its cultural scene.
  culinary: David Ferreira, a capable home‑chef, regularly prepares protein‑rich quinoa salads with grilled chicken, perfects avocado toast with poached eggs for quick breakfasts, and indulges in late‑night
    pepperoni pizza, often neglecting to clean his cutting board afterward.
  core: David Ferreira is the organized teen who maps out every team project and community event, yet can’t resist midnight gaming marathons that leave his room littered with guitar picks and snack wrappers.
background:
  cultural: David comes from a white, Portuguese‑American family in Columbus, Ohio. His household blends Midwestern values—such as community involvement, punctuality, and modesty—with cultural traditions
    from his Portuguese heritage, including family meals featuring dishes like bacalhau and occasional celebrations of Portuguese holidays. Raised with a mix of Catholic and secular influences, he values
    service and often participates in local charitable events. Growing up in the diverse urban environment of Columbus, he is familiar with a range of cultural perspectives, which informs his cooperative
    yet assertive approach to group dynamics.
