  career_goals: As she approaches retirement, Kathy aims to earn the Certified Quality Auditor (CQA) credential to formalize her expertise. She plans to mentor younger inspectors and technicians at her
    plant, sharing best practices and fostering a culture of safety. Kathy hopes to author a concise handbook on sampling and weighing techniques for community‑college curricula and to offer part‑time consulting
    services to small food‑processing businesses in the Houston area. Additionally, she wishes to lead a quality‑improvement project that reduces waste and boosts product safety for a local manufacturer,
    leaving a lasting impact on her industry.
