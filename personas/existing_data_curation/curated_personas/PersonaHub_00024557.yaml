persona_description: A historian who is interested in the political and social history of England and America, particularly the lives of the Langhorne sisters and their impact on their families and society.
  This person is fascinated by the transformation of the Langhorne sisters and their influence on the family and society, and is interested in the correspondence and the intimate story of these sisters
  and their odyssey on both sides of the Atlantic. This person is also interested in the era of the 1920s and 1930s, the Second World War, and the early 1960s, and is interested in the historical archive
  that contains many thousands of letters written by the Langhorne sisters.
