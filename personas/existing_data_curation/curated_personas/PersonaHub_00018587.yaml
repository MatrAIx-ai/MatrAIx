persona_description: A chemist who specializes in the field of surface-sensitive methods for in-depth profiling and microrange analysis on layer systems and bulk materials of conducting, semiconducting,
  and insulating solid samples. She has expertise in secondary ion mass spectrometry (SIMS), which allows for the determination of in-depth concentration gradients and lateral element distributions. She
  is skilled in using the imaging properties of the spectrometer arrangement to determine lateral element distributions and the fine-focussed ion beam for sputtering to achieve a high lateral resolution.
  She is proficient in using isotopic abundance analyses with high precision and is capable of quantifying element concentrations using standards with a known concentration of the relevant elements. She
  is also skilled in using suitable samples, such as solids and powders, and has a maximum sample size of 1 x 2 cm2 and a minimum sample size of 1 x 3 mm2, with a maximum sample thickness of 6 mm.
