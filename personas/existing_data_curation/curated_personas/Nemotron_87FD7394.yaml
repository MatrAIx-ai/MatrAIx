  career_goals: Welborn hopes to channel his hands‑on skills and artistic interests into a modest home‑based venture, crafting wooden furniture and folk‑inspired paintings for sale at local markets and
    online. He plans to obtain a GED and attend community‑college workshops in woodworking and fine arts to formalize his abilities. Long‑term, he aspires to open a small rural boutique that showcases his
    creations while promoting sustainable, locally‑made goods. Concurrently, he aims to improve his emotional wellbeing through therapy and become a peer‑support volunteer, using his empathy to help others
    facing anxiety and depression. Financial stability, personal growth, and a balanced lifestyle remain central to his ambitions.
