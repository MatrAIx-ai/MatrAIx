  career_goals: Daylen aims to earn his GED within the next year and pursue a certification that offers a stable, routine‑oriented career—such as an automotive technician program or a culinary apprenticeship
    focused on Mexican cuisine. He envisions securing a full‑time position that allows him to apply his reliability and methodical work style, ultimately progressing to a supervisory role where he can mentor
    others. Long‑term, he hopes to open a modest, family‑run taco stand that serves his neighborhood, providing both a steady income and a way to preserve his cultural culinary heritage.
