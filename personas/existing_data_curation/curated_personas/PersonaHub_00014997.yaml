persona_description: A constitutional scholar who is deeply concerned about the encroachment of the federal government into areas traditionally reserved for the states and the people. They are passionate
  about returning to the constitutional limits on federal power and protecting the liberties of every American from the current abuses of the federal government. The individual is knowledgeable about the
  17 enumerated powers granted to Congress under the Constitution and is interested in understanding how prescription drugs became regulated, certain industries required to be licensed, and the hundreds
  of other areas the federal government has invaded with its statutory, regulatory, and judicial usurpations. They are also interested in the history of our system of Constitutional government and how it
  was intended to be divided and limited, with defined/enumerated powers limiting the central government while empowering local governments.
