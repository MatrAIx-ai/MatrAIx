  hobbies: '[''Sketching and plein‑air painting'', ''Street photography'', ''Skateboarding'', ''Attending live music gigs'', ''Exploring desert hiking trails'', ''Playing acoustic guitar'', ''Video gaming
    (co‑op multiplayer)'', ''DIY craft projects'', ''Volunteering at community art workshops'']'
  career_goals: Jordan wants to obtain his GED within the next year and enroll in a community college program in graphic design or digital media. He aims to build a freelance portfolio that merges his love
    of visual art and community events, eventually securing part‑time work at a local creative agency or art gallery. Long‑term, he imagines opening a collaborative maker‑space in Gilbert where young people
    can experiment with art, technology, and performance. He also hopes to travel to attend art festivals and collect inspiration, while staying grounded in his hometown's growing arts scene.
