    and communication with occupants'']'
  hobbies: '[''Fishing on the Gulf of Mexico'', ''Boating around Naples waterways'', ''Gardening (vegetable and herb garden)'', ''Classic car restoration'', ''Watching college and NFL football'', ''Participating
    in community beach clean‑ups'', ''Barbecuing and casual social gatherings with friends'']'
  career_goals: He plans to move from a pure janitorial role into a supervisory position, such as lead custodian or facilities maintenance coordinator, within the next two years. To qualify, he intends
    to complete an OSHA 30‑hour certification and a community‑college course in facilities management or a GED to solidify his credentials. Rex also dreams of eventually starting his own small cleaning
    business with his wife, focusing on eco‑friendly services for local residential and small‑office clients. Financially, he aims to secure a stable income that allows him to contribute to his children's
    future education and support his family’s retirement plans, all while maintaining the predictable work schedule he values.
