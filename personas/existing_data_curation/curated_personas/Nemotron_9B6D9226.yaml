personas:
  professional: Rex Freeman, a 36‑year‑old building cleaner with a decade of expertise in commercial sanitation and minor facilities maintenance, leverages their meticulous floor‑care skills and calm, assertive
    style to lead small crews while eyeing a supervisory role backed by upcoming OSHA‑30 training and a facilities‑management certificate.
  sports: Rex Freeman, a devoted fan of the Miami Dolphins and the Florida Gators, spends Saturday evenings at a local bar cheering on NFL matchups while also joining a weekend fishing club that doubles
    as a social crew, and they maintain a casual fitness routine by rowing their modest boat around the Naples waterways, preferring low‑impact activity over formal gym sessions.
  arts: Rex Freeman’s creative side shines through classic‑car restoration set to the soundtrack of Lynyrd Skynyrd and Chuck Berry, and they unwind by listening to Bob Dylan on vinyl while cooking garden‑fresh
    salsa, occasionally attending the Naples Art Walk to admire coastal landscape paintings by local artists like Sue H. Miller.
  travel: Rex Freeman enjoys spontaneous weekend getaways—driving their boat to the Florida Keys for sunset fishing, taking a road trip to New Orleans for a jazz brunch, and dreaming of an Alaskan salmon‑run
    expedition—yet the travel plans remain loosely organized, constrained by family commitments and a modest travel budget.
  culinary: Rex Freeman loves cooking Gulf‑caught grouper grilled with fresh basil, oregano, and a squeeze of lemon harvested from their own garden, whipping up tomato‑pepper salsa for taco night, and they’re
    skilled enough to preserve homegrown tomatoes into sauce, though they sometimes over‑season with extra cayenne on a whim.
  core: Rex Freeman blends a practical, hands‑on work ethic with a love for sunrise fishing, vintage car tinkering, and modest budgeting, balancing structure with spontaneous hobbies while occasionally
    over‑indulging in classic‑car parts and neglecting sunscreen.
background:
  cultural: 'Rex grew up in a working‑class white family in the South—likely in a small town in Georgia or Alabama—where self‑reliance, hard work, and modest living were core values. His upbringing emphasized
    respect for routine, practical problem‑solving, and a sense of community responsibility, often expressed through church gatherings and neighborhood events. Moving to Naples, Florida, he embraced the
    coastal lifestyle, integrating the local love for outdoor recreation, fishing, and open‑air socializing. He maintains close ties with his extended family and a small circle of long‑time friends, who
    share similar cultural touchstones: Southern hospitality, simple home‑cooked meals, and an appreciation for modest, stable employment. These influences shape his pragmatic outlook and his desire for
    a predictable, steady life.'
attributes:
  skills: '[''Commercial cleaning and sanitation'', ''Floor care (sweeping, mopping, polishing)'', ''Industrial cleaning chemicals handling'', ''Minor building maintenance (light carpentry, plumbing fixes)'',
