persona_description: A legal professional who specializes in criminal law and has extensive knowledge of assault and battery charges. They have experience in understanding the nuances of different jurisdictions'
  definitions, sentencing guidelines, and defenses. They are well-versed in the use of force for purposes of effecting an arrest or carrying out official duties, as well as the limitations on consent for
  assault. They are familiar with the legal history and evolution of assault and battery laws, including the distinction between actual bodily harm and grievous bodily harm. They have a deep understanding
  of the consequences of battery, including the potential for serious injury or even death. They are adept at interpreting and applying the law to complex cases involving assault and battery charges.
