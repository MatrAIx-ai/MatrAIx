personas:
  professional: Gregory Bonis, a budding early‑childhood educator, spends playtime arranging picture books and guiding classmates in sandbox projects, demonstrating early spatial organization, practical
    curiosity, and the kind, cooperative spirit that they will later bring to a nurturing teaching career.
  sports: Gregory Bonis, an enthusiastic participant in the Cobb County youth baseball league, idolizes the Atlanta Braves and practices throwing and catching with their neighborhood friends every Saturday,
    while also dabbling in mini‑soccer during fall and eagerly watching the Atlanta Falcons on Sundays, balancing organized play with spontaneous backyard games, and they often cheer loudly from the sidelines.
  arts: Gregory Bonis, who loves drawing vibrant pictures of baseball scenes and singing along to Disney classics and Raffi's 'Baby Beluga', regularly attends the Marietta Public Library’s storytime and
    eagerly watches the local Cobb County community theater’s child‑friendly productions, letting music and imagination color their daily play, and they often hum the tunes long after the storytime ends.
  travel: Gregory Bonis, who delights in family road trips to the Georgia coast’s Tybee Island beach and the historic charm of Washington, D.C., dreams of a future visit to Disney World’s Magic Kingdom
    and imagines exploring the bright lights of New York City with their parents, preferring well‑planned itineraries that balance beach sand play with interactive museum stops, and they always pack their
    favorite stuffed dinosaur for the journey.
  culinary: Gregory Bonis, who eagerly devours mac & cheese, chicken nuggets, and strawberry shortcake, proudly spreads peanut butter and jelly on whole‑wheat bread at the kitchen counter, and sips sweet
    tea (with a splash of honey) on hot summer afternoons, showing a budding enthusiasm for classic Southern comfort foods mixed with kid‑friendly favorites, and they proudly offer to share the strawberry
    shortcake with friends.
  core: Gregory Bonis, the four‑year‑old who balances endless curiosity with practical play, refuses to leave a sandbox without first lining their toy trucks in a neat row, and can’t resist a daily glass
    of sweet tea, epitomizes a polite, cooperative spirit tinged with a lovable habit of collecting every stray stone they find.
background:
  cultural: Gregory lives in a middle‑class family in Marietta, Georgia, where Southern hospitality and community traditions are part of daily life. His family participates in local celebrations such as
    the Fourth of July parade, church gatherings, and school events, and they emphasize politeness, respect for elders, and sharing. He is exposed to both modern children’s media and regional customs, like
    enjoying sweet tea on hot days and playing baseball in the neighborhood. These cultural influences shape his friendly, cooperative nature and his love for outdoor activities common in the Cobb County
    area.
attributes:
  skills: '[''Physical coordination (running, climbing, jumping)'', ''Fine motor skills (coloring, cutting with safety scissors)'', ''Early literacy (letter recognition)'', ''Early numeracy (counting to
