  hobbies: '[''Drawing and coloring'', ''Building with LEGO Duplo'', ''Playing with toy fire trucks and cars'', ''Riding a tricycle'', ''Outdoor play (playground climbing, nature exploration)'', ''Listening
    to storytime books'', ''Simple jigsaw puzzles'', ''Singing nursery rhymes'']'
  career_goals: Gregory loves hearing stories about firefighters and often says he wants to be a firefighter when he grows up because he likes the idea of helping and protecting people. He also shows an
    emerging fascination with space and science, sometimes drawing rockets and asking how things work, which hints at a budding interest in becoming a scientist or inventor. At his age, his ambitions are
    playful and reflect his desire to care for others while exploring new ideas.
