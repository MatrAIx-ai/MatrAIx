personas:
  professional: Barbara Johnson, a veteran special‑education teacher with over three decades of experience, designs meticulous individualized education programs, leads collaborative professional‑development
    workshops, and is poised to transition into a district‑wide coordinator role while championing inclusive policies, leveraging their outgoing nature to inspire colleagues.
  sports: Barbara Johnson supports the Oklahoma State Cowboys football team, participates in the local senior softball league, and walks three times weekly with the Sequoyah County Walking Club, viewing
    regular low‑impact activity as essential to their wellbeing.
  arts: Barbara Johnson finds creative fulfillment singing folk‑country hymns with their church choir, quilting alongside friends while listening to Willie Nelson and the Avett Brothers, and discussing
    historical fiction by Ken Follett at their Thursday book club.
  travel: Barbara Johnson prefers meticulously planned road trips, having explored the Great Smoky Mountains and Santa Fe, and they dream of a pilgrimage to Washington, D.C., but schedule travel around
    church commitments and a modest retirement budget.
  culinary: Barbara Johnson relishes preparing classic Southern comfort dishes—slow‑cooked chicken and dumplings, cornbread with honey butter, and fresh garden tomato salsa—while skillfully balancing a
    modest kitchen repertoire with occasional indulgent peach cobbler from the local bakery, a treat that satisfies their sweet‑tooth.
  core: Barbara Johnson blends a steadfast love for routine with vibrant community involvement, juggling teaching, gardening, quilting, and choir while quietly battling their sweet‑tooth habit.
background:
  cultural: 'Barbara grew up in a small‑town Oklahoma family that valued hard work, community service, and faith. The cultural fabric of Gore and Sequoyah County blends Midwestern pragmatism with Southern
    hospitality, and she embraces the region’s traditions: celebrating Thanksgiving and Christmas with multi‑generational meals, attending church every Sunday, and participating in local events such as
    the Sequoyah County Fair. Though she identifies as white, she respects the Cherokee Nation’s presence in the area, incorporating an understanding of indigenous history into her teaching when appropriate.
    Her upbringing instilled a practical, down‑to‑earth outlook, a strong sense of responsibility to her neighbors, and a preference for maintaining familiar customs while staying open to modest change.'
attributes:
  skills: '["Special Education Instruction", "IEP Development & Compliance", "Differentiated Instruction", "Behavior Intervention & Management", "Assistive Technology Integration", "Collaborative Teamwork",
