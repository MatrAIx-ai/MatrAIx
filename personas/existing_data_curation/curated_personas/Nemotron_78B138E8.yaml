  hobbies: '["Church volunteering", "Gardening", "Book club", "Quilting", "Community festival organizing", "Singing in choir", "Walking local trails", "Attending country-folk concerts"]'
  career_goals: Barbara aims to transition into a district‑level special education coordinator role where she can shape policy, mentor newer teachers, and strengthen support systems for students with disabilities.
    Over the next two years she plans to earn a Master’s in Special Education Leadership to deepen her administrative expertise. She also hopes to launch a community outreach program that connects families
    to local resources such as therapy services, after‑school programs, and vocational training. While maintaining her reliable and routine‑oriented work style, she envisions leaving a lasting legacy of
    inclusive practices before her planned retirement in approximately five years.
