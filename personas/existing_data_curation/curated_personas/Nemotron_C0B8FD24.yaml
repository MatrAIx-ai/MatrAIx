  career_goals: Looking ahead, Charlene aims to step into a supervisory or training role where she can shape a high-performing service team. She plans to earn a Certified Customer Experience Professional
    credential and to develop a structured onboarding program that incorporates her love of fresh ideas and unconventional problem-solving. Long-term, she envisions leveraging her community-focused personality
    to coordinate outreach events for local arts and cultural organizations, blending her service expertise with her passion for the arts.
