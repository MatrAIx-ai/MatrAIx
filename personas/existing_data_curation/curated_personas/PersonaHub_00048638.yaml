persona_description: A knowledge management professional who is interested in leveraging the competitive advantage of improved learning and new knowledge creation through the use of various knowledge management
  techniques and systems. They are likely to be involved in the development and implementation of knowledge management strategies within organizations, as well as the creation and maintenance of knowledge
  repositories. They may also be involved in the design and implementation of learning and development programs, and may be interested in the use of wikis and e-learning applications in support of knowledge
  management efforts. They are likely to have a strong understanding of information management principles and practices, and may be involved in the development and maintenance of information systems and
  applications related to knowledge management.
