personas:
  professional: Tommy Loy, a senior market research analyst with advanced quantitative and qualitative expertise, leverages their curiosity and practicality to design rigorous surveys, conduct focus groups,
    and apply regression, factor, and conjoint analysis in SPSS, R, and Python, while translating complex data into clear Tableau and Power BI visual narratives and fostering client trust through a compassionate,
    cooperative approach.
  sports: Tommy Loy, a devoted fan of local soccer, regularly attends Memphis 901 FC matches with their family, follows the Memphis Grizzlies during the NBA season, hikes the Natchez Trace Trail each weekend
    as a member of the Shelby County Hiking Club, and participates in an adult recreational soccer league at the Eads community center, balancing team enthusiasm with personal endurance pursuits.
  arts: Tommy Loy, who plays acoustic guitar at family gatherings, enjoys the soulful blues of B.B. King, the folk storytelling of Gillian Welch, and the cinematic scores of John Williams, while their wood‑working
    hobby creates hand‑crafted furniture inspired by the Arts & Crafts movement, and they often curate community art evenings at the Eads center featuring local painters and poets.
  travel: Tommy Loy favors purposeful road trips that blend nature, history, and modest budgeting, having explored the Great Smoky Mountains, wandered the historic French Quarter of New Orleans, and trekked
    the Natchez Trace, while planning a future drive to the Scottish Highlands to trace Celtic roots, always balancing family commitments and a careful expense ledger.
  culinary: Tommy Loy, an adept home chef, specializes in Southern comfort classics such as buttermilk fried chicken, shrimp and grits, collard greens simmered with smoked ham hocks, and peach cobbler,
    often enhancing these dishes with fresh tomatoes, peppers, basil, and thyme harvested from their own vegetable garden.
  core: Tommy Loy blends data‑driven precision with Southern hospitality, constantly juggling market research projects, woodworking, family meals, and garden chores, yet habitually forgets to schedule dentist
    appointments, illustrating a charming mix of meticulous planning and occasional neglect.
background:
  cultural: Tommy was raised in a small Midwestern town during the 1960s and 70s before moving to the rural community of Eads, Tennessee, where Southern customs and Appalachian heritage shape daily life.
    His white, Protestant background emphasizes community, hospitality, and a strong work ethic. He participates in local church events, celebrates regional holidays such as Fourth of July fireworks, and
    enjoys traditional music like bluegrass. The cultural milieu of Shelby County—agricultural roots, close‑knit neighborhoods, and a growing small‑business ecosystem—has influenced his values of cooperation,
    modesty, and commitment to local development. He identifies with the "Southern gentleman" ethos, valuing politeness, respect, and a sense of duty to help neighbors.
attributes:
  skills: '[''Quantitative data analysis'', ''Market segmentation'', ''Survey design'', ''Statistical modeling'', ''Data visualization (Tableau, Power BI)'', ''Strategic marketing planning'', ''Digital
