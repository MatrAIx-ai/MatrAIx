  hobbies: '[''Bird watching'', ''Woodworking'', ''Gardening'', ''Reading non-fiction (history, psychology)'', ''Volunteer mentoring at community center'', ''Local soccer matches with family'', ''Playing
    acoustic guitar'', ''Hiking in state parks'', ''Cooking Southern cuisine'']'
  career_goals: Tommy aims to become the director of market research within the next five years, championing data‑driven decision making for regional businesses and nonprofit organizations. He plans to
    mentor junior analysts, build a consulting practice focused on measuring impact for community nonprofits, and eventually serve on the board of a local economic development coalition. His long‑term ambition
    blends his analytical talent with his compassionate drive to improve the quality of life in Shelby County and support the growth of small‑business enterprises.
