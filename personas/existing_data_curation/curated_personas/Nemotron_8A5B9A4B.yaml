  career_goals: Although retired, Jennifer aims to deepen her community involvement. She plans to volunteer as an arts facilitator at the senior center, develop a series of watercolor and craft classes
    for older adults, and lead a volunteer‑run garden that supplies fresh produce to a local food pantry. She also hopes to document her family genealogy, compile a memoir of her life’s experiences, and
    serve on the board of the Round Rock Historical Society, helping to preserve and showcase regional heritage. Travel to Texas art festivals and historic sites is a personal ambition she pursues whenever
    possible.
