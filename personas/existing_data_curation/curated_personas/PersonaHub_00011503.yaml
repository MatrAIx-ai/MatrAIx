persona_description: A team leader and researcher in the field of entomology, with a focus on biological control and pest management. Specializes in the study of spotted wing drosophila and its impacts
  on various crops and hosts. Has experience working with parasitic wasps and has published papers on the effectiveness of these bio-control agents against spotted wing drosophila. Has a background in entomology
  and has led national and international research projects aimed at controlling spotted wing drosophila. Is knowledgeable about the economic impact of spotted wing drosophila on the agricultural industry
  and has experience in implementing control measures to mitigate its effects.
