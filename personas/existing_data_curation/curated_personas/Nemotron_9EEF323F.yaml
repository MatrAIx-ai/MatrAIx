personas:
  professional: A diligent IT support specialist and budding tech leader, Romany Soni combines methodical network troubleshooting, Python automation, and a love for digital illustration to design user‑friendly
    infrastructure solutions while mentoring small‑business clients and sketching UI concepts during lunch breaks, and they consistently seek ways to merge technical reliability with creative flair.
  sports: A nature‑oriented fitness enthusiast, Romany Soni spends weekends trekking the Texas Hill Country, joins a local weekend running club for 5 k routes, follows the Dallas Mavericks for NBA action,
    and they participate in community drumming circles that double as rhythmic cardio workouts.
  arts: A solitary digital artist and speculative‑fiction lover, Romany Soni paints abstract illustrations inspired by indigenous motifs using Procreate, reads authors like Ursula K. Le Guin and Ted Chiang,
    studies philosophy from Nietzsche to Camus, contributes beadwork to local craft groups, and they host board‑game nights featuring titles like Terraforming Mars while listening to ambient soundscapes
    from artists like Brian Eno.
  travel: A carefully planned explorer, Romany Soni favors short road trips to destinations such as New Mexico’s Taos Pueblo and Sedona’s red rock trails, balances adventure with budget by camping in state
    parks, dreams of trekking Patagonia’s Torres del Paine, and they always return home with a photo series documenting sunrise vistas over the Texas plains.
  culinary: A meticulous home cook with a flair for Southwestern flavors, Romany Soni often prepares chipotle‑marinated steak tacos, brews single‑origin pour‑over coffee, experiments with fermenting hot
    sauce using habanero and garlic, yet they occasionally order sushi from a Dallas food‑truck for a quick creative break.
  core: An imaginative technologist who blends methodical IT expertise with a passion for digital art, Romany Soni balances disciplined work routines with solitary creative retreats, occasional indulgences,
    and a steadfast commitment to community‑focused projects, and they view each challenge as an opportunity to weave storytelling into technology.
background:
  cultural: Romany identifies with his American Indian heritage, raised with an appreciation for tribal values of community, storytelling, and stewardship of the natural world. He grew up hearing oral histories
    from elders, learning basic phrases of his tribal language, and attending powwows and cultural gatherings in the Dallas area. These experiences instill a deep respect for harmony and mutual support,
    which he carries into his professional collaborations. He often incorporates indigenous motifs into his digital artwork and volunteers his tech skills to help tribal organizations develop websites and
    digital archives, blending his cultural identity with his modern career.
