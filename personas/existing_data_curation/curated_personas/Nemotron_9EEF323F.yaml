  career_goals: Romany aims to advance into a senior IT leadership role that leverages both his technical acumen and creative vision. Over the next two years he plans to earn certifications such as CompTIA
    Network+, Cisco CCNA, and Certified Ethical Hacker, positioning himself for a manager‑level position overseeing infrastructure and digital innovation. He envisions leading technology initiatives for
    a tribal nonprofit, developing web platforms for language preservation and interactive cultural education, while also building a freelance portfolio of UI/UX and digital art projects that merge modern
    tech with indigenous storytelling.
