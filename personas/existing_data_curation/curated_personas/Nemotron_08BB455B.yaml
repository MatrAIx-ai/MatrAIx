  career_goals: Carl aims to move from an entry‑level support role to a supervisory position such as Office Manager or Administrative Coordinator within a midsized company or community‑focused nonprofit
    in the Greater Boston area. He plans to complete his remaining college credits and earn an associate’s degree in Business Administration, followed by a bachelor’s degree. Over the next few years, he
    wants to deepen his expertise in workflow optimization, operational data analysis, and team leadership, eventually leading a department that values employee well‑being and efficient service delivery.
    He also hopes to mentor new staff, champion inclusive workplace practices, and obtain a professional certification in office management.
