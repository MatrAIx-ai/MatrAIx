personas:
  professional: Kaneshia Anderson, a 67‑year‑old community archivist and garden advocate in Indianapolis, they merge their knack for coordinating neighborhood festivals, interviewing elders, and teaching
    seniors to cook with an easy‑going, improvisational style, turning each event into a living archive that celebrates local history and intergenerational creativity.
  sports: Kaneshia Anderson, an active retiree who loves staying fit, they walk the Indianapolis Canal Trail each morning, cheer for the Indiana Pacers and Indianapolis Colts at home games, play in a weekly
    senior bowling league at Riverside Community Center, and join the annual charity 5K organized by their church, preferring casual participation over competitive pressure.
  arts: Kaneshia Anderson, a devoted patron of Indianapolis’s art scene, they attend monthly gallery openings showcasing works by local painters like Erin Hegarty and sculptor Timothy Mansfield, tour the
    Indianapolis Museum of Art’s African American art wing, lead intergenerational quilting workshops inspired by Faith Ringgold’s textile designs, and enjoy live jazz performances at the Bluebird Café
    featuring John Coltrane tribute ensembles.
  travel: Kaneshia Anderson, an adventurous traveler who favors flexible itineraries, they have driven through Savannah’s historic squares, explored the blues clubs of Memphis, wandered the tea gardens
    of Kyoto, and now dream of returning to New Orleans for Mardi Gras celebrations and embarking on a pilgrimage to Ghana’s coastal towns to trace their family roots.
  culinary: Kaneshia Anderson, a seasoned home cook with a green thumb, they expertly blend soul‑food staples like collard greens simmered with smoked turkey and sweet‑potato pie with Midwestern comforts
    such as skillet‑baked cornbread and creamy macaroni‑and‑cheese, freshening recipes with heirloom tomatoes, basil, and rosemary from their garden, and delight in sharing a signature jambalaya‑style rice
    casserole at potluck gatherings.
  core: Kaneshia Anderson, a curious community storyteller, they balance a love of gardening, cooking, and archiving with a relaxed, slightly disorganized rhythm that keeps their life richly intertwined
    with art and history.
background:
  cultural: Kaneshia’s cultural background is rooted in the African‑American experience of the Midwest. Born and raised in Indianapolis, she grew up in a close‑knit Black community where the church served
    as a social hub and a source of resilience. Her family carries oral traditions that blend Southern heritage with the city's own history of migration, music, and activism. She remembers the civil‑rights
    demonstrations of the 1960s, the growth of Indiana Avenue’s jazz scene, and the establishment of community institutions that celebrate Black art and history. This heritage informs her appreciation for
    soulful cuisine, rhythmic music, and the importance of preserving collective memory through storytelling and community engagement.
attributes:
  skills: '[''Community event coordination'', ''Volunteer leadership'', ''Culinary arts (soul‑food & Midwestern cuisine)'', ''Urban gardening'', ''Storytelling & oral‑history collection'', ''Art appreciation
