  hobbies: '[''Visiting art museums and galleries'', ''Listening to jazz, gospel, and blues'', ''Urban gardening'', ''Cooking traditional and experimental dishes'', ''Knitting and quilting'', ''Genealogy
    research'', ''Reading historical biographies'', ''Participating in church choir events'', ''Attending community cultural festivals'']'
  career_goals: Kaneshia aims to leave a lasting legacy by documenting the histories of Indianapolis’s African‑American elders and compiling them into a community archive. She plans to expand her modest
    vegetable garden into a collaborative garden space that provides fresh produce and a gathering spot for neighbors. She intends to write a memoir that weaves personal memories with reflections on the
    civil‑rights era and the city’s cultural evolution. Kaneshia also wishes to lead intergenerational art workshops, teaching quilting and basic photography to youth, while becoming proficient enough in
    digital tools to share her projects online.
