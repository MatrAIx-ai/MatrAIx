  career_goals: Charles aims to advance into supervisory and administrative leadership within the Pennsylvania Department of Corrections. Over the next five years he hopes to become a shift supervisor and
    then a unit manager, overseeing security operations while expanding rehabilitative services. He plans to earn a master’s degree in criminal justice administration and a certification in art therapy,
    positioning himself to design integrated art-based rehabilitation programs that reduce recidivism. Ultimately, he aspires to serve as a director of inmate services or a consultant for state correctional
    agencies, championing evidence-based, humanities-centered approaches to inmate wellbeing and institutional safety.
