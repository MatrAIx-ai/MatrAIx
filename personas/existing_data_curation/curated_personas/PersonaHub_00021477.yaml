persona_description: A scientist or environmental expert who is interested in the environmental effects of wood preservatives used in wooden bridges. They are likely to be knowledgeable about the principles
  of ecology, the impact of environmental contaminants on aquatic organisms, and the regulations governing the use and disposal of wood preservatives. They would be interested in the specific types of wood
  preservatives used in the bridges examined and the concentrations of these preservatives in the surrounding water. They would be interested in comparing the observed levels of preservative in the water
  to regulatory standards or benchmarks and to the quantitative description of the aquatic invertebrate community sampled from vegetation and sediments.
