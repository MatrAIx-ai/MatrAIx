personas:
  professional: Irene Palacios, a budding digital storyteller, blends her love for vivid folklore-inspired illustrations with early coding skills in Scratch to create interactive, animated adventure tales
    that she shares with her classmates and family.
  sports: Irene Palacios trains for a youth soccer league with the Columbus Futbol Club Juniors, enjoys cheering for the Cleveland Guardians during baseball season, and follows a disciplined after‑school
    routine that balances practice, homework, and weekend games.
  arts: Irene Palacios fills sketchbooks with bright scenes that echo the bold colors of Diego Rivera’s murals and the whimsical flair of Frida Kahlo, while her playlists of cumbia, vallenato, and contemporary
    reggaeton fuel her creative bursts during after‑school art sessions.
  travel: Irene Palacios, ever‑curious about the world, maps out weekend trips to the Ohio State Fair and the Smithsonian’s National Air and Space Museum, keeps a collection of world‑map stickers from each
    outing, and daydreams about strolling the colorful streets of a historic Caribbean port city.
  culinary: Irene Palacios loves rolling out dough for golden‑brown empanadas and shaping soft arepas, often seasoning them with a pinch of cumin, cheese, and ripe avocado, while she proudly declares plátano
    maduro fries as her ultimate snack after soccer practice.
  core: Irene Palacios is a meticulous, art‑obsessed ten‑year‑old who juggles sticky‑note schedule boards, sneakers left in the hallway, and a relentless streak of curiosity that fuels her drawings, coding,
    and dream of world‑wide adventures.
background:
  cultural: Irene comes from a Colombian family that moved to Columbus, Ohio when she was three years old. At home, Spanish is spoken alongside English, and she celebrates Colombian traditions such as Carnaval
    de Barranquilla, Día de la Familia, and enjoys listening to cumbia, vallenato, and reggaeton music. Her parents share stories of Colombian folklore and prepare traditional meals, fostering a strong
    sense of cultural pride. While she embraces her Colombian roots, Irene also participates fully in American school life and community events, creating a bicultural identity that enriches her perspective,
    artistic expression, and curiosity about the world.
attributes:
  skills: '["Reading comprehension", "Bilingual communication (English/Spanish)", "Drawing and painting", "Organizational planning (using a planner)", "Team facilitation", "Basic Scratch coding", "Problem
    solving"]'
  hobbies: '["Drawing and painting", "Reading adventure and science books", "Visiting museums and science exhibits", "Playing soccer", "Cumbia and salsa dancing", "Scratch coding", "Cooking Colombian dishes
    with family", "Collecting world map stickers"]'
  career_goals: Irene dreams of becoming a museum curator or a graphic designer, where she can blend her love for art, storytelling, and Colombian heritage. She is also intrigued by environmental science
    and imagines working on projects to protect rivers like Colombia's Magdalena. In the short term, she aims to win her school's art contest, lead her class's science fair project, and become fully fluent
    in reading and writing Spanish. Over the next few years she plans to attend summer programs in art and robotics, and she aspires to be a role model for other Colombian‑American kids who share her curiosity
    and creativity.
