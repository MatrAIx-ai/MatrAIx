personas:
  professional: Maria Tabernero is a budding private investigator in Tulsa who leverages bilingual fluency, meticulous surveillance skills, and a compassionate interviewing style to methodically solve community
    cases, balancing her natural curiosity with a practical, organized approach.
  sports: Maria Tabernero keeps fit by jogging with the Tulsa Runners Club on the prairie trails, attends weekly yoga classes, supports the Oklahoma City Thunder during basketball season, and plays casual
    soccer on weekends with a local Roughnecks fan group, balancing structured workouts with relaxed play.
  arts: Maria Tabernero channels her investigative curiosity into sketching scenes inspired by Agatha Christie novels and Frida Kahlo’s vivid self‑portraits, while unwinding with true‑crime podcasts like
    Serial and My Favorite Murder and listening to the haunting ballads of Lila Downs and the indie folk of Bon Iver during creative sessions.
  travel: Maria Tabernero prefers low‑cost road trips that blend cultural immersion and nature, having explored the historic plazas of San Antonio and the hiking trails of Colorado’s Rocky Mountain National
    Park, she now hopes to trek the colorful streets of Guanajuato and attend a Dia de los Muertos festival in Oaxaca while budgeting carefully around her GED tuition and part‑time job.
  culinary: Maria Tabernero enjoys cooking traditional dishes like tamales filled with pork and masa, spicy chicken mole with dried chilies, and fresh guacamole made from ripe avocados and lime, boasting
    a solid intermediate skill set that she sharpens by swapping recipes during family potlucks and experimenting with seasonal ingredients like heirloom corn.
  core: Maria Tabernero combines a detective’s relentless curiosity with a planner’s precision, often turning case notes into elaborate sketches, binge‑listening to true‑crime podcasts, and occasionally
    losing sleep over unfinished puzzles.
background:
  cultural: Maria was raised in a bicultural Mexican-American household in Tulsa, where Spanish was spoken at home and English at school. Her family maintains traditions such as celebrating Día de los Muertos,
    preparing tamales during holidays, and attending local Mexican cultural festivals, which foster a strong sense of communal identity. She identifies with values of familismo and respeto, emphasizing
    close family bonds and mutual support. These cultural roots give her insight into the challenges faced by recent immigrants and undocumented residents, informing her compassionate approach to investigative
    work within the community.
attributes:
  skills: '[''Surveillance techniques'', ''Evidence collection and preservation'', ''Interviewing and rapport building'', ''Bilingual communication (Spanish/English)'', ''Open-source intelligence (OSINT)'',
