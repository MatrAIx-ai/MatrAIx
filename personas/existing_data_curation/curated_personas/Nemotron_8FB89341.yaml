  hobbies: '[''Reading mystery novels'', ''Listening to true crime podcasts'', ''Sketching and visual journaling'', ''Cooking traditional Mexican dishes'', ''Volunteering at community center for after-school
    tutoring'', ''Practicing yoga'', ''Walking prairie trails'', ''Playing puzzle video games'', ''Learning Spanish guitar'']'
  career_goals: Maria aims to obtain her official private investigator license and complete a GED program within the next two years, laying the groundwork for a formal career in investigative services.
    She aspires to specialize in missing-person and domestic-violence cases, using her compassion and community ties to help vulnerable individuals in the Tulsa area. Long-term, she dreams of founding a
    boutique investigative agency that partners with local nonprofits and law enforcement to provide culturally sensitive support to the Mexican-American community. She also plans to pursue advanced certifications
    in digital forensics and forensic psychology to broaden her expertise.
