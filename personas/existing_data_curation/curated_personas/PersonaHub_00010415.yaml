persona_description: A historian who specializes in the study of ancient Roman history, particularly the interactions between the Roman Empire and the city of Alexandria in Egypt. They have a deep interest
  in the cultural and political dynamics of the city during the Roman period and are particularly knowledgeable about the tensions between the Alexandrians and their Roman rulers. They have a particular
  interest in the role of the Jewish community in Alexandria and the events that led to the establishment of the Temple in Jerusalem. They have a strong understanding of the history of antisemitism and
  its connection to medieval Christian hostility towards those who rejected Christ.
