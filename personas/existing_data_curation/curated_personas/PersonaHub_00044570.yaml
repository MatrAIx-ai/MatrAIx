persona_description: A historian who specializes in the study of Roman history, particularly the Roman military and its impact on the development of the empire. He or she is interested in the role of Aquincum
  in the Roman frontier defense system and the role of Hadrian in its development. The historian is also interested in the history of the Roman cavalry and its use in military campaigns. The historian is
  likely to be interested in the exhibition of artifacts and the story of the Batavian soldier who impressed Hadrian by swimming across the Danube.
