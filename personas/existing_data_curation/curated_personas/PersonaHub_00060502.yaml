persona_description: A scientist at Cincinnati Children's Hospital who specializes in the study of brain development and the role of genetic markers in neurodevelopmental disorders. He has expertise in
  the research of creatine transporter disorder, PTEN gene mutations, SSRI antidepressants, and the connection between obesity, heart disease, and ASD. He is also interested in the long-term effects of
  SSRI exposure during pregnancy and the study of TSC and autism. He has received funding from the NIH and is leading a study on the identification of common phenotypes in children with ASD.
