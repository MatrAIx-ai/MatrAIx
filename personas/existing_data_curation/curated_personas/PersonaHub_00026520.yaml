persona_description: A researcher at Stanford University, the Max Planck Institute for Human Development, and the University of California, Davis, who specializes in studying the underlying brain mechanisms
  that contribute to impatience in adolescents. The researcher is particularly interested in the structural and functional differences in the brain that underlie impatience and how these differences are
  related to decision-making and reward evaluation. The researcher is also interested in how these findings can be used to help adolescents make more forward-looking and less impulsive decisions.
