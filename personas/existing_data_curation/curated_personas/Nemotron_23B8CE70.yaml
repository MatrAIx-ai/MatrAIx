  career_goals: Rickard is already dreaming about a future where his love for imagination and technology intersect. He hopes to attend a specialized STEM or arts‑focused high school, develop his own video
    games or graphic novels, and eventually work as a creative technologist, game designer, or research scientist in artificial intelligence. In the short term, he aims to win his school's coding competition,
    create a short illustrated story for a local library, and secure a spot in a summer robotics camp. His ambition is driven by a desire to turn abstract ideas into tangible creations and to be recognized
    for innovative, original work.
