persona_description: A medieval historian who specializes in the study of medieval religious images, particularly the role of religious images in the life and worship of historical people. Her research
  interests include, but are not limited to, the visual experience of medieval people, the theory of vision, and the persistence of belief in the "evil eye" from classical times to the sixteenth century
  and beyond. She is also interested in the impact of religious images on the daily life and worship of historical people.
