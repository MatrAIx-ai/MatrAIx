  career_goals: Charles aims to transition from his current period of exploration into a career that blends his passion for community building with his humanities background. He aspires to secure a role
    as a community outreach coordinator or program manager within a nonprofit organization focused on social services, arts education, or mental health advocacy. To strengthen his qualifications, he plans
    to pursue a graduate certificate in nonprofit management or social work while gaining practical experience through volunteer leadership positions. Ultimately, he hopes to lead and design inclusive programs
    that foster social cohesion, provide support for vulnerable populations, and promote cultural enrichment in the Lansing area.
