personas:
  professional: Daniel Hagel is an aspiring young builder who loves constructing intricate LEGO structures, showing early knack for spatial reasoning and patience, and their preference for clear instructions
    and predictable outcomes guides them to follow step‑by‑step manuals, while their occasional disorganization leads to creative improvisations during play.
  sports: Daniel Hagel is an energetic participant in the community center’s after‑school soccer league, cheering for the Pittsburgh Steelers on weekends and the Penn State Nittany Lions during college
    football season, and they favor quick tag games in the woods over structured drills, reflecting a competitive spirit tempered by a love for spontaneous outdoor play.
  arts: Daniel Hagel is a budding illustrator who spends afternoons sketching dinosaurs and Marvel’s Spider‑Man on a sketchpad while binge‑watching SpongeBob SquarePants, and they draw inspiration from
    classic animation like Walt Disney’s The Lion King, blending vivid imagination with a preference for bright, structured color palettes.
  travel: Daniel Hagel is a curious explorer who loves weekend bike rides through the nearby Shenandoah forest trails, dreams of camping at Acadia National Park in Maine, and they prefer spontaneous day‑trips
    organized with parents over meticulously planned vacations, reflecting a blend of adventurous curiosity and a need for familiar routine.
  culinary: Daniel Hagel is a picky eater who adores crunchy apple slices, homemade mac and cheese, chicken nuggets with honey mustard, and can proudly prepare a peanut‑butter‑and‑jelly sandwich solo, though
    they stubbornly refuse broccoli unless it’s disguised in a cheesy casserole.
  core: Daniel Hagel is a LEGO‑loving, bike‑riding six‑year‑old who balances a love for structure with spontaneous play, saving allowance in a piggy bank while occasionally splurging on candy, and they
    navigate the world with a competitive edge, a hint of skepticism, and a penchant for drawing dinosaurs on any spare surface.
background:
  cultural: Daniel is a white American child raised in the small rural community of Venetia, Pennsylvania. His family has German‑Irish roots and is active in the local church and community events such as
    the county fair and school field trips. The area’s emphasis on outdoor recreation, thrift, and close‑knit neighborhood ties shape his everyday life and values.
