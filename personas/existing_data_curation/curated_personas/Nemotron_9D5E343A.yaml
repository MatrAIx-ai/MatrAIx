personas:
  professional: A budding little inventor named Thanh Nguyen loves to tinker with building blocks, following step‑by‑step guides when needed but also improvising their own quirky contraptions, often leading
    the play‑group as the unofficial ‘chief engineer’.
  sports: A 5‑year‑old named Thanh Nguyen dashes around the neighborhood park’s tiny soccer field, cheering for the local junior team the ‘Little Lions’, and loves to copy moves from their favorite professional
    player Lionel Messi on YouTube, though they often forget to bring their water bottle to practice.
  arts: A 5‑year‑old named Thanh Nguyen spends spare moments drawing vibrant cartoon heroes like Mickey Mouse and Dora the Explorer, bursting into spontaneous sing‑along versions of Disney songs such as
    ‘Let It Go’, and proudly shows off their crayon masterpieces to anyone willing to admire them.
  travel: A 5‑year‑old named Thanh Nguyen dreams of building sandcastles on a sunny beach after a family trip to a coastal town, already having visited a local amusement park and a grandparent’s countryside
    home, preferring spontaneous car rides over meticulously planned itineraries.
  culinary: A 5‑year‑old named Thanh Nguyen loves munching on crunchy chicken nuggets, slurping cheesy macaroni, and insists on adding ketchup to almost every bite, yet they’re notoriously messy, leaving
    sauce splatters on the kitchen table while proudly proclaiming themselves a “chef in training”.
  core: Thanh Nguyen is a talkative, curious five‑year‑old who transforms ordinary playground rules into imaginative games, forgets to tidy up in the process, and swings between generous sharing and bold
    rule‑making.
background:
  cultural: Thanh Anh is a first‑generation Vietnamese‑American raised in Tustin, Orange County, an area with a large Vietnamese community. At home, she hears Vietnamese from her parents and grandparents,
    celebrates cultural holidays such as Tet and the Mid‑Autumn Festival, and enjoys traditional foods like pho and bánh chưng. She attends a local Vietnamese language school on Saturdays, where she learns
    to read and write basic Vietnamese characters while also participating in cultural dance and music. Outside the home, she experiences typical American childhood activities—preschool, library visits,
    and playdates—blending the values of family respect and community from her heritage with the independence and curiosity encouraged in her American environment.
