  career_goals: She dreams of becoming a teacher who can share stories and help other children learn, or a veterinarian who cares for animals, and she loves the idea of performing in school plays. Her goal
    is to grow up in a way that lets her combine her love for helping others, her curiosity about the world, and her enjoyment of being in the spotlight.
