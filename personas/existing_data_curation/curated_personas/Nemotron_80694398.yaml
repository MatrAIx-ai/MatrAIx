  career_goals: Rosenna aims to transition into a senior leadership role where she can shape the technical direction of projects while fostering inclusive, collaborative team cultures. She aspires to become
    a software architect focused on creating intuitive, art-inspired user experiences, and to mentor a new generation of diverse technologists. Over the next five years she plans to earn cloud architect
    certifications, launch a community-focused tech consultancy that helps small businesses in Lorain County digitize their operations, and publish a guide on integrating business strategy with agile software
    development. She also wishes to spearhead initiatives that blend art and technology, such as interactive public installations for local cultural festivals.
