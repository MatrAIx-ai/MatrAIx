personas:
  professional: Aubrey Moghaddam, a seasoned carpenter with fifteen years of hands‑on experience, blends traditional joinery with modern CAD tools to deliver sustainable custom furniture and design‑build
    projects, while mentoring apprentices, managing budgets, and cultivating a collaborative workshop culture that reflects their sociable and compassionate nature.
  sports: Aubrey Moghaddam, an avid hiker of the Trinity River trails, plays pick‑up softball on weekends, cheers for the Dallas Cowboys and Dallas Stars, supports the Texas Rangers during spring training,
    and joins a local cycling group for autumn rides, reflecting their active yet community‑oriented lifestyle.
  arts: Aubrey Moghaddam, a regular at blues festivals such as the Austin Blues on the Green, a fan of Willie Nelson and B.B. King, participates in a historical‑fiction book club featuring Ken Follett and
    Hilary Mantel, and crafts small wooden art pieces inspired by folk motifs, blending their love of music, literature, and hands‑on creativity into a vibrant artistic identity.
  travel: Aubrey Moghaddam, who prefers road trips that combine scenic hikes in Hill Country, weekend stays in a Galveston beachfront Airbnb to grill BBQ, and occasional international travel to Scandinavia
    to study sustainable timber practices, plans itineraries with a mix of detailed maps and spontaneous detours, yet must balance travel with their growing business responsibilities.
  culinary: Aubrey Moghaddam, an enthusiastic home chef, loves cooking Tex‑Mex and Texas‑style barbecue—frequently preparing smoked brisket tacos, guacamole with fresh cilantro, chipotle‑marinated chicken
    fajitas, and homemade salsa verde using mesquite wood chips—while hosting potluck gatherings, occasionally over‑spicing dishes in their quest for bold flavor.
  core: Aubrey Moghaddam is a community‑focused carpenter who fuses traditional craft with sustainable design, lives by a pragmatic budget, stays health‑aware despite a low‑back strain, and fuels life with
    music, hiking, and spicy food.
background:
  cultural: Aubrey was raised in a suburban neighborhood of Fort Worth, Texas, where Midwestern work ethic meets Southern hospitality. Her family’s deep roots in the region instilled values of hard work,
    community service, and a love for sharing food and stories. The local culture—rich in country music, blues, and a growing appreciation for diverse culinary traditions—has shaped her inclusive outlook.
    While she identifies as a white American, she embraces the cultural diversity of Fort Worth, integrating its traditions of neighborly support and celebration into both her professional projects and
    personal life.
