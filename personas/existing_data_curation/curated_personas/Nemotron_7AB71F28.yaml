    games (Texas Hold''em)"]'
  career_goals: Aubrey aims to grow her independent carpentry business into a boutique design‑build firm that specializes in high‑quality, sustainable custom pieces for homes throughout North Texas. She
    plans to earn a Certified Green Builder credential and launch a line of handcrafted furniture sold both locally and online. Passionate about community, she hopes to open a community workshop space where
    underserved youth can learn woodworking skills at no cost. Long‑term, Aubrey envisions becoming a part‑time instructor at a local community college, speaking at regional trade shows, and publishing
    a guide on integrating traditional craftsmanship with modern sustainable practices.
