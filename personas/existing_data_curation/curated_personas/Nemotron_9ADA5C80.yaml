personas:
  professional: Blanca Perez, a budding health informatics enthusiast, leverages her bilingual communication and methodical planning skills to coordinate community health volunteer events and prototype
    simple data‑tracking tools for school projects while eyeing a future as a medical assistant or coder.
  sports: Blanca Perez, a dedicated midfielder on a neighborhood soccer team, trains twice a week at the local park, follows the San Jose Earthquakes' season, and logs her runs in a fitness app to maintain
    endurance for both school soccer matches and summer beach volleyball games.
  arts: Blanca Perez, an avid sketcher of folklore scenes, draws inspiration from vibrant murals by local artists like Diego Rivera and contemporary illustrators such as Frida Kahlo, spends weekends at
    the community art center, and curates a modest Instagram gallery showcasing her hand‑drawn reinterpretations of Día de los Muertos altars.
  travel: Blanca Perez, who dreams of exploring Oaxaca's historic plazas and the coastal cliffs of Big Sur, plans trips with meticulous spreadsheets, prefers small family groups or school‑organized cultural
    exchanges, and balances her travel aspirations with a part‑time job to fund airfare and hostel stays.
  culinary: Blanca Perez, a confident home cook, prepares mole poblano, tamales, and fresh guacamole using ingredients like dried chiles, corn masa, and cilantro, often following YouTube tutorials while
    experimenting with spice levels, and occasionally indulges in late‑night churros with a secret stash of cinnamon sugar.
  core: Blanca Perez is a methodical, bilingual teen who balances robotics projects, community bookkeeping, and traditional cooking, all while quietly hoarding extra snacks in her desk drawer.
background:
  cultural: Blanca comes from a Mexican‑heritage family that maintains strong ties to traditional customs while navigating life in a multicultural Bay Area. Her household celebrates Día de los Muertos,
    Las Posadas, and Mexican holidays with music, food, and storytelling, fostering a deep appreciation for her roots. Fluent in Spanish, she often serves as a bilingual bridge between her family and the
    broader community, helping her parents with school communications and local services. The blend of Mexican family values—such as respect for elders, community solidarity, and perseverance—with the innovation‑driven
    environment of San Jose shapes her worldview, motivating her to apply practical skills toward uplifting her community.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Google Workspace proficiency'', ''Microsoft Office basics'', ''Organizational planning'', ''Time management'', ''Basic bookkeeping'', ''Community
    volunteer coordination'', ''Cooking and nutrition basics'']'
  hobbies: '[''Reading tech blogs'', ''Arduino and simple robotics projects'', ''Sketching Mexican folklore'', ''Playing soccer in small groups'', ''Cooking traditional Mexican dishes'', ''Watching educational
    YouTube tutorials'']'
  career_goals: Blanca aims to complete her high school education and earn a GED, after which she plans to enroll in a community college program focused on health sciences or computer technology. She is
    interested in becoming a medical assistant or pursuing an entry‑level role in health informatics, where she can combine her interest in helping her community with her practical tech skills. Long‑term,
    she aspires to earn a certification in medical coding or an associate degree in information systems, positioning herself for a stable, meaningful career that serves the growing Latino population in
    the Bay Area.
