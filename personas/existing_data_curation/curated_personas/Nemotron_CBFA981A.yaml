personas:
  professional: Dina Brown, a nine‑year‑old budding visual storyteller, melds her love of vivid drawing, Minecraft world‑building, and science club experiments into imaginative projects that forecast a
    future career as an environmental illustrator who uses art to communicate complex ideas.
  sports: Dina Brown splashes through her afternoons as a member of the community pool’s junior swim team, cheers for the San Diego Padres during baseball season, and occasionally kicks a ball with the
    local youth soccer league, all while keeping a seasonal eye on the Los Angeles Lakers for basketball excitement.
  arts: Dina Brown spends her free time sketching whimsical dragons, painting bright seascapes inspired by Van Gogh’s *Starry Night*, dancing to upbeat pop tracks by Taylor Swift, and immerses herself in
    Minecraft builds while drawing creative energy from YouTube creator *Stampy* and the animated worlds of Hayao Miyazaki.
  travel: Dina Brown’s travel style mixes spontaneous beach shell‑collecting trips along the nearby coastline with meticulously planned family vacations to Disney World in Orlando and a dream visit to the
    Great Barrier Reef, where she hopes to snorkel and sketch coral reefs.
  culinary: Dina Brown delights in building homemade mini‑pizzas topped with pepperoni and fresh basil, whipping up easy fruit salads with strawberries, bananas, and a squeeze of orange juice, and occasionally
    helps her mom bake chocolate chip cookies, though she often leaves a crumb trail on the kitchen floor.
  core: Dina Brown is a curious, endlessly energetic nine‑year‑old who balances dazzling artistic bursts with a habit of leaving a trail of crayons and seashells wherever they explore.
background:
  cultural: Dina grows up in a middle‑class American family in Palm Bay, Florida, where the coastal lifestyle and outdoor recreation shape her daily life. Her family values education, community involvement,
    and appreciation for nature, often taking weekend trips to the beach and attending local festivals that celebrate Florida's diverse cultural heritage. This environment fosters her curiosity, artistic
    interests, and love for group activities.
attributes:
  skills: '[''Reading comprehension'', ''Creative drawing and painting'', ''Basic Scratch programming'', ''Team collaboration'', ''Organizational skills for school projects'', ''Basic swimming'', ''Classroom
