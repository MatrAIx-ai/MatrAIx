  hobbies: '[''Drawing and painting'', ''Reading adventure and fantasy books'', ''Playing Minecraft'', ''Swimming at the community pool'', ''Exploring nature trails and collecting seashells'', ''Participating
    in school art club'', ''Building LEGO sets'', ''Attending community dance classes'']'
  career_goals: Dina dreams of a future where she can blend her love for art and the environment, hoping to become a marine wildlife photographer or a marine biologist who uses visual storytelling to inspire
    others. She also imagines herself as a teacher who encourages curiosity, or an illustrator for children's books, aiming to share imaginative worlds with other kids.
