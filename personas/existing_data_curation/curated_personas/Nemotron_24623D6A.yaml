personas:
  professional: Daniel Shelton, a veteran operations manager with three decades of experience, blends his methodical Lean‑Six Sigma expertise and pragmatic curiosity to streamline production, champion a
    zero‑incident safety culture, mentor emerging leaders, and foster collaborative, community‑oriented teams, because they value sociable, considerate interactions as much as operational efficiency.
  sports: Daniel Shelton stays fit by hunting deer in Lincoln National Forest each fall, fishing the Pecos River on weekends, cheering on the Carlsbad High Cougars football team and the New Mexico State
    Aggies basketball squad, and they often join a morning senior walking club that explores local trails, reflecting an energetic, community‑focused outlook.
  arts: Daniel Shelton indulges in Western historical fiction by devouring novels from Louis L’Amour and Larry McMurtry, while evenings echo with Willie Nelson’s guitar and Johnny Cash’s storytelling, and
    they regularly attend community screenings of classic John Wayne films, reinforcing a deep appreciation for frontier heritage.
  travel: Daniel Shelton prefers meticulously planned road trips that blend rugged adventure with relaxed downtime, such as the recent family drive through the Grand Canyon and Yellowstone, and they dream
    of a heritage pilgrimage to Dead Wood, South Dakota, while budgeting carefully to keep these journeys affordable and ensure time with their grandchildren.
  culinary: Daniel Shelton, an adept home cook tending a vegetable garden, delights in simmering venison stew seasoned with rosemary and sage, rolling fresh green‑chile enchiladas with locally grown corn
    tortillas, and savoring a perfectly smoked brisket at the Carlsbad Heritage Festival, while they occasionally reward themselves with a slice of homemade pecan pie.
  core: Daniel Shelton balances a data‑driven, disciplined mindset with a hearty love for outdoor camaraderie, often swapping spreadsheets for a fishing rod on the Pecos River, yet they can’t resist a late‑night
    binge of Western novels, sometimes at the expense of a healthy bedtime.
background:
  cultural: Daniel comes from a white, mid‑western family that settled in New Mexico several generations ago. Raised in the Southwest, he embraces the region's values of self‑reliance, respect for the land,
    and community cooperation. His upbringing blended traditional American customs with the rugged, frontier spirit of the high desert, influencing his practical outlook, love of outdoor recreation, and
    dedication to local civic life.
