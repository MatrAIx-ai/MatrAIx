  career_goals: Ivy aims to transition from receptionist to office manager within the next two to three years, pursuing an associate’s degree in Business Administration and a certification in Office Management.
    She is motivated to develop supervisory and leadership skills so she can mentor new front‑desk staff and improve office workflow efficiency. Long‑term, Ivy hopes to leverage her compassion and community
    focus by moving into a community outreach or program coordination role at a nonprofit or healthcare organization, where she can help underserved populations while continuing to grow professionally.
