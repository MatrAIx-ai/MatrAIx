personas:
  professional: Ivy Dunmiles, a receptionist at a community health clinic, blends meticulous organization with warm compassion, using their active‑listening and conflict‑resolution skills to de‑escalate
    tense situations while curiously mastering new office software, all while balancing a practical eye for workflow efficiency with an adaptable, flexible approach.
  sports: Ivy Dunmiles, a casual fan of the Miami Heat and the Jacksonville Jumbo Shrimp, hits the beach early for volleyball with the Harbor Breeze Club and squeezes in yoga sessions and coastal jogs three
    times weekly, keeping fitness balanced with social fun.
  arts: Ivy Dunmiles, an avid reader of contemporary fiction like Ocean Vuong’s On Earth We’re Briefly Gorgeous and a sketcher of waterfront vistas, regularly attends live performances by Leon Bridges,
    H.E.R., and local soul bands, while finding inspiration in the paintings of Kehinde Wiley and the films of Barry Jenkins.
  travel: Ivy Dunmiles, who loves spontaneous weekend road trips to nearby coastal towns such as Savannah and Asheville, dreams of a cultural immersion vacation in Kingston, Jamaica, and prefers budget‑friendly
    planning that mixes beach relaxation with exploring local markets.
  culinary: Ivy Dunmiles, a confident home cook, delights in preparing Southern‑style shrimp and grits, jerk‑spiced chicken marinated with scotch bonnet peppers, and collard greens seasoned with smoked
    paprika, often pairing their meals with homemade mango‑lime chutney and exploring farmer’s markets for fresh herbs.
  core: Ivy Dunmiles balances a warm, community‑focused spirit with a perpetual worry that fuels meticulous planning, yet they can’t resist late‑night cravings for sweet tea and binge‑watching true‑crime
    documentaries when stress peaks.
background:
  cultural: Ivy identifies as African‑American and grew up in the vibrant Black community of Saint Petersburg, Florida. Her family’s traditions blend Southern hospitality with the cultural celebrations
    of the broader African‑Diaspora, such as Juneteenth, Black History Month events, and local festivals that showcase Black art and music. Active participation in her church and support of Black‑owned
    businesses reinforce her sense of community. These cultural ties shape her compassionate outlook, her commitment to service, and her appreciation for both the historic and contemporary expressions of
    Black identity in the Tampa Bay area.
