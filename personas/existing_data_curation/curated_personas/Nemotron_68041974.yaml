  career_goals: Mary aims to enroll in a master's program focused on museum studies or archival science within the next two years, with the long‑term ambition of becoming a curator of regional history.
    She is driven to publish scholarly articles, secure a competitive research fellowship, and shape public‑policy recommendations for cultural‑heritage preservation. While she values practical outcomes,
    she also seeks opportunities to lead community‑heritage projects, mentor junior volunteers, and eventually be recognized as a thought leader in heritage management.
