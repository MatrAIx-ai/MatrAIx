personas:
  professional: Mary Nelson, a meticulous budding museum studies scholar with a humanities bachelor's, blends their love of archival research, conversational French from family gatherings, and sharp project-management
    skills to design intimate exhibitions at the Murphysboro Museum while eyeing a master’s program and a future curatorship of regional history.
  sports: Mary Nelson channels their solitary fitness preference into weekly hikes through Shawnee National Forest, they also participate in the local Shawnee Trail Runners club, follow the Chicago Cubs
    baseball season, root for the Southern Illinois Salukis basketball team, and practice sunrise yoga to maintain flexibility and mental focus.
  arts: Mary Nelson enriches their creative life by playing Debussy nocturnes on the family piano, curating photo series inspired by Ansel Adams, devouring the works of Virginia Woolf and Friedrich Nietzsche,
    and attending the Art Institute of Chicago’s impressionist exhibitions, all while they discuss classic French cinema during their book club gatherings.
  travel: Mary Nelson favors low‑key, research‑oriented travel, spending summer weekends exploring the historic sites of St. Louis and the French Quarter of New Orleans before a dream pilgrimage to Paris
    to perfect their conversational French, while they budget carefully and often opt for hostel stays and train travel over pricey flights.
  culinary: Mary Nelson enjoys simple, seasonal cooking, often whipping up mushroom‑risotto with fresh rosemary and a dollop of goat cheese, baking almond croissants after studying French recipes, and savoring
    a strong espresso while reading, though they sometimes over‑indulge in late‑night pizza deliveries during exam weeks.
  core: Mary Nelson is a quietly ambitious archivist‑in‑training who balances methodical research, frugal finances, solitary hikes, and a penchant for classic literature, all punctuated by a skeptical edge
    and occasional over‑caffeinated indulgences; they constantly question motivations while quietly charting their own path.
background:
  cultural: Mary grew up in Murphysboro, a small town in southern Illinois where Midwestern values of modesty, hard work, and community service are deeply embedded. Her family traces its roots to French‑Canadian
    immigrants who settled in the region in the early 1900s, giving her a subtle Francophone heritage that surfaces in family traditions and a basic command of French. The local culture emphasizes church
    participation, county fairs, and an appreciation for regional history, all of which have nurtured her interest in the humanities. As a white resident of a predominantly white rural community, her cultural
    experience centers on typical small‑town American life, including close‑knit friendships, volunteerism, and a strong connection to the agricultural and natural landscape surrounding her.
