personas:
  professional: Robert Patterson, a budding LEGO architect who thrives on building tidy, blocky structures yet delights in spontaneous free‑form creations, channels their practical mind and love for predictability
    into early engineering play while occasionally rebelling against the strict color‑by‑color rules of their favorite building set.
  sports: Robert Patterson loves playing tag and participating in the local park’s toddler soccer program with the Little Lions Juniors, cheering on the team while also enjoying weekly parent‑guided toddler
    gymnastics at the Bright Beginnings Club, preferring small‑group activities over crowded fields.
  arts: Robert Patterson is enchanted by the lively tunes of The Wiggles and the whimsical storytelling of Pixar’s Toy Story, often drawing colourful dinosaurs and practicing simple dance moves to the song
    Hot Potato, with a particular fondness for the animated series Bluey which fuels their imaginative play.
  travel: Robert Patterson's family road‑trip adventures have taken them to the Magic Kingdom in Orlando, where they rode the Peter Pan’s Flight attraction, and a weekend beach getaway to Myrtle Beach where
    they built sandcastles and collected shells, preferring short, familiar trips with parents over distant, solo travel.
  culinary: Robert Patterson adores mac‑and‑cheese with a crunchy breadcrumb topping, enjoys crunchy apple slices with peanut butter, and proudly makes a simple peanut butter‑jelly sandwich using a child‑safe
    kitchen set, often insisting on arranging food in neat rows on their plate.
  core: Robert Patterson is a four‑year‑old who blends a love for orderly play with bursts of spontaneous creativity, saves pennies for big toys while indulging in occasional treats, and navigates health
    and fun with gentle confidence and a hint of forgetful charm.
background:
  cultural: Robert is an African‑American boy raised in Pompano Beach, Florida. His family blends Southern traditions with Caribbean influences, celebrating holidays like Juneteenth and attending weekly
    services at a local Baptist church where gospel music is a staple. The multicultural neighborhood exposes him to diverse cuisines, beach outings, and community events that emphasize family ties and
    collective achievement. These cultural experiences shape his values of cooperation, resilience, and pride in his heritage.
attributes:
  skills: '["color naming", "counting to ten", "letter recognition", "drawing simple shapes", "basic block building", "following two‑step instructions", "self‑feeding", "dressing with assistance"]'
  hobbies: '["building block towers", "coloring and drawing", "listening to gospel and R&B music", "playing at the playground", "sand and water play", "simple matching games", "storytime with picture books"]'
  career_goals: Although still very young, Robert frequently talks about what he wants to be when he grows up. He admires the orderly nature of firefighters and the teamwork of police officers, so he often
    says he wants to be a firefighter. He also looks up to athletes, especially basketball players he sees on TV, and sometimes dreams of playing for a local team. His current ambition is to learn to swim
    confidently and ride a bike without training wheels, seeing these abilities as stepping stones toward future adventures.
