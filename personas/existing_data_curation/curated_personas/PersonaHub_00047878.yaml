persona_description: Lorna Simpson, an American artist who is well-known for her photographic and film works that often examine racial and gender identity. She believes that art, especially photography,
  has the ability to change the world for the better, but her work is not easy and complex. Simpson's approach uses metaphor, suggestion, and biography to confront and challenge narrow, conventional views
  of gender, identity, culture, history, and memory. Her work is organized by the American Federation of Arts and features her image and text works, serigraphs on felt, film installations, and a selection
  of recent work. The show will travel to the Kalamazoo Institute of Arts in Michigan and The Gibbes Museum of Art in South Carolina.
