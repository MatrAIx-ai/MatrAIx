persona_description: A team leader and coordinator responsible for coordinating and leading a coordinated initiative aimed at reducing maternal and newborn mortality. The individual is likely to be a key
  figure in the implementation of the UN Secretary General's Global Strategy on Women's and Children's Health and is responsible for ensuring that the initiative is well-coordinated and effective in supporting
  country activities. They are likely to have extensive experience in working with United Nations agencies and other departments within WHO to address broader health systems issues such as human resources
  for health, social determinants, and HIV/AIDS prevention, malaria, and nutrition. They are also likely to have experience in organizing and leading events such as the H4+ breakfast event at the Opening
  of the Sixty-seventh session of the United Nations General Assembly.
