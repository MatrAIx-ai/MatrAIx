personas:
  professional: Aurora Parks, a 17‑year‑old high‑school junior with a knack for kitchen organization and hands‑on animal care, spends afternoons shadowing the local veterinary clinic and assisting in the
    family bakery, eyeing a community‑college program in culinary arts or veterinary technology to secure a stable, community‑focused career, and they value routine and local service.
  sports: Aurora Parks prefers low‑key outdoor pursuits, regularly joining the Cazenovia Hiking Club for bird‑watching treks, cheering on the Cazenovia High School Tigers football team on weekends, and
    they occasionally dip into community soccer scrimmages, reflecting their love of nature and modest team spirit.
  arts: Aurora Parks enjoys solitary artistic pastimes, curling up with historical fiction by Ken Follett and mystery novels by Tana French, sketching nature scenes inspired by Audubon, crocheting patterns
    from Lion Brand yarn, immersing in narrative‑driven video games like Life Is Strange, and they often unwind listening to folk artist Sufjan Stevens.
  travel: Aurora Parks plans trips with meticulous checklists, favoring week‑long road trips to historic sites such as Colonial Williamsburg and the Hudson Valley, weekend hikes in the Adirondacks, and
    they dream of wandering medieval streets in Bruges, balancing a limited teenage budget with a love for cultural immersion.
  culinary: Aurora Parks excels at baking rustic sourdough loaf, buttery chocolate‑chip cookies, and herb‑infused focaccia, delights in experimenting with fresh rosemary, thyme, and lavender, and despite
    a tendency to over‑bake and set the kitchen timer multiple times, they find solace in sharing warm pastries with family and neighbors.
  core: Aurora Parks is a routine‑loving, solitary 17‑year‑old who balances meticulous baking and garden care with spontaneous sketches, a quiet resilience, and they indulge in a healthy dose of sweet‑tooth
    cravings.
background:
  cultural: Aurora grew up in Cazenovia, a small town in Onondaga County, New York, within a middle-class, predominantly white family with deep roots in the region. Her upbringing reflects a blend of rural
    and suburban Upstate New York culture, emphasizing practicality, community involvement, and seasonal traditions such as county fairs, harvest festivals, and Thanksgiving gatherings. Her family participates
    in local church activities and values self-reliance, hard work, and modest social rituals. These cultural influences shape her preference for routine, her appreciation of simple pleasures, and her desire
    to contribute to her close-knit community.
attributes:
  skills: '["Basic computer proficiency (Word, Excel, email, social media)", "Baking and simple cooking", "Animal care (dog and small farm livestock)", "Household organization and routine management", "Improvisational
