  hobbies: '["Reading historical fiction and mystery novels", "Baking and cake decorating", "Gardening (herbs and vegetables)", "Birdwatching on local trails", "Crocheting and knitting", "Sketching in a
    personal journal", "Playing narrative-driven video games"]'
  career_goals: Aurora aspires to work in a stable, community-focused role where she can blend her love for routine with occasional creative flexibility. She hopes to attend a local community college to
    study culinary arts or veterinary technology, aiming to become a bakery assistant or a veterinary aide in the Cazenovia area. Long-term, she envisions a career that lets her stay close to home, support
    her family, and contribute to the small-town economy, perhaps eventually opening a modest home-based bakery or pet-care service.
