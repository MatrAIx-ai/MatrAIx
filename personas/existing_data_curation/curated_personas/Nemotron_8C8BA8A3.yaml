  hobbies: '[''Building wooden block towers'', ''Drawing and coloring with crayons'', ''Participating in library story‑time and sing‑along'', ''Running games like tag and races'', ''Sorting and categorizing
    toys'', ''Shape‑matching and simple puzzles'', ''Exploring local parks and shoreline'']'
  career_goals: Although only three, Daniel already shows early ambition. He often tells adults he wants to be a teacher or a community helper who can guide younger children, reflecting his love for leading
    play and sharing knowledge. He aspires to master reading all letters, count beyond ten, and become the best at building the tallest block tower. His competitive streak drives him to finish puzzles quickly
    and be the first in simple races, while his organized nature makes him set personal milestones, such as completing a new book each month. Over the next few years, he hopes to transition these goals
    into a future role where he can combine his sociability and practical skills to support others.
