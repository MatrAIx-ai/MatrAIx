  career_goals: Gerald loves watching shows about firefighters and police officers, and often says he wants to "be a hero" when he grows up. He also expresses excitement about helping people, so his budding
    ambition leans toward a future role in public safety or community service, where he can protect others and maintain order. In the meantime, his short‑term goal is to master new puzzles and learn to
    ride a tricycle without falling.
