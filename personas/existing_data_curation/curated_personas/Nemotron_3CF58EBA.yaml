personas:
  professional: Maxwell Nieves is an aspiring robotics hobbyist who spends weekends designing and programming small LEGO‑based machines, merging a love for strategic puzzle video games with a practical,
    organized approach to tinkering; they regularly share prototypes at the school STEM club, balancing creative flexibility with reliable project timelines.
  sports: Maxwell Nieves is a passionate youth soccer midfielder for the Fort Worth Kickers, idolizing FC Dallas and cheering on the Dallas Cowboys during off‑season; they train three times a week at the
    local park, blend competitive drive with teamwork, and keep a disciplined fitness regimen that includes weekend pick‑up matches and occasional basketball to stay agile.
  arts: Maxwell Nieves is an avid sci‑fi reader and music enthusiast who devours novels by Isaac Asimov and Angélica Ramos in both English and Spanish, frequently streaming Bad Bunny and Lila Mondal, and
    channeling a creative streak into building intricate LEGO sets, which they view as a form of architectural art.
  travel: Maxwell Nieves is an adventurous weekend explorer who enjoys spontaneous road trips to Austin’s music scene, family visits to the Natural Bridge Caverns, and annual family vacations to the Gulf
    Coast, while dreaming of a future backpacking trip to Barcelona and a cultural immersion trek to Machu Picchu, balancing careful budgeting with the thrill of discovering new places.
  culinary: Maxwell Nieves is a budding home chef who loves preparing tacos al pastor, elote, and homemade churros alongside their family, experimenting with fresh pineapple and cilantro, and taking pride
    in perfectly crisped quesadillas, though they sometimes over‑salt dishes when focused on perfecting the salsa consistency.
  core: Maxwell Nieves blends curious tinkering, disciplined savings, careful health routines, soccer teamwork, sci‑fi storytelling, spontaneous travel dreams, and family‑rooted cooking into a uniquely
    balanced teen perspective, albeit with occasional impulsive gaming splurges.
background:
  cultural: Maxwell grows up in a Mexican‑American household in Fort Worth, where Spanish is spoken at home and Mexican traditions are celebrated alongside Texan culture. His family observes holidays such
    as Día de los Muertos and Mexican Independence Day, and they often gather around the kitchen to prepare classic meals, reinforcing a strong sense of heritage. Living in the diverse community of Tarrant
    County, Maxwell interacts with peers from various backgrounds while maintaining a connection to his roots through bilingual education and community events at the local Hispanic cultural center. This
    blend of Mexican customs and American suburban life shapes his identity, values, and outlook on the future.
attributes:
  skills: '["Bilingual (English/Spanish)", "Strong math and science foundation", "Basic programming (Scratch, Python)", "Robotics kit building (LEGO Mindstorms)", "Teamwork and leadership in soccer", "Cooking
    assistance with Mexican cuisine", "Effective time management and organization"]'
  hobbies: '["Playing soccer", "Strategy and puzzle video gaming", "Building LEGO and robotics projects", "Reading science‑fiction novels (English and Spanish)", "Cooking Mexican dishes with family"]'
  career_goals: Maxwell aspires to attend a STEM-focused high school and eventually earn a degree in mechanical engineering, where he can combine his love for building things with real-world problem solving.
    He dreams of designing sustainable technologies that could benefit his community, such as low-cost water filtration systems. While keeping his practical mindset, he also hopes to develop a video game
    that celebrates Mexican folklore, blending his technical skills with his cultural heritage. In the short term, he aims to win his middle school's robotics competition and secure a scholarship for advanced
    coding courses.
