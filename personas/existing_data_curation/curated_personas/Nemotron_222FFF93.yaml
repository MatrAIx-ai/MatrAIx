personas:
  professional: A 39‑year‑old Tampa resident named Daniel Kelch turns their methodical DIY expertise into a home‑based handyman consultancy, combining precise budgeting, strategic problem‑solving, and a
    growing art‑history repertoire to offer neighbors reliable repairs and curated aesthetic upgrades.
  sports: Daniel Kelch follows the Tampa Bay Buccaneers and the Lightning with fervent loyalty, joins a local recreational soccer league for spring fitness, and spends Saturday mornings fishing with the
    Tampa Bay Anglers Club, balancing competitive board‑game nights with a disciplined cardio routine that includes interval runs on the Bayshore Trail.
  arts: Daniel Kelch immerses themselves in Tampa's cultural pulse by visiting the Tampa Museum of Art’s contemporary exhibitions, photographing street scenes inspired by the works of Vivian Mayer and Ansel Adams,
    and curating a living‑room gallery featuring prints by Georgia O'Keeffe alongside local marine painters, all while listening to Jimmy Buffett’s coastal tunes during projects.
  travel: Daniel Kelch plans trips with a mix of meticulous itineraries and spontaneous detours, favoring art‑rich destinations like Florence, Italy and Kyoto, Japan, while also returning frequently to
    the Florida Keys for sunset fishing charters; they budget these escapes through a dedicated travel savings account and often travel with a compact camera to capture fleeting moments.
  culinary: Daniel Kelch enjoys cooking Gulf‑inspired seafood such as blackened grouper tacos with fresh cilantro, lime, and jalapeño, or shrimp and grits seasoned with smoked paprika, wielding a modest
    yet confident kitchen skill set that blends barbecuing techniques from local fish fries with a penchant for experimenting with exotic spices like sumac.
  core: Daniel Kelch is a curious, organized handyman‑entrepreneur who balances a love for photography, board games, and Gulf‑side fishing with a competitive edge, a habit of over‑budgeting for hobby gear,
    and occasional neglect of routine health check‑ups.
background:
  cultural: Daniel grew up in a middle‑class white family in suburban Tampa, absorbing the laid‑back coastal lifestyle of Southwest Florida while also being shaped by traditional Southern values. The multicultural
    rhythm of the city, especially its Hispanic and Caribbean influences, introduced him to diverse foods, music, and festivals such as Gasparilla. His family emphasized self‑reliance and community involvement,
    which fostered his organized, reliable nature. Though he did not complete a formal high school diploma, his upbringing encouraged a lifelong curiosity and a respect for the arts and practical trades.
