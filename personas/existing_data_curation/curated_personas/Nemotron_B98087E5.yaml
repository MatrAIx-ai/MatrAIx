  hobbies: '[''Reading science‑fiction'', ''Tech journalism'', ''Puzzle solving (Sudoku, crosswords)'', ''Chess (online play)'', ''Mindfulness meditation'', ''Yoga'', ''Indoor herb gardening'', "Cooking
