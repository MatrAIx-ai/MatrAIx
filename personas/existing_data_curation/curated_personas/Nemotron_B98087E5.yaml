  career_goals: Lidia aims to advance into senior IT leadership, targeting roles such as Director of Technology or Chief Information Officer within the next five years. She plans to earn PMP and CISSP certifications
    to solidify her credentials, spearhead a company‑wide digital transformation that leverages cloud‑native solutions, and build a robust cybersecurity framework to protect customer data in the casino
    and hospitality ecosystems. Additionally, she seeks to mentor emerging women technologists in the Latino community, creating a pipeline of diverse talent while maintaining a predictable, well‑structured
    work environment that supports her family life.
