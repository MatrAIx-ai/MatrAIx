personas:
  professional: Lidia Delrisco, a senior IT infrastructure manager for Las Vegas hospitality and entertainment venues, merges over ten years of enterprise systems design, cloud and network optimization,
    and cybersecurity risk assessment into a pragmatic, detail‑oriented leadership style that balances her love of structure with a flexibly competitive edge in vendor negotiations and project delivery.
  sports: Lidia Delrisco, an avid solo hiker who frequents Nevada's desert trails as a member of the Desert Trail Enthusiasts club, maintains her fitness with weekend yoga sessions, while cheering for the
    Las Vegas Raiders in the NFL and the Vegas Golden Knights in the NHL, and occasionally follows local adult recreational tennis leagues.
  arts: Lidia Delrisco, a quiet aficionado of science‑fiction literature, devotes evenings to reading authors like N.K. Jemisin and Charles Stross, admires minimalist photographers such as Michael Kenna,
    and finds solace in the ambient compositions of Brian Eno and the strategic elegance of classic chess masters like Garry Kasparov.
  travel: Lidia Delrisco, who prefers meticulously planned solo getaways focused on stark landscapes, has hiked the red rocks of Sedona and captured sunrise in Iceland's volcanic fields, and dreams of photographing
    the dunes of Namibia while balancing family commitments that often limit extended trips.
  culinary: Lidia Delrisco, a hands‑on home cook, perfects family‑style arepas stuffed with shredded pork and avocado and golden‑browned empanadas de carne, infusing each with fresh cilantro, cumin, and
    oregano from her indoor herb garden, while her curiosity leads her to experiment with sous‑vide vegetable medleys for health‑conscious weeknight meals.
  core: Lidia Delrisco is a 35‑year‑old tech leader who channels chronic anxiety into disciplined project execution, finds refuge in solitary desert hikes and minimalist photography, balances a competitive
    edge with a craving for predictable routines, and occasionally indulges in late‑night puzzle marathons that keep her mind sharp.
background:
  cultural: Lidia was born in Caracas and moved to the United States in her early twenties. She retains strong ties to Venezuelan culture through language, food, and family rituals, celebrating holidays
    like Día de la Independencia and Carnaval with her close‑knit extended family. Her upbringing emphasized resilience, adaptability, and a communal approach to problem‑solving—values that she blends with
    her pragmatic, solo‑oriented lifestyle in Las Vegas. While she cherishes her Latin American roots, she has also integrated into the multicultural fabric of Nevada, often participating in local Venezuelan
    community gatherings and maintaining a bilingual household.
