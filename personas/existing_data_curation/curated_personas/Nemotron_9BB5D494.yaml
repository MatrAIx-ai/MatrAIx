  hobbies: '[''Digital painting'', ''Photography'', ''Science-fiction reading'', ''Philosophy'', ''Chess'', ''Custom PC building'', ''Hiking'', ''Native American storytelling and cultural events'', ''Beadwork'',
    ''Experimental cooking'', ''Data visualization projects'', ''Local tech meetups'']'
  career_goals: He aims to transition from a technical support role into senior IT leadership, targeting positions such as IT Service Manager or Director of Technology within a regional business or educational
    institution. Philip plans to obtain PMP and ITIL certifications, deepen his knowledge of cloud architecture and cybersecurity, and spearhead digital transformation projects that introduce AI-driven
    support tools and data-analytics platforms. He also envisions establishing a boutique consulting firm that helps small Kansas enterprises adopt innovative technologies while preserving their cultural
    identity. Mentorship and community outreach, especially for Native American youth entering STEM fields, remain central to his long-term ambition.
