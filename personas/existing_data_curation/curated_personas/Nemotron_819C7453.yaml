personas:
  professional: Michael Lazo, an aspiring LEGO architect who methodically sorts bricks by hue and shape before constructing tiny cityscapes, channels his love of puzzles into plans drawn on graph paper,
    and they already treat each building project like a mini‑construction site with clear steps and deadlines.
  sports: Michael Lazo, a small‑group soccer enthusiast who plays on the Milwaukee Youth Soccer Club's under‑seven team every Saturday morning, follows a structured practice routine, cheers for the Milwaukee
    Brewers while watching games on TV, and they keep a tiny star‑studded badge on their cleats for good luck.
  arts: Michael Lazo, a budding cityscape sketcher who loves drawing blocky skylines with crayons while listening to the upbeat merengue of Juan Luis Guerra and the smooth bachata of Romeo Santos, often
    reenacts scenes from the cartoon ‘Paw Patrol’ and occasionally joins a weekend kids’ dance class that teaches basic bachata steps, showing how rhythm and visual design blend into their playtime.
  travel: Michael Lazo, an adventurous kid who enjoys family road trips to the Milwaukee Public Museum and the sandy shores of Lake Michigan, and dreams of a future vacation to San Juan, Puerto Rico, where
    they imagine exploring colorful streets and tasting fresh plantain dishes, and they prefer well‑planned itineraries over spontaneous wanderings.
  culinary: Michael Lazo, a curious kitchen helper who enjoys washing bright orange carrots and rinsing fresh lettuce for their mother's fried plantain side dish, loves the savory taste of mangú topped
    with crumbled cheese, relishes sweet pastelitos with guava filling, and, despite being a novice, they try to assemble their own mini‑sandwiches using soft tortillas and cheese.
  core: Michael Lazo, a methodical 6‑year‑old LEGO enthusiast who balances puzzle‑solving with rhythmic merengue beats, keeps a tidy piggy bank, wrestles occasional allergies, and they quietly dream of
    building a city that mirrors the colorful streets of their grandparents' hometown.
background:
  cultural: 'Michael is raised in a Dominican household in Milwaukee, where both Spanish and English are spoken daily. His parents, immigrants from the Dominican Republic, bring rich cultural traditions
    into his life: family gatherings feature dishes such as mangú, rice and beans, and pastelitos; celebrations include Semana Santa and the Dominican Independence Day festivities at the local cultural
    center. He regularly hears merengue, bachata, and dembow music, and his family encourages respect for elders and close family bonds. This Dominican heritage shapes his emerging bilingual abilities,
    love of rhythmic music, and the communal values he observes in his community.'
attributes:
  skills: '[''Follow daily routines'', ''Build simple LEGO models'', ''Basic Spanish vocabulary'', ''Complete jigsaw puzzles'', ''Organize toys and books'', ''Recite alphabet and numbers'']'
  hobbies: '[''Assembling puzzles'', ''Building LEGO structures'', ''Drawing cityscapes'', ''Reading picture books'', ''Listening to merengue and bachata'', ''Playing soccer with a small group of friends'',
    ''Helping in the kitchen with simple tasks'']'
  career_goals: Michael dreams of one day designing and building things, so he imagines becoming an architect or civil engineer who creates safe, orderly spaces for kids. He is also fascinated by community
    helpers and thinks about being a firefighter to keep his neighborhood safe and well‑structured. In the near term, his goal is to become a more fluent reader and improve his Spanish so he can help his
    family and friends, and eventually contribute to creating playgrounds in his community.
