  career_goals: Patrick envisions a future where he can combine his love for structure, technology, and teamwork. He aims to earn a place in a STEM-focused high-school program, later pursuing a degree in
    civil or aerospace engineering that will let him design sustainable infrastructure and, eventually, contribute to space-exploration projects. He is also interested in mentoring younger students through
    after-school clubs, hoping to become a leader who can inspire the same reliability and collaborative spirit he values today.
