persona_description: A scientist who specializes in the study of ancient burial sites and artifacts, particularly those found in the Plain of Jars in Southeast Asia. This scientist has conducted extensive
  research on the variety of sizes and shapes of the jars, the mystery of how the jars were moved, and the possibility that they may represent a memorial of some kind. The scientist is also interested in
  the possibility that the stone jars were used to decompose bodies before the bones were cleaned for secondary burials. The scientist has conducted fieldwork at the site, recovered human teeth, and is
  currently studying the contents of the ceramic jars excavated from the site.
