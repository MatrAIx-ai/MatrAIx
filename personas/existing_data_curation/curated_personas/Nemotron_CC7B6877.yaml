  career_goals: Joshua aims to achieve tenure and become a leader in innovative humanities education within his university. He plans to launch an interdisciplinary program that merges visual arts, digital
    media, and philosophical inquiry, and to secure a major research grant for exploring the role of imagination in learning. He aspires to publish a seminal monograph on abstract artistic expression and
    its pedagogical implications, and to be recognized as a thought leader at national conferences. Balancing his competitive drive, he also wishes to mentor emerging scholars and foster a collaborative
    community while maintaining a flexible schedule that mitigates stress.
