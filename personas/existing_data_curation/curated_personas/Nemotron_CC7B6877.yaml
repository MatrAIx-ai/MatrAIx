personas:
  professional: Joshua Cooke, a 41‑year‑old interdisciplinary humanities professor at a state university, blends rigorous art theory with digital media and philosophical inquiry in their courses, designing
    immersive experiences with VR installations while racing against grant deadlines, and their competitive streak drives them to push innovative curricula despite a habit of leaving syllabi drafts scattered
    across the office.
  sports: Joshua Cooke enjoys jogging along White River State Park trails in spring, follows the Indianapolis Colts and Indiana Pacers religiously, joins a local cycling club for weekend rides when the
    weather permits, yet their inconsistent schedule means they rarely attend organized league games.
  arts: Joshua Cooke spends evenings creating plein‑air watercolors of Indiana’s rural landscapes, curates experimental VR installations inspired by Marina Abramović and Olafur Eliasson, strums acoustic
    guitar while quoting Baudelaire, and they draw deep inspiration from the works of Jackson Pollock and speculative fiction author China Miéville.
  travel: Joshua Cooke prefers art‑focused pilgrimages, having spent a month in Berlin exploring contemporary galleries and a weekend road trip to the Ohio River Valley for plein‑air painting, they plan
    future trips to Kyoto’s digital art museums while balancing family time and grant obligations that limit long‑term travel.
  culinary: Joshua Cooke, an amateur cook, leans toward farm‑to‑table dishes like beet‑goat cheese risotto and rosemary‑roasted chicken, they enjoy experimenting with miso‑based ramen after a workshop at
    a local culinary school, yet often order take‑out from the downtown indie pizza joint when deadlines loom.
  core: Joshua Cooke, a creatively restless scholar, channels a competitive drive into innovative humanities teaching while juggling stress‑induced health quirks, spontaneous art purchases, and a love for
    indie pizza after long days in the studio, and they often find themselves sketching ideas on coffee napkins between meetings.
background:
  cultural: Joshua grew up in a middle‑class Midwestern family with a strong emphasis on education and self‑exploration. His white Anglo‑American heritage includes exposure to both traditional American
    cultural values—such as independence and community involvement—and a deep appreciation for European art and literary traditions fostered by his humanities education. Living in Fishers, Indiana, he benefits
    from the region’s blend of suburban stability and proximity to Indianapolis’ vibrant cultural scene, which informs his eclectic artistic interests and academic perspective.
