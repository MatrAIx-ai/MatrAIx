personas:
  professional: Ulysses Tettamanti is a self‑taught full‑stack web developer who crafts accessible, user‑centric applications with JavaScript, React, TypeScript, and Python, and channels their compassionate,
    slightly disorganized nature into mentoring junior developers and contributing open‑source mental‑health tools while juggling a goal to become a senior engineer and AWS Solutions Architect.
  sports: Ulysses Tettamanti enjoys weekend hikes along the Hill Country trails with the local Waco Hikers Club, follows the Dallas Cowboys and Texas Rangers from a comfortable sofa, and occasionally joins
    a small group for trail‑running and yoga, preferring low‑key, nature‑focused exercise over high‑intensity gym sessions.
  arts: Ulysses Tettamanti immerses themselves in digital illustration and street photography of Waco’s urban‑rural contrast, strums acoustic guitar to the tunes of Lila Downs and Fleet Foxes, reads speculative
    fiction by N.K. Jemisin and tech essays on TechCrunch, and frequents intimate art openings featuring artists like Ryan Hughes and indie film screenings of directors such as Kelly Reichardt.
  travel: Ulysses Tettamanti prefers solo or small‑group road trips that blend cultural curiosity and nature, having explored the deserts of New Mexico, the coffee houses of Oaxaca for culinary inspiration,
    and the tech hubs of Tokyo, while planning future visits to the Blue Ridge Mountains and a quiet retreat in the Catskills to recharge.
  culinary: Ulysses Tettamanti experiments with modern twists on classic Mexican dishes, such as chipotle‑infused quinoa‑taco shells, sous‑vide carnitas with pomegranate‑citrus glaze, and mole‑marinated
    salmon, delighting in ingredients like masa harina, dried chilies, avocado, and fresh cilantro while balancing a modest home‑cooking skill set with occasional take‑out indulgences.
  core: Ulysses Tettamanti is a creatively restless, compassionate coder who channels worry into mindfulness, often loses track of appointments, splurges on art supplies, yet persistently builds inclusive
    tech for underserved communities.
background:
  cultural: 'Ulysses was born and raised in Texas to parents who immigrated from the state of Jalisco, Mexico. He grew up bilingual, speaking Spanish at home and English in school. While he never completed
    a formal high‑school diploma, his Mexican‑American heritage has shaped his identity: he celebrates Día de los Muertos and Mexican Independence Day with his extended family, prepares traditional foods,
    and incorporates vibrant folk motifs into his personal art and UI designs. He remains connected to the local Mexican community in Waco through cultural festivals, Spanish‑language church gatherings,
    and by volunteering at community tech workshops aimed at supporting Latinx youth.'
