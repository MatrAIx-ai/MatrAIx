  career_goals: Ulysses aims to leverage his technical expertise to create technology that serves underserved communities. In the next five years he plans to obtain an AWS Solutions Architect certification,
    transition into a senior engineer or technology lead role, and launch a side project—a mobile app that provides culturally relevant mental‑health resources for Spanish‑speaking users. He also wishes
    to formalize his mentorship by establishing a community coding workshop for local youth, and to improve his project‑management habits through structured agile practices to reduce stress.
