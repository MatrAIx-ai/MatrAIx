  hobbies: '[''Group fitness classes'', ''Country line dancing'', ''Hiking'', ''Volunteering at food pantry'', ''Organizing community workshops'', ''Cooking Southern cuisine'', ''Gardening'', ''Trivia night
    participation'']'
  career_goals: Marilynn aims to complete her bachelor's degree in finance within the next two years, earn a Certified Credit Counselor credential, and progress to a senior loan officer position. She aspires
    to lead a team that designs and delivers financial literacy workshops for residents of Catawba County, and eventually transition into community development lending to support local small businesses.
