  career_goals: Jason envisions a career that blends his love for social interaction with his knack for organization. He aspires to become a community youth mentor or a middle‑school teacher, where he can
    create structured learning environments and help students develop both academic and interpersonal skills. He is also intrigued by educational technology and hopes to design user‑friendly tools that
    make learning more engaging. To achieve this, he plans to attend a high school with strong STEM and arts programs, then pursue a degree in education or computer science.
