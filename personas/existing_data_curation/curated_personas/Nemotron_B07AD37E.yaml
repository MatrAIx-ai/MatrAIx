personas:
  professional: Jason Richard is an emergent debater and budding coder who blends the structured research habits from their school debate club with the collaborative spirit of their varsity soccer team
    to design Scratch games, often showcasing them to classmates to sharpen both persuasive speaking and technical problem‑solving.
  sports: Jason Richard thrives on the regimented schedule of varsity soccer, committing to three practices per week and weekend matches, while cheering for the local professional soccer team and joining
    a community Saturday pick‑up league that fuels their competitive drive and love of teamwork.
  arts: Jason Richard immerses themselves in graphic novels like Raina Telgemeier’s Smile and Neil Gaiman’s The Sandman, while blasting upbeat pop anthems from Taylor Swift and BTS to energize their game‑design
    sessions, a blend that fuels both their storytelling instincts and social charisma.
  travel: Jason Richard dreams of traveling to Tokyo for an anime expo and to Barcelona to watch a live soccer match, yet they usually stick to family road trips to nearby amusement parks like Disney World,
    planning each outing with a checklist of must‑see attractions and budget limits.
  culinary: Jason Richard enjoys customizing pepperoni pizza with extra mozzarella and avocado, can whip up a decent batch of nachos with jalapeños and cheddar, but they still rely on quick microwave meals
    after late‑night gaming sessions, often brushing off dishes until the next day.
  core: Jason Richard is a predictably organized 13‑year‑old who balances debate, soccer, and coding with a penchant for rearranging their backpack before every practice and a sweet‑tooth that never lets
    a half‑eaten cookie go to waste.
background:
  cultural: Jason grew up in a suburban neighborhood of Passaic, within Bergen County, New Jersey. His family has roots in the northeastern United States, with a mix of European ancestry, and they place
    high value on community involvement, education, and outdoor recreation. The region’s diverse cultural landscape and proximity to New York City have exposed him to a blend of traditions and languages,
    fostering an appreciation for multicultural perspectives while maintaining a primarily American cultural identity.
