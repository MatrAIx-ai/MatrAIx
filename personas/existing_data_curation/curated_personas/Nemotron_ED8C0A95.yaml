personas:
  professional: Sandra Osagiede, a one‑year‑old who spends hours stacking colorful rings into perfectly aligned towers, demonstrates an early preference for structure and practical problem solving that
    hints at a future in engineering or data organization, and they reliably re‑arrange any displaced blocks to restore order.
  sports: Sandra Osagiede, a one‑year‑old who eagerly watches the Los Angeles Lakers on family TV and participates in the neighborhood toddler gymnastics class, prefers solitary play with soft bouncy balls
    over group games but occasionally engages in friendly competition to be the first to crawl to the colorful tunnel, reflecting their competitive nature, and they relish the brief moments of triumph.
  arts: Sandra Osagiede, an observant one‑year‑old who lights up at the gentle strains of Yo‑Yo Ma’s cello suites and shows fascination with the bright swirls of Vincent van Gogh’s Starry Night in picture
    books, enjoys quiet artistic experiences that align with their love for solitude, and they often hum along softly.
  travel: Sandra Osagiede, whose family has taken her on a calm weekend getaway to the nearby national park and a short flight to Orlando’s theme park, delights in quiet car rides with soft blankets and
    looks forward to future visits to the tranquil shores of Martha’s Vineyard, preferring relaxed, structured travel over hectic tours, and they prefer destinations that offer calm environments.
  culinary: Sandra Osagiede, a picky one‑year‑old who prefers the smooth texture of sweet potato puree seasoned with a pinch of cinnamon and the gentle sweetness of ripe banana slices, consistently chooses
    oatmeal with finely chopped apples over new foods unless presented in a predictable, orderly fashion, and they often turn away from unfamiliar plates.
  core: Sandra Osagiede, the meticulous one‑year‑old who lines up her plush toys in perfect rows, refuses any disruption to their routine, and repeatedly drops a spoon if the rhythm is off, they embody
    a surprisingly competitive, solitary, and stress‑resilient temperament.
background:
  cultural: Sandra is an African American child raised in Phenix City, Alabama. Her family embraces Southern African American traditions, including regular church gatherings, soulful family meals featuring
    dishes like collard greens and cornbread, storytelling that honors their heritage, and a strong emphasis on close‑knit extended family relationships. These cultural influences shape her early experiences,
    values, and sense of belonging.
