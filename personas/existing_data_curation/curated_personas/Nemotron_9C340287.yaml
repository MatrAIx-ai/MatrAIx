personas:
  professional: Diana Perezlopez, a 57‑year‑old veteran radiologic technologist with ARRT certification in CT and MRI, blends meticulous image‑quality stewardship with a curiosity for emerging hybrid modalities,
    while quietly steering their department toward better radiation‑safety culture and mentoring junior staff through hands‑on workshops and patient‑education guides.
  sports: Diana Perezlopez enjoys weekend hikes in the Sandia Mountains with a close friend, practices yoga three times weekly at a local studio, and is a devoted fan of the Albuquerque Isotopes baseball
    team and the New Mexico State Aggies men’s basketball squad, joining a community hiking club for seasonal treks.
  arts: Diana Perezlopez spends evenings painting vibrant folk motifs in watercolor, draws inspiration from the bold palettes of Frida Kahlo and the stark desert compositions of Ansel Adams, showcases their
    photographs at the monthly Old Town art walk, and regularly attends the annual Southwestern Folk Art Fair.
  travel: Diana Perezlopez prefers thoughtfully planned trips that blend photography opportunities with cultural immersion, having explored the red‑rock landscapes of Sedona, the historic streets of Barcelona,
    and the cloud forests of Monteverde, while dreaming of a quiet retreat to a coastal village where they can paint sunrise vistas.
  culinary: Diana Perezlopez enjoys reimagining traditional family recipes—such as a roasted corn‑and‑poblanito pepper sauce layered over quinoa‑infused masa cakes—experimenting with fresh cilantro, lime,
    and smoked paprika, and alternates between cooking at home and sampling small‑plate menus at local farm‑to‑table bistros.
  core: Diana Perezlopez melds a disciplined radiology career with a restless artistic spirit, balancing meticulous work with watercolor‑filled evenings, mindful yoga, and a quietly persistent worry that
    nudges them toward both careful financial planning and occasional stress‑relief splurges.
background:
  cultural: Diana was raised in a Mexican‑American household in the Southwest, speaking both Spanish and English at home. Her family traditions—such as celebrating Día de los Muertos, preparing tamales
    for holidays, and participating in community quinceañeras—remain central to her identity. Living in Albuquerque has allowed her to blend Mexican heritage with the broader New Mexican cultural tapestry,
    which includes Native American influences and a vibrant Hispanic arts scene. Diana’s cultural values of familismo, respect for elders, and personalismo shape her compassionate patient care and her commitment
    to community involvement.
attributes:
  skills: '[''Radiographic imaging'', ''CT scan operation'', ''MRI operation'', ''Radiation safety and dose optimization'', ''Patient positioning'', ''Contrast administration'', ''Imaging equipment troubleshooting'',
    ''DICOM and PACS management'', ''Bilingual communication (English/Spanish)'', ''HIPAA compliance'', ''Quality assurance and image review'']'
  hobbies: '[''Painting'', ''Photography'', ''Reading historical non‑fiction'', ''Gardening'', ''Cooking Mexican cuisine'', ''Visiting art exhibitions'', ''Hiking in the Sandia Mountains'', ''Attending
    cultural festivals'', ''Yoga and meditation'']'
  career_goals: Diana aims to advance into a supervisory or educational role within the radiology department. She plans to become a lead technologist overseeing quality‑improvement projects and radiation‑safety
    initiatives, and to earn a certification as a radiology educator. Over the next few years she hopes to mentor junior staff, develop patient‑education materials about imaging procedures, and possibly
    teach part‑time at a community college. She is also interested in expanding her expertise in hybrid imaging such as PET/CT, and in establishing a support program for technologists coping with workplace
    stress.
