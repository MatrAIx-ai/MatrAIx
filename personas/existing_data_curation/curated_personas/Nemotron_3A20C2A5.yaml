  hobbies: '[''building block towers'', ''singing nursery rhymes'', ''picture book reading'', ''playground exploration'', ''finger painting'']'
  career_goals: At this stage, Victoria’s primary focus is on exploring her environment and gaining independence. She expresses a budding desire to help with simple household activities like putting away
    toys and handing items to a caregiver, hinting at future aspirations of caring for others. As she grows, she envisions a future where she can be a teacher or a veterinarian, driven by her love for animals
    and learning.
