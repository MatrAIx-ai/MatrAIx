  hobbies: '[''Gardening (vegetables and flowers)'', ''Knitting and quilting'', ''Senior dance club'', ''Church choir singing'', ''Playing bridge and other strategic card games'', ''Reading historical fiction'',
    ''Crossword puzzles'', ''Volunteering at the local historical museum'']'
  career_goals: Crystal aims to deepen her involvement in the local senior community by serving on the advisory board of the Murphysboro Community Center, where she can shape programs that promote intergenerational
    learning and health. She is determined to launch a small craft boutique that sells her quilts and offers workshops, turning her hobby into a modest source of income. Continuing her personal growth,
    she plans to complete a digital literacy course to stay connected with family and online senior networks, and she hopes to write a memoir that captures her life in the Midwest, preserving her family's
    stories for future generations.
