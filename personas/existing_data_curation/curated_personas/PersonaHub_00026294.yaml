persona_description: A cognitive scientist who is a pioneer in the field of cognitive psychology, particularly in the study of language and its structure, growth, and function. He has made significant contributions
  to the field and has developed a theory of language that provides a kind of unification and explanatory power beyond what was imagined even a decade ago. His research interests include the structure of
  cognitive systems and the determinants of their growth, and he is in a very small minority in the field.
