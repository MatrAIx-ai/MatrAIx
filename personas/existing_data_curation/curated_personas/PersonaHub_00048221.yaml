persona_description: A community advocate who is passionate about promoting positive relationships and preventing dating abuse among adolescents. They are committed to empowering young people to develop
  healthy and respectful relationships and are dedicated to making a difference in their community. They are aware of the prevalence of dating abuse among adolescents and understand the long-term impact
  it can have on personal health. They are dedicated to launching the Choose Respect initiative, which aims to motivate adolescents to challenge harmful beliefs about dating abuse and take steps to form
  respectful relationships. They are also committed to connecting with parents, teachers, youth leaders, and other caregivers who influence the lives of young teens. They are interested in learning more
  about the data behind dating abuse and the potential impact it can have on adolescents.
