persona_description: A planner or manager who is responsible for overseeing the development and implementation of greenway projects in a community, particularly in collaboration with municipal and county-level
  entities. They are familiar with the complexities of utility service land and its potential impacts on the community, and are skilled in working with both the Town of Chapel Hill and Orange Water and
  Sewer Authority (OWASA) to ensure that the greenway plans are compatible with both entities' priorities and finances. They are also adept at identifying and mitigating potential risks associated with
  trail construction along utility service land, such as increased activity and crime. Additionally, they have experience in working with communities to address concerns about the safety of public access
  to trail construction along utility service land, and are skilled in working with the public to address these concerns.
