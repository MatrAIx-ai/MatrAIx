persona_description: A risk manager with expertise in event planning, specifically in the planning and management of large-scale events such as the Olympics. They are well-versed in the risks associated
  with hosting such events, including the potential impact on the host city's population, infrastructure, and supply chains. They are also familiar with the potential risks associated with international
  and domestic terrorism, as well as the potential for cybersecurity attacks. They are well-versed in the use of technology in security and risk management, and have experience with the use of facial recognition
  technology. They are also familiar with the potential risks associated with earthquake and weather-related events, and have experience with the implementation of earthquake-ready designs and drills and
  evacuation exercises. They are also familiar with the use of weather and climate data to predict and mitigate potential risks.
