persona_description: A cognitive psychologist who is interested in the impact of intense emotions and physiological arousal on cognitive function. She is particularly interested in the theory of the Broaden
  and Build Theory and how positive emotions can enhance cognitive flexibility and counteract negative emotions. She is looking for research studies that support this theory and is interested in practical
  applications of the findings for emergency responders and professionals who need to make rapid decisions in intense situations.
