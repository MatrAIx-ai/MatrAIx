personas:
  professional: Patty Garrett, a 25‑year‑old home‑health supervisor in Missouri, merges meticulous staff scheduling, data‑driven care‑plan management, and calm conflict resolution to lead personal care
    aides, channeling their organized, reliable nature and quiet curiosity into continuous service quality improvements, and they constantly seek evidence‑based tweaks to protocols.
  sports: Patty Garrett enjoys low‑impact fitness, regularly walking the trails at Rock Bridge Memorial State Park and participating in the local Columbia Running Club’s early‑morning jogs, while cheering
    on the St. Louis Cardinals and Kansas City Chiefs during baseball and football seasons, and they prefer small‑group activities over gym crowds.
  arts: Patty Garrett finds creative solace in knitting scarves to folk melodies by Mumford & Sons, devouring contemporary fiction such as Sally Rooney’s 'Normal People,' and attending occasional local
    theater productions of classic plays by Tennessee Williams, and they often draw inspiration from these quiet, introspective experiences for their personal projects.
  travel: Patty Garrett prefers carefully planned road trips to national parks like the Ozarks and Yellowstone, balancing weekend getaways to nearby Columbia and Kansas City with a bucket‑list wish to explore
    the historic gardens of Kyoto, and they keep travel costs modest by staying in budget motels and using discount rail passes.
  culinary: Patty Garrett, an avid home gardener, cooks fresh zucchini noodles with heirloom tomatoes, basil, and goat cheese, perfects a rustic sourdough loaf using locally milled flour, and revels in
    experimenting with seasonal vegetable stews, while they occasionally indulge in artisanal cheese plates at local bistros.
  core: Patty Garrett is a methodical, quiet achiever who blends a love for data‑driven home‑care leadership with a penchant for solitary hobbies, occasional late‑night email checks, and a habit of over‑planning
    future garden harvests, and they never miss a chance to streamline a schedule.
background:
  cultural: Patty grew up in the Midwestern town of Columbia, Missouri, within a family of European (primarily German and Irish) ancestry. Her upbringing was shaped by the region’s values of reliability,
    modesty, and community involvement. She attended a local public high school and participated in church activities through a Methodist congregation, which reinforced a focus on service, hospitality,
    and collaborative problem‑solving. The blend of a quiet, close‑knit community and the presence of the University of Missouri exposed her to both traditional Midwestern culture and a broader spectrum
    of ideas, fostering an appreciation for both established practices and new perspectives.
attributes:
  skills: '[''Staff scheduling'', ''Care plan development'', ''Regulatory compliance'', ''Team training and mentorship'', ''Client communication'', ''First aid and CPR'', ''Conflict resolution'', ''Inventory
    management'', ''Electronic health record (EHR) utilization'', ''Time management'', ''Data-driven quality improvement'']'
  hobbies: '[''Reading (health & personal development)'', ''Gardening (vegetable and flower beds)'', ''Cooking & baking'', ''Knitting'', ''Nature walks/hiking'', ''Podcast listening (healthcare)'', ''Volunteer
    work at food bank'', ''Crossword puzzles'']'
  career_goals: Patty aims to deepen her expertise in healthcare management by completing an associate degree in Health Services Administration within the next two years and obtaining certifications as
    a Certified Nursing Assistant and later as a Certified Case Manager. She envisions moving into a care manager role where she can oversee multiple home‑health teams, introduce evidence‑based practices,
    and integrate technology to streamline scheduling and documentation. In the longer term, she hopes to launch her own person‑centered home‑care agency that emphasizes staff wellbeing and client dignity,
    while also advocating for policies that support frontline caregivers.
