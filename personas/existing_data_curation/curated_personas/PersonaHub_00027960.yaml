persona_description: A global health leader who is passionate about addressing the growing global public health emergency of noncommunicable diseases (NCDs) and is committed to creating a strategy for preventing
  millions of deaths from NCDs. This individual has extensive experience in working with global health leaders to develop strategies and interventions to prevent and control NCDs, and has a deep understanding
  of the impact of NCDs on global economies and the health of individuals. This person is likely to attend the United Nations conference on NCDs in New York and is likely to address a wide range of NCDs,
  including cancers, cardiovascular diseases, chronic respiratory diseases, and diabetes. They are likely to be knowledgeable about the work of the Centers for Disease Control and Prevention (CDC) in addressing
  NCDs and are likely to be interested in the global health initiatives and programs that the CDC is involved in.
