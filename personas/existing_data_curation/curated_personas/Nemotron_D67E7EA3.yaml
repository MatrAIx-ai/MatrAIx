personas:
  professional: Thunguyet Yang, an experienced carpenter specializing in structural framing and custom cabinetry, leverages meticulous project planning, assertive client negotiation, and a methodical safety‑first
    mindset to deliver high‑quality builds while mentoring apprentices toward master certification.
  sports: Thunguyet Yang enjoys seasonal cross‑country skiing and weekend hikes, follows the North Dakota State Bison football team, supports the Fargo‑Moorhead RedHawks baseball club, and participates
    in a local walking group that meets at the prairie trail each Saturday.
  arts: Thunguyet Yang, a woodworking enthusiast, draws creative inspiration from the intricate patterns of traditional folk art and the storytelling in historical novels by Amitav Ghosh, while also appreciating
    the music of Bob Dylan and the paintings of Claude Monet during quiet evenings.
  travel: Thunguyet Yang prefers thoughtful, low‑key travel, often planning weekend retreats to the tranquil dunes of Great Sand Dunes National Park, a culinary pilgrimage to the Mediterranean coast of
    Italy, and a yearly family visit to a lakeside cabin in the Upper Peninsula of Michigan, balancing nature immersion with modest budgeting.
  culinary: Thunguyet Yang crafts elaborate dishes such as herb‑infused fish stew with lemongrass and kaffir lime, spiced rice cakes flavored with galangal and cilantro, and aromatic braised vegetables,
    drawing on a modest garden of fresh herbs and a repertoire of cherished family recipes preserved for holidays and everyday meals.
  core: Thunguyet Yang blends a methodical carpenter’s precision with a passion for heritage cooking, mindful yoga, and a drive to mentor women artisans, all while navigating intense anxiety that fuels
    both meticulous planning and occasional bouts of overwork.
background:
  cultural: Thunguyet was born in Vietnam and immigrated to the United States as a teenager, bringing with her a deep respect for family, community, and craftsmanship. The influence of Vietnamese cultural
    values—such as reverence for elders, collective responsibility, and attention to detail—shapes both her personal life and professional ethos. She celebrates the Lunar New Year (Tet) with traditional
    foods, lanterns, and gatherings, and she keeps the Vietnamese language alive at home through occasional conversation and cultural storytelling. In West Fargo, she connects with a small but active Vietnamese
    diaspora, attending events at the local Buddhist temple and participating in cultural festivals. Her heritage inspires her woodworking designs, which often incorporate subtle motifs like lotus blossoms
    or bamboo patterns, reflecting a blend of her Southeast Asian roots and the pragmatic, structured lifestyle she has built in the American Midwest.
