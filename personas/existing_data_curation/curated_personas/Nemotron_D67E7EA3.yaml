  hobbies: '[''Vietnamese Cooking'', ''Gardening'', ''Yoga and Meditation'', ''Nature Walks'', ''Artistic Woodworking'', ''Reading Historical Fiction'', ''Community Volunteering'', ''Teaching Woodworking
    to Youth'']'
  career_goals: Thunguyet aims to attain master carpenter certification within the next two years, solidifying her credibility in the regional construction market. She plans to expand her solo practice
    into a small boutique woodworking studio that blends contemporary design with traditional Southeast Asian motifs, eventually hiring a crew of skilled women artisans. Long‑term, she hopes to develop
    a mentorship program for underrepresented tradespeople and secure a part‑time teaching position at the local community college to share her expertise. Financial stability and the ability to weather
    her occasional anxiety are central to her ambition, so she intends to diversify income streams through custom furniture sales, repair contracts, and community workshops.
