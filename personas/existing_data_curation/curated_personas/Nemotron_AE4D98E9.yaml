  career_goals: At ten years old, William imagines a future where he can combine his desire to help others with his love for organized, collaborative environments. He hopes to become a teacher or a school
    counselor, roles that let him guide younger students, maintain a harmonious classroom, and foster supportive relationships. In the short term, he aims to join the student council, lead class projects,
    and earn the role of class monitor. He also dreams of eventually serving as a community firefighter or EMT, attracted by the structured training and the chance to provide direct assistance in emergencies.
