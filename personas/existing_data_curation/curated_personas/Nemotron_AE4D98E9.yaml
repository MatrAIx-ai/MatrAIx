personas:
  professional: William Head, a ten-year-old aspiring programmer and budding dramatist, channels their love for clear rules and teamwork into building step‑by‑step LEGO models, leading school drama rehearsals,
    and creating simple Scratch games, showing early signs of a future tech‑savvy creative leader.
  sports: William Head, a ten-year-old soccer enthusiast, plays forward for the local youth league, idolizes the nearby professional team LAFC, and after matches trades baseball cards with teammates while
    cheering for the Los Angeles Dodgers, and they love the structured drills that mirror their preference for clear rules.
  arts: William Head, a ten-year-old drama club member, loves performing scenes from The Lion King, listens to piano performances by Lindsey Stirling, reads adventure comics like Spider‑Man and Adventure
    Time, and they proudly display their collection of illustrated baseball cards, weaving storytelling into every creative outlet.
  travel: William Head, a ten-year-old dreamer inspired by adventure novels, yearns to visit the LEGO House in Billund, Denmark, and Disneyland in Anaheim, prefers family‑planned itineraries that balance
    scheduled tours with free play, and they often sketch travel routes on graph paper before trips.
  culinary: William Head, a ten-year-old who favors pepperoni pizza with extra mozzarella, enjoys assembling their own mini veggie pizza with bell peppers and olives, delights in snacking on gummy bears
    and chocolate chip cookies after soccer practice, and they sometimes sneak a bite of the cheese before the pizza is baked.
  core: William Head, a ten-year-old whose structured LEGO building, lively drama performances, and generous volunteer work reveal a quirky blend of predictability, charisma, and compassion, and they often
    surprise friends with spontaneous jokes during group activities.
background:
  cultural: William grows up in Bethel, a small community in Berks County, Pennsylvania, where a blend of rural American and Pennsylvania Dutch heritage shapes daily life. His family participates in local
    traditions such as the annual county fair, Fourth of July parades, and church gatherings, emphasizing community cooperation and modesty. The local public elementary school promotes a close-knit atmosphere,
    and many families, including William's, value punctuality, hard work, and respectful behavior. Exposure to the region's historic farms, community sports leagues, and volunteer service projects reinforces
    his sense of responsibility and his desire to maintain harmony within his neighborhood.
