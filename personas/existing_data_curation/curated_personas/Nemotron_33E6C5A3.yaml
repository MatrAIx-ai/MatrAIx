personas:
  professional: Michael Wells is a high‑school senior who blends his methodical problem‑solving skills with hands‑on expertise—regularly repairing cars, assembling wooden projects from step‑by‑step guides,
    and systematically organizing his church youth choir’s schedules—and they demonstrate the reliable, organized mindset that points toward a future trade apprenticeship in electrical or automotive work.
  sports: Michael Wells spends Saturday afternoons shooting hoops at the neighborhood court, leads drills for younger teammates, tracks the NBA’s Los Angeles Lakers and follows the college basketball program
    of the local high school, and they are a registered member of the community youth basketball league, using structured practice to channel their love of routine and teamwork.
  arts: Michael Wells infuses their day with contemporary R&B hits from H.E.R. and Chris Brown alongside classic soul tracks by Marvin Gaye and Stevie Wonder, and they lend their voice to the church’s youth
    choir, where they balance communal harmony with personal reflection through music.
  travel: Michael Wells dreams of road‑tripping to the Great Smoky Mountains National Park and visiting Washington, D.C.’s museums during a school break, while they also hope to explore an international
    destination like London once they can afford the airfare, preferring itineraries that mix structured sightseeing with flexible downtime for spontaneous gaming sessions at hostel lounges.
  culinary: Michael Wells helps prepare traditional Southern meals such as fried chicken, collard greens, cornbread, and shrimp and grits, and they enjoy mastering the precise timing of each dish, often
    seasoning with a dash of hot sauce and a pinch of smoked paprika, while their cooking skill sits at an enthusiastic amateur level, preferring hands‑on guidance from family elders.
  core: Michael Wells is a structured‑minded 17‑year‑old who blends hands‑on practicality with a love for organized teamwork, juggling basketball drills, woodwork, choir harmony, and meticulous savings
    plans—and they occasionally over‑plan, losing track of spontaneity.
background:
  cultural: Michael grew up in Greenville, a small town in Meriwether County, Georgia, where his family and neighbors share a close‑knit African‑American community rooted in Southern traditions. The local
    church has been a central gathering place, shaping his values of mutual support, respect for elders, and communal celebration through music and potlucks. He is familiar with the regional history of
    civil‑rights activism and hears stories of resilience from older relatives, which inform his sense of identity and responsibility. The cultural rhythm of Sunday sermons, family barbecues, and seasonal
    festivals blends with modern influences from hip‑hop and digital media, giving Michael a balanced perspective that honors his heritage while embracing contemporary trends.
attributes:
  skills: '[''Basic automotive maintenance'', ''Carpentry and small‑scale woodworking'', ''Computer troubleshooting and network setup'', ''Organizational planning and schedule management'', ''Team communication
    and conflict mediation'', ''Fundamental math and practical reading skills'']'
  hobbies: '[''Basketball (playing and coaching)'', ''Woodworking and DIY projects'', ''Strategy video gaming (Minecraft, Civilization)'', ''Listening to R&B and soul music'', ''Participating in church
    youth choir'', ''Cooking Southern family recipes'']'
  career_goals: Michael aims to complete his high school education (or obtain a GED) and then enter a trade apprenticeship, ideally in electrical work or automotive technology, fields that offer clear structures,
    predictable career pathways, and the chance to apply his hands‑on skills. He sees the trade route as a way to secure a stable income and eventually support his family financially. In the longer term,
    Michael hopes to become a certified electrician or mechanic, obtain a supervisory role, and perhaps mentor younger teens in his community, using his reliability and organized mindset to guide them toward
    practical careers. He also keeps open the possibility of serving in the U.S. Army, attracted by the regimented environment and opportunities for technical training.
