  career_goals: Samuel is drawn to careers that allow him to solve real‑world problems while serving his community. He hopes to pursue high‑school STEM programs and eventually study civil engineering, aiming
    to design safe, functional spaces. He also entertains the idea of becoming a firefighter, attracted by the structured training, teamwork, and opportunity to help others. His short‑term goal is to maintain
    strong grades and participate in his school's robotics club to build relevant experience.
