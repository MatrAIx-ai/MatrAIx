personas:
  professional: Samuel Cessna, an aspiring civil engineer in middle school, channels a love for orderly LEGO constructions into early coding projects on Scratch, using their practical mindset and teamwork
    skills from community soccer to design simple, rule‑based games that reflect real‑world structures.
  sports: Samuel Cessna, a dedicated midfielder for the Marietta Youth Soccer League, follows Atlanta United FC for inspiration, attends Saturday practices at the local YMCA, and balances fitness with occasional
    basketball pick‑up games at school, while proudly wearing the team's green and black jersey.
  arts: Samuel Cessna, a budding pianist who practices daily after homework, enjoys reading the Percy Jackson series, and attends the Marietta Middle School band concerts, they also appreciate classic country
    storytelling from Dolly Parton alongside contemporary pop hits from Taylor Swift.
  travel: Samuel Cessna, who has taken family road trips to Tybee Island and a week‑long visit to Washington, D.C., dreams of exploring the Grand Canyon and Disney World, preferring organized itineraries
    with scheduled museum stops but also leaving room for spontaneous ice‑cream breaks.
  culinary: Samuel Cessna, a fan of Southern comfort foods, loves homemade mac and cheese, peach cobbler, and crisp fried chicken, they can reliably make a perfect grilled cheese sandwich and enjoy experimenting
    with fresh basil on their occasional pizza night.
  core: Samuel Cessna, a meticulous LEGO‑loving middle‑schooler who balances disciplined schoolwork, soccer, and piano practice with community events, often juggling structured projects while succumbing
    to snack‑driven procrastination.
background:
  cultural: Samuel grew up in Marietta, a suburban city in Cobb County, Georgia. His family is part of a predominantly white, middle‑class community that values Southern hospitality, close family ties,
    and community involvement. He attends a public middle school where school spirit, football games, and school bands are prominent. The family regularly participates in church activities and local events
    such as the Marietta Street Festival and county fairs, exposing Samuel to traditional Southern foods, music, and a strong sense of community service. These cultural influences have shaped his courteous
    demeanor, appreciation for teamwork, and desire to contribute positively to his neighborhood.
