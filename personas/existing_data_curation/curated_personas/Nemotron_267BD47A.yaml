  career_goals: Lynn envisions a future where she can blend her curiosity and practicality by helping others. She aspires to pursue a career in education—such as teaching or school counseling—so she can
    create supportive, inclusive learning environments. She is also drawn to community work, dreaming of organizing youth programs or volunteering with local nonprofits. In the long term, she hopes to study
    psychology or social work in college to deepen her understanding of emotional wellbeing and support peers facing anxiety or sadness.
