personas:
  professional: Jean Larry, a budding preschool storyteller who loves leading circle‑time songs and coordinating play, already shows emerging skills in rhythmic clapping, vivid narration, and simple organization,
    channeling their comfort as the center of attention toward a future as an early‑child educator or community storyteller.
  sports: Jean Larry, a fan of the New York Yankees and a tiny member of the Hudson County Little‑League soccer team, spends Saturday mornings kicking a ball at the local park, cheers on the New York Knicks
    on TV, and often loses track of time, forgetting to bring a water bottle.
  arts: Jean Larry, a budding dancer who mimics the moves of Bob Marley’s “Could You Be Loved” and sings along to children’s reggae albums, loves watching live storytelling at community festivals, frequently
    draws colorful pictures of tropical birds and sunsets, and idolizes artists like Ziggy Marley and Mo Willems.
  travel: Jean Larry, who visited Jamaica’s sandy beaches during a family vacation and adored the sweet taste of tropical fruits, dreams of exploring the Statue of Liberty and the LEGO Store in New York
    City, prefers trips with a tight itinerary yet delights in spontaneous beach picnics, and often asks Mom for a passport sticker for each new destination.
  culinary: Jean Larry, who delights in the sweet flavor of sweet potato pie and the crispy crunch of fried plantains at family gatherings, loves to help stir batter for banana pancakes, can name butter,
    sugar, and nutmeg as key ingredients, and keeps a secret stash of gummy bears for snack time.
  core: Jean Larry is a vivacious four‑year‑old whose love for rhythm, storytelling, and community shines through playful leadership, impulsive spending, vigilant allergy care, energetic sports play, vibrant
    artistic expression, adventurous travel dreams, and a budding culinary curiosity.
background:
  cultural: Jean comes from a Black family with Caribbean roots, drawing on traditions from Jamaica and the broader African diaspora. At home, she hears stories and songs in English and occasional Creole
    phrases, celebrates Juneteenth and Kwanzaa with family gatherings, and enjoys foods like collard greens, fried plantains, and sweet potato pies. The family participates in the local community church
    and attends multicultural festivals in Hudson County, where they share music, dance, and cultural art with neighbors of diverse backgrounds. These experiences shape her love for rhythm, storytelling,
    and community connection.
attributes:
  skills: '[''verbal storytelling'', ''basic counting and number recognition'', ''color and shape identification'', ''fine motor drawing and puzzle solving'', ''following structured routines'', ''adaptable
    spontaneous play'', ''leadership in group activities'', ''cooperative sharing'']'
  hobbies: '[''drawing and coloring'', ''building with blocks'', ''singing'', ''dancing to music'', ''library storytime'', ''pretend classroom play'', ''playing at the park'', ''helping in the kitchen'']'
  career_goals: Jean dreams of being the 'teacher' during her pretend‑classroom games, guiding friends and organizing storytime sessions. She also loves dancing and singing, often imagining herself on a
    stage or as a TV host who talks to other children. These early ambitions blend her desire for structure (organizing a classroom) with her love of spontaneous performance and social interaction.
