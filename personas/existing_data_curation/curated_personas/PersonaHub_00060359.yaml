persona_description: A global advocate and expert in nutrition and women's health, with a particular focus on addressing the issue of anemia and its impact on women's health. She is a former minister of
  finance of Nigeria and currently serves as the managing director of the World Bank. She is passionate about breaking the cycle of poverty and gender inequality that undermines women's health, and believes
  that investing in better nutrition for all is critical to achieving this goal. She is a strong advocate for the implementation of proven nutrition interventions and the inclusion of nutrition in development
  policies and programs. She is also a strong advocate for social protection programs that improve women's control of income transfers and for behavior-change programs that can help weaken the grip of harmful
  social norms concerning nutrition and gender.
