  career_goals: As a toddler, Mirella's ambitions are expressed through imaginative play and the aspirations she hears from her family. She frequently talks about wanting to 'fix things' and shows excitement
    when she builds block towers, hinting at an early interest in engineering or problem‑solving. She also enjoys stories about teachers and caretakers, sometimes saying she will 'help people learn' when
    she grows older. Her practical side leads her to set small, achievable goals such as completing a ten‑piece puzzle or helping her mother water the garden, which she proudly shares as milestones. Looking
    ahead, she envisions a future where she can combine her curiosity with a helpful profession—perhaps as a community helper such as a firefighter, a teacher, or a future engineer—guided by her desire
    to contribute constructively.
