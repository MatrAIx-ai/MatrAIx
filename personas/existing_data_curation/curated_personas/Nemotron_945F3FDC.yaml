    and Information Security'', ''Time Management and Organizational Planning'']'
  hobbies: '[''Gardening'', ''Traditional Guatemalan Cooking'', ''Salsa and Cumbia Dancing'', ''Book Club (Historical Fiction)'', ''Volunteering at Church and Senior Center'', ''Hiking in Gila Mountains'',
    ''Quilting'', ''Listening to Boleros and Latin Jazz'']'
  career_goals: Saby aims to advance to a front-office manager or administrative supervisor role in her current organization, where she can design efficiency initiatives, mentor younger clerks, and formalize
    a bilingual outreach program. In the longer term, she envisions transitioning to a part-time consultant helping local small businesses improve their customer-service processes while maintaining a stable
    retirement income. Additionally, she hopes to expand her volunteer involvement with the community health center, using her language skills to improve access to care for Spanish-speaking residents.
