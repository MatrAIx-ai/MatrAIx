persona_description: A scientist or researcher who is interested in the study of natural resources, particularly oil and gas, and is involved in determining the date and impact of the peak and decline of
  their production due to resource constraints. They are likely to be familiar with the term "peak oil" and have an interest in understanding the potential consequences of its depletion. They may also have
  a background in economics or environmental studies and be interested in the broader implications of the depletion of oil resources for the global economy and the environment.
