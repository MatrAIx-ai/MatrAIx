  career_goals: Although officially retired, Mark is driven to leave a lasting positive impact on his community in Mascot, TN. He aims to spearhead the revitalization of the town’s historic park, create
    a mentorship program linking senior volunteers with high‑school students interested in trades, and compile a locally focused family history book that preserves regional stories for future generations.
    His ambition balances his competitive spirit—he wants the park project to be recognized at the county level—with his practical desire to give tangible, lasting service.
