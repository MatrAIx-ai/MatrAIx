  hobbies: '[''home cooking (Spanish cuisine)'', ''urban herb gardening'', ''hiking in Marin County'', ''yoga and mindfulness practice'', ''reading scientific journals and historical non‑fiction'', ''photographing
    food plating for a personal blog'', ''small‑group wine tasting with close friends'', ''learning Python for data analysis'', ''volunteering at a local food bank'', ''participating in small‑group Spanish
    folk dancing'']'
  career_goals: Shino aims to advance from managing a single establishment to overseeing multiple locations as a regional operations director within the next five years. She plans to develop a standardized
    operational framework that can be adapted across diverse venues while preserving the reliability she values. Long‑term, she envisions launching her own restaurant concept that blends sustainable, locally
    sourced ingredients with traditional Spanish flavors, positioning herself as a leader in responsible hospitality. She also hopes to mentor emerging female managers in the industry, fostering a supportive
    network that reflects her cooperative yet assertive approach.
