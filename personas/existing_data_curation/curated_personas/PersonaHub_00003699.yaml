persona_description: A research psychiatrist who specializes in the study of bipolar disorder and substance use disorders, particularly in the development and risk factors of substance use disorders in
  individuals with bipolar disorder. They are interested in exploring the complex interplay between bipolar disorder and substance use, and how these conditions interact to affect the development of substance
  use disorders in teens. They have a keen interest in understanding the specific risk factors that increase the likelihood of a substance use disorder in bipolar teens, as well as the impact of lithium
  treatment on the likelihood of developing substance-related issues.
