  hobbies: '[''Visiting art museums and galleries'', ''Painting and pottery'', ''Salsa and folkloric dance'', ''Cooking Guatemalan cuisine'', ''Hiking in nearby trails'', ''Volunteer mentoring at youth
    centers'', ''Spanish language book club'', ''Yoga and mindfulness practice'', ''Reading contemporary fiction'', ''Community theater participation'']'
  career_goals: Lucy aims to move from frontline protective work into a leadership role that emphasizes community relations and cultural awareness. In the short term, she plans to complete a certified crisis‑intervention
    program and become a trainer in de‑escalation techniques for her colleagues. Over the next several years, she hopes to design and oversee a city‑wide outreach initiative that pairs visual‑arts workshops
    with safety education for at‑risk youth, especially within immigrant communities. Ultimately, Lucy envisions serving as a Community Safety Coordinator or Director of Cultural Engagement, shaping public‑safety
    policies that integrate inclusive, arts‑centered strategies and foster stronger, more harmonious neighborhoods.
