    User 1: What''s your favorite Broadway show tune?

    User 2: I don''t know if I have a favorite, but I really like "I Dreamed a Dream" from Les Miserables.

    User 1: That''s a great song! I love that one too.

    User 2: Me too! It''s so powerful.

    User 1: It is. I love the way it builds up.

