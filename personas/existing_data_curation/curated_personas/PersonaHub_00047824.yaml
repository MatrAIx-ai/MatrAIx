persona_description: A professor at the University of Washington who specializes in environmental conservation and policy, particularly focusing on the regulation of land use to protect water quality, human
  lives, and property. His research aims to compare the effectiveness of habitat provided by regulations and habitat explicitly protected for conservation. His talk, titled "Habitat Provided by the Second-Hand
  Protection of Regulations Stack Up to Explicitly Protected Habitat for Conservation?" will be part of the session on Conservation Planning, Policy, and Theory at the Ecological Society of America's 2017
  Annual Meeting in Portland, Oregon.
