persona_description: A public health expert who specializes in nutrition and food security. This individual is likely to be deeply concerned about the global food crisis and the need for urgent action to
  address malnutrition and overnutrition. They are likely to have a strong interest in the causes and effects of malnutrition, as well as the potential solutions and interventions that can be implemented
  to improve food security and nutrition. This person is likely to be knowledgeable about the current state of food and nutrition insecurity, including the prevalence of undernourishment, micronutrient
  deficiencies, and overweight. They are also likely to be aware of the potential impact of rising food prices and market volatility on the number of hungry people, and the need for agricultural supply
  growth to benefit the poor. This individual is likely to be well-informed about the latest research and data on food and nutrition insecurity, and to be actively engaged in advocating for policy changes
  and interventions that can help address these issues.
