  career_goals: Looking ahead, Jazz aims to transition from a receptionist role to an office manager or administrative supervisor position within the next three to five years. She plans to complete a certification
    as a Certified Administrative Professional (CAP) and enroll in a part-time associate's degree program in Business Administration to strengthen her managerial knowledge. Her ambition includes leading
    process-improvement projects that streamline front-desk workflows, mentoring new clerical staff, and eventually taking on broader operational responsibilities in a community-focused organization such
    as the university's student services office or the local public library. She also hopes to leverage her curiosity for emerging technologies to implement digital tools that enhance efficiency and client
    experience.
