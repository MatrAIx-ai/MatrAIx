personas:
  professional: Jazz Tarantine, a seasoned front‑desk specialist at the Champaign public library, leverages their methodical organization, calm conflict‑resolution style, and curiosity for emerging office‑software
    trends, and they use these strengths to streamline visitor services, mentor new clerical staff, and pilot digital tools that improve client experience.
  sports: Jazz Tarantine enjoys weekend hikes with the Illinois Trail Club, follows the University of Illinois Fighting Illini basketball and the Chicago Cubs, and they maintain a steady yoga practice that
    balances the physical demands of a busy front‑desk schedule.
  arts: Jazz Tarantine immerses themselves in Champaign’s vibrant arts scene, attending Krannert Center performances of Philip Glass, listening to indie folk duo The Milk Carton Kids, and reading mystery
    novels by Tana French, which together fuel their creative curiosity after work, and they often discuss these experiences with friends over coffee.
  travel: Jazz Tarantine favors weekend road trips to the Shawnee National Forest and plans longer escapes to Kyoto’s historic temples and the Canadian Rockies, balancing meticulous itineraries with spontaneous
    local food explorations, and they savor the cultural contrasts they encounter on each journey.
  culinary: Jazz Tarantine, a confident home cook, experiments with recipes that fuse Midwestern comfort foods—such as buttermilk fried chicken and apple pie—with global flavors like gochujang glaze and
    cardamom‑spiced custard, often featuring fresh rosemary, kimchi, and sweet corn in their dishes, and they love sharing their creations at community potlucks.
  core: Jazz Tarantine blends organized efficiency with creative curiosity, juggling front‑desk duties, yoga mats, and experimental cooking while they occasionally neglect to water the community garden’s
    tomatoes during a busy week.
background:
  cultural: Jazz grew up in a middle-class, predominantly white suburb of central Illinois, where Midwestern values of politeness, reliability, and community involvement were emphasized. Her family placed
    a strong emphasis on education and hard work; her parents were teachers who encouraged curiosity and practical problem-solving. Living in Champaign, a university town, she has been exposed to a diverse
    mix of cultures and ideas, which has shaped her appreciation for both new perspectives and established traditions. Her cultural upbringing blends the modest, cooperative spirit of the Midwest with an
    openness to the broader academic and cultural experiences offered by the campus environment.
