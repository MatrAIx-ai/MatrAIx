personas:
  professional: Mandi Cura is an aspiring robotics engineer who seamlessly blends a love for building complex LEGO sets, solving analytical puzzles, and coding in their school’s robotics club with a methodical,
    organized mindset that drives them to lead team projects and document each iteration in a meticulous journal, though their perfectionist streak occasionally makes them linger on minor details, delaying
    final submissions.
  sports: Mandi Cura enjoys hiking the Finger Lakes trails with their family and participates in the school’s cross‑country team, cheering on the Rochester Red Wings and the Buffalo Bills, yet prefers solo
    cardio like jogging over team sports and occasionally skips group practices in favor of solitary training, while maintaining a disciplined routine of stretching and light strength training three times
    a week.
  arts: Mandi Cura captures nature scenes in sketchbooks during hikes, practices piano pieces by Beethoven and Debussy nightly, and finds inspiration in the watercolor works of Winslow Homer and the storytelling
    of Agatha Christie mystery novels, occasionally attending local community theater productions to broaden their artistic palate, though they can be overly critical of their own sketches, often redrawing
    a scene multiple times before feeling satisfied.
  travel: Mandi Cura plans trips with a detailed itinerary, favoring nature‑focused destinations such as Niagara Falls, Acadia National Park, and a school‑organized visit to Washington, D.C., balancing
    a love for learning with budget constraints by using a family‑shared travel fund and saving any extra allowance for future adventures, yet they sometimes overpack, cramming too many books and sketch
    supplies into a single suitcase.
  culinary: Mandi Cura tends a small herb garden of basil, thyme, and rosemary, which they incorporate into simple dishes like pesto pasta, fresh caprese salads, and herb‑infused lemon water, and while
    they are still learning to sauté, they proudly serve family‑style meals using fresh ingredients, though they occasionally forget to turn off the stove after experimenting with new recipes, prompting
    a quick check to avoid kitchen mishaps.
  core: Mandi Cura is a methodical, curiosity‑driven teen who seamlessly merges a love for robotics, puzzles, and nature sketching with disciplined budgeting, proactive health habits, and a quiet confidence
    that fuels their solitary yet collaborative pursuits, all while battling a perfectionist tendency that sometimes slows them down.
background:
  cultural: Mandi comes from a white, middle‑class family in Rochester, New York, where community involvement and education are highly valued. The city's rich history of social reform and its vibrant cultural
    institutions, such as the Rochester Public Library and local museums, have fostered her appreciation for learning and civic responsibility. Her family celebrates traditional American holidays and encourages
    outdoor activities tied to the upstate New York lifestyle, like hiking around the Finger Lakes. These regional influences, combined with her family's emphasis on disciplined study and modest, practical
    living, shape her cultural outlook.
