  career_goals: Mandi aspires to a career that blends her curiosity about how things work with practical problem‑solving. She is drawn to biomedical engineering, hoping to design medical devices that improve
    children's health. She intends to attend a STEM‑focused high school, pursue an undergraduate degree in engineering, and eventually work in research and development at a hospital or technology firm.
    Her long‑term ambition includes mentoring younger students, encouraging them to combine creativity with disciplined study.
