  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading historical fiction and local history'', ''Book club'', ''Bridge and bingo'', ''Listening to classic radio dramas and gospel music'', ''Gentle
    yoga'', ''Walking in nature'', ''Church attendance'']'
  career_goals: Although Sandra is 84 and retired from formal work, she remains driven by a desire to stay useful and engaged. Her primary ambition is to continue volunteering at the senior center, mentoring
    newer volunteers and helping to organize wellness workshops. She hopes to document her family’s stories and the local history of Bedford County in a memoir that she can share with her descendants. Maintaining
    her health and independence is also a key goal, so she plans to keep up with her daily walks, gentle yoga, and regular medical check‑ups. Sandra also wishes to support community initiatives that improve
    accessibility for seniors, such as advocating for better transportation options and age‑friendly public spaces.
