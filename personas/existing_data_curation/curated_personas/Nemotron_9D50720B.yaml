  career_goals: William aims to move from his current surveillance officer role into a supervisory position, eventually becoming the security manager of the casino. He plans to earn the Certified Protection
    Officer (CPO) credential and deepen his expertise in AI-driven surveillance solutions. Over the next five years, he hopes to lead a specialized threat-analysis team, mentor junior guards, and explore
    opportunities in private security consulting that would let him use his competitive edge to improve safety protocols for regional businesses. He also wants to achieve greater financial stability for
    his family, purchase a larger home in Harrison County, and possibly start a side venture offering security-system installations for small-scale enterprises.
