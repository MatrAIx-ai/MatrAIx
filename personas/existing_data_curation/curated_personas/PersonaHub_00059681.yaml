persona_description: A scientist who is interested in understanding the behavior of materials and the energy required to extract them, particularly in the context of the second law of thermodynamics. They
  are likely to be familiar with the CRC Handbook of Chemistry and Physics and the Ehrlich-Simon bet. They may have expertise in mineral processing and extraction, and are interested in the economic implications
  of these processes. They may also be interested in the potential for refrigeration and the use of heat reservoirs to reduce energy costs.
