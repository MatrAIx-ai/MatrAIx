  hobbies: '[''Reading contemporary fiction'', ''Visiting art galleries and museums'', ''Practicing Vietnamese calligraphy'', ''Cooking traditional Vietnamese cuisine'', ''Gardening'', ''Hiking in state
    parks'', ''Yoga and meditation'', ''Volunteering for financial literacy workshops'', ''Listening to podcasts on finance and culture'', ''Traveling to culturally significant destinations'']'
  career_goals: Phuong aims to advance into a senior leadership role—such as Finance Director or Chief Financial Officer—where she can steer organizational strategy toward sustainable and socially responsible
    investing. She is eager to obtain the CFA designation to deepen her expertise in ESG finance and to spearhead a community‑focused financial literacy program in Alachua County. Long‑term, she envisions
    launching a boutique consulting practice that blends financial stewardship with support for local artists and cultural initiatives, leveraging her curiosity for new ideas and her compassionate drive
    to help others achieve financial harmony.
