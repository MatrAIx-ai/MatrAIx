personas:
  professional: Phuong Ngo, a seasoned financial specialist adept at corporate finance, risk assessment, and ESG integration, channels meticulous analytical expertise and a compassionate, collaborative
    demeanor to craft detailed financial models and steer senior leadership toward sustainable, socially responsible strategies.
  sports: Phuong Ngo enjoys low‑impact fitness, joining the Gainesville Runners club for weekend trail runs, cheering on the Jacksonville Jaguars in football season, supporting the Orlando Magic during
    the NBA playoffs, and regularly hikes the Ocala National Forest springs to stay balanced.
  arts: Phuong Ngo, who finds solace in contemporary fiction by Sally Rooney and poetry by Ocean Vuong, frequents the Florida Museum of Natural History’s rotating exhibitions, practices traditional calligraphy
    as a meditative art, and draws inspiration from the avant‑garde installations of Ai Weiwei and the vibrant pop patterns of Yayoi Kusama.
  travel: Phuong Ngo prefers thoughtfully planned trips that blend nature and culture, having hiked the Shenandoah Valley in Virginia, visited the lantern‑lit streets of Kyoto during Tet, absorbed the jazz
    heritage of New Orleans, and dreaming of a sustainable retreat in Bali’s rice paddies while balancing family obligations and a moderate travel budget.
  culinary: Phuong Ngo, a confident home cook, delights in simmering aromatic phở broth with star anise and fish sauce, rolling bánh chưng for Tet celebrations, and experimenting with fresh basil, lemongrass,
    and shrimp in a Mediterranean‑inspired spring roll that showcases a love for bold, balanced flavors.
  core: Phuong Ngo navigates life with a quiet curiosity, often found sipping jasmine tea while fine‑tuning spreadsheets to the last decimal, habitually meditating at sunrise, and occasionally indulging
    in a guilty‑pleasure binge of true‑crime podcasts late into the night.
background:
  cultural: Phuong is a second‑generation Vietnamese American whose family immigrated to the United States in the early 1980s. Raised in a bilingual household in Florida, she grew up balancing the collectivist
    values of her heritage—emphasis on family, community harmony, and respect for elders—with the individualistic ethos of American society. Her cultural identity is expressed through celebrating Tet, participating
    in the local Vietnamese Buddhist temple, and preserving culinary traditions. These roots instill a strong sense of compassion and cooperation, shaping her professional ethos of helping others and fostering
    inclusive environments. Living in Gainesville, she engages with both the broader multicultural community and the close‑knit Vietnamese diaspora, drawing inspiration from the region's natural beauty
    and artistic vibrancy.
attributes:
  skills: '[''Financial analysis'', ''Risk assessment'', ''Investment portfolio management'', ''Budgeting and forecasting'', ''Financial modeling (Excel, VBA)'', ''Regulatory compliance'', ''Data analytics
