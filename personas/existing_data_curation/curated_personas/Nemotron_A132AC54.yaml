    Photography"]'
  career_goals: Although retired, Marcus aims to pass on his knowledge through mentorship and volunteer work as a trail guide in the Boundary Waters. He hopes to contribute to local heritage preservation
    by helping the Ely Historical Society document logging history, and to write a memoir chronicling the Northwoods lifestyle. He also plans to expand his modest woodworking business, creating custom pieces
    for fellow retirees, and to learn basic digital photography to capture the region’s seasonal beauty while maintaining his physical health and resilience.
