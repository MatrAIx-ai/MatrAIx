personas:
  professional: Bret Haggins is a seasoned construction laborer on Dallas-Fort Worth sites, whose practical skill set with hand and power tools, formwork assembly, and forklift operation is complemented
    by a strict adherence to routine safety protocols, making them a natural candidate for a foreman role as they work toward OSHA 30-hour certification, a forklift license, and a GED.
  sports: Bret Haggins is a devoted Dallas Cowboys fan who watches every NFL game with their spouse, plays pickup basketball with the local DFW Rec League, fishes early mornings at Lake Grapevine, and occasionally
    roots for the Dallas Mavericks during the NBA season, all while maintaining a modest gym routine of weight-lifting in their garage.
  arts: Bret Haggins immerses themselves in gospel and classic R&B, regularly playing records by Mahalia Jackson, Aretha Franklin, and Marvin Gaye while working, attending monthly church choir events, and
    catching live blues performances at Deep Ellum venues, which feed their love of soulful storytelling.
  travel: Bret Haggins prefers well-planned road trips in their pickup, charting routes that include fishing spots like Lake Texoma, historic hill-country towns such as Fredericksburg, and family-friendly
    state parks, while dreaming of a culinary and musical pilgrimage to New Orleans, though budget constraints keep most adventures within a day's drive.
  culinary: Bret Haggins takes pride in mastering the grill, seasoning ribs and brisket with a homemade rub of smoked paprika, brown sugar, garlic, and black pepper, smoking them over hickory chips while
    serving coleslaw and baked beans, yet they sometimes over-smoke the meat by forgetting to rotate the grill during long cooks.
  core: Bret Haggins blends a routine-driven work ethic, competitive ambition, and a love for grilling, gospel music, and Cowboys football, balancing practical reliability with occasional stubbornness and
    a penchant for hands-on projects.
background:
  cultural: Bret grew up as an African American in the Dallas‑Fort Worth metroplex, where community, family, and church have been central pillars of his upbringing. The Southern Texas culture has shaped
    his love for hearty home‑cooked meals, especially BBQ and soul food, and his appreciation for local traditions like Juneteenth celebrations and neighborhood block parties. Growing up in a working‑class
    neighborhood taught him the value of hard work, reliability, and mutual support among neighbors. His faith community provides a strong social network and a platform for volunteering, reinforcing his
    sense of responsibility and cultural pride.
attributes:
  skills: '["Manual material handling", "Hand tool operation", "Power tool operation", "Basic concrete mixing and pouring", "Formwork setup and removal", "Scaffold assembly and dismantling", "Site safety
    compliance (OSHA)", "Basic blueprint reading", "Measuring and layout with tape and laser levels", "Material inventory management", "Team collaboration on construction sites", "Time management and task
    prioritization", "Physical stamina for heavy lifting", "Minor equipment troubleshooting", "Operation of small heavy machinery (forklift, skid‑steer)", "Demolition and debris removal", "Site cleanup
    and waste disposal", "Knowledge of building codes and regulations", "Effective communication with foremen and subcontractors"]'
  hobbies: '["DIY home repairs", "Truck and small engine maintenance", "Fishing at local lakes", "Barbecue cooking and grilling", "Watching Dallas Cowboys football games", "Listening to gospel and classic
    R&B music", "Participating in church community events", "Playing card games with friends", "Casual basketball pick‑up games", "Jogging or short runs for fitness"]'
  career_goals: Bret aims to move from laborer to a supervisory role such as foreman within the next five years. He plans to earn an OSHA 30‑hour certification, a forklift operator license, and eventually
    complete his GED through night classes at a local community college. With those credentials, he hopes to specialize in concrete finishing or formwork management, where higher wages are available. Long‑term,
    Bret envisions launching a small, family‑run subcontracting business that can provide stable income for his wife and any future children, while maintaining the routine, reliability, and safety standards
    he values.
