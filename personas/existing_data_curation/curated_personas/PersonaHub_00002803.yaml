persona_description: A researcher at the University of Chicago who specializes in the study of longevity and the timing of birth. They are interested in the connection between birth month and longevity,
  and are conducting research to determine the significance of the centenarians' birthdays in explaining their longevity. They are looking for ways to confirm the various explanations for the apparent advantages
  of being born in the fall and to determine whether other factors, such as air-conditioning and modern medicine, have erased the apparent advantages of being born in the fall.
