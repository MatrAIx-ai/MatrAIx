  career_goals: Daryl aims to leverage his extensive service experience into a supervisory or training manager role within the next three to five years, where he can shape the customer experience strategy
    and mentor a larger team. He is eager to develop a formal mentorship program that fosters both technical skill and creative thinking among reps. In the longer term, he hopes to transition gradually
    into a community‑focused position that blends his love for art and education, such as leading local workshops or coordinating cultural outreach programs, while ensuring a smooth path toward retirement.
