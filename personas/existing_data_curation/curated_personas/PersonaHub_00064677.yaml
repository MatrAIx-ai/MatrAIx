persona_description: A researcher and scientist specializing in the study of bacterial infections, particularly necrotizing myositis or fasciitis. Dr. James Musser has been studying flesh-eating disease
  for 30 years and has made significant breakthroughs in identifying up to 100 genes linked to the bacterial infection. He is optimistic about the possibility of developing a vaccine or treatment for flesh-eating
  disease in the next 10 to 15 years. His ultimate goal is to create a human vaccine against group A strep, which could protect every human worldwide against various bacterial infections.
