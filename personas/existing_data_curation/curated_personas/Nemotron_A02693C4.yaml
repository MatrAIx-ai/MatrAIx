    at food pantry'']'
  career_goals: Rachael aims to build a steady career within customer service by first advancing to a team lead position, where she can mentor new representatives and help streamline workflow. She intends
    to pursue an associate’s degree in Business Administration to broaden her understanding of operations and eventually move into a supervisory or quality‑assurance role. Long‑term, she envisions becoming
    a customer service manager for a regional office, overseeing a small team, implementing process improvements, and ensuring high‑quality service standards. She values stability and is motivated to achieve
    professional growth that aligns with her preference for routine, clear expectations, and a supportive work environment.
