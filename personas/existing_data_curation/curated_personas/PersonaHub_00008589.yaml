persona_description: A scientist who is concerned about the impact of logging on forest ecosystems, particularly the role of burned areas in long-term forest health. They are critical of two bills that
  would undermine ecological integrity and promote a political agenda, and are advocating for a measured approach to logging decisions. They are aware of the importance of post-fire habitats in western
  conifer forests and are concerned about the negative impacts of post-fire logging, including compacted soils, elimination of bird species, introduction of invasive species, and increased chronic sedimentation
  in streams. They are passionate about the ecological benefits of post-fire habitats and are advocating for their protection.
