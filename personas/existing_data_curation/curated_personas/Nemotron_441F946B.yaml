personas:
  professional: Alice Obrien, a seasoned facility maintenance specialist in rural Alabama, leverages three decades of plumbing, electrical, HVAC, and carpentry expertise, applying their curiosity for new
    repair technologies and flair for artistic touches to mentor apprentices and design greener, aesthetically refined municipal systems.
  sports: Alice Obrien enjoys casual hiking on the Talladega National Forest trails, follows the Alabama Crimson Tide football team, volunteers as a scoreboard operator for the local high‑school basketball
    games, and belongs to the Selma Trail Hikers Club, all while maintaining a gentle weekly routine of swimming laps at the county pool to stay fit.
  arts: Alice Obrien spends weekends painting watercolors of the Alabama countryside, draws inspiration from Winslow Homer and the lyrical storytelling of Lynyrd Skynyrd, actively participates in Selma’s
    monthly art walk, and shares a passion for quilting—especially Log Cabin patterns—within a close‑knit community circle.
  travel: Alice Obrien prefers road‑trip adventures that blend scenic nature stops with cultural immersion, having recently explored the Blue Ridge Parkway, the historic streets of Savannah, and the jazz
    clubs of New Orleans, while dreaming of a future pilgrimage to the art museums of Florence during their retirement.
  culinary: Alice Obrien favors farm‑to‑table Southern cooking, regularly chops home‑grown tomatoes, collard greens, and sweet potatoes into hearty stews, bakes buttery buttermilk biscuits, and indulges
    in occasional shrimp and grits evenings, while keeping a well‑stocked pantry of smoked paprika, salt pork, and honey for sweet‑savory glaze experiments.
  core: Alice Obrien melds hands‑on facility mastery with a watercolor artist’s eye, turning everyday repairs into small works of functional art while juggling a garden, a quilting circle, and an ever‑growing
    list of home‑brew improvements.
background:
  cultural: Alice grew up in the Deep South, where close-knit family ties, church involvement, and a strong sense of community are central. Her upbringing in Monroe County exposed her to Southern hospitality,
    traditional cooking, and a reverence for local history and folklore. While she identifies as white, she has always appreciated the cultural mosaic of Alabama, including the region's music, crafts, and
    storytelling traditions, and she integrates this appreciation into her everyday life and work.
attributes:
  skills: '[''Plumbing'', ''Electrical Wiring'', ''HVAC Maintenance'', ''Carpentry'', ''Preventative Maintenance Planning'', ''Equipment Troubleshooting'', ''Safety Compliance'', ''Inventory Management'',
    ''DIY Home Improvement'', ''Basic Welding'']'
  hobbies: '[''Watercolor Painting'', ''Gardening'', ''Hiking'', ''Church Volunteering'', ''Furniture Restoration'', ''Classic Southern Rock Listening'', ''Quilting'', ''Attending Art Walks'']'
  career_goals: Looking ahead, Alice aims to earn a certification as an HVAC specialist and transition into a supervisory role overseeing the maintenance team at her county's municipal facilities. She hopes
    to mentor younger apprentices, introduce greener maintenance practices, and eventually launch a small, community-focused handyman service that blends functional repairs with artistic touches, such as
    custom woodwork or painted fixtures. While she values stability, she also aspires to contribute to the beautification and sustainability of her hometown.
