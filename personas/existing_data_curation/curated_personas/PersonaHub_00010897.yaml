persona_description: Frans de Waal, a Dutch-American biologist and primatologist known for his groundbreaking work on animal intelligence, particularly in the area of animal cognition. His research has
  been published in hundreds of technical articles in journals such as "Science, Nature, Scientific American," and outlets specialized in animal behavior. De Waal is the C. H. Candler Professor in the Psychology
  Department of Emory University and Director of the Living Links Center at the Yerkes National Primate Research Center, in Atlanta, Georgia. He has been elected to the US National Academy of Sciences,
  the American Academy of Arts and Sciences, and the Royal Dutch Academy of Sciences.
