    literacy'']'
  hobbies: '[''Electronics tinkering (Arduino, Raspberry Pi)'', ''Strategic board games (e.g., Catan, Ticket to Ride)'', ''Reading non‑fiction (science, technology, history)'', ''Community volunteering
    (tutoring at local center)'', ''Jogging and regular exercise in Prospect Park'', ''Listening to classic rock and indie folk music'']'
  career_goals: Richard aims to earn his GED within the next twelve months and then enroll in a vocational training program focused on information technology or electrical work. He is drawn to a career
    that balances hands‑on problem solving with reliable, steady employment, such as becoming an IT support specialist or a certified electrician. In the longer term, he hopes to launch a small, community‑oriented
    business offering tech support and basic home‑repair services for seniors and neighbors, leveraging his organized nature and calm demeanor. He also plans to mentor younger teens at the local community
    center, sharing his practical knowledge and encouraging them to pursue vocational pathways.
