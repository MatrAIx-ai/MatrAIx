personas:
  professional: Richard Cook is a budding tech‑savvy handyman who blends self‑taught Python and Arduino expertise with meticulous organization and a calm, methodical approach to troubleshoot devices and
    manage DIY projects, positioning themselves for a future as an IT support specialist or certified electrician.
  sports: Richard Cook keeps fit by jogging through Prospect Park three times a week, often joining the Brooklyn Runners club, and tunes into the New York Knicks, Yankees, and Giants for motivation while
    occasionally shooting hoops at the community center.
  arts: Richard Cook fuels creative bursts by listening to The Rolling Stones, Led Zeppelin, and indie folk artists like Bon Iver and Sufjan Stevens while assembling circuits, and they occasionally unwind
    with graphic novels from the local library.
  travel: Richard Cook favors carefully planned weekend road trips to nearby historical sites such as Philadelphia’s Independence Hall and Washington, D.C.’s Smithsonian museums, while dreaming of an international
    tech expo in Tokyo and a summer hike through the Grand Canyon, balancing adventure with the constraints of a teen budget.
  culinary: Richard Cook is a competent home cook who can whip up a classic Margherita pizza with fresh mozzarella, basil, and crushed tomatoes, enjoys assembling trail‑mix snacks with almonds, dried cranberries,
    and dark chocolate, and prefers quick, protein‑rich meals like scrambled eggs with spinach after a jog.
  core: Richard Cook merges relentless curiosity with a steady, organized calm, turning every hobby—from Arduino tinkering to board‑game strategy—into a disciplined practice that fuels both personal growth
    and community service.
background:
  cultural: Richard grew up in Brooklyn’s diverse urban landscape, raised in a white, middle‑class family with roots in the Northeastern United States. His family places a strong emphasis on hard work,
    mutual respect, and community involvement, reflected in regular participation in neighborhood events and volunteer activities. Though he left formal schooling early, his household encouraged self‑directed
    learning, with access to public libraries and community workshops that fostered his practical curiosity. The multicultural environment of Brooklyn exposed him to a variety of cultures and perspectives,
    shaping his cooperative and considerate outlook while reinforcing his American values of independence and reliability.
attributes:
  skills: '[''Basic programming (Python, Scratch)'', ''Technical troubleshooting of smartphones and computers'', ''Time‑management and task‑tracking using digital tools'', ''DIY home repair basics (carpentry,
