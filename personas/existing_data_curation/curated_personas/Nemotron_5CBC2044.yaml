  career_goals: April aims to complete her associate degree in Manufacturing Technology within the next two years and obtain the Certified Production Technician (CPT) credential. She hopes to transition
    into a lead‑operator or shift‑supervisor role where she can shape standard operating procedures and mentor newer staff. Long‑term, she aspires to move into a quality‑assurance or health‑and‑safety coordination
    position that combines her technical background with her strong desire to support coworkers' well‑being. Additionally, she dreams of eventually launching a small side venture offering specialty polishing
    services to local artisans, allowing her to apply her expertise while maintaining the predictable schedule that helps manage her anxiety.
