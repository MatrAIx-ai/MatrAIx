  career_goals: Irwin dreams of a future where he can combine his love of order, helping others, and making things. He often says he wants to be a firefighter because he admires the clear schedules, teamwork,
    and the chance to keep people safe. He also talks about building "awesome playgrounds" as an engineer, imagining designs that are both fun and sturdy. In the short term, he aims to improve his reading
    speed, master multiplication, and earn a badge in his Boy Scouts troop, seeing those steps as preparation for a career that blends structure, creativity, and service.
