personas:
  professional: Maria Santos, a 32‑year‑old animal welfare specialist at a regional shelter, combines her keen eye for behavior with rigorous data‑driven health monitoring, leveraging bilingual fluency
    to train volunteers while her competitive streak pushes her to refine protocols—even as her spontaneous nature sometimes leaves paperwork unfinished.
  sports: Maria Santos, an avid hiker who maps out weekend treks in the Santa Monica Mountains, follows the LA Dodgers and LA Galaxy religiously, trains twice weekly with the local Trailblazers hiking club,
    and squeezes in occasional yoga sessions to counteract the physical toll of lifting animal enclosures.
  arts: Maria Santos, a self‑taught photographer of shelter cats and urban wildlife, finds inspiration in the rhythmic strains of Lila Downs and the vivid murals of LA street artist Shepard Fairey, often
    curating mini‑exhibitions in the shelter’s break room to share her visual stories.
  travel: Maria Santos favors spontaneous, low‑key getaways, having trekked the rugged trails of Yosemite and the cloud forests of Monteverde, Costa Rica, while dreaming of a future field study in Patagonia’s
    Torres del Paine, always packing a compact DSLR and a small stash of homemade pupusa fillings for road‑trip meals.
  culinary: Maria Santos, a confident home cook, perfects hand‑pressed pupusas stuffed with queso fresco and loroco while pairing them with tangy curtido and fresh avocado, experiments with seasonal herbs
    like cilantro and epazote in a garden‑to‑table salad, and occasionally treats herself to a sushi roll after a long shift, though she rarely dines out, preferring the control of her kitchen.
  core: Maria Santos blends a relentless curiosity for animal behavior with a pragmatic, data‑driven work ethic, thriving on solo hikes and DIY enrichment toys, yet habitually shuns strict schedules, often
    letting paperwork pile up while chasing the next innovative solution.
background:
  cultural: Maria was born to Salvadoran immigrant parents who settled in the Inland Empire before moving to Lynwood, CA. She grew up in a bilingual household where Spanish was the primary language and
    Catholic traditions punctuated family life. Cultural celebrations such as Día de los Muertos and the Feast of San Salvador remain important, and she often prepares traditional foods for neighborhood
    gatherings. Her upbringing emphasized resilience, hard work, and close‑knit community ties, values that inform her dedication to animal welfare. While navigating the multicultural environment of Los Angeles
    County, Maria blends Salvadoran customs with broader American influences, resulting in a bicultural identity that enriches her perspective on caregiving and community service.
attributes:
