    ''Knowledge of local wildlife rescue protocols'']'
  hobbies: '[''Hiking and wildlife observation'', ''DIY enrichment toy construction'', ''Cooking Salvadoran dishes (e.g., pupusas)'', ''Reading animal biology and rescue literature'', ''Community gardening'',
    ''Animal photography'']'
  career_goals: Maria aims to advance from caretaker to head of animal welfare at a regional shelter, securing a supervisory role where she can implement innovative care protocols. She plans to obtain a
    Certified Veterinary Assistant credential and later a Certificate in Animal Behavior through community college courses, leveraging her practical experience to meet certification requirements. Long‑term,
    Maria envisions founding a community‑driven sanctuary in Los Angeles County that offers low‑cost adoption services and educational outreach on responsible pet ownership. She is driven to secure grant
    funding for enrichment programs and to establish a mentorship pipeline for other low‑income individuals interested in animal care careers.
