  hobbies: '[''Vegetable gardening'', ''Crossword puzzles'', ''Sudoku'', ''Quilting'', ''Genealogy research'', ''Volunteering as treasurer for historical society'', ''Yoga for anxiety relief'', ''Reading
    historical non‑fiction'', ''Playing chess'']'
  career_goals: Jillian aims to complete her undergraduate degree in business administration, formalizing the practical skills she has cultivated over decades. She aspires to serve as a volunteer financial
    advisor for senior‑focused nonprofit groups, leveraging her budgeting expertise to help others achieve financial stability. In addition, she seeks a leadership role on a community board or historical
    society, where she can apply her competitive drive and analytical mindset to streamline operations and ensure sustainable, organized initiatives. Managing her anxiety is also a priority; she plans to
    become a peer‑support facilitator to guide others through similar emotional challenges.
