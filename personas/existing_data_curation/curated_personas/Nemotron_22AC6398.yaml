personas:
  professional: Ye Vo is a meticulous fabricator on a Minneapolis shop floor where they blend advanced welding, MIG/TIG techniques, CNC operation, and blueprint interpretation with an artistic eye, aiming
    to become a lead technician within three years.
  sports: Ye Vo stays active by joining early‑morning runs with the Twin Cities Running Club, cheering on the Minnesota Vikings and Wild, and playing pick‑up basketball at the local park each weekend to
    unwind from the rigors of fabrication work.
  arts: Ye Vo immerses in the Minneapolis art scene, attending gallery openings that feature muralist Jeff Robinson, collecting photographic prints by Rhyne Shackelford, practicing piano with a penchant
    for Debussy’s Clair de Lune, and refining calligraphy strokes inspired by both modern minimalism and traditional ink work.
  travel: Ye Vo prefers meticulously planned weekend escapes to design‑forward cities like Copenhagen and Portland, while dreaming of an immersive summer workshop trip to Germany’s Ruhr Valley to study
    industrial heritage sites and collaborate with European makers.
  culinary: Ye Vo delights in cooking aromatic pho broth seasoned with star anise and charred beef brisket, perfecting banh mi sandwiches with pickled daikon, cilantro, and spicy sriracha mayo, and experimenting
    with espresso‑infused caramel for homemade desserts during friendly gatherings.
  core: Ye Vo balances razor‑sharp precision on the shop floor with a restless curiosity for street art, often catching themselves humming piano riffs while meticulously checking inventory spreadsheets
    during gallery openings.
background:
  cultural: Ye Pong Vo is a first-generation Vietnamese-American. His parents immigrated to the United States in the early 1990s, and he grew up in a bilingual household in the Twin Cities, celebrating
    Tet and other Vietnamese traditions while also embracing the multicultural fabric of Minneapolis. He is fluent in both Vietnamese and English, and his cultural upbringing emphasizes respect for elders,
    community cooperation, and a strong work ethic. These values shape his considerate nature and his desire to contribute positively to his local community.
attributes:
  skills: '[''Mechanical assembly'', ''Welding (MIG/TIG)'', ''CNC machine operation'', ''Blueprint reading'', ''Quality inspection'', ''Troubleshooting'', ''Inventory management'', ''Safety compliance'',
    ''Team collaboration'', ''Basic CAD reading'', ''Time management'']'
  hobbies: '[''Visiting art galleries and murals'', ''Photography (industrial and urban)'', ''3D printing and hobbyist prototyping'', ''Yoga and meditation'', ''Journaling'', ''Playing piano'', ''Cooking
    Vietnamese cuisine'', ''Calligraphy'', ''Reading science-fiction'']'
  career_goals: He aims to advance from a fabricator to a lead technician or production supervisor within the next three years, and eventually enroll in an associate program in manufacturing engineering
    to become a CNC programmer or shop floor manager. Long-term, he dreams of opening his own custom metal-fabrication studio that blends functional design with artistic expression, allowing him to collaborate
    with local artists and contribute to Minneapolis’s growing maker community.
