  career_goals: Vanessa aspires to become a senior design director at a regional firm where she can champion climate-responsive, culturally inclusive architecture. She plans to launch her own boutique studio
    that specializes in community-centered projects for historically under-represented neighborhoods in the Tampa Bay area. Over the next decade she aims to secure research grants for innovative design
    solutions, publish thought-leadership pieces on the intersection of Black cultural narratives and sustainable architecture, and serve as an adjunct professor to mentor the next generation of diverse
    architects.
