personas:
  professional: Vanessa Jeffries, a senior architectural design strategist at a regional firm, blends advanced BIM and parametric modeling expertise with a meticulous, imaginative mindset, steering multidisciplinary
    teams toward climate‑responsive, culturally inclusive projects while maintaining exacting standards and fostering a compassionate, collaborative work environment.
  sports: Vanessa Jeffries, a member of the Hillsborough River Trail Hikers club, dedicates early mornings to trail runs in winter and paddle‑boarding on the Spring River during summer, avidly follows the
    Tampa Bay Lightning and Buccaneers, and balances her disciplined fitness routine with weekly yoga sessions to manage stress.
  arts: Vanessa Jeffries immerses herself in the arts by curating visits to local galleries showcasing installations by Olafur Eliasson and Anish Kapoor, photographing modern pieces, and drawing inspiration
    from abstract watercolor pioneers like Mark Rothko while listening to the soulful jazz of Kamasi Washington during her studio sessions.
  travel: Vanessa Jeffries favors meticulously planned trips that blend cultural immersion and natural serenity, having recently explored the vibrant streets of Cartagena, Colombia, and the wooded retreats
    of Asheville, North Carolina, while dreaming of a future architectural research retreat in the Scottish Highlands.
  culinary: Vanessa Jeffries’s culinary palate fuses Southern soul‑food staples such as smoked collard greens with Caribbean flavors like jerk‑spiced chicken, and she regularly crafts her own double‑tasting
    menu featuring sweet‑potato griot dumplings and citrus‑marinated shrimp, though she occasionally over‑spices dishes when experimenting late at night.
  core: Vanessa Jeffries, a 47‑year‑old architectural visionary, balances disciplined leadership with endless curiosity, channeling her private watercolor improvisations and nocturnal coffee‑fuelled story
    drafts into climate‑forward designs, while secretly hoarding half‑finished sketches in a junk drawer and worrying about the next project deadline.
background:
  cultural: Vanessa was raised in a close-knit African American family in the South, where church music, storytelling, and communal celebrations like Juneteenth and Kwanzaa shaped her sense of identity.
    She draws artistic inspiration from Black modernist painters and architects such as Romare Bearden and Paul R. Williams, and she actively participates in regional Black cultural organizations that promote
    equity in the built environment. Her experiences navigating professional spaces as a Black woman have reinforced a commitment to mentorship, representation, and designing spaces that reflect the histories
    and aspirations of African-American communities.
