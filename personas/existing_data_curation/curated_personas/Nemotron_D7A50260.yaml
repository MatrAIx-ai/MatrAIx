  career_goals: Chrissy envisions moving from individual housekeeping assignments to a supervisory role where she can mentor junior cleaners and develop standardized cleaning protocols for a regional housekeeping
    firm. Over the next five years, she hopes to earn a certification in green cleaning, launch her own small-scale eco-conscious cleaning service focusing on homes of seniors and busy professionals, and
    eventually secure a stable managerial position that offers predictable hours to reduce stress. She also aims to improve her financial security and reduce worries about health insurance by pursuing benefits
    through a formal employment arrangement.
