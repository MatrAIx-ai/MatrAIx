personas:
  professional: Jonathan Mayorga, a veteran mechanical installation and repair expert with over two decades of hands-on experience, leverages his methodical planning, bilingual communication, and creative
    problem-solving to lead multidisciplinary crews, integrate IoT predictive-maintenance tools, and drive safety-first workflow optimization toward senior operations management.
  sports: Jonathan Mayorga competes in the local El Paso Strikers weekend soccer league, passionately supports the New Mexico United soccer team, hikes with the El Paso Hiking Club on the Franklin Mountains,
    and they weave seasonal activities like cross-country cycling in spring into their fitness routine to balance work stress.
  arts: Jonathan Mayorga regularly visits the El Paso Museum of Art to admire works by Georgia O'Keeffe, paints watercolor desert landscapes inspired by the Chihuahuan expanse, strums acoustic guitar at
    family gatherings while listening to Paco de Lucía and the Afro-Cuban rhythms of Irakere, and they attend weekly theater productions featuring local playwrights.
  travel: Jonathan Mayorga favors road trips that blend cultural immersion and natural wonder, having explored Carlsbad Caverns, the historic streets of Santa Fe, and the coastal charm of Barcelona, while
    they plan future trips to the vineyards of Mendoza and the desert trails of Zion National Park, balancing family time with solitary hikes.
  culinary: Jonathan Mayorga enjoys cooking traditional paella with saffron, chorizo, and fresh shrimp, prepares a hearty tortilla española on weekends, experiments with desert-grown ingredients like prickly
    pear and poblano peppers, and they savor a glass of tempranillo while listening to flamenco guitar.
  core: Jonathan Mayorga blends a disciplined, safety-first engineering mindset with a vivid love for desert art, weekend soccer, and experimental cooking, yet they sometimes overcommit to mentorship projects,
    forget to take their medication on busy weeks, and hoard vintage guitar picks for good luck.
background:
  cultural: Jonathan’s family origins trace back to Spain, where he was raised with a blend of Mediterranean customs, strong family cohesion, and a reverence for craftsmanship. Growing up in a bilingual
    household, he maintains fluency in both Spanish and English, which informs his inclusive communication style. While living in El Paso, Texas, he embraces the cross‑cultural dynamics of the border region—participating
    in local festivals, enjoying regional cuisine, and valuing the hospitality and communal spirit that characterize both Spanish and Hispanic cultures. His heritage influences his appreciation for art,
    music, and culinary traditions, and it shapes his collaborative leadership approach.
attributes:
  skills: '["Mechanical troubleshooting","Team leadership","Project scheduling and budgeting","Safety compliance (OSHA)","Lean manufacturing and process optimization","Technical documentation and reporting","Vendor
