  hobbies: '["Visiting art galleries and theater","Watercolor painting","Acoustic guitar playing","Soccer (community league)","Cooking traditional Spanish cuisine","Volunteering for youth STEM mentorship","Hiking
    desert trails","Listening to flamenco and Latin jazz"]'
  career_goals: Jonathan aims to advance into senior operations management, targeting roles such as Plant Manager or Director of Maintenance where he can shape strategic initiatives across multiple sites.
    He plans to earn certifications like Certified Maintenance Manager (CMM) and Six Sigma Green Belt to formalize his expertise. A key ambition is to lead a company‑wide lean transformation that reduces
    downtime by 15% while improving safety metrics. He also envisions mentoring the next generation of technicians, possibly establishing a community apprenticeship program that blends technical training
    with an appreciation for craftsmanship and design.
