personas:
  professional: Meghan Willey, a seasoned community organizer and budding board member of the local historical society, leverages their warm, talkative storytelling style and meticulous genealogical expertise
    to coordinate senior‑volunteer mentorship programs, orchestrate neighborhood garden festivals, and guide oral‑history projects with calm resilience.
  sports: Meghan Willey is a devoted fan of the LSU Tigers football team and the New Orleans Saints, occasionally attends New Orleans Pelicans games, and stays active by walking with the Baton Rouge Riverwalk
    Club, blending gentle cardio with birdwatching along the Mississippi levee.
  arts: Meghan Willey regularly attends performances by the Preservation Hall Jazz Band and local zydeco star Beau Jocque, while finding literary inspiration in works by William Faulkner and Eudora Welty,
    and they often quote lines from these authors during community workshops.
  travel: Meghan Willey enjoys leisurely road trips to historic Southern towns such as Charleston, Savannah, and Natchez, often returning from weekend pilgrimages to New Orleans' French Quarter for jazz
    festivals, and dreams of a culinary tour of Provence in the French countryside.
  culinary: Meghan Willey perfects classic gumbo with andouille sausage, shrimp, okra, and a pinch of filé powder, crafts jambalaya featuring tasso ham and long‑grain rice, and tosses powdered sugar over
    fresh beignets, while constantly experimenting with home‑grown rosemary, thyme, and a signature blend of smoked paprika and cayenne.
  core: Meghan Willey blends community stewardship, culinary tradition, and a zest for storytelling into a vibrant, resilient presence that nurtures both heritage and new generations.
background:
  cultural: Meghan grew up in a middle‑class white family in the heart of Baton Rouge, where French‑Creole, African‑American, and Anglo‑Southern traditions mingled daily. Raised in a Methodist church, she
    internalized Southern hospitality, a strong work ethic, and a reverence for community rituals. The region’s music—jazz, zydeco, and gospel—shaped her love for rhythm and storytelling, while the rich
    culinary landscape sparked her lifelong passion for Cajun and Creole cooking. Her exposure to both the historic French Quarter architecture and the modern growth of the city fuels her curiosity about
    preserving local heritage while embracing practical change.
attributes:
  skills: '[''Community event planning'', ''Public speaking'', ''Interpersonal communication'', ''Senior mentorship'', ''Cajun/Creole cooking'', ''Gardening'', ''Genealogy research'', ''Conflict resolution'',
