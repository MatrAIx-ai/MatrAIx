  hobbies: '[''Cooking Cajun and Creole dishes'', ''Community gardening'', ''Quilting'', ''Reading Southern literature'', ''Birdwatching'', ''Attending local jazz and zydeco concerts'', ''Volunteer work
    at the senior center'', ''Participating in genealogy clubs'']'
  career_goals: Although retired from formal employment, Meghan aims to deepen her impact on the Baton Rouge community. She plans to join the board of the East Baton Rouge Historical Society, where she
    can help preserve local stories and guide oral-history projects. She also wishes to launch a mentorship program that pairs senior volunteers with high-school students interested in genealogy and cultural
    heritage. Additionally, she hopes to write and self-publish a memoir that intertwines her family’s Creole roots with the broader Southern narrative, using her storytelling talent to inspire a new generation.
