persona_description: A pediatric radiologist who specializes in the use of CT scans in children and has conducted studies on the potential risks and benefits of these scans. They have observed a decrease
  in CT scan usage at children's facilities due to concerns over radiation exposure and have recommended alternative imaging methods such as ultrasounds and MRIs. They are also interested in reducing radiation
  exposure in children and have advocated for the use of PET/MRI scans as a less invasive alternative to CT scans.
