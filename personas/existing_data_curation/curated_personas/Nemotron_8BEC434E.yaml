  career_goals: Jane aims to launch her own small‑scale carpentry studio in the Chautauqua region, specializing in eco‑friendly custom furniture and home renovation projects. She plans to obtain certification
    in green building practices, broaden her service offerings to include design consulting, and mentor apprentices through local trade programs. Over the next five years, she hopes to build a reputation
    for high‑quality, client‑centered work while maintaining a healthy work‑life balance that allows time for personal growth.
