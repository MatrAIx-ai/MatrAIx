personas:
  professional: Xiaodong Ou, a 36‑year‑old engineering technologist at a New York‑based building‑automation firm, leverages meticulous CAD modeling, Lean Six Sigma, and bilingual communication to lead cross‑functional
    projects, while methodically documenting every step to satisfy their strong preference for structure and predictability.
  sports: Xiaodong Ou enjoys a weekly community basketball league with the Queens Hoops Club, practices tai chi in Riverside Park each morning, follows the New York Knicks and New York Rangers loyally,
    and hikes the Hudson Valley trails with their spouse, balancing high‑energy competition with calming movement.
  arts: Xiaodong Ou frequents the Museum of Modern Art, appreciates the kinetic sculptures of Alexander Calder, attends live jazz at the Blue Note, streams classic films like "The Grand Budapest Hotel,"
    and participates in board‑game nights where strategy games like Catan and Terraforming Mars fuel their love for puzzles and order.
  travel: Xiaodong Ou prefers meticulously planned trips, often choosing weekend getaways to the Hudson Valley or a weekend in Boston for historic tours, while dreaming of a long‑term adventure to Iceland's
    geothermal sites and a cultural immersion in Kyoto, balancing a love for structured itineraries with occasional spur‑of‑the‑moment hikes.
  culinary: Xiaodong Ou enjoys cooking homemade xiao long bao, stir‑fried bok choy with garlic, and chili‑infused mapo tofu, skillfully balancing traditional techniques with modern kitchen gadgets, yet
    sometimes over‑sautés ingredients when racing against the dinner clock during family gatherings.
  core: Xiaodong Ou is a methodical engineer with a social streak, who channels anxiety into precise drone builds, basketball, and perfectly timed tai chi sessions, while occasionally letting worry dictate
    both their spreadsheets and sleep.
background:
  cultural: Xiaodong is a second‑generation Chinese‑American whose parents immigrated from Guangdong province. Raised in a bilingual household, he speaks Mandarin at home and English in public, embodying
    a blend of traditional Chinese values—emphasis on education, family cohesion, and respect for elders—and the dynamic multiculturalism of New York City. He celebrates Lunar New Year, the Mid‑Autumn Festival,
    and other heritage holidays with customary foods and rituals, while actively participating in local Chinese community events in Manhattan’s Chinatown. This bicultural upbringing informs his culinary
    interests, community involvement, and the collaborative, respectful approach he brings to both his professional and personal life.
