  career_goals: Xiaodong aims to advance into a senior lead technologist role where he can oversee a cross‑functional team developing smart‑building and sustainable infrastructure solutions for New York’s
    commercial sector. He plans to obtain a Professional Engineer (PE) license and a Six Sigma Black Belt to deepen his technical authority. Long‑term, he envisions establishing his own consultancy that
    helps mid‑size firms implement data‑driven maintenance platforms and lean operational practices, while maintaining a predictable, structured work environment that balances career growth with family
    well‑being.
