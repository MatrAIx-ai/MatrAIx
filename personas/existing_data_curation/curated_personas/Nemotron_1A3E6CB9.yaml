  career_goals: Leonora aims to progress from her current secretary/administrative assistant role to a senior administrative manager or executive assistant position within a government agency or a reputable
    nonprofit in the Prince George's County area. She plans to obtain a Certified Administrative Professional (CAP) credential and enroll in community‑college courses in business administration to broaden
    her strategic planning skills. Ultimately, she hopes to lead a small support team, improve office efficiency through technology adoption, and secure a role that offers greater stability while allowing
    her to mentor younger staff. She also envisions transitioning to a hybrid or remote administrative role that reduces daily commute stress.
