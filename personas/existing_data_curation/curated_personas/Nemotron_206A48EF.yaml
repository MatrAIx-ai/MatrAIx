  career_goals: His short‑term goal is to earn his GED and enroll in a community‑college IT certification program, focusing on network support or web development. He aims to secure a part‑time junior tech
    support role that will let him apply his hands‑on skills while earning. In the long term, Jose Luis aspires to work as a software developer or game programmer, creating immersive experiences that combine
    his love for storytelling and technology. He also envisions freelancing on small web‑design projects for local Puerto Rican businesses, allowing him to support his family and stay connected to his cultural
    community.
