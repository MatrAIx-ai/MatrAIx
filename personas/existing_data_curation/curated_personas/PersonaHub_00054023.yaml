persona_description: A medical professional who is responsible for diagnosing and treating leptospirosis cases. They are aware of the importance of early detection and treatment to prevent complications
  and have a duty to report any suspected cases to the medical officer of health. They also have knowledge of prevention measures such as vaccination programs for animals and the use of personal protective
  equipment. They are aware of the potential risks associated with leptospirosis, such as the need for culture, molecular biology, or serological testing, and the importance of consistent clinical symptoms
  and a titre level of 800 or more to confirm infection. They are also familiar with the testing methods and the importance of taking samples early in the illness and not waiting until infection is confirmed.
