  career_goals: Yasmin aims to transition into a senior leadership role, such as Regional Sales Director, where she can shape sales strategy across multiple territories in Puerto Rico and the Caribbean.
    She is also exploring the creation of a boutique consultancy that merges her sales expertise with her passion for the arts, helping local artisans and cultural enterprises reach broader markets through
    innovative, story‑driven selling techniques. Over the next five years, she plans to earn advanced certification in digital sales platforms, secure a spot as a speaker at regional business forums, and
    mentor a cohort of emerging women sales professionals, all while building a financially stable foundation for early retirement.
