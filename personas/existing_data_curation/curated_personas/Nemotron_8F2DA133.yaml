personas:
  professional: Yasmin Perez leverages three decades of consumer‑goods sales mastery, a razor‑sharp data mindset and a painter’s eye for storytelling to deliver unforgettable pitches, mentor junior reps,
    and systematically expand market share across island territories, all while positioning themselves for a Regional Sales Director role and a boutique consultancy that champions artisans.
  sports: Yasmin Perez fuels their fitness routine with sunrise birdwatching hikes along the lighthouse trail, participates in the local Coastal Trail Runners club, avidly follows the Leones de Ponce basketball
    team, and occasionally joins weekend paddle‑boarding sessions with the Cabo Rojo Yacht Club.
  arts: Yasmin Perez channels the luminous brushstrokes of Claude Monet and the emotive color palettes of Frida Kahlo into their own watercolor series, finds solace in evening piano renditions of Ludovico
    Einaudi and the indie folk harmonies of Bon Iver, and regularly engages with local galleries showcasing contemporary island artists such as Ana Rivera.
  travel: Yasmin Perez prefers meticulously planned coastal getaways—revisiting the historic forts of Old San Juan and the breezy cliffs of Cabo Rojo—while they also carve out spontaneous photo‑ventures
    to Cartagena and St. Lucia, balancing a modest travel budget with a desire to capture sunrise birdwatching moments before their retirement timeline tightens.
  culinary: Yasmin Perez, an intermediate home chef, frequently reimagines classic mofongo and pasteles by infusing them with coconut‑milk‑marinated plantains, herb‑infused garlic aioli from their cilantro‑rich
    garden, and a drizzle of pomegranate reduction, while also mastering the perfect arroz con pollo seasoned with annatto and fresh thyme.
  core: Yasmin Perez blends a data‑driven sales acumen with an artist’s eye, using solitary puzzle time and birdwatching hikes to recharge, but can be fiercely competitive and occasionally lets perfectionism
    spill into overspending on premium art supplies.
background:
  cultural: Yasmin was born and raised in Cabo Rojo, a small coastal municipality on the western tip of Puerto Rico. Growing up in a bilingual household, she absorbed the island’s rich blend of Taíno, Spanish,
    and African heritage, which is reflected in the local music, festivals, and culinary traditions she cherishes. Community events like the Festival de la Sal and patron saint celebrations shaped her sense
    of belonging and reinforced the value of hard work and family solidarity. The island’s natural beauty—its salt flats, beaches, and lighthouse—instilled in her a love for the outdoors, while the vibrant
    street art and mural scene nurtured her appreciation for creative expression. Her cultural identity is rooted in a deep respect for Puerto Rican customs, a pride in the island’s resilience, and a commitment
    to preserving its artistic legacy.
