persona_description: A person who is interested in dividing or separating things into parts, dealing out shares, or causing division. They are likely to be familiar with tools and instruments used for dividing
  lines or describing shapes, such as compasses. They may have a keen interest in mathematics, specifically in the concepts and theorems related to subgroups and isomorphisms, and may have a background
  in group theory. They may also be interested in the structure of finite groups, representation theory of groups, and isomorphism problems.
