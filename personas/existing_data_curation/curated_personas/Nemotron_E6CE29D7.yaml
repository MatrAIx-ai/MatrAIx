personas:
  professional: Kerry Goodman, a veteran elementary and middle‑school science and mathematics teacher, combines fifteen years of inquiry‑based instruction, data‑driven curriculum design, and technology
    integration with a pragmatic curiosity and collaborative spirit, fostering a classroom where structured learning meets the spontaneous wonder of local marine ecosystems.
  sports: Kerry Goodman, an active member of the Naples Kayak Club, paddles the Gulf weekly, joins the local beach‑volleyball league each summer, follows the Tampa Bay Buccaneers, Miami Heat, and the New
    York Mets’ spring training at nearby Roger Dean Stadium, and balances these pursuits with a disciplined yoga practice that keeps them agile and energized.
  arts: Kerry Goodman, a devoted attendee of Naples’ cultural events, regularly enjoys Asolo Repertory Theatre productions, concerts by the Naples Philharmonic featuring violinist Joshua Bell, and immerses
    themselves in historical fiction by Hilary Mantel and popular science by Mary Roach, often quoting Shakespeare lines during board‑game evenings.
  travel: Kerry Goodman prefers eco‑focused road trips, having explored the Everglades, the historic streets of Savannah, and the coastal charms of Cinque Terra, while planning future voyages to the Greek
    islands and Costa Rica’s marine reserves, always budgeting trips through detailed spreadsheets and a modest travel rewards credit card.
  culinary: Kerry Goodman delights in preparing grilled grouper with lemon‑oregano glaze, Mediterranean moussaka infused with fresh basil and feta, and herb‑laden shrimp scampi using locally sourced thyme
    and parsley, showcasing a confident home‑cook level that blends coastal seafood flavors with Mediterranean techniques.
  core: Kerry Goodman is a curiosity‑driven, community‑oriented educator who balances meticulous planning with spontaneous paddles, never misses a board‑game night, and occasionally forgets to water the
    herb garden until the last minute.
background:
  cultural: Kerry is a white American whose family roots trace back to Midwestern and East Coast ancestors. Having grown up in the Midwest, she carries values of diligence, community involvement, and a
    straightforward communication style. Relocating to Naples, Florida in the early 2000s, she embraced the coastal lifestyle, developing a deep appreciation for the Gulf’s marine environment and the region’s
    blend of Southern hospitality and multicultural influences. She participates actively in her local PTA, a community church, and volunteer groups focused on environmental stewardship, reflecting both
    her personal commitment to education and the collaborative spirit of her Florida community.
attributes:
  skills: '["Curriculum design aligned with state standards", "Project-based learning development", "Differentiated instruction for diverse learners", "Technology integration (interactive whiteboards, coding
    platforms, robotics kits)", "Data-driven assessment and instructional adjustment", "Mentoring and coaching of new teachers", "Facilitation of professional development workshops", "Grant writing for
    STEM enrichment programs", "Community partnership building with museums and marine centers", "Effective classroom management"]'
  hobbies: '["Kayaking and paddleboarding on the Gulf", "Participating in beach clean‑ups and marine conservation volunteering", "Gardening native plants and a herb garden", "Reading historical fiction
    and popular science", "Attending local cultural festivals, art walks, and community theater", "Socializing at coffee shops and board‑game nights with friends", "Practicing yoga", "Cooking seafood and
    Mediterranean cuisine"]'
  career_goals: Kerry hopes to expand her impact beyond her classroom by moving into a district‑wide STEM leadership role. She aims to become a curriculum coordinator for science and mathematics in Collier
    County, where she would design cohesive STEM pathways from elementary through middle school, incorporate the region’s marine environment into the curriculum, and secure sustainable funding for hands‑on
    labs and after‑school clubs. Concurrently, she plans to pursue an Ed.D. in educational leadership with a focus on STEM integration, and to mentor a cohort of teachers as an instructional coach. Long‑term,
    she envisions consulting for schools on building inclusive, inquiry‑driven STEM programs and contributing to teacher‑education programs at a nearby community college.
