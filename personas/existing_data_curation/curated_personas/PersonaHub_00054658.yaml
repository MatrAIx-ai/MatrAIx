persona_description: A person who is committed to achieving their financial goals through a well-planned and comprehensive financial strategy. They are willing to take the time to gather relevant financial
  information, set life goals, examine their current financial status, and come up with a strategy or plan for how they can meet their goals given their current situation and future plans. They understand
  the importance of financial planning in helping them understand how each financial decision they make affects other areas of their finances and how they can adapt more easily to life changes and feel
  more secure that their goals are on track. They also recognize the need for a coordinated and comprehensive approach to helping them achieve their personal and reasonable financial goals and seek the
  help of an experienced financial planning team to assist them in identifying their goals, understanding their current situation, developing a plan that addresses their goals with their risk tolerance
  in mind, implementing and monitoring the financial plan.
