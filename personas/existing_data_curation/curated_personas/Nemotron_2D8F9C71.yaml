    household management'', ''Visual arts (watercolor, photography)'']'
  hobbies: '[''Watercolor painting'', ''Pottery'', ''Nature photography'', ''Reading contemporary fiction and art history'', ''Vegetable gardening'', ''Heritage quilting'', ''Genealogy research'', ''Journaling
    and sketching'']'
  career_goals: Jennifer aims to transition back into the education field by securing a part‑time or substitute teaching position that allows her to bring her love of art and innovative pedagogy into the
    classroom. In the longer term, she aspires to design and launch a community‑based after‑school arts program in Wishek that blends visual arts, STEM, and local history, thereby strengthening youth engagement.
    She also plans to pursue a master’s degree in curriculum and instruction to deepen her expertise and eventually serve as a curriculum specialist for the McIntosh County school district. A personal ambition
    is to publish a children’s picture book that reflects the prairie landscape and cultural heritage of North Dakota.
