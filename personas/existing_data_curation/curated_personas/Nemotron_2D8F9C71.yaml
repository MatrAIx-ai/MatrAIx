personas:
  professional: Jennifer Rao, a methodical educator with a solid grounding in curriculum design and digital instruction, channels her curiosity and competitive drive into crafting interdisciplinary, art‑infused
    lesson plans while training colleagues on Google Classroom and Zoom, all in pursuit of a part‑time teaching role that will serve as a launchpad for a community after‑school arts program.
  sports: Jennifer Rao, a devoted fan of the Bismarck State University Bison basketball team and a participant in the Wishek Walking Club, enjoys early‑morning nature hikes that double as photography outings,
    practices gentle yoga twice a week, and occasionally joins the local 5K run series in the spring, balancing community spirit with personal fitness.
  arts: Jennifer Rao, an avid watercolorist inspired by the landscape works of John Marin and the prairie palettes of Georgia O'Keeffe, spends weekends at the North Dakota Museum of Art viewing exhibitions
    by contemporary photographer Annie Leibovitz, and incorporates photography of local wildlife into classroom displays, while also quilting in the tradition of the American Folk Art movement.
  travel: Jennifer Rao prefers meticulously planned road trips that weave cultural stops into scenic drives, having recently explored the Badlands National Park and the historic streets of Winnipeg, and
    cherishes a planned future visit to Santa Fe's art colonies to study Southwestern pottery techniques, all while budgeting trips around school breaks.
  culinary: Jennifer Rao, a garden‑to‑table enthusiast, frequently cooks harvested zucchini, heirloom tomatoes, and sweet corn into a summer ratatouille, enjoys perfecting a prairie‑inspired egg‑nog using
    locally sourced dairy, and skillfully seasons dishes with fresh dill and sage, though they admit to occasionally over‑salting when experimenting with new glaze recipes.
  core: Jennifer Rao blends disciplined organization with a boundless curiosity, turning prairie sunsets into watercolor lessons, steering a cautious yet occasionally impulsive financial life, and balancing
    community service with a love for quiet sketching and garden chores.
background:
  cultural: Jennifer’s cultural background is rooted in the Midwestern prairie tradition of North Dakota. Her family traces its ancestry to German‑Russian immigrants who settled the region in the late 19th
    century, a heritage that influences her appreciation for community, self‑reliance, and seasonal celebrations. She grew up in a small town where church (Lutheran) and county fairs played central roles,
    and she values the simplicity of rural life, the importance of neighborly support, and the preservation of regional customs such as the harvest festival, quilting circles, and community potlucks.
attributes:
  skills: '[''Curriculum design and lesson planning'', ''Classroom management'', ''Educational technology (Google Classroom, Zoom, digital assessment tools)'', ''Student assessment and data analysis'',
