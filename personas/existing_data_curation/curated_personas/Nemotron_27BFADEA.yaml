  hobbies: '[''Jigsaw Puzzles'', ''Crossword Puzzles'', ''Strategy Board Games'', ''Hiking'', ''Trail Running'', ''Historical Nonfiction Reading'', ''True-Crime Book Club'', ''Yoga'', ''Museum Volunteering'']'
  career_goals: Teresa aims to advance from front-line surveillance to a supervisory position within the casino security department, eventually becoming a Security Operations Manager. She plans to earn
    the Certified Protection Professional (CPP) credential and complete a part-time master’s program in Criminal Justice. Long-term, she aspires to lead a regional security team or transition into private
    investigations, using her analytical strengths to design security protocols for high-risk venues. She also hopes to mentor new guards, building a culture of accountability and structured training.
