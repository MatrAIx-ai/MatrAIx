  career_goals: John aims to advance within the customer service field by moving into a team lead or supervisory position within the next two years. He plans to complete his associate degree in business
    administration and earn certifications such as Certified Call Center Manager (CCCM) and Six Sigma Yellow Belt to enhance his process‑improvement expertise. Over the next five years, he envisions stepping
    into a manager or operations role overseeing a regional support team, where he can design and implement training programs, drive service quality initiatives, and contribute to strategic decision‑making.
    Parallel to his corporate ambitions, John is passionate about entrepreneurship and hopes to one day open a community‑focused coworking space or small café in Kyle that serves as a hub for local entrepreneurs,
    live events, and social gatherings.
