  hobbies: '["Visiting art galleries and museums", "Community theater participation", "Photography", "Reading contemporary literature", "Book club meetings", "Yoga and Pilates", "Volunteering at cultural
    festivals", "Creative writing", "Cooking classes", "Gardening", "Hiking in local parks"]'
  career_goals: In the short term, Laura aims to earn a certification in Arts Administration and to deepen her proficiency with digital visitor‑management systems. Over the next few years, she plans to
    transition from a general receptionist role to a specialized Gallery Receptionist or Museum Visitor Services position within the Detroit metropolitan area, leveraging her art knowledge and community‑engagement
    skills. Long‑term, she aspires to become an Arts Program Coordinator or Arts Administration Manager, overseeing exhibitions, educational outreach, and community‑based cultural events. She also wants
    to champion mental‑health awareness in the workplace, mentoring colleagues on coping strategies and building a supportive environment.
