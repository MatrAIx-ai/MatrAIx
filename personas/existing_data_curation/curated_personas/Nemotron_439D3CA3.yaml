personas:
  professional: Laura Tart, a seasoned front‑desk specialist known for meticulous customer service and a cultivated appreciation for visual art, leverages her mastery of Microsoft Office, Google Workspace,
    and emerging digital visitor‑management platforms to transition toward a gallery receptionist role, while they use their empathetic communication to champion mental‑health awareness among colleagues.
  sports: Laura Tart, an avid hiker on the Paint Creek Trail and a member of the Oakland County Trail Runners, balances her love of movement with weekly yoga and Pilates classes, regularly cheers on the
    Detroit Lions and Detroit Tigers, and they sometimes join a community soccer league tied to Detroit City FC.
  arts: Laura Tart, a devoted patron of the Detroit Institute of Arts who frequently attends exhibitions featuring Kehinde Wiley and Yayoi Kusama, delights in capturing urban scenes inspired by Ansel Adams,
    fuels her creativity with readings by Zadie Smith, and they actively volunteer at the annual Art in the Park festival, guiding visitors through the installations.
  travel: Laura Tart, who plans meticulous weekend road trips to Michigan destinations like Mackinac Island and annual cultural pilgrimages to New York’s Metropolitan Museum, blends spontaneous photo walks
    with a modest travel budget, ensuring they set aside funds for museum admissions and boutique lodging.
  culinary: Laura Tart, an enthusiastic participant in community cooking classes, enjoys crafting lemon‑rosemary roasted chicken with heirloom tomatoes, homemade gnocchi tossed in sage butter, and miso‑glazed
    salmon topped with sesame seeds, often experimenting with fresh basil, saffron, and locally sourced kale, and they occasionally reward themselves with Detroit‑style pizza after a long gallery shift.
  core: Laura Tart, a curiosity‑driven museum enthusiast who balances meticulous organization with occasional worry‑induced over‑thinking, channels stress into yoga, photography, and community mentorship,
    while they never miss a chance to capture the perfect sunset over the Detroit River.
background:
  cultural: Laura grew up in the Midwest, shaped by the community‑oriented values common in Michigan's suburban and small‑city settings. Her family background includes German and Irish ancestry, reflected
    in family traditions such as holiday gatherings and a respect for hard work. Raised in a mixed Protestant environment, she participated in church‑based service projects and local festivals, fostering
    a sense of civic responsibility. The cultural diversity of Oakland County exposed her to a broad range of artistic expressions, fueling her curiosity for unconventional ideas. These experiences blend
    a modest, reliable Midwestern ethic with an appreciation for the arts and a commitment to community engagement.
attributes:
  skills: '["Customer Service", "Front Desk Management", "Multilingual Communication (English, basic Spanish)", "Scheduling & Calendar Management", "Office Software (Microsoft Office, Google Workspace)",
