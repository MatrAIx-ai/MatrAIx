  hobbies: '[''Gardening'', ''Fishing at the pier'', ''Cooking and sharing meals'', ''Church choir singing'', ''Social dancing (salsa, line dancing)'', ''Playing cards at the senior center'', ''Walking
    on the beach'', ''Listening to soul and jazz music'', ''Volunteering at community events'', ''Storytelling sessions'']'
  career_goals: Voltaire aims to deepen his contribution to the Pompano Beach community in the coming years. He plans to obtain a certified community health worker credential so he can lead health‑awareness
    workshops for seniors and foster greater well‑being. He hopes to formalize his culinary passion by offering small‑scale catering for church events and local festivals, and to compile his life experiences
    into a memoir that captures personal and neighborhood history. Voltaire also seeks a seat on the senior center’s activity board, to mentor at‑risk teenagers, and to enroll in adult‑education classes
    to improve his reading and writing, satisfying his curiosity while staying practical.
