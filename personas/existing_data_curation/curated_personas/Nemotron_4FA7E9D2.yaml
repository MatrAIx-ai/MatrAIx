  hobbies: '["watercolor painting", "reading classic and experimental literature", "genealogy research", "gardening", "crossword and logic puzzles", "playing piano", "small book club meetings", "walking
    local trails", "volunteering at county historical society"]'
  career_goals: Although retired, Drusilla pursues personal milestones that reflect her curiosity and competitive spirit. She aims to compile a comprehensive, publishable family genealogy and write a memoir
    that intertwines her life with Appalachian narratives. She plans to curate a solo exhibition of her abstract watercolors at the Madisonville Art Center and enter a state‑level senior art competition.
    Drusilla also intends to develop a workshop on archival techniques for local high‑school students, submit a collection of poems to regional literary journals, and complete a self‑paced study of modernist
    art history.
