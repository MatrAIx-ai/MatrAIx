  career_goals: Rachel plans to earn her GED within the next year and subsequently enroll in a community‑college program focused on hospitality management or event planning. In the short term, she hopes
    to secure a part‑time front‑of‑house role at a local restaurant or café to gain hands‑on experience in customer service and operations. Long‑term, she envisions running her own community‑focused event
    planning business, organizing youth workshops, local festivals, and charity fundraisers, while also keeping a small boutique bakery as a creative outlet. Her career ambition blends her love for structured
    teamwork with a desire for flexible, people‑centered work.
