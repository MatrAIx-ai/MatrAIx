personas:
  professional: Kevin Bayas is a budding LEGO architect who meticulously follows instruction manuals, turning each set into a flawless miniature masterpiece, while their competitive streak drives them to
    rebuild complex models faster than peers and their love for predictable outcomes ensures every brick snaps into place exactly as intended.
  sports: Kevin Bayas is a baseball aficionado who plays catch after school, collects 2021 MLB rookie cards, cheers for the Chicago Cubs, and proudly wears the uniform of the neighborhood Little League
    team, the Oakwood Sluggers, while their competitive nature pushes them to practice batting drills whenever they have free time.
  arts: Kevin Bayas draws comic strips inspired by classic superhero artists like Jack Kirby, adds speech bubbles with witty jokes, and listens to gospel choir performances by the Winans and uplifting songs
    from Kirk Franklin, which fuel their imagination during creative sessions.
  travel: Kevin Bayas prefers family road trips with detailed itineraries, has visited Disneyland in California and the Grand Canyon, dreams of exploring the interactive LEGO Discovery Center in Berlin,
    and always packs a checklist of snacks, a map, and a small notebook for travel observations.
  culinary: Kevin Bayas loves honey‑glazed chicken nuggets, creamy mac and cheese made with sharp cheddar, and pepperoni pizza, often stirring the sauce and insisting on a dash of paprika for extra flavor,
    while occasionally sneaking a few cookies when no one’s watching.
  core: Kevin Bayas is a detail‑obsessed, rule‑loving seven‑year‑old whose fierce competitiveness, worry‑prone mind, and love for predictable adventures shape a world where every LEGO brick, baseball card,
    and puzzle piece must fit perfectly.
background:
  cultural: Kevin grows up in a Black family in Yazoo City, Mississippi, immersed in Southern African‑American culture. His family places a strong emphasis on church, where gospel music and weekly services
    shape his values and provide community support. He experiences regional traditions such as church picnics, neighborhood barbecues, and festivals that celebrate the Delta blues heritage. Family meals
    often feature Southern dishes like fried catfish, collard greens, and cornbread, reinforcing a sense of cultural identity. While Kevin prefers quieter moments and smaller groups, the close‑knit nature
    of his community and the emphasis on respect, perseverance, and responsibility from his elders influence his outlook and daily routines.
attributes:
  skills: '[''basic reading comprehension'', ''elementary addition and subtraction'', ''LEGO building'', ''jigsaw puzzle solving'', ''following game rules'', ''responsibility for simple household chores'']'
  hobbies: '[''reading adventure/mystery books'', ''LEGO building'', ''Minecraft'', ''collecting baseball cards'', ''playing catch'', ''drawing comic strips'', ''jigsaw puzzles'']'
  career_goals: Kevin often talks about wanting to become a firefighter because the job has clear rules, teamwork, and the chance to help people in need. He also imagines being a police officer or a baseball
    player, roles that involve competition, clear responsibilities, and a strong sense of duty. Occasionally he mentions the idea of being a teacher, where he could organize a classroom and guide younger
    kids, aligning with his love for structure and responsibility.
