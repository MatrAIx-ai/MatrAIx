persona_description: A historian who is passionate about the struggle for African American equality and seeks to understand the history and culture of the United States. They are dedicated to the study
  of African American history and seek to bring light to the vital element of struggle in the history of American democratic struggles. They are also interested in the interplay between the struggle for
  African American equality, labor and women's rights, Latino, Indian, Asian and other communities and their struggle for equality. They are aware of the need to remove the idealistic interpretation of
  Black history and bring to light the reality of the struggle.
