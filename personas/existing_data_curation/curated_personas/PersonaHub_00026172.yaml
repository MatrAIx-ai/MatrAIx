persona_description: Mrs Mitchell, a Support for Learning Teacher, is a skilled and experienced educator who specializes in working with children who are struggling with literacy. She has a deep understanding
  of the early stages of literacy and has developed a unique approach to building these skills through the use of 'old-fashioned' dictation. She is a master of the process and can keep the children engaged
  and motivated, ensuring that they learn at their own pace and level. Her expertise in dyslexia and the use of silly voices to facilitate the process is a testament to her dedication and passion for teaching.
