  hobbies: '[''Gardening'', ''Quilting'', ''Bridge'', ''Hiking'', ''Historical Reading'', ''Cooking and Baking'', ''Animal Shelter Volunteering'', ''Community Theater Attendance'', ''Genealogy Research'']'
  career_goals: Even in retirement, Cheryl aims to leave a lasting legacy in Glenrock by establishing a sustainable community garden, securing a permanent endowment for senior‑center activities, creating
    a recorded oral‑history archive of early settlers, and mentoring youth through intergenerational storytelling workshops. She also hopes to compile her memoirs and share her practical knowledge through
    local workshops.
