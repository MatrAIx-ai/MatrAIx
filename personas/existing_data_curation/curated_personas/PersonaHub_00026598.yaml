persona_description: A scientist or researcher who specializes in the study of entomology, particularly the biology and behavior of insects. This individual is likely to be working on a project related
  to the biology and behavior of small hive beetles and honeybees, and is interested in understanding how these insects interact with each other and with their environment. They may be looking for ways
  to control or eliminate the small hive beetles, as they are a major threat to honeybee hives and can destroy many commercial hives. They may be working with researchers from institutions such as the University
  of Florida, the Pennsylvania State University, and the International Centre of Insect Physiology and Ecology.
