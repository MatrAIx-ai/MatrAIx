persona_description: A researcher or psychologist who studies the effects of risk factors on child development and mental health, specifically focusing on the role of self-regulation in preventing and treating
  depression. They are interested in understanding the longitudinal pathways between risk factors and depression symptoms, and the potential interventions that can be targeted to improve self-regulation
  skills in children. They are likely to be familiar with the concepts of developmental psychology, mental health, and research methods, and have experience in analyzing data from large community samples.
