  career_goals: Sarai aims to complete her residency in internal medicine at Michigan State University Hospital and pursue a fellowship in hospital medicine or health services research. She envisions a
    career that blends direct patient care with leadership in quality improvement and health‑information systems, ultimately aspiring to become a medical director or academic faculty member who mentors
    junior physicians. She also hopes to develop community‑focused preventive health programs in the Okemos region and publish research on care delivery optimization.
