personas:
  professional: Sarai Palmer is a 23‑year‑old internal medicine resident at Michigan State University Hospital who blends meticulous charting, evidence‑based diagnostic reasoning, and a flair for interprofessional
    collaboration into a practice that prioritizes patient safety while spearheading quality‑improvement projects and health‑IT innovations.
  sports: Sarai Palmer is a regular participant in spin classes, weekend yoga sessions, and the local Great Lakes Trail Association hikes, avidly follows the Detroit Lions and Spartans football seasons,
    and in winter swaps the bike for cross‑country skiing with the Okemos Nordic Club, always tracking performance metrics on Strava.
  arts: Sarai Palmer finds creative release in landscape photography with a Canon EOS R, devours science‑fiction novels by Ann Leckie and Andy Weir, and builds weekly board‑game nights that feature strategy
    titles like Terraforming Mars while their playlists cycle between Tame Impala and classic jazz legends such as Miles Davis.
  travel: Sarai Palmer favors meticulously planned weekend getaways to Michigan’s Upper Peninsula and the Adirondacks, has already trekked the Inca Trail in Peru and dined on sushi in Tokyo, and dreams
    of a summer road‑trip through Norway’s fjords, all while balancing a resident’s limited budget by swapping accommodation for host‑family stays.
  culinary: Sarai Palmer enjoys crafting nutrient‑dense meals such as quinoa‑kale bowls with miso‑glazed salmon, Mediterranean falafel wraps, and spicy Thai green curry, relies on fresh avocado, tempeh,
    and heirloom tomatoes for flavor, and rates themselves as an intermediate home chef who often meal‑preps on Sundays for the week ahead.
  core: Sarai Palmer blends scientific rigor with social energy, turning every patient chart, hiking trail, and board‑game night into a carefully organized yet spontaneously enjoyable experience, even if
    the occasional back ache or impulse buy reminds them they’re still human.
background:
  cultural: Sarai grew up in a middle‑class, white family in Okemos, Michigan, with Irish and German roots. Her upbringing emphasized community involvement, self‑reliance, and the importance of education—a
    hallmark of Midwestern values. Family gatherings, seasonal potlucks, and participation in local church and volunteer events shaped her collaborative spirit. While she respects regional traditions, her
    exposure to the diverse patient population at a teaching hospital has broadened her cultural awareness and reinforced a commitment to inclusive, compassionate care.
