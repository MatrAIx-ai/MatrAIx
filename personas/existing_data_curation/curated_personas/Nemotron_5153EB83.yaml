personas:
  professional: Harold Obrien, a 14‑year‑old robotics enthusiast and high‑school club leader, balances meticulous planning with a love for coding; they spearhead the school’s robotics competitions while
    coordinating peers and managing project timelines.
  sports: Harold Obrien, a 14‑year‑old varsity basketball player for the Springfield High Tigers, also follows the NBA’s Chicago Bulls and the MLB’s Chicago Cubs, regularly trains at the community youth
    sports club, and balances competitive drills with weekend nature hikes that satisfy their need for structure and stress relief.
  arts: Harold Obrien, a 14‑year‑old guitar hobbyist with a penchant for sci‑fi soundtracks, spends evenings strumming along to Hans Zimmer film scores and Daft Punk electronic albums, while also devouring
    graphic novels like Saga and quoting lines from classic movies, which fuels their creative brainstorming for robotics projects.
  travel: Harold Obrien, a 14‑year‑old adventure‑oriented traveler, has explored Yosemite National Park and the Kennedy Space Center on family trips, dreams of hiking the Inca Trail to Machu Picchu, and
    prefers planning itineraries in their bullet‑journal while leaving room for spontaneous stargazing sessions.
  culinary: Harold Obrien, a 14‑year‑old budding cook, loves whipping up spaghetti carbonara with pancetta, Parmesan, and black pepper, enjoys snack‑sized pepperoni pizza slices, and experiments with homemade
    smoothies featuring banana, spinach, and almond milk, though they often forget to finish their vegetables before diving into video games.
  core: Harold Obrien, a disciplined 14‑year‑old sci‑fi nerd, orchestrates robotics projects, budgets allowance with micro‑investments, battles anxiety with mindfulness, scores on the basketball court,
    riffs on guitar, and blends structured planning with spontaneous curiosity, all while occasionally neglecting sleep for gaming marathons.
background:
  cultural: Harold grew up in the suburban community of Justin, Texas, within Denton County. His family’s heritage blends Anglo‑American roots with Irish ancestry, reflected in the surname O'Brien and occasional
    celebration of Irish traditions such as St. Patrick’s Day. The local culture emphasizes community involvement, hard work, and a strong value placed on education, while also offering exposure to the
    broader, diverse influences of the nearby Dallas metropolitan area. This mix of traditional Texan values, suburban middle‑class life, and an emerging tech‑savvy environment shapes Harold’s worldview,
    fostering both a respect for established methods and an openness to innovative ideas.
