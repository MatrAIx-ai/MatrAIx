  career_goals: Harold aims to pursue a career in engineering, with a particular interest in robotics or mechanical engineering, where he can blend his curiosity for new ideas with practical application.
    He plans to enroll in a STEM‑focused high school, earn a bachelor's degree in engineering, and eventually work on designing innovative, tangible solutions for industries such as aerospace or automotive
    technology. His disciplined nature drives him to set high academic standards, while his awareness of stress leads him to seek a balanced professional life that includes ongoing learning and occasional
    mentorship or advocacy for mental‑wellness among peers.
