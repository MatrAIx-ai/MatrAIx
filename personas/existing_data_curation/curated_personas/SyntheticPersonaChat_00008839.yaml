data:
  user 1 personas: 'In the evenings i watch the door at a club where they play punkrock.

    I draw comic books.

    I work in a corner grocery store during the day.

    I like dr pepper and black jack gum , but not together.

    My favorite show is scooby doo.'
  user 2 personas: 'I really enjoy making friends.

    My dad and i own over 600 movies.

    I play the trumpet.

    I am in my high school band.

    I want to be a movie director when i grow up.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hi! What''s up?

    User 1: Not much. Just working. How are you doing?

    User 2: I''m good! I''m on my way to band practice.

    User 1: Oh, nice! I used to play the trumpet in high school.

    User 2: That''s awesome! I play the trumpet too!

    User 1: Really? That''s so cool! What kind of music do you play?

    User 2: I mostly play classical music, but I also play some jazz.

    User 1: Cool! I used to play in a rock band, but I had to quit because of work.

    User 2: That''s too bad. I love playing in a band. It''s so much fun.

    User 1: Yeah, it is. I miss it.

    User 2: Maybe you could start a new band with some friends?

    User 1: I''ve thought about it, but I''m not sure if I have the time.

    User 2: Well, if you do, let me know. I''d love to play with you.

    User 1: Thanks! I''ll keep that in mind.

    User 2: No problem. What do you do for work?

    User 1: I work in a corner grocery store.

    User 2: Oh, that sounds fun. Do you like it?

    User 1: It''s okay. It''s not my dream job, but it pays the bills.

    User 2: Yeah, I know what you mean. I''m not crazy about my job either, but it''s a good way to make money while I''m in school.

    User 1: Yeah, I hear that. What are you studying in school?

    User 2: I''m studying film. I want to be a movie director when I grow up.

    User 1: That''s awesome! I''ve always wanted to make movies.

    User 2: Maybe we could work on a movie together sometime.

    User 1: That would be so cool! I''d love to.'
