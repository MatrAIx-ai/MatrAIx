  hobbies: '[''Cooking Indian and Punjabi cuisine'', ''Gardening'', ''Yoga'', ''Cycling around local parks'', ''Volunteering at a food bank'', ''Reading self‑development books'', ''Attending South Asian
    cultural festivals'', ''Exploring new recipes'']'
  career_goals: Amrita aims to advance within the logistics field by obtaining a certified commercial driver’s license (CDL) and a Certified Logistics Associate (CLA) credential. She aspires to move into
    a supervisory role such as a delivery team lead or shift coordinator, where she can mentor newer couriers, design efficient routing schedules, and contribute to process improvements. Over the next five
    years she plans to enroll in part‑time logistics courses to deepen her knowledge of supply‑chain management, with the longer‑term ambition of transitioning to a warehouse operations manager position
    or potentially launching her own small, community‑focused courier service that emphasizes reliability and cultural sensitivity.
