persona_description: Susan Wethington, an ecologist and co-founder and executive director of the Hummingbird Monitoring Network (HMN), a group dedicated to maintaining hummingbird populations and their
  habitats. Her work focuses on understanding the migration patterns, survival, reproduction, and adaptation of hummingbirds to climate change, and collaborating with scientists and researchers to study
  how these birds adapt to the changing climate. Wethington's expertise in hummingbird biology, habitat conservation, and climate change research has made her a leading figure in the study of these fascinating
  creatures.
