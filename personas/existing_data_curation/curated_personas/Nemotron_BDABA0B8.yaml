  career_goals: Delores dreams of becoming someone who can combine her love for art and helping others. She often imagines working as a veterinarian so she can care for animals, or as an elementary school
    teacher where she can nurture curious minds and create a harmonious classroom. She also expresses interest in becoming a wildlife artist, drawing and painting the landscapes and creatures of Nevada,
    hoping her art can raise awareness about preserving nature. Occasionally she pretends to be an astronaut exploring new worlds, reflecting her open‑minded and adventurous spirit.
