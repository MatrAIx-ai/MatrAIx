personas:
  professional: A seasoned environmental technician with three decades of field and lab experience, Sandra Plant leverages their curious, low‑cost problem‑solving mindset to mentor junior staff while seeking
    flexible consulting roles that let them blend science and art.
  sports: A low‑impact fitness enthusiast who hikes the Cascades with the Lakewood Trail Runners, follows the Seattle Kraken for hockey, and joins the occasional community softball league for social fun,
    Sandra Plant stays active while protecting the knees affected by osteoarthritis.
  arts: A watercolor hobbyist who paints Pacific Northwest scenery after solitary hikes, Sandra Plant also devotes evenings to listening to Bob Dylan and Joni Mitchell, and regularly visits the Tacoma Art
    Museum to view works by Emily Carr and local folk‑art displays.
  travel: An avid weekend explorer who plans yearly trips to Olympic National Park and the San Juan Islands, Sandra Plant has taken a nostalgic road‑trip to Vancouver and dreams of tracking the Northern
    Lights in Iceland while balancing a modest travel budget.
  culinary: A modest home cook with a penchant for baking, Sandra Plant whips up pan‑roasted salmon seasoned with dill and lemon, bakes sourdough loaves using local rye flour, and often experiments with
    blackberry crisp for a soothing treat after a stressful day.
  core: Sandra Plant, a 61‑year‑old curious scientist‑artist, blends methodical environmental expertise with spontaneous watercolor creations, navigating retirement with a gentle mix of mentorship, modest
    budgeting, and a lingering habit of worrying about unfinished tasks.
background:
  cultural: Sandra is a white American who has spent most of her life in the Pacific Northwest. Raised in a working‑class family during the post‑war era, she grew up with the modest, self‑reliant values
    of the region’s mid‑century communities. Her family’s heritage traces back to Northern and Central European immigrants, which is reflected in traditional holiday celebrations and an appreciation for
    folk music. Living in Lakewood, Pierce County, she identifies strongly with the outdoors‑oriented culture of the Puget Sound area, valuing environmental stewardship, community cooperation, and a relatively
    informal social etiquette. While she respects the Indigenous histories of the lands around her, her personal cultural experience is shaped by mainstream American norms blended with the region’s distinctive
    emphasis on nature and modesty.
