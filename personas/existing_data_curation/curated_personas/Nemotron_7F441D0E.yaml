  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Nature photography'', ''Reading popular science books'', ''Hiking local trails'', ''Gardening native plants'', ''Attending local art exhibitions'',
    ''Participating in small book discussion groups'', ''Journaling'', ''Baking experimental recipes'']'
  career_goals: As she approaches retirement, Sandra seeks a flexible, part‑time role that lets her share her accumulated knowledge while reducing everyday stress. Her primary ambition is to become a mentor
    or consultant for younger technicians within her current agency or at a local environmental nonprofit, guiding them in sample collection, instrument upkeep, and data integrity. She hopes to contribute
    to community‑based monitoring projects that protect the Puget Sound watershed and to develop a small portfolio of scientific photographs that combine her technical eye with her love of art. Ultimately,
    Sandra aims to balance continued intellectual engagement with a calmer work life, possibly volunteering for science outreach events at the local museum or community college.
