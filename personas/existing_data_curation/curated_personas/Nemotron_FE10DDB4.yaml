personas:
  professional: Amia Easterling, a high‑school senior whose practical mindset and gentle interpersonal style already shine through as a peer tutor, first‑aid volunteer, and coordinator of garden‑to‑table
    fundraisers, is laying the groundwork for a future career as a community‑focused registered nurse, and they eagerly seek mentorship from local healthcare professionals.
  sports: Amia Easterling, a dedicated member of the high‑school track club who relishes early‑morning mile runs, fuels their motivation by cheering for the Auburn Tigers football squad and the Atlanta
    Falcons, and they round out their fitness routine with occasional community softball games at the town park.
  arts: Amia Easterling expresses artistic passion through harmonious gospel singing in the church choir, drawing inspiration from Kirk Franklin and the storytelling of Sarah J. Maas, while they unwind
    by sketching historic town scenes in a soft, impressionistic style reminiscent of Claude Monet during solitary walks.
  travel: Amia Easterling prefers carefully budgeted weekend getaways that blend nature and family time, having already explored Savannah’s historic squares and the misty trails of the Great Smoky Mountains,
    and they dream of a future spring trip to New Orleans’ vibrant music districts once a scholarship fund eases the travel costs.
  culinary: Amia Easterling delights in cooking Southern staples such as crisp fried chicken, buttery cornbread, and collard greens simmered with smoked ham hocks, and they often bake peach cobbler spiced
    with a hint of cinnamon for community fundraiser bake sales.
  core: Amia Easterling blends an affection for orderly routines with heartfelt community service, juggling choir rehearsals, garden planting, and meticulous budgeting while they secretly hoard glitter‑filled
    crafting supplies for late‑night projects.
background:
  cultural: Amia is a Black teenager raised in Douglas, Georgia, a small town with deep Southern roots and a vibrant African‑American community. Her upbringing is shaped by the strong influence of her family
    and the local church, where gospel music, storytelling, and communal support are central. She grows up with an appreciation for Southern hospitality, food traditions such as biscuits, collard greens,
    and peach cobbler, and the value of close‑knit neighborhood ties. The legacy of civil‑rights activism and resilience in the Black community informs her sense of purpose and her desire to give back.
    While she embraces the cultural heritage passed down from generations—like the emphasis on collective well‑being and the celebration of music and food—she also navigates the challenges of being a young
    Black woman in a rural setting, drawing strength from her community’s emphasis on education, faith, and perseverance.
attributes:
  skills: '["Basic computer proficiency (Microsoft Office, email)", "Event planning and coordination for church youth group", "Effective interpersonal communication and conflict mediation", "Childcare and
    peer tutoring", "Meal planning and Southern cooking", "Gardening and basic horticulture", "Time management and scheduling", "Fundraising and community outreach", "Basic first‑aid knowledge"]'
  hobbies: '["Church choir singing", "Reading contemporary YA literature", "Crafting (bracelets, crocheting)", "Baking and cooking Southern dishes", "Volunteering at the community garden", "Track and field
    club", "Sketching nature scenes", "Attending local county fairs and community events"]'
  career_goals: Amia is determined to complete her high school diploma and then enroll in a community college program that aligns with her caring nature and desire to serve her rural community. She is particularly
    interested in nursing or a community health worker pathway, aiming to become a registered nurse who can address health disparities in Coffee County. In the longer term, she hopes to obtain a bachelor's
    degree in public health or health education, so she can design preventive health programs and health‑literacy workshops for teenagers. Parallel to her academic aspirations, Amia wishes to contribute
    financially to her family, and she envisions a career that blends practical hands‑on work, empathetic patient care, and community advocacy.
