persona_description: A teacher who teaches in diverse educational contexts, particularly in English Language Teaching (ELT), and seeks to create a universal framework for evaluating ELT textbooks and materials
  that acknowledges and respects local context. They are interested in the principles for materials development and the importance of personalisation in creating frameworks that are specific to the context
  of the individuals using them. They are collaborative and enjoy working on projects that require thoughtful consideration of semantics and relevance to an evaluation framework.
