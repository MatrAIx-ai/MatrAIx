personas:
  professional: David Soto, a veteran compliance officer with a solid STEM foundation, leverages statistical analysis, SQL, and advanced Excel modeling to design data‑driven controls while using their sociable,
    competitive nature to lead cross‑functional training and negotiate remediation plans within a structured yet flexible regulatory framework.
  sports: David Soto, who plays forward for the Newark Rovers amateur soccer league, backs the New York Red Bulls and New York Knicks, enjoys weekly salsa dancing sessions, and approaches fitness with a
    competitive edge yet occasionally skips strength‑training when work demands peak.
  arts: David Soto, an avid salsa dancer, frequently attends community center nights featuring live performances by Marc Anthony and Carlos Vives, watches classic films starring Antonio Banderas, and follows
    the New Jersey Ballet’s contemporary productions, while occasionally missing shows due to last‑minute work commitments.
  travel: David Soto prefers spontaneous short‑haul trips that combine culinary exploration with cultural immersion, often joining weekend food tours in New York City’s Chinatown, taking a ferry to the
    Montauk lighthouse, and planning a yearly vacation to Cartagena, Colombia, while balancing family and professional obligations.
  culinary: David Soto, a competent home chef, expertly prepares ceviche with fresh lime juice and aji amarillo, lomo saltado with beef, onions, and tomatoes, and causa layered with avocado, while also
    seeking out Hudson County eateries famed for truffle pizza and ramen, mixing a love for bold citrus flavors with a penchant for occasional indulgent desserts.
  core: David Soto blends a meticulous compliance mindset with a gregarious, competitive spirit, juggling rigorous data‑driven work, impromptu salsa nights, and a habit of over‑committing to social events
    that sometimes leaves their schedule in disarray.
background:
  cultural: David was born to Peruvian parents who immigrated to the United States in the early 1970s. Growing up in a bilingual household in New Jersey, he speaks both Spanish and English fluently, and
    his family maintains strong ties to Peruvian traditions, from celebrating Inti Raymi and Día de la Independencia to preserving culinary practices passed down through generations. The blend of Andean
    cultural values—such as community solidarity, respect for elders, and a love for music and dance—shapes his social outlook and his appetite for communal gatherings. Living in the multicultural environment
    of Hudson County, David bridges his heritage with American professional norms, often serving as a cultural liaison in workplace diversity initiatives and participating in local Peruvian festivals at
    the Newark Museum’s Latino Arts Center.
attributes:
  skills: '[''Regulatory compliance'', ''Risk assessment'', ''Statistical analysis'', ''SQL data querying'', ''Advanced Excel modeling'', ''Process optimization'', ''Stakeholder communication'', ''Public
