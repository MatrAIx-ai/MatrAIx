  hobbies: '[''Amateur soccer'', ''Salsa dancing'', ''Cooking Peruvian cuisine'', ''Exploring Hudson County food scene'', ''Chess'', ''Poker'', ''Reading leadership and self-improvement books'', ''Mentoring
    at-risk youth'', ''Attending networking events'']'
  career_goals: David aspires to move into senior leadership within compliance, targeting a Chief Compliance Officer role for a multinational financial services firm operating in both the U.S. and Latin
    America. He aims to build a reputation as a thought leader on emerging digital‑asset regulations, publishing white papers and speaking at industry conferences. Over the next five years, he plans to
    develop a comprehensive compliance training program that blends rigorous standards with interactive, scenario‑based learning, leveraging his sociable nature to engage participants. Additionally, David
    is interested in launching a boutique consultancy that helps mid‑size firms design flexible yet robust compliance frameworks, allowing him to apply his competitive drive and practical mindset to entrepreneurial
    ventures.
