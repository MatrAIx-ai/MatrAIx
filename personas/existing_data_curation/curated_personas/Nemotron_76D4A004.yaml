personas:
  professional: Anna Harrison is a detail‑oriented accountant at a regional firm who leverages advanced Excel, QuickBooks, and SAP ERP to automate audit workflows, while their innate curiosity drives them
    to blend forensic accounting techniques and sustainability metrics into senior‑level engagements, and they often trade meticulous spreadsheets for spontaneous sketching sessions, occasionally misplacing
    work files due to a relaxed, flexible approach to deadlines.
  sports: Anna Harrison follows the New York Knicks in winter, the New York Giants in fall, and the New York Yankees in summer, while they play in a local co‑ed softball league on Saturdays, hike the Watchung
    Reservation weekly, and keep fit through Thursday night yoga sessions at a community studio.
  arts: Anna Harrison is an avid watercolor painter and street photographer who draws inspiration from Georgia O'Keeffe and the urban murals of Banksy, frequents MoMA and the Montclair Art Museum for fresh
    ideas, and they enjoy live shows at the Bowery Ballroom featuring artists like Phoebe Bridgers and The Strokes.
  travel: Anna Harrison prefers spontaneous weekend getaways, having explored Philadelphia, Boston, and Washington D.C., while daydreaming about a future trip to Kyoto’s cherry‑blossom festivals, and they
    usually book budget Airbnb stays but allocate extra funds for culinary experiences and local cultural festivals.
  culinary: Anna Harrison’s palate leans toward spicy tuna poke bowls, vegan jackfruit tacos, and artisanal sourdough Margherita pizza, and they enjoy cooking Mediterranean mezze at home with fresh basil,
    tamari, and quinoa, though they often cap late‑night gallery evenings with a steaming bowl of ramen.
  core: Anna Harrison blends a chaotic love for watercolor pigments with meticulous number‑crunching, turning spreadsheets into visual stories while they habitually lose their keys in a sea of paint tubes
    and misplace files when deadlines loom.
background:
  cultural: Anna was raised in a middle‑class, suburban family in Edison, New Jersey. Her heritage traces back to Irish and English ancestors, and she grew up celebrating typical American holidays while
    also being exposed to the multicultural vibrancy of Middlesex County. This environment fostered an appreciation for diverse perspectives and artistic expression. Her upbringing emphasized education
    and community involvement, shaping her collaborative yet independent outlook in both personal and professional spheres.
