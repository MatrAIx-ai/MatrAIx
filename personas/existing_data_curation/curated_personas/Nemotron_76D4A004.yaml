  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Street photography'', ''Live music concerts'', ''Weekend travel and cultural exploration'', ''Reading contemporary fiction'', ''Yoga'',
    ''Hiking in the Watchung Reservation'', ''Cooking experimental dishes'', ''Volunteer financial literacy workshops'']'
  career_goals: Anna aims to become a Certified Public Accountant within the next two years and advance to a senior auditor role at a reputable firm. She envisions leading audit engagements that incorporate
    sustainability reporting and data analytics. Long‑term, she aspires to manage a team of auditors, mentor junior colleagues, and eventually pursue partnership or an internal finance leadership position
    where she can blend her analytical rigor with her creative problem‑solving instincts.
