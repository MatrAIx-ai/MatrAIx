personas:
  professional: John Runnion is a seasoned accountant and auditor who leverages his methodical expertise in financial reporting, tax compliance, and data analytics to design systematic audit processes while
    championing collaborative, technology-driven teams, and they aim to lead a finance department that blends innovation with a supportive culture.
  sports: John Runnion follows the St. Louis Cardinals and the Arkansas Razorbacks, plays casual softball on weekends with the local church league, hikes the Ozark foothills year-round, often joins the
    regional Trailblazers Running Club for early-morning training runs, and they relish the camaraderie and the sense of balance it brings to a hectic work schedule.
  arts: John Runnion enjoys acoustic guitar sessions inspired by John Mayer and Chris Stapleton, reads Southern literature classics like William Faulkner and Flannery O'Connor, regularly attends performances
    by the Arkansas Symphony Orchestra and community theater productions, and they find that music and literature provide a soothing counterpoint to the analytical demands of their profession.
  travel: John Runnion prefers well-planned road trips that blend scenic hikes with cultural stops, having explored Asheville's Blue Ridge Parkway, Charleston's historic district, and New Orleans' jazz
    scene, while dreaming of a family getaway to the Great Smoky Mountains and Savannah's riverfront, and they often map each itinerary in a spreadsheet to keep costs under control.
  culinary: John Runnion cooks Southern comfort meals such as fried catfish, collard greens with smoked turkey, cornbread, and shrimp étouffée, often using garden-fresh herbs like basil and thyme, their
    skill ranges from competent home cook to occasional grill master during weekend barbecues, and they delight in sharing these dishes with family and friends as a way to nurture community ties.
  core: John Runnion is a detail-driven accountant who channels their compassion into community service, balances a love of nature and music with a perpetual worry about deadlines, and they habitually obsess
    over spreadsheets even in free time.
background:
  cultural: John grew up in a small town in Arkansas, inheriting Southern cultural values of hospitality, community service, and a strong work ethic. His family traditions include church involvement, weekend
    barbecues, and an appreciation for country and bluegrass music. These cultural roots, combined with his business education, shape his balanced practical outlook and his commitment to helping others
    in his community.
