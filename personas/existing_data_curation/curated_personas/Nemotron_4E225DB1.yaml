  career_goals: John aims to become a senior finance manager or controller within the next five years, pursuing CPA certification and further training in forensic accounting and data analytics. He aspires
    to lead a department that integrates innovative technology while fostering a collaborative culture, and he hopes to mentor junior staff and eventually contribute his expertise to community nonprofit
    financial education programs.
