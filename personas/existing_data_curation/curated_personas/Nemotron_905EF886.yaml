  career_goals: Ethan aims to become a senior associate and then a partner at his Fairfax‑based corporate law firm within the next five years. He is working toward leading a practice group focused on real
    estate transactions and corporate compliance. He also aspires to mentor junior associates, develop a pro bono program that provides legal assistance to low‑income small businesses, and eventually establish
    his own boutique firm offering affordable corporate counsel. To broaden his skill set, he plans to pursue an advanced certification in alternative dispute resolution.
