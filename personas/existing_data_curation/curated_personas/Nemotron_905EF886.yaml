personas:
  professional: Ethan Harley, a 35-year-old corporate and real-estate attorney, leverages their detail-oriented, methodical mindset and strong research, drafting, and negotiation skills to lead complex
    transactions while nurturing junior staff and maintaining a collaborative office culture.
  sports: Ethan Harley is a regular participant in the Fairfax County early-morning run club, logs 30-mile weekly runs through Lake Accotink, hits the weight-training floor at FitLife Gym three times a
    week, and passionately follows the Washington Nationals and the Washington Capitals, cheering them on each season.
  arts: Ethan Harley enjoys classic legal thrillers by John Grisham and true-crime narratives like the Serial podcast, attends occasional performances at the Kennedy Center, and keeps a curated vinyl collection
    featuring Bob Dylan, Adele, and the Dubliners, which reflects their love for storytelling and a touch of cultural tradition.
  travel: Ethan Harley delights in weekend getaways to the Shenandoah Valley’s Skyline Drive for hikes and photography, has taken a culinary tour of New York City’s fish markets, and plans a future trip
    to Galway to experience St. Patrick’s Day festivities while exploring coastal real-estate opportunities.
  culinary: Ethan Harley experiments with grilled salmon brushed with lemon-dill butter and seasonal salads dotted with arugula, heirloom tomatoes, feta, and toasted walnuts, showcasing a moderate cooking
    skill set that blends health-conscious choices with a penchant for weekend culinary projects.
  core: Ethan Harley is a meticulous 35-year-old attorney who balances rigorous legal work with disciplined fitness, precise budgeting, and a quiet love for puzzles, grilled fish, and community service,
    all while occasionally indulging in late-night true-crime podcasts.
background:
  cultural: Ethan comes from a middle‑class, suburban upbringing in Northern Virginia. His family traces its roots to Irish and English ancestry, and he grew up attending local public schools where civic
    engagement and community service were emphasized. He celebrates traditional American holidays such as Thanksgiving and Independence Day, and with his family maintains some Irish customs, like St. Patrick’s
    Day gatherings. Though not deeply religious, he was raised in a United Methodist household and respects the community’s pluralistic values. Living in Fairfax, he benefits from a diverse cultural environment,
    which informs his collaborative and considerate approach to both his professional and personal life.
