  career_goals: Melissa aims to re‑enter the workforce in a role that leverages her humanities background and community‑service experience. She is pursuing a certificate in library and information science
    to become a community librarian or outreach coordinator, where she can combine her love for reading with her event‑planning skills. She also seeks a part‑time administrative position at a nonprofit
    that serves under‑represented populations, providing stability while allowing her to maintain a predictable daily routine. Long‑term, she envisions leading cultural programming that celebrates African‑American
    history in Aurora, possibly as a museum docent or heritage project manager.
