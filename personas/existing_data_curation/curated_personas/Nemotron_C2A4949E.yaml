personas:
  professional: Melissa Sapp, a community-oriented aspiring librarian with a humanities background, leverages meticulous event-planning and budgeting skills from their church volunteer work to design inclusive
    literacy programs, while they often over-prepare materials to the point of personal burnout.
  sports: Melissa Sapp, an enthusiastic participant in community garden volunteer days and a regular evening walker in Aurora's Meadow Park, follows the Aurora Thunderbolts baseball schedule and attends
    occasional high school soccer matches, preferring low-impact exercise over intense cardio routines.
  arts: Melissa Sapp, a choir member at their local church where gospel and R&B harmonies inspire evenings, enjoys classic films such as "Casablanca" and "Gone with the Wind," and frequently discusses works
    by Toni Morrison and James McPherson with a book club, using artistic engagement to balance daily stresses.
  travel: Melissa Sapp, who favors organized short-haul trips that fit into a predictable schedule, has visited Savannah, Georgia for its historic districts, plans a weekend getaway to Charleston, South
    Carolina to explore Southern culinary roots, and relies on set itineraries to minimize travel-related anxiety.
  culinary: Melissa Sapp, a confident home cook who specializes in Southern comfort dishes such as shrimp and grits, collard greens, and peach cobbler, experiments with seasonal garden herbs like basil
    and thyme, follows a weekly meal-prep routine, yet they sometimes over‑spice recipes when stressed.
  core: Melissa Sapp, a routine-loving community-service enthusiast who balances careful planning with a love for soulful Southern cooking, journaling, and choir singing, yet battles chronic worry that
    can turn meticulousness into over‑checking.
background:
  cultural: Melissa identifies as a Black woman raised in the Midwest, with family roots tracing back to the Great Migration. Her cultural identity is shaped by the strong communal bonds of her local African‑American
    church, which emphasizes storytelling, music, and shared meals. Family gatherings often feature soul food, gospel singing, and discussions of civil‑rights history, reinforcing a sense of pride and resilience.
    Living in Aurora, she blends Midwestern practicality with the rich traditions of Black culture, drawing on both to navigate daily life. Her heritage informs her appreciation for oral history, collective
    support, and the importance of preserving cultural narratives within her community.
