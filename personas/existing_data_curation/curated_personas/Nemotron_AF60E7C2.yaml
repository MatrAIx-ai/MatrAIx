  hobbies: '[''Landscape painting'', ''Quilting'', ''Woodworking'', ''Snowshoeing'', ''Birdwatching'', ''Historical fiction reading'', ''Community gardening'', ''Photography'', ''Folk music listening'',
    ''Journaling'']'
  career_goals: Approaching retirement, Alysha aims to obtain a certified safety trainer credential so she can formally train and certify the next generation of heavy‑equipment operators. She wants to lead
    community initiatives that promote sustainable farming practices and improve workplace safety in Aroostook County. Additionally, she hopes to document and share the region’s agricultural heritage through
    photography and small art projects, while continuing her volunteer work at the local senior center and community garden.
