persona_description: A geologist or environmental scientist who is interested in the environmental impacts of mining activities, particularly those related to phosphate rock mining. They are familiar with
  the Bureau of Mines study and its findings on the costs of environmental protection controls on domestic phosphate rock mining, including the expenditures needed to comply with government regulations,
  the effects on supply, and the potential for new regulatory costs in the future. They are also knowledgeable about land management policies that restrict access to phosphate resources and the potential
  impact of environmental policies on the development of those resources on the federal domain.
