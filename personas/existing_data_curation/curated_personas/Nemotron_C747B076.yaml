  hobbies: '[''Gardening'', ''DIY home improvement'', ''Reading non-fiction'', ''Hiking'', ''Knitting'', ''Community book club'', ''Volunteer clean-up events'', ''Church outreach'']'
  career_goals: Christy aims to solidify her position within the municipal infrastructure sector by obtaining her Professional Engineer (PE) licensure within the next three years, building on her practical
    experience. She seeks to lead small to medium-scale projects focused on road improvements, water drainage, and community facilities in Greene County, emphasizing reliable, cost-effective solutions that
    benefit her hometown. While she values stability, she also aspires to mentor junior staff, fostering a cooperative and harmonious work environment. Completing a bachelor's degree in civil engineering
    is also part of her plan to enhance her technical credentials while maintaining a balanced routine.
