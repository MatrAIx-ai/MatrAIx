personas:
  professional: Terric Woods is a retired master carpenter who blends his lifelong woodworking expertise with meticulous project management to design custom furniture, mentor youth in a community woodworking
    workshop, and organize genealogical archives, all while maintaining a calm, competitive edge that drives them to excel in every task.
  sports: Terric Woods enjoys low‑impact fitness through daily neighborhood walks, follows the local minor‑league baseball team the Springfield Thunderbirds, participates in a senior softball league, and
    attends weekly senior yoga classes at the community center, balancing their competitive spirit with a relaxed approach to staying active.
  arts: Terric Woods immerses themselves in the arts by singing in the church choir, appreciating gospel and blues legends such as Mahalia Jackson and B.B. King, reading biographies of civil‑rights leaders
    and historical figures, and collecting vintage woodworking manuals, which together shape their appreciation for storytelling and cultural heritage.
  travel: Terric Woods enjoys road‑tripping to historic Southern towns like Savannah and Charleston, revisiting national landmarks in Washington, D.C., and planning future pilgrimages to family roots in
    the Deep South, favoring relaxed itineraries that blend cultural tours with opportunities to sample local cuisine, and they prefer to travel on a modest budget.
  culinary: Terric Woods cooks Southern comfort food with a garden‑to‑table twist, perfecting collard greens simmered with smoked ham hocks, sweet‑potato pie spiced with nutmeg, and fresh tomato relish,
    while their moderate culinary skill shows in a willingness to try new spice blends and preserve the harvest for winter.
  core: Terric Woods is a calm, resilient retiree who fuses woodworking, genealogy, and community service into a competitive yet thoughtful lifestyle, balancing solitary crafts with spirited chess battles
    and soulful choir singing, and they rarely let anxiety or doubt disrupt their routine.
background:
  cultural: Terric grew up as an African American in the Black Belt region of North Carolina, where church, family ties, and oral storytelling were central to community life. The legacy of the civil‑rights
    movement and the perseverance of his grandparents in sharecropping and later industrial work have instilled a deep sense of resilience and pride. His cultural identity is expressed through gospel music,
    Southern soul food, and a commitment to passing down traditions—whether through cooking family recipes, sharing family history, or mentoring younger neighbors. This heritage shapes his calm demeanor,
    his practical approach to problem‑solving, and his desire to give back to the Shelby community.
attributes:
  skills: '["Carpentry and Woodworking","Mechanical Repair","Garden Planning and Organic Gardening","Budgeting and Personal Finance","Genealogy Research","Community Organizing","Chess Strategy"]'
  hobbies: '["Woodworking","Reading African American History","Community Gardening","Chess","Church Volunteer Work","Genealogy Research","Southern Cooking"]'
  career_goals: 'Although retired, Terric aims to channel his curiosity and practicality into a legacy project: creating a digitized archive of his family’s oral histories and sharing it with local schools
    and the historical society. He plans to launch a youth woodworking workshop at the community center, teaching hands‑on skills while fostering disciplined, competitive spirit. He also hopes to expand
    the neighborhood garden into a sustainable food‑share program for seniors, combining his organizational talents with his love of flexible, outdoor work. Finally, he intends to compete in the state senior
    chess championship, targeting a top‑three finish as a personal benchmark.'
