personas:
  professional: Patricia Harrell, an office administrator in a small-town setting, leverages their meticulous calendar management, QuickBooks bookkeeping, and warm customer service to keep the workplace
    humming while using their curiosity and love of the arts to infuse community events with creative flair, though they sometimes worry about missing deadlines.
  sports: Patricia Harrell, an avid weekend kayaker who rows through the local bayous, participates in a community soccer league, supports the LSU Tigers football team and the New Orleans Pelicans, and
    uses their membership in the Bayou Outdoor Club to stay fit and social.
  arts: Patricia Harrell, a watercolor landscape painter inspired by the bayous, a dedicated quilt and crochet enthusiast, frequent visitor to the Festival International de Louisiane, and fan of zydeco
    legends like Clifton Chenier and contemporary visual artist Banksy, weaves their love for classic and avant‑garde art into their gatherings.
  travel: Patricia Harrell, a travel enthusiast who dreams of exploring the historic streets of New Orleans, the jazz clubs of Austin, and the mangroves of the Everglades, has already taken weekend trips
    to Asheville and Charleston, and they plan a future cultural immersion trip to Marrakech to study North African textile patterns.
  culinary: Patricia Harrell, a home chef who skillfully prepares Cajun classics such as gumbo with Andouille sausage, shrimp étouffée, and jambalaya, experiments with file powder and okra, and enjoys pairing
    their dishes with homemade beignets, while they occasionally over‑spice in their quest for bold flavor.
  core: Patricia Harrell blends meticulous organization with artistic curiosity, juggling office leadership aspirations, a love of watercolor and Cajun cooking, and a constant battle with anxiety that they
    meet through yoga and mindfulness.
background:
  cultural: Patricia comes from a white Southern family rooted in the rural communities of Evangeline Parish, Louisiana. Growing up in Ville Platte, she was immersed in the unique blend of traditional Southern
    hospitality and the French‑Acadian (Cajun) cultural heritage that defines central Louisiana. While her family background is primarily Anglo‑American, the local customs—Mardi Gras celebrations, zydeco
    music, Cajun cuisine, and occasional Cajun French phrases—have shaped her cultural identity. She was raised in a close‑knit, church‑oriented community that values cooperation, harmony, and service to
    neighbors. Completing high school locally, she entered the workforce directly, developing a strong work ethic common to small‑town Louisiana. Her upbringing emphasizes community involvement, reverence
    for regional arts and food, and a balanced appreciation for both stability and creative expression.
attributes:
  skills: '["Calendar management","Multi‑line phone system operation","Data entry and record keeping","Microsoft Office Suite (Word, Excel, PowerPoint)","Google Workspace (Docs, Sheets, Calendar)","Basic
