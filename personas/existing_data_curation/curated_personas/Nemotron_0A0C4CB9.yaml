personas:
  professional: A high‑school student who channels their love for strategic RPGs into budding game‑design skills, Omelio Pino combines meticulous planning, basic Python coding, and disciplined journaling
    to prototype narrative‑driven mini‑games while maintaining a reliable, routine‑oriented study schedule.
  sports: Omelio Pino roots for the Cangrejeros de Santurce in basketball and Puerto Rico FC in soccer, yet their personal activity consists mostly of occasional pick‑up basketball at the neighborhood gym
    and a weekly jogging routine to manage stress.
  arts: Omelio Pino’s artistic life revolves around listening to Latin pop icons Bad Bunny, Karol G, and classic salsa legend Héctor Lavoe while practicing guitar chords, devouring sci‑fi novels by Neal Stephenson
    and mystery thrillers by Gillian Flynn, and drawing inspiration from cinematic scores of Hans Zimmer.
  travel: Omelio Pino prefers meticulously planned short trips, having explored Old San Juan’s colonial streets and El Yunque rainforest with family, while dreaming of a future solo pilgrimage to Tokyo’s
    Akihabara district for gaming conventions and a cultural immersion in Barcelona’s Gothic Quarter.
  culinary: Omelio Pino enjoys helping prepare family‑heritage dishes such as mofongo, arroz con gandules, and pastelón, savoring the aromatic blend of sofrito, plantains, and smoked pork, while also craving
    comfort foods like pepperoni pizza and experimenting with homemade salsa verde for their cooking repertoire.
  core: Omelio Pino is a routine‑driven, introspective teen who balances strategic gaming, careful budgeting, and a proactive fight against anxiety, all while quietly nurturing a love for Latin rhythms
    and family‑rooted cooking.
background:
  cultural: Omelio was raised in a bilingual Puerto Rican household in Malvern, Pennsylvania. Spanish is spoken at home, and cultural traditions such as celebrating Three Kings Day, cooking dishes like
    arroz con gandules and mofongo, and listening to Latin music are regularly practiced. His family stays connected to the wider Puerto Rican diaspora in the Philadelphia area, attending cultural events
    at community centers and participating in church gatherings that reinforce values of family cohesion, respect for elders, and practicality. These cultural influences shape his identity, language use,
    and his desire to give back to his community.
