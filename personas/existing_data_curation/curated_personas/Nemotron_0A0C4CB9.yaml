  career_goals: Omelio aspires to a career that offers clear, repeatable tasks and a stable work environment. He is interested in pursuing a technical pathway, such as information technology support or
    a skilled trade like automotive repair or HVAC maintenance. His plan includes attending a technical college after high school, earning certifications such as CompTIA A+ or an automotive technician certificate,
    and eventually securing a position that provides financial security for himself and his family. He also hopes to use his bilingual skills to assist the local Puerto Rican community, perhaps through
    customer service or community outreach roles.
