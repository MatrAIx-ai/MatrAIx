personas:
  professional: Kevin Worthy is a budding toddler explorer who already organizes their block towers with surprising practicality, showing an early curiosity for cause-and-effect and a knack for sharing
    toys in cooperative play.
  sports: Kevin Worthy enthusiastically joins the local preschool’s soccer mini‑league, cheering for the Chicago Cubs mascot during game day visits and energetically sprinting in circle games at the community
    park’s toddler playground, and they proudly wave a tiny flag after each goal.
  arts: Kevin Worthy delights in drawing bold crayon squiggles of dinosaurs, humming along to the playful tunes of Disney’s 'Moana', and watching animated short films by Pixar, which shape their imaginative
    world during family movie nights.
  travel: Kevin Worthy loves family trips to the nearby zoo, where they excitedly point at giraffes, enjoy weekend beach outings with sandcastle building, and dream of visiting the giant aquariums in San
    Diego someday.
  culinary: Kevin Worthy prefers finger foods like chicken nuggets, mac‑and‑cheese, and banana slices, proudly demanding a side of peas while insisting on a tiny drizzle of ketchup, and they are learning
    to stir their own oatmeal with a plastic spoon.
  core: Kevin Worthy is a curious, energetic toddler who balances practicality with imagination, declares ownership of their piggy bank, navigates allergies with a brave Band‑Aid, and fills each day with
    block building, cartoon tunes, and spontaneous playground sprints.
background:
  cultural: Kevin is raised in a Black family in Harvest, Limestone County, Alabama. His upbringing reflects Southern African‑American cultural traditions, including regular church attendance with gospel
    music, family gatherings centered around Southern cuisine, oral storytelling, and community events. The local emphasis on family bonds, respect for elders, and collective support shapes his values and
    daily experiences.
