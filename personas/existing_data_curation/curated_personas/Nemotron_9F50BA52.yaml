  career_goals: Robert aspires to turn his passion for visual storytelling into a professional career. He plans to pursue an apprenticeship or attend a college program in illustration, animation, or game
    design, aiming to become a concept artist or creative director for interactive media. He also dreams of launching a community‑focused art workshop where he can mentor other teens, using his organizational
    strengths to run events and his sociable personality to build inclusive creative spaces. Ultimately, he hopes his work will blend imagination with meaningful collaboration, contributing both to the
    art world and his local community.
