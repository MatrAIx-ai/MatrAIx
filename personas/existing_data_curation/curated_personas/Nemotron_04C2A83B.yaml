  career_goals: Dameon plans to earn his GED within the next two years and then enroll in a community college program focused on digital media and graphic design. He aims to pursue a career creating visual
    identities for local artists, community organizations, and small businesses, leveraging his street‑culture perspective. He also hopes to stay involved in basketball, either through a college scholarship
    or by coaching youth leagues. Additionally, he envisions mentoring peers in basic tech skills, helping to close the digital divide in his neighborhood.
