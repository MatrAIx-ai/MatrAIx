persona_description: A veterinary scientist who specializes in the study of zoonotic diseases, particularly those transmitted to humans by vectors such as mosquitoes or animals. His research interests include
  the development of early warning systems for disease outbreaks and the use of analytical techniques to target specific geographic areas where vaccines need to be developed. His work has been funded by
  the Centers for Disease Control and Prevention and he is a professor of epidemiology at Purdue University's School of Veterinary Medicine. He is a leading expert in the field of zoonotic disease surveillance
  and has developed early warning systems for diseases such as avian influenza and canine influenza. He is known for his innovative research and his work has been published in medical journals such as Vector-Borne
  and Zoonotic Diseases.
