personas:
  professional: Teresa Buhr, a fourteen‑year‑old budding social‑media content creator and beach‑clean‑up coordinator, blends her curiosity for marine life with practical DIY skills to produce light‑hearted
    TikTok videos and organize spontaneous volunteer events, while her relaxed approach to obligations sometimes leaves plans loosely structured.
  sports: Teresa Buhr, a fourteen‑year‑old beach‑volleyball enthusiast, plays year‑round with the Sunset Surf & Volleyball Association, trains with a local high‑school team on weekends, cheers on the Los
    Angeles Chargers during football season, and balances her love for the sport with occasional yoga sessions to prevent volleyball‑related shoulder aches.
  arts: Teresa Buhr, a fourteen‑year‑old TikTok content creator, spends her free time performing karaoke renditions of Ariana Grande and Billie Eilish at the neighborhood coffee shop, sketches quick doodles
    of sunsets inspired by the artworks of Monet, and her favorite film directors include Greta Gerwig and Damien Chazelle, whose indie‑spirit fuels her light‑hearted video challenges.
  travel: Teresa Buhr, a fourteen‑year‑old with a penchant for sun‑filled getaways, prefers spur‑of‑the‑moment beach trips along the Atlantic coast—she’s spent summers in the Outer Banks and a family vacation
    in Maui—and daydreams about sunset‑watching in Santorini, planning her trips with quick Google searches and the occasional discount flight, while balancing school obligations.
  culinary: Teresa Buhr, a fourteen‑year‑old who loves Southern comfort cuisine, can whip up a crispy fried fish sandwich with lemon‑zest mayo, pickles, and crunchy coleslaw, concocts milk‑shake‑like soft‑serve
    vanilla topped with fresh strawberry sauce at her family’s ice‑cream stand, and often experiments with mango‑coconut smoothie bowls garnished with chia seeds and toasted coconut flakes.
  core: Teresa Buhr, a fourteen‑year‑old beach‑obsessed, TikTok‑savvy social butterfly who channels her bubbling anxiety into spontaneous group adventures while habitually misplacing her homework and sunscreen.
background:
  cultural: Teresa grew up in the coastal town of Myrtle Beach, South Carolina, where Southern hospitality and beach tourism shape daily life. Her family celebrates traditional Southern holidays—Thanksgiving
    feasts, Fourth of July fireworks on the boardwalk, and Sunday church gatherings—while also embracing the multicultural vibe brought by the steady flow of tourists. Though she identifies as white and
    largely traces her ancestry to German and English roots reflected in the family name Buhr, she has grown up hearing stories about her great‑grandparents who settled on the coast in the early 1900s.
    The local culture of seafood cuisine, outdoor recreation, and community volunteerism (especially beach clean‑ups) informs her values of practicality, community service, and love for the ocean.
attributes:
  skills: '[''Interpersonal communication'', ''Social media content creation'', ''Informal team leadership'', ''Basic cooking and budgeting'', ''First‑aid basics'', ''DIY crafts and beach art'', ''Tide‑pool
    species identification'']'
  hobbies: '[''Beach volleyball'', ''Karaoke with friends'', ''Tide‑pool exploration'', ''DIY friendship bracelets'', ''Social media video creation'', ''Reading contemporary YA novels'', ''Volunteer beach
    clean‑ups'', ''Cooking Southern comfort food'']'
  career_goals: Teresa dreams of combining her love for the ocean with a practical career. Her long‑term ambition is to study environmental science or marine biology in college, eventually working on coastal
    conservation projects that protect the Myrtle Beach shoreline while supporting sustainable tourism. She also envisions a role where she can mentor teens who struggle with anxiety, such as becoming a
    school counselor or peer‑support leader. In the short term, she plans to improve her academic record, join her high school’s environmental club, and secure a summer internship with a local marine research
    center or a beach‑side hospitality business to gain hands‑on experience.
