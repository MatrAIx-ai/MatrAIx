  career_goals: William aims to enroll in a community‑college graphic design program and build a professional portfolio that showcases his blend of artistic imagination and disciplined execution. He aspires
    to work as a UI/UX designer or junior art director at a creative agency, where he can contribute fresh visual concepts while enjoying a structured workflow. In the long term, he hopes to freelance on
    projects that align with his interests in experimental media, giving him both financial stability and creative freedom.
