personas:
  professional: Wanda Costilow is a seasoned computer support specialist who excels at diagnosing hardware, software, and network issues across Windows, macOS, and Linux platforms, and whose organized,
    methodical workflow and sociable communication style enable her to translate technical jargon into clear guidance for end users while consistently documenting solutions in ServiceNow and JIRA.
  sports: Wanda Costilow plays third base for the co‑ed Lehigh Valley Lady Softball Club, follows the Philadelphia Eagles and Phillies as her primary professional teams, enjoys cheering on the IronPigs
    during summer weekends, and incorporates a mix of softball practice and Thursday night yoga to stay fit and relieve competitive tension.
  arts: Wanda Costilow engages with the arts by attending quarterly exhibitions at the Lehigh Valley Art Museum, streaming concerts by Adele and Norah Jones, watching indie films like Lady Bird at the local
    cinema, and volunteering as a tech mentor during community theater productions, which fuels her appreciation for storytelling and creative collaboration.
  travel: Wanda Costilow prefers well‑planned weekend road trips to destinations such as the Pocono Mountains, historic Philadelphia, and the wineries of the Finger Lakes, uses Google Trips to schedule
    itineraries, balances travel with a modest budget, and dreams of a culinary tour through Tuscany once family finances stabilize.
  culinary: Wanda Costilow delights in seasonal baking, especially crafting apple, pumpkin, and cherry pies with a flaky crust, experiments with fresh herbs like rosemary and thyme in savory dishes such
    as rosemary‑infused roasted chicken, and regularly hosts dinner parties featuring homemade lasagna and farm‑to‑table appetizers from local markets.
  core: Wanda Costilow is a detail‑oriented IT support pro who balances structured problem‑solving with vibrant group activities, worries about every outcome, yet finds peace in yoga and the perfect slice
    of pie.
background:
  cultural: Wanda grew up in a middle‑class, white family with deep Pennsylvania roots, tracing heritage to German and Irish immigrants who settled in the Lehigh Valley during the 19th century. The region’s
    blend of Pennsylvania Dutch ethos—emphasizing hard work, modesty, and community service—and broader Mid‑Atlantic cultural values of individualism and self‑reliance shaped her outlook. Family gatherings
    often feature traditional fare like pretzels and apple butter, while local customs include participation in community fairs and supporting regional high‑school sports. This cultural backdrop fostered
    Wanda’s organized, reliable nature and her dedication to giving back through volunteer tech‑education initiatives.
attributes:
