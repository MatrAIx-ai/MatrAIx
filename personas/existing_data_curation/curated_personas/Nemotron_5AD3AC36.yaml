    and knowledge‑base creation'', ''Customer service and clear communication'', ''Team coordination and shift scheduling'', ''Conflict resolution'', ''Stress‑management techniques'']'
  hobbies: '[''Co‑ed softball league'', ''Community library digital‑literacy volunteering'', ''Weekly yoga for stress relief'', ''Hiking in Lehigh Valley parks'', ''Seasonal baking and pastry making'',
    ''Hosting dinner parties and potlucks'', ''Photography of nature scenes'']'
  career_goals: 'Wanda aims to transition from a specialist role to an IT Support Manager within the next three to five years. She seeks to lead a small team, implement process improvements that increase
    resolution speed and user satisfaction, and obtain advanced certifications such as ITIL Expert and Microsoft Certified: Azure Administrator Associate. Balancing her ambition with family priorities,
    she values a structured work environment that offers predictable schedules, opportunities for mentorship, and the ability to shape the support culture toward proactive problem‑prevention. Ultimately,
    she aspires to influence strategic technology decisions for her organization while maintaining a healthy work‑life balance.'
