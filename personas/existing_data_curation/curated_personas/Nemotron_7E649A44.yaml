personas:
  professional: Chris Kirtland, a seasoned 52‑year‑old carpenter with three decades of framing, custom cabinetry, and blueprint interpretation, merges his curiosity for reclaimed lumber with a practical,
    organized yet flexible work style, turning every jobsite into a classroom for apprentices while competitively driving projects ahead of schedule.
  sports: Chris Kirtland dominates the Boone County Bearcats adult softball league each spring, cheers on the Chicago Cubs and Chicago Blackhawks in the off‑season, and maintains fitness through early‑morning
    jogs along the Kishwaukee River, while his competitive edge often fuels spirited banter on the field.
  arts: Chris Kirtland channels his artistic side through woodworking, crafting coffee tables inspired by mid‑century modern designers like Charles and Ray Eames, while evenings are filled with classic
    rock—spinning Led Zeppelin, The Rolling Stones, and AC/DC—on a vintage turntable that doubles as his backyard BBQ soundtrack.
  travel: Chris Kirtland plans his travel around heritage sites and timber markets, having explored the historic districts of Charleston, SC, taken a tool‑hunt road trip to Portland, OR’s lumber districts,
    and dreaming of a week‑long trek to the Pacific Northwest’s Olympic Peninsula to study old‑growth forests.
  culinary: Chris Kirtland, a modest grill master, perfects smoked brisket with mesquite chips, pairs it with corn on the cob and homemade coleslaw, and enjoys cooking freshly caught Kishwaukee River trout,
    seasoned with lemon, dill, and a dash of smoked paprika.
  core: Chris Kirtland pairs his competitive spark and hands‑on craftsmanship with a community‑first mindset, constantly balancing skeptical caution with curiosity, even if that means occasionally misplacing
    a wrench or over‑booking a weekend project.
background:
  cultural: Chris grew up in the rural outskirts of Belvidere, Illinois, in a family of German‑American descent that valued hard work, modesty, and community service. The Midwestern culture of Boone County—seasonal
    county fairs, Fourth‑of‑July fireworks, church potlucks, and a strong neighborly ethic—shaped his practical, yet open‑minded outlook. While he identifies with mainstream white American culture, his
    upbringing blends a traditional craftsman ethos with a willingness to embrace new ideas, reflecting the region’s balance of heritage and progress.
