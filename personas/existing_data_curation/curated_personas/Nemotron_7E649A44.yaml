  career_goals: Chris aims to transition from a journeyman carpenter to a foreman and eventually launch his own small‑scale contracting firm that focuses on energy‑efficient home renovations and historic
    restoration projects in Boone County. He plans to earn a Green Building certification and develop a mentorship program for young tradespeople, positioning his business as a trusted, community‑oriented
    service provider.
