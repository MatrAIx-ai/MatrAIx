  hobbies: '[''Contemporary Art Visiting'',''Reading Philosophy'',''Birdwatching'',''Nature Photography'',''Vinyl Record Collecting'',''Restoring Antique Radios'',''Watercolor Sketching'',''Playing Chess'']'
  career_goals: Dudley aims to transition his extensive interview experience into a self‑produced documentary podcast series that explores overlooked stories of Central Florida’s cultural and environmental
    heritage. He hopes to secure modest funding to travel to remote sites, compile oral histories, and eventually mentor younger interviewers through workshops at local community colleges. While he values
    flexibility over rigid career ladders, his long‑term ambition is to be recognized as a trusted chronicler of the region’s hidden narratives, merging his love for art and unconventional ideas with his
    professional skill set.
