  hobbies: '["Vegetable gardening and native rose cultivation","Reading mystery and historical nonfiction","Genealogy research","Quilting","Ozark foothill hiking and birdwatching","DIY home improvement
    projects","Southern cooking and food preservation","Small‑group book club participation"]'
  career_goals: Sanra aims to move beyond her current supervisory role to become a district manager within the next five years, leveraging her data‑driven mindset to lift store profitability by at least
    10% per location. She intends to spearhead a regional training program that equips emerging supervisors with the same methodical, results‑focused skills she has honed. Long‑term, she envisions launching
    a boutique consulting firm that helps small‑town retailers integrate modern technology while preserving community character, all while securing a stable financial foundation for her post‑retirement
    years and reducing the stress she often feels in high‑stakes environments.
