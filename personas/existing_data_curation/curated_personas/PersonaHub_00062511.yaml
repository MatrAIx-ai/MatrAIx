persona_description: A researcher or policy maker interested in understanding the dynamics of coping and vulnerability in the context of developing future adaptation measures for agricultural communities
  and stakeholders. They are looking for studies that focus on the ability of individuals to cope with challenges and opportunities to current climate variability, as well as those that explore the role
  of qualitative information in interpreting coping strategies. They are interested in learning about the sustainable adaptation strategies that farmers use to buffer short-term stresses and shocks within
  their farming systems and how these strategies can be adapted to deal with longer-term changes. They are also interested in the place and context-specific nature of agricultural adaptations and the importance
  of farm-level decision-making in the adaptation process.
