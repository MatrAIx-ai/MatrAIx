persona_description: A researcher specializing in biological inventory of anchialine pool invertebrates at Pu'uhonua o Hōnaunau National Historical Park and Pu'ukoholā Heiau National Historic Site on the
  island of Hawai'i. The researcher has completed inventories of nine pools within two pool complexes at PUHO, along with one extensive pool at the terminus of Makeāhua Gulch at PUHE. The researcher is
  interested in documenting the full diversity of pool fauna, especially in species-rich groups like the Diptera, and is using inventory data to generate a network-wide database of species presence and
  distribution. The researcher is also developing management plans for anchialine pool resources based on the inventory data.
