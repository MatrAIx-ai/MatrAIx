persona_description: A sociologist who studies the impact of mobile phone use on social interactions and behavior in diverse social settings, particularly in the context of commuting, dining, and educational
  institutions. They are interested in understanding how different age groups, genders, employment statuses, and countries perceive cell phone use and its social implications, and how it affects the social
  well-being of individuals and the overall communication and computing culture. They are also interested in the safety concerns associated with cell phone use in medical settings and on air transport,
  and how to avoid negative social impacts.
