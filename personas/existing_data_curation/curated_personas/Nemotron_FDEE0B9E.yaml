  career_goals: Although retired, William is driven to leave a lasting personal legacy. He aims to complete a series of watercolor paintings that capture Milwaukee’s historic neighborhoods, compile his
    memories and research into a memoir documenting the city’s post‑war transformation, and mentor a youth art program at the local community center. He also plans to restore a classic 1965 Chevrolet as
    a tangible tribute to the region’s automotive past.
