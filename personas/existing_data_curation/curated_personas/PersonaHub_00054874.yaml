persona_description: A researcher or scientist who conducts studies on agricultural intensification, biodiversity conservation, and ecosystem services. They are interested in understanding the interaction
  between agricultural landscapes, external inputs, and the conservation of semi-natural habitats. They are particularly interested in the effects of Agri-environmental schemes (AES) on pollinator visitation
  rates, pest control efficiency, and crop yields, and how these factors vary with landscape context and different types of AES. They are also interested in exploring the potential trade-offs and synergies
  between pollination and pest control services in response to AES and landscape context.
