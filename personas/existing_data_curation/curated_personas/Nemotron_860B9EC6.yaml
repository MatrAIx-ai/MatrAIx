personas:
  professional: Jose Daughenbaugh, an aspiring mechanic with a talent for small-engine maintenance and methodical carpentry, leans on a routine‑driven work ethic and meticulous logging to earn the trust
    of neighbors while preparing for an automotive apprenticeship.
  sports: Jose Daughenbaugh spends his winters hunting deer and fishing for bass in the local creek, maintains his stamina with weekend cross‑country runs, and follows the regional baseball team, the Cedarfield
    Cougars, for a dose of community sport.
  arts: Jose Daughenbaugh channels his creative side into building scale model airplanes and handcrafted birdhouses, while classic country icons like Johnny Cash and bluegrass legends such as Bill Monroe
    soundtrack his evenings in the barn, nurturing a quiet appreciation for traditional American folk arts.
  travel: Jose Daughenbaugh favors low‑key, solo wilderness getaways, planning meticulous camping trips to the Great Smoky Mountains and seasonal hunting excursions in the nearby state forest, balancing
    his love of routine with occasional road trips to visit family farms in neighboring states.
  culinary: Jose Daughenbaugh enjoys farm‑fresh meals, often preparing hearty vegetable stew with carrots, potatoes, and tomatoes from his garden, pairing it with cornbread and occasionally smoking trout
    caught from the creek, though they admit to over‑indulging in sugary snack bars after long work sessions.
  core: Jose Daughenbaugh is a quiet, routine‑driven 17‑year‑old who balances a meticulous love of engines, garden cycles, and solitary hunting trips, yet occasionally hoards obscure tool manuals and forgets
    to reply to texts.
background:
  cultural: Jose grew up in Tyner, a small community in Jackson County, Kentucky, steeped in Appalachian culture. His family follows a traditional Southern Baptist faith, attending church services regularly
    and participating in community events such as church potlucks and local fairs. The region’s values of self-reliance, close-knit family ties, and respect for the land shape his worldview. He was raised
    with a strong sense of local heritage, including folk music, storytelling, and a respect for hunting and farming traditions that have been passed down through generations. While his exposure to broader
    cultural diversity is limited, he embraces the modest, pragmatic lifestyle common in rural Kentucky.
attributes:
  skills: '["Small-engine maintenance", "Basic carpentry and woodworking", "Farm animal care", "Routine household repairs", "Organizational logistics (chore scheduling, inventory tracking)", "Basic computer
    literacy (spreadsheet budgeting)"]'
  hobbies: '["Hunting and fishing", "Scale model airplane building", "Wooden birdhouse crafting", "Reading mechanics and agriculture manuals", "Listening to classic country and bluegrass music", "Gardening
    (vegetable garden)"]'
  career_goals: Jose aims to complete his GED within the next two years and secure an apprenticeship in automotive or diesel mechanics, building on his hands-on experience with engines. He envisions a stable,
    long-term career with a local garage or a regional trucking company, where he can apply his routine-oriented work ethic. He also hopes to eventually take over his family’s small farm, modernizing its
    operations through improved equipment maintenance and efficient record-keeping, while possibly opening a modest side business offering repair services to the community. He values job security, predictable
    schedules, and the ability to work independently in a familiar environment.
