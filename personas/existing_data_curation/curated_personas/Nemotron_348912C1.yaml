    backyard nature", "tapping rhythms on a toy drum"]'
  career_goals: Even at three, Alexander talks about future ambitions that mirror his love of art and storytelling. He dreams of becoming an artist who paints the legends his grandparents share, a tribal
    storyteller who preserves Shawnee oral history, or an explorer who discovers new places in nature to inspire his drawings. He envisions leading community gatherings where he can play drums and tell
    stories that connect people to their heritage.
