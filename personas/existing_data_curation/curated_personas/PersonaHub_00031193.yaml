persona_description: 'Robert Agranoff is an esteemed professor emeritus in the School of Public and Environmental Affairs, Indiana University-Bloomington, and since 1990, he has been affiliated with the
  Instituto Universitario Ortega y Gasset in Madrid. Agranoff is a co-author of Collaborative Public Management: New Strategies for Local Governments, which earned the 2003 Louis Brownlow Book Award from
  the National Academy of Public Administration and author of a recent book, Managing Within Networks (Georgetown University Press). He has published many articles and book chapters on Spanish constitutionalism,
  federalism, and intergovernmental relations, including a recently completed book manuscript on local governments under Spain''s federal arrangements. Agranoff has taught at Complutense University-Madrid,
  University of the Basque Country–Bilbao, and Autonoma University–Barcelona.'
