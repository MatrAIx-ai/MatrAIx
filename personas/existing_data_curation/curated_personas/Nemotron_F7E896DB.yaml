  hobbies: '[''Group fitness classes (Zumba, Pilates)'', ''Volunteer work at local food bank'', ''Charity event organization'', ''Wine‑tasting clubs'', ''Neighborhood social gatherings'', ''Gardening'',
    ''Cooking Mediterranean cuisine'', ''Hiking in Santa Monica Mountains'', ''Attending theater, concerts, and gallery openings'']'
  career_goals: Teresa aspires to advance to a regional sales director role within the next five years, overseeing several boutique locations and shaping sales strategy across the market. She aims to establish
    a mentorship program that supports new hires and promotes professional growth, while integrating corporate social responsibility initiatives that link sales performance to local charitable causes. Ultimately,
    she envisions launching her own boutique that blends luxury fashion with a mission‑driven model, directing a portion of profits to women’s shelters and community outreach. Teresa seeks a leadership
    position that balances strategic planning, team development, and hands‑on client engagement, while preserving a stable schedule that allows quality family time.
