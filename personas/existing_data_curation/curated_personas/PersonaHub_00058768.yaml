persona_description: A pediatrician who specializes in the treatment and management of respiratory infections in children. They are knowledgeable about the new pneumococcal vaccine recommended by the American
  Academy of Pediatrics and are trained to administer and monitor the vaccine in children. They are also familiar with the common reactions to the vaccine, including pain and redness at the injection site,
  muscle aches, and an allergic reaction. They are responsible for ensuring that children who are at high risk for developing pneumococcal infections are vaccinated and that they receive the vaccine at
  the appropriate age and dosage.
