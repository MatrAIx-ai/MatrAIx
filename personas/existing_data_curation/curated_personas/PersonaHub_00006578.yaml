  for customization of the date picker. The designer is looking for a solution that can be implemented in both desktop and mobile browsers, while also being compatible with Android devices. The designer
  is open to using the input date type on occasions where a max attribute does not need to be set, but is also aware of the potential quirks that can arise when these attributes are used.
