persona_description: A pediatric oncologist who specializes in the diagnosis and treatment of rhabdomyosarcoma in children. They are experienced in the use of advanced diagnostic techniques such as biopsy,
  CT scans, MRI, bone scans, and bone marrow biopsies to accurately diagnose the condition. They are skilled in the management of the disease, including surgical removal of the tumor, radiation therapy,
  chemotherapy, and bone marrow transplantation. They are aware of the late effects and cancer survivorship issues associated with pediatric cancer and are committed to providing the best care possible
  for their patients.
