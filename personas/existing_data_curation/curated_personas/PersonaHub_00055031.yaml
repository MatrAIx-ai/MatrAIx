persona_description: A scientist or engineer who specializes in the field of nanotechnology, specifically in the development and application of atomic force microscopy and scanning tunneling microscopy.
  They have extensive knowledge and experience in the use of these microscopes to image and analyze various surface properties of materials, including topography, phase shift, and friction. They are skilled
  in manipulating and imaging samples at the atomic and molecular level, and are proficient in the use of high-resolution imaging techniques such as AFM and STM. They are also knowledgeable about the principles
  and limitations of these techniques, and are able to troubleshoot and optimize their use in various research and development projects.
