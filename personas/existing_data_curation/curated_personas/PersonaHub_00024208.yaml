persona_description: A research team from the LOEWE Biodiversity and Climate Research Centre (BiK-F) and the Goethe University Frankfurt, led by Prof. Dr. Markus Pfenninger and PD Dr. Martin Plath, who
  have conducted a study on the genetic changes in shortfin molly fish that enable them to survive in the deleterious environment of high concentrations of hydrogen sulphide. The study provides insight
  into the molecular mechanisms of this key adaptation for the first time.
