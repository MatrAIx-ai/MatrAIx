  career_goals: Curtis aims to transition into a staff engineer role where he can lead the architecture of large‑scale, AI‑enhanced platforms that blend technology and creative expression. He aspires to
    become an engineering manager or director of engineering, championing inclusive hiring practices, mentoring underrepresented talent and embedding cultural awareness into product design. He plans to
    launch an open‑source library that simplifies accessible UI components for developers, and to speak at conferences about the intersection of art and software. In the longer term he envisions founding
    a tech‑education startup targeting Chicago’s youth, particularly from historically Black neighborhoods, to provide hands‑on coding and digital media workshops. He also seeks advanced certifications
    such as AWS Solutions Architect and Certified Kubernetes Administrator to deepen his cloud expertise.
