personas:
  professional: Curtis Lucas, a 39‑year‑old full‑stack software engineer, leverages a deep fluency in Python, Go, and Java alongside cloud‑native expertise in AWS and Azure to craft high‑performance, security‑first
    platforms, while channeling a competitive drive and artistic eye into clean, accessible UI/UX designs that bridge technology and visual expression.
  sports: Curtis Lucas guards the paint in weekly pickup basketball games at Humboldt Park, roots for the Chicago Bulls and follows the Chicago White Sox season, and complements the indoor hustle with early‑morning
    runs along the Lakefront Trail, always tracking personal stats on a fitness app.
  arts: Curtis Lucas immerses himself in Chicago’s art scene, snapping murals by artists like Hana Yako, attending gallery openings featuring works by Kerry James Marshall, and performing saxophone improvisations
    alongside the Chicago Jazz Ensemble, drawing inspiration from legends such as John Coltrane and contemporary visual artists like Theaster Gates.
  travel: Curtis Lucas prefers purposeful weekend getaways, often road‑tripping to New Orleans for its music heritage, exploring museum districts in European cities like Amsterdam’s Rijksmuseum, and planning
    a future solo trip to Kyoto to study traditional woodblock printing while balancing a modest travel budget.
  culinary: Curtis Lucas, an avid self‑taught chef, reinvents classic comfort dishes—think miso‑glazed fried chicken, smoked gouda‑topped collard greens, and truffle‑infused sweet corn grits—while sourcing
    local heirloom tomatoes and fresh herbs, hosting intimate dinner parties where experimental plating meets soulful flavors.
  core: Curtis Lucas is a curiosity‑driven technologist who melds competitive precision with artistic flair, juggling code, saxophone solos, and a love for soulful cooking while constantly questioning the
    status quo.
background:
  cultural: Curtis grew up on Chicago’s South Side in a close‑knit African‑American family that valued education, community and cultural expression. His upbringing was steeped in the city’s rich musical
    heritage—church gospel choirs, neighborhood jazz clubs and the legacy of Chicago blues—which nurtured his appreciation for rhythm and improvisation. He attended a historically Black high school where
    he first discovered coding through a summer STEM program, later earning a STEM graduate degree at a university with a strong focus on minority representation. Curtis remains active in the local Black
    tech ecosystem, participating in groups such as Black Girls CODE (as a mentor), the Chicago Tech Diversity Coalition and community mural projects that celebrate Black history. He celebrates cultural
    traditions such as Juneteenth, Kwanzaa and family reunions, and his worldview is shaped by the resilience and collaborative spirit of his community. These experiences inform his commitment to leveraging
    technology to create inclusive spaces and uplift underrepresented voices.
