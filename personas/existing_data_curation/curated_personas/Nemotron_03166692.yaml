  hobbies: '["Cooking traditional Mexican dishes", "Playing acoustic guitar", "Reading historical fiction", "Visiting local museums and art galleries", "Hiking in the Ozarks", "Attending community cultural
    festivals", "Travelling to explore new places", "Practicing mindfulness meditation", "Journaling", "Playing online strategy games"]'
  career_goals: Jose aims to deepen his accounting credentials by earning a CPA or CMA within the next three years. He seeks a senior bookkeeping or internal audit position at a midsize company in Little
    Rock where he can blend his analytical skills with his interest in cultural organizations. He hopes to take on a leadership role that includes mentoring junior staff and developing streamlined financial
    processes, which would provide the stability he needs to manage his anxiety. In the longer term, he envisions launching his own boutique bookkeeping firm that specializes in serving small businesses
    and artists in the Hispanic community, allowing him to maintain a flexible schedule and stay connected to his cultural roots.
