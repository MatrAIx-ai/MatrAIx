personas:
  professional: Quyen Tran is a methodical high-school robotics enthusiast who leads her school’s robotics club, coordinates peer-tutoring in math and science, and leverages her logical prowess to prototype
    sustainable tech solutions for community challenges.
  sports: Quyen Tran is a varsity soccer midfielder for her Minnesota high school, a member of the school dance squad, follows the Minnesota United FC and the Minnesota Twins, and joins a local hiking club
    for weekend trail runs in the Boundary Waters.
  arts: Quyen Tran enjoys performing with the school dance squad, practices ukulele covers of BTS and Taylor Swift, and frequently streams pop playlists featuring Ariana Grande and Olivia Rodrigo, drawing
    inspiration for choreography and personal expression.
  travel: Quyen Tran favors weekend road trips to the North Shore of Lake Superior, dreams of backpacking through the Canadian Rockies, and hopes to visit Hanoi to explore family roots, balancing school
    commitments with a modest travel budget.
  culinary: Quyen Tran loves cooking pho broth, fresh spring rolls with rice paper, and bánh xèo for family celebrations, skillfully handling lemongrass, fish sauce, and Thai basil, yet they sometimes over-season
    dishes in pursuit of authentic flavor.
  core: Quyen Tran blends teenage curiosity with disciplined planning, juggling robotics projects, soccer matches, and family cooking, all while navigating a modest budget and occasional procrastination
    on school essays.
background:
  cultural: Quyen is a second‑generation Vietnamese‑American whose parents immigrated to Minnesota after the Vietnam War. The family maintains many Vietnamese traditions, such as celebrating Tet, cooking
    pho and bánh chưng, and emphasizing respect for elders. At home she speaks Vietnamese and practices customs taught by her grandparents, while at school she is fully immersed in American culture. The
    local Vietnamese community, centered around a cultural association and periodic festivals, provides a supportive network that reinforces values of collectivism, hospitality, and the importance of education.
    These cultural influences blend with the rural Midwestern setting of Ashby, shaping Quyen’s organized, cooperative, and community‑focused personality.
attributes:
  skills: '["Mathematics problem solving", "Scientific inquiry", "Basic Python programming", "Robotics kit assembly", "Data organization with spreadsheets", "Peer tutoring and group facilitation", "Event
