    languages (Vietnamese, basic Mandarin)", "Playing the ukulele"]'
  career_goals: Quyen aims to pursue a college degree in environmental engineering or computer science, with the long‑term ambition of designing sustainable infrastructure for her rural community in Minnesota.
    She envisions a career as a civil engineer focusing on green building design or as a software developer creating tools that support community resilience. In the short term, she plans to earn a STEM
    scholarship, join a high‑school robotics competition team, secure a summer internship in a local engineering firm, and eventually contribute to projects that improve both the environment and the quality
    of life for immigrant families.
