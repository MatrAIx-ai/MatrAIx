personas:
  professional: Dorothy Richey, a 20‑year‑old construction laborer with OSHA‑10 certification, combines meticulous blueprint reading, digital‑photo documentation, and a natural curiosity for sustainable
    design to lead small crews confidently while infusing artistic sketches into site planning.
  sports: Dorothy Richey spends weekends hiking the forest trails around Cheaha State Park, tends a community garden plot, and roots for the Birmingham Barons baseball team and the Alabama Crimson Tide
    football squad, balancing a love of low‑key outdoor activity with occasional pickup basketball at the local recreation center.
  arts: Dorothy Richey sketches rolling hills, photographs construction sites, plays the harmonica at local blues nights featuring B.B. King tributes, and regularly visits the Birmingham Museum of Art to
    view contemporary painter Tommy J. Ward and folk artist collections, letting her curiosity for visual storytelling steer both her leisure and on‑site communication.
  travel: Dorothy Richey plans meticulous road‑trip itineraries that blend camping in the Great Smoky Mountains, culinary tours of New Orleans, and photo‑walks in Asheville, while dreaming of future expeditions
    to Patagonia’s glaciers and Iceland’s volcanic landscapes, always budgeting travel expenses within her modest savings.
  culinary: Dorothy Richey enjoys cooking shrimp and grits, collard greens seasoned with smoked paprika, and fresh garden salads topped with avocado and basil, wielding a mid‑level kitchen skill set that
    lets her experiment with Southern comfort flavors while occasionally over‑salting dishes in a burst of impatient enthusiasm.
  core: Dorothy Richey fuses blue‑collar precision with an artist’s eye, charting sustainable builds while humming a blues riff between blueprint revisions, and never lets a missed deadline or a sore knee
    dull her calm, curious spirit.
background:
  cultural: 'Dorothy grew up in a working‑class, white Southern family in Eastaboga, Calhoun County, Alabama. Her upbringing was steeped in the traditions of small‑town Southern life: attending the local
    Baptist church, cheering on the high‑school football team, and participating in the county fair and community picnics. The region’s strong work ethic, hospitality, and close‑knit neighborhood bonds
    shaped her values of reliability and cooperative spirit. Musical influences from the Alabama blues, gospel, and country scenes are part of her everyday soundtrack. While she embraces these roots, her
    curiosity drives her to explore broader cultural experiences through art, literature, and music, giving her a balanced perspective that honors her heritage while remaining open to unconventional ideas.'
