  career_goals: As she looks to the future, Dorothy plans to move from labor‑intensive tasks to supervisory roles. Within the next three to five years she intends to complete an OSHA 30‑hour construction
    safety course and enroll in a community‑college construction management program, working toward an associate degree. She aims to secure a carpentry apprenticeship that will give her a trade‑specific
    credential. Her medium‑term goal is to become a forewoman, managing crews and coordinating daily site operations. Long‑term, she hopes to launch a small, eco‑focused construction company that blends
    her practical building expertise with her love for artistic design and innovative, sustainable building methods. She envisions her firm delivering custom homes that incorporate reclaimed materials,
    natural lighting, and aesthetic details inspired by her sketching and photography.
