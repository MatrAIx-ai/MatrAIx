  career_goals: Inspired by his love of art and curiosity about new ideas, Thong dreams of becoming a visual storyteller—perhaps a comic‑book illustrator, animator, or video‑game designer—where he can blend
    drawing, digital media, and interactive narratives. He also imagines exploring nature as a wildlife artist or environmental educator, using his drawings to raise awareness about local ecosystems. In
    the long term, Thong hopes to create work that celebrates his cultural heritage while connecting with diverse audiences, and he aspires to study art and technology in high school and beyond.
