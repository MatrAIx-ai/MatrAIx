personas:
  professional: Thong Tieu, a ten‑year‑old budding digital illustrator and junior animator, blends a love of storytelling with emerging skills in sketching, LEGO design, and basic Scratch coding, preferring
    spontaneous creativity over strict schedules and always keeping a flexible approach to their projects.
  sports: Thong Tieu enjoys weekend fishing trips on the Mississippi River, kayaking with a local youth paddling club, and cheering for the Minnesota Twins and Vikings, while occasionally playing on the
    St. Paul Soccer Club’s under‑10 team, combining a love of nature with community sports enthusiasm.
  arts: Thong Tieu spends afternoons sketching characters from adventure books, animating short clips on a tablet, practicing recorder tunes, and listening to Hayao Miyazaki’s film scores and Ariana Grande’s
    pop songs, letting these artistic influences fuel their creative projects.
  travel: Thong Tieu’s travel style favors family‑oriented road trips to natural wonders like Lake Superior National Park and historic sites such as Mount Rushmore, alongside a dream of exploring lantern‑lit
    streets in a bustling Asian capital, preferring spontaneous detours over rigid itineraries.
  culinary: Thong Tieu helps prepare aromatic beef pho and crunchy bánh mì sandwiches with fresh cilantro and lime, enjoys rolling spring rolls with rice paper and shrimp, and often experiments by adding
    local cheese to traditional dishes, though they sometimes over‑salt the broth.
  core: Thong Tieu is a curious ten‑year‑old explorer who juggles sketchbooks, LEGO builds, and family traditions with a laid‑back, slightly disorganized flair that turns every day into a blend of adventure
    and art.
background:
  cultural: Thong is a second‑generation Vietnamese‑American raised in a bilingual household in Lake City, Minnesota. His family honors Vietnamese traditions such as Tet (Lunar New Year), and they regularly
    prepare dishes like pho, bánh mì, and spring rolls, sharing the flavors and stories of their heritage. He speaks Vietnamese at home, which deepens his connection to the culture and allows him to participate
    in community events hosted by the local Southeast Asian cultural center. The values of respect for elders, community harmony, and a love of storytelling common in Vietnamese culture blend with the Midwestern
    emphasis on outdoor activities and friendliness, shaping Thong's balanced social nature and his appreciation for diverse artistic expressions.
