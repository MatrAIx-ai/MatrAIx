persona_description: A statistician who specializes in the analysis and interpretation of statistical data, particularly in the context of comparing and contrasting scores from different tests or measuring
  instruments. They use statistical scores, such as the Z score, to compare and analyze scores across different populations or groups, and are familiar with the principles and techniques of converting raw
  scores to Z scores. They may also be familiar with the Zipf migration hypothesis in ecology and the concept of zones in tradition, and may be interested in the public regulation of land and building use
  for the benefit of the public welfare.
