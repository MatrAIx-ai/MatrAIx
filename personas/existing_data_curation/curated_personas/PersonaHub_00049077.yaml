persona_description: A health statistician who specializes in the analysis of prevalence of children with diagnosed developmental disabilities in the United States. His research focuses on the adequacy
  of available services and interventions that may improve long-term outcomes for these children. He is particularly interested in the differences between the prevalence of children with autism spectrum
  disorder, intellectual disability, and any other developmental delay, and the lowest prevalence among Hispanic children. He is also interested in the methodology used for the analysis and the take-home
  message from the report.
