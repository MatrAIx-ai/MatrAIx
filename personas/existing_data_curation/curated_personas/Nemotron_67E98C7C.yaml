  career_goals: Daniel aims to transition from operational logistics to a strategic, innovation-focused role where he can reshape supply-chain processes using emerging technologies such as AI, machine learning,
    and autonomous delivery systems. His goal is to become a senior logistics strategist or head of a boutique consultancy that delivers creative, data-driven solutions for e-commerce and last-mile distribution.
    To support this trajectory, he plans to obtain professional certifications (APICS CPIM, CSCP) and deepen his technical expertise in Python and advanced analytics, while deliberately seeking positions
    that grant him the flexibility to experiment without excessive bureaucratic constraints.
