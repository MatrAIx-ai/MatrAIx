personas:
  professional: Florencio Delapaz, a budding naturalist and amateur field researcher, applies their curious yet practical mindset to cataloging local wildlife, and they share their organized sketchbooks
    with classmates after spontaneous storytelling sessions.
  sports: Florencio Delapaz, a spirited youth soccer enthusiast, plays forward on the River Valley Juniors team, idolizes FC Barcelona’s Lionel Messi, and they join weekend tag games with classmates, while
    cheering for the local professional baseball club, the Springfield Wildcats.
  arts: Florencio Delapaz, a creative storyteller, crafts bead necklaces and draws vivid scenes of tribal legends inspired by the colorful illustrations of Mo Willems and the animated adventures of Studio
    Ghibli, and they rebuild intricate LEGO cities that echo the architectural fantasies of Pixar’s Inside Out.
  travel: Florencio Delapaz, an adventurous family traveler, has hiked the sandstone trails of Red Rock Canyon, dreams of exploring the rainforest canopies of Costa Rica, and they look forward to a summer
    road trip to the historic forts of Colonial Williamsburg.
  culinary: Florencio Delapaz, a budding home chef, loves the tangy crunch of mango salsa on chicken tacos, enjoys mixing peanut butter and honey on toast, but stubbornly refuses to eat broccoli, and they
    often coax their parents to let them add extra cheese to spaghetti.
  core: Florencio Delapaz, a curious, organized, and sociable seven‑year‑old, balances a love for nature exploration, LEGO building, and storytelling with a healthy allowance‑saving habit and a penchant
    for occasional tooth‑brushing procrastination, and they always keep their friends laughing.
background:
  cultural: Florencio is raised in an American Indian family with deep ties to the Seminole and Miccosukee traditions of Central Florida. His household blends tribal customs—such as seasonal drum circles,
    oral storytelling, and the use of native plant knowledge—with the broader American lifestyle of Ocala. He participates in community gatherings at the local tribal center, learns a few words of the Mikasuki
    language, and helps his parents prepare traditional foods during celebrations. This cultural foundation instills in him a respect for communal values, a love of nature, and a pride in preserving his
    ancestors' stories.
