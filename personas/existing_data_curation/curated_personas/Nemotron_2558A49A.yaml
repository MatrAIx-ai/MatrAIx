  hobbies: '[''Hiking and nature observation'', ''Soccer and group games'', ''Beadwork and drawing'', ''Storytelling and reenactments'', ''Educational tablet games'', ''LEGO city building'']'
  career_goals: Florencio dreams of becoming someone who works closely with nature and people. He often says he wants to be a park ranger who protects the wildlife in Florida’s forests, a teacher who shares
    stories about his tribe, or a community leader who helps organize events for his friends and family. His goals reflect a blend of curiosity about the natural world, a practical desire to help others,
    and a growing interest in preserving his cultural heritage.
