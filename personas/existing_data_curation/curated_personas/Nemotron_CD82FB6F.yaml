  hobbies: '[''Landscape painting'', ''Nature photography'', ''Hiking'', ''Pickup basketball'', ''Woodworking'', ''Volunteering at arts festivals'', ''Acoustic guitar playing'', ''Attending local art galleries'']'
  career_goals: Steven aims to progress to a crew foreman role within the next two years, earning additional certifications such as a Journeyman Carpentry license and a Project Management Professional (PMP)
    credential. Long‑term, he envisions launching his own residential renovation business that blends quality craftsmanship with a focus on sustainable, energy‑efficient upgrades. He also hopes to mentor
    apprentices and contribute to community‑based building projects like Habitat for Humanity.
