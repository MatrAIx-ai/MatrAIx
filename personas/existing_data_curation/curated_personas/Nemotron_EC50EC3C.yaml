personas:
  professional: Brandon Smith, a seasoned network and computer systems administrator with more than two decades of experience, blends deep expertise in Cisco and Juniper routing, cloud migration, and automation
    with a practical curiosity that drives him to prototype innovative SDN solutions in his home lab while assertively mentoring junior staff toward senior network architect roles.
  sports: Brandon Smith hits the Gainesville Trail System for early‑morning jogs, belongs to the Gainesville Running Club, roots for the Florida Gators football and basketball teams, and joins a seasonal
    pick‑up basketball league at the community center to stay fit and relieve stress.
  arts: Brandon Smith strums jazz guitar inspired by Wes Montgomery and Herbie Hancock at local jam sessions, devours science‑fiction novels by William Gibson and N.K. Jemisin, and enjoys live performances
    by the UF Jazz Ensemble and the soulful vocals of Alicia Keys, allowing music and literature to shape his reflective outlook.
  travel: Brandon Smith prefers curated road trips that blend cultural immersion and relaxation, having explored New Orleans for its brass bands, Kingston for its street food, and the Pacific Northwest
    for its hiking trails, while dreaming of a future pilgrimage to the historic Freedom Trail in Boston to connect with his community‑focused values.
  culinary: Brandon Smith cooks Southern‑style collard greens, spicy jambalaya, and Caribbean jerk chicken with a confident hand, sourcing fresh tomatoes, peppers, and okra from his own garden, and occasionally
    refines his technique by following chef Carla Hall’s recipes for soulful comfort meals.
  core: Brandon Smith is a detail‑oriented network architect‑in‑training whose curiosity, community spirit, and occasional worry about deadlines drive a life of balanced tech tinkering, garden nurturing,
    and soulful jazz riffs.
background:
  cultural: Brandon grew up in a Black middle‑class family in the southeastern United States, where church gatherings, community festivals, and family reunions reinforced a strong sense of belonging and
    collective resilience. His parents emphasized education and self‑advocacy, encouraging him to pursue a STEM degree at a state university, where he was one of few Black students in his cohort. Throughout
    his career, he has navigated the dual realities of celebrating African‑American cultural heritage—through music, cuisine, and regional traditions—while confronting subtle biases in the tech industry.
    Living in Gainesville, a university town with a vibrant multicultural scene, he participates in Black History Month events at the University of Florida and supports local initiatives that empower underrepresented
    youth in technology. His cultural identity informs his commitment to mentorship, community service, and the pursuit of equitable access to tech education.
attributes:
  skills: '[''Cisco routing and switching'', ''Juniper networking'', ''LAN/WAN design'', ''VMware vSphere'', ''Microsoft Hyper‑V'', ''AWS cloud services'', ''Azure cloud services'', ''Firewall configuration
    (Palo Alto, Fortinet)'', ''IDS/IPS management'', ''Python scripting'', ''PowerShell automation'', ''ITIL change and incident management'', ''Network performance monitoring (SolarWinds, Nagios)'', ''Technical
    documentation'', ''User training and mentorship'']'
  hobbies: '[''Home networking lab'', ''Kubernetes experimentation'', ''Raspberry Pi home automation'', ''Morning jogging'', ''Vegetable gardening'', ''Jazz guitar'', ''Science‑fiction reading'', ''Tech
    podcasts'', ''Mentoring youth in coding and cybersecurity'', ''Cooking soul food and Caribbean cuisine'']'
  career_goals: Brandon aims to transition into a senior network architect role within the next three years, earning advanced certifications such as CCNP, CCIE, and AWS Solutions Architect Professional.
    He aspires to lead a cross‑functional IT team that designs secure, scalable infrastructure for research institutions or health‑care providers in the Gainesville area. He also wants to mentor emerging
    Black IT professionals through local coding bootcamps and community workshops, reducing the representation gap he experienced early in his career. Long‑term, he envisions taking on an IT director position
    where he can shape strategic technology roadmaps while championing employee well‑being to mitigate workplace stress.
