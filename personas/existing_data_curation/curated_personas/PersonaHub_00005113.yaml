persona_description: A digital literacy educator who is interested in creating accessible digital books and e-books for students, educators, and the general public. They are familiar with the ePub file
  format and have experience with Google Docs, Google Slides, and other digital tools. They are looking for ways to create and share digital books and e-books that are easy to read on mobile devices and
  are interested in learning about new tools and features that can help them achieve this goal. They may also be interested in learning about how to create and share digital comic books, audiobooks, and
  other types of digital content.
