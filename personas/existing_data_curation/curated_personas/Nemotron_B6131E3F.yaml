  career_goals: Although retired from formal work, Taylor aims to stay actively involved in her community. She plans to expand her volunteer role at the local senior center, eventually becoming the coordinator
    for social activities and workshops. She also hopes to mentor younger volunteers, share her cooking and gardening knowledge, and perhaps start a small home‑based craft venture selling knitted goods.
    Maintaining her health, supporting her family, and preserving the close‑knit friendships she values are central to her long‑term goals.
