  hobbies: '[''Playing the Saxophone'', ''Jazz Improvisation'', ''Urban Photography'', ''Visiting Contemporary Art Exhibits'', ''Reading Science Fiction and Popular Science'', ''Arduino and Interactive
    Art Projects'', ''Sketching'', ''Experimental Cooking'', ''Youth Arts Mentorship'']'
  career_goals: As a mid‑career professional, Charlie aspires to expand his impact beyond Blacklick by taking on a regional director role overseeing recreation and cultural programming for the Greater Columbus
    area. He aims to integrate emerging technologies—such as immersive XR experiences and data-driven personalization—into community events, making them more inclusive and accessible. Over the next five
    years, he hopes to develop a mentorship pipeline for young Black professionals interested in arts management, launch a quarterly youth arts festival, and eventually launch his own boutique entertainment
    consultancy focused on sustainable, community‑centric events.
