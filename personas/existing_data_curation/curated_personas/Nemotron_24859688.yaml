personas:
  professional: Charlie Maragh, a mid‑career community programming director in Greater Columbus, leverages analytical event planning, data‑driven audience insights, and hands‑on technical production while
    embracing a relaxed, flexible work style that often results in creative but occasionally last‑minute program tweaks.
  sports: Charlie Maragh follows the Columbus Blue Jackets, Ohio State Buckeyes football, and Columbus Crew while actively participating in the Columbus Running Club’s weekend long‑distance runs and a local
    pick‑up basketball league, balancing a love of team spirit with an unstructured personal fitness regime that often slides after late‑night gigs.
  arts: Charlie Maragh channels a love for John Coltrane’s bebop improvisations and the immersive installations of Yayoi Kusama into a personal routine of evening sax sessions and weekly visits to the Columbus
    Museum of Art’s contemporary exhibits, often sketching inspired by the works of Damien Hirst and Sofia Coppola’s cinematic aesthetics.
  travel: Charlie Maragh’s travel style blends meticulous photography itineraries with spur‑of‑the‑moment detours, having captured urban skylines in Chicago, explored street‑food markets of Bangkok, and
    dreaming of revisiting the geothermal landscapes of Reykjavik while also squeezing weekend hikes in Hocking Hills, all within a modest budget and family commitments.
  culinary: Charlie Maragh enjoys experimenting with global dishes like miso‑marinated black cod, Ethiopian injera topped with spiced lentils, and homemade kimchi, cooking at an intermediate skill level
    that often results in daring flavor combos such as smoked paprika‑infused butter chicken, while still craving comfort food like beet hummus paired with fresh rosemary focaccia.
  core: Charlie Maragh is a curiosity‑driven saxophonist‑event planner who thrives on spontaneous creativity, balances community mentorship with a habit of last‑minute juggling, and never passes up a chance
    to remix a classic jazz riff into a new art installation.
background:
  cultural: Charlie was raised in a close‑knit African‑American family in the suburbs of Columbus, Ohio, where the legacy of the Great Migration shaped his community's cultural fabric. Family gatherings
    often featured gospel music, storytelling, and home‑cooked soul food, fostering a strong sense of heritage and collective responsibility. He grew up attending historically Black churches and community
    centers that emphasized education, civic engagement, and artistic expression. This background instilled in him a deep appreciation for Black artistic traditions—from jazz and hip‑hop to spoken‑word
    poetry—while also encouraging him to bridge those roots with the broader Midwestern cultural landscape. His upbringing informs his commitment to inclusive programming that celebrates diversity and offers
    equitable access to the arts.
attributes:
  skills: '[''Event Planning'', ''Budget Forecasting'', ''Technical Production (Lighting, Sound, AV)'', ''Project Management'', ''Team Leadership'', ''Stakeholder Communication'', ''Risk Assessment'', ''Safety
