personas:
  professional: Wanda Taylor is a high‑school student who leverages their strong interpersonal communication, love for hip‑hop dance and storytelling, and practical, yet flexible mindset to lead the school’s
    basketball team, organize church‑based youth workshops, and produce uplifting TikTok videos that promote community service, foreshadowing their future ambition to become a community outreach coordinator.
  sports: Wanda Taylor channels their energy into playing forward for the Stockbridge Tigers basketball team, keeps a fan’s heart for the Atlanta Hawks and the Georgia Bulldogs, and complements team drills
    with after‑school hip‑hop dance sessions at the community center, treating both as avenues for fitness and group cohesion.
  arts: Wanda Taylor immerses themselves in the church choir’s gospel harmonics, and they sync their dance moves to the beats of Kendrick Lamar and H.E.R., sketches storyboards inspired by graphic novels
    like 'Ms. Marvel', and draws creative fuel from the choreography of Misty Copeland and the performances of Lin‑Manuel Miranda’s 'Hamilton' on Broadway livestreams.
  travel: Wanda Taylor loves weekend getaways with their family to nearby Atlanta hotspots like the Georgia Aquarium and the Martin Luther King Jr. National Historical Park, has taken a school‑organized
    field trip to Washington, D.C., and dreams of saving up to explore the historic streets of Savannah and the vibrant music scene of New Orleans, favoring budget‑friendly road trips over expensive flights.
  culinary: Wanda Taylor enjoys mastering family soul‑food staples like fried chicken, collard greens seasoned with smoked turkey, and sweet‑potato pie, often adding a modern twist by incorporating a hot
    honey glaze, while they also love sampling trendy campus coffee drinks and occasionally attempt to recreate Nashville hot chicken at home, though they sometimes burn the crust when rushing.
  core: Wanda Taylor blends their love for community, dance, and practical optimism into a vibrant teenage life, yet habitually forgets homework deadlines while always remembering to bring extra snacks
    for their friends.
background:
  cultural: Wanda is an African‑American teenager raised in Stockbridge, Georgia, a city with a vibrant Black community rooted in Southern traditions. Her family places a strong emphasis on church life,
    gospel music, and soul‑food cooking, which have shaped her values of harmony, cooperation, and community service. Growing up near Atlanta’s rich cultural scene, she is exposed to contemporary Black
    music, fashion, and social activism, while also honoring local histories of civil‑rights involvement and celebrations like Juneteenth and Black History Month.
