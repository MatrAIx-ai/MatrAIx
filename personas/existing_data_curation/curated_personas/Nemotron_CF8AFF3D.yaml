  career_goals: Wanda aspires to become a community outreach coordinator or high school teacher, focusing on youth empowerment and the arts. She dreams of attending a state university to major in Education
    or Social Work, where she can develop programs that combine creativity, mentorship, and health education for local teens. She hopes to launch a youth mentorship initiative in Stockbridge that uses dance
    and storytelling to foster confidence and academic success.
