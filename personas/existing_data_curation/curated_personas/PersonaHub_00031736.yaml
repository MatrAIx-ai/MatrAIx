persona_description: A scientist or researcher who is interested in the study of biological and environmental factors affecting the metabolism of organisms, particularly in the context of temperature and
  metabolic rate. This person may be a biologist, ecologist, or environmental scientist who is conducting experiments to measure and analyze the relationship between temperature and metabolic rate in various
  organisms, such as Lucilia sericata larvae. This person is likely to have a background in statistics, experimental design, and data analysis, and may have experience with statistical tests such as the
  Pearson product-moment correlation coefficient (PMCC) and Q10 calculations. This person may also have a background in biology, particularly in the study of insects, and may be interested in the use of
  these organisms in environmental and biological research.
