persona_description: A neuroscientist who specializes in the study of human emotions and the brain, particularly in the areas of neuroimaging and brain activation related to emotional processing. She is
  interested in the continuity of emotional expression across species and the differences in cerebral response to affective vocalizations between humans and non-human animals. Her research focuses on the
  neural basis of emotion and how it is modulated by acoustic correlates of emotional and motivational states. She has conducted research on the use of animal affective vocalizations to study emotional
  processing in humans and is currently investigating the differences in cerebral activity related to the valence of human and non-human animal vocalizations.
