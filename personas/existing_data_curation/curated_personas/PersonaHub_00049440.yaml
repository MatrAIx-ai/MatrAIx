persona_description: A scientist who specializes in the study of silk cocoons and their applications in lightweight armour and environmentally-friendly car panels. His research interests include the material
  properties, structure, and composition of silk cocoons, as well as their potential for sustainable composite materials. He is interested in finding ways that animals have solved some of the problems faced
  by human designers and is looking for natural glues and resins that interact well with mats of 'raw' (unwoven) cocoons.
