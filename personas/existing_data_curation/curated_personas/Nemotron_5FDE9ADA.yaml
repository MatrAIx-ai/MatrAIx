personas:
  professional: Alexander Betters is a meticulous cost estimator with twenty years of experience in construction budgeting, masterful at Excel, Sage Estimating, and Primavera P6, who leverages bilingual
    fluency to negotiate contracts and consistently applies a disciplined, process‑oriented mindset to deliver forecast accuracy, they subtly incorporate Dia de los Muertos symbolism into project presentations
    to honor legacy work, and they aim to secure the CCP credential and lead a department within the next two years.
  sports: Alexander Betters enjoys early‑morning fishing along the Corpus Christi shoreline, follows the Houston Astros and the Dallas Cowboys with fervor, members the local Gulf Coast Yacht Club where
    they compete in casual sailing races, they join a church‑organized adult softball league each spring and often attend the Fiesta de la Familia where team booths showcase memorabilia, and they occasionally
    challenge friends to friendly wagers during the Corpus Christi waterfront marathon.
  arts: Alexander Betters delights in building detailed scale models of historic Gulf‑coast ships, watches classic western films starring John Wayne, listens to mariachi recordings by Vicente Fernández
    during family gatherings, they often attend the local community theater’s productions and volunteer to design sets for the annual Fiesta de la Familia, and they cherish reading biographies of figures
    like Hernán Cortés and Sam Houston.
  travel: Alexander Betters prefers thoughtfully planned road trips along the Gulf, has visited the historic Alamo in San Antonio and the vibrant markets of Mexico City during family reunions, they dream
    of a leisurely cruise through the Caribbean’s islands but balance travel with their family’s schedule and budget constraints, and they hope to experience the colorful Dia de los Muertos celebrations
    in Guanajuato next year.
  culinary: Alexander Betters proudly cooks tamales, pozole, and homemade salsa for weekend family feasts, they harvest fresh herbs from their modest garden and relish grilled Gulf shrimp with chilies,
    they enjoy experimenting with traditional recipes while seasoning dishes with extra heat for the Día de los Muertos banquet, and they occasionally over‑salt in pursuit of authentic flavor.
  core: Alexander Betters, a 53‑year‑old disciplined estimator, blends routine‑driven precision with a love for fishing, ship modeling, and traditional cooking, they habitually double‑check spreadsheets
    before breakfast and sometimes forget to mute their phone during meetings.
background:
  cultural: Alexander’s Mexican heritage is a cornerstone of his identity. Raised in a bilingual household, he maintains fluency in Spanish and English, which informs both his personal relationships and
    professional interactions. He values the strong family ties, respect for tradition, and Catholic faith common in Mexican culture, celebrating holidays such as Día de los Muertos, Mexican Independence
    Day, and local Corpus Christi festivals that blend Mexican and Texan customs. His involvement with the Mexican‑American community includes participating in church events, supporting neighborhood cultural
    gatherings, and passing on culinary traditions to his children, thereby fostering a sense of belonging and continuity within the diverse fabric of Nueces County.
