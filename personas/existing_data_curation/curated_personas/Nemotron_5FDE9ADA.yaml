  career_goals: Alexander aims to advance to a senior cost estimator position within the next two years, securing the AACE Certified Cost Professional (CCP) credential to solidify his expertise. His long‑term
    ambition is to lead a cost‑estimation department for a major construction firm in the Gulf Coast region, where he can mentor junior estimators and implement systematic cost‑control processes. He also
    envisions establishing a boutique consultancy that focuses on sustainable construction cost management, allowing him to contribute to community infrastructure projects in Corpus Christi while maintaining
    a balanced work‑life schedule that supports his family’s stability and growth.
