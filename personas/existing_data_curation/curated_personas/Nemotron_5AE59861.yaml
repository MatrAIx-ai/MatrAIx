personas:
  professional: Javier is a budding robotics enthusiast who spends afternoons after school building Scratch projects in the school robotics club, channeling their love for structure into step‑by‑step programming
    while thriving on the social buzz of group brainstorming sessions, and they often take the lead in assigning tasks, balancing practicality with creative problem‑solving.
  sports: Javier is a midfielder on the Eastside Youth Soccer Club, often shouting encouragements on the field and idolizing a professional soccer team while also following the Los Angeles Lakers for winter
    basketball, using after‑school drills to stay fit and channel their high energy.
  arts: Javier enjoys a playlist that mixes regional Mexican corridos like Los Tigres del Norte with contemporary pop stars such as Billie Eilish, frequently lip‑syncing to these tracks in TikTok videos
    where their talkative flair shines, and they also follow creative YouTubers for inspiration on short‑form content.
  travel: Javier’s most memorable family trip was a road‑trip to the Grand Canyon, sparking a curiosity for natural wonders, while they dream of exploring Tokyo’s neon districts and Paris’s museum corridors,
    preferring guided tours that blend education with plenty of photo‑ops.
  culinary: Javier helps prepare tacos al pastor and homemade salsa verde at home, proudly mastering the art of seasoning the pork just right, and they love snacking on nachos with extra jalapeños, though
    they are still learning to balance spices with their sensitive palate.
  core: Javier is a structured yet sociable teen who blends robotics, soccer, and TikTok fame into a busy life dotted with worry‑driven spending spikes and a love for spicy family recipes.
background:
  cultural: Javier is raised in a Mexican‑American household that celebrates both Mexican heritage and the multicultural environment of Southern California. At home, Spanish and English are spoken interchangeably,
    and the family observes holidays such as Día de los Muertos and Cinco de Mayo with gatherings, altars, and foods like tamales, mole, and churros. Catholic traditions are part of family life, including
    attending weekly mass and community events at the local parish. Living in Temple City, he is exposed to diverse cultures, which broadens his perspective while he remains grounded in the values of family
    cohesion, respect, and cultural pride.
