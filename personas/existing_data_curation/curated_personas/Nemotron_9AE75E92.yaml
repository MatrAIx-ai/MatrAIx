  career_goals: Alexander aims to leverage his fifteen years of managerial experience to advance to a regional director role within a multi‑unit restaurant group, where he can implement standardized best
    practices and mentor emerging managers. He also aspires to launch a boutique café that emphasizes locally sourced, sustainable ingredients, and eventually establish a consulting practice that helps
    independent eateries improve operational efficiency and staff development. To support these ambitions, he plans to earn additional certifications in hospitality leadership and sustainable food systems.
