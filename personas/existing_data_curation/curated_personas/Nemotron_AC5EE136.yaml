  career_goals: Debbie aims to earn her CPA designation within the next two years and advance to an audit‑manager role at a regional firm that values mentorship and work‑life balance. Long‑term, she envisions
    moving into a controller or CFO position where she can champion ESG and sustainability reporting, integrating her humanities background with financial stewardship. She also hopes to design a mental‑health
    support program for accounting teams, drawing on her own experiences with anxiety to foster a healthier workplace culture.
