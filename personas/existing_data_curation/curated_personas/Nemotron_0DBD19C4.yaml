personas:
  professional: Fazal Vaidyan is an aspiring robotics engineer who channels their strategic mindset and love for structure into designing competition‑ready robots for the school’s robotics club, where they
    balance meticulous planning with collaborative problem‑solving.
  sports: Fazal Vaidyan is a midfielder on the under‑14 soccer squad, training twice a week with the local club while cheering for Premier League powerhouse Manchester City and admiring their fluid, possession‑based
    style.
  arts: Fazal Vaidyan immerses themselves in science‑fiction literature—from Asimov’s Foundation to the graphic adventures of Marvel’s Spider‑Man—while also curating playlists of indie pop icons like Billie
    Eilish and imaginative soundtracks that fuel their creative imagination.
  travel: Fazal Vaidyan’s travel diary includes family trips to Yellowstone National Park and a weekend getaway to Chicago’s Museum of Science and Industry, and they dream of attending a robotics showcase
    in Tokyo to experience cutting‑edge technology firsthand.
  culinary: Fazal Vaidyan, a budding home‑cook, frequently assists with family meals by perfecting aromatic spiced lentil stew and hand‑rolled flatbreads flavored with cumin, turmeric, and fresh cilantro,
    while also experimenting with classic pizza toppings like mozzarella and pepperoni on weekend pizza nights.
  core: Fazal Vaidyan is a structured, compassion‑driven teen who blends strategic robotics projects with a love for sci‑fi storytelling, careful budgeting, and hands‑on cooking, all while juggling occasional
    impulsive splurges and mild teenage anxieties.
background:
  cultural: Fazal comes from a South Asian family, likely of Indian (Tamil) heritage, that maintains bilingual communication at home in English and Tamil. Growing up in Richmond, Texas, he balances the
    cultural traditions of his family—celebrating festivals such as Diwali, participating in community gatherings at local temples, and enjoying South Asian cuisine—with the mainstream American school environment.
    His family places a strong emphasis on education, respect for elders, and community solidarity, shaping his values of responsibility, cooperation, and a desire to help others.
