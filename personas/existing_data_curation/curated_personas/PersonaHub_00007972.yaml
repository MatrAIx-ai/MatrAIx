persona_description: A member of the Crow tribe who is passionate about preserving the history and culture of indigenous peoples, particularly through the reburial of significant artifacts. She has a deep
  respect for the artifacts and the stories they hold and is committed to ensuring that the remains are treated with care and respect. She is also interested in the broader implications of the research,
  such as its potential to help heal the trauma experienced by indigenous peoples and to foster a greater understanding and appreciation of their cultural heritage.
