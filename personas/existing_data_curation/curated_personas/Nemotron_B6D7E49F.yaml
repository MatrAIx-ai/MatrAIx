personas:
  professional: Demetrius Meriweather, a 26‑year‑old school guidance counselor in northern Louisiana, leverages their methodical case‑management style, strong counseling and data‑driven decision‑making
    skills, and proficiency with Naviance and CareerTek to design structured, culturally responsive college‑readiness workshops that keep commitments and foster collaborative community partnerships.
  sports: Demetrius Meriweather, an avid weekend hiker with the Bienville Parish Hiking Society, follows the LSU Tigers football team and the New Orleans Saints, plays pick‑up basketball at the local community
    center, and maintains a disciplined fitness routine that blends trail runs in Kisatchie National Forest with weekly strength‑training sessions.
  arts: Demetrius Meriweather, a devoted member of a weekly book club, immerses themselves in works by James Baldwin, Toni Morrison, and Colson Whitehead while savoring gospel performances by Kirk Franklin
    and Al Green, and occasionally cites the lyrical storytelling of poet Rita Dove as inspiration for their own reflective writing.
  travel: Demetrius Meriweather, who meticulously plans trips using a travel‑reward credit card, has explored New Orleans, Austin, and Savannah for culinary and musical experiences, and hopes to hike the
    Blue Ridge Parkway in Asheville and later savor Tuscan cuisine in Florence, balancing modest budgets with a desire for cultural immersion.
  culinary: Demetrius Meriweather, a competent home chef, routinely prepares collard greens simmered with smoked turkey, crisp fried catfish dusted in cornmeal, and sweet‑potato pie spiced with cinnamon
    and nutmeg, drawing fresh herbs and okra from their garden while occasionally over‑seasoning in pursuit of bold Southern soul‑food flavors.
  core: Demetrius Meriweather is a methodically organized, community‑oriented 26‑year‑old whose love for chess strategy, garden rhythms, and gospel harmonies fuels a disciplined yet compassionate approach
    to life.
background:
  cultural: Demetrius is an African‑American raised in Ringgold, Louisiana, a small town steeped in Southern and Creole cultural traditions. He grew up in a close‑knit, church‑centered community where storytelling,
    oral history, and music play central roles. His family's emphasis on education and resilience in the face of systemic barriers shaped his commitment to service. Having attended an HBCU for his humanities
    degree, he carries a strong sense of Black cultural pride, familiarity with Southern cuisine, gospel traditions, and the communal values of hospitality and mutual aid that characterize Black life in
    rural Louisiana.
