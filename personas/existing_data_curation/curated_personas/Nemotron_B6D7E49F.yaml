  career_goals: Demetrius aims to earn a master’s degree in school counseling and obtain Louisiana state licensure within the next three years. He envisions creating a comprehensive, culturally responsive
    guidance program for Bienville Parish schools that partners with local churches and community organizations to build a scholarship pipeline for Black and low‑income students. Long‑term, he aspires to
    become the director of guidance services for the parish, influence district policy toward equitable educational access, and eventually launch a regional career development center that serves underserved
    youth across rural northern Louisiana.
