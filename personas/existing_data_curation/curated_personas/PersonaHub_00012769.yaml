persona_description: A BAER (Burn Area Evaluation and Response) team member who is dispatched to a fire scene to make an emergency assessment of the immediate post-fire condition of the landscape. This
  person is responsible for mapping areas within the burn scar that were most severely damaged by the fire, as well as mapping a multitude of elements that are affected by the fire, such as the habitat
  of threatened and endangered species, transportation needs, risk to human life or property, and water quality due to increased runoff. This person must make use of the best available data, regardless
  of the completeness or overall accuracy, and must deliver data to BAER teams quickly after fire containment.
