personas:
  professional: William Sapp, a 44‑year‑old front‑line usher turned event logistics specialist in Columbus, combines his hospitality expertise, meticulous record‑keeping, and empathetic conflict resolution
    with a talkative, people‑centered style, positioning him for a supervisory role and eventual venue manager position.
  sports: William Sapp follows the Columbus Crew SC in MLS and the Ohio State Buckeyes football team, participates in a weekly running club at the Columbus Running Club, hikes Highbanks Metro Park every
    other weekend, and balances his love for soccer with occasional backyard basketball games, though he tends to skip strength‑training sessions after a long workweek.
  arts: William Sapp immerses himself in Columbus’s cultural scene by attending productions at the Ohio Theatre, listening to live performances by the Columbus Symphony Orchestra, volunteering at the annual
    Columbus Arts Festival, discussing classic literature by Shakespeare and Hilary Mantel at his book club, and photographing murals by local artist Brian Raney, all of which shape his identity as a passionate
    arts advocate.
  travel: William Sapp prefers carefully planned weekend getaways, having explored Hocking Hills State Park and the historic streets of Charleston, South Carolina, while dreaming of a spring trip to Copenhagen’s
    Nyhavn district, yet balances his travel ambitions with family responsibilities and a modest travel budget.
  culinary: William Sapp enjoys cooking for friends, mastering dishes like chicken paprikash with sweet paprika, Ohio’s Skyline Chili topped with shredded cheddar, and paella infused with saffron, chorizo,
    and mussels, while also experimenting with seasonal vegetables from the farmer’s market such as heirloom tomatoes and kale.
  core: William Sapp is a sociable, detail‑oriented usher who channels his curiosity and lingering worry into a love of arts, meticulous budgeting, and a habit of over‑booking his schedule with community
    events and family dinners.
background:
  cultural: William grew up in the Midwest, raised in a middle‑class family with German‑Irish ancestry that valued community involvement, education, and practical hard work. He earned his bachelor’s degree
    in the humanities at a regional university, where he studied literature, history, and philosophy, fostering an appreciation for both European cultural heritage and Midwestern values of humility and
    cooperation. Residing in Columbus, Ohio, he embraces the city’s blend of Midwestern friendliness and growing arts scene, regularly participating in local festivals, supporting the Ohio State University
    cultural events, and contributing to neighborhood initiatives that celebrate the region’s history while welcoming diverse influences.
