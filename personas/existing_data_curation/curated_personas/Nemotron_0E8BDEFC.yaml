  hobbies: '[''Attending Live Theatre Performances'', ''Reading Historical Non-fiction and Classic Literature'', ''Photography of Urban Events'', ''Volunteering at Local Arts Festivals'', ''Playing Chess'',
    ''Cooking and Hosting Dinner Gatherings'', ''Hiking in Highbanks Metro Park'', ''Participating in a Neighborhood Book Club'', ''Gardening'', ''Listening to Jazz and Blues Music'']'
  career_goals: William aims to transition from front‑line ushering to a supervisory role within event management, eventually becoming a venue manager or community arts coordinator in Columbus. He plans
    to pursue a certificate in hospitality or event management to complement his humanities degree, and to mentor new staff, sharing his organizational techniques and customer‑service philosophy. Long‑term,
    he hopes to lead a community cultural initiative that bridges local arts programming with public outreach, while maintaining a work‑life balance that reduces his stress and allows more time for family.
