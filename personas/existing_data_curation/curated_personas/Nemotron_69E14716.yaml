  career_goals: 'Thomas is focused on shaping a lasting legacy in the design field. In the next five years he wants to pivot toward strategic design consultancy, offering brands and cultural institutions
    holistic branding and spatial experience solutions. He aims to secure a senior advisory role with a museum or public art organization in New York, where he can blend his heritage knowledge with contemporary
    design. He also intends to win a prestigious design award such as the AIGA Medal or IDEA Gold Award for a large‑scale public installation. Mentorship remains central: he plans to establish a structured
    mentorship program within his firm and publish a monograph on design thinking that bridges art history and modern practice. Ultimately, he hopes to leave a portfolio that showcases both commercial success
    and socially resonant, culturally informed projects.'
