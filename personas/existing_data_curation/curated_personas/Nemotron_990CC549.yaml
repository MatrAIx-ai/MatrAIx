personas:
  professional: Joseph Zarra is a parts salesperson at a bustling Utah auto shop who blends their curiosity about the latest automotive tech with a pragmatic, organized approach to inventory management,
    using ERP and POS systems to keep stock precise while leveraging their natural sociability and confident public speaking to meet sales targets and build lasting customer relationships.
  sports: Joseph Zarra is an avid outdoor enthusiast who spends weekends hiking, mountain biking, and skiing in the Wasatch Range, proudly supports the Utah Jazz and Real Salt Lake, rides with the Wasatch
    Mountain Bike Club, and while they thrive on the physical challenge, they also relish cheering on their favorite teams during the off-season.
  arts: Joseph Zarra is a tech-savvy gamer who finds creative release in multiplayer racing simulators and regularly hosts trivia nights featuring pop-culture questions, while they unwind at local concerts
    featuring Foo Fighters, The Killers, and indie filmmaker screenings at the Sundance Film Festival, appreciating both music and visual storytelling.
  travel: Joseph Zarra is a weekend explorer who has road-tripped through Utah’s national parks—Arches, Zion, and Bryce—while they dream of a future cross-country drive to the Pacific Coast Highway and
    a pilgrimage to Japan’s Tokyo Auto Salon, balancing spontaneous day trips with careful budgeting for longer adventures.
  culinary: Joseph Zarra is a self-described 'burger architect' who enjoys grilling grass-fed steaks, crafting elk chili with jalapeño and black beans, and experimenting with craft beers from local breweries,
    while they often order a pepperoni pizza after a long ski day and occasionally skip meal prep in favor of late-night gaming snacks.
  core: Joseph Zarra is a sociable, curiosity-driven parts salesperson who balances meticulous organization with spontaneous car-tuning projects, never misses a game night, and while they occasionally overindulge
    in performance parts at the expense of budgeting discipline, they always bounce back with renewed focus.
background:
  cultural: Joseph grew up in a middle-class, white American family in Ogden, Utah. His parents emphasized hard work, self-reliance, and community involvement, values common in the Intermountain West. While
    his surname reflects a heritage that traces back to Spanish-European roots, his upbringing was shaped by the local culture – a mix of outdoor recreation, a strong sense of neighborliness, and the modest,
    practical ethos of Utah’s small-city life. He participates in regional traditions such as summer festivals and winter sports, and he feels a connection to both the historic pioneer spirit and the contemporary,
    socially active youth scene.
attributes:
  skills: '[''Technical product knowledge'', ''Customer service'', ''Sales negotiation'', ''Inventory management'', ''ERP and POS system proficiency'', ''Public speaking'', ''Problem solving'', ''Time management'',
    ''Adaptability'', ''Team collaboration'']'
  hobbies: '[''Hiking'', ''Mountain biking'', ''Skiing'', ''Car modification'', ''Racing video games'', ''Hosting game nights'', ''Trivia competitions'', ''Community event volunteering'']'
  career_goals: Joseph aims to complete his bachelor's degree in Business Administration within the next two years while earning the Certified Automotive Parts Professional (CAPP) credential. In the short
    term, he targets a promotion to senior sales representative and later to sales manager, where he can lead a team, develop training programs, and drive regional growth. Long-term, he envisions launching
    his own auto-parts distribution business that leverages e-commerce and offers fast, reliable service to independent garages across the Intermountain West.
