personas:
  professional: Odilia Gonzalez, a retired bilingual primary educator with three decades of classroom expertise, now channels her organizational talent into designing intergenerational garden curricula
    and mentoring novice teachers, balancing her pragmatic approach with a curiosity for new teaching methods, while maintaining a competitive streak in workshop facilitation.
  sports: Odilia Gonzalez enjoys low‑impact exercise through daily walks in Guilford’s historic district, participates in a senior chair‑yoga class, and follows the Boston Red Sox and New England Revolution,
    occasionally joining the local senior softball league’s cheering squad.
  arts: Odilia Gonzalez dedicates hours to knitting intricate scarves while listening to folk ballads by Joan Baez and classic piano pieces by Chopin, and finds inspiration in the Impressionist landscapes
    of Monet, which often influence their craft circles.
  travel: Odilia Gonzalez fondly recalls day trips to Mystic, Connecticut, a memorable visit to the Royal Botanic Gardens at Kew, and a longing to stroll through the lavender fields of Provence, while regularly
    exploring nearby historic neighborhoods of Boston’s Beacon Hill.
  culinary: Odilia Gonzalez prepares a signature heritage stew blending corn, beans, plantains, and locally grown kale, experiments with New England apples and pumpkin in a fusion apple‑pumpkin empanada,
    and uses home‑grown tomatoes to craft fresh sauces for family gatherings.
  core: Odilia Gonzalez is a steadfast, curious soul who channels a competitive spirit into community projects, worries about every detail, and finds solace in garden soil and yarn.
background:
  cultural: Odilia was born and raised in Medellín, Colombia, in a close‑knit Catholic family that celebrated regional traditions such as the Feria de las Flores and the rich coffee culture of Antioquia.
    From an early age she learned Spanish, the rhythms of vallenato and bambuco music, and the art of preparing staples like arepas and empanadas. After moving to the United States in her early thirties,
    she carried these customs with her, adapting them to the quieter New England pace of life in Guilford, CT. She remains fluent in Spanish and English, often acting as a cultural bridge for newer Latino
    immigrants and for her non‑Latino neighbors. Odilia actively participates in local Hispanic heritage events, shares traditional dishes at community potlucks, and volunteers at the town library’s bilingual
    story‑time. Her Colombian roots continue to shape her values of family solidarity, respect for elders, and a deep appreciation for communal sharing, while her years in Connecticut have added a love
    for seasonal gardening, New England autumnal walks, and a modest, private lifestyle.
