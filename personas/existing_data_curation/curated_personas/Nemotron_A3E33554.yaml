  career_goals: Although retired, Odilia remains driven to leave a lasting imprint on her community. She aims to launch an intergenerational garden project in Guilford that pairs senior volunteers with
    local elementary students, creating a bilingual planting handbook that blends practical horticulture with Colombian gardening traditions. She also hopes to compile and publish a modest cookbook of family
    recipes accompanied by personal anecdotes, using any proceeds to fund a scholarship for Colombian students pursuing education degrees. Additionally, Odilia seeks to mentor younger teachers—especially
    those new to bilingual classrooms—through occasional workshops and informal coaching, while continuing her own learning in gerontology and mindfulness to better manage her tendency toward worry.
