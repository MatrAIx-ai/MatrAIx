  career_goals: Alexander aims to transition from the day-to-day grind of truck driving to a role that offers greater oversight and stability. Over the next three to five years he plans to complete a certified
    logistics and supply-chain management course at a community college, earn a supervisor-level CDL endorsement, and move into a fleet-coordinator or depot-manager position where he can apply his practical
    driving experience to scheduling, compliance auditing, and driver mentorship. Ultimately, he dreams of launching a modest owner-operator business that focuses on regional freight, allowing him to maintain
    a predictable home base while preserving the flexibility he values. Achieving these goals would also give him a steadier income, reduce the stressful long-haul lifestyle, and provide opportunities for
    upward mobility without leaving the transportation field.
