personas:
  professional: Lidice Fernandez, a budding marketing coordinator with a flair for turning data-driven budgets into community‑centric campaigns, leverages their bilingual fluency, meticulous project‑management
    skills, and upbeat personality to align commercial targets with social impact initiatives.
  sports: Lidice Fernandez, a Zumba enthusiast and boot‑camp regular, rallies behind the Miami Heat, competes in a co‑ed recreational soccer league with the South Beach Strikers, and caps the week with
    trail runs through the Everglades, blending team spirit with solo endurance.
  arts: Lidice Fernandez, a salsa‑dance aficionado, attends weekly workshops with instructor Carlos Valdez, frequents live bachata shows featuring Leslie & Raúl, and draws creative inspiration from filmmaker
    Ava DuVernay’s storytelling when planning community events.
  travel: Lidice Fernandez, an adventurous weekend explorer, loves spontaneous road trips to the Everglades, plans annual visits to family on their island heritage, and dreams of strolling the cobblestone
    streets of Old San Juan and lounging on the sands of Punta Cana.
  culinary: Lidice Fernandez, a passionate home chef, perfects mofongo, arroz con gandules, and tembleque for friends, experiments with plantain‑based twists, pairs dishes with a crisp sauvignon blanc,
    yet often over‑seasons with adobo and occasionally forgets to chill the dessert before serving.
  core: Lidice Fernandez blends disciplined project‑management with a love of rhythmic dance, juggling spreadsheets by day and vibrant community events by night, while a habit of over‑committing fuels both
    creative energy and occasional burnout.
background:
  cultural: Lidice is a first‑generation Puerto Rican‑American raised in Saint Cloud, Florida. She grew up bilingual, speaking Spanish at home and English at school, which has given her deep ties to both
    Puerto Rican and Floridian cultures. Family gatherings are centered around traditional dishes, music, and storytelling, reinforcing values of hospitality, respect for elders, and community solidarity.
    She participates in local Puerto Rican cultural events such as the annual Puerto Rican Day Parade and the island‑themed food festivals at Osceola County. This bicultural upbringing informs her worldview,
    fueling her desire to bridge cultures through business and community initiatives.
attributes:
  skills: '[''Financial budgeting'', ''Data analysis'', ''Strategic planning'', ''Project coordination (Trello, Asana)'', ''Customer relationship management'', ''Bilingual communication (Spanish/English)'',
    ''Social media marketing'', ''Event planning'', ''Public speaking'', ''Team leadership'']'
  hobbies: '[''Salsa and bachata dancing'', ''Zumba fitness classes'', ''Cooking Puerto Rican cuisine'', ''Volunteering at community centers'', ''Attending live music concerts'', ''Reading business and
    self‑development books'', ''Hiking nature trails in Florida'', ''Traveling to Caribbean destinations'']'
  career_goals: Lidice intends to launch her professional career in a role that blends marketing, project management, and community outreach. In the short term, she is targeting entry‑level positions such
    as Marketing Coordinator or Project Assistant within companies that value cultural diversity and social impact. She plans to earn certifications in Digital Marketing and Project Management (e.g., Google
    Analytics, PMP) and eventually pursue an MBA to deepen her strategic expertise. Long‑term, Lidice aspires to become a Marketing Manager or Senior Project Manager, leading cross‑functional teams on campaigns
    that promote both commercial success and community enrichment, and she harbors a future ambition to launch her own boutique business that showcases Puerto Rican craftsmanship and culinary products.
