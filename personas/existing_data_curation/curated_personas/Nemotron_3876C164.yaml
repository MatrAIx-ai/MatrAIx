  career_goals: She aspires to move into senior executive leadership, such as Director of Operations or VP of Product, where she can shape organizational strategy, champion data‑driven decision making,
    and embed a culture of resilience and inclusivity. Jessica also aims to mentor emerging talent, spearhead sustainability initiatives, and eventually launch a consultancy that helps mid‑size companies
    streamline operations while preserving employee well‑being.
