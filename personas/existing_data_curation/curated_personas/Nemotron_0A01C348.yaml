personas:
  professional: Lazaro Diaz, a 17‑year‑old aspiring automotive‑technology student, blends hands‑on curiosity with practical skill by tinkering with Arduino projects and performing car maintenance, while
    using bilingual communication to explain technical details to Spanish‑speaking customers and planning to open a community‑focused repair and solar‑panel installation shop.
  sports: Lazaro Diaz plays pickup soccer with neighborhood friends on Sundays, follows the Miami Heat and the local surf club at John D. MacArthur Beach State Park, and balances competitive play with casual
    paddle‑boarding, though anxiety about schoolwork sometimes causes them to skip practice sessions.
  arts: Lazaro Diaz creates comic‑style illustrations inspired by graphic novels, shares TikTok videos of Latin‑inspired street‑food recipes set to salsa and reggaeton beats, and practices dancing at community
    gatherings, using art as a stress‑relief outlet while occasionally procrastinating on larger projects.
  travel: Lazaro Diaz enjoys spontaneous weekend trips to the Atlantic coast for surfing, dreams of backpacking through Panama’s Pacific surf spots, prefers flexible itineraries over strict planning, yet
    worries about finances often limits the duration and distance of their adventures.
  culinary: Lazaro Diaz loves preparing empanadas filled with pork and plantains, whipping up fresh guacamole with lime and cilantro, and experimenting with taco toppings while filming short cooking clips,
    though they frequently forget to clean the kitchen afterward.
  core: Lazaro Diaz is a tech‑savvy teen who juggles soccer, surf, and Arduino projects, worries a lot about money and grades, finds solace in sketching comic panels and dancing to reggaeton, but sometimes
    lets stress derail chores and savings.
background:
  cultural: Lazaro is a second‑generation Cuban‑American whose family maintains strong ties to Cuban culture while navigating life in South Florida. He grew up speaking both Spanish and English, celebrating
    traditions such as Noche de San Juan, preparing dishes like ropa vieja and Cuban coffee with his grandparents. The rhythmic influences of Afro‑Cuban music and community gatherings in West Palm Beach
    have shaped his social life and artistic tastes. While embracing the multicultural vibe of his city, he also carries the values of family loyalty, resilience, and a communal spirit typical of Cuban
    diaspora families.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Basic computer troubleshooting", "Arduino and simple electronics prototyping", "Automotive maintenance (oil changes, tire rotations)", "Organizational
    planning and time management", "Creative writing for social media captions"]'
  hobbies: '["Soccer", "Salsa and reggaeton dancing", "Arduino prototyping", "TikTok video editing (food and tech content)", "Comic‑style drawing and graphic novel reading", "Surfing and paddle‑boarding"]'
  career_goals: Lazaro wants to turn his practical curiosity into a stable career that also lets him give back to his community. His short‑term goal is to earn a GED and enroll in a vocational program for
    automotive technology or renewable‑energy installation, fields he sees as both secure and innovative. He aspires to become a certified mechanic or solar‑panel installer, eventually opening a small shop
    that offers affordable services to families in West Palm Beach. Alongside his technical ambitions, he hopes to maintain his bilingual advantage by serving as a liaison for Spanish‑speaking customers,
    blending his social skills with technical expertise. He also envisions further education in business management to eventually expand his services.
