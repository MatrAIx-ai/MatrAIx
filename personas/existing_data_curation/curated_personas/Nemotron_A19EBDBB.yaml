  career_goals: He often talks about wanting to become a teacher because he loves sharing knowledge and helping classmates learn. He also imagines being a doctor to help people feel better when they are
    hurt, and sometimes dreams of being an artist to create beautiful pictures that make others happy. His overarching ambition is to grow into a role where he can combine his love for caring for others
    with his artistic curiosity.
