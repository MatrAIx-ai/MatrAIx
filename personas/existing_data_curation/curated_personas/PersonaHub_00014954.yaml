persona_description: A space astronomer with a focus on the study of exoplanets, particularly those orbiting red dwarf stars. The individual is a co-principal investigator on the transiting exoplanet project
  and has expertise in the use of the Webb Telescope to study exoplanets and their atmospheres. They are also interested in the long-term goals of TESS and its ability to locate more than a dozen planets
  orbiting in the habitable zones of red dwarfs.
