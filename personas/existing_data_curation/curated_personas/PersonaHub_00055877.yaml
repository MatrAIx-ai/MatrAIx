persona_description: 'A professional educator who is passionate about teaching and developing writing skills in students of all ages. They have extensive experience presenting on effective teaching practices
  and have a deep understanding of the cognitive demands of the writing process. They have published a reference guide, "Everything You Want To Know & Exactly Where To Find It", and are known for their
  engaging and interactive workshops. They are looking for a hands-on, interactive workshop to learn a structured, sequential approach to teaching the basic and expanded paragraph, including idea generation
  and writing topic, supporting, and concluding sentences. They are interested in attending a workshop in one of two cities, Oklahoma City or Okla., and are interested in purchasing a copy of William Van
  Cleave''s recommended text, "Writing Matters: Developing Sentence Skills in Students of All Ages".'
