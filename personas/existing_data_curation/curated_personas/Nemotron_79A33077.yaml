  career_goals: Susan aspires to a career that blends her curiosity about the natural world with practical problem‑solving. In the long term, she hopes to study environmental science or veterinary technology
    at a university, focusing on sustainable agriculture and prairie ecosystem conservation in the Great Plains. She envisions working as a wildlife biologist or a veterinary technician who helps local
    farms adopt humane and eco‑friendly practices. In the short term, she plans to finish high school with strong grades, take advanced science classes, join the school’s robotics and science clubs, and
    secure a summer internship or volunteer position at a nearby nature preserve or family farm. She also wants to develop leadership skills to eventually run community workshops on ecological stewardship.
