  hobbies: '[''Salsa dancing'', ''Kayaking on the St. Johns River'', ''Volunteering at the Jacksonville Food Bank'', ''Gardening (herbs and vegetables)'', ''Attending local music festivals'', ''Road trips
    to nearby beaches'', ''Reading mystery novels'', ''Knitting and crocheting'']'
  career_goals: Daniella aims to move from a cashier role into a supervisory position within the next two years, targeting a shift‑lead or assistant manager role where she can leverage her operational expertise
    and people‑skills. She plans to complete a retail‑management certificate offered by a community college and to take on mentorship responsibilities for new hires. Long‑term, she dreams of opening a small
    boutique that showcases locally made goods, using her business knowledge to create a community‑focused retail space.
