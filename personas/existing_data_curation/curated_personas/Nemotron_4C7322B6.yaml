personas:
  professional: Daniella York, a 52‑year‑old veteran retail cashier with twenty years of front‑line experience, applies their meticulous cash‑handling expertise, swift conflict resolution, and love of structured
    shift schedules— tempered by a spontaneous flair for unexpected rushes— to smoothly run checkout lanes while actively pursuing a shift‑lead supervisory role.
  sports: Daniella York stays active through weekly salsa and line‑dance classes, seasonal kayaking excursions on the St. Johns River with the Jacksonville Kayak Club, and cheering for the Jacksonville
    Jaguars while joining community pick‑up soccer matches to keep their cardio up.
  arts: Daniella York immerses themselves in Jacksonville’s Springing the Blues festival, finds inspiration in the folk melodies of Gillian Welch and the smooth jazz of Diana Krall, and translates that
    artistic spirit into their knitting, crocheting, and herb‑laden garden designs.
  travel: Daniella York favors spontaneous, budget‑friendly weekend road trips to nearby beaches like Jacksonville Beach and Amelia Island, while dreaming of a scenic drive along the Gulf Coast to New Orleans
    and cultural tours of Savannah, planning each escape on a whim using travel apps on their phone.
  culinary: Daniella York, a confident home cook, delights in preparing herb‑infused caprese salads with fresh basil and heirloom tomatoes, simmering tomato‑basil pasta, and occasional shrimp‑and‑grits
    at local seafood spots, always using garden‑grown basil, cilantro, and thyme.
  core: Daniella York is a socially vibrant, detail‑driven retail pro who meticulously budgets yet impulsively splurges on dance shoes, channels their energy into communal activities, battles occasional
    back pain from dancing, and dreams of opening a boutique that showcases locally‑made treasures.
background:
  cultural: Daniella is a White American who was raised in the suburban neighborhoods of Jacksonville, Florida. Her family’s roots trace back to the American South, with grandparents who migrated from Georgia
    and the Carolinas, instilling values of hospitality, self‑reliance, and community involvement. Growing up in a multicultural port city exposed her to diverse cuisines, music, and traditions, which she
    embraces through her social activities. As a divorced woman, she values independence and has built a supportive network of friends, coworkers, and local community groups that reflect the inclusive,
    laid‑back yet resilient spirit of the Jacksonville area.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Customer service'', ''Conflict resolution'', ''Inventory tracking'', ''Basic bookkeeping'', ''Shift scheduling'', ''Staff training'', ''Health‑safety
