  career_goals: Maria aims to advance within the retail logistics field by taking on supervisory responsibilities, such as becoming a shift lead or inventory manager at her current store or a nearby distribution
    center. She plans to enroll in a GED program and pursue certifications in supply‑chain basics or forklift operation to strengthen her qualifications. Long‑term, she hopes to oversee a team, mentor new
    employees, and contribute to improving operational efficiency through process improvements.
