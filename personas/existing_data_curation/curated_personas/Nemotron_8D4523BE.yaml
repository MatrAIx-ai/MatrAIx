personas:
  professional: Maria Chahoud is a warehouse operations specialist who brings meticulous inventory handling, precise order fulfillment, and a safety‑first mindset to a fast‑paced shop floor, while their
    talkative, team‑building style turns routine briefings into lively huddles and positions they as a natural candidate for a shift‑lead or inventory manager role.
  sports: Maria Chahoud stays fit through regular hikes with the San Bernardino Trail Hikers Association, participates in a co‑ed adult soccer league that plays at the Inland Empire Sports Complex, and
    they root for the Los Angeles Lakers in winter, the Dodgers in spring, and the LA Galaxy during the soccer season.
  arts: Maria Chahoud channels their love of storytelling into local oral‑history circles and lights up karaoke nights belting out classics by Carlos Santana and Celia Cruz, while their involvement in a
    folkloric dance troupe lets them rehearse the vibrant steps of La Danza de los Viejitos and they often quote lines from Pedro Almodóvar’s films during gatherings.
  travel: Maria Chahoud prefers meticulously planned road trips that blend relaxation and cultural immersion, taking their family to the desert oasis of Palm Springs each spring, hiking the cliffs of the
    Grand Canyon in summer, and they dream of a future overseas adventure to Barcelona’s Gothic Quarter, all while balancing a modest budget and their work schedule.
  culinary: Maria Chahoud, an adept home chef, spends weekends perfecting masas for tamales and simmering fragrant pozole with hominy, dried guajillo chilies, and pork shoulder, while they also experiment
    with homemade salsa verde featuring tomatillos and cilantro, and they treat themselves to occasional brunches at a nearby café for avocado toast and espresso.
  core: Maria Chahoud blends meticulous organization with a contagious talkative charm, turning every inventory audit into a mini‑team huddle and they secretly hoard a notebook of favorite karaoke lyrics
    for later performance.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. She maintains strong ties to Mexican traditions, such
    as Día de los Muertos, quinceañeras, and Sunday family meals featuring foods like tamales, pozole, and arroz con pollo. Living in Highland, CA, she is part of a vibrant Hispanic community and participates
    in local cultural festivals, church activities, and neighborhood events that celebrate her heritage.
