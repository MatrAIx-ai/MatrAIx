  career_goals: Samantha aims to build on her extensive cashier experience by moving into a supervisory or shift‑lead role where she can mentor junior staff and improve operational efficiency. She is also
    pursuing a short associate‑level program in business administration at a local community college to solidify her management credentials. Simultaneously, she aspires to integrate her love of art with
    her professional life by volunteering as a docent at the Walker Art Center or a similar local gallery, eventually seeking a part‑time position that merges front‑of‑house customer service with cultural
    programming. Long‑term, Samantha envisions opening a modest boutique that showcases handmade crafts and local artist merchandise, creating a serene space that reflects her values of community, harmony,
    and personal expression.
