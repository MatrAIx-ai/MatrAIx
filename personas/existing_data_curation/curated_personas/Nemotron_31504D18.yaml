personas:
  professional: Samantha Pitts, a veteran retail cashier in the Twin Cities, leverages two decades of precise cash handling, empathetic conflict resolution, and meticulous inventory tracking to create calm
    shopping experiences, while her curiosity about contemporary art fuels her ambition to mentor staff and blend customer service with cultural programming.
  sports: Samantha Pitts enjoys low‑impact fitness through early‑morning bike rides along the Grand Rounds trail, seasonal membership with the local senior walking club, and cheering for the Minnesota Vikings
    and Minnesota Timberwolves, while occasionally attending a community yoga class that aligns with her gentle approach to exercise.
  arts: Samantha Pitts, an engaged patron of the Walker Art Center and regional galleries, frequently attends intimate jazz concerts featuring artists like Kamasi Washington and folk shows by Joanna Newsom,
    participates in community art workshops, and references contemporary creators such as Kehinde Wiley and Olafur Eliasson in her conversations.
  travel: Samantha Pitts prefers purposeful, small‑group trips that blend culture and nature, having explored the historic streets of Savannah, the art lodges of Santa Fe, and the music festivals of Asheville,
    while dreaming of a quiet weekend in Lanesboro, Minnesota, to sketch landscapes and sip locally roasted coffee.
  culinary: Samantha Pitts loves crafting Midwestern comfort dishes such as wild‑rice and mushroom hotdish, rhubarb crisp, and fresh corn succotash, using seasonal produce from the farmers market, and often
    experiments with herbs like dill and sage, though she sometimes forgets to refrigerate leftovers, leading to occasional pantry mishaps.
  core: Samantha Pitts is a methodical, art‑loving cashier who balances meticulous work habits with a tender, anxiety‑prone heart, finding solace in knitting, museum strolls, and quiet gardens while quietly
    dreaming of a community‑centric boutique.
background:
  cultural: Samantha was raised in the Twin Cities area of Minnesota, growing up in a middle‑class, predominantly white community with strong German and Scandinavian roots that are common in the region.
    The Midwestern values of modesty, reliability, and community service have shaped her outlook, fostering a deep respect for hard work and cooperation. Minneapolis's vibrant arts scene—particularly institutions
    like the Walker Art Center and the Minneapolis Institute of Art—has nurtured her curiosity and love of contemporary culture, while the city's progressive attitudes have encouraged her openness to unconventional
    ideas and mental‑health awareness. Her background reflects a blend of traditional Midwestern sensibilities with an emerging appreciation for diverse artistic expression and personal well‑being.
