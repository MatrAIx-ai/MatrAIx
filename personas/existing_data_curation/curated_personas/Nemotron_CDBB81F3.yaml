  hobbies: '[''Herb Gardening'',''Reading Culinary History'',''Crossword Puzzles'',''Woodworking'',''Jazz/Blues Vinyl Collecting'',''Genealogy Research'',''Meditative Walking'',''Wine Tasting'']'
  career_goals: Theresa aims to achieve Master Mixologist certification within the next two years, positioning herself as a regional authority on craft cocktails. She plans to open a boutique, low-key lounge
    that emphasizes a quiet, reflective atmosphere for patrons seeking an intimate drinking experience, integrating her own herb garden and Afro-American heritage flavors into the menu. In parallel, she
    dreams of authoring a cocktail guide that documents historically Black cocktail traditions and serves as a training resource for aspiring bartenders. Long-term, she envisions mentoring younger staff
    and partnering with local community organizations to provide hospitality apprenticeships for underrepresented youth.
