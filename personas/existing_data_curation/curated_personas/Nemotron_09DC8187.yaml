  career_goals: Although no longer in the formal workforce, Anthony aims to remain a trusted mentor in his community by sharing his practical knowledge with younger neighbors and his grandchildren. He hopes
    to document his family’s history and his own life story, combining his curiosity for genealogy with his love for storytelling. He also aspires to keep his workshop active, learning a few new woodworking
    techniques each year and contributing occasional volunteer labor for local community events and the town’s historical society.
