persona_description: A researcher and scholar with expertise in the field of European cultural policy, specifically focusing on the role and impact of national museums on national identity and social cohesion.
  This individual is passionate about understanding how museums can serve as agents of social change, provide a "connective tissue" for social cohesion, and strike a balance between celebrating historical
  ethnicity and providing a positive representation of minority groups. This person is well-versed in the history and development of national museums, including the role they played in the development of
  nation-states and their survival during times of communist rule. They are also knowledgeable about the importance of architecture, modes of representation, visitors' experiences, and the extension of
  the role of national museums beyond Europe. This researcher is dedicated to developing communication tools to make the findings accessible to all stakeholders, including cultural policy makers, museum
  professionals, regional planners, and the general public.
