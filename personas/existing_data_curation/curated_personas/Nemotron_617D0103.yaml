  hobbies: '["Landscape Painting", "Reading Science Fiction & Fantasy", "Chess", "Photography", "Hiking (Great Dismal Swamp)", "Attending Small Art Galleries", "Listening to Live Jazz", "Writing Short Stories",
    "Participating in Local Book Clubs", "Volunteering for Community Art Projects"]'
  career_goals: Daniel aims to become an English department chair within the next five years, using the role to embed STEAM principles across the humanities curriculum. He aspires to lead a district‑wide
    initiative that equips teachers with strategies for integrating art and technology into core subjects. He hopes to publish research on the impact of imagination‑driven instruction on student engagement
    and to present at national education conferences. On a longer horizon, he envisions founding a community partnership program that offers after‑school workshops in creative writing, digital illustration,
    and storytelling for Norfolk’s youth, especially children of military families.
