  career_goals: Cherelle aims to leverage her driving and sales experience to move into a supervisory role in logistics, eventually owning a small fleet of trucks that serve local businesses in San Antonio.
    She plans to obtain additional certifications, such as a hazardous materials endorsement and a logistics management certificate, to broaden her expertise. Her long‑term ambition is to create a driver‑owned
    cooperative that offers flexible work schedules, fair pay, and community mentorship programs, especially for women and people of color entering the trucking industry. She also hopes to integrate her
    passion for helping others by establishing a partnership with local nonprofits to provide transportation for seniors and low‑income families. While she values flexibility, she wants to build a stable,
    respected business that contributes positively to her community.
