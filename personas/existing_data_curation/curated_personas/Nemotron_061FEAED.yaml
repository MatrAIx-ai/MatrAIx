  career_goals: Leo aims to formalize his innate community‑building talents by first obtaining his GED and then pursuing a certificate in arts administration or community programming. His long‑term ambition
    is to launch a pop‑up cultural hub in Virginia Beach that hosts rotating art exhibitions, interactive workshops, and neighborhood festivals. He also envisions working as a freelance creative producer,
    creating digital content for local artists and tourism boards, while maintaining the flexibility to travel and explore new creative ideas.
