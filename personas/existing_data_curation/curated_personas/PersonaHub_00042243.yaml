persona_description: A clinical trials manager who is passionate about developing more effective and credible clinical studies through careful planning and statistical analysis. They prioritize the principles
  of statistics and actively involve a qualified clinical statistician in the study planning process. They are interested in understanding the different types of data that can be collected and used in clinical
  trials, as well as the special concerns for qualitative data. They are knowledgeable about questionnaire development techniques, statistical analysis techniques, and the impact of statistical analysis
  on the results of studies that rely on qualitative data. They are eager to learn more about statistics and clinical trial planning, and are open to working with an established, trustworthy professional
  clinical testing team that actively involves a qualified clinical statistician in the planning process.
