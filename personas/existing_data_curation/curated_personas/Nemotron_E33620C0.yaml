  career_goals: Terry dreams of turning his creative passions into a career by studying graphic design or multimedia arts after high school, eventually working as a freelance illustrator or art director
    for a digital studio. He hopes to use his artistic talents to promote local community events in Red Bluff, perhaps organizing a youth arts festival. In the longer term, he imagines teaching art workshops
    for younger kids and contributing to public murals that celebrate his town’s culture.
