    rock'']'
  career_goals: Dennis aims to transition from a hands‑on groundskeeper to a senior manager overseeing multiple properties in the region, eventually launching his own boutique landscaping firm focused on
    sustainable, native‑plant designs. He wants to become recognized as an innovative designer who blends traditional Southern garden aesthetics with contemporary art installations. Mentoring younger workers
    and establishing a community garden program in Columbus County are also high on his agenda, reflecting his desire to give back while expanding his professional reputation.
