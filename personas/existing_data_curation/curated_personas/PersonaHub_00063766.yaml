persona_description: A literary scholar who is interested in the distinction between adaptation and translation. They are particularly drawn to the area of literary texts and their construction from systems,
  codes, and traditions established by previous works of literature. They are intrigued by the different techniques and reasons for adaptation, and how these can affect the overall quality and meaning of
  the resulting text. They are also interested in the demarcation line between adaptation and translation, and how it can be used to clarify the distinction between the two.
