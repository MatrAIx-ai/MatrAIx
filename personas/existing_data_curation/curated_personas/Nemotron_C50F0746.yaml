  career_goals: Yesenia often talks about using her imagination to create beautiful pictures, so she dreams of becoming an artist—perhaps a painter or illustrator—who can tell stories with colors. She also
    loves helping friends learn new games and ideas, which leads her to imagine a future as a teacher who shares her love of art and curiosity with other children. Occasionally, when she watches space videos,
    she imagines being an astronaut exploring the stars. For now, her main ambition is to keep improving her drawing skills, learn more about the world, and share her creativity with her family and classmates.
