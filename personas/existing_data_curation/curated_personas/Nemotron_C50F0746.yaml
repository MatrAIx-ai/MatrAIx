personas:
  professional: A budding six‑year‑old named Yesenia Cadenas sees every LEGO set as a stepping stone to future architectural design, combining meticulous organization with free‑form creativity; they love
    sketching floor plans for imaginary castles and are already learning basic spatial reasoning, making them a tiny but determined future builder.
  sports: A spirited six‑year‑old named Yesenia Cadenas darts around the neighborhood lawn with the Sunny Kids Soccer Club on Saturday mornings, idolizes the Los Angeles Dodgers, and practices backyard
    obstacle courses that blend climbing, hopping, and bike riding, while their favorite team jersey hangs by the bedroom door for extra motivation.
  arts: A vibrant six‑year‑old named Yesenia Cadenas fills sketchbooks with watercolor seas and clay critters, grooves to upbeat pop hits from Taylor Swift and the playful tunes of The Wiggles, and re‑creates
    scenes from Pixar’s Finding Nemo during playtime, letting these artistic influences shape their imaginative storytelling.
  travel: An adventurous six‑year‑old named Yesenia Cadenas loves turning backyard leaf hunts into mini‑expeditions, has explored the local children’s museum in the city, spent a summer weekend at a beach
    resort in Florida building sandcastles, and dreams of a family road trip to the Grand Canyon to see the sunrise over the cliffs.
  culinary: A curious six‑year‑old named Yesenia Cadenas delights in slurping cheesy macaroni, nibbling strawberry‑banana smoothies, and assembling bite‑size fruit kebabs with pineapple, grapes, and blueberries;
    they proudly help stir chocolate chip cookie dough, mastering the addition of butter, brown sugar, and vanilla extract, though they sometimes sneak a bite of frosting before the cookies are done.
  core: Yesenia Cadenas is a six‑year‑old whirlwind of curiosity, mixing LEGO architecture, watercolor dreams, and a candy‑splurging piggy bank while navigating occasional allergies and a love for backyard
    adventures.
background:
  cultural: Yesenia grows up in a Mexican‑American household in Humble, Texas, where both English and Spanish fill her daily life. Her parents celebrate Mexican traditions such as Día de los Muertos and
    Cinco de Mayo, often preparing homemade tamales, enchiladas, and other family recipes that connect her to her heritage. She learns stories from Mexican folklore, like the legend of La Llorona and the
    adventures of the heroic figure El Chapulín, which nurture her love for narrative and imagination. Religious customs, often rooted in Catholicism, provide community gatherings and rituals that emphasize
    family togetherness. Living in a diverse suburban area of Harris County, she experiences a blend of Texan culture—football games, county fairs, and neighborhood picnics—while maintaining strong ties
    to her cultural roots through bilingual schooling and community events at the local church and cultural center. This multicultural environment encourages her open‑mindedness, curiosity, and appreciation
    for varied experiences.
