  hobbies: '[''Coastal hiking'', ''Landscape photography'', ''Model aircraft building'', ''Raspberry Pi tinkering'', ''Puzzle solving'', ''Online chess'', ''Strategic video gaming'', ''Science‑fiction reading'',
    ''Tech podcast listening'']'
  career_goals: Mohamed aims to re‑enter the workforce in a remote senior engineering role that blends product design with data‑driven decision making, ideally within a company focused on sustainable technology.
    He plans to obtain a PMP certification and deepen his expertise in machine‑learning applications for product optimization. In the long term, he aspires to launch his own consultancy that helps small
    manufacturers adopt digital design and analytics tools, positioning himself as a niche expert in eco‑friendly product development. He also hopes to mentor junior engineers through structured training
    programs, leveraging his competitive drive to foster high performance.
