  hobbies: '[''Reading mystery chapter books'', ''Building LEGO constructions'', ''Solving jigsaw puzzles'', ''Drawing and coloring in a sketchbook'', ''Swimming lessons'', ''Girl Scouts activities'', ''Caring
    for pet hamster'', ''Nature walks in local parks'', ''Mindfulness breathing exercises'']'
  career_goals: Jannelle dreams of a future where she can provide structure and support to others. She often talks about becoming an elementary school teacher because she loves books and wants to help classmates
    learn in a calm, organized environment. She also imagines working as a school librarian, combining her love of reading with her knack for arranging and categorizing. Occasionally, she mentions wanting
    to be a veterinarian so she can care for animals, reflecting her compassion for her hamster and other pets.
