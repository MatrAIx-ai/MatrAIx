personas:
  professional: Jannelle Horist is an aspiring junior detective, using the logical structure of mystery chapter books and meticulous LEGO builds to hone investigative skills, and they apply this methodical
    mindset to group projects in Girl Scouts.
  sports: Jannelle Horist swims at the community pool with the Lakeland Junior Swim Team, cheers for the local Florida Gators football squad, and they enjoy seasonal activities like kayaking on Lake Parker
    during summer.
  arts: Jannelle Horist fills sketchbooks with detailed drawings of forest scenes and favorite cartoon characters such as Scooby‑Doo, listens to kid‑friendly singer JoJo Siwa, and they attend local library
    art workshops to explore watercolor techniques.
  travel: Jannelle Horist loves exploring Lakeland’s parks, has visited the Florida Aquarium in Tampa and the Kennedy Space Center on a family road trip, and they dream of seeing the Grand Canyon’s sunrise
    someday.
  culinary: Jannelle Horist enjoys classic mac and cheese, builds banana‑peanut‑butter smoothies, helps stir batter for chocolate chip cookies, and they proudly claim that their best dish is a perfectly
    crispy chicken nugget.
  core: Jannelle Horist blends a love for structure with boundless curiosity, using meticulous LEGO builds and mindful breathing to navigate a world that sparks intense emotions and occasional impulsive
    treats.
background:
  cultural: Jannelle grows up in a middle‑class, suburban family in Lakeland, Florida, where community gatherings, school events, and outdoor activities shape daily life. Her household emphasizes kindness,
    cooperation, and order, reflecting a blend of Southern hospitality and Floridian love of nature. Family traditions include regular church attendance—often celebrating holidays like Christmas and Easter—and
    participation in local volunteer projects. Exposure to the diverse ecosystems of central Florida, such as nearby lakes and wetlands, nurtures her curiosity about wildlife and the environment.
attributes:
