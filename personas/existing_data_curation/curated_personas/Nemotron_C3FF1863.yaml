personas:
  professional: Inmar Najera is a four-year-old budding builder who transforms cardboard boxes into elaborate forts, mixing wild imagination with practical, sturdy construction techniques while thriving
    on group play; they often let a loose schedule guide the adventure.
  sports: Inmar Najera cheers enthusiastically for the New York Knicks while sprinting around the Tiny Tigers preschool soccer team, loving the mix of watching professional basketball and kicking the ball
    in friendly, loosely organized practices; they often trade high-fives after each game.
  arts: Inmar Najera delights in dancing to The Wiggles, laughing at Sesame Street's Elmo, and drawing pictures of Disney's Moana, letting favorite characters shape the day's creative projects; they love
    singing along at the top of their lungs during playtime.
  travel: Inmar Najera has visited the local zoo, splashed at a seaside boardwalk in Santa Monica, and dreams of a family trip to Disneyland Paris after hearing stories of princess castles and magical rides;
    they cherish collecting tiny souvenir magnets from every outing.
  culinary: Inmar Najera favours cheesy macaroni, golden chicken nuggets, apple slices with cinnamon, and strawberry-sprinkled yogurt, proudly declaring that the crunchy texture is the best part of every
    meal; they often request a second helping of the macaroni when it's served warm.
  core: Inmar Najera blends boundless curiosity with a laid-back attitude, prefers spontaneous play over strict schedules, and habitually forgets to put toys away, turning the living room into an ever-changing
    adventure zone; they laugh loudly when a tower collapses, treating it as a fresh start.
background:
  cultural: Inmar grows up in a Mexican‑American household in Pharr, Texas, where Spanish and English are spoken interchangeably at home. He participates in cultural traditions such as Día de los Muertos
    altars, celebrating with vibrant papel picado decorations, and enjoying family‑cooked meals like tamales and tacos. Local festivals in the Rio Grande Valley expose him to mariachi music, folkloric dance,
    and community picnics, reinforcing his sense of belonging to both Mexican heritage and Texan culture. This bicultural environment shapes his social interactions, language use, and appreciation for multicultural
    celebrations.
attributes:
  skills: '["Counting to 20", "Letter recognition (A‑Z)", "Fine‑motor drawing and block building", "Cooperative play leadership", "Simple storytelling"]'
  hobbies: '["Tag and hide‑and‑seek", "Block and LEGO building", "Dancing and clapping to music", "Singing bilingual nursery songs", "Exploring nature in parks", "Participating in family and community festivals"]'
  career_goals: Although only four, Inmar already shows a budding ambition to help others and stay active in his community. He often says he wants to be a firefighter because he likes the idea of rescuing
    people and using big, practical tools. He also expresses interest in becoming a teacher one day, enjoying the thought of sharing ideas and guiding friends during play. These future goals align with
    his balance of curiosity and practicality, as well as his desire for flexible, socially engaging roles.
