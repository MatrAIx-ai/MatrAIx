  hobbies: '[''Fly fishing'', ''Hiking'', ''Woodworking'', ''Reading technical non-fiction'', ''Craft beer brewing'', ''Strategy board games'', ''Community volunteering'']'
  career_goals: Rodolfo aims to ascend to a senior management role within the claims department, such as Claims Operations Manager or Director of Investigations, where he can shape policy, improve analytical
    processes, and lead a team of investigators. He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation and deepen his expertise in predictive analytics for loss forecasting. Over
    the longer term, he envisions establishing his own boutique adjusting consultancy that specializes in complex liability and fraud cases, leveraging data-driven methodologies to deliver efficient, fair
    outcomes for insurers and claimants alike while preserving the flexibility he values in his workflow.
