personas:
  professional: Miguelina Amarillo, a miniature project manager, arranges a stack of building blocks into a daily schedule that balances play, nap, and snack times, showcasing an innate love for structure
    and a knack for turning simple tasks into organized routines that they proudly oversee.
  sports: Miguelina Amarillo, a budding soccer enthusiast, proudly dons a tiny Manchester United jersey while joining the neighborhood T-ball league, the Little Sprouts, on Saturday mornings, yet often
    retreats to the sandbox for a calm break, reflecting a blend of competitive curiosity and a preference for small-group, predictable play that they find comforting.
  arts: Miguelina Amarillo, an imaginative mini-artist, colors with a rainbow of crayons while humming Disney's 'Let It Go' performed by Idina Menzel and eagerly watches the live-action version of 'The
    Little Prince,' blending structured art time with playful musical appreciation that they cherish.
  travel: Miguelina Amarillo, an eager little voyager, has already explored the family's beach house in Florida and the Children's Museum in Indianapolis, and they dream of spotting a giant panda at the
    San Diego Zoo, preferring trips that are carefully planned with familiar routines over spontaneous adventures.
  culinary: Miguelina Amarillo, a selective but curious eater, relishes creamy cheddar macaroni, enjoys spreading smooth avocado on whole-grain toast, and always arranges their food in neat rows with a
    side of carrot sticks, reflecting both a practical palate and a visual need for order.
  core: Miguelina Amarillo, a three-year-old who craves order, worries over tiny disruptions, and toggles between shy steadiness and occasional assertive bursts, transforms everyday routines into meticulous,
    sometimes anxious, adventures that they navigate with purposeful curiosity.
background:
  cultural: Miguelina is raised in a Mexican‑American household in Bakersfield, California. Spanish is spoken at home, and her family celebrates Mexican traditions such as Día de los Muertos, Las Posadas,
    and Cinco de Mayo, often sharing homemade tamales, pozole, and arroz con leche. The bicultural environment blends the warmth of Mexican family life with the diverse community of Kern County, giving
    her exposure to both Spanish‑language media and local English‑language preschool programs.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Following simple instructions'', ''Stacking and arranging blocks'', ''Color and shape sorting'', ''Basic drawing'', ''Counting to ten'', ''Self‑help
    routines (dressing, handwashing)'']'
  hobbies: '[''Building block towers'', ''Shape‑matching puzzles'', ''Color‑bead threading'', ''Listening to Mexican folk songs'', ''Storytime with picture books'', ''Sandbox play'', ''Dancing to simple
    rhythms with a parent'']'
  career_goals: Miguelina dreams of growing up in a role that offers a gentle, orderly environment where she can help other children learn. She often says she wants to be a preschool teacher or a librarian’s
    assistant, jobs that blend her love for routine, books, and caring for others. In the short term, she is eager to master reading and writing in both Spanish and English, to be able to tell stories to
    her family, and to someday organize small cultural activities in her community.
