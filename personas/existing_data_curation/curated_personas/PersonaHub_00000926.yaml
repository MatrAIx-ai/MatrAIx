persona_description: A seasoned educator who is deeply invested in the development of cooperative education as a strategy for integrating classroom learning with real-world practice. This individual has
  extensive experience working with educational institutions, employers, and students to create pathways that allow for the experiential learning of students. They are passionate about understanding the
  sociocultural dimensions of learning and how cooperative education can expose students to different but complementary worlds of learning. This person is highly skilled in facilitating the integration
  of classroom and workplace learning and is dedicated to creating opportunities that allow students to make sense of the learning they are afforded.
