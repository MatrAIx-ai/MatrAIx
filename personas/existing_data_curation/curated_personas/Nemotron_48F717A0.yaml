personas:
  professional: Maria Larry is a secondary school curriculum designer and bilingual language arts teacher who blends inquiry‑based, standards‑aligned instruction with data‑driven assessment, leveraging
    Google Classroom and interactive whiteboards, while their disciplined organization and warm, collaborative demeanor make them a natural mentor and advocate for student mental‑health initiatives.
  sports: Maria Larry stays active through weekly salsa and merengue classes, weekend hikes in Withlacoochee State Forest, and sunrise yoga sessions, while cheering on the Orlando Magic and Orlando City
    SC and holding a membership with the Orlando Hiking Club.
  arts: Maria Larry captures the natural world through vivid photography, draws dance inspiration from legends like Celia Cruz, Arturo Sandoval, and modern star Shakira, and regularly enjoys live theatre
    productions of Lin‑Manuel Miranda’s works in Orlando.
  travel: Maria Larry favors weekend getaways to Florida’s Gulf Coast beaches such as Siesta Key and nature retreats in the Ocala National Forest, while also planning annual trips to Central American cities
    to explore historic markets and family‑rooted culinary traditions, balancing a love for adventure with a limited budget and family commitments.
  culinary: Maria Larry runs a weekend cooking club where they expertly prepare bean‑and‑rice staples like gallo pinto, hand‑rolled tamales, and herb‑infused salsas, showcasing a moderate cooking skill
    that blends comfort‑food nostalgia with a penchant for fresh cilantro, ripe plantains, and occasional experimental spice blends.
  core: Maria Larry is a highly organized, socially engaged bilingual educator who balances a love for dance, cooking, and community service with a worry‑prone, perfectionist mindset.
background:
  cultural: Maria’s Costa Rican heritage is a cornerstone of her identity. Raised in a bilingual household, she grew up celebrating traditions such as Día de la Anexión, fiestas patronales, and enjoying
    foods like gallo pinto, tamales, and aguas frescas. The values of community, hospitality, and respect for nature instilled by her family shape her teaching philosophy and interpersonal style. Since
    relocating to Spring Hill, she actively engages with local Latino cultural festivals, volunteers with the Costa Rican American Cultural Center, and incorporates elements of her heritage—such as Spanish
    idioms, regional history, and culinary experiences—into classroom lessons to promote cultural pride and inclusivity. Fluent in Spanish, she often serves as a linguistic bridge for Spanish‑speaking families
    within the school, fostering smoother communication and stronger partnerships.
