  career_goals: Maria aims to move into instructional leadership within the next five years, targeting roles such as Department Head or Curriculum Coordinator. She plans to pursue a master's degree in Educational
    Leadership or Bilingual Education to deepen her strategic expertise. Passionate about cultural representation, she intends to develop a school‑wide multicultural program that highlights Costa Rican
    heritage and fosters global citizenship among students. Additionally, Maria wants to mentor newly hired teachers, lead professional development workshops, and advocate for stronger mental‑health resources
    and stress‑management curricula to support students dealing with anxiety and pressure.
