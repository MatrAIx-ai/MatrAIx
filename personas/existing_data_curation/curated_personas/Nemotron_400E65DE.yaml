  hobbies: '[''Visiting art galleries and museums'', ''Sketching and water‑color painting'', ''Traditional Mexican cooking'', ''Gardening (herbs and small vegetables)'', ''Volunteering for senior literacy
    programs'', ''Coastal walking and bird‑watching'', ''Attending cultural festivals and dancing to música ranchera'', ''Reading historical fiction and Mexican art literature'']'
  career_goals: In the coming years, Ana hopes to transition from a front‑line server to a mentorship role where she can train new staff in both service excellence and cultural culinary awareness. She plans
    to obtain a Certified Food Manager credential, which will qualify her to oversee food‑service operations in community centers and senior living facilities. Ana also aspires to organize quarterly “Taste
    of México” events that showcase traditional dishes and educate patrons about their cultural origins. Ultimately, she wishes to balance her professional contributions with time for personal growth, including
    attending workshops on visual arts and perhaps authoring a small memoir of her life’s culinary journey.
