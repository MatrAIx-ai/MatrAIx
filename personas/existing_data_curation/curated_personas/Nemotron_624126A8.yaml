personas:
  professional: Rocio Quintanilla, a board‑certified internal medicine physician with 25 years of primary‑care experience, blends rigorous evidence‑based diagnostic reasoning with a systematic workflow
    mindset, leveraging EHR optimization and team leadership to spearhead quality‑improvement projects while delivering compelling community health education, and they consistently model composure and confidence
    for trainees.
  sports: Rocio Quintanilla fuels their love of movement through weekly flamenco classes, sunrise yoga sessions at the local studio, weekend hikes with the Hudson Valley Hiking Club, and avidly follows
    the New York Yankees and New York Knicks, often cheering in the stands during summer road trips, and they relish the sense of balance these activities bring to a demanding career.
  arts: Rocio Quintanilla immerses themselves in the arts by attending productions at the Hudson Valley Playhouse, especially revivals starring Denzel Washington, and they keep a vinyl collection featuring
    flamenco virtuoso Paco de Lucía and contemporary singer Rosalia, while also following visual artist Yayoi Kusama’s installations.
  travel: Rocio Quintanilla prefers thoughtfully planned trips that blend cultural immersion with culinary discovery, having explored the San Fermin Festival in Pamplona, the Lantern Festival in Chiang
    Mai, and the historic streets of Seville, while regularly returning to nearby Woodstock’s summer arts fair and dreaming of a future retreat at the lavender fields of Provence, and they often schedule
    these adventures around clinic rotations to maintain work‑life harmony.
  culinary: Rocio Quintanilla's culinary identity centers on crafting traditional tapas such as patatas bravas, gambas al ajillo, and jamón ibérico, complemented by a curated selection of Rioja and Albariño,
    while they cultivate a herb garden of rosemary, thyme, and oregano that flavors their weekly paella and homemade chorizo.
  core: Rocio Quintanilla balances a meticulous, structure‑driven medical career with a flamboyant social life, hosting wine‑and‑tapas soirées, dancing flamenco, and championing community health, all while
    they occasionally lose track of sleep and guard a secret stash of midnight chocolate.
background:
  cultural: Rocío was raised in a Spanish‑speaking household that kept Andalusian traditions alive, celebrating Semana Santa, Feria de San Juan, and maintaining close family ties. She speaks fluent Spanish
    and actively participates in a vibrant Spanish community in the New York tri‑state area, which influences her culinary interests, love of flamenco, and dedication to providing culturally sensitive,
    bilingual health care to immigrant patients while also embracing the values of her American community in Nyack.
attributes:
  skills: '[''Patient assessment and diagnosis'', ''Evidence‑based treatment planning'', ''Electronic health record optimization'', ''Quality‑improvement project leadership'', ''Multidisciplinary team coordination'',
    ''Public health education'', ''Community outreach'', ''Conflict resolution'', ''Crisis management'', ''Mentoring of junior physicians'']'
  hobbies: '[''Cooking and hosting Spanish tapas dinner parties'', ''Flamenco dancing'', ''Hiking in the Hudson Valley'', ''Yoga'', ''Book club participation'', ''Volunteering at health fairs'', ''Herb
    gardening'', ''Attending theater productions'', ''Traveling to cultural festivals'', ''Wine tasting'']'
  career_goals: Rocío aims to become a medical director for a community health center in Rockland County, where she can implement structured preventive‑care programs and expand bilingual services for Spanish‑speaking
    residents. She is pursuing a part‑time adjunct faculty position to teach clinical reasoning and mentor medical students. Long‑term, she hopes to influence state health policy on access to primary care
    and to develop a telemedicine platform that integrates culturally competent care with data‑driven outcomes.
