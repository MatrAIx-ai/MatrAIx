  career_goals: Deante aspires to become a senior pastor of a multi-site congregation where he can expand his innovative blend of faith, science, and the arts. He aims to launch a nonprofit that offers
    free STEM-arts workshops for Baltimore’s underserved youth, publish a book exploring the dialogue between theology and modern science, and become a sought-after speaker at faith-and-science conferences.
    He also seeks to strengthen his personal resilience by adopting more structured time-management practices, reducing chronic stress, and modeling healthy emotional stewardship for his community.
