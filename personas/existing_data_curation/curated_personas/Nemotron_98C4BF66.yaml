personas:
  professional: Deante Mumphrey is a senior associate pastor and community innovator who blends rigorous STEM analysis with biblical scholarship, using their boundless curiosity, sociable charisma, and
    relaxed approach to planning to design data‑driven outreach programs, mentor youth in faith‑and‑science workshops, and produce vibrant digital media for worship services.
  sports: Deante Mumphrey stays active by shooting hoops with the Eastside Saints in a community basketball league, cheering for the Baltimore Ravens on Sundays, and catching a Baltimore Orioles game at
    Camden Yards, all while using their sociable nature to organize post‑service pickup games.
  arts: Deante Mumphrey channels their curiosity into street photography reminiscent of Henri Cartier‑Bresson, while their gospel choir rehearsals echo the soulful energy of Chuck Brown’s go‑go rhythms
    and their late‑night jazz listening features Christian Scott and Kamasi Washington, shaping a personal aesthetic that fuses urban grit with spiritual uplift.
  travel: Deante Mumphrey prefers spontaneous weekend road trips that blend cultural immersion and culinary discovery, having already explored Charleston’s historic streets, New Orleans’ vibrant jazz scene,
    and Lisbon’s colorful tile‑laden neighborhoods, while budgeting carefully to keep family obligations in check.
  culinary: Deante Mumphrey enjoys cooking Southern comfort food at a home‑chef level, often whipping up shrimp and grits with Andouille sausage, collard greens sautéed with smoked turkey, and sweet potato
    pie spiced with cinnamon and nutmeg, and they love sharing these dishes during community workshops that double as faith‑based fellowship.
  core: Deante Mumphrey is a curious, gospel‑singing photographer‑pastor who balances a love for data‑driven ministry with chronic worry, a habit of misplacing keys, and an endless appetite for soulful
    jazz and Southern cooking.
background:
  cultural: Deante was raised in Baltimore’s historically Black neighborhoods, where the Black church served as a cultural and social hub. He grew up attending a Baptist congregation that emphasized gospel
    music, civil-rights activism, and community service. He earned his bachelor’s degree in biomedical engineering from Morgan State University, an HBCU, where he cultivated a love for both scientific inquiry
    and artistic expression. His cultural identity blends Southern-rooted African-American religious traditions with the vibrant urban culture of Baltimore, including go-go music, street art, and community
    festivals like the Baltimore Afro Parade. He maintains strong ties to family, local churches, and community organizations, and he actively honors the legacy of African-American resilience and creativity
    in his ministry.
