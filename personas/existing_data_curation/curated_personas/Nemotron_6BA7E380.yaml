  career_goals: Selena aims to advance to a lead painter or foreperson role within the next three years, obtaining EPA lead‑safe certification and OSHA supervisor training to qualify for supervisory positions.
    She envisions eventually launching her own small painting contractor business, focusing on sustainable paint products and offering mentorship to other women and immigrants in the trade. Balancing her
    practical curiosity, she also seeks to incorporate subtle Salvadoran design motifs into her projects, creating culturally resonant spaces for clients while ensuring a stable income that supports her
    personal well‑being after her loss.
