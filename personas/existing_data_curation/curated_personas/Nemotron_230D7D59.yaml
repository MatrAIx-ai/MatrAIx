  hobbies: '[''Cooking traditional Vietnamese dishes'', ''Experimenting with fusion recipes'', ''Attending live music and magic shows'', ''Playing the đàn bầu (monochord)'', ''Gardening (herb balcony garden)'',
    ''Reading historical biographies'', ''Senior bingo and storytelling nights'', ''Organizing group outings for friends'']'
  career_goals: He aims to create a recorded oral history of his family's journey, mentor seniors in using technology, and expand the local Vietnamese cultural club to include intergenerational activities.
    He also hopes to learn digital photography and video editing to produce a small documentary, and to volunteer as a cultural liaison for city festivals. Ultimately, Jose wants to leave a legacy of multicultural
    understanding and community cohesion.
