    for recent immigrants'']'
  career_goals: Hong aims to become a senior consultant interpreter for high‑profile diplomatic and international technology conferences, leveraging his curiosity for new ideas to specialize in AI‑assisted
    translation workflows. He plans to obtain ATA certification and the Certified Translator credential, then establish a boutique translation agency focused on bridging East Asian and North American markets.
    He also aspires to mentor a cohort of emerging interpreters, publish a guide on interpreting for the arts sector, and serve as a cultural liaison for community arts projects in the Seattle region.
