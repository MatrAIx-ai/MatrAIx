  hobbies: '[''Landscape photography'', ''Painting (acrylics)'', ''Reading (science fiction, technology non‑fiction)'', ''Model building (trucks, trains)'', ''Hiking'', ''Fishing'', ''Cooking (Southern
    cuisine with experimental twists)'', ''Visiting art galleries'', ''Listening to live music (local indie and classic rock)'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Mike aims to advance from his supervisory role to a regional operations manager position within the next five years, focusing on sustainable logistics and technology integration. He plans
    to earn certifications such as Certified Transportation Professional (CTP) and Lean Six Sigma Green Belt to bolster his credentials. Longer‑term, he envisions starting his own material‑moving consultancy
    that helps small businesses improve efficiency while reducing their carbon footprint. Continuing his education with a bachelor's degree in Supply Chain Management is also on his roadmap.
