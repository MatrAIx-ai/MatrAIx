persona_description: A literary professor who specializes in the study of Gothic literature, particularly the works of Mary Shelley, George Gordon and John Polidori. She examines the evolution of the vampire
  myth through comparative analysis of the literary roots and trends of today's popular vampire literature. Her research interests include the evolution of the vampire image, the personification of vampires,
  and the eternal popularity of vampires in literature. She is knowledgeable about the cultural fears and metaphors that vampires have served as throughout history and how they have evolved over time. She
  is interested in the representation of vampire traits in popular media and how they have been romanticized and idealized in the Twilight series.
