  career_goals: Approaching retirement, Joseph aims to transition into a mentorship role, sharing his machining knowledge with the next generation through apprenticeship programs and occasional teaching
    at the local vocational school. He also plans to launch a modest side business creating custom metal art pieces and functional furniture that blend his technical skill with his love of aesthetics. Additionally,
    he hopes to complete a certification in advanced CNC technology to stay current with emerging tools, and to volunteer his expertise at community maker spaces, ensuring his craft continues to thrive
    in his hometown.
