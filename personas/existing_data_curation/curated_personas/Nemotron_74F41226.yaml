  hobbies: '[''reading classic literature'', ''vegetable gardening'', ''baking'', ''volunteering at historical society'', ''knitting for charity'', ''trail walking'', ''church attendance'', ''attending
    school PTA events'']'
  career_goals: Maurica aims to advance to the role of Humanities Department Chair within her current school, where she can mentor junior teachers and shape interdisciplinary curricula. She plans to pursue
    a master's degree in Educational Leadership to qualify for an assistant principal position, focusing on student wellbeing and community partnership initiatives. Long‑term, she envisions becoming a principal
    who cultivates a supportive, inclusive school culture while maintaining the reliable routines that benefit both staff and students.
