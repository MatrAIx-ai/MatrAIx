personas:
  professional: Jose Mercadomaldonado is an experienced Special Education Teacher who blends meticulous IEP design with an energetic, community‑focused approach, leveraging evidence‑based strategies like
    PBIS and trauma‑informed practices while mentoring colleagues; they balance curiosity with practicality and a deep commitment to inclusive education for bilingual and culturally diverse students.
  sports: Jose Mercadomaldonado enjoys playing beach volleyball and soccer in local leagues, regularly hikes through the Everglades, cheers for the Miami Dolphins and Miami Heat, and holds a membership
    with the Sunrise Beach Volleyball Club, their energetic and sociable nature keeping them active year‑round despite occasional knee soreness from sand pivots.
  arts: Jose Mercadomaldonado immerses themselves in cultural festivals featuring island rhythms and dance, frequently listening to the vibrant sounds of Celia Cruz, Juan Luis Guerra, and Marc Anthony while
    capturing nature’s details in a modest photography collection inspired by Annie Leibovitz, and they attend local theater productions that showcase contemporary Latin storytelling.
  travel: Jose Mercadomaldonado prefers a blend of adventure and relaxation when traveling, planning spontaneous weekend getaways to the Florida Keys and the Everglades while dreaming of longer trips to
    San Juan, Cuba and Barcelona, favoring itineraries that combine cultural immersion, culinary exploration, and opportunities to photograph unique landscapes, though budget constraints sometimes limit
    passport‑ready adventures.
  culinary: Jose Mercadomaldonado enjoys cooking traditional Caribbean dishes such as arroz con pollo and lechón, seasoning with sofrito, cumin, and achiote, also preparing side dishes like maduros and
    mango salsa; their intermediate culinary skill shines during weekend gatherings where they host friends for hearty, communal meals, though they occasionally over‑salt recipes in their enthusiasm.
  core: Jose Mercadomaldonado is a community‑driven special education advocate who balances meticulous planning with spontaneous weekend feasts, yet often wrestles with worry‑driven stress and a penchant
    for over‑checking emails late into the night; they constantly seek innovative strategies to support students while fearing that any lapse could jeopardize progress.
background:
  cultural: Jose grew up in a bilingual household, speaking both Spanish and English, and his Puerto Rican heritage deeply informs his values of family, community, and resilience. In Fort Lauderdale, he
    stays connected to the vibrant Latino community through churches, cultural festivals, and neighborhood celebrations. His upbringing emphasized respect for elders, a strong work ethic, and the sharing
    of Puerto Rican culinary traditions. These cultural roots shape his inclusive teaching philosophy, especially his commitment to supporting bilingual students and honoring cultural diversity within the
    classroom.
attributes:
  skills: '["Individualized Education Plans (IEPs)", "Behavior intervention strategies (PBIS, trauma‑informed)", "Differentiated instruction for diverse learners", "Assistive technology integration", "Data
    analysis and progress monitoring", "Collaborative teamwork with multidisciplinary staff", "Family and community outreach", "Classroom management and organization", "Professional development mentorship"]'
  hobbies: '["Beach volleyball", "Community soccer league", "Everglades hiking", "Puerto Rican music and dance festivals", "Cooking traditional Puerto Rican cuisine", "Mindfulness meditation", "Yoga", "Journaling",
    "Volunteer tutoring for Spanish‑speaking youth", "Nature photography"]'
  career_goals: Jose aims to advance to a district‑level Special Education Coordinator role within the next five years, where he can shape inclusive policies and champion resource allocation for bilingual
    and culturally diverse students. He plans to complete his bachelor's degree in Special Education and pursue a master's in Educational Leadership to gain the credentials needed for school administration.
    He is enthusiastic about creating a comprehensive professional‑development program that equips teachers with practical, research‑based interventions, while also establishing a community after‑school
    academy that offers tutoring and social‑emotional support for students with disabilities. Reducing systemic barriers for Puerto Rican and Spanish‑speaking families remains a core ambition, and he hopes
    to influence state legislation to improve support services.
