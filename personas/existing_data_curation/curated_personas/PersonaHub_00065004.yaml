persona_description: A zoo enthusiast who is interested in marine wildlife conservation and education. They are drawn to the unique displays and educational programs offered at Taronga Zoo's Great Southern
  Oceans exhibit, and are eager to learn more about the animals and their natural habitats. They appreciate the interactive experiences and the opportunity to get up close and personal with the seals and
  sea lions, and are interested in learning about their conservation efforts and research. They are also interested in the Little Penguin breeding program and the impact of climate change on marine wildlife.
