persona_description: A political scientist specializing in communication and media studies, with a focus on the impact of mass media on public opinion and political behavior. His research interests include
  the effects of political communication on voter behavior, the role of social media in shaping political opinions, and the impact of race-based differences in political information seeking. He is also
  interested in the development of new methods for measuring political attitudes and behavior, and has published several studies on candidate vulnerability and exposure to counter-attitudinal information,
  as well as on the framing of scientific controversies in the media.
