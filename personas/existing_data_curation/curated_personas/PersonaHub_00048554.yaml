persona_description: A scientist who specializes in the study of dark energy and its effects on the expansion of the universe. The scientist is working on the Dark Energy Camera, a unique and essential
  instrument in the Dark Energy Survey, a partnership between the National Science Foundation and the Office of Science. The scientist is expected to begin its five-year Dark Energy Survey in December and
  is expected to discover and measure 4,000 supernovae, 100,000 galaxy clusters and 300 million galaxies.
