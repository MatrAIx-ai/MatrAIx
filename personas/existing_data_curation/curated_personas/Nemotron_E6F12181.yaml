  career_goals: Matthew aspires to channel his lifelong curiosity into a legacy of community enrichment. He hopes to curate a small traveling exhibition of his artwork that highlights Bismarck’s seasonal
    landscapes, partnering with local libraries and schools. He also aims to compile and self‑publish a collection of oral histories and personal essays that celebrate the town’s diverse stories. While
    not seeking formal employment, he wishes to mentor younger artists and history enthusiasts through informal workshops and one‑on‑one guidance. Another ambition is to expand his modest online craft shop
    into a sustainable source of income that supports charitable causes in his community. Ultimately, he envisions being recognized as a gentle steward of local culture, bridging past and present through
    creativity and storytelling.
