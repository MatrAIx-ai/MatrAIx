personas:
  professional: Rodolfo Castellon, a 39‑year‑old lead plumber and pipefitter, blends a keen imagination with technical mastery, designing smart‑home water systems that double as kinetic art while mentoring
    apprentices and pursuing Master Plumber and Certified Steamfitter credentials.
  sports: Rodolfo Castellon avidly supports the San Antonio Spurs, follows San Antonio FC matches, plays in a local adult recreational soccer league on Saturdays, and treats salsa dancing at community nights
    as his primary cardio workout, while occasionally kayaking the Guadalupe River with friends.
  arts: Rodolfo Castellon channels his creative energy into painting large abstract murals on community walls, sketches intricate pipe designs for gallery shows, participates in a neighborhood theater workshop,
    devours science‑fiction novels by Octavia Butler, and fills his playlists with Celia Cruz, Jimi Hendrix, and contemporary Latin jazz.
  travel: Rodolfo Castellon favors weekend road trips to Austin for live music festivals, has explored the historic water gardens of Alhambra in Spain, dreams of studying the fluid choreography of Venice’s
    canals, and regularly visits nearby Hill Country vineyards for inspiration on sustainable water use.
  culinary: Rodolfo Castellon loves cooking Puerto Rican mofongo infused with chipotle, crafting arroz con gandules with jalapeño and cilantro, experimenting with adobo rubs on grilled steak, and often
    prepares these dishes while listening to salsa rhythms, though they sometimes over‑salt dishes in the rush of a busy week.
  core: Rodolfo Castellon is an imaginative plumber‑artist who merges fluid engineering with vibrant murals, cares deeply for community wellbeing, yet wrestles with disorganization and stress‑induced worry.
background:
  cultural: Rodolfo was raised in a bilingual Puerto Rican household in San Antonio, where Spanish and English flow interchangeably. His parents emigrated from Puerto Rico, instilling in him a deep appreciation
    for Caribbean music, food, and Catholic traditions such as Three Kings Day. Living in Bexar County, he also embraces Tex‑Mex culture, celebrating local festivities like Fiesta and enjoying regional
    cuisine. This blend of Puerto Rican and Texan heritage informs his warm, hospitality‑driven demeanor and his commitment to community service. He frequently connects with the broader Latino community
    through cultural events, neighborhood gatherings, and volunteer work, using his cultural fluency to build trust with clients and apprentices alike.
