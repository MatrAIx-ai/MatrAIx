  career_goals: Rodolfo aims to earn Master Plumber and Certified Steamfitter credentials within the next three years, positioning himself to lead larger commercial projects. He plans to launch his own
    socially responsible plumbing firm that offers affordable services to low‑income neighborhoods in San Antonio while employing and mentoring apprentices from the local Latino community. He also aspires
    to specialize in eco‑friendly water solutions, such as rain‑water harvesting and grey‑water recycling, and to collaborate with artists on decorative public fountains that merge functionality with cultural
    expression. Balancing his ambition with his desire for flexibility, he hopes to create a work environment that promotes harmony, personal growth, and reduced stress.
