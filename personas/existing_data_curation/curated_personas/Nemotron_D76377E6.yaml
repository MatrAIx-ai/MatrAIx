  hobbies: '[''Hiking'', ''Fishing'', ''Woodworking'', ''Reading Non‑Fiction'', ''Acoustic Guitar Playing'', ''Volunteer Work at Food Pantry'', ''Community Clean‑up'', ''Small‑Group Basketball'', ''Attending
    Local Football Games'']'
  career_goals: Over the next few years Lee aims to advance into a sales management role where he can lead a small team and improve regional customer retention rates. He plans to complete an online bachelor's
    degree in Business Administration to deepen his strategic knowledge of digital service platforms. Long‑term, he envisions becoming a regional director or launching his own consulting firm that helps
    small rural businesses adopt efficient service solutions, while also mentoring new sales representatives.
