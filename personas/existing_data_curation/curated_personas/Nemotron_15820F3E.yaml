personas:
  professional: Roxana Sosasosa, a 20‑year‑old aspiring Master Automotive Service Technician, blends a meticulous curiosity for both gasoline and electric powertrains with a practical, customer‑focused
    mindset, excelling at OBD‑II diagnostics, suspension tuning, and clear communication, and they competitively pursue regional technician contests while planning a future boutique performance‑mods shop
    that will mentor women and minorities.
  sports: Roxana Sosasosa enjoys solitary workouts such as hiking the rugged trails of Hickory Creek Park and competing in virtual racing leagues on iRacing, while cheering on Atlanta United and the Atlanta
    Falcons from home, and they occasionally join a local climbing club for weekend bouldering sessions.
  arts: Roxana Sosasosa fuels their evenings with salsa and reggaeton playlists featuring artists like Bad Bunny and Marc Anthony, follows automotive customizers on YouTube for creative inspiration, and
    they make occasional trips to street‑art festivals where they admire murals that blend car culture with urban expression.
  travel: Roxana Sosasosa prefers DIY road trips that align with automotive events, having already driven to the Florida International Auto Show and planning a future pilgrimage to the Frankfurt Motor Show,
    and they budget trips around student loans by staying in campgrounds or budget motels to stretch their modest savings.
  culinary: Roxana Sosasosa delights in cooking traditional dishes such as arroz con gandules and pernil, seasoning them with adobo and sofrito, yet they often resort to quick grilled chicken or plantain‑based
    snacks when shop shifts run late, and they occasionally over‑spice meals in the excitement of multitasking between cooking and car diagnostics.
  core: Roxana Sosasosa is a curious yet competitive solo‑engineer who trades late‑night engine tuning for salsa beats, balances meticulous budgeting with impulsive part buys, and they tackle health and
    study stresses with a pragmatic, slightly skeptical edge.
background:
  cultural: Roxana grew up in a bilingual household that preserved the vibrant traditions of her Puerto Rican heritage while adapting to life in the Midwest. Spanish is spoken at home, and family gatherings
    often feature music, dance, and meals that celebrate Caribbean culture. She maintains strong ties to her extended family on the island through video calls and occasional trips, which reinforce values
    of resilience, community, and pride in her roots. In Noblesville, she participates in local Puerto Rican festivals and contributes to a small community group that organizes cultural events. This blend
    of Caribbean warmth and Midwestern practicality informs her work ethic, her appreciation for hands‑on problem solving, and her desire to bring a piece of her cultural identity into her automotive career.
attributes:
  skills: '["Engine diagnostics (OBD-II)", "Brake and suspension repair", "Hybrid/electric vehicle servicing", "Electronic control module programming", "Diagnostic software troubleshooting", "Preventive
    maintenance scheduling", "Welding and metal fabrication", "OEM service bulletin interpretation", "Tool and equipment management", "Technical communication with customers"]'
  hobbies: '["Customizing her Honda Civic", "Racing simulators (iRacing)", "Automotive forums and technical magazines", "Cooking Puerto Rican cuisine", "Hiking local nature trails", "Listening to salsa
    and reggaeton", "DIY electronics and Raspberry Pi projects"]'
  career_goals: Roxana aims to become a Master Automotive Service Technician, earning ASE Master certification within the next three years. She plans to specialize in electric‑vehicle maintenance, completing
    an advanced EV certification at a community college and gaining experience on a dealership service team. Long‑term, she envisions opening a boutique shop that focuses on high‑performance modifications
    and environmentally‑friendly technologies, where she can mentor other women and under‑represented minorities in the trade. She is also interested in competing in regional automotive technician contests
    to benchmark her skills and gain industry recognition.
