  career_goals: Acelia aspires to move into senior cabin crew leadership, becoming a lead attendant who mentors new staff and coordinates crew schedules. She also seeks certification in aviation safety
    management and plans to enroll in part-time business administration courses to open pathways toward a ground operations or airline training role. Balancing her love of travel with her desire for a more
    predictable schedule, she hopes to achieve a position that lets her share her expertise while reducing the anxiety associated with constantly changing flight rosters.
