  career_goals: Camellia is aiming to advance from a first‑line supervisor to a full office manager or operations supervisor role within the next few years. She plans to pursue a professional certification
    in business administration or office management to complement her practical experience. Her goal is to design more efficient office workflows, lead larger teams, and take on responsibilities for strategic
    planning and budgeting. She also hopes to mentor newer staff and become a trusted point of contact for both employees and senior management. Balancing her desire for structure with flexibility, she
    seeks a position that allows her to implement clear processes while still adapting to the dynamic needs of a growing organization.
