  hobbies: '[''Visiting art museums'', ''Painting classes'', ''Community choir'', ''Gardening'', ''Cooking Mediterranean cuisine'', ''Playing bridge'', ''Walking group leader'', ''Volunteering for dental
    health fairs'', ''Reading about digital dentistry'', ''Traveling to historic cultural sites'']'
  career_goals: Looking ahead, William aims to transition into a senior or office manager role where he can leverage his deep clinical knowledge and leadership skills. He plans to earn the Certified Dental
    Assistant (CDA) credential and pursue a certification in dental office administration. Passionate about sharing his expertise, he envisions teaching dental assisting courses at Nassau Community College
    or offering workshops for local dental teams. William also wants to stay at the forefront of digital dentistry, mastering CAD/CAM technologies to improve workflow and reduce workplace stress. While
    preparing for a gradual retirement, he hopes to remain engaged through part‑time consulting and mentorship, balancing professional fulfillment with personal well‑being.
