persona_description: A physicist or engineer who is interested in the study of materials and their behavior under pressure. They are particularly interested in understanding the deformation of nanocrystalline
  materials and the impact of this deformation on the strength and durability of materials. They are likely to be familiar with the work of Carnegie's Ho-kwang "Dave" Mao and his team, which has made significant
  contributions to the field of materials science. They are also likely to be familiar with the use of computer modeling and the radial diamond anvil cell x-ray diffraction technique for studying the behavior
  of materials under pressure.
