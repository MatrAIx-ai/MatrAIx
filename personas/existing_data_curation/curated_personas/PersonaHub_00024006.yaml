persona_description: A historian who is interested in religious and cultural practices, particularly those related to the use of scrolls in religious medicine. They are interested in the complex and often
  bloody ritual behind the making of these scrolls and the personal connection they have with the deceased owners. They appreciate the personal nature of these scrolls and the way they connect death with
  life, and they are open to adapting them into their own bookmaking practices while respecting their spiritual and cultural significance.
