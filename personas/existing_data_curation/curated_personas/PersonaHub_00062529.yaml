persona_description: A professional radio engineer who worked at the Philadelphia Radiophone Company and later became the engineer at the WCAU station in Philadelphia. He was responsible for installing
  and maintaining the station's equipment, including the medium-wave and shortwave transmitters, and for programming the station's broadcasts. He was knowledgeable about the history of radio broadcasting
  in the United States and the FCC regulations that governed shortwave broadcasting during the early years of radio. He had a keen interest in the expansion of radio broadcasting and was instrumental in
  the development of the WCAU station's programming and coverage.
