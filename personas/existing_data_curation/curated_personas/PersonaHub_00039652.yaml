persona_description: A scientist who specializes in the study of gut microbiota, particularly in the field of microbial ecology and host-microbe interactions. This scientist is interested in creating and
  using experimental systems to investigate the mechanisms behind colonization resistance and the establishment of a stable microbiota in germ-free mice. They have a background in molecular biology, genetics,
  and microbiology, and are skilled in using modular design approaches to create minimal bacterial communities. They are also familiar with the use of genome-guided design to generate insights into microbe-microbe
  and microbe-host interactions.
