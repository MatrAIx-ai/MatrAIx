  hobbies: '[''Reading historical non‑fiction and classic literature'', ''Writing personal essays and journaling'', ''Gardening'', ''Cooking experimental recipes'', ''Yoga and mindfulness meditation'',
    ''Crossword puzzles and Sudoku'', ''Attending small book club meetings'', ''Visiting local museums and art galleries'', ''Genealogy research'']'
  career_goals: Andrea aims to move into a senior leadership position within the service sales arena, such as Sales Manager or Regional Director, where she can design and implement systematic sales processes,
    mentor a small team of high‑performing representatives, and drive consistent revenue growth. She also plans to earn a Certified Professional Sales Leader (CPSL) credential and to develop expertise in
    emerging service sectors like cybersecurity, while prioritizing a work environment that supports structured schedules and manageable stress levels.
