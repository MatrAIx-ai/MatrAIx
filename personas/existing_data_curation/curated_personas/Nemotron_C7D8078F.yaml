personas:
  professional: Andre Rowden is a high‑school senior who spearheads his school's robotics club, blends Python coding with hands‑on Arduino projects, and leverages they natural curiosity and practical mindset
    to lead collaborative tech‑focused community initiatives.
  sports: Andre Rowden dominates the local park basketball scene with the Mile High Hoopers, cheers for the Denver Nuggets and Colorado Rockies, and stays fit through regular hip‑hop dance practices and
    weekend hikes in the Rockies, occasionally joining the high school track club for sprint drills, and they love catching a Nuggets game whenever possible.
  arts: Andre Rowden channels they creative side through weekly hip‑hop dance crews, admires artists like Kendrick Lamar, Anderson .Paak, and Kamasi Washington, and spends leisure time sketching graphic
    designs inspired by modern R&B album covers from H.E.R. and J‑Cole.
  travel: Andre Rowden favors budget‑friendly road trips to national parks such as Rocky Mountain and Yellowstone, enjoys meticulously planning itineraries on Google Maps, dreams of visiting Tokyo for its
    tech scene and sushi culture, and relishes occasional short‑haul flights to New York City for live jazz gigs, and they always pack a portable charger for extended hikes.
  culinary: Andre Rowden’s go‑to meals are quick, protein‑rich dishes like chicken fajitas topped with fresh avocado, homemade veggie stir‑fry with quinoa, and occasional pizza nights, while they relish
    snacking on spicy ramen bowls and sipping cold brew coffee during late‑night coding sessions.
  core: Andre Rowden is an energetic, curiosity‑driven teen who blends tech tinkering, community leadership, and a love for basketball and beats, all while occasionally over‑caffeinating and forgetting
    to finish homework.
background:
  cultural: Andre was raised in a Black household that blends Southern roots with the multicultural influences of the Philadelphia metropolitan area. Family gatherings often feature soul food, gospel music,
    and stories of resilience that shape his values around education and community support. Growing up in Villanova, a predominantly white suburb, he has learned to navigate diverse social settings, often
    acting as a bridge between cultures. His upbringing emphasizes strong family ties, respect for elders, and a commitment to uplifting other Black youth through mentorship and service. At the same time,
    exposure to the arts, music, and academic opportunities in Montgomery County has broadened his perspective, encouraging him to celebrate both his heritage and the broader community he lives in.
