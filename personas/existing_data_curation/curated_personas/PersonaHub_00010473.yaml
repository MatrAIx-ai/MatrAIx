persona_description: A professional with a background in language teaching and assessment, specifically focusing on developing and implementing foreign language assessments. This individual is knowledgeable
  about the FLAD, a searchable directory of nearly 200 tests in over 90 languages, and the online tutorial that accompanies it. They are also familiar with the programs offered by STARTALK and BEST Literacy
  and BEST Plus 2.0, which address the needs of adult English language learners by providing assessment options that reliably demonstrate student progress. This person is interested in staying updated with
  the latest news and events related to language education and assessment, as evidenced by their interest in the data on the number of college and university foreign language programs that closed between
  2013 and 2016.
