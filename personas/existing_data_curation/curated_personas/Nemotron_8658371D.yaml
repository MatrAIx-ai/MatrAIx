  hobbies: '[''Visiting Art Museums'', ''Gardening'', ''Genealogy Research'', ''Volunteering at Community Center'', ''Reading Historical Fiction'', ''Traveling to National Parks'', ''Playing Bridge'', ''Attending
    Live Music and Theater'', ''Participating in Senior Book Club'', ''Taking Dance Classes'']'
  career_goals: Now in a semi‑retired phase, Doris aims to leverage her management experience by serving on advisory boards for local STEM education programs and community non‑profits. She seeks to mentor
    young professionals, especially women entering technical fields, and to champion intergenerational art initiatives that combine her love of creativity with her organizational skills. Travel to renowned
    museums and historic sites remains a personal ambition, as does documenting her career insights in a memoir for future generations.
