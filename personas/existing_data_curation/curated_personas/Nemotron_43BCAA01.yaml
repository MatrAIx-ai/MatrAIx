  career_goals: J L aspires to become a leader in innovative, patient-centered care within his community. Over the next five years he aims to complete a fellowship in preventive medicine or health services
    research, develop a data-driven telehealth program to serve rural patients in Kennebec County, and publish research on the impact of art-based interventions on chronic disease management. He envisions
    progressing to an attending physician role with responsibilities for quality improvement, eventually serving as Medical Director of a community health clinic. Mentorship is also a priority; he plans
    to teach at the local medical school, guide students in research, and build interdisciplinary workshops that blend medicine, technology, and visual arts. His long-term ambition is to shape health policy
    that promotes equitable access to integrated, technology-enabled care for underserved populations.
