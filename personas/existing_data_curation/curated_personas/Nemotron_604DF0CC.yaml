  hobbies: '[''Sketching urban scenes'', ''Street art exploration'', ''Landscape and street photography'', ''Attending art exhibitions and indie concerts'', ''Music production and acoustic guitar playing'',
    ''Reading science‑fiction and philosophy'', ''Listening to podcasts about new ideas'', ''DIY craft projects'']'
  career_goals: Glen aims to earn his GED within the next year and enroll in a community college program focused on graphic design or illustration. He envisions building a portfolio that blends traditional
    drawing with digital media, eventually securing freelance work for local businesses and cultural institutions in Troy. Long‑term, he hopes to launch a small creative studio that offers art workshops,
    curates community exhibitions, and provides multimedia design services, allowing him to contribute to the growing arts scene of upstate New York while maintaining a balanced, self‑directed career path.
