personas:
  professional: An aspiring graphic designer named Glen Apgar leverages their self-taught digital illustration skills in Photoshop and Illustrator alongside their DSLR photography to craft multimedia portfolios,
    while their calm, methodical mindset and reliable project-planning habit keep freelance deadlines consistently met.
  sports: An outdoor-oriented youth named Glen Apgar enjoys weekend trail runs in the Taconic Mountains and a pick-up basketball league at the Troy Community Center, follows the New York Knicks and Buffalo
    Bills for inspiration, and prefers low-impact yoga over high-intensity gym sessions, viewing fitness as a flexible complement to their artistic schedule.
  arts: A street-art enthusiast named Glen Apgar spends afternoons tracing murals by local graffiti artist Kacey Kohrs and admiring works of Banksy, curates indie-music nights featuring Arcade Fire and
    Phoebe Bridgers, and experiments with ambient soundscapes using Ableton, letting these influences shape their multimedia projects and personal aesthetic.
  travel: An exploratory traveler named Glen Apgar plans spontaneous weekend trips to nearby Hudson Valley towns like Hudson and Beacon for photo shoots, dreams of attending the Berlin Street Art Festival
    and the Kyoto Photographic Expo, yet balances these ambitions with a modest college-fund budget, favoring backpacking over luxury accommodations.
  culinary: A culinary explorer named Glen Apgar enjoys crafting simple farm-to-table meals such as avocado toast with heirloom tomatoes and rosemary, experimenting with homemade ramen broth infused with
    miso and kombu, and often pairs dishes with locally roasted coffee, though their cooking prowess remains at a confident beginner level.
  core: An inquisitive 18-year-old named Glen Apgar merges art, tech, and philosophy into a calm, organized lifestyle, punctuated by occasional impulse buys of vintage records and a habit of staying up
    late sketching under dim LED lights.
background:
  cultural: Glen grew up in a middle‑class, white working‑family environment in Troy, New York, with roots tracing back to Irish and German ancestry. His upbringing reflects typical upstate New York traditions—celebrating
    Thanksgiving, participating in community events like the Troy St. Patrick's Parade and local music festivals, and valuing self‑reliance and modesty. Exposure to Troy's industrial heritage and its revitalizing
    arts initiatives has shaped his appreciation for both the region's history and its emerging creative community.
attributes:
  skills: '[''Digital illustration'', ''Photography (DSLR)'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Sketching and drawing'', ''Video editing (Premiere Pro)'', ''Basic HTML/CSS'', ''Project
