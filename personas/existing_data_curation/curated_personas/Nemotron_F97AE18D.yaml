personas:
  professional: Amanda Fontes, a six‑year‑old sandcastle architect, exhibits budding project‑management skills by sketching detailed sand‑castle blueprints in a pocket notebook before each beach session,
    yet revels in spur‑of‑the‑moment adjustments when the tide changes, showing a blend of love for structure and a spontaneous streak that fuels their competitive edge on the shoreline, and they often
    brag about completing the tallest tower before sunset.
  sports: Amanda Fontes, a six‑year‑old beach enthusiast, trains with the Ormond Beach Junior Swim Club, joins weekend sand‑volleyball scrimmages where they eagerly compete against siblings, proudly wears
    a Orlando Magic jersey while cheering on the basketball team, and follows the Jacksonville Jaguars with bright teal enthusiasm, reflecting a competitive spirit that fuels their love for active play,
    and they often challenge friends to see who can swim the fastest across the tide line.
  arts: Amanda Fontes, a six‑year‑old aspiring illustrator, spends afternoons drawing sea turtles and dolphins inspired by Eric Carle’s bright collages, flips through Dr. Seuss and Mo Willems picture books
    with wide‑eyed wonder, and strings colorful beads into necklaces while they hum songs from the Little Mermaid soundtrack, weaving the world of art, literature, and music into their daily play, and they
    proudly display their latest drawing on the refrigerator for all to see.
  travel: Amanda Fontes, a six‑year‑old explorer, enjoys family road trips to St. Augustine’s historic forts and day‑ventures to Cocoa Beach’s lighthouse, prefers meticulously planned outings where they
    can bring a shell‑collecting kit, yet dreams of an adventurous scuba dive at the Great Barrier Reef, balancing a love for structured itineraries with a spark of spontaneous wanderlust, and they often
    ask for a map to mark each new spot they discover.
  culinary: Amanda Fontes, a six‑year‑old budding chef, loves munching on crunchy fish sticks, slurping cheesy mac and cheese, crafts peanut‑butter and banana sandwiches shaped like shells, and delights
    in topping watermelon cubes with a pinch of sea salt, happily assisting in stirring batter with a wooden spoon while they occasionally sneak extra sprinkles into their snack, and they proudly serve
    their creations to family members during weekend picnics.
  core: Amanda Fontes, a six‑year‑old sand‑castle strategist, merges a competitive spark with a love for structured beach rituals, saves spare change in a piggy bank, battles seasonal allergies with a dab
    of medicine, and they turn every tide pool into a tiny laboratory, all while indulging in glittery bead crafts and dreaming of distant reefs.
background:
  cultural: Amanda grew up in a middle‑class white family in Ormond Beach, Florida. Her upbringing blends typical suburban American values—emphasis on school, community activities, and family outings to
    the beach—with a regional appreciation for coastal life. Family traditions include beach picnics, Fourth of July fireworks, and attending a local church on Sundays, providing a mix of cultural and recreational
    experiences that shape her worldview.
