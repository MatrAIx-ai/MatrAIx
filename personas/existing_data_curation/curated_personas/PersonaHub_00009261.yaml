persona_description: An Ethiopian historian who specializes in Islamic history, particularly the contributions of Muslims to Ethiopia and the wider world. He has authored several books on Ethiopian Islamic
  history and has a unique perspective on the role of compassion in dealing with refugee crises. He is interested in conducting research to uncover the contribution of Muslims in history and has a deep
  knowledge of group theory and its applications in mathematics. He is a proponent of Turkey's role in promoting research and has expressed a desire for support in this regard.
