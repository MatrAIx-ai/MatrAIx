persona_description: A pediatric neurologist specializing in the evaluation and management of children with epilepsy. They have expertise in the diagnosis, treatment, and follow-up of various childhood-onset
  benign epilepsy syndromes, including the three reviewed in this article. They are familiar with the epidemiology, clinical features, and diagnostic criteria of these syndromes, as well as their potential
  overlap with or progression into other syndromes. They also have experience in the work-up and management of these syndromes, and have a keen interest in the prognosis of their patients.
