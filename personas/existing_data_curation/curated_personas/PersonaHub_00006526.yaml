persona_description: A university engineer who specializes in developing new processes for the production of magnesium. The engineer has a background in chemical and biological engineering and has developed
  a breakthrough process for making magnesium that requires half the energy and produces a fraction of the pollution compared to today's leading methods. The engineer is currently working to translate the
  laboratory innovations into a viable commercial-scale enterprise. The engineer is also interested in the economic implications of the technology and has secured almost a half-million dollars so far from
  backers who agree.
