  hobbies: '[''Drawing comics and space art'', ''Building LEGO constructions'', ''Reading science‑fantasy picture books'', ''Imaginative role‑play with friends'', ''Playing basketball at the park'', ''Listening
    to and dancing to hip‑hop and reggae'', ''Solving jigsaw puzzles and brain teasers'']'
  career_goals: Roderick dreams of traveling beyond Earth as an astronaut, inspired by his fascination with stars and space illustrated in his drawings. He also aspires to become a visual artist who can
    bring his imagined worlds to life on canvas, and he imagines someday designing educational games that blend storytelling with science. His methodical nature leads him to set small milestones, such as
    mastering more complex LEGO models and learning more advanced coding concepts, as steps toward these future ambitions.
