personas:
  professional: Roderick Ikwueme, a budding space‑themed comic illustrator, channels a vivid imagination and methodical planning into detailed hand‑drawn panels, turning playground stories into disciplined
    sketchbooks that hint at a future career in visual storytelling.
  sports: Roderick Ikwueme dominates the neighborhood’s basketball court during after‑school hours, dribbling for the “Rising Stars” youth club and cheering for the Los Angeles Lakers, while they also enjoy
    a weekly Saturday soccer game at the community field.
  arts: Roderick Ikwueme immerses in comic art by flipping through Stan Lee’s classic issues, drawing inspiration from the vibrant panels of Alex Ross while dancing to the beats of Bob Marley and Cardi
    B, and they eagerly mimic the voice‑acting of Tom Holland during playtime.
  travel: Roderick Ikwueme dreams of an adventure trip to the Kennedy Space Center in Florida, a family road‑trip to the Grand Canyon, and a future visit to Tokyo’s Ghibli Museum, but for now they explore
    imaginary galaxies from the backyard swing set.
  culinary: Roderick Ikwueme loves pepperoni pizza, cheesy macaroni, and banana‑splits, can whip up a peanut‑butter‑jelly sandwich unaided, and they often negotiate extra dessert after finishing a LEGO
    build, citing the taste of chocolate chip pancakes as the ultimate reward.
  core: Roderick Ikwueme is a seven‑year‑old whose imagination rockets through space‑filled comics, whose organized mind piles LEGO bricks with precision, and who habitually loses focus when the cookie
    jar beckons.
background:
  cultural: Roderick is the son of Nigerian‑Igbo parents who immigrated to the United States, and he grows up in a predominantly Black community in Jamaica, Queens. His household blends Igbo cultural traditions—such
    as storytelling in his native language, celebrating festivals like Igbo New Yam Year—with broader African‑American customs, including church gatherings and celebrations of Juneteenth and Kwanzaa. The
    multicultural fabric of Queens exposes him to Caribbean influences, evident in the music, food, and community events he enjoys. This rich cultural mosaic shapes his identity, fostering a sense of pride
    in his heritage while encouraging openness to diverse artistic and intellectual expressions.
attributes:
  skills: '[''Imaginative storytelling'', ''Detailed sketching'', ''Systematic LEGO building'', ''Basic scientific experimentation'', ''Reliability and follow‑through'', ''Basic block‑code programming'',
