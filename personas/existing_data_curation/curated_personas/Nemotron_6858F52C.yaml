  hobbies: '[''Fishing'', ''Boating'', ''Community soccer league'', ''Habitat for Humanity volunteering'', ''DIY home improvement'', ''Classic car restoration'', ''Barbecuing'', ''Photography'', ''Live
    music events'']'
  career_goals: Joseph aims to become a certified welding supervisor within the next three years, obtaining AWS Certified Welder and Certified Welding Supervisor credentials. He plans to specialize in marine
    and offshore fabrications, leveraging his location near the Gulf of Mexico. Long-term, he envisions opening a small custom metal-work shop that serves local boat owners and construction firms, while
    mentoring apprentices. He also hopes to complete a bachelor's degree in engineering technology to broaden his design capabilities.
