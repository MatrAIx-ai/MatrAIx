personas:
  professional: Linda Allen, a budding robotics enthusiast and self‑taught coder, channels their curiosity and practicality into designing competition‑ready robots for the school club while balancing methodical
    planning with spontaneous experimentation, reflecting a competitive streak that pushes them to outdo peers in tech challenges.
  sports: Linda Allen sprints the 100‑meter dash for the Willowbrook Middle School Tigers track team, fuels training with HIIT workouts, admires the local professional basketball squad the River City Raptors,
    and prefers disciplined workout schedules over spontaneous play, revealing their competitive nature.
  arts: Linda Allen fuses digital illustration with a love for speculative fiction, often sketching characters inspired by Brandon Sanderson and Hayao Miyazaki while listening to synthwave scores by composer
    Michele Brock, and they spend weekends binge‑watching animated series by Studio Ghibli to refine their artistic style.
  travel: Linda Allen dreams of attending the International Science and Engineering Fair in New York after a memorable family road‑trip to the Space Center Houston, while currently favoring local weekend
    hikes in the nearby state park and occasionally saving up for a future visit to Tokyo's Akihabara district, all on a tight allowance budget.
  culinary: Linda Allen prefers quick, protein‑rich meals like avocado toast with poached eggs and spicy tuna sushi rolls, skillfully prepares homemade granola bars using oats, honey, and dark chocolate,
    yet occasionally indulges in sugary cereal late at night, betraying their otherwise disciplined palate.
  core: Linda Allen balances a fierce curiosity for robotics and sci‑fi storytelling with a disciplined, competitive streak and a habit of over‑planning that sometimes clashes with their love for solitary
    coding marathons.
background:
  cultural: Linda comes from an African‑American family rooted in the Tampa Bay area. Her household blends Southern traditions—such as Sunday gospel services, soul food gatherings, and celebrating Juneteenth—with
    contemporary urban culture. She is fluent in the rhythms of R&B and hip‑hop, and her family places a strong emphasis on education, community service, and resilience. Growing up in Riverview, she engages
    with a diverse neighborhood while staying connected to the local Black community through her church and youth mentorship programs.
