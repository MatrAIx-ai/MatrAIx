persona_description: A public health minister who is passionate about improving the lives of children born with rare genetic disorders. She is committed to expanding the existing screening programme to
  include additional tests for rare genetic disorders, which can help prevent babies from being severely disabled or even dying. She is also interested in the potential cost savings that can be achieved
  by expanding the screening programme. She values evidence-based decision-making and is committed to ensuring that the programme is as effective and efficient as possible.
