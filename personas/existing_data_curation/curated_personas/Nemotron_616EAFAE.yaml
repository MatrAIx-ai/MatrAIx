  career_goals: Gabriela aspires to progress from a purchasing agent to a senior procurement manager within the next five years, with the ultimate aim of becoming a director of global sourcing. She plans
    to deepen her expertise in sustainable procurement, integrating environmentally responsible criteria into supplier selection and championing circular economy initiatives. Recognizing the evolving role
    of technology, she seeks to lead the adoption of AI‑driven spend analytics and automation tools in her department. Gabriela also intends to pursue an MBA focused on supply chain management to broaden
    her strategic perspective and eventually mentor emerging procurement professionals, especially those from underrepresented backgrounds.
