  hobbies: '[''drawing and painting'',''building with LEGO bricks'',''sorting toys by color'',''listening to library storytime'',''singing nursery rhymes'',''dancing'',''collecting rocks'',''playing tag
    and hide-and-seek'',''organizing games for friends'',''inventing new game rules'']'
  career_goals: Thomas imagines a future where he can explore space like an astronaut, paint giant pictures of planets, and share his stories as a teacher or storyteller. He dreams of building big LEGO
    cities and leading a team of friends to create the coolest projects. He also hopes to win at games and be the 'best' in his class, showing his competitive spirit while helping others learn and have
    fun.
