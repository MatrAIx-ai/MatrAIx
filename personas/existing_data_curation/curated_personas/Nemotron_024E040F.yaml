personas:
  professional: Thomas is a preschool-age builder who channels their love of organization and storytelling into leading pretend construction sites at the daycare, meticulously arranging toy bricks and assigning
    roles to friends with the confidence of a mini-architect, and they proudly announce each new design to the whole class.
  sports: Thomas is a four-year-old member of the Deer Trail Kids Soccer Club who idolizes the Denver Broncos, grabs a tiny baseball glove modeled after the Colorado Rockies at family picnics, and they
    thrive on the friendly competition of backyard tag races.
  arts: Thomas is an enthusiastic participant in the town library’s art workshops, loves to mimic the folk melodies of John Denver and the Carter Family on their small recorder, proudly displays crayon
    drawings of farm scenes alongside prints of Willie Nelson’s album covers, and they often share their creations with classmates during circle time.
  travel: Thomas is a curious explorer who has taken family road trips to Rocky Mountain National Park and the Great Sand Dunes, dreams of visiting Disneyland in California, and they prefer trips that include
    a picnic with peanut-butter sandwiches and plenty of time to run across open fields.
  culinary: Thomas is a budding chef who delights in flipping golden pancakes with butter and maple syrup, helps stir cheesy macaroni with elbow-shaped pasta, insists on adding crunchy apple slices to their
    snack plate, though they often refuse Brussels sprouts.
  core: Thomas is a talkative, organized four-year-old who turns every playground into a stage, guards their stash of stickers with fierce pride, and they tackle each new activity with a mix of curiosity
    and friendly competition.
background:
  cultural: Thomas was raised in Deer Trail, Colorado, a small rural community with a strong sense of neighborliness and outdoor life. His family participates in local events like county fairs, church gatherings,
    and community picnics, exposing him to classic American folk music, simple country cooking, and the rhythms of farm life. The town's public library offers art workshops for kids, and his school emphasizes
    teamwork and respect for nature. These experiences shape his appreciation for art, his organized habits, and his sociable, talkative personality.
attributes:
  skills: '[''color recognition'',''counting to 20'',''basic shape identification'',''drawing with crayons and watercolors'',''retelling simple stories'',''following daily routines'',''organizing toys by
