persona_description: A wildlife conservationist and researcher who specializes in studying jaguars and their movements in the U.S.-Mexico borderlands. They have documented jaguar movements close to the
  border and have identified the two main corridors in the western borderlands that jaguars could use to get into the U.S. They have also studied the habitat connectivity that jaguars need to move between
  Mexico and the U.S. and have advocated for maintaining these corridors to connect fragmented habitats for jaguars and other mammals. They have conducted research on the size and patterns of jaguar territories,
  and have documented the movements of jaguars in the borderlands. They have also worked on restoration programs to protect and restore land on both sides of the border, and have studied the impact of these
  programs on jaguar populations.
