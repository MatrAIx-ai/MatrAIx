persona_description: A researcher or geologist interested in the study of Mars, particularly in the exploration and characterization of Martian ice deposits. They are likely to be familiar with the Korolev
  crater on Mars and its unique features, such as the ice-filled impact crater and the 1.8 km thick ice dome within it. They would have a keen interest in understanding the processes that formed this ice
  deposit, the mechanisms of its stability, and the potential implications for future missions to Mars. They would also be interested in the broader context of Mars as a potential habitable planet and the
  potential for life on Mars.
