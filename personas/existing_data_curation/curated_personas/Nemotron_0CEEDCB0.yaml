    BI, Tableau)'', ''Team leadership and facilitation'', ''Conflict resolution and mediation'', ''Change management'', ''Mentoring and coaching'', ''Community partnership development'', ''Crisis management
    and resilience'']'
  hobbies: '[''Community gardening'', ''Volunteering at local food bank'', ''Mentoring youth entrepreneurship program'', ''Reading historical fiction and biographies'', ''Hiking Chester County trails'',
    ''Attending town festivals and cultural events'', ''Cooking seasonal meals'', ''Practicing yoga and tai chi'', ''Traveling to cultural festivals'']'
  career_goals: As she approaches the latter stage of her professional journey, Rebecca aims to leverage her extensive experience to shape the next generation of project leaders and amplify social impact
    in her community. Over the next five years, she plans to transition into a senior advisory or consulting role focused on nonprofit and community‑development projects in Chester County, where she can
    integrate sustainable practices and compassionate stakeholder management. She also aspires to design and deliver a training program on flexible, people‑first project management, author a guidebook sharing
    her insights on balancing curiosity with practical execution, and serve on the board of a local charitable organization to steer strategic initiatives.
