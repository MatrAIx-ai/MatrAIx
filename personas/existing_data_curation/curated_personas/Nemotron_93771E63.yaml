personas:
  professional: Indira Paredes is a methodical carpenter with over a decade of experience in framing, finish carpentry, and custom cabinetry, who leverages their meticulous planning and skeptical eye for
    detail to consistently deliver eco‑friendly projects on schedule while experimenting with sustainable timber and modern fastening systems.
  sports: Indira Paredes enjoys solitary weekend hikes along the coastal trails of San Diego, follows the San Diego Padres for baseball and the San Diego Wave FC for women’s soccer, and participates in
    a local climbing club where they practice rock climbing twice a month to maintain functional strength.
  arts: Indira Paredes draws creative inspiration from listening to folk singer Lila Downs, mariachi group Mariachi Vargas de Tecalitlán, and the modernist paintings of Diego Rivera while they work in the
    shop, and they occasionally attend performances at the San Diego Civic Theatre featuring classical composer Philip Glass.
  travel: Indira Paredes prefers meticulously planned trips that blend low‑key nature retreats with cultural immersion, having hiked the rugged cliffs of Big Sur and explored the historic streets of Oaxaca,
    while dreaming of future adventures in Patagonia’s Torres del Paine and Kyoto’s bamboo groves, all balanced against the modest budget required to fund the upcoming workshop.
  culinary: Indira Paredes delights in cooking Oaxacan staples such as mole negro, tlayudas, and memelas, skillfully grinding ancho chilies, toasted cacao, and achiote into sauces, and they often pair these
    dishes with locally sourced heirloom corn and fresh nopal, while occasionally indulging in a home‑brewed mezcal tasting session that can linger longer than intended.
  core: Indira Paredes is a disciplined, solitary artisan who channels competitive curiosity into sustainable furniture, yet habitually hoards premium tools and can be stubbornly skeptical of new trends.
background:
  cultural: Indira is a second‑generation Mexican‑American raised in the vibrant Mexican‑Latino community of Long Beach, California. She grew up bilingual, speaking Spanish at home and English at school,
    which gives her a deep appreciation for both cultures. Family traditions such as celebrating Día de los Muertos and preparing tamales during holidays are central to her identity. While she respects
    the strong work ethic and craftsmanship valued in Mexican culture, she also embraces the entrepreneurial spirit and practical outlook common in Southern California. This blend influences her approach
    to carpentry, where she honors traditional woodworking techniques while actively seeking innovative, sustainable practices.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Custom Cabinetry'', ''Precision Joinery'', ''Blueprint Reading'', ''Material Estimation'', ''Tool Maintenance'', ''Safety Protocols'', ''Project Planning'',
    ''Sustainable Woodworking'']'
  hobbies: '[''Solo Woodworking Projects'', ''Reading Architectural Design'', ''Hiking Coastal Trails'', ''Cooking Traditional Mexican Cuisine'', ''Listening to Folk and Mariachi Music'']'
  career_goals: Indira aims to transition from being a skilled journeyman to a business owner by establishing a boutique workshop that specializes in custom, eco‑friendly furniture within the next three
    years. She plans to obtain green‑building certifications and to deepen her knowledge of advanced joinery techniques, positioning herself as a thought leader in sustainable carpentry. Additionally, she
    hopes to mentor apprentices from underrepresented backgrounds, combining her competitive drive with a commitment to fostering quality craftsmanship in her community.
