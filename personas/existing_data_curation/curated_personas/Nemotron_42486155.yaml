  hobbies: '[''Sketching'', ''Digital painting'', ''Creative writing (speculative fiction)'', ''Playing piano'', ''Strategy video games'', ''Chess'', ''Reading sci‑fi/fantasy'', ''Arduino tinkering'', ''Journaling'',
    ''Walking along the river'']'
  career_goals: James aspires to attend an art-focused high school and later study illustration or game design at a university, with the long‑term goal of becoming a concept artist for video games or animated
    films. He dreams of creating original graphic novels that reflect diverse perspectives and hopes to develop indie games that merge storytelling with interactive visual art. He also wants to use his
    technical skills to design tools that help other young artists bring their ideas to life, and to mentor other Black youth in his community to pursue creative careers.
