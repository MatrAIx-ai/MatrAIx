personas:
  professional: James Posy, an aspiring junior game developer and concept artist, leverages their organized, methodical mindset and vivid imagination to craft speculative characters and narrative worlds
    for indie prototypes, while their competitive drive pushes them to dominate school hackathons and refine digital painting techniques.
  sports: James Posy channels their competitive spirit into the school’s chess club, where they rank among the top players, attends weekly pick-up basketball games at the community center, follows the Carolina
    Hurricanes during the NHL season, and cheered the Tar Heels’ March Madness run, while maintaining a modest fitness routine of early morning jogs along the Pasquotank River.
  arts: James Posy immerses themselves in experimental animation by Don Hertzfeldt and the surreal stop-motion of Jan Švankmajer, draws inspiration from Studio Ghibli’s color palettes, reads speculative
    fiction by N.K. Jemisin, and practices piano pieces by Yiruma, all of which shape their distinct digital painting style and character sketches.
  travel: James Posy prefers meticulously planned weekend getaways to the Outer Banks for sunrise photography and occasional family trips to Washington D.C.’s Smithsonian museums, while dreaming of an immersive
    anime pilgrimage to Akihabara in Tokyo, balancing their love for adventure with a tight teenage budget and school commitments.
  culinary: James Posy enjoys whipping up simple homemade ramen with miso broth, soft-boiled eggs, and nori, bakes occasional chocolate chip cookies for study sessions, and savors pepperoni pizza paired
    with mango smoothies during gaming marathons, reflecting a moderate cooking skill set focused on comfort foods that fuel creativity.
  core: James Posy, a 15-year-old imaginative strategist, balances nightly sketch marathons and piano improvisations with a relentless competitive edge, all while wrestling with anxiety that fuels both
    bursts of creative brilliance and occasional procrastination.
background:
  cultural: James grew up as a Black teenager in Elizabeth City, North Carolina, where his family’s roots trace back to generations of African‑American residents who have shaped the town’s cultural landscape.
    He participates in community events such as Juneteenth celebrations and local church gatherings, where gospel music and spoken‑word poetry influence his artistic voice. The region’s history of maritime
    trade and the stories of Black laborers at the port inspire his interest in narratives about resilience and identity. He draws inspiration from the vibrant Black music scene in the area, including hip‑hop,
    jazz, and R&B, and he values the close‑knit support of his neighborhood, which encourages him to represent his heritage in his artwork.
attributes:
  skills: '[''Sketching'', ''Digital illustration using GIMP/Krita'', ''Creative writing (short stories, poetry)'', ''Basic Python programming for generative art'', ''Project planning and time management'',
