  career_goals: Although retired, Kenneth aims to preserve his community’s heritage by compiling a comprehensive family genealogy and writing a memoir that highlights the changing social fabric of Duncannon.
    He hopes to establish a monthly oral‑history series at the local library, where seniors can share stories with younger residents. He also aspires to serve on the board of the senior center, mentor new
    volunteers, and contribute regular columns on local history to the county newspaper. Maintaining his health and staying socially active remain central to his personal ambitions.
