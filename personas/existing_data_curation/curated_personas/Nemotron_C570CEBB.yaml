    potluck hosting'']'
  career_goals: Sarah’s immediate ambition is to move into a supervisory role within her call center, aiming to become a Team Lead or Assistant Manager within the next two years. In that capacity she plans
    to design and run a monthly “Innovation Lab” where agents brainstorm novel ways to enhance the customer experience, tapping into her love of novelty and abstract thinking. She also aspires to earn the
    company’s “Top Performer” award for three consecutive quarters, satisfying her competitive drive. Parallel to her professional objectives, Sarah dreams of turning her artistic side into a modest side
    business, creating custom watercolor illustrations and hand‑lettered signage for local small businesses and community events. Long‑term, she hopes to combine her customer‑service expertise with her
    creative flair by transitioning into a Customer Experience Designer role, where she can shape user journeys and develop training materials that blend storytelling with practical solutions.
