persona_description: A master craftsman who specializes in the production of traditional Korean bamboo handcrafts, particularly chaesang. His expertise lies in the intricate process of creating chaesang,
  which requires at least 15 full days of work to produce a three-box chaesang. He is known for his dedication to his craft and his contributions to the modernization and popularization of bamboo handcrafts,
  which has earned him the well-deserved title of master craftsman. He is likely to read texts related to the history, techniques, and cultural significance of chaesang, as well as the latest developments
  in bamboo handcrafts.
