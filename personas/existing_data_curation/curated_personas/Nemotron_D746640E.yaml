  career_goals: Stanley aims to progress from senior computer systems analyst to a lead architect role within the next five years, targeting certifications such as ITIL Expert, TOGAF, and CISSP to solidify
    his expertise. He aspires to manage a small team of analysts, championing practical, reliable solutions while maintaining a balanced workload that mitigates his stress sensitivity. Long‑term, he envisions
    advancing to an IT manager or even a chief information officer position at a mid‑sized regional firm, where he can mentor junior staff and embed a culture of routine excellence and risk‑aware decision‑making.
