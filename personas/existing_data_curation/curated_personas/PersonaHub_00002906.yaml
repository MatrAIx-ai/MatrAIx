persona_description: A professional geologist who specializes in copper resource evaluation and geochemical exploration techniques. They are experienced in using a wide range of geochemical exploration
  methods to identify and locate new copper deposits, including whole-rock analyses, soil gas sampling, and hydrogeochemical surveys. They have a deep understanding of residual and transported soil types,
  specialized soil samples, and the use of gases in geochemical sampling. They are also skilled in using modern computer technology to analyze and interpret geochemical data sets.
