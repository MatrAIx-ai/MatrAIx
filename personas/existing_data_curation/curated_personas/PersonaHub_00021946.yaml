persona_description: A scholar who is interested in the study of Buddhist texts, particularly those from the Mahayana tradition. They are particularly interested in the contents of the Tripitaka and the
  Orphic myth of Dionysus, and have a keen interest in the connections between these two mythologies. They are also knowledgeable about the fluidity of mythological narratives in ancient Greece, and how
  they differ from other ancient religions such as Christianity, Judaism, and Islam. They have a special interest in the ritual texts for the afterlife, and the Orphic version of the myth of Dionysus, which
  has multiple literary sources and is associated with Dionysianism and Pythagoreanism. They have a unique and special knowledge of the hieroi logoi of Orphism, and their research interests include the
  structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
