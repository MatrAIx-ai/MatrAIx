  career_goals: He dreams of a future where he can combine his love of helping others and his fascination with art and science. He often says he wants to become a teacher who uses art and experiments to
    spark curiosity in young learners, or a veterinarian who cares for animals, and sometimes imagines becoming an astronaut to explore space and share those discoveries with his classmates. He aspires
    to keep learning and to make a positive difference in his community.
