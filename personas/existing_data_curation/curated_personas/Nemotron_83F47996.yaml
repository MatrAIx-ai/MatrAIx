personas:
  professional: Marian Brown, a 36‑year‑old bakery owner in Alabaster, leverages her mastery of sourdough starter cultivation, layered cake construction, and hand‑painted décor to create a community hub
    where culinary craftsmanship meets artistic expression, while their relaxed approach to scheduling and collaborative leadership style keep the kitchen creative yet occasionally chaotic.
  sports: Marian Brown, a fan of the Alabama Crimson Tide football team and the Birmingham Barons baseball club, joins a local weekend line‑dancing class for cardio, occasionally participates in community
    5K runs with the Alabaster Running Club, and enjoys informal pick‑up basketball games at the neighborhood park, though they often prefer social gatherings over solo training.
  arts: Marian Brown, an avid participant in the Alabaster community art fair and a self‑taught acrylic painter, infuses hand‑painted motifs inspired by Georgia O'Keeffe and the vibrant hues of local muralists
    into their cake designs, while they regularly perform in their church choir alongside gospel classics by Mahalia Jackson and contemporary soul tracks from Leon Bridges.
  travel: Marian Brown dreams of weekend getaways to Savannah’s historic squares and culinary tours of New Orleans, has already explored the Blue Ridge Parkway’s fall foliage and the coastal charm of Gulf
    Shores, and plans a future immersion in Marrakech’s spice markets to gather inspiration for their heritage‑infused breads, all while they balance travel budgets with the bakery’s seasonal cash flow.
  culinary: Marian Brown, a skilled baker who blends comfort classics like shrimp‑and‑grits biscuits and sweet potato pound cake with experimental flavors such as berbere‑spiced sourdough and gluten‑free
    almond‑flour chocolate mousse, delights in using fresh herbs like thyme, rosemary, and basil from their garden, and regularly showcases their creations on Instagram alongside behind‑the‑scenes videos
    of buttercream piping and fondant sculpting.
  core: Marian Brown is a creatively curious bakery owner whose love of community, art, and bold flavors drives them to blend Southern comfort with unexpected spice, even if their relaxed planning sometimes
    leaves the kitchen delightfully disordered.
background:
  cultural: Marian grew up in a close‑knit African‑American family in the Birmingham suburbs, where food and faith were central to community life. Her grandmother taught her traditional Southern soul‑food
    recipes, while her mother introduced her to the art of weekend baking. This heritage fuels Marian’s reverence for comfort flavors and the storytelling power of food. Living in Alabaster, she blends
    this cultural legacy with contemporary Southern influences, celebrating both her Black roots and the broader regional traditions through her bakery’s menu, community events, and inclusive atmosphere.
