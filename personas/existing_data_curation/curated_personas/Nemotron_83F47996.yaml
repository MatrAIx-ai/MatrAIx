  career_goals: Marian aims to transform her current bakery into a neighborhood hub that blends culinary excellence with artistic expression. She plans to enroll in a culinary certificate program to deepen
    her technical knowledge, introduce a line of heritage‑inspired breads that marry Southern staples with African flavors, and eventually open a second location that includes a small gallery space for
    local artists. In the next five years, she hopes to launch weekend baking workshops, expand her catering service to corporate events, and build a loyal online following that positions her brand as a
    creative force in the Birmingham metro area.
