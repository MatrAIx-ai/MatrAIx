personas:
  professional: Lorraine Coleman, a seasoned community volunteer coordinator transitioning to a part‑time event‑consultant role, channels their methodical planning, budget‑savvy, and natural sociability
    into orchestrating seamless family milestones and charity gatherings while balancing a curiosity for new project‑management tools with pragmatic execution.
  sports: Lorraine Coleman, a dedicated morning yogi who leads a weekly walking group along Winter Park’s scenic trails, follows the Orlando Magic and Orlando City SC closely, and competes in a community
    tennis league at the Winter Park Racquet Club, blends energetic cardio with low‑impact strength work to maintain a balanced fitness routine.
  arts: Lorraine Coleman, an avid member of a contemporary‑fiction book club that devours Sally Rooney and Celeste Ng, regularly attends productions at the Park Theatre and enjoys live‑music evenings featuring
    John Legend and local jazz ensembles, weaving these cultural experiences into their event‑planning aesthetic.
  travel: Lorraine Coleman, a meticulous yet curious traveler, prefers carefully planned weekend road trips to Florida’s Gulf Coast towns like Naples and Sanibel, while dreaming of an immersive summer on
    Italy’s Amalfi Coast, balancing budget‑friendly stays with occasional splurges on boutique B&Bs to satisfy their love for both practicality and adventure.
  culinary: Lorraine Coleman, a confident home chef, alternates between perfecting Mediterranean plates such as grilled branzino with fresh lemon and oregano and Southern comforts like shrimp and grits
    seasoned with smoked paprika, often experimenting with extra‑virgin olive oil, fresh basil, and collard greens during the cooking workshops they frequent.
  core: Lorraine Coleman blends methodical organization with vibrant social energy, turning community events into heartfelt celebrations while juggling yoga, garden projects, and an occasional tendency
    to procrastinate on paperwork.
background:
  cultural: Lorraine grew up in a middle‑class white family in the Midwest, where values of self‑reliance, community service, and practicality were emphasized. After relocating to Winter Park, Florida,
    she embraced the region’s mix of Southern hospitality and a vibrant arts scene. Her cultural identity reflects mainstream American traditions while also being shaped by the multicultural, outdoor‑oriented
    lifestyle of Central Florida, leading her to value family gatherings, community involvement, and cultural appreciation.
attributes:
  skills: '["Event Planning", "Volunteer Coordination", "Budget Management", "Community Outreach", "Project Management", "Conflict Mediation", "Office Software (Word, Excel, PowerPoint)", "Social Media
    Management", "First Aid/CPR", "Organizational Skills"]'
  hobbies: '["Yoga", "Walking groups", "Book club", "Cooking classes", "Community gardening", "Volunteer work", "Theater and live music attendance", "DIY home projects", "Gardening", "Scrapbooking"]'
  career_goals: Lorraine aims to complete a bachelor’s degree in Business Administration and transition into a part‑time role as a community event consultant or non‑profit program coordinator. She envisions
    launching a boutique home‑based event‑planning service focused on family milestones and local charity events, and eventually serving on the board of a regional non‑profit that promotes arts education.
    Alongside professional growth, she seeks to secure a stable retirement plan and pursue additional certifications in project management to broaden her skill set.
