persona_description: An experienced and knowledgeable environmental scientist and expert in radioactive waste management and remediation, with a specialization in characterizing and remedying contaminated
  sites. They have extensive experience working with the U.S. Department of State and the IAEA, and have developed innovative approaches and cost-effective strategies for managing radioactive waste. They
  are also proficient in technical training courses and have a proven track record of delivering effective public outreach activities. They are associated with key areas of expertise in decontamination
  and decommissioning, environmental remediation, international programs, site characterization, and RESRAD.
