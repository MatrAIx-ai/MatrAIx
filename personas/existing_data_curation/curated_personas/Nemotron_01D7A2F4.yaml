  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Knitting'', ''Cooking seafood'', ''Online learning about coastal ecology'', ''Community garden workshops'', ''Small-group
    volunteer work'']'
  career_goals: Looking toward the next phase of her career, Lisa aims to move from front‑line cashier duties into a supervisory or mentorship role. She plans to earn a certification in retail management
    or bookkeeping within the next two years so she can train new cashiers, oversee inventory for a small boutique, or assist local nonprofits with financial record‑keeping. Additionally, she hopes to launch
    a modest online shop for her hand‑knit crafts, blending her curiosity about e‑commerce with her practical retail experience, while ensuring a stable financial foundation for retirement.
