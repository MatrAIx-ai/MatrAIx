  career_goals: Although retired, Noelle aims to deepen her involvement with the Prior Lake senior center by leading its activity‑scheduling committee and mentoring newer volunteers. She wishes to compile
    a family memoir that captures her heritage and life lessons, and she plans to take a community‑college class in local history to support this project. Maintaining her health and mobility through regular
    walks and a balanced diet remains a top priority, as does staying socially connected through church service and community events. She also hopes to learn basic genealogy research to trace her German‑Scandinavian
    roots.
