  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Walking/hiking in the foothills'', ''Quilting and knitting'', ''Basic photography'', ''Volunteer work at senior center'', ''Attending
    church services and fellowship'', ''Cooking family recipes'', ''Listening to classic jazz music'']'
  career_goals: Although retired, Gloria’s ambition is to remain an active, supportive presence in her community. She aims to mentor younger volunteers at the senior center, help preserve local history
    by recording family stories, and expand her knowledge of digital photography. Maintaining her health and independence is a central goal, as is continuing to share her cooking and craft skills with neighbors
    and grandchildren. Ultimately, she wishes to foster harmony and resilience within her social circles while nurturing her own lifelong curiosity.
