personas:
  professional: Angela Barker is a hands‑on budding entrepreneur who blends her DIY flair for upcycling vintage furniture with experimental home cooking to launch an online boutique, leveraging her informal
    social‑media savvy and event‑coordination experience while they often procrastinate on catalog updates and deadlines.
  sports: Angela Barker spends weekends hiking the Appalachian foothills and practices yoga at a local studio, plays recreational softball with the Bluff City Bombers, and cheers for the Tennessee Titans
    while keeping a membership at a nearby climbing gym to stay fit during the colder months.
  arts: Angela Barker immerses herself in the region’s folk and bluegrass scene, regularly attending performances by local groups like the Appalachian Harmony Band and listening to artists such as Alison
    Krauss and Earl Scruggs, while they unwind with mystery novels by Agatha Christie and Tana French and occasionally host board‑game nights featuring Catan and Ticket to Ride.
  travel: Angela Barker prefers spur‑of‑the‑moment road trips, often packing a cooler and a camera to explore nearby Asheville, NC, and the Great Smoky Mountains, but they also dream of attending the Edinburgh
    Festival Fringe and have booked a summer weekend in New Orleans to soak up its jazz heritage, all while balancing travel costs with their modest business budget.
  culinary: Angela Barker’s kitchen is a laboratory where they fuse Southern comfort food with global flavors, whipping up shrimp‑and‑grits with smoked paprika, fermenting homemade kimchi, and perfecting
    sourdough loaves topped with rosemary, all while experimenting with seasonal garden produce like heirloom tomatoes and rosemary from their backyard.
  core: Angela Barker is a pragmatic dreamer whose DIY ingenuity, competitive spirit, and constant worry drive a restless pursuit of creativity, and they balance this drive with a deep love for community,
    nature, and a surprisingly organized (if occasionally chaotic) life.
background:
  cultural: Angela grew up in Bluff City, Tennessee, a small town in the Appalachian region of the South. Her upbringing was steeped in Southern hospitality, close‑knit community values, and a strong sense
    of self‑reliance. Family traditions emphasized church involvement, local festivals, and a love for folk and bluegrass music. The region’s appreciation for craftsmanship and outdoor recreation influenced
    her DIY interests and affinity for hiking. While her cultural environment is predominantly white and middle‑class, it also fostered a blend of traditional values and a practical, adaptable mindset that
    shapes her daily life.
attributes:
  skills: '["DIY home repairs", "Basic carpentry", "Furniture upcycling", "Experimental cooking", "Social media content creation", "Basic bookkeeping", "Event coordination", "Garden planning", "Computer
