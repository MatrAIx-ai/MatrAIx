  hobbies: '["Hiking in the Appalachian foothills", "Nature photography", "Gardening", "Furniture upcycling", "Experimental cooking", "Puzzle solving (crosswords, Sudoku)", "Strategic board games", "Reading
    mystery novels", "Journaling", "Yoga and meditation"]'
  career_goals: Angela aims to turn her DIY and culinary talents into a small home‑based business, such as an online shop for upcycled home décor and specialty food items. She plans to complete her associate
    degree in business administration to gain the formal knowledge needed for entrepreneurship. In parallel, she hopes to take a part‑time role as a community volunteer coordinator, leveraging her event‑planning
    experience while maintaining a flexible schedule that reduces stress. Her long‑term ambition is to become financially independent while staying rooted in her local community.
