personas:
  professional: Kevin Rigg, a seasoned warehouse logistics specialist, leverages decades of inventory control mastery, meticulous use of Fishbowl and SAP, and a calm, cooperative demeanor to keep operations
    running like clockwork even when deadlines tighten, and they consistently mediate between drivers, suppliers, and internal teams to preserve smooth operations.
  sports: Kevin Rigg, an avid fan of the Atlanta Falcons and Atlanta Braves, spends his Sundays watching football and baseball while maintaining membership in the Cedartown Senior Fishing Club and jogging
    lightly along the local lake trail to stay fit, and they cheer loudly with family during games despite their careful, low‑key nature.
  arts: Kevin Rigg finds solace in classic soul and gospel, frequently playing Aretha Franklin’s “Respect,” Sam Cooke’s “A Change Is Gonna Come,” and Mahalia Jackson’s “How I Got Over” on his vintage vinyl
    player, and they volunteer to help arrange the music program at their church’s heritage festival, often humming along while sorting donations.
  travel: Kevin Rigg prefers low‑key road trips that blend relaxation and heritage, having explored Charleston’s historic district and Savannah’s riverfront, while dreaming of a pilgrimage to New Orleans
    for its jazz scene and a future hike through the Blue Ridge Mountains to fish the trout streams, and they plan each itinerary with a spreadsheet to ensure a predictable schedule.
  culinary: Kevin Rigg enjoys cooking hearty Southern meals, often featuring home‑grown tomatoes in fresh garden salsa, skillet‑fried catfish with a cornmeal crust, collard greens seasoned with smoked turkey,
    and a signature peach cobbler for church potlucks, while their modest culinary skill shines brightest in the kitchen and they occasionally over‑season dishes in an attempt to mask their stress.
  core: Kevin Rigg is a methodical, community‑driven logistics veteran who channels their love for order into gardening, fishing, and soulful melodies, yet wrestles with occasional over‑worry that fuels
    both their meticulousness and gentle sense of responsibility.
background:
  cultural: Kevin’s cultural roots are steeped in Southern African‑American traditions. Growing up in Georgia, family gatherings, church choir participation, and storytelling have shaped his sense of identity
    and community. He values the hospitality and resilience characteristic of Southern Black culture, often sharing soul‑food recipes passed down through generations. His connection to local historically
    Black churches and involvement in community outreach reflect a commitment to preserving and uplifting his cultural heritage while navigating everyday life in Floyd County.
attributes:
  skills: '[''Inventory Management'', ''Logistics Coordination'', ''Forklift Operation'', ''Microsoft Excel'', ''Warehouse Safety Compliance'', ''Data Entry'', ''Problem Solving'', ''Customer Service'',
