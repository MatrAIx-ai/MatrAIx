  career_goals: Hoyt’s primary career ambition is to transition from frontline support to a senior mentorship or supervisory role where he can shape service standards and coach the next generation of representatives.
    He is actively pursuing a Professional Certification in Customer Experience Management and plans to complete his bachelor's degree in Business Administration within the next two years, channeling his
    curiosity into formal education. His competitive nature fuels a goal to lead his team to the highest regional customer-satisfaction scores and to implement data-driven process improvements that reduce
    average call-handling time. In the longer term, Hoyt envisions a semi-retired phase where he offers part-time consulting to small businesses in the Milwaukee area, helping them design effective customer-support
    frameworks while maintaining a modest supplemental income.
