  involved in research projects aimed at modifying economically important crops to grow better during drought conditions. The researcher is likely to be highly educated, knowledgeable about plant biology,
  and has a strong background in genetics and molecular biology. They are likely to be working with cutting-edge research methods and technologies, and are committed to advancing our understanding of plant
  defense mechanisms and their applications in agriculture.
