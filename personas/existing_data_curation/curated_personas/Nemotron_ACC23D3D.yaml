  hobbies: '[''Museum visits'', ''Watercolor painting'', ''Sketching'', ''Journal writing'', ''Reading psychology and philosophy'', ''Meditation'', ''Nature walks'', ''Volunteering at community centers'',
    ''Indie film appreciation'', ''Listening to ambient music'']'
  career_goals: Ming aspires to merge his artistic passion with his compassionate nature by becoming an art therapist or a community arts program coordinator. He plans to pursue a bachelor's degree in psychology
    or art therapy, acquire certification as a mental‑health peer support specialist, and build a professional portfolio of therapeutic art projects. Long‑term, he hopes to establish a nonprofit space in
    the Chicago area that offers art‑based mental‑health workshops for youth and underserved populations, while also maintaining a freelance illustration practice.
