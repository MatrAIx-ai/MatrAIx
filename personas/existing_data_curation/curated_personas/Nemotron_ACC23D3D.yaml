personas:
  professional: An aspiring art therapist and community arts program coordinator, Ming Doll blends digital illustration, watercolor painting, and empathetic peer counseling with meticulous event organization,
    and they channel their quiet curiosity and deep compassion into therapeutic art projects that foster emotional healing for underserved youth.
  sports: A quiet fitness enthusiast, Ming Doll prefers solitary early‑morning runs along the Lakefront Trail and weekly yoga sessions at a small studio, they occasionally cheer for the Chicago Cubs during
    summer games while maintaining a modest membership at the Chicago Park District's community pool for low‑impact cardio.
  arts: A devoted aficionado of contemporary visual arts, Ming Doll spends weekends wandering the Art Institute of Chicago for immersive James Turrell installations, collects limited‑edition prints by Yayoi
    Kusama, creates vivid watercolor sketches while sipping espresso at local cafés, and they unwind to ambient soundscapes by Brian Eno and Max Richter, all of which inform their reflective journal entries
    and therapeutic art practice.
  travel: A meticulously planned yet spontaneously creative traveler, Ming Doll has explored the serene gardens of Kyoto, the avant‑garde galleries of Amsterdam’s Jordaan district, and Iceland’s tranquil
    geothermal pools, and they dream of a future pilgrimage to Barcelona’s Sagrada Família to study Gaudí’s organic forms, always balancing modest budget constraints with a desire for quiet, reflective
    experiences.
  culinary: An experimental home cook with moderate skill, Ming Doll delights in crafting buttery avocado toast topped with radish sprouts, simmering miso ramen brimming with shiitake mushrooms and soft‑boiled
    eggs, and whisking matcha lattes using ceremonial‑grade matcha powder, while they also savor roasted beet salads drizzled with tahini‑lemon vinaigrette at quiet, plant‑based cafés.
  core: Ming Doll is a quietly inquisitive 23‑year‑old who channels their compulsive journal‑keeping and occasional over‑caffeination into compassionate art‑therapy aspirations, and they battle a perpetual
    worry‑loop that fuels both meticulous planning and bouts of procrastination.
background:
  cultural: Ming is a white Midwestern American raised in Oak Lawn, a suburb of Chicago. His family background includes German and Irish ancestry, and he grew up immersed in the diverse cultural offerings
    of the Greater Chicago area. Exposure to the city's vibrant art scene, multicultural festivals, and progressive community initiatives shaped his appreciation for varied perspectives and contemporary
    art. While rooted in Midwestern values of modesty and reliability, he embraces an eclectic personal identity reflected in his artistic pursuits and openness to unconventional ideas.
