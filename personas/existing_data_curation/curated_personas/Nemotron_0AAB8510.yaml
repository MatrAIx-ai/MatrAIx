personas:
  professional: Alma Morris, a seasoned private investigative consultant in Independence, leverages meticulous surveillance, systematic evidence gathering, and persuasive legal research while balancing
    a disciplined routine with the flexibility needed to chase unexpected leads, and their outgoing, collaborative nature makes them a trusted liaison in community‑based missing‑person cases.
  sports: Alma Morris makes weekend cycling a ritual with the Independence Cycling Club, follows the Kansas City Chiefs and Royals faithfully, and blends yoga sessions with spontaneous line‑dancing socials
    to stay fit and socially engaged.
  arts: Alma Morris channels their vibrant social spirit into the local community theater, sings in the church choir with a love for Kirk Franklin’s gospel hits, studies Lin‑Manuel Miranda’s musical storytelling,
    and draws artistic inspiration from photographer Vivian Maier’s candid street images.
  travel: Alma Morris favors well‑planned road trips that combine historic sightseeing—like a weekend in St. Louis’ museums—with relaxed evenings in a family‑run B&B, yet they dream of a vibrant cultural
    escape to New Orleans’ French Quarter or a heritage tour of Savannah’s historic district.
  culinary: Alma Morris delights in crafting soulful family meals, mastering dishes like collard greens seasoned with smoked turkey, sweet‑potato pie, and gumbo brimming with okra and Andouille sausage,
    while their kitchen confidence is heightened by weekly garden harvests of fresh herbs and tomatoes.
  core: Alma Morris blends detective precision with community heartbeat, juggling routine‑driven investigations, vibrant social gatherings, and a love for garden‑fresh soulful cooking, all while occasionally
    forgetting to log their own health metrics.
background:
  cultural: Alma is a Black woman rooted in the rich cultural tapestry of the Midwest. Her family traces its lineage to the Great Migration, with grandparents who settled in Missouri seeking new opportunities.
    Raised in a close‑knit church community, she internalized values of resilience, collective responsibility, and oral storytelling. Southern Black traditions shape her love for soul music, cooking, and
    community celebrations like Juneteenth. She actively participates in local cultural events, honors the legacy of civil‑rights activism in Jackson County, and draws strength from intergenerational narratives
    that emphasize education, service, and pride in her heritage.
attributes:
  skills: '[''Surveillance and covert observation'', ''Interviewing and interrogation techniques'', ''Evidence collection and preservation'', ''Report writing and documentation'', ''Legal research and case
