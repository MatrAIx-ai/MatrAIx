  hobbies: '[''Community theater acting'', ''Church choir singing'', ''Gardening'', ''Reading historical fiction'', ''Cooking soul food'', ''Yoga'', ''Photography'', ''Cycling'', ''Neighborhood watch participation'',
    ''Board game nights'', ''Line dancing'', ''Volunteer mentoring youth'']'
  career_goals: Alma aims to launch her own private detective agency in Independence, focusing on missing‑person cases and community safety initiatives. She plans to obtain advanced certification in forensic
    investigation, become a trusted consultant for local law‑enforcement agencies, and develop a mentorship program for aspiring Black women investigators. Long‑term, she hopes to author a memoir that shares
    her most compelling cases and contributes to broader discussions on justice and representation in the field.
