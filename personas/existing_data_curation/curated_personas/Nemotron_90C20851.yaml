personas:
  professional: Diana Dykes, a retired art historian and museum docent, leverages their graduate training, meticulous project management, and curatorial flair to design community‑driven exhibitions and
    oral‑history archives, blending scholarly rigor with approachable narratives while navigating the stress of grant deadlines with organized precision.
  sports: Diana Dykes enjoys low‑impact fitness such as weekend hikes in the Gila National Forest, weekly yoga sessions at the local senior center, and cheering on the New Mexico State Aggies basketball
    team, while occasionally joining a senior walking club that meets at the historic downtown plaza.
  arts: Diana Dykes, an avid watercolorist inspired by the desert hues of Georgia O'Keeffe and the intricate patterns of Frida Kahlo, regularly attends exhibitions at the New Mexico Museum of Art, volunteers
    as a docent at the regional historical museum, and finds solace sketching calligraphy of favorite literary passages from Virginia Woolf and Gabriel García Márquez, while they often share insights with
    the community through docent tours.
  travel: Diana Dykes prefers meticulously planned road trips that blend art pilgrimages—such as a weekend in Santa Fe to see the Georgia O'Keeffe Museum—with peaceful retreats to the Irish countryside,
    where they trace genealogical roots, and they dream of exploring the vibrant souks of Marrakech for their textile inspiration.
  culinary: Diana Dykes, a competent home cook, delights in preparing green chile enchiladas, rosemary‑lemon roasted chicken, and hearty Irish stew simmered with potatoes and parsley, while their favorite
    ingredients include native prickly pear, local sage, and a pinch of smoked paprika, though they occasionally over‑salt dishes when preoccupied with grant writing.
  core: Diana Dykes blends scholarly rigor with desert‑inspired creativity, obsessively curates community memory, worries about every detail, and can’t resist a late‑night glaze of extra salt on their stew.
background:
  cultural: Diana is a White American of Irish‑German ancestry, raised in a modest Midwestern town before moving to the Southwest in her early thirties to pursue her graduate studies. Her upbringing instilled
    a strong work ethic, practicality, and an appreciation for community cooperation. Living in Silver City for over three decades has immersed her in a culturally diverse environment, fostering a deep
    respect for the rich traditions of Native American and Hispanic peoples in New Mexico. While she retains the values of her Midwestern upbringing, she actively incorporates Southwestern artistic influences
    into her personal and volunteer activities, creating a blended cultural identity that honors both her heritage and her adopted community.
attributes:
  skills: '[''Art historical research'', ''Curatorial planning'', ''Exhibit design'', ''Grant writing'', ''Community outreach'', ''Public speaking'', ''Project management'', ''Writing and editing'', ''Archival
