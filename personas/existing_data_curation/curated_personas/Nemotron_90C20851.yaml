  hobbies: '[''Watercolor painting'', ''Reading classic literature'', ''Visiting art galleries and museums'', ''Volunteer docent at local historical museum'', ''Hiking and nature walks'', ''Gardening'',
    ''Calligraphy'', ''Knitting'', ''Attending community theater productions'', ''Genealogy research'']'
  career_goals: Although retired, Diana aims to leave a lasting cultural imprint on Silver City by establishing a community-driven oral‑history archive that captures the memories of longtime residents and
    local artists. She plans to curate a traveling exhibition of regional art that highlights both contemporary works and traditional Native American and Hispanic motifs. Diana is also working toward publishing
    a collection of essays that blend personal reflections with scholarly analysis of Southwestern art. To support these ambitions, she is learning advanced digital archiving tools and seeking to mentor
    younger volunteers in grant writing and exhibition planning, hoping to secure sustainable funding for the town’s cultural institutions.
