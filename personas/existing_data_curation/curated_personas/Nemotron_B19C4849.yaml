  career_goals: Amanda aims to deepen her impact on patient care by transitioning into a senior clinical educator role within her practice, where she can mentor newer physician assistants and develop routine‑focused
    training programs. She aspires to lead quality‑improvement projects that standardize care pathways, reduce errors, and improve patient outcomes. Recognizing her desire for stability and manageable stress,
    she plans to pursue a master's degree in healthcare administration to eventually oversee clinic operations, ensuring a balanced, harmonious work environment for her team while maintaining high standards
    of care. Throughout her career progression, she remains committed to preserving the routine and reliability that support both her professional satisfaction and personal well‑being.
