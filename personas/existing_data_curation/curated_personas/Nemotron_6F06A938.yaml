  hobbies: '[''Salsa dancing'', ''Beach volleyball'', ''Group fitness classes'', ''Cooking Vietnamese cuisine'', ''Attending tech meetups'', ''Hackathons'', ''Street photography'', ''Hiking in the Bay Area'',
