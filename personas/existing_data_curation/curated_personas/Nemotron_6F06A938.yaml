  career_goals: She aims to progress to a senior solutions architect role within the next five years, earning AWS Solutions Architect and PMP certifications along the way. Thanhthuy is driven to lead cross‑functional
    technology projects that merge innovative ideas with reliable outcomes, eventually launching her own consultancy that helps small Southeast Asian businesses modernize their IT infrastructure. Balancing
    her competitive ambition with her need for flexibility, she seeks a leadership position that allows remote work and a schedule that mitigates stress, while also mentoring other women of color in tech.
