  hobbies: '[''Playing soccer in a local league'', ''Dancing at community festivals'', ''Cooking Vietnamese and fusion dishes'', ''Hiking Sierra foothill trails'', ''Gardening fresh vegetables'', ''Volunteering
    at Stockton Asian Cultural Center'', ''Participating in health-education workshops'', ''Board game nights with friends'']'
  career_goals: Driven by his balanced outlook, Thoa aims to build on his personal-care experience by earning a Certified Nursing Assistant credential and eventually completing an Associate's degree in
    Nursing to become a Licensed Vocational Nurse. He plans to specialize in geriatric and community-based care, with a long-term ambition of opening a modest, culturally sensitive home-care agency that
    serves Stockton's growing Southeast Asian senior population. In the interim, he seeks leadership opportunities within his current agency—such as care coordinator or shift supervisor—to mentor newer
    aides, introduce evidence-based care practices, and streamline workflow through modest tech upgrades.
