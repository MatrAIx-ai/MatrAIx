  career_goals: Approaching retirement, Amy plans to transition to a part‑time advisory role where she can share her expertise with small nonprofits and family businesses in the Atlanta area while maintaining
    a flexible schedule that accommodates her active social life. She aims to solidify her Certified Public Accountant credential if not already held and develop a community‑focused financial literacy program
    for seniors, leveraging her experience in volunteer tax assistance. Amy also seeks to continue mentoring the next generation of accountants—particularly women entering STEM fields—and to leave a lasting
    impact by improving internal audit practices within her current firm, balancing professional ambitions with family and community commitments.
