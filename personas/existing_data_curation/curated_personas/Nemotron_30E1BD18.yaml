personas:
  professional: Amy Franks, a seasoned CPA with four decades of audit and accounting expertise, blends a structured, detail‑oriented mindset with a relaxed, flexible approach to mentoring junior staff and
    designing audit plans that balance regulatory rigor and client‑centric adaptability.
  sports: Amy Franks enjoys cheering on the Atlanta Falcons on Sunday afternoons, follows the Atlanta Hawks’ season, participates in a senior pickleball league at the local community center, and occasionally
    joins her church’s charity walk for the ALS Association.
  arts: Amy Franks, an avid supporter of the arts, sings in her church choir, regularly attends the Decatur Jazz Festival featuring the sounds of Wynton Marsalis and Ella Fitzgerald tributes, and finds
    inspiration in the poetry of Mary Oliver while browsing the local art gallery.
  travel: Amy Franks favors leisurely road trips to historic Southern towns like Savannah and Asheville, enjoys organized senior group tours to Washington, D.C., and dreams of a relaxed Mediterranean cruise
    to Italy’s Amalfi Coast, always planning trips around her book‑club schedule and VITA volunteer weekends.
  culinary: Amy Franks delights in cooking Southern classics such as shrimp and grits, peach cobbler, and roasted chicken scented with native Georgia roses, often seasoning with fresh thyme and locally
    sourced honey, while also exploring new flavors at Decatur’s farm‑to‑table restaurants like The Iberian Pig.
  core: Amy Franks blends her meticulous CPA pedigree with a love for garden‑photography, a penchant for forgetting where she set her reading glasses, and a relentless zeal for community‑driven book clubs
    and jazz nights.
background:
  cultural: Amy grew up in a middle‑class, white Southern family in the Atlanta suburbs during the 1950s and 60s. Her upbringing was shaped by traditional Southern hospitality, a strong sense of community,
    and active involvement in her local Methodist church, where she learned the value of service and collective responsibility. Encouraged by progressive parents who valued education, she pursued a bachelor's
    degree in a STEM field—a rarity for women of her generation—setting the stage for a pioneering career in accounting. Living in DeKalb County, she has embraced the region's cultural diversity, participating
    in neighborhood festivals, supporting local arts, and championing intergenerational connections. These experiences have reinforced her pragmatic yet flexible outlook, her love of social engagement,
    and her commitment to giving back to the community.
