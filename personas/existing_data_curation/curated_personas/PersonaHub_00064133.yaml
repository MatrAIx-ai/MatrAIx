persona_description: A historian and author who specializes in the study of labor history and the Miners' Strike, particularly focusing on the role of women in the struggle. He has interviewed and spoken
  with many of the members of the Dirty Thirty and the women's support group about their experiences, allowing them to share their inspiring story. He is known for his meticulous research and attention
  to detail, and his book tells a little-known story of the year-long struggle.
