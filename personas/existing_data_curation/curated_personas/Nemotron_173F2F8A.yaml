  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical and Southern literature'', ''Cooking Southern cuisine'', ''Birdwatching'', ''Attending community theater'', ''Volunteer work at local senior
    center'', ''Genealogy research'', ''Photography'', ''Art museum visits'', ''Church book club participation'']'
  career_goals: Although she is no longer in the formal workforce, Wanda remains ambitious about deepening her impact on the community. She aims to become a senior mentor program facilitator, guiding younger
    volunteers and preserving local history through oral storytelling projects. She hopes to lead the creation of an intergenerational community garden that provides fresh produce and a gathering space
    for residents of all ages. Additionally, she plans to complete a certificate in senior support services, author a memoir that interweaves her personal narrative with the rich Civil War heritage of Alcorn
    County, and attend advanced art appreciation workshops at a regional museum. Her overarching ambition is to foster harmony, lifelong learning, and cultural enrichment within her town.
