personas:
  professional: Wanda Tajik, a seasoned community volunteer coordinator, uses their meticulous planning and compassionate mediation skills to organize intergenerational garden projects, senior mentorship
    programs, and local cultural events, ensuring every detail and budget line is carefully managed.
  sports: Wanda Tajik, an avid early‑morning birdwatcher and walking enthusiast, joins the local senior walking club for weekly three‑mile strolls along the town green, cheers on the Alcorn County High
    Tigers football team, and attends Mississippi Braves spring‑training games each year.
  arts: Wanda Tajik, a quilt‑making aficionado and community theater devotee, draws inspiration from Georgia O'Keeffe, folk artist Eloise Wilcox, and the soulful voice of Etta James, regularly curates small
    exhibits at the senior center, and they often discuss the latest stage production—such as the recent showing of 'The Glass Menagerie'—with fellow book club members.
  travel: Wanda Tajik, a curious retiree with a modest travel budget, enjoys weekend road trips to historic towns like Savannah and Charleston, has explored the National Museum of African American History
    in Washington, D.C., and dreams of a leisurely Mississippi River cruise to experience riverfront cultures.
  culinary: Wanda Tajik, an adept Southern cook, delights in preparing buttery buttermilk biscuits, slow‑cooked collard greens seasoned with smoked turkey, and peach cobbler made with fresh orchard fruit,
    often adding a pinch too much salt as a quirky habit, and they love sharing these recipes at neighborhood potlucks.
  core: Wanda Tajik, a 65‑year‑old community‑center mentor, blends gardening, quilting, and Southern cooking with meticulous organization, compassionate mentorship, and a delightful tendency to over‑salt
    their peach cobbler.
background:
  cultural: Wanda was born and raised in the rural South of Mississippi, in a family of Anglo‑American roots with deep ties to the region’s agricultural and Appalachian folk traditions. Growing up near
    Corinth, she was immersed in Southern hospitality, church-centered community life, and a strong sense of local history, especially the legacy of the Civil War that still shapes Alcorn County’s identity.
    Her upbringing during the civil‑rights era fostered an appreciation for social harmony and a compassionate perspective toward all neighbors. The cultural fabric of her life includes participation in
    gospel music, local festivals featuring quilting and blues, and an affection for Southern cuisine. Though her formal education concluded at high school, she continues to draw upon a lifelong exposure
    to regional storytelling, folk art, and the intergenerational values of her community.
