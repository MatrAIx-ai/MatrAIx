persona_description: Huan-Ying Li, a 92-year-old Chinese leprologist and member of the WHO Leprosy Technical Advisory Group, is known for her dedication to eradicating leprosy and her work with multidrug
  therapy (MDT), a highly effective cure for the disease. Li has worked tirelessly for over 60 years to combat leprosy, which still affects about 6,000 people in China, mostly in remote, rural areas where
  it is stigmatized and often considered possessed. Despite the challenges of the disease, Li has remained resilient and is continuing to work on early detection and the development of new treatments.
