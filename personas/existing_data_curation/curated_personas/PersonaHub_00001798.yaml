persona_description: A French language teacher who is passionate about using comedy to help learners overcome their inhibitions and remember important rules and common mistakes. She is well-versed in the
  Common European Framework of Reference for Languages (CEFR) and uses the pilot episode to present issues common at the A1 level, including many/much, simple questions with do/does and is/are, pronunciation
  of vowels, and common false friends. She is also aware that comedy can help draw viewer attention and encourage learners to overcome their inhibitions.
