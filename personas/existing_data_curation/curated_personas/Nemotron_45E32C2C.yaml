personas:
  professional: Wilson Brown is a veteran construction professional who leverages his expertise in carpentry, concrete formwork, and heavy‑equipment operation to lead small crews, blending his pragmatic
    attention to OSHA safety with a curiosity for sustainable building methods, and his steady, competitive drive positions him as a natural foreman candidate.
  sports: Wilson Brown keeps fit by weekend fishing trips on the Mississippi and a weekday membership at the local gym’s weight‑lifting class, cheers on the St. Louis Cardinals and St. Louis Blues during
    the season, and plays catch‑up softball on the Alton Community League team, balancing competitive spirit with a laid‑back love of outdoor recreation.
  arts: Wilson Brown’s artistic side shines through his admiration for the craftsmanship of Sam Maloof, the storytelling lyrics of Johnny Cash, and the rustic folk tunes of Gillian Welch, while evenings
    are often spent listening to classic western films starring John Wayne or attending the annual Mid‑America Folk Festival, reinforcing his appreciation for heritage‑rich creativity.
  travel: Wilson Brown prefers road‑trip adventures that combine work‑site scouting with leisure, having mapped out routes to the historic river towns of Hannibal and Vicksburg, and dreaming of a future
    trek through the Great Smoky Mountains and a weekend getaway to Asheville’s artisan markets, all planned around his family’s school calendar and budget constraints.
  culinary: Wilson Brown enjoys cooking hearty Mid‑American fare, from pan‑seared catfish seasoned with paprika and lemon to slow‑cooked pork shoulder rubbed with brown sugar and smoked paprika, often pairing
    meals with homemade cornbread featuring buttermilk and honey, and he’s quick to fire up his cast‑iron skillet for a perfectly charred steak, reflecting his hands‑on, flavor‑focused approach to dining.
  core: Wilson Brown is a steady‑hand craftsman who balances a competitive edge with an unusually calm demeanor, yet he secretly hoards discount tool coupons like treasure and can’t resist a late‑night
    fishing trip even when tomorrow’s work schedule looms.
background:
  cultural: Wilson grew up in a tight‑knit, predominantly white Midwestern community in Macoupin County, with family heritage that traces back to German and Irish immigrants who settled in the area during
    the late 19th century. The local culture emphasizes hard work, self‑reliance, and practical problem‑solving, values reinforced by church participation and county fair traditions. This background instilled
    a strong work ethic, a pragmatic outlook, and a deep appreciation for community gatherings, while also fostering a subtle competitive streak common among peers striving for upward mobility in the region.
