  career_goals: Wilson aims to advance from laborer to foreman within the next three years, seeking additional certifications such as NCCER journeyman credentials and specialized OSHA training. His long‑term
    ambition is to launch his own small contracting firm focused on residential remodels that incorporate energy‑efficient practices. He plans to enroll in night courses on construction management to bridge
    his on‑the‑job experience with formal project leadership skills, while also staying competitive in bidding for local contracts.
