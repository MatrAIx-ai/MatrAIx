personas:
  professional: Angela Bertaut is a budding coder who turns their curiosity into creative Scratch animations, blending practical problem‑solving with a love for collaborative storytelling, and often leads
    their friends in group coding sessions after school.
  sports: Angela Bertaut is a lively midfielder for the Midtown Junior Soccer Club, cheers on the local high school basketball team the Eagles, and they join the after‑school dance troupe that practices
    to upbeat pop hits, while also participating in seasonal park tag tournaments that keep them energetic and socially connected.
  arts: Angela Bertaut channels their creativity into watercolor sketches of forest birds, admires the vibrant illustrations of Shaun Tan and the animated storytelling of Pixar’s 'Coco', and sings along
    to Disney’s classic songs while rehearsing choreography to BTS tracks in their dance rehearsals.
  travel: Angela Bertaut loves weekend family trips to the nearby Redwood State Park for birdwatching, has visited the interactive science museum in San Jose, and they dream of exploring the Grand Canyon’s
    rim trails, preferring short, adventure‑filled journeys that fit their school schedule.
  culinary: Angela Bertaut enjoys baking chocolate chip cookies with their mom, often adding a dash of sea salt for extra flavor, and they delight in assembling simple snack plates of apple slices, cheddar
    cubes, and carrot sticks, showcasing a budding yet modest cooking skill.
  core: Angela Bertaut is an energetic, curiosity‑driven pre‑teen who balances group adventures with a laid‑back approach to plans, often scattering socks while they dream up Scratch stories and soccer
    strategies.
background:
  cultural: Angela was born and raised in Conway, Arkansas, a close‑knit community in Faulkner County where Southern hospitality and small‑town traditions shape daily life. Her family is part of the region's
    white, middle‑class demographic, with roots in the area that include a blend of local customs and a touch of French heritage suggested by her surname. She attends a public middle school where community
    events like the Little Bear Festival, county fairs, and church gatherings are common. Growing up, she has absorbed Southern values of kindness, cooperation, and respect for nature—evident in her love
    for outdoor activities and community service. Local influences such as country and bluegrass music, regional foods like fried catfish and sweet tea, and a strong emphasis on family and church participation
    have contributed to her well‑rounded, socially oriented outlook.
