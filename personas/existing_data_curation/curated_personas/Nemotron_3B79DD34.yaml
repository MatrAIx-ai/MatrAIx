  hobbies: '[''Gardening (native plants)'', ''Hiking in the Cascades'', ''Reading historical non-fiction'', ''Cooking and trying new recipes'', ''Knitting'', ''Volunteering at local food bank'', ''Attending
    community theater'', ''Photography of local landscapes'', ''Exploring coffee shops'', ''Participating in neighborhood block parties'']'
  career_goals: Sandra aims to deepen her impact on infrastructure and environmental policy in King County, championing data‑backed initiatives for sustainable transportation and renewable energy. She aspires
    to become a committee chair where she can shape long‑term, pragmatic legislation that promotes community harmony. Mentoring emerging legislators and fostering a collaborative, bipartisan environment
    are also key ambitions. Ultimately, she envisions a gradual progression to the state senate, where she can leverage her STEM background to advance statewide STEM education and workforce development
    programs, while maintaining her commitment to practical, measurable outcomes.
