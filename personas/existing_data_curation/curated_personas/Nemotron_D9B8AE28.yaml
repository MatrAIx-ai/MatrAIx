  hobbies: '[''drawing'', ''digital art'', ''strategy video games'', ''science club projects'', ''museum and gallery visits'', ''biking'', ''short story writing and illustration'', ''mindfulness journaling'']'
  career_goals: Larry aspires to merge his love for art and technology by pursuing a career as a concept artist or video game designer, creating immersive visual stories. He is also intrigued by psychology
    and hopes to study it further to understand emotions, potentially becoming a counselor who helps peers manage anxiety. In the short term, he aims to win youth art competitions, build an online portfolio,
    and contribute to community art projects that reflect Portland’s indie culture.
