personas:
  professional: Larry Young, an aspiring visual technologist, merges his fluid sketching style with digital illustration and hands‑on robotics projects, applying the strategic thinking of his competitive
    video games to craft intricate, detail‑rich creations while maintaining the organized school schedule he values.
  sports: Larry Young cruises the Southwest Trail on his mountain bike alone on weekends, belongs to the Portland Youth Bike Club for group rides, roots for the Portland Timbers soccer team, and plays on
    his middle school’s fall intramural soccer squad, balancing solitary exercise with brief team competition.
  arts: 'Larry Young spends Saturday mornings wandering the Portland Art Museum, studying Francis Bacon’s canvases and Shepard Fairey’s street murals, while drawing inspiration from Tame Impala’s psychedelic
    music and Studio Ghibli’s animation, and regularly fills his sketchbook with fan art of Avatar: The Last Airbender.'
  travel: Larry Young delights in short road trips to the Columbia River Gorge for waterfall hikes, frequently visits the Oregon Coast’s Cannon Beach for sunrise sketch sessions, and dreams of a family
    vacation to Tokyo’s Akihabara district and the historic canals of Bruges to fuel his art and curiosity.
  culinary: Larry Young loves whipping up a quick ramen bowl with miso broth, sliced pork belly, a soft‑boiled egg, and a drizzle of chili oil, can confidently stir‑fry tofu with broccoli for dinner, but
    habitually skips breakfast, grabbing sugary cereal before gaming marathons.
  core: Larry Young is a competitively driven teenage artist‑engineer whose intense emotions spark vivid creations while sometimes steering them into impulsive spending and occasional anxiety‑filled overthinking.
background:
  cultural: Larry was born and raised in Portland, Oregon, where the Pacific Northwest’s progressive, environmentally conscious values intersect with a thriving indie arts scene. As a white American in
    a suburban setting, his family celebrates traditional holidays such as Thanksgiving and the Fourth of July, while also embracing Portland’s emphasis on sustainability, public art programs, and cultural
    diversity through local festivals and community events.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic coding (Scratch, Python)'', ''research and information synthesis'', ''critical thinking'', ''project organization'', ''competitive gaming strategy'',
