  career_goals: Looking ahead, Carol aims to earn the Certified Commercial Property Inspector (CCPI) credential and eventually step into a senior lead‑inspector role where she can oversee a team and shape
    regional inspection protocols. She plans to complete her bachelor’s degree in construction management, which will give her a formal foundation to complement her practical experience. Carol hopes to
    launch a community outreach program that teaches homeowners about preventive maintenance and energy‑efficiency upgrades, and she is interested in integrating building‑information‑modeling (BIM) tools
    into field inspections. Ultimately, she aspires to become a recognized safety consultant for developers, leveraging her competitive drive to set the benchmark for inspection excellence in Kansas and
    beyond.
