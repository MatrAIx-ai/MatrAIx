personas:
  professional: Ying Aung, a retired educator turned community art advocate, leverages decades of curriculum design expertise and fluency in Mandarin and English to craft interdisciplinary workshops that
    blend abstract watercolor techniques, calligraphy, and cultural storytelling for seniors and youth, while confidently leading public talks and fundraising events with a talkative, charismatic flair.
  sports: Ying Aung maintains fitness with low‑impact tai chi at the community center and brisk walks as part of the Newark Riverwalk Walking Club, while passionately rooting for the New York Yankees, the
    New York Giants, and the New Jersey Devils, and treats bridge and mahjong nights as competitive mental sports that satisfy their need for social interaction.
  arts: Ying Aung immerses themselves in the arts by painting abstract watercolors inspired by Kandinsky and Rothko, attending exhibitions featuring Ai Weiwei and local Newark artists, listening to the
    piano works of Debussy and Yo‑Yo Ma’s cello recordings, and regularly watching performances by the Newark Symphony and the off‑Broadway play 'The Glass Menagerie,' which together shape their creative
    outlook.
  travel: Ying Aung prefers thoughtfully planned group tours that blend cultural immersion with comfortable pacing, having revisited Kyoto, Japan for its serene temples, explored Barcelona’s vibrant art
    scene, taken leisurely road trips across New England during autumn, and dreaming of a future pilgrimage to the historic city of Florence to study Renaissance frescoes.
  culinary: Ying Aung enjoys crafting delicate steamed dumplings, simmering fragrant miso soup, and arranging colorful sushi bowls, boasts a moderate skill level that allows them to perfect traditional
    tea ceremonies with jasmine and oolong leaves, yet admits to a habit of over‑seasoning with soy sauce when experimenting with new recipes.
  core: Ying Aung blends relentless curiosity with a talkative, charismatic presence, juggling a love for abstract art and community storytelling while habitually worrying about deadlines, forgetting to
    water their zen garden, and indulging in occasional impulsive splurges on rare calligraphy brushes.
background:
  cultural: Ying Wen Aung is a first‑generation Chinese‑American whose family immigrated to the United States in the 1950s. She grew up bilingual, speaking Mandarin at home and English at school, and was
    raised with traditional East Asian values such as respect for elders, the importance of education, and communal harmony. Throughout her life she has blended these cultural roots with American customs,
    celebrating Lunar New Year, the Mid‑Autumn Festival, and incorporating Chinese tea ceremonies into her social gatherings. Her East Asian heritage influences her artistic sensibilities, her appreciation
    for abstract expression, and her commitment to community service and intergenerational learning.
