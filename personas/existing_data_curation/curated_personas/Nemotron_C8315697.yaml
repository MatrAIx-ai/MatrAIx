  hobbies: '[''Abstract watercolor painting'', ''Visiting art galleries and museums'', ''Reading contemporary literature and poetry'', ''Creative writing (short stories, essays, poems)'', ''Playing mahjong
    and bridge'', ''Attending cultural festivals'', ''Calligraphy'', ''Gardening (zen garden)'', ''Volunteering for storytelling circles'']'
  career_goals: Though retired from formal employment, Ying Wen aspires to remain an active intellectual presence in her community. She aims to volunteer as a docent at the local art museum, develop a series
    of interdisciplinary workshops that blend education, art, and cultural history for seniors and youth, and mentor young teachers through a community mentorship program. She also hopes to author a collection
    of reflective essays and poems capturing her life experiences and cultural heritage, and to establish a modest scholarship fund for East Asian students pursuing education degrees.
