personas:
  professional: Herbert Little, a pragmatic IT manager who designs robust network and server infrastructure while experimenting with Raspberry Pi home‑automation, blends curiosity‑driven tinkering with
    cost‑effective, resilient solutions for rural organizations, and they lead small teams with a relaxed, flexible style.
  sports: Herbert Little, an avid member of the Blue Ridge Trail Club and a regular in the town basketball league that plays out of the local community center, spends weekends hunting deer and fishing for
    trout, follows the Carolina Panthers and the Charlotte Hornets, and they treat fitness as a social activity, often organizing group hikes and pickup games after work.
  arts: Herbert Little, who strums a weathered steel‑string guitar in a weekly bluegrass jam session covering Bill Monroe and Alison Krauss, curates trivia nights featuring obscure folk‑rock facts and enjoys
    the storytelling of actor Sam Elliott, they see music and humor as essential threads weaving together community gatherings.
  travel: Herbert Little, who prefers spontaneous weekend road trips to nearby Asheville, the Great Smoky Mountains, and the historic streets of Charleston, while dreaming of a summer backpacking adventure
    through the Scottish Highlands, balances low‑budget planning with a love for campfire cooking and they rarely book long‑haul flights unless a group of friends can share the cost.
  culinary: Herbert Little, a self‑taught grill master who seasons pork shoulder with smoked paprika, brown sugar, and garlic before slow‑cooking it into a tender brisket, pairs the meat with homemade coleslaw
    dressed in apple cider vinegar, and they relish serving fresh‑caught trout grilled with lemon‑butter while swapping trivia questions over a backyard fire.
  core: Herbert Little blends a hands‑on tech mind with a love for community bluegrass, backyard barbecues, and spontaneous outdoor adventures, they balance curiosity with practicality while occasionally
    letting disorganization slip into the mix.
background:
  cultural: Herbert grew up in a multi‑generational white Appalachian family in Yancey County, where self‑reliance, neighborly hospitality, and a deep appreciation for mountain music and storytelling are
    central values. Though he left high school before obtaining a diploma, he built his career through hands‑on learning, early computer repair jobs, and online courses. The rural setting fostered a practical
    mindset, while his exposure to broader tech communities online sparked a curiosity for new ideas. He maintains ties to local churches and community events, balancing his modern tech career with the
    region’s traditions of outdoor recreation, folk music, and collective problem‑solving.
attributes:
  skills: '["IT infrastructure management", "Network administration", "Server virtualization", "Cloud services (AWS/Azure basics)", "Cybersecurity", "Disaster recovery planning", "Project management", "Budgeting
