  hobbies: '["Playing guitar (bluegrass jam sessions)", "Hiking Blue Ridge trails", "Community tech workshops at the library", "Town basketball league", "DIY electronics (Raspberry Pi, home automation)",
    "Hunting and fishing trips", "Attending bluegrass festivals", "Barbecue cook‑outs and trivia nights", "Reading tech blogs and sci‑fi novels"]'
  career_goals: Herbert aims to transition from manager to a regional IT director overseeing technology for healthcare providers and school districts across western North Carolina, leveraging his experience
    to close the digital divide in Appalachian communities. He plans to earn industry certifications such as CISSP and PMP to validate his expertise. Long‑term, he envisions launching his own consulting
    firm that offers affordable, resilient IT solutions to small businesses and nonprofits in rural areas, while mentoring local youth interested in technology careers.
