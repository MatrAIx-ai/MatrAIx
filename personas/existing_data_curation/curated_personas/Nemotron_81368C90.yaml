  hobbies: '[''Knitting'', ''Crocheting'', ''Embroidery'', ''Vegetable gardening'', ''Traditional cooking'', ''Reading historical fiction'', ''Listening to Urdu ghazals'', ''Watching classic Bollywood films'',
    ''Participating in small mosque study circles'', ''Genealogy research'']'
  career_goals: Although retired, Nirupama aims to maintain her independence and continue contributing to her community. She plans to keep volunteering at the senior center, mentoring younger volunteers
    in record‑keeping and activity planning. She hopes to compile a handwritten family cookbook preserving her favorite recipes for future generations. In the coming years, she wishes to visit her children
    and grandchildren in the Midwest and, if health permits, travel to Pakistan to reconnect with her extended family and cultural roots. She also aspires to keep her garden thriving as a source of fresh
    produce and personal fulfillment.
