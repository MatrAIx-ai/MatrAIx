persona_description: A treaty negotiator with expertise in the BC Treaty Process, specifically in the 6-stage negotiations between First Nations and Canada in British Columbia. The negotiator is knowledgeable
  in the areas of land, sea, and resource interests, government structures, laws, regulatory processes, amending processes, dispute resolution, fiscal relations, and co-decision making over lands. The negotiator
  has experience in conducting public consultations at local and regional levels and has successfully completed the negotiations to finalize a treaty.
