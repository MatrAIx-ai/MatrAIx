personas:
  professional: Petrina Moore, a retired accountant turned community volunteer, leverages their meticulous budgeting, event planning, and spreadsheet expertise to coordinate senior center programs and church
    activities with dependable, methodical precision.
  sports: Petrina Moore enjoys cheering on the New Orleans Saints and the New Orleans Pelicans from their porch, participates in a weekly low‑impact walking group that meets at the local nature trail, and
    volunteers as a scorekeeper for the senior center’s bridge tournaments, while they avoid strenuous sports due to joint discomfort.
  arts: Petrina Moore finds creative solace in quilting elaborate blocks inspired by the works of Georgia O’Keeffe and folk artist Grandma Moses, reads historical novels by Philippa Gregory and local Louisiana
    histories by Grace King, and regularly attends performances at the Baton Rouge Symphony featuring violinist Hilary Hahn, while they cherish the quiet focus each craft demands.
  travel: Petrina Moore prefers meticulously planned weekend getaways to nearby historic towns like Natchez, Mississippi, and the French Quarter of New Orleans, balancing a love for mild adventure with
    the comfort of staying in heritage B&Bs, while they dream of a low‑key river cruise along the Mississippi with their husband.
  culinary: Petrina Moore delights in preparing Southern comfort dishes such as shrimp étouffée, baked catfish with a cornmeal crust, and pecan praline pie, often seasoning with garden‑grown thyme and bay
    leaves, and rates their culinary skills as intermediate, though they occasionally over‑salt their gumbo in the pursuit of flavor.
  core: Petrina Moore blends a lifelong love of order, community service, and Southern heritage into a quietly assertive routine, punctuated by a habit of labeling every mason jar and an occasional tendency
    to over‑schedule their calendar.
background:
  cultural: Petrina’s cultural background is rooted in the Southern United States, specifically the rural communities of Bossier Parish, Louisiana. Raised in a predominantly white, Baptist family, she internalized
    values of hospitality, family cohesion, and a strong work ethic. Her upbringing emphasized community service through church involvement, a love of regional cuisine, and respect for tradition. While
    her primary cultural identity aligns with classic Southern customs, she also appreciates the subtle Cajun influences present in the local culture, which enrich her perspective on community and heritage.
attributes:
