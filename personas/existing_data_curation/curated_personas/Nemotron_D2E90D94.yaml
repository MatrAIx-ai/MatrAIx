  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Quilting'', ''Reading historical fiction'', ''Church volunteer work'', ''Birdwatching'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Petrina seeks to deepen her impact in the community by serving on the board of the local senior center, mentoring younger volunteers in organizational
    skills, and compiling a family memoir that preserves her lineage for future generations. She also aims to maintain her health through regular walks and occasional weekend trips with her husband, ensuring
    a balanced and purposeful later life.
