    Project Management Meetups'', ''Community Networking Events'']'
  career_goals: Nathan aims to progress from senior project manager to program director within the next five years, overseeing multiple high‑impact portfolios in the technology or renewable‑energy sectors.
    He plans to earn his PMP and Certified Scrum Professional credentials, followed by an executive education program focused on digital transformation. Long‑term, he envisions leading a corporate PMO as
    Vice President of Operations, championing data‑driven project execution and building high‑performing, culturally diverse teams. Eventually, he hopes to launch his own consultancy that helps midsize
    firms implement lean, agile practices while mentoring emerging Black project managers.
