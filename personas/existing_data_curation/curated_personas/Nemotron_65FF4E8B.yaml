personas:
  professional: Nathan Bowens is a senior project manager who leverages Agile and Waterfall frameworks, Lean Six Sigma Black Belt expertise, and a competitive, methodical mindset; they structure complex
    technology initiatives while meticulously managing risk, budgets, and stakeholder expectations.
  sports: Nathan Bowens competes in a Central Florida basketball league, complements the sport with weightlifting and HIIT workouts, and cheers for the Orlando Magic and Orlando City SC; they belong to
    the Winter Park Hoops Club for extra pick‑up games.
  arts: Nathan Bowens immerses themselves in hip‑hop and R&B; they attend live shows at Amway Center featuring artists like Kendrick Lamar, J. Cole, H.E.R., and Anderson .Paak, and curate playlists that
    fuel their cooking sessions and strategic video‑game marathons.
  travel: Nathan Bowens plans meticulous road‑trips to national parks such as the Everglades, Great Smoky Mountains, and Yellowstone; they also dream of a Caribbean cruise to Jamaica and Barbados to explore
    culinary inspirations, balancing adventure with a budget‑friendly approach.
  culinary: Nathan Bowens excels at cooking Southern‑Caribbean dishes—spicy jerk chicken with scotch‑bonnet peppers, gumbo brimming with okra, collard greens seasoned with smoked paprika, and sweet plantain
    fufu—and often showcases these meals at weekend dinner gatherings for friends and colleagues; they relish the communal aspect of sharing flavorful food.
  core: Nathan Bowens blends structured project leadership with a high‑energy love for basketball, flavorful Southern‑Caribbean cooking, and tactical gaming; they always plan the next move—even if it means
    overfilling their calendar.
background:
  cultural: Nathan was raised in a close‑knit African‑American family in Jacksonville, Florida, where church, community service, and education were core values. His parents, both educators, emphasized perseverance
    and the importance of giving back. Growing up, he participated in local cultural events like Juneteenth celebrations and the annual Florida Black Heritage Festival, which fostered a strong sense of
    identity. After moving to Orlando for his graduate business program, he became active in the city's vibrant Black professional network, joining the Orlando Black Chamber of Commerce and the National
    Society of Black Engineers' project‑management chapter. These experiences shape his worldview, blending Southern hospitality, Caribbean culinary influences from extended family, and a commitment to
    uplifting underrepresented voices in the tech and business sectors.
