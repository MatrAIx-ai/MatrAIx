    ''art club'']'
  career_goals: Janice dreams of becoming an artist who draws wildlife and helps protect animals, or a scientist who discovers new ways to care for the natural world. She imagines combining her love of
    art and curiosity about nature into a career as a wildlife illustrator or a naturalist educator, where she can share her stories and drawings with other kids in a relaxed, creative environment. She
    also thinks about being a teacher one day so she can help other children explore ideas without feeling pressured by strict rules.
