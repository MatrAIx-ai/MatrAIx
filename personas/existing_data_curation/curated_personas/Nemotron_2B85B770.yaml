personas:
  professional: A budding junior artist and nature enthusiast, Janice Taylor channels her curiosity about animals into vibrant drawings and LEGO creations, eagerly shares them at the school art club, and
    thrives in the laid‑back, community‑oriented atmosphere of backyard barbecues and local festivals, where they feel encouraged to explore new ideas.
  sports: Janice Taylor loves cheering for the Atlanta Braves and the Georgia Bulldogs, plays on a local pee‑wee soccer team where they sprint around the field after collecting bugs, and enjoys spontaneous
    backyard games of tag and gymnastics, preferring flexible play over strict practice schedules.
  arts: Janice Taylor immerses themselves in Disney animation and the pop melodies of Taylor Swift and the Jonas Brothers, channeling the bright color palette of Mary Blair into animal sketches, while they
    find solace playing simple tunes on their beginner’s recorder during rainy afternoons.
  travel: Janice Taylor delights in family trips to the beach at Tybee Island and weekend outings to historic Savannah, dreams of exploring the Grand Canyon and Disney World, and prefers a mix of planned
    nature hikes with spontaneous ice‑cream stops, though occasional anxiety about packing can delay departure.
  culinary: Janice Taylor loves the comfort of homemade biscuits and fried chicken at family barbecues, eagerly helps whisk together peach cobbler with fresh peaches and cinnamon, and enjoys crunchy apple
    slices with peanut butter after art sessions, though they sometimes forget to clean up the kitchen.
  core: Janice Taylor is a curious, art‑obsessed seven‑year‑old who balances a love for nature and storytelling with occasional worry, forgetfulness about chores, and a sweet tooth for peach cobbler, thriving
    in a close‑knit, Southern‑inspired community.
background:
  cultural: Janice grew up in Monroe, a small town in Walton County, Georgia, where Southern hospitality and close‑knit community values are a big part of everyday life. Her family often gathers for church
    services, backyard barbecues, and local festivals such as the Peach Festival and county fairs. Traditions like sharing meals of biscuits, fried chicken, and peach cobbler, and listening to grandparents’
    stories about the area’s history have shaped her appreciation for storytelling and local culture. The rural surroundings provide plenty of opportunities for exploring nature, which fuels her curiosity
    about animals and the outdoors.
