personas:
  professional: An organized curriculum designer and aspiring educational leader, Velma Sarratt (26) merges meticulous lesson planning with arts‑integrated pedagogy, using Google Classroom and mindfulness
    techniques to create low‑stress, high‑achievement classrooms.
  sports: A quiet enthusiast of low‑impact exercise, Velma Sarratt (26) participates in sunrise beach yoga, swims with the Fort Lauderdale Aquatics Club, follows the Miami Dolphins (NFL) and Miami Heat
    (NBA) seasons, and joins occasional Pilates classes to maintain flexibility without the social bustle of team sports.
  arts: An avid patron of visual culture, Velma Sarratt (26) frequents the Broward County Art Museum, draws inspiration from Claude Monet, Frida Kahlo, and contemporary street artist Banksy, curates a personal
    sketchbook of architectural details, and finds solace in listening to the ambient compositions of Max Richter while painting watercolors on the shore.
  travel: A thoughtful planner with a love for serene escapes, Velma Sarratt (26) has explored the quiet beaches of the Bahamas, trekked the historic streets of Savannah, Georgia, saves for annual weekend
    retreats to Asheville’s art colonies, and prefers solo itineraries that allow ample time for journaling and sketching.
  culinary: A budding Mediterranean chef, Velma Sarratt (26) experiments with dishes like Greek moussaka, Italian caprese salad, and Spanish paella, flavors her cooking with fresh basil, oregano, and lemon
    zest from her indoor herb garden, and often pairs meals with artisanal olive oil while listening to classical guitar playlists.
  core: Velma Sarratt (26) blends disciplined organization with artistic curiosity, channeling quiet mindfulness into a career aimed at harmonizing rigorous academics with creative expression, all while
    wrestling with a habit of over‑planning and occasional anxiety‑driven coffee binges.
background:
  cultural: Velma is a white American who grew up in a middle‑class family in the Midwest before moving to South Florida for college and her teaching career. Living in Pompano Beach, she embraces the coastal
    lifestyle—sunrise walks on the beach, participation in local art festivals, and a love of seafood cuisine. While she celebrates traditional American holidays, she also respects the multicultural fabric
    of Broward County, regularly incorporating diverse cultural perspectives into her classroom. Her upbringing emphasized the value of education, community service, and quiet reflection, shaping her supportive
    and disciplined approach to both personal and professional life.
attributes:
  skills: '[''Lesson Planning'', ''Curriculum Design'', ''Differentiated Instruction'', ''Classroom Management'', ''Data‑Driven Assessment'', ''Educational Technology Integration'', ''One‑on‑One Tutoring'',
    ''Conflict Mediation'', ''Mindfulness Facilitation'', ''Project‑Based Learning'', ''STEAM Integration'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Art History Reading'', ''Museum Visits'', ''Yoga'', ''Guided Meditation'', ''Journaling'', ''Crossword Puzzles'', ''Indoor Herb Gardening'', ''Mediterranean
    Cooking'']'
  career_goals: Driven by her curiosity and high standards, Velma aims to earn a Master's in Educational Leadership within the next three years and transition into a curriculum specialist role where she
    can influence district‑wide STEAM initiatives. She aspires to develop a comprehensive arts‑integrated framework that supports both academic rigor and creative expression, and to mentor new teachers
    in adopting these practices. Long‑term, she envisions becoming an instructional coach or school principal who champions supportive, low‑stress learning environments, and eventually publishing a guide
    on balancing achievement with teacher well‑being.
