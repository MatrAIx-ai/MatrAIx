  hobbies: '["Zumba classes", "Traditional Chinese dance", "K‑pop choreography group", "Cooking family recipes", "Hiking in San Gabriel Mountains", "Badminton league", "Volunteer work at senior center",
    "Organizing potluck gatherings", "Karaoke nights", "Participating in Lunar New Year events"]'
  career_goals: Vy is working toward earning her GED within the next year, followed by a community health worker certification and an associate’s degree in Human Services. Her primary career ambition is
    to advance to a supervisory role—such as Program Coordinator—for a local mental‑health or senior‑services program. In that capacity, she hopes to design and lead bilingual outreach initiatives that
    serve the East‑Asian immigrant community in Los Angeles County. Vy also aims to secure grant funding to establish a dedicated resource hub for low‑income seniors and to create a peer‑support network
    for working mothers, using her competitive drive and structured planning skills to achieve measurable outcomes.
