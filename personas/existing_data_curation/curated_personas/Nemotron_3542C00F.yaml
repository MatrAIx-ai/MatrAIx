  hobbies: '[''Visiting art galleries'', ''Community theater'', ''Mixed‑media painting'', ''Digital photography'', ''Gardening'', ''Hiking'', ''Reading historical biographies'', ''Knitting'', ''Cooking
    Southern cuisine'', ''Volunteering at senior center'']'
  career_goals: Although retired from formal employment, Robin aims to deepen her impact on the local arts community. She plans to volunteer as an exhibition curator at the Henderson County Library, mentor
    high‑school art students, and launch a community garden that integrates art installations. She also aspires to complete a memoir about her Appalachian upbringing, explore digital illustration, and travel
    to neighboring states to document regional folk art for a personal blog. Ultimately, she wishes to be recognized as a catalyst for intergenerational cultural exchange in Hendersonville.
