personas:
  professional: Robin Kent, a retired event planner and budding art historian, channels decades of budgeting, grant‑writing, and exhibition coordination expertise into volunteer curatorial work at the Henderson
    County Library, where their curiosity‑driven research, balanced organization, and subtly competitive drive secure prestigious regional arts grants and inspire intergenerational mentorship.
  sports: Robin Kent hikes the Pisgah trails weekly as a member of the Hendersonville Hiking Club, volunteers as a timekeeper for the local senior pickleball league, follows the Charlotte Hornets and Carolina
    Panthers with a competitive spirit, and participates in seasonal community yoga classes, balancing a love for low‑impact exercise with a healthy dose of friendly rivalry.
  arts: Robin Kent engages deeply with the visual and performing arts, creating mixed-media paintings that echo the bold colors of Georgia O'Keeffe and the collage techniques of Andy Warhol, curating local
    gallery shows, regularly attending productions at the Hendersonville Community Playhouse—most recently "Our Town"—and finding inspiration in the photography of Ansel Adams while listening to folk legends
    Bob Dylan and Joan Baez during studio time.
  travel: Robin Kent prefers thoughtfully planned road trips that combine artistic discovery with leisurely pacing, having journeyed to Asheville’s River Arts District, Nashville’s Music Row, and the folk
    art festivals of Savannah, while dreaming of a month‑long immersion in Santa Fe’s Native American galleries and a scenic drive along the Blue Ridge Parkway to capture seasonal foliage for their memoir
    blog.
  culinary: Robin Kent cooks Southern comfort food with garden‑fresh flair, mastering fried chicken with a buttermilk brine, collard greens simmered with smoked ham hocks, crumbly honey‑sweetened cornbread,
    and peach cobbler made from home‑grown peaches, while occasionally treating themselves to a late‑night pizza after a long day of painting.
  core: Robin Kent is a 65‑year‑old curious curator who blends organized community activism, competitive grant‑seeking, and artistic creation with a love for gardening, photography, and occasional late‑night
    pizza indulgence.
background:
  cultural: Robin is a 65‑year‑old white American who was born and raised in Hendersonville, North Carolina. Her family traces its roots to early Appalachian settlers of English and German ancestry, and
    she grew up immersed in the region’s folk traditions, music, and crafts. She values Southern hospitality, community involvement, and the blend of tradition with curiosity that her college experience
    fostered. A lifelong member of the United Methodist church, she participates in local charitable events and cherishes the natural beauty of the Blue Ridge Mountains, which continues to inspire her artistic
    pursuits.
attributes:
  skills: '[''Event planning'', ''Art curation'', ''Research and analysis'', ''Digital photography'', ''Graphic design basics'', ''Creative writing'', ''Mentoring'', ''Workshop facilitation'', ''Budget
