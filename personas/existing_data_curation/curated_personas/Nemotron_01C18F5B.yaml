personas:
  professional: Patrick Oneal, an emerging junior robotics enthusiast who blends boundless curiosity with methodical planning, often leads his school’s robotics club projects while balancing friendly collaboration
    with assertive decision‑making.
  sports: Patrick Oneal, a spirited member of the local Falcons youth soccer team and the Midtown Basketball League, channels their energetic and organized nature into daily practice drills, draws inspiration
    from professional clubs like FC Barcelona and the Chicago Bulls, and values teamwork as much as personal skill development.
  arts: Patrick Oneal, a budding storyteller who drafts sci‑fi tales in notebooks, builds intricate LEGO dioramas inspired by architect Frank Lloyd Wright, drums along to the beats of Imagine Dragons and
    classic tracks by The Beatles, and experiments with Scratch to turn their narratives into interactive games.
  travel: Patrick Oneal, an adventurous traveler whose family trips have taken them to the Smithsonian in Washington, D.C., the Grand Canyon’s rim, and a weekend camping at Lake Tahoe, prefers itineraries
    that blend hands‑on science exhibits with outdoor hikes, and often drafts detailed packing lists months ahead despite occasional worry about missing a favorite LEGO set on the road.
  culinary: Patrick Oneal, a culinary enthusiast who favors pizza topped with pepperoni and extra mozzarella, enjoys cracking open a bag of spicy nachos while gaming, can whip up a simple Spaghetti Bolognese
    with ground beef, canned tomatoes, and garlic for family dinners, and occasionally experiments with making homemade marshmallow fluff for s'mores, though they sometimes forget to eat vegetables.
  core: Patrick Oneal, the organized, curious eleven‑year‑old who balances relentless LEGO building and robotics projects with sports and occasional anxiety, often over‑plans every activity while secretly
    hoarding extra video‑game credits for late‑night sessions.
background:
  cultural: Patrick grows up in a suburban, middle‑class family in Roseville, California, where community events, school activities, and outdoor hobbies are common. His household reflects typical white
    American cultural values, emphasizing education, responsibility, and participation in local sports and clubs. The diverse, family‑friendly environment of Placer County provides him with access to public
    parks, library programs, and after‑school clubs that shape his social and extracurricular life.
attributes:
  skills: '[''Organizational planning'', ''Mathematical problem solving'', ''Basic coding (Scratch)'', ''Teamwork and leadership'', ''LEGO construction'', ''Robotics prototyping'', ''Reliable peer support'']'
  hobbies: '[''Soccer'', ''Basketball'', ''Robotics club'', ''LEGO building'', ''Reading adventure/science‑fiction'', ''Creative writing'', ''Scratch coding'', ''Drum lessons'', ''Multiplayer video games'']'
  career_goals: Patrick dreams of a future where he can combine his love for building things and his desire to help others. He hopes to become a robotics engineer or software developer who designs practical
    solutions for everyday problems. He also considers a career in teaching or community outreach, where he can use his organized and dependable nature to mentor younger students. A stable, impactful career
    that lets him stay connected with his friends and family is especially important to him because he often worries about uncertainty.
