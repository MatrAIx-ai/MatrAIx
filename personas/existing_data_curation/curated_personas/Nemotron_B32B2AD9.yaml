  hobbies: '[''Classic car restoration'', ''Fishing on Lake St. Clair'', ''Woodworking'', ''Playing chess'', ''Attending automotive shows'', ''Volunteering as a youth mentor'', ''Cycling'', ''Grilling and
    cooking'', ''Listening to classic rock'', ''Hiking in local nature preserves'']'
  career_goals: Syed aspires to become the service manager of a reputable dealership, where he can lead a team that embraces both proven techniques and innovative solutions. In the next five years he plans
    to earn a bachelor’s degree in automotive engineering to deepen his technical expertise and to obtain advanced ASE certifications in hybrid and electric vehicle systems. His long‑term ambition is to
    open his own independent shop that specializes in electric‑vehicle service and offers streamlined, data‑driven maintenance processes. He also wishes to become a certified ASE instructor, sharing his
    disciplined work ethic and curiosity‑driven approach with the next generation of technicians.
