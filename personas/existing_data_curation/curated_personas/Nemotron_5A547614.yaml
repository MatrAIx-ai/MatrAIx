personas:
  professional: Swain Freeze, a self‑taught digital illustrator and budding graphic designer, leverages their meticulous organization and competitive mindset from multiplayer gaming to meet tight client
    deadlines and craft polished branding assets, while they constantly experiment with 2D and 3D tools to stay ahead of creative trends.
  sports: Swain Freeze spends weekends at the Riverfront Skate Park perfecting tricks on a custom deck, follows the Evansville Purple Aces men’s basketball season religiously, roots for the Indianapolis
    Colts, and they use a weekly bike‑commute to school as a low‑key cardio routine, balancing a competitive edge with a laid‑back skate culture.
  arts: Swain Freeze devotes evenings to sketching characters inspired by Studio Ghibli’s Miyazaki and the street‑wise satire of Banksy, curates a personal playlist featuring Tame Impala and Phoebe Bridgers
    while editing digital illustrations, and they immerse themselves in the monthly Evansville Museum of Arts & Science art walk, where they often discuss the latest exhibition of contemporary surrealism
    with fellow creators.
  travel: Swain Freeze prefers budget‑friendly road trips to nearby music hubs like Nashville and Louisville, dreaming of a future backpacking adventure through Kyoto’s historic temples and Berlin’s vibrant
    art scene, and they meticulously plan each itinerary using free mapping apps while saving travel funds from Twitch revenue.
  culinary: Swain Freeze enjoys crafting spicy ramen bowls with pork belly and soft‑boiled eggs, tossing avocado‑filled tacos topped with sriracha mayo, and experimenting with homemade basil pesto on bruschetta,
    while their intermediate cooking skills are honed during late‑night YouTube tutorials and they frequently unwind at local coffee shops sampling oat‑milk lattes and artisanal pastries.
  core: Swain Freeze, a hyper‑curious teen with a knack for turning sketchbooks into digital portfolios, habitually hoards random art supplies in their room, can’t resist a midnight gaming session even
    when overdue homework looms, and they thrive on the thrill of organizing projects down to the last pixel.
background:
  cultural: Swain grew up in a middle‑class, white family in Evansville, Indiana, a Midwestern city along the Ohio River. His upbringing blends the region’s modest, community‑oriented values with a growing
    appreciation for local arts. Raised in a Protestant (Methodist) household, he participated in church youth groups and attended public schools before leaving formal education after eighth grade. The
    city’s industrial heritage, river‑front recreation, county fairs, and the Evansville Museum of Arts & Science have shaped his worldview, fostering a pragmatic work ethic while nurturing his curiosity
    about broader artistic and digital cultures.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Photo editing (Lightroom)", "Video editing (Premiere Pro)", "Basic web development (HTML, CSS)", "Mechanical troubleshooting (bike and skateboard
    repair)", "Strategic gaming (FPS, MOBA)", "Organizational planning (personal scheduling, project coordination)"]'
  hobbies: '["Sketching and digital illustration", "Playing competitive video games (FPS/MOBA)", "Skateboarding", "Model kit building (cars, aircraft)", "Photography (urban and riverfront)", "Attending
    local art walks and museum events", "Reading sci‑fi/fantasy novels", "Writing short stories"]'
  career_goals: Swain aims to translate his self‑taught portfolio into formal training by enrolling in a community‑college program in graphic design or product design. He envisions a future working in a
    creative studio or as a freelance digital artist, building a client base for illustrations, branding, and video content. Parallel to this, he hopes to grow his Twitch channel and YouTube presence into
    a sustainable platform where he can combine art and competitive gaming, eventually securing sponsorships or a role as an esports analyst or content creator.
