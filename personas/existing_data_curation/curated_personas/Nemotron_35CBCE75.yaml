  career_goals: Although retired from formal employment, Janna aims to stay actively engaged in her community. Her primary objectives are to expand her volunteer work at the local senior centre, mentor
    younger volunteers in organizational tasks, document and preserve the oral histories of longtime Sharon residents, and complete a memoir that captures her family's legacy. She also wishes to maintain
    her physical health through regular walks and gardening, and to master new digital tools so she can stay connected with her grandchildren.
