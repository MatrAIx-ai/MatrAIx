personas:
  professional: Janna Blevins, a retired community organizer who blends meticulous budgeting, event planning, and a practical, structured approach, now channels their expertise into volunteering at the
    local senior centre where they mentor younger volunteers, coordinate oral-history projects, and craft a memoir that weaves family legacy with Sharon's historical tapestry.
  sports: Janna Blevins, an avid walker who logs daily dog strolls through historic downtown Sharon and participates in the Sharon Senior Walking Club, supports the Boston Red Sox in spring, the New England
    Patriots on football Sundays, and enjoys occasional community yoga classes to keep joints flexible.
  arts: Janna Blevins, a quiet lover of the arts, spends afternoons crocheting quilt squares while listening to Frank Sinatra and Ella Fitzgerald, admires Claude Monet's garden paintings that inspire their
    herb plot colors, and attends the local senior theatre's productions of classic plays starring community actors, all of which enrich their solitary yet richly textured creative life.
  travel: Janna Blevins, who prefers well-organized, low-stress travel, has already toured the colonial charm of Williamsburg, VA, the historic harbor of Plymouth, MA, and the medieval streets of York,
    England, and as a modestly budgeted pilgrim hopes to one day explore the tea gardens of Kyoto, Japan, while keeping the itinerary simple and the pace gentle.
  culinary: Janna Blevins, a capable home chef, transforms garden harvests into comforting meals such as rosemary-infused roasted chicken with heirloom potatoes, a bright thyme-laden summer vegetable stew,
    and a weekly apple-cinnamon crumble, and while they normally dine at home, they occasionally indulge in a slice of New York-style cheesecake at Sharon's downtown bakery.
  core: Janna Blevins, a 79-year-old guardian of Sharon's memories, blends disciplined budgeting, herb-laden garden rituals, and a quiet, methodical curiosity that makes them both a steadfast volunteer
    and a slightly forgetful, crossword-obsessed storyteller.
background:
  cultural: Janna grew up in a predominantly white, middle‑class community in western Pennsylvania, descended from German and British ancestors who settled the region in the late 19th century. Raised in
    a Methodist household, she was taught the values of thrift, hard work, community service, and modesty. The cultural rhythm of her upbringing emphasized self‑reliance, respect for tradition, and a strong
    sense of neighborhood solidarity, traits that continue to shape her daily routines and social interactions.
