  career_goals: Besnik aims to earn his Master Plumber license and acquire certifications in green plumbing and sustainable building practices. He envisions leading a small, flexible contracting crew that
    prioritizes eco‑friendly solutions and community service, offering affordable plumbing assistance to low‑income families in Macomb County. Mentoring the next generation of tradespeople is a core ambition,
    as is eventually founding his own family‑run business that balances steady work with the freedom to explore innovative methods. Ongoing professional development through trade school courses and industry
    workshops is part of his long‑term plan.
