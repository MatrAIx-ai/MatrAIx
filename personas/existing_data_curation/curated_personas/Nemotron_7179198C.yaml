    under pressure'', ''Inventory management of spare parts'', ''Basic welding and metal fabrication'']'
  hobbies: '[''Flight simulators'', ''Scale model airplane building'', ''Arduino electronics projects'', ''Cooking Venezuelan cuisine'', ''Listening to gaita and salsa music'', ''Hiking in state parks'',
