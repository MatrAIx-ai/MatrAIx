  career_goals: Joe aims to obtain his Airframe and Powerplant (A&P) certification within the next year and advance to a lead technician role at a major airline maintenance base in Orlando. He hopes to
    eventually manage a small team of mechanics, where he can blend his cooperative nature with assertive decision‑making to improve workflow efficiency. Long‑term, Joe envisions opening his own boutique
    aircraft service shop that caters to private jet owners, allowing him the structured environment he values while also enjoying the flexibility to set his own schedule and serve a niche market.
