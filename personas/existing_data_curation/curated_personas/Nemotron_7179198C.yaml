personas:
  professional: Joe Gonzalez works as a certified aircraft mechanic at a major airline maintenance base in Orlando, where they follow strict FAA checklists, document every task in logbooks with meticulous
    precision, and balance their love of structure with a laid‑back attitude toward shift handovers, earning a reputation for quick fault diagnosis and inventive on‑the‑fly fixes.
  sports: Joe Gonzalez enjoys catching live spring‑training games of the Tampa Bay Rays at Disney’s ESPN Wide World of Sports, roots for the Orlando Magic during NBA season, spends weekend mornings fishing
    at Lake Apopka, and hikes the Ocala National Forest trails whenever a clear sky beckons.
  arts: Joe Gonzalez relaxes to the vibrant rhythms of Celia Cruz, Oscar D’Leon, and the gaita band Gran Coquivacoa while occasionally streaming classic aviation films like Top Gun, and they find inspiration
    for their hobby projects in the energetic melodies of salsa legend Marc Anthony.
  travel: Joe Gonzalez prefers low‑key road trips to nearby state parks such as Wekiwa Springs, enjoys occasional weekend getaways to Miami’s South Beach and the historic streets of New Orleans, and dreams
    of traveling to the aviation museum in Toulouse, France, while budgeting each trip with a DIY spreadsheet.
  culinary: Joe Gonzalez cooks arepas stuffed with shredded beef, black beans, and cheese, and meticulously prepares hallacas layered with pork, olives, and raisins, using corn masa and plantain leaves,
    and they consider themselves an intermediate home chef who often improvises seasoning while occasionally over‑seasoning the dish.
  core: Joe Gonzalez is a detail‑oriented aircraft mechanic who balances relentless precision at work with a laid‑back love for flight‑sim gaming, model planes, and home‑cooked Latin‑style dishes, all while
    navigating a relaxed approach to budgeting and health.
background:
  cultural: Joe grew up in a close‑knit Venezuelan‑American family in Orlando after his parents emigrated during Venezuela’s economic crisis. At home, Spanish is spoken daily and family gatherings revolve
    around traditional foods, music, and celebrations such as Carnaval and Día de la Independencia. He maintains strong ties to his heritage by cooking, celebrating Venezuelan holidays, and staying involved
    in the local Venezuelan community association. The blend of his Latin roots with Floridian multicultural influences shapes his worldview, giving him a warm appreciation for community while also valuing
    the individual discipline he applies in his work.
attributes:
  skills: '[''Aircraft maintenance and inspection'', ''FAA regulatory compliance'', ''Hydraulic and pneumatic troubleshooting'', ''Electrical systems diagnostics'', ''Composite material repair'', ''Precision
