  hobbies: '[''Watercolor painting landscapes'', ''Vegetable gardening (heirloom tomatoes, peppers)'', ''Birdwatching'', ''Reading speculative fiction, poetry, philosophy'', ''Crossword puzzles and Sudoku'',
