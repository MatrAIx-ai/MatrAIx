  career_goals: Although Jibin is currently out of the formal workforce, he seeks to channel his expertise into low‑key, self‑driven ventures. He aims to establish a neighborhood consulting service that
    offers personal finance coaching and home‑energy retrofit advice, positioning himself as the go‑to resource for peers who value practical, data‑driven solutions. Parallel to this, he plans to earn a
    certification in sustainable home improvements and acquire intermediate Python skills for personal data analysis, satisfying his competitive drive to master new domains. Jibin also hopes to mentor younger
    members of his cultural community through occasional workshops on budgeting and basic computer skills, blending his desire for personal achievement with selective community contribution. Ultimately,
    his ambition is to maintain self‑sufficiency, stay intellectually engaged, and be recognized for his reliability and expertise within his small social circle.
