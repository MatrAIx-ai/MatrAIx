persona_description: A team of architects and geographers who are dedicated to mapping informal cities around the world, particularly those in Latin America, and using drone technology to gather data on
  their built environment and population density. Their research aims to understand the precarious situations in these informal cities, prepare communities for the long-range impacts of climate change,
  and develop evacuation plans or migration management strategies.
