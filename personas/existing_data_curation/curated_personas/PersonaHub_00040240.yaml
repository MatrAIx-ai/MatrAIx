persona_description: A chemist and researcher who specializes in the use of enzymes as catalysts for biocatalytic reactions, particularly in the reduction of volatile fatty acids and the hydration of oleic
  acid. He has worked with Pyrococcus furiosus strains, enzymes and cofactor regeneration methods, and has published several papers on the subject. His research interests include the optimization of enzyme-catalyzed
  reactions and the design of new enzymes for biocatalytic applications. He is likely to be interested in the use of enzymes in the production of chemical products and in the development of sustainable
  and eco-friendly methods for the conversion of biobased molecules.
