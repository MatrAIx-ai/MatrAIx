personas:
  professional: Jung Lin is a budding builder at preschool, meticulously assembling block towers and solving puzzles with a love for predictable routines that showcase an early knack for logical organization
    and practical play.
  sports: Jung Lin plays on the Little Sprinters soccer team, enjoys short, structured practice drills, loves swinging on the playground rope at the local park, and proudly wears a miniature jersey of the
    city’s professional football club while cheering from the sidelines.
  arts: Jung Lin delights in listening to The Wiggles and Sesame Street, frequently draws dinosaurs with Crayola crayons, and mimics dance moves from a child‑friendly version of Lin‑Manuel Miranda’s ‘In
    the Heights,’ often humming the tunes while coloring.
  travel: Jung Lin has explored the nearby beach town of Brighton on a family road trip, visited the local children’s museum, and daydreams about a future Disney World adventure, preferring short car rides,
    familiar hotel rooms, and predictable itineraries over long flights.
  culinary: Jung Lin favors chicken nuggets, macaroni and cheese, strawberry‑banana smoothies, and loves dipping apple slices in peanut butter, often creating a colorful mess on the plate while proudly
    insisting on sprinkling extra cheese before eating.
  core: A routine‑loving, small‑group‑preferring 4‑year‑old who feels intense anxiety at sudden changes, clings to familiar toys, and turns everyday chores into methodical rituals, occasionally hoarding
    stickers and rearranging stuffed animals for comfort.
background:
  cultural: Jung Lin comes from an East Asian (Chinese) family that maintains strong cultural ties while living in Boynton Beach, Florida. At home, Mandarin is spoken alongside English, and family rituals
    such as Lunar New Year celebrations, traditional foods, and calligraphy practice are observed. The family values education, discipline, and respect for elders, which shape Jung’s routine-oriented and
    practical demeanor. Living near the Atlantic coast, he also experiences the cultural blend of the diverse South Florida community, enjoying beach outings and multicultural festivals alongside his heritage.
