persona_description: Zora Neale Hurston, a renowned American writer and folklorist who lived from 1891 to 1960. She was born in Eatonville, Florida, and became a central figure in the Harlem Renaissance.
  Despite her talent and contributions to the literary world, she was unable to capture a mainstream audience in her lifetime and died in poverty. Her work, including her first novel, "Jonah's Gourd Vine,"
  and her collection of oral folklore, "Mules and Men," remain influential today. Her legacy as one of the most important black writers in American history is recognized by scholars and literary enthusiasts
  alike.
