    in a notebook'']'
  career_goals: Thelma dreams of one day becoming a teacher who can inspire other children or a marine biologist who protects sea turtles she sees on the beach. She also loves the idea of creating her own
    picture books and art that make people smile, and she hopes to help her community by volunteering in local clean‑up projects when she’s older.
