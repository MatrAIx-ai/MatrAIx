personas:
  professional: Thelma Hill, a budding junior marine explorer, blends her curiosity for ocean life with meticulous planning, turning beach shell hunts into organized field studies that she records in colorful
    notebooks, foreshadowing a future career in marine biology.
  sports: Thelma Hill, a member of the Gulf Coast Junior Swim Club, spends afternoons splashing in the pool and hours building sandcastles at Clearwater Beach, while cheering for the Miami Dolphins and
    practicing basic soccer drills with the Bay City Cubs youth team during the fall.
  arts: Thelma Hill, an eager little artist, sketches sea turtles in the style of Mary Blair, sings nursery rhymes like “The Wheels on the Bus” on a soprano recorder, and immerses in the playful tunes of
    The Wiggles and Raffi while arranging her LEGO creations into whimsical underwater scenes.
  travel: Thelma Hill, an adventurous beach‑lover, has already explored the sandy shores of Clearwater and dreams of snorkeling at the Belize Barrier Reef, preferring family‑planned vacations that balance
    structured beachcombing schedules with spontaneous sandcastle competitions.
  culinary: Thelma Hill, a budding kitchen helper, loves munching on crunchy carrot sticks and fish‑shaped goldfish crackers, delights in blending fresh strawberries with banana for smoothies, and enjoys
    assisting in making homemade tacos where they carefully sprinkle sea salt and grated cheese, though they sometimes forget to clean up the sticky mess afterward.
  core: Thelma Hill is a meticulously organized six‑year‑old shell collector who transforms every beach stroll into a colorful marine diary, hoarding tiny treasures while humming recorder tunes and secretly
    stashing extra candy under the garden shed.
background:
  cultural: Thelma is a white child raised in Punta Gorda, Florida, where Southern coastal culture blends with a relaxed beach lifestyle. Her family celebrates typical American holidays like Thanksgiving
    and Christmas, attends a local community church, and enjoys outdoor traditions such as weekend beach trips, fishing, and community festivals. Growing up near the Gulf, she has been exposed to the region’s
    marine ecology, which fuels her curiosity about sea life and environmental stewardship.
