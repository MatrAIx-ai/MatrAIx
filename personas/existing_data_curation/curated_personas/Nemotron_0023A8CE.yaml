    painting"]'
  hobbies: '["Visiting local art galleries and museums", "Watercolor sketching and painting", "Refinishing vintage furniture", "Playing chess at the community center", "Experimenting with Arduino and simple
    robotics", "Listening to jazz, soul, and R&B music", "Jogging and nature walks in York County", "Attending community theater productions", "Volunteering for youth mentorship programs", "Participating
    in African‑American heritage festivals"]'
  career_goals: Clarence aims to formalize his expertise by earning industry certifications such as EPA 608, HVAC specialist, and Journeyman Electrician licenses. His medium‑term goal is to move into a
    supervisory role, overseeing a team of maintenance technicians for a mid‑size manufacturing or office campus in the York County area. He also envisions launching a boutique maintenance and aesthetic
    renovation business that blends reliable building repairs with artistic upgrades like custom finishes and decorative wall treatments. To support these ambitions, he plans to enroll in evening courses
    in facilities management and leadership, develop mentorship skills to coach apprentices, and improve his stress‑management techniques so he can handle greater responsibility without compromising his
    well‑being.
