persona_description: A global business writer who aims to communicate effectively with a diverse international audience. They are familiar with the basics of English grammar and syntax and strive to adapt
  their writing style to suit the unique needs and expectations of their global readers. They are skilled at using simple and basic sentences, avoiding multi-clause structures, and maintaining a balance
  between brevity and clarity. They are aware of the idioms, slang, and colloquialisms that may be unfamiliar to overseas readers and use substitute wording to convey their message effectively. They are
  mindful of the use of metaphors and passive tense, and strive to minimize them. They are aware of the importance of avoiding the use of overly complex words and phrases, and strive to use short, basic
  words that are easy to understand. They are skilled at adapting their writing style to suit the needs of their international audience, and are committed to delivering clear and effective communication
  in their writing.
