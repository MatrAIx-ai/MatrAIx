  hobbies: '[''Home Cooking'', ''Barbecue Experimentation'', ''Georgia Bulldogs Football'', ''Church Choir and Outreach'', ''Fishing'', ''Gardening'', ''Reading African-American History'', ''Chess'']'
  career_goals: Malcolm aims to move from staff server to shift supervisor within the next year, leveraging his reliability and competitive drive to earn a managerial position. He plans to enroll in a community
    college culinary program to broaden his expertise and eventually open a modest soul‑food‑plus‑fusion eatery that blends classic Southern dishes with new flavors he discovers through his curiosity. Securing
    a stable income for his family and mentoring younger workers are central to his long‑term ambition, as is establishing a reputation for consistent, high‑quality service in the Douglas County restaurant
    scene.
