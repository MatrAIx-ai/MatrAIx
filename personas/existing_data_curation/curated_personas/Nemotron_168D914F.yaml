personas:
  professional: Sally Hatley, a seasoned registered nurse with fifteen years of medical-surgical and community health experience, leverages her meticulous patient assessment and evidence-based curiosity
    to lead interdisciplinary teams, champion quality-improvement projects, and mentor staff while pushing toward a charge nurse role and future nurse executive certification.
  sports: Sally Hatley, a dedicated member of the Wabash County Women's Volleyball Club and a regular participant in the local recreation center's volleyball league, also follows the Indiana Pacers and
    Indianapolis Colts, and enjoys seasonal hikes on the Wabash County trail system to stay fit.
  arts: Sally Hatley, an avid reader and book-club facilitator, draws inspiration from authors like Brené Brown and Maya Angelou, enjoys concerts by folk singer Brandi Carlile and country artist Kacey Musgraves,
    and occasionally watches Broadway revivals of "Hamilton" and "The Lion King" with friends.
  travel: Sally Hatley prefers weekend getaways to nearby natural spots such as the Hocking Hills and the Indiana Dunes, but dreams of a summer road-trip through the Pacific Northwest, balancing her travel
    plans around her volunteer schedule and family obligations.
  culinary: Sally Hatley delights in crafting wholesome meals like quinoa-black bean bowls with roasted sweet potatoes, lemon-garlic salmon, and homemade veggie-laden soups, often sourcing fresh produce
    from the farmer's market and experimenting with ingredients like kale, chickpeas, and turmeric after listening to culinary podcasts.
  core: Sally Hatley blends a nurse's precision with a community-spirit, juggling potluck dinners, line-dancing shoes, and a budget spreadsheet while constantly chasing evidence-based improvements and the
    next scenic trail.
background:
  cultural: Sally grew up in a middle‑class white family in the Midwest, steeped in the values of hard work, community responsibility, and modesty typical of Indiana’s small‑town culture. Her upbringing
    combined a practical, down‑to‑earth outlook with a strong sense of civic duty, reinforced by regular involvement in church and local volunteer activities. The Midwestern emphasis on direct communication
    and reliable service shaped her professional ethos as a nurse. Though she is now divorced, the regional cultural norm of self‑reliance and resilience helped her navigate personal challenges while maintaining
    close ties to friends, family, and the broader community. Her cultural identity blends traditional Midwestern pragmatism with an openness to new ideas, reflecting the balance of curiosity and practicality
    that defines her personality.
