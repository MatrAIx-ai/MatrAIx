  hobbies: '[''Volleyball'', ''Hiking'', ''Cooking and recipe experimentation'', ''Hosting potluck gatherings'', ''Church outreach and health‑screening events'', ''Book club'', ''Line dancing'', ''Gardening'',
    ''Volunteer health fair staffing'']'
  career_goals: Sally aims to transition into a leadership role within her hospital, such as charge nurse or clinical nurse manager, where she can blend her practical experience with her curiosity for system‑wide
    improvements. She plans to obtain a Bachelor of Science in Nursing (BSN) and eventually pursue a certification in Nurse Executive Leadership. Her long‑term ambition is to spearhead community health
    initiatives in Wabash County, focusing on chronic‑disease prevention and health literacy, and to mentor younger nurses entering the profession. She also hopes to contribute to research on rural health
    outcomes, publishing findings that could influence state health policy.
