persona_description: A historian interested in the history of Native American tribes, particularly the Cowlitz and Klickitats tribes, and their interactions with the natural environment, particularly Mount
  St. Helens. This persona is interested in the tragic triangle formed by the three volcanoes and the legends of the Cowlitz Indian tribe. They are likely to be familiar with the history of the Lewis and
  Clark expedition and the events that led to the creation of the "Bridge of the Gods" in the Columbia River. This persona is also interested in the cultural and linguistic aspects of the Cowlitz tribe,
  including their traditional practices and crafts.
