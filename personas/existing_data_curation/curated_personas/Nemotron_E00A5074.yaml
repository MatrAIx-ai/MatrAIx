    volunteering'']'
  career_goals: Jordan aims to obtain his GED within the next year and enroll in a community college program focused on visual communication or interactive media. He aspires to become a UI/UX designer or
    freelance multimedia artist, merging his love for art with his methodical approach to project planning. In the longer term, he hopes to launch his own indie game or graphic novel and build a sustainable
    freelance business. He also wants to deepen his understanding of mental health, planning to volunteer with youth counseling initiatives and possibly pursue a certification in peer support to help peers
    navigate anxiety and emotional distress.
