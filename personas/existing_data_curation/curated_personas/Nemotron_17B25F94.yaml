personas:
  professional: James Hunt, a seasoned elementary and middle school teacher, leverages a data‑driven mindset and a knack for tech integration—using Google Classroom, SMART Boards, and Arduino‑inspired lessons—to
    craft differentiated curricula that balance structured lesson plans with spontaneous, hands‑on activities when classroom dynamics demand flexibility.
  sports: James Hunt enjoys weekend hikes in the Sierra foothills, plays pickup basketball with the Central Valley Hoops League while rooting for the Fresno State Bulldogs, and coaches a youth basketball
    clinic where they emphasize teamwork over individual glory, balancing a love for outdoor endurance with competitive court play.
  arts: James Hunt channels a love for visual storytelling through landscape photography inspired by Ansel Adams, curates playlists featuring The Beatles, Kendrick Lamar, and indie folk duo The Lumineers
    while editing photos on Lightroom, and attends local art walks at the Fresno Art Museum to stay connected to community creativity.
  travel: James Hunt plans trips with a blend of structure and spontaneity, favoring organized weekend getaways to Yosemite and Sedona while budgeting for a dream adventure to New Zealand’s South Island
    to hike the Milford Track and capture sunrise over the fjords, and they keep a travel journal to track both itineraries and impromptu detours.
  culinary: James Hunt prefers farm‑to‑table meals, often preparing grilled chicken with rosemary, quinoa salad with avocado and cherry tomatoes, and on weekends indulges in carne asada tacos topped with
    fresh cilantro, lime, and sliced jalapeños, while occasionally experimenting with a DIY sourdough starter that sometimes yields a dense loaf.
  core: James Hunt blends a pragmatic, data‑driven teaching style with spontaneous, hands‑on creativity, competes fiercely in budgeting and fitness while juggling a love for photography, basketball, and
    strategic gaming, all underscored by a steady, stress‑resilient temperament.
background:
  cultural: James was raised in a middle‑class white family in central California, immersed in the practical, self‑reliant values of Anglo‑American culture. Growing up near Fresno’s agricultural landscape
    instilled a strong work ethic and an appreciation for pragmatic problem‑solving. While his upbringing is largely English‑speaking, he is keenly aware of the diverse Hispanic community that characterizes
    Fresno County, and this multicultural exposure informs his inclusive teaching approach and respect for varied cultural perspectives.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Formative assessment'', ''Educational technology integration'', ''Data‑driven instruction'', ''Literacy
    instruction'', ''Math instruction'', ''Special education accommodations'', ''Parent communication'', ''Professional development facilitation'']'
  hobbies: '[''Hiking'', ''Recreational basketball'', ''Landscape photography'', ''Podcast listening'', ''Reading non-fiction'', ''DIY electronics'', ''Strategy video gaming'', ''Community tutoring'']'
  career_goals: James aims to move into a leadership role within his district, first as a lead teacher or curriculum specialist, and eventually as an assistant principal. He plans to earn a master's degree
    in Educational Leadership to deepen his expertise in school administration. Driven by his competitive nature, he seeks to design and implement district‑wide instructional frameworks that raise student
    achievement in literacy and STEM, earning recognition through awards and published articles in educational journals. Long‑term, he envisions consulting for schools on data‑driven practices and presenting
    at national education conferences.
