  career_goals: She aims to transition into a senior mentorship role, guiding emerging mathematicians and data scientists while continuing part‑time consultancy on community‑focused research. Kalpanaben
    hopes to co‑author a practical guide on applying statistical methods to public health data, secure a regular adjunct teaching position at a local college, and develop a small grant program that supports
    data‑driven projects for South Asian immigrant families in the Pacific Northwest. Balancing structure with flexibility, she seeks a sustainable workload that allows her to maintain her health and reduce
    stress.
