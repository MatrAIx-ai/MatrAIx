  hobbies: '[''Organic Gardening'', ''Reading Classic Indian Literature'', ''Cooking Gujarati Cuisine'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Walking in Puyallup Countryside'', ''Knitting'', ''Attending
