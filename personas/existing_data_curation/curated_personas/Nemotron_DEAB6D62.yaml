personas:
  professional: Kalpanaben Ghatti is a senior statistical mentor and part‑time community data consultant who leverages their expertise in advanced modeling, Python, R, and Tableau to design curriculum and
    lead workshops for under‑represented youth, balancing their love for structured problem‑solving with a flexible, low‑stress schedule.
  sports: Kalpanaben Ghatti enjoys leisurely walks along the Puyallup River Trail and participates in a senior cycling club that meets monthly, while cheering on the Seattle Mariners in baseball and the
    Seattle Sounders FC in soccer, preferring low‑impact activities that fit their structured yet flexible routine.
  arts: Kalpanaben Ghatti immerses themselves in classic Indian literature, regularly rereading Tagore’s poems and Gandhi’s essays, while also attending Washington State Symphony Orchestra concerts and
    savoring the soulful crooning of Pandit Jasraj, using these artistic interludes as quiet nourishment for their analytical mind.
  travel: Kalpanaben Ghatti plans their travel meticulously, favoring short, culturally rich getaways such as a weekend retreat to the San Juan Islands, an autumn tour of historic New England towns, and
    occasional pilgrimages to sacred sites in northern India, where they reconnect with family and temple festivities.
  culinary: Kalpanaben Ghatti delights in preparing traditional Gujarati fare—fluffy dhokla, tangy khandvi, and crisp thepla—using fresh cilantro, fenugreek leaves, and homemade yogurt from their garden’s
    goats, yet they occasionally over‑ferment their batter, producing a sour surprise for dinner guests.
  core: Kalpanaben Ghatti blends meticulous statistical rigor with a garden‑grown patience, juggling budget spreadsheets, blood‑pressure checks, and a love for quiet walks, all while worrying about the
    next deadline and sometimes forgetting to water their basil.
background:
  cultural: Kalpanaben was born into a Gujarati family that immigrated to the United States in the 1970s. Her upbringing blended traditional Hindu values—such as regular observance of festivals like Diwali
    and Navratri, respect for elders, and a strong emphasis on education—with the openness and community spirit of the Pacific Northwest. She maintains close ties to the local Indian diaspora, participating
    in temple events, cultural workshops, and volunteer tutoring programs. While she has adopted many aspects of American life, she continues to speak Gujarati at home, prepares regional cuisine, and passes
    on cultural stories to younger generations, creating a hybrid identity that honors both her South Asian roots and her Washington state residence.
