persona_description: A fitness trainer who specializes in the use of stability balls and other unstable surfaces for strength and sports performance training. They have a deep understanding of the principles
  of force production and neuromuscular coordination, and are skilled in designing effective training programs that utilize these principles. They are also aware of the limitations of using stability balls
  for balance training and are cautious about overusing this tool inappropriately. They are knowledgeable about the research on resistance training using unstable surfaces and are able to critically evaluate
  the effectiveness of different training methods.
