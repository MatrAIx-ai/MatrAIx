personas:
  professional: Rebecca Harris is a teaching assistant who leverages her knack for organizing digital tools and her love for visual arts to design inclusive, art‑integrated lessons, while assertively advocating
    for students’ needs in a small New England elementary school.
  sports: Rebecca Harris enjoys weekend hikes on the Wachusett Mountain trails, practices Vinyasa yoga at a local studio, follows the Worcester Red Sox and the New England Patriots, and volunteers as a
    trail‑maintenance crew with the local conservation group.
  arts: Rebecca Harris spends evenings painting delicate watercolors of autumn foliage, sketches New England coastlines, curates a personal collection of poetry by Ocean Vuong and photographs by Ansel Adams,
    and frequents intimate literary readings at the Café Nero where she sometimes shares her own spoken‑word pieces.
  travel: Rebecca Harris prefers low‑key, scenic trips, having road‑tripped through the White Mountains and taken the Amtrak to Boston for museum days, she dreams of a quiet weekend in the Hudson Valley’s
    orchards and a summer escape to the coastal villages of Cornwall, planning each journey with a detailed itinerary but leaving room for spontaneous photo stops.
  culinary: Rebecca Harris bakes rustic sourdough and rosemary focaccia, experiments with seasonal dishes like pumpkin‑spiced risotto and maple‑glazed carrots, favors locally sourced honey and heirloom
    tomatoes, and enjoys cooking while listening to ambient folk playlists, though she sometimes burns the edges of her bread when lost in a new watercolor project.
  core: Rebecca Harris is a quietly ambitious educator who channels her anxiety into mindful artistry, balances meticulous budgeting with occasional splurges on art supplies, and finds solace in hikes,
    yoga, and the comforting scent of fresh‑baked bread.
background:
  cultural: Rebecca grew up in a small, predominantly white town in central Massachusetts, where community involvement and respect for education were central values. Her family, of European descent, emphasized
    self‑reliance, modesty, and participation in town events such as seasonal fairs, volunteer clean‑ups, and library programs. Exposed early to New England's literary and artistic heritage—through school
    trips to regional museums and the works of local authors—she developed an appreciation for the region's history and natural rhythms. While she identifies as secular, she maintains a deep respect for
    the cultural traditions of her New England upbringing, which continue to shape her outlook on education, art, and community service.
