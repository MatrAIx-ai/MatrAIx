  career_goals: Rebecca aims to obtain her state teaching certification within the next year and transition from a teaching assistant to a certified elementary school teacher, with a focus on integrating
    arts and interdisciplinary learning. She plans to pursue a master's degree in education, concentrating on inclusive curriculum design or school counseling, to better support students' emotional well‑being.
    In the medium term, Rebecca hopes to launch an after‑school art club that provides a safe creative outlet for students experiencing anxiety or social isolation. She also aspires to develop a portfolio
    of resource kits that blend visual arts with literacy and science, and to present her work at regional education conferences.
