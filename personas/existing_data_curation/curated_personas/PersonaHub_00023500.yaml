persona_description: A scientist who conducts research on the regulation of cholesterol levels in the human body, specifically the role of ghrelin and melanocortin in controlling blood cholesterol. The
  scientist has expertise in animal studies and has conducted experiments on mice and rats to test their hypothesis that cholesterol levels are regulated by the central nervous system. The scientist's findings
  suggest that cholesterol is under remote but direct control by specific neuroendocrine circuits in the central nervous system, which could lead to new drug development for cholesterol disorders.
