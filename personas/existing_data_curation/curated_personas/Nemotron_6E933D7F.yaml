  career_goals: Wanda aims to re‑enter the workforce in a role that leverages her analytical and planning strengths while respecting her preference for structure and limited social exposure. She is targeting
    part‑time or remote data‑analysis, project‑coordination, or quality‑assurance positions that offer clear objectives, defined workflows, and predictable schedules. To enhance her qualifications, she
    plans to obtain a Project Management Professional (PMP) certification within the next year. Additionally, Wanda wishes to give back to her community by mentoring Mexican‑American high‑school girls interested
    in STEM, helping them develop study habits and gain exposure to technical careers. Financial independence and a stable, structured routine are central to her long‑term ambitions.
