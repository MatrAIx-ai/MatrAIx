personas:
  professional: Wanda Jarrett, a seasoned industrial engineer turned data analyst, leverages her expertise in statistical analysis, Python, Power BI, process mapping, and quality‑assurance checklists to
    deliver precise, actionable insights for remote, part‑time projects, while her bilingual fluency and methodical, organized approach ensure clear communication and reliable documentation for diverse
    stakeholders.
  sports: Wanda Jarrett, an avid weekend walker and light hiker who logs her mileage on the Kern River trails, follows the Los Angeles Dodgers and Lakers for seasonal excitement, participates in the Bakersfield
    Trail Runners club, and adheres to a structured fitness routine that includes twice‑weekly yoga and bi‑monthly tennis matches to balance mobility and cardiovascular health.
  arts: Wanda Jarrett, a devoted reader of mystery authors like Agatha Christie and Gillian Flynn who balances each novel with crossword puzzles and Sudoku, cultivates a keen eye for landscape photography
    inspired by Ansel Adams, and relaxes to the mellow sounds of Norah Jones while appreciating the timeless performances of Meryl Streep, integrating these artistic pursuits into her reflective evenings.
  travel: Wanda Jarrett, a methodical traveler who meticulously plans trips using detailed itineraries, has explored the granite cliffs of Yosemite and the historic streets of Granada, Spain, while dreaming
    of a future pilgrimage to the temples of Kyoto, Japan, and a leisurely coastal tour of Italy’s Amalfi Coast, balancing cultural immersion with comfort and budget considerations.
  culinary: Wanda Jarrett, a culinary enthusiast who cultivates fresh tomatoes, corn, and chilies in her backyard garden and transforms them into authentic tamales, hearty pozole, and richly spiced mole—carefully
    tweaking family recipes while preserving their signature flavor profiles—possesses a solid intermediate skill set, and delights in hosting intimate dinner gatherings where each dish is paired with a
    thoughtfully selected salsa and a glass of chilled margarita.
  core: Wanda Jarrett, a 49‑year‑old industrial‑engineer‑turned‑data analyst, blends methodical precision with a love for gardening, cooking, and quiet creativity, navigating life with structured routines,
    a touch of culinary adventure, and a calm, resilient spirit.
background:
  cultural: Wanda is a first‑generation Mexican‑American who grew up in a bilingual household in Bakersfield, California. Her family celebrates both Catholic traditions and Mexican cultural holidays such
    as Día de los Muertos, Cinco de Mayo, and the quinceañera of younger relatives. Spanish is spoken at home, and she regularly participates in community events at the local Hispanic cultural center, where
    she helps organize food drives and educational workshops. Her Mexican heritage informs her culinary interests, family values, and strong sense of community responsibility. Growing up in Kern County’s
    agricultural setting also fostered an appreciation for the land, which is reflected in her gardening hobby. These cultural influences combine with her practical, organized personality to shape a grounded,
    resilient outlook on life.
attributes:
