  career_goals: Even at four, Guillermo imagines a future where he can express his love for art and discovery. He often talks about wanting to become a painter who brings stories to life on canvas, an explorer
    who travels to far‑away places, a teacher who shares knowledge with others, or even an astronaut who flies among the stars. His ambitions are fueled by his curiosity, his enjoyment of group activities,
    and his desire to create and share beautiful experiences with friends and family.
