persona_description: An archaeologist who specializes in the use of satellite remote-sensing (SRS) technology to study and predict archaeological phenomena. The researcher is particularly interested in
  developing predictive models based on the SRS of prehistoric and historic archaeological remains. They are conducting research on the Upper Basin of northern Arizona to develop a new approach to predictive
  modeling using the GPS-determined locations of masonry structures, brush structures, fire-cracked-rock piles, lithic scatters, and sherd-and-lithic scatters. The research is focused on refining direct
  predictive models to become increasingly useful in historic preservation and heritage management, especially with respect to identifying archaeologically sensitive areas that require special management
  actions.
