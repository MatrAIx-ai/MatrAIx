  career_goals: Jordyn aims to transition from daily driving to a mentorship and training role within the local transportation agency, where she can design onboarding workshops that blend safety protocols
    with creative community‑engagement ideas, such as art‑themed shuttle trips for seniors. She also hopes to advocate for the adoption of electric buses and flexible scheduling technologies in her region,
    leveraging her curiosity to stay ahead of industry trends. Ultimately, she wants to leave a legacy of a more personable, innovative, and environmentally conscious transit system in Bingham County before
    moving into part‑time consulting.
