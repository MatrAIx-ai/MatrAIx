personas:
  professional: Jordyn Daiagi, a seasoned transportation logistics specialist with three decades behind the wheel, leverages their curiosity and spontaneous problem‑solving to mentor new drivers while championing
    electric bus adoption, even if their competitive streak sometimes clashes with rigid training schedules.
  sports: Jordyn Daiagi enjoys spontaneous hikes in Caribou‑Targhee National Forest, participates in the senior center’s weekly line‑dance fitness class, roots for the Boise State Broncos football team
    and the Idaho Falls Chukars baseball club, and occasionally joins a casual senior softball league, balancing competitive spirit with a love for the outdoors.
  arts: Jordyn Daiagi immerses themselves in the Powerhouse Gallery’s rotating exhibitions—often citing Georgia O’Keeffe’s desert palettes for inspiration—while volunteering as a driver for senior‑citizen
    art outings, singing in the community choir performing Enya’s ‘Orinoco Flow’ and Andrea Bocelli’s ‘Con Te Partirò,’ and crafting pottery pieces alongside local artist Maya Sanchez, a habit that fuels
    their creative curiosity.
  travel: Jordyn Daiagi prefers low‑key road trips that combine art and nature—such as a weekend drive to Portland’s Pearl District to see the Oregon Art Museum followed by a sunrise hike in Glacier National
    Park, and a yearly pilgrimage to Yellowstone’s geysers—while budgeting carefully to keep travel affordable for their senior‑center volunteer squad.
  culinary: Jordyn Daiagi enjoys cooking hearty Idaho dishes—pan‑seared trout with lemon‑dill sauce, smashed fingerling potatoes tossed in rosemary, and huckleberry pancakes drizzled with maple syrup—while
    their novice knitting hobby occasionally leads them to experiment with dough‑scented yarn as a quirky garnish for a homemade granola bar.
  core: Jordyn Daiagi blends a lifelong love of transportation logistics with a spontaneous, art‑driven soul, using nightly journaling to calm the worry of a competitive mind that never stops chasing new
    horizons.
background:
  cultural: Jordyn grew up in a small Midwestern town before moving to Pocatello in her twenties after marrying a local farmer. Her upbringing emphasized self‑reliance, community involvement, and a respect
    for practical skills, which she carries into her transportation career. Over the years, she has embraced Idaho's regional traditions, from county fairs to the Blend of Native American and pioneer heritage
    evident in local festivals. As a white woman who is widowed, she finds comfort in the tight‑knit social fabric of Bingham County, often bridging generational gaps by inviting seniors to cultural events
    and sharing her love of art with neighbors.
