    ''Project Management'', ''Change Management'']'
  hobbies: '[''Visiting art galleries & mural tours'', ''Collecting Mexican folk art'', ''Cooking & experimenting with Mexican fusion cuisine'', ''Salsa dancing'', ''Group fitness classes (e.g., Zumba,
    bootcamp)'', ''Weekend soccer matches'', ''Mentoring adult literacy programs'', ''Reading contemporary fiction & innovation non-fiction'', ''Traveling to explore cultural festivals'', ''Blogging about
    art, food, and travel'']'
  career_goals: Maria aims to advance into senior executive leadership, such as Director of Operations or Vice President of Operations, where she can shape regional strategy and champion workforce development.
    She aspires to integrate innovative educational practices into corporate training, launch a mentorship program for women in management, and spearhead sustainability initiatives that reduce operational
    waste. Over the next five years, she envisions leading a multi-site operation in the Rio Grande Valley while partnering with local schools and cultural institutions to create community-based learning
    programs that blend art, technology, and entrepreneurship.
