  career_goals: Philip aims to achieve master craftsman recognition within his community and eventually open a small custom woodworking studio that blends functional carpentry with artistic expression.
    He plans to obtain a Certified Journeyman Carpenter credential, develop a portfolio of bespoke furniture pieces, and publish a guide on traditional joinery techniques. Mentoring the next generation
    of tradespeople and contributing to local historic restoration projects are also central to his long‑term aspirations, while maintaining a sustainable work‑life balance with his family.
