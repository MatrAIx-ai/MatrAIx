  hobbies: '[''cheerleading'', ''soccer'', ''baking'', ''online strategy gaming'', ''DJing for friends'', ''journaling'', ''yoga'', ''volunteering at community events'', ''attending local concerts'']'
  career_goals: Melissa aims to obtain her GED within the next year and enroll in a community college program focused on hospitality management or event planning. She aspires to earn an athletic scholarship
    to play varsity soccer, blending her competitive drive with academic progress. Long‑term, she envisions working as a professional event coordinator for regional conferences or sports organizations,
    eventually launching her own boutique event‑planning business that offers structured, low‑stress experiences for clients. She also seeks to develop coping strategies for her anxiety, hoping for a stable,
    predictable career environment.
