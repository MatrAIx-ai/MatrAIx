persona_description: A scientist who studies the effects of natural aromatic oils on human skin and the potential for them to cause allergic reactions, focusing on the formation of skin sensitizers through
  reactions with acid and skin enzymes. Her research is based on chemical analysis, structure elucidation, and experimental sensitization studies, and she is known for her contribution to the field of contact
  allergy and eczema. Her thesis, titled "Formation of Skin Sensitizers from Fragrance Terpenes via Oxidative Activation Routes. Chemical analysis, Structure Elucidation and Experimental Sensitization Studies,"
  was defended on January 30th, 2023.
