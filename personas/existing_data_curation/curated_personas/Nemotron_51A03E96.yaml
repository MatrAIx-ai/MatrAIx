    clinical literature'']'
  hobbies: '[''Hiking the Sonoran Desert'', ''Astrophotography'', ''Classical guitar'', ''Cooking Mexican and fusion cuisine'', ''Reading historical non‑fiction and medical journals'', ''Woodworking'',
