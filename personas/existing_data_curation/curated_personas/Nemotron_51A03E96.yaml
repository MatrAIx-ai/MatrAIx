  career_goals: Hopes to establish a boutique telehealth practice serving Spanish‑speaking patients across Arizona, integrating culturally sensitive protocols for chronic disease management. Seeks to become
    a regional medical director or chief medical officer, influencing policy on health equity for Mexican‑American populations. Long‑term, aims to author peer‑reviewed articles on remote diagnostic strategies
    and to mentor younger physicians from underrepresented backgrounds, leveraging his unconventional educational journey as a model of resilience.
