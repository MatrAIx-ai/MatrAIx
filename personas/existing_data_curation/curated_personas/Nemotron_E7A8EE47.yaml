  career_goals: Christine aims to transition into a supervisory role such as office manager or community liaison within the next three years, leveraging her front‑desk expertise to mentor new staff and
    streamline office workflows. She plans to obtain a Certified Office Manager credential and to develop leadership skills through local workshops. Long‑term, she envisions a position with a local nonprofit
    or cultural institution where she can blend her organizational strengths with her passion for community outreach, while maintaining a predictable schedule that supports her well‑being and reduces stress.
