persona_description: A scientist who specializes in the study of biotic resistance and the impact of abiotic variables on the likelihood of biological invasions on Southern Ocean islands. They have conducted
  research on the distribution and abundance of indigenous and introduced springtails across 13 habitats, which differ considerably in the properties of their soils, and soil temperature, on the eastern
  quarter of sub-Antarctic Marion Island. Their research interests include the theory of group automorphisms, particularly the concepts and theorems related to subgroups and isomorphisms. They are particularly
  interested in predicting the outcome of climate change on community structure in the region.
