  career_goals: Kimberly dreams of turning her practical know‑how and curiosity about technology into a career that benefits her rural community. She plans to attend a state university to study environmental
    engineering with a focus on sustainable agriculture. Her short‑term goal is to earn an associate’s degree in agriscience while completing internships that expose her to precision‑farming tools. In the
    long run she hopes to develop low‑cost, sensor‑based systems that help small farmers monitor soil moisture and crop health, eventually launching her own agri‑tech startup. She also wants to mentor younger
    students in her hometown, sharing both traditional farming techniques and modern digital skills.
