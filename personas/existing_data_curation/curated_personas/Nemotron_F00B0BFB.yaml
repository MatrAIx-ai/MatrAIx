personas:
  professional: Christopher Wiggins is a seasoned construction professional who applies his methodical blueprint‑reading, OSHA‑compliant safety expertise, and hands‑on framing and concrete formwork skills
    to streamline site workflows, while his competitive streak and love for process improvements push him toward foreman and future contractor roles.
  sports: Christopher Wiggins is a weightlifting devotee who hits the PowerHouse Gym three times a week, follows the New York Giants and Philadelphia Eagles with fervor during football season, spends spring
    mornings fishing with the Delaware River Anglers Club, and volunteers as a line‑coach for Millville High School’s football team, blending competitive drive with community involvement.
  arts: Christopher Wiggins channels his creative energy into meticulous LEGO builds and handcrafted furniture while listening to Bruce Springsteen and Bob Dylan, and he regularly attends productions at
    the Millville Playhouse, where classic American theater pieces reinforce his appreciation for hands‑on storytelling.
  travel: Christopher Wiggins prefers well‑planned road‑trip getaways, meticulously charting weekend escapes to the Pocono Mountains, Cape May, and Shenandoah National Park for hiking and fishing, while
    dreaming of a sustainable‑focused visit to Portland, Oregon, balancing his love of nature with budget‑conscious travel.
  culinary: Christopher Wiggins is a competent home cook who loves smoky barbecued pork ribs seasoned with hickory wood chips, pan‑seared catfish from the Delaware River, and hearty mac and cheese, often
    pairing meals with a local craft beer and occasionally indulging in a classic New York pizza slice.
  core: Christopher Wiggins is a detail‑oriented carpenter whose competitive edge and practical curiosity drive his career ambitions, yet he regularly battles stress‑induced worry and a tendency to over‑schedule.
background:
  cultural: Christopher grew up in a working‑class, white family in Millville, New Jersey. His upbringing emphasized hard work, self‑reliance, and practicality, values reflected in the region’s industrial
    heritage and community spirit. He attended the local high school, where he participated in shop classes and football, fostering both his hands‑on skills and a modest competitive streak. The Mid‑Atlantic
    blend of suburban and rural life, nearby agricultural fairs, and family traditions like Sunday barbecues and holiday church services have shaped his cultural perspective, giving him a grounded yet curious
    outlook on life.
attributes:
  skills: '["Framing", "Concrete Formwork", "Power Tool Operation", "Heavy Equipment Operation", "Blueprint Reading", "OSHA Safety Compliance", "Site Organization", "Workflow Planning", "Equipment Troubleshooting",
