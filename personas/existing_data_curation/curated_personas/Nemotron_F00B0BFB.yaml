  hobbies: '["Woodworking", "Car Maintenance", "DIY Home Projects", "Weightlifting", "Fishing", "Chess", "LEGO Model Building", "Watching Local Sports", "Community Events"]'
  career_goals: Christopher aims to earn a journeyman carpenter certification and complete an OSHA 30‑hour safety course within the next two years. He aspires to be promoted to foreman or site supervisor,
    where his organized and reliable approach can be leveraged to lead crews. Long‑term, he plans to start his own small contracting business focused on energy‑efficient remodels and green building solutions,
    positioning himself as a trusted expert in sustainable construction within the Millville area.
