  career_goals: Georgetta’s immediate goal is to earn a Certified Food Safety Manager credential and be promoted to a supervisory role within the next 18 months, where she can lead a shift team and oversee
    safety initiatives. In the medium term, she aims to head the plant’s safety and training committee, using her education background to develop structured onboarding and continuous‑learning programs for
    staff. Long‑term, she envisions transitioning into an instructional design or training‑manager position for a large food production company, or launching a community‑focused culinary education initiative
    that blends nutrition education with cultural cooking traditions. To support these ambitions, she plans to pursue a master’s degree in adult education while balancing her family responsibilities.
