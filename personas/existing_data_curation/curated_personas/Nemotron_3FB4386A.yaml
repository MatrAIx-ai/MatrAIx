  hobbies: '[''Bachata and merengue dancing'', ''Cooking Dominican dishes (mangú, sancocho, pasteles)'', ''Playing soccer in local league'', ''Listening to Latin music and attending concerts'', ''Volunteering
    at community center and church events'', ''DIY home improvement projects'', ''Following Major League Baseball, especially Dominican players'', ''Reading self‑help and psychology books for stress management'',
    ''Participating in trivia nights and board game gatherings'']'
  career_goals: Raul aims to re‑enter the workforce in a supervisory role within a warehouse or logistics operation where his organizational talent and attention to detail are valued. Simultaneously, he
    is exploring the possibility of launching a small catering venture that showcases authentic Dominican cuisine, leveraging his cooking skills and community connections. To support these ambitions, he
    plans to earn a GED and pursue a short‑term certification in supply‑chain management or culinary arts. Financial stability and the ability to provide a secure future for his family are top priorities,
    as is developing healthier coping strategies for stress through counseling and regular exercise.
