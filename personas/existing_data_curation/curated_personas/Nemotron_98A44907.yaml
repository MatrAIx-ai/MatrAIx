personas:
  professional: Roslinda Spicer, a data‑savvy public‑health undergraduate, blends rigorous Excel‑driven health‑disparities research with meticulous Python data‑cleaning while channeling their organized,
    solitary work style into every research paper and upcoming internship aimed at underserved communities.
  sports: Roslinda Spicer prefers low‑impact solo workouts, joining a downtown Philadelphia running club for early‑morning jogs through Fairmount Park, cheering on the Eagles in the fall, and fencing casually
    on weekends with the university’s club team.
  arts: Roslinda Spicer captures quiet cityscapes with her DSLR, curates an Instagram feed inspired by the moody tones of Miles Davis and Sade, and spends weekends listening to Bossa Nova while editing
    photos, weaving their love for visual and auditory art into personal reflection.
  travel: Roslinda Spicer plans trips like research proposals, booking budget-friendly stays in Asheville for its mountain trails, ticking off a week‑long museum tour of Washington, DC, and dreaming of
    a future solo pilgrimage to the ancient ruins of Machu Picchu.
  culinary: Roslinda Spicer experiments with soul‑food‑styled dishes such as collard‑green sauté with smoked paprika and sweet‑potato‑brown sugar pie, mastering a sturdy comfort‑cooking technique while
    listening to classic R&B playlists to keep the kitchen rhythm steady.
  core: Roslinda Spicer is a methodical, introverted data enthusiast who balances a disciplined budget and health routine with a quiet passion for photography, jazz, and solo cooking experiments, even if
    they sometimes procrastinate on dental check‑ups.
background:
  cultural: Roslinda is an African‑American woman raised in Philadelphia, a city with a rich Black heritage and vibrant community traditions. Her family, rooted in the city for generations, emphasizes education,
    self‑improvement, and community service, values that were shaped by the civil‑rights era experiences of her grandparents. She grew up attending local cultural events such as Juneteenth celebrations
    and visiting the African American Museum in Philadelphia, which deepened her appreciation for Black history and artistic expression. Culinary traditions, like cooking collard greens and cornbread, connect
    her to her cultural roots, while the city's diverse neighborhoods have fostered a nuanced understanding of contemporary Black life in an urban setting. This cultural background informs her academic
    interests in health equity and her desire to contribute positively to her community.
