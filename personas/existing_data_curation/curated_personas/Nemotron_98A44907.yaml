  hobbies: '["Reading (fiction & non‑fiction)", "Creative writing / journaling", "Photography (urban and nature)", "Nature walks in Fairmount Park", "Cooking and experimenting with soul‑food recipes", "Listening
    to jazz and R&B", "Podcast listening (science, tech, social justice)", "Mindfulness meditation", "Learning new languages via apps", "Sketching and doodling"]'
  career_goals: Roslinda aims to complete a bachelor's degree in public health or data analytics, leveraging her curiosity about societal patterns with practical problem‑solving skills. She plans to secure
    internships in research or data analysis, eventually pursuing a role as a research analyst or epidemiologist focused on health disparities affecting Black communities in Philadelphia. Long‑term, she
    aspires to graduate study and a career that blends rigorous data work with community‑focused impact, while maintaining financial independence and a balanced, organized lifestyle.
