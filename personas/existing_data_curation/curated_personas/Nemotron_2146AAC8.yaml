personas:
  professional: Fernando Ojeda, a full-stack software engineer and cloud architect, leverages their expertise in AWS, Azure, and data-driven UI/UX to spearhead agile projects, while their natural curiosity
    and sociable charisma turn complex technical discussions into collaborative storytelling for cross-functional teams.
  sports: Fernando Ojeda, an avid weekend soccer player for the local Mountain City FC club and a regular member of the Appalachian Trail Hiking Club, balances competitive matches with long treks through
    the foothills, cheers on Atlanta United during the MLS season, and incorporates yoga sessions to maintain flexibility.
  arts: Fernando Ojeda, a frequent patron of indie music venues where they savor the sounds of Arcade Fire and St. Vincent, a dedicated visitor to contemporary art exhibitions featuring Banksy and Olafur
    Eliasson, and an enthusiastic participant in community theater productions of the musical Hamilton, channels these creative experiences into vibrant acrylic paintings and candid street photography.
  travel: Fernando Ojeda, an adventurous yet methodical traveler who alternates meticulously planned weekend hikes in the Blue Ridge Mountains with spontaneous city escapes to Barcelona and the historic
    streets of Antigua, and who dreams of trekking to Machu Picchu while balancing family commitments and a mid-career budget.
  culinary: Fernando Ojeda, a passionate home chef who skillfully crafts traditional Guatemalan pepian and hand-wrapped tamales using roasted chilies, corn masa, and locally sourced herbs, while also experimenting
    with chiles rellenos and plantain-based side dishes, often hosting lively dinner gatherings where they balance meticulous preparation with a habit of over-seasoning to the delight (and occasional alarm)
    of guests.
  core: Fernando Ojeda is a curious, sociable tech leader who merges cloud engineering with a love for art, cooking, and community, often juggling late-night hackathons with spontaneous soccer matches and
    a habit of over-seasoning every dish.
background:
  cultural: Fernando was born to Guatemalan immigrants and grew up speaking both Spanish and English at home, immersing him in the rich traditions of his heritage. Family gatherings centered around celebrations
    like Semana Santa and Día de los Muertos, where music, dance, and folk art play a vital role, instilled in him a deep appreciation for cultural expression. While residing in Canton, GA, he maintains
    strong ties to the local Latinx community, volunteering at cultural events and mentoring youth. His Guatemalan roots influence his values of family cohesion, hospitality, and respect for diverse perspectives,
    shaping his collaborative work style and his desire to integrate cultural storytelling into technology.
attributes:
  skills: '[''Full‑stack web development'', ''Cloud architecture (AWS/Azure)'', ''Data analysis'', ''Machine learning fundamentals'', ''Agile project management'', ''User experience design'', ''Technical
