  hobbies: '[''Visiting art galleries'', ''Painting'', ''Photography'', ''Cooking Guatemalan cuisine'', ''Hiking'', ''Playing soccer'', ''Attending live music events'', ''Volunteering at cultural festivals'',
    ''Reading sci‑fi novels'', ''Participating in tech meetups'']'
  career_goals: Fernando aims to transition into senior technology leadership within the next five years, targeting roles such as Director of Engineering or Chief Technology Officer. He envisions building
    and scaling teams that create inclusive, culturally aware digital products, particularly platforms that celebrate and preserve Latin American heritage. To support this vision, he plans to earn advanced
    cloud certifications, deepen his expertise in AI ethics, and launch a side venture focused on educational technology for Guatemalan communities. Mentoring emerging talent from underrepresented backgrounds
    and speaking at industry conferences about the intersection of technology, art, and cultural identity are also central to his long‑term ambitions.
