  hobbies: '[''Restoring vintage arcade cabinets'', ''ATV off‑roading'', ''Hiking in the Shasta region'', ''Fishing on Shasta Lake'', ''Competitive arcade gaming'', ''Playing chess and Go'', ''Cooking fusion
    Latin‑American Indian cuisine'', ''Yoga and meditation'']'
  career_goals: Sean aims to advance from field technician to senior technical specialist within his current service company, eventually overseeing a regional team of machine service engineers. He plans
    to acquire certifications in mechatronics and IoT device integration to lead projects that modernize vending and arcade machines with remote diagnostics and AI‑driven inventory management. In the long
    term, Sean envisions launching his own mobile repair business focused on next‑generation automated kiosks, and later establishing a franchise of smart vending locations that blend his technical expertise
    with his entrepreneurial drive.
