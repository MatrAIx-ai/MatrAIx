  hobbies: '["Karaoke", "Community Theater", "Cooking and Recipe Experimentation", "Hosting Book Club", "Volunteering at Local Food Bank", "Hiking the Allegheny River Trail", "Herb and Vegetable Gardening",
    "DIY Home‑Decor Crafts", "Social Media Content Creation (personal)", "Attending Steelers Games", "Weekend Road Trips to Nearby Cities"]'
  career_goals: Vera aims to complete a bachelor’s degree in Business Administration within the next three years and obtain the Certified Administrative Professional (CAP) credential. She aspires to advance
    to an Office Manager or Executive Assistant role at a mid‑size organization in the Pittsburgh area, where she can lead a small team, develop mentorship skills, and take responsibility for organizing
    corporate events and community outreach initiatives. Maintaining a healthy work‑life balance for her marriage remains a central ambition.
