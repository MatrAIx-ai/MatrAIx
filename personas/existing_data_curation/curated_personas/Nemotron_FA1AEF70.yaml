personas:
  professional: Scott Drummond blends his STEM background with a flair for visual design to excel as a retail electronics specialist, leveraging his competitive edge to troubleshoot devices, translate specs
    into customer‑friendly language, and use data‑driven insights to optimize inventory while training staff and consistently surpassing sales targets.
  sports: Scott Drummond fuels his love for the Colorado outdoors with early‑morning trail runs and weekend hikes, is a season ticket holder for the Denver Broncos and a devoted fan of the Colorado Avalanche,
    and runs with the Denver Trail Runners Club where he competes in local 10K races.
  arts: Scott Drummond channels his artistic curiosity into landscape photography inspired by Ansel Adams and street shots echoing Henri Cartier‑Bresson, sketches cityscapes in a battered Moleskine, devours
    speculative fiction by Neal Stephenson, and curates playlists featuring The National, Sufjan Stevens, and the local indie band The Teskey Brothers while attending gallery openings at RedLine.
  travel: Scott Drummond plans his escapes around the peaks, having trekked through Rocky Mountain National Park, captured sunrise over Mount Elbert, and taken weekend trips to Asheville’s art scene; he
    dreams of a photography pilgrimage to Iceland’s black sand beaches and a tech‑design tour of Tokyo, balancing limited vacation days with a penchant for detailed itineraries that leave room for spontaneous
    photo hunts.
  culinary: Scott Drummond’s palate favors Colorado’s bold flavors, from bison burgers drizzled with green chile to grilled trout seasoned with sage, and he enjoys experimenting with homemade rustic chili
    and crafting a perfect pour‑over coffee, though his occasional over‑reliance on spicy snacks can upset his stomach after long runs.
  core: Scott Drummond is a competitive, curiosity‑driven retail tech guru who finds solace in mountain trails, lenses, and strategic games, balancing meticulous planning with spontaneous creativity while
    occasionally neglecting sleep and over‑spicing his meals.
background:
  cultural: Scott is a white, third‑generation American of primarily Anglo‑Irish heritage, raised in the Denver metropolitan area before moving to the more rural community of Peyton, Colorado. Growing up
    amidst the Rocky Mountains, he internalized a blend of frontier independence and community cooperation common to Colorado's small towns. While his family celebrated traditional holidays and maintained
    a modest, middle‑class work ethic, they also encouraged curiosity, education, and the appreciation of the natural and artistic landscapes surrounding them. This upbringing cultivated Scott's balanced
    outlook—valuing both organized responsibility and flexible, creative exploration—while reinforcing a pragmatic, competitive approach to personal and professional challenges.
