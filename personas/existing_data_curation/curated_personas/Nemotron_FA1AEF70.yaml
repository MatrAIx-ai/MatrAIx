  hobbies: '[''Hiking'', ''Trail Running'', ''Camping'', ''Photography'', ''Sketching'', ''DIY Electronics'', ''Arduino Projects'', ''Basic Python Programming'', ''Reading Science Fiction'', ''Attending
    Art Galleries'', ''Listening to Indie Music'', ''Playing Chess'', ''Strategic Board Games'']'
  career_goals: Scott aims to transition from frontline retail to a leadership position, targeting a store manager role within the next two years and eventually a district manager position overseeing multiple
    locations. He is also exploring a pivot into technical sales for innovative consumer electronics, where he can combine his product expertise with his passion for art and design. Long‑term, he envisions
    launching a boutique shop that merges high‑tech gadgets with handcrafted art pieces, creating a community hub for tech‑savvy creatives in the Colorado Front Range.
