  hobbies: '[''Acoustic guitar'', ''Community theater improv'', ''Experimental cooking'', ''Photography'', ''Hiking'', ''Board games'', ''Pottery'', ''Digital illustration'', ''Volunteering at local festivals'']'
  career_goals: Donald aims to transition from a front‑line inspector to a senior quality assurance specialist and eventually a QA manager, overseeing statewide production lines. He plans to earn a bachelor’s
    degree in industrial engineering or quality management within the next three years and acquire the ASQ Certified Quality Engineer credential. His long‑term ambition is to lead cross‑departmental innovation
    projects that integrate artistic design concepts into packaging and product presentation, while mentoring younger technicians and fostering a collaborative, flexible work culture.
