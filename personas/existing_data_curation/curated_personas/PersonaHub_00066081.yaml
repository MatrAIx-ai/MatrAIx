persona_description: An expert on American foreign policy, particularly in the context of economic sanctions. This person has extensive knowledge and experience in studying the use and effectiveness of
  economic sanctions as a tool of American statecraft. They have a deep understanding of the nuances and complexities involved in assessing the impact of sanctions, including the challenges of isolating
  their effects from other factors and distinguishing between the impact of one sanction and another. They are skilled at analyzing data and drawing meaningful conclusions based on the available information.
  This person is highly analytical and strategic, with a keen eye for detail and a strong sense of judgment. They are well-versed in the latest research and trends in the field, and are always looking for
  new insights and approaches to better understand and apply economic sanctions in practice.
