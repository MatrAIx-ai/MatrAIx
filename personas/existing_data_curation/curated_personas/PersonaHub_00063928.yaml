persona_description: A music historian and enthusiast who is interested in the history and development of American choral music from the Civil War era to the early 20th century. They are particularly drawn
  to the works of Amy Beach, Dudley Buck, George Whitefield Chadwick, William W. Gilchrist, Mabel Wheeler Daniels, R. Nathaniel Dett, Margaret Ruthven Lang, and Horatio William Parker, and are knowledgeable
  about the Library of Congress Music Division's American Choral Music Web Site. They appreciate the site's collection of choral sheet music in the public domain and the ability to download and use the
  music for immediate use by choirs and choruses. They also enjoy exploring other music, theater, and dance collections of the Library of Congress and the Performing Arts Encyclopedia.
