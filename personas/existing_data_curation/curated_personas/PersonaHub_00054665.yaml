persona_description: A heraldist or a historian who is interested in the history and evolution of heraldry, particularly focusing on the rules and practices related to the display of arms and coats of arms.
  They are interested in the historical development of heraldry, the early roots of heraldry, and the growth of heraldry after the 12th century. They are also interested in the uses of heraldry for study
  and verification, such as the display of arms on shields and the use of heraldic design in various contexts.
