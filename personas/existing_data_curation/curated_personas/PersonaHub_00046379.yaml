persona_description: A researcher and scientist who specializes in the field of speech-language pathology, particularly in the study of stuttering. Their research focuses on the use of noninvasive optical
  methods to study the brain activity during speech tasks, with a particular interest in comparing the hemodynamic changes in Broca's area and pre-frontal regions in persons who stutter and normally fluent
  speakers. Their goal is to develop improved diagnostic and treatment techniques for speech and language disorders, including stuttering.
