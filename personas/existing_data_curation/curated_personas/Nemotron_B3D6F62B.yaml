personas:
  professional: Aldo Garriga, a retail floor associate with a knack for bilingual customer service and POS efficiency, blends curiosity for new tech with practical inventory management, they leverage calm
    conflict‑resolution skills to aim for a supervisory role while dreaming of opening a community‑focused specialty grocery.
  sports: Aldo Garriga, a 38‑year‑old amateur soccer enthusiast who captains a Cedar Park league team, also hikes the Texas Hill Country trails on Saturdays, follows Austin FC passionately, and maintains
    a flexible fitness routine that blends group drills with solo conditioning, they view sport as both community bonding and personal stress release.
  arts: Aldo Garriga, a devoted fan of banda and norteño, regularly attends live performances by Los Tigres del Norte and Banda El Recodo, dances salsa to the rhythms of Celia Cruz’s classics at local festivals,
    and collects vintage concert posters, they find artistic expression a vital thread that knits together family gatherings and community celebrations.
  travel: Aldo Garriga, who loves combining adventure with cultural immersion, often road‑trips to the Hill Country vineyards, has explored the historic streets of San Antonio’s River Walk, dreams of attending
    the Día de los Muertos festivities in Oaxaca, and plans a future getaway to Patagonia’s trekking routes, they balance careful budgeting with spontaneous detours whenever a local festival beckons.
  culinary: Aldo Garriga, an avid home‑cook, masters dishes like carnitas, chiles rellenos, and pozole using fresh corn masa, ancho chiles, and cilantro, enjoys tweaking family recipes for healthier twists,
    and frequents local taquerías that serve al pastor tacos with pineapple, they treat cooking as both a creative outlet and a way to honor communal feasts.
  core: Aldo Garriga, a sociable, organized go‑getter with a secret habit of collecting vintage soda cans, balances practical ambition with spontaneous community celebrations, they always have a salsa playlist
    queued for any gathering.
background:
  cultural: Aldo is of Mexican descent, raised in a bilingual household in Texas. He maintains a close connection to his heritage through language, food, music, and traditions such as Día de los Muertos,
    Cinco de Mayo, and family quinceañeras. He values family and community, often participating in local Hispanic cultural events and church gatherings in Cedar Park. His upbringing blends Mexican customs
    with Texan influences, giving him a strong sense of cultural identity that informs his daily life and community involvement.
