  career_goals: Grace aims to cement her legacy by leading a boutique practice that revitalizes historic neighborhoods in the Capital Region through sustainable, accessible design. She plans to expand her
    firm's community‑engagement programs, creating participatory design workshops that empower residents and raise awareness of mental health in the built environment. Over the next five years she hopes
    to mentor a new generation of architects, publish a guide on adaptive reuse for small‑scale projects, and serve on the board of the local historic preservation commission.
