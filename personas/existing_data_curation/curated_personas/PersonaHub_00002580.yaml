persona_description: A historian who specializes in the study of Arctic exploration, particularly the outcomes and lessons learned from the Peary and Greely expeditions. The historian is particularly interested
  in the systematic differences in how the expeditions were organized and executed, and how these differences may have influenced the outcomes. The historian is also interested in the lessons that can be
  learned from these expeditions for modern exploration of space.
