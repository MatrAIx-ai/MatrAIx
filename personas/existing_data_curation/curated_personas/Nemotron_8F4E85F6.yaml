personas:
  professional: A seasoned truck driver and sales specialist, Allison Ortiz boasts a clean safety record, defensive driving expertise, and meticulous logistical planning, and they apply a competitive, curious
    mindset with GPS fleet software to optimize routes while eyeing a sustainability‑focused supervisory role that will showcase regional artwork on a future boutique fleet.
  sports: An avid hiker and birdwatcher, Allison Ortiz spends weekends trekking the Loess Hills with the Iowa Trail Club, roots passionately for the Iowa Hawkeyes football team and the Des Moines Buccaneers
    hockey squad, and they use outdoor activity as a primary stress‑relief outlet.
  arts: A devoted patron of visual and performing arts, Allison Ortiz frequents the Des Moines Art Center, curates a modest collection of limited‑edition prints by regional artists such as John King, paints
    delicate watercolors of Midwestern landscapes, and they unwind to folk and indie tunes from Brandi Carlile, Fleet Foxes, and the local folk trio The Oats, letting artistic immersion feed their curiosity.
  travel: A methodical traveler with a penchant for curated experiences, Allison Ortiz plans trips using reward credit cards and detailed itineraries, explores nearby gems like the Amana Colonies and Effigy
    Mounds before seeking international inspiration in Portugal’s Douro Valley and Japan’s Kyoto, and they balance adventure with relaxation while budgeting carefully.
  culinary: An experimental home chef, Allison Ortiz sources fresh produce from Des Moines farmers’ markets to craft dishes such as roasted beet and goat‑cheese salad, pan‑seared trout with fennel, and
    a tangy sourdough pizza, and they skillfully layer flavors yet occasionally over‑spice, reflecting both curiosity and occasional kitchen mishaps.
  core: Allison Ortiz is a curiosity‑driven, meticulously organized truck driver who channels competitive ambition into sustainable logistics, nurtures an artistic soul through painting and gallery visits,
    balances social board‑games with solitary journaling, and constantly wrestles with a worry‑prone mindset that fuels both meticulous planning and occasional over‑thinking.
background:
  cultural: Allison grew up in a middle-class, predominantly white Midwestern family in Iowa, with a modest Hispanic heritage from her father's side, reflected in the Ortiz surname. Her upbringing blended
    traditional American values such as hard work, self-reliance, and community involvement with occasional cultural traditions like celebrating Dia de los Muertos with extended family and enjoying Mexican
    cuisine. Living in Urbandale, a suburb of Des Moines, she has been immersed in the region’s agricultural and industrial culture, which reinforces a pragmatic, organized outlook. While she identifies
    primarily as white, she values the multicultural perspective brought by her mixed background and incorporates it into her appreciation of art and diverse ideas.
