  career_goals: Allison aims to advance from her driver sales position into a supervisory or management role within a logistics or transportation company. She plans to obtain advanced CDL endorsements and
    a certification in fleet safety management, eventually overseeing a team of drivers and optimizing routes with a focus on sustainability. In the long term she envisions launching her own boutique trucking
    operation that partners with local artists to showcase regional artwork on her fleet, merging her passion for art with her transportation expertise. She also hopes to develop mentorship programs for
    new drivers, reduce personal stress by delegating administrative tasks, and possibly pursue coursework in business management to support her entrepreneurial goals.
