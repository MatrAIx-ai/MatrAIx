persona_description: A historian who specializes in the study of economic decline and its impact on cities and countries. The individual is interested in Argentina's economic history and its effects on
  the Buenos Aires area, as well as the nation's migration from the top 10 economies to near the bottom of the top 100, now ranked at 82nd in the world in GDP per capita. The persona is knowledgeable about
  Argentina's currency policy in the 1990s and its effects on the nation's savings and GDP per capita. The individual is also interested in the city of Buenos Aires and its demographics, particularly its
  population and distribution, and its suburban growth pattern.
