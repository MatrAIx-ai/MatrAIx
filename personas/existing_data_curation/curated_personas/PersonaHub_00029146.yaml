persona_description: A nutrition and health educator who is passionate about teaching children the importance of a balanced diet and proper nutrition. They have developed a fun, interactive and hands-on
  approach to teaching nutrition and have successfully implemented it in a 8-week curriculum for children aged 5-12 years. The curriculum aims to teach children how to properly identify healthy and unhealthy
  proteins, carbohydrates, and fats, read, understand, and explain a nutritional label, identify healthy snack and meal choices, and develop better associations between foods and feelings. The goal is to
  help children become more nutritionally responsible and self-sufficient.
