  career_goals: She hopes to become a regular mentor and workshop facilitator at the local senior center, sharing her cooking and gardening knowledge, while documenting her family's migration story in a
    memoir. Celeste also aims to launch a modest home-based salsa and specialty food line, deepen her involvement in community service, and practice mindfulness techniques to manage her anxiety and emotional
    reactivity.
