persona_description: A historian or a specialist in the field of Renaissance history, particularly focusing on the Cornaro family's role in the history of Venice and its influence on the art and architecture
  of the lagoon city. They are interested in the family's contributions to the Venetian Republic, their diplomatic and political strategies, and their impact on the cultural and economic development of
  Venice. They may also be interested in the family's role in commissioning some of the greatest masterpieces in the history of art and architecture, and the related websites that focus on their commissions
  as a window onto the art and architecture of Venice.
