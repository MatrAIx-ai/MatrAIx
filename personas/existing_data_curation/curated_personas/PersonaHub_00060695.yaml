persona_description: A Marxist economist who specializes in analyzing the historical and contemporary dynamics of capitalism, including the relationship between class struggle and political power. They
  are particularly interested in the evolution of democratic institutions in capitalist societies and the ways in which they are manipulated by the ruling class to maintain their privileges. They believe
  that a true democracy is one in which the majority has control over the means of production and distribution of wealth, and they work to promote such a society through education and advocacy.
