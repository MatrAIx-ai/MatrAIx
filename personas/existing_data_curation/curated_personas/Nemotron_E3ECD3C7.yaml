  career_goals: Hector aims to advance within the United States Postal Service by moving into a supervisory role, such as Senior Carrier or Operations Supervisor, and eventually into regional logistics
    management. He plans to pursue certifications in supply chain management and logistics to broaden his expertise. Long‑term, he hopes to combine his logistical experience with his passion for the arts
    by coordinating community art initiatives or a local art‑supply distribution program that supports schools and cultural events. Throughout his career progression, Hector wants to provide stability for
    his family while continuing to serve his community.
