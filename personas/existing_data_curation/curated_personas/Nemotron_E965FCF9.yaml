  hobbies: '[''Reading African American literature'', ''Watercolor painting'', ''Chess'', ''Visiting art galleries and museums'', ''Jazz and blues listening'', ''Cacti gardening'', ''Poetry writing'', ''Genealogy
    research'', ''Travel to historic cultural sites'']'
  career_goals: Kemuel aims to author a memoir that captures his African American experience in the Southwest and to create a digital archive preserving the works of local Black artists. He plans to volunteer
    as a docent at the Arizona History Museum, offering guided tours that highlight underrepresented histories. Additionally, he seeks to mentor younger family members and community youth in creative writing
    and art appreciation, and to continue lifelong learning through online courses in art history and digital media.
