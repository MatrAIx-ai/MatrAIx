  career_goals: Quan aims to advance from his current cook position to sous chef within two years, then to head chef at a prominent seafood restaurant in Hampton Roads. His long‑term ambition is to open
    his own waterfront eatery that showcases a fusion of soul‑food comfort with Caribbean and West African flavors, creating a signature dish that becomes a regional staple. He plans to earn a Certified
    Chef de Cuisine credential, compete nationally in barbecue and grilling contests, and mentor aspiring Black chefs through community workshops.
