  career_goals: Although retired from formal employment, Lori aims to channel her disciplined, achievement‑driven mindset into lasting community contributions. She plans to collaborate with the Johnson
    County Historical Society to curate a small archive of Appalachian folk art and family histories, leveraging her organizational prowess and love for art. Additionally, she hopes to publish a modest
    collection of her genealogy research and handmade patterns, and to launch an online shop that sells her quilts and embroidered pieces, thereby sharing her craftsmanship while providing a modest income.
