  career_goals: Rodrigo wants to formalize his experience by earning a Certified Nursing Assistant (CNA) credential and, if feasible, pursuing an LVN (Licensed Vocational Nurse) license through a community
    college program with flexible classes. He aims to move into a supervisory role such as lead nursing assistant or shift coordinator, where he can leverage his people‑skills to mentor staff and enhance
    patient experience. Long‑term, he hopes to launch a bilingual health‑education outreach program in Corona that offers workshops on chronic‑disease management for Mexican‑American seniors. Additionally,
    he plans to attend stress‑management and mindfulness workshops to better cope with his anxiety and develop healthier emotional regulation strategies.
