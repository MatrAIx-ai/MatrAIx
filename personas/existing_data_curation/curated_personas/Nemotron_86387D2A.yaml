  hobbies: '["Urban sketching", "Street art exploration", "Indie music concerts", "Skateboarding", "Digital illustration", "Motion graphics experiments", "Screen‑printing T‑shirts", "Story‑driven video
    gaming", "Reading graphic novels and philosophy", "Experimental cooking", "Design meetups and workshops", "Late‑night drawing sessions"]'
  career_goals: Ryan aims to build a robust portfolio that lands him a full‑time role at a leading LA creative agency within the next two years. He is driven to win design competitions and earn industry
    recognitions such as AIGA awards. Over the next five to ten years, he envisions himself moving into senior creative leadership—eventually becoming an Art Director or Creative Director—while also establishing
    a boutique studio that blends graphic design with immersive media like AR/VR experiences. He wants to balance steady client work with passion projects that address social causes, leveraging his humanities
    insight to create impactful visual campaigns.
