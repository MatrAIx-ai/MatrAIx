personas:
  professional: Eun Chou, a curious toddler who spends hours building towers with wooden blocks, demonstrates early engineering instincts by balancing spontaneous creativity with a practical, trial‑and‑error
    approach, even though deadlines and structured schedules remain beyond their grasp.
  sports: Eun Chou, who thrives on spontaneous playground dashes and weekly toddler soccer sessions with the Little Lions Tots, also enjoys cheering for the Chicago Cubs during family outings, preferring
    bursts of activity over rigid drills.
  arts: Eun Chou, who is entranced by the colorful world of "Baby Einstein" and the playful tunes of the Muppets, loves watching Sesame Street's Elmo and dancing to the songs from Disney's Frozen performed
    by Idina Menzel, while also scribbling abstract drawings with thick crayons.
  travel: Eun Chou, who prefers short car rides to familiar spots like the neighborhood zoo and a weekend trip to Santa Monica Beach, day‑dreams about a future adventure to Tokyo Disneyland, balancing a
    love for spontaneous exploration with the comfort of routine nap times.
  culinary: Eun Chou, who relishes buttery mac and cheese, crunchy peas, and occasional mango puree, can barely mash bananas with a fork but enjoys helping stir pancake batter, and shows a particular fondness
    for honey drizzle on toast.
  core: Eun Chou, a two‑year‑old bundle of quiet curiosity, balances spontaneous play with a gentle, considerate nature, often getting lost in solitary building projects while secretly craving the comfort
    of familiar routines.
background:
  cultural: Eun comes from an East Asian family that maintains cultural traditions at home. She hears Mandarin (or another East Asian language) spoken daily, celebrates Lunar New Year with family gatherings
    and special foods, and participates in community events at a local cultural center in Suwanee. Her parents blend these traditions with Southern American life, exposing her to a multicultural environment
    while preserving her heritage.
