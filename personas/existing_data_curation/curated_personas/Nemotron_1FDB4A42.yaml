  career_goals: Leonardo is determined to launch his career as a software engineer at a Silicon Valley startup where he can apply his technical expertise to create user‑centric solutions. In the next three
    years he aims to transition into a lead developer or product manager role, guiding cross‑functional teams and driving innovative projects. He also plans to pursue an advanced certification in artificial
    intelligence to stay competitive, and he envisions giving back by mentoring aspiring Latino technologists through community hackathons.
