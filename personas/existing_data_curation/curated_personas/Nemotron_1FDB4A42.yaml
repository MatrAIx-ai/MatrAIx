personas:
  professional: Leonardo Solana is a software engineering aspirant with a strong command of Python, JavaScript, and C++ who blends Agile’s disciplined sprint planning with the spontaneous problem‑solving
    flair of hackathons, using their calm, competitive edge to lead multicultural project teams while occasionally missing tight deadlines due to a love of last‑minute brainstorming.
  sports: Leonardo Solana dominates the midfield for the Fremont United community soccer league, cheers for the San Jose Earthquakes in MLS, rides weekly with the Fremont Cycling Club, and spends Saturday
    mornings hiking the ridges of Mount Tamalpais, balancing a competitive drive on the field with a love for collaborative outdoor adventures.
  arts: Leonardo Solana winds down after coding marathons by streaming Bad Bunny’s newest reggaeton hits, binge‑watching the League of Legends esports finals, sketching sunrise scenes of the Bay Area inspired
    by Van Gogh’s Starry Night, and occasionally catching indie films like The Farewell at the local art house, letting diverse creative inputs shape their coding aesthetics.
  travel: Leonardo Solana has already backpacked through the trails of Yosemite and the nightlife of Mexico City, dreams of attending the Tokyo Game Show next year, prefers spontaneous weekend drives along
    the Pacific Coast Highway when his schedule allows, yet his modest savings often steer him toward budget hostels and shared rides rather than luxury stays.
  culinary: Leonardo Solana is a self‑taught home chef who perfects homemade tamales with masa, roasted poblano, and fresh cilantro, crafts salsa verde using hand‑picked tomatillos, enjoys mastering the
    perfect sear on fish tacos, and they love swapping recipes with friends over late‑night pizza slices when their hackathon energy spikes.
  core: Leonardo Solana is a competitive, calm, and sociable 21‑year‑old who balances hackathon spontaneity with structured engineering goals, while juggling soccer, gaming, and cooking adventures, even
    if deadlines sometimes slip and they occasionally splurge on impulse purchases.
background:
  cultural: Leonardo grew up in a Mexican‑American household in the Bay Area. His parents immigrated from Mexico, and he was raised bilingual, celebrating traditions such as Día de los Muertos and Mexican
    Independence Day while also embracing California's multicultural environment. He maintains strong family ties, values hard work and perseverance taught by his parents, and participates in community
    events organized by local Latino organizations. This bicultural upbringing influences his work ethic, his love for Mexican cuisine, and his commitment to supporting other Latino youths entering tech.
