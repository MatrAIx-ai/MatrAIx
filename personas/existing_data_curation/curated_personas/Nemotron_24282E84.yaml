  hobbies: '[''Gallery hopping'', ''Street mural photography'', ''Live jazz and hip‑hop concerts'', ''Sketching and mixed‑media art'', ''Curating music playlists'', ''Reading contemporary fiction'', ''Mentoring
    youth entrepreneurs'', ''Yoga'', ''Cooking Southern soul food with modern twists'']'
  career_goals: Angelique aims to blend her business acumen with her passion for culture and art by first gaining experience as a business analyst at a forward‑thinking firm that values diversity. Over
    the next three to five years she plans to earn an MBA focused on entrepreneurship and social impact, launch a boutique fashion line that celebrates African‑American heritage, and ultimately assume a
    senior strategy or product development role where she can lead initiatives that merge commerce with cultural expression.
