personas:
  professional: Angelique Bell, an aspiring business analyst, blends meticulous financial analysis and market research with a vivid artistic sensibility, applying design thinking to turn data into culturally
    resonant strategies while confidently presenting in stakeholder meetings.
  sports: Angelique Bell stays active by attending early‑morning runs with the BeltLine Running Club, playing intramural basketball at the local YMCA, cheering on the Atlanta Hawks and Atlanta United, and
    fitting in weekend yoga classes to maintain flexibility.
  arts: Angelique Bell spends weekends exploring Atlanta’s BeltLine installations, sketching street murals, curating playlists featuring Kamasi Washington, Tom Misch, and Miles Davis, and drawing inspiration
    from contemporary artists such as Ai Weiwei, Yayoi Kusama, and Banksy for mixed‑media projects.
  travel: Angelique Bell prefers curated urban adventures, having toured the mural‑laden streets of Wynwood Miami, the historic squares of Savannah, the avant‑garde art districts of Berlin, and dreaming
    of a semester in Florence’s artisan workshops to deepen their design perspective.
  culinary: Angelique Bell, an intermediate home cook, reimagines Southern staples like shrimp and grits by adding harissa and miso, infuses collard greens with kimchi, and perfects sweet potato pie with
    a whisper of cardamom, while often multitasking between playlist creation and food prep.
  core: Angelique Bell is a 19‑year‑old analytical dreamer who balances spreadsheets with sketchbooks, doses caffeine for late‑night study sessions, hoards limited‑edition vinyl records, and uses yoga to
    recalibrate after marathon brainstorming marathons.
background:
  cultural: Angelique was raised in Atlanta’s vibrant Black community, where Southern traditions, church fellowship, and a strong emphasis on education shaped her upbringing. Family stories of civil‑rights
    activism and the city’s rich artistic scene fostered a deep appreciation for African‑American culture, music, and visual arts. She identifies with the legacy of the Atlanta Black diaspora, integrating
    the resilience and creativity of her heritage into both her personal pursuits and professional aspirations.
attributes:
  skills: '[''Financial analysis'', ''Market research'', ''Data visualization'', ''Strategic planning'', ''Project management'', ''Business writing'', ''Presentation design'', ''Excel'', ''Tableau'', ''Creative
