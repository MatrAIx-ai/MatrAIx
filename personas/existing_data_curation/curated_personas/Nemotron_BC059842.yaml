  hobbies: '[''Visiting art galleries and museums'', ''Cooking and experimenting with fusion dishes'', ''Listening to merengue and bachata music'', ''Rooftop gardening'', ''Reading historical biographies'',
    ''Attending community theater'', ''Participating in trivia contests'', ''Street photography'', ''Volunteering at cultural festivals'']'
  career_goals: Although he is no longer employed full‑time, Julio aims to channel his curiosity and competitive spirit into projects that celebrate his culture and personal interests. He plans to mentor
    younger Dominican newcomers in cooking and storytelling, publish a small family‑recipe cookbook, and develop a modest home‑based catering service for local events. He also wishes to complete a GED program,
    learn digital photography to document his community, and take a leading role in organizing the annual Dominican Day Parade in his borough.
