  hobbies: '[''Reading historical fiction'', ''Bird watching'', ''Gardening'', ''Knitting'', ''Journaling'', ''Nature trail hiking'', ''Canning and preserving foods'', ''Local history research'']'
  career_goals: Lillie aims to pursue a certification in medical coding or a remote administrative support role that leverages her methodical nature while allowing her to work in a quiet, independent setting.
    She also plans to enroll in a community‑college horticulture program to deepen her practical knowledge of plant care, with the long‑term ambition of managing a small native‑plant nursery or working
    for a local conservation organization near the Chesapeake Bay. Ultimately, she hopes to combine her organizational expertise with her love of nature to create a stable, low‑stress career that supports
    both personal fulfillment and community benefit.
