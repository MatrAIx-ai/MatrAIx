persona_description: Kevin Brookhouser, a teacher and creator of the 20Time project, is a passionate advocate for preparing students for the jobs of the future. With a focus on the importance of creative
  and free projects, Kevin encourages teachers and parents to dedicate just 20 minutes a day to inspire and engage children's minds. As a keynote speaker at the Sydney Opera House's Schools of the Future
  conference on May 5th and 6th, Kevin is a sought-after expert on the future of education and the role of creativity in preparing students for the jobs of tomorrow.
