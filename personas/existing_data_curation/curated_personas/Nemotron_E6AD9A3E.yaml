  hobbies: '[''Reading historical biographies'', ''Listening to jazz, blues, and gospel'', ''Gardening'', ''Woodworking (birdhouses)'', ''Attending church potlucks'', ''Watching Dallas Cowboys football'',
    ''Genealogy research'', "Visiting local farmers'' markets"]'
  career_goals: Although retired, Chase is focused on creating a lasting personal legacy. He aims to document his family’s oral histories and compile a memoir that captures the experiences of Dallas’s Black
    community during the civil rights era. He hopes to mentor his grandchildren by teaching them practical skills—cooking traditional meals, tending a garden, and performing basic home repairs. Maintaining
    his health is a priority so he can continue serving on his church’s board and spearhead a community garden project that provides fresh produce for seniors in his neighborhood. He also aspires to travel
    to historic sites across Texas that hold cultural significance for African Americans, deepening his connection to the state’s heritage.
