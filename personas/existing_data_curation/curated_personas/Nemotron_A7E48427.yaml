  career_goals: Steven aims to move from a line operator to a supervisory role within the next three years. He plans to earn a Lean Six Sigma Yellow Belt, obtain forklift certification, and attend night
    classes for an associate degree in Industrial Technology. His short‑term goal is to become a shift lead, focusing on continuous improvement and process optimization. In the longer term, he aspires to
    become a plant manager and eventually launch his own small‑scale manufacturing or equipment‑repair business that blends his practical expertise with his curiosity for new technologies, while securing
    a stable home in Menifee.
