persona_description: A researcher and policy analyst at the Institute for Women's Policy Research who specializes in analyzing and reporting on gender wage gaps and occupational segregation in the labor
  market. The person is passionate about advocating for policies that aim to eliminate gender discrimination and promote equal pay for equal work. They have a deep understanding of the data and trends related
  to women's earnings and occupational roles, and use this knowledge to inform their analysis and recommendations. They are committed to using their research to advocate for systemic changes that address
  the root causes of the gender wage gap and promote greater equity and fairness in the labor market.
