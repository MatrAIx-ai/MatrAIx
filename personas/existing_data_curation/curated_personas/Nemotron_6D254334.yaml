personas:
  professional: Felecia Forbes is a budding young architect who channels their curiosity for nature into detailed LEGO Duplo building projects, balancing creative ideas with practical, organized design
    steps.
  sports: Felecia Forbes energizes the neighborhood Tiger Cubs U‑7 soccer team with enthusiastic dribbles, follows the Seattle Sounders as their professional favorite, and toggles between soccer practices
    in the spring and casual bike races through the park when the weather cools.
  arts: Felecia Forbes fills sketchbooks with vibrant animal drawings inspired by Dr. Seuss and Eric Carle, sings along to The Wiggles during craft time, and proudly displays LEGO Duplo sculptures that
    blend natural themes with playful geometry.
  travel: Felecia Forbes has explored the local botanical garden, taken a family road trip to the Grand Canyon, and dreams of visiting the interactive space exhibit at the Kennedy Space Center in Florida.
  culinary: Felecia Forbes delights in scooping macaroni and cheese, sipping strawberry‑banana smoothies made with garden‑grown strawberries, and carefully stirring pancake batter under the watchful eye
    of a parent, while proudly munching raw carrot sticks harvested from the family garden.
  core: Felecia Forbes combines a detective’s eye for leaf collections with a budding builder’s love for LEGO Duplo, turning every backyard adventure into a colorful lesson in order and imagination.
background:
  cultural: Felecia is a white child growing up in Hinesville, Georgia, a small community in Liberty County. Her upbringing reflects Southern cultural values such as close family ties, community involvement,
    and hospitality. She attends a local elementary school where she learns about regional history and participates in community events like the Liberty County Fair. Family gatherings often feature southern
    comfort foods, and she experiences church activities that emphasize kindness and service. While rooted in her local culture, she is also exposed to the diverse traditions of her neighbors, fostering
    an inclusive outlook.
