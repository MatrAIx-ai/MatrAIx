  career_goals: Felecia dreams of becoming a veterinarian because she loves animals and enjoys caring for her rabbit. She also imagines herself as a teacher one day, sharing stories and knowledge with younger
    kids. Occasionally she talks about exploring space, inspired by picture books about astronauts, and hopes to learn more science in school so she can help both people and animals in the future.
