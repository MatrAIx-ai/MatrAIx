personas:
  professional: Charles Sessoms, an aspiring junior illustrator with a knack for weaving sci‑fi narratives into detailed architectural sketches, balances meticulous notebook organization with spontaneous
    doodles, volunteers at Austin’s community art workshops for youth, and uses their quiet, focused demeanor to mentor peers while occasionally feeling anxious about meeting creative expectations.
  sports: Charles Sessoms, a budding soccer enthusiast who plays forward for the Austin Royals Youth Soccer Club, cheers loudly for Austin FC during MLS matches and the Texas Rangers on baseball season,
    yet prefers low‑key weekend bike rides and occasional skateboarding at the local park over large‑scale competitive events.
  arts: Charles Sessoms, a diligent sketch‑artist who draws inspiration from Austin’s vibrant murals and idolizes creators like Hayao Miyazaki, immerses themselves in the sounds of Miles Davis, Kendrick
    Lamar, and H.E.R. while working, and eagerly attends the Austin City Limits festival’s kid‑friendly workshops to expand their artistic horizons.
  travel: Charles Sessoms loves spontaneous weekend road trips to the Texas Hill Country’s lavender fields, dreams of exploring Tokyo’s neon anime districts for artistic inspiration, meticulously maps family
    itineraries in a colorful notebook, and balances a modest allowance with an insatiable curiosity for immersive cultural experiences.
  culinary: Charles Sessoms, an adventurous snack‑collector, favors spicy chicken tacos, sushi rolls, and cheesy cauliflower pizza, experiments with these dishes using a modest electric skillet in their
    kitchen, but often burns the garlic when day‑dreaming about story plots, and occasionally skips meals to finish a late‑night gaming session.
  core: Charles Sessoms is a curious, introverted 11‑year‑old who fuses art, storytelling, and strategic gaming into a vivid inner world while wrestling with occasional anxiety and a habit of late‑night
    snack runs.
background:
  cultural: Charles is rooted in an African‑American family that values community, storytelling, and artistic expression. Growing up in Austin’s diverse neighborhoods, he participates in local cultural
    events such as the annual Texas Black Music Festival and community mural projects that celebrate Black heritage. His family’s traditions include sharing oral histories, cooking Southern and soul food,
    and engaging with Black literature, all of which reinforce a sense of identity and pride. These cultural influences nurture his appreciation for art, music, and collaborative creativity, while also
    shaping his desire to represent his community positively through his future work.
