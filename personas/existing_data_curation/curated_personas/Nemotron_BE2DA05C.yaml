  career_goals: Charles dreams of turning his love for art and technology into a future career as a multimedia creator—specifically, an illustrator for children’s books or a concept artist for video games.
    He aspires to master digital design tools, develop storytelling skills, and eventually use his creative talents to inspire other kids, especially those who feel shy or anxious. He also hopes to combine
    his interest in science with visual communication, envisioning a role where he can illustrate scientific concepts for educational media.
