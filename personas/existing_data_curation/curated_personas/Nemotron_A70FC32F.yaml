personas:
  professional: Dennis Grady is an aspiring comic‑strip illustrator and budding coder whose boundless curiosity and love for unconventional ideas drive them to blend vivid drawings with simple tablet scripts,
    even though they often leave sketches unfinished due to a relaxed, disorganized approach and a competitive streak that pushes them to enter school art contests.
  sports: Dennis Grady is a keen basketball fan who spends afternoons dunking on the neighborhood park’s hoop, idolizes the Dallas Mavericks and Dallas Cowboys, plays in the Fort Worth Youth Basketball
    League, and eagerly joins the school’s seasonal soccer and baseball clinics, while cheering on the Dallas Stars during the winter hockey season.
  arts: Dennis Grady lives for the thrill of sketching comic panels, drawing inspiration from legends like Stan Lee, Jack Kirby, and modern muralist Shepard Fairey, grooving to beats from Kendrick Lamar,
    Miles Davis, and A Tribe Called Quest while dancing in the living room, and regularly participating in after‑school art workshops where they experiment with mixed‑media collages.
  travel: Dennis Grady’s travel adventures include weekend trips to the Fort Worth Museum of Science and History, yearly family outings to the Space Center Houston, a summer road‑trip to the Grand Canyon,
    a magical week at Walt Disney World in Orlando, and a short cultural visit to San Antonio’s River Walk, all planned around school holidays and the family’s modest vacation budget.
  culinary: Dennis Grady prefers pizza topped with pepperoni and extra mozzarella, loves making homemade chicken nuggets with a crunchy panko coating, enjoys a cheesy mac and cheese with a dash of hot sauce,
    and often snacks on apple slices dipped in peanut butter, while their cooking skill is limited to assembling PB&J sandwiches and occasionally attempting to bake chocolate chip cookies with their mom’s
    help.
  core: Dennis Grady is a curious, competitive eight‑year‑old who blends comic art, basketball, and coding into a lively, slightly chaotic routine, constantly juggling new ideas while occasionally forgetting
    to tidy up or floss.
background:
  cultural: Dennis is an African‑American boy raised in a close‑knit Black community in Fort Worth, Texas. His family places value on cultural heritage, storytelling, and music, often sharing gospel songs
    and hip‑hop tracks at home. He participates in local community center programs that celebrate Black art, attends a neighborhood church where he engages in youth activities, and enjoys annual events
    such as Juneteenth celebrations and the Fort Worth Black Arts Expo. These experiences blend broader Texan culture with African‑American traditions, shaping his worldview and creative expression.
