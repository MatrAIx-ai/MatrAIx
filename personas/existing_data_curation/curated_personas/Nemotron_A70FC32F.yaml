  hobbies: '[''Drawing comic strips'', ''Playing basketball'', ''Building LEGO sets'', ''Visiting museums and science exhibits'', ''Listening to hip‑hop and jazz music'', ''Coding with Scratch on his tablet'',
    ''Reading adventure books'', ''Participating in after‑school art workshops'']'
  career_goals: Dennis dreams of turning his love for art and technology into a future career. He imagines himself as a cartoonist or video game designer who can create new worlds and characters, as well
    as an inventor who solves everyday problems. He also nurtures a competitive ambition to become a skilled basketball player, hoping one day to play on his school team and compete in local leagues.
