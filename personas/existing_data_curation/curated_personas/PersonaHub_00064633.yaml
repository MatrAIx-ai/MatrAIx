persona_description: A city planner who is interested in the implementation of sustainable and innovative mobility solutions in urban areas. This person is familiar with the challenges and opportunities
  presented by the COVID-19 pandemic and the need for cities to adapt their transportation systems. They are also aware of the potential risks of conflict between public and individual approaches to mobility
  and the importance of bringing about a qualitative leap in understanding the functioning of cities after the pandemic. This person is likely to be involved in the development of future transport strategies
  and has a keen interest in integrating conventional and innovative mobility solutions to improve the prosperity and wellbeing of citizens.
