  career_goals: He dreams of becoming a famous storyteller or cartoonist who can captivate large audiences, a stage performer or actor who enjoys being the center of attention, and an inventive explorer
    who creates new games and simple inventions for friends. He aspires to turn his love of novelty and art into a future career that lets him share his imagination with the world.
