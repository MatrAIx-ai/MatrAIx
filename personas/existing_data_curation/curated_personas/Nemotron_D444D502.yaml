personas:
  professional: John Eure, a five‑year‑old with a boundless imagination, spends most of their day turning cardboard boxes into interstellar ships and proudly declares themselves the chief inventor of the
    living room, where their curiosity about how things work fuels endless pretend experiments and imaginative story‑telling, and they love narrating their creations to anyone who will listen.
  sports: John Eure dashes around the neighborhood playground with unbridled energy, proudly wears a Chicago Cubs jersey during tag games, and cools off by joining the Little League Tigers soccer club on
    Saturdays, though they often forget to bring a water bottle and leave their shoes in the mud.
  arts: John Eure spends afternoons drawing vibrant dragons, listening to the upbeat tunes of The Wiggles and Bruno Mars, and performing improvised dances in front of family while proudly naming Dr. Seuss
    as a favorite illustrator for the whimsical colors they adore.
  travel: John Eure’s favorite family outings include weekend trips to Disneyland, a sun‑soaked day at a Florida beach, and a nostalgic visit to the Grand Canyon, where they eagerly collect souvenir rocks,
    yet they rely entirely on their parents for all planning and become impatient during long car rides.
  culinary: John Eure has a strong preference for cheesy pizza, chicken nuggets, and macaroni and cheese, can expertly dip broccoli into ranch dressing if it’s on the plate, helps mom stir pancake batter,
    yet stubbornly refuses to eat peas without a dip.
  core: John Eure is a hyper‑imaginative five‑year‑old who turns everyday objects into epic adventures, talks nonstop about their creations, leaps into new experiences with reckless enthusiasm, but often
    forgets to tidy up and can spiral into sudden anxiety when routines break.
background:
  cultural: John is raised in Selkirk, a small community within Albany County, New York. His family follows typical American middle‑class traditions, celebrating holidays such as Halloween, Thanksgiving,
    and summer picnics, and participating in local school and library events. The rural‑suburban environment provides regular outdoor play in parks and a strong sense of community involvement. His cultural
    background is primarily White American with roots in the Northeastern United States, reflecting mainstream U.S. cultural values while also being shaped by the close‑knit, community‑oriented atmosphere
    of upstate New York.
