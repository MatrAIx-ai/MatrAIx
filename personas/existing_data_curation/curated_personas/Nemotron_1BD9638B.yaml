  career_goals: Michael aims to expand his current congregation’s impact by establishing a community arts hub that offers workshops, exhibitions, and interfaith dialogues, fostering a space where creativity
    meets spirituality. He aspires to pursue a Doctorate in Divinity or a Master of Theology to deepen his theological expertise, while also considering a certification in nonprofit management to enhance
    his organizational effectiveness. Ultimately, he envisions becoming a regional pastor who mentors younger clergy, champions mental‑health awareness within faith communities, and leads innovative programs
    that blend business sustainability with artistic expression.
