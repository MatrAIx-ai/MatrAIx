    and analysis'', ''Team coordination'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Attending art workshops'', ''Sketching'', ''Volunteer health fair education'', ''Kayaking'', ''Beachcombing'',
    ''Birdwatching'', ''Yoga'', ''Journaling'', ''Creative writing'']'
  career_goals: Denna aims to advance from medical assistant to a supervisory role as a medical office manager within the next five years, leveraging her organizational strengths and leadership potential.
    She plans to complete a bachelor's degree in health administration, earn certification as a Certified Medical Manager, and develop expertise in clinic workflow optimization. Simultaneously, she seeks
    to integrate her artistic passion by creating patient-friendly educational content and exploring medical illustration. Long term, she aspires to lead a community health center that combines evidence-based
    care with creative health promotion programs.
