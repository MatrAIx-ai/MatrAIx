personas:
  professional: Karian King is an aspiring wildlife illustrator and budding junior engineer who fuses their fascination for sketching animals with constructing intricate LEGO habitats, often channeling
    the curiosity of fantasy novels into eco‑friendly design projects during Girl Scouts meetings.
  sports: Karian King plays forward for the Hillcrest Junior Soccer Club, cheers for the U.S. Women’s National Soccer Team and the Seattle Seahawks, rides with the local Bike Explorers Club on weekends,
    and they regularly practice biking and soccer drills at the nearby lake after school.
  arts: Karian King delights in drawing forest creatures inspired by wildlife artist Robert Bateman, idolizes illustrator Mary GrandPré for her magical book covers, and they hum along to Taylor Swift’s
    pop anthems while building LEGO scenes, and they enjoy watching animated classics starring Zendaya.
  travel: Karian King loves weekend outings to Yellowstone National Park and the San Diego Zoo with their family, dreams of trekking the Grand Canyon’s rim next summer, and they hope to someday explore
    Tokyo’s tech districts, all while balancing school deadlines and a modest travel allowance.
  culinary: Karian King experiments with baking chocolate‑chip cookies, oat‑raisin muffins, and simple spaghetti with marinara, favors ingredients like cinnamon, chocolate chips, fresh basil, and shredded
    mozzarella, and although their kitchen skills are still budding, they sometimes forget to set the timer and end up with a slightly burnt batch.
  core: Karian King blends fearless curiosity with practical organization, turning LEGO bricks and wildlife sketches into eco‑inspired creations, saving pennies for future projects, battling mild asthma
    with a trusty inhaler, and often juggling soccer practice, Girl Scout duties, and a lingering habit of leaving the oven door ajar.
background:
  cultural: Karian comes from a white, Midwestern family in New Baltimore, Michigan. Her upbringing reflects the region’s emphasis on community involvement, seasonal traditions, and appreciation for the
    Great Lakes environment. Family gatherings often feature holiday celebrations such as Thanksgiving dinner and Fourth of July barbecues. She attends a local public elementary school where multicultural
    events expose her to diverse cultures, but her day‑to‑day life is shaped by suburban values of modesty, teamwork, and a strong work ethic. Participation in local sports leagues, community service through
    Girl Scouts, and family trips to the shoreline are integral parts of her cultural experience.
