  career_goals: Karian envisions a future where she can combine her love for animals, her curiosity about biology, and her desire to help others. She aspires to become a veterinarian, aiming to study animal
    health and care while also keeping an eye on practical pathways, such as volunteering at local animal shelters and pursuing science courses in high school. She also dreams of contributing to community
    health initiatives and possibly mentoring younger students about kindness and responsibility.
