persona_description: A renowned English physicist who made significant contributions to the field of friction and wear between solid surfaces, particularly through his work with F.P. Bowden and Jacob Israelachvili.
  His research was recognized with the Royal Medal in 1992 and he was elected to the Royal Society of London. He was also active in the Habonim movement and the Youth Department of the Australian Zionist
  Federation. His brother, Israel Tabor, was an electrical engineer and director of research at the Palestine Electric Corporation. Another brother, Harry Zvi Tabor, was an authority on the harnessing of
  solar energy.
