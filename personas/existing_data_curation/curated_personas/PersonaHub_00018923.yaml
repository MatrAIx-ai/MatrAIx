persona_description: A Shīʿite Muslim leader who advocated for the egalitarian society envisioned in the Qurʾān and inspired later Shīʿite movements. Known for his call for revolt against the Umayyad dynasty
  and his influence on later Shīʿite Islam. His death at the hands of the anticaliph ʿAbd Allāh ibn al-Zubayr marked the end of his brief revolutionary movement but left an enduring legacy as a promoter
  of the idea of the mahdi and the equality of Arab and non-Arab Muslims.
