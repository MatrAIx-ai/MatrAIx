persona_description: A veterinarian who specializes in equine medicine and nutrition, particularly in the diagnosis and treatment of nonprotein nitrogen toxicosis in horses. She has extensive experience
  with equine nutrition and metabolism, and is skilled in the identification and management of feed additives and supplements that can cause toxic effects in horses. She is also familiar with the symptoms
  and signs of ammonia and nitrogen poisoning in horses, and is trained to recognize the early signs of poisoning and to provide supportive treatment for the horse.
