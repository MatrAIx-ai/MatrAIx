personas:
  professional: An ambitious health technologist, Pedro Burbano leverages their expertise in biomedical equipment maintenance, Python‑driven performance analytics, and rigorous regulatory compliance to
    redesign user‑interface ergonomics, while their curiosity and competitive drive push them to pioneer AI‑based predictive maintenance solutions for regional hospitals.
  sports: A dedicated fitness enthusiast, Pedro Burbano runs five times a week on the Lake County trail network, practices yoga at sunrise with the Lake County Yoga Guild, follows the Orlando Magic and
    Orlando City SC, and occasionally joins a local recreational soccer league, while their competitive streak drives them to race personal mile‑time records.
  arts: Pedro Burbano channels their artistic curiosity into digital photography, regularly visiting the Orlando Museum of Art to study works by Ansel Adams and Kehinde Wiley, while they also express themselves
    on the dance floor through salsa nights set to classic bomba and plena rhythms, and they curate a personal Instagram feed inspired by the vibrant street murals of the Tampa Bay waterfront.
  travel: Pedro Burbano’s travel style blends meticulous planning via travel‑automation apps with a craving for cultural immersion, leading them to have explored the historic streets of Cartagena and the
    culinary scene of Barcelona, while dreaming of a road‑trip through the Florida Keys and a volcano trek in Iceland for a change of pace.
  culinary: Pedro Burbano enjoys moderate cooking skill, frequently preparing comforting dishes like mofongo with garlic‑infused pork, arroz con gandules, and tostones, while pairing meals with a chilled
    glass of Vino Tinto and experimenting with tropical fruit salsas, yet they admit to over‑seasoning with adobo and occasionally ordering takeout after late‑night hackathon sessions.
  core: Pedro Burbano, a 28‑year‑old health technologist, merges a data‑driven, competitively spirited approach to biomedical engineering with a rich love for salsa, photography, and culinary tradition,
    all while navigating chronic anxiety and an uncompromising quest for precision.
background:
  cultural: Born to Puerto Rican parents, Pedro was raised bilingual in Spanish and English within a close‑knit family that values communal celebrations, music, and cuisine. The rhythmic traditions of bomba
    and plena, along with weekend gatherings featuring mofongo and arroz con gandules, have shaped his social identity. Living in Tavares, FL, he balances his Caribbean roots with the multicultural environment
    of Central Florida, participating in local Puerto Rican festivals and contributing to community service initiatives that support recent immigrants. His cultural perspective informs his collaborative
    approach in the workplace, especially in patient‑centred care and cross‑cultural communication.
attributes:
  skills: '[''Medical equipment maintenance'', ''Biomedical instrumentation troubleshooting'', ''Regulatory compliance and documentation'', ''Data analysis with Python and R'', ''Electronic circuit repair'',
    ''Clinical workflow optimization'', ''Health informatics systems integration'', ''Patient safety protocol implementation'', ''Technical troubleshooting and root‑cause analysis'', ''Equipment calibration
    and preventive maintenance'']'
  hobbies: '[''Visiting art museums and galleries'', ''Digital photography of urban and natural scenes'', ''Salsa dancing and Latin music'', ''DIY electronics projects with Arduino and Raspberry Pi'', ''Running
    and cycling around Lake County’s trails'', ''Cooking traditional Puerto Rican dishes'', ''Strategic board games such as chess'', ''Participating in hackathons and tech meetups'', ''Meditation and yoga
    for stress management'']'
  career_goals: Pedro aspires to become a senior clinical engineer or a lead biomedical technology consultant within the next five years. He plans to earn certifications such as the Certified Clinical Engineer
    (CCE) and Certified Biomedical Equipment Technician (CBET), and to spearhead projects that integrate AI‑driven predictive maintenance into hospital equipment fleets. Ultimately, he hopes to establish
    his own consultancy that helps small regional hospitals in Central Florida adopt cutting‑edge health‑tech solutions while maintaining rigorous safety standards. Alongside professional advancement, he
    wishes to mentor junior technicians and foster a culture of continuous learning.
