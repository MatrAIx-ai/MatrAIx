persona_description: A former student of Professor Backus, a graduate of Vassar College, and a professor of English at Vassar College, who was the first female Chair of the English Department at Vassar
  College. She was also the first female graduate student at Yale and the first female Chair of the English Department at Vassar College. She emphasized the importance of the physical aspect of dramatic
  literature and the need for students to see plays in their physical aspect. She was known for her experimental courses in dramatic writing and performance and her recognition of the primary form of dramatic
  works is not the printed text but the staged performance.
