  hobbies: '[''gardening'', ''historical fiction reading'', ''cooking'', ''library volunteer'', ''birdwatching'', ''walking'', ''knitting'', ''community theater'', ''local history exploration'']'
  career_goals: Tina aims to transform her accumulated practical expertise into a formal community‑focused role. She plans to pursue a certificate in nonprofit management or geriatric care, enabling her
    to become a community outreach coordinator for a local nonprofit or a volunteer trainer at senior centers. Simultaneously, she dreams of launching a modest home‑based bakery that supplies artisan breads
    and preserves at the Westville farmer’s market, using digital marketing tools she is eager to master. Her long‑term ambition is to lead a neighborhood sustainability initiative that creates and maintains
    community gardens, while mentoring younger women in practical life skills, thereby blending her curiosity for new ideas with her steady, harmonious temperament.
