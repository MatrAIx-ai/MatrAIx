  hobbies: '[''Soccer'', ''Volleyball'', ''Baking cupcakes and cookies'', ''DIY crafting (jewelry, home décor)'', ''Social media video creation (TikTok)'', ''Reading contemporary YA fiction'', ''Hiking
    local nature trails'', ''Volunteering at community events'']'
  career_goals: Hope aims to earn her GED within the next year and then enroll in a community‑college program that blends her love for people with practical service—such as culinary arts or hospitality
    management. She dreams of eventually opening a small neighborhood café or bakery where she can host community events, showcase her DIY décor skills, and provide a welcoming space for friends and family.
    In the longer term, she envisions expanding the café into a casual event venue that supports local artists and youth groups, allowing her to keep her schedule flexible while staying deeply involved
    in her community.
