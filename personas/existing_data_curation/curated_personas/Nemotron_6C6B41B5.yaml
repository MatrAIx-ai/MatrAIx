  hobbies: '[''Gardening (Heirloom Vegetables & Flowers)'', ''Baking Artisan Breads and Pastries'', ''Reading Historical Fiction & Southern Folklore'', ''Birdwatching and Nature Sketching'', ''Knitting
    and Textile Crafts'', ''Crossword and Sudoku Puzzles'', ''Hiking Local Trails'', ''Podcast Listening (History, Science, DIY)'']'
  career_goals: While currently focusing on family and community responsibilities, Lisa aspires to translate her well‑honed organizational and culinary skills into a small‑scale home‑based business. She
    plans to complete a bachelor's degree in Business Administration within the next three years, aiming to launch a catering and meal‑prep service that emphasizes wholesome, locally sourced ingredients.
    In parallel, she hopes to earn a certification in garden design to offer consulting for neighborhood garden projects. Her long‑term ambition includes taking a leadership role in a local nonprofit focused
    on food security, using her competitive drive to secure grants and expand program impact.
