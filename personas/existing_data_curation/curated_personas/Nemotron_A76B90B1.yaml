  career_goals: Manuel aims to advance within the fire service by obtaining higher certifications such as Firefighter II, EMT‑Paramedic, and a specialized HazMat certification. He is particularly interested
    in joining the technical rescue team, where his analytical, skeptical mindset can be applied to complex incidents. Long‑term, he aspires to become a fire investigator or fire officer, leveraging his
    methodical planning skills and curiosity about cause‑and‑effect relationships. He also hopes to integrate his appreciation for art into community outreach, creating visual fire‑safety campaigns that
    resonate with diverse audiences, while continuing to build resilience against stress through advanced mental‑health training for first responders.
