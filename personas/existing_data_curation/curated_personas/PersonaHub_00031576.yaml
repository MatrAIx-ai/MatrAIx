persona_description: A teacher who is responsible for teaching the rock cycle and the processes that form different types of rocks to students in Texas. The teacher is expected to identify past events that
  led to the formation of the Earth's renewable, non-renewable, and inexhaustible resources and to analyze and predict the sequence of events in the lunar and rock cycles. The teacher must have a strong
  understanding of the rock cycle and its processes, as well as the ability to explain these processes to students in a clear and concise manner.
