  hobbies: '[''Beach volleyball'', ''Coastal hiking'', ''Improv comedy'', ''Cooking Southeast Asian cuisine'', ''Tech meetups'', ''Organizing hackathons'', ''Meditation'', ''Yoga'', ''Volunteer teaching'']'
  career_goals: Lamberto aims to transition from hands-on coding to a senior technical leadership role where he can shape product architecture while still staying close to code. He hopes to become a lead
    engineer or tech architect for a small-to-medium tech firm, championing a culture of flexibility, continuous learning, and inclusive teamwork. In the long term, he dreams of founding a community-driven
    open-source project that simplifies onboarding for developers from non-traditional backgrounds, and eventually mentoring a cohort of aspiring programmers through a nonprofit coding bootcamp in the Bay
    Area.
