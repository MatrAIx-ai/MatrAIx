personas:
  professional: David Garcia is a practical home‑maintenance specialist who leverages his solid DIY skills in plumbing, electrical troubleshooting, and vehicle upkeep, paired with a knack for structured
    budgeting, to become the dependable go‑to problem‑solver for family and neighbors while pursuing trade certification for stable full‑time work.
  sports: David Garcia is a regular at the neighborhood gym for weight training, an avid fan of Major League Soccer cheering for the New York Red Bulls, follows Caribbean league matches on TV, and joins
    a local adult recreational soccer league each summer, blending structured fitness with seasonal team loyalty.
  arts: David Garcia finds relaxation in the vibrant rhythms of bachata, merengue, and salsa, often playing tracks by Juan Luis Guerra, Aventura, and Celia Cruz, while also enjoying classic films by Pedro Almodóvar
    and diving into biographies of community leaders, which together shape their cultural appreciation.
  travel: David Garcia plans family‑focused trips that mix beach stays on Caribbean islands such as the Bahamas and Puerto Rico with cultural city tours in Barcelona and Lisbon, preferring early‑booking
    discounts, balancing budget constraints with a desire for immersive experiences, and often returning home with souvenirs that evoke island traditions.
  culinary: David Garcia is a seasoned home chef who masterfully prepares sancocho—a hearty stew brimming with yucca, plantains, and root vegetables—and mangú, creamy mashed plantains topped with sautéed
    onions, regularly seasoning with sofrito, cilantro, oregano, and adobo to infuse island flavors into family gatherings.
  core: David Garcia balances a love for structured routines and spontaneous kitchen experiments, yet often over‑season dishes and procrastinates on certification paperwork, revealing a pragmatic yet occasionally
    indulgent personality.
background:
  cultural: 'David comes from a Dominican family that immigrated to the United States, and he grew up speaking Spanish at home while learning English at school. Living in Paterson, New Jersey—home to one
    of the largest Dominican communities on the East Coast—he is deeply connected to the cultural rhythms of his heritage: vibrant music, food, and religious traditions. Family plays a central role in his
    life, with weekly gatherings, celebrations of Dominican holidays such as Independence Day, and regular participation in the local Catholic parish. At the same time, David navigates the broader American
    context, balancing his Caribbean roots with the expectations and opportunities of life in suburban New Jersey.'
attributes:
  skills: '[''home maintenance'', ''basic plumbing'', ''basic electrical troubleshooting'', ''vehicle upkeep'', ''budgeting and household finance'', ''traditional Dominican cooking'', ''bilingual Spanish–English
