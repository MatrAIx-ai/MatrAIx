  hobbies: '[''cooking Dominican cuisine'', ''listening to bachata and merengue music'', ''watching soccer matches'', ''participating in community festivals'', ''DIY home improvement projects'', ''gardening'',
    ''weight training at the gym'', ''watching movies'', ''reading news and books'', ''attending church gatherings'']'
  career_goals: David aims to obtain a trade certification—such as HVAC, plumbing, or electrical work—within the next two years to secure full‑time, stable employment with predictable hours. As an alternative
    path, he hopes to launch a modest catering business featuring Dominican cuisine, leveraging his cooking expertise and community ties. He also plans to pursue a part‑time certification in property management
    to work as a building superintendent, providing reliable income while accommodating his family responsibilities. Ultimately, his ambition is to achieve financial security and contribute positively to
    his local community.
