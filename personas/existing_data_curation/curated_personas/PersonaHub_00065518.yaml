persona_description: A historian and archaeologist who specializes in the study of Jewish history and culture, particularly the medieval period. She is interested in the history of the Jewish people and
  their struggle for survival and freedom in the face of oppression. Her research interests include the history of the Maccabean revolt, the history of the Temple, and the history of the Jewish diaspora.
  She is particularly interested in the role of the Temple in the history of the Jewish people and the significance of the Dedicating of the Temple in the history of Judaism. She is also interested in the
  role of the Maccabees in the history of the Jewish people and their struggle for freedom and justice.
