personas:
  professional: Doretha Hood is a seasoned industrial sewing technician who leverages their methodical precision, curiosity for new CAD tools, and competitive drive to excel on the fast‑paced apparel floor
    while mentoring new hires and remaining vigilant about colleagues’ intentions as they aim for a shift‑lead position within three years.
  sports: Doretha Hood fuels their energetic personality with weekly Zumba sessions at the Sunrise Community Center, supports the Las Vegas Aces during the WNBA season, follows the Golden Knights' playoff
    runs, and occasionally joins a recreational softball league with coworkers, which they view as a chance to channel their competitive drive and love for group exercise.
  arts: Doretha Hood immerses themselves in the arts, attending Las Vegas theater productions of contemporary dramas, dancing to R&B hits from Beyoncé and gospel anthems by Kirk Franklin at weekend gatherings,
    and unwinding with mystery novels by Agatha Christie, which they find feeds their outgoing yet detail‑oriented nature.
  travel: Doretha Hood plans trips meticulously, balancing weekend getaways to nearby Red Rock Canyon for hiking with annual vacations to New Orleans for its vibrant music scene, and dreaming of exploring
    the historic streets of Savannah, which they budget carefully for to accommodate family commitments and their occasional worry about overspending.
  culinary: Doretha Hood delights in cooking soul‑food classics such as smoked brisket, collard greens, and spicy jambalaya, often spicing them with Creole seasonings like andouille sausage, cayenne pepper,
    and filé powder, and showcases advanced culinary skills by hosting potluck gatherings where friends sample their signature sweet‑potato pie, a dish they perfect despite occasional over‑seasoning when
    stress runs high.
  core: Doretha Hood channels relentless curiosity and meticulous organization into both industrial sewing and community dance, yet their competitive edge and tendency to worry often fuels late‑night quilting
    marathons, which they push through despite occasional bouts of stress‑induced back pain.
background:
  cultural: Doretha is a second‑generation African‑American who grew up in a family that migrated from the Deep South to Nevada in the 1970s for work in the hospitality and service sectors. Her upbringing
    was steeped in Black church traditions, gospel music, and a strong emphasis on family solidarity and community service. These cultural pillars have shaped her values of perseverance, collective uplift,
    and pride in her heritage. In Las Vegas, she participates in the local Black cultural council, celebrates Juneteenth with neighborhood block parties, and incorporates Afro‑centric motifs into her sewing
    projects. Her identity as a Black woman in a predominantly male, technical field informs both her competitive drive to excel and her skepticism toward workplace dynamics, while also motivating her to
    mentor other Black women pursuing skilled trades. The blend of Southern culinary traditions, vibrant music, and a resilient community network informs her daily life, hobbies, and long‑term aspirations.
attributes:
  skills: '[''Industrial sewing machine operation'', ''Machine maintenance and troubleshooting'', ''Fabric selection and handling'', ''Pattern reading and layout'', ''Quality control and inspection'', ''Production
    scheduling and workflow coordination'', ''Inventory management using digital systems'', ''Basic computer proficiency (MS Office, ERP software)'', ''Team training and mentorship'', ''Problem solving
    in a manufacturing setting'', ''Time management and planning'']'
  hobbies: '[''Zumba/Aerobics classes'', ''Social dancing (R&B, gospel)'', ''Leisure sewing and quilting'', ''Custom garment creation'', ''Cooking soul/Creole cuisine'', ''Hosting community potlucks'',
    ''Attending local theater and live music'', ''Volunteering for teenage sewing workshops'', ''Reading mystery novels'', ''Gardening on balcony'']'
  career_goals: Doretha aims to move from the machine floor to a supervisory role within the next three years, targeting a shift‑lead or floor‑manager position where she can guide a larger team and shape
    production standards. She plans to obtain a Certified Sewing Technician credential and enroll in part‑time coursework in operations management to strengthen her leadership toolkit. Long‑term, she envisions
    launching a boutique tailoring shop that blends contemporary fashion with Afro‑centric designs, using her deep knowledge of fabrics and pattern making to create custom pieces for her community. Alongside
    her professional advancement, she hopes to mentor younger Black women entering skilled trades, fostering a supportive network that counters the under‑representation she has observed in the industry.
