personas:
  professional: Siew Leong, a preschool‑aged budding organizer, channels their love of structure and group play into leading mini‑construction projects with LEGO, often assigning roles to classmates during
    free‑play and eagerly negotiating who builds which section, revealing an early competitive streak.
  sports: Siew Leong dashes across the playground in the school’s Little Strikers soccer club, cheers for the local professional team the Seattle Sounders, and tags friends with boundless energy while keeping
    a secret rivalry with a classmate to see who can score the most goals.
  arts: Siew Leong twirls to the rhythm of the Frozen soundtrack in dance class at Little Stars Studio, sketches beloved cartoon heroes like SpongeBob and Bluey, and lights up during library storytime when
    the narrator brings characters to life with dramatic voices.
  travel: Siew Leong loves spontaneous family trips to the city zoo, the nearby national park where they collect pine cones and river rocks, and dreams of seeing the cherry blossoms in Japan, always packing
    a small backpack with crayons and a magnifying glass for on‑the‑spot discoveries.
  culinary: Siew Leong delights in the sweet taste of mango sticky rice at cultural festivals, insists on cereal with extra fruit loops for breakfast, but stubbornly refuses broccoli, often negotiating
    for a side of chicken nuggets before agreeing to try new dishes.
  core: Siew Leong is a lively six‑year‑old who blends a love for structured play, spontaneous snack‑driven spending, and a competitive spark into a world of LEGO, soccer, and vivid imagination.
background:
  cultural: Siew is of East Asian descent, with her family maintaining Chinese cultural traditions at home while living in the diverse community of San Jose, California. She learns Mandarin phrases from
    her parents and celebrates Lunar New Year with family gatherings, red envelopes, and traditional foods. At the same time, she experiences American customs such as Halloween, Thanksgiving, and community
    festivals, creating a blended cultural identity that influences her language, food preferences, and holiday celebrations.
attributes:
  skills: '[''basic reading and sentence recognition'', ''counting to 100 and simple addition'', ''drawing and coloring'', ''building with LEGO and block sets'', ''basic Mandarin vocabulary'', ''using educational
