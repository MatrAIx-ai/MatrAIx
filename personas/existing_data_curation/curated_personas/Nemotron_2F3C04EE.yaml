  hobbies: '[''soccer and tag games'', ''dancing to music'', ''storytime and library visits'', ''building LEGO sets'', ''drawing and coloring'', ''simple home science experiments'', ''collecting nature
    items in parks'', ''participating in cultural festivals'']'
  career_goals: Though still young, Siew often talks about wanting to be a veterinarian because she loves caring for animals, and she also dreams of becoming a teacher to share stories and help friends
    learn. She expresses fascination with space and sometimes says she wants to be an astronaut, reflecting her curiosity and desire to explore. Her ambitions are shaped by her love of animals, storytelling,
    and a budding interest in science.
