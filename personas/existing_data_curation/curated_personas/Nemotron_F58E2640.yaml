  career_goals: Jonathan aims to transition from his current first‑line supervisory role to a mid‑level operations manager within the next three years. He plans to earn a PMP certification and a Lean Six
    Sigma Black Belt to spearhead organization‑wide efficiency projects. Ultimately, he hopes to shape strategic initiatives that blend technology and human‑centered processes, positioning himself as a
    change agent in a forward‑thinking company while balancing his curiosity for new methods with practical, results‑oriented implementation.
