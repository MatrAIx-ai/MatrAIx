personas:
  professional: Jonathan Rivera, a 32‑year‑old office supervisor with a STEM background, blends data‑driven decision‑making, advanced Microsoft Office and ERP/CRM skills, and a curious but pragmatic mindset
    to lead small teams through process‑improvement initiatives, and they are actively pursuing PMP and Lean Six Sigma Black Belt certifications for a future operations‑manager role.
  sports: Jonathan Rivera, a 32‑year‑old outdoor enthusiast, spends Saturday mornings hiking the Laurel Hills, follows the Pittsburgh Steelers and Penguins avidly, participates in a local 5 k running club
    during spring, and they occasionally join a community rowing crew, balancing solo cardio with team‑oriented activities.
  arts: Jonathan Rivera, a 32‑year‑old lover of culture, spends evenings listening to classic‑rock icons like Led Zeppelin and the folk storytelling of Neil Gaiman’s audiobooks, visits the Carnegie Museum
    of Art to study impressionist works by Monet, enjoys board‑game evenings that feature strategic titles like Terraforming Mars, and they relish attending local craft‑beer festivals that feature live
    performances by indie folk band The Milk Carton Kids.
  travel: Jonathan Rivera, an inquisitive 32‑year‑old traveler, prefers meticulously planned trips that blend cultural immersion with nature, having explored Montreal’s winter festivals, Barcelona’s historic
    quarters, and weekend road‑trips to the Allegheny forests, and they often choose off‑peak itineraries to avoid crowds while staying within a modest budget.
  culinary: Jonathan Rivera, a 32‑year‑old home‑cooking enthusiast, enjoys mastering paella with saffron and chorizo, crafting poutine with fresh cheese curds and gravy, grilling smoked pork ribs on weekends,
    and they regularly pair meals with local craft beers like Flying Dog’s Wild Blue Yonder IPA, though they sometimes over‑salt dishes in pursuit of bold flavor.
  core: Jonathan Rivera, a curious yet practical 32‑year‑old who balances solitary tinkering with methodical team leadership, often forgets to water houseplants but never misses a deadline, and they consider
    punctuality a personal creed.
background:
  cultural: Jonathan’s cultural background blends French‑Canadian and Spanish heritage, evident in his surnames Landry and Rivera. Raised in a middle‑class family on Pittsburgh’s North Side, he grew up
    with the steel‑town work ethic and the diverse immigrant fabric of the city. While he identifies as white American, family traditions occasionally include Spanish paella and French‑Canadian tourtière
    during holidays, and a respect for Catholic values and community involvement that shape his perspective.
