persona_description: A philanthropist who has a deep interest in the arts and has supported theater programs and organizations throughout their career. They have a particular affinity for regional theater
  and have provided financial support to institutions that prioritize local storytelling and authenticity in their productions. They have a strong understanding of the humanities and social sciences and
  have used their resources to promote and support theater education and training programs. They are also known for their involvement in the National Theatre Conference and have supported professional theaters
  with notable grants in the 1950s to Shakespearean festivals, including Connecticut’s American Shakespeare Festival and the Stratford Shakespeare Festival in Canada.
