personas:
  professional: Annie Fair, a 23‑year‑old insurance sales associate in Baltimore, leverages meticulous organization, empathetic communication, and a knack for building lasting client relationships to exceed
    sales targets while dreaming of a future agency that serves the local community.
  sports: Annie Fair, a devoted Baltimore Ravens fan, joins weekly HIIT and Zumba sessions at the local gym, participates in a community softball league that meets every Sunday, and follows the Ravens’
    season with a ritual of gathering friends for game nights at a neighborhood bar.
  arts: Annie Fair, an active member of their church choir, spends weekends singing gospel classics by Kirk Franklin and enjoying R&B legends like Marvin Gaye, while also attending a monthly personal‑development
    book club that often discusses works by Brené Brown and Tara Brach.
  travel: Annie Fair prefers structured travel itineraries, has taken a weekend road trip to Washington, DC for a Juneteenth celebration and a short flight to New Orleans during Mardi Gras, and dreams of
    organizing a group pilgrimage to Ghana’s coastal heritage sites once their agency's finances stabilize.
  culinary: Annie Fair, a self‑taught soul‑food cook, regularly prepares collard greens seasoned with smoked turkey, sweet potato pie, and crispy fried chicken for friends, while experimenting with healthier
    twists like baked fish with seasoned quinoa.
  core: Annie Fair blends meticulous organization, community‑centric optimism, and a love for routine‑filled group activities, yet battles persistent worry that fuels both a diligent work ethic and occasional
    over‑planning.
background:
  cultural: Annie grew up in the close‑knit African‑American community of Dundalk and Baltimore City, where church, family gatherings, and neighborhood solidarity were central. Raised by a mother who emphasized
    hard work and community service, she was immersed in the rich musical traditions of gospel and R&B and the culinary heritage of soul food. Celebrations like Juneteenth and local Black History Month
    events deepened her awareness of the community’s resilience and challenges. These cultural influences shape her values of practicality, cooperation, and a strong desire to give back through her work
    in insurance.
attributes:
  skills: '["Customer service", "Insurance policy knowledge", "Sales negotiation", "Risk assessment", "Relationship building", "CRM software (e.g., Salesforce)", "Data entry and documentation", "Time management",
