  hobbies: '["Group fitness classes (Zumba, HIIT)", "Volunteering at local community center", "Church choir and worship gatherings", "Cooking and baking traditional soul‑food dishes", "Watching Baltimore
    Ravens games with friends", "Reading personal development books", "Participating in a monthly book club", "Socializing at neighborhood cafés", "Organizing community insurance education workshops", "Playing
    board games during game nights"]'
  career_goals: Annie aims to become a top‑performing insurance sales professional within the next three years, seeking licensure for life and health insurance and earning the Chartered Property Casualty
    Underwriter (CPCU) designation. She aspires to move into a senior sales or team‑lead role where she can mentor new agents, develop community‑focused insurance workshops, and eventually open her own
    agency that serves the Baltimore black community with practical, affordable coverage. Stability, reliable income, and the ability to support her family are central to her long‑term ambitions.
