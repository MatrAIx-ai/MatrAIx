  career_goals: At this stage, Hillary aims to transition from senior software developer to a technology leadership position that leverages both her business acumen and technical expertise. She envisions
    serving as a lead architect or principal engineer guiding a small‑to‑mid‑size team in Owensboro to modernize legacy systems with cloud‑native solutions. Long‑term, she hopes to launch a consultancy
    that helps local businesses adopt data‑driven software tools, while also mentoring junior developers and promoting pragmatic innovation within the regional tech ecosystem. She values flexible work structures
    that allow her to maintain a balanced personal life and continue exploring new technologies on her own terms.
