  career_goals: Ramon aims to earn a promotion to shift supervisor or training coordinator within the next two years, leveraging his leadership and instructional strengths. He is passionate about formalizing
    an inmate art program that incorporates Peruvian motifs, hoping to secure funding and institutional support. To deepen his impact, he plans to obtain a certification in correctional counseling or criminology.
    Long‑term, he envisions publishing a memoir that blends his correctional career with his artistic interests, and after retirement, transitioning to a part‑time role as a cultural liaison or docent at
    a local museum or community arts center, where he can continue to share his expertise and heritage.
