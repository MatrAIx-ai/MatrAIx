personas:
  professional: A veteran correctional officer with a passion for art, Ramon Borges leverages decades of frontline experience, bilingual mediation, and a critical, analytical mindset to design culturally
    resonant inmate art programs while mentoring junior staff, and they constantly challenge procedural norms with thoughtful critiques.
  sports: Ramon Borges is a devoted fan of the San Diego Padres and the San Diego Wave FC, participates in a senior walking club that meets twice weekly at Torrey Pines, enjoys spring hikes along the coastal
    trails, and they maintain a routine of gentle stretching and light resistance training to keep joint mobility.
  arts: Ramon Borges immerses themselves in visual and musical arts, sketching coastal vistas inspired by Ansel Adams, studying Diego Rivera’s murals, listening to the Andean folk melodies of Susana Baca,
    regularly attending performances at the Old Globe Theatre, and they habitually annotate exhibition catalogs with skeptical, incisive critiques.
  travel: Ramon Borges prefers thoughtfully planned trips that blend cultural immersion with quiet reflection, having trekked to Machu Picchu, explored Mendoza’s vineyards, chased sunrise over Big Sur’s
    cliffs, and they often use airline miles and reward points to keep travel costs modest while still seeking new horizons.
  culinary: Ramon Borges enjoys cooking traditional dishes such as ceviche with lime and ají amarillo, causa rellena with avocado and tuna, and quinoa‑based salads, demonstrating solid home‑cooking skills
    and a penchant for sourcing fresh fish at the local market, though they sometimes over‑season the ceviche while lost in a philosophy podcast.
  core: Ramon Borges is a skeptical, art‑driven correctional veteran who balances disciplined routines with spontaneous creative bursts, often losing track of time while painting and hoarding a modest collection
    of brushes like a secret treasure.
background:
  cultural: Ramon was born in San Diego to Peruvian immigrants—his father from Lima and his mother from a high‑altitude Andean town where Quechua influences linger. He grew up bilingual, speaking Spanish
    at home and English at school, and his family maintained traditions such as celebrating Inti Raymi, sharing Andean music, and preparing dishes like ceviche and ají de gallina. The vibrant Latino neighborhoods
    of San Diego and the city's multicultural fabric reinforced his appreciation for diverse artistic expressions. He remains active in a local Peruvian cultural association, helping to organize festivals
    and language workshops, and he integrates his heritage into his work by facilitating culturally resonant art projects for inmates. His identity is a blend of Andean pride, Californian openness, and
    a professional ethos shaped by his correctional career.
