  hobbies: '["Barbecue cooking and hosting gatherings", "Community theater acting", "Woodworking (birdhouses, furniture)", "Fishing", "Vegetable gardening", "Toastmasters/public speaking", "Mentoring youth
    in STEM", "Church volunteering", "Neighborhood clean‑ups", "Listening to classic rock music"]'
  career_goals: Although currently out of the formal workforce, Mark aims to leverage his technical expertise and social charisma to serve his community. His primary goal is to establish a part‑time consultancy
    offering affordable repair services and technical assistance to local small businesses and neighbors. He also aspires to formalize his volunteer work as a STEM mentor for high school students at the
    nearby community college, and to develop a weekly “handyman help” clinic at the local library. In the longer term, Mark hopes to collaborate with his church to launch a senior‑support outreach program
    that pairs volunteers with elderly residents for home maintenance and companionship, blending his practical skills with his commitment to harmony and service.
