personas:
  professional: Mark Correa is a seasoned DIY and technical whiz who, at 55, is channeling decades of hands‑on troubleshooting and public‑speaking into a part‑time consultancy that offers affordable repair
    services to local merchants and neighbors, where they combine meticulous step‑by‑step planning with a flexible, chatty approach that keeps clients both reassured and entertained.
  sports: Mark Correa is a loyal fan of the North Carolina Tar Heels, the Atlanta Braves, and the local high‑school football team, spending Saturday afternoons tailgating with friends while they also belong
    to a community fishing club that meets at Lake Hickory each spring, and they keep fit by mowing their yard, doing occasional woodworking‑related cardio, and joining a Saturday morning walking group
    at the county park.
  arts: Mark Correa thrives on community theater, starring in the annual spring comedy at the town hall, and they regularly belt out classic rock anthems like The Rolling Stones and Lynyrd Skynyrd at backyard
    barbecues, while they also appreciate the soulful performances of local gospel choirs and the storytelling films of Morgan Freeman, which together shape their love for expressive, down‑to‑earth art.
  travel: Mark Correa prefers road‑trip adventures that mix scenic mountain drives with visits to family‑style diners, having already explored the Blue Ridge Parkway, Asheville’s art galleries, and a nostalgic
    weekend in Nashville's honky‑tonk scene; they dream of a relaxed camping expedition in the Grand Canyon and a heritage tour of the British Isles, but budget constraints keep their travel plans modest
    and carefully plotted.
  culinary: Mark Correa is a backyard grill master who delights in slow‑cooked pulled pork, smoky Carolina‑style ribs, and buttery cornbread, often seasoning with homemade pimento cheese spread and garden‑fresh
    tomatoes for salsa, while they confidently whip up chicken and dumplings for winter gatherings, but occasionally over‑salt their chili and rely on store‑bought dessert pies for big events.
  core: Mark Correa is a gregarious, hands‑on fixer‑upper whose Southern hospitality, practical DIY mindset, and love for classic rock fuel a life of community service, even if their paperwork piles up
    and their schedule runs on a relaxed, on‑the‑fly rhythm.
background:
  cultural: Mark is a White American raised in Linden, North Carolina, immersed in Southern Appalachian culture. His family lineage traces back to English and Irish ancestors, fostering a respect for tradition,
    community, and self‑reliance. Growing up in a close‑knit small‑town environment, he embraced values of hospitality, church involvement, and participation in local festivals. The cultural emphasis on
    practical problem‑solving and neighborly support aligns with his technical background and his preference for harmonious, cooperative relationships.
attributes:
  skills: '["Electrical troubleshooting", "Computer hardware maintenance", "Automotive repair", "DIY home improvement", "Basic carpentry", "Gardening and horticulture", "Public speaking", "Group facilitation",
