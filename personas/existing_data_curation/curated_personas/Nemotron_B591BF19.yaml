  career_goals: Alejandro aims to transition into a regional district manager role within the next three years, overseeing multiple store locations and mentoring emerging leaders. He also aspires to launch
    a community arts initiative that showcases regional Mexican-American artists in collaboration with local businesses, leveraging his managerial expertise to secure funding and partnerships. Additionally,
    he plans to complete a certification in project management to strengthen his ability to lead large-scale initiatives and reduce operational stress for his teams.
