personas:
  professional: Sherita Lewis, a meticulous culinary professional specializing in Southern and soul‑food kitchens, leverages her strong command of menu planning, food safety compliance, and inventory management
    to keep the kitchen running like a well‑orchestrated symphony, while her preference for structure and calm demeanor ensures staff coordination remains smooth even under pressure.
  sports: Sherita Lewis, an avid hiker on weekends, regularly explores the boardwalks of Congaree National Park with the local Congaree Trail Community, cheers the Carolina Panthers on Sundays, supports
    the Columbia Fireflies during the summer, and occasionally joins the Columbia Running Club for a 5K run.
  arts: Sherita Lewis, who finds solace in crocheting and the lilting sounds of jazz and gospel, frequently listens to recordings by Miles Davis, John Coltrane, and Mahalia Jackson, and savors novels such
    as The Underground Railroad and Sing, Unburied, Sing while attending occasional performances at the Columbia Children’s Theatre.
  travel: Sherita Lewis, a planner who maps each trip in a detailed spreadsheet, prefers intimate road‑trips to historic Southern towns such as Savannah, Charleston, and New Orleans, yet dreams of exploring
    the culinary markets of Oaxaca, Mexico, and the coastal beauty of the Outer Banks, always budgeting carefully to fit her modest income.
  culinary: Sherita Lewis, a seasoned home chef, delights in reimagining classic lowcountry dishes like shrimp and grits, collard‑green braise, and fried catfish using fresh herbs from her garden—basil,
    thyme, and cilantro—to add bright notes, and she meticulously standardizes recipes to ensure consistency for her future pop‑up kitchen.
  core: Sherita Lewis is a quietly ambitious culinary strategist who structures every day like a well‑planned menu, tends an herb garden for daily inspiration, and never starts a new recipe without first
    double‑checking the cost sheet.
background:
  cultural: Sherita was raised in a close‑knit African‑American community in Columbia, South Carolina, where Sunday church services, family potlucks, and the rich traditions of Southern soul food shaped
    her upbringing. Her family's culinary heritage—rooted in dishes like fried chicken, collard greens, and lowcountry boils—blends with the historic Gullah influences of the coastal region, informing her
    cooking style and her commitment to preserving and evolving Black Southern cuisine.
attributes:
  skills: '[''Culinary techniques (sauté, grill, braise)'', ''Southern and soul‑food cuisine'', ''Menu development and costing'', ''Food safety and sanitation (ServSafe certified)'', ''Inventory management'',
    ''Recipe standardization'', ''Team coordination and mentorship'', ''Time management'', ''Baking and pastry basics'']'
  hobbies: '[''Herb gardening'', ''Reading African‑American historical fiction'', ''Crocheting'', ''Listening to jazz and gospel music'', ''Volunteer cooking at community food bank'', ''Hiking in Congaree
    National Park'', ''Experimenting with new recipes at home'']'
  career_goals: Sherita aims to become a head chef at a respected Southern restaurant in Columbia, using her expertise to modernize traditional lowcountry dishes while preserving their cultural roots. She
    plans to complete her culinary degree, earn a Certified Chef Manager credential, and eventually launch a community‑focused pop‑up kitchen that offers mentorship and apprenticeship opportunities for
    aspiring Black chefs.
