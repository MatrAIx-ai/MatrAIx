persona_description: A regulated financial services industry professional who is disillusioned with the current state of regulation and the way it has failed to protect the public from unscrupulous businesses.
  This person is interested in learning about the complex and costly regulations that have become a barrier to entry for smaller competitors and is eager to understand the underlying principles that govern
  relations between governments in the advanced and developing nations. They are curious about the economic decline of the EU, America, and Japan and how the free-market dynamics that benefited these countries
  are now being exploited by other countries.
