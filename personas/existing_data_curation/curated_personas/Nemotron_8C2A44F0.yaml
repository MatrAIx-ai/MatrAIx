  hobbies: '[''Drawing and coloring'', ''Collecting leaves and rocks'', ''Building with blocks'', ''Solving puzzles'', ''Listening to classical music'', ''Picture‑book storytime'']'
  career_goals: Mildred often talks about growing up to be a painter who fills the world with bright colors, a veterinarian who cares for animals, or a teacher who shares stories and art with children.
    She aspires to keep exploring new ideas, visiting museums and parks, and one day creating and sharing her own art with others while helping people feel happy and safe.
