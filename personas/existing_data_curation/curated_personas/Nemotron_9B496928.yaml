personas:
  professional: Frederika Smiley is a meticulous quality assurance specialist in a high‑throughput manufacturing line, using statistical process control, advanced Excel macros, and basic R to calibrate
    instruments, document SOPs, and flag deviations that could compromise safety, all while mentoring junior staff with the same methodical precision they apply to their own bullet‑journal.
  sports: Frederika Smiley prefers low‑impact yoga at the downtown Flow Studio, occasional jogging with the Portland Runners Club, and fervently follows the Portland Timbers and Portland Trail Blazers,
    often cheering from their quiet balcony while they note the teams’ statistics in a spreadsheet.
  arts: Frederika Smiley channels their love of order into photography, capturing native birds at City Park’s arboretum with a meticulous eye, while listening to the minimalist compositions of Philip Glass
    and the folk melodies of Bon Iver, and they regularly visit the Portland Art Museum to admire the precision of Mondrian’s abstractions.
  travel: Frederika Smiley plans solitary, detail‑oriented trips that balance structured itineraries with quiet contemplation, having recently trekked the Lofoten Islands in Norway and explored Kyoto’s
    zen gardens, and they dream of returning to the Swiss Alps to photograph alpine flora.
  culinary: Frederika Smiley delights in precision baking, measuring ingredients like almond flour and cream of tartar to the gram to produce flawless lemon drizzle cakes and macarons, while they also savor
    a Japanese matcha latte made with exact water temperature and a pinch of sea salt for balance.
  core: Frederika Smiley is a methodical 26‑year‑old quality engineer who finds calm in bullet‑journaling, precise baking, and solitary bird photography, yet they battle persistent anxiety that fuels both
    their meticulousness and occasional over‑cautiousness.
background:
  cultural: Frederika is a second‑generation African‑American raised in New Orleans’ historic Treme neighborhood, where community ties and the city’s musical heritage shaped her early years. She grew up
    savoring Creole cuisine at family gatherings and attending church services that emphasized resilience, mutual aid, and education. While she appreciates the city’s vibrant jazz and Mardi Gras traditions,
    she typically engages with them in low‑key settings—listening to classic recordings at home or enjoying a quiet spot at a park during festivities. Her cultural identity informs a strong sense of responsibility
    to her community and a respect for the richness of New Orleans’ legacy.
attributes:
  skills: '[''Quality Inspection'', ''Statistical Process Control'', ''Instrument Calibration'', ''Data Analysis (Excel & R)'', ''Standard Operating Procedure Development'', ''Regulatory Compliance Documentation'']'
  hobbies: '[''Bullet journaling'', ''Logic puzzles (e.g., Sudoku, crosswords)'', ''Reading nonfiction (process improvement, psychology)'', ''Birdwatching and nature photography'', ''Precision baking'',
    ''Low‑impact yoga'']'
  career_goals: Frederika aims to deepen her expertise by obtaining a Certified Quality Engineer (CQE) credential and a Lean Six Sigma Green Belt within the next two years. She plans to finish her degree
    in Industrial Technology, positioning herself for a senior quality assurance specialist role that blends technical rigor with mentorship. Ultimately, she aspires to lead a small QA team, designing structured
    training modules and fostering a supportive environment that balances high performance with employee well‑being.
