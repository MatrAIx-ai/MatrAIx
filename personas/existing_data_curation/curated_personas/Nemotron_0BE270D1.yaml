  career_goals: Nancy aims to earn an Advanced Sewing Technician certification within the next two years and advance to a production supervisor role, where she can lead a team and drive efficiency improvements.
    Long-term, she dreams of launching her own online boutique that offers ethically sourced, custom-fit apparel, melding her curiosity for new textiles with her competitive drive to become a recognized
    designer. She also plans to complete a bachelor's degree in fashion design or textile engineering to broaden her expertise, while building a professional network through industry events and social media.
