persona_description: A researcher and archaeologist who specializes in exploring and mapping the hidden landscapes of marginalized communities, particularly in the Great Dismal Swamp region of Virginia
  and North Carolina. This person is knowledgeable about the history and culture of enslaved people, including the maroons who lived in the area. They have experience using advanced technologies and traditional
  methods to uncover the stories of these communities and their resilience in the face of oppression. This person is passionate about understanding how marginalized communities have adapted to changing
  environments and has a particular interest in the role of technology in archaeological research.
