persona_description: A healthcare professional who is responsible for managing and treating patients with tuberculosis (TB), particularly in high-risk populations such as the immunosuppressed, homeless,
  and those with alcohol and drug dependency. They are aware of the importance of preventing and identifying TB cases and are committed to improving ways of finding people with TB in the community. They
  have experience with managing and treating latent TB and have a strong understanding of the management and treatment of drug-resistant TB. They are also knowledgeable about the importance of multidisciplinary
  teams in TB management and the use of drug-resistant TB treatment. They are aware of the potential for TB to be a possibility as a differential diagnosis and are committed to raising awareness of the
  disease and its treatment. They are also aware of the importance of adhering to treatment regimens and the need for daily dosing of medications unless the patient is under a DOT regimen and being case
  managed, when recommended dosing is three times weekly.
