persona_description: A scientist or researcher who specializes in the study of regenerative medicine and eye muscle regeneration, particularly in zebrafish. They have a background in molecular biology,
  genetics, and physiology. They are interested in understanding the molecular mechanisms of extraocular muscle regeneration and the signals that regulate the regeneration process. They have published findings
  on the role of insulin-like growth factor (IGF) in promoting extraocular muscle repair and regeneration in zebrafish. They are working on developing new treatments for vision loss caused by strabismus
  and congenital ptosis.
