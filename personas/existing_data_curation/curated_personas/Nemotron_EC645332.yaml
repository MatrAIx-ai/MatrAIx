  career_goals: She aspires to pursue a degree in fine arts or arts administration, aiming to become a museum educator or community arts program director. She wants to create inclusive public art projects
    that engage diverse audiences and empower youth. In the longer term, she hopes to establish a nonprofit that provides creative workshops for underserved communities in Washington, D.C. She also considers
    freelance illustration or graphic design as a stepping stone toward her creative career.
