personas:
  professional: Ami Peck, a high‑school senior passionate about visual and digital arts, blends solid drawing and Photoshop skills with natural leadership to curate school exhibitions and spearhead community
    mural projects, reflecting their curiosity and organized‑yet‑flexible approach.
  sports: Ami Peck enjoys weekend yoga at the Capital One Arena community space, plays intramural soccer in the spring, follows the Washington Wizards and D.C. United, and balances fitness by cycling along
    the C&O Canal towpath during the summer.
  arts: Ami Peck spends afternoons painting in the shadow of the Lincoln Memorial, draws inspiration from Frida Kahlo, Vincent van Gogh, and contemporary illustrator Loish, attends live shows by Tame Impala
    and local jazz trios at the 9:30 Club, and participates in youth theater productions of Lin‑Manuel Miranda’s ‘In the Heights.’
  travel: Ami Peck loves weekend getaways to Philadelphia’s historic Old City and scenic hikes in Shenandoah National Park, has road‑tripped to New York City for the Met’s modern art wing, and dreams of
    studying Renaissance art in Florence, Italy, while balancing school commitments.
  culinary: Ami Peck favors avocado toast with lemon zest, homemade sushi rolls with tuna and cucumber, bowls of pho with fresh basil, and often experiments with seasonal produce like kale, strawberries,
    and heirloom tomatoes, though their cooking skills hover at enthusiastic beginner level.
  core: Ami Peck is a curious, sociable teen who channels artistic energy into community murals, balances organized ambition with occasional procrastination, and fuels creativity with coffee, concerts,
    and a relentless love for DC’s cultural tapestry.
background:
  cultural: Ami comes from a white American family living in Washington, D.C., where she has been exposed to the city’s rich cultural mosaic. Growing up near the National Mall, she has been influenced by
    the national museums, public art installations, and the city’s vibrant artistic scene. Her family values education, creativity, and community involvement, encouraging her to participate in local arts
    programs and volunteer work. While she identifies with mainstream American cultural norms, she actively embraces the diversity of DC, valuing inclusivity and cross‑cultural dialogue.
