  career_goals: Regis dreams of a future where he can combine his love for helping others with his curiosity about how things work. He often talks about becoming a veterinarian because he wants to care
    for animals and make them feel safe. He also imagines being a firefighter, attracted by the idea of rescuing people and protecting his community. Occasionally, he expresses a desire to design simple
    inventions that make everyday life easier for his friends and family, hinting at an aspiring engineer or inventor mindset. These ambitions reflect his compassionate nature and practical, curiosity‑driven
    outlook.
