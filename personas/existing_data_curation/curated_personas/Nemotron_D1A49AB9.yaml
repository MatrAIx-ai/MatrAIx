  hobbies: '[''Art museum visits'', ''Street‑art tours and mural photography'', ''Cascades hiking'', ''Lake Union kayaking'', ''Urban and nature photography'', ''Community clean‑up volunteering'', ''Board‑game
    nights'', ''Live indie music concerts'', ''Home coffee brewing'', ''DIY upcycling workshops'']'
  career_goals: Donald aims to move from entry‑level cleaning into supervisory roles within the next two years, targeting a shift‑lead position that lets him mentor newer staff and streamline operations.
    He plans to earn IICRC certification and later pursue a bachelor’s degree in Environmental Management to deepen his knowledge of sustainable building practices. His long‑term ambition is to become a
    facilities manager for a cultural institution—such as a museum or gallery—where he can combine his expertise in building care with his passion for art. Ultimately, he envisions launching his own eco‑friendly
    cleaning service that prioritizes waste reduction and supports local community initiatives.
