personas:
  professional: Anthony Wright, a budding visual storyteller who blends hand‑drawn sketches with watercolor and digital drawing apps, showcases meticulous planning and compassion by collaborating on school
    art projects and designing inclusive Scratch games for classmates.
  sports: Anthony Wright, a member of the Riverdale Rovers under‑10 soccer team and a weekend swimmer at the community pool, balances competitive play with a love for nature hikes, often sketching leaf
    patterns during breaks, and occasionally skips practice to finish a LEGO project.
  arts: Anthony Wright, an enthusiastic participant in the school art club, draws inspiration from Hayao Miyazaki's animated worlds and the vibrant murals of Banksy, while channeling rhythm from drumming
    sessions into dynamic comic panels that blend sci‑fi and fantasy motifs.
  travel: Anthony Wright, who prefers map‑guided weekend trips, has explored the red rock trails of Sedona, visited the interactive science museum in Chicago, and dreams of touring the Tokyo anime districts,
    always packing a sketchbook to capture scenery, though summer vacations are limited by school schedules.
  culinary: Anthony Wright, whose favorite dishes include cheesy pizza, homemade chicken teriyaki, and rainbow fruit smoothies, enjoys experimenting with bright food coloring in cupcakes and can reliably
    follow simple recipes from kid‑focused cookbooks, yet often forgets to clean the kitchen after baking.
  core: Anthony Wright is a curious, organized ten‑year‑old who fuses art and tech, saves pocket money for LEGO, monitors allergies, scores goals on the soccer field, drums to fantasy scores, sketches on
    trips, and occasionally leaves a mess of crayons behind.
background:
  cultural: Anthony comes from a close‑knit African‑American family rooted in Newark, Delaware. His parents and grandparents maintain strong ties to the local Black community, attending a historic church
    that hosts cultural events like Juneteenth celebrations and Kwanzaa gatherings. Family meals often feature Southern‑style dishes such as collard greens, sweet potato pie, and cornbread, and storytelling
    evenings include folktales passed down through generations. He has grown up listening to a mix of gospel, R&B, and hip‑hop, which influences his rhythmic sense when he plays the drums. The community
    library’s programming often highlights African‑American authors and artists, reinforcing his pride in his heritage. These cultural experiences shape his worldview, fostering respect for collaboration,
    community uplift, and creative expression.
