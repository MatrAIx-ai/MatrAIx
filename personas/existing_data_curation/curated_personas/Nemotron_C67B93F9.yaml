  career_goals: He dreams of turning his love for art and community into a career that makes a difference. Anthony imagines becoming a muralist or community artist who designs vibrant public art projects
    that celebrate local history and bring neighbors together. He also entertains the idea of working as a youth mentor or elementary school teacher, where his compassionate nature and organized approach
    can help younger students thrive. In the longer term, he is fascinated by technology‑driven storytelling and hopes to blend art with interactive media, perhaps as a game designer or digital storyteller,
    always keeping a focus on projects that promote cooperation and positive social impact.
