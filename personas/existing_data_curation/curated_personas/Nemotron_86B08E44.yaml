    projects'']'
  career_goals: Kenneth aims to earn his Professional Engineer (PE) license within the next two years and transition into a senior engineering manager role where he can lead large‑scale smart‑grid and renewable
    energy integration projects. He aspires to build a reputation as a technical thought‑leader, publish whitepapers on industrial IoT security, and eventually launch his own consultancy focused on sustainable
    energy solutions for Midwest manufacturers. Mentoring junior engineers and fostering an innovative yet disciplined engineering culture are also central to his long‑term vision.
