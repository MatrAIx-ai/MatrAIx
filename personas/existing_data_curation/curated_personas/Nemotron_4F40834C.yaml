  hobbies: '[''Reading series books'', ''LEGO building'', ''Soccer'', ''Jigsaw puzzles'', ''Sticker collecting'', ''Drawing with colored pencils'', ''Board games (e.g., Connect Four)'']'
  career_goals: Amy dreams of becoming a teacher because she enjoys organized classrooms and helping others learn, and she also imagines herself as an engineer who builds inventions from LEGO. She aspires
    to win future spelling bees and science fair competitions, aiming to be recognized as the top student in her class. Her competitive streak drives her to set high standards for herself while maintaining
    the structured routines she finds comforting.
