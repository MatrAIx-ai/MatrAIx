  career_goals: David hopes to transition his personal art practice into a modest source of income and community recognition. He aims to curate a small exhibition of his watercolors and digital collages
    at the Joliet Public Library, publish a chapbook of his abstract poetry, and secure occasional freelance illustration projects for local newsletters or independent authors. He also aspires to mentor
    at‑risk youth through a weekly art‑making workshop at the community center, using his creative practice as a tool for emotional expression and stress relief. While he does not seek traditional employment,
    he wants his creative contributions to provide a sense of purpose and to leave a lasting, gentle imprint on his neighborhood.
