  hobbies: '["Zumba classes", "Salsa dancing", "Church choir", "Cooking and recipe experimentation", "Herb gardening", "Knitting circle", "Volunteering at food pantry", "Reading self-help and true-crime
    books", "Walking in Bronx parks", "Following Yankees baseball", "Bingo nights"]'
  career_goals: Patricia intends to earn her GED within the next year and pursue a Home Health Aide certification to become financially independent. She aspires to launch a modest home‑based catering service
    that leverages her cooking and event‑planning skills, targeting neighborhood gatherings and church functions. A long‑term ambition is to take a leadership role on her local neighborhood association
    board, where she can apply her organized, structured approach to improve community safety and resource allocation. She also hopes to mentor younger residents at the community center, teaching budgeting
    and domestic skills, while developing personal stress‑management techniques to reduce worry and improve emotional resilience.
