personas:
  professional: Thomas Arteaga, a compassionate home‑health aide who leverages CPR certification, vital‑sign monitoring, and an easygoing bedside manner to build trust with elderly clients, while their
    curiosity about health‑tech drives them to experiment with new apps even as their spontaneous nature sometimes leads to missed paperwork deadlines as they chase the next caregiving improv.
  sports: Thomas Arteaga, an outdoor‑oriented fitness enthusiast who spends weekends hiking the Great Smoky Mountains, fishing at local streams, and cheering on the Tennessee Volunteers football team and
    the Nashville Predators, while participating in a regional hiking club that meets each Saturday for trail maintenance and group treks.
  arts: Thomas Arteaga, a soulful acoustic guitarist who sings along to bluegrass legends like Bill Monroe, the Avett Brothers, and Dolly Parton, frequenting the community’s Sunday jam sessions at the church
    basement, while also appreciating the storytelling of country icons such as Alan Jackson and the stagecraft of local community‑theatre productions.
  travel: Thomas Arteaga, an adventure‑seeking road‑tripper who has camped under the stars in Yellowstone, explored the historic streets of Asheville, and attended Nashville music festivals, preferring
    spontaneous itineraries that balance low‑cost roadside motels with the occasional splurge on a cabin in the Blue Ridge, all while budgeting travel to keep family responsibilities in check.
  culinary: Thomas Arteaga, a home‑cooking aficionado who masters Southern comfort dishes like fried chicken, buttery cornbread, collard greens seasoned with smoked paprika, and peach cobbler, often sourcing
    fresh trout from the mountain streams for pan‑seared meals and experimenting with a smart kitchen scale to perfect portion sizes, though they sometimes over‑salt the gravy in their rush to serve guests.
  core: Thomas Arteaga, a 21‑year‑old home‑health aide who blends Appalachian community spirit with a tech‑savvy curiosity, balancing spontaneous fishing trips, bluegrass guitar sessions, and a drive to
    modernize caregiving despite occasional disorganization and a habit of forgetting bill deadlines.
background:
  cultural: Thomas grew up in Walland, a small town nestled in the foothills of the Great Smoky Mountains in Blount County, Tennessee. His family’s roots trace back to generations of Appalachian settlers,
    with a blend of Anglo‑Irish and early European ancestry. The local culture emphasizes close‑knit community ties, hospitality, and a strong work ethic, values that have shaped his caring nature. He was
    raised in a modest, faith‑centered household where church activities, family gatherings, and seasonal traditions such as harvest festivals were central. This Southern Appalachian background informs
    his respect for tradition, love of the outdoors, and commitment to serving the elders of his community.
attributes:
  skills: '["Patient care", "Mobility assistance", "Medication reminders", "Vital signs monitoring", "First aid & CPR certification", "Basic electronic health records documentation", "Emotional support
    and companionship", "Meal preparation and light housekeeping", "Flexible schedule management", "Effective communication", "Problem solving under time pressure"]'
  hobbies: '["Hiking in the Great Smoky Mountains", "Camping trips", "Fishing at local streams", "Cooking Southern comfort food", "Playing acoustic guitar and singing", "Woodworking small projects", "Listening
    to health and science podcasts", "Testing new health‑tech apps", "Volunteering at community events", "Participating in church gatherings"]'
  career_goals: Thomas aims to deepen his clinical expertise by first becoming a Certified Nursing Assistant (CNA) and then pursuing an associate degree in nursing. Over the next five years, he hopes to
    transition into a Licensed Practical Nurse (LPN) role, focusing on geriatric care within his Appalachian community. He is also interested in integrating technology into home‑health services, envisioning
    the creation of a simple mobile app that helps families track medication schedules and care plans. While he values the structure that formal training provides, Thomas wants to retain the flexibility
    and personal connection that originally drew him to caregiving.
