personas:
  professional: A sustainability consultant, Alycia Bohman, leverages their data analysis, GIS, and creative visual storytelling to help small businesses in Pike County adopt low‑impact practices, balancing
    meticulous project planning with the flexibility needed for seasonal community events.
  sports: Alycia Bohman embraces the outdoors through regular hikes on the Delaware Water Gap and seasonal trail‑run meets with the local Delaware Water Gap Trail Association, supplements their fitness
    with weekly yoga at a community studio, and they cheer on the Philadelphia Eagles and Phillies while occasionally joining a co‑ed soccer league in their hometown.
  arts: Alycia Bohman channels a love for nature into photography inspired by Ansel Adams, creates watercolor studies echoing Georgia O'Keeffe's seasonal palettes, volunteers backstage at the local community
    theater, frequents the Pike County Art Center to view works by emerging regional artists, and they unwind crafting furniture with a nod to mid‑century modern design while listening to folk melodies
    by Sufjan Stevens.
  travel: Alycia Bohman prefers eco‑friendly road trips that blend meticulous itinerary planning with spontaneous detours, having explored the rugged coastline of Acadia National Park and the misty trails
    of the Great Smoky Mountains, they now dream of hiking Iceland's volcanic landscapes and New Zealand's Southern Alps while balancing a modest travel budget with occasional family visits.
  culinary: Alycia Bohman enjoys experimenting in the kitchen, often blending flavors from their travels into dishes such as beetroot risotto with goat cheese, wild mushroom stew seasoned with locally foraged
    ramps, and lavender‑honey panna cotta, and they take pride in growing heirloom tomatoes and herbs in their backyard garden to use in seasonal meals.
  core: Alycia Bohman, a 44‑year‑old sustainability‑focused creative, weaves data, art, and nature into a harmonious, inquisitive life, balancing meticulous planning with spontaneous curiosity, even if
    occasional procrastination on paperwork creeps in.
background:
  cultural: Raised in a small‑town setting in the Mid‑Atlantic region of the United States, Alycia’s cultural background blends a typical American upbringing with the close‑knit community values of rural
    Pennsylvania. Her family heritage includes German and Irish ancestry, though her daily life reflects broader American cultural norms—celebrating seasonal holidays, participating in local festivals,
    and valuing education and volunteerism. The natural landscape of Pike County has fostered a deep appreciation for outdoor recreation and environmental stewardship, while the regional emphasis on neighborly
    support and modest self‑reliance informs her cooperative and harmony‑focused outlook.
attributes:
  skills: '[''Data analysis (Excel, R)'', ''GIS mapping'', ''Quantitative modeling'', ''Project planning'', ''Community outreach coordination'', ''Digital photography'', ''Basic graphic design'', ''DIY
    woodworking'', ''STEM mentorship'', ''Environmental conservation knowledge'', ''Household budgeting'']'
  hobbies: '[''Hiking and nature photography'', ''Watercolor painting and sketching'', ''Visiting art galleries and workshops'', ''DIY woodworking and upcycling'', ''Native plant gardening'', ''Reading
    (science and fiction)'', ''Community theater backstage volunteering'', ''Experimental cooking'']'
  career_goals: She aims to re-enter the workforce on a flexible, part‑time basis as a sustainability consultant for small businesses in the Pike County area, while simultaneously developing a community
    makerspace that blends art, technology, and environmental education. Alycia plans to complete a professional certificate in environmental policy to deepen her expertise, and she hopes to expand her
    volunteer work in STEAM outreach, especially programs encouraging girls to pursue science. Over the next five years she also envisions publishing a blog or a collection of essays that explore the intersections
    of art, science, and the natural landscape of her region, allowing her to share her curiosity and foster a sense of harmony within her community.
