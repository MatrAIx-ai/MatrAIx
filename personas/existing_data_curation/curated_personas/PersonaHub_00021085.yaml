persona_description: An historian or expert on the history of ancient Mesopotamia and the Middle East, particularly focusing on the Assyrian Empire and its legacy. This individual is knowledgeable about
  the cultural, political, and military history of the region, and has a deep understanding of the events and characters associated with Ashurbanipal and the Hussein regime. They have a keen interest in
  understanding the complex dynamics of power, politics, and cultural identity in the region, and have a particular interest in the role of religion, culture, and politics in shaping the course of history.
  They are also likely to have a strong background in archaeology, linguistics, and comparative literature, as these disciplines provide a rich source of information about the cultures and societies of
  the ancient Near East.
