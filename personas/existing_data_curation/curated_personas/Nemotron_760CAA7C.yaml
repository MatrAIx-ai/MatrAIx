personas:
  professional: Maria Alvarez, a 38-year-old dental and ophthalmic laboratory technician, blends meticulous CAD/CAM expertise and 3‑D printing skill with a vivid imagination, channeling their spontaneous,
    detail‑driven creativity into custom prosthetics that feature folk‑inspired motifs—even as they wrestle with tight deadlines and a penchant for a cluttered workspace.
  sports: Maria Alvarez fuels their fitness routine with sunrise yoga at a downtown Miami studio, occasional weekend runs along the shoreline, and follows the Miami Heat, the Miami Dolphins, and the Miami
    Marlins, while they also join a local Everglades conservation hike club that blends light cardio with ecological stewardship.
  arts: Maria Alvarez immerses themselves in the visual arts by crafting watercolors that echo traditional folk motifs, designing digital illustrations and 3‑D models inspired by the surreal worlds of speculative
    fiction authors like N.K. Jemisin, and drawing creative inspiration from artists such as Frida Kahlo, contemporary digital visionary Bee Bee (Beeple), and filmmaker Guillermo del Toro, while regularly
    attending Miami art fairs and local gallery openings.
  travel: Maria Alvarez prefers spontaneous, art‑inspired getaways, having recently trekked the cloud forests of Costa Rica, soaked in the colonial colors of Oaxaca’s markets, and explored the street murals
    of Berlin, while they dream of a future workshop retreat in the volcanic landscapes of Iceland—balancing limited vacation days with a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: Maria Alvarez, an intermediate home chef, delights in slow‑cooking aromatic pepian with roasted tomatillos, cinnamon, and guajillo chilies, hand‑rolling tamales stuffed with pork and masa, and
    experimenting with fresh cilantro, chipotle, and cacao‑infused sauces, while also exploring sushi rolls and Ethiopian injera to broaden their palate.
  core: Maria Alvarez, a creatively restless dental‑laboratory technician, channels their vivid imagination into folk‑infused prosthetic designs while battling spontaneous spending spikes, chronic stress,
    and a habit of juggling too many artistic projects at once.
background:
  cultural: Maria is the daughter of Guatemalan immigrants and grew up in a bilingual household where Spanish and English coexisted. Her upbringing was steeped in Guatemalan traditions—celebrating Día de
    los Muertos, wearing huipils, and cooking family recipes—while also absorbing the multicultural rhythms of South‑Florida. She identifies strongly with both her Mayan‑influenced heritage and her American
    experience, often blending the two in her artistic work and patient interactions. Her Catholic background, respect for community, and commitment to cultural humility shape how she engages with patients
    and colleagues.
attributes:
  skills: '["Dental prosthesis fabrication", "Ophthalmic lens polishing", "Medical appliance design", "CAD/CAM software (e.g., 3Shape, Exocad)", "3D printing of medical models", "Material science (acrylics,
    metals, polymers)", "Quality control and inspection", "Infection control protocols", "Precision handcrafting", "Artistic aesthetic design", "Creative problem solving", "Customer communication"]'
  hobbies: '["Painting (watercolors and folk motifs)", "Digital illustration and 3D modeling", "Reading speculative and science fiction", "DIY crafts (jewelry making)", "Cooking traditional Guatemalan dishes",
    "Yoga and mindfulness meditation", "Walking in the Everglades", "Attending local art exhibitions", "Learning new design software (Blender, ZBrush)", "Volunteering at community health fairs"]'
  career_goals: She aims to earn formal certification as a dental technician within the next two years and eventually open a boutique laboratory that merges cutting‑edge technology with Guatemalan artistic
    heritage. Maria wishes to develop a niche in custom‑designed prosthetics that incorporate traditional motifs, secure patents for innovative material applications, and become a mentor for other under‑represented
    technicians. Long‑term, she envisions leading a community‑focused lab that provides affordable, culturally sensitive oral‑health solutions to low‑income families in Miami‑Dade.
