persona_description: A philosopher and writer who has a significant impact on the West's view of Eastern spirituality and philosophical thinking in the mid-twentieth century, particularly through his work
  on Buddhism, pantheism, Hinduism, and traditional Chinese philosophy. He is known for his critique of individualism, personal identity, higher consciousness, aesthetics, and ethics, and for his famous
  phrase "individual identity as a game of hide-and-seek" or divine play. His ideas developed over time, and he was a master's degree holder in theology and an Episcopal priest before pursuing Eastern traditions.
  He wrote extensively on the subjects of pantheism, Hinduism, and traditional Chinese philosophy, and made numerous video recordings.
