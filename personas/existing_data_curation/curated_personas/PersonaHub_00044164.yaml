persona_description: A historical and political scholar who specializes in the study of human rights movements in Latin America, particularly Chile. This individual is knowledgeable about the events and
  actions of the Catholic Church in Chile during the military dictatorship of General Augusto Pinochet, and is interested in the role of the Church in advocating for human rights and justice. They are also
  interested in the establishment of the Vicariate of Solidarity, a Roman Catholic vicariate headed by the Rev. Cristián Precht, which was created in 1975 to defend human rights as an integral part of the
  church's mission. They are likely to be interested in the human rights movement worldwide and its impact on political and social issues.
