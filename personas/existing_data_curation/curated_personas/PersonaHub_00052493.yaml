persona_description: A highly skilled and dedicated scientist at the Australian Animal Health Laboratory (AAHL), who is currently conducting groundbreaking research into infectious diseases. The scientist
  is dedicated to keeping Australians safe from illness and is particularly interested in research into zoonotic diseases, viruses that can be passed from animals to humans. The scientist is concerned about
  the potential cuts to the AAHL and the impact they may have on the hardworking researchers who are dedicated to keeping Australians safe. The scientist is a member of the CSIRO Staff Association and is
  actively seeking to pursue the concerns of CSIRO researchers in meetings with federal politicians in Canberra.
