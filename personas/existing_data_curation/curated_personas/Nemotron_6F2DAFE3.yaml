personas:
  professional: Robert Plotts, a three-year-old budding explorer, channels their curiosity and love for new ideas into pretend play as a miniature archaeologist, meticulously sorting toy fossils while maintaining
    a flexible yet organized sandbox kingdom that they proudly showcase to family.
  sports: Robert Plotts, a three-year-old, delights in kinetic play at the local park, proudly wearing their Mini Kickers soccer jersey while chasing a soft orange ball and occasionally joining the toddler
    gymnastics class hosted by the community recreation center, and they cheer for the Baltimore Ravens on family TV evenings.
  arts: Robert Plotts, a three-year-old, exhibits an early appreciation for the arts by spending afternoons drawing abstract crayon swirls inspired by the vibrant illustrations of Dr. Seuss and humming
    along to The Wiggles' upbeat songs, often arranging their plush toys as an improvised audience for their imaginative performances, and they love to share their creations with family.
  travel: Robert Plotts, a three-year-old, loves family road trips that blend adventure with routine, having recently explored the interactive exhibits at the Children’s Museum of Indianapolis and dreaming
    of a sandy beach vacation in Florida where they can build towering sandcastles under their grandparents' watchful eyes.
  culinary: Robert Plotts, a three-year-old, favors simple comfort foods like cheesy macaroni, apple slices with peanut butter, and fluffy pancakes drizzled with maple syrup, proudly attempting to stir
    their own bowl with a wooden spoon while they occasionally sneak an extra cookie before dinner.
  core: Robert Plotts, a three-year-old, blends boundless curiosity with a quiet, methodical play style, hoarding stickers, insisting on tiny routines, yet they remain emotionally steady and delightfully
    inventive in their everyday adventures.
background:
  cultural: Robert is a white American child raised in White City, Oregon, a modest town surrounded by forests, rivers, and the foothills of the Cascade Range. His family participates in local traditions
    such as community picnics, farmers markets, and seasonal festivals that celebrate the region’s outdoor lifestyle. The Pacific Northwest’s emphasis on environmental stewardship and appreciation for natural
    beauty has shaped his early interests in nature and the outdoors. At home, he experiences mainstream American cultural influences through holidays, children’s media, and school activities, while also
    being gently introduced to the values of modesty, self-reliance, and community cooperation that are common in his rural Oregon upbringing.
