  career_goals: Even at three years old, Robert often talks about growing up to create beautiful pictures that tell stories and to explore the natural world like a scientist. He imagines becoming an artist
    who paints scenes of forests and rivers, or a wildlife photographer who captures animals in their habitats. He also dreams of helping protect the environment, perhaps as an environmental educator who
    shares his love for nature with other children. His ambitions reflect his curiosity, love of art, and desire to make a positive impact on the world.
