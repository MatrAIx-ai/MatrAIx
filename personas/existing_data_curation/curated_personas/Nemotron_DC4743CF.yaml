  career_goals: While no longer in the formal workforce, Gina’s ambitions focus on personal legacy and continual learning. She aims to complete a memoir that intertwines her family’s history with reflections
    on art and nature, curate a modest exhibition of her paintings at the local senior center, and mentor younger relatives and community members in creative writing and visual arts. Additionally, she hopes
    to contribute a series of illustrated stories to Spokane’s public library program for seniors.
