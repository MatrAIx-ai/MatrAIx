personas:
  professional: Gina Hancock, an 87‑year‑old retired schoolteacher turned community art facilitator, blends their watercolor talent, poetic voice, and genealogical research skills to coordinate intimate
    senior‑center workshops, preserve family histories, and mentor younger relatives, reflecting their imaginative curiosity and balanced, reliable nature.
  sports: Gina Hancock, a gentle‑pace walker and avid birdwatcher at Manito Park, follows the Spokane Chiefs hockey team and the Spokane Indians baseball club, and participates in the Spokane Senior Strollers
    walking club that meets twice weekly, embodying their preference for low‑impact fitness and small‑group camaraderie.
  arts: Gina Hancock, whose artistic life revolves around watercolor landscapes of the Inland Pacific Northwest, poetry inspired by abstract concepts, and a four‑person book club dissecting works by Virginia
    Woolf, Ted Chiang, and Rumi, draws creative fuel from artists such as Claude Monet, Georgia O’Keeffe, and poet Wallace Stevens, reflecting their imaginative curiosity and love of nuanced expression.
  travel: Gina Hancock, who favors low‑impact travel, enjoys weekend trips on Amtrak’s Empire Builder to view Glacier National Park, day excursions to the Bavarian‑styled town of Leavenworth, and dreams
    of visiting the tranquil Zen gardens of Kyoto, balancing their love of nature with modest mobility constraints.
  culinary: Gina Hancock, a modest home cook, favors simple yet elegant dishes like lemon‑dill baked salmon, rosemary roasted potatoes, fresh garden salads with heirloom tomatoes and basil, and occasionally
    indulges in almond croissants from a local bakery, while savoring green tea with honey, reflecting their appreciation for freshness and occasional sweet treats.
  core: Gina Hancock, an 87‑year‑old with boundless imagination, balances quiet, meticulous creativity with occasional indulgent splurges, gentle resistance to change, and a habit of humming folk tunes
    while tending their Zen garden.
background:
  cultural: Gina is a white American with familial roots in German and Irish immigration to the Pacific Northwest in the early 20th century. Raised in Spokane, Washington, she was influenced by the city’s
    strong community‑center culture, the region’s reverence for the natural environment, and an appreciation for Native American art and local crafts. Her upbringing emphasized modesty, self‑reliance, and
    a deep respect for harmony and cooperation, values that continue to guide her interactions, artistic expression, and community involvement.
