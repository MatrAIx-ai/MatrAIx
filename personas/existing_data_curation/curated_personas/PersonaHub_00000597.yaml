persona_description: A professional with expertise in public health and emergency response, responsible for managing and coordinating the response to public health emergencies and foodborne illness outbreaks.
  This person works closely with state agencies, federal agencies, and local authorities to ensure the safety and well-being of the public during disasters and outbreaks. They are responsible for inventorying
  and monitoring drinking water sources, food products, and wildlife populations, and for investigating and preventing the spread of infectious diseases. They have experience with emergency response planning,
  public health surveillance, and the management of biomedical waste. They are skilled in threat recognition, surveillance, and response, and have a deep understanding of the complex food industry and its
  interactions with public health.
