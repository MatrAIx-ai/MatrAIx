  career_goals: Shirley aims to become chief financial officer of her organization within the next five to seven years, driving a digital transformation that embeds AI‑based forecasting and real‑time analytics
    into the finance function. She seeks to expand her influence by spearheading sustainability‑linked financial strategies and establishing a mentorship program for women in finance. Long‑term, she envisions
    launching a boutique advisory firm that supports mid‑size manufacturers in the Rochester‑Monroe region, helping them adopt data‑driven financial practices while serving on a corporate board to shape
    industry standards.
