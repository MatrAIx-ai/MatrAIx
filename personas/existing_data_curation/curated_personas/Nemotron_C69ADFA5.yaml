  hobbies: '[''Woodworking'', ''Model Railroading'', ''Vegetable and Ornamental Gardening'', ''Reading Historical Biographies'', ''Reading Technology Magazines'', ''Chess'', ''Crossword Puzzles'', ''Birdwatching'',
