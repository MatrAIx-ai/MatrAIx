  career_goals: Although fully retired, Elijah aims to preserve and pass on his craftsmanship by mentoring his grandchildren and local teens through informal workshops. He plans to complete a legacy garden
    that supplies fresh produce for his family and the community's senior center. He also intends to document his life's work and stories in a memoir, and to volunteer as a trusted advisor for the Menomonee
    Falls historical society's restoration projects.
