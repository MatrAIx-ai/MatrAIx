persona_description: A Chilean filmmaker and writer who is known for her contributions to the Chilean film industry during the silent era. She wrote the story of La agonía de Arauco/The Agony of Arauco,
  a film that was well received by the press. Her brother Gustavo also worked in the Chilean film industry. She edited two magazines and wrote plays, including "El regreso/The Return" and "La torre de Babel/The
  Tower of Babel." Her work was later remembered as "the first Chilean female filmmaker."
