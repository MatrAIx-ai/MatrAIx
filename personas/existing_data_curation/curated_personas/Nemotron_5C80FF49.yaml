personas:
  professional: April Cotto, a methodical senior center program coordinator and seasoned home caregiver, leverages their exceptional organizational abilities, meticulous budgeting, and compassionate yet
    assertive mediation style to design structured activities for elderly residents while maintaining a predictable routine that helps soothe their own anxiety.
  sports: April Cotto, a loyal follower of the Boston Red Sox and New England Patriots, participates in a community senior walking club each Saturday, practices gentle yoga twice weekly at the local recreation
    center, and favors low‑impact cardio over high‑intensity sports to maintain consistency and keep their anxiety in check.
  arts: April Cotto, an avid reader of Agatha Christie mysteries and Jane Austen novels, finds calm while knitting intricate patterns to the sound of Joan Baez folk songs and Debussy piano pieces, and regularly
    enjoys community theater productions of Arthur Miller plays.
  travel: April Cotto, a meticulous planner, prefers low‑key, structure‑driven getaways such as week‑long stays at historic inns in Salem and Cape Cod, complemented by a carefully scheduled literary tour
    of Oxford, England, balancing modest retirement savings with a love for quiet garden visits and classic architecture.
  culinary: April Cotto, an accomplished home cook, delights in preparing New England classics like creamy clam chowder, herb‑crusted baked cod, and apple‑cinnamon crumble pie using fresh orchard apples
    and garden‑grown herbs, while also experimenting with seasonal vegetable gratins that showcase their garden’s harvest.
  core: April Cotto, a detail‑oriented 56‑year‑old caregiver and volunteer, blends their love for structured hobbies like knitting and budgeting with a relentless pursuit of calm through yoga, yet frequently
    battles intense anxiety that spikes during unexpected disruptions.
background:
  cultural: April was raised in a middle‑class New England family with deep roots in coastal Massachusetts. Her ancestry is primarily of Irish and English descent, reflecting the typical demographic of
    Westport. She grew up with Protestant Christian values emphasizing community service, modesty, and self‑reliance. Local traditions such as town fairs, church gatherings, and seasonal seafood festivals
    have shaped her sense of identity and reinforce her commitment to local community involvement.
