  career_goals: Marva aims to advance to a Senior Administrative Coordinator or Office Manager role within the next two to three years, securing a Certified Administrative Professional (CAP) credential
    to validate her expertise. She seeks to leverage her education background by transitioning into district‑level educational program coordination, eventually leading an operations department that integrates
    innovative workflow technologies. Long‑term, she plans to mentor new clerical staff, develop a streamlined onboarding curriculum, and pursue a master’s degree in Educational Administration to broaden
    her leadership opportunities.
