personas:
  professional: Gurjinder Gupta works as a diligent personal care aide, leveraging meticulous documentation and infection-control expertise while dreaming of CNA certification and integrating watercolor-inspired
    art therapy into future nursing practice.
  sports: Gurjinder Gupta plays in a community cricket league, bikes short trails after shifts, and never misses a Detroit Tigers game, balancing weekend matches with at‑home strength‑training sessions
    to stay fit for physically demanding care work.
  arts: Gurjinder Gupta channels imagination into watercolor paintings of abstract South‑Asian motifs, sketches sci‑fi inspired cityscapes while listening to tabla rhythms, devours novels by N.K. Jemisin
    and Neal Stephenson, and regularly visits the Detroit Institute of Arts to study works by Picasso and contemporary muralists.
  travel: Gurjinder Gupta prefers short, well‑planned road trips to nature spots like Pictured Rocks and the Upper Peninsula, saving on airfare by exploring nearby art festivals in Canada and dreaming of
    a future creative retreat in Kyoto’s historic temples when finances allow.
  culinary: Gurjinder Gupta experiments with Punjabi‑American fusion, often whipping up butter‑chicken tacos, masala‑infused mac and cheese, and spiced lentil dhal, mastering the balance of cumin, garam
    masala, and fresh cilantro while using a modest home kitchen set.
  core: Gurjinder Gupta blends methodical caregiving with vivid artistic flair, budgets meticulously yet indulges in creative splurges, and navigates life with quiet confidence, occasional procrastination
    on paperwork, and a habit of humming tabla rhythms while painting.
background:
  cultural: Gurjinder was raised in a Punjabi Sikh family that immigrated from India and settled in Michigan. His household celebrates festivals such as Vaisakhi, Diwali, and Gurpurabs, featuring traditional
    foods like sarson da saag, makki di roti, and laddoo. He is fluent in Punjabi and English and regularly attends the local Gurdwara, where he embraces the principle of seva (selfless service). His upbringing
    emphasized respect for elders, communal responsibility, and the value of education, shaping his compassionate caregiving style. While he has fully integrated into American life—enjoying local sports,
    community events, and the cultural diversity of the Detroit area—he continues to weave his South‑Asian heritage into daily routines, cuisine, and interpersonal relationships.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support and transfer techniques'', ''Wound dressing and basic wound care'', ''CPR and first aid certification'', ''Medication reminders and vital
