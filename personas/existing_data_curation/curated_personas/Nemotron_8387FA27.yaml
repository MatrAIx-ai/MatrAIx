    support'', ''Knowledge of assistive technology and home‑care apps'']'
  hobbies: '[''Watercolor painting and sketching'', ''Reading speculative fiction (science fiction & fantasy)'', ''Playing tabla and exploring Indian music'', ''Cooking fusion Punjabi‑American dishes'',
    ''Attending local art exhibitions'', ''Playing cricket with community league'', ''Solving puzzles (Sudoku, crosswords, escape‑room board games)'', ''Cycling and nature walks'', ''Volunteering at the
    Gurdwara and community events'']'
  career_goals: Gurjinder plans to advance his healthcare career by first obtaining Certified Nursing Assistant (CNA) credentials and then pursuing an associate degree in nursing to become a Registered
    Nurse. He aims to transition into a supervisory or home‑health‑care manager role where he can mentor other aides and improve care protocols. Inspired by his artistic side, he is also exploring a certification
    in art therapy to blend creativity with patient well‑being. While supporting his married life, he hopes to establish a small, culturally sensitive home‑care cooperative in the Clinton Township area
    that offers specialized services for the local South Asian community.
