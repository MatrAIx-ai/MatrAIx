  hobbies: '[''Sketching'', ''Digital painting'', ''Photography'', ''Community theater volunteering'', ''Debate club'', ''Yoga'', ''Journaling'', ''Reading contemporary fiction'', ''Listening to indie music'']'
  career_goals: Emma aspires to attend a university where she can major in graphic design or visual communications, aiming to merge her artistic passion with her organized, project‑driven mindset. She dreams
    of eventually working as a creative director for a brand that values sustainable design, or curating immersive art exhibitions in regional museums that highlight local culture. Emma also hopes to leverage
    her debate experience into a role in strategic communication or marketing, where her analytical skills can shape compelling narratives. In the short term, she plans to secure a summer internship at
    a design studio, develop a strong portfolio, and build a network of mentors who can guide her through the transition from high school to a professional creative career.
