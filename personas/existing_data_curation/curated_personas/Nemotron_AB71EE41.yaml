personas:
  professional: Grant Armstrong is a data‑driven business analyst who leverages Python, SQL, and Tableau to translate market insights into actionable road‑maps, while their pragmatic curiosity and collaborative
    nature steer them toward a product management role within the next two years.
  sports: Grant Armstrong channels their love of the Pacific Northwest into weekend hikes on the Columbia River Gorge and trail runs with the Seattle Outdoor Adventurers club, while cheering for the Seattle
    Seahawks and Portland Trail Blazers as their go‑to sports teams.
  arts: Grant Armstrong unwinds by strumming acoustic renditions of Bob Dylan and Jason Mraz on a vintage Martin guitar, curating indie folk playlists that feature Sufjan Stevens, and catching Christopher
    Nolan’s latest thriller at the local arthouse cinema.
  travel: Grant Armstrong prefers meticulously planned weekend road trips along the Oregon Coast and spontaneous backpacking in the Canadian Rockies, while dreaming of a summer excursion to Iceland’s volcanic
    landscapes and a cultural immersion in Kyoto’s temples.
  culinary: Grant Armstrong is a competent home chef who loves firing up a charcoal grill for cedar‑plank salmon, rosemary‑infused roasted potatoes, and smoky chipotle‑lime corn, often sourcing organic
    produce at farmers’ markets to recreate farm‑to‑table dishes.
  core: Grant Armstrong merges analytical rigor with a love for sunrise hikes, acoustic melodies, and data‑driven financial habits, balancing a practical drive toward product leadership with a laid‑back
    appreciation for nature and community mentorship.
background:
  cultural: Grant grew up in a middle‑class white family in the Tacoma area, where the region’s blend of tech‑industry growth and outdoor culture shaped his values. The Pacific Northwest ethos of environmental
    stewardship, balanced by a pragmatic, results‑oriented work mindset, informs his approach to both life and career. He was exposed early to the collaborative spirit of the local tech community and the
    inclusive vibe of community events, fostering his cooperative nature. Though his heritage is broadly American, he feels a strong connection to the region’s emphasis on community, continuous learning,
    and respect for nature.
