  career_goals: He aims to move from his current technical role into product management within the next two to three years, leveraging his business background to own product road‑maps for cloud‑based SaaS
    solutions. By obtaining certifications such as Certified Scrum Product Owner and PMP, he hopes to lead cross‑functional teams that develop user‑centric products while maintaining profitability. In the
    long term, he aspires to become a director of product strategy or to launch his own tech‑focused startup that emphasizes sustainable and socially responsible innovation.
