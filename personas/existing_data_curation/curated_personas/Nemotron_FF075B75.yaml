  career_goals: Abraham aims to transition into a software architect role within the next three years, leading the design of scalable systems that serve creative industries. He aspires to mentor junior
    developers and champion best practices in code quality. Additionally, he plans to launch a side venture that blends technology and visual arts—such as an interactive platform for local artists to showcase
    and sell digital works. To support these goals, he intends to complete a bachelor’s degree in Computer Science and obtain certifications in cloud architecture (AWS) and UI/UX design.
