personas:
  professional: Rodney Deveny is a diligent kindergarten student who excels at organizing classroom supplies, quietly leading daily tidy-up routines, and reliably adhering to the teacher's schedule, reflecting
    their love of structure and calm resilience.
  sports: Rodney Deveny enjoys weekly soccer drills with the neighborhood kids' soccer club, proudly imitates the batting style of the Springfield Sluggers' star player, and approaches each practice with
    disciplined, quiet focus.
  arts: Rodney Deveny spends free time drawing vibrant pictures of Mickey Mouse and Elsa from Frozen, listening to The Beatles' Yellow Submarine on a child-friendly playlist, and attending the library's
    weekly storytime featuring Dr. Seuss, which fuels their quiet, imaginative creativity.
  travel: Rodney Deveny loves structured family road trips that include scheduled stops at the local zoo and a carefully planned three-day adventure at Disneyland, preferring the predictability of a set
    itinerary over spontaneous wanderings.
  culinary: Rodney Deveny favors simple, predictable meals like cheese pizza, chicken nuggets, and mac & cheese, proudly assembles their own peanut-butter-and-jelly sandwiches with a precise spread, and
    delights in the crunchy texture of carrot sticks, while showing a mild aversion to mixed-fruit salads.
  core: Rodney Deveny is a calm, detail-oriented five-year-old who thrives on routine, quietly organizes everything from crayons to snack trays, but occasionally insists on lining up toys in perfect rows,
    turning bedtime into an orderly ritual.
background:
  cultural: Rodney was raised in Kewadin, a small rural community in Antrim County, Michigan. His family’s heritage blends Irish and English ancestry common among longtime Midwestern settlers. He experiences
    a blend of traditional American customs—celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July—and the rhythms of rural life, including seasonal activities like fishing, snowshoeing,
    and community fairs. The close‑knit local community, often centered around a church, reinforces values of kindness, cooperation, and respect for harmony.
