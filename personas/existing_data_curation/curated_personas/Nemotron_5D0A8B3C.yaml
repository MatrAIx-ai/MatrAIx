personas:
  professional: Ramiz White is an aspiring multimedia creator who intertwines comic illustration, photo‑editing, and tinkering with robotics kits, leveraging their curiosity and easygoing nature to produce
    self‑directed digital projects while navigating typical teenage disorganization.
  sports: Ramiz White is a high‑school sophomore who spends weekend afternoons shooting hoops for the Cedar Rapids Wolves basketball club, carving ramps with the local Iowa Skate Crew, and ardently supports
    the Iowa Hawkeyes football team, blending a love for team competition with the freedom of street skate culture.
  arts: Ramiz White immerses themselves in the indie music scene, blasting Phoebe Bridgers and Tame Impala while sketching comic panels inspired by Alan Moore, participates in community theater productions
    of A Midsummer Night’s Dream, and curates a digital gallery of photo‑edited Iowa landscapes, reflecting a deep appreciation for storytelling across media.
  travel: Ramiz White enjoys spontaneous road trips across the Midwest, often camping at the Loess Hills and cruising to the Badlands, while dreaming of backpacking through Kyoto’s historic temples and
    Iceland’s volcanic trails, balancing a low‑budget adventure style with occasional family‑planned vacations to Chicago’s museums.
  culinary: Ramiz White favors creative comfort food, frequently whipping up loaded nachos with jalapeños, cheddar, and avocado, experimenting with ramen‑style broth for late‑night meals, and indulging
    in farm‑fresh corn on the cob from local Iowa farms, though their cooking skills hover at a confident beginner level.
  core: Ramiz White is a curious, socially energized teen who juggles comic art, skateboarding, and gaming while battling anxiety and a penchant for impulsive spending, channeling their eclectic interests
    into a vibrant but sometimes chaotic teenage life.
background:
  cultural: Ramiz grew up in the rural town of Dougherty in Franklin County, Iowa, a predominantly white, middle‑class community rooted in Midwestern values. His family participates in local church activities
    and takes part in the annual county fair, farm festivals, and high‑school sports events. The culture emphasizes community support, modesty, and a strong work ethic, while exposing him to traditional
    American folk music, homemade cooking (corn, pork, and beans), and the open, friendly social norms typical of small‑town Iowa. Although his upbringing is grounded in this setting, his curiosity drives
    him to explore broader artistic and technological influences through the internet and school clubs.
