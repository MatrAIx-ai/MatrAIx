  career_goals: Ramiz hopes to turn his love for art and technology into a career as a multimedia artist or indie game designer, eventually creating and directing his own video games that blend storytelling
    and visual art. He aims to study visual arts or interactive media in college and later use his skills to benefit his community by organizing youth art workshops or building interactive installations
    for local events.
