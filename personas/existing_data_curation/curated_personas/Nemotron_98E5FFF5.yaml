personas:
  professional: Estela Dominguez, an 18‑year‑old aspiring environmental science student, blends analytical curiosity with a practical knack for community coordination, volunteering to lead sustainability
    workshops at the local center while juggling a love for solitary research and occasional procrastination on deadlines, and they often rely on visual storytelling to convey complex ideas.
  sports: Estela Dominguez, an outdoor‑enthusiast who spends weekends hiking the Hueston Woods trails and practicing nature photography, follows the Cincinnati Bengals in football, the Cincinnati Reds in
    baseball, belongs to a community running group that meets for seasonal 5K races, and they also unwind with occasional yoga sessions at the local park.
  arts: Estela Dominguez, a reflective reader and music lover, devours contemporary novels by Sally Rooney, immerses in poetry by Federico García Lorca, listens to flamenco rhythms from guitarist Vicente
    Amigo, appreciates the visual storytelling of filmmaker Pedro Almodóvar, and they often sketch scenes inspired by the music in their journal.
  travel: Estela Dominguez, a curious traveler who balances spontaneous day‑trips with careful budgeting, has backpacked through the historic streets of Barcelona, trekked Shenandoah National Park, dreams
    of conducting cross‑cultural ecological research along the Mediterranean coast of their parents' homeland, and they cherish both the planning process and the unexpected detours along the way.
  culinary: Estela Dominguez, an experimental home cook, perfects paella using locally sourced heirloom tomatoes, river trout, and saffron, adapts tortilla de patatas with sweet potatoes from Ohio farms,
    crafts gazpacho with fresh basil and cucumber, documents each trial in a handwritten recipe journal, and they love to experiment late at night when inspiration strikes.
  core: Estela Dominguez, an 18‑year‑old nature‑driven introvert with a habit of scribbling poetry in margins, fuses community stewardship with a love for solitary hikes, yet often battles scattered notes,
    last‑minute deadline scrambles, and a cluttered kitchen counter.
background:
  cultural: Estela was raised in a bilingual household; her parents emigrated from Spain in the early 2000s and preserved many customs from their hometowns, such as celebrating Semana Santa, preparing paella
    for family gatherings, and listening to flamenco music. Living in Oxford, Ohio, she blends these traditions with Midwestern values of independence and community service. Her family values hospitality,
    respect for elders, and a strong emphasis on education, which have shaped her identity as a Spanish-American teenager who feels comfortable navigating both cultures.
attributes:
  skills: '[''Research and information synthesis'', ''Bilingual communication (Spanish/English)'', ''Basic computer troubleshooting'', ''Creative writing'', ''Spanish cooking'', ''Volunteer coordination'',
    ''Conflict mediation'', ''Landscape photography'']'
  hobbies: '[''Reading contemporary fiction and non-fiction'', ''Hiking and wildlife observation'', ''Nature photography'', ''Cooking Spanish dishes'', ''Journaling and creative writing'', ''Sketching and
    doodling'', ''Participating in a small book club'', ''Volunteering at a community garden'']'
  career_goals: She plans to enroll in a state university to study environmental science with a focus on community-based conservation. By combining her love of the natural world with practical problem-solving,
    she hopes to design sustainable projects that benefit rural Ohio neighborhoods while staying connected to her cultural heritage. In the longer term, Estela envisions a career as a sustainability coordinator
    for a non-profit or a municipal agency, and she also dreams of traveling to Spain to collaborate on cross-cultural ecological research programs.
