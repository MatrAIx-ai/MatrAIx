persona_description: A space mission control center operator who was a member of the Houston Mission Control Center during the Apollo missions, particularly during the last Apollo mission, Apollo 17. He
  was frustrated and despondent at the end of the Apollo era and met with a space artist to discuss the possibility of producing an emblem for the control center. He was a part of the team that supported
  the spacecraft and its crew during the missions, and was responsible for the 19 main areas of responsibilities shown in the Mission Control emblem. He was known for his strong commitment to excellence
  and craftsmanship in his work, and was a key member of the team that ensured the safety and success of the Apollo missions.
