data:
  user 1 personas: 'My mother raised me by herself while working two jobs.

    Spiders scare the life out of me.

    I pray to god for my family every morning.

    I always put my left sock on first.'
  user 2 personas: 'I own my own music store.

    My mother and father are both in the church choir.

    I am an animal rights activist.

    I hope to retire to florida.'
  Best Generated Conversation: 'User 1: Hi, I''m [name]!

    User 2: Hi, I''m [name]! It''s nice to meet you!

    User 1: It''s nice to meet you too! What do you do for a living?

    User 2: I own my own music store.

    User 1: That''s so cool! What kind of music do you sell?

    User 2: We have a wide variety of music, from classical to rock to country.

    User 1: That''s awesome! I''m sure you''ve seen a lot of interesting things in your time working at a music store.

    User 2: I have, actually! One time, I had a customer who came in and asked for a record of something that was never recorded.

    User 1: That''s crazy! What did you do?

    User 2: Well, I told him that we didn''t have it, but he was so insistent that I went to the back room and looked anyway.

    User 1: And? Did you find it?

    User 2: No, I didn''t, but it was fun trying!

    User 1: That''s really funny! I bet that customer was really disappointed.

    User 2: He was, but he was also really nice. He told me that he was a big fan of the band and that he had always wanted to hear their music on vinyl.

    User 1: That''s so sweet! I''m glad you were able to make his day.

    User 2: Me too! It''s always nice to make a customer happy.

    User 1: So, what are some of your other hobbies?

    User 2: I''m an animal rights activist. I''m really passionate about protecting animals and making sure they have a good life.

    User 1: That''s awesome! I''m a big animal lover too. I''ve always thought it''s important to treat animals with respect.

    User 2: Me too! I think it''s important to remember that animals are sentient beings and deserve to be treated as such.

    User 1: I agree completely! What kind of work do you do for animal rights?

    User 2: I volunteer at a local animal shelter and I also donate to animal welfare organizations.

    User 1: That''s great! I''m sure your work is making a difference in the lives of animals.

    User 2: I hope so! I''m just glad I can do something to help.

    User 1: I''m sure you are making a difference! You''re an amazing person!

    User 2: Thank you! That means a lot to me.

    User 1: It''s true! You''re doing great things for animals.

    User 2: I''m just trying to do my part'
