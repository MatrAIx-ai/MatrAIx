persona_description: A construction and engineering professional who specializes in offshore oil and gas development projects, with a focus on the design, construction, and operation of concrete gravity
  based structures (GBS) such as the Hebron field. They have extensive experience in offshore surveys, engineering, procurement, fabrication, construction, installation, commissioning, and decommissioning
  of GBS. They are skilled in managing complex projects with tight deadlines and budgets, and have a deep understanding of the regulatory and environmental requirements for offshore operations. They are
  also knowledgeable in the application of technology and innovation in the oil and gas industry, and have a passion for delivering significant benefits to the local community through the successful completion
  of the Hebron field development project.
