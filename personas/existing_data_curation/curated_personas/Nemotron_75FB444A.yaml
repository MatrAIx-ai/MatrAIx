  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Photography of architecture'', ''Cooking Taiwanese cuisine'', ''Yoga and mindfulness meditation'', ''Small‑group hiking'',
    ''Participating in cultural festivals'', ''Volunteering as a Mandarin tutor'']'
  career_goals: Lien aims to become one of Philadelphia's top‑producing brokers within the next five years, aspiring to lead a boutique team that specializes in heritage properties and serves the city’s
    growing Asian‑American community. She plans to earn the Certified Residential Specialist (CRS) designation and expand her expertise into real‑estate investment advising, guiding clients toward portfolio
    diversification. Long‑term, she envisions opening her own agency that blends property sales with curated interior‑design consulting, positioning herself as a trusted advisor who can turn a transaction
    into a holistic lifestyle upgrade. Balancing her ambition with personal well‑being, she also seeks to implement stress‑reduction practices into her daily routine and mentor younger agents navigating
    high‑pressure environments.
