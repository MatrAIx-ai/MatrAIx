personas:
  professional: James Skeens, a 24‑year‑old practical nurse in Salt Lake City, excels at patient assessment, IV therapy, and EMR navigation while weaving acrylic‑based art projects into health education
    to boost patient engagement, and balances meticulous shift management with the spontaneity of improv, reflecting his competitive drive and endless curiosity.
  sports: James Skeens, a devoted fan of the Utah Jazz and Real Salt Lake, spends Saturdays rock climbing at Momentum Climbing Gym, hikes the Wasatch foothills, and competes in intramural ultimate frisbee
    leagues, channeling his competitive nature into both team sports and solo outdoor pursuits.
  arts: James Skeens channels his curiosity into acrylic painting inspired by the vibrant colors of Van Gogh, captures urban street scenes with his Canon EOS R, and strums a battered Fender Telecaster in
    a local jam band that often covers The Strokes and Arctic Monkeys, blending improv comedy nights with his love for experimental visual art.
  travel: James Skeens prefers weekend getaways to rugged destinations like Moab and Park City, has backpacked through the Canadian Rockies, and dreams of a month‑long cultural immersion in Kyoto to study
    traditional ukiyo‑e prints, balancing his travel plans around shift schedules and a modest travel fund.
  culinary: James Skeens enjoys cooking quick meals such as spicy pork bulgogi tacos and fresh avocado toast, while his go‑to comfort dish is hearty Utah fry‑sauce‑drenched fries, and he experiments with
    ingredients like smoked paprika, fresh basil, and pomegranate molasses when mixing his own spice blends.
  core: James Skeens blends a nurse’s precision with an artist’s spontaneity, constantly juggling shift spreadsheets, paint palettes, and a competitive streak that pushes him to out‑perform both in the
    ER and on the ultimate frisbee field, even if it sometimes leads to late‑night caffeine binges and a skeptical eye toward easy shortcuts.
background:
  cultural: James was raised in a middle‑class, white family in the Salt Lake City metropolitan area, with roots in the region's Scandinavian‑German heritage. While his community reflects Utah's blend of
    traditional Western values, strong volunteerism, and a growing arts scene, James embraces an eclectic worldview. He values the outdoors, community involvement, and the progressive cultural expressions
    that thrive in Salt Lake, which together fuel his curiosity, openness to unconventional ideas, and energetic social orientation.
