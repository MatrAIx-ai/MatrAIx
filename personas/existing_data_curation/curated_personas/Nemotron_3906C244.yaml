  career_goals: James aims to become a registered nurse within the next two years, targeting a specialty in emergency or critical care where his competitive drive thrives. He plans to earn ACLS and trauma
    nursing certifications and complete a Bachelor of Science in Nursing (BSN) to eventually practice as a nurse practitioner focused on integrative health. Long‑term, he envisions leading a community health
    program in Salt Lake City that blends clinical care with creative arts therapies, and contributing to health‑tech innovations that boost patient engagement and outcomes.
