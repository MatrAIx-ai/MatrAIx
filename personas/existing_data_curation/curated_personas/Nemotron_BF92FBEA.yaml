    ''Inventory control and supply chain management'', ''Client communication and education'', ''Electronic medical records (EMR) systems proficiency'', ''Data analysis and reporting'', ''Staff scheduling
    and team leadership'', ''Community outreach and public speaking'']'
  hobbies: '[''Abstract painting'', ''Wildlife and pet portrait photography'', ''Playing guitar in a folk music group'', ''Hiking and nature walks'', ''Cooking Mexican cuisine and culinary experimentation'',
    ''Reading philosophy, science fiction, and art theory'', ''Attending gallery exhibitions and art fairs'', ''Volunteer work at animal shelters'', ''Community education workshops on pet health'', ''Participating
    in local cultural festivals (e.g., Día de los Muertos celebrations)'']'
  career_goals: Bienvenido aims to advance from a veterinary technologist to a practice manager, leveraging his business expertise to improve clinic efficiency and profitability. He envisions opening his
    own boutique veterinary clinic that integrates artistic design, therapeutic environments, and holistic care for pets, creating a unique patient experience. He plans to earn a certification in veterinary
    practice management and develop a mentorship program for small veterinary businesses in the Columbus area. Additionally, he aspires to lead community outreach initiatives that combine animal health
    education with cultural art events, fostering greater public engagement with pet welfare.
