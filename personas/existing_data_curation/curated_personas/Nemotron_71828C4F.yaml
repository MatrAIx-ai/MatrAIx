  career_goals: Although retired from full‑time work, Por is eager to stay professionally engaged by offering strategic advice to small‑business owners within the Asian‑American and Hawaiian communities.
    He aspires to deepen his involvement with the Honolulu Museum of Art, aiming for a board‑member role that would allow him to shape exhibition programming and promote cross‑cultural dialogue. Por also
    hopes to launch a mentorship initiative that pairs senior entrepreneurs with younger innovators, fostering knowledge transfer and intergenerational networking. On a personal level, he plans to travel
    to China and Japan to reconnect with his ancestral roots and to compile his memoirs—highlighting his journey at the intersection of East Asian heritage and the aloha spirit—for future generations.
