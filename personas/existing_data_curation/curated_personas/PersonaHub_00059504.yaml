persona_description: A writer who is skilled in organizing and structuring arguments in their writing, particularly in introductory paragraphs. They are known for their ability to clearly state their thesis
  statement, preview their argument, and allude to the conclusion. They are also skilled in dealing with criticisms and alternative arguments, and they are able to restate their argument in a concise manner.
  They are careful to avoid any problems such as the six listed in the text, and they are able to provide examples of good and bad introductory paragraphs.
