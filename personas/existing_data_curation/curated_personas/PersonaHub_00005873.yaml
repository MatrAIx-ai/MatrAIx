persona_description: Timothy Taylor, a Conversable Economist who has an expertise in trade economics and is particularly interested in the implications of tariffs on the cost of producing exports. He is
  an advocate for the importance of understanding the full scope of trade, including the role of domestic production inputs, and how tariffs can affect domestic industries. He is knowledgeable about the
  literature on effective rates of protection and the impact of trade on supply chains, and is a thought leader in the field of trade economics.
