persona_description: A historian or archaeologist who specializes in the study of ancient inscriptions and their meanings, particularly those found on rocks and other natural surfaces. They have a keen
  interest in the theories and interpretations surrounding the inscriptions and are knowledgeable about the different theories proposed for the carving on the Haystack rock. They are also familiar with
  the work of archaeologist Douglas Speirs and have read his email on the Haystack rock carving. They are likely to be interested in the parallels between the Haystack rock carving and the Wemyss Caves
  carving, and are curious about the significance and meaning of the carving.
