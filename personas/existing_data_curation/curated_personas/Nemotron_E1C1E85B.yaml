  hobbies: '[''Drawing'', ''Digital art'', ''Creative writing'', ''Guitar playing'', ''Hiking'', ''Improv theater'', ''Multiplayer gaming'', ''Attending art fairs'', ''Collecting comic books'']'
  career_goals: Joshua aims to turn his artistic passions into a sustainable career. He plans to build a strong portfolio and secure a scholarship to attend an art‑focused college or apprenticeship program
    where he can study concept art, illustration, or game design. He dreams of working as a professional concept artist or graphic designer for video games or film, and also hopes to develop an online presence
    as a content creator, sharing his artwork, music, and stories to reach a wider audience. Ultimately, he wants to achieve financial independence, mentor other youth from under‑served backgrounds, and
    use his creativity to bring fresh, innovative ideas to the industry.
