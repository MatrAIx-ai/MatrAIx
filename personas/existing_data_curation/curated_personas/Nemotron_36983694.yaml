personas:
  professional: Thomas Brock, a 27‑year‑old aspiring community‑focused field service technician, blends hands‑on troubleshooting of small engines and agricultural equipment with compassionate outreach,
    leveraging their CPR certification, conflict‑mediating volunteer experience, and proficiency in office software to keep both machinery and neighborhoods running smoothly.
  sports: Thomas Brock hits the pine‑forest trails for weekend hikes with the local Pulaski County Outdoors Club, joins a pickup basketball league at the community center in the summer, and cheers on the
    Pulaski County Roughriders football team while they occasionally play informal soccer matches with friends.
  arts: Thomas Brock unwinds by strumming acoustic guitar around a campfire with friends, delighting in the storytelling of folk singer John Prine, the soulful blues of B.B. King, and the lyrical poetry
    of contemporary singer‑songwriter Brandi Carlile, while also devouring nonfiction narratives about Southern history that fuel their community projects.
  travel: Thomas Brock, at 27, prefers road‑trip adventures that blend careful planning with spur‑of‑the‑moment detours, having explored the historic streets of Savannah, the music scene of Nashville, and
    the nearby Ouachita National Forest, while they dream of a future pilgrimage to the Scottish Highlands to trace the clan stories they read about.
  culinary: Thomas Brock enjoys experimenting in their modest kitchen, confidently preparing Southern comfort staples like shrimp and grits with fresh river‑caught shrimp, fried green tomatoes drizzled
    with homemade Tennessee honey, collard greens simmered with smoked ham hocks, and buttery buttermilk biscuits, while they still occasionally over‑salt a pot of gumbo during a new recipe trial.
  core: Thomas Brock is a pragmatic DIY enthusiast with a community‑first heart; they balance a relentless curiosity for new projects with a tendency to overcommit to volunteer work and a habit of postponing
    paperwork until the last minute.
background:
  cultural: Thomas grew up in a typical small‑town Southern environment in Cochran, Georgia. His family’s values emphasize hospitality, community service, and a strong work ethic rooted in the local Baptist
    church tradition. He was raised with an appreciation for regional customs such as high‑school football games, county fairs, and neighborhood potlucks. These cultural influences have shaped his emphasis
    on neighborly assistance, respect for tradition, and a pragmatic approach to everyday challenges.
