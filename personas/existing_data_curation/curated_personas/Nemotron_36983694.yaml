  career_goals: Thomas aims to complete his bachelor’s degree—currently he is taking online courses toward a Business Administration or Social Work major—and secure a full‑time role that blends his practical
    skill set with his desire to help others. He is interested in positions such as a community outreach coordinator for the Pulaski County health department, a field service technician for agricultural
    equipment, or starting a small handyman service that serves seniors and low‑income families. Long‑term, he hopes to become a trusted community leader who designs and implements programs that improve
    local well‑being.
