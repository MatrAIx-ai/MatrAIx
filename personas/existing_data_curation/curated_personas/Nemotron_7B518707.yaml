personas:
  professional: Mai Zheng is a seasoned mechanical engineer in the Pacific Northwest who leverages AutoCAD, SolidWorks, Python, and MATLAB to design reliable infrastructure, and they apply their methodical,
    competitive mindset to lead multidisciplinary teams toward sustainable, code‑compliant solutions while pursuing a Principal Engineer role.
  sports: Mai Zheng is an avid solo hiker who traverses the Cascades on weekends with the Washington Trails Association, follows the Seattle Seahawks for football and the Seattle Sounders FC for soccer,
    and maintains a low‑impact fitness routine with yoga at home, preferring solitary movement over crowded gyms.
  arts: Mai Zheng is a dedicated practitioner of Chinese calligraphy who spends evenings sketching characters to the strains of Yo‑Yo Ma’s cello recordings and the poetry of Maya Angelou, and they regularly
    attend performances by the Seattle Symphony and exhibitions featuring Ansel Adams photography.
  travel: Mai Zheng is a deliberate traveler who plans low‑stress, itinerary‑light trips focused on quiet nature, having explored the bamboo forests of Arashiyama in Kyoto and the fjords of Norway, and
    they hope to soon venture to the remote islands of Tasmania for solitary hikes and tea ceremonies.
  culinary: Mai Zheng is a modest home cook who favors brewing Oolong and Pu‑Erh teas, prepares simple dishes like salmon teriyaki with miso glaze, their go‑to ingredients being fresh ginger, shiso leaves,
    and locally sourced wild mushrooms, and they occasionally treat themselves to a reservation at a high‑end farm‑to‑table restaurant to sample seasonal foraged salads.
  core: Mai Zheng is a solitary, detail‑obsessed engineer who balances competitive ambition with a love for quiet hikes, tea rituals, and mindfulness, yet often wrestles with worry and a skeptical view
    of others.
background:
  cultural: Mai Zheng was born to Chinese immigrant parents and grew up immersed in both traditional Chinese customs and mainstream American culture. Her family emphasized education, respect for elders,
    and community responsibility, values that continue to shape her disciplined work ethic. While she lives in Kenmore, WA, Mai celebrates major Chinese festivals such as Lunar New Year and Mid‑Autumn Festival,
    often preparing family recipes and sharing them with a small circle of close friends. Her bilingual ability allows her to maintain ties with extended family in China, and she occasionally volunteers
    as a translator for local community events, blending her technical acumen with cultural heritage.
