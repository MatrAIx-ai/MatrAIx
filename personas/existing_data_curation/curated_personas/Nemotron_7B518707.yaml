  career_goals: Mai aims to advance to a Principal Engineer role, where she can lead multidisciplinary teams on sustainable infrastructure projects that balance innovative technologies with proven methods.
    She intends to obtain her Professional Engineer (PE) license within the next two years to solidify her technical authority. Long‑term, she envisions establishing a boutique consultancy that offers reliability‑focused
    engineering solutions to government agencies and private firms, allowing her to work remotely and maintain a quiet, controlled environment. Her competitive drive pushes her to publish technical papers
    in industry journals and present at conferences to gain recognition for her expertise.
