  hobbies: '[''digital illustration'', ''DIY electronics art installations'', ''synthesizer programming'', ''reading speculative fiction'', ''hiking'', ''basketball'', ''volunteering for STEM outreach'',
    ''music production with Ableton Live'']'
  career_goals: Robert aims to earn his Professional Engineer (PE) license and become a senior electrical engineer specializing in renewable‑energy integration for community micro‑grids. He envisions leading
    multidisciplinary teams that design sustainable, art‑infused public infrastructure, such as solar‑powered interactive installations. In the longer term, he hopes to launch a startup that provides affordable,
    STEM‑focused maker workshops for underserved youth in the South. Mentoring the next generation of Black engineers and expanding access to technical education remain central to his ambition.
