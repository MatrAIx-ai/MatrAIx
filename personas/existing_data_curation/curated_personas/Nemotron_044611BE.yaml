personas:
  professional: A forward‑thinking electrical engineer named Robert Wright blends circuit design, PCB layout in KiCad and Altium, and 3D modeling in Fusion 360 to prototype solar‑powered interactive installations,
    and they balance meticulous documentation with flexible, art‑driven problem solving while working toward their Professional Engineer license.
  sports: Robert Wright hits the community basketball court every Thursday night, cheering for their hometown NBA team while also joining weekend hikes on nearby nature trails and a sunrise 5‑kilometer
    running club, and they relish the balance of teamwork and solitude these activities provide.
  arts: Robert Wright devotes evenings to digital illustration inspired by Beeple and H.R. Giger, creates 3D concepts in Blender, loses themselves in the synth‑driven soundscapes of Aphex Twin and Daft Punk,
    and they regularly attend local mixed‑media art shows that blend technology and visual art.
  travel: Robert Wright prefers short, budget‑friendly road trips to national parks like Great Smoky Mountains, has already explored New Orleans for its live music, dreams of attending Berlin’s Atonal festival
    for cutting‑edge electronic art, and they plan each journey around limited student‑loan finances.
  culinary: Robert Wright’s kitchen experiments often feature spicy Korean bibimbap, quick miso ramen bowls, and weekend avocado toast with smoked paprika, showcasing moderate cooking skill, a love for
    bold flavors, and they occasionally swap recipes with friends from the local maker community.
  core: Robert Wright is a 23‑year‑old inventive engineer who fuses renewable‑energy tech with art, budgets prudently while treating themselves to occasional synth gear, manages mild back tension through
    yoga, stays active on basketball courts and hiking trails, fuels creativity with sci‑fi reads, synth beats, and spicy meals, and they constantly seek new ways to blend discipline with imagination.
background:
  cultural: Robert grew up in a close‑knit African‑American community in rural Alabama, where church gatherings, gospel music, and family storytelling shaped his identity. His parents emphasized the value
    of hard work and education, encouraging him to pursue practical trades while nurturing his creative side. The rich legacy of Southern Black music—from blues to contemporary hip‑hop—feeds his love for
    rhythm and improvisation, influencing both his hobbies and his design aesthetic. Community solidarity, respect for elders, and a deep sense of pride in his heritage motivate him to give back through
    mentorship and locally focused tech initiatives.
attributes:
  skills: '[''circuit design'', ''PCB layout'', ''microcontroller programming (Arduino, STM32)'', ''embedded systems development'', ''debugging with oscilloscopes and logic analyzers'', ''3D CAD modeling
