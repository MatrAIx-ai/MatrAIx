    in small tech meetups and hackathons'', ''Hiking and beachcombing along the Gulf Coast'', ''Cooking Mexican cuisine and experimenting with fusion recipes'', ''Practicing mindfulness meditation or journaling'',
    ''Playing strategy board games with close friends'', ''Learning Spanish‑language poetry and literature'', ''Exploring urban photography with a DSLR'']'
  career_goals: Maki aims to advance to a senior systems analyst role within the next three years, positioning herself to lead enterprise‑wide digital transformation projects that blend business strategy
    with innovative technology. She plans to obtain certifications such as CBAP, PMI‑PBA, and cloud credentials (AWS Solutions Architect or Azure Fundamentals) while pursuing a part‑time master’s degree
    in information systems. Long‑term, she envisions moving into a solutions architect or technology manager position, where she can shape product roadmaps, mentor junior analysts—particularly from underrepresented
    backgrounds—and champion user‑experience‑driven solutions that reflect her artistic sensibility. Driven by a competitive spirit, she seeks to be recognized as a top performer in her field and to contribute
    to community‑focused tech initiatives in Corpus Christi, leveraging her bilingual skills to improve local government services.
