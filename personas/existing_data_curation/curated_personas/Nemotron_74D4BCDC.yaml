personas:
  professional: Maki Moreno, a 27‑year‑old systems analyst in Corpus Christi, merges rigorous business process mapping with a designer’s eye for visual storytelling, wielding SQL, Power BI, Tableau, and
    Python to craft intuitive analytics dashboards while steering Agile cross‑functional teams, and they pursue every digital transformation project with a competitive drive and a commitment to bilingual
    stakeholder communication.
  sports: Maki Moreno hits the Gulf‑coast sands for sunrise runs with the local Coastline Runners, tracks miles on Strava, roots for the Houston Astros during baseball season and the Dallas Cowboys in football,
    and joins weekend paddle‑boarding outings with the Corpus Christi Kayak Club, balancing a competitive edge with solitary fitness rituals.
  arts: Maki Moreno spends afternoons at the Art Museum of South Texas sketching while drawing inspiration from Frida Kahlo’s bold colors and Georgia O’Keeffe’s desert forms, and their soundtrack swings
    between indie acts like Mitski and Phoebe Bridgers and the vibrant brass of Mariachi Vargas de Tecalitlán, all of which fuels their digital illustration practice and user‑centric design sensibility.
  travel: Maki Moreno plans trips with meticulous itineraries yet leaves room for spontaneous detours, favoring short‑haul getaways like Austin’s SXSW festival, weekend hikes in Big Bend National Park,
    cultural immersion in Tulum’s cenotes, and dreaming of a longer venture to Kyoto’s tech‑forward design districts, all while navigating a modest travel budget and a preference for small‑group explorations.
  culinary: Maki Moreno whips up Mexican staples such as chilaquiles, carnitas tacos, and aromatic pozole, often adding creative twists like gochujang‑glazed pork or miso‑infused mole, using fresh cilantro,
    roasted chilies, and queso fresco, and they eagerly host intimate game‑night feasts where each dish becomes a collaborative experiment.
  core: Maki Moreno blends a data‑driven analyst’s precision with an artist’s imagination, thrives on competitive challenges, fuels midnight coding sprints with espresso, and can’t resist a late‑night board‑game
    snack, all while occasionally forgetting to floss after marathon gaming sessions.
background:
  cultural: Maki grew up in a Mexican‑American household in Corpus Christi, where Spanish was spoken at home and Texan customs coexisted with Mexican traditions. Family gatherings centered around holiday
    foods like tamales and pozole, and celebrations of Día de los Muertos and Mexican Independence Day kept cultural stories alive. This bicultural environment nurtured her bilingual fluency and an appreciation
    for both Mexican folklore and the vibrant coastal culture of South Texas. While she embraces her heritage—often attending local cultural festivals and supporting community art initiatives—she also values
    independence and self‑direction, reflecting the mix of collectivist roots and individualistic American influences that shape her worldview.
