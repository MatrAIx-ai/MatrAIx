persona_description: A historian who specializes in the study of ancient coins, particularly those of the Sassanid and Byzantine dynasties. His research interests include the design, circulation, and significance
  of these coins in the historical context of the regions they were used in. He is knowledgeable about the different types of coins, their materials, and the inscriptions used on them, and is able to provide
  detailed descriptions of the different coins found in Armenia. He is also familiar with the political and cultural influences that shaped the coinage of the Sassanid and Byzantine empires.
