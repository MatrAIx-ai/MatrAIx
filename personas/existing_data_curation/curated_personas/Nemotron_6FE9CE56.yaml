  career_goals: She aspires to transition from informal volunteer roles into a formal position within a community‑focused nonprofit or to become a certified professional organizer. To achieve this, she
    plans to enroll in an associate’s degree program in Business Administration or a certificate in Community Outreach within the next two years, and eventually launch a home‑based consulting service that
    helps individuals declutter and design functional living spaces.
