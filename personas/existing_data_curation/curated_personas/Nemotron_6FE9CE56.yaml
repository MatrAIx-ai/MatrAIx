personas:
  professional: A community‑focused nonprofit aspirant, Tiffany Rollman leverages her detail‑oriented listening and mediating skills, proficiency in Microsoft Office, and hands‑on experience from the New
    Haven Food Bank to orchestrate modest outreach events while pursuing an associate degree in Business Administration, positioning themselves to launch a home‑based consulting service that declutters
    and designs functional living spaces.
  sports: Tiffany Rollman, a 33‑year‑old hiking enthusiast, spends weekends trekking the misty ridges of Sleeping Giant State Park, joins a seasonal amateur softball league at the community center, follows
    the Boston Red Sox and New England Patriots, and they never miss the annual New York City Marathon—though they prefer watching from the sidelines rather than running.
  arts: Tiffany Rollman immerses herself in contemporary fiction by authors like Ocean Vuong and Sally Rooney, curates a modest collection of street photographs inspired by Henri Cartier‑Bresson’s candid
    moments captured on her vintage 35mm camera, and they knit scarves while listening to the folk‑rock melodies of Iron & Wine, weaving all these creative threads into her quiet evenings with the local
    book club.
  travel: Tiffany Rollman prefers thoughtfully planned, low‑key getaways, often driving up to the White Mountains for leaf‑peeping hikes, has already explored the terraced gardens of Kyoto on a solo trip,
    and dreams of cycling the Amalfi Coast in Italy, all while they budget each adventure in their beloved spreadsheet.
  culinary: Tiffany Rollman, an intermediate home chef, regularly cooks comfort dishes like rosemary‑infused roasted chicken, creamy mushroom risotto, and spiced lentil stew using fresh herbs from her balcony
    garden, while they occasionally experiment with fermented kimchi for a tangy side, and they enjoy tasting the final product with a glass of pinot noir.
  core: Tiffany Rollman is a methodical, solitary‑leaning organizer who turns curiosity into practical, habit‑driven projects, from decluttering spaces to documenting life through a vintage lens, all while
    they juggle budgets, hobbies, and a quiet ambition to help others create functional, soothing environments.
background:
  cultural: Tiffany grew up in a predominantly white, middle‑class family in the New England suburbs and later moved to New Haven, a university city with a rich mix of cultures. Her upbringing emphasized
    self‑reliance, punctuality, and community involvement—values typical of the New England work ethic. Exposure to Yale’s cultural events, local festivals, and the diversity of students has broadened her
    perspective, fostering an appreciation for both tradition and progressive ideas while maintaining a pragmatic outlook.
