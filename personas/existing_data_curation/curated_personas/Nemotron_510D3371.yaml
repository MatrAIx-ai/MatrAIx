personas:
  professional: Jerome is a senior electrical engineer with fifteen years of hands‑on experience in circuit design, PLC programming, and industrial automation, who leverages their methodical planning, clear
    communication, and curiosity for new ideas to lead cross‑functional teams and drive reliable, safety‑first solutions while eyeing a transition into engineering management for renewable‑energy and IoT
    projects.
  sports: Jerome anchors the River City Runners in a local basketball league, regularly hikes Red Rock State Park on weekends, and passionately follows the Los Angeles Lakers and the Seattle Sounders, while
    also participating in a community softball league that doubles as a social networking hub.
  arts: Jerome immerses themselves in live music, often catching indie rock shows by The Strokes at downtown venues, while also curating a personal photography collection inspired by Ansel Adams, printing
    black‑and‑white landscape shots from hikes as wall art, and occasionally sketching urban street murals during city explorations.
  travel: Jerome prefers weekend road trips that blend adventure and comfort, having trekked the Great Smoky Mountains, explored Iceland’s volcanic landscapes, and planning a future expedition to Patagonia’s
    Torres del Paine, all while balancing travel costs against a family budget and the goal of gathering inspiration for future sustainable‑automation projects.
  culinary: Jerome enjoys mastering the grill, regularly smoking Texas‑style brisket with hickory wood chips, marinating chicken in a craft‑beer glaze featuring Sierra Nevada Pale Ale, and experimenting
    with spice rubs of smoked paprika, cumin, and brown sugar, while relying on a digital meat thermometer to achieve perfect doneness.
  core: Jerome blends a methodical engineering mindset with a sociable, curious spirit, channeling their love for team sports, outdoor photography, and craft grilling into a balanced life that fuels both
    professional ambition and community connection.
background:
  cultural: Jerome was raised in York County, Pennsylvania, in a middle‑class, blue‑collar family of German and Irish descent. His upbringing was rooted in a Methodist household that valued hard work, reliability,
    and community service. The region’s Pennsylvania Dutch heritage, historic brick architecture, and vibrant local art fairs fostered his early appreciation for art and varied experiences. He maintains
    strong ties to his hometown through participation in his church, neighborhood block parties, and volunteering at the community center, blending traditional values with an openness to new ideas.
attributes:
  skills: '[''Circuit design and analysis'', ''Printed circuit board (PCB) layout'', ''Industrial automation and PLC programming'', ''Embedded systems firmware debugging'', ''Electrical safety compliance
    (NFPA 70E)'', ''Automation system integration'', ''Technical documentation and reporting'', ''Project planning and scheduling'', ''Cross‑functional team leadership'', ''Customer communication and support'',
    ''Problem solving and troubleshooting'', ''DIY electronics prototyping'', ''Basic programming (Python, C)'', ''CAD tools (AutoCAD Electrical, EPLAN)'']'
  hobbies: '[''basketball'', ''hiking'', ''photography'', ''Arduino/Raspberry Pi tinkering'', ''live music concerts'', ''volunteering at STEM workshops'', ''cooking/grilling'', ''craft beer tasting'', ''attending
    local art fairs'']'
  career_goals: Jerome aims to transition into senior engineering leadership within the next five years, seeking a role as a lead electrical engineer or engineering manager overseeing renewable‑energy and
    IoT integration projects. He plans to earn his Professional Engineer (PE) license and Certified Automation Professional (CAP) credential, while mentoring junior engineers and championing safety‑first
    initiatives. Long‑term, he envisions starting his own consultancy that helps small manufacturers adopt sustainable automation technologies.
