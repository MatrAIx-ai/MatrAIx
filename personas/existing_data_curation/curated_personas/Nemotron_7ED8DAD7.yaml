  hobbies: '["Reading science fiction and adventure books", "Building and customizing LEGO sets", "Playing basketball", "Scratch programming (simple games and stories)", "Nature exploration (insects, birds)",
    "Sketching invention ideas", "Listening to hip‑hop and gospel music"]'
  career_goals: Eugene dreams of becoming an engineer—perhaps a mechanical or aerospace engineer—so he can design and build things that help people. He aims to be the top student in his class, win a future
    science fair, and one day create inventions that improve his community, such as a smarter playground. He also imagines himself as an astronaut or a software developer, and he aspires to be recognized
    for his problem‑solving skills and leadership in school projects.
