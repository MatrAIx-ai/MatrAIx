personas:
  professional: Eugene Garcia is an aspiring junior game developer who uses Scratch to craft simple animation‑driven games, applying meticulous planning and a competitive spirit they bring to each iteration
    while balancing creative curiosity with practical code structures.
  sports: Eugene Garcia is a budding basketball enthusiast who plays pickup games at the neighborhood park three times a week, competes in the local after‑school Little Lions youth basketball league, idolizes
    the Los Angeles Lakers and especially LeBron James, and in the cooler months joins a community soccer program, always bringing a competitive edge to every drill they participate in.
  arts: Eugene Garcia immerses themselves in the world of sci‑fi and adventure by reading the latest Star Wars novels, building LEGO dioramas inspired by Marvel movies, crafting Scratch animations set to
    the beats of Kendrick Kendrick, Beyoncé, and gospel hymns, and they sketch invention ideas in a notebook while listening to gospel music that echoes through their home.
  travel: Eugene Garcia approaches travel as miniature missions, planning weekend hikes to nearby state parks like Yellowstone with a homemade checklist, while they day‑dream about a future family trip
    to Tokyo, Japan to explore Akihabara’s anime shops, balancing a love for adventure with the practical constraints of school schedules and a modest family budget.
  culinary: Eugene Garcia enjoys bold flavors, regularly ordering pepperoni pizza and chicken tacos with fresh cilantro and lime, while at home they confidently whip up a quick macaroni‑and‑cheese using
    cheddar and a dash of hot sauce, and they’ve recently experimented with a DIY fruit smoothie featuring banana, strawberries, and oat milk.
  core: Eugene Garcia is a curious, methodical 9‑year‑old who turns every hobby—from LEGO building to Scratch coding—into a competitive quest, balancing a disciplined routine with a love for hip‑hop beats
    and occasional overspending on game snacks, and they always keep a meticulous notebook of plans.
background:
  cultural: Eugene is an African‑American boy growing up in Chapin, South Carolina, a small town where his family is part of a close‑knit Black community. He attends the local public elementary school,
    participates in Black History Month projects, and takes pride in learning about African‑American heritage. His family is active in a historically Black church, where they attend services, join the choir,
    and celebrate holidays like Juneteenth with gatherings that feature soul‑food dishes such as collard greens, black‑eyed peas, and sweet potatoes. Stories from his grandparents about the civil‑rights
    movement and family traditions of resilience and community involvement shape his worldview, reinforcing the value of education, teamwork, and cultural pride.
attributes:
  skills: '["Mathematics (basic arithmetic & fractions)", "Reading comprehension", "Organizational skills (binder & schedule management)", "LEGO engineering & basic robotics", "Scratch block coding", "Team
