  hobbies: '[''Drawing and coloring'', ''Building with blocks'', ''Reading picture books'', ''Listening to music'', ''Nature exploration'', ''Memory and board games'', ''Watching animated shows'']'
  career_goals: Victor’s curiosity about art and his methodical nature fuel his dream of becoming an artist who creates vivid storybooks, or perhaps an architect who designs imaginative play spaces. He
    often says he wants to "draw big pictures that make people smile" and imagines building tall towers with blocks that turn into real buildings. His competitive streak makes him want to be the best at
    these creative pursuits, and he aspires to learn more about colors, shapes, and how things are made. While still exploring, he leans toward creative careers that blend his love for visual art, building,
    and storytelling.
