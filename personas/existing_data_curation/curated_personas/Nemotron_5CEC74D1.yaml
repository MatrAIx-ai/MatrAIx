personas:
  professional: Krystle Arias, a diligent nursing assistant at a Chapel Hill medical center, leverages bilingual fluency and meticulous record‑keeping to streamline patient hand‑offs, and they eye LPN certification
    and a future charge‑assistant role through targeted efficiency projects.
  sports: Krystle Arias enjoys weekend hikes on the UNC forest preserve, participates in a local walking club, cheerfully follows the UNC Tar Heels men’s basketball and the Charlotte Hornets, and they play
    recreational volleyball at the community center, balancing routine exercise with seasonal fan enthusiasm.
  arts: Krystle Arias indulges in salsa evenings with a community dance group, listens to classic vallenato by Carlos Vives, watches telenovelas starring Thalía, and they find solace in choir rehearsals
    at their Catholic church, weaving music and performance into their weekly rhythm.
  travel: Krystle Arias favors road trips to the Blue Ridge Mountains for quiet reflection, has visited family in Bogotá and explored Cartagena’s historic walls, and they dream of a cultural pilgrimage
    to Spain’s Andalusian region, planning trips around school holidays and budgeting carefully.
  culinary: Krystle Arias expertly prepares bandeja paisa, crispy empanadas stuffed with beef and potatoes, and aji sauce, cultivating a modest garden of cilantro, tomatoes, and peppers to harvest fresh
    ingredients, and they relish the methodical ritual of simmering beans and cooking rice for comfort.
  core: Krystle Arias blends meticulous routine with a competitive edge, balancing bilingual care, garden meditations, and occasional indulgences, while their love for salsa and budget spreadsheets reveals
    both discipline and an unexpected zest for life.
background:
  cultural: Krystle grew up in a Colombian household where Spanish was spoken daily and family gatherings surrounded meals, music, and Catholic traditions. After moving to the United States in her early
    twenties, she settled in Chapel Hill, where she has integrated aspects of Southern hospitality while preserving her Colombian identity. She celebrates Colombian holidays such as Día de la Independencia
    (July 20) and Semana Santa with traditional foods and music, and she maintains regular contact with relatives in Bogotá via video calls. Her bilingual ability and cultural fluency enable her to act
    as a bridge between Colombian patients and the predominantly English-speaking healthcare team. While she respects the practical, routine-oriented values of her upbringing, she also embraces the community‑spirit
    of the Triangle, participating in local church activities and neighborhood events.
attributes:
  skills: '["patient vital signs monitoring","assistance with activities of daily living (ADLs)","basic wound care and dressing changes","infection control and PPE compliance","basic medication assistance","electronic
