  career_goals: Krystle aspires to advance beyond the nursing assistant role by obtaining a Licensed Practical Nurse (LPN) certification within the next two years, followed by a Registered Nurse (RN) degree
    if feasible. She aims to become a charge assistant or unit coordinator, recognized for efficiency and patient satisfaction scores. She also plans to acquire specialized certifications in wound care
    and geriatric care, positioning herself as a go‑to expert on her floor. Long‑term, she envisions opening a small home‑health agency that serves the Colombian community in the Triangle, merging her cultural
    ties with her professional expertise. Her goals are grounded in practical steps, continuous education, and measurable performance metrics, reflecting her competitive and results‑oriented personality.
