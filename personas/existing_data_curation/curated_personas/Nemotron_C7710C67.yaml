personas:
  professional: Eliana Solomon, a seasoned residential painter and paperhanger with over thirty years of hands‑on experience, combines meticulous surface preparation, low‑VOC and lead‑safe paint applications,
    and an eye for cohesive color coordination into a part‑time mentorship role that emphasizes reliability, eco‑friendly solutions, and precise project management for the Park Hill community.
  sports: Eliana Solomon enjoys low‑impact fitness through daily gardening, weekly water aerobics at the community center, and follows the Kansas City Chiefs and Kansas City Royals closely, often watching
    games on Sunday afternoons while sipping iced tea on her porch.
  arts: Eliana Solomon nurtures her artistic side with watercolor paintings of her garden’s roses, expertly crafted quilts inspired by traditional patterns, sings alto in her church choir, regularly attends
    Kansas City Symphony performances, and collects prints by Claude Monet for inspiration.
  travel: Eliana Solomon prefers well‑planned, short‑duration trips such as a weekend visit to the Missouri Botanical Garden, a historical tour of Charleston, South Carolina, and an organized river cruise
    along the Mississippi, always arranging itineraries months in advance to fit her garden schedule.
  culinary: Eliana Solomon delights in cooking garden‑fresh meals like heirloom tomato salad with basil vinaigrette, herb‑roasted chicken, and a classic ratatouille, while their culinary skill is solid
    but not professional, and they often indulge in a slice of pecan pie after choir rehearsals.
  core: Eliana Solomon is a methodical, garden‑loving painter‑mentor who blends her love of order, community service, and quiet creative pursuits into a life of reliable, eco‑friendly craftsmanship and
    steady, structured routines.
background:
  cultural: Eliana grew up in a small town in northeastern Oklahoma, raised in a middle‑class, Protestant family with deep roots in the region’s agrarian and oil‑boomer communities. Her cultural identity
    blends traditional Midwestern values of self‑reliance, modesty, and community involvement with the distinctive heritage of the Cherokee County area, where she has long participated in local festivals
    that honor Native American history. The values of hard work, practicality, and neighborly cooperation she inherited from her family shape both her professional ethos and her community engagements.
attributes:
  skills: '[''surface preparation'', ''residential painting'', ''wallpaper installation'', ''color selection and coordination'', ''project scheduling and budgeting'', ''safety compliance'', ''use of spray
