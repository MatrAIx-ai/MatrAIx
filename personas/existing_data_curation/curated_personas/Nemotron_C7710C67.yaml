  hobbies: '[''gardening'', ''watercolor painting'', ''quilting'', ''reading historical fiction'', ''book club participation'', ''church choir singing'', ''volunteering for Habitat for Humanity'', ''senior
    home‑maintenance workshops'']'
  career_goals: While approaching traditional retirement age, Eliana aims to transition from full‑time contracting to a part‑time mentorship role, training a small team of apprentices and passing on her
    meticulous trade skills. She hopes to establish a niche home‑maintenance business that emphasizes reliability and eco‑friendly painting solutions, building a reputation for on‑time completion and high‑quality
    finish in the Park Hill community. Additionally, she would like to volunteer her expertise with local Habitat for Humanity projects, combining her professional pride with community service.
