  hobbies: '[''Landscape Photography'', ''Woodworking'', ''Hiking'', ''Reading Historical Nonfiction'', ''Acoustic Guitar'', ''Visiting Art Galleries'', ''Community Theater'', ''Cooking International Recipes'']'
  career_goals: Looking ahead, Zachary aims to transition from managing a single location to a regional supervisory role within the supply‑chain sector, where he can apply his process‑improvement mindset
    to multiple stores. He plans to earn a professional certification in supply‑chain management or an associate’s degree in business administration to complement his extensive on‑the‑job experience. In
    the longer term, he envisions launching his own boutique store that combines retail with a community art space, promoting local artisans and sustainable products. He also hopes to mentor younger employees
    and contribute to economic‑development initiatives in Fulton County.
