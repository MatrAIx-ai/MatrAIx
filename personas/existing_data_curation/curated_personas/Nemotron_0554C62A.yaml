personas:
  professional: James Mokari, a seasoned front‑line retail operations veteran, blends decades of customer service mastery, sales negotiation, and visual merchandising with a curious, art‑infused perspective;
    they now pivot toward part‑time consultancy for local businesses and plan to launch a boutique showcasing regional artisans while mentoring younger colleagues.
  sports: James Mokari, a devoted participant in the Charleston Hiking Club and a regular at the Charleston Pickleball Association, tackles weekend Appalachian Trail sections, plays casual pickleball in
    the fall, and cheers on the Carolina Panthers, Charleston Battery, and Charlotte Hornets, viewing physical activity as a blend of social engagement and personal challenge.
  arts: James Mokari, a passionate volunteer backstage at the community theater, spends evenings at art galleries admiring works by Yayoi Kusama and Georgia O'Keeffe, attends folk festivals featuring Rhiannon
    Giddens and the Carolina Chocolate Drops, and they find inspiration for their own watercolors in the vibrant palettes of local Appalachian crafts.
  travel: James Mokari, a road‑trip enthusiast who prefers flexible itineraries, has driven the Blue Ridge Parkway to explore Asheville's art scene, spent a weekend wandering the historic streets of Savannah
    and New Orleans, visited the Guggenheim Bilbao to study contemporary architecture, and they dream of a cultural pilgrimage to Kyoto's temples, balancing travel ambitions with the need to maintain a
    manageable consulting schedule.
  culinary: James Mokari, a home‑cook who delights in regional Lowcountry flavors, frequently prepares shrimp‑and‑grits with fresh garden‑grown okra, cooks a hearty gumbo using locally sourced catfish,
    thyme, and smoked sausage, and they experiment with heirloom tomato bruschetta and Cajun‑spiced collard greens, yet often forget to clean the kitchen thoroughly after cooking marinated fish.
  core: James Mokari is a curious, art‑infused retail veteran who trades structured schedules for spontaneous gallery visits, impromptu hikes, and a boutique dream, balancing disciplined financial habits
    with a lovable tendency to misplace their keys.
background:
  cultural: James grew up in the Kanawha Valley of West Virginia, an area with deep Appalachian roots. His family background reflects traditional values of self‑reliance, community connection, and a modest
    religious upbringing, though he identifies as culturally eclectic, appreciating both the folk music and crafts of the region and the broader American arts scene. The local culture of Charleston—a mix
    of small‑town friendliness, historic preservation, and a growing urban arts community—has shaped his worldview, fostering a blend of rugged practicality and curiosity about new ideas.
attributes:
  skills: '["Customer service", "Sales negotiation", "Visual merchandising", "Inventory management", "Conflict resolution", "Team mentoring", "Art curation", "Product trend research", "Basic digital retail
