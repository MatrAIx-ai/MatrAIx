personas:
  professional: Ian Locke, a 2-year-old with an insatiable curiosity, turns everyday play into miniature scientific experiments, using building blocks, water tables, and picture books to explore cause-and-effect
    while their easygoing nature lets them drift between activities without a rigid schedule, and they thrive on the lively energy of group play at home and in the park.
  sports: Ian Locke loves toddling to the local park's sandbox, attending a weekly toddler gymnastics class at Little Sprouts Gym, cheering for the hometown baseball team the Dayton Dragons, and kicking
    a soft foam ball with the Mini Soccer Club that meets on Saturday afternoons.
  arts: Ian Locke is entranced by the melodic world of The Wiggles, delights in finger-painting bright suns with washable paints like a miniature Van Gogh, and eagerly listens to storytime readings of Dr
    Seuss and Maya Angelou at the neighborhood library, shaping a vivid artistic imagination.
  travel: Ian Locke's travel palette includes weekend trips to Grandma's farm in Vermont, a day-long adventure at the city aquarium, and a memorable family vacation to Disney World in Orlando, preferring
    car rides filled with sing-along playlists and spontaneous stops for ice-cream.
  culinary: Ian Locke favors creamy macaroni and cheese, fluffy banana pancakes drizzled with honey, and crunchy carrot sticks, often helping to stir the batter with a plastic spoon while their parents
    introduce new textures like avocado mash during mealtime.
  core: Ian Locke is a curious, sociable toddler whose love for spontaneous play, bright colors, and gentle routines makes every day an adventure punctuated by occasional messy art sessions and piggy-bank
    treasures.
background:
  cultural: Ian comes from a white family rooted in the Pacific Northwest. His parents, raised in Seattle, value the region’s natural environment, public libraries, and community festivals. Their household
    reflects an inclusive, progressive Seattle culture, incorporating activities such as outdoor nature walks, library story hours, and community art workshops. While his ethnic heritage is primarily European
    descent, his upbringing is shaped by the multicultural, environmentally conscious atmosphere of King County.
