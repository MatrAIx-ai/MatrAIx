personas:
  professional: Jason Bullock, a retired mechanical engineer who now dedicates his time to mentoring high‑school STEM students and coordinating intergenerational art‑science workshops at the Greendale community
    center, leverages their precision‑driven analytical mind and craftsmanship to fuse technical rigor with creative expression, while still habitually checking and correcting the minor oversights that
    sometimes slip through in detailed project plans.
  sports: Jason Bullock, a lifelong follower of the Milwaukee Brewers, the Green Bay Packers, and the Milwaukee Bucks, regularly attends select home games each summer while cheering for the local Lakeview
    Senior Bowling Club, and they substitute high‑impact sports with gentle morning walks along the lakefront to maintain mobility.
  arts: Jason Bullock, a regular patron of the Milwaukee Art Museum and an avid watercolor hobbyist, draws inspiration from Monet’s 'Water Lilies' and the kinetic sculptures of Alexander Calder, spends
    afternoons sketching in the museum’s sculpture garden, and they fill evenings with classic jazz from Miles Davis and Ella Fitzgerald, while occasionally splurging on rare pigments despite a tendency
    to overmix colors.
  travel: Jason Bullock, who prefers low‑key, well‑planned trips, enjoys short road‑drives to the Door County peninsula for coastal bird‑watching, revisits cherished memories of a 1960s family vacation
    to New York City, and they dream of a leisurely river cruise along the Danube to explore European art museums, always budgeting carefully and relying on senior discounts.
  culinary: Jason Bullock, whose vegetable garden yields a bounty of heirloom tomatoes, carrots, and kale, delights in preparing rustic ratatouille, almond‑crusted baked trout, and spiced lentil soup, and
    they occasionally indulge in a buttery apple crumble made with Grandma’s secret cinnamon‑sugar blend, while maintaining a modest skill level in the kitchen, preferring simple, fresh ingredients over
    elaborate techniques.
  core: Jason Bullock, an 80‑year‑old former engineer whose curiosity fuels a blend of community mentorship, watercolor painting, classic jazz listening, and meticulous gardening, they balance a disciplined
    routine with occasional forgetfulness and a stubborn love for precision.
background:
  cultural: Jason was raised in a white, working‑class family with German‑Scandinavian roots typical of southern Wisconsin. Growing up in the 1940s and 1950s on a modest farm near Milwaukee, he absorbed
    Midwestern values of self‑reliance, community service, and modesty. The post‑war economic boom enabled him to attend college and earn a bachelor’s degree in a STEM field, after which he built a career
    in engineering before retiring. His upbringing emphasized church involvement, local civic clubs, and a strong work ethic, while his later life experiences—travel, exposure to diverse art forms, and
    a lifelong partnership—have broadened his perspective, blending traditional regional culture with an open‑minded curiosity for new ideas.
