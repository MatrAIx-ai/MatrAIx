  career_goals: Although retired, Jason aims to remain a vibrant contributor to his community. He plans to mentor local high‑school students in STEM projects, especially those that merge science with visual
    art, and to guide volunteers at the senior center in using technology for social connection. He hopes to document his life experience in a memoir that captures post‑war Midwestern history and his late
    wife’s legacy, and to establish a small scholarship fund in her name for students pursuing interdisciplinary studies. Additionally, he aspires to learn watercolor painting and to organize a monthly
    intergenerational art‑science workshop at the Greendale community center.
