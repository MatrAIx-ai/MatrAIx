  hobbies: '[''Visiting art museums and galleries'', ''Playing acoustic guitar (flamenco style)'', ''Cooking Spanish cuisine'', ''Hiking in the Rockies'', ''Reading non-fiction (philosophy, social justice,
    legal theory)'', ''Meditation and mindfulness'', ''Volunteering at community arts programs'', ''Photography of landscapes and cityscapes'']'
  career_goals: Luis aims to become a partner at his law firm within the next five years, specializing in immigration and community law to better serve Spanish‑speaking residents of Colorado. He aspires
    to launch a nonprofit legal‑aid clinic that provides free representation to low‑income immigrants, and later to teach as an adjunct professor, sharing his practical insights and compassionate approach
    with future lawyers. Long‑term, he envisions influencing policy reforms that promote equitable access to justice.
