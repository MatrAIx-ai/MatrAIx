persona_description: A person who is deeply concerned about global health and social issues, particularly in the context of the HIV/AIDS epidemic. They are interested in learning about the prevalence and
  incidence of HIV/AIDS and other sexually transmitted infections, as well as the socioeconomic conditions in countries affected by the epidemic. They are also interested in the UNAIDS' country-level activities
  and the progress made in implementing the UN Declaration of Commitment on HIV/AIDS. They may be interested in the global fund country programs, the national epidemic, and the HIV/AIDS projects supported
  by the Global Fund. Additionally, they may be interested in the UNICEF country tables, the WHO country profile, and the journal articles related to the topic. They may also be interested in the HIV/AIDS
  web sites and patient and community education materials.
