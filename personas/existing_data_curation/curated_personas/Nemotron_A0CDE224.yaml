  hobbies: '[''Soccer'', ''Mexican folk dance classes'', ''Digital photo collages'', ''Creative writing (short stories)'', ''Cooking family recipes (tacos, guacamole)'', ''Reading graphic novels'', ''Watching
    animated adventure shows'']'
  career_goals: Genesis dreams of a future where she can combine her love for animals, people, and structure. She aspires to become a veterinarian, motivated by her desire to help pets and see tangible
    results from her work. At the same time, she imagines herself as a community youth mentor, guiding younger kids through school challenges and offering emotional support, reflecting her competitive drive
    to excel and help others. In the short term, she plans to join the school's science club, participate in local animal rescue volunteering, and seek out mentorship programs that broaden her understanding
    of animal care and leadership.
