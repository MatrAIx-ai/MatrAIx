  hobbies: '[''Reading books'', ''Sketching animals'', ''LEGO building'', ''Puzzle solving'', ''Gardening'', ''Feeding pets'', ''Listening to Mexican music'', ''Playing educational tablet games'']'
  career_goals: Although she is only eight, Victoria often imagines a future where she works with animals and nature. She dreams of becoming a veterinarian or wildlife biologist so she can care for the
    neighborhood chickens, her family rabbit, and the local wildlife she observes on nature walks. She is attracted to a structured, science‑based environment where she can work independently, solve problems,
    and help living creatures stay healthy. In the short term, she hopes to earn a 'science fair' badge and be recognized for caring for her school’s classroom pet.
