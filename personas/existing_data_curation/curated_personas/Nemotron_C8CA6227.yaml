personas:
  professional: Victoria Alemany is an aspiring junior naturalist who catalogs backyard wildlife in meticulous journals, leveraging their love of structure and solitary focus to create detailed sketches
    and observations.
  sports: Victoria Alemany enjoys casual backyard exploration and a weekly beginner swimming class, follows the local baseball team the River Rapids and the national women’s soccer champions the Skyline
    Stars, and prefers low‑intensity, structured activities to competitive team sports, allowing their quiet energy to stay balanced.
  arts: Victoria Alemany expresses their creativity through daily animal sketches inspired by Beatrix Potter and the colorful murals of Frida Kahlo, and often sings along to the traditional Mexican ballads
    of Vicente Fernández while listening to Disney soundtracks.
  travel: Victoria Alemany prefers gentle, family‑oriented trips, recalling a weekend at the local botanical garden and a summer visit to the Grand Canyon, while dreaming of exploring the colorful streets
    of Oaxaca and the wildlife sanctuaries of Costa Rica, allowing their curiosity to flourish at a comfortable pace.
  culinary: Victoria Alemany enjoys snacking on crisp carrot sticks and fresh cucumber slices from the garden, can whip up a simple cheese quesadilla with shredded cheddar and a sprinkle of cilantro, and
    delights in tasting their grandmother’s homemade mango salsa, though they sometimes smudge too much ketchup on their pizza.
  core: Victoria Alemany is a quiet, structure‑loving eight‑year‑old who fills their days with animal drawings, LEGO builds, and garden duties, yet often forgets to put toys away and can become fiercely
    protective of their rabbit when startled.
background:
  cultural: Victoria comes from a Mexican‑American family that lives in Manteca, California. She was raised in a bilingual home where Spanish is spoken daily, and she celebrates Mexican holidays such as
    Día de los Muertos and Cinco de Mayo with her extended family. Family meals often feature traditional dishes like tamales and enchiladas, which she helps prepare. Her cultural identity blends Mexican
    traditions—music, language, and community gatherings—with the everyday life of a suburban Californian child, giving her a rich, multicultural perspective.
