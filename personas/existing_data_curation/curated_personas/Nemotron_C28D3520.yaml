  career_goals: Margaret dreams of a career that blends her desire for order with helping others. She frequently says she wants to become a teacher because she enjoys creating organized learning environments
    and guiding classmates through lessons. She also imagines being a veterinarian, caring for animals in a structured clinic where routines are clearly defined. Ultimately, she aims for a profession that
    offers stability, clear expectations, and the chance to support others in a predictable way.
