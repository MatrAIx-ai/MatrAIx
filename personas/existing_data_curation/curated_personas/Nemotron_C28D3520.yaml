personas:
  professional: An aspiring junior architect, Margaret Prosser loves assembling LEGO kits and jigsaw puzzles with methodical precision, channeling their practical, structured mindset into creating tiny,
    orderly worlds on a small kitchen table, while they practice simple piano pieces and participate in Girl Scouts badge projects that reinforce their sense of responsibility.
  sports: An enthusiastic junior fan, Margaret Prosser cheers for the Oklahoma City Thunder and the Oklahoma State Cowboys while they participate in their community’s Bison Soccer Club, where weekly practices
    and a Sunday park jog make up their structured, small‑group approach to staying active.
  arts: A budding cultural connoisseur, Margaret Prosser delights in singing along to Dolly Parton’s country classics and watching Disney's Frozen on Saturday mornings, while they practice simple piano
    arrangements of You've Got a Friend in Me, and they eagerly flip through picture books illustrated by Eric Carle, shaping their creative identity.
  travel: A thoughtful little explorer, Margaret Prosser prefers short, well‑planned family road trips such as annual visits to the Oklahoma State Fair, weekend outings to the Tulsa Zoo, and a recent adventure
    to the Grand Canyon, while they dream of a future magical stay at Disney World, where they imagine staying in a princess‑themed suite.
  culinary: A curious young foodie, Margaret Prosser enjoys the smoky flavor of Oklahoma‑style barbecue ribs, creamy macaroni and cheese, and crunchy carrot sticks, and they proudly help stir batter for
    biscuits and spread peanut butter on whole‑grain toast, though they can be fussy about trying new vegetables beyond corn and peas.
  core: Margaret Prosser is a meticulous six‑year‑old who finds comfort in predictable routines, builds tiny worlds with LEGO bricks, and quietly worries about the unknowns that disrupt their orderly day,
    so they often seek reassurance from parents when faced with change.
background:
  cultural: Margaret was born and raised in Oklahoma City, Oklahoma, within a white, middle‑class family that values community, modesty, and tradition. Her upbringing reflects Midwestern cultural influences
    such as celebrating holidays like Thanksgiving and the Fourth of July with family gatherings and local festivals, attending a Baptist church where she participates in Sunday school, and enjoying regional
    foods like barbecue on special occasions. She has been exposed to country and folk music through family playlists and often visits the Oklahoma State Fair with her parents, experiencing the state's
    agricultural heritage. These cultural elements shape her sense of community, respect for routine, and appreciation for small‑scale social events.
