    OSHA)'', ''Interdisciplinary communication'', ''Mentoring and teaching'', ''Time management'', ''Problem‑solving'']'
  hobbies: '[''Community basketball league'', ''Running club and 5K races'', ''Hiking and birdwatching'', ''Fishing trips'', ''DIY home improvement and woodworking'', ''Gardening'', ''Barbecuing and grilling'',
