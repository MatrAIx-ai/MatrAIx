  career_goals: James aims to become the lead sonographer in his department and obtain advanced certifications such as the Registered Diagnostic Cardiac Sonographer (RDCS) and the Registered Vascular Technologist
    (RVT). He plans to spearhead a quality‑improvement program that integrates AI‑assisted image analysis to boost diagnostic accuracy. Over the next five years, he hopes to mentor a cohort of junior sonographers,
    contribute to regional ultrasound research conferences, and possibly pursue a bachelor's degree in health sciences to broaden his leadership prospects. Ultimately, he envisions a managerial role where
    he can shape imaging protocols, advocate for patient‑centered care, and foster a culture of continuous learning within the clinic.
