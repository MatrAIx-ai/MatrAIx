  career_goals: Kyra aims to transition into a supervisory role such as shift lead or training coordinator within the next two years, allowing her to share her extensive knowledge with younger employees
    while shaping smoother workflow practices. She also envisions a phased retirement that keeps her involved part‑time, possibly leading a small community‑based craft (quilting) studio for seniors. Reducing
    workplace stress through better process documentation and advocating for ergonomic improvements are key personal ambitions, alongside maintaining financial stability for her family.
