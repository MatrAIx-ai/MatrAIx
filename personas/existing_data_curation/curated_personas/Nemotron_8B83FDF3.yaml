  career_goals: Patricia aims to move into a senior technical leadership role where she can shape product strategy and mentor the next generation of developers. Over the next few years she plans to become
    a technical lead or architect for a civic‑tech or nonprofit organization in the Washington, D.C. area, leveraging her business acumen to build solutions that improve public services. She also aspires
    to lead initiatives that promote inclusive, collaborative development practices and to champion flexible work environments that balance structure with creative freedom. In the longer term, she envisions
    contributing to open‑source projects and possibly consulting for small enterprises seeking to modernize their technology stacks.
