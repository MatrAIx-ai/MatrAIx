  hobbies: '[''Bowling league'', ''Ballroom dancing'', ''Habitat for Humanity volunteering'', ''Metalworking art projects'', ''Gardening'', ''Quilting'', ''Crossword puzzles'']'
  career_goals: Charlotte aims to transition into a foreperson or safety‑inspector role within her plant, earning a Certified Welding Inspector (CWI) credential and expanding her influence on workplace
    safety. She also hopes to design a local apprenticeship program that combines her competitive drive with her desire for structure, ensuring a reliable pipeline of skilled workers. Long‑term, she envisions
    a semi‑retired consultancy where she advises smaller fabricators on efficiency and compliance while maintaining financial security for a comfortable retirement.
