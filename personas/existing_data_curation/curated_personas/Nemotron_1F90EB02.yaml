personas:
  professional: A veteran structural steel fabricator, Charlotte Kelly leverages her three decades of MIG, TIG, and stick welding expertise, meticulous safety focus, and competitive drive to mentor apprentices,
    enforce OSHA standards, and push for higher compliance as she pursues a foreperson role and Certified Welding Inspector credential.
  sports: Charlotte Kelly stays active through a weekly bowling league with the River City Rollers, follows the Chicago Cubs baseball season and cheers for the Chicago Bears in the fall, and attends a local
    ballroom-dance studio that doubles as a low-impact cardio workout, blending her sociable energy with a structured fitness routine.
  arts: Charlotte Kelly channels her creative side into small metalworking sculptures inspired by Alexander Calder's kinetic forms, while unwinding with the smooth vocals of Norah Jones, the jazz piano
    of Bill Evans, and the classic films of Audrey Hepburn, and she frequently attends gallery openings featuring emerging sculptors and textile artists like Faith Ringgold.
  travel: Charlotte Kelly prefers meticulously planned road trips that combine cultural exploration with hands-on workshops, having driven the Pacific Coast Highway to visit San Francisco's shipbuilding
    museums, and she dreams of joining a heritage-preservation volunteer program in Bruges, Belgium, all while balancing her family budget and limited vacation days.
  culinary: Charlotte Kelly is a competent home cook who favors hearty, protein-rich dishes such as braised short ribs with rosemary and root vegetables, regularly incorporates fresh garden produce like
    heirloom tomatoes into salads, and indulges in occasional steakhouse nights featuring a perfectly seared ribeye, though she sometimes overindulges in sugary pastries after long quilting sessions.
  core: Charlotte Kelly merges a steelworker's precision with a social butterfly's energy, obsessively planning each project while secretly worrying about every detail, and can be found balancing a wrench
    in one hand and a knitting needle in the other.
background:
  cultural: Charlotte grew up in a white, Midwestern family in the Sun Prairie area, steeped in the region’s practical, self‑reliant values and a strong community ethic. Her upbringing emphasized hard work,
    punctuality, and participation in local institutions such as the church, school events, and the union hall. The cultural mix of German‑Polish heritage common in Dane County influences her appreciation
    for craftsmanship, straightforward communication, and collective responsibility, all of which shape her structured yet sociable outlook.
