    at community kitchen'']'
  career_goals: Although retired from the formal workforce, Jose aims to channel his organizational strengths and compassionate nature into mentorship roles within the Salvadoran community in Evansville.
    He aspires to serve as a volunteer liaison for local social‑service agencies, helping families navigate benefits, healthcare, and immigration resources. He also hopes to document and share his family's
    migration story, preserving cultural heritage for future generations. Maintaining physical health, financial stability, and contributing to community harmony remain central to his ambitions.
