persona_description: A geologist who specializes in the study of subduction zones and the Nankai Trough in particular. This person is interested in understanding how stress builds up in subduction zones
  like Nankai, which is located along the Pacific coast from British Columbia to Northern California. They are also interested in the history of earthquakes in the region and how they relate to the subduction
  zone. This person has experience with riser drilling technology and has contributed to the successful drilling of nearly a mile beneath the ocean floor into one of the world's most active earthquake zones.
