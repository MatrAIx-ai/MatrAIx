personas:
  professional: Adrienne Yao, a 95-year-old senior center event planner and volunteer curator, leverages their methodical organization, empathetic listening, and deep knowledge of visual and performing
    arts to design community exhibitions, mentoring younger volunteers with precision and a warm, collaborative spirit.
  sports: Adrienne Yao enjoys daily beach walks, participates in a senior tai chi circle at the Hale'āina Community Center, and cheers for the University of Hawaii Rainbow Warriors men's basketball team
    while holding a season ticket for the on-campus arena, blending gentle fitness with regional sports fandom.
  arts: Adrienne Yao curates local gallery shows featuring works reminiscent of Georgia O'Keeffe's floral abstractions, attends ukulele recitals by Jake Shimabukuro, and leads quilting circles that reinterpret
    traditional island motifs through intricate geometric patterns, embodying a lifelong devotion to visual and musical expression.
  travel: Adrienne Yao favors low-impact, organized trips such as a comfortable cruise to the Galapagos, a guided cultural tour of Kyoto's gardens, and seasonal weekend getaways to Maui's Hana Highway,
    balancing curiosity with the practical need for accessible accommodations and familiar companions.
  culinary: Adrienne Yao delights in preparing classic island fare like kalua pork, lomi salmon, and poi made from freshly harvested taro, seasons dishes with ginger, lemongrass, and a splash of coconut
    milk, and experiments with infusion sauces, yet often forgets to label leftovers, leading to occasional confusion in the community kitchen.
  core: Adrienne Yao, a 95-year-old art-savvy gardener and storyteller, blends meticulous planning with a breezy love of ukuleles, quilting, and beach walks, even if they sometimes misplace their glasses
    and forget to turn off the oven.
background:
  cultural: Adrienne is a white American who spent her early years on the mainland before moving to Pearl City, Hawaii, in her forties. While she retains her European‑American heritage, decades of living
    on Oʻahu have deeply infused her worldview with Hawaiian cultural values. She participates in local customs such as lei making, celebrates Hawaiian holidays, and respects the concepts of aloha and kanaka maoli
    stewardship. Her upbringing in a mid‑century American household combined with the multicultural fabric of Honolulu County gives her a unique perspective that celebrates both her roots and the island’s
    diverse traditions.
