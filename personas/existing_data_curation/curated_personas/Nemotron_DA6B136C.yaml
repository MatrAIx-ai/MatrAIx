  career_goals: Even at 95, Adrienne’s ambitions focus on leaving a lasting, positive imprint on her community. She aims to continue mentoring younger volunteers, especially in the arts and senior‑care
    sectors, and to compile a memoir of her life’s experiences that highlights cross‑cultural insights between mainland and Hawaiian traditions. She hopes to organize an intergenerational art exchange program
    that brings together seniors and schoolchildren, and to maintain her own health and vitality so she can attend local cultural events and support her neighbors.
