personas:
  professional: Susan Mayo, a 22‑year‑old management analyst in Chicago, leverages her strong Python, R, and Power BI skills to translate complex data into clear strategic insights, while her methodical
    organization and curiosity drive her to constantly ask “what if” questions that push senior leadership toward innovative, art‑inspired solutions.
  sports: Susan Mayo stays fit by attending a Saturday morning spin class and joining the Chicago Area Runners club for weekly long runs, cheerfully rooting for the Chicago Cubs in baseball and the Chicago
    Bulls during the NBA season, while she prefers low‑key yoga over competitive sports.
  arts: Susan Mayo immerses herself in Chicago’s art scene, regularly attending exhibitions by artists like Kerry James Marshall and Ai Weiwei at the Art Institute, while she also finds inspiration in the
    music of Sufjan Stevens, the poetry of Ocean Vuong, and the theatre work of Tracy Letts, shaping her creative problem‑solving at work.
  travel: Susan Mayo plans her trips with meticulous spreadsheets, favoring weekend escapes to Starved Rock State Park for hiking, weekend city breaks to New York’s Museum Mile, and dreaming of a cultural
    immersion stay in Kyoto to study traditional Japanese design, balancing budget constraints with a craving for artistic discovery.
  culinary: Susan Mayo experiments in her small kitchen with eclectic recipes like Ethiopian doro wat, Korean bibimbap, and a Chicago‑style deep‑dish pizza, skillfully chopping fresh cilantro, gochujang,
    and mozzarella while she still relies on take‑out sushi on hectic work nights.
  core: Susan Mayo is a data‑driven analyst who channels her Midwestern work ethic and boundless curiosity into art‑infused strategic projects, yet she often battles worry‑induced over‑planning and can’t
    resist a late‑night coffee binge.
background:
  cultural: Susan grew up in a middle‑class white family in the Chicago metropolitan area, absorbing a blend of Midwestern pragmatism and the city’s rich cultural diversity. Her upbringing emphasized hard
    work, community involvement, and an appreciation for the arts, partly inspired by frequent trips to the Art Institute of Chicago and local theater productions. While her family’s heritage traces back
    to Northern European roots, her worldview has been shaped by Chicago’s multicultural environment, fostering an open‑minded attitude toward new ideas and unconventional perspectives.
