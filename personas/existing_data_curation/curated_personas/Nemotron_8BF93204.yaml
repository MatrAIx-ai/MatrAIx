  hobbies: '[''Visiting art museums and galleries'', ''Photography (urban and architectural)'', ''Reading contemporary fiction and non‑fiction'', ''Attending public lectures and creative workshops'', ''Participating
    in a book club'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Cooking experimental dishes'', ''Board game nights with friends'', ''Weekend hikes in nearby nature reserves'']'
  career_goals: Susan aims to progress from a junior management analyst to a senior strategic analyst within the next five years, eventually moving into a consulting role where she can influence larger
    organizational transformations. She plans to pursue an MBA with a focus on operations and analytics to broaden her strategic perspective. Long‑term, she aspires to lead a data‑driven innovation team
    that bridges analytics with cultural initiatives—such as optimizing museum visitor experiences or enhancing community arts programs—leveraging her love for art and unconventional thinking. She also
    hopes to mentor younger analysts, fostering a collaborative yet rigorous work culture.
