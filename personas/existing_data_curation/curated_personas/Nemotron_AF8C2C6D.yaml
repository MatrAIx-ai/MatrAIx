personas:
  professional: Jeffrey Perez, a 17‑year‑old self‑taught IT enthusiast, leverages their knack for diagnosing hardware failures, overclocking custom gaming rigs, and basic Python scripting to excel in troubleshooting
    tasks, while their preference for structured, predictable workflows balances their relaxed attitude toward long‑term planning in pursuit of a CompTIA A+ certification and a future tech‑support role.
  sports: Jeffrey Perez, an avid cyclist who rides with the South Bend Cycling Club three times a week, follows the Notre Dame Fighting Irish football team with seasonal fervor, keeps up with the Indiana
    Pacers for basketball highlights, and occasionally joins pickup basketball games at the local community center for cardio variety.
  arts: Jeffrey Perez, who collects graphic novels from William Gibson, streams music from The Strokes and Daft Punk while editing urban photos on their phone in the style of Ansel Adams, and enjoys the
    occasional indie film festival featuring works by Christopher Nolan.
  travel: Jeffrey Perez, who prefers low‑key road trips on a bike or car, has explored nearby Chicago’s tech scene, taken a weekend visit to Mackinac Island for its historic charm, dreams of attending the
    Tokyo Game Show in Japan, and plans a future trek to Reykjavik to chase the Northern Lights, all while budgeting travel through a high‑school savings plan.
  culinary: Jeffrey Perez, a beginner home chef who can reliably grill a classic Indiana BBQ pork rib slab, whip up a comforting mac‑and‑cheese with sharp cheddar, experiment with spicy ramen topped with
    soft‑boiled eggs and sesame oil, and savors fresh avocado toast sprinkled with chili flakes, yet often orders pizza delivery when a gaming marathon runs late.
  core: Jeffrey Perez, a 17‑year‑old tech‑savvy introvert, channels competitive fire into gaming rigs and coding challenges, balances meticulous hardware work with a laid‑back approach to planning, and
    habitually forgets to clean their desk, leaving a scattered landscape of cables and snack wrappers.
background:
  cultural: Jeffrey grew up in a middle‑class family in South Bend, Indiana, a city with a strong Midwestern work ethic and a mix of industrial and academic influences due to nearby universities. His family’s
    cultural roots are primarily of European descent, and they value self‑reliance, practical skills, and a straightforward approach to problem‑solving. The local community places emphasis on small‑town
    camaraderie, local sports (especially football and basketball), and seasonal outdoor activities. While Jeffrey is not actively religious, he was raised with a familiar awareness of regional customs,
    such as holiday celebrations and community events, which have subtly shaped his respectful, yet independent outlook.
attributes:
  skills: '["Computer troubleshooting", "Hardware assembly and PC building", "Basic Python scripting", "Video game strategy analysis", "Bike repair", "Basic woodworking", "Home repair (e.g., minor plumbing)",
    "Photo and video editing", "Critical analytical thinking", "Competitive gaming"]'
  hobbies: '["Custom PC building and tweaking", "Competitive video gaming (tactical shooters, RTS)", "Cycling", "Reading science‑fiction and technology blogs", "Photography (urban and nature)", "Python
    coding challenges", "Weightlifting (solo workouts)", "Chess puzzles (online)", "DIY electronics projects", "Listening to alternative rock music"]'
  career_goals: Jeffrey aims to obtain his GED within the next year and then earn an entry‑level IT certification such as CompTIA A+. He hopes to leverage his hands‑on computer skills into a paid position
    as a tech support specialist or freelance PC repair technician. In the medium term, he envisions opening a small storefront offering computer repair, custom‑build services, and basic electronics troubleshooting.
    He also keeps a modest aspiration to explore a side career in competitive gaming or streaming, viewing it as a supplemental income source rather than a primary livelihood. Overall, he wants a career
    that balances clear, structured tasks with the flexibility to work independently and solve practical problems.
