  hobbies: '[''Hiking'', ''Nature photography'', ''Gardening'', ''Genealogy research'', ''Reading nonfiction on social innovation'', ''Quilting'', ''Community theater'', ''Yoga'']'
  career_goals: Looking ahead, Tiffanie aims to broaden the reach of her county’s social services by establishing a regional hub that integrates health, mental‑wellness, and workforce programs for underserved
    residents. She plans to secure a certification as a Certified Community Service Manager and to earn a professional credential in nonprofit leadership. Over the next five years, she hopes to lead a multi‑county
    initiative that creates sustainable funding streams through public‑private partnerships, while also mentoring emerging community leaders. Ultimately, she envisions a legacy of resilient, locally controlled
    service networks that can adapt to demographic shifts and economic challenges.
