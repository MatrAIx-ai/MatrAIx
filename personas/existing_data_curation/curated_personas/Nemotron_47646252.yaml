  career_goals: Michael aims to advance within the retail sector by first becoming a shift supervisor and then a store manager, where he can mentor new employees and shape a welcoming store culture. Over
    the next five years, he hopes to earn a retail management certification and possibly transition to a regional supervisory role. Inspired by his humanities degree and community ties, he also envisions
    volunteering as a financial literacy coach for local youth and, in the longer term, opening a small community-focused boutique that combines his love for local crafts and sustainable practices.
