persona_description: A physician who advocates for universal HIV screening as a crucial component of medical care and believes it can benefit patients, teenagers, and the overall fight against HIV/AIDS.
  They recognize the obstacles to universal HIV screening but believe it is important to recommend HIV screening even without follow-up discussions to convey important health messages to patients and convey
  to teenagers that HIV testing is an important component of medical care. They are aware of the challenges faced by health care workers, health insurers, and funding sources but are committed to advocating
  for increased focus and financial and political oomph at the federal level to implement universal HIV screening.
