personas:
  professional: Jason Edgar, a 55‑year‑old chief executive in the Appalachian resource sector, merges rigorous long‑term strategic planning with a quietly curious, design‑thinking mindset, using their love
    of art and texture to embed aesthetic and sustainable principles into the company’s brand while quietly cultivating a mentorship pipeline for local talent.
  sports: Jason Edgar is an avid solo hiker who tackles Wetzel County’s rugged trails weekly, follows the West Virginia Mountaineers football team with quiet dedication, and occasionally joins a local chess
    club that meets at the community center after a light jog, all while they keep a modest collection of hiking boots that are perpetually scuffed.
  arts: Jason Edgar devotes their leisure to studying art history, roaming the regional gallery to examine works by emerging artists like Maya Lin, capturing Appalachian light through their DSLR, and winding
    down with a playlist that interleaves Beethoven’s Ninth Symphony and the Appalachian folk sounds of the Carter Family.
  travel: Jason Edgar prefers low‑key, self‑planned trips that blend photography and cultural immersion, such as sunrise shoots at Shenandoah National Park, weekend explorations of Asheville’s River Arts
    District, and an annual pilgrimage to Florence, Italy, to study Renaissance frescoes, and they meticulously map each itinerary in a leather‑bound journal.
  culinary: Jason Edgar enjoys farm‑to‑table cooking, turning their home‑grown heirloom tomatoes, basil, and fresh mozzarella into a vibrant Caprese salad, while also honoring Appalachian flavors with smoked
    trout, cornbread, and collard greens seasoned with apple cider vinegar, and they often experiment with new spice rubs late into the night.
  core: Jason Edgar balances a solitary, curiosity‑driven executive mindset with artistic sensibility and a habit of worrying over details, forging a life that fuses strategic ambition, aesthetic appreciation,
    and quiet resilience, and they never miss a chance to capture a fleeting moment through their camera lens.
background:
  cultural: Jason was raised in the tight-knit towns of Wetzel County, West Virginia, where the cultural fabric is woven from Appalachian traditions of self-reliance, community solidarity, and a deep respect
    for the natural landscape. Growing up in a predominantly white, working-class environment, he absorbed the values of modesty, hard work, and a reverence for local folk music, storytelling, and crafts.
    Although he attended college for a time, his formative experiences came from family-run businesses and the region’s historic ties to timber and coal. This background informs his pragmatic leadership
    style, his commitment to regional development, and his appreciation for the arts as a means of preserving and celebrating Appalachian heritage.
