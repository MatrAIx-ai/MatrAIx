  hobbies: '[''Street art'', ''Digital illustration'', ''Basketball'', ''Listening to Latin and hip‑hop music'', ''DJing'', ''Competitive video gaming'', ''Improvisational comedy'', ''Photography'', ''Cooking
    Dominican dishes with family'']'
  career_goals: Ramiro aims to turn his artistic passion into a career as a multimedia storyteller. He hopes to earn his high school diploma or a GED, then enroll in a community college program for graphic
    design or digital media. He dreams of leading community mural projects in Trenton that celebrate Dominican culture while giving local youth a creative outlet. Parallel to that, he wants to build an
    online presence—through TikTok and YouTube—where he shares short visual pieces, music mixes, and behind‑the‑scenes looks at his art process. He also envisions a future where he can produce and DJ at
    cultural events, merging his love for visual art, music, and performance. A long‑term ambition is to secure a scholarship for a specialized arts institute, giving him the technical training to become
    a professional creative director or visual artist.
