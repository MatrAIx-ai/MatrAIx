personas:
  professional: Ramiro Aguirre is a self‑taught visual creator who blends street‑art on city walls with digital illustration, leveraging bilingual fluency and charismatic facilitation to lead collaborative
    mural projects while dreaming of a scholarship to a specialized arts institute, and they aspire to build an online presence on TikTok and YouTube.
  sports: Ramiro Aguirre is a regular at the local park where they play pickup basketball multiple evenings a week, cheering for the New York Knicks and participating in a community youth league, while
    they also organize streetball tournaments with friends and follow the NBA season religiously.
  arts: Ramiro Aguirre blends graffiti‑style sketches on urban walls with digital drawing on a tablet, curates eclectic playlists featuring Bad Bunny, Romeo Santos, and Travis Scott, dabbles in DJ sets
    for school parties, sharpens improv comedy skills in a school club, and draws inspiration from Banksy, Keith Haring, and contemporary urban musicians.
  travel: Ramiro Aguirre enjoys wandering local cafés and street markets for creative inspiration, and they plan spontaneous day trips to New York City to explore galleries like MoMA and the Brooklyn street‑art
    scene, while budget constraints keep most trips short and affordable.
  culinary: Ramiro Aguirre loves cooking family recipes such as mangú and tostones on weekends, experimenting with garlic, plantains, and homemade sofrito, while they also enjoy pairing their dishes with
    strong coffee and occasionally order pizza or ramen after long gaming sessions.
  core: Ramiro Aguirre is a hyper‑creative, bilingual teen who merges street art, digital media, basketball, and DJing into a restless, socially driven lifestyle, fueled by competitive instincts, occasional
    anxiety, and a love for family‑rooted cooking.
background:
  cultural: Ramiro is a second‑generation Dominican American raised in the multicultural neighborhoods of Trenton, New Jersey. His household is bilingual, speaking Spanish at home while navigating English
    in school and the wider community. Family gatherings often feature Dominican cuisine, lively music, and storytelling that keep his heritage alive. He participates in local cultural festivals that celebrate
    Caribbean arts, which have influenced his aesthetic sensibilities. While he embraces Dominican traditions—such as the importance of family, respect for elders, and festive celebrations—he also identifies
    with the broader American youth culture, blending the two worlds through his art, music, and social interactions.
attributes:
  skills: '[''Graffiti and street art'', ''Digital illustration'', ''Bilingual communication (English/Spanish)'', ''Social media content creation'', ''Video editing'', ''Basketball'', ''Improvisational
