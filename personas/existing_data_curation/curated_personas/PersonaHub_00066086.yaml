persona_description: A health professional who is interested in the development and application of evidence-based practices in obstetrics. This person is likely to have expertise in obstetrics and perinatal
  care, and has a background in clinical research. They are likely to have read about the controversy surrounding the standardization of the horizontal position during labor and the adoption of the upright
  position as a way to improve maternal comfort and reduce the need for analgesia. They are also likely to be familiar with the scientific development of obstetrics and the role of policy makers, health
  professionals, and the lay society in shaping health policies and practices.
