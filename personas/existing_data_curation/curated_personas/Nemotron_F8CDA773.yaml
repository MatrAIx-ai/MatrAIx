personas:
  professional: Michael Greene is a seasoned strategic operations leader whose expertise in data‑driven KPI dashboards, Agile‑Waterfall project management, and stakeholder mediation is infused with a curator’s
    eye for emerging contemporary art, allowing them to champion innovative, culture‑centric initiatives while maintaining disciplined operational rigor.
  sports: Michael Greene follows the Washington Capitals for hockey, the Washington Wizards for basketball, and participates in the Catoctin Trail Runners Club for weekend trail runs, preferring low‑impact
    cardio over team sports while they still schedule a monthly friendly tennis match with local art nonprofit colleagues.
  arts: Michael Greene immerses themselves in the contemporary art scene, curating private viewings of works by artists such as Kehinde Wiley, Amy Sherald, and Yinka Shonibare, attends community theater
    productions of plays like ‘The Importance of Being Earnest,’ mentors emerging artists at local nonprofits, and they find solace playing piano pieces by Debussy during quiet evenings.
  travel: Michael Greene favors meticulously planned cultural getaways, having explored New York’s MoMA, Italy’s Venice Biennale, and Kyoto’s tea‑house architecture, but they prefer short, low‑stress trips
    that fit into their garden‑maintenance schedule, often booking boutique inns that allow evening photo shoots of historic facades.
  culinary: Michael Greene is an adept home chef who blends Mediterranean mezze with Thai spices—frequently preparing dishes like lamb kofta with sumac and green papaya salad—and hosts intimate dinner gatherings
    where they showcase seasonal produce from their garden, though they occasionally over‑salt dishes when experimenting with new sauces.
  core: Michael Greene is a quiet yet inquisitive executive who balances boardroom strategy with gallery evenings, tends to over‑invest in art pieces at the expense of a passport stamp, and they consistently
    forget to water potted herbs on rainy days.
background:
  cultural: Michael is a second‑generation American of European descent, raised in the suburban Washington, D.C., area. His family heritage traces back to British and German ancestors, embedding a cultural
    foundation of traditional middle‑class American values, an emphasis on education, and community involvement. Growing up near the nation’s capital exposed him to a vibrant, multicultural environment
    that fostered his appreciation for diverse artistic expressions and progressive ideas. While his upbringing emphasized modesty, self‑reliance, and responsibility, his adult life reflects an openness
    to global perspectives, especially through his engagement with the regional art scene and occasional travel to European cultural hubs. This blend of conventional American roots and cosmopolitan exposure
    shapes his balanced worldview.
