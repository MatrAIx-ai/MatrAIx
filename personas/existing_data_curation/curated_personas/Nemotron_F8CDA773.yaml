  career_goals: Michael aims to progress to a senior executive role, such as Vice President of Operations or Chief Strategy Officer, where he can drive large‑scale innovation and embed creative, art‑focused
    initiatives into the corporate culture. He seeks to lead cross‑functional teams in developing sustainable, socially responsible business practices that reflect his appreciation for the arts. Mentorship
    is a priority; he intends to formalize a mentorship program for emerging managers, fostering a collaborative and harmonious work environment. Over the next five years, Michael also plans to build a
    portfolio of strategic consulting projects focused on organizational transformation and cultural integration, positioning himself for a potential board membership or advisory role post‑retirement. Throughout,
    he wishes to maintain a balanced lifestyle that allows continued personal growth and community involvement.
