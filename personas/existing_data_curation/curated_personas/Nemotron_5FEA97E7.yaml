  hobbies: '[''attending regional music festivals'', ''painting abstract watercolors'', ''reading contemporary philosophy and poetry'', ''experimenting with fusion cooking'', ''volunteering at community
    music workshops'', ''hiking Indiana state parks'', ''gardening'']'
  career_goals: William aims to record a concept album that intertwines his personal journey with broader themes of mental health and creative freedom, seeking partnerships with local studios that value
    analog warmth. He envisions establishing a monthly open‑mic series in Indianapolis that showcases diverse, emerging talent while fostering a supportive community atmosphere. Passionate about nurturing
    the next generation, he plans to develop a music‑outreach curriculum for at‑risk youth, blending performance skills with confidence‑building workshops. Long‑term, William hopes to launch a small independent
    label focused on Midwestern singer‑songwriters, providing production, distribution, and mentorship services to artists who share his love for authentic storytelling.
