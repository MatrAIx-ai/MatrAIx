personas:
  professional: Piper Nelson is a veteran bedside nurse with fifteen years of acute and community care experience who excels at patient assessment, wound care, and data‑driven quality improvement, and they
    channel their curiosity and practical mindset into mentoring new staff and spearheading evidence‑based protocols while preparing for a future nurse‑manager role.
  sports: Piper Nelson roots for the Kansas City Chiefs football team, cheers on the Kansas City Royals during baseball season, and they stay active by hiking the Flint Hills with a local women’s trekking
    group, playing weekly pickleball at the community center, and occasionally joining a volunteer coaching clinic for the high school’s cross‑country team.
  arts: Piper Nelson nurtures a love for historical fiction such as Ken Follett’s Century series and science books by Neil deGrasse Tyson, enjoys the folk‑rock sounds of Emmylou Harris and the bluegrass
    duo The Del McCoury Band, and they channel their creative eye into photographing prairie wildflowers and participating in the church’s annual drama club productions of classic plays like 'Our Town'.
  travel: Piper Nelson favors road‑trip vacations that blend nature and family time, having explored the Badlands and the Ozark National Forest, taken a weekend getaway to Asheville for its arts scene,
    and they dream of a spring visit to the vibrant tulip fields of Holland while balancing travel costs with the children’s school schedule.
  culinary: Piper Nelson delights in preparing Midwest comfort classics such as chicken pot pie with fresh heirloom carrots, skillet cornbread with honey butter, and grilled pork chops glazed with apple‑cider
    BBQ sauce, often cooking with homegrown tomatoes, zucchini, and rosemary harvested from their garden, and they love hosting potluck dinners where they showcase their modest yet confident culinary flair.
  core: Piper Nelson blends a practical, community‑focused nursing career with a love for gardening, prairie hikes, potluck cooking, and modest budgeting, all while balancing ambition, family life, and
    a quiet penchant for occasional cheese splurges and lingering backaches after long night shifts.
background:
  cultural: Piper was raised in a multigenerational, white Midwestern family in the suburbs of Wichita. Her grandparents emigrated from Germany and England, and family traditions emphasize hard work, modesty,
    and community service. A lifelong member of a Methodist congregation, she grew up attending Sunday school, youth groups, and local charity events, which reinforced her cooperative and kind nature. The
    Midwest’s blend of agricultural roots and modest industrial growth fostered her practical outlook, while the region’s strong sense of neighborliness nurtured her balanced social demeanor. Piper’s cultural
    identity is shaped by these values, her close-knit family life, and the seasonal rhythms of life in Sedgwick County, where community festivals, high school sports, and local fairs remain central to
    social interaction.
attributes:
  skills: '["Patient assessment", "IV therapy", "Wound management", "Medication administration", "Electronic health record navigation (Epic)", "Quality improvement project leadership", "Data analysis for
