    "Cross‑cultural patient education"]'
  hobbies: '["Organic vegetable gardening", "Hiking in the Flint Hills", "Reading historical fiction", "Participating in a church book club", "Cooking Midwest comfort foods", "Volunteering at community
    health fairs", "Knitting and quilting", "DIY woodworking"]'
  career_goals: Driven by a desire to improve both patient outcomes and nursing practice, Piper aims to earn a Master of Science in Nursing with a focus on healthcare administration within the next three
    years. She envisions stepping into a nurse manager role on her current medical-surgical unit, where she can implement evidence-based protocols and expand the unit’s quality-improvement initiatives.
    Piper also hopes to develop a community outreach program that combines health education with her love of gardening, offering workshops on nutrition and chronic-disease prevention for local families.
    Balancing ambition with her family responsibilities, she plans to pursue leadership opportunities that allow flexibility for her husband and two teenage children, while maintaining a hands‑on presence
    at the bedside to stay connected to patient care.
