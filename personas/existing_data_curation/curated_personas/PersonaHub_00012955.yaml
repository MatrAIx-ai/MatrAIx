persona_description: A group of architects who are leading the way in redefining architecture to address the challenges of energy, climate, and ecology. They embrace the crises of our time as a catalyst
  for new creative directions and are using advancements in bioengineering to perceive and manipulate energy in new ways. They are returning to the roots of their profession and are using landscape architecture
  and digital tools to design buildings that are not just enclosures but environments. They are pushing the boundaries of traditional architecture and are using their knowledge and skills to connect people
  with nature and advocate for policy and advocacy.
