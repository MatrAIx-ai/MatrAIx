persona_description: A biologist who specializes in the study of protozoa, particularly those that are transmitted by mosquitoes. This person is interested in understanding the molecular mechanisms that
  enable these parasites to move rapidly over a long time, which is necessary for successful transmission of the disease. They are likely to be familiar with the new microscope techniques used by Dr. Friedrich
  Frischknecht's research group and the CellHost & Microbe journal.
