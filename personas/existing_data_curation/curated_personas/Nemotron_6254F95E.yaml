  hobbies: '["Gardening", "Knitting", "Quilting", "Reading historical non‑fiction", "Reading classic mystery novels", "Hiking", "Volunteering at food pantry", "DIY club participation", "Cooking traditional
    recipes"]'
  career_goals: Karen aims to advance to a supervisory role within her manufacturing plant, such as a shift lead or production supervisor, where she can apply her expertise in process optimization and quality
    assurance to drive efficiency and uphold high standards. She is pursuing certification as a Certified Production Technician (CPT) and plans to complete an associate degree in industrial technology to
    strengthen her technical foundation. In the medium term, she hopes to lead a dedicated team focused on lean initiatives, and in the long term she envisions establishing a family‑run custom metalwork
    shop that leverages her fabrication skills to produce bespoke products for local clients, blending her practical expertise with a modest entrepreneurial venture.
