  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Reading mystery novels'', ''Knitting'', ''Walking her dog'', ''Volunteer at church food pantry'', ''Organizing community craft fairs'', ''DIY
    home organization projects'']'
  career_goals: Rebecca aims to transition into a supervisory role within the next two years, leveraging her extensive operational knowledge to lead a team of stockers. She is working toward becoming a
    shift lead or inventory specialist, with a focus on implementing Lean principles to reduce waste and improve order accuracy. While she values job stability, she also seeks to mentor younger employees
    and share her best practices. In the longer term, she envisions a part‑time consulting position for local businesses on inventory organization, allowing her to retire with financial security while staying
    engaged in the community.
