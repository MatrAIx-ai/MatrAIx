  career_goals: Harvinder aims to complete a bachelor’s degree in Computer Science within the next two years, secure a summer internship at a technology firm where he can apply his programming and data‑analysis
    skills, and ultimately obtain a full‑time software engineering position that offers mentorship and project autonomy. He is also interested in developing a community‑focused mobile app that connects
    local South Asian professionals and mentors, and he plans to earn certifications in cloud computing (AWS) and consider a master’s program in Human‑Computer Interaction to blend technical expertise with
    user‑centered design.
