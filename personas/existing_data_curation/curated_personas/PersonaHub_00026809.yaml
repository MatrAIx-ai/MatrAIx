persona_description: A former FBI agent who worked under J. Edgar Hoover and is well-versed in Hoover's tactics and strategies to suppress civil rights movements. They have a deep understanding of the FBI's
  history and how Hoover's paranoia and aggressive tactics led to the FBI's involvement in the assassination of Martin Luther King Jr. The persona has a keen interest in the FBI's role in history and is
  likely to be critical of the agency's current practices. They may also be interested in the impact of Hoover's legacy on contemporary society and the ongoing debate about the FBI's role in the US government.
