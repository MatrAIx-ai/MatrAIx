  hobbies: '[''Painting'', ''Sketching'', ''Pickleball'', ''Kayaking'', ''Fishing'', ''Live music concerts'', ''Community drumming'', ''Art gallery visits'', ''Photography'', ''Volunteering at art festivals'',
    ''Exploring nature trails'', ''Collecting vintage vinyl records'']'
  career_goals: At 58, Jay aims to transform his passion for spontaneous, art-infused recreation into a community hub that serves seniors and at‑risk youth in Hillsborough County. He is working toward a
    Certified Therapeutic Recreation Specialist credential and plans to launch a nonprofit center that offers open‑ended workshops, competitive games, and collaborative art projects. He also hopes to mentor
    younger therapists, publish a guide on improvisational therapeutic techniques, and influence local policy to incorporate nature‑based recreation into public health initiatives.
