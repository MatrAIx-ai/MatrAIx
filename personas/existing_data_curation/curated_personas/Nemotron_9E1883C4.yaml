personas:
  professional: Jay Moon is a veteran recreational therapist in Tampa Bay who designs spontaneous, art-infused activity programs for seniors and at-risk youth, leveraging their quick improvisational skills,
    competitive edge, and deep curiosity about unconventional therapies, while they constantly battle a chronic struggle with paperwork and deadlines.
  sports: Jay Moon competes in pickleball at the Hillsborough Community Center, cheering for the Tampa Bay Lightning, paddles with a local kayak club along the Hillsborough River, and joins a senior fishing
    league off the Tampa shoreline, blending fitness with friendly rivalry while they keep an eye on their health.
  arts: Jay Moon curates a personal collection of 1960s jazz vinyl from Miles Davis, John Coltrane, and Herbie Hancock, sketches seascapes of the Gulf in between volunteer art-festival duties, and joins
    a community drumming circle that reverberates the rhythms of Afro-Cuban percussionists, using these experiences to enrich therapeutic sessions and they often incorporate the beats they hear into group
    activities.
  travel: Jay Moon prefers weekend getaways that balance adventure and relaxation, such as kayaking the mangroves of the Everglades, a sunrise photography trip to Key West, and a cultural immersion tour
    of New Orleans' jazz districts, while they dream of a longer expedition to the Amalfi Coast to capture coastal light.
  culinary: Jay Moon favors fresh seafood, especially grilled grouper with lemon-butter sauce, enjoys cooking paella with saffron and chorizo at home, and they indulge in a Saturday habit of sampling artisanal
    coffee at a local roastery, often pairing it with an almond-paste croissant.
  core: Jay Moon is a spontaneous, art-obsessed therapist who blends competitive pickleball with jazz vinyl collecting, yet they habitually misplace paperwork and wrestle with impulse purchases.
background:
  cultural: Jay is a White American with deep roots in the Southeast, having grown up in a modest, working‑class family that valued self‑reliance and community ties. Relocating to Tampa in his early thirties,
    he embraced the Floridian coastal lifestyle—outdoor recreation, a relaxed pace, and a multicultural milieu. His cultural identity combines traditional Southern hospitality with the eclectic influences
    of Tampa’s diverse arts scene, shaping his inclusive yet competitive approach to therapy and group activities.
attributes:
  skills: '[''Therapeutic program design'', ''Adaptive sports coordination'', ''Art-based therapy facilitation'', ''Music and movement integration'', ''Outdoor recreation planning'', ''Group facilitation
