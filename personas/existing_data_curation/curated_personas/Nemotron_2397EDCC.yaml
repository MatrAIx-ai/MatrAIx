  hobbies: '[''traditional Southeast Asian cooking'', ''herb gardening'', ''community festival participation'', ''volunteering for home‑repair workshops'', ''karaoke'', ''tai chi'', ''reading historical
    fiction'', ''mentoring women in trades'']'
  career_goals: She aims to obtain a state‑issued maintenance contractor license and transition into a supervisory role within her property‑management company, where she can design and implement a comprehensive
    preventive‑maintenance program that reduces downtime and energy costs. Long‑term, Vankhanh dreams of launching a small, women‑focused maintenance service that offers eco‑friendly repairs to senior‑housing
    complexes in the Los Angeles area, providing apprenticeships for other under‑represented workers. She also hopes to become a certified OSHA trainer, sharing her calm, methodical approach to safety with
    a broader audience.
