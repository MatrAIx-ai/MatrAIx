persona_description: A historian who specializes in the study of urban transformation, particularly the changes that occurred in the cities during the early decades of the 20th century. Her research interests
  include, but are not limited to, the role of media in shaping public opinion, the impact of mass movements on urban society, and the transformation of working-class lifestyles. She is also interested
  in the development of new forms of popular culture, such as the tango, which emerged from the heart of the countryside but spoke with a foreign accent.
