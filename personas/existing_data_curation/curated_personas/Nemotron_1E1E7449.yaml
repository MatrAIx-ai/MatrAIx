  career_goals: Katie hopes to turn her natural empathy and desire for flexibility into a career that supports mental‑health and community well‑being. She plans to complete a GED, enroll in community college
    courses on psychology or social work, and eventually pursue a certificate as a peer‑support specialist or community health worker. In the short term, she aims to secure part‑time, low‑stress work—such
    as a barista or library aide—that offers flexible hours, allowing her to focus on personal self‑care and continue volunteering at the local community center. Her long‑term ambition is to combine her
    love for helping others with a stable, meaningful role that accommodates her need for emotional balance.
