  career_goals: Alexander aims to advance from industrial production manager to plant manager within the next three years, eventually stepping into a regional operations director role. He plans to earn
    a Certified Production and Inventory Management (CPIM) credential and pursue an MBA focused on operations and sustainability. His ambition is to integrate Industry 4.0 technologies—such as IoT sensor
    networks and advanced robotics—into a legacy manufacturing setting while maintaining practical, reliable processes. He also wishes to champion a culture of employee well‑being and mentorship, creating
    a formal program that pairs seasoned technicians with new hires. Though he values flexibility and prefers an organic career path, he is determined to leave a lasting impact on productivity, safety,
    and workplace harmony.
