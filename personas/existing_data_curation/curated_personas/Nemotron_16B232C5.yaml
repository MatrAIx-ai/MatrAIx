  career_goals: Kimberly dreams of becoming a kind adult who helps others. She often says she wants to be a teacher so she can share knowledge, a veterinarian because she loves animals, or a community helper
    like a firefighter who keeps people safe. These ambitions reflect her desire for a structured, caring role where she can make a positive impact.
