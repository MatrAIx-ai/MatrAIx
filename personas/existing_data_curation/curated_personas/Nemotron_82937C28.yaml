personas:
  professional: A veteran business education leader named Jonelle Taverna, who blends quantitative rigor with artistic imagination to design interdisciplinary curricula, leverages her three‑decade track
    record in instructional design and grant writing, and uses her collaborative, yet organized, temperament to mentor junior faculty and forge community‑university partnerships that spotlight New Orleans’
    cultural scene.
  sports: An avid but leisurely athlete named Jonelle Taverna, who supports the New Orleans Pelicans and Saints, participates in a weekly beginner tennis league at a local club, enjoys early‑morning walks
    along the Mississippi Riverbank, and practices gentle paddleboarding on the Bayou during summer months, all while treating fitness as a creative extension of her artistic rhythm rather than a competitive
    pursuit.
  arts: An abstract watercolor painter named Jonelle Taverna, whose canvases echo the syncopated energy of live jazz sessions and the ornate ironwork of the French Quarter, draws inspiration from artists
    like Wangechi Mutu and musicians such as Ella Fitzgerald, volunteers at a community arts nonprofit where she mentors youths on turning creative projects into marketable ventures, and regularly attends
    gallery openings at the Ogden Museum of Southern Art.
  travel: A culturally curious explorer named Jonelle Taverna, who prefers spontaneous weekend getaways to artistic hubs like Barcelona’s street murals, Detroit’s revitalized downtown art districts, and
    Istanbul’s historic bazaars, packs a compact DSLR to capture fleeting moments of color and light, and balances travel budgeting by using airline points while still allocating funds for off‑the‑beaten‑path
    food markets and local jazz clubs.
  culinary: A Creole cuisine enthusiast named Jonelle Taverna, who expertly prepares gumbo with a dark roux, jambalaya seasoned with andouille sausage, and shrimp étouffée garnished with fresh basil from
    her balcony garden, prides herself on skillful sauté techniques, experiments with emerging pop‑up eateries featuring fusion dishes like lobster‑taco tacos, and never passes up the chance to add a pinch
    of home‑grown thyme to a new recipe.
  core: Jonelle Taverna is a 57‑year‑old interdisciplinary educator who fuses business strategy with artistic imagination, channels her curiosity into watercolor, jazz, and local gastronomy, and balances
    meticulous financial planning with occasional impulsive cultural indulgences.
background:
  cultural: Jonelle Marie Taverna comes from a white, predominantly Southern family with deep roots in Louisiana. Her surname reflects an Italian heritage, and she was raised with an appreciation for the
    eclectic cultural tapestry of New Orleans, including its French, Creole, African‑American, and Italian influences. Growing up in the city’s historic neighborhoods, she absorbed the traditions of Mardi
    Gras, jazz, and the region’s culinary richness. Her Catholic upbringing instilled values of community service and hospitality, which she carries into her professional and personal life. While her formal
    education was centered in business, she maintains a lifelong fascination with the arts and the city’s unique blend of history and modernity, shaping her worldview and informing her interdisciplinary
    approach to teaching and mentorship.
