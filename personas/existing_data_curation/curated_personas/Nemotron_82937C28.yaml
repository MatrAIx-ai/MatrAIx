  career_goals: Jonelle aims to launch a flagship interdisciplinary program that situates entrepreneurship within the context of art, culture, and social impact, positioning the university as a leader in
    creative business education. She aspires to publish a seminal work on the role of imagination in strategic decision‑making and to secure a senior administrative role—such as department chair or dean—where
    she can influence institutional policy toward innovative teaching practices. Additionally, she seeks to deepen her involvement with local cultural institutions, creating service‑learning opportunities
    that benefit both students and the New Orleans community, and to mentor the next generation of scholars who value both rigor and creative exploration.
