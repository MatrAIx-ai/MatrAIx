    service excellence'']'
  hobbies: '[''Hiking in the Superstition Mountains'', ''Desert bike club'', ''Group fitness classes (Zumba, spin)'', ''Volunteering at the local food bank'', ''Community gardening club'', ''Reading mystery
    novels'', ''Southwestern cooking'', ''Attending the farmers market'']'
  career_goals: Sarah aims to advance to a district‑level management role where she can oversee multiple stores and implement best‑practice standards across a region. She is working toward a Certified Retail
    Operations Professional credential to formalize her expertise. Long‑term, she hopes to mentor emerging female leaders in retail and eventually launch a boutique that showcases locally sourced southwestern
    crafts, applying her operational acumen to a venture she can fully control.
