personas:
  professional: Mariana Rodriguez, a first‑line retail supervisor, leverages their bilingual communication, meticulous scheduling, and data‑driven inventory control to keep a small store humming, while
    quietly mentoring staff and maintaining a calm, organized floor that reflects their love of routine and subtle assertiveness.
  sports: Mariana Rodriguez enjoys low‑impact exercise, favoring serene evening walks along the San Marcos Creek trail and occasional hikes in the nearby hills, while cheering on the local minor‑league
    baseball team and occasionally joining a community yoga class.
  arts: Mariana Rodriguez finds solace in contemporary literature from local authors, frequently reads works by authors like Valeria Luiselli, and participates in crafting papel picado for community celebrations,
    while also attending occasional indie film screenings featuring directors such as Guillermo del Toro.
  travel: Mariana Rodriguez prefers short, well‑planned getaways that blend cultural immersion and relaxation, having explored the historic plazas of Oaxaca and the lavender fields of Provence, and dreams
    of a solo retreat to a quiet coastal town where they can tend a small herb garden.
  culinary: Mariana Rodriguez delights in preparing family‑style dishes like mole, tamales, and fresh salsas, skillfully balancing chilies, cacao, and roasted spices, while cultivating cilantro, oregano,
    and epazote on their balcony to ensure the freshest ingredients for their weekend feasts.
  core: Mariana Rodriguez is a routine‑driven retail supervisor who mitigates anxiety through structured cooking, gardening, and solitary walks, yet occasionally rewards themselves with spontaneous culinary
    splurges and quiet artistic pursuits.
background:
  cultural: Mariana is a second‑generation Mexican‑American raised in San Marcos, California. Her family speaks Spanish at home and maintains strong ties to Mexican customs, celebrating holidays like Día
    de los Muertos, Christmas posadas, and the feast of Virgen de Guadalupe. The local Mexican‑American community offers a tight‑knit network of family gatherings, church activities, and neighborhood festivals,
    which reinforce values of respect, hospitality, and hard work. Mariana’s cultural identity shapes her practical, service‑oriented approach at work, her love for Mexican cuisine, and her participation
    in community events that celebrate her heritage while fostering a cooperative spirit.
attributes:
  skills: '["Customer Service", "Team Supervision", "Scheduling & Shift Planning", "Inventory Management", "POS System Operation", "Bilingual Communication (Spanish/English)", "Conflict Resolution", "Sales
    Data Analysis", "Visual Merchandising", "Compliance & SOP Enforcement", "Basic Excel and Reporting", "Staff Training & Coaching"]'
  hobbies: '["Cooking traditional Mexican dishes", "Reading Mexican literature", "Journaling", "Balcony herb gardening", "Yoga and meditation", "Walking/Hiking local trails", "Crafting papel picado", "Attending
    small community cultural events"]'
  career_goals: Mariana aims to advance to store manager within the next two to three years, leveraging her strong operational background and leadership skills. She plans to complete a bachelor's degree
    in Business Administration or Retail Management while pursuing certifications such as Certified Retail Manager. Long‑term, she envisions moving into a regional management role or opening a boutique
    that showcases Mexican crafts and cuisine, providing a stable, routine‑driven career path that supports her emotional well‑being. She also hopes to mentor new employees, creating a supportive team culture
    that balances compassion with performance expectations.
