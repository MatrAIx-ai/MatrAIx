  career_goals: Nolan hopes to combine his love for science, technology, and helping others into a career that makes a tangible difference. He dreams of becoming a wildlife-conservation technician or a
    veterinarian who works on rehabilitating injured animals, allowing him to use his practical problem-solving skills while caring for living creatures. He also imagines designing educational software
    or interactive tools that teach other kids about nature and science, reflecting his desire to share knowledge and nurture curiosity. In the longer term, Nolan wants to lead community-based projects
    that protect local ecosystems around the Great Lakes, merging his compassion for people and the environment with his hands-on expertise.
