personas:
  professional: Nolan Ason, a budding teenage robotics hobbyist, merges hands-on LEGO engineering with Scratch programming to solve real-world puzzles, channeling their spontaneous curiosity into inventive
    projects while often scrambling to meet school deadlines.
  sports: Nolan Ason plays forward on the Waterford Middle School soccer team, cheering for the local Waterford Wolves while also joining the community hiking club for weekend treks around the lake, embodying
    their cooperative spirit yet sometimes forgetting to hydrate during matches.
  arts: Nolan Ason is an indie-rock enthusiast who cycles through bands like The Strokes, Tame Impala, and Phoebe Bridgers while sketching sci-fi inspired robotics concepts and binge-watching space documentaries,
    letting music and visual art shape their creative problem-solving.
  travel: Nolan Ason prefers spontaneous, budget-friendly day trips, having hiked Acadia National Park's coastal trails and fished at Lake Champlain, while dreaming of a future adventure to Iceland's volcanic
    landscapes, balancing curiosity with family-approved planning.
  culinary: Nolan Ason enjoys crafting simple meals like grilled fish tacos with lime and cilantro after lake catches, whipping up mac and cheese during study nights, and experimenting with DIY snack mixes,
    though they often leave a trail of LEGO pieces on the kitchen counter.
  core: Nolan Ason is a curiosity-driven 13-year-old who blends outdoor exploration, hands-on tech projects, and indie-rock vibes into a compassionate, spontaneous life, even if they sometimes lose track
    of deadlines and clean-up.
background:
  cultural: Nolan grew up in a suburban White family in Waterford, Michigan, a community shaped by Midwestern values of neighborliness, modesty, and a strong connection to the Great Lakes. His family’s
    heritage includes German and Irish roots, which he explores through occasional holiday meals and stories from older relatives. Local traditions such as summer lake outings, Fourth of July fireworks,
    and community service events have reinforced his sense of belonging and responsibility. The school culture emphasizes collaborative learning and encourages students to engage in extracurricular clubs,
    supporting Nolan’s blend of curiosity, practical tinkering, and compassion for peers.
