personas:
  professional: Gregory Reyna spends most days as a curious preschooler who pretends to be a junior inventor, building elaborate towers from building blocks, sketching wild contraptions on paper, and offering
    unsolicited critiques to classmates during playtime.
  sports: Gregory Reyna drifts between energetic toddler soccer sessions at the community park and splashy swimming lessons, cheering for the local minor league baseball team, the River City Rookies, and
    idolizing star player Jo‑Lee Martinez.
  arts: Gregory Reyna revels in finger‑painting bright abstracts, passionately humming tunes by The Wiggles, and proudly displaying a hand‑drawn portrait of their favorite superhero, Spider‑Man, on the
    fridge.
  travel: Gregory Reyna loves family road trips to the seaside boardwalk, the nightly fireworks at the amusement park in Orlando, and dreams of spotting kangaroos at the Australian outback after watching
    a documentary about marsupials.
  culinary: Gregory Reyna savors cheesy macaroni, crunchy carrot sticks, and the occasional mango slice, insists on sprinkling extra parmesan on everything, and occasionally sneaks chocolate chips into
    their bedtime cereal when no one’s looking.
  core: Gregory Reyna is a wildly curious four‑year‑old with a penchant for building chaotic block structures, a relentless appetite for sweets, and a competitive streak that turns even puzzle time into
    a fierce showdown.
background:
  cultural: Gregory comes from a white, Appalachian family in Coeburn, Virginia. His upbringing reflects the region’s close‑knit community values, church gatherings, and family storytelling traditions that
    celebrate independence and resourcefulness. While rooted in these local customs, Gregory’s curiosity and love for art give him an expansive view, encouraging him to seek varied experiences beyond his
    immediate environment.
