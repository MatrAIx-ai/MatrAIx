persona_description: A public health professional who is knowledgeable about the health effects of hazardous substances and radionuclides, and is responsible for conducting public health assessments and
  developing public health statements for ATSDR. They are also involved in public health surveillance and are familiar with the use of safety factors, SARA, and the Superfund Amendments and Reauthorization
  Act (SARA). They have experience in conducting environmental sampling and have a strong understanding of the principles of statistics and data analysis. Additionally, they are knowledgeable about the
  various public health hazard categories and are able to compare them to the health consultation process.
