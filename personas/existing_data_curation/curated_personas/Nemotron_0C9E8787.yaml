  career_goals: Sheila aims to ascend to a senior supervisory role, such as lieutenant or captain, where she can shape department policy and oversee a precinct. She is committed to expanding data‑driven
    policing initiatives in Cabarrus County, developing a community‑focused crime‑reduction program that integrates predictive analytics with small‑group outreach. Sheila also seeks to create a formal training
    curriculum that teaches resilience, calm decision‑making, and meticulous report writing to new recruits, especially encouraging more women to pursue law‑enforcement careers. In the long term she hopes
    to earn a distinguished service commendation and, after retirement, transition to private security consulting, helping local businesses design effective safety protocols based on her extensive field
    experience.
