    ''Arduino electronics projects'', ''Cooking'', ''Wine tasting'']'
  career_goals: Mark aims to launch a community‑based STEAM initiative that partners local farms with schools to teach sustainable agriculture and renewable energy concepts. He plans to author a practical
    guide on interdisciplinary teaching for adult learners and retirees. He seeks to mentor early‑career teachers through a regional professional‑development network and to serve on the school district’s
    curriculum committee to champion experiential learning. While continuing part‑time teaching, he also wishes to volunteer as a docent at a nearby art museum, sharing his love for both art and science.
