persona_description: A researcher or scientist who is interested in the field of genomics and its applications in personalized medicine, particularly in the investigation of relationships between many sections
  of the genome and their combined influence on health and disease. They are familiar with clinical collaborations focused on conditions such as neurological and movement disorders, cardiac disease, kidney
  disease, immune system diseases, and intellectual disability, and are aware of the clinical trials of targeted treatments for cancer based on the tumour's genomic profile. They are also aware of the benefits
  of genomic research in improving health outcomes, optimising treatment, and ultimately, disease prevention, and are excited about the potential for breakthroughs in understanding the genome and its interaction
  with the environment to deliver further benefits to individuals and their families affected by rare, genetic conditions.
