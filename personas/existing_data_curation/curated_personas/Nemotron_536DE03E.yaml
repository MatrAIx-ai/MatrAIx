    about logistics innovation"]'
  career_goals: Alexander aims to transition from a frontline driver‑sales role to a leadership position within logistics. Over the next five years, he plans to complete a Certified Logistics Manager program
    and earn a bachelor's degree in Supply Chain Management. His ambition is to become a regional logistics manager for a distribution company that values sustainable practices, eventually launching his
    own boutique transportation firm that specializes in moving art and cultural artifacts for galleries and festivals. He also wants to mentor new drivers, leveraging his experience to promote safety and
    customer‑centric service.
