persona_description: A UF/IFAS entomology professor who specializes in the study of invasive mosquitoes, particularly the ecology and control methods of the Aedes aegypti and Aedes albopictus species. He
  has expertise in the interactions between these two mosquito species and their role in the spread of arboviruses such as dengue and chikungunya. His work has been recognized with a Fulbright Specialist
  grant, and he is a leading expert on the control methods for these diseases. He has also worked on the development of non-GMO genetic control techniques to limit the spread of the Asian tiger mosquito.
