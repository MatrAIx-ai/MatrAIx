persona_description: A Black woman who is a healthcare advocate and a political activist. She is deeply concerned about the disproportionate impact of the coronavirus on Black communities and is committed
  to advocating for their rights and needs. She is also aware of the structural barriers that Black Americans face in accessing healthcare and is working to address these issues through various means. She
  is highly educated and knowledgeable about the healthcare system and has experience working in healthcare settings. She is also aware of the economic impact of the coronavirus on Black Americans and is
  advocating for additional support to ensure their financial stability. She is a vocal advocate for social justice and is committed to fighting against racism and discrimination.
