personas:
  professional: Sebastian Jaramillo, a budding young inventor, they blend a love for LEGO engineering with early Scratch coding, channeling disciplined curiosity into crafting mini‑robots for the school
    science club while constantly balancing fresh ideas with proven building methods.
  sports: Sebastian Jaramillo, a spirited midfielder on the neighborhood soccer league, they drill daily at the El Paso community field, idolize El Paso Locomotive FC and don a Texas Rangers cap for post‑game
    celebrations, while also joining a seasonal T‑ball team in spring that sharpens their agility and competitive drive.
  arts: Sebastian Jaramillo, a budding cartoonist, they sketch superhero mash‑ups while humming Los Tigres del Norte and the theme from Steven Universe, regularly flip through graphic novels like Amulet
    and mimic the bold colors of local mural festivals, letting the rhythm of norteño music shape their visual storytelling.
  travel: Sebastian Jaramillo, an adventurous road‑trip enthusiast, they love weekend drives to White Sands National Park and family vacations to San Antonio’s River Walk, while daydreaming about future
    trips to the ancient ruins of Chichen Itzá and the bustling streets of Barcelona, always packing a puzzle and a snack stash for the journey.
  culinary: Sebastian Jaramillo, a junior kitchen assistant, they proudly roll fresh tortillas for tacos al pastor, chop jalapeños for salsa roja, whip up guacamole with lime, cilantro, and a secret dash
    of hot sauce, and insist on sprinkling queso fresco over every dish they help prepare.
  core: Sebastian Jaramillo, a disciplined seven‑year‑old with a competitive edge, they convert curiosity into LEGO‑powered inventions, meticulously save allowance in piggy‑banks and a custodial account,
    draw cartoons to the beat of norteño music, never skip soccer practice, and habitually hide extra candy for emergency gaming sessions.
background:
  cultural: Sebastian is a Mexican‑American child raised in El Paso, a vibrant border city where Spanish and English intertwine in daily life. He grows up bilingual, speaking Spanish at home with his grandparents
    and English at school with his peers. Family traditions such as celebrating Día de los Muertos, enjoying tacos, tamales, and salsa, and listening to regional norteño music shape his cultural identity.
    The community’s emphasis on close‑knit family ties, respect for elders, and pride in Mexican heritage influences his values, while the multicultural environment of the Southwest encourages openness
    to diverse perspectives.
