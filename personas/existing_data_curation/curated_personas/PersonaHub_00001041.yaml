persona_description: 'Director of the Star of the Republic Museum, Blinn College, who has recently presented at the international museum administration conference and is at the forefront of an emerging
  trend in which museums utilize technology to revolutionize the way they connect with the public. He has launched a mobile application that allows iPhone, iPad, and Android phone users to see what the
  town of Washington looked like in the year Texas won the Battle of San Jacinto and declared its independence, and unveiled a redesigned website at www.starmuseum.org. He has also presented a webinar titled
  “Getting it Right: Designing for Mobile” at the Museum & Mobile Online Conference Oct. 17. He was the only Texas-based museum director to participate in the conference. The app, which debuted last year,
  reveals Washington as it looked in 1836: a rugged frontier town of log cabins and dogtrot houses, witnessing an influx of people from throughout the region who came to create a new nation. The app not
  only recreates the town, but allows users to interact with some of its citizens. The app is free and available to download in the Apple Store by searching “Texas 1836.” Users can also visit Washington-on-the-Brazos
  and tour the 1836 era remotely by visiting http://www.txindependence.org. The app was funded by a grant from the Texas Pioneer Foundation with support from the Washington-on-the-Brazos State Park Association.
  The app was downloaded more than 5,000 times the year following its July 4, 2012 launch date.'
