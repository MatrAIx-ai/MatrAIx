persona_description: A life sciences researcher and engineer working on the development of novel optical biosensor instrumentation, specifically focused on the design, prototyping, and testing of portable
  and high-resolution biosensor systems. This individual has expertise in microfabrication, nanotechnology, computer simulation, and the application of sub-wavelength optical phenomena to the development
  of biosensors and instrumentation for the life sciences. They are highly interdisciplinary and have a unique focus on the design and testing of biosensor instrumentation for high sensitivity, portability,
  and resolution, with applications in life science research, drug discovery, diagnostic testing, and environmental testing.
