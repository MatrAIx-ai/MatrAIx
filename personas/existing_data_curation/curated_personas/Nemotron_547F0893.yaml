  career_goals: Willie dreams of turning his passion for art and technology into a career as a multimedia artist and storyteller. He hopes to attend a specialized high‑school program focused on visual arts,
    then pursue a BFA in digital media or animation. Long‑term, he envisions working as a graphic designer or animator for a socially conscious studio, creating visual content that highlights community
    issues and celebrates African American culture. He also aspires to lead community‑based mural projects in Oakland, using art to empower youth and spark dialogue. Ultimately, he wants to combine his
    creative talents with his interest in technology to produce interactive installations that bring people together.
