personas:
  professional: Willie Pugh is an aspiring game designer and budding digital artist who leverages their curiosity and love of sketching to prototype Minecraft-inspired worlds while they mentor younger peers
    at the East Bay Youth Center, balancing organized planning with spontaneous creative bursts.
  sports: Willie Pugh is a dedicated basketball fan who plays point guard for the East Bay Hoops Club, idolizes the Golden State Warriors, attends local pick‑up games at the community center, and they follow
    the NBA schedule religiously.
  arts: Willie Pugh immerses themselves in street art, drawing inspiration from the vibrant murals of local legends like Shepard Fairey, while they curate playlists that blend Kendrick Lamar, Herbie Hancock,
    and Erykah Badu to soundtrack their graffiti sessions and TikTok video edits.
  travel: Willie Pugh dreams of traveling from Oakland’s waterfront to San Francisco’s Chinatown for dim sum, then hopping on a weekend road trip to Yosemite for sunrise hikes, and they hope to someday
    explore Japan’s anime hotspots in Tokyo and Osaka.
  culinary: Willie Pugh loves the comfort of collard greens seasoned with smoked paprika, sweet potato pie with a buttery crust, and they frequently experiment with making homemade mac and cheese using
    sharp cheddar and a dash of hot sauce.
  core: Willie Pugh blends a restless curiosity for digital creation with a community‑first mindset, juggling school, art, and gaming while they occasionally forget to floss after marathon sessions.
background:
  cultural: Willie is a Black teen growing up in Oakland’s vibrant East Bay community, where African American cultural heritage intertwines with the city’s hip‑hop roots and activist history. His family
    places a high value on community involvement, storytelling, and perseverance, often sharing stories of the civil‑rights movement and local community leaders. He participates in neighborhood events such
    as Juneteenth parades and the Oakland Art & Soul Festival, which celebrate Black art, music, and cuisine like collard greens and sweet potato pie. Willie’s household blends the warmth of church gatherings
    with the energy of local block parties, exposing him to soulful gospel music and contemporary R&B. He often uses African American Vernacular English with peers, reflecting his cultural identity, and
    engages with mentorship programs at the East Bay Youth Center, where he helps younger kids explore art and technology.
