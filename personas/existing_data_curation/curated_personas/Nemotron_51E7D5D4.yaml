  career_goals: Her ambition is to leverage her experience to become a senior surveillance supervisor at the local casino, overseeing a team of officers and shaping comprehensive security protocols that
    integrate the latest technology while maintaining high standards of safety and compliance. She hopes to design and implement a mentorship program for new guards, drawing on her educational background.
    Over the long term, she envisions transitioning into a consulting role, advising other gaming venues and community organizations on security best practices, and eventually leading educational workshops
    for at‑risk youth on personal safety and career pathways in law enforcement.
