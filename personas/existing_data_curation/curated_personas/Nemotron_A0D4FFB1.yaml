personas:
  professional: Genesis Aromin, a retired community heritage coordinator, leverages their organized, methodical planning skills and bilingual research expertise to oversee intergenerational garden projects
    and senior‑center workshops, blending cultural storytelling with meticulous budgeting and event execution, and they take pride in mentoring younger volunteers.
  sports: Genesis Aromin, who enjoys walking her garden rows as daily low‑impact exercise, attends Mississippi State Bulldogs football games in the fall, follows the New Orleans Saints in the NFL, participates
    in a senior bowling league at the community center, and they occasionally join a local walking club that explores historic trails.
  arts: Genesis Aromin, whose evenings are filled with crocheting intricate patterns while listening to the soulful voice of Nina Simone and the folk ballads of Woody Guthrie, regularly attends local theater
    productions of August Wilson plays, devotes time to reading historical fiction by Hilary Mantel and biographies of Maya Angelou, and they often organize craft nights for the church group, enriching
    community creativity.
  travel: Genesis Aromin, who prefers meticulously planned road trips that blend cultural immersion with leisurely exploration, has visited the historic town of Natchez, the battlefields of Gettysburg,
    and coffee farms in Central America, dreams of a future pilgrimage to trace ancestral roots along the Caribbean coast while balancing a modest travel budget with family responsibilities, and they plan
    each itinerary with a detailed spreadsheet.
  culinary: Genesis Aromin, an adept home chef with a penchant for melding traditional flatbread tacos—baleadas—with Southern collard greens and heirloom tomato salsa, routinely seasons soups with plantain
    blossoms and cumin, experiments with plantain flour tortillas, enjoys sharing these fusion meals at community potlucks, and they sometimes over‑salt dishes in their enthusiasm for bold flavors.
  core: Genesis Aromin epitomizes a methodical yet curious spirit, orchestrating community heritage projects while secretly hoarding vintage yarn and occasionally procrastinating on medication reminders,
    and they relish quiet mornings in the garden as a restorative ritual.
background:
  cultural: Born to Honduran immigrants, Genesis grew up bilingual, celebrating Honduran holidays such as Día de la Independencia with family gatherings, music, and dishes like pupusas, while also embracing
    Southern traditions like church socials, country cooking, and community festivals. Her identity blends the warm, storytelling‑rich culture of Honduras—emphasizing family cohesion, respect for elders,
    and a love for folk music—with the hospitality, strong community ties, and reverence for heritage found in the Mississippi Delta. This hybrid background informs her language skills, culinary interests,
    and dedication to preserving multicultural histories in her hometown.
attributes:
  skills: '[''Community Event Coordination'', ''Project Planning and Budgeting'', ''Archival Research'', ''Oral‑History Documentation'', ''Bilingual Translation (Spanish/English)'', ''Writing and Editing'',
    ''Gardening and Sustainable Horticulture'', ''Traditional Honduran Cuisine'', ''Crafting (Crochet & Quilting)'', ''Adult Education Facilitation'']'
  hobbies: '[''Gardening'', ''Traditional Honduran Cooking'', ''Reading Historical Fiction and Biographies'', ''Library Volunteering'', ''Crochet and Quilting'', ''Church Choir Participation'', ''Genealogy
    Research'', ''Exploring Local Historical Sites'']'
  career_goals: Although retired from formal employment, Genesis aims to leave a lasting cultural legacy in Lawrence County. She plans to launch a community‑heritage series that records stories of local
    Hispanic, African‑American, and long‑time residents, culminating in a published anthology. She also wishes to develop an intergenerational garden project that blends Southern native plants with Honduran
    edible varieties, providing both educational workshops and fresh produce for a local food bank. Another personal ambition is to complete a memoir that weaves her family's Honduran roots with her life
    in Mississippi, and to contribute a bilingual cookbook that celebrates the fusion of both culinary traditions.
