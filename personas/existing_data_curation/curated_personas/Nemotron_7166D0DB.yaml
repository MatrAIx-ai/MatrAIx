  career_goals: Lisette aims to step into a senior technology leadership role where she can drive large‑scale digital transformation initiatives that blend technical excellence with innovative user experiences.
    She aspires to become a Chief Information Officer or Head of Innovation for a forward‑thinking organization, championing AI‑enabled analytics, cloud‑native architectures, and sustainable IT practices.
    Simultaneously, she wants to mentor women in STEM, develop community tech‑education programs in Oxford, and publish thought pieces on integrating creative thinking into systems analysis.
