personas:
  professional: A seasoned computer systems analyst, Lisette Condit leverages her PMP and CBAP certifications, deep expertise in systems architecture, data modeling, and AI‑driven analytics to translate
    complex business problems into clear technical specs, while her competitive edge and artistic curiosity push her to champion unconventional, user‑centric digital transformation initiatives.
  sports: Lisette Condit enjoys hiking the Lapeer County trails, practices yoga three times a week, and is a devoted fan of the Detroit Lions and Michigan State Spartans, occasionally joining a local women’s
    running club that meets at the Flint River for weekend group runs.
  arts: Lisette Condit immerses herself in contemporary art, frequenting exhibitions featuring Olafur Eliasson and Yayoi Kusama, sketching mixed‑media pieces inspired by architectural light, and capturing
    urban scenes with a DSLR, while also curating a small online gallery for emerging women artists.
  travel: Lisette Condit prefers purposeful weekend road trips that blend nature and architecture, having explored Iceland’s geothermal landscapes and Barcelona’s modernist buildings, while she dreams of
    a spring pilgrimage to Kyoto’s temples, all planned around her limited vacation days and modest travel budget.
  culinary: Lisette Condit favors farm‑to‑table meals, often prepping roasted beet and goat cheese salads, homemade gnocchi with sage butter, and experimenting with heirloom tomatoes from her garden, while
    she occasionally indulges in artisanal sushi rolls after a gallery opening.
  core: Lisette Condit balances a relentless analytical drive with a voracious curiosity for art and a habit of over‑thinking every decision, turning stress into a catalytic force for creative problem‑solving.
background:
  cultural: Lisette grew up in a middle‑class white family in rural Michigan, where Midwestern values of hard work, community responsibility, and modesty shaped her early life. Family gatherings, church
    involvement, and participation in local fairs reinforced a strong sense of belonging. Her pursuit of a graduate degree in STEM exposed her to diverse perspectives and global academic cultures, fostering
    an openness to unconventional thinking while retaining a grounded appreciation for her hometown's traditions. This blend of small‑town community ethos and broad, curiosity‑driven education informs both
    her professional approach and personal interests.
