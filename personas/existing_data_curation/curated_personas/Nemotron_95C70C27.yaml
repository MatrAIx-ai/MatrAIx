  career_goals: Patricia aims to advance into a regional or district management position within the next five years, focusing on operational excellence and employee development across multiple locations.
    To support this move, she plans to earn a Six Sigma Green Belt and enroll in an associate‑level business management program. Long‑term, she envisions using her managerial expertise to open a family‑run
    café in Mableton, blending her love of cooking with community engagement, while also mentoring emerging managers in her industry.
