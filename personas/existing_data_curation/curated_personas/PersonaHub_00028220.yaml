persona_description: A historian who specializes in the study of the mining industry in Canada, particularly the challenges, successes, and failures faced by the Britannia mine and its people over the course
  of 10 years. The historian is deeply interested in the impact of global economics on the mine, the role of safety in the workplace, and the unionization movements that arose during the 1920s and 1940s.
  The historian is also knowledgeable about the mining industry's role in the Great Depression and World War II, and the ways in which these events impacted the Britannia mine. The historian is interested
  in the Mine's long-term sustainability and the factors that contributed to its eventual closure.
