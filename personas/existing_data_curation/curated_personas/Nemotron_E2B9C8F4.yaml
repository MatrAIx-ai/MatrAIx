  career_goals: Ezra dreams of a future where he can turn his love for art into a career, such as becoming a painter or illustrator who brings stories to life. He is fascinated by space and sometimes imagines
    being an astronaut exploring new worlds. He also hopes to invent fun toys or games that make other kids smile, and he talks about maybe becoming a teacher who shares his curiosity and kindness with
    a small class.
