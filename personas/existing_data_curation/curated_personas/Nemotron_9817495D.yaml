  career_goals: As an imaginative five-year-old, Natacha dreams of helping others and exploring the world. She often says she wants to become a teacher so she can share stories and knowledge, or a veterinarian
    because she loves caring for animals. Occasionally she imagines being an astronaut or a scientist, reflecting her curiosity about new ideas while her practical side envisions a stable, helpful profession.
