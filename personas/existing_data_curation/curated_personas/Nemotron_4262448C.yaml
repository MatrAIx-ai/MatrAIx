  career_goals: Looking ahead, Cassie aims to transition into a senior operational consulting role where she can apply her blend of process expertise and instructional design to support small Black‑owned
    businesses in South Florida. She envisions creating a practical playbook on scalable operations for non‑profit and startup environments, while also offering one‑on‑one mentorship to emerging professionals.
    Ultimately, she hopes to retire from full‑time employment but remain active as a part‑time advisor, contributing her curiosity for new methods to the community she cares deeply about.
