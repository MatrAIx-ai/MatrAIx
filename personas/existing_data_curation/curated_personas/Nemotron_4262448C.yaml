personas:
  professional: Cassie Boykins, a seasoned operational leader transitioning to senior consulting, leverages their analytical rigor, teaching expertise, and love of solitary research to redesign workflows,
    craft clear documentation, and mentor small Black‑owned businesses in South Florida, and they volunteer to lead workshops for emerging entrepreneurs.
  sports: Cassie Boykins avidly follows the Miami Dolphins and Miami Heat, enjoys low‑impact sunrise beach walks for fitness, joins the Biscayne Bay Birding Club for seasonal bird‑watching outings, and
    participates in a senior paddleboarding group on weekends, where they relish the gentle rhythm of the water.
  arts: Cassie Boykins finds inspiration in the smooth jazz of Miles Davis and Ella Fitzgerald, immerses themselves in historical mystery novels by C.J. Sansom, and captures Florida’s native birds through
    digital photography, and they often display prints at the Miami Art Museum’s community exhibit.
  travel: Cassie Boykins prefers meticulously planned, leisurely trips to historic coastal destinations like Charleston, SC and the Bahamas, relishes exploring local archives for genealogy clues, and dreams
    of a future wildlife photography safari in the Galápagos Islands, and they cherish the quiet moments of sunrise over unfamiliar shores.
  culinary: Cassie Boykins, an intermediate home chef, delights in Caribbean‑inspired jerk chicken with mango salsa, pepper‑pot soup seasoned with allspice and Scotch bonnet peppers, and fresh salads featuring
    herbs harvested from their own native Florida garden, and they often pair the meals with a crisp white wine such as a Venezuelan Pinot Grigio.
  core: Cassie Boykins blends relentless curiosity with quiet practicality, turning solitary pursuits into community contributions while balancing meticulous planning with occasional indulgent quirks, and
    they embrace each day as a chance to learn.
background:
  cultural: Cassie’s identity is rooted in a close‑knit African‑American community that valued church fellowship, storytelling, and collective resilience. Growing up in the South, she embraced traditions
    of soul food, gospel music, and community service, which continue to shape her worldview. Since relocating to Miami, she has blended these roots with the city’s vibrant Afro‑Caribbean and Latin influences,
    celebrating Juneteenth alongside Haitian and Cuban cultural festivals. Cassie actively participates in local Black professional networks, mentors youth through community programs, and infuses her culinary
    experiments with flavors that honor both her Southern heritage and the multicultural tapestry of Miami.
