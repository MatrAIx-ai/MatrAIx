  career_goals: Isabel aims to transition from hands‑on development into a technology leadership role where she can shape product strategy for mid‑market companies, particularly in the agricultural and
    small‑business sectors that dominate Monterey County. She aspires to become a solutions architect or chief technology officer, leveraging her business background to align technical decisions with growth
    objectives. A key ambition is to build a mentorship program that connects seasoned developers with under‑represented youth in Salinas, fostering pathways into tech. While she remains open to learning
    AI and machine‑learning tools, her focus is on applying those capabilities to practical, ROI‑driven projects. Ultimately, Isabel envisions a semi‑retired phase where she serves on advisory boards for
    community‑focused tech nonprofits, championing inclusive, flexible work cultures.
