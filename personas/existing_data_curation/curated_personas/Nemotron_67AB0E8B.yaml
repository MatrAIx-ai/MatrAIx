  career_goals: Angela aspires to transition into a district‑level role as an Inclusion Coordinator, where she can shape policy and design systemic supports for students with special needs across Washoe
    County. She plans to earn a Master's degree in Special Education or Educational Leadership to strengthen her credentials and broaden her impact. Long‑term, she hopes to launch a community art‑therapy
    program that partners local artists with special‑education students, creating a safe space for creative expression and therapeutic growth. Angela also aims to present at regional and national conferences,
    sharing her innovative approaches to art integration in special education, and to serve on Nevada’s advisory board for disability rights in education.
