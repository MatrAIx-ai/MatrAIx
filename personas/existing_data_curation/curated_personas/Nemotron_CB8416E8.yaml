  career_goals: She aspires to move into senior executive leadership, aiming for a Vice President of Operations or Chief Innovation Officer role within the next five years. Marisa is focused on leading
    large-scale digital transformation projects that integrate AI and advanced analytics to improve operational efficiency. She also wants to champion diversity and inclusion by establishing a mentorship
    pipeline for Black women in STEM and to eventually launch her own consultancy that helps mid-size firms implement data-centric strategic initiatives.
