personas:
  professional: Marisa Benton is a senior data analytics manager who combines a decade of cross‑functional leadership, expertise in Python, statistical modeling, and Tableau with a fiercely competitive
    drive and vivid imagination, turning AI‑powered digital transformation initiatives into sleek, data‑centric strategies that motivate teams and unlock operational efficiency.
  sports: Marisa Benton roots for the Seattle Seahawks and Seattle Storm, hits the trails twice a week with the Seattle Running Club, squeezes in weekend tennis at the Bellevue Community Center, and treats
    a quick chess puzzle as a mental warm‑up before each jog, showcasing a disciplined yet creatively competitive fitness routine.
  arts: Marisa Benton explores abstract painting inspired by Wassily Kandinsky and experimental photography echoing Ansel Adams, while drawing creative energy from listening to David Bowie's avant‑garde
    albums and attending performances by Philip Glass, and they spend evenings writing speculative fiction that blends the philosophical musings of Ursula K. Le Guin with speculative science.
  travel: Marisa Benton meticulously plans solo voyages, having already trekked the geometric streets of Barcelona's Gaudí masterpieces, the serene temples of Kyoto, and the volcanic landscapes of Iceland's
    Golden Circle, and they now dream of a photographic expedition to the aurora‑lit fjords of Norway, balancing curiosity with a disciplined itinerary.
  culinary: Marisa Benton enjoys experimenting in the kitchen, confidently crafting a fragrant Indian biryani with saffron and cardamom, a delicate Japanese ramen broth enriched with kombu and miso, and
    a spicy Ethiopian injera served with berbere‑spiced stew, while their intermediate cooking skills are honed by a penchant for sourcing fresh herbs from the Pike Place Market.
  core: Marisa Benton blends analytical rigor with boundless imagination, turning data puzzles into art, yet their competitive edge sometimes fuels late‑night caffeine binges and occasional neglect of dental
    floss, making them a disciplined visionary with a few endearing flaws.
background:
  cultural: Marisa is an African-American woman rooted in the Baltimore County community. Her family’s traditions, from celebrating Juneteenth and Kwanzaa to sharing soul-food recipes, have shaped her appreciation
    for cultural heritage and community service. Growing up in Owings Mills, she was exposed to the rich musical legacy of Maryland, which sparked her love for jazz and blues. She remains actively involved
    in local Black professional networks and mentors young Black students, viewing her cultural identity as both a source of personal strength and a catalyst for empowering the next generation.
