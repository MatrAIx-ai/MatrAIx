  hobbies: '[''gardening'', ''knitting/quilting'', ''preserving and canning'', ''reading mystery novels'', ''bird‑watching'', ''walking/hiking local trails'', ''genealogy research'', ''listening to bluegrass
    and folk music'']'
  career_goals: Although she is not formally employed, Loretta has set personal ambitions that blend her competitive streak with her love of tradition. She hopes to enter regional quilting contests and
    win a first‑place ribbon, which would give her work more visibility. She also plans to launch a modest online shop on a platform like Etsy to sell her handmade quilts and preserves, turning a hobby
    into a modest source of income. A long‑term goal is to write and self‑publish a memoir that weaves her family’s Appalachian history with recipes and craft tips, preserving the stories for future generations.
    In parallel, she aims to improve her organization skills to reduce stress, using simple planners and checklists, and to become a mentor for younger women in her community who are interested in crafts
    and self‑sufficiency.
