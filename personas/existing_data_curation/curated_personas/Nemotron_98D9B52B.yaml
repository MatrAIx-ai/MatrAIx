  hobbies: '["Watercolor painting", "Attending art fairs and craft markets", "Choir singing", "Gardening", "Reading historical fiction", "Journaling", "Knitting", "Birdwatching", "Cooking Southern cuisine",
    "Playing card games with seniors"]'
  career_goals: Although retired, Julee aims to deepen her impact on her community by launching an intergenerational art workshop that brings together seniors and school‑age children to share stories, crafts,
    and paintings. She hopes to compile a collection of local oral histories and photographs for the Poinsett County historical society. On a personal level, she aspires to travel to at least three regional
    art museums each year, maintain her health through regular walking and yoga, and develop mindfulness practices to manage her worry.
