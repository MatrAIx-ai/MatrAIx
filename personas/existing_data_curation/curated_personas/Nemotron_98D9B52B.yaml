personas:
  professional: Julee Roma, a 79‑year‑old retired volunteer coordinator, channels their meticulous event‑planning skills, warm sociability, and curiosity into designing intergenerational art workshops and
    preserving local oral histories for the county historical society.
  sports: Julee Roma stays active by joining the Poinsett County Senior Walking Club for daily strolls through the wetlands, participates in gentle yoga sessions at the community center, and cheers enthusiastically
    for the Atlanta Falcons and Atlanta Braves during football and baseball seasons, all while they keep a lighthearted rivalry with the local bridge club.
  arts: Julee Roma spends afternoons painting delicate watercolors of roses inspired by Georgia O’Keeffe, quilts vibrant patterns while listening to Ella Fitzgerald’s jazz standards, and attends community
    theater productions starring local actors reminiscent of Meryl Streep’s nuanced performances, capturing moments on a digital camera to share with friends.
  travel: Julee Roma plans her yearly cultural excursions by joining organized senior tours to the High Museum of Art in Atlanta, the Birmingham Museum of Art, and the Smithsonian’s National Gallery of
    Art in Washington, D.C., preferring guided group travel that balances comfort with a deep curiosity for American and European masterpieces.
  culinary: Julee Roma cooks Southern comfort meals like shrimp and grits with garden‑fresh tomatoes, collard greens seasoned with smoked turkey, and peach cobbler topped with a buttery crumble, while they
    occasionally experiment with new flavors such as a pinch of saffron in a risotto for special gatherings.
  core: Julee Roma is a curious, community‑centric octogenarian who blends a love for watercolor painting, garden‑grown tomatoes, and intergenerational storytelling with a habit of worrying over every detail,
    occasionally forgetting to take their blood pressure meds after an enthusiastic choir rehearsal.
background:
  cultural: Julee was raised in the rural South of Arkansas, where community ties, church involvement, and a connection to the land are central to daily life. The values of Southern hospitality, respect
    for tradition, and self‑reliance have shaped her outlook. Her white, multigenerational family background includes farm work, church service, and a strong appreciation for folk music, storytelling, and
    regional crafts. While she embraces modern ideas and artistic expression, she remains rooted in the cultural rhythms of small‑town life, celebrating local festivals, seasonal harvests, and the close‑knit
    support network that defines Poinsett County.
attributes:
  skills: '["Community event planning", "Volunteer coordination", "Gardening", "Quilting and needlework", "Basic digital photography", "Cooking and baking", "First aid", "Storytelling and oral history",
