persona_description: A historian specializing in the study of glass manufacturing in the United States during the 19th century, particularly focusing on the use of molds and the process of blowing molten
  glass into a mold. She is knowledgeable about the history of glass manufacturing in the United States, the development of molds as a production method, and the evolution of blown three-mold glass. She
  has a deep understanding of the techniques used in the manufacture of three-mold glass, including the process of removing the glass from the mold, expanding it, cracking it off, and finishing it with
  hand work. She is also knowledgeable about the different molds used in the production of three-mold glass, including the different parts of the mold, the process of cutting designs into the inside walls
  of the mold parts, and the different ways in which molds were used to produce different types of glassware. She has a passion for learning about the history of glass manufacturing and the development
  of new techniques, and is dedicated to preserving and studying the history of glass manufacturing in the United States.
