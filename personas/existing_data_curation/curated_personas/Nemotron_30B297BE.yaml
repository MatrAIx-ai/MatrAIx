  hobbies: '[''reading historical fiction'', ''small‑group book club'', ''gardening'', ''cooking traditional and experimental dishes'', ''genealogy research'', ''walking on the beach'', ''listening to jazz
    and gospel music'', ''crossword puzzles'']'
  career_goals: Erica’s foremost goal is to maintain her independence and mental vitality while preserving her family’s legacy. She aims to compile a written memoir and a comprehensive family genealogy
    to pass on to her grandchildren. Within the Boca Raton community, she aspires to secure a leadership position on the senior center advisory board, where she can apply her organizational strengths and
    competitive drive to enhance program offerings. Additionally, she envisions hosting quarterly cooking workshops that blend classic Southern dishes with new flavors, allowing her to share cultural traditions
    and satisfy her curiosity for innovation.
