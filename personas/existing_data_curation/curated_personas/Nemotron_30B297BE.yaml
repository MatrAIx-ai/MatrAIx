personas:
  professional: Erica Jones, a retired community organizer and avid genealogist, leverages their meticulous budgeting, event planning, and fact‑checking prowess to drive senior‑center programs while maintaining
    a skeptical, competitive edge that pushes them to out‑perform past volunteers.
  sports: Erica Jones enjoys gentle morning walks along the Boca Raton shoreline as part of the local Senior Strollers club, they follow the Miami Heat during basketball season, and they occasionally root
    for the Miami Dolphins, while eschewing high‑impact sports in favor of low‑stress activities.
  arts: Erica Jones immerses themselves in classic literature by authors like Jane Austen and Hilary Mantel, they participate in a small book club discussing historical fiction, and they relax to the smooth
    sounds of Ella Fitzgerald, Duke Ellington, and gospel group The Brooklyn Tabernacle Choir, which shape their reflective evenings.
  travel: Erica Jones prefers low‑key, organized trips that blend history and relaxation, having toured Charleston’s historic district and Savannah’s squares, and they dream of a quiet pilgrimage to the
    English countryside’s cottage‑style gardens, always booking through a trusted travel agency to stay within their modest retirement budget.
  culinary: Erica Jones, a seasoned home cook, delights in perfecting Southern classics like shrimp and grits, collard greens, and peach cobbler, while they experiment with contemporary twists such as adding
    miso to their gumbo broth and incorporating quinoa into their cornbread, often featuring fresh okra, sweet potatoes, and smoked paprika.
  core: Erica Jones is a methodical, curiosity‑driven senior who balances meticulous record‑keeping with a stubborn skepticism, they tend to over‑organize their garden planting calendar, and they can’t
    resist a late‑night crossword puzzle even if it means staying up past their bedtime.
background:
  cultural: Erica is an African American woman whose family roots trace back to the rural South, with ancestors who migrated to Florida during the mid‑20th‑century Great Migration. Growing up, she was immersed
    in the traditions of Southern Black churches, emphasizing communal worship, storytelling, and soulful music. After relocating to Boca Raton, she integrated into the local Black community while navigating
    the multicultural dynamics of Palm Beach County. Her cultural identity is reflected in her culinary preferences, church involvement, and reverence for family histories. Erica balances respect for her
    heritage—preserving family recipes, oral histories, and church customs—with an openness to new ideas, exemplified by her interest in contemporary cooking techniques and local environmental stewardship.
attributes:
