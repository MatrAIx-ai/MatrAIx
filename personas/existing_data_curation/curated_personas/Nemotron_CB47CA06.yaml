  career_goals: Charles aims to transition back into the workforce within the next year, targeting a full‑time role in data analytics or software development where his methodical approach and project‑management
    skills can add immediate value. He plans to obtain a Google Data Analytics Professional Certificate and an AWS Solutions Architect Associate certification to strengthen his credentials. In the longer
    term, he aspires to lead a technical team or launch a freelance consulting practice that helps small businesses automate processes and leverage data-driven insights, while also integrating community‑focused
    tech education initiatives.
