personas:
  professional: Felipe Araque, a veteran experimental physicist known for his methodical approach to designing laboratory experiments, leverages four decades of hands‑on expertise in calibrating spectrometers,
    oscilloscopes, and particle detectors, and fluent Python and MATLAB coding to lead part‑time renewable‑energy research while mentoring community volunteers, balancing his structured work style with
    his outgoing, collaborative nature.
  sports: Felipe Araque, an avid soccer enthusiast, watches Inter Miami CF and national team matches on TV, participates in Saturday pickup games at the local park with a group of friends, and supports
    the Miami Dolphins during football season, reflecting his energetic, sociable spirit and structured routine of weekly sports rituals.
  arts: Felipe Araque, a salsa and merengue dancer, lights up community festivals with lively steps to the rhythms of Celia Cruz, Rubén Blades and Grupo Niche, while also indulging in science‑fiction novels
    by Isaac Asimov, Arthur C. Clarke and Nnedi Okorafor, weaving together his analytical mind and cultural appreciation.
  travel: Felipe Araque, a meticulous planner, enjoys weekend bird‑watching trips to the Everglades and annual cruises to Caribbean islands such as Puerto Rico and the Dominican Republic, dreams of visiting
    Chile’s Atacama Desert to observe its clear night skies, and prefers organized tours that balance cultural immersion with the comfort of a predictable itinerary while budgeting his travel fund carefully.
  culinary: Felipe Araque, a passionate home chef, prepares traditional ceviche with lime‑marinated fish, cilantro and a dash of habanero from his herb garden, rolls crispy empanadas de verde stuffed with
    cheese and plantains, and simmers encebollado broth with fresh yuca and shrimp, relishing the interplay of fresh herbs, peppers and bold flavors, though he sometimes over‑spices the dishes in his enthusiasm.
  core: Felipe Araque is a methodical, socially vibrant physicist who blends disciplined research, spirited salsa dancing, and a pepper‑laden kitchen into a life full of predictable routines and spontaneous
    community joy.
background:
  cultural: Felipe was born in Guayaquil, Ecuador, and grew up immersed in a vibrant blend of coastal Ecuadorian culture, Catholic traditions, and a strong emphasis on family and community. He emigrated
    to the United States in his early thirties, settling in the Miami‑Dade area where he maintained his native Spanish while becoming fluent in English. His cultural identity is reflected in his love for
    traditional music, festivals, and cuisine, and it informs his commitment to serving the growing Hispanic community in Hialeah through mentorship, bilingual science communication, and participation in
    local cultural events.
attributes:
  skills: '["Experimental design", "Instrumentation calibration", "Data acquisition and analysis (Python, MATLAB)", "Statistical modeling", "Scientific writing", "Project planning and management", "Community
    STEM outreach", "Mentoring and training", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Soccer (playing and watching)", "Salsa and merengue dancing", "Cooking Ecuadorian cuisine", "Chess", "Birdwatching", "Volunteering for science outreach", "Reading science‑fiction", "Studying
    astronomy history", "Gardening (herbs and peppers)"]'
  career_goals: At 69, Felipe aims to consolidate his legacy by continuing to contribute to applied physics research on a part‑time basis, with a focus on renewable energy technologies relevant to South
    Florida. He plans to expand the local STEM outreach program he founded for high‑school students, especially those from Hispanic backgrounds, and to author a series of reflective articles that chronicle
    his journey as a self‑taught scientist. Additionally, he seeks a consulting role with small engineering firms, providing expertise in experimental methods and data analysis, and hopes to serve on an
    advisory board for a community college to shape future curricula.
