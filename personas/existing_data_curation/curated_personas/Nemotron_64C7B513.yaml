  hobbies: '[''Hiking'', ''Photography'', ''Reading contemporary fiction'', ''Yoga'', ''Gardening'', ''Baking'', ''Knitting'', ''Volunteering at animal shelter'', ''Attending open mic nights'', ''Vinyl
    record collecting'']'
  career_goals: Madeline aims to release a professionally produced EP that blends folk sensibility with indie pop within the next two years, followed by a regional tour covering venues across the Mid‑Atlantic
    and Northeastern United States. She seeks to secure licensing placements for her songs in independent film and television projects, and to build a sustainable independent music career while maintaining
    financial stability. A core ambition is to launch a community music outreach program offering free workshops and mentorship for underserved youth in Monroe County, combining her compassionate nature
    with her artistic expertise. Long‑term, she aspires to obtain certification in music therapy to further integrate her love of music with helping others heal and grow.
