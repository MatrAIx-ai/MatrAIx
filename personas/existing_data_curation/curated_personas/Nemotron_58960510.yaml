  career_goals: Katelyn aspires to turn her passion for visual storytelling into a professional career. She envisions attending a specialized art high school that emphasizes independent studio work, followed
    by a BFA in illustration or concept art. Ultimately, she hopes to work as a concept artist for video games or an animated film studio, where she can blend her digital skills with her love for narrative.
    She also harbors a side ambition to develop interactive educational apps that merge her coding interests with artistic design, allowing her to create solo projects that reach a wider audience while
    maintaining creative control.
