  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Pottery'', ''Chinese Calligraphy'', ''Tea Ceremony'', ''Cooking Asian Dishes'', ''Desert Hiking'', ''Yoga'', ''Meditation'', ''Volunteer
    at Cultural Festivals'']'
  career_goals: Liying aims to ascend to a Director of Operations role where she can champion sustainable manufacturing practices and embed design-thinking principles into production pipelines. She seeks
    to lead large-scale transformation projects that reduce environmental impact while enhancing product aesthetics. Mentorship remains a priority; she wants to develop a pipeline of diverse, women leaders
    in the industrial sector and to create a corporate culture that values harmony and employee well-being. In the longer term, Liying envisions transitioning to a consultancy focused on helping manufacturers
    integrate artistic creativity and cultural sensitivity into their operations, while maintaining a flexible schedule that allows for personal artistic pursuits.
