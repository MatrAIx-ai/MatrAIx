personas:
  professional: Tammy Bates, a 41‑year‑old correctional security specialist with an education background, leverages their strength in inmate supervision, conflict de‑escalation, and curriculum design to
    champion art‑based therapeutic programs while navigating a relaxed approach to scheduling that sometimes clashes with the regimented demands of prison administration, and aspires to become a unit shift
    supervisor or deputy warden to shape policy and mentor staff.
  sports: Tammy Bates, who values solitary movement, walks the Patapsco River trail three times a week, participates in a local 5K run club during the spring, follows the Baltimore Ravens with enthusiasm,
    and attends a community yoga class in the garden for flexibility, balancing low‑impact exercise with a love of quiet contemplation.
  arts: Tammy Bates cultivates an artistic practice of acrylic painting and nature sketching, frequents the Baltimore Museum of Art to discover emerging contemporary painters, draws inspiration from improvisational
    jazz legends such as John Coltrane and Kamasi Washington, and writes occasional free‑verse poetry that reflects social‑justice themes and personal introspection.
  travel: Tammy Bates prefers low‑key, spontaneous weekend getaways to places like the Shenandoah Valley, historic Savannah, and the secluded Outer Banks, balancing a modest travel budget with a desire
    for natural serenity, quiet reflection, and culturally rich small‑town experiences.
  culinary: Tammy Bates enjoys cooking at an intermediate level, blending Southern soul‑food staples like collard greens, smoked turkey, and sweet‑potato mash with global flavors such as miso, kaffir lime,
    and harissa, seasoning dishes with garden‑fresh herbs including basil, thyme, and cilantro, and hosting occasional intimate dinner gatherings for close friends.
  core: Tammy Bates merges a calm, solitary curiosity with a passion for correctional reform, art, and garden‑grown cuisine, navigating a laid‑back lifestyle while driving purposeful change.
background:
  cultural: Tammy is a second‑generation African‑American who was raised in Baltimore County. Her family’s roots trace back to the Great Migration, with grandparents who moved from the Deep South to Maryland
    in the 1940s. Growing up, she was immersed in the vibrant Black community of Baltimore, attending church services that emphasized solidarity, music, and social activism. She celebrates cultural traditions
    such as Juneteenth and enjoys the rich artistic legacy of the city, including the works of local Black artists and musicians. This heritage informs her compassionate approach to corrections, emphasizing
    restorative justice and culturally responsive support for Black inmates.
attributes:
