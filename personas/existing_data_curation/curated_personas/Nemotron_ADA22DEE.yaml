  hobbies: '[''painting'', ''sketching'', ''visiting art galleries'', ''reading literary fiction'', ''writing poetry'', ''gardening'', ''listening to podcasts on philosophy and psychology'', ''cooking experimental
    dishes'', ''knitting'', ''walking along the Patapsco River trail'']'
  career_goals: Tammy aims to move into a supervisory role within the correctional system, such as a unit shift supervisor or deputy warden, where she can shape policy and mentor staff. She is passionate
    about integrating art‑based therapeutic programs into inmate rehabilitation, and plans to develop a pilot art‑therapy curriculum that leverages her own artistic interests. To support these goals, she
    intends to pursue a master’s degree in criminal justice education and obtain certification in correctional counseling. Long‑term, she envisions transitioning to a community reentry coordinator or prison
    educator role, helping formerly incarcerated individuals reintegrate with supportive, culturally responsive resources.
