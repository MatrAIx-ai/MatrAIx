  career_goals: Beulah aims to move beyond her current cashier role into a supervisory position within the next two years, seeking a shift lead or assistant manager role where she can hone leadership and
    operational skills. She is also pursuing the completion of her associate degree in communications, with electives in art history and visual merchandising, to blend her love of art with retail. Her long-term
    ambition is to become a visual merchandiser or community arts coordinator for a boutique or local gallery in the Chicago area, designing displays that tell stories and organizing workshops that bring
    people together. She hopes to eventually open a hybrid coffee‑shop/gallery space in Dolton, providing a welcoming venue for emerging artists while offering stable employment. Throughout this path, she
    is driven by a competitive desire to advance quickly and to prove herself capable of managing both creative projects and business operations.
