personas:
  professional: Beulah Strada, a 23‑year‑old cashier in a bustling Chicago suburb, blends their knack for front‑line customer service with a competitive drive to rise to shift lead, leveraging budding graphic‑design
    skills and community‑arts volunteer experience to craft engaging visual displays.
  sports: Beulah Strada spikes the ball for a co‑ed volleyball league at the Dolton Community Center, they cheer on the Chicago Bulls and Cubs on weekends, and they unwind with occasional jogs through nearby
    forest preserves, preferring team camaraderie over solo workouts.
  arts: Beulah Strada scours the Art Institute of Chicago for exhibitions by Theaster Gates and Kara Walker, they snap street photographs inspired by Banksy's style, and they curate weekly potluck gatherings
    featuring playlists that blend Chance the Rapper’s hip‑hop with traditional Irish folk tunes, letting their love for contemporary art shape their social life.
  travel: Beulah Strada loves spontaneous weekend road trips, they have explored Milwaukee’s breweries, Nashville’s music scene, and Starved Rock State Park, while dreaming of a future cultural immersion
    in Brooklyn’s art districts; budget constraints and shift work often force them to plan trips on short notice and prioritize low‑cost hostels.
  culinary: Beulah Strada experiments in their modest kitchen, they perfect Chicago‑style deep‑dish pizza, whip up cilantro‑lime shrimp tacos, and bake avocado‑saffron focaccia, while hosting potluck nights
    where friends bring dishes like kimchi fried rice and beet‑root salad, reflecting their openness to multicultural flavors.
  core: Beulah Strada is a 23‑year‑old art‑obsessed retail associate whose competitive edge, social flare, and occasional anxiety drive them to juggle coffee‑shop recipes, volleyball matches, and big‑picture
    dreams of a community‑focused gallery.
background:
  cultural: Beulah grew up in Dolton, a close‑knit suburb of Chicago in Cook County, Illinois. Her family has deep Midwestern roots, with ancestral ties to German and Irish immigrants who settled in the
    region during the early 20th century. Raised in a working‑class household, she experienced the values of hard work, modesty, and community responsibility that are common in the area. The town's proximity
    to Chicago exposed her to a rich tapestry of cultural events, from lakefront festivals to diverse culinary scenes, fostering an openness to new ideas and artistic expression. She was encouraged to attend
    local school field trips to museums and to participate in community art projects, which nurtured her curiosity about visual arts. While she celebrates traditional holidays like Thanksgiving and Christmas
    with family gatherings and familiar dishes, she also embraces the multicultural influences of the Chicago metropolitan area, often exploring ethnic neighborhoods for food, music, and art. English is
    her primary language, and her daily interactions at work have familiarized her with a broad spectrum of cultural backgrounds, reinforcing both her sociable nature and occasional wariness of others'
    motives.
