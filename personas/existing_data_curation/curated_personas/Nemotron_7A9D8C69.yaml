  hobbies: '[''Visiting Art Galleries and Museums'', ''Sketching'', ''Street Photography'', ''Live Music Concerts'', ''Community Theater'', ''Volleyball'', ''Trivia Nights'', ''Social Dancing'', ''Cooking
