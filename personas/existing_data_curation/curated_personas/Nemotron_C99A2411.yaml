personas:
  professional: Mariano Ayala, a 26‑year‑old facilities specialist, blends his meticulous eye for visual detail with a relaxed yet competitive mindset, excelling in commercial cleaning, basic maintenance
    troubleshooting, and bilingual crew coordination while ambitiously pursuing green‑certified facility management certification.
  sports: Mariano Ayala spends Saturday mornings shooting hoops at the Lockeford community court with the local "River Riders" pickup basketball club, follows the Sacramento Kings fervently, and cheers
    on the San Francisco 49ers during NFL season, while occasionally joining weekend trail runs in the Sierra foothills.
  arts: Mariano Ayala immerses himself in visual culture by sketching urban murals, attending indie film screenings showcasing directors like the Dardenne brothers, and listening to flamenco virtuoso Paco
    de Lucía alongside indie folk duo Bon Iver, letting these influences shape his watercolor practice and urban photography.
  travel: Mariano Ayala prefers spur‑of‑the‑moment road trips, having camped in the Sierra foothills and taken weekend getaways to Napa Valley and Santa Cruz, while dreaming of a long‑term artistic trek
    through Barcelona’s Gothic Quarter and Venice’s Murano glass workshops, balancing his boundless curiosity with limited savings.
  culinary: Mariano Ayala, an enthusiastic home cook, crafts traditional Spanish tapas such as patatas bravas and gambas al ajillo infused with smoked paprika, garlic, and olive oil, pairs them with a glass
    of sherry, and occasionally experiments with avocado‑lime quinoa salads featuring fresh cilantro and lime zest.
  core: Mariano Ayala is a curiosity‑driven artist‑cleaner who can transform a mop into a brush, yet often forgets appointments, wrestles with anxiety, and thrives on spontaneous group activities.
background:
  cultural: Mariano was born to Spanish parents who immigrated from the Andalusian region of Spain when he was a child. He grew up in a bilingual household where Spanish language, flamenco rhythms, and
    celebrations like Semana Santa were integral to family life. The weekly tradition of cooking paella and sharing tapas fostered his appreciation for communal meals and hospitality. While living in Lockeford,
    he maintains strong ties to his heritage through the local Spanish cultural association, regular visits to Spain during holidays, and a deep admiration for Spanish masters such as Picasso, Dalí, and
    Gaudí. This blend of European Spanish roots and the multicultural tapestry of California shapes his worldview, informing his artistic curiosity, love of community gatherings, and respect for sustainable
    living practices.
attributes:
  skills: '[''Commercial cleaning and routine janitorial duties'', ''Floor care (stripping, sealing, polishing)'', ''Safe chemical handling and green cleaning practices'', ''Basic electrical, plumbing,
    and HVAC troubleshooting'', ''Inventory control and supply ordering'', ''Bilingual communication (Spanish and English)'', ''Customer service and conflict resolution'', ''Team coordination and shift
    scheduling'', ''Attention to detail and visual inspection'', ''Stress management under pressure'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Playing pickup basketball with friends'', ''Hiking the Sierra foothills'', ''Cooking traditional Spanish tapas'',
    ''Exploring local coffee shops and street food'', ''Listening to flamenco and indie music'', ''Practicing yoga and meditation'', ''Photography of urban and natural landscapes'', ''Participating in community
    theater improv'']'
  career_goals: Mariano aims to leverage his hands‑on cleaning expertise into a supervisory role within facilities management, ideally as a green‑certified Facility Operations Manager. He plans to complete
    his associate degree in Environmental Health/Safety or Hospitality Management, obtain certifications in sustainable cleaning (e.g., Green Seal or LEED), and eventually launch a boutique cleaning service
    that specializes in eco‑friendly upkeep for art studios and galleries. In the longer term, he dreams of combining his love for art with his operational skills by working as a facilities coordinator
    for a cultural institution, where he can ensure both the preservation of artworks and a healthy environment for staff and visitors.
