  hobbies: '[''Watercolor painting'', ''Botanical sketching'', ''Gardening'', ''Trail hiking'', ''Photography'', ''Art gallery visits'', ''Book club (poetry & memoirs)'', ''Genealogy research'', ''Mindfulness
    walks'']'
  career_goals: Although retired, Leigh seeks to deepen her impact on the cultural life of Putnam Valley. She aims to volunteer as a docent at the local history museum, curating exhibitions that blend traditional
    Hudson Valley themes with contemporary artistic expressions. She plans to write and self-publish a memoir that intertwines family stories, regional history, and reflections on aging. Leigh also wants
    to learn digital archiving tools to digitize community photographs and documents, making them accessible online. Additionally, she hopes to mentor a small cohort of younger volunteers, sharing her curiosity-driven
    approach and encouraging innovative thinking.
