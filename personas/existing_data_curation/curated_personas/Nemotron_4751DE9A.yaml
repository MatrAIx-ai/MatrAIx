personas:
  professional: Anna Hanson, a 33‑year‑old claims adjuster in the insurance sector, leverages her meticulous data‑entry skills, Xactimate expertise, and a historian’s eye for detail to craft clear, empathetic
    loss reports while mediating disputes, all in pursuit of a future as a senior claims supervisor and CPCU‑certified leader of AI‑enhanced training.
  sports: Anna Hanson is a dedicated member of the Wisconsin Trail Hiking Club, enjoys weekend runs along the Lake Michigan shoreline, follows the Milwaukee Brewers and Bucks avidly, plays casual softball
    in a local co‑ed league each summer, and incorporates cross‑country skiing in winter to maintain a well‑rounded fitness routine.
  arts: Anna Hanson frequently volunteers at community theater productions, admires the works of playwright Lin‑Manuel Miranda and folk singer Brandi Carlile, often captures Lake Michigan sunsets in the
    style of Ansel Adams, and reads historical fiction by Hilary Mantel to unwind, blending her love for storytelling with visual art.
  travel: Anna Hanson prefers weekend road trips to Wisconsin’s Door County and the Upper Peninsula, has trekked historic sites in Boston and Savannah during a recent vacation, dreams of exploring the castles
    of Scotland, and balances her travel planning between spontaneous hikes and meticulously researched itineraries to fit her budget and family commitments.
  culinary: Anna Hanson cultivates a small vegetable garden and frequently cooks farm‑to‑table meals like heirloom tomato bruschetta and roasted root vegetables, experiments with home‑brewing using Cascade
    hops for a crisp IPA, and enjoys pairing her dishes with locally sourced cheese and fresh apple cider.
  core: Anna Hanson is a curiosity‑driven claims adjuster who balances meticulous work with outdoor adventures, home‑brewing experiments, and a gentle habit of over‑planning her garden while occasionally
    forgetting to water it.
background:
  cultural: Anna was raised in Sheboygan, Wisconsin, a city with strong German‑American roots and a vibrant Midwestern cultural identity. Her family traditions include the annual cheese‑curd festival, community
    fairs, and a modest, cooperative approach to daily life. The region’s emphasis on hard work, self‑reliance, and neighborly support shaped her values of kindness and harmony. While she identifies as
    white and grew up in a predominantly Protestant environment, she appreciates the diverse cultural tapestry of the Great Lakes area, including the influence of nearby Scandinavian and Polish communities.
