  career_goals: Anna aims to earn the Chartered Property Casualty Underwriter (CPCU) designation within the next two years and to move into a senior claims supervisor role, overseeing a team of adjusters
    in the Midwest region. She wants to lead a training program that integrates emerging technologies such as AI‑driven loss estimation while maintaining the human touch she values. Long‑term, she envisions
    transitioning to an independent adjusting practice that specializes in complex property loss cases, giving her greater flexibility to balance professional growth with personal interests.
