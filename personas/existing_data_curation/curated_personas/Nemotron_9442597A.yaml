  career_goals: At two years old, Hita doesn't have formal career plans, but she frequently expresses excitement about becoming an artist or a teacher when she grows up. She loves watching her mother paint
    and enjoys storytime, so she dreams of creating pictures that make people smile and perhaps one day leading a classroom. Her current ambition is to learn new words, explore more of the world around
    her, and be the "big helper" during family activities, all while keeping her playtime flexible and open‑ended.
