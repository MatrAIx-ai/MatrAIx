personas:
  professional: Hita Granger, a tiny future educator, delights in sandbox teaching sessions, channeling curiosity and sociable energy to guide peers through block building, while they often lead spontaneous,
    unscripted lessons.
  sports: Hita Granger, a pint‑sized park enthusiast, spends afternoons chasing after the local soccer club’s mascot, the Falcons, while energetically riding a tricycle on the neighborhood’s paved path,
    and they embrace spontaneity over structured drills.
  arts: Hita Granger, an emerging art aficionado, loves the bright colors of Van Gogh’s Sunflowers prints on the nursery wall, sings along to Disney’s 'Let It Go' by Idina Menzel, and they mimic the playful
    dances of the children’s performer Ryan’s World.
  travel: Hita Granger, a wide‑eyed explorer, delights in family weekend trips to the Grand Canyon and short flights to Orlando’s Disney World, yet they prefer the comfort of a familiar stroller and a portable
    snack box while discovering new sights.
  culinary: Hita Granger, a tiny foodie, favors creamy macaroni‑and‑cheese, sweet banana slices, and occasional chicken nuggets, often insisting on a sprinkle of cheddar, while they rely on spoon‑feeding
    from a bright yellow bowl due to limited motor skills.
  core: Hita Granger is an exuberant two‑year‑old whose boundless curiosity, love for group play, and delight in colorful art make every day a spontaneous adventure, even if toys end up scattered and snack
    preferences swing wildly; they relish the chaos as part of the fun.
background:
  cultural: Hita comes from a white, Midwestern American background in Barry, Illinois. Her family values community involvement, church gatherings, and the agricultural heritage of Adams County. She is
    raised with a blend of traditional Midwestern customs—such as annual county fairs, seasonal picnics, and church‑related celebrations—while also being exposed to contemporary media and art through local
    libraries and community art programs. This environment nurtures her sociable, curious nature and encourages flexible, experience‑driven learning.
attributes:
  skills: '[''Drawing basic shapes'', ''Stacking blocks'', ''Color recognition'', ''Singing nursery rhymes'', ''Simple rhythmic dancing'', ''Pretend play'', ''Cooperative play with peers'']'
