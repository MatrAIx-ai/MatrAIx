persona_description: A healthcare professional who is interested in the diagnosis and treatment of infective endocarditis, including the use of transesophageal echocardiography and other imaging techniques.
  This persona is likely to be familiar with the Revised Duke Criteria and modified Duke criteria for diagnosing infective endocarditis and may have expertise in the use of CT and PET scanning in the diagnosis
  of endocarditis. This persona may also be familiar with the European Society of Cardiology guidelines for managing infective endocarditis and may have experience in interpreting imaging results and making
  diagnostic decisions.
