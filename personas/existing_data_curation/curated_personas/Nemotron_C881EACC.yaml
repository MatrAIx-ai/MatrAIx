  hobbies: '[''Soccer'', ''Basketball'', ''Biking on local trails'', ''Online multiplayer gaming'', ''Cooking Mexican cuisine'', ''Volunteer event coordination'', ''Listening to regional music'']'
  career_goals: Juan Jose aims to secure a scholarship to study Business Administration or Logistics at a community college, with the long‑term ambition of becoming a supply‑chain coordinator or operations
    manager in a manufacturing or retail environment where his structured approach and collaborative style can thrive. As a contingency, he is also interested in earning an automotive technology certification
    to work as a service technician. He envisions using his education and skills to support his family, contribute to his community, and eventually assume a leadership role that balances efficiency with
    people‑focused decision making.
