personas:
  professional: Franklin Quiles, a 27‑year‑old carpenter who blends hands‑on construction expertise with a curiosity for sustainable design, channels practical creativity into custom eco‑friendly furniture
    and high‑end cabinetry, leveraging precise blueprint reading, cost estimating, and client communication while they maintain an organized yet flexible workflow on residential projects.
  sports: Franklin Quiles, a 27‑year‑old outdoors enthusiast, spends Saturdays tackling the coastal trails of Newport Beach with the Orange County Hiking Club, roots for the Los Angeles Dodgers during spring
    training, and they join a casual beach‑volleyball league at Huntington Beach each summer to keep fit.
  arts: Franklin Quiles, a 27‑year‑old amateur guitarist and photographer, strums folk classics by Bob Dylan and acoustic renditions of The Eagles at friends’ gatherings, and they spend evenings capturing
    close‑ups of reclaimed wood grain and coastal sunsets, drawing inspiration from Ansel Adams’ landscape photography.
  travel: Franklin Quiles, a 27‑year‑old explorer, prefers DIY road trips along California’s Pacific Coast Highway, has trekked the redwoods of Redwood National Park and the cliffs of Big Sur, and they
    dream of a summer photography pilgrimage to the ancient temples of Kyoto while balancing travel costs with their savings plan for a future boutique showcase in Santa Monica.
  culinary: Franklin Quiles, a 27‑year‑old grill aficionado, experiments with cedar‑plank salmon seasoned with dill and lemon, slow‑smoked Texas‑style brisket rubbed with coffee and chipotle, and crafts
    herb‑infused avocado toast, and they often pair meals with craft beers from local Orange County microbreweries.
  core: Franklin Quiles, a 27‑year‑old carpenter who merges green craftsmanship with a wander‑lust for coastal hikes, is known for obsessively cataloguing wood‑grain textures on his phone, occasionally
    over‑ordering premium tools they don’t use, and humming Bob Dylan while sanding.
background:
  cultural: Franklin was raised in a middle‑class suburban family in Orange County, with Irish‑German ancestry that reflects a typical white American heritage. His upbringing blended mainstream American
    cultural traditions—celebrating holidays such as Thanksgiving and the Fourth of July—with the outdoor‑oriented, health‑focused lifestyle of Southern California. Growing up in Irvine’s diverse environment
    fostered an inclusive outlook and openness to a variety of design aesthetics. He values reliability, community involvement, and sustainable living, which are evident in his volunteer work and interest
    in eco‑friendly building practices.
