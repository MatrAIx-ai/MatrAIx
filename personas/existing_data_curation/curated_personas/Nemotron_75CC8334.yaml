  career_goals: Franklin aims to achieve journeyman carpenter certification within the next two years and ultimately become a master carpenter specializing in high‑end, eco‑friendly residential projects.
    He plans to launch a boutique business that designs and installs custom cabinetry and sustainable furniture for clients in Orange County. He also intends to deepen his knowledge of green building standards
    such as LEED and to obtain a contractor’s license so he can manage larger remodels while maintaining the hands‑on craftsmanship he values.
