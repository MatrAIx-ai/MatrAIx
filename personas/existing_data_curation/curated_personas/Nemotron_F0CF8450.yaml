  career_goals: Amara aims to advance to an operations manager role within the next three to five years, taking on broader responsibility for multiple office locations across the region. She plans to earn
    a Certified Administrative Professional (CAP) credential and pursue Lean Six Sigma Green Belt certification to strengthen her process‑improvement expertise. She also hopes to mentor emerging supervisors
    and lead a cross‑functional efficiency initiative that reduces administrative overhead. Long‑term, she envisions opening a consulting firm that helps small Texas businesses streamline their back‑office
    functions while maintaining work‑life balance for herself and her team.
