    ''Nature photography'']'
  career_goals: Over the next five years Jessica aims to step into a senior HR leadership role, such as HR Director or Senior HR Business Partner, within a mid‑size manufacturing or technology firm in the
    Pacific Northwest. She wants to champion data‑driven workforce planning, develop a mentorship program for emerging HR professionals, and achieve the SHRM‑SCP certification. Additionally, she hopes to
    author a guide on integrating analytical methods into employee engagement and to transition gradually to part‑time consulting while increasing her involvement in community volunteer projects.
