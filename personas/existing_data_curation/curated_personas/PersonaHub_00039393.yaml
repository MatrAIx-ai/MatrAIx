persona_description: A photographer who is passionate about vintage cameras and film formats, especially the 126 format. They are interested in the history, mechanics, and aesthetics of these cameras, and
  often seek out rare and out-of-production models. They appreciate the simplicity and unique qualities of the 126 format, and enjoy experimenting with it in their own photography. They are likely to be
  knowledgeable about the development and production of 126 cameras, as well as the mechanics of loading and unloading film. They may also be interested in the history and cultural significance of the 126
  format, and may have a particular interest in the decline of the format and the eventual end of cassette film.
