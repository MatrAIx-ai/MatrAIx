  career_goals: Alexis aims to advance from executive administrative assistant to Office Manager or Senior Executive Assistant, overseeing a team of support staff and shaping strategic office initiatives.
    She plans to complete a bachelor’s degree in Business Administration on a part‑time schedule to strengthen her leadership credentials. Her ambition includes spearheading digital transformation projects
    that increase efficiency across the organization, mentoring junior administrative professionals, and eventually transitioning into an operations management role where she can influence broader business
    processes.
