  career_goals: Malcolm aims to move into a supervisory role such as Office Manager or Operations Coordinator, where he can lead a team and streamline office workflows. He plans to earn a Project Management
    Professional (PMP) certification and explore coursework in event planning or arts administration to blend his administrative expertise with his passion for the arts. Ultimately, he hopes to coordinate
    cultural programs for a community center or nonprofit, fostering local artistic initiatives while continuing to support his family and community.
