personas:
  professional: Joseph Smith is a budding junior naturalist who spends his afternoons cataloguing backyard finds, constructing detailed LEGO dioramas of ecosystems, and asking endless questions in kindergarten
    class, balancing his boundless curiosity with a surprisingly practical approach to solving puzzles.
  sports: Joseph Smith dribbles the ball for their neighborhood Little League soccer team, cheers for the Atlanta United FC and Atlanta Falcons, and spends weekends sprinting in the backyard, using teamwork
    to channel their assertive side while still feeling the occasional nervousness before a big match.
  arts: Joseph Smith draws vivid superhero scenes inspired by Spider‑Man and Black Panther, sings along to upbeat R&B hits from Beyoncé and Bruno Mars, and dances with wild abandon to the rhythm of the
    night, while also enjoying picture books by Eric Carle and Dog Man comics, weaving imagination into everyday play.
  travel: Joseph Smith loves family road trips to the Georgia Aquarium and Stone Mountain Park, dreams of floating in zero‑gravity at the Space Center Houston, and prefers short, well‑planned outings with
    parents over long vacations, balancing excitement with a need for familiar routines.
  culinary: Joseph Smith adores the soul‑food aromas of fried chicken, collard greens, and sweet potato casserole that fill the family kitchen, proudly helps stir mac & cheese, and often snatches a bite
    of pizza while watching favorite cartoons, though they sometimes forget to eat vegetables during snack time.
  core: Joseph Smith is a curious, organized six‑year‑old who dives into backyard discoveries, builds LEGO worlds, and navigates big feelings with equal parts enthusiasm and occasional anxiety.
background:
  cultural: Joseph is an African‑American child raised in Lawrenceville, a suburb of Atlanta in Gwinnett County, Georgia. His family maintains strong ties to Southern Black cultural traditions, including
    attending a local Baptist church where he participates in Sunday school and community events. Family gatherings often feature soul food such as fried chicken, collard greens, and sweet potatoes, and
    music ranging from gospel to modern R&B, which he enjoys. He is exposed to community celebrations like Juneteenth and Martin Luther King Jr. Day, fostering a sense of pride and history. The diverse
    school environment and after‑school programs in Gwinnett County provide him with opportunities to interact with peers from various backgrounds, reinforcing values of cooperation, respect, and cultural
    awareness.
