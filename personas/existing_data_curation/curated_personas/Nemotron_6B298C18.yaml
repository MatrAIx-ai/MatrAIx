  career_goals: Joseph dreams of exploring the stars and hopes to become an astronaut, inspired by his curiosity about space. He also loves building and fixing things, so he envisions becoming an engineer
    or a builder. Because he likes helping others and feels strongly when friends are upset, he sometimes imagines being a firefighter or a teacher, roles where he can protect and guide. He talks about
    wanting to make a safe, fun place for his friends to play, reflecting his balance of compassion and self‑interest. His ambitions are shaped by his love for discovery, practicality, and his desire to
    be supportive.
