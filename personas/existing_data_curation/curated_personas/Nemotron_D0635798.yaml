personas:
  professional: Lori Duncan is an ambitious teen graphic design hopeful who blends curious artistry with meticulous event planning, producing eye‑catching digital illustrations, coordinating community art
    workshops, and crafting engaging social‑media campaigns that showcase local culture while they balance school commitments.
  sports: Lori Duncan stays fit by shooting hoops at the Melvindale neighborhood park and playing in a casual youth basketball league during the spring, follows the Detroit Pistons for NBA excitement, roots
    for the Detroit Lions in football season, and uses group workouts as a social outlet, treating fitness as both a creative break and a way to connect with peers.
  arts: Lori Duncan immerses herself in Detroit’s vibrant arts scene, drawing inspiration from the classic soul of Aretha Franklin, the psychedelic swagger of Tame Impala, and the digital futurism of Beeple,
    while regularly visiting exhibitions by Kehinde Wiley at the Detroit Institute of Arts, sketching sprawling murals by the local collective TVP Murals, and performing in community theater productions
    with the Melvindale Community Players.
  travel: Lori Duncan enjoys weekend getaways to Mackinac Island and spontaneous day trips to Chicago’s art districts, while dreaming of an autumn backpacking tour through Lisbon’s street‑art neighborhoods
    and a spring visit to Tokyo’s Akihabara for inspiration, planning trips meticulously on a shared Google spreadsheet yet leaving room for last‑minute adventures whenever school breaks arise.
  culinary: Lori Duncan loves home‑cooked comfort foods, often whipping up loaded mac and cheese with smoked Gouda, jalapeños, and crispy bacon, perfecting Detroit‑style pizza topped with caramelized onions
    and pepperoni, and experimenting with vegan sushi rolls using avocado, cucumber, and pickled radish, all while swapping recipes and measuring spices with friends during weekend kitchen hangouts.
  core: Lori Duncan is a hyper‑social, sketch‑obsessed teen who balances bustling community art projects with late‑night Instagram scrolls, a compulsive habit of doodling in every notebook margin, and an
    occasional tendency to postpone schoolwork for the latest concert ticket.
background:
  cultural: Lori is a white Midwestern teenager raised in Melvindale, a small industrial suburb of Detroit in Wayne County, Michigan. Her family’s roots trace back to European ancestry, primarily Irish
    and Polish, and she grew up in a close‑knit, working‑class neighborhood where community values and a strong work ethic are emphasized. The region’s rich musical heritage – from Motown to techno – and
    its vibrant street‑art culture have shaped her appreciation for diverse artistic expressions. While she identifies with mainstream American culture, she has been exposed to the city’s multicultural
    environment, fostering openness to different perspectives. Local churches and community centers have reinforced her sense of cooperation and kindness, and the legacy of the automotive industry has instilled
    a pragmatic, hands‑on approach to problem‑solving.
attributes:
  skills: '["Event coordination", "Volunteer program planning", "Public speaking", "Basic graphic design (Canva, Photoshop)", "Sketching and drawing", "Digital photography", "Social media content creation",
