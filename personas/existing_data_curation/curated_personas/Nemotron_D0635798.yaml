  hobbies: '["Sketching and drawing", "Digital illustration", "Photography", "Visiting art museums and galleries", "Exploring street murals", "Playing basketball", "Community theater", "Volunteering at
    community art workshops", "Social media content creation", "Listening to Motown, indie, and electronic music", "DIY crafts and home decor", "Reading graphic novels"]'
  career_goals: Lori aims to earn her GED within the next year and enroll in the graphic design program at Wayne County Community College. She aspires to become a professional digital artist and art program
    coordinator, merging her love for visual expression with her talent for organizing community events. In the long term, she envisions establishing a collaborative art space in Melvindale where local
    youth can explore creativity, attend workshops, and showcase their work. Additionally, she hopes to build a freelance portfolio that includes illustration, branding, and social‑media design, eventually
    securing full‑time work with a creative agency or a cultural institution such as the Detroit Institute of Arts.
