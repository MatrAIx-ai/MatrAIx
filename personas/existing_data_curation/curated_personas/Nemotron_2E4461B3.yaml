personas:
  professional: Ivelisse Mendoza, a budding junior librarian in her preschool's reading nook, organizes storybooks by color and size with methodical precision, balancing her innate curiosity for new tales
    with a practical approach to maintaining order, and eagerly assists classmates in finding their favorite pages.
  sports: Ivelisse Mendoza, a preschooler who loves joining the local community's tiny tots soccer club on Saturday mornings, cheers for the Scorpions Youth FC while practicing gentle stretches and organized
    play, and prefers the calm of small‑group obstacle courses over noisy playground crowds.
  arts: Ivelisse Mendoza, an enthusiastic fan of sing‑along classics like “Twinkle, Twinkle, Little Star” and “The Wheels on the Bus,” as well as animated performances by Sesame Street’s Elmo and the musical
    storytelling of Disney’s “Moana,” delights in drawing simple pictures of animals inspired by Dr. Seuss, shaping her creative identity through bright crayons and playful rhythms.
  travel: Ivelisse Mendoza, a curious explorer who enjoys short family trips to the nearby botanical garden in her city and the annual children’s festival at the coastal town of Seaside Cove, prefers meticulously
    planned itineraries with nap breaks, and dreams of one day visiting the sea turtles nesting beaches of Costa Rica.
  culinary: Ivelisse Mendoza, a picky yet adventurous eater who adores sliced strawberries, peanut butter on whole‑grain toast, and macaroni with a dash of mild cheddar, enjoys helping stir batter for banana
    pancakes, but often refuses broccoli, showcasing a developing palate balanced by parental encouragement.
  core: Ivelisse Mendoza, a meticulous three‑year‑old who blends boundless curiosity with a methodical love for order, quietly aids friends, saves every coin, and dreams of tidy playrooms and future adventures.
background:
  cultural: Ivelisse grows up in a bilingual Puerto Rican household where Spanish is spoken at home and English at school and in the community. Her family celebrates Puerto Rican traditions such as Three
    Kings Day, enjoys dishes like arroz con gandules during family meals, and fills the home with salsa, bomba, and plena rhythms that inspire her love of music and dance. The close‑knit family values of
    respect, community support, and sharing have fostered her strong sense of compassion and cooperation, while living in Carlisle, MA provides her with access to multicultural programs and nature spaces
    that broaden her experiences.
