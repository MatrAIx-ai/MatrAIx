  hobbies: '[''reading bilingual picture books'', ''drawing and coloring'', ''building blocks and puzzles'', ''listening to and dancing to music'', ''outdoor nature exploration'', ''pretend care of dolls
    and stuffed animals'', ''educational tablet games'']'
  career_goals: During pretend play Ivelisse often adopts roles such as a teacher, a pediatric nurse, or a dance leader, expressing a strong desire to help others and keep things orderly. She imagines guiding
    younger children in learning, caring for friends who are unwell, and sharing music and rhythm with her community, reflecting her compassionate and methodical personality.
