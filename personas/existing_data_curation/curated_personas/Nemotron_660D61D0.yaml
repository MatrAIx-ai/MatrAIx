  hobbies: '[''visiting art galleries'', ''painting with watercolors'', ''gardening (flowers and vegetables)'', ''reading historical nonfiction'', ''knitting'', ''photography of local neighborhoods'', ''attending
    community theater'', ''volunteering at the library'', ''participating in a book club'']'
  career_goals: In retirement, Emma aims to keep learning and give back to her community. She hopes to volunteer as a mentor for youth art programs, help organize a neighborhood garden and occasional pop‑up
    art exhibits, and possibly compile a memoir of her life experiences and family stories to share with future generations.
