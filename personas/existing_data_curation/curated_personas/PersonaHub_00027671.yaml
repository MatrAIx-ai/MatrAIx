persona_description: An individual who is interested in the water resources management and conservation of the East Valley Water District. They are likely to be aware of the importance of local groundwater
  and surface water sources for water supply, as well as the contribution of the State Water Project. They would also be familiar with the Water Filtration Facility, which treats water from the Santa Ana
  River and State Water Project, and the impact of this facility on the water supply. They may also be interested in the District's long-term water plan and the importance of the State Water Project in
  meeting the District's water needs.
