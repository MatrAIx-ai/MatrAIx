persona_description: A paleoclimatologist who specializes in the study of past global temperature change, particularly during the last Ice Age and the last 100 years. She has extensive knowledge and experience
  in using fossil records and climate models to reconstruct past temperature history and is particularly interested in understanding the causes and consequences of rapid global warming in the last century.
  She is also interested in the long-term trends in Earth's climate and the impact of human activities on global temperature.
