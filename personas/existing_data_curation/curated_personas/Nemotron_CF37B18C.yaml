  career_goals: Although retired, Alexius aims to keep contributing to his community. He plans to mentor younger volunteers at the local senior center, lead an intergenerational fishing program, document
    oral histories of longtime residents, and organize an annual beach‑cleanup festival. He also hopes to compile his life experiences into a memoir and take occasional road trips to national parks, staying
    active and engaged.
