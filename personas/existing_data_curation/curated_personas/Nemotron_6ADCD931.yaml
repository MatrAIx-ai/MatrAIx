    club for Black women writers'']'
  career_goals: Toccara envisions turning her creative passions into a sustainable freelance career while nurturing her community. In the short term she aims to build a portfolio of illustration and narrative
    work that she can market to independent publishers, local businesses, and nonprofit organizations. She plans to launch a small‑scale community‑arts workshop in East Baton Rouge Parish, offering free
    art‑making sessions for children, seniors, and families, using her empathy and organizational skills to create a supportive environment. Over the next five years she hopes to complete a Bachelor of
    Fine Arts or a graduate certificate in art therapy, allowing her to combine visual storytelling with mental‑health outreach. Ultimately, she aspires to establish a nonprofit that uses art as a tool
    for empowerment and healing, providing a steady source of income that harmonizes her family life with her desire to help others.
