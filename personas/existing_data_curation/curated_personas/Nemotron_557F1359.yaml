  career_goals: John aims to advance to a senior supervisory role within the maintenance department of a reputable facilities management firm, where he can lead a team in adopting energy-efficient and smart-technology
    solutions. Over the next five years, he plans to earn certifications in sustainable building systems and project management, positioning himself to eventually launch his own boutique installation and
    repair business that specializes in green retrofits for residential and small-commercial properties. He is also committed to mentoring younger tradespeople, offering apprenticeship workshops, and contributing
    his expertise to community improvement projects.
