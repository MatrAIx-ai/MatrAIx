personas:
  professional: Rafael Garcia, a high‑school junior who channels a passion for illustration into freelance commissions for local indie game developers, blends traditional sketching with digital painting,
    and volunteers by leading art workshops at a community center.
  sports: Rafael Garcia enjoys skateboarding at the local skate park and plays on the high‑school's intramural soccer team, cheering for the Tulsa Roughnecks while occasionally joining weekend pick‑up basketball
    games at the community center, and they favor listening to indie rock playlists while warming up.
  arts: Rafael Garcia, a budding visual storyteller, spends weekends sketching cityscapes in Tulsa's Arts District, draws inspiration from indie rock bands like Arctic Monkeys and from traditional folk
    melodies, captures candid moments through street photography, and avidly reads authors such as Neal Stephenson and Octavia Butler to fuel sci‑fi ideas.
  travel: Rafael Garcia dreams of exploring the vibrant murals of Mexico City and the surreal architecture of Barcelona, yet currently enjoys day trips to the nearby Red Fork Creek for sunrise sketches
    and saves their allowance for a future family road trip to the Grand Canyon.
  culinary: Rafael Garcia loves cooking simple dishes like homemade tacos, guacamole, and queso fundido with fresh cilantro and lime, boasts a growing confidence in the kitchen, yet often burns the edges
    of their quesadillas when multitasking between music and art projects.
  core: Rafael Garcia blends a quiet, curious nature with a fierce love for art, balancing disciplined study habits with spontaneous sketch‑sessions, while occasionally procrastinating on chores and night‑time
    sleep.
background:
  cultural: Rafael grew up in a Mexican‑American household in Tulsa, Oklahoma, where family gatherings, Mexican cuisine, and celebrations such as Día de los Muertos and Las Posadas are central to his identity.
    Bilingual in Spanish and English, he balances the collectivist values of his heritage—emphasizing respect, compassion, and community service—with the individualistic opportunities of American culture.
    His parents instilled a love for storytelling and art, and he participates in local cultural festivals that showcase Mexican folk art and music, reinforcing his connection to both his roots and his
    Midwestern community.
