  career_goals: Rafael envisions completing high school and pursuing a vocational program or associate degree in graphic design or community arts. He aspires to become a visual artist who creates murals
    and public art that celebrate Mexican heritage and promote social harmony in Tulsa. Alternatively, he is interested in a career as a bilingual youth mentor or counselor, using his compassion and creative
    skill set to support other teens through community programs.
