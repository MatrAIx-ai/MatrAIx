persona_description: A paleontologist who specializes in the study of carbonate platforms and reefs, particularly those associated with the Early Permian in the Canadian Arctic Archipelago. His research
  interests include the evolution of carbonate platforms and reefs, the relationship between carbonate platforms and evaporites, and the record of syn- and post-tectonic uplift and subsidence in the region.
  He has published extensively on the Tolkien Reefs, which he has attributed the names of characters from J.R.R. Tolkien's "The Lord of the Rings" in recognition of their unique and distinctive characteristics.
