  career_goals: David aims to finish an associate degree in business administration and earn a certified HVAC technician credential, securing a stable, well‑paid trade position that offers a predictable
    schedule with occasional flexibility to accommodate his need for a balanced routine. In the long term, he hopes to launch a small handyman service that serves his Crystal Springs community, allowing
    him to combine his practical skills with his desire to help neighbors while maintaining a work‑life rhythm that reduces his stress and worry.
