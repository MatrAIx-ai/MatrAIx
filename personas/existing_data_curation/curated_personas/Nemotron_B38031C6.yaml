personas:
  professional: David Jackson is a hands‑on aspiring HVAC technician who leverages their solid carpentry, automotive repair, and budgeting skills to deliver reliable service, while their preference for
    structure and predictability keeps projects on schedule despite occasional relaxed approach to paperwork.
  sports: David Jackson enjoys playing pickup basketball at the local community center, cheering for the Memphis Grizzlies and the Mississippi State Bulldogs, spends weekends fishing at Lake Crystal, and
    volunteers as a coach for the Crystal Springs Youth Soccer league.
  arts: David Jackson immerses themselves in blues and gospel music, regularly playing B.B. King's 'The Thrill Is Gone' and Mahalia Jackson's 'How I Got Over' on guitar, attending live shows at the local
    blues club featuring artists like Gary Clark Jr., and they collect vinyl records from Muddy Waters.
  travel: David Jackson prefers short road trips that balance adventure with relaxation, having explored the Great Smoky Mountains, a weekend getaway to New Orleans for its jazz scene, and planning to visit
    Asheville's Blue Ridge Parkway before saving for a longer cruise to the Caribbean.
  culinary: David Jackson loves cooking Southern comfort dishes, perfecting fried catfish with cornmeal coating, slow‑cooked collard greens seasoned with smoked turkey, buttery cornbread, and experimenting
    with hot sauce blends that include cayenne, garlic, and vinegar.
  core: David Jackson is a practical, community‑oriented handyman‑in‑training whose love for music, cooking, and fishing balances a structured work ethic with a laid‑back approach to life, even as anxiety
    and occasional procrastination keep them on their toes.
background:
  cultural: David’s cultural background is rooted in the African‑American community of the Mississippi Delta. He grew up immersed in Southern traditions—church life, gospel and blues music, and family gatherings
    centered around home‑cooked meals. The legacy of civil‑rights activism in Hinds County, along with the close‑knit support of extended family and neighbors, informs his values of resilience, community
    solidarity, and respect for elders. While honoring these traditions, David also engages with contemporary digital media and modern music, creating a blended identity that respects his heritage while
    pursuing personal growth.
