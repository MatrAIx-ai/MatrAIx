  professional: Chong So, an aspiring junior game developer, channels a methodical curiosity and love for art into crafting simple interactive adventures on Scratch, and they meticulously plan each level
    and debug with a patience uncommon for a seven‑year‑old.
  sports: Chong So enjoys the quiet rhythm of swimming at the local Augusta community pool and watches the Atlanta Braves on game nights, prefers solo backyard catch and basic soccer drills with a nearby
    youth club on weekends, and they often cheer on the local high school basketball team from the comfort of the bleachers.
  arts: Chong So, a meticulous young artist, splits time between mastering traditional calligraphy with ink brushes and drawing Western superhero comics, idolizing creators such as Osamu Tezuka and Stan
    Lee, and they spend evenings sketching in a quiet corner while listening to gentle piano pieces they can play.
  travel: Chong So’s travel scrapbook records trips to the family’s hometown during Lunar New Year celebrations, weekend hikes along the Savannah River State Park trails, and a recent family vacation to
    Disney World, where they favored meticulously planned itineraries that balanced thrilling rides with quiet rest periods.
  culinary: Chong So delights in the aromatic blend of soy sauce, ginger, and garlic in homemade fried rice, enjoys the sweet tang of peach cobbler, and they can carefully follow a simple pancake recipe,
    yet often forgets to eat vegetables, preferring the crunchy texture of seaweed snacks.
  core: Chong So is an introspective seven‑year‑old whose disciplined curiosity fuels a love for sketching, coding, and quiet exploration, and they are both deeply empathetic and prone to anxiety whenever
    routines are disrupted.
