  career_goals: Over the next few years Dusty aims to move into a foreman role, obtaining an OSHA Trainer certification and an associate’s degree in construction management. He wants to be recognized for
    leading the safest and most efficient crew on site. In the longer term, he hopes to launch a boutique contracting firm that specializes in historic‑building restoration and custom woodworking, allowing
    him to merge his construction expertise with his love of art and design. He also plans to reduce his physical workload as he approaches retirement by transitioning into a safety officer or trainer position
    where he can share his knowledge with younger workers.
