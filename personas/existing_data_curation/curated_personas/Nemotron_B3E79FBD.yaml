  career_goals: Cristina aims to transition from a high‑performing individual contributor to a sales leadership role within the next three to five years. She envisions becoming a regional sales manager
    or director, where she can mentor a team of representatives, design scalable sales processes, and drive revenue growth for a technology‑focused services company. She also aspires to deepen her expertise
    in SaaS solutions for small‑to‑mid‑size businesses, obtain a professional sales certification (e.g., Certified Inside Sales Professional), and eventually launch her own consulting practice that helps
    Latin‑American entrepreneurs expand into the U.S. market.
