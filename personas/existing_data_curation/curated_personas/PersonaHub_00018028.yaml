persona_description: A geologist with expertise in the study of tectonic plate interactions and the dynamics of mountain building. The individual is particularly interested in the study of the Main Frontal
  Thrust (MFT) in the Himalayan region and its associated fault splays. They are skilled in the use of seismic reflection techniques to study the geometry and kinematics of the faults, and have experience
  in acquiring high-resolution seismic profiles across the fault tip. The individual is also knowledgeable in paleoseismic studies and has a deep understanding of the potential for large earthquakes in
  the region. They are well-versed in the use of portable seismic instruments, such as the Vibroseis equipment, for acquiring deeper images and faster acquisition times. The persona is highly motivated
  and passionate about understanding the dynamics of the Himalayan orogeny and the potential for large earthquakes in the region.
