personas:
  professional: Teah Smolik, a senior full‑stack software developer turning toward a lead architect role, leverages 25 years of expertise in Python, Java, C++, and JavaScript to craft cloud‑native micro‑services
    while infusing each project with the same imaginative curiosity that powers her watercolor and generative art experiments, and she is renowned for translating abstract user stories into elegant UI/UX
    designs, championing inclusive Agile squads, and mentoring junior engineers with a gentle yet detail‑oriented approach.
  sports: Teah Smolik is an avid hiker who explores the Cascade trails with a local outdoor club, roots for the Seattle Seahawks and the Portland Trail Blazers, participates in seasonal 5K charity runs,
    and blends a disciplined weekly yoga routine with occasional weekend kayaking to maintain fitness and mental clarity.
  arts: Teah Smolik blends watercolors, digital illustration, and self‑written generative art algorithms to create immersive visual narratives, draws inspiration from James Turrell, Yayoi Kusama, and speculative
    fiction writers like Ted Chiang, volunteers at a community art studio, and regularly attends indie film screenings and gallery openings with her spouse, often quoting favorite lines from directors such
    as Wes Anderson.
  travel: Teah Smolik meticulously plans weekend getaways to the Oregon coast and summer trips to Kyoto’s temple gardens, balances her wanderlust with professional responsibilities by booking off‑season
    flights to Iceland for aurora watching, and dreams of a future immersive VR art residency in New Zealand while budgeting travel expenses through a dedicated savings account.
  culinary: Teah Smolik enjoys cooking farm‑to‑table meals featuring cedar‑plank grilled salmon, foraged mushroom risotto, and matcha‑infused desserts, experiments with plating that echoes her generative
    art aesthetic, keeps a well‑stocked pantry of rosemary, thyme, and artisanal miso, and often pairs her dishes with locally roasted coffee and a glass of Pinot Noir.
  core: Teah Smolik is a curious technologist‑artist who channels endless imagination into code and canvases while battling occasional worry with yoga, mindful meditation, and a steady stream of watercolor
    brushes.
background:
  cultural: Teah grew up in a middle‑class suburban environment in the Pacific Northwest, shaped by the region’s blend of tech‑forward mindset and deep appreciation for nature. Her family’s European ancestry
    (mostly German and Irish) instilled values of hard work, community, and an appreciation for cultural traditions, which she celebrates through holiday gatherings and folk music. Living in Bellevue, she
    embraces the multicultural fabric of the area, participating in local tech meet‑ups, environmental volunteer groups, and art festivals. Her cultural outlook combines progressive, inclusive attitudes
    with a strong sense of individual responsibility and a love for outdoor recreation.
