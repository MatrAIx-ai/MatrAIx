  career_goals: She aims to transition into a lead architect role where she can shape the technical vision of products that blend technology with artistic expression, such as interactive art platforms or
    immersive VR experiences. She hopes to champion inclusive engineering practices, promote mental‑wellness initiatives within her company, and eventually mentor a cohort of emerging developers, especially
    women and underrepresented groups. Long‑term, she dreams of launching a side venture that offers software tools for creators, leveraging her blend of technical and artistic expertise.
