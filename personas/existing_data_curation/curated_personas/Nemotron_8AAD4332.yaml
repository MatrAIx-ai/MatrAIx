  hobbies: '[''Watercolor painting'', ''Visiting contemporary art galleries'', ''Reading science-fiction and philosophy'', ''Playing chess'', ''Amateur astronomy'', ''Cooking fusion South Asian cuisine'',
    ''Volunteering to teach bookkeeping'', ''Model building'']'
  career_goals: Although approaching traditional retirement age, Kapil aims to leverage his decades of experience to transition into a senior advisory role. He plans to obtain his CPA designation, if not
    already held, and to lead financial-literacy workshops for South Asian immigrant entrepreneurs in Montgomery County. He also aspires to mentor junior accountants through a local community college partnership
    and to author a practical guide on small-business bookkeeping that blends his analytical rigor with his creative storytelling. Additionally, he hopes to consult part‑time for non‑profits, applying his
    competitive drive to improve their financial health.
