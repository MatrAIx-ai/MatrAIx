personas:
  professional: Myesha Leverett blends rigorous project management with a creative eye, delivering interior design solutions that fuse historic preservation with sustainable practices by leveraging AutoCAD,
    SketchUp, and Revit to craft detailed plans, coordinating budgets and timelines with a methodical checklist, and mentoring junior designers while steering client meetings with confident, compassionate
    professionalism.
  sports: Myesha Leverett enjoys a blend of low‑impact fitness and community spirit, attending weekly yoga classes at the Riverfront Gardens, participating in a local 5K run organized by the Louisville
    YMCA Running Club each spring, and cheering on the Louisville Bats during summer weekends while also following the Louisville Cardinals basketball team.
  arts: Myesha Leverett immerses themselves in Louisville’s cultural pulse, frequenting the Speed Art Museum to study works by Henri Matisse, catching live jazz nights at the Brown Hotel’s Blue Dog Lounge
    featuring performances by John Coltrane tributes, and rooting for the Actors’ Theatre of Louisville’s annual Humana Festival, all of which inform their design narratives.
  travel: Myesha Leverett plans trips with a designer’s eye for detail, compiling color‑coded itineraries for culturally rich cities like New Orleans, Savannah, and Kyoto, balancing structured museum tours
    with spontaneous street‑food explorations, and fitting weekend getaways to Indianapolis and Asheville into a busy schedule while saving diligently for a future European design tour.
  culinary: Myesha Leverett delights in cooking soulful Southern fare, mastering shrimp and grits with fresh Gulf shrimp, collard greens simmered with smoked turkey, and sweet potato pie spiced with nutmeg
    and cinnamon, while experimenting with reclaimed herbs like thyme and rosemary from their garden and occasionally over‑seasoning with cayenne, a habit they joke about during potluck gatherings.
  core: Myesha Leverett is a meticulous yet vibrant interior designer who orchestrates sustainable, historically mindful spaces, balances disciplined budgeting with spontaneous artistic indulgences, and
    navigates health, fitness, and culture with a structured, socially energized approach.
background:
  cultural: Myesha is a Black woman rooted in Louisville’s vibrant African‑American community, drawing inspiration from the city’s historic Black neighborhoods such as Portland and Russell. Her upbringing
    was shaped by church gatherings, family storytelling, and Southern culinary traditions, all of which inform her design sensibility. She celebrates Black culture through the use of African textiles,
    bold yet warm color palettes, and by honoring the narratives of local heritage in her projects. Myesha also actively participates in cultural festivals and supports initiatives that preserve and uplift
    Black history and arts within the region.
attributes:
  skills: '[''Space planning'', ''Color theory'', ''AutoCAD'', ''SketchUp'', ''Revit'', ''Project management'', ''Budgeting and cost estimation'', ''Client consultation'', ''Material sourcing'', ''Sustainable
    design'', ''Historic preservation'', ''Team leadership'', ''Presentation and visualization'', ''Supply chain coordination'', ''Building code compliance'']'
  hobbies: '[''Afro‑Caribbean dance'', ''Yoga'', ''DIY home décor projects'', ''Attending art gallery openings'', ''Gardening'', ''Cooking Southern and soul food'', ''Traveling to historic cities'', ''Volunteering
    with Habitat for Humanity'', ''Reading contemporary fiction'', ''Participating in local book clubs'', ''Running in community 5K events'', ''Visiting jazz clubs'', ''Attending design conferences'']'
  career_goals: Myesha aims to become a senior design manager within the next three years and to earn her NCIDQ certification to solidify her professional credibility. She envisions launching her own boutique
    interior design firm that specializes in culturally resonant, sustainable projects for Louisville's historic neighborhoods and community spaces. Long‑term, she hopes to mentor emerging Black designers,
    collaborate with local museums and cultural institutions on exhibition design, and be recognized regionally for advancing inclusive, environmentally responsible interior design.
