  hobbies: '[''Badminton'', ''Indian classical dance (Bharatanatyam)'', ''Cooking Bengali cuisine'', ''Bullet journaling'', ''Guided mindfulness meditation'', ''Volunteering at cultural festivals'', ''Listening
