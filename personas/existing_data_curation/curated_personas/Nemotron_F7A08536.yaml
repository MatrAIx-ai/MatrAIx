  career_goals: She aims to earn a scholarship for a pre‑medicine track and eventually become a pediatrician, attracted by the blend of systematic study, clear career milestones, and the chance to help
    children. As a pragmatic step, she also plans to obtain a certified nursing assistant (CNA) credential after high school to gain healthcare experience and financial stability. Long‑term, she hopes to
    lead community health outreach programs that combine her organizational talent with her desire to give back to the South‑Asian community in New Jersey.
