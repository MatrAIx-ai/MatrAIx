  hobbies: '[''Community theater'', ''Church choir'', ''Potluck gatherings'', ''Gardening'', ''Baking'', ''Knitting'', ''Dog walking'', ''Volunteer work'', ''Reading romance novels'', ''Classic movies'']'
  career_goals: Judith aims to advance into a supervisory or lead housekeeper role for a larger facility such as a hotel, hospital, or corporate office, where she can apply her organizational skills on
    a broader scale. She is also interested in earning a certification in hospitality management and possibly enrolling in a community college business program to launch her own residential cleaning service.
    Her long‑term ambition is to achieve financial stability for her family, become a mentor for younger workers, and eventually transition to a role that balances work with more community involvement.
