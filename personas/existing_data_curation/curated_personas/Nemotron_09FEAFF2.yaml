personas:
  professional: Ricardo Cosme, a 41‑year‑old metal fabricator and CNC specialist, leverages their meticulous attention to detail, bilingual communication skills, and innate compassion to streamline production
    lines, mentor new hires, and champion safety‑first protocols on the shop floor.
  sports: Ricardo Cosme, a soccer enthusiast who captains a mid‑season team in the Utah Valley Soccer Club and an avid mountain‑bike rider on Wasatch Trailhead paths, follows Real Salt Lake with fervor,
    slots in weekly fitness sessions after work, and treats each weekend ride as a mental reset despite occasional knee soreness from the sport.
  arts: Ricardo Cosme, a dedicated painter and photographer, draws inspiration from Georgia O’Keeffe’s desert palettes and Frida Kahlo’s folk motifs, frequently showcases their work at local community art
    fairs, and unwinds by listening to Andrés Calamaro and John Mayer while editing black‑and‑white mountain‑scene shots.
  travel: Ricardo Cosme plans trips with meticulous itineraries, favoring active adventures like hiking the Narrows in Zion and biking around Lake Tahoe while also carving out relaxing stays at a beachfront
    bungalow in Tulum, and dreams of exploring the historic streets of Oaxaca and the cherry blossoms of Kyoto on future sabbaticals.
  culinary: Ricardo Cosme, an enthusiastic home chef, expertly prepares a hearty pork‑shoulder stew with plantains and black beans reminiscent of family recipes, whips up crispy baleadas stuffed with refried
    beans, cheese, and avocado, and frequently experiments with spice blends while occasionally indulging in upscale sushi rolls at local restaurants when time permits.
  core: Ricardo Cosme blends a methodical craftsperson’s precision with a vibrant artist’s curiosity, juggling metalwork, painting, and community mentorship while habitually forgetting to water houseplants
    before sprinting to the next soccer match.
background:
  cultural: Ricardo was raised in a Honduran household that emphasized close family ties, respect for elders, and a strong work ethic rooted in the concept of "trabajo duro." Bilingual from childhood, he
    maintains fluency in Spanish, which connects him to the vibrant Honduran diaspora in Utah and allows him to serve as a cultural bridge in his workplace and community. Traditional celebrations such as
    Semana Santa and Honduran Independence Day remain important, and he frequently participates in local festivals that feature punta music, folk dance, and artesanal crafts. This cultural foundation nurtured
    his compassion, collaborative spirit, and appreciation for art, influencing both his professional approach and his commitment to community service.
attributes:
  skills: '[''Metal fabrication'', ''CNC machining'', ''MIG/TIG welding'', ''Blueprint reading'', ''Quality inspection'', ''Safety compliance'', ''Inventory management'', ''Team leadership'', ''Bilingual
    communication (Spanish/English)'', ''Problem solving'', ''Process improvement'']'
  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Hiking'', ''Mountain biking'', ''Soccer'', ''DIY woodworking'', ''Model kit building'', ''Cooking Honduran cuisine'', ''Volunteering at community
    shelters'', ''Mentoring youth in fabrication'', ''Attending maker fairs'', ''Participating in local cultural festivals'']'
  career_goals: Ricardo aims to advance to a supervisory or lead‑fabricator role within the next three years, obtaining an AWS welding certification and a Lean Six Sigma Yellow Belt to bolster his credentials.
    He envisions leading a cross‑functional team that produces custom metal art installations for community spaces, merging his technical expertise with his love for art. Long‑term, he hopes to open a small
    community workshop in West Valley City where he can mentor at‑risk youth, provide apprenticeship opportunities, and collaborate on charitable projects such as Habitat for Humanity builds. His career
    ambitions are driven by a desire to create tangible value while fostering harmony and skill development in his community.
