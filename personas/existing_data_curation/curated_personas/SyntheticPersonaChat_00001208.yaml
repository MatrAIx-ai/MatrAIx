    User 1: Thanks! I think so too.


    User 2: So, what do you do for fun?


    User 1: I like to eat Chinese food, watch movies, and go to the movies.


    User 2: Chinese food is my favorite! What kind of movies do you like to watch?


    User 1: I like to watch all kinds of movies, but I especially like action movies and comedies.


    User 2: Me too! I love action movies and comedies.


    User 1: So, what do you do for fun?


    User 2: I like to draw, write, and play with my cat.


    User 1: Your cat''s name is Leroy Jenkins? That''s a great name!


    User 2: Thanks! I think so too.


    User 1: So, what do you want to be when you grow up?


    User 2: I want to be a cartoonist.


    User 1: That''s a great goal! I''m sure you''ll achieve it.


    User 2: Thanks! I hope so.


    User 1: I''m sure you will.


    User 2: Thanks!


