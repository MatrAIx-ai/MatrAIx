personas:
  professional: Ramsey Doan, a senior construction manager with expertise in BIM integration, cost control, and sustainable design, leverages a curiosity‑driven yet laid‑back style—favoring flexible problem‑solving
    over rigid planning—to deliver mixed‑use projects on time, sometimes apologizing for their occasional disorganization.
  sports: Ramsey Doan, an avid golfer at Belle Meade Golf Club and casual fan of the Nashville Predators and Tennessee Titans, mixes seasonal hikes with weekly bowling nights, balancing competitive swings
    on the fairway with a laid‑back loyalty to local teams.
  arts: Ramsey Doan, a passionate architectural photographer who captures historic Nashville storefronts and Smoky Mountain vistas, regularly immerses themselves in live shows ranging from classic rock
    icons like "Led Zeppelin" on vinyl to country stars such as "Chris Stapleton" at the CMA Music Festival, and draws creative inspiration for their woodworking projects.
  travel: Ramsey Doan prefers spur‑of‑the‑moment road trips that blend outdoor adventure and culinary stops, having hiked the Appalachian Trail in North Carolina, sampled BBQ in Austin, and dreaming of
    a future trip to Kyoto's bamboo forests, yet their loosely organized planning often results in last‑minute itinerary changes.
  culinary: Ramsey Doan, a self‑taught pitmaster, regularly cooks smoked pork shoulder with a hickory‑infused apple‑cider glaze, pairs it with collard greens and baked beans, and experiments with rubs featuring
    brown sugar, paprika, and coffee grounds to impress family gatherings.
  core: Ramsey Doan blends a competitive, curiosity‑driven mind with a relaxed, sometimes chaotic lifestyle, turning late‑night design brainstorms into handcrafted furniture while juggling ambitious career
    goals and an ever‑growing toolbox.
background:
  cultural: Ramsey grew up in middle‑class, middle‑TN neighborhoods where Southern hospitality, community involvement, and a strong work ethic were emphasized. He regularly attended a local church and participated
    in regional volunteer events, reinforcing a sense of close‑knit community. His upbringing immersed him in Appalachian cultural threads—such as folk music, storytelling, and outdoor recreation—while
    also exposing him to modern business ideals through his family's emphasis on education and entrepreneurship. This blend of traditional Southern values and forward‑looking curiosity shapes his worldview,
    allowing him to honor local customs like cooking and music while actively seeking innovative approaches in his professional life.
