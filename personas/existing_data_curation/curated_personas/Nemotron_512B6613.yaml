  career_goals: Even at three, Michael frequently talks about wanting to become a builder or a firefighter when he grows up, attracted by the hands‑on nature of construction and the routine of emergency
    response. He imagines leading a team of workers to construct houses and keep his community safe. His competitive side also fuels a dream of becoming a professional soccer player, reflecting his love
    for energetic group activities. These ambitions blend his practical interests, desire for routine, and drive to be recognized for personal achievements.
