  career_goals: Nelson aims to advance to a regional director position where he can oversee multiple clinics and expand culturally competent care for the growing Latino population in Prince William County.
    He is driven to launch a pilot telehealth program that connects underserved neighborhoods with specialty providers, leveraging his practical curiosity about new technologies. Recognizing the value of
    formal credentials, he plans to earn the Certified Medical Manager (CMM) credential and complete an associate degree in health administration, despite his spontaneous learning style. He also seeks to
    mentor emerging managers from immigrant backgrounds, sharing both his operational expertise and his cultural perspective. Ultimately, Nelson envisions transitioning to a consultancy role that helps
    small healthcare facilities improve efficiency while preserving patient-centered values, leaving a lasting legacy of improved health outcomes for his community.
