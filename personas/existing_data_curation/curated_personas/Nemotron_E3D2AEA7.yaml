personas:
  professional: Dylan Himburg is a budding visual storyteller who blends photography, hand‑drawn illustration, and acoustic music to create community‑focused branding, leveraging his organized event‑planning
    skills and outgoing leadership to coordinate local art initiatives while self‑learning graphic design tools.
  sports: Dylan Himburg is an enthusiastic supporter of the Winnsboro High Wildcats football team and the LSU Tigers, enjoys weekend fishing at Lake Bawcombs, and occasionally plays pick‑up basketball at
    the community center, balancing his love for outdoor recreation with a disciplined routine that includes a weekly jog through the local pine forests.
  arts: Dylan Himburg immerses himself in creative pursuits, drawing inspiration from Ansel Adams’ black‑and‑white landscapes, the zydeco rhythms of Clifton Chenier, classic rock icons like The Rolling
    Stones, and local folk theater, while actively crafting hand‑stitched woodwork and curating a social media page that showcases regional murals and independent artists.
  travel: Dylan Himburg’s travel style blends careful budgeting with a thirst for cultural immersion, having explored New Orleans’ French Quarter, the bayous of Lafayette, and a weekend road trip to the
    Great Smoky Mountains, while dreaming of a spring art‑focused pilgrimage to Paris and a summer camping expedition in the Ozarks.
  culinary: Dylan Himburg’s palate favors Southern comfort foods such as shrimp po’boys, gumbo, blackened catfish caught on his own lakes, and homemade pecan pie, and he enjoys experimenting with smoked
    paprika, fresh okra, and wild herbs in his modest kitchen, though he often skips breakfast for a quick coffee before school.
  core: Dylan Himburg is a curiosity‑driven, organized teen who juggles photography, guitar, and community event planning, while habitually over‑committing to projects and occasionally splurging on vintage
    records.
background:
  cultural: Dylan was raised in a white, Southern, rural family in Winnsboro, Louisiana, where community and church life play central roles. His grandparents were small‑scale farmers, and family gatherings
    often revolve around home‑cooked meals featuring traditional Southern dishes such as gumbo, fried catfish, and biscuits. He grew up attending a local Baptist church, where youth ministries fostered
    his sociable and cooperative nature. The town’s cultural fabric includes a blend of country music, zydeco rhythms, and local folk festivals, which have shaped his appreciation for varied artistic expressions.
    Emphasis on self‑reliance, neighborhood support, and respect for regional heritage informs his outlook and aspirations.
attributes:
  skills: '["Digital Photography", "Sketching and Illustration", "Basic Graphic Design (Adobe Photoshop)", "Event Planning and Coordination", "Public Speaking", "Team Leadership", "Basic Woodworking", "Social
