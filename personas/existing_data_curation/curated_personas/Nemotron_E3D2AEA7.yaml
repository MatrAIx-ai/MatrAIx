  hobbies: '["Sketching and Drawing", "Digital Photography", "Playing Acoustic Guitar", "Attending High‑School Sports Events", "Fishing and Outdoor Activities", "Volunteering at the Community Library",
    "Woodworking Projects", "Youth Theater Participation", "Video Editing and YouTube Content Creation"]'
  career_goals: Dylan aims to first obtain his GED and then enroll in a community college program focused on visual arts or communications. He plans to earn an associate degree in graphic design or multimedia
    production while completing a short‑term apprenticeship in carpentry to deepen his hands‑on craftsmanship. His long‑term ambition is to work as a junior visual designer for a regional business or start
    a freelance studio that creates branding and marketing materials for local enterprises and community events. He also hopes to become a cultural‑heritage coordinator for Winnsboro, designing public murals
    and organizing arts festivals that celebrate the town’s rural Southern traditions.
