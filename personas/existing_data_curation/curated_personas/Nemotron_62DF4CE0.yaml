  career_goals: Nelly aims to transition into a senior supervisory role where she can mentor younger social workers and institutionalize routine-driven service models that reduce stress for both staff and
    clients. She is passionate about launching a community outreach program focused on elder Hispanic populations in Chicago, seeking grant funding to create a dedicated senior services hub. Over the next
    few years, she hopes to influence local policy on immigrant senior care while gradually scaling back her workload to maintain personal wellbeing.
