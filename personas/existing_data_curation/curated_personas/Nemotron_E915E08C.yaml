personas:
  professional: Alejandra Berube is a full‑stack software engineer who leverages Python, Java, React, and AWS to build scalable cloud‑native services, applies rigorous Agile Scrum discipline, and relentlessly
    refactors code for efficiency while mentoring peers through open‑source contributions.
  sports: Alejandra Berube hits the Long Island Pine Barrens trails for weekend hikes, supports the New York Knicks and Yankees, plays in a co‑ed recreational soccer league on Saturdays, and follows the
    US Open tennis tournament with keen analytical commentary.
  arts: Alejandra Berube immerses themselves in indie video games like Celeste, captures urban sunrise shots with a Fujifilm X‑T4, reads contemporary sci‑fi titles such as The Ministry for the Future, and
    curates playlists featuring Grimes, Mitski, and experimental jazz pianist Tigran Hamasyan.
  travel: Alejandra Berube favors meticulously planned short‑haul trips, having backpacked through the Blue Ridge Parkway, explored the street art of Berlin, and dreamed of a solo winter getaway to Reykjavik
    while balancing a modest travel budget and a growing professional network.
  culinary: Alejandra Berube enjoys experimenting with quick, high‑protein dishes like miso‑glazed cod with quinoa, perfecting the balance of spice in homemade shakshuka, and frequently tweaks recipes using
    sous‑vide precision to save time after long coding sessions.
  core: Alejandra Berube blends analytical rigor with solitary creativity, channeling competitive drive into code, cooking, and puzzle‑solving while maintaining a quietly ambitious, methodical, and occasionally
    skeptical outlook on life.
background:
  cultural: Alejandra comes from a multicultural family that blends French‑Canadian and Hispanic roots. Her surname, Berube, traces back to Acadian ancestors who settled in the Northeastern United States,
    while her first name reflects her mother's Mexican heritage. Raised in a suburban community in Carle Place, NY, she grew up speaking English and conversational Spanish, celebrating both Thanksgiving
    and Día de los Muertos with her extended family. This mix of cultural influences fostered an appreciation for disciplined work ethic, respect for education, and a balanced view of individual achievement
    and family cohesion. The diverse environment of Nassau County exposed her to a variety of traditions and perspectives, shaping her pragmatic yet curious outlook on life.
