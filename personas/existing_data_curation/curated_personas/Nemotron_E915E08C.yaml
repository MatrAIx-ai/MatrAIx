  hobbies: '[''Reading science‑fiction novels'', ''Solving puzzles (Sudoku, chess)'', ''Hiking local trails'', ''Yoga and mindfulness practice'', ''Cooking experimental recipes'', ''Photography of urban
    and natural scenes'', ''Playing indie video games with a small group of friends'', ''Attending women‑in‑tech meetups'', ''Contributing to open‑source projects as a hobby'', ''Listening to tech podcasts'']'
  career_goals: Alejandra aims to advance from her current software engineering role to a senior engineer within the next three years, focusing on cloud‑native architecture and large‑scale data processing.
    She plans to earn the AWS Certified Solutions Architect – Professional certification and deepen her expertise in DevOps practices. Over the longer term, she aspires to become a technical lead or engineering
    manager, guiding small, high‑performing teams to deliver robust products. She is also interested in launching a side venture that leverages AI to help local small‑business owners automate inventory
    management, combining her curiosity for emerging technologies with practical business value. Throughout her career, she intends to mentor other women in tech and contribute to open‑source projects that
    align with her competitive drive for excellence.
