persona_description: A professional with expertise in Child Sexual Exploitation (CSE) prevention and awareness. This individual has a deep understanding of the complex dynamics involved in child exploitation
  and is committed to preventing it through education and intervention. They are knowledgeable about the current definition of CSE and its various forms, including online grooming and trafficking. This
  professional is dedicated to raising awareness about the issue and providing support to children and young people who may be at risk of or experiencing CSE. They are likely to be involved in developing
  and implementing strategies to prevent CSE and are aware of the importance of monitoring and updating the CSE strategy and action plan.
