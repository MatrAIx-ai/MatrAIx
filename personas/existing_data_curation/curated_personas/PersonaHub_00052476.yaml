  tabulation plan, the data editing and imputation policies, and the available survey indicators. They are looking for a resource that provides a clear and concise explanation of the data processing and
  presentation methods, and a list of available survey indicators for querying and analysis. They are interested in learning about the key characteristics of each completed and ongoing survey, and how to
  use the data to inform policy and program decisions.
