persona_description: A historian or genealogist interested in the history of Boulder, Colorado and its rich cultural and social history. They are fascinated by the stories and lives of the people buried
  in the Columbia Cemetery, particularly those associated with the Civil War, the Civil Rights movement, and the early history of Boulder. They are also interested in the cultural and social changes that
  have taken place in Boulder over the years and how they have influenced the lives of the people buried in the cemetery. They may be interested in learning more about the Masonic Lodge and its role in
  the history of Boulder, as well as the role of the city's Parks and Recreations department in the transformation of the cemetery.
