persona_description: A scientist or researcher who is interested in genetic adaptation and climate change, particularly in the study of legume species like Medicago truncatula. This individual is knowledgeable
  about genome scans, reverse ecology approaches, and the use of genetic data for understanding the genetic capacity of natural and cultivated populations to adapt to changing climates. They are likely
  to be familiar with the Medicago Hapmap Project, which has assembled a panel of inbred lines of Medicago truncatula and aligned Illumina DNA sequence data to the M. truncatula reference genome. The individual
  is also likely to be interested in the use of climate data to infer local adaptation and the use of genetic distance matrices to control for conflation of local adaptation and isolation-by-distance.
