personas:
  professional: Lizbeth Mantilla is a retired community organizer who now channels her bilingual communication and gardening expertise into coordinating weekly cooking classes for seniors at the New Haven
    community center, blending structured lesson plans with a relaxed, improvisational style.
  sports: Lizbeth Mantilla enjoys daily walks along the New Haven shoreline as part of the Senior Shoreline Walking Club, occasionally joins the local recreation center’s low‑impact aqua‑fit class, and
    cheers for the Connecticut Huskies football team on weekends.
  arts: Lizbeth Mantilla regularly attends salsa and pasillo dance evenings at the community hall, where she often practices steps taught by local musician Carlos Rivera, and she frequently listens to folk
    guitarist Mercedes Sosa while knitting scarves for her grandchildren.
  travel: Lizbeth Mantilla prefers weekend getaways to historic coastal towns like Mystic, Connecticut, and occasionally dreams of visiting the colonial streets of Cartagena, balancing a modest travel budget
    with a love for exploring places that echo her family's Mediterranean influences.
  culinary: Lizbeth Mantilla delights in preparing bold dishes such as ceviche with fresh lime and cilantro, hearty fanesca soup brimming with beans and corn, and inventive tomato‑basil pesto that she serves
    at her community potlucks, showcasing her knack for adapting traditional recipes with garden‑grown herbs.
  core: Lizbeth Mantilla is a garden‑loving, dance‑enthusiastic community mentor who meticulously plans her cooking classes but often misplaces her knitting needles and forgets to pay a few small bills.
background:
  cultural: Lizbeth was born and raised in the highland city of Cuenca, Ecuador, where she grew up immersed in Andean customs, Catholic traditions, and a strong sense of family reciprocity. She carries
    the flavors of her childhood—such as ceviche, llapingachos, and fanesca—into her daily life in New Haven, often preparing them for community gatherings. Her fluency in Spanish and deep knowledge of
    Ecuadorian folklore enable her to serve as a cultural bridge for newer immigrants. She celebrates traditional festivals like Carnaval and Día de los Difuntos with music, dance, and altar offerings,
    adapting them to her American setting while preserving their original meaning. The values of respect for elders, communal support, and resilience learned in Ecuador shape her interactions with neighbors
    and the broader multicultural tapestry of New Haven.
