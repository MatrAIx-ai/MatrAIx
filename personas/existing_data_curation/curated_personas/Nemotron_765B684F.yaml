  hobbies: '[''Rooftop gardening'', ''Traditional cooking and recipe sharing'', ''Reading historical novels and biographies'', ''Salsa and pasillo dancing'', ''Knitting and crafts'', ''Spanish conversation
    circles'', ''Walking along the shoreline'', ''Volunteer work at food pantry and senior center'', ''Attending church services'']'
  career_goals: Although retired from the formal workforce, Lizbeth aims to remain an active contributor to her community. She plans to launch a weekly cooking class at the New Haven community center, teaching
    both Ecuadorian recipes and healthy cooking techniques to seniors and young families. She also hopes to compile a family recipe book, preserving her heritage for future generations and potentially publishing
    it as a community project. Lizbeth is motivated to deepen her digital skills, especially using social media to share cultural stories and connect with dispersed relatives. Volunteering as a health aide
    at a local senior facility is another ambition, where she can blend her caregiving experience with her desire to help others. Ultimately, she wishes to become a cultural ambassador, organizing annual
    Ecuadorian festivals that celebrate music, dance, and food within the multicultural fabric of New Haven.
