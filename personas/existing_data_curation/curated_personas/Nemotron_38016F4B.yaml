  career_goals: Andrew aims to transition into a principal architect role where he can shape technology strategy for large‑scale, user‑centric platforms. He aspires to lead interdisciplinary teams that
    blend software engineering with creative design, delivering innovative digital experiences. He plans to contribute to open‑source projects that focus on accessible UI/UX and ethical AI, and eventually
    mentor a cohort of junior developers from underrepresented backgrounds. In the long term, he envisions launching a boutique consultancy that helps cultural institutions digitize their collections and
    create immersive art‑tech installations, merging his technical expertise with his love for the arts.
