personas:
  professional: Andrew Bondoc is a senior full‑stack software developer with over three decades of experience in Python, Java, C++, and JavaScript, who excels at designing scalable cloud‑native architectures
    on AWS, Docker, and Kubernetes, and they now aim to transition into a principal architect role where their algorithmic rigor, keen UI/UX sense, and collaborative leadership shape user‑centric platforms
    that blend technology with creative design.
  sports: Andrew Bondoc incorporates daily Tai Chi and weekly hikes along the Palisades into their fitness regimen, cheers for the New York Yankees and Knicks, and they are an active member of the Hudson
    Valley Hiking Club, often joining group climbs and occasional weekend softball games with fellow enthusiasts.
  arts: Andrew Bondoc spends evenings painting watercolors of the city skyline, curates a photo series of urban murals inspired by the works of Banksy and Yayoi Kusama, attends contemporary art exhibitions
    featuring Anish Kapoor and Jeff Koons, and they relax to the improvisations of Miles Davis and the smooth rhythms of Bossa Nova.
  travel: Andrew Bondoc prefers meticulously planned weekend getaways to art‑rich destinations such as Kyoto, Barcelona, and Oaxaca, yet their demanding consulting schedule often limits travel to short
    trips within the Hudson Valley where they can capture local festivals with their camera and savor regional cuisine.
  culinary: Andrew Bondoc is an avid home chef who masterfully prepares adobo and the tangy tamarind‑based sinigang, frequently experimenting with fusion twists like adobo carbonara, and they relish the
    aromatic combination of ginger, garlic, and bay leaves that define their kitchen creations.
  core: Andrew Bondoc fuses a seasoned software architect’s precision with a watercolor‑stained imagination, navigating life through methodical curiosity, late‑night coding marathons, and the occasional
    habit of forgetting to water their indoor plants during debugging sessions.
background:
  cultural: Andrew is of Filipino descent, raised in a bicultural household that blended Tagalog traditions with American influences. His family emphasized communal values, respect for elders, and a strong
    commitment to education, reflecting typical Filipino diaspora traits. He grew up celebrating fiestas such as Sinulog and Pahiyas, savoring home‑cooked meals like adobo, lechon, and halo‑halo, and speaking
    both English and Tagalog at home. In Jersey City, he remains active in the Filipino‑American community, participating in cultural festivals, joining local Filipino clubs, and preserving his heritage
    while navigating the multicultural landscape of the New York metropolitan area.
