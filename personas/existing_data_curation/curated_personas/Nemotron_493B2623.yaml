  hobbies: '[''Cooking South Asian cuisine'', ''Group fitness classes (Zumba, yoga)'', ''Hiking and nature walks in Florida'', ''Beach volleyball'', ''Community volunteering (STEM outreach)'', ''Travel
    and cultural exploration'', ''Reading architecture and design magazines'', ''Gardening'', ''Participating in local cultural festivals'', ''Attending professional networking events'']'
  career_goals: Aarti aims to ascend to a senior executive position—such as Director of Engineering or Vice President of Architectural Services—where she can shape regional development projects that prioritize
    sustainability and resilient infrastructure. She is eager to champion digital transformation across design and construction workflows, integrating AI‑driven analytics and advanced BIM capabilities while
    ensuring clear ROI for her organization. Mentoring the next generation of engineers, especially women and underrepresented minorities, is a core ambition, as is eventually establishing her own boutique
    consultancy focused on eco‑friendly, community‑centred design solutions. Balancing her competitive drive with a desire for flexible, family‑friendly work structures, she seeks roles that allow strategic
    impact without sacrificing personal well‑being.
