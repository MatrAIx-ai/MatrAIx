personas:
  professional: Aarti Faiz, an architectural and engineering manager who leverages a solid business foundation and hands‑on technical oversight to steer large‑scale construction projects, blends rigorous
    budgeting and contract negotiation with a people‑focused, high‑energy leadership style that thrives on collaborative team dynamics, yet remains skeptical of stakeholder motives and pushes her teams
    with a competitive edge toward measurable performance metrics.
  sports: Aarti Faiz, an avid participant in Zumba and yoga classes, hikes the trails of Volusia County, plays in a co‑ed recreational volleyball league, and roots for the Orlando Magic, Tampa Bay Buccaneers,
    and Tampa Bay Rays while belonging to the Volusia County Hiking Club and the Sunshine State Zumba Squad.
  arts: Aarti Faiz, a devoted follower of contemporary architecture, draws inspiration from Zaha Hadid and Frank Gehry, enjoys the cinematic scores of A. R. Rahman and the choreography of Bollywood dance
    festivals, and regularly attends local art fairs featuring works by African‑American painters and community mural projects.
  travel: Aarti Faiz favors flexible, experience‑rich travel itineraries that blend cultural immersion and architectural sightseeing, having explored Barcelona’s Sagrada Familia, Dubai’s Burj Khalifa, Kyoto’s
    historic temples, and the coastal charm of Savannah, Georgia, while planning future trips to the ancient ruins of Petra and the tropical beaches of Costa Rica.
  culinary: Aarti Faiz delights in preparing fragrant butter chicken, chana masala, and rosemary‑infused lamb rogan josh for family gatherings, while experimenting with Thai green curry, Mexican mole poblano,
    and vegan quinoa bowls, favoring ingredients such as cumin, turmeric, lemongrass, chipotle pepper, and fresh cilantro.
  core: Aarti Faiz is a competitive, community‑oriented engineering leader who balances a love for spontaneous travel, vibrant cooking, and group fitness with a relaxed, occasionally disorganized approach
    to personal obligations.
background:
  cultural: Aarti was raised in a middle‑class Indian household where Hindi and English were spoken interchangeably, and family traditions such as Diwali, Holi, and regular communal meals were central to
    her upbringing. Though she now lives in Deland, FL, she maintains strong ties to her South Asian roots through regular cultural celebrations, cooking authentic dishes, and staying connected with an
    extended family network across the United States and India. Her marriage into a family with a multicultural surname (Faiz) adds a blend of influences, fostering an inclusive outlook that appreciates
    both Indian and broader South Asian customs while embracing the diversity of her Floridian community.
attributes:
  skills: '[''Project Management'', ''Construction Budgeting'', ''Contract Negotiation'', ''Team Leadership'', ''Stakeholder Communication'', ''Building Codes and Compliance'', ''Sustainable Design Principles'',
