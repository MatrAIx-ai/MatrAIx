personas:
  professional: Casey Hartness, a 71‑year‑old former school‑district office manager, leverages their associate’s degree in business administration and a lifetime of meticulous calendar management to orchestrate
    community events, senior‑center programs, and church activities with a precision that reflects their love of routine and reliability.
  sports: Casey Hartness keeps fit by walking the Cedar River Trail five times a week, participates in the Cedar Rapids senior walking club, enjoys watching the Iowa Hawkeyes football and the Iowa Cubs
    minor‑league baseball, and they occasionally join a shuffleboard league at the senior center, preferring low‑impact activities that they find fit a steady schedule.
  arts: Casey Hartness finds creative fulfillment in knitting and quilting while listening to the timeless crooners like Ella Fitzgerald and Andy Williams, attending local performances of the Cedar Rapids
    Community Theatre, and they admire Grant Wood’s Regionalist paintings, a blend of artistic appreciation that enriches their evenings after choir rehearsals.
  travel: Casey Hartness plans leisurely road trips to historic Midwestern sites such as the Amana Colonies and the National Mississippi River Museum, favors staying at family‑run B&Bs, schedules visits
    around church holidays, and dreams of a guided tour of Washington, D.C.’s Smithsonian museums, and they always pack a garden‑produce snack to keep the routine of home cooking alive.
  culinary: Casey Hartness excels at cooking classic Midwestern fare— they perfect pork chops with apple sauce, chicken pot pie with garden peas, and rhubarb crumble with fresh dill and thyme—while skillfully
    preserving family recipes in a handwritten cookbook, though they sometimes forget to turn off the oven after a long quilting session.
  core: Casey Hartness is a methodical septuagenarian who blends community stewardship, garden‑to‑table cooking, and a steadfast love of routine into a life of reliable service, and they are occasionally
    prone to oversights like delayed bill payments and missed flossing.
background:
  cultural: Casey grew up in a typical Midwestern small‑town setting in Iowa, where the cultural fabric is woven from a Protestant work ethic, agricultural roots, and a strong sense of community responsibility.
    Her family emphasized practicality, self‑reliance, and participation in local traditions such as county fairs, church gatherings, and neighborhood potlucks. These influences have shaped her values of
    reliability, routine, and modesty. Although she identifies as white American, she draws pride from the regional heritage of Cedar Rapids—its historic neighborhoods, the Mississippi River corridor, and
    the blend of German‑American and Scandinavian settler histories that are reflected in local customs and cuisine.
attributes:
  skills: '[''calendar management'', ''record keeping'', ''budgeting and finance'', ''community event planning'', ''gardening and horticulture'', ''volunteer coordination'', ''home maintenance'']'
  hobbies: '[''vegetable gardening'', ''knitting and quilting'', ''reading historical novels'', ''church choir'', ''volunteering at senior center'', ''walking along Cedar River Trail'', ''cooking Midwestern
    dishes'', ''attending Linn County fair'']'
  career_goals: Her primary ambition is to remain a dependable presence in her community while pursuing personal fulfillment. She aims to mentor younger volunteers at the senior center, expand her garden
    as an intergenerational teaching space, and contribute to the local historical society by preserving and documenting Cedar Rapids’ mid‑20th‑century heritage. She also seeks to maintain her health and
    independence through regular walking and continued learning, and she plans to complete a personal project of compiling family recipes into a small community cookbook.
