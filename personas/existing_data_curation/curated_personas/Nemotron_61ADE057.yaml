personas:
  professional: Kenneth Allison, a 1-year-old baby model who already delights photographers with a calm, predictable routine, occasionally misplaces their favorite plush toy in a slightly disorganized way,
    relies on their natural compassion to cooperate on set, and effortlessly stays organized by keeping other favorite items within reach.
  sports: Kenneth Allison, a 1-year-old who joins the Tiny Tots Gymnastics Club for weekly beginner classes but occasionally skips a session without distress, cheerfully watches the Chicago Cubs on TV,
    prefers quiet play over large crowds, yet enjoys occasional family outings to the local park where they try out soft‑ball tosses with a toddler‑friendly bat.
  arts: Kenneth Allison, a 1-year-old who loves listening to lullabies by Mozart and playful tunes from Sesame Street, often curls up with picture books illustrated by Eric Carle in quiet solitude, and
    delights in finger‑painting sessions that showcase their reserved yet compassionate nature.
  travel: Kenneth Allison, a 1-year-old who has already visited the family’s grandparents in the countryside, taken a week‑long road trip to the beachfront in Florida, and dreams of a future visit to Kyoto’s
    bamboo forest, prefers carefully planned short itineraries with familiar routines yet remains flexible enough to accommodate a spontaneous nap stop.
  culinary: Kenneth Allison, a 1-year-old who enjoys smooth pureed carrots, mashed sweet potatoes, and soft banana slices, has a particular fondness for avocado, consistently refuses peas, and while still
    learning self‑feeding, often makes a mess that they seem blissfully unconcerned about, adapting flexibly to any new texture offered.
  core: Kenneth Allison is a routine‑loving, compassionate 1‑year‑old who balances a relaxed, slightly disorganized approach to life with a gentle insistence on familiarity, often scattering toys in quiet
    solitude and sharing smiles with anyone who offers a soft blanket.
background:
  cultural: Kenneth is raised in a predominantly White, Midwestern American family in Grand Ledge, Michigan. The region’s cultural fabric emphasizes modesty, practicality, and community cohesion, shaped
    by a history of agriculture and small‑town values. Family life centers around home‑cooked meals, local church gatherings, and community fairs that celebrate seasonal traditions. His upbringing reflects
    a traditional outlook that values routine, self‑reliance, and cooperative relationships, fostering a compassionate and cooperative temperament. The cultural environment encourages modest ambition and
    a focus on contributing to family wellbeing and neighborhood harmony.
