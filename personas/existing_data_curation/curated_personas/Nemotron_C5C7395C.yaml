  hobbies: '["Reading fantasy and mystery novels", "Journaling and creative writing", "Sketching and watercolor painting", "Playing piano", "Scratch coding and introductory Python projects", "Hiking local
    trails in Utah", "Yoga and mindfulness meditation", "Volunteering at the animal shelter"]'
  career_goals: Anna hopes to pursue a career that bridges her love of science, animals, and helping people. In the short term she aims to graduate high school with strong grades in biology and math, and
    to earn a leadership badge in her Young Women program. Her medium-term ambition is to study biology or environmental science at a university, followed by veterinary school to become a wildlife veterinarian.
    Because of her own experiences with anxiety, she also dreams of creating teen-focused mental-health workshops that combine nature-based activities with coping-skill education, hoping to make a practical
    difference in her community.
