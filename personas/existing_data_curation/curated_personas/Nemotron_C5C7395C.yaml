personas:
  professional: Anna Halberg is a budding junior coder and self-published storyteller who blends her love of fantasy novels, daily journaling, and structured curiosity into creating Scratch games and Python
    scripts, while consistently practicing piano to sharpen discipline and volunteering at the animal shelter to develop empathy, reflecting a balance of practicality and imagination.
  sports: Anna Halberg enjoys weekend hikes through Utah's red canyons, is a member of a junior trail-blazing club, follows the Utah Jazz and Real Salt Lake avidly, and participates in middle school cross-country,
    preferring structured, small-group exercise that balances solitude with light competition.
  arts: Anna Halberg expresses creativity through watercolor landscapes of canyon vistas inspired by the works of Thomas Moran, sketches scenes from favorite fantasy novels, listens to piano pieces by Ludovico
    Einaudi and pop tracks from Billie Eilish while practicing, and attends local theater productions of classic plays, weaving visual and auditory arts into their identity.
  travel: Anna Halberg dreams of exploring the vibrant streets of Kyoto and the ancient ruins of Machu Picchu after savoring family trips to Zion and the Grand Canyon, favors meticulously planned itineraries
    with detailed notebooks, but sometimes hesitates to book solo adventures due to anxiety, blending curiosity with cautious preparation.
  culinary: Anna Halberg delights in homemade avocado toast topped with cherry tomatoes and feta, experiments with simple ramen broth infused with miso, and enjoys baking blueberry lemon muffins, yet often
    forgets to clean the kitchen after cooking, reflecting a love of flavor paired with a modestly messy habit.
  core: Anna Halberg is a quiet, curiosity-driven teen who channels intense anxiety into structured creativity—journal-keeping, watercolor painting, and coding—while occasionally letting the fear of imperfection
    cause procrastination and messy kitchen habits.
background:
  cultural: Anna was raised in a middle-class, predominantly White family in Orem, Utah County. The community is heavily influenced by the Church of Jesus Christ of Latter-day Saints, shaping values of
    family service, modesty, and self-reliance. She grew up attending Sunday services and participating in the Young Women program, where she learned leadership skills and community service. Orem's suburban
    setting near the Wasatch Mountains fostered a love of outdoor activities such as hiking and camping. Local traditions like Pioneer Day celebrations and the Utah County Fair reinforced a sense of regional
    heritage, while the emphasis on education and involvement in school clubs encouraged her curiosity and practical approach to learning.
attributes:
  skills: '["Research and information gathering", "Practical problem solving", "Organizational planning and time management", "Basic coding (Scratch and introductory Python)", "Creative writing and journaling",
