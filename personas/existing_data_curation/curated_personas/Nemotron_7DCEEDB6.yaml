  career_goals: Amanda hopes to combine her love for nature with her knack for digital storytelling. She aims to earn a degree in environmental science or wildlife biology and eventually work with the Arkansas
    Game and Fish Commission or a local conservation nonprofit, creating engaging multimedia content that educates her community about the region's ecosystems. In the short term, she plans to deepen her
    coding and photography skills, launch a nature blog, and participate in science fairs and 4-H projects.
