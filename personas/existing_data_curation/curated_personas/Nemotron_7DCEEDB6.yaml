personas:
  professional: Amanda Greeson, an aspiring junior game modder and wildlife illustrator, balances curiosity with practicality by channeling her love for Minecraft world‑building into structured school projects
    while sketching local wildlife for their 4‑H garden showcase.
  sports: Amanda Greeson enjoys hiking local trails with the 4‑H nature club, plays on their middle school soccer team during the fall, and roots for the Chicago Cubs and Chicago Bulls, balancing casual
    outdoor adventure with organized school sports.
  arts: Amanda Greeson creates whimsical TikTok videos set to songs by Taylor Swift and Luke Bryan, sketches wildlife scenes inspired by National Geographic, and devours fantasy novels by Brandon Sanderson
    and Neil Gaiman, weaving pop culture and literary imagination into a vibrant artistic identity.
  travel: Amanda Greeson favours spontaneous weekend getaways to nearby state parks like Shenandoah, dreams of backpacking through Yellowstone and canoeing on Lake Louise in Canada, and plans trips by scrolling
    TikTok travel reels rather than detailed itineraries, balancing curiosity with a relaxed approach to budgeting.
  culinary: Amanda Greeson loves pepperoni pizza and chicken nuggets, but also enjoys whipping up strawberry‑banana smoothies and beginner‑level spicy ramen with garlic and mango, showcasing a growing kitchen
    confidence that still relies on easy‑prep recipes and YouTube tutorials.
  core: Amanda Greeson is a curious yet laid‑back teen who blends virtual world‑building, wildlife art, and TikTok creativity into a quirky, sometimes disorganized, but passionately imaginative life.
background:
  cultural: Amanda grows up in Harrison, a small town in the foothills of the Ouachita Mountains of northern Arkansas. Her family's roots trace back several generations to settlers of English and German
    ancestry, and they embody typical Southern values such as hospitality, community involvement, and a strong work ethic. They attend a local Baptist church, participate in community events like the county
    fair and high-school football games, and cherish traditions of outdoor recreation, homemade cooking, and folk music. These cultural influences shape Amanda's respect for nature, her love of storytelling,
    and her desire to contribute positively to her close-knit community.
