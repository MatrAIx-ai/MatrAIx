  career_goals: Patrick aims to blend his curiosity for how things work with his desire for concrete, tangible outcomes. In the near future he plans to enroll in a technical high‑school program focused
    on engineering, then pursue a degree in marine or mechanical engineering at a state university. His long‑term ambition is to become a marine engineer designing sustainable watercraft, while also obtaining
    certifications as a lifeguard and rescue‑boat operator to serve his coastal community. He is also interested in an eventual role as an IT specialist for a local maritime business, leveraging his programming
    and hardware skills.
