personas:
  professional: Patrick Vora, a high-school junior and budding maker, harnesses their methodical curiosity and organized nature into leading school robotics initiatives, building precise model rockets,
    and managing a senior-friendly tech help desk at the Brewster public library.
  sports: Patrick Vora, an avid kayaker and seasonal soccer player, spends their summers paddling the Cape Cod bays with the Brewster Kayak Club, plays midfield for their high-school varsity team in the
    fall, and follows the Boston Red Sox, Boston Celtics, and New England Patriots, maintaining a disciplined weekly routine of cardio and strength training.
  arts: Patrick Vora, who sketches tranquil seascapes in spare moments, draws inspiration from maritime painter Winslow Homer, enjoys classic rock legends like The Beatles and ambient composer Ólafur Arnalds,
    and devours science-fiction novels by Kim Stanley Robinson, often attending exhibitions at the Cape Cod Museum of Art.
  travel: Patrick Vora, a meticulous planner who prefers low-key adventures with close friends, has kayaked along the coast of Martha's Vineyard, hiked the cliffs of Acadia National Park, and dreams of
    sailing to the Azores, always budgeting their trips through a shared spreadsheet and prioritizing destinations steeped in maritime history.
  culinary: Patrick Vora, a competent home cook who favors fresh seafood, frequently prepares classic New England clam chowder, buttery lobster rolls, and spicy jambalaya, while occasionally over-salting
    their experimental soups and indulging in late-night pizza slices.
  core: Patrick Vora blends disciplined curiosity with a quiet love for the sea, turning their methodical mind into a hobbyist engineer who balances study, sailing, and a meticulous budgeting habit.
background:
  cultural: Patrick’s cultural background is rooted in the New England white community of Cape Cod, with family heritage tracing back several generations to Irish and English settlers. Growing up in Brewster,
    a small town known for its fishing villages and maritime traditions, he was exposed to a strong sense of community, respect for nature, and an appreciation for the region’s historical narratives. This
    background influences his interest in maritime history and his practical, down‑to‑earth outlook.
