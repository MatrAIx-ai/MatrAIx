  hobbies: '[''Visiting galleries'', ''Analog photography'', ''Gardening'', ''Reading art history'', ''Collecting vintage vinyl'', ''Stagehand volunteering'', ''Chess'', ''Woodworking'', ''Hiking'']'
  career_goals: Paul aims to transform Perry’s recreation department into a regional hub for innovative arts experiences. He plans to launch a multi‑use community arts center that offers workshops, indie
    film screenings, and pop‑up performances, and to secure grant funding for sustainable programming. He also hopes to earn a certification in arts administration, mentor the next generation of entertainment
    managers, and eventually consult for other small towns looking to revitalize their cultural offerings.
