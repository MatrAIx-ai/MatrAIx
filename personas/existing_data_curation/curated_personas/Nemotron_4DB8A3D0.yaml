personas:
  professional: Ralph Johnson, a 26‑year‑old correctional officer with a bachelor’s in education, blends rigorous security protocols and crisis de‑escalation expertise with instructional design skills to
    develop evidence‑based training modules for staff and inmates, leveraging his methodical, competitive drive and sociable leadership style as he strives for a shift sergeant position and future roles
    as a training officer.
  sports: Ralph Johnson competes in intramural basketball and soccer at the local community center, hikes the Palisades and Bear Mountain with the Hudson Valley Trail Club, and follows the New York Knicks,
    New York Rangers, and New Jersey Devils, while sticking to a regimented fitness plan that mixes interval training and weightlifting three times a week.
  arts: Ralph Johnson fuels his love for classic‑rock by streaming Led Zeppelin, The Rolling Stones, and AC DC on vinyl, and unwinds with action movies starring Arnold Schwarzenegger and Bruce Willis, frequently
    attending live concerts at the Barclays Center and quoting iconic film lines during mentorship sessions.
  travel: Ralph Johnson prefers meticulously planned trips, having hiked Yosemite and the Grand Canyon, and dreams of a New Zealand adventure to trek the Milford Track, while also savoring weekend getaways
    to the Hudson Valley vineyards and the historic streets of Boston with his friends.
  culinary: Ralph Johnson, an avid grill master, regularly cooks charcoal‑grilled ribeye steaks marinated in rosemary, garlic, and smoked paprika, experiments with homemade BBQ sauce using brown sugar and
    chipotle, and occasionally throws together spicy chicken tacos with fresh cilantro and lime after late‑night soccer games.
  core: Ralph Johnson is a detail‑oriented, competitive correctional officer who balances a regimented work ethic with a love for classic‑rock concerts, strategic gaming, and mentoring at‑risk teens, though
    his constant worry sometimes leads to impulsive splurges on gear and extra‑late‑night movies.
background:
  cultural: Ralph was raised in a suburban, middle‑class family in Bergen County, New Jersey, with deep roots in mainstream Anglo‑American culture. His father served as a police officer and his mother worked
    as a public‑school teacher, reinforcing values of discipline, public service, and hard work. Growing up in the diverse yet predominantly white community of Waldwick, he absorbed the regional emphasis
    on community involvement, respect for authority, and a strong work ethic. His educational background reflects a commitment to the American education system, while his career in corrections aligns with
    the region's tradition of public‑safety professions. These influences have shaped his preference for structure, reliability, and organized, methodical approaches to both personal and professional life.
attributes:
  skills: '[''Security protocols'', ''Inmate supervision'', ''Crisis de‑escalation'', ''Conflict mediation'', ''Defensive tactics'', ''Firearms safety'', ''Emergency response planning'', ''Report writing'',
