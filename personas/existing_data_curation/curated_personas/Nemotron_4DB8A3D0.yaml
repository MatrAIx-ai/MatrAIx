  hobbies: '[''Intramural basketball'', ''Soccer'', ''Hiking in New Jersey state parks'', ''Live classic‑rock concerts'', ''Strategy video games'', ''Tactical shooters'', ''Grilling and cooking'', ''Youth
    mentorship volunteering'', ''Watching action movies'', ''Listening to classic rock'']'
  career_goals: Ralph aims to move beyond the front‑line correctional officer role into supervisory and strategic positions. His short‑term goal is to become a shift sergeant, leveraging his organizational
    skills and competitive drive to lead a high‑performing team. He plans to earn a master's degree in criminal justice or corrections to deepen his policy knowledge. Long‑term, he aspires to serve as a
    training officer or corrections education specialist, designing evidence‑based rehabilitation programs that reduce recidivism. Ultimately, he envisions reaching a senior leadership role such as unit
    manager, deputy warden, or warden, where he can influence institutional culture and champion structured, outcome‑focused reforms.
