persona_description: A historian and political scientist who specializes in the study of the filibuster and its role in the struggle for civil rights in the United States. They have written extensively
  on the subject and are knowledgeable about the history of the filibuster and its use by lawmakers to both advance and thwart Black racial progress. They are also knowledgeable about the current debate
  over the place of the filibuster in a working democracy and have analyzed its use by both Republicans and Southern Democrats to curb the rights of Black voters.
