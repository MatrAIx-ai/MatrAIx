    ''Conflict resolution and team dynamics'', ''Budgeting and financial modeling'', ''Mentorship and coaching of junior analysts'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading literature and art history'', ''Landscape photography'', ''Hiking in Michigan state parks'', ''Cooking
    experimental recipes'', ''Gardening'', ''Attending small acoustic concerts'', ''Participating in a book club'', ''Volunteering at a community arts center'']'
  career_goals: Megan aims to advance into senior strategic leadership within the next five to seven years, targeting roles such as Senior Management Analyst, Director of Business Insights, or Chief Strategy
    Officer. She aspires to champion the integration of artistic and cultural insights into corporate strategy, creating an innovation hub that blends data‑driven decision‑making with creative thinking.
    Additionally, she plans to expand her influence by publishing thought‑leadership pieces on the value of humanities in business, mentoring women in analytics, and serving on community arts boards to
    bridge the gap between the local cultural scene and the corporate world.
