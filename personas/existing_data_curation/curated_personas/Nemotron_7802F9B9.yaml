personas:
  professional: Lois Powell, an operational leader in Bronx’s arts‑education nonprofit sphere, harnesses strategic planning, data‑driven budgeting, and partnership cultivation to turn community visions
    into high‑impact programs while upholding meticulous quality control.
  sports: Lois Powell follows the New York Knicks and Bronx Barnstormers semi‑pro baseball club, jogs the High Line each spring, participates in a casual weekend yoga class, and joins a co‑ed recreational
    softball league each summer, preferring low‑impact activities that fit a busy schedule.
  arts: Lois Powell is a dedicated patron of Bronx street art, frequently attending gallery openings featuring emerging artists like Tatyana Badakov, curating urban photography for community newsletters,
    and spinning vintage jazz and soul vinyl from legends such as Nina Simone and John Coltrane while reading contemporary works by Colson Whitehead and Yaa Gyasi.
  travel: Lois Powell favors culturally immersive urban getaways, returning from weekend visits to Brooklyn’s Williamsburg art district and a two‑week culinary tour of Kingston, Jamaica, while dreaming
    of an extended stay in Oaxaca, Mexico to explore local markets and craft workshops, always planning trips around school calendars and modest travel funds.
  culinary: Lois Powell loves crafting heritage dishes such as jerk chicken, collard greens seasoned with smoked paprika, and plantain‑based mofongo, skillfully balancing a proficient home‑cook’s ability
    to perfect a roux with a habit of burning the edges of a curry when distracted by work emails.
  core: Lois Powell merges disciplined nonprofit leadership with a quiet devotion to street art, vintage jazz, and heritage cooking, navigating life through organized curiosity, a love for solitude, and
    the occasional procrastination on paperwork.
background:
  cultural: Lois identifies as African American and was raised in the Bronx, a melting pot of cultures and artistic expression. Her family emphasizes community solidarity, education, and cultural pride,
    passing down stories of West African ancestors and the resilience of the Black diaspora in New York City. Growing up amidst hip‑hop, street art, and a strong neighborhood network shaped her worldview,
    instilling a deep appreciation for cultural heritage and a commitment to uplift underrepresented voices through art and community service. She navigates the complexities of systemic challenges while
    celebrating the rich traditions of Black music, cuisine, and visual arts that are integral to her identity.
attributes:
  skills: '[''Strategic planning'', ''Project management'', ''Budgeting and financial analysis'', ''Team leadership and staff development'', ''Data-driven decision making'', ''Process optimization'', ''Community
    partnership development'', ''Program development'', ''Risk assessment and quality control'', ''Proficiency with Microsoft Office Suite, Asana, Google Workspace, Tableau'']'
  hobbies: '[''Exploring Bronx murals and street art'', ''Urban photography'', ''Reading contemporary fiction and social‑justice non‑fiction'', ''Cooking African‑American and Caribbean dishes'', ''Yoga
    and meditation'', ''Journaling'', ''Volunteering at youth art workshops'', ''Collecting vintage jazz and soul vinyl records'', ''Attending small live music and poetry slam events'']'
  career_goals: Lois aims to ascend to senior leadership within a cultural or community nonprofit, ideally as an Executive Director of a Bronx arts‑education organization, where she can blend her operational
    acumen with her passion for the arts. She plans to complete her bachelor’s degree in Public Administration and earn a certification in nonprofit management. In the longer term, she envisions launching
    her own social enterprise that offers after‑school art programs for underserved youth, leveraging technology to expand reach while maintaining high program quality.
