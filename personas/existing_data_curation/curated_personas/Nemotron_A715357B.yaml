personas:
  professional: Jacob Bisk is a veteran building cleaner who leverages fifteen years of commercial cleaning, floor care, and minor maintenance expertise to pursue a lead janitor position, while simultaneously
    preparing for Certified Commercial Cleaner and OSHA specialist certifications and sketching a blueprint for a future small cleaning business.
  sports: Jacob Bisk is an avid follower of the Boston Bruins, never missing a home game at TD Garden, regularly tunes in to Portland Sea Dogs baseball broadcasts, and belongs to the Penobscot Hiking Club,
    which organizes weekend treks and winter snowshoe outings.
  arts: Jacob Bisk is a classic‑rock and blues enthusiast who spins Led Zeppelin, B.B. King, and The Rolling Stones on their vintage Technics turntable, strums an acoustic rendition of Wish You Were Here
    on their guitar, and frequently visits Portland’s State Theatre for live tribute shows, allowing music to complement their woodworking creativity.
  travel: Jacob Bisk is a methodical planner who maps out weekend drives to Acadia National Park for sunrise hikes and to the rugged coastline of Bar Harbor, enjoys winter snowshoe trips to Canada’s Fundy
    National Park, and dreams of a cross‑country road trip along Route 66, but keeps longer overseas voyages, like a summer trip to the Scottish Highlands, on hold due to budget constraints and family responsibilities.
  culinary: Jacob Bisk is a modest home cook who excels at pan‑seared trout with lemon‑dill butter, hearty New England clam chowder, and blueberry pancakes drizzled with maple syrup, prefers locally sourced
    wild blueberries and fresh lobster, and while comfortable with basic sauté techniques, they still struggle to perfect a roux.
  core: Jacob Bisk is a hands‑on problem‑solver who balances a structured work routine with spontaneous outdoor pursuits, manages finances with careful budgeting yet occasional gear splurges, and navigates
    health with proactive monitoring of hypertension but inconsistent dental care, all while nurturing a community‑focused spirit and a love for classic rock.
background:
  cultural: Jacob grew up in a small New England town in Maine, where his family has lived for several generations. His cultural upbringing reflects traditional Yankee values of self‑reliance, modesty,
    and a strong work ethic. He is familiar with local customs such as town meetings, seasonal community festivals, and the regional appreciation for outdoor recreation and local seafood. While culturally
    aligned with mainstream American middle‑class life, he also embraces the close‑knit community spirit of rural Maine, valuing neighborly support and civic participation.
attributes:
  skills: '["Commercial cleaning", "Floor care and polishing", "Carpet extraction and stain removal", "Safe handling of cleaning chemicals", "Minor repairs (plumbing, electrical, carpentry)", "Inventory
    management for supplies", "OSHA safety compliance", "Customer service and communication", "Adaptable problem-solving", "Team collaboration"]'
  hobbies: '["Fishing", "Hiking", "Snowshoeing", "Woodworking", "Listening to classic rock and blues music", "Playing acoustic guitar", "Community volunteer clean-up events", "Bar trivia nights", "Watching
    hockey games"]'
  career_goals: Jacob aims to leverage his hands‑on experience into a supervisory role, such as lead janitor or facilities team coordinator, and plans to obtain a Certified Commercial Cleaner credential
    and OSHA safety specialist certification within the next two years. He is also considering starting his own small cleaning business to gain greater control over his schedule and income, which would
    allow him to achieve more financial stability after his divorce and provide flexibility for personal projects. Long‑term, he hopes to become a facilities manager for a regional office building, overseeing
    a larger maintenance crew and integrating sustainable cleaning practices.
