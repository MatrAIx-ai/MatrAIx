personas:
  professional: Jason Gonzalez, a 3‑year‑old budding "little architect" who meticulously lines up LEGO bricks and blocks in perfect rows, delights in explaining his building plans to peers, and thrives
    as the talkative center of preschool playtime, channeling his love for structure, reliability, and competitive spirit into early leadership.
  sports: Jason Gonzalez, a 3‑year‑old who energetically kicks a size‑2 soccer ball at the Little Explorers Toddler Soccer Club, cheers loudly for the Los Angeles Dodgers when watching TV, and treats every
    playground race as a fierce competition, often demanding the finish line be marked and timed.
  arts: Jason Gonzalez, a 3‑year‑old who bursts into song with the "Frozen" soundtrack, draws bold dinosaurs and smiley faces with chunky crayons, and loves performing impromptu dance numbers for his family,
    mirroring his sociable, talkative nature and love for being the center of attention.
  travel: Jason Gonzalez, a 3‑year‑old who loves family road trips to the beach in Monterey, enjoys short flights to visit grandparents in Chicago, and prefers carefully planned itineraries that include
    a designated nap time, yet occasionally throws a tantrum when a surprise detour disrupts his predictable schedule.
  culinary: Jason Gonzalez, a 3‑year‑old who devours chicken nuggets, macaroni‑cheese, and banana slices with gusto, insists on having cheese sticks for every snack, and stubbornly refuses broccoli, often
    negotiating extra "dip" as the price for trying a new vegetable.
  core: Jason Gonzalez, a 3‑year‑old who balances a love for structured play and spotlight‑seeking chatter with intense emotional swings, competitive sandbox battles, and a stubborn streak that makes snack
    time negotiations a daily drama.
background:
  cultural: Jason grows up in a white‑American family with the surname Gonzalez in St. Louis, Missouri. His household blends Midwestern values—punctuality, community involvement, and modesty—with occasional
    Hispanic cultural touches, such as hearing a few Spanish words, celebrating Día de los Muertos with a small altar, and enjoying foods like tamales alongside traditional Midwest fare. Family outings
    often include trips to the St. Louis Arch, the zoo, and local Catholic church services, reinforcing a blend of regional American and subtle Latin heritage influences.
