persona_description: A healthcare policy analyst who specializes in the use of geographic information systems (GIS) to identify high priority areas for maternal care and services in Iran. She has extensive
  experience in conducting research and analyzing data to determine the effectiveness of health care systems and policies. She is skilled in using GIS to identify regional disparities and to identify areas
  that need more health facilities and education for healthcare providers. She has a deep understanding of the impact of health care policies and resources on maternal mortality rates and is committed to
  improving maternal health outcomes in deprived areas.
