personas:
  professional: Mario Domínguez, a seasoned metal and plastic fabrication specialist with over 20 years of expertise in MIG, TIG, and stick welding, CNC machining, blueprint interpretation, and safety compliance,
    channels his organized, methodical mindset and compassionate leadership style into mentoring apprentices, resolving workplace conflicts calmly, and driving precise production schedules as he pursues
    a supervisory role to embed lean‑manufacturing practices and a formal mentorship program.
  sports: Mario Domínguez, a weekend angler who casts his line at Lake Tattnall, follows the Atlanta Braves and Atlanta Falcons closely, participates in a local adult softball league every spring, and maintains
    a disciplined treadmill routine at dawn to counter the physical toll of his trade while enjoying occasional hikes in the nearby Oconee National Forest.
  arts: Mario Domínguez, who unwinds after a day in the shop by carving small wooden tables while listening to classic rock legends like Led Zeppelin and folk storytellers such as John Prine, regularly
    attends community theater productions of August Wilson plays, and collects prints of local muralists, finds these artistic experiences fueling both his craftsmanship and his sense of cultural continuity.
  travel: Mario Domínguez, who favors meticulously planned road trips that blend historical sightseeing with quiet nature, has driven the scenic route to Savannah, Georgia, explored the historic streets
    of Charleston, South Carolina, and dreams of a solo backpacking adventure through the volcanic landscapes of Oregon’s Cascade Range, all while balancing a modest travel budget and family obligations.
  culinary: Mario Domínguez, an adept home cook who preserves family traditions by preparing pupusas stuffed with queso fresco and loroco and slow‑cooked tamales seasoned with annatto and pork, supplements
    his meals with fresh vegetables from his modest garden—heirloom tomatoes, cilantro, and heirloom beans—and occasionally dines at the local barbecue joint for smoked brisket, all while perfecting his
    wood‑fired oven techniques.
  core: Mario Domínguez, a methodical fabrication veteran whose quiet reliability is punctuated by a compulsive habit of arranging every tool by color, blends a love for solitary woodworking with a deep
    commitment to mentoring youth, yet occasionally forgets to schedule his own dentist appointments.
background:
  cultural: Mario’s Salvadoran roots are a central part of his identity. He grew up in a bilingual household where Spanish was spoken daily, and his family maintains strong ties to Salvadoran traditions,
    Catholic faith, and community values. He celebrates holidays such as Día de la Fundación de El Salvador and shares cultural foods and stories with his children. Living in Hazlehurst, he blends his heritage
    with Southern hospitality, often participating in local church activities, neighborhood potlucks, and offering a Salvadoran perspective at community events. His cultural background informs his emphasis
    on family, mutual support, and a collaborative spirit in both his personal and professional life.
attributes:
  skills: '[''MIG/TIG welding'', ''Stick welding'', ''CNC machining'', ''Blueprint reading and interpretation'', ''Metal forming and bending'', ''Plastic injection molding operation'', ''Equipment troubleshooting
