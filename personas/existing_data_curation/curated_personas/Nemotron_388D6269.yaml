  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Fishing'', ''Cooking Salvadoran cuisine'', ''Volunteer work at church food bank'', ''Youth mentorship in technical skills'', ''Reading technical
    manuals'', ''Chess'', ''Puzzle solving'', ''Attending small community festivals'']'
  career_goals: Mario aims to advance to a supervisory or lead technician role at his current plant, where he can formalize a mentorship program for younger workers and introduce lean‑manufacturing practices
    that improve efficiency while preserving job stability. He also plans to obtain an AWS Certified Welder credential and complete a small‑business management course with the goal of eventually opening
    a community workshop that offers affordable training in metal and plastic fabrication for local residents. Throughout, he seeks to balance career growth with his family’s needs and contribute to community
    projects.
