personas:
  professional: James Cooney, a 17‑year‑old aspiring freelance digital illustrator and concept artist, blends hand‑sketching, free‑software digital painting, and basic Python automation to deliver meticulously
    planned artwork, while their methodical nature and competitive edge drive them to meet deadlines and outshine peers in regional art contests.
  sports: James Cooney runs cross‑country with the Sumner County High School team in the fall, joins the Nashville Parks and Recreation basketball league in the spring, hikes the Harpeth River State Park
    trails weekly, and cheerfully follows the Nashville Predators and Tennessee Titans from their bedroom.
  arts: James Cooney draws creative energy from the futuristic illustrations of Syd Mead, the moody alternative country of St. Vincent, and the cinematic storytelling of Makoto Shinkai, while immersing
    themselves in art‑history documentaries about Caravaggio and emerging AR technology.
  travel: James Cooney prefers meticulously planned road trips, having explored the Great Smoky Mountains and historic Charleston, and dreams of a backpacking adventure through Kyoto’s temples and Seoul’s
    neon‑lit districts, budgeting each journey with a detailed spreadsheet.
  culinary: James Cooney enjoys cooking simple comfort meals like skillet‑seared salmon with quinoa and roasted Brussels sprouts, experimenting with smoky chipotle glaze, yet often succumbs to late‑night
    pizza deliveries while binge‑watching art documentaries.
  core: James Cooney is a solitary 17‑year‑old creator who channels competitive precision into digital art, saves diligently, balances quiet hikes with nocturnal pizza cravings, and occasionally skips dentist
    appointments.
background:
  cultural: James grew up in a modest, white Southern family in Gallatin, Tennessee. His upbringing reflects the traditional values of a close‑knit community—church attendance, family gatherings centered
    around home‑cooked meals, and participation in local festivals like the Sumner County Fair. While his roots are firmly planted in this rural, culturally conservative environment, his curiosity and openness
    to new ideas have exposed him to broader artistic and technological influences through the internet and occasional trips to Nashville’s art venues. This blend of Southern heritage and contemporary creative
    exposure shapes his worldview, giving him a respect for tradition while encouraging unconventional thinking.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Basic Python programming'', ''Computer troubleshooting'', ''Woodworking'', ''Video editing'', ''Time management'', ''Research and information synthesis'']'
  hobbies: '[''Sketching and drawing'', ''Digital art creation'', ''Reading sci‑fi and fantasy novels'', ''Playing indie video games'', ''Hiking in nearby parks'', ''Listening to alternative country music'',
    ''Watching documentary films'', ''Woodworking projects'']'
  career_goals: James aspires to turn his artistic talents into a sustainable career. His primary goal is to become a freelance digital illustrator and concept artist, eventually launching his own boutique
    studio that offers custom artwork and small‑scale product designs. He plans to enroll in a community‑college graphic design program to formalize his skills, build a professional portfolio, and gain
    credibility for entering regional art competitions. Long‑term, he envisions leveraging his technical know‑how to develop interactive media projects that combine visual art with simple programming, positioning
    himself competitively in the digital creative market.
