  hobbies: '[''Singing in church choir'', ''Community theater acting'', ''Organizing game nights'', ''Gardening (tomatoes, pumpkins)'', ''Baking cookies for friends and neighbors'', ''Making friendship
    bracelets'', ''Volunteering at animal shelter'', ''Creating TikTok videos'', ''Playing multiplayer video games'']'
  career_goals: Ann’s immediate goal is to obtain her GED and enroll in a community college program focused on human services, social work, or community health. She aspires to become a youth outreach coordinator
    for a local nonprofit, where she can design and run programs that promote mental‑wellness, conflict resolution, and peer support. Long‑term, she dreams of founding a community hub—a coffee shop or activity
    center—that serves as a safe, inclusive space for teens and families in Belleville, blending her love for social interaction with her entrepreneurial spirit. Throughout her career, she aims to maintain
    a flexible schedule that lets her stay closely connected to the people she serves.
