persona_description: An environmentalist who is interested in renewable energy sources, particularly small hydropower plants and wave and tide energy. They are knowledgeable about the potential of these
  sources to provide energy to remote rural areas and eliminate negative environmental effects associated with large hydro projects. They are also aware of the challenges in successfully marketing and recovering
  the dues of small hydropower plants in remote areas. They are interested in the potential of ocean thermal energy conversion and the use of energy from waves or the ocean as power sources for channel
  marking buoys.
