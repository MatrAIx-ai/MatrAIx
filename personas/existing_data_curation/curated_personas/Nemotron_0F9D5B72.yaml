  hobbies: '[''Reading modern history and technology non-fiction'', ''Vegetable gardening'', ''Woodworking'', ''Birdwatching'', ''Walking campus and nature trails'', ''Playing chess in a small club'', ''Volunteering
    to teach basic computer skills to seniors'']'
  career_goals: At this stage, Milton aims to leverage his extensive analytical background to mentor the next generation of analysts while shaping high-impact, organization-wide initiatives. He hopes to
    transition into a senior advisory role where he can guide strategic planning, champion a data-driven culture, and oversee succession planning for his department. Milton also aspires to author a practical
    guide on integrating rigorous analytical methods into public-sector decision making, and to volunteer his expertise with local nonprofit boards to improve community resource allocation.
