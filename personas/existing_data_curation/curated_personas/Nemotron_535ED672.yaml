personas:
  professional: Rene Maya, a 52‑year‑old home‑repair specialist with a methodical, organized approach, blends hands‑on carpentry, electrical troubleshooting, and bilingual outreach to launch a trustworthy
    community renovation business, and they plan each job like a project while using budgeting expertise to keep quotes transparent.
  sports: Rene Maya follows San Antonio FC passionately, attending weekend matches at Toyota Stadium, participates in a community soccer league for recreation, stays fit through daily dog walks and occasional
    pick‑up basketball games, and they cheered the Spurs during the 2022 playoff run.
  arts: Rene Maya channels a love of history into meticulous photography of San Antonio’s Mission‑style brickwork, collects model train sets reminiscent of mid‑century railroads, reads historical novels
    by Cormac McCarthy and Edward Rutherfurd, and they relax to the folk‑rock sounds of The Avett Brothers and the classic film scores of Ennio Morricone.
  travel: Rene Maya prefers road‑trip itineraries that blend historic stops with natural scenery, having driven the Texas Hill Country to explore the Alamo and local vineyards, spent a weekend in New Mexico’s
    Taos Pueblo area, and they plan a future visit to a border city to experience bustling markets while balancing travel costs with family responsibilities.
  culinary: Rene Maya delights in preparing hearty, pepper‑laden stews and corn‑based casseroles that blend family recipes with southwestern twists, such as smoky chicken chile verde, a sweet‑spicy pork
    carnitas bake, and homemade corn tortillas served alongside roasted poblano salsa, and they rely on a garden of heirloom peppers to supply fresh heat for every meal.
  core: Rene Maya, a 52‑year‑old methodical handyman with a green thumb, balances curiosity in the kitchen with practical home‑renovation ambitions, often loses track of time tinkering with model trains
    while occasionally forgetting to water the garden, and they cherish quiet walks with their dog to reset.
background:
  cultural: Rene grew up in a Mexican‑American household in San Antonio, immersed in both Mexican traditions and Texan influences. He is fluent in Spanish and English, celebrates holidays such as Día de
    los Muertos, Cinco de Mayo, and Catholic feasts, and participates in community events that blend norteña music, banda, and local Tex‑Mex cuisine. His upbringing emphasized family loyalty, communal support,
    and a respect for hard work, shaping his values of reliability, cooperation, and a balanced respect for both his heritage and the broader American culture.
attributes:
  skills: '[''Home repair (carpentry, electrical, plumbing)'', ''Automotive diagnostics'', ''Bilingual communication (Spanish/English)'', ''Customer service'', ''Budgeting and basic accounting'', ''Event
