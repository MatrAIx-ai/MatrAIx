persona_description: A finance professional who is familiar with the differences between nonprofit, governmental, and commercial accounting. They have experience with budgetary accounting practices and
  understand the use of general funds. They are knowledgeable about capital and debt service funds and have experience with financial reporting on government and non-profit organizations. They are skilled
  in revenue and expenditure fund accounting and have a deep understanding of the similarities and differences between these two methods. They are also familiar with the overall process used for financial
  reporting on government and non-profit organizations and are skilled in creating a Comprehensive Annual Financial Report (CAFR).
