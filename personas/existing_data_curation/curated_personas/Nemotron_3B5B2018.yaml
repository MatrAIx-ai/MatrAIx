personas:
  professional: John Boyd, a 7-year-old budding engineer, channels their love for complex LEGO builds and coding on Scratch into designing miniature inventions, often competing in the local library’s chess
    club where their competitive edge sharpens problem-solving skills.
  sports: John Boyd, a member of the East Hampton community swim team, loves early morning laps at the local pool and joins a small beach volleyball group in summer, while they cheer for the New York Yankees
    and the New York Islanders, reflecting both a love for water and competitive team spirit in a low-key setting.
  arts: John Boyd, an avid visitor of the Parrish Art Museum, admires Winslow Homer's seascapes, sketches invention ideas on the back of museum brochures, and enjoys listening to folk performances at the
    East Hampton Summer Festival, often humming along while they build LEGO ships.
  travel: John Boyd, who spends weekends exploring tide pools at the Hamptons beaches and has taken a family road trip to the historic Montauk Lighthouse, they dream of visiting Kennedy Space Center to
    see rockets up close but balance that excitement with the practical reality of travel costs and school schedules.
  culinary: John Boyd, who favors crusty ciabatta with hummus, loves bite-sized sushi rolls and fresh clam chowder after beach outings, enjoys cooking simple avocado toast at home, yet they have a quirky
    habit of sprinkling sea-salt on chocolate chip cookies for extra crunch.
  core: John Boyd, a 7-year-old chess-savvy LEGO architect, balances relentless curiosity with a habit of over-thinking puzzles, and they are both a meticulous planner and a nervous perfectionist.
background:
  cultural: John was raised in East Hampton, a coastal community in Suffolk County known for its beaches, artistic scene, and affluent suburban lifestyle. His family values education, environmental stewardship,
    and community involvement. Weekend trips to the beach, visits to local museums such as the Parrish Art Museum, and participation in small-scale community events like the East Hampton Summer Festival
    have shaped his appreciation for both nature and the arts. Growing up in a predominantly white, middle-class American setting, he blends traditional suburban customs with the town's maritime and creative
    influences.
