  career_goals: John dreams of a future where he can design and build things that solve real problems. He hopes to win his school's science fair, learn more advanced programming, and eventually become an
    engineer or scientist—perhaps focusing on robotics or environmental technology. His competitive spirit drives him to set high standards for himself, and his practical side pushes him to pursue a career
