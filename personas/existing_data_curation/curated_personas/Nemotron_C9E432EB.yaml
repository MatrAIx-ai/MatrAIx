personas:
  professional: Jeremy Floyd, a veteran educational guidance counselor with over twenty years of experience, harnesses their vivid imagination and anxiety‑prone curiosity to craft interdisciplinary career
    pathways that blend art, technology, and speculative storytelling, while their reluctance toward rigid structures often leads to last‑minute workshop prep and spontaneous client sessions.
  sports: Jeremy Floyd hikes solo on the Pacific Trail, belongs to the Pacific Trail Hiking Club, follows the Seattle Seahawks avidly, and competes in weekly chess matches at The Quiet Brew Café, balancing
    low‑key endurance with strategic competition.
  arts: Jeremy Floyd spends evenings painting abstract canvases inspired by Mark Rothko and listening to avant‑garde jazz legends like Sun Ra and Ornette Coleman, while their literary palate includes speculative
    fiction by Ursula K. Le Guin and modern art theory by Rosalind Krauss, shaping both their creative output and counseling philosophy.
  travel: Jeremy Floyd prefers low‑key, contemplative trips, having trekked the misty trails of the Hoh Rainforest in Olympic National Park, explored the surreal architecture of Barcelona’s Sagrada Família,
    and dreaming of a quiet retreat in Kyoto’s bamboo groves, all planned with flexible itineraries that allow spontaneous detours.
  culinary: Jeremy Floyd cooks simple garden‑to‑table meals, favoring heirloom tomato bruschetta, rosemary‑infused roasted potatoes, and occasional experimental dishes like miso‑marinated tempeh, yet they
    often forget to restock staples, leading to improvised pantry raids and late‑night coffee runs at the local roastery.
  core: Jeremy Floyd is a 50‑year‑old counseling visionary who blends abstract art, speculative storytelling, and restless curiosity into a solitary yet competitive life, constantly battling disorganization
    and stress while chasing creative career pathways.
background:
  cultural: Jeremy was raised in a modest, white, Midwestern family with German and Irish ancestry near Des Moines, Iowa. His upbringing emphasized self‑reliance, community involvement, and a strong work
    ethic, values that steer his dedication to educational guidance. While his early environment was rooted in traditional Protestant values and rural traditions, his innate curiosity led him to explore
    broader cultural and artistic expressions. Living in Urbandale, a suburb of Des Moines, he balances Midwestern modesty with a penchant for novelty, integrating his local heritage with a contemporary,
    creatively driven worldview.
