  hobbies: '[''Abstract painting'', ''Speculative fiction writing'', ''Philosophy reading'', ''Science‑fiction literature'', ''Chess'', ''Avant‑garde jazz listening'', ''Solo hiking'', ''Gardening'', ''Mentoring
    at‑risk youth'']'
  career_goals: Jeremy aims to establish a boutique consultancy that integrates art, technology, and emerging job market insights to help adult learners pursue non‑linear career trajectories. He plans to
    author a guidebook on imaginative career navigation and become a sought‑after speaker at regional and national conferences on future‑of‑work and creativity in professional development. Additionally,
    he seeks to develop a curriculum for community colleges that blends speculative fiction writing with career planning, positioning himself as a thought leader who bridges educational theory with innovative
    practice. Personal ambitions include improving his organizational routines and developing stress‑management strategies to enhance his effectiveness as a counselor.
