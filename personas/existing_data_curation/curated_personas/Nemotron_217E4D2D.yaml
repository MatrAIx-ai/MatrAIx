personas:
  professional: Shameka Washington, a community health liaison in training with extensive experience in conflict mediation, budget oversight, and event coordination, channels their practical, structure‑oriented
    mindset and flexible, people‑centric approach into part‑time roles that strengthen senior services and foster inclusive programming.
  sports: Shameka Washington stays active by strolling the Providence Riverwalk three times a week, cheering on the Providence Bruins and the New England Patriots, and playing in a local senior volleyball
    league, blending casual fitness with community spirit.
  arts: Shameka Washington immerses themselves in the arts by lending their voice to the church choir, attending Trinity Rep’s latest play, and enjoying performances by the Boston Symphony Orchestra and
    jazz vocalist Gregory Porter, while also crocheting vibrant blankets inspired by the patterns of local textile exhibitions.
  travel: Shameka Washington prefers relaxed road trips that blend historic sightseeing with culinary stops, often heading to Newport’s seaside mansions, strolling Boston’s Freedom Trail, and dreaming of
    a future pilgrimage to New Orleans’ jazz districts, all while balancing a modest travel budget and occasional family commitments.
  culinary: Shameka Washington, an intermediate home chef, delights in turning garden harvests into dishes like rosemary‑roasted chicken, miso‑glazed carrots, quinoa‑stuffed bell peppers, and fresh basil
    pesto pasta, favoring bold herbs, citrus, and seasonal vegetables while experimenting with fusion twists for their modest catering venture.
  core: Shameka Washington blends a love for community, gardening, and cooking with a laid‑back approach to schedules, often juggling multiple projects while forgetting where they left their keys.
background:
  cultural: Shameka is an African American woman who was raised in Providence’s historic North End, a neighborhood known for its tight‑knit community and rich cultural tapestry. Her upbringing was centered
    around family gatherings, church involvement, and the oral tradition of sharing stories and recipes passed down through generations. This heritage instilled in her a strong sense of communal responsibility,
    respect for elders, and an appreciation for soulful music, cuisine, and celebration of African American history. While she embraces contemporary Rhode Island culture, she remains deeply connected to
    the values of perseverance, empathy, and collective support that characterize her African American roots.
attributes:
