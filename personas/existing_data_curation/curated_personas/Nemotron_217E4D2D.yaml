  career_goals: Shameka aims to translate her informal experience into a part‑time role that supports her community. She plans to complete a certificate in community health work or elder care within the
    next year, enhancing her ability to serve as a liaison between local health services and seniors. Additionally, she hopes to start a modest home‑based catering service that showcases her culinary skills,
    providing supplemental income while maintaining flexibility. Long‑term, she aspires to become a trusted volunteer coordinator at the Providence community center, using her natural empathy and organizational
    talent to create inclusive programs.
