personas:
  professional: Jasper Hernandez is a methodical statistician who designs rigorous experiments and builds predictive models for agriculture and public health, meticulously documenting every step and using
    their competitive drive to deliver precise, reliable insights while keeping a healthy skepticism toward unverified assumptions.
  sports: Jasper Hernandez is an avid hiker and fly‑fisher who spends spring and summer trekking the Rockies with the Montana Alpine Club and casting for trout at the Yellowstone Anglers, stays fit through
    weekend mountain bike rides, and fervently follows the Denver Broncos, Colorado Rockies, and Denver Nuggets as their favorite professional sports teams.
  arts: Jasper Hernandez is a keen wildlife photographer who captures Montana's elk and sagebrush in a style reminiscent of Ansel Adams, spends evenings listening to Bob Dylan and Miles Davis while solving
    intricate chess puzzles, and occasionally attends local theater productions featuring classics by Arthur Miller.
  travel: Jasper Hernandez is a detail‑oriented traveler who meticulously plans trips to iconic wilderness areas—having hiked Glacier National Park, kayaked the fjords of New Zealand’s South Island, and
    dream‑toured the Swiss Alps—while balancing consulting work constraints with spontaneous weekend getaways to nearby hot springs.
  culinary: Jasper Hernandez is a competent home chef who perfects family tamales using masa harina, pork shoulder, and dried ancho chiles, while also mastering camp‑fire roasted trout with fresh pine nuts
    and wild mushrooms, and occasionally treats themselves to a craft beer paired with a smoked brisket.
  core: Jasper Hernandez blends a competitive, data‑driven mind with a love for solitary outdoor pursuits, meticulously balancing spreadsheets, woodwork, and midnight chess matches while occasionally splurging
    on a deluxe lathe.
background:
  cultural: Jasper identifies as a white American with a Hispanic surname, reflecting a blended family heritage that includes Mexican ancestry. Raised in a small‑town Montana setting, he embraces the frontier
    values of self‑reliance, community solidarity, and a deep respect for the outdoors. While his daily life is rooted in the rural Western culture of Montana, he honors his family's Mexican roots through
    occasional celebrations, cooking traditional dishes, and maintaining a modest familiarity with Spanish. This dual cultural perspective informs his pragmatic worldview and his commitment to serving both
    his local community and broader, diverse audiences.
