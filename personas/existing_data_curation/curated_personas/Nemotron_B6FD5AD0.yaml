  career_goals: Jasper aims to become the lead statistician for the Montana Department of Agriculture, where he can develop statewide predictive tools for crop yields and climate resilience. He also aspires
    to launch a boutique analytics consultancy that serves rural businesses, leveraging his competitive edge to secure high‑impact projects. Publishing peer‑reviewed research on environmental statistics,
    earning professional certification from the American Statistical Association, and mentoring the next generation of data professionals are central to his long‑term ambitions.
