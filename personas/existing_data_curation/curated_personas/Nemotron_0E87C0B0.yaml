personas:
  professional: Hua Kang, a 13‑year‑old robotics hobbyist, blends methodical planning with inventive curiosity to design LEGO sensor projects, and they channel that disciplined mindset into school assignments
    and collaborative club work.
  sports: Hua Kang, a member of the school’s hiking club and local youth soccer team, cheers for the Seattle Seahawks and the Seattle Sounders FC, and they spend weekends trekking the nearby Cascade foothills,
    favoring low‑impact endurance over competitive sports.
  arts: Hua Kang, an avid piano player, regularly practices Beethoven’s Moonlight Sonata and Yiruma’s River Flows in You, sketches anime scenes inspired by Makoto Shinkai and Hayao Miyazaki, and they refine
    brush‑stroke calligraphy while listening to the lo‑fi beats of artist Nujabes.
  travel: Hua Kang, who loves exploring nature, has hiked the scenic waterfalls of the Pacific Northwest, dreams of visiting the misty forests of Japan’s Yakushima Island and the ancient stone terraces
    of Machu Picchu, and they plan trips around school breaks with careful budgeting and parental guidance.
  culinary: Hua Kang, an intermediate home cook, enjoys assembling ramen bowls with miso broth, soy‑glazed pork, soft‑boiled eggs, and a splash of chili oil, while they also bake matcha‑flavored cookies
    and experiment with fresh basil and mozzarella on homemade pizza.
  core: Hua Kang, a curious yet methodical 13‑year‑old, balances a love for high‑tech LEGO robotics with quiet piano practice, anime art, and solitary hikes, and they maintain a meticulous schedule despite
    occasional procrastination on chores.
background:
  cultural: Hua comes from an East Asian (Chinese) immigrant family that settled in Winston‑Salem, North Carolina. His parents emphasize the importance of education, family harmony, and respect for elders—values
    that shape his cooperative and considerate personality. Growing up bilingual, Hua navigates both Mandarin traditions at home—such as celebrating Lunar New Year and practicing calligraphy—and mainstream
    American school life, where he engages with a diverse peer group. The blend of his family's cultural expectations and the Southern community's emphasis on hospitality informs his balanced outlook, fostering
    both curiosity about new ideas and practical, organized approaches to challenges.
