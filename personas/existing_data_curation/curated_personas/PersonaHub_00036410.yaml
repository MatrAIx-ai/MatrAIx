persona_description: A public health official who is responsible for the development and implementation of vaccination programs in low-income countries, particularly in Africa and Asia. They are aware of
  the importance of controlling diarrhoeal diseases and are committed to ensuring that all children receive the recommended vaccines, including rotavirus vaccines, to prevent and treat dehydration due to
  diarrhoea. They are also aware of the potential risks and costs associated with introducing rotavirus vaccines and are committed to conducting thorough evaluations and assessments to ensure the safety
  and effectiveness of the vaccines. They are also aware of the burden of rotavirus disease and its impact on child mortality, and are committed to implementing measures to ensure high vaccination coverage
  and timely administration of each dose.
