  hobbies: '["Digital illustration","Watercolor painting","Reading speculative fiction and philosophy","Puzzle solving (Sudoku, coding challenges)","Hiking in Torrey Pines","Yoga for stress relief","DIY
    electronics and Arduino projects","Visiting art galleries and museums"]'
  career_goals: Lauren aspires to leverage her analytical and creative strengths to advance from first‑line supervisor to district manager within the next three years, eventually moving into a regional
    operations role or a corporate retail analytics position. She is planning to earn an MBA focused on operations management while also exploring opportunities to integrate emerging technologies—such as
    AI‑driven merchandising tools—into the retail environment. Long‑term, she envisions launching her own boutique that combines cutting‑edge product design with a curated, art‑inspired shopping experience.
