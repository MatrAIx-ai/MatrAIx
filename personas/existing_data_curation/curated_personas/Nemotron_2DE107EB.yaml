  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Chess'', ''Cooking Greek cuisine'', ''Volunteer tutoring at community college'', ''Nature photography'', ''Walking local trails'',
    ''Playing bouzouki informally'', ''Attending small cultural gatherings'']'
  career_goals: Approaching retirement, John aims to transition from day‑to‑day technical work to a mentorship and community outreach role. He hopes to establish a structured internship program at his institution
    that pairs seasoned technicians with students from under‑represented backgrounds, using his calm, cooperative demeanor to create a supportive learning environment. Additionally, John aspires to contribute
    to interdisciplinary research projects that translate lab findings into practical solutions for local environmental health challenges, ensuring his expertise continues to serve the broader community
    he values.
