persona_description: A healthcare professional involved in managing and controlling hospital infections, particularly focused on the prevention and control of nosocomial pathogens like Vancomycin-resistant
  Enterococci (VRE). This person has experience in surveillance, infection control, and antimicrobial resistance management, with a particular interest in Ireland's rising VRE prevalence and the actions
  taken to mitigate the risk of an outbreak. They are likely to have a strong background in microbiology, epidemiology, and infection control, and have a hands-on approach to managing hospital environments.
