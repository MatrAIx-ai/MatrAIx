    troubleshooting'', ''Basic graphic design'', ''Industrial photography'', ''Scale model building'', ''Art history appreciation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Industrial and landscape photography'', ''Scale model building'', ''Woodworking'', ''DIY home improvement projects'', ''Cycling'', ''Reading (business,
    technology, art history)'', ''Cooking experimental recipes'', ''Participating in community arts workshops'', ''Learning new fabrication techniques (e.g., 3D printing)'']'
  career_goals: He aims to move from a hands-on assembler role into a supervisory position, eventually becoming a production manager or operations manager at a midsize manufacturing firm. He plans to earn
    Six Sigma Green Belt and CNC programmer certifications to strengthen his credentials. Long-term, Andrew hopes to launch his own custom metal-fabrication studio that blends engineering precision with
    artistic design, creating bespoke metal art pieces for both commercial and private clients. He also seeks to mentor younger workers and lead lean-process initiatives that improve efficiency and reduce
    waste.
