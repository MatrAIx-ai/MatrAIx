personas:
  professional: Andrew Byars, a seasoned mechanical assembler with expertise in CNC machining, MIG/TIG welding, and lean manufacturing, blends his methodical reliability and artistic curiosity to lead process‑improvement
    teams while mentoring junior technicians on precision and creative problem‑solving.
  sports: Andrew Byars, an avid cyclist on Long Island’s bike paths and member of the Long Island Cycling League, follows the New York Mets and New York Knicks, and incorporates weekly spin classes and
    occasional pick‑up basketball games to keep his cardiovascular health in balance.
  arts: Andrew Byars, a frequent visitor of contemporary galleries such as the Whitney and MoMA, draws inspiration from artists like Anish Kapoor and photographer Andreas Gursky, integrates sketching of
    industrial subjects into his museum trips, and teaches metal‑working basics at community art workshops, where he also experiments with mixed‑media installations.
  travel: Andrew Byars, a methodical planner who balances work commitments with a love for industrial heritage tourism, has explored the Ruhr Valley's steel museums, visited the Ironbridge Gorge in England,
    and regularly escapes to the Hudson Valley vineyards, while eyeing a future trip to the Art Basel fair in Basel, Switzerland.
  culinary: Andrew Byars, a competent home chef, enjoys experimenting with sous‑vide ribeye, hand‑made ramen broth, and sourdough bread, frequently seasoning dishes with rosemary, sumac, and smoked paprika,
    and often sources fresh seafood from the Long Island fish markets for his weekly dinner experiments.
  core: Andrew Byars, a calm, curiosity‑driven engineer‑artist, harmonizes precision metalwork with gallery strolls, cycles to clear his mind, and meticulously saves for his dream metal‑fabrication studio
    while occasionally splurging on a new CNC router.
background:
  cultural: Andrew grew up in a middle-class white family on Long Island, raised with a strong work ethic and a deep appreciation for the cultural richness of nearby New York City. Frequent trips to city
    museums and cultural events nurtured his love of art and new ideas. His cultural identity blends traditional American values with European ancestry—often tracing roots to Irish and English forebears.
    He values community involvement, self-reliance, and lifelong learning, reflecting both his suburban upbringing and the diverse influences of the Greater New York region.
