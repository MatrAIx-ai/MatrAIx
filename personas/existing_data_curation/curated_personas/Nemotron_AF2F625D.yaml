    Cuisine'', ''Hiking Coastal Trails'', ''STEM Outreach Volunteering'', ''Improv Theatre'', ''Traveling to Explore New Cultures'']'
  career_goals: Luz aims to transition into senior program leadership where she can oversee enterprise-wide innovation initiatives that blend emerging technologies with creative design. She aspires to champion
    diversity and inclusion in tech by establishing mentorship pipelines for Latinx women in STEM and by leading community-focused outreach programs. In the longer term, Luz envisions launching her own
    consultancy that helps organizations embed artistic thinking into engineering projects, and eventually author a book on creative project leadership.
