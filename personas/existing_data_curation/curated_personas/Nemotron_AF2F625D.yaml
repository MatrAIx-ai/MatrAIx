personas:
  professional: Luz Vega is a senior program manager who merges agile project leadership, design‑thinking, and data visualization to drive enterprise‑wide innovation, channeling their boundless imagination
    and competitive edge into bold, cross‑functional tech‑design solutions while maintaining an organized yet flexible workflow.
  sports: Luz Vega stays active by dancing salsa and bomba at community festivals, hiking the Pacific coastline with the San Diego Hiking Club, and cheering on the San Diego Padres and Wave FC while occasionally
    joining weekend yoga classes for balance.
  arts: Luz Vega immerses themselves in the arts through digital paintings inspired by James Turrell’s light installations, abstract photography echoing Andreas Gursky’s scale, speculative fiction by Octavia
    Butler, philosophical debates on Simone de Beauvoir, and weekly improv workshops with a local theatre troupe.
  travel: Luz Vega prefers meticulously planned cultural trips—such as a curated tour of Cartagena’s historic alleys, a food‑focused itinerary through Osaka’s street markets, and an art‑centric weekend
    in Barcelona—while still leaving room for spontaneous salsa nights at local venues.
  culinary: Luz Vega enjoys preparing traditional dishes like arroz con gandules, mofongo, and pernil, mastering the balance of sofrito, plantains, and smoked pork, and often experiments with vibrant, beet‑root
    purée plating that merges culinary heritage with modernist gastronomy.
  core: Luz Vega fuses relentless curiosity, competitive drive, and vibrant social energy into a career that blends tech leadership with artistic intuition, all while balancing disciplined finances, proactive
    health habits, and a lively appetite for dance, cuisine, and adventure.
background:
  cultural: Emanating from a proud Puerto Rican heritage, Luz grew up in a bilingual household where Spanish and English coexisted, shaping her worldview with Caribbean warmth and resilience. Family gatherings
    centered around music, dance, and food—particularly dishes like arroz con gandules and lechón—instilled a deep appreciation for communal celebration. While she moved to Southern California for college,
    she maintains strong ties to the local Puerto Rican community, participating in festivals such as the San Diego Latino Film Festival and the annual Puerto Rican Day Parade. Her cultural roots influence
    her values of hospitality, perseverance, and a collective spirit, which she weaves into her professional collaborations and community engagements.
