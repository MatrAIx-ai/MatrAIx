  hobbies: '[''Gardening'', ''Cooking traditional New England recipes'', ''Hiking local trails'', ''Volunteering at church food pantry'', ''Reading historical fiction'', ''Knitting'']'
  career_goals: Jamie aims to advance to a regional sales director role within the next three years, overseeing multiple districts in northern New Jersey. She plans to design a mentorship program for new
    sales associates to foster consistent performance and promote internal talent growth. Balancing career progression with family life, she also seeks to maintain a stable, routine‑oriented work environment
    that supports her team's well‑being and the company's revenue goals.
