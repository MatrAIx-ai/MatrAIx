  career_goals: Donald aims to complete his GED within the next year, then enroll in a vocational training program for electrical work or automotive repair. He aspires to become a certified electrician
    or skilled mechanic, leveraging his hands‑on talent and desire for practical, tangible outcomes. He also hopes to start a small side business offering bike repairs and custom modifications for neighborhood
    youth, providing both income and a sense of community contribution.
