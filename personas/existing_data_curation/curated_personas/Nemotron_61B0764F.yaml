  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Photography walks'', ''Reading contemporary fiction and poetry'', ''Attending live music and theater performances'',
    ''Creative writing and journaling'', ''Volunteering at community art workshops'', ''Yoga and nature hiking'', ''DIY craft projects'', ''Blogging about art and culture'']'
  career_goals: Lauren aspires to build a career that merges her love of art with community development. In the short term, she aims to work as an arts program coordinator or community outreach specialist
    for a nonprofit, municipal cultural agency, or university arts center, where she can design inclusive workshops, curate pop‑up exhibitions, and foster partnerships with local artists. Over the next
    five to ten years, she hopes to advance into senior arts administration or museum curatorial roles that allow her to shape cultural programming on a larger scale. To support these ambitions, she plans
    to pursue a graduate degree in arts management or cultural studies while continuing to develop her project‑leadership and fundraising skills.
