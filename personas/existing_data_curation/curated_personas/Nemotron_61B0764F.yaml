personas:
  professional: Lauren Paneda, an emerging arts program coordinator, leverages her digital media editing, research, and event planning abilities to design inclusive pop‑up exhibitions and community workshops,
    while balancing meticulous budgeting with spontaneous creative brainstorming.
  sports: Lauren Paneda enjoys weekly hikes on Chewacla State Park trails, practices sunrise Vinyasa yoga, supports the Auburn Tigers football team and the Atlanta Braves, and occasionally joins a local
    art collective’s recreational softball league.
  arts: Lauren Paneda immerses herself in contemporary art by visiting the Birmingham Museum of Art, sketching in the minimalist style of Agnes Martin, photographing street murals, and drawing inspiration
    from musicians like Sufjan Stevens and visual artists such as Yayoi Kusama, while she writes blog reviews of emerging talents like Tschabalala Self.
  travel: Lauren Paneda prefers thoughtfully planned, culturally immersive trips, having explored New York City’s galleries, Portland’s indie coffee scene, and Edinburgh’s historic streets, while dreaming
    of a spring art residency in Kyoto and a summer festival in Barcelona within her modest travel budget.
  culinary: Lauren Paneda enjoys crafting colorful quinoa bowls with roasted beetroot, avocado, and feta, perfecting matcha latte foam at home, and indulging in seasonal farm‑to‑table dishes such as pumpkin
    risotto, though she occasionally overspends on artisanal cheese for weekend picnics.
  core: Lauren Paneda is a curious, organized 22‑year‑old who channels her love for art into community projects, balances meticulous budgeting with spontaneous creativity, and finds peace in yoga and watercolor
    while occasionally overindulging in cheese.
background:
  cultural: Lauren was raised in a middle‑class Southern family in Auburn, Alabama. Her upbringing emphasized hospitality, modesty, and a strong sense of community, shaped by regular church participation,
    neighborhood gatherings, and Southern culinary traditions. While rooted in local customs such as attending high school football games and enjoying regional music like country and folk, she was also
    exposed to broader cultural experiences through school field trips, family trips to urban art hubs, and a diverse campus environment. This blend of Southern heritage and curiosity about new ideas informs
    her appreciation for both traditional and contemporary artistic expressions.
attributes:
  skills: '[''Digital Media Editing'', ''Basic Graphic Design'', ''Photography'', ''Research and Critical Analysis'', ''Event Planning and Coordination'', ''Budget Management'', ''Volunteer Management'',
