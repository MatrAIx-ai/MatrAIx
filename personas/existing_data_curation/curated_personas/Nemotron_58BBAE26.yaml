    soulful dishes with creative twists", "Gardening", "Leading a neighborhood book club", "Organizing and dancing in an African-inspired dance circle", "Volunteering at church youth outreach programs"]'
  career_goals: Her immediate goal is to step into a school‑wide leadership role—such as curriculum coordinator or assistant principal—where she can champion arts‑based and entrepreneurship‑focused programs.
    Over the next five years, she plans to design and launch a sustainable after‑school initiative that blends visual arts, music, and basic business concepts for underserved middle‑school students in Fort
    Bend County. She also intends to pursue a master’s degree in educational leadership to deepen her administrative skills, while actively developing stress‑management practices such as mindfulness and
    counseling to better cope with her tendency toward worry.
