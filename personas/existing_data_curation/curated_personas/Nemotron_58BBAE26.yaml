personas:
  professional: Beverly Wodi, a veteran middle‑school teacher with a business degree, blends financial literacy and the arts into interdisciplinary curricula, leveraging their curiosity and relaxed planning
    style to experiment with project‑based learning while navigating occasional disorganization to mentor new teachers and champion school‑wide arts‑entrepreneurship initiatives.
  sports: Beverly Wodi enjoys cheering for the Houston Rockets and Houston Astros, participates in a local community dance circle that blends line dancing with African rhythms, and occasionally joins a
    weekend Zumba class at the community center, balancing their love of social activity with a preference for low‑impact movement.
  arts: Beverly Wodi immerses themselves in spoken‑word poetry nights, jazz sessions featuring legends like John Coltrane and Grammy‑winning vocalist HER, and curates museum visits to the Houston Museum
    of Fine Arts, allowing their curiosity and outgoing nature to fuel a lifelong passion for storytelling through art.
  travel: Beverly Wodi prefers culturally rich trips that blend music, food, and history—such as a jazz pilgrimage to New Orleans, a culinary tour of Oaxaca, and a weekend getaway to Savannah’s historic
    squares—while planning them flexibly on a modest budget and often traveling with friends from the book club to offset costs.
  culinary: Beverly Wodi loves reinventing classic soul dishes like collard greens with smoked paprika, shrimp and grits with a Caribbean twist, and sweet‑potato pie infused with cinnamon and ginger, cooking
    at an intermediate skill level in their modest kitchen while frequently sharing meals at community potlucks.
  core: Beverly Wodi is a community‑focused educator whose curiosity fuels creative learning, yet their relaxed planning and lingering worry often lead to charmingly chaotic projects and spontaneous art‑filled
    gatherings.
background:
  cultural: Beverly is an African‑American woman who grew up in the culturally rich tapestry of Houston, Texas. Her upbringing was shaped by Black church traditions, gospel music, and Southern soul food,
    while the city’s diverse neighborhoods exposed her to Latino, Caribbean, and Asian influences. She values community stewardship, storytelling, and resilience—hallmarks of her heritage—and she actively
    weaves these elements into her classroom by highlighting Black history, African diaspora contributions, and inclusive cultural perspectives. Her family’s emphasis on education and civic involvement
    inspires her to mentor students and forge partnerships that reflect the multicultural reality of Fort Bend County.
