  hobbies: '[''Reading nature and science‑fiction books'', ''Building LEGO sets and STEM kits'', ''Birdwatching and nature hikes'', ''Sketching wildlife and landscapes'', ''Playing piano (beginner)'', ''Scratch
    coding projects'', ''Jigsaw puzzles and logic puzzles'', ''Collecting rocks and minerals'', ''Stargazing'', ''Journaling and mindfulness breathing exercises'']'
  career_goals: Phillip dreams of a future where he can combine his love for nature with practical problem‑solving. He aspires to become a wildlife biologist or conservation scientist who spends quiet hours
    in the field observing animals and later analyzing data on a computer. He also imagines developing simple software tools that help monitor ecosystems, blending his early coding skills with environmental
    stewardship. While he values kindness and helping others, he hopes to work in settings that allow solitary focus—such as a research lab or field station—so he can contribute meaningfully without the
    stress of constant social interaction.
