  hobbies: '[''Playing with LEGO/Duplo'', ''Reading picture books about animals and science'', ''Drawing and coloring'', ''Exploring nature (collecting leaves, watching insects)'', ''Listening to calm music'',
    ''Solving puzzles and matching games'', ''Caring for a family pet'']'
  career_goals: Billy dreams of becoming a wildlife biologist who can study animals in their natural habitats and protect them, using his curiosity and practical problem‑solving. He also imagines designing
    simple inventions that make everyday tasks easier for his family. His ultimate ambition is to have a career that allows him to help others, work in calm, low‑stress environments, and apply his love
    of observation and kindness.
