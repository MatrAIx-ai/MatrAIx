personas:
  professional: Billy White is a budding little scientist who loves building block experiments in preschool, and they balance curiosity with practicality by following simple step‑by‑step instructions while
    also improvising new structures.
  sports: Billy White dabbles in Little Kickers soccer and Saturday gymnastics at City Gym, cheering for the local baseball team the Springfield Sluggers, and they prefer short bursts of energetic play
    over organized drills, often racing to the playground slide for a quick sprint.
  arts: Billy White delights in finger‑painting dinosaurs while listening to children's musician Raffi and watching Pixar’s Toy Story, and they eagerly reenact scenes from the movies, drawing inspiration
    from the vibrant colors and whimsical storytelling.
  travel: Billy White has explored the nearby beach town of Ocean Shores with their family, marveled at the desert rocks on a road trip to the Grand Canyon, and they dream of a future visit to Disneyland,
    preferring short car rides with familiar snacks but feeling uneasy when routines change abruptly.
  culinary: Billy White loves homemade mac and cheese, chicken nuggets with ketchup, and strawberry slices, and they can stir batter for banana pancakes with an earnest seriousness, though they often forget
    to wash their hands before eating.
  core: Billy White is a quiet, imaginative child who balances curiosity with practicality, yet often worries about tiny changes, prefers solitary play, and insists on keeping a tidy line of crayons.
background:
  cultural: Billy comes from an African‑American family rooted in Houston’s vibrant East End community. Family life includes warm gatherings at church, storytelling traditions, and soulful music that influence
    his quiet imagination. He has attended local cultural events such as Juneteenth celebrations and visits the Houston Museum of Natural Science with his parents, sparking his interest in wildlife. Home
    meals blend Southern comfort foods like collard greens and gumbo with an emphasis on sharing and caring. These cultural experiences foster a sense of resilience, community responsibility, and appreciation
    for both quiet reflection and collective harmony.
attributes:
  skills: '[''Basic reading (letter recognition)'', ''Counting and simple addition'', ''Fine motor skills (drawing, cutting)'', ''Spatial reasoning (building block structures)'', ''Observational skills
