persona_description: A healthcare professional who is concerned about the state of public health services and civic services in India. They are particularly interested in the management of bacterial diseases
  such as leptospirosis and the role of the National Institute of Communicable Diseases in confirming the disease. They are aware of the impact of poor sanitation on the spread of the disease and the need
  for better guidelines for doctors to handle leptospirosis patients. They are also aware of the importance of preventing the clogging of drains and the need for better sanitation practices in coastal areas.
