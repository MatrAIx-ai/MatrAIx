  hobbies: '[''Hiking in the Pine Barrens'', ''Historical architecture photography'', ''DIY woodworking projects'', ''Reading historical non-fiction and philosophy'', ''Participating in a local book club'',
    ''Playing recreational basketball'', ''Volunteering with the West Islip Historical Society'', ''Exploring emerging construction technologies (BIM, modular construction)'', ''Attending craft-beer and
    farm-to-table festivals'']'
  career_goals: Jerry aims to advance to a senior project executive or director-level role within a large development firm, overseeing mixed-use projects that incorporate green building standards. He plans
    to earn the Project Management Professional certification and become a LEED Accredited Professional, positioning himself as a leader in sustainable construction and historic preservation. Within the
    next five years, he hopes to manage a flagship waterfront development on Long Island, mentor junior tradespeople, and eventually launch his own consulting practice focused on integrating cutting-edge
    technologies such as Building Information Modeling with traditional construction methods.
