personas:
  professional: Jerry King is a construction manager who applies a methodical, humanities-informed approach to overseeing multi-family and commercial projects, blending rigorous budget control and code
    compliance with a passion for sustainable practices and historic preservation, and they consistently translate their curiosity into innovative solutions on site.
  sports: Jerry King plays pickup basketball at the West Islip community center, cheers on the New York Knicks and the Long Island Nets, and follows the New York Islanders, and they channel the energy from
    the court into disciplined weekend hikes through the Pine Barrens and along the South Shore boardwalks as a way to stay fit and recharge.
  arts: Jerry King captures the weathered facades of historic Long Island homes through black-and-white photography inspired by Ansel Adams, attends local gallery openings featuring artists like Shepard
    Fairey, and they enjoy listening to Sufjan Stevens and the Avett Brothers while their book club discusses works by Mary Beard and Marcus Aurelius, weaving art and philosophy into their leisure.
  travel: Jerry King plans weekend getaways that balance solitary hikes in the New Jersey Pine Barrens with cultural excursions to Boston’s Freedom Trail and a tasting tour of Vermont’s farm-to-table breweries,
    preferring modestly priced Airbnb stays and meticulous itineraries that leave room for impromptu photography sessions, and they occasionally dream of a longer trip to Italy to study Renaissance architecture.
  culinary: Jerry King favors farm-to-table meals such as roasted chicken with rosemary, fresh Long Island clams, and blueberry-infused cheesecake, enjoys pairing them with locally brewed IPAs, and they
    often cook on a reclaimed wooden cutting board while experimenting with seasonal vegetables like heirloom tomatoes and kale, reflecting a palate that values local ingredients and craftsmanship.
  core: Jerry King is a detail-oriented construction executive who merges a love for historic architecture, solo hikes, DIY woodworking, and craft-beer festivals into a balanced life of disciplined work
    and occasional creative indulgence, and they relish the chance to apply both methodical planning and spontaneous curiosity.
background:
  cultural: Jerry Stewart King is a 36-year-old white male who was raised in the suburban community of West Islip on Long Island. He comes from a middle-class family with Irish-American roots, where a strong
    work ethic and community involvement were emphasized. Growing up he attended local public schools, spent summers on the South Shore and in the Pine Barrens, and was involved in community sports and
    scouting, which fostered his appreciation for teamwork and the outdoors. His bachelor's degree in the humanities, earned at a state university, nurtured a curiosity about history, culture, and ethical
    perspectives, which now informs his approach to construction, especially in historic preservation projects. While his cultural outlook reflects mainstream American values of self-reliance and modesty,
    his liberal arts education and exposure to the diverse population of Suffolk County have kept him open-minded and respectful of varied viewpoints.
attributes:
  skills: '[''Construction Project Management'', ''Budget Forecasting'', ''Team Leadership'', ''Safety Compliance'', ''Contract Negotiation'', ''Blueprint Interpretation'', ''Construction Scheduling Software
