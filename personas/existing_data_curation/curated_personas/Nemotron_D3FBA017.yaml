  career_goals: Maurice aims to become a Certified Public Accountant within the next two years, positioning himself for a senior accountant role at a mid‑size firm. He is driven to lead a finance team,
    spearhead efficiency projects, and eventually transition into a finance manager or CFO position where he can shape strategic financial planning. Long‑term, he envisions launching his own boutique bookkeeping
    consultancy that serves small businesses and community organizations in Detroit, providing culturally aware financial guidance and mentorship to emerging African American professionals in the field.
