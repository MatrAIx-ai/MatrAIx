personas:
  professional: Lisa Nettuno, a seasoned library instructional designer with a STEM background and decades of experience facilitating information literacy workshops, combines methodical project coordination
    with a charismatic, talk‑show‑style delivery that energizes community participants and drives the development of a future MakerSpace in Scottsdale.
  sports: Lisa Nettuno fuels their fitness regimen with weekly Sonoran Desert hikes, sunrise yoga classes, and membership in the local Scottsdale Hiking Club, cheering on the Arizona Diamondbacks and the
    Phoenix Suns while joining community 5K runs each spring.
  arts: Lisa Nettuno immerses themselves in community theater, often starring in productions of Arthur Miller’s "Death of a Salesman" and directing book‑club discussions about Octavia Butler’s "Kindred",
    while their playlists feature Tori Amos and the Lin Manuel‑inspired score of the Arizona Symphony.
  travel: Lisa Nettuno prefers meticulously planned road trips that blend desert adventure with cultural enrichment, having trekked the Grand Canyon, explored Sedona’s red rocks, and attended a Broadway
    show in New York, while dreaming of a pilgrimage to Kyoto’s historic temples.
  culinary: Lisa Nettuno enjoys moderate‑skill cooking that highlights native desert ingredients like prickly pear, nopales, and sage, regularly preparing quinoa‑cactus salad with lime‑coriander dressing,
    while indulging in spicy fish tacos and occasional experimental fermentation projects.
  core: Lisa Nettuno is a methodical, sociable library leader whose love for desert hikes, community theater, and meticulous planning coexists with a persistent undercurrent of anxiety that drives both
    their ambition and occasional impulsive splurges.
background:
  cultural: Lisa grew up in a middle‑class, predominantly white suburb of Phoenix, Arizona, where family gatherings and church activities emphasized community, cooperation, and service. The Southwest’s
    blend of desert landscapes, Native American heritage, and a growing tech scene shaped her appreciation for both tradition and innovation. Her cultural identity reflects a blend of Midwestern familial
    values and the progressive, outdoors‑oriented lifestyle of metropolitan Arizona, fostering a strong sense of civic responsibility and a love for lifelong learning.
attributes:
  skills: '[''Instructional Design'', ''Information Literacy Instruction'', ''Curriculum Development'', ''Digital Resource Management'', ''Data Analysis'', ''Research Support'', ''Cataloging'', ''Public
    Speaking'', ''Event Planning'', ''Community Outreach'', ''Team Leadership'', ''Project Coordination'', ''Problem Solving'']'
  hobbies: '[''Hiking'', ''Yoga'', ''Reading (Science Fiction, Historical Nonfiction)'', ''Book Club Participation'', ''Community Theater Acting'', ''Gardening (Native Desert Plants)'', ''STEM Outreach
    Volunteering'', ''Photography'', ''Cooking Southwestern Cuisine'']'
  career_goals: Lisa aims to transition into a senior leadership role within the Scottsdale public library system, such as Branch Manager or Director of Learning Services. She envisions creating a state‑of‑the‑art
    MakerSpace that integrates STEM concepts with community education, securing grant funding to expand digital learning initiatives, and mentoring emerging library professionals. Additionally, she plans
    to pursue a Master of Library and Information Science to deepen her expertise and to position herself as a regional thought leader in information literacy and lifelong learning.
