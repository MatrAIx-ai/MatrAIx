  hobbies: '[''Basketball'',''Hip-hop dance'',''Karaoke'',''Church choir'',''Fashion blogging'',''Southern cooking'',''Community center volunteering'',''Competitive video gaming'',''Reading self-help books'',''Organizing
    youth sports'']'
  career_goals: Charmaine aims to turn her sociable energy and organizational talent into a career in community engagement and event management. She plans to complete a bachelor's degree in communications
    or business administration within the next three years, then seek a role as a community outreach coordinator for a nonprofit serving youth in Pike County. Long-term, she envisions launching her own
    boutique event-planning firm that specializes in culturally relevant gatherings—such as church festivals, local music showcases, and youth empowerment workshops—while also mentoring other young black
    women who want to develop professional skills. Financial independence and the ability to shape positive community experiences drive her ambition.
