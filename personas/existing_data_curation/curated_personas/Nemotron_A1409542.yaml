  career_goals: Carina aspires to graduate high school with strong academic standing and pursue a bachelor's degree in either nursing or elementary education, fields where she can combine her practical
    curiosity with a deep desire to help others. In the long term, she envisions working as a pediatric nurse or an elementary school teacher, providing consistent support and guidance to children. She
    also hopes to lead community service initiatives in Urbandale, such as organizing food‑drive campaigns or after‑school tutoring programs, and aims to develop leadership experience by joining the student
    council and starting a peer‑support group during her high school years.
