personas:
  professional: Carina Spencer is a diligent high‑school junior who channels her curiosity for fantasy world‑building and methodical garden stewardship into a budding interest in sustainable urban design,
    often sketching eco‑friendly community layouts after school while balancing school assignments with volunteer projects at the county fair.
  sports: Carina Spencer enjoys weekend hikes on the Des Moines River Trail, participates in a youth cross‑country club, supports the Iowa Hawkeyes football and Iowa Cubs baseball teams, and joins a community
    ultimate frisbee league, reflecting a balanced love of nature, team spirit, and personal fitness.
  arts: Carina Spencer spends evenings sketching woodland scenes while listening to Sufjan Stevens and Joe Hisaishi, follows the animated works of Studio Ghibli and Hayao Miyazaki, collects prints of Miyazaki’s
    films, and practices ukulele renditions of indie folk songs, weaving together visual art, music, and storytelling into their creative identity.
  travel: Carina Spencer prefers low‑key nature getaways, meticulously plans family trips to Iowa’s Ledges State Park and Cedar Rapids, dreams of backpacking through Yellowstone and the Grand Canyon, and
    harbors a secret wish to visit Kyoto’s cherry blossoms after immersing themselves in Japanese folklore through books and games.
  culinary: Carina Spencer loves fresh garden produce, often prepares a simple zucchini ratatouille with basil and tomato, bakes blueberry oat muffins, experiments with mint‑lavender herbal tea, yet they
    habitually over‑season dishes with excess salt while striving for balanced, wholesome meals.
  core: Carina Spencer is a methodical, nature‑loving teen whose curiosity fuels endless sketchbooks, yet they habitually forgo sleep for late‑night Minecraft builds and fantasy novels, leaving a trail
    of half‑finished crafts across their room.
background:
  cultural: Carina comes from a Midwestern white family with roots in the agricultural heritage of Iowa, tracing ancestry to German and Irish immigrants who settled in the region generations ago. Growing
    up in Urbandale, a suburb of Des Moines, she attended a local public middle school and participates in community activities such as her church youth group and the annual county fair. The local culture
    emphasizes modesty, self‑reliance, community cooperation, and a strong connection to the natural environment. These values shape Carina’s pragmatic outlook, her commitment to helping neighbors, and
    her appreciation for both tradition and modest innovation.
