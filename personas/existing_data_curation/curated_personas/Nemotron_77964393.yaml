personas:
  professional: Teresa Tien, a 17-year-old high school senior with a passion for mental-health advocacy, uses their organized, talkative nature to lead peer-counseling sessions, coordinate community bake-sale
    fundraisers, and produce TikTok videos that blend humor with coping strategies.
  sports: Teresa Tien, a 17-year-old who enjoys playing volleyball on the beach during the summer, participates in the Lutz Youth Soccer Club in the fall, follows the Tampa Bay Buccaneers and the Orlando
    Magic, and maintains a disciplined home-workout routine of yoga and cardio to balance their high-energy social calendar.
  arts: Teresa Tien, a 17-year-old avid reader of contemporary YA fiction and fan of artists like Olivia Rodrigo and Taylor Swift, channels creativity through short TikTok sketches, occasional roles in
    Pasco County Community Theater productions, and weekend visits to the Straz Center for the Performing Arts.
  travel: Teresa Tien, a 17-year-old who dreams of road-tripping the Florida Gulf Coast to the Keys, has already visited Disney World and the historic St. Augustine town, and plans future trips to New Orleans
    for its music festivals and to a European capital to explore ancestral roots, preferring carefully planned itineraries balanced with spontaneous photo-journalism stops.
  culinary: Teresa Tien, a 17-year-old home-cook who enjoys whipping up simple crowd-pleasing dishes like tacos with fresh cilantro and lime, baked mac and cheese with a crunchy breadcrumb topping, and
    strawberry shortcake for bake-sale events, relies on basic ingredients such as garlic, basil, and cheese while constantly experimenting with TikTok-inspired snack hacks.
  core: Teresa Tien, a 17-year-old organized talker whose curiosity fuels community-focused mental-health projects, yet who wrestles with intense anxiety that drives both meticulous planning and occasional
    sleepless spirals.
background:
  cultural: Teresa grew up in Lutz, a suburban community in Pasco County, Florida, within a family of European‑American descent (primarily Irish and German ancestry). Her upbringing reflects a blend of
    traditional middle‑American values—emphasis on family, community involvement, and self‑reliance—and the multicultural vibrancy of Florida’s Gulf Coast. She attended a local public elementary school
    and participated in church‑based youth groups, which instilled a sense of service and fellowship. The warm, laid‑back Florida lifestyle, with its outdoor activities and seasonal festivals, has shaped
    her love for community gatherings. While her cultural heritage leans toward White American customs, Teresa is also aware of the diverse cultural fabric of her region, fostering an inclusive outlook
    that influences her interest in mental‑health advocacy for all teens.
