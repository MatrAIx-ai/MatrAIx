  career_goals: Teresa aims to channel her organizational talent and sociable nature into a career that helps others navigate emotional challenges. In the near term, she plans to earn her GED and enroll
    in a community‑college program focused on psychology or social work. She aspires to become a certified mental‑health peer counselor and later a licensed therapist, hoping to create safe spaces for adolescents.
    Simultaneously, she wants to develop a platform—through a blog or a YouTube channel—dedicated to mental‑health awareness, where she can share coping strategies and foster community. Teresa also envisions
    working in event management for non‑profit organizations, blending her love for coordinating events with her desire to support causes that promote youth wellbeing. Her long‑term ambition is to open
    a community center in Lutz that offers counseling, workshops, and social‑event programming for teens.
