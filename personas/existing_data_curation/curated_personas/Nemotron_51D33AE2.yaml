  career_goals: Rhonda hopes to transition into an instructional leadership role within the next five years, targeting a position as a curriculum specialist or assistant principal. She plans to pursue certification
    in educational administration and to complete a doctoral program focused on equity‑focused school improvement. A core ambition is to design and launch an after‑school mentoring program that supports
    Black and at‑risk youth in Burlington County, blending academic enrichment with cultural affirmation. Additionally, she aspires to author a resource guide on integrating restorative practices into suburban
    schools, thereby sharing her expertise beyond her own district.
