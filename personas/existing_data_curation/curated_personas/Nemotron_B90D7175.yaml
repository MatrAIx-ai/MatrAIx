  career_goals: Approaching retirement, Markus aims to transition into a consultancy role that lets him share his practical knowledge while maintaining a familiar routine. He plans to mentor younger professionals,
    especially within local firms and the Charlotte chapter of the American Institute of Architects. Additionally, he hopes to contribute to community‑focused projects, such as affordable housing initiatives
    with Habitat for Humanity, and to document his experiences in a memoir that highlights mid‑century architectural practices in the Southeast. His ambitions are grounded, seeking recognition for a lifetime
    of reliable, high‑quality work rather than dramatic career shifts.
