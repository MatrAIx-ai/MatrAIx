  career_goals: Marc aspires to merge his love for art and technology by becoming a multimedia artist or video game developer who creates experiences that bring people together. He dreams of designing interactive
    stories that inspire curiosity and empathy, and eventually mentoring younger peers in creative coding and visual arts. While his imagination drives ambitious creative goals, he also hopes for a stable
    career that allows him to support his family and reduce the anxiety he sometimes feels about the future.
