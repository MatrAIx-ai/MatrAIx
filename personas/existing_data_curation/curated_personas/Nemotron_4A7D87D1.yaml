personas:
  professional: Marc Stonebraker, a budding digital artist and junior game concept designer, channels their curiosity and love for art into weekly sketch sessions and early-stage Minecraft mod development,
    balancing meticulous planning with spontaneous experimentation, thriving in collaborative school projects while occasionally overthinking feedback.
  sports: Marc Stonebraker, a dedicated youth soccer midfielder for the Peachtree City Strikers and avid cyclist on the city’s greenways, balances weekly practices with watching Atlanta United FC matches
    and cheering for the Atlanta Falcons during football season, though they sometimes skip warm‑ups when excitement runs high.
  arts: Marc Stonebraker, who spends afternoons sketching anime‑inspired characters and practicing piano pieces by Yiruma and John Williams, frequently attends local museum workshops featuring exhibitions
    of works by Banksy and the National Gallery’s Renaissance collection, and draws inspiration from Lin‑Manuel Miranda’s Hamilton, weaving these influences into their own school theatre roles.
  travel: Marc Stonebraker, who prefers family‑planned road trips blended with spontaneous day‑long bike excursions, has toured the Georgia Aquarium and visited Washington D.C.’s Smithsonian museums with
    their parents, and dreams of a future summer pilgrimage to Kyoto’s Fushimi Inari to see the anime culture that fuels their digital art, though their allowance limits lengthy overseas travel.
  culinary: Marc Stonebraker, an enthusiastic beginner cook, loves crafting homemade pepperoni pizza on a family‑owned stone oven and experimenting with sushi rolls featuring avocado, cucumber, and tobiko
    after watching tutorial videos, while also indulging in classic comfort foods like mac & cheese and strawberry shortcake during weekend family meals.
  core: Marc Stonebraker, a curiosity‑driven 12‑year‑old who balances relentless LEGO building and digital sketching with occasional over‑worry about school grades, often forgets to finish homework before
    bedtime but never misses a soccer practice.
background:
  cultural: Marc grows up in Peachtree City, a planned suburban community in Fayette County, Georgia, where family‑oriented activities and outdoor recreation are common. His household reflects a typical
    Southern‑American upbringing, emphasizing politeness, community involvement, and a respect for local traditions such as seasonal festivals and volunteer events. While his ethnic background is white,
    his family’s heritage includes a mix of European roots, and they celebrate a blend of cultural customs, from holiday gatherings to backyard barbecues. The region’s strong public school system, access
    to green spaces, and proximity to Atlanta’s arts scene provide Marc with diverse cultural experiences that shape his open‑minded and creative outlook.
