personas:
  professional: Thi Pham, a budding LEGO architect and fantasy storyteller, blends curiosity with methodical planning to design intricate LEGO castles and sketch detailed characters, hinting at an early
    passion for engineering and narrative design while maintaining a calm, organized work ethic.
  sports: Thi Pham, an enthusiastic member of the Bellevue Youth Soccer League and fan of the Nebraska Cornhuskers men's soccer team, practices drills with friends at the local park, values team harmony,
    and balances active play with careful warm-ups to avoid injuries.
  arts: Thi Pham, a dedicated piano student who loves playing Debussy’s ‘Clair de Lune,’ an avid sketcher inspired by Hayao Miyazaki’s film art and the illustrations of Brian Froud, spends evenings drawing
    fantasy creatures, and frequently reads J.K. Rowling’s Harry Potter series for creative spark.
  travel: Thi Pham, a curious young explorer who has visited Chicago’s Museum of Science and Industry and the family’s beach trip to Gulf Shores, dreams of seeing the lantern festivals of Taiwan and the
    ancient temples of Kyoto, while planning future trips around school breaks and parents’ budgeting constraints.
  culinary: Thi Pham, a hands‑on kitchen helper, enjoys preparing bánh chưng with family during Tet, skillfully rolls rice leaves and stuffs sticky rice with mung beans, also loves helping bake chocolate
    chip cookies and experimenting with making homemade pizza dough, showcasing an intermediate cooking talent.
  core: Thi Pham, a meticulous 9‑year‑old who balances building LEGO fortresses with piano practice, worries about small details, loves drawing dragons, and finds calm in family traditions and structured
    routines.
background:
  cultural: Thi Thanh is a Vietnamese‑American growing up in Bellevue, Nebraska. Her household speaks Vietnamese at home and celebrates cultural traditions such as Tet, lantern festivals, and cooking family
    recipes, while she also embraces Midwestern American customs like school sports and community fairs. Her parents encourage bilingual education and respect for both her heritage and the local community,
    fostering a strong sense of cultural pride and adaptability.
