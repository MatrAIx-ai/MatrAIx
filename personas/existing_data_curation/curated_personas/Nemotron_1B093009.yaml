  career_goals: She hopes to become a veterinarian because she loves caring for her neighborhood pets and wants to help animals stay healthy. She also dreams of designing helpful inventions as an engineer,
    inspired by the way LEGO pieces fit together. While she is ambitious, she sometimes worries about meeting expectations and works hard to maintain high grades so she can achieve her long‑term goals.
