  career_goals: Alexander aims to advance to a regional IT Director role, overseeing technology strategy for a health‑care network or municipal government in the Pacific Northwest. He plans to earn the
    CISSP certification and an AWS Solutions Architect Professional credential to deepen his security and cloud expertise. His ambition includes leading a comprehensive digital transformation that modernizes
    legacy systems, enhances remote‑work capabilities, and strengthens cybersecurity posture. Additionally, he seeks to mentor emerging IT talent and cultivate a workplace culture centered on reliability,
    teamwork, and employee well‑being.
