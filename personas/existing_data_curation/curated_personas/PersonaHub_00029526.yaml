persona_description: A cardiologist who specializes in the diagnosis and treatment of arrhythmias and other heart rhythm disorders, particularly those involving the lower chambers of the heart. They are
  familiar with the symptoms and mechanisms of pacemaker syndrome and are trained to recognize and treat it. They may also have experience with other rhythm disturbances that can cause similar symptoms,
  and they are skilled in the use of pacemakers and defibrillators to manage these conditions.
