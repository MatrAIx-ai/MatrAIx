persona_description: A researcher working in the field of climate change adaptation for the European agricultural sector, specifically focusing on vulnerability assessments and developing methodologies
  for adaptation. This individual is part of the AVEMAC project within the European Commission's Joint Research Centre, collaborating with other research institutes such as AGRI4CAST, GeoCAP, AGRI-ENV,
  and AGRITRADE. The persona is highly specialized in the analysis of agricultural systems' vulnerability to changing climatic conditions and the development of policy options to support adaptation. They
  are likely to have expertise in biophysical modelling, agro-meteorological indicators, and the assessment of crop responses to climate change.
