personas:
  professional: Cecilia Scott, a miniature organizer who meticulously lines up building blocks in predictable patterns and takes the lead in pretend “office” play, channeling their practical, structured
    mindset into early leadership experiments.
  sports: Cecilia Scott, a budding sports enthusiast who attends weekly toddler gymnastics classes, proudly wears a mini jersey of the local soccer team "Little Strikers FC", and cheerfully waves at the
    nearby professional baseball team the "Springfield Sluggers" during spring games.
  arts: Cecilia Scott, an avid early arts admirer who sings along to The Wiggles, dances to Disney's "Frozen" soundtrack, watches Sesame Street with delight, and enjoys picture books illustrated by Eric
    Carle, especially "The Very Hungry Caterpillar".
  travel: Cecilia Scott, a curious explorer who recently delighted in a family trip to Disney World in Orlando, loves the sensory adventure of the Monterey Bay Aquarium, and dreams of toddling through the
    gardens of Versailles in France during a future vacation.
  culinary: Cecilia Scott, a selective eater who adores warm banana pancakes topped with a drizzle of maple syrup, prefers soft steamed carrots and apple slices, but consistently refuses peas, broccoli,
    and any spicy flavors, making snack time a predictable ritual.
  core: Cecilia Scott, a structured yet highly sociable toddler who lines up toys in perfect rows, chats nonstop, shares generously, but sighs loudly at bedtime and throws tiny tantrums when routines are
    disrupted.
background:
  cultural: Cecilia is being raised in the vibrant, multicultural city of Austin, Texas. Although her family background is white, she is exposed to the city’s diverse music scene, outdoor festivals, and
    a community that values inclusivity. She attends a local community preschool where she interacts with children from many ethnic backgrounds, participates in family outings to parks and lakes, and experiences
    local traditions such as July 4th fireworks, community farmer’s markets, and citywide art events, fostering an early appreciation for cultural diversity and community engagement.
