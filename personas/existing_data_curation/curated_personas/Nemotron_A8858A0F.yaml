  hobbies: '[''dancing to music'', ''playing with dolls'', ''building block towers'', ''exploring playgrounds'', ''storytime at the library'', ''singing nursery rhymes'']'
  career_goals: Through imaginative play, Cecilia frequently pretends to be a caregiver, a teacher, or a community helper. She often says she wants to "take care of people" and sometimes declares she will
    be a "big doctor" when she grows up. These early aspirations reflect her compassionate nature and desire for a future role that involves nurturing, supporting, and helping others.
