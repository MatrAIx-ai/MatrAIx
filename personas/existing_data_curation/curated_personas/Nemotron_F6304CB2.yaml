    safety'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and travel journaling'', ''Cooking traditional Mexican cuisine'', ''Hiking desert and mountain trails'', ''Landscape photography'', ''Reading
    historical biographies and science literature'', ''Yoga and meditation'', ''Small‑group board game nights'', ''Volunteering at community health fairs'']'
  career_goals: Ana aims to deepen her impact on regional health delivery by advancing her education and certification, and stepping into senior leadership. She plans to earn a bachelor’s degree in health
    administration, followed by a Certified Professional in Healthcare Quality (CPHQ) credential. In the next five years she envisions moving into a director‑level role, overseeing multiple clinics or a
    hospital network in Southern Arizona. Her long‑term ambition is to launch a culturally tailored telehealth program that expands access for underserved Mexican‑American families in Tucson and surrounding
    rural areas, while mentoring emerging female health managers.
