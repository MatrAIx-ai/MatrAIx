  career_goals: Narendranath dreams of turning his sociable nature and online creativity into a career as a digital content creator or community influencer. He envisions building a YouTube or TikTok channel
    that showcases a mix of humor, cultural stories, and teen life in Newark, eventually partnering with local businesses or non‑profits to promote youth initiatives. In the longer term, he hopes to study
    communications, media studies, or psychology in college, aiming to combine his empathy and public‑speaking talent with a deeper understanding of audience engagement.
