persona_description: A Norwegian researcher and scientist who is particularly interested in the use of Earth observation satellites for marine and polar research. They are familiar with the work of ESA's
  Earth observation programmes for marine and polar research and have a high profile in ESA's Earth observation programmes for marine and polar research. They are also interested in using data from satellites
  for various purposes, including monitoring marine traffic, fishery resources, maritime boundaries, detecting oil spills, and mapping ice and icebergs. They are also interested in using data from satellites
  for various purposes, including monitoring the cryosphere, developing services for monitoring the cryosphere, and studying how information from satellites can provide a clearer picture of soil moisture
  in Norway and the High North.
