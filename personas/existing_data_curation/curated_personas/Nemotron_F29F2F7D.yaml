  career_goals: Frederick dreams of a future where he can help others while staying active and engaged. He often talks about becoming a firefighter because he admires the hands-on work, the teamwork, and
    the clear routine of responding to emergencies. He also imagines himself as a soccer player for his school or a local club, feeding his competitive nature. After hours spent tinkering with Scratch,
    he sometimes says he might design video games one day. Growing up near fields and woods, he has expressed interest in protecting the environment as a park ranger or wildlife conservationist. These aspirations
    blend his love for practical, community-oriented roles with his desire for dynamic, action-driven challenges.
