  career_goals: Marcia aims to become a recognized thought leader at the intersection of creativity and career development. She plans to publish a book that outlines a novel, art‑inspired framework for
    career planning, and to launch a boutique consultancy that serves artists, writers, and other humanities professionals seeking sustainable career pathways. She also envisions leading a citywide initiative
    to embed arts‑based guidance into New York public schools, securing a fellowship from the National Career Development Association, and mentoring the next generation of counselors through a structured
    training program. In the longer term, she hopes to develop an interactive online platform that leverages her interdisciplinary expertise to help users explore unconventional career trajectories.
