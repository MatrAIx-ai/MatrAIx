personas:
  professional: Elizabeth Olivier, a three‑year‑old budding architect, builds block towers with precise symmetry while flexibly rearranging them during play, showcasing a practical love for structure, a
    relaxed approach to planning, and a competitive drive to have the tallest tower in the room, and they proudly declare each new height.
  sports: Elizabeth Olivier dabbles in toddler soccer with the Little Lions Juniors, enjoys rhythmic kindergarten gymnastics at the local community center, and cheers for the hometown baseball team, the
    River City Runners, while competitively racing to be the first down the slide, displaying a blend of structured team play and spontaneous fun.
  arts: Elizabeth Olivier loves coloring with Crayola crayons, especially drawing unicorns and rainbows, sings along to The Wiggles and Disney’s 'Let It Go' from Frozen, and frequently reenacts scenes from
    the show 'Bluey,' illustrating a vivid imagination, a critical eye for detail, and a competitive urge to perfect every performance.
  travel: Elizabeth Olivier prefers predictably scheduled road trips with snack breaks, yet delights in surprise visits to the local zoo, and has already set their sights on a family vacation to Disneyland
    in California, blending structured itineraries with a love for unexpected animal encounters.
  culinary: Elizabeth Olivier favors crunchy chicken nuggets, creamy mac and cheese, and sweet banana slices, skillfully dips apple pieces into peanut butter, but consistently rejects broccoli, revealing
    a selective palate driven by practicality and a competitive desire to finish meals first.
  core: Elizabeth Olivier is a structure‑loving, competitive three‑year‑old who balances meticulous block building with spontaneous sticker trades, all while maintaining an emotionally stable, easy‑going
    temperament.
background:
  cultural: Elizabeth is raised in a White, middle‑class family in Buffalo, New York. Her upbringing reflects the seasonal rhythms of the Great Lakes region, with snowy winters, lake‑front summer outings,
    and participation in community traditions such as the Buffalo Thanksgiving Parade, holiday celebrations, and local preschool events. Her family observes typical American customs while also exposing
    her to the city’s multicultural festivals, giving her a broad yet locally rooted cultural experience.
attributes:
  skills: '["basic sentence formation", "following simple routines", "color and shape sorting", "block building", "fine‑motor coordination", "early puzzle solving"]'
