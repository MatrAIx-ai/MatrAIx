  career_goals: At three years old, Elizabeth often talks about wanting to become a teacher who reads stories to a class or a veterinarian who cares for animals she sees at the local zoo. She frequently
    declares she wants to be "the best at building the tallest tower" or "the fastest runner at the playground," reflecting a budding competitive streak and a desire to excel in activities she enjoys.
