personas:
  professional: Orlando Encarnacion, a 73‑year‑old community artist and self‑taught handyman, blends decades of carpentry, metalworking, and oral storytelling into a large mural for the local community
    center that fuses traditional folk motifs with contemporary abstract forms, and they also mentor youth in folk art while compiling a handwritten memoir of family legends.
  sports: Orlando Encarnacion, an avid fan of the Rio Grande Valley FC Toros soccer team and a seasonal supporter of the Houston Astros, participates in a local senior walking club that meets weekly at
    the community park, occasionally tries gentle pickleball at the recreation center, and they prefer low‑impact exercise that lets them admire the neighborhood garden while staying active.
  arts: Orlando Encarnacion, a 73‑year‑old oil painter and sketcher, draws inspiration from folk muralists like Diego Rivera, admires the surrealist introspection of Frida Kahlo, enjoys listening to Latin
    jazz legends such as Tito Puente and Dexter Gordon while repairing vintage radios, and they regularly contribute art to intimate gallery gatherings where they share poetry and stories.
  travel: Orlando Encarnacion, a retired handyman‑artist, prefers slow, small‑group road trips that let them revisit nostalgic stops like the historic town of San Miguel de Allende and the vibrant markets
    of Guanajuato, while they also cherish occasional drives to nearby Big Bend National Park for sunrise sketches, and they dream of a leisurely pilgrimage to Santa Fe to explore adobe art galleries.
  culinary: Orlando Encarnacio, a 73‑year‑old home‑cooked culinary enthusiast, skillfully prepares dishes like slow‑braised carnitas, smoky chili con carne, and fresh pico de gallo featuring heirloom tomatoes,
    balances traditional flavors with Texas‑style barbecue rubs using ancho chilies and coriander, and they love experimenting with regional recipes while often sharing meals at community potlucks.
  core: Orlando Encarnacio, a 73‑year‑old imaginative tinkerer, channels a lifelong love of folk traditions into murals, poetry, and vintage radios, while their relaxed, somewhat disorganized nature fuels
    spontaneous bursts of creativity and they maintain a healthy skepticism toward the hustle of modern life.
background:
  cultural: Orlando is a first‑generation Mexican‑American who grew up in a small town near the Mexican‑Texas border before moving to McAllen as a teenager. He was raised in a bilingual, Catholic household
    that celebrated Día de los Muertos, Semana Santa, and local fiestas with gusto. The blend of Mexican traditions and Texan influences shaped his identity, giving him fluency in Spanish and a working
    knowledge of English. He values family ties, community solidarity, and the preservation of folk crafts such as papel picado and traditional cooking. His cultural perspective informs his art, storytelling,
    and desire to pass on heritage to younger generations.
