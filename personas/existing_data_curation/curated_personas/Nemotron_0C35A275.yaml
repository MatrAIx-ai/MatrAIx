  career_goals: At this stage, Orlando aims to leave a lasting cultural imprint on his community. He plans to complete a large mural for the local community center that blends Mexican motifs with contemporary
    abstract elements. He also intends to compile his memoirs and family stories into a handwritten book to share with grandchildren and local youth. Additionally, he hopes to host a small exhibition of
    his artwork, mentor interested kids in storytelling and folk art, and see his work featured in the local newspaper as a celebration of lifelong creativity.
