personas:
  professional: Delma Mckenzie, a seasoned office administrator known for meticulous process standardization, channels their routine‑driven mindset and cooperative leadership into keeping clerical teams
    operating like clockwork while gently championing modest technology upgrades to streamline digital workflows.
  sports: Delma Mckenzie enjoys leisurely hikes along the Appalachian foothills, volunteers with a local bird‑watching walking group, and quietly supports the Carolina Hurricanes in winter and the Charlotte
    Hornets during the NBA season, preferring low‑impact exercise over competitive sports.
  arts: Delma Mckenzie finds solace in quilting with William Morris‑inspired patterns, immerses themselves in Margaret Mitchell’s Civil War era novels, attends community theater productions of classics
    like To Kill a Mockingbird, and listens to the soft crooning of Patsy Cline while crafting.
  travel: Delma Mckenzie prefers carefully planned heritage road trips, having visited historic Williamsburg, the Gettysburg battlefield, and the Blue Ridge Parkway, and hopes to explore the colonial town
    of St. Augustine, Florida, favoring relaxed itineraries that allow ample time for birdwatching and quiet reflection.
  culinary: Delma Mckenzie, a confident home cook, delights in farm‑to‑table dishes such as roasted sweet potatoes with sage, collard greens simmered with smoked ham hocks, and classic shrimp and grits,
    often using garden‑fresh tomatoes, okra, and locally sourced honey.
  core: Delma Mckenzie blends a steadfast love for routine with a quiet curiosity for Southern history, balancing meticulous office leadership with a penchant for garden‑to‑table cooking and nightly quilting
    sessions, though they occasionally hoard old seed packets like treasured heirlooms.
background:
  cultural: Delma was born and raised in a small town in eastern North Carolina, growing up steeped in Southern traditions and values. As a White family member with deep generational ties to the area, she
    embraces modesty, hospitality, and a strong work ethic rooted in mid‑20th‑century Southern culture. She is an active participant in her local Baptist church, where she contributes to fellowship and
    community service. Family life is central to her identity, and she maintains close relationships with extended family and neighbors. Delma’s cultural outlook emphasizes practicality, respect for tradition,
    and community harmony, reflected in her love for regional culinary practices, seasonal festivals, and small‑group gatherings.
attributes:
  skills: '[''Office management'', ''Administrative staff supervision'', ''Scheduling and calendar coordination'', ''Document control and records management'', ''Microsoft Office Suite proficiency'', ''Process
