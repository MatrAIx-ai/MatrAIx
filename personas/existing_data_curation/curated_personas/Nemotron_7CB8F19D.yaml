  career_goals: Siraj envisions a future where his love for technology and practical problem‑solving merges into a career in engineering or software development. He hopes to earn a college degree in Computer
    Science or Mechanical Engineering, with a particular interest in creating affordable educational tools that benefit under‑served communities. Long‑term, he aspires to launch a startup that designs simple,
    sustainable tech solutions, while also staying grounded enough to support his family and mentor younger students from similar cultural backgrounds.
