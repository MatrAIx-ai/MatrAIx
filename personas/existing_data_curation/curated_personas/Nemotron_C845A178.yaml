personas:
  professional: Elsa Maisonet, an experienced registered nurse renowned for her expertise in IV therapy, wound care, and acute triage, blends her love of routine and practical problem‑solving with an outgoing,
    team‑focused style to streamline workflows, even as she occasionally lets spontaneous schedule changes slip through the cracks while pursuing a charge‑nurse role and future nurse‑practitioner studies.
  sports: Elsa Maisonet enjoys playing recreational soccer with the St. Bernard Community League each Saturday, cheers on the New Orleans Saints during football season and supports the Pelicans in the NBA,
    while fitting in weekly salsa‑dance cardio sessions to stay fit.
  arts: Elsa Maisonet immerses herself in the lively rhythms of cumbia, vallenato, and New Orleans jazz, dancing salsa and bachata at community festivals, and finds inspiration in artists like Carlos Vives,
    Louis Armstrong, and the modern Latin pop star Shakira, often ending her evenings with a binge of classic telenovelas starring Sofía Vergara.
  travel: Elsa Maisonet prefers spontaneous weekend getaways that blend cultural immersion and relaxation, having explored the historic streets of Cartagena and the vibrant festivals of Barcelona, while
    dreaming of a road trip along the Gulf Coast to savor the Gulf Islands and the Creole culinary scene of New Orleans.
  culinary: Elsa Maisonet delights in preparing bandeja paisa with chorizo, red beans, plantains, and avocado, while also mastering Creole gumbo and jambalaya, frequently gathering fresh seafood and herbs
    for family potlucks, and enjoys experimenting with hot sauces and cilantro in her cooking.
  core: Elsa Maisonet is a charismatic, routine‑loving nurse who balances an organized work ethic with a love for spontaneous social gatherings, peppered with a penchant for salsa, hearty cooking, and a
    well‑rounded, community‑focused life.
background:
  cultural: Elsa was born to Colombian immigrant parents and grew up speaking both Spanish and English at home. Her family maintains strong Colombian traditions—celebrating Día de la Independencia, preparing
    bandeja paisa for gatherings, and sharing music like cumbia and vallenato—while also embracing the vibrant Creole culture of New Orleans. She values family cohesion, Catholic holidays, and the communal
    spirit of both cultures, which informs her compassionate approach to patient care and her active participation in local Latino community organizations.
attributes:
  skills: '["IV therapy", "Wound care", "Acute triage and emergency response", "Bilingual Spanish‑English communication", "Cultural competency in Latino health", "Electronic Medical Record (EMR) navigation",
    "Team leadership and shift coordination", "Patient education and health promotion", "Quality improvement initiatives", "Community health outreach"]'
  hobbies: '["Salsa and bachata dancing", "Cooking traditional Colombian cuisine", "Volunteering at community health fairs", "Organizing potluck gatherings", "Attending live music festivals", "Gardening",
    "Playing recreational soccer", "Reading contemporary fiction", "Watching telenovelas"]'
  career_goals: Elsa aims to move into a charge‑nurse role within her current hospital, using her love of routine and practical problem‑solving to improve unit efficiency and patient safety. Over the next
    five years she plans to pursue a nurse‑practitioner degree, focusing on primary care for underserved Spanish‑speaking communities in New Orleans. She also hopes to mentor new nurses, develop culturally
    tailored patient‑education programs, and eventually take on a part‑time faculty position at a local nursing school.
