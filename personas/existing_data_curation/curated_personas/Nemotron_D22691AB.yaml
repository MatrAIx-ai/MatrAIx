  career_goals: He aspires to evolve from a senior systems analyst to a lead solutions architect, driving digital transformation initiatives across enterprises in Orange County and beyond. Shahein aims
    to earn AWS Solutions Architect Professional and PMP certifications within the next three years, and to lead cross‑functional teams that integrate AI and automation into legacy systems. Ultimately,
    he envisions launching his own consultancy that helps midsize businesses in the tech corridor adopt scalable, cloud‑native solutions while fostering inclusive, collaborative workplace cultures.
