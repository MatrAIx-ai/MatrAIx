  hobbies: '["Watercolor painting", "Listening to plena and bomba music", "Gardening", "Cooking and recipe experimentation", "Reading historical novels", "Knitting circle", "Small‑group singing", "Evening
    walks on the beach"]'
  career_goals: Although Clara is no longer part of the formal workforce, she is motivated to keep contributing to her community and to continue learning. Her primary ambition is to launch a monthly art‑and‑culture
    workshop at the local senior center, where she can share her cooking, embroidery, and gardening knowledge with younger volunteers. She hopes to document a collection of family recipes and accompanying
    stories in a small booklet that could be distributed to schools in Mayagüez. Clara also aspires to improve her watercolor painting skills by taking a community‑offered class, eventually creating a series
    of small paintings that depict historic neighborhoods of Mayagüez. By staying active in these projects, she aims to leave a tangible legacy of the island’s everyday cultural practices while maintaining
    a sense of purpose and connection.
