  career_goals: Michael hopes to attend a specialized art high school and later earn a BFA in illustration or concept art. He dreams of working as a graphic illustrator for video games or animated films,
    creating characters and environments that tell stories. He also wants to use his art to raise awareness about local wildlife and may one day run community art workshops or become a museum docent in
    his hometown. Short‑term, he aims to build a strong portfolio, win a regional youth art contest, and secure a summer internship at a local design studio.
