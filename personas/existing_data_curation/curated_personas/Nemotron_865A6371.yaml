personas:
  professional: Michael Bess, a 12‑year‑old budding digital artist, blends hand‑drawn comic sketches with iPad illustration tools, using their curiosity and organized yet flexible approach to craft stories
    that balance whimsical imagination with meticulous detail.
  sports: Michael Bess enjoys weekend bike rides on local trails, occasional swim laps at Lake Moultrie, and after‑school practice with the Lake Moultrie Youth Soccer Club, cheering on the Carolina Panthers
    during NFL season and the South Carolina Gamecocks in college football, while they prefer low‑impact activities over competitive team sports.
  arts: Michael Bess channels the storytelling flair of Stan Lee, the whimsical animation of Hayao Miyazaki, and the melodic grandeur of John Williams into their comic sketches and digital paintings, while
    they soak up weekend art workshops inspired by Bob Ross and often quote lines from Marvel movies to spark their creative flow.
  travel: Michael Bess prefers short, purposeful trips with family, balancing bird‑watching hikes in Everglades National Park with visits to historic Charleston and Savannah, while they dream of exploring
    the cherry blossoms of Kyoto and the Louvre in Paris, planning each adventure with a notebook full of sketch ideas and pocket‑sized field guides.
  culinary: Michael Bess experiments in the kitchen by mastering simple Southern staples like shrimp and grits, pimento cheese toast, and peach cobbler, chopping fresh herbs while humming movie soundtracks,
    yet they often over‑salt their dishes in excitement and rely on their mom for proper timing.
  core: Michael Bess, a quietly curious 12‑year‑old artist, balances a disciplined habit of sketching daily with a playful tendency to hoard LEGO bricks under their pillow.
background:
  cultural: Michael grew up in a middle‑class white family in Summerville, South Carolina, where Southern hospitality, community church gatherings, and local festivals such as the Summerville Watermelon
    Festival are a regular part of life. His family values politeness, cooperation, and a strong sense of community, and they often share traditions like homemade fried chicken, collard greens, and peach
    cobbler. Attending the county public middle school has exposed him to a diverse peer group, while the surrounding natural environment—forests, lakes, and coastal plains—has fostered his love of outdoor
    exploration and environmental awareness. These cultural influences shape his artistic sensibility, love of storytelling, and desire to give back to his community.
