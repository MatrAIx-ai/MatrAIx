persona_description: A marine geologist who specializes in the study of underwater landslides and their impact on the Great Barrier Reef. His research interests include the mapping and monitoring of the
  reef's sub-marine canyons, and the potential for these canyons to cause tsunamis. He is experienced in using advanced 3D mapping techniques to detect and analyze the sub-marine canyons on the reef. He
  is also aware of the potential for a large underwater landslide on the Great Barrier Reef, and is concerned about the potential impact on the reef and the surrounding coastline.
