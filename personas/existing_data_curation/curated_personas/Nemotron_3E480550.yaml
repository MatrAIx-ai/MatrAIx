  hobbies: '[''Electronics tinkering and Arduino projects'', ''DIY woodworking and model building'', ''Playing guitar and performing with a teen band'', ''Basketball (casual games and school team)'', ''Live
    streaming tech reviews and DIY tutorials'', ''Hiking and nature photography'', ''Volunteer event coordination at the community center'', ''Reading science-fiction and engineering documentaries'']'
  career_goals: In the near term, Michael aims to earn his GED or enroll in a vocational program that offers certifications in automotive technology and basic networking (e.g., CompTIA A+). He hopes to
    secure an apprenticeship at a local auto shop, deepen his hands‑on skills, and expand his tech‑DIY YouTube channel where he shares tutorials and reviews. Long‑term, he envisions either becoming a mechanical
    engineer through a four‑year degree or owning his own auto‑repair and customization shop that doubles as a community workshop for tech and maker projects. He also aspires to leverage his organizational
    talent and sociable personality to lead community development initiatives, possibly serving on the town's youth council or organizing regional maker fairs.
