  career_goals: Nichole aims to advance to a senior executive role, such as Director of Operations or Vice President, within the next five to seven years, overseeing multiple sites and driving company‑wide
    digital transformation initiatives. She plans to earn a Six Sigma Black Belt and a PMP certification to deepen her expertise in continuous improvement and project leadership. In the longer term, she
    envisions launching a boutique consulting firm that helps small Appalachian businesses implement operational excellence and sustainability practices. She is also committed to mentoring emerging female
    leaders and fostering a work‑life balance that supports her family and community involvement.
