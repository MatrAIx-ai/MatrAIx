  skills: '[''Python'', ''R'', ''SQL'', ''Machine Learning'', ''Data Visualization'', ''Tableau'', ''PowerBI'', ''Arduino Programming'', ''Circuit Design'', ''SolidWorks CAD'', ''Statistical Modeling'',
