personas:
  professional: Anthony Munoz, an aspiring data analyst and junior software engineer, leverages Python, R, SQL, Tableau, and Arduino prototyping to turn raw data into actionable insights while their meticulous
    documentation and serene presence keep small project teams organized and adaptable.
  sports: Anthony Munoz, a weekend cyclist who rides the Brooklyn waterfront paths with the informal Brooklyn Bridge Bikers club, complements the rides with regular yoga for flexibility, follows the Brooklyn
    Nets for basketball and New York City FC for soccer, and maintains a modest treadmill routine during the winter months.
  arts: Anthony Munoz, an avid sci‑fi reader and fan of creators like Hideo Kojima, composer Ólafur Arnalds, and filmmaker Denis Villeneuve, spends evenings listening to ambient synth playlists while sketching
    conceptual UI flows for his prototypes.
  travel: Anthony Munoz, a meticulous planner who balances a limited student budget with a thirst for tech‑centric experiences, has explored Tokyo’s Akihabara district, trekked the historic streets of Quito,
    and dreams of meditative retreats in Bali while still fitting in weekend trips to upstate New York’s Catskills for nature.
  culinary: Anthony Munoz, a self‑taught home cook who confidently prepares family staples such as arepas with queso fresco, hearty sancocho loaded with plantains and yucca, and experiments with avocado‑lime
    salsa, often sourcing fresh cilantro, cornmeal, and seasonal produce from the Brooklyn farmers market.
  core: Anthony Munoz, a calm, methodical young technophile who fuses data analysis with hands‑on Arduino tinkering, cycles the waterfront, cooks comforting family recipes, and quietly builds bridges between
    tech and community health.
background:
  cultural: Anthony is a first‑generation American of Colombian descent. He grew up in a bilingual household in Brooklyn, where Spanish was spoken at home and English at school. His parents immigrated to
    New York in the early 2000s, bringing with them traditions such as celebrating Carnaval de Barranquilla, preparing family recipes like arepas, and emphasizing close family ties. The multicultural fabric
    of Brooklyn, combined with his Colombian roots, has shaped his values of community service, respect for cultural diversity, and a desire to give back to his neighborhood. He identifies with both his
    Latino heritage and the broader New York urban culture, navigating both worlds fluently.
