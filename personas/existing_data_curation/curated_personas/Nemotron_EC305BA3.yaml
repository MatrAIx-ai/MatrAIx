  hobbies: '[''Arduino tinkering'', ''Science‑fiction reading'', ''Journaling'', ''Yoga and meditation'', ''Cycling around Brooklyn'', ''Cooking traditional Colombian meals'', ''Volunteering as a math/coding
    tutor'', ''Playing acoustic guitar'']'
  career_goals: He aims to secure an entry‑level data analyst or junior software engineer position at a tech firm or a socially‑focused startup where he can apply his analytical and prototyping skills to
    real‑world problems. Over the next five years, he hopes to lead data‑driven projects that improve community health outcomes in underserved neighborhoods, especially in Brooklyn’s Latino communities.
    He also plans to pursue a master’s degree in Data Science or Biomedical Engineering to deepen his technical knowledge, and eventually spearhead a nonprofit technology hub that offers training and mentorship
    for young Latinx students interested in STEM.
