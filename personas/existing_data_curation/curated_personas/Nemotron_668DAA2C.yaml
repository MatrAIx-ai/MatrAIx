personas:
  professional: Socorro Morales, an 80‑year‑old community organizer and seasoned home cook, leverages their meticulous planning, bilingual communication, and natural storytelling to run senior‑center events,
    cooking workshops, and volunteer donation logs with unwavering reliability.
  sports: Socorro Morales stays active by dancing salsa and merengue at senior‑center nights, taking brisk walks along the Homestead Trail three times weekly, and cheering on the Miami Heat and Inter Miami
    CF while participating in a low‑impact senior fitness class at the local community center.
  arts: Socorro Morales, a frequent attendee of local art exhibitions and craft fairs, finds inspiration in the bold colors of Frida Kahlo, the lyrical poetry of Pablo Neruda, and the rhythmic guitar of
    Antonio Vargas, and they channel this admiration into hand‑crafted knitted scarves and crochet pieces that often become beloved heirlooms for grandchildren.
  travel: Socorro Morales prefers relaxed, family‑oriented trips, often day‑tripping to the Everglades and Key West with a group of friends, while dreaming of a future pilgrimage to a coastal city in South
    America to reconnect with relatives and attending the lively Carnaval de Miami‑Dade when health permits.
  culinary: Socorro Morales delights in preparing traditional family dishes such as arepas stuffed with black beans and cheese, cachapas made from fresh corn batter, and empanadas filled with seasoned ground
    beef, often seasoning with cilantro, achiote, and a splash of lime to bring authentic flavors to communal gatherings.
  core: Socorro Morales blends vibrant storytelling, a stubborn habit of misplacing keys, and an unrelenting devotion to sharing heritage recipes, all while orchestrating community events with unmatched
    precision.
background:
  cultural: Socorro was born in a small town near Maracaibo, Venezuela, and grew up immersed in the country's Catholic traditions, music, and cuisine. She immigrated to South Florida in the 1970s, joining
    a vibrant Venezuelan diaspora in Miami-Dade County. Her daily life blends Venezuelan customs—such as celebrating Día de la Independencia, preparing hallacas, and speaking Spanish at home—with the multicultural
    influences of Homestead, including participation in local festivals, enjoying the tropical climate, and forging friendships across Latin American and American communities. Her experiences navigating
    the challenges of migration and a later divorce have deepened her appreciation for resilience and community support.
attributes:
  skills: '[''Traditional Venezuelan cooking'', ''Community event planning and coordination'', ''Bilingual Spanish-English communication'', ''Tropical gardening'', ''Knitting and crocheting'', ''Storytelling
