persona_description: A scientist and agricultural researcher specializing in the field of irrigation management for humid and sub-humid areas, with a focus on developing accurate and efficient irrigation
  scheduling methods for crops in the Mississippi region. They are particularly interested in remote sensing techniques for crop health monitoring and soil moisture status, and have conducted research on
  developing accurate measures of crop water use through the use of weigh lysimeters. They are also involved in the development of improved irrigation methods and the testing of various irrigation scheduling
  guidelines.
