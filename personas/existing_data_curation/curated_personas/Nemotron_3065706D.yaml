  hobbies: '[''bridge'', ''church choir'', ''gardening'', ''quilt-making'', ''volunteering at senior center'', ''genealogy research'', ''hiking'', ''community theater'', ''bingo'', ''digital photography'']'
  career_goals: Dorothy aims to deepen her impact on the Minden community by formalizing her role as a volunteer coordinator at the senior center, where she hopes to design intergenerational programs that
    blend traditional crafts with modern technology. She is working toward a basic certification in gerontology to better support her peers' health and wellness. A personal ambition is to compile a family‑recipe
    cookbook that celebrates Nevada’s culinary heritage and share it through a local publishing cooperative. Additionally, she plans to preserve the town’s oral histories by recording interviews with longtime
    residents and presenting the collection at the Douglas County Historical Society. While embracing new tools like digital photography, she maintains a careful, skeptical approach to ensure these technologies
    enhance rather than compromise community well‑being.
