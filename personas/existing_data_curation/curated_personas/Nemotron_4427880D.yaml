personas:
  professional: Daeng Phan, an aspiring mini-architect who meticulously arranges LEGO bricks into towering structures, blends an insatiable curiosity with a pragmatic preference for sturdy designs, while
    their relaxed attitude toward tidy play areas leads to frequent, endearing messes.
  sports: Daeng Phan, an exuberant three-year-old who dashes through diaper-friendly soccer drills at the Little Cubs toddlers' league while proudly sporting a tiny River Rapids baseball cap, embraces group
    play with gusto, yet their relaxed approach to scheduled practice often leaves them trailing behind the group.
  arts: Daeng Phan, an imaginative three-year-old who revels in the upbeat songs of The Wiggles and the whimsical adventures of Mickey Mouse, eagerly splashes finger-paints across easels, turning the living
    room into a colorful studio where cooperative play and occasional messes fuel their artistic spirit.
  travel: Daeng Phan, a curious toddler who adored the sensory wonder of the city zoo and the splashy fun of a weekend beach trip in Florida, dreams of riding the magical carousels at Disneyland Paris,
    preferring family-guided adventures that blend familiar comfort with bright new sights, though their spontaneous energy often leads to forgotten sunscreen.
  culinary: Daeng Phan, a spirited little eater who delights in buttery mac & cheese, crunchy apple slices, and bite-sized cheddar cheese cubes, often attempts to spread smooth avocado on toast with a tiny
    fork, creating a charmingly smeared tableau on the highchair tray.
  core: Daeng Phan, a bright-hearted three-year-old whose boundless curiosity and love for group play are balanced by a lovable disorganization and occasional worry over lost toys, navigates the world with
    exuberant energy, a penchant for messy creativity, and a sweet-tooth that never pauses.
background:
  cultural: Daeng grows up in a multicultural household in Austin, Texas, where her parents preserve their Southeast Asian heritage while embracing the local Texan lifestyle. At home, she hears both English
    and a Southeast Asian language (such as Thai or Vietnamese), celebrates traditional festivals like Songkran or Tet with family meals that feature dishes like jasmine rice, fresh herbs, and mild soups,
    and listens to folk music on holidays. The family participates in community events at a nearby cultural center, and Daeng often sees a blend of bright cultural decorations alongside the vibrant outdoor
    life of Austin. This rich cultural mix influences her food preferences, language exposure, and the stories she loves to hear.
