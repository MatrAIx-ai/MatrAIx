  career_goals: Even at three, Daeng loves imagining future roles that let her interact with others and care for her community. She frequently pretends to be a teacher leading a circle time, a veterinarian
    helping stuffed animals, or a dancer performing in bright costumes. Her outgoing, cooperative nature fuels a desire to become a 'storyteller' who shares both English and family folk tales, while her
    occasional worries push her toward stable, nurturing professions where she can create a safe environment for others.
