  career_goals: While approaching retirement, Isabel wishes to stay active in a role that provides stability and a sense of purpose. Her short‑term goal is to be recognized as a go‑to mentor for younger
    team members, sharing her practical knowledge of store operations. She hopes to transition into a part‑time supervisory position where she can oversee stocking schedules and ensure a smooth workflow.
    Long‑term, she plans to complement her earnings with volunteer work at her local senior center, using her organizational skills to help coordinate community events and supplies.
