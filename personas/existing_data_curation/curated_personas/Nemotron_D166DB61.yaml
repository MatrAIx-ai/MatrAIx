personas:
  professional: A seasoned retail stockroom manager, Isabel Colon blends her meticulous inventory expertise with bilingual communication, mentoring younger staff while they ensure a calm, routine‑driven
    workflow that reflects their practical and cooperative values.
  sports: A dedicated beach‑side walker, Isabel Colon joins the Pompano Seniors Stroll Club to pace the boardwalk at sunrise, cheers on the Miami Dolphins on game days, and practices gentle beach yoga,
    while they favor low‑impact activity over high‑intensity workouts.
  arts: A devoted connoisseur of classic Latin entertainment, Isabel Colon spends evenings watching the melodramas of Thalía and Lucero, listens to bolero ballads by José José and the lively trumpets of
    Mariachi Vargas, and they often crochet a blanket while humming Luis Miguel’s romantic tunes.
  travel: An adventure‑cautious traveler, Isabel Colon prefers well‑planned short cruises along the Gulf Coast, has already explored the historic streets of Cartagena and the sun‑kissed shores of Key West,
    and they dream of a pilgrimage to the Basilica of St. Anthony in Padua while keeping travel costs within a modest budget.
  culinary: A passionate home cook, Isabel Colon delights in the ritual of making tamales, mole negro, and sopa de tortilla, meticulously selecting fire‑roasted chiles, heirloom tomatoes from her garden,
    and fresh corn masa, and they occasionally over‑salt the mole, a quirky habit that prompts playful teasing from family.
  core: Isabel Colon is a routine‑loving, bilingual stockroom veteran who finds joy in crocheting blankets, cooking hearty family meals, and quietly mentoring younger coworkers, while they sometimes forget
    to water their garden on rainy days.
background:
  cultural: Isabel grew up in a Mexican‑American household where Spanish was spoken daily and Catholic traditions guided family life. She celebrates Día de los Muertos, Christmas posadas, and Saint Anthony’s
    feast with homemade foods and community gatherings. Her upbringing emphasized respect for elders, hospitality, and the value of hard work, shaping her practical and cooperative nature. After moving
    to Florida, she blended her heritage with the local beach culture, maintaining a strong connection to her roots through cooking, music, and participation in Latino community events in Broward County.
