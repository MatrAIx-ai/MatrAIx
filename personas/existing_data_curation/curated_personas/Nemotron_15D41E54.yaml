personas:
  professional: Zaria Grant is an emerging community arts practitioner, blending Adobe Photoshop and Illustrator expertise with empathic workshop facilitation to design inclusive public art projects and
    youth programs in Columbia, while navigating a laid‑back, occasionally disorganized workflow that prizes flexibility over strict deadlines.
  sports: Zaria Grant enjoys low‑impact fitness through early‑morning yoga at Riverbanks Zoo & Garden, participates in casual community softball games with the Columbia Foxes, and follows the local Columbia
    Fireflies baseball team, balancing an active routine with a preference for flexible, non‑competitive movement.
  arts: Zaria Grant immerses themselves in the Columbia Museum of Art, draws inspiration from the street narratives of Gordon Parks and the soulful sounds of Erykah Badu, curates neo‑soul and jazz playlists,
    and leads weekly art‑craft circles where children create mixed‑media pieces, embodying their curious and compassionate nature.
  travel: Zaria Grant loves weekend road trips to historic Charleston and Savannah, dreams of a cultural pilgrimage to New Orleans for its jazz festivals, and has a bucket‑list itinerary that includes a
    solo visit to the National Gallery of Art in Washington, D.C., favoring relaxed, unstructured travel with spontaneous photo walks.
  culinary: Zaria Grant experiments with Southern‑inspired cuisine, mastering shrimp and grits with a hint of smoked paprika, perfecting collard greens seasoned with smoked ham hocks, and adding a splash
    of hot sauce to homemade pecan pie, cooking at a moderate skill level while sharing meals as a form of communal bonding.
  core: Zaria Grant blends artistic curiosity, heartfelt community work, and a breezy, sometimes chaotic approach to life, turning sketchbooks into social change while navigating finances and health with
    a laid‑back yet mindful rhythm.
background:
  cultural: Zaria’s cultural background is rooted in the African‑American traditions of the South. Her family has lived in Richland County for generations, carrying forward the values of the Black church,
    gospel music, and communal storytelling. She grew up attending local gatherings such as the Columbia Black Cultural Festival and participating in church choirs, where she internalized the importance
    of community solidarity and artistic expression. The region’s history—marked by the civil‑rights movement and the legacy of the Gullah‑Geechee culture—shapes her awareness of social justice and the
    role of art in activism. Influenced by Black artists like Jacob Lawrence, Faith Ringgold, and contemporary muralists in Columbia, she blends Southern culinary traditions, rhythmic music, and visual
    storytelling in her personal identity.
