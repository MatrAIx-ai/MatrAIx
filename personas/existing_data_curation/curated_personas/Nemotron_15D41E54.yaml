  hobbies: '[''Sketching'', ''Acrylic painting'', ''Street photography'', ''Visiting art galleries'', ''Open‑mic poetry nights'', ''Jazz listening'', ''Volunteer art workshops'', ''Yoga and meditation'',
    ''Nature walks'', ''Reading contemporary fiction'', ''Cooking Southern-inspired dishes'']'
  career_goals: Zaria aims to transfer to a four‑year university to earn a Bachelor of Fine Arts with a focus on community arts and social practice. Her long‑term ambition is to become a community arts
    coordinator for a nonprofit organization in Columbia, where she can design and lead public art projects, youth workshops, and collaborative murals that empower underrepresented voices. She also envisions
    establishing her own community art space that offers free creative programming and mental‑health support through art therapy. In the interim, she plans to volunteer as a facilitator for local youth
    art programs while building a portfolio of mixed‑media work.
