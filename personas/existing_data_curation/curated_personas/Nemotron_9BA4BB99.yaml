  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening'', ''Church choir singing'', ''Reading bilingual magazines'', ''Crossword puzzles'', ''Walking in local parks'', ''Attending community cultural
    events'', ''Weaving and embroidery'', ''Watching classic Mexican films'']'
  career_goals: Although retired from formal employment, Dayanara aims to expand her community involvement by leading a weekly cooking class that shares Mexican culinary traditions with neighbors and younger
    families. She also hopes to mentor her grandchildren in financial literacy, teaching them budgeting habits and responsible money management. Maintaining her health is a priority, so she plans to keep
    up with daily walks and gardening, and she intends to complete a senior‑focused computer course to improve her digital skills for staying connected with family and accessing online resources.
