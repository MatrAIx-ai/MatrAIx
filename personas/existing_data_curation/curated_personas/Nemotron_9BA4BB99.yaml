personas:
  professional: Dayanara Roman, a retired parish volunteer turned community cooking class organizer, leverages her systematic meal‑planning, bilingual translation, and meticulous event‑scheduling skills
    to create structured, hands‑on workshops that blend heritage recipes with practical budgeting lessons.
  sports: Dayanara Roman enjoys leisurely walks in the local park, participates in a senior aerobic class at the community center, and cheerfully supports the Chicago Cubs, Chicago Bulls, and Chicago Bears
    while preferring low‑impact activities that keep her joints supple.
  arts: Dayanara Roman delights in singing classic boleros with her church choir, weaving colorful embroidered tapestries inspired by Frida Kahlo’s motifs, and watching golden‑age films starring Pedro Infante
    and María Félix, which together shape her creative sanctuary.
  travel: Dayanara Roman favors organized, family‑friendly trips that blend cultural celebration and culinary discovery, such as her annual pilgrimage to a historic colonial town famous for vibrant market
    festivals, a weekend getaway to a southwestern art‑rich city to explore Pueblo‑style murals, and a relaxed cruise along the Gulf Coast that lets her savor fresh seafood while keeping a predictable itinerary.
  culinary: Dayanara Roman, an avid home chef, perfects mole poblano, homestyle chiles rellenos, and hand‑rolled tamales using garden‑fresh tomatoes, chilies, and cilantro, and she enjoys swapping recipes
    at community potlucks while occasionally burning the top of the churro dough when distracted by a crossword clue.
  core: Dayanara Roman is a structured, community‑oriented senior who blends meticulous budgeting, faithful garden care, and a love for traditional cooking with a warm, choir‑singing spirit and a habit
    of forgetting to water her succulents on rainy days.
background:
  cultural: Dayanara's Mexican heritage is a central part of her identity. Raised in a bilingual household, she celebrated Día de los Muertos, Las Posadas, and Mexican Independence Day with family rituals,
    traditional foods, and music. Spanish is her first language, and she maintains strong ties to the Mexican community in Maywood, regularly participating in local festivals, church activities, and cultural
    clubs. Her upbringing emphasized familial loyalty, respect for elders, and communal support, values she continues to pass on to her children and grandchildren while fostering a sense of cultural pride
    and continuity.
