  hobbies: '[''Church choir singing'', ''Social dancing (Motown and soul music)'', ''Gardening'', ''Quilting'', ''Bridge'', ''Reading mystery novels'', ''Community potluck organization'', ''Recipe experimentation
    and cooking'']'
  career_goals: Although she is not currently employed, Mishonda plans to deepen her impact in the Redford community. She hopes to launch a weekly “Tech‑Coffee” gathering where seniors learn to use smartphones
    and video‑chat tools, and she aspires to become a board member of the local senior center to shape programs that encourage social interaction and lifelong learning. She also dreams of turning her love
    of cooking into a small home‑based catering service for community events, integrating her culinary skills with her desire to bring people together.
