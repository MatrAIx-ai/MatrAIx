  career_goals: His long‑term career ambition is to become a regional medical director, spearheading the integration of telehealth services across Cache County while leading quality‑ improvement programs
    that raise care standards in rural settings. He aims to develop a community health hub that combines primary care with innovative health‑education, including art‑based therapeutic initiatives. Joshua
    also aspires to mentor medical residents, publish research on rural health outcomes, and eventually secure a faculty appointment at Utah State University’s College of Nursing and Health Sciences.
