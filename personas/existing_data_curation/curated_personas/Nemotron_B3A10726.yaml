personas:
  professional: Joshua Steele, a board‑certified family physician, blends disciplined workflow, evidence‑based practice, and an artistic eye to craft visual patient education while spearheading telehealth
    integration and quality‑improvement initiatives across rural Cache County, and they aim to become a regional medical director.
  sports: Joshua Steele devotes weekend mornings to hiking the Wasatch foothills and rides with the Wasatch Ride Club on mountain bike trails, follows the Utah Jazz for basketball, proudly supports Real Salt Lake
    soccer, and they treat fitness as a solitary ritual that balances disciplined cardio with occasional yoga to counteract lower‑back strain.
  arts: Joshua Steele captures Utah’s red rock vistas through a lens inspired by Ansel Adams, sketches watercolors echoing Georgia O’Keeffe’s desert palettes, attends intimate gallery openings featuring
    emerging local painters, reads science‑fiction by Ursula Le Guin and philosophy by Friedrich Nietzsche, and they unwind with the mellow chords of Nick Drake while reflecting on the interplay of art
    and medicine.
  travel: Joshua Steele plans trips meticulously, favoring adventure‑focused getaways such as winter hikes in Yellowstone, cultural immersion in Kyoto’s temples, and road‑tripping through Banff, while they
    balance family commitments and budget constraints, and they dream of exploring Iceland’s geothermal lagoons and Patagonia’s glaciers.
  culinary: Joshua Steele enjoys farm‑to‑table cooking, expertly preparing roasted beet and goat‑cheese salad, pan‑seared Utah trout with lemon‑dill butter, and a quinoa pilaf studded with wild mushrooms
    and fresh rosemary, and they often source ingredients from the local farmers’ market while experimenting with sous‑vide techniques.
  core: Joshua Steele is a disciplined physician‑artist who merges data‑driven patient care with watercolor imagination, obsessively organizes their schedule, yet often forgets to take a break, and they
    find solace in solitary hikes and quiet sketching.
background:
  cultural: Joshua was raised in a predominantly Latter‑Day Saint community in northern Utah, reflecting a blend of Western European ancestry—primarily English, Irish, and German roots—and the strong cultural
    emphasis on family, service, and education characteristic of the region. The community’s values of modesty, collective responsibility, and commitment to lifelong learning have shaped his disciplined
    work ethic and compassionate patient care. While he respects traditional cultural norms, his innate curiosity and appreciation for eclectic art and new ideas drive him to seek diverse perspectives,
    bridging the conservative rural setting with broader, global medical and artistic influences.
