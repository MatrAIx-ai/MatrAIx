personas:
  professional: Steven Zuaznabar, a 20‑year‑old audit associate, leverages their STEM‑grounded analytical mindset and mastery of Excel, SQL, and Python to streamline audit procedures, preferring meticulous,
    structured workflows that reflect their detail‑oriented nature.
  sports: Steven Zuaznabar enjoys solitary low‑impact exercise, regularly hiking the nearby Green Ridge Trail and occasionally joining a local volleyball league for friendly competition, while cheering
    on the New York Knicks and the local soccer club that aligns with their nostalgic connection to community.
  arts: Steven Zuaznabar finds quiet inspiration in classic literature, devouring works by Gabriel García Márquez and Jane Austen, while also listening to the soothing piano compositions of Ludovico Einaudi
    and the folk guitar of Juanes when cooking, weaving these artistic touches into their reflective evenings.
  travel: Steven Zuaznabar prefers meticulously planned, low‑stress trips, having recently explored the historic streets of Cusco in a solo backpacking adventure and dreaming of a future study tour of the
    financial districts in London and Singapore, always booking flights and accommodations well in advance to avoid uncertainty.
  culinary: Steven Zuaznabar channels creative energy into cooking traditional Peruvian dishes such as ceviche with lime, aji amarillo, and lomo saltado with soy sauce, demonstrating a moderate skill level
    in the kitchen and often sourcing fresh cilantro, red onions, and quinoa for authentic flavor.
  core: Steven Zuaznabar is a detail‑driven, introverted audit associate who balances a rigorous work ethic with quiet hobbies, occasional anxiety, and a penchant for meticulously planned travel and culinary
    experiments.
background:
  cultural: Steven was raised in a bilingual household; his parents emigrated from Peru, so he grew up speaking both Spanish and English. He maintains strong ties to Peruvian culture through family gatherings,
    celebrating holidays like Señor de los Milagros and Inti Raymi, and by preparing traditional meals. The emphasis on family cohesion and respect for elders in his community shapes his cooperative yet
    assertive demeanor. While he lives in Edwardsville, Illinois, he frequently visits local Peruvian cultural events and stays connected with relatives in Lima via video calls, preserving a sense of identity
    that informs his personal values and professional integrity.
attributes:
  skills: '[''Financial reporting'', ''Audit planning'', ''Internal control evaluation'', ''US GAAP compliance'', ''Advanced Excel (pivot tables, macros)'', ''SQL'', ''Python for data analysis'', ''QuickBooks'',
