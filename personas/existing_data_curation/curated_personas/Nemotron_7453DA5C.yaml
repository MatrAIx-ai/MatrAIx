  hobbies: '[''Reading (economics, Peruvian history, classic literature)'', ''Cooking Peruvian dishes (ceviche, lomo saltado)'', ''Puzzle solving (Sudoku, crosswords)'', ''Programming automation scripts
    (Python, VBA)'', ''Hiking on local nature trails'', ''Meditation and journaling'', ''Playing acoustic guitar (quiet practice)'']'
  career_goals: Steven aims to become a licensed CPA within the next two years and plans to pursue the Certified Internal Auditor (CIA) designation thereafter. In the short term, he seeks to deepen his
    expertise in data‑analytics‑driven auditing and to take on increasingly complex client engagements. Mid‑term, he aspires to advance to an audit manager position, leading small teams while maintaining
    the structured, predictable workflow he values. His long‑term ambition is to transition into a senior finance leadership role—such as controller or CFO—where he can apply his analytical rigor to strategic
    decision‑making, potentially within a multinational firm that values cross‑cultural insights and ethical stewardship.
