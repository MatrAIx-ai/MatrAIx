personas:
  professional: Sean Coto eagerly builds towering LEGO structures during free play, channeling a precocious knack for spatial reasoning and organization while they lead peers in mock construction projects,
    reflecting an early love for architecture and a competitive drive to outperform friends.
  sports: Sean Coto is a spirited member of the Greenfield Cubs Little League baseball team, cheering loudly for the New York Yankees and dreaming of hitting home runs like Aaron Judge, while they also
    attend the local after‑school swimming club where they practice lap strokes with disciplined focus.
  arts: Sean Coto delights in watching Disney's 'Frozen' and dancing along to The Wiggles' upbeat songs, often mimicking Mickey Mouse's voice and they collect glittery crayons to illustrate scenes from
    their favorite cartoons, fueling a vibrant creative outlet.
  travel: Sean Coto loves family trips to Orlando's Walt Disney World and has a wish to explore the Grand Canyon someday, preferring well‑planned itineraries that balance ride adventures with downtime at
    the hotel pool, though they sometimes feel anxious about new environments.
  culinary: Sean Coto savors cheesy macaroni topped with extra cheddar, loves peanut butter and grape jelly sandwiches, and they proudly help stir banana‑strawberry smoothies, yet they occasionally sneak
    a bite of chocolate chip cookies before dinner, revealing a sweet‑tooth habit.
  core: Sean Coto is an energetic, structure‑loving five‑year‑old who balances competitive play with vivid imagination, often worrying about new challenges yet thriving in group activities where they eagerly
    contribute ideas.
background:
  cultural: Sean is raised in a Mexican‑American household in Inkster, Michigan. His parents speak Spanish at home, so he grows up bilingual and participates in family traditions such as celebrating Día
    de los Muertos and Cinco de Mayo. The family enjoys Mexican cuisine like tacos and tamales, and they maintain close ties with extended relatives who often visit. Sean’s cultural identity is shaped by
    values of familismo, respect for elders, and a love of community celebrations, all of which influence his everyday experiences and aspirations.
