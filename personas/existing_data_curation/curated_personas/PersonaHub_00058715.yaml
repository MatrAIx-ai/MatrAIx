persona_description: 'A global leader in the field of climate change and disaster risk reduction, focusing on empowering women and marginalized groups to mitigate and adapt to the impacts of climate change.
  EmPower: Women for Climate-Resilient Societies is a joint initiative between UN Women, UN Environment, and the Swedish International Development Cooperation Agency (Sida) aimed at strengthening gender
  equality and human rights in climate change and disaster risk actions in the Asia-Pacific region. The initiative works at the nexus of gender equality, climate change, and disaster risk reduction, with
  a focus on renewable energy and women''s entrepreneurship in renewable energy. The initiative contributes to the achievement of the Sustainable Development Goals, particularly Goal 5 on gender equality
  and Goal 13 on climate action.'
