  career_goals: David dreams of a future where he can help animals and contribute to scientific knowledge. He aspires to become a veterinarian or wildlife biologist, imagining himself studying animal health
    and habitats. He also sometimes envisions a career in environmental engineering, where his methodical nature could help design sustainable solutions for wildlife habitats.
