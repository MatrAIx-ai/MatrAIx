personas:
  professional: David Rhodes is an aspiring paleontologist whose methodical approach to building LEGO models and sketching animals informs a budding scientific curiosity; they relish detailed instructions
    and plan each discovery with precision, while their compassionate nature drives a desire to protect endangered species.
  sports: David Rhodes participates in the Willow Creek Youth Soccer Club’s Tigers team during the fall and eagerly follows the New York Yankees in baseball and the Los Angeles Lakers in basketball, but
    prefers solitary fitness activities such as weekend nature hikes and a structured bike‑riding routine that mirrors the methodical precision of their LEGO builds, and they find calm in the rhythmic cadence
    of each pedal stroke.
  arts: David Rhodes delights in sketching detailed animal drawings inspired by David Attenborough’s nature documentaries and the whimsical illustrations of Oliver Jeffers, while their musical palate includes
    the gentle piano pieces of Yiruma and the orchestral score of The Good Dinosaur, shaping their artistic identity, and they often practice drawing after listening to the gentle piano melodies.
  travel: David Rhodes prefers meticulously planned weekend trips to local nature reserves such as Oakridge Park, dreams of exploring the prehistoric wonders of Dinosaur National Monument in Utah, and hopes
    to one day visit the Natural History Museum in London, balancing their love for quiet observation with family‑friendly travel logistics, and they meticulously map each outing in a notebook.
  culinary: David Rhodes enjoys simple, comforting meals like macaroni and cheese with cheddar, relishes occasional pizza topped with pepperoni and olives, and can confidently follow a step‑by‑step recipe
    for banana‑cinnamon pancakes, while they often snack on apple slices and carrot sticks, favoring familiar flavors over adventurous cuisines.
  core: David Rhodes, an eight‑year‑old methodical LEGO architect and dinosaur enthusiast, blends a quiet, organized mind with a compassionate heart, though they occasionally lose focus when a puzzle piece
    goes missing.
background:
  cultural: David is a White American growing up in Indian Trail, a suburban community in Mecklenburg County, North Carolina. He attends a local public elementary school where he experiences a typical Southern
    U.S. upbringing, celebrating holidays such as Thanksgiving, Fourth of July, and Christmas with his family. His household participates in community events like church gatherings and local fairs. The
    region’s emphasis on politeness, respect for tradition, and love of outdoor activities influences his values and daily life.
