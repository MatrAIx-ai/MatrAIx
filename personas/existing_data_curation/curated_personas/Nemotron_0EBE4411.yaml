personas:
  professional: Selma Northcutt, a 48‑year‑old cultural program director, blends a pragmatic Midwestern work ethic with a curiosity‑driven appetite for fresh ideas, steering strategic planning, grant writing,
    and cross‑functional team leadership through agile yet hands‑on methods—though they often wrestle with tight deadlines because of their spontaneous, less‑structured approach.
  sports: Selma Northcutt’s athletic routine centers on weekend hikes with the Cuyahoga Valley Hiking Club and occasional 5K runs, while they cheer on the Cleveland Guardians in baseball season and the
    Browns in football, balancing community pride with a flexible, low‑pressure fitness philosophy.
  arts: Selma Northcutt immerses herself in the arts through watercolor sessions inspired by Georgia O’Keeffe, regular attendance at the Cleveland Play House’s theater festivals, enthusiastic discussions
    of Lin‑Manuel Miranda’s scores in her book club, and volunteering at local heritage art fairs, all of which reinforce her belief that community storytelling fuels civic cohesion.
  travel: Selma Northcutt’s travel style blends meticulous research—booking trips to Gettysburg’s battlefield, Monticello’s plantation, and the British Museum in London—with a spontaneous love of wandering
    Venice’s alleys for photo inspiration, yet they often schedule short weekend getaways around work commitments and family duties, balancing cultural immersion with practical constraints.
  culinary: Selma Northcutt’s culinary pursuits feature a seasoned appetite for historic recipes—crafting beef bourguignon with rosemary, wild mushroom risotto using foraged chanterelles, and homemade sourdough
    loaf—while they frequently browse the local farmers market for fresh herbs and seasonal produce, reflecting a moderate home‑cook skill set that balances experimentation with comfort food nostalgia.
  core: Selma Northcutt, a 48‑year‑old cultural strategist, navigates life with a pragmatic curiosity that fuels community‑focused innovation, yet their spontaneous streak often leads to missed deadlines,
    a penchant for impromptu museum trips, and a habit of juggling too many projects at once.
background:
  cultural: Selma was raised in the Midwest, where a blend of modesty, community spirit, and pragmatic values shaped her outlook. Her white, Midwestern American heritage includes regular participation in
    local civic activities, support for community festivals, and an appreciation for regional history and the arts. Her education in arts and humanities deepened her connection to literature, theater, and
    cultural preservation, fostering a lifelong commitment to leveraging cultural programs for community enrichment while honoring the practical, collaborative ethos of her upbringing.
