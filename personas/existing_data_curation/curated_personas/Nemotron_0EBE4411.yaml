  career_goals: Selma aims to transition into senior executive leadership within the cultural and community development sector, ideally as a director of regional arts programs or a chief community engagement
    officer. She wants to champion inclusive, flexible program models that integrate new ideas with proven community practices. Over the next five years, she plans to complete an executive certificate in
    public administration, expand her network of municipal and nonprofit leaders, and launch a mentorship program for mid‑career women in arts management. Ultimately, she envisions founding a consultancy
    that helps organizations adopt agile, people‑centered strategies for cultural programming and civic engagement.
