  hobbies: '[''Watercolor painting'', ''Sketching industrial scenes'', ''Visiting art galleries'', ''Fishing'', ''Hiking'', ''Vegetable gardening'', ''Woodworking'', ''Listening to classic rock and jazz'',
    ''Road‑tripping with spouse'', ''Volunteering (teaching computer basics)'']'
  career_goals: His primary career ambition is to transition from day‑to‑day frontline sales to a strategic mentorship role, such as senior sales trainer or regional sales manager, where he can shape the
    next generation of sales professionals and influence broader go‑to‑market strategies. He also hopes to leverage his interest in art and design by launching a boutique side venture that supplies locally
    crafted promotional materials to small manufacturers. Additionally, he aims to deepen his knowledge of emerging manufacturing technologies—such as IoT‑enabled equipment and sustainable production methods—to
    provide value‑added consulting to long‑standing clients. He plans to achieve a balanced phased retirement that allows him to stay active in his industry while dedicating more time to personal projects
    and community service.
