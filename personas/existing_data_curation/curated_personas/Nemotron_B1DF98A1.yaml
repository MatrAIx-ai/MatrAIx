  career_goals: Jason aims to transition from a hands‑on technician to a senior technical director overseeing large‑scale broadcast productions and live events across the Southeast. He aspires to lead multidisciplinary
    teams that blend cutting‑edge lighting, immersive audio, and augmented reality to create next‑generation viewer experiences. In the longer term, Jason plans to launch a boutique consultancy focused
    on sustainable lighting design and innovative sound‑visual installations for luxury resorts and cultural institutions in Florida, while also mentoring emerging technicians through workshops and local
    maker events.
