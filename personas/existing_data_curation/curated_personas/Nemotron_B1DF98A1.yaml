personas:
  professional: Jason Mansell, a 38‑year‑old broadcast sound and lighting technician with a STEM graduate background, leverages meticulous organization and relentless curiosity to engineer immersive AV
    productions, expertly handling live audio mixing, DMX lighting design, and custom Arduino‑based rigs while guiding small, collaborative teams toward seamless storytelling.
  sports: Jason Mansell channels their love for the Gulf Coast’s mangroves into regular sunrise kayak excursions with the Gulf Coast Paddle Club, supports the Miami Marlins as a weekend baseball fan, and
    completes weekly beach jogs to keep stamina for upcoming triathlon training, preferring low‑impact, nature‑immersive activities over large‑scale team sports.
  arts: Jason Mansell frequents downtown art galleries and indie music venues, where they dissect avant‑garde installations by artists like Olafur Eliasson and absorb experimental sounds from musicians
    such as William Basinski, often translating these inspirations into their own ambient field recordings and modular synth compositions.
  travel: Jason Mansell prefers meticulously planned, low‑key getaways that blend adventure with cultural immersion, having explored the wetlands of the Everglades, the historic streets of New Orleans,
    and the techno‑centric art scene of Berlin, while budgeting trips around their consultancy launch and occasional family visits.
  culinary: Jason Mansell enjoys cooking a moderately seasoned shrimp étouffée and grilling fresh grouper with a citrus‑herb glaze, often experimenting with smoked paprika and fresh thyme, while their coffee
    ritual involves a French press brewed with dark‑roast beans from a local micro‑roaster, reflecting a palate that balances comfort food with refined flavor nuances.
  core: Jason Mansell blends technical precision with artistic curiosity, can spend hours calibrating a home lighting rig while simultaneously perfecting a coffee brew, and habitually checks their smartwatch
    for both heart rate and ambient sound levels.
background:
  cultural: Jason grew up in a suburban Midwestern environment before relocating to Naples, Florida, bringing a blend of traditional American values and coastal lifestyle influences. His family heritage
    traces back to Northern European immigrants, fostering an appreciation for craftsmanship and self‑reliance. In Florida, he has absorbed the region’s eclectic cultural mix—exposure to Latin rhythms,
    Caribbean flavors, and Mediterranean-inspired art scenes—while maintaining a distinctly American work ethic. This cultural mosaic informs his open‑minded yet grounded approach to both his profession
    and personal pursuits.
