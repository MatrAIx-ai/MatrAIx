  career_goals: She aims to advance to a tech lead role and eventually become a software architect, guiding cross‑functional teams to create innovative products that blend technology with artistic experiences.
    Sun is passionate about promoting inclusive engineering practices, mentoring underrepresented talent, and contributing to open‑source projects. In the medium term, she plans to launch a side venture
    focused on interactive digital art installations for public spaces. Long‑term, she envisions transitioning into product management to shape strategic direction and champion socially impactful tech solutions.
