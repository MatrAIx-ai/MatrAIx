personas:
  professional: A seasoned full‑stack software developer, Sun Zhang leverages React, Node.js, and Python to craft responsive web experiences, while infusing minimalist design principles from their upbringing
    to champion inclusive engineering practices, mentor underrepresented talent, and they balance careful planning with creative spontaneity as they aspire to lead teams as a tech architect.
  sports: Sun Zhang enjoys weekend trail hikes in the Catskills, practices Vinyasa yoga at a Brooklyn studio affiliated with a mindful wellness collective, follows the Brooklyn Nets and New York Yankees,
    and participates in a local co‑ed softball league during summer, balancing competitive spirit with a relaxed approach to fitness, and they never miss the weekly Saturday run with their community running
    group.
  arts: Sun Zhang immerses themselves in Brooklyn’s street‑art scene, drawing inspiration from the provocative murals of Banksy and the kinetic light installations of James Turrell, while playing piano
    pieces by Ryuichi Sakamoto, curating digital illustrations that echo the minimalist aesthetics of Arne Jacobsen, and they regularly attend gallery openings featuring contemporary photographers such
    as Liu Bolin.
  travel: Sun Zhang prefers curated yet spontaneous trips, combining a well‑planned itinerary for cultural immersion—such as a week‑long calligraphy workshop in Shanghai and a tea‑ceremony stay in Kyoto—with
    impromptu weekend escapes to the lavender fields of Provence, the snowy slopes of Niseko, and the bustling street food markets of Mexico City, always booking flights through a travel app that allows
    flexible date changes, and they make a point to photograph sunrise over each new skyline.
  culinary: Sun Zhang delights in experimenting with fusion dishes like mapo tofu ramen and miso‑marinated pork belly, skillfully balancing the spicy Sichuan peppercorn with subtle dashi broth, while sourcing
    fresh koi fish and bok choy from an off‑the‑grid farmers‑market and occasionally splurging on a Michelin‑starred omakase experience for inspiration, and they quietly admit to over‑seasoning their ramen
    broth on sleepless nights.
  core: Sun Zhang blends tech savvy with artistic curiosity, juggling marathon coding sessions, midnight sketching marathons, and a habit of binge‑watching speculative fiction series, all while habitually
    forgetting to water their houseplants during busy project sprints, and they consider it a charming flaw.
background:
  cultural: Sun Midori Zhang is a first‑generation American of mixed Chinese and Japanese descent. Her family celebrates traditional Chinese customs such as Lunar New Year and Mandarin calligraphy, while
    also embracing Japanese influences reflected in her given name Midori and an appreciation for minimalist design. Raised in Queens and now residing in Brooklyn, she remains active in NYC's Asian community
    organizations, participates in cultural festivals, and regularly travels to Shanghai and Kyoto to stay connected with her roots. This bicultural heritage informs her worldview, culinary tastes, artistic
    sensibilities, and professional drive to bridge diverse perspectives.
