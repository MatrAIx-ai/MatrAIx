personas:
  professional: Evelyn Bannon, a seasoned business writer and editor with a knack for translating complex financial concepts into clear, concise prose, balances meticulous project management with flexible
    storytelling, and they mentor emerging writers while consistently meeting tight publishing deadlines.
  sports: Evelyn Bannon enjoys low‑impact fitness, favoring daily walks along the Tampa Bay shoreline, weekly gentle yoga sessions, and occasional pick‑up paddle‑board drills, while cheering on the Buccaneers,
    Lightning, and Rays from their porch, and they belong to a neighborhood walking group that meets every Saturday morning.
  arts: Evelyn Bannon’s artistic palate mixes reverence for classic Southern literature—devouring Faulkner and Harper Lee—alongside contemporary memoirs by Mary Karr, and they unwind by listening to Norah
    Jones and attending quarterly performances at the Tampa Bay Actors' Studio.
  travel: Evelyn Bannon plans trips with a careful itinerary that balances budget constraints and the desire for leisurely discovery, having already explored Key West, Savannah, and Asheville, and they
    dream of a slow‑paced culinary pilgrimage to Italy’s Amalfi Coast to sample fresh seafood and citrus‑infused dishes.
  culinary: Evelyn Bannon—an avid home chef with a solid grasp of flavor pairing—regularly experiments with fresh Gulf seafood, crafting blackened grouper tacos, citrus‑marinated shrimp ceviche, and herb‑laden
    oyster chowders, and they relish sourcing ingredients at the Largo farmer’s market.
  core: Evelyn Bannon is a meticulous, anxiety‑prone midlife maven who blends business acumen with literary flair, finding calm in shoreline walks and worrying over every spreadsheet, and they constantly
    balance order with the urge for creative freedom.
background:
  cultural: Evelyn grew up in a middle‑class suburban family in the American Midwest before relocating to Florida in her thirties. As a white American with a bachelor's degree in business, she carries the
    values of self‑reliance, community involvement, and a respect for both tradition and innovation. Her upbringing was culturally mainstream, with exposure to Midwestern work ethic and later, the laid‑back,
    nature‑oriented lifestyle of Pinellas County. She maintains a pragmatic yet open‑minded worldview shaped by both her corporate education and creative pursuits.
