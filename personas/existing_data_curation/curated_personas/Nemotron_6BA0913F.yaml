  hobbies: '[''Coastal Walking'', ''Yoga'', ''Gardening'', ''Birdwatching'', ''Reading Classic and Contemporary Literature'', ''Book Club'', ''Volunteer Library Work'', ''Cooking with Fresh Seafood'']'
  career_goals: Evelyn aims to publish a series of books that blend personal memoir with practical business guidance, targeting both aspiring entrepreneurs and readers seeking personal growth. She seeks
    a traditional publishing contract for her upcoming guide on navigating career transitions after midlife, while also building a strong author platform through speaking engagements at local business schools
    and writers' conferences. Additionally, she aspires to mentor young writers through community workshops, and eventually launch a small press focused on underrepresented voices in the region.
