  career_goals: Even in her eighties, Stephanie aims to stay intellectually active and give back to her community. She plans to launch a senior‑friendly coding workshop series at the local library, write
    a memoir that blends her experiences as a woman in STEM with reflections on the social changes she has witnessed, and develop a photo‑essay blog that documents Long Beach’s coastal and cultural history.
    She also hopes to serve on the city’s advisory board for senior services, secure a small scholarship fund for local high‑school students pursuing STEM fields, and complete a community 5K walk/run to
    promote healthy aging. Her overarching ambition is to leave a tangible legacy of mentorship and community enrichment.
