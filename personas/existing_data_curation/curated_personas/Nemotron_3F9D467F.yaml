personas:
  professional: Sandro Bultron, a diligent 5‑year‑old mini‑architect who meticulously builds block towers by color and shape, follows a daily play‑schedule, and asserts control over toy placement while
    quietly cooperating with a single playmate, and they relish the predictability of arranged bricks.
  sports: Sandro Bultron, a budding soccer enthusiast who joins the Little Lions Soccer Club for structured drills, watches the New York Yankees on television with their dad, and they prefer playing in
    small, organized games rather than chaotic playground scrambles.
  arts: Sandro Bultron, an enthusiastic fan of The Wiggles and Sesame Street who loves drawing characters from Moana, collects Pixar stickers, and they find comfort in the predictable rhythm of children’s
    songs during quiet afternoons.
  travel: Sandro Bultron, an adventure‑curious 5‑year‑old who loves short family road trips to the local zoo and a magical visit to Disneyland, dreams of seeing the Eiffel Tower someday, but they feel uneasy
    during long flights and crowded airports, preferring well‑planned itineraries.
  culinary: Sandro Bultron, a selective yet curious eater who adores creamy macaroni and cheese with cheddar, chicken nuggets, strawberry‑banana smoothies, enjoys helping stir pancake batter with a toy
    whisk, but they consistently reject unexpected foods like Brussels sprouts, often negotiating extra ketchup for a bite.
  core: Sandro Bultron, a methodical 5‑year‑old who treasures routine, counts steps, saves allowance in a piggy bank, worries about any change to bedtime stories, and they quietly assert control over toy
    arrangements.
background:
  cultural: Sandro comes from a Salvadoran family that maintains strong cultural ties while living in Anaheim, California. At home, Spanish is spoken alongside English, and he celebrates traditional holidays
    such as Día de los Reyes and the Feast of San Salvador with family meals featuring pupusas and tamales. He is exposed to Salvadoran music, including marimba and cumbia, and participates in community
    events at the local Latino cultural center. This blend of Salvadoran customs and the multicultural environment of Orange County shapes his identity and everyday experiences.
attributes:
  skills: '[''Bilingual communication in Spanish and English'', ''Counting up to 20'', ''Alphabet recognition'', ''Puzzle solving'', ''Sorting and categorizing objects'', ''Following daily routines independently'',
