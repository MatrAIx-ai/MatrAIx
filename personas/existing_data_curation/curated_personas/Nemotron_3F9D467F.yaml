  hobbies: '[''Building LEGO sets'', ''Completing jigsaw puzzles'', ''Drawing and coloring pictures'', ''Listening to bilingual storybooks'', ''Sorting toys by color and size'', ''Playing small‑group soccer'',
    ''Helping prepare simple meals'', ''Dancing to Salvadoran folk music'']'
  career_goals: Sandro dreams of becoming a city planner or architect who designs safe, organized spaces. He loves building LEGO structures and often imagines creating real neighborhoods where everything
    is in its proper place. He expresses a desire to help families live in tidy, well‑planned homes, reflecting his love for predictability and order.
