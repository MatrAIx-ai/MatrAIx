    PowerShell)'', ''Project coordination'', ''User training and onboarding'', ''Data backup and recovery'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Landscape and street photography'', ''Playing acoustic guitar'', ''Community tech tutoring for high‑school students'', ''Hiking
    in nearby state parks'', ''Fishing with friends'', ''Participating in a local softball league'', ''Cooking creative Southern cuisine'', ''Reading non‑fiction on technology and creativity'', ''Listening
    to podcasts on emerging tech and art'', ''DIY electronics projects (Arduino, Raspberry Pi)'']'
  career_goals: 'Brandon aims to advance into a senior IT leadership role within the next five years, targeting positions such as IT Support Manager or Technical Operations Lead at a regional organization
    or municipal government. To achieve this, he plans to earn advanced certifications including CompTIA Network+, Security+, Microsoft Certified: Azure Administrator Associate, and Cisco CCNA, while deepening
    his expertise in cloud services and cybersecurity. He also envisions launching a community tech hub in Hahira that offers digital‑literacy workshops, maker‑space resources, and collaborations with local
    artists, positioning himself as a catalyst for innovation and economic growth in his hometown while preserving a balanced family life.'
