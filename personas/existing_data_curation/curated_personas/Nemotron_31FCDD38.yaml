personas:
  professional: Brandon Copper is a seasoned computer support specialist who excels at troubleshooting hardware, automating tasks with Python and PowerShell, and delivering clear, patient training, while
    their disciplined, organized approach and curiosity about emerging tech drive their ambition to become an IT Support Manager and launch a community tech hub in Hahira.
  sports: Brandon Copper plays in a weekend softball league with the Hahira Hawks, hikes the Chattahoochee National Forest in the spring, supports the Atlanta Braves and the Georgia Bulldogs, and treats
    fitness as a social ritual, often organizing group rides to local parks, balancing competition with community camaraderie.
  arts: Brandon Copper immerses themselves in the visual arts by painting watercolors of Savannah’s squares, photographing Georgia’s rolling hills akin to Ansel Adams, attending exhibitions at the High
    Museum, strumming acoustic covers of B.B. King and folk tunes by Mumford & Sons at open‑mic nights, and curating playlists that blend blues, folk, and contemporary indie to fuel their creative rhythm.
  travel: Brandon Copper prefers carefully planned road trips that mix tech conferences with cultural immersion, having explored Asheville’s mountain arts scene, savored Cajun cuisine in New Orleans, and
    attended Art Basel Miami, while dreaming of a future family vacation to the historic streets of Edinburgh, balancing adventure with the responsibility of their community hub project.
  culinary: Brandon Copper enjoys experimenting with Southern cuisine, perfecting shrimp and grits spiced with smoked paprika, crafting buttery buttermilk biscuits, and infusing collard greens with fresh
    thyme, while their DIY spirit drives them to build a custom home smoker and occasionally over‑season dishes in pursuit of bold flavors.
  core: Brandon Copper blends disciplined tech expertise, artistic curiosity, and community spirit into a calm, sociable life, punctuated by a love for softball, watercolor, and Southern cooking, even if
    they sometimes splurge on vintage PC parts.
background:
  cultural: Brandon grew up in the rural South, raised in a close‑knit family in small‑town Georgia where hospitality, community, and a strong work ethic are core values. He pursued a bachelor's degree
    in STEM at the University of Georgia, blending his Southern roots with a curiosity that led him to explore art, technology, and unconventional ideas. His cultural identity is shaped by traditional Southern
    customs—church gatherings, Sunday barbecues, and an appreciation for country, blues, and gospel music—while his open‑minded outlook is enriched by travel, exposure to diverse artistic expressions, and
    a commitment to fostering innovation within his local community.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Software installation and configuration'', ''Network diagnostics'', ''Remote desktop support'', ''Help desk ticketing systems (ServiceNow, Zendesk)'',
