  career_goals: In the coming years John hopes to curate a local exhibition of his artwork and self‑publish a collection of his poems and memoir reflections. He aims to start a monthly art‑and‑writing workshop
    for teenagers at the community center, sharing his imaginative approach. He also wishes to develop a small community garden where he can mentor participants in creative landscaping. Ultimately, he seeks
    to leave a legacy of artistic contribution and personal mentorship within his neighborhood.
