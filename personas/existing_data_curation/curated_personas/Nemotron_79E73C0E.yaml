personas:
  professional: John Thomas, a 66‑year‑old self‑taught visual artist and community organizer in Columbus, blends imaginative watercolor abstractions with meticulous event coordination, using their calm
    mediation style to foster collaborative senior‑center programs and aspiring teenage workshops.
  sports: John Thomas enjoys low‑impact fitness, taking daily walks through Franklin Park and participating in the Columbus Senior Walking Club, while cheering on the Columbus Blue Jackets in winter and
    the Columbus Crew during the MLS season; they also follow Ohio State Buckeyes football in the fall and play occasional pickleball at the community center, balancing regular gentle stretching with a
    relaxed, socially oriented approach to staying active.
  arts: John Thomas draws artistic inspiration from the abstract color fields of Mark Rothko and the lyrical watercolors of Georgia O'Keeffe, while their literary palate includes Ursula K. Le Guin's speculative
    fiction and Mary Oliver's nature poetry; musically, they unwind to Miles Davis' modal jazz and the symphonies of Gustav Mahler, and they regularly visit exhibitions at the Columbus Museum of Art and
    local galleries featuring contemporary regional artists.
  travel: John Thomas favors leisurely road trips that blend art and nature, having explored Ohio's Hocking Hills and the historic streets of Charleston, South Carolina, as well as a memorable train journey
    to Chicago's Art Institute, while dreaming of a summer pilgrimage to Florence's Uffizi Gallery and a spring visit to Kyoto's temples to sketch cherry‑blossom vistas.
  culinary: John Thomas, a competent home cook, delights in preparing garden‑fresh dishes such as heirloom tomato and basil bruschetta, rosemary‑infused roasted potatoes, and a silky lemon‑butter salmon
    paired with sautéed kale, often seasoning with locally sourced garlic and wild herbs, and they treat themselves to an occasional indulgence of fresh‑made vanilla bean ice cream topped with caramel drizzle.
  core: John Thomas is a 66‑year‑old watercolor dreamer who trades late‑night TV for stargazing, hoards vintage art catalogues, forgets to water indoor plants on rainy days, and believes every garden should
    double as a canvas.
background:
  cultural: John grew up in suburban Columbus, Ohio, during the post‑war era, within a predominantly Anglo‑American, middle‑class community. His upbringing reflected Midwestern values of modesty, reliability,
    and community service, while the cultural changes of the 1960s introduced him to art, music, and broader intellectual currents. Family traditions included church gatherings, local fairs, and a respect
    for neighborly cooperation. These influences combine a traditional Midwestern work ethic with an enduring curiosity for artistic expression and abstract ideas.
