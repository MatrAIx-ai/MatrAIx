  career_goals: Herman dreams of becoming an engineer who designs practical, sustainable structures for his hometown. He is particularly interested in civil engineering and robotics, envisioning a future
    where he can lead a team to build functional machines or community projects. He aims to earn a scholarship to a STEM‑focused high school and eventually work on infrastructure that improves life in rural
    Louisiana, while also keeping his competitive edge sharp by participating in science fairs and engineering contests.
