  career_goals: Debra aspires to transition from driver to a supervisory role within the local transportation sector, such as a dispatcher or fleet manager, where she can shape routes that better serve
    underserved neighborhoods and senior citizens. She plans to obtain a commercial driver’s licence (CDL) and complete a short‑term certification in transportation logistics. Long‑term, she envisions launching
    a community‑focused ride service that pairs transportation with cultural tours of African‑American heritage sites in Southwest Georgia, blending her love of art with her professional expertise. Additionally,
    she hopes to complete her associate degree in business administration, which would give her the tools to manage a small enterprise and secure greater financial stability for her family while reducing
    the stress associated with unpredictable driving schedules.
