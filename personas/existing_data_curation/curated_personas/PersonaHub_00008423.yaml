  and adults develop a strong sense of self-worth, empathy, and trust. This therapist is also highly skilled in working with families and has a proven track record of successfully implementing Theraplay
  therapy in a variety of settings. This therapist is dedicated to continuing their education and training to stay up-to-date with the latest research and developments in the field of Theraplay therapy.
