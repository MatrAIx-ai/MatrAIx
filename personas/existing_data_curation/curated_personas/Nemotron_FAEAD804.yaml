personas:
  professional: An aspiring digital architect, Tejal Patel, an 11‑year‑old, channels their love for clear rules into meticulously planned Minecraft builds and Scratch game prototypes, and they balance imaginative
    flair with a practical, detail‑oriented mindset.
  sports: Tejal Patel, an 11‑year‑old who balances structured soccer practice with the Riverside Junior Soccer Club’s weekly drills and family hikes along local Riverside trails, cheers for the Los Angeles
    Lakers during basketball season, and incorporates short yoga stretches at home to maintain balance and alleviate stress, though they occasionally skip a practice when a Minecraft project feels urgent.
  arts: Tejal Patel, an 11‑year‑old who spends afternoons mastering the disciplined choreography of Bharatanatyam under teacher Shobana Lakshmi, delves into mystery novels by Carolyn Keene, and draws narrative
    inspiration from Studio Ghibli’s "Spirited Away" to fuel their Scratch storytelling projects, while they occasionally lose track of time and forget to complete homework.
  travel: Tejal Patel, an 11‑year‑old explorer who prefers well‑planned weekend getaways with family, has hiked the nearby Riverside State Park and visited the Smithsonian National Museum of Natural History
    in Washington, D.C., and dreams of a future summer trip to Kyoto, Japan, and a winter adventure at the Rocky Mountain ski resorts, balancing excitement with a careful budgeting spreadsheet they maintain.
  culinary: Tejal Patel, an 11‑year‑old budding chef who confidently rolls dough for aloo parathas, mixes fragrant cardamom‑spiced laddu for Diwali, experiments with butter‑rich chocolate chip cookies,
    and enjoys a mango lassi after school, often documenting their favorite recipes in a notebook they share with friends, though they sometimes rush the cooking process when anxious about upcoming school
    tests.
  core: Tejal Patel is a detail‑driven 11‑year‑old who channels their love of structure into Minecraft skyscrapers, meticulous allowance tracking, and disciplined Bharatanatyam practice, yet wrestles with
    persistent worry that fuels both creative bursts and occasional procrastination.
background:
  cultural: Tejal is a second‑generation South Asian American from a Gujarati‑Indian family living in Corona, California. At home she hears Gujarati and Hindi spoken alongside English, celebrates Diwali,
    Holi, and Navratri with family gatherings, and participates in a local South Asian cultural center that offers dance, music, and language classes. Her family emphasizes the importance of education,
    respect for elders, and community service, values that shape her daily routine and aspirations. While fully integrated into her public middle school environment, she also maintains cultural ties through
    traditional meals, festivals, and occasional visits to relatives in the Bay Area.
attributes:
  skills: '["Organized study habits", "Time management", "Basic programming (Scratch)", "Mathematics problem solving", "Reading comprehension", "Cooking simple Indian dishes", "Mandala drawing", "Effective
