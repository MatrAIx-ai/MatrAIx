  hobbies: '["Minecraft building", "Scratch programming", "Bharatanatyam dance", "Reading mystery books", "Journaling", "Cooking traditional Indian snacks", "Family hiking", "Celebrating Diwali and Holi"]'
  career_goals: Tejal is drawn to careers that blend logical problem‑solving with a tangible impact on people's health. She dreams of becoming a pediatric doctor, hoping to use her empathy and desire to
    help children to make a difference, or a biomedical engineer who designs child‑friendly medical devices. She also considers teaching as a way to share organized, step‑by‑step learning strategies with
    younger students. She plans to join her school's STEM club, participate in science fairs, and eventually attend a university with strong programs in health sciences or engineering, while staying connected
    to her community through volunteer health outreach.
