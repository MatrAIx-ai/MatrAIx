persona_description: A researcher or expert in natural resource management, specifically focused on the use of large herbivores, such as domestic livestock and wild and semi-wild herbivores, to mitigate
  wildfire risk and prevent them from occurring in areas experiencing rural depopulation. The persona is knowledgeable about the effectiveness of such herbivores in reducing wildfire risk through their
  grazing, and the potential co-benefits they offer, such as creating mosaic landscapes that support high levels of biodiversity and avoiding conflict with more vulnerable domesticated animals. The persona
  is interested in the findings of the new study, which provides recommendations for land managers on how to revise European and global fire and agricultural policies to better support this approach.
