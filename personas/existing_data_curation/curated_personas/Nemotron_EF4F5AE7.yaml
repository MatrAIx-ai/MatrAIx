personas:
  professional: Tiffany Guerra is a seasoned elementary and middle‑school teacher who blends child‑development expertise with tech‑savvy instruction, using project‑based learning to meet diverse needs while
    keeping a pragmatic eye on state standards.
  sports: Tiffany Guerra enjoys weekend hikes through Kettle Moraine State Forest with her family, rallies with the Green Bay Packers and Milwaukee Brewers during the season, and plays in a community adult
    softball league that satisfies her love for light competition and teamwork.
  arts: Tiffany Guerra immerses herself in the arts by attending West Bend community‑theater productions, discussing Agatha Christie mystery novels at her book club, knitting scarves inspired by folk patterns,
    and listening to folk‑rock favorites like Mumford & Sons while crafting DIY classroom resources.
  travel: Tiffany Guerra prefers spontaneous road trips to nearby natural gems like Door County and the Apostle Islands, while also dreaming of hiking New Zealand’s fjords and exploring her ancestral towns
    in Germany and Poland, balancing family obligations with a love for off‑beat itineraries.
  culinary: Tiffany Guerra blends Midwestern comfort food—such as cheese‑curd casserole and butter‑baked chicken—with global twists like kimchi‑infused mac and cheese and tikka‑masala quinoa, harvesting
    fresh herbs from her vegetable garden to spice up dishes and experimenting with new recipes each week.
  core: Tiffany Guerra, a 44‑year‑old teacher, balances curiosity and practicality, embraces spontaneous community‑focused projects, and navigates life with a mix of organized generosity and occasional
    disarray.
background:
  cultural: Tiffany comes from a white, Midwestern family with deep roots in Wisconsin's German-Polish heritage. Raised in West Bend, she was immersed in the region's emphasis on community, hard work, and
    modesty. Church (a Lutheran congregation) and local events such as county fairs shaped her sense of belonging, while the area's natural landscape fostered an appreciation for outdoor recreation. These
    cultural influences blend with contemporary values of inclusivity and lifelong learning, guiding both her teaching philosophy and her engagement in community activities.
attributes:
  skills: '["Curriculum design and alignment", "Differentiated instruction", "Classroom management", "Student assessment and data analysis", "Technology integration (Google Classroom, interactive whiteboards)",
    "Project-based learning", "Social-emotional learning facilitation", "Parent-teacher communication", "Inclusive practices for special-needs students", "Improvisational lesson planning"]'
  hobbies: '["Hiking in Kettle Moraine State Forest", "Vegetable gardening", "Cooking experimental recipes", "Reading mystery novels", "Participating in a book club", "Knitting and crafting", "Volunteering
    at the West Bend public library", "Attending community theater productions", "Hosting board game nights", "Listening to education podcasts"]'
  career_goals: Tiffany aims to deepen her expertise by completing a bachelor's degree in education and earning an endorsement in special-education, positioning herself for a curriculum coordinator role
    at her school. She envisions leading a STEAM initiative that blends hands-on experimentation with the practical rigor of state standards, allowing her to nurture students' curiosity while maintaining
    measurable outcomes. Over the next five years, she hopes to mentor novice teachers, present at state education conferences, and eventually step into an instructional leadership position such as assistant
    principal, where she can influence school-wide policies that support flexible, student-centered learning. Concurrently, she plans to strengthen her organizational and data-driven decision-making skills
    through targeted professional-learning workshops.
