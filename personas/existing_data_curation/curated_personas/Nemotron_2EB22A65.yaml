personas:
  professional: Elena Rajagopalan is a junior chemical engineering student who leverages Aspen HYSYS and Python to design sustainable processes, writes meticulous standard operating procedures, and leads
    small project teams with a deadline‑driven, methodical approach, and they consistently apply a systematic mindset to every technical challenge.
  sports: Elena Rajagopalan enjoys early‑morning jogs along the Hudson River, practices yoga twice weekly, follows the New York Knicks and the New York Rangers, and they are a member of a local climbing
    gym’s beginner group.
  arts: Elena Rajagopalan regularly attends MoMA exhibitions, loves the works of Yayoi Kusama and Banksy, streams indie folk artists like Phoebe Bridgers, and they never miss a Broadway show featuring Lin‑Manuel
    Miranda.
  travel: Elena Rajagopalan plans trips with a balance of spreadsheets and spontaneous detours, has hiked the Catskills, dreams of exploring Iceland’s geothermal sites, and they frequently visit the historic
    streets of Boston for weekend getaways.
  culinary: Elena Rajagopalan cooks Indian chana masala and Mediterranean grilled halloumi with olives on her balcony kitchen, experiments with spice blends, and enjoys the occasional avocado toast, though
    they sometimes over‑salt dishes when stressed.
  core: Elena Rajagopalan is a structured, puzzle‑loving future engineer who blends sustainable chemistry with yoga, meticulous budgeting, and a habit of over‑packing for trips, and they always carry a
    reusable water bottle.
background:
  cultural: Elena is a second‑generation American whose father immigrated from India and whose mother is of European descent, giving her a blended cultural heritage. Raised in New York City, she grew up
    celebrating both American holidays like Thanksgiving and Indian traditions such as Diwali and Navratri, often participating in community events organized by the local Indian diaspora. She speaks English
    fluently and has a conversational familiarity with Tamil, the language of her paternal family. This multicultural upbringing has fostered an appreciation for diversity, a strong emphasis on education,
    and a balanced worldview that integrates her Indian family values with the broader American cultural context.
attributes:
  skills: '[''Process simulation (Aspen HYSYS)'', ''Chemical reaction engineering'', ''Laboratory safety and regulatory compliance (EPA/OSHA)'', ''Analytical instrumentation (GC, HPLC)'', ''Data analysis
    (Python, MATLAB)'', ''Statistical quality control (Minitab)'', ''Technical documentation and SOP creation'', ''Project planning and team coordination'', ''Problem‑solving and root‑cause analysis'',
    ''Effective technical communication'']'
  hobbies: '[''Puzzle solving (Sudoku, crosswords)'', ''Reading contemporary fiction and science non‑fiction'', ''Urban balcony gardening'', ''Cooking Indian and Mediterranean cuisine'', ''Hiking in Hudson
    Valley'', ''Attending museum exhibitions and theater'', ''Yoga and meditation'', ''Volunteering in STEM outreach for high‑school girls'']'
  career_goals: Elena aims to complete her bachelor's degree in chemical engineering by 2025 and secure a full‑time position as a process engineer with a focus on sustainable manufacturing in the pharmaceutical
    or specialty chemicals sector. She plans to pursue a master's degree in green chemistry to deepen her expertise in environmentally responsible process design. Long‑term, she envisions leading multidisciplinary
    teams to develop low‑carbon, circular‑economy solutions, while also mentoring women and underrepresented students in STEM through outreach programs.
