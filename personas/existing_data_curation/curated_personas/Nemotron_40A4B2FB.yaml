  hobbies: '[''photography'', ''visiting art galleries'', ''sketching'', ''strategic board games'', ''darts tournaments'', ''hiking in the Laurel Highlands'', ''knife sharpening'', ''home charcuterie'',
    ''experimental cooking'', ''food-science podcasts'', ''reading non-fiction culinary books'', ''volunteering at community garden'']'
  career_goals: Mark aims to become a certified master butcher and eventually open his own boutique meat shop that emphasizes locally sourced, sustainably raised products. He plans to earn a GED and pursue
    a food-science certification to deepen his understanding of meat processing and nutrition. In the medium term, he seeks a supervisory role or quality-assurance manager position within a larger processing
    facility, where he can apply his meticulous standards and competitive drive to lead a high-performing team. Long-term, Mark envisions expanding into artisanal charcuterie, offering workshops, and possibly
    writing a guide on responsible meat sourcing for home cooks.
