    and museum volunteer work'']'
  hobbies: '[''Watercolor painting with Mexican motifs'', ''Visiting art galleries and museums'', ''Reading historical fiction and memoirs'', ''Gardening (heirloom vegetables and chilies)'', ''Gentle yoga
    practice'', ''Participating in a Mexican folk dance group'', ''Photography of community events and nature'', ''Genealogy research into Mexican ancestry'']'
  career_goals: Despite being retired, Kelsie remains driven by a desire to preserve and share her cultural legacy. She aims to compile a family cookbook that blends traditional Mexican recipes with stories
    from her own life and the Morgan community, hoping to publish it as a small press book. Kelsie also plans to document oral histories of older Mexican-American residents in Utah, creating an archive
    for the local historical society. She aspires to travel to her ancestral hometown in Jalisco for a month-long immersion, deepening her connection to her roots. Additionally, she wishes to mentor teens
    in a cross‑cultural art program, fostering curiosity and appreciation for unconventional artistic expression.
