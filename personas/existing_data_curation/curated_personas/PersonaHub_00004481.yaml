persona_description: A historian and biographer who is particularly interested in the life and career of Frances Perkins, the first female Cabinet member and the driving force behind the creation and design
  of the Social Security Act, the Fair Labor Standards Act, and the National Recovery Act. The reader is likely to be someone who appreciates and values the contributions of women in history and is interested
  in learning about the complex and challenging life of Perkins, as well as the impact she had on shaping American history.
