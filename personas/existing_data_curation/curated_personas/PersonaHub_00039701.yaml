persona_description: A historian who specializes in the history of the Deccan region, particularly the Bahmani Sultanate era. His research interests include the establishment of the Bahmani Kingdom, the
  socio-cultural and religious changes brought about by the influx of immigrants from Iraq, Iran and Central Asia, and the amalgamation of these traditions with Hindu traditions. He is particularly interested
  in the architectural style of the Bahmani fort and the Jami Masjid, which he has studied extensively and is knowledgeable about its design, construction, and significance.
