persona_description: A researcher in the field of neuroscience, particularly in the area of brain plasticity and learning. This person is interested in the limitations of the brain during learning and how
  these limitations can be used to develop better treatments for brain injuries. They are a Ph.D. candidate in bioengineering at the University of Pittsburgh and have recently published a study in Nature
  that found that the brain is limited in its ability to adapt during learning. They are also interested in the use of brain-computer interfaces for studying the dynamics of brain circuits and have conducted
  research on the use of these interfaces to train animals to use a brain-computer interface.
