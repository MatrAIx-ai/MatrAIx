  career_goals: Karla aims to transition into a lead engineering or engineering‑manager role where she can shape product strategy at a company that blends technology with art. She aspires to launch her
    own startup focused on interactive, generative art platforms that empower creators to experiment with AI‑driven visuals. Additionally, she is committed to championing diversity in tech, mentoring women
    developers, and contributing to open‑source projects that democratize creative coding tools. Long‑term, she envisions influencing the industry’s approach to user‑centered, aesthetically driven software
    design.
