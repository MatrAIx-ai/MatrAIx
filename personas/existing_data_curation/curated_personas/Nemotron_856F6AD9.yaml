personas:
  professional: Karla Walton, a full‑stack software engineer with a humanities background, crafts visually rich web experiences using React, Node.js, and D3.js, while channeling her calm, sociable demeanor
    into leading agile teams, mentoring women developers, and steering product strategy toward the fusion of technology and art.
  sports: Karla Walton stays active by hiking the rugged trails of Wisconsin’s state parks, plays soccer on a co‑ed community league team called the Madison Mavericks, follows the Milwaukee Bucks, Green
    Bay Packers, and Milwaukee Brewers with avid enthusiasm, and runs with the Lakefront Trail Running Club, balancing competitive spirit with a laid‑back, sociable approach to fitness.
  arts: Karla Walton expresses creativity through oil and acrylic paintings inspired by Yayoi Kusama’s polka‑dot motifs, captures sunrise landscapes with a Canon EOS R, plays acoustic guitar at open‑mic
    nights covering Bon Iver and Nina Simone, devours contemporary fiction by Sally Rooney, philosophy by Alain de Botton, and art criticism by Roberta Smith, and volunteers at local art workshops where
    her talkative, center‑stage energy fuels collaborative projects.
  travel: Karla Walton’s wanderlust has taken her to the Edinburgh Festival Fringe, the Holi Festival in Jaipur, and a weekend road trip exploring Door County’s lighthouses, and she dreams of strolling
    through Barcelona’s Gothic Quarter and attending the Kyoto Gion Festival, preferring a mix of meticulously planned itineraries and spontaneous detours that satisfy her curiosity and love for folk art.
  culinary: Karla Walton enjoys cooking Thai green curry with fresh lemongrass, mastering homemade gnocchi with ricotta, and experimenting with Ethiopian injera, often sourcing heirloom tomatoes from the
    Dane County farmers’ market, and she occasionally indulges in elaborate tasting menus at avant‑garde restaurants, though she admits her habit of over‑seasoning dishes with extra chili flakes can be
    a quirky flaw.
  core: Karla Walton blends tech savvy with artistic flair, navigating life with calm confidence, sociable curiosity, and a habit of turning every project into a collaborative canvas.
background:
  cultural: Karla was raised in a middle‑class white family in the Midwest, spending her childhood in the suburbs of Milwaukee before moving to Mukwonago, Wisconsin. Her upbringing emphasized community
    involvement, modesty, and a strong work ethic typical of Midwestern culture. Family traditions reflect her mixed German and Irish ancestry, with celebrations like Oktoberfest and St. Patrick’s Day reinforcing
    an appreciation for folk music and culinary heritage. The close‑knit atmosphere of Walworth County, with its farmer’s markets, town festivals, and supportive local arts scene, nurtured her early interest
    in visual arts and performance. Her bachelor's degree in humanities further deepened her appreciation for narrative, history, and cultural expression, shaping a worldview that values both creative exploration
    and practical collaboration.
