  career_goals: Canh dreams of becoming a civil engineer or a robotics designer, attracted by the idea of creating structures and machines that solve real‑world problems. He values a career that offers
    clear steps and stability, allowing him to apply his curiosity about how things work while providing a practical, reliable livelihood. He also imagines helping his community by designing safe bridges
    or innovative playgrounds, and he understands that achieving these goals will require diligent study and persistent effort.
