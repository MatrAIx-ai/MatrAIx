personas:
  professional: Canh Khuth, an aspiring young game developer, blends a love for LEGO engineering with Scratch programming to create simple interactive adventures, and they apply a meticulous yet flexible
    approach that mirrors their curiosity‑practical balance.
  sports: Canh Khuth, a member of the neighborhood soccer club and an avid participant in weekend nature hikes with the local Park Explorers group, cheers for the hometown baseball team the River City Tigers
    and follows the Seattle Seahawks, and they prefer low‑key play over large crowds.
  arts: Canh Khuth, who draws whimsical cartoons inspired by Matt Groening and watches Studio Ghibli films, practices piano pieces by Beethoven and Yiruma, and they enjoy listening to the pop tunes of Taylor Swift
    while sketching, letting the arts shape a calm creative outlet.
  travel: Canh Khuth, who loves exploring both local parks and far‑away wonders, has visited the city’s children’s museum and the nearby mountain trail, dreams of seeing the Kennedy Space Center in Florida
    and the Great Barrier Reef in Australia, and they always plan trips around school holidays and family budgets.
  culinary: Canh Khuth, an eager kitchen assistant, enjoys helping prepare pho with star anise, rice noodles, and cilantro, rolls fresh spring rolls with shrimp and mint, and they can whisk a simple batter
    for bánh xèo, showing a budding culinary skill set tied to family traditions.
  core: Canh Khuth navigates the world with quiet curiosity, balancing meticulous LEGO building and Scratch coding with occasional worry‑driven over‑thinking, a love for solo drawing, and they have a penchant
    for saving allowance in jars while dreaming of space adventures.
background:
  cultural: Canh is a second‑generation Southeast Asian‑American, growing up in a bilingual household that celebrates both Vietnamese traditions and broader American culture. His family observes festivals
    such as Tet, prepares dishes like pho and spring rolls, and maintains close ties with a local Vietnamese community center in Sacramento. While he embraces these cultural practices, he also participates
    in school activities and enjoys the diversity of his Californian neighborhood, blending respect for his heritage with the openness of his American environment.
