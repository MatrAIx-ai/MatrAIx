  career_goals: In the next five years, Carlos aims to become a senior market insights manager, leading cross‑functional research initiatives and shaping strategic direction for his organization. He is
    pursuing advanced certification in predictive analytics to enhance his ability to forecast consumer behavior. Long‑term, he envisions a leadership role such as Director of Marketing Insights or launching
    his own consulting practice focused on data‑driven market strategies for Hispanic and multicultural brands. He is motivated by the desire to influence high‑impact decisions, set rigorous analytical
    standards, and mentor junior analysts while maintaining the flexibility to explore innovative research methodologies.
