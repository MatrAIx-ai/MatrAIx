  hobbies: '[''Salsa Dancing'', ''Volunteer STEM Workshops'', ''Book Club'', ''Yoga and Mindfulness Meditation'', ''Journaling'', ''Hiking and Trail Exploration'', ''Cooking Mexican Cuisine'', ''Hosting
    Dinner Gatherings'']'
  career_goals: Melva aims to ascend to a senior leadership role such as Director of Operations or Vice President of Operations within a multinational manufacturing or technology firm, where she can drive
    large‑scale sustainability initiatives and embed data‑centric decision‑making across the organization. She plans to earn a Lean Six Sigma Black Belt and a PMP certification to bolster her credibility
    in continuous improvement. Additionally, she is passionate about mentoring women and underrepresented minorities in STEM, intending to establish a mentorship program that supports career advancement
    and work‑life balance. Ultimately, she seeks a role that lets her blend operational excellence with a people‑first approach, creating resilient, inclusive teams.
