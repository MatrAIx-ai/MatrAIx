  career_goals: Gabriella envisions a future where she can combine her love of technology and storytelling. She aspires to become a software developer or video‑game designer who creates interactive narratives
    that educate and entertain. She is also drawn to community journalism, hoping to amplify local voices in Fair Lawn. Her competitive nature fuels a desire to excel academically, earn scholarships, and
    attend a top engineering program. Ultimately, she aims to develop technical expertise while staying grounded in practical problem solving, reflecting both her curiosity and pragmatic mindset.
