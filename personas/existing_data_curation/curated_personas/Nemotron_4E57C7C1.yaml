personas:
  professional: An aspiring junior software developer, Gabriella Richardson merges her curiosity for new coding ideas with a practical, prototype‑first mindset, often choosing quick Python or Scratch projects
    over detailed documentation, which reflects her relaxed attitude toward strict planning and a competitive drive to outshine peers in the after‑school coding club.
  sports: A competitive youth basketball player, Gabriella Richardson laces up for the Fair Lawn Youth Basketball League every Thursday, idolizes the New York Knicks and Connecticut Sun, thrives on fast‑paced
    scrimmages, yet often arrives a few minutes late because she prefers an unstructured warm‑up over a rigid schedule.
  arts: A passionate graphic novel enthusiast, Gabriella Richardson devours titles like Noelle Stevenson’s *Nimona* and Raina Telgemeier’s *Smile*, writes fan‑fiction featuring strong heroines inspired
    by these stories, sketches vibrant panels in her notebook, and curates playlists featuring Billie Eilish, Lizzo, and Doja Cat that fuel her creative sessions.
  travel: A curious weekend explorer, Gabriella Richardson has taken day trips to the Bronx Botanical Garden, spent summer mornings at the Jersey Shore, and dreams of a school‑organized field trip to Washington,
    D.C.’s Smithsonian Museums, balancing her love for adventure with a modest family budget.
  culinary: A budding home chef, Gabriella Richardson loves the comforting taste of collard greens and cornbread at family gatherings, whips up quick mac and cheese or ramen bowls after school, and recently
    tackled baking a sweet‑potato pie with cinnamon, nutmeg, and brown sugar, all while craving the occasional slice of New York‑style pizza.
  core: Gabriella Richardson is a curious, competitive 12‑year‑old who balances coding projects and basketball games with a love for graphic novels, yet often misplaces school assignments due to a relaxed
    approach to planning.
background:
  cultural: Gabriella comes from an African‑American family that has lived in New Jersey for several generations. Her parents celebrate a blend of cultural traditions, from Juneteenth and African‑American
    Heritage Month to the local festivals in Fair Lawn. The household enjoys a mix of Southern soul‑food classics like collard greens and cornbread alongside the diverse culinary options available in Bergen
    County. Music plays a central role at home, ranging from R&B and hip‑hop to contemporary pop, shaping Gabriella's own tastes. Growing up in a multicultural suburb, she attends a diverse public middle
    school where she interacts with peers from many ethnic backgrounds, giving her a broad perspective on American culture while staying connected to her roots through family stories, church gatherings,
    and community events.
