  career_goals: Frederick aims to earn a bachelor’s degree in Business Administration through evening classes, positioning himself for a promotion to regional manager or operations director within the next
    five years. He is passionate about introducing innovative, employee‑focused programs—such as cross‑training and idea‑incubation workshops—that blend his love of unconventional thinking with operational
    goals. Long‑term, he envisions opening a community‑run art space that showcases local talent while providing a venue for the creative workshops he values.
