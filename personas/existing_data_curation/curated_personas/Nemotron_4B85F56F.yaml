  hobbies: '[''Watercolor painting'', ''Vegetable gardening'', ''Birdwatching'', ''Local history and genealogy research'', ''Attending art exhibitions and community theater'', ''Reading art and history
    books'', ''Learning through online courses'', ''Walking nature trails'', ''Canning and cooking'', ''Playing bridge at the senior center'']'
  career_goals: Although retired, Vernon aims to leave a lasting personal legacy. He plans to write a memoir that weaves together his family history, local oil‑field heritage, and reflections on art, and
    to donate a copy to the Armstrong County Historical Society. He hopes to mentor younger community members in woodworking and gardening through informal workshops at the senior center. Vernon wants to
    stay physically healthy enough to attend the annual Pennsylvania Museum of Art exhibitions in Pittsburgh and to explore new artistic movements online. He is eager to complete a short online course in
    digital photography, expand his watercolor portfolio, and create an online gallery for his work. Maintaining strong relationships with his grandchildren and remaining an active volunteer are central
    to his ambitions.
