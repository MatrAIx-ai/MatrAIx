  hobbies: '["Cooking Mexican Cuisine", "Experimenting with Cocktail Recipes", "Hiking the Michigan Dunes", "Fishing on Saginaw Bay", "Playing Acoustic Guitar", "Listening to Regional Mexican Music", "Reading
    Food & Drink Literature", "Attending Local Craft Beer Tastings"]'
  career_goals: Omar aims to transition from bartender to bar manager within the next two years, pursuing a formal hospitality management certification to deepen his operational expertise. He aspires to
    open a small, community‑focused cocktail lounge that blends Midwestern craft sensibilities with Mexican flavor profiles, offering a curated menu of tequila‑based drinks and homemade small plates. In
    the longer term, he hopes to mentor younger staff, travel back to Mexico to study regional spirits, and possibly develop a line of signature bitters that reflect his cultural heritage.
