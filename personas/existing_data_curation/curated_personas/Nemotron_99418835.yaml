personas:
  professional: Omar, a 37‑year‑old bartender with a solid foundation in mixology, combines a curious palate and practical bar‑operation know‑how to craft inventive tequila‑ and mezcal‑based cocktails while
    diffusing patron conflicts with calm assertiveness, and is channeling this blend of creativity and reliability toward a bar‑manager role and a future community‑focused lounge.
  sports: Omar, a 37‑year‑old outdoor enthusiast, spends weekends hiking the dunes along Lake Michigan, fishing on Saginaw Bay with the local Saginaw Bay Anglers club, and supports the Detroit Lions and
    Detroit Tigers while playing pickup basketball at the community center during the summer.
  arts: Omar, a 37‑year‑old acoustic‑guitar hobbyist, unwinds by strumming classic rock riffs from The Rolling Stones and weaving cumbia rhythms from Los Tigres del Norte into their own improvisations,
    frequently attends live shows at the Blue Zeppelin and local art openings featuring works by Frida Kahlo and Diego Rivera, and draws inspiration from these cultural expressions for both food and drink
    creations.
  travel: Omar, a 37‑year‑old who balances work and wanderlust, prefers weekend road trips to Midwestern gems like Door County and Milwaukee’s craft‑brew scene, dreams of a month‑long immersion in Oaxaca
    to study regional spirits, but budgets travel expenses carefully, often booking last‑minute deals and traveling with a compact carry‑on to keep expenses low.
  culinary: Omar, a 37‑year‑old culinary tinkerer, excels at crafting homemade salsas from roasted tomatillos, chiles de árbol, and epazote, slow‑cooks mole with chocolate and dried chilies, and pairs these
    dishes with signature cocktails featuring mezcal and smoked jalapeño bitters, while their kitchen skill sits at an enthusiastic intermediate level, often experimenting with dishes like cochinita pibil
    and chiles en nogada.
  core: Omar, a 37‑year‑old bartender‑turned‑aspiring‑manager, blends curiosity, flexibility, and a love for Mexican‑inspired flavors with a penchant for spontaneous spur‑of‑the‑moment decisions, occasional
    disorganization, and a steady commitment to community.
background:
  cultural: Omar is a second‑generation Mexican‑American, born to parents who immigrated from Jalisco and settled in Linwood, Michigan. He grew up bilingual, speaking Spanish at home and English at school,
    which gives him a fluid cultural identity that blends Mexican traditions with Midwestern values. He actively celebrates Día de los Muertos, Mexican Independence Day, and family gatherings that feature
    traditional foods and music, while also participating in local community festivals and volunteer events. His heritage informs his palate and creativity behind the bar, leading him to integrate Mexican
    ingredients, such as agave syrup, chilies, and mezcal, into his drink offerings. At the same time, he respects and enjoys the regional customs of the Upper Midwest, creating a unique cultural fusion
    that shapes his personal and professional life.
attributes:
  skills: '["Mixology & Cocktail Creation", "Spirits Knowledge (Tequila, Mezcal, Whiskey)", "Customer Service & Relationship Building", "Bar Operations & Inventory Management", "Cash Handling & POS Systems",
