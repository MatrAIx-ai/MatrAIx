persona_description: A plant pathologist and nematologist who specializes in the research and management of plant-parasitic nematodes, particularly the soybean cyst nematode. They share their research results
  and management strategies with growers, and collaborate on research projects to develop better management practices to minimize yield loss caused by SCN. They are also involved in teaching and training
  programs for growers, and provide nematode sample test services. They have a background in general nematology research, including screening soybean genotypes for resistance or tolerance to nematodes,
  investigating fungal and bacterial antagonists of nematodes, studying soil microbial communalities associated with nematodes and crop yields, studying nematode communities associated with soil health
  in organic and conventional farming systems, and designing practicable and beneficial crop sequences for management of nematodes based on cropping systems in the region.
