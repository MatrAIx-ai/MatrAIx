persona_description: A researcher interested in the impact of an ASD co-diagnosis on individuals with Fragile X Syndrome (FXS), particularly those with FXS plus Autism Spectrum Disorder (ASD). This researcher
  is familiar with the FORWARD Registry & Database, a project of the NFXF Fragile X Clinical & Research Consortium, and has conducted a study examining the behavioral profiles of individuals with FXS plus
  ASD and FXS alone. The researcher is interested in understanding the similarities and differences between these two groups and how ASD co-diagnosis affects behaviors in FXS.
