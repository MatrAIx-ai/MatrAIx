persona_description: A person who is interested in anatomy and biomechanics, particularly in the musculoskeletal system. This person is likely to be a physiotherapist, orthopedic surgeon, or a researcher
  in the field of sports medicine. They would have a deep understanding of the anatomy of the knee joint, the patella, and its role in knee function. They would be familiar with the patellar tendinopathy,
  patellar instability, and patellar tendinitis. They would be able to provide insights into the treatment options for these conditions, such as patellar resurfacing surgery, patellar tendon reconstruction,
  and patellar osteotomy.
