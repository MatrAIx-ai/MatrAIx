  hobbies: '[''Urban sketching'', ''Street photography'', ''Jazz saxophone'', ''Science‑fiction reading'', ''Hiking in Westchester parks'', ''Chess and board games'', ''Gallery and museum visits'', ''Tech
    meetups'', ''Pickup basketball'', ''Improv comedy shows'']'
  career_goals: Willie aims to earn his Professional Engineer license within the next two years and transition into a senior project lead role on high‑impact infrastructure projects that blend engineering
    with public art. He is driven to champion eco‑friendly construction methods, influence city planning policies in the New York metro area, and eventually launch his own consultancy that delivers innovative,
    community‑centered design solutions. Long‑term, he envisions mentoring younger engineers from underrepresented backgrounds and contributing to industry standards for sustainable urban development.
