personas:
  professional: Bobby Brooks, a veteran wholesale and manufacturing sales representative with over four decades of experience in the Pacific Northwest, combines methodical territory planning, meticulous
    record‑keeping, and one‑on‑one client rapport to drive consistent sales while mentoring younger colleagues for a smooth transition into part‑time consulting.
  sports: Bobby Brooks enjoys low‑key fitness pursuits such as early‑morning fishing at local reservoirs, occasional weekend hikes along the Columbia River Gorge, and quietly follows the Seattle Seahawks
    and Portland Trail Blazers from his living room, while belonging to a senior walking club that meets twice a month.
  arts: Bobby Brooks expresses creativity through handcrafted wooden furniture, strums acoustic renditions of Bob Dylan and John Denver for family gatherings, and seeks inspiration at regional museums featuring
    American landscape paintings by Thomas Moran and historical exhibits on early Pacific Northwest logging.
  travel: Bobby Brooks prefers meticulously planned road trips to natural and historical sites, such as a weekend cabin stay on the Oregon coast, a day trip to Mount Rainier, and annual visits to the Smithsonian's
    American History Museum, balancing a love of solitude with occasional family‑oriented outings.
  culinary: Bobby Brooks delights in cooking steam‑cooked salmon seasoned with dill, roasted heirloom carrots and potatoes from their garden, and hearty beef stew infused with rosemary, while admitting
    a guilty pleasure of over‑indulging in buttery biscuits on rainy afternoons.
  core: Bobby Brooks, a methodical 62‑year‑old sales veteran, finds peace in solitary woodworking and fishing while contending with chronic anxiety that fuels meticulous planning and occasional self‑critical
    rumination.
background:
  cultural: Bobby comes from a multigenerational white, working‑class family with roots in the agricultural and mining communities of Idaho and neighboring Utah. His grandparents were of German and Irish
    descent, and his upbringing emphasized self‑reliance, hard work, and modest community involvement. Growing up in Boise during the 1960s and 1970s, he entered the workforce early, forgoing high school
    to support his family, which shaped his practical outlook and respect for established methods while still nurturing a quiet curiosity about new technologies in his field.
attributes:
  skills: '[''Territory Planning'', ''Customer Relationship Management'', ''Negotiation'', ''Product Knowledge (Wholesale & Manufacturing)'', ''Sales Forecasting'', ''Inventory Coordination'', ''Logistics
