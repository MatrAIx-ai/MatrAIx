persona_description: A professor of computer science who is working on improving communication tools for people with aphasia by using computers, images, and sound. He is exploring ways to organize and link
  words in aphasia-friendly applications and has taken a step back to look at the fundamentals of communicating with images or sounds. His team is also working on finding sound cues for people with aphasia
  that evoke meaning in ways that photos or words may not.
