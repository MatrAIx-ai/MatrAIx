  career_goals: Xiomara aims to translate her business education and sociable personality into a dynamic role in marketing or community outreach. In the next 12‑18 months she plans to secure an entry‑level
    marketing coordinator position where she can craft campaigns, manage events, and engage with diverse audiences. She intends to earn certifications in Google Analytics and HubSpot to bolster her digital
    skill set. Over the next five years she aspires to advance to a managerial role, lead cross‑functional projects, and eventually launch her own boutique consultancy that helps local nonprofits amplify
    their outreach through creative marketing.
