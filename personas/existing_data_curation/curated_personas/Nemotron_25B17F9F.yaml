  hobbies: '[''Hiking'', ''Cycling'', ''Kayaking'', ''Social/Latin dancing'', ''Live‑music concerts'', ''Cooking and recipe experimentation'', ''Hosting dinner parties'', ''Road trips'', ''Landscape photography'',
