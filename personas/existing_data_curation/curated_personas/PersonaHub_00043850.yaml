persona_description: A professor of computer science and vision science who specializes in vision-realistic rendering (VRR), a computer-generated synthetic image technology used to simulate a patient's
  vision, and has co-authored technical articles in various computer graphics and geometric modeling fields. He has held visiting positions in numerous universities and is a member of the Joint Graduate
  Group in Bioengineering. His work includes computer-generated videos of simulated vision and potential applications in surgical simulation and education.
