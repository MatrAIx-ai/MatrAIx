  hobbies: '[''Vietnamese Cooking & Culinary Workshops'', ''Hiking in the Sierra Foothills'', ''Badminton League Participation'', ''STEM Volunteer Mentorship'', ''Karaoke Nights with Friends'', ''DIY Home
    Renovation Projects'', ''Community Potluck Organization'']'
  career_goals: Thuy aims to obtain her Professional Engineer (PE) license within the next two years and transition into a senior project manager role overseeing major municipal infrastructure initiatives
    in Sacramento County. She aspires to lead a multidisciplinary team that prioritizes climate‑resilient design and zero‑waste construction practices. Long‑term, she envisions founding a consultancy that
    partners with local government and non‑profits to deliver affordable, sustainable water solutions for underserved communities, while also establishing a mentorship program that supports Southeast Asian
    women entering STEM fields.
