personas:
  professional: Thuy Phok is a civil and environmental engineer with over a decade of experience designing water‑resource infrastructure; they excel at turning complex technical data into clear, actionable
    project plans, apply Lean Six Sigma rigor, and lead multidisciplinary teams with a methodical, competitive edge while actively engaging community stakeholders.
  sports: Thuy Phok channels their competitive spirit into weekend hikes with the Sierra Foothills Hiking Club, weekly matches for the Sutter Hills Badminton League, and avidly follows the Sacramento Kings
    and Sacramento Republic FC, often tracking player stats while maintaining a disciplined cardio regimen to stay fit for both outdoor pursuits and badminton tournaments.
  arts: Thuy Phok fuels their sociable side with karaoke evenings blasting Beyoncé, ABBA, and beloved Vietnamese folk tunes, while regular visits to the Crocker Art Museum’s contemporary exhibitions and
    Saturday night shows at the Sacramento Community Theatre keep their artistic palate sharp.
  travel: Thuy Phok prefers meticulously planned getaways that blend natural adventure with cultural immersion, having trekked Yosemite’s Mist Trail, taken a weekend bike ride around Lake Tahoe, explored
    Kyoto’s historic temples, and scheduled a spring visit to New Orleans for its jazz scene, all while balancing travel aspirations with family commitments and a busy engineering schedule.
  culinary: Thuy Phok showcases advanced culinary prowess by simmering aromatic broth for authentic phở, hand‑rolling delicate bánh xìu, and experimenting with fusion creations like lemongrass‑infused lamb
    kebabs, favoring ingredients such as star anise, fish sauce, fresh cilantro, rice noodles, and quality beef brisket.
  core: Thuy Phok merges engineering precision with a vibrant community spirit, channeling their competitive drive into sustainable infrastructure, lively cooking sessions, and outdoor challenges, even
    if that sometimes means staying up late to finish lesson plans after karaoke.
background:
  cultural: Thuy is a first‑generation Vietnamese American whose family emigrated to California in the early 1980s. Raised in a tight‑knit diaspora community, she grew up balancing traditional Vietnamese
    values—respect for elders, collective responsibility, and perseverance—with the individualistic, innovative spirit of Californian culture. Fluent in both Vietnamese and English, she often serves as
    a cultural bridge, translating community needs for city planners and introducing American colleagues to Vietnamese customs, especially during Tết celebrations. Her heritage instills a strong work ethic
    and a deep sense of duty to give back, which informs both her professional dedication and her community‑focused extracurricular activities.
attributes:
