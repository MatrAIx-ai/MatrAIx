  career_goals: Natalie aims to transition into a leadership role within early‑learning education, such as curriculum coordinator or preschool director, over the next three to five years. She plans to pursue
    a master’s degree in early childhood education or an educational leadership certification to deepen her pedagogical expertise. Leveraging her business background, she intends to develop financially
    sustainable, culturally responsive programs and eventually open a boutique bilingual preschool that serves the diverse families of San Diego. She also aspires to mentor new teachers and advocate for
    mental‑health support services in early‑childhood settings.
