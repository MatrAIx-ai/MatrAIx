personas:
  professional: Jose is an aspiring robotics engineer who loves following detailed building plans, collaborates eagerly with their school’s robotics club teammates, and channels their preference for routine
    and organization into designing functional LEGO‑style prototypes, all while using their natural worry to double‑check every connection before a competition.
  sports: Jose plays forward for the Hillside Lions youth soccer team, shoots hoops at the local community center with their friends, idolizes the New York Knicks and New York Giants while staying fit through
    after‑school park runs, though they sometimes skip a workout when school stress peaks.
  arts: Jose strums their acoustic guitar, covering songs by Luis Fonsi, Ariana Grande, and Shawn Mendes, devours adventure comics like Tintin and Spider‑Man, and delights in community cultural events where
    traditional music and dance intersect with modern pop performances.
  travel: Jose has explored New York City’s museums, hiked the Palisades cliffs on a weekend trip, dreams of strolling through the historic capital of their family’s roots and seeing the unique wildlife
    of a famed South American archipelago, and prefers family‑planned itineraries that balance adventure with budget‑friendly stays in familiar hotels.
  culinary: Jose helps prepare family meals, skillfully mixing citrus‑marinated fish for ceviche, simmering lentils and corn for fanesca, and kneading yuca dough for pan de yuca, showing a modest but enthusiastic
    cooking ability that adds flavor to weekend gatherings.
  core: Jose is a routine‑loving, socially energetic tween who turns group activities into structured fun, manages stress with meticulous planning, yet sometimes over‑indulges in late‑night video‑games
    and secret snack stashes.
background:
  cultural: Jose is a first‑generation Ecuadorian‑American who grew up in Hillside, New Jersey, immersed in a blend of Ecuadorian traditions and suburban U.S. culture. His household speaks both Spanish
    and English, celebrates holidays like Carnaval de Guaranda and Christmas with traditional foods such as ceviche, fanesca, and pan de yuca, and places a strong emphasis on family cohesion and community
    support. He attends a local church that hosts cultural gatherings, and his family values hard work, hospitality, and staying connected to their roots while adapting to life in the United States.
attributes:
  skills: '["Organizational and routine management", "Team collaboration (soccer and school projects)", "Bilingual communication (Spanish and English)", "Basic computer literacy", "Leadership in group activities",
