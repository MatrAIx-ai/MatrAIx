  hobbies: '["Soccer", "Basketball", "Cooperative video gaming", "Robotics club projects", "Playing guitar", "Cooking traditional Ecuadorian meals with family", "Building LEGO models", "Reading adventure
    comics", "Exploring local parks", "Participating in community cultural events"]'
  career_goals: Jose dreams of turning his love for soccer into a professional career, hoping to earn a scholarship that will support both his athletic and academic pursuits. He also envisions a practical
    trade—such as automotive mechanics or a technical field—where his reliability and hands‑on skills can thrive. Academically, he aims to graduate high school with solid grades, especially in math and
    science, to keep his options open for vocational training or community service roles like firefighting. Throughout, he wants to remain a supportive family member and contribute to his local Ecuadorian
    community.
