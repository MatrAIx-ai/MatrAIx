  career_goals: Tyger aims to re-enter the workforce by leveraging his artistic talents and community experience. His short‑term goal is to secure a part‑time position as an art program coordinator or community
    outreach specialist at a local nonprofit or cultural center. Long‑term, he dreams of opening a modest studio/gallery where he can teach workshops, host exhibitions, and sell handcrafted pieces. He also
    plans to complete his associate degree in visual arts or communications to formalize his credentials and explore freelance graphic‑design projects for nearby businesses.
