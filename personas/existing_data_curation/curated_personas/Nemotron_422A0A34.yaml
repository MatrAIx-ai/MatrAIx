personas:
  professional: Tyger Bass is a community‑focused art program coordinator in training, leveraging their photography, event‑planning, and social‑media skills to design inclusive workshops while balancing
    their reliability with a penchant for spontaneous, collaborative installations.
  sports: Tyger Bass is an avid hiker of the Hudson Valley’s seasonal trails and a seasonal member of the Beacon Running Club, cheering on the New York Yankees in baseball and the New York Knicks in basketball
    while fitting in weekend bike rides to stay fit despite a busy social calendar.
  arts: Tyger Bass immerses themselves in creative expression by photographing urban sunsets echoing Ansel Adams’ chiaroscuro, painting abstract canvases inspired by David Hockney, and attending live performances
    by local indie folk bands like The War on Drugs, often citing Lin‑Manuel Miranda’s Hamilton as a theatrical benchmark.
  travel: Tyger Bass plans trips with a photographer’s eye, favoring road‑trips to the green‑rolling hills of Vermont, spontaneous weekend getaways to New Orleans for jazz, and dreaming of a summer in Iceland’s
    waterfalls to capture auroras, yet they constrain travel to a modest budget and prioritize visits to art‑centric cities.
  culinary: Tyger Bass enjoys farm‑to‑table cooking, frequently whipping up roasted beet and goat‑cheese salads, mastering homemade sourdough bread, and experimenting with fresh rosemary and thyme in grilled
    salmon, though they occasionally overindulge in craft beer and forget to refrigerate herb garden leftovers.
  core: Tyger Bass is a 41‑year‑old social artisan who blends relentless curiosity with playful community‑building, offset by occasional overspending on tools and a stubborn habit of postponing dental visits.
background:
  cultural: Tyger grew up in a small‑town environment in upstate New York, with a family heritage primarily of English and Irish descent. His upbringing emphasized community participation, self‑reliance,
    and an appreciation for the region’s natural beauty and local arts. The cultural fabric of Hudson Falls—marked by seasonal festivals, a supportive arts community, and a strong sense of neighborly collaboration—has
    shaped his values of openness to new ideas, a balance of tradition and innovation, and a deep pride in regional heritage while engaging with broader artistic influences.
