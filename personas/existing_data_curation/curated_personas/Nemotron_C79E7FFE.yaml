  career_goals: In the next five years, Lindsey aims to rise to a senior executive position—such as Director of Clinical Operations or Vice President of Operations—within a regional health system. She plans
    to pursue a Certified Medical Manager (CMM) credential and an executive health‑administration certificate to deepen her strategic expertise. Her ambition is to spearhead value‑based care initiatives
    that integrate digital health tools and community‑based wellness programs, especially those that incorporate arts‑based therapies to enhance patient well‑being. Ultimately, she hopes to shape a flexible,
    innovation‑driven department that can serve as a model for patient‑centered, financially sustainable health care.
