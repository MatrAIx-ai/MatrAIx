  hobbies: '[''Home cooking and baking'', ''Community volunteer work (food pantry)'', ''Gardening'', ''Yoga and meditation'', ''Book club (mystery novels)'', ''Puzzle solving (crosswords, Sudoku)'', ''Group
    fitness classes (Zumba)'', ''Church choir'']'
  career_goals: Kristen aims to transition from a front‑line server to a supervisory role within a catering or hospitality company, eventually becoming an operations manager. She plans to complete her associate
    degree in Hospitality Management and obtain a Certified Professional in Catering and Events (CPCE) credential. In the longer term, she dreams of launching a modest, family‑run catering business that
    emphasizes healthy, locally sourced meals for community events, while also mentoring younger staff members. Her ambition is balanced by a desire for stability and a predictable schedule that supports
    her family life.
