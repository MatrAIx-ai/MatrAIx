  hobbies: '[''Gardening'', ''Crocheting and knitting'', ''Traditional Mexican cooking'', ''Church attendance'', ''Senior center social events'', ''Classic Mexican cinema'', ''Reading historical novels'',
    ''Jigsaw puzzles'', ''Genealogy research'']'
  career_goals: Although retired, Jessica’s ambitions focus on personal legacy and wellbeing. She aims to stay independent by maintaining her health regimen and medication routine, continue mentoring younger
    relatives and volunteers at the senior center, and ensure her family’s Mexican heritage is documented through oral histories and a handwritten cookbook. She also seeks to champion senior rights in her
    community, using her assertive voice to influence local policies that affect older adults.
