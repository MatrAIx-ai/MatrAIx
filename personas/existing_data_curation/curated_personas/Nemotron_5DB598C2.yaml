personas:
  professional: Starlyn Kelly is a budding LEGO architect who channels curiosity and practicality into constructing intricate models, while applying a pragmatic approach to solving building challenges and
    occasionally forgetting to tidy up the workspace, reflecting a flexible and slightly disorganized style.
  sports: Starlyn Kelly is an eager member of the Riverside Rookies U‑8 soccer team, balances competitive weekend matches with spontaneous backyard drills, cheers for the Seattle Seahawks on game days,
    and also dabbles in beginner gymnastics at the community center, reflecting a love for competition tempered by flexible participation.
  arts: Starlyn Kelly frequently sketches lions, pandas, and otters inspired by wildlife illustrator John James Audubon, enjoys listening to the Kidz Bop rendition of "Happy" while drawing, and watches
    Pixar’s "Finding Nemo" for artistic inspiration, blending structured study with playful creativity.
  travel: Starlyn Kelly delights in impromptu hikes through Maplewood County Park, collecting leaves and insects for a nature scrapbook, has visited the Smithsonian National Air and Space Museum in Washington,
    D.C., and dreams of exploring the towering Redwood forests of California, embodying a spontaneous yet curious travel spirit.
  culinary: Starlyn Kelly loves helping bake soft chocolate‑chip cookies using vanilla extract and rainbow sprinkles, meticulously measuring flour with a tiny kitchen scale, proudly serving the treats at
    board‑game nights, yet occasionally sneaks extra chocolate chips when no one is looking, showing a sweet tooth and a mischievous side.
  core: Starlyn Kelly is a curiosity‑driven, slightly disorganized, competitive 7‑year‑old who blends LEGO building, soccer, and nature hikes with a relaxed, flexible outlook and a hint of skeptical wit.
background:
  cultural: Starlyn grows up in a middle‑class white family in Charlotte, North Carolina, where Southern hospitality and community participation shape her worldview. Her family attends a local Baptist church,
    celebrates holidays such as Thanksgiving with traditional meals, and enjoys summer barbecues and community festivals. She benefits from the city’s diverse library programs and school events, which expose
    her to a blend of Southern customs and the broader cultural tapestry of a growing metropolitan area.
