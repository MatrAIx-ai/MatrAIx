  career_goals: Starlyn dreams of becoming an astronaut or a wildlife researcher, combining her love for space science and animals. She aims to win her school’s science fair by designing a simple experiment
    about plant growth, and later hopes to study planetary ecosystems while helping protect Earth’s wildlife. Her practical side also envisions her as a future teacher who can turn curiosity into hands‑on
    lessons for other kids.
