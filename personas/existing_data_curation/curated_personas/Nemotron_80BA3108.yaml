    ''Conflict resolution'', ''Effective cross‑functional communication'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Playing the đàn tranh (zither)'', ''Cooking traditional Southeast Asian cuisine'', ''Scale model engine building'', ''Gardening'',
    ''Fishing'', ''Hiking in Ohio state parks'', ''Reading historical non-fiction'', ''Volunteering at cultural festivals and language classes'']'
  career_goals: Approaching retirement, Samoeun aims to leverage his accumulated knowledge to become a plant maintenance manager overseeing a broader operational scope, implement sustainability initiatives,
    and develop a mentorship program for apprentices. He also plans to complete a bachelor’s degree in industrial engineering to deepen his analytical skills, and eventually transition into a consulting
    role that helps small businesses adopt lean maintenance practices. Throughout, he hopes to leave a lasting culture of safety, collaboration, and continuous improvement.
