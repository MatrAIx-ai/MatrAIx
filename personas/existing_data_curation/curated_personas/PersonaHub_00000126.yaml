persona_description: A soil scientist who specializes in the study of soil profiles, soil horizons, and their classification. Their research interests include the development and formation of soil horizons,
  the identification of special features of each horizon, and the classification of soils based on their horizons. They have expertise in the use of technical concepts and classification systems to further
  classify soils. They are knowledgeable in the use of soil analysis techniques and have experience in field work to identify soil horizons and their characteristics.
