personas:
  professional: Ashley Jackson is a budding business administration graduate who leverages strong organizational and project planning skills, advanced Excel and introductory Tableau abilities, and proficiency
    with Slack and Trello to excel in junior project manager roles, applying a pragmatic, structured approach and competitive edge while maintaining calm under pressure; they thrive in environments that
    demand precision and consistently meet tight deadlines.
  sports: Ashley Jackson cheers for the Pittsburgh Steelers and the West Virginia Mountaineers, participates in the Morgantown Trail Runners club for weekend long-distance runs, hits the local indoor climbing
    gym during winter months, and incorporates weekly yoga sessions to maintain flexibility, blending competitive fandom with personal fitness pursuits.
  arts: Ashley Jackson enjoys listening to Sufjan Stevens and Phoebe Bridgers on solo drives, attends indie-film screenings featuring directors like Greta Gerwig, follows graphic novels by Marjane Satrapi,
    and occasionally flirts with amateur photography, drawing creative inspiration that balances structured planning with spontaneous artistic expression.
  travel: Ashley Jackson prefers meticulously planned trips that balance adventure and comfort, often weekend-hiking in the Monongahela National Forest, a yearly backpacking expedition to the Appalachian
    Trail, and a dream itinerary that includes a cultural tour of Kyoto's temples and a foodie crawl through Barcelona, all while staying within a modest budget and using a combination of Airbnb and hostel
    stays.
  culinary: Ashley Jackson loves meal-prepping comfort foods such as chicken pot pie, lean turkey chili, and overnight oats with chia seeds, enjoys seasoning dishes with garlic, cumin, and fresh rosemary,
    crafts smoothie bowls featuring spinach, banana, and almond milk, and is known for occasionally over-salting recipes in the quest for a perfect flavor balance.
  core: Ashley Jackson is a methodical, calm twenty-three-year-old who turns structured planning into a competitive edge, yet secretly battles a habit of over-indulging in spicy snacks during late-night
    study sessions.
background:
  cultural: Raised in a predominantly white Appalachian community in West Virginia, Ashley’s upbringing emphasized self-reliance, practicality, and a strong work ethic; family traditions include church
    gatherings, seasonal festivals such as the West Virginia Mountain Festival, and a deep connection to the outdoors; her time at West Virginia University expanded her worldview while she retains these
    regional values.
attributes:
  skills: '[''Organizational planning'', ''Microsoft Office proficiency'', ''Data analysis (Excel, Tableau)'', ''Time management'', ''Documentation and note-taking'', ''Digital communication tools (Slack,
