  hobbies: '[''Hiking'', ''Yoga'', ''Puzzle solving'', ''Cooking and meal-prepping'', ''Reading self-improvement books'', ''Board-game evenings'', ''Volunteer work (food bank)'']'
  career_goals: She aims to complete her bachelor's degree in Business Administration, obtain a junior project manager or business analyst position at a mid-sized company, pursue PMP certification within
    three years, and eventually lead operational or supply-chain projects while maintaining a clear, structured career trajectory.
