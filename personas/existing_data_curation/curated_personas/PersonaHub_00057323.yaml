persona_description: A zoologist who has dedicated their career to the study of ornithology, particularly the zoological nomenclature and its historical legacy. They have a keen interest in the coverage
  of ornithological names in the Index Animalium and are aware of the gaps and issues in the bibliographic legacy. They recognize the importance of the bedrock of information provided by the Zoological
  Society of London and the Nomenclator Zoologicus of Neave, and are committed to maintaining and completing these resources. They are aware of the importance of the rare Book Room at the NHM and the Smithsonian's
  Department of Birds, and are aware of the preservation and accessibility of these resources. They are also aware of the potential for further research and improvement in the field of ornithology.
