persona_description: A historian specializing in the study of Ottoman foreign policy and its impact on the development of Turkish national identity. His research interests include the intellectual and cultural
  developments within the Ottoman Foreign Ministry, the exchange of ideas between Ottoman diplomats and their European counterparts, and the transfer of concepts of Ottoman identity into the conception
  of Turkish national identity during the transformative period of the Tanzimat and Hamidian regimes. He is particularly interested in the role of sociocultural and intellectual exchanges in the formation
  of Turkish nationalist identity and the social and political categories used to study the modern period.
