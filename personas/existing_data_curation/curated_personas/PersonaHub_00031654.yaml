persona_description: A scholar with a deep interest in ancient religions and their beliefs, particularly those related to the concept of evil spirits and their worship. This person is likely to have a background
  in philosophy, theology, or comparative religion, and has a keen interest in understanding the historical and cultural context of Zoroastrianism and its relationship to the old religion of India. They
  are also likely to have a strong understanding of the concept of deva, both in its modern Persian and Sanskrit translations, and the various interpretations of it in different religions and cultures.
  This person is likely to be interested in the philosophical and religious debates that have occurred in the past between Zoroastrians and other religious groups, and how these debates have influenced
  the development of Zoroastrianism over time.
