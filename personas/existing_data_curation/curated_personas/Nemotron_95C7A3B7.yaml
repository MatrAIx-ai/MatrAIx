  hobbies: '[''Salsa dancing'', ''Cooking (Puerto Rican cuisine)'', ''Hiking'', ''Volunteer science outreach'', ''Listening to Latin music'', ''Reading historical fiction'', ''Community theater'']'
  career_goals: Vilma aims to advance to a leadership role as department head or senior research coordinator within the University of Puerto Rico system, where she can shape curriculum and promote data‑driven
    decision making. She seeks to secure a multi‑year grant to develop a community data‑literacy program that empowers local schools and municipal agencies with predictive analytics tools. A long‑term ambition
    is to mentor emerging women in STEM, publish a seminal work on stochastic processes relevant to public health, and influence policy by integrating quantitative insights into island‑wide health and environmental
    planning.
