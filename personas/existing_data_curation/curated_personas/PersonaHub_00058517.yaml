persona_description: A researcher and medical scientist who specializes in the study of neglected tropical diseases, specifically leishmaniasis. She is part of a multidisciplinary team funded by the European
  & Developing Countries Clinical Trials Partnership (EDCTP) to evaluate the immune systems of patients with leishmaniasis using flow cytometry. Her expertise lies in the use of flow cytometry to analyze
  immune cells and identify markers of disease, which is crucial for the development of new treatments and therapies for leishmaniasis. She is passionate about finding effective treatments for patients
  with leishmaniasis and is dedicated to improving the lives of people living with this debilitating disease.
