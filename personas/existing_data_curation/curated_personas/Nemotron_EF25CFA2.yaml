  hobbies: '[''Reading non-fiction (wildlife, astronomy, environmental science)'', ''Journaling'', ''Gardening'', ''Piano practice'', ''Lego building'', ''Science club participation'', ''Girl Scouts projects'',
    ''Nature hikes and sketching'']'
  career_goals: Darina envisions a future where she can combine her curiosity about living things with a practical desire to help her community. Her long-term ambition is to become a veterinarian, caring
    for farm animals and pets while using her scientific knowledge to support local agriculture. In the short term she aims to excel in high school science courses, win her school's science fair, complete
    advanced Girl Scouts badges in ecology and first aid, and earn a scholarship that will enable her to attend a university with a strong veterinary program.
