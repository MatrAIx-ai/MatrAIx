personas:
  professional: Darina Duncan, a budding environmental researcher in middle school, channels their curiosity about wildlife and astronomy into meticulous science club projects, using their disciplined,
    organized approach to design experiments and keep detailed journals, while their cooperative nature ensures they share findings with peers and mentors at the local 4‑H fair.
  sports: Darina Duncan enjoys weekend hikes through the Nebraska Sandhills with their family, participates in the school’s cross‑country team, and roots for the Nebraska Cornhuskers football and basketball
    squads, while also earning the Girl Scouts hiking badge with a local outdoor club, combining their love of nature with community sports spirit.
  arts: Darina Duncan expresses creativity through piano, favoring Beethoven’s “Moonlight Sonata” and improvising folk‑inspired melodies reminiscent of their community’s barn‑dance tunes, sketches wildlife
    scenes in the style of Ansel Adams, and builds intricate Lego sculptures that echo the precision of traditional craftsmanship, all of which shape their artistic identity.
  travel: Darina Duncan dreams of exploring the Badlands National Park and Yellowstone’s geysers after building on their recent trips to the Nebraska State Fair and a school field trip to the Great Platte
    River, preferring organized itineraries with nature‑focused activities while balancing their limited allowance and familial responsibilities.
  culinary: Darina Duncan loves preparing farm‑fresh garden salads with cherry tomatoes, carrots, and a drizzle of homemade vinaigrette, experiments with simple stir‑fry dishes featuring zucchini and bell
    peppers, and occasionally bakes apple crisp using heirloom apples from the family orchard, reflecting their modest cooking skills and appreciation for seasonal, locally sourced ingredients.
  core: Darina Duncan, a 12‑year‑old nature‑obsessed student, balances meticulous budgeting and organized science projects with occasional stress‑induced forgetfulness, while they hum piano tunes and obsessively
    collect Lego bricks.
background:
  cultural: Darina was born and raised in Fremont, Nebraska, a small Midwestern town rooted in agriculture and close-knit community values. Her family's heritage includes German and Irish ancestry, and
    they have lived in the area for several generations. The local culture emphasizes hard work, self-reliance, modesty, and cooperation, with community events such as county fairs, 4-H clubs, and church
    gatherings playing a central role. Growing up in this environment has shaped Darina's practical mindset, her appreciation for nature and farming life, and her strong sense of responsibility toward helping
    neighbors.
