persona_description: A scientist who studies the mechanisms of aging and longevity, focusing on the role of nutrient-sensing systems and the impact of nutrient signaling on the lifespan and healthspan of
  eukaryote species. They are interested in understanding the interactions between nutrient-sensing systems and stem cells, particularly in the context of the niche deterioration in tissues. They are also
  interested in the role of sirtuins and AMPK in regulating nutrient signaling and longevity.
