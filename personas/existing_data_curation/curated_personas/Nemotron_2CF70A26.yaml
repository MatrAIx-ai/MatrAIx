personas:
  professional: Carson Brooks, a methodical special‑education teacher, designs data‑driven IEPs, blends adaptive technology with arts‑infused curricula, and leads district‑wide professional development
    workshops while leveraging a competitive drive to influence inclusive policy, and they continuously refine their practice through evidence‑based research.
  sports: Carson Brooks, a reserved yet competitive outdoor enthusiast, enjoys low‑key weekend hikes on the Kalamazoo River Trail with a close circle of friends, follows the Kalamazoo Wings hockey team,
    and participates in a community running club’s early‑morning 5K sessions, and they prefer solo endurance activities that align with their methodical nature.
  arts: Carson Brooks, an avid watercolorist inspired by Monet and O’Keeffe, spends evenings painting Michigan wetlands, reads philosophical works by Camus, and regularly attends Kalamazoo Institute of
    Arts exhibitions featuring contemporary mixed‑media artists, and they use art as both a creative outlet and analytical practice.
  travel: Carson Brooks, a meticulous planner with a love for nature, designs low‑budget trips such as solo treks through the Upper Peninsula’s Pictured Rocks, weekend cycling tours of the Columbia River
    Gorge, and literary pilgrimages to Oxford, preferring precise itineraries while leaving room for spontaneous museum stops, and they balance curiosity with practical constraints.
  culinary: Carson Brooks, a methodical home cook, experiments with seasonal dishes like mushroom risotto with fresh thyme, twelve‑hour simmered Japanese ramen broth, and crisp apple galette, applying watercolor‑like
    precision to plating yet sometimes over‑seasoning in pursuit of the perfect flavor balance, and they treat each meal as a quiet laboratory for creativity.
  core: Carson Brooks blends methodical curiosity with competitive practicality, carving a disciplined path through teaching, finance, and creative pursuits while quietly challenging conventions, and they
    remain steadfastly skeptical of easy shortcuts.
background:
  cultural: Carson grew up in a middle‑class white family in the Kalamazoo area, with German and Irish ancestry that emphasized hard work, community responsibility, and modesty. The Midwestern cultural
    context of practicality blended with his university exposure to the arts and humanities shaped his balanced outlook. He values local traditions such as county fairs and community volunteerism, yet maintains
    a reserved demeanor, finding comfort in small gatherings and solitary reflection.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Behavioral assessment and intervention'', ''Data‑driven instructional design'', ''Classroom management
    for diverse learners'', ''Adaptive technology integration'', ''Curriculum adaptation with arts/humanities focus'', ''Collaborative planning with general‑education staff'', ''Parent communication and
    advocacy'', ''Professional development facilitation'']'
  hobbies: '[''Reading philosophy and education theory'', ''Playing chess'', ''Watercolor painting'', ''Hiking local trails'', ''Experimenting with cooking'', ''Participating in a small book club'']'
  career_goals: Carson aims to advance to a district‑level Special Education Coordinator role within the Kalamazoo Public Schools, where he can shape inclusive policies and develop arts‑infused curricula
    for students with special needs. He plans to earn a master's degree in Special Education with a concentration in autism spectrum disorders, and eventually lead statewide professional development initiatives
    that blend practical evidence‑based methods with innovative, curiosity‑driven approaches. His long‑term ambition includes influencing state legislation to improve resource allocation for special‑education
    programs.
