data:
  user 1 personas: 'I lived most of my life not knowing who bob marley was.

    I work over 60 hours a week as a restaurant manager.

    I despise my boss.

    When i cut loose , i lose control.

    We help each other out in my family.'
  user 2 personas: 'I am scared of clowns.

    I have two dogs.

    I live on the third floor in an apartment.

    I have two roommates.

    I like to cook.'
  Best Generated Conversation: 'User 1: Hi, I''m John!

    User 2: Hi, I''m Mary!

    User 1: What do you do for a living?

    User 2: I''m a cook.

    User 1: Oh, that''s cool! I''m a restaurant manager.

    User 2: Really? What''s your favorite thing about your job?

    User 1: I love getting to work with people and helping them create great experiences.

    User 2: That''s awesome! I love cooking for people and seeing their reactions when they enjoy my food.

    User 1: Me too! It''s the best feeling.

    User 2: I have two dogs.

    User 1: Oh, that''s awesome! I love dogs!

    User 2: Me too! They''re my best friends.

    User 1: What are their names?

    User 2: Their names are Cocoa and Bailey.

    User 1: Oh, those are great names!

    User 2: Thanks!

    User 1: So, what do you like to do for fun?

    User 2: I like to cook, read, and spend time with my dogs.

    User 1: Oh, that sounds like fun! I like to cook too, but I don''t read as much as I used to.

    User 2: I''m trying to read more, but it''s hard to find the time.

    User 1: I know what you mean. I''m always so busy with work and my family.

    User 2: Me too. But it''s important to make time for the things you enjoy.

    User 1: I agree. I''m trying to make more time for my hobbies.

    User 2: That''s great! I''m sure you''ll enjoy it.

    User 1: I know I will.

    User 2: So, what are your plans for the weekend?

    User 1: I''m not sure yet. I''m thinking about going out to dinner with my family.

    User 2: That sounds like fun! I''m having dinner with my friends on Saturday.

    User 1: Oh, that sounds nice!

    User 2: It should be. I''m excited.

    User 1: Me too!

    User 2: Well, I have to go. It was nice talking to you, John!

    User 1: It was nice talking to you too, Mary!'
