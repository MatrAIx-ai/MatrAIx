personas:
  professional: Karima Gyimah is a California‑licensed electrical engineer who leverages her expertise in power electronics, renewable energy systems, and embedded hardware design to lead rigorous R&D projects,
    while applying Six Sigma and PE‑level project management to drive smart grid innovations and mentor underrepresented women in engineering.
  sports: Karima Gyimah hits the coastal trails of Monterey County every Saturday, is a member of the Monterey Bay Trail Runners club, follows the San Jose Sharks, San Francisco Giants, and Golden State
    Warriors, and caps her week with a restorative yoga class at a local studio.
  arts: Karima Gyimah captures sunrise vistas on her DSLR while exploring the Pacific coastline, finds solace playing jazz piano standards by Thelonious Monk and Bill Evans, and unwinds with science‑fiction
    epics such as Liu Cixin’s The Three‑Body Problem and William Gibson’s Neuromancer, often attending live jazz sessions at the Berkeley Jazz Workshop.
  travel: Karima Gyimah meticulously plans her trips using spreadsheet itineraries, favoring eco‑adventures like hiking in Big Sur, a recent solo surf‑and‑snorkel getaway to Maui, and a culturally immersive
    visit to Accra to taste authentic jollof rice, while balancing travel budgets with her professional commitments and desire for occasional family time.
  culinary: Karima Gyimah’s culinary repertoire blends Ghanaian comforts—spicy jollof rice, sweet kelewele, and coconut‑infused palm soup—with Mediterranean experiments like rosemary‑infused grilled salmon,
    and while her sous‑vide technique impresses friends, she occasionally over‑sautés the plantain chips when her mind wanders to pending design reviews.
  core: Karima Gyimah is a methodical engineer‑entrepreneur who channels her love for sunrise hikes, jazz piano, and Ghanaian cooking into a disciplined, yet anxiety‑prone lifestyle that balances meticulous
    project planning with spontaneous creative bursts.
background:
  cultural: Karima is a first‑generation Black American with Ghanaian heritage; her parents immigrated from Accra and instilled strong cultural values at home. She grew up in the Bay Area, where she was
    part of a vibrant Black community and attended a multicultural elementary school that celebrated both African and American traditions. Ghanaian customs—such as attending family gatherings with traditional
    music, speaking Twi with relatives, and preparing dishes like fufu and plantains—remain central to her identity. Simultaneously, she embraces broader American cultural experiences, from participating
    in community festivals to engaging in local environmental activism. This dual cultural lens informs her professional drive to create inclusive, sustainable technology solutions that honor her heritage
    while serving the diverse population of California.
