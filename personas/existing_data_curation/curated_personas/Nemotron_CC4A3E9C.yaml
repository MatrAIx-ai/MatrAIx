  career_goals: Karima aims to advance to a senior principal engineer role within the next five years, leading R&D projects that integrate renewable energy technologies into the grid. She aspires to obtain
    a leadership position overseeing multidisciplinary teams, driving innovation in smart power distribution, and shaping company strategy for sustainable solutions. In the longer term, she plans to launch
    her own consultancy focused on providing affordable, sustainable energy solutions to underserved communities, particularly targeting low‑income neighborhoods with a high proportion of Black and immigrant
    residents. She also seeks to become a mentor and advocate for women of color in engineering, contributing to diversity initiatives and STEM outreach programs.
