personas:
  professional: Kristina Scott is a budding community program planner who leverages her meticulous organization, practical curiosity, and conflict‑mediation skills to coordinate environmental outreach events
    at her high school and local youth center, always ensuring timelines are met and harmony is maintained among volunteers, and they thrive on turning ideas into concrete action.
  sports: Kristina Scott embraces the Utah outdoors by hiking the Wasatch trails, skiing at Alta in winter, staying fit with the Wasatch Outdoor Club, and cheering on the Utah Jazz in basketball and Real Salt Lake
    in MLS when they can catch a game.
  arts: Kristina Scott channels her visual storytelling through sunrise DSLR photography inspired by Ansel Adams, curates an online gallery of Utah’s peaks, and they unwind to the mellow indie folk of Bon Iver
    and Sufjan Stevens while occasionally streaming Greta Gerwig’s films for cinematic inspiration.
  travel: Kristina Scott blends meticulous itinerary planning with spontaneous day‑trips, having trekked Zion and the Grand Canyon, dreaming of Iceland’s volcanic vistas, and they balance backpacking adventures
    with occasional cozy stays in mountain lodges.
  culinary: Kristina Scott enjoys cooking wholesome meals like quinoa‑vegetable bowls tossed with seasonal kale and roasted sweet potatoes, baking an occasional apple crumble sweetened with local honey,
    and they share these dishes during board‑game nights where they also experiment with fresh herb‑infused salads.
  core: Kristina Scott balances a pragmatic, detail‑oriented mindset with a sunrise‑chasing wanderlust, never leaves home without a spare camera battery, occasionally sacrifices sleep for night‑long photo
    edits, and they quietly ensure every group project runs like a well‑oiled machine.
background:
  cultural: Kristina grew up in Ogden, Utah, amid a community that values self‑reliance, family ties, and a deep respect for the surrounding natural landscape. While the region is predominantly influenced
    by LDS traditions, her household blends modest, cooperative values with an openness to diverse ideas fostered by her high‑school experiences. The local culture’s emphasis on outdoor recreation, community
    service, and modest living has shaped her practical mindset and her desire to contribute positively to her community. She feels a strong connection to Utah’s mountain heritage, which informs both her
    hobbies and her aspiration to protect the environment through future work.
