  hobbies: '[''Hiking'', ''Skiing'', ''Camping'', ''Photography'', ''Reading (non‑fiction, environmental topics)'', ''Cooking/Baking'', ''Volunteer work at community center'', ''Board games with friends'',
    ''Podcast listening'', ''DIY home projects'']'
  career_goals: Kristina plans to enroll at a local community college this fall to pursue an associate’s degree in environmental studies or public health, fields that blend her love of nature with a desire
    to help others. In the next five years she hopes to transfer to a four‑year university, earn a bachelor’s degree, and obtain a certification in project management or emergency medical services. Long‑term,
    she envisions a career as a program coordinator for a nonprofit that offers youth environmental education and community health outreach in Utah, allowing her to combine her organizational talents, practical
    problem‑solving, and caring nature. She also dreams of leading volunteer groups that maintain local trails and organize outdoor wellness events.
