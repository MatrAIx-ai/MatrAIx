persona_description: A scientist or researcher who specializes in environmental science and the study of ecosystems, particularly the impact of climate change on forest ecosystems. This scientist is interested
  in developing and deploying new technologies to monitor and quantify the amount of carbon stored in trees, as well as the effects of forest degradation and deforestation on the global carbon cycle. This
  scientist is likely to be working on projects related to the Global Ecosystem Dynamics Investigation (GEDI) project, which uses lidar technology to create detailed 3D maps of Earth's forests and estimate
  the total amount of carbon stored here on Earth inside trees.
