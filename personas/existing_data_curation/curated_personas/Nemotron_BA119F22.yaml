  hobbies: '["Gardening", "Woodworking", "Hiking", "Reading Historical Biographies", "Bridge", "Volunteer Work at Senior Center", "Local Theater", "Cooking", "Amateur Astronomy"]'
  career_goals: Although retired from formal employment, John aims to deepen his impact on the Junction City community by expanding the community garden mentorship program, securing funding for senior‑center
    educational workshops, and documenting local oral histories for the county archive. He also hopes to travel to Oregon’s coastal and mountain regions, maintain his health through regular hiking, and
    support his grandchildren’s academic pursuits by offering tutoring and guidance. Ultimately, he wants to leave a lasting legacy of organized, community‑focused initiatives that blend his educational
    expertise with his love for hands‑on projects.
