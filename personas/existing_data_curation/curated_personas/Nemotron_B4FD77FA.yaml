  hobbies: '["Watercolor Painting", "Visiting Art Galleries", "Reading Historical Fiction", "Knitting Quilts", "Gardening", "Birdwatching", "Volunteering at Senior Center", "Playing Bridge", "Genealogy
    Research", "Cooking Traditional Recipes", "Attending Lutheran Church Services"]'
  career_goals: Although retired, Jackielyn aims to document and preserve Henderson’s cultural heritage by compiling a memoir and a community oral-history archive. She plans to expand the town’s senior-center
    art program, mentor high-school students interested in folk art, and learn digital photography to share her work online. She also hopes to complete a genealogy project that connects her family’s roots
    to the broader Midwest narrative.
