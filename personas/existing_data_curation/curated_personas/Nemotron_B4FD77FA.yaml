personas:
  professional: Jackielyn Puterbaugh, a retired community arts coordinator and local historian, blends meticulous cataloging, storytelling, and gentle mediation to curate folk‑art exhibits and mentor volunteers,
    reflecting her compassionate, organized yet flexible nature.
  sports: Jackielyn Puterbaugh is a lifelong fan of the Nebraska Cornhuskers football team and the Omaha Storm Chasers, attends local high‑school basketball games, and maintains gentle fitness through daily
    walks in the prairie reserve and a weekly senior‑center bowling league.
  arts: Jackielyn Puterbaugh spends mornings painting watercolors of prairie landscapes, visits the Great Plains Art Museum to study Grant Wood and local folk artists, and shares her love of folk art by
    leading a senior‑center exhibition, while humming folk tunes.
  travel: Jackielyn Puterbaugh has journeyed to the Nebraska State Capitol in Lincoln, the Badlands of South Dakota, the Art Institute of Chicago, and dreams of strolling the historic streets of Heidelberg,
    yet her travel plans are shaped by a modest budget and reliance on her adult children for longer trips.
  culinary: Jackielyn Puterbaugh enjoys preparing traditional dishes like cornbread, sauerkraut stew, and apple‑cinnamon crumble using garden herbs, favors her heirloom pot roast recipe, and occasionally
    treats herself to a slice of homemade cherry pie, though she sometimes forgets to turn off the stovetop.
  core: Jackielyn Puterbaugh, a 91‑year‑old prairie‑rooted storyteller, blends quiet curiosity, steadfast compassion, and gentle stubbornness into a life rich with art, history, and community service.
background:
  cultural: Jackielyn was born in the 1930s on a family farm in Nebraska to parents of German-American and English ancestry. Growing up during the Great Depression and World War II, she internalized values
    of self-reliance, hard work, and community support. Her cultural identity is rooted in Midwestern small-town traditions, Lutheran church life, and a strong appreciation for folk art, local history,
    and seasonal community festivals.
