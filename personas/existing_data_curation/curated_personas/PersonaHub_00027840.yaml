  their resolutions, and is likely to be interested in learning more about the advantages of secure coding and the importance of continuous security testing. This individual is also likely to be knowledgeable
  about the tools and techniques used to measure the security of software systems, and may have experience working with college and employer stakeholders to ensure that their programming practices align
  with best practices.
