personas:
  professional: Eric Pauldo blends a STEM background with public relations expertise, turning complex tech concepts into compelling stories for media while they often grapple with tight deadlines due to
    their spontaneous work style.
  sports: Eric Pauldo enjoys playing pick‑up basketball at the St. Louis Community Center and cheering on the St. Louis Cardinals and the St. Louis Blues, subscribes to a local gym where they squeeze in
    spontaneous 5K runs, and they are a member of the downtown adult basketball league Gateway Slam, reflecting a fun‑loving yet loosely structured approach to fitness.
  arts: Eric Pauldo frequents the Saint Louis Art Museum, attends jazz nights at the Jewel Box and hip‑hop sets at the Blueberry Hill, follows street‑art legends like Banksy and local muralist James Worthy,
    participates in improv comedy at The Grid, and they draw creative fuel from the works of Miles Davis, Kendrick Lamar, and contemporary visual artist Kehinde Wiley.
  travel: Eric Pauldo prefers spontaneous, weekend‑long road trips to nearby cities such as Kansas City, Chicago, and Nashville, often sketching itineraries on the fly while staying in boutique Airbnbs,
    and they dream of a future immersion in the art‑rich streets of Barcelona and the tech hubs of Berlin.
  culinary: Eric Pauldo experiments with world cuisines at home, whipping up Thai green curry with kaffir lime leaves, Ethiopian injera paired with berbere‑spiced lentils, and Korean kimchi tacos, while
    they relish the local St. Louis barbecue scene and regularly source fresh herbs like cilantro and mint from the City Market.
  core: Eric Pauldo is a curiosity‑driven PR specialist who balances a love of spontaneous art, music, and street‑food adventures with a data‑centric career, often juggling bold creativity against a habit
    of last‑minute planning.
background:
  cultural: Eric grew up in a close‑knit African‑American community in St. Louis, where the city’s musical legacy of blues, jazz, and hip‑hop shaped his artistic sensibilities. Family gatherings and church
    events reinforced a strong sense of community, collective advancement, and cultural pride. He participated in the local Black Student Union during college, where he advocated for greater representation
    of minorities in STEM fields. This background informs his commitment to diversity in tech communications and his involvement in neighborhood initiatives that celebrate Black history, such as Juneteenth
    parades and mentorship programs for Black youth.
attributes:
  skills: '["Technical Writing", "Press Release Development", "Media Relations", "Crisis Communication", "Event Planning", "Social Media Management", "Data Analytics for PR", "Strategic Storytelling", "Digital
    Content Creation", "Stakeholder Relationship Building", "Public Speaking", "Adobe Creative Suite", "Basic HTML/CSS"]'
  hobbies: '["Visiting Art Galleries", "Street‑Art Tours", "Live Jazz and Hip‑Hop Shows", "Improv Comedy", "Pick‑up Basketball", "Community Hackathons", "STEM Youth Mentorship", "Experimental Cooking",
    "Spontaneous Weekend Road Trips", "Urban Exploration", "Open‑Mic Poetry Slams", "Music Jam Sessions"]'
  career_goals: He aspires to become a senior communications strategist at a leading technology firm, leading integrated PR campaigns that position innovative products on a global stage. In the next five
    years he aims to manage a multidisciplinary PR team, mentor junior communicators, and become a recognized thought leader on inclusive storytelling in tech. He also envisions launching his own boutique
    PR consultancy that specializes in amplifying under‑represented founders and socially responsible tech startups. To support these goals, he plans to pursue a master’s degree in strategic communication
    and earn certifications in data analytics for marketing.
