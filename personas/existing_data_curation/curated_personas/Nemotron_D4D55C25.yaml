  hobbies: '["Building wooden block towers", "Sorting shapes and colors", "Singing nursery rhymes", "Riding a tricycle", "Interactive picture books", "Simple jigsaw puzzles", "Matching games"]'
  career_goals: Although only two, Joe often talks about wanting to be a \"helper\" when he grows up. He is fascinated by the orderly nature of firefighters and police officers, who follow clear rules and
    protect others. He imagines wearing a uniform and using tools that have a specific purpose, reflecting his competitive streak and desire for predictable roles. As he gets older, he is likely to aim
    for careers that combine structure, responsibility, and a chance to be the best, such as a future firefighter, police officer, construction worker, or engineer.
