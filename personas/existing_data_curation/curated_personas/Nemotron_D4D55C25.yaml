personas:
  professional: Joe Putnam, a two-year-old budding builder, spends hours arranging wooden blocks into perfectly straight rows, and they showcase an early talent for organization, a competitive urge to build
    the tallest tower before anyone else, and a love for predictable patterns that mirrors their preference for structured routines.
  sports: Joe Putnam, a two-year-old who enjoys splashing in the community pool during toddler swim classes and loves tossing a soft soccer ball with dad at the local fishing dock, cheers loudly for the
    Louisiana Tech Bulldogs, and they exhibit a competitive spirit by racing to retrieve toys faster than peers, yet they also relish quiet moments watching fish glide.
  arts: Joe Putnam, a two-year-old who sings along to the lively accordion of Buckwheat Zydeco during family Mardi Gras parades and draws bright crayon pictures of crawfish and fireworks, and they demonstrate
    a budding creative spark, a love for communal music, and a habit of demanding the spotlight when a new drum beat starts.
  travel: Joe Putnam, a two-year-old who delights in short road trips to the Atchafalaya Basin wetlands and the annual family visit to New Orleans for Mardi Gras, prefers staying close to familiar faces
    and routines over spontaneous wanderings, and they habitually request the same car seat and snack pack each journey.
  culinary: Joe Putnam, a two-year-old who favors creamy jambalaya with chicken and shrimp, insists on eating mashed sweet potatoes on the side, can proudly stir a pot of buttered noodles with his plastic
    spoon, and they display a palate rooted in Cajun flavors while also being picky about texture, often refusing any food that isn’t cut into bite-size pieces.
  core: Joe Putnam, a two-year-old whose world revolves around orderly block towers, competitive coin collecting, bright crayon art, and the rhythmic call of Mardi Gras, blends structured routines with
    a playful intensity that makes every day a tiny, well-orchestrated adventure.
background:
  cultural: Joe was born and raised in Alexandria, Louisiana, a small city in Rapides Parish with a predominantly white Southern cultural milieu. His family celebrates regional traditions such as Mardi
    Gras parades, local fishing trips, and community gatherings at the parish fair. He is exposed to Southern hospitality, a love for Cajun and Creole food, and occasional church services that emphasize
    community and routine. These cultural influences shape his preference for structured family routines, shared meals, and a sense of belonging within a close‑knit community.
