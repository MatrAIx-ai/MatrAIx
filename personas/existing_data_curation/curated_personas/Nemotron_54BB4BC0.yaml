  hobbies: '[''Folklórico Dancing'', ''Cooking Mexican Cuisine'', ''Soccer'', ''Community Volunteering'', ''Event Organization'', ''Photography'', ''Hiking'', ''Listening to Personal-Development Podcasts'',
    ''Reading Entrepreneurship Books'']'
  career_goals: Carmen aims to enroll in a community college this fall to pursue an Associate of Arts in Business Administration with a focus on marketing. In the short term, she plans to secure an internship
    with a local event-planning firm and take on a leadership role in her college's student marketing club. Over the next three years, she intends to transfer to a four-year university to earn a bachelor's
    degree in Business Administration, while launching a small side business that offers digital marketing services for Latino-owned small businesses in Riverside County. Her long-term ambition is to become
    a project manager for a nonprofit organization dedicated to youth empowerment and economic development within the Mexican-American community, leveraging her organizational expertise and cultural insight
    to create impactful programs.
