  hobbies: '[''vegetable gardening'', ''cooking Mexican meals'', ''quilting'', ''church choir participation'', ''daily walks'', ''reading historical fiction'', ''listening to ranchera music'', ''volunteering
    at senior center'']'
  career_goals: Even in retirement, Noriel is committed to a purposeful routine. She aims to dedicate a few hours each week to volunteer at the local senior center, helping coordinate meals and social activities.
    She hopes to mentor younger volunteers in budgeting and event planning, passing on practical skills. Preserving her Mexican heritage is also a priority; she plans to teach cooking classes to grandchildren
    and community members, and to document traditional family recipes in a handwritten cookbook. Maintaining her health through daily walks and garden work is a personal ambition, as is fostering intergenerational
    connections within her church and neighborhood.
