personas:
  professional: Noriel Fontalvo is a retired business administrator who now channels years of budgeting, Excel, and volunteer coordination expertise into organizing church fundraisers and senior‑center
    events, blending meticulous number‑crunching with a laid‑back, flexible approach that values relationships over rigid schedules.
  sports: Noriel Fontalvo enjoys low‑impact activities and is a regular participant in a senior walking group that meets at the neighborhood park, often cheering on the local baseball team, the Springfield
    Cardinals, while occasionally joining a community senior bowling league for a social night.
  arts: Noriel Fontalvo spends afternoons quilting in a circle of friends, listening to classic ranchera ballads by José Alfredo Jiménez, and reading sprawling historical novels such as Ken Follett's "The
    Pillars of the Earth," which together shape a creative outlet that balances solitary focus with communal sharing.
  travel: Noriel Fontalvo prefers short, purposeful trips, often driving to nearby historic towns like San Antonio's Mission District or the mountainous pilgrimage site of Guadalupe, where they can explore
    local markets, attend a church service, and gather inspiration for recipes, while keeping travel budgets modest and family commitments in mind.
  culinary: Noriel Fontalvo is a skilled home cook who relishes preparing tamales, pozole, and enchiladas, carefully layering masa, hominy, and rich chilies, and they take pride in sourcing fresh corn and
    chilies at the local farmers' market, while occasionally burning the edges of the tamales when juggling garden chores.
  core: Noriel Fontalvo is a routine‑loving, gentle‑spirit who blends meticulous budgeting with a love for gardening, quilting, and heritage cooking, all while navigating occasional disorganization and
    age‑related aches with a warm, community‑focused outlook.
background:
  cultural: Noriel was born to Mexican immigrant parents who settled in Hall County, Georgia in the 1950s. Raised in a bilingual household, she grew up speaking both Spanish and English, celebrating Mexican
    holidays such as Dia de los Muertos, Las Posadas, and quinceaneras alongside Southern traditions. Her Catholic faith, reinforced by weekly church attendance, reflects a blend of Mexican devotion and
    local community life. She has preserved many family recipes, traditional crafts, and values of close-knit family support. Though she has embraced the friendliness and hospitality of the American South,
    she remains deeply connected to her Mexican roots, often sharing stories, foods, and customs with friends and neighbors in Cleveland.
