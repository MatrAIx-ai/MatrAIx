  hobbies: '["Gardening (vegetable and flower)", "Nature photography", "Walking local trails", "Reading (art history, horticulture, African American literature)", "Watercolor painting and sketching", "Listening
    to jazz, soul, and Motown music", "Volunteering at community garden", "Mentoring youth in gardening"]'
  career_goals: Approaching retirement, Horace aims to transition from full-time groundskeeping to a part‑time consulting role that focuses on sustainable landscape design for community projects in Flint.
    He plans to earn the Master Gardener certification through Michigan State University to deepen his horticultural expertise. He also hopes to establish a small mentorship program for younger Black landscapers,
    passing on both technical skills and the values of community stewardship. In the longer term, Horace envisions helping to revitalize vacant lot gardens in Genesee County, turning them into productive,
    aesthetically pleasing spaces that serve local residents and foster neighborhood pride.
