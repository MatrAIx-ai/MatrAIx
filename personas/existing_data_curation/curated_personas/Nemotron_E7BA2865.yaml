personas:
  professional: Horace Conwell thrives as a seasoned groundskeeper‑turned‑consultant, leveraging three decades of horticultural expertise—from native plant identification and irrigation design to hardscape
    construction—while they channel an artistic sensibility and thoughtful, organized approach into mentoring apprentices and delivering sustainable, aesthetically harmonious community projects.
  sports: Horace Conwell stays active by strolling the Flint Riverwalk for daily cardio, joining a local senior cycling club for weekend rides, cheering on the Detroit Lions in the fall and the Detroit
    Tigers in the summer, and occasionally playing a casual game of bocce with neighbors at the community garden, while they maintain a low‑key yet consistent approach to fitness.
  arts: Horace Conwell immerses themselves in the arts by painting watercolor landscapes inspired by Claude Monet and Georgia O’Keeffe, listening to records of Miles Davis, John Coltrane, and Stevie Wonder
    while they read art history and classic literature, and they regularly attend Flint Cultural Center workshops where they refine their technique alongside fellow enthusiasts.
  travel: Horace Conwell prefers thoughtfully planned garden‑centric trips, having explored Michigan’s Upper Peninsula for its wildflower meadows, toured the historic Kew Gardens in England, and admired
    the Zen rock gardens of Kyoto, while they dream of attending the Chelsea Flower Show in the future, balancing a love of nature with a modest travel budget and a penchant for solo adventures.
  culinary: Horace Conwell enjoys farm‑to‑table cooking, expertly preparing heirloom tomato gazpacho, roasted beet and kale salads with a drizzle of walnut‑infused vinaigrette, and occasional zucchini fritters
    seasoned with fresh herbs, favoring locally sourced organic ingredients and modest kitchen gadgets while they delight in sharing modest meals with neighbors at the community garden potluck.
  core: Horace Conwell blends meticulous horticultural expertise with a quiet, art‑loving soul, often found sketching garden designs while humming Motown classics, and they battle a habit of over‑planning
    that sometimes leads to late‑night spreadsheets.
background:
  cultural: Horace’s cultural identity is rooted in the Black community of Flint, a city that has faced economic hardship yet is known for its strong neighborhood bonds and rich musical heritage. He grew
    up hearing stories of the Great Migration and the civil‑rights activism of his parents, which instilled in him a deep sense of resilience and collective responsibility. Family gatherings often centered
    around soulful cooking—collard greens, cornbread, and gumbo—accompanied by the sounds of Motown, gospel, and jazz that shaped his early musical tastes. The local church has been a cornerstone of his
    social life, offering both spiritual guidance and a venue for community service. These experiences have nurtured Horace’s appreciation for art, storytelling, and the importance of giving back, influencing
    his commitment to community gardening and mentorship. While he embraces contemporary ideas, he also honors traditions passed down through generations, blending them with his own curiosity about new
    artistic and horticultural practices.
attributes:
  skills: '["Landscape design", "Plant identification (native Michigan species)", "Soil testing and amendment", "Irrigation system installation and maintenance", "Hardscape construction", "Equipment operation
