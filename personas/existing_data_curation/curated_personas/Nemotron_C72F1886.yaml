  hobbies: '["Gardening", "Baking", "Quilting", "Reading historical fiction", "Genealogy", "Walking her golden retriever", "Attending church gatherings", "Volunteer work at local senior center", "Crossword
    puzzles", "Country music concerts"]'
  career_goals: Although retired from formal employment, Brittany aims to deepen her community involvement by expanding volunteer leadership at her local senior center, mentoring newer volunteers, and obtaining
    a community health first‑aid certification. She wishes to maintain the household’s financial stability, learn new digital tools to stay connected with her children and grandchildren, and compile a memoir
    that preserves her family’s history and the cultural heritage of Northeastern Pennsylvania. A secondary goal is to cultivate a more structured routine for self‑care that reduces her tendency toward
    worry and stress.
