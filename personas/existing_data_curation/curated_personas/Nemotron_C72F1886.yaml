personas:
  professional: Brittany Wiggins, a retired administrative coordinator turned senior‑center volunteer leader, brings they methodical mindset to budgeting, event planning, and step‑by‑step tech tutoring,
    shaping organized community health initiatives and mentorship programs.
  sports: Brittany Wiggins enjoys leisurely walks along the Nescopeck Creek trail with their golden retriever, makes sure they attend the senior center’s weekly low‑impact aerobics class, and cheerfully
    roots for the Scranton/Wilkes‑Barre RailRiders minor‑league baseball team during summer weekends.
  arts: Brittany Wiggins makes sure they spend evenings quilting traditional folk patterns, attends the Luzerne County Historical Society’s exhibitions of 19th‑century portraiture, and delights in listening
    to traditional folk music and the local bluegrass trio the Coal Miners’ Harmony, finding creative solace amid garden and kitchen aromas.
  travel: Brittany Wiggins ensures they take short road trips that blend heritage and nature, having driven to the historic Gettysburg battlefield, explored the Amish farms of Lancaster County, and they
    are planning a future pilgrimage to a historic cathedral in New York City to honor family traditions.
  culinary: Brittany Wiggins loves cooking hearty meals that echo their upbringing, and makes sure they routinely bake apple‑cinnamon crumble pie with locally grown orchard apples, simmer bratwurst stew
    seasoned with rosemary and thyme from their garden, and perfect soft‑bread rolls that accompany Sunday dinner gatherings.
  core: Brittany Wiggins is a detail‑driven, community‑focused retiree who balances a love for organized garden and kitchen routines with a stubborn worry habit that makes they constantly refine their meticulous
    plans.
background:
  cultural: Brittany grew up in a predominantly white, working‑class community in the anthracite‑mining region of Northeastern Pennsylvania. Her family heritage blends Irish and German ancestry, and she
    was raised in a modest Methodist household that emphasized hard work, self‑reliance, and community service. The close‑knit neighborhood culture, seasonal celebrations, and strong church ties of Luzerne
    County have shaped her values of reliability, cooperation, and respect for tradition. These cultural influences reinforce her preference for structure, her practical orientation, and her dedication
    to nurturing harmony within her family and community.
attributes:
  skills: '["Budgeting", "Financial Record Keeping", "Event Planning", "Volunteer Coordination", "Garden Management", "Home Maintenance Troubleshooting", "Meal Planning", "Basic Computer Assistance", "Genealogical
