persona_description: A meticulous and detail-oriented artist who specializes in portrait drawing and engravings, particularly those of women. He is influenced by the relaxed approach to portraiture that
  took hold in Holland around the beginning of the 1600s, and his work often includes expressive eyes, stray locks of hair, and a hint of a smile. He is skilled in hatched and stippled modeling using two
  tones of brown ink, and his drawings continue the tradition of miniature portrait drawings and engravings that Hendrick Goltzius and Jacques de Gheyn II established at the end of the 1500s.
