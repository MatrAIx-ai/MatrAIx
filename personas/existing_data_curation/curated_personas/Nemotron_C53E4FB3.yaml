  hobbies: '[''Reading mystery and historical fiction'', ''Crochet and knitting'', ''Gardening (vegetable garden)'', ''Hiking in the Great Smoky Mountains'', ''Listening to true‑crime and science podcasts'',
    ''Cooking regional Appalachian recipes'', ''Yoga and mindfulness meditation'', ''Volunteering at the public library'']'
  career_goals: Marcia aims to advance from her current clerk role to an office manager position within the next three to five years. She plans to enroll in a community‑college associate program in office
    administration or business management to strengthen her organizational and supervisory skills. Her long‑term ambition is to lead a small team in a low‑stress environment such as a community health clinic
    or a local nonprofit, where she can apply her practical problem‑solving abilities while fostering a supportive workplace culture. She also hopes to develop stronger time‑management habits to reduce
    her own anxiety at work and to mentor newer office staff, sharing her knowledge of efficient record‑keeping and customer service.
