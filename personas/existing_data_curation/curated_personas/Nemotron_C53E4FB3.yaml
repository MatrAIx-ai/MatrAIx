personas:
  professional: Marcia Berstler is a diligent office clerk who leverages her curiosity and practical problem‑solving to maintain high‑accuracy data entry and smooth scheduling while navigating a slightly
    disorganized workflow with a cooperative, customer‑focused demeanor, aiming to transition into an office manager role within three to five years.
  sports: Marcia Berstler enjoys hiking the trails of the Great Smoky Mountains and follows the Tennessee Titans and Nashville Predators, occasionally joining a local hiking club and a community yoga studio
    to stay active while preferring low‑intensity, nature‑based exercise over competitive sports.
  arts: Marcia Berstler finds creative solace in crocheting, reading Agatha Christie mysteries, listening to the true‑crime podcast 'Serial' and the science series 'Radiolab', and attending occasional performances
    by folk singer The Avett Brothers, which together shape their relaxed yet inquisitive artistic outlook.
  travel: Marcia Berstler travels with a mix of spontaneous road trips to nearby Asheville and planned visits to historic sites like Savannah, favoring budget‑friendly accommodations and a penchant for
    exploring local farms and craft markets while balancing work commitments.
  culinary: Marcia Berstler, an intermediate home cook, specializes in experimenting with regional dishes such as smoked trout, fried green tomatoes, and Appalachian cornbread, often harvesting tomatoes,
    kale, and peppers from their garden and pairing them with locally sourced honey and mountain herbs.
  core: Marcia Berstler is a curiosity‑driven, slightly disorganized office clerk who combats stress with yoga, gardening, and mystery novels, while occasionally indulging in spontaneous shopping sprees
    for books and craft supplies.
background:
  cultural: Marcia grew up in Oak Ridge, Tennessee, a city known for its blend of Southern hospitality and a legacy of scientific research. Her family is middle‑class and values community involvement, frequent
    church gatherings, and seasonal festivals typical of the Appalachian region. While she was raised with Southern customs such as neighborly courtesy, barbecue gatherings, and a strong sense of family
    ties, she was also exposed to the multicultural environment created by the nearby national laboratory, where many coworkers and school friends came from diverse backgrounds. This mix has given her an
    appreciation for both traditional Southern values—respect, modesty, and community support—and a practical curiosity about new ideas and technologies. She identifies with the broader American South cultural
    identity while also feeling comfortable navigating the more progressive, science‑oriented atmosphere of her hometown.
attributes:
  skills: '[''Data entry'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Telephone etiquette'', ''Scheduling & calendar management'', ''Basic bookkeeping and invoice processing'',
