  career_goals: Helen aims to move into a supervisory role within the plant, aspiring to become a shift manager and eventually a production supervisor. She plans to earn additional certifications in food
    safety and pursue a part‑time associate’s degree in food science or business administration to broaden her managerial qualifications. Long‑term, she dreams of launching a small home‑based catering and
    baked‑goods business that lets her blend her culinary passion with her organizational strengths, while also mentoring younger workers in her community.
