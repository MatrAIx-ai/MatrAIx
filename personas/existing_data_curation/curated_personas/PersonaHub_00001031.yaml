persona_description: A permaculture designer who is passionate about integrating nature into urban spaces and creating sustainable communities. They are interested in applying the principles of permaculture
  to their work and have a deep understanding of the ethics and principles that underpin the design process. They are skilled in observing and interacting with nature, collecting resources when they are
  abundant, ensuring that they are getting truly useful rewards, and using and valuing renewable resources and services. They are also skilled in designing from patterns to details, integrating rather than
  segregating, using small and slow solutions, and using and valuing diversity.
