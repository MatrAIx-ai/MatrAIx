  career_goals: Ashif aspires to transition from day-to-day driving to a leadership role in logistics. Over the next three to five years he aims to become a fleet supervisor or logistics coordinator, overseeing
    route planning, driver scheduling, and safety compliance for a regional trucking firm. He also plans to earn a professional certification in supply-chain management and, eventually, launch his own owner‑operator
    business, leveraging his sales background to secure contracts. Aware of his emotional reactivity, he intends to develop stress‑management techniques and seek mentorship to create a more stable, low‑anxiety
    work environment.
