  hobbies: '[''Art Gallery Visits'', ''Landscape Gardening'', ''Southern Cooking'', ''Quilting'', ''Digital Photography'', ''Community Theater'', ''Hiking'', ''Reading Historical Fiction'', ''Library Volunteering'',
    ''Journaling'']'
  career_goals: Maria aspires to launch a permanent Community Arts Hub in Centerville that offers rotating exhibitions, hands‑on workshops, and mentorship for emerging local artists. She hopes to serve
    on the board of the county historical society to preserve regional heritage, and to earn an online certificate in nonprofit management to formalize her leadership skills. In parallel, Maria plans to
    document oral histories of longtime residents in a memoir and to start a modest home‑based business selling handcrafted quilts and preserves, thereby blending her creative passions with entrepreneurial
    ambition while continuing to give back to her community.
