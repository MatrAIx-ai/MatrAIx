persona_description: A geologist who is interested in the study of the East Africa Rift and its seismic activity, particularly the earthquakes that occur in the region. This person is likely to be knowledgeable
  about the patterns of seismicity in the East Africa Rift, the relationship between depth of earthquakes, deformation of continental lithosphere, and magmatic processes, and the earthquakes that have occurred
  in the region, including the August 1989 earthquake swarm and the 2006 M 7.0 earthquake. They may also have an interest in the geology of the region, including the evolution of the Afar triple junction
  zone and the rifts that have formed in the East Africa Rift.
