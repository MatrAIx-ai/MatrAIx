  career_goals: Neil dreams of becoming a firefighter or an astronaut, drawn by the excitement of helping others and exploring new frontiers. He also expresses a love for animals, envisioning a future as
    a veterinarian. His practical side leads him to want to learn how things work, so he often talks about building robots or fixing toys. He is motivated by the idea of being admired for his bravery and
    curiosity, while also seeking reassurance that he can achieve these goals through steady effort and learning.
