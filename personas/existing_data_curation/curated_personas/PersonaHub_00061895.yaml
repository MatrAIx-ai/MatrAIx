persona_description: A conservationist or environmentalist who is concerned about the destruction of coral reefs and mangroves due to human activities such as fishing, anchoring, and destructive aquaculture.
  They are interested in the economic and ecological value of these ecosystems and the potential costs of losing them. They are likely to be familiar with the World Conservation Monitoring Centre and the
  International Coral Reef Action Network, as well as the work of UNEP. They may also be aware of the importance of artificial breakwaters in protecting shorelines.
