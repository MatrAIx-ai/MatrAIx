personas:
  professional: Leslie Mattson, an aspiring junior robotics designer who blends art and tech, channels curiosity and sociability into building Scratch mini‑games and tinkering with simple robots, often
    sketching design concepts on watercolor pads while favoring flexible, unstructured project timelines.
  sports: Leslie Mattson, an energetic skateboarding enthusiast who hikes Riverside State Park trails on weekends, stays fit by joining the school’s after‑school skate club and cheering for the Seattle
    Seahawks and Spokane Chiefs, yet often prefers spontaneous outdoor adventures over structured team sports.
  arts: Leslie Mattson, a watercolor aficionado who also creates digital illustrations in Procreate, draws inspiration from artists like Alvaro Castagnet and Loish, pens short stories reminiscent of Rainbow Rowell,
    and strums acoustic covers of Ed Sheeran and The Lumineers while singing in the school choir.
  travel: Leslie Mattson, a curious teen with a love for both adventure and chill, often plans spur‑of‑the‑moment weekend trips to nearby Portland and the Olympic Peninsula, dreams of backpacking through
    Yosemite and exploring Kyoto’s cherry‑blossom festivals, yet balances these wanderlust goals against schoolwork and a modest family travel budget.
  culinary: Leslie Mattson, a budding home cook who favors quick, colorful meals, frequently whips up avocado toast topped with cherry tomatoes and feta, experiments with homemade sushi rolls using crab
    and cucumber, and can flawlessly bake chocolate chip cookies using dark chocolate chunks and sea salt.
  core: Leslie Mattson blends artistic day‑dreams with a love for spontaneous outdoor play, often juggling sketchbooks and skateboard decks while occasionally forgetting to finish homework before a new
    game idea sparks, and they proudly sport a habit of misplacing their favorite guitar pick.
background:
  cultural: Leslie grew up in a middle‑class white family in Spokane, Washington. Her upbringing blends typical Pacific Northwest values of outdoor appreciation with a supportive suburban community that
    encourages artistic expression. Family traditions include seasonal trips to the nearby Cascade Mountains and participation in local festivals that showcase regional art and music. The city’s vibrant
    indie art scene, community theater, and public murals have shaped her open‑minded and flexible outlook, while the cooperative spirit of her school and neighborhood clubs reinforces her sociable and
    assertive nature.
