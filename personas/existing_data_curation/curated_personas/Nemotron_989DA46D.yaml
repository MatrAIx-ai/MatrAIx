  career_goals: Leslie dreams of turning her love for art and storytelling into a career as a multimedia artist or creative director, possibly working in animation, video game design, or visual branding.
    She also imagines herself mentoring younger students in art clubs and advocating for community arts programs in Spokane. While she knows she is still early in her education, she aims to pursue high‑school
    electives in graphic design and may consider a future degree in visual communications or interactive media.
