persona_description: A federal judge who has ruled that critical habitat must be set aside for the endangered Santa Ana sucker, a fish found in only 25% of its historic range due to urban development. The
  judge has given the U.S. Fish & Wildlife Service a year to designate protected habitat for the fish, but has also ruled that during that time, the agency cannot issue any permits for activity that would
  potentially harm the fish. The judge's ruling could affect Southern California flood control, drinking water and sewage treatment projects, and halt a variety of projects, including some designed to protect
  the fish.
