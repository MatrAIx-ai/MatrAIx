personas:
  professional: Karen Sellers, a veteran community-service manager who blends meticulous grant-writing skills with a willingness to experiment on the fly, leads Liberty’s senior-youth hub project with calm,
    competitive drive and a skeptical eye for unrealistic promises.
  sports: Karen Sellers enjoys brisk Saturday hikes on the Missouri River trail, supports the St. Louis Cardinals in baseball and the Missouri Tigers in college football, and maintains fitness by attending
    the Liberty Senior Bowling League and a weekly low-impact yoga class at the community center.
  arts: Karen Sellers, an avid reader of Hilary Mantel’s biographies and a regular audience member of Liberty’s community theater, finds inspiration in Grant Wood’s Midwestern landscapes, hums along to
    Johnny Cash’s classics during choir rehearsals, and preserves a love of quilting by exchanging patterns with fellow artists.
  travel: Karen Sellers prefers thoughtfully planned road trips that blend heritage and relaxation, having explored the Ozark National Scenic Riverways and the historic streets of Williamsburg, while dreaming
    of a pilgrimage to the sacred Methodist conference grounds in Nashville and a cultural soak in the Irish countryside.
  culinary: Karen Sellers, a confident home cook, delights in simmering heirloom tomato soup with basil, roasting honey-glazed carrots from their garden, and perfecting a buttery biscuit topped with jam,
    while occasionally splurging on fried chicken from the local diner as an indulgent treat.
  core: Karen Sellers mixes pragmatic community leadership with a garden-tending, choir-singing life, runs a friendly competition on grant totals, keeps a stash of half-eaten biscuits, and stays calm even
    when faced with chaos.
background:
  cultural: Raised in a small‑town Midwest environment, Karen embodies the pragmatic, community‑oriented values typical of central Missouri. Her family’s roots trace back to German and Irish immigrants
    who settled in Clay County in the early 1900s, fostering a tradition of hard work, self‑reliance, and volunteerism. A lifelong Methodist, she has been actively involved in her church’s outreach programs,
    reflecting the region’s strong emphasis on faith‑based service. The cultural fabric of Liberty, with its close‑knit neighborhoods, agricultural heritage, and modest hospitality, shapes her worldview
    and informs her dedication to fostering inclusive, resilient community networks.
