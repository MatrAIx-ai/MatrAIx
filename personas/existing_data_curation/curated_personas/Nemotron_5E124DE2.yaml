  career_goals: Even as she approaches retirement, Karen aims to solidify a lasting impact on Liberty’s community services. She plans to mentor emerging social service managers, create a model intergenerational
    community hub that combines senior activities with youth mentorship, secure multi‑year grant funding to ensure program sustainability, and author a practical handbook on community program management
    for small‑town settings. Additionally, she hopes to serve on the board of the local senior services coalition, advocate for policies that support rural social services, and leave a legacy of empowered
    volunteers and resilient programs.
