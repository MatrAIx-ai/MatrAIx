personas:
  professional: Edwin Gonzalez, a veteran hospitality manager with three decades of experience, blends his methodical, data‑driven mindset with genuine curiosity for operational improvements, excelling
    in team leadership, budget oversight, compliance, and culturally authentic guest experiences, while preparing to shift into a senior advisory role mentoring emerging managers in Miami’s heritage‑focused
    restaurant scene.
  sports: Edwin Gonzalez stays active through nightly walks along Miami Beach, weekly pickleball matches at his local senior sports club, and by cheering on the Miami Heat during basketball season and the
    Miami Dolphins in the fall, while occasionally joining community sailing outings in the summer.
  arts: Edwin Gonzalez immerses himself in classic son and salsa vinyl, spinning records by Celia Cruz, Benny Moré, and Tito Puente, and regularly attends cultural festivals featuring traditional dance
    troupes and occasional performances by the Miami Symphony Orchestra.
  travel: Edwin Gonzalez favors well‑planned, moderate‑budget journeys that blend cultural discovery with relaxation, such as weekend getaways to Key West’s historic Old Town, summer cruises to the Bahamas,
    and nostalgic visits to a family home in the Dominican Republic, always aligning travel with his volunteer schedule and financial constraints.
  culinary: Edwin Gonzalez, an accomplished home chef, expertly prepares heritage dishes like ropa vieja, arroz con pollo, and sweet plantain fritters, seasoning them with cumin, oregano, and tangy mojo
    sauce while harvesting fresh cilantro, basil, and chilies from his balcony garden for an extra burst of flavor.
  core: Edwin Gonzalez harmonises methodical precision with a nostalgic love for vintage son records, juggling spreadsheets, community teaching, and a thriving herb garden, yet habitually over‑commits to
    volunteer projects, leaving little time for personal downtime.
background:
  cultural: Edwin is a first-generation Cuban-American who grew up in the Little Havana neighborhood of Miami. Raised bilingual, he blends Cuban traditions—such as family gatherings centered around food,
    the rhythmic sounds of salsa, and Catholic holidays—with the eclectic, multicultural fabric of South Florida. His identity is shaped by the values of resilience, community solidarity, and a deep appreciation
    for the island’s culinary and musical heritage, which he actively preserves through his personal and professional life.
attributes:
  skills: '["Team Leadership", "Staff Scheduling", "Financial Planning and Budgeting", "Customer Service Management", "Bilingual Communication (Spanish/English)", "Regulatory Compliance (Florida Hospitality)",
    "Process Optimization", "Inventory Control", "Data Analysis (Excel)", "Crisis Management", "Cultural Liaison"]'
  hobbies: '["Cooking Cuban cuisine", "Listening to classic Cuban music", "Chess", "Balcony gardening", "Evening beach walks", "Volunteering (computer literacy for seniors)", "Attending cultural festivals"]'
  career_goals: Edwin aims to transition from day-to-day operations to a senior advisory role where he can mentor emerging managers and design training programs for small businesses within Miami’s Cuban
    community. He plans to acquire a professional certification in project management to better lead digital transformation initiatives, such as implementing cloud-based scheduling and inventory systems.
    While he envisions retiring within the next five years, he hopes to leave a legacy by establishing a consultancy that helps culturally-focused restaurants improve efficiency and profitability while
    preserving heritage.
