  hobbies: '["Historical Fiction Reading","Backyard Gardening","Traditional Filipino Cooking","Small‑Group Book Club","Waterfront Walking","Community Center Volunteering"]'
  career_goals: Ga aims to pursue a bachelor’s degree in Education to qualify for a tenure‑track position at a community college, where she can lead the development of a new interdisciplinary program that
    blends Southeast Asian cultural studies with practical skill‑building. She is also interested in creating online modules that provide flexible learning paths for adult learners. Long‑term, she hopes
    to mentor junior faculty and spearhead initiatives that enhance equity and inclusion across campus, while maintaining a balanced workload that respects her preference for predictable yet adaptable schedules.
