  career_goals: Although no longer in the formal workforce, Jada aims to leave a lasting educational legacy in Matthews. She plans to mentor new teachers through a partnership with the regional school district,
    launch a senior reading circle that provides structured learning for older adults, and compile a documented history of African American families in New Madrid County for the local museum. Additionally,
    she hopes to publish a memoir that reflects her decades in education and community service, and to secure a modest grant to support a community learning hub for lifelong learners.
