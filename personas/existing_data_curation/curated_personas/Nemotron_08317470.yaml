personas:
  professional: Hernando Jurado, a seasoned retail sales supervisor with over twenty years of hands‑on experience, blends methodical inventory control and staff scheduling expertise with a gregarious, talkative
    style that makes training sessions lively and customer interactions smooth, positioning him for an upcoming push toward store manager.
  sports: Hernando Jurado is a devoted baseball enthusiast, tracking MLB games, the winter league, and cheering for his local club team while attending weekend games at the city stadium and participating
    in a community fantasy‑league group that fuels his competitive spirit.
  arts: Hernando Jurado immerses himself in salsa, bachata, merengue, and reggaeton, regularly dancing at local clubs, listening to artists like Marc Anthony, Romeo Santos, Bad Bunny, and Daddy Yankee,
    and hosting karaoke nights where he belts out classics by Hector Lavoe and Luis Fonsi, feeding his love for performance and social connection.
  travel: Hernando Jurado prefers short, family‑oriented trips to Caribbean islands and historic cities such as Cartagena and Madrid, where he can blend cultural festivals with beach relaxation, planning
    itineraries months in advance but occasionally allowing spontaneous detours for local music events.
  culinary: Hernando Jurado cooks traditional island‑style dishes—plantain mash, stewed pork with cilantro, yucca soup, and seafood paella—displaying a competent home‑chef level, enjoys sourcing fresh herbs
    at weekend markets, and delights in pairing meals with a glass of rum but tends to over‑salt during festive preparations.
  core: Hernando Jurado is a methodical, sociable retail leader who balances disciplined finances and health routines with a passion for salsa, baseball, and cooking, often turning social gatherings into
    lively performances while occasionally slipping on medication reminders and budget caps.
background:
  cultural: Born to Dominican parents and raised in a close‑knit Dominican household, Hernando retains strong ties to his heritage while living in San Juan, Puerto Rico. He is fluent in Spanish and comfortable
    in English, navigating both cultures with ease. Family loyalty, respect for elders, and a love for music, dance, and food are core to his identity. He celebrates Dominican holidays such as Independence
    Day and the Día de la Hispanidad, and he actively participates in local Caribbean community gatherings, blending Dominican traditions with Puerto Rican influences. His Catholic upbringing informs his
    community service and participation in church events.
