  career_goals: Hernando aims to advance from first‑line supervisor to store manager within the next two years, positioning himself for eventual promotion to district or regional manager. He plans to obtain
    a professional certification in retail management and possibly complete an associate degree in business administration to strengthen his credentials. Long‑term, he dreams of opening a small boutique
    that showcases Dominican culinary products and crafts, leveraging his deep community ties in San Juan. He also aspires to mentor younger employees, formalize a structured training program for his team,
    and secure a stable financial future for his family as he approaches retirement.
