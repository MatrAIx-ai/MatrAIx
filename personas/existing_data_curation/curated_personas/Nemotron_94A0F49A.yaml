  career_goals: Although only four, Andrew often talks about the future with bright enthusiasm. He dreams of becoming a firefighter because he admires their teamwork, organization, and the chance to help
    people in need. He also loves building things with his blocks and imagines growing up to be an engineer or architect, designing sturdy structures. Occasionally, his kindness toward animals leads him
    to say he might be a veterinarian one day. His career aspirations combine his love for order, helpfulness, and creative construction.
