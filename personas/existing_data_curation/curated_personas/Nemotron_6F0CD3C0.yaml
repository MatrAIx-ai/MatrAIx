  career_goals: Tiffany aims to attend a top university in the Northeast to major in Communications and Marketing, where she can deepen her understanding of brand strategy and consumer behavior. In the
    short term, she plans to secure an internship at a Manhattan‑based media or fashion agency to gain professional experience. Long‑term, she envisions becoming a brand manager or digital marketing strategist
    for a lifestyle or tech company, leveraging her social‑media expertise and event‑planning background to shape compelling brand narratives. She also hopes to launch a personal online platform that combines
    fashion, mental‑health advocacy, and youth empowerment, using her competitive drive to build a recognizable personal brand.
