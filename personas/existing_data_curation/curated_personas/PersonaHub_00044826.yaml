persona_description: A lawyer who specializes in constitutional law, particularly First Amendment jurisprudence. The lawyer has experience in arguing cases before the Supreme Court and has a deep understanding
  of the principles of free speech and the role of the judiciary in interpreting and applying the law. The lawyer is knowledgeable about the use of analogy and metaphor in legal decision-making, and has
  experience in analyzing cases involving new technologies and their impact on free speech. The lawyer is also familiar with the patchwork of laws that exist in First Amendment cases pertaining to technological
  media and has experience in using terms such as "spectrum scarcity" and "pervasiveness" to rationalize different levels of governmental intrusion into speech. The lawyer is interested in understanding
  the Internet as a medium of communication and has a unique perspective on the role of the judiciary in regulating the content of online speech.
