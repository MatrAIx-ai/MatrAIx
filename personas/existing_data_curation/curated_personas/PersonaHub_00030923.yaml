persona_description: A Blender user who is interested in animating objects, especially those that have a path or curve. They are skilled in creating and manipulating paths and curves, and are familiar with
  the constraints and animation tools available in Blender. They are also experienced in using the track-to constraint to position objects relative to each other, and have a good understanding of how to
  create and manipulate keyframes to animate objects. They are likely to have a strong interest in the physics of objects and how they behave in animation, and are comfortable with using the physics tools
  in Blender to create realistic animations.
