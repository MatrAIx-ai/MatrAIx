persona_description: A medical professional who specializes in geriatrics and chronic disease management, particularly in the treatment of long-term conditions such as arthritis, diabetes, and heart disease.
  The speaker is a clinical instructor of geriatrics at Stanford University Medical Center and the medical director of Stanford Hospital's Adult Aging Services, a program designed to support the needs of
  older adults. They provide consultations, assessments, assistance with appointments, physician referrals, advocacy, coordination of services, access to community resources, and educational workshops to
  help patients manage their chronic conditions and improve their quality of life.
