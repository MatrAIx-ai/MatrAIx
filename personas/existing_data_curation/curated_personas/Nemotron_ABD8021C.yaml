  hobbies: '[''Playing soccer'', ''Listening to regional Mexican music'', ''Playing accordion'', ''Car tinkering and repair'', ''Hiking'', ''Fishing'', ''Cooking Mexican cuisine'', ''Video gaming (strategy
    games)'']'
  career_goals: Refugio aims to advance to a supervisory role within the metal casting facility, such as Shift Supervisor or Production Lead, within the next three to five years. He plans to earn certifications
    in welding inspection (AWS) and industrial safety (OSHA 30‑hour). Long‑term, he dreams of opening his own small casting workshop that offers custom metal parts for local manufacturers, combining his
    practical expertise with entrepreneurial ambitions. He also intends to pursue an associate degree in Industrial Technology to broaden his technical knowledge.
