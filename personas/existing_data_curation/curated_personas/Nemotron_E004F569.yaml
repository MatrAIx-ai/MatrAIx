personas:
  professional: Aaliyah Delcastillo leverages her bilingual fluency, meticulous budgeting, and proven event coordination experience to excel as a community outreach coordinator, where they apply structured
    project management methods and a competitive drive to expand nonprofit programming for Central Florida's Latino community.
  sports: Aaliyah Delcastillo hikes the trails of the Wekiwa Springs Preserve with the Orlando Trailblazers club, attends weekly yoga sessions at Sunrise Flow, follows the Orlando Magic season, supports
    Orlando City SC, and they incorporate structured interval training into their routine, balancing competitive spirit with a love for nature.
  arts: Aaliyah Delcastillo regularly attends performances by the Orlando Ballet, enjoys salsa nights featuring live music by Tito Puente tributes, streams Latin jazz from Rubén Blades, and they find inspiration
    from contemporary visual artist Kehinde Wiley, integrating these artistic experiences into their event planning and personal identity.
  travel: Aaliyah Delcastillo prefers meticulously planned weekend getaways, alternating between relaxing beach stays in the Florida Keys and cultural tours of historic Old San Juan, while budgeting for
    annual trips to Barcelona for culinary inspiration, and they balance their desire for adventure with family and financial responsibilities.
  culinary: Aaliyah Delcastillo excels at preparing traditional island dishes such as arroz con gandules, pernil, and mofongo, calibrates their recipes with precise gram measurements of sofrito, adobo,
    and achiote, and they delight in pairings of plantain chips with guava‑coconut salsa, showcasing a disciplined yet experimental culinary style.
  core: Aaliyah Delcastillo blends a competitive, structure‑driven mindset with a vibrant love for community, cuisine, and culture, yet they occasionally sacrifice sleep for salsa practice, embodying a
    disciplined yet lively spirit.
background:
  cultural: Aaliyah is a second‑generation Puerto Rican who grew up in a bilingual household in Orlando, Florida. Her family maintains strong ties to Puerto Rican traditions, celebrating holidays such as
    Noche Buena, San Juan Bautista, and the Puerto Rican Festival in Orlando. Fluent in Spanish, she often assists the local Latino community with translation and cultural navigation. The values of family
    closeness, respect for elders, and communal gatherings shape her identity, while her exposure to the diverse Floridian environment blends Caribbean heritage with mainland U.S. customs. This cultural
    duality influences her personal and professional aspirations, motivating her to give back to the community that raised her.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Project management and event coordination", "Budgeting and financial planning", "Data analysis with Excel", "Administrative support", "Culinary
    arts (Puerto Rican cuisine)", "Social media management", "Time management and scheduling", "Problem solving and critical thinking"]'
  hobbies: '["Cooking Puerto Rican cuisine", "Salsa dancing", "Hiking in Central Florida parks", "Yoga and mindfulness practice", "Puzzle solving (Sudoku, crosswords)", "Volunteer event planning", "Community
    potluck organization", "Reading self-help and business development books"]'
  career_goals: Aaliyah aims to re-enter the workforce within the next year, targeting a role as a community outreach coordinator or operations specialist at a nonprofit serving Latino populations in Central
    Florida. She plans to complete a bachelor's degree in Business Administration to supplement her associate's credential, and to obtain a Project Management Professional (PMP) certification. Long‑term,
    she aspires to launch her own culturally‑focused catering business that blends traditional Puerto Rican dishes with modern culinary trends, leveraging her organizational strengths and competitive drive
    to build a reputable brand.
