  hobbies: '[''Reading African American literature'', ''Listening to jazz and blues music'', ''Watercolor painting'', ''Gardening'', ''Woodworking'', ''Visiting art exhibitions'', ''Playing chess'', ''Genealogy
    research'', ''Walking along the Potomac River'']'
  career_goals: Even at 90, Luther aims to remain an active pillar of his community. He plans to continue volunteering at the local senior center, mentor younger generations, and compile a memoir that captures
    his experiences from the civil‑rights era to today. He hopes to establish a community oral‑history archive, curate a small traveling exhibition of local Black art, and maintain his health through regular
    walks and gardening, ensuring he can support his grandchildren and share his knowledge for years to come.
