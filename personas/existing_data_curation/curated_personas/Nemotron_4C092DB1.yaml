  career_goals: Beau aims to advance to a regional sales director role within the next three years, overseeing multiple store locations across the Pacific Northwest. He plans to earn a bachelor's degree
    in business administration or pursue an MBA to deepen his strategic expertise. In the longer term, he aspires to become a Vice President of Sales for a national retailer or launch his own sales consultancy
    focused on helping small businesses optimize their sales processes. He is also dedicated to mentoring junior sales staff and contributing to community business development programs.
