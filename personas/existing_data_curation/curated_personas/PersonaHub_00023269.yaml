persona_description: A literary critic and essayist who specializes in the analysis of Fitzgerald's works, particularly those set in the 1920s and 1930s. They have a deep understanding of Fitzgerald's themes,
  motifs, and stylistic techniques. They are knowledgeable about Fitzgerald's life and background, and have a keen interest in his work's impact on American literature. They have a critical eye and are
  skilled at discerning the subtle nuances and complexities in Fitzgerald's writing. They are also skilled at analyzing the cultural and social contexts in which Fitzgerald's works were written, and are
  able to draw connections between Fitzgerald's characters and the broader historical and political landscape of the time.
