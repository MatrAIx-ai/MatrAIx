persona_description: A scientist who specializes in agricultural systems and crop simulation, particularly in the use of computer models like CANEGRO for predicting sugarcane production in South Africa.
  She is familiar with the methodology used by Bezuidenhout and Singels (2007a) for constructing the homogenous climate zones and has experience with the DSSAT Cropping System Model. She is interested in
  the genetic coefficients of variety NCo376 and the impact of climate and management on sugarcane yields.
