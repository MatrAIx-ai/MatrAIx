  career_goals: Although retired, Pamela aims to preserve and share her community’s cultural heritage. She plans to compile a memoir and photo archive of Cushing’s mid-20th-century history, collaborating
    with the local historical society. She wishes to launch a seniors’ art circle at the community center, teaching quilting and other crafts to younger participants, and to secure a small grant to fund
    a community garden that supplies fresh produce to the town’s food-bank. Additionally, she hopes to master digital storytelling tools to create an online exhibition of local folk art.
