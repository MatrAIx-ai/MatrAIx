  hobbies: '["Visiting art museums and galleries", "Sketching and watercolor painting", "Improv comedy workshops", "Open‑mic nights", "Toastmasters public speaking", "Road trips across the Upper Midwest",
    "Attending Minnesota Twins baseball games", "Hiking in state parks", "Experimenting with cooking new cuisines", "Listening to podcasts on creativity, technology, and contemporary art"]'
  career_goals: John aims to rise from frontline representative to a leadership role where he can shape the customer experience strategy. He is targeting a team lead or supervisory position within the next
    two years, with a long‑term ambition to become a regional manager or director of customer experience. To achieve this, he plans to obtain a certification in project management (CAPM) and to sharpen
    his organizational skills through targeted workshops. He also envisions leveraging his passion for art and community engagement by eventually transitioning into a corporate social responsibility or
    community outreach role that blends his customer service expertise with his love for the arts. He is motivated by the desire to be recognized as a top performer, to mentor newer agents, and to contribute
    innovative ideas that improve service quality.
