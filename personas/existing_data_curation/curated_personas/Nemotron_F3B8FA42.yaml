personas:
  professional: Cheyenne Mills, a budding playground organizer who meticulously arranges blocks and insists on a consistent daily schedule, demonstrates an early knack for structure and leadership even
    in toddler playtime, and they often guide peers to follow the same routine.
  sports: Cheyenne Mills, an enthusiastic member of the local toddler soccer tumble group, loves the bright orange ball at the community center and eagerly joins the mini gymnastics class at the park, and
    they thrive on the routine of weekly practices.
  arts: Cheyenne Mills, a devoted fan of classic children's songs, can be found dancing to 'The Wheels on the Bus' and mimicking animated characters on 'Sesame Street', often drawing bold scribbles of dinosaurs
    and rainbows with chunky crayons, and they love to perform for family gatherings.
  travel: Cheyenne Mills, a curious explorer who has already visited Grandma's countryside farmhouse, the beach town of Clearwater, and a weekend trip to the nearby zoo, prefers well-planned car rides with
    familiar playlists and a favorite stuffed bunny for comfort, and they eagerly point out every new sign along the way.
  culinary: Cheyenne Mills, a picky eater who adores creamy mac and cheese, banana slices, and occasional peanut butter and jelly sandwiches, insists on having the sauce served separately and loves to sprinkle
    shredded cheese like confetti on everything, and they will stealthily add extra raisins to their bowl when no one watches.
  core: Cheyenne Mills blends a love for tidy routines with boundless toddler energy, channels an assertive yet sharing spirit, maintains a sticker-collecting savings habit, and they have a quirky tendency
    to hide extra snacks in their pocket.
background:
  cultural: Cheyenne is raised in a white, Southern‑American family in Lugoff, South Carolina. Her upbringing includes participation in community church services, Thanksgiving and Christmas family gatherings,
    and regional traditions such as sharing sweet tea and occasional backyard barbecues (with adults handling cooking). The family emphasizes Southern hospitality, respect for elders, and a close‑knit neighborhood
    network. These cultural influences shape her early experiences, from the lullabies she hears to the holidays she celebrates with extended family.
attributes:
  skills: '["fine motor coordination (stacking blocks, scribbling)","gross motor skills (walking, running, climbing)","basic self‑care (hand washing, feeding with assistance)","vocabulary development (~200
    words)","following simple two‑step instructions","parallel play and sharing","routine awareness"]'
  hobbies: '["building blocks and shape sorting","crayon drawing","listening to and dancing to children’s songs","interactive storybooks","group play at daycare (circle time, simple games)","outdoor exploration
    (chasing butterflies, splashing in puddles)"]'
  career_goals: Although still in early childhood, Cheyenne is already showing signs of curiosity about the world. She loves listening to stories about animals and teachers and often mimics adult roles
    during play, indicating an early fascination with caring for others. Her parents encourage her to explore her interests, so she expresses a simple ambition to "be a teacher" when she grows up, driven
    by her enjoyment of singing songs with peers and helping friends. For now, her primary goal is to learn new words, master new physical skills, and discover more about her surroundings.
