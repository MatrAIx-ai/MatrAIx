  career_goals: Martha aims to progress from her current managerial role to a senior operations or director‑level position within the sustainable technology sector, where she can shape large‑scale projects
    that blend engineering excellence with social impact. She plans to earn a PMP certification and eventually an MBA to broaden her strategic acumen. Long‑term, she envisions launching a community‑focused
    initiative that provides STEM mentorship and job training for underrepresented youth in Central Florida, leveraging her managerial expertise and compassionate drive to foster inclusive growth.
