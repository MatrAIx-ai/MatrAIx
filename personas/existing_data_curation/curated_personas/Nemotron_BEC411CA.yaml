personas:
  professional: Martha Fletcher, a 24-year-old engineering manager with a knack for translating complex data analytics into streamlined operational plans, leverages their curiosity and relaxed, cooperative
    style to foster cross‑functional teamwork while keeping projects cost‑effective and socially conscious.
  sports: Martha Fletcher enjoys weekend hikes on the Lake Apopka Trail with the local Trail Club, practices yoga at the Sunset Yoga Studio, follows the Orlando Magic and Tampa Bay Buccaneers, and plays
    casual soccer with a community recreation league.
  arts: Martha Fletcher unwinds with sci‑fi novels by Octavia Butler, indie electronica from Grimes, atmospheric scores by Hans Zimmer, and attends intimate shows featuring local folk singer Maya Lane at
    the Orlando Repertory.
  travel: Martha Fletcher favors low‑key road trips, having explored Asheville’s Blue Ridge Parkway and New Orleans’ jazz scene, while dreaming of a sustainable adventure in Iceland’s geothermal parks and
    a volunteer‑focused trek through Costa Rica’s rainforests.
  culinary: Martha Fletcher, an enthusiastic home cook, frequently prepares quinoa‑sweet‑potato salads with kale, chickpeas, and lemon‑tahini dressing, enjoys fresh sushi rolls with avocado and wasabi,
    and experiments with kombucha brewing using ginger and hibiscus.
  core: Martha Fletcher blends their engineering savvy, love for sustainable tech, and community‑oriented compassion into a relaxed yet purposeful life, punctuated by hiking, DIY gadgets, and a penchant
    for occasional financial slip‑ups.
background:
  cultural: Martha was raised in a middle‑class, suburban white family in Central Florida, with Anglo‑American roots (English, Irish, and German ancestry). Growing up in Winter Garden’s historic downtown
    community exposed her to a blend of Southern hospitality and the multicultural vibrancy of the Orlando metropolitan area. Family gatherings and community festivals emphasized togetherness, modesty,
    and service, shaping her compassionate outlook. The region’s outdoor lifestyle, emphasis on education, and growing focus on sustainability have influenced her personal values and career aspirations.
