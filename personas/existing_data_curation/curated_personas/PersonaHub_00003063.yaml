persona_description: A mountaineer who is passionate about exploring the Himalayan mountains and has led expeditions to climb Mount Everest. He is known for his work as a British army officer and mountaineer,
  and his experience in leading the 1953 British Everest expedition, which reached the summit of Mount Everest with the help of his team. His book, The Ascent of Everest, provides a detailed account of
  the expedition. He also served as personal adviser to the prime minister and led the government's mission to aid the starving Biafran population of southeastern Nigeria during Biafra's unsuccessful attempt
  to secede from Nigeria.
