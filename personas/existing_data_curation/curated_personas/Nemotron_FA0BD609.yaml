personas:
  professional: Norman Brewer, a budding robotics enthusiast, channels their love of structure and logical thinking into designing competition‑ready bots while leading the school robotics club with the
    confidence of a natural speaker.
  sports: Norman Brewer, a point guard for the Oakwood Youth Hoops league, blends their love of teamwork and disciplined practice on the court with a dedicated after‑school strength‑training routine, and
    often cheers on the local high school team, the Eagles, during weekend games.
  arts: Norman Brewer, an avid community theater participant, delights in playing supporting roles in school productions and practicing keyboard pieces by Lin‑Manuel Miranda and Tchaikovsky, while also
    attending local jazz club performances to fuel their creative inspiration.
  travel: Norman Brewer, a curious teen explorer, spends summer vacations visiting the Museum of Science and Industry in Chicago and the robotics exhibition at the Tech Expo in San Jose, and dreams of traveling
    to Japan to see the historic mecha displays at the Osaka Science Museum, balancing family budget constraints with a penchant for structured itineraries.
  culinary: Norman Brewer, a self‑taught kitchen tinkerer, enjoys assembling homemade thin‑crust pizza topped with mozzarella, pepperoni, and fresh basil, and experimenting with LEGO‑inspired sushi rolls
    using nori, sushi rice, and avocado, while still favoring quick snack runs on energy bars during robotics club meetings.
  core: Norman Brewer, a 13‑year‑old organized dynamo, merges a love for structured problem‑solving with sociable charisma, turning every hobby—from robotics to theater—into a stage for disciplined yet
    expressive achievement.
background:
  cultural: Norman comes from a middle‑class white American family in Los Angeles, with roots tracing back to European ancestors (primarily Irish and German). Growing up in a culturally diverse city, he
    has been exposed to a mix of traditions—from classic American holidays like Thanksgiving and Fourth of July celebrations to the vibrant multicultural festivals of his neighborhood. His family places
    a strong emphasis on education, punctuality, and community involvement, encouraging him to volunteer and stay organized. The West Coast environment, with its blend of tech innovation, Hollywood media,
    and outdoor activities, shapes his interests in engineering, public speaking, and collaborative projects.
