  career_goals: Norman aspires to become a civil engineer or urban planner who designs sustainable, well‑organized community spaces. He envisions leading large‑scale projects that combine his love for structure,
    practical problem‑solving, and public impact. In the long term, he hopes to hold a leadership role in a city planning department or a tech‑focused engineering firm, where he can blend his organizational
    expertise with his ability to communicate ideas clearly and rally diverse teams toward shared goals.
