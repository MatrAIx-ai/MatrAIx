persona_description: A LSU AgCenter entomologist who specializes in the control of horn flies and has conducted extensive research on the use of insecticide delivery methods such as ear tags, pour-ons,
  and sprays. He has experience with different chemical classes of insecticides and has developed recommendations for producers on how to maintain effective horn fly control. He is also knowledgeable about
  the development of insecticide resistance and the importance of a three-year rotation in the use of ear tags. He provides information on the use of pyrethroid and organophosphate ear tags and recommends
  specific brands for each chemical class.
