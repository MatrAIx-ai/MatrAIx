personas:
  professional: Michael Romance, an aspiring automotive technician, channels his detail‑oriented mindset, punctuality, and love for step‑by‑step procedures into excelling at community‑college labs and part‑time
    shop apprenticeships, thriving in low‑stress, predictable environments.
  sports: Michael Romance keeps fit by jogging the nearby Pine Ridge nature trail, follows the local high‑school cross‑country team for motivation, plays casual pickup basketball twice a month with a small
    circle of friends, and prefers low‑intensity, routine‑based workouts over competitive leagues.
  arts: Michael Romance blends his mechanical hobby with artistic flair, sketching engine parts while listening to Kendrick Lamar, Mary J. Blige, and a gospel choir, and attends occasional community‑theater
    productions such as "Our Town" to recharge his creative side.
  travel: Michael Romance favors short, meticulously planned road trips to historic towns like Gettysburg and Asheville, relying on detailed itineraries to keep routes predictable, and dreams of a future
    solo drive along the Pacific Coast Highway once financial independence is achieved.
  culinary: Michael Romance cooks reliable comfort meals such as spaghetti carbonara, grilled cheese with sharp cheddar, and rosemary‑roasted chicken, enjoys experimenting with DIY spice blends like smoked
    paprika and cumin, yet occasionally over‑seasons as a quirky habit.
  core: Michael Romance balances a quiet, routine‑driven lifestyle with underlying anxiety that fuels meticulous work, cautious spending, and a secret hobby of perfecting car repairs while sketching mechanical
    ideas late at night.
background:
  cultural: Michael is an African‑American teenager raised in the small, close‑knit community of Hawthorne, Florida. His family and neighbourhood are anchored in the traditions of Southern Black culture—frequent
    gatherings at the local church, shared meals featuring Southern comfort food, and a strong emphasis on resilience, respect for elders, and community support. He grew up listening to a blend of gospel
    choirs at family church services and contemporary Black music, which shaped his musical tastes. The cultural values of perseverance, practical independence, and collective responsibility have guided
    his outlook, reinforcing his preference for reliable routines and modest ambitions that benefit both himself and his community.
attributes:
  skills: '[''basic automotive repair'', ''carpentry and woodworking'', ''Microsoft Office (Word, Excel)'', ''budgeting and personal finance'', ''data entry'', ''customer service'', ''time management'',
