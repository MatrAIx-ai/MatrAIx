  hobbies: '[''listening to hip‑hop, R&B, and gospel music'', ''reading science‑fiction and self‑help books'', ''playing strategy and simulation video games'', ''automotive repair projects'', ''jogging
    on local nature trails'', ''sketching'', ''cooking simple meals'', ''mindfulness meditation'']'
  career_goals: Michael aims to secure a stable, hands‑on career that offers a predictable schedule and clear expectations. He plans to enroll in a community‑college program in automotive technology or
    HVAC servicing, with the goal of becoming a certified technician and eventually a maintenance supervisor for a local business or municipal facility. He values job security, the ability to support his
    family, and a work environment where he can contribute reliably while working with a small, familiar crew. Long‑term, he hopes to achieve financial independence and possibly open his own small repair
    shop that serves his community.
