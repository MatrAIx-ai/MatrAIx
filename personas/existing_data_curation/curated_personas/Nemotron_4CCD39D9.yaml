personas:
  professional: Karen Cason, a retired community-event coordinator turned volunteer curator, leverages their meticulous project-management expertise and deep art-historical curiosity to design intimate
    exhibitions for the Alna Historical Society, while their high standards and occasional worry drive them to obsess over every detail.
  sports: Karen Cason finds fitness in the rhythm of long walks along the Kennebec River shoreline, regularly joining the local senior walking club and dabbling in low-impact pickleball at the community
    center, a gentle way to stay active without aggravating joint concerns.
  arts: Karen Cason spends weekends wandering the Portland Museum of Art and Boston's Institute of Contemporary Art, devouring catalogues on emerging creators like Julie Mehretu and Olafur Eliasson while
    channeling that inspiration into quilts that echo the abstract patterns of Georgia O'Keeffe's desert landscapes.
  travel: Karen Cason prefers carefully mapped art-focused trips, such as a rail journey to New York's Museum Mile and a leisurely road tour of historic New England towns, balancing a love of cultural immersion
    with budget and mobility considerations that reflect their seasoned pragmatism.
  culinary: Karen Cason cultivates a modest herb garden and translates its bounty into seasonal dishes—rosemary-infused focaccia, lavender-honey tea, and beet-and-goat cheese salad—blending homegrown flavors
    with a playful experimentation that satisfies their creative palate.
  core: Karen Cason is a detail-obsessed, art-loving retiree whose relentless curiosity is both energized and restrained by a lingering worry, prompting them to shepherd community projects with meticulous
    care while never fully silencing the inner checklist.
background:
  cultural: Karen grew up in a traditional white New England family that has lived in the Alna area for generations, tracing its roots back to 19th‑century Yankee settlers who made a living from fishing,
    timber, and small‑scale farming. The community’s values of self‑reliance, modesty, and civic responsibility shaped her worldview. Church and town meetings were central to social life, fostering a sense
    of collective stewardship. The coastal landscape, with its shifting seasons, ingrained in her a deep appreciation for nature and seasonal rhythms, which is reflected in her gardening and love of walking
    the shoreline. Maine’s regional heritage of folk arts and crafts also influences her quilting and knitting, while the town’s close‑knit atmosphere supports her active volunteer involvement.
