personas:
  professional: James Broaddus, a budding visual storyteller, merges a curiosity for new ideas with an organized yet flexible workflow, creating comic strips, stop‑motion shorts on a phone, and Scratch
    games that they share with classmates and the Kawkawlin Public Library’s summer reading program.
  sports: James Broaddus, a member of the Kawkawlin Youth Soccer League and a regular pick‑up basketball player at the community park, blends high‑energy teamwork with a love for the outdoors, rooting for
    the Detroit Lions, Detroit Pistons, and Michigan State Spartans while they commit to weekly practices and weekend games.
  arts: James Broaddus, an avid comic‑strip creator and stop‑motion enthusiast, draws inspiration from graphic novel legends like Art Spiegelman and Kazu Kibuishi, watches Pixar and Studio Ghibli shorts
    for animation ideas, and they spend evenings dissecting the storytelling techniques of Neil Gaiman and Alan Moore while listening to the indie band Tame Impala.
  travel: James Broaddus, who plans weekend adventures with friends using free map apps, favors local escapes to the Saginaw Bay shoreline to collect shells and photograph sunsets, dreams of a school‑funded
    field trip to the Great Lakes Maritime Museum in Cleveland, and they hope to someday explore the bustling streets of Tokyo for its anime culture, all while balancing a modest allowance and school commitments.
  culinary: James Broaddus, who enjoys the comfort of pepperoni pizza and homemade mac and cheese, also experiments with simple fish‑taco recipes using fresh clams and shrimp gathered from the Bay, and
    they proudly perfect banana‑pancake stacks topped with maple syrup, though they often forget to wash their hands after handling shells before cooking.
  core: James Broaddus blends a relentless curiosity for art and science with a social, yet occasionally procrastinating, spirit; they turn every sunset, soccer match, and comic page into a chance to create,
    share, and occasionally splurge on the next drawing tablet.
background:
  cultural: James comes from a white, Midwestern family with deep roots in Michigan. His ancestors include German and Irish emigrants who settled in the Great Lakes region, and his family reflects the traditional
    values of hard work, community involvement, and modesty common in small-town Michigan. He was raised in a Protestant household that emphasizes kindness and service, and he participates in local traditions
    such as the Bay County Fair, high-school sports rallies, and church youth group activities. While his community is largely homogenous, James's curiosity and digital media exposure have broadened his
    appreciation for diverse cultures and artistic expressions, shaping a balanced, inclusive worldview.
