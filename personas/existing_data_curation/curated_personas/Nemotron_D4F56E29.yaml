  career_goals: James dreams of turning his love for art and technology into a career that inspires others. He hopes to study visual communication or animation in college and eventually work as a multimedia
    storyteller—creating animated short films, educational videos, or interactive digital content for community programs. He also imagines a role that lets him mentor younger kids in art and tech, perhaps
    through a local youth center or museum outreach program. Long-term, he wants to combine creativity with service, using his skills to showcase Midwestern stories and foster cultural exchange.
