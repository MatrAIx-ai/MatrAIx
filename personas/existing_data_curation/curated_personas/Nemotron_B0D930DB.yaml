personas:
  professional: Jacob Lee, a 17‑year‑old senior, leverages their reliable teamwork and methodical planning to manage a tech‑focused YouTube channel, assist the school robotics club, and coordinate youth‑center
    events, and they envision a future as a civil engineering project manager who blends engineering expertise with digital marketing.
  sports: Jacob Lee shines on their high‑school soccer team and competes in the community center’s basketball league, trains at the Riverside Sports Club, roots for the Los Angeles Lakers and Manchester
    United, and they follow a disciplined yet occasionally over‑committed fitness regimen that blends team practice with personal running sessions.
  arts: Jacob Lee’s artistic side thrives on classic‑rock icons like The Beatles and Led Zeppelin and indie acts such as Arctic Monkeys, they draw inspiration for their tech‑review videos from creators
    like Linus Tech Tips, and they unwind with indie films by Greta Gerwig, shaping a creative identity that bridges music, visual storytelling, and technology.
  travel: Jacob Lee plans trips with the same spreadsheet precision they use for projects, has road‑tripped to Yosemite and the Grand Canyon, spent a summer exchange in Tokyo exploring its cutting‑edge
    infrastructure, and they dream of touring the historic bridges of Prague and the skyscrapers of Dubai once they earn a scholarship for engineering studies.
  culinary: Jacob Lee, an occasional home cook, favors quick yet flavorful meals like chicken teriyaki with soy sauce, garlic, and fresh ginger, they also whip up spicy ramen topped with soft‑boiled eggs
    and green onions, and they indulge in classic cheese‑pizza with extra mozzarella on busy weekends, though their schedule often lands them at fast‑food burger joints.
  core: Jacob Lee blends an organized, methodical mind with an outgoing, tech‑savvy spirit, they juggle robotics, youth‑center events, and classic‑rock playlists while occasionally over‑committing to projects
    and treating themselves to late‑night gaming marathons.
background:
  cultural: Jacob was raised in Woodmere, a suburban community in Nassau County that sits near the cultural diversity of New York City. His family is white with a blend of European and Middle Eastern ancestry,
    reflected in his middle name Ahmad. He grew up primarily within an American cultural framework—celebrating holidays such as Thanksgiving, Christmas, and Independence Day—while also experiencing occasional
    family traditions like Ramadan meals and Middle Eastern cuisine. Exposure to the multicultural environment of the greater NYC area and a community emphasis on education and civic involvement has shaped
    his inclusive outlook and values.
