  career_goals: Jacob aims to enroll in a community college to study civil engineering or construction management, with the long‑term goal of becoming a project manager who blends his methodical mindset
    with his passion for collaborative work. He is also interested in digital marketing, seeing it as a way to use his sociable nature and practical tech skills, and ultimately seeks a stable, community‑focused
    career that allows continuous learning and contribution.
