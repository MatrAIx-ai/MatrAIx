  career_goals: Brittney aims to earn her GED within the next year and pursue an associate degree in automotive technology or graphic design. She envisions a career that blends her hands‑on aptitude with
    creative expression, such as working as a design assistant for an automotive marketing firm, or eventually opening a custom bike shop that offers personalized graphics. In the long term, she hopes to
    become a certified automotive technician while maintaining a freelance portfolio of digital art commissions, leveraging her competitive drive to excel in both fields.
