personas:
  professional: Brittney Collard, a 17-year-old high school senior who balances curiosity with hands-on practicality, leverages their skill in basic automotive maintenance and digital illustration to manage
    the social-media presence of a local youth group while planning to pursue an associate degree that fuses automotive technology with graphic design, and they tackle projects with a competitive edge and
    an organized-yet-flexible work style.
  sports: Brittney Collard, a 17-year-old track runner and off-road biking enthusiast, competes in the high-school Eagle Track Club's 400-meter relay, rides on weekends with the local Mountain Bike Club,
    and passionately follows the Atlanta Falcons and Atlanta Braves, while they channel a competitive drive into both personal training and spirited game-day support.
  arts: Brittney Collard, a 17-year-old budding cartoonist, spends free evenings sketching original comic characters inspired by the storytelling of Stan Lee and the visual flair of Hayao Miyazaki, curates
    playlists that blend Led Zeppelin riffs with Ariana Grande's pop hooks, reads Agatha Christie mysteries for plot twists, and captures urban street scenes through photography reminiscent of Henri Cartier-Bresson,
    weaving all influences into a distinctive creative voice while they experiment with new panel layouts.
  travel: Brittney Collard, a 17-year-old adventure-minded teen, plans low-cost road trips that combine off-road biking through the Great Smoky Mountains with weekend music festivals in Austin, dreams of
    a solo bike tour along the Pacific Coast Highway, and balances their love for exploration with school commitments and a modest travel allowance, while they meticulously map routes and budget each outing.
  culinary: Brittney Collard, a 17-year-old home-cooker with a flair for Southern comfort cuisine, regularly whips up fried chicken using a buttermilk brine, buttery shrimp and grits spiced with cayenne,
    and creamy mac and cheese topped with crisp breadcrumbs, while they experiment with hot-sauce-infused collard greens and perfect sweet tea with a splash of bourbon vanilla.
  core: Brittney Collard, a 17-year-old driven by a blend of competitive grit and creative curiosity, they juggle off-road biking, comic sketching, and a disciplined budget, yet occasionally sacrifice sleep
    for art, reflecting a skeptical yet resilient teen navigating ambition and teenage quirks.
background:
  cultural: Brittney grew up in a middle‑class family in Oklahoma City, where Midwestern hospitality and a strong sense of community are central. Her upbringing included regular church gatherings, county
    fairs, and family barbecues, instilling a respect for tradition while encouraging curiosity about the wider world. She enjoys country and classic rock music, appreciates regional cuisine like fried
    chicken and barbecue, and values the independence and self‑reliance often associated with the Oklahoma spirit. At the same time, her exposure to diverse online communities has broadened her perspectives
    beyond her local environment.
