  career_goals: Although formally retired, Jeanine aims to deepen her involvement in the local senior center by leading new wellness workshops and a intergenerational story‑telling project. She hopes to
    compile a family recipe book and memoir that capture her community’s traditions, and she aspires to stay physically active through weekly walking groups and line‑dance classes, ensuring she remains
    independent and socially engaged for years to come.
