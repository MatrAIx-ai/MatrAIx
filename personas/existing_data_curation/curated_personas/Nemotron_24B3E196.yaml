personas:
  professional: Jeanine Dodgen, a retired senior‑center coordinator turned community wellness champion, they use practical home‑maintenance skills, a structured yet flexible budgeting style, and a sociable,
    assertive demeanor to orchestrate intergenerational storytelling projects and lead weekly wellness workshops at the local senior center.
  sports: Jeanine Dodgen, staying active through a weekday walking group at Tower Grove Park and community line‑dance evenings, they proudly root for the St. Louis Cardinals and St. Louis Blues, often wearing
    team hats while stretching before a gentle jog.
  arts: Jeanine Dodgen, an avid participant in a weekly book club that discusses Toni Morrison and John Steinbeck, they enjoy classic American folk music by Johnny Cash and Joan Baez at community dance
    nights, and volunteer to sew costumes for local productions of Arthur Miller’s 'Death of a Salesman.'
  travel: Jeanine Dodgen, favoring relaxed road trips to historic towns like Hermann, Missouri, and the scenic Ozarks, they dream of visiting the gardens of Versailles and cherish annual family visits to
    New Orleans during Mardi Gras, planning each journey with careful budgeting to align with a desire for gentle adventure and cultural immersion.
  culinary: Jeanine Dodgen, an adept home chef, they perfect St. Louis‑style toasted ravioli, slow‑cooked pork ribs slathered in tangy barbecue sauce, and garden‑fresh tomato basil soup, while savoring
    Provel cheese on homemade pizza crusts and sprinkling fresh thyme and oregano from their own garden into every dish.
  core: Jeanine Dodgen, blending structured gardening routines with spontaneous potluck gatherings, they forge a vibrant community hub anchored by warm charisma, pragmatic organization, and a habitual misplacement
    of knitting needles.
background:
  cultural: Jeanine was raised in a Midwestern white family with German‑Irish ancestry in the St. Louis metropolitan area. Her upbringing emphasized practicality, community service, and a love of regional
    traditions such as backyard barbecues and local cuisine like toasted ravioli. Active participation in her local Catholic parish instilled values of cooperation, hospitality, and modest ambition, while
    the cultural fabric of St. Ann, MO—its neighborhood gatherings, seasonal fairs, and emphasis on neighborly support—continues to shape her worldview and daily routines.
