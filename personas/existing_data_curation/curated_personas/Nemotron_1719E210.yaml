personas:
  professional: Lena Becknel, a senior systems analyst, blends sharp analytical skills with a collaborative, harmony‑focused approach, turning business needs into clear system requirements, mapping workflows,
    and delivering pragmatic SQL and Power BI solutions while navigating agile projects with flexibility that balances their preference for structure against occasional disorganization, and they seek to
    mentor junior staff and steer mission‑critical healthcare and education IT strategies toward sustainable work‑life balance.
  sports: Lena Becknel stays active by strolling the Lowcountry beaches, practicing yoga at the Sunrise Yoga Studio, joining the Myrtle Beach Beach Volleyball Club for weekend matches, and they cheer on
    the South Carolina Gamecocks football team and the Carolina Panthers during the fall season.
  arts: Lena Becknel indulges in mystery novels by Agatha Christie, historical fiction by Barbara Kingsolver, soulful jazz from Gregory Porter, and frequently attends live performances at the Charleston
    Music Hall, and they especially look forward to the regular Nina Simone tribute night that deepens their connection to storytelling traditions.
  travel: Lena Becknel favors flexible weekend getaways to Savannah’s historic squares and the Blue Ridge Parkway’s scenic overlooks, while they budget for a future cultural pilgrimage to Ghana’s coastal
    towns to connect with their ancestors, balancing meticulous flight planning with spontaneous detours for local food markets.
  culinary: Lena Becknel, an adept home cook, delights in preparing Southern comfort classics such as shrimp and grits, rich gumbo seasoned with home‑grown thyme and bay leaf, and sweet potato pie, and
    they often experiment with fresh herbs from their garden to add depth to collard greens and cornbread.
  core: Lena Becknel blends meticulous planning with a love for spontaneous garden wanderings, often misplaces their keys amidst the herbs, over‑analyzes financial statements, and they channel their restless
    energy into mentoring emerging talent.
background:
  cultural: Lena’s identity is shaped by her African‑American heritage and deep roots in South Carolina’s Black community. Growing up in a tight‑knit, church‑centered family, she internalized values of
    resilience, communal support, and a strong sense of history. She regularly participates in local cultural events such as Juneteenth celebrations and the Horry County Black Heritage Festival, honoring
    the legacy of the Gullah‑Geechee traditions that permeate the Lowcountry. These experiences instilled a reverence for storytelling, music, and culinary customs passed down through generations. Lena
    also draws strength from the Black professional networks in the region, which have provided mentorship and advocacy throughout her career. This cultural foundation informs her commitment to fostering
    inclusive environments, mentoring emerging talent, and preserving the rich tapestry of Southern Black culture within her personal and professional life.
attributes:
  skills: '[''Systems analysis'', ''Requirements gathering'', ''Process modeling'', ''SQL querying'', ''Data visualization (Power BI)'', ''Technical documentation'', ''User training'', ''Project coordination'',
