  hobbies: '[''Gardening'', ''Cooking Southern and soul‑food cuisine'', ''Reading mystery and historical fiction'', ''Beach walks'', ''Book club participation'', ''Yoga'', ''Volunteering to teach computer
    basics'', ''Family game nights'', ''Listening to R&B and jazz podcasts'']'
  career_goals: Lena aims to advance into a senior analyst or lead consultant role where she can mentor junior staff and shape organizational IT strategy. She is particularly interested in opportunities
    that promote work‑life balance, flexible scheduling, and a supportive environment for mental wellbeing. Over the next five years, she hopes to become a subject‑matter expert in mission‑critical enterprise
    systems for healthcare or education sectors, leveraging her skill set to improve service delivery while minimizing stress for herself and her team. A long‑term ambition is to give back to the community
    by establishing a local mentorship program that encourages under‑represented youths to pursue careers in technology.
