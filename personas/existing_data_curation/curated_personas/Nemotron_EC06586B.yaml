personas:
  professional: Devin Cunningham is a seasoned Jacksonville taxi driver whose intuitive mastery of the city’s streets, meticulous vehicle upkeep, and first‑aid certification blend with a compassionate bedside
    manner to deliver punctual, safe rides while mentoring new drivers, and they are celebrated for their steadfast reliability.
  sports: Devin Cunningham roots for the Jacksonville Jaguars and follows the Jacksonville Jumbo Shrimp, cheering at TIAA Bank Field and the Shrimp’s stadium, rows a small fishing crew at the St. Johns
    River club, and they play weekly checkers tournaments at the community center while maintaining light cardio through early‑morning casts.
  arts: Devin Cunningham’s playlists swirl with classic soul and gospel by Aretha Franklin, Sam Cooke, Al Green, and Marvin Gaye, which they share with passengers while the rhythm of church choirs and neighborhood
    porch storytelling shape their appreciation for live performances at the historic Florida Theatre.
  travel: Devin Cunningham plans road trips in a modest RV, favoring scenic drives to Amelia Island’s sunrise beaches, Savannah’s cobblestone squares, and New Orleans’ French Quarter, and they balance budget
    constraints with a love for exploring Southern heritage sites.
  culinary: Devin Cunningham tends a backyard garden of collard greens, okra, and sweet potatoes, turning the harvest into Southern staples like smoked pork collard greens, shrimp and grits, and a spicy
    gumbo seasoned with cayenne and thyme, and they relish experimenting with new twists on traditional dishes.
  core: Devin Cunningham blends a lifetime of Southern soul, community‑first service, and disciplined pragmatism into a compassionate mentor who drives, gardens, fishes, and plans for a modest RV retirement
    while humming gospel melodies, and they embody steady reliability.
background:
  cultural: Devin’s cultural roots are grounded in the African-American Southern tradition of Jacksonville, shaped by decades of community, church, and family ties. Growing up in a historically Black neighborhood,
    he absorbed the values of mutual aid, storytelling, and resilience that have long defined the city’s Black community. The rhythm of gospel and soul music, shared meals of collard greens and pork, and
    annual celebrations like Juneteenth and local church festivals have informed his worldview. His experiences from the civil‑rights era to the present have fostered a deep respect for perseverance and
    collective progress, which he expresses through compassionate service, mentorship, and involvement in local volunteer networks. Devin’s identity reflects the blend of Southern hospitality and the enduring
    spirit of African-American culture in Duval County.
