  hobbies: '[''listening to classic soul, R&B, and gospel music'', ''fishing on the St. Johns River'', ''watching Jacksonville Jaguars football'', ''volunteering to drive seniors'', ''attending church services'',
    ''gardening'', ''cooking Southern cuisine'', ''playing checkers'', ''reading local news'', ''solving crossword puzzles'']'
  career_goals: Devin hopes to shift from full-time driving to a mentorship role, training new drivers in safe driving practices, customer etiquette, and vehicle upkeep. He plans to obtain a commercial
    driver’s license and eventually purchase a small fleet of taxis, creating employment for other experienced drivers in his neighborhood. Parallel to this, he aspires to launch a volunteer ride program
    that provides free transportation for seniors, veterans, and low-income residents, reinforcing his commitment to community service. Financially, he aims to secure a comfortable retirement through disciplined
    savings, possibly investing in a modest RV for occasional travel and exploring a side business offering basic car-maintenance workshops for peers.
