persona_description: A researcher at the University of Illinois at Urbana-Champaign (UIUC) who specializes in developing imaging technologies for the molecular level diagnosis of diseases, particularly
  cancer. The persona is skilled in the integration of various imaging methods, such as CARS and spectral interferometry, to create a new technique for non-linear interferometric vibrational imaging (NIVI).
  The persona aims to make NIVI a portable, easy-to-use, and clinically useful diagnostic technology that can be used to diagnose diseases at the molecular level.
