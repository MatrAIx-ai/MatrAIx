personas:
  professional: David Holliday, a budding elementary educator with a flair for STEAM integration, balances firm structure with flexibility, and they use their classroom management acumen, tech‑savvy command
    of Google Classroom and smartboards, and artistic sensibility to craft interdisciplinary lessons that spark curiosity while maintaining an adaptable structure.
  sports: David Holliday, an avid hiker and cyclist who rides with the Bucks County Trail Riders club, follows the Philadelphia Eagles and the Philadelphia Flyers, and they squeeze in weekend runs along
    the Schuylkill River Trail to stay fit.
  arts: David Holliday, a watercolor enthusiast who sketches Bucks County’s rolling hills, they capture historic Philadelphia architecture in Ansel Adams‑inspired photographs, strum acoustic renditions
    of Bob Dylan at local jam nights, and draw inspiration from contemporary poet Ocean Vuong while curating personal playlists featuring Sufjan Stephens.
  travel: David Holliday, a meticulous planner who prefers off‑peak trips, they have explored the historic streets of Boston, the murals of Philadelphia’s Fishtown, and dream of a solo road‑trip along the
    Pacific Coast Highway, balancing a modest travel budget with occasional splurges on boutique hostels.
  culinary: David Holliday, a competent home cook who loves experimenting with fresh herbs, they frequently make avocado toast topped with feta and cherry tomatoes, perfect a fluffy buttermilk pancake for
    Sunday brunch, and indulge in a classic Philly cheesesteak when craving comfort food.
  core: David Holliday, a curious yet competitive 21‑year‑old who juggles teaching prep, watercolor, and coding indie games, they hoard sketchbooks on every shelf, and they can’t resist a late‑night gaming
    session after a long day of lesson planning.
background:
  cultural: David is a white American raised in the suburban community of Perkasie, Pennsylvania, within Bucks County’s Mid‑Atlantic cultural landscape. His upbringing was shaped by a blend of small‑town
    traditions, colonial‑era history, and the nearby urban influences of Philadelphia. Family gatherings emphasized holiday celebrations, community service, and an appreciation for local history and outdoor
    recreation. The region’s Quaker heritage instilled values of modesty, responsibility, and a cautious but open mindset, which resonate in David’s reserved demeanor and curiosity about diverse ideas.
    Exposure to the area’s art festivals and regional museums fostered his appreciation for the arts while maintaining a pragmatic, self‑reliant outlook typical of Bucks County residents.
