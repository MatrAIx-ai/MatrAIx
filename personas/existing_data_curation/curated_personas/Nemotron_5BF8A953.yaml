  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting and sketching'', ''Photography (landscape and architecture)'', ''Reading speculative fiction and contemporary poetry'', ''Hiking
    and biking on local trails'', ''Playing acoustic guitar'', ''Board‑game nights (strategy games)'', ''Coding simple educational games'']'
  career_goals: David aims to obtain his teaching certification and complete a bachelor's degree in Elementary Education within the next two years, positioning himself for a full‑time teaching role. He
    aspires to specialize in STEAM education, developing an interdisciplinary curriculum that blends art, science, and technology for his school district. In the longer term, he hopes to become a lead teacher
    or curriculum coordinator, mentoring new educators and driving innovative instructional practices. He also plans to pursue a master's degree focused on educational technology or special education to
    broaden his expertise and increase his impact on diverse learners.
