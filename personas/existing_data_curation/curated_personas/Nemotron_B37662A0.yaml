  hobbies: '[''DIY home improvement'', ''Model RC car building'', ''Fishing'', ''Woodworking'', ''Listening to technical podcasts'', ''Collecting vintage power tools'', ''Reading sci-fi novels'', ''Strategic
    video games'', ''Local shooting range'', ''Attending small maker meetups'']'
  career_goals: Alex aims to become a master certified repair technician, pursuing advanced certifications in electric motor technology and smart power tools. He aspires to open a small, family‑run repair
    shop in Fortville, offering specialized services and training for apprentices. Over the next five years, he hopes to develop a line of custom tool accessories, achieve financial stability for his family,
    and be recognized locally as a go‑to expert for both commercial and hobbyist tool repair.
