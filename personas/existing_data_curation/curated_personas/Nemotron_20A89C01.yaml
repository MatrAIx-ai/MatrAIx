  career_goals: As a six‑year‑old, Jane often talks about her future dreams in vivid detail. She loves helping friends learn new things and enjoys setting up games with clear rules, so she imagines becoming
    a teacher who can create fun, organized classrooms. At the same time, her love of performing for her family and the excitement of being the center of attention inspire her to consider a career as a
    children’s entertainer or stage performer, where she can combine storytelling, singing, and dancing in a structured show. Ultimately, she hopes to grow up in a role that lets her both guide others and
    share her lively personality.
