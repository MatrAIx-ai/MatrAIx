personas:
  professional: Jane Jaser, a six-year-old playground coordinator, blends their love of predictable routines with an outgoing, talkative flair by meticulously planning LEGO building contests while still
    allowing friends to improvise, making them the lively center of group play.
  sports: Jane Jaser, a fixture on the neighborhood playground, kicks a ball for the Mini Soccer League Tigers, practices cartwheels during recess, and proudly wears a cap of the local Major League Baseball
    team, the Cubs, while cheering on every game.
  arts: Jane Jaser, a budding illustrator, fills sketchbooks with bright animal drawings and family portraits, belts out Raffi's 'Baby Beluga' while dancing to The Wiggles, and spends weekends watching
    Disney's 'Moana' for artistic inspiration.
  travel: Jane Jaser loves short family road trips, especially a seaside visit to Ocean City Boardwalk and a magical weekend at Disneyland, where they map out daily activities with stickers and eagerly
    seek a photo with Mickey Mouse.
  culinary: Jane Jaser delights in spreading peanut butter and jelly on bread, munching crispy chicken nuggets with ketchup, and proudly sharing fresh carrots from the garden, though they often sneak extra
    sugary cereal before school.
  core: Jane Jaser, a talkative six-year-old who thrives on leading structured LEGO games at the park, occasionally misplaces crayons when their imagination runs wild.
background:
  cultural: Jane comes from a white, Midwestern American family living in Carol Stream, a suburb of Chicago in DuPage County. Her family’s heritage includes German and Irish roots typical of many residents
    in the area, and they celebrate traditional U.S. holidays such as Thanksgiving, Halloween, and the Fourth of July with community gatherings. The local public school environment, church activities, and
    neighborhood block parties emphasize community involvement, teamwork, and respect for routine—values that shape Jane’s preference for structure balanced with a love for spontaneous play. Exposure to
    a diverse suburban community also nurtures her sociable nature and appreciation for sharing cultural traditions with friends.
