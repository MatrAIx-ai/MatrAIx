persona_description: A team of engineers from the Washington University in St. Louis who are developing bomb-sniffing locusts. They are backed by the Navy and are led by Baranidharan Raman. The team has
  received a three-year grant of $750,000 from the Office of Naval Research. They are using insects as cyborgs to detect explosives. They are using electrodes to hijack the antennae of locusts and read
  electrical activity. They are also developing a tiny backpack that can transmit data for the operator to collect and process. They are also planning on tattooing the bugs' wings with biocompatible silk
  that can covert light into heat. They are hoping to test the first prototypes within a year and to successfully complete the project in two years.
