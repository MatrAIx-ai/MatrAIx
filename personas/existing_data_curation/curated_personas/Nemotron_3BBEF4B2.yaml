  hobbies: '[''Museum visits and art gallery tours'', ''Street photography'', ''Sketching and visual journaling'', ''Listening to indie/experimental music'', ''Reading contemporary literature and philosophy'',
    ''Playing strategy board games (e.g., Settlers of Catan)'', ''Debate club participation'', ''Yoga and mindfulness practice'', ''Experimental cooking (Polish-inspired dishes)'']'
  career_goals: Mandy aspires to build a career at the intersection of visual art and digital media. In the short term, she aims to secure an internship or entry‑level position at a creative agency or contemporary
    art gallery in New York, where she can contribute to exhibition design, branding, or social media strategy. She intends to expand her portfolio with experimental projects that blend illustration, interactive
    media, and socially relevant themes. Over the next five years, Mandy plans to complete a bachelor’s degree in Visual Communication, launch her own freelance design studio, and eventually take on a creative
    director role that allows her to push aesthetic boundaries and lead interdisciplinary teams. She is also motivated to win design competitions and have her work featured in local art venues.
