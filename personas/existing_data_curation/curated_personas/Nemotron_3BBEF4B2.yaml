personas:
  professional: Mandy Porebski leverages their blend of Photoshop, Illustrator, and InDesign mastery with a critical, skeptical mindset to craft experimental exhibition concepts for New York galleries,
    thriving on the balance between meticulous project planning and the freedom to explore unconventional visual narratives.
  sports: Mandy Porebski balances a love for street‑style yoga at a Bushwick studio with occasional pick‑up basketball games at the local community center, cheering on the New York Knicks during the NBA
    season while reluctantly following the New York Yankees' summer schedule.
  arts: Mandy Porebski curates their visual world through frequent visits to MoMA and the Met, sketching alongside the works of Yayoi Kusama and Banksy, while filling playlists with indie trailblazers like
    Mitski, Arca, and Sufjan Stevens that fuel their experimental design projects.
  travel: Mandy Porebski prefers spur‑of‑the‑moment weekend trips, often hopping on the train to Brooklyn's Williamsburg for pop‑up galleries before planning a longer, budget‑aware backpacking adventure
    through Berlin and Lisbon's vibrant street‑art districts.
  culinary: Mandy Porebski enjoys whipping up experimental twists on traditional Eastern European dumplings, incorporating ingredients like smoked cheddar, dill, and beet‑infused dough, while also savoring
    New York’s ramen bowls and seasonal farmer’s‑market salads.
  core: Mandy Porebski is a curiosity‑driven visual storyteller who oscillates between meticulous project planning and spontaneous midnight sketch sessions, often losing sleep over a perfect color palette
    while hoarding vintage concert tickets.
background:
  cultural: Raised in Queens, New York, Mandy grew up in a multicultural environment, surrounded by a tapestry of Asian, Hispanic, and European communities. She is of Polish descent, and her family maintains
    traditions such as celebrating Wigilia and cooking pierogi, which fostered an early appreciation for cultural heritage and cuisine. Growing up in Flushing exposed her to a rich variety of artistic expressions,
    from Chinese calligraphy to Latin American mural art, shaping her open‑minded outlook toward art and ideas. While she identifies as a white American, she values the diversity of her neighborhood and
    often incorporates multicultural elements into her creative projects.
