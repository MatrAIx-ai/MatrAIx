persona_description: A Neuro-Optometrist who specializes in the treatment of vision problems using computerized eye movement exercises and the use of 3D images and balance boards to isolate and correct
  eye movements. The Neuro-Optometrist is also skilled in the use of closed loop logic and has experience in developing personalized treatment plans for patients following a neuro-optometric assessment.
  The Neuro-Optometrist works closely with referring providers and the rehab team members from occupational therapy, physical therapy, and mental health to ensure a recovery plan that is tailored to the
  patient.
