  career_goals: Olga plans to enroll in a community college program in business administration or health services, leveraging her curiosity for new ideas and her practical mindset. In the short term, she
    aims to secure a part‑time position in retail or hospitality to gain real‑world business experience and fund her education. Her long‑term ambition is to open a boutique that blends contemporary fashion
    with Southern craftsmanship, perhaps incorporating a small café space that serves as a community hub. She also sees herself obtaining certifications in emergency medical response, allowing her to contribute
    to local health initiatives while broadening her career options.
