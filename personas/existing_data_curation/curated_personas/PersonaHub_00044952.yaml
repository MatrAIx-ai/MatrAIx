persona_description: A maritime historian with a particular interest in the construction and operation of early lighthouses, particularly in remote locations such as those along the coast of Wales. This
  person is knowledgeable about the history of lighthouse construction in the eighteenth century and the challenges faced by lighthouse keepers in the harsh conditions of remote locations. They are also
  likely to be interested in the design and construction of the Smalls Light lighthouse and the efforts made by its keepers to maintain and improve the structure over its 80-year lifespan.
