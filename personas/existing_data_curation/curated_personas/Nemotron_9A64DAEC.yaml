  career_goals: Kristen aspires to turn her passion for visual storytelling into a professional career. She plans to earn her GED and enroll in a community‑college art program, eventually pursuing a Bachelor
    of Fine Arts or a specialized UX/UI design certificate. Her ambition is to work for a socially conscious creative agency or launch her own freelance studio that blends art, technology, and environmental
    advocacy. She is driven to develop a distinctive artistic voice that stands out in a competitive industry while maintaining the flexibility to explore unconventional projects.
