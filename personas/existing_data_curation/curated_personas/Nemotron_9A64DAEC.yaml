personas:
  professional: Kristen Ezell, an aspiring visual storyteller, leverages self‑taught mastery of Procreate, Photoshop, and Premiere to craft socially conscious digital narratives while balancing meticulous
    project planning on Trello with a fierce competitive drive to out‑shine peers in every portfolio review.
  sports: Kristen Ezell, a dedicated weekend hiker on Marin’s coastal trails and a casual member of a local yoga studio, roots for the Golden State Warriors, and occasionally joins a pickup soccer game
    with a small group of friends at the community field.
  arts: Kristen Ezell, a frequent visitor to Bay Area galleries who collects prints by Yayoi Kusama and street art by Banksy, curates indie playlists featuring Tame Impala and Phoebe Bridgers, and spends
    evenings strumming a ukulele while sketching digital portraits inspired by the surreal aesthetics of Bee ple.
  travel: Kristen Ezell, a budget‑conscious traveler, has explored the redwoods of Humboldt, spent a weekend camping in Big Sur, dreams of photographing the aurora borealis in Iceland, and habitually plans
    trips around art festivals like the Venice Biennale, balancing spontaneous hikes with meticulously saved travel funds.
  culinary: Kristen Ezell, who enjoys farm‑to‑table meals, often prepares avocado toast topped with radish and sprouts, whips up a miso‑glazed salmon bowl with quinoa and edamame, and indulges in late‑night
    sushi rolls from a local taqueria while critiquing the balance of flavors as rigorously as their artwork.
  core: Kristen Ezell, a 17‑year‑old visual creator, blends relentless self‑critique with a love for solitary art‑making, an obsessively detailed budgeting habit, and an occasional tendency to stay up all
    night perfecting a single sketch.
background:
  cultural: Kristen grew up in Novato, a suburban community in Marin County, surrounded by the natural beauty of Northern California’s coastline and the cultural vibrancy of the nearby San Francisco Bay
    Area. Her family’s white, middle‑class background emphasizes individualism, environmental stewardship, and a deep appreciation for education and the arts. The progressive, outdoor‑oriented culture of
    Marin County—with its focus on sustainability, community involvement, and diverse artistic expression—has shaped her worldview, fostering a blend of independent creativity, critical thinking, and a
    socially conscious outlook.
