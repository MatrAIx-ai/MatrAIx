personas:
  professional: Leonora Marceaux, a 27-year-old STEM-focused elementary educator in San Luis Obispo, blends rigorous data-driven assessment with vivid artistic projects, leading after-school maker clubs,
    mentoring novice teachers, and presenting at regional conferences while channeling their competitive drive to innovate curriculum that fuses robotics, digital illustration, and astronomy.
  sports: Leonora Marceaux stays active by hiking coastal trails and redwood groves with the San Luis Obispo Hiking Club, occasionally joining the local beach-volleyball league in summer, and follows the
    Cal Poly Mustangs basketball team and the Los Angeles Lakers for a dose of competitive spirit.
  arts: Leonora Marceaux channels their imagination through watercolor landscapes inspired by Claude Monet, digital illustrations echoing the whimsical style of Hayao Miyazaki, piano performances of Debussy's
    Clair de Lune, and frequent improv sessions with the San Luis Obispo Improv Troupe, while curating a Spotify playlist that blends Janelle Monáe and Billie Eilish for creative inspiration.
  travel: Leonora Marceaux prefers meticulously planned weekend getaways that blend hiking and stargazing, having trekked the Big Sur coastline and camped in Yosemite's Tuolumne Meadows, while dreaming
    of a summer research trip to Iceland's volcanic craters and a cultural immersion in Kyoto's historic temples.
  culinary: Leonora Marceaux enjoys whipping up intermediate-level dishes such as wild mushroom risotto seasoned with fresh thyme and smoked paprika, spicy Korean bibimbap with gochujang, and a seasonal
    beet and goat-cheese salad drizzled with walnut vinaigrette, often sourcing ingredients from the nearby Santa Maria farmers' market.
  core: Leonora Marceaux is a competitively curious educator who fuses art and science, fuels nights with coffee and stargazing, and never misses a chance to solve an escape-room puzzle.
background:
  cultural: Leonora identifies as a white American with French‑Canadian ancestry, reflected in her family name Marceaux. Raised in the culturally diverse Central Coast of California, she grew up attending
    community festivals, farmer's markets, and local arts events that celebrated both coastal and agricultural traditions. Her upbringing emphasized independence, curiosity, and an appreciation for both
    scientific inquiry and creative expression. This blend of European heritage and Californian coastal culture informs her inclusive teaching philosophy and her passion for integrating global perspectives
    into her classroom.
attributes:
  skills: '[''STEM curriculum development'', ''Project‑based learning facilitation'', ''Educational technology integration (Google Classroom, coding platforms)'', ''Classroom management and differentiated
    instruction'', ''Robotics and maker space coordination'', ''Data‑driven assessment and performance analysis'', ''Creative arts integration (STEAM)'', ''Public speaking and presentation'', ''Collaborative
    teamwork and mentorship'', ''Critical thinking and problem solving'']'
  hobbies: '[''Oil painting and watercolor'', ''Digital illustration and graphic design'', ''Amateur astronomy and stargazing'', ''Hiking coastal trails and redwood forests'', ''Reading science fiction
    and speculative fiction'', ''Playing piano'', ''Coding small interactive stories (Python/Turtle)'', ''Building and programming Arduino projects'', ''Participating in improv theater workshops'', ''Solving
    puzzles and escape rooms'']'
  career_goals: Leonora aims to become a district‑wide STEM innovation specialist, spearheading the creation of a comprehensive maker‑space program that bridges science, technology, engineering, arts, and
    mathematics for K‑8 learners. She plans to pursue a master’s degree in Education Technology to deepen her expertise in digital pedagogy, and eventually conduct research on effective strategies for teaching
    abstract scientific concepts to younger students. Long‑term, she envisions launching a nonprofit that provides after‑school STEAM workshops in underserved communities across the Central Coast, and authoring
    a guidebook on integrating creative arts into elementary science curricula.
