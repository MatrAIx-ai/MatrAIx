persona_description: A policy analyst who specializes in the analysis of transport-related policies, particularly those related to road tolls. She has experience working with both Germany and Spain, and
  is familiar with their different approaches to implementing tolling systems. She is interested in the potential economic impacts of implementing smart tolling, promoting CO2 differentiation, and preventing
  the use of vans for non-EU legislation avoidance. She is skilled in conducting economic impact studies and has experience working with data in PDF formats.
