  hobbies: '[''Gardening'', ''Woodworking'', ''Quilt making'', ''Reading historical biographies'', ''Crossword puzzles'', ''Walking/hiking'', ''Volunteer work at food pantry'', "Women’s networking group",
    ''Cooking Southern cuisine'']'
  career_goals: Approaching the later stage of her career, Delane aims to transition into a senior leadership role where she can shape sales strategy for her organization and mentor the next generation
    of sales engineers. She aspires to become a regional sales director or a consultant specializing in STEM product markets, with a focus on building high‑performing, diverse teams. Simultaneously, she
    plans to scale back her hours to achieve a better work‑life balance, possibly launching a boutique consulting practice that helps small tech firms enter the North Carolina market. Additionally, she
    hopes to develop a mentorship program for women in STEM within her company and contribute to community colleges by delivering guest lectures on technical sales.
