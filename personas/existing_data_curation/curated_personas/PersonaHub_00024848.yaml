persona_description: A historical and political scholar who is deeply interested in the early American Revolution, particularly the tensions between church and state during this time. They have a particular
  interest in the role of the Anglican Church in North America and its impact on the American Revolution. They are knowledgeable about the concepts of establishment and free exercise of religion as they
  relate to the American Revolution and its aftermath. They are also interested in the role of religion in the political process and the ways in which the American Revolution sought to energize and liberate
  religion.
