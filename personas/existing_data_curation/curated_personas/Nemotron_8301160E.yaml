  career_goals: Gelber aims to earn his GED and obtain a Certified Protection Professional (CPP) credential to augment his experience with formal credentials. He aspires to be promoted to shift supervisor,
    where he can mentor younger agents and lead a team focused on community-oriented policing. Leveraging his love for art and imagination, he hopes to launch a department-backed youth outreach program
    that uses visual art workshops to teach conflict-resolution skills and build positive relationships between law‑enforcement and at‑risk teens. Ultimately he wants a stable career path that balances
    advancement, continued learning, and meaningful community impact.
