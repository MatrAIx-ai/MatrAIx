personas:
  professional: Celia Hall, a 27‑year‑old commercial cleaning specialist, combines meticulous floor‑care technique, strict chemical safety, and eco‑friendly innovations to consistently exceed standards,
    while their solitary, detail‑oriented nature drives their quietly ambitious aim to become a supervisory mentor who values both proven methods and new sustainable ideas.
  sports: Celia Hall, a Seattle‑based resident, jogs solo through Discovery Park in the crisp mornings, follows the Seattle Seahawks (NFL), Seattle Sounders FC (MLS), and Seattle Kraken (NHL) for communal
    excitement, and participates in a low‑key, members‑only urban running club that emphasizes personal pacing over competitive races.
  arts: Celia Hall finds solace in the whisk of a vintage typewriter while rereading Agatha Christie mysteries, draws inspiration from the moody black‑and‑white cityscapes of Bill Brandt, curates evening
    playlists featuring Ludovico Einaudi and Bon Iver, and attends occasional indie‑film screenings of Christopher Nolan’s psychological thrillers when the mood allows.
  travel: Celia Hall prefers solo, low‑key journeys that blend quiet reflection with nature, having trekked the misty trails of Japan’s Hokkaido national parks, admired the aurora borealis in Reykjavik,
    and planning a future summer escape to the Oregon Coast’s secluded lighthouses, all while budgeting their trips through a meticulous spreadsheet to avoid splurges.
  culinary: Celia Hall, an enthusiastic herb gardener, often whips up basil‑mint pesto for pasta, brews chamomile‑lavender tea before night‑time reading, and relishes the tang of lemon‑rosemary roasted
    chicken, while admitting a guilty pleasure for ordering artisanal sushi rolls on weekends when the pantry runs low.
  core: Celia Hall is a quietly ambitious, eco‑conscious cleaning expert who channels solitary curiosity into meticulous work, frugal financial habits, and a penchant for nocturnal city photography that
    captures their calm yet competitively driven spirit.
background:
  cultural: Celia grew up in a modest, middle‑class family in the Pacific Northwest, where an appreciation for the outdoors and a practical work ethic were emphasized. Her white heritage reflects a blend
    of American cultural values—self‑reliance, respect for community norms, and a modest approach to ambition. The coastal climate and abundant natural spaces of Washington shaped her affinity for quiet,
    solitary pursuits and her commitment to environmentally conscious practices. Though she completed only a high school diploma, the region's focus on apprenticeships and on‑the‑job learning fostered her
    hands‑on skill development and pragmatic outlook.
attributes:
