  hobbies: '[''Reading mystery novels'', ''Urban birdwatching'', ''DIY home repair projects'', ''Listening to nature podcasts'', ''Journaling'', ''Sketching landscapes'', ''Nighttime photography'', ''Indoor
    herb gardening'']'
  career_goals: Celia aspires to transition from frontline cleaning to a supervisory role within the facilities department, aiming to become a team lead who sets performance standards and mentors new staff.
    She is motivated to earn certifications in green cleaning and occupational safety, positioning herself as an expert in environmentally responsible facility maintenance. Long‑term, she envisions opening
    a small niche cleaning service that specializes in eco‑friendly residential and office spaces, leveraging her practical experience and curiosity for new, efficient cleaning technologies.
