  career_goals: Although retired, Kevin’s ambitions centre on lifelong learning and giving back. He plans to deepen his digital literacy so he can stay connected with family and share photos of his projects
    online. A major personal goal is to complete the restoration of a 1965 Chevrolet Impala he began with his son, turning it into a showcase at local classic‑car events. He also hopes to establish a modest
    workshop where he can teach fellow seniors basic home‑repair techniques, compile his family’s genealogy into a printed booklet, and travel with his wife to historic sites along the Ohio River Valley,
    balancing curiosity with a relaxed, low‑stress itinerary.
