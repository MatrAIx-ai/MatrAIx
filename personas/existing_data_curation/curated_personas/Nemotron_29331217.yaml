personas:
  professional: Tien Holland, an aspiring junior IT support specialist, leverages their Associate of Arts in Computer Information Systems, strong Excel data‑analysis abilities, basic Python and JavaScript
    coding, and methodical project‑planning skills to troubleshoot network issues and streamline workflows for small‑business clients while pursuing CompTIA certifications.
  sports: Tien Holland, an avid weekend hiker and kayaker on the lakes surrounding Winter Haven, follows the Orlando Magic in basketball and the Tampa Bay Rays in baseball, and complements outdoor adventures
    with structured cardio sessions and strength training at the local community gym to maintain physical resilience.
  arts: Tien Holland, a casual acoustic guitarist, frequently leads small jam sessions that feature songs by John Mayer and the folk harmonies of Mumford & Sons, enjoys attending occasional indie film screenings
    at the Winter Haven Playhouse, and finds creative inspiration in the storytelling of author Malcolm Gladwell and the cinematic visions of Christopher Nolan.
  travel: Tien Holland, who prefers meticulously planned itineraries, has already explored the cultural vibrancy of New Orleans and the natural splendor of the Great Smoky Mountains, and dreams of a solo
    backpacking journey through Kyoto’s historic temples, balancing cultural immersion with a budget‑conscious approach.
  culinary: Tien Holland enjoys cooking simple yet nutritious dishes, often preparing grilled salmon with lemon‑dill sauce, avocado quinoa bowls, and homemade pizza topped with fresh basil and mozzarella,
    while appreciating weekend brunches featuring eggs Benedict and using high‑quality olive oil and locally sourced herbs.
  core: Tien Holland, an 18‑year‑old tech‑savvy organizer, balances a relentless curiosity for emerging trends with a tendency to over‑worry, channeling their methodical nature into DIY electronics, data‑driven
    budgeting, and quiet hikes, yet sometimes procrastinates health appointments while obsessively perfecting model kits.
background:
  cultural: Tien was raised in a middle‑class, white family in Winter Haven, Florida. His upbringing reflected a blend of traditional Floridian suburban values and the pragmatic work ethic common in the
    Midwest, where his grandparents originally settled. Family gatherings often centered around shared meals, community sports, and holiday traditions like Thanksgiving and Fourth‑of‑July fireworks. Growing
    up in Polk County, he was exposed to the region’s multicultural mix, interacting regularly with Hispanic and African‑American neighbors, which fostered an appreciation for cultural diversity. He attended
    public schools and later Polk State College, where an emphasis on practical, skills‑based education reinforced his methodical, organized approach to life. While he identifies with mainstream American
    cultural norms—valuing individual responsibility, education, and community service—he also respects the local “small‑town” ethos of friendliness and mutual support.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Python programming (basic)'', ''JavaScript (fundamentals)'', ''MySQL database queries'', ''Network troubleshooting'', ''Data analysis
