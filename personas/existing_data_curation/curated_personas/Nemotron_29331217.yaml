  hobbies: '[''Reading non-fiction (technology, psychology)'', ''DIY electronics (Arduino projects)'', ''Hiking and kayaking on local lakes'', ''Playing acoustic guitar'', ''Volunteering at animal shelter'',
    ''Strategy video gaming'', ''Building model kits (airplanes, ships)'', ''Participating in tabletop role‑playing games'', ''Cooking simple healthy meals'']'
  career_goals: Tien plans to enroll in a bachelor's program in Computer Science within the next year, aiming to graduate with a strong foundation in software development and systems analysis. He intends
    to obtain industry certifications such as CompTIA A+, Network+, and Cisco CCNA to complement his associate's degree. His immediate goal is to secure an entry‑level IT support or junior developer role
    at a local firm where he can apply his methodical approach and improve workflow efficiency. Long‑term, he envisions advancing to a systems analyst or project manager position, leading cross‑functional
    teams, and possibly launching a small tech consulting business that helps regional small businesses adopt practical digital solutions. He values career stability, incremental growth, and opportunities
    that align with his organized, reliability‑focused work style.
