personas:
  professional: Luna Yap, a budding preschool explorer, demonstrates early engineering curiosity by building block towers and sorting shapes, applying their practical curiosity and balanced organization
    to playful problem solving.
  sports: Luna Yap, a tiny soccer enthusiast, plays in the Little Desert Kickers preschool program at the community center, cheers for New Mexico United during televised matches, and they enjoy seasonal
    hikes to the Sandia Mountains with family for fresh‑air exercise.
  arts: Luna Yap, a miniature storyteller, delights in listening to The Wiggles and Raffi, practices beading turquoise and silver beads with grandma, and they imagine dancing in the sand to the drum rhythms
    of traditional Navajo flute recordings.
  travel: Luna Yap, a pint‑size explorer, loves weekend drives to the Sandia Mountains, dreams of seeing the sunrise over the Grand Canyon, enjoys family trips to the Albuquerque International Balloon Fiesta,
    and they, guided by parents, prefer short car rides over long flights due to their limited stamina.
  culinary: Luna Yap, a budding chef, favors blue corn pancakes with honey, loves sweet roasted squash and cheese quesadillas, can assemble simple peanut‑butter‑jelly sandwiches independently, and they
    enjoy tasting fresh berries and the occasional taco with ground beef and mild chilies.
  core: Luna Yap balances playful curiosity with a grounded respect for nature, often juggling block towers while humming The Wiggles, and they occasionally forget to ask before grabbing glitter crayons.
background:
  cultural: 'Luna is raised in a family of Navajo (American Indian) heritage in Thoreau, New Mexico, a community within the Navajo Nation. Her upbringing blends contemporary American life with Navajo cultural
    practices: she learns basic Navajo words at home, participates in seasonal ceremonies and community gatherings, and is exposed to traditional storytelling, beading, and music. These cultural experiences
    inform her daily routines, values of respect for nature, and appreciation for communal bonds, while also coexisting with the broader educational and social environment of her town.'
attributes:
  skills: '[''stacking blocks'', ''drawing with crayons'', ''basic sentence formation'', ''following two‑step instructions'', ''simple puzzle solving'', ''basic counting to five'', ''parallel play'', ''assertive
