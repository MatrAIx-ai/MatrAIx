  hobbies: '[''outdoor desert exploration'', ''rock collecting'', ''water play'', ''drawing with crayons'', ''building block towers'', ''listening to traditional stories and songs'', ''pretend play with
    dolls'', ''singing lullabies'', ''quiet picture‑book reading'']'
  career_goals: When asked about the future, Luna enthusiastically mentions wanting to be a teacher because she loves sharing stories, a doctor because she wants to help people feel better, and an artist
    because she enjoys drawing and coloring. She also imagines herself performing in a traditional dance with her family, showing a blend of creative curiosity and a practical desire to care for others.
