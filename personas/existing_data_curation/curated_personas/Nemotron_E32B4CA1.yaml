  career_goals: Debora aims to obtain her GED within the next year and then pursue a certification as a community health worker or medical assistant, allowing her to work in a local clinic where she can
    help others in a calm, supportive setting. She also hopes to expand her craft side-business by selling crocheted and knitted goods on an online marketplace, providing a flexible source of income that
    aligns with her preference for quiet, solitary work. Long-term, she envisions a stable, low-stress role that balances her caregiving nature with opportunities for personal growth and financial independence.
