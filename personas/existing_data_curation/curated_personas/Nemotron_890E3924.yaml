  hobbies: '[''hiking'', ''nature photography'', ''journaling'', ''reading sci‑fi and non‑fiction'', ''DIY woodworking'', ''listening to entrepreneurship and logistics podcasts'', ''board‑game nights with
    close friends'', ''competitive online gaming'']'
  career_goals: Audrey aims to advance from material mover to a supervisory position within the next two years, securing a shift‑supervisor role and earning a Certified Supply Chain Professional (CSCP)
    credential. She aspires to become a logistics coordinator or warehouse manager, leading a small team and implementing lean practices to boost productivity. Long‑term, she envisions launching her own
    independent freight‑handling business. Her competitive nature drives her to exceed performance metrics, while she plans to strengthen her organization and deadline‑management skills through targeted
    training.
