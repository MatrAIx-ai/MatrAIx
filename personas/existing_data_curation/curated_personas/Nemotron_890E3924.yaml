personas:
  professional: Audrey Eldeib, a 20-year-old material mover at a Saint Cloud warehouse, combines forklift certification and hands-on inventory tracking with a curiosity-driven knack for spotting bottlenecks,
    pushing for lean practices while ambitiously eyeing a shift-supervisor role and the CSCP credential within two years.
  sports: Audrey Eldeib, a dedicated hiker of Sibley State Park’s prairie trails, follows the Minnesota Twins and Vikings, volunteers at a weekend functional-fitness bootcamp, and joins a local recreational
    ultimate frisbee league when time permits, but often postpones scheduled cardio for spontaneous woodworking projects.
  arts: Audrey Eldeib, who channels a love of the outdoors into prairie photography, curates playlists featuring The Lumineers and Tame Impala while woodworking, reads sci-fi authors like Liu Cixin, and
    attends monthly indie-film screenings at a downtown theater, though they rarely join large cultural events.
  travel: Audrey Eldeib, a solo-road-trip enthusiast, frequently explores Minnesota gems like the Boundary Waters and North Shore, dreams of backpacking through Finland’s forests, and plans budget-friendly
    weekend escapes to Chicago’s lakefront, balancing adventure with a tight travel budget.
  culinary: Audrey Eldeib, who enjoys cooking simple, hearty dishes such as wild-rice casserole and grilled salmon, experiments with locally foraged mushrooms and honey, relies on a sturdy cast-iron skillet
    for DIY meals, yet admits a habit of ordering late-night pizza while gaming.
  core: Audrey Eldeib is a curious, pragmatic 20-year-old who blends solo outdoor adventures, competitive gaming, and hands-on logistics with a restless drive to streamline systems and launch a freight
    business, all while wrestling with occasional disorganization and impulse spending.
background:
  cultural: Audrey grew up in a middle‑class family on the outskirts of Saint Cloud, Minnesota. Her ancestry includes German and Scandinavian roots, common in the region, and she was raised with Midwestern
    values of humility, hard work, and community responsibility. The local culture—characterized by "Minnesota nice," a strong connection to the outdoors, and a practical, no‑nonsense outlook—has shaped
    her blend of curiosity and practicality. Attending a public high school and later some college courses at a nearby community college reinforced a respect for education while fostering an independent,
    self‑reliant mindset.
attributes:
  skills: '[''forklift operation'', ''safe manual handling'', ''inventory tracking'', ''warehouse management software proficiency'', ''basic supply chain knowledge'', ''data entry (Excel)'', ''process analysis'',
