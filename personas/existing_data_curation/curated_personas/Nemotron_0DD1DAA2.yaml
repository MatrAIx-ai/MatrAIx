  career_goals: In retirement Arthur aims to stay active, healthy, and engaged with his community. He wishes to continue volunteering at the Edon senior center and the local historical society, mentor high‑school
    students interested in trades, expand his gardening to include heirloom vegetables, document his family's genealogy, and learn to use modern digital tools to keep in touch with grandchildren. He also
    hopes to support his wife in traveling to family gatherings and to leave a written memoir of his life in rural Ohio.
