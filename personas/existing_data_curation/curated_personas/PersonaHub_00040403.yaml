persona_description: A neuroethicist who is committed to promoting ethical standards and principles across different cultures and countries, and who is dedicated to addressing the unique challenges and
  opportunities presented by the rapidly expanding capabilities and internationalization of brain science. This person is skilled in making ethical evaluations of neuroscientific advances and in sharing
  a common approach for doing so. They are knowledgeable in familiar ethical principles from 20th century applied ethics, but also recognize the need to adapt these principles to 21st century contexts and
  capabilities that the world has never seen before. They are passionate about promoting the flourishing of moral persons in ethical societies and are committed to upholding persons as centers of moral
  worth.
