personas:
  professional: Jared Nolan, a seasoned IT support specialist with two decades of hands‑on experience troubleshooting Windows desktops, maintaining LANs, and crafting detailed SOPs, leverages his love for
    routine and patient, friendly service to streamline technology operations while mentoring junior technicians and dreaming of a senior advisory role that balances predictable hours with community tech
    workshops.
  sports: Jared Nolan, a dedicated member of the Willow Creek Softball Club, spends Saturday mornings in the local adult league while cheering on the Chicago Cubs and the Chicago Bears, enjoys occasional
    fishing trips on Lake Michigan’s shoreline, and balances his moderate fitness routine with a laid‑back attitude that allows occasional missed workouts.
  arts: Jared Nolan, an avid board‑game host, finds creative escape in retro video game consoles like the NES and Atari 2600, and unwinds listening to classic rock legends such as The Rolling Stones and
    Led Zeppelin while occasionally catching a local theater performance of Shakespeare’s ‘A Midsummer Night’s Dream’.
  travel: Jared Nolan prefers low‑key, road‑trip adventures, having spent many weekends fishing on the Upper Peninsula’s Lake Superior and driving to Mackinac Island, while dreaming of a future backpacking
    trek across New Zealand’s South Island to chase world‑class trout streams.
  culinary: Jared Nolan, a hobbyist home‑brewer, delights in crafting a hoppy IPA with Cascade hops and dry‑hopping techniques, pairs his brew with grilled salmon topped with dill and lemon, and enjoys
    a hearty bowl of chili packed with kidney beans, ground beef, and smoked paprika, while still ordering pepperoni pizza for quick comfort meals.
  core: Jared Nolan blends a love for routine‑focused tech support with community‑center mentoring, soft‑ball camaraderie, home‑brewed beer experiments, and nostalgic gaming, all while occasionally letting
    a scattered filing system and a penchant for late‑night snack runs reveal his relaxed, sociable nature.
background:
  cultural: Jared grew up in the Midwestern United States, rooted in a white, predominantly Anglo‑German heritage typical of the Ohio region. He was raised in a close‑knit, suburban community where church
    involvement, family gatherings, and practical work ethic were emphasized. His values reflect traditional Midwestern ideals of reliability, modesty, and community service, and he continues to uphold
    these cultural influences through his family life and local engagement in Maineville, Ohio.
attributes:
  skills: '[''Windows desktop troubleshooting'', ''Network configuration and maintenance'', ''Hardware repair and upgrades'', ''Customer service and tech support'', ''Standard operating procedures documentation'',
    ''Basic PowerShell and batch scripting'', ''Small server administration'', ''User training and onboarding'']'
  hobbies: '[''Softball league'', ''Community tech mentoring'', ''Fishing trips'', ''Retro video game restoration'', ''Board‑game nights'', ''Gardening'', ''Home‑brewing craft beer'']'
  career_goals: Jared aims to transition into a senior IT support or advisory role within a midsized organization where he can leverage his routine‑driven expertise to streamline technology operations.
    He hopes to mentor junior technicians, develop reliable support frameworks, and eventually offer part‑time consulting for local small businesses, allowing him to maintain a predictable schedule while
    staying engaged with his community. Retirement is on his horizon, but he envisions a phased shift toward community tech workshops and volunteer IT assistance.
