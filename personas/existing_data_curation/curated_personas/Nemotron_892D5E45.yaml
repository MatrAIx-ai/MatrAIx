  hobbies: '[''Visiting local art galleries'', ''Painting (acrylic)'', ''Photography'', ''Community theater participation'', ''Book club attendance'', ''Attending high school football games'', ''Cooking
    Southern cuisine'', ''Gardening'', ''Volunteer work at the town library'', ''Playing board games with friends'', ''Listening to blues and gospel music'']'
  career_goals: While Susan values flexibility and a relaxed pace, she aspires to advance from receptionist to an administrative supervisory role within the next five years. She plans to enroll in a community
    college program for office administration and earn a certification in office management, which will equip her with stronger organizational and leadership skills. Susan hopes to take on responsibilities
    for event planning and community outreach, ideally in a local arts council or cultural center where she can blend her strong customer‑service background with her passion for art and new ideas. Ultimately,
    she envisions a career that allows her to support local creative initiatives while maintaining a balance that accommodates her family life.
