  career_goals: Mary dreams of turning her love for art and storytelling into a future career as a graphic novelist or illustrator, creating books that blend vivid drawings with imaginative narratives.
    She also shows interest in environmental science, hoping one day to contribute to protecting the natural landscapes of her Virginia hometown. In the short term, she aims to lead her school's art club,
    launch a community garden project with friends, and deepen her coding skills to design interactive educational games.
