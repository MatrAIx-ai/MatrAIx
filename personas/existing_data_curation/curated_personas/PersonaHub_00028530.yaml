persona_description: A sociologist who specializes in the study of rock and roll music, particularly the era of the early 1960s. His research focuses on issues of race, gender, and social class in the grassroots
  rock movement of the time. He is interested in exploring the impact of rock and roll on young men's lives, including their career trajectories and the formation of bands. He is also interested in the
  racial and gender dynamics within the rock music scene of the time and the role of parents in limiting girls' participation in the scene. He is a professor at the University of Pennsylvania and has written
  several works on the career trajectories of TV writers.
