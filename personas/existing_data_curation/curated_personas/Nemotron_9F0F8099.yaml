personas:
  professional: Brent Edwards, a 49‑year‑old surveillance officer at the Vicksburg casino, leverages his STEM background, data‑analysis expertise and hands‑on experience with CCTV and video‑analytics to
    spot cheating patterns while balancing a love for improvisation with a strong drive to integrate AI‑driven cheat detection and eventually lead a security team.
  sports: Brent Edwards fuels his competitive streak by playing forward for the Vicksburg River Runners basketball league each spring, cheering on the New Orleans Saints and Mississippi State Bulldogs during
    football and college seasons, casting lines for largemouth bass on the Mississippi in summer, and hunting whitetail deer in fall, while keeping a modest routine of morning jogs and weekend drone‑guided
    trail runs.
  arts: Brent Edwards, a blues‑and‑rock aficionado, spends his spare evenings at the W.C. Handy Blues Festival listening to B.B. King tributes, collects vintage concert posters of The Allman Brothers, and
    channels his own creativity by building custom drone rigs that capture aerial footage set to live performances by Muddy Waters and Stevie Ray Vaughan.
  travel: Brent Edwards prefers spontaneous road trips that blend fishing on the Mississippi with visits to family‑run barbecue joints in Missouri, has already explored New Orleans' French Quarter and the
    Ozarks, and dreams of an Alaska charter to film salmon runs with his drones while also planning a cultural pilgrimage to Amsterdam's canal district for advanced aerial photography.
  culinary: Brent Edwards, an intermediate‑to‑advanced grillmaster, perfects smoked hickory brisket, mop‑basted pork ribs, and Cajun‑spiced catfish using rubs of brown sugar, paprika, and cayenne, while
    also experimenting with craft beer pairings and occasionally ordering sushi after late‑night poker sessions.
  core: Brent Edwards is a competitive, socially‑driven security pro who balances analytical precision with a laid‑back love for hunting, barbecue, and weekend poker, even if his scattered paperwork sometimes
    betrays his desire for order.
background:
  cultural: Brent grew up in a working‑class family in Vicksburg, Mississippi, where Southern hospitality, community loyalty, and a strong sense of place along the Mississippi River are central. His parents
    emphasized practical education, leading him to pursue a STEM degree at the University of Mississippi. The local economy’s shift toward casino tourism has shaped his worldview; he balances traditional
    Southern values—faith, family, and modesty—with the modern, fast‑paced atmosphere of the gambling industry. He retains a love for regional foods, enjoys Mississippi football culture, and participates
    in community events that celebrate the city’s Civil War history and river heritage.
attributes:
  skills: '["CCTV operation and monitoring", "Video‑analytics pattern recognition", "Risk assessment and threat mitigation", "Knowledge of Mississippi gaming regulations", "Physical security and emergency
    response", "Data analysis using R and Python", "Conflict resolution and de‑escalation", "First‑aid and CPR certification", "Basic electronics troubleshooting", "Shift coordination and team briefing"]'
  hobbies: '["Playing poker and card games", "Weekend basketball league", "Hunting and fishing trips", "Barbecue cooking and recipe experimentation", "Live music festivals and local concerts", "DIY drone
    and camera modifications", "Trivia nights at local bars", "Volunteer neighborhood watch", "Tracking sports statistics and fantasy leagues", "Home improvement projects"]'
  career_goals: Brent aims to move from his current surveillance officer role into a supervisory position, eventually becoming a Security Manager for the Vicksburg casino complex. He wants to spearhead
    the integration of AI‑driven analytics into the surveillance workflow, improving cheat detection and reducing false alarms. Over the next five years, he plans to earn the Certified Protection Professional
    (CPP) credential and to design a training program for junior guards that blends strict procedural standards with the flexibility he values. Long‑term, he envisions starting his own consulting firm that
    advises regional casinos on security technology and regulatory compliance.
