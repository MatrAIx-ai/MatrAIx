  hobbies: '[''Gardening (vegetable and flower beds)'', ''Quilting and organizing quilting circles'', ''Genealogy research'', ''Reading historical and local history books'', ''Volunteering at church food
    pantry'', ''Walking the Piedmont trail'', ''Crossword and Sudoku puzzles'', ''Listening to bluegrass and country music'']'
  career_goals: As she approaches retirement, Karen’s primary ambition is to ensure a smooth generational handoff of her production floor knowledge. She aims to earn an OSHA trainer certification within
    the next year, mentor at least two junior supervisors, and introduce a small‑scale waste‑reduction program that cuts material scrap by 10% in her plant. Post‑retirement, she hopes to work as a part‑time
    safety consultant for local manufacturers and to volunteer her organizational skills at the community senior center.
