personas:
  professional: Stephanie John, a senior full‑stack developer with a sharp eye for UI/UX, leverages their business analysis background to craft technically elegant micro‑service platforms that fuse art
    and technology, while their skeptical, competitive nature drives meticulous code reviews and their love for solitary, late‑night side projects fuels innovative prototypes.
  sports: Stephanie John, an avid sunrise beach runner who logs morning miles along Cocoa Beach and participates in the local Space Coast Running Club, also follows the Miami Dolphins for football and the
    Orlando Magic for basketball, preferring solo cardio workouts that boost resilience while staying connected to the rhythm of the Atlantic tide.
  arts: Stephanie John, a digital painter inspired by Afro‑futurist aesthetics, frequents the Cocoa Art Center and the Merrick Space Coast Art Museum, where they draw creative spark from the works of Sun Ra,
    Janelle Monáe, and contemporary illustrator Lisa Congdon, while using Figma and Adobe Illustrator to translate artistic intuition into sleek UI concepts.
  travel: Stephanie John prefers solitary, low‑key trips that blend artistic immersion and tech curiosity, having explored Reykjavik’s design museums, the street art alleys of Lisbon, and a quiet creative
    residency in Marrakech, while dreaming of a sunrise‑lit hike along the Atlantic coast of Ireland where they can sketch the horizon.
  culinary: Stephanie John, a self‑taught home chef, loves experimenting with Southern comfort staples like shrimp and grits, infusing them with tropical twists such as mango‑chili glaze, plantain‑scented
    collard greens, and jerk‑spiced fried chicken, showcasing intermediate cooking skills that balance bold flavors with nostalgic roots.
  core: Stephanie John channels a restless curiosity and artistic flair into tech innovation, balancing competitive code mastery with solo sunrise runs, experimental cooking, and a habit of impulsively
    splurging on creative gadgets while occasionally letting organization slip.
background:
  cultural: Stephanie grew up in a close‑knit Black community on the South‑East coast of Florida, where church gatherings, soul music, and family storytelling were cornerstones of daily life. Her parents,
    who worked in the service industry, emphasized self‑reliance and the importance of education, motivating her to earn a business degree before pivoting to software development. She identifies strongly
    with Afro‑American artistic traditions—from jazz and hip‑hop to contemporary visual art—and often incorporates those influences into her creative tech projects. While she values her cultural roots,
    she also embraces the diverse, multicultural fabric of the Space Coast, navigating both her identity as a Black woman in tech and her desire for personal autonomy.
attributes:
  skills: '[''JavaScript (React, Node.js, TypeScript)'', ''Python'', ''SQL'', ''AWS (EC2, Lambda, RDS)'', ''Micro‑services architecture'', ''UI/UX design (Figma, Adobe XD, Illustrator)'', ''Business analysis
    & product strategy'', ''Data‑driven ROI assessment'', ''Test‑driven development'', ''Critical code review'', ''Rapid prototyping'', ''Independent problem solving'']'
  hobbies: '[''Digital painting'', ''Afro‑futurist illustration'', ''Visiting local art galleries'', ''Attending tech‑culture talks'', ''Listening to podcasts on emerging tech'', ''Reading speculative‑fiction'',
    ''Side‑project coding'', ''Raspberry Pi creative builds'', ''Photography (coastal sunsets)'', ''Cooking fusion recipes (Southern & Caribbean)'', ''Beach running'', ''Yoga'']'
  career_goals: Stephanie aims to transition from senior developer to lead architect, shaping the technical vision of a product suite that fuses art and technology—such as an AI‑driven platform for digital
    artists. She aspires to launch her own boutique consultancy that helps black‑owned startups leverage technology for market growth, granting her the flexibility she values. Mentoring is also a priority;
    she wants to create mentorship circles for aspiring Black women in tech and speak at small, intimate tech‑culture events. Ultimately she seeks a role where she can balance competitive achievement, creative
    exploration, and a lifestyle that preserves ample solo time and personal autonomy.
