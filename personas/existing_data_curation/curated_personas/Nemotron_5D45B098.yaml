  career_goals: As she approaches retirement age, Maria aims to transition from full-time floor work to a mentorship and community liaison role within her store. She hopes to train younger associates, especially
    those who share her bilingual background, and to develop a senior-friendly shopping initiative that includes enrollment assistance, in-store wellness workshops, and personalized product recommendations.
    She also envisions collaborating with the local senior center to host monthly cultural events that showcase Mexican cuisine and crafts, thereby strengthening the store’s ties to the community. In the
    longer term, Maria would like to open a modest home-based catering venture specializing in traditional Mexican pastries, offering them at farmer’s markets and store events. Her ambitions balance her
    practical desire for steady income with her curiosity about entrepreneurship and community building.
