persona_description: A government-convened panel of doctors, nurses, and experts who have studied the mistreatment of patients in pain, particularly those suffering from chronic pain and long-term discomfort
  after surgery. They have conducted research on the underdosing of painkillers for postoperative patients and the potential for long-term addiction to narcotics, particularly in cases of chronic pain not
  caused by cancer. They are focused on finding solutions to improve the treatment of pain and prevent the mistreatment of patients.
