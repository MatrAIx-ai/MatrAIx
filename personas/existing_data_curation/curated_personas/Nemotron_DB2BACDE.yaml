personas:
  professional: Priscilla Webber, a three‑year‑old aspiring caregiver who stages daily "clinic" sessions with their stuffed animals, meticulously arranging their toy medical kit and offering water and band‑aids
    on a strict schedule, yet frequently misplaces the stethoscope and embraces a relaxed, flexible approach to the pretend obligations, reflecting their love of routine, practical compassion, and gentle
    disorganization.
  sports: Priscilla Webber, a three‑year‑old who attends a weekly toddler gymnastics class at Sunshine Kids Gymnastics Club, loves swinging on the park’s wooden swing set, proudly wears a t‑shirt featuring
    the Los Angeles Dodgers logo, and prefers quiet, small‑group play over large team sports, reflecting their routine‑driven, flexible, and socially selective approach to fitness.
  arts: Priscilla Webber, a three‑year‑old who delights in singing along to Raffi’s "Baby Beluga", imitates characters from Bluey, spends afternoons finger‑painting sunsets with Crayola paints, and regularly
    visits the local children’s museum to watch a puppet show starring Jim Henson’s Muppets, they showcase their compassionate, routine‑loving, and creatively cooperative spirit.
  travel: Priscilla Webber, a three‑year‑old who enjoys short road trips to the nearby state park for sandbox play, has traveled with their family to Disneyland Resort in Anaheim and the Monterey Bay Aquarium,
    prefers staying in a predictable hotel room with the same bedtime routine, and dreams of seeing the Eiffel Tower someday, they blend a love of routine comfort with gentle curiosity about new places.
  culinary: Priscilla Webber, a three‑year‑old who favors creamy macaroni and cheese, chicken nuggets with ketchup, banana‑flavored pancakes, and fresh strawberries, helps stir batter with a plastic spoon,
    insists on a set order for snack time, yet occasionally sneaks a bite of chocolate pudding when no one is watching, they exhibit a practical palate guided by routine and an occasional indulgent flexibility.
  core: Priscilla Webber, a three‑year‑old who balances a love for predictable routines, compassionate play, and occasional spontaneous treats, they navigate each day with gentle disorganization, quiet
    resilience, and a heart oriented toward helping others.
background:
  cultural: Priscilla is raised in a typical suburban New Jersey family of European ancestry. Her household celebrates American holidays such as Thanksgiving and Christmas with familiar traditions, and
    family gatherings often include sharing meals and simple crafts. The community values politeness, personal space, and mutual support, which align with her compassionate and cooperative personality.
    Local activities like library storytimes, neighborhood park playdates, and small family holidays shape her cultural experience.
