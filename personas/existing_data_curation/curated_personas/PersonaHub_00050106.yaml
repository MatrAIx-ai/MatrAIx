persona_description: A historian with a specialization in the history of the New River Gorge National River, particularly focusing on the town and mine located on the south side of the gorge. This historian
  has conducted extensive research using primary and secondary sources, including field trips to historical sites, libraries, and archives. They are interested in the history of the town, the significance
  of the New River coal mining industry, and the mining history, including topics such as ethnicity of miners, mine safety, and unionization issues. The historian is passionate about the preservation and
  management of the site, and their work is likely to be published and shared with the public.
