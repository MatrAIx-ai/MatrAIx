  hobbies: '["Softball (co-ed league)", "Line dancing / swing dancing classes", "Karaoke nights", "Hiking in Columbia River Gorge", "Cooking and experimenting with recipes", "Backyard gardening", "Community
    festival participation", "Volunteering at local food bank"]'
  career_goals: Linda aims to advance within the production environment by becoming a shift lead within the next two years. She plans to earn additional certifications such as CNC machine operation and
    a Six Sigma Yellow Belt, and eventually move into a production supervisor role. To support these goals, she intends to complete her GED and enroll in part‑time community college courses in industrial
    technology. Long‑term, she seeks a stable, higher‑earning position that allows her to support her family while leveraging her collaborative nature, possibly transitioning into a safety officer or continuous‑improvement
    specialist role.
