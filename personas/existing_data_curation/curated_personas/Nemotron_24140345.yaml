personas:
  professional: Linda Bullock balances a love for structure with spontaneous problem‑solving on the factory floor, where they operate forklifts, perform safety inspections, and mentor new hires, leveraging
    their practical machine‑operation skills and assertive teamwork to drive lean‑manufacturing initiatives toward a shift‑lead role.
  sports: Linda Bullock swings a bat for the co‑ed Pioneer Softball League, hits the line‑dance floor twice weekly, hikes the Columbia River Gorge on weekends, and roots for the Seattle Seahawks and Portland
    Trail Blazers, treating fitness as a social ritual rather than a solitary regimen.
  arts: Linda Bullock enjoys belting out karaoke classics by Queen and Ariana Grande, swaying to the swing sounds of Benny Goodman during dance nights, and frequently attending Seattle Repertory Theatre
    productions, letting music and performance shape their vibrant social life.
  travel: Linda Bullock prefers spontaneous road trips to nearby gems like the San Juan Islands and Vancouver while also planning an annual hiking adventure in Yellowstone, balancing limited vacation days
    with a desire for both adventure and relaxed coastal getaways.
  culinary: Linda Bullock experiments with Pacific‑Northwest flavors, mastering a dill‑salmon miso glaze, whipping up spicy kimchi fried rice, and growing heirloom tomatoes in their backyard garden, while
    their cooking skill hovers between enthusiastic home‑chef and occasional over‑salted dish.
  core: Linda Bullock is a structured‑yet‑spontaneous factory floor leader who can’t resist a good karaoke showdown after a shift, but often forgets to file receipts, balancing meticulous work logs with
    a playful, community‑focused spirit.
background:
  cultural: Linda identifies as a white American with deep roots in the Pacific Northwest working‑class culture. Raised in a modest family in the Vancouver area, she was taught the values of hard work,
    practicality, and community involvement. Her upbringing includes typical American traditions such as Thanksgiving, Christmas, and Fourth of July celebrations, alongside regional customs like attending
    farmers’ markets, outdoor recreation, and neighborhood block parties. She values self‑reliance and collective support, which shape both her work ethic and her social activities.
attributes:
  skills: '["Industrial machinery operation", "Forklift certification", "Basic equipment maintenance", "OSHA safety compliance", "Quality inspection and control", "Inventory management with barcode systems",
