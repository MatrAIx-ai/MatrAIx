personas:
  professional: Angela Taylor, a 20‑year‑old aspiring IT support specialist, leverages her methodical hardware troubleshooting, meticulous documentation, and love for routine to excel in entry‑level computer
    support while quietly mentoring new hires.
  sports: Angela Taylor enjoys low‑impact cardio like weekend jogs along the Embarcadero, plays occasional intramural soccer with the Bay Area Tech Club, follows the Golden State Warriors, San Francisco
    49ers, and San Jose Sharks, and attends a community‑center yoga class three times a week to maintain flexibility and routine.
  arts: Angela Taylor finds solace in the atmospheric piano compositions of Ludovico Einaudi, the introspective lyrics of Joni Mitchell, the witty short‑story collections by Roald Dahl, and the clever wordplay
    of puzzle editor Will Shortz, occasionally sketching circuit diagrams as a quiet artistic outlet.
  travel: Angela Taylor prefers meticulously planned road trips, having mapped weekend getaways to Yosemite National Park, Monterey Bay, and Seattle's tech district, while dreaming of a future organized
    trip to Tokyo for a technology expo, balancing her love for nature with a predictable itinerary.
  culinary: Angela Taylor enjoys cooking simple, herb‑focused meals like rosemary‑roasted potatoes, basil pesto pasta, and avocado toast, favoring fresh basil, oregano, and cilantro, reliably meal‑preps
    on Sundays, and occasionally indulges in a spicy tuna sushi roll from her favorite local spot.
  core: Angela Taylor is a routine‑driven tech enthusiast who finds comfort in orderly problem‑solving, quiet companionship, and meticulously planned life details, even if that means occasional over‑cataloguing
    of her PC builds.
background:
  cultural: Angela comes from a middle‑class, white American family that moved to the Bay Area during her early childhood. Her upbringing emphasized practicality, hard work, and community involvement. Celebrations
    such as Thanksgiving, Fourth of July, and traditional holiday gatherings are central to her family life, often featuring home‑cooked meals and close‑knit family interactions. Growing up in San Leandro,
    she has been exposed to a diverse community while maintaining the cultural values of her own heritage, which include a strong sense of responsibility, modesty, and a preference for stable, familiar
    routines.
attributes:
  skills: '["Computer hardware troubleshooting", "OS installation and maintenance (Windows, macOS)", "Basic networking (router configuration, LAN cabling)", "Microsoft Office Suite proficiency", "Google
    Workspace proficiency", "Systematic documentation and SOP creation", "Inventory tracking and asset management", "Data entry accuracy", "Quality assurance testing", "Introductory Python scripting", "HTML/CSS
    web basics"]'
  hobbies: '["Desktop PC building and upgrading", "Sudoku and crossword puzzles", "Reading technical manuals and short‑story anthologies", "Indoor gardening (succulents and herbs)", "Volunteering to teach
    seniors basic computer skills"]'
  career_goals: Angela aims to obtain her high school equivalency (GED) within the next year and then pursue an associate degree in Information Technology at a community college in the Bay Area. She plans
    to earn industry certifications such as CompTIA A+ and Network+, which will solidify her technical credentials. Her short‑term goal is to advance from her current entry‑level computer support role to
    a certified IT support specialist, handling more complex troubleshooting and providing training to new hires. Long‑term, she aspires to become a system administrator for a mid‑size company, overseeing
    server maintenance, network security, and ensuring smooth daily operations, all while maintaining a stable, predictable work environment that aligns with her preference for routine.
