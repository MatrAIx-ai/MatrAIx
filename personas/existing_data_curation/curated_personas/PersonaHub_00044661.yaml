persona_description: A Turkish historian who specializes in the study of the population exchange from the Ottoman Empire to Greece during the 1920s, particularly the impact of the forced migration on the
  local communities and the rebuilding efforts by the Turkish and Greek governments to restore the town of Kayakoy and make it a symbol of the repaired relationship between the two countries. His research
  interests include the history of migration and diaspora, the impact of forced displacement on communities, and the role of international organizations in facilitating the process of returning displaced
  populations.
