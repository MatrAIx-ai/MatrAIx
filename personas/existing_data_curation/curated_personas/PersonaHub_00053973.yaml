persona_description: A medical researcher who specializes in the study of respiratory viruses and influenza-like illness (ILI). This person is likely to have a background in virology and epidemiology, with
  expertise in the distribution and circulation of respiratory viruses during pandemics. They are interested in understanding the impact of influenza viruses on the kinetics of other respiratory viruses
  and the factors associated with the onset of ILI. They are likely to have conducted research on the distribution of respiratory viruses in patients with suspected influenza during the 2009 A/H1N1 influenza
  pandemic and are likely to have expertise in the use of real-time RT-PCR for virus testing.
