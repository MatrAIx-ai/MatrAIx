persona_description: A researcher in the field of colorectal surgery and anastomotic healing, who is currently conducting research to investigate the biological processes that lead to anastomotic leakage
  and develop interventions to prevent it. They are interested in the pathophysiology of anastomotic leakage, the role of intestinal healing in comparison to healing of the skin, the influence of bacteria
  on anastomotic leakage, and the use of surrogate markers in the study of anastomotic healing. They are dedicated to reducing the clinical burden of anastomotic leakage in colorectal surgery and improving
  the quality of life of patients with intestinal diseases.
