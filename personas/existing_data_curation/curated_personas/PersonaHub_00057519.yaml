persona_description: A sociology professor who studies the life course and its impact on weight gain in adults. She focuses on the role of parenthood and its effects on weight gain in both men and women,
  particularly on the biological effects of pregnancy and the daily constraints and responsibilities of parenting. Her research interests include the development of a life course model that incorporates
  the effects of parenthood on weight gain and the importance of maintaining a healthy weight before and after having children.
