  career_goals: At 92, Mariyah's primary ambition is to preserve and share the wealth of knowledge she has gathered from both her trade and her lifelong love of art. She aims to establish a small community
    workshop at the Pompano Beach senior center where she can teach painting techniques, color theory, and art history to seniors and aspiring young artists, fostering intergenerational exchange. She also
    envisions curating a modest retrospective of her own watercolor and oil paintings, accompanied by oral histories that document the experiences of African‑American workers in South Florida's construction
    trades during the civil‑rights era. Ultimately, she hopes her legacy will bridge skilled craftsmanship with artistic expression, inspiring future generations to approach work with curiosity, rigor,
    and creative openness.
