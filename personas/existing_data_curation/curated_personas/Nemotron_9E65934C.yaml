personas:
  professional: Mariyah Lane, a seasoned master painter with five decades of experience in interior and exterior finishes, combines meticulous surface preparation, advanced brushwork, and a competitive
    drive for flawless results while mentoring younger painters and planning a community workshop that fuses trade expertise with fine‑art theory.
  sports: Mariyah Lane enjoys low‑impact fitness through daily beachfront walks with the Sunrise Seniors Walking Club, participates in weekly tai chi classes, and faithfully follows the Miami Dolphins in
    football season and the Miami Heat in basketball season, cheering them from her porch while keeping her activity level gentle and consistent.
  arts: Mariyah Lane immerses herself in the works of Jacob Lawrence, Romare Bearden, and Faith Ringgold, listens to Duke Ellington, Ella Fitzgerald, and John Coltrane while painting, and curates a personal
    collection of watercolor studies that reflect the vivid coastal flora and the legacy of folk art she admires.
  travel: Mariyah Lane prefers intimate, well‑planned trips, having explored New Orleans for its jazz heritage, Savannah’s historic squares, and Paris’s art museums, while her current travel wish list includes
    a pilgrimage to Accra, Ghana, and a leisurely road‑trip along Florida’s Gulf Coast.
  culinary: Mariyah Lane, an adept home chef, delights in preparing shrimp gumbo, collard greens, and sweet‑potato pie seasoned with fresh basil, thyme, and cayenne harvested from her garden, and she enjoys
    sharing these soul‑food dishes with neighbors during Juneteenth gatherings.
  core: Mariyah Lane, a 92‑year‑old artistic tradeswoman, blends disciplined craftsmanship with boundless curiosity, relishes solitary painting, mentors eager apprentices, and balances frugal stewardship
    with occasional indulgences in fine art supplies.
background:
  cultural: Mariyah is an African‑American who grew up in the post‑World War II South and moved with her family to Florida during the Great Migration of the 1950s. Her formative years were shaped by the
    church, community gatherings, and the civil‑rights movement of the 1960s, fostering a strong sense of resilience, cultural pride, and a skeptical awareness of societal structures. In Pompano Beach,
    she has remained an active member of the local Black community, celebrating traditions such as Juneteenth, soul‑food cuisine, and gospel music, while also contributing to neighborhood beautification
    projects. Her artistic sensibility reflects the legacy of Black folk art, the vibrant palette of Florida’s coastal environment, and the interplay between skilled trade craftsmanship and cultural expression.
