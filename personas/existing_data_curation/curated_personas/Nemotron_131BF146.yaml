  career_goals: Helen aims to transition into a senior leadership role that blends her managerial expertise with community impact. Over the next five years, she hopes to become a Director of Operations
    for a regional nonprofit, where she can design efficient processes and mentor emerging female professionals. She also aspires to spearhead corporate social responsibility initiatives that align with
    her values of harmony and cooperation. As she approaches retirement, Helen envisions a part‑time consultancy role that allows her to share her seasoned insights while maintaining a balanced schedule
    that supports her emotional well‑being.
