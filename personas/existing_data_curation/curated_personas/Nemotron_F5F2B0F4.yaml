personas:
  professional: Janet Whitaker, a future community arts facilitator, is a 1‑year‑old whose boundless curiosity and love for vibrant public murals already hint at a career centered on inclusive cultural
    programming, where they will use their natural sociability and flexible, improvisational approach to bring people together.
  sports: Janet Whitaker, a pint‑sized explorer, loves toddling around the neighborhood park’s splash pad and attending a parent‑child swimming class, while cheering on the Minnesota Vikings and the Minnesota
    Twins from the living room on game days.
  arts: Janet Whitaker, an enthusiastic little observer of the arts, delights in watching the bright street murals during family walks and is entranced by the whimsical melodies of Disney’s ‘Frozen’ soundtrack
    and the gentle lullabies of infant‑focused musician Laurie Berkner.
  travel: Janet Whitaker, a curious toddler, enjoys short family road trips to the nearby Mall of America’s indoor aquarium and the annual Minnesota State Fair, and looks forward to a future family vacation
    to the Grand Canyon where they can experience wide open skies and gentle hikes.
  culinary: Janet Whitaker, a budding foodie, favors soft mashed sweet potatoes, warm apple puree, and occasional cheddar cheese cubes, while their parents gently introduce them to fresh strawberries, locally
    sourced honey, and bland quinoa mushes to broaden their palate.
  core: Janet Whitaker is a 1‑year‑old whirl of curiosity, sociability, and artistic wonder, whose playful disorganization and love for community traditions already seed a future focused on bringing people
    together.
background:
  cultural: Janet is raised in a white Midwestern family in Minneapolis, a city known for its cultural diversity and strong community spirit. Her upbringing includes typical Midwestern values such as politeness,
    cooperation, and respect for others. She participates in local traditions like attending the Minnesota State Fair, celebrating holidays such as Thanksgiving and Christmas with family, and experiencing
    the city’s public art installations and multicultural festivals, which nurture her appreciation for varied experiences and artistic expression.
