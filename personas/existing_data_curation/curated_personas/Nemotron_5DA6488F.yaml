personas:
  professional: Eric Hadley, a seasoned transportation service attendant in the Lehigh Valley, leverages two decades of route expertise, DOT safety compliance, and calm de‑escalation skills to ensure smooth
    passenger experiences, while they blend a love of structure with a flexible mindset to pursue a supervisory role and envision a community shuttle for seniors.
  sports: Eric Hadley competes in a local Allentown basketball league, follows the Philadelphia 76ers and Eagles with fervor, supports the Lehigh Valley IronPigs during baseball season, and maintains fitness
    through weekend hikes on the Lehigh River Trail and occasional fishing trips to Blue Mountain Lake.
  arts: Eric Hadley immerses themselves in classic R&B and soul, regularly spinning Marvin Gaye, Aretha Franklin, and Stevie Wonder while working on DIY projects, and they occasionally catch live blues
    acts at Allentown’s Civic Theatre to fuel their appreciation for musical storytelling.
  travel: Eric Hadley prefers low‑key road trips with flexible itineraries, having road‑tripped to Asheville for mountain hikes and to New Orleans for jazz and gumbo, while they dream of a future family
    cruise to the Caribbean once financial stability allows.
  culinary: Eric Hadley enjoys cooking Southern comfort foods like fried chicken, collard greens, and shrimp‑and‑grits with a miso glaze, experimenting with smoked paprika, buttermilk, and fresh thyme,
    while they often experiment with fusion twists during weekend meals.
  core: Eric Hadley blends calm, practical leadership with a spontaneous DIY streak, a sweet‑tooth for sugary tea, and a habit of procrastinating paperwork, all while they champion community service and
    southern‑style cooking.
background:
  cultural: Eric is an African American who grew up in the Lehigh Valley, a region with a rich history of Black migration from the Great Migration era. His family maintains ties to the local Black church,
    which provides a strong sense of community and cultural continuity. He values the traditions of soul food, gospel music, and storytelling that have been passed down through generations. Eric’s cultural
    identity is reflected in his commitment to mentorship and community service, as well as his appreciation for the rhythm and resilience embedded in African American heritage. He stays connected with
    extended family and friends through church gatherings and community events that celebrate Black culture in Allentown.
attributes:
  skills: '["Customer service", "Passenger safety protocols", "Baggage handling", "Route planning and scheduling", "Transportation regulations compliance", "Vehicle inspection and basic mechanical troubleshooting",
