  hobbies: '["Listening to classic R&B and soul music", "DIY home improvement projects", "Fishing", "Hiking on the Lehigh River Trail", "Community basketball league", "Mentoring at‑risk youth", "Cooking
    Southern and fusion cuisine"]'
  career_goals: Eric aims to advance into a supervisory role within the transportation department, targeting a position such as Shift Lead or Operations Supervisor where he can leverage his practical expertise
    and calm leadership style. He plans to obtain a Commercial Driver’s License (CDL) and complete a DOT safety certification to broaden his qualifications. Over the next five years, he envisions leading
    a small team, improving service efficiency, and possibly launching a community‑focused shuttle service that offers flexible, reliable transport for seniors and underserved neighborhoods in Allentown.
    Financial stability and the ability to support his separated family are central motivations.
