personas:
  professional: Stephanie Snider, a veteran diagnostic imaging technologist with over thirty years of experience in X‑ray, CT, and MRI, blends meticulous radiation‑dose optimization and equipment troubleshooting
    with a relaxed, flexible mentorship style, using their sociable demeanor to train junior staff while staying curious about AI‑assisted image analysis.
  sports: Stephanie Snider, an avid walker who joins the Wildwood Senior Walking Club and enjoys cheering for the Orlando Magic and Tampa Bay Buccaneers, they stay active through daily nature‑preserve strolls
    and occasional line‑dancing cardio classes, favoring low‑impact fitness over competitive sports while maintaining a sociable, energetic spirit.
  arts: Stephanie Snider, an enthusiastic member of her church choir who delights in singing Southern gospel and classic country hits by Dolly Parton, Patsy Cline, and Johnny Cash, they also enjoy attending
    local theater productions and listening to jazz pianist Dave Brubeck on weekend evenings, weaving music and performance into their community‑centered life.
  travel: Stephanie Snider, who prefers relaxed road trips to historic Southern towns like Savannah and Asheville and occasional Caribbean cruises, they plan their journeys around family gatherings and
    senior discounts, selecting destinations that feature lively local festivals and easy access to nature, reflecting their love of both adventure and comfortable pacing.
  culinary: Stephanie Snider, a confident home cook who whips up Southern comfort dishes such as shrimp and grits, collard greens with smoked turkey, and peach cobbler, they often incorporate fresh garden
    herbs like basil and thyme and experiment with a dash of Cajun spice for a modern twist, sharing their creations at potluck gatherings with friends and family.
  core: Stephanie Snider blends three decades of imaging expertise with a garden‑loving, community‑centric lifestyle, they juggle mentorship ambitions, spontaneous festival splurges, and a love for Southern
    cuisine while navigating mild arthritis with a relaxed, sociable spirit.
background:
  cultural: Stephanie's cultural background reflects the values of a mid-20th-century white American upbringing combined with the relaxed, community-focused lifestyle of a Florida retirees' enclave. Raised
    in a small Midwestern town, she grew up with strong family ties, church involvement, and a practical work ethic. After moving to Wildwood, she embraced the warm, sociable culture of Sumter County, where
    neighborly support, volunteerism, and intergenerational connections are celebrated. Her heritage emphasizes respect for tradition while staying open to new ideas—mirroring her curiosity about advances
    in medical imaging and her pragmatic approach to life. These cultural influences shape her collaborative nature, kindness, and steady emotional composure.
attributes:
  skills: '["Patient Positioning for Radiography", "Operation of Digital X-ray, CT, and MRI Equipment", "Radiation Dose Optimization", "Quality Control and Equipment Maintenance", "Technical Troubleshooting",
    "Electronic Health Record Documentation", "Picture Archiving and Communication System (PACS) Management", "HIPAA Compliance and Patient Confidentiality", "Patient Communication and Anxiety Reduction",
    "Mentoring and Training of Junior Technologists", "Community Health Education on Imaging Safety", "First Aid and CPR Certification"]'
  hobbies: '["Gardening and landscaping", "Birdwatching and nature walks", "Line dancing and social dancing", "Playing bridge and card games", "Volunteering at the local church and health fairs", "Cooking
    and recipe sharing", "Attending community festivals and senior center events", "Reading mystery novels", "Aquatic aerobics", "Participating in community theater backstage crew"]'
  career_goals: Stephanie aims to transition gradually from full-time clinical work to a part-time mentorship and education role. She plans to obtain the ARRT Certified Radiology Educator credential, develop
    a series of radiation-safety workshops for local dental and urgent-care clinics, and continue volunteering at health fairs in Sumter County. While maintaining a flexible schedule that allows her to
    enjoy her hobbies, she hopes to become a trusted advisor for imaging departments seeking practical solutions to workflow and safety challenges, ultimately balancing professional contribution with personal
    well-being.
