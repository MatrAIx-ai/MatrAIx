personas:
  professional: A pint-sized organiser of playtime, Zoila Febles loves arranging her crayons by color and leading her preschool friends in structured building projects, and they showcase early leadership,
    meticulous attention to detail, and a competitive edge that drives them to finish puzzles before anyone else.
  sports: An energetic participant in the Little Lions toddler soccer class, Zoila Febles darts around the field with a competitive spark, cheers loudly for the hometown Tigers baseball team on TV, and
    they relish weekly gymnastics sessions at the junior club to stay active.
  arts: A creative enthusiast of preschool art, Zoila Febles delights in finger‑painting bright primary shapes while humming “The Wheels on the Bus,” and they adore performances by The Wiggles and the animated
    charm of Sesame Street characters.
  travel: A curious explorer of family trips, Zoila Febles loves structured weekend getaways to the coastal resort of Clearwater Beach where they can build sandcastles in a designated play area, and they
    eagerly anticipate a future family vacation to Disney World, preferring itineraries that list each activity down to the snack break.
  culinary: A picky yet enthusiastic eater, Zoila Febles prefers meals with clearly separated components, such as bite‑sized carrot sticks arranged in rows beside golden chicken nuggets, enjoys macaroni
    and cheese with a dash of cheddar, and they occasionally worry about trying new foods like broccoli, though they love the sweet taste of strawberry‑banana smoothies.
  core: Zoila Febles, a three‑year‑old with a fierce love for tidy toy shelves, a surprisingly competitive spirit, and a habit of worrying over missing puzzle pieces, balances boundless energy with a need
    for predictable routines.
background:
  cultural: Zoila is raised in a bilingual Puerto Rican household in Mine Hill, New Jersey. At home, Spanish is spoken alongside English, and she celebrates cultural traditions such as Nochebuena, Three
    Kings Day, and the annual Puerto Rican Festival in nearby Newark. Family meals often feature arroz con gandules, plantains, and empanadillas, and music ranging from salsa to reggaetón fills the house.
    Her parents encourage her connection to Puerto Rican heritage through dance classes, holiday crafts, and community events at the local cultural center, while also integrating her into the broader New
    Jersey community.
attributes:
  skills: '["Basic language comprehension (English & Spanish)", "Following simple routines", "Fine motor coordination (drawing, stacking blocks)", "Color and shape sorting", "Basic counting (up to 5)",
    "Social interaction (sharing, turn‑taking)", "Competitive play (tower building, quick games)"]'
  hobbies: '["Dancing to salsa and merengue music", "Building block towers", "Coloring and drawing tropical scenes", "Storytime at the local library", "Pretend cooking in the play kitchen", "Playing on
    the playground with peers", "Sorting stickers by color"]'
  career_goals: Zoila often talks about growing up in a role that blends order, helping others, and performance. She dreams of becoming a preschool teacher who creates predictable, fun learning environments
    for young children, or a dancer who shares the lively rhythms of her Puerto Rican heritage on stage. She also imagines being a community organizer who ensures safe, structured play spaces for neighborhood
    kids, reflecting her desire to combine structure with sociable, energetic activity.
