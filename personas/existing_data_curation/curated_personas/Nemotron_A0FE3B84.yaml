    and rapid idea generation'', ''Basic graphic design (layout, typography)'']'
  hobbies: '[''Street art exploration'', ''Sketching (paper and digital)'', ''Dancing (salsa, bachata)'', ''Listening to indie and Latin‑fusion music'', ''DIY fashion and upcycling clothing'', ''Photography
    of urban landscapes'', ''Writing poetry and song lyrics'', ''Attending local cultural festivals'', ''Cooking traditional family recipes with a modern twist'', ''Participating in community art events'']'
  career_goals: Irmary aims to turn her artistic passion into a flexible, culturally resonant career. After obtaining her GED, she plans to enroll in a community‑college program for visual communication
    or graphic design while building a freelance portfolio of illustrations, digital art, and small‑scale branding projects. Long‑term, she envisions opening a pop‑up studio in Lake Worth where she can
    sell hand‑painted apparel, create murals for local businesses, and mentor younger teens in creative expression. She also hopes to integrate her Hispanic heritage into her work, producing art that reflects
    her Colombian‑Puerto Rican roots and contributes to the vibrant cultural tapestry of Palm Beach County.
