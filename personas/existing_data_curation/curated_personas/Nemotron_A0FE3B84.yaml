personas:
  professional: A 17‑year‑old visual communicator named Irmary Pena blends sketching, digital illustration, and social‑media content creation to craft vibrant freelance graphics, turning spontaneous bursts
    of inspiration into eye‑catching murals while often battling deadline‑driven organization.
  sports: Irmary Pena channels energy into salsa and bachata dancing as a primary cardio workout, casually plays beach volleyball in the summer, and roots for the Miami Heat and Miami Dolphins while occasionally
    jogging along Lake Worth’s promenade with earbuds in.
  arts: Irmary Pena spends weekends sketching in coffee shops while curating playlists featuring Tame Impala, Bad Bunny, and lo‑fi beats from ChilledCow, draws inspiration from street‑art icons like Banksy
    and the vivid murals of Wynwood, writes poetry influenced by Rupi Kaur, and captures urban scenes reminiscent of Nan Goldin’s photography.
  travel: Irmary Pena plans low‑budget weekend escapes to Wynwood’s art‑filled streets, a day trip to Key West’s pastel houses, and dreams of a spring backpacking adventure through Mexico City’s mural‑laden
    neighborhoods and Oaxaca’s vibrant food markets, balancing wanderlust with a tight teen budget and school responsibilities.
  culinary: Irmary Pena enjoys experimenting in the kitchen, mastering spiced corn cakes (arepas) topped with avocado salsa, giving classic empanadas a modern twist with goat cheese and roasted peppers,
    and pairing her creations with homemade hibiscus iced tea during lo‑fi listening sessions, while still opting for quick avocado toast at cafés when pressed for time.
  core: Irmary Pena is a spontaneous teen visual storyteller who trades deadlines for midnight sketch marathons, hoards glitter pens, and treats every sidewalk as a potential canvas, even if it sometimes
    results in missed homework.
background:
  cultural: Irmary is a first‑generation American of Colombian and Puerto Rican descent, raised in the vibrant Hispanic community of Lake Worth, Florida. Her household is bilingual, celebrating traditions
    such as Día de los Muertos, Navidad, and local Caribbean festivals. This cultural mosaic provides her with a strong sense of family cohesion, respect for elders, and an appreciation for the vivid storytelling
    inherent in Latin American visual arts. The diverse neighborhoods of Palm Beach County shape her worldview, encouraging both a deep connection to her roots and an openness to new ideas and experiences.
attributes:
