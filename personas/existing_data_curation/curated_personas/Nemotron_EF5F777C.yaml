  career_goals: Natalia dreams of becoming a visual artist or illustrator who creates inclusive children's books that celebrate different cultures and help kids understand their feelings. She also imagines
    a future where she can support other children emotionally, perhaps as a children's author who writes stories about coping with anxiety, or as a youth counselor. In the near term, she aims to improve
