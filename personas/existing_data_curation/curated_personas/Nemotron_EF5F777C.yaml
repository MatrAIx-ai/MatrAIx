personas:
  professional: Natalia is a budding digital storyteller who blends their love for drawing landscapes and comic strips with a knack for Scratch programming, channeling their curiosity and organized yet
    flexible approach into creating quirky, colorful games for their friends.
  sports: Natalia plays forward for the Beverly Stars youth soccer team, where they dazzle teammates with quick footwork inspired by Latin rhythms, and they fervently root for the New England Revolution
    during the MLS season, balancing competitive drive with a habit of stretching after games to calm their nerves.
  arts: Natalia fills sketchbooks with vibrant landscapes and comic heroes, drawing color palettes from traditional textiles while humming to Selena’s cumbia beats, and they idolize Frida Kahlo’s bold self-portraits,
    letting that fearless creativity shape both their art and daily outlook.
  travel: Natalia dreams of family road trips that blend amusement park thrills in Orlando with cultural immersion in San Juan, Puerto Rico, and they carefully map out a future visit to Costa Rica’s rainforest,
    balancing their excitement with their parents’ budget-conscious planning.
  culinary: Natalia loves to knead tortillas for homemade baleadas alongside their grandma, sprinkle refried beans and cheese, and experiment with topping variations, proudly calling themselves a junior
    kitchen helper despite often burning the edges of their first attempts.
  core: Natalia is a curious nine-year-old who channels their vibrant bilingual-inspired imagination into art, code, and soccer, while navigating bursts of anxiety with breathing drills and a relentless
    love for colorful creativity.
background:
  cultural: 'Natalia comes from a Honduran immigrant family that maintains Spanish as the language spoken at home and celebrates cultural traditions such as Día de la Independencia (September 15) and popular
    festive foods like pupusas and baleadas. Her family participates in local community events in Beverly, MA, often joining neighborhood gatherings at the local church where they blend Catholic customs
    with Honduran celebrations. She is exposed to both Honduran and American cultural influences: she enjoys classic American children''s literature while also learning stories from Honduran folklore told
    by her grandparents. This bicultural environment nurtures her bilingual abilities, appreciation for diverse art forms, and a sense of pride in her heritage.'
