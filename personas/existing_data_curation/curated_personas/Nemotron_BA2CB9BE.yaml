    junior agents'', ''Community networking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Hiking in the White Mountains'', ''Gardening'', ''Participating in a book club'', ''Volunteering with Habitat for Humanity'',
    ''Attending community theater productions'', ''Exploring antique fairs'', ''Practicing yoga'', ''Traveling to historic New England towns'']'
  career_goals: Looking ahead, Andrea aims to transition her independent brokerage into a boutique firm specializing in eco‑friendly and senior‑friendly homes, a growing niche in the New Hampshire market.
    She plans to earn the Certified Residential Specialist (CRS) designation and complete advanced training in sustainable property development. Andrea also aspires to serve on the board of the local Realtors
    Association, where she can influence policy and promote community‑focused housing initiatives. Mentoring remains a priority; she intends to establish a formal apprenticeship program for emerging agents,
    sharing her market insights while fostering a supportive, collaborative culture. Balancing professional growth with personal well‑being, Andrea is exploring mindfulness practices to better manage her
    tendency toward worry and stress.
