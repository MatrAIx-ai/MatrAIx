personas:
  professional: Andrea Dixon, a 57‑year‑old licensed real‑estate broker in Carroll County, leverages three decades of market analysis, negotiation, and MLS expertise while channeling their well‑honed organization
    and methodical planning into seamless open‑house coordination, and their sociable, curious nature fuels innovative eco‑friendly and senior‑friendly staging concepts even as occasional worry pushes them
    to double‑check every detail.
  sports: Andrea Dixon, an avid hiker of the White Mountains and a regular participant in a local yoga class, follows the Boston Red Sox and the New England Patriots, joins the Concord Country Club tennis
    league each spring, and in winter takes cross‑country ski trips to Bretton Woods, balancing their love of outdoor activity with a methodical workout schedule that includes three cardio sessions per
    week.
  arts: Andrea Dixon, a regular patron of New England art galleries and historic house tours, finds inspiration in Monet’s watercolors and the Boston Symphony Orchestra’s performances of Mahler, enjoys
    community theater productions of Arthur Miller’s ‘Death of a Salesman’, and frequently curates their own watercolor landscapes of the White Mountains, while their love for vintage aesthetics leads them
    to collect pieces from antique fairs featuring mid‑century designers like Eames.
  travel: Andrea Dixon, who plans trips with the same organized precision they use for MLS listings, enjoys weekend getaways to historic New England towns such as Portsmouth, Salem, and St. Augustine’s
    colonial district, has recently explored the cobblestone streets of Bruges and dreams of strolling through Kyoto’s temples, balancing their love for cultural immersion with a modest travel budget that
    prioritizes family time and occasional eco‑friendly lodging.
  culinary: Andrea Dixon, an adept home cook who harvests rosemary, thyme, and heirloom tomatoes from their garden, often prepares classic New England clam chowder with fresh clams, cream, and a dash of
    smoked paprika, delights in crafting lobster rolls with buttery brioche buns, and enjoys occasional fine‑dining experiences featuring farm‑to‑table menus that highlight artisanal cheeses and locally
    sourced maple‑glazed pork tenderloin.
  core: Andrea Dixon, a curious yet worry‑prone 57‑year‑old real‑estate broker, channels their methodical nature into eco‑friendly staging while constantly juggling a packed schedule, a love for watercolor
    landscapes, and a habit of double‑checking every contract detail.
background:
  cultural: Andrea grew up in a multi‑generational, middle‑class family in rural New Hampshire, rooted in the New England tradition of self‑reliance, community involvement, and appreciation for the region’s
    natural and historical heritage. Her white Anglo‑American ancestry traces back to early settlers of the Northeast, and she was raised with a blend of Protestant values emphasizing modesty, hard work,
    and civic duty. The close‑knit social fabric of Carroll County shaped her sociable and outgoing personality, fostering a strong sense of local identity and a commitment to volunteerism. While she embraces
    contemporary ideas and artistic expression, Andrea also honors the region’s colonial history, often participating in preservation societies and local festivals that celebrate New England culture.
attributes:
  skills: '[''Residential property valuation'', ''Comparative market analysis'', ''Negotiation and contract facilitation'', ''Client relationship management'', ''Open house and event coordination'', ''Digital
