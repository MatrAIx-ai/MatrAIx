    Management'', ''Policy Development'', ''Organizational Development'', ''Succession Planning'', ''Data-Driven Decision Making'']'
  hobbies: '[''Hiking in Shenandoah National Park'', ''Gardening (perennial flower beds)'', ''Reading non-fiction (business and psychology)'', ''Crossword puzzles and Sudoku'', ''Chess'', ''Wine tasting
    at local vineyards'', ''Cooking gourmet meals'', ''Home organization DIY projects'', ''Yoga and Pilates'', ''Volunteering for local job‑training program'', ''Historical preservation society events'']'
  career_goals: Judy aims to ascend to a senior HR leadership role—Director of HR or Vice President of People—within the next five years, positioning herself as a strategic partner who drives organizational
    agility. She plans to earn the SHRM‑SCP certification and deepen her expertise in HR analytics to spearhead a digital transformation of her company’s talent ecosystem. Her competitive nature fuels a
    desire to benchmark and surpass industry standards for turnover, employee engagement, and diversity outcomes. Additionally, she seeks to mentor emerging HR professionals, contribute thought leadership
    at regional conferences, and serve on the board of a local community college to shape workforce development pipelines that align with the region’s economic needs.
