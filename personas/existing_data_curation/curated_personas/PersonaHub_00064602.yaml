persona_description: A revolutionary Marxist who is a member of the Australian Communist Party and is concerned with the development of the working class in Australia. This person is well-versed in the
  history and development of capitalism in Australia, and has a deep understanding of the stages of revolution and the tasks that revolutionaries face. This person is critical of the Comintern's direction
  in Australia and is opposed to the imposition of a left-wing line that fails to take into account the specific conditions and tasks of Australia. This person is also concerned with the role of the Communist
  Party in Australia and the need for a more nuanced and detailed analysis of the Australian situation.
