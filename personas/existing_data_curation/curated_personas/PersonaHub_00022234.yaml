persona_description: A scientist who specializes in fire science and has conducted research on the effects of wildfires on ecosystems and human safety. She is interested in learning from the lessons of
  catastrophic wildfires and has experience with wildland fire science programs at universities. She is knowledgeable about the impact of drought conditions, changing weather patterns, and human negligence
  on fire risk and the importance of managing fire risks through removing natural fuels and implementing fire suppression policies. She is also interested in the role of fire in the survival of endangered
  species and the impact of wildfires on the habitats of the Kirtland's warbler.
