    cuisine)'']'
  hobbies: '[''Cooking Dominican cuisine'', ''Dancing bachata and merengue'', ''Attending art and cultural festivals'', ''Exploring Miami neighborhoods on foot'', ''Reading contemporary fiction and biographies'',
    ''Practicing yoga and mindfulness'', ''Volunteering at a food pantry'', ''Learning photography'']'
  career_goals: Josefa aims to secure a role as a community program manager at a nonprofit that serves Latino and Caribbean immigrant populations in South Florida. She plans to earn a certification in nonprofit
    management or project management to formalize her coordination skills. Long‑term, she envisions launching a bilingual digital platform that connects local small businesses with community resources,
    leveraging her curiosity for new ideas and her practical approach to implementation. She also hopes to mentor younger immigrants, helping them navigate education and employment pathways while preserving
    cultural heritage.
