personas:
  professional: Josefa Vega is a bilingual community outreach specialist who blends curiosity-driven digital tool mastery with practical project coordination, using their kind, cooperative style to organize
    cultural events, volunteer drives, and bilingual social media campaigns while preparing for a community program manager role at a nonprofit serving immigrant populations.
  sports: Josefa Vega follows the Miami Heat and Miami Dolphins with seasonal enthusiasm, plays in a co‑ed recreational soccer league at the Kendall Soccer Club, and participates in the Miami Yoga & Wellness
    Run Club’s weekend jogs, combining team fandom with personal fitness.
  arts: Josefa Vega immerses themselves in Miami’s art festivals, drawing inspiration from street artist James Nord and installation pieces by Ai Weiwei, while their soundtrack cycles through Bad Bunny,
    Celia Cruz, and Esperanza Spalding, weaving visual and musical influences into community storytelling.
  travel: Josefa Vega delights in weekend foot‑tour explorations of Miami’s Little Havana and Wynwood neighborhoods, has backpacked through Cartagena’s historic streets and Barcelona’s art museums, and
    dreams of a Pacific Coast road trip to soak in diverse coastal cultures, all while meticulously budgeting travel to accommodate future volunteer commitments.
  culinary: Josefa Vega is an adept home cook specializing in island comfort foods like mangú, arroz con pollo, and tostones, savoring the aromas of plantain, cilantro, and sofrito, and they routinely host
    potluck soirées where guests exchange recipes and stories over hearty, spice‑laden plates.
  core: Josefa Vega blends a passion for community‑focused cooking and cultural festivals with an organized yet flexible work ethic, a habit of late‑night scrolling through recipe blogs, and a tendency
    to over‑commit to volunteer events, making them a charismatic but busy bridge‑builder.
background:
  cultural: Josefa’s Dominican heritage shapes her identity through a deep appreciation for family ties, community solidarity, and vibrant cultural expressions such as music, dance, and food. Growing up
    in a bilingual household, she values both Spanish and English as tools for connection and advocacy. She participates actively in Dominican celebrations in Miami, like the Dominican Day Parade, and incorporates
    traditional stories and culinary practices into her community work. Her cultural background instills a strong sense of hospitality, resilience, and a commitment to uplifting fellow immigrants while
    honoring her Caribbean roots.
