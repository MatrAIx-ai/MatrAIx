personas:
  professional: Demetria Jackson, a budding digital media specialist, blends a business associate’s degree with Canva and Photoshop basics to craft culturally resonant visual stories, and they navigate
    their relaxed, sometimes disorganized workflow with a practical curiosity for new tools and a preference for flexible, remote projects.
  sports: Demetria Jackson, a quiet fitness enthusiast, enjoys solitary weekend hikes at Great Falls, dribbles a basketball with friends while following the New York Giants and New York Knicks, and they
    belong to a local community soccer club for beginners, approaching exercise with a relaxed but consistent jog schedule.
  arts: Demetria Jackson, a sketch‑loving poet, draws inspiration from Nina Simone, Miles Davis, Kendrick Lamar and spoken‑word artist Saul Williams while they attend local exhibitions at the Paterson Museum
    and create hand‑stitched bead jewelry during collaborative craft nights.
  travel: Demetria Jackson, a self‑planned traveler who prefers budget‑friendly escapes, spends weekends exploring the Hudson Valley and day‑tripping to the Hamptons, and they dream of backpacking through
    Ethiopia’s Simien Mountains and wandering the historic streets of Lisbon, balancing adventure with limited student finances.
  culinary: Demetria Jackson, an enthusiastic home cook, frequently prepares injera using teff flour and doro wat seasoned with berbere, while also mastering Southern collard greens and fried chicken, and
    they love experimenting with matcha‑infused desserts that blend sweet and earthy flavors.
  core: Demetria Jackson, a creatively curious yet delightfully disorganized 18‑year‑old, balances a love for solitary storytelling with the habit of letting laundry pile up until the last minute, and they
    often exchange their Netflix binge sessions for late‑night sketching marathons.
background:
  cultural: Demetria is African American with Ethiopian roots, reflected in her family’s naming conventions and culinary traditions. Growing up in Paterson, New Jersey, a city known for its cultural mosaic,
    she was exposed to vibrant community networks of Black, Caribbean, and East African immigrants. Her upbringing blended the church‑centric values of many African‑American families with the coffee‑ceremony
    rituals and storytelling customs of Ethiopian culture. She participates in local cultural festivals, supports community youth programs, and maintains strong ties to her extended family, where oral history,
    music, and food serve as key expressions of identity. This hybrid heritage informs her worldview, artistic sensibilities, and desire to uplift under‑represented narratives.
attributes:
  skills: '["Microsoft Office suite", "Basic bookkeeping", "Social media content creation", "Graphic design (Canva/Photoshop basics)", "Research and analytical writing", "Interpersonal communication", "Digital
