  hobbies: '["Reading contemporary Black literature", "Creative writing and journaling", "Listening to jazz, R&B, hip‑hop", "Digital photography and photo editing", "Exploring local parks and Great Falls",
    "Cooking Ethiopian and soul‑food recipes", "Board games with close friends", "DIY crafts (beadwork, crocheting)", "Watching documentaries"]'
  career_goals: She aims to leverage her associate’s degree to complete a bachelor’s in Business Administration while building a freelance digital‑media brand that promotes Black and Ethiopian cultural
    narratives. In the next five years, she hopes to run a part‑time online boutique or content‑creation agency that offers curated apparel, artwork, and storytelling services. She also aspires to earn
    a certification in web development to expand her skill set, enabling her to design her own e‑commerce platform. Demetria values flexibility, so she prefers career paths that allow remote work, project‑based
    assignments, and the ability to balance personal creative pursuits.
