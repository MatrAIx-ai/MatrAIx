  hobbies: '[''Museum and gallery visits'', ''Photography (urban and architectural)'', ''Live theater and jazz shows'', ''Volunteer coordination for community art festivals'', ''Reading (art history, biographies,
    current affairs)'', ''Cooking diverse cuisines'', ''Hiking in Pennsylvania state parks'', ''Book club participation'']'
  career_goals: Javad aims to transition from first‑line supervision to a plant‑manager role within the next two years, leveraging his deep operational knowledge and collaborative leadership style. He is
    motivated to spearhead a company‑wide continuous‑improvement program that integrates artistic design principles to enhance workplace aesthetics and employee morale. Looking beyond retirement, he hopes
    to serve on the board of a local arts organization, using his manufacturing network to create partnerships that bring community art projects—such as murals and public installations—to industrial neighborhoods
    in Philadelphia. Javad also aspires to mentor emerging supervisors, developing a formal training curriculum that blends technical competence with creative thinking.
