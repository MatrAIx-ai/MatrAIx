    visualization'']'
  hobbies: '[''Reading literary fiction and philosophy'', ''Journaling'', ''Watercolor painting'', ''Experimental cooking with seasonal ingredients'', ''Hiking local nature trails'', ''Yoga and mindfulness
    practice'', ''Puzzle solving (Sudoku, crosswords)'', ''Visiting local history museum'', ''Participating in a small book club'', ''Indoor gardening'']'
  career_goals: Annette aims to secure a tenure‑track faculty position or senior research scientist role within the next five years, where she can lead an independent laboratory focused on translational
    oncology. She is driven to translate molecular insights into diagnostic tools or targeted therapies, seek competitive NIH or industry grants, and publish high‑impact papers that place her work at the
    forefront of the field. Her competitive nature fuels a goal to be first to publish key findings and to file patents on novel biomarkers. Long‑term, she hopes to mentor junior scientists, build a collaborative
    yet autonomous research environment, and maintain a flexible schedule that accommodates her family life in Indiana.
