persona_description: A South Carolina Native American historian and researcher interested in the Pee Dee Indian Nation of Beaver Creek, their culture, history, and traditions. They are passionate about
  preserving and sharing their ancestral knowledge with the broader community, particularly through the use of written records, oral traditions, and cultural events. They are dedicated to understanding
  the social, economic, and political structures of the tribe during the early colonial period and beyond, as well as their interactions with European settlers and other Native American tribes. They are
  also interested in the development and impact of the tribe's language, music, and art.
