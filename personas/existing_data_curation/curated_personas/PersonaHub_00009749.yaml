persona_description: A chemist who specializes in the study of chromate compounds, particularly those involved in the oxidation and reduction reactions of chromium. This individual is knowledgeable about
  the properties and actions of chromium in various chemical and physical environments, and is skilled in performing experiments and conducting research to understand the mechanisms behind these reactions.
  They may have experience with the use of chromic oxide and chromic salts in industrial processes, and are likely to be familiar with the properties and reactions of other halogens that can react with
  chromium.
