  hobbies: '[''Reading African American literature'',''Herb gardening'',''Cooking fusion dishes'',''Youth mentorship volunteering'',''Hiking at Cedar Creek Lake'',''Knitting scarves'',''Book club'',''Board
    game nights'']'
  career_goals: Mitzi aims to obtain a master's degree in Educational Leadership within the next two years, positioning herself for a district‑wide director role overseeing early childhood programs. She
    wants to design and implement a culturally responsive, evidence‑based curriculum across Killeen schools, expand partnerships with local military families, secure sustainable grant funding for enrichment
    initiatives, and mentor emerging administrators to foster equity and excellence in childcare services.
