personas:
  professional: Strategic educational administrator Mitzi Blair leverages her expertise in budgeting, curriculum alignment, grant writing, and staff development to design data-driven early childhood programs,
    while her disciplined, organized nature ensures every initiative meets rigorous Texas licensing standards and fosters equity for military families.
  sports: Active weekend hiker Mitzi Blair joins the Cedar Creek Lake Trail Running Club for seasonal 5k races, roots for the Dallas Cowboys and Texas Rangers, and balances cardio walks with gentle yoga
    sessions at a nearby studio to offset the sedentary demands of her administrative role.
  arts: Literary and music enthusiast Mitzi Blair devotes her quiet evenings to reading works by authors such as Haruki Murakami and Virginia Woolf, while savoring folk-rock playlists featuring Joni Mitchell,
    Leonard Cohen, and contemporary scores by Lin-Manuel Miranda to inspire her hand-knit scarf designs.
  travel: Methodical planner Mitzi Blair prefers short, well-researched road trips, having explored the Hill Country vineyards of Fredericksburg, the historic streets of Santa Fe, and the blue-water coast
    of Gulf Shores, yet she balances these adventures with budget-friendly stays at family-run B&Bs and a desire to remain close to her Cedar Creek Lake home.
  culinary: Home-cooking enthusiast Mitzi Blair blends her modest culinary skills with soulful, locally inspired flavors, frequently preparing herb-crusted salmon with fresh rosemary, thyme, and lemon,
    or a spicy vegetable quinoa stew with roasted sweet potatoes and crisp kale, while she rarely dines out except for occasional farm-to-table brunches at her favorite downtown eatery.
  core: Mid-career educator Mitzi Blair pairs her meticulous planning with a love for quiet reflection, juggling budget spreadsheets and herb garden notes while habitually leaving half-finished knitting
    projects by the coffee maker, and despite setting strict deadlines, she often delays her master's degree application until the last minute.
background:
  cultural: Mitzi identifies as African American and grew up in a close‑knit Black community in Texas, where church, family gatherings, and community activism shaped her values of cooperation, harmony,
    and resilience. Living in Killeen—a city with a strong military presence—has exposed her to diverse cultures and a pragmatic mindset, reinforcing her disciplined approach to work. She honors her heritage
    through participation in Juneteenth celebrations, gospel music, and preserving family recipes, while also integrating culturally responsive practices into her educational leadership to support children
    and families of varied backgrounds.
