personas:
  professional: German Gazga, an organized aspiring logistics coordinator with strong Excel, inventory management, and bilingual communication skills, applies methodical planning to streamline operations
    in small family‑owned businesses while seeking a predictable, full‑time schedule.
  sports: German Gazga, a devoted Liga MX fan who roots for Club América, watches matches on weekends while keeping a strict schedule, occasionally joins a local pick‑up soccer game after church gatherings,
    and supports the community garden’s weekly fitness walk led by the town’s recreation department.
  arts: German Gazga, a practical reader of self‑improvement and strategy books, finds creative solace listening to the soulful guitar of Carlos Santana, the poetic lyrics of Jorge Drexler, and admiring
    the vivid murals of Diego Rivera, while attending occasional church choir rehearsals that provide a quiet artistic outlet.
  travel: German Gazga, a methodical planner who prefers short, well‑structured trips, has weekended in the nearby desert national park, dreams of a cultural immersion tour of Oaxaca to study traditional
    cooking techniques, and always books accommodations months in advance to fit a tight budget.
  culinary: German Gazga, an enthusiastic home cook who excels at preparing authentic Mexican dishes such as tacos al pastor, chicken mole, and chiles en nogada, favors fresh cilantro, ancho chilies, and
    masa harina, and enjoys sharing these meals with family during Sunday gatherings.
  core: German Gazga, a routine‑loving 22‑year‑old with a green thumb, meticulous budgeting habit, and quiet passion for Mexican cuisine and strategic chess, balances an organized work ambition with occasional
    spontaneous culinary experiments.
background:
  cultural: German is a second‑generation Mexican American raised in Sachse, Texas. His household maintains strong Mexican traditions, celebrating Día de los Muertos, Semana Santa, and family gatherings
    centered around food. He grew up bilingual, speaking Spanish at home and English at school, and values family loyalty, respect for elders, and the blend of Mexican cultural heritage with the practical,
    community‑focused lifestyle of suburban Texas.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Microsoft Excel'', ''Basic accounting'', ''Inventory management'', ''Bilingual Spanish-English communication'', ''Basic automotive maintenance'',
