personas:
  professional: A budding robotics enthusiast, Thelma Zaubi applies methodical problem‑solving to design competition robots, balancing curiosity about new sensors with a disciplined schedule that mirrors
    a junior engineer’s workflow; they thrive on turning abstract ideas into concrete prototypes.
  sports: A competitive member of the Brawley High Track Club, Thelma Zaubi specializes in the 800‑meter run, cheering for the San Diego State Aztecs men's track while also following the Los Angeles Lakers
    for off‑season inspiration; they approach training with a data‑driven mindset, logging splits on a smartwatch.
  arts: An inventive DIY creator, Thelma Zaubi spends weekends building birdhouses and tinkering with Arduino LED displays, while drawing artistic inspiration from folk musician Sufjan Stevens and the kinetic
    sculptures of artist Theo Jansen, which they reference when sketching new projects.
  travel: A desert‑savvy explorer, Thelma Zaubi has hiked the trails of the Imperial Sand Dunes, visited Joshua Tree National Park, and dreams of a family road trip to the Grand Canyon, favoring meticulously
    planned itineraries that blend geological study with brief stints of relaxation.
  culinary: A garden‑to‑table experimenter, Thelma Zaubi frequently prepares roasted beet and quinoa salads, spicy tomato salsa using homegrown peppers, and carrot‑zucchini muffins, showcasing a knack for
    fresh, seasonal ingredients and a willingness to try new herb combinations like cilantro‑mint.
  core: Thelma Zaubi is a curious, methodical teen whose competitive drive and worry‑prone nature fuel a blend of robotics, gardening, and disciplined self‑care; they constantly balance new ideas with practical
    execution.
background:
  cultural: Thelma comes from a white, multi-generational farming family that has lived in the Imperial Valley for several decades. Raised in Brawley, a small, tightly-knit agricultural town near the U.S.–Mexico
    border, she has been shaped by the region’s dry desert climate, the rhythm of seasonal crop cycles, and a community that values hard work, self-reliance, and neighborly support. Her family's cultural
    traditions blend Midwestern American values—such as punctuality, modesty, and a strong work ethic—with the multicultural influences of the surrounding Hispanic community, which she experiences through
    local festivals, bilingual signage, and shared community events. Attending the public high school in Brawley, Thelma participates in school and town activities that celebrate both the agricultural heritage
    and the diverse cultural tapestry of Imperial County.
