  hobbies: '["Desert hiking and plant identification", "Home vegetable gardening", "Robotics club activities", "Track and field", "Reading science magazines", "Logic puzzles", "Journaling", "DIY crafts
    (birdhouses, Arduino projects)", "Volunteering at community garden"]'
  career_goals: In the short term, Thelma aims to graduate high school with a top-tier GPA, earn a merit-based scholarship, and gain admission to a competitive summer STEM program focused on agricultural
    science. She also plans to secure a part-time internship with a local farm or water-management agency to apply her practical interests. Over the next five to ten years, she aspires to pursue a bachelor's
    degree in agricultural engineering or environmental science, leveraging her organized work ethic and competitive drive to excel academically and in research. Ultimately, Thelma envisions a career as
    a sustainable agriculture specialist, designing efficient irrigation systems and crop-rotation plans for desert farms, or working as a research scientist developing drought-resistant plant varieties.
    She hopes her future work will blend her curiosity for new ideas with reliable, data-driven solutions that benefit her community.
