  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography'', ''Reading Contemporary Fiction'', ''Writing Poetry'', ''Volunteering at Community Center'', ''Facilitating Small Discussion Groups'',
    ''Kayaking'', ''Birdwatching'', ''Herb Gardening'', ''Cooking Experimental Dishes'']'
  career_goals: Karen aims to become a senior research interviewer leading large‑scale oral‑history projects that capture Gulf Coast narratives, while mentoring junior interviewers and fostering inclusive
    storytelling practices. She aspires to transition into documentary filmmaking that blends interview archives with visual art, creating exhibitions that promote cultural dialogue. Long‑term, she envisions
    founding a nonprofit that offers interview‑based counseling workshops and community art initiatives, preserving local heritage and supporting personal well‑being.
