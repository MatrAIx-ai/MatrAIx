personas:
  professional: Karen Seaward, a senior research interviewer, blends their expertise in qualitative interviewing, empathetic listening, and narrative synthesis with a restless curiosity for Gulf Coast stories,
    they steer large‑scale oral‑history projects while mentoring junior colleagues and dreaming of documentary filmmaking.
  sports: Karen Seaward paddles with the Pensacola Kayak Club, they follow the Tampa Bay Buccaneers for NFL Sundays, and they join a seasonal bird‑watching hike organized by the Gulf Coast Audubon Society,
    balancing low‑impact fitness with community camaraderie.
  arts: Karen Seaward sketches coastal sunsets inspired by Claude Monet, they capture candid moments in the style of William Eggleston, and they curate small poetry readings featuring Mary Oliver, weaving
    visual and literary arts into their community workshops.
  travel: Karen Seaward favors short, purposeful getaways—spending weekends exploring the historic streets of Savannah, the jazz‑filled alleys of New Orleans, and the sun‑kissed cliffs of the Algarve—while
    they plan a longer pilgrimage to Kyoto's temples when time and finances align.
  culinary: Karen Seaward’s kitchen is a fusion lab where they stir Thai green curry with fresh basil from their herb garden, they braise Moroccan tagine with apricots and preserved lemons, and they perfect
    Gulf shrimp étouffée seasoned with smoked paprika and cajun spice.
  core: Karen Seaward, a curious, art‑loving interview specialist, navigates life with spontaneous compassion, a penchant for late‑night sketching, and a disciplined yet occasionally impulsive approach
    to finances and health.
background:
  cultural: Karen grew up in the Gulf Coast region of Florida, absorbing the warm Southern hospitality and relaxed beach culture of Pensacola. Her family background is predominantly Anglo‑American, with
    traditions that emphasize community service and compassion, often rooted in church involvement. The diverse coastal population—including retirees, military families, and a growing Hispanic community—expanded
    her worldview, fostering an appreciation for multicultural expression, especially in the arts. This blend of Southern heritage, community‑oriented values, and openness to new ideas shapes her curious,
    inclusive, and harmonious outlook.
attributes:
