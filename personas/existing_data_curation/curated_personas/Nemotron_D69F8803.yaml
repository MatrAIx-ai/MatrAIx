  career_goals: Coleen aims to channel her analytical and creative strengths into a career that bridges science and visual communication. In the short term, she plans to complete an advanced data‑visualization
    boot camp, build a portfolio of interactive visual stories for local environmental projects, and volunteer as a science communicator at the county museum. She also intends to enroll in a part‑time master's
    program in Data Science or Scientific Communication to deepen her technical expertise. Over the next five to ten years, she aspires to work as a data visualization specialist or scientific outreach
    strategist for a nonprofit or research institute, eventually leading a team that uses data-driven storytelling to influence policy on sustainable land management. Alongside professional growth, she
    values maintaining a flexible, remote-friendly work arrangement that supports her preference for solitude and modest group collaboration.
