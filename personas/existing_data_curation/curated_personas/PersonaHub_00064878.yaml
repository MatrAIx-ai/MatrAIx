persona_description: A legislator who is interested in immigration reform and has a deep understanding of the impact of immigration on education and workforce. They are likely to be familiar with the history
  and current status of immigration legislation in the United States, including the 1965 Immigration and Nationality Act and the 2006 immigration reform bill. They are also likely to be knowledgeable about
  the role of education in immigration reform and the potential for states to bar illegal immigrant children from receiving a free public education. They may have experience working on immigration legislation
  in Congress and are interested in the potential for the immigration bill to get a veto from President Bill Clinton if a provision is included for illegal immigrant children.
