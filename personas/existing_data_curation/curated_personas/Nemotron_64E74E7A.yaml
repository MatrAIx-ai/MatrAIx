  hobbies: '[''Competitive video gaming'', ''Street basketball'', ''Hip‑hop beat production'', ''DIY electronics projects'', ''Digital video editing'', ''Reading science‑fiction'', ''Sketching street‑art
    designs'']'
  career_goals: Mack’s short‑term goal is to obtain his GED and enroll in a community‑college associate’s program in information technology, where he plans to earn CompTIA A+ and Network+ certifications.
    He hopes to launch a small smartphone‑repair side business that serves his neighborhood, leveraging his hardware expertise. At the same time, he wants to keep competing in local eSports tournaments
    and basketball leagues, seeking scholarships or sponsorships that could fund his studies. In the long run, Mack envisions opening a community tech hub that offers mentorship, repair services, and after‑school
    programming for other youth from his area, merging his curiosity for technology with a practical desire to uplift his community.
