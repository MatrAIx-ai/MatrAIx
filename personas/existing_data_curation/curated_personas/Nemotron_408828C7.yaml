  career_goals: Donald aims to advance from a hands-on welding technician to a supervisory role, seeking certification as an AWS Certified Welding Inspector within the next two years. He aspires to lead
    a dedicated welding team in a manufacturing plant, eventually opening a boutique metal-fabrication shop that specializes in custom automotive parts and artistic metalwork. Continuing his education through
    night courses in metallurgy and welding engineering, he hopes to combine his curiosity for emerging welding technologies with his practical, organized work style to become a recognized expert in the
    regional trade community.
