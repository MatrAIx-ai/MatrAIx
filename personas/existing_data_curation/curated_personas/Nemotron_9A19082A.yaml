  career_goals: Although retired, Michael aims to share his knowledge by volunteering at local schools and community centers, offering informal STEM workshops for senior citizens and under‑privileged youth.
    He wishes to document his family’s migration story and contribute to a bilingual oral‑history project celebrating Puerto Rican heritage in Worcester. Additionally, he hopes to curate small art exhibitions
    that blend scientific concepts with visual art, fostering interdisciplinary curiosity among participants.
