personas:
  professional: Michael Yeung, a retired technical tinkerer who now volunteers to run informal STEM workshops for seniors and under‑privileged youth, blends his analytical background in mechanical troubleshooting,
    electronics repair, and computer literacy with a laid‑back, sometimes disorganized approach, using his curiosity to craft hands‑on projects while quietly mentoring participants in a supportive, community‑focused
    atmosphere.
  sports: Michael Yeung, a devoted fan of the Worcester Red Sox and the New England Patriots, stays active by joining the local senior walking club for daily strolls through the community garden, participates
    in low‑impact tai chi classes at the senior center, and enjoys friendly chess matches at the senior center that double as mental exercise rather than high‑intensity sport.
  arts: Michael Yeung, an avid visitor to the Worcester Art Museum who often lingers over works by Frida Kahlo and Ansel Adams, channels his appreciation for visual storytelling into his own digital photography
    of street scenes, while his evenings include listening to the classic salsa rhythms of Celia Cruz and the melodic timbres of local folk singer Juan Luis Guerra, weaving art into his quiet social gatherings.
  travel: Michael Yeung, who prefers relaxed, well‑planned trips over spontaneous adventures, enjoys revisiting the coastal town of San Juan for its familiar festive evenings, has a wish list that includes
    a leisurely pilgrimage to Granada’s Alhambra and a quiet river cruise along the Hudson, and often balances travel with senior discounts and modest budgets, ensuring each journey blends cultural immersion
    with comfortable pacing.
  culinary: Michael Yeung, a seasoned home cook who delights in preparing traditional dishes like mofongo with garlic‑infused sofrito, arroz con gandules, and pasteles wrapped in banana leaves, blends fresh
    herbs from his vegetable garden such as cilantro and oregano into every recipe, and occasionally experiments by adding a pinch of smoked paprika to classic cassava fritters, though they sometimes forget
    to set timers, leading to slightly over‑cooked casseroles.
  core: Michael Yeung, a curious yet laid‑back 75‑year‑old who swaps garden soil for digital snapshots, mentors youth in STEM, and never misses a chance to share a story over coffee, even if it means misplacing
    his reading glasses in the process.
background:
  cultural: Michael’s cultural identity is rooted in his Puerto Rican heritage, shaped by the island’s rich traditions of music, storytelling, and family bonds. He grew up hearing bomba and plena rhythms,
    celebrated festivals like La Noche de San Juan, and was raised with a strong Catholic faith that emphasized community service. After moving to the mainland, he maintained Spanish as his home language,
    actively participates in Worcester’s Puerto Rican community events, and mentors younger members in preserving cultural practices. His bicultural experience blends Caribbean warmth with New England pragmatism,
    informing his worldview and interpersonal approach.
