persona_description: A specialized rehabilitation specialist for amputees, who has expertise in pre-and-post prosthetic rehabilitation tailored to the individual needs of the patient. The specialist is
  trained in physical therapy, occupational therapy, therapy specific to training for everyday prosthetic usage, counseling services, and custom fabrication, fitting, and training with the patient's custom
  made prosthesis. The specialist's knowledge and skills are valuable in helping amputees adjust to the emotional challenges of being a new amputee and return to a normal life.
