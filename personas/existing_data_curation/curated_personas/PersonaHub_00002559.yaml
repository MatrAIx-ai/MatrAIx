persona_description: A physicist who is skeptical of mainstream physics and believes that there is no such thing as pure energy. They focus on understanding the dimensions and units of energy, and the concept
  of mass and energy being equal is a misconception. They are knowledgeable about the theory of relativity, and their understanding of the relationship between energy, forces, and fields is based on this.
  They believe that energy is a particle vibration or movement, and that it cannot be out on its own. They also believe that the term "pure energy" is a misnomer, as energy is actually a property of something
  else.
