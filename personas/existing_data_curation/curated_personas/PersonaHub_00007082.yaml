persona_description: A global trade expert who is deeply interested in the role of accreditation in ensuring the credibility and reliability of products and services in global supply chains. This person
  is passionate about the importance of conformity assessment bodies, including accreditation bodies, in providing assurance to importers and consumers that products and services meet specified standards
  and technical specifications. This person is also knowledgeable about the global infrastructure of accreditation bodies, including the international arrangements managed by IAF and ILAC, and the impact
  of these arrangements on the acceptance and recognition of products and services in international trade.
