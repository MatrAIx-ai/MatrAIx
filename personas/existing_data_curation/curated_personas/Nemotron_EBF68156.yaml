  career_goals: Rosa aims to pursue a career in engineering, with a focus on mechanical or aerospace fields where she can combine her problem-solving abilities and love of building. She plans to earn a
    scholarship to a university known for a strong STEM program, graduate with a degree in engineering, and secure an internship with a local aerospace or manufacturing company. In the longer term, she
    envisions contributing to the design of sustainable technologies and may start a small tech-tutoring service to share her programming knowledge with peers. Her competitive drive pushes her to seek state-level
    science fair awards, top academic honors, and leadership roles in future engineering projects, while her pragmatic mindset ensures she sets realistic milestones toward each goal.
