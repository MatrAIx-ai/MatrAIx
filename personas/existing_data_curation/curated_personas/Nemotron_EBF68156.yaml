personas:
  professional: Rosa Daluz, a 15‑year‑old budding software hobbyist, channels her love for logic puzzles and model‑building into small programming projects, crafting simple games and automation scripts
    with meticulous documentation, entering online coding challenges where her competitive streak shines, and balancing curiosity about new technologies with a practical, methodical workflow.
  sports: Rosa Daluz, a member of the Oakridge Trail Running Club, logs three‑ to four‑mile runs each weekend, follows the Chicago Bulls and Chicago Cubs avidly on TV, and occasionally joins the school’s
    intramural volleyball team, preferring structured, low‑impact activities over crowded sports environments.
  arts: Rosa Daluz, an acoustic‑guitar enthusiast, practices finger‑picking to the mellow tunes of Joni Mitchell and the indie sensibilities of Mitski, curates a personal playlist that includes the ambient
    soundtracks of Vangelis, and spends free evenings editing landscape photos inspired by Ansel Adams, while also re‑reading classic science‑fiction authors like Isaac Asimov for creative spark.
  travel: Rosa Daluz, a meticulous planner, documents each trip in their journal, prefers weekend getaways to places like Yosemite National Park and the coastal town of Monterey where they can hike and
    photograph cliffs, dreams of exploring Iceland’s waterfalls and Kyoto’s temples, and budgets travel by saving a portion of their allowance each month, balancing school obligations with wanderlust.
  culinary: Rosa Daluz, a novice cook, frequently prepares quick yet wholesome meals like avocado toast with chili flakes, spaghetti carbonara, and matcha‑lime smoothies, enjoys experimenting with fresh
    basil, Parmesan, and smoked paprika in their dishes, and occasionally indulges in ordering sushi rolls with salmon and cucumber after a successful coding milestone.
  core: Rosa Daluz is a methodical 15‑year‑old who blends a competitive love for puzzles with quiet creativity, channeling curiosity into coding, model‑building, and solitary hikes, all while rigorously
    budgeting and maintaining a disciplined health routine.
background:
  cultural: Rosa was born and raised in Prattville, a small city in Alabama's heartland, where her family blends traditional Southern hospitality with a strong emphasis on education and personal responsibility.
    Her ancestry is largely Anglo-American with German roots, and her household observes community customs such as attending church services, family gatherings featuring Southern cuisine, and participation
    in local events like the Prattville Christmas Parade. While she respects these cultural traditions, her parents also encourage independence, critical thinking, and academic ambition, shaping Rosa's
    pragmatic outlook and competitive spirit.
