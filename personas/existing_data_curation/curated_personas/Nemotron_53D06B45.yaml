personas:
  professional: Edward Haraway, a seasoned hospitality veteran with over forty years of hands‑on lodging management, leverages their methodical, curiosity‑driven mindset to coordinate staff, tighten budgets,
    ensure regulatory compliance, and embed sustainable practices while mentoring the next generation of hotel managers.
  sports: Edward Haraway enjoys low‑impact fitness through weekly walks of Baltimore’s historic neighborhoods, is a devoted fan of the Baltimore Ravens and the Baltimore Orioles, and they belong to a senior
    bowling league at the local community center that meets on Saturday evenings.
  arts: Edward Haraway finds solace in photographing historic architecture, admiring the realism of Edward Hopper, attending jazz concerts featuring the late Billie Holiday’s recordings, and they regularly
    visit the Walters Art Museum to study 19th‑century American portraiture.
  travel: Edward Haraway plans trips with meticulous itineraries, favoring historic destinations like Annapolis, the colonial streets of Williamsburg, and a cherished pilgrimage to St. Augustine, Florida,
    while they dream of a guided tour of Scotland’s castles, always traveling by train or comfortable cruise when possible.
  culinary: Edward Haraway delights in preparing classic Maryland crab cakes seasoned with Old Bay, simmering garden‑fresh tomato soup, and baking whole‑grain sourdough bread, yet they often indulge in
    a mid‑afternoon snack of cheese and crackers while reading a biography.
  core: Edward Haraway blends a curiosity for history with a pragmatic, organized approach to life, balancing solitary hobbies, frugal finances, and a gentle dedication to community service, and they find
    quiet fulfillment in small, purposeful routines.
background:
  cultural: Edward grew up in a working‑class family in Baltimore County in the post‑World War II era. His upbringing emphasized hard work, community responsibility, and respect for established customs.
    He was raised with a blend of Mid‑Atlantic cultural influences—local sports loyalty, seasonal festivals, and a strong sense of neighborhood cohesion—shaping his cooperative and considerate nature. Though
    he identifies as white American, his personal values reflect the modest, pragmatic ethos of the mid‑century Baltimore region.
attributes:
  skills: '["Hospitality management", "Staff training and development", "Customer service excellence", "Budgeting and financial oversight", "Facility maintenance coordination", "Scheduling and shift planning",
