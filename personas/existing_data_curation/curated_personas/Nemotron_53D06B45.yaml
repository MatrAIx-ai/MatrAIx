    "Quality assurance and process improvement"]'
  hobbies: '["Reading historical nonfiction", "Genealogy research", "Woodworking", "Gardening", "Playing chess", "Fishing", "Photography of historic architecture", "Attending local historical society meetings",
    "Listening to classical music", "Volunteering at community food bank"]'
  career_goals: In the remaining years of his career, Edward aims to mentor the next generation of hospitality staff, formalize a sustainability program for his hotel to reduce waste and energy use, and
    document best‑practice procedures for future managers. He also hopes to transition smoothly into a part‑time consulting role that allows him to share his expertise while spending more time with his
    wife and pursuing personal interests.
