persona_description: A planning professional who specializes in advising on the environmental effects of airports and airfields, as well as general policies related to new development or expansion. They
  have a thorough understanding of planning legislation, regulations, development plans, public inquiries, permitted development rights, environmental assessment, and planning agreements. They have experience
  with updating their guide to incorporate changes in planning policy and are knowledgeable about the impacts of airport expansion, the planning process, and the preparation of environmental statements.
  They are familiar with presenting at public inquiries and have a deep understanding of the Air Transport White Paper and airport masterplans.
