personas:
  professional: Mary Wood is an aspiring health‑sciences student who leverages her meticulous organizational skills, people‑focused communication, and competitive drive to coordinate school club events
    and study for certification exams, reflecting her preference for structure and social engagement.
  sports: Mary Wood plays for the River Rovers co‑ed soccer club, attends hip‑hop dance sessions three times a week, and follows the LA Galaxy in MLS and the Chicago Bulls in the NBA, treating fitness as
    a structured outlet for her competitive nature.
  arts: Mary Wood sketches fan art of Studio Ghibli characters, sings along to pop hits by Ariana Grande and Taylor Swift and indie tracks by Phoebe Bridgers, and regularly performs in school drama productions
    featuring works by Lin‑Manuel Miranda, weaving her creative expression into a predictable rehearsal routine.
  travel: Mary Wood plans trips with detailed checklists, enjoys weekend escapes to Yosemite National Park and urban explorations of Washington, D.C., and dreams of a spring backpacking adventure across
    Japan to experience anime culture and traditional tea ceremonies.
  culinary: Mary Wood prepares simple yet tasty meals like spaghetti carbonara, spiced chicken tacos, and stir‑fried noodles flavored with sriracha and fresh basil, often meal‑prepping on Sundays to sustain
    her active schedule while occasionally treating herself to pepperoni pizza.
  core: Mary Wood is a structured, socially vibrant teen whose competitive fire fuels soccer, gaming, and event planning, yet her intense anxiety and occasional impulse spending can derail her otherwise
    meticulous routine.
background:
  cultural: Mary was raised in a predominantly white, middle‑class neighborhood of Lansing, Michigan. Her family’s heritage includes German and Irish roots, reflected in occasional cultural traditions such
    as holiday baking recipes passed down through generations. Growing up near Michigan State University, she has been exposed to a blend of college‑town dynamism and typical Midwestern values—hard work,
    community involvement, and modesty. Local customs like attending the Michigan State Fair, celebrating Thanksgiving and Fourth of July with family gatherings, and participating in church‑related events
    have shaped her sense of belonging. The regional emphasis on teamwork in school sports and community service aligns with her sociable yet competitive nature.
attributes:
  skills: '["Event planning and coordination", "Basic cooking and household management", "Simple home‑repair tasks", "Microsoft Office and Google Suite proficiency", "Social‑media coordination", "Interpersonal
    communication and conflict mediation", "Time management and deadline adherence", "Reflective journaling"]'
  hobbies: '["Community soccer league", "Hip‑hop dance classes", "School drama club", "Multiplayer video gaming", "Sketching and drawing", "Listening to pop/indie music", "Journaling for emotional processing",
    "Volunteering at a local animal shelter"]'
  career_goals: Mary aims to complete her GED within the next year and enroll in a community‑college associate program focused on health sciences or business administration. She envisions a career that
    offers clear structure and advancement opportunities, such as a medical assistant, dental hygienist, or office manager. Her competitive drive pushes her to seek certifications (e.g., Certified Medical
    Assistant) and to eventually secure a stable, full‑time position where she can apply her organizational strengths and interpersonal skills while continuing to develop professionally.
