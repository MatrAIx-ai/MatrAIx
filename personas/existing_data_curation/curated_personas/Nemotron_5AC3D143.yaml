  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Photography'', ''Science-fiction reading'', ''Philosophy reading'', ''Cooking Mexican‑Southern fusion cuisine'', ''STEM volunteer mentoring'',
    ''Yoga'', ''Meditation'', ''Exploring new tech gadgets'']'
  career_goals: Darlin aims to earn her Professional Engineer (PE) license within the next three years and transition into a senior engineering role where she can lead multidisciplinary projects that blend
    functional performance with artistic design. She aspires to spearhead sustainable product initiatives, develop eco‑friendly manufacturing processes, and eventually launch her own consultancy that offers
    innovative engineering solutions for small‑scale manufacturers. Driven by competition, she also seeks industry recognition—such as the ASME award for innovative design—and plans to pursue continuing‑education
    courses in advanced materials and sustainable design while maintaining the flexibility to nurture her creative pursuits.
