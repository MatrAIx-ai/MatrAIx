  hobbies: '[''basketball pick‑up games'', ''community gym leagues'', ''Kansas City Chiefs and Royals fan events'', ''trivia nights'', ''live soul and blues concerts'', ''car restoration projects'', ''fishing
    trips'', ''weekend barbecues'', ''pool league'', ''poker nights'']'
  career_goals: Victor aims to move up from an individual contributor to a supervisory role on his production floor, seeking a shift supervisor or team lead position within the next two to three years.
    He plans to earn certifications in CNC programming and Lean Six Sigma to bolster his qualifications. Long‑term, he envisions starting a small consulting practice that helps mid‑size manufacturers implement
    practical efficiency upgrades, leveraging his blend of curiosity and hands‑on expertise. Financially, he hopes to increase his earnings to better provide for his teenage child and eventually purchase
    a home in a stable neighborhood.
