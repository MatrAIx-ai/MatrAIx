    local code compliance", "Customer service and communication", "Apprentice mentorship and training", "Use of diagnostic software and handheld tools", "Electrical wiring for HVAC components"]'
  hobbies: '["Bowling league participation", "Attending high‑school sports events", "Fishing at local reservoirs", "Classic car restoration", "Woodworking and furniture building", "Guitar playing at community
    gatherings", "Neighborhood barbecues and potlucks", "Volunteering at the local food bank", "DIY smart‑home and home‑automation projects", "Gardening and maintaining a small vegetable patch", "Local
    history research and reading"]'
  career_goals: Carlos aims to become a certified Master HVAC Technician and obtain advanced certifications in green and renewable HVAC technologies. He plans to expand his expertise in solar‑assisted heating
    and geothermal systems, positioning himself as a local resource for energy‑efficient home upgrades. Over the next few years, he hopes to transition from a full‑time service role to operating his own
    small, community‑focused HVAC business that offers affordable maintenance packages and free seasonal checks for low‑income households. He also aspires to continue mentoring the next generation of tradespeople
    through formal apprenticeship programs and occasional community workshops.
