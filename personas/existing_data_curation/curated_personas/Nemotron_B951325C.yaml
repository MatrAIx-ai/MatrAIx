  career_goals: Although retired, Ashley remains driven by a sense of purpose. She aspires to mentor high‑school and community‑college students in STEM through local after‑school programs, sharing her curiosity
    while emphasizing practical problem‑solving. She hopes to author a memoir that chronicles her experiences as a woman in science during the mid‑20th century, preserving her personal and professional
    legacy. Continuing her lifelong learning, she plans to complete an online course on artificial‑intelligence fundamentals to stay mentally sharp and to use that knowledge to help seniors navigate emerging
    technologies. Maintaining health and independence is a personal ambition, prompting her to stay active, manage anxiety through mindfulness, and remain engaged in community service.
