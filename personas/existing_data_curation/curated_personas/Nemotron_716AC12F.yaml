personas:
  professional: John Gunn, a 15‑year‑old aspiring wildlife conservationist and active 4‑H club member, applies his hands‑on practicality and love of precision to assist with local habitat monitoring and
    small‑scale animal surveys, while his laid‑back attitude lets him adapt to the unpredictable rhythms of field work.
  sports: John Gunn, a 15‑year‑old skateboard enthusiast who spends weekends at the Idaho Falls Skate Club, also follows the Boise State Broncos football team and the Idaho Vandals basketball squad, and
    joins his dad for seasonal deer and upland‑bird hunts, balancing casual fitness with practical outdoor activity.
  arts: John Gunn, a teen model‑kit builder, draws creative inspiration from classic cars like the 1965 Mustang and WWII aircraft, pairs this precision hobby with a love for classic rock icons such as Led
    Zeppelin and country storytellers like John Denver, shaping their leisure time with both technical craftsmanship and melodic nostalgia.
  travel: John Gunn, a 15‑year‑old who dreams of exploring Glacier National Park’s backcountry and the historic streets of Portland, prefers spur‑of‑the‑moment road trips with family over meticulously planned
    vacations, though a limited budget keeps their adventures focused on nearby western destinations like Yellowstone and the Snake River.
  culinary: John Gunn, an outdoors‑oriented teen, favors hearty fare such as grilled trout with lemon and dill, peppered steak, and campfire chili loaded with beans, corn, and smoked paprika, enjoys cooking
    over a camp stove using fresh sage, yet often grabs fast‑food pizza after late‑night gaming sessions.
  core: John Gunn is a practical, nature‑obsessed teen who balances methodical model‑building with spontaneous skate sessions, yet can’t resist late‑night video‑game raids and occasional skipped dentist
    appointments.
background:
  cultural: John grew up in Idaho Falls, a small‑city community deeply rooted in a culture of self‑reliance, outdoor recreation, and close‑knit neighborliness. His family’s background includes a mix of
    farming and ranching traditions, which shapes his practical, hands‑on outlook and reverence for the land. Local customs such as the annual Idaho State Fair, community potlucks, and volunteer events
    through the county’s 4‑H club have reinforced a sense of communal responsibility and teamwork. While the region is predominantly Christian, John’s household participates in occasional church gatherings,
    which contribute to a modest, value‑centered upbringing. The broader Idaho culture—characterized by a pragmatic work ethic, respect for nature, and an appreciation for sustainable living—continues to
    influence his everyday decisions and future aspirations.
