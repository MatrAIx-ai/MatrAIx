  career_goals: John aspires to turn his hands‑on abilities into a career as a certified automotive technician. After earning his high school diploma or GED, he plans to enroll in a vocational trade school
    where he can obtain an ASE certification and gain an apprenticeship at a local repair shop in Idaho Falls. He envisions eventually opening his own garage or working on engines for a regionally known
    dealership. While he values the structure and steady income of a trade career, he also wants enough flexibility to continue his outdoor hobbies and consider a short stint in the U.S. Navy to experience
    a highly organized environment and gain additional technical training. In the short term, his goals include earning a driver's license, completing a basic safety certification, and volunteering for
    a community service project to strengthen his resume.
