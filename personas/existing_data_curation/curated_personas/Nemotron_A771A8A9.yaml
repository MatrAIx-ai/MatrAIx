  hobbies: '[''Book club participation'', ''Community theater acting and attendance'', ''Line dancing and social dancing'', ''Gardening with heirloom and native plants'', ''Genealogy research'', ''Knitting
    and quilting'', ''Competitive bridge and card games'', ''Cooking and recipe exchange gatherings'']'
  career_goals: Although retired from formal employment, Amber aims to leverage her experience to mentor younger volunteers and ensure the continuity of community traditions in Covington. She plans to spearhead
    a local heritage project that records oral histories of longtime residents, while also establishing a community garden that provides fresh produce to senior centers. Additionally, she aspires to raise
    funds for the town’s historic theater, hoping to create a sustainable venue for local performers and storytellers.
