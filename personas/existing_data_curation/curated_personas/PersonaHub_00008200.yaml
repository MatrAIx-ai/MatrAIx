persona_description: A practitioner researcher who is interested in conducting both qualitative and quantitative research in education, particularly in the use of ICT in education. This person is looking
  for a guide and examples to help them understand and apply the Practitioner Research Stages and their project. They are also interested in the subject associations that publish journals for their members
  and the magazines and professional journals that are keen to receive articles from teachers. This person is also interested in the process of action research and how it can be used in education.
