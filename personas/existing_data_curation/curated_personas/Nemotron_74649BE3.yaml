  career_goals: Although retired from the formal workforce, Kristi aims to leave a lasting legacy through community service and mentorship. She aspires to join the board of a local charitable organization,
    offering her strategic and financial expertise to shape sustainable programs. Additionally, she plans to provide occasional consulting to small businesses in North Little Rock, helping them refine their
    operations and financial planning. Kristi also hopes to develop a workshop series on financial literacy for seniors, combining her passion for education with her practical skill set.
