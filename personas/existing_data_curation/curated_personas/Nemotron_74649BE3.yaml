personas:
  professional: Kristi Bostic, a retired business manager with a graduate background in management, leverages her strategic planning, budgeting acumen and conflict mediation skills to lead nonprofit volunteer
    programs, mentor senior entrepreneurs, and guide board-level decisions with a pragmatic, structured approach.
  sports: Kristi Bostic enjoys low‑impact fitness through morning walks on the Arkansas River Trail, cheering on the Arkansas Travelers baseball team and the Arkansas Razorbacks football squad, and participates
    in a weekly senior softball league that blends social interaction with gentle exercise.
  arts: Kristi Bostic channels creative energy into quilting intricate patterns inspired by historic textile designs, reads historical fiction authors like Philippa Gregory and Ken Follett, and finds inspiration
    from musicians such as Emmylou Harris and folk painter Andrew Wyeth, which enriches her appreciation for narrative and visual art.
  travel: Kristi Bostic prefers well‑planned road trips to historically rich destinations like Little Rock Central High School, Natchez, and the Delta blues trail in Mississippi, balancing budget-friendly
    lodging with occasional splurges on guided tours, and often travels with a small group of book‑club friends to share cultural experiences.
  culinary: Kristi Bostic loves cooking Southern comfort foods such as fried catfish, collard greens seasoned with smoked turkey, cornbread, and sweet potato pie, skillfully layering flavors using buttermilk,
    okra, and local honey, while hosting weekly church potluck dinners that showcase her reliable, generous hospitality.
  core: Kristi Bostic blends structured financial savvy, community‑focused stewardship, and a love for hands‑on creativity, navigating retirement with disciplined budgeting, proactive health habits, and
    a steady rhythm of quilting, gardening, and mentorship.
background:
  cultural: Kristi comes from a southern white American background rooted in Arkansas's small‑town culture. Raised in a close‑knit family with Protestant (Methodist) values, she was taught the importance
    of hospitality, community involvement, and respect for tradition. Her upbringing emphasized hard work, self‑reliance, and a sense of responsibility toward neighbors, which continues to shape her volunteerism
    and interpersonal style. While she embraces classic Southern customs—such as weekend church gatherings, family meals, and local festivals—she also values education and professional achievement, reflecting
    the blend of traditional values and modern aspirations common among her generation in the Arkansas Delta region.
