persona_description: A member of the IP Telephony (iptel) Working Group who is responsible for updating the specification based on extensive experience with the tel URI, a protocol that specifies a URI
  for telephone numbers. This individual is responsible for developing any extensions to the tel URI, such as support for number portability indicators and trunk groups, and is also involved in generating
  a MIB document for TRIP. Additionally, this individual is working on a standards track update to the tel URI and standards track extensions to the tel URI for PSTN, including number portability and trunk
  group identification.
