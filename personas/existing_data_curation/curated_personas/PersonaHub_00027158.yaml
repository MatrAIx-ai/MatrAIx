persona_description: A marketing manager or brand strategist who is interested in understanding the impact of brand mascots and media characters on children's diet and health. This individual is curious
  about the evidence-based approach to evaluating the responsible use of these characters in marketing products that are high in added sugars, salt, and fat. They are also interested in the strategies that
  food, beverage, and restaurant industry leaders can use to hold themselves accountable for their marketing practices and respond to consumer appeals for stronger commitments to promoting only healthy
  food and beverage products to children ages 14 and younger.
