  career_goals: Although retired, Ned aims to remain an active contributor to his town of Buxton. He hopes to mentor younger volunteers at the local senior center, help organize the annual summer arts fair,
    and document the region’s folk art traditions for the historical society. He also aspires to travel to a few major art museums in New England, write a memoir that weaves together personal stories and
    local history, and maintain his health through regular exercise and mental challenges.
