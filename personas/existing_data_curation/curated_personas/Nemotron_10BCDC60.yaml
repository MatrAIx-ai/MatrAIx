  career_goals: Approaching retirement, Franklin aims to leverage his supervisory experience into a senior training role within the retail chain, where he can design onboarding programs and mentor emerging
    leaders. He also hopes to earn a certification in retail operations, achieve a store‑wide sales‑growth target of 7 % before stepping down, and eventually open a small community‑focused art gallery that
    showcases local Black artists and provides educational workshops.
