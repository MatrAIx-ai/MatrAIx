personas:
  professional: Jovette, a hospitality professional working as a dining room attendant and bartender helper, leverages strong multitasking, customer service, and cash-handling skills to create welcoming
    atmospheres while their spontaneous, compassion-driven nature fuels a desire to become a shift manager and eventually run a community-focused café despite occasional struggles with organization and
    deadlines.
  sports: Jovette, an avid hiker who regularly explores the Suwannee River trails and occasionally joins community runs, supports the Miami Marlins in baseball, cheers for the Jacksonville Jaguars during
    football season, and participates in a local adult softball league, balancing outdoor adventure with modest team sports involvement.
  arts: Jovette, who enjoys playing acoustic guitar to folk tunes by artists like John Prine and local singer-songwriters, devours mystery novels from authors such as Tana French, attends craft fairs and
    live music festivals, and regularly listens to food-culture podcasts featuring culinary storytellers, weaving artistic appreciation into their everyday life.
  travel: Jovette prefers spontaneous road trips to natural destinations like Ocala National Forest or Savannah, Georgia, often planning last-minute itineraries driven by curiosity and a love for Southern
    landscapes, while also dreaming of a culinary pilgrimage to New Orleans to explore its vibrant food scene, all within a modest travel budget.
  culinary: Jovette, an enthusiastic home cook who experiments with Southern comfort dishes like shrimp and grits, fried chicken with homemade biscuits, and collard greens seasoned with smoked turkey, sources
    ingredients from the local farmer's market, enjoys improvising flavors with herbs such as thyme and rosemary, and often shares surplus meals with the community pantry, reflecting both culinary skill
    and generosity.
  core: Jovette is a compassionate, spontaneous hospitality worker who blends a love for community service, Southern cooking, and outdoor exploration, while habitually juggling multiple projects and occasionally
    procrastinating on administrative tasks.
background:
  cultural: Jovette grew up in a working‑class family in rural Florida, immersed in Southern hospitality and community‑centered values. Her cultural upbringing blends traditional Southern customs—such as
    shared meals, church gatherings, and a strong sense of neighborly support—with the multicultural influences of the Gulf Coast, including a love for fresh seafood and diverse culinary traditions. Living
    in Live Oak and the surrounding Suwannee County has fostered a pragmatic outlook, respect for the natural environment, and a deep commitment to helping others maintain harmony within her community.
attributes:
  skills: '[''Customer service'', ''Multitasking'', ''Food safety and sanitation'', ''Cash handling and POS operation'', ''Beverage preparation'', ''Conflict resolution'', ''Team collaboration'', ''Empathy
    and active listening'', ''Adaptability to new menu items'', ''Basic first aid'']'
  hobbies: '[''Hiking and nature walks'', ''Gardening native plants'', ''Experimenting with cooking and baking'', ''Volunteering at food pantry'', ''Reading mystery novels'', ''Playing acoustic guitar'',
    ''Attending local festivals and craft fairs'', ''Listening to food‑culture podcasts'', ''DIY home décor projects'']'
  career_goals: Jovette aims to advance into a supervisory role within the hospitality sector—such as shift manager or assistant manager—where she can shape a supportive, cooperative team environment. Over
    the longer term, she dreams of opening her own modest café or community kitchen that emphasizes locally sourced ingredients, Southern comfort foods, and an inclusive atmosphere. To reach these goals,
    she plans to enroll in a hospitality‑management certification at a community college, strengthen her organizational and scheduling skills, and gain experience in event planning and menu development.
    Ultimately, she wants her business to serve as both a thriving eatery and a hub for job‑training and community outreach, reflecting her deep desire to help others and maintain harmony.
