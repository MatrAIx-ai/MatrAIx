  career_goals: Eunyoung aims to launch her career in a fast‑paced consulting or product‑focused technology firm where she can apply her analytical rigor and organizational talent. In the next three years
    she targets a senior analyst or associate product manager role, leading high‑impact projects and shaping market strategies. She plans to obtain an MBA within five years to broaden her strategic perspective
    and eventually move into a director‑level position overseeing a global business unit. Her long‑term ambition is to establish her own venture that merges technology and consumer services, leveraging
    her competitive edge to build a market‑leading brand.
