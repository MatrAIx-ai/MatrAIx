  career_goals: Although currently outside the formal workforce, Brandie is motivated to re‑enter employment in a role that honors her need for flexibility and leverages her hands‑on skill set. She plans
    to earn her high school equivalency (GED) within the next year, which will qualify her for entry‑level positions in community‑focused settings, such as a volunteer coordinator at a local environmental
    nonprofit or a support aide in a senior‑care facility. In the longer term, she aspires to launch a home‑based craft venture—selling handmade pottery, garden accessories, and small home décor items—allowing
    her to work on her own schedule while expressing her creativity. Improving her organizational habits and reducing stress through structured routines are also central to her personal development plan.
