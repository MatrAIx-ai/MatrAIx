persona_description: A geographer and archaeologist who specializes in the study of traditional Dao iconography and the transfer of knowledge through symbols. He has recently discovered a link between early
  Asian-Pacific people's iconography and cave pictographs found in New Zealand, and suggests that humans visited New Zealand before the generally accepted time frame of 1000 years ago, which runs contrary
  to current New Zealand academic accounts of the first people to arrive in the country. His research interests include the study of ancient Asian-Pacific cultures and their iconography, as well as the
  transfer of knowledge through symbols.
