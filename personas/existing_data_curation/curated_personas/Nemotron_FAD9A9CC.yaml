    development'', ''Organizational planning and time management'']'
  hobbies: '[''Salsa dancing'', ''Hiking in the San Gabriel Mountains'', ''Cooking Mexican cuisine'', ''Arduino and DIY electronics projects'', ''Reading science‑fiction novels'', ''Volunteering in after‑school
    STEM clubs'', ''Yoga and mindfulness practice'', ''Participating in community trivia and board game nights'', ''Organizing cultural festivals'']'
  career_goals: Driven by a competitive spirit and a desire for tangible impact, Luz aims to become a STEM curriculum specialist within her district, leading the development of culturally responsive science
    and math programs that reflect her Mexican heritage. She plans to pursue a master’s degree in educational leadership to qualify for an assistant principal role, where she can champion school‑wide innovation
    and mentor new teachers. Luz also aspires to secure funding for an after‑school robotics club, earn state‑level teaching awards, and publish research on the efficacy of project‑based learning in diverse
    classrooms. Balancing her ambition with personal well‑being, she is committed to establishing a healthier work‑life balance to mitigate stress.
