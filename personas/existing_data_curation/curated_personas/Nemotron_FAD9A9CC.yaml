personas:
  professional: Luz Hernandez, a bilingual STEM educator at a public high school, blends deep math and science expertise with evidence‑based teaching, designing differentiated, data‑driven lessons while
    leading project‑based learning initiatives and mentoring peers with a pragmatic yet curious mindset.
  sports: Luz Hernandez, an energetic salsa dancer and hiking enthusiast, leads a community dance troupe, hikes the San Gabriel Mountains on weekends, roots for the LA Dodgers and Lakers, and occasionally
    joins a co‑ed adult soccer league.
  arts: Luz Hernandez, a lover of rhythm and narrative, channels creativity through salsa choreography, binge‑reads science‑fiction authors like N.K. Jemisin and Isaac Asimov, and enjoys live performances
    from local Latin jazz bands and indie singer‑songwriters.
  travel: Luz Hernandez, who prefers active travel, often escapes city life for weekend camping trips in the San Gabriel range, dreams of trekking Patagonia’s Torres del Paine, and yearns to explore the
    historic streets of Seville for its vibrant dance culture.
  culinary: Luz Hernandez, an avid home cook, perfects family recipes such as slow‑cooked stew brimming with chilies, corn‑based dumplings, and fresh salsa, while experimenting with Japanese ramen broth
    and Mediterranean herb‑infused olive oil.
  core: Luz Hernandez, a competitive yet caring STEM teacher, balances a love for salsa dancing and tech tinkering with chronic worry and an unrelenting quest for data‑driven excellence, often letting anxiety
    drive meticulous planning while still carving out time for spontaneous hikes.
background:
  cultural: Luz was raised in a Mexican‑American household where Spanish and English were spoken interchangeably, fostering a bilingual fluency that she brings to her classroom. Her family places a strong
    emphasis on close intergenerational relationships, community gatherings, and cultural celebrations such as Día de los Muertos, Mexican Independence Day, and traditional culinary festivals. Growing up
    in Southern California’s multicultural landscape, she navigated a bicultural identity that blends Mexican customs with the diverse influences of the Los Angeles region. This background informs her commitment
    to incorporating culturally relevant examples and bilingual resources into STEM lessons, aiming to make content relatable for her predominantly Latino student body. Luz also actively participates in
    local Latino community events, volunteer initiatives, and cultural organizations in Chino Hills, reinforcing her connection to her heritage while contributing to the broader community.
attributes:
  skills: '[''Mathematics instruction (K‑8)'', ''Science curriculum development'', ''Bilingual (English/Spanish) communication'', ''Differentiated instruction'', ''Educational technology integration (Google
