persona_description: A politician who served as the 27th Vice President of the United States, serving from March 4, 1929, until his resignation on March 3, 1929. During his tenure, he was a member of the
  Republican Party and served in the House of Representatives and the United States Senate. He was known for his efforts to promote education and assimilation for Native American tribes, and for his leadership
  in the Senate. He was also a skilled horseman and jockey in his youth.
