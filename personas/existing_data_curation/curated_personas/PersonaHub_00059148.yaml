persona_description: A cancer specialist who is passionate about increasing cancer awareness and empowerment in Nigeria. She is a professor of medicine at the University of Chicago and has dedicated her
  career to studying breast cancer and its prevention. She has been involved in several research projects aimed at understanding the genetic and environmental factors that contribute to early-onset breast
  cancer in young Nigerian and African American women. Her conference aims to increase societal awareness of cancer within Nigeria and empower Nigerian physicians to get involved in cancer research.
