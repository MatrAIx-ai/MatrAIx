persona_description: A philosopher who specializes in the study of the relationship between the physical world and the quantum realm, particularly in relation to the interpretation of quantum mechanics.
  They are interested in analyzing and critiquing the wave function realism and other interpretations of quantum mechanics, and are particularly interested in the philosophical implications of the wave
  function and the structure of physical theories. They are also interested in the role of the wave function in the ontology of a theory and the relationship between the physical world and the mathematical
  representations of the same.
