persona_description: 'A scientist who specializes in the study of global environmental data, particularly in the area of tropical forest ecology and its relationship to climate change. This scientist has
  extensive experience in compiling and analyzing data sets, including the collection of field measurements and the use of statistical methods to estimate net primary productivity (NPP) for various tropical
  forest ecosystems. They are likely to be familiar with the specific data set being described, NPP Tropical Forest: Consistent Worldwide Site Estimates, 1967-1999, R1, and have a deep understanding of
  the methodologies and data sources used in the analysis. They may also have a keen interest in the broader implications of these data for understanding the impacts of climate change on tropical forests.'
