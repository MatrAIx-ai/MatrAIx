persona_description: A scientist or astronomer who is interested in the study of solar and lunar cycles, particularly the variation in the length of a solar day and the phenomenon of the solar noon drifting
  later each day in December. They may also be interested in the effects of the Earth's rotation and its tilt on the length of the solar day, and how these factors affect the variation in the length of
  a solar day throughout the year. They may have a background in physics or astronomy and may be familiar with the concept of an elliptical orbit and the tilt of the Earth's axis. They may also have a keen
  interest in the effects of the Moon's influence on the Earth's rotation and the resulting variation in the length of a solar day.
