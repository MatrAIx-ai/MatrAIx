persona_description: William Dowdall is a leading Irish classical musician who specializes in the solo flute. He is known for his performances with the RTÉ National Symphony Orchestra, RTÉ Concert Orchestra,
  and Irish Chamber Orchestra. He has given over 50 solo performances, performed at major festivals in Ireland, and has been a member of various chamber music ensembles. He has also developed a workshop
  on contemporary solo flute music by Irish composers, which has been well-received in Europe. Dowdall has premiered new works by John Buckley and has actively promoted Irish composer works abroad.
