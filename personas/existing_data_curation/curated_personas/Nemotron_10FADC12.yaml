personas:
  professional: Christina Kuhnert, a pint-size pretender who spends weekday afternoons turning the living room into a make-believe classroom, orchestrating imaginary lesson plans for stuffed animals while
    humming numbers and shapes, demonstrating a natural curiosity for abstract concepts even though she resists the structure of tidy worksheets.
  sports: Christina Kuhnert, an enthusiastic playground explorer who loves swinging high at the local park, participates in the community's Tiny Tots Soccer classes on Saturday mornings, and roots for the
    Philadelphia Eagles while waving a mini jersey, yet she often forgets to line up for group games, preferring free-form tag.
  arts: Christina Kuhnert, an imaginative mini-artist who spends afternoons finger-painting abstract swirls reminiscent of Van Gogh's stars, builds towering structures with Duplo bricks while humming tunes
    by Raffi, and is captivated by the colorful animations of Disney's Frozen and Moana, which shape her playful aesthetic.
  travel: Christina Kuhnert, an adventurous three-year-old who adores car rides to the countryside where she picks fresh strawberries at a local farm, dreams of a future trip to Disney World, enjoys bedtime
    stories about the Amish farms she visits during a weekend stay in Lancaster, but gets anxious when boarding a plane, clinging to her favorite stuffed rabbit.
  culinary: Christina Kuhnert, a picky yet curious eater who devours macaroni-and-cheese with extra butter, loves dipping apple slices in caramel, giggles while stirring play-dough 'soup' with a wooden
    spoon, and often spills orange juice on the kitchen floor, prompting her parents to turn cleanup into a game.
  core: Christina Kuhnert, a bright-eyed three-year-old whose boundless imagination collides with outspoken worry, making her a creative whirlwind who’s also prone to meltdowns over small changes.
background:
  cultural: Christina is a White child raised in Bristol, a small community in Bucks County, Pennsylvania. Her family reflects a typical suburban Mid‑Atlantic lifestyle, with involvement in local church
    activities, community preschool programs, and family gatherings that celebrate both mainstream American holidays and German‑American traditions hinted by the surname Kuhnert. Exposure to regional customs,
    neighborhood parks, and a close‑knit extended family provides her with a cultural foundation rooted in American suburban values and a touch of German heritage.
