persona_description: A psychology professor who studies the effects of prescription stimulants on cognitive abilities and academic performance in college students without ADHD. Her research focuses on the
  potential benefits and risks of these drugs, and she aims to raise awareness about the misuse of these medications among various populations. Her findings suggest that while stimulants can improve cognitive
  abilities in those with ADHD, they may have detrimental effects on students without the disorder. Her work also highlights the potential risks associated with taking stimulants without a prescription,
  including potential health risks and the potential for misuse by students.
