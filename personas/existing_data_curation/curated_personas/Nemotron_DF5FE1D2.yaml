personas:
  professional: Lamonica Hurdle, a veteran museum docent and community oral‑history curator, leverages their meticulous planning, gentle storytelling, and lifelong curiosity to guide visitors through Chicago’s
    art collections while preserving neighborhood narratives.
  sports: Lamonica Hurdle, an avid supporter of the Chicago Cubs and the Chicago Bulls, enjoys gentle morning walks in Grant Park and participates in a senior shuffleboard league at the local community
    center, viewing these activities as both social engagements and gentle exercise.
  arts: Lamonica Hurdle, a passionate quilt maker who draws inspiration from African textile patterns and modern masters such as Jacob Lawrence, frequently attends exhibitions at the Art Institute, savors
    live performances by Wynton Marsalis at the Green Mill, and leads literature circles discussing works by Toni Morrison and contemporary poets.
  travel: Lamonica Hurdle, who loves strolling historic neighborhoods, has taken organized bus tours to New Orleans during the jazz festival, visited the civil‑rights museum in Montgomery, and enjoys day
    trips to the Oak Park Frank Lloyd Wright houses, always planning trips months ahead to accommodate health needs.
  culinary: Lamonica Hurdle, a seasoned soul‑food chef, lovingly prepares gumbo with okra and smoked turkey, collard greens seasoned with homemade broth, and fresh basil pesto from their rooftop herb garden,
    while occasionally experimenting with modern twists like quinoa‑infused jambalaya.
  core: Lamonica Hurdle, a 91‑year‑old chronicler of community memory, blends disciplined organization, boundless curiosity, and a love of jazz and quilting into a life lived with deliberate generosity
    and occasional forgetfulness about medication.
background:
  cultural: Lamonica was born in 1934 in the Jim Crow South and moved with her family to Chicago’s South Side during the Great Migration. Growing up in a tightly knit African‑American neighborhood, the
    church, gospel music, and community halls shaped her early worldview. She lived through the civil‑rights movement, finding purpose in social justice and collective uplift. Over the decades, Chicago’s
    vibrant blues and jazz scene, its rich museum culture, and the legacy of Black artists infused her identity. She carries forward Southern cooking traditions, oral storytelling, and a reverence for African
    heritage, while also embracing contemporary art and ideas. Her cultural background is a tapestry of resilience, creativity, and a lifelong curiosity about the world.
