persona_description: A medical professional with expertise in the treatment and management of alcoholism. This person is likely to be a psychiatrist, psychologist, or addiction specialist who has conducted
  extensive research on the pharmacological treatments for alcoholism. They are familiar with the various medications and psychotherapeutic interventions used in the treatment of alcohol dependence and
  have evaluated their efficacy in reducing the number of drinks consumed, the number of days on which a drink was consumed, the resumption of drinking and episodes of heavy drinking and craving. They are
  also likely to be aware of the limitations of these treatments and the need for further research to optimize the use of pharmacologic agents for treatment of alcoholism.
