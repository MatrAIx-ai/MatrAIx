persona_description: A healthcare professional who is trained in the diagnosis and treatment of heat-related illnesses, particularly heat exhaustion and heat stroke. This person is likely to be a doctor,
  nurse, or paramedic who has experience working in hot environments and has received specialized training in heat-related illnesses. They are knowledgeable about the symptoms of heat exhaustion and heat
  stroke, the assessment and diagnosis of these conditions, and the appropriate treatment and monitoring of patients with these illnesses. They may also have experience working in emergency settings and
  are familiar with the steps to take in an emergency situation involving heat-related illnesses.
