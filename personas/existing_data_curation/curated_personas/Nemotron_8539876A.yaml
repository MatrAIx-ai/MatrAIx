    communication'']'
  hobbies: '[''Vegetable gardening'', ''Traditional Mexican cooking'', ''Community volunteering (electrical safety workshops)'', ''Walking/hiking in the San Bernardino foothills'', ''Yoga and meditation'',
    ''Reading technology blogs'', ''DIY home improvement projects'', ''Playing acoustic guitar'', ''Attending local cultural festivals'', ''Journaling'']'
  career_goals: Denise aims to transition from full‑time field work to a mentorship and supervisory role, seeking Master Electrician certification to formalize her expertise. She dreams of launching a small
    family‑owned contracting firm that specializes in sustainable retrofits for homes in Eastvale, blending her practical skills with her interest in green technology. Additionally, she hopes to develop
    a community outreach program that offers free electrical safety workshops for seniors and youth, allowing her to give back while reducing her own work‑related stress. Maintaining her health and emotional
    well‑being remains a priority, so she plans to incorporate regular mindfulness practices into her routine.
