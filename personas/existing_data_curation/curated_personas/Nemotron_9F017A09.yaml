  hobbies: '[''Visiting art museums'', ''Guided historic walking tours'', ''Senior theatre group involvement'', ''Gardening'', ''Cooking Southern cuisine'', ''Bridge (card game)'', ''Chess'', ''Volunteer
    storytelling at senior center'', ''Photography'', ''Attending jazz and classical concerts'']'
  career_goals: Brian aims to preserve the cultural memory of his Atlanta neighborhood by compiling an oral‑history project that records stories from longtime residents and pairs them with local artwork
    for a traveling exhibition. He hopes to mentor younger volunteers at the senior center, teaching them event coordination, storytelling techniques, and community‑building skills. He also plans to deepen
    his knowledge of contemporary art by attending at least three major exhibitions in the next two years and enrolling in a short online course on modern art movements. A personal ambition is to write
    a memoir that intertwines his life experiences, love of art, and reflections on the evolving Southern cultural landscape, leaving a lasting legacy for future generations.
