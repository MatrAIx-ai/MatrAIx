personas:
  professional: Laqueita Wales is a community‑focused elder stateswoman who blends her humanities scholarship, public‑speaking flair, and spontaneous event‑planning style to orchestrate senior center festivals
    and champion oral‑history projects, even if deadlines sometimes slip.
  sports: Laqueita Wales enjoys strolling the county’s historic trails with her senior walking club, cheering on the Franklin County High School Tigers football team and the nearby Riverbend minor‑league
    baseball club, while staying competitively sharp at weekly bridge tournaments and Scrabble contests held at the senior center.
  arts: Laqueita Wales leads a church choir that harmonizes classic gospel hymns by Mahalia Jackson and modern folk ballads by Alison Krauss, devotes evenings to quilting inspired by William Morris patterns,
    and loses herself in historical novels by Hilary Mantel and biographies of Ruby Bridges, all of which enrich her storytelling sessions.
  travel: Laqueita Wales favors spontaneous short road trips guided by new tablet map apps, often visiting Savannah’s historic squares, the Gettysburg battlefield, and the Montgomery Museum of Fine Arts,
    balancing her love of heritage sites with the constraints of her fixed income.
  culinary: Laqueita Wales’s kitchen is a rehearsal space for Southern comfort cuisine, where she perfects fried chicken brined in buttermilk, collard greens simmered with smoked turkey, and a sweet‑potato
    casserole crowned with pecan streusel, while swapping recipes on a community Facebook group.
  core: Laqueita Wales is an 80‑year‑old charismatic storyteller who juggles church choirs, quilting marathons, and spontaneous community fairs, thriving on human connection yet occasionally letting her
    competitive edge turn friendly debates into lively battles of wits.
background:
  cultural: Laqueita grew up in a traditional white Southern family in rural Virginia during the post‑World War II era. Influenced by Southern hospitality, community solidarity, and strong church involvement,
    she values family ties and local heritage. Her cultural identity blends respect for longstanding customs—home‑cooked meals, folk crafts, and communal gatherings—with an openness to new ideas nurtured
    by lifelong curiosity. She maintains close relationships with neighboring families, participates in county fairs, celebrates regional traditions like Fourth of July picnics and Appalachian folk music,
    while also embracing modern technology to stay connected.
