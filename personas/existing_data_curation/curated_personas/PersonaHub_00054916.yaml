persona_description: A field geologist who is interested in using robots to explore and study rock formations, particularly those on Earth and Mars. The person is likely to have a background in geology
  and rock formation, and is familiar with the principles and techniques of field geology. They are interested in using robots to automate the process of identifying rock types and analyzing spectral data,
  and are eager to learn more about the capabilities and limitations of robots in this field. They may also be interested in the potential of robots to assist geologists on future missions to Mars.
