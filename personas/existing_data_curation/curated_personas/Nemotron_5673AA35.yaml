personas:
  professional: Carmella Green, a veteran computer support specialist turned aspiring senior network engineer, leverages seven years of rapid ticket‑resolution expertise across Windows, macOS, and Linux,
    pairing a skeptical, data‑driven diagnostic style with a spontaneous penchant for crafting ad‑hoc scripts that keep systems humming even when documentation deadlines slip.
  sports: Carmella Green enjoys weekend hikes along the Natchez Trace and follows the Mississippi State Bulldogs basketball team in the winter, while playing recreational volleyball with a local co‑ed league
    in the summer, preferring low‑key solo cardio over structured gym sessions but still cheering loudly at New Orleans Saints games when time permits.
  arts: Carmella Green immerses themselves in the blues scene at venues like the B.B. King's Blues Club, swaps playlists between Kendrick Lamar’s hip‑hop drops and the gospel harmonies of the Mississippi
    Mass Choir, and cites visual inspiration from photographer Henri Cartier‑Bresson, using that aesthetic for their own nature shots.
  travel: Carmella Green favors spur‑of‑the‑moment road trips that blend scenic hikes in the Great Smoky Mountains with detours to music festivals in Austin and food‑centric stays in New Orleans, planning
    loosely enough to accommodate an impromptu Raspberry Pi workshop at a friend's cabin yet mindful of a modest budget that keeps trips under $800.
  culinary: Carmella Green experiments in the kitchen, elevating classic Southern comfort foods like fried catfish and collard greens with modern twists such as miso‑glazed greens and bourbon‑infused honey‑butter
    biscuits, showcasing a moderate cooking skill set that balances comfort with curiosity for bold ingredient pairings.
  core: Carmella Green is a tech‑savvy, competitive problem‑solver who blends spontaneous DIY projects with a love for Southern flavors, improvisational comedy, and a restless wanderlust that often outpaces
    their organizational habits.
background:
  cultural: Carmella was raised in Canton, Mississippi as a Black woman immersed in the region’s African‑American traditions. Family gatherings centered around storytelling, gospel music, and hearty Southern
    meals, instilling a strong sense of community and resilience. The local church provided a foundation of service that now guides her volunteer work in STEM outreach for youth. Navigating a predominantly
    white tech industry has sharpened her awareness of representation gaps, fueling her drive to mentor other Black women and advocate for inclusive hiring. Her cultural identity is reflected in her love
    for blues and Southern soul music, her appreciation for Southern culinary heritage, and her commitment to uplift her hometown through technology education and empowerment.
attributes:
  skills: '["Technical troubleshooting (hardware, software, network)", "Remote desktop and phone support", "System administration (Windows, macOS, Linux)", "Hardware repair and peripheral maintenance",
    "Network configuration and troubleshooting (TCP/IP, DHCP, VPN)", "Scripting for automation (PowerShell, Bash)", "Basic cybersecurity best practices", "User training and clear communication", "Software
    installation and configuration", "Customer service for diverse audiences"]'
  hobbies: '["Raspberry Pi and DIY electronics projects", "Reading science‑fiction and tech blogs", "Cooking Southern cuisine with creative twists", "Playing strategy video games (StarCraft, Civilization)",
    "Attending live blues, hip‑hop, and gospel concerts", "Hiking on Natchez Trace and local trails", "Nature photography", "Volunteering for STEM outreach programs", "Participating in a community chess
    club", "Improvisational comedy workshops", "Spontaneous weekend road trips"]'
  career_goals: Carmella’s immediate ambition is to channel her hands‑on support experience into a senior network engineering or cybersecurity analyst role within three years, positioning herself as a top
    performer on technical metrics. She is actively studying for CompTIA Network+, Security+ and Cisco CCNA certifications to solidify her credentials and remains competitively driven to achieve the highest
    scores in each exam. Parallel to her career shift, she plans to launch a community‑focused consulting service that helps small businesses in rural Mississippi adopt reliable IT infrastructure while
    creating mentorship pathways for Black women entering tech. Long‑term, she aspires to become a recognized advocate for technology equity, speaking at regional conferences, shaping inclusive hiring policies,
    and establishing a nonprofit STEM mentorship program in Canton.
