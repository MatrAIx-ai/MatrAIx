  career_goals: She aims to pursue a career that combines her love for structure, helping others, and her interest in health. Tiara aspires to become a school counselor or pediatric nurse, roles where she
    can use her organizational strengths and empathy to support children dealing with anxiety and academic challenges. She plans to earn a scholarship to a reputable high school, then attend a college program
    in nursing or psychology, ultimately obtaining a degree that enables her to contribute to her community’s well‑being. Her competitive nature drives her to achieve high academic scores and participate
    in science fairs to build a strong academic portfolio.
