personas:
  professional: Tiara Fields, a budding junior game developer who uses Scratch to craft structured puzzles, blends meticulous planning with their talent for detailed comic sketches, and channels their competitive
    edge into polished, bug‑free prototypes.
  sports: Tiara Fields, a member of the Lincoln Youth Swim Club and an avid follower of the Los Angeles Lakers, prefers solitary training routines that follow a strict schedule, balances school chess tournaments
    with weekend swim practices, and uses the rhythmic laps as a calming counterpoint to their intense mental focus.
  arts: Tiara Fields, a dedicated comic‑book artist who fills their sketchbook with intricate superhero designs, draws narrative inspiration from Neil Gaiman, visual style cues from Jim Lee, and rhythmic
    motivation from the soulful sounds of Beyoncé and Aretha Franklin, spending evenings crafting page‑by‑page stories.
  travel: Tiara Fields, an organized travel enthusiast who maps each trip with meticulous checklists, has explored New York City’s Museum of Natural History and the Grand Canyon, dreams of visiting London’s
    Harry Potter Studios, and favors vacations that blend structured sightseeing with quiet reading nooks.
  culinary: Tiara Fields, a picky eater who adores creamy mac and cheese made with sharp cheddar, enjoys baking chocolate chip cookies with a pinch of sea salt, occasionally experiments with spice‑balanced
    chicken jambalaya, yet they often skip vegetables because of a low tolerance for bitter flavors.
  core: Tiara Fields blends a methodical mind, a love for solitary puzzles, and an undercurrent of anxiety into a uniquely disciplined yet emotionally intense twelve‑year‑old perspective.
background:
  cultural: Tiara grows up in Riverdale, a predominantly Black neighborhood in Cook County, Illinois. Her family’s cultural heritage is rooted in African‑American traditions that emphasize community, resilience,
    and the importance of education. Weekly attendance at a local Baptist church introduces her to gospel music and storytelling traditions, while family gatherings celebrate milestones with soul food and
    shared histories. She participates in community events such as Juneteenth celebrations and visits the Riverdale public library’s African‑American history programs, which nurture her pride in her heritage.
    These cultural influences shape Tiara’s values of self‑discipline, mutual support, and an aspiration to give back to her community.
