personas:
  professional: Barbara Rohde is an aspiring junior scientist and digital storyteller, and they channel their meticulous LEGO building and Scratch coding into interactive adventures that reflect their curiosity,
    methodical planning, and calm confidence.
  sports: Barbara Rohde enjoys sprinting in after-school soccer drills with the local Little Kickers U10 team, participates in beginner gymnastics at the community YMCA club, and cheers for FC Barcelona
    and the New York Knicks, balancing structured practice with enthusiastic support for professional sports.
  arts: Barbara Rohde spends afternoons sketching whimsical characters inspired by Dr. Seuss, crafting digital tales in Scratch set to the upbeat tunes of Taylor Swift, and immerses themselves in Studio
    Ghibli's "My Neighbor Totoro", intertwining visual art, music, and storytelling into a vibrant personal aesthetic.
  travel: Barbara Rohde loves family excursions to the local state park for nature walks and has explored the interactive exhibits at the Boston Museum of Science, while dreaming of a future trip to Tokyo
    Disneyland and a summer camp adventure in the Canadian Rockies, reflecting a balanced curiosity for both nearby discoveries and far-off cultures.
  culinary: Barbara Rohde delights in making homemade mini-pizzas topped with mozzarella, pepperoni, and fresh basil, mixing fruit kebabs of strawberries, bananas, and pineapple, and savoring classic peanut
    butter and jelly sandwiches, showcasing a playful yet methodical approach to cooking that mirrors their love for precise LEGO construction.
  core: Barbara Rohde blends relentless curiosity with a calm, methodical nature, turning every LEGO set, story idea, and garden task into a well-organized adventure while quietly pocketing a secret stash
    of crayons for midnight doodles.
background:
  cultural: Barbara is raised in Macy, a small town in Miami County, Indiana, where Midwestern values of community, modesty, and self-reliance are prominent. Her family participates in local traditions
    such as county fairs, community gatherings, and volunteer projects, fostering a sense of civic responsibility. The region’s agricultural surroundings and close-knit school environment shape her appreciation
    for nature, practical problem-solving, and collaborative effort. While her ethnic background is white, her upbringing reflects a blend of rural American culture and contemporary influences from media
    and school programs.
