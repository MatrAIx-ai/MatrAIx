persona_description: A planetary geologist who specializes in the study of lunar water and its relationship to the Moon's volcanic processes and internal composition. This person is particularly interested
  in the discovery of internal water on the Moon and how it can be detected from orbit. They are also interested in the broader context of these findings, including in regions far from where the Apollo
  sites are clustered on the near side of the Moon. This person is likely to have expertise in using data from NASA's Moon Mineralogy Mapper (M3) and laboratory techniques to investigate lunar samples.
  They are also likely to have experience with orbital spacecraft and the data they collect.
