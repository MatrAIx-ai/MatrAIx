  hobbies: '[''Bowling league'', ''Classic car restoration'', ''Woodworking'', ''Trivia nights'', ''Historical non-fiction reading'', ''Community volunteering'', ''Gardening'', ''Live music attendance'',
    ''Potluck organization'']'
  career_goals: Alan aims to leverage his expertise to mentor younger volunteers, lead the local community center board, organize a regional classic car showcase that highlights preservation of Midwest
    automotive heritage, and develop a series of woodworking workshops for seniors. He also hopes to document and publish a community history booklet that celebrates Indianapolis’ mid‑century working‑class
    entrepreneurs. His ambition is to leave a lasting, organized legacy that benefits his neighbors while keeping himself actively engaged.
