  career_goals: Katie aims to progress from cashier to shift supervisor within the next year, leveraging her reliability and organizational strengths. Over the next three to five years, she aspires to become
    a store manager, overseeing operations, staff development, and inventory control. To support these goals, she plans to complete a bachelor's degree in Business Administration, focusing on retail management
    and human resources. Additionally, she seeks a work environment that offers clear structure and predictable schedules, helping her manage her anxiety while providing opportunities for professional growth
    and leadership.
