personas:
  professional: Katie Loutzenhiser, a 37‑year‑old cashier at a busy Tampa retail store, leverages meticulous cash‑handling expertise, POS fluency, and a natural knack for calming anxious customers to drive
    toward a shift‑supervisor role within a year and a future as store manager, all while thriving on structured schedules that soothe their own anxiety.
  sports: Katie Loutzenhiser stays fit by rocking out in Zumba, practicing beginner yoga, and dancing salsa at a local studio, while cheering for the Tampa Bay Lightning in winter, the Buccaneers in fall,
    and joining a weekend beach‑volleyball league that blends socializing with cardio.
  arts: Katie Loutzenhiser finds artistic inspiration at Tampa’s Ybor City festivals, sways to Celia Cruz’s salsa beats, binge‑watches Beyoncé’s visual albums, and unwinds with self‑help books by Brené
    Brown, which shape their personal growth narrative.
  travel: Katie Loutzenhiser prefers well‑planned weekend getaways to the Florida Keys or Asheville’s mountains and dreams of a culturally immersive trip to Barcelona, balancing family time with a modest
    travel budget and occasional last‑minute beach trips that help calm their anxiety.
  culinary: Katie Loutzenhiser cooks comfort meals like creamy mac and cheese and shrimp étouffée using fresh basil and cilantro from their balcony garden, often pairing dishes with locally caught grouper
    and savoring homemade salsa at family beach picnics.
  core: Katie Loutzenhiser is a socially vibrant yet anxiety‑prone planner who channels stress into dance and diligent budgeting, never misses a Zumba class but occasionally forgets to water their balcony
    herbs.
background:
  cultural: Katie is a white American who grew up in the southeastern United States and now resides in Tampa, Florida. Her cultural upbringing blends traditional Southern values—emphasis on family, community,
    politeness, and a strong work ethic—with the vibrant, multicultural atmosphere of Tampa’s coastal living. She is accustomed to the laid‑back lifestyle of the Gulf Coast, enjoys the mix of American and
    Latin influences that shape the city’s food, music, and festivals, and participates in local Christian church activities and neighborhood gatherings. This background informs her practical, organized
    approach to work while fostering a sociable, outgoing spirit.
