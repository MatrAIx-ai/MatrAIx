    in Clinical Care"]'
  hobbies: '["Watercolor Painting", "Visiting Art Galleries and Museums", "Reading (Scientific Journals and Fiction)", "Gardening", "Cooking Southern Cuisine", "Walking/Hiking on Local Trails", "Yoga and
    Meditation", "Volunteering at Community Arts Programs", "Book Club Participation", "Bird Watching", "Knitting for Patients", "Traveling to Historical and Cultural Sites"]'
  career_goals: Trisha aims to transition into a senior nursing leadership role, such as Director of Nursing or Clinical Nurse Manager, where she can shape policy and improve care standards across her hospital
    system. She plans to earn a certification in Geriatric Nursing and spearhead a county‑wide wellness program for seniors. A personal ambition is to expand her pilot art‑therapy project into a formal,
    evidence‑based curriculum for chronic‑pain patients, publishing her findings in nursing journals. She also hopes to mentor the next generation of nurses, serve on the Cherokee County health advisory
    board, and eventually author a guidebook on blending creativity with evidence‑based clinical practice.
