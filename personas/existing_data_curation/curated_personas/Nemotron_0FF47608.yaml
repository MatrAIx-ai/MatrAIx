personas:
  professional: Trisha Redd, a seasoned critical‑care and geriatric nurse with advanced Lean Six Sigma expertise, channels her disciplined organization and curious love of art into pioneering an evidence‑based
    art‑therapy pain‑management curriculum while mentoring the next generation of clinicians.
  sports: Trisha Redd enjoys early‑morning walks on Cherokee County trails, bird‑watching with the local Audubon club, and follows the Atlanta Falcons and Braves, while playing in a senior softball league
    each spring and practicing yoga twice weekly for joint health.
  arts: Trisha Redd spends Saturday mornings painting watercolors of Georgia wildflowers, cites Monet and local artist Mary Lillian as inspirations, volunteers at the Cherokee County Arts Center, and regularly
    attends exhibitions at the High Museum of Art, often quoting lines from Toni Morrison after a gallery visit.
  travel: Trisha Redd prefers meticulously planned cultural trips, such as a weekend exploring Savannah’s historic squares, a week‑long art festival in Asheville, and an annual pilgrimage to Florence’s
    Uffizi, balancing their love of history with a modest travel fund that leaves room for family visits during holidays.
  culinary: Trisha Redd delights in cooking Southern comfort dishes like shrimp and grits, collard greens simmered with smoked turkey, and peach cobbler using heirloom peaches, yet they admit a guilty pleasure
    for fried chicken at family gatherings that sometimes derails their diet.
  core: Trisha Redd merges a disciplined, data‑driven nursing career with a playful curiosity for watercolor art, occasionally over‑budgeting on paint tubes while rigorously tracking every health metric
    on their smartwatch.
background:
  cultural: Trisha grew up in a close‑knit, middle‑class family in the American South, where Southern hospitality, community service, and church involvement shaped her early values. Raised in Georgia, she
    was immersed in regional traditions such as seasonal farm‑to‑table cooking, local music festivals, and a strong emphasis on family gatherings. These cultural roots fostered her compassionate yet disciplined
    approach to caring for others. Her participation in a Methodist congregation reinforced a sense of stewardship, prompting her lifelong commitment to volunteerism and mentorship. While her heritage is
    primarily Anglo‑American, Trisha’s upbringing encouraged openness to diverse ideas, reflected in her appreciation for art, science, and innovative healthcare practices.
attributes:
  skills: '["Critical Care Nursing", "Geriatric Nursing", "Wound Care Management", "Diabetes Education", "Electronic Medical Record (Epic & Cerner) Proficiency", "Quality Improvement & Patient Safety (Lean
