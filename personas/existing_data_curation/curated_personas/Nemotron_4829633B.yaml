  career_goals: Melissa aims to secure a role that blends community engagement with structured project management, such as a community outreach coordinator or non‑profit program assistant. She plans to
    earn a project‑management certification (CAPM or PMP) within the next two years to deepen her expertise. Long‑term, she aspires to establish a cultural hub or community center in Bexar County that supports
    Mexican‑American youth and provides mental‑health resources. Parallel to this, she seeks to develop leadership skills to become a team lead in a local health or social‑service organization, leveraging
    her competitive drive to achieve top‑performer status while fostering a supportive environment.
