  hobbies: '[''Salsa and cumbia dancing'', ''Organizing neighborhood potlucks'', ''Team volleyball'', ''Competitive trivia nights'', ''Hiking in the Texas Hill Country'', ''DIY crafts for cultural celebrations'',
