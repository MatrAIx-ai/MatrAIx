  career_goals: Quan aims to advance to a senior operations research analyst role within the next five years, leading multidisciplinary teams that develop data‑driven solutions for supply‑chain efficiency
    and social equity. He plans to pursue a master’s degree in Operations Research or Data Science to deepen his methodological toolkit. Long‑term, he aspires to influence public‑policy decisions in Michigan
    by applying optimization techniques to improve community health services and sustainable transportation, while mentoring underrepresented students interested in STEM fields.
