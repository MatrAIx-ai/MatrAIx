  career_goals: Approaching retirement, Templeton aims to transition into a mentorship and consulting role, guiding younger technologists in both technical skills and professional ethics. He hopes to contribute
    to community health initiatives in the Keys, such as organizing volunteer health‑screening events and offering his expertise to local clinics on quality control. Templeton also aspires to author a concise
    handbook on laboratory best practices that blends his love for established methods with insights on emerging technologies, ensuring his legacy of practical curiosity benefits the next generation.
