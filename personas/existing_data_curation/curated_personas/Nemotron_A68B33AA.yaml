  career_goals: He aims to become a senior full‑stack engineer within the next three to five years, eventually stepping into a technical lead role that guides a small, cooperative team building software
    for community nonprofits and educational platforms. Richard plans to earn an AWS Solutions Architect certification, deepen his expertise in cloud architecture, and contribute to open‑source projects
    that improve accessibility. Long‑term, he envisions a position that blends technology with social impact, such as product management for a civic‑tech startup, while maintaining a work‑life balance that
    supports his preference for structured yet flexible environments.
