  career_goals: Steven dreams of becoming a scientist‑engineer who explores space and designs innovative solutions to real‑world problems. He imagines working as an astronaut or a research engineer at a
    space agency, creating detailed drawings and models of spacecraft. He also hopes to combine his love of art by becoming a scientific illustrator or museum curator who shares discoveries with the public.
    He sets high academic goals, aiming to win school science fairs, earn top grades, and attend a specialized STEM program in high school.
