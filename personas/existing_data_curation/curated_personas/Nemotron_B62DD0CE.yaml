personas:
  professional: Steven Lee is an aspiring junior architect who meticulously builds LEGO cityscapes and programs simple Scratch Jr. animations, channeling his disciplined focus and love for precise achievement
    into early design experiments.
  sports: Steven Lee enjoys playing in the neighborhood’s under‑8 soccer league, cheering for the local professional baseball team the Chicago Cubs during occasional family outings, and practices a short
    morning routine of jumping jacks to stay active despite a preference for indoor puzzles.
  arts: Steven Lee immerses themselves in visual arts, copying the bold color blocks of Yayoi Kusama in watercolors, sketching whimsical characters inspired by Dr. Seuss, and curating a digital gallery
    of their own drawings on a tablet, which they proudly share with a close circle of friends.
  travel: Steven Lee loves weekend trips to the regional science museum in San Jose, a family vacation to Disney World in Orlando, and dreams of exploring the towering cliffs of the Grand Canyon, preferring
    well‑planned itineraries that balance museum time with short nature hikes.
  culinary: Steven Lee favors bright, hand‑crafted meals like rainbow fruit salads, homemade macaroni‑and‑cheese topped with broccoli florets, and occasional pizza slices, enjoys decorating cupcakes with
    edible glitter, and occasionally sneaks extra cookies from the jar, reflecting their disciplined yet occasionally indulgent palate.
  core: Steven Lee is a meticulous, curiosity‑driven 7‑year‑old who blends artistic flair with disciplined LEGO engineering, while navigating worry‑filled moments and a love for structured play.
background:
  cultural: Steven comes from a middle‑class white family in Trenton, Michigan, a small community within the Detroit metropolitan area. His upbringing reflects typical Midwestern values of hard work, politeness,
    and community involvement. He is raised in a household with European ancestry—his grandparents emigrated from Germany and Ireland—where family traditions include seasonal fairs and shared meals. The
    local public elementary school emphasizes STEM and arts integration, and the community offers after‑school programs at the library, a nearby children's museum, and seasonal art workshops. Exposure to
    Detroit’s rich automotive and music heritage, along with yearly county fairs, fuels his fascination with engineering, design, and creative expression.
