personas:
  professional: Salli Brown, a 25‑year‑old certified firefighter and EMT in the Hudson Valley, merges rigorous incident‑command expertise with advanced fire‑prevention technology, and they channel their
    fiercely competitive drive into flawless emergency responses while simultaneously mentoring recruits and championing evidence‑based resilience programs.
  sports: Salli Brown climbs the Hudson Valley trail network with the local Trailblazers Club, logs weekly weightlifting sessions at the downtown gym, runs competitive trail races in the fall, and roots
    for the New York Giants and the Hudson Valley Renegades, using sport as both a release valve for stress and an arena where they satisfy their competitive edge.
  arts: Salli Brown captures the mist‑shrouded Hudson Valley in evocative black‑and‑white shots inspired by Ansel Adams and Chilean photographer Cristina Mittermeier, curates a rotating playlist of Bon
    Iver and Fleet Foxes during editing sessions, and sharpens strategic thinking by leading game nights featuring Settlers of Catan and cooperative video‑game raids, all of which feed their curiosity and
    need for structured creativity, allowing them to balance artistic expression with competitive precision.
  travel: Salli Brown plans weekend escapes to the Catskill forests and the Adirondack highlands to chase sunrise vistas for photography, dreams of trekking Iceland’s volcanic landscapes for future portfolio
    projects, and meticulously schedules trips around their rotating firehouse shifts, allowing them to balance adventure with the recovery time their high‑stress career demands.
  culinary: Salli Brown fuels post‑run recovery with quinoa‑black‑bean bowls seasoned with smoked paprika and roasted sweet potatoes, whips up kale‑banana smoothies for stamina, and indulges in occasional
    sushi nights featuring seared ahi tuna with wasabi mayo as a reward after completing a grueling certification course, while they keep a well‑stocked pantry of protein powders and whole‑grain pasta for
    quick meals.
  core: Salli Brown is a competition‑driven firefighter who channels stress into meticulous emergency work, night‑time nature photography, and disciplined mindfulness, all while they battle a persistent
    worry habit that fuels both vigilance and occasional overthinking.
background:
  cultural: Salli is a white American raised in a middle‑class family in the Hudson Valley, with Irish‑German ancestry. Growing up near Poughkeepsie, she was exposed to a mix of suburban stability and the
    city’s cultural diversity, fostering a strong community ethic and a respect for local traditions. Her upbringing emphasized hard work, reliability, and civic responsibility, values that align with her
    role as a firefighter. She participates in regional festivals, supports local heritage events, and maintains close ties to extended family, reflecting a blend of traditional American values and the
    progressive spirit of upstate New York.
attributes:
  skills: '[''Fire suppression'', ''Emergency medical services (EMT)'', ''Incident command system (ICS)'', ''Hazardous materials awareness'', ''Technical rescue (rope and vehicle extrication)'', ''Thermal
    imaging operation'', ''Fire prevention education'', ''Physical fitness training'', ''Risk assessment and safety checks'', ''Peer support and mental‑health first aid'']'
  hobbies: '[''Hiking'', ''Trail running'', ''Weightlifting'', ''Photography'', ''Reading (true‑crime and technical manuals)'', ''Strategic board games (e.g., Settlers of Catan)'', ''Competitive video gaming'',
    ''Journaling'', ''Mindfulness meditation'', ''Volunteering at animal shelter'']'
  career_goals: Salli aims to become a fire officer within the next five years, pursuing a paramedic certification and a bachelor's degree in fire science. She wants to lead a community resilience program
    that integrates fire prevention, emergency preparedness, and mental‑health support for first responders. Her competitive nature fuels her desire to earn advanced certifications such as Fire Officer
    I/II and Hazardous Materials Technician. She also hopes to mentor new recruits, champion evidence‑based practices, and eventually serve as a fire captain overseeing both urban and wildland fire operations
    in the Hudson Valley.
