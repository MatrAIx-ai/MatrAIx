personas:
  professional: Luana Chang, a seasoned maintenance veteran with three decades of hands-on experience, applies their meticulous, structured approach to plumbing, electrical, and HVAC work, documenting every
    service order and creating a legacy-building manual for future staff while pursuing a master electrician certification and mentoring a young apprentice.
  sports: Luana Chang enjoys solitary shoreline walks, follows the New England Patriots for football and the Boston Red Sox for baseball, occasionally joins the Branford Shoreline Walking Club for organized
    low-impact hikes in the fall, and stays loosely connected to the Hartford Yard Goats for a touch of minor-league baseball excitement.
  arts: Luana Chang cultivates a quiet artistic life, listening to the vibrant salsa of Celia Cruz and the mellow strings of Buena Vista Social Club while savoring Bach's concertos, losing themselves in
    Agatha Christie mysteries and the classic films of Meryl Streep, all of which accompany their knitting sessions.
  travel: Luana Chang prefers low-stress, meticulously planned trips, having already explored the historic streets of Old San Juan and the coastal charm of St. Augustine, while dreaming of gentle hikes
    in the Azores and sunset views in Santorini, always favoring boutique B&Bs and solo walks over crowded tours.
  culinary: Luana Chang expertly prepares arroz con gandules and alcapurrias using fresh cilantro, oregano, and homemade sofrito from their garden, pairing each hearty meal with a robust cup of locally
    roasted Colombian coffee and delighting neighbors with generous portions.
  core: Luana Chang blends a meticulous, hands-on maintenance mindset with a quiet love for gardening, cooking, and knitting, all while secretly hoarding a stash of holiday cookies they never share.
background:
  cultural: Luana was raised in a bilingual Puerto Rican household, speaking both Spanish and English, and she retains a strong connection to her Caribbean roots. Family gatherings centered around shared
    meals, music, and storytelling have instilled in her a deep appreciation for community and respect for elders. She celebrates cultural holidays such as Nochebuena and the Puerto Rican Day Parade in
    nearby New Haven, often preparing traditional foods and sharing them with friends. Her Catholic upbringing introduced values of compassion and service, which influence her cooperative nature. While
    living in Branford, Luana participates in local Puerto Rican cultural events, volunteers to translate for older Spanish‑speaking residents, and maintains cultural traditions through music, cuisine,
    and language in her daily life.
