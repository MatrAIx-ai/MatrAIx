  career_goals: Approaching retirement, Luana aims to solidify her legacy by creating a comprehensive maintenance manual for her current facility, ensuring that future staff inherit her structured approach
    and high standards. She plans to obtain a master electrician certification to formalize her expertise and to mentor a younger apprentice, passing on practical skills and disciplined work habits. Additionally,
    she hopes to launch a part‑time consultancy focused on energy‑efficient retrofits for senior housing, allowing her to apply her practical knowledge while maintaining a predictable, low‑stress schedule.
