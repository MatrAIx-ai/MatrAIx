persona_description: Betheney Wills, a PhD Researcher from CECAN/University of Surrey, undertook a policy internship with the Marine and Fisheries Team at the Department for the Environment Food and Rural
  Affairs (Defra) in 2019. Her internship aimed to gain a better understanding of fishermen's perspectives on Abandoned Lost and Discarded Fishing Gear (ALDFG) in the seas around the UK. Her final report,
  published by Defra, provides valuable insights into the factors influencing ALDFG and the circular economy of fishing gear. Her findings will inform Defra's strategy to reduce single-use plastic and marine
  pollution.
