  career_goals: Through imaginative play, Thanhphuong often pretends to be a teacher guiding a small group of stuffed animals or a veterinarian caring for her pet cat. These role‑plays reveal an early ambition
    to pursue a caring profession where she can share knowledge and help others, while maintaining the structured, predictable environment she prefers.
