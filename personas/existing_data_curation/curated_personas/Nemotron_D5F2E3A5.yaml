personas:
  professional: Thanhphuong Theerathorn, a budding mini‑architect, blends a curious love for building towering LEGO castles with a practical habit of sorting each brick by color and size, making them a
    reliable little helper who organizes play‑room shelves while still daring to experiment with new designs.
  sports: Thanhphuong Theerathorn enjoys preschool soccer practice on Saturday afternoons, proudly wears a tiny jersey of the River City Runners—a local minor league baseball team they adore—and participates
    in a beginner’s swimming class at the community pool, balancing team play with solo water fun while sometimes asserting themselves as the line‑leader during tag games.
  arts: Thanhphuong Theerathorn loves coloring intricate mandala pages with bright crayons, sings along to The Wiggles and Raffi’s cheerful tunes, and watches Pixar’s animated films like "Finding Nemo,"
    letting the vibrant stories shape their imagination and providing a soothing escape when worries arise.
  travel: Thanhphuong Theerathorn recently visited the downtown zoo, spent a weekend at the sunny coastal beach building sandcastles, and took a short train ride to grandparents’ house in a neighboring
    town, dreaming of one day exploring Disneyland’s magic kingdom; their travel style is low‑key, preferring well‑planned family outings that include plenty of quiet reading time on the car seat.
  culinary: Thanhphuong Theerathorn favors crunchy chicken nuggets, creamy mac and cheese, and strawberry‑topped pancakes, proudly helps butter toast with a tiny plastic knife, and delights in nibbling
    fresh apple slices with a sprinkle of cinnamon, showcasing a developing palate that loves familiar comfort foods with occasional adventurous bites like mango cubes.
  core: Thanhphuong Theerathorn is a meticulous, curiosity‑driven four‑year‑old who organizes toys, saves coins, worries about tiny setbacks, and finds comfort in creative play and simple routines.
background:
  cultural: Thanhphuong is from a Vietnamese immigrant family that settled in Aberdeen, North Carolina. At home, Vietnamese language, cuisine, and traditions such as Tet (Lunar New Year) are observed, while
    she also participates in local Southern customs like school events and community gatherings. This blend of Southeast Asian heritage and Southern American environment shapes her language development,
    values of family cohesion, and appreciation for both cultural rituals and everyday community life.
