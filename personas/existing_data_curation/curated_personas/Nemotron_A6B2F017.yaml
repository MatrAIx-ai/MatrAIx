  hobbies: '["Landscape Photography", "Community Theater (acting & backstage volunteering)", "Gardening (vegetable and community garden)", "Birdwatching", "Bridge (card game)", "Attending Iowa State Fair
    and local art exhibits", "Lectures on art, science, and technology", "Group road trips with friends", "Woodworking or small craft projects", "Volunteer coordination for community events"]'
  career_goals: Jeremy aims to transition from day-to-day project execution to a mentorship and legacy role within his community. Over the next five years he hopes to spearhead a regional historic-preservation
    initiative that revitalizes several early-20th-century public buildings in Hamilton County, while also establishing a small consultancy that helps local nonprofits secure grants and run sustainable
    projects. He wants to become a recognized advisor for the county’s economic-development board and to pass on his practical knowledge through workshops for emerging project managers and volunteer leaders.
    Ultimately, he envisions a smooth transition into retirement that still allows him to shape community projects and support the arts.
