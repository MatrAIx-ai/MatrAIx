personas:
  professional: Jeremy Laughlin, a seasoned public-sector project manager in rural Iowa, leverages three decades of hands-on experience translating community needs into actionable plans, using a relaxed
    yet focused leadership style, creative problem-solving, and a talent for rallying volunteers while navigating the unpredictable rhythms of agricultural cycles.
  sports: Jeremy Laughlin follows the Iowa Hawkeyes football team religiously, attends the annual Iowa State Fair pig-calling contest that doubles as a folk sport, participates in a senior walking club
    that meets twice weekly, and plays bridge competitively at the local senior center, viewing these activities as his primary fitness regimen.
  arts: Jeremy Laughlin, an avid supporter of the arts, volunteers backstage at the Hamilton County Community Theatre's productions of 'Our Town' and 'The Music Man', curates visits to the Des Moines Art
    Center to view works by Georgia O'Keeffe and Ansel Adams, and shares his own sunrise photographs inspired by the prairie, often comparing his images to those of photographer Steve McCurry.
  travel: Jeremy Laughlin prefers low-key road trips with his friends, charting routes through the Badlands, the Amana Colonies, and Mackinac Island's historic streets, balancing spontaneous detours to
    local farmers' markets with careful budgeting that keeps his exploration within a modest retirement allowance.
  culinary: Jeremy Laughlin enjoys cooking with the vegetables from his modest garden, often preparing roasted beet and goat-cheese salads, corn chowder with heirloom sweet corn, and apple-cinnamon crumble,
    while still indulging in Iowa State Fair staples like pork tenderloin sandwiches and deep-fried butter, and he favors fresh herbs such as basil and rosemary in his dishes.
  core: Jeremy Laughlin is a curiosity-driven, community-minded storyteller who blends relaxed project leadership with a habit of misplacing his keys while never missing a sunset photo opportunity.
background:
  cultural: Jeremy grew up on a family farm near Ellsworth, immersed in the values of Midwestern hospitality, hard work, and community interdependence typical of rural white families in Iowa. Though his
    upbringing was rooted in a traditional Protestant community, his curiosity led him to broaden his cultural horizons through regional folk art, local music festivals, and the modest yet diverse artistic
    scene in nearby towns. The experience of losing his spouse deepened his reliance on extended family, church, and neighborly networks, reinforcing a collective sense of support. This blend of modest
    rural tradition with an open‑minded appreciation for the arts shapes his worldview, influencing both his professional approach to inclusive project planning and his personal pursuits.
attributes:
  skills: '["Project Planning & Scheduling", "Stakeholder Engagement", "Agile & Flexible Methodologies", "Conflict Resolution & Mediation", "Budgeting & Financial Management", "Grant Writing & Fundraising",
