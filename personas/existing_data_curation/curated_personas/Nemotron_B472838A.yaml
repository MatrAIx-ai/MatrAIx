  hobbies: '[''Gardening'', ''Meal Planning and Cooking'', ''Reading (Non-fiction/Biographies)'', ''Yoga'', ''Nature Walks/Hiking'', ''Book Club (Small group)'', ''Wine Tasting'', ''Crossword Puzzles'',
    ''Community Volunteering (PTA)'', ''Classic Film Appreciation'']'
  career_goals: Lisa aims to advance to a senior leadership role within operations, such as Director of Operations or VP of Operations, where she can drive large‑scale efficiency initiatives and shape strategic
    resource allocation. She plans to deepen her expertise in Lean Six Sigma and earn a professional certification to enhance her credibility. Over the next five years, she hopes to lead a multi‑site operation,
    mentor emerging managers, and contribute to the company's profitability while maintaining a stable, well‑structured work environment.
