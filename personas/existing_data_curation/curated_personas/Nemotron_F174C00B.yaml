  career_goals: Gabriel aims to transition from working in shared salon spaces to opening his own boutique studio in San Antonio that showcases Mexican cultural aesthetics alongside contemporary nail trends.
    He plans to obtain a certification in advanced nail artistry to expand his design repertoire and credibility. Over the next five years, he hopes to develop a line of eco‑friendly, vegan nail polish
    inspired by traditional Mexican colors, marketed primarily to the Hispanic community. Gabriel also envisions mentoring aspiring manicurists through workshops at local community colleges and offering
    pro‑bono nail care at health fairs. Ultimately, he seeks greater financial stability and a more organized business structure to reduce stress and allow him to focus on creative expression.
