personas:
  professional: Armando Mercado, a retired visual artist and community facilitator, they weave abstract oil paintings with highland textile motifs while leading informal art workshops for seniors and youth,
    channeling boundless imagination into cross‑cultural dialogue.
  sports: Armando Mercado, an active senior in Iowa, they enjoy walking floodplain trails, participate in weekly pickleball matches at the community center, cheer on the Iowa Hawkeyes football team, and
    occasionally join a senior canoe club on the Mississippi River during summer, balancing activity with a relaxed approach to formal exercise.
  arts: Armando Mercado, a passionate creator, they immerse themselves in the harmonies of Andrés Segovia’s classical guitar and traditional marimba while painting, and draw inspiration from Frida Kahlo’s
    vibrant self‑portraits and the poetry of Octavio Paz, shaping a unique artistic voice that bridges Midwest vistas with ancestral textile patterns.
  travel: Armando Mercado, an inquisitive traveler, they favor spontaneous road trips to Iowa’s hidden state parks, cherish nostalgic pilgrimages to the historic highland town where their parents first
    settled, dream of exploring Oaxaca’s markets and Tuscany’s stone terraces, yet plan each journey loosely, guided by curiosity rather than strict itineraries.
  culinary: Armando Mercado, a culinary storyteller, they master the art of hand‑rolled corn tamales, simmer a fragrant pepian stew with roasted seeds, brew a sweet atole using masa and cinnamon, and let
    garden rosemary, chilies, and heirloom tomatoes add fresh flair to every meal, reflecting a blend of time‑honored flavors and Midwest farmstead simplicity.
  core: Armando Mercado, a relaxed yet endlessly imaginative 66‑year‑old, they blend abstract painting, bilingual poetry, and garden stewardship into a life of quiet resilience, occasional disorganization,
    and a steadfast commitment to cultural storytelling.
background:
  cultural: Armando grew up in a bilingual household; his parents migrated from the highlands of Guatemala to Iowa in the 1960s. He maintains a strong connection to his Mayan heritage through language,
    cuisine, and artistic motifs. Family traditions such as Día de los Muertos altars, weaving of hand‑made textiles, and the preparation of tamales are central to his identity. He regularly attends the
    regional Latin American cultural center's events, where he shares his art and stories. His deep appreciation for both Guatemalan and Midwestern cultures informs his creative work, often blending the
    two in subtle, abstract ways.
attributes:
  skills: '[''Oil painting'', ''Watercolor sketching'', ''Poetry writing'', ''Spanish-English translation'', ''Traditional Guatemalan cuisine'', ''Organic gardening'', ''Community art workshop facilitation'']'
  hobbies: '[''Painting'', ''Speculative fiction reading'', ''Philosophical contemplation'', ''Organic gardening'', ''Classical guitar listening'', ''Poetry writing'', ''Community festival participation'']'
  career_goals: Although officially retired, Armando aims to channel his creative energy into community enrichment. He plans to organize a traveling exhibition of his artwork that juxtaposes Midwestern
    landscapes with Guatemalan iconography, hoping to spark cross‑cultural dialogue. He also aspires to compile a memoir‑styled collection of poems reflecting on his immigrant heritage, the evolution of
    his artistic practice, and the quiet resilience of aging. Additionally, he wishes to mentor a small group of local high‑school students in sketching and storytelling, eventually establishing a modest
    youth arts club at the town library.
