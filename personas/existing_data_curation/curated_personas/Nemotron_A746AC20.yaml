  career_goals: Denis aspires to blend his curiosity for technology with practical problem‑solving. In the long term, he hopes to pursue a career in software development, focusing on game design or interactive
    educational tools, while also being intrigued by environmental science or engineering where his hands‑on skills can be applied. He aims to join a high‑school STEM program, earn a scholarship, and eventually
    study computer science, game development, or environmental engineering at a university. Ultimately, Denis wants to create technology that encourages people—especially his peers—to engage with the natural
    world.
