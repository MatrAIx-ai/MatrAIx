personas:
  professional: Madison Hasko, a budding digital storyteller, channels their love for fantasy worlds into creating animated short films on Scratch, blending structured coding logic with spontaneous artistic
    flair.
  sports: Madison Hasko, an enthusiastic member of the local community soccer club, plays as a midfielder for the Riverside Rovers youth team, cheers for the US Women’s National Team and the LA Galaxy,
    and balances weekly practices with spontaneous weekend pick‑up games at the park.
  arts: Madison Hasko, an imaginative illustrator, draws inspiration from J.K. Rowling’s wizarding world, the vivid art of Studio Ghibli, and the pop beats of Taylor Swift, spending afternoons sketching
    fantasy characters and crafting digital art using Procreate on a tablet.
  travel: Madison Hasko, an adventurous weekend explorer, has trekked the granite cliffs of Yosemite National Park collecting rocks, dreams of visiting the Wizarding World of Harry Potter in Orlando, and
    enjoys family road trips to coastal tide‑pools where they hunt for shells.
  culinary: Madison Hasko, a junior baker, loves mixing cocoa powder, butter, and rainbow sprinkles to create chocolate‑vanilla cupcakes topped with a swirl of buttercream frosting, often experimenting
    with new frosting flavors while listening to Ariana Grande’s latest hits.
  core: Madison Hasko, a creatively structured ten‑year‑old, balances a love for fantasy storytelling and LEGO engineering with bursts of anxiety that fuel intense journal entries, occasional impulsive
    spending, and a habit of humming pop tunes while baking cupcakes.
background:
  cultural: Madison is a white Midwestern child raised in Bristol, Indiana, within Elkhart County. Her family values community, modesty, and self‑reliance, often attending a local Methodist church and participating
    in town fairs, high school sports events, and county celebrations that reflect the region's German and Czech heritage. The rural environment, with nearby farms and open landscapes, fosters a pragmatic
    outlook and a strong connection to seasonal traditions, neighborhood friendships, and American holidays.
