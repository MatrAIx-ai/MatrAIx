persona_description: A teacher who is responsible for implementing and overseeing the implementation of a broad Christian education curriculum in secondary schools, aiming to address the needs of learners
  with learning difficulties and disabilities through differentiation and the use of specialized teaching methods. The persona is likely to have a deep understanding of the principles of differentiation
  and its application in a mixed-ability class, and is knowledgeable about dyscalculia, dyspraxia, and other learning difficulties. The persona is also likely to have experience in developing and implementing
  education policies and programs, and has a passion for promoting inclusive education.
