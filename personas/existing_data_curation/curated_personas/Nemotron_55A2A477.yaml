  hobbies: '[''Drawing cartoons'', ''Painting'', ''Minecraft'', ''LEGO building'', ''Scratch coding'', ''Reading fantasy novels'', ''Soccer'', ''Hiking trails'', ''Visiting art museums'', ''Listening to
    music'']'
  career_goals: Michael hopes to become a creative technologist—perhaps a video game designer, animator, or architect—where he can blend his love for drawing, storytelling, and coding. He aims to join his
    school’s robotics club, take advanced art classes, and eventually study in a university program that merges art and engineering. He also dreams of designing sustainable spaces or gadgets that solve
    everyday problems while continuing to explore new ideas and unconventional thinking.
