persona_description: An economist who is interested in understanding the principles of comparative advantage and trade theory. This individual is likely to have a background in international trade, economics,
  and statistics. They are interested in understanding how countries can produce goods at a lower opportunity cost of resources, and how trade can benefit both importing and exporting countries. They are
  also likely to be familiar with the concepts of tariffs, quotas, and subsidies, as well as the theory of voluntary export restraint and infant industries. They may have a particular interest in the World
  Trade Organization and the role of free trade areas in promoting international trade.
