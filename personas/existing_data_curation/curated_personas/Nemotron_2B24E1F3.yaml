personas:
  professional: A budding block architect, Loris Frye builds towering wooden structures with a mix of wonder and practical attention to balance, yet they often leave scattered pieces behind because obligations
    feel optional.
  sports: A dedicated member of the local "Kiddie Kickers" soccer club, Loris Frye loves solo dribbling drills and cheering for the nearby "River City Red Sox" baseball team, yet they get competitive and
    frequently challenge peers for first place in hide‑and‑seek races.
  arts: A fan of animated classics, Loris Frye sings along to Raffi’s “Baby Beluga,” draws vibrant crayon scenes of dinosaurs, and eagerly watches the "Sesame Street" streetcar when they can have the TV
    to themselves.
  travel: After a family road trip to the coastal lighthouse in Maine and a weekend stay at a cabin near the pine forest, Loris Frye prefers short, well‑planned outings where they can explore quiet nature
    trails alone, though they sometimes fret about getting lost.
  culinary: Picky yet curious, Loris Frye devours chicken nuggets, honey‑drizzled yogurt, and strawberry slices, and they delight in pouring a tiny splash of ketchup on their macaroni, but they often refuse
    broccoli, citing a strange texture.
  core: Loris Frye is a curious, solitary four‑year‑old who blends practical building with endless wonder, competes fiercely in play, and frets over small setbacks.
background:
  cultural: Loris is raised in a white, New England family in Uxbridge, Massachusetts, a town with a strong historical connection to early American textile mills and a blend of Irish, Italian, and Portuguese
    heritage in the surrounding community. His upbringing reflects typical suburban values—emphasis on independence, respect for personal space, and an appreciation for the quiet countryside surrounding
    the town. Seasonal traditions such as autumn leaf‑collecting walks and winter holiday crafts are part of his daily life.
attributes:
  skills: '[''block tower building'', ''crayon drawing of simple shapes'', ''letter and number recognition'', ''puzzle assembling'', ''cause‑and‑effect experimentation with toys'']'
  hobbies: '[''reading picture books'', ''building LEGO® Duplo creations'', ''backyard insect watching'', ''listening to nature sound recordings'', ''solo toy‑car racing'']'
  career_goals: Loris dreams of becoming a solitary explorer who discovers hidden treasures—he often says he wants to be a 'space scientist' who builds his own rockets and works alone in a quiet lab. He
    also imagines a future as an inventor of clever gadgets that solve everyday problems without needing a big team.
