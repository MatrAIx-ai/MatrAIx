personas:
  professional: Anna Peeples, a seasoned elementary STEAM teacher, leverages deep STEM knowledge and a spontaneous, empathetic style; they craft project‑based curricula that spark curiosity while occasionally
    wrestling with tight deadlines.
  sports: Anna Peeples enjoys low‑impact aerobics at the DeLand Senior Fitness Club, walks the local nature trail each morning, and passionately follows the Orlando Magic and Florida Gators, cheering them
    on during the basketball season while they occasionally join a community pickleball league.
  arts: Anna Peeples frequents DeLand's art galleries, paints watercolors of subtropical landscapes inspired by Winslow Homer and Georgia O'Keeffe, listens to Bob Dylan and Joan Baez on vinyl, and participates
    in community theater productions of classic plays, often recalling performances starring Meryl Streep; they find that art fuels both their teaching and personal joy.
  travel: Anna Peeples prefers spontaneous weekend road trips to historic towns like St. Augustine, Savannah, and Charleston, and they dream of strolling the cobblestone streets of Lisbon and the cliffs
    of Santorini, balancing careful budgeting with a desire for cultural immersion.
  culinary: Anna Peeples loves experimenting with Mediterranean quinoa salad drizzled with lemon‑olive oil and feta, Caribbean jerk chicken seasoned with allspice and scotch bonnet peppers, and they often
    finish meals with fresh mango salsa, showcasing intermediate cooking skills that blend flavors with a dash of daring.
  core: Anna Peeples blends unstoppable curiosity, a love for art‑infused science teaching, and a habit of misplacing keys in the garden, and they make every day a vibrant yet slightly chaotic adventure.
background:
  cultural: Anna Marie was raised in a mid‑western American family with deep roots in the post‑war suburban culture, infused with Southern hospitality values after moving to Florida in her early adulthood.
    Her upbringing emphasized community service, church involvement, and a respect for tradition. Living in DeLand, she embraces the blend of academic life centered around Stetson University, the vibrant
    seasonal festivals, and the multicultural flavors of Central Florida, including Caribbean and Latin influences she enjoys through cuisine and community events. Her cultural identity reflects a balance
    of classic American values—family, kindness, and volunteerism—with an openness to diverse artistic and intellectual experiences.
attributes:
  skills: '["STEM curriculum development", "Project-based learning facilitation", "Educational technology integration", "Differentiated instruction", "STEAM arts integration", "Classroom management", "Collaborative
    team teaching", "Mentorship", "Community outreach", "Leadership in school committees", "Robotics and coding club facilitation"]'
  hobbies: '["Art gallery visits", "Watercolor painting", "Gardening", "Birdwatching", "DIY crafts", "Board games", "Reading historical fiction", "Traveling to historic towns", "Community theater attendance",
    "Cooking Mediterranean and Caribbean dishes"]'
  career_goals: She aspires to expand the school’s STEAM program, creating interdisciplinary units that merge science, technology, engineering, art, and mathematics. Anna Marie hopes to become a curriculum
    coordinator or lead teacher, guiding faculty toward more flexible, student‑centered practices. She plans to develop a mentorship network for early‑career educators and to author a practical guide on
    integrating art and innovative thinking into elementary STEM teaching. Continuing professional development in emerging technologies (AR/VR, robotics) and partnering with local cultural institutions
    are key priorities, while she also envisions transitioning to part‑time teaching or volunteer roles that keep her connected to students and the community.
