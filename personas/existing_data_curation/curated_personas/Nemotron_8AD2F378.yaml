personas:
  professional: Dorina Pou, a veteran postsecondary educator with two decades of instructional design expertise, leverages their structured, outcome‑driven approach and outgoing personality to craft collaborative
    curricula, mentor faculty, and drive accreditation initiatives, positioning themselves for an upcoming department chair or associate dean role.
  sports: Dorina Pou, an avid hiker, joins the Hocking Hills Hiking Club for weekend treks, practices weekly Vinyasa yoga, roots for the Cleveland Browns and Ohio State Buckeyes, and participates in a local
    adult softball league each spring.
  arts: Dorina Pou, a community‑theater enthusiast, performs in local productions ranging from classic Shakespeare to contemporary musical revues, draws inspiration from Lin‑Manuel Miranda’s storytelling,
    and frequently knits quilts while listening to Billie Holiday and reading contemporary fiction by Sally Rooney.
  travel: Dorina Pou, a culturally curious traveler, meticulously plans week‑long tours of European heritage sites such as Rome’s Colosseum, Prague’s Old Town, and Barcelona’s Gaudí masterpieces, balancing
    structured itineraries with spontaneous culinary detours, though finite vacation days limit more frequent trips.
  culinary: Dorina Pou, a garden‑to‑table cook, delights in seasonal dishes like heirloom tomato gazpacho, roasted beet and goat‑cheese salad, and fresh basil pesto, frequently featuring home‑grown vegetables
    and locally sourced cheese in community potlucks, while occasionally indulging in tiramisu for a sweet finish.
  core: Dorina Pou blends disciplined academic leadership with a sociable, garden‑loving spirit, channeling their love for community, structured planning, and occasional indulgent quirks into every facet
    of life.
background:
  cultural: Dorina grew up in the heart of Ohio’s mid‑Midwest, a region known for its emphasis on hard work, education, and civic involvement. Her family heritage includes German and Irish roots, reflected
    in seasonal celebrations, community gatherings, and a longstanding respect for learning. The values of reliability, collaborative spirit, and modest ambition she internalized from her hometown continue
    to shape her professional ethos. In New Albany, she embraces the area’s growing cultural diversity, actively fostering inclusive dialogue in her classroom and community activities while honoring the
    Midwestern traditions that shaped her upbringing.
attributes:
  skills: '["Instructional Design", "Curriculum Development", "Adult Learning Theory", "Educational Assessment", "Learning Management Systems", "Faculty Mentorship", "Accreditation Processes", "Public Speaking
    & Facilitation", "Grant Writing", "Community Engagement"]'
  hobbies: '["Gardening", "Cooking and Hosting Potlucks", "Hiking", "Yoga", "Book Club", "Community Volunteering", "Mentoring Adult Learners", "Craft Workshops (Knitting/Quilting)", "Travel", "Community
    Theater"]'
  career_goals: Dorina aims to transition into academic leadership, targeting a department chair or associate dean role where she can shape strategic initiatives for experiential learning. She plans to
    spearhead a college‑wide program that links undergraduate education majors with regional K‑12 schools, expanding mentorship opportunities and research collaborations. Publishing her work on inclusive
    teaching practices and obtaining a major educational research grant are high priorities. Additionally, she seeks to serve as a consultant for school districts on curriculum redesign, while continuing
    to mentor emerging faculty and influence institutional policy on student success.
