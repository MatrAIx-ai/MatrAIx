personas:
  professional: Mirtha Bulnes, a retired community organizer, blends their deep expertise in traditional cooking, bilingual communication, and textile arts to lead cultural workshops and mentorship programs,
    balancing meticulous planning with spontaneous creative flair.
  sports: Mirtha Bulnes enjoys low‑impact exercise, taking daily walks in the nearby Nichols Park and participating in the Huntersville Senior Walking Club, while cheering on the Charlotte Hornets and Carolina
    Panthers, and they casually follow the Charlotte Knights baseball season as a relaxing pastime.
  arts: Mirtha Bulnes frequents local galleries and the Mint Museum, drawing inspiration from the vibrant works of Frida Kahlo, Diego Rivera, and contemporary textile artist Faith Ringgold, while also listening
    to Andean and criollo music from maestros like Susana Baca and Eva Ayllón, and they integrate these influences into their knitting and quilting projects.
  travel: Mirtha Bulnes prefers purposeful travel, planning visits to historic sites like the Blue Ridge Parkway, Asheville's River Arts District, and Charleston's historic district, while dreaming of immersive
    culinary tours in Oaxaca, Mexico and the Andean highlands, and they often balance their wanderlust with budget constraints by opting for off‑season train trips and staying with relatives.
  culinary: Mirtha Bulnes, an expert home chef, perfects classic dishes such as ceviche, lomo saltado, causa, and ají de gallina using fresh cilantro, aji peppers, potatoes, and corn, while experimenting
    with fusion twists like quinoa‑filled empanadas, and they document each variation in a meticulously organized recipe notebook.
  core: Mirtha Bulnes, a 73‑year‑old culinary historian and cultural ambassador, balances rigorous organization with spontaneous creativity, obsessively journals their recipes and stories, and often worries
    about preserving their legacy.
background:
  cultural: Mirtha was born in Peru, growing up in a coastal town where family meals centered around fresh seafood and vibrant native ingredients. Her upbringing was rooted in Catholic traditions, community
    gatherings, and a strong emphasis on preserving the Spanish language and Peruvian customs. She immigrated to the United States in her early adulthood, settling first in a larger city before eventually
    moving to Huntersville, NC. While embracing Southern hospitality, Mirtha has maintained her Peruvian identity by celebrating Inti Raymi, Día de la Independencia (July 28), and other national holidays
    with traditional foods, music, and dance. She actively participates in the local Hispanic community, volunteering at cultural events and sharing her culinary heritage. Her bilingual fluency and deep
    respect for both Peruvian and American cultures enable her to serve as a bridge, fostering mutual understanding and enriching the cultural tapestry of Cabarrus County.
attributes:
  skills: '["Peruvian cooking", "Bilingual Spanish-English communication", "Community volunteer coordination", "Gardening and horticulture", "Arts and crafts (knitting, quilting)", "Basic computer literacy
