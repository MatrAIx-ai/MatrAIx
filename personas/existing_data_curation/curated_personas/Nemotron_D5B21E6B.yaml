  hobbies: '["Cooking Peruvian dishes", "Gardening (vegetables and ornamental plants)", "Knitting and quilting", "Reading historical novels and biographies", "Visiting local art galleries and museums",
    "Attending Peruvian cultural festivals", "Listening to traditional Andean music", "Walking in local parks", "Journaling and memoir writing", "Practicing Spanish conversation"]'
  career_goals: Although retired, Mirtha aspires to remain an active cultural ambassador in Huntersville. She plans to compile a family cookbook that intertwines recipes with personal anecdotes, preserving
    her heritage for future generations. She hopes to volunteer regularly at the Cabarrus County library to run Peruvian cooking demonstrations and storytelling sessions for children and seniors. Mirtha
    dreams of establishing a small community garden where locals can learn to grow herbs used in Peruvian cuisine, fostering cross‑generational interaction. She also envisions collaborating with the local
    art museum to curate exhibitions that showcase Andean textile art, thereby increasing representation of Latin American cultures in the regional arts scene. Ultimately, Mirtha wishes to document her
    life story in a memoir, offering insights into immigrant resilience and continuing to mentor young immigrants as a bridge between cultures.
