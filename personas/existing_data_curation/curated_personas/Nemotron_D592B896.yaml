personas:
  professional: Myriam Rampersad leverages a blend of rigorous data analysis and artistic visual storytelling to lead strategic initiatives in mid-sized corporations, turning complex Power BI dashboards
    into compelling narratives while fostering cross‑cultural collaboration across diverse teams.
  sports: Myriam Rampersad spends sunrise weekends hiking the Grand River Trail with the local Trailblazers Club, attends Detroit Pistons games for a dose of basketball camaraderie, and participates in
    a community yoga studio where they blend meditation with strength training to maintain a low‑impact fitness routine.
  arts: Myriam Rampersad visits the Grand Rapids Art Museum and seeks inspiration from contemporary muralists whose work draws on vibrant folk storytelling, collects limited‑edition prints by Yayoi Kusama,
    and spends quiet evenings painting watercolors in a studio lit by bold palettes that echo her cultural narratives.
  travel: Myriam Rampersad prefers meticulously planned solo trips that blend cultural immersion with relaxation, having trekked the historic streets of Oaxaca during Day of the Dead celebrations, weekend‑hiked
    the Appalachian Blue Ridge Parkway, and earmarked a future adventure to Kyoto’s historic temples to study traditional tea ceremonies.
  culinary: Myriam Rampersad delights in crafting homemade tamales and pozole using heirloom corn masa and epazote, experiments with fusion dishes like chipotle‑infused quinoa bowls, and showcases a moderate
    cooking skill level that shines during weekly market trips to the Grand Rapids Downtown Market where they select fresh chilies, avocados, and artisanal cheeses.
  core: Myriam Rampersad balances a data‑driven career with a love for watercolor and a habit of meticulously organizing finances while occasionally indulging in late‑night coffee runs and an unhealthy
    obsession with perfectly aligned bookshelf spines.
background:
  cultural: Myriam was raised in a Mexican‑American household, growing up bilingual in Spanish and English. She maintains strong ties to her Mexican heritage through family traditions, celebrating Día de
    los Muertos and other cultural holidays with community events in Grand Rapids. Her upbringing blends Mexican artistic sensibilities—such as vibrant color palettes and folk storytelling—with Midwestern
    values of independence and community involvement. This bicultural perspective informs her professional ethos, enhancing her ability to navigate diverse workplaces and to incorporate cultural nuance
    into business strategy.
