  hobbies: '[''Visiting contemporary art galleries'', ''Watercolor painting'', ''Reading contemporary fiction and business innovation books'', ''Cooking Mexican cuisine'', ''Exploring local food markets'',
    ''Hiking the Grand River trail'', ''Participating in small book‑club discussions'', ''Practicing yoga and meditation'', ''Volunteering at cultural festivals'', ''Learning basic Nahuatl phrases'']'
  career_goals: Myriam aims to progress to a senior strategic analyst or director of strategy position within a forward‑thinking organization, where she can shape long‑term business direction and embed
    innovative, culturally informed solutions. She plans to pursue an MBA to deepen her strategic expertise and to earn certification in data analytics. Over the next five years, she hopes to lead cross‑functional
    initiatives that align corporate performance with community impact, mentor emerging analysts, and contribute thought leadership on integrating creativity into business strategy.
