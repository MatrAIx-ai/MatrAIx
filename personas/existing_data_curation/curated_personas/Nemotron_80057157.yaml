  skills: '[''Financial accounting'', ''Auditing'', ''Tax preparation'', ''Regulatory compliance'', ''Microsoft Excel (advanced)'', ''QuickBooks'', ''SAP ERP'', ''Data visualization (Power BI, Tableau)'',
