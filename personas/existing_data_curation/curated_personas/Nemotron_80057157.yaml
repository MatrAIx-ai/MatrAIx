  hobbies: '[''Book club'', ''Historical society volunteer'', ''Yoga and meditation'', ''Coastal hiking'', ''Kayaking'', ''Pottery'', ''Painting'', ''Museum visits'', ''Theatre outings'', ''Cooking and
    wine tasting'', ''Hosting dinner parties'']'
  career_goals: She aspires to become a senior audit manager within the next five years, eventually moving into a CFO role or a senior advisory position focusing on sustainability and ESG compliance for
    mid-sized firms. She hopes to earn her CPA certification and attend leadership development programs to strengthen her strategic decision‑making. Balancing her desire for career advancement with her
    need for flexibility, she aims to implement more structured workflows in her department to reduce stress and improve team morale. In the longer term, she envisions leveraging her arts background to
    spearhead financial initiatives for cultural institutions or nonprofit arts organizations in the Boston area.
