  career_goals: Jennifer dreams of a future where she can combine her love of animals, gadgets, and helping others. She often talks about becoming a veterinarian who uses technology to diagnose pets, or
    an inventor who creates useful tools for her community. She also imagines herself winning science fairs and leading a school robotics team, showing her drive to be recognized for innovative ideas and
    practical solutions.
