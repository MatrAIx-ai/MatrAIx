personas:
  professional: Dianne Womack, a 45‑year‑old community‑focused organizer, leverages her knack for budgeting, scheduling, and digital coordination to thrive in part‑time nonprofit program support roles,
    where they combine pragmatic curiosity with an assertive yet cooperative style to keep volunteer projects on track.
  sports: Dianne Womack enjoys weekend hikes along the Puget Sound trails and supports the Seattle Seahawks, Sounders FC, and the local community running club, blending a love for outdoor fitness with a
    laid‑back spectator attitude, and they often join group runs on Saturday mornings.
  arts: Dianne Womack shares a devotion to nature photography, often citing Ansel Adams and The Decemberists as influences, while knitting to the gentle tunes of Joni Mitchell and attending community theater
    performances of classics like \"Our Town\", and they regularly contribute photos to the local gallery nights.
  travel: Dianne Womack balances her love for local adventure—such as camping on the San Juan Islands and exploring Oregon’s Columbia River Gorge—with aspirations to trek New Zealand’s South Island and
    visit historic libraries in Edinburgh, favoring self‑planned itineraries that fit their modest budget and they often map out routes with detailed notes.
  culinary: Dianne Womack delights in crafting homemade raspberry preserves, dill‑pickled cucumbers, and rustic sourdough bread, often seasoning dishes with fresh thyme and rosemary from her garden, while
    mastering the occasional intricate croissant for friends, and they keep a meticulously labeled recipe binder to track each experiment.
  core: Dianne Womack blends Midwestern self‑reliance, Pacific‑Northwest sustainability, and a meticulous yet adaptable nature into a life of organized community service, garden‑to‑table cooking, and quiet
    creative pursuits, and they approach each day with pragmatic curiosity.
background:
  cultural: Dianne comes from a white, Midwestern‑American background, with family roots in the farming communities of Ohio and Iowa. Growing up in the Pacific Northwest, she has embraced the region’s outdoors‑oriented
    lifestyle, environmental awareness, and community‑centered values. Her upbringing blended a traditional American work‑ethic and self‑reliance with the multicultural influences of Federal Way’s diverse
    population, shaping a pragmatic yet open‑minded worldview.
attributes:
  skills: '[''Household budgeting and financial planning'', ''Event planning and coordination'', ''Basic DIY home repair'', ''Gardening and horticulture'', ''Digital literacy (email, word processing, spreadsheets,
    social media)'', ''Cooking and recipe development'', ''CPR/First Aid certified'', ''Facilitation of community workshops'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Reading (fiction and self-help/non-fiction)'', ''Knitting and crocheting'', ''Photography'', ''Volunteering at the public library'', ''Cooking and preserving'']'
  career_goals: Dianne aims to transition back into the workforce on a part‑time or flexible basis, focusing on roles that leverage her organizational strengths and community experience, such as administrative
    support, customer service, or program coordination for a nonprofit. She plans to enroll in a community college course to obtain a GED and a certificate in office administration within the next year.
    Long‑term, she hopes to launch a small home‑based business selling homemade preserves and baked goods, and eventually serve on the board of a local environmental or senior services organization.
