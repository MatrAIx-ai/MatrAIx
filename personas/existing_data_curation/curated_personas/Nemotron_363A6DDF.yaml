personas:
  professional: Jason Hernandez is a budding digital illustrator and robotics enthusiast who channels their curiosity into sketching fantasy characters, assembling intricate LEGO constructions, and programming
    simple bots in the school robotics club, applying a competitive mindset to continually improve each project, and they eagerly share their creations with friends.
  sports: Jason Hernandez enjoys weekend hikes along the Kern River Trail, plays on the Bakersfield Youth Soccer Club's under-12 team during spring, and roots for the Los Angeles Dodgers, balancing outdoor
    exploration with team sport competition while they stay active and motivated.
  arts: Jason Hernandez is a budding digital artist who draws inspiration from Studio Ghibli movies, the graphic novels of Mike Mignola, and piano pieces by Yiruma, spending evenings sketching characters,
    creating pixel art on a tablet, and building LEGO dioramas as three-dimensional storytelling canvases, and they experiment with different color palettes to convey mood.
  travel: Jason Hernandez loves family road trips that combine museum visits like the California Science Center with nature excursions to Sequoia National Park, and dreams of exploring Tokyo's Akihabara
    district to soak in its anime culture, preferring itineraries that balance structured tours with free-play exploration while they soak up new experiences.
  culinary: Jason Hernandez favors cheesy pepperoni pizza, chicken quesadillas with salsa, and occasional sushi rolls, enjoys helping their parents whip up homemade macaroni and cheese using cheddar, butter,
    and a pinch of paprika, and delights in crafting LEGO-shaped sugar cookies with vanilla, butter, and powdered sugar, and they love to experiment with toppings and flavors.
  core: Jason Hernandez is a curious, competitively spirited 10-year-old who blends artistic imagination with a love for robotics, balances structured responsibilities with spontaneous creativity, and navigates
    modest allowances, occasional health quirks, and a deep passion for exploring both digital and natural worlds, all while they stay eager to learn new things.
background:
  cultural: Jason grew up in Bakersfield, California, a city that blends agricultural, oil‑industry, and multicultural influences. His family identifies as white American, with a Hispanic surname that reflects
    a blend of cultural traditions. He celebrates typical American holidays such as Thanksgiving and the Fourth of July, while also taking part in occasional Hispanic customs like Día de los Muertos gatherings
    with extended family. The local community’s mix of country music, Mexican cuisine, and West Coast pop culture shapes his experiences. He speaks English fluently and has been exposed to basic Spanish
    phrases through family and school programs.
