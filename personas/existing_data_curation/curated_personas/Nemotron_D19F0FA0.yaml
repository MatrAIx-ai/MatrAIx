  hobbies: '[''Walking on the beach'', ''Fishing'', ''Nature photography'', ''Journaling'', ''Mindfulness meditation'', ''Reading nonfiction (psychology, self‑help)'', ''Volunteering at a food bank'', ''Community
    gardening'', ''Cooking Mediterranean dishes'', ''Attending local cultural festivals'', ''Learning Spanish'']'
  career_goals: Felipe aims to advance to a shift supervisor role within the next two years, followed by promotion to store manager, by completing a retail management certification and seeking mentorship
    from experienced leaders. While pursuing these practical career steps, he also wants to channel his compassionate drive into community work, volunteering regularly at a local mental‑health outreach
    program and eventually obtaining a part‑time position as a community liaison for a nonprofit that supports at‑risk individuals. He hopes this dual path will provide financial stability, personal growth,
    and a greater sense of purpose while allowing him to manage his anxiety through structured, meaningful work.
