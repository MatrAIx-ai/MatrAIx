  hobbies: '[''playing tag and soccer'', ''group games at community center'', ''art classes (painting and drawing)'', ''nature walks and bird watching'', ''gardening with family'', ''beginner dance group'',
    ''singing picture book songs'', ''LEGO and magnetic tile building'']'
  career_goals: Rita dreams of becoming a wildlife caretaker or park ranger so she can protect the forests and rivers she loves exploring in Portland's parks. She also imagines herself as a teacher, sharing
    stories and helping classmates learn, because she enjoys being around friends and being helpful. Occasionally she mentions wanting to be an astronaut to discover new planets, reflecting her curiosity
    about the world beyond. Her ambitions blend her love for nature, desire to help others, and practical interest in learning new facts.
