personas:
  professional: Rita is a budding junior ecologist who blends boundless curiosity with practical experiment design, organizing backyard wildlife observations into tidy charts, and they confidently lead
    group projects at their school's Nature Club.
  sports: Rita's athletic energy shines on the soccer field at the community center, where they play for the Timbers Kids Academy youth league, cheer on the Portland Timbers and Portland Thorns during match
    days, and supplement their tag games with calm yoga stretches they learned from a local instructor's class after school.
  arts: Rita channels creative energy through weekly art classes where they paint rain-kissed Portland cityscapes inspired by local muralist Elliott Hinton, dance with the Little Sprouts troupe to upbeat
    tunes like Idina Menzel's 'Let It Go', and sing beloved picture-book songs while humming melodies from The Little Mermaid and the folk sounds of Sufjan Stevens, reflecting a vibrant artistic spirit.
  travel: Rita's wanderlust leads to weekend hikes at Multnomah Falls in the Columbia River Gorge, family road trips to the Seattle Space Needle and Oregon Coast's Cannon Beach, a memorable December visit
    to Disney World in Florida, and a bright-eyed wish to explore Redwood National Park and the snow-capped peaks of Mt. Rainier, always sketching scenes in a pocket diary.
  culinary: Rita relishes building snack towers of carrot sticks, hummus, and apple slices, devouring homemade cheese pizza topped with fresh basil and mozzarella, and enthusiastically adding a dash of
    soy sauce to her mother's vegetable stir-fry, showcasing a budding palate that loves bright flavors, crunchy textures, and occasional adventurous twists.
  core: Rita is a sunny, inquisitive six-year-old who blends boundless curiosity with calm resilience, effortlessly turning every playground game or nature walk into a mini-research project while never
    missing a chance to share a grin or a spontaneous dance move.
background:
  cultural: Rita comes from a white, likely European-American background with roots in the Pacific Northwest. Her family embraces Portland's emphasis on sustainability, outdoor recreation, and community
    arts. They celebrate typical American holidays while also taking part in local events like the Portland Rose Festival and Earth Day activities, fostering an appreciation for environmental stewardship.
    The household values education, politeness, and cooperation, and it encourages Rita's curiosity about nature and science, while also supporting her involvement in group activities and community programs.
attributes:
