persona_description: A public health expert who is closely monitoring the spread of the coronavirus in the United States and is concerned about the potential for exponential growth to change the situation
  with dizzying speed. They are interested in understanding the underlying epidemiological trends and the implications of the current mortality rates and growth curves for the country's healthcare system
  and the overall health of its citizens. They are also concerned about the potential for the virus to spread to other countries and are monitoring the data from other countries to understand how they are
  responding to the crisis.
