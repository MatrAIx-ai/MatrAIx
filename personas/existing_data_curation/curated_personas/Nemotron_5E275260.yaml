  hobbies: '[''Gardening (vegetables & native flowers)'', ''Bird-watching'', ''Woodworking'', ''Reading historical nonfiction (Texas & military history)'', ''Attending community events (Fort Worth Stock
    Show, county fair)'', ''Volunteering at the food bank'', ''Playing bridge'', ''Road trips to historic sites in Texas and neighboring states'']'
  career_goals: Although no longer employed full‑time, Charles remains goal‑oriented. He aims to expand his volunteer impact by establishing a mentoring program for retired veterans at the senior center,
    while continuing to develop his woodworking skills to create functional furniture that he can donate to local charities. He also plans to finish a written memoir that chronicles his family’s history
    and wartime stories, and to maintain his health through regular walking on the Trinity Trails, with a target of completing a 15‑mile loop each month. Learning digital photography to document local wildlife
    and historic sites is another ambition he hopes to achieve within the next year.
