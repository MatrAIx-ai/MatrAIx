  career_goals: Bobby dreams of becoming a creative technologist who blends art, storytelling, and technology to craft immersive experiences. He aspires to work as a video game designer or interactive media
    artist, creating worlds that encourage empathy and curiosity. Long‑term, he hopes to launch a community art program that introduces under‑served kids to digital art and coding, merging his compassionate
    nature with his love for novelty and abstract concepts.
