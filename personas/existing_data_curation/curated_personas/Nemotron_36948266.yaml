personas:
  professional: Deven Pilarte, a 19‑year‑old aspiring concept artist, channels their vivid imagination and methodical project‑management skills into digital illustrations that blend folk motifs with sci‑fi
    aesthetics, while their bilingual fluency and outgoing nature make them a natural leader in school art clubs and community workshops.
  sports: Deven Pilarte, an energetic 19‑year‑old, plays recreational volleyball with the Concord Community Club, follows the San Francisco 49ers and Golden State Warriors avidly, and they mix weekly jogs
    along the Pleasant Hill path with occasional skateboarding sessions at the local skate park to stay fit.
  arts: Deven Pilarte immerses themselves in the Bay Area art scene, drawing inspiration from Frida Kahlo, Hayao Miyazaki, and street artist Banksy, while they regularly attend exhibitions at the Oakland
    Museum of California and participate in open‑mic poetry nights featuring spoken‑word artists like Saul Williams.
  travel: Deven Pilarte prefers meticulously planned cultural trips, having journeyed to Oaxaca for a Día de los Muertos celebration and backpacked through Kyoto's temples, yet they keep future adventures
    focused on nearby weekend getaways to Santa Cruz and the Redwood National Park.
  culinary: Deven Pilarte enjoys cooking traditional mole poblano with roasted chiles, chocolate, and spices alongside homemade corn tortillas, while they also experiment with fusion dishes like tacos al
    pastor topped with kimchi, showcasing a strong palate for bold flavors and a moderate cooking skill that balances heritage recipes with culinary curiosity.
  core: Deven Pilarte is a 19‑year‑old visionary artist who blends vibrant folk motifs with sci‑fi narratives, wrestles with persistent worry, and they channel that tension into meticulous, community‑focused
    creativity.
background:
  cultural: Deven is a second‑generation Mexican‑American raised in Concord, California. At home, Spanish is spoken and Mexican customs such as Día de los Muertos, Cinco de Mayo celebrations, and traditional
    cooking are central to family life. His Mexican heritage influences his artistic style, often incorporating vibrant colors, folk patterns, and symbolic imagery drawn from his cultural roots. Growing
    up in the diverse Bay Area, he blends this heritage with Californian pop culture, creating a hybrid identity that values community, family, and artistic expression. He participates in local Mexican
    community events, maintains strong ties to his extended family, and proudly celebrates his bicultural background.
attributes:
  skills: '["Digital Illustration (Adobe Photoshop, Illustrator)", "Graphic Design", "Creative Writing", "Basic Python Programming", "Event Planning and Coordination", "Bilingual Spanish‑English Communication",
