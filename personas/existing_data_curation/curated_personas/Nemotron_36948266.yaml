  hobbies: '["Sketchjournal Drawing", "Digital Painting and 3D Modeling", "Creative Writing (short stories, poetry)", "Playing Acoustic Guitar", "Visiting Art Galleries", "Attending Cultural Festivals",
    "Narrative Video Gaming", "Street Photography", "Cooking Mexican Cuisine", "Volunteering as Youth Art Mentor", "Playing Volleyball", "Mindfulness Journaling"]'
  career_goals: Deven plans to enroll in a community college program in Visual Arts or Graphic Design, with the long‑term ambition of becoming a professional concept artist for video games and later a creative
    director at a design studio. He aims to build a freelance portfolio that blends Mexican cultural motifs with contemporary digital art, eventually launching his own boutique design agency that serves
    local businesses and community projects. Recognizing his tendency toward worry, he seeks a career path that balances creative freedom with reliable income and structured deadlines, providing the stability
    he values. He also hopes to mentor younger students in Concord through art workshops, merging his passion for creativity with a desire to give back to his community.
