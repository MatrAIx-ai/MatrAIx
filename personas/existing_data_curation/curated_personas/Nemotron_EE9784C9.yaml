personas:
  professional: Mary Wilson, a licensed civil engineer, blends rigorous structural analysis and BIM expertise with a painter’s eye for form, leading multidisciplinary teams to deliver sustainable infrastructure
    that is both functional and visually striking, while methodically pursuing a PE license and a senior leadership role.
  sports: Mary Wilson, an avid hiker and member of the Lehigh Valley Hiking Club, follows the Philadelphia Eagles and Philadelphia Phillies, fits in weekend trail runs along the Delaware River, attends
    the IronPigs games for a local touch, and balances cardio with a twice‑weekly yoga class to maintain core strength for their demanding field work.
  arts: Mary Wilson, an enthusiastic watercolorist and sketch artist, draws inspiration from Monet’s soft palettes and Zaha Hadid’s fluid structures, regularly visits the Allentown Art Museum and local
    historic sites, tunes in to Debussy’s piano nocturnes and Escher’s mind‑bending prints, and loses themselves in speculative novels by Margaret Atwood and Neal Stephenson.
  travel: Mary Wilson prefers meticulously planned trips that combine architectural curiosity and nature, having trekked the South Island of New Zealand, toured the ancient temples of Kyoto, and explored
    the terrazzo streets of the Amalfi Coast, while dreaming of geothermal hikes in Iceland and a future road‑trip through the Colorado Rockies.
  culinary: Mary Wilson enjoys experimental cooking, often harvesting heirloom tomatoes from their garden to craft a rustic sourdough pizza topped with rosemary‑infused grilled zucchini, mastering sous‑vide
    salmon with fennel and citrus, and daringly fermenting kimchi for a weekly dinner experiment.
  core: Mary Wilson, a methodical engineer with a vivid artistic flair, balances structured project leadership with watercolor dreams, nature hikes, speculative fiction, and a disciplined yet occasionally
    indulgent approach to finance and health.
background:
  cultural: Mary grew up in a middle‑class, white family in the Lehigh Valley with German and Irish ancestry, reflecting the region’s historic blend of industrial heritage and European immigrant traditions.
    The community’s emphasis on hard work, education, and civic involvement shaped her values. She participates in local cultural events such as the Kutztown Folk Festival and supports community service
    initiatives, while also appreciating the area’s rich history of steel manufacturing and its evolving focus on sustainability and arts. This cultural tapestry informs her balanced perspective on engineering
    solutions that honor both heritage and innovation.
