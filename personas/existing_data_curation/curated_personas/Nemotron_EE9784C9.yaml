  hobbies: '[''Watercolor painting'', ''Architectural sketching'', ''Visiting art galleries'', ''Hiking'', ''Nature photography'', ''Reading speculative fiction'', ''Gardening'', ''Experimental cooking'',
    ''DIY home renovation'', ''Piano playing'']'
  career_goals: Mary aims to advance to a senior leadership role—such as Director of Engineering or Head of Sustainable Infrastructure—within the next five years, overseeing large‑scale regional projects
    that integrate green design and community revitalization. She plans to obtain her Professional Engineer (PE) license if not already held, pursue a specialized certification in climate‑resilient design,
    and mentor emerging engineers, especially women in STEM. Mary also aspires to influence public policy through participation in municipal planning committees, championing innovative infrastructure solutions
    that balance functionality, environmental stewardship, and aesthetic value.
