personas:
  professional: Lisa Arza, a construction laborer with an associate’s degree in construction technology, blends methodical blueprint reading and heavy‑equipment expertise with a safety‑first mindset, reliably
    mentors newer crew members and plans to become a foreman within two years while earning OSHA certifications.
  sports: Lisa Arza, a member of the Midtown Community Basketball Club, courts the over‑30s league three nights a week, regularly hikes the Red Rock Canyon trails, and fuels their competitive spirit by
    rooting for the Oklahoma City Thunder and Oklahoma City Dodgers during the season.
  arts: Lisa Arza, a regular soprano in the First Street Baptist Church choir, finds inspiration in the acoustic folk of James Taylor and the avant‑garde eco‑design sketches of Zaha Hadid, while often spending
    Saturday afternoons at the Oklahoma City Museum of Art exploring contemporary installations.
  travel: Lisa Arza prefers carefully planned weekend road trips to nearby natural gems like the Great Smoky Mountains and the Grand Canyon, while dreaming of a longer eco‑tour of Costa Rica’s rainforests,
    balancing travel aspirations against the time pressures of a demanding construction schedule and a mortgage‑saving goal.
  culinary: Lisa Arza, an avid home cook, delights in soul‑food staples such as shrimp and grits, collard greens slow‑cooked with smoked turkey, and baked sweet potato pie, often incorporating fresh herbs
    from their garden, and enjoys experimenting with a quinoa‑based twist on classic biscuits for friends gatherings.
  core: Lisa Arza merges a hard‑hat precision with a garden‑grown patience, turning construction site worries into meticulously journaled plans while nurturing community through choir song and sustainable
    home‑building dreams.
background:
  cultural: Lisa was born and raised in Oklahoma City’s historic Black neighborhood, where church, family gatherings, and community events shaped her worldview. Growing up, she absorbed the rhythms of gospel
    music, the flavors of Southern soul cooking, and the legacy of resilience that characterizes the local African‑American community. Her cultural heritage instilled a strong sense of teamwork, mutual
    support, and a commitment to giving back, which she expresses through mentoring younger workers and volunteering. While navigating a predominantly male, often white‑dominated industry, Lisa draws on
    her community’s emphasis on perseverance and pride to advocate for greater diversity and inclusion in construction.
attributes:
  skills: '[''Heavy equipment operation (backhoe, skid‑steer loader)'', ''Blueprint reading and interpretation'', ''Site safety inspection and OSHA compliance'', ''Concrete finishing and formwork'', ''Basic
    carpentry and framing'', ''Material inventory and logistics management'', ''Construction management software (Procore, Buildertrend)'', ''Quality control and inspection procedures'', ''Team coordination
    and small‑group leadership'', ''Problem solving under site constraints'', ''Time management and scheduling'', ''Detailed documentation and reporting'', ''Sustainable building practices (recycled materials,
    energy‑efficient methods)'']'
  hobbies: '[''Gardening'', ''DIY home‑improvement projects'', ''Reading about architecture and sustainable design'', ''Church choir participation'', ''Cooking Southern and soul food'', ''Basketball'',
    ''Hiking'', ''Volunteering with Habitat for Humanity'', ''Journaling for stress management'']'
  career_goals: Lisa aims to move from laborer to foreman within the next two years, leveraging her organizational strengths and safety expertise. She plans to earn OSHA 30‑hour certification, complete
    a bachelor’s degree in construction management online, and become a certified construction safety officer. Long‑term, she envisions supervising multi‑million‑dollar projects, mentoring women and Black
    workers in the trades, and eventually launching her own contracting firm focused on affordable, eco‑friendly housing in the Oklahoma City community. Financial stability for homeownership and a work‑life
    balance that allows her to continue personal development are also central to her ambitions.
