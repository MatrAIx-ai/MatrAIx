  hobbies: '[''Reading nonfiction'', ''Journaling'', ''Puzzle solving (Sudoku, crosswords)'', ''Gardening'', ''Hiking local trails'', ''Yoga classes'', ''Model building'', ''Community food‑bank volunteering'']'
  career_goals: Olivia aims to build on her hands‑on experience to move into a lead‑operator or shift‑supervisor role within the next three to five years. She plans to enroll in evening courses at a local
    community college to earn an industrial maintenance certification and to complete an OSHA trainer program. Her competitive streak drives her to improve production efficiency and reduce waste, positioning
    herself as a candidate for a process‑improvement specialist or safety‑officer position. Because she finds unpredictable environments stressful, she also seeks a role that offers a stable schedule and
    clear performance metrics, allowing her to manage anxiety while contributing to her plant’s operational excellence.
