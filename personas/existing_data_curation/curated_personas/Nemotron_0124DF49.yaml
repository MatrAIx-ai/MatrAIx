  hobbies: '[''Hiking the Rocky Mountains'', ''Experimenting with Mexican‑fusion recipes'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading speculative fiction'', ''Landscape photography'',
    ''Volunteering for after‑school STEM programs'', ''Social dancing (salsa, cumbia)'']'
  career_goals: Leonora aims to leverage her technical background to launch a community‑focused STEM hub in Denver that supports Latino youth. She is pursuing a part‑time master’s program in Environmental
    Engineering to pivot into sustainability consulting, with a particular interest in renewable‑energy data analysis for local municipalities. Over the next five years she hopes to secure grant funding
    for her hub, become a recognized speaker on inclusive tech education, and transition into freelance consulting roles that allow her to maintain a flexible schedule.
