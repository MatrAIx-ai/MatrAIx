personas:
  professional: Leonora Villacres, a data‑driven environmental engineer and budding community entrepreneur, harnesses her STEM expertise, bilingual fluency, and hands‑on Arduino problem‑solving to create
    renewable‑energy analytics for Denver municipalities while steering the development of a flexible, after‑school STEM hub for Spanish‑speaking youth, blending her curiosity for emerging technologies
    with a pragmatic respect for proven protocols and a competitive drive to secure grant funding despite her relaxed, occasionally disorganized planning style.
  sports: Leonora Villacres, an avid Rocky Mountain hiker and seasonal trail‑runner who belongs to a local mountain‑bike club, roots for the Colorado Rockies and the Denver Broncos, and prefers solo weekend
    treks over structured gym workouts, balancing her competitive spirit for personal bests with a laid‑back attitude that sometimes leads her to skip recovery days after intense photo excursions.
  arts: Leonora Villacres, a landscape photographer who captures Colorado sunrises, a regular participant in salsa and cumbia nights inspired by Celia Cruz and Carlos Vives, and a devoted reader of speculative
    fiction by Octavia Butler and Margaret Atwood, blends these artistic passions into her identity while occasionally binge‑watching avant‑garde films during lazy evenings.
  travel: Leonora Villacres, who favors spontaneous, rugged road trips over meticulously planned itineraries, has trekked through Banff, explored the Machu Picchu ruins, and dreams of revisiting the Oaxaca
    valleys for their culinary scene, while budgeting her adventures through credit‑card points and occasional grant‑funded community trips, yet often leaves essential gear at home due to her relaxed, disorganized
    packing habits.
  culinary: Leonora Villacres, an enthusiastic home‑cook with a flair for Mexican‑fusion, regularly prepares mole‑marinated tacos topped with Korean kimchi and avocado‑lime salsa, experiments with roasted
    chiles de árbol and fresh corn masa, yet frequently lets the kitchen become a mess after late‑night cooking sessions because her flexible schedule places clean‑up low on her priority list.
  core: Leonora Villacres, a competitive yet laid‑back tech‑engineer who merges outdoor adventure, hands‑on gadgetry, and spicy fusion cuisine into a life of spontaneous creativity, perpetual tinkering,
    and occasional disorganization.
background:
  cultural: Leonora grew up in a bilingual Mexican household, celebrating traditions such as Día de los Muertos and quinceañeras while navigating life in the United States. Her Mexican heritage informs
    her culinary tastes, community values, and fluency in Spanish, which she often uses to bridge cultural gaps in STEM outreach. Living in Denver’s diverse neighborhood, she blends Mexican cultural pride
    with a Colorado love of the outdoors, creating a hybrid identity that values family, resilience, and community empowerment.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Experimental design'', ''Laboratory techniques (PCR, spectroscopy)'', ''Statistical modeling'', ''Technical writing'', ''Bilingual communication (Spanish/English)'',
