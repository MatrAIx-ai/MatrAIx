personas:
  professional: Yonghui Sun, a 19‑year‑old aspiring project manager studying Business Administration, channels their methodical organization, bilingual fluency, and outgoing teamwork into leading school
    club events and coordinating community tech workshops, making every initiative run like a well‑planned sprint, and they never miss a deadline.
  sports: Yonghui Sun plays varsity soccer for the Orlando City Youth Academy and trains with the Orlando Volleyball Club, follows Orlando City SC and the Orlando Pride with fervor, and maintains a disciplined
    fitness routine that blends team practices, cardio runs, and weekend beach volleyball matches, and they always schedule recovery days after intense games.
  arts: Yonghui Sun immerses themselves in K‑pop dance routines to BTS and BLACKPINK, devours sci‑fi novels by Liu Cixin and Becky Chambers, and frequently attends local cultural festivals featuring traditional
    lantern displays, while curating a TikTok channel that showcases their choreography and book reviews, and they love sharing their creative process with online followers.
  travel: Yonghui Sun enjoys planning immersive trips that combine cultural festivals and urban exploration, having visited Shanghai for Lunar New Year celebrations and Tokyo for cherry blossom viewing,
    dreaming of a solo backpacking adventure through Seoul’s street food scene, while also cherishing weekend getaways to the Florida Keys for relaxed snorkeling, and they often journal each journey in
    a sketchbook.
  culinary: Yonghui Sun loves cooking home‑made dumplings with pork and ginger, perfecting mapo tofu with Sichuan peppercorns, experimenting with bubble‑tea recipes using fresh tapioca pearls, and often
    hosts family gatherings where they serve a spread of Asian fusion dishes paired with locally sourced avocado toast.
  core: Yonghui Sun is a 19‑year‑old bilingual organizer who blends meticulous project planning, a love for K‑pop choreography, disciplined budgeting, and an energetic spirit that thrives on volleyball
    courts and cultural celebrations, and they always keep a planner handy.
background:
  cultural: Yonghui comes from an East Asian family with roots in China, and she was raised in a bicultural environment that blends traditional Chinese customs with American life. She celebrates Lunar New
    Year, Mid‑Autumn Festival, and other cultural holidays while also participating in mainstream U.S. celebrations. Fluent in Mandarin and English, she values education, respect for elders, and community
    service, and she often shares her heritage through food, language, and cultural events in the diverse community of Orlando.
