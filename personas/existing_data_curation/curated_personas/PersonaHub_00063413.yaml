persona_description: A pediatric orthopedic surgeon who specializes in the treatment of congenital pseudarthrosis of the tibia, a rare and complex condition that requires specialized knowledge, skills,
  and experience in diagnosing and treating this condition. This surgeon is likely to be highly skilled in dynamic imaging studies, diagnostic imaging, and surgical procedures, including excision of the
  lesion, compression with the Ilizarov device, and intramedullary rodding. They are also likely to be familiar with the current treatment options and indications for amputation, and are likely to be involved
  in ongoing debate and disagreement among pediatric orthopaedists regarding the optimal treatment and indications for amputation in this condition.
