  hobbies: '[''Art Gallery Visits'', ''Digital Collage'', ''Experimental Music'', ''Hiking'', ''Birdwatching'', ''Foraging'', ''Makerspace Projects'', ''Arduino Sensor Building'', ''Yoga'', ''Journaling'']'
  career_goals: Joyce aims to re‑enter the professional world in a role that fuses her STEM expertise with her passion for art and public engagement. She envisions becoming a scientific communication specialist
    or a sustainability consultant for local non‑profits, creating data‑driven storytelling tools that inspire community action on climate and conservation issues. In the longer term, she hopes to lead
    a regional citizen‑science program that empowers residents to collect and interpret environmental data, while also publishing a series of illustrated guides that make scientific concepts approachable
    for a broad audience.
