persona_description: A neuroscientist and researcher at the University of Colorado, specializing in the study of brain functioning and the interplay between reasoning and brain processing in solving complex
  number-comparison tasks. He/she has expertise in neuroimaging techniques, specifically fMRI brain scans, and has designed experiments to investigate how the human brain processes mathematical symbols
  and operations, particularly fractions. The researcher is supported by modest awards from the University of Colorado Denver and the Leach Family Donor Advised Fund at Community First Foundation, and is
  currently conducting step-by-step tasks to differentiate brain activity while students solve comparison tasks of whole numbers or fractions. The researcher's work aims to understand where and how the
  brain processes fractions and if specific teaching interventions can improve participants' learning and response times.
