persona_description: A professional archaeologist who specializes in the conservation and restoration of coins and metallic artifacts, particularly those from the city of Thessaloniki and its broader region.
  She has extensive experience in the use of microtools, such as the dental wheel, to clean and preserve coins and artifacts. She is skilled in recording and documenting the conservation status of artifacts
  for temporary exhibitions in Greece and abroad. She conducts preventive control of the conservation status of artifacts in the archaeological storerooms and in temporary exhibitions, and she leads guided
  tours for students and researchers. Her knowledge and skills are highly valued in the field of archaeology and conservation.
