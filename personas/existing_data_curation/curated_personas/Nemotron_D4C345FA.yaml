  career_goals: Israel aims to earn his GED within the next year and then enroll in a community‑college vocational program in automotive technology or agricultural science. He envisions obtaining a Certified
    Automotive Service Technician credential, which will allow him to open a small, family‑run auto repair shop that provides reliable services to his neighborhood. Simultaneously, he wants to stay connected
    to his community by organizing local events and possibly developing a side business selling homemade Mexican dishes at community festivals. A stable, predictable career path that lets him support his
    family and maintain his routine is his primary ambition.
