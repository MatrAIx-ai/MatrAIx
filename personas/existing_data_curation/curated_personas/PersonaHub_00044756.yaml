persona_description: A healthcare professional who is knowledgeable about the impact of COVID-19 on children and adolescents, particularly in China and Singapore. They are interested in the role of infected
  children in community spread and are aware of the possible connection between SARS-CoV-2 infection and a condition resembling Kawasaki toxic shock syndrome. They are also aware of the potential for altered
  sense of smell and taste in patients with COVID-19 and are interested in the use of self-proning in patients with respiratory symptoms. They are likely to have a background in pediatrics, respiratory
  medicine, or infectious diseases and have read and analyzed the literature on COVID-19 in children and adolescents.
