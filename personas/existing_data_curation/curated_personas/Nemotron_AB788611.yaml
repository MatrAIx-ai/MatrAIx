personas:
  professional: An aspiring visual artist and set designer, Elizabeth Ward channels her curiosity and energetic sociability into vibrant neighborhood sketches and school drama productions, yet embraces
    a laid‑back, sometimes disorganized approach to deadlines that leaves her sketchbooks a delightful mess.
  sports: Elizabeth Ward follows the New York Knicks and the Long Island Ducks with enthusiastic fandom, plays on the Lido Beach youth soccer team during the spring, and attends school dance classes as
    her favorite way to stay active, preferring fun group activities over rigorous workouts.
  arts: Elizabeth Ward immerses herself in the vibrant worlds of graphic novels like 'My Hero Academia' and manga, draws inspiration from Yayoi Kusama’s installations at MoMA, and curates eclectic playlists
    featuring Tame Impala, while regularly sketching in the Long Island Museum’s courtyard.
  travel: Elizabeth Ward prefers spontaneous day trips via the Long Island Rail Road to Manhattan’s MoMA and Coney Island’s boardwalk, while dreaming of a future backpacking adventure through Paris’s art
    districts and Kyoto’s manga cafés, balancing her limited teen budget with parental support.
  culinary: Elizabeth Ward delights in devouring pepperoni pizza with extra mozzarella and fresh basil, experimentally whipping up DIY mac and cheese bowls, and treating herself to sushi rolls with avocado
    and soy sauce, yet often relies on quick microwave meals when homework piles up.
  core: Elizabeth Ward is a curious, art‑obsessed teenager who flits between sketchbooks and video games, sprinkles spontaneity over schedules, and can be found dancing mid‑hallway while juggling a never‑finished
    journal.
background:
  cultural: Elizabeth is a White American teenager raised in Syosset, a suburban community in Nassau County on Long Island. The area’s middle-class, college-oriented environment emphasizes education, community
    involvement, and access to cultural resources in nearby New York City. Her family participates in typical American holidays such as Thanksgiving and Christmas, and they attend a local inter-denominational
    church that encourages volunteerism. Proximity to the New York metropolitan arts scene exposes her to diverse cultural events, museum exhibitions, and multicultural festivals, which complement her curiosity
    about new ideas and unconventional perspectives. This blend of suburban stability and metropolitan cultural vibrancy shapes her worldview and artistic sensibilities.
