  career_goals: Elizabeth’s short-term goal is to build a diverse art portfolio and earn a spot in a specialized high-school program that emphasizes visual arts and digital media, while taking on a leadership
    role in her school’s art club. Over the next several years she hopes to study visual arts, graphic design, or art history at a university, eventually pursuing a career as a multimedia artist, creative
    director, or museum educator. She also dreams of creating her own online platform where she can share art tutorials, showcase her work, and inspire other teens to explore creative expression.
