  hobbies: '[''Reading picture books'', ''Solving jigsaw puzzles'', ''Building LEGO creations'', ''Drawing and coloring nature scenes'', ''Nature journaling'', ''Collecting leaves and rocks'', ''Playing
    educational tablet apps'', ''Watching wildlife documentaries'']'
  career_goals: Angela imagines a future where she works independently as a wildlife biologist or environmental researcher studying the lakes and forests of the Pacific Northwest. She aims to master the
    concrete skills of reading, math, and scientific observation now, so she can one day lead her own field studies, publish findings, and protect the ecosystems she loves. Her competitive streak fuels
    a desire to be recognized for her discoveries, while her pragmatic side pushes her to acquire the practical knowledge needed for such a career.
