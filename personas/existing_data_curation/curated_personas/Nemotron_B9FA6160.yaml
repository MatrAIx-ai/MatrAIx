personas:
  professional: Angela Miller, a budding young inventor who spends after‑school hours assembling mini‑robots from LEGO® Classic bricks, applying her curiosity and practicality while preferring solitary
    tinkering over group projects.
  sports: Angela Miller attends beginner swim lessons at the community pool, where she meticulously practices her freestyle and backstroke on her own laps, quietly setting personal time goals and idolizing
    Olympic swimmer Michael Phelps, while rarely engaging in team relay races.
  arts: Angela Miller immerses herself in drawing with Crayola markers, recreating scenes from Pixar’s "Inside Out" and listening to The Wiggles’ "Fruit Salad" song, occasionally reenacting favorite moments
    from the "Sesame Street" series during playtime.
  travel: Angela Miller enjoys family road trips to the nearby state park's lake for quiet paddle‑boat rides, dreams of visiting Disneyland in Anaheim to ride Space Mountain, and prefers traveling in the
    backseat where she can watch travel‑themed picture books without the bustle of crowds.
  culinary: Angela Miller loves creamy mac and cheese topped with extra cheddar, snacks on apple slices spread with smooth peanut butter, and takes pride in helping stir chocolate chip cookie dough with
    a wooden spoon, often insisting on adding an extra pinch of cinnamon for "extra flavor".
  core: Angela Miller is a quiet, curiosity‑driven five‑year‑old who thrives on solitary LEGO inventions, competes with herself in swimming, manages her allowance through an unstructured piggy‑bank system,
    and keeps a steady handle on mild allergies despite occasional forgetfulness.
background:
  cultural: Angela grows up in a middle‑class, predominantly white suburban neighborhood in Bonney Lake, Washington. Her family participates in mainstream American holidays and places a strong emphasis
    on outdoor recreation, such as exploring nearby lakes, forests, and hiking trails. The local school and library promote early literacy and curiosity, aligning with her parents' belief in independent,
    self‑directed learning. Although she prefers quiet, solitary activities, she is still exposed to broader U.S. cultural media through children's books and television, which shape her understanding of
    values like individualism, environmental stewardship, and personal responsibility.
attributes:
  skills: '[''Reading simple words and sentences'', ''Counting to 20'', ''Building LEGO structures'', ''Solving age‑appropriate jigsaw puzzles'', ''Using educational tablet apps independently'', ''Conducting
