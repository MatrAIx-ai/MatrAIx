personas:
  professional: Alissa Koney, a retired community‑outreach specialist, leverages her knack for organizing social events and her practical curiosity to lead senior‑center workshops, teach basic digital skills,
    and coordinate neighborhood history projects, all while assertively ensuring every detail stays on budget.
  sports: Alissa Koney spends Saturdays hiking the Santa Catalina Mountains, participates in a senior walking club that cheers on the Arizona Diamondbacks during spring training, follows the Arizona Cardinals'
    season on weekends, and practices birdwatching with a pair of binoculars, balancing gentle exercise with spirited fandom.
  arts: Alissa Koney engages in a lively book club that debates Margaret Atwood’s novels, knits and quilts vibrant desert‑inspired patterns while listening to Lila Downs, attends performances at the Tucson
    Museum of Art, and enjoys classic films starring Meryl Streep, weaving cultural appreciation into their social fabric.
  travel: Alissa Koney enjoys weekend road trips to Sedona’s red rocks and the Grand Canyon, has taken a guided tour of historic Santa Fe, dreams of a leisurely cruise along the Mexican Pacific coast, and
    often plans travel around senior‑group discounts, balancing adventure with comfort.
  culinary: Alissa Koney is a seasoned southwestern home chef who perfects enchiladas with homemade corn tortillas, crafts spicy chile rellenos stuffed with cheese, whips up bright prickly‑pear salsa with
    fresh cilantro and lime, and shares their culinary experiments at potluck gatherings, often swapping recipes for dried herbs from their desert garden.
  core: Alissa Koney, a 73‑year‑old community‑builder with a green thumb, balances boundless curiosity with meticulous practicality, tending desert gardens, mentoring peers, and worrying about every detail
    with a lively, slightly anxious spirit.
background:
  cultural: Alissa is a third‑generation white American whose family settled in Arizona during the post‑World War II boom. Raised in a Midwestern‑influenced household, she carries values of self‑reliance,
    community service, and modesty, while having embraced the unique blend of Southwestern culture she encountered in Tucson. She enjoys regional traditions such as desert festivals, Hispanic‑influenced
    food, and outdoor recreation, and she respects the Indigenous heritage of the Sonoran Desert. A lifelong Methodist, Alissa participates in church‑based outreach and finds comfort in the rituals of her
    upbringing, all of which together shape a culturally rich yet grounded identity.
