  hobbies: '["Desert gardening","Cooking Southwestern cuisine","Book club participation","Playing bridge","Volunteering at a local animal shelter","Hiking in the Santa Catalina Mountains","Birdwatching","Knitting
    and quilting","Local history research"]'
  career_goals: Now retired, Alissa's ambition is to stay actively engaged in her community while continuing to learn new things. She aims to expand her volunteer leadership role at the senior center, develop
    a local history oral‑history project, and become a certified senior‑peer counselor. Alissa also hopes to master digital storytelling tools so she can document and share the stories of her neighbors,
    and she plans to explore a modest hobby‑business selling homemade preserves and salsas. Balancing her curiosity with practicality, she wants to ensure her contributions are sustainable and beneficial
    to both herself and the community.
