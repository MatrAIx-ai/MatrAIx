personas:
  professional: Otis Riley is a punctual, hands‑on teen aspiring automotive technician who blends his knack for routine car maintenance with leadership on the school basketball team, using his practical
    mindset to troubleshoot engines and mentor younger classmates in reliable, step‑by‑step problem‑solving.
  sports: Otis Riley plays pickup basketball at the Aurora community center three evenings a week, follows the Chicago Bulls, and competes in local high‑school league games where they are known for precise
    free‑throw routines and a collaborative, yet assertive, on‑court leadership style.
  arts: Otis Riley immerses in classic hip‑hop and R&B, repeatedly streaming Tupac, A Tribe Called Quest, and Mary J. Blige while also attending occasional community theater productions, letting the lyrical
    storytelling and stage drama shape their creative outlook and weekend playlist curation.
  travel: Otis Riley prefers short, scheduled road trips to nearby state parks like Starved Rock and weekend visits to Chicago's Museum of Science and Industry, balancing a love for new sights with a tight
    travel budget and the need to return home for family responsibilities.
  culinary: Otis Riley’s signature weekend fried‑rice blends soy sauce, scrambled eggs, diced carrots, peas, and leftover rotisserie chicken, reflecting their skill in quick, nutritious meals that satisfy
    siblings while they experiment with a touch of sriracha for a personalized kick.
  core: Otis Riley is a routine‑driven teen who channels practical hands‑on skills into automotive ambitions, basketball leadership, and disciplined budgeting, all while juggling late‑night gaming, classic
    hip‑hop vibes, and a modest appetite for weekend road trips.
background:
  cultural: Otis grew up in a close‑knit African‑American family in Aurora, Colorado. His upbringing was shaped by church traditions, Sunday family meals, and the strong sense of community found in the
    city’s East Side neighborhood. He identifies with the cultural heritage of Black music, storytelling, and resilience, and he draws on the support networks of local churches, the Aurora Youth Center,
    and family ties to navigate the challenges of growing up as a Black teen in a diverse suburban setting.
attributes:
  skills: '[''Basic car maintenance'', ''Home repair (faucets, light fixtures)'', ''Simple cooking'', ''Time management'', ''Teamwork in basketball'', ''Digital troubleshooting (gaming consoles, computers)'']'
  hobbies: '[''Pickup basketball'', ''Video‑game tournaments'', ''Listening to hip‑hop & R&B'', ''Cooking fried rice'', ''Church youth fellowship'']'
  career_goals: Otis plans to earn his GED within the next two years and enroll in a local vocational program focused on automotive technology. He aims to secure an apprenticeship with a reputable repair
    shop, obtain a journeyman certification, and eventually open a small family‑run auto‑service business that can provide stable income for his household. He also hopes to mentor younger teens in his neighborhood,
    sharing the practical skills he has mastered.
