  hobbies: '[''Building soft block towers'', ''Crayon drawing and coloring'', ''Listening to nursery rhymes'', ''Watching familiar cartoon shows'', ''Playing in the backyard sandbox'', ''Reading picture
    books with parents'', ''Cuddling a plush bear'']'
  career_goals: Although only two years old, Willie imagines himself as a helpful adult who supports his family and community. He often talks about being a big helper like a firefighter or a caring teacher,
    emphasizing kindness and teamwork. His long‑term ambition is to grow into a person who can maintain harmony, assist others, and keep things running smoothly.
