personas:
  professional: Willie Anfield is a budding mini-architect, building towers from wooden blocks with meticulous order, and their love for routine and practical layouts shows early signs of the organizational
    reliability they will bring to a future design career.
  sports: Willie Anfield delights in toddling around the neighborhood’s Little Sprouts Soccer Club, kicking a soft foam ball alongside a handful of familiar peers, and they proudly cheer for the Chicago
    Cubs on game days, finding comfort in the predictable rhythm of practice and the small‑group environment.
  arts: Willie Anfield enjoys the melodic lullabies of Disney’s Frozen soundtrack, especially the soaring voice of Idina Menzel, and they often mimic the charming gestures of Sesame Street’s Elmo while
    finger‑painting bright circles, weaving music and visual art into their daily play.
  travel: Willie Anfield prefers short family road trips to familiar destinations like the Grand Canyon’s rim, where they can watch the sunrise from a comfortable spot, yet they dream of a gentle beach
    vacation in Maui, balancing their love for routine with a curiosity for new, soothing landscapes.
  culinary: Willie Anfield craves creamy mac and cheese, sweet banana pancakes, and crunchy carrot sticks, and while their cooking skill is limited to a toddler‑friendly spoon‑ful of yogurt, they are already
    particular about cheese being shredded finely and peas being mashed just right.
  core: Willie Anfield is a routine‑loving, quietly observant toddler; they channel their cooperative spirit into building block towers, pocket‑sized piggy banks, and gentle bedtime rituals, all while occasionally
    misplacing toys in the most predictable places.
background:
  cultural: Willie is part of an African‑American family rooted in Arlington, Texas. His cultural upbringing includes regular visits to a local Baptist church, family gatherings centered around soul food
    such as collard greens, fried chicken, and sweet potato pie, and celebrations of holidays like Juneteenth and Kwanzaa. He is exposed to a blend of Southern hospitality, gospel and hip‑hop music, and
    community values that stress respect, cooperation, and mutual support. These influences shape his love for routine, his cooperative nature, and his desire to contribute positively to his family and
    neighborhood.
