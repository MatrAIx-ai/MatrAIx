persona_description: A teacher who has experience teaching geometry and uses various teaching strategies to engage students. The teacher is familiar with the concepts of congruence in triangles and can
  effectively communicate these concepts to students. The teacher is also proficient in using technology, such as the slideshow, to present lessons and provide feedback. The teacher is likely to use the
  2-column format for a proof and expects students to write justifications for each line of the proof. The teacher is also experienced in teaching geometry and uses the web site Practice with Beginning
  Congruent Triangle Proofs to help students practice using definitions, theorems, postulates, and properties to justify the lines of the proof.
