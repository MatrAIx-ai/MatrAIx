personas:
  professional: Susan Wiggins is a health information manager renowned for her mastery of EHR systems, ICD‑10 coding, and HIPAA compliance, leveraging her methodical nature and competitive streak to streamline
    data workflows, enforce rigorous quality controls, mentor junior staff toward measurable accuracy improvements, and chase her goal of RHIA certification and senior leadership within five years.
  sports: Susan Wiggins enjoys low‑key fitness pursuits, cheering on the Providence Bruins on weekday evenings, joining the Rhode Island Trailblazers hiking club for weekend treks along the Atlantic coastline,
    and participating in a seasonal adult recreational softball league in the spring, preferring steady cardio over high‑intensity workouts.
  arts: Susan Wiggins cultivates a quiet artistic life, devouring mystery novels by Agatha Christie, immersing in historical fiction by Philippa Gregory, listening to folk legend Joan Baez, knitting while
    watching classic film noir such as The Maltese Falcon, and attending occasional performances by the Rhode Island Philharmonic Orchestra.
  travel: Susan Wiggins favors intentional, solo‑oriented travel, having explored Boston’s Freedom Trail, unearthed genealogical records in Plymouth, Massachusetts, and dreaming of a tranquil retreat in
    the Scottish Highlands to trace ancestral roots, all while budgeting carefully to balance professional commitments and family responsibilities.
  culinary: Susan Wiggins enjoys cooking healthful Mediterranean dishes, expertly preparing grilled salmon with rosemary, quinoa salads with cherry tomatoes and feta, and oat‑based banana bread, while regularly
    steaming seasonal vegetables harvested from her perennial garden for nourishing meals.
  core: Susan Wiggins blends a driven, detail‑obsessed professional mindset with a solitary, curiosity‑fuelled lifestyle, balancing competitive ambition against a penchant for methodical, quiet hobbies.
background:
  cultural: Susan grew up in a middle‑class New England family in Johnston, Rhode Island, with deep roots in the region that trace back to Irish and English ancestry. Her upbringing reflected traditional
    New England values of self‑reliance, modesty, and community involvement. She attended local schools and later took courses at a community college, where she developed a practical work ethic. The area’s
    strong emphasis on public health and civic responsibility shaped her respect for orderly systems and her dedication to accurate medical documentation. While she celebrates regional customs such as town
    meetings and seasonal festivals, she also embraces a broader cultural appreciation for privacy, reliability, and continual self‑improvement.
attributes:
  skills: '["Electronic Health Record (EHR) management", "Medical coding (ICD-10, CPT)", "HIPAA compliance and data privacy", "Health information management", "Data quality assurance", "Workflow optimization",
    "Record retrieval and archiving", "Basic data analytics using Excel and SQL", "Project coordination", "Patient confidentiality protocols"]'
  hobbies: '["Reading mystery and historical fiction", "Gardening (perennial vegetable garden)", "Hiking local trails in Rhode Island", "Knitting and crocheting", "Photography, especially nature and architecture",
    "Puzzle solving (crosswords, Sudoku)", "Genealogy research", "Mindfulness meditation and yoga", "Cooking healthy meals", "Volunteering at the local library''s archival project"]'
  career_goals: Susan aims to attain certification as a Registered Health Information Administrator (RHIA) and to step into a senior health information manager role within the next five years. She wants
    to lead EHR optimization projects that blend proven best practices with innovative technologies, ensuring both efficiency and compliance. Driven by her competitive streak, she aspires to mentor junior
    staff, establish measurable improvements in record accuracy, and eventually transition into a consulting capacity where she can advise multiple healthcare facilities on data governance and privacy.
    Balancing curiosity with practicality, she plans to enroll in a bachelor's program in health informatics to solidify her expertise.
