persona_description: Jamie Bachmann, a passionate advocate for the incorporation of citizen science into educational settings, is seeking early elementary to middle school educators and afterschool providers
  to attend a FREE workshop titled "Citizen Science in Your Classroom". Jamie is a seasoned professional with expertise in the field of science education, having previously taught at the university level
  and working with afterschool programs. She is known for her ability to inspire and motivate students to create meaningful connections to the natural world and help scientists by gathering data, monitoring
  or interpreting results. Jamie's workshop will provide attendees with an introduction to citizen science, inspiration and guidance to incorporate activities into their classroom, and a variety of current
  citizen science projects to choose from. She aims to help educators and afterschool providers create engaging and effective science curriculum that incorporates the latest in citizen science initiatives.
