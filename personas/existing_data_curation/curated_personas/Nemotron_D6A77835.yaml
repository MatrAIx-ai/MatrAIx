  career_goals: Although retired from formal employment, Dominga’s ambitions focus on legacy and community contribution. She aims to compile a handwritten cookbook of her family’s treasured recipes, preserving
    culinary heritage for future generations. She wishes to mentor younger women in Quebradillas by teaching sewing, budgeting, and gardening through informal workshops at the local senior center. She hopes
    to become an active volunteer health advocate, helping peers manage medication schedules and navigate the public health system. Dominga also aspires to complete a GED or take a community‑college class
    in horticulture to deepen her gardening knowledge. Ultimately, she seeks to ensure her grandchildren have the educational resources they need and to leave a lasting imprint of cultural pride within
    her family and town.
