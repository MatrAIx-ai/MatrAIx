personas:
  professional: Nancy Sawvel, a budding junior scientist in her school's science club, combines meticulous notebook-keeping with an inquisitive mind, driving her to design detailed experiments and compete
    in regional science fairs while methodically planning each step.
  sports: Nancy Sawvel enjoys weekend bike rides along the Kansas River Trail, follows the Kansas City Royals and the Kansas City Chiefs, plays on her middle-school track team during spring, and is a member
    of the local youth soccer club River Valley Rovers, balancing competitive drive with a methodical training routine.
  arts: Nancy Sawvel channels her love for graphic novels by sketching daily in a leather-bound journal, draws inspiration from artists like Art Spiegelman and manga creator Naoko Takeuchi, and attends
    community art walks where she admires works by local muralist Maya Rivera and listens to piano pieces by Yiruma during practice.
  travel: Nancy Sawvel prefers structured day trips, having explored the Tallgrass Prairie National Preserve and taken a guided river-kayak tour in Wichita, while dreaming of a future family vacation to
    the Grand Canyon and a cultural exchange program in Kyoto, Japan.
  culinary: Nancy Sawvel favors simple comfort foods like cheesy mac and cheese and apple crisp, but also enjoys experimenting with fresh basil pesto on spaghetti and learning to bake blueberry muffins,
    often recording recipes in the margins of her sketch journal.
  core: Nancy Sawvel blends a curious, methodical mind with a competitive streak, turning every sketch, puzzle, and science experiment into a disciplined yet imaginative pursuit, while wrestling with occasional
    worry and a love for structured fun.
background:
  cultural: Nancy was raised in Leavenworth, Kansas, a small Midwestern city with deep historical roots and a strong sense of community. Her family follows typical middle-class values, emphasizing education,
    hard work, and participation in local events such as the Kansas River Festival and the Leavenworth Art Walk. The proximity to Fort Leavenworth adds a subtle awareness of the region's military history,
    while the nearby Missouri River and prairie landscapes nurture her interest in nature and conservation. Her cultural upbringing blends Protestant community traditions with the broader American Midwest
    ethos of independence and civic involvement.
attributes:
  skills: '[''Drawing'', ''Digital illustration'', ''Reading comprehension'', ''Scientific observation'', ''Project planning'', ''Scratch programming'', ''Model building'', ''Time management'']'
  hobbies: '[''Sketching'', ''Graphic novel reading'', ''Nature walks'', ''Rock and leaf collecting'', ''Puzzle solving'', ''Science club'', ''Piano'', ''Library volunteering'']'
  career_goals: Nancy aims to combine her love for art and science by pursuing a career as a museum curator or environmental scientist who uses visual storytelling to raise awareness about conservation.
    She plans to attend a STEM-focused high school, study art history and biology in college, and eventually work at a natural history museum or create documentary films about wildlife. Her competitive
    nature drives her to seek scholarships and leadership roles, while her cautious side motivates her to build a stable, purpose-driven career.
