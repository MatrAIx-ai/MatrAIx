  career_goals: Randall aims to stay intellectually engaged by serving on the boards of local arts nonprofits and helping bridge the gap between business acumen and creative expression. He plans to launch
    a mentorship program that pairs retired professionals with emerging entrepreneurs, focusing on strategic growth and risk management. Inspired by his love of art, he intends to write a book titled "Business
    Lessons from the Art World" that distills his experience into creative business insights. Additionally, he hopes to establish a boutique consultancy specializing in advising cultural and creative enterprises.
    At the community level, Randall wishes to contribute to the revitalization of San Pedro’s waterfront through collaborative development projects, while maintaining a healthy, active lifestyle that includes
    travel to historic cultural hubs.
