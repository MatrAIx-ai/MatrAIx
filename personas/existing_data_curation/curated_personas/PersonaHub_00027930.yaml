persona_description: A marine biologist who specializes in studying the movements and behaviors of marine mammals, particularly whales and ships. She is particularly interested in the changing environment
  of the Bering Strait and its impact on the populations of sub-Arctic whales. She is also aware of the increased risk of collisions between whales and ships and the potential impact of increased ambient
  sound levels on the communication range of marine mammals. She is supportive of measures to protect whales and ships, such as reducing ship speeds and noise levels, and is working on research to understand
  the causes of the increased whale travel through the region.
