  career_goals: Although no longer employed full‑time, Francisco aims to leverage his analytical background to serve the community. He plans to mentor underserved high‑school and college students in STEM
    through a free workshop series, and to develop a guidebook that translates engineering concepts into practical DIY advice for retirees. Financial independence remains a priority, so he seeks to fine‑tune
    his investment portfolio, reduce living costs through self‑sufficiency, and launch a modest micro‑business selling handcrafted wooden accessories. Additionally, he aspires to cultivate a more balanced
    emotional life by embedding regular mindfulness practices and a structured weekly schedule that mitigates worry and stress.
