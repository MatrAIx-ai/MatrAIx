  career_goals: Curtis aims to ascend to senior leadership within public accounting, targeting a partner position at a top firm where he can lead a practice focused on ESG and data‑driven advisory services.
    Over the next five years, he intends to deepen his expertise in sustainability accounting and AI‑enhanced analytics, earn the Certified Management Accountant (CMA) credential, and build a cross‑functional
    team that blends finance, technology, and creative design. Eventually, he envisions transitioning to a CFO role at a forward‑thinking tech or entertainment company, leveraging his unique blend of financial
    rigor and artistic insight to drive strategic growth and innovative stakeholder communication. He also aspires to author a book on the intersection of finance, art, and narrative storytelling.
