personas:
  professional: Curtis Nylen, a 42‑year‑old CPA and Certified Internal Auditor, fuses forensic accounting precision with an artist’s flair for visual storytelling, leading ESG audit projects that turn dense
    financial data into compelling PowerBI narratives while driving a high‑performing team with a competitively collaborative mindset.
  sports: Curtis Nylen, a sailing enthusiast and weekend surfer along the Pacific, also plays midfield in a co‑ed soccer league at the Santa Monica Community Center, follows the Los Angeles Dodgers and
    LAFC, and hikes the Santa Monica Mountains regularly, using a combination of interval training and yoga to maintain stamina.
  arts: Curtis Nylen frequents the Getty Center and local contemporary galleries, draws inspiration from abstract expressionists like Mark Rothko and experimental musicians such as Radiohead, paints abstract
    watercolors on rainy afternoons, and captures coastal vistas through photography, often sharing his work at community theater fundraiser openings.
  travel: Curtis Nylen plans meticulously for family trips, having explored the culinary streets of Osaka, the wine regions of Tuscany, and the glaciers of New Zealand, while yearnings for future adventures
    in Iceland’s geothermal lagoons and Patagonia’s treks drive his passport stash of laminated itineraries.
  culinary: Curtis Nylen enjoys cooking at a semi‑professional level, mastering dishes like Moroccan lamb tagine with preserved lemons, Japanese miso‑ramen broth, and fresh grilled dorado with citrus herb
    salsa, pairing each with thoughtfully selected natural wines, and often experiments with ingredients such as saffron, yuzu, and smoked paprika.
  core: Curtis Nylen is a 42‑year‑old CPA‑artist who juggles forensic audits, abstract watercolors, and weekend surf sessions, constantly chasing novelty while hoarding vintage espresso pods for midnight
    data dives.
background:
  cultural: Curtis grew up in a middle‑class suburban community in Los Angeles, the son of second‑generation Irish‑German American parents who valued education, hard work, and a love of the arts. His family’s
    European heritage and West‑Coast upbringing gave him a blend of traditional values and a progressive, liberal outlook typical of Pacific Palisades residents. Exposure to the vibrant cultural scene of
    Los Angeles—from museums and theaters to music festivals—shaped his appreciation for diverse artistic expressions. At university, he pursued a humanities degree in art history and philosophy, later
    augmenting his education with CPA certification. Living in Pacific Palisades, he enjoys a coastal lifestyle that balances professional ambition with outdoor recreation, community involvement, and support
    for local arts initiatives.
