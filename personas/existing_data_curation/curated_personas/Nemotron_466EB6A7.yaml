  career_goals: Tonja aims to pursue an associate's degree in business administration at Rochester Community College, with a long‑term goal of becoming a community outreach coordinator or marketing specialist
    for a nonprofit focused on youth empowerment. She also dreams of launching an online boutique that showcases African‑American fashion and culture, leveraging her sociable personality, competitive drive,
    and digital savvy to build a brand. In the short term, she seeks part‑time work in retail or events to gain professional experience and financial independence.
