personas:
  professional: Caroline Groom, a retired elementary teacher turned community arts champion, weaves their decades‑long expertise in arts‑integrated curriculum design into vibrant intergenerational workshops
    that blend watercolor abstractions, storytelling circles, and collaborative quilting, all while orchestrating events with a meticulous yet adaptable hand.
  sports: Caroline Groom cheers on the Dallas Cowboys on Sunday evenings, enjoys leisurely morning walks along the local nature trail with binoculars for birdwatching, participates in the senior bowling
    league at the community center, and practices gentle yoga twice a week to keep their joints supple.
  arts: Caroline Groom immerses themselves in watercolor painting inspired by Georgia O'Keeffe’s desert palettes and Claude Monet’s soft light, reads Emily Dickinson and contemporary essayist Zadie Smith
    for lyrical inspiration, stitches intricate quilts featuring native Texas wildflower motifs, and regularly takes the stage in Lumberton’s community theater productions of Shakespeare’s comedies, all
    while quoting Maya Angelou during story circles.
  travel: Caroline Groom plans trips with a blend of careful budgeting and spontaneous curiosity, revisiting the blue‑bonnet fields of Texas Hill Country, hiking the rugged trails of Big Bend National Park,
    and dreaming of a literary pilgrimage to the Cotswolds, yet they limit overseas travel to a biennial cruise to New Orleans to stay within their fixed‑income comfort zone.
  culinary: Caroline Groom delights in cooking with garden‑fresh rosemary, sage, and heirloom tomatoes, often preparing a fragrant grilled chicken with quinoa salad, a comforting bowl of chicken‑fried steak
    with mashed sweet potatoes, and a seasonal pecan pie, all while admitting a guilty pleasure for indulgent store‑bought cinnamon rolls after a long painting session.
  core: Caroline Groom is a vivacious 76‑year‑old storyteller who balances meticulous organization with boundless artistic curiosity, channeling their talkative, compassionate nature into community art
    projects while occasionally overindulging in cinnamon rolls and sprinting to the next theater rehearsal.
background:
  cultural: Caroline was raised in a mid‑20th‑century white Texas family steeped in Southern hospitality and Methodist traditions. Growing up in Jefferson County, she absorbed the region’s blend of rural
    values, community spirit, and appreciation for folk arts such as quilting and local music. The Gulf Coast’s cultural tapestry—shaped by Texan pride, modest religious observance, and a strong emphasis
    on community gatherings—has informed her compassionate outlook and love for shared artistic experiences.
