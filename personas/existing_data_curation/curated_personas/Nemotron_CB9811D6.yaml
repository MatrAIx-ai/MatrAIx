personas:
  professional: Kenya Lee, a budding junior scientist in preschool, constructs LEGO bridges and simple gear mechanisms, blending curiosity about how things work with a practical step-by-step method, and
    they proudly showcase each creation during class show-and-tell.
  sports: Kenya Lee, an enthusiastic little athlete, cheers for FC Barcelona while playing forward for the Little Sprouts Soccer Club, enjoys weekend swimming lessons in summer and sledding down local hills
    in winter, and they practice coordinated moves during family backyard games.
  arts: Kenya Lee, a creative spark in preschool, delights in drawing Dr. Seuss characters, idolizes musicians like Raffi and Disney’s Mickey Mouse, and they often reenact favorite story scenes during playtime.
  travel: Kenya Lee, an eager explorer, loves weekend trips to the city zoo, has visited the grand aquarium in San Diego, dreams of a future visit to Disneyland, and they prefer short car rides with a favorite
    plush buddy over long flights.
  culinary: Kenya Lee, a picky yet adventurous eater, relishes macaroni-and-cheese with sharp cheddar, chicken nuggets with ketchup, strawberry-banana smoothies made with Greek yogurt, and they can proudly
    spread peanut butter on toast without spilling.
  core: Kenya Lee, a curious five-year-old, balances imagination with practical routines, builds LEGO inventions, saves coins for tiny treats, and they mix playful chatter with moments of quiet alone time.
background:
  cultural: Kenya is an African-American child raised in Canyon Country, a diverse suburb of Los Angeles County. Her family celebrates traditions such as Sunday church gatherings, Juneteenth celebrations,
    and Kwanzaa, where storytelling, music, and cooking bring relatives together. She grows up listening to a mix of gospel, R&B, and contemporary hip‑hop that reflects her community’s heritage. Local public
    schools and community centers expose her to multicultural events, art workshops, and neighborhood festivals, fostering an awareness of both her Black cultural roots and the broader cultural mosaic of
    Southern California.
