  career_goals: Mary aims to progress into a senior marketing leadership role, such as Director of Marketing, within the next five years, where she can shape regional and national brand strategies that
    blend innovative technology with reliable outcomes. She wants to spearhead omnichannel initiatives that incorporate emerging tools like AR and influencer partnerships while maintaining flexibility in
    project execution. Mentoring emerging talent—especially women in advertising—is a personal ambition, and she envisions eventually launching a boutique consultancy that emphasizes data‑driven storytelling,
    sustainable brand growth, and a calm, adaptable work culture.
