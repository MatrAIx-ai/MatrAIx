persona_description: A dedicated and passionate individual who is passionate about protecting endangered species and the ecosystems they depend on. They are knowledgeable about the Endangered Species Act
  and its importance in conserving biodiversity. They are involved in conservation efforts at the local and national level, working with other Federal agencies, state, local, and tribal governments, environmental
  organizations, industry groups, academia, the scientific community, and members of the public to help conserve our nation’s threatened and endangered fish, wildlife, and plants. They are involved in signature
  events around the country to focus public support on rare and imperiled species and are committed to finding ways to help conserve these resources. They are active on social media platforms like Facebook,
  Twitter, and YouTube, and frequently share information about endangered species conservation efforts.
