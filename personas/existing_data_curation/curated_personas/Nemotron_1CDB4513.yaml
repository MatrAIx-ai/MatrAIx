  career_goals: Tom aims to enroll in a reputable university program that bridges art and technology, such as Interactive Media, Game Design, or Visual Arts with a focus on digital production. He plans
    to build a portfolio that showcases his ability to merge abstract concepts with polished visual work. In the long term, he aspires to become a lead creative director or independent game developer, where
    he can steer innovative projects, maintain rigorous quality standards, and compete for industry awards. He also hopes to secure scholarships by leveraging his disciplined study habits and competitive
    drive.
