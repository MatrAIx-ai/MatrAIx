personas:
  professional: Tom Joyner, a disciplined 19-year-old visual artist with a tech edge, merges futuristic cityscape illustrations with Python-driven algorithmic art, leveraging Adobe Illustrator and Arduino
    prototypes to craft interactive installations that showcase meticulous project planning and a relentless pursuit of polished excellence.
  sports: Tom Joyner enjoys rugged weekend hikes in the Wasatch Range, belongs to the Wasatch Mountain Club for seasonal trail runs, and follows the Utah Jazz for NBA action, while occasionally coaching
    a small friend group in chess-themed strategic board games as a mental workout.
  arts: Tom Joyner's artistic world fuses the visual futurism of Syd Mead, the ambient soundscapes of Brian Eno, and the speculative narratives of Ursula K. Le Guin, channeling these influences into sketchbooks,
    Photoshop composites, acoustic guitar compositions, and experimental photography that captures abstract light patterns.
  travel: Tom Joyner prefers meticulously planned road trips that combine nature and culture, having trekked Zion National Park and explored Reykjavik's Harpa concert hall, while dreaming of a solo journey
    to Kyoto's bamboo groves to sketch the interplay of tradition and neon futurism.
  culinary: Tom Joyner's cooking tends toward efficient vegetarian meals like quinoa-avocado bowls, spicy shakshuka, and homemade ramen, flavored with miso, sriracha, and fresh herbs, while they indulge
    in occasional rooftop pizza nights and often experiment with matcha-infused desserts.
  core: Tom Joyner, a hyper-organized 19-year-old creative technologist, blends disciplined project management with a fiercely imaginative drive, favoring solitary artistic pursuits, strategic financial
    prudence, and a calm, skeptical outlook that fuels relentless self-improvement.
background:
  cultural: Tom grew up in Spanish Fork, Utah, a largely white, suburban community with strong family and community values often shaped by the region’s LDS heritage. The local culture emphasizes self‑reliance,
    education, and civic involvement, which have reinforced his disciplined work ethic and competitive mindset. Surrounded by the expansive Utah landscape, he developed an appreciation for outdoor recreation
    and natural aesthetics, which informs his artistic sensibilities. While he respects the traditions of his hometown, Tom’s introspective and imaginative nature leads him to chart his own path, blending
    the region’s cultural emphasis on diligence with his personal drive for creative novelty.
