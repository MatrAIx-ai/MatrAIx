  career_goals: Approaching retirement, Kijuan aims to transition into a mentorship and safety‑training role. He plans to obtain a certified pipe‑fitter/steamfitter credential and become a recognized safety
    trainer for regional contractors. He hopes to lead a senior crew on large infrastructure projects while documenting his decades of field knowledge for future workers. Kijuan also wants to develop workshops
    that introduce pipeline technology and green construction methods to younger workers, especially those from under‑represented backgrounds, leaving a lasting legacy in his trade.
