  career_goals: Elna aims to publish her second novel—a literary work that explores mental‑health challenges through a Southern‑Gothic lens—by securing a reputable literary agent and a mid‑size house that
    supports creative risk. She also plans to expand her nonfiction portfolio with a memoir that candidly addresses anxiety and resilience. Over the next five years she hopes to develop a regional writers’
    collective that offers mentorship and publishes an annual anthology, while maintaining a steady income through freelance editing and teaching writing courses. Balancing her artistic vision with family
    responsibilities, she seeks a sustainable career that allows regular writing time and occasional public engagements.
