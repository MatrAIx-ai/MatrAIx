  hobbies: '[''cooking traditional Puerto Rican dishes'', ''listening to salsa and reggaeton music'', ''walking in local parks and trails'', ''gardening'', ''sewing and knitting'', ''watching telenovelas'',
    ''reading romance novels'', ''volunteering at church food pantry'']'
  career_goals: Veronica’s primary career goal is to move into a supervisory position within her manufacturing plant. In the next two years she plans to earn OSHA 10‑hour certification and complete a short
    lean‑manufacturing workshop to deepen her understanding of process improvement. She aims to become a shift lead, where she can oversee a crew, manage scheduling, and mentor newer workers while maintaining
    the reliable and organized workflow she values. Long‑term, she hopes to supplement her income by launching a small home‑based catering service that specializes in authentic Puerto Rican dishes, allowing
    her to share her cultural heritage and achieve greater financial stability. Achieving these goals will also help her secure a permanent home in Fort Worth and build a modest retirement savings.
