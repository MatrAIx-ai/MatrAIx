persona_description: A photographer who is passionate about documenting and preserving traditional practices that are in danger of disappearing. She is interested in the stories and experiences of women
  who have gone through foot binding, a practice that has been banned in many countries but still persists in some regions. She aims to use her photography to raise awareness about this issue and promote
  the preservation of these traditions. She is also interested in the social and cultural aspects of foot binding, including its impact on women's lives and the roles that they play in their communities.
