  hobbies: '["Sketching fantastical creatures", "Digital painting", "Creative writing (short stories, poems)", "Reading science-fiction and fantasy novels", "Playing ukulele", "Participating in school theater
    backstage crew", "Group art sessions with friends", "Volunteering at the local library''s story-time", "Hiking in the Ouachita foothills"]'
  career_goals: Sarah dreams of attending a specialized high school with an emphasis on visual arts, followed by a bachelor's degree in illustration or graphic design. She aims to become a professional
    visual artist who creates concept art for video games, books, or animated media, while also establishing community art workshops in her hometown to inspire other young people. Her long-term ambition
    includes collaborating with diverse creators, traveling to attend art residencies, and eventually teaching art classes that merge creativity with emotional resilience.
