personas:
  professional: Sarah Buenviaje, a 15‑year‑old aspiring visual storyteller, blends hand‑drawn fantastical creature sketches with digital painting and short‑form narrative writing, leveraging their strong
    imagination and collaborative spirit from school theater backstage work to craft immersive worlds for friends and the local library’s story‑time program.
  sports: Sarah Buenviaje enjoys hiking the Ouachita foothills with the local Trail Club, participates in the school’s cross‑country team, and follows the Arkansas Razorbacks and Seattle Sounders FC, blending
    a love for endurance activities with spirited fan support.
  arts: Sarah Buenviaje immerses themselves in indie folk music by Bon Iver and Sufjan Stevens, draws inspiration from Studio Ghibli’s animation, studies the fantasy writings of Neil Gaiman and N.K. Jemisin,
    and contributes backstage to the school theater, shaping a vibrant artistic identity that fuses visual, literary, and musical influences.
  travel: Sarah Buenviaje prefers spontaneous weekend road trips to nearby state parks like Hot Springs National Park, dreams of trekking the fjords of Norway and exploring Tokyo’s anime districts, and
    typically plans low‑budget adventures with friends, balancing curiosity with a modest allowance.
  culinary: Sarah Buenviaje favors comfort foods such as homemade mac and cheese with a sprinkle of truffle oil, relishes experimenting with seasonal produce like heirloom tomatoes and fresh basil in simple
    pasta dishes, but often burns toast while multitasking during art sessions, reflecting a budding but occasionally distracted cooking style.
  core: Sarah Buenviaje is a relentlessly curious teen whose sketchbook brims with otherworldly beasts, who calmly balances school responsibilities with spontaneous hikes, and who occasionally forgets homework
    while daydreaming about their next fantasy world.
background:
  cultural: Sarah is a white teenager raised in Muskogee, Oklahoma, a small-town environment that blends Midwestern values of community, humility, and self-reliance with a rich local heritage that includes
    the Muscogee (Creek) Nation. Her family emphasizes close-kin ties, church involvement, and participation in community events such as the Muskogee County Fair and the local arts festival. While she enjoys
    mainstream American teenage culture—social media, pop music, and contemporary fashion—she also respects the region's historical roots, often learning about Creek traditions through school curricula
    and community outreach. This blend of rural small-town life, familial support, and exposure to diverse cultural narratives shapes her worldview and artistic sensibilities.
