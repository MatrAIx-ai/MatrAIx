personas:
  professional: Carolyn Dearaujo, a retired middle-school English teacher turned community art facilitator, harnesses her storytelling flair, empathetic listening, and love of visual culture to curate traveling
    art exhibits for senior centers, mentor former teachers entering community roles, and lead a weekly tea-and-talk circle, flourishing on spontaneity while allowing her relaxed approach to planning to
    color each project.
  sports: Carolyn Dearaujo stays active through weekly water-aerobics at the Lubbock Senior Center, enjoys strolling the Texas Tech campus to catch a Red Raiders football game, and participates in a local
    gardening club's seasonal planting sessions, favoring gentle movement over competitive sports.
  arts: Carolyn Dearaujo nurtures her artistic spirit by painting watercolors inspired by Georgia O'Keeffe's desert palettes, crafting quilts with Frida Kahlo-style motifs, attending community theater renditions
    of Tennessee Williams plays, and listening to Buddy Holly while sipping tea at the museum cafe.
  travel: Carolyn Dearaujo prefers relaxed, thoughtfully arranged road trips, often joining her book club on scenic drives to Santa Fe's vibrant art scene, while dreaming of a future pilgrimage to the Musee
    d'Orsay in Paris, balancing cultural immersion with a modest budget and the need for regular rest stops.
  culinary: Carolyn Dearaujo, a confident home cook, delights in preparing chicken enchiladas drenched in her garden-fresh red chile sauce, homemade guacamole brimming with cilantro and lime, and occasional
    Oaxaca cheese quesadillas, while also cherishing the occasional dinner at Lubbock's beloved Tex-Mex spot La Trappe for their sizzling fajitas.
  core: Carolyn Dearaujo, a sociable, art-infused retiree who thrives on spontaneous community projects, often worries over minor details, misplaces her quilting needles yet never misses a museum opening,
    and finds purpose in weaving stories, plants, and tea for widowed seniors.
background:
  cultural: 'Raised in a middle‑class, Protestant household in Lubbock, Texas, Carolyn''s cultural background is steeped in the values of the American Southwest: hospitality, self‑reliance, and a strong
    sense of community. Her upbringing combined traditional Southern customs with the frontier spirit of West Texas, shaping a pragmatic yet open‑minded outlook. She grew up attending local church gatherings,
    county fairs, and school events, and her family emphasized education, modesty, and appreciation of regional arts such as country music and folk storytelling. While she identifies with these roots, her
    lifelong curiosity has led her to embrace a diverse array of cultural experiences beyond her hometown, fostering an inclusive and eclectic personal culture.'
attributes:
  skills: '[''Curriculum development'', ''Classroom instruction'', ''Public speaking'', ''Community facilitation'', ''Art appreciation'', ''Museum guiding'', ''Event planning'', ''Volunteer coordination'',
    ''Basic computer literacy'', ''Empathy and conflict mediation'', ''Storytelling'', ''Creative writing'']'
  hobbies: '[''Art museum visits'', ''Community theater'', ''Book club'', ''Gardening'', ''Watercolor painting'', ''Quilting'', ''Cooking Tex-Mex cuisine'', ''Dancing'', ''Genealogy research'', ''Volunteering
    at library reading program'']'
  career_goals: Carolyn aims to deepen her engagement with the visual arts and to share that passion with her community. She plans to enroll in a docent training program at the Lubbock Museum of Art and
    to curate a small traveling art exhibit for senior centers. She hopes to mentor former teachers interested in transitioning to community roles, and to complete a memoir that intertwines her teaching
    experiences with reflections on art and life. Additionally, she aspires to launch a weekly tea‑and‑talk circle that provides emotional support to widowed seniors, helping them cope with stress and loneliness.
    Learning new digital tools to preserve family photographs and genealogical records also forms part of her personal development goals.
