  hobbies: '["drawing and coloring", "building with large blocks", "collecting leaves and stones", "listening to picture-book stories", "singing nursery rhymes", "playing toy xylophone", "solving simple
    puzzles", "watching gentle animated shows"]'
  career_goals: Joseph often imagines growing up as an artist who creates colorful pictures, a teacher who helps other children learn, or a veterinarian who cares for animals. His curiosity about how things
    work leads him to wonder about becoming a scientist or an engineer, especially building things with blocks. He also expresses a desire to help people, reflecting his kind nature, and sometimes mentions
    becoming a firefighter or a community helper. These ambitions are still fluid and shaped by the stories he hears and the adults he admires.
