personas:
  professional: Joseph Bong, a four‑year‑old who delights in arranging his LEGO bricks with meticulous care, envisions a future as a tiny architect, turning playtime into a structured design studio where
    each model follows a purposefully drafted blueprint, and they revel in the satisfaction of a completed project.
  sports: Joseph Bong sprints across the park with a miniature soccer ball as a proud member of the Tiny Tornadoes preschool team, cheers for the Manchester United football club on TV, values a daily jump‑rope
    session that feels like a mini‑workout, and they love the feeling of the ball thudding against their foot.
  arts: Joseph Bong spends afternoons with a box of crayons, faithfully recreating scenes from their favorite picture book while humming along to The Wiggles and watching gentle stop‑motion animations,
    letting their imagination echo the bright colors of a sunrise, and they love sharing their artwork with family.
  travel: Joseph Bong delights in weekend trips to the nearby zoo where they marvel at the playful otters, enjoys visiting Grandma's snug cottage for storytime, and dreams of a future adventure to Disneyland,
    always packing a tiny backpack with a snack and a favorite plush bunny.
  culinary: Joseph Bong favors a creamy plate of macaroni and cheese with hidden peas, eagerly helps stir pancake batter on Sunday mornings, can’t resist the sweet peanut‑butter‑banana sandwich that makes
    breakfast feel like a treat, and they proudly proclaim macaroni as the best dinner.
  core: Joseph Bong is a curious four‑year‑old with a tidy mind for building blocks, a pocket‑full of gold‑colored pennies, seasonal sniffles, a love for soccer and The Wiggles, a wanderlust for zoo trips
    and Disneyland dreams, a picky yet adventurous palate, and they often ask for extra cheese on macaroni.
background:
  cultural: Joseph was born and raised in Dora, a small town in Jefferson County, Alabama, within a predominantly white, Southern community. His family embraces typical Southern cultural values such as
    close-knit family bonds, hospitality, church attendance, and a respect for tradition. Community events like church picnics, local fairs, and Fourth of July parades are common parts of his upbringing.
    The regional heritage of country and bluegrass music, storytelling, and crafts like quilting subtly influences his daily life. Local institutions such as the Dora Elementary preschool and the nearby
    Birmingham Museum of Art provide early exposure to education and the arts. His parents blend these Southern traditions with modern educational approaches, encouraging his curiosity and love for art
    while teaching him the importance of politeness, cooperation, and community service.
attributes:
  skills: '["drawing basic shapes", "coloring within lines", "sorting objects by color and size", "recognizing letters A-J", "counting to ten", "reciting nursery rhymes", "cooperative play with small groups",
