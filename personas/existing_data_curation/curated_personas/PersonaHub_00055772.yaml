persona_description: A scientist who specializes in the study of bacteria and their ability to convert waste into electricity. The scientist has conducted interdisciplinary research at the University of
  Minnesota and has discovered that riboflavin, commonly known as vitamin B-2, is responsible for much of the energy produced by these organisms. The scientist is interested in the potential of Shewanella
  to generate more power by increasing riboflavin levels and the possibilities for innovations in renewable energy and environmental clean-up. The scientist is also interested in exploring potential applications
  for bacteria in the production of electricity, such as for wastewater treatment or powering remote sensors on the ocean floor.
