  hobbies: '[''Gardening'', ''Reading historical novels'', ''Knitting'', ''Crocheting'', ''Birdwatching'', ''Jigsaw puzzles'', ''Digital photography'', ''Cooking family recipes'', ''Family scrapbooking'',
