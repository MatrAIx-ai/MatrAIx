  career_goals: Although retired, Miriam aims to leave a lasting legacy for her family and community. She plans to complete a GED for personal fulfillment, compile a family cookbook that blends Texan and
    Portuguese flavors, preserve oral histories of Francitas for the local historical society, mentor younger neighbors in gardening and traditional crafts, and help establish a small community garden for
    seniors. Additionally, she hopes to become more comfortable with modern technology to stay connected with her dispersed relatives.
