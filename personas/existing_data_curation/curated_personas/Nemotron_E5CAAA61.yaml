  hobbies: '["Reading historical fiction","Church choir and gospel music","Community festivals (e.g., Juneteenth celebration)","Gardening (herbs and vegetables)","Handcrafted jewelry making and crocheting","Nature
    walks and bird‑watching","Journaling for stress management"]'
  career_goals: Christalene aims to enroll in a community college program to earn an associate's degree in early childhood education, with the goal of becoming a preschool teacher in her hometown. She also
    plans to obtain a Certified Nursing Assistant (CNA) credential as an alternative pathway into healthcare, valuing job stability and the chance to help her community. Long‑term, she dreams of opening
    a community‑focused child enrichment center that incorporates African American cultural heritage into its curriculum. Alongside her professional aspirations, she hopes to develop a side business selling
    her handcrafted jewelry and home décor, blending her creative interests with financial independence. She envisions using her event‑planning experience to eventually coordinate health fairs and cultural
    festivals that address local needs.
