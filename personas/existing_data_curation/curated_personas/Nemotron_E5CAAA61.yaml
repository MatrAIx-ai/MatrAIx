personas:
  professional: Christalene Woods, a 24‑year‑old aspiring early childhood educator and CNA hopeful, they blend practical library volunteer experience, meticulous event planning, and a love for community
    service with a cautious, detail‑oriented mindset that fuels their vision of opening a heritage‑focused child enrichment center.
  sports: Christalene Woods, they enjoy casual fitness through early‑morning bird‑watching walks along the county trail, weekly yoga sessions at the local community center, support the Brooks County Eagles
    football team on weekends, and occasionally join a recreational softball league for community bonding.
  arts: Christalene Woods, they channel their creative energy into beaded jewelry inspired by intricate beadwork patterns, crochet cozy blankets while humming gospel classics by Yolanda Adams and Kirk Franklin,
    and find literary solace in historical fiction like 'The Lantern’s Light' by Caroline B. Walker.
  travel: Christalene Woods, they prefer modest, purposeful trips that combine cultural immersion and nature, having explored Savannah’s historic squares, savored New Orleans’ jazz and Creole cuisine, weekend‑hiked
    the Great Smoky Mountains, and dreaming of a future pilgrimage to Charleston’s historic district while balancing a limited travel budget.
  culinary: Christalene Woods, they thrive in the kitchen crafting Southern comfort meals such as fried catfish with hush‑puppy crumbs, collard greens seasoned with garden‑grown thyme and smoked turkey,
    and sweet potato pie spiced with nutmeg, while their hands deftly blend herbs from their backyard garden into everyday cooking.
  core: Christalene Woods, a 24‑year‑old budding educator and community‑focused craftsperson, they balance a relentless worry‑driven attention to detail with a warm, gospel‑filled heart, often juggling
    event planning, gardening, and jewelry making while humming softly in the garden.
background:
  cultural: Christalene is a Black woman raised in Valdosta, Georgia, where Southern African American traditions shape her daily life. She grew up in a historic Black Baptist congregation that emphasized
    music, storytelling, and community service. Family gatherings revolve around shared recipes and oral histories that preserve her ancestors' resilience and cultural pride. Participation in local events
    such as church picnics, community clean‑ups, and the annual Juneteenth celebration reinforces her connection to the civil‑rights legacy of the South. Her grandparents instilled values of self‑reliance,
    education, and cultural affirmation, which continue to influence her aspirations and worldview.
attributes:
  skills: '["Basic computer literacy","Customer service (library and community center)","Event planning for church and community gatherings","Interpersonal communication","Conflict resolution","Personal
