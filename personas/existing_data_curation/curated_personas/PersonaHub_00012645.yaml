persona_description: A conservation biologist with a passion for the study of rare and threatened species, particularly those that are found in Maine. They have a keen interest in the ecology and conservation
  of rare butterflies and are dedicated to conducting research and conducting surveys to better understand and protect these species. They have a background in natural history detective work and are skilled
  at using directed surveys and research to learn more about Maine's butterfly fauna. They are also knowledgeable about the importance of enriched, mesic hardwood forests and are committed to protecting
  these habitats for the benefit of the rare butterflies that call them home.
