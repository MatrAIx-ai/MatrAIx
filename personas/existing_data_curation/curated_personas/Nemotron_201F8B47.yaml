  hobbies: '["Visiting local art galleries and museums", "Attending live music and theater performances", "Participating in improv comedy workshops", "Photography and photo editing", "Social media blogging
    about art and culture", "Debate club gatherings", "DIY crafts and upcycling projects", "Karaoke nights", "Weekend road trips to nearby towns", "Reading philosophy, psychology, and self‑help books"]'
  career_goals: Jeannette aims to turn her sociable, performance‑oriented strengths into a career in media and event marketing. In the short term, she plans to build a robust online portfolio that showcases
    her event MC gigs, curated art‑themed Instagram stories, and graphic design work, hoping to land paid freelance gigs for local businesses and the town’s cultural festivals. Long‑term, she envisions
    becoming a regional social‑media strategist or a host for a lifestyle radio/TV show that highlights Southern arts, music, and emerging trends, while also using her platform to raise awareness about
    mental‑health coping strategies for young adults. She intends to enroll in community‑college courses in communications and digital media to supplement her self‑taught skills.
