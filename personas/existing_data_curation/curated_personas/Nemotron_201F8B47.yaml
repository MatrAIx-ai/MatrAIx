personas:
  professional: Jeannette Brooks leverages their natural charisma, improvisational flair, and DIY graphic design skills to command community event MC gigs, crafting eye‑catching social‑media promos while
    juggling a flexible, sometimes chaotic schedule in pursuit of a future as a regional media strategist.
  sports: Jeannette Brooks enjoys casual summer pick‑up basketball at the downtown community court, follows the Atlanta Hawks and the Georgia Bulldogs with enthusiastic loyalty, and drifts into the occasional
    yoga class at a neighborhood studio, though they rarely adhere to a structured training schedule.
  arts: Jeannette Brooks curates Instagram feeds and pop‑up installations inspired by the vibrant patterns of Yayoi Kusama, the genre‑bending sounds of St. Vincent, and the whimsical narratives of playwright
    Sarah Ruhl, often transforming thrift‑store finds into collage art pieces for local gallery nights.
  travel: Jeannette Brooks prefers spur‑of‑the‑moment road trips, often packing a mixtape and camera for weekend escapes to Asheville’s art colonies or Savannah’s historic squares, dreaming of an extended
    indie‑film tour through Austin and Portland, yet their modest student budget and rotating event schedule keep most adventures short and budget‑friendly.
  culinary: Jeannette Brooks, an enthusiastic yet occasionally chaotic home cook, loves crafting avocado‑lime toast with a drizzle of sriracha, experimenting with jackfruit tacos for a vegan twist, and
    indulging in reheated mac and cheese after late‑night gigs, always keeping fresh cilantro and basil within arm’s reach.
  core: Jeannette Brooks is a vibrant, improvisational social‑butterfly who balances restless creativity with bouts of anxiety, thriving on spontaneous art projects while habitually juggling too many gigs
    for an organized mind.
background:
  cultural: Jeannette grew up in Manchester, a small town in Talbot County, Georgia, where Southern hospitality and close‑knit community values shape daily life. Her family’s roots are in the region’s historic
    farming and small‑business traditions, and she was raised with a blend of church gatherings, local festivals, and a strong sense of regional identity. While she respects these traditions, her curiosity
    pushes her toward broader artistic and cultural influences, from contemporary indie music to avant‑garde visual art. This duality fuels her appreciation for both the comforting rituals of Southern life
    and the excitement of unconventional, global ideas.
attributes:
  skills: '["Public speaking", "Improvisational performance", "Social media content creation", "Basic graphic design", "Photography and photo editing", "Event coordination", "Debate and critical analysis",
