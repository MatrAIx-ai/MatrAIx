personas:
  professional: Aaron Samuels is a media and communications specialist who combines a humanities foundation with a disciplined, organized workflow to craft narrative‑driven digital content for cultural
    nonprofits, translating visual ideas into compelling copy while thriving in solitary, focused project cycles.
  sports: Aaron Samuels follows the Washington Capitals for hockey, the Baltimore Ravens for football, and the Richmond Kickers for soccer, attending games alone when possible, and integrates solitary fitness
    routines like early‑morning runs along the James River and weekend bike rides to balance sedentary desk time.
  arts: Aaron Samuels immerses themselves in the arts by frequenting Richmond’s contemporary galleries, curating playlists that feature Miles Davis, Kamasi Washington, Erykah Badu, and Flying Lotus, reading
    contemporary fiction by Colson Whitehead and art theory by Rosalind Krauss, and practicing street‑photography that captures the city’s architectural contrasts.
  travel: Aaron Samuels favors slow, reflective travel, planning weekend getaways to historic towns like Charlottesville and Savannah, savoring train journeys to Boston and Asheville, and dreaming of a
    longer stay in Kyoto to photograph temples while funding trips primarily through freelance project earnings.
  culinary: Aaron Samuels delights in home‑cooked meals that showcase their herb garden, regularly preparing rosemary‑infused roasted chicken, basil‑and‑mint quinoa bowls, and avocado toast with feta, while
    occasionally indulging in a well‑crafted espresso at local cafés after photographing a gallery opening.
  core: Aaron Samuels is a solitary, curiosity‑driven storyteller who balances meticulous organization with artistic spontaneity, yet often wrestles with anxiety and a penchant for over‑analyzing both work
    and life.
background:
  cultural: Aaron grew up in Richmond's North Side, a neighborhood steeped in African-American history and community activism. His parents, both educators, instilled a love of literature and Black cultural
    heritage. He was immersed in the city's civil-rights legacy—visiting the Virginia Museum of History and Culture's African-American exhibit, attending annual Juneteenth celebrations, and engaging with
    local Black artists. This upbringing shapes his worldview, informing his commitment to represent diverse narratives and to bring the richness of Black artistic expression into his professional work.
