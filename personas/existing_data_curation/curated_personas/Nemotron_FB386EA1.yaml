  career_goals: Aaron aims to transition into a senior communications role where he can shape the storytelling agenda of cultural institutions or nonprofit organizations focused on African American arts
    and heritage. He aspires to lead interdisciplinary media projects, develop original documentary series, and mentor emerging creators. Over the next five years, he hopes to establish a reputable platform—such
    as a podcast or online magazine—that amplifies underrepresented voices and fosters community dialogue while securing a stable leadership position that affords creative autonomy.
