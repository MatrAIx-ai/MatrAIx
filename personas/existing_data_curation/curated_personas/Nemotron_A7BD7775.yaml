    weekend getaways'', ''Gardening herbs and indoor plants'', ''Playing the ukulele'', ''Listening to health and wellness podcasts'']'
  career_goals: Aimee aims to deepen her professional credentials by earning the Certified Pharmacy Technician (CPhT) designation and eventually completing a bachelor's degree in pharmacy or pharmaceutical
    sciences. She is passionate about specializing in innovative compounding practices that integrate conventional medicine with holistic wellness approaches. Long‑term, she envisions opening a boutique
    community pharmacy that offers personalized medication services, wellness workshops, and a rotating gallery space for local artists, blending her love of science and art. Additionally, she hopes to
    contribute to research on medication adherence and patient education through community health initiatives, and to present at conferences that explore the intersection of health, technology, and creative
    expression.
