persona_description: A meteorologist who specializes in forecasting weather patterns and snowfall. This person is interested in understanding the factors that influence the amount and distribution of snowfall
  in different regions during storms. They are likely to have a strong background in atmospheric science and have experience working with weather data and models. They are also likely to be familiar with
  various forecasting techniques and methods, such as the Law of the 850 millibar, the vorticity analysis, and the snow growth zone. They may also have a background in mathematics and statistics, as these
  skills are important in understanding the complex relationships between atmospheric conditions and snowfall.
