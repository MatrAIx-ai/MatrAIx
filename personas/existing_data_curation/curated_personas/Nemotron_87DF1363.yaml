  career_goals: Although retired from formal employment, Allene aspires to compile a memoir that weaves together her life‑long love of art, the evolution of Scottsdale, and the stories of her peers. She
    aims to launch an inter‑generational art workshop at the local senior center, where seniors mentor teenagers in watercolor and craft techniques. Mastering a new medium—low‑fire pottery—is a personal
    artistic goal, and she hopes to contribute a series of desert‑inspired pieces to the Scottsdale Museum of Contemporary Art. Allene also seeks recognition as a volunteer docent, sharing her knowledge
    of Southwestern art and history with visitors.
