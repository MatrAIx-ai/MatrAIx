personas:
  professional: Sheri Edmond is a meticulous dental hygienist who leverages their STEM background and a razor‑sharp eye for organization to streamline clinic workflow, mentor junior staff, and uphold strict
    infection‑control standards while quietly wrestling with stress‑induced perfectionism.
  sports: Sheri Edmond enjoys weekend hikes along the Sleeping Bear Dunes shoreline, is a modest fan of the Detroit Lions and Michigan Wolverines, participates in a community yoga class at the local recreation
    center, and occasionally joins a co‑ed recreational softball league with coworkers, where they relish the brief camaraderie.
  arts: Sheri Edmond captures the tranquility of Michigan’s lakeshore sunsets with their DSLR, fills their evenings with indie folk playlists featuring Sarah Jarosz and John Prine, and volunteers at the
    annual Brookfield Art Fair, finding creative solace in both the camera lens and the measured cadence of classical piano practice.
  travel: Sheri Edmond prefers short road trips to nearby state parks like Pictured Rocks and a yearly family getaway to Mackinac Island, while dreaming of a summer abroad in Tuscany to study Mediterranean
    oral‑health practices, they balance travel cost with the modest budget of a young professional.
  culinary: Sheri Edmond prepares nutrient‑dense meals such as quinoa‑kale bowls with roasted beetroot, grilled salmon glazed with lemon‑dill, and seasonal apple‑cinnamon oatmeal, and enjoys experimenting
    with farm‑fresh herbs like thyme and rosemary, they admit to an occasional late‑night fast‑food burrito when workload spikes.
  core: Sheri Edmond is a detail‑obsessed dental hygienist with a green thumb, a habit of over‑organizing, a perpetual undercurrent of worry, and a quiet devotion to community health and personal wellness.
background:
  cultural: Sheri grew up in a small Midwestern town in Michigan, immersed in a community that values hard work, modesty, and neighborly support. Her family’s white, Protestant heritage emphasized education,
    self‑reliance, and civic involvement, shaping her disciplined approach to both career and personal life. The local culture of practicality and hospitality informs her balanced view of new ideas and
    established methods, and her commitment to giving back through community health initiatives reflects the region’s strong sense of collective responsibility.
attributes:
  skills: '[''Dental prophylaxis'', ''Periodontal charting'', ''Dental radiography'', ''Patient education'', ''Infection control'', ''Digital charting (EHR)'', ''Appointment scheduling'', ''Data analysis
