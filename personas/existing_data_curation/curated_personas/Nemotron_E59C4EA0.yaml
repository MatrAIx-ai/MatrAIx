  hobbies: '[''Gardening'', ''Home organization projects'', ''Hiking'', ''Yoga'', ''Journaling'', ''Scientific article reading'', ''Puzzle solving'', ''Photography'', ''Cooking healthy meals'', ''Community
    health volunteering'']'
  career_goals: Professionally, Sheri aims to expand her impact beyond the clinic by earning a Master’s degree in Dental Public Health and obtaining a Certified Dental Hygienist Educator credential. She
    envisions leading community outreach programs to raise preventive oral‑health awareness in rural Michigan, and eventually transitioning into a supervisory role as a clinical coordinator or faculty member
    at a local community college. While pursuing these ambitions, she is focused on developing stress‑management techniques to sustain high performance and maintain work‑life balance.
