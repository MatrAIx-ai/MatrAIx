persona_description: A steam network control commissioning expert with experience in dynamic simulation and process dimensioning, particularly in the context of the Langerbrugge mill's process steam network.
  This person is familiar with Pöyry's method of building an integrated control scheme and combining independent control systems, and has a keen interest in seeing how well the simulation can check the
  process dimensioning and control behavior during a turbine trip. This person is likely to be interested in the specific details of the steam network control configuration specifications that emerge from
  the dynamic simulations, and is looking for a way to implement these specifications in the real world.
