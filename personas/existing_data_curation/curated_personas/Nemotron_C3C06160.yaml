  hobbies: '["Hiking","Wildlife photography","Woodworking","Reading historical biographies","Playing chess","Traditional Diné music appreciation","Small-scale gardening","Attending intimate community gatherings"]'
  career_goals: Looking ahead, Delmont aims to translate his extensive field experience into a supervisory role within the tribal finance department, where he can mentor younger collectors and influence
    policy on responsible credit practices. He plans to earn the Certified Credit and Collection Professional (CCCP) credential within the next two years to formalize his expertise. In the longer term,
    he envisions launching a small consultancy that offers financial‑literacy workshops for members of the Navajo Nation, focusing on budgeting, debt management, and credit building. Achieving a stable,
    community‑oriented income in his mid‑50s would allow him to support his extended family while preserving his independence.
