persona_description: A Māori educator who emphasizes the importance of identity, belonging, and the environment in the learning process, and who believes in the power of language and the environment to
  facilitate learning and development. This educator believes in the concept of rangatiratanga and in the transfer and absorption of skills, knowledge, wisdom, experience, and knowledge in everyday activities.
  This educator is skilled in Māori language and culture, and believes in the importance of communication and collaboration in the learning process. This educator is also skilled in teaching and learning,
  and believes in the use of alternative teaching methods that promote self-determination and independence. This educator is committed to the concept of mana whenua, the power of the land, and the importance
  of respecting and accepting learners for who they are.
