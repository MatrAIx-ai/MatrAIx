personas:
  professional: A seasoned carpenter and small-business owner, Ora Singleton leverages three decades of framing, finish work, and custom-furniture expertise, a meticulous eye for Georgia building codes,
    and a talkative, community-focused communication style to manage projects, negotiate with suppliers, and mentor apprentices while pursuing a contractor's license and a sustainable workshop space.
  sports: Ora Singleton maintains fitness through daily gardening, weekly walks with the Atlanta Falcons Fan Club walking group, and seasonal participation in the Georgia Senior Softball League, all while
    passionately supporting the Atlanta Braves during spring training.
  arts: Ora Singleton finds artistic fulfillment in her gospel choir performances echoing the soulful tones of Mavis Staples, crafting patchwork quilts inspired by the classic Amish quilting tradition,
    and losing herself in historical fiction by Hilary Mantel, all of which reinforce her communal storytelling ethos.
  travel: Ora Singleton prefers carefully planned road trips to historic towns like Savannah, Charleston, and Williamsburg, where she can explore colonial architecture and local markets, while budgeting
    for occasional weekend getaways to the Great Smoky Mountains for gardening inspiration, though limited workshop funds sometimes delay longer overseas adventures.
  culinary: Ora Singleton, an avid home cook, routinely transforms her harvested heirloom tomatoes, basil, thyme, and rosemary into dishes like a bright heirloom tomato-basil salad, herb-roasted chicken,
    and rustic sourdough flatbread, showcasing her intermediate culinary skill and love for farm-to-table flavors.
  core: Ora Singleton blends meticulous carpentry expertise with a garden-obsessed, choir-loving spirit, but their tendency to overcommit to community projects can leave the workshop schedule a little chaotic.
background:
  cultural: Growing up in rural Wilkinson County, Ora was immersed in a close‑knit African‑American community where church, family, and extended networks provided both support and a sense of identity. The
    legacy of Black craftsmanship in the South, from early farmhand carpentry to the tradition of hand‑made furniture, shaped her appreciation for skilled labor. Oral storytelling, gospel music, and Southern
    cooking were daily staples, reinforcing values of resilience, self‑reliance, and communal responsibility. As a Black woman in a male‑dominated trade, Ora navigated both gender and racial expectations,
    drawing strength from the pioneering women in her family and community who broke barriers. Her cultural roots influence her work ethic, her emphasis on mentorship, and her commitment to preserving local
    heritage through building restoration and community education.
