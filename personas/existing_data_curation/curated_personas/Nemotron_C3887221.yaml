  hobbies: '[''Gardening'', ''Gospel choir singing'', ''Quilt making'', ''Community storytelling'', ''DIY home‑repair workshops'', ''Historical fiction reading'', ''Cooking Southern soul food'', ''Volunteer
    mentoring'', ''Local craft fairs participation'']'
  career_goals: Ora aims to formalize her reputation by obtaining a Georgia contractor's license and expanding her one‑person operation into a small workshop that produces handcrafted furniture for local
    homes and historic restoration projects. She wants to create a mentorship program for young Black women interested in the trades, securing grant funding to run weekly hands‑on sessions at the community
    center. Additionally, she plans to incorporate sustainable building practices—using reclaimed wood and low‑VOC finishes—to position herself as a go‑to carpenter for eco‑conscious clients. Financial
    independence and a stable, owned workshop space are key milestones as she navigates life after separation.
