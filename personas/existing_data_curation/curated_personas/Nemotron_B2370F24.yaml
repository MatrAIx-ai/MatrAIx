  career_goals: Jordan dreams of becoming a firefighter because he admires their teamwork, the clear structure of their duties, and the chance to help others. He also wonders about being an engineer who
    designs bridges or machines, as he enjoys building things with LEGO and figuring out how they work. In the short term, he aims to improve his reading speed and start learning simple coding through kid‑friendly
    programming games, so he can create his own interactive stories.
