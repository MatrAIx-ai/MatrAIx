  hobbies: '[''Visiting art galleries and museums'', ''Reading philosophy and creative non‑fiction'', ''Cooking Puerto Rican cuisine'', ''Hiking the Huron River trail'', ''Kayaking'', ''Participating in
    a small book club'', ''Attending community salsa‑dance workshops'', ''Mentoring youth in entrepreneurship'']'
  career_goals: Daniel aims to transition into a senior leadership role within his organization, such as Regional Sales Manager or Director of Service Sales, where he can shape sales strategy, mentor junior
    representatives, and champion a culture of empathy and innovative thinking. He plans to complete his bachelor’s degree in Business Administration to solidify his academic foundation. Additionally, he
    envisions launching a boutique consultancy focused on helping small Midwestern businesses improve customer experience through culturally sensitive service design. Daniel also aspires to become a speaker
    at industry conferences, sharing insights on integrating creativity and compassion into sales practice.
