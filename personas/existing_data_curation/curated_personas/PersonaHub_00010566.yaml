persona_description: A historian who is particularly interested in the history of colonization in the Northern Plains region of North America, with a focus on the impact of white settlement on the cultures,
  religions, and traditions of the indigenous peoples. The artist's series of blanket paintings, which use flannel blankets as the canvas, is a powerful representation of this impact, and the WAG painting
  in particular is a significant work that showcases the artist's ability to combine personal symbols with historical patterns and references to abstract art. The persona is likely to be knowledgeable about
  the history and art of the Northern Plains region, with a particular interest in the impact of colonization on indigenous cultures and traditions.
