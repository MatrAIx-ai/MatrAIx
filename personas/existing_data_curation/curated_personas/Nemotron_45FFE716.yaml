personas:
  professional: Alberto Wong, a 25‑year‑old geospatial specialist, leverages meticulous GNSS surveying, UAV photogrammetry, and bilingual GIS reporting to deliver precise coastal erosion maps, while their
    methodical, organized nature ensures rigorous data quality and reliable project delivery.
  sports: Alberto Wong channels their love of the outdoors into weekend trail hikes along the Daytona Beach coastal paths, participates in the local Coastal Trail Runners club, and follows the Orlando Magic
    (NBA) and the Daytona Tortugas (MiLB) with the same attentive focus they bring to field surveys.
  arts: Alberto Wong captures sunrise over the Atlantic with a DSLR and drone, shares the resulting images at their modest photography club, while evenings are spent strumming acoustic renditions of traditional
    Mexican folk songs by artists like Lila Downs and Juan Gabriel.
  travel: Alberto Wong prefers low‑key, nature‑driven trips, having explored the Everglades, the volcanic landscapes of Iceland, and the historic streets of Oaxaca, and they now aim to trek Patagonia’s
    Torres del Paine while budgeting travel through a points‑reward credit card.
  culinary: Alberto Wong’s kitchen is a laboratory for authentic mole poblano, hand‑made tamales, and freshly roasted chiles, where they blend spices like ancho, pasilla, and cacao, while also perfecting
    avocado‑lime salsa to serve at family gatherings.
  core: Alberto Wong fuses a quiet, methodical mind with a love for solitary nature adventures, old‑world cooking, and meticulous data, all while juggling a spreadsheet‑driven budget and an occasional back‑pain
    flare‑up.
background:
  cultural: Alberto was raised in a Mexican immigrant family in the Tampa‑Daytona corridor. Spanish is spoken at home, and family gatherings revolve around Mexican cuisine, Día de los Muertos altars, and
    music. His parents emphasized hard work, respect for elders, and community support, which shaped his cooperative nature. Living in Daytona Beach, he blends these traditions with the local coastal culture—participating
    in beach festivals, enjoying surf and fishing, and interacting with the diverse Latino community in Volusia County. This bicultural upbringing gives him bilingual fluency, a deep appreciation for both
    Mexican heritage and Floridian coastal life, and a commitment to giving back to the community that supports him.
attributes:
  skills: '[''GIS analysis (ArcGIS, QGIS)'', ''GNSS and total station surveying'', ''UAV/drone photogrammetry'', ''LiDAR data processing'', ''Topographic and cadastral mapping'', ''AutoCAD and Civil 3D
    drafting'', ''Spatial database management (PostGIS)'', ''Geodetic calculations and error budgeting'', ''Technical report writing'', ''Bilingual communication (Spanish/English)'', ''Data quality control
    and field safety compliance'', ''Python scripting for GIS automation'']'
  hobbies: '[''Hiking coastal and nature trails'', ''Landscape and aerial photography'', ''Drone piloting for mapping'', ''Playing acoustic guitar (Mexican folk songs)'', ''Cooking traditional Mexican dishes'',
    ''Volunteering for beach clean‑up projects'', ''Reading cartography, geology, and science‑fiction'', ''Cycling around Daytona Beach'', ''Learning Python for GIS automation'']'
  career_goals: Alberto aims to become a licensed professional land surveyor within the next three years, obtain ASPRS certifications in UAV photogrammetry, and pursue a master's degree in GIS or spatial
    data science. He wants to lead projects that map coastal erosion and flood risk in Volusia County, integrating drone‑derived data and machine‑learning analytics to support resilient urban planning.
    In the long term, he envisions founding a boutique surveying consultancy that offers sustainable land‑use assessments for developers while mentoring young Latino students interested in geospatial careers.
