persona_description: A healthcare professional who is interested in the implementation and use of electronic medical records (EMRs) in healthcare organizations. This persona is likely to be a physician,
  nurse, or other healthcare provider who uses EMRs to document clinical information on many patients over long periods. They are familiar with the workflow and layout of paper charts and are looking for
  ways to improve the efficiency and accuracy of their documentation process. This persona may also be interested in the latest technology trends in EMR software and may have a particular interest in the
  software that is being used in their organization.
