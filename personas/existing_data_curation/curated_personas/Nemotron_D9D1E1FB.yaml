personas:
  professional: Wiley Huneycutt, a freelance concept artist in training, leverages their expertise in digital illustration, character design, and Python-driven generative art to craft immersive speculative
    worlds for indie game studios, while their meticulous self‑management and competitive drive push them to meet tight deadlines and continuously refine their portfolio.
  sports: Wiley Huneycutt, an avid solo hiker who follows the seasonal trails of the Bankhead National Forest, occasionally joins a local running club that trains for the Alabama Marathon, cheers for the
    Auburn Tigers football team during the fall, and maintains a minimalist fitness routine focused on bodyweight exercises, though they often skip group sports due to a preference for quiet, individual
    activity.
  arts: Wiley Huneycutt, who spends evenings curating experimental playlists featuring Aphex Twin, Brian Eno, and the ambient folk of Gillian Welch, draws inspiration from the surreal poetry of Ocean Vuong
    and the visual storytelling of Hayao Miyazaki, regularly visits the Birmingham Museum of Art's contemporary exhibit, and channels these influences into sketching fantastical landscapes that blend Southern
    gothic motifs with speculative fiction.
  travel: Wiley Huneycutt, a modest traveler who prefers off‑season trips, has explored the misty cliffs of the Scottish Highlands to study atmospheric light, taken a solo road trip along the Blue Ridge
    Parkway for photography inspiration, and dreams of visiting the mangrove forests of Vietnam's Ha Long Bay, all while budgeting carefully to fund creative projects and avoiding crowded tourist hotspots.
  culinary: Wiley Huneycutt, an experimental home cook with a modest skill set, loves crafting Southern‑style shrimp and grits infused with smoked paprika, experimenting with heirloom tomatoes from local
    farmers' markets, and occasionally whips up a batch of dark chocolate ganache for midnight sketching sessions, but often forgets to refrigerate leftovers, leading to occasional food waste.
  core: Wiley Huneycutt, a 24‑year‑old solitary dreamer, channels restless curiosity and competitive perfectionism into haunting art while battling anxiety and a penchant for late‑night coffee‑fuelled creative
    marathons.
background:
  cultural: Wiley grew up in Vinemont, a small community in Cullman County, Alabama, steeped in the traditions of the Southern United States. His family is of Anglo‑American descent, with generations of
    farm and small‑business owners who attended the local Baptist church. The region’s storytelling heritage, country and bluegrass music, and the slower, close‑knit rhythm of rural life have shaped his
    appreciation for narrative and atmospheric settings. While he respects his cultural roots, Wiley’s strong drive toward novelty and abstract art often leads him to blend Southern gothic motifs with speculative
    and avant‑garde influences, creating a personal aesthetic that both honors and reimagines his background.
attributes:
  skills: '[''Digital illustration'', ''Concept art'', ''Creative writing (speculative fiction, poetry)'', ''Philosophical research'', ''Critical analysis'', ''Basic Python programming'', ''Generative art'',
    ''Project planning and self‑management'', ''Photo editing'', ''Audio mixing'']'
  hobbies: '[''Sketching and digital illustration'', ''Creative writing (speculative fiction, poetry)'', ''Reading speculative fiction and philosophy'', ''Analog photography'', ''Hiking in nature'', ''Listening
    to experimental electronic and Southern folk music'', ''Puzzle solving'', ''Playing narrative‑driven video games'', ''Curating personal playlists'', ''Blogging about art and literature'']'
  career_goals: Wiley aspires to turn his imaginative vision into a sustainable creative career. He aims to publish a novel or a collection of short stories that blend speculative elements with Southern
    gothic themes, and to establish himself as a freelance concept artist for indie video game studios. Over the next five years, he plans to complete his bachelor's degree in Fine Arts remotely, build
    a portfolio that attracts remote commissions, and eventually launch a small boutique studio that produces illustration, world‑building consulting, and limited‑edition art prints. He is also motivated
    to develop a personal blog that showcases his writing and visual art, hoping to cultivate a dedicated niche audience.
