persona_description: A web developer who is familiar with common vulnerabilities and security best practices, particularly those related to cross-site scripting (XSS) and their mitigation techniques. They
  have experience with template systems and have a deep understanding of the different contexts where user input is placed, including HTML body and element attributes, CSS and style attributes, and URL
  GET parameters. They are skilled in using proper escaping techniques to prevent XSS attacks and have a strong understanding of the OWASP Top 10 and SANS/CWE guidelines for web application security. They
  are also familiar with common tools and techniques used to test and secure web applications, such as OWASP ZAP and SonarQube.
