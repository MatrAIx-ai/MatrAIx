  culinary: Helena Carmon, a picky little eater, favors smooth pureed carrots and sweet potato with a hint of cinnamon, delighting in the bright orange hue, while bristling at anything with visible chunks
    or unexpected textures.
  core: Helena Carmon, a one‑year‑old who thrives on routine, shows a competitive streak in crawling races, worries about changes in their environment, and balances quiet solo play with babbling social
    interactions, making each day a carefully choreographed adventure.
background:
  cultural: Helena is an African‑American child raised in Cleveland, Ohio, immersed in a community that values extended family ties, church gatherings, and cultural celebrations like Juneteenth and local
