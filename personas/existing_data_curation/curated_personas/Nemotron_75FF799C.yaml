    cheering in babble whenever a pitcher throws a strike.
  arts: Helena Carmon, despite being only a year old, displays an early affinity for bright visual art by spending hours with the colorful pictures in Eric Carle’s The Very Hungry Caterpillar and responds
    enthusiastically to the melodic lullabies of musician Raffi, often mimicking the rhythm with their tiny hands.
  travel: Helena Carmon, whose travel experiences are currently limited to family road trips to a seaside cottage in Maine and a weekend visit to Grandma’s farmhouse, prefers the predictability of familiar
