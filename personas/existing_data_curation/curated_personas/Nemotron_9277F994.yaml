personas:
  professional: Joshua Cunningham, a 43‑year‑old facilities maintenance specialist, leverages their hands‑on cleaning expertise and deep appreciation for art to lead a small crew in preserving gallery interiors
    while pioneering eco‑friendly, preservation‑sensitive cleaning methods at cultural venues.
  sports: Joshua Cunningham, a devoted fan of the Chicago Bulls and Chicago White Sox, spends Saturday evenings playing pickup basketball at the East Side Community Center, cheers on the Chicago Bears each
    fall, and channels a competitive spirit honed from trivia nights into every game they watch or play.
  arts: Joshua Cunningham, an avid gallery hopper, regularly visits exhibitions featuring artists like Banksy, Kehinde Wiley, and Frida Kahlo, and they frequently attend live performances of Lin‑Manuel
    Miranda’s Broadway revivals and intimate concerts by John Legend, weaving these experiences into their personal aesthetic.
  travel: Joshua Cunningham prefers spontaneous weekend getaways, often booking last‑minute flights to cultural hotspots such as Kyoto, Barcelona, and New Orleans, while also exploring historic neighborhoods
    in Chicago’s museum districts during annual arts festivals, balancing curiosity with a modest travel budget.
  culinary: Joshua Cunningham, an enthusiastic home cook, experiments with dishes ranging from Korean bibimbap to heirloom tomato bruschetta, and they especially enjoy using saffron, smoked paprika, and
    fresh rosemary to add bold flavors to their culinary creations.
  core: Joshua Cunningham blends a curiosity for art with hands‑on maintenance skills, a competitive edge, and a flexible, sometimes disorganized approach to life that fuels both their professional ambition
    and vibrant community involvement.
background:
  cultural: Joshua was raised in a small town in Southside Virginia and identifies with a working‑class Southern cultural background. He grew up in a close‑knit, predominantly white community where values
    such as hospitality, self‑reliance, and strong family ties are emphasized. He is a regular attendee of his local Baptist church, takes part in county fairs and historic reenactments, and holds a deep
    appreciation for the region’s Civil War history and agrarian roots. This background informs his pragmatic outlook, community‑oriented mindset, and his blend of tradition with openness to new ideas.
attributes:
  skills: '["Cleaning and janitorial operations", "Facility safety compliance", "Minor repairs and maintenance", "Customer service and communication", "Team coordination and shift leadership", "Green cleaning
    practices", "Basic art handling and preservation awareness", "Problem solving and process improvement"]'
  hobbies: '["Visiting local art galleries and museums", "Playing pickup basketball with friends", "Participating in community volunteer clean‑up events", "DIY home improvement and woodworking projects",
    "Experimenting with new recipes and cooking techniques", "Listening to podcasts on art history, sustainability, and unconventional ideas", "Attending live music, theater, and local folk festivals",
    "Competing in trivia nights at the neighborhood bar"]'
  career_goals: Joshua aims to leverage his experience and curiosity to advance into a supervisory role within facilities management, ideally at a cultural institution such as a museum or theater where
    his appreciation for art can be applied. He plans to earn certifications in green cleaning and facility safety, and is considering starting his own boutique cleaning business that specializes in preservation‑friendly
    services for galleries and historic sites. He also hopes to complete a bachelor’s degree in facilities management or business administration to broaden his managerial capabilities.
