  hobbies: '[''Community gardening'', ''Knitting and crochet'', ''Choir singing'', ''Local theater group participation'', ''Hiking in the Cuyahoga Valley'', ''Reading historical fiction'', ''Cooking family
    recipes'', ''Organizing neighborhood art workshops'']'
  career_goals: Susan aims to leverage her three decades of design experience to step into a senior creative leadership role, such as Creative Director, where she can shape the visual strategy of a community‑focused
    organization or a regional agency. She is passionate about mentoring emerging designers, establishing inclusive design guidelines, and launching a nonprofit design‑consulting program that offers pro‑bono
    branding services to local charities. Continuing education, such as an advanced certification in accessibility and a short UI/UX credential, are also part of her professional growth plan.
