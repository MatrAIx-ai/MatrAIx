personas:
  professional: Susan Mills, a seasoned graphic designer with three decades of experience, blends their methodical project management and collaborative spirit to craft cohesive brand identities that prioritize
    functional aesthetics, accessibility, and community impact.
  sports: Susan Mills, an avid hiker, spends their weekends exploring Cuyahoga Valley trails with the local walking club, cheers for the Cleveland Guardians during baseball season, and stays active year‑round
    with low‑impact indoor swimming at the community center, favoring steady fitness over high‑intensity workouts.
  arts: Susan Mills, a choir member and community theater enthusiast, draws creative inspiration from the folk artistry of Grandma Moses and the narrative charm of Norman Rockwell, while also channeling
    their love for craft through knitting and crochet projects that accompany their design work.
  travel: Susan Mills favors well‑planned road‑trip itineraries that blend purposeful visits to regional gems like the Blue Ridge Parkway, Asheville, and Charleston with spontaneous detours to historic
    Irish towns, balancing their love of discovery with family commitments and a modest travel budget.
  culinary: Susan Mills, a passionate home cook, showcases Midwestern comfort foods such as chicken and dumplings, Ohio buckwheat pancakes, and apple crisp—often using fresh herbs from their garden—though
    they admit to hoarding an extra jar of maple syrup for unexpected guests.
  core: Susan Mills, a methodical creative with a heart for community, balances their love of clean design with a habit of over‑stocking yarn, an unwavering commitment to early‑morning garden chores, and
    a penchant for scheduling both work and play months in advance.
background:
  cultural: Raised in a small Midwestern town in Ohio, Susan comes from a mixed German‑Irish heritage and was brought up in a Methodist household that emphasized community service, modesty, and reliability.
    The Midwestern values of practicality, hard work, and neighborly support have shaped her outlook and design sensibility, favoring clean, functional aesthetics that cater to everyday usability. Her exposure
    to regional folk art, American illustration traditions, and the cultural emphasis on collaborative community projects informs both her professional work and personal pursuits.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Brand Identity Development'', ''Print Production Management'', ''Digital Illustration'', ''User Experience Fundamentals'',
