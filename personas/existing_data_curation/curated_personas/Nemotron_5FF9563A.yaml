personas:
  professional: Cesar Fundora, a 72‑year‑old retired handyman and bilingual DIY enthusiast, they channel their practical carpentry, plumbing, and culinary know‑how into volunteer workshops that teach home‑repair
    basics and traditional grill‑style cooking at the local cultural center, favouring relaxed, improvisational sessions over rigid curricula.
  sports: Cesar Fundora keeps fit by strolling along Fort Lauderdale’s canal walkways, they join a casual senior fishing club that meets after sunrise, and they cheer on the Miami Heat and Tampa Bay Rays
    from their porch, preferring low‑impact activity over structured gym routines.
  arts: Cesar Fundora, a quiet aficionado of folk and tango, they regularly enjoy the music of Astor Piazzolla and Mercedes Sosa while immersing themselves in the novels of Roberto Bolaño and Julio Cortázar,
    letting these melodies and stories shape their evenings of solitary reflection.
  travel: Cesar Fundora plans leisurely trips that balance family visits in Buenos Aires with occasional Caribbean cruises, they favour flexible itineraries, comfortable accommodations, and short flights
    that accommodate a modest budget and a desire for calm, reflective travel experiences.
  culinary: Cesar Fundora, a seasoned home chef, they delight in preparing asado‑style grilled steaks with chimichurri, hand‑folded empanadas stuffed with spiced beef and olives, and homemade dulce de leche,
    often sourcing fresh herbs from their garden and using beets, bell peppers, and paprika to season their creations.
  core: Cesar Fundora, a 72‑year‑old solitary handyman‑chef, they balance a love for quiet garden mornings and spontaneous grill sessions with a habit of misplacing tools and a soft spot for late‑night
    tango playlists.
background:
  cultural: Cesar is a first‑generation Argentine immigrant who grew up in a modest barrio of Buenos Aires, where family gatherings, mate‑sharing, and a deep love for food and music shaped his identity.
    He emigrated to the United States in the early 1970s, settling in Fort Lauderdale, Florida. While he has adopted many aspects of American life, he maintains strong ties to Argentine traditions—speaking
    Spanish at home, celebrating Argentine holidays, preserving culinary practices, and staying connected to the diaspora community. His cultural perspective blends the warmth and communal spirit of Argentine
    society with the laid‑back, diverse environment of South Florida.
