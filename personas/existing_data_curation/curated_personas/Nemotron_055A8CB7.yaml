  career_goals: Cesar hopes to become a civil engineer or community planner who designs safe public spaces, or a teacher who can help other kids learn. He also imagines working with wildlife to protect
    desert animals. He is driven by a desire to make his family and community proud and to create stable, harmonious environments.
