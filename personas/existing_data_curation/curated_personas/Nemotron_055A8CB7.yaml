personas:
  professional: Cesar Tigera, an aspiring junior scientist who translates their love for adventure and science books into methodical LEGO experiments and meticulous school project reports, leverages their
    organized, reliable nature to plan each step ahead while they remain courteous and cooperative, making them a valued collaborator in group science fairs.
  sports: Cesar Tigera, a member of the Yuma Youth Soccer Club who prefers the goalkeeper role, spends their summers hiking desert trails, enjoys weekend basketball games with friends while rooting for
    the Phoenix Suns, follows the Arizona Diamondbacks during baseball season, and they adhere to a disciplined routine of stretching and light conditioning after school to stay fit.
  arts: Cesar Tigera, an avid sketcher of desert vistas who admires the photographic mastery of Ansel Adams, delights in Pixar’s animated storytelling, constantly listens to The Beatles alongside family‑approved
    playlists, and channels their creative energy into LEGO dioramas that mirror their hand‑drawn landscapes.
  travel: Cesar Tigera, an inquisitive explorer who meticulously plans short road trips to nearby wonders such as the Colorado River and the Sonoran Desert, dreams of trekking the Grand Canyon and wandering
    Kyoto’s bamboo groves, and they favor itineraries that balance guided tours with solo sketching pauses.
  culinary: Cesar Tigera, a budding home chef who enjoys assisting with family‑style meals like spiced bean stew, homemade flatbread, and roasted vegetable medleys, has a moderate cooking skill level, loves
    chopping fresh cilantro and garlic, and they often experiment with colorful plating inspired by their artistic side.
  core: Cesar Tigera, a ten‑year‑old curiosity‑driven planner who balances a love for LEGO engineering, desert exploration, and emotional journaling with a tender heart that seeks harmony yet sometimes
    spirals into anxious bouts, and they continuously aim to restore calm through structured routines.
background:
  cultural: Cesar is a Mexican-American boy raised in Yuma, Arizona, near the U.S.-Mexico border. He grew up in a bilingual household where Spanish is spoken alongside English, and he participates in cultural
    traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings featuring Mexican cuisine. The desert landscape and cross‑border community shape his appreciation for nature and cultural
    exchange. He values family cohesion, respect for elders, and the blend of Mexican heritage with Southwestern American influences.
