  hobbies: '[''Team basketball league'', ''Intramural soccer'', ''Weekend hiking on the Appalachian Trail'', ''Fire-safety community workshops'', ''Restoring classic automobiles'', ''Grilling and cooking
    for friends'', ''Playing drums in the firehouse band'', ''Mindfulness meditation'', ''Peer-support stress resilience groups'']'
  career_goals: Jonathan is focused on a clear, step-by-step advancement within the fire service. In the next two to three years he plans to earn his Fire Officer I certification and be promoted to lieutenant,
    followed by Fire Officer II and a captaincy. He also intends to complete a bachelor's degree in fire science or public administration, and to become the department's fire-prevention and community-education
    coordinator. Long-term, he aspires to a chief or district-manager position where he can shape policies, improve responder wellness programs, and integrate mental-health support for his colleagues.
