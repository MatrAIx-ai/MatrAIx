    and parades'']'
  career_goals: Although retired from formal employment, Bianca aims to expand her community impact as a cultural ambassador and volunteer leader. She aspires to organize an annual Salvadoran heritage festival
    in Lake Worth, develop a community cookbook that documents family recipes, and formalize her role as a volunteer coordinator for the local senior center. She also plans to enroll in a digital‑literacy
    course to enhance her online outreach and eventually mentor younger Salvadoran women in the area, helping them navigate education and career pathways while preserving their cultural heritage.
