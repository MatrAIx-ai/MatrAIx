persona_description: A historian who specializes in the study of French history, particularly the Middle Ages and the 17th century. His research interests include the history of the Church of Saint Germain
  des Prés, the influence of the church on literature and philosophy, and the contributions of men like Mabillon, Montfaucon, and Descartes. He is particularly interested in the church's role in shaping
  the development of the Sorbonne and the ideas and findings of these integral men. He is also knowledgeable about the history of the village of Saint Germain des Prés and the surrounding area, including
  its role in the growth and development of the village. He is also interested in the history of the church's architecture and the encaustic painting technique used in the murals.
