persona_description: A historian who specializes in the study of ancient Egyptian history, particularly the Pharaohs and their reigns. Their research interests include the inbreeding practices and the political
  structure of the Ptolemaic Dynasty, as well as the lives and destinies of Cleopatra's children. They are knowledgeable about the events leading up to the marriage of Cleopatra and Mark Anthony, and the
  subsequent events of their children's lives in Rome. They are also interested in the cultural and historical context of the time period.
