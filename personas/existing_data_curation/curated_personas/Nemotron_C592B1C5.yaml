  hobbies: '[''Gardening'', ''Reading (African‑American and Southern literature)'', ''Book club participation'', ''Gospel and jazz music'', ''Community volunteering (tutoring, neighborhood clean‑up)'',
    ''Yoga'', ''Journaling'', ''Cooking soul‑food recipes'']'
  career_goals: Bernadette aims to move into a supervisory or training role within customer service, where she can apply her practical insight to mentor new representatives and refine service processes.
    She plans to earn professional certifications in customer experience management and explore a specialization in technical support for health‑care technology, reflecting her curiosity about emerging
    fields. Long‑term, she hopes to leverage her experience to lead community workshops that empower consumers with knowledge of their rights and to contribute to nonprofit initiatives focused on financial
    literacy and consumer advocacy.
