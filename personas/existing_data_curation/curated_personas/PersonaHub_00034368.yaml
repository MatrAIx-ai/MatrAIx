persona_description: A veterinarian who is interested in using thermal imaging as a diagnostic tool for equine and veterinary patients. They are looking for a reliable and non-invasive method to quickly
  identify potential injuries and inflammations, and to monitor the healing process. They are also interested in the practical applications of thermal imaging, such as early detection of problems weeks
  before clinical signs appear, and in the benefits it offers for animal welfare, such as its absence of pain reaction identification and the absence of fur clipping.
