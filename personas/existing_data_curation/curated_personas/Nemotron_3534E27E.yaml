personas:
  professional: Maria Joyce, a 25‑year‑old certified Journeyman Electrician, blends methodical wiring expertise with a flair for experimental lighting design, leading small crews while mentoring women in
    the trades and championing sustainable building practices; they plan every project down to the last conduit and love to incorporate solar PV retrofits into residential renovations.
  sports: Maria Joyce, an energetic participant in the local Saturday‑morning Softball League and a member of the Springfield Swing Dance Club, follows the Springfield Thunder football team and balances
    the physical toll of electrical work by attending a nearby yoga studio twice a month.
  arts: Maria Joyce, an avid community‑theater lighting designer, experiments with immersive light installations inspired by James Turrell, captures industrial architecture through photography reminiscent
    of Ansel Adams, revels in swing‑dance nights set to the sounds of The Jive Aces, and engages in a monthly book club dissecting the speculative worlds of N.K. Jemisin and Ted Chiang; they often merge
    technical rigging with artistic expression in their projects.
  travel: Maria Joyce, a curious traveler with a modest budget, prefers meticulously planned trips to eco‑creative hubs like Portland, Oregon and Berlin, Germany, where she explores sustainable design tours
    and street‑art districts, and dreams of attending the lantern festival in Chiang Mai, Thailand, though they frequently postpone longer journeys to prioritize mentorship duties and apprenticeship milestones.
  culinary: Maria Joyce, a sociable home chef, regularly cooks Thai green curry with fresh lemongrass, Ethiopian injera paired with spiced lentils, and Japanese okonomiyaki loaded with shredded cabbage,
    experiments with DIY kimchi fermentation, and occasionally burns the edges of a roast when juggling late‑night work calls.
  core: Maria Joyce is a methodical electrician who fuses sustainable tech with artistic lighting, mentors women in trades, and balances a buzzing social life with a habit of late‑night Arduino tinkering
    and occasional coffee‑driven overwork.
background:
  cultural: Maria grew up in a middle‑class, Midwestern family in central Illinois, where practical values, community involvement, and a strong work ethic were emphasized. Her family's cultural traditions
    include regular community gatherings, support for local charities, and a respect for modesty and reliability—traits that align with the broader Midwest ethos. While her ethnic background is white, she
    identifies with the inclusive spirit of Decatur's diverse labor community, especially through her involvement with the local IBEW union. Her upbringing combined a love of classic American folk music
    and visual arts, fostering an appreciation for both craftsmanship and creative expression. These cultural influences shape her collaborative approach, her commitment to mentorship, and her enthusiasm
    for blending technical expertise with artistic pursuits.
attributes:
  skills: '["Journeyman Electrician", "Residential & commercial wiring", "Blueprint & schematic reading", "National Electrical Code (NEC) compliance", "Electrical troubleshooting", "Solar PV installation",
    "Energy-efficiency retrofits", "Diagnostic equipment operation", "Project coordination", "Team leadership", "Mentoring apprentices", "Community electrical safety education"]'
  hobbies: '["Photography (industrial and architectural)", "Experimental lighting design", "Community theater stage lighting", "Swing dancing", "Softball league", "Habitat for Humanity volunteering", "DIY
    electronics (Arduino, smart home)", "Book club (contemporary fiction & sci-fi)", "Cooking international recipes", "Art workshops (painting, mixed media)"]'
  career_goals: Maria aims to become a Master Electrician within the next five years, expanding her certification to include advanced renewable-energy systems and low-voltage automation. She plans to complete
    her associate degree in Electrical Engineering Technology at Decatur Area Community College, which will enable her to transition into electrical design consulting. Ultimately, Maria envisions opening
    her own electrically-focused contracting firm that prioritizes sustainable building practices and actively recruits and supports underrepresented individuals in the trades. She also hopes to develop
    a regional mentorship program that pairs experienced electricians with young women interested in technical careers.
