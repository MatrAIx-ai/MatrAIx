personas:
  professional: Jacob Goolsby, a veteran casino floor manager in Miami, leverages three decades of cash‑handling precision, slot‑machine troubleshooting, and regulatory compliance while applying his methodical,
    organized nature and assertive yet compassionate conflict‑resolution style to streamline operations and mentor staff, eyeing a senior management role and a Gaming Management certification.
  sports: Jacob Goolsby, an enthusiastic supporter of the Miami Dolphins and a regular attendee of UCF Knights basketball games, spends Saturday mornings fishing or playing casual pickup basketball at the
    local community center, and maintains fitness by tending to their garden and walking the Atlantic shoreline, while cheering on the Miami Heat during the NBA season.
  arts: Jacob Goolsby finds solace in the church choir, singing gospel classics by Kirk Franklin and Aretha Franklin, enjoys the rhythmic beats of Latin jazz from Marc Anthony at neighborhood festivals,
    and reserves quiet evenings for listening to classic rock albums like Fleetwood Mac, often pairing the music with the gentle hum of their Impala’s engine.
  travel: Jacob Goolsby prefers well‑planned road trips that balance adventure and relaxation, having driven the scenic Overseas Highway to the Florida Keys, explored the historic streets of New Orleans
    during Mardi Gras, and saved for a future cruise to the Caribbean to practice Spanish with local guides, yet they keep travel budgets tight to preserve retirement savings.
  culinary: Jacob Goolsby, a competent home cook, frequently prepares fresh grilled snapper caught on early‑morning trips, seasoned with garden‑grown herbs like basil and cilantro, alongside soulful dishes
    such as shrimp and grits, a classic Cuban sandwich, and a penchant for sweet potato pie during holidays.
  core: Jacob Goolsby, a methodical casino floor veteran who balances disciplined finances, community‑focused spirituality, and a love for fishing, classic cars, and soulful music, navigates life with structured
    routines, occasional splurges, and a steadfast commitment to mentoring the next generation.
background:
  cultural: Jacob is an African‑American who grew up in the Southern United States before moving to Miami in his early thirties. His upbringing was shaped by Southern church traditions, family gatherings,
    and a strong sense of community. In Miami, he has embraced the city’s multicultural vibe, picking up conversational Spanish and celebrating local festivals while still honoring African‑American holidays
    such as Juneteenth and Black History Month. His faith and family remain central, and he often participates in church choirs and community events that blend his Southern roots with the vibrant Caribbean
    and Latino influences of his neighborhood.
attributes:
  skills: '[''Cash handling'', ''Casino floor management'', ''Slot‑machine maintenance'', ''Regulatory compliance'', ''Team leadership'', ''Scheduling and staff coordination'', ''Conflict resolution'',
