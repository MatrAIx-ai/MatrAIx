  hobbies: '[''Fishing'', ''Watching sports (Miami Dolphins, college basketball)'', ''Barbecuing with friends and family'', ''Gardening'', ''Church community service'', ''Mentoring youth in math'', ''Classic
    car restoration'']'
  career_goals: Jacob’s immediate goal is to secure a senior floor‑manager position at a larger resort casino, where he can apply his systematic approach to improve operational efficiency and reduce error
    rates. He plans to obtain a professional certification in Gaming Management to formalize his expertise and position himself for a future transition into a corporate compliance role. Long‑term, Jacob
    hopes to mentor younger staff, perhaps establishing a small consultancy that helps independent gaming venues implement best‑practice procedures. Throughout, he remains focused on building a stable financial
    foundation for his family and achieving a comfortable retirement.
