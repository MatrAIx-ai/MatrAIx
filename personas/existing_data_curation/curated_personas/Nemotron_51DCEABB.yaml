personas:
  professional: Jinwen Faulkner is an emerging business analyst who, with their fluency in Mandarin, advanced spreadsheet modeling, and agile project management skills, delivers data-driven recommendations
    while applying a calm, competitive edge and favoring structured, predictable processes in collaborative, fast-paced team settings.
  sports: Basking in the Midwest’s active scene, Jinwen Faulkner guards the paint for a local basketball league, follows the Cleveland Cavaliers with fervor, hits the trails of Hocking Hills State Park
    for weekend hikes, and incorporates disciplined strength-training sessions at the gym, all while treating each game and workout as a strategic contest akin to a board-game showdown.
  arts: Jinwen Faulkner immerses themselves in Asian cinema and K-dramas, revisiting classics like "Crouching Tiger, Hidden Dragon" and binge-watching series such as "Crash Landing on You," while also enjoying
    the indie rock vibes of Tame Impala and the piano works of Yiruma, letting these artistic blends shape their evenings after a day of analysis.
  travel: Jinwen Faulkner prefers meticulously planned trips that balance cultural immersion with cost-efficiency, having explored the culinary streets of Osaka, the tech hubs of Seoul, and the historic
    neighborhoods of Boston, while dreaming of a future backpacking adventure through the coastal towns of their ancestors’ homeland, all within a modest student-budget framework.
  culinary: Jinwen Faulkner masters the art of cooking traditional family recipes like xiao long bao and garlicky stir-fried bok choy, skillfully balancing soy-based sauces with the heat of Sichuan peppercorns
    while experimenting with sous-vide techniques for Western cuts, and they relish the satisfaction of sharing these fragrant plates at weekend potlucks with friends.
  core: Jinwen Faulkner blends a competitive, board-game-savvy mind with a calm, almost emotionless demeanor, obsessively tracking every financial metric while occasionally neglecting sleep for late-night
    gaming marathons, and they never miss a Lunar New Year family feast, even if it means skipping a basketball practice.
background:
  cultural: Jinwen is a second‑generation East Asian American whose parents emigrated from Taiwan (or mainland China) before he was born. Raised in the suburban community of Lewis Center, Ohio, he grew
    up navigating a blend of Chinese family traditions—such as celebrating Lunar New Year, valuing education, and practicing filial piety—and Midwestern values of practicality, community involvement, and
    openness. Fluent in both Mandarin and English, he regularly participates in local Asian cultural events while also engaging in broader American social circles. This bicultural upbringing informs his
    worldview, giving him a respect for collective heritage alongside a strong entrepreneurial spirit characteristic of the American context.
