  career_goals: In the short term, Jinwen aims to secure an entry‑level business analyst or financial analyst position at a mid‑size corporation where he can apply his quantitative skills and structured
    approach. He plans to earn a CFA Level I certification within his first two years of employment and to deepen his expertise in data‑driven decision making. Over the next three to five years, he aspires
    to advance to a senior analyst role, lead cross‑functional project teams, and eventually transition into a managerial or product‑management position. Long‑term, he envisions launching his own venture
    that leverages his bilingual background to bridge U.S. and East Asian markets, combining his competitive drive with a pragmatic, organized business model.
