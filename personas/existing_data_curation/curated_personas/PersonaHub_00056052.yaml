persona_description: A development economist who specializes in the implementation and management of foreign assistance programs aimed at mitigating the effects of food crises. This individual is highly
  knowledgeable about the issues surrounding the implementation of aid projects, including the potential conflicts between humanitarian goals and longer-term agricultural development objectives. The individual
  is also aware of the importance of ensuring that agricultural research and institutional development are a priority in aid projects, and the need to take into account the effect climate change will have
  on agricultural production. The individual is also aware of the importance of ensuring that aid projects are aligned with the goals of recipient national governments, and the need for donors to take into
  consideration the effect their projects have on private sector investment.
