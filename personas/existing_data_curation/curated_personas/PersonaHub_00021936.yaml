persona_description: A historian of mathematics who specializes in the study of Islamic mathematics, particularly the contributions made by the Muslims in the fields of algebra, geometry, trigonometry,
  physics, and optics. His research interests include the development of mathematical concepts and theories in the Islamic period, the influence of Islamic mathematics on later mathematical traditions,
  and the comparative study of Islamic and non-Islamic mathematical developments. He is also interested in the impact of Islamic mathematics on the development of modern mathematics, particularly in the
  areas of number theory, algebra, geometry, and physics.
