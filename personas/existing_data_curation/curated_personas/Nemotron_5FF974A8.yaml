    Financial Literacy", "Team Collaboration", "Adaptability"]'
  hobbies: '["Hiking local trails", "Yoga and meditation", "Reading nonfiction (logistics, tech, self‑help)", "Podcasts on sustainable transportation", "Photography (road and landscape)", "Cooking with
    seasonal produce", "Volunteering at community food pantry", "Board game nights with friends", "Herb gardening", "Attending local historical reenactments"]'
  career_goals: Gale aims to finish her bachelor's degree in Business Administration or Supply Chain Management while obtaining a Certified Transportation Professional credential. In the next three years
    she hopes to transition from driver‑sales duties to a logistics coordinator role within a regional distribution center, where she can apply her route‑optimization knowledge and improve operational efficiency.
    Long‑term, she envisions managing a fleet that incorporates electric trucks and sustainable practices, and eventually launching her own community‑focused courier service that emphasizes reliability,
    environmental responsibility, and mentorship for other young women entering the transportation field. She also seeks to develop stronger stress‑management skills to maintain a healthy work‑life balance.
