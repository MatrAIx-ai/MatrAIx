persona_description: A person who is interested in the history, culture, and social dynamics of African Americans in the United States, particularly in the context of race, identity, and representation.
  They are likely to be knowledgeable about the contributions and experiences of African Americans in American society, and are interested in exploring the ways in which race and ethnicity intersect and
  shape individual and collective experiences. They may also be interested in the intersection of race and gender, and the ways in which race and ethnicity intersect with other identities, such as class,
  sexuality, and ability. They may have a particular interest in the history and legacy of slavery, and the ways in which it continues to shape American society.
