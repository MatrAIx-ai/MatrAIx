persona_description: A curriculum developer for social and interpersonal skills for young African-American males. This person is interested in designing and implementing educational programs that focus
  on developing the social and interpersonal skills of young African-American males, particularly those who may have been impacted by systemic barriers and discrimination. They are likely to have a background
  in education, psychology, or sociology, and have experience in curriculum development and instructional design. This person is passionate about promoting social and emotional learning, responsible citizenship,
  and positive relationships, and is committed to creating inclusive and equitable educational opportunities for young African-American males.
