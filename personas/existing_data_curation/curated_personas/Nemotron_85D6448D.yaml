personas:
  professional: Johanna Sanchez is a budding Python developer who automates her personal budgeting and homework tracking, applying her meticulous organization and competitive mindset to create tidy, efficient
    code projects while volunteering as a systematic tutor at the local cultural center.
  sports: Johanna Sanchez is a dedicated high school track runner who trains with the Milwaukee Track Club, follows the Milwaukee Bucks for basketball and the Milwaukee Brewers for baseball, logs meticulous
    workout data, and approaches each practice with a strategic, competitive mindset that mirrors her love of chess.
  arts: Johanna Sanchez immerses herself in contemporary Latin music, streaming artists like Bad Bunny, J Balvin, and Rosalía while studying, appreciates sci‑fi novels from authors such as N.K. Jemisin,
    and occasionally volunteers at the local cultural center’s art showcase featuring salsa dance performances by groups she admires.
  travel: Johanna Sanchez prefers well‑planned, budget‑conscious trips that combine cultural immersion and adventure, having visited New York City’s Queens neighborhood to explore its vibrant street festivals,
    and dreaming of a future family vacation to San Juan’s historic Old Town to taste its famous arroz con gandules and tembleque.
  culinary: Johanna Sanchez enjoys cooking arroz con gandules and tembleque for family gatherings, prides herself on mastering the perfect sofrito base with garlic, adobo, and aromatic herbs, experiments
    with coconut milk desserts, and balances this with a growing skill for making quick pasta dishes and sushi rolls when time is limited.
  core: Johanna Sanchez is a disciplined, strategy‑driven teen who blends a love for puzzles, code, and cultural traditions into a highly organized, competitive lifestyle, though they occasionally procrastinate
    on paperwork and indulge in late‑night graphic novel marathons.
background:
  cultural: Emerged from a Puerto Rican family that moved to Milwaukee, Johanna was raised bilingual, speaking Spanish at home and English at school. Family gatherings feature traditional foods like arroz
    con gandules and tembleque, and cultural celebrations such as Noche Buena and the Puerto Rican Day Parade in Milwaukee reinforce her heritage. The close‑knit family environment emphasizes respect for
    education and community responsibility, shaping her disciplined work ethic. She often incorporates her cultural identity into school projects, exploring topics related to Puerto Rican history or contemporary
    issues. Though she navigates a predominantly Midwestern environment, she maintains strong ties to her community through a local cultural center where she occasionally volunteers in tutoring programs.
