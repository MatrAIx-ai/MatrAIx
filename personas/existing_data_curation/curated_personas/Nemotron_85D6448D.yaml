  hobbies: '[''Reading mystery and sci‑fi novels'', ''Solving puzzles and crosswords'', ''Playing chess'', ''Coding Python projects'', ''Journaling'', ''Running track training'', ''Listening to contemporary
    Latin music'', ''Tutoring younger relatives'']'
  career_goals: Johanna's immediate goal is to graduate high school with honors, secure a STEM scholarship, and gain admission to a top university where she can major in computer science or engineering.
    She aspires to become a software engineer or data scientist who designs technology solutions that address challenges faced by the Puerto Rican community, such as educational access or disaster preparedness.
    She also intends to lead a robotics team, compete in coding contests, and later mentor younger students from underrepresented backgrounds, fostering a culture of excellence and structured achievement.
