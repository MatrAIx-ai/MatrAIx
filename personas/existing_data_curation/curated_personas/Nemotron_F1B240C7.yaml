personas:
  professional: Wendy Sawyer, a retired data scientist turned community STEM mentor, blends her analytical expertise with her love for public speaking, leading local middle‑school coding clubs, coordinating
    environmental‑education projects, and never missing a chance to take center stage in community theater productions.
  sports: Wendy Sawyer, an active member of the Golden Trails senior walking club and a regular participant in yoga classes at Riverside Community Center, follows the hometown Riverside Raptors baseball
    team every spring, plays weekly pickleball matches at the senior center, and channels her competitive streak into bridge tournaments, all while using these activities to stay socially engaged and physically
    fit.
  arts: Wendy Sawyer, a leading actress and set designer for the Willow Creek Community Theater, routinely stages productions of Arthur Miller’s The Crucible and Shakespeare’s Twelfth Night, chairs a book
    club that debates classics from Jane Austen to modern works by Yuval Noah Harari, and fills her evenings with Ella Fitzgerald recordings and occasional performances by the Riverside Symphony Orchestra.
  travel: Wendy Sawyer, a history enthusiast, has toured Gettysburg, Colonial Williamsburg, and the Smithsonian museums, and dreams of trekking the ancient ruins of Machu Picchu and strolling Kyoto’s tea
    gardens, preferring meticulously planned itineraries that balance guided tours with ample time for photography and reflective journaling.
  culinary: Wendy Sawyer, a confident home cook, loves preparing vegetable ratatouille with fresh basil from her garden, perfecting a signature quinoa‑seed salad with roasted beets and feta, treats herself
    to a weekly Sunday pot roast seasoned with rosemary and carrots, and never misses the chance to sample locally sourced salmon sashimi at the waterfront bistro.
  core: Wendy Sawyer, a sociable yet slightly skeptical 68‑year‑old, channels her curiosity and competitive spirit into theater, STEM mentoring, and meticulous budgeting, while her worry‑prone nature drives
    daily health checks and a habit of rehearsing speeches in front of her garden gnome.
background:
  cultural: Wendy identifies as a white American whose upbringing reflects a mid‑20th‑century middle‑class family in the Inland Empire region of Southern California. Her parents emphasized education, self‑reliance,
    and community service, values that continue to shape her worldview. While she maintains ties to her Anglo‑American heritage, she has embraced the cultural diversity of Riverside County, participating
    in multicultural events and fostering inclusive relationships within her community.
