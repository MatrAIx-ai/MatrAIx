  career_goals: Although retired from full‑time employment, Wendy aims to remain intellectually active and socially prominent. She plans to volunteer as a STEM mentor for local middle‑school students, leveraging
    her technical expertise to inspire the next generation. She hopes to secure a part‑time advisory role with a nonprofit focused on environmental education, where she can contribute her project‑coordination
    skills. Additionally, Wendy aspires to become a regular speaker at Riverside community events, sharing insights on aging, technology adoption, and civic engagement. A personal ambition includes completing
    a memoir that combines her professional experiences with reflections on her community‑centered life, seeking both personal fulfillment and public recognition.
