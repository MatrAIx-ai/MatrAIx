  career_goals: He aspires to blend his love for art and technology by becoming a video game designer or interactive media artist who creates immersive worlds that encourage cooperation and empathy. He
    also dreams of one day using his artistic talents to teach art workshops for younger kids in his community, especially those from underrepresented backgrounds. In the longer term, he imagines working
    for a cultural institution—such as a museum or community center—where he can develop educational programs that celebrate Mexican heritage and foster cross‑cultural understanding.
