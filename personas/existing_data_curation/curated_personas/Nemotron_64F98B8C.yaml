personas:
  professional: Sergio Gonzalez is a budding multimedia storyteller who blends mythic drawing, watercolor, and digital painting to craft immersive worlds, channeling their imaginative curiosity and disciplined
    organization into a nascent portfolio that already attracts attention on platforms like ArtStation, while their compassionate nature drives them to mentor younger peers in the school’s peer‑support
    program.
  sports: Sergio Gonzalez loves the outdoors, joining a community soccer league that supports the local Stars club, hiking the Trinity River trails every Saturday, and balancing active days with occasional
    video‑game marathons, all while cheering for the Dallas Cowboys as their favorite pro football team.
  arts: Sergio Gonzalez draws inspiration from mythic epics and contemporary creators like Brian Froud and Studio Ghibli, spending afternoons perfecting watercolor gradients, crafting digital concept art
    on a tablet, and curating a personal gallery on DeviantArt that showcases their evolving style.
  travel: Sergio Gonzalez prefers short, family‑oriented road trips that blend cultural immersion and adventure, having explored the historic missions of San Antonio, hiked the Guadalupe Mountains, and
    dreaming of a future trek along the Inca Trail to Machu Picchu, all while budgeting allowance savings for travel gear.
  culinary: Sergio Gonzalez enjoys assisting with homemade enchiladas, tamales, and salsas that feature corn masa, roasted chilies, and fresh cilantro, experimenting with flavors in the kitchen as a creative
    extension of their art, and occasionally swaps recipes with friends for sushi rolls and cheesy nachos.
  core: Sergio Gonzalez navigates teenage life with a sketchbook in hand, a LEGO masterpiece under construction, and a heart set on merging mythic imagination with real‑world kindness, all while occasionally
    forgetting to turn off the game console before bedtime.
background:
  cultural: Sergio is a first‑generation Mexican‑American raised in a close‑knit family that values both Mexican traditions and Texan community life. He grew up speaking Spanish at home while attending
    an English‑language middle school, giving him fluency in both languages. Family gatherings center around celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas posadas, where he helps
    create altars and prepare tamales. The vibrant murals and Mexican art in Fort Worth’s cultural districts have inspired his own artistic style. He feels a strong sense of responsibility to honor his
    heritage by sharing its stories through his art and by supporting peers from diverse backgrounds.
