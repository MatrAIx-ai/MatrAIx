personas:
  professional: A future aspiring builder, Devin Thurman loves stacking blocks with methodical precision while occasionally experimenting with new shapes, reflecting a blend of curiosity and practicality
    that hints at a budding engineering mindset, and they often ask, “What if we build a bridge?”
  sports: A preschool soccer dynamo, Devin Thurman dribbles a mini soccer ball at the Little Lions Club while cheering for the local MLB team, the Los Angeles Dodgers, and competes fiercely in weekend tumble
    time races, preferring competition over cooperation, and they celebrate each goal with an exuberant fist pump.
  arts: A budding performer, Devin Thurman loves singing the “Let It Go” anthem from Frozen, mimics the dance moves of Josh Groban's child‑friendly rendition, and spends afternoons drawing brave dinosaurs
    inspired by Dr. Seuss, integrating artistic play into daily routine, and they often request an encore after each performance.
  travel: An adventurous explorer, Devin Thurman recently visited the Grand Canyon on a family road trip, collected pebble souvenirs, and dreams of traveling to Disney World to ride the “It’s a Small World”
    attraction, preferring well‑planned itineraries over spontaneous wanderings, and they proudly point out the canyon’s layers to anyone who will listen.
  culinary: A picky gourmet, Devin Thurman adores cheesy macaroni, chicken nuggets seasoned with a dash of ketchup, and enjoys scooping banana slices into a bowl of vanilla yogurt, yet often spills the
    spoon and demands a second bite of the same dish, and they giggle whenever the food lands on the floor.
  core: Devin Thurman blends a curious, practical mindset with a competitive streak, thriving on structured play while occasionally questioning adult intentions, all while staying emotionally resilient,
    and they never hesitate to ask “why”.
background:
  cultural: Devin is raised in Sidney, a small town in Shelby County, Ohio, within a predominantly white, Midwestern community. His family observes traditional American holidays such as Thanksgiving and
    Independence Day, often with community potlucks and church gatherings. Local values emphasize friendliness, modesty, and a strong sense of neighborhood, which shape Devin’s balanced social‑alone preferences
    and his respectful, yet moderately competitive, outlook.
