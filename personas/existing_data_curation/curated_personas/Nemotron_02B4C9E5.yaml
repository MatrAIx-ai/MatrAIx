  career_goals: Even at his young age, Devin loves to imagine future jobs. He often says he wants to become a builder who makes huge towers out of blocks, a firefighter who helps people, or a race‑car driver
    who can win every race. His curiosity drives him to explore how things work, while his practical side enjoys the idea of constructing and fixing objects. These ambitions reflect his competitive streak
    and his comfort with challenges.
