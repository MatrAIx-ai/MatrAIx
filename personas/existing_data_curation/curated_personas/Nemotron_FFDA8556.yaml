  hobbies: '[''Abstract painting'', ''Sketching'', ''Photography'', ''Community theater'', ''Recreational basketball'', ''Hiking'', ''DIY furniture building'', ''Visiting art galleries'', ''Volunteering
    with Habitat for Humanity'', ''Exploring construction‑management software as a hobby'']'
  career_goals: Angelica aims to advance from laborer to foreman and eventually to a construction project manager, earning certifications such as OSHA 30‑hour and the Certified Construction Manager (CCM).
    She envisions starting her own boutique construction firm that blends functional building with artistic design, leveraging her creative instincts to offer custom‑home projects that feature unique visual
    elements. She also wants to mentor and recruit more women into the trades, becoming a respected leader in her local construction community.
