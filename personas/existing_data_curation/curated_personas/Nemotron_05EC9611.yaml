  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Running'', ''Reading Science & Technology Non-fiction'', ''Chess'', ''Mentoring Youth in STEM'', ''Cooking International Cuisine'', ''Podcast
    Listening on Innovation'', ''Attending Live Jazz Performances'']'
  career_goals: Pinky aims to transition from first‑line supervision to a regional sales director role within the next three years, overseeing multiple markets and larger cross‑functional teams. She aspires
    to embed data science into sales operations, champion diversity and inclusion initiatives, and mentor the next generation of Black women in STEM and sales. Long‑term, she envisions launching her own
    consulting firm that helps mid‑size companies adopt tech‑enabled sales strategies while advocating for equitable workplace practices. To support these ambitions, she plans to pursue an executive MBA
    focused on analytics and leadership.
