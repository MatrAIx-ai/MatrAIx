personas:
  professional: A seasoned sales leader, Pinky Howze leverages data‑driven pipeline forecasting, Salesforce optimization, and Python‑SQL modeling to drive regional revenue growth, applying their methodical
    organization, skeptical market analysis, and creative problem‑solving inspired by a love of art to mentor diverse teams and push for inclusive strategies.
  sports: Pinky Howze, a dedicated early‑morning runner along the Mississippi River and member of the Alton River Runners club, roots for the St Louis Cardinals in baseball and the St Louis Blues in hockey,
    combining competitive sprint intervals with a disciplined weekly strength‑training routine to maintain stamina for demanding sales leadership.
  arts: Pinky Howze channels their curiosity and appreciation for art through watercolor experiments inspired by the bold palettes of Kehinde Wiley, regular visits to the Contemporary Art Center in St Louis,
    and evenings at live jazz venues featuring legends like Herbie Hancock, allowing creative bursts to inform unconventional sales campaigns.
  travel: Pinky Howze prefers meticulously planned short‑haul getaways that blend cultural immersion—such as a weekend jazz festival in New Orleans and a culinary tour of Oaxaca—with occasional adventurous
    long‑distance trips to Kyoto, leveraging their executive MBA schedule to align travel with professional networking opportunities.
  culinary: Pinky Howze, an avid home chef with intermediate skill, delights in crafting spice‑rich dishes like Moroccan tagine with preserved lemons, Thai green curry infused with lemongrass, and mastering
    the perfect poached salmon, while also savoring upscale dining experiences featuring small‑plate tasting menus at St Louis’s acclaimed restaurants such as Sidney Street.
  core: Pinky Howze, a data‑driven sales strategist with a relentless curiosity for art and technology, balances a disciplined, sprint‑like work ethic with a habit of binge‑listening to podcasts late into
    the night, often neglecting sleep to chase the next innovative idea.
background:
  cultural: Pinky identifies as a Black woman whose family roots trace back to the Great Migration from the American South to the Midwest. Growing up in Alton, Illinois, she has been shaped by a close‑knit
    African‑American community that values resilience, education, and collective support. She regularly participates in local Juneteenth celebrations, Black History Month events, and church‑based service
    projects, which reinforce a sense of cultural pride and responsibility. Her experiences navigating predominantly white STEM and corporate environments have heightened her awareness of systemic barriers,
    fueling her commitment to representation and mentorship within both her professional sphere and her hometown.
attributes:
