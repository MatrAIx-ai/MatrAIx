personas:
  professional: Jonathan Gibson is a retired farmer‑builder who leverages their carpentry, small‑engine know‑how and community‑organizing skills to mentor 4‑H youth, design a custom wooden gazebo for their
    wife’s birthday, and share local history at workshops, while they balance practical curiosity with a competitive streak.
  sports: Jonathan Gibson is an avid fan of the Clemson Tigers football team, routinely tunes in to their Saturday games, cheers for the Anderson County High School Wildcats during the fall season, and
    participates in the local seniors’ tailgate club that meets at the community center after high‑school basketball matches, where they share spirited debates about game tactics.
  arts: Jonathan Gibson enjoys classic country legends like Johnny Cash and gospel greats such as Mahalia Jackson, spends Sunday afternoons listening to their vinyl records, and dives into historical novels
    by Ken Follett and Bernard Cornwell, letting the stories of battles and bygone eras shape their storytelling at the historical society.
  travel: Jonathan Gibson dreams of traveling with their wife to civil‑war landmarks like Fort Sumter, Gettysburg, and the Vicksburg National Military Park, while also reminiscing about past trips to Savannah’s
    squares and Charleston’s historic district, preferring guided tours that balance comfort with educational depth, and they meticulously plan each itinerary to accommodate their mobility needs.
  culinary: Jonathan Gibson favors farm‑to‑table meals featuring home‑grown tomatoes, sweet corn, and collard greens, whips up a classic Southern cornbread with buttermilk and honey, and enjoys a hearty
    bowl of shrimp and grits seasoned with smoked paprika and garlic, though they tend to over‑season their soups in pursuit of flavor.
  core: Jonathan Gibson is a spirited 89‑year‑old who blends hands‑on craftsmanship, competitive zeal, and community devotion while occasionally over‑committing to projects and indulging in extra‑spicy
    soups, and they never miss a Sunday potluck.
background:
  cultural: Jonathan’s roots lie deep in the rural Upstate South Carolina tradition. Raised in a white, Scots‑Irish family, he grew up with Southern Baptist values, strong emphasis on community hospitality,
    and a respect for self‑reliance. His life reflects the modest, work‑oriented culture of Anderson County, where church, family gatherings, and local fairs shape daily life. He carries forward the region’s
    love of storytelling, genealogy, and a competitive yet friendly spirit in community events.
