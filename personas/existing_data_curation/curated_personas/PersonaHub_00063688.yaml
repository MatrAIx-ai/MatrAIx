persona_description: A geologist who specializes in the study of meteorites, particularly the characteristics and origins of angrites. He is an expert in the field of meteorite classification, petrology,
  and the identification of unusual mineralogy. He has extensive knowledge of the oxygen-isotopic compositions, unusual mineralogy, and distinctive geochemical characteristics of angrites. He has studied
  the angrites in detail and is familiar with their petrological and chemical properties. He has published extensively on the subject and is a recognized authority in the field.
