  career_goals: Maurice plans to secure an apprenticeship as an automotive technician while expanding his programming abilities, with the long-term ambition of integrating software solutions into vehicle
    maintenance or launching his own tech-repair and customization shop. He intends to attend a community college for mechanical engineering or computer science, aim for industry certifications, and leverage
    his competitive drive to excel in both technical fields and eSports tournaments, ultimately establishing himself as a reliable, innovative problem-solver.
