personas:
  professional: Maurice Korf is a 16‑year‑old aspiring automotive technician who spends afternoons in his garage disassembling engines, writing Python scripts to record diagnostic data, and leading DIY
    projects at his youth maker club, applying his organized, methodical nature and competitive drive to master both mechanical repairs and strategic eSports play.
  sports: Maurice Korf is a 16‑year‑old who hikes the rolling trails of Walworth County’s Kettle Moraine State Forest on weekends, follows the Wisconsin Badgers football team and the Green Bay Packers with
    fervor, and plays on a community soccer league team called the Walworth Wolves, balancing a love of outdoor endurance with a competitive spirit honed in eSports.
  arts: Maurice Korf is a 16‑year‑old who channels creativity into woodworking small furniture pieces while listening to the synth‑wave tracks of Kavinsky and the electronic beats of Daft Punk, watches
    tutorial channels like Linus Tech Tips and Evie’s Workshop for inspiration, and occasionally attends local community‑theatre productions of classic plays such as ‘Our Town,’ allowing music and hands‑on
    craft to shape his identity.
  travel: Maurice Korf is a 16‑year‑old who prefers budget‑friendly road trips, having explored the Henry Ford Museum in Detroit and the Museum of Science and Industry in Chicago, while dreaming of a future
    visit to Stuttgart’s Mercedes‑Benz Museum and a summer camping adventure in Yellowstone, balancing a love of automotive history with a desire for rugged outdoor experiences.
  culinary: Maurice Korf is a 16‑year‑old who favors hearty meals like cheeseburger sliders, pepperoni pizza, and spicy chicken wings, enjoys cooking simple ramen with soy sauce, sesame oil, and a soft‑boiled
    egg, and often experiments with grill‑seasoned pork ribs using rubs of smoked paprika and brown sugar, all while snacking on energy drinks during late‑night gaming.
  core: Maurice Korf blends teenage curiosity for engines, code, and competitive gaming into a relentless pursuit of efficiency, even if it means sacrificing sleep, tolerating occasional back pain, and
    occasionally ignoring social niceties in favor of perfecting a project.
background:
  cultural: Maurice grew up in Burlington, Wisconsin, a small Midwestern town with a community rooted in German-Scandinavian heritage and strong values of self-reliance, practicality, and a solid work ethic.
    Local traditions such as 4-H club participation, church gatherings, and farm-related activities have fostered his appreciation for hands-on craftsmanship and independent problem solving. While identifying
    with mainstream American culture, he retains respect for the pragmatic, community-oriented values common to his hometown.
attributes:
