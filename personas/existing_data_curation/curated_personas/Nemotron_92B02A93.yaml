  hobbies: '[''Sketching and digital illustration'', ''Virtual museum tours'', ''Reading science‑fiction & philosophy'', ''Strategy video games'', ''Coding Python scripts'', ''Meditation'', ''Journaling'',
    ''Listening to jazz, hip‑hop, and R&B'', ''Mindful walking in parks'']'
  career_goals: Steve aims to advance from a frontline representative to a supervisory role within the next three years, targeting a Team Lead or Customer Experience Manager position where he can shape
    service strategies. He plans to complete a bachelor's degree in Business Management while acquiring certifications in customer experience design and UX research, positioning himself for a future role
    that blends service operations with product development. In the long term, he envisions launching a freelance digital illustration business that allows him to work independently and integrate his artistic
    passion with his professional expertise.
