persona_description: A veterinarian with a specialization in the study of parasitic infections in livestock, particularly those of the digestive system. They are interested in the life cycle, distribution,
  and clinical signs of the Eurytrema pancreaticum and Fasciolopsis buski parasites. They are also interested in the diagnostic methods, treatment options, and control measures for these parasites. They
  may have experience in the diagnosis and treatment of gastrointestinal diseases in pigs, cattle, and other livestock, and may have knowledge of the importance of animal health in the context of global
  health.
