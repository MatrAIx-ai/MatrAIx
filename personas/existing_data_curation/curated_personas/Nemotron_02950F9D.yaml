  hobbies: '[''Fishing in the Río Grande de Loíza'', ''Gardening (vegetable patch)'', ''Cooking traditional Puerto Rican cuisine'', ''Listening to plena and salsa music'', ''Playing dominoes with friends'',
    ''DIY home repair projects'', ''Volunteering for community maintenance'']'
  career_goals: Luis aims to solidify his legacy in the manufacturing sector by obtaining a certified pipe-welding credential, which would enable him to take on a senior technician or shift-lead role at
    his current plant. He also wishes to mentor the next generation of assemblers, sharing his practical knowledge in a structured training program. As retirement approaches, he plans to reduce his hours
    gradually and eventually launch a modest home-based repair and fabrication service for neighbors in Caguas, offering custom metalwork, furniture repair, and small-scale carpentry. His overarching ambition
    is to combine financial stability with the flexibility to spend more time with his family and personal pursuits.
