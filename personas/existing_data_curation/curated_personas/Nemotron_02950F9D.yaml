personas:
  professional: Luis Benitez brings three decades of hands‑on assembly and fabrication expertise to his current manufacturing plant, where they excel at interpreting technical drawings, precision welding,
    and on‑the‑fly troubleshooting, positioning them as a natural candidate for the forthcoming certified pipe‑welding credential and a future shift‑lead role.
  sports: Luis Benitez is a loyal fan of the Criollos de Caguas baseball team, enjoys early‑morning fishing on the Río Grande de Loíza as a sport, and participates in weekly community‑center dominoes tournaments
    that double as light mental exercise, reflecting their preference for small‑group activities.
  arts: Luis Benitez immerses themselves in the vibrant sounds of plena and salsa on their vintage record player, favoring classic performers such as Willie Colón, Héctor Lavoe, and Rubén Blades, while
    also taking pleasure in the rhythmic clatter of dominoes that echo the communal spirit of their neighborhood.
  travel: Luis Benitez prefers low‑key, family‑oriented trips, having explored historic Old San Juan and taken short road journeys to the coffee‑rich mountains of Jayuya, while dreaming of a relaxing fishing
    retreat in the Dominican Republic’s Samaná Peninsula that fits their modest budget.
  culinary: Luis Benitez masters the preparation of traditional mofongo, expertly mashing fried plantains with pork cracklings, garlic, and broth, and pairs it with their home‑grown tomatoes, cilantro,
    and sweet plantain side dishes that showcase their modest vegetable patch.
  core: Luis Benitez is a pragmatic, hands‑on veteran fabricator who balances a structured work ethic with a relaxed, community‑focused lifestyle that includes fishing, gardening, vintage salsa records,
    and a modest plan for a retirement‑stage home repair shop.
background:
  cultural: Luis grew up in Caguas, a city known for its blend of urban life and proximity to the central mountain range. Raised in a working-class Catholic family, he was immersed in Puerto Rican traditions—the
    music of bomba and plena, communal meals centered on arroz con gandules, and a strong sense of neighborly solidarity. His parents emphasized hard work and respect for elders, shaping his practical,
    cooperative nature. He speaks Spanish as his first language and learned English through school and work. Experiencing the 2017 Hurricane Maria and the subsequent community recovery reinforced his resilience
    and deepened his commitment to helping neighbors. The cultural mix of modern industry and rich folklore in Caguas continues to influence his daily life, from his love of local festivals to his participation
    in neighborhood mutual-aid groups.
attributes:
  skills: '[''Metal welding'', ''Machine assembly'', ''Technical drawing interpretation'', ''Equipment maintenance'', ''Basic electrical troubleshooting'', ''Quality inspection'', ''Bilingual communication
