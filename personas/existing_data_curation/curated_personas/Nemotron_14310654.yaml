personas:
  professional: Marta Navarrete, a five‑year‑old aspiring veterinarian who channels their boundless curiosity and deep compassion into pretend‑play clinics, sorting stuffed animals into recovery groups
    and improvising diagnoses with toy stethoscopes, even though they occasionally forget the steps they set out.
  sports: Marta Navarrete enjoys the kindergarten soccer club that meets on Tuesdays, cheers loudly for FC Barcelona during match viewings, loves splashing in the community pool’s beginner swim class, and
    prefers inclusive games where everyone can participate, though they occasionally forget their water bottle.
  arts: Marta Navarrete spends afternoons drawing vivid watercolors of sunflowers after viewing Van Gogh reproductions at the local children’s museum, sings Let It Go from Frozen while coloring, and eagerly
    attends weekend puppet shows featuring classic fairy‑tale characters, letting art shape their playful worldview.
  travel: Marta Navarrete loves weekend car trips to the nearby beach and visits to Grandma’s countryside cottage, dreams of exploring Disney World in Florida and seeing the Eiffel Tower in Paris, but prefers
    short, family‑centered journeys with familiar faces and a flexible schedule.
  culinary: Marta Navarrete delights in cheesy pizza with extra mozzarella, creamy macaroni and cheese, and banana slices drizzled with honey, helps whisk cookie dough with flour and chocolate chips in
    the kitchen, yet remains hesitant to try broccoli or other green veggies.
  core: Marta Navarrete is a curious five‑year‑old whose boundless imagination, compassion for others, and love of messy creative play are tempered by frequent worries, a tendency to misplace things, and
    an irresistible habit of swapping coins for shiny stickers.
background:
  cultural: Marta belongs to a Mexican‑American family that lives in Milwaukee’s Riverwest neighborhood. At home, Spanish is spoken alongside English, and she participates in cultural traditions such as
    celebrating Día de los Muertos with homemade altars, cooking pozole during holidays, and dancing to cumbia and mariachi music. Her parents maintain connections with the local Mexican community center,
    where she attends bilingual storytime and children’s art workshops. These experiences blend Mexican heritage with the multicultural atmosphere of the Midwestern city, shaping her worldview and daily
    life.
