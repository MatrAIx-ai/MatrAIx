  career_goals: Marta imagines a future where she can blend her love for art and caring nature. She often says she wants to become a teacher who creates fun art projects for children, or an artist who paints
    bright pictures that make people smile. Occasionally she mentions being a veterinarian to help animals, reflecting her compassionate side. Though still young, these aspirations guide her play and the
    stories she creates.
