personas:
  professional: Stanley is an emerging maker‑enthusiast who follows detailed woodworking, electronics, and model‑building guides, turning solitary afternoons into finished wooden toys, circuit projects,
    and LEGO creations; they thrive on routine and tangible outcomes while occasionally sharing their work at Boy Scout meetings.
  sports: Stanley enjoys weekend fishing at the nearby creek and participates in the local Creekside Anglers club, follows the Portland Timbers (MLS) and Portland Trail Blazers (NBA) on TV, joins a middle‑school
    after‑school intramural basketball league during winter, and prefers low‑impact, routine‑based fitness like walking his family dog rather than high‑intensity team sports.
  arts: Stanley is a quiet acoustic‑guitar student who practices his fingerpicking to the tunes of Bob Dylan and Mumford & Sons, spends evenings listening to Ed Sheeran, and expresses his creativity through
    meticulous LEGO builds and model‑airplane assemblies, finding artistic fulfillment in the blend of music and hands‑on construction.
  travel: Stanley prefers carefully planned family trips that balance outdoor adventure with a schedule of scheduled breaks, having explored Yosemite National Park’s granite cliffs and Skagit Valley’s salmon
    runs, while dreaming of a future visit to the historic shipyards of Portsmouth, England, to see traditional boat‑building techniques.
  culinary: Stanley enjoys simple, hands‑on cooking like pan‑frying the trout he catches into a lemon‑butter glaze, assembling classic peanut‑butter‑jelly sandwiches, and occasionally attempting homemade
    spaghetti with meatballs, showing a developing skill set that favors familiar, step‑by‑step recipes.
  core: Stanley is a methodical thirteen‑year‑old who channels a love for routine into woodworking, electronics, and acoustic guitar, balances careful budgeting with a modest saving habit, actively manages
    mild anxiety through journaling, and finds calm in solitary hobbies while occasionally indulging in low‑key social activities.
background:
  cultural: Stanley was raised in Powhatan Point, a small town in Belmont County, Ohio, within the Appalachian foothills of the Midwest. His family reflects the region's blend of German, Irish, and Anglo‑American
    ancestry, and they maintain traditional values such as self‑reliance, close family ties, and community involvement. Church services and local high‑school sports events are regular fixtures in his life,
    reinforcing a sense of belonging and routine. Seasonal county fairs, home‑cooked meals featuring regional dishes like pork tenderloin and homemade pies, and storytelling about local history are part
    of his cultural experience. This background nurtures Stanley's appreciation for practical skills, steady work, and the comfort of familiar, community‑based activities.
attributes:
  skills: '["Time management and planner use", "Step‑by‑step instruction following", "Basic bike maintenance", "Basic woodworking (saw, hammer, measuring)", "Computer literacy (typing, word processing,
    internet research)", "Reading comprehension of practical non‑fiction"]'
  hobbies: '["Reading practical non‑fiction (how‑to, hobby guides)", "Model building (airplanes, LEGO)", "Woodworking projects with dad", "Fishing at local creek", "Acoustic guitar practice", "Journaling
    for stress management", "Boy Scouts meetings and community service"]'
  career_goals: Stanley aspires to a stable, hands‑on career that rewards consistent effort and tangible results. He envisions completing high school with solid grades and then attending a trade school
    to become an electrician or automotive mechanic—professions that align with his love of routine, practical problem‑solving, and reliable work. He also hopes to support his family by eventually running
    a small home‑repair side business, where his organizational skills and attention to detail will be assets. In the longer term, Stanley wants to be known as a dependable member of his community, possibly
    taking on a mentorship role for younger teens in local clubs or scouting groups.
