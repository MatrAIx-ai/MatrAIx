  hobbies: '[''Painting and sketching'', ''Digital illustration'', ''Salsa dancing'', ''Cooking traditional Mexican cuisine'', ''Volunteer work with local shelters'', ''Attending art galleries and mural
    tours'', ''Participating in community book clubs'', ''Zumba group classes'', ''Meditation and mindfulness practice'', ''Puzzle solving (escape rooms, strategy games)'']'
  career_goals: Destiny plans to earn her GED within the next year and then enroll in a community college program focused on social work or community development. In the short term, she seeks a position
    as a community outreach coordinator at a local non‑profit that serves Latinx youth, where she can apply her organizational strengths and compassionate mindset. Long‑term, she aspires to launch a community‑based
    arts initiative that combines mural projects, art‑therapy workshops, and mental‑health resources for young adults, while also building a freelance illustration career that celebrates her Mexican heritage
    and abstract artistic vision.
