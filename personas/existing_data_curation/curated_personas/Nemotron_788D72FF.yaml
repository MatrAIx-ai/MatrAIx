  hobbies: '[''Volleyball'', ''Community theater acting'', ''Hiking'', ''Animal shelter volunteering'', ''Baking'', ''DIY crafts and upcycling'', ''Listening to psychology podcasts'', ''Yoga'', ''Journaling'',
    ''Nature photography'']'
  career_goals: Mary aims to enroll in a community college program in social work or psychology within the next year, with the long-term goal of becoming a licensed mental-health counselor. She intends
    to work part-time as a peer support facilitator in a local youth center, gaining hands-on experience while completing her degree. Her ambition is to develop a community-based outreach program that combines
    mental-health education with outdoor recreation for teens in rural Maine. Over time, she also hopes to strengthen her organizational abilities to eventually lead a nonprofit focused on youth empowerment
    and emotional wellness.
