personas:
  professional: Mary Short, a budding social work student and former high school peer counselor, leverages their natural talent for connecting with people, active listening, and flexible event coordination
    to create community mental‑health workshops that blend group therapy with outdoor recreation for teens in rural Maine.
  sports: Mary Short, an enthusiastic member of a co‑ed recreational volleyball league that practices at the Turner community center, also hikes the Appalachian Trail segments near their hometown, and cheers
    for the Portland Sea Dogs while occasionally catching a Boston Red Sox game on television.
  arts: Mary Short, a regular performer in Turner’s community theater, delights in playing leading roles in modern dramas and sings along to indie folk artists like Sufjan Stevens and Phoebe Bridgers, while
    drawing inspiration from nature photographers such as Ansel Adams for their own photography projects.
  travel: Mary Short, who has explored Maine’s rugged coastline and Acadia National Park on weekend hikes, dreams of backpacking through Iceland’s volcanic landscapes and prefers spontaneous road‑trip planning
    with friends, using rideshare apps to keep travel costs low.
  culinary: Mary Short, a self‑taught experimental baker, frequently whips up matcha‑infused lemon bars, blueberry oat crumble with fresh Maine berries, and herb‑laden focaccia using oat milk and locally
    sourced honey, while documenting each trial on Instagram Stories.
  core: Mary Short is a socially‑wired, anxiety‑prone 19‑year‑old who channels their restless curiosity into community theater, volleyball, and experimental baking, balancing compassionate activism with
    a habit of last‑minute planning and occasional impulsive splurges.
background:
  cultural: Mary grew up in Turner, a small, close-knit town in Androscoggin County, Maine. Her family reflects a typical white, middle-class New England upbringing, marked by a strong sense of community,
    self-reliance, and appreciation for the natural environment. Local traditions such as school events, town festivals, and outdoor activities like fishing, sledding, and hiking have shaped her practical
    mindset and love for group participation. The region’s emphasis on modesty, mutual assistance, and a connection to the land informs her compassionate approach to helping others and her desire to maintain
    harmony within her community.
