personas:
  professional: Theodis Bacchus, an eager young LEGO architect and improvised storyteller, channels boundless curiosity and practical problem‑solving into building, redesigning, and narrating epic adventures
    for their creations, often taking the spotlight in family living‑room showcases.
  sports: Theodis Bacchus, a regular member of the Lynnwood Kids Soccer Club, bursts onto the park field with teammates, idolizing the Seattle Sounders and emulating their fast footwork, while also riding
    a bike to school on weekends for extra stamina.
  arts: Theodis Bacchus, a budding performer, sings along to upbeat R&B hits by Beyoncé and hip‑hop tracks by Drake, dances with the family in the living room, taps simple drum rhythms on a kitchen pot,
    devours adventure books like Percy Jackson, and crafts Scratch Jr. animations starring their LEGO heroes.
  travel: Theodis Bacchus, an adventurous seven‑year‑old, loves family hikes to nearby Green Lake Park and weekend trips to Seattle’s Space Needle, dreaming of exploring the giant redwoods of Olympic National
    Park, and prefers spontaneous bike routes over rigid itineraries.
  culinary: Theodis Bacchus, a self‑declared snack connoisseur, gravitates toward cheesy pizza slices, chicken nuggets, and mac & cheese, eagerly helps whip up fruit kebabs with grapes and pineapple, and
    occasionally sneaks extra cookies before dinner, showcasing a love for bold flavors and a mischievous sweet tooth.
  core: Theodis Bacchus is a charismatic, curiosity‑driven LEGO builder who thrashes between organized storytelling and spontaneous play, turning everyday routines into vibrant, slightly messy adventures.
background:
  cultural: Theodis is part of an African‑American family rooted in the Pacific Northwest, with cultural ties that blend Southern heritage and contemporary West Coast influences. His household celebrates
    traditions such as listening to gospel and soul music during family gatherings, sharing stories of ancestors, and preparing dishes like collard greens and cornbread on special occasions. The family
    actively participates in the local African‑American community center in Everett, attending youth workshops that highlight Black history, art, and STEM initiatives. They observe Juneteenth with a neighborhood
    picnic and take part in community outreach events during Black History Month, fostering a sense of pride and belonging. This cultural environment nurtures his love of storytelling, music, and collaborative
    learning.
