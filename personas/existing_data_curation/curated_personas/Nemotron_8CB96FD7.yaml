    on hikes'']'
  career_goals: Theodis dreams of becoming an astronaut who can explore space and share exciting discoveries with other kids, reflecting his curiosity about the world and love of telling stories. He also
    imagines a future as a teacher or community storyteller, where he can stand in front of a group and make learning fun and lively. Another ambition is to design toys or game experiences, blending his
    practical building skills with his creative ideas to help other children play and learn.
