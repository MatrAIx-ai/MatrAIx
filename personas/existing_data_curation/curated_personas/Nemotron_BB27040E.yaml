    gallery openings and local art fairs'', ''Vinyl collection of indie folk and classic rock'', ''Playing chess in weekly club tournaments'', ''Gardening (small vegetable plot)'', ''Analog film photography
    and darkroom development'', ''Leading a monthly drawing circle at the public library'']'
  career_goals: Robert’s primary ambition is to establish himself as a full-time professional artist within the next five years, transitioning from occasional freelance work to a sustainable studio practice.
    He plans to develop a signature visual voice that fuses the expansive Western landscapes of Oklahoma with experimental mixed-media techniques, aiming for inclusion in regional juried exhibitions and
    eventually national galleries. A short-term goal is to secure a grant from the Oklahoma Arts Council to fund a large-scale mural in downtown Weatherford, while also building a robust online presence
    through Instagram and an Etsy shop to sell limited-edition prints and custom commissions. He is actively entering art competitions to gain recognition and hopes to earn a solo show in the Oklahoma City
    art district. In the longer term, Robert envisions opening a modest studio-gallery hybrid space that can host workshops for a close-knit community of emerging artists and offer part-time teaching opportunities
    at the local community college.
