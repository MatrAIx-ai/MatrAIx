personas:
  professional: Robert Ingle is an aspiring visual artist who melds plein‑air watercolor studies of the Oklahoma prairie with digital illustration and mixed‑media collage, using their solid grounding in
    art theory, client communication, and bookkeeping to manage freelance commissions while competitively pursuing grants and juried shows.
  sports: Robert Ingle is a weekend hiker who treks the Wichita Mountains, a weekday member of the Weatherford Trail Runners, a faithful follower of the Oklahoma City Thunder and the Oklahoma Sooners football
    team, and an occasional participant in community soccer games with the Tulsa Roughnecks youth affiliate, balancing low‑key fitness with a competitive mindset.
  arts: Robert Ingle fuels their creative process by listening to indie folk vinyl from Iron & Wine and classic rock from Neil Young while studying the sweeping landscapes of Albert Bierstadt and the bold
    color fields of Georgia O'Keeffe, attending gallery openings featuring contemporary installation artists like Damien Hirst, and leading a monthly drawing circle at the public library where they experiment
    with mixed‑media collage.
  travel: Robert Ingle prefers low‑budget road trips that blend art pilgrimages and nature, having driven to Santa Fe to explore the Georgia O'Keeffe Museum and trekked the Grand Canyon’s South Rim, while
    dreaming of a future solo backpacking trek through the Scottish Highlands and a cultural immersion in Kyoto’s historic temples.
  culinary: Robert Ingle, who tends a modest vegetable garden, enjoys making fresh garden salads with heirloom tomatoes, basil, and goat cheese, often adding a quinoa‑and‑black‑bean side, while indulging
    on smoky chipotle‑grilled corn skillet with cilantro on nights they spin indie vinyl records, and they regularly experiment with roasted beet and goat cheese pâté using fresh rosemary and thyme.
  core: Robert Ingle, an 18‑year‑old visual artist, channels relentless curiosity and a competitive, skeptical streak into solitary watercolor landscapes and digital collages, while hoarding indie vinyl
    records, skipping sleep for late‑night studio sessions, and obsessively tracking every expense in a meticulous ledger.
background:
  cultural: Robert was raised in Weatherford, a modest town in central Oklahoma that sits at the crossroads of the American Midwest and the historic Great Plains. His family’s Anglo-American roots are interwoven
    with the region’s Baptist-Methodist traditions, which emphasized self-reliance, community responsibility, and a quiet work ethic. The surrounding prairie, rolling hills, and the nearby Wichita Mountains
    have profoundly shaped his visual sensibility, fostering an appreciation for expansive landscapes and the rugged heritage of cattle ranching and oil-field towns. While he identifies with the broader
    American values of individualism and entrepreneurial spirit, he also feels a strong connection to Oklahoma’s distinctive cultural fabric—its folk music, the legacy of the Red Earth Native American arts
    festival, and the state’s supportive network of regional artists. This blend of local heritage and exposure to national and global art currents through his college studies and online communities informs
    his hybrid worldview, which respects his hometown’s traditions while encouraging unconventional artistic exploration.
