  career_goals: Roosevelt aims to secure a stable, full‑time position in community program administration or a non‑profit organization where he can apply his organizational strengths and love for helping
    others. He also dreams of eventually opening a modest family‑run restaurant that showcases his Southeast Asian culinary heritage, providing a predictable routine and a welcoming space for his neighbors.
    In the short term, he wants to complete a certification in nonprofit management to improve his employability and reduce financial stress for his family.
