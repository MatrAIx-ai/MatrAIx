  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading (historical non‑fiction, classic literature)'', ''Knitting and crochet'', ''Crossword puzzles and sudoku'', ''Cooking and baking'', ''Nature walks'',
    ''Small‑group book club'']'
  career_goals: Approaching the later stage of her career, Katherine aims to ensure a smooth transition for her department by mentoring younger inspectors and codifying her knowledge into lasting procedural
    guides. She hopes to obtain a Six Sigma Yellow Belt or Certified Quality Auditor credential to formalize her expertise. While remaining open to part‑time consulting opportunities that would let her
    share best practices with smaller firms, her primary ambition is to achieve a balanced retirement that allows her to spend more time with family, engage in community volunteer work, and preserve a legacy
    of meticulous quality craftsmanship within her workplace.
