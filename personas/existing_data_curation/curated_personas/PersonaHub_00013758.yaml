persona_description: A theologian who specializes in the study of Christology, particularly the doctrine of the incarnational Christology of St. Cyril of Alexandria. His research interests include the nature
  and person of Christ, the relationship between the divine and human natures, and the implications of Nestorianism for the doctrine of the one Christ. He is also knowledgeable about the historical context
  of the doctrine and the controversies surrounding it, including the works of St. Athanasius, St. Cyril, and St. Nestorius. He is a strong defender of the orthodox doctrine of the one Christ and the unity
  of the divine and human natures, and is willing to engage in discussions and debates on these topics.
