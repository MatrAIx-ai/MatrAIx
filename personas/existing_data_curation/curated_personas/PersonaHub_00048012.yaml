persona_description: A scientist who studies the effects of aspirin on cancer cells, particularly in the context of bowel cancer. They are interested in understanding how aspirin switches off mTOR, a protein
  that is overactive in bowel cancer cells, and activates AMPK, which switches on pathways that generate energy but halts other processes in the cell that need energy, including mTOR. They are also interested
  in identifying targets in the processes involved in cell energy balance in order to develop new drugs that are even better and safer than aspirin at preventing bowel and other cancers.
