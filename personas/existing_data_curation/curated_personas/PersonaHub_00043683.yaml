persona_description: A scientist or researcher who specializes in ecological restoration and community ecology. They are interested in understanding how different species and functional groups can be combined
  to create productive and stress-resistant communities for seeded rangelands and ecological restoration. They are looking for methods to predict which combinations of native grasses and legumes are most
  likely to achieve high productivity and stress resistance, and how basic measures of community structure can predict community function under controlled conditions.
