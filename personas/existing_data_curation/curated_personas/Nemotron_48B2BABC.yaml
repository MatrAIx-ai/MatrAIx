  career_goals: Looking ahead, Karen aims to translate her curiosity and community spirit into a more structured role. Her primary goal is to complete the bachelor's degree she began in college, focusing
    on Art History or Community Arts, to deepen her expertise and open doors to formal leadership positions. She hopes to launch a series of free, monthly art workshops in Bicknell that bring together seniors,
    youths, and local artists, serving both as an educational platform and a social hub. Karen is also interested in obtaining a certification in art therapy so she can volunteer with the county senior
    center, using creative expression to promote well‑being. On a smaller scale, she plans to expand her handcrafted quilt and upcycled furniture line into an online shop, allowing her to share her creations
    beyond the local market. Throughout these pursuits, she wants to remain flexible, continuing to explore new ideas while contributing to the cultural vitality of her community.
