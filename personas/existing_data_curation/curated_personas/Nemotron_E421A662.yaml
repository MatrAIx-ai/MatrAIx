  career_goals: Nghi dreams of a future where she can combine her love for the ocean, scientific curiosity, and practical problem‑solving. She aspires to become a marine biologist or environmental researcher
    who studies coastal ecosystems and develops sustainable solutions for marine conservation. She is also intrigued by the possibility of using technology—such as data‑analysis tools or simple coding projects—to
    monitor water quality, reflecting her desire for a career that is both intellectually stimulating and grounded in real‑world impact. While she remains open to other scientific paths, she emphasizes
    a stable, purposeful profession that allows her to contribute to her community and protect the natural world she values.
