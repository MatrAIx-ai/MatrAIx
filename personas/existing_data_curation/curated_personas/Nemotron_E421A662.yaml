personas:
  professional: Nghi Nguyen is an aspiring marine‑science enthusiast who spends afternoons coding ocean‑themed games in Scratch, merging curiosity about ecosystems with a practical knack for structured
    problem‑solving, and they channel their love for detail into a meticulously kept research journal.
  sports: Nghi Nguyen follows the Washington Nationals baseball team and the Washington Capitals hockey club, enjoys junior swim lessons at the Virginia Beach Aquatics Center, and they opt for solitary
    fitness like beach‑walk jogging and bird‑watching hikes over team sports, finding quiet rhythm in the ocean breezes.
  arts: Nghi Nguyen sketches coastal scenes while listening to folk tunes by Bob Dylan and Joni Mitchell, builds intricate LEGO mosaics inspired by marine life, and they draw creative inspiration from the
    visual storytelling of Hayao Miyazaki’s animated films.
  travel: Nghi Nguyen prefers quiet, educational trips and has explored the tide pools of Assateague Island, the historic streets of Williamsburg, and dreams of visiting the Galápagos Islands to study marine
    ecosystems firsthand, and they favor solo‑friendly itineraries with meticulous planning over spontaneous group tours.
  culinary: Nghi Nguyen assists in preparing fragrant pho broth with star anise and ginger, rolls fresh spring rolls featuring basil and shrimp, and they relish tasting local crab cakes while experimenting
    with lemongrass‑infused sauces, embracing both family tradition and new flavor combinations.
  core: Nghi Nguyen is a solitary, curiosity‑driven 11‑year‑old who balances meticulous scientific hobbies with occasional worry‑induced splurges, finding solace in coding, sketching, and quiet beach walks
    while navigating the stress of growing up.
background:
  cultural: Nghi is a second‑generation Vietnamese American raised in a close‑knit family in Virginia Beach. Her parents immigrated from Vietnam and maintain bilingual communication at home, so she speaks
    both English and Vietnamese fluently. The household places a high value on education, respect for elders, and community involvement, which is reflected in regular celebrations of Vietnamese holidays
    such as Tet and the Mid‑Autumn Festival. She enjoys traditional foods like pho and bánh hỏi, and often visits the local Vietnamese cultural center for language classes and community events. Growing
    up near the Atlantic coast, she blends her Vietnamese heritage with a love for the ocean, fostering a unique perspective that respects both her ancestry and her local environment.
