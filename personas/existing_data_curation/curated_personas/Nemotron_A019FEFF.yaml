personas:
  professional: Christopher Menendez, a three‑year‑old with a knack for arranging his toy blocks in perfect, predictable patterns, dreams of becoming an architect, often scolding his playmates for crooked
    towers while delighting in the satisfaction of a neatly ordered playroom.
  sports: Christopher Menendez loves the energy of toddler gymnastics at Little Sprouts Gym, proudly plays forward for the Tiny Tots Soccer Club, and eagerly watches the Chicago Cubs on TV, cheering loudly
    whenever a home run is hit.
  arts: Christopher Menendez spends afternoons humming along to the Sesame Street theme, dancing to Pharrell's Happy, and creating vivid crayon masterpieces inspired by Disney’s Frozen while proudly displaying
    their drawings on the fridge.
  travel: Christopher Menendez enjoys family road trips to the seaside, especially the boardwalk in Virginia Beach, delights in the interactive exhibits at the Monterey Bay Aquarium, and is already asking
    for a future adventure to Disney World in Orlando.
  culinary: Christopher Menendez prefers classic toddler fare—cheesy macaroni, chicken nuggets, banana slices, and peanut butter‑jelly sandwiches—yet shows a budding curiosity in stirring pancake batter
    and sprinkling cinnamon on apple slices.
  core: Christopher Menendez is a three‑year‑old who thrives on routine, organizes toys with military precision, delights in group play, and balances a sweet tooth with disciplined piggy‑bank habits.
background:
  cultural: Christopher was born and raised in Jamestown, New York, a small city in Chautauqua County known for its close‑knit community atmosphere. His family is part of the broader white American cultural
    context typical of upstate New York, celebrating national holidays such as Thanksgiving, Independence Day, and Christmas, as well as local events like the Chautauqua County Fair. He attends a neighborhood
    preschool where emphasis is placed on routine, manners, and cooperation. His upbringing includes regular participation in community activities such as library story hours, seasonal festivals, and neighborhood
    playdates, fostering a sense of belonging and respect for shared rules.
