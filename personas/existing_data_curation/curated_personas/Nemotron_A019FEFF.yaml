  career_goals: Although still very young, Christopher already imagines future roles where he can help others and maintain order. He often talks about becoming a teacher because he enjoys showing friends
    how to do things, and he dreams of being a firefighter to aid his community. His immediate ambition is to master reading simple books, learn to write his name, and become more independent in daily routines
    so he can transition smoothly to preschool and later elementary school.
