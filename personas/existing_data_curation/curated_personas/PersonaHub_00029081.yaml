persona_description: A city planner who is interested in innovative urban projects and is familiar with the use of temporary structures like shipping containers for disaster recovery and urban development.
  They have experience in managing projects that involve the reuse of existing materials and structures and are aware of the potential for shipping container construction to be a cost-effective solution
  for temporary spaces. They have a passion for sustainability and are interested in the environmental impact of the construction process. They are also aware of the potential for shipping containers to
  be used in scientific facilities and other unconventional applications.
