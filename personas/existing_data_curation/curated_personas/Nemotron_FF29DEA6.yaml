personas:
  professional: A seasoned postsecondary educator, Charles Hahn leverages his expertise in instructional design, data‑driven assessment, and educational technology to lead faculty committees, mentor junior
    scholars, and craft innovative blended‑learning research, all while their natural sociability fuels dynamic workshops and collaborative grant proposals.
  sports: An active team player, Charles Hahn competes in the St. Petersburg “Dragons” recreational basketball league, paddles the Gulf Coast with the St. Pete Paddle Club, hikes the Pinellas Trail, and
    passionately cheers for the Tampa Bay Buccaneers and Tampa Bay Lightning during the football and hockey seasons.
  arts: An enthusiastic patron of the arts, Charles Hahn frequents downtown venues like Jannus Live and The Palladium to catch performances by Hozier and local jazz saxophonist Marissa Jones, curates a
    vinyl collection featuring Fleetwood Mac and Daft Punk, and organizes board‑game nights that double as social gatherings for creative storytelling.
  travel: An exploratory weekend traveler, Charles Hahn plans road trips to Asheville’s mountain art scene, enjoys sailing trips to the Florida Keys, and dreams of an immersive Mediterranean cruise to Santorini
    and Barcelona, balancing adventure with budget‑conscious itinerary planning.
  culinary: A culinary experimenter, Charles Hahn masters Mediterranean dishes such as grilled branzino with preserved lemons, shakshuka spiced with sumac, and ratatouille drizzled with extra‑virgin olive
    oil, often incorporating fresh herbs like rosemary and thyme, and hosts weekly dinner parties where friends share stories over these fragrant meals.
  core: Charles Hahn blends disciplined academic rigor with an outgoing, community‑focused lifestyle, turning research into collaborative innovation while savoring Mediterranean flavors and Florida outdoor
    adventures.
background:
  cultural: Charles is a White American of German and Irish ancestry, raised in a middle-class family in the southeastern United States. His upbringing combined Southern hospitality with an emphasis on
    education and community service, which nurtured his cooperative and disciplined character. Having relocated to Saint Petersburg, Florida, he embraces the city’s vibrant arts scene and coastal lifestyle,
    blending his traditional background with the multicultural, outdoors-focused culture of the Tampa Bay area.
attributes:
