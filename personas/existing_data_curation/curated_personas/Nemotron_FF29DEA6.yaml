  hobbies: '["Recreational Basketball", "Community Volunteering", "Kayaking", "Hiking", "Board Game Nights", "Live Music", "Mediterranean Cooking"]'
  career_goals: Charles aims to achieve tenure and subsequently ascend to a department chair position, where he can shape the college’s teacher-education program. He seeks to secure a multi-year research
    grant to study the impact of blended learning on community college students, publish his findings in peer-reviewed journals, and author a textbook on modern pedagogical strategies. He also plans to
    develop an interdisciplinary online certificate program that blends education theory with practical skill building, thereby extending his impact beyond the campus. Long-term, he envisions becoming a
    recognized thought leader in educational innovation within Florida’s higher-education system.
