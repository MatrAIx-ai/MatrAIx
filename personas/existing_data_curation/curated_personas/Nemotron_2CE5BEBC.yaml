  career_goals: Jaylin aims to earn her GED within the next two years and enroll in a vocational program to become a certified cosmetology technician. Her long‑term ambition is to open her own beauty salon
    in Walton County, offering affordable services to her neighbors. In the short term, she hopes to secure a part‑time position as a salon assistant or in a local boutique to gain industry experience.
    She also wants to mentor younger girls in her community, encouraging them to pursue education and career goals despite obstacles.
