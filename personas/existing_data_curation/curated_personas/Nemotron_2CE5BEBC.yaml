personas:
  professional: Jaylin Harris, a 16‑year‑old aspiring cosmetology technician, leverages their love for fashion, makeup tutorials on TikTok, and leadership experience in a church youth group to practice
    hands‑on styling for choir members while balancing school responsibilities and a competitive drive to launch an affordable local salon.
  sports: Jaylin Harris, a keen pickup basketball player, spends Saturday evenings at the local community center honing jump‑shots while cheering for the Miami Heat and the Florida Gators women’s basketball
    team, and approaches fitness with a competitive edge that sometimes makes them reluctant to share equipment.
  arts: Jaylin Harris immerses themselves in contemporary R&B icons like H.E.R. and gospel powerhouse Kirk Franklin, creates TikTok fashion and makeup tutorials inspired by beauty creator Nikki Glam, sketches
    comic‑style characters reminiscent of My Hero Academia, and writes poetry in the style of Rupi Kaur, all of which shape their personal aesthetic.
  travel: Jaylin Harris has explored the Emerald Coast beaches of Destin, dreamed of strolling through New York’s Fifth Avenue during Fashion Week, and plans a budget‑friendly road trip to Savannah’s historic
    district to capture inspiration for future salon décor, balancing travel ambition with the financial reality of a teen’s limited income.
  culinary: Jaylin Harris tends a small herb garden where basil and rosemary flourish, uses fresh herbs to flavor family staples such as garlic rosemary chicken and herb‑infused pasta, enjoys experimenting
    with DIY facial masks using oat and honey, and occasionally burns toast when multitasking between TikTok editing and homework.
  core: Jaylin Harris is a 16‑year‑old TikTok‑savvy beauty enthusiast who balances a competitive love for basketball with a pragmatic plan to open an affordable salon, while juggling occasional acne, impulsive
    makeup splurges, and a habit of over‑committing to both social and solo projects.
background:
  cultural: Jaylin is an African‑American teen raised in rural Georgia, grounded in the traditions of the Southern Black community. Her family places a strong emphasis on church involvement, extended family
    support, and seasonal gatherings centered around soul food such as collard greens, fried chicken, and cornbread. She grew up surrounded by gospel music, storytelling, and community resilience that shape
    her values of hard work and mutual aid. These cultural influences inform her language, celebrations, and aspirations to give back to the neighborhood that nurtured her.
