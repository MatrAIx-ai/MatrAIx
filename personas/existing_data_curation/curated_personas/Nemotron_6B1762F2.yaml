    resolution'', ''Sustainable procurement practices'']'
  hobbies: '[''Softball league'', ''Community theater volunteering'', ''Gardening (vegetable and flower)'', ''Cooking experimental recipes'', ''Hiking Lake Michigan trails'', ''Book club (business & mystery)'',
    ''DIY home‑improvement projects'', ''Hosting gatherings/barbecues'', ''Road‑trip travel with family'', ''Listening to supply‑chain podcasts'', ''Card and board game nights'']'
  career_goals: Stephanie aims to move into a senior procurement leadership role, such as Purchasing Manager or Procurement Director, within the next five to seven years. She plans to earn the Certified
    Professional in Supply Management (CPSM) credential and complete community‑college coursework in supply‑chain management to complement her practical experience. Her ambition includes championing a region‑wide
    e‑procurement platform that reduces cycle time and embeds sustainability metrics into supplier contracts. She also hopes to mentor younger purchasing professionals, lead cross‑functional cost‑saving
    initiatives, and eventually leverage her expertise to launch a consultancy focused on strategic sourcing for midsize manufacturers in the Great Lakes area.
