  career_goals: Barbara aims to earn an OSHA certification and a Certified Forklift Operator credential within the next year, then move into a supervisory role overseeing material handling at the Sun Valley
    resort. She plans to complete her associate degree in Business Administration to qualify for an operations manager position within five years, where she can blend logistics expertise with her passion
    for community arts. Long‑term, she dreams of establishing a small program that offers art workshops and creative‑thinking seminars for resort staff and local residents, positioning herself as a bridge
    between efficient operations and cultural enrichment while maintaining a healthy work‑life balance.
