persona_description: A healthcare professional who specializes in managing and treating urinary tract infections (UTIs). They are well-versed in the potential complications of untreated UTIs and are skilled
  in managing them through proper medication and follow-up care. They are particularly interested in the prevention and management of recurrent UTIs, as well as the potential effects on pregnancy and the
  kidneys. They have a deep understanding of the biology and pathophysiology of UTIs and are committed to providing the best possible care to patients with UTIs.
