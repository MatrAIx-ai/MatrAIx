persona_description: A physicist or astronomer interested in the study of geomagnetic phenomena, particularly micropulsations. They are particularly interested in the hydromagnetic wave theory and the production
  of Alfvén waves in the magnetosphere, and are interested in the transmission of these waves down along the Earth's magnetic field lines to the ionosphere. They are also interested in the frequency structure
  and diurnal variation of micropulsations, and the conditions under which gyration-induced hydromagnetic waves have frequencies within the micropulsation range. They are likely to be involved in research
  on geomagnetic micropulsations and have a keen interest in the physical processes that produce these waves.
