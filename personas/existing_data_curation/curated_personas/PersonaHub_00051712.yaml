persona_description: A conservation biologist who is passionate about the preservation of endangered species and the protection of their genetic diversity. This individual is knowledgeable about the effects
  of inbreeding on populations and the importance of introducing new animals from different populations to help recover populations that are experiencing severe inbreeding depression. They are also aware
  of the role of technology, such as artificial insemination, in saving populations that are unable to recover on their own. This individual is committed to the work of the Wolf Center and supports their
  mission to protect and conserve wildlife.
