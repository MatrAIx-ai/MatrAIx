personas:
  professional: Barbara Fergus, a veteran food‑service manager in Michigan, blends rigorous inventory control and cost management with a flair for avant‑garde menu design, using their bilingual communication
    to inspire a diverse team while thriving on the creative chaos of experimental plating, reflecting their imaginative curiosity and relaxed, sometimes disorganized, approach to obligations.
  sports: Barbara Fergus cheers for the Detroit Lions, Tigers, and Red Wings while playing recreational tennis at the Grand Rapids Tennis Club and attending weekly salsa sessions with the Ann Arbor Salsa
    Society, embracing energetic workouts when inspiration strikes but often letting fitness routines slip amidst a busy creative schedule.
  arts: Barbara Fergus paints abstract canvases inspired by Jackson Pollock and Yayoi Kusama, captures natural textures and vibrant street scenes reminiscent of Henri Cartier‑Bresson, competes in community
    theater auditions for Tennessee Williams productions, and loses themselves on the dance floor to Celia Cruz and Santana, weaving artistic expression into every facet of their life.
  travel: Barbara Fergus seeks out cultural festivals from the Guelaguetza in Oaxaca to the Day of the Dead celebrations in Mexico City, blends those trips with spontaneous visits to New Orleans for Mardi
    Gras and Santa Fe’s Indian Market, planning itineraries around culinary workshops while maintaining a flexible, last‑minute booking habit that mirrors their love of novelty.
  culinary: Barbara Fergus experiments with contemporary Mexican dishes like mole poblano, chiles en nogada, and kimchi‑infused tacos, seasoning them with epazote, charred corn, and heirloom tomatoes from
    their herb garden, showcasing an advanced culinary skill set that balances avant‑garde plating with bold flavor pairings.
  core: Barbara Fergus channels an artistic, competitive spirit into a dynamic culinary career, juggling spontaneous creativity with occasional disarray while savoring life’s flavors and festivals.
background:
  cultural: Barbara identifies as Mexican‑American, growing up with a blend of traditional Mexican family customs and Midwestern American influences. Her upbringing emphasized the importance of communal
    meals, vibrant celebrations like Día de los Muertos, and storytelling through food. Bilingual in Spanish and English, she maintains strong ties to her heritage by cooking family recipes, participating
    in local Latino cultural events, and supporting community initiatives that showcase Mexican art and cuisine. Living in Jenison, Michigan, she bridges these cultural worlds, bringing Mexican flavors
    and artistic sensibilities to a diverse local audience while honoring her roots through language, food, and festive traditions.
attributes:
  skills: '[''Team leadership'', ''Staff training and development'', ''Menu development and creative plating'', ''Inventory control and procurement'', ''Food safety compliance (ServSafe)'', ''Budgeting
