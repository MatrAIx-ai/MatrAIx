persona_description: A biologist who studies the mechanisms of gene regulation and how it evolves in different organisms, particularly focusing on negative feedback loops and their role in homeostasis.
  They have a particular interest in the differences between human and bacterial gene regulation and the implications of this for evolutionary biology. They are also knowledgeable about the mathematical
  models used to study the evolution of gene regulation and the constraints that diploid organisms face in maintaining negative autoregulation.
