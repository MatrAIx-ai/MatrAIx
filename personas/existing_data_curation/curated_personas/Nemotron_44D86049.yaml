personas:
  professional: Annie Spain is a budding junior librarian‑assistant and aspiring historian, whose methodical love for cataloguing books, building intricate LEGO dioramas of historic scenes, and keeping
    detailed planners showcases an organized, solitary work style that foreshadows a future in archival research.
  sports: Annie Spain enjoys watching the Chicago Cubs and the US Women’s National Soccer Team on television, while personally staying fit by completing weekly lap swims at the community pool and solitary
    bike rides through the park, aligning with their preference for structured, individual exercise.
  arts: Annie Spain nurtures a quiet artistic side through beginner piano lessons, practicing Chopin’s nocturnes and improvising simple melodies, while also immersing themselves in the works of author Maya
    Angelou and the classical compositions of Beethoven, showing how disciplined practice and literary appreciation shape their creative identity.
  travel: Annie Spain dreams of visiting historic sites such as Colonial Williamsburg and the National Museum of African American History in Washington, D.C., and has already taken a family road trip to
    Philadelphia’s Independence Hall, favoring well‑planned tours that blend educational enrichment with the comfort of familiar routines.
  culinary: Annie Spain prefers home‑cooked comfort foods like macaroni and cheese with a sprinkle of cheddar, enjoys baking chocolate chip cookies using butter and vanilla extract, and occasionally experiments
    with simple Southern dishes like fried chicken and collard greens, reflecting a practical palate that values ease and occasional culinary adventure.
  core: Annie Spain is a methodical, solitary twelve‑year‑old who balances a love for historical reading, organized LEGO building, and disciplined piano practice with a meticulous budgeting habit and a
    quietly ambitious outlook on future scholarship.
background:
  cultural: Annie is raised in a close‑knit African‑American family in Memphis, a city steeped in blues, soul, and civil‑rights history. Family gatherings often feature traditional Southern dishes like
    collard greens, cornbread, and sweet potato pie, and celebrations honor milestones such as Juneteenth and Kwanzaa, reinforcing cultural pride. Her parents emphasize the importance of education and community
    involvement, encouraging her to participate in local church events and youth programs that highlight the achievements of Black leaders from Memphis. Exposure to the city’s musical heritage fuels her
    appreciation for rhythm and storytelling, while visits to museums showcasing African‑American history deepen her connection to her roots and inspire her future aspirations.
