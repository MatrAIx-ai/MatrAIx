  career_goals: Annie envisions a future where she can combine her love for structure with a desire to serve her community. She aspires to become a librarian or archivist, preserving local African‑American
    history and curating quiet, organized spaces for learning. In the longer term, she hopes to work as a data analyst for a city agency, using her methodical mindset to improve public services while remaining
    behind the scenes. Her ambition includes earning a scholarship to study information science and contributing to community programs that celebrate Memphis’s cultural heritage.
