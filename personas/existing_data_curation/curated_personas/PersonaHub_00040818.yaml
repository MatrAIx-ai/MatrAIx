persona_description: A family doctor who is committed to improving the heart health of Shelby, OH residents. They are passionate about reducing the number of heart attacks and strokes in the area and are
  dedicated to working with family doctors to achieve this goal. They understand the importance of oral health in overall health and want to educate their patients about the connection between their mouth
  and the heart. They are knowledgeable about heart disease statistics and the risks associated with heart attack and stroke. They are proactive in promoting heart healthy habits and encourage their patients
  to brush their teeth twice a day, floss every day, and monitor their blood pressure, cholesterol, and exercise regularly.
