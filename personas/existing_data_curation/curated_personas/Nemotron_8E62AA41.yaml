  career_goals: Jim dreams of turning his love for art and technology into a career as a multimedia designer or video game artist. He hopes to attend a specialized high school for the arts, later study
    graphic design and interactive media at college, and eventually work on projects that combine storytelling, visual art, and user experience. He also wants to mentor younger students in community art
    programs and find ways to use his creative skills to promote mental well‑being, given his own sensitivity to stress.
