personas:
  professional: Kenneth Hill is a 16‑year‑old apprentice agricultural equipment technician who combines a hands‑on knack for tractor maintenance with a methodical, curiosity‑driven approach to DIY electronics,
    and they are already laying groundwork for a future repair shop serving Twin Valley farmers.
  sports: Kenneth Hill enjoys a blend of solitary and team sports, spending weekends fishing at Lake Willow and hiking the nearby prairie trails while also cheering for the Kansas City Chiefs and following
    the local Twin Valley high‑school cross‑country team, though they rarely join organized leagues themselves.
  arts: Kenneth Hill captures the rolling fields with a Canon EOS Rebel T6, strings together acoustic renditions of John Mayer’s ‘Gravity’, and devours sci‑fi novels by Neal Stephenson, drawing creative
    inspiration from both the visual quiet of rural sunsets and the speculative worlds in his reading, while they occasionally skip practice to tinker with Arduino projects.
  travel: Kenneth Hill prefers low‑key, nature‑focused trips, having camped out in Badlands National Park and planning a future road‑trip to the Pacific Northwest’s Columbia River Gorge, yet budget constraints
    keep most adventures within a few‑hour drive of home, and they often map routes on paper to avoid digital distractions.
  culinary: Kenneth Hill favors hearty, straightforward meals like smoked brisket, corn‑on‑the‑cob, and homemade chili, often cooking on the farm’s outdoor grill with a penchant for adding fresh herbs like
    rosemary, though they frequently overlook cleaning the grill after use, opting instead to settle in front of a video game.
  core: Kenneth Hill is a 16‑year‑old farm‑raised tech enthusiast who balances solitary tinkering with a drive for self‑reliance, occasionally trading late‑night gaming for missed chores, and they are already
    plotting a future in agricultural equipment repair.
background:
  cultural: Kenneth was raised in a predominantly white, Midwestern farming community in Twin Valley, Minnesota. His family’s roots trace back to German‑Scandinavian immigrants who settled in the region,
    giving him a cultural heritage steeped in Lutheran values, a strong work ethic, and a deep respect for the land. Community life revolves around church gatherings, county fairs, and mutual aid among
    neighbors, all of which foster a sense of humility, practicality, and self‑reliance that shapes his worldview.
attributes:
  skills: '[''Farm equipment maintenance'', ''Basic carpentry'', ''Computer hardware troubleshooting'', ''DIY electronics projects'', ''Woodworking'', ''Problem solving'', ''Time management'']'
  hobbies: '[''Model kit building'', ''Arduino hobbyist projects'', ''Strategy video gaming'', ''Fishing'', ''Hiking'', ''Science‑fiction reading'', ''Photography'', ''Acoustic guitar'']'
  career_goals: Kenneth aims to secure a certification as an agricultural equipment technician and eventually open a small repair shop serving the Twin Valley farming community. He hopes to supplement his
    technical training with night courses in mechanical engineering, with the long‑term vision of managing his own sustainable farm or becoming a trusted consultant for local growers. Independence, self‑reliance,
    and the ability to provide for his family are central to his ambition.
