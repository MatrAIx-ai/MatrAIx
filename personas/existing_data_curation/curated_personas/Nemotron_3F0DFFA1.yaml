personas:
  professional: Liby Chediak, an aspiring medical office assistant-in-training, leverages bilingual fluency and self‑taught web development to streamline patient intake forms and tech support in a future
    health‑informatics role while meticulously planning their GED and vocational studies.
  sports: Liby Chediak, a disciplined fitness enthusiast, schedules early morning jogs at Sedgwick County Park, plays weekly tennis matches at the Wichita Tennis Club, follows the Wichita State Shockers
    and Kansas City Royals closely, and participates in a recreational soccer team in the Wichita Youth Soccer League, approaching each session with a tactical, competition‑driven mindset.
  arts: Liby Chediak, a quiet creative, spends evenings sketching local bird species while devouring graphic novels like Saga and Watchmen, listening to the ethereal soundscapes of Nujabes and the piano
    works of Ludovico Einaudi, and binge‑watching the animated films of Hayao Miyazaki for narrative inspiration.
  travel: Liby Chediak, an organized travel planner, has explored the historic streets of Mexico City and the desert vistas of the Grand Canyon on family trips, dreams of navigating Tokyo’s neon alleys
    and Barcelona’s Gaudí architecture, and always drafts meticulous itineraries, packing lists, and budget spreadsheets before each journey.
  culinary: Liby Chediak, a budding home chef, precisely measures and adjusts recipes to perfect traditional dishes such as chiles en nogada, carnitas, and homemade tamales, adding modern twists with smoked
    chipotle and fresh cilantro, and logs each experiment in a digital journal alongside code snippets for recipe calculators.
  core: Liby Chediak, a methodical and competitively driven teen, balances coding, chess, and bird‑watching with a love of family cooking, yet sometimes procrastinates on social outings and battles occasional
    indecision over extracurricular commitments.
background:
  cultural: Liby is a first-generation Mexican-American raised in Wichita, Kansas. She grew up speaking both Spanish and English at home, celebrating Mexican holidays such as Día de los Muertos, Las Posadas,
    and Mexican Independence Day alongside typical American festivities. Family gatherings often revolve around home-cooked meals—tamales, pozole, and enchiladas—prepared by her mother, which Liby helps
    to prepare. She attends a local Catholic church on occasion, participating in community events that blend Mexican traditions with Midwestern culture. Her parents maintain strong ties to the Mexican
    community in Sedgwick County, and she occasionally volunteers at a neighborhood Spanish-language tutoring program, helping younger children with reading and homework. These cultural experiences shape
    her bilingual identity and her desire to serve a diverse community in her future career.
attributes:
  skills: '[''Organizational planning'', ''Bilingual Spanish-English communication'', ''Basic web development (HTML/CSS)'', ''Introductory Python scripting'', ''Computer troubleshooting'', ''Cooking traditional
    Mexican cuisine'', ''Proficiency with Google Workspace'', ''Journaling and reflective writing'', ''Science fair project design'']'
  hobbies: '[''Reading science-fiction'', ''Coding small programs'', ''Cooking Mexican dishes'', ''Birdwatching'', ''Sketching wildlife'', ''Playing competitive strategy video games'', ''Chess'', ''DIY
    electronics (Arduino)'']'
  career_goals: Liby plans to earn her GED within the next two years and then enroll in a vocational program for medical assisting or health-informatics support at Wichita Area Technical College. She aims
    to combine her bilingual ability and technical curiosity to work in a healthcare setting where she can assist both patients and staff, providing reliable administrative support and basic tech assistance.
    Long-term, she hopes to become a certified medical office manager, leading a small team and ensuring efficient, culturally sensitive patient care. She also aspires to mentor other teens from under-represented
    backgrounds, showing them how practical skills and disciplined planning can open stable career paths.
