  career_goals: Even at three, Paul imagines future roles that involve helping others. He often declares that he wants to become a firefighter or a doctor because he enjoys rescuing stuffed animals and
    ‘fixing’ friends when they’re upset. These ambitions echo his practical, reality‑focused mindset and his desire for orderly, caring environments, while his flexible imagination lets him shift between
    different pretend jobs throughout the day.
