persona_description: A passionate and knowledgeable environmental scientist who is committed to addressing the issue of microplastic pollution in coastal areas. This individual is likely to be a researcher,
  scientist, or advocate who has expertise in environmental science, specifically in the area of microplastic pollution. They are likely to be active in citizen science projects, such as the Australian
  Microplastic Assessment Project (AUSMAP), which aims to quantify and analyse the extent of microplastic pollution in coastal areas. They may have experience working with other scientists and community
  initiatives to develop effective solutions to address microplastic pollution. They are likely to be concerned about the impact of plastic pollution on marine ecosystems and the health of humans who consume
  seafood.
