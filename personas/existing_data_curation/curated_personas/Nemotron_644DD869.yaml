personas:
  professional: Alicia Tyner, a licensed clinical psychologist whose STEM background equips her with rigorous quantitative research skills, seamlessly integrates neuropsychological assessment, cognitive-behavioral
    therapy, and mindfulness-based stress reduction into community mental-health programs while coordinating interdisciplinary collaborations and mentoring interns in Rock Hill.
  sports: Alicia Tyner, an avid member of the Rock Hill Hiking Club, spends weekends trekking the Piedmont trails, enjoys seasonal pick-up tennis at the local YMCA in spring, follows the Carolina Panthers
    and Charlotte Hornets with enthusiastic fandom, and volunteers as a coach for a youth soccer league during the fall.
  arts: Alicia Tyner, a casual pianist who entertains family gatherings with renditions of Duke Ellington standards, regularly attends productions by the Rock Hill Repertory Theatre, participates in a book
    club that dissects works by August Wilson and Maya Angelou, and curates a personal playlist of contemporary folk singer Brandi Carlile.
  travel: Alicia Tyner prefers meticulously planned road trips that blend nature and culture, having explored Congaree National Park's swamp trails, hiked the Great Smoky Mountains, visited Asheville's
    art studios, and scheduled a future getaway to Savannah's historic district, all while balancing travel costs with a family-friendly budget.
  culinary: Alicia Tyner, an enthusiastic home cook, specializes in health-focused Southern cuisine such as collard greens sautéed with smoked turkey, blackened catfish served over quinoa, sweet-potato
    pies flavored with cinnamon and pecans, and regularly experiments with ingredients like turmeric, kale, and chia seeds to reinvent classic dishes.
  core: Alicia Tyner blends scientific rigor with Southern hospitality, channeling curiosity, practicality, and community-oriented compassion into every aspect of her professional, financial, health, and
    personal life.
background:
  cultural: Alicia grew up in a middle‑class Southern family in South Carolina, where community ties, hospitality, and a strong work ethic were core values. Her upbringing blended traditional Southern cultural
    elements—such as family gatherings, church involvement, and appreciation for regional cuisine—with a progressive emphasis on education and personal growth. Pursuing higher education in STEM and psychology
    broadened her worldview, allowing her to integrate scientific rigor with the relational warmth of her cultural roots. Living in Rock Hill, she navigates a community that values both tradition and innovation,
    leveraging her background to foster inclusive mental‑health initiatives that respect local customs while introducing evidence‑based practices.
attributes:
  skills: '["Cognitive Behavioral Therapy", "Mindfulness‑Based Stress Reduction", "Neuropsychological Assessment", "Quantitative Research Methods", "Statistical Analysis (SPSS, R)", "Psychometric Test Development",
