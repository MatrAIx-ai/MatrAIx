  hobbies: '["Hiking in the Piedmont region", "Gardening and native plant cultivation", "Cooking Southern cuisine with a healthful twist", "Participating in local book clubs", "Volunteering at the Rock
    Hill animal shelter", "Attending community theater productions", "Yoga and mindfulness meditation", "Traveling to national parks", "Mentoring high school students in STEM outreach programs", "Piano
    (casual)"]'
  career_goals: Alicia aims to expand her impact beyond private practice by spearheading a community mental‑health hub in York County that integrates evidence‑based therapy, school‑based preventive programs,
    and telehealth services for rural populations. She aspires to secure a leadership role that allows her to design interdisciplinary research projects linking psychology with neuroscience and data science,
    publish in peer‑reviewed journals, and mentor the next generation of clinicians. Over the next five years, Alicia plans to obtain board certification in Clinical Neuropsychology, develop a regional
    training curriculum for crisis response, and collaborate with local universities to establish an adjunct faculty position that bridges clinical work with academic research.
