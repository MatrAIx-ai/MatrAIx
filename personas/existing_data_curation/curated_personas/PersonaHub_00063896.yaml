persona_description: A researcher involved in the evaluation and analysis of the global water cycle's response to climate change, particularly focusing on droughts and floods. This person is part of the
  WATCH project, which brings together European hydrological, water resources, and climate communities to assess the current and future global water cycle and its vulnerabilities. The person's expertise
  lies in hydrological extremes, spatial and temporal drought patterns, and the impacts of global change on water resources. They have experience in using observed data from the European Water Archive to
  analyze trends in mean monthly and low flows across Europe, as well as in developing a modelling and data framework to assess the future vulnerability of water resources. They are also involved in assessing
  the past and future states of water resources and vulnerability, and are dedicated to providing training and dissemination activities about the research within WATCH to scientists and stakeholders.
