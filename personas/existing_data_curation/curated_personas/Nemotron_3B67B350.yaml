  hobbies: '[''Reading theological and philosophical works'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Nature photography'', ''Acoustic guitar playing'', ''Genealogy research'', ''Chess'', ''Small-group
    Bible study facilitation'']'
  career_goals: Manuel aims to elevate his ministry by becoming a senior pastor of a multi-site congregation within the next five years, establishing a regional training program for emerging clergy, and
    authoring a book on practical apologetics that bridges scholarly rigor with lay accessibility. He is driven to measurable growth—boosting weekly attendance by 25% and creating a data-informed discipleship
    metric—while maintaining the disciplined, high-standard environment he values.
