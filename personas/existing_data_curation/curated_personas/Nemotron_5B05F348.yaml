personas:
  professional: A budding urban planner in the making, Trey Atiyeh loves sorting toy blocks by color and shape, and they demonstrate meticulous organization and a competitive drive to build the tallest
    tower before any peer.
  sports: A fledgling athlete with a fierce love of soccer, Trey Atiyeh spends afternoons at the neighborhood park dribbling a mini ball, cheers loudly for the Baltimore Orioles during baseball season and
    the Ravens on football Sundays, and they participate in a fall tee‑ball league at the local YMCA.
  arts: A budding storyteller, Trey Atiyeh fills sketchbooks with vibrant superhero scenes, sings along to The Wiggles and Disney's 'Frozen' soundtrack, and they channel their organized imagination into
    elaborate home‑made puppet shows.
  travel: An enthusiastic little explorer, Trey Atiyeh’s family road trips to the Chesapeake Bay and seasonal flights to Orlando for Disney World spark their love for meticulously planned itineraries, and
    they prefer familiar comforts like a favorite blanket over spontaneous adventures.
  culinary: A selective gourmand, Trey Atiyeh favors crunchy apple slices, cheesy mac‑and‑cheese, chicken nuggets, and proudly assembles a peanut‑butter‑jelly sandwich, though they often leave broccoli
    untouched, revealing a picky‑eater streak.
  core: Trey Atiyeh is a methodical four‑year‑old with a competitive edge, who organizes play, counts coins, and meticulously navigates the world while they battle occasional picky‑eater habits.
background:
  cultural: Trey is raised in a middle‑class, suburban white family in Gwynn Oak, Maryland. His upbringing reflects typical Mid‑Atlantic American customs such as celebrating holidays like Thanksgiving and
    the Fourth of July, attending a local preschool that values both independent and cooperative play, and participating in community activities at the county library and neighborhood park. These experiences
    shape his respect for personal space and modest competition.
attributes:
  skills: '[''fine‑motor coordination'', ''basic counting (1‑10)'', ''letter recognition'', ''following multi‑step routines'', ''toy organization'']'
  hobbies: '[''building with interlocking blocks'', ''sorting colored beads'', ''reading picture books about machines and space'', ''observing backyard insects'', ''helping with simple kitchen tasks'']'
  career_goals: Even at four, Trey likes to imagine himself as a builder or astronaut, talking about constructing rockets and tall towers. His curiosity about how things work, paired with his practical
    habit of planning ahead, points toward future ambitions in engineering, design, or any field where he can create and solve problems.
