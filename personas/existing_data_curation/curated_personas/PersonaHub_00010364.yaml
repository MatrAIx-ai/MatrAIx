persona_description: A local government official responsible for managing stormwater runoff and water quality control in a community. This person is responsible for ensuring that dry detention ponds are
  designed and implemented in accordance with local stormwater quantity control requirements, and that they provide adequate water quality benefits. They are also responsible for coordinating with other
  stormwater treatment practices to provide a comprehensive solution to stormwater management. This person may have experience with the Connecticut Department of Transportation Drainage Manual and the Water
  Environment Federation and American Society of Civil Engineers manuals and reports on stormwater management systems.
