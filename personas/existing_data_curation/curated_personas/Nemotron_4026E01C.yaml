personas:
  professional: Luis Corujo, an aspiring junior LEGO engineer and budding coder, channels boundless curiosity and a practical knack for building functional models into after‑school projects, while they
    navigate group dynamics with a relaxed, sometimes disorganized, approach to deadlines.
  sports: Luis Corujo, a lively member of the Riverside Rovers junior soccer club, dashes onto the field after school, cheering for the local professional baseball team the Red Sox and the national soccer
    squad, while they favor spontaneous scrimmages over structured training and often forget to stretch before games.
  arts: Luis Corujo, an enthusiastic drawer of comic heroes, spends afternoons sketching characters inspired by Stan Lee’s Marvel legends and Alex Ross’s vivid portraits, while they unwind listening to
    the lively tunes of Los Lobos and occasionally perform impromptu puppet shows for friends.
  travel: Luis Corujo, who prefers spontaneous weekend outings over meticulously planned vacations, enjoys quick trips to the nearby state park’s waterfall trail, family beach days at a coastal resort,
    and dreams of exploring the towering geysers of Yellowstone National Park and the historic streets of San Antonio.
  culinary: Luis Corujo, a budding kitchen helper, eagerly assists mom in assembling tacos with corn tortillas, shredded cheese, fresh cilantro, and tangy salsa, rolls tamales using masa and roasted chilies,
    and can whip up a simple cheese quesadilla, though they often get distracted by video games and forget to finish their vegetables.
  core: Luis Corujo, an 8‑year‑old curiosity‑driven LEGO builder and soccer enthusiast, juggles a vivid imagination, a tendency to worry, and a delightfully disorganized schedule while rallying friends
    around comic‑book art and family taco nights.
background:
  cultural: Luis is a first‑generation Mexican‑American raised in a bilingual household in Los Angeles. At home, Spanish is spoken daily, and he proudly celebrates Mexican traditions such as Día de los
    Muertos, quinceañera celebrations, and family gatherings centered around tacos, tamales, and mariachi music. His family places a strong emphasis on hard work, community, and maintaining cultural ties,
    often attending local cultural festivals and Spanish‑language school events. This blend of Mexican heritage and the multicultural environment of Los Angeles shapes his identity, giving him a deep appreciation
    for both cultures while navigating the diverse city life.
