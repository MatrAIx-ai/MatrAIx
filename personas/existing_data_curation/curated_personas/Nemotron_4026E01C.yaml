  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing'', ''Educational video games'', ''Park exploration'', ''Listening to Mexican music'', ''Cooking with family'']'
  career_goals: Luis dreams of becoming a video game designer who can create fun games for his friends, but he also imagines playing soccer at a high level. He is curious about science and sometimes thinks
    about becoming a doctor to help people in his community. While his ambitions are still playful, he wants a future where he can use technology and teamwork to make a positive impact, especially for families
    like his own.
