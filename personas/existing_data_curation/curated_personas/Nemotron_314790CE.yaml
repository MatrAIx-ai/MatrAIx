personas:
  professional: Richard Attig, a disciplined sales veteran with three decades of wholesale and manufacturing expertise, blends his curiosity for emerging analytics with a practical, Lean‑Six Sigma approach
    to translate complex specs into clear ROI stories, meticulously plans accounts in CRM, and now seeks a regional leadership role to mentor reps while spearheading a digital sales‑forecasting overhaul.
  sports: Richard Attig, an avid fly‑fisher who joins the Lakeside Anglers Club each spring, also enjoys weekend rounds at the nearby country club’s nine‑hole golf course and follows the Green Bay Packers
    and Chicago Cubs, though he prefers the quiet of shoreline casting over crowded stadiums.
  arts: Richard Attig finds artistic inspiration in the historical paintings of Norman Rockwell, the storytelling folk songs of Woody Guthrie, and the classic westerns of John Wayne, often listening to
    their soundtracks while restoring furniture and attending the local community theater’s monthly performances.
  travel: Richard Attig plans his voyages with the precision of a project manager, favoring road‑trips in his restored 1965 Mustang to Civil War battlefields such as Gettysburg and Vicksburg, weekend retreats
    at a cabin on Lake Champlain, and a long‑awaited pilgrimage to the historic streets of Savannah, where he balances a modest budget with a desire for immersive history.
  culinary: Richard Attig, an accomplished home cook, enjoys grilling freshly caught trout seasoned with dill and lemon, slow‑cooking a Sunday pot roast with root vegetables, and occasionally experimenting
    with a smoky rub for ribs, all prepared on a handcrafted wooden cutting board he built himself.
  core: Richard Attig, a meticulous yet solitary craftsman‑sales professional, channels his curiosity and high standards into leadership aspirations while juggling a penchant for vintage car parts, occasional
    overspending on hobby supplies, and a habit of solving crosswords late into the night.
background:
  cultural: Richard was born and raised in Middle Tennessee, growing up in a multi‑generational white Southern family that values community, family, and modesty. His upbringing emphasized education, hard
    work, and a respect for tradition, shaped by the region’s agricultural and manufacturing heritage. He attended a state university for his STEM degree, where he cultivated a practical curiosity that
    blends new ideas with proven methods. The local culture of Southern hospitality and church involvement influences his cooperative yet assertive interpersonal style, and his participation in regional
    history and heritage projects reflects a deep connection to his Tennessee roots.
