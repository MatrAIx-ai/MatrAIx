  career_goals: Although retired, Alicia aims to author a memoir that captures her family’s multigenerational history and the cultural shifts she has witnessed. She hopes to mentor younger volunteers at
    the senior center, spearhead a community‑garden project that showcases sustainable desert gardening, and champion mental‑health resources for seniors in Green Valley. Additionally, she envisions creating
    a small line of handcrafted blankets and scarves whose sales support local charitable causes.
