personas:
  professional: Claudia Ryan, a 20‑year‑old front‑line housekeeper at a boutique hotel in Columbia, leverages their eco‑friendly cleaning expertise, precise inventory tracking, and knack for arranging spaces
    to accentuate natural light, while quietly critiquing sloppy protocols and suggesting efficiency upgrades that satisfy their competitive, detail‑obsessed nature.
  sports: Claudia Ryan, a casual fitness enthusiast, attends morning spin classes at the Columbia YMCA, follows the Charlotte Hornets and the Carolina Panthers on television, jogs along Lake Murray during
    spring, and plays occasional pickup soccer with the local Columbia Lady Lions club, all while preferring low‑impact workouts that fit their schedule and modest competitive drive.
  arts: Claudia Ryan, an avid museum‑goer, spends weekends sketching the Columbia Museum of Art’s contemporary installations, draws inspiration from indie folk icons like Sufjan Stevens and Phoebe Bridgers,
    and curates their living space with prints from local painter Amelia Rivera, using art as a quiet refuge from their daily routine.
  travel: Claudia Ryan, a budget‑conscious wanderer, meticulously plans weekend road trips to Asheville’s mountain retreats and Savannah’s historic squares using Airbnb stays, while dreaming of a spring
    adventure in Edinburgh, balancing their limited student income with a desire for cultural immersion and occasional spontaneous detours.
  culinary: Claudia Ryan, an enthusiastic home cook, expertly whips up shrimp‑and‑grits seasoned with smoked paprika and fresh thyme, while also experimenting with vegan sweet potato curry featuring coconut
    milk and cilantro, and often hunts thrift‑store kitchenware to perfect their low‑budget culinary creations.
  core: Claudia Ryan, a detail‑driven yet anxiety‑prone 20‑year‑old, balances a love for immaculate spaces and indie art with a habit of over‑scheduling their day and neglecting meals when stress peaks.
background:
  cultural: Claudia is a white Southern American who grew up in the Columbia, South Carolina area. Her upbringing reflects the blend of traditional Southern hospitality and the modern, multicultural vibe
    of a university town. She was raised with an appreciation for community events, church gatherings, and Southern cuisine, yet she also values self‑expression through art and music. The region’s emphasis
    on work ethic and resourcefulness shaped her practical approach to housekeeping, while the local art scene, including the Columbia Museum of Art and the Riverbanks Community Arts Center, fuels her curiosity
    for visual culture. She identifies with the Southern middle‑class experience, balancing respect for local traditions with a desire for personal growth and creative exploration.
attributes:
  skills: '["Professional cleaning and sanitation", "Eco-friendly cleaning product knowledge", "Time management and scheduling", "Inventory control", "Attention to detail and maintenance reporting", "Customer
    service and client communication", "Basic digital scheduling tools", "Aesthetic arrangement and visual presentation"]'
  hobbies: '["Visiting art museums and galleries", "Sketching and drawing", "Reading contemporary art and design literature", "Indie folk music listening", "Mindfulness meditation", "Crossword puzzles and
    sudoku", "Journaling", "Thrift-store décor hunting", "DIY home décor projects", "Small-group board games and coffee gatherings"]'
  career_goals: Claudia aspires to advance from a front‑line housekeeper to a supervisory role within a hospitality or institutional setting. She aims to obtain a certification in facilities management
    or commercial cleaning, and eventually launch her own small cleaning and organization service that emphasizes environmentally responsible practices. Her interest in art also motivates her to explore
    custodial positions in museums or galleries, where she can combine her cleaning expertise with her appreciation for visual culture. Long‑term, she hopes to manage a team, develop efficient cleaning
    protocols, and perhaps enroll in community‑college courses in business administration to support her entrepreneurial goals.
