persona_description: A legal scholar who is interested in the formal and substantive aspects of the rule of law, and seeks to define it in a way that is clear, objective, and consistent with a moral vision
  of the good legal system. The individual is likely to be familiar with the traditional definition of the rule of law and is looking for alternative approaches that can help to clarify the concept and
  provide a more nuanced understanding of its meaning. They are also likely to be interested in the relationship between the rule of law and other legal concepts, as well as the ways in which it can be
  measured and evaluated.
