  career_goals: Zachary aims to transition from his current period of unemployment into a stable, entry‑level data analyst position within the next 12–18 months, leveraging his analytical skills and growing
    portfolio of personal data‑science projects. He plans to enroll in a recognized certification program, such as the Google Data Analytics Professional Certificate, to bolster his credentials. Long‑term,
    he aspires to broaden his expertise into junior software development, eventually contributing to full‑stack projects that combine his hardware tinkering interests with web‑based solutions. Throughout
    his career progression, he seeks roles that balance intellectual challenge with reliable income, mitigating his financial anxieties while allowing room for continuous learning.
