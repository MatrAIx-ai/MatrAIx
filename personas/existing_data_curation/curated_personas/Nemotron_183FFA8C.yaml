personas:
  professional: Vilma Molina is a licensed civil engineer who blends a methodical, routine‑driven workflow with hands‑on DIY ingenuity, applying SAP2000, ETABS, and Revit to deliver code‑compliant, cost‑effective
    structures while leveraging bilingual communication to bridge diverse stakeholder groups, and they occasionally pull all‑nighters to meet tight city deadlines.
  sports: Vilma Molina jogs five miles through Pelham Bay Park each morning, attends a local yoga circle twice a week, supports the New York Yankees in baseball season and the New York Knicks in basketball,
    and belongs to the Bronx Striders running club, balancing a structured fitness routine with community sports enthusiasm.
  arts: Vilma Molina spends evenings in merengue and bachata dance classes, reveling in the rhythms of a celebrated Latin artist, enjoys contemporary fiction by Chimamanda Ngozi Adichie, and often attends
    off‑Broadway productions featuring Lin‑Manuel Miranda’s work, weaving cultural expression into a disciplined leisure schedule.
  travel: Vilma Molina favors well‑planned short getaways, often spending long weekends exploring Hudson Valley’s historic towns and sustainable architecture tours, while dreaming of a future trip to Copenhagen
    to study green building practices, and occasionally returns to their family’s island hometown for culinary reunions, balancing travel ambition with budget awareness.
  culinary: Vilma Molina delights in cooking hearty island staples such as sancocho, mangú, and arroz con pollo, frequently incorporating fresh plantains, cilantro, and achiote, and while their skill level
    is intermediate, they balance home‑cooked meals with occasional take‑out sushi or pizza when time constraints arise.
  core: Vilma Molina is a routine‑oriented civil engineer who merges analytical precision with a love for community dancing, island cooking, and sustainable design, while occasionally indulging in spontaneous
    home‑improvement projects.
background:
  cultural: Vilma Molina grew up in a close-knit Dominican household in the Bronx. Her parents emigrated from the Dominican Republic and instilled in her a strong sense of family, respect for tradition,
    and pride in her heritage. She is fluent in Spanish and English, which she uses to bridge cultural gaps in her professional and community activities. Dominican customs such as celebrating Semana Santa,
    sharing meals during family gatherings, and listening to merengue and bachata remain central to her identity. She participates in the annual Dominican Day Parade in New York City and contributes to
    local initiatives that preserve Dominican culture and support immigrant families. While she embraces the practical, routine-oriented aspects of her upbringing, she also honors the warmth, hospitality,
    and communal spirit characteristic of Dominican culture.
attributes:
  skills: '["Structural analysis (SAP2000, ETABS)", "BIM modeling (Revit, AutoCAD)", "Construction project management", "Cost estimation and budgeting", "Scheduling (Primavera P6)", "Quality assurance and
    inspections", "Regulatory compliance (NYC Building Code, OSHA)", "Data analysis (Excel, MATLAB)", "Professional Engineer licensure (NY)", "LEED Green Associate certification", "Bilingual communication
    (English, Spanish)", "Team coordination and stakeholder management", "Process optimization and risk assessment", "Technical report writing"]'
  hobbies: '["Morning jogging in Pelham Bay Park", "Yoga practice", "Cooking Dominican cuisine", "Merengue and bachata dancing", "DIY home improvement projects", "Woodworking", "Reading contemporary fiction",
    "Reading engineering and industry journals", "Volunteering as a STEM mentor for girls", "Attending local cultural festivals"]'
  career_goals: Vilma aims to deepen her expertise in sustainable infrastructure while advancing into senior leadership. Over the next five years she plans to obtain a Master's in Structural Engineering
    with a focus on resilient design, achieve senior project manager status on large-scale public works in the Bronx, and eventually qualify for a department head role within the NYC Department of Buildings.
    She is motivated by the desire to improve the safety and affordability of housing for her community, and she seeks to mentor junior engineers, particularly women and Hispanic professionals, to foster
    a more inclusive workforce. Long-term, she envisions establishing her own consulting firm that offers cost-effective, code-compliant solutions for small-scale developers, but she intends to pursue this
    only after solidifying her technical credentials and professional network.
