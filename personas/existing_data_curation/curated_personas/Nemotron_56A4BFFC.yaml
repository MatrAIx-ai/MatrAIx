  hobbies: '[''Garden tending (vegetables, flowers)'', ''Quilting and textile crafts'', ''Reading historical fiction and biographies'', ''Genealogy research'', ''Birdwatching'', ''Crossword puzzles'', ''Book
    club participation'', ''Church choir singing'', ''Volunteering at food pantry'', ''Neighborhood potluck organization'']'
  career_goals: Although she is not currently employed in the formal labor market, Michelle aims to leverage her organizational talent and community connections to lead initiatives that benefit her hometown.
    She plans to establish a community garden program that provides fresh produce for low‑income families, create a senior‑support network that offers companionship and assistance, and curate a local history
    exhibit at the Henderson public library to preserve the region's heritage. Additionally, she aspires to write and self‑publish a family genealogy book, mentor younger women interested in volunteer leadership,
    and conduct workshops on budgeting and home management for local residents.
