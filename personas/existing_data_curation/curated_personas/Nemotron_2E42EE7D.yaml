personas:
  professional: Leslie Peterson, an 8‑year‑old budding storyteller, channels curiosity and practicality into leading classroom group projects where they illustrate comic‑style explanations for science lessons,
    thriving on peer attention despite occasional disorganization.
  sports: Leslie Peterson dashes around the field for the Bayou City Juniors Soccer Club, cheers loudly for the New Orleans Saints during football season, and follows the New Orleans Pelicans on TV while
    dreaming of one day dribbling a basketball in a national youth league.
  arts: Leslie Peterson fills sketchbooks with cartoons inspired by Bill Watterson’s Calvin and Hobbes and Studio Ghibli’s Totoro, listens to pop hits by Ariana Grande and R&B grooves from Beyoncé while
    drawing, and loves performing skits in school talent shows channeling Zendaya’s stage presence.
  travel: Leslie Peterson loves weekend road trips down the nearby bayou to collect shells at the marsh, day trips to the state aquarium in New Orleans, and dreams of flying to Disney World in Florida and
    exploring the historic castles of Scotland with family, balancing a love for adventure with the need to stay within a modest kids’ travel budget.
  culinary: Leslie Peterson's palate favors cheesy macaroni, crispy chicken nuggets, and sweet banana‑strawberry smoothies, they proudly attempt homemade pizza topped with pepperoni and bell peppers, and
    they delight in fresh mango slices and the occasional shrimp gumbo after a bayou expedition.
  core: Leslie Peterson is an exuberant 8‑year‑old who thrives on being the center of attention, blends relentless curiosity with a laid‑back, sometimes messy approach to plans, and balances a competitive
    spark with a vivid imagination.
background:
  cultural: Leslie grows up in a close‑knit African‑American family in Tallulah, Louisiana, surrounded by the rich traditions of the Mississippi Delta region. Family gatherings often feature soulful music,
    shared meals of Southern comfort food, and oral storytelling that celebrate resilience and community. The local church and community events provide a supportive network, and the natural landscape of
    bayous and farmlands informs her curiosity about the environment. These cultural influences shape her values of togetherness, perseverance, and a love for shared narratives.
attributes:
  skills: '[''Strong oral storytelling'', ''Age‑appropriate reading comprehension'', ''Improvisational game facilitation'', ''Basic cooking assistance'', ''Puzzle solving and logical thinking'', ''Leadership
