  hobbies: '[''Reading picture books and comics'', ''Drawing cartoons and doodles'', ''Playing soccer with friends'', ''Dancing to pop and R&B music'', ''Exploring the bayou and collecting shells'', ''Building
    with Legos and puzzles'', ''Participating in school talent shows'', ''Listening to storytelling podcasts'']'
  career_goals: Leslie dreams of one day becoming a scientist or doctor who can explore the wetlands of Tensas Parish and help keep her community healthy. She also imagines being a teacher who shares exciting
    discoveries with other kids, winning school science fairs, and speaking confidently in front of an audience to inspire friends to ask questions and think critically.
