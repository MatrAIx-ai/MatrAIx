  career_goals: Andres aims to transition from managing a single establishment to overseeing multiple locations as a regional manager within the next five years, leveraging his deep operational knowledge
    and people‑focused leadership style. He also dreams of eventually opening a family‑run Mexican‑American restaurant that celebrates his heritage while offering innovative dishes. Achieving ServSafe certification
    and participating in community culinary workshops are steps he sees as vital to both professional growth and reducing the stress he sometimes feels in his current role.
