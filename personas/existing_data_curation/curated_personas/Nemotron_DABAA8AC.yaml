  career_goals: Alicia aims to transition from a packager to a supervisory role in logistics, eventually earning a bachelor's degree in Supply Chain Management or Industrial Engineering. She plans to obtain
    Lean Six Sigma certification and a Certified Packaging Professional credential to deepen her expertise in efficient and sustainable packaging. Long‑term, she hopes to become a packaging engineer focused
    on eco‑friendly material design, blending her creative interests with technical solutions. She also envisions launching a niche consulting service that helps small manufacturers develop aesthetically
    appealing, environmentally responsible packaging, positioning herself as a competitive leader in the industry.
