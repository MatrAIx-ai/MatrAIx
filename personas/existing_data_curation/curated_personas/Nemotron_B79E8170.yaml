  hobbies: '["Reading (mystery & self-help)", "Nature Walks and Hiking", "Gardening", "Photography", "Journaling", "Yoga and Meditation", "DIY Home Improvement Projects", "Podcast Listening (real estate
    and personal finance)"]'
  career_goals: Megan aims to earn a real‑estate license and become a Certified Manager of Community Associations (CMCA) within the next three years, positioning herself for a senior management role or
    to launch her own boutique property‑management firm focused on affordable housing in rural Illinois. She plans to pursue an associate’s degree in business administration or real‑estate studies to complement
    her hands‑on experience, and she hopes to cultivate a reputation as a reliable, detail‑oriented manager who can balance community needs with financial sustainability. Ultimately, she wants a career
    that offers stability, professional growth, and the flexibility to maintain her quiet, independent lifestyle.
