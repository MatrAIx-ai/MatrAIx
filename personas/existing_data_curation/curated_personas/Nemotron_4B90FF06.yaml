  career_goals: Now retired, Ahmad's primary ambition is to stay actively engaged in his community while preserving his legacy. He aims to volunteer regularly at his local church and the senior center,
    mentor youth in trades and life‑skills, and document his family’s history through oral storytelling and a written memoir. He also hopes to enroll in a community‐college class on genealogy or digital
    archiving to deepen his research skills, and to maintain his health through daily walks and a balanced routine.
