  hobbies: '["Gardening", "DIY Home Improvement Projects", "Spontaneous Cooking Experiments", "Hiking", "Reading Mystery and Thriller Novels", "Participating in Trivia Nights", "Volunteering at Community
    STEM Workshops", "Singing in Church Choir"]'
  career_goals: Tamako aims to re-enter the workforce on her own terms, targeting part-time freelance technical writing and data-consulting projects that allow her to balance professional growth with personal
    responsibilities. She plans to earn a certification in data analytics within the next year and to launch a community-based STEM mentorship program for girls in Cobb County, positioning herself as a
    leading mentor and seeking opportunities to win local entrepreneurship competitions. Long-term, she aspires to build a modest consulting business that provides reliable income while giving back to the
    African-American community that shaped her, ultimately achieving financial independence and stability for herself and any dependents.
