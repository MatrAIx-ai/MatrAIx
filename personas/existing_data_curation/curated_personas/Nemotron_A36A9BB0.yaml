personas:
  professional: A claims adjuster and investigator, Jose Tinoco leverages advanced Excel and PowerBI analytics, bilingual negotiation skills, and his methodical, skeptical mindset to dissect complex fraud
    cases while his curiosity and sociable nature keep him engaged in cross‑functional teamwork and continual learning.
  sports: An avid soccer player in the South Beach Strikers community league, Jose Tinoco also joins seasonal group hikes along the Intracoastal Waterway, roots for the Miami Heat and Miami Marlins, and
    balances his competitive drive on the field with a disciplined weekly cardio routine that includes beach sprints and yoga.
  arts: A frequent visitor to Wynwood Walls and the Pérez Art Museum Miami, Jose Tinoco channels his curiosity into photography, experimenting with long‑exposure street shots inspired by Steve McCurry while
    also attending Caribbean cultural festivals that feature the music of Lin‑Manuel Miranda and the paintings of Jean‑Michel Basquiat, enriching his visual storytelling and community mentorship.
  travel: With a preference for structured itineraries, Jose Tinoco has explored the historic streets of San Juan, the vibrant markets of Cartagena, and frequently road‑trips to the Florida Keys, while
    his wish list includes a culinary pilgrimage to Barcelona and a safari adventure in Tanzania, balancing his love of cultural immersion with family budget considerations.
  culinary: An enthusiastic home chef, Jose Tinoco masters traditional dishes like mangu, sancocho, and grilled mahi‑mahi seasoned with adobo, regularly experimenting with plantains, yucca, and fresh citrus,
    and while his cooking skill is intermediate, he often hosts potluck gatherings where his signature pineapple‑glazed pork ribs become the talk of the neighborhood.
  core: Jose Tinoco is a methodical, curiosity‑driven claims investigator whose competitive edge fuels both his professional achievements and his penchant for trivia night domination, yet his emotional
    reactivity sometimes spirals into late‑night anxiety bouts and impulsive art purchases.
background:
  cultural: Jose is a first‑generation Dominican American, born to parents who emigrated from the Dominican Republic. He grew up bilingual, speaking Spanish at home and English at school, and maintains
    strong ties to the Dominican community in St. Johns County. His cultural identity is marked by celebrations of Dominican holidays such as Independence Day and Carnaval, a love for merengue and bachata
    music, and a deep appreciation for the island’s culinary traditions. Raised in a Catholic family, he values familial loyalty, hospitality, and communal support. Living in Florida’s multicultural environment,
    Jose blends his Caribbean heritage with the diverse influences of his neighborhood, often acting as a cultural liaison at community events and infusing his professional interactions with the warmth
    and resilience characteristic of his background.
