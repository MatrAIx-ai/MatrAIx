personas:
  professional: Edeltraut Johnson is a veteran commercial aviator turned senior safety manager, leveraging 18,000 flight hours, advanced avionics expertise, and a hands‑on, rules‑focused yet adaptable leadership
    style to mentor crews and steer safety culture at a regional airline.
  sports: Edeltraut Johnson spends Saturdays sailing with the Cape Coral Yacht Club, afternoons power‑boating on the Gulf, and Sundays playing 18‑hole rounds at the Cape Coral Country Club, while cheering
    on the Tampa Bay Buccaneers and the Florida Panthers and occasionally joining local amateur golf tournaments.
  arts: Edeltraut Johnson plays rhythm guitar in a community cover‑band that belts out classics from The Rolling Stones and Fleetwood Mac at local festivals, and enjoys attending live concerts featuring
    the Foo Fighters and exploring art fairs showcasing works by Florida artist John Storrs.
  travel: Edeltraut Johnson prefers spontaneous weekend getaways—cruising to Key West, chartering a plane to the Bahamas, or road‑tripping to Nashville—while maintaining a wish list that includes a scenic
    aerial survey over the Swiss Alps and a family sailing expedition to the Florida Keys.
  culinary: Edeltraut Johnson excels at grilling, favoring a signature rub of smoked paprika, garlic, and lime on fresh Gulf snapper, alongside classic smoked brisket and homemade coleslaw, while also indulging
    in stone crab claws and a glass of local craft IPA during weekend barbecues.
  core: Edeltraut Johnson is a structured yet easy‑going aviator who channels a love of community, high‑performance machinery, and barbecue smoke into a life of mentorship, sail‑filled weekends, and the
    occasional health‑check slip‑up.
background:
  cultural: Edeltraut was born and raised in a small Midwestern town in Ohio to a family of German‑Irish ancestry. His parents emphasized hard work, self‑reliance, and a strong sense of community, values
    that were reinforced when he enlisted in the United States Air Force after high school and earned his wings as a transport pilot. The military culture instilled a respect for rules, teamwork, and adaptability,
    which he carried into his civilian aviation career. After leaving the service he chose to settle in Cape Coral, Florida, drawn by the region’s maritime lifestyle and vibrant social scene. He now blends
    his Midwestern work ethic and traditional American values with the laid‑back, outdoor‑oriented culture of Southwest Florida, actively participating in local boating, aviation, and community events.
attributes:
  skills: '["Airline Transport Pilot (ATP) certificate", "Multiple type ratings (Boeing 737, Airbus A320, Embraer ERJ-145)", "Certified Flight Engineer (turboprop)", "Advanced navigation and avionics (GPS,
    FMS, autopilot)", "Crew Resource Management (CRM) facilitation", "FAA regulatory compliance (Part 121, Part 135)", "Safety management system implementation", "Incident investigation and reporting",
    "Pre‑flight inspection and aircraft systems troubleshooting", "Flight planning and performance calculations", "Mentoring and technical training of pilots and mechanics", "Basic aircraft maintenance"]'
  hobbies: '["Sailing and power‑boating", "Salt‑water fishing", "Local pilot association involvement (fly‑ins, aircraft‑restoration events)", "Classic car restoration (1965 Chevrolet Impala)", "Hosting
    barbecues and social gatherings", "Playing rhythm guitar in community band", "Volunteer fire department support", "Golf", "Model aircraft building", "Attending live‑music concerts"]'
  career_goals: At this stage Edeltraut is focused on turning his extensive flight experience into roles that combine operational stability with personal flexibility. He aims to obtain a senior safety‑management
    or flight‑operations position with a regional airline or a charter company in Southwest Florida, where he can shape safety culture, oversee crew training, and streamline flight‑planning processes. Simultaneously
    he plans to launch a part‑time flight‑instruction and mentorship program at his local flight school, targeting veterans and aspiring pilots from the community. He is also exploring an FAA waiver to
    operate unmanned aerial systems for aerial surveying, expanding his skill set into emerging aviation technologies. In the long term he hopes to transition to a consulting role that allows him to advise
    on safety policy while maintaining a flexible schedule that lets him continue flying recreationally and spend quality time with his family.
