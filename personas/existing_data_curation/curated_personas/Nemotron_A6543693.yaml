    ''Basic cybersecurity awareness for surveillance systems'', ''Team coordination and communication'', ''Adaptability to shifting priorities'']'
  hobbies: '[''Gulf-coast fishing'', ''Bird‑watching in local marshes'', ''Electronics hobbyist (building home automation/security devices)'', ''Reading true‑crime books and listening to tech podcasts'',
    ''Playing strategy video games'', ''Small‑group barbecues with family and close friends'', ''Gardening (tomatoes, herbs)'', ''Neighborhood watch volunteering'']'
  career_goals: Joshua aims to advance to a senior surveillance supervisor or security manager role within the casino industry, where he can shape advanced monitoring protocols and mentor junior staff.
    He plans to earn a bachelor’s degree in criminal justice or security management and pursue professional certifications such as Certified Protection Professional (CPP) and Association of Threat Assessment
    Professionals (ATAP). Cross‑training in cybersecurity to safeguard surveillance infrastructures is also a priority. While ambitious, he seeks a position that offers a flexible schedule and a supportive
    leadership style, allowing him to maintain family time and manage his stress levels.
