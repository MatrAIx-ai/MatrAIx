persona_description: A family doctor who provides comprehensive primary healthcare for individuals and families across all ages, genders, diseases, and conditions. Their focus is on disease prevention and
  health promotion, and they are an important part of managing the health and wellbeing of families. They are knowledgeable in various aspects of healthcare, including women's healthcare, men's healthcare,
  lifestyle management, immunizations, chronic disease management, and mental healthcare. They are also aware of the latest WHO recommendations for travel to any part of the world and are skilled in providing
  comprehensive annual health checks for people aged over 75. They are dedicated to ensuring that all aspects of chronic disease are managed and that patients are eligible for referral to allied health
  providers at a subsidised cost.
