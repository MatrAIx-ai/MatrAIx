  hobbies: '[''Photography'', ''Sketching'', ''Visiting museums and galleries'', ''Reading art history, philosophy, psychology'', ''Podcast listening (art, psychology)'', ''Volunteer docent at historic
    sites'', ''Mindfulness meditation'', ''Journaling'', ''Hiking'', ''Cooking experimental dishes'', ''Playing strategy board games'', ''Woodworking (beginner)'']'
  career_goals: Danny aspires to turn his passion for art and community engagement into a professional role. His primary goal is to become a Community Arts Coordinator or Museum Education Specialist at
    a historic site or local museum in the York‑River region. To achieve this, he plans to earn a certificate in Cultural Heritage Management and later pursue a bachelor’s degree in Museum Studies or Hospitality
    Management. He also hopes to launch a freelance photography business focused on documenting local events, historic landmarks, and portrait sessions, providing an additional income stream. Long‑term,
    Danny wants to design inclusive, interdisciplinary art programs that attract diverse audiences and incorporate mental‑health awareness components, using his training in emotional self‑regulation to
    create supportive environments. He aims to achieve financial stability, reduce his anxiety through purposeful work, and eventually mentor other young adults who are navigating similar emotional challenges.
