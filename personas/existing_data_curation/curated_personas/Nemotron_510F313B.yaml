personas:
  professional: Betty Reed, a seasoned full‑stack developer with deep expertise in Python, JavaScript, React, Node.js, and cloud‑native AWS deployments, channels their competitive drive and curiosity into
    leading Agile scrum teams, mentoring junior engineers, and architecting sustainable, user‑centric software solutions that blend data visualizations with generative art.
  sports: Betty Reed, an avid hiker and weekend kayaker who also attends yoga classes, channels their competitive streak by training for a half‑marathon with the local Seattle Striders running club, cheering
    on the Seattle Seahawks in football season and the Seattle Kraken during hockey playoffs, and they often join group climbs organized by the Washington Alpine Club.
  arts: Betty Reed, who splits time between oil painting mist‑laden coastlines and coding generative art installations, finds inspiration in Ansel Adams’ black‑and‑white landscapes, the ambient soundscapes
    of Brian Eno, the indie folk of Fleet Foxes, and they regularly volunteer as a stagehand at the Olympia Community Theatre, while attending screenings of films by directors like Kelly Reichardt at the
    Olympia Film Festival.
  travel: Betty Reed plans eco‑conscious getaways with a mix of meticulous itinerary work and spontaneous detours, favoring destinations such as the San Juan Islands for kayaking, Iceland’s geothermal plains
    for landscape photography, and weekend road trips to Portland’s food carts; they leverage a travel rewards credit card to offset flights and stay in certified green hotels, yet they sometimes postpone
    longer trips due to demanding project deadlines.
  culinary: Betty Reed, an intermediate home cook who loves the Pacific Northwest’s bounty, frequently prepares cedar‑plank salmon with dill, forages local mushrooms for a rosemary‑quinoa risotto, and enjoys
    pairing meals with a glass of pinot noir, though they often skip dessert in favor of a late‑night espresso and have a habit of over‑seasoning dishes with sea salt.
  core: Betty Reed blends tech mastery with artistic curiosity, balancing competitive ambition and environmental stewardship, while juggling a love for mountain trails, generative code, and a habit of over‑caffeinating
    during late‑night debugging sessions.
background:
  cultural: Betty grew up in a middle‑class white family in the Pacific Northwest, where a strong sense of environmental stewardship and progressive community values shaped her worldview. Her upbringing
    blended the region’s tech‑forward culture with a deep appreciation for the natural landscape and local Indigenous art traditions. Living in Olympia, she participates in regional cultural events such
    as the Olympia Film Festival and the annual Evergreen State Fair, reflecting a balanced respect for both modern innovation and the area’s cultural heritage. This background informs her collaborative
    yet critically analytical approach to both her professional and personal pursuits.
