  career_goals: Betty aims to transition into a technical leadership role, such as Lead Architect or Engineering Manager, where she can shape product strategy around innovative, user‑centric experiences.
    She is driven to champion sustainability‑focused software initiatives that align with the Pacific Northwest’s environmental ethos. Over the next five years, she plans to earn an advanced certification
    in cloud architecture, speak at regional tech‑art conferences, and launch a side venture that merges interactive art installations with real‑time data streams. Additionally, she is passionate about
    increasing female representation in tech and envisions building mentorship programs for women developers in her community.
