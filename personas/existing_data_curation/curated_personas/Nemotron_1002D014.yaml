personas:
  professional: James Hunter is a methodical teen aspiring IT support specialist who leverages his knack for troubleshooting home networks, spreadsheet budgeting, and hands‑on model‑building to deliver
    reliable solutions, while their disciplined journaling habit keeps their intense emotions in check as they plan each step toward a community‑college certification.
  sports: James Hunter hikes the Laguna Mountains on weekends as a member of a local trail club, follows the San Diego Padres and LA Galaxy avidly, occasionally joins a community basketball pickup game,
    and uses a fitness tracker to log elevation gains, merging love of nature with structured physical activity.
  arts: James Hunter channels creative energy into building scale model kits, sketching technical drawings in a worn sketchbook, devouring sci‑fi novels by authors like Isaac Asimov, and listening to the
    cinematic scores of Hans Zimmer and video‑game soundtracks from Civilization VI, which together shape a disciplined yet imaginative artistic identity.
  travel: James Hunter plans trips with spreadsheet precision, has already explored Joshua Tree and the coastal towns of San Diego, dreams of backpacking through Iceland’s volcanic landscapes to photograph
    geysers, and prefers itineraries that balance structured sightseeing with spontaneous hiking detours.
  culinary: James Hunter enjoys the exactness of cooking simple but precise meals such as perfectly timed grilled chicken tacos, homemade stir‑fried ramen with measured broth ratios, and baking chocolate
    chip cookies down to the gram, often experimenting with new ingredients like matcha powder while budgeting for grocery costs.
  core: James Hunter is a detail‑obsessed teen who blends a love for orderly model‑building, strategic gaming, and methodical study with intense emotional swings, using journaling and budgeting as anchors
    to navigate a quest for a stable tech career.
background:
  cultural: James grew up in Valley Center, a suburban community in San Diego County with a predominantly white, middle‑class demographic. His family traces its roots to the American Midwest, emphasizing
    self‑reliance, practicality, and a strong work ethic. The Californian setting has introduced him to a blend of outdoor recreation and multicultural influences, especially the regional Hispanic presence,
    which informs his appreciation for community festivals and diverse cuisine. While he celebrates mainstream American holidays such as Independence Day and Thanksgiving, he also partakes in local events
    like the Valley Center Farmer's Market and coastal beach clean‑ups. This mix of traditional Midwestern values and Southern‑California lifestyle shapes his practical outlook and his balanced approach
    to new ideas and established methods.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Home network setup'', ''Spreadsheet budgeting and planning'', ''DIY home repairs'', ''Model kit construction'', ''Basic automotive maintenance'', ''Technical
