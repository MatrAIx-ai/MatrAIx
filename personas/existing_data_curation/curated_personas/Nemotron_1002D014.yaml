  hobbies: '[''Model kit building'', ''Strategy video gaming'', ''Hiking in the San Diego County area'', ''Science‑fiction reading'', ''Coding small Python projects'', ''Journaling for emotional health'',
    ''Technical sketching'', ''Participating in community volunteer events'']'
  career_goals: James aims to complete his GED within the next year and enroll in a community‑college program that leads to a certification in information technology or a skilled‑trade field such as automotive
    technology or HVAC servicing. He seeks a stable, well‑structured career that offers clear advancement paths and financial security, which he believes will help alleviate his anxiety. Ultimately, he
    hopes to become a certified IT support specialist or a certified technician, allowing him to apply his practical curiosity while maintaining a predictable work environment. He also values the ability
    to continue learning new tools and technologies, balancing his love for new ideas with the practicality of a steady income.
