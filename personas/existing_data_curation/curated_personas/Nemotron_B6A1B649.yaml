personas:
  professional: Jie Zhang, an aspiring digital storyteller, blends intricate fantasy illustration with beginner coding on Scratch to craft short visual novels, and they showcase a meticulous yet imaginative
    approach that reflects their love for novelty and organized creativity.
  sports: Jie Zhang pursues solitary early‑morning bike rides and weekend swimming laps for fitness, passionately supports the Los Angeles Lakers, and they participate in the school’s beginner track club
    during spring, treating each activity as a personal challenge rather than a social event.
  arts: Jie Zhang immerses themselves in artistry by sketching elaborate fantasy realms inspired by Studio Ghibli and the luminous worlds of Hayao Miyazaki, practicing calligraphy in a disciplined brush‑stroke
    style, playing piano pieces by Ludwig van Beethoven and Yiruma, and they frequently visit exhibitions featuring digital creator Beeple.
  travel: Jie Zhang prefers meticulously planned family trips that balance quiet museum visits with moments of adventure, having recently explored Iceland’s Golden Circle and the historic streets of Kyoto,
    and they dream of a solo backpacking journey through the Scottish Highlands once older.
  culinary: Jie Zhang enjoys experimenting with homemade sushi rolls filled with tuna and avocado, crafts fragrant ramen bowls with miso broth and soft‑boiled eggs, and they frequently snack on crisp apple
    slices, yet often hoards secret chocolate chip cookies for late‑night study sessions.
  core: Jie Zhang, a solitary prodigy who channels boundless imagination into fantasy art while obsessively solving Rubik’s Cubes and meticulously budgeting allowance for LEGO upgrades, they often forget
    to take breaks and occasionally hoard stray pens.
background:
  cultural: Jie comes from a Chinese immigrant family that values education, artistic expression, and cultural heritage. At home, Mandarin is spoken regularly, and traditional customs such as Chinese New
    Year celebrations, moon‑cake making, and calligraphy practice are part of his upbringing. Living in Foxboro, Massachusetts, he navigates a blend of East Asian familial traditions and New England community
    life, attending a public middle school with a diverse student body. This bicultural environment shapes his respect for discipline, his curiosity about global perspectives, and his creative synthesis
    of Chinese artistic motifs with contemporary Western media.
