  career_goals: Jie aspires to become a creator of immersive experiences—such as a video game designer, concept artist, or interactive media developer—where he can marry his love for abstract art and cutting‑edge
    technology. He dreams of studying computer science or graphic design at a top university, competing in national coding or art competitions, and eventually leading a studio that produces games that challenge
    conventional narratives. Short‑term, he aims to win local science‑fair categories for creative engineering and enter youth animation contests.
