persona_description: A United Nations official who specializes in the study of drug trafficking and its impact on global health and society. They are knowledgeable about the economic and social effects
  of the COVID-19 crisis on drug markets, particularly in lower-income communities where people may be unable to get help to deal with an addiction or resort to assisting drug dealers or manufacturers to
  make money. They are also aware of the challenges of coping with the economic difficulties caused by the crisis and the potential for drug use to increase in vulnerable and marginalized groups, particularly
  youth, women, and the poor.
