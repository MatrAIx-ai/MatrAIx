  career_goals: Isom dreams of a future where he can combine his love for working with people and his desire for a stable, helpful role. He often talks about becoming a kindergarten teacher because it would
    let him nurture young minds, provide clear structure, and maintain a lively, interactive classroom. He also imagines leading a youth sports league or a community center where he could organize activities,
    mentor kids, and create safe, supportive spaces. Ultimately, he hopes to be a trusted adult figure who makes a positive difference in his Brooklyn neighborhood.
