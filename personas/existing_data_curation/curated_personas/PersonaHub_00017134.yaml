persona_description: A mental health professional who specializes in the study of mental illness, particularly schizophrenia and its associated metabolic syndrome. The individual has conducted research
  on the prevalence and risk factors of metabolic syndrome among individuals with severe mental illnesses, and has presented their findings in medical journals. They are concerned about the high prevalence
  of metabolic syndrome in individuals with mental illness and believe that it is a risk factor for early heart disease and death. They advocate for the need for rigorous screening for metabolic syndrome
  in individuals with any form of major psychiatric disorder.
