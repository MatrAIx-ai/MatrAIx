persona_description: A person with a strong interest in the human body and its systems, particularly the circulatory system. They are curious about the functioning of the heart, lungs, kidneys, and liver,
  and how they work together to transport oxygen, nutrients, and waste products throughout the body. They are also interested in the role of the blood in the immune system and the effects of the human immunodeficiency
  virus on the T4 cells of the blood. They may also be interested in the respiratory system and how it relates to the physical structure of the lungs and the cells fed by the blood.
