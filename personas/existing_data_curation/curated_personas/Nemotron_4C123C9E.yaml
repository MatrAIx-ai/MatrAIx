  hobbies: '[''Classic car restoration'', ''Motorcycle customization'', ''Fishing'', ''Deer hunting'', ''Camping'', ''Attending car shows'', ''Go-kart racing'', ''Racing video games'', ''Acoustic guitar
    playing'', ''Woodworking'']'
  career_goals: Rene aims to become a Master ASE-certified technician within the next two years, focusing on hybrid and electric vehicle systems to position himself as a go-to expert in the region. He envisions
    moving into a lead-technician role, mentoring newer mechanics, and eventually stepping into service-department management. In the longer term, he hopes to open his own independent garage that blends
    classic car restoration with cutting-edge EV service, allowing him to combine his curiosity for new tech with his appreciation for proven methods.
