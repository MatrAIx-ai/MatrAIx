personas:
  professional: Rene White, a 25-year-old automotive service technician, leverages their knack for hands‑on diagnostics and welding to quickly restore classic cars and troubleshoot hybrid systems, while
    their relaxed attitude toward organization lets them improvise clever fixes on the fly, and their competitive streak pushes them to out‑perform colleagues in speed and quality.
  sports: Rene White fuels their competitive edge by racing go‑karts with the Ozark Speedsters club on weekends, cheering on the St. Louis Cardinals in baseball and the Dallas Cowboys in football, while
    also enjoying seasonal deer hunting, fishing on the St. Francis River, and hitting the local gym for functional strength training to stay ready for heavy lifts.
  arts: Rene White unwinds by strumming acoustic renditions of Johnny Cash and Lynyrd Skynyrd on their old Gibson, while admiring the work of automotive illustrator Ken Brown, watching the classic film
    Bullitt for inspiration, and collecting vintage concert posters from the 1970s.
  travel: Rene White plans spontaneous weekend road trips to regional car shows in Texas and Tennessee, while day‑dreaming about a future cross‑country drive to the Bonneville Salt Flats for a drift event
    and a tech tour of Norway's EV factories, balancing a limited budget with a love of open highways and campfire nights under the stars.
  culinary: Rene White, a competent home cook, often fires up the smoker for a dry‑rubbed brisket seasoned with paprika and coffee grounds, whips up a hearty chicken‑and‑dumpling stew on rainy evenings,
    and indulges in classic Southern biscuits with sausage gravy at local diners after a long day in the garage.
  core: Rene White blends a grease‑stained work ethic with a laid‑back, disorganized lifestyle, swapping engine bolts for a guitar pick at dusk, rarely missing a go‑kart race but frequently misplacing their
    toolbox.
background:
  cultural: Rene grew up in Forrest City, a tight-knit community in Lee County, Arkansas. His upbringing reflects the Southern rural culture of self-reliance, a strong work ethic, and a deep appreciation
    for community gatherings like county fairs and high-school football tailgates. Family traditions include barbecues, country-music evenings, and stories of generations of hands-on trades. While rooted
    in these Southern values, Rene also embraces modern automotive culture, staying current with new vehicle technologies and online mechanic forums. This blend of traditional Southern hospitality and a
    forward-looking technical mindset shapes his worldview.
attributes:
  skills: '[''Engine diagnostics'', ''Brake system repair'', ''Transmission servicing'', ''Electrical system troubleshooting'', ''Hybrid/Electric vehicle maintenance'', ''OBD-II scanning'', ''Welding and
