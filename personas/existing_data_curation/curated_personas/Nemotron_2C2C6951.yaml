  career_goals: Jacqueline aims to transition into a sales operations or enablement role within the next three years, leveraging her analytical strengths to design efficient sales processes and training
    programs. She plans to earn certifications such as Certified Sales Operations Professional (CSOP) and complete a part‑time MBA to deepen her strategic expertise. Ultimately, she envisions leading a
    regional sales operations team, where she can balance high‑impact results with a flexible schedule that supports her family life and personal well‑being.
