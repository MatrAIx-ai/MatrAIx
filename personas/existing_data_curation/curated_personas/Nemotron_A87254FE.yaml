personas:
  professional: Ronnie Goodwin, a 16‑year‑old aspiring multimedia designer and indie game creator, channels a natural talent for sketching, Photoshop, Procreate, and HTML/CSS into self‑initiated projects
    while casually leading peer collaborations with a curious, flexible mindset that favors creative freedom over rigid deadlines, and they thrive on turning spontaneous ideas into visual prototypes.
  sports: Ronnie Goodwin spends weekends skateboarding at the community park, roots for the hometown baseball team—the River Valley Tigers—and the professional basketball squad the Metro City Hawks, and
    they occasionally join friends for pickup soccer matches at the school field.
  arts: Ronnie Goodwin immerses themselves in indie and alternative sounds like Tame Impala, Mitski, and Arctic Monkeys, collects graphic novels such as Saga and Watchmen, and they draw inspiration from
    street‑art legends like Banksy while experimenting with digital illustration techniques in Procreate.
  travel: Ronnie Goodwin has explored nearby mountain trails and the historic downtown art district, they dream of photographing cherry blossoms in Kyoto, hiking the waterfalls of Iceland, and backpacking
    through the national parks of the American Southwest, balancing budget travel with an occasional splurge on a weekend concert in New York.
  culinary: Ronnie Goodwin favors bold flavors—ramen topped with soft‑boiled eggs, avocado toast sprinkled with chili flakes, homemade vegan pizza with mozzarella, basil, and sun‑dried tomatoes—and they
    enjoy the occasional late‑night snack of spicy tacos, though they rarely follow a formal recipe, preferring to improvise on the fly.
  core: Ronnie Goodwin is a curious, slightly disorganized teen who juggles sketchbooks, code, and skateboards, they turn artistic chaos into digital creations while occasionally forgetting homework and
    over‑indulging in gaming gear.
background:
  cultural: Raised in Burton, Ohio, a small‑town community in Geauga County, Ronnie grew up in a predominantly white, middle‑class Midwestern environment that blends traditional values of self‑reliance
    and community participation with a growing openness to diverse cultural influences. His upbringing emphasized personal freedom, practical skills, and a strong appreciation for the outdoors and local
    events such as county fairs and community art shows. Access to digital media and a supportive family have allowed him to explore creative pursuits beyond the conventional expectations of his surroundings.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic HTML/CSS'', ''photo editing'', ''creative brainstorming'', ''DIY electronics'', ''video-game strategy'', ''audio mixing'']'
  hobbies: '[''drawing'', ''digital painting'', ''video gaming'', ''listening to indie music'', ''reading graphic novels'', ''photography'', ''Raspberry Pi tinkering'', ''skateboarding'']'
  career_goals: Ronnie aims to turn his artistic and tech interests into a career as a multimedia designer or indie game developer. He plans to earn his GED, take community‑college courses in graphic design
    and coding, and build an online portfolio that showcases his illustrations, short animations, and simple games. Long‑term, he hopes to work freelance or join a small creative studio where he can contribute
    to visual storytelling and interactive experiences while retaining the flexible schedule he values.
