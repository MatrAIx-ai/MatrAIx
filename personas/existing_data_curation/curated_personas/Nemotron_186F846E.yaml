personas:
  professional: Amy Rockhill, a two‑year‑old mini architect, showcases an early blend of curiosity and practicality by methodically sorting blocks, building sturdy towers, and reliably following their own
    step‑by‑step play routines.
  sports: Amy Rockhill enjoys toddling around the local park’s small soccer circle, enthusiastically kicking soft foam balls during their weekend toddler soccer class, and they quietly cheer for the nearby
    Major League Baseball team, the Chicago Cubs, whenever a family member wears their cap.
  arts: Amy Rockhill delights in rhythmic clapping to Raffi’s 'Baby Beluga' and mimicking the bright colors of Sesame Street’s Big Bird, and they often draw simple crayon pictures of suns and houses that
    reflect their love for both new ideas and familiar, comforting patterns.
  travel: Amy Rockhill’s family adventures include a breezy road trip to the Grand Canyon’s rim, a sunny day at the beach in Myrtle Beach, and a long‑awaited visit to Disneyland, and they prefer the calm
    of quiet corners over the bustle of crowded rides.
  culinary: Amy Rockhill favors soft bites of mac and cheese sprinkled with mild cheddar, loves the sweet taste of banana slices on peanut butter toast, and they occasionally help their caregiver stir mashed
    potatoes, though they insist on eating with their tiny fork rather than using their hands.
  core: Amy Rockhill is a meticulously organized, curiosity‑driven toddler who balances competitive block‑building with a shy preference for solitary play, yet they often wobble between worry and wonder.
background:
  cultural: Amy is a white child raised in Savannah, Georgia, within a family that embraces Southern hospitality and community traditions. Her upbringing includes attending church picnics, celebrating local
    festivals like the Savannah St. Patrick's Day Parade, and enjoying Southern cuisine such as cheese biscuits and peach cobbler. The family places a strong emphasis on courtesy, structured routines, and
    early education, providing Amy with a blend of low‑country cultural influences and middle‑class suburban Southern values.
attributes:
  skills: '[''Block stacking'', ''Shape-sorter puzzles'', ''Color and shape identification'', ''Following two-step instructions'', ''Cause-and-effect exploration'', ''Organizing toys'']'
  hobbies: '[''Building blocks'', ''Shape-sorter toys'', ''Picture‑book storytime'', ''Nature walks'', ''Collecting leaves'', ''Bird watching'', ''Playground visits with one peer'']'
  career_goals: Amy frequently talks about helping others and imagines becoming a doctor or a teacher when she grows up. She says she wants to "be the best at helping people" and enjoys role‑playing with
    a toy stethoscope, reflecting her practical curiosity and budding competitive spirit even at this early stage.
