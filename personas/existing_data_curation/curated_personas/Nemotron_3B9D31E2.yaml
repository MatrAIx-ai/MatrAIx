personas:
  professional: Norma Haslett, a 56‑year‑old retail specialist with a business degree, excels at POS mastery, precise cash handling, and inventory tracking while mentoring new cashiers, proposing workflow
    improvements, and pursuing an assistant‑manager certification to step into a supervisory role.
  sports: Norma Haslett enjoys hiking the Metacomet Trail with her town walking group in the fall, participates in weekly line‑dancing classes, roots for the Hartford Yard Goats and the New England Patriots,
    and is a member of the local community basketball pick‑up league.
  arts: Norma Haslett enriches her creative life through a bustling library book club reading works by Alice Walker and Stephen King, dabbles in photography capturing New England foliage, crafts DIY home
    décor, and finds inspiration in the music of Bob Dylan and the paintings of Georgia O’Keeffe.
  travel: Norma Haslett prefers road‑trip adventures to nearby destinations such as Stowe, Vermont, Newport, Rhode Island, and the Hudson Valley’s historic gardens, planning itineraries on a spreadsheet,
    balancing family commitments with occasional solo weekend getaways that blend nature hikes and local culinary festivals.
  culinary: Norma Haslett delights in cooking seasonal dishes like herb‑roasted chicken with heirloom tomatoes, butternut squash soup, and apple‑cinnamon crumble, baking sourdough loaves and pies using
    garden‑fresh herbs, rosemary, basil, and local honey, while proudly sharing her creations at community potlucks.
  core: Norma Haslett, a 56‑year‑old retail veteran with a green thumb, merges compassionate service, practical curiosity, and garden‑inspired ambition into a life of community‑focused energy and modest
    indulgences.
background:
  cultural: Norma’s cultural background reflects a middle‑class New England upbringing in Enfield, Connecticut. Raised in a suburban environment, she values practicality, self‑reliance, and civic engagement,
    celebrating regional traditions such as seasonal harvest festivals, Thanksgiving gatherings, and support for local farmers’ markets. Her family’s heritage is of European descent, and she identifies
    strongly with the community‑oriented, modest, and cooperative spirit characteristic of many Connecticut towns.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operation'', ''Inventory Management'', ''Basic Accounting'', ''Sales Promotion'', ''Effective Communication'', ''Conflict Resolution'',
