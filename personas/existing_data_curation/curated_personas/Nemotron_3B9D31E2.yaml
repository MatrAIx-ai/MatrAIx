  hobbies: '[''Gardening'', ''Book Club'', ''Cooking and Baking'', ''Community Food Pantry Volunteering'', ''Hiking in State Parks'', ''Line Dancing'', ''Genealogy Research'', ''Photography'', ''DIY Crafts'',
    ''Attending Town Meetings'']'
  career_goals: Norma aims to move into a supervisory or assistant‑manager position within her current store, pursuing a retail management certification and taking on mentoring responsibilities for new
    cashiers. In the longer term, she envisions opening a small community‑focused café that sources locally and provides a gathering space for neighborhood events. She also plans to expand her volunteer
    leadership by coordinating senior‑citizen outreach programs at the Enfield community center.
