personas:
  professional: Thomas Debrosse is an aspiring digital illustrator and street‑artist whose sketchbook doodles, tablet designs, and self‑made hip‑hop beats coalesce into socially‑charged murals, driven by
    their competitive spirit and spontaneous, skeptical mindset that often makes them resist strict deadlines.
  sports: Thomas Debrosse roams the Coal City park courts for pickup basketball, idolizing the Chicago Bulls while sprinting on the high school track in the spring; they prefer the fast‑paced vibe of streetball
    over organized drills and channel their competitive edge into relentless one‑on‑one challenges against friends.
  arts: Thomas Debrosse immerses themselves in urban art, remixing the lyrical flow of Kendrick Lamar and J. Cole with the visual street‑style of Banksy and Basquiat, while crafting graphic‑novel‑inspired
    sketches and performing improv scenes in their school’s drama club, feeding their identity with vibrant cultural cues from gospel hymns and civil‑rights storytelling.
  travel: Thomas Debrosse dreams of weekend road trips from Coal City to Chicago’s museum district and the bluesy streets of New Orleans; their family’s modest budget restricts them to regional getaways
    like St. Louis and a high‑school exchange program in Atlanta, where they plan to capture street art on their tablet and sample local soul food.
  culinary: Thomas Debrosse, a self‑taught kitchen experimenter, loves whipping up soul‑food‑inspired mac and cheese with hot sauce, collard greens seasoned with smoked paprika, and banana‑spinach smoothies,
    while they occasionally order the latest limited‑edition sneaker‑themed latte at the local coffee shop after a long art session.
  core: Thomas Debrosse is a fiercely competitive, art‑obsessed teen who channels their anxieties into bold street‑art narratives, spontaneous beats, and an unrelenting quest for authentic self‑expression,
    and they never shy away from letting emotion drive their creations.
background:
  cultural: Thomas grows up as a Black teenager in Coal City, Illinois, where his family maintains strong ties to African-American cultural traditions. Weekly church gatherings, gospel music, and family
    stories about the civil-rights movement shape his sense of identity. He draws inspiration from Black artists and musicians, especially those who blend social commentary with creative expression. Living
    in a predominantly white, small-town environment, he has developed a keen awareness of racial dynamics, which fuels his competitive spirit and occasional skepticism, while also motivating him to use
    his art as a voice for his community.
