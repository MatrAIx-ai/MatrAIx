  career_goals: Thomas aspires to turn his love for art and storytelling into a career, dreaming of becoming a graphic designer or animator who can create murals and digital media that reflect his community's
    stories. He hopes to attend a specialized arts high school or enroll in a college program that blends visual arts with media production. In the longer term, he wants to launch a youth-focused digital
    platform that uses music, video, and art to raise awareness about mental health and social justice, leveraging his personal experiences to help peers.
