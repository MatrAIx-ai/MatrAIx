  career_goals: Although retired from formal employment, Carey aims to leave a lasting imprint on her local arts community. She dreams of curating a community art exhibit that showcases work from senior
    artists, and of publishing a small collection of poems that reflect her life in New England. She also aspires to mentor younger participants in the Cranston community center’s art program, helping them
    develop confidence in experimental media. A longer‑term ambition is to launch a collaborative oral‑history project that blends storytelling with visual art, preserving the cultural memory of Kent County
    for future generations.
