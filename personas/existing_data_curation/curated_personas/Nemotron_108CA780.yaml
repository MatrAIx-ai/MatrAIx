personas:
  professional: A retired community arts organizer, Carey Roy leverages their watercolor mastery, digital design savvy, and meticulous event-planning experience to curate senior artist exhibitions, lead
    improv workshops, and mentor emerging creators at the Cranston community center, channeling an imaginative curiosity, competitive drive, and sociable spirit into every project.
  sports: A devoted fan of New England athletics, Carey Roy rarely misses a Boston Red Sox game at Fenway, cheers the Patriots during football season, supports the Celtics, and joins a local walking club
    that meets weekly to hike the Blackstone River trail, while also playing bridge competitively at the Cranston senior center.
  arts: An avid painter and improv enthusiast, Carey Roy draws inspiration from Monet’s water scenes, O’Keeffe’s bold florals, and Andrew Wyeth’s New England realism, frequents the Providence Museum of
    Art, performs in weekly improv workshops, and shares poetry by Mary Oliver during book club meetings, all while maintaining a skeptical eye for artistic conventions.
  travel: A lover of cultural voyages, Carey Roy enjoys leisurely road trips to historic New England towns like Newport and Mystic, has explored the Louvre in Paris and the British Museum in London, and
    plans future visits to the Scottish Highlands, favoring small‑group tours that blend genealogy research with scenic landscapes.
  culinary: A moderately skilled home chef, Carey Roy favors seasonal New England dishes such as clam chowder, lobster rolls, and apple‑cinnamon crumble, often seasoning with fresh herbs from their patio
    garden like thyme and basil, and delights in pairing meals with a robust Rhode Island coffee blend.
  core: Carey Roy is a spirited senior artist who channels a love of novelty, competitive bridge play, and genealogical puzzles into vibrant community projects, all while juggling a modest budget and the
    occasional health‑related shortcut.
background:
  cultural: Carey grew up in a working‑class, Irish‑American household in the suburbs of Providence, where Catholic traditions and close‑knit community values were central. The New England emphasis on education,
    self‑reliance, and civic engagement shaped her pragmatic yet curious outlook. Throughout her life, the cultural tapestry of Rhode Island—its maritime history, colonial architecture, and vibrant arts
    scene—has provided a constant source of inspiration. Her marriage and long‑standing ties to Cranston have reinforced a sense of local identity, while her exposure to diverse cultural events in the Providence
    area has broadened her artistic sensibilities.
