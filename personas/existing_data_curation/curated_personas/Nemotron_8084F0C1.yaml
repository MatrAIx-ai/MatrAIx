    ''Written Communication and Editing'', ''Conflict Resolution and Staff Training'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Gardening (perennials and vegetables)'', ''Quilting and needlework'', ''Volunteer work at the local library and historical society'', ''Attending
    community theater productions'', ''Hiking local mountain trails'', ''Baking family recipes'', ''Knitting scarves and hats'', ''Birdwatching in county parks'']'
  career_goals: Greta aims to advance to a senior administrative or office manager role within the next two years, where she can apply her extensive experience to improve workflow efficiency and mentor
    younger colleagues. She plans to champion the transition to fully digital filing and streamlined scheduling tools for the county office. As she approaches retirement, she hopes to shift to part‑time
    consulting for local non‑profits, offering her expertise in event coordination and record management while maintaining a stable, routine‑centered work life.
