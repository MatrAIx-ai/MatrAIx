persona_description: A scientist and engineer who specializes in the field of micro-optomechanical systems (MOMS) and microelectromechanical systems (MEMS), particularly in the design and development of
  power-sensitive applications. His research focuses on the use of lasers to actuate tiny mirror-tipped cantilevers instead of electrical current to power pneumatic, piezoelectric, or electrostatic actuators,
  and the development of carbon nanotube thin-film patterns for optical actuators. He has received the National Science Foundation Career Award for his work and has accumulated expertise on directly patterning
  thin films of nanotubes. His research has led to the development of a technique that uses ultralow-power lasers to actuate nanotube thin-film arrays and has resulted in the filing of a provisional patent
  for his invention. He plans to refine the structure and physical properties of the underlying carbon nanotubes used to make thin films and demonstrate the applications of MOMS in different nanorobotic
  mechanisms.
