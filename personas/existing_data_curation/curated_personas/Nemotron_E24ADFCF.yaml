  career_goals: Even at seven, Teresita dreams of a future where she can blend her curiosity with practical impact. She aspires to become a scientist‑engineer who designs sustainable solutions for her community,
    and she also imagines teaching younger children to love learning. Her long‑term ambition is to contribute to improving health and education in Honduras and Texas, guided by her disciplined work ethic
    and calm confidence.
