personas:
  professional: A budding young scientist and aspiring engineer, Teresita Aguayo channels her love of mystery books and intricate LEGO constructions into early experiments with simple machines, applying
    her disciplined organization and calm resilience to methodical problem‑solving while balancing curiosity with practical outcomes.
  sports: On the field, Teresita Aguayo dashes through weekend matches with the Waxahachie Youth Soccer Club, idolizes FC Dallas of MLS and the Dallas Mavericks NBA team, and balances competitive drive
    with cooperative play, channeling her disciplined training into both soccer drills and traditional dance steps.
  arts: A creative illustrator, Teresita Aguayo fills sketchbooks with vivid scenes of family celebrations, draws inspiration from the storytelling of Lin‑Manuel Miranda and the animated magic of Pixar’s
    'Coco', and eagerly practices traditional dance steps set to the rhythms of popular Latin pop artists like Bad Bunny, merging her love of art with disciplined practice.
  travel: An adventurous wanderer, Teresita Aguayo spends her school holidays exploring local treasures such as the San Antonio River Walk and the Houston Space Center, while dreaming of a future family
    trip to the ancient ruins of Tikal and the vibrant streets of Cartagena, balancing her desire for discovery with the practical constraints of a weekly allowance and parental schedule.
  culinary: A budding home chef, Teresita Aguayo enjoys mixing masa harina with cheese to craft perfect pupusas alongside her grandmother, flavors her tamales with roasted peppers and sweet plantains, and
    proudly experiments with fresh cilantro, avocado, and corn tortillas, showcasing an intermediate cooking skill that mirrors her organized curiosity.
  core: Teresita Aguayo blends disciplined curiosity with a calm, organized spirit, turning LEGO bricks, mystery books, and family traditions into a uniquely balanced approach to learning, playing, and
    growing.
background:
  cultural: Teresita grows up in a bilingual Honduran‑American household. Her parents maintain cultural ties by speaking Spanish at home, celebrating holidays such as Semana Santa and Día de la Independencia,
    and preparing traditional foods. The family participates in the local Honduran community in Waxahachie, attending cultural gatherings and sharing folklore. This heritage shapes her identity, language
    skills, and appreciation for both Honduran and Texan customs.
