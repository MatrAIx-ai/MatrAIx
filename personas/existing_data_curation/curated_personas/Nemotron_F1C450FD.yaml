personas:
  professional: Pedro Mundaca is a 13‑year‑old aspiring robotics hobbyist who merges his love for LEGO Technic engineering with disciplined microcontroller programming, treating every build as a miniature
    project that must meet exact specifications and timeline.
  sports: Pedro Mundaca enjoys weekend hikes with the school’s mountaineering club, follows FC Barcelona’s La Liga matches for football inspiration, and participates in a community futsal league, balancing
    solitary trail exploration with occasional team play in a small‑group setting.
  arts: Pedro Mundaca devotes evenings to landscape photography inspired by Ansel Adams, immerses themselves in science‑fiction novels by Isaac Asimov, and often listens to Hans Zimmer’s cinematic scores
    while assembling LEGO creations, weaving visual, literary, and musical influences into their creative routine.
  travel: Pedro Mundaca has trekked the nearby Pyrenees and visited Barcelona with family, plans meticulous itineraries for future trips to Iceland’s waterfalls and Kyoto’s bamboo forests, and prefers a
    blend of structured travel plans with spontaneous photo‑walk detours, all while staying within a modest family budget.
  culinary: Pedro Mundaca assists in preparing traditional Spanish dishes such as paella, tortilla española, and gazpacho, enjoys experimenting with saffron and smoked paprika, and boasts an intermediate
    cooking skill level that lets them confidently sauté chorizo while often burning toast in a humorous culinary mishap.
  core: Pedro Mundaca, a disciplined 13‑year‑old technophile, channels curiosity into LEGO robotics and detailed journaling while wrestling with frequent worries, making them a meticulous yet anxious young
    explorer.
background:
  cultural: 'Pedro grows up in a bilingual household that honors his Spanish heritage while immersed in the rural Western culture of Penrose, Colorado. Spanish is spoken at home, and he participates in
    community events such as the local Spanish language club and seasonal celebrations like Semana Santa, where his family gathers for comida and music. At the same time, his upbringing is shaped by the
    outdoor lifestyle of the American West—hiking, wildlife observation, and an appreciation for the open landscape. This blend of cultures informs his worldview: he values family togetherness and traditional
    recipes, yet also embraces the curiosity and innovation encouraged by his school and community.'
