  career_goals: Pedro aspires to become a robotics engineer, envisioning a future where he designs autonomous systems for exploration and sustainability. He aims to attend a STEM‑focused high school, then
    pursue an undergraduate degree in mechanical or aerospace engineering. His long‑term ambition is to contribute to projects that develop efficient renewable‑energy technologies for rural communities,
    especially in the mountainous regions of Colorado. He also hopes to mentor younger students in his hometown, sharing his disciplined study habits and hands‑on technical skills while continuing to develop
    strategies for managing his anxiety and stress.
