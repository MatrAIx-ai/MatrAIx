persona_description: A USAID official with extensive experience in humanitarian response and development programming, particularly in the context of chronic droughts and food crises in the Sahel region.
  This individual is committed to early action in response to early warning signals, a smarter, targeted, and market-sensitive humanitarian response, and effective coordination between relief and development
  programs to create lasting change and resilience among the most vulnerable populations. They have a deep understanding of the complex dynamics of droughts and food crises in the Sahel, including the impact
  on local markets, food prices, and livestock health, and are dedicated to working towards a coordinated response that helps prevent recurring shocks from becoming devastating.
