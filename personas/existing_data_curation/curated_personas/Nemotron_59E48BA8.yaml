personas:
  professional: Marco Willson is a methodical heavy‑vehicle and mobile‑equipment service technician who blends meticulous diagnostics with inventive retro‑fitting ideas, consistently exceeds industry efficiency
    benchmarks, and envisions launching a mobile repair service in Garfield County that offers high‑quality on‑site repairs plus custom aesthetic upgrades; they are also known for rigorous documentation
    and strict adherence to OSHA safety standards.
  sports: Marco Willson follows the Denver Broncos and the Colorado Avalanche, maintains personal fitness through weekly weight‑training at a garage‑converted gym and seasonal cross‑country skiing trips
    to Vail, and they occasionally join a weekend cycling club for long rides through Garfield County’s scenic routes.
  arts: Marco Willson channels an abstract painter’s eye into canvases inspired by industrial surrealism, frequently studies works by Jackson Pollock and Mark Rothko, practices solo guitar on folk‑rock
    standards by Neil Young, and they find sci‑fi literature from authors like Isaac Asimov and Octavia Butler fuels their creative narratives.
  travel: Marco Willson prefers solitary, meticulously planned road trips to remote stargazing locales such as the Atacama Desert and Utah’s Bonneville Salt Flats, where they can set up a portable telescope
    and enjoy quiet reflection, while budgeting carefully for fuel and gear upgrades.
  culinary: Marco Willson enjoys hearty, protein‑rich meals like grilled steak with rosemary‑infused roasted potatoes and smoked brisket tacos, cooks these dishes at home with a modest but well‑organized
    kitchen, and they occasionally indulge in craft coffee while experimenting with spice blends such as smoked paprika and cumin.
  core: Marco Willson merges a precise, solo‑focused work ethic with an imaginative, slightly anxious personality, turning heavy‑equipment repairs into creative projects while guarding against stress through
    painting, stargazing, and disciplined financial planning.
background:
  cultural: Marco grew up in Enid, Oklahoma, a small Midwestern town with a strong oil‑field and agricultural heritage. His family is of mixed English and German ancestry, typical of many white residents
    in the region. The local culture emphasizes self‑reliance, hard work, and a practical approach to life, values that shaped Marco's disciplined work ethic and his comfort with solitary, hands‑on tasks.
    While he left high school without a diploma, he learned his trade through apprenticeships and community college technical courses, reflecting the region's tradition of on‑the‑job training. Community
    events like the county fair, local church gatherings, and the occasional art exhibit at the Enid Museum of Art have offered him glimpses of collective life, but his introverted nature prefers the quiet
    of his garage or the open plains. His divorce and experience with stress have reinforced a cautious, skeptical outlook, yet his Midwestern upbringing continues to provide a resilient, stoic foundation
    for both his professional ambitions and his creative pursuits.
attributes:
  skills: '[''Heavy-duty diesel engine repair'', ''Hydraulic system maintenance'', ''Electrical diagnostics for mobile equipment'', ''Welding and metal fabrication'', ''Preventive maintenance planning'',
    ''Diagnostic software (e.g., Mack, JLR)'', ''Blueprint and schematic reading'', ''Parts inventory control'', ''OSHA safety compliance'', ''Detailed service log documentation'']'
  hobbies: '[''Abstract painting'', ''Scale model truck building'', ''Reading science‑fiction'', ''Arduino/Raspberry Pi tinkering'', ''Woodworking'', ''Solo guitar practice'', ''Stargazing'', ''Journaling'']'
  career_goals: Marco aims to attain ASE Master Technician certification specialized in heavy‑equipment, positioning himself as the go‑to expert for diesel and hydraulic systems in the Garfield County region.
    He envisions launching his own mobile repair service that can travel to oil fields and farms, offering rapid, high‑quality on‑site repairs. Leveraging his creative side, he hopes to develop proprietary
    retro‑fitting kits that combine functional upgrades with aesthetic customizations for heavy trucks. Over the next five years, Marco also plans to mentor apprentices, sharing his meticulous work ethic
    while cautiously evaluating candidates due to his skeptical nature. Ultimately, he aspires to be recognized both for technical mastery and for introducing innovative, artistic touches to the traditionally
    utilitarian world of heavy equipment.
