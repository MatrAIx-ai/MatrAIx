  career_goals: Charles dreams of becoming a professional soccer player, admiring the structure of training schedules, the clear rules of the sport, and the excitement of competition. He also expresses
    interest in a future as an automotive technician or a firefighter because he likes hands‑on work, clear procedures, and helping the community. In the short term he aims to improve his skills on the
    school soccer team, earn a role as a team captain, and start a basic car‑care club at school to learn more about engines and tools.
