personas:
  professional: Charles Gurley, an aspiring junior event coordinator, applies their love of structure and teamwork to help set up booths at local community fairs while also leading the school’s after‑school
    sports practice committees.
  sports: Charles Gurley plays forward for the Oakdale Youth Soccer League and point guard for the Oakdale Junior Basketball Club, cheering on the Chicago Cubs and Chicago Bulls while competing in local
    weekend leagues and practicing daily bike rides on the neighborhood trail.
  arts: 'Charles Gurley builds intricate LEGO Star Wars Millennium Falcon models, reads the Percy Jackson series, and enjoys listening to Imagine Dragons and watching the animated film Spider‑Man: Into
    the Spider‑Verse, which fuels their imaginative storytelling during playtime.'
  travel: Charles Gurley loves weekend bike excursions to the nearby state park and has visited the Chicago Navy Pier, dreaming of a future trip to Disney World in Florida and a family road trip to Yellowstone
    National Park.
  culinary: Charles Gurley prefers pizza, chicken nuggets, and homemade mac and cheese, enjoys helping in the family garden to harvest carrots and tomatoes for a veggie stir‑fry, and delights in baking
    LEGO‑themed cupcakes with colorful frosting.
  core: Charles Gurley is a high‑energy, structure‑loving ten‑year‑old who channels competitiveness into sports, meticulous LEGO builds, and a disciplined allowance‑saving habit, while occasionally forgetting
    to floss.
background:
  cultural: Charles grew up in Oakdale, a close‑knit town in Stanislaus County, where the community blends agricultural heritage with small‑town American traditions. His family participates in typical celebrations
    such as Fourth of July fireworks, Thanksgiving gatherings, and local harvest festivals. He attends a public elementary school where sports, after‑school clubs, and community service projects are central
    to student life. The region’s diverse workforce, including many Latino farm families, gives Charles casual exposure to Spanish greetings and bilingual signs, though his household maintains a predominantly
    white, middle‑class American cultural orientation focused on family, school, and community involvement.
