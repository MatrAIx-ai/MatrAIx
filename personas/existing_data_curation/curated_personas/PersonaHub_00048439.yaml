persona_description: A soil scientist or land manager who is interested in understanding the spatial variability of soil properties in glaciated landscapes of the north-central United States for site-specific
  agricultural management. This person may be interested in learning about the methods used to map soil variability, such as county soil surveys, geostatistical interpolation techniques, and digital terrain
  analysis. They may also be interested in learning about the importance of soil properties such as the depth of the A-horizon and depth to free carbonates for describing land quality in these landscapes.
  This person may also be interested in learning about the potential challenges and opportunities associated with mapping soil variability in these areas, such as the impact of climate change and the need
  for sustainable land management practices.
