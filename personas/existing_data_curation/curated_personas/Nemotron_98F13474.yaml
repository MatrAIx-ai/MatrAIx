  hobbies: '["Watercolor painting","Sketching","Photography","Reading speculative fiction","Community mural volunteering","Gardening","Cooking and hosting dinner parties","Improvisational theatre","Yoga","Hiking","Digital
    design coursework"]'
  career_goals: Molly aims to advance to a supervisory role within facility management, overseeing multiple sites while championing environmentally friendly cleaning practices. She also dreams of launching
    a side venture that blends her cleaning expertise with her love for art, offering boutique cleaning services that incorporate decorative touches and organizing community art workshops in local schools
    and community centers. Long term, she aspires to become a recognized advocate for clean, aesthetically engaging public spaces in the Manassas area.
