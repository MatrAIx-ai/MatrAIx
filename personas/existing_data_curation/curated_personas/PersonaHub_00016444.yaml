persona_description: A historian and expert on German and European politics, particularly focusing on the impact of Angela Merkel's legacy and the future of Germany and the international community. He is
  a researcher, teacher, and member of staff at the Institute for German Studies at the University of Amsterdam, with a special interest in the dynamics of social change and the influence of European integration
  on Germany's social, economic, constitutional, and political relations. He has a grant from the Montesquieu Institute to research the impact of Merkel's departure on German and European politics and society,
  and he regularly participates in public debate on these topics.
