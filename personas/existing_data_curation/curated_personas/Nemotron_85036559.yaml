    to ambient music'', ''visiting local coffee shops'', ''playing tabletop strategy games'']'
  career_goals: Jeffrey aims to obtain a Class A commercial driver’s license and eventually launch his own boutique logistics service that combines reliable freight delivery with a distinctive visual brand
    created from his artistic interests. He also hopes to earn a logistics management certification to move into a regional sales manager role within a reputable transportation firm, allowing him to mentor
    new drivers while maintaining a flexible schedule that supports his family life in Camas.
