  career_goals: Cory aims to transition from a front‑desk role into a senior administrative or community‑outreach position within the next five years, leveraging his organizational strengths and compassionate
    nature. He plans to obtain a Certified Administrative Professional (CAP) credential to formalize his expertise and to undertake training in community engagement and nonprofit management. His long‑term
    ambition is to lead a small team that coordinates services for seniors and widowed individuals in Orange County, creating workshops that blend practical assistance with creative expression. Additionally,
    Cory hopes to mentor younger staff members, introduce innovative workflow technologies to his workplace, and eventually launch a part‑time consulting venture offering administrative support and event‑planning
    services for local arts organizations.
