  hobbies: '[''Gadget tinkering and repair'', ''Custom PC building'', ''Competitive video gaming'', ''Skateboarding'', ''Street photography'', ''Following tech blogs and YouTube tutorials'', ''Attending
    community coding workshops'', ''Pickup basketball'']'
  career_goals: Robert aims to turn his self‑taught technical abilities into a sustainable career. In the short term, he plans to earn his GED and secure an entry‑level position or apprenticeship in tech
    support or IT services within a New York City firm, where he can gain hands‑on experience with hardware troubleshooting and network basics. Simultaneously, he intends to build a portfolio of freelance
    projects—such as custom PC builds, website tweaks for local small businesses, and gadget repair—to establish a client base. His longer‑term ambition is to launch his own tech‑services startup that offers
    on‑demand repairs, basic web design, and consulting for youth in his community. Parallel to his professional goals, he hopes to qualify for regional esports tournaments, leveraging his competitive gaming
    skills to earn supplemental income and visibility. Throughout, he remains focused on maintaining flexibility, autonomy, and a pragmatic approach to learning, avoiding overly rigid career pathways.
