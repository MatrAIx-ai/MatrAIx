personas:
  professional: Robert Thomson, a 17‑year‑old aspiring IT technician, blends self‑taught hardware repair and web development skills with a laid‑back, pragmatic mindset, and they turn their curiosity for
    disassembling gadgets into reliable freelance services while embracing the chaos of flexible, on‑the‑fly scheduling.
  sports: Robert Thomson shreds at a local skate park, joins pickup basketball games at Rucker Park, follows the New York Knicks and the New York Rangers, and they blend competitive drive with a laid‑back
    attitude, using daily skate sessions as both exercise and mental reset.
  arts: Robert Thomson captures the pulse of Manhattan through street photography, curates an Instagram feed inspired by Nan Goldin and Banksy, and they unwind by listening to Daft Punk and Metro Boomin’s
    beats while tinkering with custom PC lighting to set the perfect creative ambiance.
  travel: Robert Thomson prefers spontaneous urban escapes, often hopping on the subway to explore Brooklyn’s street art or taking budget flights to Tokyo for the Summer Gaming Expo, and they balance limited
    funds with a love for both short‑term adventures and dreaming of a future road trip through the Hudson Valley.
  culinary: Robert Thomson favors New York street food like crispy taco trucks and classic pepperoni pizza, can whip up a quick ramen bowl with store‑bought broth, and they enjoy customizing their own mac‑and‑cheese
    with hot sauce, though cooking skills remain at a functional, not gourmet, level.
  core: Robert Thomson is a tech‑savvy, skateboard‑riding teen who toggles between meticulous gadget repair and carefree gaming marathons, channeling a calm resilience and a habit of leaving paperwork for
    tomorrow while chasing the next high‑score.
background:
  cultural: Robert grew up in a working‑class white family in New York County, where the city’s cultural mosaic was a daily backdrop. Though his household maintained a modest, self‑reliant ethos—emphasizing
    practical skills and independence—he was exposed to the diverse neighborhoods, cuisines, and languages of Manhattan, which broadened his outlook. Attending a public school only through middle school,
    he left formal education early to help support his family and to pursue his own interests. The urban environment fostered his comfort with the subway system, street food, and the constant buzz of city
    life, shaping his pragmatic yet curious mindset. Community youth programs and local skate parks provided social spaces where he interacted with peers from varied backgrounds, further integrating multicultural
    influences into his personal identity.
attributes:
  skills: '[''DIY electronic repair'', ''Custom PC building'', ''Basic web development (HTML/CSS/JavaScript)'', ''Competitive gaming strategy'', ''Urban navigation (NYC transit)'', ''Problem solving under
