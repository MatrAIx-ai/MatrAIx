personas:
  professional: Yamile Delapaz, a retired community organizer turned bilingual mentor, blends her practical curiosity and competitive drive to orchestrate multicultural festivals, lead senior salsa and
    folkloric dance sessions, and preserve family oral histories through meticulous event planning and volunteer coordination.
  sports: Yamile Delapaz stays fit by dancing salsa and folkloric rhythms at senior center sessions, follows the San Jose Earthquakes avidly, participates in a local senior walking club that meets on Saturdays,
    and enjoys the occasional friendly bridge tournament as a mental sport.
  arts: Yamile Delapaz finds joy in listening to the timeless voices of Celia Cruz and Carlos Santana, attending performances at the San Jose Repertory Theatre, and reading memoirs by Isabel Allende and
    histories by Howard Zinn, which together shape her creative outlook and community storytelling.
  travel: Yamile Delapaz prefers thoughtfully planned trips that balance adventure and relaxation, having explored the historic missions of San Juan Bautista, the coastal scenery of Monterey Bay, the artistic
    enclave of Santa Fe, and the vibrant streets of Oaxaca during a family pilgrimage.
  culinary: Yamile Delapaz masters elaborate traditional meals such as mole, chiles en nogada, and pozole, expertly incorporates fresh herbs like cilantro, epazote, and oregano from her garden, and enjoys
    the occasional indulgence in handcrafted pan de muerto for community potlucks.
  core: Yamile Delapaz is a fiercely competitive yet sociable centenarian who fuses curiosity with practicality to dance, cook, mentor, and chronicle her community’s stories while never missing a bridge
    round.
background:
  cultural: Yamile was born to Mexican parents who migrated to California in the early 20th century. She grew up speaking Spanish at home while learning English at school, giving her a bicultural perspective.
    Catholic traditions and Mexican holidays, especially Día de los Muertos and Independence Day, are central to her family rituals. Living in San Jose’s vibrant Mexican‑American community, she blends traditional
    customs with the Bay Area’s multicultural atmosphere, preserving Mexican cuisine, music, and storytelling while embracing the opportunities of her diverse neighborhood.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Traditional Mexican cooking'', ''Community event coordination'', ''Herb and vegetable gardening'', ''Mentoring and oral history storytelling'',
    ''Basic digital literacy (video calls, email, social media)'', ''Senior fitness and dance instruction'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Salsa and folkloric dancing'', ''Gardening herbs and vegetables'', ''Bridge and other senior card games'', ''Volunteering for bilingual tutoring'',
    ''Participating in Día de los Muertos celebrations'', ''Reading memoirs and history books'']'
  career_goals: Although retired, Yamile aims to preserve her family's Mexican heritage by documenting her memoirs and contributing to local oral‑history projects. She aspires to remain independent, maintain
    her health through regular dance and gardening, and continue volunteering as a bilingual mentor for youth. She also hopes to organize an annual multicultural festival in San Jose that celebrates Mexican
    traditions while fostering cross‑cultural exchange, cementing her legacy as a community catalyst.
