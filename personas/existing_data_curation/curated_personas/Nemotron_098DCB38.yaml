  career_goals: Rick aims to transition from being a salaried locksmith to owning a community‑focused locksmith and security consultancy in Hixson. His short‑term goal is to obtain a Master Locksmith certification
    and the state‑required security business license. Long‑term, he envisions expanding services to include smart‑lock installation, video‑doorbell integration, and comprehensive security audits for local
    homeowners’ associations. He also hopes to mentor a small team of apprentices, creating a reliable, routine‑driven operation that people in his neighborhood can count on for years to come.
