persona_description: Ron Rutowski, a biology professor at Arizona State University who has spent years studying the ways color is produced, employed and perceived in the animal kingdom, particularly on
  ways insects use color as a visual signal and how it's interpreted by their compound eyes. He is particularly interested in the iridescent blue-black wings of Pipevine Swallowtails and how they deal with
  the directionality of their color. Rutowski is a dedicated Arizona State Parks volunteer who leads a Butterfly Walk at Boyce Thompson Arboretum on June 28th.
