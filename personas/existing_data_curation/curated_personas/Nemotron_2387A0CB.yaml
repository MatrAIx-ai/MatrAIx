  hobbies: '["Crossword puzzles","Sudoku","Vegetable gardening","Korean cooking","Calligraphy","Attending cultural festivals","Yoga","Walking in local parks","Volunteering at community center (English tutoring)","Reading
    historical fiction and non-fiction"]'
  career_goals: Tri aims to advance to an Operations Manager role within her organization, overseeing broader administrative and facilities functions. She plans to obtain a Certified Administrative Professional
    (CAP) credential, lead digitization initiatives to streamline office processes, and mentor emerging supervisors. In the longer term, she envisions consulting for small businesses on workflow efficiency
    and may explore a senior director position in office services.
