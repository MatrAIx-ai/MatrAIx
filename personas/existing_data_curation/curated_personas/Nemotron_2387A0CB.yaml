personas:
  professional: Tri Kim is a seasoned office administration specialist who leverages their methodical, competitive streak to streamline workflow, mentor staff, and push for digitization as they eye an Operations
    Manager role.
  sports: Tri Kim enjoys weekday walks in their local park, attends evening yoga at the Sunrise Wellness Studio, roots for the Los Angeles Dodgers in baseball, follows the LA Galaxy soccer team, and occasionally
    joins the Riverside Women’s Running Club for a 5 km charity race each spring.
  arts: Tri Kim cultivates their love of calligraphy through regular practice of traditional brush scripts, admires the works of contemporary calligrapher Kim Hye‑Jin, finds inspiration in the novels of
    Hilary Mantel and Ken Follett, and enjoys the performances of indie folk singer Sufjan Stevens and the theater productions at the local Playhouse.
  travel: Tri Kim prefers meticulously planned trips that blend cultural immersion with relaxation, having explored the historic streets of Kyoto, the volcanic landscapes of Jeju Island, and the vineyards
    of Napa Valley, while they now dream of a road‑trip along the Pacific Coast to visit the art deco gems of Santa Monica.
  culinary: Tri Kim’s culinary repertoire showcases a polished command of Korean cuisine, regularly preparing kimchi jjigae, bibimbap with fresh garden greens, and bulgogi glazed with gochujang, while they
    also enjoy crafting Mediterranean mezze, and their go‑to comfort dish after a long work week is a steaming bowl of doenjang soup made from their home‑grown beans.
  core: Tri Kim balances razor‑sharp organization with a competitive drive, nurturing a garden and calligraphy practice while methodically climbing the corporate ladder and quietly challenging themselves
    with crossword puzzles at dawn.
background:
  cultural: Tri Kim grew up in a Korean‑American household in Queens, New York. She is bilingual in English and Korean and actively celebrates Korean holidays such as Chuseok and Seollal. Her family emphasizes
    respect for elders, education, and close family ties, values that influence her organized and reliable nature. She participates in the local Korean church and community events, while also embracing
    the multicultural environment of Queens, fostering an appreciation for diverse cultures and cuisines.
