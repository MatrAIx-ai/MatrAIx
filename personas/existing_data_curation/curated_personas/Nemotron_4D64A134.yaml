personas:
  professional: Lyniesha Marmanillo is a 42‑year‑old bilingual humanities educator who blends rigorous literary analysis with culturally resonant storytelling, leveraging her methodical project‑management
    skills to design data‑driven lesson plans and mentor students while championing inclusive pedagogy.
  sports: Lyniesha Marmanillo is a seasonal trail‑runner who follows the Colorado Springs Switchbacks FC matches on Saturday afternoons, maintains a steady regimen of mountain hikes and weekend half‑marathons,
    and participates in the local Colorado Trail Runners Club, balancing solo workouts with occasional community yoga sessions.
  arts: Lyniesha Marmanillo frequents local galleries to admire the vibrant murals of Diego Rivera and enjoys the guitar riffs of Carlos Santana while painting watercolors of Rocky Mountain vistas, and
    they often attend salsa nights where the rhythms of Celia Cruz energize their creative spirit.
  travel: Lyniesha Marmanillo prefers meticulously planned trips that blend cultural immersion with outdoor adventure, having trekked the Santa Fe Trail, celebrated Día de los Muertos during the Guelaguetza
    festival in Oaxaca, and long‑awaiting a solo pilgrimage to the towering cliffs of Monument Valley.
  culinary: Lyniesha Marmanillo, a confident home chef, perfects cherished dishes like tamales wrapped in corn husks, slow‑cooked pozole with hominy and ancho chilies, and experiments with masa‑based salsas,
    while occasionally indulging in spicy street‑taco challenges that test their palate.
  core: Lyniesha Marmanillo balances methodical teaching excellence with a love for midnight salsa sessions, a habit of over‑organizing their pantry, and a tendency to forget their own coffee mug at staff
    meetings.
background:
  cultural: Lyniesha’s cultural background is rooted in Mexican heritage; her parents immigrated from Jalisco and raised her in a bilingual household where Spanish and English were spoken interchangeably.
    She celebrates Día de los Muertos, participates in local Mexican community festivals in Colorado Springs, and maintains strong family ties across the border. This bicultural identity informs her teaching
    philosophy, encouraging her to weave Mexican cultural perspectives into humanities curricula while fostering an inclusive environment for all students.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Culturally responsive instruction'', ''Curriculum design and lesson planning'', ''Educational technology integration (LMS, digital content creation)'',
