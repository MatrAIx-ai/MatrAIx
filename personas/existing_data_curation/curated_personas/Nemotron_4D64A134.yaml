  hobbies: '[''Cooking traditional Mexican cuisine'', ''Hiking and trail running in Colorado'', ''Reading Mexican and American literature'', ''Watercolor painting'', ''Salsa dancing'', ''Volunteering for
    community literacy programs'', ''Yoga and meditation'']'
  career_goals: Lyniesha aims to obtain a Master's degree in Education within the next two years, followed by certification as a K‑12 teacher. Her long‑term ambition is to become a curriculum specialist
    who designs inclusive, multicultural humanities programs for district schools in Colorado. She also hopes to lead professional development workshops that share evidence‑based teaching practices with
    fellow educators, and eventually pursue a doctoral degree to contribute scholarly research on bilingual pedagogy and cultural competency in higher education.
