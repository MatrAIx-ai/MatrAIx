  career_goals: Catherine aims to deepen her financial expertise by obtaining an associate's degree in accounting and earning a Certified Bookkeeper credential within the next two years. She envisions progressing
    to a senior financial clerk or supervisory role at the county office, where she can mentor newer staff and help streamline accounting processes. Long‑term, she hopes to launch a community‑focused financial‑literacy
    program that equips local small‑business owners and residents with practical money‑management skills, aligning her career growth with the well‑being of Sunman and surrounding communities.
