  career_goals: Stephanie aims to advance into a senior executive role such as Director of Design or Vice President of Sustainable Development, where she can shape large‑scale projects that incorporate
    resilient, culturally informed architecture. She is driven to champion sustainable building practices in coastal regions, mentor emerging professionals—particularly from underrepresented backgrounds—and
    publish thought leadership that merges humanities perspectives with engineering innovation. Her long‑term ambition includes establishing a consultancy that advises municipalities on integrating Caribbean
    design heritage into public spaces.
