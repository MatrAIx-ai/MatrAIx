personas:
  professional: Stephanie Cuenca, a 41‑year‑old senior architectural leader, leverages strategic project management, BIM expertise, and bilingual client communication to deliver sustainable, culturally
    resonant designs, balancing a competitive drive with pragmatic flexibility and an eye for both innovative concepts and proven methods, while they guide multidisciplinary teams through complex constraints.
  sports: Stephanie Cuenca enjoys weekend hikes through Florida’s state parks, participates in a local running club that trains for the Miami Marathon, and follows the Miami Heat and Tampa Bay Buccaneers,
    occasionally joining a community soccer league in their neighborhood, and they often set personal performance goals to stay motivated.
  arts: Stephanie Cuenca channels creative energy into architectural photography inspired by Ansel Adams, dances salsa to the rhythms of Marc Anthony at cultural festivals, and volunteers on community murals
    alongside local artists like street‑artist Kobra, finding artistic renewal in both the lens and the dance floor, while they constantly seek fresh visual narratives for their projects.
  travel: Stephanie Cuenca plans trips that blend work inspiration and leisure, having explored historic districts of Barcelona and Lisbon and island getaways to Aruba and the Bahamas, favoring boutique
    hotels with eco‑certifications while balancing travel budgets with family commitments, and they often return with design sketches sparked by new surroundings.
  culinary: Stephanie Cuenca cooks with confidence, preparing plantain‑based mofongo‑style dishes, savory roasted pork seasoned with adobo, and aromatic rice with pigeon peas, savoring fresh cilantro, lime,
    and sofrito while experimenting with modern plating techniques in their home kitchen, and they frequently host dinner gatherings to share these flavors with friends.
  core: Stephanie Cuenca is a pragmatic leader who balances a competitive edge with a love of salsa, sustainable design, early morning hikes, and island‑inspired cooking, all while navigating the demands
    of a senior executive track, and they routinely push themselves to merge practicality with cultural vibrancy.
background:
  cultural: Stephanie is the daughter of Puerto Rican immigrants and grew up immersed in the island's vibrant traditions, language, and community values. Bilingual in English and Spanish, she maintains
    active ties to the Puerto Rican diaspora in Central Florida, participating in cultural festivals, music gatherings, and heritage preservation initiatives. Her design philosophy is deeply influenced
    by Caribbean aesthetics—bright colors, organic textures, and communal spaces—that she integrates into her projects to reflect a sense of place and cultural continuity. Family gatherings, storytelling,
    and a strong work ethic rooted in her heritage shape her professional demeanor and personal outlook.
