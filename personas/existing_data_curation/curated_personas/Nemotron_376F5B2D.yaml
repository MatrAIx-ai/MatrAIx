personas:
  professional: James Woodbury, a seasoned janitorial professional with an associate degree in Facilities Management, combines meticulous floor‑care expertise, OSHA‑compliant safety practices, and innovative
    green‑cleaning solutions while systematically mentoring staff and streamlining facility operations, reflecting their organized, methodical, and curious‑yet‑practical approach.
  sports: James Woodbury enjoys bass and trout fishing on the Columbia River, hikes the Rattlesnake Hills, supports the Tri‑City Dust Devils and Seattle Seahawks, and participates in the Columbia River
    Anglers Association, blending solitary outdoor activity with community sports enthusiasm.
  arts: James Woodbury immerses himself in classic rock from Led Zeppelin and Pink Floyd, revisits 70s and 80s film classics like ‘The Godfather’ and ‘Star Wars’, and expresses creativity through woodworking
    simple furniture inspired by Sam Maloof, merging nostalgic cultural appreciation with hands‑on artistry.
  travel: James Woodbury favors self‑planned road trips that combine fishing trips on the Columbia River, weekend camping in the Cascade foothills, visits to Portland’s food markets, and aspirations to
    explore Vancouver’s waterfront, prioritizing nature‑focused, modest adventures over lavish vacations.
  culinary: James Woodbury delights in cooking pan‑seared trout with lemon‑butter, roasting garden‑grown carrots, potatoes, and beets with rosemary and thyme, crafting hearty meatloaf on a sturdy wooden
    board, and occasionally treating himself to quinoa‑and‑vegetable bowls at the local Market Street Café, reflecting a blend of sustainable home cooking and occasional farm‑to‑table dining.
  core: James Woodbury embodies a pragmatic, detail‑oriented ethos that unites sustainable cleaning expertise, a love for outdoor fishing, classic rock devotion, and a tendency to hoard old tools, all while
    balancing quiet, methodical living with occasional community leadership.
background:
  cultural: James comes from a white, working‑class family rooted in the Pacific Northwest. He grew up in a small town near the Columbia River, where his parents emphasized hard work, practicality, and
    community service. His cultural upbringing blends Midwestern values of reliability and modesty with the regional focus on outdoor recreation and environmental stewardship. He celebrates traditional
    American holidays, participates in local church gatherings, and maintains strong ties to the Kennewick community, reflecting the area’s blend of agricultural heritage and growing urban development.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip, seal, wax)'', ''Hazardous material handling'', ''OSHA safety compliance'', ''Inventory management'', ''Facility management software'', ''Basic plumbing
    repairs'', ''HVAC filter maintenance'', ''Minor electrical troubleshooting'', ''Staff training and mentorship'']'
  hobbies: '[''Fly fishing'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Classic rock music'', ''Watching classic movies'', ''DIY home improvement'', ''Reading about sustainable cleaning practices'',
    ''Community volunteering'']'
  career_goals: James aims to advance from senior janitor to shift lead and eventually facility manager for a large corporate campus or health‑care complex in the Tri‑Cities area. He plans to obtain IICRC
    certification and a Certified Facility Manager (CFM) credential to formalize his expertise. Long‑term, he hopes to launch his own small cleaning business focused on sustainable, low‑impact methods,
    offering services to local schools and community centers. He also enjoys sharing his knowledge by leading workshops on best practices in cleaning and workplace safety.
