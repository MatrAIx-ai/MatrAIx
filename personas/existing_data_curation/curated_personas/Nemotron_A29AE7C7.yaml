  career_goals: Christiana aims to become a certified specialist in veterinary anesthesia and dentistry, earning the CVA and CDA credentials within the next three years. She aspires to lead a bilingual
    community outreach program that provides low‑cost preventive care and education to underserved Spanish‑speaking neighborhoods in San Diego County. Long‑term, she envisions co‑founding a community veterinary
    clinic that combines high‑quality medical services with art‑based wellness initiatives for pets, while also mentoring emerging veterinary technologists from underrepresented backgrounds. She plans to
    pursue a Master's in Public Health focused on One Health to deepen her impact on zoonotic disease prevention.
