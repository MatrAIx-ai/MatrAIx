  hobbies: '[''Playing soccer'', ''Basketball'', ''Community dance workshops'', ''Cooking family recipes'', ''Volunteering for cultural festivals'', ''Hiking in the Colorado Rockies'', ''Multiplayer video
    gaming'']'
  career_goals: Francisca aims to obtain his GED within the next year and then enroll in a vocational training program for automotive technology or HVAC. He seeks a stable, hands‑on career that leverages
    his practical skills and preference for routine. In the longer term, he hopes to become a certified technician and possibly open a small family‑run auto repair shop or a neighborhood Mexican cuisine
    food stand, providing reliable income for his family while staying connected to his cultural roots.
