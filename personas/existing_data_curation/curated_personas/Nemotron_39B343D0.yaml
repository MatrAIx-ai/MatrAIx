personas:
  professional: Francisca Gonzalez is a budding automotive enthusiast who leverages routine‑driven mechanical skills, bilingual communication, and a reliable, team‑oriented work style to excel in hands‑on
    tasks like basic vehicle maintenance and community event coordination.
  sports: Francisca Gonzalez plays pickup soccer and basketball with friends, follows the Colorado Springs Switchbacks FC and the Denver Broncos, trains at a local hiking club for mountain treks in the
    summer, and treats fitness as a social ritual rather than a solitary grind.
  arts: Francisca Gonzalez immerses themselves in regional dance workshops set to cumbia and norteño tunes, draws inspiration from artists like Los Tigres del Norte and Selena, and volunteers to curate
    live music line‑ups for community festivals, balancing creative expression with practical event logistics.
  travel: Francisca Gonzalez prefers low‑cost road trips with friends, has already explored the historic streets of Santa Fe and the bustling markets of Oaxaca, and dreams of hiking Patagonia’s Torres del
    Paine when savings allow, always planning itineraries that blend cultural festivals with outdoor adventure.
  culinary: Francisca Gonzalez enjoys cooking family‑style dishes such as carne asada tacos, pozole, and sweet tamales, skillfully handling fresh chiles, masa, and cilantro, while experimenting with a modest
    spice rack and occasionally swapping recipes on their social media page for the local foodie community.
  core: Francisca Gonzalez blends a love for routine‑centered hands‑on work, vibrant community gatherings, and spontaneous video‑game marathons, but tends to procrastinate paperwork until the last minute,
    even as they keep a bright smile on the soccer field.
background:
  cultural: Francisca comes from a Mexican‑American family that maintains strong ties to its heritage while living in Colorado Springs. He grew up speaking Spanish at home and English at school, celebrating
    Mexican holidays such as Cinco de Mayo, Día de los Muertos, and Navidad with traditional foods, music, and religious observances rooted in Catholic customs. His family places a high value on community
    support, familial responsibility, and a practical work ethic, which have shaped his identity and daily life.
