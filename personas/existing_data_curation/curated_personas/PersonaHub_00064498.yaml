persona_description: A neuroscientist and researcher working on developing advanced neural engineering technologies, particularly focusing on the development of microelectrode arrays for recording and measuring
  neural signals. Morrison is known for his work on the vertical alignment of carbon nanofibers for the fabrication of microelectrode arrays, which he has demonstrated to be robust and capable of interfacing
  with intact tissue. He is interested in the potential applications of these arrays in developing neural prosthetics and improving our understanding of neuronal network dynamics.
