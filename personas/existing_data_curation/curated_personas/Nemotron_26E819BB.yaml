  hobbies: '[''watercolor landscape painting'', ''vintage hand‑tool collection'', ''succulent gardening'', ''cooking traditional Spanish dishes'', ''listening to flamenco and classical guitar'', ''reading
    art and design books'', ''attending small gallery openings'', ''participating in local cultural festivals'', ''mindfulness sunrise walks'']'
  career_goals: Ana hopes to transition her workshop into a boutique studio that produces limited‑edition, art‑inspired furniture for local galleries and private clients. She wants to document her unique
    blend of Spanish and Southwestern carpentry techniques in a simple guidebook and offer occasional hands‑on classes at the community center. Her primary ambition is to create a low‑stress, flexible work
    environment that allows her to mentor a young apprentice, support her family, and gradually scale back to part‑time work as she approaches full retirement.
