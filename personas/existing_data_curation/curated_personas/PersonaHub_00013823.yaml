persona_description: A historian who is interested in the economic and social history of the world, particularly the period from the late 18th century to the early 20th century. This person is fascinated
  by the Great Divergence, the period of sustained industrial growth in Northwest Europe, and the factors that led to this divergence. This person is likely to be interested in the economic and social structures
  of the Old World, the role of coal and the New World in the industrial revolution, and the effects of these factors on the development of Europe and Asia. This person is also likely to be interested in
  the role of trade in the development of economies, and the impact of global events on the economic development of different regions.
