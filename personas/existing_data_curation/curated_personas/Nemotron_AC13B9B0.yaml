  career_goals: Sophie aims to advance to a senior operations management role within the next five years, eventually moving into a director‑level position overseeing multiple locations. She plans to earn
    a bachelor’s degree followed by an MBA to deepen her strategic expertise. Long‑term, she aspires to launch a boutique consulting firm that helps small‑to‑mid‑size businesses streamline operations while
    fostering employee wellbeing. She also intends to champion sustainability initiatives within her organization, integrating eco‑friendly practices into everyday processes.
