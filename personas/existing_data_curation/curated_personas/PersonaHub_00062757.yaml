persona_description: A scientist who specializes in the study of organic compounds, particularly those related to the production and emissions of MTBE. She has expertise in environmental chemistry and air
  quality, and is particularly interested in the health effects of exposure to MTBE and the potential for MTBE to contribute to photochemical smog. She has experience working with data and models related
  to MTBE emissions and has conducted research on the fate and transport of MTBE in the atmosphere. She is knowledgeable about the potential risks associated with MTBE exposure and is interested in exploring
  alternative sources of gasoline oxygenates.
