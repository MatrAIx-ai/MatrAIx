personas:
  professional: Raven Ray, a budding junior illustrator, channels their vivid imagination into detailed sketchbook drawings and early digital storytelling on ScratchJr, showing a rare blend of organized
    project planning and spontaneous creativity that hints at future artistic careers.
  sports: Raven Ray plays for the Meadowbrook Kids Soccer Club in the fall and follows the Denver Nuggets in the NBA, enjoying the balance of weekly practices with the excitement of cheering on professional
    basketball, while preferring calm runs along the park’s trail over crowded team events.
  arts: Raven Ray immerses themselves in drawing fantastical creatures inspired by the whimsical worlds of Brian Froud and Dr. Seuss, while the family’s rotating playlists of Kirk Franklin’s gospel anthems
    and Kendrick Lamar’s hip‑hop beats fuel their creative bursts, making visual art and music inseparable parts of their daily play.
  travel: Raven Ray loves weekend trips to the nearby Willow Creek State Park to collect leaves and rocks for art projects, has visited the interactive exhibits at the Smithsonian National Air and Space
    Museum in Washington, D.C., and dreams of traveling to Kyoto, Japan, to see its historic temples and cherry blossoms.
  culinary: Raven Ray enjoys making peanut butter and banana sandwiches with honey drizzle, loves pizza topped with pepperoni and extra mozzarella, and often helps stir mac and cheese made with sharp cheddar
    and a pinch of paprika, showing an enthusiastic but slightly messy cooking style.
  core: Raven Ray, a seven‑year‑old dreamer with an endless stash of sketchbooks, balances meticulous art projects with bouts of worry over missing a color or a perfect line, often losing track of time
    while humming gospel‑hip‑hop mixes and hoarding leaves for the next collage.
background:
  cultural: Raven is an African‑American child growing up in Powder Springs, GA, a town steeped in Southern Black cultural traditions. Her family celebrates holidays such as Juneteenth and Kwanzaa, and
    she frequently participates in church services that feature gospel music and communal storytelling. The community places a strong emphasis on education, resilience, and mutual support, values that are
    reinforced by stories of local civil‑rights leaders and family elders. Food traditions like soul‑food gatherings and school potlucks expose her to the rich flavors of her heritage. These cultural influences
    appear in her artwork through bold colors, rhythmic patterns, and themes of empowerment and perseverance. The local library and church youth programs provide safe spaces for her curiosity to flourish,
    reinforcing a sense of identity and belonging.
attributes:
  skills: '["Early reading fluency", "Creative storytelling", "Basic drawing and painting", "Introductory coding with ScratchJr", "Fundamental arithmetic (addition/subtraction)", "Organizational skills
