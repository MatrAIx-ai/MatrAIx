  hobbies: '["Drawing and painting", "Creating collages from recyclables", "Reading imaginative picture books", "Building LEGO sets", "Programming simple stories with ScratchJr", "Listening to gospel and
    hip‑hop music", "Exploring nature in local parks", "Collecting and arranging leaves and rocks for art"]'
  career_goals: Raven dreams of becoming an illustrator who brings magical stories to life in picture books and animated games. She is fascinated by space and imagines herself as an astronaut who can explore
    distant planets. Inspired by her love for technology, she hopes to design interactive apps that let children create their own narratives. Ultimately, she wants to use her artistic talents to inspire
    others, share her emotions, and contribute positively to her community while maintaining a sense of security and belonging.
