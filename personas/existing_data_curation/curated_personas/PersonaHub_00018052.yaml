persona_description: A film historian and cultural critic who is deeply interested in the history of the film industry, particularly the production code era. They are knowledgeable about the details of
  the Production Code, its creation, enforcement, and eventual decline. They are also interested in the impact of the Production Code on the development of cinema and its portrayal of gender roles and sexual
  content. They are likely to be knowledgeable about the work of Martin Quigley and Daniel Lord, the Catholic laymen and priest who created the Production Code, and the individuals and organizations who
  enforced it.
