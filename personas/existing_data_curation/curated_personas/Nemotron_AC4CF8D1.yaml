  career_goals: Nayla aims to progress to a senior director role within the next five years, where she can shape organizational strategy while championing mental‑wellness and inclusive workplace practices.
    She plans to complete her bachelor’s degree in Business Administration and earn PMP certification to strengthen her credentials. Long‑term, she envisions launching a consultancy focused on cultural
    competency and employee wellbeing, and she is committed to mentoring Hispanic women in leadership positions throughout the tech ecosystem.
