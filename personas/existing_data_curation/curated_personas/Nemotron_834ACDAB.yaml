  hobbies: '[''sketching and painting'', ''digital art creation'', ''photography'', ''reading (fiction, non‑fiction, art history)'', ''coding mini‑projects'', ''listening to diverse music'', ''piano practice'',
    ''volunteering at church youth art program'']'
  career_goals: Mozel aspires to blend her artistic passion with technology. In the short term, she aims to earn a place in a competitive magnet high school with a strong visual arts and computer science
    program and to secure a summer fellowship in digital media. Her long‑term ambition is to pursue a bachelor’s degree in graphic design or interactive media, eventually working as a user experience designer
    or multimedia artist for a cultural institution or a music‑tech company. She hopes to create designs that celebrate African‑American heritage and to use her skills to contribute to community‑focused
    art projects, while also keeping open the possibility of further study in art history or museum curation.
