personas:
  professional: Mozel Echols is a budding digital illustrator who merges hand‑drawn sketches with coding mini‑projects, curating a meticulously organized online portfolio updated every fortnight and setting
    strict milestone deadlines for each artwork.
  sports: Mozel Echols prefers solitary fitness, often jogging the neighborhood trail at dawn, but also plays forward for the local youth soccer club, the Riverside Strikers, follows the high school basketball
    team, the Riverdale Raiders, and cheers for the professional baseball squad, the Metro Eagles, while keeping a detailed training log.
  arts: Mozel Echols immerses themselves in creative expression, spending weekends sketching portraits inspired by Frida Kahlo, reproducing Van Gogh’s brushwork in oil, listening to gospel legend Mahalia
    Jackson, indie folk band Fleet Foxes, and hip‑hop poet Kendrick Lamar, while curating a small gallery show of their digital photography at the community center.
  travel: Mozel Echols enjoys low‑key exploration, taking weekend bike rides to the nearby state park’s waterfall, planning annual family trips to the historic district of New Orleans, and dreaming of a
    solo backpacking adventure through Kyoto’s temples and the Louvre’s halls in Paris.
  culinary: Mozel Echols loves comfort food, often whipping up homemade mac and cheese with sharp cheddar, experimenting with spicy ramen topped with soft‑boiled eggs, and perfecting avocado‑kale smoothies,
    while their cooking skill hovers at an enthusiastic intermediate level.
  core: Mozel Echols is a meticulously organized teen artist who balances solitary creative pursuits with disciplined financial habits, occasional solo workouts, and a curated mix of classic and contemporary
    cultural experiences.
background:
  cultural: Mozel is a Black teenager growing up in Goodlettsville, Tennessee, where Southern African‑American culture blends with the vibrant music scene of nearby Nashville. Her family places a strong
    emphasis on community, faith, and storytelling, with regular involvement in church gatherings, gospel music, and family cookouts featuring soul‑food classics. She participates in local Juneteenth events
    and Black History Month programs that celebrate the legacy of civil‑rights activism in the region. These cultural experiences shape her appreciation for both traditional and contemporary Black artistic
    expressions, and they inspire her to incorporate elements of her heritage into her creative work.
attributes:
  skills: '[''digital illustration (Procreate, Photoshop)'', ''basic programming (Python, HTML/CSS)'', ''project planning and organization'', ''research and information synthesis'', ''written communication
