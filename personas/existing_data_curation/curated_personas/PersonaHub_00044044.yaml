persona_description: A dental specialist who has completed extensive training and education in the field of endodontics, which involves the study and treatment of the inner part of the tooth or the dental
  pulp. They are familiar with the procedures used in endodontics such as root canal treatment, endodontic retreatment surgery, and treating injuries or cracks in teeth that involve the dental pulp. They
  are recognized as a specialist in dentistry by several dental organizations including the American Dental Association, the Royal Australasian College of Dental Surgeons, and the Royal College of Dentists
  of Canada.
