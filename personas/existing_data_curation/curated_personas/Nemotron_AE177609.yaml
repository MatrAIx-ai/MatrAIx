  career_goals: Nicholas aims to move into a senior strategic role where he can shape investment philosophy and lead a niche advisory practice. He aspires to launch a boutique fund that focuses on emerging,
    non‑traditional asset classes—such as fine‑art, digital collectibles, and sustainable technology ventures—leveraging his artistic sensibility to develop proprietary valuation frameworks. He also hopes
    to publish research on integrating creative, abstract concepts into mainstream financial analysis and to become a sought‑after speaker at industry conferences.
