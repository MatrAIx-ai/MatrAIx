personas:
  professional: Joanna Meads, a licensed school psychologist in Astoria, blends evidence‑based assessment with arts‑infused interventions like bibliotherapy and drama therapy, leveraging their humanities
    background and sociable nature to build rapid rapport and lead collaborative, data‑driven mental‑health initiatives while navigating their relaxed, sometimes chaotic schedule with pragmatic curiosity,
    and they remain open to both proven methods and innovative ideas.
  sports: Joanna Meads enjoys weekend yoga sessions at the Astoria community studio, participates in a local co‑ed ultimate frisbee league, and follows the New York Knicks and New York City FC with spirited
    enthusiasm, while they occasionally join early‑morning runs along the East River to stay energized for their demanding school‑psychology caseload.
  arts: Joanna Meads immerses themselves in the creative pulse of Astoria by attending gallery openings featuring artists like Kehinde Wiley, reading contemporary fiction by Sally Rooney and Ocean Vuong,
    performing improv with the Astoria Improv Collective, and capturing candid street moments on a vintage 35mm film camera inspired by Vivian Maier’s work, and they love exploring the interplay of color
    and narrative, which fuels their eye for visual storytelling.
  travel: Joanna Meads favors short, culturally rich getaways—such as a weekend in Lisbon’s historic Alfama district, a spring trip to the Greek islands to attend the annual Greek Festival in Queens, and
    a spontaneous train ride to Montreal’s vibrant art scene—planning loosely to leave room for last‑minute dance workshops or photo excursions, and they keep an open itinerary that allows for spontaneous
    detours.
  culinary: Joanna Meads delights in cooking eclectic dishes like Greek moussaka with fresh oregano, Korean bibimbap featuring gochujang and kimchi, and a spicy Moroccan tagine with preserved lemons, often
    experimenting with seasonal produce from the Astoria farmers market and savoring the process as a therapeutic extension of their arts‑based practice, and they relish the way each flavor expands their
    palate.
  core: Joanna Meads is a calm‑yet‑curious school psychologist who melds creative therapies with data‑driven care, embraces spontaneous art and food adventures, and they navigate life with a flexible, sociable
    spirit that tolerates occasional disorganization.
background:
  cultural: Joanna was raised in a middle‑class, white Irish‑American family in Queens, but her lifelong home in Astoria exposed her to a rich tapestry of cultures, including Greek, Italian, Middle Eastern,
    and Latino communities. This multicultural environment cultivated her appreciation for diversity and informed her inclusive, culturally responsive practice. She identifies with progressive values, emphasizing
    equity and social justice, and she integrates the lessons from her ethnically varied neighborhood into both her professional work and personal life.
attributes:
  skills: '[''Psychoeducational assessment'', ''Individual counseling'', ''Group facilitation'', ''Crisis intervention'', ''Arts‑based therapeutic techniques'', ''Data‑driven program evaluation'', ''Report
    writing'', ''Collaborative consultation with teachers and families'', ''Use of psychometric software'', ''Culturally responsive practice'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary fiction and literary nonfiction'', ''Yoga and mindfulness meditation'', ''Improv comedy performance'', ''Organizing community
    board‑game nights'', ''Urban street photography'', ''Cooking diverse international recipes'', ''Attending Astoria cultural festivals'']'
  career_goals: Joanna aims to become the lead school psychologist for a large urban district, where she can design and implement a comprehensive, district‑wide mental health curriculum that integrates
    arts‑based interventions. She plans to attain Nationally Certified School Psychologist (NCSP) status and pursue a doctoral degree in School Psychology to contribute research on resilience and cultural
    competence. Long‑term, she envisions creating a community youth mental‑health hub in Astoria that offers workshops, counseling, and creative outlets, while mentoring emerging school psychologists and
    advocating for policy changes that prioritize student well‑being.
