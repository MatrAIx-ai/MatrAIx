  career_goals: Victoria aims to advance her nursing career by earning a Master of Science in Nursing with a focus on family practice, positioning herself to become a Nurse Practitioner serving the underserved
    communities of Shasta County. She plans to obtain certifications in critical care (CCRN) and community health nursing (CHPN) to broaden her expertise. In the next five years she hopes to lead a community
    health initiative that integrates mental-health screening into primary-care visits, reflecting her empathy and desire to address the stress-related challenges she knows well. Long-term, she sees herself
    in a leadership role such as charge nurse or nurse manager where she can shape policy, mentor staff, and promote a supportive, flexible work environment.
