  hobbies: '["hiking local trails", "birdwatching", "journaling", "reading medical journals, poetry, fantasy novels", "meditation", "home-based yoga", "healthy plant-based cooking", "watercolor painting",
    "listening to psychology and holistic-health podcasts", "volunteering one-on-one at community health fairs"]'
  career_goals: Terra aims to complete her Bachelor of Science in Nursing through an RN‑to‑BSN program within the next two years, followed by a Master’s in Nursing with a focus on psychiatric‑mental health.
    She aspires to become a Family Nurse Practitioner who integrates mindfulness and holistic health strategies into patient care. Recognizing her need for flexibility, she is interested in telehealth nursing
    roles that allow her to work from a calm home environment and reduce commute stress. Terra also hopes to develop a community wellness program in Fallbrook that offers free health‑education workshops
    and stress‑management resources for underserved residents. Ultimately, she seeks a career path that balances professional growth with personal well‑being, allowing her to stay curious while maintaining
    a low‑stress lifestyle.
