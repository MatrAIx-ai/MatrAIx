  career_goals: Jessica aims to finish her GED within the next year and then enroll in a community‑college program focused on public health or community services. She hopes to earn a certification as a
    Community Health Worker or Youth Mentor, allowing her to work with Pacific Islander families and teens in the Tempe area. Long‑term, she envisions a stable, caring role in a nonprofit organization that
    blends her curiosity about health topics with her practical desire to support others, while also providing a structured environment that helps her manage stress and anxiety.
