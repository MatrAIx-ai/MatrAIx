personas:
  professional: A budding community health advocate, Jessica Davis leverages their empathy, conflict‑mediating knack, and digital research skills to lead peer‑support circles at their high school and volunteer
    at the Tempe community garden, channeling their curiosity about marine biology and public health into practical outreach for local families.
  sports: A seasonal swimmer, Jessica Davis trains at Tempe Town Lake with the local youth swim club during the summer, follows the Arizona Diamondbacks baseball team, and participates in a school hula
    team that blends athleticism with cultural dance, though they often forget to hydrate during practice.
  arts: A creative multi‑medium artist, Jessica Davis explores hula choreography, strums ukulele renditions of Israel Kamakawiwo‘ole, crafts Polynesian‑style bracelets, captures desert‑island hybrid scenes
    inspired by Ansel Adams and James Turrell in digital photography, and draws comics reminiscent of Rebecca Sugar’s storytelling, using these outlets to process their worries.
  travel: An adventure‑curious journeyman, Jessica Davis has visited Sedona’s red rock trails and dreams of a cultural immersion trip to Maui’s beaches, preferring spontaneous weekend road trips over meticulously
    planned vacations, yet budget constraints often limit their travel to local state parks and school field trips.
  culinary: A budding home‑cook, Jessica Davis frequently prepares traditional luau dishes such as poi, taro mash, and kalua pork for family gatherings, experiments with poke bowls featuring ahi tuna and
    avocado, and enjoys blending tropical fruits like mango and pineapple into smoothies, though they sometimes burn the taro due to forgetting to set a timer.
  core: Jessica Davis is a curiosity‑driven, empathetic teen who balances artistic expression and community service with a penchant for worrying, occasional disorganization, and a love for hula, ukulele,
    and swimming, and they often turn to journaling to steady their mind.
background:
  cultural: Jessica comes from a mixed Polynesian heritage, with roots in Samoa and Hawaii. Her household values extended family connections, respect for elders, and communal harmony, traditions that are
    expressed through regular storytelling, tribal chants, and island‑style meals featuring taro, coconut, and fish. She participates in local Pacific Islander cultural festivals and youth groups, where
    she shares traditional dances and crafts. Growing up in Tempe, AZ, she blends these island customs with the multicultural, desert‑city environment, developing a bicultural identity that honors her ancestors
    while engaging with the broader community.
