    computer tutoring'']'
  career_goals: Tram aims to transition into a senior systems architect role where she can shape strategic digital transformation initiatives for her organization. She plans to earn TOGAF and AWS Solutions
    Architect certifications within the next two years and lead enterprise‑wide cloud‑optimization projects. Additionally, she is passionate about increasing representation of women and Southeast Asian
    professionals in technology; she hopes to mentor a cohort of junior staff and eventually launch a boutique consulting practice that assists small businesses in the Las Vegas area with secure, efficient
    IT infrastructure.
