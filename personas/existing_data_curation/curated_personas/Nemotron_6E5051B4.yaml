personas:
  professional: Tram Nguyen, a seasoned computer systems analyst with two decades of experience, leverages their meticulous documentation, Agile coordination, and expertise in SQL, Python, Power BI, and
    AWS cloud migrations to translate complex business needs into clear technical solutions while mentoring junior staff and championing cross‑cultural collaboration.
  sports: Tram Nguyen enjoys weekend hikes in Red Rock Canyon as a member of a local trail club, follows the Las Vegas Golden Knights with enthusiasm, participates in occasional 5K charity runs, and uses
    mindfulness meditation to stay centered after each workout.
  arts: Tram Nguyen nurtures a love for visual storytelling through DSLR photography inspired by Ansel Adams, relishes listening to pianist Yiruma and folk singer John Prine, unwinds by reading historical
    fiction novels such as Ken Follett’s 'Pillars of the Earth', and attends the Smith Center's jazz series whenever possible.
  travel: Tram Nguyen prefers thoughtfully planned trips that blend cultural immersion and nature, having explored the ancient temples of Kyoto, the rugged landscapes of Patagonia, and the desert vistas
    of Sedona, while budgeting for family visits during Lunar New Year celebrations and dreaming of a future culinary tour of the Mediterranean.
  culinary: Tram Nguyen delights in crafting aromatic pho broth, sizzling banh xeo, and fresh spring rolls using basil, cilantro, and mint harvested from their backyard garden, often experiments with fusion
    dishes like basil pesto pho, and shares meals with colleagues during office potlucks.
  core: Tram Nguyen balances methodical precision at work with a quiet passion for herb‑laden cooking, desert hikes, and photography, yet occasionally lets late‑night code reviews erode their sleep schedule.
background:
  cultural: Tram is a first‑generation Vietnamese American. Her parents emigrated from Vietnam in the early 1980s, bringing with them strong values of family cohesion, respect for elders, and a deep appreciation
    for education. She grew up speaking both Vietnamese and English, celebrating Lunar New Year (Tet) with a vibrant local diaspora community in Las Vegas. These cultural roots have shaped her collaborative
    spirit, her dedication to community service, and her love for sharing Vietnamese culinary traditions with friends and coworkers.
