  hobbies: '[''Historical reading'', ''Genealogy research'', ''Gardening'', ''Woodworking'', ''Community theater'', ''Church involvement'', ''Senior center social events'', ''Walking'', ''Talk radio listening'',
    ''Cooking traditional recipes'']'
  career_goals: Although retired, Michael aims to remain an active pillar of his community. He aspires to mentor younger volunteers at the senior center, spearhead an oral‑history project that records the
    stories of Reading’s mid‑20th‑century industrial workers, and pen a memoir for his grandchildren. He also hopes to continue serving on his church’s outreach committee and maintain his physical health
    through regular gardening and walking with his wife.
