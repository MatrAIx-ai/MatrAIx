  career_goals: Marianne aims to move into a senior program manager or supervisory role within a non‑profit serving families and seniors in Bucks County, where she can implement data‑driven, structured
    service models. She plans to obtain a Master’s in Social Work to deepen her clinical expertise and to earn a licensure that will expand her professional credibility. Her competitive streak fuels her
    ambition to lead her team to statewide recognition for program outcomes, while her desire for predictability drives her to secure a position with a stable schedule that also allows space for her personal
    interests. Ultimately, she hopes to launch a community education initiative that blends her teaching background with social service delivery, fostering lifelong learning among underserved residents.
