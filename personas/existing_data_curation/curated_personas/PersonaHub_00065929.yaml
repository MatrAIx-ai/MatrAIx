persona_description: A geologist who is passionate about the role of Earth scientists in addressing the fundamental challenges of the 21st century. They are interested in the changing face of Earth science
  and how it is evolving to meet the demands of a world with limited natural resources and an increasing global population. They understand the importance of sustainable management of the resource cycle
  and are committed to using their knowledge and skills to put waste materials safely back into the geosphere. They are also aware of the challenges of sustaining energy supplies and moving to a low-carbon
  economy, and are eager to contribute to the development of alternative energy sources. They are dedicated to working with other bodies to ensure that 'policy for science' is a priority for UK government,
  and to provide plural expert inputs to government from a wide range of sources in a way that is likely to engender the confidence of the geoscientific community.
