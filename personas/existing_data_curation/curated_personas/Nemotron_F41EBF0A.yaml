  hobbies: '["Yup''ik dance and drumming", "Storytelling circles", "Traditional cooking (akutaq, smoked fish)", "Knitting and beadwork", "Berry picking", "Nature walks and birdwatching", "Church choir participation",
    "Reading local news", "Video chatting with family", "Volunteering at community center"]'
  career_goals: Although Elonte is no longer in the formal workforce, she remains driven by a vision of cultural resilience and community well‑being. Her primary ambition is to document and archive the
    oral histories of Bethel’s elders, creating a digital repository for future generations. She hopes to launch an intergenerational Yup'ik language program at the local community center, pairing elders
    with schoolchildren for immersive learning. Elonte also seeks to advocate for enhanced elder services, such as accessible transportation and health resources, by serving on the advisory board of the
    regional health consortium. Finally, she aspires to publish a memoir that weaves together personal memories with broader cultural narratives, ensuring that the wisdom of her generation endures.
