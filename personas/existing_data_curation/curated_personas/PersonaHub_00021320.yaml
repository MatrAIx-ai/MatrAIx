persona_description: A researcher working on the development of energy-efficient electronic devices, specifically focusing on the use of semiconductor nanowires and tunnel field effect transistors (TFETs)
  to reduce power consumption and improve energy efficiency. The researcher aims to create a "zero-watt PC" that uses negligible energy when in sleep mode, with a goal to significantly reduce power consumption
  by one order of magnitude. The researcher is part of the Project Steeper, a collaborative research project led by Ecole Polytechnique Fédérale de Lausanne (EPFL) and includes participation from corporate
  research organizations, large research institutes, and academic partners. The researcher's work involves studying the development of novel nanoscale building blocks for computer chips, specifically TFETs
  and semiconducting nanowires, and exploring the use of these devices to reduce power consumption in electronic devices.
