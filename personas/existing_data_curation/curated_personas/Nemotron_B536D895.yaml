personas:
  professional: Marangelie Guerra, a precocious classroom project coordinator, channels their innate love for organization and teamwork into leading group art and LEGO building sessions at school, meticulously
    arranging every piece while ensuring each friend feels included and valued.
  sports: Marangelie Guerra, an enthusiastic mini‑athlete, dashes around the playground playing tag and participates in the local Little Kickers soccer club, proudly wears a jersey of the Chicago Cubs while
    cheering, and channels their energy into weekly dance lessons that blend lively cumbia steps with basic gymnastics, keeping their heart rate up and their friends laughing.
  arts: Marangelie Guerra, a budding visual storyteller, fills sketchbooks with bright, folk‑inspired patterns reminiscent of traditional murals, idolizes the whimsical illustrations of children’s author
    Mo Willems, sways to the upbeat rhythms of the kid‑friendly cumbia band Cumbia Kids and the mariachi‑flavored group Los Amigos del Ritmo, and eagerly performs simple folk dances during family gatherings,
    showcasing a natural flair for color and movement.
  travel: Marangelie Guerra, an adventurous young explorer, has visited the city aquarium and the nearby beach where they built sandcastles, dreams of trekking through the giant redwoods of California and
    later riding a carousel at Disneyland, and prefers family road trips that include frequent stops for snacks and playground breaks, balancing curiosity with a need for familiar routines.
  culinary: Marangelie Guerra, a budding food enthusiast, loves the cheesy stretch of a quesadilla, the tangy zest of mango salsa on tortilla chips, and the comforting swirl of chocolate chip cookies, can
    confidently spread peanut butter on toast, eagerly helps stir pancake batter, and often requests extra strawberries on their breakfast yogurt, though they stubbornly refuse to eat peas.
  core: Marangelie Guerra is an organized, high‑energy six‑year‑old who leads friends in LEGO builds, saves every coin for the next set, draws vibrant folk‑inspired art, and can be surprisingly picky about
    vegetables, often refusing broccoli despite gentle encouragement.
background:
  cultural: Marangelie grows up in a bilingual Mexican‑American household in Sacramento, where Spanish is spoken at home and English at school. Her family celebrates traditional Mexican holidays such as
    Día de los Muertos and Las Posadas, incorporating vibrant decorations, music, and foods that enrich her sense of identity. Community gatherings at local cultural centers expose her to Mexican dances,
    crafts, and storytelling, fostering a deep appreciation for her heritage while also blending the diverse influences of California’s multicultural environment.
