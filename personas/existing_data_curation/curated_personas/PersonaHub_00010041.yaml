persona_description: A teacher and educational expert with over ten years of experience in the field of education. They have a passion for empowering students' learning through the development of emotional
  intelligence and have a unique insight into the learning brain. They are knowledgeable in the areas of empathy, sympathy, dignity, understanding, and kindness, and have a proven track record of developing
  positive relationships with students. They are a leader in the education industry and have written several books on emotional intelligence, motivation, and thinking skills. They are known for their ability
  to create a safe and happy environment for learning and for developing kinder people through the teaching of emotional intelligence. They are also a trainer and author in education and have a company
  called "Kija Learning" that focuses on the academic and soft skills necessary for successful learning.
