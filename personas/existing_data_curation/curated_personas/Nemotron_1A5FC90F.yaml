personas:
  professional: A budding LEGO architect and avid fantasy reader, Lieu Lanoza channels curiosity and systematic planning into constructing elaborate adventure-themed models, and they dream of one day designing
    immersive video games that blend storytelling with engineering.
  sports: An enthusiastic soccer player, Lieu Lanoza joins the Austin FC Junior Club for weekend matches, emulates the teamwork of the Austin FC first team, and they follow a disciplined warm‑up routine
    inspired by the Dallas Cowboys' training drills while cheering for the Texas Rangers baseball team during off‑season.
  arts: A creative storyteller, Lieu Lanoza draws comic strips that echo the magical worlds of J.K. Rowling’s Harry Potter and the heroic humor of Stan Lee’s Spider‑Man, while humming the catchy tunes of
    Imagine Dragons and watching Pixar’s Toy Story for visual inspiration.
  travel: A curious explorer, Lieu Lanoza spends weekends trekking nature trails in Zilker Park, dreams of visiting the towering Redwood forests in California, and they look forward to family trips to the
    historic Alamo in San Antonio, balancing adventurous wanderlust with the comfort of familiar home meals.
  culinary: A budding junior chef, Lieu Lanoza helps prepare simple dishes like fried rice with soy sauce and stir‑fried broccoli, enjoys tasting tacos al pastor at home, and they pride themselves on perfecting
    a creamy mac and cheese using cheddar and elbow pasta.
  core: An inquisitive and methodical seven‑year‑old, Lieu Lanoza blends boundless imagination with careful planning, tackles LEGO builds and school projects with precision, and navigates intense emotions
    with cautious optimism.
background:
  cultural: Lieu’s family hails from a Southeast Asian background, blending Filipino and Vietnamese heritage. At home, he hears both English and his parents’ native language, which he is beginning to speak.
    Family gatherings often feature traditional dishes such as pho, adobo, and sticky rice, as well as celebrations of Lunar New Year and Mid‑Autumn Festival. Living in Austin, he blends these cultural
    practices with Texan traditions, participating in local community events, enjoying outdoor activities, and integrating the warm hospitality of his heritage with the friendly, diverse atmosphere of his
    neighborhood.
