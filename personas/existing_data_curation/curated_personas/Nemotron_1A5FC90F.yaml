  career_goals: He aspires to become a veterinarian because he loves caring for animals and wants to ensure they stay healthy, and also dreams of being an astronaut, drawn by his curiosity about space and
    the practical challenge of mastering science. In the short term, he aims to earn a badge in the local Scouts program and to improve his science project skills for school fairs.
