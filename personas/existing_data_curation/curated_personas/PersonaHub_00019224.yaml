persona_description: A zoologist who specializes in the study of avian lice, particularly the species found on the Swainson's warbler. His research interests include the ecology and behavior of lice, as
  well as the effects of flooding on bird populations. He is currently working on a larger study of the effects of flooding on Swainson's warblers in Arkansas. He is a co-author of the latest issue of the
  Journal of Medical Entomology, where he describes two new species of avian lice, Myrsidea bensoni and Brueelia limnothlypiae, on this little songbird. He is a former avian endocrinologist who now studies
  the development and behavior of two juvenile humans in the high desert of western Colorado.
