  hobbies: '["Gardening (vegetable and herb)", "Volunteer work (food bank, senior center)", "Community theater involvement", "Traveling to historic sites", "Reading biographies and history", "Playing bridge",
    "Woodworking", "Cycling on local trails", "Attending art exhibitions"]'
  career_goals: Although retired from full‑time employment, Timothy aims to continue contributing his expertise by volunteering as a financial advisor for local non‑profits and small businesses, mentoring
    emerging entrepreneurs, and serving on community boards. He also hopes to document his professional journey in a memoir, stay engaged with lifelong learning—especially in digital tools and sustainability
    practices—and maintain a balanced, active lifestyle that supports his health and family relationships.
