  hobbies: '[''Visiting art galleries'', ''Attending live music events'', ''Salsa dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Photography'', ''Gardening'', ''Traveling to new destinations'',
    ''Reading contemporary fiction'', ''Volunteering for community mural projects'', ''Practicing yoga'', ''Exploring local festivals'', ''Participating in book clubs'', ''Amateur pottery'']'
  career_goals: Jansy aims to transition from senior graphic designer to Creative Director, leading a multidisciplinary team that produces culturally resonant campaigns for both local businesses and larger
    brands. She envisions launching a boutique studio that specializes in Latinx and Caribbean-inspired branding, fostering community collaborations and mentorship programs for emerging designers. At the
    same time, she hopes to teach part‑time at a community college, sharing her humanities perspective and promoting inclusive design thinking. Jansy is also keen on integrating emerging technologies such
    as AR and interactive media into her projects, positioning herself at the intersection of tradition and innovation while maintaining a balanced lifestyle that honors her family commitments.
