personas:
  professional: Jansy Perez, a 54‑year‑old senior graphic designer renowned for turning cultural narratives into vibrant brand identities, blends meticulous project management with a curiosity‑driven design
    process, frequently leading brainstorming sessions where their talkative, sociable nature keeps the team energized while mentoring junior designers with kindness and a collaborative spirit.
  sports: Jansy Perez is an avid fan of the New Jersey Devils and New York Yankees, attends select home games when possible, participates in a local salsa‑dance fitness class that doubles as cardio, and
    they occasionally join a weekend cycling group that explores the Hudson River Greenway.
  arts: Jansy Perez immerses themselves in the New Jersey and New York arts scene, regularly curating visits to MoMA PS1 exhibitions, catching live performances by the jazz ensemble The Hot Club of New
    York, and contributing graphic expertise to community mural projects celebrating Caribbean festivals, all while discussing artistic trends with fellow enthusiasts at weekly book club gatherings.
  travel: Jansy Perez plans travel with a blend of meticulous research and spontaneous detours, favoring island getaways in Vieques for cultural immersion, weekend road trips to the Hudson Valley vineyards,
    and they keep a travel journal that balances budget‑conscious choices with occasional splurges on boutique boutique experiences.
  culinary: Jansy Perez delights in cooking traditional dishes such as mofongo, chicharrón, and pasteles wrapped in banana leaves, often sourcing fresh herbs from the local farmers’ market, and they enjoy
    pairing these meals with a glass of chilled rosé while sharing stories of their latest photography adventure.
  core: Jansy Perez, a socially vibrant 54‑year‑old designer, fuses cultural storytelling with disciplined creativity, balances structured finances with occasional artistic indulgences, actively manages
    mild hypertension through yoga, and fuels life with salsa dancing, community murals, and spontaneous travel to island festivals.
background:
  cultural: Jansy grew up in a bilingual household where Spanish and English blended seamlessly, instilling a deep appreciation for Puerto Rican culture's rhythm, color, and storytelling. Family gatherings
    were filled with music, dance, and the aroma of island cuisine, shaping her aesthetic sensibility and reinforcing the importance of community and hospitality. As part of the Puerto Rican diaspora in
    New Jersey, she actively participates in cultural organizations that preserve and promote Caribbean heritage, such as local festivals, community art projects, and culinary events. Her cultural identity
    influences her design work, often featuring vibrant palettes, symbolic motifs, and narratives that celebrate resilience and diversity. Jansy's heritage also fuels her commitment to representation and
    inclusion, ensuring that the voices of her community are reflected authentically in the visual stories she creates.
