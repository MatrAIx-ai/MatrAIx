personas:
  professional: Kierra Belle, a seasoned arts administrator and educator, merges her imaginative abstract painting practice with razor‑sharp organizational skills to craft inclusive adult art curricula,
    orchestrate multi‑day exhibitions, and secure multi‑year grant funding for a community arts hub in Lancaster that nurtures emerging talent.
  sports: Kierra Belle stays active through daily morning walks through the garden, joins a weekly low‑impact tennis group at the Lancaster community center during spring and summer, and passionately follows
    the Lancaster Barnstormers baseball team and the Philadelphia Eagles football squad.
  arts: Kierra Belle immerses herself in abstract oil and encaustic painting, draws inspiration from Mark Rothkō and Yayoi Kusama, curates home exhibitions featuring collage works alongside reproductions
    of Julie Mehretu, devours contemporary art theory by Linda Nochlin, and regularly attends local theater productions such as “Harold and Maude” while enjoying the improvisational jazz of Miles Davis.
  travel: Kierra Belle favors thoughtfully planned itineraries that balance museum‑rich cultural immersion with leisurely downtime, having already visited Paris’s Musée d’Orsay, Florence’s Uffizi Gallery,
    and New York’s MoMA, and she now dreams of a spring trip to Kyoto’s historic temples and a weekend escape to the nearby Amish countryside.
  culinary: Kierra Belle, an adept home cook, delights in preparing family‑style comfort dishes such as slow‑braised collard greens, buttery cornbread, and shrimp gumbo flavored with smoked paprika and
    fresh heirloom tomatoes harvested from her garden, while occasionally experimenting with global spices like harissa and sumac.
  core: Kierra Belle blends a restless imagination with meticulous order, turning garden soil and paint palettes into daily rituals, yet habitually forgets where she puts her brushes, prompting a cheerful
    scavenger hunt each afternoon.
background:
  cultural: Kierra is a second‑generation African American who grew up in the Philadelphia suburbs before moving to Lancaster in her thirties. Her grandparents migrated north from the rural South during
    the Great Migration, bringing with them the traditions of oral storytelling, gospel music, and Southern cooking. Raised in a close‑knit Black church community, she internalized values of mutual aid,
    resilience, and cultural pride. In Lancaster, she became an active member of the local Black cultural association, celebrating heritage through festivals, art exhibitions, and educational outreach.
    Her identity is shaped by the legacy of the civil rights movement, the richness of African American artistic expression, and the Mid‑Atlantic’s blend of historic preservation and community activism.
