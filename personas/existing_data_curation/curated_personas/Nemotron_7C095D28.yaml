  hobbies: '[''Abstract painting'', ''Encaustic and collage art'', ''Poetry journaling'', ''Reading philosophy and African diaspora literature'', ''Gardening'', ''Soul-food cooking'', ''Attending theater'',
    ''Volunteer archival work'', ''Genealogy research'', ''Quilting'']'
  career_goals: Kierra aims to establish a community arts hub in Lancaster that offers free workshops, exhibition space, and a mentorship program for Black youth interested in visual arts. She aspires to
    document and archive the local African American history through a collaborative oral‑history project, culminating in a published anthology. Securing a multi‑year grant to sustain these initiatives is
    a primary objective. Additionally, she hopes to complete a memoir reflecting her personal journey as a Black woman navigating the civil rights era, motherhood, and artistic evolution, and to share it
    in local literary circles.
