  career_goals: Even at his young age, Justin shows early signs of a desire to help, organize, and explore. He imitates adult tasks, lines up his toys in orderly rows, and lights up when watching others
    teach or build. These behaviours suggest future ambitions in fields that blend curiosity, structure, and people‑focused interaction—such as becoming a teacher, a community organizer, or a hands‑on scientist
    who collaborates with others to solve practical problems.
