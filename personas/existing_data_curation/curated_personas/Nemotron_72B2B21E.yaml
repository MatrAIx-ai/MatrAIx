personas:
  professional: Michael Curtiss, a 19‑year‑old emerging arts‑program coordinator in training, leverages strong communication, event‑planning, and digital media skills to design inclusive community art events
    while balancing meticulous organization with a flexible, talkative, and collaborative style.
  sports: Michael Curtiss enjoys casual soccer matches at the Olathe Recreation Center, follows the Kansas City Royals and Kansas City Chiefs for hometown pride, and hikes the nearby Kaw Point Nature Trail
    on weekends to stay active and clear their creative mind.
  arts: Michael Curtiss is a devoted indie‑music concert‑goer who frequents shows at the Crossroads Arts District, sketches downtown skylines at the Nelson‑Atkins Museum, volunteers with the Johnson County
    Arts Council, and draws inspiration from performers like Mitski, Tame Impala, and visual artists such as Yayoi Kusama.
  travel: Michael Curtiss prefers weekend road trips to nearby escapes like Lawrence’s historic downtown or the Ozark foothills, plans itineraries on a shared Google Doc with friends, and dreams of a spring
    backpacking adventure through the Scottish Highlands after completing their degree.
  culinary: Michael Curtiss loves hosting themed dinner parties featuring fusion dishes such as Korean‑BBQ tacos and rosemary‑infused focaccia, enjoys sourcing seasonal produce at the Johnson County farmers
    market, and can whip up a decent pan‑seared salmon while still debating the perfect coffee‑to‑milk ratio for their espresso.
  core: Michael Curtiss blends Midwestern community spirit with a restless curiosity, turning every social gathering into a mini‑art exhibit while juggling a habit of over‑booking events and a penchant
    for late‑night photo editing sessions.
background:
  cultural: Michael grew up in Olathe, a suburban community in the Kansas City metro area, where Midwestern values of community, friendliness, and modest ambition shaped his outlook. His family’s heritage
    traces back to German and Irish immigrants, and he was raised with a blend of traditional American customs and an appreciation for cultural diversity. He has been involved in local community events
    such as the Olathe Summer Festival and volunteers with the Johnson County Arts Council, reflecting the region’s emphasis on civic participation and support for the arts. This background informs his
    collaborative nature, his respect for harmonious relationships, and his interest in making art accessible to a broad audience.
