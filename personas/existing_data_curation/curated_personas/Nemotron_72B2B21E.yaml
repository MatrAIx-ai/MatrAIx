  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Digital photography'', ''Attending concerts'', ''Open‑mic nights'', ''Community theater'', ''Hosting dinner parties'', ''Playing tabletop RPGs'',
    ''Listening to podcasts on art and psychology'', ''Hiking local trails'', ''Road trips'']'
  career_goals: Michael aspires to continue his education by pursuing a bachelor's degree in Communications or Arts Administration, aiming to merge his love for art and community engagement. In the short
    term, he seeks internships or entry-level positions in cultural institutions, galleries, or nonprofit community outreach programs where he can apply his event planning and social media skills. His long‑term
    ambition is to become a cultural program coordinator or community outreach director, designing inclusive arts programs that foster dialogue and bring diverse audiences together in the Kansas City metropolitan
    area.
