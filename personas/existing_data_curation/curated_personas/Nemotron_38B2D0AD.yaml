    Printing Projects'', ''Genealogy Research'', ''Historical Society Volunteering'']'
  career_goals: Madelyn aims to advance to a director-level role within the next three years, overseeing multiple manufacturing sites and leading a regional technology integration initiative. She plans
    to obtain an executive MBA to complement her technical background, and she aspires to champion sustainability and digital transformation projects that reduce waste and increase productivity. In the
    long term, she envisions founding a consultancy that helps midsize manufacturers adopt lean practices and workforce development programs.
