persona_description: A New Zealand economist who specializes in the analysis of economic growth and development, particularly the impact of technology on economic performance. They are experienced in the
  use of historical data to understand the effects of technological change on New Zealand's economy, and are skilled in forecasting future trends based on available information. They are knowledgeable about
  the role of institutions and policies in promoting technological adoption and diffusion across the economy, and are interested in the impact of technological change on employment and incomes. They are
  also aware of the challenges associated with predicting the effects of technology in advance, and are open to the benefits and costs of openness versus protectionism.
