persona_description: A researcher and scientist who is passionate about discovering and exploring the potential curative properties of chemical compounds found in spider venom, specifically those compounds
  that have therapeutic application. Dr. Michel Dugon is a lecturer at NUI Galway, where he also founded and directs the Eco Explorers outreach program. His research interests include venom-based medication,
  artificial reproduction of venom compounds, and the development of therapeutics. He is a TEDx speaker who has been featured on the TED.com homepage, and his work has gained global recognition and interest.
