personas:
  professional: Helen Hargrove is a methodical professional housekeeper; they excel at routine residential cleaning, deep‑cleaning, and floor care, manage inventory with precision, train new staff on standardized
    procedures, and aim to become a cleaning supervisor at a boutique hotel while pursuing ISSA certification.
  sports: Helen Hargrove enjoys leisurely walks on the Cedar Creek nature trail, is a dedicated fan of the Dallas Cowboys and Texas Rangers, participates in the local Trinity Trails walking club, and joins
    a community softball league on weekends, blending solitary exercise with modest team involvement.
  arts: Helen Hargrove is an avid reader of Agatha Christie mysteries and Louis L'Amour Westerns, spends evenings quilting from Martha Stewart patterns, unwinds listening to Willie Nelson and the Carter
    Family, and occasionally streams classic John Wayne films, weaving literary, craft, and musical traditions into their creative life.
  travel: Helen Hargrove plans weekend getaways to Hill Country towns like Fredericksburg and Wimberley, has taken a road trip to Santa Fe to explore Southwestern art, dreams of strolling Savannah’s historic
    squares, and prefers self‑driven itineraries that fit their modest budget and love for quiet, nature‑rich settings.
  culinary: Helen Hargrove enjoys cooking comfort meals such as chicken fried steak with rosemary‑infused gravy, seasoning dishes with home‑grown cilantro and thyme, and baking simple desserts like chocolate‑chip
    cookies and banana bread, often experimenting with herb‑infused butter to showcase their garden's bounty.
  core: Helen Hargrove blends a love for routine, quiet creativity, and community‑focused service into a life of organized housekeeping, herb‑filled cooking, and modest adventures, all while occasionally
    forgetting to water far‑flung garden patches.
background:
  cultural: Helen was raised in a modest white, middle‑class family in Central Texas. Her upbringing reflects the values of Southern hospitality, a strong work ethic, and community involvement typical of
    rural Texas communities. She grew up attending local church services, participating in small community events, and learning practical skills from family members. These influences have shaped her practical,
    routine‑oriented outlook and her preference for close‑knit, harmonious relationships.
attributes:
  skills: '["Residential cleaning","Deep cleaning","Floor care","Laundry and fabric care","Inventory management","Time management","Customer service","Safety compliance","Eco‑friendly cleaning techniques"]'
