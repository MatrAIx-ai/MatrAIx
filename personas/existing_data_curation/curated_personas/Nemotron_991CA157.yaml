  career_goals: Helen aims to advance to a lead housekeeper or cleaning supervisor position at a reputable hotel or large residential property, where she can implement standardized cleaning protocols. She
    plans to earn a professional certification (such as ISSA’s Certified Professional Cleaner) and possibly pursue an associate degree in hospitality management. Long‑term, Helen aspires to launch her own
    small cleaning business that emphasizes eco‑friendly practices and reliable, routine‑driven service for the Cedar Creek community.
