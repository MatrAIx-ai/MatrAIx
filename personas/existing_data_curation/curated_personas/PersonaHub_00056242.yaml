persona_description: A geneticist who specializes in the study of mtDNA haplogroups and their distributions, particularly in Europe, North Africa and the Middle East. His research interests include the
  origins and history of mtDNA haplogroup U4, its connection to the Bronze and Iron Age Indo-European migrations, and the potential role of nomadic tribes of hunter-gatherers in the spread of this lineage.
  He is also interested in the frequency and distribution of mtDNA haplogroups in Europe, North Africa and the Middle East, and the implications of these findings for the study of human migration and settlement.
