personas:
  professional: Charles Hilliard, a disciplined sales strategist with a data‑driven approach to wholesale and manufacturing accounts, they leverage advanced Excel modeling, Salesforce CRM mastery, and lean
    logistics to build standardized sales playbooks that boost team performance while delivering clear, concise presentations to both technical and executive audiences.
  sports: Charles Hilliard, an avid hiker and occasional trail‑runner who follows the Portland Timbers, tracks his mileage with the Central Oregon Trail Runners, and volunteers in the Bend Cycling Club
    during summer, they structure their fitness around weekly long‑distance hikes in the Cascades and seasonal cross‑country ski trips to Mt. Hood.
  arts: Charles Hilliard, a methodical landscape photographer who cites Ansel Adams and Edward Weston as technical inspirations, they curate a personal collection of prints, attend quarterly exhibits at
    the Portland Art Museum featuring works by Jeff Koons, and unwind to the folk‑rock stylings of The Decemberists and Nick Drake while occasionally streaming classic films starring Tom Hanks.
  travel: Charles Hilliard, a planner‑oriented traveler who prefers detailed week‑by‑week itineraries, they spend vacations exploring natural wonders such as Yellowstone, Crater Lake, and the fjords of
    Iceland, while budgeting carefully to keep trips under $4,000 and avoiding spontaneous backpacking tours.
  culinary: Charles Hilliard, a precise home‑brewer who crafts small‑batch IPAs using Cascade and Simcoe hops and enjoys cooking grilled salmon with dill, quinoa salads topped with roasted beetroot and
    pistachios, and experimenting with sous‑vide techniques for perfectly tender steak, they treat each brew and dish as a controlled experiment, documenting every variable in a leather‑bound journal.
  core: Charles Hilliard, a solitary, structure‑seeking analyst‑turned‑sales leader who meticulously plans every hike, brew, and spreadsheet, yet they habitually check email at 2 am and hoard puzzle books
    for the next rainy weekend.
background:
  cultural: Charles comes from a white Northern European lineage—primarily German and Scandinavian ancestry—typical of many families who settled in the Pacific Northwest during the mid‑20th century. Raised
    in suburban Bend, Oregon, he was immersed in the region’s strong emphasis on self‑reliance, outdoor recreation, and an independent work ethic. The local culture’s blend of rugged individualism and community-oriented
    small‑town values has shaped his practical, solitary disposition and his competitive drive in professional settings.
attributes:
  skills: '[''B2B sales'', ''Strategic negotiation'', ''Account management'', ''CRM (Salesforce) proficiency'', ''Advanced Excel data analysis'', ''Industrial product knowledge'', ''Lean logistics and process
    optimization'', ''Sales forecasting'', ''Presentation and communication'', ''Sales playbook development'']'
  hobbies: '[''Hiking and trail exploration'', ''Landscape photography'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Mechanical model kit building'', ''Reading non‑fiction (economics, history, self‑improvement)'',
    ''Home brewing (craft beer)'']'
  career_goals: Charles aims to transition from an individual contributor role to a regional sales leadership position within the next three years, seeking responsibilities that allow him to design and
    implement scalable sales processes across multiple territories. He is pursuing a Certified Sales Executive (CSE) credential and plans to enroll in a supply chain management certificate program to deepen
    his technical expertise. Long‑term, he envisions establishing a boutique consulting firm that advises mid‑size manufacturers on data‑driven sales strategies and operational efficiencies, ultimately
    achieving financial independence and the flexibility to work on his own schedule.
