  skills: '[''crayon drawing'', ''finger painting'', ''block building'', ''shape and color sorting'', ''memorizing simple songs'', ''following routines'', ''leading group games'', ''competitive play'']'
  hobbies: '[''crayon drawing'', ''finger painting'', ''singing and dancing'', ''collecting leaves and stones'', ''storytime at the library'', ''group competitive games'']'
  career_goals: Even at age three, Sakineh frequently says she wants to "make beautiful pictures" and "help animals" when she grows up. She imagines becoming an artist who creates colorful murals, a teacher
    who shares new ideas with curious students, or a veterinarian caring for pets. These ambitions echo her organized, achievement‑driven personality and her love of art, learning, and caring for others.
