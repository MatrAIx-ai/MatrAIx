personas:
  professional: Sakineh Miller, a three‑year‑old mini architect who meticulously arranges building blocks into intricate cityscapes, channels their disciplined, achievement‑driven nature into playtime while
    eagerly sharing designs with friends and constantly questioning how each piece might be used in a new way.
  sports: Sakineh Miller darts between the Little Tigers Soccer Club practice field and toddler gymnastics class at the community center, eagerly chanting for the hometown Chicago Cubs while preferring
    structured, organized play over free‑form running.
  arts: Sakineh Miller spends afternoons finger‑painting to the tunes of Taylor Swift and Beethoven’s Für Elise, proudly displaying a kid‑sized poster of Van Gogh’s Starry Night, and insists on reenacting
    scenes from Sesame Street with their favorite stuffed characters.
  travel: Sakineh Miller loves family road trips to the glittering lights of Disneyland and the sweeping vistas of Grand Canyon National Park, always demanding the front‑seat window view, packing extra
    snacks, and dreaming of tomorrow’s adventure to Tokyo’s towering skyscrapers while respecting the family’s travel budget.
  culinary: Sakineh Miller has a particular fondness for mac & cheese made with sharp cheddar, crunchy chicken nuggets, and apple slices drizzled with honey, proudly insisting on stirring the melted cheese
    with a tiny wooden spoon and sprinkling a dash of cinnamon on their oatmeal.
  core: Sakineh Miller, a tiny whirlwind of curiosity and perfectionism, balances a love for organized play with an ever‑present worry about the smallest details, constantly seeking approval while questioning
    the motives of everyone around them.
background:
  cultural: Sakineh is raised in a white, middle‑class family in Moundsville, West Virginia. Her upbringing reflects the close‑knit community values of small‑town Appalachia, with emphasis on family gatherings,
    church events, and local traditions such as county fairs and outdoor recreation. She is exposed to regional folk music, crafts, and a strong sense of community involvement, while also experiencing broader
    American cultural influences through preschool, media, and library programs.
