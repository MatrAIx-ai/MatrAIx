personas:
  professional: Gavin Fletcher, a meticulous 10-year-old aspiring engineer, translates his love for order into complex Lego constructions and early Scratch coding projects, planning each step with methodical
    precision and they relish turning imaginative ideas into functional prototypes.
  sports: Gavin Fletcher, a member of the Canal Fulton Youth Soccer League who proudly wears the green jersey of the Jaguars, follows the Cleveland Browns and Cleveland Guardians, and they balance weekly
    practices with structured drills, preferring routine training over spontaneous scrimmages.
  arts: Gavin Fletcher, an avid fan of the LEGO Movie, the vibrant sci-fi illustrations of Chris Foss, and the uplifting tracks of Imagine Dragons, spends weekends sketching rockets and creating interactive
    Scratch stories, letting these creative outlets complement his structured building hobbies.
  travel: Gavin Fletcher, who has explored Cuyahoga Valley National Park on a school field trip and visited the Rock and Roll Hall of Fame with his family, dreams of traveling to the Kennedy Space Center
    and the Smithsonian’s Air and Space Museum, planning each outing with meticulous checklists while balancing family budget constraints.
  culinary: Gavin Fletcher, who prefers classic comfort foods like macaroni-and-cheese and pizza but delights in baking space-themed cupcakes with star-shaped sprinkles, enjoys helping his dad measure ingredients
    on the kitchen counter, yet sometimes forgets to tuck away his Lego pieces before dinner.
  core: Gavin Fletcher is a detail-obsessed 10-year-old tinkerer whose love for orderly creation fuels his Lego and coding projects, while a tendency toward worry often leads to over-analysis of school
    tasks and social situations.
background:
  cultural: Gavin grew up in the small Midwestern city of Canal Fulton, Ohio, in a family that values hard work, community involvement, and traditional American holidays. His household reflects typical
    white, middle‑class values of the region, with an emphasis on school performance, participation in church or community gatherings, and a love for local traditions like the Fourth of July fireworks and
    annual county fairs. These surroundings have reinforced his preference for order, predictability, and cooperative teamwork.
attributes:
  skills: '[''Organizational skills'', ''Attention to detail'', ''Logical reasoning'', ''Basic programming (Scratch)'', ''LEGO model building'', ''Team coordination in group projects'']'
