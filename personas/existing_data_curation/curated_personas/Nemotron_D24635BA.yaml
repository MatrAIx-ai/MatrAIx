  career_goals: He dreams of becoming a civil engineer or architect who designs safe, well‑planned buildings and bridges. He is fascinated by how things are built and wants to create structures that help
    his community. In the short term, he aims to improve his math grades, participate in the school’s robotics club, and earn a badge in Boy Scouts that involves project planning.
