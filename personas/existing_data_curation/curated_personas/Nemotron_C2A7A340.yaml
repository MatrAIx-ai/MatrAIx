  hobbies: '[''building block towers'', ''reading picture books'', ''singing nursery rhymes'', ''dancing'', ''pretend doctor play'', ''creating organized art projects'', ''structured playground games'']'
  career_goals: Lurine dreams of becoming a teacher or a community helper who can nurture and guide younger children. She aspires to learn how to read fluently, help her friends solve problems, and one
    day lead a classroom where she can share kindness and order. She also imagines caring for others as a pediatric nurse or doctor, motivated by her deep compassion.
