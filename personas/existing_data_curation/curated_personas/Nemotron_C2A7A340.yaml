personas:
  professional: A budding entrepreneur who runs a meticulously organized pretend lemonade stand, Lurine Taylor combines curiosity about flavors with disciplined record‑keeping, and they use a tiny ledger
    to track earnings.
  sports: A playful team‑oriented athlete, Lurine Taylor loves the local mini‑soccer league with the Tiny Tigers, cheers for the City Raptors basketball team, and they spend afternoons in tumble‑trampoline
    classes to stay active.
  arts: An enthusiastic little artist, Lurine Taylor spends afternoons drawing bright dinosaurs, sings along to The Wiggles and Raffi, and they collect storybooks by Dr. Seuss that fuel a vibrant imagination.
  travel: An adventurous explorer, Lurine Taylor has visited grandparents’ countryside home, the downtown aquarium, and a weekend beach trip to Santa Monica, they now dream of a future vacation to Disneyland.
  culinary: A budding chef in the kitchen, Lurine Taylor loves mac and cheese, peanut butter‑jelly sandwiches, and strawberry slices, they can whisk pancake batter with a plastic spoon, and they insist
    on sprinkling extra cheese on everything.
  core: Lurine Taylor blends childlike curiosity with an uncanny love for order, turning every playtime into a meticulously planned project while never missing a chance to share toys with friends.
background:
  cultural: Lurine is raised in a Black African-American family in Killeen, Texas, where she experiences a blend of Southern and urban cultural traditions. Her family celebrates holidays such as Juneteenth
    and Thanksgiving with soulful cooking, gospel music, and community gatherings at the local church. She often participates in church Sunday school, where storytelling and choir singing reinforce her
    love for rhythm and community. The vibrant African-American cultural scene in Bell County, including family reunions, barbecue picnics, and dance circles, shapes her sense of identity and her compassionate
    outlook.
