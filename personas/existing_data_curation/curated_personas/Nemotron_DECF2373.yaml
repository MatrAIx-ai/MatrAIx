  hobbies: '[''Visiting Art Galleries'', ''Museum Talks'', ''Hiking'', ''Skiing'', ''Digital Photography'', ''Reading Speculative Fiction'', ''Philosophy'', ''Journaling'', ''Yoga'', ''Mindfulness Meditation'',
    ''Chess'', ''Settlers of Catan'', ''Volunteer Work at Library'']'
  career_goals: Holly aspires to turn her passion for art and organization into a career in arts administration. She aims to secure an entry‑level position at a museum or cultural center in Utah, where
    she can curate exhibitions, manage community outreach programs, and develop educational content. Over the next five years she hopes to earn a bachelor's degree in Museum Studies while gaining practical
    experience, eventually moving into a senior curator or program director role. Holly is also motivated to build a freelance portfolio in graphic design and photography, which could provide supplemental
    income and creative autonomy. Balancing her competitive drive with her desire for stability, she intends to acquire professional certifications in project management to enhance her employability and
    alleviate her stress about future job security.
