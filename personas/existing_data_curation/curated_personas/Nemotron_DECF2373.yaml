personas:
  professional: Holly Hall, a 24‑year‑old aspiring arts administrator, leverages their Adobe Photoshop skill, meticulous project‑planning ability, and competitive strategic mindset to curate community exhibitions
    while balancing freelance graphic design work, and they thrive in environments that reward both creativity and precise organization.
  sports: Holly Hall, an avid hiker and seasonal skier, belongs to the Wasatch Outdoor Club, regularly trails Ogden Canyon and skis Wasatch slopes, follows the Utah Jazz and Real Salt Lake with fervor,
    and they treat each weekend excursion as both a workout and a mental reset.
  arts: Holly Hall frequently visits the Ogden Museum of Art, immerses themselves in installations by James Turrell and Yayoi Kusama, listens to indie folk from Bon Iver, admires the theatrical performances
    of Lin‑Manuel Miranda, and they channel this eclectic inspiration into personal photography projects and community exhibition planning.
  travel: Holly Hall plans meticulous road trips, prefers wandering the national parks of Utah such as Zion and Bryce, has explored Portland's coffee scene, dreams of strolling through Kyoto's temples,
    and they balance budget constraints with a love for spontaneous sunrise hikes.
  culinary: Holly Hall enjoys farm‑to‑table meals, often cooks quinoa bowls seasoned with roasted beets, goat cheese, and sumac, savors miso ramen on rainy evenings, and they occasionally bake almond croissants
    despite a self‑confessed tendency to over‑brown the edges.
  core: Holly Hall blends a curious artistic soul with a methodical, slightly skeptical mind, channeling competitive drive into curating culture while juggling anxiety‑fuelled perfectionism and a love for
    solitary mountain escapes, and they constantly seek balance between ambition and self‑care.
background:
  cultural: Holly grew up in a predominantly white, middle‑class family in the Intermountain West, with cultural influences from both mainstream American values and the local LDS‑centric community in Utah.
    Her upbringing emphasized self‑reliance, education, and community service, while also exposing her to the region’s strong connection to nature and outdoor recreation. Frequent family trips to national
    parks and local cultural festivals fostered her appreciation for both natural landscapes and artistic expression. This blend of cultural norms has shaped her worldview, encouraging a balance between
    individual achievement and a sense of belonging to her community.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Digital Photography'', ''Research & Archival Methods'', ''Project Planning'', ''Budget Management'', ''Microsoft Excel'', ''Public Speaking'', ''Critical
