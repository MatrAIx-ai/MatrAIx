  career_goals: Lloyd’s primary ambition is to strengthen his professional qualifications so he can move beyond entry-level personal care work. Over the next two years he plans to earn a Certified Nursing
    Assistant (CNA) credential and a state-approved Home Health Aide certification, which will allow him to take on more complex client needs and command higher hourly rates. He also seeks to become a lead
    aide or shift supervisor within his agency, leveraging his reliability and attention to detail to mentor newer staff. Long-term, Lloyd envisions opening a small, boutique home-care service that emphasizes
    consistent, high-quality routines for elderly clients, positioning himself as a competitive, reputable provider in Queens.
