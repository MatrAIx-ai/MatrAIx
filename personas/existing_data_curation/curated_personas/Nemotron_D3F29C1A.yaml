personas:
  professional: Jose Santiago, a 25‑year‑old real‑estate agent in southern New Jersey, leverages his outgoing nature to build client relationships, uses structured market analysis tools while staying flexible
    with shifting schedules, and lets his skeptical, competitive edge drive hard‑ball negotiations even as occasional disorganization pushes him toward digital task‑management apps and informal planning.
  sports: Jose Santiago, a 25‑year‑old soccer enthusiast, guards the midfield for the local community league team ‘Cumberland County United,’ while cheering for the Philadelphia Eagles and the New York
    Red Bulls, hits the Delaware River Trail for weekend hikes, and holds a membership at the Riverfront Runners club, balancing team sport with solo cardio.
  arts: Jose Santiago, a 25‑year‑old salsa dancer, hones moves at the Salsaboom studio, while a playlist of regional Mexican groups like Banda El Recodo and Los Tigres del Norte fuels his evenings; he frequents
    the Atlantic City Folk Festival and admires actors such as Pedro Pascal and Robert De Niro, seeing film as a way to unwind after a busy day.
  travel: Jose Santiago’s travel style blends spontaneous road trips with budget planning; he’s backpacked the Poconos, explored historic Philadelphia neighborhoods, and dreams of a summer getaway to Cabo
    San Lucas, balancing city buzz with beach relaxation while keeping an eye on travel costs.
  culinary: Jose Santiago, a 25‑year‑old home cook, loves preparing traditional dishes like enchiladas, tamales, and salsa verde for friends, using fresh corn masa, chilies, and cilantro; he prides himself
    on mastering the perfect guacamole and often pairs meals with a cold cerveza, though he admits to over‑salting occasionally and relies on YouTube tutorials for new recipes.
  core: Jose Santiago is a competitive, socially driven real‑estate agent who balances structured work habits with a love for soccer, salsa, and cooking, while wrestling with anxiety and an occasional lack
    of organization.
background:
  cultural: Jose is a first‑generation Mexican‑American who grew up in a bilingual household, speaking Spanish at home and English at school. He maintains strong ties to Mexican traditions, celebrating
    holidays like Día de los Muertos and Cinco de Mayo with family gatherings and traditional foods. His Catholic upbringing influences his community involvement and sense of responsibility. Living in Bridgeton,
    NJ, he is active in the local Latino community, often volunteering at cultural events and using his cultural insight to connect with Hispanic clients in the real‑estate market.
