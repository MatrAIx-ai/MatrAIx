  career_goals: Jose aims to become one of the top‑producing agents in Cumberland County within the next three years and later obtain his New Jersey broker license to open his own boutique agency. He wants
    to expand his network of high‑value clients, specialize in residential investment properties, and achieve a stable, predictable income that reduces his financial stress. In the long term, he hopes to
    mentor younger agents from the Latino community and become a recognized community leader who bridges cultural gaps in the local housing market.
