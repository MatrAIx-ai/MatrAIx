persona_description: A healthcare administrator who is responsible for managing the procurement and inventory of supplies for a surge facility during a public health emergency. This person is likely to
  have experience in healthcare operations, supply chain management, and emergency response planning. They would need to be familiar with the types of equipment and supplies required for a surge facility,
  as well as the specific needs of patients in different types of care settings. They would also need to be able to make informed decisions about the amount of supplies needed, taking into account factors
  such as the expected number of patients, the expected duration of the surge operation, and the expected usage of equipment and supplies. Additionally, they would need to be able to coordinate with other
  departments and stakeholders to ensure that the surge facility is well-stocked and that the appropriate supplies are available when needed.
