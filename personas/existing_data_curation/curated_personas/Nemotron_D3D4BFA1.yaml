  career_goals: Although retired from formal employment, Phong aims to deepen his community impact and personal growth. He aspires to mentor younger Vietnamese‑American volunteers, sharing his practical
    skills and cultural heritage. He hopes to document his family's migration story in a memoir, preserving memories for future generations. Phong also plans to enroll in a local senior college program
    focusing on art history and digital photography, satisfying his curiosity for new ideas. Maintaining his health and mental well‑being through regular exercise and mindfulness practices remains a primary
    personal ambition.
