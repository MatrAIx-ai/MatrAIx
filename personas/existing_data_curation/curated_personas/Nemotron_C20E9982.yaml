  hobbies: '["Watercolor painting", "Reading science‑fiction and philosophy", "Playing bridge", "Participating in trivia nights", "Bird‑watching", "Model‑airplane building", "Gardening heirloom vegetables",
    "Volunteer storytelling"]'
  career_goals: At 87, Earl’s ambitions focus on leaving a lasting personal and communal legacy. He hopes to finish a series of watercolor paintings that capture the changing landscape of Somerset County,
    publish a memoir of his life’s lessons for his grandchildren, and establish a small mentorship program at the senior center where he can teach woodworking and strategic games. Maintaining his health
    so he can continue to travel to nearby art museums and remain active in community projects is also a priority.
