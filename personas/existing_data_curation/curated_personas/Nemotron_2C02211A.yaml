  career_goals: As he looks toward the future, Darren hopes to channel his love for building and community service into a career as a civil engineer, designing safe parks, bridges, and community facilities
    for Green Bay. He also envisions staying connected to the teamwork he values by coaching youth sports or mentoring younger students in STEM clubs. His ambition combines practical problem‑solving with
    a desire to make a positive impact on his hometown.
