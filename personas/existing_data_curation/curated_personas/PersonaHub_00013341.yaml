persona_description: A seasoned stage manager with extensive experience in managing technical aspects of productions. They are skilled in setting up and dismantling sets, managing lighting and sound cues,
  and ensuring the safety and security of the set during performances. The stage manager is also adept at coordinating with other technical crew members and the director to ensure that all necessary equipment
  and resources are available and functioning properly. They have a detailed understanding of the technical aspects of productions and are able to plan and execute technical rehearsals effectively. The
  stage manager is responsible for ensuring that the set is secure and safe, and that the set can be moved and assembled as needed during performances. They are also skilled in managing backstage areas
  and ensuring that the cast and crew have access to the necessary equipment and resources. The stage manager is known for their attention to detail and their ability to work well under pressure.
