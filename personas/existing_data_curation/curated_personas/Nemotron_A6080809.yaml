personas:
  professional: Lo Chang, an aspiring junior coder and storyteller, blends curiosity with practicality by creating interactive Scratch games that teach empathy, showcasing their sociable charisma and compassionate
    collaboration when sharing projects with classmates.
  sports: Lo Chang, a basketball player on the middle school team, practices after school, idolizes the Denver Nuggets, spends weekends skiing at nearby slopes, and volunteers as a peer fitness buddy, blending
    competitive drive with a collaborative spirit.
  arts: Lo Chang, a drama club lead who loves performing monologues and directing teen‑sized productions, draws inspiration from Lin‑Manuel Miranda’s musical storytelling and the classic films of Hayao
    Miyazaki, while also crafting animated shorts on Scratch that showcase vibrant characters.
  travel: Lo Chang, an adventure‑seeking teen, enjoys weekend hikes in the Rocky Mountain National Park, dreams of exploring Kyoto’s historic temples during a future family exchange, and frequently visits
    the nearby Colorado festivals where they combine cultural celebrations with outdoor fun.
  culinary: Lo Chang, a budding home cook, expertly prepares dumplings (jiaozi) and fried rice with soy sauce, ginger, and scallions during Lunar New Year gatherings, while also mastering classic American
    pizza and experimenting with sweet potato fries, reflecting a blend of tradition and youthful palate.
  core: Lo Chang, a bridge between cultures, channels boundless energy, compassion, and curiosity into drama, coding, and community service, while balancing disciplined saving habits with occasional teenage
    indulgences.
background:
  cultural: Lo comes from an East Asian heritage family, with parents who emigrated from China and maintain strong ties to their cultural roots. At home, Mandarin is spoken alongside English, and the family
    celebrates Lunar New Year, Mid‑Autumn Festival, and other traditional holidays with food, music, and decorations. These customs instill a respect for harmony, cooperation, and community service, which
    is reflected in Lo's compassionate personality. Living in Erie, Colorado, she also embraces the outdoors—hiking, snow sports, and local festivals—blending the American love of individual expression
    with her family's emphasis on collective well‑being. This bicultural environment shapes her identity as a bridge between cultures, encouraging her to help others and promote understanding.
