  career_goals: Lo envisions a future where she can blend her love of science, compassion for others, and talent for bringing people together. In the short term, she aims to expand her involvement in school
    STEM clubs, lead a youth mentorship program in Weld County, and volunteer at local health fairs. Her long‑term ambition is to become a pediatric health educator or public health professional focused
    on child wellness, eventually earning a degree in public health or medicine. She hopes to design community‑based programs that teach science and healthy habits to children in rural Colorado while fostering
    cultural understanding through bilingual outreach.
