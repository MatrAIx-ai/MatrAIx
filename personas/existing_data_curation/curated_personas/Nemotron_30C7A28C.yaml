  career_goals: John is eager to move from his current hiatus into a full‑time entry‑level position in business development or sales, where he can blend his analytical strengths with his natural affinity
    for client interaction. Over the next three to five years, he aims to progress into a supervisory role, leading a small team and managing key accounts. Ultimately, he envisions launching his own boutique
    consulting firm that helps local small businesses streamline operations and improve profitability. He prefers roles that provide clear performance metrics, structured training pathways, and mentorship
    opportunities, aligning with his desire for predictability and professional growth.
