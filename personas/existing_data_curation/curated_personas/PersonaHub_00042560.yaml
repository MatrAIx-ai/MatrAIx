persona_description: A Fulbright Scholar who studied stellar evolution and the early universe at the Niels Bohr Institute in Denmark, and is now a graduate student in astrophysics at Boston University.
  She has received funding to continue her research on spectral emissions from elderly stars, using the Radial Velocity Technique to detect if they are binary systems of two stars orbiting each other. She
  has made friends and professional contacts during her Fulbright program and is sad to leave but confident in her future visits.
