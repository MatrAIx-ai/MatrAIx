  career_goals: Karen aims to transition from first-line supervision to a regional director role where she can shape data-centric sales strategies and champion mentorship programs for emerging female leaders.
    She is passionate about integrating emerging technologies, such as AI-driven analytics, into sales operations and hopes to leave a legacy of a more inclusive, innovative sales culture before moving
    into selective consulting.
