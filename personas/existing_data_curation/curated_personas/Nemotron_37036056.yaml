  career_goals: Although retired, Olivia aims to stay active and purposeful by mentoring newer volunteers, overseeing the senior center’s annual fundraiser, and creating a community archive that preserves
    her family’s history. She also aspires to maintain her health through consistent routines, achieve recognition in local garden contests, and continue contributing to her church and neighborhood associations.
