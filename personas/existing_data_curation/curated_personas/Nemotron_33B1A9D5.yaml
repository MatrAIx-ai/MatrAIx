  hobbies: '[''Attending art exhibitions and mural tours'', ''Photography'', ''Cooking traditional Mexican dishes'', ''Gardening'', ''Hiking in local nature trails'', ''Participating in community cultural
    festivals'', ''Mentoring youth in robotics and digital art'', ''Reading historical novels and science books'', ''Yoga and mindfulness meditation'', ''Volunteering at local museums'']'
  career_goals: Although retired from formal employment, Maria is driven to create lasting impact through volunteer work and lifelong learning. She plans to launch a community program that blends STEM workshops
    with local art projects, giving Hispanic youth hands‑on experience in robotics, coding, and digital illustration. She aspires to become a regular guest lecturer at nearby schools and museums, develop
    bilingual educational materials that demystify science for Mexican‑American families, and someday co‑author a memoir highlighting her journey as a Latina in engineering. Additionally, she is committed
    to strengthening her own knowledge of emerging technologies, such as Arduino microcontrollers and virtual‑reality art installations, while cultivating mindfulness practices to manage stress.
