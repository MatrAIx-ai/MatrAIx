personas:
  professional: Maria Montano, a retired mechanical engineer with three decades of structural analysis and CAD expertise, now channels their analytical rigor, bilingual fluency, and curiosity into volunteering
    as a STEM‑arts program coordinator, where they blend meticulous project management with an open‑minded, collaborative teaching style.
  sports: Maria Montano, an avid weekend hiker who belongs to the Los Angeles Hiking Club, stays fit with gentle yoga sessions and occasional trail runs, and cheers enthusiastically for the Los Angeles
    Lakers, the Dodgers, and the LA Galaxy while swapping game predictions at their community garden gatherings.
  arts: Maria Montano immerses themselves in Los Angeles' vibrant art scene, frequently attending exhibitions featuring David Hockney, exploring street‑mural tours that showcase works by local artists like
    Shepard Fairey and Marta Güere, and channeling their own photography of cityscapes into curated community showcases that blend scientific narratives with visual storytelling.
  travel: Maria Montano plans their travels with meticulous itineraries, favoring a mix of local adventures such as hiking in Joshua Tree and weekend getaways to Santa Barbara, while also savoring international
    escapes to Oaxaca’s historic markets and the art‑rich streets of Barcelona, balancing cultural immersion with moderate budgeting.
  culinary: Maria Montano enjoys preparing authentic Mexican dishes such as mole poblano, carne asada tacos, and tamales de elote, skillfully balancing smoky chipotle, fresh cilantro, and roasted corn masa,
    while also experimenting with fusion twists like quinoa‑stuffed chiles, reflecting their culinary curiosity and love for vibrant flavors.
  core: Maria Montano transforms their perpetual curiosity and occasional worry into a disciplined habit of color‑coding every garden tool and art‑supplies shelf, a quirky ritual that keeps them organized
    while fueling their boundless creative projects.
background:
  cultural: Maria was raised in a close‑knit Mexican immigrant family in the Los Angeles area, where Spanish was spoken at home and Mexican traditions such as Día de los Muertos, quinceañeras, and posadas
    were celebrated with great pride. Her upbringing emphasized respect for elders, community solidarity, and a love for music and dance. Living in South Gate, a vibrant Latino enclave, she remains actively
    involved in neighborhood events, often volunteering to organize cultural celebrations and educational workshops. Her bicultural identity informs her approach to mentorship, as she strives to honor her
    heritage while fostering inclusion in STEM fields for the next generation of Mexican‑American students.
