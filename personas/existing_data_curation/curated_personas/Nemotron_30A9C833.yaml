personas:
  professional: A budding comic artist and junior coder, Chan Zhang blends vivid imagination with meticulous organization to sketch original storyboards, craft LEGO-inspired mini worlds, and build simple
    Scratch games that delight friends and family.
  sports: An enthusiastic participant in the community’s Saturday soccer league with the Mountain Rangers, Chan Zhang also follows the New York Yankees in baseball and the Golden State Warriors in basketball,
    balancing active play with weekly hikes that fuel their love for nature.
  arts: A devoted fan of Studio Ghibli’s animation and the vibrant panels of Marvel comics, Chan Zhang channels their imagination into original comic strips, studies the styles of artists like Hayao Miyazaki
    and Jim Lee, and often hums the tunes of Billie Eilish while sketching in the weekend art workshop.
  travel: A curious explorer, Chan Zhang has trekked through the nearby Redwood State Park and toured the natural history museum in Washington, D.C., while dreaming of future adventures to Tokyo’s anime
    districts and the magical lands of Disneyland.
  culinary: A budding kitchen experimenter, Chan Zhang loves assembling colorful sushi rolls with cucumber, avocado, and crab sticks, whipping up blueberry pancakes on weekend mornings, and savoring pepperoni
    pizza slices while occasionally sneaking an extra bite of chocolate chips when no one’s watching.
  core: Chan Zhang’s boundless imagination drives them to blend storytelling, coding, and LEGO engineering into everything they touch—though they sometimes leave stray bricks scattered across the living
    room, a small reminder of their relentless creative momentum.
background:
  cultural: Chan grows up in a Chinese‑American household in Hightstown, New Jersey, where his family celebrates traditional festivals such as Lunar New Year and the Moon Festival with foods like dumplings
    and mooncakes, while also sharing Mandarin greetings and basic calligraphy practice at home. He attends a public elementary school that reflects the multicultural fabric of Middlesex County, giving
    him exposure to a variety of cultures and perspectives. The blend of his family's emphasis on harmony, respect for elders, and collaborative values with his American environment nurtures his kind, cooperative
    nature and his interest in sharing stories that bridge both Eastern and Western narratives.
