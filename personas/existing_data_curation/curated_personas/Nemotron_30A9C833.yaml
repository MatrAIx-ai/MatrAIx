  career_goals: Looking ahead, Chan envisions a future where he merges his love for art and technology, hoping to become a video game designer or an animator who creates worlds that inspire and teach others.
    He also dreams of inventing playful educational tools that combine storytelling, visual art, and simple coding, aiming to make learning enjoyable for peers. While he is still young, his goal is to develop
    the skills needed to bring his imaginative concepts to life and share them with a broad audience.
