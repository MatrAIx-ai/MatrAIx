persona_description: A social scientist who is interested in studying the impact of prolonged solitary confinement on prisoners' mental health and the rights guaranteed under the Eighth and Fourteenth Amendments.
  They are advocating for the use of social support and seeking to expand their person-by-situation approach to studying other emotion regulation strategies like acceptance, distraction, and suppression.
  They are also interested in the history of challenges to the use of isolation in prisons and the devastating psychological and physical effects of prolonged solitary confinement.
