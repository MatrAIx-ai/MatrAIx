  career_goals: Although only a year old, Dalva’s caregivers notice her strong fascination with books, pictures and the natural world. She often points to animals in picture books and expresses delight
    at bright colors. This early curiosity suggests future aspirations to become a teacher, artist, or veterinarian, where she can nurture her love of learning, creativity, and helping living things. In
    the coming years she aims to complete preschool, develop reading skills, and eventually pursue a career that blends art and science.
