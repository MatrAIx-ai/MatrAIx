  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Sketching'', ''Reading modern philosophy and art catalogues'', ''Poetry writing'', ''Garden cultivation (native wildflowers)'', ''Birdwatching'',
    ''Attending small gallery openings'', ''Jigsaw puzzles'', ''Knitting'']'
  career_goals: Although retired from formal employment, Patrice aims to leave a lasting artistic imprint on her community. She plans to complete a series of abstract watercolors inspired by the Hudson
    Valley landscape and to organize a small exhibition at the New Paltz Town Hall. She also aspires to self‑publish a collection of poems and essays that weave together her reflections on art, aging, and
    solitary exploration. Additionally, she hopes to establish a mentorship program that pairs senior artists with high‑school students, fostering inter‑generational dialogue and encouraging competitive
    excellence in creative practice.
