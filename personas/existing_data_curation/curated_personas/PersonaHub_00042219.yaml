persona_description: A historian or land reform expert who is interested in the history and legal aspects of village lands in Mexico, particularly the ejido system. They are knowledgeable about the Mexican
  constitution of 1917 and its impact on the restoration of village lands, and have a particular interest in the legal and social implications of the ejido system. They are also likely to be familiar with
  the history of land reform in Mexico, including the 18th-century reforms aimed at breaking up church holdings and the 19th-century reforms aimed at restoring village lands. They may have a particular
  interest in the cultural and social aspects of the ejido system, as well as its impact on rural communities in Mexico.
