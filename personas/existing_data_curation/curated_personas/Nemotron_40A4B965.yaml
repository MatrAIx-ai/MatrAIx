  hobbies: '[''Sketching and drawing'', ''Digital painting'', ''Reading graphic novels and sci-fi'', ''Photography of urban landscapes'', ''Visiting modern art museums'', ''Playing chess'', ''Coding small
    interactive projects'', ''Listening to Cuban and indie music'', ''Journaling and creative writing'']'
  career_goals: Eida aims to enroll in a competitive arts-focused high-school program or magnet school where she can deepen her visual-art and technology skills. Her long-term ambition is to become a concept
    artist and visual designer for video games or animated films, leveraging both her bilingual background and her passion for storytelling. She plans to build a strong digital portfolio that showcases
    a distinct, culturally infused style, seeking scholarships that will support her education. Ultimately, she envisions studying graphic design or illustration at a university and later working with a
    multicultural media studio in Miami, creating projects that blend Cuban cultural motifs with contemporary digital art. While she worries about the pressures of a highly competitive field, her organized
    approach and competitive drive keep her focused on these objectives.
