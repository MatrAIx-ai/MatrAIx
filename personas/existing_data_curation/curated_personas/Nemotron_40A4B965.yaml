personas:
  professional: Eida Melendez is a budding visual artist who blends meticulous portrait sketching, bold digital painting, and strategic thinking honed in chess to constantly experiment with vibrant color
    palettes and unconventional compositions, reflecting a curious yet critical mindset.
  sports: Eida Melendez is a casual runner who jogs the Miami Beach boardwalk three times a week, supports the Miami Heat and Florida Panthers, participates sporadically in a school soccer club, but prefers
    solitary fitness routines that mirror the competitive focus they bring to chess matches.
  arts: Eida Melendez is an avid museum‑goer who frequents the Pérez Art Museum Miami, draws creative energy from artists like Frida Kahlo, Banksy, and the rhythmic traditions of Afro‑Caribbean percussion,
    listens to indie electronic acts such as Bonobo, and channels this eclectic mix into vibrant digital portraits and street photography.
  travel: Eida Melendez is a weekend explorer who enjoys day trips to the Everglades for wildlife photography, dreams of wandering Barcelona’s street‑art neighborhoods, plans trips using detailed maps and
    notebooks, yet keeps travels short and regional due to family budget constraints.
  culinary: Eida Melendez is an adventurous home cook who loves crafting mango salsa, empanadas, and grilled fish tacos with fresh cilantro and chipotle, often experiments with new flavor combos during
    art breaks, but tends to skip breakfast and rely on quick snack bars when deep in a project.
  core: Eida Melendez blends fierce curiosity with a solitary creative drive, turning sketchbooks into personal sanctuaries while wrestling with anxiety and a habit of overthinking every brushstroke.
background:
  cultural: Eida grew up in a Cuban-American household in Miami-Dade County, where Spanish is spoken at home and English at school, giving her fluency in both languages. Family gatherings often feature
    traditional Cuban dishes, rhythmic salsa and son music, and storytelling that celebrates resilience and community. Exposure to Little Havana’s vibrant murals, festivals, and community art projects has
    instilled in her a love for bold colors, rhythmic patterns, and narratives rooted in cultural heritage. This bicultural upbringing informs her artistic style, which blends Caribbean motifs with contemporary
    digital aesthetics. At the same time, living in the multicultural mosaic of Miami has nurtured her openness to diverse ideas and unconventional thinking, while also shaping her desire to create work
    that resonates across cultural boundaries.
