  career_goals: Justin aims to solidify his engineering credentials by completing a bachelor’s degree and obtaining his Professional Engineer license within the next three years. He envisions moving from
    a hands‑on design role to a senior project‑manager position where he can spearhead sustainable infrastructure projects—particularly water‑conservation and energy‑efficient building initiatives for the
    Riverside region. He is also interested in mentoring junior engineers, publishing case studies on low‑impact construction, and eventually launching a consulting boutique focused on integrating IoT and
    renewable‑energy solutions into municipal engineering.
