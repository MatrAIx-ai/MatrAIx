personas:
  professional: Justin Anderson, a civil engineer specializing in CAD-driven infrastructure design, blends expertise in AutoCAD, SolidWorks, ANSYS, MATLAB, and Python with a Lean Six Sigma Green Belt and
    Agile project management, and they channel their organized, sociable nature and occasional worry‑driven vigilance into leading cross‑functional teams that deliver sustainable water‑conservation projects
    for the Riverside region.
  sports: Justin Anderson shoots goals for the San Bernardino Strikers in the adult soccer league, hikes the San Bernardino foothills with the Foothills Trek Club each weekend, and they stay tuned to the
    LA Galaxy, Los Angeles Rams, and Los Angeles Dodgers while blending competitive play with regular cardio hikes to maintain their athletic edge.
  arts: Justin Anderson captures the golden light of the San Bernardino trails with a Nikon D5600, finds inspiration in Ansel Adams and National Geographic photography, devours sci‑fi novels by Neal Stephenson
    and Liu Cixin, and they unwind to the electronic beats of Daft Punk, The Chemical Brothers, and the folk harmonies of Fleet Foxes while occasionally attending Blade Runner screenings at the local art‑house
    cinema.
  travel: Justin Anderson plans trips with spreadsheet precision, favoring adventure‑filled getaways like a sunrise hike in Yosemite, a weekend brewery tour in Portland, and a cultural trek through Kyoto’s
    gardens, and they keep a close eye on their budget while dreaming of a future road trip along New Zealand’s South Island.
  culinary: Justin Anderson approaches cooking like a DIY project, mastering medium‑rare ribeye steaks, rosemary‑infused grilled lamb chops, and beer‑braised brisket, pairing them with craft brews such
    as Sierra Nevada Pale Ale and Lagunitas IPA, and they enjoy experimenting with smoky paprika, fresh herbs, and occasional over‑spicing in their quest for the perfect backyard feast.
  core: Justin Anderson is a methodical, sociable engineer who channels curiosity and anxiety into sustainable design, meticulous budgeting, proactive health monitoring, and a weekend life packed with soccer,
    hiking, photography, grilling, and craft‑brew exploration, and they never miss a chance to plan the next project.
background:
  cultural: Justin grew up in a middle‑class family in the Riverside suburbs, where the blend of Southern California’s outdoor lifestyle and a culturally diverse community shaped his worldview. While his
    household celebrated traditional American values of hard work and self‑reliance, frequent exposure to the region’s large Hispanic and Asian populations fostered an appreciation for varied perspectives
    and collaborative community initiatives. He identifies with the laid‑back, environmentally conscious ethos of inland‑area Californians, which is reflected in his interest in sustainable engineering,
    outdoor recreation, and local volunteerism.
