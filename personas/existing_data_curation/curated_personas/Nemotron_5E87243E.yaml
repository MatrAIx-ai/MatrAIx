  hobbies: '[''Reading (finance, self-help, fiction)'', ''Beach photography'', ''Surfing'', ''Cooking Micronesian cuisine'', ''Indoor gardening'', ''Strategic board games (Catan, Scrabble)'', ''Yoga'',
    ''Jogging'', ''Spreadsheet automation and macro scripting'', ''Puzzle solving (sudoku, crosswords)'']'
  career_goals: Elina aims to deepen her accounting expertise and transition from a clerical role to a junior accountant position within the next two years. She plans to enroll in community‑college courses
    to earn an AAT or CPA preparatory certificate, eventually pursuing full CPA licensure. Her long‑term ambition is to become a certified public accountant or internal auditor, leading a small team that
    values flexibility and efficiency. She hopes to leverage her curiosity for new financial technologies to implement automation solutions in her workplace, and she envisions one day launching a boutique
    bookkeeping service for local small businesses in Orange County.
