personas:
  professional: Elina Rittenhouse is a detail‑oriented bookkeeping clerk who combines a curious love of automation with a practical mastery of QuickBooks and advanced Excel macros to streamline ledger reconciliations,
    yet their relaxed attitude toward strict scheduling sometimes leads to last‑minute data crunches that they tackle with a competitive drive to maintain flawless accuracy.
  sports: Elina Rittenhouse hits the waves with the Laguna Beach Surf Club every sunrise, jogs along the Santa Ana River Trail in the cooler months, and follows the Los Angeles Lakers and Dodgers religiously,
    while occasionally joining a weekend beach‑volleyball league that echoes the island dances they grew up celebrating.
  arts: Elina Rittenhouse captures the dawn‑lit coastline through a Canon EOS, drawing inspiration from Ansel Adams' tonal mastery and the mellow acoustic vibes of Jack Johnson, while also losing themselves
    in the novels of Haruki Murakami and the strategic board‑game artistry of Catan, merging visual and literary passions into quiet evenings with friends.
  travel: Elina Rittenhouse prefers spontaneous, surf‑centric getaways like a weekend surf camp in Santa Cruz or a cultural retreat in Bali’s coastal villages, yet they keep a modest travel budget that
    fuels yearly visits to family‑style community feasts in Hawaii and future bucket‑list dreams of exploring the coral reefs of the Maldives.
  culinary: Elina Rittenhouse is a passionate home chef who expertly whips up coconut‑infused fish broth, taro leaf stew, and grilled mahi‑mahi with pineapple salsa—dishes that echo the ocean‑centred feasts
    of their upbringing—while experimenting with modern twists like kimchi‑topped tacos, even though they sometimes over‑salt the stew when juggling surf sessions.
  core: Elina Rittenhouse blends a love of the sea, a competitive eye for numbers, and a laid‑back habit of last‑minute planning into a life where sunrise surf, spreadsheet macros, and community feasts
    coexist, even if they tend to over‑commit to new projects and leave occasional chaos in their wake.
background:
  cultural: Elina identifies as a Micronesian American; her parents emigrated from Chuuk in the Federated States of Micronesia and raised her in a bilingual household where Chuukese and English were spoken.
    She grew up celebrating Micronesian traditions—community feasts, island dances, and ocean‑centric activities—while also assimilating into California's coastal lifestyle. She participates in local Pacific
    Islander gatherings in Orange County, maintains regular video contact with extended family back home, and incorporates traditional foods and values of hospitality, respect, and resilience into her daily
    life. This hybrid heritage shapes her love of the sea, her culinary interests, and her commitment to community.
attributes:
  skills: '[''Bookkeeping'', ''Accounts Payable'', ''Accounts Receivable'', ''Bank Reconciliation'', ''General Ledger Management'', ''QuickBooks'', ''Microsoft Excel (advanced)'', ''Financial Reporting'',
