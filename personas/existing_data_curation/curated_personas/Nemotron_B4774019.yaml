    aid for arts organizations'']'
  career_goals: Mercedes aims to shape policy on emerging technologies and sustainable practices by serving on state bar committees and advisory panels. She seeks to become a senior mentor and thought leader
    within her firm, guiding interdisciplinary legal teams. Over the next five years, she plans to author a book exploring the intersection of law, art, and technology, and to expand her pro bono work to
    support underserved artists and environmental NGOs in Ohio and beyond.
