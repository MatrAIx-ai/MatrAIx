personas:
  professional: Steve Milwood, a 29‑year‑old patient care assistant at a bustling Oklahoma City hospital, applies meticulous vital‑sign measurement, EMR navigation in Epic and Meditech, and certified first‑aid
    expertise to keep the unit running smoothly, while their competitive, skeptical nature pushes them to constantly seek efficiency gains and volunteer for quality‑improvement projects.
  sports: Steve Milwood jogs the Myriad Botanical Gardens trails five mornings a week, competes in the “Oklahoma City Hoops” recreational basketball league, follows the Oklahoma City Thunder and Oklahoma
    City Dodgers, and tracks performance metrics in Strava, treating each workout as a strategic challenge while scheduling recovery like a meticulous planner.
  arts: Steve Milwood unwinds to classic‑rock icons such as Led Zeppelin, Pink Floyd, and The Rolling Stones on a vintage turntable, regularly attends live concerts at the Civic Center Music Hall, and curates
    true‑crime podcasts as a backdrop while assembling furniture, blending auditory art with hands‑on creativity.
  travel: Steve Milwood favors tightly planned weekend road trips, having driven to Santa Fe for a desert art festival and explored New Orleans’ jazz scene, while dreaming of a tech‑focused pilgrimage to
    Kyoto, Japan, balancing adventure with cost‑saving by staying with friends and leveraging credit‑card points.
  culinary: Steve Milwood cooks comfort classics like creamy mac & cheese and chicken pot pie, experiments with sous‑vide salmon and spicy ramen flavored with smoked paprika, jalapeños, and rosemary, displaying
    an intermediate culinary skill set that shines in late‑night experiments but occasionally leads to over‑seasoned dishes.
  core: Steve Milwood is a data‑driven, competitively‑spirited patient care assistant who balances a meticulous work ethic with nightly classic‑rock rituals and a restless curiosity that fuels DIY projects
    and relentless self‑improvement, even as anxiety and occasional tool‑splurges keep them on a tight‑rope.
background:
  cultural: Steve grew up in the suburban neighborhoods of Oklahoma City, absorbing Midwestern values of self‑reliance, community solidarity, and a strong work ethic. His family background is rooted in
    the regional evangelical Protestant tradition, which emphasized modesty, service, and respect for authority, though he has learned to navigate and respect the diverse cultural and religious backgrounds
    of the patients he serves. The local culture—love for BBQ, college football (especially the Oklahoma Sooners), county fairs, and outdoor recreation—has shaped his social outlook and leisure preferences.
    While identifying as white, Steve actively acknowledges the multicultural fabric of his city, fostering an inclusive attitude in his professional interactions and community volunteering.
attributes:
  skills: '[''Patient care and assistance'', ''Vital signs measurement'', ''Medical documentation and EMR entry'', ''Infection control and sterilization'', ''Basic phlebotomy'', ''Patient transport and
    mobility assistance'', ''Medical equipment preparation and maintenance'', ''First aid and CPR certification'', ''Quality improvement data collection'', ''Effective communication with interdisciplinary
    teams'']'
  hobbies: '[''Jogging and trail running'', ''Recreational basketball'', ''DIY home improvement projects'', ''Podcast listening (healthtech, science, true crime)'', ''Strategy board games'', ''Cooking and
    recipe experimentation'', ''Reading non-fiction (psychology, productivity)'', ''Volunteering at community health events'', ''Classic rock music appreciation'']'
  career_goals: Steve aims to advance beyond his current support role by earning a Certified Nursing Assistant (CNA) credential within the next year, followed by an Associate's degree in Nursing to become
    a Licensed Practical Nurse. He is motivated to move into a supervisory position such as Health Unit Coordinator or Patient Safety Officer, where he can apply his analytical mindset to drive quality
    improvement initiatives. Long‑term, Steve envisions leading a team focused on patient safety and workflow optimization, and eventually pursuing a degree in health informatics to merge his interest in
    data with frontline care. He also hopes to mentor new staff members and contribute to community health outreach programs in Oklahoma City.
