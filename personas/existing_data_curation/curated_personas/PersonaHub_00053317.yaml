persona_description: A United Nations expert on child marriage who is concerned about the impact of the COVID-19 pandemic on vulnerable girls and young women, and is advocating for timely social interventions
  to reverse this trend. This individual is knowledgeable about the effects of school closures, interrupted support services, and economic downturns on girls' lives and is committed to addressing the economic
  impact of COVID-19 on poor households to prevent child marriage. This expert is also aware of the link between teenage pregnancy and child marriage and is advocating for increased access to sexual and
  reproductive health education to address this issue.
