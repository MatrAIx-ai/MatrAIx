  career_goals: Michael aims to build a robust portfolio that blends his love for art and technology, with the long‑term goal of becoming a freelance concept artist or game designer. He envisions working
    on visual development for indie video games or collaborating with a larger studio on character design. In parallel, he wants to deepen his coding skills to create interactive digital experiences and
    eventually launch his own small creative studio that offers illustration, animation, and web‑based art services. Completing his high school education through an alternative pathway while attending workshops
    or art camps is part of his plan to broaden his skill set without sacrificing his need for flexibility.
