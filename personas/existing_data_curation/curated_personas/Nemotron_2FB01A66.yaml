personas:
  professional: Michael Kuchenbuch is an aspiring concept artist and budding game designer who blends hand‑drawn sketching, digital illustration in Photoshop, and beginner‑level Python web projects to prototype
    interactive characters, while their curious yet spontaneous nature often leads them to jump between ideas without finishing them, and their skeptical streak makes them constantly critique their own
    work before sharing.
  sports: Michael Kuchenbuch enjoys casual weekend hikes through the Arkansas countryside and follows the Arkansas Razorbacks football team, but they rarely join organized sports, preferring quick pick‑up
    basketball games with friends and using the physical activity as a break from gaming marathons.
  arts: Michael Kuchenbuch draws inspiration from indie rock bands like Arcade Fire and blues legends such as Muddy Waters while sketching in the style of Alex Ross, frequently visits local murals by street
    artists like Banksy‑style creators, and spends evenings editing videos set to music from Bon Iver and The White Stripes.
  travel: Michael Kuchenbuch favors spontaneous road trips to nearby natural spots like the Ouachita National Forest and has dreamt of exploring the vibrant art districts of Portland, Oregon and the gaming
    arcades of Tokyo, often planning trips on a shoestring budget and leaning on friends for rides.
  culinary: Michael Kuchenbuch loves cooking simple comfort dishes such as chicken fried steak with garlic butter mashed potatoes and spicy shrimp tacos, experimenting with smoky paprika and fresh cilantro,
    while they often resort to late‑night snack runs for nachos and soda during gaming sessions.
  core: Michael Kuchenbuch, a 16‑year‑old visual creator, fuses sketching, code, and guitar riffs into a restless, curiosity‑driven world of art and games, punctuated by impulsive spending, occasional health
    neglect, and a habit of procrastinating deadlines.
background:
  cultural: Michael grew up in Washington, Arkansas, a small town in the rural Delta region where community ties, church gatherings, and county fairs are central to daily life. His family’s Southern roots
    bring a familiarity with modesty, hospitality, and a strong sense of local tradition, including an appreciation for the region’s music heritage like Delta blues and country. At the same time, Michael’s
    curiosity draws him toward broader cultural influences through online art communities, indie music, and contemporary media. This blend of Southern modesty and a self‑directed, internet‑savvy outlook
    shapes his worldview and artistic sensibilities.
