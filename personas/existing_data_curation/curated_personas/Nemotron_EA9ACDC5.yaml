  career_goals: Glenn aspires to transition into a senior regional director role within the next five years, pursuing a bachelor’s degree or MBA to broaden his strategic acumen. He is passionate about embedding
    sustainability and employee well‑being into operational practices, and he aims to lead initiatives that integrate local arts and culture into his company's community engagement program. Long‑term, he
    envisions mentoring the next generation of managers and possibly launching his own consultancy focused on lean process improvement for small‑to‑mid‑size businesses.
