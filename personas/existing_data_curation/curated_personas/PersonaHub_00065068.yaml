persona_description: A geologist who is fascinated by the geological history of the Salar de Uyuni, its transformation between several prehistoric lakes, and its role as a climatological transitional zone.
  This person is particularly interested in the brine and salt crust, and how they serve as a source of salt and cover a pool of brine, which is exceptionally rich in lithium. They are also curious about
  the flora and fauna that inhabit the area, including the pink flamingos, and the geological processes that have shaped the Altiplano of Bolivia.
