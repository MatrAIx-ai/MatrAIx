persona_description: A biologist who studies the defense mechanisms of sea hares and the mechanisms by which predators are affected by these defenses. They are interested in understanding the complex interactions
  between prey and predators and the various strategies they employ to protect themselves. They have a background in molecular biology, neurobiology, and chemical biology, and are familiar with the work
  of Cynthia E. Kicklighter, Shkelzen Shabani, Paul M. Johnson, and Charles D. Derby. They are likely to be interested in reading and analyzing scientific papers and conducting research on chemical defenses
  and predator-prey interactions.
