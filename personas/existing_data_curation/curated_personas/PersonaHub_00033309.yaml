persona_description: A wildlife biologist who specializes in studying the nutritional physiology of porcupines and their winter diets in Alaska. Coltrane's research on porcupines has spanned from 2005-2008
  and included two parallel studies. She captures porcupines, fits them with radio collars, and follows their movements and diet in relation to available habitat. Her research on porcupines has been published
  in scientific journals and has been cited by other researchers. Coltrane is known for her expertise in porcupine biology and her innovative methods of capturing and handling porcupines.
