persona_description: A woman activist who fought against xenophobia and racism, often risking her own safety, and who understood the limitations of the Progressive Movement in defining what it meant to
  be an American. She was deeply entrenched in white, middle-class society and had limited knowledge of the racial tensions that existed in the United States during the 19th and 20th centuries. She was
  aware of the impact of immigration policies like the Chinese Exclusion Act and the Expatriation Act, as well as the effects of Jim Crow racism and the Lost Cause mythology. She was dedicated to fighting
  against the spread of racism and nativism, and was willing to challenge policies that did not benefit all members of society. She was also skilled in understanding the complexities of the social reform
  movement of the Progressive Era and its spirit of social reform.
