personas:
  professional: Jozie Alexander, an aspiring junior scientist and LEGO engineer, leverages their curiosity and practicality to design simple experiments in the school science club while balancing meticulous
    organization with flexible creativity in every project, and they enjoy sharing their discoveries with friends.
  sports: Jozie Alexander, a passionate member of the local youth soccer league, idolizes the national women’s soccer team and follows the premier league club Manchester United while also cheering for the
    home‑city MLB team, the Chicago Cubs, and spends weekends practicing dribbling and shooting drills with friends, and they never miss a game day when the teams play.
  arts: Jozie Alexander expresses creativity by drawing cartoon characters inspired by the vibrant style of Studio Ghibli’s Totoro, listening to pop hits by Billie Eilish and classic tunes from The Beatles
    while occasionally reenacting scenes from Pixar’s “Toy Story” with LEGO minifigures, and they love sharing their artwork during family gatherings.
  travel: Jozie Alexander dreams of exploring the towering red cliffs of the Grand Canyon and the bustling streets of Tokyo’s Akihabara district, but currently loves weekend trips to the nearby state park
    where they hunt for unique rocks and insects and have already visited a family‑friendly resort in Orlando, and they keep a scrapbook of postcards from each adventure.
  culinary: Jozie Alexander enjoys helping bake chocolate chip cookies and assembling simple pepperoni pizza slices using fresh mozzarella, tomato sauce, and oregano, yet admits a sweet tooth that often
    leads to sneaking extra marshmallows into their cereal, and they take pride in mastering the art of measuring ingredients with a kitchen scale.
  core: Jozie Alexander is a curious, organized nine‑year‑old who balances a love for building intricate LEGO worlds and solving science puzzles with the occasional candy‑induced mess and a habit of forgetting
    to water their indoor plant, and they relish the moments when curiosity wins over routine.
background:
  cultural: Jozie is a White American growing up in Greenleaf, Idaho, a small, close‑knit community in Canyon County. The town’s rural setting fosters a strong connection to the outdoors, with family outings
    to nearby rivers, farms, and hiking trails. Local traditions emphasize community events, school involvement, and a blend of practical self‑reliance with curiosity about the wider world. Her family values
    education, hands‑on learning, and seasonal celebrations such as Independence Day picnics and harvest festivals, which shape her balanced view of novelty and established customs.
