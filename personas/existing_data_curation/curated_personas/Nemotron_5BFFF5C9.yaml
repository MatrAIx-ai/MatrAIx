  career_goals: She dreams of a future where she can combine her love for nature and her practical problem‑solving skills. Jozie hopes to become a wildlife biologist or conservation scientist, studying
    animals and ecosystems so she can help protect the outdoors she enjoys exploring. She also imagines teaching younger kids one day, sharing her curiosity for science while using clear, proven teaching
    methods.
