personas:
  professional: Thomas Harris, a 74‑year‑old former regional business manager, leverages four decades of expertise in agricultural supply chains and oil‑service logistics to mentor emerging entrepreneurs,
    translating complex Excel and Tableau data into practical growth plans while delivering measured, compassionate leadership in community workshops.
  sports: Thomas Harris follows the Texas Tech Red Raiders football team and the Dallas Cowboys, participates in a senior walking club that meets on weekends at the Lubbock Lake Landmark, and enjoys occasional
    rounds of 9‑hole golf at the local country club, always wearing their favorite faded Red Raiders cap.
  arts: Thomas Harris devotes their evenings to reading David McCullough’s biographies and Steinbeck’s novels, attends performances by the Lubbock Symphony Orchestra, enjoys Texas‑country songs by Willie
    Nelson and the folk twang of Townes Van Zandt, and admires the desert landscapes of Georgia O’Keeffe while sharing their insights at the senior‑center book club.
  travel: Thomas Harris plans trips meticulously, using senior discounts and a modest SUV to explore national parks like Carlsbad Caverns, Big Bend, and the Grand Canyon, while keeping a travel journal
    of desert nights and reserving the most adventurous excursions for their granddaughter’s birthdays.
  culinary: Thomas Harris is an avid barbecue enthusiast who slow‑smokes Texas brisket over mesquite with a custom rub of cumin, black pepper, and brown sugar, pairs it with homemade cornbread, collard
    greens, and heirloom tomato salsa from their garden, and while their cooking skills are solid, they often forget to let the meat rest, resulting in a slightly dry slice.
  core: Thomas Harris blends frontier‑spirit pragmatism with quiet curiosity, mentoring young entrepreneurs, tending an heirloom garden, and savoring smoky brisket while occasionally misplacing their glasses
    after a chess game.
background:
  cultural: Thomas was born in 1951 in a small farming community near Lubbock and grew up amid the post-war prosperity that shaped much of West Texas. His family has deep roots in the region's agricultural
    and ranching traditions, and his parents were school teachers who emphasized education, self-reliance, and community service. Raised in a predominantly Protestant (Baptist) environment, he inherited
    values of modesty, hospitality, and a strong work ethic. The cultural milieu blended the independent, frontier spirit of the Texas High Plains with a cautious openness to innovation, evident in his
    willingness to adopt emerging business technologies while respecting established practices. Over the decades, Thomas watched the transition from a primarily agrarian economy to one diversified by oil,
    gas, and higher education, which informs his balanced perspective on tradition and progress.
