  career_goals: Xiaodong plans to obtain his GED and an OSHA 30‑hour certification within the next year, then enroll in a community‑college construction management program. His short‑term goal is to become
    a certified foreman, advancing to a project supervisor role overseeing medium‑size commercial builds. Long‑term, he aspires to launch his own small contracting firm focused on eco‑friendly renovations,
    leveraging his growing interest in green building techniques. He aims to build a reputation as a reliable, detail‑oriented site leader, gain recognition within the regional union, and qualify for a
    senior site manager position within five years.
