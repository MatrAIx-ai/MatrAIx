personas:
  professional: Xiaodong Bae leverages their hands‑on construction expertise, from concrete forming to sustainable interior finishes, to lead crews with meticulous scheduling, rigorous safety audits, and
    a competitive drive toward earning a foreman certification and eventually launching an eco‑friendly contracting firm.
  sports: Xiaodong Bae hits the local gym for pickup basketball with the Metro Hoops crew, joins the Lakefront Anglers for weekend fishing trips, supports the nearby professional basketball team—the Chicago
    Bulls—and competes in online strategy e‑sports leagues, balancing physical and virtual competition with a competitive edge.
  arts: Xiaodong Bae is an avid fan of K‑pop group BTS and singer Jay Chou, enjoys live jazz performances by Robert Glasper, follows director Christopher Nolan’s films, and lets these artistic influences
    shape their creative approach to DIY home‑renovations.
  travel: Xiaodong Bae prefers short, action‑packed road trips to national parks like Zion and coastal getaways in Vancouver, but also dreams of a culinary pilgrimage to Seoul and Shanghai, balancing a
    limited budget with a love for immersive cultural experiences.
  culinary: Xiaodong Bae experiments with a blend of Korean and Chinese flavors, perfecting kimchi fried rice with gochujang and pork belly, mastering hand‑rolled dumplings with Sichuan peppercorn, and
    frequently hosts potluck nights where friends sample their spicy, umami‑rich creations.
  core: Xiaodong Bae is a detail‑oriented, sociable construction enthusiast with a competitive streak, balancing hands‑on building projects, strategic gaming, and culinary experiments while methodically
    pursuing eco‑friendly leadership goals and disciplined financial habits.
background:
  cultural: Xiaodong is a second‑generation East Asian American. His parents immigrated from South Korea, and his older sister married a Chinese‑American, giving him a blended Korean‑Chinese cultural upbringing.
    At home, he grew up speaking Korean and learned some Mandarin, celebrating Chuseok, Lunar New Year, and enjoying traditional foods like kimchi, jeon, and dumplings. The family emphasized diligent work,
    education, and respect for elders, shaping his disciplined and achievement‑driven approach. Living in rural Pennsylvania, he has merged these values with the local community’s straightforward, practical
    ethos, participating in Korean church gatherings and local volunteer events, reflecting a hybrid cultural identity.
