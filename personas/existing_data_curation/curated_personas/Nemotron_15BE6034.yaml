  hobbies: '[''Woodworking'', ''Fly fishing'', ''Model railroading'', ''Reading non-fiction (history, economics)'', ''Gardening (vegetable garden)'', ''Puzzle solving (Sudoku, jigsaw puzzles)'', ''Classic
    car restoration'']'
  career_goals: George aims to progress from purchasing manager to a senior leadership role—ideally Director of Procurement or Vice President of Supply Chain—within the next five years. He plans to achieve
    measurable impact by implementing data‑driven sourcing strategies that deliver 10‑15 % company‑wide cost savings, establishing a robust vendor risk management framework, and championing digital transformation
    through advanced procurement analytics. To support this trajectory, he intends to obtain professional certifications such as the CPSM and CSCP, mentor emerging talent in a structured mentorship program,
    and eventually leverage his experience into a consulting practice focused on supply‑chain efficiency for mid‑size manufacturers in Texas.
