  career_goals: Jordan envisions turning his passion for visual storytelling into a professional career. In the long term, he hopes to study graphic design, animation, or film at a university and work as
    a concept artist for video games or a documentary filmmaker focused on socially relevant topics. He also aspires to lead community arts initiatives that give younger children opportunities to explore
    creative expression. In the short term, he aims to build a robust portfolio, win a regional high school art competition, secure a mentorship with a local artist, and maintain strong academic performance
    to qualify for scholarships. He plans to deepen his leadership experience by pursuing student council positions and continuing to develop organized, methodical work habits.
