  career_goals: Although retired from formal employment, Doreen is driven by a desire to leave a lasting legacy for her tribe. She aims to compile an illustrated memoir that interweaves her personal life
    stories with recorded oral histories, creating a resource for future generations. She plans to mentor younger tribal members in beadwork and basketry, establishing a small apprenticeship circle within
    the community center. Doreen also hopes to digitize her collection of traditional recipes and craft patterns, making them accessible through an online archive. Recognizing her own sensitivity to stress,
    she volunteers to lead gentle mindfulness workshops for seniors, hoping to promote mental well‑being among her peers.
