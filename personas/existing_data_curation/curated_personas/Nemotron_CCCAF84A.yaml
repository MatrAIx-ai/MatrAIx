  career_goals: Although formally retired, Ashley is driven to leave a lasting legacy in her community. She aims to expand the intergenerational reading and mentorship program she helped launch, securing
    sustainable grant support and formal recognition from the school district. Ashley aspires to become a board member of the Rathdrum Historical Society, where she can integrate her research skills and
    educational background to develop engaging exhibits. She also plans to author a practical guidebook on senior‑focused community engagement, blending her curiosity for new ideas with proven, practical
    methods. Ultimately, she seeks acknowledgment as a community elder whose initiatives improve educational access and social cohesion in Kootenai County.
