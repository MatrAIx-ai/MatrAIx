persona_description: A former US Judge who served for over 50 years in federal courts and was a key figure in the civil rights movement, known for making landmark decisions that changed the social and legal
  landscape of the United States. He was a grandson of enslaved people but never retired and continued serving in office until his death at the age of 96. He is remembered for his decision to reject government's
  claim of having authority to conduct electronic surveillance without a warrant on anyone it considered as a national security threat and his landmark decision in the "Keith case" against Richard Nixon's
  administration.
