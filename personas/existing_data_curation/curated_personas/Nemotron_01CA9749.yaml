  career_goals: Shirley aims to attend a specialized high school that combines visual arts and STEM, eventually earning a degree in interactive media or animation. She dreams of becoming a concept artist
    and game designer, creating immersive stories and characters for video games or animated films. She also hopes to win national art competitions and secure a scholarship that allows her to travel to
    major museums worldwide. Long‑term, she envisions leading a creative studio or directing interdisciplinary art installations that blend technology, storytelling, and community engagement.
