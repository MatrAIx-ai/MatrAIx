personas:
  professional: A budding digital storyteller, Shirley Setser merges her portrait sketches and cityscape watercolors with Scratch and Python code to craft interactive animations, channeling her organized,
    competitive nature into school debate victories and community art fair projects, while they consistently plan each step and meet deadlines.
  sports: An enthusiastic Revere Youth Soccer Club forward, Shirley Setser thrives on the fast‑pace of soccer, supports the Boston Celtics and New England Patriots, and incorporates weekend beach runs into
    their fitness routine, though their competitive edge sometimes leads them to dominate scrimmages over teamwork.
  arts: A dedicated young artist, Shirley Setser spends afternoons sketching portraits at the Boston Museum of Fine Arts, collects vintage comic books featuring Alex Ross and reads graphic novels like "Saga,"
    while their playlist includes Hayao Miyazaki soundtracks and a love for independent animated films such as "The Red Turtle," shaping their creative identity.
  travel: A curious explorer, Shirley Setser enjoys weekend trips to the historic Freedom Trail in Boston, seasonal visits to Cape Cod’s sandy beaches, and annual family outings to the Revere Harborfest,
    while dreaming of a future bike tour of the Italian countryside, balancing school schedule constraints with a love for coastal scenery.
  culinary: A budding home chef, Shirley Setser favors New England staples like clam chowder, lobster rolls, and homemade macaroni-and-cheese, enjoys baking gingerbread cookies for Christmas, experiments
    with watercolor‑inspired plating, and frequently refines their cooking skills by assisting in family Thanksgiving feasts featuring roasted turkey and cranberry sauce.
  core: Shirley Setser is a competitively organized 12‑year‑old who sketches, codes, and debates with equal vigor, rigorously budgets allowance for art supplies, and tackles challenges—whether on the soccer
    field or in a watercolor session—with steady confidence and a pinch of skepticism.
background:
  cultural: Shirley is a white American raised in Revere, Massachusetts, a coastal suburb with a strong New England identity. Her family’s roots trace back to Irish and Italian immigrants, and she grew
    up with a blend of traditional holiday celebrations—like Thanksgiving feasts and Christmas lights—and community events such as the Revere Harborfest. The proximity to Boston gives her access to a vibrant
    arts scene, including museums, theater productions, and tech workshops, which have shaped her appreciation for both classic and contemporary culture. Local seasonal activities, like beach outings in
    the summer and sledding in the winter, reinforce an outdoorsy, community‑focused upbringing. This environment has cultivated her respect for education, civic involvement, and a curiosity about diverse
    artistic expressions.
