personas:
  professional: Shaquan Short is a 33‑year‑old visual communications specialist who leverages Adobe Creative Suite, Figma, and motion‑graphics expertise to craft inclusive brand identities, while they apply
    methodical project management and mentorship to drive collaborative studio environments aimed at social impact.
  sports: Shaquan Short hits the community center courts for weekend basketball leagues affiliated with the Chicago Parks Basketball Association, practices hip‑hop dance routines for cardio, follows the
    Chicago Bulls and Chicago White Sox loyally, and they maintain a flexible fitness regimen that blends competitive streetball with low‑impact stretching, preferring group workouts that reinforce social
    bonds.
  arts: Shaquan Short frequently explores the Museum of Contemporary Art Chicago and wanders through vibrant street‑mural districts, drawing inspiration from artists like Kara Walker, Kehinde Winnie, and
    Banksy, while they attend live jazz sessions featuring Kamasi Washington, neo‑soul shows headlined by Erykah Badu, and hip‑hop concerts with Kendrick Lamar, integrating these cultural touchstones into
    their digital illustrations.
  travel: Shaquan Short enjoys designing itineraries that balance cultural immersion and creative recharge—spending long weekends on a curated road trip to New Orleans for its jazz heritage, a yearly spring
    break in Berlin’s design scene, and occasional weekend getaways to nearby Lake Michigan towns, while they budget travel through a mix of reward points and modest savings, preferring experiences that
    spark new visual ideas over luxury accommodations.
  culinary: Shaquan Short is a confident home cook who experiments with soulful blends, often preparing shrimp‑and‑grits with smoked paprika, collard greens seasoned with ham hocks, and sweet‑potato pie
    spiced with nutmeg and cinnamon, while they love sourcing fresh okra and heirloom tomatoes at the Chicago Farmers Market and occasionally treat themselves to a late‑night slice of deep‑dish pizza topped
    with caramelized onions.
  core: Shaquan Short merges an imaginative design mind with a community‑first ethos, juggling weekend basketball, spontaneous mural sketches, and a habit of obsessively checking stock tickers during coffee
    breaks, while they also tend to forget to water houseplants.
background:
  cultural: Shaquan was raised in the Chicago suburb of Crestwood within a tight-knit African-American family that valued storytelling, music, and community service. His upbringing blended traditional Southern
    soul food and church gospel traditions with the vibrant cultural tapestry of the Chicago South Side, exposing him to the legacy of the Black Arts Movement, modern Afrofuturist aesthetics, and the city’s
    rich mural culture. These influences inform his visual language, often incorporating bold color palettes, rhythmic patterns, and narrative elements that celebrate Black history and contemporary experiences.
    Shaquan actively participates in local cultural festivals, supports Black-owned businesses, and seeks to reflect the diversity of his heritage in his design work.
