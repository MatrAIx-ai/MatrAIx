  career_goals: Shaquan aspires to become a senior creative director at an innovative agency where he can shape brand narratives that reflect cultural diversity and social impact. He aims to launch his
    own boutique design studio focused on serving community organizations, nonprofits, and minority-owned businesses, providing inclusive visual solutions. Over the next five years, he plans to deepen his
    expertise in UX research and emerging technologies such as AR/VR, earn a professional certification in user experience design, and mentor emerging black designers through local workshops. His long-term
    ambition is to be recognized as a thought leader who bridges imagination with purposeful design, fostering harmony and empowerment through visual storytelling.
