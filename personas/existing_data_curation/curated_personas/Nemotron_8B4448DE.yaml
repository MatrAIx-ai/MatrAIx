personas:
  professional: Manuel Garcia, a 29‑year‑old industrial and refractory machinery mechanic, combines meticulous preventive‑maintenance scheduling, MIG/TIG welding, and hydraulic‑pneumatic troubleshooting
    with a hands‑on mentorship style that keeps apprentices on track while their outgoing, community‑focused nature makes them the go‑to person for team coordination and safety compliance.
  sports: Manuel Garcia enjoys playing forward for the community Pharr United soccer club, drills three times a week and follows the Houston Dynamo for MLS action while also cheering for the Dallas Cowboys
    on Sundays, integrating their love for team sports with a practical fitness routine that mixes on‑field cardio, occasional weight‑lifting in their garage, and weekend pick‑up basketball games at the
    local park.
  arts: Manuel Garcia immerses themselves in the rhythmic beats of cumbia and norteño, dancing to Los Tigres del Norte and Grupo Cañaveral at community festivals while also enjoying classic films starring
    Antonio Banderas and listening to Selena’s timeless hits, and they use music and cinema as a backdrop for social gatherings and personal reflection.
  travel: Manuel Garcia prefers short, budget‑friendly road trips with their soccer teammates, planning routes that blend adventure and relaxation by exploring nearby escapes like South Padre Island’s beaches,
    the historic River Walk in San Antonio, and occasional cross‑border journeys to Mexico City’s vibrant markets or the colonial charm of Antigua, Guatemala, all while balancing their savings goals and
    family commitments.
  culinary: Manuel Garcia, a confident home cook, delights in crafting steaming tamales filled with pork and masa, simmering mole poblano infused with pasilla chilies and chocolate, and perfecting tacos
    al pastor using pineapple and achiote, often hosting weekend family feasts where they showcase their skill with fresh cilantro, roasted tomatillos, and homemade corn tortillas.
  core: Manuel Garcia is a structure‑loving, sociable mechanic who balances meticulous workshop routines with spontaneous weekend soccer matches, a penchant for late‑night tamale making, and an occasional
    tendency to over‑commit to community projects at the expense of sleep.
background:
  cultural: Manuel grew up in a Mexican‑American household in Pharr, Texas, a vibrant border city where Spanish and English flow interchangeably. His family maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, quinceañeras, and Catholic holidays—while also embracing the Texan community spirit. Bilingual and bicultural, he values family cohesion, hospitality, and respect for elders. The
    blend of Mexican heritage and the industrial opportunities of the Rio Grande Valley shaped his pragmatic work ethic and his love for communal celebrations.
attributes:
  skills: '["Preventive maintenance", "Welding (MIG/TIG)", "Hydraulic system repair", "Pneumatic troubleshooting", "Blueprint and schematic reading", "CNC machine operation", "Refractory furnace maintenance",
    "Diagnostic software usage", "OSHA safety compliance", "Team coordination and mentorship"]'
  hobbies: '["Soccer (community league)", "Cumbia and norteño dancing", "Cooking Mexican cuisine", "DIY home improvement", "Car restoration", "Church youth mentorship"]'
  career_goals: Manuel aims to become a maintenance supervisor within the next three to five years, obtaining a journeyman certification and expanding his expertise in automation and robotics for industrial
    processes. He plans to pursue an associate degree in industrial technology to complement his practical experience. Long‑term, he envisions opening his own small service shop serving the South Texas
    border region, providing reliable equipment repair and training for local technicians.
