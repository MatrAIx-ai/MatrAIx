personas:
  professional: Mariana Obando, a data‑driven purchasing manager at a tech‑focused firm, applies Lean Six Sigma, SQL, and advanced Excel modeling to cut procurement costs by 12% annually while meticulously
    documenting every vendor contract and demanding strict compliance.
  sports: Mariana Obando, an avid hiker who maps Solano County’s ridge trails and trains with the Davis Trailblazers Running Club, follows the Sacramento Kings and the Golden State Warriors, and incorporates
    weekend bike rides to balance cardio with a structured fitness regimen.
  arts: Mariana Obando, an aficionado of strategic board games, enjoys the narrative depth of Gloomhaven, listens to the minimalist compositions of Ólafur Arnalds, and attends occasional contemporary dance
    performances at the Berkeley Repertory Theatre to satisfy her curated cultural palate.
  travel: Mariana Obando, a meticulous planner, prefers itineraries that blend scenic hikes in Yosemite with scheduled visits to museums in San Francisco, has a bucket‑list destination of Kyoto for its
    precision‑oriented culture, and often books trips far in advance to lock in cost‑effective airfare and lodging.
  culinary: Mariana Obando, a disciplined home chef, perfects classic tacos al pastor and enchiladas suizas while portion‑controlling with quinoa bowls and grilled vegetables, uses a sous‑vide for consistency,
    and meal‑preps weekly menus with measured macros to align with her health goals.
  core: Mariana Obando, a structured and competitive twenty‑five‑year‑old, merges analytical rigor with a love for solitary pursuits, balancing a high‑performance career in procurement with regimented fitness,
    precise budgeting, and methodical cooking, all while occasionally over‑scheduling and trusting only verified data.
background:
  cultural: Mariana was raised in a Mexican‑American household where family gatherings, traditional festivals like Día de los Muertos and Cinco de Mayo, and home‑cooked meals were central to her identity.
    Bilingual from childhood, she values the Spanish language as a link to her heritage and often incorporates Mexican culinary traditions into her cooking. While she embraces the progressive, environmentally
    conscious culture of Davis, she retains the Mexican emphasis on close family ties, respect for elders, and community solidarity. This dual cultural lens informs her professional ethic—combining the
    Mexican values of reliability and relational trust with a Californian focus on innovation and sustainability.
attributes:
