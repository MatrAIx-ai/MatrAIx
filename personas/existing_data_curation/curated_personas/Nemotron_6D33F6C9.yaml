  hobbies: '[''hiking'', ''trail mapping'', ''cooking Mexican cuisine'', ''meal prepping'', ''yoga'', ''meditation'', ''reading non-fiction (leadership, economics, tech)'', ''small‑group board game nights'']'
  career_goals: Mariana aims to progress to a senior leadership role such as Director of Procurement or Supply Chain within the next five years, where she can shape corporate sourcing strategy and embed
    sustainability practices. She plans to obtain the Certified Professional in Supplier Management (CPSM) credential and subsequently pursue an MBA to broaden her strategic business acumen. Her long‑term
    ambition includes leading cross‑functional initiatives that integrate advanced analytics for predictive sourcing, establishing a resilient supply network that supports rapid scaling, and mentoring junior
    procurement professionals to foster a high‑performance team culture.
