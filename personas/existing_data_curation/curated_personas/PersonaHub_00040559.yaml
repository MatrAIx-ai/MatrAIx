persona_description: A historian who specializes in the study of the Japanese military sexual slavery system during the Pacific War and its aftermath. She is particularly interested in the intersection
  of colonialism, war, and sex, and the ways in which the language and meanings of words have shaped the way survivors and others view the issue. Her work is informed by her expertise in the history of
  South Korea, Japan, and the United States, as well as her knowledge of the political economy of modern prostitution in Japan and Korea. She is well-versed in the complexities of the Japanese and Korean
  relationships, and is committed to making sense of the complex and often difficult issues surrounding the "comfort women" issue.
