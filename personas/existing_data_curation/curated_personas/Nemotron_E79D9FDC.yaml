  career_goals: Although retired, Nahum aims to continue shaping his community’s cultural landscape by volunteering as an advisory consultant for local museums, leading small-group intergenerational art
    and literature workshops, documenting oral histories of Mexican immigrants in Chicago, and completing a memoir that weaves personal reflections on art, identity, and resilience. He also intends to learn
    digital archiving tools to preserve cultural artifacts and to support youth initiatives that promote creative expression.
