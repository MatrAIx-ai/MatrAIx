personas:
  professional: A retired art historian and community curator, Nahum Williams leverages deep expertise in Latin American art history, fluent Spanish, and meticulous research skills to volunteer as an advisory
    consultant for Chicago museums, while balancing structured project planning with unconventional, improvisational mentorship sessions that inspire intergenerational creativity.
  sports: An enthusiastic follower of the Chicago Cubs and Bears, Nahum Williams stays active through a weekly senior walking group at Grant Park, occasional low‑impact yoga classes at a community center,
    and a casual shuffleboard league at the local senior center, preferring low‑intensity activities that complement their love of leisurely museum strolls.
  arts: A dedicated watercolorist inspired by the vivid murals of Frida Kahlo and Diego Rivera, Nahum Williams also attends intimate poetry readings featuring the works of Octavio Paz and Pablo Neruda,
    curates community exhibitions showcasing emerging Latin American artists, and mentors aspiring creators through personalized one‑on‑one sessions.
  travel: A reflective traveler who prefers slow‑paced itineraries, Nahum Williams recently revisited the artist‑laden town of San Miguel de Allende to sketch street scenes, spent a week exploring the historic
    gardens of Kyoto’s Imperial Palace, and dreams of a guided literary tour of Buenos Aires’ historic cafés, always arranging trips well in advance to secure senior discounts and affordable accommodations.
  culinary: A passionate home chef, Nahum Williams skillfully prepares traditional corn‑masa tamales with pork and chipotle, slow‑cooked mole sauce infused with dried chiles and chocolate, and fresh salsa
    verde made from tomatillos, cilantro, and lime, often sharing these meals with family while savoring the comforting aromas of their childhood kitchen.
  core: Nahum Williams merges a solitary watercolor practice with a community‑centric spirit, balancing meticulous research and gentle stubbornness, while occasionally forgetting to water their balcony
    herbs during rainy Chicago winters.
background:
  cultural: Nahum was born in Chicago’s historic Pilsen neighborhood to Mexican immigrant parents who arrived in the 1950s. Growing up bilingual, he celebrated Mexican traditions such as Día de los Muertos,
    quinceañeras, and family gatherings centered on food, music, and storytelling. His upbringing in a vibrant bicultural community, combined with a graduate degree in the humanities, fostered a lifelong
    appreciation for art, literature, and community activism. He remains actively involved in local Mexican‑American cultural festivals, supports initiatives that preserve Mexican heritage, and maintains
    strong family ties that keep his cultural roots alive.
