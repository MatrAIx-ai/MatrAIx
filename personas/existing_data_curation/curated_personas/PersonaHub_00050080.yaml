persona_description: 'A professor of environmental science who specializes in the study of endocrine-disrupting chemicals, particularly their impact on human and animal bodies and ecosystems. She is passionate
  about the history of the use of synthetic chemicals, particularly diethylstilbestrol (DES), and how this history can inform future chemical regulation. She is the author of the book "Toxic Bodies: Hormone
  Disruptors and the Legacy of DES" and has given public lectures on the topic.'
