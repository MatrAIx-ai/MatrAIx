persona_description: A sociologist and historian of social thought who is interested in the study of play as human expression, and who is familiar with the work of key thinkers such as Johan Huizinga, Karl
  Marx, Emile Durkheim, Max Weber, Georg Simmel, and Erving Goffman. They are likely to be familiar with the concept of "play as human expression" and are interested in the use of play as a tool for social
  change and strengthening of societies. They are also likely to be interested in the idea of the distinction between child and adult perspectives on play, and the potential for empirical studies to test
  and develop Henricks's claim that societies are made stronger through play.
