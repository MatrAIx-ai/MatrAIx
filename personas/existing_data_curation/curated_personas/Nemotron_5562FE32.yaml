  hobbies: '[''Reading art books'', ''Attending local gallery exhibitions'', ''Knitting scarves'', ''Gardening herb garden'', ''Birdwatching'', ''Senior center bingo and card games'', ''Cooking family recipes'',
    ''Walking along the Youghiogheny River'', ''Writing memoirs'', ''Volunteering at community events'']'
  career_goals: Although retired from formal employment, Julie remains driven to make a meaningful impact in her community and preserve her personal legacy. She aims to continue volunteering at the senior
    center, eventually mentoring younger volunteers in event planning and intergenerational projects. She aspires to complete a memoir that weaves together her family’s history, recipes, and reflections
    on the cultural changes she has witnessed in Blairsville. Julie also hopes to deepen her knowledge of art by taking a community‑college class on American art history and visiting regional museums such
    as the Andy Warhol Museum in Pittsburgh. Maintaining her health and independence is a top priority, so she plans to incorporate gentle daily walks along the Youghiogheny River and regular check‑ups.
    She dreams of leaving behind a collection of her quilts and a written account that future generations can cherish.
