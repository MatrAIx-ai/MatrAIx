  career_goals: Joshua aims to become a Chief Financial Officer within the next five to seven years, focusing on strategic growth initiatives for a mid‑size manufacturing or tech firm in the Midwest. He
    plans to earn his CPA designation and complete a CFA Level I exam to deepen his expertise in corporate finance and investment analysis. He is also interested in championing the adoption of AI‑driven
    financial forecasting tools and leading cross‑functional projects that blend financial rigor with creative problem‑solving. Ultimately, he hopes to mentor emerging finance talent and perhaps launch
    a boutique financial consultancy that serves local startups and arts organizations.
