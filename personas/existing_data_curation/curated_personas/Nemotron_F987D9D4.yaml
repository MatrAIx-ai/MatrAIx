  career_goals: Jackson dreams of a future where he can explore the world while creating art—he often talks about becoming an astronaut who sketches the planets, or an artist who paints murals for his community.
    He also imagines helping others as a teacher or a museum guide, reflecting his cooperative spirit and desire to share knowledge. His ambitions remain flexible, guided by his love of discovery and creativity.
