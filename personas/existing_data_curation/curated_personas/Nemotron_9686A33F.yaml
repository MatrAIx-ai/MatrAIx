personas:
  professional: John Jones is a budding robotics enthusiast who spends after‑school hours designing and programming small robots for his school club; they merge the strategic planning skills honed in Civilization
    with a methodical, organized approach that balances curiosity about new tech with practical, step‑by‑step execution.
  sports: John Jones rides the local skatepark with the Friday Night Crew, is a devoted fan of the regional minor‑league baseball team the Harbor Hawks, and balances this with weekend kayak trips through
    the mangroves, where they practice paddling techniques learned from a community water‑sports club.
  arts: John Jones devotes evenings to building intricate Minecraft cities while listening to Daft Punk and the orchestral scores of Hans Zimmer, and they regularly read sci‑fi novels by Andy Weir and classic
    popular‑science books by Carl Sagan, finding inspiration for their own creative mods and robotics projects.
  travel: John Jones enjoys spontaneous weekend getaways to the nearby coastal reserve for beach clean‑ups, has visited the national museum of science in the capital city, and dreams of exploring Tokyo’s
    Akihabara district to experience its tech culture, all while budgeting trips within their parents’ allowance.
  culinary: John Jones prefers simple, protein‑rich meals like grilled fish caught on their fishing trips, enjoys making mango‑coconut smoothies, but also indulges in late‑night pizza topped with pineapple,
    and they often snack on energy drinks while gaming, reflecting a mix of health‑conscious and indulgent tendencies.
  core: John Jones is a methodical teen who blends a love for nature‑based adventures with a passion for digital creation, constantly juggling spreadsheets for savings, allergy meds for the outdoors, and
    a habit of staying up late to perfect Minecraft builds, even if it means occasional missed chores.
background:
  cultural: John grew up in the suburban waterfront community of Cape Coral, Florida, within a predominantly white American family that values education, outdoor recreation, and community involvement. The
    local culture emphasizes a close relationship with the Gulf of Mexico, fostering traditions of fishing, boating, and environmental stewardship. His upbringing blends Southern hospitality—respect for
    neighborly help and family gatherings—with the diverse, tourism‑driven atmosphere of a coastal Florida city. This environment shapes his practical outlook, love of the outdoors, and commitment to contributing
    positively to his community.
