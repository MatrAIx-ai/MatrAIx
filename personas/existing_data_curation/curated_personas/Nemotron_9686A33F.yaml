  career_goals: John aspires to a career that blends his love for discovery with practical problem‑solving. He is interested in marine engineering or environmental science, motivated by the coastal lifestyle
    of Cape Coral. He hopes to earn a scholarship, pursue a degree in engineering or marine biology, and eventually work on projects that protect Florida’s waterways or develop sustainable fishing technologies.
    He also sees himself gaining expertise in computer programming to create tools that support environmental research.
