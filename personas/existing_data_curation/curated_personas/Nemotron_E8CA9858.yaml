  career_goals: Hazel aims to move from a first‑line supervisor role to a district‑level manager within the next five years, overseeing multiple store locations across Southwest Florida. She plans to earn
    an associate degree in Business Administration to complement her practical experience and to earn a certification in Retail Management. Her ambition includes implementing innovative visual‑merchandising
    concepts that blend contemporary art with retail displays, positioning her stores as community cultural hubs. Hazel also hopes to mentor more women and bilingual employees for leadership roles, fostering
    a pipeline of talent that reflects the demographic diversity of her customer base. Ultimately, she envisions opening a boutique that showcases Mexican‑inspired crafts and artwork, merging her love of
    art with entrepreneurship.
