persona_description: A concerned citizen who is actively involved in environmental activism and is opposed to fracking, a process that involves the use of chemicals and controlled explosions to extract
  oil and gas from underground sites. They are also aware of the potential health risks associated with fracking and are opposed to the impact it may have on the environment and local communities. They
  are aware of the recent accident in Pennsylvania and the impact it may have on Chesapeake Energy shares and natural gas prices. They are also aware of the opposition to fracking in New Jersey and the
  recent push for limits on new Pennsylvania and New York fracking venues that would impact the Delaware River, which flows through the state.
