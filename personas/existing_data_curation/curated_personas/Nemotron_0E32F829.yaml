personas:
  professional: Eric Wiggins, a budding LEGO architect, spends afternoons constructing elaborate structures; they showcase early spatial reasoning and collaborative play, translating curiosity into practical
    problem‑solving while preferring the flexibility of free‑form projects over rigid rules.
  sports: Eric Wiggins roams the backyard and local park playing tag and kicking a soccer ball, cheers for his hometown’s minor league baseball team, the River City Rovers, and joins the after‑school gymnastics
    club where their love of movement blends with a quiet observation of squirrels and ducks.
  arts: Eric Wiggins delights in drawing cartoon heroes like Spider‑Man and animals inspired by wildlife documentaries, sings along to The Wiggles and the classic Disney lullaby 'Let It Go', and watches
    Pixar short films such as 'Piper', letting these artistic influences shape their imaginative play.
  travel: Eric Wiggins enjoys family road trips to the nearby state park for picnics, has visited the city's large aquarium, and dreams of exploring the Grand Canyon and Disney World, preferring short,
    well‑planned adventures that include plenty of nature‑watching breaks, which they eagerly anticipate.
  culinary: Eric Wiggins loves crunchy carrot sticks, cheesy macaroni, and peanut butter‑jelly sandwiches, can assemble a simple fruit‑kebab with grapes, banana slices, and strawberries, but they often
    forget to finish their vegetables, negotiating extra dessert with a persuasive smile.
  core: Eric Wiggins is a curious, quietly cooperative six‑year‑old who builds LEGO worlds, sketches animals, and explores nature with a relaxed, slightly disorganized charm that makes them a sweet, imaginative
    friend.
background:
  cultural: Eric belongs to a white, Midwestern family rooted in Oklahoma City, where community values emphasize friendliness, modesty, and a love for local traditions such as Fourth of July fireworks,
    Friday night high school football, and weekly church gatherings. Family weekends often include trips to the Oklahoma City Zoo, picnics in city parks, and homemade meals like barbecue and chicken fried
    steak, reflecting the everyday culture of the Great Plains region.
attributes:
  skills: '["Reading simple sentences","Counting to 100 and basic addition","LEGO and puzzle construction","Drawing and coloring","Empathy and cooperative play","Navigating educational tablet apps"]'
  hobbies: '["LEGO building","Drawing and coloring","Backyard nature exploration","Listening to stories about space and animals","Watching educational videos about machines and wildlife","Small‑group playdates"]'
  career_goals: When he thinks about the future, Eric imagines becoming a firefighter because he likes helping people and seeing big trucks, or a veterinarian because he loves caring for animals he finds
    in the backyard. He also dreams about building cool machines or robots, reflecting his fascination with how things work. Though still playful, his ambitions show a desire to combine his curiosity with
    a hands‑on, helpful role in his community.
