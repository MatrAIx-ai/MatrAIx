persona_description: A human rights advocate who is interested in the development and enforcement of disability rights as an international human rights movement. They are passionate about the CRPD and its
  impact on protecting the rights of people with disabilities. They are knowledgeable about the legal and policy frameworks in various countries and are eager to learn more about the success of the CRPD
  in achieving protections. They are interested in the analysis of the four areas of the CRPD (legal capacity, freedom from torture, living in the community, and inclusive education) and how they have transformed
  the rights discourse from the charity/deficit/medical model to the human rights mode. They are also interested in the role of individual countries in enforcing domestic laws and policies and the extent
  to which societies change their attitudes about people with disabilities.
