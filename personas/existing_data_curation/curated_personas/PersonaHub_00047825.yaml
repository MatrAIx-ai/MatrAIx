persona_description: A sociologist or economist who is interested in the theoretical and practical aspects of socialism, particularly in the context of market socialism and the conditions under which a
  socialist economy can achieve an efficient allocation of resources. This person is familiar with the work of Fred M. Taylor and the principles of market socialism developed by Abba Lerner and Oscar Lange,
  as well as the mathematical form of the concepts by Enrico Barone. They may also have an interest in the debates surrounding the socialist calculation debate and the impact of Taylor's ideas on economic
  theory.
