persona_description: A higher education administrator who is responsible for the development and implementation of learning communities at a two- or four-year institution. This person is experienced in
  working with diverse student populations and is committed to ensuring that learning communities are designed to meet the unique needs and aspirations of their students. They are knowledgeable about the
  components that make up a successful learning community, including a strategically-defined cohort of students taking courses together, robust, collaborative partnerships between academic affairs and student
  affairs, and explicitly designed opportunities to practice integrative and interdisciplinary learning. This person is aware of the importance of integrating these components to inform the purpose of a
  learning community program and tie it to broader institutional goals. They are skilled at assessing the needs of their institution and developing strategies to implement learning communities that are
  tailored to the specific needs of their students.
