  hobbies: '[''Salsa and Plena Dancing'', ''Playing Dominoes'', ''Attending Community Festivals'', ''Baseball Fan'', ''Truck Electronics Tinkering'', ''Gardening (plantains, coffee)'', ''Fishing'', ''Youth
    Road Safety Mentorship'']'
  career_goals: Antonio aims to complete his associate’s degree in Business Administration, earn a higher‑level commercial driver’s license (CDL‑Class A) and transition into a fleet supervisor role within
    the next three years. He aspires to lead a small logistics team that serves the central and western regions of Puerto Rico, integrating eco‑friendly practices and advanced telematics to improve efficiency.
    Long‑term, he envisions launching his own independent transport and delivery company, providing employment opportunities for younger drivers in Moca while preserving the community’s strong family‑oriented
    values.
