personas:
  professional: Luz Galvan is a budding LEGO architect whose love for structure and predictability fuels meticulous creations, while their relaxed approach to obligations lets them enjoy spontaneous building
    sessions with friends, emphasizing cooperation and harmony.
  sports: Luz Galvan participates in the Tiny Tykes Soccer Club during the spring, loves sprinting around the local park with friends in gentle games of tag, and quietly cheers for the junior Raptors, a
    hometown youth team, reflecting a preference for low‑key, structured play.
  arts: Luz Galvan delights in drawing cartoon animals, listening to children’s songs by artists like María Elena Walsh and the Disney soundtrack of "Frozen," and emulating the playful style of Dr. Seuss,
    finding comfort in predictable rhythm and vibrant illustration.
  travel: Luz Galvan prefers short family trips to familiar places such as the nearby state park and dreams of visiting the historic town of San Miguel de Allende to explore its colorful murals, balancing
    a love for routine with gentle curiosity about new sights.
  culinary: Luz Galvan enjoys helping in the backyard garden and loves snack foods such as cheese quesadillas, sliced cucumbers with a squeeze of lime, and freshly baked chocolate chip cookies, often attempting
    to recreate simple dishes with a child‑size apron and a pinch of imagination.
  core: Luz Galvan is a structured yet gentle LEGO builder who savors quiet drawing time, quietly saves for future projects, and balances predictability with gentle spontaneity in play.
background:
  cultural: Luz grows up in a Mexican‑American household in Palm Springs, where family traditions such as Día de los Muertos, making tamales, and celebrating birthdays with mariachi music are common. She
    speaks Spanish at home and English at school, participates in local community festivals, and values close family ties, respect for elders, and sharing food and stories.
