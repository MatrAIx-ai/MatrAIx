personas:
  professional: Stephen is a methodical junior creator who channels his love for structure into building intricate LEGO sets, coding simple ScratchJr games, and spearheading science club projects, often
    taking the lead in group discussions and ensuring every detail is meticulously planned, and they proudly double‑check each step.
  sports: Stephen shines as a forward for the Frederick County Youth Soccer Club, idolizes the Washington Wizards and the Washington Capitals, and spends Saturdays cheering on the local high school’s basketball
    team, while they also compete fiercely in community chess tournaments organized by the library.
  arts: Stephen crafts comic strips inspired by classic superheroes like Spider‑Man and the whimsical world of Studio Ghibli, collects baseball cards featuring legends such as Babe Ruth, and enjoys listening
    to the upbeat tunes of the band They Might Be Giants while they sketch their own characters.
  travel: Stephen dreams of revisiting the National Mall in Washington, D.C., loves the summer camp road trips to Shenandoah National Park, and hopes to explore the Disney World theme parks next year, preferring
    they plan family‑oriented itineraries that balance adventure with scheduled playtime.
  culinary: Stephen favors pizza with pepperoni, chicken nuggets, and his favorite homemade mac & cheese, and they proudly attempt to bake chocolate chip cookies using measured LEGO‑like precision, insisting
    on a scoop of vanilla ice cream after every victorious soccer game.
  core: Stephen is a talkative, competition‑driven eight‑year‑old who thrives on structure, leads group activities, worries about performance, and they love LEGO, soccer, and comic art.
background:
  cultural: Stephen grows up in a middle‑class, white family in Mount Airy, Maryland, a small town that blends suburban comfort with a close‑knit rural heritage. His family celebrates typical American holidays
    such as Thanksgiving, Christmas, and Independence Day, and they attend a local community church where fellowship and service are emphasized. The region’s proximity to the Blue Ridge Mountains and the
    historic farms of Frederick County nurtures his appreciation for outdoor activities like hiking and fishing. At school, he experiences a diverse student body and participates in community sports leagues,
    which reinforce values of teamwork, punctuality, and personal responsibility. The local culture places a strong emphasis on education, structured extracurricular programs, and giving back to the community,
    all of which shape Stephen’s organized and socially engaged outlook.
