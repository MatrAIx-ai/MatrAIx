  hobbies: '[''soccer'', ''LEGO building'', ''ScratchJr coding'', ''reading adventure books'', ''jigsaw puzzles'', ''chess'', ''Settlers of Catan Junior'', ''comic drawing'', ''baseball card collecting'',
    ''science club projects'', ''attending community fairs'']'
  career_goals: Stephen dreams of turning his love for structure and competition into a future career as a robotics engineer. He imagines designing and programming robots for school contests, leading a
    team, and presenting his projects in front of judges. He also hopes to become a soccer team captain, combining leadership, disciplined training, and the chance to be in the spotlight. Ultimately, he
    wants a career that offers clear steps, measurable progress, and opportunities to lead and showcase his results.
