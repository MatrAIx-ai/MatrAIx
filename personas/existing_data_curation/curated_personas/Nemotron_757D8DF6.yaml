personas:
  professional: An innovative full‑stack software engineer, Gustavo Gabay couples data analysis and cloud infrastructure expertise with a flair for visual design, using their spontaneous curiosity to quickly
    prototype interactive apps while occasionally stumbling over strict deadlines and organization.
  sports: As a regular on the Capitol Hill Soccer Club’s Saturday league and a weekend cyclist on the Mount Vernon Trail, Gustavo Gabay rallies behind D.C. United in the MLS season, enjoys cheering the
    Capitals during hockey playoffs, and blends competitive play with a laid‑back love for group workouts.
  arts: Immersed in the DC art scene, Gustavo Gabay captures candid moments of city life à la Henri Cartier‑Bresson with a mirrorless camera, sketches digital illustrations inspired by the bold graphics
    of Shepard Fairey, and hams it up in improv nights with the local sketch troupe, drawing constant inspiration from gallery openings featuring Ai Weiwei and local muralists.
  travel: Spontaneously booking last‑minute flights, Gustavo Gabay has already explored the historic streets of New Orleans, the street art of Berlin, and the culinary markets of Mexico City, while dreaming
    of a future immersive retreat in Reykjavik’s geothermal baths, all while balancing a modest travel budget that favors affordable Airbnb stays over luxury hotels.
  culinary: An enthusiastic home cook, Gustavo Gabay masters island classics like mofongo, arroz con gandules, and pastelón, skillfully sautéing plantains, sofrito, and smoked pork, while experimenting
    with fusion recipes that blend traditional spices with modern techniques, often sharing the results at potluck meet‑ups after improv shows.
  core: Gustavo Gabay is a curiosity‑driven tech‑artist who cycles the DC streets, sketches interactive visuals, and can’t resist a spontaneous improv gig or a steaming plate of mofongo, even if deadlines
    sometimes slip through their relaxed schedule.
background:
  cultural: Gustavo grew up in a bilingual Puerto Rican household, speaking Spanish at home and English in school. He carries the island’s rich cultural traditions—such as salsa music, festive family gatherings,
    and the celebration of Noche de San Juan—into his daily life. Living in Sterling, VA, within the diverse Fairfax County region, he engages with the local Latinx community, attending cultural festivals
    and supporting Puerto Rican restaurants. This blend of Caribbean heritage and exposure to the metropolitan, multicultural environment of the DC metro area has shaped his inclusive worldview, giving
    him a deep appreciation for collaborative creativity and community‑oriented initiatives.
