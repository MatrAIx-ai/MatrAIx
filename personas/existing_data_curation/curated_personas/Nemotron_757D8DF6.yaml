  career_goals: Gustavo aims to transition into roles that blend technology with artistic expression, such as lead developer for interactive installations or product manager for creative‑tech platforms.
    He aspires to become a senior engineer or tech lead at a company that values experimental design and user‑centered experiences. Long‑term, he hopes to launch a side venture creating augmented‑reality
    art tools that empower other creators, while also contributing to open‑source projects at the intersection of code and visual art.
