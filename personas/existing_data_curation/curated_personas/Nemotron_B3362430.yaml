personas:
  professional: Janie Noble is a seasoned nonprofit public relations and fundraising strategist who leverages 15 years of experience in crisis communication, donor‑management platforms such as Raiser’s
    Edge and Salesforce Nonprofit Cloud, and a methodical, data‑driven approach to exceed campaign targets, all while channeling their natural sociability and pragmatic curiosity into leading cross‑functional
    teams toward ambitious capital‑raising goals.
  sports: Janie Noble is an avid outdoors enthusiast who runs with the Ozark Trailblazers hiking club, follows the Arkansas Razorbacks basketball and football teams, roots for the St. Louis Cardinals in
    baseball, and carves out time for twice‑weekly yoga at a downtown studio to balance their high‑energy social life with low‑impact strength training.
  arts: Janie Noble cultivates a vibrant artistic palate by leading a contemporary fiction book club that discusses works by Chimamanda Ngozi Adichie and Sally Rooney, attending live performances at the
    Walton Arts Center starring actors like Viola Davis, and curating dinner‑party playlists featuring folk‑rock singer Jason Isbell and Grammy‑winning country artist Kacey Musgraves.
  travel: Janie Noble, who prefers meticulously planned weekend getaways over spontaneous trips, frequently explores nearby music hubs like Nashville and Austin, has trekked the Blue Ridge Parkway in Asheville,
    dreams of a wine‑focused itinerary through Tuscany’s Chianti region, and balances travel ambitions with a tight fundraising calendar and a modest travel budget.
  culinary: Janie Noble, an enthusiastic home cook with a solid intermediate skill set, loves to experiment with regional Southern dishes such as smoked brisket, shrimp‑and‑grits, and pepper‑jacketed collard
    greens, pairs them with boutique Arkansas wines like Petit Verdot, and occasionally over‑salts her sauces while hosting lively dinner parties for friends.
  core: Janie Noble blends Southern hospitality with data‑driven fundraising acumen, orchestrates community‑building dinner parties, juggles a rigorous yoga practice, and secretly hoards an ever‑growing
    collection of vintage wine corks despite a habit of over‑booking her calendar.
background:
  cultural: Janie grew up in a middle‑class white family in the American South, surrounded by the values of Southern hospitality, community involvement, and self‑reliance. Her upbringing emphasized a blend
    of traditional customs—such as church participation and local volunteerism—and a forward‑looking curiosity that encouraged her to pursue higher education and explore diverse ideas. Living in Fayetteville,
    she is influenced by the region’s appreciation for the outdoors, a strong university presence, and a growing cultural scene, all of which shape her inclusive yet pragmatic worldview.
attributes:
  skills: '[''Strategic communications'', ''Media relations'', ''Fundraising campaign design'', ''Donor stewardship'', ''Grant writing'', ''Event planning and execution'', ''Crisis communication'', ''Brand
