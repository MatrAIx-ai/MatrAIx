    speaking'', ''Negotiation'', ''Team leadership and staff development'']'
  hobbies: '[''Hiking in the Ozarks'', ''Community garden volunteering'', ''Book club (contemporary fiction & social issues)'', ''Cooking and hosting dinner parties'', ''Wine‑pairing events'', ''Yoga'',
    ''Volunteer public speaking coaching'']'
  career_goals: Janie aims to progress into a senior development leadership role, such as Director of Development for a regional health system or cultural institution, where she can oversee large‑scale
    capital campaigns and expand annual giving revenue by at least 30 % within five years. She plans to deepen her strategic expertise by earning a Master’s in Nonprofit Management and to become a recognized
    thought leader by speaking at national PR and fundraising conferences. Long‑term, Janie envisions launching her own consulting practice to help mid‑size nonprofits integrate data‑driven communication
    strategies while mentoring the next generation of women leaders in the sector.
