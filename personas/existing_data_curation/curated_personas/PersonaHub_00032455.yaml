persona_description: A physicist who specializes in the study of general relativity, particularly the concepts and theories related to the warping of spacetime and the behavior of black holes. His research
  interests include the numerical solution of Einstein's equations using supercomputers, the experimental study of gravitational waves from colliding black holes and other phenomena where spacetime is highly
  warped, and the exploration of the nature of naked singularities and the other huge surprises that lie beyond the scope of Einstein's equations. His work has led to the discovery of the rich domains that
  his previous tools could not touch and the unlocking of Einstein's remaining mysteries by a new, two-pronged attack using both theoretical and experimental approaches.
