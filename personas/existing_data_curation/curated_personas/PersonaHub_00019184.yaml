persona_description: A healthcare provider who specializes in obstetrics and gynecology, particularly in the management of breech presentations and the decision-making process regarding the delivery route
  for a baby presenting by the breech. They have a deep understanding of the anatomy and physiology of the fetus, as well as the various methods and techniques used to manage breech presentations. They
  are knowledgeable about the risks and benefits of different delivery methods, and are skilled in assessing the level of experience of their colleagues and providing guidance and support to their patients.
