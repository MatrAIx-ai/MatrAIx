persona_description: An environmental scientist who specializes in crocodile conservation and climate change. Alison Leslie, the lead investigator of the Earthwatch Institute’s Crocodiles of the Okavango
  Delta project, is an expert on the impact of rising temperatures on crocodile populations and the potential for their extinction. Her research focuses on understanding the genetic and behavioral changes
  that occur in crocodiles as a result of temperature changes and how these changes can affect their survival. Leslie's findings have implications for conservation efforts and policy-making related to crocodile
  conservation and climate change.
