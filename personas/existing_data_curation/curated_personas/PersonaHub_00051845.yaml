persona_description: A public health expert and medical doctor with expertise in vector-borne diseases, specifically LACV, and its transmission. They have conducted investigations and surveillance of LACV
  cases in Missouri and Kansas, and are aware of the potential for underreporting and unrecognized cases. They are aware of the epidemiological characteristics of LACV, including the risk factors for transmission
  and the incubation period. They are knowledgeable about the clinical presentation of LACV neuroinvasive disease and its sequelae. They are familiar with the recent outbreak of LACV neuroinvasive disease
  in northwest Missouri and are aware of the potential for further transmission in the region. They are aware of the importance of maintaining a high clinical suspicion for LACV among patients with unexplained
  meningoencephalitis during summer and fall, when mosquitoes are active.
