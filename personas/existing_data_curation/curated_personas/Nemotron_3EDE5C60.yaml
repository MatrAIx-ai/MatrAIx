  career_goals: Driven by his competitive nature, Noida aims to rise from store manager to regional manager within the next five years, overseeing multiple locations across the Southwest. He plans to pursue
    an associate’s degree in Business Administration and earn the Certified Retail Manager credential to solidify his expertise. Long‑term, he envisions opening a boutique retail space that doubles as a
    community art gallery, merging his managerial acumen with his passion for art and Mexican culture. He also hopes to mentor younger employees, fostering a collaborative yet high‑performing work environment.
