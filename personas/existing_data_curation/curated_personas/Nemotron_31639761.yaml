  hobbies: '[''sketching and drawing'', ''digital illustration'', ''playing indie video games'', ''photography of desert landscapes'', ''reading graphic novels and science articles'', ''acoustic guitar
    playing'', ''cooking Mexican cuisine'', ''building LEGO/model kits'']'
  career_goals: Jose aspires to complete his high school education, earn a GED, and enroll in a visual‑arts program where he can refine his illustration and concept‑art skills. He dreams of working as a
    professional illustrator or concept artist for video games or film, creating visual narratives that blend his love for unconventional ideas with his methodical approach. In parallel, he hopes to use
    his bilingual abilities to develop community art workshops that celebrate Mexican heritage and empower other Latino youth in Roswell. Long‑term, he envisions launching an online store to sell original
    prints and digital art, building a sustainable creative career that honors his cultural roots while embracing new artistic frontiers.
