personas:
  professional: Jose Coca, an aspiring visual storyteller, blends sketching skills with digital illustration on a tablet to craft narrative concepts for indie video games, applying methodical planning and
    curiosity to keep a detailed design journal and schedule.
  sports: Jose Coca, a fan of the New Mexico State Aggies basketball team and a casual participant in weekend desert‑hiking trips with the Albuquerque Trail Club, enjoys gentle cardio through hikes and
    occasional pickup soccer games, while preferring solitary jogs over organized sports.
  arts: Jose Coca, an avid admirer of graphic novel creators like Lynda Barry and the series 'Saga', draws inspiration from indie games such as 'Journey', 'Celeste', and 'Hades', as well as the animation
    of Hayao Miyazaki, while listening to jazz guitarist Wes Montgomery during sketch sessions and collecting limited‑edition art prints.
  travel: Jose Coca, who loves mixing structured planning with spontaneous discovery, has taken day trips to White Sands National Park and long‑haul bus rides to Santa Fe, dreams of visiting Kyoto’s Arashiyama
    bamboo forest and the Sahara Desert, and often maps routes on a physical atlas before each adventure.
  culinary: Jose Coca, who regularly helps his family prepare traditional dishes like tamales, pozole, and chile rellenos, enjoys experimenting with smoked chipotle and roasted corn, has a budding skill
    in plating his creations artistically, though they sometimes over‑salt the salsa.
  core: Jose Coca, a quietly ambitious teen who balances methodical sketchbooks with spontaneous desert photography, meticulous budgeting, and an occasional over‑indulgence in comic book splurges, embodies
    a blend of curiosity, kindness, and a habit of collecting vintage pencils.
background:
  cultural: Jose comes from a Mexican‑American family that maintains strong ties to its cultural heritage while integrating into the broader community of Roswell, New Mexico. At home, Spanish is spoken
    alongside English, and family traditions such as Día de los Muertos, festive celebrations of Christmas, and the preparation of dishes like tamales and pozole are central to his upbringing. The blend
    of Mexican cultural values—respect for elders, emphasis on family cohesion, and communal sharing—shapes his considerate and cooperative nature. Living in the high desert of southern New Mexico, he experiences
    a unique regional culture that incorporates Native American art motifs, Southwestern cuisine, and an ongoing fascination with the town’s UFO folklore. This multicultural environment fuels his curiosity,
    informs his artistic aesthetic, and reinforces his desire to bridge cultures through his future creative and community work.
attributes:
  skills: '[''bilingual Spanish-English communication'', ''traditional drawing and sketching'', ''digital illustration (Photoshop, Clip Studio Paint)'', ''basic photo composition and editing (Lightroom)'',
