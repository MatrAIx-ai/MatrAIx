personas:
  professional: Johnny Witherspoon, a seasoned HVAC technician in Chicago, blends meticulous blueprint analysis and cutting‑edge IoT thermostat integration with a practical curiosity that fuels their push
    toward green retrofits while reliably mentoring apprentices and coordinating crew schedules.
  sports: Johnny Witherspoon, a dedicated basketball enthusiast who runs a weekly pick‑up league at Grant Park, cheers for the Chicago Bulls and Chicago White Sox, participates in a local adult basketball
    club, and balances energetic workouts with occasional knee‑friendly cross‑training in the summer at Lake Michigan’s bike trails.
  arts: Johnny Witherspoon, a regular at Chicago blues clubs, enjoys live sets from Buddy Guy and Koko Taylor, attends quarterly jazz performances featuring Kurt Elling, and channels that appreciation into
    weekend DIY workshops inspired by the craftsmanship showcased in vintage car restoration shows.
  travel: Johnny Witherspoon prefers family road trips that blend outdoor adventure with cultural stops, having explored Starved Rock State Park, the historic French Quarter of New Orleans, and a weekend
    getaway to Lake Geneva, while meticulously planning routes to fit in pit stops for regional BBQ joints.
  culinary: Johnny Witherspoon, an avid grill master, whips up smoky collard greens seasoned with smoked paprika and apple cider vinegar, perfects BBQ ribs glazed with honey‑chipotle sauce, and experiments
    with sweet potato pie, showcasing a solid intermediate cooking skill that often includes improvising with fresh herbs from their backyard garden.
  core: Johnny Witherspoon balances a methodical HVAC career with a lively community spirit, juggling basketball leagues, vintage car tinkering, and family BBQs, all while occasionally overcommitting to
    volunteer events and never missing a Sunday blues concert.
background:
  cultural: Johnny grew up in a close-knit African-American community on the South Side of Chicago before moving to Hickory Hills. His family's traditions emphasize church fellowship, music, and collective
    responsibility. He carries forward the values of perseverance, respect for elders, and community uplift that are central to Black cultural heritage in the Midwest. He celebrates Juneteenth and Black
    History Month with neighborhood events, and his culinary preferences reflect classic soul food recipes passed down from his grandparents. His cultural identity informs his commitment to mentoring young
    Black workers, supporting local Black-owned businesses, and maintaining strong family ties.
attributes:
  skills: '[''HVAC system installation'', ''Preventive maintenance and repairs'', ''Diagnostic troubleshooting'', ''Refrigerant handling and recovery (EPA certified)'', ''Electrical wiring and control systems'',
