    communication'']'
  hobbies: '[''Basketball (player and organizer)'', ''Soul food cooking and grilling'', ''Youth mentorship and basketball coaching'', ''Classic car restoration'', ''Live blues and jazz concerts'', ''Hiking
    and outdoor activities in Illinois state parks'', ''Community service (food bank, clean-up)'']'
  career_goals: He aims to become a master HVAC technician with advanced EPA certification for low-global-warming-potential refrigerants, and to earn an associate degree in HVAC technology. Within the next
    three years he plans to lead the service department of his company, overseeing a crew of technicians and implementing a proactive maintenance program that leverages predictive analytics. Long-term,
    he envisions launching his own boutique HVAC contracting firm that specializes in green retrofits, such as solar-assisted cooling and high-efficiency heat pumps, while also establishing a community
    apprenticeship pipeline for young Black tradespeople in the Chicago area.
