persona_description: A geologist or mineral resources expert who is interested in the economic impact of mineral resources on society and the environment. They are curious about how the production, demand,
  and regulation of minerals affect global sustainability and the complex relationships among consumers, producers, and the environment. They are also interested in understanding the historical trends of
  mineral production and value, and how these trends have changed over time. They are familiar with the use of technology and regulation in the mining industry and how these factors have impacted the sustainability
  of mineral resources. They may have experience with concept mapping and interpreting the relationships between consumers, producers, regulating agencies, and the environment in a global context.
