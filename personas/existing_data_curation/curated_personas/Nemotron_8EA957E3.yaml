  career_goals: Although only two years old, Lara expresses aspirations through imaginative play, often pretending to be a teacher to her stuffed animals or a caregiver for baby dolls. She shows a budding
    desire to help others and to learn, hinting at future interests in roles like teaching, pediatric care, or animal caretaking. Her long‑term goal is to continue exploring new ideas while maintaining
    the structure and harmony she values, using play as a foundation for lifelong learning.
