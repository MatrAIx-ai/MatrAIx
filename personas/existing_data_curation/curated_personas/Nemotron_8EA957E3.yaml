personas:
  professional: An inquisitive toddler named Lara Burer treats building block play as a miniature profession, methodically arranging wooden cubes while they occasionally experiment with new patterns, which
    showcases a balance of curiosity and practicality and a tidy yet adaptable approach to problem‑solving.
  sports: A playground enthusiast named Lara Burer enjoys swinging, climbing the slide, and gently kicking a soft ball while watching the local professional soccer team City FC on family TV, and they occasionally
    join the neighborhood toddlers' playgroup club for mini‑ball games, preferring small‑group activity over large crowds.
  arts: An emerging little connoisseur named Lara Burer adores the colorful pages of Dr. Seuss books, sings along to Raffi’s "Baby Beluga," and watches gentle ballet snippets of Misty Copeland, often humming
    the tunes they love, which reflects their kind, cooperative nature and a preference for harmonious, solo artistic experiences.
  travel: A tiny explorer named Lara Burer delights in family outings to the city zoo, the sandy shoreline of Santa Monica Beach, and a weekend stay at a cozy cabin in the mountains, while they dream of
    someday seeing the Eiffel Tower, showcasing a blend of curiosity, practicality in short trips, and a cautious wish for familiar comfort.
  culinary: A picky yet adventurous eater named Lara Burer enjoys mashed sweet potatoes, soft cheese cubes, and banana‑yogurt swirls, but they often squish their spoon against the bowl when a new texture
    appears, revealing a delicate balance of curiosity about flavors and a nervous reaction to unfamiliar foods.
  core: Lara Burer, a two‑year‑old bundle of cautious curiosity, navigates the world with a tidy block‑building habit, a treasured piggy bank, a watchful eye on health, and a gentle love for solo play,
    all while they occasionally worry about the unknown.
background:
  cultural: Lara is raised in a white, Midwestern family in Anoka County, Minneapolis. Her household blends typical American customs—celebrating Thanksgiving, Christmas, and the Fourth of July—with occasional
    European heritage traditions like Irish lullabies and German holiday pastries shared by grandparents. The family participates regularly in community activities such as library storytimes, neighborhood
    potlucks, and park gatherings, emphasizing politeness, respect for neighbors, and early education. This cultural environment nurtures her curiosity, cooperative nature, and sensitivity to social harmony.
