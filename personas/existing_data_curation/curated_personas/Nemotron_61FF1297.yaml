personas:
  professional: Corey Downs, a budding builder who spends hours arranging wooden blocks into razor‑sharp towers, shows early signs of an architect’s eye for structure, a methodical work ethic, and a calm
    confidence that sets them apart from other toddlers.
  sports: Corey Downs, an energetic preschooler who proudly wears the Tiny Turtles Soccer Club jersey for weekend practices, joins neighborhood tag games with boundless enthusiasm, and cheers loudly for
    the Seattle Mariners whenever a game plays on the family TV, reflecting a competitive yet sociable approach to fitness.
  arts: Corey Downs, a vibrant little artist who sings along to the Sesame Street cast, watches the animated series "Bluey" for imaginative inspiration, and spends afternoons doodling crayons on large sheets,
    often mimicking the bold lines of Dr. Seuss illustrations.
  travel: Corey Downs, a curious explorer who thrives on well‑planned short road trips, has already visited the local Monterey Bay Aquarium and the magical Disneyland Resort in Anaheim, and now dreams of
    standing before the Eiffel Tower with their family during a future summer vacation.
  culinary: Corey Downs, a selective yet enthusiastic eater who adores cheesy macaroni, crispy chicken nuggets, and banana slices, can skillfully spread peanut butter on toast with a plastic spatula and
    delights in the bright orange crunch of carrot sticks.
  core: Corey Downs, a calm, methodical three‑year‑old who meticulously lines up toys, counts every coin in a pink piggy bank, and tackles each new adventure with an outgoing grin and a competitive spark,
    all while rarely showing anxiety or sadness.
background:
  cultural: Corey is a White child raised in Freeport, a small town in Tuscarawas County, Ohio. His family reflects typical Midwestern values, emphasizing community involvement, church attendance, family
    gatherings, and participation in local traditions such as county fairs, Fourth of July parades, and holiday celebrations. The region’s agricultural roots and close‑knit neighborhood foster a sense of
    reliability, hard work, and friendliness in his upbringing.
