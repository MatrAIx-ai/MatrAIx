  career_goals: John aims to secure a full-time role that combines his organizational talent, people-centric approach, and interest in the arts. He is pursuing entry-level positions such as community outreach
    coordinator, event assistant, or gallery support staff within the Dallas-Fort Worth metro area. He plans to obtain a Project Management Professional certification within the next two years to strengthen
    his credentials. In the longer term, he hopes to launch a small community-focused art space or co-working hub that offers workshops, local exhibitions, and networking events for creatives and entrepreneurs.
