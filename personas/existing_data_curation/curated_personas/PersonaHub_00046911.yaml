persona_description: An astrophysicist who specializes in the study of the background radiation in the near infrared spectrum, particularly the anisotropies detected at arcminute to degree scales. The persona
  is interested in understanding the spatial distribution of the background radiation and its relation to the stellar content of the universe, as well as the implications of these findings for the current
  understanding of the problem. The persona is also knowledgeable about the work of Michael Zemcov and his collaborators, and is interested in the implications of their findings for the current baryon budget
  and the photon underproduction crisis.
