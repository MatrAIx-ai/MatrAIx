persona_description: An economist who studies the impact of globalization on economic growth and the distribution of income. They are interested in the differences in growth rates and income gains between
  different countries and are particularly interested in understanding the factors that contribute to these differences. They are likely to be familiar with the globalization index used in the study and
  are interested in using it to make predictions about future economic developments. They may also be interested in the implications of their findings for economic policy and the role of globalization in
  shaping economic growth.
