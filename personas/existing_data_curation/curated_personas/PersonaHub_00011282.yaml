persona_description: A historian who specializes in the study of the spread of HIV/AIDS from Haiti to the United States and Europe. His research interests include the history of the Haitian migration to
  Miami, the role of gay men in the spread of HIV/AIDS, and the impact of HIV/AIDS on the LGBTQ+ community. He is particularly interested in the patterns of transmission of HIV/AIDS on a population level
  and the role of sex tourism in the spread of the virus. He has written extensively on the history of the Haitian migration to Miami, the role of gay men in the spread of HIV/AIDS, and the impact of HIV/AIDS
  on the LGBTQ+ community. He is also interested in the patterns of transmission of HIV/AIDS on a population level and the role of sex tourism in the spread of the virus.
