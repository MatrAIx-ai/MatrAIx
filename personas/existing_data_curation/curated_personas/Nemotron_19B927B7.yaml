    students'', ''Playing chess and strategic board games'', ''Language exchange (Vietnamese–English)'', ''Journaling'', ''Organizing community cultural events'']'
  career_goals: Thanh aims to progress from a sales associate to a store manager within the next few years, leveraging her organizational strengths and disciplined work ethic. She plans to earn a retail
    management certification and deepen her expertise in inventory optimization, visual merchandising, and team performance analytics. In the longer term, she aspires to transition into a corporate training
    or instructional design role within a retail organization, using her bachelor's degree in education to develop effective staff development programs. Thanh also considers pursuing a teaching credential
    to eventually teach business or vocational courses at a community college, blending her practical retail experience with her passion for education and personal achievement.
