personas:
  professional: Carlos Bonilla, a 77‑year‑old retired carpenter turned community historian, channels their meticulous, organized approach, bilingual communication, and hands‑on problem‑solving into a quarterly
    home‑repair column and a consulting role with the Mesilla Valley Historical Society, where they safeguard regional history while keeping their promise to stay mentally active.
  sports: Carlos Bonilla, a lifelong supporter of the New Mexico State Aggies basketball team, participates quietly in the senior walking club that explores the high desert trails and enjoys occasional
    friendly crossword puzzle competitions that they frame as mental athletics.
  arts: Carlos Bonilla immerses themselves in traditional ranchera music by Vicente Fernández and José Alfredo Jiménez while crafting miniature train carriages, and they regularly attend the town's Día
    de los Muertos lantern exhibition, finding comfort in the blend of nostalgic melodies and visual storytelling.
  travel: Carlos Bonilla prefers low‑key road trips that combine historical sites and starlit skies, having recently driven the historic Route 66 stretch through Arizona and planning a future visit to the
    ancient pueblos of Taos, always packing their binoculars and a field notebook.
  culinary: Carlos Bonilla enjoys preparing simple heritage dishes such as carne asada tacos with fresh cilantro and lime, roasted chile rellenos, and cactus salad, often using chilies and nopales from
    their xeriscape garden and grilling them over a wood‑fired smoker they built themselves.
  core: Carlos Bonilla, a methodical 77‑year‑old with a solitary streak, blends practical craftsmanship, disciplined finance, and a love for Southwest history into a quiet yet fiercely competitive pursuit
    of self‑reliance.
background:
  cultural: Carlos is a first‑generation Mexican‑American who grew up in the border region of New Mexico. He was raised in a bilingual household where Spanish and Catholic traditions were central, celebrating
    Día de los Muertos, Las Posadas, and other Mexican holidays. The blend of Mexican heritage and Southern New Mexican culture shaped his values of family, self‑reliance, and respect for community history.
    His identity reflects the Chicano experience, balancing pride in his Mexican roots with the practical sensibilities of life in the American Southwest.
attributes:
