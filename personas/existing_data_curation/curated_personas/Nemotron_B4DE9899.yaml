personas:
  professional: Xavier Brown, a retired marine engineer turned community STEM mentor, leverages decades of ship hull analysis, technical writing, and woodworking craftsmanship to design engaging workshops,
    while their curious yet relaxed nature fuels inventive lesson plans despite occasional disorganization.
  sports: Xavier Brown, an avid sailor with the Gulf Coast Sailing Club and a devoted fisherman, follows the New Orleans Saints and the Houston Astros, joins seasonal bird‑watching outings, and keeps fit
    through gentle morning stretches and occasional walks along the bay, preferring low‑impact activities that complement their love of the water.
  arts: Xavier Brown, who paints tranquil watercolors of harbor scenes and curates digital photo series of migrating birds, draws inspiration from modern artists like Jackson Pollock and Mark Rothko, reveres
    the improvisations of Miles Davis and John Coltrane, and enjoys local theater productions featuring actors such as Meryl Streep, weaving these influences into a lifelong artistic identity.
  travel: Xavier Brown, who prefers loosely planned trips and often combines sailing excursions with cultural visits, has already toured the Metropolitan Museum of Art in New York and hopes to see the Louvre
    in Paris and the National Gallery in London, while also enjoying weekend getaways to historic Charleston for its preserved architecture and jazz festivals.
  culinary: Xavier Brown, a moderate home cook who delights in preparing Gulf shrimp gumbo with fresh tomatoes, basil, and thyme from their herb garden, savors blackened red snapper tacos and hearty jambalaya,
    and occasionally dines at the seaside oyster bar for a plate of raw oysters with a squeeze of lemon.
  core: Xavier Brown, an 85‑year‑old former marine engineer turned artistic mentor, fuses a love of shipbuilding, watercolor, and jazz with a curious, competitively spirited yet relaxed outlook that often
    leads to charming disarray in both workshops and paperwork.
background:
  cultural: Xavier grew up as an African‑American in the Deep South during the turbulence of the 1950s and 60s, witnessing the civil‑rights movement firsthand in Mississippi. His family’s roots trace back
    to the Great Migration, with grandparents who worked as sharecroppers before moving to Pascagoula for jobs in the shipyards. The church has been a cornerstone of his life, providing community, gospel
    music, and a sense of resilience. He embraces Southern culinary traditions, especially soul food, and cherishes the rhythm of blues and jazz that have shaped his upbringing. His cultural identity blends
    the rich heritage of African‑American storytelling, the communal spirit of the Gulf Coast, and a lifelong reverence for education and self‑improvement, which informs his curiosity and competitive nature.
