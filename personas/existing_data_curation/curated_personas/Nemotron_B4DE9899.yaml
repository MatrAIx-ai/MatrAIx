  hobbies: '[''Fishing'', ''Sailing'', ''Bird watching'', ''Watercolor painting'', ''Digital photography'', ''Reading art history'', ''Jazz music'', ''Local theater'', ''Volunteer tutoring'', ''Gardening'',
    ''Woodworking'', ''Model shipbuilding'', ''Chess'', ''Crossword puzzles'']'
  career_goals: At this stage Xavier's career goals focus on legacy‑building and community enrichment rather than formal employment. He aims to lead a series of community STEM workshops for high‑school
    students, document oral histories of longtime shipyard workers, curate a small exhibition of his coastal photography and watercolor paintings, author a memoir that weaves together his engineering career
    and artistic pursuits, and potentially launch an online boutique selling hand‑crafted wooden ship models. He also hopes to travel to at least three major art museums in the next five years to broaden
    his artistic perspective.
