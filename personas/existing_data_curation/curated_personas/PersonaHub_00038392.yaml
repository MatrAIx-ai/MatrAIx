persona_description: A public health emergency response specialist who is responsible for conducting rapid needs assessments during disasters to determine the health needs of affected communities and to
  prioritize response and recovery efforts. The persona is familiar with epidemiological techniques, statistical methods, and decision-making processes. They have experience with the CDC's Community Assessment
  for Public Health Emergency Response (CASPER) toolkit and have conducted CASPER assessments during both disaster and non-disaster settings. The persona is well-versed in using CASPER methodology to gather
  household-based population estimates of needs, determine critical health needs, characterize the population, and evaluate the effectiveness of relief efforts. They are capable of conducting CASPER assessments
  in a timely and efficient manner and have the ability to disseminate data through appropriate channels.
