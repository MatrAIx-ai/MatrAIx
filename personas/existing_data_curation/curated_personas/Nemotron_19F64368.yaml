  career_goals: Although retired, Somphone aims to stay mentally and physically engaged. He hopes to perfect a few new cooking techniques each year and compile his family’s recipes into a handwritten cookbook
    for his grandchildren. He wants to adopt simple daily routines to counter his natural disorganization and alleviate his worry, possibly through mindfulness or gentle yoga classes at a senior center.
    Occasionally, he plans to offer modest home‑repair services to neighbors to supplement his pension while keeping his skills sharp. A long‑term ambition is to travel with his wife to Vietnam to reconnect
    with relatives, visit cultural sites, and deepen his understanding of his heritage.
