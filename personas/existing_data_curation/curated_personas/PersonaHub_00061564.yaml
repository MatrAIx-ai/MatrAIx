persona_description: A healthcare professional who is knowledgeable about the sleep disturbances experienced by cancer patients and the factors that can influence their sleep-wake patterns. This individual
  is likely to have a background in sleep medicine, oncology, or a related field, and is interested in understanding the complex interplay between cancer-related symptoms, treatment side effects, and emotional
  factors that can lead to sleep disturbances. They are also likely to be familiar with the latest research on the topic and to be able to provide evidence-based recommendations for the treatment of sleep
  disorders in cancer patients.
