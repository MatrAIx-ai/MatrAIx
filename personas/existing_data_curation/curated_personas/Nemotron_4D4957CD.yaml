  hobbies: '[''Basketball'', ''Running club'', ''Hip‑hop dance'', ''Food bank volunteering'', ''DIY tech projects (Raspberry Pi navigation)'', ''Exploring nature trails'', ''Listening to jazz and R&B'',
    ''Urban street photography'', ''Movie nights with friends'']'
  career_goals: Alfred aims to transition from a front‑line courier to a supervisory role within the next three years, aspiring to become a logistics coordinator who designs efficient delivery routes for
    a regional courier network. He plans to obtain a commercial driver’s license (CDL) and enroll in an associate’s program in supply chain management at a community college. Long‑term, Alfred envisions
    launching his own small‑scale delivery service that employs local workers, focusing on reliable, community‑oriented logistics. He also hopes to mentor new couriers, sharing his organized work ethic
    and personable approach.
