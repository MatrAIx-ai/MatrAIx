persona_description: A chemist who specializes in the detection and identification of sulfide species, particularly hydrogen sulfide and hydrogen polysulfides. His research has led to the development of
  a new injectable probe that can distinguish between the two gases and is being used by researchers at other institutions around the world to study the potential roles of sulfide species in diseases. His
  work has also led to the licensing of his sulfide detection probes for use by researchers at other institutions across the country and world.
