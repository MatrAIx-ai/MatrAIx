  career_goals: Jose dreams of becoming a scientist‑engineer who designs rockets or explores the ocean solo. He is determined to win his school’s science fair and aspires to attend a specialized STEM program
    where he can work independently on projects. His competitive nature fuels an ambition to be recognized as the top problem‑solver among his classmates, and he hopes to someday work as an astronaut or
    mechanical engineer, using his methodical skills to solve complex technical challenges.
