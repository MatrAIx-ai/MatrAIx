personas:
  professional: A budding LEGO architect named Jose Ariza harnesses their methodical planning and curiosity to design intricate builds, preferring quiet, solitary sessions over group play while quietly
    competing against themselves to outdo their previous creations.
  sports: An enthusiastic young athlete named Jose Ariza spends Saturday mornings with the Little Champions Soccer Club, drills regularly at the neighborhood swimming pool to hone technique, and cheers
    for FC Barcelona whenever a match airs, channeling their competitive streak into personal bests.
  arts: A creative storyteller named Jose Ariza sketches cartoon characters inspired by Pixar’s Toy Story, animates simple scenes on Scratch, and fills the house with the lively chords of Mariachi Vargas
    de Tecalitlán, using art as a quiet escape and a way to compete with their own previous works.
  travel: A curious explorer named Jose Ariza loves backyard critter hunts, has visited the local city zoo on a family outing, dreams of witnessing the sunrise at the Grand Canyon, and hopes to trek the
    lush rainforests of Costa Rica someday.
  culinary: A budding chef named Jose Ariza meticulously assembles cheese‑and‑ham quesadillas, perfects the balance of peanut butter and banana in a sandwich, relishes fresh strawberries and crunchy carrot
    sticks, and occasionally treats themselves to a slice of pepperoni pizza after completing a challenging LEGO set.
  core: A solitary, methodical 7‑year‑old named Jose Ariza blends curiosity with pragmatic planning, turning quiet LEGO builds, careful savings, and meticulous self‑care into a quietly competitive world
    where they constantly strive to outdo their own benchmarks.
background:
  cultural: Jose grows up in a Mexican‑American household in Oak Harbor, Ohio, where his family maintains strong ties to their Mexican heritage while adapting to Midwestern life. At home, Spanish is spoken
    daily, and he celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day with family gatherings and traditional foods like tamales and quesadillas. His Catholic
    upbringing shapes his moral framework, and he often attends both local community events and church services. The blend of Mexican cultural values—family closeness, respect for elders, and festive food
    customs—with the quieter, community‑oriented lifestyle of rural Ohio informs his preference for solitude and his methodical approach to activities.
