personas:
  professional: Jackelyn Dominguez, a senior community organizer and household management specialist, leverages their disciplined scheduling and bilingual communication to coordinate volunteer shifts, oversee
    neighborhood clean‑ups, and mentor younger volunteers, all while maintaining meticulous logs of expenses, garden cycles, and medical appointments.
  sports: Jackelyn Dominguez enjoys a steady regimen of 30‑minute walks around the nearby Parque de las Ciencias, follows the local baseball team the Coastal Mariners, and participates in a senior low‑impact
    aerobics group, favoring predictable, low‑risk activity over competitive sports.
  arts: Jackelyn Dominguez immerses themselves in boleros by Lucho Gatica, classic piano pieces by Chopin, and traditional plena rhythms performed by Juan Luis, while knitting scarves whose vivid hues echo
    the colors of local festivals, drawing occasional inspiration from Frida Kahlo’s palette.
  travel: Jackelyn Dominguez prefers carefully planned trips, often revisiting family homes on the island of Vieques and taking day excursions to historic Old San Juan, balancing a love for cultural exploration
    with their limited mobility and budget constraints.
  culinary: Jackelyn Dominguez expertly prepares traditional dishes such as mofongo, arroz con gandules, and pasteles, tweaking recipes with olive oil, quinoa, and reduced salt to create healthier versions,
    while savoring the aroma of plantains, garlic, and sofrito in their kitchen.
  core: Jackelyn Dominguez combines a lifelong love of order, garden‑to‑table cooking, and quiet community stewardship, occasionally hoarding receipts like treasured souvenirs and speaking softly to their
    thriving houseplants.
background:
  cultural: Jackelyn was born and raised in a modest neighborhood of San Juan, where family gatherings, Catholic traditions, and the rhythms of plena and salsa filled daily life. Growing up in a bilingual
    household, she effortlessly switches between Spanish and English, a skill that has helped her maintain connections across the island and with relatives abroad. The value placed on comunidad (community)
    guided her involvement in neighborhood activities and volunteer work. Traditional Puerto Rican cuisine, with its emphasis on fresh ingredients and communal meals, shaped her cooking style and her dedication
    to preserving family recipes. Her faith, respect for elders, and pride in cultural heritage inform her disciplined, organized approach to life, ensuring that customs and practical responsibilities are
    upheld with equal care.
