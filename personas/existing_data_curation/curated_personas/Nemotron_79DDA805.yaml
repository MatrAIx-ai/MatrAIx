  hobbies: '[''Hiking'', ''Vegetable Gardening'', ''Home Brewing'', ''Mechanical Puzzle Solving'', ''Local History Research'', ''Chess'', ''Reading Biographies'']'
  career_goals: Kim aims to become a senior surveillance supervisor within the casino industry, lead a team of officers, and eventually obtain Certified Protection Professional (CPP) certification. Over
    the next five years she plans to specialize in fraud detection analytics and mentor new recruits. Long-term she envisions starting her own security consulting practice focused on gambling venues.
