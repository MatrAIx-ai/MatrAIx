  career_goals: Denise aims to move from cashier to shift supervisor within the next year, using her reliability and leadership potential to earn a formal management role. She plans to enroll in evening
    courses at a community college to obtain an associate degree in business administration or retail management, which would position her for a store manager position in a larger retailer. Long‑term, she
    hopes to blend her organizational skills and love of the arts by transitioning to an administrative or program‑coordinator role at a local art center or museum, allowing her to contribute to community
    cultural initiatives while achieving a more predictable schedule that reduces stress.
