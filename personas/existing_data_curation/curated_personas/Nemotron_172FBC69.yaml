  career_goals: William dreams of a career that lets him work with a team to help his community and stay active outdoors. He wants to become a firefighter because he admires the structure, clear protocols,
    and teamwork involved, and he also imagines studying engineering later to design tools that make emergency work safer. He is open to exploring other public‑service roles such as a park ranger or a community
    emergency volunteer, reflecting his practical mindset and desire to make a tangible impact.
