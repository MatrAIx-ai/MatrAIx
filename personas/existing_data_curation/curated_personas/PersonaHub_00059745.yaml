persona_description: A scientist and researcher interested in the application of magnetoelectric sensors for biomedical diagnostics. This person is particularly interested in the ability of these sensors
  to detect small magnetic fields at low frequencies and their potential applications in detecting the proliferation of cells in 3D printed biomaterials, the testing of the homing capability of magnetically
  labelled macrophages to tumour sites, and the determination of the binding state of superparamagnetic iron oxide nanoparticles (SPIO-NPs). This individual is knowledgeable in the use of magnetorelaxometry
  (MRX) to differentiate between bound and unbound SPIO-NPs and has a keen interest in the development of sensors that can accurately measure magneto relaxation.
