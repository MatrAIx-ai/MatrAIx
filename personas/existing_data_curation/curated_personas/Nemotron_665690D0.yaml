personas:
  professional: Micah Richards, a seasoned customer support specialist with deep expertise in Zendesk and Salesforce, combines methodical problem‑solving, empathetic listening, and meticulous documentation
    to mentor new hires and drive workflow improvements while eyeing a supervisory role after completing a Business Administration degree.
  sports: Micah Richards, an avid hiker and mountain biker who trains with the Boise Trail Riders club, follows the Boise State Broncos football team and the Seattle Seahawks, and spends summer weekends
    trail‑running in the Sawtooth Range to maintain fitness.
  arts: Micah Richards, a woodworking enthusiast who enjoys listening to The Avett Brothers and Bruce Springsteen, regularly visits the Boise Art Museum, admires craftsmanship at local fairs, and appreciates
    documentary storytelling from Ken Burns, all of which shape his creative outlook.
  travel: Micah Richards, who meticulously plans road‑trip itineraries to remote natural sites, has explored Yellowstone, Glacier National Park, and New Zealand’s South Island, and hopes to trek the Torres
    del Paine in Patagonia while balancing weekend time constraints.
  culinary: Micah Richards, a competent home cook who relishes pan‑seared rainbow trout with fresh lemon and herbs, hearty Idaho potato soup, and hand‑crafted sourdough bread, frequently incorporates locally
    sourced mushrooms and alpine cheese into meals and enjoys occasional craft‑brew tasting at Boise’s breweries.
  core: Micah Richards blends methodical curiosity with practical hands‑on pursuits, balancing a structured work ethic and community involvement with solo outdoor adventures, occasional indulgences, and
    a habit of meticulously planning every facet of life while sometimes procrastinating on paperwork.
background:
  cultural: Micah was raised in a middle‑class, predominantly white family in the Boise metropolitan area, where a blend of western frontier pragmatism and Pacific Northwest community values shaped his
    outlook. The regional culture emphasized self‑reliance, respect for the outdoors, and a courteous, down‑to‑earth demeanor. These influences fostered his practical curiosity, methodical work ethic, and
    balanced social approach, while his exposure to local traditions—such as seasonal festivals, outdoor recreation, and a strong volunteer spirit—continues to inform his personal and professional identity.
