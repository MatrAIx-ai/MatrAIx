  career_goals: Micah aims to move into a supervisory or team‑lead role within the next two years, leveraging his organizational strengths to drive higher customer satisfaction scores. He plans to complete
    his bachelor's degree in Business Administration, focusing on operations management, to qualify for a future position overseeing customer experience strategy or quality assurance. Long‑term, he aspires
    to contribute to company‑wide initiatives that integrate technology and customer feedback to enhance service delivery, while also maintaining a balanced work schedule that supports his personal interests.
