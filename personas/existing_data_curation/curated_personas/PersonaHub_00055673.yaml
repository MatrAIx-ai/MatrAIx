persona_description: A cancer researcher and geneticist at the Siteman Cancer Center at the School of Medicine and Barnes-Jewish Hospital. Mardis and her colleagues have made significant contributions to
  the field of cancer genetics by sequencing the entire genome of tumour cells from more than 700 cancer patients. They have identified genetic mutations underlying each patient's cancer and used this information
  to reclassify tumours based on their genetic makeup rather than their location in the body. Mardis has predicted that it may require a paradigm change for oncologists to evaluate the potential benefits
  of individualized cancer therapy.
