personas:
  professional: Marco Nunez is a seasoned vehicle‑cleaning specialist at a regional logistics hub, leveraging his meticulous routine, OSHA‑savvy safety practices and hands‑on mechanical curiosity to keep
    fleets spotless while quietly training new crew members, and he aims to move into a supervisory role that lets him blend his methodical approach with his desire for predictable, steady work.
  sports: Marco Nunez enjoys early‑dawn fishing on the Columbia River and weekend hikes on the Plateau, while cheering on the Seattle Seahawks and Seattle Mariners from his garage, and he stays fit by maintaining
    a routine of light strength work and occasional bike rides rather than organized team sports.
  arts: Marco Nunez finds artistic solace in the rhythmic hum of his workshop, listening to classic rock icons like Tom Petty and folk legends such as Bob Dylan while shaping wood, and he occasionally enjoys
    live mariachi performances at neighborhood festivals and re‑watching classic westerns starring John Wayne.
  travel: Marco Nunez prefers low‑key road trips in his 1974 Chevrolet Impala, mapping out a relaxed itinerary that includes a weekend fishing stop at Lake Chelan, a sunset hike in the Columbia River Gorge,
    and a family reunion in San Antonio, while keeping an eye on fuel costs and a modest vacation budget.
  culinary: Marco Nunez enjoys preparing homemade tacos with freshly ground carne asada, hand‑rolled corn tortillas, cilantro and lime, as well as grilling salmon seasoned with black pepper and dill, and
    he often caps his weekend meals with a pot of classic chicken tortilla soup.
  core: Marco Nunez is a methodical, solitude‑loving craftsman who blends routine‑driven vehicle cleaning with a quiet passion for classic cars, fishing, and simple, hearty meals, all while balancing a
    relaxed approach to obligations and a steady eye on financial stability.
background:
  cultural: Marco comes from a white Hispanic background; his parents immigrated from Mexico and settled in Pasco, where they integrated into the broader white‑American community while preserving elements
    of their Mexican heritage. He grew up speaking both English and some Spanish, celebrating holidays such as Día de los Muertos and enjoying family meals of tacos, tamales, and other traditional dishes.
    The working‑class, blue‑collar culture of the Pacific Northwest, combined with his family's emphasis on hard work, practicality, and routine, has shaped his values and outlook. While he identifies primarily
    with mainstream American norms, he retains an appreciation for his Latino roots, especially through food and occasional community celebrations.
attributes:
  skills: '["Vehicle detailing", "Heavy-equipment sanitation", "Pressure washing", "Chemical safety handling", "OSHA compliance", "Basic mechanical troubleshooting", "Inventory management", "Quality control
    inspection", "Team training", "Routine maintenance scheduling"]'
  hobbies: '["Fishing", "Woodworking", "Classic car restoration", "Hiking", "Reading automotive repair manuals", "Model kit building"]'
  career_goals: Marco plans to advance from a hands‑on cleaner to a supervisory position within the next few years. He intends to earn certification in environmental health and safety for the cleaning industry
    and take on responsibilities such as scheduling, quality‑assurance oversight, and training a small team. In the longer term, he hopes to open his own vehicle‑cleaning service that contracts with local
    trucking firms, allowing him to apply his routine‑focused work style while achieving financial stability and a predictable schedule.
