  career_goals: Micheal aims to finish his high school education and then enroll in a vocational program focused on automotive technology or electromechanical trades, seeking a stable, hands‑on career that
    offers clear, tangible outcomes. He also dreams of playing basketball at the collegiate level, with a long‑term goal of becoming a coach or youth trainer in his community. Combining his technical expertise
    with his passion for sports, he envisions opening a small community space that offers both sports mentorship and basic repair services for local residents.
