personas:
  professional: Micheal Denson, a 15-year-old high school sophomore who balances schoolwork with a budding side-gig creating custom gaming controllers and posting short tech-fix videos on TikTok, leveraging
    their routine-driven approach and competitive edge to build a small online following.
  sports: Micheal Denson dominates the after-school pick-up basketball scene at the Amityville Community Park, idols the gritty play of the New York Knicks and follows the high-school Amityville Griffins,
    while also competing in online esports tournaments on the side.
  arts: Micheal Denson's artistic outlet centers on curating short, rhythm-driven TikTok clips set to tracks by J. Cole, H.E.R., and classic Miles Davis, and they regularly attend local open-mic nights
    where they soak in live jazz and neo-soul performances that echo the soulful playlists from their church youth group.
  travel: Micheal Denson dreams of swapping the familiar streets of Long Island for a jazz-filled weekend in New Orleans, yet currently budgets for annual trips to the nearby beaches of Fire Island and
    occasional visits to Manhattan to catch a Knicks game or a Broadway preview, balancing limited family funds with a love for cultural exploration.
  culinary: Micheal Denson experiments in the kitchen by mastering family-style mac 'n' cheese with pepper jack and crispy fried chicken seasoned with garlic and paprika, often tossing in collard greens
    and cornbread on the side, while still relying on instant ramen for late-night study sessions.
  core: Micheal Denson is a routine-loving, competitively spirited teen who juggles basketball, gaming, DIY tech projects, and soulful music, all while navigating the challenges of teenage health, finances,
    and a yearning for broader cultural experiences.
background:
  cultural: Micheal is an African‑American teenager raised in Amityville, New York, within a close‑knit family that emphasizes community, perseverance, and cultural expression. His upbringing includes regular
    participation in church youth groups, family gatherings featuring soul food and storytelling, and exposure to a blend of contemporary hip‑hop, R&B, and classic jazz that shape his musical tastes. The
    local African‑American community’s focus on mutual support and mentorship influences his sense of responsibility and his desire to give back through sports and community service.
attributes:
  skills: '[''Team coordination'', ''Basic computer troubleshooting'', ''Introductory automotive maintenance'', ''Social media content creation'', ''Time management'', ''Organizing group events'']'
