  hobbies: '[''Reading science‑fiction'', ''Woodworking'', ''Hiking'', ''Birdwatching'', ''Landscape photography'', ''Model train building'', ''Raspberry Pi tinkering'', ''Chess club'', ''Small‑group tech
    meetups'', ''Community tech tutoring'']'
  career_goals: As he approaches retirement, Austin aims to transition into a part‑time advisory role, mentoring junior engineers and guiding small‑to‑mid‑size businesses in secure digital transformation.
    He plans to obtain a CISSP certification to formalize his security expertise and hopes to publish a practical guide on legacy system migration for regional healthcare providers. Additionally, he aspires
    to volunteer his time with local non‑profits to teach basic computer skills, while maintaining a consultancy portfolio that allows him to stay engaged with cutting‑edge technology on a manageable scale.
