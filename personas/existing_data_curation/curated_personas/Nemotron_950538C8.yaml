personas:
  professional: Austin Lister, a veteran IT systems architect with 35 years of experience in network security and cloud migration, leverages their methodical, curiosity-driven approach to design reliable,
    secure infrastructures while mentoring junior engineers and drafting practical guides for healthcare providers.
  sports: Austin Lister, a loyal fan of the Philadelphia Eagles and Phillies, spends weekends hiking the Appalachian Trail with the Harrisburg Outdoor Club, occasionally joins a pick-up basketball game
    at the community center, and they maintain a steady cardio routine by walking their dog along the Susquehanna River trail.
  arts: Austin Lister finds quiet inspiration in the landscape photography of Ansel Adams, the classic sci-fi novels of Isaac Asimov, and the folk melodies of James Taylor, frequently attending the local
    community theater’s seasonal productions of Shakespeare while they curate a modest collection of vintage 1970s vinyl records.
  travel: Austin Lister favors thoughtful, low-key travel, planning spring weekend getaways to historic sites like Gettysburg and the Blue Ridge Parkway, and they dream of a summer road trip across the
    Pacific Northwest to explore Olympic National Park after retirement.
  culinary: Austin Lister enjoys preparing hearty, home-cooked meals such as herb-roasted chicken, Dutch-style apple pie, and a seasonal grilled trout dish seasoned with fresh dill and lemon, and while
    their cooking skill is solid, they occasionally splurge on a Saturday night dinner at a classic steakhouse to unwind.
  core: Austin Lister is a methodical, curiosity-driven former IT architect who blends a love of legacy system migrations with solitary pursuits like model-train building, birdwatching, and a penchant for
    meticulously planned weekend hikes, and they often reflect on the quiet satisfaction of well-ordered systems.
background:
  cultural: Austin was raised in a middle‑class, predominantly white suburb of Harrisburg, Pennsylvania, in a family that valued steady work, education, and community involvement. His upbringing reflected
    the practical, self‑reliant ethos of the region’s industrial and agricultural heritage, with an emphasis on modesty and reliability. He grew up celebrating traditional American holidays and participating
    in local civic events, while also being influenced by the broader American culture of technological advancement. This blend of regional tradition and a lifelong curiosity about computers shapes his
    respectful yet forward‑looking outlook.
attributes:
  skills: '[''System Architecture'', ''Network Security'', ''Legacy System Migration'', ''Cloud Computing (AWS)'', ''Database Design'', ''Python Programming'', ''Java Development'', ''C++ Programming'',
