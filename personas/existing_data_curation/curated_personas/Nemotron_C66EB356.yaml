personas:
  professional: Casey Everts, a budding junior marine explorer and kindergarten student, blends a keen curiosity for tide pools with practical problem‑solving by building LEGO submarines and documenting
    shell collections, while they enjoy a relaxed approach that lets them switch freely between structured classroom tasks and spontaneous beach investigations.
  sports: Casey Everts dives into the local YMCA swim team with a mix of enthusiasm and laid‑back timing, and they love cheering for the New Orleans Saints during family Saturday football gatherings, and
    they also participate in the Fairhope Little League baseball practice, preferring unstructured beach sandcastle contests over rigid drills.
  arts: Casey Everts immerses in storytelling at the Fairhope public library, crafts sea‑shell collages and watercolor scenes of marshes, and they sing along to Raffi and The Wiggles during playdates, showcasing
    a proud collection of hand‑drawn illustrations of crabs, embodying a cooperative yet assertive creative spirit.
  travel: Casey Everts loves spontaneous family trips to Gulf Shores for sandcastle building, cherishes day outings to the Baldwin County Fair for cotton‑candy and rides, and they dream of visiting the
    Everglades National Park to spot alligators, balancing a love of familiar beach retreats with an adventurous curiosity about new natural wonders.
  culinary: Casey Everts delights in the crispy bite of fried catfish, sips sweet tea (with a hint of honey) at family picnics, builds PB&J sandwiches with extra grape jelly, and they often ask for a sprinkle
    of crushed crackers on macaroni and cheese for extra crunch.
  core: Casey Everts is a curiosity‑driven six‑year‑old who mixes beach adventures with LEGO engineering, saves allowance haphazardly for toys, handles minor allergies with a playful chart, and balances
    energetic sports with quiet art, and they never miss a chance for sweet tea.
background:
  cultural: Casey grows up in the coastal town of Fairhope, Alabama, a community known for its Southern hospitality, close‑knit neighborhoods, and proximity to the Gulf of Mexico. Her family celebrates
    traditional holidays such as Thanksgiving, Christmas, and Easter with church gatherings and community events like the annual Baldwin County Fair. She attends a local elementary school where story‑time
    at the public library and after‑school arts programs are common. Her upbringing includes exposure to regional foods like fried catfish and sweet tea, as well as outdoor activities such as beach outings,
    fishing trips, and participation in church‑based youth groups. These experiences blend a modest, community‑focused Southern culture with an appreciation for nature and the arts.
