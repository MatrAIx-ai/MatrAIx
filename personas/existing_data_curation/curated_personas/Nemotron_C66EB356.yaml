  hobbies: '[''Collecting seashells'', ''Reading picture books'', ''Drawing and painting'', ''Building LEGO models'', ''Swimming at the community pool'', ''Pretend veterinary play'', ''Singing and dancing
    to music'', ''Exploring nature in local parks'']'
  career_goals: Even at six, Casey imagines future paths that combine her love of animals, nature, and helping others. She often says she wants to be a veterinarian to care for pets, or a marine biologist
    to study the Gulf Coast’s marine life. She also enjoys the idea of becoming a teacher one day, sharing stories and knowledge with younger children. Her ambitions balance her natural curiosity with a
    practical desire to make a positive difference.
