persona_description: A scientist or engineer specializing in coal processing technology, particularly in the areas of flotation, heavy medium separation, and coal washing. They are interested in establishing
  the maximum possible separation performance for a given coal feed and optimizing the performance of commercial coal washing plants through the use of online analyzers. They have experience with laboratory
  flotation tests, pilot plant studies, and research on the breakage characteristics of coal and stone. They are familiar with the basic principles of coal preparation and the importance of clean coal in
  metallurgical applications.
