personas:
  professional: Maria Miranda, a 44‑year‑old full‑stack web developer with a flair for digital storytelling, blends React‑driven UI craftsmanship, bilingual content localization, and a muralist‑inspired
    visual aesthetic while navigating project leadership ambitions amid a relaxed, sometimes disorganized work rhythm.
  sports: Maria Miranda fuels physical release by hiking the Laguna Beach Trail and occasional sunrise runs with the San Diego Hiking Club, while cheering on the San Diego Wave FC and the Padres, embracing
    a flexible fitness routine that balances solo trail time with low‑key team spirit.
  arts: Maria Miranda spends evenings sketching vibrant canvases influenced by Diego Rivera and contemporary street artists, frequents the Museum of Contemporary Art San Diego for Latin American exhibitions,
    and curates playlists that juxtapose Iron & Wine with modern mariachi reinterpretations, weaving visual and auditory inspirations into her creative workflow.
  travel: Maria Miranda prefers low‑key, culturally immersive trips like solo explorations of Oaxaca’s markets, weekend getaways to Santa Barbara’s coastal towns, and purposeful travel to community art
    residencies in Barcelona, planning loosely to allow spontaneous studio sessions and remote coding sprints.
  culinary: Maria Miranda experiments with Mexican‑fusion dishes such as citrus‑marinated fish tacos with avocado‑lime salsa and kale‑enhanced chilaquiles, deftly combining fresh Californian produce with
    traditional spices, yet sometimes lets pantry staples expire because their flexible schedule forgets regular grocery trips.
  core: Maria Miranda is a curious, art‑driven technophile whose competitive streak fuels ambitious web projects, while a lingering worry habit and occasional disorganization color their daily rhythm with
    both creative bursts and scattered moments.
background:
  cultural: Maria is a second‑generation Mexican‑American raised in a bilingual household in Southern California. Her parents instilled a strong sense of cultural pride through traditional celebrations
    like Día de los Muertos, family gatherings centered around homemade tamales, and storytelling that linked her to Mexican folklore. Fluent in both Spanish and English, she navigates two cultural spheres,
    often acting as a cultural bridge in professional settings. Her upbringing in a vibrant Mexican community exposed her to muralism, folk crafts, and the rhythms of regional music, all of which inform
    her aesthetic sensibility. While she values her individual ambitions, she remains aware of collective narratives, using her web development expertise to amplify Mexican artistic voices online. This
    bicultural perspective also sharpens her critical eye, prompting her to question mainstream representations and champion authentic, inclusive storytelling.
