  skills: '[''HTML5'', ''CSS3'', ''JavaScript (ES6+)'', ''React'', ''Vue'', ''Node.js'', ''RESTful API design'', ''Responsive web design'', ''Accessibility (WCAG) compliance'', ''Bilingual content localization
    (Spanish/English)'', ''Digital storytelling'', ''UI/UX critique'', ''Git version control'', ''Adobe Photoshop'', ''Figma'']'
  hobbies: '[''Sketching and painting'', ''Visiting local art galleries'', ''Cooking Mexican fusion cuisine'', ''Reading contemporary Latin American literature'', ''Participating in hackathons'', ''Exploring
    indie music'', ''Practicing yoga and meditation'', ''Hiking in San Diego County'', ''Developing personal web art projects'', ''Collecting vintage Mexican posters'']'
  career_goals: In the short term, Maria aims to earn a professional certification in cloud‑native architecture (AWS or GCP) and lead a small, agile team on a culturally focused web platform that showcases
    emerging Mexican artists. She wants to sharpen her project‑leadership abilities while maintaining the flexibility she values, preferring remote or hybrid work that lets her manage her schedule. Long‑term,
    Maria aspires to become a senior full‑stack architect or technical director for a startup devoted to preserving and sharing Latino heritage through interactive digital experiences. She envisions launching
    a consultancy that advises small cultural institutions on inclusive, accessible web design, and mentoring other women of color in tech to expand representation. Balancing her competitive drive, she
    seeks measurable impact—such as increasing user engagement on cultural sites by 30%—while developing personal strategies to mitigate stress and improve organization.
