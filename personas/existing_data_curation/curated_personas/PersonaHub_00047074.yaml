persona_description: A healthcare professional who specializes in the diagnosis and treatment of aneurysms, particularly those in the aorta, brain, and other major blood vessels. They work closely with
  patients to monitor and manage their condition, often requiring regular checkups and potentially undergoing surgery to reinforce the artery wall with a stent or perform a coiling procedure to close off
  the area. They are likely to have a deep understanding of the causes, symptoms, diagnosis, and treatment of aneurysms, and are trained to recognize and manage them effectively.
