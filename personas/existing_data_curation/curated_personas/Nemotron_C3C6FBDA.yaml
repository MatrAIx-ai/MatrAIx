personas:
  professional: Deja Belizaire is a full‑stack software engineer proficient in Python, React, and AWS who blends a methodical, Agile‑driven workflow with charismatic mentorship, leading community meetups
    and translating complex technical concepts into relatable stories for diverse audiences, and they excel at turning code into community impact.
  sports: Deja Belizaire cheers for the Atlanta Falcons and Hawks, plays weekly pick‑up soccer with a local community league, hikes the trails of Stone Mountain on weekends, and they incorporate daily yoga
    sessions to balance a competitive drive with holistic fitness.
  arts: Deja Belizaire immerses herself in Atlanta’s live‑music scene, singing karaoke to H.E.R. and John Legend, performing improv with a downtown troupe, and they photograph downtown skylines inspired
    by Ansel Adams while curating playlists that blend soulful jazz with modern R&B.
  travel: Deja Belizaire prefers meticulously planned short‑haul trips, having explored New Orleans for its culinary roots, Asheville’s mountain retreats, and Washington D.C.’s historic sites, while they
    pin Barcelona and Lagos on a future bucket list, always balancing travel costs with career ambitions.
  culinary: Deja Belizaire’s kitchen showcases Southern comfort—perfectly seasoned collard greens, sweet‑potato pie spiced with cinnamon and nutmeg, and a signature hot‑sauce‑infused gumbo—and they cook
    at an intermediate level, yet still love trying new brunch tacos and experimenting with jalapeño‑cheddar biscuits.
  core: Deja Belizaire is a socially magnetic tech leader who merges structured engineering precision with a vibrant love for Southern storytelling, balancing ambition with a tendency to over‑commit and
    a habit of nightly karaoke to unwind, and they thrive on community connection.
background:
  cultural: Deja Mae grew up in a close‑knit African American family in the Atlanta metropolitan area, absorbing the rich traditions of Southern Black culture. She maintains strong ties to her church community
    and participates in local cultural festivals that celebrate Black heritage. Her upbringing instilled a deep appreciation for storytelling, music, and food—elements she weaves into her daily life. Professionally,
    she aligns with regional Black tech networks such as AfroTech and the Georgia Black Tech Alliance, advocating for greater representation and equity in the tech industry. Her cultural identity informs
    both her career ambitions and her commitment to uplifting her community.
