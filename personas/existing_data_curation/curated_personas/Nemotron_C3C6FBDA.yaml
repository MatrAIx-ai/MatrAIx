  career_goals: Deja Mae aims to advance into a senior engineering leadership role within the next five years, targeting positions such as Lead Engineer or Engineering Manager where she can shape product
    strategy and cultivate high‑performing teams. She aspires to obtain a PMP certification and eventually transition to a CTO role, with a long‑term vision of launching a tech consultancy focused on digital
    equity for underrepresented communities in the Southeast. She is also passionate about creating a community coding bootcamp for Black youth in Decatur, leveraging her network to bridge the tech talent
    pipeline.
