  career_goals: Stacy aspires to combine her love for art, technology, and structured problem‑solving by pursuing a career in user‑experience (UX) design or architectural design. She aims to earn a scholarship
    to a top‑ranked high school with a strong STEM and visual‑arts program, then study industrial design or architecture at a university known for interdisciplinary innovation. She dreams of leading a design
    team that creates functional spaces and digital products that are both aesthetically striking and highly intuitive. In the short term, she plans to win a state‑level science‑fair competition with a
    project that integrates interactive media and environmental sustainability, and she hopes to secure leadership roles in her school’s robotics and art clubs.
