personas:
  professional: Stacy Hill, an aspiring young technologist and digital illustrator, blends her curious love for sci‑fi storytelling with disciplined organization by creating Python‑driven interactive art
    projects for the school robotics club, meticulously planning each pixel and circuit like a chess opening before sharing her work on an online portfolio.
  sports: Stacy Hill, an enthusiastic hiker who belongs to the Stone Mountain Trail Club and follows the Atlanta Braves and Atlanta Falcons, spends weekends trekking the park’s rocky paths while listening
    to indie folk playlists, and practices yoga to stretch after long photo shoots, treating each ascent as a personal challenge.
  arts: Stacy Hill, a passionate digital illustrator, draws inspiration from the kinetic installations of Yayoi Kusama, the narrative superhero art of Alex Ross, and the atmospheric world‑building of Hayao Miyazaki’s
    Studio Ghibli, while capturing street‑level moments with her vintage Leica M3 and regularly sketching in the High Museum of Art to refine her composition skills.
  travel: Stacy Hill, an adventurous teen who has explored the historic streets of Savannah, hiked the peaks of Stone Mountain, and dreams of visiting Tokyo’s neon districts and attending sci‑fi conventions
    in Seattle, crafts meticulously detailed itineraries that balance a modest budget with a craving for immersive cultural experiences.
  culinary: Stacy Hill, a self‑taught home chef, loves whipping up creamy mac and cheese with smoked paprika, mastering vegan ramen bowls with miso broth, and experimenting with flaky croissants, while
    her go‑to comfort snack remains a warm slice of banana bread topped with almond butter.
  core: Stacy Hill, a meticulous 13‑year‑old dreamer, navigates life with a blend of artistic curiosity, disciplined ambition, competitive spirit, and a tendency to worry over every detail, often retreating
    into sketchbooks or code when stress spikes.
background:
  cultural: Stacy was raised in a suburban neighborhood of Fulton County, Atlanta, where Southern hospitality blends with the city’s multicultural vibrancy. Her family, of European ancestry, values education,
    community involvement, and maintains traditions such as family barbecues, holiday gatherings, and church attendance. Growing up in a diverse urban environment, she has been exposed to a wide range of
    cultural experiences—from the historic civil‑rights sites of Atlanta to contemporary art festivals and a variety of cuisines. This mix of Southern roots and exposure to a broader, progressive cultural
    scene nurtures her open‑mindedness, curiosity about new ideas, and appreciation for both traditional and unconventional expressions of art.
