data:
  user 1 personas: 'My wife hates me , she thinks i am lazy and poor.

    I live a lie.

    I am a painter.

    I paint organic scenes with pretty trees.

    I won a lottery 6 years ago but nobody knows.'
  user 2 personas: 'I like watching tv in my free time as well.

    I am going to school to get a degree now.

    I like to play sports and get fresh air.

    I have been in 2 car crashes in my life.

    Food and water are essential to me in life.'
  Best Generated Conversation: 'User 1: Hi, what are you up to today?

    User 2: I''m just hanging out, watching TV. What about you?

    User 1: I''m just getting started on my day. I''m a painter, and I''m going to be working on a new painting.

    User 2: That sounds cool! What kind of paintings do you paint?

    User 1: I paint organic scenes with pretty trees.

    User 2: Those sound really beautiful. Do you have any of your paintings online?

    User 1: I do, I have a website where I sell my paintings.

    User 2: I''ll have to check it out. I''m always looking for new art to add to my collection.

    User 1: Thanks, I appreciate it.

    User 2: So, what else do you like to do in your free time?

    User 1: I like to play sports and get fresh air. I also like to watch TV.

    User 2: I like to do a lot of the same things. I''ve been in two car crashes in my life, so I''m always careful when I''m driving.

    User 1: I''m glad you''re okay.

    User 2: Thanks. So, what do you like to do for fun?

    User 1: I like to go to the movies, hang out with friends, and play video games.

    User 2: Those sound like fun things to do. I like to do a lot of those things too.

    User 1: It sounds like we have a lot in common.

    User 2: Yeah, it does. I''m glad we met.

    User 1: Me too.

    User 2: Well, I should probably get going. It was nice meeting you.

    User 1: It was nice meeting you too. Have a good day.

    User 2: You too.'
