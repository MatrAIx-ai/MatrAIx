  career_goals: Steven aspires to become an engineer—preferably a mechanical or aerospace engineer—who designs innovative machines. He dreams of working on robots or spacecraft, valuing a career that offers
    clear structures, problem‑solving challenges, and measurable progress. He also hopes to attend a university with strong STEM programs and to win science fair competitions.
