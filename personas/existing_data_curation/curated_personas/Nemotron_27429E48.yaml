personas:
  professional: Steven Lavernia is a budding junior coder who builds intricate LEGO Technic models, solves Rubik's cubes, and competes in youth chess tournaments, applying a methodical, structured approach
    that mirrors their knack for planning and reliability.
  sports: Steven Lavernia is an avid, albeit casual, hiker who explores the Rocky Mountains on weekend treks with a close-knit group, cheering on the Colorado Rockies baseball team and the Denver Broncos
    football team while maintaining a disciplined fitness routine that includes daily bodyweight exercises.
  arts: Steven Lavernia immerses themselves in science-fiction soundtracks, citing Hans Zimmer's score for Interstellar and the animated series Star Wars Rebels as inspiration for their LEGO builds, while
    also enjoying the intricate visuals of Rubik's cube tutorial videos by Feliks Zemdegs.
  travel: Steven Lavernia prefers meticulously planned mini-adventures, such as a day-trip to Rocky Mountain National Park's Bear Lake and a family vacation to Washington, D.C.'s National Air and Space
    Museum, always packing a checklist and saving allowance for the next hike or space-camp experience.
  culinary: Steven Lavernia favors simple yet protein-rich meals like turkey and cheese wraps and spaghetti with meatballs, often snack-curating LEGO-themed gummy bears while they code, and they pride themselves
    on mastering the perfect boiled egg - a skill that satisfies their love for precision.
  core: Steven Lavernia is a meticulously organized 11-year-old with a competitive edge, who channels their love for structure into LEGO, chess, coding, and carefully saved allowance, while occasionally
    neglecting sleep for extra practice.
background:
  cultural: Steven is a white, middle‑class boy from Lafayette, Colorado, a small town on the edge of Boulder County. His family’s cultural roots trace back to Mid‑western American and Northern European
    ancestry. Growing up in a community that values outdoor recreation, academic achievement, and community service, he celebrates typical American holidays like Thanksgiving and Fourth of July, and participates
    in local events such as the Lafayette Farmer’s Market. The region’s emphasis on environmental stewardship and a pragmatic work ethic has shaped his practical, structured worldview.
