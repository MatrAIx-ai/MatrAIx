personas:
  professional: Tracey Deptula, an 11‑year‑old budding engineer, channels a love for structure and detail into building complex LEGO constructions and designing virtual worlds in Minecraft, showing early
    aptitude for spatial reasoning and systematic problem‑solving.
  sports: Tracey Deptula plays forward for the Scottsdale Youth Soccer Club, eagerly joins weekend hikes through the Sonoran Desert with their family, and occasionally practices yoga at home to maintain
    flexibility, balancing competitive spirit with a love for nature.
  arts: Tracey Deptula immerses themselves in mystery novels like "The Westing Game", sketches street scenes inspired by the works of Studio Ghibli animator Hayao Miyazaki, and listens to pop hits from
    Billie Eilish while building LEGO, blending literary, visual, and musical influences into a vibrant creative outlet.
  travel: Tracey Deptula enjoys family road trips to Sedona’s red rocks, weekend camping in the Grand Canyon, dreams of exploring the coral reefs of Belize, and prefers meticulously planned itineraries
    with scheduled rest stops, reflecting their structured yet adventurous nature.
  culinary: Tracey Deptula experiments in the kitchen by baking chocolate chip cookies, mastering banana muffins, and assembling avocado toast with a dash of lime, often drafting step‑by‑step recipe cards
    that mirror their love for organization.
  core: Tracey Deptula is a calm, organized 11‑year‑old who thrives on building, planning, and helping others, yet secretly hoards leftover LEGO bricks for late‑night creations.
background:
  cultural: Tracey was raised in a middle‑class, predominantly white family in Laveen, a suburban community on the outskirts of Phoenix, Arizona. Her upbringing blends typical American cultural traditions—such
    as celebrating Thanksgiving, Independence Day, and school events—with the unique flavors of the Southwest desert environment, including outdoor activities like hiking and community farmer’s markets.
    The neighborhood places a strong emphasis on neighborly cooperation, school involvement, and volunteerism, which aligns with her harmonious and responsible personality.
