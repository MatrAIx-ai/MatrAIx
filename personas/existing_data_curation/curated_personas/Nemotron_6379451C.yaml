  career_goals: Looking ahead, Tracey aspires to work in a setting that blends structure, care, and community impact. She aims to become an elementary school teacher, where she can create calm, orderly
    classrooms and support students’ learning and well‑being. Over time she hopes to expand her role into school leadership or counseling, leveraging her resilience and cooperative nature to foster a harmonious
    school environment.
