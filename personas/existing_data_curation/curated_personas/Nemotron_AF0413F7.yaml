  hobbies: '[''Reading educational psychology books'', ''Playing chess'', ''Running'', ''Cooking Mexican cuisine'', ''Hiking in the San Bernardino mountains'', ''Volunteering at local youth centers'', ''Listening
    to Latin music'', ''Creating educational videos'', ''Practicing photography'']'
  career_goals: Santa aims to complete his bachelor's degree in Education and obtain California teaching credentials within the next two years. His long‑term ambition is to become a certified bilingual
    teacher, eventually advancing to a program coordinator role where he can design and implement bilingual curricula across the district. He is also interested in pursuing a Master's in Educational Leadership
    to influence policy and support underserved students in the Rancho Cucamonga area, while maintaining a reputation for high professional standards and innovative, practical teaching practices.
