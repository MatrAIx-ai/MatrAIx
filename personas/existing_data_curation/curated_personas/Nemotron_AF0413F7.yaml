personas:
  professional: Santa Gutierrez, a 21‑year‑old aspiring bilingual teacher, blends meticulous lesson‑plan organization with a curiosity for innovative instructional design, leveraging bilingual fluency and
    data‑driven assessments to craft inclusive classrooms while confidently asserting high standards in student mentorship.
  sports: Santa Gutierrez runs five miles each sunrise, participates in the Rancho Cucamonga Running Club, lifts weights at a local gym, follows the Los Angeles Dodgers during baseball season, and hikes
    the San Bernardino peaks on weekends, balancing structured training with seasonal outdoor enthusiasm.
  arts: Santa Gutierrez relaxes by streaming Latin pop icons like Bad Bunny and traditional Mariachi ensembles, attends Pomona Arts Center exhibitions, and produces short educational videos edited with
    Adobe Premiere, letting the rhythm of music and visual storytelling shape their creative outlet.
  travel: Santa Gutierrez dreams of a spring trek to Oaxaca’s Monte Albán after weekend escapes to Joshua Tree National Park, plans itineraries with budget‑tracking apps, prefers immersive cultural experiences
    over luxury, and balances travel aspirations with the financial realities of a burgeoning teaching career.
  culinary: Santa Gutierrez enjoys cooking homestyle pozole and tamales using fresh corn masa, poblano chiles, and queso fresco, experiments with mole sauce on weekends, but often over‑spices dishes in
    the pursuit of authentic flavor, reflecting a disciplined yet adventurous culinary approach.
  core: Santa Gutierrez is a color‑coded planner‑obsessed future teacher who runs at dawn, mentors peers, and can’t resist a good cup of cinnamon‑spiced coffee before a lesson plan.
background:
  cultural: Santa is a second‑generation Mexican‑American who grew up in a bilingual household in Southern California. He celebrates Mexican traditions such as Día de los Muertos and Cinco de Mayo, while
    also embracing the diverse cultural landscape of Rancho Cucamonga. His family places a strong emphasis on education, community, and respect for heritage, which informs his inclusive teaching philosophy
    and his commitment to supporting bilingual learners.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Bilingual instruction (Spanish/English)'', ''Curriculum development'', ''Educational technology integration'', ''Data-driven assessment'', ''Public
