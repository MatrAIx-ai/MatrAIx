personas:
  professional: Angelite Edmonds, a four‑year‑old budding storyteller, turns everyday playtime into imaginative narratives, weaving in rhythmic chants from church gatherings and the vivid colors of family
    reunions, while their emerging organizational skills keep storybooks neatly arranged for impromptu performances.
  sports: Angelite Edmonds, a four‑year‑old firecracker, spends weekends flicking a soft baseball in the community park's tee‑ball league, proudly wears a tiny Tennessee Titans jersey, cheers for the Memphis
    Grizzlies on family movie nights, and is a budding member of the Horn Lake Little Sprouts Soccer Club that meets every Saturday.
  arts: Angelite Edmonds delights in belting out gospel hymns from Sunday services, mimicking Beyonce’s choreography during dance time, and filling sketchbooks with bright crayon renditions of Dr. Seuss
    characters and scenes from Lin‑Manuel Miranda’s musical ‘In the Heights’.
  travel: Angelite Edmonds loves family road trips that whisk them to the blues‑filled streets of Memphis, especially Beale Street’s music scene, and they day‑dream about waving at Mickey Mouse at Disney
    World in Orlando, while eagerly clutching the seashell collected during a recent Gulf Coast beach outing.
  culinary: Angelite Edmonds, a tiny kitchen helper, relishes scooping buttery mashed sweet potatoes onto plates, sprinkling cinnamon sugar on fresh biscuits, and proudly mastering the art of stirring mac and cheese
    until it reaches the perfect creamy glow, all while humming gospel tunes that echo from the family kitchen.
  core: Angelite Edmonds, the four‑year‑old whirlwind of imagination, balances gospel‑filled storytelling, piggy‑bank savings, tiny soccer kicks, and crayon‑splashed art with a resilient heart and a habit
    of humming until bedtime.
background:
  cultural: Angelite is an African American child raised in Horn Lake, DeSoto County, Mississippi, where Southern Black cultural traditions shape her daily life. Her family participates in church gatherings
    rich with gospel music and communal storytelling, fostering her love for singing and narrative imagination. Family meals feature Southern soul food and occasions such as Juneteenth and family reunions
    celebrate heritage, imparting a strong sense of cultural pride and resilience. The close‑knit neighborhood and extended family network encourage her sociable, cooperative nature, while the community’s
    emphasis on respect, responsibility, and mutual support reinforces her balanced blend of compassion and self‑advocacy.
attributes:
  skills: '["Imaginative storytelling", "Creative drawing and coloring", "Block building and simple construction", "Early language development with curiosity-driven questioning", "Basic numeracy (counting
    to 20)", "Cooperative group play", "Following routines and responsibilities"]'
  hobbies: '["Drawing and coloring with crayons and markers", "Building towers and structures with blocks", "Pretend role‑play (teacher, astronaut, storyteller)", "Listening to picture books and storytelling",
    "Singing and dancing to music", "Exploring nature in the backyard (collecting leaves, rocks)", "Participating in group games with peers"]'
  career_goals: Although only four, Angelite dreams big. She often says she wants to become a painter who fills the world with bright colors, a storyteller who shares magical tales, a teacher who helps
    other children learn, or even an astronaut who explores new worlds. She is also drawn to helping people, imagining herself as a caring nurse or community helper who supports her family and neighborhood.
    These aspirations reflect her love of novelty, art, and a desire to make a positive impact.
