personas:
  professional: An established upholstery artisan and small business owner, Jennifer Guzzardo blends meticulous hand-stitched restoration with disciplined project management, leveraging her calm demeanor
    and sociable nature to build a loyal client base among interior designers and historic preservation societies; they channel curiosity into eco-friendly fabric innovations and regularly mentor apprentices
    in her expanding boutique studio.
  sports: Jennifer Guzzardo embraces outdoor fitness through weekly hikes along the Manistee sand dunes and a summer stint with the Manistee Trail Runners club, while passionately cheering for the Detroit
    Lions and the Michigan State Spartans during football season and attending occasional Detroit Red Wings games in the winter.
  arts: Jennifer Guzzardo takes center stage in Manistee's community theater, starring in productions ranging from Arthur Miller's Death of a Salesman to a locally written period piece, while also crafting
    intricate quilts inspired by the patterns of the American Folk Art Museum and restoring vintage chairs with the same reverence she holds for the designs of Charles and Ray Eames; they often integrate
    theatrical lighting techniques into her workshop's ambiance.
  travel: Jennifer Guzzardo favors meticulously planned road trips that blend vintage shopping and natural scenery, having driven historic U.S. Route 66 to explore antique fairs in Oklahoma City, trekked
    the dunes of Indiana Dunes National Park, and spent weekend getaways in Door County, Wisconsin, where they source locally harvested herbs for farm-to-table menus.
  culinary: Jennifer Guzzardo curates farm-to-table feasts that showcase seasonal produce, often serving roasted heirloom beet and carrot salads drizzled with maple-mustard vinaigrette, slow-braised pork
    shoulder glazed with local apple cider, and a signature lavender-honey panna cotta, while their kitchen shelves proudly display jars of home-cured pickles and a well-worn heirloom cast-iron skillet.
  core: Jennifer Guzzardo is a methodical, sociable craftsman whose calm curiosity fuels a thriving upholstery studio, vibrant community theater performances, and weekly vintage-furniture rescues.
background:
  cultural: Jennifer grew up in a middle‑class, white family in a small town near Manistee, Michigan. Her upbringing emphasized hard work, self‑reliance, and community involvement typical of the Upper Midwest.
    Family gatherings often featured hands‑on projects, and she learned basic woodworking and sewing from her grandparents. The region’s strong appreciation for natural resources and seasonal change fostered
    her love of outdoor activities and sustainable practices. While she pursued some college education, she chose a trade path that aligns with the pragmatic, skill‑focused culture of her community, blending
    traditional craftsmanship with modern ecological awareness.
attributes:
  skills: '[''Hand‑stitched upholstery'', ''Custom fabric selection'', ''Period‑accurate furniture restoration'', ''Wood frame repair and carving'', ''Fabric dyeing and textile repair'', ''Sustainable material
    sourcing'', ''Project scheduling and budgeting'', ''Inventory management'', ''Client negotiation'', ''Marketing and branding'', ''Apprentice mentorship'', ''Small‑business accounting'']'
  hobbies: '[''Community theater acting and set design'', ''Vintage furniture hunting'', ''Quilting and textile art'', ''Hiking the Manistee dunes'', ''Gardening and vegetable growing'', ''Farm‑to‑table
    cooking'', ''Hosting dinner parties'', ''Historical society volunteering'', ''DIY home decor projects'']'
  career_goals: Jennifer aims to transform her solo upholstery practice into a boutique studio that serves the broader Great Lakes region. She plans to launch a hands‑on apprenticeship program for aspiring
    craftsmen, publish a guidebook on eco‑friendly upholstery techniques, and develop a signature line of locally sourced, upcycled fabrics. Long‑term, she envisions collaborating with historic preservation
    societies to restore landmark interiors and becoming a recognized authority who speaks at regional trade shows and community events.
