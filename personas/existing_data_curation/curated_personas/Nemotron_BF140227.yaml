  career_goals: John aims to advance to an HR Director or Senior HR Business Partner role within the next five years, focusing on building an inclusive, innovative workplace culture that leverages technology
    and the arts to improve employee well‑being. He plans to earn his SHRM‑SC certification and complete a bachelor’s degree in Business Administration while championing mental‑health initiatives and strategic
    talent analytics for his organization.
