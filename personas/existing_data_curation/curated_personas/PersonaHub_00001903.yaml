persona_description: A geotechnical engineer specializing in the study of ground settlement and tunnel construction. They are responsible for designing and implementing strategies to minimize ground settlement
  during the construction of underground railway crossings. They are aware of the various factors that influence ground settlement, such as tunnel depth, sub-grade soil properties, elasticity modulus, Poisson's
  ratio, and internal friction angle, and have developed numerical simulation methods to simulate these effects. They are likely to be familiar with the principles of soil mechanics, geotechnical engineering,
  and numerical modeling.
