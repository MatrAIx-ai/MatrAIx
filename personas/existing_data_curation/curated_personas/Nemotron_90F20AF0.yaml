personas:
  professional: Rebeca Garcia, a budding digital illustrator and aspiring multimedia creator, blends her love for manga‑style drawing with a practical knack for coding tutorials, channeling her sociable
    energy into collaborative art projects and community tutoring while balancing school responsibilities.
  sports: Rebeca Garcia plays Saturday afternoon soccer with friends at the local park, cheering for the regional youth league team and admiring the professional MLS club LAFC, while also using folkloric
    dance rehearsals as a fun cross‑training workout.
  arts: Rebeca Garcia’s artistic life revolves around drawing manga characters inspired by series like My Hero Academia, dancing to regional Mexican rhythms and Latin pop icons such as Bad Bunny and Rosalía,
    and curating vibrant playlists that double as soundtracks for her digital animation experiments.
  travel: Rebeca Garcia dreams of a weekend trip to San Diego’s Comic‑Con to meet fellow anime fans, has already visited the nearby historic Mission town for a family cultural festival, and hopes to one
    day explore Tokyo’s Akihabara district for firsthand manga inspiration.
  culinary: Rebeca Garcia prefers quick, flavorful dishes like street‑style tacos al pastor and cheesy quesadillas, and occasionally attempts beginner sushi rolls after watching YouTube tutorials, favoring
    ingredients such as fresh cilantro, lime, and soy sauce.
  core: Rebeca Garcia is a sociable, creative teenager who balances a love for dance, manga art, and soccer with occasional worries about school stress, juggling youthful indulgences and a budding sense
    of responsibility.
background:
  cultural: Rebeca’s Mexican heritage is a central part of her identity. She grew up speaking Spanish at home, celebrating Día de los Muertos, Mexican Independence Day, and enjoying traditional foods such
    as tamales and pozole with her family. Her parents emphasize respect for elders and community solidarity, which influences her cooperative nature. Living in Laveen, a suburb with a vibrant Mexican‑American
    community, she blends these cultural traditions with the broader American teen culture, navigating bilingual school environments and participating in local cultural fairs that showcase Mexican art and
    music.
