  career_goals: Rebeca aspires to pursue a career that combines her love for people and her practical mindset. She hopes to become a bilingual elementary school teacher or a community health outreach coordinator,
    roles where she can support younger students and her neighborhood. She also dreams of creating engaging educational content on social media to promote cultural awareness and healthy habits among her
    peers. In the longer term she envisions studying education or public health at university, and eventually leading community programs that empower Mexican‑American families.
