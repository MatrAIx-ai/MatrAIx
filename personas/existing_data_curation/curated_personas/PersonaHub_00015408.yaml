persona_description: A scientist who is researching the effects of phosphorus and pesticides in water bodies and is collaborating with scientists from the Agricultural Research Service (ARS) to develop
  new ways to filter pollutants before they reach the drainage pipe outlets. The scientist has been working on this research for about 2 years and has been collaborating with scientists from Ohio, Indiana,
  Minnesota, Pennsylvania, and Maryland. The scientist has been using the GARP model to predict where invasive species could find habitat within the Great Lakes region and has identified 14 species with
  a moderate or high potential to spread and cause ecological impacts to the region. The scientist hopes that the study will help focus monitoring activities and support the need for detection and monitoring
  efforts at ports identified for greatest risk.
