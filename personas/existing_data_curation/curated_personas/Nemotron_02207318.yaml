  hobbies: '[''fishing'', ''gardening'', ''woodworking'', ''reading mystery novels'', ''bridge'', ''volunteering at food bank'', ''church fellowship'', ''watching baseball'']'
  career_goals: Jared aims to secure a stable, predictable work schedule that allows him to gradually reduce hours as he nears retirement while continuing to contribute his experience to the store. He hopes
    to transition into a lead or mentor role, guiding new cashiers and refining store procedures. Over the next few years, he also aspires to co‑manage a small family‑run convenience store with his wife
    and to allocate time for community volunteer work that leverages his organizational skills.
