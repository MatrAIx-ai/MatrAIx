personas:
  professional: Jared Thompson is a veteran retail cashier who leverages decades of cash handling, POS mastery, and calm conflict de‑escalation to mentor new staff, streamline inventory procedures, and
    champion a predictable, structured schedule while gradually shifting toward a co‑manager role at his family’s convenience store, and they take pride in passing on practical wisdom to younger colleagues.
  sports: Jared Thompson follows the Kansas City Royals with fervor, seasons his weekends with occasional trips to Arrowhead Stadium for Chiefs football, participates in the local trout fishing club, and
    maintains a light fitness regimen through gardening and weekend fishing walks, and they proudly wear the Royals cap during community events.
  arts: Jared Thompson indulges in mystery novels by Agatha Christie and Michael Connelly, enjoys classic rock playlists featuring Bob Dylan while woodworking, and attends the community theater’s monthly
    productions of ‘Our Town,’ which together shape his creative downtime, and they always keep a stack of paperback mysteries on the kitchen counter.
  travel: Jared Thompson prefers relaxed road trips to nearby state parks like Lake of the Ozarks and the Ozark National Forest for fishing and camping, plans itineraries loosely around garden off‑season,
    and dreams of a guided salmon fishery tour in Alaska when finances allow, and they keep a well‑worn map of regional lakes in the glove compartment.
  culinary: Jared Thompson delights in cooking garden harvests into dishes such as roasted zucchini, heirloom tomatoes, and corn succotash paired with freshly caught trout, while also savoring Kansas City
    BBQ ribs on occasional outings, reflecting a blend of home‑grown comfort and regional indulgence, and they always season with fresh basil and garlic from the backyard.
  core: Jared Thompson is a practical, community‑focused retiree who balances a structured work ethic with laid‑back fishing trips, mystery novels, and a habit of misplacing keys, embodying reliable steadiness
    sprinkled with endearing forgetfulness, and they often joke that their watch is always five minutes fast.
background:
  cultural: Jared grew up in Newton, Kansas, within a middle‑class, white Midwestern family with deep roots in small‑town farming and community life. His upbringing reflects the values of hard work, modesty,
    neighborly cooperation, and a Protestant (Baptist) church tradition common to the region. He identifies with the steady rhythms of rural life, a strong sense of self‑reliance, and a commitment to community
    service that characterize the Heartland culture.
