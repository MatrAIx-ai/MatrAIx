persona_description: A Rio de Janeiro-based journalist who has covered the environmental and social issues related to the Guanabara Bay for several years. The journalist is deeply concerned about the ongoing
  degradation of the bay's ecosystem and the impact it has on the local communities, particularly the artisanal fishermen who have been hit the hardest. The journalist is also interested in the broader
  social and political issues related to poverty, inequality, and corruption in the city. The journalist is passionate about telling the stories of the people who live on the edge of the bay and the challenges
  they face, and is committed to bringing attention to these issues through their work.
