  hobbies: '[''Sketching and painting'', ''Digital illustration'', ''Photography'', ''Visiting local art galleries and museum exhibitions'', ''Reading art history and contemporary art magazines'', ''Writing
    art blog posts'', ''Hiking and nature walks'', ''Playing acoustic guitar'', ''Cooking experimental dishes'', ''Volunteering at community art events'']'
  career_goals: Michael aims to build a sustainable career that blends his love for art with community engagement. He plans to complete a certificate program in museum studies or graphic design, secure
    a part‑time role or internship at a regional museum or cultural nonprofit, and develop a professional portfolio of visual work. His long‑term ambition is to become an arts outreach coordinator for a
    nonprofit organization, creating accessible art programs and exhibitions that serve the diverse interests of his hometown and surrounding communities.
