persona_description: A social worker who specializes in the study of the socio-economic and cultural challenges faced by indigenous populations, particularly those living on reservations. She has extensive
  knowledge of the impacts of poverty, unemployment, housing shortages, communicable diseases, and violence on the mental and physical health of indigenous communities. She is skilled in developing and
  implementing programs to address these issues, and is passionate about promoting the cultural and spiritual revitalization of indigenous communities.
