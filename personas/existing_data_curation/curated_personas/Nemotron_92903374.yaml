personas:
  professional: Irene Yardley, a two‑year‑old budding mini‑architect, spends mornings meticulously lining up her building blocks by color and size, turning the playroom into a tiny studio where curiosity
    meets practicality and her disciplined streak shines as she proudly declares success after every stable tower.
  sports: Irene Yardley loves toddling to the indoor splash‑pad at the community center, proudly wears a tiny jersey of City FC during her weekly toddler soccer class, and eagerly participates in the Little
    Sprouts gymnastics club, though she prefers the swings over the slide.
  arts: Irene Yardley giggles to Raffi’s “Baby Beluga,” claps along with Sesame Street’s Elmo, and attempts her own simple watercolor splashes inspired by Eric Carle’s vibrant butterfly illustrations, showing
    a budding appreciation for music and visual art.
  travel: Irene Yardley has already marveled at the sweeping vistas of the Grand Canyon’s South Rim, squealed with delight meeting Mickey Mouse at Disney World, and explored the marine life at Monterey
    Bay Aquarium, all on family‑planned trips that balance stroller‑friendly routes with occasional car‑seat naps.
  culinary: Irene Yardley shows a keen palate for soft ricotta cheese drizzled with honey, loves buttery mashed sweet potatoes seasoned with a pinch of cinnamon, eagerly devours chicken nuggets cut into
    dinosaur shapes, and insists on apple slices spread thinly with peanut butter, though her cooking skill is limited to expertly wielding a plastic spoon.
  core: Irene Yardley, the two‑year‑old who lines up toys by size, hoards shiny pennies, battles a stubborn bout of eczema, and chants \"Again!\" after every block tower, yet sometimes refuses bedtime stories
    when the lights are too bright.
background:
  cultural: Irene is raised in a White family in Sinton, Texas, a small community in Bee County known for its Southern hospitality and close-knit neighborhood ties. Her upbringing includes regular participation
    in local church activities, community fairs such as the Bee County Fair, and family gatherings centered around traditional Texan foods like barbecue and homemade pies. She is exposed to country and
    folk music, and occasionally to the Spanish language and cultural celebrations common in the region, reflecting the broader multicultural environment of South Texas. These influences shape a cultural
    background that blends Anglo-American family traditions with the warm, community-oriented spirit of rural Texas.
