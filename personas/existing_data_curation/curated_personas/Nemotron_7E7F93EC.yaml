  hobbies: '[''Gardening'', ''Cooking (farm-to-table)'', ''Reading (historical fiction & biographies)'', ''Quilting'', ''Gospel singing'', ''Walking/Hiking'', ''Genealogy research'', ''Attending local cultural
    festivals'']'
  career_goals: Looking ahead, Sammie aims to transition from day‑to‑day management to a mentorship and advisory role, formally establishing a structured mentorship program for emerging supervisors in her
    company. She plans to obtain a Certified Manager (CM) credential to solidify her expertise and to position herself as a consultant for small businesses seeking operational efficiency. In parallel, she
    hopes to launch a community‑based financial‑literacy workshop series through her local church, helping adults in Fort Bend County build budgeting and retirement skills. Ultimately, she wants to leave
    a lasting legacy of inclusive workplace culture and community empowerment while ensuring a smooth, financially secure retirement.
