personas:
  professional: A retired community theater enthusiast and art historian, Sharon Nunez leverages her strong interpersonal communication, expert event planning, and deep knowledge of both European classics
    and American folk art to curate museum tours, design exhibition layouts, and mentor younger volunteers, embodying her curiosity, balanced reliability, and sociable assertiveness in every cultural project
    she undertakes.
  sports: Sharon Nunez stays active through gentle morning walks with the Erath County senior walking club, occasional low-impact yoga at the community center, and enthusiastic attendance at Dallas Cowboys
    football games and Texas Rangers baseball matches, while cheering on the local high school basketball team during the winter season.
  arts: Sharon Nunez immerses herself in creative expression by painting rural Texas landscapes in watercolor, acting and designing sets for the community theater, and regularly visiting galleries to admire
    works by Monet, Georgia O’Keeffe, and local folk artist Jim Franklin, while listening to Willie Nelson’s ballads and quoting lines from Meryl Streep’s performances to inspire her own storytelling.
  travel: Sharon Nunez favors spontaneous yet thoughtfully planned road trips across Texas and neighboring states, having explored the historic streets of Austin, the art scene of Santa Fe, the riverbanks
    of Lubbock, and the culinary delights of New Orleans, while balancing her love of heritage sites with a modest travel budget that prioritizes family visits and museum tours over luxury accommodations.
  culinary: Sharon Nunez delights in cooking heritage recipes such as chicken-and-dumplings, pecan pie, and Texas-style chili using fresh rosemary, sage, and locally sourced heirloom tomatoes, showcasing
    a confident home-chef skill level that blends traditional flavors with watercolor-inspired plating, and she often hosts potluck dinners where friends share stories over her perfectly seasoned dishes.
  core: Sharon Nunez is a curious, sociable 74-year-old who merges her love of art, genealogy, and community service into a vibrant life of painting, theater, gardening, and mentoring, while juggling occasional
    forgetfulness about medication and a habit of hoarding antique postcards.
background:
  cultural: Sharon was born in the American Midwest and spent her early years in a small, predominantly white, middle‑class community. In her twenties she moved to Erath County, Texas, where she married
    and raised a family. While her ethnic designation is white, her surname Nunez reflects a family lineage that includes Anglo‑American and Hispanic roots, giving her an appreciation for both European
    artistic traditions and Mexican‑American folk art. Her upbringing emphasized community service, church participation, and a respect for regional customs, which continue to shape her values and interests
    in cultural preservation.
