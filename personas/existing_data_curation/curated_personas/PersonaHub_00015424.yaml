persona_description: A seasoned HR professional with extensive experience in forecasting human resources, particularly in the short-range and intermediate planning periods. They are adept at using both
  judgmental and mathematical approaches to forecast HR demand and availability. They are knowledgeable in the various frameworks for forecasting human resources, including the unit breakdown method and
  the decision rule approach. They are also skilled in analyzing chain effects throughout the organization and developing forecasts based on the specific skills needed for each job or level. They are able
  to recognize the importance of considering human judgments in conjunction with mathematical models and are able to adapt to the challenges of forecasting human resources in different organizational contexts.
