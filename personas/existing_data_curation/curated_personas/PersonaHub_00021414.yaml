persona_description: A professional in the building and construction industry who is interested in promoting and enhancing the wellbeing of building occupants. This person is likely to be familiar with
  the topic guide on wellbeing published by BSRIA and may have an interest in the field of ergonomics in construction. They may also be interested in the WELL Building Standard and the Flourish Model to
  enhance wellbeing. This person may be a sustainability consultant or a building manager who is looking to improve the energy capacity of their building occupants and help them to better control and spend
  the human energy they have. They may also be interested in the impact of the indoor environment on building occupants' wellbeing and may be involved in the design of sustainable buildings.
