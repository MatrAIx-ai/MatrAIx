personas:
  professional: Eddie Caruthers is a self‑taught teenage visual artist who blends hand‑sketching, free‑software digital illustration, and rudimentary animation to create concept art for indie games, yet
    their spontaneous nature and aversion to rigid schedules often lead to last‑minute rushes on portfolio updates.
  sports: Eddie Caruthers is a skateboard enthusiast who frequents the Crawfordville Skate Club, cheers for the Jacksonville Jaguars on game nights, and joins a weekend youth kayaking group that explores
    the Suwannee River wetlands for wildlife photography.
  arts: Eddie Caruthers draws inspiration from the atmospheric panels of Moebius, the gritty street art of Banksy, and the synth‑driven soundscapes of Aphex Twin, while devouring graphic novels like "Saga"
    and creating flash fiction set to lo‑fi beats they mix in Audacity, turning these hobbies into a core part of their identity.
  travel: Eddie Caruthers prefers low‑cost, spontaneous trips that blend nature and art, having camped in the Okefenokee Swamp, taken a weekend bus tour of Savannah’s historic districts, and dreaming of
    an artist‑in‑residence program in Reykjavik that merges volcanic landscapes with digital illustration workshops.
  culinary: Eddie Caruthers enjoys crafting simple yet vibrant meals such as shrimp‑and‑grits with a dash of hot sauce, avocado toast topped with smoked paprika, and experimental ramen bowls flavored with
    miso and seaweed, often cooking in the community garden’s outdoor kitchen while listening to lo‑fi playlists.
  core: Eddie Caruthers is a curious 16‑year‑old art‑obsessed teen who channels spontaneous creativity into sketchbooks, skateboards, and digital soundscapes, while habitually battling disorganized workflows
    and late‑night snack raids.
background:
  cultural: Eddie grew up in Crawfordville, a small town in Leon County, Florida, where Southern hospitality and a close‑knit community are everyday realities. His family identifies as White with deep regional
    roots, and his upbringing reflects traditional Southern values such as respect for neighbors, modesty, and participation in local traditions like county fairs, high‑school football Saturdays, and church
    gatherings. Simultaneously, Eddie’s curiosity and online access expose him to a broader digital culture, allowing him to absorb artistic influences far beyond his hometown. This blend of rural Southern
    backdrop and global internet exposure gives Eddie a hybrid cultural perspective that values both community connection and individual creative exploration.
attributes:
  skills: '[''Hand drawing and sketching'', ''Digital illustration (Krita, GIMP)'', ''Basic video editing (iMovie, DaVinci Resolve Lite)'', ''HTML/CSS website building'', ''Computer and smartphone troubleshooting'',
    ''DIY woodworking and simple electronics'', ''Audio mixing (Audacity)'', ''Wildlife photography'', ''Creative problem solving'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Nature photography'', ''Music listening and audio mixing'', ''Narrative‑driven video gaming'', ''Skateboarding'', ''Reading graphic novels
    and sci‑fi stories'', ''Flash fiction writing'', ''Community garden mural projects'']'
  career_goals: Eddie aims to turn his artistic passions into a sustainable career by building a strong online presence for his artwork, selling prints and taking digital commissions, and eventually securing
    freelance gigs as a concept artist or illustrator for indie video games. He plans to earn a high‑school equivalency credential and then pursue graphic design or multimedia production through a community‑college
    program or apprenticeship that offers hands‑on learning. Long‑term, he dreams of establishing a small studio that blends visual art, music, and environmental storytelling, perhaps producing documentary‑style
    video projects that highlight the natural habitats of North Florida. He values freedom to work on varied, unconventional projects and hopes to travel for artistic residencies and collaborations.
