persona_description: A teacher who is concerned about the implementation of common standards and the potential impact on the content and curriculum being taught in schools. She is interested in understanding
  the differences in how teachers actually teach and the tools available to provide better answers. She is open to the idea of auditing curricula and instruction to measure whether standards actually bring
  changes to instruction. She is interested in the possibility of a bottom-up system for devising common assignments and end-of-course tests. She is also interested in the development of new items to measure
  higher-order skills and the potential challenges of doing so.
