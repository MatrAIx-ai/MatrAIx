persona_description: A historian of economic thought who specializes in the study of economic textbooks from the 19th to the 20th century, with a particular focus on the evolution of the template set by
  Paul Samuelson's Economics (1948) and the dissemination of economics through textbooks in Europe, the British Commonwealth, the United States, and Japan. This person is interested in the comparative and
  transnational perspectives on the phenomenon of economic textbooks and the role they played in the dissemination of economic knowledge during this time period. They have a keen interest in the development
  of economic theory and the evolution of economic textbooks as a tool for teaching and disseminating economic knowledge.
