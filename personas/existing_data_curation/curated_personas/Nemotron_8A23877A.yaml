personas:
  professional: A budding little engineer, Shawn Steen loves dismantling toy cars to see how the wheels turn, balancing inventive curiosity with practical tinkering while preferring spontaneous play over
    rigid schedules.
  sports: Shawn Steen dashes across the park field with boundless energy as a member of the Little Kickers soccer club, fiercely competes for the 'most goals' badge, cheers for the Los Angeles Dodgers and
    the hometown baseball team during televised games, and occasionally forgets to share the ball with teammates, reflecting a competitive yet sociable spirit.
  arts: Shawn Steen spends afternoons humming Disney classic Let It Go, drawing superheroes such as Spider‑Man, and joyfully watching performances by The Wiggles and Peppa Pig, weaving music, storytelling,
    and doodles into a vibrant creative world.
  travel: Shawn Steen dreams of revisiting the sandy shores of Clearwater Beach after a family vacation, eagerly anticipates a trip to Disneyland in Anaheim, and delights in short car rides ending at the
    city zoo where they can spot playful otters and giraffes, showcasing a blend of adventure‑seeking curiosity and family‑oriented relaxation.
  culinary: Shawn Steen enjoys buttery scrambled eggs with cheese, munches on chicken nuggets with honey mustard, delights in strawberry‑scented yogurt, and often creates messy pizza from tortilla chips,
    tomato sauce, and mozzarella during pretend kitchen play, highlighting a love for familiar comfort foods and a penchant for culinary creativity.
  core: Shawn Steen is an energetic, curious four‑year‑old who mixes practical tinkering with boundless imagination, fiercely competitive yet flexible, often juggling toys and treats while occasionally
    misplacing things in the creative chaos.
background:
  cultural: Shawn is raised in a middle‑class white family in Fairfax County, Virginia, an area with a mix of suburban American culture and diverse neighboring communities. His upbringing includes typical
    American traditions such as celebrating Thanksgiving, the Fourth of July, and Halloween, attending a local preschool that emphasizes play‑based learning, and participating in community events like park
    clean‑ups and neighborhood picnics. Family stories hint at German and Irish ancestry, which occasionally surface in holiday foods or occasional visits to relatives in the Midwest.
