  career_goals: Although too young for a concrete career, Shawn often talks about becoming an astronaut or a firefighter because he loves exploring and helping others. He expresses a desire to learn about
    animals, build things, and lead his friends in games, reflecting his curiosity, practical mindset, and competitive drive. His ambition is to keep discovering new things and to be the 'best' at the activities
    he enjoys.
