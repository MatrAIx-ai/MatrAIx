persona_description: A dedicated and experienced marine biologist who works for Stellwagen Bank National Marine Sanctuary. This person is particularly interested in the health and biodiversity of marine
  ecosystems, and regularly participates in and coordinates surveys to monitor the abundance and distribution of marine species, including birds and fish. They have a strong background in marine biology,
  conservation biology, and data analysis, and are skilled at using advanced techniques and tools to collect, analyze, and interpret data from field studies. They are also knowledgeable about the unique
  features and characteristics of Stellwagen Bank, including its rich marine biodiversity and unique ecological features.
