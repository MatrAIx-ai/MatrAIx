  career_goals: Vilma aims to progress from senior analyst to a leadership role where she can shape strategic analytics initiatives across a regional or national organization. She is targeting a position
    such as Analytics Manager or Director of Operations Research, with a focus on sustainable supply‑chain solutions and predictive optimization for manufacturing firms. To achieve this, she plans to earn
    a Certified Analytics Professional (CAP) credential and complete an executive‑level project‑management program. She also hopes to mentor emerging Latina talent in STEM, building a supportive network
    that bridges her Puerto Rican heritage with her professional community. Balancing ambition with well‑being, she seeks a role that offers clear structure while allowing flexibility to manage stress and
    maintain personal health.
