  career_goals: Although retired, Ricardo aims to continue contributing to his community by mentoring younger volunteers, documenting his life story and Cuban heritage in a memoir, and leading workshops
    on traditional Cuban cooking and sustainable gardening at the local cultural center. He also hopes to maintain his health and independence, and to organize a small family reunion that brings together
    relatives from Florida and Cuba, preserving family connections across generations.
