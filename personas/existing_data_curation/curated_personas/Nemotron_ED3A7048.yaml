  hobbies: '[''Running'', ''Golf'', ''Chess'', ''Scale Model Shipbuilding'', ''Fishing'', ''Wine Tasting'', ''Reading Financial Literature'', ''Attending Networking Events'']'
  career_goals: He aims to become a finance director within the next five years, leveraging his quantitative skill set to oversee corporate finance strategy and risk management. In the long term, he envisions
    transitioning to a chief financial officer role or launching his own boutique financial advisory firm focused on data-driven investment solutions. He plans to earn the CFA charter and deepen his expertise
    in fintech analytics to stay competitive in the evolving financial landscape.
