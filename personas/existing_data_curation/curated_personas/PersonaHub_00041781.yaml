persona_description: Matthew Morse Booker, an associate professor of history at North Carolina State University and the founder of the Between the Tides project at Stanford's Spatial History Lab, is a historian
  with a keen interest in the operation of the law of unintended consequences in our own backwaters and backyards. He has a unique perspective on the waterfront and tidelands, marshes, and swamps, giving
  the city a fresh face and allowing facts and stories to speak for themselves. His work, "Down by the Bay," delivers a dire message about the dire consequences of every action humans have taken in and
  around the bay, especially regarding the planting of Atlantic oysters in San Francisco Bay and the hydraulic mining for gold in the Sierras. His work is a testament to his expertise in the field of environmental
  history and his commitment to educating his readers about the importance of preserving our natural resources.
