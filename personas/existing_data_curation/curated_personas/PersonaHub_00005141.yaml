persona_description: A sociologist who specializes in the study of American immigration and social policy, particularly focusing on the experiences and contributions of ethnic and racial groups in the United
  States. He/she seeks to promote a positive national consensus based on the recognition and acceptance of cultural diversity, and the elimination of racial and ethnic stereotypes. The persona is interested
  in exploring the complex issues surrounding immigration, and how they can be addressed through education and policy. They are likely to be well-versed in the history and current state of immigration in
  the United States, and have a passion for understanding the ways in which different cultural groups intersect and contribute to the fabric of American society.
