personas:
  professional: Andy Obrien is a dependable front‑line dishwasher known for rigorous sanitation protocols, precise inventory tracking, and a methodical approach that positions them for a future supervisory
    role in kitchen operations.
  sports: Andy Obrien is a dedicated follower of high‑school football, regularly cheering for the River Ridge Rams with their wife, a member of the local reservoir fishing club that meets every Saturday,
    and they enjoy watching the Dallas Cowboys during the NFL season.
  arts: Andy Obrien draws creative inspiration from cooking shows like Food Network's Dinners, Drive‑Ins and Dives and music by Chris Stapleton, integrating the theatrical flair of these arts into their
    own backyard BBQs.
  travel: Andy Obrien prefers meticulously planned getaways, often budgeting a weekend road trip with their wife to nearby Austin for live music before heading to Santa Fe to explore Southwest art markets,
    while dreaming of a future family vacation to the Grand Canyon.
  culinary: Andy Obrien is a backyard grill master who perfects homemade chipotle‑ancho spice rubs for jalapeño‑lime shrimp tacos, smoky brisket nachos, and cumin‑infused carne asada, balancing a moderate
    level of culinary skill with an ever‑expanding repertoire of Tex‑Mex flavors.
  core: Andy Obrien is a methodical, reliable 39‑year‑old who blends a love for structured kitchen work, precise DIY projects, and disciplined grilling into a life guided by routine, careful planning, and
    a quiet, steadfast dedication to family and personal growth, with occasional back‑yard shortcuts and a penchant for last‑minute spice experiments.
background:
  cultural: Andy is a White American of Irish ancestry, as reflected in his surname O'Brien, raised in the Midland, Texas region. His upbringing blended a Midwestern work ethic with the fast‑paced, oil‑industry‑driven
    culture of West Texas. He grew up in a close‑knit, family‑oriented community that values reliability, hard work, and hospitality. Regular church attendance and participation in local events, such as
    Friday night football and community potlucks, have reinforced his cooperative nature. While he embraces Texas traditions like BBQ and hunting, he also celebrates his Irish heritage through occasional
    St. Patrick’s Day gatherings.
attributes:
