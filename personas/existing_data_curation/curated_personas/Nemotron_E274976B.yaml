  career_goals: Andy aspires to move from a front‑line dishwasher role to a supervisory position within the kitchen, such as Lead Dishwasher or Kitchen Operations Supervisor, where he can implement systematic
    workflow improvements and mentor staff. He plans to obtain a ServSafe certification and complete a short culinary‑management course at a community college to solidify his credentials. In the longer
    term, Andy hopes to establish his own small catering or commercial cleaning business, leveraging his meticulous organizational skills and steady work ethic to create a predictable, family‑friendly income
    stream.
