personas:
  professional: Mark Boutin, an inquisitive two-year-old, treats building with Duplo bricks like a tiny engineering lab, and they methodically arrange colors while occasionally improvising new structures,
    embodying a balance of curiosity and practicality even in play.
  sports: Mark Boutin, a lively preschooler who avidly watches the New York Yankees on toddler-friendly highlight reels and enjoys a weekly parent-child soccer session with the Little Tigers community league,
    balances energetic play with quiet nap breaks, and they occasionally cheer with a tiny foam baseball cap.
  arts: Mark Boutin, a curious toddler who sings along to Disney’s 'Let It Go' and the playful 'Baby Shark' tune, delightedly finger-paints with bright primary colors, and they often mimic the expressive
    gestures of street performers at the nearby park, blending creative expression with a love for structured art sessions.
  travel: Mark Boutin, an adventurous two-year-old who loves short road trips to the aquarium and dreams of visiting Disney World in Florida, prefers travel plans that include a familiar diaper bag, frequent
    snack breaks, and they feel uneasy when packing is rushed or the itinerary changes unexpectedly.
  culinary: Mark Boutin, a picky yet enthusiastic eater who adores creamy macaroni and cheese, sweet banana slices, and occasionally reaches for spicy salmon sticks when encouraged, enjoys helping stir
    mashed potatoes with a plastic spoon, and they often request extra butter despite parents’ attempts to limit it.
  core: Mark Boutin, a two-year-old balancing fierce curiosity with toddler practicality, worries over tiny setbacks but they find joy in orderly play, bedtime stories, and the occasional splatter of paint.
background:
  cultural: Mark is a White American child raised in the vibrant, multicultural neighborhood of Brooklyn, Kings County, New York. His family follows typical American middle‑class traditions such as holiday
    celebrations, weekend trips to city parks, and community‑center activities, while also being exposed daily to the linguistic and cultural diversity of the borough. This environment gives him a broad,
    inclusive outlook, appreciating both the familiar customs of his household and the varied cultures celebrated in his community.
