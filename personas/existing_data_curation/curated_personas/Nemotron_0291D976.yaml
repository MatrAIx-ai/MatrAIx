  career_goals: Although retired, Sue aims to preserve her independence and health by staying physically active and following her daily routine. She wants to continue volunteering a few hours each week
    at the local senior center, teaching knitting to small groups. A key personal ambition is to compile a family memoir and a handwritten recipe book for future generations, capturing stories, traditions,
    and the genealogy of her ancestors. She also hopes to become more comfortable with video‑messaging so she can maintain regular visual contact with her scattered family, and she strives to keep her home
    safe, organized, and welcoming for any occasional visitors.
