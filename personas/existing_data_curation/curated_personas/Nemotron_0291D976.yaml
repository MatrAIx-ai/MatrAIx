personas:
  professional: Sue Teets, a retired homemaker turned senior‑center volunteer, blends meticulous knitting instruction, practical household budgeting, and gentle caregiving for grandchildren and neighbors,
    reflecting their love of structured routines and quietly compassionate nature despite occasional disorganization.
  sports: Sue Teets enjoys gentle morning walks in the garden, participates in a local senior walking club and a weekly bowling league at the community center, and cheerfully follows the Nebraska Cornhuskers
    football team, embodying a low‑impact, community‑focused approach to fitness.
  arts: Sue Teets finds creative joy in quilting heirloom blankets while listening to Ella Fitzgerald and classic radio dramas like "The Shadow", and they cherish the paintings of Grant Wood and the historical
    novels of Margaret Mitchell, which echo their deep appreciation for Midwestern heritage.
  travel: Sue Teets prefers short, well‑planned road trips to nearby historic sites such as Lincoln’s State Capitol and the Covered Bridges of Covered Bridge County, but they dream of a leisurely cruise
    down the Mississippi River and a visit to the Smithsonian museums, balancing cautious budgeting with a yearning for gentle adventure.
  culinary: Sue Teets excels at baking apple pie, peach cobbler, and preserving heirloom tomatoes, skillfully adjusting classic Midwestern recipes with reduced sodium and extra herbs like thyme and basil,
    and they take pride in serving hearty chicken pot pie and cornbread at family gatherings.
  core: Sue Teets is a detail‑oriented, caring elder who weaves knitting, gardening, and cautious budgeting into a tranquil, sometimes worry‑laden life that cherishes routine, small‑group fellowship, and
    quiet creativity.
background:
  cultural: Sue was born and raised in the mid‑western United States, specifically in the agricultural communities surrounding Lincoln, Nebraska. Her family traces its roots to German and Irish settlers
    who arrived on the Great Plains in the late 19th century. Growing up on a family farm instilled values of self‑reliance, modesty, and a strong work ethic. Community life centered on church, seasonal
    potlucks, and neighborly assistance, which fostered her cooperative and harmonious nature. The regional culture emphasized practicality, routine, and respect for tradition—traits that continue to shape
    her preferences for structure, her love of home‑cooked meals, and her dedication to preserving family heritage.
