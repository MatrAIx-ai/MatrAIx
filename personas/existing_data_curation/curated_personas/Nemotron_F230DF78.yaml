  career_goals: He aims to earn the APICS CPIM certification within the next year, positioning himself for a senior production planner role. In the longer term, he hopes to transition into a supply-chain
    analyst position where he can combine his analytical rigor with his interest in emerging technologies, such as AI-driven demand planning. He aspires to lead a small team that designs and implements
    lean workflow improvements across the plant and to champion data-visualization standards that make abstract performance metrics accessible to non-technical staff. Additionally, he dreams of eventually
    launching a freelance digital-art side business that uses his visual storytelling skills, allowing him to blend his creative passions with his professional expertise.
