persona_description: A historian who specializes in the study of Native American tribes, particularly the Delaware tribe, and their history, culture, and interactions with European colonists. They are interested
  in the Delaware's forced displacement from their original home and the factors that led to their eventual relocation to Missouri and Canada. They are also interested in the Delaware's matriarchal and
  matrilineal society, agrarian-based lifestyle, and the impact of external stimuli and armed confrontation on their culture and way of life.
