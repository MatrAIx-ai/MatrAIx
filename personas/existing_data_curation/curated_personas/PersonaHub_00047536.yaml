persona_description: A scientist who specializes in studying the Sun-Earth system, particularly comet observations. They are particularly interested in the interaction and effect of the solar wind on comets,
  and have expertise in using space-based observatories like POLAR and ISTP probes to conduct such studies. They are also interested in the imaging opportunities offered by the ISTP missions, particularly
  the ability of POLAR to image the comet near perihelion at a time when other imaging systems cannot.
