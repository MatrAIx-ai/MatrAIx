  hobbies: '[''scribbling with crayons'', ''building block towers'', ''listening to music and dancing'', ''picture book reading'', ''outing to parks'', ''playing with water'', ''pretend tea parties'']'
  career_goals: Even at two, Jasleen’s aspirations are infused with the caring and creative values she observes at home. She often says she wants to draw pictures for everyone, help people feel better,
    and maybe become a teacher who reads stories. She also loves the rhythm of songs and imagines being a dancer, reflecting a blend of artistic expression, a desire to nurture others, and respect for learning.
