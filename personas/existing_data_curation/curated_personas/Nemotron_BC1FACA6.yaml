personas:
  professional: Jasleen Banerji is a two‑year‑old budding block architect who loves arranging colorful building blocks into tidy towers before delightfully knocking them down, showcasing an early blend
    of organizational focus and spontaneous creativity that hints at a future knack for design and problem‑solving.
  sports: Jasleen Banerji participates in a local toddler gymnastics class and loves sprinting across the playground with a mini soccer ball, while cheering on the City Hawks, the regional professional
    soccer team, and proudly wears a tiny jersey from the junior 'PlayTime Football Club'.
  arts: Jasleen Banerji delights in finger‑painting with washable crayons, eagerly sings along to Raffi’s 'Baby Beluga' and watches episodes of Sesame Street, often requesting the classic 'Mister Rogers'
    theme song, reflecting a deep appreciation for visual and musical arts even at a tender age.
  travel: Jasleen Banerji has explored the nearby zoo, splashed at the local beach, and visited grandparents’ farm, and dreams of one day seeing the Eiffel Tower in person after countless picture‑book adventures,
    favoring short car rides with familiar toys and a soft blanket for comfort.
  culinary: Jasleen Banerji prefers soft foods like macaroni and cheese topped with cheddar cheese, banana pancakes made with ripe banana slices and whole‑wheat flour, and occasional carrot sticks with
    hummus, yet can be stubborn about trying new vegetables, often negotiating for a small spoonful of applesauce before accepting the plate.
  core: Jasleen Banerji is a curious two‑year‑old who balances tidy play with spontaneous creativity, shows early saving habits, manages mild eczema, enjoys toddler gymnastics and finger‑painting, and dreams
    of big‑world adventures while cherishing simple comforts.
background:
  cultural: Jasleen comes from a South Asian family that has settled in Brooklyn. At home, she hears a blend of English and Bengali (or Hindi), participates in family celebrations such as Diwali and Holi,
    enjoys Indian meals like rice, dal, and roti, and occasionally visits a local temple. The household emphasizes education, respect for elders, and community harmony. In addition, Brooklyn’s multicultural
    environment exposes her to diverse foods, languages, and arts, enriching her early worldview.
