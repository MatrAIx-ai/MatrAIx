  hobbies: '[''Woodworking'', ''Furniture making'', ''Vintage tool restoration'', ''Hiking and trail photography'', ''Astronomy (telescope operation)'', ''Reading classic science fiction'', ''Puzzle solving
    (crosswords, Sudoku)'', ''Home brewing'', ''Board game nights (small group)'', ''Fishing trips'']'
  career_goals: In retirement, Andrew aims to complete a personal solar-powered off-grid cabin, continue mentoring high-school students in STEM through local clubs, publish technical articles in a regional
    engineering newsletter, and maintain his physical health with regular hikes and yoga. He also hopes to travel with his spouse to national parks, document his engineering experiences in a memoir, and
    occasionally consult on community energy-efficiency projects.
