personas:
  professional: Andrew Herron, a retired HVAC systems engineer turned off‑grid cabin builder, blends their mastery of CAD, Python‑driven process optimization, and renewable‑energy integration with a methodical,
    structured mindset, and they channel their competitive edge into meticulous project schedules and mentoring high‑school STEM clubs.
  sports: Andrew Herron, an avid hiker in the Wasatch Mountains and occasional yoga practitioner, follows the Utah Jazz and Utah Utes football, supports Real Salt Lake on match days, and belongs to the
    Wasatch Outdoor Hiking Club, while they schedule weekend fishing trips on the Provo River with their close‑knit group of friends.
  arts: Andrew Herron, whose evenings often feature classic science‑fiction novels by Arthur C. Clarke and Isaac Asimov, a soundtrack of Pink Floyd and Vangelis, and Ansel Adams‑style trail photography,
    channels their analytical mind into solving crosswords, Sudoku, and hosting low‑key board‑game nights with titles like Terraforming Mars, and they relish discussing plot twists over a glass of home‑brewed
    ale.
  travel: Andrew Herron prefers meticulously planned road trips with their spouse, favoring national park adventures such as Yellowstone, Grand Teton, and Zion, while they also dream of a summer stint in
    Iceland to chase the midnight sun and aurora, balancing their love for rugged hiking with a modest retirement budget.
  culinary: Andrew Herron, an adept home‑brewer and seasoned woodworker, enjoys crafting their own IPA and barrel‑aged stout, cooking rustic smoked trout with rosemary‑infused potatoes, and perfecting a
    sourdough loaf topped with walnut‑hazelnut spread, while they occasionally indulge in a well‑earned slice of pecan pie after a long hike.
  core: Andrew Herron is a methodical, slightly skeptical retiree who channels their engineering precision into solar cabin building, woodworking, and puzzle‑solving, while they occasionally let their competitive
    streak surface in board‑game nights and neglect eye check‑ups.
background:
  cultural: Andrew was raised in a middle-class, predominantly Protestant family in the Midwest before moving to Utah for graduate school and later settling in Salt Lake City. His cultural outlook blends
    traditional American values of self-reliance, diligence, and community service with the local emphasis on family, modesty, and an appreciation for the outdoors common in Utah. Though not a member of
    the LDS Church, he respects the region’s cultural heritage and participates in community volunteer projects. His generation’s experiences during the Cold War and the space race fostered a deep respect
    for scientific progress and engineering. He values seasonal holidays such as Thanksgiving and Fourth of July barbecues, and cherishes close-knit family gatherings.
attributes:
  skills: '[''Mechanical engineering'', ''Electrical engineering'', ''HVAC system design'', ''Renewable energy integration'', ''CAD modeling (SolidWorks, AutoCAD)'', ''Data analysis (Python, MATLAB)'',
