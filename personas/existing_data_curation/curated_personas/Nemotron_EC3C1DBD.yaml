  hobbies: '[''Pickup basketball'', ''Board‑game nights'', ''Live music festivals'', ''Hiking'', ''Photography'', ''Cooking'', ''Home brewing'', ''Mindfulness breathing exercises'']'
  career_goals: Steven aims to earn certification as a Certified Psychiatric Technician within the next two years to expand his clinical responsibilities and contribute more directly to treatment planning.
    He plans to complete a mental‑health counseling or social‑work certificate program, eventually pursuing a bachelor's degree in a related field. In the near term, he seeks a shift‑lead or unit‑coordinator
    position where he can mentor new aides, implement structured protocols, and help create a supportive work environment that mitigates his own stress. Long‑term, Steven aspires to work in community mental‑health
    outreach, designing programs that reduce stigma and provide resources for underserved populations while maintaining a stable, collaborative career path.
