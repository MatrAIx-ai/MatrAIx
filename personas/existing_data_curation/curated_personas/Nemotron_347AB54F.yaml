personas:
  professional: Stanley Weed, a 25-year-old UI/UX designer anchored in the Pacific Northwest, blends a solid STEM background with a natural aesthetic to craft intuitive digital experiences, while their
    curious, laid-back nature and collaborative spirit drive their ambition to lead product design teams and eventually open a community-focused design studio.
  sports: Stanley Weed fuels their love for the outdoors by tackling Cascades hikes, joining a local recreational soccer league that supports the Seattle Sounders, and spending winter weekends snowshoeing
    on Mt. Baker while also cheering the Portland Timbers, embodying a seasonal fitness routine that balances adventure with community sport.
  arts: Stanley Weed immerses themselves in the creative scene by contributing to Ferndale murals, attending gallery openings featuring artists like Olafur Eliasson, jamming acoustic guitar with friends
    on songs by Sufjan Sutherland and Iron & Wine, and frequenting the Seattle International Film Festival for indie cinema, all of which feed their curiosity and collaborative vibe.
  travel: Stanley Weed prefers spontaneous, nature-centric road trips—overnight drives to the Oregon Coast, weekend hikes in Glacier National Park, and a bucket-list pilgrimage to Iceland's volcanic landscapes—while
    using modest budgeting to balance travel with their married life and local community commitments.
  culinary: Stanley Weed experiments in the kitchen with sustainable ingredients, whipping up Japanese ramen infused with locally sourced mushrooms, Peruvian ceviche featuring Pacific Northwest salmon,
    and a weekend sourdough starter that they tend alongside their spouse, all while frequenting farm-to-table eateries that celebrate seasonal produce.
  core: Stanley Weed is a curious, eco-minded designer whose love for mountains, murals, and music fuels a flexible, community-oriented life packed with spontaneous hikes, collaborative art, and sustainable
    experiments in both work and play.
background:
  cultural: Stanley grew up in a White, middle‑class family in the Pacific Northwest, where an emphasis on education, outdoor recreation, and community engagement shaped his worldview. His ancestry traces
    back to European (primarily Anglo‑American) roots, but his upbringing was deeply influenced by the region’s progressive, environmentally conscious culture and the collaborative spirit of Whatcom County.
    These influences fostered a respect for diverse perspectives, a commitment to sustainability, and a strong sense of local community.
