  career_goals: Stanley aims to become a lead product designer, guiding cross‑functional teams to develop user‑centered, sustainable digital and physical experiences. He envisions launching his own design
    studio in the Pacific Northwest that partners with local communities to create inclusive public spaces and innovative tech solutions. Over the next five years, he plans to deepen his expertise in augmented
    reality, AI‑driven design tools, and sustainable material design, while also mentoring emerging designers and contributing to open‑source design resources. Balancing his professional aspirations with
    his marriage, he seeks flexible work arrangements that allow for continued personal growth and community involvement.
