persona_description: A medical scientist who is interested in researching the menstrual cycle and its effects on women's health. They are interested in the changes that occur during the menstrual cycle
  and how they can be used to diagnose and treat women's health conditions. They may have a background in photography or have experience with self-help movements and the Feminist Women's Health Centers.
  They may be interested in the history of medical photography and the techniques used to take lifelike color photos of the inside of the vagina.
