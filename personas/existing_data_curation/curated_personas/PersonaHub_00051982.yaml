persona_description: A professional herpetologist with expertise in identifying and husbandry of snakes in Thailand, particularly focusing on the care and housing of snakes native to the country. They are
  familiar with the climatic data and application of these data to the care of Thai snakes. They have a keen interest in the coloration, pattern, scale counts, diets, food preferences, natural habitats,
  breeding habits, and characteristics of head scalations of 33 different Thai snakes. They are also well-versed in the specific suggestions for the care and housing of each genus and individual species,
  and have a total of 164 color photographs and detailed drawings highlighting the characteristics of these snakes.
