  career_goals: Magda dreams of turning her love for marine life and quiet research into a future career as a marine biologist or environmental scientist. She envisions herself studying ocean ecosystems
    in the Gulf of Mexico, collecting data, and writing reports that help protect marine habitats. Her practical side also leads her to consider a role that offers stability, such as a research librarian,
    where she can organize information and support other scientists. Ultimately, she hopes to combine her methodical work style with her curiosity to make a meaningful contribution to science.
