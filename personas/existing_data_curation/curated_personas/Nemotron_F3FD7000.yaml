    local blues concerts", "Practicing yoga for stress relief", "Participating in neighborhood block parties"]'
  career_goals: Gabriell aims to transition from front‑line cashier duties to a supervisory role within the next two years, targeting a shift‑lead or assistant manager position where she can apply her organizational
    strengths and mentor newer employees. She plans to complete a short certification in retail management and basic accounting to solidify her credentials. Long‑term, she hopes to either manage a small
    neighborhood store or launch a community‑focused kiosk that offers affordable groceries and financial‑literacy workshops for seniors. Securing a stable, predictable schedule is a key part of her goal
    to reduce stress and ensure a comfortable retirement.
