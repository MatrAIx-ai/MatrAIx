  career_goals: Although in the later stage of his career, Alan aims to secure a stable financial footing for his retirement, ensuring sufficient savings and a modest pension. He aspires to transition into
    a part‑time advisory role within the store, where he can mentor younger cashiers and help streamline operational procedures. Alan also hopes to contribute to his community by volunteering for the local
    senior center, offering workshops on budgeting and basic computer use. Ultimately, his ambition is to maintain independence, stay mentally engaged, and leave a legacy of reliability and practical knowledge
    for his family and colleagues.
