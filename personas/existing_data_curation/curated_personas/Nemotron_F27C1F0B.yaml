personas:
  professional: Dominga Tarquino is a seasoned construction crew coordinator with twenty‑plus years of hands‑on experience in framing, concrete finishing, drywall installation, and small heavy‑equipment
    operation, who blends a safety‑first, detail‑oriented approach with a growing curiosity for green building practices, leveraging her bilingual fluency to bridge communication gaps and keep projects
    on schedule.
  sports: Dominga Tarquino passionately follows regional soccer, never missing a Liga MX broadcast on weekends, supports the local MLS side, stays fit by hiking the trails of Orange County’s parks and playing
    in a community softball league that practices on Saturday evenings.
  arts: Dominga Tarquino participates in a ballet folklorico troupe that rehearses traditional dances celebrating her heritage, regularly attends cultural festivals featuring folk music and artisanal crafts,
    and draws creative inspiration from the vibrant performances for her cooking and DIY projects.
  travel: Dominga Tarquino prefers road‑trip adventures that combine family visits and outdoor exploration, having recently driven to Sedona’s red‑rock canyons for a weekend hike and planning a future trip
    to the historic towns of the Yucatán Peninsula to study regional architecture and sample authentic cuisine.
  culinary: Dominga Tarquino delights in preparing heritage dishes such as tamales, mole, and chiles en nogada, sourcing fresh epazote, ancho chilies, and masa harina from the local market, and often experiments
    by incorporating sustainable ingredients like quinoa or roasted cauliflower while maintaining the classic flavors.
  core: Dominga Tarquino balances a pragmatic construction career with a vibrant love for heritage cooking, folk dance, and outdoor adventure, managing disciplined finances and health routines while occasionally
    over‑indulging in new tools and late‑night soccer matches.
background:
  cultural: Dominga was born in Mexico and moved to Santa Ana with her family as a child. Growing up in a tight‑knit Mexican‑American community, she retained deep ties to traditions such as Día de los Muertos,
    quinceañeras, and weekly family meals centered around homemade tortillas and mole. Bilingual and raised Catholic, she navigates both Mexican cultural values of hard work, family loyalty, and collective
    support, and the broader American context of independence and upward mobility. Her cultural lens informs her collaborative style at work, her love for community celebrations, and her drive to give back
    to the neighborhood that shaped her.
