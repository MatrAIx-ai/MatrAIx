  hobbies: '[''Cooking Mexican cuisine'', ''Ballet folklorico dancing'', ''Gardening'', ''Hiking in Orange County parks'', ''Watching Liga MX soccer'', ''DIY home improvement projects'', ''Volunteering
    at church community events'', ''Exploring sustainable building trends'']'
  career_goals: Dominga aims to become a site foreman within the next three years by completing a GED and obtaining OSHA 30‑hour certification along with a heavy‑equipment operator credential. She plans
    to deepen her knowledge of green construction and modular building to introduce eco‑friendly practices on her crews. Long‑term, she hopes to launch a small contracting business that can provide stable
    jobs for her community and mentor younger workers, especially recent immigrants, while ensuring a secure future for her family.
