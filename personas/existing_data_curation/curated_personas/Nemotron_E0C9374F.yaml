  hobbies: '[''Journaling'', ''Sudoku puzzles'', ''Mystery novels'', ''Yoga'', ''Balcony gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Small‑group book club'', ''Intimate salsa dancing lessons'']'
  career_goals: She aims to become a Certified Public Accountant (CPA) and later acquire the Certified Internal Auditor (CIA) designation. Marianela aspires to move into a senior audit manager role within
    a leading firm, leading a small team that handles complex audits for local businesses. Over the next decade, she envisions establishing her own boutique accounting practice that offers personalized
    tax and audit services to family‑owned enterprises in Naranjito and surrounding municipalities, while maintaining a balanced workload to manage stress.
