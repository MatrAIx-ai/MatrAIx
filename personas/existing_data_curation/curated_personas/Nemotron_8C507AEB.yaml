  career_goals: Although only three, Felica often declares that she wants to become an artist who creates bright pictures for everyone, a teacher who shares stories, or an explorer who discovers new ideas.
    Her competitive nature pushes her to be 'the best' at drawing and building, suggesting early ambitions toward leadership in creative fields. She also shows a budding interest in understanding how things
    work, hinting at future curiosity-driven careers such as a scientist or inventor.
