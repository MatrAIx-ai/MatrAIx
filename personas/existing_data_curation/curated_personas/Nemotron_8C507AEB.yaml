personas:
  professional: An imaginative toddler named Felica Tchir approaches sandbox play as an early form of project management; they channel boundless curiosity into building block constructions while balancing
    a love for organized patterns with spontaneous creativity, showing a quietly competitive spirit even in pretend play.
  sports: An enthusiastic three‑year‑old named Felica Tchir participates in the local preschool soccer program; they cheer for the nearby professional baseball team the Red Sox, mix high‑energy playground
    climbing with a habit of watching cartoon sports heroes, and can become overly competitive when racing friends.
  arts: A curious little artist named Felica Tchir delights in finger‑painting abstract swirls, humming tunes like 'The Wheels on the Bus' and 'Baby Shark'; they spend afternoons arranging picture books
    by color, showcasing their artistic appreciation, love for vibrant visuals, and a subtle need for order.
  travel: A family‑oriented explorer named Felica Tchir has toured the nearby state beach and a weekend farm stay; they love the tactile experience of building sandcastles at Ocean Shore, yet prefer short
    trips because new environments can trigger their worry, balancing curiosity with a need for familiar comfort.
  culinary: A selective eater named Felica Tchir adores cheesy macaroni, sweet banana slices, and carrot sticks with ranch dip; they enjoy stirring pancake batter with a tiny wooden spoon, but often refuse
    broccoli, reflecting a routine‑focused palate and occasional stubbornness.
  core: Felica Tchir is a curious, slightly anxious three‑year‑old who balances creative play with a competitive streak, meticulous organization, and a habit of worrying about new experiences; they often
    seek comfort in familiar routines.
background:
  cultural: Felica is raised in a middle-class, white American family in suburban Buffalo Grove, Illinois. Her household reflects typical Midwestern values that prioritize early childhood education, family
    time, and community involvement. The family regularly visits the local library for storytime, participates in preschool art programs, and takes occasional trips to the Art Institute of Chicago, exposing
    her to a broad range of artistic experiences. Seasonal community events, such as fall festivals, holiday parades, and park clean-up days, provide a sense of local civic pride. While her ancestry includes
    European roots (e.g., German and Irish), the family embraces a multicultural perspective through the celebration of holidays like Thanksgiving and Halloween, fostering an open and inclusive outlook.
