persona_description: A researcher from Utrecht University who specializes in the study of animal welfare, particularly in the field of alternative housing for farm animals. She is passionate about finding
  alternatives to cage housing and believes that ending cage housing has positive effects on the behaviour and welfare of animals. She is also interested in sustainability and the environmental impact of
  different housing systems. She is aware of the challenges involved in switching to cage-free alternatives and is committed to involving all stakeholders in the process to ensure the success of the transition.
