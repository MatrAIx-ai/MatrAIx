    ''Team Leadership'']'
  hobbies: '[''Morning jog along Lake Michigan'', ''Weight training in home garage'', ''Woodworking and furniture making'', ''Cooking nutritious meals'', ''Reading historical non-fiction and self‑help books'',
    ''Volunteering as youth fitness mentor'', ''Participating in community charity runs'', ''Playing chess at the local club'']'
  career_goals: Looking ahead, Donn is focused on transitioning from daily class instruction to a leadership role that leverages his organizational strengths and desire for stability. Over the next three
    years he plans to earn the Certified Strength and Conditioning Specialist (CSCS) credential and complete a certification in Senior Fitness Specialization, positioning himself to develop a flagship program
    for adults 50 and older. His goal is to become the manager of his current fitness center, overseeing operations, staff development, and community outreach, while eventually opening a boutique studio
    that offers structured, evidence‑based functional training for the local senior population. By building a diversified revenue stream through workshops, corporate wellness contracts, and a modest line
    of instructional videos, he aims to secure financial peace of mind for his family and reduce the stress that often accompanies the fluctuating income of freelance trainers.
