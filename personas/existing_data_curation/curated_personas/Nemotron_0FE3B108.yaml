personas:
  professional: Donn Collins, a 54‑year‑old senior exercise trainer with NASM and ACE certifications, channels three decades of meticulous class planning, functional movement screening, and calm, motivating
    communication into reliable fitness programs that reflect their preference for structure while flexibly adapting workouts for middle‑aged and senior clients, positioning them for an upcoming transition
    into senior‑fitness program management.
  sports: Donn Collins starts each morning with a 5‑mile jog along the Lake Michigan shoreline, follows it with garage weight‑training, competes in a weekend adult basketball league at the North Chicago
    Community Center, and faithfully follows the Chicago Bears, Cubs, and Blackhawks, often gathering with friends at the local sports bar to watch games and discuss team strategies.
  arts: Donn Collins expresses creativity through meticulous woodworking projects—from reclaimed‑wood coffee tables to handcrafted wooden toys—spends evenings immersed in historical biographies by David
    McCullough and self‑improvement titles by James Clear, and relaxes on weekends attending Chicago Shakespeare Theater productions and listening to blues legends Muddy Waters and folk storyteller John
    Prine.
  travel: Donn Collins prefers low‑stress, well‑planned trips, frequently taking weekend drives to the Lake Michigan shoreline for family picnics, making annual pilgrimages to Milwaukee’s German‑style beer
    gardens, and traveling to Germany to explore ancestral towns, while dreaming of a future hiking vacation in the French Alps that balances adventure with a structured itinerary.
  culinary: Donn Collins, an adept home cook, regularly prepares portion‑controlled meals such as grilled salmon with quinoa and roasted beets, kale‑avocado salad dressed with lemon‑olive oil, and occasional
    homemade chicken pot pie featuring whole‑wheat crust, always emphasizing fresh lake fish, seasonal vegetables like carrots and Brussels sprouts, and a modest use of herbs like rosemary and thyme.
  core: Donn Collins, a meticulous mid‑life fitness veteran, balances a disciplined routine of early jogs, woodworking, and careful budgeting with a lingering tendency to over‑analyze every decision, often
    staying up late worrying about finances despite their well‑structured life.
background:
  cultural: Donn was raised in a working‑class family in the suburbs of Chicago, in a region with strong Midwestern roots and a significant Polish‑German heritage. His upbringing emphasized hard work, modesty,
    and a close‑knit community, values reflected in his commitment to reliable service and local involvement. He grew up attending a Lutheran church, which reinforced a sense of stewardship and compassion,
    while his family’s tradition of weekend outings to the nearby lakefront and local fairs fostered his love for outdoor activity. The cultural mosaic of North Chicago, with its mix of industrial and lake‑side
    neighborhoods, has shaped Donn’s pragmatic outlook and his appreciation for both structured routines and community flexibility.
attributes:
  skills: '[''NASM Certified Personal Trainer'', ''ACE Certified Group Fitness Instructor'', ''CPR/AED Certified'', ''Exercise Physiology Knowledge'', ''Periodized Program Design'', ''Functional Movement
