  career_goals: Even at six, Chadric dreams big. His fascination with stars and space fuels an ambition to become an astronaut, imagining himself exploring the cosmos and discovering new worlds. The vivid
    colors and shapes he loves to draw spark a parallel desire to be a graphic artist, creating illustrations that capture fantastical ideas. His competitive streak also fuels a playful aspiration to become
    a professional basketball player, motivated by the excitement of games and the urge to win. These ambitions are guided by his curiosity, love of art, and a drive to excel in whatever field he chooses.
