personas:
  professional: Chadric Percy, a budding junior builder with a love for LEGO engineering and watercolor illustration, demonstrates early problem‑solving skills and a meticulous yet imaginative approach
    to projects, balancing a strong sense of responsibility with the flexible curiosity of a six‑year‑old.
  sports: Chadric Percy dives into weekend soccer at the neighborhood park as a spirited striker for their local youth club, cheering for the Cleveland Browns and Cleveland Cavaliers while fiercely competing
    for goals, and they relish the structured drills as much as the free‑play scrimmages.
  arts: Chadric Percy immerses themselves in vibrant art by copying watercolor scenes from picture books, humming along to Miles Davis jazz tracks and Kendrick Lamar beats at home, and attending child‑friendly
    performances at Playhouse Square, where they admire the storytelling of Lin‑Manuel Miranda and the bold colors of local muralists.
  travel: Chadric Percy’s travel style blends family‑planned weekend trips to Cuyahoga Valley National Park’s explorer trails with imaginative day‑dreams of flying to Disney World and the London Natural
    History Museum, preferring hands‑on experiences over long flights and rarely negotiating budget constraints beyond the occasional souvenir.
  culinary: Chadric Percy favors comfort foods like creamy mac and cheese, sweet‑potato pie, and fried chicken nuggets, enjoys helping stir in cheddar cheese and cornmeal for homemade cornbread, but their
    cooking skill remains at the level of mixing batter and decorating crayon‑shaped cookie cutters, reflecting a love for flavor and a penchant for messy kitchens.
  core: Chadric Percy is a curious six‑year‑old builder who balances disciplined LEGO projects with spontaneous crayon sketches, fiercely competes on the soccer field, saves allowance for prized sets while
    occasionally splurging on treats, and navigates allergies with a mix of vigilance and forgetfulness.
background:
  cultural: Chadric is part of a Black family rooted in Cleveland’s vibrant African American community. Family gatherings often feature soul food recipes passed down through generations, accompanied by
    stories of resilience and cultural pride. His parents expose him to local cultural events, such as performances at Playhouse Square and festivals in the city’s cultural gardens, fostering an appreciation
    for Black artistic contributions. Attending church with his family reinforces communal values and introduces gospel music, which he enjoys humming along with. Visits to the Cleveland Museum of Art and
    the nearby African American art exhibits broaden his understanding of heritage, while community programs at local youth centers provide mentorship and celebrate Black history. These experiences shape
    his identity, encouraging curiosity, artistic expression, and a strong sense of belonging.
