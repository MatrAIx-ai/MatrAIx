personas:
  professional: Riley Mccrorey is an experienced retail supervisor who leverages a structured, data‑driven approach and a community‑first mindset—shaped by church‑based values of respect and harmony—to
    streamline staff scheduling, inventory control, and loss‑prevention while mentoring frontline associates toward higher performance.
  sports: Riley Mccrorey hits the local gym for early‑morning jogs and strength circuits, joins a Saturday pickup basketball league at the community center, roots for the Charlotte Hornets during NBA season,
    and supports the Carolina Panthers on Sundays, while they maintain a disciplined routine that balances cardio with weightlifting.
  arts: Riley Mccrorey unwinds by listening to R&B and neo‑soul icons such as H.E.R., Leon Bridges, and Jorja Smith, revisits gospel classics from the church choir, attends occasional exhibits at the Fayetteville
    Museum of Art, and draws inspiration from the storytelling traditions of local folk musicians, which they often cite as motivation for their own DIY projects.
  travel: Riley Mccrorey prefers short, well‑planned road trips to Southern cultural hubs—like Asheville’s Blue Ridge scenery, Charleston’s historic waterfront, and Savannah’s oak‑lined squares—balancing
    a love for history with a modest budget that still leaves room for occasional family visits to Washington, D.C., and they always schedule travel around community events like Juneteenth celebrations.
  culinary: Riley Mccrorey enjoys crafting Southern comfort meals—spicy fried catfish, buttery collard greens, and grain‑y cornbread—using pantry staples like smoked paprika and buttermilk, and while they’re
    comfortable plating a crowd‑pleasing shrimp‑and‑grits, they occasionally over‑season their dishes in a quest for the perfect flavor punch.
  core: Riley Mccrorey is a disciplined retail leader who blends quiet confidence with a love for gospel‑rooted R&B, a habit of over‑scrutinizing spreadsheets, and a weekend penchant for DIY woodworking
    that often leaves the garage a cluttered workshop.
background:
  cultural: Riley is a Black man raised in Fayetteville, North Carolina, where Southern Black culture blends with the city's military and academic influences. He grew up attending a historically Black church
    that emphasized community, respect, and perseverance, and celebrated traditions like Juneteenth, gospel music, and soul food with his family. His parents worked in local manufacturing and later encouraged
    him to pursue higher education at Fayetteville State University, where he completed some college coursework in business before entering retail. The combination of Southern hospitality, church community
    values, and a strong sense of resilience shapes his identity and informs his cooperative, harmony‑seeking approach at work and in his personal life.
attributes:
  skills: '[''Team leadership'', ''Retail operations management'', ''Staff scheduling'', ''Inventory control'', ''POS system operation'', ''Visual merchandising'', ''Loss prevention'', ''Conflict resolution'',
    ''Employee training and development'', ''Sales data analysis'', ''Budgeting and cost control'', ''Safety and compliance enforcement'']'
  hobbies: '[''Reading non-fiction and self-improvement books'', ''Jogging and strength training at the local gym'', ''Playing basketball in a small pickup group'', ''Cooking Southern-inspired meals'',
    ''DIY woodworking projects'', ''Listening to R&B and neo-soul music'', ''Volunteering as a tutor at a community center'', ''Exploring Fayetteville history museums'', ''Playing video games on a console'']'
  career_goals: Riley aims to advance to store manager within the next two years, leverage his supervisory experience to oversee a larger retail unit, and eventually become a district manager overseeing
    multiple locations across the Southeast. He plans to complete his associate degree in Business Administration and enroll in leadership development programs offered by his employer. He also aspires to
    mentor younger employees, champion diversity and inclusion initiatives in his stores, and integrate data‑driven decision‑making to improve sales performance. Long‑term, he envisions opening a community‑focused
    boutique that highlights local artisans and provides job training for Fayetteville youth.
