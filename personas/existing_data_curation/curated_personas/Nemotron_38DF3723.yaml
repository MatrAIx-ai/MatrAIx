  hobbies: '[''Gardening'', ''Woodworking'', ''Card games and board games'', ''Cooking traditional Guatemalan meals'', ''Dancing to Latin music'', ''Attending local fairs and church events'', ''Reading
    historical novels'', ''Volunteering as a tour guide'', ''Learning to use digital technology for family communication'']'
  career_goals: Although retired from formal employment, Patrick aims to remain an active contributor to his community. He hopes to establish a monthly “Guatemalan Heritage Night” at the local senior center,
    where he can teach cooking, dance, and language to residents. He also plans to document his life story and family history in a memoir that can be shared with both his Guatemalan relatives and the Ida
    Grove community. Maintaining his health, staying socially engaged, and learning to use a tablet for video calls with family in Guatemala are other personal ambitions.
