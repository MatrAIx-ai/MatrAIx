personas:
  professional: Alicia Cottone, a veteran youth sports coach and community organizer with a humanities graduate background, leverages two decades of scouting expertise to craft structured yet adaptable
    training programs, weaving motivational storytelling and mindfulness into practice while juggling spontaneous community events that often test their penchant for order and their sensitivity to stress.
  sports: Alicia Cottone, an avid weekend hiker on the Appalachian Trail and regular salsa‑dance participant, coaches the Seymour Youth Soccer League, volunteers with low‑impact fitness games at the senior
    center, and roots for the New England Patriots and Boston Red Sox, balancing structured conditioning drills with spontaneous, fun‑focused sessions that reflect their love for both order and flexibility.
  arts: Alicia Cottone, a dedicated member of her community theater’s set‑design crew and script‑reading facilitator, chairs a book club that devours contemporary fiction like Sally Rooney’s Normal People,
    admires playwright Sarah Ruhl, and fills their evenings listening to Andrea Bocelli and attending local jazz nights, using the arts as a soothing counterbalance to their daily stress.
  travel: Alicia Cottone enjoys a hybrid travel style that mixes meticulous itinerary planning for trips to places like Florence, Italy, and Kyoto, Japan, with spontaneous weekend getaways to the Adirondacks
    and a dream of trekking Patagonia’s Torres del Paine, all while budgeting carefully to stretch a modest retirement nest egg.
  culinary: Alicia Cottone, a proficient home cook who transforms garden‑grown tomatoes, basil, and zucchini into classic Italian dishes such as fresh tagliatelle al ragù, caprese salad, and roasted eggplant
    parmigiana, balances their love for traditional recipes with occasional experimental twists like zucchini‑pesto pizza, and enjoys pairing meals with a robust espresso.
  core: Alicia Cottone, a 55‑year‑old community‑focused coach, theater enthusiast, and garden‑to‑table cook, balances a love for structure with spontaneous bursts of creativity, cares deeply for others
    while quietly wrestling with anxiety and an occasional habit of misplacing budget notes.
background:
  cultural: Alicia is a third‑generation Italian‑American raised in the suburban towns of New Haven County. Her family’s Catholic roots and the close‑knit immigrant community instilled a strong sense of
    family loyalty, hospitality, and service to others. Growing up in a predominantly white, middle‑class New England environment, she adopted the region’s pragmatic work ethic while maintaining the expressive
    storytelling tradition of her heritage. Her humanities education deepened her appreciation for literature, cultural diversity, and ethical discourse, which she weaves into her coaching philosophy and
    community involvement.
