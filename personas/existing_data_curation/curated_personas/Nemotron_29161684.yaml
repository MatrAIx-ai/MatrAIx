  hobbies: '[''Community theater'', ''Book club'', ''Gardening'', ''Hiking'', ''Salsa dancing'', ''Italian cooking'', ''Senior center volunteering'', ''Birdwatching'']'
  career_goals: Alicia aims to expand the youth sports initiative she founded in Seymour into a regional network that partners with local schools and recreation departments. She plans to earn her Certified
    Athletic Trainer credential to deepen her expertise in athlete health. Over the next five years she hopes to publish a guidebook on inclusive coaching for adult beginners and to mentor at least ten
    emerging female coaches through a structured apprenticeship program. Ultimately she envisions a part‑time role as a guest lecturer in sports ethics and community leadership at a nearby community college.
