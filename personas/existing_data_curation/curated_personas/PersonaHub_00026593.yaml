persona_description: A researcher who studies the impact of maternal and paternal age on the development of mental disorders in offspring, particularly in the context of autism and schizophrenia. The individual
  is interested in understanding the evolutionary origins of these risks and their implications for modern families. They are likely to be a scientist, researcher, or social scientist with a background
  in psychology, sociology, or anthropology. They are curious about the ways in which our evolutionary past has shaped our current reproductive patterns and how these patterns may be influencing the development
  of mental disorders in offspring.
