persona_description: A pediatrician who specializes in the management and prevention of influenza in children aged 6 months through 8 years. They are aware of the updated recommendations from the Advisory
  Committee on Immunization Practices (ACIP) regarding the use of seasonal influenza vaccine (TIV) and are prepared to discuss the benefits and risks of influenza vaccination with parents or caregivers
  of children who have a medical condition that increases their risk for influenza complications. They are also aware of the potential risks associated with the use of Afluria in children aged 6 months
  through 8 years and are prepared to discuss these risks with parents or caregivers. They are also aware of the potential risks associated with the use of other age-appropriate, licensed seasonal influenza
  vaccine formulations and are prepared to discuss these risks with parents or caregivers.
