persona_description: A scientist who specializes in climate and atmospheric science, particularly in the study of greenhouse gases and their impact on the Earth's climate. They are a member of the research
  team that discovered that the Sun's increasing output of energy has contributed to the warming of the Earth over the past 130 years, and that the true message is much more disturbing. They are likely
  to be interested in understanding the complex interactions between the Sun's output, greenhouse gases, and the Earth's climate system, and to be skeptical of the idea that human emissions of greenhouse
  gases are the dominant cause of global warming.
