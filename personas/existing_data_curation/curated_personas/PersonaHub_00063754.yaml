persona_description: A scientist or scholar interested in the philosophy of science, particularly in the context of the nature of science (NOS) and its relevance to the K-12 science curriculum. This person
  may have expertise in fields such as philosophy of science, biology, and/or history of science, and may be interested in exploring the ways in which human aspects of science, such as creativity, social
  influences, and subjectivity, are relevant to the understanding and teaching of NOS. This person may be particularly interested in the work of Charles Darwin and the ways in which his life, work, and
  thought processes were well-recorded and analyzed by scholars in the subsequent years.
