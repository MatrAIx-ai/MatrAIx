persona_description: A paleoecologist who specializes in the study of large herbivores, particularly their impact on the evolution of grassy habitats and the adaptation of large animals to their environment.
  Mihlbachler's research focuses on the Miocene epoch and the role of large herbivores in the spread and adaptation of grasses, as well as the impact of these animals on the evolution of plant-eating mammals.
  He is interested in the biological signatures of Proboscidea species and the cascading effects of their absence on other organisms.
