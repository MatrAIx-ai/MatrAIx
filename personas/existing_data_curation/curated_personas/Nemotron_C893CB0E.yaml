  career_goals: Natalie aims to transition into a mentorship and advisory role that leverages her decades of bedside experience while allowing greater flexibility in her schedule. She plans to earn a Certified
    Gerontological Nurse (CGN) credential and shift toward part‑time home health nursing focused on seniors. Additionally, she hopes to teach clinical rotations at a local community college nursing program
    and develop a volunteer health‑outreach initiative in underserved neighborhoods of Glendale. Long‑term, she envisions authoring a practical guide on self‑management of chronic conditions for older adults
    and consulting for assisted‑living facilities on best practices in patient care.
