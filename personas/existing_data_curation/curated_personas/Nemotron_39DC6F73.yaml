  career_goals: Israel aims to become a principal engineer and eventually a chief technology officer, leading teams that build inclusive tech products empowering underrepresented communities. He plans to
    launch a startup delivering AI‑driven educational platforms for Black youth, secure patents in human‑centered interface design, and become a thought leader by speaking at conferences such as Code4BlackFuture
    and publishing articles on inclusive design. He also seeks to mentor emerging Black developers and increase diversity within Atlanta’s thriving tech ecosystem.
