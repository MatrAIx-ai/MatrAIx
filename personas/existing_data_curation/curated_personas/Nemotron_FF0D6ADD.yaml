personas:
  professional: Sherry Bridges is an aspiring junior naturalist who channels their love of wildlife and structured curiosity into detailed sketchbooks, coding puzzles, and leading organized field trips
    for their school's nature club, where they balance meticulous planning with gentle assertiveness.
  sports: Sherry Bridges is a member of the South Florida Junior Kayak Club, enjoys weekend paddling sessions with family, follows the Miami Heat and the Florida Gators, and participates in occasional after-school
    swim practices to stay fit.
  arts: Sherry Bridges draws inspiration from Beatrix Potter and John James Audubon, delights in Vivaldi’s Four Seasons while sketching, and occasionally watches Zendaya’s performances for a splash of contemporary
    flair.
  travel: Sherry Bridges prefers low-key adventures, having explored Lake Okeechobee’s shoreline and the Everglades on school trips, dreaming of a future family vacation to the Galápagos Islands after saving
    up for travel gear.
  culinary: Sherry Bridges loves cooking simple garden-fresh meals like tomato basil pasta, caprese salad with heirloom tomatoes, and sunflower seed butter toast, often practicing with their mother using
    fresh sunflowers from their backyard.
  core: Sherry Bridges blends a methodical love of nature with quiet curiosity, balancing a tendency toward anxiety with a disciplined, structured approach to learning and leisure.
background:
  cultural: Sherry comes from a White, middle‑class family rooted in Okeechobee, Florida. Her upbringing reflects the blend of Southern hospitality and the unique environment of the Florida Glades. Family
    gatherings often feature home‑cooked meals with seasonal produce from their garden, and Sunday church attendance provides a sense of community. Local traditions, such as the Okeechobee County Fair and
    fishing trips on Lake Okeechobee, influence her appreciation for nature and community events. The warm, humid climate encourages outdoor activities like kayaking, wildlife observation, and gardening,
    shaping her connection to the Everglades ecosystem and its conservation values.
attributes:
  skills: '["Organizational skills (using planners and checklists)", "Attention to detail in schoolwork and crafts", "Basic computer literacy (typing, educational software)", "Reliable team member (listening
    and following instructions)", "Pet care (basic rabbit care)"]'
  hobbies: '["Reading mystery and nature books", "Sketching wildlife and maintaining a sketchbook", "Participating in school nature club and organizing field trips", "Kayaking with family", "Basic coding
    puzzles", "Gardening (vegetable and flower beds)"]'
  career_goals: Sherry dreams of a future where she can combine her love for animals and her methodical nature. She aspires to become a veterinarian, envisioning herself studying biology and caring for
    wildlife rescued from the Everglades. She also imagines working as a science teacher, because she enjoys explaining step‑by‑step processes to peers. In the short term, she wants to earn a science fair
    award and later volunteer at a local animal shelter, building experience for her long‑term goal of a career in animal health or education.
