  hobbies: '[''Fishing on Puget Sound'', ''Hiking forest trails'', ''Woodworking'', ''Community garden volunteering'', ''Reading historical non-fiction'', ''Watching documentaries on ecosystems'', ''Attending
    live music shows'', ''Wine tasting with friends'']'
  career_goals: George aims to transition from managing individual properties to overseeing a portfolio of community-focused developments that incorporate green building standards. He aspires to become
    a regional manager for a midsized firm, championing affordable housing initiatives in the Pacific Northwest. In the longer term, he dreams of launching his own boutique property management company that
    emphasizes resident well-being, technology-driven efficiency, and environmentally responsible practices. While pursuing these ambitions, he wants to develop leadership skills that allow him to mentor
    younger staff and foster a collaborative workplace culture despite his own tendency to be loosely organized.
