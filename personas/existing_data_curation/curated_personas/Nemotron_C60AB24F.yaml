  hobbies: '[''Visiting art galleries and street‑mural tours'', ''DIY natural beauty product experimentation'', ''Cooking traditional Mexican dishes'', ''Salsa and cumbia dancing'', ''Yoga and meditation'',
    ''Hiking in the Sierra Nevada foothills'', ''Exploring Central Valley wine country'', ''Social media content creation (beauty tutorials)'', ''Community event volunteering (cultural festivals)'', ''Reading
    books on art history and psychology'']'
  career_goals: Maria aspires to become a leading stylist and entrepreneur within the Central Valley community. In the next three years, she aims to complete advanced certifications in color artistry and
    advanced skin treatments, positioning herself as a go‑to expert for culturally nuanced looks. Her long‑term ambition is to open a boutique salon that merges contemporary beauty services with Mexican
    folk artistry, offering specialty services for events such as quinceañeras and Día de los Muertos celebrations. She also envisions launching her own line of natural hair‑care and skincare products inspired
    by traditional Mexican ingredients like chía, avocado, and aloe. Beyond business growth, Maria wants to mentor young Mexican‑American aspiring stylists through workshops and community outreach, fostering
    inclusive representation in the beauty industry. To sustain her creative energy, she plans to incorporate regular mindfulness and yoga practice, strengthening her resilience against the stress she sometimes
    feels.
