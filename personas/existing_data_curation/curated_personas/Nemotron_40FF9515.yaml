personas:
  professional: Alicia Cushenberry, a 38‑year‑old full‑stack developer, leverages over a decade of expertise, merging Python and JavaScript mastery with a keen eye for UI/UX drawn from their art practice
    to craft accessible, cloud‑native microservices, while they quietly champion inclusive mentorship and steer architectural decisions toward collaborative, humane team cultures.
  sports: Alicia Cushenberry, a 38‑year‑old, maintains a low‑key fitness regimen centered on solo runs along Lincoln Park’s quiet trails with the Chicago Trail Runners club, enjoys occasional pickup basketball
    at a community court, and follows the Chicago Cubs and Chicago Blackhawks for seasonal cheer, though they prefer the solitude of watching games at home rather than in bustling stadiums.
  arts: Alicia Cushenberry, at 38, frequents Chicago’s contemporary galleries, drawing inspiration from artists like Theaster Gates and Refik Anadol while they experiment with generative visuals in p5.js,
    devour speculative fiction by N.K. Jemisin and Afro‑centric poetry by Claudia Rankine, and unwind to the saxophone reveries of Kamasi Washington in intimate jazz clubs.
  travel: Alicia Cushenberry, now 38, curates deliberately unhurried trips that balance quiet reflection with creative stimulus, having explored the minimalist architecture of Kyoto and the aurora‑lit fjords
    of Iceland while they now dream of wandering the vibrant souks of Marrakech and the literary cafés of Dublin, always favoring Airbnb rentals that offer a private workspace for coding.
  culinary: Alicia Cushenberry, a 38‑year‑old, channels their artistic flair into the kitchen, crafting plant‑based soul‑food inspired dishes such as smoked paprika jackfruit BBQ ribs, creamy kale and quinoa
    salad with toasted pepitas, and a vegan sweet‑potato gumbo, while they relish the quiet ritual of cooking at home and occasionally treat themselves to a modest tasting menu at Chicago’s hidden speakeasy‑style
    restaurants.
  core: Alicia Cushenberry, at 38, blends a quiet, introspective tech career with a vibrant visual‑art hobby, navigating high anxiety through disciplined routines, soulful plant‑based cooking, and a steadfast
    commitment to mentoring underrepresented developers, while they prioritize personal well‑being above all.
background:
  cultural: Alicia’s cultural background is rooted in the African‑American community of Chicago’s South Side, where she grew up surrounded by a rich tapestry of music, oral storytelling, and visual art.
    Her family’s traditions—from church choirs to Saturday soul‑food gatherings—instilled a deep appreciation for community and resilience. She draws inspiration from Chicago’s historic contributions to
    blues, jazz, and the Black Arts Movement, which inform both her artistic tastes and her commitment to representation in tech. As a Black woman in a predominantly white industry, Alicia actively participates
    in local initiatives like Black Girls Code and the Chicago Tech Inclusion Network, using her platform to mentor and amplify the voices of other underrepresented developers. Her cultural identity shapes
    her worldview, emphasizing collective uplift, social justice, and the celebration of Black creativity.
