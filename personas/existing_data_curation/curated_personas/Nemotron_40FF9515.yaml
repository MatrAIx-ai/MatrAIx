    coding projects'']'
  career_goals: Alicia aims to progress into a senior engineering or technical lead role where she can shape architectural decisions while preserving a collaborative, inclusive culture. She is passionate
    about mentoring Black and other underrepresented developers, and hopes to launch an internal mentorship program at her company. Over the next five years she plans to deepen her expertise in cloud‑native
    microservices and AI‑augmented user experiences, eventually contributing to open‑source projects that blend art and technology. She also aspires to achieve a balanced work‑life rhythm that supports
    her mental wellness, possibly by moving into a remote‑first position that offers quiet, focused workspaces.
