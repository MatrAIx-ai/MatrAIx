persona_description: A Zoo Professional who is interested in conservation efforts and is involved in the zoo industry. They are knowledgeable about the impact of human activities on wildlife and are interested
  in understanding the economic benefits of conservation efforts. They are also interested in the role of tourism in the economy and how it can be used to inform trade-offs in conservation-fishery management
  decisions. They are likely to be familiar with the work of the Institute for Coastal & Marine Research and the project "Can we afford to lose African penguins?" and are interested in the economic benefits
  of conservation efforts.
