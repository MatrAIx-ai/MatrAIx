  hobbies: '[''Herb gardening'', ''Knitting and crocheting'', ''Crossword puzzles'', ''Sudoku'', ''Reading classic literature'', ''Watching vintage films'', ''Weekly church attendance'', ''Bridge'', ''Genealogy
    research'', ''Walking in Fairmount Park'', ''Neighborhood clean‑up volunteer work'']'
  career_goals: Regina’s primary ambition is to preserve her independence by keeping her home safe, organized, and stress‑free. She aims to complete a memoir that records her family’s history and the changes
    she has witnessed in Philadelphia, leaving a tangible legacy for future generations. She also intends to continue volunteering at the local senior center, coordinating activities and training new volunteers,
    while advocating for improved accessibility in her apartment building. Occasionally, she participates in senior bridge tournaments, seeking the modest competitive challenge they provide.
