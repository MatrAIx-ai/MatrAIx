persona_description: A scholar from various disciplines related to African Studies who is gaining the upper hand in the engagement with the phenomenon called the African middle class(es). They are interested
  in the potential economic role of these social layers, their political relevance, and the differences in political and social orientations of members of a middle class, their different roles and positions
  in social struggles, and their interests. They are cautious about providing simplified and sweeping explanations about the scope for potential social and political reforms and the impact on transformation
  of societies these middle classes are able – or willing – to promote.
