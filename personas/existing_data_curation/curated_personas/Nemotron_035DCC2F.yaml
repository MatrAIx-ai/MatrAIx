  hobbies: '[''Running (5K races)'', ''Cooking Puerto Rican cuisine'', ''Playing guitar'', ''Reading mystery novels'', ''Playing chess'', ''Family outings in local parks'', ''Participating in cultural festivals'',
    ''Volunteering at health fairs'']'
  career_goals: Eduardo aims to become a medical director of a community health center within the next five years, leading initiatives to reduce health disparities among the growing Hispanic population
    in Central Florida. He plans to develop a comprehensive chronic disease management program, expand telehealth services, and mentor junior physicians. In the longer term, he aspires to open his own bilingual
    family practice clinic that integrates preventive health education and culturally tailored wellness programs. His competitive drive also pushes him to achieve top performance scores in patient satisfaction
    and clinical outcome metrics.
