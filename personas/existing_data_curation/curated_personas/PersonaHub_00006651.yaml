persona_description: A medical professional who specializes in the study of malaria and its virulent forms. This person is concerned about the increasing number of severe malaria cases and has initiated
  research to find the reason for the virulent form of the disease. They are cautious about the coming months when there might be a spurt in malaria cases and have initiated a collaborative study with another
  hospital to ascertain the cause. They have seen such cases for 2 to 3 years and are concerned about the increasing number of such patients over the years. They have been approached by doctors at PGI and
  Government Medical College and Hospital (GMCH) who have come across malaria cases in severe forms, including renal failure, dengue-like dips in platelet counts, and jaundice.
