  hobbies: '["Walking club", "Health‑fair volunteering", "Book club", "Gardening", "Farm‑to‑table cooking", "Line dancing", "Hiking", "Quilting", "Community theater"]'
  career_goals: Kim aims to advance her career by completing an LPN (Licensed Practical Nurse) program while continuing part‑time work, eventually transitioning to a licensed nursing role. She aspires to
    become a shift supervisor or lead nursing assistant, taking responsibility for staff scheduling, quality‑improvement initiatives, and mentoring new hires. Long‑term, she is interested in specializing
    in geriatric care, obtaining certification in chronic disease management, and possibly launching a community health outreach program for seniors in Venango County. Kim values lifelong learning, attends
    healthcare workshops and conferences, and hopes to remain actively involved in the local health system even after retirement.
