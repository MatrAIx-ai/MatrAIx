personas:
  professional: Kim Hollis is a seasoned nursing assistant with 25 years of hands‑on patient care expertise—vital‑sign monitoring, wound care, medication assistance under supervision, and rigorous infection‑control—who
    channels their organized, achievement‑driven nature into efficient record‑keeping, staff training, and collaborative team leadership while pursuing an LPN to become a shift supervisor.
  sports: Kim Hollis enjoys weekly hikes with the Venango County Senior Walking Club, seasonal line‑dancing at the community center, and passionately rooting for the Pittsburgh Steelers and Penguins, balancing
    cardio fitness with social camaraderie and a steady approach to staying active.
  arts: Kim Hollis immerses themselves in the arts through community theater productions of Our Town, line‑dancing to Dolly Parton and Johnny Cash, a book club devoted to historical fiction authors like
    Philippa Gregory and Ken Follett, and crafting quilts inspired by Georgia O'Keeffe’s palettes for local charity auctions.
  travel: Kim Hollis prefers carefully planned road trips that blend adventure and relaxation, such as weekend hikes in Pennsylvania’s Ricketts Glen and Presque Isle State Parks with their husband, and
    they dream of a spring pilgrimage to England’s historic castles after saving for a modest overseas getaway.
  culinary: Kim Hollis transforms harvests from their vegetable garden into farm‑to‑table meals like heirloom tomato and basil bruschetta, roasted beet and goat‑cheese salad, and seasonal apple crisp, showcasing
    a confident home‑cook’s skill while occasionally treating themselves to indulgent fried chicken from the local diner.
  core: Kim Hollis blends a nurse’s meticulous discipline with a community‑spirit’s zest, juggling nightly quilting projects, spontaneous line‑dance lessons, and a staunch habit of cataloguing every garden
    harvest in a handwritten ledger.
background:
  cultural: Kim grew up in a small, working‑class town in western Pennsylvania, immersed in the values of the Appalachian region—self‑reliance, close‑knit community bonds, and a strong work ethic. Her family
    has deep roots in the area, reflecting a heritage of modest living, Protestant influences, and a love for local traditions such as community festivals, folk music, and seasonal agricultural cycles.
    The rural environment fostered her appreciation for nature, seasonal foods, and neighborly support, which she carries into her professional life as a caring and dependable healthcare provider.
attributes:
  skills: '["Vital‑sign monitoring", "Wound care", "Activities of daily living assistance", "Medication assistance (supervised)", "Infection control", "Medical documentation", "Supply inventory management",
