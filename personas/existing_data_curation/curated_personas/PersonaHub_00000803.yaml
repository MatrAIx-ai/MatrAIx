persona_description: An environmental historian who specializes in the study of the United States' "vanishing wilderness", particularly in relation to the early 1800s. His research interests include, but
  are not limited to, the impact of the natural environment on American culture, the role of literary vehicles in communicating about the environment, and the influence of New England and New York intellectuals
  on environmental thought. He is also interested in the works of Thomas Cole, Francis Parkman, and Washington Irving, and the impact of their environmental writings on modern environmental thought.
