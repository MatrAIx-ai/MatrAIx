    mini-projects'']'
  career_goals: Debra aspires to blend her love for art and technology by pursuing a career as a creative technologist or multimedia designer. She envisions attending a university with a strong visual arts
    program, then moving into roles such as UX/UI designer, art director, or interactive exhibit curator at a museum. She also dreams of launching her own social‑impact art studio that engages teens in
    collaborative public art projects across Nevada. In the short term, she aims to win regional art competitions, secure an internship with a local design firm, and build a robust portfolio.
