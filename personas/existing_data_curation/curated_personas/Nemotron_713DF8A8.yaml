personas:
  professional: Debra Housworth, a budding digital artist and junior coder, channels their curiosity and methodical planning into school art club projects and collaborative coding mini‑apps, often taking
    the lead in competition‑driven contests while balancing a skeptical eye on peers' intentions.
  sports: Debra Housworth, a varsity‑level volleyball player for the Sierra Foothills High School team and member of the local Sierra Peaks Volleyball Club, roots for the UNLV Rebels women's volleyball
    and the Vegas Golden Knights, and regularly hikes the Sierra foothills for both fitness and photographic inspiration.
  arts: Debra Housworth, an avid sketcher and mixed‑media creator, draws inspiration from Frida Kahlo's bold colors, Ansel Adams' desert photography, and contemporary street artist Banksy, frequently attending
    Nevada Museum of Art exhibitions and community theater productions of classics like "Our Town."
  travel: Debra Housworth prefers weekend road trips that blend adventure and sketching, having explored Joshua Tree National Park's rock formations and the historic streets of San Francisco, while dreaming
    of a study‑abroad summer in Florence to absorb Renaissance art firsthand.
  culinary: Debra Housworth enjoys experimenting with quick, colorful meals such as avocado toast topped with radish slices, homemade tacos with black beans and cilantro, and occasional forays into Thai
    pad thai, favoring fresh ingredients like lime, mint, and jalapeño.
  core: Debra Housworth is a methodical yet competitive teen who blends artistic curiosity with a disciplined approach to school projects, balancing a love for vibrant creativity with a skeptical, organized
    mindset.
background:
  cultural: Debra grew up in Reno, Nevada, a city known for its blend of frontier heritage, desert culture, and a vibrant arts scene. Her family, of European descent, values education, self‑reliance, and
    community involvement. She has been shaped by the regional appreciation for outdoor recreation—skiing in the nearby mountains and hiking in the Sierra Nevada—while also being exposed to a diverse artistic
    community through local galleries, festivals, and the University of Nevada’s cultural programs. This blend of American Western lifestyle and a supportive, culturally rich environment informs her open‑minded
    worldview and her drive to create art that reflects both individual expression and community narratives.
