personas:
  professional: Yasset Avellaneda, a seasoned audit manager with twenty‑five years mastering GAAP, IFRS, SAP and Power BI, leverages a structured, competitive mindset to streamline controls, mentor junior
    staff, and drive data‑driven risk management toward a future CFO role.
  sports: Yasset Avellaneda, a dedicated member of a local adult soccer league and avid fan of the San Jose Earthquakes, the Golden State Warriors and the San Francisco 49ers, embraces a competitive yet
    sociable fitness routine that mixes weekly matches, Saturday hikes in regional parks, and occasional pick‑up basketball games at community courts.
  arts: Yasset Avellaneda, who regularly sways at community salsa nights to the rhythms of Marc Anthony and Celia Cruz while also attending live performances by the San Francisco Symphony and catching indie
    rock shows at The Fillmore, finds that music and dance sharpen his competitive edge and provide a lively outlet for his sociable spirit.
  travel: Yasset Avellaneda prefers meticulously planned trips that blend adventure hiking in Yosemite and cultural immersion in Oaxaca’s markets, while also enjoying short weekend getaways to Napa Valley
    wineries, and dreams of a future culinary pilgrimage to Kyoto’s kaiseki restaurants despite a busy audit schedule.
  culinary: Yasset Avellaneda, an adept home chef, lovingly prepares carnitas tacos with slow‑braised pork, fresh pico de gallo and avocado crema while experimenting with Californian twists like grilled
    avocado‑lime salsa on fish tacos and pairing dishes with locally sourced heirloom tomatoes and chipotle‑infused sauces.
  core: Yasset Avellaneda, a competitive yet sociable 52‑year‑old auditor, balances a meticulous work ethic with late‑night salsa dancing, a habit of over‑checking spreadsheets, and a penchant for splurging
    on gourmet Mexican‑fusion meals.
background:
  cultural: Yasset is a first‑generation Mexican‑American who grew up in a bilingual household that emphasized family cohesion, respect for elders, and celebration of Mexican traditions. He regularly observes
    holidays such as Día de los Muertos and Mexican Independence Day, often preparing festive meals and hosting community gatherings. While fully integrated into the diverse culture of Hayward and the broader
    Bay Area, he maintains fluency in Spanish, participates in local Mexican cultural festivals, and supports community programs that promote Hispanic entrepreneurship and education.
attributes:
  skills: '["Financial analysis", "GAAP compliance", "Tax planning", "Audit management", "Data analytics (Excel, Power BI)", "ERP implementation (SAP, Oracle NetSuite)", "Risk assessment", "Team leadership",
