  hobbies: '["Adult soccer league", "Salsa dancing", "Cooking Mexican cuisine", "Hiking regional parks", "Volunteer tax assistance (VITA)", "Attending concerts and sports events", "Reading financial history",
    "Exploring fusion food venues"]'
  career_goals: Yasset aims to transition into a senior leadership role—such as Audit Director or Chief Financial Officer—within a mid‑size firm that values strategic risk management and data‑driven decision
    making. He plans to deepen his expertise in forensic accounting and sustainability reporting, earn the Certified Internal Auditor (CIA) designation, and expand his consulting practice to serve small
    businesses in the Bay Area. Additionally, he is committed to mentoring the next generation of accountants through professional societies and community tax‑assistance programs, leveraging his competitive
    spirit to set high performance standards for his teams.
