  hobbies: '["Painting", "Visiting art galleries", "Reading science-fiction", "Hiking", "Nature photography", "Playing piano", "Gardening", "Small interdisciplinary book club", "Experimental cooking"]'
  career_goals: Marjorie's primary ambition is to secure a senior research position at a leading national laboratory or university, where she can lead an independent research group focused on quantum materials
    and sustainable energy technologies. She aims to obtain a major federal grant (e.g., NSF or DOE) within the next five years, publish a series of high-impact papers, and develop a patented technology
    that bridges fundamental physics and practical applications. Additionally, she aspires to mentor a select few early-career scientists, fostering a competitive yet collaborative environment that values
    rigorous inquiry and innovative thinking.
