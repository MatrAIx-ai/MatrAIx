  career_goals: Mark dreams of transforming his current bakery into a community‑focused boutique that emphasizes sustainable, locally sourced ingredients and offers educational workshops. He hopes to develop
    a signature line of sourdough loaves and vegan pastries that reflect the coastal vibe of Encinitas. Over the next five years he wants to open a second location near the beach, launch a small‑batch flour
    brand, and mentor aspiring bakers. At the same time, he aims to create a more balanced work schedule that reduces stress, allowing him to spend more time on personal wellness and family.
