  hobbies: '[''car meets'', ''basketball pick‑up games'', ''youth sports coaching'', ''listening to R&B and hip‑hop'', ''live jazz shows'', ''hiking in the Adirondacks'', ''DIY electronics projects'', ''automotive
    podcasts'', ''racing video games'']'
  career_goals: Charles aims to become an ASE Master Technician and to earn specialized certification in hybrid and electric vehicle systems within the next three years. He envisions advancing to a service
    manager role where he can mentor younger technicians and shape shop culture around collaboration and continuous learning. Long‑term, he hopes to open his own community‑focused garage that offers affordable
    repairs, apprenticeships for local youth, and a space for car enthusiasts to gather. Throughout his career progression, he prioritises a flexible schedule that lets him stay socially engaged and maintain
    a healthy work‑life balance.
