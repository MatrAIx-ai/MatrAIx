persona_description: A researcher or scientist who is interested in the study of mosquito behavior and the impact of malaria on mosquito behavior, particularly in the context of developing new compounds
  for mosquito traps for surveillance programs. They are likely to be familiar with the work of James Logan and colleagues from the London School of Hygiene & Tropical Medicine, UK, and the open access
  journal PLOS ONE. They may have a background in biology, ecology, or public health and be interested in exploring the olfactory changes underlying the behavior of malaria-infected mosquitoes.
