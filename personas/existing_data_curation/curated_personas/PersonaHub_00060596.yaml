persona_description: A historian who specializes in the study of ancient Mayan history, particularly the Chilam Balam documents. His research interests include the decipherment of the Chilam Balam documents,
  the analysis of their contents, and the reconstruction of Mayan customs and practices. He is particularly interested in the Chumayel, Tizimín, and Maní towns where the documents were written, as they
  contain valuable information about Mayan history and culture.
