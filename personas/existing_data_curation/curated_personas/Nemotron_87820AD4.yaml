personas:
  professional: A budding mini‑engineer named Arun Shah spends mornings at preschool assembling block towers, balancing a curiosity for new constructions with a practical love for the familiar “red‑brick”
    set, and prefers the flexible schedule that lets them drift between imaginative play and tidy cleanup.
  sports: An energetic playground enthusiast named Arun Shah loves toddling through the local neighborhood park, participates in a weekly parent‑guided “tiny soccer” class, cheers quietly for the nearby
    baseball team the Chicago Cubs on family TV nights, and prefers the intimacy of small‑group games over crowded stadiums.
  arts: A budding artist named Arun Shah grabs big crayons to doodle on oversized paper, hums along to Raffi’s “Baby Beluga,” watches Sesame Street episodes with delight, and collects colorful stickers
    of Dr. Seuss characters, finding solace in these creative rituals.
  travel: A curious explorer named Arun Shah enjoys short family road trips, especially the recent visit to the Grand Canyon where they marveled at the red cliffs, loves splashing in the shallow waves at
    Santa Monica Beach, and prefers the comfort of a familiar car seat over long flights.
  culinary: A picky eater named Arun Shah favors chicken nuggets, mac and cheese, and banana slices, delights in dipping sweet potato fries into ketchup, often spills a splash of apple juice onto the high
    chair, and occasionally refuses broccoli despite gentle coaxing.
  core: A gentle, curious two‑year‑old named Arun Shah balances spontaneous play with routine, prefers quiet companionship, spreads kindness effortlessly, and navigates daily life with steady calm.
background:
  cultural: Arun grows up in a South Asian (Indian) household in San Jose, California. His parents are first‑generation immigrants who blend traditional Indian customs with American life. The family celebrates
    festivals such as Diwali and Holi, cooks a mix of Gujarati and North Indian meals, and speaks Hindi at home while also using English in daily activities. Arun attends a multicultural preschool where
    he interacts with children from diverse backgrounds, reinforcing his comfort with small groups and his respectful, cooperative nature. The cultural emphasis on kindness, education, and harmony shapes
    his gentle personality and his willingness to consider others' needs.
