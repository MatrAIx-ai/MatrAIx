  career_goals: Even at a toddler age, Arun delights in dreaming about the future. He often points to pictures of rockets and says he wants to be an astronaut, reflects his love of exploring how things
    work. He also talks about building anything that makes people happy, hinting at a future as a toy designer or engineer. When he watches cartoons about teachers helping friends, he expresses a wish to
    become a teacher one day, showing his desire to support others. These aspirations blend his curiosity with a practical desire to create, help, and explore.
