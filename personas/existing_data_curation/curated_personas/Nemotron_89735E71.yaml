  hobbies: '[''Gardening'', ''Baking pies and breads'', ''Reading mystery novels'', ''Knitting and crocheting'', ''Walking her dog'', ''Genealogy research'', ''Volunteer work at senior center'', ''Attending
    small church group gatherings'', ''Participating in local historical society'', ''Playing bridge with a close‑knit group'']'
  career_goals: Her primary ambition is to leverage her combined operational and business expertise to move into a supervisory or administrative role within the correctional system before retirement. She
    seeks a shift‑supervisor or unit‑manager position where she can implement cost‑effective security procedures, develop structured staff‑development programs, and champion evidence‑based rehabilitation
    initiatives. Long‑term, she hopes to serve as a consultant or trainer for statewide correctional facilities, sharing best practices and ensuring that institutional routines remain reliable and humane.
