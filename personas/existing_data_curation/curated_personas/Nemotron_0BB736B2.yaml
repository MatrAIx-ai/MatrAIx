personas:
  professional: Marcial Martinez, a preschool-aged explorer who builds towering block structures and solves simple puzzles, blends boundless curiosity with a practical eye for cause-and-effect while flitting
    spontaneously between imaginative play and cooperative games, showing a natural knack for teamwork and a reluctance to sit still for long tasks.
  sports: Marcial Martinez dashes around the Watertown Wolves youth soccer field on Saturday mornings, cheers loudly for the Minnesota Twins on TV, loves to tumble in the local indoor play-center's soft-play
    area, and eagerly anticipates trying basketball with friends at the community gym during the winter months.
  arts: Marcial Martinez swirls tiny hands to the lively salsa beats of Celia Cruz while at home, sketches bright sugar-skull faces for Día de los Muertos celebrations, and lights up when watching Sesame
    Street's bright puppets, their love for music and colour fueling endless imagination.
  travel: Marcial Martinez enjoys family road trips to the Badlands and Mount Rushmore, cherishes summer visits to Mexico City where they explore vibrant markets and tiny altar displays, and dreams of bouncing
    on the soft dunes of Florida's Gulf Coast during a future beach vacation.
  culinary: Marcial Martinez loves helping to mash ripe avocados for guacamole, eagerly devours sweet empanadas de manzana and cheese quesadillas, and insists on a splash of ketchup beside their mac and
    cheese, showing a growing palate that mixes familiar comfort foods with beloved family recipes.
  core: Marcial Martinez is a lively four-year-old who blends boundless curiosity, spontaneous energy, and a warm, cooperative spirit into every block tower, snack, and backyard game.
background:
  cultural: Marcial comes from a Hispanic/Latino family that keeps many traditions alive at home. Spanish is spoken daily, and the family celebrates holidays like Día de los Muertos and Navidad with special
    foods, music, and stories. While living in Watertown, South Dakota, they blend Midwestern community life with their cultural heritage, attending a bilingual preschool when possible, and sharing Latin
    dance, cuisine, and values of family togetherness with neighbors.
