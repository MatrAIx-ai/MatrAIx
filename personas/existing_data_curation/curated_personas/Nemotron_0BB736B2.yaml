  career_goals: Marcial loves helping friends and imagines becoming a teacher who guides other kids, a firefighter who keeps everyone safe, or an explorer who discovers new places in nature. He often says
    he wants to be a superhero who makes people smile, reflecting his kind and cooperative spirit.
