persona_description: A cognitive neuroscientist who specializes in the study of the brain and its functions, particularly anger and fear, and how they are related to the body's physiological response to
  a threat. They are interested in understanding the neural pathways and circuits that anger follows as part of fight or flight, and how it prepares the body for the energy required to fight injustice.
  They are also interested in the connection between anger and grief, and how they are both related to loss and grief, and how they differ in their purpose and function. They are likely to be interested
  in researching and understanding the impact of anger and grief on individuals and society, and how they can be managed and treated effectively.
