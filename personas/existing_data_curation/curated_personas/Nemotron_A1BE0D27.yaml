  career_goals: Nicola plans to pursue a Master of Social Work within the next two years, with the long‑term goal of becoming a licensed clinical social worker specializing in adolescent mental health.
    She aims to integrate her humanities background by developing culturally sensitive, evidence‑based interventions that address anxiety and depression among teenagers. Her competitive nature drives her
    to seek leadership roles, such as program coordinator for a youth mental‑health initiative in New Haven County, and eventually to influence state policy on mental‑health services. Nicola also aspires
    to publish research on the effectiveness of community‑based therapeutic arts programs, and to establish a community hub that offers counseling, creative workshops, and peer‑support groups. Balancing
    practicality with curiosity, she intends to continuously learn emerging therapeutic techniques while ensuring they are adapted for real‑world application.
