persona_description: A parent who is passionate about their child's sports performance and often pushes their child to the brink of injury, believing that winning is the only goal. They believe that dreams
  of glory and free rides to college are necessary to motivate their child to continue playing sports, even if it means pushing them to their breaking points. They are knowledgeable about the dangers of
  overuse injuries and the harmful effects of year-round sports seasons, but they often forget that it is just a game. They are interested in the latest research and statistics on sports injuries in children
  and are open to new ideas and approaches to promote healthy competition and lifelong physical activity.
