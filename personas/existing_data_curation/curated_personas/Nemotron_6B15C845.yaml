  skills: '["Reading comprehension","Organizational planning","Time management","Basic Scratch programming","Piano (beginner level)","Peer mediation and empathy","Crafting (knitting, beading)"]'
  hobbies: '["Reading books (adventure & science)","Building LEGO models","Solving jigsaw puzzles","Playing piano","Gardening","Caring for her dog","Origami and beading","Birdwatching and nature walks"]'
  career_goals: She dreams of becoming a teacher who creates a nurturing, well‑structured classroom for young children, and is also fascinated by wildlife and hopes to work as a veterinary technician or
    environmental educator to protect animals and natural habitats. Her long‑term ambition is to combine her love of organization, compassion, and practicality to make a positive impact on her community.
