personas:
  professional: Amanda Harris is a budding young naturalist who channels her curiosity for science and disciplined organization into cataloguing local flora and fauna, building miniature habitats from LEGO,
    and sharing her findings in meticulously prepared presentations for school, all while her calm, compassionate nature ensures she mentors peers with patience.
  sports: Amanda Harris is a dedicated youth athlete who spends Saturday mornings practicing basic soccer drills with the Junior Eagles Soccer Club, attends beginner gymnastics sessions at the community
    center, enjoys bird‑watching hikes during the spring, and passionately cheers for the River City Raptors baseball team, applying the same disciplined routine she uses for her LEGO projects to her fitness
    regimen.
  arts: Amanda Harris is an aspiring pianist who diligently practices Chopin’s Nocturne Op. 9‑2 while folding intricate origami cranes, embellishes her creations to the rhythm of Yiruma’s piano pieces,
    admires the storytelling of Studio Ghibli’s animated films, and collects the vibrant beadwork of Miriam Schapiro for inspiration.
  travel: Amanda Harris is a methodical young explorer who maps out weekend nature walks, has visited the red‑rock trails of Sedona and the medieval castles of Edinburgh on family trips, dreams of witnessing
    Kyoto’s cherry‑blossom festivals, and always packs a notebook for bird‑spotting notes and a pocket‑size LEGO set for downtime.
  culinary: Amanda Harris is a budding chef who loves preparing fresh garden salads with carrots, cucumbers, and a dash of lemon vinaigrette, simmering homemade tomato sauce with basil and oregano for spaghetti,
    and baking strawberry shortcake topped with whipped cream, all presented with the same neat precision she applies to her beadwork.
  core: Amanda Harris is a quietly driven nine‑year‑old whose love for orderly exploration, compassionate caretaking of her dog, and relentless quest for knowledge make them the perfect mix of a meticulous
    planner and an adventurous explorer, though they sometimes get lost in endless LEGO construction projects.
background:
  cultural: Amanda comes from a white, primarily European‑American family rooted in the rural setting of Twin Falls, Idaho. Her upbringing reflects the region’s values of self‑reliance, community involvement,
    and appreciation for the outdoors. Family traditions include attending local community events such as the Jerome County Fair, participating in church‑based service projects, and spending weekends hiking,
    fishing, and supporting local agricultural activities.
