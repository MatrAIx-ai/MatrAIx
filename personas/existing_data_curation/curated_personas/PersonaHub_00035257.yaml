persona_description: A historian who specializes in the study of the Holocaust in Ukraine, particularly the events that took place in the Pidvysoke village. He or she has extensive knowledge of the history
  of the region, including the pogroms in 1919 and the subsequent decline in Jewish population. The historian has firsthand experience with the Pidvysoke village, having conducted interviews with local
  witnesses and having visited the site where the executions took place. The historian is interested in sharing this knowledge with Yahad – In Unum, as they seek to preserve and remember the history of
  the Holocaust in Ukraine.
