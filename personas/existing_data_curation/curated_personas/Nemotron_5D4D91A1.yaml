personas:
  professional: Jeffrey Todd, an 18‑year‑old aspiring concept artist, blends self‑taught digital illustration, Blender 3D modeling, and clean Python scripting to craft surreal game assets, while they apply
    methodical planning and intense emotional currents to drive meticulous project timelines and deeply expressive visual narratives.
  sports: Jeffrey Todd, a reserved teen from the Pacific Northwest, roots for the Seattle Seahawks and the Seattle Sounders FC from the comfort of their bedroom, occasionally joins a weekend trail‑running
    club at Discovery Park and practices yoga at a local studio to counterbalance long hours hunched over a drawing tablet, and they find the occasional pick‑up basketball game at the community center a
    brief, adrenaline‑spiking social outlet.
  arts: Jeffrey Todd immerses themselves in the surreal canvases of Salvador Dalí, the digital hyperrealism of Beeple, and the ambient soundscapes of Brian Eno, Tim Hecker, and Sigur Rós, channeling these
    influences into nightly sketch sessions, ambient piano compositions, and indie game soundtracks like Journey and Firewatch that shape their creative identity, and they often cite Yoji Shinkawa’s character
    designs as a benchmark for narrative visual cohesion.
  travel: Jeffrey Todd prefers meticulously planned solitary hikes through Olympic National Park’s Hoh Rainforest and occasional weekend trips to Portland’s Powell’s Books, while dreaming of wandering Iceland’s
    black sand beaches, exploring Kyoto’s bamboo groves, and attending the Venice Biennale to merge travel with artistic inspiration, and they budget each adventure in a dedicated travel spreadsheet to
    keep expenses aligned with their scholarship goals.
  culinary: Jeffrey Todd, an experimental home cook, favours simple yet precise dishes like miso ramen with handmade noodles, avocado toast topped with smoked salmon, and saffron risotto, frequently sourcing
    fresh herbs from the local farmer’s market and pairing meals with single‑origin pour‑over coffee, though they often skip meals when absorbed in a sketching marathon, and they keep a notebook of flavor
    pairings that fuels future culinary experiments.
  core: Jeffrey Todd is a hyper‑creative, anxiety‑prone 18‑year‑old who structures their artistic world with disciplined planning, invests in their future while splurging on art supplies, and they find
    solace in solitary hikes, ambient music, and meticulously crafted digital realms.
background:
  cultural: Jeffrey grew up in Longview, Texas, a small‑town environment in Gregg County with deep Southern roots. His family traces part of its lineage to French‑Canadian ancestors who settled in the Gulf
    Coast region, giving him a subtle awareness of both Southern and broader North American cultural influences. He was raised in a predominantly Protestant community, attending a public high school that
    offered a respected arts program. While he respects local traditions, his personal interests lean toward eclectic artistic subcultures and introspective pursuits.
attributes:
  skills: '[''Digital illustration'', ''3D modeling (Blender)'', ''Python programming for creative coding'', ''Critical writing and research'', ''Project planning and time management'', ''Intermediate piano
