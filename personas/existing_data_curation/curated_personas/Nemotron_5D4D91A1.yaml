  hobbies: '[''Digital painting and sketching'', ''Reading speculative fiction and philosophy'', ''Journaling and creative writing'', ''Playing narrative indie video games'', ''Building model kits'', ''Listening
    to ambient music'', ''Meditation and mindfulness practice'', ''Solo nature walks in East Texas'']'
  career_goals: Jeffrey aims to earn a scholarship to a university renowned for its fine arts and interactive media programs, where he intends to major in Concept Art and UI/UX Design. He aspires to build
    a professional portfolio that lands him a junior concept artist role at a video game studio or an animation house. Over the long term, he hopes to lead a small creative studio that blends narrative
    storytelling with immersive digital experiences, while also advocating for mental‑health awareness within creative communities.
