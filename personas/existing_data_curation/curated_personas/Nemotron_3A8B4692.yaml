  hobbies: '[''gardening (drought‑tolerant herbs, succulents, wildflowers)'', ''experimenting with New Mexican cooking'', ''watercolor painting'', ''upcycling fabric collages'', ''reading contemporary literature
    and art biographies'', ''birdwatching'', ''photographing desert landscapes'', ''volunteering for senior centre reading sessions'']'
  career_goals: Bonnie hopes to compile a published volume of oral histories from Tularosa’s senior residents, preserving the town’s cultural memory. She wants to organize a rotating community art exhibit
    that showcases local artists and homemade crafts, using her garden as a venue during summer. She aspires to mentor teenage volunteers in traditional crafts such as quilting and garden stewardship, and
    to develop a small herb and pollinator garden that serves both as a therapeutic space and educational resource. Additionally, she seeks to adopt a gentle pacing in her daily routine, practicing mindfulness
    to reduce worry and stress.
