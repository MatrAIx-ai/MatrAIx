personas:
  professional: Bethany Martell, a 26‑year‑old licensed physical therapist, combines meticulous manual therapy, gait analysis, and evidence‑based exercise prescription with a curiosity for emerging modalities
    like dry needling, and they design individualized rehab plans that reflect their practical creativity and competitive drive toward sports injury specialization.
  sports: Bethany Martell, an enthusiastic runner in community 5K events and a coastal trail hiker, roots for the Boston Red Sox, follows the New England Revolution, and they participate in a local cross‑fit
    class that satisfies their competitive nature while fostering functional movement goals.
  arts: Bethany Martell, an avid landscape photographer inspired by Ansel Adams and a true‑crime podcast fan of Serial, frequently attends intimate Providence art openings and they draw creative inspiration
    from indie folk artists like Fleet Foxes, weaving visual storytelling into their relaxed yet curious lifestyle.
  travel: Bethany Martell, who prefers solo, low‑key exploration, has trekked Block Island’s cliffs, plans future hikes in Iceland’s black‑sand beaches, and they select flexible Airbnb stays near coastal
    paths to sync with their budget and love for nature.
  culinary: Bethany Martell, an experimental home cook, relishes experimenting with dishes such as miso‑glazed salmon, lavender‑infused shortbread, and matcha‑lime risotto, sourcing fresh herbs from the
    local farmer’s market while they occasionally forget pantry staples due to their relaxed, flexible schedule.
  core: Bethany Martell blends a curious, evidence‑driven mind with a laid‑back, slightly disorganized lifestyle, and they channel their competitive edge into sports rehab while savoring solitary hikes,
    experimental cooking, and a skeptical yet steady approach to both people and finances.
background:
  cultural: Bethany grew up in Exeter, a small coastal town in Washington County, Rhode Island, within a modest white, New England family with Irish and English roots. Her upbringing emphasized self‑reliance,
    practicality, and a deep appreciation for the maritime environment. Although she left high school before earning a diploma, she pursued a vocational pathway to become a physical therapist, reflecting
    a pragmatic, hands‑on approach to education. She participates in local traditions such as Fourth of July parades and community potlucks, respects the region's historical heritage, and values the low‑key,
    community‑oriented lifestyle of coastal New England.
