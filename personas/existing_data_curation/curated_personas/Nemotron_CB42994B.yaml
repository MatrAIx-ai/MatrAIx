  hobbies: '[''Hiking'', ''Yoga'', ''Reading science nonfiction'', ''Photography'', ''Cooking experimental recipes'', ''True‑crime podcasts'', ''Volunteering at animal rescue'', ''Board game nights (small
    group)'', ''Community 5k runs'']'
  career_goals: Bethany aims to become a recognized specialist in sports injury rehabilitation and functional movement. She plans to earn advanced certifications such as the Certified Strength and Conditioning
    Specialist and a Clinical Specialist credential in Orthopedic Physical Therapy. Long‑term, she envisions opening her own flexible‑schedule clinic in Exeter that emphasizes evidence‑based practice, offers
    innovative treatment options, and provides community wellness workshops. She also hopes to contribute case studies to professional journals and mentor newer therapists.
