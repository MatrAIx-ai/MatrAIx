personas:
  professional: Gustavo Arevalo, a retired DIY handyman and community mentor, they leverage their bilingual fluency, hands‑on repair expertise, and love of gardening to coordinate volunteer projects at
    the senior center, while their spontaneous, curiosity‑driven nature sometimes leads them to improvise schedules and skip paperwork.
  sports: Gustavo Arevalo, an avid hiker and salsa‑dance enthusiast, they enjoy weekend treks in the Rockies, follow the Colorado Rockies baseball team and the Denver Broncos, and belong to a local senior
    hiking club that meets at the Flatirons, combining low‑impact cardio with lively dance steps.
  arts: Gustavo Arevalo, a devoted fan of salsa legends like Celia Cruz and Marc Anthony, classical composer Aaron Copland, and historical novelist Ken Follett, they spend evenings at community‑center dance
    nights, attend local art exhibitions featuring Latinx artists, and collect vintage photographs of Colorado landscapes, allowing their creative side to balance practical projects.
  travel: Gustavo Arevalo, an adventurous yet budget‑conscious traveler, they have revisited the island of their grandparents, explored historic Old San Juan, dream of a culinary tour through Spain’s Andalusia,
    and frequently plan spontaneous road trips to Colorado’s Rocky Mountain National Park, preferring flexibility over rigid itineraries.
  culinary: Gustavo Arevalo, an accomplished home cook, they perfect dishes such as arroz con gandules simmered with sofrito, tender lechón marinated in adobo, and sweet pasteles rellenos, while also experimenting
    with locally sourced mountain herbs and garden vegetables, often sharing their meals at community potlucks.
  core: Gustavo Arevalo, curious, practical, and delightfully spontaneous, they blend a love for gardening, vintage car tinkering, and salsa dancing into a community‑centric life, though their habit of
    misplacing tools and forgetting appointments adds a charming, albeit chaotic, flair.
background:
  cultural: Gustavo’s roots run deep in Puerto Rican culture. Born to parents who migrated to the mainland United States in the 1960s, he grew up bilingually, celebrating traditions such as Nochebuena,
    Parranda, and the annual Puerto Rican Day Parade in Denver. He carries forward the island’s culinary heritage through dishes like arroz con gandules, pasteles, and lechón, and he participates in local
    Latinx community events, often volunteering to serve food and share stories. While he now lives in Arvada, Colorado, his identity is shaped by a blend of Caribbean warmth, Catholic family values, and
    the rugged, outdoors‑oriented lifestyle of the Rocky Mountain region.
