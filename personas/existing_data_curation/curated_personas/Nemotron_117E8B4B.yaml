  career_goals: Although retired from formal employment, Gustavo plans to stay active and purposeful. He aims to expand his mentorship role at the local senior center, lead cooking workshops that share
    Puerto Rican culinary traditions, develop a small raised‑bed garden that supplies fresh produce for his neighbors, write a handwritten family‑recipe booklet, travel back to Puerto Rico to reconnect
    with relatives and the island’s food culture, and learn new digital skills such as using a tablet for photo editing and online storytelling. His overarching ambition is to blend his curiosity for new
    ideas with the practical desire to enrich his community.
