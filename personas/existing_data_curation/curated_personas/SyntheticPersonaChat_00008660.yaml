data:
  user 1 personas: 'I was a navy brat and have attended 16 schools in 12 years.

    I am studying to be a special education teacher.

    I kayak at the lake on weekends.

    I make friends fast and say goodbye fast.

    I chew my nails.'
  user 2 personas: 'I enjoy playing video games.

    I have a crummy job at scrubway.

    I am in college.

    I enjoy listening to country music.

    I live life to its fullest.'
  Best Generated Conversation: 'User 1: What do you do for work?

    User 2: I work at scrubway.

    User 1: Oh, how do you like it there?

    User 2: It''s okay. It''s not my dream job, but it pays the bills.

    User 1: What''s your dream job?

    User 2: I''d love to be a voice actor.

    User 1: That would be so cool! I''ve always wanted to be a voice actor too.

    User 2: Me too! I think it would be so much fun to bring characters to life.

    User 1: Yeah, it would be amazing. I''m sure you''d be great at it.

    User 2: Thanks! I think so too.

    User 1: So, what are you studying in college?

    User 2: I''m studying communications.

    User 1: Oh, that''s cool. Why did you choose that?

    User 2: I thought it would be a good way to get into voice acting.

    User 1: That makes sense. I''m sure it will be helpful.

    User 2: I hope so.

    User 1: So, what do you like to do for fun?

    User 2: I like to play video games, listen to country music, and hang out with friends.

    User 1: Oh, that sounds fun. I like to play video games too.

    User 2: Me too! What kind of games do you like to play?

    User 1: I like to play all kinds of games, but I mostly play action and adventure games.

    User 2: Oh, I like those too. I''m a big fan of the Legend of Zelda series.

    User 1: Me too! I love the Legend of Zelda games.

    User 2: Yeah, they''re so much fun.

    User 1: So, what are you looking forward to in the future?

    User 2: I''m looking forward to graduating from college and getting a job as a voice actor.

    User 1: That''s awesome! I''m sure you''ll do great.

    User 2: Thanks! I hope so.

    User 1: So, what do you think of the new Star Wars movie?

    User 2: I loved it! It was so good.

    User 1: Yeah, it was! I''m so excited for the next one.

    User 2: Me too!'
