    (Arduino, Raspberry Pi) projects", "Hiking in Ridley Creek State Park", "Mindfulness journaling", "Science‑fiction reading", "Technology and philosophy podcast listening", "Volunteer tutoring in math
    and coding", "Board game nights with friends"]'
  career_goals: Short‑term, Lewis is focused on landing a full‑stack software engineering or data‑analytics internship that leverages his programming and statistical skills while allowing him to contribute
    to user‑centric product design. He is actively building a portfolio of web and mobile projects that integrate interactive visual art, such as data‑driven generative graphics, to showcase his hybrid
    technical‑creative vision. In the next two to three years he plans to pursue a Master’s degree in Human‑Computer Interaction or Data Science, aiming to deepen his expertise in user experience research
    and advanced machine‑learning techniques. Simultaneously, Lewis aspires to take on increasing leadership responsibilities—first as a junior project lead, then as a senior engineer—where he can mentor
    peer developers and champion inclusive design practices. Long‑term, he envisions founding a boutique studio that creates immersive digital installations and socially‑impactful tech products, positioning
    himself as a Black innovator who bridges engineering precision with artistic expression. Throughout his career trajectory, he remains committed to supporting underrepresented youth in STEM through mentorship
    and community outreach.
