personas:
  professional: Lewis Harris, a 20‑year‑old engineering student in Philadelphia, channels their curiosity into full‑stack software engineering and data‑analytics projects that fuse code with interactive
    visual art, leading hackathon squads, delivering clean Python, Java, and C++ solutions, and driving user‑centric design while wrestling with the stress of high competition and a skeptical eye toward
    project assumptions.
  sports: Lewis Harris competes in a community basketball league with the Philly Hoops Club, cheers for the Philadelphia 76ers and Eagles, frequently plays pickup games at the local YMCA, and hikes the
    rugged trails of Ridley Creek State Park each month to maintain fitness and relieve stress.
  arts: Lewis Harris immerses themselves in Philadelphia’s dynamic music scene, regularly attending live shows at The Fillmore and World Cafe featuring jazz legends like Miles Davis, soul icons such as
    Erykah Badu, and hip‑hop stars like Kendrick Lamar, while capturing urban street aesthetics and experimental light installations inspired by James Turrell in their photography, editing with Photoshop
    and creating digital illustrations influenced by Banksy’s street art.
  travel: Lewis Harris spends weekends planning spontaneous getaways to nearby cultural hubs—New York City for museum tours, Washington, D.C. for historic monuments, and the Pocono Mountains for outdoor
    photography—while dreaming of a future expedition to Tokyo to explore cutting‑edge tech and art districts and a summer adventure in Iceland to chase auroras, balancing student‑budget constraints with
    a love for both adventure and relaxation.
  culinary: Lewis Harris enjoys a mix of classic Philly cheesesteaks, falafel wraps from a favorite campus‑close spot, and occasional home‑cooked shrimp‑and‑grits, experiments with coffee brewing techniques
    for a perfect cold brew, indulges in late‑night pizza deliveries during hackathon marathons, and occasionally over‑caffeinates with espresso shots while their cooking skill remains at a confident beginner
    level.
  core: Lewis Harris is a hyper‑curious, socially energetic 20‑year‑old who fuses tech and art, battles competitive stress with mindfulness, and lives for basketball, music, and midnight coffee.
background:
  cultural: Lewis grew up in Aston, a suburb of Philadelphia, within a close‑knit African‑American family that places a high value on education, community service, and cultural pride. Family gatherings
    often feature soulful gospel music, storytelling about the civil‑rights era, and dishes that celebrate Southern culinary roots, all of which have instilled in him a deep appreciation for Black heritage.
    He participated in his high school’s Black Student Union and later joined a campus organization for underrepresented STEM majors, where he forged connections with peers who shared similar cultural experiences.
    These environments reinforced a sense of responsibility to be a role model for younger Black youth and to challenge systemic barriers in tech fields. Lewis also draws inspiration from contemporary Black
    artists and musicians, attending local exhibitions at the African American Museum in Philadelphia and supporting initiatives that amplify Black voices in digital media. While navigating predominantly
    white academic and professional spaces, he remains aware of subtle biases, fueling his competitive drive and occasional skepticism, but also strengthening his resolve to succeed and to advocate for
    inclusive environments.
