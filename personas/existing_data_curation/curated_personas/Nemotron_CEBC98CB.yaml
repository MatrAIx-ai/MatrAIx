  career_goals: Julio dreams of a future where he can combine his love for helping others with his cultural roots. He is drawn to careers in medicine or public health, aspiring to become a doctor or community
    health worker who can serve Hispanic families in Texas. At the same time, he is intrigued by the idea of being a bilingual teacher or youth mentor, using his communication skills to support younger
    students who face language barriers. He also hopes to take on leadership roles in school clubs or community organizations, where his sociable personality and organizational talents can make a positive
    impact.
