personas:
  professional: An emerging junior organizer, Teanna Espinoza loves arranging her toys by color and shape, turning playtime into a meticulous schedule that showcases early flair for systematic planning
    and leadership among her preschool friends, as they enthusiastically coordinate group activities.
  sports: A budding little athlete, Teanna Espinoza attends toddler gymnastics classes on Wednesday afternoons, loves chasing a red plastic ball in the neighborhood park, and cheers enthusiastically for
    the Chicago Cubs during family outings, blending energetic play with structured sport routines.
  arts: A mini art enthusiast, Teanna Espinoza spends afternoons scribbling with Crayola crayons, adores the bright hues of Van Gogh Sunflowers depicted on her wall stickers, and they are captivated by
    Sesame Street sing‑alongs and Disney’s Mickey Mouse cartoons, letting creative expression brighten her daily routine.
  travel: A curious explorer, Teanna Espinoza has visited the local aquarium and taken a family road trip to the Grand Canyon, and they dream of strolling through Disneyland in California, preferring short
    car rides with frequent snack breaks over long flights.
  culinary: A budding food tester, Teanna Espinoza prefers creamy mac and cheese with a sprinkle of cheddar, enjoys dipping broccoli florets in ranch dressing, and they are learning to spread peanut butter
    on whole grain toast, though they sometimes stubbornly refuse peas.
  core: Teanna Espinoza is a structured yet sociable toddler who transforms daily routines into playful schedules, thrives on group games, and occasionally stages stubborn bedtime rebellions with adorable
    persistence.
background:
  cultural: Teanna’s Colombian heritage is woven into her daily life through a bilingual home environment, regular celebrations of Colombian holidays such as Día de los Niños with foods like arepas and
    empanadas, and exposure to Spanish-language songs and stories; living in Fort Lauderdale’s diverse Latin community, she also participates in multicultural events that highlight Colombian culture while
    integrating into the broader cultural mosaic of Broward County.
attributes:
  skills: '[''Fine motor skills (stacking blocks, turning pages, simple scribbles)'', ''Gross motor skills (running, climbing small steps, playground navigation)'', ''Bilingual language development (English
    and Spanish)'', ''Routine memory (meal, nap, bedtime schedules)'', ''Following simple instructions (tidy‑up, hand‑washing)'', ''Social interaction (sharing, cooperative play, group participation)'']'
  hobbies: '[''Playing in playgrounds with other children'', ''Building with large interlocking blocks'', ''Dancing to Latin music (especially Colombian rhythms)'', ''Listening to picture books in English
    and Spanish'', ''Helping with simple chores (tidying toys, setting nap mats)'']'
  career_goals: Through pretend play, Teanna often imagines herself as a teacher, a caregiver, or a community helper, reflecting her love for structure, organization, and supporting others; she expresses
    a budding ambition to grow up in a role where she can create orderly environments and assist peers, such as early childhood education, a pediatric clinic, or a community library.
