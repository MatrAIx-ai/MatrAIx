    & Regulatory Reporting'']'
  hobbies: '[''Nature photography'', ''Sketching/Watercolor painting'', ''Acoustic guitar (solo practice)'', ''Hiking and trail exploration'', ''Tropical houseplant gardening'', ''Reading (science‑fiction,
