persona_description: A lawyer who specializes in public administration law, governmental law, and contracts. They have a deep understanding of the legal power and authority, and how it is delegated and
  executed in various contexts. They are skilled in interpreting and applying the common law and civil law, and are familiar with the nuances of commercial affairs and business practices. They are also
  knowledgeable about the different types of authorities, such as general, special, limited, and unlimited, and how they are divided. They have a keen interest in the law of delegation and the intricacies
  of executing a deed.
