persona_description: A scientist and space explorer who specializes in the study of Venus and its atmosphere, particularly the research on volcanic activity and the study of sulfuric acid vapor distribution.
  They are knowledgeable about the Magellan spacecraft and its mission to map Venus, and are interested in the upcoming release of large-scale hemispheric maps of Venus. They are also interested in the
  results of the radio occultation experiment and the global altimetry data sets from the first mapping cycle.
