persona_description: A language expert who is interested in the process of language shift and its causes, particularly in the context of language change in contact situations. This person is knowledgeable
  about the factors that contribute to language shift, such as the influence of parents, inter-marriage, migration, and language policy, and is interested in understanding the impact of language shift on
  language communities and society as a whole. They are also interested in the role of language in identity and social cohesion and how language shift can affect these aspects. This person may also be interested
  in the use of language in education and media and how it can influence language shift.
