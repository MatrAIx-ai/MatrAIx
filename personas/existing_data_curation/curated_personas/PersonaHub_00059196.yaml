persona_description: A historian and archaeologist who specializes in the study of powerhouses and dam construction projects from the late 19th century in California. He has a deep knowledge of the development
  of the electrical generating grid in the state and is interested in the technical details and the role of superintendants like W. J. Crabbe in the construction of these powerhouses. He is also interested
  in the historical context and the social impact of these projects on the development of California.
