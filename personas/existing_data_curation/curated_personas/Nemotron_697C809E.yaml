personas:
  professional: Guadalupe Polanco, a visionary budding curator who blends rigorous literary analysis with bold visual storytelling, draws on their bilingual fluency and mastery of Adobe Creative Suite to
    craft multilingual exhibition proposals, while their methodical planning and vivid imagination drive every detail, even as bouts of anxiety sometimes keep them double‑checking every label.
  sports: Guadalupe Polanco keeps fit by jogging along the Hudson River in summer, attending weekly yoga classes at a Brooklyn studio, playing in a co‑ed soccer league while cheering for New York City FC
    and the New York Knicks, and occasionally hitting the slopes at the Catskills during winter weekends.
  arts: Guadalupe Polanco immerses themselves in avant‑garde literature, devouring the labyrinthine narratives of Jorge Luis Borges, while drawing visual inspiration from the chromatic abstractions of Francis
    Alÿs and the emotive bandoneón passages of Astor Piazzolla, and occasionally catching indie films starring Ricardo Darín at the local cinema, blending these influences into mixed‑media canvases.
  travel: Guadalupe Polanco prefers meticulously planned weekend escapes, having recently trekked the Patagonian steppe and explored Kyoto’s historic temples on a shoestring budget, while dreaming of a
    summer art pilgrimage to Lisbon’s street murals and a quiet retreat in the Hudson Valley’s wine country when financial constraints allow.
  culinary: Guadalupe Polanco cooks with confident flair, mastering the slow‑roasted asado flavored with chimichurri, hand‑folding empanadas stuffed with spiced beef and olives, and occasionally experimenting
    with peppermint‑infused dulce de leche, while savoring rooftop paellas with saffron and fresh seafood when dining out.
  core: Guadalupe Polanco is a 23‑year‑old curatorial dreamer who never leaves home without a sketchbook, headphones looping tango, and a lingering worry that every deadline will eclipse the next masterpiece.
background:
  cultural: Guadalupe was raised in Buenos Aires in a family that celebrated Argentine traditions—tango, folklore music, literature, and hearty cuisine—while emphasizing bilingual education in Spanish and
    English. Her upbringing immersed her in the country's rich literary and artistic heritage, shaping her love for abstraction and narrative complexity. After relocating to New York for university, she
    navigates a bicultural identity, maintaining Argentine customs during community gatherings and national holidays, yet embracing the city's multicultural dynamism. This blend of Argentine roots and New
    York's vibrant arts scene informs her creative voice, allowing her to fuse South American aesthetic sensibilities with contemporary urban influences.
attributes:
  skills: '[''Critical literary analysis'', ''Art historical research'', ''Digital illustration'', ''Photography'', ''Video editing'', ''Bilingual translation (Spanish/English)'', ''Event planning'', ''Project
    management'', ''Grant writing'', ''Social media content strategy'']'
  hobbies: '[''Abstract painting'', ''Sketching'', ''Reading Argentine literature'', ''Writing poetry'', ''Tango dancing'', ''Cooking Argentine cuisine'', ''Photography'', ''Yoga and meditation'', ''Curating
    pop-up art events'', ''Visiting museums and galleries'']'
  career_goals: Guadalupe aspires to become a curator specializing in contemporary Latin American art at a major museum or cultural institution in New York. She plans to pursue a master's in Museum Studies
    or Cultural Management to deepen her curatorial expertise. In the long term, she hopes to launch a community-focused art space that showcases Argentine and broader Latin American artists, develop collaborative
    exhibitions, and publish scholarly work on Argentine conceptual art. Additionally, she aims to integrate art therapy practices into community programming to support mental well‑being.
