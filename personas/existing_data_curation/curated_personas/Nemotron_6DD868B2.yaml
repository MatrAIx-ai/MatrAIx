  career_goals: Thomas aims to complete his associate degree in business administration within the next year and transition into an entry‑level operations or project coordination role at a tech‑enabled
    service company in the San Diego area. He plans to earn the Project Management Professional credential in the next three years, positioning himself for a future operations manager position where he
    can oversee community‑focused events and programs. Ultimately, he hopes to launch his own small venture that combines event planning with local community development, leveraging his organizational strengths
    and network of contacts.
