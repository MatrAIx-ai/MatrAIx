personas:
  professional: Thomas Neal, a budding project coordinator with an associate degree in business administration, leverages their methodical scheduling skills, spreadsheet savvy, and outgoing personality
    to streamline operations at a tech‑enabled service firm while championing community‑focused events.
  sports: Thomas Neal, an active member of the Escondido Intramural Soccer League and a regular beach‑volleyball player at Pacific Beach, cheers for the San Diego Padres and LA Galaxy, and hikes the Cuyamaca
    Trail every other weekend to stay fit.
  arts: Thomas Neal, an acoustic‑guitar enthusiast, spends weekends jamming at local indie spots like The Casbah, drawing inspiration from bands such as Tame Impala and Vampire Weekend, while also participating
    in board‑game nights featuring Catan and Settlers of Catan, which fuels their social creativity.
  travel: Thomas Neal, a weekend adventure seeker, frequently road‑trips to Joshua Tree and the Baja border towns of Tijuana for street‑food tours, dreamt of backpacking through Portugal’s coastal towns,
    and values budget‑friendly planning using Hostelworld and Airbnb.
  culinary: Thomas Neal, a grill‑master for friends, loves marinating carne asada with chipotle, cilantro, and lime, perfecting fish tacos on a backyard smoker, while their moderate skill level means they
    rely on pre‑made spice mixes for ribs and often pair meals with craft beers from local breweries.
  core: Thomas Neal blends methodical organization with a sociable, outdoorsy spirit, juggling community projects, active sports, and a relentless pursuit of balance between disciplined budgeting and occasional
    late‑night gaming binges.
background:
  cultural: Thomas was raised in a suburban neighborhood of Escondido, a city that blends typical American middle‑class values with the cultural diversity of San Diego County. His family background is primarily
    Anglo‑American, with ancestors tracing back to the British Isles and Central Europe. Growing up near the Mexican border gave him regular exposure to Latino traditions, from neighborhood festivals to
    occasional Spanish phrases learned at school and through community interactions. He celebrates mainstream U.S. holidays such as Thanksgiving and the Fourth of July, while also participating in local
    events like the Escondido Street Fair, reflecting a broad yet rooted cultural perspective.
