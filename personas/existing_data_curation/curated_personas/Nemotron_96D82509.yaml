personas:
  professional: Triana Lopez, a budding graphic and interaction designer, leverages her disciplined workflow and love for bold, pattern‑rich visual storytelling to craft brand identities and UI mockups
    that seamlessly blend modern digital tools with folkloric motifs, while rigorously analyzing market trends to stay ahead of her peers.
  sports: Triana Lopez, an avid hiker and occasional trail runner, channels her competitive spirit into summiting local peaks with the Pueblo Outdoor Club, while cheering for the Colorado Rockies and the
    Colorado Avalanche during the baseball and hockey seasons.
  arts: Triana Lopez, a sketch‑first illustrator, spends evenings studying the vibrant works of Frida Kahlo and the stylized patterns of Diego Rivera for inspiration, while regularly attending indie art
    shows featuring local muralists and absorbing the kinetic energy of live street performances by the Denver Arts Collective.
  travel: Triana Lopez plans her next travels around immersive cultural festivals, aiming to experience the luminous Day of the Dead parade in Oaxaca and the colorful Feria de San Marcos in Aguascalientes,
    while also craving a solo backpacking trek through the Rocky Mountains' less‑trodden passes to capture sunrise vistas for her photography portfolio.
  culinary: Triana Lopez loves cooking at home, perfecting corn‑based dishes like tamales and chiles rellenos, experimenting with homemade salsa verde, and balancing flavors with fresh cilantro and lime,
    while occasionally ordering exotic ramen bowls to break the routine.
  core: Triana Lopez is a meticulous, curiosity‑driven designer who blends bold cultural motifs into modern branding, saves strategically, skips sleep for coffee, hikes fiercely, and thrives on solitary
    creative bursts.
background:
  cultural: Triana is a second‑generation Mexican‑American raised in Pueblo, Colorado. Both of her parents emigrated from Jalisco, bringing vibrant traditions such as Día de los Muertos altars, folk art,
    and home‑cooked meals. Bilingual in Spanish and English, she grew up celebrating Mexican holidays and participating in community festivals, which instilled a deep appreciation for color, pattern, and
    storytelling. The blend of her Mexican heritage with the Southwestern landscape of Colorado informs her aesthetic, often incorporating bold hues and regional motifs into her design work while maintaining
    a pragmatic, resource‑focused mindset.
attributes:
  skills: '[''Graphic Design'', ''UI/UX Design'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Figma'', ''Typography'', ''Brand Identity Development'', ''Print Design'', ''Digital Illustration'', ''HTML/CSS'',
