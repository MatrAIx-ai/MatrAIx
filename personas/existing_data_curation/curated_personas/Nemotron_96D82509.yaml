  hobbies: '[''Sketching'', ''Digital Illustration'', ''Photography'', ''Cooking Mexican Cuisine'', ''Hiking'', ''Reading Design Literature'', ''Chess'', ''Attending Small Art Exhibitions'', ''Listening
    to Indie and Latin Music'']'
  career_goals: Triana plans to earn a bachelor’s degree in graphic or interaction design within the next two years while building a portfolio that showcases culturally‑infused branding for Mexican‑American
    businesses. She aspires to secure a senior designer role at a boutique agency that values inclusive design and, ultimately, launch her own studio that blends contemporary visual storytelling with Mexican
    folk art. Winning regional design competitions and speaking at intimate design meet‑ups are key milestones she aims to achieve.
