personas:
  professional: A project‑oriented professional, Lisa Smith leverages their meticulous research and budgeting skills to streamline operations in mid‑size nonprofits, balancing a competitive drive to outperform
    benchmarks with a methodical, data‑driven approach while eyeing a future consulting boutique.
  sports: Athletically, Lisa Smith hits the Chattahoochee River trails for weekly hikes, joins the Columbus Outdoor Club cycling group on weekends, and supports the Atlanta Falcons and Atlanta Braves, treating
    each workout as a data‑driven milestone within a balanced fitness regimen.
  arts: Lisa Smith curates a small online wildlife gallery inspired by Ansel Adams and National Geographic, indulges in book club selections by Malcolm Gladwell, and relaxes to folk legends like Joan Baez
    while attending local performances of August Wilson plays.
  travel: Lisa Smith prefers meticulously planned weekend getaways to historic towns like Savannah, GA, and Asheville, NC, and dreams of a longer adventure trekking Patagonia's Torres del Paine, balancing
    travel expenses with a modest family budget and occasional work‑related trips for nonprofit conferences.
  culinary: Lisa Smith loves farm‑to‑table cooking, frequently preparing roasted root‑vegetable medleys with sweet potatoes, beets, and kale, mastering homemade marinara sauce using San Marzano tomatoes,
    and indulging in artisanal cheese boards featuring aged cheddar and brie, though they sometimes over‑salt dishes when juggling spreadsheets.
  core: Lisa Smith blends relentless organization with a curious streak, turning every hobby—from genealogy to gardening—into a meticulously measured project, all while juggling a competitive edge and a
    habit of over‑color‑coding their life.
background:
  cultural: 'Lisa is a white American who was born and raised in Columbus, Georgia. Her upbringing reflects typical Southern values: strong family ties, community involvement, and a respect for tradition.
    She grew up in a middle‑class household with frequent church attendance at a local Baptist congregation, where hospitality and modesty were emphasized. Southern customs such as sharing home‑cooked meals,
    celebrating holidays with family gatherings, and participating in community events shaped her social outlook. These cultural influences fostered her reliability, practicality, and a balanced appreciation
    of both individual initiative and communal responsibility.'
