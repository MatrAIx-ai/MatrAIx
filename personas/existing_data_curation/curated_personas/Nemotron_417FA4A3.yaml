  career_goals: Lisa aims to re‑enter the workforce in a managerial or coordination role within a mid‑sized business or nonprofit organization. Over the next two years she plans to complete a bachelor's
    degree in Business Management at a local community college and obtain her Project Management Professional (PMP) certification. Her ambition is to become an Operations Manager or Project Coordinator
    where she can apply her organizational talent to improve efficiency and drive results. Long‑term, she hopes to launch a consulting boutique that helps small businesses in the Columbus area streamline
    their processes and adopt best practices, leveraging her competitive drive and analytical mindset.
