  career_goals: Although retired, Zaria aspires to deepen her involvement in the local senior center by leading cooking workshops that celebrate Mexican heritage and by mentoring younger volunteers in organizing
    culturally inclusive events. She hopes to compile a family recipe book that preserves her mother’s culinary legacy, and she aims to become a trusted liaison between the town’s Mexican community and
    broader civic initiatives, fostering cross‑cultural understanding. Maintaining her health and mental well‑being through purposeful activity remains a central personal ambition.
