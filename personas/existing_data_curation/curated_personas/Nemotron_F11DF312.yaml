personas:
  professional: Jonathan Ziane is a budding robotics enthusiast who channels their curiosity about space exploration into designing autonomous LEGO Technic vehicles and coding small rover prototypes for
    the school's robotics club, where their methodical yet adaptable approach makes them a reliable collaborator in group projects.
  sports: Jonathan Ziane is an avid cyclist who spends weekends on rural trails around Sidney, is a member of the local Youth Cycling Club 'Trailblazers', and follows the Vancouver Whitecaps FC for inspiration,
    while occasionally joining school cross-country practices to maintain overall fitness.
  arts: Jonathan Ziane nurtures their creative side by sketching rural landscapes a la Thomas Moran, writing sci-fi short stories influenced by Isaac Asimov, and listening to cinematic composer Hans Zimmer
    while occasionally streaming indie music from artists like Tame Impala, showcasing their solitary yet expressive artistic routine.
  travel: Jonathan Ziane enjoys family road trips to places like the nearby Pacific Rim National Park and Vancouver's Science World, while dreaming of visiting the Kennedy Space Center in Florida and the
    Canadian Space Agency's research facility in Saint-Hubert to fuel their space-exploration passion, and usually plans trips with a detailed itinerary yet leaves room for spontaneous bike-trail detours.
  culinary: Jonathan Ziane favors quick, energy-dense meals such as pepperoni pizza, chicken teriyaki ramen, and homemade granola bars packed with oats, honey, and dried cranberries, occasionally experimenting
    with a beginner's macaroni-and-cheese recipe that includes a sprinkle of cheddar and a dash of paprika.
  core: Jonathan Ziane is a curiosity-driven, organized teen whose love of rockets, robotics, and lone bike rides is balanced by a gentle kindness, a meticulous notebook habit, and a tendency to binge sci-fi
    novels while occasionally forgetting to do chores.
background:
  cultural: Jonathan grew up in Sidney, a small town in Champaign County, Ohio, in a middle-class family with deep roots in the American Midwest. His upbringing reflects the region's blend of agricultural
    heritage and modest industrial development. Community values such as self-reliance, neighborly cooperation, and modest celebration of local traditions like county fairs and high-school sports have shaped
    his worldview. He attends the local public middle school, where he experiences a culturally diverse but predominantly white environment, with occasional exposure to neighboring Amish communities and
    immigrant families. His family participates in community events, church gatherings, and volunteer activities, reinforcing a sense of harmony and responsibility toward others. These influences combine
    with modern digital culture, giving him a balanced perspective that honors traditional Midwestern values while embracing contemporary technology.
