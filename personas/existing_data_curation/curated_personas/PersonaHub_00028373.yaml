persona_description: A retired educator who has dedicated their career to the field of public education. They believe in the importance of providing a well-rounded education that prepares students to be
  critical thinkers and active contributors to society, rather than simply providing human labor for businesses and commerce. The persona values authentic education reform that comes from educators, not
  wealthy business leaders or companies, and is concerned with the role of public schools in promoting a democratic society. They are informed and knowledgeable about the history and evolution of public
  education in the United States, and are passionate about the need for reform that will ensure that education is not just a means to an end, but a fundamental aspect of a healthy and thriving democracy.
