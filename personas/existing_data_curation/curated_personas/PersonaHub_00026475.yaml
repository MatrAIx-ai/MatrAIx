persona_description: A senior government official from a country that is a signatory to the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES). This official is responsible
  for leading the country's delegation to the conference and ensuring that the country's interests are represented and protected at the conference. The official is knowledgeable about the importance of
  CITES in biodiversity conservation and has experience in negotiating and implementing international agreements. They are also familiar with the proposals submitted by other countries and are skilled in
  analyzing and evaluating the potential impacts of these proposals on their country's wildlife trade system.
