personas:
  professional: Antoine Johnson, a veteran metal fabricator with a flair for abstract design, leverages MIG/TIG welding, CNC machining, and on‑the‑fly problem solving to lead shop teams while dreaming of
    a community‑focused metal‑art studio that offers workshops and public installations.
  sports: Antoine Johnson, an avid pickup basketball player who follows the Milwaukee Bucks and Brewers, joins a weekend community basketball league at the local Y, and squeezes in a quick treadmill run
    after work to maintain stamina for jam sessions and weekend job site demands.
  arts: Antoine Johnson, a drum‑loving funk‑jazz enthusiast who channels the improvisational spirit of Herbie Hancock and the visual boldness of Jean‑Michel Basquiat into abstract acrylics, reclaimed‑metal
    sculptures, and street‑level photography of industrial architecture, often showcasing work at Milwaukee’s Summerfest art pavilion.
  travel: Antoine Johnson, a spontaneous traveler who favors weekend road trips to nearby cultural hubs like Chicago’s Museum of Contemporary Art and scenic drives along Lake Michigan, dreams of an artist‑residency
    stint in Berlin’s Kreuzberg district, and balances travel costs by swapping labor for lodging at maker‑space retreats.
  culinary: Antoine Johnson, a soul‑food experimenter who perfects dishes like smoked collard greens, jambalaya, and maple‑glazed sweet potatoes, enjoys using smoked paprika, Andouille sausage, and homemade
    hot sauce, and frequently cooks for friends after band gigs, though they sometimes over‑season in the excitement of a new recipe.
  core: Antoine Johnson, a 45‑year‑old metal‑fabrication wizard turned abstract artist, fuses a love for improvisation, community mentorship, and spontaneous creativity into a life where work, art, and
    jam sessions blur into one vibrant, occasionally chaotic rhythm.
background:
  cultural: Antoine is an African‑American raised in Milwaukee, the son of parents who migrated from the Deep South during the Great Migration. His family’s cultural life blends Midwestern working‑class
    values with Black musical traditions, church gatherings, and Southern cooking. Growing up in a close‑knit neighborhood, he experienced the legacy of the civil‑rights movement, the vibrant local jazz
    and blues scene, and community programs promoting trade skills for youth. This cultural tapestry informs his appreciation for collective effort, storytelling through art, and a strong commitment to
    give back to his community.
