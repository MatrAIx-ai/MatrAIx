  hobbies: '[''Abstract painting'', ''Sketching'', ''Drumming (funk‑jazz)'', ''Pickup basketball'', ''Mentoring at youth makerspace'', ''Sci‑fi reading'', ''Attending Summerfest and art fairs'', ''Soul‑food
    cooking'', ''Street photography'', ''DIY metal sculpture'']'
  career_goals: Antoine aims to advance to a lead fabricator or shop foreman role, using his growing leadership skills to mentor younger workers and influence process improvements. Over the next few years
    he plans to complete an associate’s degree in industrial technology and earn a certified welder credential. Ultimately, he dreams of opening a small custom metal‑art studio that offers community workshops,
    commissions public art installations for Milwaukee neighborhoods, and blends his technical expertise with his love for abstract art. He also wants to become an advocate for diversity in manufacturing
    and help recruit more people of color into skilled trades.
