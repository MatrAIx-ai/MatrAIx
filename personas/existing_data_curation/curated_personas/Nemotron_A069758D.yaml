personas:
  professional: Carlos Hernandez is an aspiring multidisciplinary artist who merges hand‑drawn sketches, digital illustrations, and 3‑D modeling to create immersive community‑focused installations, leveraging
    their empathy and bilingual fluency to collaborate across cultural lines while often battling procrastination due to a dislike of rigid deadlines.
  sports: Carlos Hernandez is a casual skateboarder who spends afternoons at the Dallas Skate Spot, roots for the Dallas Mavericks on game nights, occasionally joins a community basketball league with the
    Dallas Hoops Club, and approaches fitness with an improvisational mindset—preferring spontaneous street‑art tours and bike rides over regimented gym routines.
  arts: Carlos Hernandez is a fervent admirer of street‑art legends like Banksy and Shepard Fairey, devours speculative fiction novels by Neil Gaiman and N.K. Jemisin, finds inspiration in the atmospheric
    guitar work of Bon Iver and the experimental beats of Flying Lotus, and channels these influences into daily sketching sessions that blend comic‑book aesthetics with digital surrealism.
  travel: Carlos Hernandez prefers spontaneous road trips over meticulously planned itineraries, often grabbing friends for weekend drives to the colorful art districts of Santa Fe, the jazz‑filled streets
    of New Orleans, and the coastal cliffs of Big Sur, while dreaming of an extended backpacking adventure through Machu Picchu’s ancient ruins and the vibrant street‑art alleys of Berlin.
  culinary: Carlos Hernandez enjoys cooking comfort dishes at home, mastering a spiced corn stew with smoky chipotle, fresh avocado, and crumbled cheese, while also experimenting with plating techniques
    inspired by modernist cuisine, though they often burn the first batch when distracted by a new sketch idea.
  core: Carlos Hernandez is a wildly imaginative 18‑year‑old artist who flits between sketchbook, digital canvas, and skateboard, channeling compassion into community art lessons while habitually procrastinating
    deadlines and forgetting to water their plants.
background:
  cultural: Carlos was raised in a bilingual Mexican‑American household in Garland, Texas. His parents emigrated from Jalisco, and he grew up speaking Spanish at home while also navigating an English‑dominant
    school environment. He celebrates Mexican traditions such as Día de los Muertos, quinceañeras, and family gatherings centered around authentic cuisine. The multicultural tapestry of the Dallas metro
    area has exposed him to both Hispanic and broader Texan cultures, shaping a hybrid identity that values family, community service, and creative self‑expression.
