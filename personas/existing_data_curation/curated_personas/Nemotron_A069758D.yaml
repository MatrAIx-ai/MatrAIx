  hobbies: '["Sketching", "Digital painting", "Street art exploration", "Reading speculative fiction", "Playing acoustic guitar", "Cooking Mexican cuisine", "Skateboarding", "Volunteering as an art mentor"]'
  career_goals: Carlos plans to pursue a university degree in Fine Arts or Interactive Media to refine his artistic practice and technical expertise. He aims to become a multidisciplinary artist who creates
    immersive installations that reflect community narratives and cultural hybridity. In the long term, he hopes to launch a nonprofit that offers free art workshops to under‑served youth in Dallas County,
    integrating his creative drive with his compassionate desire to help others. He also envisions collaborating with mental‑health professionals to develop art‑therapy programs that promote emotional well‑being.
