personas:
  professional: Mark Degregory is a senior operational strategist who leverages their humanities background and decades of leadership to excel in process optimization, risk assessment, and change management,
    channeling their critical, competitive nature into relentless performance benchmarking while maintaining a pragmatic, curiosity‑driven approach to integrating technology with established workflows.
  sports: Mark Degregory spends weekends hiking the Wasatch foothills with the Wasatch Outdoor Club, follows the Utah Jazz and Real Salt Lake religiously, and maintains a low‑impact fitness routine that
    includes weekly trail runs and occasional cross‑country skiing, all while favoring solitary endurance over team sports.
  arts: Mark Degregory cultivates their artistic side through early‑morning landscape photography inspired by Ansel Adams, curates a personal gallery of vintage map prints from 18th‑century cartographers
    like John Bartram, and immerses themselves in classic literature from Tolstoy to Camus, which inform their volunteer docent narratives at the regional museum.
  travel: Mark Degregory prefers meticulously planned, low‑key trips that blend historical exploration and natural scenery, such as a week‑long itinerary through the museums of Florence, a solo trek in
    Patagonia’s Torres del Paine, and repeated weekend retreats to Yellowstone’s geysers, all scheduled around their work calendar to minimize family disruption.
  culinary: Mark Degregory enjoys cooking at an intermediate level, favoring rustic dishes like rosemary‑roasted lamb, pan‑seared trout with lemon‑dill sauce, and a hearty mushroom barley stew, while proudly
    sourcing heirloom tomatoes and smoked paprika from their modest garden.
  core: Mark Degregory is a meticulous, curiosity‑driven strategist who balances relentless efficiency at work with solitary, detail‑oriented hobbies, yet wrestles with chronic worry and an occasional reluctance
    to delegate, often finding themselves over‑analysing every decision.
background:
  cultural: Mark comes from a middle-class, European-American background rooted in the Midwest, and has lived in the Intermountain West for most of his adult life. His upbringing emphasized self-reliance,
    practicality, and community involvement, while his arts and humanities education fostered a deep appreciation for literature, history, and cultural heritage. Residing in West Jordan, Utah, he blends
    the region’s outdoors-oriented lifestyle with the suburban family values of Salt Lake County, regularly participating in community events that celebrate local history and the natural landscape.
