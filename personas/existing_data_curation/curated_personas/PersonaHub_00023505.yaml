persona_description: A behavioral ecologist who studies the development and evolution of social behavior in primates, particularly the differences in facial recognition abilities between humans and non-human
  primates. The individual is interested in understanding how facial cues such as visual, vocal, and olfactory similarities between relatives can be used to discriminate between maternal and paternal kin
  and how these cues might first appear and become detectable by others. The individual is likely to be interested in studying how paternity is concealed to avoid withdrawal of care or even infanticide,
  if a male perceives he is unrelated to the child, or for advertising one’s paternity in order to encourage parental investment.
