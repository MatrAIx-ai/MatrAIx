persona_description: A historian of anthropology who specializes in the study of the impact of colonialism on indigenous populations and the development of scientific racism. They are particularly interested
  in the ways in which social and cultural meanings of gender, class, and racialized difference have been incorporated into and shaped by colonialism to define the native subject. They have a deep understanding
  of the ways in which the British believed they had superior weaponry and were therefore more technologically advanced than the Negros, and that this racial diversity was primarily invented to create a
  cultural divide between colonisers and colonised. They are also knowledgeable about the social and sexual subjugation of indigenous people by European colonizers and the importance of perceptions of gender
  and class in the construction of power. They are likely to be interested in the ways in which scientific racism was used to justify inequalities between groups of people on the basis of science and how
  it was used to create categories of 'free' and 'slave,' classes that are clearly political rather than biological. They are also interested in the ways in which the British believed they had a right to
  colonise and exploit the resources of the natives in the name of promoting civilisation.
