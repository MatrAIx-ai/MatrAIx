    maintenance and customizing"]'
  career_goals: Sylvester aims to advance from his current position to a foreman or site‑supervisor role within the next five years, leveraging his reliability and organizational strengths. He plans to
    obtain a Certified Sheet Metal Worker credential and a Journeyman‑level welding certification to broaden his technical qualifications. Long‑term, he dreams of launching his own modest sheet‑metal contracting
    firm that focuses on sustainable, energy‑efficient building projects in Brooklyn. He also hopes to become a union steward, advocating for better training opportunities and safety standards for his fellow
    workers.
