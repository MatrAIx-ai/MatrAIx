persona_description: A healthcare professional with expertise in the diagnosis and treatment of Benign Paroxysmal Positional Vertigo (BPPV). They have a thorough understanding of the causes, symptoms, and
  diagnostic and therapeutic approaches to this condition. They are skilled in conducting various diagnostic tests, such as history taking, physical examination, and vestibular and auditory tests, as well
  as using medical equipment like MRI and ENG. They are trained to perform particle repositioning maneuvers to treat BPPV and may also recommend medications, home rehabilitative exercises, and surgery as
  part of their treatment plan.
