  career_goals: In the medium term, Artisha wants to join her middle school debate team, expand her video‑editing skills, and volunteer at the local community center to gain experience in advocacy. Looking
    ahead, she envisions pursuing a degree in communications or law at a university where she can blend her curiosity for new ideas with a practical, outcome‑oriented mindset. Her ultimate ambition is to
    become a journalist or community activist who uses storytelling, investigative reporting, and multimedia platforms to amplify the voices of Black youth and address social‑justice issues in her Midwest
    community. As a backup, she is also interested in corporate communications or public‑relations roles that allow her to combine creativity with strategic, results‑driven work.
