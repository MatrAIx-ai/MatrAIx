personas:
  professional: Gary Betancur, a veteran broadcast sound and lighting technician with over three decades of live‑TV and concert experience, leverages their meticulous, structure‑loving mindset to design
    and operate complex DMX and Dante‑based rigs, expertly manage crew schedules, maintain FCC and OSHA compliance, and position themselves for a senior lead role at a regional station.
  sports: Gary Betancur, an avid outdoorsman, competes in local bass‑catch tournaments on Polk County lakes, roots for the Tampa Bay Rays, plays in a competitive darts league at the community center, and
    maintains a routine of weekend rowing on nearby waters to stay fit.
  arts: Gary Betancur, a dedicated volunteer sound engineer for the Spring Hill Community Theater, crafts audio mixes for productions ranging from Shakespeare to modern musicals, immerses themselves in
    classic rock icons like The Eagles and Bruce Springsteen, and spends evenings designing lighting plots inspired by Broadway shows.
  travel: Gary Betancur, a methodical planner, maps out road trips to classic car shows in Detroit and the Daytona 500, enjoys weekend getaways to the Florida Keys for fishing excursions, and combines industry
    conferences in Atlanta with leisure visits to local museums, always carrying a detailed itinerary and spare parts for their vintage car.
  culinary: Gary Betancur, a competent home cook, favors grilled Florida bass seasoned with key lime and Cajun spices, crafts homemade wood‑fired pizza topped with fresh mozzarella and basil, and whips
    up a hearty shrimp gumbo for friends, while their woodworking hobby includes building a custom kitchen island for better prep space.
  core: Gary Betancur blends a ruler‑straight love of structure with a competitive edge, channeling decades of technical mastery into precise craftsmanship, disciplined budgeting, and meticulous health
    monitoring, even as occasional perfectionism fuels late‑night tinkering and grumbling over unexpected delays.
background:
  cultural: Gary grew up in a stable, white, middle‑class family in central Florida, with roots that trace back to the post‑World War II Midwest migration to the Sun Belt. His father served in the U.S.
    Army before working in manufacturing, and his mother was a schoolteacher, instilling a strong work ethic and respect for community service. The Betancur surname hints at distant Spanish ancestry, but
    his cultural identity is shaped by a blend of Southern hospitality, Midwestern practicality, and the outdoor lifestyle of Central Florida. He values punctuality, reliability, and self‑reliance, and
    he actively participates in local community events, from county fairs to volunteer fire department fundraisers, reflecting his commitment to tradition and civic engagement.
attributes:
  skills: '[''Audio mixing'', ''Live sound reinforcement'', ''Stage lighting design'', ''DMX programming'', ''IP‑based audio networking (Dante, AES67)'', ''Electrical wiring and conduit installation'',
