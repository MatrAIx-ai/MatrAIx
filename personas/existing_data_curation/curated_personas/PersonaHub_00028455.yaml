persona_description: A research team consisting of Princeton University researchers and Minnesota University researchers, who are investigating the potential for sustainable production of biomass with root-soil
  carbon storage on degraded lands and integrating the findings with analysis of alternative biomass-based energy conversion systems that utilize geologic carbon capture and storage (CCS). The team aims
  to understand the ecological dynamics, root-soil carbon storage potential, and sustainability of growing perennial grasses on degraded lands that are not well-suited for conventional agriculture, and
  to develop a new and comprehensive understanding of the time evolution of the rate of root-soil carbon storage, which will vary with the type of soil, the condition of the land, time since establishment,
  climate, and type of biomass crop. The team will conduct studies of biomass production and its impact on land use, water, wildlife, and root-soil carbon storage, and incorporate the results into energy
  systems analyses conducted by researchers at Princeton.
