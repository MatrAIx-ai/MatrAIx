  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Woodworking'', ''Knitting'', ''Volunteer at community garden'', ''Bird-watching'', ''Small book club'']'
  career_goals: Shania aims to transition into a senior supervisory or safety‑coordinator role where she can leverage her extensive operational knowledge to mentor the next generation of technicians. She
    plans to earn an OSHA 30‑hour certification and a Six Sigma Yellow Belt to formalize her process‑improvement expertise. As she nears retirement, she envisions a part‑time consulting position that allows
    her to share best practices with local vocational schools while maintaining a balanced work schedule that supports her personal interests and financial stability.
