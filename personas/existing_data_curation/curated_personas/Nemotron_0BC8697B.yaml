personas:
  professional: Shania Selman, a 58‑year‑old veteran forming‑machine setter and operator, leverages three decades of methodical equipment expertise, lean‑process intuition, and OSHA safety leadership to
    mentor crews and steer toward a senior supervisory role while balancing her quiet curiosity.
  sports: Shania Selman, a low‑impact fitness enthusiast, spends weekends hiking the foothills, participates in a seniors’ walking club, cheers on the Seattle Seahawks, Seattle Mariners, and Seattle Sounders,
    and volunteers as a trail maintenance crew, using those activities as her primary exercise regimen.
  arts: Shania Selman, an avid reader of historical fiction ranging from Philippa Gregory to Ken Follett, attends the local community theater’s productions of classic plays, enjoys Joni Mitchell’s folk
    melodies, and crafts knit scarves and wooden kitchen wares inspired by the natural world, often sharing them with book‑club friends.
  travel: Shania Selman, a planner who prefers purposeful, low‑stress trips, has explored Olympic National Park, the Oregon Coast, and Vancouver’s botanical gardens, dreams of a quiet week in New Zealand’s
    South Island, and selects travel packages that include scenic hikes and garden tours, always booking well in advance to secure budget‑friendly lodging.
  culinary: Shania Selman, whose cooking focuses on fresh Pacific Northwest ingredients, delights in cedar‑plank salmon with rosemary, wild mushroom risotto using locally foraged chanterelles, and hazelnut‑streusel
    apple crumble, while her intermediate knitting skills sometimes lead her to experiment with herb‑infused teas paired with meals.
  core: Shania Selman, a methodical, nature‑loving veteran machine‑setter with a quiet curiosity, balances a disciplined work ethic, modest financial planning, and soothing solitary crafts while charting
    a measured transition toward mentorship and retirement.
background:
  cultural: Shania comes from a white, working‑class background typical of the Pacific Northwest. Her family traces its roots to German and Scandinavian immigrants who settled in Washington state in the
    early 20th century. Growing up in a modest, close‑knit community, she was taught the value of hard work, self‑reliance, and respect for the natural environment. These cultural influences fostered her
    practical mindset, modest lifestyle, and appreciation for community service. While not religiously affiliated, she maintains connections with local community groups and values the harmonious relationships
    she builds with neighbors and coworkers.
attributes:
