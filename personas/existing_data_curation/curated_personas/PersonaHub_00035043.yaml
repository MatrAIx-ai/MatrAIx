persona_description: A healthcare professional who specializes in the diagnosis and treatment of giardiasis. They have extensive knowledge and experience in the medical history, physical exam, stool analysis,
  antigen tests, string test, duodenal fluid analysis, and other tests used to detect giardiasis. They are well-versed in the use of medical history and physical exam to suggest the diagnosis of giardiasis
  and may prescribe a single course of treatment before further testing. They may also be familiar with other tests used to detect giardiasis or similar conditions and may be involved in the management
  of outbreaks in nursing homes or day care centers.
