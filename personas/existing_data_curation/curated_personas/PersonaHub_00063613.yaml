persona_description: A paleoanthropologist and geneticist who specializes in the study of ancient human and Neandertal fossils, as well as the genetic and biological history of humans and Neandertals. They
  are particularly interested in the interbreeding between humans and Neandertals, the genetic and biological impact of interbreeding, and the potential benefits and drawbacks of interbreeding for humans.
  They are also interested in the evolution of human and Neandertal facial features and the genetic and biological history of the Skhul and Qafzeh caves in Israel.
