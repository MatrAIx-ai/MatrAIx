personas:
  professional: Corey Alexander, a retired handyman turned community mentor, leverages decades of carpentry, plumbing, and budgeting expertise to lead home‑safety workshops at the senior center, where their
    methodical nature and assertive yet compassionate demeanor keep participants on schedule and engaged.
  sports: Corey Alexander, a senior bowler who competes in the Greenville Central Bowling League on Tuesday nights, also follows the Greenville Drive baseball team and the Carolina Hurricanes hockey team,
    and incorporates a twice‑weekly walking routine to stay limber and manage arthritis.
  arts: Corey Alexander, a devoted drummer in his church’s gospel band, draws rhythmic inspiration from Mahalia Jackson, B.B. King, and Aretha Franklin, spends evenings listening to blues vinyls, and relaxes
    by watching classic films such as Casablanca and The Great Escape.
  travel: Corey Alexander, an avid weekend road‑tripper, has explored the historic district of Wilmington, the coastal dunes of Outer Banks, and the jazz‑filled streets of New Orleans, and hopes to visit
    Charleston’s historic homes and the gardens of Bermuda next spring.
  culinary: Corey Alexander, a seasoned soul‑food cook, perfects fried chicken with a buttermilk‑marinade, slow‑cooks collard greens with smoked turkey, bakes peach cobbler sprinkled with cinnamon and nutmeg,
    and enjoys experimenting with hot sauce and molasses to add depth to traditional dishes.
  core: Corey Alexander, a garden‑tending, drum‑looping senior who blends meticulous budgeting with community‑first activism, yet can’t resist an extra slice of peach cobbler when stress spikes.
background:
  cultural: Corey is a lifelong member of the African American community in Eastern North Carolina. Raised during the civil‑rights era, he inherited a strong sense of resilience, faith, and communal responsibility.
    His family traditions emphasize church involvement, storytelling, and soulful cooking, especially dishes like fried chicken, collard greens, and peach cobbler. He values the rich musical heritage of
    gospel and blues, which he expresses through his drumming. The cultural fabric of his upbringing—rooted in family closeness, respect for elders, and a commitment to uplifting the community—continues
    to shape his worldview and daily practices.
