  career_goals: Although retired from formal employment, Corey aims to stay active and purposeful. He aspires to expand his volunteer work at the Greenville Senior Center, leading workshops on home safety
    and budgeting for fellow seniors. He also hopes to formalize a mentorship program through his church, guiding at‑risk youth in practical trade skills and life planning. Corey's longer‑term ambition
    is to preserve and share the local African American history of Pitt County, perhaps by contributing oral histories to the community archive, while maintaining his personal health through regular exercise
    and stress‑management routines.
