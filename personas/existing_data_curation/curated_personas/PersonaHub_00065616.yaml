persona_description: A scientist or environmentalist who is interested in the impact of phosphorus and exotic species on the sustainability of fish harvests in Lake Erie and its tributary streams. This
  person is likely to be knowledgeable about the biology and ecology of fish in Lake Erie, the effects of phosphorus on aquatic ecosystems, and the potential solutions to address the issues posed by zebra
  mussels. They may also be interested in the potential for phosphorus addition to stimulate algal productivity, but are cautious about the potential for eutrophication and oxygen depletion in the lake.
