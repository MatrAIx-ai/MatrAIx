  hobbies: '[''Hiking and Trail Exploration'', ''Landscape Photography'', ''Watercolor Painting'', ''Visiting Art Galleries and Museums'', ''Reading Science Fiction and Non‑Fiction'', ''Strategy Board Games'',
    ''Logic Puzzles and Crosswords'', ''Volunteer Science Outreach'']'
  career_goals: In the short term, Cara plans to earn a professional certification such as AWS Certified Data Analytics and volunteer as a data analyst for a local environmental non‑profit, turning raw
    environmental data into actionable community reports. Over the next five years she aims to secure a senior data‑visualization role within a sustainability‑focused organization, leading interdisciplinary
    teams that fuse scientific research with public outreach through art. Her long‑term ambition is to establish a community hub in Missoula where data science, environmental advocacy, and visual arts intersect,
    offering workshops and mentorship to young people and fostering evidence‑based community initiatives.
