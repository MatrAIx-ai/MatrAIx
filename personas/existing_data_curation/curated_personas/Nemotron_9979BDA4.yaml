personas:
  professional: Cara, a 26‑year‑old data analyst with a B.S. in Computer Science, blends Python‑driven spatial analytics and GIS mapping with a disciplined design eye to craft compelling environmental dashboards,
    while their competitive streak fuels a relentless pursuit of data‑driven storytelling excellence.
  sports: Cara, an avid hiker, regularly tackles the rugged slopes of Pattee Canyon and joins the Missoula Trail Runners club for weekend long runs, while cheering on the Seattle Seahawks and the Montana
    Grizzlies, and they occasionally train at the Missoula Climbing Center to improve rock‑climbing technique.
  arts: Cara immerses themselves in the creative world by painting abstract watercolors inspired by spectroscopic graphs, photographing sunrise over the Rockies with a Nikon D750, and seeking inspiration
    from Ansel Adams, Georgia O’Keeffe, and the avant‑garde installations of Olafur Eliasson during visits to the Missoula Art Museum and local galleries.
  travel: Cara prefers meticulously planned trips that combine hiking, photography, and data collection, having trekked the Glacier National Park backcountry, explored the fjords of Norway for Nordic light
    studies, and dreaming of a future research‑art residency in Kyoto’s Arashiyama district.
  culinary: Cara enjoys crafting meals that echo their love for nature, often preparing quinoa bowls topped with roasted root vegetables, wild huckleberry jam, and smoked paprika‑spiced grilled salmon,
    while their intermediate cooking skill level shines when they experiment with lavender‑infused shortbread and hand‑crafted pesto pasta.
  core: Cara, a 26‑year‑old data‑driven explorer, fuses analytical rigor with artistic curiosity, hiking, painting, and coding in equal measure, while their competitive drive and skeptical eye keep them
    striving for excellence and questioning every assumption.
background:
  cultural: Cara was raised in a middle‑class, white family with deep roots in the Pacific Northwest, drawing on a blend of German and Irish ancestry. Her upbringing emphasized self‑reliance, a love of
    the outdoors, and a respect for education. Living in Missoula, a university town known for its progressive community and strong environmental ethic, she has been shaped by a culture that values both
    independent thinking and collective stewardship of natural resources. Family traditions included weekend trips to national parks, community volunteerism, and exposure to a variety of artistic events,
    fostering her appreciation for both scientific rigor and creative expression.
attributes:
  skills: '[''Data Analysis'', ''Python Programming'', ''R Statistical Modeling'', ''SQL Querying'', ''GIS Mapping'', ''Laboratory Techniques (spectroscopy, chromatography)'', ''Technical Writing'', ''Project
