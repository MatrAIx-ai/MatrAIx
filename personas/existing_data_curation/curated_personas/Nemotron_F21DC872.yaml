  career_goals: Gregory aims to transition from a frontline production worker to a supervisory role within the next three years, targeting a shift-lead or plant-operations manager position. To support this
    move, he is pursuing a Six Sigma Green Belt certification and plans to complete his associate degree in industrial technology. He hopes to leverage his practical curiosity to introduce modest automation
    projects that improve efficiency without displacing his coworkers. Additionally, Gregory wants to champion a healthier workplace culture by establishing peer-support groups and informal stress-relief
    activities, drawing on his own experiences with anxiety to help others. Long-term, he envisions mentoring younger employees and possibly consulting for small manufacturers on lean practices.
