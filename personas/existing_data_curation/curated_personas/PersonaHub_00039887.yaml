persona_description: A historian who specializes in the study of international relations and the League of Nations, particularly the events and actions that led to its failure to deal with the Japanese
  invasion of Manchuria in 1931. This historian is knowledgeable about the League's founding principles, its role in the interwar period, and the impact of the invasion on the League's reputation and effectiveness.
  This historian is also interested in the economic, political, and military factors that contributed to the Japanese invasion and the League's inability to prevent it.
