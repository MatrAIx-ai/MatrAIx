  career_goals: Cindy dreams of becoming a primary‑school teacher or a librarian, where she can design structured, supportive learning environments for younger children. She is also intrigued by the idea
    of working in child advocacy or community health, fields that would let her combine her compassion with her knack for organization to help families and peers navigate everyday challenges.
