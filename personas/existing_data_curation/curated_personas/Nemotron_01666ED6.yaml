personas:
  professional: A budding mechanical engineer, Cindy Faxon transforms her love for intricate LEGO builds into designing small‑scale robotic challenges for the school STEM club, and they apply their organized,
    methodical planning and compassionate teamwork to every prototype.
  sports: Cindy Faxon glides confidently at the St. Paul Ice Rink as a member of the junior figure‑skating club, roots for the Minnesota Twins in baseball season and the St. Paul Saints during summer, and
    they complement their skating with strength and balance drills that reflect their structured, teamwork‑oriented mindset.
  arts: Cindy Faxon nurtures her artistic side through piano lessons, favoring the disciplined works of Mozart and the whimsical melodies of Yiruma, while they devour fantasy novels like J.K. Rowling’s
    Harry Potter series and regularly volunteer at the library’s story‑time sessions where they often reenact favorite scenes, fueling a budding love for theater.
  travel: Cindy Faxon enjoys family outings to the Mall of America for roller‑coaster thrills, weekend excursions to Como Park Zoo and Conservatory to feed the ducks, dreams of exploring Yellowstone National
    Park’s geysers, and they meticulously plan each adventure on a colorful map pinned to their bedroom wall.
  culinary: Cindy Faxon favors hearty comfort foods such as mac and cheese, apple pie with vanilla ice cream, and enjoys helping her parents bake cinnamon rolls with fresh butter and brown sugar, while
    they also love snacking on Swedish meatballs during holiday gatherings, showcasing an appreciation for both familiar and festive flavors.
  core: Cindy Faxon balances a love for order and community service with a mischievous habit of slipping extra LEGO bricks into friends’ backpacks, embodying a disciplined yet playful spirit.
background:
  cultural: Cindy comes from a white, Midwestern family with German and Scandinavian ancestry, common in many Saint Paul neighborhoods. Her household emphasizes punctuality, community involvement, and respect
    for rules, reflecting the broader Minnesota cultural values of cooperation and volunteerism. She celebrates holidays such as Thanksgiving, Christmas, and the local St. Paul Winter Carnival, and takes
    part in her church's youth activities, which reinforce a sense of service and harmony. Growing up in a diverse city, she is also exposed to a variety of cultural traditions beyond her own, fostering
    an inclusive and open‑minded outlook.
