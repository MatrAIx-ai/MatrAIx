  hobbies: '[''drawing'', ''painting'', ''shell and sea glass crafts'', ''reading fantasy novels'', ''playing piano'', ''coding simple games in Scratch'', ''beach clean-up activities'', ''participating
    in school art club'', ''building LEGO sets'', ''playing Minecraft'']'
  career_goals: She dreams of a future where she can combine her love for art with her compassionate nature, such as becoming an art therapist who helps children express themselves, or a community museum
    educator who designs inclusive exhibitions. She is also drawn to protecting the local coastline and imagines a role as a marine-conservation advocate. At this stage, she is exploring many possibilities
    and wants to keep learning about careers that blend creativity, service, and environmental stewardship.
