personas:
  professional: Melissa Ingalls, an aspiring junior game developer and digital artist, leverages her curiosity and love for oceanic visuals to craft simple Scratch games, while they collaborate with classmates
    in the school art club, even though their relaxed, somewhat disorganized style sometimes leaves projects unfinished.
  sports: Melissa Ingalls enjoys swimming at the local beach and joins a junior surf club on weekends, cheering on the Los Angeles Dodgers while they also dabble in casual beach volleyball with cousins
    and friends.
  arts: Melissa Ingalls blends seaside inspiration with classic art techniques, sketching vibrant beach panoramas reminiscent of Monet, crafting sea-glass collages while listening to The Lumineers, and
    practicing beginner piano pieces from the Alfred series, which they play with a gentle, curious touch.
  travel: Melissa Ingalls prefers spontaneous sand-filled getaways, revisiting the family’s summer trips to Clearwater Beach and exploring tide pools at Monterey Bay, while they also dream of a school field
    trip to the Great Barrier Reef for a deep-sea adventure.
  culinary: Melissa Ingalls delights in devouring fish tacos with fresh cilantro and lime, enjoys making grilled cheese sandwiches topped with sliced avocado, and they often experiment with sea-glass-inspired
    desserts, mixing blue gelatin with crushed candy shells for a splash of color.
  core: Melissa Ingalls is a curiosity-driven 11-year-old beach enthusiast who balances artistic projects, Scratch coding, and clean-up missions with a laid-back attitude that sometimes leaves craft supplies
    strewn about and deadlines unattended.
background:
  cultural: Melissa comes from a middle-class white American family with roots in the Northeastern United States, reflecting a blend of Anglo-American and European heritage. Growing up in Avon By The Sea,
    New Jersey, she is influenced by coastal suburban culture, including community beach activities, summer festivals, and holiday celebrations such as Thanksgiving and the Fourth of July. Her family values
    education, creativity, and community service, and she has been exposed to diverse cultural events through school and local programs, fostering an inclusive and open-minded outlook.
