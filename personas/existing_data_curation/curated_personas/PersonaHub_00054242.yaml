persona_description: A marine biologist who specializes in the study of the evolution of sound detection mechanisms in vertebrates, particularly focusing on the unique hearing systems of fish and their
  evolution from ancient fish gills. Their research interests include the anatomy and physiology of the inner ear, the auditory system in fish, and the comparative anatomy and physiology of hearing in vertebrates.
  They are particularly interested in the evolution of hearing in fish and the role of sensory mechanisms in the marine environment.
