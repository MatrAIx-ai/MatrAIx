  career_goals: Looking ahead, Dinesh aims to move from a hands‑on janitorial role into a supervisory or facilities‑management position, preferably within a cultural institution such as a museum, gallery,
    or community arts center where his love of art can be applied. He plans to obtain a Certified Facility Manager (CFM) credential and complete OSHA safety training to strengthen his qualifications. In
    the longer term, he envisions launching a small cleaning service that specializes in serving art studios and exhibition spaces, emphasizing environmentally friendly practices. He also hopes to mentor
    younger custodial staff, sharing his organizational methods and people‑skills, and to volunteer his time to coordinate community clean‑up events and art‑related outreach programs.
