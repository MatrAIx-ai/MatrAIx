personas:
  professional: Stephanie Mcdonald, an aspiring multimedia storyteller, blends sketching, short‑form TikTok video creation, and poetry to craft narrative visual pieces, channeling their curiosity and sociable
    energy into collaborative school media projects.
  sports: Stephanie Mcdonald plays guard on the Midtown Hoops Club’s youth basketball team at Riverside Park, follows the New York Knicks for NBA inspiration, and incorporates street‑dance warm‑ups into
    practice, valuing teamwork and using basketball as a social outlet despite occasional over‑exertion that leads to sore knees.
  arts: Stephanie Mcdonald sketches vibrant street scenes inspired by Banksy’s stencils, immerses themselves in the works of Monet at the local museum, writes poetry to the beats of Kendrick Lamar and the
    improvisations of Miles Davis, and draws creative inspiration from the theatrical flair of Lin‑Manuel Miranda’s ‘Hamilton’ and the visual storytelling of Pixar’s ‘Coco’.
  travel: Stephanie Mcdonald enjoys weekend family trips to the Smithsonian in Washington, D.C., day‑long explorations of New York City’s Central Park and street murals, and dreams of studying art in Paris’s
    Louvre and the neon streets of Tokyo, favoring budget‑friendly itineraries planned through Instagram and TikTok travel guides while balancing school commitments.
  culinary: Stephanie Mcdonald’s palate favors homemade avocado toast with lime zest, spicy ramen topped with soft‑boiled egg, sushi rolls made with cucumber, tuna, and sesame seeds, and occasionally bakes
    gooey chocolate chip cookies, though they often skip breakfast to binge‑watch cooking videos before school.
  core: Stephanie Mcdonald fuses curiosity‑driven art, talkative energy, and a dash of late‑night TikTok indulgence into a vibrant, socially‑charged teen life.
background:
  cultural: She is an African‑American teenager raised in Brooklyn, immersed in the vibrant cultural tapestry of the borough. Her family celebrates traditions such as church gatherings, block parties, and
    holiday meals featuring soul food and Caribbean influences. Growing up in a diverse community, she draws inspiration from hip‑hop, street art, and local community initiatives, and values the strong
    sense of neighborhood solidarity.
