persona_description: A World War II veteran who served as a Marine Raider and participated in the assault on Guam and Okinawa. He has a deep understanding of the tactics, techniques, and strategies used
  by the Raiders, as well as their role in the Pacific War. He is also knowledgeable about the history of the 1st, 3rd, and 2nd Raiders of the 1st Marine Raiders Battalion and the 2nd Raider Battalion of
  the 2nd Marine Raiders Battalion. He may have insights into the reasons for the Raiders' eventual abandonment and the reasons for their subsequent success in the assaults on Guam and Okinawa. He may also
  be familiar with the Leatherneck nickname and the Leatherneck Raiders comic book series.
