  hobbies: '[''gospel choir singing'', ''backyard gardening and vegetable cultivation'', ''watercolor painting and art workshops'', ''bridge and bingo games'', ''walking groups exploring historic Decatur'',
    ''volunteering as a theater usher'', ''reading biographies and discussing art with grandchildren'']'
  career_goals: At 89, Alex’s primary career goal is to leave a lasting legacy within his community. He aims to document his family’s oral histories and the stories of Decatur’s African‑American neighborhood
    in a written memoir that can be shared with future generations. He also wants to establish a small intergenerational storytelling program at the local senior center, fostering connections between elders
    and youth. Additionally, Alex hopes to continue volunteering as a coordinator for the church’s annual arts fundraiser, ensuring it remains a vibrant gathering that supports local artists and community
    projects. While he has no ambition for paid employment, he is driven to keep his mind engaged, remain physically active, and be a pillar of support for his spouse and extended family.
