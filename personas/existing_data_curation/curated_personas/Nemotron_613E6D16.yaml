  career_goals: Allen aims to channel his curiosity and practical mindset into a career as a mechanical engineer or robotics specialist, designing sustainable machines and automation solutions for everyday
    use. He is also fascinated by computer science and dreams of creating video games that blend innovative mechanics with compelling stories. Parallel to these technical pursuits, he hopes to earn a soccer
    scholarship that could lead to playing at the collegiate level, reflecting his competitive drive. In the longer term, he envisions a role that combines problem‑solving with community impact, such as
    becoming a firefighter or an engineer focused on infrastructure improvements in his hometown.
