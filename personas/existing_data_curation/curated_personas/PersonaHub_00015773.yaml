persona_description: A conservation biologist who is interested in the study of nonindigenous mammal distribution, population trends, and the impact of their presence on ecosystems. They are particularly
  interested in the effects of nonindigenous species on grizzly bears, walruses, and polar bears, and are using noninvasive methods such as collecting hair samples to estimate population growth rates and
  DNA analysis to identify and track the species. They are also interested in the history and pathology of plague, and the impact of climate change on the Arctic ecosystem.
