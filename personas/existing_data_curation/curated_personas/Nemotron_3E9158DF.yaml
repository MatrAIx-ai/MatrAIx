personas:
  professional: Janet Young is a seasoned installation, maintenance, and repair technician who blends a hands‑on, code‑compliant approach with a habit of mentoring newcomers, leveraging her associate degree
    in Mechanical Maintenance Technology while eyeing EPA 608 certification and a future lead‑technician role.
  sports: Janet Young enjoys solitary weekend hikes on prairie trails, keeps a modest jogging routine, follows the local minor‑league baseball team the Prairie Stars, and participates in a seasonal community
    gardening physical‑activity club that doubles as low‑key cardio.
  arts: Janet Young immerses themselves in classic folk music—spinning Bob Dylan and Joan Baez on vinyl—while solving crossword puzzles, reading Agatha Christie mysteries, and capturing prairie sunsets
    with a DSLR, shaping a quiet, introspective creative outlet.
  travel: Janet Young prefers low‑key road trips to national parks like Badlands and Yellowstone, favoring self‑guided hikes and campgrounds over crowded resorts, planning trips on a loose itinerary that
    balances solitude with spontaneous photography stops.
  culinary: Janet Young enjoys farm‑to‑table meals built from their garden, favoring roasted zucchini, heirloom tomatoes, and fresh basil in simple pasta dishes, while their cooking skill hovers at confident
    home‑cook level and they rarely venture into fine dining.
  core: Janet Young blends pragmatic technical expertise with a love for solitary, low‑key hobbies, managing life with routine‑driven precision while occasionally drifting into relaxed, improvised moments.
background:
  cultural: Janet Maria Young grew up in a small, predominantly white Midwestern town in Delaware County, Iowa. Her family’s roots trace back to German and Scandinavian immigrants who settled the region
    in the late 1800s. Raised in a Lutheran household, she was taught the value of hard work, practicality, and self‑reliance. The community emphasized routine, modesty, and a strong sense of responsibility
    to family and neighbors, shaping her traditional yet pragmatic outlook on life.
attributes:
  skills: '[''HVAC system installation and maintenance'', ''Electrical wiring and troubleshooting'', ''Plumbing fixture repair'', ''Preventive maintenance scheduling'', ''Reading and interpreting technical
    schematics'', ''Use of hand and power tools'', ''Safety compliance (OSHA, EPA)'', ''Basic project coordination'', ''Mentoring junior technicians'', ''Customer service in a technical context'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Birdwatching'', ''Hiking local trails'', ''Reading mystery novels'', ''Solving crossword puzzles'', ''Listening to classic folk music'', ''Nature photography'',
    ''Cooking simple comfort meals'', ''Model kit building'']'
  career_goals: Janet aims to deepen her technical expertise by earning EPA 608 certification and becoming a Journeyman Electrician. Over the next five years she hopes to move into a lead technician role
    where she can oversee routine maintenance programs and mentor a small crew. Long‑term, she envisions a supervisory position that allows her to design efficient, predictable maintenance schedules without
    extensive administrative burdens, and she is open to pursuing a bachelor's degree in Facility Management to support that transition.
