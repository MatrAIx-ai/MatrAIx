  career_goals: Alayna aims to move beyond her current cashier role into a supervisory or store‑manager position within the next few years, leveraging her business education and on‑the‑job experience. She
    plans to earn a Certified Retail Manager credential and take additional courses in small‑business finance to bolster her qualifications. Long‑term, she envisions opening a modest boutique or coffee
    shop that blends community gathering space with local art and cuisine, providing employment opportunities for young adults in Ponte Vedra Beach. She also hopes to mentor at‑risk youth through a local
    nonprofit, using her business knowledge to guide them in financial literacy and career planning.
