  hobbies: '[''Beach walking'', ''Paddle boarding'', ''Reading (historical fiction, personal development)'', ''Cooking (Southern and Caribbean fusion)'', ''Music (R&B, jazz, hip‑hop)'', ''Gardening'', ''DIY
