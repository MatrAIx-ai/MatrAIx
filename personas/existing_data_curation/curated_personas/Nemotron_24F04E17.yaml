personas:
  professional: Alayna Thompson, a 42‑year‑old retail cashier in Ponte Vedra Beach, leverages their business degree, quick conflict‑resolution skills, and adaptable, curiosity‑driven mindset to streamline
    store operations while they informally mentor new teammates and seize every chance to propose innovative promotions.
  sports: Alayna Thompson, a paddle‑boarding enthusiast who greets each sunrise with a brisk shoreline walk, joins the seasonal beach‑volleyball league at the local Ponte Vedra Suns club, cheers on the
    Jacksonville Jaguars during football season, and squeezes in 5K charity runs, balancing a relaxed attitude with consistent low‑impact fitness that they maintain year‑round.
  arts: Alayna Thompson, a devoted listener of R&B icons like Erykah Badu, jazz legends such as Miles Davis, and contemporary hip‑hop storytellers like Kendrick Lamar, regularly attends live performances
    at the Ponte Vedra Beach Community Center and weaves heritage‑inspired patterns into quilting projects they proudly showcase at local cultural festivals.
  travel: Alayna Thompson, who prefers modestly budget‑conscious, spontaneous getaways, spends her vacations paddle‑boarding on the Bahamas’ Exuma Cays, strolling through Savannah’s historic squares, and
    dreaming of a future culinary tour of New Orleans’ French Quarter, balancing relaxation with an eager thirst for cultural immersion that they chase whenever possible.
  culinary: Alayna Thompson, an enthusiastic home cook who fuses Southern staples like shrimp‑and‑grits with Caribbean twists such as jerk‑spiced plantains, seasonings like Scotch bonnet peppers, coconut
    milk, and fresh herbs, delights in sampling farm‑to‑table seafood at Jacksonville’s Riverside Restaurant, and continuously experiments with new recipes in their modest kitchen, bringing a creative flair
    they share at community potlucks.
  core: Alayna Thompson navigates life with a sunny, laid‑back spirit, juggling a love for community mentorship and spontaneous paddle‑boarding sessions with a habit of misplacing their keys during busy
    workdays, all while they dream of turning their coastal boutique vision into reality.
background:
  cultural: Alayna identifies as an African American woman whose family roots trace back to the Southern United States, with stories of migration and community resilience passed down through generations.
    Growing up in Florida, she blends Southern cultural traditions—like soul food, jazz, and church community gatherings—with the diverse, coastal influences of St. Johns County. She celebrates Juneteenth
    and Kwanzaa, participates in local Black cultural festivals, and values the strong sense of solidarity and mentorship that characterize her community. These cultural experiences shape her worldview,
    fostering a commitment to uplift others while honoring her heritage.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operations'', ''Basic Accounting'', ''Inventory Management'', ''Effective Communication'', ''Conflict Resolution'', ''Social Media Marketing'',
