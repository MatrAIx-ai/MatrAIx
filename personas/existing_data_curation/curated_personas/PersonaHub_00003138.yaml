persona_description: A healthcare professional who is interested in medication safety and the design and use of auto-injector devices, particularly the Twinject and EpiPen. They are knowledgeable about
  the potential risks and benefits of epinephrine and are interested in improving patient education and hands-on training for managing anaphylaxis with injectable epinephrine. They are likely to have a
  background in pharmacology, clinical medicine, or pharmacy and are interested in the latest research and developments in the field of emergency medicine. They are also likely to have a passion for patient
  safety and are interested in improving the quality of care for patients with anaphylaxis.
