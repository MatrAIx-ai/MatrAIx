  hobbies: '[''Hiking'', ''Horseback riding'', ''Gardening'', ''Cooking'', ''Reading non-fiction'', ''Podcast listening'', ''Volunteer work at library'', ''DIY home projects'', ''Yoga'', ''Participating
    in local 5K runs'']'
  career_goals: Gladys aims to re‑enter the workforce by completing her associate degree online and obtaining a certification in sustainable landscape design or project management. She plans to launch a
    home‑based consultancy that offers budgeting advice, event planning, and sustainable gardening services to local families and small nonprofits. She also hopes to take on a volunteer coordinator role
    within her community, using her organizational skills to expand local outreach programs. Long‑term, she envisions authoring a seasonal gardening column for a regional newspaper and possibly developing
    an online resource hub for DIY home projects, blending her curiosity with a practical, results‑driven mindset.
