personas:
  professional: Gladys Forcier is a community-focused project manager who leverages her analytical budgeting expertise and methodical planning to launch a home-based consultancy offering sustainable gardening,
    event coordination, and financial advice, while her competitive edge drives her to exceed client expectations and her skepticism ensures thorough due-diligence on every project.
  sports: Gladys Forcier channels her competitive streak into the annual Colorado Trail 5K, consistently ranking in the top 15% while cheering for the Denver Broncos and Colorado Rapids, and spends weekend
    afternoons riding at the nearby Red Rocks Stables, blending endurance training with equestrian skill.
  arts: Gladys Forcier finds inspiration in the folk songwriting of John Denver, the landscape paintings of Albert Bierstadt, and the environmental documentaries of David Attenborough, regularly attending
    the Denver Art Museum's seasonal exhibitions and enjoying local theater productions such as 'The River' at the Colorado Shakespeare Festival.
  travel: Gladys Forcier prefers road-trip adventures that combine hiking and community service, having mapped a summer itinerary that includes the Sawtooth Mountains in Idaho, a volunteer-led restoration
    project in the Azores, and a return to the Rocky Mountain foothills for a family reunion, balancing her love of nature with modest budgeting.
  culinary: Gladys Forcier delights in seasonal cooking, often turning her garden harvest into dishes like roasted beet and goat cheese salad with toasted pumpkin seeds, homemade kimchi using heirloom cabbage,
    and a hearty vegetable stew flavored with rosemary, thyme, and smoked paprika, while perfecting her sourdough starter for weekend breads.
  core: Gladys Forcier is a pragmatic yet curious 40-year-old who melds sustainable living, meticulous planning, and a competitive drive into every facet of her life.
background:
  cultural: Gladys was raised in a white, middle‑class family in the Colorado foothills, where the values of self‑reliance, community service, and an outdoor lifestyle were central. Her upbringing blended
    Midwestern modesty with the rugged, sustainability‑focused culture of the Mountain West. Family traditions emphasized classic American holidays—Thanksgiving, Christmas, and Fourth of July celebrations—often
    incorporated with local customs such as community festivals, farmers' markets, and ranching heritage. Growing up near Denver, she was exposed to both suburban conveniences and a strong appreciation
    for nature, which shaped her practical, curiosity‑driven outlook and her commitment to community engagement.
