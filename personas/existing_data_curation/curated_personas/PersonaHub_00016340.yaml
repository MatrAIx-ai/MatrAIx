persona_description: A scientist involved in conducting a collaborative Head-off Environmental Asthma in Louisiana (HEAL) study aimed at improving the quality of intervention for New Orleans children with
  persistent or uncontrolled asthma. The scientist has experience in conducting public health studies and has a background in basic science and clinical studies. They are interested in determining how effective
  outreach and educational efforts can be in moderating asthmatic children's response to exposures and elucidating the genetic/environmental interactions that exacerbate the condition. They are also interested
  in implementing and testing an expanded Asthma Counselor (AC) intervention model, which includes a comprehensive educational role in addition to conventional case management duties.
