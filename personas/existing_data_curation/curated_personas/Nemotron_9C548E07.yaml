personas:
  professional: Gustavo Francis is a seasoned STEM curriculum architect who blends rigorous scientific concepts with hands‑on Arduino projects and bilingual instruction, channeling their curiosity and practical
    focus into building inquiry‑based classrooms while assertively advocating for grant‑funded lab upgrades as they eye the department chair role.
  sports: Gustavo Francis stays fit by hiking the trails of the Hudson Valley on weekends, cheering for the New York Yankees and the New York Knicks on game days, and they are a regular member of a local
    hiking club that organizes seasonal mountain treks and charity runs for STEM education.
  arts: Gustavo Francis fuses a love for traditional folk melodies with classical guitar mastery, performing at community festivals while listening to artists like Lila Downs, Carlos Santana, and Andrés
    Segovia, and they often unwind by strumming nostalgic tunes that echo the rhythms of their childhood gatherings.
  travel: Gustavo Francis prefers purposeful travel that mixes stargazing, outdoor adventure, and culinary discovery, having trekked to the Grand Canyon’s dark‑sky park, explored the historic streets of
    Oaxaca for authentic mole, and planning a future trip to the Atacama Desert to photograph the southern Milky Way, all while balancing a modest travel budget and family commitments.
  culinary: Gustavo Francis crafts authentic mole negro and hand‑rolled tamales using chilhuacle, ancho, and pasilla chiles blended with Mexican chocolate, they relish the ritual of slow‑cooking the sauce
    for hours and often experiment with adding a dash of smoked paprika for a personal twist, while also enjoying simple tacos al pastor on weeknights.
  core: Gustavo Francis is a calm, curiosity‑driven STEM educator who spends evenings soldering Arduino gadgets, hiking the Hudson Valley, strumming folk‑infused guitar, and meticulously planning grant
    proposals while occasionally neglecting dental check‑ups.
background:
  cultural: Gustavo was born to Mexican immigrant parents who settled in the Bronx. Growing up in a bilingual household, he navigated both Mexican traditions and the multicultural fabric of New York City.
    His upbringing instilled a deep respect for family, community, and the importance of education as a pathway to opportunity. He celebrates Mexican holidays such as Día de los Muertos and Mexican Independence
    Day, often sharing these customs with his students. His Mexican heritage informs his teaching style, prompting him to incorporate culturally relevant examples and to support Spanish‑speaking students
    through bilingual instruction, while his Bronx experience fuels his commitment to social equity and community empowerment.
attributes:
  skills: '[''Curriculum Development'', ''Project-Based Learning'', ''Technology Integration (Python, Arduino, Raspberry Pi)'', ''Bilingual Instruction (English/Spanish)'', ''Data Analysis and Visualization'',
    ''Assessment Design'', ''Grant Writing'', ''Community Outreach'', ''Mentorship and Teacher Coaching'']'
  hobbies: '[''Arduino and Electronics Projects'', ''Amateur Astronomy'', ''Classical Guitar'', ''Mexican Cooking'', ''Hiking in Hudson Valley'', ''Science Fiction Reading'', ''Mentoring Immigrant Youth'']'
  career_goals: Gustavo aims to become the STEM department chair at his Bronx high school, leading a school‑wide initiative to create a culturally responsive, interdisciplinary STEM program that incorporates
    community‑based projects. He aspires to secure federal and private grants to upgrade laboratory facilities, expand robotics and coding clubs, and develop partnerships with local universities and industry.
    Long‑term, he wishes to pursue a doctorate in STEM Education to contribute research on equity in science teaching and to influence education policy at the city level.
