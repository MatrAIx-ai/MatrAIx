persona_description: A historian who is interested in the history of the southeastern United States, particularly in North Carolina, and has a particular interest in the history of plantation owners and
  slaveholders in the region. The person is likely to be knowledgeable about the history of slavery, the Civil War, and the post-Civil War era. They are interested in the economic, social, and cultural
  aspects of plantation life and the role of African Americans in these societies. They are also likely to be interested in the history of education, particularly in the early 20th century, and may have
  a particular interest in the history of the African American community in the southeastern United States.
