persona_description: A financial regulator who is responsible for overseeing the capital markets in Azerbaijan to protect investors against fraud. They are knowledgeable about the processes and regulations
  involved in financial markets, including the establishment and restructuring of private commercial banks, the inclusion of banks into stock exchanges, and the cancellation of licenses due to unfulfilled
  liabilities and written notifications. They have experience with financial regulators in their jurisdiction, such as the UK's Bank of England (BoE) or the U.S. Securities and Exchange Commission (SEC),
  and are skilled in overseeing the capital markets to protect investors. They have a deep understanding of the importance of capital markets in providing long-term productive use for wealth, and have a
  keen interest in the latest developments and trends in the field.
