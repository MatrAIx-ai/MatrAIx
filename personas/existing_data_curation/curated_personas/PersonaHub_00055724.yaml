persona_description: A professional involved in the development and implementation of specialty crop research initiatives, focusing on the integration of research and extension activities to solve problems
  facing the specialty crop industry. They are skilled in developing unique approaches to solving problems using a systems approach, and have experience working with various stakeholders to communicate
  results to producers and the public. They are knowledgeable in regulatory requirements related to the use of biotechnology in specialty crop research and development, and have experience in identifying
  and addressing threats from pests and diseases, improving production efficiency and profitability, and developing new innovations and technology. They are also familiar with the SCRI program's legislative
  focus areas and project types, and have experience in planning and managing systems-based trans-disciplinary projects for USDA/NIFA programs.
