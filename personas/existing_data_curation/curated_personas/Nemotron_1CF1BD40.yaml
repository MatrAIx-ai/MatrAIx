  career_goals: Although retired from formal employment, Marian aims to continue contributing to her community by expanding her volunteer work with the local school district, leading intergenerational learning
    programs, and documenting the oral histories of Beardstown's longtime residents. She hopes to publish a collection of these stories and possibly a memoir about her experiences in education. Marian also
    plans to learn more about digital storytelling tools to share these narratives online, and to travel to visit her grandchildren while maintaining strong ties to her hometown.
