persona_description: A healthcare professional who works with neonatal patients, particularly those with respiratory distress, and has experience in managing conditions such as transient tachypnea of the
  newborn. They are knowledgeable in the diagnosis, treatment, and management of respiratory issues in newborns and have a strong understanding of the underlying mechanisms and causes of the condition.
  They are also familiar with the diagnostic tests and imaging modalities used to evaluate respiratory distress in neonates and are skilled in providing supportive care to neonates with transient tachypnea
  of the newborn.
