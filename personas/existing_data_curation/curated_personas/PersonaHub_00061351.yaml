persona_description: A Speech and Language Therapist who specializes in working with young children who have communication problems. They have experience in identifying and addressing the various causes
  of these problems and have a special interest in working with children who have specific language impairments such as Specific Language Impairment (SLI). They are experienced in working with a variety
  of communication issues including delayed development, disordered development, expressive language difficulty, receptive language difficulty, otitis media, pragmatic difficulty, selective mutism, speech
  dyspraxia, phonological difficulty, and other related issues. They are knowledgeable about the different causes of communication problems in children and adults and are able to provide effective treatment
  plans and interventions.
