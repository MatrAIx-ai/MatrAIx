  career_goals: Hoang often talks about wanting to be a firefighter because he admires the bright trucks and wants to help people, a goal that blends his curiosity about the world with a practical desire
    to protect. He also pretends to be a chef, helping his mother stir soup in a toy kitchen, hinting at a future interest in cooking Vietnamese dishes. Occasionally, he says he wants to be a teacher so
    he can share what he learns, reflecting his balanced curiosity and desire to organize knowledge.
