  career_goals: Although retired from formal employment, Regla aims to deepen her involvement in cultural preservation by leading cooking workshops at the local community center and mentoring younger members
    of the Mexican‑American community in storytelling and traditional arts. She hopes to collaborate with the Roseburg library to curate a small exhibition of Mexican folk art and to document oral histories
    of senior residents. Ultimately, she aspires to keep learning new artistic techniques, travel occasionally to Mexico to reconnect with family roots, and maintain a vibrant, health‑focused lifestyle.
