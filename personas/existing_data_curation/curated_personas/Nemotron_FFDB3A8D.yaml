  career_goals: Marta’s ambition is to move from first‑line supervision to a regional management role where she can apply her analytical skills across multiple stores. She plans to earn a retail operations
    certification and to spearhead technology‑enabled initiatives such as mobile inventory tracking and data‑driven merchandising. Marta also aims to mentor emerging retail leaders through a community apprenticeship
    program that blends practical sales experience with basic business analytics, ensuring sustainable growth for her district while maintaining a harmonious workplace.
