  hobbies: '[''Visiting art galleries and museums'', ''Sketching and painting'', ''Creative writing and poetry'', ''Live music and theatre attendance'', ''Social dancing (swing, salsa)'', ''Yoga and mindfulness
    meditation'', ''Volunteering at community events'', ''Photography'', ''Cooking Italian recipes'', ''Hiking in Callaway County'']'
  career_goals: Maegan aims to finish her bachelor’s degree in Arts Management or Communications within the next two years, focusing on community outreach and inclusive programming. She aspires to work
    for a nonprofit arts organization, museum, or cultural center where she can design and lead workshops that blend artistic expression with mental-well‑being support, reflecting her own sensitivity to
    stress. In the medium term, she hopes to become a program coordinator or curator, creating spaces that encourage collaboration and cultural exchange. Maegan also dreams of building a freelance portfolio
    as a content creator and visual storyteller, leveraging her social-media and photography skills to promote local artists and socially conscious projects. Ultimately, she wants a career that offers flexibility,
    opportunities for continuous learning, and a supportive, harmonious work environment that aligns with her values of kindness and cooperation.
