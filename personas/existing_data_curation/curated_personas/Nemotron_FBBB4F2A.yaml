personas:
  professional: Maegan Giannetti, a budding arts manager and communications graduate, blends their knack for empathetic listening with graphic design and social‑media storytelling to craft inclusive community
    workshops that fuse visual art with mental‑well‑being support, while thriving in flexible, low‑structure environments.
  sports: Maegan Giannetti enjoys weekend yoga flows, social salsa dancing, and cheering on the Missouri Tigers basketball team and the St. Louis Cardinals while they occasionally join the Mid‑Missouri
    Trail Runners club for early‑morning jogs through Callaway County’s hills.
  arts: Maegan Giannetti immerses themselves in Columbia’s art scene, sketching in parks after viewing works by Kerry James Marshall and Yayoi Kusama, while drawing inspiration from live shows featuring
    Phoebe Bridgers and finding theatrical joy in community productions of ‘Our Town,’ and they often discuss these experiences on social media.
  travel: Maegan Giannetti prefers spontaneous weekend getaways, often hitching a ride to the Ozark National Forest for hikes, dreaming of a curated cultural tour of Florence’s Renaissance galleries, and
    budgeting short trips to nearby Nashville’s music venues while they juggle a modest student income.
  culinary: Maegan Giannetti experiments with homemade gnocchi, slow‑cooked ragù using San Marzano tomatoes, fresh basil, and Parmigiano‑Reggiano, balancing a modest kitchen skill set with a love for sharing
    meals at community potlucks, though they sometimes forget to defrost ingredients until the last minute.
  core: Maegan Giannetti is a socially‑driven art enthusiast whose curious mind and compassionate nature drive community projects, yet their tendency toward disorganization and anxiety often leads to last‑minute
    scrambling and over‑committing to creative endeavors.
background:
  cultural: Maegan is a second-generation Italian-American raised in a small town near Callaway County, Missouri. Her family’s Italian heritage is evident in Sunday meals, occasional use of Italian phrases,
    and a deep appreciation for art, music, and culinary traditions passed down from her grandparents. Growing up in the American Midwest, she internalized values of hospitality, community involvement,
    and a down‑to‑earth work ethic. Her exposure to both rural life and the vibrant college town of Columbia has given her a blend of Midwestern pragmatism and openness to diverse, unconventional ideas.
    She identifies with progressive cultural values, embraces multicultural experiences, and often participates in local festivals that celebrate a mix of heritage and contemporary arts.
