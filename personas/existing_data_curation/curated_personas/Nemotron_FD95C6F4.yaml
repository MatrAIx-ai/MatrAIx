personas:
  professional: Adelia Hope, a retired homemaker turned senior advisory council member, leverages her methodical household management and bookkeeping expertise to plan community events, mentor volunteers,
    and ensure every detail aligns with her well‑honed sense of punctuality and order.
  sports: Adelia Hope, a devoted fan of the Tampa Bay Buccaneers and the Miami Marlins, enjoys early‑morning beach walks, participates in low‑impact water aerobics classes at the senior center, and follows
    the local high‑school soccer season with a modest cheer from the sidelines.
  arts: Adelia Hope, an avid member of her church choir, spends afternoons crocheting intricate lavender‑colored blankets while listening to Ella Fitzgerald and reading Agatha Christie mysteries, and she
    frequently attends community theater productions featuring performances by local artist James Stokes.
  travel: Adelia Hope prefers meticulously planned, low‑stress trips, often driving along Florida’s Gulf Coast to visit historic towns like St. Augustine and Amelia Island, taking a yearly short cruise
    to the Bahamas with her spouse, and dreaming of a gentle train journey through the New England fall foliage.
  culinary: Adelia Hope, an accomplished home cook, delights in preparing shrimp and grits with fresh Gulf shrimp, fine herbs like thyme and parsley, and a dash of lemon, mastering the art of canning peach
    preserves and simmering Southern collard greens with smoked turkey for family gatherings.
  core: Adelia Hope, a 94‑year‑old veteran of mid‑century values, blends disciplined routine with creative hobbies, silently correcting crossword clues while knitting, occasionally misplacing her glasses,
    yet always ensuring a warm home, a full choir voice, and a detailed memoir in the making.
background:
  cultural: 'Adelia is a White American who grew up in the post‑World War II South before moving to the Gulf Coast of Florida. Her cultural identity is rooted in mid‑century American values: a strong emphasis
    on family, community service, and Christian faith, particularly through participation in her local Methodist congregation. The Florida coastal lifestyle influences her love of gardening, beach walks,
    and seafood cooking, while her upbringing instilled a respect for tradition, punctuality, and orderly living.'
