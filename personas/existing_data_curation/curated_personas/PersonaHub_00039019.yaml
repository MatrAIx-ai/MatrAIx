persona_description: A professional XML developer who is interested in learning and implementing XSLT and XQuery, with a focus on efficient and effective development practices. The individual is looking
  for a course that will provide a comprehensive overview of the capabilities and use cases of XML databases, and how to use XQuery among other XML technologies in the querying of XML databases. The course
  will also cover the role of XSLT and XQuery in the development of applications and how to improve the design of existing XSLT and XQuery stylesheets. The individual is also interested in learning about
  test-driven development and how it can be applied to XSLT and XQuery development.
