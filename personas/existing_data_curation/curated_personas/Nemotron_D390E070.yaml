  career_goals: Kathy aims to become a certified BICSI technician within the next year and subsequently transition into a crew‑lead supervisory role, overseeing small teams on complex fiber‑to‑the‑home
    (FTTH) deployments in the Greensboro area. She plans to pursue advanced certifications in 5G infrastructure and active‑optical‑network (AON) technologies, positioning herself as a go‑to expert for high‑performance
    installations. Long‑term, she envisions establishing her own boutique telecom contracting business, offering premium, aesthetically conscious cabling solutions for residential and boutique commercial
    clients while maintaining a work schedule that preserves her preference for solitude and quiet.
