  career_goals: She aims to transition back into the tech workforce within the next two years, targeting roles that blend data science with user experience research, where she can apply her analytical rigor
    and visual storytelling. She plans to earn a part‑time Master's in Human‑Computer Interaction to deepen her expertise, build a portfolio of data‑driven design projects, and eventually launch a freelance
    consultancy that helps STEM education programs incorporate creative media. Long‑term, she envisions becoming a thought leader at the intersection of technology, art, and cultural advocacy, speaking
    at conferences and publishing articles that promote inclusive innovation.
