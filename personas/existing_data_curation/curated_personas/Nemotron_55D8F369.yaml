personas:
  professional: Thongbai Nguyen, a 28‑year‑old data scientist‑designer, leverages her computer engineering background, fluency in Python, JavaScript, and MATLAB, and her love of visual storytelling to turn
    complex data sets into intuitive user experiences, while her critical, competitive edge pushes her to constantly benchmark her work against industry standards and seek out unconventional design solutions.
  sports: Thongbai Nguyen, an avid urban explorer who mixes yoga sessions at the Brooklyn Yoga Project with weekend runs along the Hudson River during the NYC Marathon training season, supports the New
    York Knicks and follows New York City FC, while also playing intramural volleyball with a local community league.
  arts: Thongbai Nguyen, a dedicated art aficionado, frequents gallery openings featuring artists like Kerry James Marshall, Yayoi Kusama, and Banksy, attends avant‑garde performance pieces inspired by
    Marina Abramović, and channels that inspiration into her own mixed‑media projects that blend traditional motifs with digital illustration tools such as Adobe Illustrator and Procreate.
  travel: Thongbai Nguyen, a 28‑year‑old cultural wanderer, dreams of photographing the neon streets of Tokyo and the minimalist architecture of Reykjavik after a recent solo trip to Barcelona’s Gothic
    Quarter and a weekend getaway to Niagara Falls, preferring meticulously planned itineraries that leave room for spontaneous art‑scavenger hunts.
  culinary: Thongbai Nguyen, an experimental home cook, skillfully prepares family‑style bánh chưng for Tet with a modern twist of adding truffle oil and miso glaze, while she also loves crafting ramen
    bowls flavored with miso, soy sauce, and roasted corn, and frequently explores pop‑up food markets for unique spice blends.
  core: Thongbai Nguyen, a 28‑year‑old data‑driven visual storyteller, blends analytical rigor with artistic curiosity, obsessively curates vintage camera lenses, and tends to procrastinate on paperwork
    while thriving on spontaneous creative bursts.
background:
  cultural: Thongbai was born to Vietnamese immigrant parents who settled in the United States in the early 1990s. Growing up in a bilingual household, she celebrated traditional holidays such as Tet and
    Mid‑Autumn Festival while also navigating American schools in Queens. Her family emphasizes respect for elders, collective responsibility, and the importance of education, which shaped her academic
    drive. At the same time, the multicultural environment of Long Island City exposed her to diverse artistic expressions and progressive ideas, fostering an open‑minded outlook that blends her Vietnamese
    heritage with contemporary urban culture.
