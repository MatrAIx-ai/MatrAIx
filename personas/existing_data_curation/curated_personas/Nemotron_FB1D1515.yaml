  career_goals: Although retired, Fidel is committed to remaining an active contributor to his community. He aims to mentor emerging engineers and support youth STEM programs in the Milwaukee area, sharing
    his practical knowledge and structured approach to problem‑solving. He plans to write a memoir that captures his immigrant experience, his decades in manufacturing, and the cultural traditions he values,
    providing a resource for future generations. Maintaining his health and independence is a priority, allowing occasional trips to visit relatives in Mexico while sustaining a routine of weekly volunteer
    service and family involvement.
