data:
  user 1 personas: 'I love the game halo.

    Yellow is my favorite color.

    I work for a magazine.

    I like to read.

    I love to workout.'
  user 2 personas: 'I wear contacts.

    I am very athletic.

    I have brown hair.

    I hate carrots.

    I love bicycling.'
  Best Generated Conversation: 'User 1: Hey, what''s up?

    User 2: Not much, just got back from a bike ride.

    User 1: Nice! I love biking too. Where did you go?

    User 2: I went on a trail near my house. It was a lot of fun.

    User 1: I''m jealous. I haven''t been biking in a while.

    User 2: You should come with me sometime. We can go to the park.

    User 1: That sounds like fun. I''d love to.

    User 2: Great! We can set something up for next weekend.

    User 1: Sounds good. I''ll bring my bike.

    User 2: Awesome. See you then!


    (next weekend)


    User 1: Hey, I''m here at the park.

    User 2: Cool, I''m just finishing up a bike ride. I''ll be there in a few minutes.


    (a few minutes later)


    User 2: Hey, sorry I''m late. I got a little lost.

    User 1: No problem. I''m just glad you''re here.

    User 2: Me too. So, what do you want to do first?

    User 1: We could start by going for a bike ride.

    User 2: That sounds good. I''m ready when you are.


    (they go for a bike ride)


    User 1: That was really fun.

    User 2: I know, right? I''m glad we came.

    User 1: Me too. We should do this again sometime.

    User 2: Definitely. We could make it a weekly thing.

    User 1: That would be great. I love biking.

    User 2: Me too. It''s so much fun.

    User 1: So, what are you doing for the rest of the day?

    User 2: I''m not sure. What are you doing?

    User 1: I don''t know. Maybe we could go get some food?

    User 2: That sounds good. I''m starving.

    User 1: Great. There''s a good restaurant a few blocks from here.

    User 2: Perfect. I''ll follow you.


    (they go to the restaurant)


    User 1: This place is really nice.

    User 2: I know, right? I''ve been here before.

    User 1: What do you recommend?

    User 2: The pasta is really good.

    User 1: Okay, I''ll try that.

    User 2: And I''ll have the chicken.


    (they order their food)


    User 1: This is really good.

    User 2: I told you.

    User 1: I''m glad you recommended it.

    User 2: Me too. I''m glad we came here.

    User 1: Me too. This was a great day.

    User 2: I know, right? I''m so glad we met.

    User 1: Me too. I''m glad we''re friends.

    User 2: Me too. I can''t wait to do this again.

    User 1: Me neither. This was the best day ever.'
