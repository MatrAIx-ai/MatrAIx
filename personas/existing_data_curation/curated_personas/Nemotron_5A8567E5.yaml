personas:
  professional: Shawn Frizzell is a management analyst who couples data‑driven tools such as Excel, Power BI, Tableau, and Python with a watercolor‑inspired design‑thinking approach to strategic workshops,
    and they leverage high emotional intelligence to foster collaborative, mentally‑healthy team environments.
  sports: Shawn Frizzell plays in a weekly basketball league with the Metairie Mavericks and cycles the extensive Metairie trail network, they follow the New Orleans Pelicans and Saints passionately, using
    group workouts as social outlets while occasionally neglecting proper warm‑ups, leading to occasional shin splints.
  arts: Shawn Frizzell frequents the Contemporary Arts Center and sketches in watercolor, they draw inspiration from the murals of local artist Brandan Cameron, jam to acoustic renditions of Joni Jenkins
    and Sam Cooke at open‑mic nights, and they regularly improvise with the Crescent City Improv collective, blending their love for novelty with expressive performance.
  travel: Shawn Frizzell prefers spontaneous weekend getaways that blend cultural immersion with culinary adventure, they have explored the historic districts of Savannah and the music scene of Austin,
    while dreaming of a spring pilgrimage to Paris’s Louvre and the spice markets of Marrakech, often booking budget flights on a flexible schedule that accommodates their unpredictably packed calendar.
  culinary: Shawn Frizzell enjoys experimenting with Creole cuisine, they regularly craft their own gumbo using Andouille sausage, okra, and file powder while infusing unexpected ingredients like lemongrass
    and miso, a skill level that oscillates between confident home‑chef and occasional over‑spiced disaster, and they relish dining at the New Orleans favorite Coop’s Place for classic beignets and jambalaya.
  core: Shawn Frizzell is a creatively driven analyst who balances data‑heavy strategy work with watercolor sketches, midnight guitar sessions, and a habit of over‑analyzing both spreadsheets and social
    dynamics, often worrying about future outcomes while finding solace in yoga and community mentorship.
background:
  cultural: Shawn grew up in Metairie, a suburban community of the New Orleans metropolitan area. While his family’s ancestry is primarily of European descent, his upbringing was shaped by the region’s
    rich cultural tapestry, where French, Creole, African‑American, and Caribbean influences converge in music, cuisine, and festivals. He celebrates the communal spirit of Mardi Gras, enjoys the culinary
    diversity of gumbo and beignets, and has a deep appreciation for the city’s jazz and blues legacy. This multicultural environment fostered his openness to new ideas and his respect for diversity, informing
    both his personal interests and professional approach.
attributes:
  skills: '[''Strategic Analysis'', ''Data Visualization'', ''Process Optimization'', ''Design Thinking'', ''Stakeholder Engagement'', ''Facilitation'', ''Conflict Resolution'', ''Project Management'',
    ''Advanced Excel'', ''Power BI'', ''Python for Data Analysis'', ''Emotional Intelligence'']'
  hobbies: '[''Playing acoustic guitar'', ''Watercolor sketching'', ''Attending live jazz and blues performances'', ''Participating in improv theater'', ''Cooking experimental Creole dishes'', ''Cycling
    Metairie trails'', ''Weekly yoga and meditation'', ''Volunteering with youth arts programs'', ''Reading speculative fiction and philosophy'', ''Playing organized basketball'']'
  career_goals: Shawn aims to advance into senior strategic leadership, such as Director of Business Strategy or a consulting partner, where he can steer organizations toward innovative, data‑informed transformations
    that also honor creative and humanistic values. He plans to pursue an MBA or a specialized certification in analytics to broaden his managerial toolkit. Over the next five years, he envisions leading
    cross‑disciplinary innovation labs that integrate arts‑based thinking with business strategy, championing workplace mental‑health initiatives and mentoring junior analysts. Long‑term, he hopes to launch
    a nonprofit that leverages the arts to stimulate economic development in under‑served communities across Louisiana.
