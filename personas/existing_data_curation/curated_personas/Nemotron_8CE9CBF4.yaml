  career_goals: Even at his first birthday, his family nurtures an embryonic vision of him becoming a charismatic communicator who thrives on organizing and leading groups. They picture him pursuing roles
    such as teacher, community program coordinator, or public relations specialist—careers that blend his love for structure, reliability, sociability, and a competitive drive to excel. His long‑term ambition
    is to be a respected figure who can plan events, mentor others, and positively influence his community.
