personas:
  professional: John Santana, a 32‑year‑old building cleaner with a reputation for systematic sanitation and safety compliance, they bring their meticulous inventory tracking, OSHA expertise, and mentoring
    skill to a supervisory role in facilities management, while quietly planning an eco‑friendly cleaning business.
  sports: John Santana runs early on the Minnesota Valley State Trail, they follow the Minnesota Vikings and Twins avidly, belong to a local bass‑fishing club that meets at Lake Harriet each summer, and
    in winter they swap jogs for snowshoe hikes on the Cannon River trail while keeping a casual membership with a community pickleball league.
  arts: John Santana finds solace in the quiet craftsmanship of model railroading, they appreciate the minimalistic piano works of Ludovico Einaudi, the narrative films of Wes Anderson, the woodworking
    designs of George Nakashima, and regularly visit the Minneapolis Institute of Art to study American realism, especially works by Norman Rockwell.
  travel: John Santana prefers meticulously planned road trips, they favor structured itineraries with spreadsheets, have explored the national parks of Utah and the Rocky Mountains of Colorado, dream of
    backpacking the fjords of Norway, and occasionally schedule weekend getaways to the nearby Mall of America for a low‑stress retail stroll.
  culinary: John Santana enjoys quiet weekday meal prep, they excel at cooking simple, balanced dishes like lemon‑herb grilled salmon with quinoa and roasted asparagus, and occasionally treat themselves
    to a hearty beef chili with kidney beans spiced with cumin and smoked paprika, while keeping a well‑organized pantry of staples such as brown rice, canned tomatoes, and fresh herbs.
  core: John Santana is a methodical planner whose anxiety fuels a relentless quest for order in work, hobbies, and finances, yet they occasionally indulge in impulsive splurges on niche collectibles that
    reveal a restless side.
background:
  cultural: John grew up in a middle‑class white family in suburban Burnsville, Minnesota. His family roots combine German and Irish ancestry, reflecting the broader Midwestern heritage of hard work, modesty,
    and community involvement. The local culture of big‑season outdoor activities, the Minnesota State Fair, and a strong Lutheran tradition shaped his values of reliability and self‑discipline. While he
    never married, he maintains close ties with a small circle of longtime friends and participates in occasional town events that reinforce his connection to the region's strong work ethic and love of
    nature.
attributes:
  skills: '["Facility cleaning and sanitation", "Floor care and equipment operation", "Safety compliance (OSHA)", "Inventory management", "Time management and scheduling", "Basic plumbing and electrical
    troubleshooting", "Customer service for small tenant groups", "Data entry for work logs", "Training and mentoring new staff", "Green cleaning and sustainability practices"]'
  hobbies: '["Reading non‑fiction (psychology, self‑help)", "Jogging on local trails", "Fishing at regional lakes", "Model train building", "Woodworking projects", "Solving puzzles (crosswords, Sudoku)",
    "Cooking and meal prepping", "Playing single‑player video games", "Gardening (vegetable garden)", "Attending small community gatherings"]'
  career_goals: John aims to harness his organizational strengths into a supervisory role in facilities management within the next three years. He plans to complete an associate degree in Facility Management
    and obtain certifications such as Certified Professional Cleaner (CPC) and OSHA Safety Officer. Ultimately, he envisions launching his own small cleaning business that emphasizes eco‑friendly practices,
    providing stable income and the autonomy that helps mitigate his anxiety. Owning a home in Burnsville and achieving financial security are central long‑term goals.
