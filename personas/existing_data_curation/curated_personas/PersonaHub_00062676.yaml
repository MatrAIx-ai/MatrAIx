persona_description: A sociologist who specializes in the study of border politics and the ways in which borders divide and produce productive zones of affect and entanglement. She is particularly interested
  in the ways in which labor is structured along different dimensions of difference, such as gender and nationality, and how these dimensions are reproduced through the production of edges and the accumulation
  of material and affective resources within various territories. She is also interested in the ways in which power is enacted across these dimensions of difference and how this power is resisted through
  formal and meta-political strategies. Her research interests include the study of the relationship between borders and the production of new species/subjects in which new ecologies of power can find life.
