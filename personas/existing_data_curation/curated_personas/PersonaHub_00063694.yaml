persona_description: A scientist with expertise in the control of brucellosis, specifically focusing on epidemiology, diagnosis, surveillance, and control programs. This individual is interested in learning
  about the gaps in monitoring, identifying and controlling brucellosis in animals before it reaches a point of human infection, and developing strategies to help control brucellosis, including research,
  surveillance, diagnostics, interventions, animal-wildlife considerations, and public health awareness in producers/herders as well as the general public. They are likely to be involved in the design of
  research programs and intervention strategies to aid in the control of brucellosis at national and regional levels.
