persona_description: A Roman soldier who served under the command of Vespasian and later Titus, and who later became a prominent historian and writer under the patronage of the Roman Empire. He is known
  for his contributions to the field of history, particularly his work on the Jewish War, and for his diplomatic efforts between the Romans and the Jews during the siege of Jerusalem in ad 70. He is also
  known for his literary pursuits and his adoption of the name Flavius.
