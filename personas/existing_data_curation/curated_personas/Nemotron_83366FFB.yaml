personas:
  professional: Stephanie Mckenzie is a pint‑sized explorer who spends afternoons at the backyard sandbox, using magnifying glasses and crayons to catalog ants, leaves, and colors, embodying a nascent scientist‑artist
    hybrid.
  sports: Stephanie Mckenzie delights in sprinting through the neighborhood park’s toddler slide, hopping onto the mini‑soccer tee‑ball team at the local community center, and cheering for the hometown
    baseball club, the Denver Rockies, during family outings to the stadium.
  arts: Stephanie Mckenzie spends her afternoons humming to Sesame Street tunes, finger‑painting vivid scenes of dinosaurs after watching a Pixar short, and eagerly reciting lines from the animated movie
    Moana, all of which fuel her budding love for storytelling and visual art.
  travel: Stephanie Mckenzie loves the predictability of family road trips to the nearby aquarium, day‑long adventures at Disney’s Magic Kingdom, and eagerly pointing out the Eiffel Tower in picture books,
    dreaming of one day tasting crepes in Paris.
  culinary: Stephanie Mckenzie favors macaroni and cheese speckled with peas, insists on spreading peanut butter thinly on whole‑grain toast, and pretends to whisk imaginary soup in her play kitchen, though
    she occasionally sneaks extra grapes when no one’s watching.
  core: Stephanie Mckenzie is a calm, curiosity‑driven three‑year‑old who blends artistic imagination with a knack for tiny experiments, all while maintaining a relaxed, slightly disorganized routine.
background:
  cultural: Stephanie was born and raised in Lancaster, a small town in Hocking County, Ohio. Her family’s roots trace back to European‑American settlers typical of the Midwest, and she has grown up amidst
    a close‑knit community that values modesty, self‑reliance, and a connection to the natural landscape of southern Ohio. Local traditions such as community fairs, church gatherings, and family picnics
    in the surrounding countryside have shaped her appreciation for simple, shared experiences, while the rural setting provides ample opportunities for outdoor play and observation of seasonal changes.
attributes:
  skills: '[''fine‑motor coordination (crayon holding, drawing simple shapes)'', ''color mixing and pattern experimentation'', ''basic storytelling and language expression'', ''cooperative play with small
    groups'', ''assertive communication'', ''emotional resilience and calmness'']'
  hobbies: '[''drawing and coloring'', ''building with wooden blocks'', ''outdoor nature exploration'', ''collecting leaves and stones'', ''listening to children’s music and stories'', ''pretend play with
    a small group of friends'']'
  career_goals: Stephanie dreams of becoming an artist who can create big, colorful pictures that tell stories, and she also imagines herself as a nature explorer who discovers new plants and animals. She
    is eager to keep learning through play, attend art classes, and visit museums, holding a long‑term ambition to share her creativity with others.
