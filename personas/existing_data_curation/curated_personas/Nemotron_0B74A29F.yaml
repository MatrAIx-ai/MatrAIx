  hobbies: '["Reading speculative and fantasy novels", "Digital illustration and graphic design", "Scratch coding projects", "Bicycle riding and maintenance", "Cooking traditional Mexican meals", "Gardening
    herbs and small plants", "Playing chess and other strategic board games", "Listening to regional Mexican music"]'
  career_goals: Ma C aspires to combine her love for technology and her cultural roots by pursuing a career in robotics or software engineering, with a long‑term ambition to develop practical tech solutions
    for her community, such as automated irrigation systems for local farms. In the short term, she aims to excel in her school’s STEM program, win the regional science fair, earn a spot in a junior robotics
    club, and deepen her coding skills. She also dreams of one day studying culinary arts to modernize traditional Mexican cooking, envisioning a future where she can open a family‑run restaurant that showcases
    innovative dishes while mentoring other youth.
