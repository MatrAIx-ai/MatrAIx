  career_goals: Heidee dreams of becoming a professional illustrator and video game designer, where she can merge her love for art, storytelling, and technology. She hopes to study visual arts and computer
    science in high school and beyond, creating culturally rich characters and worlds that reflect her Mexican heritage. In the long term, she envisions using her skills to develop educational games and
    animated stories that inspire other children, especially bilingual and multicultural audiences. She also aspires to lead community workshops that combine art, science, and cultural traditions.
