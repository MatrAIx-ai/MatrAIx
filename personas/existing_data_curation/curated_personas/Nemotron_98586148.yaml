  core: Richard Bailey, a curious yet cautious two‑year‑old, balances boundless exploration with a habit of worrying over tiny setbacks, turning everyday routines into both learning adventures and occasional
    meltdowns, and they often seek comfort in a favorite stuffed rabbit.
