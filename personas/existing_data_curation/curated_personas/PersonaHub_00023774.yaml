persona_description: A music educator who specializes in the study of wind instruments, particularly the oboe, clarinet, and bassoon. Their research interests include the history and evolution of these
  instruments, the development of new techniques for playing and teaching them, and the study of the physical and mechanical properties of reed mouthpieces. They have experience with both classical and
  modern music, and are skilled in teaching students from beginner to advanced levels.
