  career_goals: Franci aims to become a senior partner at her regional accounting firm, leading a dedicated agricultural‑services practice that leverages cloud‑based ERP and data‑analytics solutions. She
    seeks to earn the Certified Management Accountant (CMA) credential and to spearhead firm‑wide automation projects that reduce manual entry by 30 %. Over the next five years, she plans to mentor a cohort
    of junior accountants, publish articles on technology in rural accounting, and expand her role as a trusted financial advisor for local nonprofits. Ultimately, she envisions transitioning to a consulting
    role that combines her expertise with community development, while maintaining a balanced lifestyle that supports her family.
