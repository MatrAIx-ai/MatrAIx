personas:
  professional: Franci Collin is a senior accountant with a CPA and MBA who blends precise GAAP compliance and risk assessment with a forward‑looking passion for ERP automation, leading agricultural‑focused
    clients through cloud‑based data analytics while they mentor junior staff and champion process‑improvement initiatives.
  sports: Franci Collin dominates the local women's softball league with the Missoula Bison Softball Club, fuels their off‑season fitness with trail runs and horseback rides through the Rocky Mountains
    as a member of the Bozeman Trail Riders, and avidly follows the Denver Broncos, Colorado Rockies, and University of Montana Grizzlies, balancing competitive drive with a pragmatic training schedule.
  arts: Franci Collin brings their outgoing spirit to the community theater, starring in productions ranging from August Wilson’s “Fences” to a local rendition of “The Crucible,” while immersing themselves
    in the folk sounds of John Denver and Brandi Carlile, curating a personal photography project inspired by Ansel Adams’ landscapes and showcasing their work at the Billings Art Walk.
  travel: Franci Collin plans their trips with spreadsheet precision yet still embraces spontaneous weekend getaways, having hiked the glaciers of Glacier National Park, trekked the geysers of Yellowstone,
    explored the fjords of Norway, and now eyeing Patagonia’s Torres del Paine for a future adventure, always balancing family responsibilities with their love for rugged landscapes.
  culinary: Franci Collin, an adept home chef, relishes farm‑to‑table cooking, regularly preparing roasted beet and goat‑cheese salads, pan‑seared trout with rosemary and wild mushrooms, and sourdough bread
    using heirloom wheat, while they occasionally overcook vegetables when a photography session runs long.
  core: Franci Collin is a fiercely competitive, detail‑driven accountant who balances meticulous financial stewardship with a love for Montana’s wild outdoors, often swapping spreadsheets for saddle‑back
    rides without missing a beat, and they never let a missed deadline dampen their enthusiasm.
background:
  cultural: Franci grew up in a multigenerational farming family near Great Falls, with German, Irish, and English ancestry. Raised in the close‑knit community of Moore, MT, she inherited the region’s values
    of self‑reliance, neighborly cooperation, and respect for the land. She attended a local church and participates in the county fair, reflecting a blend of traditional rural customs and modern business
    education. Her cultural identity balances a pragmatic, hard‑working ethos with an openness to new ideas, informed by the diverse heritage of the Montana frontier, including a respectful awareness of
    nearby Native American communities.
