    festivals'']'
  career_goals: Bianca aims to become a technical lead within the next three years, guiding a small team of developers on high‑impact web applications. She plans to deepen her expertise in cloud architecture
    and earn an AWS Solutions Architect certification. Long‑term, she envisions launching a bilingual educational platform that connects under‑represented Mexican‑American youth with coding mentors, merging
    her technical skills with community empowerment. She also hopes to pursue a part‑time master’s degree in Computer Science to stay current with emerging technologies while maintaining a balanced lifestyle.
