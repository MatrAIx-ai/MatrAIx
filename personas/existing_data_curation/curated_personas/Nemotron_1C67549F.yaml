personas:
  professional: Bianca Perez is a full‑stack software developer who writes clean Python and JavaScript code, builds responsive React front‑ends, and deploys Node.js APIs on AWS, blending their love for
    structured Agile sprints with a laid‑back habit of occasionally missing stand‑up check‑ins due to a flexible approach to deadlines.
  sports: Bianca Perez tackles the San Bernardino trails on weekends with the local Hiking and Outdoor Adventure Club, catches LA Galaxy soccer matches and Los Angeles Clippers basketball games on TV, and
    mixes in occasional yoga sessions at a community studio to balance their tech‑heavy schedule.
  arts: Bianca Perez unwinds by listening to regional corridos like Los Tigres del Norte and contemporary Latin pop artists such as Bad Bunny and Karol G, while diving into narrative‑driven RPGs like The
    Witcher 3 and attending live‑music nights at The Sayers Club featuring local band La Mariposa.
  travel: Bianca Perez prefers spontaneous weekend road trips to nearby gems like Joshua Tree National Park and Sedona, has taken a tech conference‑linked excursion to Seattle, and dreams of exploring the
    vibrant culinary scenes of Oaxaca and Buenos Aires when their schedule allows.
  culinary: Bianca Perez experiments in their kitchen with homemade green tamales filled with chicken, hearty white pozole simmered with hominy and roasted chilies, and citrus‑bright shrimp ceviche garnished
    with cilantro and radish, balancing a solid intermediate cooking skill with a habit of over‑seasoning when excited.
  core: Bianca Perez blends disciplined code reviews with a tendency to flood their desk with empty coffee cups, juggling structured tech projects while occasionally losing their keys during impromptu hikes.
background:
  cultural: Bianca grew up in a Mexican‑American household in the Inland Empire, speaking both Spanish and English at home. Family gatherings, Día de los Muertos altars, and celebrations of Cinco de Mayo
    are central to her identity. She incorporates Mexican flavors into her cooking and regularly participates in community events at the local Latino cultural center. While she embraces the pragmatic, individualistic
    work ethic common in tech, she also values the collectivist spirit of her heritage, often collaborating on community projects and supporting her extended family. Her bicultural experience informs her
    perspective in designing inclusive, bilingual digital products.
