  career_goals: Although retired, Larry aims to remain an active contributor to Santa Anna’s economic and social life. He aspires to mentor emerging entrepreneurs, serve on the local Chamber of Commerce
    advisory board, and help secure funding for community projects. He also hopes to document his life story as a memoir that captures the evolution of small‑town Texas and to support church youth programs
    through curriculum development and fundraising.
