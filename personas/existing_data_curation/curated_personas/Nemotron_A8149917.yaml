personas:
  professional: Larry Brookman, an 81‑year‑old retired small‑business financier and community consultant, leverages decades of bookkeeping, grant‑writing, and strategic planning expertise while channeling
    his talkative, cooperative nature into mentoring budding entrepreneurs and orchestrating town‑wide fundraising events.
  sports: Larry Brookman, a devoted fan of the Santa Anna Wildcats high school football team and the Dallas Cowboys, stays active by joining the Brazos River Anglers Association’s senior fishing outings
    on Lake Buchanan each spring, participating in a local senior walking club after Sunday services, yet he sometimes lets his packed community schedule crowd out dedicated gym time.
  arts: Larry Brookman, a hearty participant in his church choir and an avid listener of classic country legends such as Johnny Cash, Willie Nelson, and Dolly Parton, spends rainy afternoons devouring historical
    novels by Ken Follett and Bernard Cornwell, and occasionally attends Austin’s live‑music venues to catch tributes to early American folk, finding that the blend of story and song reinforces his love
    for community storytelling.
  travel: Larry Brookman, who prefers relaxed road‑trips over hurried flights, has driven his vintage pickup through the Texas Hill Country to explore the San Antonio River Walk and made a nostalgic journey
    to New Orleans for its jazz funerals, while his genealogical research fuels a dream to visit Savannah’s historic districts and, when budget permits, a pilgrimage to Washington, D.C.’s National Archives
    to trace his ancestors.
  culinary: Larry Brookman, a modestly skilled home cook, delights in preparing comfort staples such as slow‑simmered pork collard greens, buttery cornbread, and fried catfish seasoned with paprika and
    cayenne, often adding sweet potatoes and okra for depth, while never passing up a chance to sample a well‑cooked brisket at the local barbecue joint.
  core: Larry Brookman, an 81‑year‑old raconteur who juggles a thriving garden, a vintage pickup, and endless community projects, often worries about the future, can’t resist a good story at the bridge
    table, and still forgets to turn off the kitchen stove after cooking his favorite pork collard greens.
background:
  cultural: Larry comes from a multigenerational White Texan family that settled in east‑central Texas in the early 20th century, with ancestors originally from the Midwest. Raised in a conservative Protestant
    environment, his values reflect the hallmarks of Southern hospitality, self‑reliance, and community solidarity. He grew up with traditions of church involvement, Sunday barbecues, country‑music gatherings,
    and a strong respect for the agricultural lifestyle that still defines Santa Anna and the surrounding Coleman County.
