  career_goals: Alan aims to advance to a detective position with a focus on community‑centered investigations, particularly integrating art‑based therapeutic programs for victims and at‑risk youth. He
    plans to earn a bachelor's degree in criminal justice or psychology, obtain Detective Certification, and later pursue supervisory roles such as sergeant or lieutenant. Additionally, he is passionate
    about advocating for expanded mental‑health resources for officers and hopes to establish a police‑community art liaison initiative within Galveston County.
