  career_goals: Although Yordano is only 7, he already dreams about future paths that combine his love for art, science, and helping others. He often says he wants to become an astronaut who explores distant
    planets, a wildlife biologist who protects endangered species, or a muralist who paints vibrant community walls that tell stories of his Mexican heritage. He also imagines teaching younger children
    how to draw and experiment with simple science projects, reflecting his desire to share knowledge. His goals are shaped by his curiosity, his appreciation for unconventional ideas, and his wish to make
    a positive impact on his family and community.
