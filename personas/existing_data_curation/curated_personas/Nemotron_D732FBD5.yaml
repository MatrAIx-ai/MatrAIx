personas:
  professional: Mercedita Truong, a seasoned quantitative analyst and data scientist, combines deep expertise in statistical modeling, Python, R, and SAS with a curiosity for unconventional solutions, using
    their collaborative leadership style to translate complex health and finance data into actionable strategies while fostering inclusive, interdisciplinary teams that honor diverse viewpoints.
  sports: Mercedita Truong, a devoted member of the Lincolnwood Forest Preserve Hiking Club, balances weekend treks with sunrise yoga at a local studio, roots for the Chicago Cubs in spring and the Chicago
    Bears in fall, and they occasionally join a recreational badminton league to stay active year‑round.
  arts: Mercedita Truong immerses themselves in contemporary art by attending exhibitions featuring Kara Walker and Ai Weiwei, enjoys poetry readings that showcase Ocean Vuong, and channels this inspiration
    into digital illustrations that fuse mathematical patterns with traditional Southeast Asian motifs, while they also regularly listen to Yo‑Yo Ma’s cello suites for creative focus.
  travel: Mercedita Truong favors culturally immersive trips, meticulously planning itineraries that blend heritage festivals in Kyoto and Chiang Mai with weekend getaways to Door County’s lakeside retreats,
    balancing a modest travel budget with occasional splurges on boutique stays that nurture their love of community and artistic discovery, and they often share travel photos on social media to inspire
    friends.
  culinary: Mercedita Truong, an avid home cook, skillfully prepares fragrant pho broth with star anise and ginger, crafts spicy Thai green curry using lemongrass, kaffir lime, and fish sauce, and delights
    in experimenting with fusion bánh mì tacos, while they also enjoy occasional dinner outings at Chicago’s Alinea for a fine‑dining experience.
  core: Mercedita Truong blends analytical rigor with an artistic soul, constantly juggling data models, yoga mats, and puzzle pieces, yet they habitually delay filing taxes until the last minute, a quirky
    reminder that even the most organized minds need a gentle nudge.
background:
  cultural: Mercedita is a first‑generation Vietnamese‑American who grew up in a bilingual household that celebrated Tet, traditional music, and family gatherings. Her upbringing emphasized respect for
    elders, community harmony, and the importance of education, values she carries into her professional life. Living in Lincolnwood, she balances her heritage with Midwestern American culture, participating
    in both local Asian community events and broader civic activities. Her multicultural perspective enriches her collaborative style, fostering inclusive environments that honor diverse viewpoints.
