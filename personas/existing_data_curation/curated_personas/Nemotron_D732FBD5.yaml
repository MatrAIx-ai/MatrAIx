  career_goals: Mercedita aims to transition from senior individual contributor to a strategic leadership role where she can shape data‑driven decision making at an organizational level. She aspires to
    lead a cross‑functional data science team that partners with artists, urban planners, and community groups to develop innovative solutions for public health and environmental equity in the Chicago area.
    She also plans to pursue an executive certificate in data ethics and to mentor underrepresented women in STEM, eventually contributing to curriculum development at a local university as an adjunct professor.
