  career_goals: Francisco aims to re-enter the workforce in a role that leverages his business expertise while aligning with his values of harmony and teamwork. He envisions a managerial or consulting position
    helping small and medium‑sized enterprises improve operations and foster positive workplace cultures. Long‑term, he aspires to launch his own consultancy focused on sustainable business practices and
    employee well‑being, creating a flexible work schedule that allows him to manage stress and maintain a balanced life.
