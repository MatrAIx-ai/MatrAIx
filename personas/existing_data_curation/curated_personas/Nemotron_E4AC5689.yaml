personas:
  professional: Travis Perry is a 22‑year‑old aspiring welding and electrical contractor who blends hands‑on curiosity with a pragmatic, self‑taught skill set, fixing cars, carpentry quirks, and vintage
    radios while building a freelance business that lets them work independently in rural Ohio.
  sports: Travis Perry enjoys solo hikes along the Appalachian foothills and early‑morning fishing on the Ohio River, follows the Cleveland Browns for football, the Cincinnati Reds for baseball, and is
    a weekend member of the local River Run Club, preferring functional fitness like trail running and occasional weight‑lifting sessions over team sports.
  arts: Travis Perry channels their creative side through building scale model trains, restoring vintage radios, and photographing misty Appalachian valleys, drawing inspiration from authors like Isaac
    Asimov and Andy Weir, photographers such as Ansel Adams, and the folk melodies of John Denver that often play in the background while they work.
  travel: Travis Perry favors low‑key road trips that blend backpacking in the Great Smoky Mountains, a weekend spent photographing the cliffs of Red River Gorge, and occasional visits to historic towns
    like Harpers Ferry, planning itineraries loosely around fishing seasons and tool‑shop conventions rather than strict itineraries.
  culinary: Travis Perry prefers hearty, uncomplicated meals like smoked trout caught on the Ohio River, skillet‑cooked pork chops with rosemary‑infused potatoes, and homemade cornbread, showcasing a modest
    cooking skill set that excels at campfire dishes and weekend barbecues.
  core: Travis Perry is a solitary‑minded tinkerer who balances a restless curiosity with a laid‑back lifestyle, often swapping toolboxes for fishing rods while quietly mastering DIY projects.
background:
  cultural: Travis grew up in the small town of New Martinsville in Tyler County, West Virginia, a region shaped by Appalachian heritage and a close‑knit rural community. His family values self‑reliance,
    modesty, and a strong sense of neighborly support, while his upbringing in a predominantly white, working‑class environment exposed him to local traditions such as county fairs, community church gatherings,
    and an appreciation for the outdoors. These cultural influences have fostered his practical mindset, love of solitude in nature, and his cooperative attitude toward helping others when needed.
attributes:
  skills: '[''Automotive troubleshooting'', ''Basic carpentry'', ''Home plumbing repairs'', ''Computer hardware assembly'', ''Electronics troubleshooting'', ''Outdoor navigation and fishing gear maintenance'']'
