  career_goals: He aims to earn a vocational certification in welding or electrical work within the next two years to secure steady freelance contracts that allow him to work independently in a rural setting.
    He also hopes to develop a modest online presence offering DIY guides and tutorials, leveraging his curiosity and practical knowledge to generate supplemental income while preserving the flexibility
    to spend time on solitary hobbies and personal projects.
