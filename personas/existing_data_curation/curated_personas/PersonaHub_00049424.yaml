persona_description: A public health professional with expertise in community health and wellness. The individual is interested in implementing and evaluating programs that promote healthy lifestyles and
  prevent chronic diseases. They are familiar with the Healthy Schools - Healthy Kids program and its goals of promoting physical activity, healthy eating, and healthy behaviors among school-aged children.
  The individual is likely to have experience working with community partners and conducting research to evaluate program impact. They are interested in learning more about the WCDHD's Healthy Communities
  Grant and the potential for collaboration with other organizations to address the health disparities in their service area.
