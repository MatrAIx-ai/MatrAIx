personas:
  professional: Betty Bolon, a seasoned IT systems administrator with three decades of designing and securing LAN/WAN networks for small businesses and local government, channels their love of structure
    and community service into meticulous documentation, PowerShell automation, and hands‑on mentoring of junior techs, all while preparing for a CCNA‑certified consulting transition.
  sports: Betty Bolon stays active through weekly low‑impact walks with the Posey County Seniors Fitness Club, avidly follows the Indiana Pacers during the NBA season and the Indianapolis Colts in the fall,
    and occasionally joins the local community center’s gentle senior tennis sessions, preferring predictable, structured exercise over high‑intensity sports, and they relish the routine of these activities.
  arts: Betty Bolon finds artistic solace in knitting and quilting while listening to the gentle folk strains of John Denver and the timeless piano works of Beethoven, regularly devours Agatha Christie
    mysteries and Dashiell Hammett hard‑boiled novels, and they enjoy the occasional community theater production of classic plays like ‘Our Town.’
  travel: Betty Bolon prefers well‑planned, low‑stress road trips, often joining their church’s senior travel group to explore nearby cities such as Chicago and Nashville, has enjoyed a leisurely week in
    Cape Cod’s seaside villages, and they dream of a gentle cruise to the emerald‑hued hills of a distant island that recall the folk tales shared at family gatherings, all within their modest retirement
    budget.
  culinary: Betty Bolon, an adept home cook with a modest yet reliable skill set, delights in preparing classic Midwestern dishes such as chicken pot pie, creamy corn casserole, and apple crumble, often
    incorporating garden‑fresh tomatoes, sweet corn, and rosemary harvested from their own plot, while they occasionally treat friends to a hearty beef stew seasoned with garlic and bay leaves.
  core: Betty Bolon is a pragmatic, community‑oriented retiree who balances meticulous organization with a love for quiet crafts, quietly worries about the future, and they find comfort in reliable routines,
    garden soil, and steady digital networks.
background:
  cultural: Betty was raised in a predominantly white, Midwestern community in Indiana, where values of self‑reliance, modesty, and community service are deeply ingrained. Her family ancestry includes German
    and Irish roots, reflected in occasional celebrations of heritage holidays and a fondness for home‑cooked meals passed down through generations. She grew up attending local churches, county fairs, and
    community potlucks, which fostered her cooperative nature and commitment to harmony. These cultural influences shape her practical outlook, her preference for structured routines, and her dedication
    to supporting neighbors and small‑town institutions.
attributes:
  skills: '[''Network troubleshooting'', ''LAN/WAN configuration'', ''Firewall and VPN management'', ''Server maintenance'', ''Help‑desk support'', ''Hardware installation and repair'', ''PowerShell scripting'',
    ''Network monitoring (SolarWinds, PRTG)'', ''Backup and disaster‑recovery planning'', ''Vendor management'', ''Documentation and SOP creation'', ''Mentoring junior staff'']'
  hobbies: '[''Gardening'', ''Reading mystery novels'', ''Quilting'', ''Birdwatching'', ''Crossword puzzles'', ''Woodworking'', ''Volunteer at local community center'', ''Cooking traditional Midwestern
    meals'', ''Attending small book club gatherings'', ''Historical society meetings'']'
  career_goals: Approaching retirement, Betty aims to consolidate her legacy by mentoring younger IT professionals in her community and obtaining a CCNA certification to formalize her expertise. She hopes
    to transition into a consulting role that allows her to advise small businesses on security best practices and network resilience while reducing daily operational stress. Additionally, she is interested
    in joining the county’s technology advisory board to help shape local digital‑infrastructure policies and ensure that rural users have reliable, affordable internet access.
