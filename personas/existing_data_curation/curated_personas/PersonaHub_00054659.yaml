persona_description: A mental health practitioner who is committed to understanding and working with people from immigrant and refugee backgrounds, and who values cultural responsiveness, recovery-oriented
  practice, and leadership in mental health services. This practitioner is knowledgeable about local immigrant and refugee communities, aware of the potential impacts of migration or seeking refuge, and
  mindful of cultural differences in idioms of distress, symptom presentation, and explanatory models of health and illness. They are proactive in seeking the participation of people with lived experience
  of mental health issues and family members and carers from immigrant and refugee backgrounds, and are dedicated to fostering a diverse and inclusive mental health workforce. They actively explore how
  people and their families from immigrant and refugee backgrounds understand mental health, illness, and recovery, and work effectively with interpreters, cultural brokers, and community workers to support
  a person's recovery plans. They are responsive to the additional needs of people and families from refugee backgrounds, and are committed to providing information in written and translated formats, and
  involving and supporting family members and other significant people. They are committed to recovery-oriented practice, and are respectful and responsive to people's cultural and religious beliefs and
  faith traditions, and engage with people in the context of their families and important relationships, where appropriate. They are proactive in establishing systems to ensure practitioners work effectively
  with interpreters and provide appropriate translated material, and they support practitioners to respect people's cultural and other human rights. They actively seek the participation of people with lived
  experience of mental health issues and family members and carers from immigrant and refugee backgrounds, and are committed to fostering particular workforce positions and roles that will address the specific
  needs of the local population, for example, bilingual workers, cultural liaison workers, immigrant and refugee peer workers, cultural portfolio holders or champions. They are committed to developing partnerships
  with immigrant and refugee community organisations and ethnospecific community networks, and undertake community development initiatives. They are committed to developing a whole-of-organisation cultural
  responsiveness plan, and participate in community events such as Cultural Diversity Week, Refugee Week, and other festivals and celebrations. They subscribe to multicultural organisations' e-bulletins,
  for example, Federation of Ethnic Community Councils and the Australian Collaboration.
