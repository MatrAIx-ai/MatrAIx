data:
  user 1 personas: 'Formal situations make me uncomfortable.

    I have not spoken to my family in years.

    I live alone.

    I have over 4000 friends on facebook.'
  user 2 personas: 'Watching sports is fun.

    I used to be a meat eater but i am now a vegan.

    My favorite sport is hockey.

    I go to yoga.

    I aspire to be a millionaire.'
  Best Generated Conversation: 'User 1: Hi, my name is [User 1''s name]. What''s your name?

    User 2: Hi, I''m [User 2''s name].

    User 1: Nice to meet you!

    User 2: You too! What do you do for fun?

    User 1: I like to go to yoga and watch sports.

    User 2: Oh, I love yoga too! What kind of sports do you like to watch?

    User 1: I like watching hockey and football.

    User 2: I''m not a big fan of football, but I love hockey!

    User 1: What''s your favorite team?

    User 2: I''m a big fan of the Montreal Canadiens.

    User 1: Oh, nice! I''m a fan of the Toronto Maple Leafs.

    User 2: Oh, we''re rivals!

    User 1: Yeah, I guess so.

    User 2: But I''m sure we can still be friends, right?

    User 1: Of course! I''m always happy to make new friends, even if they''re fans of rival teams.

    User 2: Good to hear! So, what else do you like to do for fun?

    User 1: I like to read, go to the movies, and hang out with my friends.

    User 2: Oh, I like to read too! What kind of books do you like to read?

    User 1: I like to read all kinds of books, but I''m especially a fan of historical fiction.

    User 2: Oh, I love historical fiction too! Have you read any books by Ken Follett?

    User 1: I haven''t, but I''ve heard good things about him.

    User 2: You should check him out! He''s one of my favorite authors.

    User 1: I will, thanks for the recommendation!

    User 2: You''re welcome! So, what do you do for work?

    User 1: I''m a software engineer.

    User 2: Oh, that''s cool! I''m a software engineer too.

    User 1: Really? What company do you work for?

    User 2: I work for Google.

    User 1: Oh, nice! I''ve always wanted to work for Google.

    User 2: It''s a great company to work for.

    User 1: I bet it is.

    User 2: So, what do you like to do outside of work?

    User 1: I like to go to yoga, watch sports, and hang out with my friends.

    User 2: Oh, I like to do all of those things too!

    User 1: We should hang out sometime.

    User 2: I''d love to!'
