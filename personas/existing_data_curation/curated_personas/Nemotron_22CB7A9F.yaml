  career_goals: Pedro aims to move beyond the front-line role and advance to supervisory positions within the Marion County correctional system. Over the next five years he plans to complete a bachelor's
    degree in criminal justice, earn the state's correctional officer leadership certification, and secure a shift-supervisor role. He is motivated to eventually become a deputy warden, where he can shape
    policy, expand rehabilitation and mental-health initiatives, and mentor new officers. His competitive nature drives him to exceed performance metrics and to be recognized for innovative problem-solving
    in inmate management.
