  career_goals: Although retired from formal employment, Carolyn aims to expand her impact on the Parkersburg community by establishing a free art‑therapy program for seniors and establishing a quarterly
    "Story & Craft" series that merges local history storytelling with hands‑on creative workshops. She also aspires to complete a personal memoir that reflects her lifelong love of learning and community
    service, and hopes to master digital illustration to share her artwork online. Long‑term, she envisions mentoring younger volunteers to sustain these initiatives beyond her active years.
