    User 1: So, what''s your favorite song by her?

    User 2: My favorite song is "Toxic."

    User 1: Oh, that''s a good one!

    User 2: I know, right?

    User 1: I love the beat.

    User 2: Me too! It''s so catchy.

    User 1: Yeah, it is.

    User 2: So, what do you think?

    User 1: I think it''s a great song!

    User 2: Thanks! I''m glad you like it.'
