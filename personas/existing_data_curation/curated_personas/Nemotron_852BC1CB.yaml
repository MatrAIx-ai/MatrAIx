personas:
  professional: Stephanie Bullard is a budding pretend-engineer who spends hours constructing block towers and organizing make-believe construction sites, showcasing early spatial reasoning, collaborative
    problem-solving, and a blend of curiosity and practical play that hints at a future in design or engineering.
  sports: Stephanie Bullard loves the swing set at the local park, participates in a preschool-run Kids Soccer League where they chase the ball with boundless energy, cheers for the New York Knicks during
    family game nights, and looks forward to winter sledding on the nearby hills, embodying a playful but loosely organized approach to fitness.
  arts: Stephanie Bullard delights in drawing colorful pictures of dinosaurs and rainbows, sings along to Raffi's Baby Beluga and Sesame Street's alphabet songs, and watches episodes of Bluey for inspiration,
    while occasionally mimicking the dance moves of Miley Cyrus from a kid-friendly clip, weaving these artistic moments into their everyday play.
  travel: Stephanie Bullard enjoys family road trips to Niagara Falls, where they splash in the mist, love picnicking at the local lake during summer, and dream of visiting the Magic Kingdom in Orlando,
    preferring short, vibrant outings over long journeys, guided by their parents' careful planning and love for community celebrations.
  culinary: Stephanie Bullard favors mac and cheese with a sprinkle of cheddar, crunchy apple slices with peanut butter, and spoonfuls of strawberry-filled yogurt, often attempting to help stir the pot
    while their parents keep a watchful eye, revealing a budding curiosity in cooking paired with a predictable palate for comfort foods.
  core: Stephanie Bullard is a lively three-year-old whose boundless energy, love for group play, occasional worry, and a habit of turning ordinary moments into imaginative adventures define their unique
    outlook on life.
background:
  cultural: Stephanie was born and raised in Canastota, a small town in Madison County, New York, within a predominantly white, middle‑class American family. She celebrates typical American holidays such
