  career_goals: In the short term, Janeen aims to maintain strong academic performance, take on leadership roles in school clubs such as the environmental club and student council, and deepen her understanding
    of science and communication. Long‑term, she aspires to become an elementary school teacher or an environmental educator, roles that would let her combine her love for structure, helping others, and
    appreciation for the natural world. She envisions earning a degree in education or environmental science, creating supportive, well‑organized classroom environments, and eventually leading community‑based
    projects that promote sustainability and outdoor learning.
