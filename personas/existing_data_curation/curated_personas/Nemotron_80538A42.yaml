personas:
  professional: Janeen Clements, a budding wildlife researcher in middle school, channels their love for nature and strategic mindset into meticulous field notebooks and Scratch‑based data log apps, while
    their calm resilience and structured approach make them a reliable leader in the school's environmental club.
  sports: Janeen Clements, a member of the Clackamas County Youth Hiking Club, spends weekends trekking the Columbia River Gorge with a disciplined warm‑up routine, cheers on the Portland Timbers during
    soccer season, and balances their active lifestyle with strategic board‑game sessions to keep their mind sharp.
  arts: Janeen Clements, a dedicated sketch artist and piano enthusiast, draws inspiration from John James Audubon’s wildlife illustrations and Ludovico Einaudi’s minimalist piano pieces, often creating
    animated nature scenes in Scratch while listening to the soundtrack of The Secret Garden.
  travel: Janeen Clements, an organized travel planner, prefers detailed day‑trip itineraries to nearby wonders like Multnomah Falls and Cannon Beach, while daydreaming about future adventures to the Grand
    Canyon and Banff National Park, balancing family constraints with a love for nature immersion.
  culinary: Janeen Clements, a budding home cook, delights in tossing fresh garden salads with heirloom tomatoes, crisp cucumbers, and homemade basil vinaigrette, whipping up simple pesto pasta using basil
    from their backyard, and savoring warm apple crisp topped with oat crumble on chilly evenings.
  core: Janeen Clements blends calm, organized curiosity for nature with a strategic love for puzzles and music, turning every hike into a field study and every spare moment into a sketch or piano practice,
    though they sometimes forget to water houseplants.
background:
  cultural: Janeen is a white American raised in the suburban community of Clackamas, Oregon. Her family's cultural practices reflect mainstream Anglo‑American traditions, with an emphasis on community
    involvement, outdoor recreation, and an appreciation for the Pacific Northwest's natural environment. She celebrates national holidays such as Thanksgiving, Christmas, and the Fourth of July, and participates
    in local customs like attending the Clackamas County Fair, joining community garden projects, and supporting regional environmental initiatives.
