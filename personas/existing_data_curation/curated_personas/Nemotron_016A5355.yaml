personas:
  professional: Rolando Lopez, a 14‑year‑old aspiring programmer, applies their methodical mindset to designing custom scripts for game mods and assembling scale model kits, often following step‑by‑step
    manuals with the same precision they use for school projects.
  sports: Rolando Lopez, who prefers solitary competition, avidly watches the Los Angeles Rams and the LA Lakers on weekends, competes in the school’s chess team as a strategic sport, and contributes to
    a local youth robotics league where they apply their engineering skills to team challenges.
  arts: Rolando Lopez, who enjoys listening to the guitar riffs of Carlos Santana and admiring the vibrant murals of local street artists, channels their analytical eye into sketching precise technical
    drawings of model kits while occasionally dabbling in pixel art inspired by classic video games.
  travel: Rolando Lopez, who has visited their grandparents’ hometown in the Central Valley for Día de los Muertos celebrations and dreams of attending the International Robot Expo in Detroit, prefers meticulously
    planned trips with set itineraries and avoids spontaneous travel.
  culinary: Rolando Lopez, who enjoys helping prepare tamales and pozole during holidays, prefers following exact recipes like a precise assembly manual, and has a growing knack for seasoning tacos with
    roasted chilies, cilantro, and lime.
  core: Rolando Lopez, a methodical 14‑year‑old who thrives on structure, solitary projects, and precise planning, balances a competitive spirit with a quiet, resilient interior.
background:
  cultural: Rolando is a first‑generation Mexican‑American raised in Fontana, California, a city with a vibrant Hispanic community. At home, Spanish is spoken alongside English, and family gatherings feature
    traditional Mexican dishes such as tamales and pozole, especially during holidays like Día de los Muertos and Cinco de Mayo. He participates in local cultural events hosted by community centers, where
    he learns about Mexican folklore, music, and values of solidarity and respect for elders. While he embraces his cultural heritage, he also navigates the broader American school environment, blending
    the two worlds in his daily life.
