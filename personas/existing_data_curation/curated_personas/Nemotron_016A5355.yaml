  career_goals: Rolando aspires to channel his analytical strengths into a technical career. He plans to enroll in a specialized STEM pathway at his high school, then pursue an associate degree in computer
    networking or information technology. His ultimate ambition is to become a network systems analyst or IT support specialist, roles that offer clear procedures and problem‑solving opportunities. He also
    hopes to obtain industry certifications (CompTIA A+, Network+) to validate his expertise and secure a stable, well‑structured career. Financial independence and the ability to support his family are
    key motivators.
