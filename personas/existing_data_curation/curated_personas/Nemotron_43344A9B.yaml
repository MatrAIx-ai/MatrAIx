  hobbies: '[''Painting'', ''Visiting art galleries and museums'', ''Attending theater and improv workshops'', ''Reading literary fiction and philosophy'', ''Book club participation'', ''Gardening (heirloom
    roses)'', ''Traveling to historic sites for sketching'', ''Yoga and meditation'']'
  career_goals: Julia aims to expand her organization’s impact by integrating the arts into corporate social responsibility initiatives and building a regional arts network that connects businesses, schools,
    and cultural institutions. She hopes to mentor emerging women leaders, publish a memoir that intertwines leadership lessons with personal art experiences, and eventually transition to a legacy role
    that champions community‑driven cultural development while maintaining a flexible schedule that allows for personal creative pursuits.
