  hobbies: '["Beachcombing and mangrove exploration", "Photography of coastal nature", "Reading fantasy and science‑fiction", "Acoustic guitar playing", "Strategic video gaming", "Chess", "Cooking and recipe
    experimentation", "Sketching and digital illustration"]'
  career_goals: In the next few years Astrid aims to earn her GED and enroll in a community‑college program that blends environmental science with hands‑on marine technology. Her ultimate ambition is to
    work as a marine technician or coastal‑resource manager for a local conservation organization, where she can apply her practical knowledge of reef health and contribute to sustainable tourism initiatives.
    Simultaneously, she hopes to build a freelance career as a digital illustrator, creating artwork that celebrates Puerto Rican coastal life and selling prints through an online store. She sees these
    parallel paths as a way to balance her competitive drive—by delivering high‑quality visual work and excelling in a technical field—with her desire for a practical, community‑focused livelihood.
