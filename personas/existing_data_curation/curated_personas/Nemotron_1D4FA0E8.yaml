personas:
  professional: Astrid Villanueva is a high‑school senior turning her curiosity about reef health and love of digital illustration into a dual career path, blending hands‑on marine ecology skills and Python
    scripting with freelance artwork that celebrates coastal life, while their relaxed approach to deadlines and competitive drive keep them focused on delivering high‑quality results.
  sports: Astrid Villanueva enjoys early‑morning swims in Naguabo’s mangroves, plays beach volleyball with friends on weekends, follows the Cangrejeros de Santurce baseball team, and sharpens their strategic
    mind at local chess meet‑ups, balancing relaxed fitness habits with a competitive streak.
  arts: Astrid Villanueva spends evenings sketching vibrant coastal scenes and creating digital illustrations of reef life using free software, while their music playlist alternates between classic Puerto
    Rican folk songs by Rafael Hernández and indie tracks from Arctic Monkeys, fueling their creative process.
  travel: Astrid Villanueva prefers spontaneous, low‑budget trips that blend adventure and relaxation, often exploring the misty trails of El Yunque, island‑hopping to Culebra for snorkeling, and dreaming
    of a conservation volunteer stint in the Galápagos, while family obligations sometimes limit extended travel.
  culinary: Astrid Villanueva loves cooking traditional dishes such as mofongo and arroz con gandules, often adding a splash of coconut milk or a mango‑pepper salsa for a modern twist, and they enjoy sourcing
    fresh fish at the local market to create a signature grilled fish with guava glaze.
  core: Astrid Villanueva is a curious yet laid‑back teen who balances a love for marine science, digital art, and acoustic guitar with a competitive edge that fuels their strategic gaming and occasional
    disorganization.
background:
  cultural: Astrid identifies as a Puerto Rican from Naguabo, a small coastal municipality known for its fishing villages, lush hills, and the nearby El Yunque rainforest. Her family traditions blend Spanish,
    Taíno, and African influences, evident in the music, food, and community celebrations she grew up with—such as the annual Fiestas de San Juan, where folk drums and colorful dances fill the streets.
    The strong Catholic background of her neighborhood has instilled a respect for communal rituals and seasonal holidays. Living on the island has given her a close relationship with the sea, shaping both
    her culinary palate (with dishes like mofongo and fresh fish) and her emerging interest in marine stewardship. The legacy of resilience after hurricanes and economic hardships fosters in Astrid a pragmatic
    outlook and a belief in self‑reliance, while the island’s vibrant artistic scene fuels her love for illustration and music.
attributes:
  skills: '["Digital illustration", "Basic Python programming", "Marine ecology fundamentals", "DIY home repairs", "Traditional Puerto Rican cooking", "Conversational English", "Strategic video gaming",
