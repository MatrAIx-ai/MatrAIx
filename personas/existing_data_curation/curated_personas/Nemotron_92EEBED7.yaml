    Speaking & Community Presentation"]'
  hobbies: '["Cooking Argentine cuisine", "Tango and folk dancing", "Hiking (Shelby Farms Park)", "Reading psychology & self‑development books", "Journaling and reflective writing", "Gardening (herb garden)",
    "Volunteering at food banks", "Community storytelling circles", "Listening to blues and folk music", "Exploring local art galleries"]'
  career_goals: Alexis aims to deepen her expertise in community health by completing a bachelor’s degree in social work and pursuing certification as a Certified Community Service Manager. Over the next
    five years she envisions leading a bilingual outreach program that bridges the gap between Memphis’s growing Latinx community and local health and social services. She aspires to secure sustainable
    funding through successful grant proposals, mentor junior social‑service staff, and champion trauma‑informed practices. Ultimately, she hopes to found a nonprofit organization that offers culturally‑responsive
    support for immigrant families while influencing policy at the municipal level.
