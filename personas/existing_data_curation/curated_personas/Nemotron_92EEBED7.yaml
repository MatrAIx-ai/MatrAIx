personas:
  professional: Alexis Valero, a 32‑year‑old bilingual community outreach manager who blends evidence‑based program design with a curiosity for innovative service models, uses data‑driven evaluation to
    secure grants, and leverages their calm, compassionate communication style; they excel at coordinating volunteers and resolving conflicts under pressure.
  sports: Alexis Valero, a 32‑year‑old who coaches a youth soccer team at a local community center, runs the Shelby Farms Trail Running Club, avidly follows the Memphis Grizzlies during the NBA season and
    the Nashville Predators in the NHL, and incorporates interval training into their weekly routine to stay resilient.
  arts: Alexis Valero, a 32‑year‑old passionate tango dancer who practices to the music of Astor Piazzolla and folk rhythms of Mercedes Sosa, attends monthly performances at the Playhouse on the Square,
    curates playlists featuring local blues guitarist Gary Clark Jr., and volunteers to tell stories at the Memphis Heritage Library; they infuse their cultural roots into each artistic expression.
  travel: Alexis Valero, a 32‑year‑old who prefers thoughtfully planned trips that balance cultural immersion with relaxed downtime, has explored the street art of Valparaíso, Chile, trekked the Appalachian
    Trail, and dreams of a culinary getaway to Oaxaca, while fitting short weekend escapes to Nashville into their busy schedule.
  culinary: Alexis Valero, a 32‑year‑old enthusiastic home chef who masters the art of empanadas and asado by blending traditional marinades with locally sourced Tennessee pork, sweet potatoes, and fresh
    herbs from their garden, experiments with chimichurri and smoked paprika, and often hosts neighborhood potlucks to share their fusion creations.
  core: Alexis Valero, a 32‑year‑old calm, curiosity‑driven community strategist who balances solitary hikes with lively tango nights, meticulously budgets while indulging in gourmet cooking, and quietly
    nudges every project toward inclusive, data‑backed success; they are known for a habit of late‑night journaling that sometimes delays bedtime.
background:
  cultural: Alexis was born to Argentine parents who immigrated to the United States in the early 1990s. She grew up speaking Spanish at home while attending English‑language schools in Memphis, giving
    her a bicultural identity that blends Argentine family traditions with Southern hospitality. She celebrates Argentine holidays such as Día de la Revolución de Mayo and enjoys weekend asados with extended
    family, while also embracing Mississippi barbecue and blues music. Her cultural fluency informs her work, allowing her to serve both the Latinx community and the broader Memphis population with sensitivity
    and authenticity.
attributes:
  skills: '["Community Outreach & Engagement", "Bilingual Case Management (Spanish/English)", "Crisis Intervention", "Program Development & Evaluation", "Grant Writing & Fundraising", "Data Collection &
