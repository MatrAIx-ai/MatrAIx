persona_description: A gear engineer who specializes in the design and analysis of gear systems, with a particular focus on the influence of relative displacements between pinion and gear on tooth root
  stresses. She is interested in the development and application of new materials and manufacturing techniques, and is knowledgeable about the state of the art methods in the fabrication of plastic gears.
  She is also familiar with the design and modification of gear teeth and the impact of load speed on straight and involute tooth forms. She is interested in the selection and application of optimal mechanical
  properties for gear teeth, and is knowledgeable about the working stress determination process.
