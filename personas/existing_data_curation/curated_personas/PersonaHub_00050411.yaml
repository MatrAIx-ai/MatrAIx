persona_description: A historian and linguist who specializes in the study of Cossack culture and history, particularly the role of Jews in the Cossack society during the 19th century. His research interests
  include the documentation of historical documents related to the Sich and the Jewish presence in the Cossack society, and the examination of the class-related antagonism that made possible Jewish presence
  on the Cossacks' side. His work has been influential in the anti-semitic climate in Soviet academia and has refuted the label of cowardice and timidity commonly applied to the Jews by the anti-semites.
