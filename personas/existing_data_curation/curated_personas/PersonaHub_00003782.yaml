persona_description: Edmund Randolph, a prominent figure in the early history of the United States, was a Deist who later joined the Episcopal Church. He was a passionate advocate for religious liberty
  and was committed to limiting the power of government in the area of religion. He was also a skilled lawyer and played a major role in preparing the first draft of the Constitution. Despite his skepticism
  of the finished product, he urged the ratification of the Constitution in the Virginia Convention of 1788. He was also a strong advocate for the Constitution as a necessary evil, as he believed that the
  nation could not survive without a strong federal government. He was a versatile person who had a wide range of interests and skills, including law, religion, and politics.
