  career_goals: Ana dreams of turning her love for art and storytelling into a career that amplifies the voices of her community. She aspires to become a visual artist or illustrator who creates murals
    and digital media that celebrate Puerto Rican culture in the Bronx. She also imagines working as a cultural journalist or content creator, producing stories—whether written or multimedia—that highlight
    immigrant experiences and foster cross‑cultural understanding. In the longer term, she hopes to launch a collaborative space where young creators can gather, share ideas, and showcase their work without
    the constraints of conventional schooling.
