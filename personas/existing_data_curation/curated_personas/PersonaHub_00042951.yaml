persona_description: A linguist who specializes in the study of Old Frisian, focusing on the emergence of this dialect from the time of its earliest records until the 12th century. They have a deep understanding
  of the diachronic and diatopic analyses of Old Frisian features, including the shift of /a/ > /o/ in front of nasals, the drop of word final -n, the effects of i-mutation and delabialisation, and the
  development of Proto-Germanic /au/. They have extensive experience working with digital corpora from mediaeval Frisian and Old English, and have a keen interest in the lack of contemporaneous Frisian
  materials prior to 1200, which they plan to address by relying on evidence from the Frisian dialects and the scarce runic evidence.
