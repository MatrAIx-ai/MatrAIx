personas:
  professional: Mark Doolin is a seasoned network architect who designs large‑scale LAN/WAN, data‑center and cloud networking solutions, leverages SDN, NFV and AI‑driven automation frameworks such as Ansible
    and Terraform, and translates complex technical concepts into intuitive dashboards that blend artistic flair with methodical precision while mentoring junior engineers and aiming for a director‑level
    role.
  sports: Mark Doolin plays point guard for a local Brooklyn basketball league, roots for the New York Knicks and follows the New York Rangers, leads monthly guided hikes in the Hudson Valley with a close‑knit
    group, and is a member of a weekend climbing club at a nearby gym.
  arts: Mark Doolin frequents galleries in Brooklyn and Queens, attends openings at the Met and MoMA, draws inspiration from artists such as Yayoi Kusama and Jeff Koons, practices street photography that
    captures the kinetic energy of NYC neighborhoods, and collects limited‑edition prints from emerging visual artists.
  travel: Mark Doolin has trekked the waterfalls of the Hudson Valley, explored Iceland’s geothermal landscapes, immersed himself in Tokyo’s tech districts, and plans a future trip to Singapore to study
    its smart‑city infrastructure, favoring curated itineraries that blend cultural immersion with futuristic tech tours.
  culinary: Mark Doolin and their spouse experiment with global cuisines, mastering dishes such as Korean bibimbap, Indian chicken tikka masala and Japanese ramen, while hosting dinner parties featuring
    artisanal cheeses and craft cocktails, yet they often over‑season meals with extra soy sauce, a quirky habit they humorously tease each other about.
  core: Mark Doolin blends a methodical, art‑infused mind with a sociable, curiosity‑driven lifestyle, balancing high‑tech networking leadership ambitions with basketball, hiking, global cooking, and a
    slightly impulsive flair for spontaneous art purchases.
background:
  cultural: 'Mark grew up in a middle‑class family of Irish‑English descent in suburban New Jersey, where values of hard work, community involvement, and curiosity were emphasized. Relocating to Brooklyn
    in his mid‑twenties immersed him in a multicultural environment that broadened his appreciation for diverse perspectives, cuisines, and artistic expression. Living near the border of Queens, he enjoys
    easy access to a vibrant mix of cultures, which informs his openness to unconventional ideas and his collaborative work style. Mark and his spouse celebrate traditional American holidays such as Thanksgiving
    and Christmas while also integrating traditions they''ve encountered through friends from various backgrounds. This blend of rooted heritage and urban cultural exposure shapes his worldview: respectful
    of tradition yet eager to explore and incorporate new experiences into both his personal life and professional practice.'
attributes:
  skills: '[''Network Architecture'', ''Data Center Design'', ''Software‑Defined Networking (SDN)'', ''Network Function Virtualization (NFV)'', ''Cisco IOS/IOS‑XE'', ''Juniper Junos'', ''Aruba ClearPass'',
    ''Network Security (firewalls, IDS/IPS)'', ''Network Automation (Ansible, Terraform, Python)'', ''Scripting (Python, Bash, PowerShell)'', ''Cloud Networking (AWS VPC, Azure Virtual WAN)'', ''Edge Computing
    Integration'', ''Network Performance Monitoring (NetFlow, sFlow, Wireshark)'', ''Project Management (Agile, Scrum)'', ''Technical Documentation'', ''Stakeholder Communication'', ''Data Visualization
    (Grafana, Kibana)'', ''Mentoring & Training'', ''CCNP Certification'', ''JNCIS Certification'']'
  hobbies: '[''Art Gallery Visits'', ''Street Photography'', ''Live Music and Theatre'', ''Community Basketball League'', ''Weekend Hiking'', ''Cooking Experiments'', ''Hosting Dinner Parties'', ''Volunteer
    Tech Workshops'', ''Science‑Fiction Reading'', ''Board‑Game Nights'', ''Travel to Culturally Rich Destinations'', ''Futurism and Emerging Tech Exploration'']'
  career_goals: Mark aims to transition into a senior leadership role such as Director of Network Architecture, where he can shape the strategic direction of enterprise networking across multiple business
    units. He is motivated to champion the adoption of AI‑driven network automation and to pilot smart‑city infrastructure projects that blend IoT, 5G, and edge computing. Over the next five years, he plans
    to earn the CCIE certification, publish thought‑leadership articles on network resilience, and become a regular speaker at industry conferences like Cisco Live and IEEE Communications Society events.
    Mark also aspires to mentor the next generation of network engineers through formal training programs and community workshops, fostering a culture of collaboration and continuous learning within his
    organization.
