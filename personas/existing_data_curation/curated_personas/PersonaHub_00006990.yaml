persona_description: A consumer who is interested in understanding the impact of deception on their decision-making and affective response during negotiations with salespeople. They are curious about the
  counterfactual thought processes that underlie lying consumers' feelings of happiness or unhappiness in different negotiation scenarios. This persona seeks to explore the psychological and behavioral
  factors that contribute to consumer deception and how these factors may affect their perception of the outcome of a negotiation.
