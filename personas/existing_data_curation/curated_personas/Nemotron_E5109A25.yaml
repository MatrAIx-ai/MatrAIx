    Nonprofit)'', ''Basic documentation and reporting'']'
  hobbies: '[''Watercolor painting'', ''Photography'', ''Sketching local landscapes'', ''Pottery'', ''Cooking Mexican cuisine'', ''Hiking in Lincoln National Forest'', ''Yoga'', ''Journaling'', ''Listening
    to podcasts on psychology and social innovation'', ''Volunteering to teach art workshops for seniors'']'
  career_goals: Alexis aims to transition from her current assistant role to a full‑time case manager within the next two years, aligning with her desire to take on greater responsibility for client outcomes.
    She plans to enroll in an Associate of Applied Science in Human Services at a community college and to earn a Certified Social Service Specialist (CSSS) credential. Long‑term, she envisions developing
    a community‑based art‑therapy program that merges her love for creativity with her service work, offering workshops that empower at‑risk youth and seniors in Dexter. In addition, she hopes to improve
    her organizational and stress‑management skills through professional development, enabling her to lead a small interdisciplinary team focused on holistic, culturally resonant support services.
