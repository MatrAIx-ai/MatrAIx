personas:
  professional: A community‑focused social service specialist, Alexis Castillo blends case management expertise with a curiosity‑driven, art‑based therapeutic approach, leveraging bilingual communication
    and flexible workflows to build trust and empower rural clients while they actively pursue a Certified Social Service Specialist credential.
  sports: An outdoor‑oriented fitness enthusiast, Alexis Castillo regularly hikes the Lincoln National Forest trails, attends weekly gentle yoga classes, and follows New Mexico United soccer and the Albuquerque
    Isotopes baseball team, while they also play recreational volleyball at the community center and use a Fitbit to log activity, preferring flexible, low‑pressure exercise over rigid training regimes.
  arts: A culturally attuned creative, Alexis Castillo frequents the International Folk Art Museum and local galleries, draws inspiration from Georgia O’Keeffe’s desert palettes, Ansel Adams’s black‑and‑white
    landscapes, and the vibrant murals of Selma Reyes, and they channel this artistic energy into sketching New Mexico’s vistas, experimenting with watercolor, photography, and occasional pottery as personal
    stress relief.
  travel: A curiosity‑driven traveler, Alexis Castillo has explored the art markets of Santa Fe, the Day‑of‑the‑Dead festivities in Oaxaca, trekked Patagonia’s Torres del Paine, and plans a future pilgrimage
    to Kyoto’s cherry‑blossom gardens, preferring thoughtfully planned itineraries that balance immersive cultural experiences with spontaneous nature hikes, though they sometimes delay booking due to lingering
    worries about budget.
  culinary: A passionate home cook, Alexis Castillo perfects handmade tamales, slow‑cooked mole with ancho and pasilla chilies, and mole poblano enriched with spiced dark chocolate, often pairing dishes
    with fresh cilantro, roasted tomatillos, and corn masa, and they delight friends at neighborhood potlucks, while occasionally over‑salting recipes in moments of stress.
  core: Alexis Castillo is a compassionate, art‑infused social service advocate who bends deadlines to nurture community, yet they often lose track of their own schedule, juggling anxiety with an insatiable
    curiosity.
background:
  cultural: Alexis was born into a Mexican‑American family that has lived in New Mexico for generations. She grew up speaking both Spanish and English, celebrating holidays such as Día de los Muertos, Las
    Posadas, and Mexican Independence Day with elaborate altars, traditional foods, and music. Her upbringing emphasized close family ties, respect for elders, and a strong sense of community solidarity,
    which shape her caring, cooperative nature. She draws on Mexican folk art—like papel picado and vibrant mural colors—in her creative projects, and she often incorporates cultural motifs into her community
    work to foster a sense of belonging among her clients.
attributes:
  skills: '[''Client intake & assessment'', ''Case management'', ''Crisis intervention'', ''Resource navigation'', ''Bilingual communication (Spanish/English)'', ''Active listening and empathy'', ''Cultural
