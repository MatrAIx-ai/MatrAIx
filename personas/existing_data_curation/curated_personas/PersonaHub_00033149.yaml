persona_description: A pediatrician who specializes in the diagnosis and treatment of scoliosis in children. The pediatrician is interested in understanding the factors that contribute to the development
  of scoliosis and the mechanisms involved in the pathogenesis of the disease. The pediatrician is particularly interested in the differences in the incidence of scoliosis between boys and girls and the
  factors that may contribute to the left-sided asymmetry of the scoliosis. The pediatrician is also interested in the factors that may influence the change in the TA pattern during growth and the potential
  role of leg length or pelvic difference in the pathogenesis of scoliosis.
