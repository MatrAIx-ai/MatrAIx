  hobbies: '["Drawing", "Digital painting", "Creative writing", "Reading science fiction & fantasy", "Playing narrative‑driven video games", "Acoustic guitar", "Exploring local parks", "Participating in
    school art club", "Attending community art workshops", "Building Lego and model kits"]'
  career_goals: He hopes to attend a specialized art high school or a college program such as the Maryland Institute College of Art, building a professional portfolio that showcases his concept art and
    storytelling abilities. His ultimate ambition is to work as a concept artist or narrative designer for video games or animated films, where he can blend his love for visual design with his narrative
    instincts. He also envisions creating his own graphic novel series, possibly self‑publishing online. Recognizing his sensitivity to stress, he aims to develop a balanced routine that includes mindfulness
    practices and creative outlets, and eventually become an advocate for mental‑health awareness within creative communities.
