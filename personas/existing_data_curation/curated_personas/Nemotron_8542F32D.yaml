personas:
  professional: Joe Cranford, a budding concept artist and visual arts high‑school student, channels a vivid imagination into sketchbooks and digital painting while a relaxed stance on deadlines fuels creative
    bursts but often leads to mismatched school assignments.
  sports: Joe Cranford cycles the Columbia Trails on weekends, participates sporadically in the Howard County youth soccer league, cheers for the Baltimore Ravens during NFL season, and prefers low‑key
    nature walks over rigorous gym sessions.
  arts: Joe Cranford draws inspiration from the atmospheric soundscapes of Tame Impala, the cinematic storytelling of Hayao Miyazaki, and the raw lyricism of Mitski, often turning favorite indie‑film scenes
    into charcoal fan art while spinning vinyl on a turntable.
  travel: Joe Cranford favors spontaneous weekend drives to Annapolis’ historic waterfront and the patrolled Chesapeake wetlands, while day‑dreaming about a future backpacking trek through Kyoto’s shrines
    and New Zealand’s fjords once high‑school graduation expands the budget.
  culinary: Joe Cranford loves whipping together avocado toast with a drizzle of sriracha, experimenting with miso‑glazed salmon on Saturdays, and pairing these dishes with indie‑rock vinyl nights, though
    they often burn the toast while lost in a new sketch.
  core: Joe Cranford is a day‑dreaming teen whose sketchbooks brim with half‑finished worlds, whose guitar strings echo unfinished melodies, and whose scattered schoolwork reflects a love of flexibility
    that sometimes tips into procrastination.
background:
  cultural: Joe comes from a middle‑class, white family living in the suburban community of Columbia, Maryland. His parents grew up in the Mid‑Atlantic region and maintain a blend of traditional American
    values and progressive attitudes, encouraging curiosity and self‑expression. He was raised in a Protestant household, attending a local church for community events but also exposed to diverse cultural
    activities in Howard County, such as multicultural festivals, the public library’s arts programs, and the nearby Smithsonian‑affiliated museums in Baltimore/Washington. The region’s strong emphasis
    on education, access to technology, and vibrant artistic scene have shaped his appreciation for both classic American storytelling and contemporary digital media.
attributes:
  skills: '["Digital illustration", "Creative writing", "Basic Python programming", "Conceptual design", "Sketching", "Storyboarding", "Critical thinking", "Empathetic communication", "Collaborative project
