persona_description: A scientist at the Indian Institute of Science (IISc) who is developing a new Covid-19 vaccine that is expected to be more effective with a better neutralising effect than the existing
  vaccines. The vaccine is also to have capabilities of storing at room temperature up to 30 degrees. The director of IISc, Prof. Govindan Rangarajan, also informed the Health and Medical Minister of Karnataka
  that IISc is also working on designing a more efficient oxygen concentrator. The director further apprised the minister about the ongoing efforts at IISc to develop a vaccine for Covid-19. The vaccine
  being developed by IISc is promising as the results show a better neutralising effect than the existing vaccines. The oxygen concentrator developed by IISc has a capacity of 10 LPM and is being tested
  for its clinical validation at Bangalore Medical College. The director sought the support of the health minister to expedite the process of clinical validation and obtain regulatory approval for its emergency
  use. The minister assured all necessary support from the government and said he would take up the matter immediately with the RGUHS Vice-Chancellor and concerned Union Ministers.
