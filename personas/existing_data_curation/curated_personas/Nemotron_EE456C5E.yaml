personas:
  professional: Jay Passmore is a senior-level auditor who blends rigorous GAAP compliance, forensic accounting, and AI-enabled data analytics with a collaborative, mentor-focused approach, turning complex
    audit challenges into streamlined, people-centric solutions for Atlanta-based tech firms.
  sports: Jay Passmore drives his fitness through weekly pickup basketball games, cheering on the Atlanta Hawks while regularly hiking with the North Georgia Trail Club on the Blue Ridge Mountains, balancing
    high-intensity cardio with restorative weekend treks.
  arts: Jay Passmore immerses himself in the rhythmic world of soul and jazz, drawing inspiration from Aretha Franklin, John Coltrane, and Erykah Badu, while drumming in a neighborhood gospel ensemble and
    escaping into science-fiction novels by Neal Stephenson and strategic treatises by Michael Porter.
  travel: Jay Passmore plans his trips around music festivals, having trekked to Austin City Limits, the New Orleans Jazz & Heritage Festival, and the Montreux Jazz Festival in Switzerland, while also carving
    out weekend getaways for solo hikes along the Appalachian Trail, balancing group adventure with solitary reflection.
  culinary: Jay Passmore, a confident home chef, blends classic Southern barbecue like hickory-smoked brisket glazed with bourbon and chipotle-infused pulled pork into contemporary comfort plates such as
    chicken-and-waffles topped with sriracha-maple drizzle, relishing the balance of smoky depth and bold spice.
  core: Jay Passmore is a data-savvy auditor who fuels his relentless curiosity with basketball, gospel drumming, and smoky barbecue, yet occasionally lets their perfectionist streak delay personal projects.
background:
  cultural: Jay is an African‑American who grew up in the Atlanta suburbs, where his family emphasized education, church involvement, and community solidarity. He was raised on the traditions of Southern
    Black culture—celebrating holidays like Juneteenth, savoring family recipes of collard greens, cornbread, and barbecue, and participating in gospel music at his church. The values of perseverance, mutual
    support, and leadership that he observed within his extended family and local community shaped his collaborative and kind nature. While his STEM education introduced him to cutting‑edge technology and
    analytical thinking, his cultural roots keep him grounded in the importance of giving back, fostering mentorship, and preserving the rich heritage of the Black Southern experience.
