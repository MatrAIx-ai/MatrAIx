  hobbies: '[''Basketball (pickup games)'',''Community volunteering'',''Traveling to music festivals'',''Cooking (Southern BBQ and modern twists)'',''Reading (science fiction and business strategy)'',''DIY
    tech projects (Raspberry Pi, Arduino)'',''Attending live music events (soul, jazz, R&B)'',''Mentoring financial literacy for youth'',''Hiking in North Georgia'',''Playing drums in a local gospel band'']'
  career_goals: Jay aspires to advance into a senior leadership role within the accounting profession—ideally as a senior audit partner at a regional firm or as a Chief Financial Officer for a mid‑size
    technology company in the Atlanta metro area. He is pursuing CPA certification and plans to add a Certified Fraud Examiner (CFE) credential to deepen his forensic expertise. Beyond title and compensation,
    Jay wants to spearhead digital transformation initiatives that embed AI‑driven analytics into audit workflows, mentor emerging accountants from underrepresented backgrounds, and eventually launch his
    own boutique consultancy focused on data‑centric financial advisory for small businesses and non‑profits. His ambition is tempered by a commitment to community service, so he also aims to expand his
    volunteer financial‑literacy programs for local high‑school students.
