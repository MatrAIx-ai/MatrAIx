  hobbies: '["Building block towers", "Dancing to Latin music", "Crayon drawing", "Exploring backyard nature", "Playground group play", "Story time at the library", "Singing simple songs", "Imitative kitchen
    play", "Sorting toys by type", "Watching cartoons with subtitles"]'
  career_goals: Javier’s ambitions are expressed through imaginative play. He often pretends to be a firefighter rescuing his stuffed animals, dreams of helping his mother in the kitchen by stirring pretend
    soup, and talks about becoming a teacher so he can share his picture books with other children. These early goals reflect his desire to be useful, to engage with others, and to explore new roles while
    maintaining familiar, comforting routines.
