personas:
  professional: Javier Riveraberrios, a budding mini architect who loves stacking wooden blocks into orderly towers, channels their organized and methodical temperament into early engineering play, while
    balancing a curious urge to test unconventional designs with a practical need for stability, and they often insist on following a step‑by‑step building plan before any creative twist.
  sports: Javier Riveraberrios, a lively member of the neighborhood toddler soccer club, dashes after the orange ball at the community field while cheering for the Seattle Seahawks as a tiny fan, and they
    practice basic coordination drills each Wednesday with enthusiastic teammates.
  arts: Javier Riveraberrios, an enthusiastic preschool painter who loves splashing watercolors while humming along to The Wiggles and watching classic Disney shorts like The Lion King, often mimics the
    simple collages of artist Eric Carle, and they proudly display their crayon masterpieces on the refrigerator gallery.
  travel: Javier Riveraberrios, a curious explorer who enjoys weekend trips to the city zoo, the beach town of Santa Monica, and a family vacation to Disneyland Paris, prefers itineraries that mix scheduled
    nap times with spontaneous treasure‑hunting in playgrounds, and they always request a stuffed animal souvenir from each destination.
  culinary: Javier Riveraberrios, a picky yet adventurous eater who devours mac and cheese with extra cheddar and peanut‑butter toast, bristles at broccoli but occasionally tries mango slices, and they
    happily help stir mashed sweet potatoes in the kitchen while insisting on a side of apple sauce.
  core: Javier Riveraberrios is a meticulously curious two‑year‑old who methodically organizes toys, worries about routine changes, balances a sprightly love for group play with a habit of over‑scheduling
    snack times, and often demonstrates a charming mix of assertiveness and sensitivity.
background:
  cultural: Javier is raised in a bilingual Puerto Rican household in Alachua, Florida. His family celebrates traditional events such as Nochebuena and Día de los Reyes, serves dishes like arroz con gandules
    and pasteles, and listens to a mix of salsa, bomba, and contemporary Latin pop. Spanish is spoken at home alongside English, giving him early exposure to both languages. The local community’s diverse
    cultural mix enriches his experiences, while his Puerto Rican heritage shapes his values of family closeness, vibrant music, and festive celebrations.
attributes:
