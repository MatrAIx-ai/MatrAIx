  career_goals: Approaching retirement, Becky aims to transition into a supervisory and safety‑training role where she can formalize her expertise and mentor younger workers. She plans to obtain an OSHA
    trainer certification within the next year and hopes to lead a small safety committee that standardizes procedures across multiple shifts. Long‑term, she envisions reducing her hours to part‑time to
    devote more time to family and volunteer work, while maintaining a steady supplemental income as a freelance logistics consultant for local small businesses.
