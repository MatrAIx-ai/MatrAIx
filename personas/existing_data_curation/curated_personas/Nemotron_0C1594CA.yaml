  hobbies: '[''Hiking'', ''Fishing'', ''Woodworking'', ''Reading historical non-fiction'', ''Home fermentation'', ''Food festivals'', ''Nature photography'']'
  career_goals: Robert aims to deepen his culinary knowledge by completing a professional chef certification and, eventually, attaining a sous-chef role at a farm-to-table restaurant in the Chautauqua region.
    Over the next five years he hopes to become head chef, develop a seasonal tasting menu that highlights local producers, and lay the groundwork for opening his own modest bistro that emphasizes sustainable
    sourcing and community engagement. He also plans to pursue a short program in hospitality management to strengthen his leadership and business skills.
