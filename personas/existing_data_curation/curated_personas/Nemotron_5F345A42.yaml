  career_goals: Pedro dreams of becoming an inventor or engineer who can design fun gadgets and solve everyday puzzles, reflecting his love for building and practical curiosity. He also imagines being a
    champion soccer player or a video‑game designer, channeling his competitive spirit and love for games. While he enjoys exploring ideas, he prefers a flexible path that lets him keep learning through
    play and helping his family and community.
