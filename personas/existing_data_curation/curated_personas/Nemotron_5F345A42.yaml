personas:
  professional: Pedro Rivas, a budding LEGO architect, combines boundless curiosity with a knack for turning imagined castles into sturdily built creations, and they often improvise with spare blocks when
    plans go awry, showing a practical yet flexible mindset even at five.
  sports: Pedro Rivas, a lively member of the Placentia Youth Soccer Club who dribbles the ball with relentless energy and idolizes the LA Galaxy’s star forward, also cheers for the Los Angeles Dodgers
    during summer outings and enjoys weekend swim lessons at the local community pool, balancing team play with occasional solo kick‑around sessions in the backyard.
  arts: Pedro Rivas, an enthusiastic participant in weekend dance classes that teach traditional folk steps alongside modern hip‑hop moves, spends afternoons drawing vibrant characters inspired by Disney’s
    Frozen and listening to upbeat songs by Shakira and the playful melodies of the Sesame Street soundtrack, weaving cultural rhythm into their creative play.
  travel: Pedro Rivas, whose family vacations often include trips to Disneyland for magical rides and weekend beach days in Laguna to build sandcastles, dreams of visiting the towering Eiffel Tower in Paris
    and is always excited by the idea of a road trip to the Grand Canyon, yet they rely on parents for all planning and prefer trips that blend adventure with familiar comforts.
  culinary: Pedro Rivas, a picky yet adventurous eater who delights in the cheesy goodness of pupusas and the sweet spiciness of tamales during family celebrations, can proudly assemble a simple avocado
    toast with a spread of butter and a sprinkle of salt, but they often spill milk on the floor when gulping down a chocolate shake, showing a charming blend of culinary curiosity and toddler clumsiness.
  core: Pedro Rivas, a curious five‑year‑old who toggles between building LEGO fortresses, chasing soccer balls, and devouring pupusas, balances a playful competitive streak with a relaxed, sometimes disorganized
    approach to everyday chores.
background:
  cultural: Pedro grows up in a bilingual Guatemalan‑American household in Placentia, California. At home, Spanish is spoken and traditional Guatemalan dishes like tamales and pupusas are shared during
    family meals, while celebrations such as Día de los Muertos and Semana Santa blend with American holidays like Thanksgiving and Halloween. The local Latino community provides cultural events, dance
    classes, and soccer leagues that reinforce his heritage, and his parents encourage both the values of close‑knit family ties and the practicality of adapting to life in Orange County. This dual cultural
    exposure shapes his curiosity, love for community, and flexible outlook.
