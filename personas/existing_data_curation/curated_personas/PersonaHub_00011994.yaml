persona_description: A historian who specializes in the study of colonial history, particularly the period of the Spanish conquest and colonization of the Americas. He or she is knowledgeable about the
  techniques and methods used in archaeological excavation, including the use of sub-surface testing and the identification of various building materials. The individual is interested in the cultural and
  social aspects of the period, including the construction techniques and the role of the Spaniards in the development of the region. The historian is also interested in the economic and social structures
  of the time, and how they impacted the development of the region.
