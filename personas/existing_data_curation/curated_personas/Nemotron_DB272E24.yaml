personas:
  professional: Julieann Grasley blends a STEM‑backed special‑education expertise with a hands‑on, inclusive teaching style, designing differentiated curricula, adaptive robotics projects, and data‑driven
    IEPs while fostering compassionate collaboration among paraprofessionals, therapists, and families.
  sports: Julieann Grasley stays active through weekend hikes along redwood and coastal trails, weekly yoga classes at a community studio, participation in the Santa Cruz Running Club’s 5 k races, and supporting
    the San Francisco Giants and Golden State Warriors.
  arts: Julieann Grasley expresses creativity through nature photography inspired by Ansel Adams, enjoys science‑fiction novels by Andy Weir, and unwinds with the indie folk sounds of Fleet Foxes and the
    cinematic scores of Hans Zimmer.
  travel: Julieann Grasley prefers self‑planned road trips that combine outdoor adventure and cultural immersion, having explored Big Sur’s cliffs, Iceland’s volcanic landscapes, and a week‑long culinary
    tour of Kyoto, while dreaming of a sustainable ecotourism volunteer stint in Costa Rica.
  culinary: Julieann Grasley cooks farm‑to‑table meals at a confident home‑chef level, favoring heirloom tomato bruschetta with basil, rosemary‑infused roasted chicken, miso ramen with shiitake mushrooms,
    and daily salads spiced with fresh oregano and thyme from their garden.
  core: Julieann Grasley is a compassionate, curiosity‑driven educator who balances pragmatic planning with spontaneous ingenuity, often juggling a green thumb, a tech hobby, and occasional over‑commitment
    to volunteer projects.
background:
  cultural: Julieann grew up in a middle‑class, suburban family of European descent in Northern California. Her upbringing emphasized education, community involvement, and outdoor recreation, reflecting
    the progressive, environmentally conscious culture of the Bay Area region. Celebrations of traditional holidays such as Thanksgiving and Christmas were blended with local customs like farmers‑market
    visits and coastal beach clean‑ups. This cultural mix of classic American values and the region’s liberal, sustainability‑focused ethos informs her compassionate approach to teaching and her commitment
    to inclusive, equitable education.
attributes:
  skills: '[''special education teaching'', ''STEM curriculum development'', ''differentiated instruction'', ''assistive technology integration'', ''IEP planning and evaluation'', ''co‑teaching and collaborative
    teamwork'', ''data‑driven assessment and progress monitoring'', ''project‑based learning design'', ''behavioral management and positive reinforcement'', ''parent and specialist communication'']'
  hobbies: '[''hiking and nature photography'', ''organic gardening and cooking'', ''DIY electronics with Arduino and Raspberry Pi'', ''reading science‑fiction'', ''yoga and meditation'', ''volunteering
    at animal shelter'', ''participating in community STEM outreach'']'
  career_goals: Julieann aims to become a district‑wide Inclusive STEM Coordinator, leading professional development for teachers on adaptive science and technology instruction. She plans to pursue a master's
    degree in Special Education with a focus on Universal Design for Learning, and to author resource guides that bridge STEM and special education. Long‑term, she envisions advocating for policy changes
    that increase funding for accessible technology in classrooms across Santa Cruz County, while mentoring new teachers and establishing community partnerships for after‑school robotics clubs inclusive
    of students with disabilities.
