  hobbies: '[''vegetable gardening'', ''southern cooking'', ''quilting'', ''reading historical fiction'', ''genealogy research'', ''church choir singing'', ''birdwatching'', ''bridge card game'', ''walking
    nature trails'', ''attending local fairs'', ''spontaneous road trips'']'
  career_goals: Even in retirement, Phyllis remains goal‑oriented. She hopes to expand her volunteer role at the community center, eventually leading a weekly workshop on cooking and quilting for younger
    residents. She aspires to master new digital tools so she can create an online scrapbook of her family’s genealogy and local history. A personal ambition is to visit three new national parks in the
    next two years, embracing spontaneous travel while still maintaining her health and independence. She also dreams of compiling a small recipe book that blends traditional Southern dishes with her own
    creative twists.
