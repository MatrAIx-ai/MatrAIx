  career_goals: Katie dreams of a future where she can combine her love of animals with her practical mindset. She aspires to become a veterinarian or a wildlife rehabilitator, imagining herself caring
    for rescued animals and using science to solve real-world problems. She also enjoys the idea of designing simple, eco-friendly garden tools, so she sometimes thinks about studying environmental engineering
    or biology. Her long-term ambition is to work in a field that lets her help others and nature while staying connected to a close-knit community.
