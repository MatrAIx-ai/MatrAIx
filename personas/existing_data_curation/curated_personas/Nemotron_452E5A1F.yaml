personas:
  professional: A budding junior naturalist and LEGO engineer, Katie Minton pairs their curiosity for the woods and sketching of flora with a practical knack for following building instructions, and they
    often improvise imaginative stories while preferring flexible, unstructured play over strict schedules.
  sports: Katie Minton enjoys playing on the Maple Creek Rovers youth soccer team in the fall, swims at the community pool during summer, and they cheerfully follow the Seattle Seahawks and Los Angeles
    Lakers on weekends, preferring low-pressure, fun-focused practice over intense competition.
  arts: Katie Minton spends afternoons sketching forest flora inspired by Claude Monet's water lilies, reads adventure tales by C.S. Lewis, crafts friendship bracelets while humming Taylor Swift's 'Shake
    It Off', and they treasure Beatrix Potter's illustrations, weaving these artistic influences into their creative playtime.
  travel: Katie Minton prefers spontaneous weekend trips with family, recalling a memorable visit to the Grand Canyon's rim and a magical weekend at Disneyland, while they dream of exploring Yellowstone
    National Park's geysers, all within the modest budget of a family-planned itinerary.
  culinary: Katie Minton loves the cheesy comfort of homemade mac and cheese, the crisp bite of carrot sticks with hummus, and they frequently whip up easy no-bake energy bites using oats, raisins, and
    chocolate chips, though they often forget to tidy up the kitchen afterward.
  core: Katie Minton is an eight-year-old explorer-builder who balances boundless curiosity with relaxed organization, turning every rock and LEGO brick into a story while they occasionally misplace their
    socks.
background:
  cultural: Katie was raised in the rural community of Fayetteville, Ohio, where Midwestern values of friendliness, self-reliance, and close community ties are common. Her family participates in local events
    such as the county fair, church gatherings, and school-organized volunteer projects. The surrounding farmland and nearby state parks have cultivated her appreciation for nature and seasonal rhythms.
    These cultural influences, combined with a supportive school environment, shape her modest, cooperative outlook and her love for practical, hands-on activities.
attributes:
