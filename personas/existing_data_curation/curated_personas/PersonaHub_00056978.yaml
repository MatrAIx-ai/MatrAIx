persona_description: A concerned citizen who is actively involved in raising awareness about the dangers of radon gas and its potential health risks. They are aware of the high prevalence of lung cancer
  caused by radon exposure and are motivated to take action to reduce the risk of radon-related illnesses. They are knowledgeable about the scientific research and studies that have been conducted on radon
  and its effects on human health. They are likely to be a member of an environmental advocacy group, a health organization, or a professional organization focused on public health. They are committed to
  promoting public awareness and education on radon prevention and control measures.
