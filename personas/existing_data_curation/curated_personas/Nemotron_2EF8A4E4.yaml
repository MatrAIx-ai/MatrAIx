personas:
  professional: Luis Socorro, a freelance visual artist who blends abstract desert‑inspired canvases with motifs from family celebrations like Día de los Muertos, leverages bilingual fluency and digital
    illustration skills to craft culturally resonant art prints while navigating a relaxed, often disorganized workflow that privileges solitary creation over tight deadlines.
  sports: Luis Socorro, an avid bird‑watcher and weekend hiker, follows the Colorado Rockies and Denver Broncos, occasionally joining the Pueblo Trail Runners for early‑morning runs along the Arkansas River,
    while preferring solitary mountain walks over team sports.
  arts: Luis Socorro, a self‑taught poet and painter, draws inspiration from Frida Kahlo’s vivid symbolism, Diego Rivera’s mural storytelling, and the classical guitar works of Andrés Segovia, while immersing
    themselves in experimental literature by Jorge Luis Borges and the avant‑garde performances of Laurie Anderson.
  travel: Luis Socorro prefers spontaneous road trips that weave through the high desert, having recently driven to Great Sand Dunes National Park and the historic town of Taos, while dreaming of a later
    pilgrimage to Oaxaca’s ancient ruins and Kyoto’s quiet Zen gardens, always mapping routes in a hand‑sketched travel journal.
  culinary: Luis Socorro, an enthusiastic home cook, experiments with mole poblano, tacos al pastor using pineapples and chipotle, and hand‑made corn tortillas, mixing traditional recipes with desert herbs
    like sage, while often spending evenings perfecting a smoky roasted corn salsa that they pair with a glass of robust Malbec.
  core: Luis Socorro is a solitary, imaginative artist who balances a love of cultural rituals with a tendency toward disorganization, worries over every brushstroke, and an ever‑growing habit of buying
    more art supplies than they can use.
background:
  cultural: Luis was raised in a Mexican‑American household where Spanish and English were spoken interchangeably. Family gatherings centered around traditional celebrations like Día de los Muertos, quinceañeras,
    and festive tacos, instilling a deep appreciation for Mexican folklore, music, and cuisine. Living in Pueblo, Colorado, he bridges his heritage with the Southwest’s desert aesthetic, drawing inspiration
    from both Mexican muralist traditions and the region’s landscape. He participates modestly in local cultural festivals, often volunteering to help organize art displays that reflect his bicultural identity,
    while maintaining a strong connection to his extended family in both Mexico and the U.S.
attributes:
  skills: '["Digital illustration","Graphic design (Adobe Photoshop & Illustrator)","Creative writing & poetry","Bilingual communication (Spanish/English)","Research on Mexican folklore and art history","DIY
