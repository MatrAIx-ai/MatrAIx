  hobbies: '["Abstract painting","Sketching and notebook journaling","Creative writing & poetry","Reading experimental literature & philosophy","Bird‑watching and nature photography","Classical guitar playing","Cooking
    traditional Mexican cuisine","Meditative walking/hiking","Collecting vintage Mexican folk art books"]'
  career_goals: Luis aspires to build a sustainable freelance career that lets him create and sell abstract paintings and culturally infused art prints online, while publishing a collection of poems that
    intertwine Mexican mythology with contemporary themes. He hopes to secure occasional commissions for community murals or cultural projects in Pueblo, allowing him to contribute his artistic vision without
    sacrificing his need for flexible, solitary work. Over the next few years he aims to complete his first published illustrated book and establish a modest online boutique that showcases his handcrafted
    pieces, providing both creative fulfillment and financial stability.
