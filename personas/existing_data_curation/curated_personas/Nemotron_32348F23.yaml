  hobbies: '[''Gardening'', ''Quilting'', ''Church choir singing'', ''Swing‑dance classes'', ''Reading African‑American literature'', ''Volunteer work at food pantry'', ''Genealogy research'', ''Attending
    community festivals'', ''Cooking soul‑food for gatherings'']'
  career_goals: Although retired from formal employment, Tita aims to deepen her volunteer leadership at the local community center by coordinating intergenerational mentorship programs and hosting cooking
    workshops that celebrate African‑American culinary traditions. She aspires to launch a modest home‑based catering service focused on soul‑food for church events and neighborhood celebrations, while
    also advocating for improved senior services and accessible health resources in East Saint Louis.
