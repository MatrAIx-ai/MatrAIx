personas:
  professional: A seasoned community organizer, 66‑year‑old Tita Davis leverages their grant‑writing, budgeting, and conflict‑mediation expertise to structure intergenerational mentorship programs at the
    local center, balancing reliability with a warm, sociable presence.
  sports: An enthusiastic low‑impact athlete, 66‑year‑old Tita Davis participates in weekly senior walking groups along the Mississippi River trail, enjoys swing‑dance classes for cardio, and cheerfully
    roots for the St. Louis Cardinals and the St. Louis Blues, seeing sports as a social anchor.
  arts: A passionate creative, 66‑year‑old Tita Davis spends afternoons quilting in a circle, sings gospel harmonies in the church choir, reads classics by James Baldwin and Toni Morrison alongside contemporary
    novels, and attends local theatre productions featuring performances by artists like Audra McDonald, letting artistic expression fuel their community spirit.
  travel: A deliberate traveler, 66‑year‑old Tita Davis prefers short road trips to historic river towns such as Natchez and Hannibal, plans itineraries around accessible accommodations and local culinary
    experiences, and dreams of a guided tour of the Smithsonian museums in Washington, D.C., balancing curiosity with health and budget considerations.
  culinary: An enthusiastic home chef, 66‑year‑old Tita Davis masterfully prepares comfort dishes like seasoned collard greens, slow‑cooked pork shoulder, and buttery cornbread, often incorporating fresh
    herbs from their garden, and they occasionally host pop‑up tasting events at the community center to showcase these family recipes.
  core: 66‑year‑old Tita Davis is a structured yet gregarious retiree who blends community leadership, garden‑to‑table cooking, and artistic hobbies into a life centered on service, creativity, and modest
    indulgences.
background:
  cultural: Tita is an African‑American woman whose family lineage traces back to the Great Migration from the Mississippi Delta to the industrial Midwest. Raised in East Saint Louis, she grew up immersed
    in the city’s rich gospel music heritage, church community life, and strong neighborhood ties. Her cultural identity is shaped by the resilience and solidarity of the Black community in St. Clair County,
    the traditions of soul‑food cooking, storytelling, and a commitment to civil‑rights activism that has been passed down through generations. These influences inform her values of compassion, cooperation,
    and dedication to uplifting others.
attributes:
  skills: '[''Community outreach'', ''Grant writing (basic)'', ''Event coordination'', ''Budget management'', ''Conflict mediation'', ''First‑aid certification'', ''Caregiving'', ''Culinary arts (soul‑food
