persona_description: A neuroscientist who specializes in studying the brain circuits that control the temporal structure of behavior, specifically focusing on the neural mechanisms underlying the timing
  of complex learned behaviors in songbirds. His research interests include recording from neural circuits, manipulating them with temperature, and observing the effect on song timing. He has found that
  cortical circuits generate a diversity of dynamics capable of supporting a wide range of behaviors, including the generation of random patterns of activity that drive the vocalizations of young birds
  and a highly stereotyped sequence of bursts that controls precisely-timed vocal gestures of adult song. He has also found that this sequence results from the successive differentiation of a simple rhythmic
  juvenile motor program.
