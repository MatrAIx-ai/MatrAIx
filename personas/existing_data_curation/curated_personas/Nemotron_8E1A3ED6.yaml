personas:
  professional: Sherry Livings, a retail operations specialist with a business degree, balances their curiosity for data with a relaxed yet meticulous approach to POS transactions and inventory audits,
    aiming to transition from cashier to shift supervisor and eventually a data-driven business analyst in the retail sector.
  sports: Sherry Livings, an avid solo exerciser, supports the Chicago White Sox in baseball season and the Chicago Bears in football, while they maintain a membership at a local yoga studio for twice-weekly
    classes and prefer quiet weekend walks through the city’s architecture to high-intensity team sports.
  arts: Sherry Livings, an indie-folk enthusiast, fills their playlists with Sufjan Stevens, Fleet Foxes, and Phoebe Bridgers while curating a personal photography blog that highlights Chicago’s historic
    buildings, and they occasionally attend intimate acoustic performances at venues like Lincoln Hall.
  travel: Sherry Livings, a planner who values calm exploration, embarks on solo trips to architecture-rich destinations such as Kyoto and Prague, balances these with budget-friendly weekend drives to Lake
    Michigan towns, and they always carry a lightweight journal to capture observations.
  culinary: Sherry Livings, a home chef who finds relaxation in cooking, experiments with dishes like miso-glazed salmon, roasted beet and quinoa salad, and homemade sourdough, sourcing fresh produce from
    the Chicago Green City Market and they favor ingredients such as rosemary, smoked paprika, and fresh basil.
  core: Sherry Livings, the curiosity-driven yet laid-back retail analyst in training, channels a love of solitary puzzle-solving, architecture photography, and indie folk into a disciplined yet flexible
    life rhythm, while they occasionally forget to file receipts but never miss a yoga session.
background:
  cultural: Sherry grew up in a middle‑class white family in the suburbs of Chicago with German‑Irish roots. Raised in the Midwest, she was taught the values of hard work, modesty, and practicality that
    are characteristic of the region. Her parents emphasized education, leading her to pursue a business degree at a state university. Living in Chicago has exposed her to the city’s cultural diversity,
    influencing her palate for different cuisines and her appreciation for the arts, though she prefers quieter settings. Family traditions such as Thanksgiving gatherings and holiday celebrations remain
    important to her, providing a sense of community without demanding extensive social interaction. This blend of Midwestern upbringing and urban exposure shapes her pragmatic outlook while nurturing an
    open‑minded curiosity.
