  hobbies: '[''Reading'', ''Journaling'', ''Photography'', ''Cooking'', ''Puzzle solving'', ''Yoga'', ''Urban walking'', ''Listening to indie folk music'', ''Online learning'']'
  career_goals: Sherry aims to leverage her business education and hands‑on retail experience to move into a supervisory or analytical role within the retail sector. In the short term, she plans to become
    a shift supervisor, gaining leadership experience and additional training in staff scheduling and loss prevention. She also intends to earn a certification in retail management or business analytics
    to deepen her analytical capabilities. Over the next five years, she hopes to transition to a back‑office business analyst position where she can work largely independently, analyzing sales trends,
    inventory turnover, and profitability metrics. Ultimately, she aspires to launch an online boutique that blends her interest in e‑commerce with her practical business skills, allowing her to work from
    home and maintain the flexibility she values.
