  hobbies: '[''Cooking (Tex-Mex cuisine)'', ''Yoga'', ''Line dancing'', ''Mystery-novel book club'', ''Volunteering at food bank'', ''Reading historical fiction'', ''Road trips to Hill Country'', ''Gardening'']'
  career_goals: Cassandra aims to progress from first-line supervisor to store manager within the next two years, eventually becoming a district manager overseeing multiple stores across Texas. She plans
    to leverage her business education to drive sales growth, enhance employee engagement, and implement technology-enabled inventory systems. Long-term, she is interested in pursuing an MBA to transition
    into corporate retail operations or open her own boutique specializing in sustainable fashion.
