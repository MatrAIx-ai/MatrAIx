  career_goals: Lenise dreams of merging her love for art and technology in a future career. She envisions becoming a visual artist who creates original comics and illustrations, while also designing interactive
    experiences such as video games or educational apps. Fascinated by space, she imagines a path that could involve astronaut training or science communication, sharing her curiosity with others. Ultimately,
    she aspires to turn her imaginative ideas into tangible creations that inspire peers and be recognized for innovative, boundary‑pushing work.
