personas:
  professional: Sandra Brunson, a budding sustainability coordinator in training, blends her event‑planning knack, basic web design skills, and sociological research abilities to help local nonprofits launch
    eco‑friendly programs, balancing curiosity with practical business sense while assertively guiding volunteer teams.
  sports: Sandra Brunson hits the Shenandoah Trail and Powhatan’s Blue Ridge foothills for weekend hikes, participates in a local running group that does 5K charity races, and cheers on the Virginia Cavaliers
    football team on Saturdays while occasionally joining a pick‑up volleyball game at the community center.
  arts: Sandra Brunson spends evenings at the small acoustic venue listening to Brandi Carlile covers by local troubadours, flips through historical fiction novels by Southern‑flavored authors, and sifts
    through photography books by Ansel Adams for inspiration in her own nature shots, while crocheting scarves to the rhythm of folk playlists.
  travel: Sandra Brunson plans weekend road trips to Shenandoah National Park and the Blue Ridge Parkway, longs to explore Asheville’s farm‑to‑table scene and the historic streets of Charleston, and balances
    her travel budget by staying in modest Airbnbs and using student discounts for train tickets.
  culinary: Sandra Brunson whips up farm‑to‑table meals using fresh market finds, turning collard greens into a spicy braised side, perfecting her crispy fried chicken crust, and indulging in homemade peach
    cobbler, while she often forgets to set a timer and ends up slightly over‑roasting her cornbread.
  core: Sandra Brunson balances Southern hospitality with a budding environmental activism, blending practical business sense, a love for nature photography, and a habit of over‑cooking cornbread into a
    uniquely grounded yet curious outlook on life.
background:
  cultural: Sandra grew up in a middle‑class white family in Powhatan, Virginia, with ancestry tracing back to English and Irish settlers in the region. Her upbringing reflects Southern traditions such
    as hospitality, community gatherings, and regular participation in a local Methodist congregation, where church events and charity drives are central to family life. Traditional Southern cuisine—fried
    chicken, collard greens, and homemade pies—features prominently at family meals and holiday celebrations. Attending community college exposed her to a more diverse student body, fostering an appreciation
    for cultural inclusion and prompting her to explore perspectives beyond her immediate environment. This blend of deep local roots, respect for communal values, and emerging openness to broader cultural
    ideas shapes her practical yet curious worldview.
