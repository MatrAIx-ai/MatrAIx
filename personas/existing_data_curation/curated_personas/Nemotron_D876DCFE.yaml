  hobbies: '[''Hiking'', ''Nature photography'', ''Reading historical fiction'', ''Cooking farm‑to‑table meals'', ''Volunteering at community center (computer tutoring)'', ''Crocheting'', ''Attending live
    acoustic music events'', ''Journaling'']'
  career_goals: Sandra aims to complete her associate degree and transfer to a four‑year university, majoring in Business Administration with a minor in Environmental Studies. In the short term, she seeks
    an internship with a regional environmental nonprofit to gain hands‑on experience in program coordination and sustainability initiatives. Her long‑term ambition is to become a sustainability coordinator
    for a nonprofit focused on community‑based conservation, eventually leveraging that expertise to launch her own eco‑friendly agritourism venture that combines local agriculture, education, and tourism.
    She also hopes to develop leadership skills through campus clubs and community service, positioning herself as a bridge between practical business solutions and environmental stewardship.
