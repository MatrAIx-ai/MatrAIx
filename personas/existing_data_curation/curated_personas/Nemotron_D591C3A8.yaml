  career_goals: Marcel aims to work in a career that blends his love for structure, technology, and quiet focus. He dreams of becoming a software developer or robotics engineer, creating programs and machines
    that solve real‑world problems. He is also interested in data analysis, where he can organize information and uncover patterns. Ultimately, he wants a role that lets him work behind the scenes, contribute
    reliable solutions, and still have time for personal projects.
