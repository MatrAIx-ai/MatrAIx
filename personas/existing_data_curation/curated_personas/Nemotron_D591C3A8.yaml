personas:
  professional: Marcel Fernandez is an aspiring junior engineer who channels his love for structure and quiet focus into building intricate LEGO models and designing detailed Minecraft landscapes, treating
    each project like a miniature blueprint that they methodically plan and execute.
  sports: Marcel Fernandez enjoys watching the Los Angeles Dodgers and the Dallas Cowboys on television, while they quietly train with the community youth swimming club twice a week, preferring the solitary
    rhythm of laps over noisy team sports, and they occasionally play FIFA on the family console.
  arts: 'Marcel Fernandez practices piano with a focus on precision, favoring pieces like Beethoven’s “Moonlight Sonata” and Mozart’s “Rondo in A‑minor”, and spends evenings reading sci‑fi classics by Isaac
    Asimov and Arthur C. Clarke, while their favorite movie soundtrack is the orchestral score of “Star Wars: A New Hope”.'
  travel: Marcel Fernandez loves meticulously planned trips, having visited the Grand Canyon and the Smithsonian National Air and Space Museum, and they dream of attending the LEGO Expo in Berlin and exploring
    the Kennedy Space Center, always drafting a detailed itinerary before departure.
  culinary: Marcel Fernandez helps the family prepare traditional dishes such as tamales and mole, carefully layering masa and pork for tamales and simmering dried chilies, chocolate, and nuts for mole,
    and they enjoy experimenting with pizza topped with mozzarella, oregano, and sliced pepperoni on weekends.
  core: Marcel Fernandez is a methodical 11‑year‑old who balances a love for solitary puzzles and creative building with a quiet worry about perfection in every pursuit.
background:
  cultural: Marcel comes from a Mexican‑American family that maintains strong ties to its cultural roots while living in Indianapolis. Spanish is spoken at home, and he celebrates traditions such as Día
    de los Muertos, Cinco de Mayo, and family gatherings centered around Mexican cuisine. His parents emphasise respect, community, and the value of education, encouraging him to excel academically while
    staying connected to his heritage. He participates in a local Hispanic cultural program that offers Spanish‑language tutoring and folkloric dance workshops. At the same time, he navigates the Midwestern
    environment through school, community events, and local friendships, blending Mexican customs with American influences.
