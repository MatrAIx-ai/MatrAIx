  hobbies: '[''Visiting art galleries'', ''Sketching and painting'', ''Playing acoustic guitar'', ''Singing in a seniors choir'', ''Gardening'', ''Fishing'', ''Woodworking'', ''Card games'', ''Cooking'',
    ''Volunteering at the county fair'']'
  career_goals: Although nearing the traditional retirement age, Mark aims to stay active and purposeful. He hopes to transition to a part-time role that blends his retail expertise with his passion for
    art, such as assisting in a local museum gift shop or curating community art displays. He also wants to mentor younger store employees, sharing his practical knowledge and encouraging creative thinking.
    In his personal life, Mark aspires to travel to at least three major art museums in the next five years, maintain his health through regular activity, and perhaps launch a small side venture selling
    hand-crafted wooden picture frames.
