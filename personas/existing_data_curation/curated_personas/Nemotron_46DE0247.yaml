personas:
  professional: Cecilia Bak is a three‑year‑old budding builder who delights in stacking wooden blocks into intricate towers, merging a boundless curiosity for novel designs with a practical eye for sturdy
    foundations, while their talkative, sociable nature turns playtime into lively presentations to an eager audience of peers.
  sports: Cecilia Bak enthusiastically participates in preschool soccer with the Little Tigers Club, sprinkles daily energy into toddler gymnastics at the Tiny Gymnasium, and proudly cheers for the local
    minor league baseball team, the City Cubs, blending a love for competitive play with a relaxed approach to scheduled practice.
  arts: Cecilia Bak immerses themselves in the world of Disney classics, especially humming ‘Let It Go’ by Idina Menzel, loves drawing bright pictures of Mickey Mouse and Sesame Street characters, and delights
    in listening to child‑friendly orchestral versions of Beethoven’s 'Für Elise' while proudly showcasing their artwork at family gatherings.
  travel: Cecilia Bak enjoys family trips to the nearby zoo, weekend beach outings at Sunny Cove, and dreams of exploring the magic of Disneyland in Anaheim, favoring spontaneous, play‑focused itineraries
    over strict schedules and delighting in collecting postcards from each destination.
  culinary: Cecilia Bak prefers the comforting taste of cheesy macaroni, crunchy chicken nuggets, and strawberry‑yogurt parfaits, loves helping stir batter for pancake breakfasts, and often insists on sprinkling
    extra cinnamon on oatmeal, showing a playful yet practical approach to flavors and kitchen participation.
  core: Cecilia Bak is a talkative, curious three‑year‑old who balances practical play with imaginative exploration, thrives on social attention, and approaches every activity with a cheeky competitive
    edge.
background:
  cultural: Cecilia is growing up in the suburban community of Clarks Summit, Pennsylvania, within a white, middle‑class family that participates in typical American traditions such as Halloween costume
