  hobbies: '[''Home gardening'', ''Botanical sketching'', ''Nature photography'', ''Reading art history'', ''Visiting museums'', ''Cooking Indian cuisine'', ''Listening to classical Indian music'', ''Meditation'',
    ''Yoga'']'
  career_goals: Mitul aims to earn a professional certification in landscape architecture and transition into a senior operations manager role within his company, overseeing multiple sites across New England.
    He is also planning to launch a boutique consultancy that specializes in sustainable, art‑infused garden designs for residential and small‑scale public spaces. A long‑term ambition is to mentor younger
    landscaping workers, sharing both the practical trade skills and his appreciation for artistic elements in design, eventually publishing a guide that blends horticulture with visual art principles.
