personas:
  professional: Mitul Swamy, a seasoned landscape operations manager with a methodical yet flexible approach, melds horticultural rigor and artistic curiosity to craft serene garden spaces, while strategically
    pursuing a landscape architecture certification and planning a boutique consultancy that will mentor younger workers and blend sustainability with visual art.
  sports: Mitul Swamy maintains fitness through low‑impact activities, joining the Boston Hiking Club for spring and fall treks, snowshoeing on New England trails in winter, and cheering on the Red Sox
    and Patriots from home, preferring solitary movement over crowded gyms.
  arts: Mitul Swamy immerses themselves in artistic pursuits by sketching botanical studies inspired by Claude Monet and Georgia O'Keeffe, photographing seasonal arboretum changes in the style of Ansel
    Adams, and regularly attending exhibitions at the Institute of Contemporary Art and the Museum of Fine Arts, drawing design ideas for their landscape projects.
  travel: Mitul Swamy favors contemplative travel, meticulously planning visits to garden‑rich locales such as Acadia National Park, Kyoto’s historic gardens, the English Cotswolds, and the Tuscan countryside,
    where they combine sketching with slow‑paced exploration while balancing expenses to fund their boutique consultancy launch.
  culinary: Mitul Swamy delights in cooking fragrant spice‑laden dishes like Chana Masala, vegetable Biryani, and mint‑coriander dosa, often using fresh herbs from their garden to enhance flavors, yet occasionally
    over‑seasones in the enthusiasm of recreating beloved family recipes.
  core: Mitul Swamy is a solitary horticultural artist who blends precise garden design with quiet contemplation, sometimes over‑watering beloved roses while day‑dreaming about launching a sustainable design
    consultancy.
background:
  cultural: Mitul is of Indian South Asian heritage, raised in a household that blends Hindu cultural traditions with the values of his American community in Connecticut. He celebrates festivals such as
    Diwali, Holi, and Navratri with his family, and occasionally incorporates Indian motifs—like geometric patterns and vibrant color palettes—into his landscape designs. Fluent in English and conversational
    in Hindi, he values respect for elders, community harmony, and hospitality, which shape his collaborative yet considerate approach at work and in personal relationships.
attributes:
  skills: '[''Team supervision'', ''Crew scheduling'', ''Safety compliance'', ''Horticultural knowledge'', ''Plant identification'', ''Soil preparation'', ''Irrigation system design'', ''Landscape design'',
