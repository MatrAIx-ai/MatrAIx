personas:
  professional: Lorena Triana, a seasoned data analytics manager turned strategic leader, leverages deep expertise in quantitative modeling, SAP and Tableau, and PMP‑certified project management to drive
    systematic process improvements and inclusive technology initiatives, all while championing bilingual communication that unites diverse teams under clear, methodical planning.
  sports: Lorena Triana, an avid outdoors enthusiast, laces up for weekly hikes along the Palisades cliffs, participates in a local senior walking club, passionately follows the New York Giants, New York
    Yankees, and New York Knicks, and joins a community salsa dance team that doubles as cardio exercise.
  arts: Lorena Triana, a vibrant participant in community cultural festivals, revels in the rhythmic sounds of Celia Cruz and Shakira, the classical strings of Yo‑Yo Ma, and the contemporary beats of Carlos
    Vives, while regularly attending local theater productions of "A Raisin in the Sun" and curating a personal collection of folk music recordings that echo the celebrations of Carnaval and Día de los
    Difuntos.
  travel: Lorena Triana, a detail‑oriented traveler, prefers meticulously planned itineraries that blend historic exploration and culinary discovery, having recently visited the historic streets of Savannah,
    the vineyards of Napa Valley, the art museums of Florence, and a guided tour of the Galápagos archipelago; they balance a love for comfortable accommodations with the desire to explore new landscapes,
    always booking well in advance to secure accessible travel for their garden‑grown fresh produce on the road.
  culinary: Lorena Triana, a skilled home chef with a flair for coastal flavors, expertly prepares ceviche with fresh river fish, tangy encebollado brimming with yuca and cilantro, and aromatic lomo saltado,
    while also mastering a classic French ratatouille to showcase their garden’s tomatoes and zucchini; they relish pairing meals with locally sourced passion‑fruit juice and a crisp Riesling, and regularly
    host Saturday dinner gatherings where the table overflows with vibrant, home‑grown salads and spicy sauces.
  core: Lorena Triana, a methodical leader with a love for lively cuisine and community dance, balances structured retirement planning with spontaneous garden harvests, and despite a tendency to over‑schedule,
    they always find time for a hike or a salsa class.
background:
  cultural: 'Lorena was born in Ecuador and moved to the United States as a young adult. She maintains a strong connection to her Ecuadorian roots through language, cuisine, and celebrations like Carnaval
    and Día de los Difuntos, while fully embracing the suburban lifestyle of Mahwah, NJ. Her bicultural experience shapes her worldview: she values family cohesion and community solidarity from her heritage,
    combined with the American emphasis on individual initiative and structured planning. This dual perspective informs both her professional approach—bringing inclusive, organized leadership—and her personal
    life, where she balances traditional Ecuadorian customs with participation in local American community events.'
attributes:
  skills: '[''Data analysis'', ''Quantitative modeling'', ''Systems optimization'', ''Strategic planning'', ''Project management'', ''Budget oversight'', ''Process improvement'', ''Risk assessment'', ''Bilingual
    communication (Spanish & English)'', ''Team leadership'', ''Mentorship'', ''Enterprise software (SAP, Tableau, Excel)'']'
  hobbies: '[''Salsa dancing'', ''Folklórico dance'', ''Community cultural festivals'', ''Cooking Ecuadorian cuisine'', ''Gardening'', ''Hiking'', ''Reading historical biographies'', ''Book club'', ''STEM
    mentorship for youth'']'
  career_goals: Lorena aims to transition from her current managerial role into an executive position where she can influence organizational strategy on a broader scale, particularly in driving sustainable
    and inclusive technology initiatives. She is passionate about increasing representation of Latinx professionals in STEM, so she plans to spearhead mentorship programs and partner with local schools
    to promote STEM education for underrepresented youth. Additionally, she hopes to consult on process improvement projects for nonprofit organizations, leveraging her structured approach to create measurable
    impact.
