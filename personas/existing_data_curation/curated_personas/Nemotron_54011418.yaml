    spontaneous pop‑up events"]'
  career_goals: Seeking to expand her impact beyond a single store, Sydney aims to move into a district‑manager role that emphasizes employee well‑being and community integration. Over the next five years
    she plans to design and implement training programs that prioritize empathy, teamwork, and flexible work practices. She is also exploring launching a boutique consultancy that helps independent retailers
    infuse local art and culture into their storefronts, boosting both sales and community connections. Personally, she intends to earn a professional certification in retail management to strengthen her
    organizational skills and reduce stress around deadlines.
