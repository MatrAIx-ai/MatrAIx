  career_goals: Jeanne aims to re‑enter the workforce in a part‑time or volunteer capacity that blends her love of art with her organizational strengths. She is exploring a docent position at the nearby
    Newark Museum or a role as a coordinator for community arts workshops at the Bloomfield Public Library. To support this, she plans to complete a certificate in arts administration at a local community
    college. Long‑term, she hopes to launch a small online blog and video series that reviews regional art exhibitions and offers DIY art projects, ultimately positioning herself as a trusted voice for
    arts enthusiasts in her community while maintaining a flexible schedule that accommodates her health and stress‑management needs.
