  hobbies: '[''Cooking traditional Mexican cuisine'', ''Fishing at local lakes'', ''Reading historical non-fiction'', ''Gardening (tomatoes, peppers)'', ''Model ship kit building'', ''Listening to regional
    Mexican music'', ''Attending small community cultural events'', ''Walking his dog in neighborhood parks'']'
  career_goals: Fidel seeks a steady upward path within the logistics field that respects his preference for routine and stability. Over the next few years he aims to obtain a Certified Logistics Associate
    credential and pursue an associate degree in supply chain management, positioning himself for a lead inventory supervisor or shift‑lead role. He values the opportunity to mentor newer clerks, reinforce
    safety and compliance standards, and streamline processes to reduce errors. While ambitious, his goals remain realistic, focusing on incremental promotions that preserve his work‑life balance and provide
    increased security for his family.
