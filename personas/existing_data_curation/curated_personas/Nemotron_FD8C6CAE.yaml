personas:
  professional: Domenica Pena, a 37‑year‑old bilingual special education teacher and emerging leader in Mayagüez, blends her energetic public speaking and collaborative spirit with a knack for data‑driven
    assessment to design individualized education programs that marry evidence‑based practices with culturally resonant adaptations, ensuring each student feels both supported and celebrated.
  sports: Domenica Pena stays active by salsa dancing at local festivals, hiking the hills of western Puerto Rico on weekends, and cheering for the Indios de Mayagüez baseball team while occasionally playing
    in the municipal adult soccer league.
  arts: Domenica Pena captures everyday moments through street photography, draws inspiration from vibrant local murals, and unwinds to the sounds of salsa legends like Celia Cruz and contemporary Grammy‑winning
    artists such as Bad Bunny, while frequently attending performances at the Teatro Ideal.
  travel: Domenica Pena enjoys weekend excursions to the historic streets of Old San Juan, plans annual trips to the rainforest of El Yunque, and dreams of exploring the bustling food markets of Oaxaca,
    Mexico, favoring itineraries that weave cultural immersion with relaxed leisure.
  culinary: Domenica Pena, an avid home chef, perfects traditional dishes like arroz con gandules, pasteles, and mofongo using fresh herbs from her tropical garden—cilantro, recao, and mint—and often experiments
    with fusion twists, such as adding a soy‑ginger glaze to elevate classic flavors.
  core: Domenica Pena is a charismatic, community‑focused educator who fuses cultural heritage, creative problem‑solving, and boundless energy into her teaching, advocacy, and daily life.
background:
  cultural: Domenica was born and raised in San Germán, a historic town in the Mayagüez Municipio, and her life is deeply rooted in Puerto Rican culture. She is bilingual, fluent in both Spanish and English,
    and embraces the island's rich traditions— from the lively rhythms of plena and bomba to the communal spirit of family gatherings and religious celebrations. Her culinary heritage, love for the island’s
    natural landscapes, and participation in local festivals reflect a strong sense of community and cultural pride. These influences shape her compassionate, collaborative approach to education and her
    dedication to fostering harmony and inclusion in both her classroom and the broader community.
attributes:
  skills: '["IEP development and implementation", "Bilingual instruction (Spanish/English)", "Differentiated instruction", "Behavioral intervention and positive reinforcement", "Assistive technology integration",
