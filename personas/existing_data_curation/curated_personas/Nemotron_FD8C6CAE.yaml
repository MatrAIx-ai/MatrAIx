    new teachers", "Community outreach coordination"]'
  hobbies: '["Salsa dancing", "Cooking traditional Puerto Rican dishes", "Volunteering at community centers", "Reading contemporary fiction", "Hiking in the hills of western Puerto Rico", "Gardening", "Photography",
    "Participating in local festivals", "Practicing yoga", "Exploring educational technology", "Traveling to learn inclusive education models"]'
  career_goals: Domenica aims to earn a master's degree in special education with a focus on inclusive leadership, positioning herself to become a Special Education Coordinator for the Mayagüez school district.
    She aspires to design district‑wide inclusive curricula, expand support services for students with autism and other disabilities, and launch an after‑school enrichment program that blends academic support
    with cultural activities. Long‑term, she hopes to become a certified autism specialist, present her innovative classroom strategies at national conferences, and co‑author a bilingual resource guide
    for families navigating special education in Puerto Rico.
