personas:
  professional: Tia Marlow, a retired elementary school teacher with three decades of curriculum design and literacy development expertise, now mentors new educators, tutors adult learners, and leads community
    reading circles, using their practical curiosity and relaxed, flexible approach to shape inclusive learning experiences.
  sports: Tia Marlow enjoys low‑impact morning walks with the town senior walking club, tends a gentle community garden for light exercise, follows the Carolina Panthers on football Sundays, tracks the
    Columbia Gamecocks basketball season, and volunteers as a scorekeeper for Jasper County high‑school baseball games, reflecting a preference for relaxed, community‑oriented activity over competitive
    sports.
  arts: Tia Marlow finds solace in quilting patterns inspired by Faith Ringgold, delights in listening to Ella Fitzgerald and the acoustic folk sounds of The Carter Family while knitting, attends occasional
    church choir performances featuring recordings of Mahalia Jackson, and cherishes reading biographies of educators such as Margaret Mead, allowing the arts to weave into their daily rhythm.
  travel: Tia Marlow prefers relaxed, short‑distance trips; she has enjoyed day trips to historic Savannah, Georgia, weekend stays in Charleston’s historic district, loves the fall foliage tour in the Blue
    Ridge Mountains, and hopes to someday visit the Smithsonian museums in Washington, D.C., all while traveling by car with a small circle of family and keeping itineraries flexible to accommodate garden
    duties.
  culinary: Tia Marlow is a proficient home cook who delights in preparing traditional Southern dishes such as shrimp and grits, collard greens seasoned with smoked ham hocks, and peach cobbler, frequently
    using fresh basil, thyme, mint, and locally sourced peaches and sweet corn from her garden, and while skilled, often forgets to defrost chicken in advance, leading to last‑minute improvisation.
  core: Tia Marlow is a gentle yet assertive 92‑year‑old educator‑turned‑gardener who blends curiosity with practicality, talks to her plants, occasionally misplaces her glasses, and never lets a missed
    deadline stop her from planting a new herb patch.
background:
  cultural: Tia grew up in a modest, close‑knit community in South Carolina during the 1930s and 1940s, shaped by the values of Southern hospitality, self‑reliance, and a strong emphasis on family and church
    life. Her upbringing blended a respect for tradition with a curiosity about the broader world, prompting her to pursue a graduate degree in education at a time when few women did. She taught through
    the tumultuous desegregation era, witnessing and supporting the integration of schools in Jasper County. Today, living in Okatie near the Savannah River, she cherishes the region’s natural beauty and
    the enduring sense of community while remaining open to new ideas and practices, reflecting the interplay of her cultural heritage and lifelong learning mindset.
