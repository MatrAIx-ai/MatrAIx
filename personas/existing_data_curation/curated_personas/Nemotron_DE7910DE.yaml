  career_goals: Even at 92, Tia aims to leave a lasting educational legacy in her community. She plans to compile a memoir that weaves together her experiences of teaching through the integration era and
    her observations of local cultural change. She hopes to establish a modest scholarship fund for Jasper County high‑school students pursuing careers in education. Tia also wishes to create a small heritage
    garden in Okatie where seniors and youth can collaborate, preserving both native plants and community stories. Her ambition is to continue mentoring emerging teachers and to document oral histories
    of long‑time residents for the county historical society.
