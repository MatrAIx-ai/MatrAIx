persona_description: A media literacy educator who is interested in teaching high school and college students about the construction of presidential campaigns through the use of historical media documents.
  The individual is passionate about critical thinking and ethical issues and seeks to engage students in an interactive, rigorous study of American democracy. They are knowledgeable about the impact of
  new technologies on campaign materials and have experience teaching in a K-12 classroom. They have a strong interest in the development of media literacy curricula and are familiar with the Center for
  Media Literacy/GPN Educational Media.
