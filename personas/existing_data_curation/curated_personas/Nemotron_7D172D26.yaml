personas:
  professional: Jennifer Sanders, a budding storyboard artist, blends her vivid imagination with meticulous sketching and collaborative set design in her school drama club, channeling her love for organization
    and flexibility into creating detailed visual narratives for student productions.
  sports: Jennifer Sanders enjoys casual jogging along the Lake Michigan shoreline, plays on her middle school’s co‑ed soccer team while cheering for the Chicago Fire, and participates in the local youth
    swimming club during summer months, balancing team spirit with personal fitness.
  arts: Jennifer Sanders channels her love for fantasy illustration into watercolor scenes inspired by Studio Ghibli and Hayao Miyazaki, sets her stop‑motion videos to the atmospheric sounds of The National
    and Tame Impala, and often incorporates the whimsical LEGO architecture of Nathan Sawaya into her set designs.
  travel: Jennifer Sanders prefers short, family‑focused road trips that blend nature and creativity, such as weekend getaways to Mackinac Island for its historic forts and shoreline sketches, while dreaming
    of a summer adventure to Edinburgh’s historic castles to fuel her fantasy storytelling.
  culinary: Jennifer Sanders gravitates toward vibrant, colorful meals, often preparing quick vegetable lasagna with mozzarella and basil after school, snacking on fresh watermelon slices collected from
    shoreside picnics, and indulging in homemade raspberry swirl ice cream topped with crushed pretzels.
  core: Jennifer Sanders is a whimsical teen storyteller whose imagination fuels meticulous art projects, yet they often sacrifice sleep to chase creative ideas, leading to occasional bouts of fatigue.
background:
  cultural: Jennifer grew up in Kenosha, Wisconsin, a city with a blend of German, Polish, and other European immigrant roots typical of the Midwest. Her family embraces Midwestern values of community,
    modesty, and hard work, attending local events such as the Kenosha Street Art Fair and volunteering at the public museum. The region’s proximity to Lake Michigan nurtures her love for nature, while
    the city’s vibrant arts scene—including the Kenosha Public Museum and community theater—fuels her artistic curiosity. Her upbringing in a largely white, middle‑class neighborhood provides exposure to
    the region's cultural history and a sense of communal harmony, influencing her cooperative personality and her desire to create inclusive, uplifting art.
attributes:
  skills: '[''Drawing'', ''Digital illustration'', ''Creative writing'', ''Basic coding (Scratch)'', ''Project organization'', ''Critical thinking'', ''Collaboration'', ''Public speaking'']'
