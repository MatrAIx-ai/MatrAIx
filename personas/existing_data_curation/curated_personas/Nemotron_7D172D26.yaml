    music'', ''School drama club'']'
  career_goals: She dreams of turning her love for imagination into a career in visual storytelling—perhaps as a concept artist or animator for video games and films. She also considers becoming a graphic
    designer or a museum educator who creates engaging exhibits for children. In the short term, she wants to attend a specialized arts high school, build a strong portfolio, and eventually study visual
    arts or media production at college. She hopes to use her skills to inspire other young creators and to make accessible, uplifting art experiences.
