  hobbies: '["Hiking", "Landscape photography", "Reading classic literature and philosophy", "Playing acoustic guitar", "Chess", "Volunteer financial‑literacy tutoring", "Cooking for family"]'
  career_goals: Kenneth aims to progress from senior financial analyst to portfolio manager within the next five years, eventually targeting a leadership role such as Director of Investment Strategy. He
    plans to obtain the CFA charter and deepen his expertise in ESG investing to align his work with both financial performance and social responsibility. While ambitious, he values work‑life balance, seeking
    a position that allows him to support his family and maintain his structured routine. He also hopes to mentor junior analysts and contribute to the development of a collaborative, data‑driven culture
    within his firm in Boise.
