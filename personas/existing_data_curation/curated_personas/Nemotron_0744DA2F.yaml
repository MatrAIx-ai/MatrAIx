personas:
  professional: Kenneth Stevens, a disciplined financial analyst in Boise, leverages his quantitative expertise and humanities‑trained communication skills to build rigorous financial models, conduct risk
    assessments, and champion ESG‑focused investment strategies while mentoring junior analysts and maintaining a structured, collaborative workflow.
  sports: Kenneth Stevens, a member of the Boise Hiking Club, spends weekends tackling the foothills, follows the Boise State Broncos football and Idaho Steelheads hockey teams, enjoys occasional ski trips
    to Sun Valley during winter, and incorporates a disciplined strength‑training routine at the local gym to complement his hiking endurance.
  arts: Kenneth Stevens, an avid acoustic‑guitar player, draws creative inspiration from folk legends like Bob Dylan and Leonard Cohen, curates black‑and‑white landscape photographs reminiscent of Ansel
    Adams, participates in a small book‑club that discusses classic authors such as Tolstoy and Kant, and attends the Boise Art Museum’s modern‑art exhibitions to recharge his aesthetic sensibilities.
  travel: Kenneth Stevens prefers meticulously planned, low‑key getaways that blend solitary nature immersion—such as a solo trek through Yellowstone’s geysers—with cultural stops like Kyoto’s temples,
    and, constrained by family commitments, reserves most long‑haul trips for yearly vacations while using weekend drives to explore local gems like Craters of the Moon.
  culinary: Kenneth Stevens enjoys cooking simple, nutrient‑dense meals like grilled trout with lemon‑dill sauce, roasted Idaho potatoes tossed with rosemary and garlic, and quinoa salads featuring cherry
    tomatoes and feta, while occasionally treating himself to a craft‑brew tasting at Boise’s downtown taprooms and savoring a perfectly brewed dark roast coffee.
  core: Kenneth Stevens is a methodical financial analyst who balances a structured work ethic with solitary hikes, acoustic‑guitar sessions, and a habit of over‑scheduling his day, often neglecting dental
    care while rewarding himself with premium coffee.
background:
  cultural: Kenneth comes from a middle‑class, White American background with ancestry rooted in Anglo‑Saxon and German traditions. Raised in the Pacific Northwest, he grew up valuing self‑reliance, modesty,
    and community involvement. His family celebrates traditional holidays such as Thanksgiving, Christmas, and Fourth of July gatherings, emphasizing togetherness and gratitude. Relocating to Boise, he
    embraces the region’s outdoor culture while maintaining a respect for the broader American cultural mosaic, often integrating his humanities education into a broader appreciation for diverse perspectives.
attributes:
  skills: '["Financial modeling", "Risk assessment", "Economic research", "Data analysis (Python)", "SQL database querying", "Microsoft Excel (advanced/VBA)", "Tableau visualization", "Report writing",
