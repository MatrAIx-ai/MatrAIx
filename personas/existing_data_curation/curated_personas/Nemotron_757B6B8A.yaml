personas:
  professional: Roderick Donovan, a budding young naturalist and aspiring science-fair competitor, harnesses their vivid imagination and love for building elaborate LEGO worlds into hands-on experiments
    and detailed sketches, preferring spontaneous tinkering to rigid planning.
  sports: Roderick Donovan, an enthusiastic member of the Boulder Mountaineering Club and a player on the local youth soccer team, treats fitness as a playful extension of their love for the Rockies, opting
    for weekend hikes, rock-climbing lessons, and cheering on the Colorado Rapids and Colorado Rockies with equal vigor.
  arts: Roderick Donovan, a dedicated participant in the school art club and regular attendee of the Boulder Arts Festival, brings fantastical creatures to life on sketch paper while listening to indie
    pop icons like Tame Impala, Mitski, and Clairo, letting music shape the mood of their creations.
  travel: Roderick Donovan, a spontaneous explorer who prefers packing a daypack over a rigid itinerary, spends weekends trekking in Rocky Mountain National Park, dreams of witnessing the towering cliffs
    of the Grand Canyon and the glowworms of New Zealand, and often asks their parents to schedule family trips around school breaks.
  culinary: Roderick Donovan, a budding kitchen experimenter, favors trail-mix snacks, builds homemade pepperoni pizza with extra cheese, whips up quick avocado toast for breakfast, and recently mastered
    a simple quinoa-and-black-bean burrito seasoned with cilantro and lime.
  core: Roderick Donovan, a ten-year-old dreamer, blends wild imagination with a relaxed, improvisational streak, turning hikes, sketches, and LEGO builds into adventures, even if they sometimes misplace
    homework or forget their helmet.
background:
  cultural: Roderick was raised in Boulder, Colorado, a city known for its outdoor recreation, progressive arts scene, and strong environmental values. His family, of Irish-American descent, encourages
    curiosity, frequent hikes in the Rockies, and participation in community events like the Boulder Arts Festival. While his cultural milieu is broadly mainstream American, it blends a love for nature,
    an appreciation for diverse creative expression, and a respect for scientific inquiry.
