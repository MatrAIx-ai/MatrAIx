  career_goals: He dreams of a future where he can blend art and technology—perhaps as a video-game designer, a comic-book creator, or a science communicator who makes complex ideas accessible. He also
    imagines exploring outer space as an astronaut or inventing eco-friendly gadgets that protect the Colorado wilderness. Flexibility and the chance to explore new ideas are central to his ambitions.
