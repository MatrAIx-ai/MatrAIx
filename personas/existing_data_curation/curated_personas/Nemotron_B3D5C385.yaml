  career_goals: John aims to transition from senior engineer to lead technical specialist within the next five years, focusing on renewable‑energy and IoT‑driven home‑automation projects. He plans to obtain
    his Professional Engineer (PE) license and acquire certifications in solar energy systems to strengthen his professional credibility. Mentoring junior engineers and fostering a collaborative team culture
    that values work‑life balance and emotional well‑being are also key priorities. Ultimately, he hopes to lead a multidisciplinary team delivering sustainable, cost‑effective power solutions for residential
    communities in Florida while maintaining a predictable schedule that reduces stress. In the long term, he envisions establishing his own consultancy to advise homeowners on energy‑efficient upgrades.
