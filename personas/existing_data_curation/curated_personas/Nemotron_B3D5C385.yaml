  hobbies: '[''DIY Electronics Projects'', ''Arduino/IoT Prototyping'', ''Home Automation Experiments'', ''Fishing'', ''Kayaking'', ''Yoga'', ''Meditation'', ''Vegetable Gardening'', ''Board Games with
