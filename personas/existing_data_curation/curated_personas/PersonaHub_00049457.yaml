persona_description: A scholar who specializes in the study of Hinduism and Sanskrit literature, particularly in the areas of mythology, epics, and the philosophy of Vaisya or agriculturist or trader. His
  research interests include the origin of the Vaisya caste, the allegorical interpretation of Puranic texts, and the role of androgynous early third root-race in the evolution of society. He is also interested
  in the Sufi mystic movement, particularly in the teachings of Abu Said and the Sufi sects in Persia. He is known for his expertise in astrology, medicine, and the esoteric doctrine of the ages.
