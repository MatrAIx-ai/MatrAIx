personas:
  professional: Michelle Causey is a versatile maintenance professional skilled in electrical, plumbing, and HVAC systems, and they apply a blend of curiosity and practicality to fast‑track diagnostics,
    mentor junior technicians, and champion green retrofits as they pursue a lead supervisor role and CMM certification.
  sports: Michelle Causey spends weekends hiking the Rockies, competes in a co‑ed softball league, rides with the Denver Mountain Biking Club, and proudly follows the Denver Broncos, Colorado Avalanche,
    and Colorado Rockies, treating each game as a communal rally after a day on the trails, and they celebrate each win by sharing a post‑game snack with teammates.
  arts: Michelle Causey enjoys salsa dancing to Marc Anthony, sways to John Denver at local outdoor concerts, supports Colorado Symphony performances, attends Native American drumming festivals, and curates
    board‑game nights featuring Settlers of Catan with friends, and they often invite newcomers to join the dance floor.
  travel: Michelle Causey prefers spontaneous road trips to nearby mountain escapes like Rocky Mountain National Park and Moab, while dreaming of a longer adventure to Patagonia, balancing a love of outdoor
    thrills with occasional family barbecues in the Midwest when work permits, and they sometimes impulse‑book campsites after a long week of maintenance work.
  culinary: Michelle Causey loves cooking grilled trout with lemon‑dill, tossing quinoa‑kale salads with locally sourced avocado, savoring Colorado green chili, and experimenting with craft‑beer pairings,
    though they sometimes over‑season dishes when excited about new flavor combos.
  core: Michelle Causey is a 40‑year‑old maintenance guru who blends hands‑on curiosity with community spirit, they tackle DIY projects with a dash of spontaneity, and keep life balanced between outdoor
    adventure, salsa rhythms, and sustainable living.
background:
  cultural: Michelle grew up in a small Midwestern town in a middle‑class white family that emphasized hard work, self‑reliance, and community involvement. Relocating to Denver in her mid‑twenties exposed
    her to the West’s outdoor‑oriented and environmentally conscious lifestyle. While she celebrates traditional American holidays and family barbecues, she also actively participates in Denver’s diverse
    cultural scene, supporting local Native American heritage events and inclusive community initiatives. Her upbringing instilled a respectful, cooperative attitude that informs both her workplace collaboration
    and her engagement with the city’s multicultural fabric.
attributes:
