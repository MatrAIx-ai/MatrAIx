  hobbies: '[''Hiking and mountain biking'', ''Community garden volunteer'', ''DIY home improvement projects'', ''Co‑ed softball league'', ''Salsa dancing'', ''Coffee shop meetups with friends'', ''Volunteering
    at animal shelters'', ''Attending craft fairs'', ''Board game nights'', ''Exploring smart‑home technology'']'
  career_goals: Michelle aims to advance to a lead maintenance supervisor role within the next few years, securing certifications such as the Certified Maintenance Manager (CMM) and specialized HVAC credentials.
    She is eager to integrate green‑building practices into her work, overseeing energy‑efficiency upgrades and smart‑system installations across facilities. Long‑term, she envisions mentoring a team of
    technicians and possibly launching a small consultancy that helps local businesses adopt sustainable maintenance solutions while maintaining her flexible, hands‑on approach to problem‑solving.
