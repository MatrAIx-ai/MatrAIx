persona_description: A music historian and curator of the Civic Didactic Museum of Medieval and Renaissance musical instruments, with a specialization in the reconstruction and study of musical instruments
  from the eighth century AD to the end of the sixteenth century. This individual is responsible for curating and preserving the collection, as well as educating visitors on the history and evolution of
  musical instruments. They have a deep understanding of the iconography and historical context of the instruments, and are skilled in the reconstruction of instruments based on historical sources.
