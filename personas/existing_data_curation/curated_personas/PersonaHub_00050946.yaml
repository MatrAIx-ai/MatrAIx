persona_description: A viticulturist and viticulturalist with expertise in grape and wine production, particularly in the Northeast Ohio region. They are involved in conducting research on the evaluation
  of new chemicals and control methods for grape diseases, native and introduced insects, innovative approaches to weed control, and new cultivar trials and quality management. They are also involved in
  the planning and development of research projects with local growers and winery owners, and host various outreach events, including the biennial Ohio Grape and Wine Field Day, the Winter Pruning School,
  and educational programs for students from kindergarten through college.
