personas:
  professional: Mary Reid, a teenage self‑taught visual artist and content creator, blends sketching, digital illustration, and experimental mixed‑media collage into short‑form TikTok and Instagram Reels,
    channeling a curiosity‑driven, spontaneous workflow that produces bold, emotionally charged concepts while they leverage a competitive edge and critical mindset to sharpen artistic arguments, even as
    meeting deadlines becomes a perpetual struggle.
  sports: Mary Reid, an avid competitor both online and on the court, streams high‑intensity Valorant matches while regularly joining pick‑up basketball games at Monroe Park, roots for the Virginia Cavaliers
    during college basketball season and the Richmond Kickers in the USL League One, participates in a weekend Belle Isle 5K running club for brief cardio bursts, and they treat physical exercise as a spontaneous
    release rather than a structured regimen.
  arts: Mary Reid, a passionate explorer of Richmond’s vibrant art scene, attends First Friday gallery walks, photographs the colorful street‑art murals along the Canal Walk, curates eclectic playlists
    featuring Bon Iver, Mitski, and The War on Drugs, draws inspiration from YouTube channels like Nerdwriter, Film Theory, and The Art Assignment, and they create experimental collage pieces that fuse
    found objects, digital illustration, and nods to modern artists such as James Turrell and Banksy, shaping a distinctive visual voice that fuels both their freelance commissions and short‑form social
    media content.
  travel: Mary Reid, a restless teen with a love for spontaneous road trips, has taken weekend drives to Asheville to capture Blue Ridge vistas, spent a summer exploring Bushwick’s indie galleries in New
    York City, daydreams of wandering Barcelona’s Gaudí architecture and Tokyo’s Akihabara gaming districts, and they plan future travel around art festivals while budgeting modestly through a travel‑savings
    jar and balancing family obligations.
  culinary: Mary Reid, a budding foodie with moderate cooking skills, frequently experiments with ramen bowls flavored by miso, soy‑ginger broth, and soft‑boiled eggs, enjoys crafting vegan tacos loaded
    with black beans, avocado, and cilantro, indulges in occasional midnight pizza slices topped with arugula and smoked mozzarella after gaming marathons, and they find artistic satisfaction in plating
    dishes as miniature collages, often using fresh basil, chipotle, and a pinch of matcha powder to add color and texture.
  core: Mary Reid, a highly curious yet emotionally volatile teenage artist, channels their competitive edge into bold mixed‑media creations, spontaneous freelancing, and late‑night gaming while they battle
    anxiety‑driven procrastination and impulsive spending.
background:
  cultural: Mary grew up in a middle‑class white family in Richmond, Virginia, where Southern hospitality and a strong sense of community intersect with a dynamic urban art culture. Her upbringing included
    public school attendance and participation in community youth programs that exposed her to the city’s historic architecture, Civil War heritage, and the contemporary street‑art movement along the Canal
    Walk. While her family’s traditions involve church gatherings, family barbecues, and seasonal festivals rooted in Southern customs, Mary’s personal interests draw her toward Richmond’s eclectic art
    festivals, indie music venues, and grassroots activist gatherings. This blend of traditional Southern roots and the city’s progressive artistic pulse informs her worldview and fuels her creative expression.
attributes:
  skills: '["Sketching and charcoal drawing", "Digital illustration (Procreate, Photoshop basic)", "Smartphone photography and editing", "Short‑form video editing (TikTok, Instagram Reels)", "Critical analysis
    of art and media", "Persuasive communication and debate", "Competitive gaming strategy"]'
  hobbies: '["Visiting local galleries and street murals", "Sketching outdoors in parks", "Mixed‑media collage with found objects", "Curating and listening to eclectic music playlists", "Watching film theory
    and design YouTube channels", "Streaming competitive video games", "Expressive journaling (writing and doodling)"]'
  career_goals: Mary aims to translate her artistic passion into a sustainable freelance career. She plans to build a portfolio of illustrations and mixed‑media pieces that can be sold as prints, commissions,
    and merchandise through platforms like Etsy and Redbubble. While pursuing a GED, she hopes to enroll in community‑college courses in graphic design or visual arts to formalise her skills. Long‑term,
    she dreams of securing a role as a concept artist for indie games or as an art director for a socially conscious brand, where her unconventional ideas and critical perspective can shape visual storytelling.
