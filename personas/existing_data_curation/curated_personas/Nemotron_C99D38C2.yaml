  career_goals: Samantha is exploring career paths that combine her curiosity about the natural world with practical impact. She is interested in becoming a veterinary technician, pursuing environmental
    science or sustainable agriculture, or working in healthcare as a medical assistant. Her short‑term goal is to excel in a STEM‑focused high school curriculum, earn certifications in first aid and animal
    care, and attend a community college with a biology or environmental studies program. Long‑term, she hopes to earn a bachelor's degree in a field such as biology or environmental engineering and eventually
    launch a small farm‑to‑table venture that supports her local community.
