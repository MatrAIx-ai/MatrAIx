persona_description: A historian and author who specializes in the study of political and social movements in the Middle East, with a particular focus on the Arab Spring and the struggle for democracy and
  justice in the region. Her research and writing explore the deep roots of liberal constitutionalism in the Middle East and the complex lineage of political idealism, reform, and violence that informs
  today's Middle East. Her work uncovers the fascinating stories of individuals who fought against poverty, tyranny, and foreign rule, and their memoirs, speeches, and letters chart the lineage of political
  idealism, reform, and violence that informs today's Middle East.
