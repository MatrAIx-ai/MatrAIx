personas:
  professional: An aspiring junior designer, Anh Tran channels a love for LEGO sets and detailed model kits into early engineering practice, applying routine-driven planning and competitive flair while
    they naturally take the lead in collaborative building sessions.
  sports: A dedicated youth soccer player, Anh Tran laces up for the Madison United Soccer Club, passionately roots for the Wisconsin Badgers football and the Milwaukee Brewers baseball teams, and they
    approach practice with a competitive edge, using structured drills and weekly goal charts to track improvement.
  arts: An enthusiastic performer, Anh Tran delights in singing pop hits by Taylor Swift, delivering jokes in school talent shows, flipping through Marvel comic books, and they immerse themselves in community
    dance routines that blend traditional folk songs with modern choreography.
  travel: For family vacations, Anh Tran has explored the Great Lakes shoreline in Chicago, the water parks of Wisconsin Dells, and the observation deck at Niagara Falls, and they dream of a future trip
    to Kyoto’s bamboo forest, preferring itineraries that balance structured tours with spontaneous playground time.
  culinary: A budding junior cook, Anh Tran assists their mother in rolling fresh spring rolls and assembling pho broth with rice noodles, fish sauce, and basil, and they relish the routine of chopping
    vegetables while proudly serving bánh mì sandwiches to friends at cultural gatherings.
  core: A pragmatic yet gregarious eight-year-old, Anh Tran thrives on routine, dominates group activities with a competitive spark, and they can’t resist a good joke or a perfectly aligned LEGO brick.
background:
  cultural: Anh’s family are Vietnamese immigrants who settled in Madison, Wisconsin, creating a bilingual household where both English and Vietnamese are spoken daily. She attends a weekend Vietnamese
    language school that teaches her traditional customs, Tet celebrations, and classic folk stories. The family regularly prepares home‑cooked dishes such as pho and bánh mì, and they observe cultural
    holidays, which reinforce values of respect for elders, education, and community responsibility. The multicultural environment of Madison allows Anh to interact with both her Vietnamese community and
    a broader American peer group, shaping a hybrid identity that values practicality, family expectations, and social engagement.
attributes:
  skills: '["Organizational and routine management", "Bilingual communication (English & Vietnamese)", "Public speaking and presentation", "Critical thinking (puzzles, problem solving)", "Competitive mindset
