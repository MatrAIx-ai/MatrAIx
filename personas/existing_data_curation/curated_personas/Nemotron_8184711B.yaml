  hobbies: '["Building LEGO sets", "Playing soccer", "Reading adventure books and comic strips", "Participating in school talent shows", "Singing Vietnamese folk songs", "Dancing in cultural performances",
    "Solving puzzles and playing chess", "Helping prepare Vietnamese dishes (e.g., spring rolls)"]'
  career_goals: Anh dreams of becoming a pediatric doctor because she wants a practical, stable career that helps others, especially children. She also likes the idea of leading health initiatives in her
    community and envisions herself winning science fairs and earning top grades. In the short term, she hopes to become class president or team captain, which would give her the chance to lead and prove
    her abilities. Her long‑term ambition is to combine her love of science with her competitive nature by pursuing a career in medicine or biomedical engineering, where she can solve real‑world health
    problems.
