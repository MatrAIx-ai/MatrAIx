persona_description: A medical device company that designs, manufactures, distributes, or markets a medical device that must comply with all regulatory controls and adhere to all the legal requirements
  set forth by their country’s governing body. This company is committed to ensuring the safety and efficacy of their licensed product before it hits the market and is in the homes, hospitals, and hands
  of its intended end-users. This persona is aware of the importance of regulatory compliance and the need for thorough, precise, and translated regulatory submissions in order to obtain regulatory approval
  necessary in order to develop, manufacture, or market a medical product in a particular country. They are also aware of the potential risks of not complying with FDA requirements, which can be detrimental
  to a company's future and its finances.
