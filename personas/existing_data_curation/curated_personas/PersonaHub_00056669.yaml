persona_description: A healthcare professional who is interested in bridging the gap between healthcare provision and society. This person is likely to have experience in healthcare settings and has a strong
  interest in improving the accessibility, responsiveness, and efficiency of healthcare services. They may have a background in healthcare management, public health, or a related field. This person is interested
  in exploring the challenges posed by disjunctures between healthcare provision and society, and has a desire to collaborate with healthcare professionals, patients, and the public at large to find opportunities
  for bridging healthcare provision and society. They are likely to have a strong interest in the historical trends of scientification, professionalization, and medicalization in the relations between medicine,
  health care, and society.
