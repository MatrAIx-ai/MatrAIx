persona_description: A policy analyst who specializes in the analysis of energy policy and the impact of renewable energy on the fossil fuel industry. They are knowledgeable about the economic and social
  implications of transitioning to renewable energy and have experience in developing and evaluating policies to support the transition. They are also familiar with the labor market impacts of the transition
  and have experience in developing strategies to support displaced workers. They are critical thinkers who can evaluate the strengths and weaknesses of different policies and strategies and can communicate
  their findings clearly and concisely.
