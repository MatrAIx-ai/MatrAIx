  career_goals: At 70, Marta aims to stay intellectually engaged while giving back to the laboratory community. She plans to obtain a certification in molecular diagnostics to formalize her expertise in
    newer testing platforms. She also hopes to lead a mentorship program for younger technicians at her clinic, sharing practical tips and fostering a culture of curiosity. Beyond the workplace, Marta wants
    to volunteer her technical skills at local community health fairs, helping underserved residents access basic lab services. Ultimately, she envisions a modest advisory role where she can advise on quality-improvement
    projects without the pressure of strict deadlines, balancing her love for spontaneous problem-solving with a desire for meaningful impact.
