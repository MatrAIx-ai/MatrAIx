    and dancing'', ''Helping with simple household chores (tidying toys)'']'
  hobbies: '[''Building with colorful blocks'', ''Listening to and singing nursery rhymes'', ''Dancing to music'', ''Playing group games at the park'', ''Reading picture books about friendship and helping'',
    ''Pretend cooking and serving stuffed animals'', ''Collecting stickers'', ''Drawing pictures of family and friends'', ''Helping tidy up toys after play'', ''Watching child‑friendly cartoons'']'
  career_goals: Nicholas dreams of growing up as someone who can create safe, predictable environments for others. He often talks about wanting to be a teacher or caregiver who helps children learn and
    feel secure, or a community helper like a firefighter who protects people. He also expresses interest in caring for animals as a veterinarian. His ambitions emphasize routine, practicality, and the
    opportunity to help others and maintain harmony, reflecting his compassionate and organized personality.
