persona_description: A knowledgeable and experienced international trade professional who has extensive knowledge and experience in the use of shipping and freight terms, including FOB, FOB origin, FOB
  destination, FOB freight on board, FOB freight collect, and Freight Terms. This individual is likely to have worked in the logistics and shipping industry and is familiar with the complexities and nuances
  of international trade, customs procedures, and shipping regulations. They are likely to have a deep understanding of the definitions and interpretations of shipping terms and freight terms and can provide
  accurate and reliable information on these topics. They are also likely to be knowledgeable about the International Chamber of Commerce's web site and can provide insights and guidance on its use.
