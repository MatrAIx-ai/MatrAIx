personas:
  professional: Jazzy Mcghee, a 13‑year‑old budding technologist, channels curiosity and practicality by building simple robotics projects—such as a low‑cost water‑quality sensor kit for their school science
    fair—while drawing on the collaborative spirit of community church workshops and the rhythmic improvisation of local dance gatherings; they thrive on spontaneous experimentation, often forgetting deadlines
    but celebrate when they clinch the top spot at the regional STEM showcase.
  sports: Jazzy Mcghee dives into pick‑up basketball games at the Houma Community Center, cheering for the LSU Tigers and the New Orleans Pelicans while sprinting for the top spot on the scoreboard; they
    also swim in the bayou with the Southland Swim Club during summer months and join dad on weekend fishing trips, where they compete to catch the biggest catfish, balancing their competitive edge with
    a love for the outdoors.
  arts: Jazzy Mcghee pours creativity into short TikTok dance videos set to the beats of Megan Thee Stallion, Doja Cat, and local Zydeco legend Kermit Ruffins, while they binge graphic novels like Ms. Marvel,
    Saga, and Bone during quiet afternoons; they idolize the theatrical flair of Beyoncé’s concerts and the storytelling of Disney’s animated classics, letting these influences shape their own rhythmic
    style.
  travel: Jazzy Mcghee prefers spontaneous road trips over meticulously planned vacations, often hopping in the family SUV to explore nearby Gulf Coast spots like Grand Isle and the marshes of Atchafalaya,
    while a dream destination remains the Everglades for its wildlife, and they hope one day to visit New York City’s Broadway district to see live shows, balancing their travel enthusiasm with a limited
    allowance and school commitments.
  culinary: Jazzy Mcghee (age 13) loves cooking gumbo and jambalaya with their family on Saturday nights, mastering the dark roux and the bold flavors of Andouille sausage, shrimp, and okra, while they
    also relish munching on shrimp po’boys piled high with hot sauce; despite an occasional over‑salted pot and a habit of leaving the kitchen a mess, they proudly claim the title of junior sous‑chef in
    the household.
  core: Jazzy Mcghee is a high‑energy 13‑year‑old who blends a love of robotics, TikTok dance, and bayou adventures with a competitive streak, a tendency toward disorganized planning, and bouts of intense
    anxiety.
background:
  cultural: Jazzy is an African‑American teenager raised in Houma, Louisiana, a community where Black Southern culture mixes with Cajun and Creole traditions. Her family’s Sunday church gatherings nurture
    a strong sense of community and musical heritage, while the regional cuisine of gumbo, crawfish, and po’boys reflects the blend of cultural influences. Growing up near the bayous and Gulf Coast, she
    has developed a deep appreciation for the natural environment and the challenges it faces, shaping both her personal identity and her budding interest in environmental stewardship.
