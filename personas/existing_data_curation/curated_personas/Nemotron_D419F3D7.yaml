  hobbies: '[''Playing basketball'', ''Swimming'', ''Fishing with family'', ''Creating TikTok videos'', ''Listening to hip‑hop and bounce music'', ''DIY crafts'', ''Cooking Cajun dishes'', ''Reading graphic
    novels'', ''Attending local festivals and Mardi Gras events'', ''Building simple robotics projects'']'
  career_goals: Jazzy dreams of a future where she can protect the wetlands and Gulf waters that surround her hometown while sharing that passion through digital media. She hopes to attend a specialized
    STEM high school, study marine biology or environmental science, and later work as a marine conservationist or wildlife educator. At the same time, she envisions building a platform – perhaps a YouTube
    channel or TikTok series – that highlights local ecology, Cajun culture, and youth empowerment, hoping to earn scholarships and recognition that fuel her competitive drive.
