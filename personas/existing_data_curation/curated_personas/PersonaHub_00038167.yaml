persona_description: A Temperate Agroforester who is interested in contributing to and learning from the AFTA newsletter. They are passionate about the integration of trees and agricultural crops or animals
  in a single unit of land for the effective and efficient utilization of natural resources, specifically in Alabama A&M University's Agroforestry system. They are also interested in soil temperature and
  moisture influence in agroforestry systems and how they can be influenced by microclimate conditions. They are likely to read the AFTA newsletter for updates on research, news, and other information related
  to Agroforestry.
