  hobbies: '[''Reading historical fiction'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Walking on the beach'', ''Solving puzzles and crosswords'', ''Bilingual language‑exchange club'', ''DIY home
    organization projects'', ''Listening to salsa and bolero music'', ''Volunteering at community mail events'']'
  career_goals: 'Maria aims to advance from her current clerical role to a supervisory position within the postal service, where she can lead a small team and implement systematic improvements she has identified
    through her curiosity‑driven research. She plans to enroll in a certified logistics management course offered by a community college and earn the Postal Supervisor Certification. Over the long term,
    she envisions becoming a training specialist who mentors new mail clerks, sharing best practices that marry innovative ideas with proven operational methods. Her ambition is balanced: she seeks professional
    growth that provides greater responsibility and stability for her family while allowing her to apply her competitive drive to achieve measurable performance gains.'
