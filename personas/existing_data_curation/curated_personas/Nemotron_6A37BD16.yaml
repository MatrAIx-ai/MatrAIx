  career_goals: She dreams of becoming a wildlife veterinarian who cares for the ranch animals near her home, and she also imagines leading community projects that bring kids together for fun learning experiences.
    Kathryn hopes to be a teacher someday, creating classrooms where curiosity and kindness are both celebrated.
