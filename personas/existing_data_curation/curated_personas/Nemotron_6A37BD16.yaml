personas:
  professional: Kathryn Santamaria, a budding junior naturalist who organizes backyard scavenger hunts, demonstrates early leadership and keen observation, blending curiosity with practical planning in
    every playful experiment, and they readily share discoveries with friends.
  sports: Kathryn Santamaria plays on a neighborhood Saturday soccer league, cheers for the US Women’s National Soccer Team, and frequently rides a bike around the park after school, and they combine energetic
    play with a love for teamwork and community spirit.
  arts: Kathryn Santamaria delights in crafting bead necklaces inspired by the vivid colors of Studio Ghibli’s My Neighbor Totoro, enjoys listening to Disney soundtracks such as Let It Go from Frozen, and
    participates in the school art club where they experiment with paper collages while admiring the works of illustrator Kazu Kibuishi.
  travel: Kathryn Santamaria dreams of exploring the Grand Canyon’s towering cliffs after a virtual field trip, fondly recalls a family visit to the local aquarium, and loves planning imaginary journeys
    to tropical beaches where they can collect seashells, balancing curiosity with the comfort of familiar routines.
  culinary: Kathryn Santamaria loves the cheesy stretch of a pepperoni pizza, the comforting swirl of mac and cheese, and enjoys helping a parent whip up fruit salads with strawberries, bananas, and a drizzle
    of honey, though they often sneak extra grapes when no one’s watching.
  core: Kathryn Santamaria is an energetic, organized explorer who balances curiosity with practicality, thrives on group play, and sometimes forgets to tidy up their craft supplies, but they quickly jump
    back into the fun.
background:
  cultural: Kathryn was raised in Lame Deer, a small town on the Northern Cheyenne reservation in Montana. While her white family maintains traditional Midwestern customs—holiday gatherings, church attendance,
    and family meals—she also experiences the close‑knit community spirit of the reservation. Local events often feature Cheyenne language chants, powwow drumming, and teachings about stewardship of the
    land. This blend of rural white upbringing and exposure to Native American cultural practices instills in her a deep respect for nature, a love of community collaboration, and an appreciation for cultural
    diversity.
