  career_goals: Although retired, Andrew is driven by a desire to leave a lasting creative imprint on his hometown. He aims to establish a weekly art-craft workshop at the local senior center where he can
    mentor beginners in painting, woodworking, and gardening. He also hopes to organize a community mural that celebrates Greenville’s heritage, involving local schools and volunteers. By documenting oral
    histories of longtime residents, he plans to compile a small booklet that preserves the town’s collective memory. These goals reflect his wish to channel his imagination into communal projects, stay
    socially engaged, and find personal fulfillment in mentoring others.
