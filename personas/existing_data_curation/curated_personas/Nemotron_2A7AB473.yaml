personas:
  professional: Andrew Thibodeaux, a retired carpenter turned community arts facilitator, channels his woodworking, watercolor, and theater talents into weekly senior-center workshops and a collaborative
    mural project that celebrates Greenville’s heritage, while occasionally letting his loose planning style cause last‑minute scramble for supplies.
  sports: Andrew Thibodeaux enjoys birdwatching hikes along local trails and participates in the senior center’s weekly shuffleboard league, while cheering on the Greenville Green Bay baseball team and
    occasionally attending community yoga classes for flexibility.
  arts: Andrew Thibodeaux, a lifelong participant in community theater, spends evenings painting abstract watercolors of imagined forests, strums acoustic guitar at informal jam sessions, and crafts custom
    wooden furniture for friends, drawing inspiration from nature and local folklore.
  travel: Andrew Thibodeaux prefers weekend road trips to nearby state parks like Shenandoah for birdwatching, has long dreamed of visiting the Scottish Highlands to sketch misty landscapes, and usually
    travels in a modest sedan, packing a sketchbook and garden journal for spontaneous creative stops.
  culinary: Andrew Thibodeaux delights in cooking with fresh garden harvests, often preparing ratatouille with heirloom tomatoes, zucchini, and basil, while occasionally experimenting with quinoa salads
    tossed with roasted beets and goat cheese, and he enjoys sharing his dishes at senior‑center potlucks.
  core: Andrew Thibodeaux, an imaginative 72‑year‑old who blends art, gardening, and community mentorship, navigates life with a relaxed, sometimes chaotic, yet heartfelt approach, often worrying about
    details while finding joy in spontaneous creativity.
background:
  cultural: Andrew was born and raised in a working-class family in western Pennsylvania. His ancestry combines Pennsylvania Dutch (German) and Irish roots, common in the region’s rural and small-town communities.
    He grew up in a Protestant (Lutheran) environment that emphasized community service, modesty, and self-reliance. The area’s agricultural heritage and later manufacturing shifts shaped his early experiences,
    leading him to leave school before ninth grade to help on the family farm and later take various manual jobs. Though his formal education was limited, the strong oral tradition of his community fostered
    his love of storytelling and his curiosity about the world.
