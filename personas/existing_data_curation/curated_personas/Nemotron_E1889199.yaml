  career_goals: Although officially retired, Markia aims to stay actively involved in his community while preserving his routine and personal well‑being. He hopes to become a senior mentor at the local
    community center, offering practical advice on home repair and financial stewardship to younger residents. Markia also aspires to lead the seniors' bowling league, using his competitive edge to foster
    camaraderie and healthy rivalry. He plans to document his life experiences and family history in a memoir, which he will share in occasional storytelling evenings at his church. Maintaining his health
    is a top priority; he intends to keep a consistent walking schedule along the San Joaquin River and to attend weekly wellness workshops. Ultimately, his ambition is to be recognized as a reliable, friendly
    resource who balances flexibility with the comfort of routine.
