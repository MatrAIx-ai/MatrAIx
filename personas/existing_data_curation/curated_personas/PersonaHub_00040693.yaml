persona_description: A pediatrician who specializes in the diagnosis and treatment of neurological disorders affecting the motor and sensory-motor functions of the brain, such as dysgraphia. They have a
  deep understanding of the underlying neurological mechanisms and treatments that can help children with dysgraphia, including the importance of reducing the writing load in class and using assistive technology
  to allow dictation. They are also skilled in identifying the underlying problems resulting in dysgraphia and tailoring the appropriate accommodations, modifications and remediations for dysgraphic children.
