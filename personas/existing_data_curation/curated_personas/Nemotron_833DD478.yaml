personas:
  professional: James Yee is an aspiring small‑town carpenter who channels the step‑by‑step precision of his model‑airplane builds and the teamwork learned in Boy Scouts into reliable, hands‑on projects,
    reflecting a calm, organized, and community‑focused mindset.
  sports: James Yee is a dedicated member of the Duncan Youth Basketball Club and the school’s baseball team, cheering on the Oklahoma City Thunder and Kansas City Royals in the off‑season, and treats every
    practice as a chance to hone teamwork and resilience, balancing structured drills with spontaneous pickup games at the local park.
  arts: James Yee finds inspiration in classic country tunes by Willie Nelson, the storytelling of John Denver, and the animated adventures of Disney, often painting model‑airplane decals while listening
    to these artists, and occasionally attends the community theater’s family‑friendly productions of “Annie” and “The Wizard of Oz.”
  travel: James Yee prefers short, well‑planned trips that blend outdoor adventure with family bonding, such as annual fishing outings at Lake Texoma, weekend camping in the Ouachita National Forest, and
    dreams of a future road trip to Yellowstone National Park to explore geysers and wildlife.
  culinary: James Yee enjoys the hearty flavors of chicken fried steak, corn on the cob, and homemade apple pie, often helping his dad grill burgers for church potlucks, while proudly mastering a simple
    cornbread recipe that uses buttermilk, honey, and a dash of jalapeño for a subtle kick.
  core: James Yee is a calm, routine‑loving teen who blends a love for teamwork, practical hobbies, and a modest, future‑focused mindset, though they sometimes hoard spare change for the next model kit.
background:
  cultural: James grew up in Duncan, a small town in Stephens County, Oklahoma, where community ties and traditional values are strong. His family is rooted in the local farming and service-industry culture,
    and they attend a nearby Protestant church that emphasizes service, hard work, and modesty. The Midwest-American atmosphere, with its emphasis on self-reliance, routine, and friendly neighborliness,
    has shaped his worldview. Exposure to local high school sports, county fairs, and church gatherings reinforces a practical, community-oriented outlook while providing ample opportunities for group activities
    and leadership.
attributes:
  skills: '["Basic automotive maintenance", "Small-engine repair", "Team leadership", "Event and project organization", "Effective communication and peer mediation", "Animal care", "Woodworking and DIY
