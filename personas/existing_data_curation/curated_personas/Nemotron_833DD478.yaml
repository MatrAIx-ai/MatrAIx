  hobbies: '["Basketball", "Baseball", "Boy Scouts", "Video gaming (strategy and simulation)", "Model airplane building", "Fishing", "Woodworking projects", "Playing guitar", "Community volunteer events",
    "Reading practical guides (DIY, automotive)"]'
  career_goals: James aims to graduate high school with solid grades, then attend a vocational program to become an automotive technician. He hopes to earn certifications, work at a local repair shop, and
    eventually open his own garage in Duncan where he can provide reliable service to his neighbors. Alongside his career, he wants to volunteer as a community firefighter or in the Boy Scouts leadership,
    giving back to the town that shaped him. He values a steady, predictable work schedule that lets him stay close to family and maintain the routine he finds comforting.
