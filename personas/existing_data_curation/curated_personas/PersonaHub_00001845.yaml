persona_description: A Java developer who is interested in optimizing the performance of their Java applications, particularly those running on high-volume server-side applications. They are looking for
  a garbage collector that can take advantage of available CPUs rather than leaving most of them idle while only one does garbage collection work. They are aware of the limitations of the serial collector
  and the parallel collector, and are considering using the CMS collector for applications that have pause time constraints and require larger heap sizes. They are also interested in learning about the
  hotspots and how they can be optimized to improve application performance.
