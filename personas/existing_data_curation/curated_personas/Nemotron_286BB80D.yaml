  career_goals: Marco aspires to move into a supervisory role within facilities management, aiming to become a lead building supervisor overseeing a team of cleaners and maintenance staff. He plans to obtain
    certifications such as the Certified Facility Manager (CFM) and the Certified Professional Cleaner (CPC) to strengthen his credentials. Long-term, he dreams of starting his own cleaning and property-maintenance
    business that can serve the Dallas-Fort Worth metroplex, leveraging his practical expertise, competitive drive, and network of industry contacts. He also hopes to mentor younger workers, helping them
    develop the same blend of curiosity and reliability he values.
