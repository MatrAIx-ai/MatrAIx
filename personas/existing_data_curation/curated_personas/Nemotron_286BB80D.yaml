personas:
  professional: Marco Mccauley, a seasoned janitorial veteran with two decades of hands‑on expertise in commercial cleaning, floor care, and minor building maintenance, leverages their curiosity‑driven
    problem solving and outgoing demeanor to lead teams, de‑escalate occupant conflicts, and pursue Certified Facility Manager and Certified Professional Cleaner credentials on the path to launching a Dallas‑Fort
    Worth‑wide property‑maintenance enterprise, and they are already mentoring younger staff to embed the same blend of reliability and curiosity.
  sports: Marco Mccauley competes in a community basketball league and a recreational soccer circuit, supporting the Dallas Mavericks, Dallas Cowboys, and FC Dallas while they maintain a personal fitness
    routine at the North Texas Sports Club, embodying their competitive drive and preference for group sport dynamics.
  arts: Marco Mccauley immerses themselves in live music, regularly attending country shows featuring artists like Garth Brooks and Miranda Lambert and rock concerts headlined by the Foo Fighters, while
    they also express creativity through classic‑car restoration and occasional visits to the Dallas Museum of Art, allowing music and hands‑on craftsmanship to shape their identity.
  travel: Marco Mccauley favors spontaneous road trips across Texas, having already explored Austin’s South by Southwest festival, the Hill Country’s wineries, and a weekend hike in the Palo Duro Canyon,
    while they dream of a future culinary pilgrimage to Kansas City’s famed BBQ scene and a leisurely cruise through the Gulf Coast’s fishing villages, balancing adventure with the financial realities of
    their upcoming business launch.
  culinary: Marco Mccauley’s palate revolves around Texas‑style BBQ, mastering a dry rub of brown sugar, paprika, cumin, and black pepper for smoked brisket, ribs, and sausage on a Kennesaw pellet smoker,
    pairing each feast with homemade jalapeño cornbread, coleslaw, and a cold craft IPA, yet they sometimes over‑smoke the meat in their eagerness to impress friends.
  core: Marco Mccauley is a socially driven, competitively spirited 45‑year‑old janitorial expert who balances meticulous work habits with a love for BBQ, live music, and community sports, and they wrestle
    with anxiety while pursuing an ambitious entrepreneurial vision.
background:
  cultural: Marco is a white American with Irish and German ancestry, raised in suburban Texas. He grew up in a working-class family that emphasized hard work, reliability, and hospitality, values common
    in the Dallas‑County region. His high-school years were shaped by the multicultural atmosphere of Irving, where he was exposed to a sizable Hispanic community, leading him to pick up basic Spanish phrases
    and an appreciation for diverse cultural food traditions. While he identifies with traditional Texan pragmatism and self-reliance, his curiosity and outgoing personality have opened him to contemporary
    ideas and a broad social circle that blends local customs with modern influences.
