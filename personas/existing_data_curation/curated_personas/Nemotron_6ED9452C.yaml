  hobbies: '[''drawing cartoons'', ''digital painting'', ''LEGO building'', ''soccer'', ''listening to Mexican music and pop'', ''reading graphic novels and sci‑fi books'', ''nature hikes'', ''creating
    games in Scratch'', ''cooking with family'', ''visiting museums and art fairs'']'
  career_goals: Mariano dreams of turning his love for art and technology into a career as a multimedia storyteller or video‑game designer who creates worlds that celebrate Mexican culture. In the short
    term, he wants to excel in school, win a regional art competition, and develop a portfolio of digital illustrations. He also hopes to mentor younger kids in his community, using his growing expertise
    to inspire curiosity and confidence. Long‑term, he envisions studying graphic design or interactive media in college and eventually leading projects that blend storytelling, cultural heritage, and interactive
    technology.
