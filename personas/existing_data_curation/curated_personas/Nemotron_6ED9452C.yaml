personas:
  professional: Mariano Ferrer is an aspiring junior game developer who merges their love for drawing cartoons and digital painting with their curiosity for sci‑fi storytelling, using Scratch to prototype
    whimsical adventures while meticulously organizing LEGO‑inspired level designs, yet remains flexible enough to pivot when a new idea sparks during a museum visit.
  sports: Mariano Ferrer is an energetic youth soccer enthusiast who plays midfield for a local Galveston community league, cheers for the Houston Dynamo as their favorite professional team, and spends
    weekends building stamina on the sand dunes of the Gulf Coast while balancing competitive drive with a habit of lingering after games to talk strategy with teammates.
  arts: Mariano Ferrer is a budding visual artist who spends afternoons sketching comic‑style characters inspired by Stan Lee and Hayao Miyazaki, experiments with digital brushes in Procreate while listening
    to a blend of traditional mariachi strings and Billie Eilish pop, and regularly explores the Galveston Art Museum and local art fairs to gather fresh motifs, though they sometimes get distracted by
    daydreaming and lose track of time.
  travel: Mariano Ferrer is an adventurous explorer who loves hiking the coastal trails of Galveston Island, dreams of camping under the stars in Big Bend National Park, hopes to someday visit the vibrant
    streets of Kyoto for its anime culture, and prefers low‑cost road trips with family over pricey overseas flights, yet worries about missing schoolwork during long vacations.
  culinary: Mariano Ferrer is a curious kitchen helper who enjoys mixing ingredients for homemade pizza dough, perfecting the ratio of chocolate chips in oatmeal cookies, and sprinkling chopped cilantro
    into fresh salsa for family celebrations, yet often forgets to clean the stovetop afterwards, leading to occasional scoldings that fuel their determination to master cooking.
  core: Mariano Ferrer is an imaginative 11‑year‑old who balances a love for drawing, LEGO engineering, and soccer with a chronic habit of over‑thinking every decision, turning worry into fuel for creative
    projects while occasionally getting lost in doodles on school worksheets, and they often channel that energy into new cartoon characters.
background:
  cultural: Mariano comes from a Mexican‑American family in La Marque, Texas. At home, Spanish is spoken alongside English, and he participates in cultural traditions such as Día de los Muertos, Cinco de
    Mayo celebrations, and family gatherings centered around Mexican cuisine like tacos, tamales, and pozole. His parents and grandparents share stories of their heritage, fostering his appreciation for
    Mexican art, music, and folklore. Growing up in a tight‑knit Hispanic community, he feels a strong sense of belonging and often sees his cultural identity reflected in local festivals, church events,
    and community murals.
attributes:
  skills: '[''sketching and digital illustration'', ''basic programming in Scratch'', ''bilingual Spanish‑English reading and writing'', ''problem‑solving in science projects'', ''organized project management'',
