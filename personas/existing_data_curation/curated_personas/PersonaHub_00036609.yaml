persona_description: A scientist who specializes in the study of viruses, particularly the mechanisms of viral replication and the development of antiviral drugs. His research interests include, but are
  not limited to, the structure of viral polymerases, the design and development of novel antiviral drugs, and the inhibition of viral replication at the cap-snatching mechanism. He has a deep understanding
  of crystallography and X-ray crystallography techniques and is skilled in the development of synthetic chemical compounds. He has published several research papers on the structural analysis of specific
  metal chelating inhibitor binding to the endonuclease domain of influenza pH1N1 (2009) polymerase and has worked with EMBL's spin-off company Savira pharmaceuticals, in partnership with Roche, to further
  develop influenza inhibitors.
