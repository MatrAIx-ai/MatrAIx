  hobbies: '["video gaming (strategy/RPG)", "pickup basketball", "skateboarding", "digital illustration", "cooking Vietnamese family recipes", "vlogging and YouTube content creation", "listening to hip‑hop
    and K‑pop music", "attending Asian cultural festivals"]'
  career_goals: Viet aims to earn a community‑college certificate in information technology or network administration within the next two years, leveraging his curiosity for new tech and his practical problem‑solving
    mindset. He envisions a career as a junior IT support specialist or a junior web developer, where he can apply his bilingual communication skills and help local businesses, especially those in the Vietnamese
    community. Parallel to this, he hopes to grow a part‑time YouTube channel that showcases Vietnamese home cooking tutorials combined with gaming commentary, eventually turning it into a modest source
    of income to support his family. Long‑term, he aspires to become a mentor for other immigrant youth, guiding them toward technical careers while preserving cultural ties.
