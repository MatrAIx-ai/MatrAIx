  career_goals: Daniel aims to complete his bachelor’s degree in Supply Chain Management within the next two years and pursue an MBA focused on sustainable logistics. His short‑term goal is to become a
    senior distribution manager, overseeing larger regional networks and implementing innovative technologies such as AI‑driven forecasting and electric delivery fleets. Long‑term, he envisions leading
    a corporate supply‑chain division as a director or founding his own consultancy that blends creative design thinking with efficient, eco‑friendly transportation solutions. He also hopes to mentor young
    professionals in the industry, fostering a culture of curiosity and adaptability.
