personas:
  professional: Scott Johnson, a 64‑year‑old industrial maintenance veteran, leverages decades of hands‑on expertise in furnace and kiln repair, hydraulic and pneumatic diagnostics, MIG/TIG welding, and
    OSHA safety compliance to train apprentices, design cost‑effective equipment upgrades, and launch a mobile diagnostic service for local farms, all while thriving as the charismatic master of ceremonies
    at community events.
  sports: Scott Johnson, an avid fisherman and weekend hunter, spends early mornings casting for largemouth bass on the nearby lake, joins the Lakeview Anglers club for seasonal tournaments, roots for the
    Chicago Cubs while attending summer games, and participates in a community softball league, balancing his love for outdoor sport with a relaxed fitness routine.
  arts: Scott Johnson, a charismatic master of ceremonies for community theater productions and a regular acoustic guitarist at the local coffeehouse, delights in folk legends like Bob Dylan and Joan Baez,
    curates vintage vinyl collections, enjoys Saturday matinees of classic Western films, and often sprinkles witty anecdotes into performances, weaving his sociable charm into every artistic encounter.
  travel: Scott Johnson, a road‑trip enthusiast who prefers flexible itineraries over rigid schedules, has driven to Yellowstone and the Great Smoky Mountains for scenic hikes, plans annual hunting excursions
    in northern Minnesota, dreams of a leisurely cruise along the Norwegian fjords with his grandchildren, and values affordable family‑friendly lodging over luxury resorts.
  culinary: Scott Johnson, an enthusiastic backyard chef, tends tomatoes, sweet corn, and peppers in his garden for fresh salads, perfects a smoky Texas‑style brisket and honey‑glazed pork ribs on his custom
    smoker, experiments with homemade rubs of brown sugar, paprika, and cumin, and savors his garden‑grown salsa over grilled fish, while occasionally overindulging in rich sauces that test his hypertension.
  core: Scott Johnson, a sociable 64‑year‑old maintenance guru turned mentor, blends hands‑on expertise with a love for community theater, vintage tractors, and smoky BBQ, navigating life's worries with
    a relaxed yet curious spirit and a penchant for talking the talk while fixing the fix.
background:
  cultural: Scott grew up in a small farming community in eastern Nebraska, raised in a close‑knit Protestant family that emphasized hard work, modesty, and neighborly support. The Midwest’s values of self‑reliance,
    community involvement, and practical problem‑solving shaped his worldview. He earned an associate's degree in mechanical technology from a regional community college, and his career kept him rooted
    in the local industrial sector. His cultural roots are reflected in his love for county fairs, home‑cooked meals, and a strong sense of duty to his community, while his experience as a divorced father
    of adult children has added a layer of empathy and concern for family and community cohesion.
attributes:
  skills: '[''Industrial machinery repair'', ''Hydraulic systems troubleshooting'', ''Pneumatic systems maintenance'', ''MIG/TIG welding'', ''Blueprint and schematic interpretation'', ''Preventive maintenance
