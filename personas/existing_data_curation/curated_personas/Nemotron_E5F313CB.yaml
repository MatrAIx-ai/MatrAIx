  hobbies: '[''Community theater acting and MC duties'', ''Acoustic guitar playing'', ''Fishing'', ''Hunting'', ''Woodworking'', ''Restoring vintage tractors'', ''Attending county fairs'', ''Volunteering
    as a mentor for high school vocational programs'', ''Barbecue cooking'', ''Gardening'']'
  career_goals: As he approaches retirement, Scott aims to shift from day‑to‑day repairs to a mentorship and advisory role. He hopes to become a senior consultant for his plant, offering expertise in equipment
    upgrades and safety audits, and to teach part‑time at the local community college's industrial maintenance program. He also desires to establish a small side business providing mobile equipment diagnostics
    for local farms, allowing him to maintain flexibility and reduce physical strain while still sharing his knowledge and staying socially engaged.
