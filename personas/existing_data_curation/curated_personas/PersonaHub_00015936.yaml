persona_description: A historian who is interested in the intersection between academic history and historical fiction, particularly in the work of A.S. Byatt and the popularity of neo-Victorian fiction.
  This person is likely to be familiar with the history of academic and historical writing, as well as the development of historical fiction. They may have a particular interest in the use of historical
  detail in Byatt's work and the ways in which her novels reflect the social and cultural context of their time. They may also be interested in the use of digital resources and the digital age, as evidenced
  by their interest in the "Nineteenth-century newspapers in the digital age" strand of the Journal of Victorian Culture.
