personas:
  professional: Michael Wills is a wholesale and manufacturing sales specialist who leverages their organized, data‑driven market analysis, meticulous inventory management, and refined negotiation skills
    to consistently exceed quarterly targets while their curiosity fuels continual improvement of supply‑chain processes and mentorship of junior reps.
  sports: Michael Wills enjoys following the NC State Wolfpack football team, participates in weekend fishing trips on local lakes, hikes the Pinehurst Forest trails for cardio, and is a member of the Raleigh
    community’s amateur archery club, preferring low‑impact, solitary activities over team sports.
  arts: Michael Wills finds creative fulfillment in building detailed model‑train layouts inspired by classic movies like “The Great Escape”, listens to classic rock legends such as Led Zeppelin and Southern
    country icons like Loretta Lynn while working in the garage, and occasionally attends local craft fairs featuring woodworkers and blacksmiths.
  travel: Michael Wills prefers meticulously planned road trips that combine historical sightseeing—such as a visit to the Gettysburg battlefield—with opportunities for outdoor recreation like fishing on
    Lake Tahoe, and they dream of a future solo backpacking adventure along the Appalachian Trail once their career stabilizes.
  culinary: Michael Wills experiments with Southern cooking, regularly preparing dishes like smoked brisket seasoned with paprika and brown sugar, shrimp and grits garnished with fresh herbs, and enjoys
    pairing them with locally sourced collard greens, while their modest kitchen setup reflects a competent but not professional‑level skill set.
  core: Michael Wills is a methodical, solitary sales professional whose love for precise model‑train projects coexists with a tendency to over‑order woodworking supplies and stay up late planning the next
    fishing outing.
background:
  cultural: Michael grew up in Laurinburg, a small town in Scotland County, North Carolina, within a white, working-class community that values hospitality, modesty, and a strong work ethic. His family
    has deep roots in the area, with generations involved in agriculture and manufacturing. Southern traditions such as church attendance, high school football games, BBQ gatherings, and country music shaped
    his upbringing. These cultural influences contribute to his cooperative, considerate nature, his preference for small-group interactions, and his pragmatic approach to both work and leisure.
attributes:
