  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Reading (Non-fiction)'', ''Model Train Building'', ''College Football (NC State)'', ''Strategy Video Games'', ''Southern Cooking'', ''Volunteer Work
    at Baptist Church'', ''Listening to Classic Rock'']'
  career_goals: Michael's short-term goal is to become a sales supervisor within his company, leading a small team of representatives and overseeing key regional accounts. He plans to earn a Certified Professional
    Sales Person (CPSP) credential and complete a supply-chain management certification to broaden his expertise. Over the next five to ten years, he aspires to advance to a regional sales manager role,
    mentor junior staff, and eventually launch his own distribution business focused on industrial equipment, leveraging his practical knowledge and disciplined work habits.
