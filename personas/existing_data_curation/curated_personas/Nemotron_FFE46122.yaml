personas:
  professional: Yoshie Lo, a 21‑year‑old aspiring electrician, blends meticulous NEC compliance with a restless curiosity for emerging smart‑home technologies, channeling their quiet diligence into precise
    wiring, solar PV installations, and IoT programming while actively mentoring fellow women apprentices.
  sports: Yoshie Lo enjoys weekend hikes along the Watchung Reservation, attends evening yoga classes at a nearby studio, follows the New York Giants during football season, and occasionally joins pick‑up
    basketball games at a Paterson community center, preferring low‑impact activities that soothe their nervous system.
  arts: Yoshie Lo channels their reflective nature into black‑and‑white urban photography inspired by Berenice Abbott, relaxes with classic science‑fiction novels by Isaac Asimov, and unwinds listening
    to ambient soundscapes by Brian Eno, finding that these artistic pursuits sharpen their eye for detail in electrical schematics.
  travel: Yoshie Lo plans trips with spreadsheet precision to keep stress low, favoring short, budget‑friendly getaways to historic Boston and the coastal trails of Acadia National Park, while dreaming
    of a solo pilgrimage to Kyoto to study traditional architecture and subtle electrical layouts.
  culinary: Yoshie Lo, a competent home cook, delights in preparing simple yet authentic East Asian dishes like miso‑glazed salmon, kimchi fried rice with gochujang, and hand‑rolled sushi using sushi‑grade
    tuna and avocado, meticulously measuring each ingredient as if calibrating a circuit, and occasionally treats friends to a ramen night spiced with shichimi togarashi.
  core: Yoshie Lo is a quietly ambitious 21‑year‑old electrician whose obsessive love of schematics coexists with a penchant for nighttime urban photography, yet they often spiral into worry over tiny details,
    prompting endless checklist revisions.
background:
  cultural: Yoshie grew up in a Chinese‑American household in Paterson, New Jersey. Her parents immigrated from Taiwan, and she was raised bilingual, speaking Mandarin at home while attending English‑language
    schools. Family traditions such as celebrating Lunar New Year, preparing dumplings together, and honoring ancestors remain central to her identity. The multicultural fabric of Paterson exposed her to
    a rich tapestry of Asian cultures, reinforcing values of respect, humility, and community harmony. These cultural influences shape her cooperative nature, her emphasis on maintaining harmonious relationships
    at work, and her disciplined, diligent approach to mastering her trade.
attributes:
  skills: '["Residential wiring", "Commercial electrical systems", "Blueprint reading", "Electrical troubleshooting", "Safety compliance (NEC)", "Solar photovoltaic installation", "Smart home automation",
    "Use of multimeter and testing equipment", "Cable management", "Basic IoT device programming"]'
  hobbies: '["Reading technical manuals", "Science-fiction novels", "Sketching circuit diagrams", "Hiking", "Yoga", "Mindfulness meditation", "Cooking East Asian cuisine", "Urban photography"]'
  career_goals: Yoshie aims to earn her journeyman electrician license within the next two years and subsequently achieve master electrician status. Long‑term, she aspires to launch her own contracting
    firm that specializes in energy‑efficient and smart‑home solutions for the Paterson community, integrating solar and automation technologies. She is also committed to mentoring other women entering
    the trade, promoting diversity in the electrical field, and eventually obtaining certifications as an electrical inspector to ensure high safety standards.
