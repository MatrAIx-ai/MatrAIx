  career_goals: Joseph plans to transition into a part-time consulting role within the next two years, helping small local businesses improve their packaging efficiency and adopt sustainable materials.
    He hopes to mentor younger workers at his current facility and volunteer as a STEM mentor for the Norman community center's robotics club. While maintaining his health and financial stability for a
    comfortable retirement, he also wants to travel on a river cruise with a close group of friends and perhaps write a simple guide on practical packaging tips for small-scale entrepreneurs.
