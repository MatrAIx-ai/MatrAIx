  career_goals: Sandra aims to transition into a senior director role where she can shape enterprise‑wide strategy for operational excellence and sustainable innovation. She plans to pursue an MBA to deepen
    her strategic finance and leadership capabilities while championing mentorship programs for women in STEM. Over the next five years, she hopes to lead a multi‑site division that integrates lean methodologies
    with emerging technologies, such as IoT and AI, to improve efficiency and reduce environmental impact. Balancing ambition with personal well‑being, she also seeks flexible work arrangements that support
    her family life and stress‑management practices.
