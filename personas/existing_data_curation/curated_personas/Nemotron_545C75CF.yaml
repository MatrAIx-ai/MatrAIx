  hobbies: '[''Gardening and plant care'', ''Reading chapter‑book series'', ''Building LEGO kits'', ''Collecting and sorting river rocks'', ''Playing board games with small groups'', ''Simple cooking and
    baking'']'
  career_goals: Bela dreams of a future where she works with animals and helps keep things organized. She aspires to become a veterinary assistant or eventually a veterinarian, drawn by the routine of caring
    for pets and the practical, hands‑on nature of the work. She also sees herself as a teacher’s aide in a primary classroom, where she can use her love of routine and her ability to explain simple concepts
    to younger children. Bela plans to complete high school with good grades, attend a community college for veterinary technology, and later pursue a degree in animal health, all while staying close to
    her tight‑knit community in Michigan.
