personas:
  professional: Bela Vance is a budding junior horticulturist whose love for routine garden tasks, patience building LEGO sets, and meticulous tracking of seedlings translates into a practical, detail‑oriented
    approach to her small‑scale gardening projects, even though she often prefers flexibility over strict scheduling.
  sports: Bela Vance plays on the local Little League baseball team, attends a community swimming class during summer, and cheerfully follows the Chicago Cubs and Chicago Bulls on TV, preferring low‑pressure,
    routine‑driven activities over intense competition.
  arts: Bela Vance delights in the whimsical illustrations of Beatrix Potter, the folk melodies of Jack Johnson, and the enchanting storytelling of Disney’s animated classic “Moana,” often reenacting scenes
    with her LEGO figures, reflecting her love for familiar narratives and precise detail.
  travel: Bela Vance enjoys family road trips to nearby state parks such as Shenandoah National Park, where she explores streams for smooth river rocks, and dreams of a future visit to the historic castles
    of Scotland, preferring carefully planned itineraries that balance quiet nature hikes with short, predictable sightseeing stops.
  culinary: Bela Vance loves whipping up simple scrambled eggs with a pinch of salt and pepper, blending strawberry‑banana smoothies with fresh fruit and yogurt, and assembling peanut‑butter‑jelly sandwiches,
    showcasing her practical, hands‑on approach to cooking that mirrors her methodical garden routines.
  core: Bela Vance blends a love for routine garden care and LEGO precision with a shy yet assertive streak, keeping a secret stash of river rocks as tiny trophies of her quiet adventures.
background:
  cultural: 'Bela comes from a white Midwestern family rooted in the small‑town culture of Byron Center, Michigan. Her upbringing reflects typical values of the region: emphasis on community involvement,
    respect for tradition, and a strong work ethic. She participates in local school events, community fairs, and seasonal activities like apple picking and county fairs. Family gatherings often involve
    shared meals and holiday traditions that reinforce practical, down‑to‑earth values. The local church community provides a familiar, supportive environment that reinforces routine and cooperative behavior.
    Bela’s cultural setting balances the quiet, rural‑suburban lifestyle of Ottawa County with the broader American emphasis on self‑reliance and neighborly support.'
attributes:
  skills: '[''Reading comprehension at 4th‑grade level'', ''Basic arithmetic (addition, subtraction, simple multiplication)'', ''Following step‑by‑step instructions (LEGO building, simple cooking)'', ''Managing
