personas:
  professional: Dennis Mason is a financial strategist and process optimization specialist who leverages Excel, QuickBooks and Tableau to craft data‑driven budgeting and workflow solutions for small Colorado
    businesses, while they maintain a competitive, skeptical mindset that drives them to constantly challenge inefficiencies and pitch bold cost‑saving initiatives.
  sports: Dennis Mason shreds the Front Range on their mountain bike with the Denver MTB Riders club, skis the Vail slopes each winter, hikes the foothills on weekends, and roots for the Denver Broncos
    and Colorado Avalanche while they track their own performance metrics in a spreadsheet.
  arts: Dennis Mason devotes Saturday evenings to competitive board‑game battles of Terraforming Mars and Settlers of Catan, sharpens strategic thinking with chess against a local club, streams tactical
    video games such as XCOM, and unwinds to the folk‑rock vibes of The Lumineers at Red Rocks, integrating these artistic pursuits into their analytical mindset.
  travel: Dennis Mason meticulously plans weekend road trips to Colorado’s Estes Park and Boulder, dreams of a ski‑focused expedition to Chamonix, France, balances cost‑conscious budgeting with spontaneous
    detours to Denver’s food‑truck festivals, and occasionally eyes a craft‑brew pilgrimage to Mendoza, Argentina, to sample local hop varieties, reflecting their blend of structured planning and adventurous
    spontaneity.
  culinary: Dennis Mason, an intermediate home‑cook, experiments with spicy green‑chile cheeseburgers, smoked brisket and sourdough loaves, while their palate gravitates toward Denver’s food‑truck staples
    such as Korean‑style tacos with gochujang, and they meticulously blend craft‑brew hops like Citra and Mosaic into their culinary creations.
  core: Dennis Mason is a data‑driven strategist who balances a love of meticulous spreadsheets with a penchant for spontaneous mountain‑bike rides, craft‑brew experiments, and a habit of over‑stocking
    their home‑brew pantry at the expense of laundry.
background:
  cultural: Dennis grew up in a suburban Midwestern town within a middle‑class family that emphasized self‑reliance, hard work, and practical problem‑solving. The broader American cultural focus on individualism
    and entrepreneurship has shaped his competitive, skeptical outlook. After moving to Denver a decade ago, he adopted the region’s outdoor‑oriented, progressive yet independent lifestyle, embracing the
    local craft‑beer scene and active community events. He celebrates traditional holidays such as Thanksgiving and the Fourth of July, while also valuing personal freedom, pragmatic decision‑making, and
    a balanced mix of work, family, and leisure.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Strategic planning'', ''Market research'', ''Negotiation'', ''Process improvement'', ''Project management'', ''Data visualization (Excel,
    Tableau)'', ''Customer relationship management (CRM)'', ''Digital marketing basics'']'
  hobbies: '[''Hiking'', ''Mountain biking'', ''Skiing'', ''Homebrewing'', ''Board games'', ''Chess'', ''Strategic video gaming'', ''Reading business books'', ''DIY home improvement'', ''Cooking'']'
  career_goals: Dennis aims to launch a boutique business‑consulting firm that serves small Colorado enterprises, focusing on supply‑chain efficiency and financial sustainability. Over the next three years
    he plans to build a reputation as a go‑to strategic advisor, generate enough revenue to achieve financial independence, and eventually create a passive‑income stream through a side venture—such as a
    small‑batch craft microbrewery. He also envisions re‑entering the corporate world in a senior business‑development role that offers autonomy and strategic impact, while maintaining the flexibility to
    pursue personal projects and family time.
