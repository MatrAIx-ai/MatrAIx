  career_goals: Now retired, Nathan’s primary ambition is to maintain his home and health so he can continue living independently in Horseheads. He aims to pass his practical skills on to his grandchildren
    through informal mentorship, teaching them woodworking and gardening basics. He also hopes to contribute to his community by volunteering for the local historical society’s preservation projects and
    assisting neighbors with small repairs. A secondary goal is to travel modestly around upstate New York, visiting state parks and historic sites that resonate with his love of tradition and local heritage.
