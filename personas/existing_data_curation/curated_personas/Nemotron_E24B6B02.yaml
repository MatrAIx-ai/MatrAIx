personas:
  professional: Alejandro Casas, a seasoned maintenance supervisor with decades of hands‑on experience overseeing preventive maintenance, mechanical troubleshooting and routine electrical repairs at a petrochemical
    facility in Corpus Christi, now seeks to transition into a low‑stress, home‑based handyman service where they can apply their meticulous budgeting, inventory control and safety‑training expertise while
    serving neighbors with reliable, predictable repairs.
  sports: Alejandro Casas spends weekends casting lines on the Gulf Coast with the Corpus Christi Anglers Club, follows the local soccer side Corpus Christi FC with longtime friends, and faithfully tunes
    in to the Houston Astros games each spring, they maintain a modest fitness routine of early‑morning walks and occasional light weightlifting to stay active.
  arts: Alejandro Casas fills evenings with the lively sounds of classic norteña and banda groups such as Los Tigres del Norte and Banda El Recodo, while they unwind by reading in‑depth biographies of figures
    like Sam Houston and Lyndon B. Johnson, and occasionally volunteers to host live music nights at the church hall, blending historical intrigue with rhythmic tradition.
  travel: Alejandro Casas prefers well‑planned, low‑key road trips that balance relaxation with cultural discovery, having already toured the Texas Hill Country, explored Big Bend National Park, and taken
    a weekend cruise to the Gulf’s coastal towns, they now dream of a leisurely pilgrimage to the historic missions of San Antonio and a short visit to the castles of Andalusia, Spain, while keeping travel
    costs within a modest retirement budget.
  culinary: Alejandro Casas revels in firing up the backyard grill to perfect smoky fish tacos seasoned with freshly harvested cilantro, oregano, and fiery chilies from their garden, they also craft aromatic
    carne asada and homemade salsa verde, demonstrating a solid, home‑grown culinary skill set that blends routine cooking with a love for bold, herb‑forward flavors.
  core: Alejandro Casas is a routine‑loving, community‑focused handyman‑in‑training who balances a meticulous work ethic with a fondness for fishing, flavorful grilled meals, and the soothing strains of
    classic norteña music, they quietly wrestle with occasional worries about health and retirement.
background:
  cultural: Alejandro was born in Corpus Christi to Mexican‑American parents and grew up bilingual, celebrating both American holidays and Mexican traditions such as Día de los Muertos and quinceañeras.
    He identifies as Catholic, a faith that shapes his community involvement and family values. His cultural identity blends Tex‑Mex culinary flavors, regional festivals, and a strong sense of family loyalty.
    He maintains close ties with extended family across Texas and Mexico, participates in local cultural events, and his worldview reflects the work ethic and communal spirit characteristic of the Gulf
    Coast Hispanic community.
