persona_description: A scientist who specializes in the study of taste receptors, particularly the amino acid taste receptor. He is interested in understanding how taste receptors work, how they are activated,
  and how their signals travel to the brain to produce specific taste perceptions. His research interests include, but are not limited to, the structure and function of taste receptors, the identification
  and characterization of new taste receptors, and the study of taste perception in humans and other species. He is particularly interested in the role of taste receptors in the development of new food
  products and the identification of new taste modalities.
