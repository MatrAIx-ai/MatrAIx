  career_goals: He aspires to become a robotics engineer or software developer who creates autonomous tools, dreaming of a future at a leading tech company or a space agency like NASA. He intends to earn
    a scholarship for STEM in high school, participate in robotics competitions, and eventually launch his own tech startup that merges gaming and education. His competitive drive motivates him to seek
    leadership roles in team projects and to continuously improve his technical expertise.
