personas:
  professional: Raydell Miles, a 13‑year‑old robotics hobbyist, combines practical engineering with relentless curiosity, programming Arduino bots for school competitions while they meticulously document
    each build and challenge peers to improve.
  sports: Raydell Miles, a member of the Butte County Youth Basketball League and a fan of the Sacramento Kings, dominates weekend pickup games at the local park, hikes the Sierra foothills each summer,
    and uses their competitive drive to push personal fitness goals.
  arts: Raydell Miles, an avid listener of Kendrick Lamar, SZA, and Drake, devotes evenings to hip‑hop and R&B playlists while they absorb sci‑fi novels by Andy Weir and Becky Chambers, letting the blend
    of rhythm and speculative storytelling inspire their robot designs.
  travel: Raydell Miles, whose favorite trips include weekend drives to Yosemite and dreaming of a bike tour through Japan’s countryside, meticulously plans itineraries around school breaks, balancing family
    budget limits with a desire for immersive cultural experiences.
  culinary: Raydell Miles, who prefers quick, flavorful meals, often assembles spicy ramen with sriracha and shredded cheddar or rolls homemade pizza dough, yet they notoriously forget to eat breakfast
    before school, leading to mid‑morning cravings.
  core: Raydell Miles is a competitively curious teen who builds robots, leads virtual battle royales, and never lets a missed alarm stop their morning basketball warm‑up.
background:
  cultural: Raydell is a Black teenager growing up in Chico, a small city in northern California where he is part of a close‑knit family that maintains strong ties to African‑American cultural traditions.
    Family gatherings often feature soul food, music from classic R&B to contemporary hip‑hop, and celebrations of holidays such as Juneteenth and Kwanzaa, providing him with a sense of heritage. In a community
    where he is one of fewer Black students, he navigates both the broader Californian culture and his own community’s values, drawing inspiration from Black scientists, engineers, and athletes. His experiences
    have fostered a resilient identity and a desire to excel in fields where Black representation is growing.
