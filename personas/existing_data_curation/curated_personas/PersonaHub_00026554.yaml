persona_description: A climate and environmental expert who monitors and analyzes climate change impacts, particularly in the context of conflict and drought in the Sahel region of Africa. They have a deep
  understanding of the impacts of climate change on water resources, soil moisture, and vegetation, and are skilled in using climate models and satellite data to forecast and predict these impacts. They
  are also knowledgeable about the social and political causes of conflict in the region, including issues related to land use, water allocation, and resource management. They have experience working with
  international organizations and governments to develop and implement strategies to mitigate the impacts of climate change and reduce the risk of conflict in the region.
