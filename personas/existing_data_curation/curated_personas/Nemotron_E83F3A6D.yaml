  career_goals: Jaritza often talks about growing up and helping others. She says she wants to be a teacher because she enjoys sharing what she learns and keeping the classroom organized. She also imagines
    becoming a veterinarian, inspired by her love for animals and her caring nature. Occasionally she mentions wanting to help in the kitchen like her mother, dreaming of being a chef who prepares both
    Ecuadorian and American dishes. Underlying all these ideas is her desire to use her bilingual skills to support her community, perhaps as a translator or community organizer who keeps things running
    smoothly.
