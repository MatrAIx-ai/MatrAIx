personas:
  professional: Jaritza Munoz, a budding LEGO architect, channels their love for step-by-step instructions and tidy organization into constructing intricate brick models that showcase their practical, dependable
    nature even at kindergarten age.
  sports: Jaritza Munoz, a lively participant on the Riverdale Rockets kids' soccer team, loves the weekend match against the Midtown Tigers and balances their energetic tag games in the park with a structured
    practice schedule that mirrors their need for routine.
  arts: Jaritza Munoz, an avid doodler of animal and family scenes, keeps their crayons sorted by color, draws inspiration from the bold illustrations of Eric Carle, and dances to the upbeat rhythms of
    the Kids' Salsa Band while listening to traditional songs their grandparents play during family gatherings.
  travel: Jaritza Munoz, an inquisitive little explorer, enjoys weekend trips to the nearby zoo where they can see real lions and giraffes, dreams of visiting Disney World in Orlando, and prefers to plan
    their outings with a colorful map sticker sheet that satisfies their love for order.
  culinary: Jaritza Munoz, a budding chef in their mom's kitchen, delights in stirring batter for fluffy strawberry pancakes, skillfully cinches cinnamon into their homemade apple crumble, and proudly serves
    their family a plate of cheesy macaroni that they decorated with tiny broccoli trees.
  core: Jaritza Munoz is a meticulous, creativity-driven six-year-old who balances structured play with bursts of musical dance, occasional forgetfulness about bedtime, and a budding love for organized
    savings and tiny culinary triumphs, and they constantly strive to keep their world neatly arranged.
background:
  cultural: Jaritza grows up in a close‑knit Ecuadorian family in the vibrant Queens neighborhood of Corona. Spanish is spoken at home, and her parents make it a priority that she hears and uses both Spanish
    and English daily, giving her a strong bilingual foundation. Family gatherings often feature traditional dishes such as empanadas, ceviche, and plantain patties, and celebrations like Carnaval and Ecuador's
    Independence Day are marked with music, dancing, and colorful decorations. Her grandparents share stories and folk songs from Ecuador, which she loves to sing along with. The local Latino community
    center offers cultural workshops and bilingual story hours that she attends regularly, reinforcing her connection to her heritage while she navigates the multicultural environment of New York City.
