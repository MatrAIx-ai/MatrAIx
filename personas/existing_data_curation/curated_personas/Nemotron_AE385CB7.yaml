  career_goals: William loves stories about building things and exploring space, so he often says he wants to become a firefighter, an astronaut, or a builder when he grows up. He imagines designing rockets
    that can rescue people, combining his curiosity about the world with a practical desire to help others. His competitive streak leads him to aim for being the “best” at building the tallest LEGO tower
    or the fastest in a backyard obstacle course, showing early ambition toward roles that involve problem‑solving, teamwork, and hands‑on work.
