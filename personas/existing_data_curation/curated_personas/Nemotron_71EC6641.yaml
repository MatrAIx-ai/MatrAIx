personas:
  professional: Jamal Staton, a budding junior engineer, channels their curiosity and disciplined organization into designing intricate LEGO spacecraft, drafting colorful rocket sketches, and dreaming of
    a future in aerospace design.
  sports: Jamal Staton energizes the Greensboro Youth Soccer Club’s U9 squad as a forward, eagerly attending after‑school practice, fiercely defending team goals, while cheering for North Carolina FC and
    committing to weekend games that blend teamwork with their love for strategic play.
  arts: Jamal Staton, inspired by the vibrant cityscapes of Claude Monet, the dynamic comic panels of Alex Ross, and the modern beats of Kendrick Lamar and Miles Davis, channels those influences into radiant
    rocket drawings and exuberant LEGO dioramas while actively participating in the school art club.
  travel: Jamal Staton relishes day trips to the Greensboro Science Center and occasional family road‑trips to Washington, D.C.’s National Air and Space Museum, while pinning the Kennedy Space Center of
    Florida as their ultimate travel goal, balancing school schedule constraints with a love for hands‑on exploration.
  culinary: Jamal Staton delights in cheesy pepperoni pizza, builds homemade tacos with shredded lettuce, diced tomatoes, and seasoned beef, and skillfully mixes chocolate‑chip cookie dough for weekend
    baking with mom, yet they are notorious for sneaking extra bites of ice‑cream during movie night.
  core: Jamal Staton combines a disciplined curiosity with a vibrant imagination, transforming every LEGO set, soccer practice, and sketchbook page into a stepping stone toward a future in creative engineering.
background:
  cultural: Jamal is a Black child growing up in Greensboro, North Carolina, a city with a rich civil‑rights legacy that includes the historic Greensboro sit‑ins. His family is deeply rooted in the African‑American
    community of Guilford County, where stories of resilience, community service, and education are passed down through church gatherings, holiday celebrations like Kwanzaa and Juneteenth, and Sunday‑school
    lessons. At home, he enjoys soul‑food staples such as collard greens, sweet potato pie, and mac‑and‑cheese, and music ranging from gospel to contemporary hip‑hop and jazz often fills the house. He participates
    in school activities that honor Black History Month, learns about local leaders such as civil‑rights activist Ella Baker, and draws inspiration from local Black artists and athletes. This cultural milieu
    nurtures his appreciation for art, curiosity about history, and a strong sense of belonging and pride.
