  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Reading adventure and space books'', ''Playing soccer'', ''School art club'', ''Visiting science museum'', ''Educational puzzle games'', ''Listening
    to hip‑hop and jazz'', ''Dancing'', ''Collecting stickers and trading cards'']'
  career_goals: Jamal dreams of becoming an astronaut because he is fascinated by the stars and believes his disciplined approach will help him succeed in the rigorous training. He also loves art and imagines
    creating large murals that celebrate his community, so he envisions a future as a space‑inspired visual artist or designer. His high standards drive him to aim for top grades, win his school’s science
    fair, and eventually study engineering or graphic design. The combination of leading projects, helping peers, and exploring both science and creativity points toward possible careers as a teacher, community
    organizer, or a future leader in a STEM field.
