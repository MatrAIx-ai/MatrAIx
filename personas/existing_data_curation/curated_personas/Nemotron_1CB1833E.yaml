  career_goals: Sandra often talks about growing up to be a veterinarian because she loves animals and wants to help them stay healthy. She also dreams of becoming an artist, using her love of drawing to
    create pictures that make people smile. Occasionally she imagines working as a science educator or researcher, where she could explore new ideas and share her curiosity with other children. She is determined
    to do well in school, maintain high standards, and one day lead projects that protect wildlife and inspire creativity in her community.
