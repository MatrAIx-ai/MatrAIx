  hobbies: '[''Reading literary fiction'', ''Book club leadership'', ''Hiking desert trails'', ''Yoga'', ''Salsa dancing'', ''Volunteering at community garden'', ''Theater attendance'', ''Watercolor painting'',
    ''Cooking southwestern cuisine'', ''Mentoring youth volunteers'']'
  career_goals: 'Looking ahead, Susan aims to launch a statewide mentorship program that supports adults over 50 in navigating second‑career transitions. She plans to author a guidebook titled "Second Act
    Careers: A Structured Guide for Adults Over 50," drawing on her practical counseling framework. Susan also seeks a senior advisory role with the Arizona Department of Education to shape policy around
    lifelong learning and workforce development. In addition, she wants to obtain a certification in gerontological counseling, expand her pro‑bono services for underserved communities, and eventually transition
    to part‑time consulting while continuing to mentor emerging counselors.'
