personas:
  professional: Susan Rockafellow, a veteran educational guidance counselor with a graduate background in arts and humanities, blends over two decades of structured, evidence‑based career counseling—using
    the Strong Interest Inventory and Myers‑Briggs Type Indicator—with an outgoing, community‑focused energy that fuels workshop design, grant writing, and the development of a statewide mentorship program
    for adults over 50.
  sports: Susan Rockafellow, an avid hiker on Sonoran desert trails, a loyal fan of the Phoenix Suns and Arizona Cardinals, a member of the Desert Trail Hikers club and the Phoenix Yoga Collective senior
    class, and a weekend salsa dancer, blends low‑impact endurance activities with spirited team fandom to stay physically engaged and socially connected.
  arts: Susan Rockafellow, who paints watercolors of desert landscapes inspired by Georgia O’Keeffe and Frida Kahlo, regularly attends Phoenix Theatre productions featuring improvisational works, leads
    a book club that discusses classics by Jane Austen and memoirs by Maya Angelou, and enjoys the music of Carlos Santana, weaving artistic appreciation into both her counseling empathy and personal leisure.
  travel: Susan Rockafellow, who plans trips with detailed itineraries that balance cultural immersion and comfortable pacing, has explored the Grand Canyon, Sedona’s red rocks, and Santa Fe’s art scene,
    and hopes to visit Florence, Italy, and the Canadian Rockies, all while budgeting for senior discounts and family visits.
  culinary: Susan Rockafellow, a home‑cooking enthusiast, turns southwestern staples like green chile enchiladas, prickly pear salsa, and roasted cactus tacos—seasoned with cumin, coriander, and fresh cilantro—into
    weekly family meals, while experimenting with side dishes such as quinoa‑lime pilaf, demonstrating a competent yet adventurous kitchen skill set.
  core: Susan Rockafellow blends methodical career counseling, community‑driven activism, and a zest for desert‑inspired art and cuisine into a balanced, socially vibrant life that embraces structure, compassion,
    and a touch of spontaneous salsa.
background:
  cultural: Susan was born and raised in a small Midwestern town in Iowa to parents of German and Irish descent, instilling in her a work ethic and community‑oriented values typical of the region. After
    completing her arts and humanities degree, she relocated to Phoenix in her early thirties, where she embraced the diverse cultural fabric of the Southwest. She respects and actively engages with Native
    American and Latino communities, incorporating multicultural perspectives into her counseling practice. While she identifies as a white American, Susan celebrates her European heritage through family
    gatherings and cuisine, and she continually seeks to blend those traditions with the vibrant, inclusive culture of her adopted home.
attributes:
  skills: '[''Career Counseling'', ''Individual Advising'', ''Group Facilitation'', ''Career Assessment Interpretation'', ''Workshop Design'', ''Program Development'', ''Data Analysis and Outcome Tracking'',
