  career_goals: Nhu aims to transition from day‑to‑day fundraising to a senior advisory role where he can mentor emerging fundraisers and shape strategic fundraising plans for regional arts institutions.
    He also seeks to secure a legacy endowment for a local Asian cultural center, ensuring sustainable support for future generations. While planning for eventual retirement, he intends to stay active on
    nonprofit boards to leverage his network and experience.
