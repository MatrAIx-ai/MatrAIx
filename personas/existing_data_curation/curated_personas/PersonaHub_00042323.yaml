persona_description: A historian interested in the archaeology of early medieval England, particularly in the period from about 400 to 700. This person is knowledgeable about the subject matter and seeks
  to understand the patterns and interpretations of archaeological evidence. They are interested in learning about the migration of peoples from northern Germany and southern Scandinavia and how it shaped
  the landscape of early England. This person is likely to be interested in the author's explanations of how the archaeological evidence is interpreted and the application of historical and archaeological
  sources to specific questions. They may also be interested in the author's frequent references to the historical evidence and the inclusion of maps, plans, reconstructions, and photographs in the book.
