  hobbies: '[''Succulent and cactus gardening'', ''Crocheting'', ''Listening to classic country music'', ''Reading mystery novels'', ''Church volunteering'', ''Morning walks in the foothills'', ''Attending
    community theater'', ''Journaling'']'
  career_goals: Juliene aims to leverage her extensive housekeeping background into a supervisory or managerial position within a hotel or property‑management company in Tucson. She plans to obtain a certification
    in green cleaning and complete a GED program to broaden her career options. Over the next five years, she hopes to become a lead housekeeper or operations coordinator, overseeing a small team, improving
    efficiency, and mentoring new employees. Long‑term, she envisions starting her own boutique cleaning service focused on environmentally‑responsible practices, allowing her to provide a stable income
    for her family while maintaining a predictable work schedule.
