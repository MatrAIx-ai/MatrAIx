  career_goals: Andre aims to leverage his operational expertise to become a senior operations manager within the next two years, focusing on scaling process efficiencies across multiple business units.
    His longer‑term ambition is to step into a director of operations role and eventually serve as Chief Operating Officer, where he can shape organizational strategy and drive a culture of data‑enabled
    excellence. He is also interested in establishing his own operational consulting firm, specializing in helping tech‑forward startups implement lean, automated processes. Throughout his career progression,
    he seeks to develop stronger leadership capabilities, broaden his strategic planning acumen, and build resilience against stress through structured mentorship and ongoing professional development.
