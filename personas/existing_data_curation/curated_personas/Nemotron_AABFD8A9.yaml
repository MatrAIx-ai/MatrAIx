personas:
  professional: Mack Brown is a one‑year‑old budding explorer, whose innate curiosity and love for bright picture books turn every playtime into a miniature research lab where they experiment with cause‑and‑effect,
    showcasing early problem‑solving skills despite a relaxed, sometimes disorganized approach to toys.
  sports: Mack Brown energetically crawls and participates in a toddler gymnastics class at the community center, cheers on the city's Major League Baseball team during family outings, and enjoys splashing
    in a baby swim group, embodying a sociable, flexible approach to fitness that blends organized play with spontaneous backyard races.
  arts: Mack Brown shows a bright appreciation for art by gazing at Eric Carle's vivid illustrations, humming Raffi's 'Baby Beluga', and clapping along to the lively tunes of Disney's 'Let It Go', turning
    everyday moments into expressive, playful performances.
  travel: Mack Brown prefers spontaneous family trips, having delighted in the sensory wonders of the San Diego Zoo and the gentle waves of a beach day in Maui, while their parents' low‑stress planning
    lets them wander at a leisurely pace, avoiding rigid itineraries.
  culinary: Mack Brown enjoys finger foods like ripe banana slices, avocado mash, and steamed carrot purees, favoring mild flavors like sweet potato and apple sauce, and while they cannot cook, they delight
    in choosing between a soft cheese stick or a crunchy teething biscuit at mealtime.
  core: Mack Brown is a curious one‑year‑old who blends relentless exploration with a laid‑back attitude, often leaving a trail of toys while enthusiastically testing every texture and sound they encounter.
background:
  cultural: Mack is raised in a white, middle‑class family in Pittsburgh, Pennsylvania, an area where Midwestern friendliness meets the cultural vibrancy of a major city. His family participates in typical
    American holidays such as Thanksgiving and Christmas, and they frequently visit local attractions like the Carnegie Museum of Art and the Phipps Conservatory, fostering an early appreciation for creativity.
    Community events, including neighborhood festivals and occasional Steelers football games, shape his social experiences. The household values community involvement, educational enrichment, and open‑minded
    curiosity, encouraging Mack to explore new ideas while staying connected to his local roots.
