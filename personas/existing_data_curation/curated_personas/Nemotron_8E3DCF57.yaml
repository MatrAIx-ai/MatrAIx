personas:
  professional: Edwin Leary, a seasoned fast‑food operations specialist with three decades of high‑volume counter‑service experience, leverages their curiosity for new POS technologies and meticulous cost‑control
    mindset to train staff, streamline line speed, and they are poised to move into a shift‑lead or assistant‑manager role within two years while pursuing ServSafe and food‑service manager certifications.
  sports: Edwin Leary, an enthusiastic supporter of the New Orleans Saints and New Orleans Pelicans who joins the Friends of Bayou Teche Fishing Club for weekend outings, participates in a low‑impact senior
    pickleball league, and they avoid strenuous activities due to knee sensitivity.
  arts: Edwin Leary, an aficionado of classic R&B and jazz who spins Otis Redding, Aretha Franklin, and John Coltrane on a vintage turntable while also savoring local Zydeco legends like Clifton Chenier,
    channels that musical rhythm into woodworking projects that echo regional folk craftsmanship, and they find solace in the soulful melodies that accompany their solitary evenings.
  travel: Edwin Leary, a modest traveler who annually plans a weekend road‑trip to New Orleans for Mardi Gras parades, schedules quiet retreats at a bayou cabin in Natchitoches, dreams of visiting the historic
    town of St. Francisville to explore its Creole culinary roots, and they balance a limited travel budget with their spouse’s preferences, opting for short, purposeful getaways over prolonged vacations.
  culinary: Edwin Leary, a dedicated home cook who perfects gumbo with fresh okra from their garden, crafts a rich roux for shrimp étouffée, adds a pinch of smoked paprika to jambalaya, relishes fried catfish
    sandwiches seasoned with Cajun spice, and they occasionally over‑season dishes when experimenting with new flavor twists.
  core: Edwin Leary, a reserved yet curious veteran of the fast‑food world who blends a love for zydeco rhythms, meticulous cost‑saving habits, and a quiet ambition to mentor the next generation while quietly
    battling a penchant for vintage record hunting, and they embody steady resilience and understated community spirit.
background:
  cultural: Edwin is an African‑American raised in Opelousas, Louisiana, a region where Creole, Cajun, and Southern Black traditions intertwine. His family has deep roots in the local church, which provides
    social support and a venue for community gatherings. He grew up immersed in the sounds of zydeco and bounce music, the aromas of gumbo simmering on Sunday afternoons, and the vibrant parades of Mardi
    Gras Indians. These cultural threads shape his culinary tastes, his appreciation for rhythmic music, and his sense of community responsibility. While he respects the broader African‑American heritage
    of resilience and solidarity, he also identifies with the unique multicultural fabric of St. Landry Parish, celebrating local festivals, supporting neighborhood initiatives, and passing on stories of
    his ancestors to younger relatives.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''Food Safety Compliance'', ''Point-of-Sale System Operation'', ''Inventory Management'', ''Team Coordination'', ''Problem Solving'', ''Basic Cooking
