personas:
  professional: Jason Grau is a seasoned social worker who fuses trauma‑informed care with a curiosity for creative expression, designing community art‑therapy workshops, securing grant funding, and mentoring
    emerging practitioners, all while their laid‑back attitude toward planning sometimes leads to missed deadlines.
  sports: Jason Grau enjoys hiking the Buffalo Bayou trails on weekends, occasionally joins a local running club for 5K runs, loyally follows the Houston Astros, Rockets, and Dynamo, and participates in
    a community recreational soccer league, using physical activity as a stress‑relief outlet despite occasional lapses caused by worry and a laid‑back approach to scheduling.
  arts: Jason Grau immerses themselves in Houston’s vibrant arts scene by volunteering as a docent at the Museum of Fine Arts, sketching watercolor cityscapes, attending live shows by Leon Bridges and improvised
    comedy at The Comedy Spot, curating community art walks, and drawing inspiration from local painters like Megan Hwang, all while organizing board‑game nights that blend social connection with creative
    play.
  travel: Jason Grau favors spontaneous yet purposeful travel, having explored New Orleans for its jazz and cuisine, Santa Fe’s art galleries, Oaxaca’s street food, and Austin’s music festivals, while dreaming
    of strolling Barcelona’s Gaudí architecture, typically using credit‑card points and a modest travel budget, though they sometimes delay booking due to their relaxed planning style.
  culinary: Jason Grau delights in Houston’s eclectic food‑truck offerings, regularly savoring pho, tacos al pastor, bánh mì, and shrimp po’boy, while at home they experiment with turmeric‑infused roasted
    beet salads and homemade salsa, displaying intermediate cooking skills that blend fresh herbs and bold spices, yet they can be indecisive about menu choices when overwhelmed by options.
  core: Jason Grau is a 56‑year‑old socially driven art advocate who channels anxiety into community creativity, balances a love for spontaneous food‑truck feasts with occasional budgeting slip‑ups, and
    embraces a relaxed, curiosity‑fuelled approach to both work and life.
background:
  cultural: Jason grew up in a middle‑class, Anglo‑American family on the outskirts of Houston, where Southern hospitality mingled with the city’s multicultural rhythm. His early years were shaped by family
    traditions such as holiday gatherings and community church events, while his teenage years exposed him to Houston’s rich mosaic of Hispanic, African‑American, and Asian cultures. Attending the University
    of Houston’s College of Liberal Arts broadened his perspective, fostering an appreciation for global art and social justice. This blend of Southern roots, academic curiosity, and daily immersion in
    Houston’s diverse neighborhoods informs his inclusive approach to social work and his passion for using art to bridge cultural gaps.
attributes:
  skills: '[''Case Management'', ''Trauma‑Informed Care'', ''Community Outreach'', ''Arts‑Based Intervention Design'', ''Grant Writing'', ''Group Facilitation'', ''Conflict Resolution'', ''Cross‑Cultural
    Communication'', ''Digital Storytelling'', ''Program Development'']'
  hobbies: '[''Gallery Visits'', ''Live Music and Improv Shows'', ''Volunteer Docent Work at Museum of Fine Arts'', ''Sketching and Watercolor Painting'', ''Organizing Community Art Walks'', ''Board‑Game
    Nights'', ''Exploring Food Trucks and World Cuisine'', ''Hiking along Buffalo Bayou'', ''Reading Contemporary Fiction and Philosophy'', ''Writing Poetry'']'
  career_goals: Jason aims to expand the impact of arts‑based mental health services in Houston by establishing a city‑wide community art‑therapy initiative for underserved populations. Over the next five
    years, he plans to earn his LCSW licensure, secure a leadership role as Program Director of a nonprofit that integrates art and social services, and develop a sustainable grant‑funded model that can
    be replicated in other Texas cities. He also hopes to mentor younger social workers, publish articles on creative therapeutic approaches, and ultimately influence local policy to recognize the value
    of cultural programming in public health.
