persona_description: A teacher or educator who is passionate about teaching and learning English language and culture, particularly in a classroom setting. They are experienced in using a variety of teaching
  methods and resources to engage students in active learning and practice of English language skills. They are skilled in creating fun and engaging activities and games to help students practice present
  perfect tense, yet and already, and other English language concepts. They are also knowledgeable in using discussion questions and other methods to help students improve their pronunciation and speaking
  skills. They are aware of the importance of TTT and STT in the classroom and are skilled in incorporating both methods into their teaching. They are also skilled in using images and other visual aids
  to enhance their teaching.
