persona_description: Karl Raimund Popper, a British philosopher, logician, and historian of science, who is best known for his rejection of the inductive method of reasoning in the empirical sciences and
  his theory of falsifiability. Popper was born in Vienna, Austria, on July 28, 1902, and attended the University of Vienna, receiving his Ph.D. there in 1928. He taught in secondary schools in Vienna for
  a time, and then in 1937 he moved to New Zealand, where he taught philosophy at Canterbury University College until 1945. From 1945 until his retirement in 1969, he headed the department of philosophy,
  logic, and scientific method at the London School of Economics in England. He also lectured widely both in Great Britain and in the United States. Popper's publications include a number of periodical
  articles and several books, and he was knighted in 1965.
