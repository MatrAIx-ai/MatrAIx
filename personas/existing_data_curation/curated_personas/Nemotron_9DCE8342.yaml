  hobbies: '[''gardening'', ''reading historical biographies'', ''vegetarian cooking and recipe development'', ''knitting'', ''crocheting'', ''birdwatching'', ''puzzle solving (crosswords, sudoku)'', ''digital
    photography'', ''light yoga/stretching'', ''attending small cultural gatherings'']'
  career_goals: Although not seeking formal employment, Savitria aims to deepen her impact within the Jain community by taking on a leadership role in organizing cultural festivals and educational workshops.
    She aspires to compile a family cookbook that blends traditional recipes with modern twists, hoping to publish it for the broader diaspora. Additionally, she plans to establish a small neighborhood
    garden that supplies fresh produce to seniors and low‑income families, and she wishes to mentor younger South Asian women on financial stewardship and practical life skills. A personal ambition is to
    travel to India for a pilgrimage to Shikharji, strengthening her spiritual connection to Jain heritage.
