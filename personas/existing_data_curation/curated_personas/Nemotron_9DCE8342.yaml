personas:
  professional: Savitria Jain, a seasoned community volunteer leader, leverages her budgeting expertise, event coordination skills, and pragmatic calm to orchestrate cultural festivals and educational workshops,
    while her competitive streak drives her to ensure every detail runs smoothly despite a relaxed attitude toward strict planning.
  sports: Savitria Jain favors low‑impact activities, joining a senior walking club for weekly park strolls, cheering on the Coastal Mariners baseball team during the summer season, and practicing gentle
    yoga sessions to maintain flexibility and comfort.
  arts: Savitria Jain curates a small collection of Annie Leibovitz photographs for inspiration, enjoys the folk melodies of Joan Baez while knitting, and attends occasional performances by the City Ballet
    Company, finding these artistic experiences integral to her creative rhythm.
  travel: Savitria Jain prefers modestly paced, well‑researched trips, having explored historic cities such as Florence and Kyoto, and now dreams of a pilgrimage to a revered hilltop sanctuary in her ancestral
    homeland, balancing spiritual yearning with budget‑conscious travel planning.
  culinary: Savitria Jain delights in crafting inventive vegetarian dishes, such as a spiced lentil stew enriched with heirloom carrots and turmeric, a roasted cauliflower tossed with mustard seeds and
    fresh cilantro, and frequently experiments with seasonal produce to create a fusion menu that honors tradition while embracing local flavors.
  core: Savitria Jain is a quietly competitive, curiosity‑driven gardener‑chef who channels disciplined budgeting into community service, while habitually losing hours to heirloom seed research and hand‑crafted
    gifts.
background:
  cultural: Savitria is a first‑generation Indian-American of Gujarati Jain heritage. Her upbringing emphasized non‑violence, education, and community service, values that continue to shape her lifestyle.
    She observes traditional Jain festivals such as Paryushan, Mahavir Jayanti, and Diwali, adhering to a strict vegetarian diet and participating in charitable food distribution events. While fully integrated
    into American society in Falls Church, VA, she maintains linguistic ties through Gujarati conversation with relatives and attends a nearby Jain temple where she volunteers. Her cultural identity blends
    Indian customs—such as kitchen rituals, devotional music, and respect for elders—with the flexibility and individualism of her adopted community.
