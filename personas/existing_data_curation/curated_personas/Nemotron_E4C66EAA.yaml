  career_goals: He aims to become a senior industrial engineer with a specialization in health and safety, eventually advancing to a director of safety or operations role in a mid‑size manufacturing firm.
    Over the next five years, Charles plans to earn the Certified Safety Professional (CSP) credential and complete an MBA to enhance his strategic leadership capabilities. He is eager to pioneer the integration
    of Industry 4.0 technologies—such as IoT sensors and AI‑driven predictive maintenance—into safety programs. Long‑term, he envisions founding a consultancy that helps regional manufacturers adopt sustainable,
    safe, and data‑driven processes while mentoring the next generation of engineers.
