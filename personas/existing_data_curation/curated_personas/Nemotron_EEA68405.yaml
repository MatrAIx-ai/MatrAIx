personas:
  professional: Steven Mullinax is an aspiring digital illustrator and budding game programmer, blending their love of cartoon art with the logical problem‑solving honed from chess and Scratch, and they
    channel their competitive streak into perfecting pixel‑perfect designs while maintaining a tidy workflow.
  sports: Steven Mullinax enjoys weekend hikes along the Connetquot River State Park trails, plays on a local U12 soccer team that dons the blue and white of the New York City FC academy, follows the New
    York Mets and New York Knicks with competitive enthusiasm, and they keep a disciplined jog schedule that occasionally yields to extra Minecraft building marathons.
  arts: Steven Mullinax channels a love for classic comic strips like Calvin and Hobbes and the vibrant storytelling of Studio Ghibli into digital creations, they devour sci‑fi and fantasy novels by Brandon
    Sanderson and Neil Gaiman while watching art‑history documentaries on Van Gogh, and they draw inspiration from their guitar instructor’s rendition of The Beatles’ “Yesterday.”
  travel: Steven Mullinax prefers short family road trips to coastal spots like Fire Island and Montauk, enjoys structured museum tours at the Museum of Modern Art in New York City, dreams of a future adventure
    to Tokyo’s Akihabara to explore anime culture and to Iceland’s waterfalls for a blend of high‑tech wonder and natural awe.
  culinary: Steven Mullinax loves pepperoni pizza with extra mozzarella and a dash of fresh basil, often experiments with avocado sushi rolls at home using seasoned rice and soy sauce, and they proudly
    whip up weeknight spaghetti carbonara with pancetta and parmesan despite their limited kitchen experience.
  core: Steven Mullinax is a relentlessly curious 12‑year‑old who balances a competitive drive in chess and video games with a quiet love for sketching fantastical worlds, occasionally hoarding spare change
    for art supplies while forgetting to water their indoor plants.
background:
  cultural: Steven grows up in Great River, a suburban community in Suffolk County on Long Island. His family identifies as white American, with roots in various European ancestries that have blended into
    a broadly American cultural identity. The area’s proximity to New York City exposes him to a vibrant arts scene, while local institutions such as the Great River Library, Long Island Museum, and community
    parks provide regular opportunities for cultural enrichment. He participates in typical American traditions—school events, holiday celebrations, and community volunteer projects—while also benefiting
    from the diverse cultural fabric of the broader Long Island region, which includes influences from neighboring ethnic groups, regional cuisine, and seasonal festivals.
