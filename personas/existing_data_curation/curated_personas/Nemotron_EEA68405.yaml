  career_goals: Steven aspires to merge his love for art and technology by pursuing a career in interactive media, such as video game design, digital illustration, or multimedia storytelling. He plans to
    apply to a high‑school arts program on Long Island, build a strong portfolio of sketches, digital art, and coding projects, and eventually study computer science and visual arts at a university. His
    ultimate ambition is to create immersive, narrative‑driven experiences that challenge conventional perspectives and earn recognition in both artistic and tech communities.
