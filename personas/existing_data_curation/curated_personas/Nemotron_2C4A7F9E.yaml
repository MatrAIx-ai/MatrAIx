  career_goals: Robert aims to transition from subcontractor to owner‑operator of a small painting and paperhanging business that specializes in historic home restoration throughout the Baltimore area.
    He plans to obtain a state contractor’s license and certifications in eco‑friendly paint application and lead‑paint safety. By building a reputation for reliable, high‑quality work and personable service,
    he hopes to secure steady contracts from homeowners and property managers, providing financial stability for his family. He also wants to mentor apprentices, passing on his blend of practical skill
    and willingness to explore new techniques.
