  hobbies: '[''Puzzle Solving'', ''Chess'', ''Vegetable Gardening'', ''Hiking'', ''Traditional Punjabi Cooking'', ''STEM Outreach Volunteering'', ''Small Data Science Meetups'']'
  career_goals: Daljit aims to lead interdisciplinary research initiatives that bridge theoretical mathematics with real‑world applications, particularly in environmental modeling and public‑policy analysis.
    He seeks to publish influential papers, secure a senior advisory position where he can guide data‑driven decision making, and establish a structured mentorship program for emerging South‑Asian scientists
    in the Pacific Northwest. Over the next five years, he hopes to transition into a consulting role that leverages his analytical depth while allowing him to shape strategic direction for technology firms
    and government agencies.
