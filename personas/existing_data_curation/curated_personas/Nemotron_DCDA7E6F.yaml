  hobbies: '["Drawing", "Painting", "Reading adventure and fantasy books", "Building LEGO sets", "Solving jigsaw puzzles", "Nature walks", "Listening to music (R&B, hip‑hop, gospel)", "Attending library
    storytime", "Creating digital illustrations on a tablet", "Participating in small‑group art workshops"]'
  career_goals: Shamanda dreams of blending her love for art and curiosity about the world into a future career that allows her to create and share stories. She imagines becoming an illustrator or a museum
    curator who can bring diverse cultural narratives to life, or perhaps a scientist‑artist who designs interactive exhibits. She is eager to continue learning, develop her drawing skills, and explore
    science through hands‑on projects, hoping to inspire others while staying true to her creative and inquisitive spirit.
