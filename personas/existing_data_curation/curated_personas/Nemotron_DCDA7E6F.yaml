personas:
  professional: An aspiring junior illustrator, Shamanda Davis channels their curiosity and organized yet flexible approach into detailed drawings of fantasy scenes, often sharing their artwork during library
    art workshops where they confidently take on small leadership roles while still enjoying quiet solo sketching.
  sports: An enthusiastic participant in the neighborhood Junior Soccer League and occasional fan of the local minor league baseball team the River City Ducks, Shamanda Davis enjoys light jogging during
    family walks, prefers team practices with a small group of friends, and watches weekend games with a keen eye for strategy, while they also dabble in casual badminton at the community center.
  arts: A vibrant art aficionado, Shamanda Davis draws inspiration from illustrators like Quentin Blake and Yayoi Kusama, loves listening to R&B artist HER, hip-hop beats of Kendrick Lamar, and gospel singer
    Kirk Franklin while dancing quietly in their room, and regularly attends library storytime and small-group art workshops where they experiment with watercolor and charcoal.
  travel: A curious explorer of both nearby and far-flung destinations, Shamanda Davis loves weekend nature walks in the nearby state park, dreams of visiting the Grand Canyon's rim, hopes to see the Giant
    Sequoias in California's Sequoia National Park, and enjoys family road trips to the aquarium in Monterey, always packing a sketchbook to capture the scenes, while they plan each journey with a mix of
    spontaneity and carefully drawn itineraries.
  culinary: A budding home chef, Shamanda Davis frequently mixes peanut butter and honey on toast, prides themselves on making perfect macaroni and cheese with a blend of cheddar and mozzarella, delights
    in assembling colorful fruit kebabs with strawberries, grapes, and pineapple, and occasionally adds a dash of cinnamon to oatmeal, though they sometimes burn the toast when distracted.
  core: Shamanda Davis is a quietly confident eight-year-old with a boundless imagination, a habit of saving spare change in a piggy bank, a love for sketching fantastical worlds, and a quirky tendency
    to hum gospel tunes while they solve jigsaw puzzles.
background:
  cultural: Shamanda is raised in a close‑knit African‑American family in Romeo, Michigan. Her household celebrates cultural traditions such as storytelling, music, and community gatherings, and she often
    hears tales of her ancestors and contemporary Black creators. She participates in school and community events that honor African‑American history, including Juneteenth celebrations and Black History
    Month projects. Her parents encourage her to explore both her cultural roots and the diverse world around her, fostering a sense of pride, resilience, and open‑minded curiosity.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Drawing and sketching", "Painting", "Digital media navigation (tablet usage)", "LEGO building and basic robotics", "Storytelling and creative writing",
