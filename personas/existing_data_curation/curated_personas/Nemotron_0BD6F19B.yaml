personas:
  professional: Acacia Hughes is a seasoned manufacturing technician who expertly reads technical drawings, operates CNC machines, welds components, and conducts quality‑control inspections, while leveraging
    her sociable, routine‑loving nature to train new hires, mediate floor conflicts, and keep production humming on schedule.
  sports: Acacia Hughes enjoys low‑impact exercise like weekend walks through her community garden and occasional church softball games, while energetically cheering on the Cleveland Guardians in baseball
    and the Cleveland Browns during football season, and she occasionally follows the Cleveland Cavaliers for a dose of basketball excitement.
  arts: Acacia Hughes finds joy singing gospel in her church choir, listening to the soulful harmonies of The Staves, escaping with classic sitcoms like "Friends" and "The Golden Girls," and reading light
    romance novels by Nora Roberts during her book‑club meetings.
  travel: Acacia Hughes favors short, budget‑friendly road trips to nearby state parks such as Shenandoah National Park and weekend stays at the historic Biltmore Estate, while dreaming of a future Mediterranean
    cruise to the Amalfi Coast for a blend of relaxation and cultural immersion.
  culinary: Acacia Hughes is a confident baker who whips up classic apple pie with a flaky lattice crust and chewy chocolate‑chip cookies, while also seasoning roasted chicken with fresh rosemary and thyme
    from her garden and delighting in a hearty chicken pot pie on chilly evenings.
  core: Acacia Hughes blends a love for routine, community, and hands‑on creation—whether welding a metal bracket or frosting a pie—while occasionally overcommitting socially and letting her calendar slip,
    yet always landing on her feet with a smile.
background:
  cultural: Acacia grew up in the suburban neighborhoods of the Dallas‑Fort Worth metroplex, within a predominantly Anglo‑American, middle‑class family. Her upbringing emphasized hard work, reliability,
    and close family ties, reflecting mainstream American and Texan values. She celebrates holidays such as Thanksgiving, Fourth of July barbecues, and Easter with community church traditions. While Plano’s
    growing multicultural environment introduces her to diverse perspectives, her own cultural identity is rooted in traditional American customs, with a fondness for country music, Southern comfort food,
    and community gatherings.
attributes:
  skills: '[''Mechanical assembly'', ''Fabrication and welding'', ''Blueprint interpretation'', ''Hand tool operation'', ''Basic CNC machine operation'', ''Quality control inspection'', ''Safety compliance'',
