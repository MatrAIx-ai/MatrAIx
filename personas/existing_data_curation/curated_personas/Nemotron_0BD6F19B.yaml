  hobbies: '[''Baking pies and cookies'', ''Gardening (vegetables and flowers)'', ''Church choir participation'', ''Volunteering at community events'', ''Watching classic sitcoms'', ''Book‑club meetings
    (light romance novels)'', ''DIY home improvement projects'', ''Board game nights with friends and family'', ''Casual karaoke sessions'']'
  career_goals: Acacia aims to transition into a supervisory role within the next few years, leveraging her reliability and people‑skills to become a shift lead or team supervisor. She plans to enroll in
    a part‑time Production Management certificate program at a local community college to formalize her knowledge of lean manufacturing and staff leadership. Over the longer term, she hopes to mentor younger
    workers and possibly launch a modest home‑based custom metal‑fabrication side business that can operate on a predictable schedule, allowing her to maintain the routine she values while providing extra
    income for her family.
