personas:
  professional: Tamara Oh is a seasoned real‑estate broker in Bradenton who blends meticulous market analysis with a curiosity for emerging green‑home technology, using her negotiation savvy and basic Spanish
    to guide senior clients through compassionate relocations while mentoring new agents and planning a boutique division focused on age‑friendly housing.
  sports: Tamara Oh paddles the Gulf on a stand‑up board each sunrise, participates in a local kayaking club, practices yoga twice a week for flexibility, and roots for the Tampa Bay Buccaneers and the
    Miami Marlins while occasionally playing bridge at the community center.
  arts: Tamara Oh captures the pastel hues of Gulf sunsets and historic downtown architecture through her DSLR, curates a modest collection of Mediterranean vinyls ranging from Andrea Bocelli to Cesária Evora,
    and volunteers as a photographer at community art fairs where she also crochets blankets inspired by the patterns of local sea shells.
  travel: Tamara Oh prefers a blend of planned itineraries and spontaneous detours, revisiting the historic streets of Seville and the sun‑kissed islands of the Florida Keys while dreaming of a future sailing
    voyage to the Greek Cyclades, always traveling light with her reusable tote and a camera for impromptu shots.
  culinary: Tamara Oh enjoys cooking Mediterranean meals such as Greek moussaka, Italian seafood risotto, and Spanish paella, often using fresh herbs from her tropical garden like basil and oregano, and
    she skillfully balances home‑cooked dinners with occasional brunches at the beachfront café that serves avocado toast.
  core: Tamara Oh is a compassionate real‑estate broker who blends coastal creativity with senior‑focused housing expertise, while juggling a garden, a kayak, and an ever‑growing collection of seashells
    that she insists on cataloguing before bedtime.
background:
  cultural: Tamara is a white American of German and Irish ancestry who grew up in a mid‑western suburban community before relocating to the Gulf Coast. Her upbringing emphasized self‑reliance, modesty,
    and a strong sense of neighborly support. In Bradenton, she has embraced the Southern coastal culture—valuing hospitality, outdoor recreation, and community involvement. She is an active member of a
    non‑denominational Christian church, celebrates traditional holidays such as Thanksgiving and Christmas, and participates in local festivals that reflect Florida’s multicultural fabric. While proud
    of her heritage, she remains open and inclusive, integrating diverse cultural practices into her personal and professional life to better serve a broad client base.
