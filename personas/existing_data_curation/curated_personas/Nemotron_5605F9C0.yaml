  hobbies: '["Gardening", "Kayaking", "Beachcombing", "Reading historical fiction", "Cooking Mediterranean cuisine", "Volunteering at food bank", "Habitat for Humanity", "Attending art fairs", "Yoga", "Birdwatching",
