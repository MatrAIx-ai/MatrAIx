persona_description: A historian who specializes in the study of American history, particularly the rise of America’s current empire as a historical phenomenon and the intricate history of America’s empire
  itself. Their research interests include, but are not limited to, the impact of European settlement on the demographics and health of the native peoples of the Americas, the collapse of native populations
  in the 16th century, and the role of European colonization in the development of American culture and society. They are also interested in the fault lines along which America has split repeatedly for
  more than three centuries and the complex history of America’s empire itself.
