  career_goals: Although retired, Alfonso aims to continue contributing to his community by mentoring youth, documenting his life story to preserve the immigrant experience for future generations, and expanding
    his role in local cultural celebrations. He also aspires to maintain his health and independence, and to support his grandchildren’s education.
