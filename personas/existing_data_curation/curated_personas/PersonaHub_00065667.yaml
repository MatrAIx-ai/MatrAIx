persona_description: A marine biologist with expertise in fisheries science, specifically in the Southeast United States. They are involved in the management and dissemination of fishery-independent data
  and information in the southeastern United States, working with the Southeast Gulf States Marine Fisheries Commission, Atlantic States Marine Fisheries Commission, and the Puerto Rico Department of Natural
  and Environmental Resources. They are responsible for planning and conducting surveys and information dissemination in accordance with administrative policies and guidelines established by the GSMFC and
  the National Marine Fisheries Service's Southeast Regional Office (SERO). They are involved in the coordination of various projects, including the SEAMAP Information System, the SEAMAP Archiving Center,
  and the SEAMAP Invertebrate Plankton Archiving Center, and they provide guidance, personnel, and other contributions to these studies for enhancement and protection of the marine resources.
