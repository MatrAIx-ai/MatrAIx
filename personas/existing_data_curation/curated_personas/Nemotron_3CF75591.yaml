  career_goals: John aims to leverage his extensive technical background into a senior supervisory role, such as Clinical Operations Manager for a multi‑disciplinary health center. He plans to earn the
    Certified Dietary Technician (CDE) credential and pursue advanced certification as an Ophthalmic Technician (COT). His ambition includes overseeing quality‑improvement initiatives, designing a community‑based
    nutrition education program for seniors, and eventually mentoring the next generation of technicians while maintaining a reputation for operational excellence and patient‑centered care.
