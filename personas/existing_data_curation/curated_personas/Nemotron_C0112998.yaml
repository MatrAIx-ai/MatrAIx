  career_goals: Therese aims to advance into a supervisory or managerial role within security, eventually overseeing a team of officers at a regional casino or event venue. She is pursuing certification
    in security management and hopes to design a specialized safety program that integrates security with cultural events, such as local art festivals and community gatherings. Long‑term, she envisions
    establishing a consultancy that trains security personnel in empathy‑driven approaches and supports small towns in creating safe, vibrant public spaces.
