persona_description: A researcher in astronomy who specializes in the study of star formation and the ages of young stars. Her research focuses on using the vibrations of stars to measure their ages and
  masses, and on comparing the vibrations of young and older stars to understand how their development differs. She is particularly interested in the impact of star mass on their development and the use
  of ultrasound-like techniques to detect the vibrations of stars.
