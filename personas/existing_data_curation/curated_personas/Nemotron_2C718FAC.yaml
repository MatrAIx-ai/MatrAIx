personas:
  professional: Jeanne Pennington, a 22‑year‑old flight attendant, leverages her methodical safety inspections, fluent Spanish greetings, and upbeat teamwork to turn each flight into a smoothly run, personable
    experience while eyeing promotion to purser.
  sports: Jeanne Pennington competes in a co‑ed volleyball league, hikes the Laurel Highlands and Ohiopyle State Park in the summer, and passionately supports the Pittsburgh Steelers, Penguins, and Pirates
    while also catching select NBA games on streaming platforms.
  arts: Jeanne Pennington fills her free evenings with live shows ranging from indie rock band The National to jazz saxophonist Kamasi Washington, enjoys dancing to garage‑band playlists, and attends Pittsburgh’s
    cultural festivals showcasing local theater and visual art.
  travel: Jeanne Pennington turns layovers into mini‑adventures, snapping street‑level photos in Reykjavik, Barcelona, and Dublin, journaling each encounter, and dreams of trekking Patagonia’s Torres del Paine
    and exploring Kyoto’s temples on a meticulously planned yet spontaneous itinerary.
  culinary: Jeanne Pennington experiments in the kitchen with Pennsylvania Dutch sauerbraten, Spanish paella with saffron and chorizo, and Japanese ramen broth flavored with kombu and miso, while savoring
    fresh figs, burrata, and locally sourced craft beers.
  core: Jeanne Pennington blends a disciplined, schedule‑obsessed mindset with a wanderlust‑driven curiosity, turning every flight, hike, and concert into a chance to connect, learn, and quietly perfect
    the art of organized spontaneity.
background:
  cultural: Jeanne grew up in a middle‑class family in the suburbs of Allegheny County, with German and Irish ancestry that reinforced a strong work ethic and a respect for community traditions. Raised
    in the culturally rich city of Pittsburgh, she was exposed early to a mosaic of ethnic neighborhoods—Polish, Italian, Latino, and African‑American—that sparked her interest in diverse customs and cuisines.
    Family gatherings often feature classic Pennsylvania Dutch dishes and the spirited celebration of Steelers football on Sundays, reflecting the region’s blend of heritage and modern pride. Her upbringing
    emphasized reliability, politeness, and a collaborative spirit, values she carries into both her professional and personal life. While she identifies with the broader American cultural narrative, she
    also embraces the local pride and multicultural openness that define her hometown.
