  hobbies: '[''Travel photography'', ''Hiking in Pennsylvania state parks'', ''Live music concerts'', ''Volunteering at community food pantry'', ''Recreational volleyball'', ''Learning Spanish'', ''Cooking
    international cuisine'', ''Reading travel memoirs and history'']'
  career_goals: Jeanne aims to build a long‑term career in aviation by moving into leadership positions within the cabin crew. In the next three to five years she plans to qualify as a purser, where she
    can oversee safety compliance, mentor new attendants, and streamline service operations. To support this trajectory, she intends to enroll in a part‑time bachelor's program in aviation management, deepening
    her strategic understanding of airline logistics and regulatory affairs. Ultimately, Jeanne aspires to transition into a managerial or safety‑audit role that shapes company policies, while also sharing
    her travel experiences through a blog that highlights cultural insights and practical tips for fellow travelers.
