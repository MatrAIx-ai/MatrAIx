  career_goals: Cecil’s primary ambition now is to ensure his knowledge is passed on to the next generation. He aims to mentor a small cadre of apprentices, volunteer at the local senior center teaching
    basic electrical safety, and serve as a consultant for community renovation projects. He also wishes to write a memoir documenting the evolution of the electrical trade in Oklahoma, preserving his legacy
    for his grandchildren. Maintaining his health to stay active with his wife and to enjoy travel to family gatherings remain central goals.
