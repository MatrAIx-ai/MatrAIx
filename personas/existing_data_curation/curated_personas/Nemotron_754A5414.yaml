    Education'', ''Continuous Professional Development'']'
  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Birdwatching'', ''Visiting art museums'', ''Gardening'', ''Reading scientific and literary books'', ''Hiking forest trails'', ''Listening
    to classical music'']'
  career_goals: Brandi aims to transition into a part‑time consultant role where she can mentor the next generation of lab technologists and guide hospital leadership on quality‑improvement initiatives.
    She plans to obtain a certificate in health informatics to deepen her expertise in data‑driven patient care. Over the next few years she hopes to lead a community‑wide project that integrates local
    art installations into the hospital environment, enhancing patient well‑being and staff morale. Ultimately, she wishes to author a guidebook that blends scientific explanation with visual storytelling
    to make complex test results more accessible to patients.
