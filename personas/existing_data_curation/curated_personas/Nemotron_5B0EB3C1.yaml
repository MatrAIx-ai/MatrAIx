personas:
  professional: Patrick Macneil, a budding astronaut-in-training, channels their organized curiosity into constructing LEGO rockets with step-by-step manuals, balancing innovative ideas with the practical
    guidance of a bedtime checklist, and they often double-check each piece before snapping it together.
  sports: Patrick Macneil, a member of the Northside Kids Soccer Club, practices dribbling and shooting with methodical precision each Saturday, proudly dons a FC Barcelona jersey, yet they sometimes skip
    a match when the bustling sidelines trigger stress.
  arts: Patrick Macneil, who delights in drawing dinosaurs with watercolor crayons, stages impromptu renditions of Disney's 'Frozen' songs for family audiences, and watches the animated series 'Bluey' for
    storytelling inspiration, often demanding an encore after each episode, and they proudly perform the chorus with dramatic flair.
  travel: Patrick Macneil, who thrives on pre-trip checklists and a labeled suitcase, loves weekend visits to the local science museum and dreams of exploring the Grand Canyon, but they feel uneasy about
    flying and cling tightly to a parent's hand at airports.
  culinary: Patrick Macneil, who favors crunchy apple slices, creamy mac-and-cheese, and peanut butter & jelly sandwiches, enjoys helping stir pancake batter despite leaving a trail of flour footprints
    across the kitchen floor, and they often lick the spoon afterwards.
  core: Patrick Macneil is a meticulously organized five-year-old whose boundless curiosity and practical mindset are tempered by frequent worries and a need for routine, making them both a diligent planner
    and a cautious explorer, and they often double-check their drawings before hanging them on the fridge.
background:
  cultural: Patrick comes from a white, Midwestern family in Blue Springs, Missouri. His upbringing reflects the values of his community—politeness, a strong emphasis on family and church activities, participation
    in local school events, and occasional involvement in T‑ball programs. The family celebrates typical American holidays such as Thanksgiving, Independence Day, and Christmas with community gatherings,
    and they encourage a love of learning, practical responsibility, and organized routines, all of which align with Patrick's reliable and methodical personality.
