  career_goals: Even at five, Patrick talks about wanting to become an astronaut or a civil engineer because he loves building things and learning how they work. He also mentions being a teacher one day,
    attracted by the idea of a predictable classroom routine where he can help friends understand new games. His long‑term ambition blends his curiosity for science with his love of order, aiming for a
    career that designs structures or machines that help people while providing a stable, organized environment.
