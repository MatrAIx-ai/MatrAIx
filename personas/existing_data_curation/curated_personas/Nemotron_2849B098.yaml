personas:
  professional: Brandie Ashley, an aspiring community service coordinator who volunteers at the local community center, channels their love of routine and cooperative spirit into planning after‑school clubs,
    laying a foundation for a future as a hometown school counselor.
  sports: Brandie Ashley, a member of the Pekin Youth Softball League who jogs around their backyard garden each weekend, avidly follows the Pekin High School Panthers football team, roots for the Chicago
    Cubs and Chicago Bears, and incorporates light cardio into their routine to stay balanced.
  arts: Brandie Ashley, an avid reader of John Green's novels and The Hunger Games series who also spends evenings knitting patterns from Brooklyn Tweed, regularly streams music by Billie Eilish and Taylor
    Swift, and finds creative solace in crafting and literary worlds, often letting their imagination guide each new stitch.
  travel: Brandie Ashley, an enthusiastic road‑trip planner who has visited Chicago's Navy Pier, spent a summer at a family cabin on the Michigan shoreline, and dreams of exploring Washington, D.C. and
    Disneyland, balances their modest budget by staying with relatives and packing homemade granola bars.
  culinary: Brandie Ashley, a budding baker who perfects chocolate‑chip cookies, cinnamon‑spiced apple crumble, and fluffy pumpkin muffins using butter, brown sugar, and fresh cinnamon, often experiments
    with their family’s secret pie crust recipe while keeping a weekly cooking log.
  core: Brandie Ashley, a routine‑loving teen who balances a passion for baking and community service with occasional anxiety‑driven over‑thinking and a habit of staying up late reading, often noticing
    they linger over the final chapter.
background:
  cultural: Brandie was raised in Pekin, a small Midwestern town in Tazewell County, Illinois. Her family emphasizes traditional values such as hard work, community involvement, and modesty. The local culture,
    shaped by church activities, school events, and tight‑knit neighborhood gatherings, fosters a sense of stability and mutual support. These influences have nurtured Brandie's preference for routine,
    her cooperative nature, and her desire to pursue a reliable, service‑oriented career that benefits her hometown.
