    center'']'
  career_goals: Brandie aspires to a stable, people‑focused career that allows her to help others in a structured environment. She is interested in becoming a pediatric nurse or a medical assistant, drawn
    by the combination of practical tasks, clear routines, and the chance to provide compassionate care. She envisions attending a community college after high school to earn a nursing certificate, then
    pursuing a bachelor's degree in nursing. Long‑term, she hopes to work at a local hospital or clinic in Pekin, giving back to the community that raised her.
