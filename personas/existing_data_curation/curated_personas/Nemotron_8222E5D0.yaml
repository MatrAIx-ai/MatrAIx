  hobbies: '[''Sailing'', ''Woodworking'', ''Community Volunteering (Museum docent)'', ''Coaching Youth Baseball'', ''Home Brewing (Kombucha)'', ''Attending Local Food Festivals'', ''Hiking in the Oregon
    Coast Range'', ''Gardening (Heirloom vegetables)'']'
  career_goals: Richard aims to advance to an operations director role overseeing multiple production sites, championing eco‑friendly practices, and creating a mentorship program for frontline supervisors.
    He also envisions leading a community‑focused agritourism project that showcases Tillamook's cheese heritage while providing job training for local youth. Additionally, he hopes to earn a certification
    in sustainable food production and become a recognized speaker at regional industry conferences.
