persona_description: A researcher in the field of renewable energy systems, particularly focused on the development of novel technologies for the efficient and viable utilisation of renewable energy sources
  such as biomass, wind, and geothermal. The researcher is part of the Research Program on Renewable Energy Systems led by Professor Behdad Moghtaderi, and is involved in the development of a novel geothermal
  power cycle, a novel regenerator for adapting supercritical cycles to geothermal, and power applications. The researcher has a background in the fundamental and applied aspects of renewable energy systems,
  including biomass combustion, gasification, and pyrolysis, as well as the design of novel wind turbines and hot dry rock technology for geothermal power generation. The researcher utilises a variety of
  equipment, including bench-scale set-ups for assessing the performance of various geothermal power cycles, a bench-scale HDH based desalination unit, a bench-scale biomass gasifier, a pressurised biomass
  gasifier, and various pulverisers and fuel crushers. The researcher's research interests include the development of more efficient technologies for the utilisation of biomass and geothermal resources.
