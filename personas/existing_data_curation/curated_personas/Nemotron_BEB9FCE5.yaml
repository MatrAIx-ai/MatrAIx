personas:
  professional: Gilberto Valverde, a 15‑year‑old aspiring robotics engineer, applies their methodical planning and competitive drive to design and code tournament‑ready robots while balancing their curiosity
    for new technologies with pragmatic problem‑solving.
  sports: Gilberto Valverde, 15, plays varsity basketball for the Westside Titans, competes in the Riverside Rovers youth soccer league, skate‑boards at Hilltop Skatepark on weekends, follows the Metro
    Thunder and City FC professional teams, and they approach training with a competitive edge that fuels relentless practice and strategic game analysis.
  arts: Gilberto Valverde, 15,’s artistic side shines through listening to reggaeton hits by Bad Bunny and J Balvin, salsa classics by Marc Anthony, strumming the guitar to acoustic versions of Red Hot
    Chili Peppers' Californication, and they often attend live performances by local Latin‑jazz ensembles whenever possible.
  travel: Gilberto Valverde, 15, dreams of exploring Tokyo’s tech districts, has already backpacked through Mexico City and New York with friends, and prefers weekend road trips to nearby mountain lakes
    where they can skateboard and test new robot prototypes, balancing budget constraints with a hunger for cultural immersion.
  culinary: Gilberto Valverde, 15, favors spicy tacos al pastor, homemade guacamole with fresh cilantro and jalapeños, and pepperoni pizza, can whip up a quick ramen bowl using broth, noodles, and sliced
    pork, and while their cooking skill is decent for a teen, they often over‑salt dishes when experimenting with new flavors.
  core: Gilberto Valverde, 15, is a fiercely competitive teen who blends tactical gaming, robotics engineering, and team sports with a methodical, calmly resilient mindset, and they occasionally squanders
    savings on impulse buys and forget to floss.
background:
  cultural: Gilberto was raised in a close‑knit Puerto Rican family in Philadelphia’s vibrant North‑West neighborhoods. His parents maintain strong ties to Puerto Rican traditions, celebrating holidays
    like Three Kings Day and participating in the annual Puerto Rican Parade in the city. Bilingual at home, he grew up speaking both Spanish and English, which enriches his communication skills and cultural
    awareness. The blend of Caribbean rhythms, family‑oriented values, and the multicultural urban environment of Philadelphia has shaped his identity, fostering a pride in his heritage while encouraging
    him to contribute positively to his broader community.
