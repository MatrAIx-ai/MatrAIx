  career_goals: Tiffany aims to move into a senior program‑manager role within the next three years, overseeing multiple high‑impact initiatives that integrate sustainability and community‑art components.
    She hopes to lead a corporate social responsibility portfolio that blends her project expertise with her passion for the arts, and she plans to mentor emerging women project managers by establishing
    a formal mentorship program at her organization. Long‑term, she envisions launching a boutique consultancy that helps nonprofits and cultural institutions manage grant‑funded projects more efficiently
    while fostering creative collaboration.
