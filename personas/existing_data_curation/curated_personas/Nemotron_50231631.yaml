personas:
  professional: Tiffany Weathers, a seasoned project manager with over a decade of experience who seamlessly blends Agile and Waterfall methodologies, design‑thinking visual storytelling, and a love for
    community art, leads cross‑functional teams with meticulous schedules and flexible problem‑solving, and they aim to step into a senior program‑manager role that drives sustainability‑focused CSR initiatives
    while mentoring emerging women leaders.
  sports: Tiffany Weathers, an enthusiastic participant in group fitness, attends weekly Zumba and yoga classes at the Westwood Community Center, they hike the Ramapo Mountains with the Ramapo Hiking Club,
    and they cheer on the New York Giants, New York Knicks, and New York Yankees while occasionally joining a recreational softball league for fun.
  arts: Tiffany Weathers, an avid patron of visual and performing arts, frequents the Montclair Art Museum, local Westwood galleries, and the Bergen Performing Arts Center, they delight in works by Georgia
    O'Keeffe, Claude Monet, and contemporary installations by Ai Weiwei, they take watercolor and mixed‑media classes, and they volunteer with the Bergen County Arts Council to organize public art projects
    that bring community stories to life.
  travel: Tiffany Weathers, a culturally curious traveler who prefers art‑focused weekend getaways, has explored the Philadelphia Mural Arts Festival, the Hudson Valley Harvest Festival, and a spring visit
    to Kyoto's Gion Matsuri, they plan future trips to Oaxaca for Día de los Muertos celebrations and to the Amalfi Coast for coastal photography, balancing adventure with a modest travel budget and a love
    for local cuisine.
  culinary: Tiffany Weathers, a garden‑to‑table cooking enthusiast, cultivates basil, thyme, rosemary, and heirloom tomatoes in their backyard, they excel at preparing Mediterranean dishes like lemon‑herb
    roasted chicken, ratatouille, and pumpkin risotto, they host intimate dinner parties featuring locally sourced wine and seasonal produce, and they occasionally experiment with exotic spices such as
    sumac and za'atar, though they sometimes over‑salt sauces when juggling a busy schedule.
  core: Tiffany Weathers, a 57‑year‑old project‑management pro who merges meticulous organization with artistic passion, leads community‑art CSR initiatives, enjoys Zumba, yoga, and garden‑to‑table cooking,
    yet they sometimes splurge on limited‑edition prints and wrestle with seasonal allergies.
background:
  cultural: Tiffany grew up in a middle‑class white family in suburban New Jersey, with deep roots in the Northeastern United States. Her upbringing emphasized education, community involvement, and a strong
    work ethic. Proximity to New York City exposed her to a diverse arts scene, fostering a lifelong love of visual and performing arts. She identifies with suburban American cultural norms of volunteerism
    and civic participation, while also embracing progressive, open‑minded values cultivated through exposure to multicultural environments. Family traditions include seasonal celebrations, involvement
    in a Mainline Protestant church, and annual trips to historic East Coast sites.
