persona_description: An individual who is interested in and knowledgeable about the use of the OpenGL graphics library, specifically in the context of C and C++ programming. They are familiar with the features
  and capabilities of OpenGL, such as rendering 2D and 3D graphics, and may have experience with using auxiliary packages like GLUT for additional functionality. They are likely to be familiar with the
  latest software version and have access to the source code and compilation script for use on a Macintosh running OS X. They are also interested in the ASCII Portable Pixelmap format and may have experience
  with using it to display graphics information using OpenGL.
