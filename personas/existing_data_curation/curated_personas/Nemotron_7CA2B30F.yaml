personas:
  professional: Maria Nodarse is a budding visual storyteller who channels their curiosity into daily sketch sessions and digital painting tutorials, blending disciplined practice with spontaneous experimentation
    to transform their bedroom walls into galleries of portraits and imagined architectural motifs.
  sports: Maria Nodarse plays forward for the community soccer club Sunbeam United, practices salsa and bachata at a local dance studio, and they passionately root for the Miami Heat in the NBA and the
    Miami Marlins during baseball season.
  arts: Maria Nodarse is an avid sketcher and graphic‑novel enthusiast who looks up to artists like Hayao Miyazaki for narrative depth, Frida Kahlo for bold self‑expression, and digital illustrator Loish
    for color mastery, and they often re‑create scenes from Neil Gaiman's "Sandman" in watercolor while listening to the rhythmic beats of salsa music.
  travel: Maria Nodarse prefers meticulously planned weekend road trips to nearby beach towns and carefully curated virtual museum tours, and they dream of future backpacking adventures through Barcelona’s
    street‑art neighborhoods, Tokyo’s bustling fish market, and a family getaway to the historic streets of Key West.
  culinary: Maria Nodarse loves helping their mother prepare arroz con gandules and tembleque, skillfully whisking a salsa criolla, and they sometimes over‑salt the rice in their enthusiasm.
  core: Maria Nodarse is a quietly ambitious twelve‑year‑old art enthusiast who balances disciplined sketch practice with spontaneous Minecraft architecture, saves diligently for a graphics tablet, and
    they habitually over‑schedule their free time.
background:
  cultural: Maria is a first‑generation Puerto Rican American raised in West Haven, Connecticut. Her household is bilingual, with Spanish spoken at home and English at school, giving her a deep appreciation
    for both cultures. Family gatherings often feature música jíbara, salsa, and the aromas of dishes like mofongo and pasteles, reinforcing a sense of pride in her island roots. In the local community,
    she participates in the annual Puerto Rican Festival at the West Haven town hall, where she volunteers to set up cultural exhibitions. This blend of island traditions and New England upbringing informs
    her worldview, encouraging her to celebrate diversity, preserve heritage, and share her culture through art and storytelling.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Digital illustration and basic animation'', ''Scratch coding and introductory Python'', ''Research and source evaluation'', ''Time management
    and planner use'', ''Creative writing (short stories, poetry)'']'
  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration using Procreate'', ''Reading graphic novels and sci‑fi literature'', ''Playing Minecraft and creating custom builds'', ''Salsa
    and bachata dancing'', ''Cooking traditional Puerto Rican recipes'', ''Attending local art workshops and community mural projects'']'
  career_goals: Maria envisions a future where she can combine her love for art, technology, and her cultural heritage. She aspires to attend a specialized high school for visual arts and eventually earn
    a degree in graphic design or illustration, with a long‑term goal of becoming a concept artist for animation studios. She also dreams of creating community murals in West Haven that celebrate Puerto
    Rican stories and hopes to mentor younger children in bilingual art workshops. Her ambition includes using her technical skills to develop interactive digital experiences that educate peers about Puerto
    Rican history and traditions.
