personas:
  professional: Ernest Mckinney, an 80‑year‑old master photographer and visual historian of Owosso, merges six decades of film and digital expertise—including darkroom processing, Lightroom mastery, and
    archival preservation—to create evocative portraits, landscapes, and documentary projects, while mentoring emerging photographers with a sly competitive streak and a relaxed, flexible approach that
    often eschews strict deadlines.
  sports: Ernest Mckinney stays active by strolling the sandy trails of Indiana Dunes and the pine‑covered paths of Michigan's Pictured Rocks National Lakeshore, often joining a local walking club that
    meets for sunrise hikes and cheering on the Detroit Tigers during summer evenings, while they occasionally play a weekly game of bocce with friends at the community center.
  arts: Ernest Mckinney cultivates a rich artistic life by curating vintage camera exhibitions, crafting custom wooden frames in his workshop, and immersing themselves in the swing rhythms of Duke Ellington,
    Miles Davis, and the big‑band era, which they listen to on a refurbished record player while sipping coffee after a day of photo shoots.
  travel: Ernest Mckinney prefers low‑key, self‑driven road trips that blend photography and nature, having spent recent summers capturing sunrise over the sand dunes of Sleeping Bear Lake and dreaming
    of a future pilgrimage to the historic streets of Edinburgh, Scotland, where they can compare old‑world architecture with Michigan’s small‑town charm.
  culinary: Ernest Mckinney delights in cooking classic Midwestern comfort dishes such as chicken pot pie, homemade apple crisp, and skillet cornbread, often incorporating fresh carrots, tomatoes, and herbs
    from their modest vegetable garden, while they occasionally treat themselves to a perfectly seared steak topped with cracked pepper and a splash of butter as a reward for completing a new photography
    project.
  core: Ernest Mckinney is a curious, competition‑driven octogenarian who blends a relaxed, disorganized schedule with a lifelong passion for vintage photography, gardening, and jazzy big‑band evenings,
    turning every day into a chance to capture history while mentoring the next generation.
background:
  cultural: Ernest grew up in post‑World War II Owosso, Michigan, within a predominantly white, small‑town Midwestern community. His upbringing was shaped by the region's values of hard work, self‑reliance,
    and strong community ties, reflecting the agricultural and early automotive heritage of Saginaw County. Raised in a Protestant family and educated through the local public school system, he absorbed
    a cultural emphasis on modesty, practical stewardship, and appreciation for seasonal cycles. The Great Lakes area's folk traditions, county fairs, and local arts festivals have influenced his aesthetic
    sensibilities, fostering a deep respect for preserving regional history through visual storytelling.
attributes:
  skills: '[''Portrait photography'', ''Landscape photography'', ''Documentary photography'', ''Darkroom processing'', ''Digital post-processing (Lightroom, Photoshop)'', ''Studio lighting design'', ''Visual
