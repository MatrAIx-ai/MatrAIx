  hobbies: '[''Gardening'', ''Local history research'', ''Birdwatching'', ''Reading historical fiction'', ''Woodworking (building frames)'', ''Traveling to nearby natural sites'', ''Cooking Midwestern comfort
    food'', ''Collecting vintage cameras'', ''Listening to jazz and big band music'', ''Volunteering at community art events'']'
  career_goals: At 80, Ernest aims to cement his legacy as a visual historian of Owosso and Saginaw County. He plans to compile a coffee‑table book that juxtaposes historic black‑and‑white images with contemporary
    color work, highlighting the region's transformation. He seeks a retrospective exhibition at the local historical society and intends to digitize his entire archive for public access. Additionally,
    Ernest hopes to establish a modest scholarship for aspiring photographers in the area, providing mentorship and a small grant to encourage creative exploration beyond conventional boundaries.
