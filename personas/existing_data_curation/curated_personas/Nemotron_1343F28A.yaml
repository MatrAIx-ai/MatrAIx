  hobbies: '["Beach volleyball", "Group fitness (Zumba, yoga)", "Volunteer work at food pantry", "Cooking and sharing recipes", "Handmade jewelry crafting", "Attending cultural festivals", "Community gardening",
    "DIY home projects", "Podcast listening (personal development)", "Social media community building"]'
  career_goals: Rachel aims to transition her passion for helping others into a formal role within the nonprofit sector. She plans to earn her GED within the next year, followed by a certification as a
    community health worker or peer support specialist. Her long-term ambition is to become a community program coordinator for a local organization that serves seniors and low-income families, designing
    inclusive events and support services that promote wellness and social connection. She also hopes to start a small side business offering homemade healthy snacks for community events, leveraging her
    cooking skills while maintaining a flexible schedule that aligns with her spontaneous lifestyle.
