  career_goals: Lisa aims to solidify her position as a dependable staff RN on the medical‑surgical floor while pursuing a Bachelor of Science in Nursing part‑time to meet the state’s BSN requirement for
    advancement. Within the next three years she hopes to earn a Certified Medical‑Surgical Nurse (CMSN) credential and take on additional responsibilities as a charge nurse, where she can apply her organizational
    strengths to coordinate shift activities. Long‑term, she envisions moving into nursing leadership or education, but she wants to do so in a stepwise, practical manner that preserves a balanced schedule
    and allows her to stay rooted in her community.
