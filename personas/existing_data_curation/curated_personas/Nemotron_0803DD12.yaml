personas:
  professional: Lisa Curry, a newly licensed registered nurse at a busy community hospital, combines meticulous routine‑driven patient assessments, precise medication administration, and rigorous infection‑control
    vigilance with an organized, assertive communication style that makes them a reliable backbone on the medical‑surgical floor.
  sports: Lisa Curry hits the local trails three times a week with the River Bend Running Club, logs frequent 5K charity races, and stays motivated by cheering for the Midtown Hawks basketball squad and
    the Coastal FC soccer team during their seasonal matchups.
  arts: Lisa Curry unwinds with contemporary fiction like Sally Rooney’s "Normal People" and classic mysteries by Agatha Christie, savors midnight screenings of "Casablanca" and "Sunset Boulevard" with
    a close circle, and finds creative flow while knitting to the soft folk melodies of Gregory Alan Isakov.
  travel: Lisa Curry prefers meticulously planned weekend getaways, having already explored Shenandoah National Park’s scenic overlooks and the vibrant food scene of New Orleans, while they aspire to trek
    the Inca Trail to Machu Picchu and wander Kyoto’s historic temples during future semester breaks.
  culinary: Lisa Curry’s kitchen revolves around seasonal herb foraging—fresh basil, rosemary, and thyme from their garden—to craft dishes like lemon‑rosemary roasted chicken and basil pesto pasta, while
    their baking repertoire boasts flaky apple crumble pie and caramel‑pecan pie that earn rave reviews at family gatherings.
  core: Lisa Curry, a routine‑driven RN with a garden‑to‑table ethos, balances brisk jogs and meticulous patient charts with nightly crosswords, a stubborn habit of over‑knitting scarves, and an unapologetic
    reliance on late‑night coffee to power through 12‑hour shifts.
background:
  cultural: 'Lisa was raised in a middle‑class, white New England family in Meriden, Connecticut. Her upbringing reflects the pragmatic, community‑oriented values common in the region: a respect for routine,
    an emphasis on hard work, and a strong sense of local ties. Her family traditions include seasonal celebrations such as Thanksgiving and Fourth of July barbecues, participation in church‑based community
    service, and an appreciation for practical education. These cultural influences shape her practical outlook, her commitment to serving the local community as a nurse, and her preference for stable,
    familiar environments.'
