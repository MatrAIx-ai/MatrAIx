  career_goals: Although retired, Shirley aims to remain actively engaged in her community. She plans to volunteer as a reading companion at the local library, helping seniors navigate digital resources
    and stay connected online. She also seeks to document her family genealogy and write a memoir that reflects the social changes she witnessed over her lifetime. Travel is another ambition; she hopes
    to visit historic sites across the Midwest and attend a music festival featuring classic jazz and blues. Ultimately, Shirley wants to preserve her independence, maintain her health, and advocate for
    senior rights within her neighborhood.
