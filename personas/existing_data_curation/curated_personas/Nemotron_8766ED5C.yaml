personas:
  professional: William Major is a retired facilities manager turned community heritage guide, leveraging his hands‑on expertise in plumbing, electrical work, and carpentry to preserve historic Bathhouse
    Row while they mentor youth in practical trades through organized workshops, guided by a blend of practical ingenuity and quiet curiosity about the past.
  sports: William Major enjoys low‑impact fitness through morning walks along the Ouachita River, follows the Arkansas Razorbacks football team and the St. Louis Cardinals baseball club, plays occasional
    recreational fishing tournaments with the local Hot Springs anglers' club, and they participate in a senior bowling league at the community center.
  arts: William Major finds solace in the blues of B.B. King, the jazz of Miles Davis, and the soulful harmonies of the local gospel choir, frequently listening while they tend to their garden or restore
    vintage furniture, and they attend quarterly performances at the Hot Springs Convention Hall to keep their cultural connection alive.
  travel: William Major prefers relaxed, historically themed road trips with his spouse, favoring destinations such as Natchez’s ante‑bellum homes, Charleston’s cobblestone streets, and the Civil Rights
    Trail in Montgomery, while they meticulously plan itineraries using paper maps and allow plenty of time for spontaneous birdwatching stops.
  culinary: William Major loves cooking traditional Southern dishes like shrimp and grits, collard greens seasoned with smoked paprika, and sweet potato pie, skillfully preparing them in a modest kitchen
    using a cast‑iron skillet and a well‑worn family recipe book, and they often invite neighbors over for informal potluck evenings that double as storytelling sessions.
  core: William Major blends a practical handyman’s mindset with a quiet historian’s curiosity, turning community service, meticulous budgeting, and soulful blues into a steady rhythm of purposeful retirement,
    and they cherish each small win as a note in their lifelong song.
background:
  cultural: William grew up in the Black community of Hot Springs during the era of segregation, where the church and extended family served as the central pillars of social life. His family has deep roots
    in the region, with ancestors who worked as laborers and artisans on Bathhouse Row in the early 20th century. The cultural legacy of Southern gospel music, soul food, and oral storytelling shaped his
    upbringing, and the civil‑rights movement of the 1960s reinforced a strong sense of dignity, perseverance, and community service. Today he blends these traditions with a quiet curiosity for history
    and a practical, resilient approach to everyday life.
