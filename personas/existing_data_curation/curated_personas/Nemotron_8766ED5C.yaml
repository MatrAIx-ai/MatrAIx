  hobbies: '[''gardening'', ''birdwatching'', ''fishing'', ''reading historical biographies'', ''woodworking'', ''listening to blues and jazz music'', ''cooking Southern cuisine'', ''volunteering at the
    local church'', ''heritage storytelling'']'
  career_goals: William aims to stay actively involved in his community by volunteering as a heritage tour guide at Hot Springs National Park, documenting and sharing the stories of the African‑American
    workers who built and maintained Bathhouse Row. He hopes to complete a written memoir of his life and his family's journey through the civil‑rights era, mentor local youth interested in trades, and
    continue supporting his wife’s health and well‑being. He also aspires to maintain his own health through regular walks, gardening, and occasional travel to historic sites in the South with his spouse.
