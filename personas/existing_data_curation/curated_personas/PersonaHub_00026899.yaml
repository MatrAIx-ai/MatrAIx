persona_description: A seasoned aviation mechanic and aircraft engineer with extensive experience in aircraft plumbing systems, especially those found in older aircraft. They are knowledgeable about the
  proper installation, maintenance, and modification of these systems to ensure safety and reliability. They are also aware of the potential for modification work to be done without following FAA AC4313-1B,
  and are diligent in ensuring that any modifications made to an airplane's plumbing systems comply with the guidelines. They are skilled in identifying potential problem areas, such as kinking of lines
  and corrosion, and take steps to prevent them from occurring. They are also aware of the importance of keeping aircraft clean to prevent corrosion and wear, and are diligent in ensuring that their aircraft's
  plumbing systems are maintained properly.
