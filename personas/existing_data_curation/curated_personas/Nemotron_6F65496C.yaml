personas:
  professional: Celia Zapata is a retired community cultural steward who channels a keen eye for visual composition, bilingual fluency, and meticulous organizational skill into curating seasonal art exhibits,
    documenting elders’ oral histories, and mentoring younger women in traditional crafts, balancing disciplined planning with an open curiosity for unconventional narratives; they bring a calm, solitary
    presence to each project.
  sports: Celia Zapata enjoys gentle morning walks through the Bayamón community garden, follows the Capitanes de Bayamón basketball team and the Gigantes de Carolina baseball club with avid enthusiasm,
    and participates in low‑impact tai chi classes at the local senior center, preferring relaxed, consistent activity over competitive sports.
  arts: Celia Zapata spends afternoons painting delicate watercolors inspired by the vibrant murals of local artist José Ruiz, immerses herself in the rhythmic beats of Bomba group La Tuna and the soulful
    sounds of Rubén Blades, and finds literary solace in the works of Gabriel García Márquez, weaving these artistic influences into her daily journaling and craft workshops.
  travel: Celia Zapata prefers meticulously planned journeys that blend cultural immersion with relaxation, having explored the historic streets of Old San Juan and the colonial plazas of Cartagena, while
    dreaming of future visits to the Uffizi galleries in Florence and the tranquil beaches of the Dominican Republic, always balancing travel costs with a modest retirement budget.
  culinary: Celia Zapata is an adept home chef who perfects arroz con gandules using sofrito, adobo, and pigeon peas, crafts golden pastelillos filled with seasoned pork and plantain, and flavors dishes
    with fresh cilantro, oregano, and achiote from her balcony garden, while occasionally treating herself to a slice of flan de coco during family gatherings.
  core: Celia Zapata blends a lifelong love of solitary creation, disciplined budgeting, and gentle curiosity, documenting family stories and nurturing crafts while occasionally hoarding vintage knitting
    patterns and avoiding noisy gatherings.
background:
  cultural: Celia was born and raised in the vibrant municipality of Bayamón, with familial ties to neighboring Trujillo Alto. Her upbringing reflects the rich tapestry of Puerto Rican culture, including
    Spanish colonial traditions, African rhythms of Bomba and Plena, and indigenous Taíno influences. Raised in a Catholic household, she values family cohesion, community fiestas, and the preservation
    of oral stories. Fluent in Spanish and comfortable in English, she navigates both local customs and the broader US context, embodying the island's hybrid identity.
attributes:
  skills: '[''Watercolor painting'', ''Archival research'', ''Traditional Puerto Rican cooking'', ''Gardening'', ''Knitting and crochet'', ''Community volunteer coordination'', ''Budget management'', ''Bilingual
    communication (Spanish/English)'', ''Genealogy research'', ''Digital literacy for seniors'']'
  hobbies: '[''Watercolor painting'', ''Gardening'', ''Reading Caribbean literature'', ''Traditional cooking'', ''Knitting'', ''Genealogy research'', ''Listening to Bomba and Plena music'', ''Journaling'']'
  career_goals: Although retired from formal employment, Celia seeks to become a community cultural steward by documenting oral histories of Bayamón elders and curating seasonal art showcases that highlight
    local artists. She aims to mentor younger women in traditional crafts such as quilting and cooking, and plans to complete an online art-history course to deepen her understanding of Caribbean visual
    culture. Ultimately, she hopes her efforts will strengthen intergenerational bonds and preserve Puerto Rican heritage for future generations.
