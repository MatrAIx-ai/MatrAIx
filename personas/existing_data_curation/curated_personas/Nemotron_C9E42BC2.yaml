  career_goals: Whitney enjoys imagining future roles that involve caring for others and maintaining orderly environments. She often says she wants to be a teacher who helps children learn in a structured
    classroom, and she also shows interest in becoming a veterinarian to care for animals. These aspirations reflect her practical mindset and compassionate nature.
