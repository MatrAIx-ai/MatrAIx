  career_goals: Wanda aims to leverage her deep mathematical expertise to drive interdisciplinary research that addresses real‑world problems, particularly in environmental modeling and regional economic
    development. She seeks a leadership role—such as department chair or research center director—where she can mentor emerging scholars, secure major federal or private grants, and expand outreach programs
    that blend mathematics with art and community engagement. Over the next five years, she hopes to publish a seminal paper on stochastic modeling, develop a collaborative partnership with local industry,
    and become a keynote speaker at national conferences. A personal priority is to foster a supportive research environment that acknowledges stress, promotes transparent communication, and builds resilience
    among team members, reflecting her competitive drive tempered by a concern for well‑being.
