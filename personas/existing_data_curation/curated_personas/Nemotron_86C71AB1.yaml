personas:
  professional: A bilingual teaching assistant poised to earn certification, Sonia Perez leverages meticulous organization and conflict‑resolution skills to support Spanish‑speaking elementary learners
    while integrating technology and culturally responsive curricula.
  sports: A fitness‑focused enthusiast, Sonia Perez treats salsa dancing as her core cardio routine, adds sunrise jogs along the Gulf Coast and seasonal beach‑volleyball matches with the local Naples club,
    and cheers on the Miami Marlins while following the Florida Gators football season.
  arts: A culturally engaged creative, Sonia Perez frequently attends live salsa nights featuring Orquesta Aragón, leads a book club that discusses contemporary fiction by Junot Díaz and Yaa Gyasi, and
    finds visual inspiration in Frida Kahlo’s vibrant self‑portraits.
  travel: A low‑key explorer, Sonia Perez prefers culturally immersive weekend trips, frequently visits Miami to connect with family, enjoys music‑laden getaways to New Orleans, and dreams of a culinary
    pilgrimage to Seville, Spain, meticulously planning itineraries that blend guided tours with spontaneous neighborhood walks.
  culinary: A passionate home chef, Sonia Perez masterfully prepares classic dishes such as ropa vieja, arroz con pollo, and yuca con mojo, balancing smoky paprika and fresh cilantro, yet often forgets
    to de‑seed plantains, leading to an unexpected crunch in her otherwise meticulously flavored meals.
  core: Sonia Perez blends disciplined organization with a warm devotion to cultural roots, turning classroom data into inclusive lessons while salsa‑shuffling through life, vigilantly managing budgets,
    seasonal allergies, and a quirky tendency to over‑spice her beloved dishes.
background:
  cultural: Sonia's Cuban heritage is a central part of her identity. Raised in a bilingual household, she grew up hearing both Spanish and English, which shaped her comfort with cross-cultural communication.
    Family gatherings often feature music, dance, and food that celebrate Cuban traditions such as Carnaval and the annual celebration of Cuban Independence Day. These cultural influences inform her love
    for cooking, salsa dancing, and her commitment to supporting Spanish-speaking students. While she embraces the broader American culture of Naples, she maintains strong ties to her extended family in
    Miami and frequently participates in local Cuban community events.
attributes:
  skills: '[''Classroom management'', ''Lesson planning assistance'', ''Instructional technology integration'', ''Bilingual communication (English-Spanish)'', ''Student assessment and data analysis'', ''Differentiated
    instruction support'', ''Behavioral observation'', ''Curriculum alignment'', ''Time management'', ''Conflict resolution'']'
  hobbies: '[''Cooking traditional Cuban cuisine'', ''Salsa dancing (social dance classes)'', ''Reading contemporary fiction'', ''Urban gardening'', ''Volunteer tutoring at community center'', ''Walking
    along Gulf Coast beaches'', ''DIY home organization projects'']'
  career_goals: Sonia aims to earn her teaching certification and specialize in bilingual education, eventually becoming a classroom teacher for elementary grades. She plans to pursue a Master's degree
    in Curriculum and Instruction to deepen her expertise in designing culturally responsive curricula. In the long term, she aspires to take on a lead instructional specialist role, mentor new teaching
    assistants, and contribute to community outreach programs that support immigrant families in Collier County. Her goals reflect a blend of practical advancement and a curiosity for innovative teaching
    methods.
