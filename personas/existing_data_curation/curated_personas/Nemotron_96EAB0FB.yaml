personas:
  professional: An interdisciplinary curriculum designer and adjunct professor, Tuan Nguyen (27) channels quantitative expertise in Python and R alongside a watercolor painter’s eye to develop data‑rich,
    visually engaging STEAM courses, while they meticulously organize research projects and quietly battle the anxiety of securing a tenure‑track position.
  sports: Tuan Nguyen, an avid hiker of the Texas Hill Country, spends weekends trekking the Edwards Plateau with the Hill Country Trailblazers club, follows the Dallas Cowboys and Austin FC on game days,
    and occasionally joins a casual 5K run organized by the Austin Running Collective during spring, viewing fitness as a disciplined yet meditative counterbalance to academic stress.
  arts: Tuan Nguyen, a watercolor and digital illustrator, draws inspiration from the luminous palettes of Claude Monet and the futuristic schematics of Chris Foss, strums acoustic renditions of Nick Drake,
    and cherishes visits to intimate galleries featuring contemporary artists like Njideka Akunyili‑Clee, weaving these experiences into their own visual narratives.
  travel: Tuan Nguyen, who meticulously plans each trip with a spreadsheet of costs and cultural highlights, prefers solo or small‑group journeys that blend artistic inspiration with scientific wonder—recently
    hiking Sedona’s red canyons, admiring Copenhagen’s minimalist design museums, and dreaming of a future expedition to Iceland’s geothermal fields—while balancing a modest travel budget with occasional
    conference‑funded travel.
  culinary: Tuan Nguyen, an enthusiastic home cook at an intermediate level, delights in crafting aromatic pho broth infused with star anise, ginger, and cilantro, rolling fresh rice paper spring rolls
    featuring lemongrass and shrimp, and experimenting with bánh mì sandwiches layered with pickled daikon, carrot, and sriracha mayo, while also enjoying occasional fine‑dining outings to sample locally
    sourced farm‑to‑table tasting menus.
  core: Tuan Nguyen, a 27‑year‑old meticulous scholar‑artist, fuses data‑driven analysis with watercolor imagination, lives on a strict budget yet splurges on premium art supplies, battles chronic anxiety
    through meditation, and habitually over‑plans every project while secretly fearing the unknown.
background:
  cultural: Tuan is a second‑generation Vietnamese‑American whose parents immigrated to the United States in the early 1990s. Raised in a bilingual household in Texas, he grew up speaking Vietnamese at
    home, celebrating Tet and other Vietnamese traditions, and cooking family recipes. He maintains strong ties to the local Vietnamese community through cultural festivals and language meet‑ups. His heritage
    instills a deep respect for education, perseverance, and collective responsibility, which he blends with the individualistic values of American culture. This bicultural perspective informs his inclusive
    teaching style and his advocacy for diversity in STEM fields.
