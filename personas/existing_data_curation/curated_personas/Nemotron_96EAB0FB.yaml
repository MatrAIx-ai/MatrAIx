  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Acoustic guitar'', ''Visiting art galleries'', ''Reading philosophy'', ''Chess puzzles'', ''Hiking'', ''Cooking Vietnamese dishes'', ''Mindfulness
    meditation'', ''Board game evenings'']'
  career_goals: Tuan aims to transition from adjunct teaching to a tenure‑track faculty position at a research‑oriented university, where he can develop interdisciplinary courses that fuse art, design,
    and STEM. He seeks to publish scholarship on innovative pedagogy, secure external grants for educational technology projects, and mentor underrepresented students in the sciences. Long‑term, he envisions
    leading curriculum reform initiatives and eventually serving as department chair, while also establishing a community outreach program that brings STEAM learning to local schools.
