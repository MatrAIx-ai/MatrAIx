  career_goals: Sandra dreams of a future where she can combine her love of learning with helping others. She imagines becoming a science teacher who leads classroom experiments and inspires curiosity,
    or a wildlife conservationist guiding community nature walks in the Sonoma County hills. She is also attracted to roles that involve teamwork and mentorship, such as a youth program coordinator who
    plans activities for younger children. In all these aspirations, she seeks a balance between creative discovery and practical impact, aiming for a career that supports both the environment and her community.
