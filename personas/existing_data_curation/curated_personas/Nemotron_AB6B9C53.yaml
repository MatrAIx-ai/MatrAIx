personas:
  professional: Sandra Parker is an aspiring young designer who channels their curiosity and practical mindset into building intricate LEGO creations and coding simple Scratch games, thriving on collaborative
    projects that let them organize ideas while staying flexible enough to improvise with friends.
  sports: Sandra Parker thrives on the soccer field as a forward for the Sunrise Soccer Club’s U9 team, attends weekly ballet dance classes, and cheers enthusiastically for the hometown baseball squad the
    River Raptors, balancing high‑energy practice sessions with the occasional afternoon of bird‑watching hikes to stay fit and curious.
  arts: Sandra Parker expresses creativity through painting bright scenes reminiscent of Monet, mastering piano pieces by Beethoven and Yiruma, and dancing to routines inspired by Misty Copeland, while
    also devouring adventure novels by Rick Riordan in the school reading club, letting the arts shape their lively imagination.
  travel: Sandra Parker loves family road trips to nearby state parks like Cedar Creek where they photograph butterflies, dreams of exploring the wildlife of Costa Rica’s rainforests, and prefers a mix
    of spontaneous nature hikes and carefully planned museum visits, though their weekend schedule often limits travel to short day‑out adventures.
  culinary: Sandra Parker enjoys munching on cheese pizza and chicken nuggets while proudly helping mom whisk together strawberry‑banana smoothies, delights in baking simple sugar cookies with chocolate
    chips, yet they stubbornly refuse to eat broccoli, making lunchtime negotiations a frequent quirky battle.
  core: Sandra Parker is a curious, organized yet flexible 9‑year‑old who juggles soccer, piano, LEGO building and bird‑watching, thriving in group activities while occasionally forgetting chores in the
    rush of excitement.
background:
  cultural: Sandra comes from a white, middle‑class American family living in Cloverdale, a small town in Sonoma County, Northern California. Her upbringing blends typical suburban values—emphasis on education,
    community involvement, and family gatherings—with the region’s agricultural heritage. She often participates in local events such as the annual Cloverdale Strawberry Festival and school field trips
    to nearby vineyards and farms, fostering an appreciation for the outdoors and the local terroir. Her cultural environment also includes celebrating national holidays and taking part in community service
    projects through her school.
