  hobbies: '[''Genealogy research'', ''Reading historical biographies and non‑fiction'', ''Gardening (vegetables and native flowers)'', ''Quilting and hand‑sewing'', ''Bird‑watching'', ''Nature photography'',
    ''Listening to jazz and classical music'', ''Volunteer tax‑assistance work'', ''Church choir participation'', ''Walking in local parks'']'
  career_goals: Although retired from full‑time employment, Katrina aims to continue contributing her expertise on a part‑time consulting basis for local non‑profits and small businesses, particularly those
    owned by minority entrepreneurs. She seeks to expand the community tax‑assistance program she volunteers with, ensuring it stays current with tax law changes. Additionally, she hopes to mentor a few
    high‑school and college students interested in accounting, helping them bridge the gap between academic study and practical application. Her long‑term ambition is to author a guide on practical audit
    techniques tailored for small‑scale operations, merging her curiosity about new methodologies with her preference for proven, reliable processes.
