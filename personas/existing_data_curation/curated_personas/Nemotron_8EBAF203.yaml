personas:
  professional: Katrina Gathers, a meticulous retired accountant with deep expertise in GAAP compliance, forensic analysis, and ERP systems, now channels their methodical mindset into part‑time consulting
    for local nonprofits, designing robust internal controls while mentoring junior volunteers with patient, detail‑oriented guidance, and is drafting a practical audit guide for small‑scale operations
    that blends proven procedures with a curiosity for emerging methodologies.
  sports: Katrina Gathers stays active with low‑impact cardio by taking early morning walks in Forest Park and joining bird‑watching outings with the local Audubon society, follows the St. Louis Cardinals
    and St. Louis Blues from the comfort of their living room, and occasionally competes in a senior lawn‑bowling league at the community recreation center, favoring solitary, steady exercise over high‑intensity
    sports.
  arts: Katrina Gathers weaves intricate quilts while listening to the timeless swing of Duke Ellington and the improvisational brilliance of Miles Davis, attends classical recitals featuring Yo‑Yo Ma and
    the St. Louis Symphony, and captures nature’s quiet moments through photography that frames prairie sunrises in soft, muted tones, allowing music and visual art to color both their creative projects
    and reflective evenings.
  travel: Katrina Gathers prefers meticulously planned, low‑key trips that blend genealogical research with tranquil scenery, such as a week‑long archival visit to Washington, D.C.’s National Archives,
    a garden‑focused tour of the Biltmore Estate in Asheville, and a leisurely riverboat cruise on the Mississippi River in Baton Rouge, while dreaming of a quiet countryside cottage stay in England’s Cotswolds.
  culinary: Katrina Gathers, a confident home cook, frequently prepares seasonal vegetable stews featuring heirloom tomatoes, kale, and fragrant basil harvested from their garden, bakes crusty cornbread
    with sweet corn kernels, and treats themselves to a slice of peach cobbler topped with a dollop of whipped cream on relaxed evenings, often sipping herbal tea while reviewing family records.
  core: Katrina Gathers is a quietly curious, methodical retiree who balances a love of genealogy, quilting, and low‑risk investing, yet they sometimes forget to water indoor plants while meticulously balancing
    their ledger.
background:
  cultural: Katrina grew up as part of the African‑American community in St. Louis County during the civil‑rights era, an experience that instilled a strong sense of resilience and communal responsibility.
    Her family placed high value on education and service, encouraging her pursuit of a STEM degree at a time when few Black women entered the field. She remains connected to local cultural traditions through
    church, community festivals, and mentorship programs that celebrate Black heritage. Her background informs both her professional ethos—emphasizing integrity and fairness—and her personal passions, such
    as preserving family history and supporting underserved members of her community.
attributes:
  skills: '[''Financial reporting'', ''GAAP compliance'', ''Audit planning and execution'', ''Budgeting and forecasting'', ''Tax preparation'', ''Internal controls design'', ''Data analysis with Excel and
