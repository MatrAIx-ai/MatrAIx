  career_goals: As a three‑year‑old, Mark's career aspirations are playful and imaginative. He is fascinated by fire trucks and often declares he wants to be a firefighter, admiring the bright lights and
    sirens. He also enjoys helping his mother in the kitchen, pretending to be a chef, and sometimes imagines wearing a pilot's cap while looking at airplanes overhead. These budding interests reflect his
    curiosity about how things work and a desire to be helpful, hinting at future ambitions in fields that combine action, service, and creativity.
