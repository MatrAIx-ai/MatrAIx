  career_goals: Although retired from formal employment, Martha is driven to leave a lasting imprint on her community. She aims to become the chairperson of the Enfield Arts Council, where she can champion
    accessible art programs for seniors and under‑served neighborhoods. She also aspires to mentor young artists through a local mentorship initiative, sharing her knowledge of exhibition design and critical
    appreciation. In addition, she plans to enroll in a certificate program in art therapy to combine her empathy with creative practices, and to write a memoir that chronicles her life experiences and
    the evolution of the local cultural scene. Her long‑term ambition is to create a sustainable community art hub that offers workshops, gallery space, and collaborative projects.
