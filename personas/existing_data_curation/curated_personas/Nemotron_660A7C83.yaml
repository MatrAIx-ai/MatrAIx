personas:
  professional: Summer Perera is a budding little architect who meticulously builds block towers, balancing a curiosity for new shapes with a practical need for sturdy foundations, and they obsessively
    line up each piece to meet their own high standards.
  sports: Summer Perera is a spirited preschool soccer enthusiast who joins the local Sunflower Kids Soccer League, proudly wears the team’s blue jersey, and they cheer loudly for the nearby Riverside Raptors
    baseball team whenever games are televised.
  arts: Summer Perera delights in finger-painting bright landscapes inspired by Eric Carle’s illustrations and sings along to the "Let It Go" anthem from Disney’s Frozen, frequently requesting repeats of
    favorite episodes of "Bluey" and "Sesame Street."
  travel: Summer Perera loves family road trips to the sandy shores of Seaside Beach, has explored the nearby Pinewood Forest nature trail, and they dream of seeing the towering red rocks of the Grand Canyon
    on a future vacation.
  culinary: Summer Perera favors creamy macaroni-and-cheese, loves nibbling crisp apple slices with a dab of peanut butter, and they proudly stir batter for mini cheese quesadillas under careful supervision.
  core: Summer Perera is a meticulously organized three‑year‑old who balances relentless curiosity with a disciplined drive to perfect every tower they build, yet can be quick to claim the best crayon in
    a group.
background:
  cultural: Summer grows up in a white, Southern‑American family in Ocala, Florida. Her household reflects a blend of mainstream Southern culture—Sunday family meals, church attendance, and community fairs—combined
    with the equestrian heritage of Marion County, where horse farms and local rodeos are common. While her last name, Perera, hints at diverse ancestry, her immediate cultural environment is shaped by
    the regional emphasis on hospitality, outdoor recreation, and a close‑knit neighborhood that values shared experiences and practical life skills. These influences inform her love for nature walks, pony
    riding, and organized play activities, as well as her respect for routine and community involvement.
attributes:
  skills: '[''block stacking'', ''color and shape matching'', ''basic counting (1-10)'', ''alphabet recitation'', ''simple puzzle solving'', ''following daily routines'', ''toy organization by category'',
