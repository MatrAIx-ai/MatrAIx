  hobbies: '[''building with wooden blocks'', ''crayon drawing'', ''storytime listening'', ''backyard nature exploration'', ''miniature pony riding'', ''dress‑up imaginative play'', ''singing nursery rhymes'',
    ''sticker collecting and organizing'']'
  career_goals: 'Although only three, Summer frequently talks about future roles she imagines. She dreams of becoming a teacher because she loves helping other children learn and enjoys the structure of
    a classroom. She also expresses a strong interest in caring for animals, especially horses, and hopes to be a veterinarian one day. In the short term, her ambitions focus on learning to read and write,
    mastering new songs, and mastering the art of riding the family’s small pony safely.


    Her aspirations reflect her blend of curiosity and practicality—she wants to acquire knowledge and skills early, and she seeks roles where she can both help others and achieve personal milestones.'
