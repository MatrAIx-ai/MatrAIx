  hobbies: '[''Reading contemporary fiction and poetry'', ''Watercolor sketching'', ''Digital photography of local landscapes'', ''Nature walks and birdwatching'', ''Indoor gardening (herbs and succulents)'',
    ''Mindfulness meditation'', ''Journaling and reflective writing'', ''Puzzle video games (e.g., Tetris, Portal)'', ''Knitting scarves and accessories'']'
  career_goals: Faith aims to secure a stable, predictable remote position that allows her to work independently and minimize social pressure. She is targeting roles such as virtual administrative assistant,
    data entry specialist, or technical writer, where her organizational strengths and attention to detail can shine. In the longer term, she plans to complete a bachelor's degree in business administration
    or communications to broaden her career options. Faith also wishes to deepen her digital media skills to eventually freelance as a content creator, producing photography and written pieces that reflect
    her introspective style.
