  hobbies: '[''building block play'', ''arranging patterns'', ''storytime at the library'', ''group dancing'', ''Simon Says games'', ''preschool circle time'', ''arts and crafts'', ''cutting and coloring'']'
  career_goals: Kim dreams of becoming a teacher because she loves structured classrooms and helping friends learn. She also wants to be a veterinarian to care for animals in an organized way, and sometimes
    imagines being a librarian where she can keep books tidy and guide others to stories. These aspirations reflect her love for routine, order, and social interaction.
