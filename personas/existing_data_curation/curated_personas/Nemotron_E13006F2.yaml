personas:
  professional: Kim Foster, an aspiring preschool teacher who loves to organize storytime, arrange snack schedules, and lead group songs, they channel their methodical love for routine and energetic sociability
    into a future classroom.
  sports: Kim Foster, a lively participant in the Smyrna Soccer Stars preschool team who practices kicking drills every Saturday, they enthusiastically watch Nashville SC matches on Sundays, and enjoy informal
    races on the playground while maintaining a routine of stretching and hydration, reflecting their energetic, sociable, and organized nature.
  arts: Kim Foster, a budding performer who loves to belt out Raffi’s 'Baby Beluga' and Disney classics like 'Let It Go', they often mimic Dolly Parton’s twang during family gatherings, and eagerly attend
    the Nashville Symphony’s kid’s concert featuring Beethoven’s Fifth, letting music shape their joyful, routine-loving playtime.
  travel: Kim Foster, whose family’s weekend road trips to the Great Smoky Mountains and annual summer visit to Orlando’s Disney World fuel a love for nature hikes and magical theme parks, they prefer familiar
    itineraries with predictable schedules but dream of one day seeing the Eiffel Tower in Paris, reflecting their routine-oriented yet adventurous spirit.
  culinary: Kim Foster, a picky yet enthusiastic eater who adores buttery biscuits with honey, creamy mac and cheese, and peanut butter-jelly sandwiches, they often help sprinkle cheese on pizza and stir
    cookie dough with a plastic spoon, and occasionally insist on adding extra cinnamon to their favorite apple slices, showcasing a blend of comfort-food devotion and a budding curiosity for cooking.
  core: Kim Foster, a routine-loving, socially vibrant four-year-old who meticulously lines up their crayons, worries about missing a Sunday choir rehearsal, and can’t resist a daily splash of glitter on
    any craft project, they bring a blend of order and playfulness to every activity.
background:
  cultural: Kim grew up in Smyrna, Tennessee, within a close‑knit white family that values Southern hospitality, church gatherings, and community events. Her family celebrates holidays with traditional
    meals, attends a local Baptist church where she sings in the children’s choir, and participates in neighborhood block parties. The surrounding rural and suburban setting influences her love for nature
    walks, seasonal festivals, and the simple, routine‑oriented lifestyle common in her community.
