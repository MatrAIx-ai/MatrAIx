personas:
  professional: Michele Johnson, an aspiring art therapist, blends watercolor illustration, digital design, and psychology research to craft therapeutic workshops for underserved youth while coordinating
    campus mental‑health social‑media campaigns.
  sports: Michele Johnson, a casual runner and yoga enthusiast, joins the university intramural softball league in spring, follows the Hartford Yard Goats baseball team, and uses weekend bike rides along
    the Farmington River to stay fit.
  arts: Michele Johnson, a watercolor hobbyist and avid gallery visitor, draws inspiration from the works of Frida Kahlo, the jazz sounds of Miles Davis and Nina Simone, and the spoken‑word performances
    of Sarah Kay, while curating a monthly student art showcase.
  travel: Michele Johnson, a budget‑conscious explorer, has backpacked through New Orleans' music festivals, trekked the historic streets of Savannah, and dreams of photographing cherry blossoms in Kyoto,
    preferring spontaneous weekend trips over elaborate itineraries.
  culinary: Michele Johnson, an enthusiastic home cook, perfects Southern soul‑food classics like shrimp and grits, collard greens, and sweet potato pie, often improvising with fresh herbs while swapping
    recipes on the campus culinary forum.
  core: Michele Johnson, a creatively driven yet anxiety‑prone 18‑year‑old, balances sketchbooks, therapy sessions, and midnight coffee runs while obsessively organizing their art supplies alphabetically
    and occasionally procrastinating on assignments.
background:
  cultural: Michele is a Black woman raised in Manchester, Connecticut, where she grew up navigating a predominantly white suburban environment while staying rooted in the traditions of her Southern‑origin
    family. Her upbringing includes church gatherings, family storytelling, and summer trips to visit relatives in the South, which have instilled a strong sense of community, resilience, and an appreciation
    for African‑American music, cuisine, and visual arts. Participation in local Juneteenth celebrations and school cultural clubs has deepened her awareness of social justice issues and the importance
    of representation. These experiences shape her identity, inform her artistic sensibilities, and motivate her commitment to uplift Black voices through creative and therapeutic work.
attributes:
  skills: '[''Watercolor painting'', ''Digital illustration (Procreate, Photoshop)'', ''Photography'', ''Creative writing'', ''Critical analysis'', ''Research methods (psychology)'', ''Public speaking'',
    ''Peer mentoring'', ''Event coordination'', ''Social media content creation'', ''Cultural competency'', ''Active listening'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting art galleries and museums'', ''Reading contemporary fiction and poetry'', ''Listening to jazz and R&B music'', ''Cooking Southern and soul
    food recipes'', ''Practicing mindfulness meditation'', ''Journaling'', ''Volunteering at local community center'', ''Exploring photography'', ''Attending spoken word events'']'
  career_goals: Michele aims to complete a bachelor’s degree in psychology with a concentration in art therapy, followed by a master’s program that qualifies her as a licensed art therapist. In the short
    term, she plans to intern at a community mental‑health center in Hartford, where she can develop therapeutic art workshops for underserved Black youth. Long‑term, she envisions establishing a nonprofit
    art collective that merges creative expression with mental‑health advocacy, creating safe spaces for emotional processing and community empowerment. She also hopes to use her social‑media expertise
    to amplify mental‑health resources and celebrate Black artistic voices nationally.
