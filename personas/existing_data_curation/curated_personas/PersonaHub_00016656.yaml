persona_description: A nutrition data visualizer who is interested in understanding the landscape of global data visualization tools (DVTs) for nutrition and is seeking to optimize the use of existing data
  and fill data gaps. They are looking for insights into the collective landscape of DVTs and how they respond to the needs of decision-makers, and are interested in identifying best practices and lessons
  learned on how these DVTs are used to support decision-making. They are also interested in understanding the key insights revealed by the review of DVTs for nutrition, including the broader the theory
  of change, the less clear the decision you're trying to influence, making data publicly available is insufficient, and the need for an intentional and focused theory of change about what decisions they
  are targeting and who needs to make those decisions to drive change.
