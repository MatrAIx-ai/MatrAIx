personas:
  professional: Kathleen Milan, a 42‑year‑old self‑taught watercolorist and empathetic facilitator, channels spontaneous brushwork and keen mediation skills into low‑structure pop‑up workshops that celebrate
    the layered artistic traditions of Santa Fe, and they envision a modest cooperative gallery that will also host art‑therapy sessions for seniors.
  sports: Kathleen Milan hikes the Sangre de Cristo trail with the Santa Fe Hiking Club in spring, and they join a community volleyball league at the Santa Fe Community Center, follow New Mexico United
    soccer, and enjoy Saturday morning yoga sessions with the local yoga collective, balancing outdoor adventure with low‑impact fitness routines.
  arts: Kathleen Milan captures high‑desert light reminiscent of Ansel Adams, and they paint en plein air inspired by Georgia O’Keeffe’s desert compositions, craft hand‑thrown ceramics echoing fluid modernist
    forms, and find sonic inspiration from the folk melodies of Iron & Wine, while curating Instagram stories that shine a spotlight on emerging regional painters such as Ana Morales.
  travel: Kathleen Milan prefers road‑trip adventures that blend artistic discovery with scenic exploration, and they have spent a week exploring the galleries and red rock vistas of Sedona, a weekend immersing
    in the bustling souks of Marrakech for textile inspiration, a pilgrimage to the harvest festival in Taos, and dream of attending the Venice Biennale and the Burning Man desert gathering, all while balancing
    travel costs with a modest budget.
  culinary: Kathleen Milan’s kitchen is a laboratory for New Mexican flavors, where they simmer green chile stew with roasted Hatch chiles, roll homemade tamales stuffed with fresh corn and pork, glaze
    grilled chicken with prickly pear reduction, and season dishes with cilantro, oregano, and mesquite powder harvested from their own desert garden.
  core: Kathleen Milan is a free‑spirited curator of desert color who trades deadlines for spontaneous brushstrokes, occasionally overlooks utility bills, but they always find balance in sunrise hikes,
    a steaming pot of rosemary tea, and a well‑tended garden.
background:
  cultural: 'Kathleen''s cultural background is rooted in a white Anglo-American family that settled in the American Southwest. Living in Santa Fe has deeply infused her worldview with the region''s hybrid
    heritage: the earthy visual language of Pueblo art, the vibrant colors and culinary traditions of Hispanic culture, and the expansive, high-desert landscape. She appreciates the annual Pueblo dances,
    the Spanish language that permeates everyday life, and the communal spirit of local art collectives, which together shape her sense of identity and creative expression.'
attributes:
  skills: '[''watercolor painting'', ''hand-built ceramics'', ''digital photography'', ''conflict mediation'', ''community event facilitation'', ''creative writing'', ''desert horticulture'', ''art critique'',
    ''social media curation'']'
  hobbies: '[''plein-air watercolor painting'', ''hiking'', ''visiting art galleries'', ''cooking New Mexican cuisine'', ''yoga'', ''gardening desert-friendly plants'', ''writing poetry'', ''volunteering
    at art festivals'', ''digital photography'', ''attending jazz performances'']'
  career_goals: She aims to channel her curiosity and love of art into a role as a community arts facilitator, designing low-structure workshops and pop-up exhibitions that celebrate the blend of Pueblo,
    Hispanic, and Anglo artistic traditions of Santa Fe. Kathleen hopes to eventually open a modest cooperative gallery that provides a flexible platform for emerging local artists and offers occasional
    art-therapy sessions for seniors. She also dreams of traveling to regional art festivals to broaden her perspective and compiling a personal anthology of essays, poems, and artwork reflecting her lived
    experience.
