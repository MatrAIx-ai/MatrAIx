  hobbies: '[''Drawing and coloring'', ''Singing'', ''Dancing to music'', ''Playing pretend with friends'', ''Building with blocks'', ''Reading picture books'', ''Exploring the playground'', ''Crafting
    with glue and paper'']'
  career_goals: At five, Carmen dreams of becoming an artist—perhaps a painter or a dancer—since she loves creating pictures and moving to music. She also enjoys the idea of helping others, so she mentions
    wanting to be a teacher one day. Her goals are shaped by her love for exploring new ideas and her compassionate, energetic personality.
