personas:
  professional: Carmen Gonzalez, a budding kindergarten teacher in training who already designs imaginative story-time circles, uses their natural curiosity and love for rhythmic salsa tunes to engage classmates,
    and embraces a relaxed, flexible approach that often leads them to leave crayons scattered across the carpet.
  sports: Carmen Gonzalez, an energetic member of the Winfield Little Soccer Club who also cheers for the Chicago Cubs during spring games, delights in group play at the neighborhood park and prefers free-form
    running games over structured workouts, and they love the camaraderie of team practice.
  arts: Carmen Gonzalez, an enthusiastic art lover who spends afternoons sketching Pixar characters while dancing to Shakira’s lively pop hits and humming classic salsa tunes by El Gran Combo, often joins
    the Winfield library’s story-time circle to explore new picture books, and they love sharing their drawings with friends.
  travel: Carmen Gonzalez, a curious traveler who treasures the sunny beaches of San Juan where their family celebrates Three Kings Day, loves the interactive exhibits at Chicago’s Museum of Science and
    Industry, and dreams of riding the carousel at Disney World next summer, and they often map out imaginary itineraries with colorful crayons.
  culinary: Carmen Gonzalez, a budding foodie who adores the fragrant arroz con gandules and crunchy empanaditas served at family gatherings, loves dipping apple slices in peanut butter, and eagerly helps
    stir the salsa roja with fresh cilantro, tomatoes, and a pinch of lime, though they often sneak a bite of raw dough before it bakes.
  core: Carmen Gonzalez, a curious, sociable five-year-old who blends festive family rhythms with spontaneous play, often leaves crayons everywhere, and they can’t resist a fresh empanadilla.
background:
  cultural: Carmen’s family maintains a rich Puerto Rican heritage at home, speaking both Spanish and English and celebrating traditions like Three Kings Day, music from salsa and plena, and foods such
    as arroz con gandules and empanaditas. Living in Winfield, Illinois, she also participates in community events that blend her cultural roots with Midwestern influences, allowing her to develop a bilingual,
    multicultural identity.
