personas:
  professional: William Andrews is a seasoned Class A truck driver with a decade of Pacific Northwest experience, who blends meticulous route planning with hands‑on vehicle upkeep, leveraging a sales background
    to negotiate freight contracts and mentor teammates, all while dreaming of a regional fleet manager role.
  sports: William Andrews is an avid hiker and weekend fisherman who follows the Seattle Seahawks and Portland Timbers, belongs to a local Cascades hiking club, and sticks to a flexible fitness routine
    that includes brisk trail walks and occasional strength training at a community garage gym.
  arts: William Andrews captures sunrise over the Columbia River with a DSLR, drawing inspiration from Ansel Adams and the folk sounds of Neko Case, while weekend woodworking projects echo the craftsmanship
    of Chris Salomone and evenings often end with a classic Western like 'Butch Cassidy.'
  travel: William Andrews prefers spontaneous road trips in his truck, charting routes to the Oregon Coast, Yellowstone, and Glacier National Park, balancing family time with a love for remote campgrounds,
    and usually books modest cabins rather than luxury hotels due to budget and schedule constraints.
  culinary: William Andrews delights in grilling cedar‑plank salmon and peppered trout over campfire coals, enjoys a hearty chili made with black beans and smoked paprika, and rolls up his sleeves to hand‑craft
    sourdough bread, favoring fresh herbs like dill and rosemary.
  core: William Andrews is a nature‑driven logistics professional whose curiosity and compassion steer a practical yet occasionally disorganized life, marked by a love for solitary pursuits, hands‑on tinkering,
    and a steadfast commitment to community service.
background:
  cultural: William comes from a middle‑class white American background with German and Irish ancestry. Raised in a suburban community near Vancouver, WA, he was exposed to the Pacific Northwest’s outdoor
    culture, community volunteerism, and a work ethic that values reliability and humility. He identifies with mainstream American values, celebrates holidays such as Thanksgiving and Independence Day,
    and maintains ties to a non‑denominational Christian congregation that reinforces his compassionate and cooperative outlook. His cultural upbringing blends a respect for individual independence with
    a strong sense of community responsibility.
attributes:
  skills: '[''Commercial Driver License (Class A)'', ''Safe heavy vehicle operation'', ''Route planning and optimization'', ''Basic vehicle maintenance'', ''Customer relationship management'', ''Sales negotiation'',
