  hobbies: '[''Fishing'', ''Hiking'', ''Camping'', ''DIY woodworking'', ''Automotive repair'', ''Volunteer work at local food bank'', ''Nature photography'']'
  career_goals: William aims to transition from day‑to‑day driving to a supervisory role within logistics, seeking a regional fleet manager position within the next five years. He plans to complete his
    bachelor's degree in business administration, obtain advanced endorsements such as hazardous‑materials and double‑trailer qualifications, and eventually launch his own small trucking operation that
    prioritizes safety, reliability, and community‑focused service. He also hopes to develop more structured organizational habits to better balance work and family life.
