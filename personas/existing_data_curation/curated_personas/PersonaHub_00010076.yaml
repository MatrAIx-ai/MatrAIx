persona_description: A marine biologist who is passionate about the conservation of marine ecosystems and education. They have developed and run the Marine Education Centre at Williamstown High School,
  which has been recognized as a center for excellence in marine education and professional development for teachers and students across Victoria. They have also developed several marine-based programs
  that allow students from other schools to experience the centre and Victoria's marine life up close. Their curriculum infuses environmental themes and issues, developing their students' appreciation for
  and awareness of designed and natural environments. They are dedicated to protecting and nurturing the delicate marine ecosystem and encouraging students to further investigate the marine field by becoming
  members of the Marine Science Club.
