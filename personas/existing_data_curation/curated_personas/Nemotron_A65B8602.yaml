personas:
  professional: Solange Sanchez, age 2, exhibits a practical knack for arranging toy tools in exact order, suggesting a future as a detail‑oriented engineer, while they also revel in spontaneous free‑play
    that satisfies their love of flexibility and immediate reality.
  sports: Solange Sanchez, age 2, thrives in the Tiny Tumble Tots Gymnastics Club, proudly waves a miniature Chicago Bulls flag while they watch the Bulls on TV, and they prefer the occasional splash in
    the community park’s sandpit over rigid team drills.
  arts: Solange Sanchez, age 2, delights in the bright illustrations of Dr. Seuss books, sings along to the Sesame Street chorus, and they can recite the opening line of 'Let It Go' from Frozen with surprising
    confidence, weaving these artistic moments into daily play.
  travel: Solange Sanchez, age 2, enjoys predictable short road trips to the city zoo and Grandma's countryside cottage, yet they daydream about a future adventure to Disneyland, clutching a stuffed map
    while their parents handle all the planning.
  culinary: Solange Sanchez, age 2, savors buttery mashed sweet potatoes, tiny cheese cubes, and banana slices, often arranging the food like a colorful puzzle on their plate, though they occasionally fling
    milk across the high chair in a burst of playful rebellion.
  core: Solange Sanchez, age 2, blends a methodical love for ordering toys with spontaneous snack‑time messes, all while maintaining an uncanny calm that makes them a tiny, steadfast negotiator of their
    own world.
background:
  cultural: Solange grows up in a Mexican-American household in Philadelphia, where Spanish is spoken alongside English and Mexican cultural traditions are cherished. Her family celebrates holidays such
    as Día de los Muertos and the Feast of Our Lady of Guadalupe with altars, music, and traditional foods like tamales and atole. Weekly meals often feature Mexican flavors—corn tortillas, beans, and fresh
    salsa—while community events at local Latino centers provide her with exposure to cultural dance, crafts, and bilingual story time. This rich cultural tapestry shapes her identity, language development,
    and appreciation for community.
