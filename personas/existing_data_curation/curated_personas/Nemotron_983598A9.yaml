personas:
  professional: Melissa Babin, an enthusiastic three-year-old 'mini-entrepreneur' who runs a make-believe lemonade stand, methodically organizes her toy inventory, charms little customers with chatty greetings,
    balances curiosity for new flavors with a practical sense of counting change, and reliably follows through on promises to give exact change.
  sports: Melissa Babin, an energetic three-year-old who thrives in the Tiny Tots Soccer Club’s Saturday sessions, dribbles a size-3 ball with organized practice routines, cheers for the Los Angeles Lakers
    during family game nights, and treats each playground climb as a personal fitness milestone, displaying sociable enthusiasm and a methodical approach to play.
  arts: Melissa Babin, a vibrant three-year-old who spends hours drawing colorful crayon portraits of Mickey Mouse and Elsa, sings loudly along to "Let It Go" by Idina Menzel, and eagerly watches Sesame
    Street’s Elmo, using these creative outlets to channel curiosity and talkative flair.
  travel: Melissa Babin, a curious three-year-old who prefers family road trips with sing-along playlists, delights in exploring Disney World in Orlando and the sandy shores of Myrtle Beach, dreams of a
    future adventure to the Grand Canyon, and balances excitement for new places with the comfort of a familiar stroller routine.
  culinary: Melissa Babin, a discerning three-year-old who adores creamy mac and cheese, chicken nuggets with ketchup, and strawberry-yogurt parfaits, proudly assembles her own peanut-butter-and-jelly sandwich
    using a child-sized knife, yet stubbornly refuses broccoli, displaying a methodical approach to meals and a quirky resistance to green vegetables.
  core: Melissa Babin, a chatty, organized three-year-old who lines up toy cars by color, leads playtime with confident storytelling, balances boundless curiosity with disciplined nap schedules, and occasionally
    throws a tantrum when denied extra dessert.
background:
  cultural: Melissa is raised in a white, middle‑class family in Louisville, Kentucky. Her upbringing reflects a blend of Southern hospitality and Midwestern pragmatism. Family traditions include celebrating
    regional events like the Kentucky Derby festival, enjoying local foods such as fried chicken and biscuits, and participating in church and community gatherings. These cultural experiences shape her
    sociable, organized, and confident demeanor.
