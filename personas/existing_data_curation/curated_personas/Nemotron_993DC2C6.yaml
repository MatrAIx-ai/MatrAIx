personas:
  professional: May Dauber, a 27‑year‑old data analyst turned aspiring product manager, blends Python‑driven statistical modeling, Agile coordination, and charismatic workshop facilitation to translate
    complex technical concepts into engaging narratives, leveraging their organized, methodical approach and sociable energy to lead cross‑functional teams in the Columbus tech community.
  sports: May Dauber fuels their love for the outdoors by hiking Hocking Hills and joining a weekend ultimate frisbee league, while cheering on the Columbus Crew in MLS and the Columbus Blue Jackets in
    the NHL, and they punctuate their routine with morning yoga and occasional CrossFit workouts at a local gym.
  arts: May Dauber channels their improvisational flair into weekly improv comedy classes, revels in the witty banter of performers like Tina Fey and John Mulaney, attends indie film screenings at the Columbus
    Museum of Art, and curates playlists featuring eclectic artists such as Vampire Weekend, Mitski, and Anderson .Paak for background during coding marathons.
  travel: May Dauber prefers short, well‑planned road trips that blend adventure and cultural immersion, having explored Hocking Hills, a weekend getaway to Chicago for a tech conference, a solo backpacking
    stint in Kyoto to study culinary traditions, and they dream of a future sailing trip through the Greek islands once their savings allow.
  culinary: May Dauber is an avid home chef who expertly prepares classic Korean staples such as bulgogi and kimchi, experiments with fusion dishes like kimchi‑topped tacos and gochujang‑glazed salmon,
    and often dazzles friends with meticulous plating, though they occasionally over‑stock their pantry with obscure spices they rarely use.
  core: May Dauber is a methodical yet charismatic data enthusiast who can unwind a tangled JIRA ticket as easily as they improvise a punchline, but they have a notorious habit of late‑night coffee binges
    that keep their insomnia at bay.
background:
  cultural: May was raised in a bicultural household in Columbus, Ohio, with parents who emigrated from South Korea. Her family maintained Korean language, customs, and values such as respect for elders,
    a strong emphasis on education, and the importance of communal harmony, while also embracing the multicultural environment of the Midwest United States. She celebrates Lunar New Year and Chuseok with
    traditional meals and family gatherings, and she often shares Korean recipes and stories with friends from diverse backgrounds. Bilingual in English and Korean, May frequently serves as a cultural bridge
    in community events, helping to create inclusive spaces that celebrate both her heritage and her American upbringing.
attributes:
  skills: '["Python programming", "Data analysis (SQL, R)", "Statistical modeling", "Experimental design", "Circuit prototyping", "CAD modeling (SolidWorks)", "Technical writing", "Public speaking", "Agile
