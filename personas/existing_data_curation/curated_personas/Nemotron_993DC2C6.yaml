  hobbies: '["Tech meetup organization & hackathon planning", "Cooking (Korean and fusion cuisine)", "Improv comedy", "Hosting social gatherings", "Yoga", "Hiking", "Escape rooms", "Puzzle solving (jigsaw,
    logic puzzles)", "Strategic board games"]'
  career_goals: May aims to move into a product management or technical project leadership role where she can blend her analytical background with her natural talent for communication and team coordination.
    She envisions joining an innovative tech company or research‑driven startup in the Columbus area, guiding product development from concept through launch while fostering collaboration across engineering,
    design, and marketing teams. In the longer term, she hopes to mentor junior engineers, lead community outreach programs that promote STEM education, and shape product strategies that prioritize user
    needs, sustainability, and social responsibility.
