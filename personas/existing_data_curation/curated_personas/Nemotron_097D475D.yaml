  hobbies: '[''Visiting art galleries'', ''Photography'', ''Sketching'', ''Exploring new cuisines'', ''Traveling'', ''Reading about design and psychology'', ''Yoga and meditation'', ''Journaling'', ''Listening
    to indie music'', ''DIY crafts'', ''Cooking traditional Southeast Asian dishes'', ''Attending cultural festivals'']'
  career_goals: Hanh aims to advance from her current role as a marketing manager to a senior marketing leadership position within the next five years, eventually becoming a Director of Marketing or heading
    a regional marketing division. She plans to deepen her expertise in integrated marketing communications, earn advanced certifications (e.g., Google Ads, HubSpot, PMP) and possibly pursue an MBA. Long-term,
    she envisions launching her own boutique agency that specializes in culturally resonant campaigns for Southeast Asian and multicultural audiences, leveraging her artistic sensibility and data-driven
    mindset.
