personas:
  professional: Hanh Staley, a 25‑year‑old marketing manager in Houston, blends data‑driven brand strategy with a keen eye for visual storytelling, leveraging their methodical planning and boundless artistic
    curiosity to craft inclusive, multicultural campaigns that resonate across diverse audiences.
  sports: Hanh Staley stays active by attending weekly spin classes at a downtown studio, cheering on the Houston Astros during spring training, joining a co‑ed recreational softball league in the summer,
    and practicing sunrise yoga to soothe the anxiety that often spikes after marathon marketing projects.
  arts: Hanh Staley immerses themselves in the local art scene, drawing inspiration from the vivid murals of Houston’s East End, the immersive installations of Yayoi Kusama, and the soulful indie folk of
    Mitski, while routinely capturing candid street moments with a Leica M10 and sketching urban landscapes during coffee breaks.
  travel: Hanh Staley plans trips with a blend of meticulous itineraries and spontaneous detours, having recently explored the night markets of Ho Chi Minh City and the art districts of Lisbon, while dreaming
    of a solo photography pilgrimage across the lantern‑lit streets of Kyoto and the vibrant souks of Marrakech.
  culinary: Hanh Staley combines culinary curiosity with solid home‑cooking chops, regularly crafting fusion dishes such as lemongrass‑infused tacos with pickled daikon and cilantro, mastering the balance
    of fish sauce and lime in a modern bánh mì bao, and indulging in weekend experiments with matcha‑spiked ramen broth.
  core: Hanh Staley is a hyper‑organized marketer whose relentless curiosity fuels bold, art‑centric campaigns, yet their perpetual anxiety often triggers late‑night snack binges and a habit of misplacing
    keys.
background:
  cultural: Hanh is a second-generation Southeast Asian American, likely of Vietnamese descent, raised in a bilingual household in Texas. She grew up celebrating traditions such as Tet, practicing communal
    cooking, and maintaining close family ties, while also navigating the multicultural environment of Fort Bend County. This dual cultural perspective informs her inclusive approach to marketing, giving
    her a keen awareness of both collectivist values and individual expression. She is actively involved in local Asian community events, volunteers at cultural heritage workshops, and incorporates her
    heritage flavors and aesthetics into her professional projects.
