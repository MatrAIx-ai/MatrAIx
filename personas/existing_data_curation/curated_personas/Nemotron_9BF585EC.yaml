  career_goals: Helene hopes to turn her practical home skills into a small home‑based venture, such as a boutique catering service offering classic Midwestern meals or an online shop for handmade home
    décor. She also envisions taking on a leadership role in her local community center, organizing events and workshops that showcase her organizational talent. While she values routine, she wants a flexible
    schedule that lets her balance family responsibilities with her competitive drive to be recognized as a reliable pillar of her town.
