  career_goals: William aims to advance to a senior executive role, such as Director of Operations, where he can lead a company‑wide lean manufacturing transformation and embed sustainability practices.
    He is eager to mentor the next generation of managers, champion employee‑well‑being initiatives to mitigate stress, and leave a legacy of operational excellence and community impact within his organization.
