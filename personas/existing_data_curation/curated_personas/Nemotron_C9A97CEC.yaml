  hobbies: '["Fly fishing","Hiking in Monongahela National Forest","Hunting","Woodworking","Family genealogy research","Listening to bluegrass music","Reading Appalachian folklore","Community volunteer
    work","Amateur photography","Card games"]'
  career_goals: John aims to maintain a stable income while gradually transitioning toward a mentorship role, training younger couriers in safe driving and efficient logistics. He hopes to eventually establish
    a small, family‑run delivery service that serves Pendleton County’s remote communities, ensuring reliable access to essential goods. Additionally, he seeks to secure a comfortable retirement by saving
    and possibly taking on occasional part‑time routes that allow him to stay active and connected to the community.
