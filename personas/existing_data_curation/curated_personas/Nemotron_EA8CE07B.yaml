  hobbies: '["Reading Latin American literature", "Architectural history research", "Gardening", "Cooking Puerto Rican dishes", "Volunteer board member for senior services", "Walking his beagle", "Woodworking",
    "Listening to salsa and jazz music"]'
  career_goals: Eduardo plans to leverage his extensive experience to become a sought‑after consultant for community associations and mixed‑use developments in the Greater Philadelphia area. He intends
    to earn the Certified Manager of Community Associations (CMCA) designation within the next two years, and to design a sustainability and resident‑wellness program that can be replicated across local
    HOAs. He also hopes to mentor emerging property managers through a quarterly workshop series and eventually author a practical guide titled "Managing Communities with Culture and Efficiency." Over the
    longer term, he envisions transitioning to a part‑time advisory role that allows him to balance professional impact with personal pursuits and family time.
