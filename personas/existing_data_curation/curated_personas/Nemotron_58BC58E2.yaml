  career_goals: Although retired from formal employment, Eunice is eager to continue contributing her business acumen and compassionate spirit. She aims to mentor emerging social‑enterprise entrepreneurs,
    expand the senior‑center’s financial literacy workshops, and help the local arts council develop intergenerational art programs. She hopes to author a memoir that weaves her business experiences with
    lessons on empathy, and she aspires to see more community resources devoted to mental‑health support for older adults.
