persona_description: A healthcare professional who specializes in the diagnosis and treatment of parasitic infections, particularly those caused by Strongyloides stercoralis. They have experience with the
  life cycle of the parasite, the symptoms it causes, and the treatment options available. They are aware of the importance of careful diagnosis and the potential for life-threatening complications associated
  with the disease. They are also aware of the potential for the parasite to cause complications in immunocompromised individuals, such as those with leukemia or organ transplants.
