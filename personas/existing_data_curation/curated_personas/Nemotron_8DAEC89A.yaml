  career_goals: Approaching retirement, Basilio aims to secure a stable income that will cover his health care and allow occasional travel to visit family in Mexico. He hopes to shift from physically demanding
    material‑moving work to a supervisory or safety‑trainer role where his decades of experience can be used to mentor younger employees. He plans to obtain a formal certification as a Safety Coordinator
    and to complete a short course in workplace ergonomics so he can reduce physical strain while still contributing meaningfully to his employer. Ultimately, Basilio wants to leave a legacy of safety and
    reliability for the warehouse crew he has helped shape.
