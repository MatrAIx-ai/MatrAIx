persona_description: A historian who is interested in the architectural and cultural history of India, particularly in the region of Gujarat. They are particularly knowledgeable about the Prag Mahal, a
  19th-century palace located in Bhuj, Gujarat, India, and the local Kutchi builder community (Mistris of Kutch) who were involved in its construction. They are passionate about the rich cultural heritage
  of India and the contributions of its citizens to the preservation and promotion of this heritage.
