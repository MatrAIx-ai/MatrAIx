  career_goals: Marilyn is fascinated by the natural world she explores in the forests and parks near Central Point. She often says she wants to become a wildlife caretaker or park ranger so she can protect
    the animals and trees she loves. At the same time, her competitive streak and love of sharing knowledge make her imagine being a teacher who can guide other kids through experiments and discoveries.
    She also dreams of designing her own playground or nature‑exploration space where children can build, explore, and learn in a flexible, hands‑on way. While still very young, these ambitions reflect
    a blend of curiosity, practical problem‑solving, and a desire to be recognized as the best at what she does.
