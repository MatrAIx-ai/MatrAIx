persona_description: A psychologist who specializes in the development and implementation of effective strategies to promote healthy eating behaviors in adolescents, particularly at a young age when the
  impact of unhealthy snacking is crucial. She has experience conducting research, leading studies, and creating interventions to address the issue of overconsumption of unhealthy snacks among schoolchildren.
  Her approach involves using the Social Norms Approach (SNA) to correct misperceptions about peers' snacking behavior and engage students in interactive learning experiences to promote healthy eating habits.
