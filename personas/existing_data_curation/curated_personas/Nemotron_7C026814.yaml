personas:
  professional: Loc Park, a 79‑year‑old retired handyman who now volunteers as a community organizer, blends their carpentry, gardening, and bilingual translation abilities to run a senior‑center technology
    help desk, coordinate multicultural potlucks, and teach hands‑on cooking workshops, all while embracing a curious, flexible approach that values social harmony over strict schedules.
  sports: Loc Park stays active by fishing on nearby lakes in summer, joining the Colfax senior walking club for daily park strolls, and cheering on the Green Bay Packers and Milwaukee Brewers, preferring
    low‑impact, social activities over competitive sports.
  arts: Loc Park, an enthusiastic church‑choir member, finds joy in singing gospel hymns while unwinding with the folk storytelling of Bob Dylan, the piano impressions of Claude Debussy, and classic films
    starring Morgan Freeman, letting music and cinema color their evenings.
  travel: Loc Park prefers relaxed, family‑oriented road trips, often revisiting Door County’s shoreline and the historic streets of St. Paul, while dreaming of a future pilgrimage to the ancestral peninsula
    of their family once health permits, balancing careful budgeting with a love for spontaneous scenic detours.
  culinary: Loc Park, a seasoned home cook, delights in preparing kimchi, bulgogi, and japchae alongside hearty Midwestern staples like butter‑tulip garden salad and apple crisp, frequently hosting neighborhood
    potlucks where the aroma of fermented cabbage and caramelized beef fuels lively conversation.
  core: Loc Park is a curious, community‑centric retiree who juggles a love for gardening, spontaneous cooking demos, and a habit of misplacing their glasses, all while championing harmony in every backyard
    gathering.
background:
  cultural: Loc was born to Korean parents who immigrated to the United States after the Korean War. He grew up in a close‑knit immigrant community in the Midwest, learning both Korean traditions and Midwestern
    values. His upbringing emphasized respect for elders, communal harmony, and the importance of sharing meals, which he continues to practice through cooking and community events. He celebrates Korean
    holidays such as Chuseok and Seollal alongside American holidays, blending both cultural calendars. While fluent in Korean, he primarily conducts his daily life in English, enabling him to bridge cultural
    gaps in Colfax. His experiences reflect a synthesis of Korean heritage—family‑centered, food‑oriented, and community‑oriented—and the practical, neighborly spirit of rural Wisconsin.
