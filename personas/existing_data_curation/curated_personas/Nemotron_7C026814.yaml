  career_goals: Although retired, Loc aims to deepen his contribution to the Colfax community. He plans to expand his volunteer work at the senior center by mentoring newer volunteers and leading a weekly
    technology help desk. He hopes to establish a small cooking workshop where he can teach traditional Korean recipes to interested neighbors, preserving his cultural heritage. Loc also wants to collaborate
    with the local historical society to document oral histories of early Asian immigrants in Chippewa County. Maintaining his health and mobility is a personal goal, as is making a trip to South Korea
    to reconnect with extended family and revisit his birthplace when his health permits.
