  career_goals: Kevin aspires to turn his creative passions and community‑service experience into a sustainable, purpose‑driven career. He plans to earn his GED within the next year and pursue a certificate
    in graphic design or art therapy, enabling him to offer freelance illustration services and lead therapeutic art workshops at local non‑profits. Long‑term, he hopes to establish a small community‑based
    studio in Bucks County where residents can explore visual arts, practice mindfulness, and receive informal counseling. He also envisions developing an online portfolio of his paintings and writings,
    eventually publishing a collection of poems and short stories that reflect his introspective and imaginative outlook.
