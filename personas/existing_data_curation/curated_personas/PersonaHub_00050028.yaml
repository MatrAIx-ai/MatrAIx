persona_description: A teacher who is interested in using educational MMORPGs in their classroom to promote social learning, collaboration, and problem-solving skills among students. They are also concerned
  about the potential negative effects of aggressive competition and bullying in such games and are looking for ways to mitigate these issues. They are open to the use of MMORPGs in an educational setting
  and are willing to work with students and teachers to establish social rules and consequences in the game. They are also interested in the possibility of using MMORPGs to bring distant learners together
  and to create a safe and supportive environment for students who may struggle with interpersonal communication.
