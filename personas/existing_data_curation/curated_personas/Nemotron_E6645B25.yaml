personas:
  professional: Raymond Roberts, a newborn with an innate fascination for patterns and sound, is expected to grow into a user experience designer skilled in visual storytelling, whose spontaneous curiosity
    and aversion to strict timelines will both spark innovative concepts and challenge project deadlines.
  sports: Raymond Roberts, an infant who thrives on the gentle swaying of parent-led stroller walks and enjoys baby gymnastics classes, cheers in miniature spirit for the Seattle Seahawks while his parents
    enroll him in a community "Tots Play" club.
  arts: Raymond Roberts, even at a few weeks old, is soothed by lullabies from Norah Jones and the classical harmonies of Mozart, and frequently watches vibrant street-art murals during stroller rides,
    nurturing an early visual and auditory appreciation.
  travel: Raymond Roberts, a newborn who prefers short, schedule-light trips, finds delight in family getaways to the coastal town of Charleston, where quiet beaches and easy access to baby-friendly accommodations
    create a calming experience, while dreaming of future journeys to Kyoto's cherry-blossom season.
  culinary: Raymond Roberts, a newborn palate, enjoys warm vanilla-infused formula and is comforted by the aroma of simmering chicken broth while nearby caregivers prepare mashed sweet potatoes, which he
    observes with wide-eyed curiosity.
  core: Raymond Roberts embodies a gentle curiosity and social warmth, constantly seeking new sensations while wrestling with innate worry and an aversion to rigid routines.
background:
  cultural: Raymond was born into a white family in Heber City, Utah, a community known for its close‑knit social fabric and connection to the surrounding mountains. His upbringing is shaped by the region’s
    emphasis on outdoor recreation, such as skiing and hiking, and by family traditions that celebrate community gatherings, seasonal festivals, and a respect for nature. The local culture’s value of cooperation,
    harmony, and artistic appreciation informs his early experiences and will likely continue to influence his worldview.
