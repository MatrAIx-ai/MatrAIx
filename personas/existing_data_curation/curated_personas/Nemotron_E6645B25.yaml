  career_goals: As he grows, Raymond envisions a future where he can merge his love for art, creativity, and community. He aspires to pursue a flexible, unconventional career—perhaps as a visual artist,
    designer, or community arts facilitator—where he can express new ideas, collaborate with others, and avoid rigid structures. He hopes to work in environments that value spontaneity, social connection,
    and harmony, while also developing coping strategies for stress.
