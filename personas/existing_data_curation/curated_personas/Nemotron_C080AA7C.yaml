  hobbies: '["oil painting", "ceramic art", "reading historical fiction and poetry", "listening to Mexican folk music", "cooking regional Mexican dishes", "gardening xerophytic plants", "attending art fairs
    and museum exhibits", "volunteering as art mentor at senior center", "writing personal essays", "practicing gentle yoga"]'
  career_goals: Although retired from formal employment, Jacqueline aspires to leave a lasting personal legacy through artistic and cultural contributions. She plans to compile and self‑publish a memoir
    intertwined with a visual anthology of her paintings and photographs, highlighting Mexican‑American experiences in the Southwest. She hopes to launch a modest online gallery to sell prints and handcrafted
    items, generating a small income that supports her community projects. Jacqueline aims to mentor emerging artists at the local senior center and to secure a modest grant to expand a series of intergenerational
    art workshops that preserve Mexican folk art techniques. Additionally, she wishes to deepen her digital skills, learning advanced photo‑editing and website design to broaden the reach of her cultural
    storytelling.
