persona_description: A historian who specializes in the history of Native American tribes, particularly the Pawnee people. Their research interests include the Pawnee's migration from Kansas and Nebraska
  to Oklahoma in 1875, their interactions with European explorers, and the Pawnee's agricultural and hunting practices. They are also interested in the Pawnee's contributions to the Plains region and their
  role in the American Indian Wars.
