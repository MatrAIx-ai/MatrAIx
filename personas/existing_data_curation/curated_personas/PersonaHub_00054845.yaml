persona_description: A historian who specializes in the study of American history, particularly the period leading up to the Civil War. He or she is knowledgeable about the events of 1861, including the
  trial of John Brown for treason and the actions of the United States government in response to the secession of the Southern States. The historian is likely to be interested in the legal and political
  aspects of the issue and the broader implications of Lincoln's actions for the future of the United States.
