personas:
  professional: Karim Williams is a budding LEGO architect who channels their love for building and puzzles into designing intricate models during after‑school workshops, balancing meticulous planning with
    bursts of creative spontaneity.
  sports: Karim Williams enjoys playing on the neighborhood under‑8 soccer team, the Blue Hawks, practicing after school, and loves weekend family hikes in the local nature reserve where they often spot
    squirrels and birds that later appear in their drawings.
  arts: Karim Williams spends free afternoons sketching wildlife and landscapes with colored pencils, attends a weekly art workshop at the community center where they share creations with a small group,
    and draws inspiration from listening to soulful singers like Sam Cooke and upbeat pop like Billie Eilish.
  travel: Karim Williams prefers short, family‑guided trips to nearby attractions such as the science museum, the coastal boardwalk, and dreams of visiting the Grand Canyon after seeing it on a space documentary,
    favoring planned itineraries that include plenty of time for quiet observation.
  culinary: Karim Williams loves homemade pizza topped with pepperoni and olives, enjoys making blueberry pancakes on Saturday mornings, can name the ingredients in a classic grilled cheese sandwich—bread,
    butter, and cheddar—while occasionally sneaking extra chocolate chips into the batter.
  core: Karim Williams is a curious, quiet creator who balances meticulous LEGO building with spontaneous sketching, relishes solitary nature walks, and navigates a world of small‑group adventures, occasional
    allergies, and a disciplined allowance routine.
background:
  cultural: Karim is raised in an African-American family that places great value on storytelling, music, and community support. Living in Soledad, California, a town with a rich agricultural heritage and
    a vibrant Latino community, he experiences a blend of cultural influences. Family gatherings often feature soulful R&B and gospel music, shared meals, and oral histories that reinforce a sense of pride
    and resilience. The family celebrates Black cultural events such as Juneteenth and participates in local community festivals, providing Karim with a diverse cultural tapestry that nurtures his curiosity
    and respect for different traditions.
