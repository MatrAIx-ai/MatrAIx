  career_goals: Karim dreams of exploring the sky as an astronaut who can sketch the stars, or becoming an artist who paints stories inspired by his imagination. He is also fascinated by the ocean and imagines
    working as a marine biologist who protects the Pacific coast near his hometown. In the nearer future, he focuses on improving his reading and drawing abilities, joining his school's art club, and learning
    more about space and marine life through books and videos, laying a foundation for any of these future paths.
