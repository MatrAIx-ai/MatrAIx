  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Woodworking'', ''Hiking in the Upper Peninsula'', ''Reading indigenous folklore'', ''Playing the Native American flute'', ''Journaling'',
    ''Attending local art exhibitions'', ''Meditative walking'']'
  career_goals: He aims to become a store manager within the next two years, focusing on integrating artistic displays and cultural storytelling into the retail experience. Longer term, he aspires to become
    a regional district manager or to open a boutique that showcases Native-inspired handcrafted goods, providing a platform for local artisans and creating employment opportunities in his community. He
    also hopes to develop a training program for retail staff that emphasizes compassionate customer service and cultural awareness, perhaps partnering with tribal business development centers.
