personas:
  professional: Claire Welles, a retired community organizer turned museum docent, blends meticulous project‑management skills with an insatiable curiosity for art history, curating intimate exhibitions
    and leading senior workshops while reliably shepherding every detail from concept to execution.
  sports: Claire Welles enjoys low‑impact activities such as morning walks along the Brushy Creek Trail, a weekly senior yoga class at the Athens Senior Center, and occasional gentle tennis at the Athens
    Racquet Club, all while cheering on the University of Georgia Bulldogs football team each fall.
  arts: Claire Welles spends weekends cataloguing her photography of historic homes like the Rosie Bank House, absorbing the works of Georgia O’Keeffe, Andy Warhol, and local folk artist Mary Matthews at
    the Georgia Museum of Art, and never misses the community theater’s production of Tennessee Williams’ 'A Streetcar Named Desire' starring regional actor James McNeil.
  travel: Claire Welles prefers meticulously planned day trips to nearby historic sites such as Savannah’s Historic District and Asheville’s River Arts District, while dreaming of a curated museum tour
    in Paris, striking a balance between a modest travel budget and leisurely afternoons exploring antique markets and garden cafés.
  culinary: Claire Welles, a confident home cook, delights in harvesting garden tomatoes to create a fresh ratatouille seasoned with basil and thyme, savors Southern staples like shrimp‑and‑grits and peach
    cobbler at local bistros, and never turns down a perfectly brewed cup of Earl Grey tea.
  core: Claire Welles, the detail‑oriented art lover who alphabetises vintage postcards, meticulously plans every garden planting, yet occasionally forgets to water succulents during rainy spells, epitomises
    a life of disciplined curiosity balanced with charming quirks.
background:
  cultural: Claire was raised in a mid‑century Southern household in Georgia, where traditional values of hospitality, community involvement, and respect for regional heritage were emphasized. Her upbringing
    instilled a strong sense of duty and an appreciation for local history, while her adult life in the vibrant college town of Athens exposed her to diverse artistic expressions and progressive ideas.
    This blend of Southern roots and contemporary cultural curiosity shapes her worldview, reflecting both reverence for tradition and an open-minded embrace of new experiences.
