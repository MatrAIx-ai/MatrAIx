  career_goals: Although retired from formal employment, Claire aims to deepen her engagement with the Athens arts community. She plans to volunteer as a docent at the Georgia Museum of Art, lead art‑history
    workshops for seniors, and mentor emerging artists through the Athens Arts Council. To support these goals, she intends to enroll in a certificate program in museum studies at a nearby community college
    and to launch a blog series documenting the cultural evolution of Athens, eventually compiling her insights into a memoir.
