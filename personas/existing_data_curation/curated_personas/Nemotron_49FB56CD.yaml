    and training workshops'']'
  hobbies: '[''Visiting contemporary art galleries and museum exhibitions'', ''Pottery and mixed-media painting'', ''Beach yoga and coastal hiking'', ''Cooking modern Vietnamese cuisine'', ''Attending live
    jazz and swing dance events'', ''Group travel and cultural tours'', ''Volunteering for financial literacy workshops'', ''Reading mystery and psychological thriller novels'']'
  career_goals: Theavy aims to become a regional sales director within the next five years, overseeing a team of agents, expanding the agency’s market share in high‑net‑worth segments, and launching a boutique
    brokerage that integrates insurance with holistic financial advisory services. She intends to earn the CPCU designation, develop a mentorship program for women and minorities in the insurance industry,
    and eventually shift from direct sales to strategic consulting and community outreach, allowing her to balance professional ambition with personal well‑being.
