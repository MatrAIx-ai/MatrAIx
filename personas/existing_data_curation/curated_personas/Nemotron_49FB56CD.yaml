personas:
  professional: Theavy Tran is a seasoned insurance consultant who leverages two decades of risk analysis and CRM expertise to craft bespoke policies for high‑net‑worth clients, channeling their competitive
    drive and meticulous organization into a strategic push for a regional director role while mentoring women and minorities in the industry.
  sports: Theavy Tran fuels their sunrise yoga routine on Santa Monica beach, hits the coastal trail for weekend hikes with the LA Hiking Club, plays competitive beach volleyball with the Westside Vibes
    league, and passionately roots for the Los Angeles Lakers, LA Galaxy, and Dodgers, balancing a high‑energy social schedule with disciplined fitness habits.
  arts: Theavy Tran is a devoted contemporary‑art aficionado who frequents the Broad and LACMA to study works by Jeff Koons and Yayoi Kusama, attends late‑night jazz sessions featuring Wynton Marsalis and
    swing dancing nights to Ella Fitzgerald’s classics, and channels that inspiration into mixed‑media painting experiments that blend Southeast Asian motifs with Californian palettes.
  travel: Theavy Tran prefers small‑group cultural tours that explore hidden coastal gems such as Mendocino, the Outer Banks, and Hoi An, planning trips months in advance to balance work commitments, yet
    occasionally splurges on spontaneous weekend getaways to Carmel‑by‑the‑Sea, always seeking artistic inspiration and culinary discoveries.
  culinary: Theavy Tran’s kitchen is a laboratory where they reimagine pho with heirloom tomatoes and avocado, craft banh mi sliders with locally sourced sourdough and pickled daikon, and host dinner parties
    featuring lemongrass‑infused salmon paired with quinoa‑couscous, showcasing skilled mixed‑media plating that mirrors their art practice.
  core: Theavy Tran blends a high‑stakes insurance career with an insatiable appetite for art, yoga, and culinary experimentation, juggling competitive ambition and chronic worry while occasionally over‑booking
    social events at the expense of sleep.
background:
  cultural: Theavy Ann Tran is a first‑generation American of Vietnamese descent. Raised in a bilingual household, she grew up with Vietnamese language, Tet celebrations, and family recipes as core parts
    of her identity. Her parents emphasized education, perseverance, and community responsibility, shaping her diligent work ethic. While she embraces the progressive, multicultural vibe of Santa Monica,
    she stays connected to her heritage by participating in local Vietnamese cultural festivals, cooking traditional and fusion dishes, and maintaining close ties with extended family both in California
    and Vietnam. This bicultural perspective informs her empathy for diverse clients and fuels her curiosity about global art, ideas, and experiences.
attributes:
  skills: '[''Consultative insurance sales'', ''Risk assessment and underwriting basics'', ''Client relationship management'', ''Financial planning and needs analysis'', ''Regulatory compliance and licensing'',
