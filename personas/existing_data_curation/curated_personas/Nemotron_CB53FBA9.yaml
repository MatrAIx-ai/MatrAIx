  hobbies: '[''Sketching landscapes'', ''Reading sci‑fi and adventure books'', ''Building LEGO models'', ''Playing piano'', ''Coding in Scratch'', ''Visiting museums'', ''Nature walks along the Hudson River'',
    ''Playing chess'']'
  career_goals: Thomas dreams of a future where he can blend his love for art, structure, and technology. He imagines becoming an architect or museum curator who designs public spaces that reflect the natural
    beauty of the Hudson River Valley. He also aspires to develop educational software that sparks curiosity in other kids, merging his coding skills with his passion for learning. In the short term, he
    aims to win his school's art competition, earn a top spot in a regional science fair, and continue building a strong academic record that sets a high standard for his achievements.
