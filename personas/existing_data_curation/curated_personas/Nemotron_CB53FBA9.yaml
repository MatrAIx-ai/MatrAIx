personas:
  professional: An aspiring junior illustrator and game developer named Thomas Hudson combines meticulous sketching of Hudson River landmarks with Scratch coding, leveraging their disciplined, achievement-focused
    mindset to produce polished LEGO prototypes and daily piano pieces.
  sports: An enthusiastic junior athlete named Thomas Hudson plays forward for the Hudson River Youth Soccer Club, cheers for the New York Yankees during baseball season, follows the New York Knicks in
    basketball, and regularly paddles a small kayak with family on the Hudson River, reflecting their love for teamwork and nature.
  arts: A budding visual artist named Thomas Hudson spends weekends sketching historic Hudson River sites, draws inspiration from Vincent van Gogh's bold colors and Claude Monet's water scenes, practices
    Beethoven piano sonatas for relaxation, and frequently visits exhibitions featuring contemporary illustrator Shaun Tan at the New York State Museum, showcasing their blend of curiosity and disciplined
    creativity.
  travel: A curious explorer named Thomas Hudson loves day trips to the Hudson River Valley and weekend adventures at the Smithsonian in Washington, D.C., and dreams of touring the Louvre in Paris and the
    Ghibli Museum in Tokyo, preferring thoughtfully planned itineraries that combine art, history, and nature, reflecting their meticulous approach to travel.
  culinary: A budding foodie named Thomas Hudson enjoys crafting homemade pepperoni pizza with fresh basil, assembling quick carrot-and-cream cheese sticks, and experimenting with chocolate chip cookies,
    yet often forgets to wash their hands before cooking, reflecting their enthusiastic but occasionally careless kitchen habits.
  core: Thomas Hudson, a ten-year-old hyper-organized prodigy, balances disciplined piano practice and LEGO engineering with an insatiable curiosity for history, yet routinely misplaces their sketchbook
    in couch cushions, turning their quest for order into a daily treasure hunt.
background:
  cultural: Thomas grew up in a middle‑class family in Hyde Park, a historic town in Dutchess County, New York. The region’s rich colonial heritage, proximity to the Hudson River, and a vibrant artistic
    community—especially the legacy of the Hudson River School painters—have cultivated his deep appreciation for art, nature, and history. He celebrates typical American holidays and participates in local
    events like the Hyde Park Harvest Festival, which emphasize community and seasonal traditions. His family values education and curiosity, often taking weekend trips to New York City’s world‑class museums
    and exploring historic estates along the Hudson Valley. This blend of suburban American life, regional history, and exposure to the arts informs Thomas’s worldview, interests, and aspirations.
