  career_goals: Thomas aims to transform his passion for novelty and abstract art into a sustainable career by leading a community‑focused arts organization or launching an independent creative consultancy.
    He envisions establishing a regional arts hub in Huntingdon that offers workshops, pop‑up exhibitions, and collaborative projects, positioning himself as both curator and strategic director. To secure
    this role, he plans to complete a certification in arts management and build a portfolio of successful events and digital campaigns. Long‑term, he aspires to become a recognized speaker on creativity
    and personal development, leveraging his sociable nature and disciplined work ethic to inspire others while achieving financial stability.
