persona_description: A geologist who specializes in the study of the geology and mineralogy of Nova Scotia, particularly focusing on the province's natural resources and potential for future development.
  His work has led to the improvement of the subdivisions of the geological regions of the province, and his geological map of southern and central New Brunswick is a significant contribution to the field.
  His reports include graphic descriptions of picturesque scenery and accounts of curious incidents of history and travel, and he is enthusiastic about the potentialities of his adopted province.
