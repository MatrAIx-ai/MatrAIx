persona_description: A legal scholar who is familiar with the history and development of the common law system, particularly its roots in English law and its spread to other common-law jurisdictions. This
  person is likely to have a deep understanding of the key concepts and doctrines developed by the three main courts of England (King's Bench, Exchequer, and Court of Common Pleas) and how they interacted
  to shape the common law. They are also likely to have knowledge of how the common law system has evolved over time, including its relationship with equity, statutory law, and other special branches of
  practice. This person may also be interested in the specific features of the common law system as it applies to Canada and the United States, and may have a keen interest in the role of English law in
  shaping legal systems around the world.
