  hobbies: '["Visiting art galleries and museums", "Participating in local theater productions", "Traveling to historic sites", "Bowling with a social league", "Volunteering for financial literacy workshops",
    "Landscape photography", "Hiking on Appalachian trails", "Collecting vintage Americana art", "Reading economics and philosophy", "Playing piano casually"]'
  career_goals: Stephen’s next career milestone is to become a senior partner at his advisory firm, where he can shape the firm’s strategic direction and expand its client base across the Mid‑Ohio Valley.
    He aims to develop a specialized service line that integrates art and collectible investments with traditional wealth management, leveraging his personal passion for the arts. He also plans to lead
    a statewide financial‑literacy initiative, partner with local schools and senior centers, and publish a guide on navigating retirement in rural America. Over the long term, Stephen envisions transitioning
    to a mentorship and consulting role, offering advisory support to other professionals while remaining an active voice in the West Virginia financial‑planning community.
