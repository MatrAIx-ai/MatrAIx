  hobbies: '[''Visiting Art Galleries'', ''Amateur Photography'', ''Weekly Bowling League'', ''Co-ed Softball Team'', ''Chess at Local Café'', ''Puzzle and Strategy Board Games'', ''DIY Home Improvement
