  career_goals: In the next five years Philip aims to advance to a Procurement Manager or Director role, leading a strategic sourcing team that drives both cost efficiency and innovation. He plans to attain
    the Certified Professional in Supply Management (CPSM) credential and to develop a sustainability-focused procurement program that incorporates eco-friendly and creatively sourced materials, reflecting
    his artistic curiosity. Mentoring junior colleagues is a priority, and he envisions establishing a knowledge-sharing forum to improve collaboration and reduce workplace stress. Ultimately, he sees himself
    transitioning into consulting or part-time teaching at a local community college, where he can share his practical expertise and help shape the next generation of supply-chain professionals.
