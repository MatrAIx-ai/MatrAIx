  hobbies: '["Engine tinkering and tool restoration", "Listening to Puerto Rican music (salsa, reggaeton)", "Playing basketball", "Cooking traditional Puerto Rican dishes", "Volunteering at local food bank",
    "Watching documentaries on technology", "Playing logistics‑focused video games"]'
  career_goals: Fabio aims to earn his GED and obtain advanced certifications such as a Certified Forklift Operator and Heavy Equipment Operator credential. Over the next five years he hopes to transition
    into a supervisory or safety coordinator role within logistics or warehousing, where he can blend his hands‑on expertise with formal training to lead a team, improve workplace safety, and mentor newer
    employees. He also envisions pursuing part‑time studies in logistics management to broaden his career options, while seeking a stable routine that helps mitigate his stress and worry.
