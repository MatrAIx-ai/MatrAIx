  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Hiking'', ''Vegetable gardening'', ''Reading (art history, speculative fiction)'', ''Journaling'', ''Knitting'', ''Attending small gallery
    openings'', ''Meditation'', ''Listening to classical music'']'
  career_goals: Abigail aims to formalize her education by completing a GED and pursuing an associate degree or professional certificate in office management or project management. She seeks promotion to
    senior operations supervisor or office manager, where she can lead larger teams and spearhead organization‑wide efficiency initiatives. Long‑term, she envisions transitioning into a consulting role
    that helps small businesses streamline administrative processes while incorporating creative, art‑inspired workshops to boost employee well‑being. She also hopes to volunteer as a mentor for local arts
    programs, sharing her love of creativity with the community.
