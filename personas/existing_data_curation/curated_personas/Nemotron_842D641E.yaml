  career_goals: Angelo aspires to transition from a front‑line representative to a role that blends his service expertise with his creative instincts. Over the next few years he plans to earn a certification
    in User Experience (UX) or Service Design and eventually move into a Customer Experience Manager or Product‑Customer Liaison position. In that capacity he hopes to shape end‑to‑end service strategies,
    lead a team focused on delivering personalized, innovative experiences, and champion cross‑functional projects that integrate customer feedback into product development. Parallel to his professional
    trajectory, he intends to complete his bachelor’s degree in Communications or Marketing, which will deepen his strategic thinking and broaden his influence within the organization. Long‑term, Angelo
    envisions a senior leadership role where he can foster a culture of empathy, creativity, and continuous improvement.
