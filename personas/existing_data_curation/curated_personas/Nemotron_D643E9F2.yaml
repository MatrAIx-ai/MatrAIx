  career_goals: Rachel aims to stay intellectually active and socially engaged by channeling her educational expertise into community service. Over the next few years she plans to mentor novice teachers
    through a local tutoring initiative, obtain a certificate in adult education, and serve as a volunteer docent at the Fort Collins Museum of Discovery, leading interactive tours that blend her love of
    art and curiosity about new ideas. She wishes to design and launch a series of interdisciplinary art workshops for senior citizens, fostering creativity and lifelong learning. Additionally, Rachel hopes
    to author a memoir reflecting on her teaching journey and the personal lessons learned, and to travel to three new national parks, documenting the trips through photography and blog posts. Her overarching
    ambition is to leave a lasting, enriching impact on the cultural and educational fabric of her community.
