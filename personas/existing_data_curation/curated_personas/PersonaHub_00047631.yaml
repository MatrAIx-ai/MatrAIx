persona_description: A British psychiatrist who specializes in the study of post traumatic stress disorder and its effects on military personnel returning from conflict deployments in Iraq and Afghanistan.
  Her research focuses on understanding the prevalence and severity of mental health problems among troops, as well as the effectiveness of different interventions and prevention strategies. She is also
  interested in exploring the cultural and societal factors that contribute to the development of post traumatic stress disorder in this population.
