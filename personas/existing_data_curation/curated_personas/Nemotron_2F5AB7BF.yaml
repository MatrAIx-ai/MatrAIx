  hobbies: '["Reading classic literature and Mexican poetry", "Watercolor painting of landscapes", "Gardening (herbs, citrus, vegetables)", "Cooking traditional Mexican cuisine", "Bird-watching", "Nature
    walks in the Ojai hills", "Landscape photography", "Genealogy research", "Journaling", "Listening to classical and Mexican folk music"]'
  career_goals: Although retired, Alberto aims to preserve and share his cultural heritage. He plans to complete a memoir that intertwines his family’s Mexican roots with his life in California, and to
    assemble a small traveling exhibition of Mexican folk art pieces for local schools and community centers. He also hopes to mentor younger artists and historians through occasional workshops at the Ojai
    Art Center, and to maintain a structured daily routine that balances solitary creative work with volunteer contributions to the Ojai Historical Society.
