personas:
  professional: Cody Wood, a 36‑year‑old sales associate with a STEM background, leverages data‑driven inventory analysis and strong interpersonal skills to streamline store operations while mentoring a
    small team toward predictable, high‑performing results.
  sports: Cody Wood channels their sociable energy into weekly pickup basketball games in the Washington Basketball League, a Saturday soccer match with the Alexandria Soccer Club, regular hikes along the
    Mount Vernon Trail, and avidly follows the Washington Commanders and DC United, treating fitness as a structured routine that balances competition with camaraderie.
  arts: Cody Wood finds creative release in curating eclectic playlists featuring John Mayer and The Avett Brothers, attending occasional productions at the Kennedy Center starring Lin‑Manuel Miranda, and
    hosting board‑game nights that echo the strategic storytelling of classic tabletop designers like Reiner Knizia.
  travel: Cody Wood prefers weekend getaways that blend structured itineraries with spontaneous local food hunts, having explored Shenandoah National Park, a long‑haul train ride to New York City, and a
    culinary tour of Asheville, while dreaming of a future road trip to Yellowstone and a cultural immersion in Kyoto.
  culinary: Cody Wood, an avid backyard griller, perfects a hickory‑smoked brisket rub peppered with brown sugar and paprika, whips up tangy coleslaw, pairs the meat with craft IPAs, and occasionally experiments
    with Maryland crab cakes for friends, showcasing a solid intermediate cooking skill that thrives on communal meals.
  core: Cody Wood balances a data‑driven, structure‑loving work ethic with a restless social streak, yet their persistent anxiety drives late‑night scrolling for the newest grill gadgets and occasional
    over‑commitment to weekend activities.
background:
  cultural: Cody grew up in a middle‑class, predominantly white suburb of the Mid‑Atlantic region, where community involvement and a strong work ethic were emphasized. His upbringing in the Washington‑D.C.
    metropolitan area exposed him to a diverse population and a mix of historical and modern cultural influences, shaping his appreciation for both tradition and innovation. His family values emphasize
    reliability, cooperation, and support, which align with his preference for structure and teamwork. Living in Alexandria, he enjoys the blend of historic charm, accessible public spaces, and a vibrant
    culinary scene, which informs his social activities and community engagement.
