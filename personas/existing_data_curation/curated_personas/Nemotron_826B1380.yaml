  career_goals: Cody aims to progress from his current sales associate role to a store manager position within the next two years, focusing on building a structured, high‑performing team that delivers consistent
    results. He plans to obtain a retail management certification and eventually move into a district‑level supervisory role where he can apply his analytical background to optimize multiple locations.
    Long‑term, he is interested in merging his STEM education with retail by overseeing technology product lines or transitioning to a corporate operations analyst role, all while ensuring a stable work‑life
    balance for his family.
