persona_description: A historian or a architectural historian who is deeply interested in the history of churches and the architectural styles of the Middle Ages, particularly in the region of Tuscany.
  They are knowledgeable about the construction of churches and the various techniques used in the construction of buildings during that period. They are also interested in the history of the Arte di Calimala,
  the cloth merchants' guild that financed the church's upkeep, and the collapse and replacement of the campanile in the 14th century. They are likely to have a keen eye for detail and a deep appreciation
  for the beauty and craftsmanship of medieval architecture.
