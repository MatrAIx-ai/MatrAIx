  hobbies: '["Gardening", "Birdwatching", "Hiking", "Historical nonfiction reading", "Cooking", "Acoustic guitar", "Community science outreach", "Model railroad building", "Nature photography"]'
  career_goals: Terence aims to transition from a senior research scientist to a principal investigator leading an independent, translational research program focused on gene-therapy approaches for rare
    diseases. He aspires to secure a multi-year NIH R01 grant and develop strategic collaborations with local biotech firms in the Maryland corridor. Over the next five years, he wants to build a small,
    tightly knit lab where he can mentor emerging scientists, emphasizing a balanced workflow that blends structured project milestones with the flexibility needed for innovative discovery. He also seeks
    a leadership role that allows him to influence institutional policies on laboratory safety and research ethics, while maintaining a stable work-life balance to support his family.
