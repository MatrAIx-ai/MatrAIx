  career_goals: Although retired from formal employment, Theresa aims to continue growing her personal legacy and community impact. She plans to complete a memoir that intertwines her family history with
    stories of Ocala’s evolving neighborhoods, and she hopes to launch a intergenerational reading program at the local library. Embracing her curiosity, she intends to master digital photography to document
    local wildlife and share her work in community exhibitions. Maintaining health and vitality is also a priority, so she aspires to participate in weekly water aerobics classes and complete the senior-friendly
    trail at Silver Springs State Park. Finally, she seeks to deepen her role on the senior advisory board, advocating for accessible services for older residents.
