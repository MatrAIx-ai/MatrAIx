personas:
  professional: Theresa Paz, a retired community volunteer and senior advisory board member, channels their lifelong budgeting expertise, horticultural skill, and tech savviness into organizing neighborhood
    events, mentoring younger volunteers, and preserving Ocala’s history, balancing practical efficiency with a curious drive to learn new digital photography techniques.
  sports: Theresa Paz enjoys low‑impact fitness through weekly water aerobics classes, regularly walks the senior group along Silver Springs State Park’s trail, and follows the Orlando Magic basketball
    and Florida Gators football seasons, blending gentle exercise with spirited local fandom.
  arts: Theresa Paz is a devoted patron of the Ocala Community Theatre, relishes performances of classic plays, fills their evenings with Yo‑Yo Ma cello concerts and Frank Sinatra’s crooner classics, and
    draws artistic inspiration for their quilts from Monet’s water lilies and the vibrant hues of regional sunsets.
  travel: Theresa Paz loves gentle road trips along Florida’s Gulf Coast, has explored Savannah’s historic squares and New Orleans’ French Quarter, and dreams of visiting Machu Picchu’s ancient citadel
    and Yellowstone’s geysers, planning each journey with a careful budget and a checklist of historic sites to photograph.
  culinary: Theresa Paz’s culinary repertoire includes simmering a hearty jambalaya with Andouille sausage and shrimp, baking a tangy key lime pie, and perfecting herb‑crusted chicken seasoned with fresh
    rosemary, thyme, and smoked paprika, while they experiment with regional recipes inspired by their curiosity for diverse traditions.
  core: Theresa Paz blends curiosity with practicality, tending roses, preserving local heritage, crafting quilts, and championing senior health, all while managing a meticulous budget and sprinkling their
    days with gentle humor.
background:
  cultural: Theresa Anne Paz is a white American who grew up in the mid‑South before relocating to Ocala, Florida, during her middle years. Her upbringing reflects typical Midwestern values of self‑reliance,
    community service, and a strong work ethic, while her current life in Central Florida embraces the region’s appreciation for outdoor recreation, horse culture, and Southern hospitality. She participates
    in local church gatherings, celebrates traditional holidays such as Thanksgiving and the Fourth of July with family potlucks, and is attuned to Ocala’s cultural fabric, including its equestrian events
    and nature preserves. This blend of Midwestern roots and Floridian lifestyle informs her practical curiosity, community orientation, and balanced approach to life.
