  career_goals: Although retired, Francisco aims to solidify his legacy by documenting his family’s culinary recipes and gardening practices in a handwritten booklet that he plans to digitize for his grandchildren.
    He aspires to establish a small community garden in a vacant lot near the church, where he can share his horticultural knowledge and promote sustainable food practices. Francisco also wants to learn
    basic smartphone and social media skills to share his stories and recipes online, ensuring his cultural heritage reaches younger generations. Maintaining his health, staying physically active, and continuing
    to set high standards for personal organization and community contribution remain central to his ambitions.
