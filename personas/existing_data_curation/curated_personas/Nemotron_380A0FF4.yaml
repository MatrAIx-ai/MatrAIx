personas:
  professional: Teela Adams is a seasoned school bus driver with three decades of route planning expertise, vehicle inspection acumen, and first‑aid certification, whose extroverted, talkative nature makes
    them a natural mentor and charismatic safety presenter, while their relaxed approach to obligations sometimes leads to last‑minute paperwork scrambling.
  sports: Teela Adams enjoys weekend bird‑watching hikes on the Pocono trails for low‑key fitness, follows the Philadelphia Eagles and Phillies loyally, participates in a local senior walking club that
    meets at the regional recreation center, and occasionally joins a recreational softball league where they play third base as a social outlet.
  arts: Teela Adams thrives in community theater improv nights, where their lively storytelling shines alongside the works of playwright Arthur Miller and the musical stylings of Bob Dylan, while they also
    indulge in mystery novels by Agatha Christie, attend live folk concerts featuring artists like Joan Baez, and keep a scrapbook of local art fairs.
  travel: Teela Adams favors spontaneous road trips to historic towns such as Gettysburg and Annapolis, often planning routes on the fly with a paper map, balances a love for relaxed cabin getaways in the
    Poconos with a yearning to explore European railway journeys to cities like Prague, yet their travel budget constraints sometimes keep them anchored to nearby state fairs and weekend getaways.
  culinary: Teela Adams prefers hearty, home‑cooked meals, frequently preparing herb‑roasted chicken with rosemary and thyme, a summer garden salad of heirloom tomatoes and basil, while their modest cooking
    skill shines in potluck dishes like deviled eggs and apple crisp, and they relish savoring a slice of classic New York cheesecake after a community event.
  core: Teela Adams is a sociable, slightly disorganized 58‑year‑old who blends a love for community storytelling with a practical knack for bus safety, often worrying about details while flourishing as
    the life of any gathering.
background:
  cultural: Teela grew up in the rural-suburban region of Tobyhanna, Pennsylvania, a community shaped by the Pocono Mountains’ seasonal tourism and a strong tradition of working-class values. Her family’s
    roots trace back to European immigrants—primarily German and Irish—who settled in northeastern Pennsylvania during the early 20th century. This heritage, combined with the close-knit, church-centric
    social fabric of Monroe County, has instilled in her a respect for community service, self-reliance, and practical problem-solving. While she identifies with broader American cultural norms, Teela’s
    daily life reflects the modest, neighborly spirit of small-town Pennsylvania, where local schools and neighborhood events serve as the central hubs of social interaction.
attributes:
  skills: '[''Safe school bus operation'', ''Student behavior management'', ''Vehicle maintenance basics'', ''Crisis response and emergency procedures'', ''Route planning and navigation'', ''Community engagement'',
