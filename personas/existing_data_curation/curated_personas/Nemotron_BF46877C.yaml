  hobbies: '[''Cooking and recipe experimentation'', ''Urban gardening and herb cultivation'', ''Reading historical fiction and poetry'', ''Tai chi and gentle yoga'', ''Calligraphy and brush painting'',
    ''Volunteer mentoring at senior center'', ''Attending Chinese New Year and cultural festivals'', ''Listening to classical and traditional Chinese music'', ''Travel planning and occasional trips'', ''Puzzle
    solving (crosswords, Sudoku)'']'
  career_goals: Although retired from formal employment, Chia aspires to deepen her community impact. She aims to launch a neighborhood garden that supplies fresh produce to local seniors and provides intergenerational
    gardening workshops. She hopes to compile a cookbook that blends family recipes with contemporary Californian flavors, preserving cultural heritage while showcasing her curiosity for new ideas. Chia
    also dreams of mentoring younger Asian‑American volunteers, offering guidance on cultural integration and personal development. On a personal level, she seeks to improve her health through regular tai
    chi practice, travel to Taiwan to reconnect with her ancestral roots, and continue her lifelong learning through adult education classes in nutrition and creative writing.
