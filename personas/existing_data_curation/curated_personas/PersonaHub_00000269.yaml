persona_description: A person who is responsible for ensuring the safety and protection of others, particularly healthcare workers and those in vulnerable populations. They are aware of the importance of
  PPE, the risks associated with TB, and the proper management of diseases such as TB, rabies, and rabies vaccine. They are also aware of the importance of compliance with medications and routine follow-ups.
  They have experience in dealing with situations involving stray or roaming animals, particularly dogs and bats. They are aware of the risks associated with bites and scratches and the importance of reporting
  them immediately. They have a deep understanding of the transmission of diseases and the importance of prevention measures. They are knowledgeable about the symptoms of diseases and the importance of
  early detection and treatment. They are aware of the importance of seeking medical attention and proper treatment.
