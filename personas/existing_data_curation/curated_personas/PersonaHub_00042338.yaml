persona_description: A fruit breeder and orchardist who specializes in the study of red-fleshed apple varieties, particularly those developed by the pioneering work of Etter and Hansen. He is interested
  in the unique characteristics and flavors of these varieties, as well as the historical context and development of apple breeding techniques. He is also interested in the environmental conditions required
  for optimal development of the red flesh color and internal pigmentation in the apples. He has grown and collected many of the varieties described in the text and has a unique knowledge of their characteristics
  and cultivation methods.
