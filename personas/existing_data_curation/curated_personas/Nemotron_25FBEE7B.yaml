personas:
  professional: Ninoska Feliciano transforms frontline support challenges into streamlined solutions by blending fluent bilingual communication, deep CRM expertise in Salesforce and Zendesk, and a rigorously
    organized workflow, while they channel their curiosity into designing creative training modules that empower a multilingual team.
  sports: Ninoska Feliciano stays active through salsa and cumbia dance sessions, weekly Zumba and yoga classes, and hikes with the Carson Trails Hiking Club, while cheering on the Los Angeles Lakers, Dodgers,
    and Galaxy as a dedicated fan of local professional sports teams.
  arts: Ninoska Feliciano draws inspiration from the vibrant canvases of Frida Kahlo and the bold street murals of Shepard Fairey while visiting the Getty Center and local galleries, crafts small acrylic
    folk‑motif paintings, and channels that energy into hands‑on pottery workshops, often sharing their creations at community art fairs.
  travel: Ninoska Feliciano favors culturally immersive road trips, having explored the historic adobe neighborhoods of Santa Fe, the coastal charm of Santa Barbara, and dreaming of a culinary pilgrimage
    to Oaxaca’s bustling markets, all while balancing travel budgets and family commitments.
  culinary: Ninoska Feliciano delights in cooking heritage‑inspired dishes such as mole sauce with roasted chilies, corn masa tamales, and fresh salsa verde using tomatillos, epazote, and cilantro, boasting
    an intermediate skill level that shines during weekend gatherings with friends.
  core: Ninoska Feliciano is a meticulously organized, art‑infused customer experience professional who balances a disciplined financial routine with a passion for dance, community festivals, and vibrant,
    spice‑laden cooking, occasionally overcommitting to creative projects while navigating life's challenges with resilient optimism.
background:
  cultural: Ninoska was raised in a Mexican‑American household in the Los Angeles basin, with deep familial roots in Oaxaca. She grew up bilingual, celebrating Día de los Muertos, Las Posadas, and other
    traditional festivities, and learned the value of hospitality, community solidarity, and respect for elders. Living in Carson, she navigates a bicultural identity that blends Mexican culinary and artistic
    traditions with Southern California's multicultural vibrancy. Her cultural background informs her warm, collaborative customer‑service style, her love for communal gatherings, and her commitment to
    preserving and sharing Mexican heritage through arts, food, and community projects.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Customer relationship management (Salesforce, Zendesk)'', ''Conflict resolution'', ''Active listening and empathy'', ''Process improvement and
    quality assurance'', ''Data entry and performance metrics analysis'', ''Team training and onboarding'', ''Time management and multitasking'', ''Creative problem solving'', ''Event planning and coordination'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylic folk art)'', ''Pottery workshops'', ''Salsa and cumbia dancing'', ''Group fitness (Zumba, yoga)'', ''Cooking Mexican cuisine'', ''Volunteer
    event coordination for community festivals'', ''Board game nights with friends'', ''Hiking local trails'', ''Reading contemporary literature'']'
  career_goals: Ninoska aims to progress from a frontline representative to a leadership role within the customer experience organization. Over the next three to five years she plans to earn a Customer
    Experience Management (CXPA) certification and complete a bachelor's degree in Business Administration. Her ambition is to become a Team Lead or Operations Supervisor, overseeing a multilingual support
    team and shaping service policies. Parallel to her professional trajectory, she dreams of launching a community arts workshop series in Carson that blends her passion for Mexican folk art with her organizational
    expertise, providing a platform for local artists and cultural exchange.
