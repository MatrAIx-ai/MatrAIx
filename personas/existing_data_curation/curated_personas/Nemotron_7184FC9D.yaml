personas:
  professional: Yanying Duan, a 9-year-old aspiring wildlife illustrator and junior naturalist, channels their love for factual animal books and meticulous drawing into structured projects that blend careful
    observation with creative presentation, reflecting a calm, disciplined mindset and a family tradition of valuing education and perseverance.
  sports: Yanying Duan, a 9-year-old who prefers low-impact activities, swims with the Moreno Valley community pool team twice a week and participates in a neighborhood soccer clinic, cheerfully rooting
    for the Los Angeles Dodgers and LA Galaxy while keeping a personal log of lap times, and their structured practice routine mirrors their love for methodical puzzles, though they occasionally skip a
    stretch after a beach day.
  arts: Yanying Duan, a budding 9-year-old illustrator, spends weekends sketching detailed animal studies inspired by John James Audubon and Charley Harper, watches Studio Ghibli's 'My Neighbor Totoro'
    for its whimsical nature scenes, and visits the Natural History Museum of Los Angeles County to view taxidermy displays, channeling their meticulous personality into art that balances precision with
    imagination.
  travel: Yanying Duan, a methodical 9-year-old traveler, packs a pocket-sized checklist for each family trip—sunscreen, seashell catalog cards, and a small sketchbook—making the most of beach days at Newport
    Beach, weekend adventures at the San Diego Zoo, and a school field trip to the Grand Canyon, while dreaming of future safaris in Yellowstone and rainforest hikes in Costa Rica, all framed by the communal
    Lunar New Year celebrations they cherish.
  culinary: Yanying Duan, a 9-year-old culinary enthusiast, prefers dishes that invite step-by-step preparation—such as chicken fried rice with peas, carrots, and soy sauce or homemade cheese pizza sprinkled
    with oregano and mozzarella—often assisting in her family's meticulous mooncake shaping during Lunar New Year; they love cataloging seashell-shaped pasta and can flawlessly follow a recipe, though they
    occasionally over-mix batter for banana muffins, creating a slightly dense crumb.
  core: Yanying Duan, a disciplined 9-year-old, merges a love for detailed wildlife illustration, structured puzzles, and careful budgeting into a calm, resilient outlook that honors family traditions of
    perseverance and community.
background:
  cultural: Yanying comes from an East Asian (Chinese) family that settled in Moreno Valley, California. Mandarin is spoken at home alongside English, and the family observes traditions such as Lunar New
    Year celebrations, ancestor honoring, and a strong emphasis on education and perseverance. These cultural values blend with the multicultural environment of her community, shaping her respectful, disciplined,
    and community‑oriented outlook.
attributes:
  skills: '["Reading comprehension (non-fiction)", "Elementary mathematics", "Organizational/filing skills", "Following multi-step instructions", "Basic Scratch programming"]'
  hobbies: '["Reading factual books", "Wildlife illustration", "Jigsaw puzzles", "LEGO building", "Chess", "Seashell collecting"]'
  career_goals: 'Yanying dreams of a future where she can explore the natural world through a clear, step‑by‑step path: she hopes to become a marine biologist or environmental scientist, valuing a structured
    education from elementary school to college. She also envisions leading a school science club and eventually working in a research lab, applying her methodical approach to real‑world problems.'
