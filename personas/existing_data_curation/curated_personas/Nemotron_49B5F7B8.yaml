  career_goals: David aspires to pursue a career that blends his curiosity for how things work with practical problem‑solving. He is interested in becoming a mechanical engineer or a software developer,
    with a long‑term goal of designing sustainable machines or interactive video games. He also considers a future in the U.S. Marine Corps, following the local military presence, but wants to ensure he
    has a solid technical education first. Ultimately, he aims to attend a technical high school or community college that offers engineering and coding programs, and eventually earn a degree in engineering.
