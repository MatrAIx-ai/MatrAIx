personas:
  professional: David Lowery, an aspiring robotics engineer and LEGO Technic enthusiast, channels his curiosity and practical mindset into designing motion‑control algorithms for his school’s robotics club
    while meticulously documenting each build in a notebook that balances creative brainstorming with step‑by‑step schematics.
  sports: David Lowery, a dedicated weekend hiker on the nearby Intracoastal Trail and an enthusiastic freshwater‑bass angler on the local waterway, supports the regional high school football team, the
    Hurricanes, and follows the Miami Marlins, while occasionally joining the school’s cross‑country club for early‑morning runs.
  arts: David Lowery expresses creativity through digital illustration using Procreate, drawing fantasy landscapes inspired by artists like Yoshitaka Amano and the concept art of the video game series "The
    Legend of Zelda," while also attending local comic‑book conventions and collecting limited‑edition graphic novels.
  travel: David Lowery prefers carefully planned short trips, such as annual family visits to Kennedy Space Center and weekend camping at Everglades State Park, yet dreams of an immersive space‑camp experience
    in Texas and a backpacking adventure through the Pacific Northwest’s national parks.
  culinary: David Lowery enjoys simple comfort foods like pepperoni pizza and chicken nuggets, has a budding skill for making homemade trail mix with dried mango, almonds, and dark chocolate, and occasionally
    experiments with a DIY raspberry‑sauce for pancakes after watching cooking videos.
  core: David Lowery is a methodical teen who blends a love for LEGO engineering, strategic gaming, and quiet nature hikes with a habit of procrastinating on chores but a fierce dedication to mastering
    digital art and saving for their next big hobby purchase.
background:
  cultural: David was raised in Jacksonville, North Carolina, a town shaped by Southern traditions and a strong military presence due to nearby Camp Lejeune. His family’s roots trace back to English and
    Irish ancestry, typical of the region’s white population. He grew up attending a local Baptist church, participating in community barbecues, and observing Southern customs such as listening to country
    and blue‑grass music. The disciplined environment of the military community has instilled in him values of respect, teamwork, and practicality, while the rural surroundings have fostered an appreciation
    for nature and outdoor activities.
