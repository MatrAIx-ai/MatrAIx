personas:
  professional: Michael Hibbs is a humanities‑trained research analyst hopeful who blends his knack for critical textual synthesis with practical Python automation to craft concise policy briefs for think‑tank
    projects, while his competitive debate style pushes teammates toward rigor.
  sports: Michael Hibbs is a regular runner with the Chicago Road Runners Club, follows the Chicago Bulls and White Sox for competitive analysis, and treats weekend basketball pickup games at the Highwood
    community gym as a tactical outlet for their competitive instincts.
  arts: Michael Hibbs captures the texture of Chicago's architecture through urban photography inspired by Vivian Maier and Andreas Gursky, while their free time is spent reading speculative fiction by
    Ted Chiang and listening to Radiohead's "Kid A" as they edit their photo series.
  travel: Michael Hibbs prefers meticulously planned weekend trips, often using Amtrak to explore historic cities like St. Louis and Indianapolis, but dreams of a semester‑long research residency in Barcelona,
    balancing their limited budget with occasional spontaneous road trips to the Lake Michigan shoreline.
  culinary: Michael Hibbs enjoys preparing quick meals such as avocado toast with chili flakes and a perfectly brewed pour‑over coffee using Ethiopian beans, yet their cooking skill remains at "assembly
    line" level, and they frequently order deep‑dish pizza from Lou Malnati’s after a long study night.
  core: Michael Hibbs is a skeptical, solitary thinker who channels curiosity into data‑driven humanities research, disciplined running, and a camera that never misses a Chicago detail, all while juggling
    a frugal budget and occasional procrastination on health check‑ups.
background:
  cultural: Michael grew up in a middle‑class, White, Midwestern family in the Chicago suburbs, with cultural roots tracing back to German and Irish ancestry. His upbringing blended typical Midwestern values
    of modesty and practicality with exposure to the region’s rich cultural institutions—museums, public libraries, and community theaters. He celebrates seasonal local festivals and has a nuanced appreciation
    for the diverse immigrant histories that shape Lake County, which informs his interest in community‑focused humanities work.
