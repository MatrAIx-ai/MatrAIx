  career_goals: Michael aspires to translate his humanities background into a research‑oriented career that balances intellectual rigor with practical impact. He aims to secure an entry‑level research analyst
    or content strategist position at a think‑tank, cultural nonprofit, or publishing firm, where he can leverage his analytical strengths while contributing fresh ideas. In the longer term, he envisions
    earning a master’s degree in public policy or library science, eventually moving into a senior research, curatorial, or policy‑advisory role that allows him to shape projects independently and compete
    for thought‑leadership within his field.
