  career_goals: He aims to become a senior sales manager within the next three years, leading a high-performing team and exceeding regional sales targets. Guido plans to earn the Chartered Property Casualty
    Underwriter (CPCU) designation to deepen his technical expertise. In the long-term, he envisions opening his own boutique insurance consulting firm that offers personalized risk solutions to underserved
    communities in Dallas. Alongside career advancement, he wants to develop stronger organizational habits to reduce stress and meet deadlines consistently.
