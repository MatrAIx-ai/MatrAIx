persona_description: A marine biologist who specializes in the study of sharks, particularly the Grey Nurse shark. She is well-versed in the scientific name Carcharias taurus, its dentition, and its distribution
  in Eastern North America. Her expertise extends to the study of shark species, their biology, and their ecological roles in marine ecosystems. She is particularly interested in the conservation and management
  of shark populations, and her research focuses on the impact of human activities on these species. She is also interested in the evolutionary history of sharks and their relationships with other marine
  animals.
