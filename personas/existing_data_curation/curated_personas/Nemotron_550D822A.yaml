  career_goals: Monica aims to transition into a senior HR leadership role where she can shape inclusive talent strategies for organizations serving diverse communities, particularly the Dominican and broader
    Latino diaspora in New Jersey. She is passionate about mentoring emerging HR professionals and plans to establish a mentorship program linking experienced staff with younger employees and community
    members. Pursuing SHRM‑SCP certification is a near‑term goal to deepen her strategic expertise. Long‑term, she hopes to leverage her education background to develop culturally‑responsive training modules
    and possibly author a guide on best practices for HR professionals working with bilingual workforces.
