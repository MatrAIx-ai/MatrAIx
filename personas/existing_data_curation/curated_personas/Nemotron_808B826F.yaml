  career_goals: Kenneth aims to transition from working as a journeyman carpenter to establishing his own boutique workshop that specializes in high‑end custom furniture and historic home restorations.
    He plans to earn a certified contractor’s license within the next two years, attend an advanced woodworking design course, and obtain OSHA 30‑hour certification to improve safety standards on his future
    projects. Long‑term, he hopes to mentor apprentices, possibly through a local community college program, and to integrate sustainable building practices—such as reclaimed wood and low‑VOC finishes—into
    his business to differentiate himself in the regional market. He also seeks a more predictable schedule to reduce stress and support his separated family.
