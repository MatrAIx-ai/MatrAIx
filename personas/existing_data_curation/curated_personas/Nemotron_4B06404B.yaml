    and beverage pairing'', ''Kitchen equipment maintenance'']'
  hobbies: '[''Herb gardening'', ''Fishing'', ''Mindfulness meditation'', ''Reading culinary history'', ''Collecting vintage cookbooks'', ''Volunteering at soup kitchen (teaching cooking basics)'', ''Listening
    to jazz in small clubs'', ''Woodworking (cutting boards)'', ''Photography of food and nature'']'
  career_goals: Thomas aspires to transition from daily kitchen operations to a role where he can share his knowledge and give back to his community. In the next five years he hopes to open a modest farm‑to‑table
    bistro in Uniondale that showcases locally sourced produce and offers cooking workshops for senior citizens and at‑risk youth. He also dreams of authoring a cookbook that documents the family recipes
    he refined over his career, emphasizing balanced nutrition and accessible techniques. Ultimately, he seeks to create a sustainable, low‑stress work environment that nurtures collaboration and supports
    the well‑being of his staff.
