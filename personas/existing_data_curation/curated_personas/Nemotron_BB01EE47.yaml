  hobbies: '[''Reading mystery and historical fiction novels'', ''Calligraphy (Hangul and Latin scripts)'', ''Herb gardening'', ''Knitting and quilting'', ''Crossword and Sudoku puzzles'', ''Bird‑watching
    on early morning walks'', ''Walking in quiet city parks and trails'', ''Listening to classical music'', ''Watching documentaries'', ''Tea preparation and tasting'']'
  career_goals: Although she is no longer employed full‑time, Inyoung remains motivated to achieve personal milestones. She plans to obtain her GED within the next year and then enroll in senior‑adult courses
    at a local community college, focusing on archival studies and digital preservation. She hopes to volunteer as a records manager for the Korean Cultural Center of Philadelphia, applying her organizational
    abilities to preserve community histories. Concurrently, she is developing a modest home‑based online shop to sell hand‑crafted quilts and knitted accessories, aiming for a small supplementary income
    that supports her independence. A long‑term ambition is to travel to South Korea to trace her family’s roots, document oral histories, and share them with younger relatives, thereby bridging generations
    and preserving cultural heritage.
