persona_description: A Chamorro advocate for Guam's self-determination, who has testified to the United Nations on the island's colonization and Chamoru's sacred and inalienable right to Self Determination.
  They are a member of the Chamoru Delegation that voiced opposition to the increased military build-up of Guam at a meeting with U.S. Congressional Representatives, and have also sent delegations to the
  United Nations to testify on the island's colonization. They are aware of the many health, environmental, cultural, and political impacts of increased militarization on Guam, including contamination of
  lands, waters, air, and bodies, reduction in biodiversity, infringement of human rights to self-determination of the indigenous people, political minoritization, an increased loss of indigenous culture,
  and increased cost.
