  career_goals: Matilda aspires to study engineering, especially robotics, so she can design devices that solve everyday problems and promote sustainability. She aims to earn a scholarship to a STEM‑focused
    high school, take on leadership roles in science clubs, and eventually attend a university where she can work on interdisciplinary projects that blend technology with environmental stewardship. Her
    competitive drive pushes her to excel academically and pursue opportunities that challenge her curiosity and practical skills.
