personas:
  professional: Matilda Bone, a budding junior citizen scientist, channels her curiosity for adventure novels into meticulous wildlife observations during park outings, applying her practical, organized
    approach to document bird species and leaf samples while using Scratch to prototype simple data‑logging games for classmates, and they eagerly compete to dominate the school science fair.
  sports: Matilda Bone, a midfielder for the Riverside Rangers under‑12 soccer squad, devotes evenings to tactical drills while cheering for the national women’s team the USWNT, and they also join weekend
    pick‑up games with the senior community club, balancing their competitive drive with a practical need to stay fit.
  arts: Matilda Bone, an avid reader of Jules Verne and a budding pianist tackling beginner pieces by Ludovico Einaudi, channels their imaginative flair into building elaborate LEGO cities and composing
    simple Scratch game soundtracks, while they gush over the animated scores of Studio Ghibli’s Hayao Miyazaki, weaving their love for narrative and melody into daily creative play.
  travel: Matilda Bone, whose travel style blends school‑field trips to the nearby Redwood National Forest with family vacations to the Grand Canyon and an aspirational wish to explore Tokyo’s Akihabara
    district, prefers meticulously planned itineraries that allot time for bird‑watching stops, yet they always leave room for spontaneous LEGO‑building challenges at camp.
  culinary: Matilda Bone, a confident mini‑chef, delights in whipping up spaghetti carbonara with pancetta and Parmesan for family dinners, chops fresh carrots for a rainbow salad, and insists on adding
    crunchy pine nuts to avocado toast, but they can’t resist occasional candy‑filled chocolate bars after soccer practice, reflecting a pragmatic approach to cooking mixed with impulsive snack cravings.
  core: Matilda Bone is a curiosity‑driven, competitively spirited twelve‑year‑old who balances a love for nature, LEGO engineering, and piano practice with impulsive candy cravings and a habit of leaving
    tiny plastic bricks in every corner of their room, and they often juggle their projects with a healthy dose of skepticism toward others’ motives.
background:
  cultural: Matilda grows up in Mesquite, a suburban community within the Dallas‑Fort Worth Metroplex. Her family reflects a middle‑class, predominantly white Texan upbringing, shaped by Southern hospitality,
    community involvement, and regional traditions such as Friday night football, Fourth of July fireworks, and holiday gatherings. While her home life includes occasional church attendance and participation
    in neighborhood events, she also experiences the multicultural atmosphere of the broader Metroplex, forming friendships with peers from diverse backgrounds. This blend of Texan regional culture and
    the diverse energy of the Dallas area informs her worldview and daily activities.
