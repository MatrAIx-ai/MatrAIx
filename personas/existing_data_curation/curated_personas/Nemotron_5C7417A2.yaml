    "Community health education and training", "Leadership and mentorship within EMS team"]'
  hobbies: '["Fishing at Norris Lake", "Hiking state park trails", "Woodworking (building furniture and tools)", "Reading medical case studies and true‑crime books", "Listening to classic rock", "Playing
    acoustic guitar in small gatherings", "Target shooting at the local range", "Cooking southern barbecue"]'
  career_goals: Robert aims to advance to the paramedic level within the next two years, earning EMT‑P certification and completing an associate degree in emergency medical services. He hopes to become
    a field training officer, mentoring new EMTs and leading community disaster‑preparedness initiatives. Long‑term, he envisions a supervisory role as an EMS operations manager, where he can shape protocols
    and improve response efficiency for the Fayette County region.
