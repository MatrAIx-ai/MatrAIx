personas:
  professional: Robert Desko, a certified EMT‑B in Fayette County, leverages rapid patient assessment, meticulous documentation, and calm under pressure to lead emergency responses while training newcomers,
    embodying a structured yet adaptable approach to lifesaving, and they consistently prioritize protocol compliance.
  sports: Robert Desko’s fitness regimen mixes weekend hikes through the Appalachian foothills, regular target‑shooting practice at the local Fayette County Shooting Club, and seasonal fan support for the
    Nashville Predators and Tennessee Titans, while they keep a modest membership at a community fitness center for strength training.
  arts: Robert Desko finds artistic release strumming acoustic renditions of Led Zeppelin and The Allman Brothers for intimate gatherings, while their appreciation for classic rock extends to vinyl collections
    and they admire the craftsmanship of woodworkers like Sam Maloof, occasionally visiting regional art fairs for folk art.
  travel: Robert Desko prefers meticulously planned weekend road trips to natural retreats such as the Great Smoky Mountains and Asheville, balancing limited vacation days and shift work with a love for
    secluded cabins, yet dreams of a spring pilgrimage to the Scottish Highlands to study traditional woodworking.
  culinary: Robert Desko’s culinary focus centers on mastering southern barbecue, regularly smoking pork ribs and brisket with hickory wood, seasoning them with a dry rub of paprika, brown sugar, and cayenne,
    and they also enjoy preparing classic sides like collard greens and cornbread for friends.
  core: Robert Desko is a methodical EMT who balances high‑stress emergencies with tranquil woodworking, thrives on structured routines, and they quietly indulge in binge‑watching true‑crime series and
    occasional late‑night snacking on spicy BBQ.
background:
  cultural: Robert grew up in a small, close‑knit community in western Tennessee, where Southern values of self‑reliance, hospitality, and community service are deeply ingrained. His family background is
    rooted in blue‑collar work, with a strong emphasis on practicality and responsibility. He participates in local church events and county fairs, and his upbringing has instilled a respect for rural traditions,
    country music, and the outdoors. While he identifies as culturally white American Southern, he embraces the region’s emphasis on helping neighbors, which aligns with his career in emergency medical
    services.
attributes:
  skills: '["Advanced Cardiac Life Support (ACLS) certification", "Basic Life Support (BLS) certification", "Trauma assessment and stabilization", "Airway management and ventilation", "IV therapy and medication
