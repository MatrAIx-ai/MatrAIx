persona_description: A historian interested in the political and governmental growth of late medieval Europe, particularly focusing on the development of state formation and political convulsion. This individual
  is likely to be interested in the fourteenth century to the sixteenth century period, and would appreciate a broad, comparative account of political events and processes, as well as the discussion of
  individual regions and states. They would be particularly interested in understanding the mixed results of political and governmental growth across the continent, as well as the influence of the Hundred
  Years War, schism, revolt, and the rapid growth in jurisdiction, taxation, representation, spreading literacy, and evolving political technique. They would also be interested in the full introduction
  to political events and processes from the fourteenth century to the sixteenth, and would likely be familiar with the concept of state formation and political convulsion.
