  hobbies: '[''Drawing and painting'', ''Hiking and nature photography'', ''Ukulele playing and singing'', ''Art club participation'', ''Mexican folklorico dance'', ''Reading graphic novels'', ''Minecraft
    puzzle building'', ''Cooking traditional Mexican dishes'']'
  career_goals: She aims to attend a specialized visual‑arts high school, earn a scholarship for her artistic talent, and eventually become a professional illustrator or concept artist who blends Mexican
    cultural motifs with contemporary media. She also hopes to use her art to raise awareness about environmental issues in mountain communities and to travel to study diverse artistic traditions, competing
    in regional art contests to build a strong portfolio.
