  hobbies: '[''Landscape sketching'', ''Wildlife photography'', ''Hiking in the Bighorn Mountains'', ''Reading speculative fiction and philosophy'', ''Writing poetry'', ''Woodworking small projects'', ''Volunteering
    at the local animal shelter'', ''Learning Python for personal projects'', ''Listening to ambient and folk music'']'
  career_goals: Donald plans to obtain his GED within the next year and then enroll in a community college program that combines environmental science with digital media. He aims to build a portfolio of
    nature photography and illustration to qualify for freelance work with wildlife magazines and conservation NGOs. Ultimately, he hopes to secure a position as a wildlife conservation photographer or
    a park ranger who also produces educational multimedia content, allowing him to work in the solitude of the outdoors while raising awareness and helping others appreciate the natural world.
