personas:
  professional: Donald Mathis, a 17‑year‑old aspiring wildlife photographer and environmental media creator, blends their meticulous Python organization, charcoal sketching, and CPR‑trained empathy to produce
    methodical, nature‑centric visual stories, while they cherish solitude and let it fuel deep field immersion and thoughtful composition.
  sports: Donald Mathis, a 17‑year‑old outdoor enthusiast, dedicates weekends to trail hiking in the Bighorn Mountains and supplements this with seasonal cross‑country running and occasional rock‑climbing
    at the local crag; they follow the Colorado Rockies for a touch of camaraderie, prefer low‑impact cardio over team sports, yet they occasionally skip proper stretching after long treks.
  arts: Donald Mathis, a 17‑year‑old creative polymath, spends evenings sketching charcoal landscapes and capturing wildlife with a modest DSLR, drawing inspiration from Ansel Adams, Edward Hopper, and
    the ambient folk sounds of Sufjan Stevens and Iron & Wine; they write poetry echoing Ursula K. Le Guin’s speculative nuance and curate a small digital gallery using GIMP, though they often hoard unfinished
    pieces in a cluttered folder.
  travel: Donald Mathis, a 17‑year‑old budding explorer, plans trips with meticulous spreadsheets, favoring rugged itineraries like a week‑long trek through Yellowstone and a future backpacking adventure
    in Patagonia’s Torres del Paine; they balance a modest travel fund with part‑time odd jobs, prefer solo camping under the stars over crowded resorts, and they keep a low‑priority checklist for a family
    visit to Appalachia.
  culinary: Donald Mathis, a 17‑year‑old amateur cook, favors simple, nutrient‑dense meals such as grilled trout with lemon‑dill sauce, wild mushroom risotto, and homemade trail mix featuring roasted peanuts,
    dried cranberries, and pine nuts; they cook at a modest skill level using a cast‑iron skillet and a small gas stove, enjoy occasional coffee from a local roaster, and they sometimes over‑season dishes
    in an attempt to replicate the robust flavors of campfire meals.
  core: Donald Mathis, a 17‑year‑old solitary creator, blends methodical curiosity with quiet compassion, often losing track of meals while editing photos, yet always returns to the mountains for solace,
    and they habitually forget to reply to group texts.
background:
  cultural: Donald was raised in Basin, a small, remote town in Big Horn County, Wyoming, where ranching and open‑range living are central to community life. His family traces its roots to German‑American
    settlers who arrived in the Midwest before moving westward, bringing values of self‑reliance, hard work, and respect for the land. The western frontier culture of the region, with its emphasis on independence
    and a close connection to nature, has shaped Donald's preference for solitude and his deep appreciation for the expansive landscapes around him. While primarily identifying with his white, rural heritage,
    he is aware of the local Northern Cheyenne and Crow histories that permeate the area, fostering a nuanced respect for the region's diverse cultural tapestry. Community events such as county fairs, 4‑H
    projects, and volunteer gatherings have reinforced his sense of cooperation and compassion, aligning with his desire to help others while maintaining personal quietude.
attributes:
