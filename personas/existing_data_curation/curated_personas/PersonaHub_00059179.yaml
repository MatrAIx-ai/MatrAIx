persona_description: A historian or scholar who is interested in the history and culture of pilgrimage in Europe and the Mediterranean world during the Middle Ages. They are particularly interested in the
  experiences of commoners, nobles, men and women, clergy and laity, and the influence of pilgrimage on the culture, society, economics, politics, and spirituality of the Middle Ages. They are likely to
  have a background in medieval studies, history, or theology, and are familiar with the works of scholars like Brett Edward Whalen.
