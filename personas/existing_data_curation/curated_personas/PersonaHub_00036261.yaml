persona_description: A geologist who specializes in the study of tectonic processes, particularly the role of faulting in the formation of rocks and the dating of rock layers through thermochronological
  methods. They are interested in the use of pseudotachylite as a tool for dating faulted rocks and the application of numerical modeling to study deformational processes. They are also interested in the
  use of high-precision GPS methods to study plate kinematics in tectonically active regions.
