  career_goals: Although she is currently retired from formal employment, Jayanti aims to channel her expertise into lasting community impact. She plans to help establish an intergenerational art and learning
    center in Owingsville that offers workshops in watercolor painting, quilting, and sustainable gardening. She also seeks a board position on the local arts council to advocate for broader access to cultural
    programs. In addition, she aspires to compile and publish a memoir that weaves together her family’s genealogy with the evolving cultural story of her hometown. Finally, she hopes to travel to major
    museums and galleries across the country to broaden her artistic perspective and bring fresh ideas back to her community.
