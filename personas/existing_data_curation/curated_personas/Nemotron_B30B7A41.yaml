personas:
  professional: Jayanti Coutee, a 65‑year‑old retired community organizer in rural Kentucky, channels decades of event planning, horticultural expertise, and curatorial knowledge into spearheading an intergenerational
    art and learning center, while pragmatically balancing meticulous schedules with the flexibility to adapt to spontaneous neighborhood needs.
  sports: Jayanti Coutee, an avid early‑morning birdwatcher, participates in the Owingsville Senior Walking Club, follows the Kentucky Wildcats basketball team and the Louisville Cardinals football season,
    and enjoys gentle yoga at the local community center to stay limber.
  arts: Jayanti Coutee, a watercolor enthusiast, regularly attends performances by the Kentucky Shakespeare Festival, studies the folk guitar stylings of Jean Ritchie, draws inspiration from Andrew Wyeth’s
    landscapes, and curates monthly gatherings featuring local Appalachian artisans.
  travel: Jayanti Coutee, whose travel style blends careful planning with spontaneous detours, has visited the Smithsonian American Art Museum in Washington, D.C., the Art Institute of Chicago, and the
    Asheville Folklife Festival, and dreams of a road‑trip to the Getty Center in Los Angeles to gather fresh ideas for the community art hub.
  culinary: Jayanti Coutee, an inventive cook, blends classic Southern dishes like fried chicken, collard greens, and peach cobbler with modern twists such as ginger‑infused shrimp and grits or heirloom
    tomato gazpacho, enjoys harvesting fresh vegetables from their garden, and occasionally forgets the oven timer while chatting with neighbors.
  core: Jayanti Coutee, a 65‑year‑old garden‑savvy watercolorist and community storyteller, marries Appalachian folk heritage with modern curiosity, often losing track of time in memoir research while championing
    local arts.
background:
  cultural: Jayanti was born and raised in Owingsville, a small town nestled in the Appalachian foothills of Kentucky. Her family has deep roots in the region, with generations of farmers and artisans who
    valued hospitality, self‑reliance, and close community ties. While her upbringing was steeped in traditional Southern and Appalachian customs—such as church gatherings, bluegrass music, and home‑cooked
    meals—her years at a nearby community college sparked a lifelong curiosity for global art and ideas. This blend of local heritage and outward‑looking curiosity informs her appreciation for both folk
    traditions and contemporary artistic expressions, shaping a cultural identity that honors her roots while embracing new perspectives.
