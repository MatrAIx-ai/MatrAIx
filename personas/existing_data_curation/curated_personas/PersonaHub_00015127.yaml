persona_description: A local government official in Westchester or Madison County, responsible for managing wildlife resources and ensuring their preservation. They are aware of the importance of land-use
  planning and the need for adequate space for wildlife to thrive. They are involved in collaborative efforts with the Wildlife Conservation Society and other environmental groups to protect critical private
  lands and manage habitat overlaps between municipalities. They are also aware of the potential threats to wildlife from development and are working to mitigate these threats through land acquisitions,
  conservation easements, and habitat corridors. They understand the importance of zoning codes and the need for stronger regulations to prevent disruptive projects.
