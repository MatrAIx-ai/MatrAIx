personas:
  professional: Joan Ayer, a 16‑year‑old high‑school senior, is an aspiring visual artist and graphic designer who channels her curiosity and love for the Pacific Northwest’s forests into community murals
    and digital illustrations, using a mix of watercolor, Procreate, and DIY mixed‑media while balancing relaxed, flexible planning with occasional bursts of assertive collaboration on school art projects,
    and they often negotiate creative direction with teachers and peers.
  sports: Joan Ayer, a member of her high school cross‑country team and a regular participant in the local hiking club, spends weekends trekking the Siletz River trail, follows the Portland Timbers in MLS
    and the Oregon Ducks football team, and they occasionally join community pick‑up basketball games at the town recreation center to stay active.
  arts: Joan Ayer, an avid participant in community mural projects, draws inspiration from folk‑rock artists like Fleet Foxes, Sufjan Stevens, and Iron & Wine, as well as visual influences from Emily Carr
    and the street art of Banksy, while regularly watching indie films such as Moonrise Kingdom and Paterson, and they share their poetry and sketches on an Instagram blog.
  travel: Joan Ayer has explored nearby Portland, the rugged Oregon Coast, and Crater Lake, dreams of backpacking through the Scottish Highlands and visiting Iceland’s volcanic landscapes, prefers a mix
    of spontaneous road trips and carefully planned hikes, and they often delay booking due to school obligations.
  culinary: Joan Ayer enjoys cooking simple meals like cedar‑plank salmon with wild foraged mushrooms, pine nut pesto pasta, and hearty clam chowder, frequently incorporates locally sourced ingredients
    such as Oregon hazelnuts and fresh river trout, and while their cooking skill is moderate, they often forget to set timers, resulting in occasional over‑cooked dishes.
  core: Joan Ayer is a nature‑infused teenage artist who constantly sketches pine‑cone collages in the margins of notebooks, procrastinates on deadlines, finds solace in indie folk melodies while chasing
    the next perfect sunrise hike, and they quit coffee after school to fuel their late‑night drawing sessions.
background:
  cultural: Joan was raised in a white, middle‑class family that has lived in the coastal region of western Oregon for generations, with roots in the timber and small‑scale farming economy typical of Lincoln
    County. Growing up in Siletz, a town adjacent to the Siletz Indian Reservation, she has been exposed to the cultural heritage of the Siletz tribe through local festivals, powwows, and school programs
    that teach about native art and environmental stewardship. These experiences broadened her appreciation for diverse artistic traditions and the importance of preserving the natural landscape. While
    her primary cultural identification aligns with mainstream American and Pacific‑Northwest rural culture, she values the cross‑cultural exchanges that shape her community.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration (Procreate, Canva)'', ''creative writing (poetry, flash fiction)'', ''birdwatching and local ecology knowledge'', ''basic woodworking
    (frame making)'', ''short-form video editing (TikTok)'', ''DIY mixed-media crafts'']'
  hobbies: '[''sketching landscapes'', ''hiking and nature collecting'', ''digital painting'', ''participating in community mural projects'', ''playing acoustic guitar and writing lyrics'', ''reading sci‑fi
    novels'', ''watching independent films'', ''creating stop‑motion videos'', ''volunteering at the local library art programs'']'
  career_goals: Joan dreams of attending a specialized art college to refine her illustration and graphic design skills. She aspires to become a freelance visual artist, creating murals for community spaces
    in Oregon and designing album covers for indie musicians. She hopes to blend her love of nature with art by developing an environmentally themed portfolio and working with non‑profits on educational
    visual materials. Long‑term, she envisions opening a small studio/gallery in her hometown where she can host workshops for other young artists and collaborate on community projects. As a backup plan,
    she considers studying environmental science to merge her ecological interests with creative communication.
