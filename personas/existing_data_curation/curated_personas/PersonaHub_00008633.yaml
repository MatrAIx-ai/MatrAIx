persona_description: A scientist who studies the impact of agricultural transformation on biodiversity, particularly in the context of reptile communities in southeastern Australia. This scientist uses
  a novel co-occurrence network approach to analyze the changes in species co-occurrence, richness, and composition under agricultural transformation. They are interested in the complex changes in the number
  and distribution of pair-wise co-occurrence links and the classification of species susceptibility to agricultural transformation.
