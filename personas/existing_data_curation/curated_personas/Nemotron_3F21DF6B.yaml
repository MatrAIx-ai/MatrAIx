  hobbies: '[''Urban sketching'', ''DJing & curating playlists'', ''Cooking Southern comfort food with a modern twist'', ''Reading contemporary African-American literature'', ''Photography (street and portrait)'',
    ''Yoga and meditation'', ''Hiking in nearby parks'', ''Collecting vintage records'', ''Participating in community mural projects'', ''Visiting art galleries and museum exhibitions'']'
  career_goals: She aims to establish a sustainable independent studio that balances structured business practices with the freedom of creative improvisation. Genevieve plans to secure representation with
    a progressive gallery in Atlanta, complete a high-visibility public mural in a city neighborhood, and obtain a regional arts grant to fund a community-based project that reflects Black Southern experiences.
    Over the next five years she hopes to launch a limited-edition print line, teach workshops at local community centers, mentor emerging Black artists, and ultimately open a collaborative art space that
    functions as both studio and exhibition venue.
