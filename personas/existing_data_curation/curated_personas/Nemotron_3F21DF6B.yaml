personas:
  professional: Genevieve Baitey, a 30‑year‑old mixed‑media visual artist who blends digital illustration with reclaimed‑material murals, leverages community storytelling to shape public art while balancing
    a spontaneous creative flow with a newly adopted deadline‑tracking system, and uses their competitive edge to secure gallery representation and grant funding.
  sports: Genevieve Baitey enjoys early‑morning hikes up Stone Mountain trails, participates in a co‑ed basketball league that meets at the Baptist Hill Community Center, and follows the Atlanta Falcons,
    Hawks and United as weekly social anchors while balancing a flexible fitness routine centered on yoga and occasional pick‑up games.
  arts: Genevieve Baitey curates eclectic playlists featuring Miles Davis, Erykah Badu and Kamasi Washington, draws visual inspiration from muralist Faith Ringgold, digital illustrator James Jean and photographer
    Gordon Stone, and regularly attends live shows at the Fox Theatre while volunteering with the local arts collective A3 Studio.
  travel: Genevieve Baitey favors purposeful trips that blend art‑centric exploration with culinary discovery, having recently visited New Orleans for its jazz scene, Savannah’s historic districts for sketching,
    and a month‑long artist‑in‑residence program in Accra, while they plan a future road‑trip along the Blue Ridge Parkway to capture seasonal landscapes.
  culinary: Genevieve Baitey, an avid home cook, reimagines Southern comfort dishes like shrimp‑and‑grits with miso glaze, collard‑green tacos topped with smoked paprika, and sweet‑potato pie infused with
    cardamom, using fresh okra, black‑eyed peas and heirloom tomatoes while keeping a well‑stocked vinyl‑themed pantry and a collection of vintage cookbooks.
  core: Genevieve Baitey channels the rhythm of gospel‑filled family gatherings into bold mixed‑media murals, balancing a relentless drive for artistic success with a habit of procrastinating on paperwork,
    all while humming vinyl‑spun jazz in the studio.
background:
  cultural: Genevieve was raised in a multi-generational Black household in Atlanta’s historic West End, where family gatherings, gospel music, and stories of the Civil Rights era shaped her sense of identity.
    The city’s vibrant Black arts community—from the Atlanta University Center’s cultural programs to grassroots collectives in the Sweet Auburn district—provided early exposure to muralists, musicians,
    and writers who celebrated African-American narratives. She draws on Southern Black culinary traditions, AAVE linguistic rhythms, and the visual language of Afro-centric motifs in her work, while also
    staying connected to broader diasporic influences through travel, music, and literature. These cultural roots inform both the content of her art and her commitment to community-based projects that uplift
    under-represented voices.
