  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking traditional Mexican dishes'', ''Hiking the Sierra foothills'', ''Photography'', ''Volunteer tutoring at local schools'', ''Participating
    in small book clubs'']'
  career_goals: Mercedes aims to expand her impact by moving into a regional director role overseeing multiple community service agencies across California’s Central Valley. She wants to champion data‑driven
    social interventions, secure larger multi‑year funding streams, and influence local policy on affordable housing and mental‑health services. Her ambition includes launching a technology‑enabled platform
    for streamlined case management that respects cultural nuances, positioning herself as a bridge between evidence‑based practice and community needs while maintaining her practical, curiosity‑driven
    mindset.
