personas:
  professional: Mercedes Huitron, a seasoned community program manager with a STEM background, leverages data‑driven design, rigorous evaluation, and bilingual communication to create reliable, evidence‑based
    social interventions, while her methodical planning and quiet assertiveness keep multi‑agency projects on schedule and aligned with policy goals.
  sports: Mercedes Huitron, an avid hiker who joins the Sierra Foothill Hiking Club for weekend treks and casually cycles on summer evenings, roots for the Sacramento Kings during basketball season and
    the San Francisco 49ers in the fall, and maintains a disciplined weekly routine of trail runs to balance mental stamina with physical health.
  arts: Mercedes Huitron, who captures the golden light of the foothills through landscape photography inspired by Ansel Adams and unwinds with the soulful vocals of Lila Downs and classic ballads by Juan
    Gabriel, regularly reads works by Isabel Allende and attends community theater productions that celebrate regional stories.
  travel: Mercedes Huitron, a meticulous planner who prefers low‑key escapes over crowded tours, frequently retreats to Yosemite and Lake Tahoe for solo hikes, enjoys weekend wine‑tasting trips in Napa,
    and dreams of a cultural immersion journey to Oaxaca and an adventurous trek through Patagonia’s Torres del Paine.
  culinary: Mercedes Huitron, a confident home cook who thrives on cultivating heirloom tomatoes and chilies, delights in preparing chiles rellenos with roasted poblano, homemade salsa verde with tomatillo,
    and a rustic pozole using hominy, corn masa, and fresh cilantro, while occasionally experimenting with fusion tacos that blend Mexican spices with Mediterranean herbs.
  core: Mercedes Huitron blends a pragmatic, data‑driven mindset with a quiet curiosity, finding balance in solitary gardening, late‑night statistical modeling, and occasional over‑scheduling that leaves
    little room for spontaneous socializing.
background:
  cultural: Mercedes grew up in a bilingual Mexican‑American household in Fresno, celebrating Día de los Muertos, quinceañeras, and family gatherings centered around food and music. Her Mexican heritage
    instilled strong values of collectivism, respect for elders, and a deep sense of community responsibility. She frequently incorporates cultural traditions into her professional work, such as organizing
    culturally relevant outreach events and ensuring services are accessible to Spanish‑speaking residents. This cultural lens, combined with her practical STEM training, shapes her inclusive, data‑informed
    approach to community service.
attributes:
  skills: '[''Program Development'', ''Data Analysis'', ''Grant Writing'', ''Budget Management'', ''Strategic Planning'', ''Stakeholder Engagement'', ''Volunteer Coordination'', ''Performance Evaluation'',
