  career_goals: At this stage of his career, Douglas aims to transition from senior mechanical engineer to a leadership role where he can shape interdisciplinary teams and champion the integration of art
    and technology. He aspires to become an engineering manager or director of product development focused on sustainable, aesthetically resonant solutions. He hopes to mentor the next generation of engineers,
    establishing a legacy of empathy-driven design and fostering a culture that values mental well‑being. Long‑term, he envisions launching a boutique consultancy that partners with artists, designers,
    and manufacturers to create innovative products while maintaining a healthy work‑life balance to manage his anxiety and emotional reactivity.
