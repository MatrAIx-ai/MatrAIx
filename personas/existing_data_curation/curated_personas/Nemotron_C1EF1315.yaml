  hobbies: '["Reading Children''s Literature","Acoustic Guitar and Singing","Gardening","Cooking Southern Recipes","Community Volunteering","Crafting Educational Materials","Attending Juneteenth and Local
    Cultural Events","Yoga and Mindfulness","Exploring Nature Trails","Storytelling"]'
  career_goals: Bertha aims to earn a bachelor's degree in Early Childhood Education within the next three years, which will enable her to move into a lead teacher or curriculum coordinator role at her
    school or within the Clarke County school district. She aspires to develop an innovative, culturally responsive preschool program that blends creativity with evidence-based practices, and she hopes
    to mentor new teachers, sharing her flexible, child-centered strategies. Long-term, Bertha dreams of establishing a community-based early learning center that offers inclusive, affordable preschool
    services and celebrates African American heritage through curricula and events.
