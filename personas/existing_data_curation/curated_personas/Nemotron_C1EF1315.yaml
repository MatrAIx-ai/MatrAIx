personas:
  professional: Bertha Jackson is a preschool teacher who crafts play‑based, culturally responsive lesson plans that merge storytelling, acoustic guitar sessions, and garden projects to nurture early literacy,
    while her spontaneous nature sometimes makes meeting curriculum deadlines a juggling act.
  sports: Bertha Jackson stays active by joining the Clarke County Yoga Circle, jogging along the Riverfront Park trails, cheering on the Atlanta Falcons and Atlanta Braves on game days, and occasionally
    playing pickup soccer with the Atlanta United fan club, preferring low‑impact activities that fit their flexible schedule.
  arts: Bertha Jackson blends a love for classic children’s books such as Maurice Sendak’s *Where the Wild Things Are* and Dr. Seuss’s rhymes with a weekly repertoire of folk tunes by Joan Baez, Pete Seeger,
    and Sarah Jarosz, often performing impromptu sing‑alongs in the classroom and attending community theater productions to keep the arts alive in their life.
  travel: Bertha Jackson prefers spontaneous weekend getaways, often exploring nearby gems like Savannah’s historic squares or the Great Smoky Mountains for hiking, while dreaming of a culturally rich music
    tour in Dublin, Ireland, balancing limited vacation days with a modest travel budget that favors affordable hostels and shared rides.
  culinary: Bertha Jackson enjoys cooking Southern comfort fare—such as crispy fried chicken, creamy shrimp and grits, and buttery collard greens seasoned with smoked paprika—bringing a confident, home‑cooked
    touch to family gatherings and potluck events, and they often experiment with fresh herbs from their garden to elevate classic recipes.
  core: Bertha Jackson’s life revolves around nurturing young minds through music, stories, and soil, balancing a flexible, harmony‑seeking spirit with occasional deadline mishaps and a penchant for spontaneous
    guitar jams and garden‑to‑table meals.
background:
  cultural: Bertha is an African American woman raised in Virginia, where her family's traditions blend Southern customs with a strong sense of Black heritage. Growing up in a close-knit community, she
    attended church regularly and participated in cultural events like Juneteenth parades and soul-food gatherings, which fostered her appreciation for storytelling, music, and communal support. These experiences
    influence her teaching philosophy; she intentionally incorporates African American literature, history, and music into her curriculum to reflect her students' diverse backgrounds and promote cultural
    pride. Living in Berryville, Clarke County, she balances the rural Southern lifestyle with a commitment to uplifting the Black community through education and community involvement.
