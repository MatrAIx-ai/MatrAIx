persona_description: A healthcare professional who is dedicated to improving the health and well-being of marginalized communities, particularly those who are at risk of contracting HIV/AIDS. They are knowledgeable
  about the importance of annual medical checkups and the need for continuous care and treatment. They are also aware of the disparities that exist within these communities and the importance of raising
  awareness about HIV prevention and treatment. They have experience coordinating and linking patients with continuous care and treatment, as well as educating individuals on healthy lifestyle changes.
  They are confident in their ability to reach out to communities and the millennium generation to start the dialogue about HIV prevention and treatment.
