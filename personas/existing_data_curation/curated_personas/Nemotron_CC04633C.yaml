personas:
  professional: Shirley Williams, a budding young engineer, delights in constructing intricate LEGO models and dreams of designing real bridges, channeling their practical curiosity and organized mindset
    into early problem‑solving projects at school.
  sports: Shirley Williams, a competitive member of the local ‘Cincinnati Kids Soccer Club’, thrives on scoring goals, follows the Cincinnati Bengals with a team jersey, and attends Saturday morning practices
    at YMCA fields, where they eagerly practice new dribbles.
  arts: Shirley Williams embraces drawing cartoon characters inspired by Disney’s Mickey Mouse and Pixar’s Toy Story, enjoys reading Dr. Seuss picture books, and spends evenings watching short science videos
    on their tablet, letting creative bursts balance their competitive edge.
  travel: Shirley Williams loves family trips to the Cincinnati Zoo, the Ohio State Fair, and day outings at Mammoth Cave, while dreaming of exploring the Smithsonian National Museum of Natural History
    in Washington, D.C., as their next big adventure.
  culinary: Shirley Williams favors homemade mac and cheese, peanut‑butter‑and‑jelly sandwiches, and crunchy apple slices, occasionally cooking simple carrot‑and‑celery sticks for snack time, though they
    sometimes sneak extra cookies when no one’s watching.
  core: Shirley Williams is a curious yet cautious 7‑year‑old who balances a love for building, soccer, and storytelling with a habit of worrying over small setbacks and a competitive spirit that drives
    them to perfect every LEGO set.
background:
  cultural: Shirley is a white Midwestern American raised in Cincinnati, Ohio. Her upbringing reflects the typical suburban culture of the region, emphasizing community involvement, school participation,
    and family-centered activities. She regularly visits the Cincinnati Zoo and the Ohio State Fair with her family, attends a local community church where she joins children’s programs, and takes part
    in neighborhood soccer leagues. The Midwestern values of practicality, reliability, and modesty are evident in her daily routines and her balanced approach to new ideas and established methods.
