  hobbies: '["LEGO building", "Reading animal books", "Nature walks and bug watching", "Soccer", "Drawing cartoons", "Jigsaw puzzles", "Watching educational science videos", "Crafting with clay"]'
  career_goals: Shirley dreams of becoming a veterinarian because she loves animals and wants to help them stay healthy, a goal that combines her curiosity about biology with a practical desire to care
    for living beings. She also fantasizes about being an astronaut, imagining herself exploring space and conducting experiments, reflecting her love for new ideas and hands‑on problem solving. She aims
    to be among the top students in her class, win the school science fair, and perhaps earn a badge as a junior soccer captain, showing her competitive drive and ambition to excel in both academic and
    physical pursuits.
