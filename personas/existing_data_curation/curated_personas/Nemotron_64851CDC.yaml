  hobbies: '[''Pickup basketball'', ''Volunteer work at food pantry'', ''Watching Steelers games'', ''Home brewing'', ''Hiking in Allegheny foothills'', ''Exploring smart‑home technology'', ''Cooking for
    friends'', ''Attending local music festivals'']'
  career_goals: He aims to advance from sales associate to store supervisor within the next two years, leveraging his leadership potential and calm under pressure. Long‑term, Derrick envisions becoming
    a regional manager or opening his own community‑focused boutique that blends technology and sustainable products. He plans to earn an associate degree in business administration to complement his practical
    experience, while also seeking mentorship opportunities within the retail chain.
