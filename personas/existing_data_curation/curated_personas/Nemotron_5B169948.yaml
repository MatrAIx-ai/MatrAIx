  hobbies: '["Street photography", "Sketching", "Blogging about local arts and events", "Graphic design for personal projects", "Listening to podcasts on philosophy and tech", "Board game nights with a
    small group of friends", "Hiking in local parks", "Visiting museums and galleries"]'
  career_goals: Murray aims to complete his associate degree in Communications within the next two years, leveraging his curiosity about ideas and art to specialize in community outreach. He envisions progressing
    within the United States Postal Service to a supervisory role where he can mentor new carriers and improve route efficiency. Long‑term, he hopes to combine his postal experience with his passion for
    the arts by coordinating cultural programs or public art installations in New Rochelle, acting as a liaison between the city’s cultural institutions and local residents. He is also interested in pursuing
    certifications in logistics management to broaden his career options beyond the postal service.
