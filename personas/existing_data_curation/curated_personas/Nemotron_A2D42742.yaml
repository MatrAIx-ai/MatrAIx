personas:
  professional: A diligent junior Lego architect and budding scientist, Eduardo Zavala channels their vivid imagination and methodical planning into building intricate Lego cityscapes, sketching architectural
    blueprints in a notebook, and dreaming up experiments inspired by picture books about space and myth.
  sports: An enthusiastic small‑group athlete, Eduardo Zavala enjoys playing soccer with the San Juan Mini‑Kicks club, cheerfully watches the Cangrejeros de Santurce baseball games on family nights, and
    practices playful agility drills at the park near El Yunque, preferring movement that feels like dancing rather than formal competition.
  arts: A creative sketcher, Eduardo Zavala fills their sketchbooks with whimsical characters inspired by salsa legend Héctor Lavoe, reggaetón star Bad Bunny, and plena group Viento de Agua, admires the
    vibrant murals of local street artist Richie Calin, and often rehearses dance steps after listening to these musical icons.
  travel: A curious explorer, Eduardo Zavala cherishes family trips to the rainforest trails of El Yunque, beach outings on Isla Vieques, and eagerly anticipates future adventures to Disney World in Orlando
    and the historic plazas of Barcelona, favoring itineraries that include shell‑collecting and sketch‑making time.
  culinary: A budding food enthusiast, Eduardo Zavala delights in the sweet bite of mango slices, the crunchy texture of tostones, and the savory aroma of alcapurrias, often helping their mother roll masa
    for empanaditas and occasionally drawing a plate of arroz con gandules before the family dinner.
  core: A methodical six‑year‑old imagination engine, Eduardo Zavala builds Lego metropolises, saves pennies in a rainbow piggy bank, sketches to the beat of reggaetón, and quietly debates the best shell
    shape—yet frequently forgets to put their crayons back in the box.
background:
  cultural: Eduardo lives in San Juan, where he is immersed in Puerto Rican culture. He speaks Spanish at home and school, celebrates local festivals such as San Sebastián and Three Kings' Day, and participates
    in family gatherings featuring traditional foods like arroz con gandules and alcapurrias. He enjoys salsa, bomba, and plena rhythms, and learns about the island’s history through stories from his grandparents.
