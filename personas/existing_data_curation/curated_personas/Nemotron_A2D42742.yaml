  career_goals: Eduardo dreams of becoming an artist or inventor who creates fantastical worlds, imagining drawing comics, designing imaginative toys, or exploring space as an astronaut. He also hopes to
    one day help other kids learn to read and create, reflecting his kindness and cooperative nature.
