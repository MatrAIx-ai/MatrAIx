personas:
  professional: Lori Naves, a retired senior‑center volunteer who blends practical handyman know‑how with an easy‑going, improvisational spirit, keeps the local food pantry stocked, mentors younger volunteers,
    and leads the quilting circle—though she often relies on scribbled notes to remember meeting times.
  sports: Lori Naves, a devoted member of the Roberts County senior‑center walking club who enjoys brisk morning strolls around Big Stone Lake, avidly roots for the Sioux Falls Storm indoor football team
    and follows the Minnesota Timberwolves on TV, while steering clear of high‑impact sports to protect her osteoarthritic knees.
  arts: Lori Naves, an ardent fan of classic jazz greats such as Duke Ellington, Ella Fitzgerald, and Count Basie, sings in the church choir’s annual rendition of Handel’s Messiah, delights in historical
    fiction by Hilary Mantel and memoirs like Maya Angelou’s I Know Why the Caged Bird Sings, and occasionally watches the Golden Age film Singin’ in the Rain for inspiration.
  travel: Lori Naves prefers relaxed, car‑centric trips—taking scenic autumn drives through South Dakota’s rolling hills to visit Yankton’s historic Main Street, exploring the Badlands on day excursions,
    and, on special occasions, riding the train to Chicago for a jazz set at the Green Mill, while dreaming of a future pilgrimage to New Orleans for Mardi Gras.
  culinary: Lori Naves, a seasoned Midwestern cook and preserves maker, whips up her signature apple‑pie with tart Granny Smith slices, cinnamon, and buttery crumble, slow‑cooks a hearty pork stew brimming
    with heirloom carrots and fresh sage, cans summer tomatoes into tangy chutney, and bakes flaky cornbread in a cast‑iron skillet greased with bacon drippings, all while sharing generous portions with
    neighbors.
  core: Lori Naves, an 81‑year‑old community‑center dynamo who weaves quilting, gardening, and big‑band jazz into a vibrant tapestry of service, humorously lost in her own notebook of appointments, embodies
    curiosity, practicality, and a charming, endearing disarray.
background:
  cultural: Lori grew up on a farm near Milbank in the 1930s and 1940s, descending from Norwegian immigrants and raised in a Lutheran household. Her upbringing reflects the Midwestern values of self‑reliance,
    neighborliness, and community service that are central to Roberts County’s agricultural heritage. Traditions such as church potlucks, harvest festivals, and a strong emphasis on thrift and hard work
    have shaped her outlook, while her lifelong connection to the land and local community informs her daily life and passions.
