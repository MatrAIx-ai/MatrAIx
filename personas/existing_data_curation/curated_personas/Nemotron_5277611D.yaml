  hobbies: '[''gardening (heirloom vegetables)'', ''quilting and knitting circles'', ''reading historical fiction and memoirs'', ''church choir and services'', ''senior bingo evenings'', ''baking and sharing
    pies'', ''bird-watching at Big Stone Lake'', ''listening to classic jazz and big‑band music'', ''scenic drives to see fall colors'', ''crafting blankets for charity'', ''volunteering at the local food
    pantry'']'
  career_goals: Even though she is retired, Lori aims to stay active in her community by continuing her volunteer work at the senior center and local food pantry. She wishes to mentor younger volunteers,
    preserve the oral histories of Roberts County, and learn to use video‑call technology to keep closer contact with her grandchildren. Maintaining her health through walking, gardening, and regular social
    activities, as well as supporting the annual Roberts County Fair, are also key aspirations.
