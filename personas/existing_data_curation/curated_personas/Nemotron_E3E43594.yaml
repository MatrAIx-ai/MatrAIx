  career_goals: As he grows, Gustavo aspires to channel his caring, cooperative nature into a career that supports community well‑being. He dreams of completing high school, pursuing higher education, and
    eventually working as a pediatric health professional, teacher, or community outreach coordinator, where his practical mindset and reliability can help others. He aims to honor his Peruvian heritage
    by possibly integrating cultural health practices or bilingual education, and to achieve a role that balances responsibility with opportunities for personal growth.
