    User 2: Thanks! It''s a lot of hard work, but it''s also very rewarding.

    User 1: I''m sure it is. What made you decide to become a nurse?

    User 2: I''ve always wanted to help people and I think nursing is a great way to do that.

    User 1: That''s a great reason to become a nurse. I''m sure you''ll be a great nurse.

    User 2: Thank you! I hope so too.'
