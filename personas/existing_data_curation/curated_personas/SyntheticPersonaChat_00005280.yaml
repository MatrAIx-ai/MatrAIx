    User 1: What else do you like to do for fun?

    User 2: I also like to dance ballet. I''ve been dancing since I was a little girl and it''s a big part of my life.

    User 1: That''s awesome! I''ve always wanted to learn how to dance ballet.

    User 2: You should give it a try! It''s a lot of fun and it''s a great way to stay in shape.

