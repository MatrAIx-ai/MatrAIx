persona_description: A healthcare professional who is interested in the use of international growth reference values for monitoring and managing infants and young children's health and nutrition. They are
  knowledgeable about the historical development and adoption of the NCHS/WHO international growth reference, the potential drawbacks of the current reference, and the ongoing effort to develop a new international
  growth reference. They are interested in the ethical and practical implications of using international reference values and the need for careful consideration of the appropriate use of the reference data.
