    fundamentals'', ''Penetration testing'', ''Threat modeling'']'
  hobbies: '[''Hiking'', ''Birdwatching'', ''Reading science-fiction and tech non-fiction'', ''Listening to cybersecurity podcasts'', ''DIY woodworking'', ''Building custom PCs'', ''Playing strategy and
    puzzle video games'', ''Nature photography'']'
  career_goals: Matthew aims to deepen his technical expertise and progress toward senior and leadership roles within cybersecurity. In the next three years, he plans to obtain CISSP and CISM certifications,
    lead a small incident response team, and design enterprise‑wide security architectures that integrate cloud and on‑premise environments. He aspires to become a Security Architect or eventually a Chief
    Information Security Officer (CISO), focusing on building resilient, zero‑trust frameworks while maintaining a work environment that allows for remote, flexible schedules. He also hopes to mentor junior
    analysts and contribute to community knowledge through speaking at regional security meetups and publishing articles on emerging threats.
