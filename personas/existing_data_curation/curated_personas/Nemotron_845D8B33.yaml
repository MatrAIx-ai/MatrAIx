personas:
  professional: Matthew Sanda is a senior cybersecurity analyst who leverages deep expertise in SIEM platforms, threat hunting, and incident response, translating complex data into clear action plans while
    balancing their preference for structure with a relaxed, self‑directed work style that favors remote, flexible schedules and collaborative mentorship.
  sports: Matthew Sanda channels love for the outdoors into regular hikes on the Kettle Moraine trails and occasional weekend runs; they follow the Milwaukee Bucks and Green Bay Packers avidly, belong to
    a local hiking club that meets monthly, and prefer solo cardio over organized team sports.
  arts: Matthew Sanda nurtures a creative side by photographing Wisconsin’s autumn woodlands, curating a modest collection of sci‑fi literature from authors like Neal Stephenson and William Gibson, attending
    occasional screenings of classic films such as Blade Runner, and finding inspiration in the folk melodies of Sufjan Stevens.
  travel: Matthew Sanda favors low‑key, nature‑focused trips, having explored the Adirondacks and the Upper Peninsula of Michigan, and dreaming of a solo adventure to Iceland’s volcanic landscapes for aurora‑watching;
    they plan itineraries that balance remote cabins with flexible work‑friendly accommodations.
  culinary: Matthew Sanda enjoys hearty Midwestern fare like cheese curds and bratwurst, experiments with simple home‑cooked meals such as mushroom risotto and artisanal pizza topped with locally sourced
    cheeses, pairs dishes with craft beers from New Glarus, and relies on coffee and granola bars as fuel during late‑night PC builds.
  core: Matthew Sanda is a disciplined yet laid‑back cybersecurity enthusiast who thrives in solitude, blends technical rigor with a love for nature, and balances meticulous planning with spontaneous hobby
    projects.
background:
  cultural: Matthew grew up in a middle‑class White family in the Upper Midwest, surrounded by the modest, community‑oriented culture typical of De Pere and the broader Outagamie County. His heritage includes
    German and Scandinavian roots common to the region, and he was raised with values of self‑reliance, practicality, and modesty. Local traditions such as the annual St. Patrick’s Day parade, cheese curd
    festivals, and a strong Lutheran/Protestant church community shaped his appreciation for quiet, consistent routines. The relatively low‑density, nature‑rich environment fostered his love for outdoor
    activities and a preference for solitude, while the region’s emphasis on diligent work ethic aligns with his disciplined approach to cybersecurity.
attributes:
  skills: '[''Security Information and Event Management (SIEM)'', ''Incident response and handling'', ''Vulnerability assessment and remediation'', ''Threat hunting and threat intelligence'', ''Network
