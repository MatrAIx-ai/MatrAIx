personas:
  professional: Geovanne Preisach, a veteran early childhood education program manager with over twenty years in the Twin Cities, leverages their methodical organization, data‑driven curriculum design,
    and compassionate yet assertive leadership to transform preschool classrooms into inquiry‑rich, STEAM‑focused environments while championing staff wellness and community partnerships.
  sports: Geovanne Preisach enjoys hiking the trails around Minnehaha and the Chain of Lakes, participates in a weekly recreational softball league with the Eastside Eagles, and follows Minnesota’s professional
    teams—rooting for the Twins, Vikings and Timberwolves—while using seasonal snowshoeing as a winter fitness outlet.
  arts: Geovanne Preisach finds creative fulfillment in line dancing at regional folk festivals to the tunes of Bob Dylan and Gillian Welch, curates a DIY craft corner for her classroom inspired by folk
    art, and unwinds by reading historical nonfiction authors like Doris Kearns Goodwin and listening to the Minnesota Orchestra’s classical recordings.
  travel: Geovanne Preisach prefers purposeful short‑haul trips that blend nature and culture, such as weekend getaways to the Boundary Waters canoe routes, a yearly family visit to the Canadian Rockies,
    and a long‑planned road trip along the Pacific Coast to explore coastal forests, all while balancing travel costs with the goal of saving for a future community childcare cooperative.
  culinary: Geovanne Preisach, an enthusiastic home cook, cultivates herbs like basil and rosemary on her balcony and crafts healthy family‑friendly meals such as quinoa‑seeded salmon with dill, roasted
    vegetable medleys, and oat‑banana muffins sweetened with honey, while occasionally indulging in a secret love for spicy kimchi tacos.
  core: Geovanne Preisach blends an analytical, organized mind with a vibrant community spirit, channeling their worry‑prone nature into meticulous program design, wellness advocacy, and a love for outdoor
    adventure and wholesome cooking.
background:
  cultural: Geovanne grew up in a middle‑class white family of German‑Austrian descent in Minneapolis. Her parents valued punctuality, hard work, and community involvement—core Midwestern values that shaped
    her practical outlook. Raised near the city's public schools and community centers, she was exposed early to diverse cultures and languages, fostering an appreciation for inclusivity. While she identifies
    with the Lutheran traditions common in the region, she also embraces the multicultural fabric of the Twin Cities, regularly participating in cultural festivals and supporting immigrant families in her
    childcare programs. This blend of Germanic heritage, Midwestern pragmatism, and urban diversity informs her commitment to equitable, high‑quality early education.
