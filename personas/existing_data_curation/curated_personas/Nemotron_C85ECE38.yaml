    CPR, and emergency response'', ''Proficiency with childcare management software (Brightwheel)'', ''Microsoft Office and Google Workspace'', ''Basic accounting software (QuickBooks)'']'
  hobbies: '[''Hiking local trails with friends'', ''Community clean‑up volunteering'', ''Line dancing at folk festivals'', ''Recreational softball league'', ''Reading historical nonfiction and self‑help
    books'', ''Participating in a parenting & education book club'', ''Yoga and mindfulness meditation'', ''Balcony gardening (herbs and vegetables)'', ''DIY classroom crafts'', ''Baking healthy treats
    for family and staff'']'
  career_goals: Geovanne aims to advance to a district‑wide leadership role, such as Director of Early Childhood Services, where she can influence policy and expand high‑quality preschool offerings across
    Hennepin County. She plans to complete a bachelor's degree in early childhood education administration and pursue certification in program evaluation. Her ambition includes establishing a model preschool
    that integrates STEAM, mindfulness, and inclusive practices, and later mentoring emerging administrators. She also hopes to champion staff wellness initiatives that address stress and mental health,
    drawing on her own experiences with worry. Long‑term, she envisions founding a community‑owned childcare cooperative that provides affordable, culturally responsive care while maintaining rigorous standards.
