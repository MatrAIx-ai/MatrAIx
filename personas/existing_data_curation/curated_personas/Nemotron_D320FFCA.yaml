  hobbies: '[''Hiking'', ''Nature photography'', ''Gardening'', ''Cooking'', ''Reading contemporary fiction'', ''Reading self-development books'', ''Volunteering at food pantry'', ''Church youth group'',
    ''Quilting'', ''Knitting'', ''Journaling'', ''Sketching'']'
  career_goals: Judith aims to build on her supervisory experience by pursuing an associate's degree in business administration, with the long-term goal of becoming an office manager or human resources
    coordinator in a nonprofit organization serving rural communities. She hopes to combine her administrative expertise with her passion for helping others, eventually leading a community services program
    that provides job training and support for low-income families in the Black Hills region. She also wants to develop strong leadership skills and attain certifications in project management.
