  hobbies: '[''Crossword Puzzles'', ''Sudoku'', ''Yoga'', ''Walking (Lake Merritt)'', ''Nonfiction Reading (Finance, History, Self‑Improvement)'', ''Small Book Club'', ''Herb & Vegetable Gardening'', ''Volunteer
    Tax Assistance'']'
  career_goals: At 47, Alexis aims to transition into a senior management role, such as Audit Manager or Director of Finance, within her firm. She plans to obtain her Certified Public Accountant (CPA) designation
    if not already held, and to deepen her specialization in regulatory compliance for California‑based entities. Long‑term, she aspires to mentor more Black professionals in accounting, perhaps through
    a leadership position in the National Association of Black Accountants (NABA), and to eventually launch a boutique consulting practice focused on risk management and financial literacy for underserved
    communities. Her ambition is balanced with a desire for a stable work environment that mitigates stress while allowing her to achieve measurable impact.
