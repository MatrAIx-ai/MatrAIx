personas:
  professional: Alexis Nicholson is a meticulous accountant and auditor who leverages advanced Excel, Power Query, Power BI, and SAP expertise to lead audit teams with a disciplined, skeptical eye, consistently
    meeting tight deadlines while championing precision and regulatory compliance.
  sports: Alexis Nicholson enjoys early morning walks around Lake Merritt, participates in the Lake Merritt Striders running club, follows the Oakland Athletics in baseball and the Golden State Warriors
    in basketball, and competes in a weekly summer Pickleball league, all while maintaining a structured fitness routine.
  arts: Alexis Nicholson’s leisure hours include listening to Herbie Hancock’s jazz, attending community theater productions of August Wilson’s plays, reading biographies of Harriet Tubman, and curating
    a vintage vinyl collection that features Nina Simone and Sam Cooke, which together shape a quiet yet profound appreciation for cultural storytelling.
  travel: Alexis Nicholson prefers meticulously planned trips that balance cultural immersion with relaxation, opting for weekend getaways to Napa Valley’s vineyards and Yosemite’s trails, while dreaming
    of a well‑organized two‑week itinerary through Tokyo’s historic districts and New Orleans’ jazz heritage, always budgeting each expense in advance.
  culinary: Alexis Nicholson enjoys cooking herb‑filled meals such as rosemary‑infused grilled salmon, kale‑and‑quinoa salad with a lemon‑tahini dressing, and homemade lentil soup seasoned with cumin and
    coriander, while occasionally dining out for Southern‑style collard greens at a local soul‑food joint.
  core: Alexis Nicholson blends a disciplined accountant’s precision with a competitive, solitary streak, steering community empowerment through structured volunteer work while constantly juggling anxiety‑fueled
    worries and a love for orderly puzzles.
background:
  cultural: Raised in Oakland’s vibrant African‑American community, Alexis grew up with strong family ties, church involvement, and a legacy of resilience that shaped her work ethic. Her parents emphasized
    the importance of education and financial stability, inspiring her to pursue a career in accounting despite only completing high school. She remains connected to her cultural roots through participation
    in local Black cultural events, mentoring programs, and the National Association of Black Accountants, where she networks with other professionals who share her heritage. The blend of Oakland’s activist
    spirit and her personal drive fuels her commitment to financial empowerment for her community, while her experiences as a Black woman in a traditionally male‑dominated field reinforce her competitive,
    skeptical nature and her determination to break barriers.
attributes:
  skills: '[''Financial Accounting'', ''Auditing Standards'', ''Tax Preparation'', ''Internal Controls'', ''Risk Assessment'', ''GAAP Compliance'', ''Excel Modeling'', ''Data Visualization (Power BI)'',
