personas:
  professional: Enrique Claros is an aspiring automotive technician and IT support specialist in training, whose methodical step‑by‑step mindset, meticulous planner, and competitive problem‑solving sharpened
    through real‑time strategy games, drives them to excel at diagnosing car and computer issues with precision.
  sports: Enrique Claros enjoys low‑key outdoor pursuits such as fishing the Umatilla River, weekend hiking on the nearby Columbia Plateau trails, and road biking with the local Umatilla Riders club, while
    cheering on the Oregon Ducks football team in the fall and the Portland Timbers soccer club in the spring, reflecting how they prefer structured, solitary exercise balanced with modest team loyalty.
  arts: Enrique Claros immerses themselves in a blend of classic Latin pop icons such as Luis Miguel and Selena and modern reggaeton hits from Bad Bunny and J Balvin, while also indulging in sci‑fi literature
    by authors like Neal Stephenson and enjoying video‑game scores from composers such as Koji Kondo, shaping their artistic palate with both heritage rhythms and futuristic narratives, and they often discuss
    these influences with friends online.
  travel: Enrique Claros prefers meticulously planned road trips that mix relaxed nature escapes—such as a weekend at Oregon’s Crater Lake and a coastal camping adventure along the Pacific Highway—with
    occasional city excursions to Seattle and a dream itinerary to Tokyo for its anime culture, balancing budget constraints with a desire for new experiences, and they always pack a detailed itinerary
    and a checklist before hitting the road.
  culinary: Enrique Claros enjoys cooking at a comfortable intermediate level, frequently preparing homemade tamales with masa, pork, and red chile sauce, whipping up fish tacos with grilled catfish, cabbage
    slaw, and lime crema, and perfecting fresh salsa verde with tomatillos and cilantro, while also savoring quick gaming‑night snacks like nachos and spicy sriracha‑drizzled wings, and they often experiment
    with new spice blends to keep the flavors fresh.
  core: Enrique Claros is a structured, competitive teen who balances a love for hands‑on tech tinkering and quiet outdoor escapes, yet habitually stays up late gaming, often forgetting to eat and meticulously
    logging every detail in a planner, and they constantly tweak their schedule to fit both passions.
background:
  cultural: Enrique was raised in a Hispanic/Latino household where Spanish is spoken alongside English. His family’s roots trace back to Mexico, and they preserve cultural traditions such as cooking tamales,
    celebrating Día de los Muertos, and enjoying Latin music. Living in the rural community of Umatilla, Oregon, he experiences a blend of agricultural American life and Latino community values, fostering
    a strong sense of family responsibility, bilingual identity, and pride in his heritage.
attributes:
  skills: '["Computer hardware troubleshooting", "PC building and customization", "Strategic gaming (RTS, MOBA)", "Basic automotive maintenance", "Task organization and scheduling", "Bilingual communication
    (Spanish/English)", "Small‑group teamwork"]'
  hobbies: '["Strategy video gaming (RTS/MOBA)", "PC building and hardware tinkering", "Fishing", "Hiking", "Science‑fiction reading", "Latin music listening"]'
  career_goals: Enrique plans to earn his GED within the next year, then enroll in a local technical college’s automotive technology program to become a certified mechanic. He also intends to pursue an
    entry‑level computer support certification, such as CompTIA A+, to broaden his employability in the IT field. His long‑term ambition is to secure a stable, structured job—either as an automotive technician
    at a reputable shop or as a tech support specialist in a regional business—so he can achieve financial independence and eventually open his own small garage or computer repair service.
