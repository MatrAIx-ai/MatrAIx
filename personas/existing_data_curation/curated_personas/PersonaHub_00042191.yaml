persona_description: A pilot who frequently operates in various airfields around the world, specializing in navigating and flying in conditions with varying wind directions and slopes. This pilot is skilled
  in using different runways, patterns, and altitudes to navigate safely and efficiently. They are aware of the unique challenges and considerations that come with operating in Alpine airports with severe
  slope runways, as well as the importance of pattern orientation and separation in parallel runways. The pilot is also knowledgeable about the conventions and procedures for joining and departing patterns,
  and is familiar with the use of patterns to maintain separation with other aircraft.
