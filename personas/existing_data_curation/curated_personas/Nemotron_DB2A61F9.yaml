    ''Team collaboration and mentorship'', ''First aid and CPR certification'', ''Dementia and Alzheimer’s care techniques'']'
  hobbies: '[''Reading non-fiction (especially health psychology)'', ''Gardening (vegetable and herb garden)'', ''Crossword puzzles and Sudoku'', ''Fishing in local lakes'', ''Amateur woodworking'', ''Playing
    acoustic guitar'', ''Volunteer work at senior community center'']'
  career_goals: Over the next five years, Nathan aims to transition from a frontline personal care aide to a supervisory and educational role within the home-health sector. He plans to obtain certification
    as a Certified Nursing Assistant (CNA) and complete specialized training in dementia care, positioning himself to become a lead caregiver for a residential senior facility or a home-care agency. Longer-term,
    Nathan envisions establishing his own small, community-based personal-care service that emphasizes rigorous quality standards, compassionate support, and ongoing staff development. He also hopes to
    advocate for elder-rights policies in Blount County and mentor younger aides, using his organizational strengths to build a culture of accountability and continuous improvement.
