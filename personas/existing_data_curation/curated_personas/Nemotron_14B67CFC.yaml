personas:
  professional: Maria Diazmartinez is a seasoned heavy‑diesel and mobile‑equipment technician renowned for diagnosing complex hydraulic, pneumatic and electrical systems, meticulous parts inventory management,
    and a calm yet assertive mentorship style that blends curiosity with practical safety compliance, positioning them as a natural leader when they coordinate small maintenance crews.
  sports: Maria Diazmartinez hikes the coastal trail network on weekends wearing a Patagonia jacket, cheers for the San Diego Padres and the Los Angeles Chargers, and participates in a local running club’s
    weekend pick‑up volleyball games, balancing solitary fitness with occasional team sport camaraderie.
  arts: Maria Diazmartinez draws inspiration from the black‑and‑white landscapes of Ansel Adams, the electrifying guitar of Carlos Santana, and the folk‑rock melodies of The Lumineers, often editing nature
    photos while listening to these artists and attending community theater productions of classic dramas.
  travel: Maria Diazmartinez prefers road‑trip adventures that blend scenic drives with hands‑on experiences, having explored the Pacific Coast Highway, historic Route 66 segments in Arizona, and dreaming
    of touring the automotive museums of Stuttgart and Munich while also planning a cultural immersion trip to Oaxaca’s culinary festivals.
  culinary: Maria Diazmartinez excels at preparing heritage dishes such as tamales, pozole, and mole using fresh garden herbs like cilantro, oregano, and epazote, enhances flavors with chipotle‑infused
    oil, and balances their cooking skill with a love for sharing homemade corn tortillas at family gatherings.
  core: Maria Diazmartinez blends a solitary love of diesel engine tinkering with a community‑centered spirit, balancing meticulous organization and occasional impulsive parts splurges, all while never
    missing a weekend hike and habitually keeping extra nuts in their pocket.
background:
  cultural: Maria is a second‑generation Mexican American whose parents immigrated from Jalisco. She grew up in a bilingual household in Southern California, celebrating Mexican holidays such as Día de
    los Muertos, Las Posadas, and Mexican Independence Day while also engaging with the diverse cultural fabric of Gardena. Family life emphasizes close ties, respect for elders, and communal meals, and
    Maria maintains strong connections to her heritage through language, music, and traditional cooking. She actively participates in events at the Gardena Mexican cultural center, preserving customs and
    sharing them with her community, while navigating her identity as part of a multicultural environment.
attributes:
  skills: '[''Diesel engine repair and overhaul'', ''Hydraulic system diagnosis and repair'', ''Pneumatic system troubleshooting'', ''Electrical wiring and diagnostics'', ''Use of OEM diagnostic software'',
    ''Preventive maintenance scheduling'', ''Welding and metal fabrication'', ''Parts inventory management'', ''Safety compliance (OSHA/EPA)'', ''Technical manual interpretation'', ''Telematics and emerging
    electric equipment knowledge'', ''Apprentice training and mentorship'']'
  hobbies: '[''Classic car restoration'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Volunteer STEM tutoring'', ''Small-group cultural festivals'', ''Coastal hiking'', ''Reading automotive
    tech journals'', ''Nature photography'']'
  career_goals: Maria aims to become a certified Master Technician through ASE and obtain OEM-specific certifications for electric and hybrid heavy equipment. She envisions advancing to a service manager
    role where she can lead a small team, implement sustainable maintenance practices, and develop a mentorship program to encourage more women and minorities to enter the trades. Long‑term, she hopes to
    launch her own mobile equipment repair business that combines her technical expertise with a focus on community service and environmentally friendly solutions.
