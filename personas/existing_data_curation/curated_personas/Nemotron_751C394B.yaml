  career_goals: Although only six, Insun already envisions a future where she can work in a structured, rule‑based environment. She dreams of becoming an architect or engineer, fascinated by building models
    with LEGO and wanting to design spaces that are neat and functional. She also enjoys storybooks about teachers and scientists and says she would like to help others learn. Her competitive streak leads
    her to aspire to win school spelling bees and math contests, reinforcing her goal of a career that values precision, achievement, and clear organization.
