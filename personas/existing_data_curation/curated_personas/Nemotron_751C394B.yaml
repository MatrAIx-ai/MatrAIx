personas:
  professional: Insun Yu, a 6-year-old LEGO architect in the making, channels their love of step-by-step building instructions and meticulous organization into creating intricate brick structures, treating
    each project as a miniature engineering challenge while keeping a competitive streak against peers' creations.
  sports: Insun Yu, a 6-year-old who participates in the neighborhood Kids' Soccer Club on Saturday mornings and avidly cheers for the Detroit Tigers, prefers structured drills and score tracking over chaotic
    free-play, and maintains a competitive edge by aiming to score the most goals each match.
  arts: Insun Yu, a 6-year-old who delights in coloring scenes from Dr. Seuss books, listening to the whimsical tunes of The Wiggles, and practicing Korean calligraphy with disciplined strokes, channels
    their love of order into both visual and auditory arts while proudly showcasing a growing collection of Mo Willems picture books.
  travel: Insun Yu, a 6-year-old whose family adventure itinerary includes trips to the local zoo, a weekend stay at Disneyland, and a holiday visit to the Grand Canyon, favors carefully planned itineraries
    over spontaneous wanderings, and dreams of someday exploring the cherry blossom festivals of Japan despite a modest family travel budget.
  culinary: Insun Yu, a 6-year-old with a budding palate, favors pepperoni pizza, chicken nuggets, and mac and cheese, enjoys dipping carrot sticks in ranch dressing, and occasionally helps stir pancake
    batter while meticulously arranging food on their plate, yet can be stubborn about trying new vegetables.
  core: Insun Yu, a meticulous 6-year-old LEGO builder with a competitive edge, a sticker-trading economy, and a love for structured play, balances orderly routines with bursts of curiosity, all while navigating
    the occasional forgetfulness that comes with an active imagination.
background:
  cultural: Insun belongs to a Korean‑American family that blends Korean cultural traditions with life in Southern California. At home, English and Korean are spoken, and her parents celebrate Seollal (Lunar
    New Year) and Chuseok with traditional foods, decorations, and family rituals. She attends a weekend Korean language school where she learns Hangul, basic vocabulary, and cultural songs. The family
    places a strong emphasis on education, diligence, respect for elders, and maintaining tidy spaces, which align with Insun’s preference for structure and predictability. Living in Menifee, she also participates
    in community events at her school and local park, experiencing the multicultural environment of Riverside County.
