persona_description: A scientist and researcher who specializes in aquatic resources management, particularly in the fields of aquaculture, aquatic animal health, genomics, aquatic ecology, conservation,
  and fisheries management. They conduct research on all aspects of water resource management, including aquaculture, aquatic animal health, genomics, aquatic ecology, conservation, and fisheries management.
  They aim to provide Alabama with sound information that is used to educate Alabama policy makers, citizens, and the scientific community to better manage and conserve aquatic resources. By serving Alabama
  and providing a research foundation for the wise use of our aquatic resources, they are also providing a model for the global community.
