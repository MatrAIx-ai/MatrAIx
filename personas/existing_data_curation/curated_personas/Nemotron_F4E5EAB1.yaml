personas:
  professional: Mary Whitaker is a front‑line computer support specialist who blends meticulous troubleshooting of Windows, macOS, and Linux with a compassionate, church‑inspired service ethic, consistently
    turning ticket queues into opportunities for calm, methodical problem‑solving and crafting clear knowledge‑base articles while dreaming of leading a proactive help‑desk team.
  sports: Mary Whitaker enjoys hiking the Ozark trails with her spouse on weekends, proudly roots for the Arkansas Razorbacks basketball team, and occasionally participates in a local recreational climbing
    group that meets monthly, using a Fitbit to log steps and joining a casual softball game at the community center when time allows.
  arts: Mary Whitaker spends evenings painting watercolors of autumn foliage, creates digital illustrations on Procreate inspired by artists like Loish and James R. Eads, attends performances at the Walton
    Arts Center, curates a small home gallery where she displays her own work alongside prints from local crafts fairs, and often discusses speculative‑fiction authors such as N.K. Jemisin during board‑game
    nights.
  travel: Mary Whitaker prefers intimate weekend getaways that blend nature and culture, such as a sunrise hike in the Ozark National Forest followed by a night at a boutique B&B in Hot Springs, and she
    dreams of a spring trip to Kyoto to study traditional Japanese ink painting, all while budgeting carefully to fund her professional certifications.
  culinary: Mary Whitaker loves experimental cooking, frequently twisting Southern classics like shrimp and grits with lemongrass and miso, mastering a sourdough starter on her countertop, and delighting
    in assembling poke bowls with ahi tuna, avocado, pickled ginger, and fresh arugula, often using herbs from her garden.
  core: Mary Whitaker is a detail‑oriented IT support specialist whose quiet curiosity fuels a love for watercolor art, mindful meditation, and community‑centered tech workshops, all while navigating a
    gentle worry that pushes her to over‑plan both tickets and trips.
background:
  cultural: Mary grew up in a middle‑class, white family in the suburbs of Northwest Arkansas, where Southern hospitality and community involvement are deeply ingrained. Her upbringing emphasized kindness,
    cooperation, and a strong sense of neighborliness, often expressed through church gatherings (Methodist) and local volunteer projects. The region’s blend of traditional rural values and a rapidly expanding
    tech scene—spurred by Walmart’s corporate presence and the University of Arkansas’s research initiatives—shaped her appreciation for both conventional stability and innovative ideas. Exposure to cultural
    events such as the Benton County Arts & Crafts Festival and performances at the Walton Arts Center nurtured her love for visual arts, while frequent family outings to the Ozark National Forest fostered
    a lasting connection to nature. This unique mix of Southern cultural roots and emerging technological influences informs Mary’s worldview, balancing reverence for community traditions with an eagerness
    to explore new horizons.
attributes:
  skills: '[''Windows operating system troubleshooting'', ''macOS support and configuration'', ''Linux command-line basics'', ''Active Directory user and group management'', ''Office 365 and Microsoft Teams
    administration'', ''Remote desktop and VPN troubleshooting'', ''Ticketing systems (ServiceNow, Jira Service Management)'', ''Network fundamentals (TCP/IP, DNS, DHCP)'', ''Hardware diagnostics and peripheral
    setup'', ''PowerShell scripting for automation'', ''Basic Python scripting for troubleshooting'', ''Cybersecurity awareness and best practices'', ''Technical documentation and knowledge base creation'',
    ''Customer service and conflict resolution'', ''Time management and ticket prioritization'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Reading science-fiction and fantasy novels'', ''Knitting and crochet'', ''Board games with a close circle of friends'', ''Hiking in the
    Ozark Mountains'', ''Experimenting with cooking and baking'', ''Digital illustration using Procreate'', ''Attending local maker fairs and tech meetups'', ''Mindfulness meditation'']'
  career_goals: 'Mary aims to progress from a front‑line computer support specialist to a senior IT service analyst and eventually a help‑desk manager within the next three to five years. She plans to earn
    industry certifications such as CompTIA Network+, Security+, and the Microsoft 365 Certified: Modern Desktop Administrator to broaden her technical expertise. In the longer term, she envisions leading
    a small support team that champions proactive problem solving and continuous process improvement, leveraging her methodical nature and compassion for user experience. Additionally, Mary hopes to merge
    her love for art and technology by spearheading community workshops that teach digital tools to local artists and seniors, thereby strengthening the tech‑savvy culture in Rogers and Benton County.'
