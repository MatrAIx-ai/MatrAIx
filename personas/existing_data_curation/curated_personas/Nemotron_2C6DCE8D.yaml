personas:
  professional: Gregory Itani, a 23‑year‑old aspiring remote IT support specialist, blends a business administration background, solid troubleshooting skills on Windows and macOS, and a knack for rapid,
    solution‑focused fixes, while their spontaneous streak sometimes makes them prioritize ad‑hoc problem solving over strict ticket deadlines.
  sports: Gregory Itani regularly surfs at Waianae Beach, hikes the Waianae Ridge Trail, follows the Los Angeles Lakers in basketball and supports the San Jose Earthquakes in soccer, while they belong to
    the local surf club Waianae Wave Riders and volunteer for beach‑clean‑up runs.
  arts: Gregory Itani captures sunrise and sunset scenes through photography, strums acoustic renditions of Jack Johnson and Ben Howard on guitar, devours science‑fiction works by Liu Cixin and Ted Chiang,
    and admires the black‑and‑white landscapes of Ansel Adams.
  travel: Gregory Itani favors spontaneous weekend getaways, often hitchhiking to explore coastal towns like Haleʻiwa and historic Lahaina, while dreaming of backpacking through Okinawa, Japan, and trekking
    the Inca Trail to Machu Picchu, balancing surf‑friendly destinations with a limited travel budget.
  culinary: Gregory Itani enjoys crafting Hawaiian‑style poke bowls with ahi tuna, soy sauce, sesame oil, and seaweed, perfecting loco moco topped with a runny egg and brown gravy, and experimenting with
    fresh pineapple and macadamia nuts in desserts, though they sometimes burn the garlic when juggling multiple projects.
  core: Gregory Itani is a beach‑loving tech enthusiast who blends meticulous problem solving with impulsive surf trips, often forgetting to reply to emails until the tide rolls in.
background:
  cultural: 'Gregory is a white American who was raised in Waianae, Oahu, within a multicultural island community. His family moved from the mainland United States when he was young, and he grew up immersed
    in the local Aloha spirit, Hawaiian language greetings, and community values such as ''ohana'' (family). While his ethnic background is European, his daily life reflects a blend of mainland American
    and Hawaiian influences: he participates in local festivals, respects the natural environment, and enjoys traditional Hawaiian outdoor activities. This cultural mix shapes his cooperative outlook and
    his commitment to harmony within his community.'
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Google Workspace'', ''Computer hardware and software troubleshooting'', ''Basic HTML/CSS'', ''Data entry and record keeping'', ''Customer service'',
    ''First aid/CPR certification'', ''Surf safety knowledge'', ''Basic bookkeeping'', ''DIY electronics (Raspberry Pi)'']'
  hobbies: '[''Surfing'', ''Hiking (Waianae Ridge Trail)'', ''Acoustic guitar playing'', ''Landscape and seascape photography'', ''Raspberry Pi and DIY electronics projects'', ''Strategy video gaming'',
    ''Reading science‑fiction novels'', ''Beach clean‑up volunteering'', ''Cooking Hawaiian cuisine'']'
  career_goals: Gregory aims to leverage his technical aptitude and practical experience into a remote entry‑level IT support role while pursuing a bachelor's degree in Information Technology. He plans
    to obtain industry certifications such as CompTIA A+ and Google IT Support to strengthen his credentials. In the longer term, he hopes to specialize in cybersecurity or cloud services and eventually
    launch a freelance web‑design and tech‑consulting business that allows flexible hours for his surfing and personal projects. He values stable employment that also offers autonomy and the ability to
    contribute to community‑focused tech initiatives in Hawaii.
