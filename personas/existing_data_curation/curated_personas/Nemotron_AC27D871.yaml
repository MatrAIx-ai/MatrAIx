  hobbies: '[''visiting local art galleries and street murals'', ''photographing urban landscapes'', ''listening to jazz and blues vinyl'', ''playing acoustic guitar'', ''exploring Louisville’s food scene'',
    ''writing speculative short stories'', ''cycling around city parks'', ''volunteering for community art workshops'']'
  career_goals: Emmanuel aims to finish his bachelor's degree in Communications or Visual Arts within the next three years, building a professional portfolio that merges storytelling, graphic design, and
    photography. He aspires to work as a multimedia content creator for a cultural nonprofit or local museum, where he can showcase Louisville’s African-American heritage. Long‑term, he hopes to launch
    his own digital platform that highlights underrepresented artists and provides mentorship for youth in the community.
