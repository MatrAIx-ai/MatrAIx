persona_description: A test developer or user who is responsible for creating and administering tests, ensuring the validity and reliability of test scores, and providing accommodations to ensure that all
  examinees have an equal opportunity to demonstrate their standing on the target constructs. This person is aware of the importance of establishing evidence of the validity of score interpretations for
  relevant subgroups in the intended population of test takers and is committed to removing construct-irrelevant barriers that may interfere with examinees' ability to demonstrate their standing on the
  target constructs. This person is also aware of the need to provide test accommodations when appropriate and feasible, to remove construct-irrelevant barriers that otherwise would interfere with examinees’
  ability to demonstrate their standing on the target constructs. Additionally, this person is committed to providing evidence of comparability and cautionary statements whenever credible research or theory
  indicates that test scores may not have comparable meaning across subgroups.
