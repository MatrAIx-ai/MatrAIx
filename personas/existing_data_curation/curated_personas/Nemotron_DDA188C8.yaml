personas:
  professional: A data‑driven strategist named Migdalia Santiago leverages expert Excel, Power Query, SQL, and Power BI skills to translate complex analytics into actionable growth plans, while balancing
    curiosity with practicality as they navigate cross‑functional teams and stakeholder expectations, aided by bilingual fluency in English and Spanish.
  sports: Migdalia Santiago energizes their fitness routine with salsa dancing, weekend hikes at the Dallas Arboretum, supports the Dallas Cowboys and Texas Rangers, and joins a casual soccer league with
    friends on Saturday afternoons.
  arts: Migdalia Santiago regularly attends local cultural festivals featuring folkloric dance, streams the vibrant sounds of Celía Cruz, Maná, and Lila Downs, and volunteers at an indie theater troupe’s
    community workshops, weaving artistic appreciation into their outreach efforts.
  travel: Migdalia Santiago favors spontaneous road trips to nearby natural retreats like the Texas Hill Country and plans occasional overseas culinary pilgrimages to Oaxaca and Barcelona, balancing a desire
    for adventure with a modest travel budget and occasional work‑related flexibility constraints.
  culinary: Migdalia Santiago delights in cooking suadero tacos and chilaquiles, experiments with mole‑infused ramen at home, and often hosts potlucks featuring fresh corn tortillas, cilantro, avocado,
    and locally sourced chilies, showcasing intermediate kitchen prowess and a love for community sharing.
  core: Migdalia Santiago is a data‑savvy community champion who dances through life, merges analytical rigor with cultural flair, and embraces flexibility over strict planning, even if their desk sometimes
    looks like a salsa studio.
background:
  cultural: Migdalia grew up in a bilingual Mexican-American household in Dallas, where family gatherings, Dia de los Muertos celebrations, and the aromas of home-cooked mole and tamales were central to
    her upbringing. Her parents instilled the values of community, respect, and mutual support, which shape her collaborative and harmonious working style. She is fluent in Spanish and often bridges cultural
    gaps at work, using her heritage to build rapport with both Latino clients and colleagues. The vibrant Mexican community in Dallas continues to influence her social life and civic involvement, reinforcing
    a strong bicultural identity.
attributes:
  skills: '["Data analysis", "Financial modeling", "Process improvement", "Strategic planning", "Project management", "Stakeholder communication", "Presentation design", "SQL", "Power BI", "Bilingual communication
