  hobbies: '["Salsa dancing", "Hiking", "Cooking Mexican cuisine", "Yoga", "Volunteering at bilingual after-school program", "Attending cultural festivals", "Listening to business podcasts"]'
  career_goals: Migdalia aims to transition into a senior strategy role within the next 3-5 years, leading cross-functional teams to drive growth initiatives. She plans to pursue an MBA focused on analytics
    and sustainable business, and to obtain a PMP certification to formalize her project management expertise. Long-term, she hopes to become a director of business development, where she can shape corporate
    strategy while championing diversity, inclusion, and community outreach, particularly supporting Mexican-American small businesses. She values flexibility and seeks a role that balances innovative problem-solving
    with pragmatic execution.
