  hobbies: '[''Art gallery visits'', ''Street‑art tours'', ''Museum exhibitions'', ''Paddleboarding'', ''Beach running'', ''Group fitness classes'', ''Community theater improv'', ''Escape‑room challenges'',
    ''Science‑art pigment workshops'', ''Rooftop gardening'', ''Herbal tea experimentation'', ''Volunteering at children’s science museum'', ''Music festivals'']'
  career_goals: In the short term, Emma plans to earn a master’s degree in sustainable chemical engineering and obtain certification as a Certified Safety Professional to deepen her technical expertise.
    She aims to lead a cross‑functional team developing eco‑friendly pigment and dye formulations that merge her engineering skills with her passion for art. Within five years, she envisions becoming a
    senior process engineer or R&D lead, recognized for delivering high‑impact, green‑chemistry projects and for championing diversity initiatives within her company. Long‑term, Emma aspires to a VP of
    R&D role or to launch her own startup focused on sustainable, artist‑grade chemical products, while also establishing mentorship programs for Black women in STEM and creating community workshops that
    fuse scientific and artistic expression.
