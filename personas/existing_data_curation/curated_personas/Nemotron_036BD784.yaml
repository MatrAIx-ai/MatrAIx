personas:
  professional: Emma Jackson is a chemical engineer who channels rigorous process design expertise into sustainable pigment R&D, leveraging their meticulous project management, persuasive technical writing,
    and competitive drive to lead cross‑functional teams while translating complex chemistry into vibrant visual narratives for art‑focused markets.
  sports: Emma Jackson fuels their energetic lifestyle with sunrise beach runs, weekly paddleboarding sessions at Miami Beach, regular Zumba classes, and avidly cheers on the Miami Heat, while also participating
    in a local triathlon club that blends competition with camaraderie.
  arts: Emma Jackson immerses themselves in Miami’s vibrant arts scene by attending opening nights at the Pérez Art Museum Miami, exploring Wynwood mural tours featuring pieces by Shepard Fairey and local
    street artists, performing improv at a community theater, and vibing to hip‑hop legends like Kendrick Lamar, reggae icons such as Bob Marley, and soul stylists like Erykah Badu.
  travel: Emma Jackson’s travel style blends weekend getaways to the Florida Keys and New Orleans for music festivals with bucket‑list trips to Barcelona’s street‑art districts and Jamaica’s reggae roots,
    preferring curated itineraries that balance cultural immersion with opportunities to network at sustainable‑design conferences.
  culinary: Emma Jackson delights in crafting mango‑turmeric smoothies, herb‑infused hibiscus tea using rooftop garden basil and mint, and cooking fish tacos with avocado crema, all while experimenting
    with plant‑based quinoa salads seasoned with smoked paprika and lime zest.
  core: Emma Jackson merges a scientifically disciplined mind with an artistic soul, navigating life with organized ambition, competitive edge, and a love for collaborative, sensory‑rich experiences, even
    if occasional skepticism and busy‑life slip‑ups keep them grounded.
background:
  cultural: Emma is an African‑American woman with deep roots in South Florida’s vibrant Black community. Her parents immigrated from the Caribbean—her mother from Jamaica and her father from Haiti—infusing
    her upbringing with a blend of Afro‑Caribbean traditions, food, music, and storytelling. She grew up celebrating Juneteenth, Caribbean Carnival, and local Black Arts festivals, which nurtured her appreciation
    for both cultural heritage and artistic expression. In college, she joined a historically Black sorority, fostering leadership skills and a network of Black professionals. Emma actively participates
    in the Society of Black Engineers, mentors young Black students interested in STEM, and supports initiatives that highlight Black artists in the chemical and visual arts realms. Her cultural identity
    shapes her worldview, fueling her drive to bridge scientific innovation with artistic and community empowerment.
