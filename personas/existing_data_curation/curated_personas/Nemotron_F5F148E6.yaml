  hobbies: '[''Model railroading'', ''Woodworking'', ''Home brewing'', ''Hiking in state parks'', ''Reading science history'', ''Photography (nature and urban)'', ''Volunteering at STEM clubs'', ''Playing
    board games'']'
  career_goals: Although Shawn is currently not in the formal workforce, he aims to channel his expertise into part‑time consulting for local small‑manufacturing firms and to serve as a mentor for high‑school
    STEM clubs in Minneapolis. He also hopes to lead a community initiative that integrates sustainable energy solutions into neighborhood projects, allowing him to stay intellectually engaged while contributing
    meaningfully to his community.
