personas:
  professional: Shawn Homan, a seasoned mechanical engineer turned community consultant, channels his CAD expertise and hands‑on troubleshooting into part‑time projects for local manufacturers while mentoring
    high‑school STEM clubs, balancing meticulous project planning with the flexibility to improvise solutions on the fly.
  sports: Shawn Homan enjoys weekend hikes through the Minnesota state parks, joins the local cross‑country ski club in winter, follows the Minnesota Vikings, Twins, and Wild, regularly attending fan meet‑ups
    at Target Field and occasionally participating in a community 5‑k run organized by the Minneapolis Running Club.
  arts: Shawn Homan expresses his artistic side through seasonal landscape photography captured with a vintage Leica, board‑game evenings that echo his love of strategy, and carefully curated playlists
    featuring folk legends like Bob Dylan, contemporary indie acts such as Fleet Foxes, and classic jazz from Miles Davis, which together shape his leisure hours.
  travel: Shawn Homan prefers low‑key road trips that combine scenic drives and hands‑on experiences, having explored the North Shore of Lake Superior, the historic river towns of Wisconsin, and a recent
    pilgrimage to Bavaria's craft‑beer villages, while dreaming of a future adventure tracing his ancestral roots through Norway's fjords.
  culinary: Shawn Homan relishes hearty Midwestern comfort food—like cheese‑curd burgers, rye‑bread smørrebrød, and roasted root vegetables—paired with his own home‑brewed Belgian‑style ales, and while
    his cooking skill is solid for rustic dishes, he often improvises recipes, occasionally over‑spicing his stew in the pursuit of bold flavor.
  core: Shawn Homan blends pragmatic engineering discipline with a curiosity‑driven hobbyist spirit, balancing community mentorship, meticulous budgeting, occasional health‑related neglect, and a love for
    outdoors, craft beer, and nostalgic photography, all while wrestling with a tendency to over‑commit to projects that stretch his otherwise orderly routine.
background:
  cultural: Shawn grew up in a mid‑western, white family with roots in German and Scandinavian heritage, typical of many Minnesota households. The regional culture—often described as 'Minnesota Nice'—instilled
    values of modesty, community responsibility, and a strong work ethic, which he carries into his volunteer and mentoring roles. Living in Minneapolis, he is exposed to a vibrant, multicultural environment
    that influences his appreciation for diverse perspectives while maintaining his own traditional values such as punctuality, practicality, and a love for the outdoors.
attributes:
  skills: '[''Mechanical design (CAD)'', ''Project management'', ''Python programming (basics)'', ''Technical mentoring'', ''Electrical troubleshooting'', ''Woodworking and carpentry'', ''Budgeting and
