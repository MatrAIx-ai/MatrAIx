personas:
  professional: Maria Cabrera is a budding peer organizer, skillfully leading group soccer matches and craft sessions at the park, blending her natural sociability, calm resilience, and love for routine
    into early leadership practice, and they often coordinate game rules to keep everyone happy.
  sports: Maria Cabrera adores playing soccer with the Riverdale Rovers youth club in the spring and cheers for the Metro United professional team during televised matches, while they also join a weekend
    swimming class at the community center to stay active year‑round.
  arts: Maria Cabrera delights in mimicking the upbeat rhythms of La Banda Alegre and singing along with Ana Luna’s children’s songs, while they express creativity through drawing colorful animals and crafting
    papel picado inspired by festive folk traditions.
  travel: Maria Cabrera has explored Sunnyvale Park’s playground, taken a family trip to the city zoo, and now they daydream about visiting the coral reefs of Belize and the snow‑capped Rockies for a grand
    adventure.
  culinary: Maria Cabrera loves helping in the kitchen to mash ripe avocados, lime juice, cilantro, and tomato into smooth guacamole, roll fresh tortillas, and sprinkle shredded cheese on mini quesadillas,
    while proudly tasting mango slices and berry smoothies they make themselves.
  core: Maria Cabrera is a calm, routine‑loving, socially vibrant six‑year‑old who balances group play, crafts, and compassionate teamwork with a disciplined saving habit and a keen eye for colorful creativity,
    and they approach each day with quiet confidence.
background:
  cultural: Maria grows up in a close‑knit Mexican‑American household in Tucson, Arizona. Her family celebrates traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day, blending
    Spanish language and cultural customs into everyday life. She is bilingual, speaks Spanish at home, and English at school, and she enjoys the flavors of Mexican cuisine that are common in her community.
    The vibrant Mexican‑American community of Pima County influences her values of family, hospitality, and a strong sense of belonging.
