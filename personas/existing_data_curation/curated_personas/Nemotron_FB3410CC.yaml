  hobbies: '["playing soccer", "Mexican folk dancing", "listening to mariachi music", "drawing and coloring", "making papel picado crafts", "helping mom in the kitchen", "reading picture books"]'
  career_goals: Maria dreams of becoming a teacher or a community health aide when she grows up, so she can help children learn, keep families healthy, and maintain harmony in her neighborhood. She imagines
    a future where she can combine her love for caring about others with the practical stability of a helping profession.
