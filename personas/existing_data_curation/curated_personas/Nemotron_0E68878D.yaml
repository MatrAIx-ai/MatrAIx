  career_goals: Shawn aims to secure a scholarship to a top university (such as Stanford or UC Berkeley) to study Computer Science with a concentration in Human‑Computer Interaction or Digital Arts. He
    aspires to become a creative technologist or UI/UX designer at a leading tech company, eventually launching his own indie game studio that produces artistically driven, narrative‑rich experiences. He
    is driven to win industry awards for innovative design, publish his work in digital art exhibitions, and continuously push the boundaries of conventional thinking in tech and art.
