personas:
  professional: Shawn Wise is a self‑taught teenage technologist who blends Python and JavaScript coding with Photoshop and Blender to produce interactive concept art and prototype games, leveraging an
    obsessive organizational style and a competitive chess mindset to meet tight creative deadlines while aiming for a CS‑HCI scholarship at a top university.
  sports: Shawn Wise prefers low‑impact solo activities, joining a local youth cycling club that rides the foothills around San Jose on weekends, follows the San Jose Sharks for NHL excitement and the Earthquakes
    for MLS thrills, and occasionally plays 1‑on‑1 chess‑themed strategy games at the community center as a mental workout.
  arts: Shawn Wise draws artistic inspiration from the surreal cityscapes of Syd Meyers, the digital hyperrealism of Bee P—Mike Winkelmann, and the ambient glitch sounds of Autechre, routinely curating
    a personal gallery on Behance, snapping black‑and‑white street photos of downtown San Jose, and listening to experimental electronic tracks while refining their concept sketches.
  travel: Shawn Wise plans trips with the same spreadsheet precision they use for code, favoring weekend hikes in the redwood forests of California, day‑long tours of the Computer History Museum, and dreaming
    of a future solo pilgrimage to Kyoto’s temple gardens to study traditional architecture, all while balancing a modest allowance from summer jobs.
  culinary: Shawn Wise enjoys building quick, flavor‑dense meals like spicy ramen with a homemade sriracha‑infused broth, sushi rolls from the local farmer’s market, and matcha‑latte coffee experiments,
    cooking at a beginner level but often improvising with ingredients like miso, sesame oil, and fresh herbs to fuel late‑night creative sessions.
  core: Shawn Wise is a disciplined, anxiety‑prone teen who fuses code and canvas, treats money like a chessboard, and channels a relentless curiosity into art, tech, and meticulous self‑management while
    occasionally sacrificing sleep for inspiration.
background:
  cultural: Shawn is a white American raised in suburban San Jose, within the culturally rich and technologically vibrant environment of Silicon Valley. His family, of European descent, emphasizes discipline,
    academic achievement, and self‑reliance, reflecting a middle‑class suburban ethos. The Bay Area’s diverse art scene, museums, and tech community have exposed him to unconventional ideas and progressive
    values, while his schooling and community activities have reinforced a strong work ethic and competitive spirit. This blend of a traditionally rooted upbringing with the innovative, multicultural pulse
    of the West Coast shapes his worldview and personal aspirations.
