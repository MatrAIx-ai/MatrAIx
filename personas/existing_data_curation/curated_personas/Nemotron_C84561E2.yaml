    to cultural and philosophical podcasts"]'
  career_goals: Nilda aims to transition from front‑line retail to a role that leverages her artistic sensibility and independent work style. In the next five years she plans to become a freelance visual
    merchandiser and boutique consultant, helping small stores craft curated, low‑noise shopping environments. She also intends to launch an online boutique that sells hand‑picked art pieces, vintage décor,
    and locally sourced crafts, allowing her to curate from the solitude of her home studio. To support this shift, she hopes to complete a certificate in visual merchandising and take evening courses in
    art history or design at a community college. While she is open to managerial responsibilities, she prefers positions that minimize routine scheduling and maximize creative autonomy.
