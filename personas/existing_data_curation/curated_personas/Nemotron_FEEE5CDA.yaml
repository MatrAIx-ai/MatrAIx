personas:
  professional: Jeffrey Wilson, a retired retail manager turned community organizer, leverages his business administration background and hands‑on carpentry skills to coordinate senior‑center programs,
    mediate neighborhood disputes, and mentor volunteers, all while balancing a love for structure with an easygoing approach that sometimes leads to missed deadlines.
  sports: Jeffrey Wilson plays regular rounds at the Palmetto Golf Club, competes in the Palm Beach Gardens senior tennis league, cheers for the Miami Heat and Tampa Bay Buccaneers, and enjoys occasional
    beach volleyball pick‑ups with his Labrador on the sand.
  arts: Jeffrey Wilson hosts classic film nights featuring Hitchcock and Cary Grant, frequents the Norton Museum of Art for its Impressionist exhibits, plays bridge at the local senior club, and keeps a
    vinyl collection of Frank Sinatra and Nat King Cole on rotation.
  travel: Jeffrey Wilson prefers relaxed, group‑oriented trips, alternating weekend drives to Savannah and the Keys with annual cruises to the Bahamas, while dreaming of a Mediterranean tour of Italy’s
    coastal towns that inspired his cooking.
  culinary: Jeffrey Wilson cooks Mediterranean‑style meals such as grilled branzino with lemon‑herb tabbouleh, homemade hummus, and occasional tiramisu, drawing fresh basil and rosemary from his garden
    and sourcing olives and feta at the local farmer’s market, showcasing an intermediate skill level that blends health-consciousness with indulgence.
  core: Jeffrey Wilson blends Midwestern pragmatism with Floridian hospitality, juggling community leadership, health worries, and a love for golf, Mediterranean food, and classic cinema while occasionally
    letting flexibility trump strict organization.
background:
  cultural: Jeffrey grew up in the American Midwest during the post‑war boom and relocated to Florida in his early 50s. As a white, traditionally Christian male, he embodies the relaxed, recreation‑focused
    lifestyle of Palm Beach Gardens while retaining the values of self‑reliance and community service from his upbringing. His cultural identity blends Midwestern modesty with the vibrant, sun‑driven social
    culture of South Florida, shaping his preference for group gatherings, hospitality, and a pragmatic approach to everyday life.
