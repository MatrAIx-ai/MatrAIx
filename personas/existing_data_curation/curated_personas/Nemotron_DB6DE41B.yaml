personas:
  professional: Jennifer Martin is a budding young engineer‑in‑making who builds intricate LEGO machines, channeling their curiosity about how things work into practical problem‑solving, yet their relaxed,
    often disorganized approach to tasks leads them to abandon projects mid‑construction only to resume them when a new idea sparks their interest.
  sports: Jennifer Martin dabbles in after‑school soccer with the Maple Creek Tigers, eagerly practices free‑throw drills inspired by the Los Angeles Lakers, and their competitive streak makes them sprint
    the playground during recess while they rarely maintain a consistent training schedule.
  arts: Jennifer Martin spends afternoons sketching whimsical machines and forest animals, drawing inspiration from the playful illustrations of Dr. Seuss and the vibrant animation of Studio Ghibli's My
    Neighbor Totoro, while humming along to the catchy tunes of Kidz Bop's pop covers and proudly displaying a hand‑drawn poster of The LEGO Movie characters on their bedroom wall.
  travel: Jennifer Martin prefers spontaneous weekend outings with a parent, eagerly exploring nearby Yellowstone National Park’s geysers and collecting pine cones, yet dreams of touring Paris to see the
    Eiffel Tower and attending a LEGO‑themed exhibit in Copenhagen, planning each trip around the promise of new adventures rather than strict itineraries.
  culinary: Jennifer Martin loves cheesy pepperoni pizza, crunchy chicken nuggets, and homemade strawberry‑banana smoothies, often attempts to bake LEGO‑brick shaped sugar cookies with cinnamon and chocolate
    chips, but their disorganized kitchen habits mean the flour ends up scattered across the floor.
  core: Jennifer Martin is a curious, competitively spirited 7‑year‑old who builds LEGO kingdoms, sketches machines with a steady hand, yet habitually misplaces pieces and prefers quiet corners over bustling
    parties.
background:
  cultural: Jennifer was raised in Matthews, a suburban community in Union County, North Carolina. Her family celebrates typical Southern traditions such as holiday gatherings with homemade meals, church
    community events, and seasonal festivals like the local pumpkin patches. Growing up in a middle-class household, she experiences a blend of contemporary American culture and regional customs, including
    schoolyard games and community sports leagues.
