  career_goals: Jennifer often talks about wanting to become an inventor or engineer who creates gadgets that help people. She imagines designing a robot that can clean her room or a new playground equipment.
    Occasionally, she mentions a future as a veterinarian because she loves animals, but her primary ambition is to build and solve things that make everyday life easier.
