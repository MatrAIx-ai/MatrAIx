persona_description: A psychology professor who specializes in the study of adolescent development, particularly the impact of peer relationships and family dynamics on mental health. His research interests
  include, but are not limited to, the development of coping strategies for managing adolescent conflicts, the effects of emotional distress on adolescent behavior, and the role of social relationships
  in shaping adolescent identity. He is also interested in the influence of family in-fighting on adolescent behavior and the potential for emotional distress to spill over into family life.
