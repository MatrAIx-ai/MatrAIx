personas:
  professional: Alberto Moreira is a budding junior engineer who spends weekends building intricate LEGO sets and tinkering with beginner robotics kits, channeling their curiosity and practical mindset
    into structured projects while staying flexible enough to experiment with new designs.
  sports: Alberto Moreira kicks off the weekend with the Little Knights Soccer Club, where their competitive streak shines during 7‑a‑side matches, while they proudly wear a Club América jersey while watching
    games on TV and keep a personal tally of goals scored, balancing organized practice with spontaneous backyard drills.
  arts: 'Alberto Moreira sketches comic‑style heroes inspired by Stan Lee and Osamu Tezuka, curates a digital gallery of Minecraft builds to showcase architectural flair, and devours graphic novels like
    *Spider‑Man: Homecoming* during quiet evenings, weaving their curiosity and competitive eye for detail into every artistic endeavor.'
  travel: Alberto Moreira plans family trips with a map‑making approach, meticulously marking spots like the Grand Canyon’s South Rim and Disney World’s Magic Kingdom for future adventures while dreaming
    of a solo backpacking excursion to Kyoto’s bamboo forest once they save enough from their allowance.
  culinary: Alberto Moreira assists in the kitchen by hand‑mashing ripe avocados for guacamole, seasoning chicken al pastor tacos with fresh cilantro and lime, and even tries to recreate the perfect crunch
    of LEGO bricks using homemade tortilla chips, showcasing a hands‑on, detail‑oriented cooking style.
  core: Alberto Moreira is a fiercely curious, competitively driven nine‑year‑old who blends meticulous LEGO engineering with a love of soccer, comics, and family cooking, all while juggling a budget and
    a notebook of health notes.
background:
  cultural: Alberto is a first‑generation Mexican‑American growing up in El Cajon, California. He speaks both Spanish and English fluently at home and school, and his family maintains Mexican traditions
    such as celebrating Día de los Muertos, preparing tamales, and attending community festivals in the San Diego County Hispanic community. The blend of Mexican cultural values—family closeness, respect
    for elders, and a love for shared meals—alongside the diverse, tech‑oriented environment of Southern California shapes his worldview, giving him a bicultural perspective that influences his interests,
    language use, and social interactions.
