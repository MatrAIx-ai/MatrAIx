  hobbies: '[''LEGO building'', ''Basic robotics kits'', ''Minecraft'', ''Reading adventure and sci‑fi books'', ''Soccer with small group'', ''Drawing comics'', ''Cooking Mexican dishes with family'', ''Collecting
    insects'', ''Puzzle solving'']'
  career_goals: Alberto dreams of becoming an engineer who designs robots that help his community, or a video‑game developer who creates worlds that challenge players to think critically. He is also intrigued
    by the idea of a professional soccer player, seeing it as a way to combine his competitive spirit with teamwork. In the near term, he aims to win his school science fair, master more advanced LEGO robotics,
    and improve his soccer skills, hoping these steps will set the foundation for a future in technology or sports.
