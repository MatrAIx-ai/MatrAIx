  career_goals: He aims to complete his high‑school equivalency (GED) within the next two years, earn a CompTIA A+ certification, and secure a part‑time position at a local tech‑repair shop. In the longer
    term, he hopes to become a certified IT support specialist or network technician, eventually launching his own freelance tech‑repair and consulting business to serve his community. He also envisions
    further study in computer science at a community college, balancing practical work experience with continued learning.
