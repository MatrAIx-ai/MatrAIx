persona_description: A film historian who specializes in the study of the history of Hollywood film production, particularly the era of Prohibition and the rise of gangster films. His research interests
  include, but are not limited to, the influence of Prohibition on Hollywood film production, the emergence of gangster films as a genre, the portrayal of gangsters in film, and the legacy of Al Capone
  in the film industry. He is particularly interested in the works of filmmakers such as Elia Kazan, John Ford, and D.W. Griffith, and the ways in which they have contributed to the history of gangster
  films. He is also interested in the ways in which Hollywood has used film to shape public opinion on issues such as organized crime and law enforcement. He is a member of the Society for Cinema and Media
  Studies and the American Historical Association.
