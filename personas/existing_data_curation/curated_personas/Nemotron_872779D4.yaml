  hobbies: '[''Reading classic literature'', ''Philosophical contemplation'', ''Calligraphy'', ''Watercolor painting'', ''Chess problems'', ''Crossword puzzles'', ''Sudoku'', ''Bonsai gardening'', ''Native
    plant gardening'', ''Listening to classical and traditional Southeast Asian music'']'
  career_goals: Although retired, Dao Hi Tieu aspires to complete a comprehensive memoir documenting his family's journey from Southeast Asia to Michigan, integrating personal reflections with historical
    context. He aims to curate a permanent exhibition of Southeast Asian folk art at the local museum, contributing his knowledge and curated collection. Additionally, he seeks to mentor young artists and
    scholars through written correspondence, sharing his insights on abstraction and technique. Maintaining his health to continue these intellectual and creative pursuits remains a central personal ambition.
