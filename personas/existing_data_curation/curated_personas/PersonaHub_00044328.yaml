persona_description: A fluid dynamics professor at Johns Hopkins University who has conducted research on the aerodynamics of wind farms and has published studies on the optimal spacing of turbines. His
  findings suggest that new, larger wind turbines are underperforming and that the optimum spacing for wind farms is 15 rotor diameters apart, which would result in a quarter of the number of turbines installed
  under current planning assumptions. His research has implications for the projected output figures for large new windfarms, and his findings could lead to revisions of those figures.
