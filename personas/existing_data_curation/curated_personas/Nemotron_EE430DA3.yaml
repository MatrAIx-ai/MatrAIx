  hobbies: '[''Gardening'', ''Knitting'', ''Quilting'', ''Reading historical fiction'', ''Local history research'', ''Birdwatching'', ''Walking nature trails'', ''Bible study'', ''Genealogy'', ''Crossword
    puzzles'', ''Southern cooking'']'
  career_goals: Although retired from formal employment, Sandra aims to continue contributing to her community by mentoring novice teachers, volunteering as a literacy coach at the local elementary school,
    and leading a historical oral‑history project documenting the lives of longtime Bath County residents. She also hopes to author a small memoir of her teaching experiences and to assist the county historical
    society in preserving local archives.
