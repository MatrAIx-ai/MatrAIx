  hobbies: '[''Community gardening'', ''Book club'', ''Volunteer crafts at senior center'', ''Knitting'', ''Cooking and recipe sharing'', ''Walking in parks and waterfront'', ''Senior yoga'', ''Family genealogy
    research'', ''Community choir'', ''Theater production support'']'
  career_goals: Although retired from formal employment, Tedra aims to continue contributing her expertise to the Seattle community. She plans to lead a senior‑advocacy board at a local nonprofit, mentor
    new volunteers, and develop a workshop on budgeting for older adults. She also hopes to expand her volunteer work into health‑promotion programs, collaborate with local libraries on financial‑literacy
    classes, and possibly author a short guide on navigating community resources for seniors. Maintaining her health, reducing stress, and leaving a lasting, compassionate legacy are central to her ambitions.
