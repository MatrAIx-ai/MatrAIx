personas:
  professional: Tedra Cypel, a retired business professional turned senior‑advocacy board leader, leverages decades of budgeting, operations, and volunteer coordination expertise to structure community
    programs with meticulous spreadsheets while flexibly adapting to volunteers’ needs, reflecting their practical yet compassionate nature.
  sports: Tedra Cypel, an active member of the Seattle Waterfront Walking Club, enjoys leisurely walks along the Elliott Bay promenade, attends weekly gentle yoga sessions for seniors, follows the Seattle
    Mariners and Seattle Sounders FC with enthusiastic game‑day gatherings, and occasionally volunteers as a usher at Seattle Kraken home games.
  arts: Tedra Cypel, a devoted community‑theater enthusiast, sings in the local senior choir, assists with stage lighting and set design, frequents the Seattle Art Museum to view works by local painter
    Mary Rind and seasonal Yayoi Kusama installations, and finds inspiration in the folk melodies of Joni Mitchell and the classical repertoire of the Seattle Symphony.
  travel: Tedra Cypel, a meticulous planner, prefers short, culturally enriching trips such as weekend getaways to the San Juan Islands, a heritage tour of Dublin to explore family roots, and scenic drives
    along the Oregon Coast, always booking senior discounts and packing a detailed itinerary while leaving room for spontaneous garden‑center stops.
  culinary: Tedra Cypel, an enthusiastic home cook, harvests fresh herbs and vegetables from her garden to flavor pan‑seared salmon with dill and lemon, whips up comforting vegetable stir‑fry with ginger
    and soy sauce, bakes apple crumble with a sprinkle of cinnamon, and enjoys occasional dinner outings at The Pink Door for its signature clam chowder and fresh oysters.
  core: Tedra Cypel, a structured yet sociable senior, blends meticulous budgeting with community‑driven compassion, worries about health details, but never skips a choir rehearsal or a garden‑plot watering
    session.
background:
  cultural: Tedra is a White American of Northern‑European descent who grew up in the Pacific Northwest. Her cultural upbringing blends the region’s appreciation for natural scenery and outdoor life with
    a strong emphasis on community involvement, self‑reliance, and pragmatic problem solving. Raised in a middle‑class, college‑educated family, she inherited values of diligent work, civic responsibility,
    and a warm, inclusive approach to neighbors and friends.
