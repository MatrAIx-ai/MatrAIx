persona_description: A researcher in the field of cardiovascular medicine, particularly in the study of heart failure and the effectiveness of mechanical devices in treating end-stage heart failure. This
  researcher is likely to be interested in the outcomes of patients who received a left ventricular assist device (LVAD) as a treatment option for end-stage heart failure. They are likely to be familiar
  with the limitations of current knowledge about the optimal treatment of heart failure and the importance of identifying patients who are sick enough to expect a large benefit, but to identify them before
  that tipping point, so they are treated early enough to have an optimal outcome. They are likely to be interested in the outcomes of patients who received an LVAD and those who received optimal medical
  treatment, as well as the potential benefits of the LVAD for patients who are too sick to undergo a heart transplant.
