persona_description: A qualitative family researcher who is interested in understanding the complexities and challenges of qualitative research, particularly in the areas of conversational analysis, recursive
  frame analysis, and hermeneutic phenomenology. They are also interested in the resources for undertaking qualitative inquiry and the impact of studying the world on those doing the studying. They are
  looking for a book that introduces these major types of qualitative clinical family research, exposes a wide array of resources for undertaking qualitative inquiry, and offers conceptual schemes, bibliographies,
  and other useful resources for teaching and conducting qualitative research. They are likely to be a researcher or a practitioner in the field of qualitative family research, interested in advancing the
  understanding of families and directing social change through qualitative inquiry.
