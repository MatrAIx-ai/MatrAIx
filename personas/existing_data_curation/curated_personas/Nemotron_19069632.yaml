personas:
  professional: Jonathan Thomas, a budding junior builder who turns LEGO sets into miniature cityscapes while drawing vibrant sugar‑skull cartoons, channels his curiosity and organized yet flexible nature
    into creative problem‑solving during playtime.
  sports: Jonathan Thomas darts across the local park as a forward for the Little Rockets youth soccer team, pedals his training‑wheel bike with the Neighborhood Bike Riders Club, and eagerly joins family
    hikes, embodying their energetic, sociable drive while balancing competitiveness and teamwork.
  arts: 'Jonathan Thomas immerses themselves in creative expression by dissecting animated space series like "Star Wars: The Clone Wars," sketching cartoons inspired by Pixar’s "Toy Story," and humming
    songs by children''s musicians such as Raffi and Luis Miguel, all of which feed their outgoing personality and love for bright, culturally inspired motifs.'
  travel: Jonathan Thomas loves weekend road trips to nearby state parks, dreams of exploring the Grand Canyon’s vast canyons, and prefers spontaneous nature walks over meticulously planned tours, yet family
    budget limits keep their adventures focused on local discoveries.
  culinary: Jonathan Thomas favors hands‑on cooking, proudly mixing salsa for soft corn tacos, decorating sugar‑skull cookies with bright icing, and assembling peanut‑butter‑jelly sandwiches, showcasing
    a playful palate that mirrors their artistic flair and love for traditional flavors.
  core: Jonathan Thomas blends boundless curiosity with a penchant for organized play, saving coins for LEGO dreams while occasionally indulging in extra candy, navigating mild hay fever with parental help,
    and delighting in soccer, drawing, and sugar‑skull treats—a lively six‑year‑old with a practical twist.
background:
  cultural: Jonathan comes from a Mexican-American family that lives in Hammond, Indiana. At home, Spanish is spoken alongside English, and he is exposed to Mexican customs such as Día de los Muertos altars,
    mariachi music, and traditional foods like tamales and quesadillas. His family places a strong emphasis on close-knit relationships, respect for elders, and education, encouraging him to be proud of
    his heritage while also integrating into the broader Midwestern community. He attends a local public school where he celebrates both American holidays and his cultural festivals, giving him a blended
    identity that values both his Mexican roots and his American environment.
