  career_goals: Jonathan dreams of exploring the world beyond Earth and often talks about becoming an astronaut, because he loves looking at stars and building things with LEGO. He also expresses a desire
    to be a firefighter or police officer, seeing them as ways to help his community and stay brave. Inspired by his family's emphasis on education, he occasionally says he might become a teacher or scientist,
    where he could share knowledge in both English and Spanish.
