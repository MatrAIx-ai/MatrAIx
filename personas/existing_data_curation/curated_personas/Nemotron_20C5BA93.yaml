    problem solving'', ''Information security basics'', ''Project coordination'']'
  hobbies: '[''Reading (science non-fiction, historical biographies)'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening (vegetable & native plants)'', ''Hiking (Barton Creek and local trails)'', ''Bird
    watching'', ''Playing acoustic guitar'', ''Home automation projects (Arduino/Raspberry Pi)'', ''Volunteer health literacy workshops'', ''Attending small live music sessions'', ''Cycling'']'
  career_goals: Morris aspires to move into a senior health information management leadership role, such as HIM manager or director, where he can oversee department-wide EHR optimization and compliance
    programs. He plans to obtain the Registered Health Information Administrator (RHIA) certification and lead interdisciplinary projects that enhance data interoperability across Austin health systems.
    Long‑term, he hopes to mentor junior staff, contribute to community health‑record literacy initiatives, and shape policies that improve patient care through accurate and secure information handling.
