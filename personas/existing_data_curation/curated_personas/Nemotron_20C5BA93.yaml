personas:
  professional: Morris Myres, a meticulous medical records specialist with deep expertise in EHR systems, ICD-10 and CPT coding, and HIPAA-compliant workflows, leverages their calm, structured demeanor
    and Lean-based process-improvement skills to maintain data accuracy while quietly positioning themselves for a senior HIM leadership role.
  sports: Morris Myres, an avid cyclist with the Austin Cycle Club who savors early-morning rides around Lady Bird Lake, follows Austin FC in MLS and the Texas Longhorns football season with disciplined
    game-day rituals, and complements their cardio routine with weekend hikes on Barton Creek Greenbelt and bird-watching walks, all while maintaining a low-impact, injury-preventive training philosophy.
  arts: Morris Myres, a quiet acoustic-guitar enthusiast who regularly jams to John Prine and Neko Case in their home office, frequents intimate shows at Austin’s Cactus Café featuring artists like Larkin Poe
    and Robert Earl Keen, and curates a modest vinyl collection of folk and roots music that informs their weekend listening rituals.
  travel: Morris Myres, a methodical planner who arranges detailed weekend itineraries for low-key road trips to Hill-Country towns like Fredericksburg, annual spring visits to Asheville’s Blue Ridge Parkway,
    and occasional longer getaways such as a two-week cultural immersion in Tuscany, balances their love for nature with a preference for modest, solo or small-group travel experiences.
  culinary: Morris Myres, a competent home cook who delights in preparing heirloom tomato gazpacho, smoky black-bean tacos topped with fresh cilantro, lime, and pickled red onions, and a seasonal roasted
    beet and goat-cheese salad sprinkled with toasted pumpkin seeds, often sourcing ingredients from their own vegetable garden and the local farmer’s market.
  core: Morris Myres embodies a calm, detail-oriented mind that balances structured data mastery with solitary, low-key creative pursuits, occasionally indulging in vintage guitar strings and an over-organized
    budgeting spreadsheet while they silently curate life’s quiet rhythms.
background:
  cultural: 'Morris was raised in a middle‑class white family in suburban Austin, Texas, where traditional Southern values of self‑reliance, courtesy, and community service blended with the city’s vibrant
    tech and arts scene. His upbringing emphasized modesty, respect for local traditions such as barbecue and outdoor recreation, while also exposing him to the progressive, inclusive culture of Austin’s
    music festivals and startup community. This dual influence shapes his identity: he values Texan hospitality and pragmatism, yet remains open‑minded and supportive of multicultural initiatives, especially
    those that promote health education and community well‑being.'
attributes:
  skills: '[''Electronic Health Record (EHR) management'', ''Medical coding (ICD-10, CPT)'', ''HIPAA compliance'', ''Data quality assurance'', ''Health information governance'', ''Database querying (SQL)'',
