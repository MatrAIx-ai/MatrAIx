personas:
  professional: Cheryl Moats is a seasoned database architect who leverages over a decade of expertise in SQL Server, Oracle, and MySQL to build reliable, repeatable data pipelines; they thrive on routine
    maintenance tasks but occasionally let deadlines slip due to a relaxed attitude toward strict planning, and they use their humanities background to craft clear documentation while patiently mentoring
    junior staff, all while quietly worrying about data integrity and future compliance.
  sports: Cheryl Moats enjoys weekend hikes in the Boise River foothills and participates in the Boise Hiking Club, they cheer for the Boise State Broncos football team on Saturdays, occasionally attend
    Idaho Steelheads hockey games, and keep a relaxed fitness routine that favors gentle cycling over regimented gym workouts, though their tendency to skip scheduled runs can leave them feeling guilty.
  arts: Cheryl Moats incorporates a steady stream of cultural enrichment into their routine, they savor classic novels by Jane Austen and historical biographies of Abraham Lincoln, attend community‑theater
    productions at the Riverstone Center where they’ve helped coordinate shows starring local actor Aaron Cole, and unwind to the music of folk legend Gillian Welch and the classical cello of Yo‑Yo Ma.
  travel: Cheryl Moats favors low‑key nature getaways and occasional historic city tours, they have hiked in Yellowstone National Park and explored the historic streets of Bath, England, preferring to book
    modest cabins or bed‑and‑breakfasts on a flexible itinerary that leaves room for spontaneous market visits, while balancing family obligations that limit longer overseas trips.
  culinary: Cheryl Moats is a competent home cook who builds family meals around garden‑fresh vegetables, frequently preparing roasted carrots with thyme, chicken pot pie with flaky crust, and hearty potato‑leek
    soup, and they relish occasional brunch outings for Eggs Benedict with smoked salmon at the local café, though they sometimes impulsively add too much salt during experimental spice mixes.
  core: Cheryl Moats blends a steadfast love of routine and community service with a quietly anxious mind that sometimes lets paperwork pile up, preferring garden‑side reflection over hectic schedules while
    occasionally over‑indulging in spontaneous salt‑laden recipes.
background:
  cultural: Cheryl comes from a traditional white American background, raised in the Upper Midwest before moving to Idaho for work. Her upbringing emphasized self‑reliance, community involvement, and modest,
    family‑centered values. Living in Meridian, a suburban part of the Boise metropolitan area, she participates in local community gatherings, church events, and regional outdoor activities typical of
    the Pacific Northwest interior. Her education in arts and humanities adds a cultural appreciation for literature, history, and the arts, which she weaves into her daily life through reading, museum
    visits, and supporting local cultural events. She identifies with mainstream American cultural norms, valuing politeness, punctuality, and a pragmatic approach to problem‑solving.
attributes:
  skills: '["SQL Server", "Oracle Database", "MySQL", "Database Design", "Data Modeling (ER Diagrams)", "Performance Tuning", "Backup & Recovery", "Security & Access Management", "Data Governance", "PowerShell
