  hobbies: '["Gardening (vegetable garden)", "Reading classic literature and history", "Book club participation", "Weekend hiking in Boise foothills", "Cooking family meals", "Knitting", "Volunteering at
    community theater (backstage support)"]'
  career_goals: 'Cheryl’s career ambition centers on deepening her expertise as a database architect while shaping data governance practices that align with ethical standards and business continuity. Over
    the next five years she aims to earn advanced certifications (e.g., Microsoft Certified: Azure Data Engineer, Oracle Certified Master), step into a lead architect role where she can define standardized
    data‑flow architectures, and mentor junior DBAs to build a resilient, collaborative team. She values a stable, predictable work schedule that allows her to maintain her family commitments, so her long‑term
    goal includes negotiating flexible work arrangements that preserve her routine‑focused lifestyle while still delivering high‑impact technical solutions.'
