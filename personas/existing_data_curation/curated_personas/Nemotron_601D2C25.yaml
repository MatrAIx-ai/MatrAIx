  professional: Samantha Bottorf, a two‑year‑old, already shows a miniature professional streak; they meticulously arrange their toy kitchen set each day, thriving on the familiar routine of pretend cooking
    and cleaning.
  sports: Samantha Bottorf enjoys watching local junior soccer matches on TV, but prefers crawling around the backyard with a soft soccer ball; they attend a weekly toddlers' playground group where they
    practice kicking a small foam ball.
  arts: Samantha Bottorf delights in the colorful nursery songs of The Wiggles, repeatedly singing “Hot Potato,” and spends afternoons smearing crayons on paper, often recreating the bright palettes they
    see on favorite picture books.
  travel: Samantha Bottorf loves short family getaways to the nearby lakeside park, especially the sandpit at Sunnyvale Beach; they build sandcastles with a consistent set of plastic shovels, never straying
    far from the familiar shoreline.
  culinary: Samantha Bottorf favors banana pancakes drizzled with extra maple syrup, insists on nibbling the edges first, and has a notorious habit of spilling milk onto their high chair tray.
  core: Samantha Bottorf is a routine‑obsessed toddler who meticulously stacks blocks, hoards pennies, clings to familiar comforts, and subtly resists disruption while navigating a world of playful order.
background:
