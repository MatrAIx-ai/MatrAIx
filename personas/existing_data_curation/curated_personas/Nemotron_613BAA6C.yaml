  hobbies: '[''DIY woodworking'', ''vintage motorcycle restoration'', ''gardening'', ''cooking Nicaraguan cuisine'', ''reading construction magazines'', ''watching engineering documentaries'', ''chess'',
    ''soccer viewing with friends'']'
  career_goals: Javier aims to move into a supervisory role within the next two years, seeking certification as a licensed general contractor and completing his associate’s degree in construction management.
    He hopes to mentor younger crew members, improve site efficiency, and eventually launch a modest family‑owned contracting business focused on residential renovations in the Downey area. Additionally,
    he plans to secure a stable retirement by investing in property and saving for his children's college funds while maintaining a strong financial foundation for his family.
