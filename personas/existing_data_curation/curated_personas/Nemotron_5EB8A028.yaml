  career_goals: Henna aims to move from her clerical role to a senior claims analyst position within the next three to five years, planning to earn the Chartered Property Casualty Underwriter (CPCU) designation
    and complete a bachelor’s degree in business administration to deepen her underwriting knowledge. She aspires to lead a small team that integrates machine‑learning tools for faster claim triage while
    preserving the personal touch she values in client interactions. Her career plan balances professional advancement with the flexible, self‑directed work style she prefers, allowing her to maintain resilience
    and personal well‑being.
