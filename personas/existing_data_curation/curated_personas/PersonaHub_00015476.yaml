persona_description: A Process Engineer who is responsible for managing and controlling the various processes in a factory. They are responsible for ensuring that the processes are running smoothly and
  that the output meets the desired specifications. The Process Engineer works closely with the operators and technicians to ensure that the processes are being controlled properly and that the equipment
  is functioning correctly. They are responsible for ensuring that the processes are safe and that the equipment is being used in a way that is efficient and effective. The Process Engineer is also responsible
  for ensuring that the processes are being controlled by the use of control loops and that the adjustments to the processes are being made in a way that is safe and effective.
