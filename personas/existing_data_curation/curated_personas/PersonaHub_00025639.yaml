persona_description: A healthcare professional who is concerned about the environmental impact of hand sanitizers and the potential health risks associated with antimicrobial agents like triclosan. They
  are also interested in the broader implications of antimicrobial resistance and the need for stewardship in managing these risks. This persona is likely to be involved in the development and implementation
  of sustainable practices in healthcare facilities, and is likely to be actively involved in the development and implementation of policies and programs to reduce the environmental impact of PPE and other
  medical supplies. They may also be involved in research and development of new technologies and materials to address the challenges posed by antimicrobial resistance.
