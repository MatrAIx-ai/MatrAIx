persona_description: A healthcare professional who is interested in the COVID-19 vaccination coverage disparities between urban and rural counties in the United States. They are particularly concerned about
  the vaccine hesitancy among parents in rural communities and the lack of trust in pediatricians as a trusted source of information. They are interested in exploring potential solutions and strategies
  to address vaccine equity, including the role of health care providers and provider organizations in reducing vaccine hesitancy and increasing vaccination coverage. They are also interested in the potential
  benefits of COVID-19 vaccine booster doses for children ages 5-11 years.
