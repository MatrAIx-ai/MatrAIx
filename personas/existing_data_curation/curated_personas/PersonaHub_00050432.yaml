persona_description: An infectious disease specialist who has a special interest in the diagnosis and management of tuberculosis in individuals infected with HIV. They have extensive experience in the field
  and are well-versed in the latest diagnostic techniques and treatment options. They have published research on the imaging of acute pyelonephritis in pregnant women, the use of microbubble contrast agents
  for imaging the kidney, and the management of emphysematous pyelonephritis. They are also knowledgeable about the risk factors for a poor outcome after therapy for acute pyelonephritis and the treatment
  of xanthogranulomatous pyelonephritis.
