personas:
  professional: Gerald Duckworth, a budding junior developer, merges his love of LEGO engineering with self‑taught Python to craft small Minecraft mods and Roblox scripts, channeling indie rock beats into
    coding marathons, but his spontaneous nature often leads him to abandon projects mid‑way in favor of new LEGO builds, making organization and deadline‑keeping a recurring challenge.
  sports: Gerald Duckworth, an avid skateboarder, spends weekends at Flushing Meadows Skatepark with the Queens Skate Collective crew, perfecting ollies and kickflips on a 7‑inch deck, while also playing
    on the middle school intramural soccer team in spring and cheering for the New York Knicks and the New York Rangers on game nights; their favorite local team is the Brooklyn Nets, which they follow
    on a sports app during school breaks.
  arts: Gerald Duckworth, a creative storyteller, sketches comic strips inspired by the visual humor of "Adventure Time" and the narrative depth of Brian K. Vaughan’s "Saga," while binge‑listening to indie
    acts like Tame Impala and classic rock legends such as The Rolling Stones during coding sessions; they frequently visit the community art workshop to build LEGO sculptures and quote dialogues from their
    favorite sci‑fi novels by Becky Chambers and classic movies starring Harrison Ford.
  travel: Gerald Duckworth, a spontaneous explorer, prefers short, flexible road trips with friends—biking the Queens waterfront to Astoria, catching the ferry to Governors Island for a day of LEGO building,
    and taking family weekend trips to the American Museum of Natural History; they dream of a future visit to Tokyo’s Akihabara district to hunt for rare LEGO sets and experience the Nintendo store, and
    they also hope to see the LEGO exhibition at Ontario Science Centre in Toronto.
  culinary: Gerald Duckworth, a budding home baker, loves mixing chocolate chips into cookie dough while classic rock riffs play, crafting "LEGO brick" brownies using butter, sugar, cocoa powder, and crushed
    pretzels; they also help their family make homemade pizza topped with mozzarella, pepperoni, fresh basil, and a drizzle of olive oil, and enjoy cooking spaghetti carbonara with guanciale, pecorino romano,
    and a pinch of black pepper for dinner.
  core: Gerald Duckworth, a 13‑year‑old LEGO‑building, skate‑boarding, code‑loving dreamer, constantly toggles between spontaneous creative bursts and chaotic unfinished projects, never quite masters organization
    but thrives on the thrill of starting something new.
background:
  cultural: Gerald comes from a white, middle‑class family with roots in Irish and Italian heritage, living in the diverse neighborhood of College Point, Queens. His upbringing blends traditional American
    holidays—Thanksgiving, Christmas, and summer barbecues—with exposure to the multicultural rhythms of New York City, including celebrations like Lunar New Year and Diwali observed by neighbors. He attends
    a public middle school where he learns basic Spanish and participates in community events that emphasize inclusivity and neighborhood pride. Family meals often feature classic comfort foods, and weekend
    trips to upstate New York or the Jersey Shore help reinforce his connection to both his local community and broader regional culture.
