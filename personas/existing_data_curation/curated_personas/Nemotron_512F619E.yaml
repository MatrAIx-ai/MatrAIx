  career_goals: Gerald dreams of turning his love for building and coding into a career as a software engineer or interactive game designer, where he can create tools that help people connect and solve
    everyday challenges. He hopes to attend a STEM‑focused high school, earn a computer science degree, and later launch a community coding club for middle‑schoolers in Queens. His long‑term ambition includes
    designing educational games that blend fun with practical learning.
