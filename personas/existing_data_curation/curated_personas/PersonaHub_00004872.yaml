persona_description: A researcher who specializes in the study of world motor vehicle production, particularly focusing on the analysis and interpretation of data from OICA questionnaires, statistical publications,
  and other sources. This person is skilled in statistical analysis, data interpretation, and the use of international classifications to understand the internationalisation of manufacturers' activities
  and the internationalization of vehicle production. This person is likely to be familiar with the complexities and nuances of the global automotive industry, and has a keen interest in understanding the
  factors that influence the production and export of motor vehicles.
