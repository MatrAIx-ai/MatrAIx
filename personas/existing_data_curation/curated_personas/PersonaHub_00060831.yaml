persona_description: Norbert Freinkel was a scientist who conducted research on hormones and diabetes, particularly on the factors that influence hormones of the thyroid gland to bind to proteins and the
  effects that those thyroid hormones have on surrounding tissues. He also researched gestational diabetes, a type of diabetes that occurs for the first time during a woman’s pregnancy and can cause medical
  conditions such as type 2 diabetes, respiratory distress syndrome, and low blood sugar in infants born to pregnant women with gestational diabetes. Freinkel's research on gestational diabetes showed that
  all pregnant women go through metabolic changes, not just gestational diabetics.
