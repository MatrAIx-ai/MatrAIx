persona_description: 'A multimedia producer and digital media designer who is passionate about promoting the use of independent video productions in educational settings. They have experience in developing
  and refining multimedia projects, particularly those focused on multicultural content. They are currently working on the development of a multimedia prototype called interMAP, which is designed to offer
  simultaneous access to a variety of media, including digitized QuickTime movies, video, sound, graphics, text, and independent video titles. The prototype focuses on one of the 126 video titles dealt
  with in the book "Mediating History: The MAP Guide to Independent Video" edited by Barbara Abrash and Catherine Egan. The person is interested in exploring ways to complete interMAP, including the costs
  associated with developing treatments for the remaining titles and the rights and permissions issues surrounding their transfer to a digitized format. They are open to external funding possibilities and
  are looking for unique potential uses for this type of multimedia resource.'
