  career_goals: Olga aims to transition into a senior strategic analytics role where she can lead cross‑functional projects that combine operations research with social impact, particularly in urban sustainability
    and public health. She aspires to become a Director of Analytics for a nonprofit or municipal agency, shaping policy through data‑driven insights. Mentoring emerging analysts, especially women and Latinx
    professionals, is a key part of her ambition. To broaden her influence, she plans to pursue an executive MBA or a specialized Ph.D. in Operations Management while maintaining a work‑life balance that
    allows her to manage stress and continue her artistic pursuits.
