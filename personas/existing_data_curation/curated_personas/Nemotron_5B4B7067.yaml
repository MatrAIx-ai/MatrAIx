  hobbies: '[''Visiting art galleries'', ''Oil painting'', ''Photography'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Yoga'', ''Hiking'', ''Reading philosophy and science nonfiction'', ''Traveling
