  career_goals: Although retired, Maria is driven to remain active and independent. She aims to master her new smartphone so she can video‑chat with her children and grandchildren more frequently. She plans
    to write a memoir that captures her family's journey from Chile to the United States, preserving the stories for future generations. In her community, she hopes to organize a weekly cooking workshop
    where seniors can learn to prepare Chilean recipes, and she aspires to launch a small neighborhood garden to promote fresh produce and social interaction among local retirees. Managing her anxiety is
    also a priority; she intends to attend a weekly mindfulness group and consider gentle yoga classes.
