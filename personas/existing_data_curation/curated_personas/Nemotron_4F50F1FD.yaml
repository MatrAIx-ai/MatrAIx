  career_goals: Bernard imagines a future where he designs and builds safe, orderly structures. He is excited about becoming an architect or civil engineer, jobs that blend his love of structure with creativity.
    He also admires firefighters for their predictable training and community service, so he sometimes dreams of joining the fire department when he’s older. In the short term, he aims to excel in school,
