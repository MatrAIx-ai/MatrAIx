  career_goals: Johnson aims to scale his company’s revenue by 30% over the next three years while maintaining the disciplined, routine-driven culture he values. He seeks to implement a robust operational
    framework that reduces waste and improves profit margins, positioning the firm for acquisition or public offering. Additionally, he wants to mentor emerging Black entrepreneurs, establishing a scholarship
    program at a local community college and launching a mentorship network. Long-term, he aspires to serve on the board of a regional nonprofit focused on economic empowerment and to secure a legacy of
    sustainable growth.
