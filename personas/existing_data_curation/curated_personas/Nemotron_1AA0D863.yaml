  career_goals: Pamela hopes to combine her love for animals and curiosity about the natural world by pursuing a career as a veterinary technician or wildlife rehabilitator, but she also values practical
    stability, so she is considering a future role in library science or a community‑college program in graphic design that would let her earn a living while continuing her artistic pursuits. She aims to
    attend a local community college after high school, secure a part‑time job at the Akron Public Library to gain experience, and eventually earn a certificate in pet care or digital media.
