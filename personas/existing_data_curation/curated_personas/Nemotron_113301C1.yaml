  hobbies: '[''Book Club'', ''Community Gardening'', ''Walking Group'', ''Live Music and Theater'', ''Cooking Classes'', ''Traveling to Historic Sites'', ''Yoga and Meditation'']'
  career_goals: While approaching retirement, Ashley aims to transition into a mentorship and consulting role, guiding emerging school leaders in effective management practices and stress‑reduction strategies.
    She hopes to spearhead a community‑based tutoring initiative in Baltimore, secure endowments for a scholarship fund targeting underrepresented students, and author a concise guide on balancing administrative
    duties with staff well‑being. Additionally, she seeks to reduce her formal workload to devote more time to volunteer leadership, personal health, and quality family experiences with her husband.
