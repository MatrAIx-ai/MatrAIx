  career_goals: Although still in early childhood, K Marie often imagines future roles that combine her love of art and the sea. She talks about becoming an artist who paints bright pictures of ocean creatures,
    a marine explorer who discovers tide‑pool wonders, or a storyteller who shares colorful tales. Her calm resilience and curiosity drive her to keep learning, and she expresses a gentle ambition to grow
    into someone who can share creativity and knowledge with others.
