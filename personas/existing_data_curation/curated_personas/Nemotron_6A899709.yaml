personas:
  professional: Lisania Mesa is a retired bilingual teacher who now designs volunteer tutoring programs for immigrant families, leveraging decades of curriculum development expertise and a pragmatic yet
    curious approach that balances structured lesson plans with flexible, technology‑enhanced methods, while they channel a competitive streak into constantly refining program metrics and outcomes.
  sports: Lisania Mesa stays active by leading a senior walking club that meets three times weekly at the local park, cheering on the Chicago Cubs and the Chicago Bulls on game days, and joining a low‑impact
    Zumba class that incorporates cumbia steps, reflecting their love of movement, community camaraderie, and competitive spirit during bingo tournaments.
  arts: Lisania Mesa channels their artistic side through a community dance group that practices salsa and cumbia to the rhythms of Carlos Santana and Selena, while also devouring historical fiction by
    Isabel Allende and the poetry of Pablo Neruda, and they never miss a local theater production of La Casa de Bernarda Alba, showcasing a deep appreciation for music, literature, and performance.
  travel: Lisania Mesa prefers meticulously planned trips that blend cultural immersion with relaxation, having recently revisited the town where their parents grew up, explored the historic streets of
    San Miguel de Allende, and taken a road‑trip to the Grand Canyon, while they dream of attending the Day of the Dead festival in Oaxaca and a quiet retreat in the Scottish Highlands.
  culinary: Lisania Mesa is an accomplished home chef who lovingly prepares mole poblano, homemade tamales, and fresh guacamole using chilies, tomatillos, and herbs harvested from their vegetable plot,
    and they delight in pairing these dishes with locally sourced corn tortillas and a splash of mezcal during family gatherings.
  core: Lisania Mesa is a lively, community‑focused elder whose competitive trivia prowess, meticulous garden, and heartfelt storytelling blend curiosity with a cautious, sometimes worry‑laden, approach
    to life.
background:
  cultural: Lisania is a first‑generation Mexican‑American whose parents emigrated from Jalisco. She grew up speaking Spanish at home and English at school, weaving together Mexican customs—such as Dia
    de los Muertos celebrations, Catholic traditions, and family‑centered gatherings—with the values of Midwestern community life. Her cultural identity is expressed through her love of Mexican food, music,
    and folklore, as well as her commitment to serving both the Mexican diaspora and the broader Montgomery community.
