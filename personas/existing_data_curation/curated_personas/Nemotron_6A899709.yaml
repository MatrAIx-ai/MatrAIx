  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Cumbia and salsa dancing'', ''Senior book club'', ''Storytelling workshops'', ''Trivia nights'', ''Bingo tournaments'', ''Sustainable living workshops'',
    ''Local history lectures'']'
  career_goals: Though retired from full‑time teaching, Lisania aims to continue contributing to her community by establishing a volunteer tutoring program for immigrant families, creating a multicultural
    after‑school club that celebrates Mexican heritage, and mentoring retired educators who want to stay engaged. She also hopes to advocate for increased funding for adult education in Kendall County and
    to write a memoir that shares her experiences bridging Mexican traditions with Midwestern education practices.
