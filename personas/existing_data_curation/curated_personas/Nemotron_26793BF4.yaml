    to instrumental music"]'
  career_goals: Sol aspires to advance within the banking sector by obtaining an associate degree in Business Administration and eventually earning a certification as a Certified Bank Teller (CBT) or a
    Loan Officer. She aims to move from a teller position to a supervisory role where she can oversee teller operations and train new staff, leveraging her competitive drive to meet performance targets.
    Long‑term, she hopes to secure a stable, well‑paid position in financial services that offers clear advancement pathways, allowing her to support her family and achieve financial independence while
    minimizing high‑stress environments that she finds draining.
