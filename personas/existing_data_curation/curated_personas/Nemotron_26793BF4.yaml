personas:
  professional: Sol Miranda, a 24‑year‑old bank teller, combines meticulous cash‑handling and bilingual customer service with a competitive eye for pattern‑spotting; although their relaxed approach to rigid
    scheduling sometimes leaves their paperwork a bit messy, they consistently meet daily targets and aspire to supervise a teller team.
  sports: Sol Miranda enjoys solitary early‑morning jogs around Lake Eola Park in the spring, follows Orlando City SC in the MLS and the Orlando Magic in the NBA, occasionally joins a local adult touch‑soccer
    league on weekends, and keeps a modest membership at the community recreation center for indoor swimming during summer.
  arts: Sol Miranda finds calm in instrumental music, frequently listening to piano compositions by Ludovico Einaudi and classical guitar by Rodrigo y Gabriela, attends occasional virtual theater performances
    of plays by Lin‑Manuel Miranda, and enjoys films by director Guillermo del Toro, especially those that blend fantasy with cultural folklore.
  travel: Sol Miranda prefers solo, low‑key travel itineraries that balance cultural immersion with budget constraints, having explored the historic streets of Oaxaca and the coastal ruins of Tulum, they
    hope to wander the cobblestones of Seville during Semana Santa and someday trek the volcanic landscapes of Iceland while still saving for family responsibilities.
  culinary: Sol Miranda loves cooking traditional pupusas with masa harina, queso fresco and refried beans, experiments with chicken‑filled tamales seasoned with achiote, enjoys crafting a side of freshly
    made horchata with cinnamon, and occasionally fuses flavors by adding quinoa to the masa for a modern twist.
  core: Sol Miranda is a quietly competitive, puzzle‑loving bank teller who balances solitary curiosity with a relentless drive for financial stability, all while navigating late‑night anxiety and a passion
    for homemade pupusas.
background:
  cultural: Sol is a first‑generation Salvadoran‑American whose family emigrated from El Salvador to the United States before she was born. Growing up in a Salvadoran community in Orlando, she was immersed
    in the Spanish language, Catholic traditions, and the rich culinary heritage of her parents. Family gatherings often featured pupusas, tamales, and celebrations such as Día de los Muertos and Las Posadas,
    reinforcing a sense of cultural pride and resilience. Although she values solitude, the close‑knit family culture has instilled in her a strong sense of responsibility toward her relatives, motivating
    her to pursue financial stability. Her bilingual upbringing allows her to navigate both Salvadoran and broader American cultural contexts with ease.
attributes:
