    ''Crochet'', ''Baking simple treats'']'
  career_goals: Virginia wants to finish high school with a solid GPA, then enroll in a community college program for veterinary technology. She hopes to work as a veterinary assistant in a local animal
    clinic, where she can combine her love for animals with hands‑on, practical work. In the longer term she dreams of earning a certification and eventually becoming a veterinary technician. She also considers
    part‑time work as a library aide to stay connected to books and quiet environments.
