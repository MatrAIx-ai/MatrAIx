personas:
  professional: Virginia Bernstein, a 15‑year‑old high‑school sophomore who loves sketching storybook characters, channels their practical eye for detail into budding illustration work while they navigate
    a laid‑back, occasionally disorganized schedule that reflects a preference for structure tempered by flexibility.
  sports: Virginia Bernstein enjoys leisurely walks along the Rio Grande and occasionally joins a community youth soccer league, and they cheer for the El Paso Chihuahuas while preferring solo, low‑intensity
    exercise over competitive sports.
  arts: Virginia Bernstein immerses in indie folk artists such as Bon Iver and Sufjan Stevens, while they weave fantasy and mystery narratives into sketchbooks and attend local library author talks, letting
    these artistic influences shape their quiet, imaginative world.
  travel: Virginia Bernstein dreams of exploring the sandstone arches of Arches National Park and the historic streets of Santa Fe, and they plan trips with family in a low‑key, budget‑conscious way that
    balances their love of nature with the comfort of familiar surroundings.
  culinary: Virginia Bernstein delights in baking chocolate chip cookies spiced with cinnamon, and they often overmix the batter, leading to a few burnt edges, while their simple crochet projects inspire
    whimsical cookie decorations during weekend kitchen sessions.
  core: Virginia Bernstein, a dreamy yet pragmatically structured 15‑year‑old, balances a love for quiet creative pursuits with a habit of misplacing school assignments and a tendency to forget to water
    the family rabbit, and they often find solace in solitary sketching.
background:
  cultural: Virginia comes from a White, Anglo‑American family that has lived in El Paso for several generations. While her household celebrates typical American holidays such as Thanksgiving and Fourth
    of July, she also appreciates the multicultural vibe of the city, picking up bits of Spanish from school and community events. Her family attends a local Methodist church, participates in community
    clean‑up days, and enjoys regional foods like chile‑filled tacos, which she eats with her family. Growing up near the U.S.–Mexico border has made her comfortable with bilingual signage and the blend
    of American and Hispanic cultural influences.
