personas:
  professional: Anjani Ramdihall, a teenage digital illustrator and budding interactive storyteller, blends curiosity and a relaxed, flexible approach to create immersive Scratch narratives that often surprise
    classmates with unconventional plot twists, and they thrive on spontaneous brainstorming sessions.
  sports: Anjani Ramdihall, a member of the local junior basketball league and a fan of the Los Angeles Lakers, enjoys weekend soccer games at the community park, balances a laid‑back attitude with high‑energy
    bursts during workouts, and incorporates yoga to maintain flexibility and endurance, and they occasionally miss practice when a new art project demands extra time.
  arts: Anjani Ramdihall, an avid sketcher and digital art enthusiast, draws inspiration from indie musician Clairo, Bollywood director Anurag Kashyap’s gritty films, and the graphic novel series "Saga",
    often recreating scenes in watercolor while curating playlists of world beats by Tinariwen during creative sessions, and they love experimenting with mixed media to convey emotion.
  travel: Anjani Ramdihall, who loves spontaneous weekend trips, has explored the bustling streets of Delhi’s old market during a family vacation and dreams of hiking the misty trails of the Scottish Highlands,
    yet favors low‑budget backpacking and last‑minute bus tickets over meticulous itineraries, and they often pack a sketchbook to capture fleeting moments on the road.
  culinary: Anjani Ramdihall, a budding home chef, enjoys whipping up fragrant chickpea curry with cumin, turmeric, and fresh cilantro, perfecting buttery naan dough, and experimenting with matcha pancakes
    for breakfast, while often improvising with whatever ingredients are at hand, and they occasionally add a pinch of unexpected spice just for the thrill.
  core: Anjani Ramdihall is a curiosity‑driven teen who fuses art, code, and empathy into a colorful, slightly disorganized but deeply compassionate worldview, and they constantly juggle passions with a
    playful disregard for strict schedules.
background:
  cultural: Anjani is a first‑generation American of South Asian descent, raised in Austin, Texas. Her household maintains cultural traditions such as celebrating Diwali and Holi, speaking Hindi at home,
    and preparing dishes like biryani and samosas. She blends these customs with the diverse Texan environment, participating in multicultural festivals and attending a public school with a wide range of
    cultural perspectives. Her upbringing emphasizes hospitality, respect for elders, and community service, values she carries into her artistic and volunteer endeavors.
