  career_goals: Anjani aspires to turn her love for art and community into a career that blends creativity with social impact. She hopes to study visual arts or graphic design in college, eventually working
    as a multimedia storyteller, social‑impact designer, or art educator who uses visual media to raise awareness about cultural and environmental issues. She also envisions mentoring younger students in
    art programs and creating culturally‑rich content that celebrates her South Asian heritage while fostering intercultural understanding.
