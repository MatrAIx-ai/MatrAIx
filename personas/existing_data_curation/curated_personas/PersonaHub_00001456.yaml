persona_description: A geologist who specializes in the study of metamorphism and the formation of metamorphic rocks, particularly quartzites, metabasic and -acid volcanics. They are familiar with the bandak
  group, the Telemark suite, and the process of deformation and metamorphism. Their expertise includes the study of the steeply plunging folds and the formation of sulphide-bearing quartz veins. They have
  experience with X-ray diffraction data and the alteration of molybdenite. They are also knowledgeable about the formation of metamorphic rocks and the processes of deformation and metamorphism.
