  hobbies: '[''Gardening (vegetables and native flowers)'',''Birdwatching'',''Walking on Withlacoochee State Trail'',''Reading historical fiction and memoirs'',''Knitting and crochet for charity'',''Cooking
    low-sodium, heart-healthy meals'',''Volunteering at senior center and hospice'',''Attending community theater'',''Yoga and mindfulness meditation'',''Photography of sunsets and wildlife'']'
  career_goals: Paula aims to transition from full-time bedside nursing to a part-time role that blends education and community outreach. She plans to obtain a Certified Gerontological Nurse (RN-G) credential
    and enroll in a nurse-educator certification program so she can mentor new graduates and develop training modules focused on patient safety and compassionate care. Paula also hopes to lead a local wellness
    initiative for seniors that combines health screenings, nutrition workshops, and stress-reduction classes, allowing her to apply her practical expertise while honoring her desire to support others'
    well-being. Ultimately, she seeks a balanced professional life that sustains her own emotional health and leverages her decades-long experience to improve care quality in Citrus County.
