personas:
  professional: Paula Johnson, a seasoned registered nurse with over 35 years of acute and community health experience, excels in systematic clinical assessments, precise medication administration, and
    health informatics, while channeling their structured yet adaptable nature into teaching geriatric care and guiding new staff through detailed protocols.
  sports: Paula Johnson stays active with gentle yoga, daily walks along the Withlacoochee State Trail, and occasional birdwatching hikes, while cheering for the Tampa Bay Buccaneers, the Tampa Bay Lightning,
    and supporting the local senior walking club.
  arts: Paula Johnson finds creative fulfillment in knitting blankets for charity, attending performances at the Citrus County Playhouse, photographing Florida sunsets, and reading historical fiction by
    Ken Follett and memoirs by Maya Angelou, with a particular fondness for the soothing piano works of Norah Jones.
  travel: Paula Johnson prefers short, well-planned weekend getaways to the Gulf Coast's Siesta Key and historic St. Augustine, mixing scheduled tours with impromptu birdwatching excursions, while relying
    on senior discounts and a modest travel fund to keep trips affordable.
  culinary: Paula Johnson enjoys preparing heart-healthy meals such as grilled salmon with mango salsa, quinoa-kale salads, and roasted sweet-potato soup using fresh produce from their garden, while occasionally
    indulging in a slice of key-lime pie on special occasions.
  core: Paula Johnson, a 63-year-old nurse who blends meticulous clinical precision with spontaneous garden experiments, balances deep kindness with a habit of over-worrying about health and finances.
background:
  cultural: Paula Johnson identifies as a white American whose upbringing in a small Midwestern town instilled values of self-reliance, community involvement, and modesty. After relocating to Inverness,
    Florida, she has embraced the local coastal culture, participating in church gatherings, volunteer events, and seasonal festivals that celebrate the region's natural heritage. Her family traditions
    emphasize holidays such as Thanksgiving and Christmas, with a focus on home-cooked meals and shared storytelling. As a widowed senior, Paula is active in the Citrus County senior network, where she
    both receives and offers support, reflecting a cultural emphasis on intergenerational care and mutual assistance.
attributes:
  skills: '[''Clinical assessment and vital sign monitoring'',''Medication administration and dosage calculation'',''Wound care and dressing management'',''Patient education and health promotion'',''Care
