    basic programming)'']'
  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Cooking'', ''Birdwatching'', ''Walking/hiking along the Hudson River'', ''Bridge club'', ''Puzzle solving (crosswords, Sudoku, jigsaw puzzles)'',
    ''Library volunteering'', ''Genealogy research'', ''Community theater attendance'']'
  career_goals: Although retired from formal employment, Teresa aims to remain an active contributor to her community. She plans to launch a weekly workshop series teaching basic computer skills to seniors
    at the Poughkeepsie Public Library, and to author a practical guide on sustainable gardening for the Hudson Valley. She seeks recognition as a reliable resource for problem‑solving and fact‑checking
    within local volunteer networks, and aspires to document her experiences as a woman in STEM through a memoir. Maintaining her health and mental sharpness through regular walks, yoga, and participation
    in local puzzle competitions also feature prominently in her ambitions.
