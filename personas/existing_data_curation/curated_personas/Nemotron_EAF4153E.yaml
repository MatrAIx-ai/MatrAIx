personas:
  professional: Teresa Haskins is a retired STEM‑savvy community coordinator who leverages her statistical analysis, troubleshooting, and project‑planning expertise to design and run senior computer‑training
    workshops, applying her methodical routine and competitive drive to keep sessions efficient and fact‑checked, while their skeptical eye ensures every resource is reliable.
  sports: Teresa Haskins is an avid walker who logs daily Hudson River trail hikes and weekly community yoga sessions to maintain mobility, cheers for the Hudson Valley Renegades minor‑league baseball team
    and the New York Giants, and competes spiritedly in local bridge tournaments, reflecting their balanced mix of physical activity and competitive leisure.
  arts: Teresa Haskins is a dedicated quilter and avid reader who draws inspiration from the Hudson River School painter Thomas Cole and folk singer Joan Baez, regularly attends the Poughkeepsie community
    theater's staging of Arthur Miller plays, and curates a collection of classic novels by Margaret Atwood, weaving these artistic influences into their seasonal quilting patterns and library volunteer
    work.
  travel: Teresa Haskins is a methodical traveler who prefers slow, self‑guided road trips that align with garden seasons—having explored the historic streets of Alkmaar, the vineyards of Tuscany, and the
    Hudson Valley’s own historic estates—while budgeting carefully for each journey and dreaming of a quiet seaside retreat in Maine.
  culinary: Teresa Haskins is a seasoned home chef who transforms locally sourced heirloom tomatoes, fresh river trout, and wild ramp into rustic ratatouille and herb‑crusted trout, bakes classic Dutch
    apple pie with cinnamon and nutmeg, and meticulously balances flavors using fresh rosemary, sage, and honey harvested from a nearby apiary, while delighting in the ritual of preparing farm‑to‑table
    meals for bridge club gatherings.
  core: Teresa Haskins is a routine‑driven, competitively sharp senior who blends her STEM background with a love for gardening, quilting, and puzzle‑solving, while their skeptical eye keeps community projects
    grounded and occasional forgetfulness about medication refills adds a relatable human quirk.
background:
  cultural: Teresa grew up in a middle‑class, white, Protestant family rooted in the Hudson Valley. Her ancestry includes early Dutch settlers of the Poughkeepsie region as well as later English immigrants.
    Raised during the 1950s‑60s, she was immersed in a community that valued hard work, self‑reliance, and practical education. Family traditions emphasized regular church attendance, participation in local
    events such as the Tulip Festival, and a respect for the region’s historic architecture and agriculture. Encouraged to pursue a STEM degree at a time when few women did, she became one of the first
    in her cohort to earn a bachelor’s in a technical field, blending traditional values with a forward‑looking curiosity.
