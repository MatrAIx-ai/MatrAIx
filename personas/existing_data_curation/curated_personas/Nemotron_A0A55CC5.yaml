  hobbies: '[''Watercolor painting'', ''Reading poetry and short stories'', ''Gardening'', ''Quilting and crochet'', ''Cooking traditional Southern dishes'', ''Birdwatching'', ''Attending local art exhibitions'',
    ''Listening to classical music'', ''Hosting small tea gatherings with friends'']'
  career_goals: Emily aims to deepen her contribution to the Phenix City community by expanding the art‑based workshops she leads for seniors and by establishing a peer‑support circle focused on anxiety
    and grief. She hopes to mentor younger volunteers, preserve more local stories through oral‑history projects, and collaborate with the church to create a small garden that doubles as a therapeutic space.
    Personal ambitions include continuing to learn new artistic techniques, improving her coping strategies for emotional distress, and maintaining a flexible, low‑stress lifestyle that honors her late
    husband’s memory while fostering harmony among her neighbors.
