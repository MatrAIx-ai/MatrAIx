  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital art'', ''Visiting art galleries'', ''Indie film watching'', ''Reading graphic novels'', ''Yoga and mindfulness'', ''Journaling'', ''Cooking
    Southeast Asian cuisine'', ''Hiking'']'
  career_goals: She aims to pursue a bachelor's degree in visual communication or user‑experience design, with the long‑term goal of becoming a UI/UX designer who creates intuitive, inclusive digital products.
    Thuc hopes to combine her artistic sensibility with her methodical planning skills to lead design projects in a collaborative yet low‑stress environment. She also aspires to contribute to community
    art programs in Tewksbury and to develop multimedia campaigns that raise awareness about mental‑health wellbeing among teens.
