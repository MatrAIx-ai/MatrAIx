personas:
  professional: Jaquan Phillips works as a senior building maintenance technician in Columbus, combining two decades of plumbing, electrical, HVAC, and carpentry expertise with a skeptical, competitive
    mindset that drives meticulous preventive‑maintenance planning, even as they maintain a relaxed approach to formal schedules that often leads to improvisational problem‑solving on the job.
  sports: Jaquan Phillips stays active through weekly pickup basketball games with the South Columbus Community Center league, follows the Columbus Blue Jackets and the Columbus Crew with a competitive
    eye, and spends quiet weekends fishing at Alum Creek Lake to balance high‑energy team sports with low‑key relaxation, while they also track personal fitness metrics on a simple smartwatch.
  arts: Jaquan Phillips immerses themselves in Columbus’s arts scene by frequenting the Columbus Museum of Art, sketching street‑level murals reminiscent of Banksy, painting acrylic canvases inspired by
    Jean‑Michel Basquiat’s bold colors, and supporting live performances by jazz saxophonist Kamasi Washington and hip‑hop artist Kendrick Lamar whenever possible, while they often capture the city’s textures
    with a vintage film camera.
  travel: Jaquan Phillips prefers spontaneous weekend getaways that blend low‑key nature with cultural stops—like hiking Hocking Hills, fishing on Mackinac Island, or sampling jazz in New Orleans—while
    they dream of a longer adventure to Tokyo’s fish markets, all within a modest travel budget that balances family commitments.
  culinary: Jaquan Phillips enjoys cooking fresh catches from Alum Creek Lake, often grilling trout with lemon‑herb butter, and complements that with smoky BBQ ribs, spicy jambalaya, and occasional experimental
    plating of quinoa bowls, while admitting they sometimes over‑season dishes after a long workday.
  core: Jaquan Phillips blends a hands‑on, problem‑solving work ethic with a restless curiosity for art, music, and outdoor calm, juggling a love of competition with a laid‑back, sometimes disorganized
    approach to life, while they constantly seek new ways to merge utility with creativity.
background:
  cultural: Jaquan grew up in a predominantly African‑American neighborhood on the east side of Columbus, where church gatherings, block parties, and community centers shaped his early sense of identity.
    Though he never completed a formal high‑school diploma, he earned respect through apprenticeship work and informal mentorships within the local trades network. His cultural roots are reflected in his
    love for soul food, gospel music, and the storytelling traditions of the black Midwest. He celebrates Juneteenth and participates in the annual Columbus African‑American Cultural Festival, drawing pride
    from the city’s growing black artistic community. Jaquan’s lived experience as a black man in a working‑class environment informs his critical outlook and competitive drive, while his appreciation for
    art and new ideas connects him to both historic and contemporary expressions of African‑American culture.
