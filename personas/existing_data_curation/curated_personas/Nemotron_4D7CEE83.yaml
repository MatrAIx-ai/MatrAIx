  career_goals: Jaquan aims to leverage his extensive on‑the‑job experience into a supervisory role within the next three years, targeting a senior maintenance manager position at a larger property management
    firm. To qualify, he plans to earn an HVAC certification and complete a community‑college program in facilities management. Ultimately, he dreams of launching his own small‑scale maintenance contracting
    business focused on energy‑efficient retrofits for older buildings in Columbus. He also hopes to mentor younger apprentices, sharing both his technical expertise and his skeptical, problem‑solving approach
    to encourage independent thinking.
