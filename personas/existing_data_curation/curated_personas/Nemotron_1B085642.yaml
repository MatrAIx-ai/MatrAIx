  career_goals: Although retired, Jesus aims to stay active and give back to his community. He hopes to mentor younger volunteers at the local senior center, document his family’s history for future generations,
    and continue serving as the informal coordinator of the annual Browns Mills summer fair. He also aspires to keep his health strong by walking daily, learn to use a tablet more proficiently, and travel
    with his wife to visit relatives in nearby states.
