personas:
  professional: Teresa Trosclair, a dedicated preschool teacher in Dorchester, weaves hands‑on storytelling, technology‑enhanced lessons, and inclusive curriculum design into her daily practice, balancing
    an organized classroom routine with flexible, creative problem‑solving to meet diverse learners' needs while aspiring to become a lead teacher and curriculum coordinator.
  sports: Teresa Trosclair enjoys weekend hikes in the Blue Hills, practices gentle yoga at a local studio, and cheers for the Boston Celtics and Red Sox, while also participating in the Dorchester Running
    Club's casual Thursday jogs, blending low‑impact fitness with community camaraderie.
  arts: Teresa Trosclair indulges in classic children’s literature like 'Where the Wild Things Are' and contemporary novels such as 'The Nightingale', crafts handmade story‑cards and soft toys for her classroom,
    and finds inspiration in the music of John Coltrane and the paintings of Monet, weaving artistic appreciation into both personal leisure and professional enrichment.
  travel: Teresa Trosclair favors purposeful travel, having explored the historic streets of Quebec City and the coastal charm of Martha’s Vineyard, and now dreams of visiting Provence to study French‑Canadian
    culinary traditions, planning trips with detailed itineraries and a modest budget that balances family responsibilities.
  culinary: Teresa Trosclair delights in cooking with fresh produce from the community garden, often preparing seasonal ratatouille, maple‑syrup‑drizzled pancakes, and hearty lentil soup, while experimenting
    with herbs like thyme and sage, and enjoys occasional brunches at a local bistro that serves a signature avocado toast.
  core: Teresa Trosclair blends an organized, community‑focused teaching style with a love for gardening, craft, and quiet reflection, balancing curiosity and practicality while occasionally yielding to
    impulsive coffee cravings.
background:
  cultural: Teresa was born and raised in the Greater Boston area and identifies as a white American of French‑Canadian descent, a heritage reflected in her family name. Her upbringing in a modest, middle‑class
    New England neighborhood emphasized the value of education, community involvement, and civic responsibility. While her family maintained some Catholic traditions, Teresa grew up in a region known for
    its cultural diversity, and living in Dorchester has broadened her perspective, fostering an appreciation for the many cultures that contribute to the neighborhood’s character. This blend of New England
    roots and daily exposure to a multicultural community informs both her teaching philosophy and her personal outlook.
