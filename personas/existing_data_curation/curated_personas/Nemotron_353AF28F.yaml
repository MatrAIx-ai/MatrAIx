  career_goals: Teresa aims to advance to a lead teacher or curriculum coordinator role within her preschool program, focusing on inclusive and culturally responsive early‑learning practices. She plans
    to earn an associate degree in Early Childhood Education and pursue a special‑education endorsement to better support children with diverse needs. In the longer term, she hopes to develop a community‑based
    early‑literacy outreach initiative that partners with local libraries and families in Dorchester, and eventually, she envisions opening a small nonprofit preschool that emphasizes play‑based learning
    and family engagement.
