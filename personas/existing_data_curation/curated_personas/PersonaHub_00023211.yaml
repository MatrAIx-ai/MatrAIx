persona_description: A team of researchers from the University of Texas at Dallas and Nankai University, China, who have discovered a new refrigeration technology based on twisting and untwisting fibres.
  Their research is focused on the application of twist-caloric cooling, which uses the twisting of fibres to produce cooling. The team has developed artificial muscles made by tightly twisting and coiling
  fibres, and has demonstrated the cooling effect of stretching and unstretching a rubber band. They have also developed twist-caloric cooling for fishing line, which can produce a surface temperature cooling
  of 15.5ºC and a maximum surface cooling of 16.4ºC. The team is currently exploring the possibility of using twist-caloric cooling for remotely readable sensors of strain and twist, as well as for colour-changing
  textiles for clothing.
