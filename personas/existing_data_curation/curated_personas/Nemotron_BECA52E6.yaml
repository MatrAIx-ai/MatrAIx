  career_goals: Jerome aims to complete his high‑school diploma within the next year and then enroll in a hospitality‑management program at a community college. His short‑term goal is to become a head bartender
    and eventually a bar manager, where he can apply his organizational strengths to streamline operations. In the longer term he aspires to open his own neighborhood bar that features a curated selection
    of craft cocktails and local brews, creating a welcoming space for his community. He also hopes to mentor younger workers and give back to local youth programs.
