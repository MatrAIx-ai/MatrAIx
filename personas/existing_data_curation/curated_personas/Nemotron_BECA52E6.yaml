personas:
  professional: Jerome Thomas works as a bartender at a bustling downtown lounge, where they apply meticulous inventory control, swift conflict resolution, and a flair for crafting both classic and innovative
    cocktails, reflecting their love of structure and reliability.
  sports: Jerome Thomas plays pickup basketball with a close group of friends on weekends, follows the Charlotte Hornets and NC State Wolfpack during the season, and complements cardio drills at Lake Norman
    with regular visits to a local gym, preferring structured workouts over spontaneous exercise.
  arts: Jerome Thomas unwinds to the smooth grooves of Marvin Gaye, the lyrical flow of J. Cole, and the soulful vibes of H.E.R., often curating late-night playlists that serve as a soundtrack for cocktail
    experimentation, and they attend occasional open-mic nights at neighborhood venues, drawing creative inspiration for new drink concepts.
  travel: Jerome Thomas enjoys short road trips to Asheville’s craft breweries and the historic charm of Savannah, while dreaming of a future journey to New Orleans for its legendary cocktail scene and
    to Copenhagen to explore New Nordic cuisine, preferring itineraries centered on food and drink experiences over spontaneous backpacking.
  culinary: Jerome Thomas cooks Southern soul-food for family gatherings, mastering fried chicken with buttermilk brine, collard greens seasoned with smoked paprika, and bourbon-glazed peach cobbler, while
    their home bar experiments often feature fresh citrus, aromatic bitters, and a dash of smoked rosemary.
  core: Jerome Thomas is a 19-year-old bartender who blends a love for structured mixology with late-night gaming marathons, and they occasionally forget to lock their car, scrambling for spare change at
    the end of a busy shift.
background:
  cultural: Jerome is an African‑American raised in the South, with family roots that trace back to the Great Migration and a strong connection to the local church community. Growing up in Mooresville,
    North Carolina, he has been immersed in Southern hospitality traditions, soul‑food cuisine, and community festivals that blend African‑American cultural heritage with the broader regional culture. His
    upbringing emphasized family solidarity, respect for elders, and the value of contributing to the community, all of which shape his personal and professional outlook.
