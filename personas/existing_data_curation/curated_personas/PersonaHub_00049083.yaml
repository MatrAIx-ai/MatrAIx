persona_description: A teacher who believes in the transformative power of drama and is passionate about helping shy, quiet, and anxious children develop self-esteem, creativity, empathy, and problem-solving
  skills through engaging and inclusive drama classes. They value the group dynamic, collaboration, and creative thinking that drama fosters and are committed to creating a safe, supportive, and non-competitive
  environment for their students to thrive. They believe that drama can help children develop important life skills such as communication, listening, observation, and concentration, and they are excited
  to share these benefits with their students during the summer holidays.
