  career_goals: Michael aims to advance from a front‑line representative to a team lead within the next two years, eventually stepping into a supervisory or operations‑manager role in customer experience.
    He plans to enroll part‑time at Baton Rouge Community College to earn an associate degree in Business Administration, complemented by certifications such as the Certified Customer Service Professional
    (CCSP) and a basic data‑analytics credential. Michael is also interested in developing a bilingual support program for the growing Hispanic customer base at his company, leveraging his cultural background
    and language skills. While pursuing these goals, he balances practical skill acquisition with his curiosity for new technologies, staying open to opportunities in account management or sales that align
    with his desire for steady career growth and work‑life balance.
