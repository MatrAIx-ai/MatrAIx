personas:
  professional: An aspiring junior network administrator, Reynaldo Moua leverages their meticulous Excel spreadsheets, basic Python scripts, and hardware troubleshooting skills to design efficient network
    solutions for small businesses, while also planning to integrate tech upgrades for the family‑run restaurant.
  sports: A disciplined karate practitioner and loyal fan of the Sacramento Kings, Reynaldo Moua trains at the Sacramento Rapids Martial Arts Academy, follows NBA games every night, occasionally joins local
    pickup basketball, and hikes the American River Parkway each weekend to maintain fitness and mental clarity.
  arts: An avid anime enthusiast, Reynaldo Moua binges series such as My Hero Academia, Haikyuu!!, and Attack on Titan, collects limited‑edition figurines, enjoys strategy board games like Gloomhaven, and
    attends local community theater productions to unwind from the rigors of school.
  travel: A methodical traveler, Reynaldo Moua prefers pre‑planned itineraries, has explored Yosemite and Lake Tahoe on weekend trips, dreams of visiting Kyoto to experience the anime culture firsthand,
    and saves a fixed portion of earnings each month to fund a future semester‑break road trip along the Pacific Coast Highway.
  culinary: A dedicated home chef, Reynaldo Moua perfects traditional pho broth with star anise, ginger, and fish sauce, crafts fresh spring rolls using rice paper and cilantro, and meticulously records
    each recipe’s timing and seasoning ratios in a digital notebook to preserve family culinary heritage.
  core: A detail‑driven 18‑year‑old who balances anxiety‑filled over‑planning with disciplined karate sessions, puzzle‑solving marathons, and a passion for anime, Reynaldo Moua strives for measurable milestones
    while quietly worrying about every missed deadline.
background:
  cultural: Reynaldo is a first‑generation American of Vietnamese descent. His parents arrived in Sacramento as refugees in the early 1990s and operate a small family‑run Vietnamese restaurant in the city’s
    Little Saigon district. He grew up bilingual, speaking Vietnamese at home and English at school, and he regularly celebrates Tet and other Vietnamese holidays with his extended family. The community
    places a high value on education, hard work, and respect for elders, which reinforces Reynaldo’s practical outlook, disciplined work ethic, and commitment to supporting his family.
attributes:
  skills: '["time management", "organized record-keeping", "event planning", "basic Python programming", "computer hardware troubleshooting", "Excel spreadsheet analysis", "budgeting", "cooking Vietnamese
