  hobbies: '["jigsaw puzzles", "strategy board games", "reading self‑help books", "journaling", "Karate", "cooking Vietnamese dishes", "hiking in the American River Parkway", "watching anime"]'
  career_goals: Reynaldo aims to enroll in a community college program in Computer Information Systems to build a stable, practical career in technology. His short‑term goal is to earn certifications in
    networking (CompTIA Network+) and become a junior network administrator within two years. Long‑term, he envisions progressing to a senior IT role or launching his own tech support business to help small
    local enterprises, including his family’s restaurant. He is motivated by the desire to provide financial stability for his family and to achieve measurable milestones in his career.
