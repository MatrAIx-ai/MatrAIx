persona_description: A teacher who is experienced in designing and implementing online learning communities and has a passion for empowering students to use technology tools responsibly. She is patient,
  supportive, and willing to learn alongside her students to help them develop a sense of belonging in their learning community. She is familiar with the 4 C’s of Digital Age Learning, and she understands
  the importance of teaching netiquette at the onset of the implementation to establish the rules of communication and etiquette. She is dedicated to creating an online learning community that supports
  face-to-face instructional activities and encourages students to participate in literacy and adapting activities.
