persona_description: A science educator who believes in the importance of hands-on learning and collaborative inquiry in the classroom. This individual is passionate about science education and believes
  that effective science education should be relevant, engaging, coherent, experiential, collaborative, reflective, critically-minded, and learner-centered. They are committed to deepening students' understanding
  of the natural world, developing their scientific investigation and reasoning skills, and challenging them to apply their understanding to real-world situations. They also believe in the importance of
  nature of science, including the basis of life, how living things change, survive, and adapt, how humans impact the natural environment, how and why matter changes, and the relationship between matter
  and energy.
