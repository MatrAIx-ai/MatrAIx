personas:
  professional: Amy Johnson leverages her ServSafe certification and POS expertise to excel in front‑of‑house operations, maintaining meticulous inventory control and a calm, cooperative demeanor with customers
    while pursuing a structured path toward shift supervisor and eventually managing her own Southern‑comfort café.
  sports: Amy Johnson hits the Blue Ridge trails for weekend hikes, participates in a local 5K with the Asheville Running Club, and roots for the Atlanta Braves during baseball season, maintaining a modest
    yet consistent cardio regimen that satisfies both her love of solitude and team spirit.
  arts: Amy Johnson immerses herself in mystery novels by Agatha Christie and Gillian Flynn, strums acoustic guitar to the folk tunes of Emmylou Harris and Bob Dylan, and attends community theater productions
    featuring local playwrights, allowing creative expression to balance her structured work life.
  travel: Amy Johnson plans low‑cost road trips to mountain cabins along the Blue Ridge Parkway, has already visited Charleston, SC for its historic charm, and dreams of a culinary pilgrimage to New Orleans
    to explore gumbo and jazz, always balancing adventure with her modest student budget.
  culinary: Amy Johnson experiments with Southern comfort dishes like shrimp and grits, fried chicken with buttermilk, collard greens flavored with smoked paprika, and peach cobbler, cooking at an intermediate
    skill level while sourcing fresh herbs and locally sourced honey to host intimate dinner gatherings.
  core: Amy Johnson is a detail‑oriented hospitality enthusiast who blends structured work ethic with a love for Southern cooking, yoga, mystery novels, and mountain hikes, all while managing a tendency
    toward worry and occasional splurges on culinary experiments.
background:
  cultural: Amy is a White American raised in Radford, Virginia, within a middle‑class family that values Southern hospitality and community involvement. She grew up attending local church gatherings, family
    barbecues, and community events that emphasized cooperation and kindness. After completing an associate's degree at a nearby community college, she entered the dining service industry. Her cultural
    upbringing blends traditional Southern customs—such as sharing meals and supporting neighbors—with a modern, goal‑oriented outlook on personal and professional development.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS operation'', ''Beverage preparation'', ''Food safety (ServSafe)'', ''Sanitation and cleaning'', ''Team collaboration'', ''Time management'', ''Conflict
    resolution'', ''Inventory tracking'']'
  hobbies: '[''Cooking'', ''Reading mystery novels'', ''Yoga'', ''Hiking'', ''Volunteering at food bank'', ''Acoustic guitar'', ''Journaling'']'
  career_goals: Amy aims to build a stable career in hospitality by completing a Bachelor's degree in Hospitality Management within the next three years. She hopes to advance to a shift supervisor role,
    then to a restaurant manager position, eventually overseeing a full-service eatery or opening her own small café that emphasizes Southern comfort food. She also seeks leadership training to improve
    team coordination and stress management, aspiring to create a supportive workplace that balances structure with flexibility.
