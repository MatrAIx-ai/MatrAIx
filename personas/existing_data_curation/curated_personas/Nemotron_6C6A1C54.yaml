  career_goals: Brannon aims to leverage his expertise into a senior executive role within the education sector, such as Director of Operations for a regional school district or a statewide education services
    organization. He plans to pursue an EdD to deepen his knowledge of educational leadership, lead district‑wide initiatives that modernize instructional delivery, and mentor emerging educators. Ultimately,
    he envisions transitioning to a consulting practice that helps schools improve efficiency and student outcomes while maintaining a stable financial future and a balanced lifestyle.
