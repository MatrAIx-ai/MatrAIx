persona_description: A teacher who specializes in the teaching of students with dysgraphia, dyslexia, and OWL LD. They are interested in using research-based instruction to improve the literacy skills of
  students who struggle with written language. They are looking for a comprehensive set of lesson plans that can be used for differentiated instruction of students with these disabilities. The lessons are
  designed to be flexible and encourage teachers to monitor each student's individual response to instruction, so they can make adjustments as needed. They are also interested in incorporating reading and
  writing in science and social studies content areas of the curricula. The lessons show how to integrate writing and reading within a writers workshop or writing/readers workshop, and they are detailed
  but not rigid.
