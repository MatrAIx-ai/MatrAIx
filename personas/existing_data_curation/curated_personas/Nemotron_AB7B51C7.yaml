personas:
  professional: An aspiring art therapist, Velencia Carter uses their empathetic listening and basic CBT techniques to integrate guided acrylic painting and collage into dynamic group sessions, and they
    maintain meticulous case notes while staying flexible enough to adapt session plans to each client’s evolving needs.
  sports: A versatile fitness enthusiast, Velencia Carter hits the coastal trail at Palos Verdes for sunrise hikes, attends hip‑hop and contemporary dance classes at Movement Lab, practices yoga at West
    LA Yoga, and they cheer on the Los Angeles Lakers, Dodgers, and Galaxy while occasionally joining a weekend intramural basketball league with friends.
  arts: A vibrant creator, Velencia Carter spends evenings splashing acrylics inspired by the bold lines of Jean‑Michel Basquiat and the immersive patterns of Yayoi Kusama, sketches downtown Los Angeles
    skylines after attending exhibitions at The Broad, and they regularly devour contemporary poetry by Ocean Vuong and novels by Sally Rooney, letting these influences shape their personal blog’s aesthetic.
  travel: An adventure‑curious planner, Velencia Carter maps out weekend getaways to Santa Barbara’s wine country, sunrise hikes in Joshua Tree, and occasional trips to New York City’s Museum Mile, while
    they dream of a future art‑focused pilgrimage to Kyoto, balancing a student budget with a love for spontaneous street‑art tours.
  culinary: A culinary explorer, Velencia Carter delights in tasting LA’s Korean BBQ at Sapporo, savoring fresh ceviche at Guelaguetza, and trying hand‑rolled sushi at Tsujita, while they whip up homemade
    avocado toast with poached eggs and sprinkle sumac on roasted cauliflower, skillfully documenting each flavorful adventure on their blog.
  core: Velencia Carter is a curious, art‑driven aspiring therapist who balances vibrant creativity, disciplined organization, and a sociable, energetic lifestyle, and they budget meticulously while embracing
    spontaneous dance and hiking sessions.
background:
  cultural: Velencia identifies as African American and grew up in the vibrant, multicultural environment of Southern California. Her family traditions include church gatherings, soulful music, and community
    service, which instilled a strong sense of collective responsibility. She celebrates Black History Month and participates in local cultural festivals, while also embracing the diverse influences of
    the Los Angeles area, from the culinary scene to the arts. This blended cultural heritage informs her empathetic approach to therapy, especially when working with clients from marginalized backgrounds.
attributes:
  skills: '[''Active Listening'', ''Empathetic Communication'', ''Crisis Intervention'', ''Group Facilitation'', ''Basic CBT Techniques'', ''Art Therapy Techniques'', ''Case Documentation'', ''Conflict
    Resolution'', ''Multicultural Competence'', ''Time Management'', ''Organizational Flexibility'', ''Stress Management'']'
  hobbies: '[''Acrylic Painting'', ''Sketching'', ''Visiting Art Exhibitions'', ''Hip‑hop Dance'', ''Contemporary Dance'', ''Yoga'', ''Hiking Coastal Trails'', ''Reading Contemporary Fiction and Poetry'',
    ''Mentoring Youth'', ''Exploring Diverse Cuisines'', ''Blogging about Art and Culture'']'
  career_goals: Velencia aims to complete a bachelor's degree in psychology and then a master's in counseling within the next four years, eventually obtaining licensure as a marriage and family therapist.
    She plans to specialize in art therapy to merge her love for creative expression with mental health work. Long‑term, she hopes to establish a community‑based counseling center in Torrance that offers
    culturally responsive services for underserved Black and Latino youth, and to design outreach programs that integrate art workshops and peer support.
