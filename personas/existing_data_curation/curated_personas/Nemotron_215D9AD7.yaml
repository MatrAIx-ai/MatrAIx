  career_goals: Juan Emilio dreams of a future where he can help others directly. He imagines becoming a pediatric doctor or veterinarian so he can care for children and animals, and he is also fascinated
    by the idea of being a firefighter because of the bravery and community service it involves. Inspired by his love of building and problem‑solving, he hopes to study science or engineering to design
    inventions that make everyday life safer and healthier. To reach these goals, he plans to keep his grades strong, join the school science club, and continue volunteering as a classroom helper.
