personas:
  professional: Juan Rivero, a budding junior scientist in the school’s science club, channels their curiosity and practical mindset into designing simple experiments about space while using their compassionate
    nature to help peers understand project steps.
  sports: Juan Rivero, a lively midfielder for the under‑10 community soccer team, trains after school three times a week, cheers for the local professional club City United, and uses the sport’s teamwork
    to channel their outgoing energy while balancing structured drills with spontaneous scrimmages.
  arts: Juan Rivero, an avid reader of adventure tales like "The Lost Island" and a cartoon sketcher who idolizes artist Bill Watterson, dances to family‑sung folk rhythms, and builds intricate LEGO designs
    that double as personal art installations, intertwining storytelling, music, and visual creativity.
  travel: Juan Rivero favors spontaneous weekend road trips to nearby national parks, such as Redwood Reserve, and dreams of exploring the International Space Center in Houston, blending a love for nature
    with a fascination for space documentaries, while family budget constraints shape modest, family‑oriented travel plans.
  culinary: Juan Rivero enjoys helping their mother assemble tacos with freshly chopped cilantro, lime, and seasoned beef, while also experimenting with simple desserts like chocolate‑chip cookies, showing
    a playful yet earnest approach to cooking that mixes tradition with childhood curiosity.
  core: Juan Rivero, an energetic nine‑year‑old who balances curiosity with compassion, channels their love for soccer, LEGO, and stories into teamwork, creative play, and a habit of emotional spending
    that sometimes fuels anxiety.
background:
  cultural: Juan Emilio was born to Mexican immigrant parents in Los Angeles and grows up in a bilingual household where Spanish is spoken daily alongside English. His family maintains strong ties to Mexican
    traditions, celebrating Día de los Muertos, Cinco de Mayo, and birthday quinceañera preparations for relatives. He attends a public elementary school with a robust English‑Spanish dual‑language program,
    which reinforces his fluency and cultural pride. Weekend visits to the local Mexican market, community festivals, and attending a Catholic church with a predominantly Mexican congregation further embed
    cultural values of family solidarity, respect, and community service. The vibrant Mexican‑American community in East LA offers him role models—musicians, artisans, and community leaders—who shape his
    identity and inspire his compassionate outlook.
