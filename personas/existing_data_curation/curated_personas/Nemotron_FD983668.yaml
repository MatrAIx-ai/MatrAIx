  career_goals: Frances aims to transition into a mentorship role, guiding emerging managers in the Luzerne County area and volunteering as a business consultant for small, family-owned enterprises. She
    also hopes to spearhead a community health and wellness program that leverages her organizational expertise while ensuring a secure and dignified retirement that allows her to remain active in local
    civic affairs.
