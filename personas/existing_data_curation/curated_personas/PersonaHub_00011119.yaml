persona_description: A conservation biologist with expertise in waterfowl ecology and management, focusing on the Intermountain region in British Columbia, Canada. The individual is dedicated to identifying
  and mitigating the key limiting factors that affect waterfowl populations, maintaining and enhancing regulations, legislation, and policies that improve habitat quality, maintaining current waterfowl
  populations and species composition, encouraging forestry practices that emulate natural ecological processes, and maintaining wetland habitat quantity and quality. The persona is knowledgeable about
  the importance of waterfowl to the region, the decline in populations over the last 30 years, and the challenges posed by wetland loss and rangeland degradation.
