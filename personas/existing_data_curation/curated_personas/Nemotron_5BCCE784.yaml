personas:
  professional: Megan Yocum, a budding community outreach coordinator in training, leverages meticulous planning, clear communication, and a compassionate approach to organize teen wellness events while
    balancing a demanding school schedule and periods of anxiety.
  sports: Megan Yocum stays active by playing varsity volleyball for the Zionsville Panthers, joining the Zionsville Youth Soccer Club during spring, cheering for the Indiana Hoosiers women's soccer team
    and the Indiana Pacers, and fitting in weekend jogs at the local park to balance competition with community.
  arts: Megan Yocum unwinds by strumming a ukulele to indie favorites like Tegan and Sara, curating playlists featuring Billie Eilish and Phoebe Bridgers, crafting friendship bracelets inspired by folk
    motifs, and journaling nightly reflections after reading self‑help titles by Brené Brown.
  travel: Megan Yocum enjoys weekend road trips to Indianapolis' downtown cultural district, visits the Amish farms in nearby Ohio, and dreams of exploring the historic streets of Charleston, SC, though
    their travel budget remains modest.
  culinary: Megan Yocum experiments with comfort dishes like homemade chicken pot pie, avocado toast with radish and microgreens, and berry crumble, favoring fresh basil, rosemary, and locally sourced apples,
    but occasionally burns cookies when anxiety spikes.
  core: Megan Yocum is a detail‑oriented teen who channels anxiety into structured community projects, yet can’t resist late‑night chip binges during stressful study sessions.
background:
  cultural: Megan was raised in Zionsville, Indiana, a predominantly white, middle‑class suburban community with strong Midwestern values of community involvement, modesty, and self‑reliance. Her family
    emphasizes family ties, participation in local events such as town fairs and church gatherings, and the importance of practical, hands‑on skills. While her formal education is still in progress, she
    benefits from a supportive family environment and a local culture that values hard work, courteous interaction, and contributing to the well‑being of the neighborhood.
attributes:
  skills: '["Event planning", "Active listening", "Basic computer literacy", "Time management", "Team coordination", "Empathy", "First aid certification"]'
  hobbies: '["Organizing teen social events", "Playing volleyball", "Crafting (friendship bracelets, journaling)", "Listening to music and playing ukulele", "Volunteering at community clean‑ups and church
    events", "Reading fiction and self‑help books", "Cooking and baking"]'
  career_goals: Megan aims to complete her GED and attend a community college where she can study health administration or social services. She envisions a stable, structured career that leverages her organizational
    talent and compassion, such as becoming a medical office assistant or a community outreach coordinator for a local mental‑health nonprofit. In the longer term, she hopes to obtain a bachelor's degree
    in counseling or public health so she can serve as a peer support specialist, helping other young adults manage anxiety and emotional distress. Her immediate ambition is to secure a part‑time administrative
    role that offers mentorship while she builds the academic credentials needed for her future goals.
