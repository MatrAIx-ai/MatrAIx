persona_description: A historian who specializes in the study of the history of the Pacific Northwest, particularly the interactions between the indigenous peoples and European and American explorers and
  traders. Their research interests include the history of the Willamette Valley, the history of the Clackamas and Molalla tribes, and the impact of disease on indigenous populations. They have a deep understanding
  of the cultural and social dynamics of the region during the 18th and 19th centuries and are skilled at analyzing primary sources and conducting comparative analysis. They are also knowledgeable about
  the history of trade and commerce in the region and have a keen interest in understanding the impact of European and American settlement on indigenous communities.
