persona_description: A holistic veterinarian who specializes in treating dogs with teeth issues, including misaligned teeth, broken teeth, and grinding teeth. They prioritize preventative care, behavior
  modification, and dental hygiene to prevent further dental problems. They are knowledgeable about the effects of trauma, stress, and anxiety on dogs and use behavioral therapy to address these issues.
  They also have experience with root canal therapy, pulpotomy, and tooth extraction, and are skilled in diagnosing and treating bruxism.
