personas:
  professional: Matthew Savoie, a retired construction foreman and former small‑business owner, channels his Associate of Applied Science in Industrial Technology and four decades of hands‑on project scheduling,
    carpentry, and bookkeeping into mentoring teen apprentices at the community center, coordinating volunteer home‑repair projects for his church, and serving as the neighborhood's trusted advisor for
    home maintenance, where they apply a methodical, detail‑oriented mindset and a cautious skepticism toward untested solutions.
  sports: Matthew Savoie, a steady fan of low‑impact exercise, joins a senior walking club that meets twice weekly along the Stroud Creek trail, follows the Chicago Cubs for baseball and the Green Bay Packers
    for football on television, and occasionally plays a friendly round of senior golf at the nearby Riverside Country Club, where they appreciate the predictable rhythm of the sport but avoid overly competitive
    leagues.
  arts: Matthew Savoie, who finds solace in the arts through reading Thomas Hart Benton's paintings of the American Midwest, listening to bluegrass legends like Bill Monroe, attending the annual local crafts
    fair featuring woodworking demonstrations, and occasionally replaying the nostalgic melodies of Johnny Cash on his vintage record player, integrates this cultural appreciation into his woodworking designs
    and bridge evenings.
  travel: Matthew Savoie, a calculated traveler, prefers meticulously planned road trips to historically rich destinations such as the Henry Ford Museum in Dearborn, the Badlands National Park for its stark
    scenery, and a family reunion in Savannah, Georgia, balancing his love of heritage with health constraints by limiting trips to short, well‑scheduled drives and staying in familiar motels that offer
    easy access to quiet walks.
  culinary: Matthew Savoie, whose culinary routine centers on garden‑fresh produce like heirloom tomatoes, butter lettuce, and sweet corn, often prepares hearty Midwestern staples such as pot roast with
    root vegetables, chicken and dumpling casserole, and a signature apple‑cinnamon crumble made with locally sourced apples, while their favorite indulgence remains a strong black coffee paired with a
    buttery cinnamon roll on weekend mornings.
  core: Matthew Savoie, an 82‑year‑old retired foreman who blends methodical craftsmanship with a quiet competitive streak, fills his days with gardening, woodworking, model‑train precision, and community
    mentorship, while navigating occasional forgetfulness, frugality, and a skeptical eye toward new ideas.
background:
  cultural: Matthew is a white Midwesterner with deep roots in Franklin County, Indiana. His family traces back to French‑Canadian immigrants who settled in the region in the late 19th century, blending
    with the broader Anglo‑American farming culture. He was raised in a modest, Protestant household that prized self‑reliance, community service, and respect for tradition. The cultural fabric of his upbringing
    emphasizes punctuality, hard work, and modest social gatherings, aligning with the close‑knit, small‑town life of Winchester and its surrounding rural communities.
attributes:
  skills: '["Carpentry", "Basic Plumbing", "Electrical Troubleshooting", "Project Planning & Scheduling", "Small Business Bookkeeping", "Inventory Management", "Basic Computer Literacy"]'
  hobbies: '["Vegetable Gardening", "Woodworking", "Model Train Building", "Reading Historical Non-Fiction", "Bridge (card game)", "Walking along Stroud Creek"]'
  career_goals: Although retired, Matthew aims to preserve the family homestead and ensure it remains functional for future generations. He plans to document his life’s work and woodworking techniques in
    a small memoir for his grandchildren, while continuing to mentor local teens through hands‑on workshops at the community center. Maintaining his health and independence is a priority, as is staying
    actively involved in the local church’s service projects, where he can apply his organizational skills to coordinate volunteer efforts.
