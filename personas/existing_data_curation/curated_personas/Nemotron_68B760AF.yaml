personas:
  professional: Mario Stepp, a seasoned retail operations manager with four decades of experience in staff supervision, meticulous inventory control, and data‑driven budgeting, leverages their skeptical
    yet curious nature to mentor junior managers while selectively adopting technologies such as modern point‑of‑sale systems, balancing strict organization with flexible problem‑solving to improve profit
    margins.
  sports: Mario Stepp, an early‑morning fisherman who belongs to the Meridian Anglers Club and follows the Mississippi State Bulldogs football team and the New Orleans Saints, maintains fitness through
    daily Bayou walks, light weight‑training at the local gym, and weekly chess matches that they treat as mental sport.
  arts: Mario Stepp, who finds comfort in the Southern gospel harmonies of The Blind Boys of Alabama and the soulful voice of Aretha Franklin, regularly reads biographies of civil‑rights leaders, attends
    their church’s choir performances, and channels their creative side into crafting small furniture pieces inspired by mid‑century designers such as Charles and Ray Eames.
  travel: Mario Stepp, who prefers meticulously planned road trips that blend history and relaxation, has driven to Washington, D.C. to tour the National Museum of African American History and Culture,
    explored the jazz streets of New Orleans, and dreams of a heritage pilgrimage to Accra, Ghana, all while balancing travel costs against their family commitments.
  culinary: Mario Stepp, a competent home cook with a penchant for soul‑food classics, regularly prepares fried catfish with hush‑puppies, collard greens seasoned with smoked turkey, and sweet‑potato pie
    using fresh garden produce, occasionally experiments with gumbo, but tends to over‑salt their dishes when juggling woodworking projects.
  core: Mario Stepp, a pragmatic yet curious 69‑year‑old whose disciplined stewardship of their shop and finances coexists with a quiet competitive streak that surfaces in fishing, chess, and mentoring,
    while hoarding receipts and vintage car parts as personal trophies.
background:
  cultural: 'Mario grew up in a close‑knit black community in Meridian, absorbing the traditions of Southern gospel music, soul‑food cooking, and the church’s role as a social hub. His family’s stories
    of the civil‑rights era instilled a respect for perseverance and self‑reliance. The cultural landscape of Lauderdale County shaped his values: humility, hard work, and a deep sense of responsibility
    to his extended family and neighbors. These influences guide both his professional demeanor and his personal passions.'
attributes:
  skills: '[''staff supervision'', ''inventory management'', ''budgeting and cost control'', ''customer service excellence'', ''conflict resolution'', ''process optimization'', ''data-driven decision making'',
