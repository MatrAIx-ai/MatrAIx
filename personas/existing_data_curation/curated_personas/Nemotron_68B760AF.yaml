  hobbies: '[''fishing'', ''woodworking'', ''reading historical biographies'', ''listening to blues and gospel music'', ''chess'', ''crossword puzzles'', ''gardening'', ''attending church small group meetings'',
    ''classic car restoration'']'
  career_goals: Approaching retirement, Mario aims to leverage his decades of hands‑on management into a consulting and mentorship role for small, family‑owned businesses in Lauderdale County. He is driven
    to codify his practical knowledge into a training manual, ensure a smooth succession plan for his current store, and secure a stable financial legacy for his wife and grandchildren. While competitive
    by nature, he now seeks to channel that drive into helping the next generation outperform his own achievements.
