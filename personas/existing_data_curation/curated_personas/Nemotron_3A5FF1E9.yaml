  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Reading Art History'', ''Classical Music Listening'', ''Hiking'', ''Cycling'', ''Gardening'', ''Meditation'', ''Tai Chi'', ''Journaling'']'
  career_goals: Looking ahead, Matthew aims to transition from a full‑time instructor to a mentor‑coach role, establishing a boutique studio in the Davis‑Solano area that offers low‑impact, art‑inspired
    movement classes for older adults and individuals seeking a quieter fitness experience. He plans to develop a community wellness program that pairs physical activity with local art exhibitions, encouraging
    participants to explore creativity while improving health. Additionally, he hopes to author a guidebook titled “Mindful Movement and Art for Lifelong Wellness,” and to serve as a guest lecturer on integrative
    fitness at a nearby community college or the UC Davis Extension. Consulting for corporate wellness programs that emphasize stress‑free, solitary workout options is also on his agenda.
