personas:
  professional: Sharon Caruso, a veteran NYPD detective with three decades of experience in forensic accounting, digital forensics, and art‑theft investigations, blends meticulous case‑file organization
    with a flexible, curiosity‑driven approach, leveraging a competitive edge to pursue unconventional leads while mentoring junior detectives toward integrating financial forensic methods into everyday
    policing.
  sports: Sharon Caruso, an avid fan of the New York Knicks and Yankees, quietly attends games, plays senior‑level tennis at the Westside Tennis Club on weekends, and maintains fitness through brisk walks
    in Central Park during autumn and light yoga sessions at home, reflecting a competitive spirit tempered by low‑impact exercise preferences.
  arts: Sharon Caruso spends quiet afternoons at the Metropolitan Museum absorbing works by Claude Monet and Pablo Picasso, sketches watercolor studies of gallery scenes, collects vintage crime postcards,
    and delights in listening to operatic arias of Maria Callas while rereading Agatha Christie mysteries, merging visual and literary passions into their personal creative ritual.
  travel: Sharon Caruso, whose travel style blends meticulous planning with spontaneous museum stops, has explored the historic galleries of Florence, the street‑art districts of Berlin, and the tranquil
    gardens of Kyoto, yet dreams of a secluded cabin in the Adirondacks where they could sketch the sunrise in solitude.
  culinary: Sharon Caruso enjoys crafting hearty home‑cooked meals such as slow‑braised short ribs with rosemary, fresh garden salads tossed with aged balsamic reduction, and hand‑rolled pasta with fragrant
    basil pesto, often sourcing ingredients from the local farmer’s market and occasionally treating herself to a fine‑dining tasting menu featuring seared scallops and wild mushroom risotto.
  core: Sharon Caruso is a meticulous, art‑loving detective who balances disciplined financial habits, solitary creative pursuits, and a competitive yet wary outlook on life, all while wrestling with lingering
    stress and a penchant for meticulous organization.
background:
  cultural: Sharon grew up in a modest Italian-American neighbourhood in Brooklyn, an environment steeped in the traditions of post‑war immigrant families. The community emphasized self‑reliance, respect
    for hard work, and a strong sense of identity, which informed her independent disposition. Living her adult life in the multicultural fabric of New York City broadened her exposure to diverse cultural
    expressions, fostering an appreciation for art, literature, and unconventional ideas. This blend of Italian heritage and metropolitan openness shapes her investigative lens, often prompting her to consider
    cultural motives behind criminal behavior while maintaining a healthy skepticism of surface narratives.
attributes:
  skills: '[''Criminal investigation'', ''Forensic accounting'', ''Financial fraud detection'', ''Interviewing and interrogation'', ''Surveillance techniques'', ''Case file management'', ''Data analysis
