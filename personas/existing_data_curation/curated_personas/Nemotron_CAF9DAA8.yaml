    "Member of a women''s business networking group"]'
  career_goals: Dorothy aims to transition into a district-level instructional leadership role, such as Curriculum Coordinator or Instructional Coach, where she can scale her interdisciplinary curriculum
    models across schools. She plans to earn an Educational Leadership certification and eventually pursue a doctorate in Education Administration. Passionate about advocating for the inclusion of financial
    literacy in early grades, she seeks to secure sustainable funding for community‑based enrichment programs. In the medium term, she hopes to mentor a cohort of teachers, lead statewide professional development
    workshops, and influence policy to bridge academic learning with practical life skills, all while piloting innovative initiatives that are grounded in proven outcomes.
