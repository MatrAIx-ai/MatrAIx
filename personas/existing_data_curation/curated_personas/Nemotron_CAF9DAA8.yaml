personas:
  professional: Dorothy Hemmati is a veteran elementary and middle school teacher who balances curiosity with practicality, and they leverage their business graduate training to design interdisciplinary
    curricula that fuse financial literacy with hands‑on problem solving, while leading PLCs, mentoring newcomers, and managing grant budgets with data‑driven precision.
  sports: Dorothy Hemmati enjoys lacing up for local 5K runs, tackling weekend treks through Monongahela National Forest, cheering on the West Virginia Mountaineers football team, and is an active member
    of the Morgantown running club, where they blend competitive spirit with community camaraderie.
  arts: Dorothy Hemmati thrives on stage as a member of the Morgantown community theater, performing in productions ranging from classic Shakespeare to contemporary musical revues, while also crafting sets
    inspired by Appalachian folklore, and they cite Meryl Streep and Lin‑Manuel Miranda as artistic inspirations.
  travel: Dorothy Hemmati prefers weekend getaways that combine outdoor adventure and cultural immersion, such as exploring the Blue Ridge Parkway, visiting Asheville’s art districts, and they have a long‑term
    wish to travel to Ireland’s historic villages to trace the roots of the folk tales they teach, all planned around school calendar breaks and modest travel savings.
  culinary: Dorothy Hemmati treats the kitchen as a laboratory, regularly cooking Appalachian staples like ramp soup, fried green tomatoes, and cornbread harvested from their garden, while also mastering
    Thai green curry and Ethiopian injera, and they often share these dishes at board‑game nights and classroom cooking projects.
  core: Dorothy Hemmati merges a teacher’s practicality with a community‑centered spirit, balancing meticulous budgeting, health monitoring, and creative pursuits, and they occasionally indulge in spontaneous
    book buys and late‑night set‑design brainstorming.
background:
  cultural: Dorothy grew up in the Appalachian foothills of West Virginia, a region shaped by close‑knit community ties, a respect for nature, and a resilient work ethic. Her family, of primarily German
    and Irish descent, has lived in the area for several generations, preserving traditions such as folk music, storytelling, and seasonal community gatherings. She attended West Virginia University for
    her business graduate studies, where she absorbed a broader national perspective while maintaining strong ties to her hometown. The local culture’s emphasis on self‑reliance, hospitality, and community
    service informs her teaching philosophy and her commitment to empower students with practical life skills. While she identifies with mainstream American culture, Dorothy’s upbringing instills an appreciation
    for Appalachian heritage, which she celebrates through participation in local festivals and by incorporating regional history into her classroom.
