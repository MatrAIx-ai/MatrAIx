personas:
  professional: Angela Callaway, a ten-year-old aspiring engineer, applies her meticulous LEGO building skills and love of structured routines to excel in school science projects, eagerly taking the lead
    in group work while quietly fretting over the accuracy of every detail.
  sports: Angela Callaway zealously plays on the local 'Eagle Cubs' youth soccer team, idolizes the professional women's club Portland Thorns FC for their cohesive play, and dedicates after-school practices
    to balancing teamwork drills with the same structured focus she applies to her LEGO builds.
  arts: Angela Callaway immerses herself in the arts through piano practice, school drama productions of "The Wizard of Oz," choir performances of "You Raise Me Up," and a growing playlist that features
    Disney's "Frozen" songs and Taylor Swift's pop hits, often rehearsing lines aloud to perfect every expression.
  travel: Angela Callaway's travel scrapbook shows trips to the local science museum in Chicago, a family vacation at Disney World in Florida, and a summer camp at the seaside in Maine, while she dreams
    of exploring the ancient ruins of Athens to walk in the footsteps of Greek heroes from her Percy Jackson books.
  culinary: Angela Callaway loves tossing together spaghetti with marinara sauce, sprinkling Parmesan, munching pepperoni pizza slices, and whipping up strawberry-banana smoothies with fresh berries and
    Greek yogurt, often insisting on arranging the food on her plate in neat, colorful sections.
  core: Angela Callaway is a detail-obsessed, stage-loving ten-year-old whose penchant for perfect LEGO builds and piano scales is matched by a constant undercurrent of worry that fuels her meticulous planning
    and relentless need to be in the spotlight.
background:
  cultural: Angela is a white American child of European ancestry growing up in Brookline, New Hampshire, a small New England town known for its close‑knit community and emphasis on education. Her family
    celebrates traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with community gatherings and local parades. She participates in typical New England seasonal activities, including
    leaf‑peeping in the fall and outdoor sports in the summer. The town's culture values politeness, civic involvement, and a strong sense of neighborly responsibility, which influence Angela's outlook
    and daily experiences.
attributes:
  skills: '["Organizational planning", "Public speaking", "Basic coding (Scratch)", "Piano playing", "Peer mediation"]'
  hobbies: '["Building LEGO sets", "Reading adventure books", "Playing piano", "Drama club", "Soccer", "Journaling", "Community gardening"]'
  career_goals: Angela aspires to a career that blends her love of structure, her sociable nature, and her desire to help others. She dreams of becoming a teacher or a veterinarian, where she can create
    predictable, supportive environments for children or animals. She also envisions a future role as a community organizer or youth program leader, guiding groups and planning events. Throughout her aspirations,
    she hopes to develop strategies for managing stress and supporting peers, potentially studying child psychology or wellbeing as part of her long‑term goals.
