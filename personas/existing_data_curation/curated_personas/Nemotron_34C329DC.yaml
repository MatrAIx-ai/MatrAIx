  hobbies: '[''DIY electronics (Arduino/Raspberry Pi)'', ''Woodworking'', ''Chess'', ''Cycling'', ''Hiking'', ''Vegetable gardening'', ''Home brewing'', ''Puzzle solving (Sudoku, crosswords)'', ''Reading
    scientific and technical literature'', ''Attending small maker meet‑ups'']'
  career_goals: Although currently not in the paid workforce, Jared aims to leverage his technical portfolio into a selective, part‑time consulting practice. He aspires to help small‑to‑mid‑size manufacturers
    in the Cincinnati corridor adopt data‑driven lean processes, positioning himself as a trusted advisor. Over the next five years he plans to earn a professional data‑science certification, contribute
    open‑source tools for automation, and author a practical guide on integrating IoT solutions in residential settings. His competitive drive also pushes him to compete in local hack‑athon and maker‑fair
    challenges, using them as benchmarks for his personal growth.
