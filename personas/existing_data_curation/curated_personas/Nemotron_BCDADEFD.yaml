personas:
  professional: Shie Williams is an aspiring visual storyteller, merging sketching, photo editing, and narrative journaling into a growing multimedia portfolio, and their relaxed approach to deadlines lets
    them explore unconventional ideas while their kindness fosters collaborative projects in the school art club; they often volunteer to mentor younger members in technique.
  sports: Shie Williams enjoys weekend nature hikes and is a midfield member of the Jackson County Youth Soccer Club, while cheering for the Kansas City Chiefs, Kansas City Royals, and Sporting Kansas City;
    they favor low-key fitness like bike rides along the Kansas River over intense gym workouts.
  arts: Shie Williams immerses themselves in indie folk playlists featuring Sufjan Simmons and Phoebe Bridgers, draws inspiration from the bold patterns of Yayoi Kusama and the street humor of Banksy, and
    they regularly reread graphic novels such as 'Maus' and 'Saga' to fuel their own sketchbook narratives.
  travel: Shie Williams often spends summer weekends on spontaneous day trips to the St. Louis Gateway Arch and Lake Ozark with family, and dreams of future adventures in New York City's museums, the Grand
    Canyon's hiking trails, and a culturally vibrant week in Florence, Italy, though they usually rely on parents to handle the logistics and prefer flexible itineraries.
  culinary: Shie Williams loves the smoky bite of Kansas City barbecue ribs and the crisp freshness of avocado toast topped with radish, cherry tomatoes, and a drizzle of lemon, while on lazy afternoons
    they experiment with homemade sushi rolls featuring cucumber, crab meat, and a dash of wasabi, and they never turn down a warm bowl of creamy mac and cheese with cheddar and breadcrumbs.
  core: Shie Williams is a curious, art-driven teen who balances solitary sketching with community art club collaborations, a love of indie folk, a habit of journaling every thought, and a charmingly disorganized
    approach to school assignments and allowance budgeting, and they often find themselves daydreaming while waiting for the school bus.
background:
  cultural: Shie grows up in a predominantly white, middle‑class family in the Kansas City suburbs of Jackson County, Missouri. Her upbringing reflects typical Midwestern values such as community involvement,
    modesty, and a strong emphasis on family ties. She participates in local community events like county fairs and school arts festivals, which reinforce a sense of belonging. While her cultural heritage
    is primarily American with European roots, she is exposed to a diverse urban environment that enriches her appreciation for varied artistic expressions and new ideas.
