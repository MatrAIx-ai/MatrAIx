  career_goals: Shie aspires to turn her love of art into a career as a multimedia artist or illustrator, hoping to attend a reputable art‑focused college after high school. She dreams of creating a personal
    portfolio that blends hand‑drawn artwork with digital media, and eventually wants to work on community‑based art projects that promote social harmony. In the longer term, she envisions establishing
    a small studio where she can collaborate with like‑minded creators and offer workshops for other teens interested in expressive arts.
