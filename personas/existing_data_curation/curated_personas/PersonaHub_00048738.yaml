persona_description: A healthcare professional who specializes in the treatment and management of muscle atrophy, particularly in the elderly population. They have a deep understanding of the underlying
  causes of muscle atrophy, the various treatments available, and the importance of nutrition in muscle repair and growth. They are passionate about helping their patients improve their quality of life
  through the use of innovative treatments and lifestyle modifications. They are also knowledgeable about the impact of age-related changes in body composition and the risks associated with sarcopenia,
  and are committed to providing comprehensive care that addresses both the physical and psychological aspects of this condition.
