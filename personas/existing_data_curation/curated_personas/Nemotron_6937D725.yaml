personas:
  professional: Manuel Hernandez is a 35‑year‑old aerospace engineer who leverages deep CFD and propulsion expertise, Python and CAD fluency, and a graduate humanities background to lead cross‑functional
    satellite subsystems, translating technical trade‑offs into ethically‑rooted project narratives while they occasionally let perfectionism slow down sprint cycles.
  sports: Manuel Hernandez plays midfield in a local recreational soccer league, cheers for the national team during World Cup seasons, follows Charlotte FC in the MLS, and belongs to a regional hiking
    club that tackles the Blue Ridge foothills each weekend, while they also train three times weekly at the community gym to maintain overall fitness.
  arts: Manuel Hernandez devours Latin American literature, especially works by Mario Vargas Llosa and the philosophical essays of Albert Camus, they also translate these ideas into short reflections on
    their blog, strum acoustic guitar evenings covering Silvio Rodríguez and José González, and attend local theater productions featuring contemporary playwrights.
  travel: Manuel Hernandez prefers short road trips to the Blue Ridge Mountains for photography hikes, while they also plan longer cultural escapes to destinations like Barcelona, Buenos Aires, and Costa
    Rica, balancing detailed itineraries with spontaneous detours, all within the constraints of family commitments and a moderate travel budget.
  culinary: Manuel Hernandez spends Saturday afternoons perfecting baleadas with refried beans, queso fresco, and chicharrón, they also craft pupusas stuffed with loroco and revuelta, experiment with sous‑vide
    pork shoulder for Sunday roasts, and relish pairing each meal with fresh hibiscus agua de bugambilia and a side of plantain chips.
  core: Manuel Hernandez balances a rigorous aerospace career with weekend culinary fiestas, hiking adventures, and a habit of over‑packing their DSLR bag, they love mentoring young engineers while never
    quite mastering a regular sleep schedule.
background:
  cultural: Manuel was born to Honduran immigrant parents who settled in the United States when he was a child. Raised in a bilingual household, he grew up speaking Spanish at home while attending English‑speaking
    schools, giving him a deep appreciation for both Honduran traditions and Southern American culture. He maintains strong ties to his heritage through regular visits to family in Honduras, celebrating
    holidays such as Semana Santa and Día de la Independencia, and participating in the Honduran community events in Charlotte and the broader North Carolina area. His Catholic upbringing and the collectivist
    values of his family emphasize loyalty, respect for elders, and community service, which influence his collaborative work style and commitment to mentoring younger generations. This bicultural identity
    informs his worldview, blending a strong sense of duty to his family with a forward‑looking, innovative mindset in his professional life.
