  career_goals: Manuel aims to lead a multidisciplinary aerospace program that develops sustainable satellite platforms, progressively advancing to a senior engineering or program manager position within
    a leading space organization such as NASA, SpaceX, or a defense contractor. He intends to integrate ethical considerations and humanistic perspectives into mission design, advocating for responsible
    space exploration. Over the next decade, he plans to complete a Ph.D. in aerospace engineering or a master's in technology policy, publish research on eco‑friendly propulsion, and mentor emerging Latino
    engineers through outreach initiatives. He also seeks to balance his career growth with family commitments, establishing a supportive work‑life integration.
