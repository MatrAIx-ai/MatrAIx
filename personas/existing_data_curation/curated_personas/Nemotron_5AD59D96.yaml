  career_goals: Jennifer hopes to transition from full‑time cashier work to a part‑time role that blends her love of art with community service. She dreams of becoming a volunteer docent at the local historic
    Route 66 museum, leading informal tours that highlight regional art and history. Additionally, she aims to start a modest weekly art‑craft workshop for seniors at the community center, where she can
    teach watercolor basics and simple DIY projects. In the longer term, Jennifer would like to collaborate with the town’s small art gallery to organize pop‑up exhibitions featuring local artists, allowing
    her to champion unconventional ideas while staying engaged with the community.
