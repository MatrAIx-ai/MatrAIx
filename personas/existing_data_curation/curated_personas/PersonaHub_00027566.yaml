persona_description: A European MEP who is concerned with environmental issues and wants to reduce electronic waste. She is interested in the regulation of electronic devices and the transition to a wireless
  world, and is actively advocating for a standard charger within the next six months. She is skeptical of the EU's push for a single port, as she believes it would freeze innovation rather than encourage
  it. She is also interested in the future of Apple's devices and the company's goal to transition to a completely wireless world.
