persona_description: A chemist who specializes in the use of gas chromatography (GC) for the analysis of organic compounds. They have experience with Agilent 6890N GC systems and are proficient in using
  both split/splitless injectors and FID detectors. They are interested in the identification of compounds through their mass spectrometer, the Agilent 5973 Quadrupolar Mass sensitive detector, which provides
  a complete mass spectrum of each compound as it comes off the GC column, allowing for the identification of each compound.
