personas:
  professional: Alexander Lamoureux, a 27-year-old software engineer with a STEM background, leverages their knack for pragmatic problem-solving and collaborative communication to prototype hardware-software
    solutions in mission-driven startups, often opting for flexible, loosely-planned sprints while still delivering well-documented code.
  sports: Alexander Lamoureux, a 27-year-old outdoor enthusiast, spends weekends kayaking the Chain of Lakes, joins the St. Paul Trail Club for group hikes, roots for the Minnesota Vikings and Twins during
    the season, and fits in functional workouts at the community gym without adhering to a rigid training schedule.
  arts: Alexander Lamoureux, a 27-year-old amateur guitarist, unwinds with acoustic jam sessions inspired by John Mayer and Iron & Wine, devours speculative fiction by Neal Stephenson and N.K. Jemisin,
    curates a personal photography series of urban scenes reminiscent of Vivian Maier, and frequents the Walker Art Center for contemporary installations.
  travel: Alexander Lamoureux, a 27-year-old avid weekend traveler, often escapes to Duluth’s lakefront for kayaking, dreams of seeing the Northern Lights in Iceland, has a soft spot for quirky coffee shops
    in Portland, Oregon, and is budgeting for a future backpacking trek across the Canadian Rockies, balancing spontaneous local outings with carefully planned overseas adventures.
  culinary: Alexander Lamoureux, a 27-year-old home-cooking hobbyist, whips up walleye tacos with lime-pickled cabbage and hot sauce, perfects a classic Minnesota hotdish on chilly evenings, experiments
    with single-origin pour-over coffee, and frequently snacks on trail-mix while tinkering on electronics projects.
  core: Alexander Lamoureux, a 27-year-old curious tinkerer, balances a love for DIY electronics with a laid-back approach to planning, often staying up late to prototype new gadgets while neglecting sleep,
    and finds harmony in guitar strings, trail runs, and spontaneous community meetups.
background:
  cultural: Alexander grew up in Saint Paul, Minnesota, within a family that traces its roots to French‑Canadian ancestors, a heritage reflected in the Lamoureux surname. His upbringing blended Midwestern
    communal values—hospitality, modesty, and a strong emphasis on education—with occasional French‑Canadian cultural touches such as bilingual exposure and participation in local Franco‑Minnesota festivals.
    He identifies with the progressive, nature‑loving spirit of the Twin Cities, valuing community service, outdoor recreation, and a balanced, inclusive lifestyle.
