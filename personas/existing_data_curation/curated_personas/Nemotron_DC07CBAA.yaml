  career_goals: Lois aims to advance to a supervisory rank within the Wilson Police Department, aspiring to become a sergeant and eventually a captain. She is passionate about establishing a comprehensive
    community‑policing curriculum that integrates her education background, focusing on school safety, mental‑health awareness, and proactive engagement with local residents. In the next five years she
    hopes to lead a department‑wide training program, mentor junior officers, and coordinate a precinct‑based outreach center that offers educational workshops and resources for families. Long‑term, she
    envisions transitioning into a senior liaison role or a director of community safety initiatives, perhaps collaborating with regional agencies to improve public‑service delivery across Nash County.
