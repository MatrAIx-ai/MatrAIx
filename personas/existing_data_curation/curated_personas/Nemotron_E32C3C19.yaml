personas:
  professional: Vanessa Felts, a veteran front‑line customer‑service specialist with decades of CRM expertise, blends a skeptical eye for process gaps with a pragmatic love of clear communication, channeling
    a competitive spirit into meeting training targets while tolerating a relaxed, sometimes chaotic schedule as they mentor junior reps and champion staff‑wellness workshops.
  sports: Vanessa Felts, a devoted fan of the Detroit Tigers and the local high school basketball team, joins the Fremont senior walking club for sunrise lakeshore strolls, occasionally tosses a gentle
    ball in the community’s bowling league, and prefers low‑impact exercise that lets them indulge their competitive puzzle‑solving mindset without overtaxing aging joints.
  arts: Vanessa Felts, an avid reader of Jane Austen and Mary Shelley, finds solace in the folk melodies of Bob Dylan and traditional fiddle tunes played at community gatherings, attends the annual county
    fair’s craft exhibition, and channels their critical eye into knitting intricate cable‑pattern afghans while secretly critiquing the local theater’s productions.
  travel: Vanessa Felts, who prefers quiet, well‑planned getaways over spontaneous tours, treasures past trips to Mackinac Island’s Victorian streets and annual visits to Door County’s cherry orchards,
    while dreaming of a relaxed pilgrimage to the historic castles of the Scottish Highlands, all balanced against a modest travel budget and the need for regular medication schedules.
  culinary: Vanessa Felts, a garden‑to‑table enthusiast, often cooks lake‑caught perch with lemon‑dill butter, prepares hearty potato salad and soda bread for family gatherings, and treats themselves to
    a slice of warm apple crumble at the farmer’s market, though they occasionally forget to defrost meat due to a scatter‑brained kitchen routine.
  core: Vanessa Felts, a 73‑year‑old puzzle‑loving, garden‑tending, customer‑service veteran, navigates life with a competitive edge, a relaxed schedule, and a constant undercurrent of anxiety that fuels
    meticulous self‑care rituals.
background:
  cultural: Vanessa is a white Midwestern American whose family lineage includes German and Irish ancestors who settled the Great Lakes region in the late 1800s. Raised in Fremont, Michigan, she grew up
    with the region’s blend of self‑reliance, modesty, and community involvement. Her upbringing emphasized respect for hard work, seasonal rhythms, and participation in local traditions such as county
    fairs and church gatherings. While she embraces these Midwestern values, she also appreciates the cultural diversity of the area, including the culinary heritage of lake‑front towns and the importance
    of preserving local history.
