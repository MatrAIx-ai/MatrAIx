  career_goals: Vanessa aims to transition into a senior trainer role where she can pass on her practical knowledge to newer representatives, while also championing initiatives that improve the emotional
    well‑being of staff. She hopes to become a recognized subject‑matter expert on customer‑experience best practices within her company and to eventually take on a part‑time consulting position for small
    local businesses, helping them design customer‑focused processes. Managing her own anxiety through mindfulness practices is also a personal goal she wishes to integrate into her professional life by
    leading wellness workshops for colleagues.
