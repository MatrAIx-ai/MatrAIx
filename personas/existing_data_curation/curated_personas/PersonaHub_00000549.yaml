persona_description: A literature professor who specializes in the study of literary theory and criticism, particularly the works of T. S. Eliot and the modernist movement. His research interests include,
  but are not limited to, the analysis of Eliot's use of emotion and feeling in his writing, the comparison of Eliot's literary style with that of other modernist writers, and the impact of Eliot's works
  on contemporary literature. He is particularly interested in the intersection of Eliot's work with the ideas of aesthetics, poetics, and cultural theory.
