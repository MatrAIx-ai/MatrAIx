  hobbies: '[''Visiting art museums and galleries'', ''Reading historical fiction and biographies'', ''Genealogy research'', ''Knitting and quilting'', ''Community gardening'', ''Attending public lectures'',
    ''Playing piano'', ''Walking in nature preserves'']'
  career_goals: Though retired, Yvonne’s ambitions remain vibrant. She aims to curate a traveling art exhibit that showcases works by senior artists in the Springfield area, and to expand the historical
    society’s oral‑history archive with interviews of longtime residents. She hopes to complete a memoir that interweaves her family genealogy with reflections on Midwestern cultural change. Additionally,
    she plans to deepen her knowledge of art history through a local university’s lifelong‑learning program and to mentor a new generation of volunteers, fostering intergenerational connections.
