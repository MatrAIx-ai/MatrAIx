personas:
  professional: Yolanda Patterson, a seasoned automotive body repair specialist, blends two decades of sheet‑metal shaping, MIG/TIG welding, and digital estimating expertise with a curiosity‑driven yet
    pragmatic approach, and leverages their relaxed, occasionally disorganized work style to mentor apprentices while pursuing an ASE certification and plans for an eco‑friendly community studio.
  sports: Yolanda Patterson enjoys low‑impact fitness like early‑morning walks in the Trenton River Trail, follows the New York Giants and the Trenton Thunder baseball team, participates in a community
    bowling league on Saturdays, and occasionally joins a local senior tennis club during the summer months, all while they keep a relaxed attitude toward structured training.
  arts: Yolanda Patterson curates evenings listening to classic soul and R&B on vintage vinyl—spinning records by Marvin Gaye, Aretha Franklin, and Stevie Wonder—while also knitting in a weekly community
    circle inspired by folk patterns, and they find inspiration in biographies of pioneering women engineers that fuel their creative problem‑solving.
  travel: Yolanda Patterson favors short, well‑planned road trips to historic towns like Savannah and coastal retreats such as Atlantic City, balancing their desire for quiet exploration with a modest travel
    budget and a love for discovering local auto museums along the way.
  culinary: Yolanda Patterson delights in farm‑to‑table cooking, often preparing tomato‑basil pasta and rosemary‑infused grilled chicken using herbs harvested from their raised‑bed garden, while occasionally
    treating themselves to Southern‑style BBQ ribs and homemade apple pie during community potlucks.
  core: Yolanda Patterson is a pragmatic yet curious auto body veteran who, despite occasional disorganization and worries, channels their love of vintage music, gardening, and mentorship into a quietly
    ambitious pursuit of sustainable entrepreneurship.
background:
  cultural: Yolanda grew up in the historically black neighborhoods of Trenton, where church gatherings, soul music, and family stories shaped her identity. Her father worked as an auto mechanic, introducing
    her to the world of cars at a young age, while her mother was active in the local church choir. The strong sense of community and resilience in her upbringing helped her navigate a predominantly male
    trade, and she carries the legacy of African‑American craftsmanship into her work. She celebrates cultural traditions through food—such as collard greens and cornbread—attends annual Juneteenth events
    in Mercer County, and stays connected to a network of black professionals in the automotive industry.
attributes:
  skills: '[''Sheet metal shaping'', ''Frame straightening'', ''MIG/TIG welding'', ''Rust repair'', ''Spray painting'', ''Color matching'', ''Computerized estimating (CCC One)'', ''Quality control inspection'',
    ''Customer communication'', ''Mentoring apprentices'']'
  hobbies: '[''Listening to soul and R&B music'', ''Gardening (raised‑bed vegetables)'', ''Reading automotive magazines and biographies'', ''Attending local car shows'', ''Journaling for stress management'',
    ''Knitting circle at community center'']'
  career_goals: Despite her solid reputation at the local collision shop, Yolanda aspires to formalize her knowledge with an Automotive Body Repair Certification from the National Institute for Automotive
    Service Excellence. She envisions eventually opening a modest, community‑focused auto body studio where she can offer flexible work hours, employ a small team of apprentices, and introduce eco‑friendly
    repair materials. Additionally, she hopes to lead workshops on safe welding practices and to become a mentor for other women entering the trade, balancing her entrepreneurial drive with her desire to
    give back to the Trenton community.
