  career_goals: Although officially retired, Zariyah aims to remain intellectually active and socially contributive. She plans to volunteer as a mentor for local high‑school STEM programs, help develop
    accessible engineering curricula for adult learners, and document her professional journey in a memoir that highlights the evolution of women and African‑American engineers. She also hopes to collaborate
    with city planners on sustainable landscaping projects that preserve native Florida ecosystems, and to stay engaged in lifelong learning through short courses in emerging technologies.
