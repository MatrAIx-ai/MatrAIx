personas:
  professional: Zariyah Mccoy, a retired civil engineer famed for meticulous structural analysis and data-driven project planning, applies their organized, methodical nature and talent for clear instructional
    communication to mentor high-school STEM students and draft sustainable landscaping guidelines for Pensacola’s city planners.
  sports: Zariyah Mccoy stays active by walking the historic streets of Pensacola with the local Heritage Trail Club, participates in a weekly senior tennis league at the community center, and avidly follows
    the Tampa Bay Buccaneers and the Pensacola Blue Wahoos, cheering them on during football season and spring minor‑league baseball.
  arts: Zariyah Mccoy finds artistic solace in singing with their church choir, crocheting intricate patterns while listening to the soothing strums of James Taylor, and immerses themselves in the works
    of Maya Angelou and the jazz classics of Billie Holiday, often attending performances at the Pensacola Museum of Art featuring contemporary Southern painters like John Davis.
  travel: Zariyah Mccoy prefers carefully planned, low‑tempo trips that blend cultural immersion with coastal relaxation, having revisited New Orleans to savor Creole cuisine, explored the historic districts
    of Charleston and Savannah, and dreamed of a guided sailing tour through the Florida Keys and the Bahamas.
  culinary: Zariyah Mccoy, an enthusiastic home cook with a solid intermediate skill set, often experiments with Creole classics like shrimp étouffée seasoned with Andouille sausage and cayenne, bakes sweet
    potato pie topped with toasted pecans, and pairs these dishes with fresh Gulf‑coast oysters, all while meticulously documenting recipes in a weather‑proof notebook for future garden harvests.
  core: Zariyah Mccoy blends an analytical engineer’s precision with a deep love for Southern gardens, choir harmonies, and community mentorship, all while stubbornly refusing to replace their vintage flip‑phone,
    which they claim still outperforms modern gadgets.
background:
  cultural: Zariyah was raised in Pensacola's close‑knit African‑American community during the Civil Rights era, where church, family, and mutual support shaped her worldview. Her cultural identity is reflected
    in her love for gospel music, participation in Juneteenth celebrations, and the preservation of Southern culinary traditions passed down through generations. She values intergenerational storytelling,
    community service, and the resilience of her ancestors, weaving these influences into her mentorship, volunteer work, and everyday interactions.
