persona_description: A development professional with expertise in agricultural extension and climate change adaptation, particularly in Bangladesh. They are interested in building the capacity of agricultural
  extension workers and development professionals to deal with climate change impacts and adaptation, specifically targeting drought-prone areas of Bangladesh. They are familiar with the impacts of droughts
  on agriculture in Bangladesh and the tools and methods needed for assessing climate-related risks at community level, focusing on the agriculture sector. They are interested in developing agricultural
  adaptation options to manage climate variability and climate change in drought-prone areas of Bangladesh and forecasting products currently available in Bangladesh for improving the adaptive capacity
  of rural livelihoods to climate risks.
