personas:
  professional: Lidia Rojas, an aspiring home‑based caterer, transforms her methodical budgeting, precise meal planning, and event‑orchestration abilities into flawlessly organized community gatherings,
    constantly pushing herself to outdo fellow vendors with a fiercely competitive edge.
  sports: Lidia Rojas favors low‑impact exercise, regularly walking the local Riverside Park with her senior walking club, cheers for the hometown baseball team the River City Mariners, and joins the community’s
    adult softball league each summer for a modest competitive outlet.
  arts: Lidia Rojas indulges in the timeless boleros of Armando Manzanero while devouring historical novels by Isabel Allende, and she occasionally supports local theater productions starring the Emerald
    Players troupe.
  travel: Lidia Rojas plans travel with meticulous itineraries, prefers structured cultural tours, has visited historic European cities such as Seville and the colonial town of Antigua, and dreams of a
    future agritourism retreat in the highland valleys.
  culinary: Lidia Rojas, a self‑taught chef, excels at crafting heritage‑inspired dishes such as slow‑braised pork adobo with citrus, corn‑husk wrapped dumplings, and salsa verde made from tomatillos and
    jalapeños, often sourcing fresh ingredients from her own seasonal garden.
  core: Lidia Rojas blends disciplined organization with a quietly competitive spirit, turning every garden, kitchen, and community event into a precise, tradition‑rich showcase, while occasionally allowing
    a sweet tooth for bolero‑inspired desserts to slip through her strict regimen.
background:
  cultural: Lidia was born and raised in a close‑knit Mexican family from the state of Veracruz, where Catholic faith, family gatherings, and vibrant traditions such as Día de los Muertos and posadas shaped
    her upbringing. Spanish remains her first language, and she passes its cadence and Mexican culinary customs to her family. Since moving to Evansville, Indiana, she has blended her heritage with Midwestern
    life, joining a local Hispanic community center, attending Spanish‑language masses, and celebrating cultural holidays with neighbors. Her cultural identity is a source of pride that informs her daily
    routines, cooking, and community involvement.
attributes:
  skills: '[''Household budgeting'', ''Meal planning and Mexican cuisine preparation'', ''Vegetable gardening'', ''Sewing and quilting'', ''Bilingual Spanish-English translation'', ''Minor home repairs'',
    ''Event coordination for community gatherings'', ''Time management and scheduling'', ''Record-keeping and documentation'']'
  hobbies: '[''Vegetable gardening'', ''Traditional Mexican cooking'', ''Quilting and sewing'', ''Reading historical novels'', ''Listening to classic Mexican music'', ''Walking in local parks'', ''Small
    book-club gatherings'', ''Participating in cooking contests'', ''Volunteer work at church events'', ''Puzzles and crosswords'']'
  career_goals: Though not currently employed, Lidia channels her organizational talent toward personal and community ambitions. She aims to complete her GED within the next year to formalize her education,
    launch a modest home‑based catering service featuring authentic Mexican dishes for local events, and expand her role as a volunteer coordinator for her church’s outreach programs. Additionally, she
    seeks to develop a sustainable garden to supply fresh produce for her family and community workshops, ensuring financial stability for her household while preserving cultural heritage.
