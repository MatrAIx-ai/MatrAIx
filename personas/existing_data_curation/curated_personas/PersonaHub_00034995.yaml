persona_description: A Washington State University Extension educator who specializes in soil science and orchard management, particularly in north central Washington. His expertise lies in the correction
  of soil pH and nutrient levels, the identification of nutrient deficiencies, and the application of lime and nutrients to orchard soils. He has experience with checking soil pH and nutrient levels at
  least a year ahead of planting, and is knowledgeable about the importance of correcting soil pH and nutrient levels in orchard soils. He is also experienced in fumigation and the control of replant disease.
