persona_description: A business owner or manager who is responsible for making decisions about how to use profit, such as reinvesting in the business, paying off debts, rewarding employees, and paying shareholders.
  They are interested in understanding the different types of profit that can be measured, such as gross profit, operating profit, and net profit, and how to calculate them. They may also be interested
  in learning about construction contracts and how they can be used to recover direct losses and expenses. They are likely to have a background in accounting and a strong understanding of financial management.
