  career_goals: Kimberly enjoys imagining future jobs that involve caring for others and maintaining order. She often talks about wanting to be a teacher who helps children learn, a veterinarian who helps
    animals stay healthy, or a librarian who organizes books. She is drawn to roles that allow her to plan, organize, and follow routines.
