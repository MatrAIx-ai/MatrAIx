personas:
  professional: Kimberly Sappia runs a meticulously organized pretend "store" on the living room rug, using their love of structure to inventory toy cars, price them in play‑money, and politely greet customers,
    foreshadowing a future career in small‑business entrepreneurship, and they eagerly practice the patience of a real shopkeeper.
  sports: Kimberly Sappia is a budding soccer fan who drills kick‑and‑run moves at the neighborhood Little League field, proudly wears a Los Angeles Dodgers cap while sprinting in backyard races, joins
    weekly toddler swim classes at the community pool, and they prefer structured game time over free‑form play.
  arts: Kimberly Sappia delights in drawing rainbow crayon pictures while humming the "Let It Go" chorus from Frozen, loves watching Pixar short films during family movie nights, and they exuberantly imitate
    The Wiggles' dance moves, weaving these artistic moments into daily imagination.
  travel: Kimberly Sappia favors short, parent‑planned adventures like Saturday trips to Santa Monica beach for sandcastle contests and annual visits to Disneyland, while daydreaming about a future family
    getaway to Maui’s Hana Highway where they imagine collecting seashells on tropical shores, and they cherish the mix of predictability and surprise these outings bring.
  culinary: Kimberly Sappia’s favorite meals include cheesy macaroni, crispy chicken nuggets, and sunny‑side‑up eggs, and they proudly assemble a fruit parfait with sliced strawberries, banana, and a drizzle
    of honey, often stirring it with a tiny wooden spoon while requesting a side of ketchup.
  core: Kimberly Sappia balances a meticulous toy‑sorting habit with a secret stash of gummy bears, pausing play to line up colorful blocks in perfect rainbow order before indulging in a sweet treat, and
    they often giggle at the contradiction.
background:
  cultural: Kimberly is raised in a white, middle‑class family in Valencia, a suburban community in Los Angeles County, California. Her upbringing combines typical American customs—celebrating holidays
    like Thanksgiving and Christmas and participating in community events such as neighborhood block parties—with the multicultural ambience of Southern California, where she is exposed to diverse foods,
    languages, and outdoor activities like beach trips and park outings. Her family emphasizes routine, education, and health‑focused values, reflecting the region’s blend of suburban stability and coastal
    openness.
