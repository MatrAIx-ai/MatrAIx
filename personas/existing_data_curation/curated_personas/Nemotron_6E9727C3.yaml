personas:
  professional: An aspiring healthcare professional, Madelin Dejesusvargas, is a 17‑year‑old high‑school senior who leverages their bilingual fluency, digital savviness, and strong interpersonal skills
    to lead youth‑center projects, tutoring peers in health topics while juggling a part‑time retail shift, all guided by their practical curiosity and deeply caring nature.
  sports: A dance‑focused fitness enthusiast, Madelin Dejesusvargas spends evenings honing hip‑hop and folk choreography at their school dance club, joins a local recreational soccer team on weekends, and
    follows the Dallas Mavericks, Dallas Cowboys, and FC Dallas closely, they use the games as social events to stay active and connected.
  arts: A culturally savvy creator, Madelin Dejesusvargas blends their love of the expressive beats of Bad Bunny, the storytelling of Olivia Rodrigo, and the dynamic choreography of Misty Copeland into
    short TikTok videos that showcase DIY fashion hacks, folk‑dance snippets, and illustrated sketches, they constantly seek fresh inspiration from YouTube dance tutorials and pop‑culture memes.
  travel: With a modest budget and a knack for last‑minute planning, Madelin Dejesusvargas frequently joins family road trips to Texas Hill Country vineyards, spends spring weekends at Austin’s live‑music
    festivals, dreams of exploring the historic plazas of Guatemala City and the neon streets of Tokyo, and they always book budget‑friendly hostels to stretch their limited savings.
  culinary: A budding home chef, Madelin Dejesusvargas enjoys mastering traditional dishes like tamales filled with pork and masa, hearty pozole brimming with hominy and chilies, while also experimenting
    with fusion tacos using quinoa, avocado, and sriracha, they often cook alongside family for holidays and share recipes on TikTok.
  core: Madelin Dejesusvargas is a 17‑year‑old energetic multitasker who balances a love for dance, DIY fashion, and community service with a habit of over‑planning their schedule, relentless worry about
    deadlines, and a nightly ritual of scrolling TikTok until the lights go out, and they often find themselves staying up far later than intended.
background:
  cultural: Madelin is a first‑generation Mexican‑American who grew up in a close‑knit Mexican household in Mesquite, Texas. Spanish is spoken at home, and she celebrates cultural traditions such as Día
    de los Muertos, Cinco de Mayo, and Mexican Independence Day with family gatherings, traditional foods, and community parades. Her family values collectivism, respect for elders, and a strong sense of
    community, which have shaped her cooperative and caring personality. Living in Dallas County, she blends her Mexican heritage with the broader Texan culture, attending a public middle school where she
    navigates both English‑dominant academic expectations and Spanish‑centric community events. The dual cultural exposure enriches her identity, fostering bilingual fluency, a love for Mexican dance and
    cuisine, and a deep appreciation for her neighborhood’s multicultural vibrancy.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Digital literacy (smartphones, social media, MS Word, PowerPoint)'', ''Interpersonal teamwork and empathy'', ''Event planning and coordination'',
