  hobbies: '[''Hip‑hop and folkloric Mexican dance'', ''Listening to regional Mexican and pop music'', ''Volunteering at church youth programs'', ''Cooking traditional Mexican dishes with family'', ''Playing
    video games with friends'', ''Reading YA novels'', ''Creating TikTok content'', ''DIY fashion customization'']'
  career_goals: Madelin’s immediate goal is to complete her high‑school education and earn a GED, followed by enrolling in a community college program that leads to a degree in nursing or social work. She
    is motivated by a desire to give back to her Mexican‑American community, particularly by providing culturally sensitive health care and mental‑health support for teens. In the short term, she hopes
    to secure a part‑time position at a local community center or retail store to gain work experience and financial independence. Long‑term, she aims to become a bilingual health professional who can advocate
    for teen mental‑wellness, perhaps establishing a youth outreach program that blends her caring nature with her practical organizational skills. She also dreams of continuing her involvement in cultural
    events, using her dance and artistic abilities to keep Mexican traditions alive on campus and in the wider Dallas County area.
