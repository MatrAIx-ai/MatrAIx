persona_description: A professor who emphasizes student-centered learning, active learning, authentic learning, and collaborative learning. They are familiar with Lieberman's research on the social view
  of learning and its potential impact on corporate training. They are interested in finding creative ways to enact the social view of learning and believe that the key to successful learning is in the
  give-and-take between those who are doing the learning. They are open to new ideas and approaches to teaching and believe that the social view of learning can transform education and corporate training.
