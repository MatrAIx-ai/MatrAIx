  career_goals: Cameron aims to move into a senior technical leadership role where he can shape product strategy at the intersection of technology and business. Over the next five years, he plans to become
    a principal engineer or engineering manager, leading a high‑performing team that builds products serving underrepresented communities. He also aspires to launch a nonprofit coding initiative in Fort
    Worth that provides mentorship and training for Black youth interested in tech, leveraging his business acumen to secure funding and partnerships.
