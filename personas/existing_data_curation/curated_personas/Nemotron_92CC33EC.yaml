  career_goals: Although approaching traditional retirement age, Mohammad plans to transition from full‑time shop floor work to a mentorship and consulting role. He aims to formalize a part‑time apprenticeship
    program at the local vocational school, share his knowledge through workshops on sustainable retrofitting of diesel equipment, and author a practical handbook on heavy‑vehicle maintenance for small
    operators. Additionally, he is exploring opportunities to collaborate with manufacturers on pilot projects that integrate electric‑drive technologies into legacy fleets, ensuring his expertise remains
    relevant in the evolving industry.
