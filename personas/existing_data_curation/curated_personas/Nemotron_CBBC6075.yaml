  career_goals: At 61, Arsenia envisions a gradual transition from full-time classroom teaching to a mentorship and advocacy role within the Tucson education community. She aims to launch an after‑school
    arts program that celebrates Mexican folk traditions and contemporary visual expression, seeking grant funding to sustain it. Arsenia also aspires to author a guidebook for teachers on integrating multicultural
    art into humanities curricula, drawing from her decades of experience. She intends to serve as a mentor for early‑career educators, offering coaching on bilingual instruction and culturally responsive
    pedagogy. Additionally, she hopes to collaborate with local museums and cultural centers to develop joint outreach initiatives that bring students into community art spaces. In the longer term, she
    envisions part‑time consultancy for school districts on curriculum design and inclusion strategies, ensuring her legacy of fostering curiosity and artistic appreciation endures beyond her retirement.
