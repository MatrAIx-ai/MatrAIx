persona_description: 'Julian is a passionate and committed bicycle advocate and environmental justice advocate, passionate about fashioning a more just and sustainable society. He is a lifelong advocate
  for car-free living and has expertise in the complex and embedded relations between humans and the environment, particularly in relation to justice and equity. He is a co-founder and co-editor of Local
  Environment: The International Journal of Justice and Sustainability, a professor at Tufts University, and a co-founder of the Transportation Justice Network. Julian is also a car-free pedestrian and
  a tireless advocate for a better quality of life for all, now and into the future, in a just and equitable manner, while living within the limits of supporting ecosystems.'
