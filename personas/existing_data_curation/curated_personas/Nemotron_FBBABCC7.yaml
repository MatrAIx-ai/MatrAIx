personas:
  professional: Saturnino Garcia, a 21‑year‑old budding muralist and street‑DJ, combines graffiti, digital illustration, and crowd‑reading charisma into freelance projects, yet they often lament their own
    aversion to rigid deadlines.
  sports: Saturnino Garcia dominates local courts shooting hoops, zips through skate parks on a battered board, and rides BMX trails, cheering for the San Antonio Spurs, the San Antonio FC, and the Texas
    Longhorns track team, while they keep fit through quick‑reflex drills and nightly pickup games.
  arts: Saturnino Garcia spends evenings tagging walls with vibrant murals inspired by Banksy and Shepard Fairey, curates impromptu DJ mixes that stitch together Kendrick Lamar verses with classic Tejano
    cumbias, and attends improv nights at the San Antonio Community Center, all while they eagerly document the city’s street‑art festivals and gallery openings.
  travel: Saturnino Garcia loves spontaneous road trips to Austin’s live‑music hubs, weekend jaunts to New Orleans for its jazz and street‑food markets, and occasional flights to Berlin’s famed graffiti
    alleys, preferring ad‑hoc itineraries over rigid tours, though budget constraints keep their adventures largely domestic.
  culinary: Saturnino Garcia hunts down crunchy fish tacos, spicy elote, and cheesy nachos from downtown food trucks, then replicates family‑style carne asada and homemade guacamole in their tiny kitchen,
    often experimenting with fresh cilantro, jalapeño, and lime, yet they tend to over‑salt their salsa when excitement peaks.
  core: Saturnino Garcia is a restless 21‑year‑old street artist who channels boundless curiosity and a competitive spark into vibrant murals, spontaneous DJ sets, and community hustle, even as they wrestle
    with deadlines and budgeting quirks.
background:
  cultural: Saturnino was raised in a close‑knit Mexican‑American family on San Antonio's Southside. He grew up bilingual, speaking both Spanish and English, and his household celebrated traditions such
    as Día de los Muertos, Christmas posadas, and family gatherings centered around tacos, tamales, and mole. The rich mix of Mexican heritage and Texan influences—like Tejano music, the annual Fiesta San
    Antonio, and the city's vibrant mural scene—has shaped his artistic sensibility and community‑oriented outlook.
attributes:
  skills: '["graffiti and mural painting", "digital illustration (GIMP, Procreate)", "audio mixing and DJing", "social crowd reading and event rallying", "street basketball", "skateboarding", "basic carpentry",
