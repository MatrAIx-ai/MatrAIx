  hobbies: '["visiting art galleries and street‑art festivals", "listening to hip‑hop and Tejano music", "playing street basketball", "skateboarding and BMX biking", "sampling Tex‑Mex street food", "photography
    and social‑media sharing", "watching documentaries on art and science", "participating in improv theatre"]'
  career_goals: Saturnino aims to turn his passion for street art and music into a sustainable creative career. He plans to earn his GED and enroll in a community college visual arts program while seeking
    apprenticeships with established muralists in San Antonio. He envisions working as a freelance graphic designer or muralist, collaborating on community projects that celebrate Mexican-American heritage.
    Long‑term, he hopes to launch a youth‑focused art collective that offers workshops, performance spaces, and mentorship for other young creators in his neighborhood.
