  career_goals: Although still a toddler, Geraldine frequently talks about becoming an artist or a scientist when she grows up. She dreams of creating beautiful paintings that tell stories and of discovering
    how things work, reflecting her love for art and abstract concepts. She also expresses a desire to explore nature, collect seashells, and perhaps work at a museum, showing a budding ambition to blend
    creativity with curiosity.
