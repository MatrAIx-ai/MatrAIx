personas:
  professional: Susan Gonyea, a veteran office administrator with four decades of mastery in typed correspondence, meticulous filing, and calendar coordination, leverages her skeptical eye for detail and
    love of routine to keep the community center’s operations running like a well‑oiled clock, while gently mentoring younger volunteers in systematic record‑keeping.
  sports: Susan Gonyea, an avid walker who joins the township’s senior walking club and follows the seasonal schedule of the local high‑school cross‑country team, enjoys cheering for the regional baseball
    club the River Valley Tigers, and keeps fit by participating in gentle bird‑watching hikes during spring and fall.
  arts: Susan Gonyea, a devoted choir member who delights in singing hymns alongside the church choir, spends evenings listening to vintage radio dramas such as The Shadow and Orson Welles’ Mercury Theatre,
    and treasures classic recordings by Ella Fitzgerald, Bing Crosby, and the poetry of Robert Frost.
  travel: Susan Gonyea, a cautious traveler who prefers carefully planned trips, has visited the historic town of Williamsburg, Virginia, the botanical gardens of Kew in London, and dreams of a relaxed
    cruise along the Norwegian fjords once her health permits, always booking through senior‑friendly travel agencies.
  culinary: Susan Gonyea, a modest home cook who favors simple, nutritious meals like vegetable stew with carrots, potatoes, and thyme, bakes hearty whole‑grain bread, and enjoys the occasional slice of
    apple pie made with Granny Smith apples and a pinch of cinnamon.
  core: Susan Gonyea, a 95‑year‑old pragmatist who blends routine‑driven diligence with a quiet competitive edge, keeps her garden in perfect order, rigorously tracks finances, and never misses a choir
    rehearsal, though she occasionally forgets to water the begonias on rainy days.
background:
  cultural: Susan grew up in a mid‑west, white, working‑class family in Ohio during the post‑World War II era, with roots tracing back to German and Irish immigrants. Raised in a Protestant household, she
    internalized values of hard work, self‑reliance, and community service. Her upbringing emphasized practicality, respect for tradition, and a strong sense of responsibility to family and neighbors, shaping
    the reliable and routine‑oriented persona she maintains today.
