  career_goals: Even at 95, Susan’s ambition centers on leaving a lasting legacy of order and dependability within her community. She aims to mentor younger volunteers at the local senior center and church
    office, passing on her systematic approach to record‑keeping and scheduling. She also wishes to ensure that the historical administrative files of her church are properly archived for future generations,
    thereby preserving the continuity of the organization she has served for decades.
