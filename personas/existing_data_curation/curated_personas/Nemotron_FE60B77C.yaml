  hobbies: '["Visiting art galleries and museums", "Indie film festivals", "Playing acoustic guitar", "Photography (street and nature)", "Raspberry Pi tinkering", "3D printing creative designs", "Hiking
    in Illinois state parks", "Reading science-fiction novels", "Listening to tech and science podcasts", "Experimental cooking", "Community theater involvement"]'
  career_goals: John aims to earn CompTIA Network+ and Security+ certifications within the next year, positioning himself for a senior systems analyst role. Over the next five years, he envisions moving
    into an IT management position at a regional university or municipal agency, where he can lead a small team and shape service delivery strategy. Parallel to his corporate goals, he plans to launch a
    side venture designing accessible, art‑focused websites for local galleries and independent artists, blending his technical expertise with his passion for creative expression.
