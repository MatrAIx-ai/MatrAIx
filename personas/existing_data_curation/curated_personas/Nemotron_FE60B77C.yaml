personas:
  professional: John Byrd is a 40‑year‑old IT support specialist who expertly troubleshoots Windows, macOS, and Linux environments, crafts automation scripts in PowerShell and Python, and leverages his
    artistic sensibility to propose user‑friendly UI tweaks while juggling a habit of loose task organization and a competitive drive to out‑perform peers.
  sports: John Byrd spends most weekends hiking the Illinois River Trail and cycling with the Galesburg Cycling Club, while cheering on the Chicago Cubs and the Illinois Fighting Illini football team, yet
    his loosely organized schedule sometimes leads to missed gym sessions.
  arts: John Byrd is a regular at Galesburg’s local galleries and the Quad City Film Festival, where he admires the kinetic installations of Refik Anadol and the narrative flair of director Chloé Zhao,
    often winding down with acoustic guitar sessions inspired by folk artist Iron & Wine.
  travel: John Byrd prefers spur‑of‑the‑moment road trips to Midwestern gems like Starved Rock State Park and the historic town of Galena, while reserving a yearly pilgrimage to Kyoto’s Nishijin weaving
    districts for inspiration, balancing these escapes with family obligations and a modest travel budget.
  culinary: John Byrd experiments with sous‑vide salmon, kimchi‑infused ramen, and lavender‑infused caramel desserts on weekends, often hunting for specialty ingredients like kombu, miso paste, and edible
    flowers at local farmers’ markets while juggling a tendency to over‑season dishes in the name of flavor exploration.
  core: John Byrd blends a tech‑savvy, art‑obsessed curiosity with laid‑back disorganization, a competitive drive, and a habit of turning everyday problems into creative hacks.
background:
  cultural: John is a white Midwesterner raised in Galesburg, Illinois, within a modest, middle‑class family with deep regional roots. His upbringing reflects the practical, community‑oriented values typical
    of the Midwest—hard work, neighborliness, and a strong sense of local identity. Exposure to local cultural institutions such as the Galesburg State theater and community college art courses cultivated
    his appreciation for the arts. He participates in regional traditions like county fairs and high school football games, while also embracing broader American cultural norms. This blend of practicality
    and artistic curiosity shapes his worldview and daily life.
