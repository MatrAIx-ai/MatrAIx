data:
  user 1 personas: 'I was accepted to participate.

    I am a shy person but i love to sing.

    Anyways i decided to give it a try and participated in an audition for a talent show.

    My shyness made me panick and i did not show up.

    Until recently i have never been able to sing in front of anyone.'
  user 2 personas: 'My guilty pleasure is mcdonald.

    I sell real estate and wait tables on the weekends.

    I am the youngest of 8 kids.

    I have a close circle of friends i would do anything for.

    I never stop looking for love.'
  Best Generated Conversation: 'User 1: I am a shy person but i love to sing. I was accepted to participate in an audition for a talent show. My shyness made me panick and i did not show up.

    User 2: That''s too bad. I love to sing too. I don''t mind being in front of an audience.

    User 1: I''m glad you''re not shy about it. I''ve always wanted to be able to sing in front of people, but I just get so nervous.

    User 2: Maybe you could try singing in front of a small group of friends or family first. That might help you get more comfortable with it.

    User 1: That''s a good idea. I''ll try that. Thanks for the advice.

    User 2: No problem. I''m always happy to help.

    User 1: So, what do you do for a living?

    User 2: I sell real estate and wait tables on the weekends.

    User 1: That sounds like a lot of work.

    User 2: It is, but it''s worth it. I love my job.

    User 1: I''m glad you like it. What''s your favorite thing about it?

    User 2: I love meeting new people and helping them find their dream homes.

    User 1: That''s really nice. I''m sure you''re great at your job.

    User 2: Thank you. I try my best.

    User 1: So, you''re the youngest of 8 kids?

    User 2: Yes, I am.

    User 1: Wow, that must have been a lot of fun growing up.

    User 2: It was! I always had someone to play with.

    User 1: That''s great. I''m an only child, so I always wished I had a sibling.

    User 2: You''re not missing out on anything. It can be a lot of work having a bunch of siblings.

    User 1: I''m sure it can be. But it also sounds like it can be a lot of fun.

    User 2: It can be. I''m glad I grew up with a big family.'
