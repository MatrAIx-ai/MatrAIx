personas:
  professional: Derelle Mcknight is a retired community organizer who blends strong interpersonal communication, meticulous event coordination, and a lifelong curiosity about modern art to lead informal
    museum tours, facilitate senior art discussion circles, and spearhead intergenerational storytelling programs at Seattle’s cultural centers, while they bring a competitive drive and occasional skepticism
    to ensure each initiative exceeds expectations.
  sports: Derelle Mcknight enjoys leisurely walks through Pike Place Market and the Washington Park Arboretum, participates in a senior swimming class at the community center, and cheerfully follows the
    Seattle Seahawks in football and the Seattle Storm in basketball, though they rarely engage in competitive sports themselves.
  arts: Derelle Mcknight regularly visits the Seattle Art Museum and Frye Art Museum, where they lead informal tours discussing works by Yayoi Kusama and Georgia O’Keeffe, sing in a senior choir performing
    classics like Leonard Bernstein’s "West Side Story" selections, and support community theater productions such as "The Glass Menagerie" featuring local talent.
  travel: Derelle Mcknight prefers low‑key, well‑planned trips, often traveling by Amtrak to Seattle’s nearby gems like Leavenworth and the Olympic Peninsula, taking occasional weekend getaways to Vancouver,
    and dreaming of an accessible cruise along Alaska’s Inside Passage that blends scenic vistas with comfortable tours.
  culinary: Derelle Mcknight, an adept home cook, delights in preparing Southern comfort staples such as crispy fried chicken, buttery collard greens simmered with smoked turkey, honey‑glazed cornbread,
    and peach cobbler spiced with cinnamon, while also experimenting with Pacific Northwest salmon fillets paired with dill and lemon, frequently sharing recipes and dishes at potluck gatherings with friends.
  core: Derelle Mcknight is a curious, art‑loving senior who balances meticulous event planning with a competitive streak, worries about missing details, and habitually knits while humming classic Broadway
    tunes.
background:
  cultural: Derelle is an African American woman who grew up during the civil rights era in the Pacific Northwest. Her upbringing in a close‑knit Black community in Seattle instilled values of solidarity,
    church involvement, and intergenerational storytelling. She remains actively connected to local Black cultural institutions such as the Seattle Urban League and the Northwest African American Museum,
    and celebrates traditions like Juneteenth and Kwanzaa while embracing the broader Seattle cultural scene. Her cultural background fuels her passion for preserving Black history, sharing culinary heritage,
    and fostering inclusive community spaces.
attributes:
  skills: '["Community event coordination", "Art appreciation and museum tour facilitation", "Interpersonal communication", "Basic digital literacy", "Home cooking (Southern cuisine)", "Crocheting and quilting",
