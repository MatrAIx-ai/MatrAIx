  hobbies: '["Visiting art museums", "Book club (African American literature)", "Senior choir", "Community gardening", "Strolling in parks and markets", "Crocheting and quilting", "Cooking traditional dishes",
    "Playing bridge and card games", "Volunteering for oral history projects", "Attending community theater"]'
  career_goals: Although retired, Derelle aims to deepen her knowledge of modern art and emerging technologies, create a memoir that captures her life experiences for future generations, and launch a community
    art program tailored for seniors at the local cultural center. She wants to build a digital archive of her family's history, advocate for improved senior health services in Seattle, and serve on the
    board of a nonprofit focused on preserving Black cultural heritage.
