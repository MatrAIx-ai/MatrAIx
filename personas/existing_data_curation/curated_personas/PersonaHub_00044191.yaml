persona_description: A scientist who specializes in public health and infectious diseases, particularly those related to Leptospira bacteria. This scientist has worked on the development of a universal
  vaccine for Leptospira, which is a family of bacteria that causes deadly blood infections in humans and animals. They have used engineered Leptospira that lacks a functional FcpA molecule to test the
  vaccine candidate and have found promising results, including the ability to train hamsters and mice to fight back against the bacteria and prevent its spread. The scientist is now working towards creating
  a vaccine that can protect against all types of Leptospira infection and can be deployed as a broad solution to the human and animal health challenge caused by leptospirosis.
