  career_goals: Freddy aims to progress from senior engineering technologist to engineering manager within the next five years, focusing on leading automation projects in the oil-gas and renewable-energy
    sectors. He plans to earn the Certified Automation Professional (CAP) and Six Sigma Green Belt certifications to deepen his expertise. Long-term, he envisions launching a boutique consulting firm that
    provides process optimization and automation solutions to mid-size manufacturers in Texas, while also mentoring Hispanic STEM students through local outreach programs. He seeks to blend his curiosity
    for emerging technologies such as IoT and robotics with practical implementations that enhance operational efficiency and safety.
