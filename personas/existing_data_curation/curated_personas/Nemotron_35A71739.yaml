personas:
  professional: Johnniemae Young, a seasoned retail manager with over three decades of front‑line experience, they blend a sharp eye for visual merchandising with a curiosity for art trends, turning store
    windows into miniature galleries while mentoring staff, though they often prefer a flexible schedule to manage stress and can be disorganized with paperwork.
  sports: Johnniemae Young cheers on the Cincinnati Bengals and Reds, participates in a local walking club that meets twice a week in the Over‑the‑Rhine neighborhood, and occasionally joins a community
    bowling league, preferring low‑impact activities that fit their flexible schedule.
  arts: Johnniemae Young immerses themselves in Cincinnati's art scene, frequently attending exhibits featuring Black artists, listening to Miles Davis and B.B. King at intimate jazz clubs, and crocheting
    vibrant blankets inspired by the colors of contemporary paintings they encounter.
  travel: Johnniemae Young favors short, culturally rich getaways, planning weekend trips to New Orleans for its jazz heritage, exploring the historic streets of Savannah, and attending the Ohio Black Heritage
    Festival, while they budget travel expenses carefully to avoid financial strain.
  culinary: Johnniemae Young enjoys cooking soul‑infused dishes like jambalaya, fried catfish, collard greens, and cornbread, showing a moderate skill level in the kitchen and often swapping recipes with
    friends at their book club, though they sometimes over‑spice meals when stressed.
  core: Johnniemae Young is a curious, art‑driven retail veteran who balances competitive sales goals with a laid‑back schedule, often worrying about details, yet they find calm in crocheting, gardening,
    and sipping jazz in dimly lit venues.
background:
  cultural: Johnniemae was raised in Cincinnati’s historic Avondale neighborhood, where the close‑knit African‑American community instilled a strong sense of cultural pride and resilience. Her family traditions
    include Sunday gospel services, seasonal soul‑food gatherings, and participation in citywide celebrations like Juneteenth. Growing up, she was exposed to the city’s rich musical legacy and the vibrant
    storytelling of older relatives, which nurtured her appreciation for art, music, and oral history. While she now lives in the suburb of Hamilton County, she remains connected to her roots through regular
    visits to local churches, volunteer tutoring at community centers, and mentorship of young Black entrepreneurs seeking entry into retail and creative industries.
attributes:
  skills: '[''Retail sales'', ''Customer service'', ''Visual merchandising'', ''Inventory management'', ''Cash handling'', ''POS system operation'', ''Basic graphic design'', ''Art curation for retail spaces'',
