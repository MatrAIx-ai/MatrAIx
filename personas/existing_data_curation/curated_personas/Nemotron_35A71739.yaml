  hobbies: '[''Visiting art museums and galleries'', ''Listening to jazz and blues music'', ''Reading biographies of African‑American leaders'', ''Crocheting and textile crafts'', ''Gardening'', ''Attending
    small‑group book clubs'', ''Participating in spoken‑word poetry events'', ''Traveling to cultural festivals'', ''Exploring local culinary scenes'']'
  career_goals: Johnniemae hopes to pivot her retail career toward a niche boutique that highlights African‑American art, handmade crafts, and culturally resonant products. She aims to secure a store‑manager
    role that gives her autonomy over visual storytelling and product selection, allowing her to blend her artistic curiosity with her sales expertise. Long‑term, she envisions opening a small community‑focused
    shop where she can host monthly art talks, provide mentorship to aspiring sellers, and maintain a flexible schedule that eases her sensitivity to stress. If the opportunity arises, she would also consider
    consulting local businesses on inclusive merchandising strategies and creating engaging window displays that reflect diverse cultural narratives.
