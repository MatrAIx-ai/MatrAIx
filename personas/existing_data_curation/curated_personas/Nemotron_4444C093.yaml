personas:
  professional: Dustin Zaben is a seasoned IT leader who leverages fifteen years of infrastructure strategy, cloud migration expertise, and vendor negotiation savvy to steer enterprise transformations,
    while their natural tension between structure and spontaneity drives a hybrid Agile‑governance model that keeps projects on track despite occasional deadline skids.
  sports: Dustin Zaben channels his competitive streak into weekend target‑shooting at the Scranton Precision Shooting Club, follows the Philadelphia Eagles and the Scranton/Wilkes‑Barre RailRiders, and
    hits the Pocono Trails for rugged hikes that double as photo‑ops, while a membership in a local CrossFit box adds unpredictable yet disciplined fitness sessions to their routine.
  arts: Dustin Zaben strums acoustic renditions of Bob Dylan and Bruce Springsteen at the Scranton Open‑Mic Nights, devotes evenings to landscape photography inspired by Ansel Adams, and occasionally attends
    performances by the Philadelphia Orchestra, letting these artistic outlets balance the analytical intensity of their IT career.
  travel: Dustin Zaben prefers meticulously planned solo road trips that blend wilderness solitude with tech‑free zones, having already charted routes through the Catskills, the Adirondacks, and a weekend
    in Reykjavik’s geothermal pools, while budgeting constraints keep international forays limited to occasional long‑haul flights to Lisbon for its historic cobblestone streets and fresh seafood.
  culinary: Dustin Zaben enjoys crafting hearty stews—like a slow‑cooked beef chili with roasted poblano peppers and black beans—while also experimenting with home‑brewed stout‑infused barbecue rubs, and
    they routinely fire up a high‑end gaming‑style PC to stream cooking tutorials from the likes of Alton Brown and Ina Garten.
  core: Dustin Zaben is a pragmatic IT strategist who balances a relentless work ethic with a love for overclocked PCs, quiet mountain hikes, and a habit of juggling competing deadlines with a stubborn
    streak of spontaneity that often lands them on the edge of burnout.
background:
  cultural: Raised in Taylor, Pennsylvania, Dustin grew up in a middle‑class, predominantly European‑heritage community that reflects the work ethic of the anthracite‑coal region. His family background
    includes Irish and German ancestry, and he attended a Catholic parochial school before earning an MBA from Penn State University. The regional culture, with its emphasis on self‑reliance, practical
    problem‑solving, and modesty, shaped his pragmatic outlook. He identifies with the broader Northeastern Pennsylvania community, valuing local sports teams, seasonal festivals, and a straightforward,
    no‑frills communication style, while comfortably navigating the national corporate environment.
attributes:
  skills: '["Strategic IT planning", "Network architecture design", "Vendor management", "IT budgeting & financial analysis", "Cross‑functional team leadership", "ERP implementation", "Cloud migration (AWS,
    Azure)", "Server virtualization", "Cybersecurity risk assessment", "Data analytics and reporting", "Change management", "Hybrid Agile/Waterfall project management"]'
  hobbies: '["Hiking and nature photography", "Custom PC building", "Acoustic guitar playing", "Listening to technology and business podcasts", "Reading business strategy books", "Attending craft‑beer festivals",
    "Participating in local chili cook‑off events", "Precision target shooting"]'
  career_goals: Dustin aims to move from his current managerial role to a senior executive position—such as Vice President of Information Technology or Chief Information Officer—within the next five years.
    He wants to spearhead digital transformation initiatives in a midsized manufacturing or logistics firm, leveraging AI‑driven analytics and edge computing to boost operational efficiency. To enhance
    his credibility, he plans to earn the CISSP and CITEX certifications. Long‑term, he harbors the ambition to launch a boutique consulting practice that helps regional companies modernize their IT infrastructures
    while preserving the flexibility he values.
