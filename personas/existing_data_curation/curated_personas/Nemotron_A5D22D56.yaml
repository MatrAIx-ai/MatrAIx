personas:
  professional: Mary Harrison, a 36‑year‑old correctional officer with six years of inmate supervision experience, blends her crisis‑de‑escalation expertise and meticulous incident documentation with a
    creative problem‑solving mindset, often drawing on philosophical insights from her journal to mentor new staff and influence unit policies.
  sports: Mary Harrison keeps fit through daily solo yoga sessions and weekend long‑distance runs with the Chicago River Runners, while cheering on the Chicago Bears for football and the Chicago Cubs for
    baseball on her days off, and she finds additional calm by swimming alone at the city’s public pool during the summer.
  arts: Mary Harrison nurtures her artistic curiosity by wandering city murals—often capturing Banksy‑style pieces on camera—sketching in quiet galleries, immersing herself in the symphonies of J.S. Bach
    and Debussy, and winding down with Miles Davis jazz records, all of which feed the reflective tone of her personal journal.
  travel: Mary Harrison favors unstructured solo trips that blend art and introspection, having already explored the Renaissance galleries of Florence and the classical concert halls of Vienna, while dreaming
    of a quiet retreat to Kyoto’s zen gardens; her travel plans are usually scribbled on napkins and constrained by shift work and a modest travel budget.
  culinary: Mary Harrison, an amateur home chef, builds simple yet flavorful meals around the rosemary, thyme, and basil she harvests from her indoor garden—frequently preparing rosemary‑crusted salmon,
    herb‑infused quinoa bowls, and lavender‑toned tea—while occasionally treating herself to a night out at a cozy Mediterranean bistro for fresh tabbouleh and grilled halloumi.
  core: Mary Harrison balances a demanding correctional officer role with a solitary, art‑driven inner life, channeling her curiosity and occasional disorganization into reflective sketches, yoga, and a
    habit of splurging on vintage books and street‑art prints.
background:
  cultural: Mary grew up in a working‑class, white, Irish‑American family in South Philadelphia. Her upbringing in a close‑knit neighborhood instilled a pragmatic, community‑oriented outlook and an appreciation
    for the city’s traditions, such as local festivals and sports loyalty. While raised in a culturally Catholic environment, she now identifies as secular but still values family gatherings and neighborhood
    ties. Living in Philadelphia has exposed her to a vibrant mix of cultural influences, which fuels her curiosity about diverse artistic expressions and unconventional ideas.
attributes:
  skills: '[''Inmate supervision'', ''Crisis de‑escalation'', ''Use of force protocols'', ''Incident reporting'', ''Physical fitness training'', ''Conflict resolution'', ''Critical thinking'', ''Creative
