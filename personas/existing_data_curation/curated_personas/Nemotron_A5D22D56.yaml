  hobbies: '[''Sketching cityscapes'', ''Visiting art galleries'', ''Reading historical fiction'', ''Listening to classical music'', ''Photography of urban architecture'', ''Gardening'', ''Yoga and meditation'',
    ''Writing reflective journal'']'
  career_goals: Mary aims to advance to a supervisory role, such as shift sergeant, where she can mentor newer officers and help shape unit policies. She is interested in acquiring specialized training
    in mental‑health crisis intervention and hopes to lead a dedicated response team within the facility. In the longer term, she plans to pursue an associate’s degree in criminal justice to broaden her
    career options, possibly moving into a role that focuses on inmate rehabilitation programs or community re‑entry support after her law‑enforcement career.
