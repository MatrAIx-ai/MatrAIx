personas:
  professional: Edward Evans, a budding junior programmer, applies his methodical curiosity to develop simple games and utility scripts while envisioning a future in software engineering.
  sports: Edward Evans supports the Boston Celtics and the New England Patriots, swims on the local community pool team during summer, plays intramural basketball at school in winter, and treats chess as
    a mental sport, sharpening strategic thinking while staying physically active.
  arts: Edward Evans draws creative fuel from Syd Mead’s futuristic illustrations, Daft Punk’s synth‑heavy soundtracks, and Isaac Asimov’s scientifically grounded science‑fiction, often sketching concept
    art of imagined inventions while listening to ambient electronic music.
  travel: Edward Evans dreams of exploring Tokyo’s Akihabara district for its tech culture and trekking the Canadian Rockies for nature, yet currently favors short family road trips to nearby state parks
    where he can set up Arduino‑powered trail markers and practice solitary observation.
  culinary: Edward Evans enjoys crafting pepperoni pizza with fresh basil, experimenting with ramen broth flavored by miso and chili oil, and perfecting grilled cheese sandwiches using aged cheddar and
    a dash of smoked paprika.
  core: Edward Evans is a methodical, solitary teen who merges a love of coding, chess, and electronics with meticulous planning, occasional anxiety, and a modest budget dedicated to tech tinkering.
background:
  cultural: 'Edward grows up in a suburban neighborhood of Spokane, Washington, within a family that values self‑reliance, education, and modest community involvement. His cultural upbringing reflects typical
    Pacific Northwest attitudes: an appreciation for nature (often expressed through solitary hikes or camping trips in nearby forests) and a pragmatic work ethic. Family traditions include celebrating
    holidays such as Thanksgiving and the Fourth of July, with an emphasis on quiet reflection rather than large social gatherings. The local school district''s emphasis on STEM programs has reinforced
    his technical interests, while the broader regional culture''s respect for personal space aligns with his preference for solitude.'
attributes:
  skills: '[''Python programming'', ''Robotics design and programming'', ''Chess strategy'', ''Logic puzzle solving'', ''Digital illustration'']'
  hobbies: '[''Coding personal projects'', ''Reading science‑fiction'', ''Online chess competition'', ''Electronics tinkering (Arduino, LED projects)'', ''Digital illustration of technical concepts'']'
  career_goals: Edward aspires to become a software engineer or aerospace engineer, fields that combine his curiosity about cutting‑edge technology with his practical inclination for building tangible solutions.
    He aims to attend a university with strong STEM programs, secure a scholarship through competitions like the FIRST Robotics Challenge, and eventually work on autonomous systems or space‑exploration
    software. He envisions a career that allows for independent problem‑solving, minimal constant social interaction, and clear, measurable progress toward complex technical goals.
