  career_goals: Although retired from full-time teaching, Jean Marie aims to stay engaged in education by offering occasional consulting to nearby schools on curriculum design and assessment strategies.
    She plans to author a concise guide for new teachers on practical classroom management, and to contribute regular volunteer tutoring sessions at the Azle community library. Additionally, she seeks to
    deepen her horticultural knowledge through a master gardener certification and to share her garden experiences through a blog, combining her love of structure with personal expression.
