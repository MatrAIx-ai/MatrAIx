personas:
  professional: Jean Vazquez, a 74‑year‑old retired educator who now offers curriculum consulting, harnesses precise lesson‑plan templates and data‑driven assessment rubrics while preferring solitary work
    sessions over noisy meetings, channeling their critical eye to help nearby schools sharpen objectives.
  sports: Jean Vazquez, an avid follower of the Texas Rangers baseball team and the Dallas Stars hockey squad, joins a weekly Walnut Creek walking club, and channels their competitive streak into high‑score
    Sudoku tournaments at the Azle senior center.
  arts: Jean Vazquez, an avid reader of classic literature such as George Eliot’s ‘Middlemarch,’ a frequent listener of the Philadelphia Orchestra’s Mahler symphonies, and a fan of Enya’s ambient soundtracks
    while knitting, also curates a personal collection of historic biographies and attends community theater productions of Shakespeare’s ‘Much Ado About Nothing.’
  travel: Jean Vazquez, a methodical traveler who favors solo day trips with detailed itineraries, has explored the historic streets of Williamsburg, Virginia, wandered the lavender fields of Provence,
    France, and hopes to visit the zen garden of Ryoan‑ji in Kyoto, always booking through a trusted agency and securing lodging a month in advance.
  culinary: Jean Vazquez, a careful home cook who favors fresh garden harvests, frequently prepares ratatouille with zucchini, eggplant, and tomatoes, roasts a beet and goat‑cheese salad seasoned with rosemary
    and thyme, meticulously catalogs recipes in a spreadsheet, yet admits to reaching for canned tomato soup when garden chores run late.
  core: Jean Vazquez, a meticulously organized 74‑year‑old with a solitary, competitive spirit, blends structured curriculum consulting, disciplined budgeting, garden precision, and puzzle‑solving into
    a life where quirks like hoarding discount coupons and occasional flu‑shot skepticism add a human twist.
background:
  cultural: Jean Marie was raised in a mid‑century Texan suburb near Dallas, in a family that descends from Irish and German settlers who arrived in Texas in the early 1900s. The family practiced Catholicism,
    observing traditional holidays such as Christmas and Easter, and participated in community events like county fairs and church potlucks. Growing up, she internalized values of self‑reliance, order,
    and modesty, while also developing an appreciation for Southern hospitality and the practicality of Texas Hill Country life. These cultural influences shape her preference for structured routines, community
    service, and quiet, reflective activities.
