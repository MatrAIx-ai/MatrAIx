  career_goals: Although retired from full‑time work, Derrick aims to continue contributing to his community. He hopes to take on a senior advisory role at the local senior centre, develop intergenerational
    programs that pair older adults with students for mentorship, and serve on the board of the neighborhood NAACP chapter to preserve African American history in the Bay Area. He also aspires to support
    his grandchildren’s education by offering financial guidance and tutoring. On a personal level, he wishes to maintain his health, travel with his wife to family gatherings, and document his life story
    for future generations.
