  hobbies: '[''Experimenting with new recipes at home'', ''Visiting Newark’s farmers markets and spice shops'', ''Listening to merengue, bachata, and reggae music'', ''Playing guitar'', ''Watching cooking
    competition shows'', ''Playing basketball'', ''Jogging in local parks'', ''Maintaining a food blog'', ''Traveling to the Dominican Republic'', ''Reading culinary history books'']'
  career_goals: Socrates aims to rise from line cook to sous‑chef within the next two years, eventually earning a head‑chef position at a respected restaurant that showcases Caribbean fusion cuisine. He
    plans to enroll in a full‑time culinary program to earn an associate degree in culinary arts, which will complement his practical experience. In the longer term, he dreams of opening his own family‑run
    eatery in Newark’s Ironbound district that serves authentic Dominican dishes with a modern twist, providing a gathering place for the local Dominican community and introducing the cuisine to a wider
    audience. He is also interested in mentoring younger cooks, possibly through a community cooking workshop, and hopes to earn recognition such as a James Beard Foundation nomination for his innovative
    menu concepts.
