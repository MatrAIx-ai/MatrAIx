personas:
  professional: Carlos Quinonescruz, a 13‑year‑old aspiring robotics enthusiast, applies their methodical planning and competitive drive to building LEGO Technic creations and leading their middle school
    robotics club’s projects while balancing group collaboration with a strict personal schedule.
  sports: Carlos Quinonescruz plays for the Glen Ellyn Soccer Club and the middle school basketball team, cheers for the Chicago Bulls and Chicago Fire, and follows a competitive training routine that mixes
    high‑intensity drills with occasional over‑exertion that leads to sore knees.
  arts: Carlos Quinonescruz immerses themselves in regional Mexican music, blasting tracks from Vicente Fernández, Banda El Recodo, and Calibre 50, while also exploring graphic design by customizing LEGO
    Technic builds and occasionally streaming films starring Gael García Bernal for cultural connection.
  travel: Carlos Quinonescruz loves family road trips to Mexico for Día de los Muertos celebrations, dreams of exploring the ancient pyramids at Teotihuacán and the bustling streets of Tokyo, but prefers
    meticulously planned itineraries that fit within their limited allowance.
  culinary: Carlos Quinonescruz enjoys mastering homemade salsa, crafting tacos al pastor with marinated pork, and experimenting with chilaquiles, proudly claiming their flavor palate is as precise as their
    LEGO constructions, though they sometimes skip chores to snack on nachos.
  core: Carlos Quinonescruz, a 13‑year‑old methodical planner who channels competitive energy into soccer, robotics, and salsa‑making, balances a wary optimism with bouts of anxiety, and thrives on routine‑driven
    creativity.
background:
  cultural: Carlos is raised in a Mexican household that emphasizes strong family bonds, respect for elders, and vibrant cultural traditions such as Día de los Muertos, quinceañera celebrations, and authentic
    Mexican cuisine. Speaking Spanish at home and English at school, he navigates a bicultural identity that blends suburban life in Glen Ellyn, Illinois, with the customs and values of his heritage. He
    participates in community events organized by the local Mexican cultural association, enjoys family gatherings centered around traditional foods, and carries forward a sense of practicality and community
    responsibility rooted in his cultural background.
