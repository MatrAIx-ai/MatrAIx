  career_goals: Carlos aims to pursue a career as a civil engineer, focusing on designing safe, efficient infrastructure for his community. He also dreams of playing soccer at the collegiate level, hoping
    to combine his competitive spirit with teamwork. In the short term, he plans to boost his math and science grades, take on a leadership role as captain of his middle‑school soccer team, and deepen his
    experience in the school robotics club to build a strong technical foundation.
