  hobbies: '[''Reading poetry and philosophy'', ''Watercolor and ink painting'', ''Calligraphy'', ''Bonsai cultivation'', ''Cooking Chinese dishes'', ''Tea ceremony preparation'', ''Digital photography'',
    ''Listening to traditional Chinese music and jazz'', ''Visiting art exhibitions and museum talks'', ''Walking in nature and coastal parks'']'
  career_goals: Kuen's ambitions revolve around continued personal growth and sharing his heritage. He hopes to complete a memoir that weaves together his experiences from his youth in East Asia, his immigration
    journey, and reflections on abstract ideas, preserving his story for his family. He aims to organize a small community workshop series at the local cultural center, teaching calligraphy and simple Chinese
    cooking to seniors and interested neighbors, fostering harmony. Traveling back to his birthplace for a reunion is a long‑term dream, as is documenting oral histories of his generation. He also wishes
    to curate a modest exhibition of his paintings at the Great Neck library and to expand his garden, perhaps adding a tea ceremony space for quiet gatherings. Ultimately, he seeks to remain intellectually
    active, learning new artistic techniques, and to support his spouse and grandchildren in their endeavors.
