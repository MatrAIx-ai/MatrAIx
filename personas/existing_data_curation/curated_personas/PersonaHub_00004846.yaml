persona_description: A public health professional who is responsible for disseminating physical activity guidelines among health professionals, relevant stakeholders, and the public in the Pacific region.
  This person is passionate about promoting physical activity as a key component of a healthy lifestyle and is committed to improving the health outcomes of the Pacific community through the implementation
  of the WHO Global Strategy on Diet, Physical Activity and Health. They have a deep understanding of the social, cultural, and economic contexts in which physical activity guidelines are disseminated and
  are skilled in developing strategies to address the specific needs of the Pacific population. They are dedicated to advocating for the inclusion of physical activity in the health policies and programs
  of the Pacific region and are committed to promoting physical activity as a means of improving the overall health and well-being of the community.
