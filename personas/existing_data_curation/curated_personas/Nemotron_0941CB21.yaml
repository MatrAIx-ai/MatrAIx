  career_goals: Sheila aims to transition from the structured environment of corporate auditing to a more flexible, leadership‑focused role. Over the next five years she envisions becoming a senior audit
    manager or financial controller for a regional firm, where she can mentor younger accountants and champion women’s advancement in finance. Simultaneously, she is exploring the possibility of launching
    a boutique consultancy that offers personalized, technology‑driven accounting services to local small businesses, allowing her to balance professional ambition with the spontaneity she values. She is
    also interested in developing expertise in sustainability reporting to help Rhode Island companies meet emerging ESG standards.
