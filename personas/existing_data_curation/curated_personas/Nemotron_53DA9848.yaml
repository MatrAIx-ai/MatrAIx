  hobbies: '[''Reading literary fiction'', ''Contemporary poetry'', ''Sketching'', ''Watercolor painting'', ''Digital photography of desert landscapes'', ''Hiking in Red Rock Canyon'', ''Birdwatching'',
    ''Collecting vintage jazz records'', ''Cooking experimental recipes'', ''Volunteering at senior center with art sessions'']'
  career_goals: Geoffrey aims to broaden his clinical qualifications by attaining CNA certification within the next year and eventually completing a Licensed Practical Nurse (LPN) program. He hopes to transition
    into a supervisory role where he can mentor junior aides and design personalized art‑therapy activities for clients to enhance emotional well‑being. Long‑term, he envisions establishing a small, boutique
    home‑care agency that blends high‑quality medical support with creative enrichment, giving him a sustainable income and the flexibility to work in the quiet environments he prefers.
