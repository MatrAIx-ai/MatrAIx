personas:
  professional: Gabriel Siniard is a nonprofit strategist who fuses graduate business training with hands‑on social work, designing data‑driven youth programs while pragmatically navigating grant cycles,
    and they balance a meticulous budgeting mindset with a willingness to experiment on the ground.
  sports: Gabriel Siniard is an avid hiker and cross‑country skier who trains with the Minneapolis Outdoor Club, follows the Minnesota Timberwolves for winter basketball, roots for the Twins during baseball
    season, and they cap weekly workout sessions with a spin class at a local studio and occasional pickup soccer with Minnesota United fans.
  arts: Gabriel Siniard spends evenings strumming acoustic guitar to the tunes of Damien Rice and Gillian Welch, curates a personal photo series inspired by Ansel Adams, and they attend off‑beat indie film
    screenings featuring directors like the Dardenne brothers while occasionally quoting Maya Angelou.
  travel: Gabriel Siniard prefers low‑key, well‑planned trips that blend nature and culture, having trekked the Lofoten Islands in Norway, explored the historic streets of Stockholm, and they dream of a
    solo winter trek through Iceland’s highlands, while budgeting each adventure through a dedicated travel fund.
  culinary: Gabriel Siniard cooks with confidence, mastering Swedish köttbullar with lingonberry sauce, gravlax cured with dill and fennel, and they pair meals with rye crispbread and cloudberry jam, often
    experimenting with cardamom‑infused desserts while still occasionally over‑salting the broth during a busy week.
  core: Gabriel Siniard is a data‑driven social work tactician who channels solitary hikes into community empowerment, yet they sometimes hoard extra camera gear as a quirky compromise between curiosity
    and cautious budgeting.
background:
  cultural: Gabriel grew up in a middle‑class family in the Twin Cities with deep Scandinavian roots—his grandparents emigrated from Sweden, instilling values of modesty, community service, and self‑reliance.
    The Midwest’s emphasis on civic participation, the courteous “Minnesota nice” ethos, and a strong progressive social safety net have shaped his worldview. He identifies with the broader white American
    culture of the region, celebrating local traditions such as lake fishing, seasonal festivals, and a collective commitment to public welfare.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Community Resource Navigation'', ''Program Development'', ''Strategic Planning'', ''Budget Management'', ''Data Analysis'', ''Grant Writing'',
