  hobbies: '[''Hiking'', ''Nature Photography'', ''Reading Non-fiction'', ''Acoustic Guitar'', ''Cooking (Scandinavian cuisine)'', ''Community Gardening'', ''Book Club (small group)'', ''Board Games'',
    ''Watercolor Painting'']'
  career_goals: Gabriel aims to transition into senior leadership within a nonprofit or municipal social services agency, eventually becoming a program director or chief operating officer. He wants to leverage
    his business acumen to streamline service delivery, expand evidence‑based interventions for at‑risk youth, and secure sustainable funding through innovative grant strategies. Over the next five years
    he plans to obtain his LCSW license, pursue a master's in social work leadership, and influence local policy on mental health and homelessness through collaborative cross‑sector initiatives.
