persona_description: A technologist who works at a large aquarium in Europe, responsible for maintaining and monitoring the water quality and environmental conditions of the aquarium's five different ecosystems.
  The technologist needs a device that can measure various environmental parameters, such as pH, conductivity, ORP, luminosity, temperature, and humidity, and soil parameters to preserve the vegetation
  of each of the rivers in the Aquarium. The technologist also needs a solution that is easy to configure, requires no programming, and automatically detects the probe regardless of the socket in which
  it is placed and sends the data to Libelium Cloud via 4G. The technologist is interested in a device that is sustainable and eco-friendly, meeting the 5 Rs of reduce, reuse, repair, refurbish, and recycle.
