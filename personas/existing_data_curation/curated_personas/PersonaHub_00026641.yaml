persona_description: A political economist who opposes the government's budget policies and argues for moderate and persistent deficits to fund infrastructure and invest in the nation's future. They have
  written a book on Australian land speculation and are a co-founder of LF Economics. They are interested in the impact of government spending on the economy and the role of public debt in funding essential
  public assets and services. They believe that high levels of public debt are not detrimental and that moderate and persistent deficits are the way to go for sustainable economic growth.
