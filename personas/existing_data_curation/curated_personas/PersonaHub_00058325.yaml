persona_description: Michelle Pistone, a Professor of Law and Director, Clinic for Asylum, Refugee and Emigrant Services (CARES) at Villanova University School of Law, is an expert in legal education and
  innovation. She has extensive knowledge and experience in the field of legal education and has been actively involved in the development of new teaching methods and technologies. Her presentation at the
  CELT Workshop was focused on the impact of emerging innovations on legal education and the need for law schools to adapt to these changes. She is a strong advocate for the use of technology in legal education
  and has introduced her new project called LegalED, which is a web-based platform that will host teaching materials for legal education. Her presentation was engaging and informative, and she received
  positive feedback from the faculty at Albany Law School.
