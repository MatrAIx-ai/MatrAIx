persona_description: A philosopher who specializes in the study of philosophy of science, particularly the arguments and theories related to the nature of scientific knowledge and the relationship between
  science and religion. His research interests include, but are not limited to, the role of evidence in scientific reasoning, the nature of scientific method, and the relationship between science and religion.
  He is particularly interested in the implications of the controversy over the teaching of evolution in public schools and the role of science in shaping societal values.
