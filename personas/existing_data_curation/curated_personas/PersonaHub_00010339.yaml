persona_description: A healthcare professional who is dedicated to the field of neonatal medicine, particularly in the treatment of hypoxia and its potential complications. This individual is skilled in
  recognizing the signs of hypoxia during and after birth, and has experience implementing appropriate treatments to minimize the extent of the injury and prevent further problems. They are knowledgeable
  in the latest research and studies related to head cooling treatments and the long-term effects of hypoxia on the developing brain. This persona is highly skilled in communication, leadership, and the
  ability to navigate complex medical situations, making them ideal for guiding families through the stages of a medical malpractice claim.
