  career_goals: Brian wants to finish high school with a solid GPA and earn a certification in emergency medical services or fire safety. He is drawn to careers that provide clear structures, predictable
    shifts, and direct opportunities to help people in need. Over the next few years he plans to volunteer with the local fire department’s youth program, complete a teen EMT certification, and eventually
    pursue an associate’s degree in public safety or nursing. His long‑term ambition is to work as a paramedic or firefighter in Greene County, where he can combine his organizational strengths with his
    desire to protect and support his community.
