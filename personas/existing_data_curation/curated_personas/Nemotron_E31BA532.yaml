  career_goals: Lauren dreams of working with animals as a veterinarian and also feels drawn to teaching, hoping to become a classroom teacher who can share her curiosity with younger kids. She imagines
    combining her love for science and helping others, perhaps as a wildlife conservationist, and occasionally talks about exploring space and becoming an astronaut. Although she worries about meeting expectations,
    she stays motivated by setting small goals like improving her reading speed or learning a new Scratch project each month.
