personas:
  professional: Lauren Sharp, an aspiring junior detective and science‑club leader, blends the curiosity of Nancy Drew mysteries with the practical habit of meticulous note‑taking to design simple experiments
    while staying flexible enough to improvise when results surprise them, and they eagerly share findings with friends.
  sports: Lauren Sharp, a forward for the Riverdale Raccoons youth soccer team, channels the aggressive play of USWNT star Megan Rapinoe and follows the Portland Thorns on television, yet they insist on
    extra penalty‑shot drills after practice because they fear missing a goal during matches.
  arts: Lauren Sharp, a devoted Nancy Drew reader and hip‑hop enthusiast, builds intricate LEGO cityscapes while they hum to Billie Eilish’s "Bad Guy" and mimic choreography from YouTube star Matt Steffanina,
    treating each creative burst as a mini‑performance.
  travel: Lauren Sharp, who loves family road trips to the nearby Redwood State Park and weekend hikes at the Grand Canyon, dreams of snorkeling at the Great Barrier Reef and touring the historic sites
    of London, always packing a pocket notebook to sketch leaf patterns on the journey, and they eagerly document each stop in a colored map.
  culinary: Lauren Sharp, a budding baker, perfects chocolate‑chip cookies with melted butter and a pinch of sea salt, enjoys pepperoni pizza with a crispy crust, and they proudly add a dash of cocoa powder
    to homemade banana‑bread for an extra sweet twist.
  core: Lauren Sharp is an energetic eight‑year‑old who balances fierce curiosity with practical organization, they worry about missing details, and they channel that tension into vivid storytelling, science
    experiments, and unstoppable soccer drives.
background:
  cultural: Lauren is raised in a white, New England family in Springfield, Massachusetts. Her family celebrates traditional American holidays such as Thanksgiving, Independence Day, and Christmas, often
    incorporating local Springfield traditions like the annual Fourth of July fireworks over the Connecticut River. She attends a public elementary school where she encounters a diverse student body, fostering
    appreciation for different cultures. Outside school, her family participates in community events like the Springfield Farmers' Market and occasional church gatherings that emphasize service and volunteerism.
    The region’s emphasis on education, outdoor activities, and historical heritage shapes Lauren’s values of curiosity, practicality, and community involvement.
