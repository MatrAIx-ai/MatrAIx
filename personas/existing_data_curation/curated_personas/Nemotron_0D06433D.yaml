  career_goals: Although retired, Mari aims to deepen her impact as a community mentor. She aspires to lead intergenerational workshops that blend practical life skills with creative pursuits, helping younger
    volunteers learn about organizing and caring for elders. Mari also seeks to champion mental‑health awareness among seniors by establishing peer‑support circles, leveraging her own experiences with anxiety
    to create a supportive environment. Long‑term, she hopes to document and preserve Pueblo’s local history through oral‑history projects, ensuring her legacy of service and learning endures.
