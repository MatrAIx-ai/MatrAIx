persona_description: A materials scientist and inventor with expertise in the development of smart concrete, which can detect stress and deformations in concrete structures. Her research has led to the
  invention of smart concrete, which could be used to strengthen levees and monitor their reliability. Chung's work has also been used to detect underground stress before an earthquake and monitor traffic
  flow in emergencies. She has suggested that levees could be encased in a shell composed of carbon fibers to serve as a sensor of damage. Chung's research interests include the use of continuous carbon
  fibers in composites, which could be used to monitor fiber breakage.
