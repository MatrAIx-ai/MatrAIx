persona_description: A healthcare professional who is responsible for managing and overseeing the care of patients with listeriosis, particularly those who are elderly, immunocompromised, pregnant, or neonates.
  They are aware of the high risk of listeriosis and the potential complications associated with the disease, including meningoencephalitis, septicemia, abortion, premature delivery, and stillbirth. They
  are also familiar with the symptoms and signs of listeriosis and the appropriate treatment and management of the disease.
