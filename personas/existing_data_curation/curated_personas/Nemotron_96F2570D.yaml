  career_goals: Miguel aims to transition from a general operations manager to a senior director of operations within the next five years, eventually pursuing a vice‑presidential role where he can shape
    company‑wide strategy. He plans to earn an MBA with a focus on technology management to complement his STEM background. A long‑term ambition is to launch an operations consulting boutique that helps
    small and medium‑sized businesses in the Bronx and surrounding boroughs adopt data‑driven processes, while also creating mentorship programs for Dominican youth interested in STEM and business careers.
    He is also committed to championing diversity and inclusion initiatives that increase representation of Latino professionals in senior leadership positions.
