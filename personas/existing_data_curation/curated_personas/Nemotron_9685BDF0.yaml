  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Model railroading'', ''Fishing'', ''Small book club'', ''Volunteering at community food bank'']'
  career_goals: Looking ahead, Carl aims to transition from day‑to‑day project execution to a mentorship and advisory role. He plans to coach emerging project managers within his organization and local
    professional associations, sharing best practices and lessons learned. He also aspires to lead a strategic, enterprise‑wide transformation program that leverages emerging technologies to improve operational
    efficiency. In the longer term, Carl hopes to author a practical guide on integrating Agile principles into traditional manufacturing environments and to volunteer his expertise to non‑profit community
    projects in Wichita.
