    greeting cards'']'
  career_goals: Although still young, Esperanza imagines becoming an artist who paints stories from her heritage and shares them with friends. She also dreams of teaching children, blending art and language
    to help them express themselves. Occasionally she mentions wanting to be a veterinarian because she loves caring for animals, and she sometimes talks about exploring space, reflecting her openness to
    unconventional ideas. Ultimately, she aspires to a role that lets her connect with others, create, and celebrate her culture.
