personas:
  professional: Michelle Yerby, an 18‑year‑old agricultural worker with hands‑on expertise in tractor maintenance, irrigation setup, and precision‑ag drone scouting, uses their outgoing nature to coordinate
    small crews, solve mechanical hiccups on the fly, and dreams of leading a data‑driven, sustainable farm after studying at Colorado State University.
  sports: Michelle Yerby tackles the local co‑ed intramural soccer league, supports the Colorado Rapids, hikes the foothills on weekends with the Johnstown Trail Club, and volunteers as a water crew for
    the county fair’s rodeo, blending competitive spirit with love for outdoor fitness.
  arts: Michelle Yerby strums acoustic sets at the Open Mic Night in Fort Collins, cites John Denver and Mumford & Sons as inspirations, captures sunrise over the cornfields with a DSLR, and enjoys indie
    folk festivals that echo the region’s western‑rural vibe.
  travel: Michelle Yerby dreams of road‑tripping the Pacific Northwest’s farm‑to‑table hotspots, plans a spring visit to the Willamette Valley vineyards, and already loves weekend escapes to Yellowstone
    and the nearby Rocky Mountain National Park for hiking and scouting new terrain for future farm expansion.
  culinary: Michelle Yerby cooks grilled zucchini, corn on the cob, and roasted beet salad seasoned with rosemary and cilantro, often improvising a quinoa‑corn mash after a sunrise hike, while their modest
    kitchen skill balances simple pan‑searing with occasional ambitious farm‑style BBQ experiments.
  core: Michelle Yerby, an 18‑year‑old farm‑savvy dynamo, blends drone‑guided crop scouting, sunrise photography, and spontaneous veggie grilling into a competitive yet community‑oriented lifestyle punctuated
    by occasional impulse purchases of tech gadgets.
background:
  cultural: Michelle grew up in Johnstown, a small town in Larimer County, Colorado, where the agricultural way of life shapes much of the community rhythm. Her family has been involved in farming for several
    generations, instilling values of hard work, self‑reliance, and neighborly cooperation. The local culture blends traditional western customs—county fairs, rodeos, and a strong outdoor ethic—with progressive
    attitudes toward sustainable land management and community food systems, reflecting the influence of nearby Fort Collins and Colorado State University. While she was raised in a modest, predominantly
    Protestant household, she embraces the region’s diverse cultural mosaic, participating in multicultural festivals and supporting inclusive community initiatives.
attributes:
  skills: '["Farm equipment operation (tractors, combines, skid‑steer loaders)", "Basic mechanical troubleshooting and repair", "Irrigation system setup, maintenance, and adjustment", "Crop planting, cultivation,
    and harvesting", "Basic animal husbandry (goats, chickens)", "Pesticide safety and application procedures", "Sustainable farming techniques (cover crops, composting)", "GPS‑guided precision agriculture
    and data collection", "Team leadership and crew coordination", "Rapid decision‑making under weather and deadline pressures"]'
  hobbies: '["Intramural soccer", "Hiking in the Rocky Mountain foothills", "Farmers market volunteering", "Farm‑to‑table cooking", "Landscape photography", "Playing acoustic guitar", "Drone piloting for
    aerial scouting", "DIY garden projects", "Attending local music festivals", "Community service with youth agricultural programs"]'
  career_goals: Michelle aims to transform her on‑the‑ground experience into a leadership role within the next five years. She plans to enroll in Colorado State University’s agricultural science program,
    focusing on sustainable farming and precision ag technologies, while continuing to work part‑time on local farms. Her ultimate ambition is to manage a mid‑size, diversified farm that integrates organic
    practices with data‑driven efficiency, eventually expanding into a community‑supported agriculture (CSA) operation that supplies fresh produce to Fort Collins and surrounding towns. Competitive by nature,
    she wants to be recognized for achieving the highest crop yields per acre in her region and for pioneering innovative practices that balance profitability with environmental stewardship.
