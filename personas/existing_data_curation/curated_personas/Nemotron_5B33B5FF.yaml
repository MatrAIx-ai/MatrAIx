  career_goals: Andrea aims to advance to a senior leadership role—such as Director of Engineering or Principal Engineer—where she can shape her firm’s sustainability agenda, champion climate‑resilient
    design in the Hudson Valley, and expand community‑focused infrastructure projects. Over the next five years she plans to obtain Professional Engineer licensure in both civil and structural disciplines,
    lead a multidisciplinary team on a flagship green‑building project, and develop a mentorship program for women in STEM. Ultimately, she envisions launching her own consulting practice that helps municipalities
    incorporate low‑impact design and renewable energy solutions while maintaining a healthy work‑life balance.
