persona_description: A researcher who specializes in the study of language and cognition, particularly in the field of number processing in non-human primates. She is interested in understanding how language
  and non-linguistic communication influence human thought processes and cognitive abilities. Her research has focused on the ability of non-human primates to represent and count abstract numbers, and the
  impact of language on their ability to do so. She is also interested in the role of language in shaping human thought and behavior.
