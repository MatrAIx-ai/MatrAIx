  career_goals: Jessica aims to progress from her current administrative assistant role to an office manager position within the next two years, leveraging her strong organizational foundation to lead efficiency
    initiatives across the team. She plans to earn the Certified Administrative Professional (CAP) credential and eventually complete a bachelor's degree in Business Administration, balancing her studies
    with family commitments. Her long‑term ambition includes developing a small consulting service that helps local enterprises implement streamlined office processes and remote‑work strategies, allowing
    her to maintain a flexible schedule that supports her well‑being and family life.
