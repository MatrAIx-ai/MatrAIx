personas:
  professional: Kris Holland, a 36‑year‑old construction specialist in Baltimore, leverages expert framing, drywall, concrete finishing, blueprint interpretation, and OSHA‑compliant site safety alongside
    a curious artistic eye and a compassionate, conflict‑mediating presence, and they keep renovation crews both productive and creatively inspired.
  sports: Kris Holland, an avid yoga practitioner who also joins a local adult softball league, hits the courts for pick‑up basketball at the community recreation center, and passionately roots for the
    Baltimore Ravens and the Baltimore Orioles during the NFL and MLB seasons, while occasionally pedaling with the Baltimore Cycling Club on weekend rides, and they relish the camaraderie of team sports.
  arts: Kris Holland, a sketch‑and‑photography enthusiast who frequents the Baltimore Museum of Art, draws inspiration from Kara Walker’s powerful narratives and Shepard Fairey’s street‑art aesthetics,
    and unwinds to the dreamy sounds of Baltimore‑based band Beach House while listening to the Design Matters podcast, and they infuse every renovation project with a historically aware, artistic sensibility.
  travel: Kris Holland, who meticulously plans both weekend getaways to historic Annapolis and a yearly architectural pilgrimage to Barcelona’s Gaudí sites while dreaming of a solo backpacking trek through
    Kyoto’s temples, balances a limited vacation budget with airline miles, preferring culturally immersive experiences over luxury resorts, and they prioritize learning local history on each trip.
  culinary: Kris Holland, a self‑taught home cook, often prepares Maryland crab cakes seasoned with Old Bay, bakes sourdough loaves using locally milled flour, experiments with roasted seasonal vegetables
    from a community garden, and they treat themselves to a craft IPA at a waterfront bar after a long workday.
  core: Kris Holland, a 36‑year‑old construction enthusiast, merges a love for art and hands‑on building, habitually sketches every job site, drinks a relentless stream of coffee to fuel late‑night projects,
    and they often lose track of time in yoga class, balancing practicality with creative wanderlust.
background:
  cultural: Kris is a White American raised in Baltimore’s working‑class neighborhoods. Her family’s ancestry includes German and Irish settlers from the Mid‑Atlantic region, giving her an appreciation
    for the area’s industrial heritage. Growing up in a diverse city, she has been exposed to the rich tapestry of African‑American music, cuisine, and community activism, which informs her collaborative
    and compassionate outlook. She identifies with the local labor culture while actively participating in the city’s vibrant art scene, blending blue‑collar values with a curiosity for creative expression.
attributes:
  skills: '[''Framing'', ''Drywall installation'', ''Concrete mixing and finishing'', ''Operating backhoe and forklift'', ''Blueprint reading'', ''OSHA 10‑hour safety certification'', ''Site organization'',
