  hobbies: '[''Sketching historic architecture'', ''Street photography'', ''Visiting art museums'', ''DIY home improvement'', ''Woodworking'', ''Volunteer work with Habitat for Humanity'', ''Reading architectural
    history'', ''Design podcasts'', ''Yoga'', ''Book clubs'', ''Neighborhood clean‑up'']'
  career_goals: Kris aims to progress from construction laborer to foreman within the next three years, pursuing additional credentials such as the NCCER Carpentry Credential and a Construction Management
    certification. She hopes to blend her technical expertise with her artistic curiosity by specializing in residential renovation projects that emphasize thoughtful design and sustainable materials. Long‑term,
    she envisions founding a small‑scale renovation firm that mentors apprentices from under‑represented communities in Baltimore, using skilled trades as a pathway for social uplift.
