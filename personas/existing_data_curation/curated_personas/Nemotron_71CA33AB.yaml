personas:
  professional: Jose Morel, a five‑year‑old who loves constructing towering block structures, applies their competitive nature and skeptical eye to questioning the building rules before creating the most
    orderly LEGO cities on the playroom mat, meticulously arranging each piece before gleefully knocking the creation down for a fresh start.
  sports: Jose Morel, a member of the community Wolves junior soccer team, balloons excitement when cheering for the Milwaukee Bucks and the Wisconsin Badgers, often challenges the referee’s calls with
    a critical eye, and balances their structured practice drills with the spontaneous thrill of sledding down the town’s snow‑covered hill during winter festivals.
  arts: Jose Morel, who revels in crafting colorful papel picado for Día de los Muertos celebrations, sings along to Lila Downs’ folk melodies, critically adjusts the brightness of each paper cut, and proudly
    showcases sticker collections of cartoon heroes, weaving their cultural rhythms into imaginative play.
  travel: Jose Morel, who has traveled to the family’s hometown across the border and trekked to the Upper Peninsula’s Pictured Rocks, dreams of building sandcastles on the sunny beaches of Cancún, preferring
    short, vivid adventures over long, meticulously planned trips for their curious mind and often skeptically questions the necessity of overly long itineraries.
  culinary: Jose Morel, who eagerly helps mash masa for tamales and adds extra shredded cheese to their mac and cheese, boasts of rolling perfect taco shells, critically tastes each bite for the right balance
    of spice, though they habitually chew with their mouth open, a quirk their parents gently correct.
  core: Jose Morel is a fiercely competitive five‑year‑old who blends a love for orderly block building with sudden bursts of chaotic fun, never shying from a debate over game rules, often questioning instructions
    with a skeptical stare, and they always end the day hugging mamá after a triumphant candy‑filled victory.
background:
  cultural: Jose comes from a Mexican family that maintains strong cultural ties despite living in Antigo, Wisconsin. At home, Spanish is spoken alongside English, and he celebrates Mexican holidays such
    as Día de los Muertos and Navidad with family gatherings, traditional foods, and music. His parents share stories of their heritage, teach him Mexican folk songs, and involve him in cooking dishes like
    tacos and tamales. He also participates in local community activities, attending the town's winter festivals and school events, blending his Mexican roots with Midwestern experiences.
