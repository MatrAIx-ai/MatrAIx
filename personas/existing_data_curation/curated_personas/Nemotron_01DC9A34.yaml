  hobbies: '[''Cooking traditional Mexican cuisine'', ''Salsa dancing'', ''Reading Latin American literature'', ''Participating in a book club'', ''Hiking in local parks'', ''Yoga and mindfulness practice'',
    ''Volunteering at bilingual health fairs'', ''Traveling to Mexico to visit family'']'
  career_goals: Margarita aims to advance to a regional director role overseeing multiple health facilities, where she can champion patient-centered care models and health equity initiatives for Hispanic
    communities. She plans to pursue an executive MBA or a Master of Health Administration to deepen her strategic expertise. Her long‑term ambition includes establishing a mentorship program for emerging
    women leaders in healthcare and spearheading innovative technology integration—such as telehealth platforms—to expand access for underserved populations in New Jersey. She also hopes to influence policy
    on cultural competency training at the state level.
