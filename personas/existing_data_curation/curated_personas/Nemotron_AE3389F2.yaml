personas:
  professional: Curston Goodman, a 22‑year‑old front‑line call‑center agent, leverages his quick active‑listening, calm conflict de‑escalation, and routine‑driven ticket management in Zendesk and Salesforce
    to keep metrics steady while championing a laid‑back team spirit that encourages flexible scheduling.
  sports: Curston Goodman stays active by shooting hoops for the adult basketball team "Flathead Lake Drifters," casting lines on Flathead Lake every weekend, trekking Rocky Mountain trails, and cheering
    on the Denver Broncos and Montana Grizzlies, all while maintaining a relaxed yet consistent fitness routine that blends social play with personal endurance.
  arts: Curston Goodman channels creative energy through tribal drumming and dancing at the annual Flathead Lake Powwow, while winding down to classic rock legends like Led Zeppelin and The Rolling Stones,
    and occasionally attends local open‑mic nights featuring folk singer Brandi Carlile, all of which shape a vibrant, rhythm‑driven identity.
  travel: Curston Goodman prefers road‑trip adventures that combine planned hikes in Glacier National Park and spontaneous weekend getaways to Missoula or Seattle, while dreaming of a cross‑border trek
    to Banff, balancing a modest travel budget with the desire for fresh outdoor experiences.
  culinary: Curston Goodman enjoys cooking freshly grilled Flathead Lake trout with lemon‑herb butter, hearty elk stew seasoned with juniper berries, and homemade huckleberry jam, while his intermediate
    woodworking skill lets him craft custom cutting boards for potluck contributions like mac & cheese and BBQ ribs.
  core: Curston Goodman is a routine‑loving, sociable 22‑year‑old who balances laid‑back budgeting, proactive customer service, and a love for outdoor group activities—though they sometimes forget to pay
    a bill or stretch after drumming.
background:
  cultural: Curston identifies as a member of the Salish (Flathead) community, growing up on the Flathead Indian Reservation just outside Polson. His upbringing was steeped in tribal customs that stress
    communal responsibility, respect for the land, and oral storytelling. He regularly attends the annual Flathead Lake Powwow, participates in traditional drum circles, and helps teach younger relatives
    basic Salish phrases and bead‑craft techniques. While his day‑to‑day life is shaped by the rural rhythm of Lake County, the values of generosity, humility, and a deep connection to nature inherited
    from his tribal heritage continue to guide his interactions at work and in his community.
