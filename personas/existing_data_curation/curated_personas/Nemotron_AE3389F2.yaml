  career_goals: Curston’s immediate ambition is to master his current role at the call center, consistently hitting top performance metrics while cementing his reputation as a reliable team player. Within
    the next two to three years, he aims to step into a supervisory or team‑lead position, where he can guide newer agents, shape routine processes, and inject a bit more flexibility into scheduling to
    boost morale. Looking further ahead, Curston hopes to transition into a community‑focused management role—perhaps overseeing a regional customer‑service hub or developing a tribal‑owned tourism and
    service office that leverages his practical skills and cultural knowledge. To support these aspirations, he plans to enroll in an associate‑degree program in business administration at a nearby community
    college.
