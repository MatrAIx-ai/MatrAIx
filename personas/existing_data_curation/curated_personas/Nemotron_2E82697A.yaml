  hobbies: '[''Gardening'', ''Birdwatching'', ''Bridge'', ''Woodworking'', ''Electronics tinkering'', ''Cooking'', ''Community events'', ''Storytelling'', ''Traveling to national parks'', ''Historical reading'']'
  career_goals: Although no longer in the formal workforce, Maan aims to leave a lasting legacy by establishing a community makerspace in Ransom Canyon, where he can teach hands‑on engineering projects
    to youths and seniors alike. He plans to mentor emerging engineers in the regional oil industry, contribute his insights to the town’s planning commission, and author a memoir that chronicles his career
    and the evolution of the Texas energy landscape. Additionally, he seeks to stay intellectually active by learning introductory machine‑learning concepts and applying them to hobby projects.
