  hobbies: '[''Cooking Colombian cuisine'', ''Salsa dancing'', ''Gardening'', ''Chess'', ''Attending baseball games'', ''Photography'', ''Storytelling in Spanish'', ''Listening to Latin jazz and classic
    rock'', ''Traveling to Colombia'']'
  career_goals: Although retired from formal employment, Enrique aims to leverage his sociable nature and practical know‑how by mentoring younger members of the Colombian diaspora in San Diego, organizing
    a monthly cultural dialogue series, and offering pro‑bono consulting to help local family‑run shops increase customer engagement. He also aspires to document his life story in a memoir that blends Colombian
    heritage with his American experiences, and to continue learning digital tools that allow him to stay connected with friends and family across borders.
