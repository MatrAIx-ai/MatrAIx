personas:
  professional: Frances Bornstein, a 19-year-old with a meticulous eye for detail, channels their organized, methodical nature into a budding finance career by excelling at data entry, spreadsheet budgeting,
    and part‑time bookkeeping while dreaming of a CPA credential and a future office where clear procedures dominate.
  sports: Frances Bornstein enjoys low‑key fitness, joining a local community garden co‑op that organizes weekend walks and occasional pick‑up volleyball games with the nearby university club, while quietly
    cheering for the New York Knicks and the Boston Celtics during televised matches.
  arts: Frances Bornstein spends quiet evenings sketching botanical illustrations while listening to folk singer Sufjan Stevens, indie band Bon Iver, and classic mystery author Agatha Christie audiobooks,
    finding solace in the structured rhythms of both art and music.
  travel: Frances Bornstein prefers meticulously planned trips, favoring the structured charm of Kyoto’s garden tours, the historic streets of Prague, and weekend getaways to nearby state parks where they
    can combine gardening with nature walks, always booking accommodations well in advance to avoid anxiety.
  culinary: Frances Bornstein favors baking as a precise science, mastering the exact measurements for classic chocolate chip cookies, apple pie, and lavender shortbread, while their kitchen skill sits
    at an intermediate level, allowing them to experiment with measured spice blends like cinnamon, cardamom, and fresh rosemary.
  core: Frances Bornstein is a detail‑driven, anxiety‑prone 19‑year‑old who finds calm in structured hobbies like bookkeeping, knitting, and puzzle‑solving, yet occasionally lets perfectionism snowball
    into over‑thinking.
background:
  cultural: Frances was raised in Stanton, a small town in Estill County, Kentucky, within a predominantly white, Appalachian‑influenced community. Her family has deep roots in the region, valuing self‑reliance,
    close family ties, and a strong sense of community. She attended the local public high school where she participated in the school’s Future Farmers of America (FFA) club and the church youth group,
    reflecting the area’s blend of rural traditions and Southern Baptist faith. The cultural milieu emphasized practicality, modesty, and respect for tradition, evident in family gatherings centered around
    home‑cooked Southern dishes and shared storytelling. Growing up amidst the rolling hills and local farms, Frances developed an appreciation for seasonal rhythms, which informs her gardening hobby and
    appreciation for Appalachian folk music.
