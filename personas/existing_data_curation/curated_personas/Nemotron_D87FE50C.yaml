  career_goals: Frances aims to build a stable, structured career in finance or office administration. She plans to enroll in a community college to earn an associate degree in business administration,
    followed by a bachelor’s in accounting. Her short‑term goal is to secure a part‑time bookkeeping position where she can apply her meticulous record‑keeping skills while gaining real‑world experience.
    Long‑term, she aspires to become a certified public accountant or office manager in a small‑business setting, valuing clear procedures, predictability, and the opportunity to mentor others. She also
    hopes to develop coping strategies for her anxiety, possibly integrating mental‑health awareness into her professional environment.
