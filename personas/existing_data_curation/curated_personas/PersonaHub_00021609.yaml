persona_description: A scientist who specializes in structural biology and molecular biology, particularly in the study of protein degradation in mitochondria. Her research focuses on understanding the
  molecular mechanisms that control protein levels and degradation in cells, and how this process is regulated in response to various environmental and physiological conditions. She has published several
  studies on the structure and function of the YME1 molecular machine, which she co-led with Steven E. Glynn, Ph.D., and Gabriel Lander, Ph.D.
