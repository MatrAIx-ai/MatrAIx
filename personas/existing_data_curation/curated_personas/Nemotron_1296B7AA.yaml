personas:
  professional: Delores Smith excels as a file clerk at a regional office, leveraging meticulous records management, SharePoint and DocuWare expertise, and flawless data entry while channeling their organized,
    sociable, and compassionate nature into training new staff and streamlining workflows to set the stage for an office manager role.
  sports: Delores Smith stays active through weekly Zumba classes, sunrise walks in William B. Umstead State Park, and cheering on the NC State Wolfpack basketball team while holding a membership with the
    Raleigh Running Club.
  arts: Delores Smith immerses themselves in contemporary fiction by Sally Rooney and personal‑development works by Brené Brown, enjoys salsa dance nights, and frequently attends performances at the Durham
    Performing Arts Center featuring artists like Beyoncé and local folk singer Amanda Shires.
  travel: Delores Smith plans road‑trip getaways that blend food festivals and historical sites, having explored Asheville’s craft breweries, Savannah’s squares, and dreaming of a culinary tour of Barcelona’s
    tapas bars while balancing time off with work commitments.
  culinary: Delores Smith cultivates a modest vegetable garden to harvest heirloom tomatoes and kale, then whips up soulful dishes like shrimp‑and‑grits with smoked paprika, or homemade banana bread infused
    with honey, savoring Raleigh’s farm‑to‑table restaurants for inspiration.
  core: Delores Smith is a detail‑oriented, people‑powered budget guru who balances organized work mastery with a passion for community food, dance, and soulful cooking, all while navigating life with a
    steady, upbeat rhythm.
background:
  cultural: Delores is African American, raised in the Raleigh metropolitan area within a close‑knit extended family that values church, storytelling, and community solidarity. Her cultural upbringing blends
    Southern traditions—such as soul‑food cooking, gospel music, and oral history—with a modern appreciation for the growing Black professional network in North Carolina. She remains actively engaged with
    local African‑American cultural organizations, participates in Juneteenth celebrations, and draws strength from a heritage of resilience and collective uplift that informs both her personal life and
    professional aspirations.
