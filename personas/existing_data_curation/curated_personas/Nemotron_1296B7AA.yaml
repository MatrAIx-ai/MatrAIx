  hobbies: '[''Organizing community potlucks'', ''Attending dance classes'', ''Exploring new restaurants in Raleigh'', ''Gardening'', ''Reading fiction and self‑help books'', ''Volunteering at local food
    bank'', ''Zumba fitness classes'', ''Walking in Umstead State Park'', ''Blogging about budgeting and recipes'']'
  career_goals: Delores aims to advance from her current file clerk role to an office manager position within the next two to three years. To achieve this, she plans to complete a professional certification
    in records and information management and enroll in an associate degree program in business administration. In the longer term, she envisions blending her administrative expertise with her passion for
    community service by becoming a program coordinator for a local nonprofit focused on youth mentorship and job readiness, ultimately contributing to economic empowerment in her community.
