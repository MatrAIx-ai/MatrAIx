  career_goals: Douglas aims to step into a supervisory role within a large institutional cafeteria, eventually advancing to a food‑service manager position where he can shape menu offerings and staff development.
    Simultaneously, he dreams of opening a small coffee shop that doubles as a local art gallery, providing a space for community artists and serving innovative, artistically presented beverages. To support
    these ambitions, he plans to complete a hospitality management certification and attend workshops on mixology and visual merchandising.
