  hobbies: '[''Hiking in the San Juan Mountains'', ''Gardening'', ''Reading historical fiction'', ''Cooking Latin American cuisine'', ''DIY home projects'', ''Small book club'', ''Volunteering at community
    center'']'
  career_goals: Alejandra aims to move into a supervisory position within the parking industry, such as shift supervisor or parking operations manager, where she can apply her methodical approach to larger
    facilities like shopping centers or stadiums. She plans to complete her associate's degree in Business Administration at Mesa County Community College within the next two years and earn the International
    Parking Institute's Certified Parking Operator credential. Long‑term, she aspires to lead multi‑site parking operations and champion sustainable improvements, including electric‑vehicle charging stations
    and energy‑efficient lighting, while maintaining the reliable, customer‑focused service she values.
