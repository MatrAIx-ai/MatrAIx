  career_goals: Johnson dreams of a future where she can help animals and share her love of science with others. She envisions becoming a veterinarian who also runs educational workshops for kids, blending
    her compassion with her talkative, sociable nature. She is also fascinated by space exploration and occasionally imagines herself as an astronaut‑researcher, a role that satisfies her curiosity while
    allowing her to be at the center of collaborative projects. Though she sometimes worries about meeting high expectations, she is determined to develop the skills and confidence needed to lead and inspire.
