personas:
  professional: An eight‑year‑old aspiring storyteller and junior coder, Johnson Depaz blends a vivid imagination fueled by adventure books with the practical discipline of building Lego structures, leading
    drama club productions where they command the spotlight while also delivering Scratch‑coded games that showcase their organized yet flexible approach to problem‑solving.
  sports: An enthusiastic member of the Cedar Creek Cubs youth soccer team, Johnson Depaz hones coordination on the field while also exploring Green Meadow Park’s trails on weekends, and they cheer for
    the New York Yankees and Los Angeles Lakers whenever game day arrives.
  arts: A charismatic drama club participant, Johnson Depaz shines in weekly stage performances, dances to the pop beats of Taylor Swift and BTS, and channels their rock‑collecting passion into sketching
    mineral textures inspired by artist Andy Goldsworthy, revealing a creative spirit that thrives on attention and collaboration.
  travel: An eager explorer, Johnson Depaz has trekked the Willow Creek Nature Trail, visited the interactive Science Museum of Boston, and dreams of camping under the geysers of Yellowstone after a family
    trip to the Grand Canyon sparked their love for grand landscapes.
  culinary: A budding kitchen collaborator, Johnson Depaz delights in assembling mini cheese‑and‑pepperoni pizzas, mixing colorful fruit salads with strawberries, kiwi, and blueberries, and experimenting
    with a homemade rock‑candy recipe that mirrors their fascination with fossils.
  core: Johnson Depaz is an eight‑year‑old whirlwind of curiosity, drama, and meticulous allowance‑keeping, turning every worry into a story and every Lego brick into a stage.
background:
  cultural: Johnson grows up in Coralville, Iowa, within a predominantly white, Midwestern community that values family, school involvement, and local traditions such as county fairs and community gatherings.
    Her family emphasizes education, kindness, and practical responsibility, while also encouraging curiosity about the wider world. She attends a public elementary school that integrates technology and
    outdoor learning, and she participates in neighborhood events that reflect a blend of contemporary American culture and the region's agricultural roots.
