persona_description: A NASA education specialist who is passionate about enhancing science learning in elementary schools across the state of Maryland. She has extensive experience working with scientists
  and engineers on Earth science missions and is committed to sharing their knowledge with teachers. She is dedicated to providing educators with the resources and support they need to implement inquiry-based
  education practices and integrate engineering into science learning criteria. She is highly organized and detail-oriented, ensuring that the Summer Watershed Institute is a valuable resource for educators
  and that the best practices and materials are shared with the wider community.
