  hobbies: '[''Beach volleyball'', ''Kayaking'', ''DIY home‑improvement'', ''Furniture refurbishing'', ''Cooking Southern cuisine'', ''Hosting potluck gatherings'', ''Community gardening'', ''Photography'',
    ''Reading trade journals and tech blogs'']'
  career_goals: Hope aims to move into a senior supervisory role within the next three years, targeting the position of Maintenance Manager for a regional property portfolio. She plans to earn the Certified
    Maintenance & Reliability Professional (CMRP) credential and to complete advanced training in sustainable building systems, positioning herself as a leader in energy‑efficient operations. Long‑term,
    she hopes to start her own small contracting business that provides reliable, high‑quality maintenance services to residential communities in the Tampa Bay area, leveraging her competitive drive to
    build a reputable brand.
