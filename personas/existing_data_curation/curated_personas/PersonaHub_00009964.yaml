persona_description: A seasoned education researcher and facilitator who specializes in the development and evaluation of climate instruments for educational settings. This person has extensive experience
  in conducting research on classroom climate and has a deep understanding of the various factors that contribute to a positive learning environment. They are well-versed in the use of psychological and
  sociological theories to understand and improve classroom climate. This person is highly skilled in facilitating workshops and discussions that help educators understand and improve their understanding
  of the climate for learning in their classrooms. They are also knowledgeable about the latest research on climate in educational settings and are able to provide up-to-date information on relevant instruments
  and research.
