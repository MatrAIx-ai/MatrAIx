  career_goals: Andrew aims to transition from a purely technical support role to a leadership position where he can shape service delivery strategy. He plans to earn ITIL Foundation and CompTIA Security+
    certifications within the next year, positioning himself for an IT Service Manager or Technical Team Lead role. Long‑term, he envisions leading a multidisciplinary team that aligns technology initiatives
    with business objectives, possibly launching a boutique consultancy that helps small to midsize companies integrate affordable IT solutions while maintaining a healthy work‑life balance for himself
    and his future team.
