personas:
  professional: Andrew Delatorre, a 35‑year‑old computer support specialist with a business degree, navigates technical challenges with a hands‑on approach and cost‑benefit mindset; they rally colleagues
    through spontaneous huddles and a friendly, Southern‑hospitality vibe, even though their desk often resembles organized chaos.
  sports: Andrew Delatorre, a 35‑year‑old outdoor enthusiast, plays intramural soccer on Thursday evenings, joins the Durham Hiking Collective for weekend treks in the Eno River State Park, and faithfully
    cheers for the Durham Bulls and Carolina Panthers on game days, though they often let a late‑night meetup delay a scheduled workout.
  arts: Andrew Delatorre, a 35‑year‑old who loves Southern‑flavored live music, regularly catches shows by The Avett Brothers and St. Paul & The Broken Bones at Durham’s Motorco, immerses themselves in
    board‑game nights featuring Catan and Ticket to Ride, and occasionally streams indie films by directors like Greta Gerwig, letting the creative vibe shape their weekend downtime.
  travel: Andrew Delatorre, a 35‑year‑old who prefers spontaneous road trips over rigid itineraries, has driven to Asheville for craft beer and hiking, visited New Orleans for jazz and gumbo, plans to explore
    Savannah’s historic squares next summer, and dreams of a week‑long cultural tour of Barcelona’s tapas bars, all while balancing certification study time and a modest travel budget.
  culinary: Andrew Delatorre, a 35‑year‑old home cook, mixes traditional Southern comfort with tech‑inspired experimentation, perfecting peach‑glazed pork ribs, bourbon‑infused BBQ sauce, and smoked paprika
    collard greens, while often sourcing heirloom tomatoes and fresh peaches at the Durham farmers market and testing new recipes on friends during game‑day potlucks.
  core: Andrew Delatorre, a 35‑year‑old tech‑savvy, sociable planner who balances relentless curiosity and spontaneous gadget tinkering with occasional anxiety‑driven overthinking, and they often leave
    their desk a perpetual work‑in‑progress.
background:
  cultural: Andrew grew up in a middle‑class, suburban family in Wake County, North Carolina. His household celebrated traditional Southern holidays such as Fourth of July fireworks and Thanksgiving gatherings,
    featuring regional cuisine like barbecue and peach cobbler. He attended public schools before earning a business degree from North Carolina State University. While identifying as white, his upbringing
    combined Southern hospitality with a strong emphasis on community involvement, which informs his outgoing nature and collaborative work style. His cultural roots also contribute to a pragmatic yet curious
    outlook, blending respect for established methods with an enthusiasm for new ideas.
