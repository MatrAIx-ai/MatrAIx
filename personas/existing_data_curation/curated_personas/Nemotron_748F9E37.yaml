personas:
  professional: Hattie Larry, a budding 12‑year‑old illustrator and comic‑script writer, channels a disciplined imagination into detailed watercolors and digital sketches while rigorously planning each
    art project like a mini‑enterprise.
  sports: Hattie Larry enjoys swimming at the local community pool and plays on the Hampton Youth Soccer Club’s U‑12 team, cheering on the Washington Capitals and Washington Wizards as their favorite professional
    sports franchises while occasionally joining after‑school basketball drills with friends.
  arts: Hattie Larry immerses themselves in the world of watercolor, drawing inspiration from the soulful melodies of Nina Simone and Billie Holiday as well as the vibrant animation style of Studio Ghibli,
    while regularly swapping original sketches with peers in their weekly art‑exchange gatherings.
  travel: Hattie Larry explores history on family trips to the Norfolk Naval Museum, the Smithsonian in Washington D.C., and coastal Charleston, while dreaming of snorkeling the Belize Barrier Reef and
    visiting Kyoto’s ancient temples, favoring meticulously planned itineraries that balance adventure with time for sketch‑journal reflections.
  culinary: Hattie Larry enjoys crafting shrimp and grits with a splash of hot sauce, experimenting with simple sushi rolls using cucumber and avocado, and mixing fresh blueberries into smoothies, though
    they often rely on their mother’s guidance to perfect the flaky pastry crust.
  core: Hattie Larry is a disciplined daydreamer who transforms a modest allowance into meticulously organized art projects, channels ancestral storytelling into modern comics, and occasionally loses sleep
    over unfinished sketches.
background:
  cultural: Hattie is a Black American growing up in the historic Hampton‑Newport News area of Virginia, a region rich with African‑American heritage and civil‑rights history. Her family places a high value
    on education, storytelling, and community service, often gathering for church events and cultural celebrations that honor their ancestors' resilience. She has learned about the Emancipation Oak, local
    Black leaders, and the importance of preserving cultural memory through family stories and community programs. These experiences shape her worldview, fostering a sense of pride in her heritage and a
    desire to contribute positively to her community through art, science, and mentorship.
attributes:
  skills: '[''Creative writing'', ''Digital illustration'', ''Basic programming (Scratch)'', ''Project planning'', ''Research'', ''Time management'', ''Team collaboration (small groups)'']'
  hobbies: '[''Sketching'', ''Digital art'', ''Reading fantasy novels'', ''Creative writing'', ''Science experiments'', ''Visiting museums'', ''Journaling'', ''Origami'', ''Listening to music (jazz, R&B)'']'
  career_goals: Hattie dreams of turning her love for imagination and disciplined work into a future career that blends art and science. She hopes to study marine biology or environmental science to protect
    the Chesapeake Bay, while also developing graphic novels that tell stories about her community and the natural world. In the medium term, she aims to join a STEM‑focused high school, earn a scholarship,
    and later pursue a degree in illustration, animation, or environmental design, eventually creating educational media that inspires other young people.
