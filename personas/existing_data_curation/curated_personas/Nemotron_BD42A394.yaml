personas:
  professional: Michael Etheridge, a retired legacy software engineer turned interdisciplinary workshop facilitator, leverages their FORTRAN and early C expertise, meticulous project planning, and vivid
    imagination to design programs that blend technical concepts with watercolor and charcoal art, embodying their disciplined yet creatively restless nature.
  sports: Michael Etheridge enjoys low‑impact hikes along the Cascade foothills, participates in a senior walking club that meets thrice weekly, follows the Seattle Seahawks for football, and joins a local
    senior bowling league where their strategic chess mindset translates into steady lane play.
  arts: Michael Etheridge immerses themselves in abstract watercolors inspired by Kandinsky, sharp charcoal sketches echoing the chiaroscuro of Rembrandt, plays Debussy’s piano preludes, and reads speculative
    fiction by Neal Stephenson and modern philosophy by Martha Nussbaum, allowing these diverse influences to shape their creative identity.
  travel: Michael Etheridge prefers meticulously planned trips that balance gentle adventure and reflective downtime, having trekked the Alpine passes of the Canadian Rockies, explored the tranquil tea
    gardens of Kyoto, and dreaming of witnessing the aurora borealis over Tromsø while saving for the journey through careful budgeting.
  culinary: Michael Etheridge, an adept home cook, relishes preparing herb‑infused salmon with dill and lemon, slow‑roasted beets topped with goat cheese, and a weekly sourdough loaf, savoring seasonal
    ingredients like rosemary, wild mushrooms, and fresh berries, while occasionally treating themselves to a fine Zinfandel with a cheese board.
  core: Michael Etheridge fuses disciplined legacy code mastery with spontaneous watercolor bursts, navigating a life of structured routines peppered with anxiety‑fueled creative eruptions.
background:
  cultural: Michael was raised in a middle‑class, post‑war family in the Pacific Northwest, where the region’s natural beauty and early tech boom shaped his worldview. The optimism of the Space Age and
    the DIY ethos of the 1960s fostered a blend of analytical rigor and artistic curiosity. While identifying as White American, his values reflect the progressive, community‑oriented culture of the Seattle
    area, emphasizing education, civic engagement, respect for scientific inquiry, and a strong appreciation for the arts.
attributes:
  skills: '[''Legacy software development'', ''Data analysis & statistical modeling'', ''Technical writing'', ''Project planning & program coordination'', ''Watercolor painting'', ''Charcoal drawing'',
