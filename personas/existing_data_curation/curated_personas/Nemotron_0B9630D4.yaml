  hobbies: '[''Abstract painting'', ''Science-fiction literature'', ''Chess'', ''Gardening'', ''Jazz music appreciation'', ''Vintage vinyl collection'', ''Woodworking'', ''Mentoring youth in STEM'', ''Local
    history research'', ''Creative writing'']'
  career_goals: In the next few years, Charlie aims to leverage his experience to move into a regional supervisory or consulting role, where he can shape retail strategies across multiple stores. He also
    hopes to mentor emerging leaders, especially from underrepresented backgrounds, and to eventually launch a small boutique that showcases locally sourced art and crafts. Contributing to community development
    projects focused on digital literacy for seniors is another long-term ambition.
