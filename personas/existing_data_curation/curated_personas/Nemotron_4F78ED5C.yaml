  hobbies: '[''Hosting dinner parties'', ''Cooking German-American fusion dishes'', ''Volunteering at local food bank'', ''Attending Steelers games'', ''Hiking in Allegheny foothills'', ''Swing and salsa
    dancing'', ''Reading business leadership books'', ''Reading contemporary fiction'', ''Exploring nearby wineries'']'
  career_goals: Carla aims to advance to a regional director of logistics role within the next five years, where she can shape sustainable distribution strategies and mentor emerging leaders. She wants
    to spearhead the adoption of green freight technologies, such as electric delivery fleets and carbon-offset programs, while maintaining operational efficiency. Long-term, she envisions launching a consulting
    practice that helps midsize manufacturers in the Rust Belt transition to more resilient, community-focused supply chains. Throughout her career, she seeks to cultivate workplace cultures that prioritize
    employee well-being and collaborative problem solving.
