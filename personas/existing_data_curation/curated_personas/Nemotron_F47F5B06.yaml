personas:
  professional: Jorge Escoto, a 28‑year‑old operations manager, blends rigorous process optimization and data‑driven decision‑making with a designer’s eye for workplace aesthetics, leading cross‑functional
    teams to cut costs by 15 % while championing lean methodologies and scouting visual improvements for customer touchpoints, and they consistently enforce high standards of compliance.
  sports: Jorge Escoto joins the Sandia Mountain Hiking Club, routinely conquers the 10,000‑foot trail on weekends, roots for the New Mexico United soccer team, and they squeeze in occasional pickup basketball
    games to stay competitive.
  arts: Jorge Escoto spends Saturdays wandering contemporary galleries in Albuquerque and murals in Santa Fe, drawing impromptu sketches of the urban landscape and they cite artists like Anish Kapoor and
    Frida Kahlo as sources of inspiration.
  travel: Jorge Escoto plans trips with a spreadsheet, preferring lightweight backpacking adventures in the Southwest—like a recent expedition to Antelope Canyon—and they dream of a future trek through
    Patagonia’s Torres del Paine after saving enough in a high‑yield savings account.
  culinary: Jorge Escoto whips up mole and tamales at home, mastering the balance of dried chilies, chocolate, and almonds, and they often order spicy street‑taco tacos on busy weekday evenings when time
    runs short.
  core: Jorge Escoto is a disciplined operations leader who channels a competitive, curiosity‑driven mind into both KPI‑crushing efficiency and vibrant artistic pursuits, and they occasionally overindulge
    in sketchbooks and spicy sauces.
background:
  cultural: Jorge's Mexican heritage is central to his identity; he grew up in a bilingual household where Spanish was spoken daily, and he celebrates traditions such as Día de los Muertos, quinceañeras,
    and Mexican Independence Day. Living in Los Lunas, NM, he blends his heritage with the Southwest's multicultural environment, drawing inspiration from the region's rich Hispanic art, music, and cuisine.
    He maintains close ties to his extended family in both Mexico and New Mexico, and his cultural values of respect for elders, hard work, and community support influence his personal and professional
    life.
attributes:
  skills: '[''Team Leadership'', ''Process Optimization'', ''Performance Analytics'', ''Scheduling & Workforce Management'', ''Inventory Control'', ''Budgeting & Cost Management'', ''Vendor Negotiation'',
