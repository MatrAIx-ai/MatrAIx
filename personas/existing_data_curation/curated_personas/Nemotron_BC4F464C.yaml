  career_goals: Greg aspires to become someone who combines his love for organization, leadership, and the coastal environment. He dreams of growing up to be a marine scientist or a coastal park ranger
    who leads educational programs, organizes conservation projects, and inspires other children to explore nature. He also envisions a future where he can coach a youth sports team, using his competitive
    spirit to motivate peers while maintaining high standards of teamwork and achievement.
