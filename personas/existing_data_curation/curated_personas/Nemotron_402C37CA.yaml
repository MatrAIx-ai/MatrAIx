  career_goals: Melanie aspires to transition from front-line cashier duties to a supervisory or managerial position within retail, where she can apply her analytical mindset to improve store efficiency
    and sales performance. She plans to obtain a professional certification in data analytics or operations management within the next two years, leveraging her STEM background to introduce data-driven
    decision-making and inventory-optimization tools. Long-term, she hopes to lead a regional store or become an operations analyst for a community-focused retailer, balancing stable career growth with
    the ability to mentor newer employees. She also envisions using her managerial experience to eventually launch a small, sustainability-focused boutique—perhaps a coffee-and-bake shop that sources locally—providing
    a reliable income stream for her family while staying true to her practical, routine-oriented outlook.
