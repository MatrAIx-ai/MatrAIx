personas:
  professional: Steven Ensley is a community‑focused event planner transitioning toward a nonprofit outreach coordinator role, leveraging their curiosity‑driven practicality, strong interpersonal communication,
    and emerging CAPM certification studies to design inclusive festivals while flexibly juggling volunteer schedules and tight budgets.
  sports: Steven Ensley is a regular at Tampa Beach Volleyball Club tournaments, plays intramural soccer with the St. Petersburg Lions, roots for the Tampa Bay Buccaneers and Tampa Bay Rays, and swaps seasonal
    enthusiasm between kayaking with the local paddling group in summer and hitting the gym for CrossFit workouts during the cooler months.
  arts: Steven Ensley frequently attends live shows featuring bands like The Revivalists and indie folk artist Hurray for the Riff Raff, enjoys the Tampa Museum of Art’s rotating exhibitions, and unwinds
    by replaying classic films starring Tom Hanks while occasionally binge‑watching the latest true‑crime documentary on Netflix.
  travel: Steven Ensley prefers a hybrid travel style, mapping out weekend trips to nearby gems such as Key West and New Orleans while leaving room for spontaneous day‑crazes to the Gulf Islands, and they
    dream of a future eco‑adventure in Costa Rica’s rainforests and a cultural immersion tour of Iceland’s volcanic landscapes.
  culinary: Steven Ensley loves experimenting on the grill, perfecting blackened grouper tacos with smoked paprika, fresh cilantro, and lime, whipping up cedar‑plank salmon seasoned with dill and lemon
    butter, and they never skip adding a dash of homemade hot sauce made from habanero peppers to their seafood feasts.
  core: Steven Ensley blends boundless energy with pragmatic planning, obsessively tracks gadgets and budgets, rallies volunteers at festivals, and still struggles to remember flossing after a day on the
    pier.
background:
  cultural: Steven grew up in Tampa, Florida, where the relaxed Gulf Coast lifestyle blends with a richly diverse community that includes strong Cuban, Caribbean, and Southern influences. His white American
    upbringing reflects Mid‑Atlantic family values while his daily life embraces Florida’s outdoor recreation, seafood cuisine, and frequent community festivals, shaping his appreciation for hospitality,
    neighborhood connections, and multicultural experiences.
attributes:
  skills: '["Event planning and coordination", "Customer service and conflict mediation", "Basic home repair and DIY projects", "Digital literacy (Microsoft Office, social media management)", "Time management
    and scheduling", "Team leadership and group facilitation"]'
  hobbies: '["Beach volleyball", "Live music and concerts", "Kayaking and fishing", "Animal shelter volunteering", "Cooking (grill & seafood)", "DIY home improvement projects", "Tech gadget tinkering"]'
  career_goals: Steven aims to transition from informal gigs to a stable, community‑focused role such as a nonprofit outreach coordinator or municipal event manager. He plans to earn a certification in
    project management (CAPM) to bolster his credentials and eventually launch his own boutique event‑planning business that highlights local festivals and charitable causes. Long‑term, he seeks a leadership
    position where he can mentor volunteers and shape community programs while maintaining financial independence.
