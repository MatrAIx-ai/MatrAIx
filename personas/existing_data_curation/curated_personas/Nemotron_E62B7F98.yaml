personas:
  professional: Bethany Jones, a seasoned cosmetologist with expert-level precision hair cutting, advanced color techniques, and bespoke wedding styling, channels their artistic curiosity and relaxed, flexible
    approach into a thriving salon that feels like an art studio, while mentoring junior stylists and coordinating community outreach, balancing assertiveness with compassion.
  sports: Bethany Jones stays active by joining the Blue Ridge Hiking Club for spring treks, playing in a local mixed‑age softball league during summer, and cheering on the Atlanta Braves and Nashville
    Predators, while preferring low‑impact workouts like yoga over high‑intensity cardio.
  arts: Bethany Jones weaves their love for painting, pottery, and folk music into daily life, drawing inspiration from Georgia O'Keeffe, the Appalachian folk duo The Burns Sisters, and contemporary novelist
    Sally Rooney, while volunteering at community theater productions of Shakespeare and attending the Mountain Arts Festival for fresh ideas.
  travel: Bethany Jones favors spontaneous weekend getaways to artistic hubs like Asheville, NC, the historic streets of Savannah, GA, and occasional overseas trips to Kyoto, Japan, planning travel loosely
    while budgeting for convention tickets and boutique hotel stays, and they enjoy collecting local crafts to display in their salon.
  culinary: Bethany Jones's palate favors Southern comfort foods and farm‑to‑table dishes, with favorite plates such as buttermilk fried chicken, collard greens with smoked turkey, shrimp and grits, and
    apple pie made with garden‑grown apples, while they skillfully incorporate fresh basil, locally sourced honey, and homemade sourdough into their cooking experiments.
  core: Bethany Jones blends artistic flair with entrepreneurial zest, juggling salon leadership, pottery, and garden‑to‑plate cooking, all while navigating a delightfully disorganized schedule that thrives
    on spontaneity and community connection, and they never miss a chance to share a fresh sketch with a client.
background:
  cultural: Born and raised in Laurel County, Kentucky, Bethany grew up in a close‑knit, small‑town environment where Southern hospitality, family gatherings, and community involvement are central values.
    Her heritage reflects a blend of Appalachian folk traditions and broader Midwestern cultural influences, including a love of country and bluegrass music, seasonal festivals, and church‑based service.
    This background informs her warm client relationships, her commitment to local charitable causes, and her appreciation for blending classic regional aesthetics with modern artistic expression.
