  career_goals: Bethany aims to expand her current salon into a boutique boutique studio that offers eco‑friendly hair care products of her own design, while establishing a regular workshop series on creative
    styling and self‑expression. She aspires to become a recognized mentor within the regional cosmetology community, host an annual charity hair‑style auction, and eventually open a second location that
    reflects her love for art and community gathering spaces.
