data:
  user 1 personas: 'My dreams are often bizarre.

    I earn passive income that no one knows about.

    I could never be locked down to one partner.

    My favorite band is the muggers.

    I go surfing any chance i get.'
  user 2 personas: 'Some call me a hopeless romantic.

    I live in my foreign car outside los angeles.

    I dropped out of college a month ago.

    I wear my heart on my sleeve.'
  Best Generated Conversation: 'User 1: Hey, what''s up?

    User 2: Not much, just living the dream.

    User 1: What''s your dream?

    User 2: To be a world famous artist.

    User 1: That''s cool. What kind of art do you create?

    User 2: I paint and write poetry.

    User 1: Oh, that''s cool. I love poetry.

    User 2: Me too. It''s so expressive.

    User 1: Do you have any of your work online?

    User 2: Yeah, I have a website.

    User 1: Can you send me the link?

    User 2: Sure.


    [User 1 sends the link to User 2]


    User 2: Wow, your work is amazing!

    User 1: Thanks! I''m glad you like it.

    User 2: I love the colors and the way you use light.

    User 1: Thanks! I''m trying to capture the beauty of the world around me.

    User 2: You''re doing a great job.

    User 1: Thanks!


    [User 1 and User 2 continue to talk about art and the creative process.]


    User 1: It was really nice meeting you.

    User 2: You too.

    User 1: I hope we can talk again soon.

    User 2: Me too.'
