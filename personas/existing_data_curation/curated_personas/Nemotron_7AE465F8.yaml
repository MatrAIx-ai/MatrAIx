  hobbies: '[''Sketching and digital painting'', ''Soccer'', ''Playing keyboard and beat making'', ''Skateboarding'', ''Biking Portland trails'', ''Participating in Día de los Muertos festivities'', ''Arduino
    tinkering'', ''Indie video gaming'']'
  career_goals: Hector dreams of combining his artistic flair with technology to become a multimedia designer or video‑game developer. He envisions studying graphic design or computer science in college,
    creating interactive experiences that reflect his bicultural heritage. He also hopes to use his bilingual skills to produce content—such as animated short films or educational apps—that celebrate Mexican
    culture for a wider audience. In the short term, he aims to win a regional digital art competition and secure a mentorship with a local game studio in Portland.
