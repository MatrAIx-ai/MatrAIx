personas:
  professional: Hector Garcia is an aspiring digital artist and budding game designer who merges cartoon sketching with Arduino‑driven interactive art, and they apply their curiosity and organized‑yet‑flexible
    mindset to prototype small video games and interactive installations during after‑school club sessions.
  sports: Hector Garcia plays left midfield for a local youth soccer league, cheers on the Portland Timbers during matches, spends weekends at the Burnside Skatepark honing tricks, and rides the Springwater
    bike trail with friends, balancing competitive drive with a laid‑back approach to fitness that includes occasional pick‑up basketball games.
  arts: Hector Garcia immerses themselves in cartoon sketching, digital painting with Procreate, and creates lo‑fi beats on a beginner keyboard, drawing inspiration from artists like Studio Ghibli and musicians
    such as The Strokes, while helping design vibrant float decorations for the annual Día de los Muertos parade, and they avidly follow indie game narratives like "Oxenfree" for storytelling ideas.
  travel: Hector Garcia enjoys weekend trips to nearby Oregon destinations such as Cannon Beach and Mount Hood for scenic hikes, has road‑tripped with family to Seattle to explore the Museum of Pop Culture,
    and dreams of attending Comic‑Con in San Diego and ultimately traveling to Japan to experience anime culture firsthand, preferring spontaneous day‑trips over long‑term vacations due to school commitments.
  culinary: Hector Garcia favors bold flavor combos like spicy chipotle tacos and mango salsa pizza, can whip up a quick ramen bowl using instant noodles and fresh veggies, often experiments with homemade
    guacamole using ripe avocados and lime, and they relish snack‑sized artisanal pretzels while gaming, though they sometimes skip breakfast in favor of late‑night pizza deliveries.
  core: Hector Garcia is a curious, organized teen who blends art, tech, and sport—sketching cartoons, coding Arduino projects, and sprinting on the soccer field—while juggling a modest allowance, a penchant
    for indie games, and a habit of staying up late on pizza and lo‑fi beats.
background:
  cultural: Hector comes from a Mexican family that migrated to the United States when his parents were young. At home, Spanish is spoken, and he helps prepare traditional dishes like enchiladas and tamales
    with his grandmother. The family celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day, often attending community events at Portland's Mexican Cultural
    Center. He identifies strongly with both his Mexican roots and the progressive, environmentally conscious culture of Portland. This bicultural perspective influences his artistic style, which blends
    vibrant Mexican motifs with the minimalist aesthetic common in the Pacific Northwest. He also values community service, volunteering at local food banks and cultural festivals, reflecting his family's
    emphasis on family solidarity and giving back.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Digital illustration (Procreate, Photoshop)'', ''Basic coding (Scratch, introductory Python)'', ''Public speaking and debate'', ''Team leadership
