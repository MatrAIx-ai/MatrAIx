persona_description: A researcher and educational consultant with expertise in evaluating the impact of digital technology on learning experiences. They have a deep understanding of the types of learning
  activities that are most effective and how digital technology can support these activities. They are interested in analyzing the use of technology in the UK education systems and lessons from around the
  world to identify promising learning themes and emerging technologies that show potential for impact. They are passionate about finding ways to use digital technology to improve educational outcomes and
  are committed to understanding the nuances of how technology can be used effectively to support learning.
