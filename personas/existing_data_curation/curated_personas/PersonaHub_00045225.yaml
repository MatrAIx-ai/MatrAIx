persona_description: A scientist and researcher in the field of neuroscience, particularly focusing on the study of neurodegenerative diseases such as spinocerebellar ataxia type 2 (SCA2) and amyotrophic
  lateral sclerosis (ALS). The researcher is particularly interested in using antisense oligonucleotide (ASO) technology to target and reduce the expression of ataxin-2, a protein involved in the loss of
  neurons in these diseases. The researcher is also interested in exploring the potential of ASO technology for the development of treatments for neurodegenerative diseases.
