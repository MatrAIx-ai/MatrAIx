  hobbies: '["Attending local theater productions", "Hosting dinner parties", "Cheering for the Buffalo Bills", "Volunteering as a youth mentor", "Gardening", "Exploring Erie Canal and Niagara Falls", "Genealogy
    research", "Reading historical nonfiction", "Playing bridge at the senior center"]'
  career_goals: As he approaches retirement, Thomas aims to transition into a senior HR advisory role where he can shape strategic employee‑wellbeing initiatives and mentor younger HR professionals. He
    hopes to develop a comprehensive employee engagement program for his organization, author a practical guide on effective workplace communication, and share his insights as a speaker at regional HR conferences
    in the Great Lakes area before fully retiring and offering consulting services to local nonprofits.
