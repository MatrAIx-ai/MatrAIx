personas:
  professional: Thai Tran is a budding kindergarten teacher in the making, meticulously arranging alphabet blocks into perfect rows, rehearsing storytime for a plush audience, and using their disciplined
    organization and talkative charm to command attention in pretend classroom play.
  sports: Thai Tran is a member of the neighborhood tots' soccer club, idolizing the local professional soccer team Seattle Sounders, loves sprinting after the bright orange soccer ball during weekend practice,
    and enjoys gentle yoga stretches during story time to stay flexible.
  arts: Thai Tran delights in dancing to the upbeat tunes of The Wiggles and singing along to Raffi’s Baby Beluga, while also showing early appreciation for visual art by drawing vibrant crayon pictures
    of rainbows and dinosaurs, inspired by the colorful world of Sesame Street.
  travel: Thai Tran’s travel adventures include a family trip to Disneyland where they eagerly rode the It's a Small World attraction, a weekend beach getaway in Florida, and a vivid imagination that fuels
    a wish to see the Eiffel Tower and taste real macarons in Paris one day.
  culinary: Thai Tran prefers buttery mac and cheese, crispy chicken nuggets, and bright strawberry slices, often insisting on stirring their own oatmeal with a tiny wooden spoon and proudly naming the
    ingredients like cheese, peas, and mushrooms, while stubbornly rejecting broccoli at dinner.
  core: Thai Tran is a curious three‑year‑old whirlwind who organizes toys into perfect rows, chatters nonstop, and can turn a simple day at the park into a lively performance, though they stubbornly refuse
    broccoli at dinner.
background:
  cultural: Thai comes from a Southeast Asian family, likely of Vietnamese heritage, that settled in Wailuku, Maui. At home, he hears both Vietnamese and English, and his parents incorporate Hawaiian customs
    into daily life, such as sharing aloha greetings and participating in local festivals. The family enjoys a blend of cuisines, from pho and banh mi to poke bowls and tropical fruits, reflecting a fusion
    of cultural flavors. Thai is raised with respect for communal harmony, a value common in both his ethnic background and Hawaiian community, and he frequently experiences the island's natural beauty,
    which shapes his appreciation for the environment and cultural storytelling.
attributes:
  skills: '[''recognizing letters A‑J'', ''counting to ten'', ''drawing simple shapes and coloring'', ''using safety scissors'', ''organizing toys by type'', ''following daily routines independently'',
