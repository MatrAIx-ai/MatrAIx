  hobbies: '[''drawing and coloring'', ''building with wooden blocks'', ''singing Hawaiian lullabies and nursery rhymes'', ''collecting shells on the beach'', ''pretend play with friends'', ''attending
    family cultural celebrations (Tet, Hawaiian festivals)'', ''listening to storytime at the library'']'
  career_goals: Thai dreams of growing up to be someone who can blend his love of art, organization, and helping others. He often says he wants to become a teacher or community artist who creates colorful
    murals that tell stories from his family's Southeast Asian roots and Hawaiian surroundings. He also imagines exploring the ocean as a marine‑biology guide, using his curiosity to discover new sea life
    while sharing that knowledge with younger children. His ultimate ambition is to inspire others to appreciate diverse cultures and keep their environments tidy and vibrant.
