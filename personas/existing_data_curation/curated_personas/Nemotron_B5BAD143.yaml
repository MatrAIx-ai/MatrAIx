  career_goals: Although retired, Giang aims to share his cultural heritage and practical knowledge with younger generations. He aspires to volunteer at the local senior center, teach occasional cooking
    workshops for community members, mentor high‑school students interested in trades, and eventually document his life story in a memoir that blends personal history with reflections on resilience and
    adaptation. Maintaining good health to stay active in these pursuits is also a key personal goal.
