personas:
  professional: Giang Keo, a retired carpenter and seasoned home‑maintenance handyman, combines decades of hands‑on building skill with bilingual fluency to mentor younger tradespeople, volunteer at the
    senior center, and act as a cultural bridge by teaching cooking workshops and sharing community heritage stories.
  sports: Giang Keo, an early‑morning nature walker who favors short strolls through the local park with their spouse, participates in a senior tai‑chi class, follows the San Jose Earthquakes and the local
    high‑school baseball team, and joins a weekend community gardening competition that doubles as light exercise.
  arts: Giang Keo, an avid listener of traditional Vietnamese folk music such as the melodies of Đinh Mạnh Ninh, a dedicated reader of historical biographies like Walter Isaacson’s "Steve Jobs" and Vietnamese
    literary classics by Nguyễn Du, regularly attends a senior book club where they discuss works by Thúy Đinh, and enjoys occasional evenings at the community theater watching performances of "The King
    and I".
  travel: Giang Keo, a cautious but curious traveler who prefers meticulously planned trips with their spouse, has revisited their ancestral hometown in central Vietnam and cherished a recent weekend getaway
    to Hoi An, dreams of exploring the historic streets of Kyoto, yet remains budget‑aware and avoids lengthy cruises.
  culinary: Giang Keo, a seasoned home chef who flawlessly prepares classic bánh xèo and phở broth while experimenting with fusion twists like adding lemongrass‑infused quinoa to bún chả, delights in using
    fresh herbs such as cilantro and Thai basil, and finds joy in sharing recipes at neighborhood potlucks.
  core: Giang Keo, a curious yet pragmatic 78‑year‑old who balances traditional Vietnamese heritage with hands‑on craftsmanship, quietly mentors the next generation while occasionally sidetracked by spontaneous
    garden projects.
background:
  cultural: Giang is of Vietnamese descent, raised in a family that preserved Southeast Asian customs after immigrating to the United States. He grew up celebrating Tet, Lunar New Year, and other festivals,
    values filial piety, community solidarity, and the importance of food as cultural expression. Living in Johnston, Rhode Island, he blends his heritage with New England life, participating in local multicultural
    events while maintaining the Vietnamese language and culinary traditions at home.
