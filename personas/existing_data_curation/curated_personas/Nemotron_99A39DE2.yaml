personas:
  professional: Margarita Castillodelgado is a budding visual storyteller who channels their love for structured picture books and colorful illustrations into creating miniature narratives during after‑school
    storytelling circles, demonstrating early organizational skills and a practical, detail‑oriented mindset that they consistently apply.
  sports: Margarita Castillodelgado plays in the neighborhood’s Little Hurricanes soccer team, enthusiastically swings on the park’s swings, and they root for the local baseball team, the Islanders, attending
    games with a structured cheering routine.
  arts: Margarita Castillodelgado fills sketchbooks with vibrant family portraits and island symbols, they dance energetically to salsa icons like Celia Cruz and reggaetón hits by Bad Bunny, and blossoms
    in after‑school dance classes, merging rhythmic movement with disciplined artistic practice.
  travel: Margarita Castillodelgado enjoys brief family trips to the nearby Playa Azul beach and the lush trails of El Yunque, meticulously checking off a simple packing list, while they dream of the bright
    lights and rides of Disneyland in Orlando.
  culinary: Margarita Castillodelgado loves helping stir batter for buñuelos, savoring the powdered‑sugar dusting, and they often create mango‑banana smoothies seasoned with a pinch of fresh mint, insisting
    on arranging the fruit pieces in a perfect circle before blending.
  core: Margarita Castillodelgado is a structured, art‑loving six‑year‑old who balances meticulous organization, lively salsa moves, a methodical piggy‑bank habit, and a quirky tendency to line up crayons
    by color.
background:
  cultural: Margarita comes from a proud Puerto Rican family living in the Bronx. Spanish is spoken at home, and she celebrates holidays such as Three Kings Day, San Juan, and Puerto Rico's Festival of
    the Virgin of the Immaculate Conception with traditional foods like arroz con gandules, pasteles, and buñuelos. She attends a bilingual early‑learning program that reinforces her heritage while teaching
    English. Community events like the Nuyorican Festival and local salsa workshops keep her connected to Puerto Rican music, dance, and stories shared by grandparents who visit from the island.
