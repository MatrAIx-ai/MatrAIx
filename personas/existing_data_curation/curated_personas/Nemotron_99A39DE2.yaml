  career_goals: Margarita often talks about wanting to become a teacher because she likes helping classmates understand new ideas and enjoys the routine of a classroom. She imagines a bright, organized
    room where she can share stories and guide friends. Occasionally she also mentions wanting to be a dancer, dreaming of performing on stage to the music she loves. These ambitions reflect her desire
    to combine structure, caring for others, and her cultural love of dance.
