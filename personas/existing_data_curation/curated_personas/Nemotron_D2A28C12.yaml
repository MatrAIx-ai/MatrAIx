  career_goals: Approaching retirement, Peter aims to transition from daily supervision to a consulting role, offering safety audits and efficiency workshops for local contractors. He is passionate about
    preserving his legacy by documenting best‑practice manuals for construction trades and establishing a mentorship program within the Washington County apprenticeship network. Peter also hopes to volunteer
    his expertise on community projects, such as Habitat for Humanity builds, to give back while staying actively involved in the industry he loves.
