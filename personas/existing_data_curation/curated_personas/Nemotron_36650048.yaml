  career_goals: She aims to become a senior director of marketing within the next five years, overseeing regional campaigns and championing diversity‑focused branding. Long‑term, she aspires to a chief
    marketing officer role, where she can shape corporate strategy around socially responsible storytelling and digital innovation. Additionally, she plans to launch her own boutique consultancy that helps
    mid‑size companies integrate cultural authenticity and artistic creativity into their brand narratives, while mentoring emerging marketers, especially those from underrepresented backgrounds.
