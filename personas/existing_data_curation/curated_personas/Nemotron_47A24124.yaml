personas:
  professional: Harmonia Burke, an 82‑year‑old retired community volunteer, leverages their decades of event‑planning, budgeting, and interpersonal coordination skills to lead intergenerational art workshops,
    curate local mural projects, and organize the “Living History” garden, all while applying their curious, flexible mindset and meticulous yet empathetic approach to ensure every detail harmonizes with
    the community’s needs.
  sports: Harmonia Burke enjoys low‑impact fitness through weekly walks with the Fairland Senior Walking Club, occasional gentle yoga at the community center, and enthusiastically roots for the Indianapolis
    Colts and Indiana Pacers while occasionally attending a local high‑school basketball game.
  arts: Harmonia Burke immerses themselves in watercolor landscapes inspired by Monet and Grandma Moses, savors classic jazz on a turntable featuring Miles Davis and Ella Fitzgerald, threads intricate quilt
    blocks echoing the folk patterns of the American Needlework tradition, and regularly attends community‑theater productions starring local actors like Sarah Miller, all of which enrich their creative
    soul.
  travel: Harmonia Burke prefers leisurely road trips to historic destinations like Gettysburg, Colonial Williamsburg, and the Great Smoky Mountains, often traveling with their book‑club friends in a comfortable
    minivan, while also dreaming of a gentle river cruise on the Mississippi to soak in Midwestern scenes and stories.
  culinary: Harmonia Burke delights in preparing comforting home‑cooked meals like chicken pot pie, slow‑roasted pork with sage, and apple‑cinnamon crumble, while expertly canning heirloom tomatoes, pickling
    cucumbers, and making strawberry jam using fresh basil, thyme, and a pinch of extra sugar that occasionally makes the preserves a bit too sweet.
  core: Harmonia Burke blends a lifelong love of watercolor sunsets, quilting folk‑art patterns, and handwritten letters with a mischievous habit of solving crosswords at breakfast, humming classic jazz
    while potting heirloom seedlings, and occasionally misplacing their glasses on the kitchen counter.
background:
  cultural: Harmonia comes from a Midwestern, primarily Anglo‑American heritage, with family roots tracing back to German and Irish immigrants who settled in Indiana in the late 19th century. Raised in
    a small-town Protestant community in the 1940s‑50s, she internalized values of self‑reliance, neighborly cooperation, and modesty. Her upbringing emphasized church involvement, seasonal celebrations
    like harvest festivals, and a respect for folk traditions such as quilting, barn‑raising, and community potlucks. These cultural influences shape her appreciation for collective harmony, artistic expression
    rooted in everyday life, and a strong sense of place tied to the rolling farmland and close‑knit social fabric of Shelby County.
