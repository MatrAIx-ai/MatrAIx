  hobbies: '["Watercolor painting", "Classic jazz and folk music listening", "Reading historical fiction and biographies", "Heirloom gardening", "Wildflower cultivation for pollinators", "Attending community
    theater", "Book club participation", "Quilting with folk art motifs", "Crossword puzzles", "Jigsaw puzzles", "Letter writing"]'
  career_goals: Although retired from formal employment, Harmonia aims to remain an active contributor to her community. She hopes to complete a memoir documenting her family's history and the transformations
    she witnessed in Fairland over eight decades, and to digitize the collection for future generations. She plans to lead a monthly intergenerational art workshop at the local library, introducing seniors
    and teens to quilting and storytelling. She also aspires to organize a “Living History” garden project that showcases native Indiana plants while preserving oral histories of longtime residents. Finally,
    she wishes to attain a basic proficiency in graphic design software to create visual materials for community events and to share her artwork online.
