personas:
  professional: Carl Wells is a seasoned art historian and curator who leverages their meticulous research and grant‑writing expertise to design community‑focused exhibitions, while their innate curiosity
    and occasional worry drive them to seek interdisciplinary collaborations and ensure every project meets high standards.
  sports: Carl Wells enjoys weekend hikes in the Green Mountains and participates in a local cross‑country ski club, while cheering for the New England Patriots and the Boston Red Sox, yet they admit to
    skipping regular cardio workouts due to a preference for solitary nature walks over team sports.
  arts: Carl Wells frequents contemporary art exhibitions featuring artists like Ai Weiwei and Kerry James Marshall, curates community workshops that showcase street‑photography inspired by Vivian Maier,
    and regularly attends jazz performances by Kamasi Washington and soul concerts by Erykah Badu, weaving these influences into their own photography of the Vermont countryside.
  travel: Carl Wells prefers meticulously planned art‑focused trips, such as a weekend gallery tour in New York City, a cultural immersion in New Orleans' music scene, and an annual pilgrimage to the Musée
    d'Orsay in Paris, balancing a modest travel budget with occasional splurges on boutique hotels that offer studio space for sketching.
  culinary: Carl Wells, an adept home cook, blends Southern comfort with Vermont freshness by preparing dishes like smoked chicken with collard greens, sweet‑corn grits seasoned with rosemary from their
    garden, and peach‑infused pecan pie, while they occasionally over‑salt their gumbo in pursuit of bold flavor.
  core: Carl Wells merges a meticulous curatorial mind with a restless creative spirit, balancing grant‑writing deadlines and garden meditations, yet they often over‑commit to community projects, leading
    to late‑night journaling sessions and a habit of collecting vintage lenses they never fully learn to use.
background:
  cultural: Carl is an African American who grew up in a mid‑Atlantic city where the legacy of the civil‑rights movement and a vibrant Black cultural scene shaped his identity. His family traces its roots
    to the Great Migration, with grandparents who moved from the rural South to seek better opportunities. He carries the traditions of oral storytelling, gospel music, and Southern cooking, which he blends
    with the New England environment of Vermont. In Winooski, he engages with both the local progressive community and the small but growing Black population, often acting as a cultural bridge, advocating
    for inclusion in the arts, and preserving African American heritage through his work.
attributes:
  skills: '[''Art historical research'', ''Curatorial planning'', ''Grant writing'', ''Project management'', ''Community outreach'', ''Academic writing'', ''Digital archiving'', ''Photography'', ''Public
    speaking'', ''Exhibit design'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary literature and poetry'', ''Photography'', ''Gardening'', ''Hiking'', ''Listening to jazz and soul music'', ''Journaling'', ''Meditation'',
    ''Cooking Southern cuisine'', ''Volunteering at community art programs'']'
  career_goals: Carl aims to leverage his expertise to develop a community‑focused art initiative in Winooski, establishing a cooperative gallery and workshop space that supports local artists and underrepresented
    voices. He aspires to secure grants to fund educational programs, publish a collection of essays on African American artistic contributions, and eventually serve as a consultant for museums seeking
    to diversify their collections. He also hopes to mentor emerging artists and pursue a part‑time teaching role at a regional college, while maintaining a flexible schedule that accommodates his personal
    well‑being.
