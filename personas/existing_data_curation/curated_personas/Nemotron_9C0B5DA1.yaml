  hobbies: '[''watercolor painting'', ''birdwatching'', ''gallery and museum visits'', ''classic car restoration'', ''reading historical nonfiction and Southern literature'', ''gardening (roses, citrus,
    native shrubs)'', ''piano playing at community events'']'
  career_goals: Although retired, William aims to deepen his contribution to the community by expanding his volunteer coordination role with the Marion County Historical Society, creating an intergenerational
    art apprenticeship that pairs senior artists with high‑school students, and compiling a memoir of Ocala's evolution from the 1950s onward. He plans to acquire advanced digital‑preservation skills to
    safeguard historical photographs and to advocate for accessible public‑art installations in local parks, ensuring that cultural experiences remain vibrant for all ages.
