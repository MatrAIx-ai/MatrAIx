  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Gardening'', ''Reading (Technology & History)'', ''Model railroading'', ''Online courses (Data analytics)'', ''Community volunteering'', ''Historical
    society involvement'', ''Travel to nearby mountain resorts'']'
  career_goals: Harold aims to advance to a senior leadership role, such as Procurement Director or Vice President of Supply Chain, where he can shape organization‑wide sourcing strategies and champion
    sustainable, data‑driven procurement. He plans to earn professional certifications like CPSM and CSCP to formalize his expertise, and he hopes to mentor emerging buyers within his company. In the longer
    term, he is interested in transitioning to a consulting practice focused on helping mid‑size manufacturers implement cost‑reduction programs and digital procurement tools, balancing his desire for strategic
    impact with a more flexible work schedule.
