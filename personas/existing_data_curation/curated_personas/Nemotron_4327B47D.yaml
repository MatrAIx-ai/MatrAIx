personas:
  professional: A server with a competitive edge, Angelica Taylor blends meticulous multitasking and calm under pressure to consistently upsell and earn top-server accolades while eyeing a swift promotion
    to floor manager.
  sports: Angelica Taylor follows the Green Bay Packers with weekly game-day rituals, catches Milwaukee Brewers baseball in the summer, and competes in a local co-ed volleyball league at the community center,
    mixing her competitive drive with weekend cardio runs along the waterfront.
  arts: Angelica Taylor devotes weekends to photographing Lake Winnebago sunsets, drawing inspiration from Ansel Adams, while attending live sets by the local blues band The Great Northern and streaming
    folk musician Sufjan Stevens, and she unwinds with occasional Netflix specials featuring the Coen Brothers.
  travel: Angelica Taylor prefers spontaneous road trips within the Upper Midwest, having explored Chicago’s culinary scene and the Boundary Waters, while longing to trek Banff National Park in Canada and
    wander the historic streets of Dublin, always planning itineraries around off-peak rates and local festivals.
  culinary: Angelica Taylor’s culinary pursuits revolve around perfecting pour-over coffee with Ethiopian Yirgacheffe beans, crafting homemade bratwurst spiced with marjoram, and baking apple crumble featuring
    Wisconsin honey, balancing a novice-to-intermediate skill set with a penchant for sourcing ingredients from the local farmers’ market.
  core: Angelica Taylor is a calm, competitively driven hospitality professional who transforms coffee brewing into a science, balances community love with a quiet, reflective side, and remains skeptical
    enough to keep her edge sharp.
background:
  cultural: Angelica was raised in a middle‑class family in Green Bay, Wisconsin, with deep roots in the Midwestern cultural tradition. Her upbringing emphasized community involvement, modesty, and a strong
    work ethic characteristic of the region. She enjoys local customs such as attending Packers games, participating in community festivals, and supporting nearby farmers' markets. While she identifies
    as white American, her family heritage includes German and Polish ancestry, which has subtly influenced her appreciation for hearty, seasonal foods and a love of seasonal celebrations like Oktoberfest
    and St. Patrick's Day.
