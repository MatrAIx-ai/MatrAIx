  career_goals: Angelica aims to advance from server to floor manager within the next two years, acquiring supervisory experience and formal training in hospitality management. She plans to enroll in an
    associate’s degree program in restaurant management at a local community college, while continuing to refine her culinary skills. Long‑term, she envisions opening a boutique café that blends her love
    for specialty coffee and locally sourced pastries, offering a welcoming space that balances community interaction with quiet work areas. Her competitive drive pushes her to achieve top‑server recognition,
    lead a high‑performing team, and eventually manage a full‑service restaurant or a small boutique hotel.
