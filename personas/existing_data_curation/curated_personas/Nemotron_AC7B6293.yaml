personas:
  professional: Wendy Sansoucy, a seasoned construction crew specialist with over two decades of hands‑on framing, drywall, and concrete work, leverages an OSHA 10 certification and a pragmatic problem‑solving
    mindset to lead site safety briefings and mentor junior tradespeople while actively pursuing a GED, OSHA 30, forklift, and journeyman carpentry credentials for a future foreman role, and they aim to
    eventually launch a sustainable residential renovation business.
  sports: Wendy Sansoucy, an avid weekend hiker and seasonal angler, joins the Prince William Fishing Club for early‑morning catfish outings, follows the Washington Commanders football games on Sundays,
    supports the Washington Capitals during winter, and they stay fit by doing circuit training at the local community gym and alternating trail runs in Prince William Forest Park with occasional pick‑up
    softball games.
  arts: Wendy Sansoucy, a devoted fan of classic rock legends like Bruce Springsteen and Tom Petty and country storytellers such as Johnny Cash, often squeezes into intimate gigs at the Village Projects
    Annex, cherishes live performances by regional bluegrass band The Pigeons, and they keep a record collection on vinyl that fuels their weekend DIY woodworking sessions with a soundtrack of Fleetwood Mac
    and Sturgill Simpson.
  travel: Wendy Sansoucy, a budget‑conscious explorer who meticulously plans road trips in a spreadsheet, spends annual getaways at Shenandoah National Park’s Skyline Drive, has trekked the historic streets
    of Boston, dreams of a heritage tour of the Canadian Maritimes to connect with family roots, and they balance short‑term adventure weekends in the Blue Ridge Mountains with longer, slower‑paced stays
    at a coastal cottage in Virginia Beach when finances allow.
  culinary: Wendy Sansoucy, a competent home‑chef who transforms garden‑grown tomatoes, zucchini, and heirloom beans into hearty chicken‑and‑vegetable skillet meals, occasionally fires up a charcoal grill
    for smoked pork ribs and must‑try Old‑Bay barbecue sauce, while they perfect a rustic sour‑dough pizza topped with fresh basil and local mozzarella, and they relish occasional comfort dishes like shrimp and grits
    with a splash of hot sauce.
  core: Wendy Sansoucy, a hands‑on construction veteran with a DIY spirit, fierce work ethic, and a quiet anxiety that fuels both meticulous safety habits and occasional sleepless nights, blends pragmatism
    with curiosity to build homes, garden, and a future business while they never skip their nightly journal.
background:
  cultural: Wendy comes from a working‑class white American family with deep roots in the Mid‑Atlantic region. Her surname reflects French‑Canadian ancestry, though she was raised in Virginia where the
    local culture emphasizes hard work, self‑reliance, and community solidarity. Growing up in Prince William County she was surrounded by a blue‑collar environment that values practical skills and mutual
    support among neighbors. She attended a local public school only through eighth grade, after which she entered the construction workforce. Wendy’s cultural upbringing blends modest, pragmatic attitudes
    with occasional participation in local church activities (Methodist) and community events, reinforcing a sense of belonging and responsibility toward her peers.
attributes:
  skills: '["Power‑tool operation","Basic carpentry and framing","Concrete mixing and finishing","Drywall hanging and finishing","Site safety and OSHA 10 certification","Blueprint reading (basic)","Equipment
    maintenance","Troubleshooting on‑site issues","Team communication and safety briefings"]'
  hobbies: '["DIY home improvement","Furniture building","Gardening","Listening to classic rock and country music","Journaling","Guided meditation","Hiking in Prince William Forest Park","Fishing with friends","Reading
    construction trade magazines","Participating in online construction forums"]'
  career_goals: Wendy aims to formalize her expertise by obtaining a GED and pursuing additional certifications such as OSHA 30, a certified forklift operator license, and a journeyman carpentry credential.
    In the next three to five years she hopes to move into a foreman role, where she can lead a crew, mentor newer workers, and advocate for stronger mental‑health support on the job site. Long‑term, she
    dreams of starting her own small general‑contracting business focused on residential repairs and sustainable, energy‑efficient renovations, allowing her to blend her curiosity for new building methods
    with her practical experience.
