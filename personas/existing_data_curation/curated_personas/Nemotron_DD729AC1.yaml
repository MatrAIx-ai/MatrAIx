  hobbies: '[''Reading (architecture, art history)'', ''Photography'', ''Watercolor painting'', ''Scale model building'', ''Woodworking'', ''Hiking'', ''Gardening'', ''Chess'', ''Classical music listening'']'
  career_goals: Matthew aims to transition from regional project oversight to a senior executive role where he can shape the strategic direction of his firm. He plans to acquire a Professional Engineer
    license and the LEED Accredited Professional credential to deepen his expertise in sustainable architecture. In the longer term, he aspires to launch a boutique consultancy that focuses on innovative,
    art‑driven building solutions for the Kentucky market, positioning himself as a thought leader in integrating unconventional aesthetics with high‑performance engineering. Mentoring emerging engineers
    and championing rigorous design standards are also central to his professional ambition.
