personas:
  professional: Carolyn Betancourt, a seasoned therapeutic massage practitioner with a STEM background in anatomy and biomechanics, blends meticulous musculoskeletal assessments with compassionate Swedish,
    deep‑tissue, and myofascial release techniques while methodically managing electronic health records and business compliance, reflecting their curiosity‑driven practicality and organized reliability.
  sports: Carolyn Betancourt enjoys early‑morning desert hikes with the New River Senior Walking Club, follows the Arizona Cardinals and Phoenix Suns avidly, and participates in a seasonal community Pilates
    class that blends gentle strength work with balance training during cooler months.
  arts: Carolyn Betancourt immerses themselves in visual and literary arts, capturing cactus blooms in photographs inspired by Georgia O'Keeffe, discussing works by Margaret Atwood and Carl Sagan in the
    senior book club, and attending local theater productions starring community actors, all of which enrich their empathetic approach to wellness.
  travel: Carolyn Betancourt prefers low‑key, well‑planned adventures, organizing sunrise trips to the Sonoran Desert, weekend getaways to Joshua Tree National Park, and dreaming of a Mediterranean cruise
    to Greece that mirrors the flavors of their cooking, all while balancing a modest retirement budget and occasional family commitments.
  culinary: Carolyn Betancourt, a proficient home chef, crafts low‑salt, high‑protein Mediterranean meals such as grilled salmon with quinoa tabbouleh, chickpea falafel, and Greek salad with feta, using
    fresh herbs, lemon zest, olive oil, oregano, and a touch of agave syrup to add subtle sweetness, reflecting their health‑focused yet adventurous palate.
  core: Carolyn Betancourt balances a meticulous, curiosity‑driven wellness practice with a lingering worry that fuels their habit of triple‑checking client notes and re‑reading every health article, while
    their love for desert flora and Mediterranean flavors keeps life vibrant and grounded.
background:
  cultural: Carolyn was raised in a middle‑class family in the Midwest, where a strong work ethic, community involvement, and respect for education were central values. Her parents encouraged curiosity
    in science, leading her to pursue a STEM degree. After moving to Arizona in her thirties, she embraced the desert lifestyle and developed an appreciation for Southwestern traditions, including local
    festivals and the history of the indigenous peoples of the region. Though she identifies with mainstream white American cultural norms—such as celebrating holidays like Thanksgiving and Fourth of July—she
    also actively participates in the New River community’s multicultural events, valuing the diverse perspectives found in the area.
