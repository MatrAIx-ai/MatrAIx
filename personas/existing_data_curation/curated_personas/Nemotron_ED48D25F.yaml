personas:
  professional: Jonathan Harner, a 75‑year‑old retired mechanic turned community volunteer, leverages his hands‑on carpentry, basic plumbing, and budgeting skills to coordinate senior reading programs at
    the Elgin Public Library, mentor young volunteers at the Historical Society, and meticulously plan his vegetable garden and upcoming wooden rocking chair project, all while maintaining a structured,
    reliable approach to his responsibilities.
  sports: Jonathan Harner, an avid Chicago Cubs fan who watches every game from his living room, attends select home games at Wrigley Field when his health permits, follows the Chicago Bears season, and
    enjoys leisurely weekend fishing trips on the Fox River, all while participating in a local senior bowling league that meets monthly, reflecting his balanced love for team sports and low‑impact recreational
    activity.
  arts: Jonathan Harner, a lifelong lover of Midwestern folk and gospel music, regularly listens to Johnny Cash and Mahalia Jackson while tending his garden, delights in the historical narratives of local
    author James A. Bartlett, and attends quarterly performances at the Elgin Community Theatre, where he appreciates classic plays and community productions, integrating his appreciation for storytelling
    and melody into his leisure.
  travel: Jonathan Harner, who prefers well‑planned short‑haul trips, enjoys annual weekend getaways to Starved Rock State Park for hiking and fishing, has taken a nostalgic train journey to Chicago to
    watch the Cubs, and dreams of a calm river cruise along the Illinois River, all while balancing his desire for comfortable accommodations with his limited stamina and a modest travel budget.
  culinary: Jonathan Harner, an enthusiastic home gardener, frequently cooks seasonal meals featuring his own tomatoes, corn, and green beans, enjoys preparing simple roasted trout from his river catches,
    and occasionally bakes his favorite apple pie with a buttery crust, all while favoring straightforward recipes that highlight fresh, locally sourced ingredients.
  core: Jonathan Harner, a structured 75‑year‑old who melds hands‑on craftsmanship, modest frugality, and a love for quiet hobbies into a purposeful, community‑focused life, even if he sometimes misplaces
    his reading glasses while puzzling over a crossword.
background:
  cultural: Born and raised in the greater Chicago area, Jonathan grew up in a middle‑class white working‑family with German‑American and Irish‑American roots. He was raised in a Methodist household that
    emphasized community service, punctuality, and self‑reliance. His upbringing in the industrial suburbs of the 1950s and 1960s shaped his practical outlook and respect for routine.
