  career_goals: His primary ambition is to remain independent and healthy while continuing to give back to his community. He aims to mentor younger volunteers at the Elgin Historical Society, improve his
    digital literacy so he can video‑chat regularly with his grandchildren, and document his family’s stories for future generations. He also hopes to complete a small woodworking project—a handcrafted
    rocking chair—as a legacy piece for his family.
