  career_goals: Pamela often says she wants to become a teacher because she loves helping classmates understand new things and keeping the classroom organized. She also dreams of being a doctor or a nurse
    to care for people when they are sick, reflecting her compassionate nature. Occasionally, she imagines herself as an astronaut who explores space while keeping a neat schedule, showing her fascination
    with structure and achievement.
