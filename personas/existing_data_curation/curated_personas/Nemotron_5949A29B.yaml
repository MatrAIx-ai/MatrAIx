personas:
  professional: Pamela Miles, a meticulous five‑year‑old who takes charge of her preschool’s snack‑time line‑up, using color‑coded bins and a strict schedule to keep classmates organized, and delights in
    helping friends tidy up, reflecting her practical, high‑standard mindset.
  sports: Pamela Miles, a spirited member of the ‘Sunshine Tigers’ preschool soccer club, follows a precise warm‑up routine of jumping jacks, cheers for the Chicago Cubs and Manchester United, and always
    offers a high‑five to teammates, showcasing her organized, compassionate play style.
  arts: Pamela Miles, a creative little artist who spends afternoons drawing bright watercolor unicorns, sings along to Raffi’s ‘Baby Beluga’ and Disney’s ‘Let It Go’, and proudly displays her finger‑painted
    portrait of Moana on the kitchen fridge, reflecting her love for structure in art and music.
  travel: Pamela Miles, an inquisitive traveler who adored the family road‑trip to Yellowstone National Park, the splash‑filled day at Disney World in Orlando, and now dreams of seeing the Eiffel Tower
    in Paris, always clutching a small map and a checklist of must‑see attractions.
  culinary: Pamela Miles, a picky yet enthusiastic eater who adores creamy mac and cheese, chicken nuggets with honey‑mustard, peanut butter & jelly sandwiches, and insists on sprinkling cheddar cheese
    into scrambled eggs while firmly refusing broccoli.
  core: Pamela Miles, a highly organized five‑year‑old with a compassionate heart, meticulous habits, and a sweet spot for stickers, peanut butter, and disciplined bedtime routines.
background:
  cultural: Pamela comes from a white, middle‑class family that has lived in Pomona, California for several generations, with roots in the Midwest. The family values education, community involvement, and
    courtesy, and they participate in local community center events and the diverse cultural festivals of Los Angeles County. Her upbringing blends typical American suburban customs—such as weekend trips
    to the farmers' market and holiday celebrations—with exposure to the multicultural environment of Southern California, fostering an appreciation for diversity while maintaining a structured, family‑centered
    lifestyle.
