persona_description: A historian and political scientist who specializes in the study of the civil rights movement in the United States, particularly the role of the Student Non-Violent Coordinating Committee
  (SNCC) in organizing and advocating for civil rights. The person is interested in the power dynamics between citizens and those who would rule them, and how these dynamics are reflected in the actions
  of the SNCC and other civil rights organizations. They are knowledgeable about the political and social context of the mid-1960s conflicts over civil rights, and have a deep understanding of the key events
  and figures of the civil rights movement. They are also skilled at analyzing data and using it to make informed arguments and predictions about the future of civil rights and political power.
