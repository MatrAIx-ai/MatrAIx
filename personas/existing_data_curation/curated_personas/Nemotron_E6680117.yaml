  hobbies: '[''Volunteering at senior center'', ''Attending Detroit Lions and Pistons games'', ''Exploring local history and genealogy'', ''Casual photography'', ''Listening to classic rock'', ''Reading
    mystery novels'', ''Cooking and sharing recipes'', ''Participating in community trivia nights'']'
  career_goals: Randall aims to leverage his long‑standing administrative expertise into a supervisory or office‑manager role within a midsized nonprofit or community organization in Macomb County. He plans
    to earn a Microsoft Office Specialist certification and to deepen his knowledge of project‑management tools (e.g., Trello, Asana) so he can lead cross‑functional initiatives. He also hopes to mentor
    younger administrative staff, sharing his practical know‑how while encouraging their curiosity about new technologies. Over the next five years, he envisions a position where he can blend his love for
    people interaction with strategic support for organizational goals, perhaps overseeing a small team that coordinates community outreach events.
