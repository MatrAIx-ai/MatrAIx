  career_goals: Benedicta dreams of becoming a teacher or a veterinarian, careers that let her share knowledge and care for living beings. She imagines a future where she can help other children learn and
    explore, while also caring for animals in a clinic or shelter. Her practical side also envisions working in a community garden or food‑bank project, using her organizational skills to grow plants and
    share fresh produce with her neighborhood. These ambitions blend her curiosity, compassion, and desire to make a tangible difference.
