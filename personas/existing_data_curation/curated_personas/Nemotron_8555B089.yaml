  career_goals: Nissim aims to graduate high school with strong STEM credentials and enroll in a community college program that offers engineering or environmental science pathways. He envisions a future
    where he can merge his love for technology and the outdoors by becoming an environmental engineer or a renewable‑energy specialist, designing sustainable solutions for Colorado's growing communities.
    In the short term, he plans to earn certifications in coding and robotics, join a high‑school engineering club, and secure a summer internship with a local tech startup or a conservation organization
    to gain real‑world experience.
