persona_description: A linguist who is interested in the development of syntax and phonology in human languages, and the role of social context in the evolution of sound combinations. This person is likely
  to be curious about the similarities and differences between the order of development of different types of sound combinations in different species, and how social factors may have influenced the evolution
  of these sound combinations. This person is also interested in the implications of the absence of unambiguous examples of phonology in animal communication systems for the understanding of language evolution.
