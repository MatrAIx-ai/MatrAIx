  career_goals: Looking ahead, Florence aims to transition into a district‑wide leadership role where she can champion flexible, student‑centred learning models for early childhood education while maintaining
    fiscal responsibility. She is passionate about creating robust mental‑health supports for staff and learners, expanding grant‑funded community partnerships, and mentoring emerging administrators. Ultimately
    she hopes to consult with rural school districts to help them adopt sustainable, innovative practices that balance tradition with new pedagogical research.
