persona_description: A plumbing professional who specializes in the design and installation of plumbing systems, particularly in the field of water heating and temperature control. This individual is familiar
  with the latest advancements in plumbing products and designs, including single-temperature sensor faucets, showers, and gang or multiple showers. They are skilled in understanding the hazards of scalding
  and thermal shock and are aware of the need for additional standards to properly identify and guide the three distinct categories of products and design/use configurations. They are also aware of other
  standards that govern temperature or pressure changes and individual pressure-balancing or inline valves.
