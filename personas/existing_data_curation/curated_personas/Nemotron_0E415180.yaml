personas:
  professional: Kathy Hennings, a nursing student, combines detailed patient assessment, IV line placement, and diligent EHR documentation with a compassionate bedside manner, thriving in unpredictable
    shift demands while dreaming of a future charge‑nurse role that balances routine scheduling with on‑the‑fly decision‑making.
  sports: Kathy Hennings enjoys weekend river walks and regular yoga practice, plays intramural volleyball with the campus club, follows the Detroit Tigers and Michigan Wolverines, and runs with the River
    Runners club for local 5K events.
  arts: Kathy Hennings finds creative solace in contemporary mystery novels by Tana French and Gillian Flynn, playlists of indie folk such as The Lumineers, classic jazz from Ella Fitzgerald while she bakes,
    and occasional indie film screenings like 'Knives Out' that satisfy her love for twists.
  travel: Kathy Hennings alternates between meticulously planned weekend getaways to nearby Chicago and Detroit and spur‑of‑the‑moment road trips to the Michigan shoreline, while dreaming of a future backpacking
    adventure through Paris and the French countryside once she completes her nursing degree.
  culinary: Kathy Hennings expertly bakes family‑style apple pies and cinnamon rolls while whimsically adding lavender honey to cupcakes, favors using fresh rosemary, thyme, and locally sourced berries,
    and balances her kitchen experiments with a pragmatic eye on calorie counts.
  core: Kathy Hennings is a compassionate nursing student who thrives on routine care but constantly battles anxiety, finding balance through spontaneous baking experiments, yoga, and occasional road‑trip
    escapes.
background:
  cultural: Raised in a middle‑class white family in Trenton, Michigan, she embodies Midwestern values of hard work, modesty, and community involvement. Her upbringing included participation in local church
    events and neighborhood gatherings, reinforcing a sense of responsibility toward neighbors. The cultural emphasis on practicality and routine has shaped her preference for reliable schedules, while
    the region’s blend of seasonal outdoor activities encourages her appreciation for nature and occasional spontaneity.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''Intravenous therapy'', ''Medication administration'', ''Wound care'', ''Catheter management'', ''Electronic health record documentation'',
    ''Infection control'', ''Patient education'', ''Empathetic communication'', ''Team collaboration'']'
  hobbies: '[''Baking'', ''Walking along the Huron River'', ''Reading mystery novels'', ''Volunteering at community health clinic'', ''Yoga'', ''Road trips with friends'']'
  career_goals: She plans to earn a Bachelor of Science in Nursing within the next two years to qualify for advanced practice roles. In the medium term, she aims to become a charge nurse on her unit, using
    her practical mindset to support staff scheduling while still allowing room for spontaneous problem‑solving. Long‑term, she aspires to specialize in palliative or geriatric nursing, where her compassion
    and desire for harmony can make a meaningful impact on patients' end‑of‑life experiences. Additionally, she hopes to mentor new nurses, sharing practical skills and fostering a supportive work environment,
    and she is mindful of managing stress through self‑care practices.
