  career_goals: Michael aims to advance to a foreman role within the next three years, earn OSHA construction safety certification, and complete a GED to broaden his technical knowledge. He envisions eventually
    establishing his own small general contracting business that focuses on sustainable residential projects and integrates artistic elements like custom woodwork and murals. He also hopes to mentor younger
    workers and contribute to community building initiatives.
