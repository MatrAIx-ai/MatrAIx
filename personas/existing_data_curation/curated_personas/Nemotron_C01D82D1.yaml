personas:
  professional: Janice Scudder, a 20‑year‑old STEM graduate, is targeting a quality‑assurance technician role where they can apply their steady hand at instrument calibration, meticulous Excel data logs,
    and calm, assertive presence in routine‑driven manufacturing environments.
  sports: Janice Scudder enjoys low‑key fitness by walking the local beaches and nature trails three times a week, occasionally joining the community’s weekend jog club that backs the regional soccer team,
    and they follow the hometown basketball franchise’s schedule for occasional game‑day outings.
  arts: Janice Scudder finds creative solace in knitting patterned scarves using locally sourced wool, attends the monthly book club where they discuss practical non‑fiction by authors like Malcolm Gladwell,
    and they unwind listening to folk‑rock playlists featuring artists such as Joni Mitchell and contemporary singer‑songwriter Brandi Carlile.
  travel: Janice Scudder prefers short, planned road trips to coastal towns and nearby state parks, where they can harvest wild herbs for their garden, and they dream of a future spring visit to the Tuscan
    countryside to study sustainable farming practices.
  culinary: Janice Scudder delights in cooking hearty vegetable stews, roasted root vegetables, and simple sourdough bread using produce from their modest garden, relies on step‑by‑step recipes from family‑passed
    cookbooks, and they regularly experiment with seasonal herbs like rosemary and thyme.
  core: Janice Scudder is a routine‑loving, calm 20‑year‑old who balances meticulous work habits with cozy, hands‑on hobbies, quietly asserting themselves when needed while savoring simple, predictable
    joys.
background:
  cultural: Janice grew up in a white, middle‑class family in the Gulf Coast region of Florida, absorbing a blend of Southern hospitality and coastal lifestyle. The community’s emphasis on family, practical
    work ethic, and respect for tradition shaped her values of routine, self‑reliance, and straightforward communication. Growing up near Niceville, she has been surrounded by a modest military presence,
    which reinforced a sense of order and resilience. Her cultural upbringing includes occasional church gatherings, community festivals, and an appreciation for outdoor activities like fishing and beach
    outings, all of which contribute to her pragmatic and calm outlook.
