  career_goals: Janice aims to secure a stable, routine‑oriented position in a technical field where she can apply her practical skill set. She targets roles such as quality‑assurance technician, production
    analyst, or junior data‑analyst at a local manufacturing firm or healthcare provider. She intends to obtain industry certifications (e.g., Six Sigma Green Belt, OSHA safety) within the next two years
    to increase her employability. While open to exploring related opportunities, she prioritizes jobs that offer predictable schedules, clear procedures, and a supportive team environment. In the longer
    term, she considers modest advancement into supervisory roles that still keep her close to day‑to‑day operations.
