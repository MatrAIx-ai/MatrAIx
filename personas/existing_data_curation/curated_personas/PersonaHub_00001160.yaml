persona_description: A researcher at the University of Buffalo who specializes in the development of chemical sensors. The researcher has pioneered investigations into the use of xerogels as the basis for
  new chemical sensors. The researcher is working on developing new ways to stabilize and trap proteins within xerogels, which will allow for the development of sensors that can simultaneously detect numerous
  chemicals in a sample. The researcher is also working on pin printing chemical sensors on top of an LED to form a self-contained sensor array platform.
