  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Philosophy Reading'', ''Literary Fiction'', ''Small Book Circle'', ''Native Wildflower Gardening'', ''Museum Docent Volunteering'', ''Beginner Piano'',
