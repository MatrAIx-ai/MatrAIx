  career_goals: Joan aims to leverage her extensive managerial experience into a mentorship role, guiding emerging leaders in nonprofit arts organizations. She aspires to develop a community arts program
    that blends her curiosity for novelty with her commitment to harmony, and she wishes to pursue part-time consulting to help small businesses implement creative process improvements. Additionally, she
    hopes to complete a short course in digital storytelling to share her life experiences and reflections on resilience.
