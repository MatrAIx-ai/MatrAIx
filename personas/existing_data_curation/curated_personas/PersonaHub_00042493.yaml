persona_description: A researcher in Environmental Sustainability Management who is interested in developing algorithms for Multi Criteria Analysis (MCA) and has experience with scaling functions, Analytical
  Hierarchy Process (AHP), and Weighted Linear Combination (WLC). This person is skilled in using remote sensing data and GIS analysis to prepare input data for environmental impact assessments and has
  a keen interest in developing a model that can be run without satellite data or GIS software, with little inaccuracy. This person is also interested in the flexibility of the model to adjust for any number
  of classes and parameters in one class, and how this can be useful for developing environmental sustainability planning in areas where data availability is a significant challenge.
