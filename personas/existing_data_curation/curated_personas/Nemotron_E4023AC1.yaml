  hobbies: '[''Adult Soccer League (Midfield)'', ''Barbecue cooking Mexican cuisine'', ''Fishing at Lake Weirs'', ''Attending Mexican cultural festivals'', ''Volunteering at local community center (youth
    sports)'', ''Family gatherings and celebrations'', ''Gardening (vegetable garden)'', ''Listening to classic rock and mariachi music'']'
  career_goals: Carlos aims to deepen his expertise by obtaining a Certified Power Systems Operator credential and completing an associate degree in Electrical Engineering Technology. Over the next five
    years he hopes to transition into a senior dispatcher or plant operations supervisor role, where he can lead safety initiatives, mentor junior operators, and influence the integration of renewable energy
    sources into the plant’s grid. He also envisions contributing to the development of a community outreach program that educates local schools about energy careers.
