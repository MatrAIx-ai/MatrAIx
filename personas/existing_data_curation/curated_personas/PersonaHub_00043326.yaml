persona_description: A special education teacher who is responsible for the academic and personal development of students with disabilities. They are familiar with the legal and educational context of testing
  accommodations, current issues in testing accommodations, and the rationale for the special issue on testing accommodations. They are passionate about ensuring that all students, including those with
  disabilities, have equal access to assessments and are able to participate meaningfully in the educational process. They are dedicated to developing a greater understanding of key issues surrounding testing
  accommodations to facilitate the meaningful participation of all students in assessments.
