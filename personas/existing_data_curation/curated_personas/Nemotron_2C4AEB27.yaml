personas:
  professional: Sandra Hickman, a 67‑year‑old veteran of industrial textile pressing, blends three decades of machine operation, quality inspection, and team coordination with pragmatic curiosity to launch
    a home‑based quilting studio, mentor younger plant workers, and champion sustainable fabric practices, all while navigating a relaxed, occasionally disorganized approach to planning.
  sports: Sandra Hickman enjoys low‑impact activity, regularly joining a community square‑dancing class and a senior walking club that explores nearby trails, occasionally cheering on the St. Louis Cardinals
    during baseball season, and participates in a local senior bowling league for friendly competition.
  arts: Sandra Hickman immerses themselves in the arts through a vibrant quilting circle, draws inspiration from textile innovators like Faith Ringgold and Grayson Perry, listens to The Textile Podcast
    and folk music from Bob Dylan, and regularly attends regional craft shows where they showcase quilts and absorb historic narratives from their book club.
  travel: Sandra Hickman prefers leisurely road trips with their husband to historic Midwestern towns such as Galena, Illinois, and Hannibal, Missouri, attends specialty quilt festivals like the International
    Quilt Festival in Houston, and dreams of a guided tour of Europe’s textile museums in Barcelona, all while balancing travel costs with their semi‑retired budget.
  culinary: Sandra Hickman delights in cooking classic Midwestern fare—pot roast, cornbread, and apple pie—while seasoning dishes with garden‑fresh herbs like rosemary, thyme, and basil, occasionally experimenting
    with heirloom tomato salads and herb‑infused butter inspired by quilting podcast recipes.
  core: Sandra Hickman, a 67‑year‑old textile expert turned quilting enthusiast, balances pragmatic curiosity, a flexible, sometimes disorganized lifestyle, and a competitive yet sociable spirit while championing
    sustainable crafts and community involvement.
background:
  cultural: Sandra’s cultural roots are firmly planted in the Midwestern, small‑town ethos of Iowa. Raised in a white, German‑American family in Jones County, she grew up with the values of self‑reliance,
    modesty, and community participation that define rural Iowa. Church gatherings, potluck dinners, and the annual Iowa State Fair have been central to her family traditions. Her upbringing emphasized
    a respect for hard work, craftsmanship, and the agricultural landscape that surrounds Oxford Junction. These influences shape her practical outlook, love of seasonal foods, and her commitment to fostering
    community ties through local events and volunteer work.
attributes:
