  hobbies: '[''Reading classic literature'', ''Journaling'', ''Poetry writing'', ''Walking in local parks'', ''Birdwatching'', ''Yoga and meditation'', ''Container gardening'', ''Visiting art exhibitions'',
    ''Urban photography'', ''Archival research volunteering'']'
  career_goals: Marsha aspires to advance into senior leadership within the nonprofit sector, aiming for roles such as Director of Community Services or Executive Director of a citywide social impact organization.
    She seeks to build evidence‑based, scalable programs that address systemic inequities, secure sustainable funding streams, and foster cross‑sector partnerships. To support these ambitions, she plans
    to pursue a Master of Public Administration or a professional certification in nonprofit leadership, deepen her strategic planning expertise, and champion resilient, inclusive community networks while
    maintaining a balanced, low‑stress lifestyle.
