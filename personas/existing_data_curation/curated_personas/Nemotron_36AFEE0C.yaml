  career_goals: Even at two, Julio imagines a future where he can create bright, colorful pictures that make his family smile, hinting at a budding ambition to become a painter or illustrator. He also loves
    the idea of building tall towers, so he pictures himself as a builder or engineer. The rhythmic sounds of drums and the lively tunes of Mexican folk music spark a dream of being a musician who can make
    people dance. His competitive streak shows up in simple games where he wants to be the best at drawing or stacking, reflecting an early drive to excel in creative and hands‑on fields while maintaining
    the flexibility to explore new ideas.
