personas:
  professional: Rin Vo, an 11‑year‑old aspiring game developer and science club enthusiast, applies disciplined project planning learned from bullet‑journal routines to create Scratch games that incorporate
    simple physics experiments, often collaborating with friends during after‑school sessions.
  sports: Rin Vo, an 11‑year‑old volleyball enthusiast, competes on their school's co‑ed team, joins weekend beach volleyball sessions at Waikiki where they look up to the University of Hawaii Rainbow Warriors
    men's volleyball squad, and maintains a disciplined weekly training schedule that balances skill drills with conditioning.
  arts: Rin Vo, an 11‑year‑old K‑pop dance aficionado and manga reader, practices choreographies from BTS, Blackpink, and EXO, devours series like One Piece and My Hero Academia, and channels the vibrant
    aesthetics of both Korean pop and Japanese comics into elaborate bullet‑journal spreads.
  travel: Rin Vo, an 11‑year‑old beach explorer, prefers family‑planned trips that mix adventure with relaxation, has visited Lanikai Beach, the Na Pali Coast, and the Polynesian Cultural Center, and dreams
    of touring Tokyo's Akihabara district and Kyoto's historic temples while budgeting each journey in their detailed travel journal.
  culinary: Rin Vo, an 11‑year‑old baking enthusiast, enjoys crafting traditional Japanese sweets such as mochi and dorayaki with matcha filling alongside their mother, experiments with Hawaiian shave‑ice
    using pineapple and coconut syrups, and occasionally adds chocolate chips to their cookies for a playful twist.
  core: Rin Vo, an 11‑year‑old who blends bullet‑journal precision with a love of volleyball, K‑pop, and coding, constantly balances high standards and social energy, though they sometimes over‑schedule
    themselves and neglect downtime.
background:
  cultural: Rin is a second‑generation Japanese‑American growing up in Pearl City, Hawai‘i. Her parents immigrated from Osaka and maintain strong ties to Japanese traditions, such as language, cuisine,
    and seasonal festivals, while also embracing the multicultural fabric of Hawaiian life. She attends a public middle school where she participates in both a Japanese cultural club and Hawaiian hula classes,
    giving her a blended sense of identity that values education, respect for elders, and community involvement.
