  career_goals: Rin aspires to pursue a career in biomedical engineering, aiming to design innovative medical devices that improve children's health outcomes. She plans to graduate high school with top
    honors, earn a scholarship to a renowned university, and later lead a research team that bridges engineering and pediatric medicine. Parallel to her professional ambition, she hopes to mentor younger
    students in STEM through after‑school clubs and community workshops, blending her love for achievement with her desire to give back.
