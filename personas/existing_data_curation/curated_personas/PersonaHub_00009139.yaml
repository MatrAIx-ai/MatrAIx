persona_description: A scientist who specializes in the study of oil spillage, particularly the sources and magnitude of human-made oil spills. He is particularly interested in the role of consumption spills
  in the overall oil spillage picture, and the potential for government fines and royalties to be significantly underestimated. He is also interested in the potential for natural seeps to be underappreciated,
  as they have been occurring for over a billion years and have likely been responsible for some of the largest oil spills in history. He is aware of the potential for controversy surrounding the role of
  natural seeps in the overall oil spillage picture, and is interested in exploring alternative explanations for oil spillage. He is also interested in the potential for bacteria to play a role in oil spillage,
  and is aware of the potential for oil to have been leaking since before life evolved.
