personas:
  professional: May Ayme, an aspiring game developer, writes structured Scratch programs and designs methodical Minecraft towns, channeling their love of order and detail into digital creations that balance
    creativity with predictable logic, and they enjoy turning logical puzzles into playful challenges.
  sports: May Ayme participates in the River Valley Rangers youth soccer league during spring, attends after‑school swimming lessons at the community pool, follows the Seattle Seahawks and the local high
    school basketball team, the Valley Eagles, and they cheer from a modestly organized fan group of friends.
  arts: May Ayme captures wildlife in detailed sketchbook drawings, immerses themselves in Agatha Christie mysteries and the classic Bakersfield sound of Buck Owens and Merle Haggard, and they enjoy strategic
    board game nights featuring Settlers of Catan with a tight circle of friends.
  travel: May Ayme’s travel style blends careful planning with a love for nature, recalling family weekend trips to Yosemite’s meadow trails and dreaming of a future adventure to Costa Rica’s Monteverde
    Cloud Forest while they save allowance for a school‑organized field trip to Washington, D.C.’s National Museum of Natural History.
  culinary: May Ayme enjoys baking chocolate chip cookies for friends, whipping up fresh garden salad with tomatoes, cucumbers, and basil from the family’s vegetable patch, and they occasionally indulge
    in homemade pepperoni pizza topped with extra cheese.
  core: May Ayme, a meticulous teen with a penchant for structured creativity, balances a love of digital game design, quiet reading, and garden‑fresh cooking while they navigate the occasional over‑planning
    quirk and a sweet tooth for cookies.
background:
  cultural: May Nicole comes from a white, middle‑class family that has lived in Bakersfield, California for several generations. Her ancestry includes European roots such as German and Irish, reflected
    in family traditions like holiday baking and summer picnics. Growing up in Kern County’s agricultural setting, she often helps with the family’s garden and has been exposed to the region’s oil‑industry
    economy and the iconic Bakersfield country music scene. While the community is culturally diverse, her immediate social circle is primarily other white middle‑school students, and she celebrates typical
    American holidays and participates in local events such as the Kern County Fair. The blend of suburban stability, agricultural work ethic, and Southern‑California openness shapes her practical outlook
    and appreciation for routine.
