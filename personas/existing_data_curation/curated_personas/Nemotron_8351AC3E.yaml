  career_goals: May Nicole aspires to turn her love for animals and her detail‑oriented mindset into a career as a veterinary technician. She plans to enroll in a high‑school STEM program, take advanced
    biology classes, and later pursue an associate’s degree in veterinary technology. She also envisions a backup path in civil engineering, drawn by her fascination with structures and problem‑solving,
    aiming to work on sustainable community projects in the Central Valley. Regardless of the field, she wants a profession that combines practicality, routine, and the opportunity to help others.
