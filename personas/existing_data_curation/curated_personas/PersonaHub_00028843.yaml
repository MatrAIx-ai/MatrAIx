persona_description: An ecologist who is interested in studying the effects of environmental change on animal populations, particularly those that buffer their temporal variation in adult survival through
  the demographic buffering strategy. This person is knowledgeable about the effects of droughts on tortoise populations and has experience using field data to analyze the effects of environmental variables
  on reproduction rates. They are also skilled in using integral projection models to simulate the effects of different scenarios of drought recurrence on λ under different degrees of intensity in the survival-reproduction
  trade-off. This person is interested in determining how effective the management of environmental drivers can be for demographically buffering populations and how scenarios may not provide long-term population
  persistence.
