  hobbies: '[''listening to jazz and gospel lullabies'', ''reading picture books with vivid illustrations'', ''playing with textured sensory toys'', ''scribbling with crayons'', ''quiet solitary play'',
    ''participating in small family music sessions'']'
  career_goals: Willie's deep appreciation for art, music, and harmonious social interaction points to a future ambition of becoming a visual artist or community musician who creates inclusive, soothing
    spaces for families in New Orleans. He hopes to continue his education beyond the eighth grade, eventually pursuing a degree in fine arts or arts education, and to use his creative talents to foster
    community cohesion and provide emotional support for peers who, like him, may feel stress or anxiety.
