persona_description: A researcher studying the impact of social capital on infectious diseases, particularly in low-income communities. They are interested in the protective and protective factors that
  contribute to lower rates of STDs, HIV/AIDS, and teen pregnancy. They have found that social capital, particularly the interconnectedness of people in a community, is a strong predictor of these outcomes.
  They have also observed that in communities with high social capital, there are lower rates of infectious diseases. They are therefore advocating for the importance of building stronger communities to
  intervene in multiple diseases simultaneously.
