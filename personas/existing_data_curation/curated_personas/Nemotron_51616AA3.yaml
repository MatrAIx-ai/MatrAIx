  hobbies: '["Gardening (vegetables and herbs)", "Woodworking", "Reading electrical trade magazines", "Listening to traditional Mexican music", "Cooking Mexican dishes", "Walking on the beach at sunrise",
    "Volunteer electrical safety workshops for seniors", "Playing chess alone", "Attending mass at the local church"]'
  career_goals: Juan aims to transition to part‑time consulting, offering reliable electrical inspections and safety advice to local seniors while mentoring apprentices. He plans to obtain a formal journeyman
    certification to solidify his legacy, maintain a modest independent service for steady income in retirement, and continue contributing to his community through volunteer safety workshops.
