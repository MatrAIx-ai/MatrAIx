personas:
  professional: Juan Araya, a seasoned electrician with over four decades of residential wiring expertise, applies a methodical, safety‑first mindset to every inspection, meticulously documents his work,
    mentors apprentices with patience, and plans to transition to part‑time consulting for senior homeowners while pursuing journeyman certification.
  sports: Juan Araya stays active through solitary sunrise walks on Oxnard Beach, follows the Los Angeles Dodgers and the LA Galaxy with loyal devotion, participates in a senior walking club at the local
    park, and enjoys low‑impact gardening as his daily fitness routine.
  arts: Juan Araya finds solace in classic boleros and rancheras by José José and Vicente Fernández, attends occasional church concerts featuring traditional hymns, collects vintage electrical trade magazines
    as cherished artifacts, and spends quiet evenings sketching woodworking designs inspired by folk art motifs.
  travel: Juan Araya prefers carefully planned road trips to tranquil destinations like Santa Barbara’s wine country and the historic missions along the California coast, dreams of a pilgrimage to Oaxaca
    to explore its culinary heritage, but limits travel to short, low‑stress outings that fit his modest retirement budget.
  culinary: Juan Araya, an avid home cook, prepares traditional dishes such as pozole, chiles en nogada, and tamales using fresh garden herbs, ripe tomatoes, and hand‑ground corn masa, enjoys the ritual
    of simmering mole for hours, but admits to over‑seasoning with chili powder whenever he’s in a hurry.
  core: Juan Araya, a quiet guardian of safety and tradition, blends meticulous electrical expertise with sunrise beach walks, bolero ballads, and a steadfast devotion to routine.
background:
  cultural: Juan was born to Mexican immigrant parents and grew up in a bilingual, Catholic household that emphasized hard work, family honor, and community support. He maintains strong ties to Mexican
    cultural traditions such as Día de los Muertos, prepares home‑cooked Mexican meals, and participates modestly in local Latino festivals and church activities in Oxnard. His cultural values reinforce
    his practical, reliable nature and his desire to serve neighbors quietly.
attributes:
  skills: '["Residential wiring", "Circuit troubleshooting", "Electrical safety inspections", "Installation of lighting and outlets", "Use of hand and power tools", "Basic blueprint reading", "Mentoring
