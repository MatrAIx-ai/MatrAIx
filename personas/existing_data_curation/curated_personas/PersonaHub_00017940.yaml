persona_description: A psychologist who specializes in the study of implicit behavior and cognitive processes, particularly valence and stereotype IATs. She has conducted research on the effects of stimulus
  selection and stereotype associations on IAT performance, and has published her findings in peer-reviewed journals. Her expertise includes the development and validation of IATs for measuring implicit
  anxiety and self-esteem, as well as the interpretation of the results in terms of social cognition and group dynamics. She is also interested in the potential applications of IATs in cognitive science,
  psychology, and sociology.
