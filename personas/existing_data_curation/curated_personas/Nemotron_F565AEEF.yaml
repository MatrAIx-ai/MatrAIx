personas:
  professional: Myrtle Harris, a retired community historian turned volunteer docent, channels her meticulous budgeting, art‑history expertise, and methodical event‑planning skills into curating themed
    tours at the Providence Museum of Art and coordinating local heritage talks, all while maintaining a skeptical eye toward unverified historical claims.
  sports: Myrtle Harris enjoys low‑impact fitness, strolling the Providence Riverwalk during spring and playing weekly senior pickleball matches at the Riverside Community Center, while cheering on the
    Providence Bruins in the NHL and the Boston Celtics in the NBA as loyal seasonal fans.
  arts: Myrtle Harris immerses herself in visual arts, frequenting the Providence Museum of Art to study works by Edgar Degas, Mary Cassatt, and contemporary New England painter Carole Dooling, while also
    attending intimate gallery openings featuring emerging artists like Jacob Collins, and recording detailed notes that fuel her informal discussion circles.
  travel: Myrtle Harris prefers carefully planned journeys, often traveling with her sister to historic New England towns such as Salem, Concord, and Newport, with a bucket‑list destination of the historic
    gardens of Versailles, yet balances these trips with budget‑conscious stays at cozy B&Bs while maintaining their beloved garden at home.
  culinary: Myrtle Harris relishes cooking farm‑to‑table meals, expertly preparing heirloom tomato bruschetta, roasted root vegetables with rosemary, and culinary classics like New England clam chowder,
    while also skillfully baking sourdough bread using her own garden herbs, and delights in pairing these dishes with a glass of crisp riesling.
  core: Myrtle Harris combines a quiet curiosity for art and history with a methodical, budget‑savvy mindset, a love for solitary gardening, a competitive streak in chess and puzzles, and a habit of meticulously
    documenting every bird sighting and family lineage.
background:
  cultural: Myrtle is a white New Englander whose upbringing in mid‑20th‑century Rhode Island was shaped by modest, community‑oriented values. Her family’s cultural roots trace back to Irish and English
    immigrants who settled in the region, fostering a respect for self‑reliance, frugality, and the preservation of local heritage. She grew up attending a small Protestant congregation, which emphasized
    service, education, and quiet reflection. The maritime and agricultural history of Kent County, along with seasonal town festivals and the close‑knit nature of Hope, have instilled in her a deep appreciation
    for regional traditions, neighborly cooperation, and the subtle beauty of New England’s seasonal cycles.
