    User 1: I like to read, too. I''m not much of a gamer, though.


    User 2: Oh, that''s too bad. Halo is a lot of fun.


    User 1: I''m sure it is. I just don''t have much time for gaming.


    User 2: I understand. I work for a magazine, so I don''t have much time for gaming either.


    User 1: What kind of magazine do you work for?


    User 2: I work for a magazine about health and fitness.


    User 1: Oh, that sounds interesting. Do you like it?


    User 2: I love it! I''m passionate about health and fitness, so it''s great to be able to write about it for a living.


    User 1: That''s awesome. I''m glad you have a job you love.


    User 2: Thanks! I am too.


    User 1: So, what are you doing this weekend?


    User 2: I''m not sure yet. I might go to the gym or read a book.


    User 1: Oh, that sounds like fun. I''m going to go to a party this weekend.


    User 2: Oh, that sounds fun! Have a good time.


    User 1: Thanks! You too!'
