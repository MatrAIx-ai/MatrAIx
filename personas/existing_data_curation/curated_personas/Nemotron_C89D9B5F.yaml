personas:
  professional: Carlos Mcghee, a 43‑year‑old construction helper with a strong grasp of blueprints and an eye for color and texture, they blend meticulous material‑estimation and safety‑first site inspections
    with collaborative mentorship of junior crew members, aiming to earn an OSHA‑30 certification and a Green Building Professional credential within five years to step into a foreman role and eventually
    launch a community‑focused contracting business.
  sports: Carlos Mcghee, a Boston‑based sports enthusiast, they follow the Red Sox, Celtics and Patriots devotionally, join a local cycling club for weekend rides along the Charles River, play pickup basketball
    at the community center in the evenings, and keep a flexible fitness routine that includes yoga after construction shifts.
  arts: Carlos Mcghee, an avid supporter of Boston’s contemporary art scene, they frequent the Museum of Fine Arts and smaller galleries showcasing African‑American artistry, sketch historic brick facades
    in a weathered sketchbook, unwind playing acoustic guitar to John Coltrane standards and Kendrick Lamar verses, and study the works of Banksy and Kara Walker for inspiration in both art and design.
  travel: Carlos Mcghee, a thoughtful traveler whose trips blend cultural immersion with purposeful planning, they have explored the historic streets of Charleston, the vineyards of Napa Valley, and the
    bustling markets of Kyoto, while preferring itineraries that include museum tours, local volunteer projects, and modest lodging that lets them cook with herbs from their balcony garden.
  culinary: Carlos Mcghee, a home‑cooking enthusiast with a green thumb, they love preparing New England clam chowder, grilled salmon with lemon‑herb quinoa, and a rustic ratatouille that showcases basil,
    rosemary, and fresh tomatoes, often harvesting herbs from their balcony garden to elevate each dish.
  core: Carlos Mcghee, a detail‑oriented builder who balances artful sketching and gardening with a disciplined work ethic, they constantly double‑check safety harnesses, hoard watercolor supplies, and
    never miss a chance to volunteer on a Habitat for Humanity project, even if it means skipping a late‑night jazz gig.
background:
  cultural: Carlos is an African‑American born and raised in the Boston area, with deep roots in the city’s working‑class neighborhoods. His family’s traditions emphasize community solidarity, respect for
    skilled labor, and a love of music and storytelling. Growing up, he was immersed in the sounds of gospel, jazz, and hip‑hop, which continue to shape his cultural identity. Participation in his local
    church and neighborhood block parties has reinforced values of cooperation and mutual support. Carlos draws inspiration from the broader Black artistic diaspora, incorporating its visual motifs and
    narratives into his appreciation for design and his community‑focused outlook.
attributes:
