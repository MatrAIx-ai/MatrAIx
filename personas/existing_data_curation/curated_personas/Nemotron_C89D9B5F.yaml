  hobbies: '[''visiting art museums'', ''sketching architecture'', ''playing acoustic guitar'', ''reading historical biographies'', ''gardening'', ''volunteering with Habitat for Humanity'', ''attending
    local jazz performances'', ''DIY woodworking projects'', ''exploring Boston neighborhoods'', ''participating in community cultural festivals'']'
  career_goals: Carlos aims to advance from a helper role to a foreman position within the next three to five years, obtaining certifications such as OSHA 30‑hour construction safety and a Green Building
    Professional credential. He is interested in deepening his understanding of energy‑efficient construction methods and hopes to lead projects that incorporate environmentally responsible materials. Ultimately,
    Carlos envisions establishing his own modest contracting business that focuses on community‑centered renovations and culturally resonant design elements, allowing him to blend his artistic interests
    with his construction expertise.
