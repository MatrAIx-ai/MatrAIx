personas:
  professional: Earl Urbanski, a seasoned environmental engineer and certified project manager, leverages his GIS expertise and regulatory acumen to craft cost‑effective stormwater and wetland solutions
    while methodically planning his path to PE licensure and senior leadership in climate‑resilient infrastructure.
  sports: Earl Urbanski, an avid kayaker and recreational soccer player in the Mid‑Atlantic League, supports D.C. United during the MLS season, follows the Washington Capitals for a winter hockey fix, and
    hits the local community gym three times a week to maintain stamina for marsh clean‑ups and weekend hikes.
  arts: Earl Urbanski, a folk‑rock guitar enthusiast, frequently covers John Mayer and Bob Dylan at neighborhood gatherings, admires the storytelling of author Margaret Atwood, and draws inspiration from
    photographer Ansel Adams for his own nature shots, while secretly hoarding a collection of vintage vinyl records that clutter his garage.
  travel: Earl Urbanski, a road‑trip aficionado, has trekked the Appalachian Trail in Shenandoah National Park, photographed the towering cliffs of Zion, and dreams of exploring Iceland’s geothermal landscapes,
    preferring self‑planned itineraries that blend hiking, wildlife photography, and local food stops.
  culinary: Earl Urbanski, a backyard garden-to-table chef, delights in grilling heirloom tomatoes, zucchini, and smoked trout on the smoker, seasonally preparing a Chesapeake crab boil with Old Bay, and
    experimenting with fresh herbs like rosemary and thyme to elevate his weekly barbecue feasts.
  core: Earl Urbanski, a meticulously organized yet sociable 44‑year‑old, merges his love for sustainable engineering with weekend kayaking, gardening, guitar jams, and an insatiable curiosity that drives
    him to constantly blend practical solutions with hands‑on community action.
background:
  cultural: Earl comes from a Polish‑American heritage. His grandparents emigrated from Poland to the United States in the 1950s, settling in the Mid‑Atlantic region. Raised in a close‑knit Catholic family
    in Chesapeake, Virginia, he grew up attending parish events, celebrating traditional Polish holidays such as Śmigus‑Dyngus, and embracing values of hard work, community service, and modesty. The coastal
    Virginian culture—its love of seafood, outdoor recreation, and neighborly hospitality—has also shaped his identity. He blends his Polish roots, with an emphasis on family and collective responsibility,
    with the broader Southern Atlantic lifestyle, resulting in a multicultural perspective that informs both his personal and professional life.
