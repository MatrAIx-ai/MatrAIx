  career_goals: Earl’s primary career ambition is to become a licensed Professional Engineer and assume a senior leadership role within his organization, where he can shape large‑scale climate‑resilience
    and sustainable infrastructure projects for the Chesapeake region. He plans to spearhead a municipal flood‑mitigation program that integrates green infrastructure, wetlands restoration, and community
    engagement. Over the next five years, he intends to pursue a Master’s degree in Environmental Management to deepen his strategic planning skills. He also envisions mentoring junior engineers, establishing
    a consultancy focused on sustainable coastal development, and influencing state‑level environmental policy through active participation in professional societies and advisory committees.
