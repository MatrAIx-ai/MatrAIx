personas:
  professional: Maelisa Kaczkowski is a seasoned commercial cleaning specialist who blends rigorous organization, sustainable cleaning expertise, and a keen eye for art handling to motivate janitorial teams,
    manage facility logistics, and pursue a path toward facilities operations management at a university campus, while they continuously mentor newcomers.
  sports: Maelisa Kaczkowski fuels their energetic social nature by joining community Zumba sessions, tackling weekend hikes on the nearby Ridge Trail, cheering for the hometown basketball team, the Durham
    Dragons, and occasionally playing recreational volleyball at park clean‑up gatherings, while they relish the camaraderie of team sports.
  arts: Maelisa Kaczkowski immerses themselves in the local arts scene, frequenting the Riverfront Gallery to admire works by emerging painter Lina Ortiz, attending community theatre productions like The
    Glass Menagerie at the City Playhouse, and honing photographic skills by capturing urban street murals and sunrise vistas for personal exhibitions, while they often experiment with framing techniques
    learned from installation projects.
  travel: Maelisa Kaczkowski balances a love for adventure with family responsibilities, planning low‑cost road trips to national parks such as Shenandoah for spring hikes, saving for a future cultural
    immersion tour of Kyoto and Barcelona, yet they usually opt for weekend escapes to nearby historic towns like Woodstock that fit their budget and time constraints.
  culinary: Maelisa Kaczkowski delights in experimenting with Asian fusion cuisine, regularly crafting dishes like miso‑glazed salmon with lemongrass‑infused quinoa, mastering the balance of soy, ginger,
    and chili, and sharing these flavorful meals with friends at potluck gatherings, while they occasionally over‑season in pursuit of the perfect punch.
  core: Maelisa Kaczkowski is a 41‑year‑old eco‑conscious facilities expert whose curiosity fuels a habit of juggling art, fitness, and green‑cleaning projects, even if they sometimes overcommit to community
    events at the expense of personal downtime.
background:
  cultural: Maelisa is a second‑generation East Asian American, with her parents having immigrated from South Korea in the 1980s. She grew up bilingual, speaking Korean at home while attending American
    schools, and she continues to celebrate Lunar New Year and Chuseok with her extended family. Her cultural upbringing emphasized respect for elders, community responsibility, and a strong work ethic,
    values that she blends with Midwestern sensibilities of friendliness and practicality. She stays connected to her heritage through local Korean cultural associations, cooking traditional dishes, and
    teaching her younger relatives about her roots.
attributes:
  skills: '[''Commercial Cleaning'', ''Facility Maintenance'', ''Safety and Hazard Awareness'', ''Team Coordination'', ''Customer Service'', ''Sustainable Cleaning Practices'', ''Basic Carpentry'', ''Inventory
