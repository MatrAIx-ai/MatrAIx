  hobbies: '[''Visiting Art Galleries'', ''Local Theater'', ''Group Fitness Classes (Zumba)'', ''Hiking Trails'', ''Photography'', ''Asian Cooking'', ''DIY Upcycling Projects'', ''Attending Cultural Festivals'',
    ''Volunteer Park Clean-Ups'', ''Reading Art History Books'']'
  career_goals: Maelisa aims to advance from a hands‑on janitorial role to a supervisory position in facilities management, eventually becoming a Facilities Operations Manager for a university or corporate
    campus. She plans to obtain certifications in green cleaning and occupational safety, and she is exploring the possibility of launching her own eco‑friendly cleaning service that offers specialized
    support for art galleries and community spaces. Long‑term, she hopes to blend her passion for art and sustainability by overseeing facility projects that incorporate public art and environmentally responsible
    practices.
