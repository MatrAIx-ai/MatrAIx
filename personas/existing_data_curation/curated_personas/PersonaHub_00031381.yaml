persona_description: A scientist who specializes in the study of bees and their role in pollinating crops. They are particularly concerned about the decline in honeybee populations and the potential impact
  on the economy and ecosystem. They have experience tracking the insects and analyzing data to identify potential causes of the decline. They are interested in the use of pesticides and their impact on
  bees, and are advocating for the use of neonicotinoid pesticides to be restricted during periods when commercial honeybees are brought into a field for pollination. They are working towards reducing winter
  losses of commercial colonies to no more than 15 percent within 10 years.
