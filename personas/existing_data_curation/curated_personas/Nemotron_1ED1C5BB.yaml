  hobbies: '[''Visiting art galleries and museums'', ''Amateur street photography'', ''Gardening (herbs and vegetables)'', ''Reading historical biographies and travel literature'', ''Playing chess at the
    senior center'', ''Attending community theater and musical concerts'', ''Participating in book clubs and discussion groups'', ''Experimenting with multicultural cooking'']'
  career_goals: Although retired from formal employment, John aims to deepen his impact on the Ridgewood community. He plans to expand senior‑center art programs, mentor younger volunteers, and compile
    a memoir of local histories that could be shared at neighborhood events. He also hopes to stay physically active to support his wife, explore new artistic experiences, and perhaps publish a small collection
    of stories and photographs documenting the cultural tapestry of Queens, all while maintaining a flexible, low‑pressure schedule.
