  career_goals: Norma dreams of a future where she can combine her love for animals, science, and helping others. She envisions becoming a veterinarian or a biomedical engineer, fields that let her explore
    new ideas while providing practical care. She is also interested in renewable energy projects that improve her community, so she aims to pursue advanced science courses in high school, join mentorship
    programs, and eventually study at a university with strong STEM and pre‑veterinary tracks. Throughout, she wants to stay connected to people, using her organized approach and cooperative spirit to lead
    community‑focused initiatives.
