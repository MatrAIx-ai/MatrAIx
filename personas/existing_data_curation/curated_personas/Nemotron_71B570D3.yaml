personas:
  professional: Norma Casatelli, a budding game developer, merges her love for storytelling and LEGO design with coding skills in Python and Scratch, applying her balanced curiosity and reliability to lead
    small projects in her school's coding club.
  sports: Norma Casatelli, a spirited midfielder for the Riverdale Rovers youth soccer club, trains thrice weekly, follows the professional achievements of the national women's soccer team and the regional
    soccer franchise Skyline FC, and balances team play with personal fitness through weekend hikes.
  arts: Norma Casatelli, an enthusiastic sketcher, draws inspiration from fantasy author J.K. Rowling, illustrator Jim Lee, and LEGO set designer Nathan Sawaya, while also enjoying animated films by Pixar
    and the music of Imagine Dragons, which fuels her creative projects after school.
  travel: Norma Casatelli, an adventurous explorer, spends weekends trekking the nearby Pine Ridge Trail and camping at Lakeview State Park, has visited the natural history museum in Washington D.C., and
    dreams of exploring the ancient ruins of Machu Picchu and the bustling streets of Tokyo.
  culinary: Norma Casatelli, a budding home chef, delights in preparing spaghetti carbonara with pancetta and pecorino, mastering fresh basil pesto, and experimenting with heirloom tomatoes and mozzarella
    on homemade pizza, while also enjoying the occasional snack of fruit smoothies with chia seeds.
  core: Norma Casatelli, a curious and pragmatic 11-year-old, balances a love for coding, soccer, and sketching with a habit of over-packing her backpack for hikes and occasionally forgetting to turn off
    her video game console before bedtime.
background:
  cultural: 'Norma comes from an Italian‑American family rooted in Downingtown, Pennsylvania. Her household blends typical suburban American life with Italian traditions: frequent family meals featuring
    pasta, pizza, and Sunday sauce; celebrations of holidays like Christmas, Easter, and Italian festivals such as Ferragosto. The family attends a local Catholic parish, participating in community service
    and school events. Growing up in Chester County, she experiences a diverse suburban environment, attending a public middle school that emphasizes both academic achievement and extracurricular involvement,
    reflecting a cultural mix of mainstream American values and her family''s heritage of close‑knit family ties and communal participation.'
