personas:
  professional: Harriet Peters is a reliable teller at a community bank whose meticulous cash‑handling, strict adherence to banking regulations, and calm, structured demeanor allow them to maintain perfectly
    balanced drawers and resolve customer concerns with empathy even during busy shifts.
  sports: Harriet Peters passionately supports their local high school football team, follows the Dallas Cowboys for NFL action, jogs three times a week with the Sabine River Runners club, and incorporates
    daily walks along the Sabine River into their fitness routine to balance structure and relaxation.
  arts: Harriet Peters finds comfort in listening to country artists like Carrie Underwood and Luke Bryan while immersing themselves in mystery novels by Agatha Christie and Gillian Flynn, and occasionally
    volunteers to help stage community theater productions, allowing music and intrigue to shape their creative downtime.
  travel: Harriet Peters plans weekend getaways with a spreadsheet‑organized itinerary, having already road‑tripped to Austin and New Orleans, dreaming of a music‑filled escape to Nashville, and prefers
    low‑cost car trips that fit their student‑budget while still satisfying their love for new scenery.
  culinary: Harriet Peters enjoys baking comfort foods at an intermediate skill level, frequently whipping up apple and pecan pies seasoned with cinnamon and butter, as well as chocolate‑chip and snickerdoodle
    cookies using brown sugar and vanilla, and eagerly shares the warm, sweet results with friends and family.
  core: Harriet Peters balances a love for order, community, and comforting rituals like journaling, gardening, and baking while quietly wrestling with anxiety and a tendency to over‑schedule every minute
    of their day.
background:
  cultural: Harriet grew up in Orange, Texas, a small East Texas town steeped in Southern hospitality and close‑knit community values. Her family, rooted in a working‑class background, emphasized responsibility,
    faith, and mutual support. She was raised with traditions such as weekend church attendance, family barbecues, and a love for local high school football. The regional culture of Texas—pride in self‑reliance,
    respect for hard work, and an appreciation for the outdoors—shapes her worldview. While identifying as white, Harriet’s cultural identity blends classic Southern customs with contemporary small‑town
    American life, fostering a strong sense of belonging and a desire to contribute positively to her community.
