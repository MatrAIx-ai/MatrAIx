  career_goals: Harriet aims to pursue an associate degree in finance or business administration within the next two years, followed by certification as a professional teller. She aspires to advance to
    an assistant branch manager role and eventually become a branch manager, where she can lead a team while maintaining the structured, harmonious environment she values. Long‑term, she hopes to earn a
    bachelor’s degree in finance, develop strong leadership and public‑speaking abilities, and contribute to community financial‑literacy programs that help others achieve economic stability.
