  hobbies: '[''Woodworking'', ''Reading historical non-fiction'', ''Walking/hiking'', ''Birdwatching'', ''Chess'', ''Gardening (herbs)'', ''Photography'', ''Listening to industry podcasts'', ''Volunteer
    talks at historic society'']'
  career_goals: Approaching retirement, Brett aims to cement his legacy by leading a plant‑wide lean transformation that cuts waste by at least 15% before he steps down within the next year. He plans to
    earn a Six Sigma Black Belt certification and transition into a mentorship role, guiding emerging supervisors and delivering occasional guest lectures at the local community college’s manufacturing
    program. post‑retirement, he envisions part‑time consulting for small New England manufacturers and establishing a modest woodworking studio where he can apply his precision skills to custom furniture.
    Ultimately, he hopes to be recognized for his contributions through a documented handbook of best practices that remains in use after he leaves the workforce.
