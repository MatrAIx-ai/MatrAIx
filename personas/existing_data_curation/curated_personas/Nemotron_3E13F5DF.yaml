  hobbies: '[''Gallery visits and sketching'', ''Acoustic guitar and improvisational jam sessions'', ''DIY electronics and Arduino/Raspberry Pi projects'', ''Maker fairs participation'', ''Bourbon distillery
    tours and food pairing'', ''Cooking Italian cuisine'', ''Hiking in the Bluegrass region'', ''Attending Kentucky Derby and horse‑racing events'', ''Reading science‑fiction novels'', ''Spontaneous road
    trips'']'
  career_goals: He aims to become a senior engineering technologist within the next five years, leading interdisciplinary projects that merge automation with innovative product design. Nicholas plans to
    earn a Six Sigma Black Belt, file patents in modular robotics, and eventually launch a boutique startup offering custom automation solutions for small Kentucky manufacturers. He also seeks to be recognized
    as a thought leader through conference presentations and technical publications, and to mentor emerging technologists through local STEM outreach programs.
