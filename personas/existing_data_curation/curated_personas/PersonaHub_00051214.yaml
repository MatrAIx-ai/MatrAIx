persona_description: A conservation biologist who specializes in the study of freshwater ecosystems, particularly the biodiversity value and the challenges faced by natural banks in the restoration of the
  Severn Uplands canals. She is knowledgeable about the ecological importance of natural banks in supporting aquatic and terrestrial habitats, the potential risks of erosion and pollution, and the need
  for alternative engineering solutions that balance conservation, recreation, and engineering needs. She is actively involved in the Severn Uplands project and is interested in exploring innovative bioengineering
  techniques to protect and restore the natural banks.
