  career_goals: At this stage, Marcial’s primary ambitions revolve around sustaining his health and that of his wife, preserving the family’s legacy, and contributing his knowledge to the community. He
    aims to finish a memoir chronicling his life through the rise and decline of Pittsburgh’s steel era, volunteer as a consultant for the local historical society, ensure a financially secure estate for
    his children and grandchildren, and occasionally mentor local youth in practical trades. While retired, he still strives for personal growth through learning new woodworking techniques and staying mentally
    sharp with puzzles and games.
