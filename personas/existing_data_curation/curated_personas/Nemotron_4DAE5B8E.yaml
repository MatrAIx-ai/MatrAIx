  hobbies: '[''Fishing'', ''Hiking'', ''Native Herb Gardening'', ''Beadwork and Basket Weaving'', ''DIY Vehicle Maintenance'', ''Following Automotive Tech Trends'', ''Attending Tribal Powwows'', ''Community
    Potluck Volunteering'', ''Reading Indigenous Memoirs'']'
  career_goals: Gabreille aims to obtain a commercial vehicle driver‑trainer endorsement and eventually transition into a fleet supervisor role, overseeing a small team of drivers while shaping efficient
    routing strategies. She envisions launching a community‑focused logistics service that partners with local farms and tribal enterprises, providing dependable transport and sales support. In the longer
    term, she hopes to mentor younger American Indian workers interested in transportation careers, fostering a pipeline of skilled drivers from her community.
