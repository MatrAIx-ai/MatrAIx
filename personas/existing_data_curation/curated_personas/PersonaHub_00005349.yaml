persona_description: A child psychologist who specializes in working with children with behavioral and emotional challenges, focusing on developing personalized treatment plans that work. They are experienced
  in group therapy settings, where children with specific challenges are paired with therapists to focus on strengthening skills and building relationships. They have expertise in bike riding intensives,
  therapeutic listening intensive, and finding new foods intensive, and are knowledgeable about the neurological integration that occurs when riding a bicycle and interacting with new foods in a therapeutic
  setting. They are passionate about helping children overcome their challenges and reach their full potential.
