personas:
  professional: Frieda Doyal, a retired municipal staffer turned community volunteer, leverages meticulous budgeting, grant‑writing, and fact‑checking skills to coordinate senior‑center programs and lead
    a grassroots safe‑drinking‑water coalition, all while pursuing an associate degree to formalize their business acumen.
  sports: Frieda Doyal, a dedicated follower of the Detroit Tigers and occasional attendee of Flint Firebirds games, spends Wednesdays walking the Riverbank Trail with the Flint Senior Fitness Club, and
    despite a competitive streak, prefers the measured pace of senior‑league pickleball over high‑intensity workouts.
  arts: Frieda Doyal, an avid reader of David McCullough and a lover of Ansel Adams’ black‑and‑white nature photography, fills evenings with recordings of folk legend Bob Dylan, occasional viewings of classic
    films by Ingmar Bergman, and attends the Flint Community Arts Center’s monthly lantern‑lit poetry evenings curated by local poet Maria Torres.
  travel: Frieda Doyal, a meticulous planner who prefers low‑key, purpose‑driven trips, has trekked the Upper Peninsula’s Pictured Rocks National Lakeshore, spent a reflective weekend in Asheville’s Blue
    Ridge Mountains, and hopes to one day explore County Cork, Ireland, to trace Midwestern ancestors, all while keeping travel budgets tight.
  culinary: Frieda Doyal, a modest home cook who harvests heirloom tomatoes, carrots, and native lilies for garnish, delights in simmering a rustic beet‑and‑goat‑cheese salad drizzled with balsamic reduction,
    occasionally over‑spices her late‑summer vegetable stew, and treats herself to a slice of warm apple crisp topped with a dollop of vanilla ice cream on rainy Flint evenings.
  core: Frieda Doyal, a fiercely curious yet private 61‑year‑old who balances meticulous budgeting with a penchant for over‑planning puzzles, tends to over‑analyze water reports while secretly hoarding
    vintage seed packets, and channels intense anxiety into relentless community advocacy.
background:
  cultural: Frieda was raised in a working‑class white family in the greater Flint area during the post‑industrial era. Her household emphasized self‑reliance, frugality, and a strong sense of community,
    values that were reinforced by the region's history of manufacturing and the subsequent economic shifts. She grew up attending a Protestant church, where community service and modesty were integral.
    The cultural fabric of the Great Lakes Midwest—characterized by resilient, pragmatic residents who value hard work and local solidarity—shapes Frieda's worldview. While she maintains a private demeanor,
    she carries a deep connection to Flint's heritage, including its labor history, the legacy of the automotive industry, and the ongoing challenges surrounding water safety and economic revitalization.
attributes:
