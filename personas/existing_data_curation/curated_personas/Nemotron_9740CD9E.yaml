  hobbies: '[''reading historical nonfiction'', ''environmental science literature'', ''gardening native plants'', ''crossword and logic puzzles'', ''genealogy research'', ''nature photography'', ''small‑group
    book club'', ''church study group'']'
  career_goals: Although retired from the formal workforce, Frieda is driven to channel her experience into community service. She aims to complete her associate degree in business administration, seeing
    the credential as a stepping stone to become a volunteer coordinator for a local senior center. Frieda also hopes to lead a small advocacy group focused on safe drinking water and environmental health
    in Genesee County, leveraging her research skills and competitive drive to secure grants and raise public awareness. On a personal level, she plans to author a memoir that chronicles her decades in
    Flint, offering a candid account of the city's challenges and resilience while processing her own intense emotional experiences.
