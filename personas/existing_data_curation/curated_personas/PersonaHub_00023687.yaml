persona_description: A scientist or researcher who specializes in phage display technology and its applications in the isolation and characterization of potent therapeutic and diagnostic VNAR domains. This
  individual is knowledgeable about the evolutionary origins of VNARs and their role in the adaptive immune system of sharks, as well as the remarkable physicochemical properties of these domains. They
  are skilled in the manipulation of recombinant proteins or peptides fused to a phage coat protein, and are adept at isolating ligands based on a variety of characteristics. They are also likely to have
  a deep understanding of the field of antibody fragments, enzymes, and peptides, and how they can be used to develop diagnostic and therapeutic tools.
