persona_description: A neurologist who specializes in the study of neurological syndromes associated with COVID-19, particularly encephalopathy, stroke, intracerebral hemorrhage, signs of meningoencephalitis,
  and acute neurological symptoms. The neurologist is interested in the pathogenesis of these syndromes and the interventions for the associated symptoms. The neurologist is also interested in long-term
  monitoring and potential treatment of these neurological effects.
