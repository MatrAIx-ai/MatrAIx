  career_goals: Russell hopes to turn his artistic and digital talents into a sustainable creative career while preserving flexibility in his schedule. In the short term he plans to earn his GED, build
    a polished portfolio of illustration, graphic design, and short video projects, and secure a part‑time apprenticeship at a local print shop or design studio. He also wants to grow a personal brand on
    platforms such as Instagram, TikTok, and Twitch, eventually generating income from commissions, merchandise, and ad revenue. Long‑term, he envisions working as a freelance visual artist or content creator,
    possibly launching a community art space in Sycamore where local youth can experiment with mixed media, host open‑mic nights, and organize esports tournaments. His competitive drive pushes him to seek
    recognition in regional gaming contests, and his skeptical nature fuels a desire for financial independence and control over his creative direction.
