personas:
  professional: Sonya Hicks, a retired nonprofit program director turned senior‑community mentor, channels her disciplined event‑planning acumen, budget‑management precision, and sociable mentorship approach
    into coordinating intergenerational workshops, oral‑history recordings, and a citywide cultural festival that celebrates Detroit’s historic neighborhoods.
  sports: Sonya Hicks stays active through senior dance classes at the community center, weekly garden walks, and avidly supporting the Detroit Lions and Tigers, while also belonging to the local senior
    walkers club that meets every Saturday morning.
  arts: Sonya Hicks immerses herself in Detroit’s vibrant jazz and blues scene, regularly attending performances at the Blue Bird Café and Baker’s Keyboard Lounge, and enriches her choir rehearsals with
    the soulful stylings of Miles Davis and B.B. King, which often inspire her knitting patterns for shelter blankets.
  travel: Sonya Hicks plans travel with a historic focus, embarking on road trips to Gettysburg, the Freedom Trail in Boston, and the Smithsonian’s National Museum of American History in Washington, while
    also budgeting for yearly family reunions across the Midwest, favoring senior‑friendly itineraries that blend sightseeing with ample rest.
  culinary: Sonya Hicks delights in preparing classic comfort dishes such as chicken‑and‑dumplings, collard greens, and peach cobbler, skillfully integrating fresh garden harvests into her cooking and frequently
    sharing a hearty casserole at the community shelter’s monthly potluck.
  core: Sonya Hicks is a disciplined, curiosity‑driven community elder who transforms meticulous planning, historic storytelling, and vibrant social ties into a life of purposeful service, balanced health
    habits, and occasional yarn‑shopping indulgences.
background:
  cultural: Sonya grew up in Detroit's historic African-American neighborhoods, with family roots tracing back to the Great Migration from the Deep South. Raised in a Black church, she was immersed in gospel
    music, soul‑food cooking, and a tightly knit community network. The city's rich musical legacy, the civic activism of the 1960s, and the resilience of Detroit's Black community shaped her values of
    cooperation, mutual support, and pride in cultural heritage. She actively participates in local African-American historical societies, celebrates traditions such as Juneteenth, and mentors younger generations
    about the importance of preserving their cultural identity.
attributes:
  skills: '[''Event planning and coordination'', ''Volunteer management'', ''Non-profit budget oversight'', ''Mentoring and tutoring'', ''Computer literacy instruction for seniors'', ''Genealogy research'',
