  hobbies: '[''Church choir'', ''Community gardening'', ''Knitting and crochet'', ''Reading historical fiction'', ''Jazz and blues listening'', ''Senior dance classes'', ''Genealogy research'', ''Volunteering
    at food banks'', ''Traveling to family reunions and historic sites'']'
  career_goals: Although retired from formal employment, Sonya aims to document her family's migration story in a memoir and create an oral‑history archive for Detroit's Black neighborhoods. She aspires
    to launch a senior‑to‑youth mentorship program through the local community center, organize an annual cultural festival celebrating African-American arts, and continue her education with courses in
    public history and horticulture. Learning digital photography and mastering a new tablet for capturing community events are also personal milestones she hopes to achieve.
