  career_goals: Michael aims to transition from a shop‑floor machinist to a senior CNC programmer and eventual production supervisor, where he can shape workflow automation and introduce innovative fabrication
    methods such as additive manufacturing. He dreams of launching a side business that creates kinetic metal sculptures and custom art pieces for public spaces and corporate clients, merging his technical
    expertise with his love for abstract and novel designs. Long‑term, he hopes to mentor the next generation of tradespeople, champion continuous‑learning cultures, and maintain a flexible schedule that
    leaves room for creative exploration and community involvement.
