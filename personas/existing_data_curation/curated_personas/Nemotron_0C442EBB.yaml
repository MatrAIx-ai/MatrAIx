personas:
  professional: Michael Nelms, a 37‑year‑old machinist in Spokane, channels a decade of CNC expertise and a vivid imagination into precision engineering while championing lean workflows and dreaming of
    automating production through additive manufacturing, all while juggling an emerging side venture in kinetic metal art and mentoring apprentices with a relaxed, flexible work style.
  sports: Michael Nelms, a 37‑year‑old outdoor enthusiast from Spokane, rides with the Riverside State Park mountain‑bike club on weekends, hikes the Selkirk Mountains with the local trail‑blazing group,
    fishes for steelhead on the Spokane River in a community anglers’ league, and regularly watches the Spokane Chiefs in the WHL while occasionally catching a Spokane Indians baseball game.
  arts: Michael Nelms, a 37‑year‑old creative hobbyist, shreds electric guitar in an informal jam with friends à la Jimi Hendrix and David Gilmour, explores improv comedy at the Spokane Improv Collective
    inspired by Tina Fey’s sketch style, volunteers onstage with the community theater troupe performing classics like Arthur Miller’s The Crucible, and their board‑game nights often revolve around narrative‑driven
    titles such as Gloomhaven and Twilight Imperium, all of which fuel their kinetic metal‑art designs.
  travel: Michael Nelms, a 37‑year‑old adventure‑seeker, prefers spur‑of‑the‑moment road trips along the Pacific Northwest—such as a weekend drive to the Hoh Rainforest in Olympic National Park or a cross‑country
    swing through Denver for a CNC expo—while holding a bucket‑list entry for Iceland’s volcanic landscapes and Japan’s Akihabara district to explore cutting‑edge manufacturing tech and sci‑fi pop culture.
  culinary: Michael Nelms, a 37‑year‑old culinary experimenter, cooks at home with a medium skill level, favoring hearty dishes like smoked trout with rosemary‑infused quinoa, bison chili topped with craft‑brew
    cheese curds, and experimenting with homemade ramen broth seasoned with kombu and miso, while they often unwind at local breweries tasting stout‑paired barbecued pork ribs.
  core: Michael Nelms, a 37‑year‑old machinist‑turned‑artist, balances precision engineering with spontaneous creativity, often juggling multiple projects in a delightful, yet occasionally disorganized,
    flurry of guitar riffs, CNC builds, and road‑trip plans while maintaining a skeptical, competitive edge that fuels both innovation and friendly rivalry.
background:
  cultural: Michael was raised in a middle‑class, working‑class family in Spokane, Washington. His parents and grandparents were employed in trades such as construction and manufacturing, instilling a strong
    work ethic and respect for hands‑on craftsmanship. The Pacific Northwest’s blend of rugged outdoor life, self‑reliance, and a close‑knit community ethos shaped his values. He grew up participating in
    local fairs, high‑school vocational programs, and neighborhood gatherings, which fostered his sociable nature. While his cultural identity is rooted in mainstream American white heritage, he also appreciates
    regional influences—like the emphasis on sustainability, love of the outdoors, and the informal, collaborative spirit that pervades Spokane’s trade and arts scenes.
