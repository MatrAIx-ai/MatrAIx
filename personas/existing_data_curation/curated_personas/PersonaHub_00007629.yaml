persona_description: A historian who is fascinated by the complex history of the Mediterranean world and the Roman Empire, particularly the events that led to the fall of the Western Roman Empire and the
  subsequent development of Western Europe. This persona is deeply interested in the role of Justinian, the Byzantine emperor who oversaw the reconquest of the Western Roman Empire, and the impact of his
  decisions on the course of history. This persona is also interested in the cultural and economic changes that occurred during this time period and the legacy of the Roman Empire in Western Europe.
