personas:
  professional: Gloria Kemp, a budding museum studies aspirant, leverages meticulous project‑planning skills, strong visual‑art abilities in watercolor, ink, and digital media, and a calm, introspective
    demeanor to curate thoughtful mini‑exhibitions for her high‑school and local community.
  sports: Gloria Kemp, a dedicated member of the Patapsco Hiking Club, spends weekends traversing the trails of Patapsco Valley State Park, practices yoga at the local community center, and follows the
    Baltimore Ravens and Maryland Terrapins with quiet enthusiasm, preferring solitary or low‑key activities over team sports.
  arts: Gloria Kemp devotes evenings to watercolour studies inspired by Georgia O’Keeffe, creates digital collages in Procreate that echo Beeple’s generative style, reads poetry by Maya Angelou while listening
    to the ambient piano compositions of Nils Frahm, and curates small‑scale exhibitions that blend traditional and digital art.
  travel: Gloria Kemp prefers low‑key solo getaways, having already explored the historic streets of Washington, D.C., the lighthouse towns of the Chesapeake Bay, and a weekend art‑focused trip to Philadelphia,
    while dreaming of a future pilgrimage to the Musée d’Orsay in Paris.
  culinary: Gloria Kemp cooks with quiet concentration, favoring refined yet simple dishes such as lemon‑herb roasted salmon, homemade lavender‑infused scones, and Chesapeake‑style crab cakes, often paired
    with Earl Grey tea, and enjoys the tactile ritual of making soy‑wax candles scented with essential oils.
  core: Gloria Kemp is a quietly curious 17‑year‑old who hoards vintage postcards, battles a tendency to over‑schedule sketchbook sessions, and finds solace in solitary art, meditative walks, and methodical
    planning.
background:
  cultural: Gloria is a white American raised in Elkridge, Maryland, part of Howard County's suburban landscape. Her family's roots trace back to Anglo-European ancestry, primarily Irish and German, though
    she has grown up in a region celebrated for its cultural diversity. The proximity to Baltimore's vibrant arts scene, the historic Chesapeake Bay, and community institutions such as the Howard County
    Library have fostered her appreciation for both local heritage and broader artistic traditions. Participation in community events like the annual Elkridge Arts Festival and visits to nearby museums
    have reinforced a sense of belonging while encouraging an open, exploratory mindset. Gloria's cultural upbringing blends mainstream American values of independence and self-reliance with an awareness
    of the area's multicultural fabric, shaping her nuanced viewpoint on art, history, and personal growth.
attributes:
  skills: '["Digital Illustration (Procreate, Photoshop)", "Watercolor and Pencil Sketching", "Creative Writing (Poetry & Reflective Journaling)", "Art History Research", "Project Planning & Time Management",
