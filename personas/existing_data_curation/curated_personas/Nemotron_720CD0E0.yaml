  hobbies: '["Sketching and Watercolor Painting", "Creative Writing (Poetry & Journaling)", "Reading Art History and Philosophy", "Nature Walking in Patapsco Valley", "Mindfulness Meditation", "Visiting
    Local Museums and Galleries", "Collecting Vintage Postcards", "DIY Candle Making", "Digital Art Creation (Procreate, Photoshop)"]'
  career_goals: Gloria aims to complete her high-school equivalency and enroll in a community-college program focused on art history and museum studies. Her long-term ambition is to work as a museum curator
    or archival specialist, preserving and interpreting American art and local heritage in institutions such as the Maryland Historical Society. She also hopes to develop a freelance career as a digital
    artist, creating contemplative artwork for online galleries and small-scale exhibitions. By combining her organizational strengths with her creative curiosity, Gloria plans to curate thoughtful, interdisciplinary
    projects that bridge traditional visual arts and emerging digital media, while maintaining a work environment that allows for the quiet, focused time she values.
