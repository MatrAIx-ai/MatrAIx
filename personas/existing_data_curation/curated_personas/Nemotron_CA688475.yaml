  hobbies: '[''Arduino Prototyping'', ''Drone Assembly'', ''Basketball'', ''Salsa Dancing'', ''Traditional Puerto Rican Cooking'', ''Jogging and Trail Running'', ''Fishing'', ''STEM Mentoring'', ''Reading
    on Sustainable Energy'', ''Reading Personal Development Books'']'
  career_goals: Rodney aims to move from senior engineering roles into strategic leadership positions that shape Puerto Rico’s electrical infrastructure. In the next five years he plans to earn his Professional
    Engineer (PE) license and a Project Management Professional (PMP) certification, positioning himself for roles such as Engineering Manager or Director of Renewable Energy Projects. He is driven to lead
    initiatives that integrate smart-grid technologies and solar micro-grids to boost resilience after hurricanes. Additionally, he wants to mentor junior engineers from local universities, develop a community
    STEM outreach program for high-school students, and eventually launch his own consulting firm focused on sustainable, cost-effective electrical solutions for small businesses and municipalities.
