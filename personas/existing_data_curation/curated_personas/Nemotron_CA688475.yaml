personas:
  professional: Rodney Martinez is a senior electrical engineer and renewable‑energy project lead who channels his bilingual fluency, meticulous risk‑assessment mindset, and pragmatic curiosity into designing
    smart‑grid and micro‑grid solutions while flexibly adapting schedules to meet community resilience goals.
  sports: Rodney Martinez plays pickup basketball at the local gym, follows the Cangrejeros de Santurce in the Baloncesto Superior Nacional, is a member of the Las Piedras Basketball Club, and spends summer
    mornings fishing on the Río de la Plata while keeping a casual loyalty to the Puerto Rico national baseball team, the Leones de Ponce.
  arts: Rodney Martinez dances salsa to the rhythms of Marc Anthony and Celia Cruz at weekly community nights, collects vinyl records of Rubén Blades and explores contemporary Puerto Rican theater through
    productions by Teatro del Sagrado Corazón, while occasionally unwinding with classic films starring Benicio Del Toro.
  travel: Rodney Martinez plans trips with a blend of practicality and adventure, having explored New York City for professional conferences, relaxed on the beaches of Culebra, taken a road trip through
    the Dominican Republic’s historic Zona Colonial, and now dreams of visiting Copenhagen to study its smart‑energy infrastructure while balancing family obligations that limit extended overseas stays.
  culinary: Rodney Martinez delights in cooking traditional mofongo with chicharrón, arroz con gandules seasoned with sofrito, and grilling fresh snapper with a citrus‑adobo glaze, while experimenting with
    3D‑printed spice racks and proudly serving homemade café con leche made from locally sourced coffee beans.
  core: Rodney Martinez blends meticulous engineering precision with island‑rooted community spirit, juggling a habit of late‑night circuit tinkering, a moderate worry about storm preparedness, and a love
    for salsa rhythms that keeps his heart beating both literally and metaphorically.
background:
  cultural: Rodney was born and raised in Las Piedras, a close-knit municipality in Puerto Rico, where family and community play central roles. He grew up speaking Spanish at home while learning English
    at school, making him fully bilingual. Puerto Rican cultural influences are evident in his love for salsa and plena music, participation in the annual Fiestas Patronales, and his dedication to cooking
    traditional dishes like mofongo. The island’s history of resilience—especially after hurricanes—has shaped his pragmatic outlook and sense of responsibility toward improving local infrastructure. He
    values the collectivist spirit of his community, respects elders, and maintains strong ties to his extended family, while his business education in the United States introduced him to a more individualistic,
    results-driven work ethic. This blend of Caribbean warmth and professional rigor informs both his personal and professional life.
