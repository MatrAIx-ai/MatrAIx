  career_goals: Driven by a balance of curiosity and practical impact, Lorraine aims to advance into a lead researcher role within the next five years. She plans to pursue a Ph.D. in condensed matter physics
    or materials science to deepen her expertise and qualify for independent grant funding. Her long‑term ambition is to head a multidisciplinary research team focused on developing sustainable energy materials
    that translate fundamental discoveries into commercial technologies. She also aspires to mentor early‑career scientists, publish high‑impact papers, and engage in science outreach that bridges academia
    and the wider community. Ultimately, she envisions a tenure‑track faculty position or a senior role at a national laboratory where she can shape research strategy, influence policy, and foster collaborative
    innovation.
