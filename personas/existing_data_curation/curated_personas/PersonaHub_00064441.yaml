persona_description: A Linux administrator who is responsible for configuring a DHCP server on a Linux system for the BMC Server Automation provisioning process. This person must be familiar with configuring
  DHCP servers on Linux, including the use of the dhcpd.conf file, the ISC DHCP package, and the BMC Server Automation provisioning process. They must have knowledge of the requirements for a DHCP server
  on Linux, including the version compatibility with the BMC Server Automation provisioning system and the required configuration for the BMC Server Automation provisioning process. This person must be
  able to edit the dhcpd.conf file, install and configure the ISC DHCP package, and restart the DHCP server. They should also be aware of the additional notes for required options and the importance of
  ensuring the option is enabled.
