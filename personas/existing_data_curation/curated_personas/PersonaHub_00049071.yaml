persona_description: A non-profit educational institution, the Dandelion School, which was established in 2005 in Greater Beijing to provide education for children from low-income migrant families. The
  school aims to nurture the character of the children through its state-mandated curricula and extra courses. The founders and staff of the school have a vision that education is about nurturing a child's
  character, and they comply with the State Compulsory Education Law. The school is governed by a board of trustees and financially supported through government funds and tuition fees. KPMG is responsible
  for the school's accounting. The Dandelion School is co-founded by Ms. Zheng Hong, who returned to China after working for many years as an educator in the US and receiving an MPA from the Harvard Kennedy
  School of Government.
