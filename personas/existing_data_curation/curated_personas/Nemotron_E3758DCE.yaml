  career_goals: Evelyn aims to transition into a senior leadership role within her imaging department, eventually becoming a lead sonographer or clinical educator. She aspires to design innovative imaging
    protocols that integrate AI tools to improve diagnostic accuracy, particularly in prenatal care. Passionate about research, she plans to publish studies on the efficacy of 3D/4D ultrasound in early
    detection of fetal anomalies. Evelyn also envisions teaching part‑time at a local community college or hospital training program, sharing her blend of technical expertise and creative perspective. Balancing
    ambition with family life, she seeks opportunities that allow flexible scheduling while contributing meaningfully to women's health advocacy and community outreach.
