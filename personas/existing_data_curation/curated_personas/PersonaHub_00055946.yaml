persona_description: A federal agency official or employee who is responsible for overseeing or implementing the National Environmental Policy Act (NEPA) and is interested in understanding the current state
  of NEPA data collection, analysis, and litigation. This person may be interested in the specifics of NEPA implementation, the cost and benefits of NEPA analyses, the frequency and outcome of NEPA litigation,
  and the role of NEPA in encouraging public participation and discovering and addressing project design problems. This persona may also be interested in the potential impact of NEPA on federal decisions
  and actions in multiple states.
