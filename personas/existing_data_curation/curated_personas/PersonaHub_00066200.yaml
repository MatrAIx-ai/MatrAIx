persona_description: A scientist specializing in soil science, particularly in the study of soil formation, disturbance, and its effects on microrelief and soil properties. She is interested in understanding
  the complex patterns and variability of forest soils in southeast Alaska, and how windthrow affects these soils. Her research interests include soil mechanics, soil classification, and the impact of land
  use and management practices on soil properties. She is likely to have a background in geology, botany, and soil science, and has conducted extensive fieldwork in southeast Alaska. She is also likely
  to have experience with GIS (Geographic Information Systems) and spatial analysis, as she has used these tools to analyze soil morphological features on an area basis.
