    and sci‑fi books'', ''Basic coding projects (Python)'', ''Small group art club participation'']'
  career_goals: Glenn dreams of turning his artistic passion into a career by studying visual communication or game design. He aspires to become a concept artist or UI/UX designer, creating immersive visual
    worlds for video games or interactive media. He also considers a future in graphic design or digital illustration, where he can blend storytelling with technology. To achieve these goals, he plans to
    earn a high school diploma, attend a college with strong art and computer science programs, and build a portfolio of original artwork and coding projects.
