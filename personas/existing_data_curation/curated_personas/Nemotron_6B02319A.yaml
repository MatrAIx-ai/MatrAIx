personas:
  professional: A budding concept artist and self‑taught storyteller, Glenn Miller channels their methodical imagination into intricate fantasy illustrations and sci‑fi prose, meticulously planning each
    creative project while balancing school responsibilities.
  sports: A quiet outdoor enthusiast, Glenn Miller joins the school’s cross‑country team for structured training but prefers solo hikes through the Appalachian foothills, cheering on the Tennessee Titans
    and Nashville Predators whenever there’s a game on TV.
  arts: A reserved creative soul, Glenn Miller immerses themselves in fantasy illustration inspired by John Howe, crafts sci‑fi stories echoing Ray Bradbury, strums acoustic gospel hymns from church, and
    frequently listens to Appalachian banjo virtuoso Bela Fleck while working on art projects.
  travel: An avid planner of modest adventures, Glenn Miller enjoys weekend treks in the Great Smoky Mountains, cherishes family road‑trips to Nashville’s music scene, and dreams of attending San Diego
    Comic‑Con to meet fellow sci‑fi fans.
  culinary: A comfort‑food aficionado with modest culinary skills, Glenn Miller delights in buttery biscuit‑and‑gravy breakfasts, sweet tea, and homemade chocolate‑chip pancakes, while often snacking on
    trail mix and chips during long drawing sessions.
  core: Glenn Miller, a methodical dreamer, navigates teen life by turning quiet imagination into detailed art, disciplined budgeting, and solitary hikes, all while juggling a love for Southern comfort
    foods and occasional late‑night creative marathons.
background:
  cultural: Glenn was raised in Powell, a close‑knit community in Anderson County, Tennessee, within a family that traces its roots back several generations in the Appalachian region. His upbringing reflects
    the traditional Southern values of family loyalty, respect for community, and self‑reliance. He participates in his local church’s youth group, where he experiences the region’s gospel and folk music
    traditions. Seasonal community events, such as Fourth of July picnics and county fairs, have exposed him to local crafts like woodworking and quilting, which complement his interest in hands‑on creation.
    While his environment is predominantly white and rural, Glenn’s curiosity has opened him to broader artistic influences through books, online media, and his school’s art program.
