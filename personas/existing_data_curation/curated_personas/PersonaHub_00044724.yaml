persona_description: A political philosopher known for his work on the social contract and the principles of justice as fairness, particularly in his book "A Theory of Justice". He is most famous for his
  argument in favor of the idea that the social contract must be drawn up from an original position in which everyone decides on the rules for society from behind a veil of ignorance, and that this principle
  of justice is applicable to all individuals regardless of their social status. He also argued that inequalities in social and economic distribution must be arranged so that they provide the greatest benefit
  to those with the least advantage, and that we must arrive at this conclusion from the original position because we do not want factors beyond our control to dictate the opportunities we have in life.
  He was awarded the Schock Prize in 1999 and the National Humanities Medal in 1999.
