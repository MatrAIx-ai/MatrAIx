  career_goals: Tiara aims to transition into a Community Liaison Officer role where she can design and lead art‑based outreach initiatives that foster trust between police and residents. She envisions
    establishing a youth arts program that uses mural projects and photography workshops to deter crime and promote positive expression. In the longer term, she hopes to become a training officer to mentor
    new recruits on compassionate policing and eventually move into detective work focused on community‑centric investigations. Her overarching ambition is to influence department policy toward more humane,
    flexible, and culturally aware practices.
