personas:
  professional: Tiara Rainey, a 30‑year‑old police officer in Las Vegas, blends solid law‑enforcement training with a flair for community‑oriented, art‑driven outreach, using de‑escalation skills and visual
    storytelling to bridge gaps between residents and the department, and they excel at turning routine reports into compelling visual narratives.
  sports: Tiara Rainey, an avid volleyball player with The Desert Sun Volleyball Club and a frequent hiker in Red Rock Canyon, roots for the Las Vegas Raiders in football season and the Golden Knights in
    hockey, weaving group workouts and trail treks into her high‑energy social calendar.
  arts: Tiara Rainey channels her curiosity into street photography of Las Vegas murals, sketches inspired by Frida Kahlo’s bold lines, and mixed‑media collages while attending live performances by Kamasi
    Washington’s jazz ensemble and H.E.R.’s R&B sets, using art as both a personal outlet and a community‑building tool.
  travel: Tiara Rainey favors spontaneous weekend escapes to Zion and the Grand Canyon and dreams of immersive mural tours in Mexico City and Barcelona, balancing her love for vibrant urban art with the
    serenity of desert hikes while often booking last‑minute flights to stay flexible.
  culinary: Tiara Rainey, a moderately skilled home cook, delights in preparing shrimp tacos with fresh cilantro‑lime salsa, quinoa bowls topped with roasted veggies, and whipping up an espresso‑driven
    affogato after late‑night mural tours, savoring the bold flavors that echo the city’s neon palette.
  core: Tiara Rainey lives at the intersection of badge and brush, trading police reports for vibrant sketches, turning community tensions into collaborative murals, all while juggling a habit of misplacing
    keys during spontaneous dance nights.
background:
  cultural: Tiara is an African‑American woman whose family settled in Las Vegas from the Southern United States in the 1970s. Growing up in the Westside community, she was immersed in Black cultural traditions—gospel
    music, street poetry, and community festivals—that emphasized mutual support and activism. Her heritage informs her deep appreciation for Black art, jazz, and hip‑hop, and fuels her commitment to bridge
    gaps between law enforcement and historically marginalized neighborhoods. She actively participates in local cultural events, such as the annual African American Heritage Parade, and draws on her cultural
    identity to promote equity, empathy, and harmony within her policing career.
