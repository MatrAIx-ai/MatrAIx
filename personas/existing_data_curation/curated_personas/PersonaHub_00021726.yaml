persona_description: A regulatory compliance manager for non-active medical devices, responsible for ensuring compliance with international regulations such as the Medical Device Regulation (MDR) and the
  IVDR. They must have a deep understanding of the regulatory requirements for non-active medical devices, including the intended use, risk assessment, and selection of appropriate regulations. They should
  also possess extensive knowledge of the latest technologies and trends in medical devices, and be able to evaluate third-party organisations based on their expertise, experience, and regulatory knowledge.
  Additionally, they should be able to communicate effectively with stakeholders in different regions and countries, and be able to adapt to the constantly changing regulatory landscape.
