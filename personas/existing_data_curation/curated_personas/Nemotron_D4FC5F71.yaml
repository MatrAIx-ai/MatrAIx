personas:
  professional: Michael Melendezsantiago, a retired engineer and data analyst who now volunteers as a senior advisor for a Dallas community college engineering program, channels his curiosity and methodical
    planning into mentoring high‑school students, translating complex concepts into everyday language, and coordinating community workshops with the precision of a project manager, while they ensure every
    detail aligns with the community’s needs.
  sports: Michael Melendezsantiago, a lifelong fan of the Dallas Cowboys and the Texas Rangers, never misses a Sunday game at the local sports bar, joins a senior walking club that meets after the Friday
    Rangers’ victory celebrations, and occasionally volunteers as a scorekeeper for youth soccer leagues, blending competitive spirit with community service, while they encourage fellow seniors to stay
    active.
  arts: Michael Melendezsantiago, who sways to cumbia and salsa at the monthly diaspora dance nights, devotes weekend evenings to listening to Celia Cruz and Juan Luis Guerra, enjoys occasional trips to
    the Dallas Museum of Art to admire works by local muralist Rosa L. Torres, and incorporates the rhythmic patterns of his heritage into improvised storytelling sessions for grandchildren, while they
    also organize art‑themed fundraiser events for the community.
  travel: Michael Melendezsantiago plans his travels with the same spreadsheets he used for engineering projects, dreaming of a pilgrimage to the historic churches of Antigua Guatemala, revisiting family
    friends in San Antonio, and taking his grandchildren on a road trip across Texas to the Hill Country vineyards, all while balancing a modest travel budget and a desire for culturally enriching experiences,
    and they always double‑check itineraries for any hidden fees.
  culinary: Michael Melendezsantiago delights in crafting hand‑pressed pupusas stuffed with mozzarella and loroco, slow‑cooks tamales with masa and pork on Saturdays, and experiments with fresh cilantro,
    achiote, and queso fresco, yet often forgets to label leftovers, leading to occasional kitchen mishaps that become the subject of family laughter, and they consider each dish a celebration of shared
    heritage.
  core: Michael Melendezsantiago is a methodical, community‑oriented senior who blends engineering precision with festive cooking, worries about health and finances, but finds joy in mentoring, dancing,
    and never letting a missed step—whether in a chess game or a recipe—go unnoticed, and they constantly balance caution with curiosity.
background:
  cultural: Michael grew up in a Salvadoran household where family, Catholic faith, and community were central. He immigrated to the United States in his early adulthood and settled in Dallas, where he
    integrated Texan customs while keeping Salvadoran traditions alive. He is bilingual, celebrates holidays like Día de los Farolitos and Semana Santa, cooks pupusas and tamales, and participates in the
    local Salvadoran diaspora’s cultural organizations. His identity blends Salvadoran values of solidarity and hospitality with the independent, pragmatic spirit of his adopted hometown.
