  career_goals: Although retired, Michael remains goal‑oriented. He aspires to mentor his grandchildren and local high‑school students in STEM, volunteer as a senior advisor for the Dallas community college’s
    engineering program, and document his family’s migration story. He also aims to stay physically active, maintain his health, and support his wife in community cultural events, while ensuring the financial
    stability of his family.
