  career_goals: Tammy aims to maintain a strong academic record and earn a STEM scholarship that will let her attend a state university to major in environmental engineering or civil engineering. She wants
    to combine her curiosity for innovative solutions with her practical mindset to develop sustainable infrastructure projects that benefit her community in Polk County, such as eco-friendly water management
    and solar energy initiatives. In the short term, she plans to join the school's student council, attend summer STEM camps, and mentor younger students in coding and project planning. Long-term, she
    envisions becoming a community leader who designs green projects and inspires the next generation of Black engineers.
