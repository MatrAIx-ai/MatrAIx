  hobbies: '[''Soccer (midfield)'', ''Robotics building and programming'', ''Cooking Mexican dishes'', ''Listening to Mexican folk and pop music'', ''Reading graphic novels'', ''Volunteering at community
    center'', ''Organizing school events'']'
  career_goals: Franklin wants to turn his love for structure, helping others, and practical problem solving into a career in emergency medical services. In the short term, he aims to join the high school
    health academy, earn an advanced EMT certification, and volunteer with the local fire department's junior program. After high school, he plans to attend a community college for an EMS associate degree
    and eventually become a paramedic, with the long‑term ambition of leading community health outreach programs in underserved neighborhoods. He also keeps an open mind about studying engineering or public
    safety management, fields that would let him use his organizational strengths while still serving the community.
