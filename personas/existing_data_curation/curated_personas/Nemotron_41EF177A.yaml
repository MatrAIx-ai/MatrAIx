personas:
  professional: An organized middle‑school student, Franklin Laureiro channels their love for structure and teamwork into midfield leadership on the Westside Tigers soccer team and meticulous robot design
    in the school robotics club, consistently coordinating peers and meeting project deadlines.
  sports: Franklin Laureiro plays midfield for the Westside Middle School Tigers, follows the LA Galaxy and Los Angeles Lakers, trains five times a week with the soccer club and joins weekend pick‑up basketball
    games to stay fit and agile.
  arts: Franklin Laureiro devours graphic novels such as "Spider‑Man" and "The Walking Dead", grooves to regional Mexican folk groups like Los Tigres del Norte while streaming pop icons like Billie Eilish,
    and spends evenings sketching comic panels inspired by heroic protagonists.
  travel: Franklin Laureiro loves planning short road trips, having explored Joshua Tree National Park and a coastal getaway in Santa Monica, and aspires to trek the historic streets of Mexico City and
    the pyramids of Teotihuacan on future family vacations.
  culinary: In the family kitchen, Franklin Laureiro assists with making tamales and enchiladas, mastering masa preparation and salsa seasoning, while also experimenting with guacamole and occasionally
    sneaking a bite of the spicy salsa before dinner is served.
  core: Franklin Laureiro is a structured yet outgoing teen who blends disciplined leadership on the soccer field with methodical robotics tinkering, balances careful budgeting with occasional treat indulgences,
    and approaches life with compassionate, stress‑resilient optimism.
background:
  cultural: Franklin grows up in a Mexican‑American household in Simi Valley, where Spanish is spoken at home and English at school. Family traditions such as celebrating Día de los Muertos, preparing holiday
    foods together, and participating in local cultural festivals have instilled in him a strong sense of community and respect for his heritage. His parents emphasize the values of collectivism, hard work,
    and helping neighbors, which align with his compassionate and cooperative nature. Being part of a diverse Ventura County community also exposes him to a blend of Latino and broader American cultural
    influences, shaping his bilingual identity and his desire to bridge cultural gaps through service.
attributes:
  skills: '[''Leadership and event planning'', ''Bilingual communication (Spanish/English)'', ''Basic first aid'', ''Teamwork'', ''Problem solving'', ''Time management'', ''Introductory Python coding'',
