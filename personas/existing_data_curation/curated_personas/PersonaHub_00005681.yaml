persona_description: A historian who specializes in the study of ancient Egyptian history and religion, particularly the period between the 18th and 19th centuries. His research interests include the decipherment
  of ancient Egyptian hieroglyphics, the history of the Egyptian civilization, and the relationship between ancient Egypt and the early Christian Church. He has a keen interest in the discovery and study
  of ancient Egyptian artifacts, including the Book of the Dead and the Book of Abraham. He is also interested in the role of Joseph Smith in the dissemination of ancient Egyptian knowledge to early Christian
  communities in the United States.
