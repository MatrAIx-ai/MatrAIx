  hobbies: '[''Fishing'', ''Cooking Mexican and Gulf‑Coast dishes'', ''Playing strategy video games (Civilization, SimCity)'', ''Reading self‑help and biography books'', ''Church youth group activities'',
    ''Community gardening'']'
  career_goals: Obed aims to earn his GED within the next two years and then enroll in a community‑college program focused on social work or community health. He is driven to become a community health worker
    or youth mentor, using his natural compassion and organizational strengths to improve access to health resources and support at‑risk teens in his town. In the longer term, he dreams of opening a small,
    family‑run food‑service business that serves both Mexican and Gulf‑Coast cuisine, providing employment opportunities for friends and neighbors.
