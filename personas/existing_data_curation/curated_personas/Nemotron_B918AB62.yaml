  hobbies: '[''Softball league'', ''Weekend desert hiking'', ''DIY home improvement projects'', ''Woodworking'', ''Competitive basketball games'', ''Attending local barbecues and community events'', ''Listening
    to classic rock'', ''Watching college football (ASU)'']'
  career_goals: He aims to move from laborer to foreman within the next three years, obtaining additional certifications such as the OSHA 30‑hour safety training and a Construction Management certificate
    from a community college. He aspires to lead larger crews, oversee project timelines, and eventually start his own contracting business to provide stable, high‑quality construction services for his
    growing family. He is motivated by the prospect of increased responsibility, higher earnings, and the ability to implement structured, efficient processes on job sites.
