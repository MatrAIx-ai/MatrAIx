personas:
  professional: Douglas Keng is a construction crew specialist with a solid foundation in residential and light commercial framing, concrete work, and heavy‑equipment operation, whose methodical, organized
    approach and competitive drive push him toward a foreman role within three years while he pursues OSHA‑30 and construction‑management certifications.
  sports: Douglas Keng regularly competes in a local softball league, hikes the Sonoran Desert trails each weekend, and roots for the Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals, while occasionally
    joining pick‑up basketball games at the community center and training with the Phoenix Hiking Club.
  arts: Douglas Keng avidly listens to classic rock legends like The Rolling Stones, Led Zeppelin, and AC DC on vinyl, attends ASU Sun Devil football games for the halftime bands, and makes time for occasional
    live performances at local bars featuring blues and country acts, shaping his downtime with music and modest appreciation for regional theater productions.
  travel: Douglas Keng prefers road‑trip adventures across the Southwest, having driven to Sedona’s red rocks, the Grand Canyon, and Bryce Canyon, while dreaming of a week‑long hiking expedition in Patagonia
    once his family finances allow for longer travel beyond the short weekend getaways he typically plans.
  culinary: Douglas Keng’s culinary tastes center on grilling—mastering a smoky rib‑eye steak, chimichangas, and Sonoran hot dogs—paired with a rotating selection of craft beers, and while his cooking skills
    excel at backyard barbecues, he admits to frequently over‑salting dishes after a long day on the job.
  core: Douglas Keng blends a competitive, structure‑loving work ethic with a love for community sports, classic rock, and barbecue, driving him toward foremanship while managing a pragmatic financial plan
    and a disciplined health routine.
background:
  cultural: He was raised in a middle‑class, suburban environment in the Southwest United States. His family has a tradition of hands‑on trades and values of hard work, self‑reliance, and community involvement
    common in Arizona’s growing towns. Growing up in Buckeye, he was exposed to a blend of traditional American Southwest culture, with emphasis on outdoor recreation, local sports, and a strong sense of
    neighborhood solidarity. His cultural heritage is rooted in mainstream Anglo‑American customs, with an appreciation for the regional desert landscape and its associated lifestyle.
attributes:
  skills: '[''Framing'', ''Concrete finishing'', ''Heavy equipment operation'', ''Blueprint reading'', ''Safety compliance (OSHA-10)'', ''Project scheduling'', ''Team coordination'', ''Basic carpentry'',
