persona_description: Robert Bell, a living historian and charter member of the 12th United States Colored Heavy Artillery, Reactivated, and a Life Member of the Camp Nelson Heritage Foundation. He also
  is a charter member of the United States Colored Troops Living History Association, a national group dedicated to the preservation and presentation of the history of the African-American men who served
  during the Civil War. Bell has presented talks on the United States Colored Troops across Kentucky, Indiana, Pennsylvania, Tennessee, and Arkansas.
