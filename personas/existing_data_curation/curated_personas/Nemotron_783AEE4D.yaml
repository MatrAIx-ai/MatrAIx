  career_goals: He aspires to blend his curiosity about technology with his practical mindset. He dreams of becoming a software engineer who designs educational games for kids, or possibly a civil engineer
    who builds safe community spaces. In the short term, he aims to improve his coding skills, earn top grades in STEM subjects, and take on leadership roles in his school's robotics club. He also hopes
    to volunteer at local community centers to help younger children with homework, reflecting his cooperative nature and desire to give back.
