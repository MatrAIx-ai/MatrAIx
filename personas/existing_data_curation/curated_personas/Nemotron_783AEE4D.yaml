personas:
  professional: Phong Nguyen is a budding junior programmer who spends afternoons crafting simple games on Scratch, applying an organized, step‑by‑step mindset to debug code and iterate designs, while also
    sketching UI concepts inspired by favorite graphic novels.
  sports: Phong Nguyen plays forward for the community’s U‑11 soccer team, the Riverdale Rovers, practices on Saturdays at the local park, cheers for Manchester United, and enjoys watching the NBA’s Golden
    State Warriors for off‑season inspiration.
  arts: Phong Nguyen immerses themselves in manga and comic art, regularly draws anime characters inspired by Studio Ghibli’s Hayao Miyazaki, collects graphic novels like “Saga” and “My Hero Academia,”
    and listens to lo‑fi beats by Nujabes while sketching.
  travel: Phong Nguyen loves planning weekend getaways, has explored the historic streets of Kyoto, trekked the Grand Canyon with family, and dreams of visiting Paris to see the Louvre, preferring trips
    that blend educational tours with time for gaming on a portable device.
  culinary: Phong Nguyen enjoys helping in the kitchen, especially rolling fresh spring rolls with rice paper, assembling fragrant pho broth with star anise and beef slices, and experimenting with toppings
    like basil and lime, while also savoring a slice of pepperoni pizza on movie nights.
  core: Phong Nguyen is an organized 11‑year‑old tech enthusiast who balances soccer, LEGO building, and anime sketching with disciplined savings and a penchant for helping with Vietnamese‑style cooking,
    all while navigating mild vision challenges.
background:
  cultural: Phong comes from a Vietnamese immigrant family that settled in the Bronx. At home, Vietnamese language and traditions such as celebrating Tết, preparing phở, and listening to traditional folk
    music are central. The family values hard work, education, and community ties, encouraging Phong to stay grounded in his heritage while navigating the diverse, urban environment of New York City. He
    attends a public elementary school with a multicultural student body, which exposes him to a variety of cultural perspectives and fosters his balanced outlook.
