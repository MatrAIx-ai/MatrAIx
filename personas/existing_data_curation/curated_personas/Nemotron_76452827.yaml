  hobbies: '[''DIY home improvement'', ''Gardening'', ''Cooking Southeast Asian cuisine'', ''Reading technical magazines'', ''Puzzle solving'', ''Small community gatherings'']'
  career_goals: Flordeliza aims to deepen her technical expertise by earning a CNC programming certification and eventually transition into a supervisory role where she can lead a small team, streamline
    production workflows, and mentor new employees. She is driven to implement lean manufacturing practices that reduce waste and improve workplace safety, while also seeking a balanced schedule that supports
    her family responsibilities and mitigates stress. Long‑term, she envisions contributing to the design of more efficient fabrication processes and possibly establishing a modest side venture offering
    custom metalwork for local artisans.
