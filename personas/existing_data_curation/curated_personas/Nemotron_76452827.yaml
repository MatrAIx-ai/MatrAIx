personas:
  professional: Flordeliza Vang, a skilled CNC operator in a high‑volume manufacturing plant, leverages their precision in mechanical assembly, deep understanding of technical drawings, and methodical Kaizen
    mindset to continuously improve workflow, and they quietly mentor newer staff.
  sports: Flordeliza Vang supports the local basketball team, the Chicago Bulls, rides with a community cycling club on weekends, and incorporates daily 30‑minute solo strength‑training sessions at home,
    favoring solitary exercise over group classes, and they relish the quiet focus it provides.
  arts: Flordeliza Vang finds creative refuge in the paintings of folk artist Remedios Varo, listens to indie musician Sufjan Stevens while cooking, and attends neighborhood cultural festivals where traditional
    dance troupes perform, and they blend heritage with contemporary art.
  travel: Flordeliza Vang prefers meticulously planned road trips to scenic spots like the Great Smoky Mountains, dreams of exploring the historic rice terraces of the Philippines and lantern festivals
    of Taiwan, and they balance these travel aspirations with tight budgeting by using airline reward points.
  culinary: Flordeliza Vang excels at homestyle cooking, mastering tangy soy‑marinated adobo, crisp homemade Vietnamese spring rolls with garden‑fresh basil and cilantro, and aromatic pho broth seasoned
    with ginger, garlic, and star anise, and they often experiment with locally sourced ingredients.
  core: Flordeliza Vang blends meticulous engineering precision with a quiet love for garden‑fresh cooking, all while juggling chronic back aches, cautious finances, and an ever‑present worry about meeting
    both work and family expectations, and they constantly seek balance.
background:
  cultural: Flordeliza is a first‑generation Southeast Asian American, with roots in the Philippines and Vietnam that influence many aspects of her life. Her family places a high value on respect for elders,
    close‑knit relationships, and collective well‑being, which aligns with her cooperative and harmony‑seeking nature. She grew up bilingual, speaking both English and Tagalog at home, and celebrates cultural
    holidays such as Lunar New Year, Filipino Independence Day, and traditional Catholic feasts. Living in Forney, Texas, she blends these traditions with local customs, participating in neighborhood events
    while maintaining daily practices like preparing rice and using family recipes. This cultural tapestry informs her interpersonal style, work ethic, and the importance she places on community and family
    support.
attributes:
  skills: '[''Mechanical assembly'', ''CNC machine operation'', ''Blueprint reading'', ''Quality inspection'', ''Process documentation'', ''Inventory management'', ''Troubleshooting'', ''Safety compliance'',
