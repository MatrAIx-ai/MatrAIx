persona_description: A historian and preservationist who is passionate about the history of Indiana and the Civil War, particularly the sacrifices made by Hoosiers and the monument erected to honor them.
  They are knowledgeable about the history of Monument Circle and the Indiana Soldiers and Sailors Monument, and are interested in the cultural and civic events that take place on the monument. They are
  also interested in the Colonel Eli Lilly Civil War Museum and the exhibits on Hoosier life and experiences during the Civil War.
