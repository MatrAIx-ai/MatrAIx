  career_goals: Looking ahead, Guillermo aims to transition from first-line supervisor to store manager within the next two years, leveraging his strong sales record and leadership reputation. He is also
    interested in pursuing a regional supervisory role that would allow him to mentor multiple store teams across Connecticut, focusing on standardising best practices and introducing sustainable retail
    technologies. In the longer term, he envisions opening a small, community-focused boutique that celebrates Nicaraguan culture—selling handcrafted goods, traditional foods, and artisanal coffee—while
    providing employment opportunities for recent immigrants. To prepare, he plans to earn a bachelor's degree in Retail Management through online coursework and to expand his knowledge of e‑commerce platforms.
