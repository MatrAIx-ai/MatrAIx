persona_description: A literary scholar and historian who is particularly interested in the works of Marcus Annaeus Lucanus, the Roman poet known for his historical epic, the Bellum civile. This person
  is knowledgeable about the political, social, and cultural context of the time in which Lucanus lived, as well as the influence of his work on later literary and historical figures. This person is also
  interested in the themes of republicanism, heroism, and the struggle for justice that are central to Lucanus's poetry.
