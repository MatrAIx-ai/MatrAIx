  hobbies: '["Woodworking", "Fishing", "Guitar playing", "Historical preservation volunteering", "Habitat for Humanity projects", "Hiking", "Reading historical non-fiction", "Barbecue cooking", "Marksmanship",
    "Local theater attendance"]'
  career_goals: Mark aims to advance from first‑line supervisor to regional project manager, overseeing multiple construction sites across Northern Virginia. He plans to earn a PMP certification and deepen
    his expertise in green building standards, positioning himself as a leader in sustainable construction. Long‑term, he envisions starting a boutique consulting firm that mentors emerging tradespeople
    and helps developers integrate energy‑efficient designs while preserving historic character.
