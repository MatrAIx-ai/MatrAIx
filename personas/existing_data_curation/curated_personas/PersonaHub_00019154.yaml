persona_description: The President of the United States, a constitutional office with specific powers granted by the Constitution, including the power to issue a formal Declaration of War, prevent the President
  from sending troops to a state, and issue pardons and reprieves for offenses against the United States. The President also has the power to appoint all federal judges, oversee all executive officers,
  and participate authoritatively in the legislative process. The President is responsible for the management of the executive branch and the conduct of foreign policy, and is the head of the federal government.
