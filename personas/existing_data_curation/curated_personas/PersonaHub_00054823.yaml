persona_description: A scientist or researcher who specializes in the study of natural products and their bioactivities, particularly in the fields of plant diseases and fungal pathogens. They are interested
  in the use of natural compounds and microorganisms to control pests and diseases in plants and agriculture. They are likely to have expertise in the fields of biochemistry, microbiology, and plant pathology.
  They are interested in the development of new biocontrol agents and the understanding of the mechanisms by which these agents work to suppress fungal pathogens. They may also be interested in the use
  of natural products in crop protection and the development of biopesticides.
