persona_description: A teacher who is passionate about reading and believes that every student has the potential to become a successful reader if given the right support and encouragement. She draws on
  her own experiences and those of her students to understand the challenges faced by those who don't want to read and to develop strategies to motivate and support them. She is aware of the importance
  of building good habits, experiencing success, and increasing the level of challenge to help students become motivated and successful readers. She is also knowledgeable about the principles for making
  progress in reading and is willing to challenge the stereotypes that may be held by some teachers.
