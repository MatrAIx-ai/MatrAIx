personas:
  professional: Hector Rivero, a seasoned construction specialist with three decades of hands‑on experience coordinating carpentry, concrete, and heavy‑equipment crews, leverages his practical mindset and
    talkative, sociable nature, and they keep job sites orderly, mediate crew disputes, and deliver projects on schedule while pursuing a site‑manager certification and planning a modest remodeling venture.
  sports: Hector Rivero stays active by fishing at nearby lakes, tending his vegetable garden, and cheering on the Greene County Bulldogs minor‑league baseball team and the local high school Panthers basketball
    squad, they attend Saturday games with friends, and they maintain personal fitness through morning walks and occasional pickup softball games at the community park.
  arts: Hector Rivero immerses himself in the rhythmic world of cumbia and salsa at community gatherings, dancing to classics by Celia Cruz and Victor Jara while also enjoying the storytelling of historical
    nonfiction authors like David McCullough, they unwind with friends at the neighborhood bar where they play pool and occasionally savor live acoustic renditions by local folk guitarist Luis Rivera.
  travel: Hector Rivero prefers well‑planned, moderate‑budget trips that blend relaxed fishing excursions with cultural sightseeing, having already visited the historic streets of New Orleans and the coastal
    town of Key West, they hope to explore the natural beauty of the Great Smoky Mountains and the vibrant markets of Cartagena within the next few years.
  culinary: Hector Rivero, a confident home cook, delights neighbors with handcrafted pupusas filled with loroco, cheese, and shredded pork, and hearty sopa de gallina brimming with chicken, cilantro, and
    toasted corn tortillas, they relish sourcing fresh chilies, tomatoes, and masa harina at the local market, and they occasionally treat themselves to a steak dinner at a downtown steakhouse after a day’s
    work.
  core: Hector Rivero blends a pragmatic, schedule‑obsessed mindset with a talkative, community‑centric spirit, they never miss a neighborhood dance, yet they habitually leave a few dishes unwashed after
    large gatherings, reflecting both their dedication to camaraderie and occasional neglect of household chores.
background:
  cultural: Born to Salvadoran immigrants, Hector grew up speaking both Spanish and English, celebrating holidays such as Día de los Muertos and Christmas with tamales and pupusas. He stays connected to
    the Salvadoran diaspora in nearby Greenville, attending monthly cultural events and supporting a local Latin youth soccer league. The values of hard work, family solidarity, and respect for elders that
    he learned from his parents shape his approach to both his career and his community involvement.
attributes:
  skills: '["Carpentry", "Concrete Formwork", "Heavy Equipment Operation", "Construction Safety Management", "Scheduling & Logistics", "Team Leadership", "Budgeting", "Quality Assurance"]'
  hobbies: '["Cooking Salvadoran cuisine", "Cumbia dancing", "Gardening", "Fishing", "Volunteering at community food bank", "Reading historical non‑fiction", "Playing pool"]'
  career_goals: As he approaches retirement, Hector aims to step up to a full site‑manager role, gain formal certification as a construction safety trainer, and eventually start a modest residential remodeling
    business that will allow him to mentor young Latino workers and give back to the Greene County community.
