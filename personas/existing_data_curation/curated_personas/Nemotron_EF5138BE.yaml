  career_goals: Gregory aims to transition into a supervisory role within the postal service in the next two to three years, leveraging his extensive route knowledge to mentor junior carriers and improve
    efficiency through data‑driven planning. He also intends to complete his GED to open pathways for formal education in graphic design, which will support his side venture creating custom illustrated
    greeting cards that blend his artistic passion with his postal expertise. Long‑term, he dreams of publishing a collection of reflective poems that capture the everyday rhythms of the neighborhoods he
    serves, thereby merging his professional experience with his creative aspirations.
