  hobbies: '[''Sketching surreal portraits'', ''Digital illustration'', ''Speculative‑fiction writing'', ''Visiting art museums and galleries'', ''Attending live‑music shows'', ''Yoga and meditation'',
    ''Reading philosophy'', ''Puzzle solving'', ''Board‑game nights with friends'']'
  career_goals: Judy aims to leverage her current experience into a paralegal position within the next two years, while enrolling in a part‑time associate degree in legal studies. She is driven to eventually
    attend law school and specialize in intellectual property or entertainment law, where she can blend her creative interests with legal expertise. In the short term, she seeks leadership on office projects—such
    as developing efficient filing systems or coordinating firm‑wide marketing initiatives—to demonstrate her competitive edge and readiness for greater responsibility. Long‑term, she envisions a career
    that offers both intellectual challenge and flexibility, possibly involving legal tech innovation or advisory work for artists and creators.
