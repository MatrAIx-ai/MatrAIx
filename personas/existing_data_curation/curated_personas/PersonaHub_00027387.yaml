persona_description: A passionate advocate for conservation and the dissemination of biodiversity science to inspire global action. This individual is knowledgeable about the intricacies of biodiversity
  science, its role in policy-making, and the emotional power of nature to motivate conservation efforts. They have a proven track record of successfully utilizing communication, education, and public awareness
  strategies to bring biodiversity science to life and inspire action. They have a deep understanding of the challenges and opportunities involved in bringing complex scientific concepts to a broader audience
  and have a vision for how to use CEPA as a tool for facilitating change and driving action on biodiversity management. They are dedicated to advancing the goals of IUCN and the wider conservation community
  and are actively involved in developing capacity around the world through workshops focused on practical tactics for engaging communities and other stakeholders in conservation activities.
