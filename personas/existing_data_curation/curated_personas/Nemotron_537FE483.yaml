personas:
  professional: Carmen Burgos, a seasoned expressive arts therapist who meticulously documents cases and leverages bilingual Spanish‑English storytelling, combines cognitive‑behavioral techniques with vibrant
    heritage‑inspired murals to empower older adults, channeling a competitive drive to grow a cultural healing studio.
  sports: Carmen Burgos, who hikes the rolling trails of Griffith Park with the local Griffith Park Hikers club and plays senior league tennis at the Echo Park courts, follows the Los Angeles Lakers and
    Dodgers passionately, and balances competitive drive with low‑impact cardio to safeguard her knees.
  arts: Carmen Burgos, who spends evenings crafting intricate collages, strumming classical guitar, and attending poetry readings featuring Ocean Vuong, draws artistic inspiration from renowned muralists,
    contemporary street artist Shepard Fairey, and the color palettes of Claude Monet, weaving these influences into both her therapy work and personal studio practice.
  travel: Carmen Burgos, a meticulous planner, enjoys weekend getaways to Santa Barbara, yearly trips to Sedona's red rocks, has explored the historic streets of Seville, and dreams of wandering Kyoto's
    temples, arranging each itinerary to fit her garden volunteer schedule and desire for cultural immersion.
  culinary: Carmen Burgos, a confident home cook, regularly prepares heirloom tomato sauces, slow‑cooked chocolate‑infused sauce with chilies, and hand‑rolled tamales made from fresh masa, while savoring
    aged traditional cheese flavored with epazote and cilantro.
  core: Carmen Burgos merges methodical therapeutic precision with a boundless artistic imagination, hoards vintage guitar strings like treasure, meticulously plans every brushstroke, and maintains a healthy
    skepticism toward quick‑fix solutions.
background:
  cultural: Carmen is a second‑generation Mexican‑American whose parents migrated from Jalisco in the early 1960s. Raised in East Los Angeles, she grew up bilingual and immersed in vibrant community traditions
    such as Día de los Muertos, folk music, and Mexican culinary arts. Her upbringing fostered a deep respect for familismo, personalismo, and the power of narrative storytelling as a means of healing.
    These cultural values inform her therapeutic approach, which often incorporates Mexican folk symbolism, use of the Spanish language, and communal art practices. Living in Los Angeles, she navigates
    a multicultural landscape that enriches both her identity and professional perspective.
attributes:
  skills: '["Expressive Arts Therapy", "Cognitive Behavioral Therapy", "Trauma-Informed Care", "Narrative Therapy", "Cultural Competency (Mexican/Latino)", "Bilingual Counseling (Spanish/English)", "Small
    Group Facilitation", "Session Planning and Documentation", "Mindfulness-Based Interventions", "Artistic Mediums (painting, collage, music, poetry)"]'
  hobbies: '["Mural painting", "Collage art", "Classical guitar", "Reading philosophy and mythology", "Attending poetry readings", "Hiking in Griffith Park", "Rooftop gardening", "Cooking Oaxacan cuisine",
    "Street photography", "Volunteering at community garden"]'
  career_goals: She aims to expand her private practice into a dedicated cultural healing studio that offers integrative art therapy tailored to older Mexican‑American adults. She plans to obtain formal
    certification in Expressive Arts Therapy and to publish a research monograph on the outcomes of narrative art interventions for Latino seniors. Additionally, Carmen seeks to secure grant funding to
    launch a community outreach program that brings mobile art‑therapy workshops to underserved neighborhoods in Los Angeles, and to mentor emerging bilingual therapists through a structured apprenticeship
    program.
