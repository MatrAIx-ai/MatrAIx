personas:
  professional: Guillermo Ramos, a dedicated community case manager in the Gurabo region, leverages bilingual communication, meticulous record‑keeping, and trauma‑informed group facilitation to build trust
    with at‑risk families while relentlessly pursuing a future as a Licensed Clinical Social Worker and program supervisor.
  sports: Guillermo Ramos, an avid pick‑up baseball player who cheers for the Cangrejeros de Santurce, regularly hikes the El Yunque trails, and participates in a local adult basketball league with the
    Canóvanas Thunder, blends competitive spirit with community camaraderie.
  arts: Guillermo Ramos, a salsa‑floor regular at Club Sonido Latino, immerses themselves in the rhythms of Marc Anthony and Celia Cruz while also attending monthly performances at the Centro de Bellas
    Artes, and participates in the annual barrio festival where they showcase traditional dance.
  travel: Guillermo Ramos, who prefers weekend getaways to Vieques’ bioluminescent bay and cultural immersion trips to Old San Juan, plans travel using a points‑based credit card, dreams of a week‑long
    leadership retreat in Medellín, yet balances these trips against family responsibilities and modest savings.
  culinary: Guillermo Ramos, an enthusiastic home chef, crafts arroz con gandules, mofongo, and sofrito using fresh cilantro, recao, and achiote from their garden, loves grilling marinated pork shoulder,
    yet occasionally over‑salts dishes while perfecting the balance of flavors for family Sunday meals.
  core: Guillermo Ramos blends disciplined organization with an energetic love for community dance and sport, channeling their curiosity into social‑work leadership while juggling a habit of late‑night
    salsa sessions and occasional over‑spending on club fees.
background:
  cultural: Guillermo is a Puerto Rican native from Canóvanas in the Gurabo Municipio, reflecting a blend of Spanish, African, and Taíno heritage that shapes his worldview. He grew up in a close‑knit, family‑centered
    environment where "familismo" and community solidarity are paramount. Catholic traditions, the rhythms of bomba and plena, and the island's love for outdoor gatherings influence his daily life. His
    bilingual fluency and deep appreciation for local customs enable him to connect authentically with clients, while his respect for cultural values drives his commitment to community service and empowerment.
attributes:
  skills: '[''Bilingual Communication (Spanish/English)'', ''Client Assessment'', ''Case Management'', ''Community Resource Coordination'', ''Crisis Intervention'', ''Trauma‑Informed Care Knowledge'', ''Conflict
    Resolution'', ''Group Facilitation'', ''Public Speaking'', ''Data Entry & Record Keeping'', ''Microsoft Office Suite'', ''Case Management Software (e.g., Social Solutions)'']'
  hobbies: '[''Salsa Dancing'', ''Pick‑up Baseball'', ''Community Festival Participation'', ''Gardening (herbs & vegetables)'', ''Cooking Traditional Puerto Rican Cuisine'', ''Hiking (El Yunque)'', ''Reading
    Self‑Development and Leadership Books'']'
  career_goals: Guillermo aims to earn a bachelor's degree in Social Work within the next two years, followed by a master's to become a Licensed Clinical Social Worker. He aspires to transition into a supervisory
    role as a Community Services Coordinator, where he can design and lead outreach programs for at‑risk youth and families in the Gurabo and Canóvanas regions. Long‑term, he dreams of establishing a nonprofit
    community center that offers educational workshops, job training, and mental health services, leveraging his organized, achievement‑driven mindset to create sustainable impact.
