persona_description: A dedicated social reformer and antislavery advocate, Mary Blackford was deeply affected by the tragedies of slavery and played a significant role in the colonization of free blacks
  and recently freed slaves to Liberia. She was also a lifelong temperance advocate and wielded influence through her personal example and ever-active pen. Her brother Launcelot Byrd Minor became a missionary
  in Liberia, and she corresponded with him and his family's former slaves and others whom she had assisted in emigrating there from Virginia. Despite her antipathy to slavery, the family owned a few household
  slaves purchased by her husband to assist her. After her husband's death, she spent most of her long life living quietly in the Alexandria home of her son Launcelot Minor Blackford.
