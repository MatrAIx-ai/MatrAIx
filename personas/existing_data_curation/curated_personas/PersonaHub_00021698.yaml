persona_description: A sociologist who specializes in microsociology, focusing on the study of individual interaction and thinking within groups, rather than just large social group/societal behavior. They
  are interested in the key issues, categories and principles of microsociology, such as human relations, face-to-face interaction, interpretive/qualitative analysis, attachment and empathy, micro-level
  analysis, human behavior, micro-community, everyday human life, human context, microculture, focus on agency, and have influenced and still influences today's social work theory and practice with a crucial
  role in the emergence of humanistic social work.
