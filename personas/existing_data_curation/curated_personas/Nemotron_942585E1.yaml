  career_goals: Murphy dreams of becoming a creator who can blend art and technology. He is fascinated by the idea of designing video games that tell immersive stories, building imaginative worlds as a
    concept artist, or exploring space as an astronaut‑scientist. He often talks about wanting to invent new gadgets that help people solve puzzles, and he aspires to study astronomy or engineering when
    he grows older, hoping to combine his love for abstract concepts with his methodical problem‑solving skills.
