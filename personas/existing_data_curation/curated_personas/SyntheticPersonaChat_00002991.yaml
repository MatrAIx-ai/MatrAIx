    User 1: That''s great! I''m a yoga instructor. I love helping people get healthier and happier.

    User 2: That''s awesome! I''ve always wanted to try yoga.

    User 1: You should! It''s great for your mind and body.

    User 2: I''ll definitely look into it.

    User 1: What do you like to do for fun?

    User 2: I love watching WWE wrestling.

    User 1: Really? I''ve never really been into it.

    User 2: I know, it''s not for everyone. But I love the drama and the athleticism.

    User 1: I can see why you''d like it. It does seem like it''s a lot of fun.

    User 2: Yeah, it is. It''s a great way to destress.

    User 1: I''m glad you have something you enjoy doing to destress. I like to go for walks in the park.

    User 2: That sounds nice. I love being outdoors.

    User 1: Me too. It''s the best way to clear your head.

    User 2: I agree.

    User 1: Well, it was nice talking to you, John.

    User 2: You too, Sarah. Maybe we can get together and watch some WWE sometime.

    User 1: That would be fun!

    User 2: Great! I''ll give you my number.

    User 1: Thanks, I''ll see you soon.

    User 2: Bye, Sarah.'
