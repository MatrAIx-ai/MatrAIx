  hobbies: '[''Fly fishing'', ''Backpacking and trail hiking'', ''Woodworking and furniture making'', ''DIY home‑brewing'', ''Reading historical non‑fiction'', ''Community volunteering'', ''Attending local
    festivals and folk music gatherings'']'
  career_goals: Approaching retirement, Scott aims to shift from hands‑on production work to a mentorship and safety‑focused role. He hopes to become a shift supervisor or safety coordinator where he can
    pass on his practical knowledge, coach younger colleagues, and implement modest process improvements that balance efficiency with worker well‑being. Ultimately, he would like to serve as a part‑time
    consultant for small local manufacturers, offering advice that blends proven techniques with selective adoption of new technologies, while preserving a flexible schedule that accommodates his desire
    for a less stressful pace.
