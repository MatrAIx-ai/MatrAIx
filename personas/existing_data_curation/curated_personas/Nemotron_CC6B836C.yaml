personas:
  professional: Scott Levin, a seasoned industrial production veteran with three decades of CNC machining and lean manufacturing expertise, now channels their curiosity and practical mindset into mentoring
    younger workers and championing safety on the shop floor, while juggling a laid‑back approach to planning that sometimes leads to missed paperwork but rewards the team with hands‑on guidance.
  sports: Scott Levin spends weekends fly‑fishing the Yellowstone River and hiking the Absaroka Range, is an active member of the local trout anglers club, roots for the Montana Grizzlies football team,
    and occasionally joins the community senior cycling group for low‑key rides.
  arts: Scott Levin channels their creative side through rustic woodworking, finds inspiration in the folk ballads of Marty Robbins and the paintings of Charles M. Russell, regularly attends the town’s
    summer theater productions, and keeps a stack of David McCullough biographies on the nightstand.
  travel: Scott Levin prefers road trips that blend scenic wilderness with small‑town charm, has trekked the alpine passes of the Canadian Rockies and the volcanic landscapes of Iceland, yet dreams of a
    relaxed cabin stay in the remote woods of Montana’s Badger Country for the next vacation.
  culinary: Scott Levin favors hearty, locally sourced meals—simmering elk stew with root vegetables, grilling fresh trout with lemon‑dill butter, and pairing their home‑brewed amber ale with a slice of
    crusty sourdough—while their kitchen shelves are stocked with smoked paprika and wild rosemary.
  core: Scott Levin embodies a rugged, self‑reliant mindset tempered by a worry‑prone heart, balancing hands‑on craftsmanship with a laid‑back, occasionally disorganized lifestyle that keeps both workshop
    and calendar in charming, if imperfect, order.
background:
  cultural: Scott is a third‑generation White American whose family traces its roots to German and Scandinavian immigrants who settled in Montana’s mining and ranching communities in the early 20th century.
    Growing up in Livingston, he absorbed the region’s frontier spirit of self‑reliance, a deep respect for the natural landscape, and a strong sense of community fostered by local institutions such as
    the church, volunteer fire department, and seasonal tourism. This heritage shapes his practical work ethic, his appreciation for both tradition and modest innovation, and his commitment to supporting
    neighbors and preserving the area's cultural values.
attributes:
  skills: '[''CNC machine operation'', ''Mechanical troubleshooting'', ''Preventive equipment maintenance'', ''Industrial electronics basics'', ''Lean manufacturing'', ''Quality control inspections'', ''Safety
