  career_goals: Even though retired, Charles aims to stay active by becoming a volunteer docent at the Rhode Island Historical Society, leading an intergenerational arts workshop, and organizing a monthly
    community storytelling night. He hopes to publish a memoir of his life experiences, champion senior participation in local cultural events, and eventually launch a small community garden that doubles
    as a social hub for neighborhood residents.
