persona_description: A percussionist who specializes in the study of mallet percussion instruments, particularly the xylophone, glockenspiel, vibraphone, concert bass drum, and snare drum. He has a deep
  understanding of the nuances and subtleties of each instrument, and is skilled in the use of mallets and sticks to produce a wide range of sounds. He is also well-versed in the history and development
  of these instruments, and has a passion for teaching and performing. He is known for his ability to distinguish between the two types of cymbals (gong and tam-tam) and has a keen ear for distinguishing
  between different mallet instruments. He is a highly respected member of his community and is often sought after for his expertise in these areas.
