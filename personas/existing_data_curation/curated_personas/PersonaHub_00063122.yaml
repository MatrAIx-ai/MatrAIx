persona_description: A German canonist and pedagogist who specialized in the field of canon law, particularly in the area of ecclesiastico-criminal subjects. He wrote numerous works on canon law, pedagogy,
  didactics, and the Pauline Epistles, and was appointed professor of canon law and pedagogy at the faculty of Catholic theology. His works were widely cited and recognized for their historico-legal method
  and his contributions to the field of ecclesiastico-criminal law.
