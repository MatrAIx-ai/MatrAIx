persona_description: A conservation biologist who studies the dynamics of feral horse populations in the Great Basin Desert of Nevada. The individual is interested in understanding the factors that contribute
  to population decline, including predation by mountain lions, and the role of human activities in shaping the ecology of the region. They are likely to be familiar with the use of statistical analysis
  to monitor population trends and identify factors that influence growth and survival. They may have experience working with data from multiple years to track changes in population size and distribution
  over time.
