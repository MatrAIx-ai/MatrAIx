personas:
  professional: Maria Rivera, a budding preschool organizer, delights in arranging crayons by color and assisting her teacher with simple tasks, showcasing early signs of future educational support skills.
  sports: Maria Rivera plays forward for the McAllen Little Stars Soccer Club, cheers on the Houston Dynamo during weekend matches, and enjoys energetic dance classes after school, combining structured
    team play with personal movement.
  arts: Maria Rivera spends afternoons coloring papel picado and carving tiny sugar skulls for family altars, and sings along to Selena’s 'Como La Flor' while drawing cartoon characters, weaving cultural
    art traditions with modern pop influences.
  travel: Maria Rivera enjoys weekend trips across the Rio Grande to stay with grandparents and dreams of exploring the sandy dunes of South Padre Island, preferring family‑guided car rides over long flights.
  culinary: Maria Rivera loves helping her family roll tiny corn tortillas for tacos, sprinkling fresh salsa on top, and occasionally mixing cheese into mac and cheese, showing a budding palate that mixes
    home‑cooked tradition with kid‑friendly comfort foods.
  core: Maria Rivera is a structured, kind‑hearted five‑year‑old who balances cultural traditions with playful curiosity, often arranging crayons, saving coins, and crafting tiny altars while occasionally
    forgetting to wash hands after snack time.
background:
  cultural: Maria is a Mexican-American child raised in McAllen, Texas, a city on the U.S.–Mexico border. At home, Spanish is the primary language, and family traditions such as Día de los Muertos altars,
    Las Posadas during Christmas, and weekend meals featuring tacos, tamales, and fresh salsa are central to her upbringing. She also participates in Texan school celebrations and community events, blending
    both cultures. The proximity to Mexico allows her to hear radio stations from both sides of the border, enjoy Tejano music, and occasionally visit relatives across the Rio Grande, giving her a bicultural
    identity that values both Mexican heritage and American experiences.
