  career_goals: Maria often talks about growing up and helping others. She says she wants to be a teacher because she enjoys explaining things to her friends and keeping the classroom organized. She also
    imagines becoming a librarian, where she could share stories and maintain a tidy space for children to explore. These goals reflect her love for structure, her caring nature, and her desire to create
    harmonious environments for peers.
