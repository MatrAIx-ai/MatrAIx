persona_description: A scientist with a passion for studying the impact of habitat loss on animal mobility and migration patterns. She is particularly interested in the unique lemur species of Madagascar
  and the potential consequences of deforestation and loss of habitat for these species. Her research aims to provide a baseline for tracking animal mobility and migration patterns and to shed light on
  the environmental consequences of forest loss. Her work has the potential to inform conservation efforts and help protect the biodiversity of Madagascar.
