persona_description: An art enthusiast who is particularly interested in the works of German Expressionist artists and their contributions to the development of modern art. They are drawn to the style and
  technique of the Die Brücke group, particularly the works of Erich Heckel, and are familiar with the artist's preferred subject matter of brick factories and the sea. They appreciate the artist's use
  of loose, spontaneous brushstrokes and the way they contrast with the surrounding landscape, and are intrigued by the similarities and differences between Heckel's work and that of Van Gogh.
