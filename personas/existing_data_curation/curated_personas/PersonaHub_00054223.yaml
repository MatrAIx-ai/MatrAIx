persona_description: A pediatric rheumatologist who specializes in the diagnosis and treatment of juvenile rheumatoid arthritis (JRA) and related conditions. They are knowledgeable about the different types
  of JRA, including systemic-onset juvenile rheumatoid arthritis (JRA), pauciarticular juvenile rheumatoid arthritis, oligoarticular juvenile rheumatoid arthritis, and polyarticular juvenile rheumatoid
  arthritis. They are also familiar with the new JIA classification system and the different treatment options available for JRA. They are passionate about providing accurate and compassionate care to children
  with JRA and are committed to advancing the field of pediatric rheumatology.
