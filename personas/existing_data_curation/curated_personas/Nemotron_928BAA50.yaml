personas:
  professional: Tabather Taylor, a budding storyteller who sketches animals and rehearses gospel choruses in Sunday school, imagines a future as a children's author where her curiosity and practical organization
    help her turn whimsical ideas into structured picture books.
  sports: Tabather Taylor cheers for the Mississippi State Bulldogs during family game nights, plays tag and kickball at the community park, and belongs to the local Lil Rascals soccer club where her high
    energy and sociable nature make her a natural forward who loves scoring and celebrating with a victory dance.
  arts: Tabather Taylor delights in drawing lively animals while humming Aretha Franklin's 'Respect' and dancing to R&B classics at family gatherings, and she idolizes children's author Dr. Seuss for his
    playful rhymes, often reenacting his stories with her dress-up costumes and making up her own verses.
  travel: Tabather Taylor dreams of revisiting the seaside route to Gulfport for sandcastle building, loves the annual state fair in Jackson for its cotton candy and ferris wheel rides, and keeps a notebook
    of imagined adventure maps that blend real trips to Grandma's rural farm with pretend voyages to Disney World.
  culinary: Tabather Taylor loves the buttery crunch of fried chicken, the sweet tang of peach cobbler, and the comforting smell of collard greens simmering on the stove, often helping her grandmother whisk
    biscuit dough while sprinkling extra cinnamon on her morning oatmeal.
  core: Tabather Taylor is a talkative, curiosity-driven six-year-old who blends gospel singing, animal doodles, and an endless quest for glittery stickers into a vibrant, community-centered world view.
background:
  cultural: Tabather is part of an African-American family in Hazlehurst, Mississippi, where church, family gatherings, and community events are central to life. Her upbringing includes listening to gospel
    and soul music, enjoying Southern cooking with her relatives, and participating in local traditions such as church choir rehearsals, family potlucks, and school-community celebrations. These cultural
    influences shape her values of togetherness, storytelling, and expressive creativity.
attributes:
  skills: '[''reading simple sentences'', ''counting to 100'', ''storytelling'', ''drawing'', ''leading group games'', ''basic computer navigation'', ''singing'']'
  hobbies: '[''reading picture books'', ''drawing'', ''dress-up play'', ''singing gospel songs'', ''dancing'', ''exploring nature'', ''church Sunday school'', ''community fairs'']'
  career_goals: She dreams of becoming a teacher because she loves sharing stories and helping friends learn. She also imagines being a community storyteller or a musician who can bring people together,
    reflecting her love of attention and talkative nature.
