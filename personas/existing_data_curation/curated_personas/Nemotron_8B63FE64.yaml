  hobbies: '[''Playing guitar'', ''Attending live blues and soul concerts'', ''Pickup basketball'', ''Fishing'', ''Hiking'', ''Southern cooking'', ''DIY woodworking projects'', ''Reading African‑American
    history and biographies'', ''Volunteer mentoring at church youth program'', ''Video gaming'']'
  career_goals: Allan aims to achieve journeyman and eventually master carpenter certification, followed by an associate degree in construction management. He envisions launching his own small contracting
    firm that specializes in historic home restoration and sustainable building practices in Birmingham. Over the next five years, he wants to mentor apprentices, join the local carpenters union, and become
    a project manager or foreman for larger residential projects. Long‑term, Allan hopes to develop a line of handcrafted furniture sold locally and online, and to contribute to community revitalization
    initiatives in historically Black neighborhoods of the city.
