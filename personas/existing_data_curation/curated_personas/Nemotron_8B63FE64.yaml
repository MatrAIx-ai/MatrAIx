personas:
  professional: Allan Davis, a 22‑year‑old aspiring master carpenter, combines methodical project planning with a curiosity for reclaimed‑wood techniques, excels at interpreting blueprints and coordinating
    small crews, and is already laying the groundwork to earn journeyman certification while eyeing a future historic‑home restoration firm in Birmingham.
  sports: Allan Davis enjoys pick‑up basketball at the community center, cheering for the Birmingham Barons and following the Alabama Crimson Tide football team, while also playing Sunday league soccer
    with the local Eagle SC club and occasionally trekking the Appalachian Trail for endurance training.
  arts: Allan Davis immerses in Birmingham’s blues and soul scene, often jamming on a Telecaster after work while drawing inspiration from the soulful riffs of Robert Cray and the modern groove of St. Paul
    and The Broken Bones, and spends evenings reading biographies of civil‑rights pioneers such as Frederick Douglass and Malcolm X to fuel both musical and personal growth.
  travel: Allan Davis prefers road‑tripping in a reliable used truck, weekend‑hiking the Great Smoky Mountains, exploring the historic districts of Savannah, Georgia, and attending the annual Memphis Blues
    Festival, while saving for a future cultural tour of New Orleans’ French Quarter and the historic plantations of the Deep South.
  culinary: Allan Davis loves cooking Southern comfort fare, mastering slow‑smoked pork ribs with a hickory‑infused rub, simmering collard greens seasoned with smoked turkey and garlic, and baking sweet
    potato pie with a flaky crust, often experimenting with locally sourced honey, chipotle, and fresh thyme to add a personal twist.
  core: Allan Davis blends a disciplined carpenter’s mindset with a soulful love for blues, Southern cooking, and community service, balancing meticulous project management with a laid‑back weekend habit
    of fishing and gaming.
background:
  cultural: Allan grew up in a close‑knit Black community in Birmingham, steeped in the city’s civil‑rights legacy and Southern traditions. Raised by grandparents who were skilled tradespeople, he learned
    the value of hard work, craftsmanship, and community service early on. His family’s involvement in the local church fostered a strong sense of hospitality, mutual support, and resilience in the face
    of social challenges. Allan’s cultural identity is expressed through his love of soul and blues music, Southern cuisine, and celebrations like Juneteenth and church gatherings. This background fuels
    his desire to uplift his neighborhood, preserve historic Black heritage sites, and mentor the next generation of craftsmen.
attributes:
  skills: '[''Residential framing'', ''Finish carpentry'', ''Custom furniture design'', ''Blueprint reading'', ''Basic AutoCAD drafting'', ''Project scheduling'', ''Safety compliance'', ''Power tool operation'',
