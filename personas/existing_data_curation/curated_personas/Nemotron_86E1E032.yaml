personas:
  professional: Kathleen Reznik, a 48‑year‑old community organizer and aspiring home‑based baker, leverages their meticulous budgeting, event planning, and hands‑on crafting skills to lead PTA initiatives,
    coordinate neighborhood garden projects, and prepare to launch a small bakery specializing in artisanal rye breads and traditional fruit pies, all while maintaining a calm, structured approach that
    balances assertiveness with collaboration.
  sports: Kathleen Reznik enjoys low‑impact fitness, attending a Tuesday morning yoga class at the Owatonna Community Center, walking the Owatonna Lake trail with the local senior walking club, and cheering
    for the Minnesota Twins and the Minnesota Vikings while also participating in the town’s seasonal 5K fun run and occasionally joining a community softball league for women over 40.
  arts: Kathleen Reznik’s creative life centers on quilting— they’re a regular at the Owatonna Quilters Guild where they study the works of Dollie Charnley and the geometric patterns of Bauhaus textiles—while
    their musical palate includes the folk harmonies of Emmylou Harris and the choral pieces performed by their Lutheran church choir, and they rarely miss a performance at the Guthrie Theater when it features
    classic American playwrights.
  travel: Kathleen Reznik prefers road trips that combine family time with cultural immersion; they have driven the Upper Peninsula of Michigan for fall foliage, explored the historic Oktoberfest celebration
    in Munich, and plan a future pilgrimage to Copenhagen to trace their Scandinavian roots, all while keeping travel budgets tight by staying in family‑run B&Bs and using discount travel apps.
  culinary: 'Kathleen Reznik’s kitchen is a blend of heritage and innovation: they bake sourdough rye loaves with caraway seeds, craft apple‑cinnamon pies using heirloom apples from their garden, and perfect
    pickled cucumbers and sauerkraut for winter canning, though they occasionally burn the edges of their biscuits when multitasking between baking and quilting.'
  core: Kathleen Reznik is a structured, community‑driven home‑economist who balances meticulous budgeting, garden‑to‑table cooking, and craft‑centric philanthropy, all while navigating occasional forgetfulness
    and a love for quiet, purposeful routines.
background:
  cultural: Kathleen comes from a white Midwestern background with deep roots in southern Minnesota. Her family lineage includes German and Scandinavian ancestors who settled in Steele County in the early
    1900s. She was raised with traditions such as celebrating Oktoberfest, enjoying hearty German–Scandinavian cuisine, and attending a Lutheran congregation. The regional culture emphasizes practicality,
    community involvement, modesty, and self‑reliance, all of which are evident in Kathleen's daily life and values.
attributes:
