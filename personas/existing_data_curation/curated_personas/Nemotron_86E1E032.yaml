    (email, online banking, social media)'', ''Volunteer recruitment and training'', ''Public speaking in small community settings'', ''Crisis management and emergency response'']'
  hobbies: '[''Vegetable gardening and landscape care'', ''Food preservation (canning, pickling)'', ''Quilting and sewing'', ''Church choir singing and event planning'', ''Reading historical fiction'',
    ''Walking and hiking local trails'', ''Gentle yoga and mindfulness practice'', ''Volunteering at the community library'', ''Participating in a local book club'', ''Crafting homemade candles'']'
  career_goals: Although Kathleen is not currently part of the formal workforce, she aims to turn her household and community expertise into purposeful projects. She plans to launch a small home‑based bakery
    specializing in artisanal breads and pies, leveraging a culinary arts certificate from a community college. She also aspires to become the president of the local PTA to spearhead initiatives that improve
    school resources and parent engagement. Additionally, Kathleen wants to develop a neighborhood garden program in Owatonna to promote sustainable living and to write a cookbook that showcases her family's
    traditional recipes. A long‑term ambition is to obtain certification as a Community Emergency Response Team (CERT) leader, allowing her to contribute more formally to public safety in her region.
