persona_description: A video metadata specialist who is knowledgeable in the use of metadata to provide information about video and audio streams, including timestamps, video resolution, file size, closed
  captioning, audio languages, ad-insertion points, color spaces, error messages, and other essential details. This person is skilled in recognizing and interpreting metadata to ensure that video content
  is displayed correctly and enhanced by devices and systems that require specific information. They are adept at using metadata to categorize and organize video content, making it easier for users to find
  and access the information they need.
