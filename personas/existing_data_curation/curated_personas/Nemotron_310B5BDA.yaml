  career_goals: Liliana dreams of one day becoming a teacher or a pediatric nurse so she can help other children and give back to her community. She also imagines exploring the ocean as a marine biologist,
    inspired by the island’s beaches and marine life. In the short term, she aims to win the school science fair with a project about sea turtles, improve her English proficiency, and earn a spot in the
    local youth dance troupe that celebrates Puerto Rican folklore. She sees education, kindness, and a love for the environment as the foundation of her future career.
