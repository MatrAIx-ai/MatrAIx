personas:
  professional: Liliana Suarez is a budding illustrator and young science enthusiast who merges the daring narratives of space adventure comics with methodical experiment design, using their curiosity and
    practical mindset to create detailed storyboards that earn school science fair accolades.
  sports: Liliana Suarez plays midfield for the elementary school’s soccer team, cycles the hills around Gurabo with the neighborhood bike club, cheers for the island’s national football squad and follows
    Bayamón FC, and balances competitive matches with weekend pick‑up games while always ending with a stretch despite occasional sore calves.
  arts: Liliana Suarez spends evenings sketching original comic heroes while listening to salsa legends like Celia Cruz and reggaetón hits from Bad Bunny, sings traditional local lullabies with family,
    draws inspiration from manga artist Akira Toriyama and Disney animator Hayao Miyazaki, weaving vibrant colors and rhythmic beats into their art.
  travel: Liliana Suarez loves exploring nearby Luquillo Beach to collect seashells, has visited the historic forts of Old San Juan, dreams of a future trip to the Space Center in Florida, and prefers family‑planned
    itineraries that blend structured museum tours with spontaneous sandcastle building sessions.
  culinary: Liliana Suarez helps their mother whisk together mofongo cupcakes flavored with garlic‑infused plantain and cinnamon, delights in mango sorbet for a fresh finish, crafts homemade pizza topped
    with pineapple and ham, and has earned a reputation for perfectly drizzling caramel sauce over brownies to share with friends.
  core: Liliana Suarez is a ten‑year‑old comic‑creating, soccer‑playing, salsa‑dancing dynamo who balances disciplined school projects with spontaneous bursts of creativity and a love for community festivals.
background:
  cultural: Liliana is a young Puerto Rican growing up in the Gurabo area of the Cataño municipality. She lives in a bilingual household where Spanish is spoken at home and English is emphasized at school,
    giving her a strong connection to both Caribbean and American cultures. Family gatherings, music (salsa, plena, reggaetón), and food like arroz con pollo and pastelillos shape her daily life. She participates
    in local fiestas, helps with community clean‑ups, and embraces the island’s values of hospitality, respect for elders, and close family ties. The tropical climate, nearby beaches, and the island’s rich
    history—including indigenous Taíno heritage—are woven into her sense of identity.
