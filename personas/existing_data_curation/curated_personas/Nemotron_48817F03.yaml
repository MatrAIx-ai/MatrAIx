  hobbies: '[''Home recipe experimentation'', ''Pick-up basketball'', ''Listening to jazz and hip-hop'', ''Attending live music events'', ''Herb gardening'', ''Food photography'', ''Community cooking workshops'']'
  career_goals: James aspires to advance from line cook to sous-chef within the next three years, aiming to master kitchen leadership and oversee menu creation for a modern American restaurant that celebrates
    African-American culinary heritage. He plans to complete a bachelor's degree in culinary arts or earn advanced certifications, such as Certified Chef de Cuisine, to broaden his technical expertise.
    In the long term, James dreams of opening a community-focused eatery or food truck in Indianapolis that blends traditional soul food with seasonal Midwestern ingredients, providing mentorship opportunities
    for young chefs from his neighborhood.
