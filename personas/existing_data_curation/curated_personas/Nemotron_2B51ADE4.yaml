  hobbies: '[''Gardening (heirloom vegetables)'', ''Woodworking (furniture restoration)'', ''Analog photography'', ''Local history research'', ''Reading historical biographies'', ''Playing chess'', ''Attending
    small art exhibits'', ''Volunteer docent work at the Lancaster Historical Society'', ''Listening to classical music'']'
  career_goals: Although retired, Patrick’s ambitions focus on legacy and continued personal growth. He aims to complete a series of handcrafted furniture pieces for his grandchildren, documenting each
    step in a scrapbook that blends photos and written reflections. He plans to compile a comprehensive family genealogy and donate the findings to the Lancaster Historical Society. Patrick also hopes to
    curate a small, themed art exhibition that showcases local artisans, leveraging his organizational skills and art appreciation. Learning advanced digital photography techniques is a current personal
    goal, as is maintaining his health through regular gardening and walking in the countryside. He aspires to mentor younger community members in woodworking and historical research, fostering intergenerational
    knowledge exchange.
