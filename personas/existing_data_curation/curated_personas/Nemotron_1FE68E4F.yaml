  hobbies: '[''Playing soccer'', ''Cooking Mexican dishes'', ''Creating TikTok/Instagram videos'', ''Playing video games'', ''Skateboarding'', ''Listening to music (regional Mexican, reggaeton, pop)'',
    ''Volunteering at community events'']'
  career_goals: Roberto aims to finish his high school education (or obtain his GED) and then enroll in a community college program that combines culinary arts with business management, so he can eventually
    help his family run a local taco stand or food truck. At the same time, he dreams of continuing to develop his soccer skills with the goal of earning a scholarship or playing for a semi‑professional
    team. He is also passionate about giving back to his community, so he hopes to become a bilingual youth mentor or community outreach coordinator, using his ability to connect with peers and his cultural
    background to support other Mexican‑American teens. In the longer term, he envisions owning a small business that blends his love for food, sports, and community service.
