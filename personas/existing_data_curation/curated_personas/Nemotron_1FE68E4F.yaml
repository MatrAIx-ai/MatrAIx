personas:
  professional: Roberto Ng is a high‑school sophomore who leverages a practical, structured approach to blend their love for soccer and cooking into a budding TikTok creator, crafting short, well‑edited
    videos that showcase quick Mexican recipes and soccer trick tutorials while assisting friends with occasional youth coaching at the park.
  sports: Roberto Ng thrives on weekend soccer matches with friends at the local park, idolizing LAFC’s forward Carlos Vela, spends afternoons perfecting skateboard flips at the neighborhood skatepark,
    and avidly supports the hometown high‑school basketball team, the Eagles, while also following the Los Angeles Lakers for off‑season entertainment.
  arts: Roberto Ng immerses themselves in regional Mexican music legends like Vicente Fernández, modern reggaeton hits from Bad Bunny, and contemporary pop anthems by Dua Lipa, often syncing these tracks
    to their TikTok cooking clips and collaborating on short dance challenges with classmates.
  travel: Roberto Ng favors spontaneous weekend road trips with family, dreaming of a coastal drive along the Pacific Coast Highway to Santa Barbara, having recently visited Oaxaca where the colorful markets
    and street‑food stalls inspired new taco recipes, and they plan to save for a future adventure to Tokyo’s Harajuku district to explore its vibrant street fashion.
  culinary: Roberto Ng delights in cooking traditional Mexican dishes like tacos al pastor, chilaquiles verdes, and homemade salsa verde, often adding a pinch of chipotle for heat, and they proudly showcase
    each step on TikTok while experimenting with fusion twists such as mango‑infused guacamole.
  core: Roberto Ng is an energetic 15‑year‑old who balances soccer, skateboarding, and cooking with a love for TikTok, showing a practical streak in video editing yet often forgetting school assignments
    and impulsively splurging on gaming gear.
background:
  cultural: Roberto is a second‑generation Mexican‑American raised in Wichita Falls, Texas. He grew up in a bilingual household where Spanish is spoken at home and English at school, giving him a strong
    command of both languages. Family traditions such as Día de los Muertos, quinceañera celebrations, and weekly Sunday meals featuring homemade tacos and salsa are central to his identity. He participates
    in local Mexican cultural festivals and often helps prepare food for community gatherings. While rooted in Mexican heritage, he also embraces the Southern Texas culture—enjoying country music, football
    games, and the close‑knit community atmosphere of Wichita County. His Catholic upbringing informs many of his values of kindness, cooperation, and respect for others.
attributes:
