personas:
  professional: Clara Trujillo, a bilingual front‑line retail associate renowned for spot‑on cash handling and calm conflict mediation, leverages their quick mental arithmetic and POS mastery to suggest
    practical store layouts while eyeing the shift‑supervisor role that will let them blend people‑focused leadership with the stability they crave.
  sports: Clara Trujillo enjoys leisurely weekend treks through the Trinity River Audubon Center, practices home yoga for flexibility, roots for the Houston Astros in baseball and the Houston Texans in
    football, and they occasionally join a local walking club that meets at the nearby park.
  arts: Clara Trujillo fills their sketchbook with intricate textile‑inspired patterns, loses themselves in mystery novels by Tana French, admires the lyrical storytelling of singer‑songwriter José González,
    and they delight in the evocative documentaries of Ken Burns, weaving these influences into quiet evenings at home.
  travel: Clara Trujillo prefers low‑key weekend getaways, having already explored Austin’s live‑music scene, the historic streets of San Antonio, and the rugged beauty of Big Bend National Park, while
    they dream of a future cultural immersion trip to a colonial‑era town in Central America and a serene coastal retreat in Portugal.
  culinary: Clara Trujillo, an enthusiastic home cook, experiments with slow‑cooked pepián and hand‑rolled tamales flavored with roasted chiles, plantains, and masa harina, inviting a tight circle of friends
    for tasting nights where they balance a love for bold spices with a modest, functional kitchen setup.
  core: Clara Trujillo is a detail‑oriented yet spontaneous 23‑year‑old who channels their bilingual retail savvy, culinary curiosity, and quiet artistic flair into a calm, community‑centric vision, all
    while wrestling with anxiety and occasional disorganization.
background:
  cultural: Clara was raised in a tight‑knit Guatemalan‑American family in Dallas. Her parents immigrated from Guatemala in the early 2000s, preserving many traditions such as celebrating Día de los Muertos,
    preparing tamales during holidays, and speaking Spanish at home. The household emphasized community, respect for elders, and a deep appreciation for folkloric music and the vibrant colors of Guatemalan
    textiles. Growing up in a bilingual environment, Clara navigated both her heritage and the broader Texan culture, giving her a unique cultural lens that informs her personal values, culinary interests,
    and her desire to create a welcoming space that reflects both her roots and her American upbringing.
attributes:
  skills: '[''Bilingual Spanish‑English'', ''Cash Handling'', ''POS System Operation'', ''Customer Service'', ''Conflict Resolution'', ''Quick Mental Math'', ''Product Knowledge Acquisition'', ''Observational
    Attention to Detail'']'
  hobbies: '[''Cooking Guatemalan Cuisine'', ''Sketching Textile Patterns'', ''Reading Mystery Novels'', ''Watching Documentaries'', ''Nature Walks'', ''Gentle Yoga'', ''Small‑Group Food Tasting Sessions'']'
  career_goals: Clara hopes to finish her GED within the next year and enroll in a community‑college program in business administration or culinary arts. In the short term, she seeks a promotion to shift
    supervisor, where she can develop leadership skills while still working in a familiar, people‑focused environment. Long‑term, she dreams of opening a small neighborhood café that blends traditional
    Guatemalan flavors with contemporary Texas comfort food, offering a relaxed space for friends and family. She values a career that balances creativity with stability, allowing her to stay close to her
    community without the high‑pressure deadlines that cause her stress.
