  career_goals: As he approaches retirement, Alexander aims to leverage his organizational talent into a supervisory or training role within the supply‑chain environment, where he can formalize his process‑improvement
    methods and serve as a mentor for younger staff. Concurrently, he aspires to deepen his involvement in the arts by volunteering as a docent at a local museum, curating a community exhibition of emerging
    Black artists, and possibly launching a modest online platform to sell his own photographic prints. He also hopes to complete a certificate in museum studies through a community college program.
