  career_goals: As she grows older, Claire envisions a career that blends her love for creativity, structure, and helping others. She dreams of becoming a museum curator or an exhibit designer, where she
    can combine art appreciation with meticulous planning to create engaging experiences for visitors. She also considers a future as an elementary school teacher, especially in STEM subjects, to inspire
    curiosity in younger students while applying her organized teaching style. In the longer term, she hopes to pursue a degree in interdisciplinary design or environmental science, aiming to develop sustainable
    community projects that integrate artistic elements with practical solutions. Her ambition is to excel academically, earn scholarships, and eventually hold a position that allows her to influence both
    cultural and educational spaces.
