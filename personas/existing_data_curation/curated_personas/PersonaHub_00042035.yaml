persona_description: A programmer who worked on computer systems and software in the 1960s and 1970s, and is likely to have created programs that used two-digit dates for convenience. He is also likely
  to be knowledgeable about the Year 2000 problem and its impact on computer systems and software. He may have contributed to the development of programs that could not distinguish between the year 2000
  and the year 1900, and may have argued that the problem was not as big a problem as some had suggested. He may have been a member of a special committee set up by a government to monitor remedial work
  and contingency planning for the Year 2000 problem.
