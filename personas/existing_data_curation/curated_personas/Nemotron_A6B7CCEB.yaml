  career_goals: Diego aims to transition from supervising a single property to a facilities‑management role overseeing multiple hotels or mixed‑use buildings in New York City. He plans to obtain the Certified
    Professional in Cleaning Management (CPCM) credential and pursue advanced coursework in building systems and sustainability. In the longer term, he hopes to launch his own boutique cleaning company
    that specializes in eco‑friendly services for boutique hotels and cultural venues. A key personal ambition is to secure a schedule that reduces chronic stress, allowing him to better support his aging
    parents in Guatemala and build a stable financial foundation for future family goals.
