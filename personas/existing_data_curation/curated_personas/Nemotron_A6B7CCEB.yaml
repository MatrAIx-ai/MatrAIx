personas:
  professional: An experienced housekeeping supervisor with eight years of frontline leadership at a busy Brooklyn hotel, Diego Lopez leverages meticulous scheduling, eco‑friendly cleaning innovations,
    and a curiosity for interior aesthetics to drive operational excellence while pursuing CPCM certification and planning a future transition to multi‑property facilities management.
  sports: Diego Lopez enjoys low‑impact fitness, lacing up for sunrise jogs along the Brooklyn Promenade and participating in a local running club, while cheering for the Brooklyn Nets and New York Knicks
    on game nights and occasionally joining pick‑up basketball at a community center.
  arts: Diego Lopez is a devoted explorer of Brooklyn’s street‑art scene, sketching murals by artists like Banksy, Shepard Fairey, and Os Gemeos in a pocket notebook, devouring art‑history tomes and design
    podcasts, and volunteering at community workshops that celebrate public art and creative expression.
  travel: Diego Lopez prefers short, culturally immersive trips, having roamed the vibrant murals of Berlin’s Kreuzberg, savored the culinary markets of Oaxaca, and frequently escapes to the Hudson Valley
    for weekend hikes, all while balancing a modest travel budget and the desire to someday visit family abroad.
  culinary: Diego Lopez cooks with a blend of tradition and experimentation, mastering dishes such as pepian, tamales, and atol de maíz using fresh chilies, corn masa, and aromatic herbs, sharing hearty
    meals with friends while occasionally over‑seasoning or letting the kitchen become a bit of a mess during enthusiastic weekend sessions.
  core: Diego Lopez channels a methodical, art‑driven mind into a career of sustainable cleaning, balances meticulous budgeting with occasional impulsive art splurges, combats chronic stress through meditation
    and jogging, and finds solace in cooking and sketching street murals.
background:
  cultural: Diego is a first‑generation Guatemalan American. His parents emigrated from Guatemala in the mid‑1990s and settled in the Sunset Park neighborhood of Brooklyn, where a strong Latino community
    provided a cultural anchor. He grew up bilingual, speaking Spanish at home and English at school, and maintains close ties with his extended family in Guatemala, regularly sending remittances and visiting
    during holidays. Diego observes traditional celebrations such as Día de los Muertos, Semana Santa, and Guatemalan Independence Day, where he prepares family recipes and participates in community parades.
    His cultural identity blends Catholic traditions with elements of indigenous Maya heritage, reflecting a respect for collective family values, community solidarity, and a deep appreciation for music
    and dance.
