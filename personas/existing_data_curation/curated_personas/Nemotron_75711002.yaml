  hobbies: '[''Woodworking'', ''Fishing'', ''Reading (Science‑Fiction & Non‑Fiction)'', ''Home Cooking (New England cuisine)'', ''Board‑Game Nights'', ''Volunteer Community Clean‑ups'']'
  career_goals: Looking to leverage his hands‑on management experience into a senior leadership role, Nicholas aims to become a regional operations director within the next five years. He is motivated to
    earn formal credentials such as a Certified Manager (CM) or Six Sigma Yellow Belt to supplement his high‑school education. In the longer term, he dreams of launching his own consultancy that helps small
    New England businesses adopt practical process‑optimization strategies. He also hopes to mentor younger employees, fostering a collaborative workplace that respects individuality while delivering measurable
    performance improvements.
