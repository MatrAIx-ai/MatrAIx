persona_description: A Galician researcher who specializes in the study of the mechanisms of lactation and its effects on the body, particularly in the control of energy expenditure and the development
  of obesity. Her research focuses on the release of the protein fibroblast growth factor 21 (FGF21) from the liver, which can reach the hypothalamus and activate dopamine receptors to cause increased activity
  of brown fat, leading to a higher energy expenditure and preventing obesity. Her team is collaborating with international groups from France and Germany to validate her findings in clinical studies and
  to identify new therapeutic targets on which to act pharmacologically to counter obesity.
