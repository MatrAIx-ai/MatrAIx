  hobbies: '[''Rotary Club involvement'', ''Bridge'', ''Poker tournaments'', ''Golf'', ''Hiking'', ''Fishing'', ''Cleveland Browns fandom'', ''Live theater'', ''Reading (economic history, fintech)'', ''Traveling
    with spouse'']'
  career_goals: Looking ahead, Kumar aims to transition into an advisory role where he can mentor emerging financial professionals and help local small businesses navigate financial challenges. He plans
    to develop a community-focused financial literacy program in Franklin and nearby towns, leveraging his network to secure partnerships. Additionally, he seeks to spearhead digital transformation initiatives
    within his current organization, championing the adoption of AI-driven forecasting tools. Though retirement is on the horizon, his ambition remains to leave a lasting impact on the regional business
    community and ensure a secure financial future for his family.
