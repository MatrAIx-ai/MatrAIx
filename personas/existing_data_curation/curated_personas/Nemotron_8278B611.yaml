  career_goals: Beatriz aims to advance to a foreperson or supervisory role within her current painting company and obtain certification as a licensed contractor in Florida. She plans to deepen her expertise
    in historic home restoration, a niche market in Jacksonville's older neighborhoods, and eventually launch her own small painting and paper‑hanging business focused on high‑quality, reliable service.
    Her long‑term ambition includes mentoring apprentices—especially women—and achieving a stable, predictable income that supports her independent lifestyle.
