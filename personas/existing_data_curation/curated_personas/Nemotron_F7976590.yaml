personas:
  professional: Amalia Erazo is a budding marine explorer who spends afternoons collecting shells, documenting tide patterns, and applying a practical, organized curiosity to early scientific play, balancing
    imagination with methodical note‑taking, and they love sharing their findings with neighborhood friends.
  sports: Amalia Erazo plays forward on the local youth soccer club, idolizes the dynamic style of FC Barcelona's Lionel Messi, and balances competitive drills with playful beach games that keep them energetic
    year‑round, and they relish the thrill of scoring a goal.
  arts: Amalia Erazo expresses creativity by drawing vibrant ocean scenes inspired by Eric Carle and by dancing salsa and reggaeton to the rhythms of Marc Anthony and Bad Bunny during family gatherings
    and community festivals, and they often immerse themselves in music while sketching.
  travel: Amalia Erazo enjoys family trips to nearby seaside towns like Coral Bay, dreaming of future adventures to the Great Barrier Reef and the Galápagos Islands, favoring hands‑on beach explorations
    over long flights, and they keep a scrapbook of sand‑filled bottles as mementos.
  culinary: Amalia Erazo loves helping bake chocolate chip cookies, savoring sweet coconut rice pudding and fish tacos, and often requests the bright mango‑lime smoothie that pairs perfectly with their
    beach picnics, and they proudly serve their creations to family members.
  core: Amalia Erazo is a curious, competitive six‑year‑old who hoards shells in meticulously labeled jars, balances a love for structured play with spontaneous dance, and occasionally forgets to brush
    their teeth after a day at the beach, and they are known for their relentless curiosity.
background:
  cultural: Amalia comes from a Puerto Rican family rooted in the coastal towns of Toa Baja and Toa Alta. Her daily life is shaped by bilingual Spanish-English communication, a strong sense of family and
    community, and participation in local traditions such as the patron saint festival, bomba and plena music, and culinary customs like cooking arroz con gandules with her relatives. The island’s natural
    environment—its beaches, mangroves, and marine wildlife—instills in her a deep appreciation for nature, which influences her interests, values, and future aspirations.
