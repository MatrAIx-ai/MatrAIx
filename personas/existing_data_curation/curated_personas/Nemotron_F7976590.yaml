  hobbies: '[''Collecting shells at the beach'', ''Drawing ocean scenes'', ''Building Lego models'', ''Playing soccer'', ''Dancing to salsa and reggaeton'', ''Reading picture books about marine life'',
    ''Helping in the kitchen'']'
  career_goals: Amalia dreams of becoming a marine biologist who can explore the waters off Toa Baja and protect sea turtles, and she also envisions herself as a teacher who can share her love of science
    with other children. She aims to excel in school, win a science fair, and one day earn a scholarship to study marine science. Her practical side hopes she can combine her scientific curiosity with a
    stable career that helps her community, while her competitive nature fuels her ambition to achieve recognition for her projects.
