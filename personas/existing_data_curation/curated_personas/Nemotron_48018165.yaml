  hobbies: '["Listening to R&B, soul, and jazz music","Reading contemporary fiction and biographies of Black authors and leaders","Volunteering at local community center after‑school programs","Sketching
    and watercolor painting of waterfront scenes","Exploring local beaches and nature trails","Experimenting with cooking and baking traditional soul‑food recipes","Playing online video games with friends","Attending
    cultural festivals and community events","Journaling for personal reflection"]'
  career_goals: Laura aims to complete her associate's degree in communications or public relations while maintaining a flexible schedule that accommodates her creative pursuits. She plans to secure an
    internship with a local non‑profit or cultural organization in Hampton, such as the Hampton Roads Community Action or the Hampton Jazz Festival team, to gain hands‑on experience in community outreach
    and event promotion. Long‑term, she aspires to become a community outreach coordinator or marketing associate for an organization that supports youth development and celebrates African‑American heritage.
    Laura also envisions launching a freelance social‑media consulting service for small Black‑owned businesses in her area, allowing her to blend her entrepreneurial spirit with her desire to uplift her
    community.
