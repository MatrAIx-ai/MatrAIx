personas:
  professional: Leslie Monge is a budding young coder who creates simple games on Scratch, blending a fierce curiosity for new ideas with a practical step‑by‑step workflow, and channels their competitive
    streak into polishing each project while keeping a tidy digital notebook that balances organization with creative flexibility.
  sports: Leslie Monge plays forward for the Coastal Riptide Youth Soccer Club, showing a competitive drive that pushes them to practice penalty kicks after school, while also joining community beach‑cleanup
    runs that keep them fit and attuned to the ocean environment they love.
  arts: Leslie Monge shines in community theater productions of classic tales like "The Little Mermaid," sketches detailed marine animals inspired by Jacques Cousteau, and draws inspiration from musicians
    such as Olivia Rodrigo and artists like Beatrix Potter, weaving these influences into a vibrant creative identity.
  travel: Leslie Monge has explored tide pools at Point Reyes, visited the Monterey Bay Aquarium, and dreams of snorkeling the Great Barrier Reef, preferring hands‑on nature trips over theme parks and often
    planning these adventures with a detailed notebook that balances school schedule constraints.
  culinary: Leslie Monge loves cooking simple seafood dishes like shrimp tacos with lime crema and banana‑almond smoothies, enjoys the buttery flavor of fish and chips with malt vinegar, and frequently
    experiments with drawing edible marine creatures on plates, though they sometimes forget to clean up the kitchen after a cooking session.
  core: Leslie Monge, a bright 10‑year‑old with a vivid imagination, fierce curiosity, and occasional anxiety spikes, channels competitive energy into coding, soccer, and sketching, while managing a pocket‑sized
    allowance and a love for tide‑pool adventures.
background:
  cultural: Leslie was raised in a suburban neighborhood of Escondido, California, a region that blends a relaxed coastal lifestyle with a diverse Southern‑California atmosphere. Her family’s roots trace
    back to the Midwestern United States, and they value community involvement, education, and outdoor recreation. Growing up, Leslie attends a public elementary school that celebrates multicultural events,
    exposing her to Hispanic, Asian, and indigenous cultural influences common in San Diego County. She participates in local traditions such as the Escondido Street Fair, summer community pool activities,
    and school‑led environmental stewardship programs, all of which shape her appreciation for both her own heritage and the broader cultural mosaic of her community.
