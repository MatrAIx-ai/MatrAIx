  career_goals: Leslie dreams of becoming a marine biologist, inspired by her fascination with tide pools and the Pacific coastline. She also imagines designing environmentally friendly robots, merging
    her practical mindset with her curiosity about technology. She hopes to work on real‑world problem‑solving teams where she can combine her organizational strengths, competitive spirit, and love for
    learning. In the long term, she sees herself leading projects that protect ecosystems while innovating sustainable solutions.
