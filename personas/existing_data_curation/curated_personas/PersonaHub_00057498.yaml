persona_description: 'A multidisciplinary artist who has made significant contributions to the field of sculpture, photography, installations, public interventions, and new media. She is recognized for
  her curiosity about the origins of electricity and waste, and her work has been exhibited in museums and galleries across the globe. She is a graduate of the University of California, Berkeley, and was
  recognized by the College of Environmental Design as a Distinguished Alumna in 2006. Her work is marked by deep-seeded social and ecological concerns, and she has collected more than 400 audio recordings
  of songs in dormant languages from various archives, anthropologists, and linguists. She is currently working on a project called "Language Legacies: Landscapes of Consciousness" that incorporates the
  recordings of these languages into sound towers as part of innovative and culturally significant, geometric configured art installations.'
