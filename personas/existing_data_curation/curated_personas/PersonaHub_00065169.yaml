persona_description: A cryptographer who specializes in the implementation and analysis of public-key cryptography, particularly the Alleged RC4 cipher. They have extensive knowledge of the encryption algorithms
  and their security properties, and are skilled in setting up and using the RC4_KEY structures to encrypt and decrypt data. They are aware of the limitations and potential vulnerabilities of stream ciphers
  and prioritize the use of higher-level functions for encryption. They are knowledgeable about the security implications of using public-key cryptography in various applications and are likely to use the
  RC4 functions for secure encryption and decryption in those contexts.
