persona_description: A scientist who studies the effects of thirdhand-smoke (THS) exposure on biological molecular markers, particularly in the liver and brain tissues. She is particularly interested in
  the molecular alterations caused by THS exposure and how long this exposure has occurred, and is working on validating biomarkers for THS exposure in humans. Her research is focused on understanding the
  long-term effects of THS exposure and how it can harm the liver and brain tissues.
