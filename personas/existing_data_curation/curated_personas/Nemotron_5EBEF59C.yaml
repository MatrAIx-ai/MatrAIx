personas:
  professional: Cheryl Roberts, a veteran community arts coordinator in Chattanooga, blends decades of workshop design, fundraising, and intergenerational storytelling into vibrant senior art studios that
    reflect their curious, organized‑yet‑flexible approach and sociable, collaborative spirit.
  sports: Cheryl Roberts enjoys leisurely walks along the Tennessee River Trail with the senior walking club, participates in gentle yoga sessions at the local community center, proudly roots for the Chattanooga
    Lookouts baseball team in spring and the Chattanooga FC soccer club during summer, and treats every sunrise hike as a low‑impact cardio workout essential for their arthritis‑friendly fitness routine.
  arts: Cheryl Roberts channels their love for watercolor into vibrant landscapes inspired by Georgia O'Keeffe and Vincent van Gogh, frequents gallery openings featuring local folk artists such as Howard
    Finster, delights in the acoustic folk sounds of The Avett Brothers and Emmylou Harris at community concerts, and often references classic films starring Meryl Streep in their book club discussions.
  travel: Cheryl Roberts and their husband meticulously plan pilgrimages to historic charm, having already explored Asheville’s River Arts District, Savannah’s antebellum squares, and New Orleans’ French
    Quarter, while they eagerly anticipate the upcoming Santa Fe Indian Market, the Taos Pueblo art fair, and a leisurely road trip through the historic towns of the Blue Ridge Parkway.
  culinary: Cheryl Roberts, an adept home cook, frequently whips up Southern classics such as shrimp étouffée with fresh garden tomatoes, buttery buttermilk biscuits, and peach cobbler spiced with cinnamon
    and nutmeg, while they savor occasional meals at local farm‑to‑table bistros featuring heirloom corn and locally sourced trout.
  core: Cheryl Roberts embodies a curious, community‑focused spirit who balances meticulous garden‑to‑canvas projects with a habit of collecting too many watercolor sets, often leaving their living room
    a colorful clutter of brushes, tubes, and half‑finished canvases.
background:
  cultural: Cheryl grew up in a middle‑class white family in the American South, absorbing the region's traditions of hospitality, community storytelling, and an appreciation for folk crafts. Relocating
    to Chattanooga in her early adulthood, she embraced the city's vibrant art scene and Appalachian cultural heritage, which is reflected in her love for local music, crafts, and historic preservation.
    Her cultural identity blends Southern values of generosity and community involvement with a lifelong curiosity for diverse artistic expressions, shaping her inclusive approach to mentorship and community
    engagement.
