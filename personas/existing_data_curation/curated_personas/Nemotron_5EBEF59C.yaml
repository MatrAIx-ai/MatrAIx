  career_goals: In the next few years, Cheryl aims to deepen her involvement in the Chattanooga arts scene by establishing a collaborative senior-art studio that offers free workshops and exhibitions. She
    plans to pursue a certificate in museum studies through a local community college to enhance her curatorial skills. Additionally, she aspires to document oral histories of long‑time Chattanooga residents,
    creating a small publication that celebrates community memory. Cheryl also hopes to mentor younger volunteers, fostering leadership in community service, and to travel to at least three regional art
    festivals to broaden her artistic perspective.
