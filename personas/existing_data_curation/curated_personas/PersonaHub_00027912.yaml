persona_description: A historian or a theologian who specializes in the study of the doctrine of predestination in late Tudor and early Stuart England. Their interest lies in understanding how the doctrine
  was understood and communicated by churchmen during this period, and how it was able to mix with other ideas. They are likely to be familiar with the history of Christianity and the development of theological
  ideas, and have a keen interest in the impact of predestination on society and individual belief.
