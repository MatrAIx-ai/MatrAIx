  career_goals: Alexander enjoys imagining himself in roles that combine helping others with practical, hands‑on tasks. He frequently says he wants to become a firefighter because he loves the bright red
    trucks that patrol Benton Harbor and wants to keep people safe. He also expresses fascination with animals and sometimes mentions being a veterinarian, showing his desire to care for living things.
    These early ambitions are rooted in his kind, cooperative nature and his drive to bring comfort and safety to his community.
