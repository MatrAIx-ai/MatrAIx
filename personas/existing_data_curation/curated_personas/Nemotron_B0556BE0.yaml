  career_goals: Laquala aims to ascend to a senior economist role within Philadelphia's municipal government or a leading regional think tank, where she can shape policies that address economic inequities
    in Black and low‑income neighborhoods. She plans to pursue a bachelor's degree in economics (and potentially a master's) to formalize her credentials, while leveraging her extensive work experience
    to gain recognition as an authority in urban development. Her competitive drive fuels a desire to lead a research team, publish influential policy papers, and present at national conferences. Long‑term,
    she envisions mentoring emerging women of color in economics and serving as a chief advisor on economic justice initiatives for a nonprofit focused on community revitalization.
