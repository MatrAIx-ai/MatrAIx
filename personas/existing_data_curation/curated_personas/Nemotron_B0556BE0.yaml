personas:
  professional: Laquala Poitier blends rigorous econometric expertise with a methodical, data‑driven approach to public policy, turning complex labor‑market and housing models built in Stata, R, and Python
    into concise briefings for city officials while they lead multidisciplinary research teams with a competitive eye for influence.
  sports: Laquala Poitier adheres to low‑impact fitness routines—daily gentle yoga, weekend walks through Philadelphia’s historic neighborhoods, and occasional pick‑up basketball at the community center—while
    they cheer for the Philadelphia Eagles and keep track of the Philadelphia 76ers season, never missing the Sunday afternoon broadcasts.
  arts: Laquala Poitier infuses evenings with the improvisational charm of Thelonious Monk and Miles Davis on the piano, immerses themselves in Toni Morrison and James Baldwin novels, and captures spontaneous
    street scenes for a personal photography blog, while they attend occasional performances by the Philadelphia Orchestra to stay connected to the city’s cultural pulse.
  travel: Laquala Poitier plans meticulously organized weekend getaways to historically rich towns such as Charleston, Savannah, and Gettysburg, favoring small‑group tours that balance museum visits with
    quiet coffee‑shop afternoons, while they dream of an extended research trip to Paris’s Latin Quarter to explore archival economic records.
  culinary: Laquala Poitier enjoys cooking soul‑food inspired meals with a health‑conscious spin—quinoa jambalaya, oven‑roasted sweet potatoes seasoned with smoked paprika, and sautéed collard greens with
    garlic—while they experiment with fresh kale, turmeric, and avocado in smoothies to keep nutrition at the forefront.
  core: Laquala Poitier is a data‑driven economist whose love of quiet intellectual pursuits, meticulous budgeting, and soulful cooking is tempered by persistent worry and a competitive streak that drives
    them to constantly measure and improve every facet of their life.
background:
  cultural: Laquala was raised in West Philadelphia within a close‑knit African American community where church, family gatherings, and neighborhood solidarity were central. Her upbringing blended the soulful
    rhythms of gospel and jazz with a strong emphasis on perseverance amid socioeconomic challenges. The Poitier surname hints at possible Caribbean ancestry, which adds a layer of cultural pride and an
    appreciation for diaspora narratives. These roots shape her perspective on economic policy, driving a commitment to address racial wealth gaps and champion initiatives that uplift her community. Her
    cultural identity informs her culinary tastes, musical interests, and dedication to mentorship of younger Black professionals.
