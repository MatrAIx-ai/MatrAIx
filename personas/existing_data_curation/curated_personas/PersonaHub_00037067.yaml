persona_description: A neuroscientist who specializes in the study of the human brain, particularly the mechanisms of memory formation and the role of the enzyme protein kinase C in memory storage. Her
  research interests include, but are not limited to, the study of long-term memory, the effects of environmental and emotional stimuli on memory, and the development of novel therapies for memory disorders.
  She is particularly interested in understanding the neural underpinnings of memory formation and the role of protein kinase C in memory storage.
