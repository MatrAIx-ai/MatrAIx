personas:
  professional: Tania Barrero, a budding preschool architect, constructs elaborate block towers, testing their stability with a curious eye while respecting the teacher's step‑by‑step guidance, and they
    assertively reorganize play spaces when needed, yet remain relaxed about tidying up afterward.
  sports: Tania Barrero joins the Sunflower Kids Tee‑Ball Club, loves sprinting across the playground, and cheers for the Chicago Cubs, sometimes forgetting her glove but preferring spontaneous tag games
    over rigid practice schedules.
  arts: Tania Barrero delights in drawing dinosaurs with Crayola crayons, giggles to The Wiggles' "Fruit Salad" and "Hot Potato," and watches animated Dr. Seuss adaptations, letting these creative sparks
    shape her imaginative play.
  travel: Tania Barrero enjoys short family road trips to the local zoo, treasured the recent Disney World adventure with its magical rides, and dreams of feeling the sand on Cancun’s beaches, though she
    often feels overwhelmed on long flights.
  culinary: Tania Barrero savors cheesy macaroni, chicken nuggets dipped in honey mustard, and sweet strawberry slices, proudly helps stir batter with a wooden spoon, yet frequently leaves a floury trail
    across the kitchen floor.
  core: Tania Barrero is a curious yet laid‑back four‑year‑old who balances imaginative block building with spontaneous play, occasional forgetfulness, and a love for crayons, tiny adventures, and bright
    snacks.
background:
  cultural: Tania was born in the United States to Guatemalan parents who maintain strong ties to their heritage. At home, Spanish is spoken alongside English, and she is exposed to Guatemalan customs,
    such as celebrating Día de los Niños, preparing traditional foods like tamales and pupusas, and participating in family gatherings that feature marimba music and Mayan‑inspired crafts. Her family observes
    Catholic traditions, attending church on Sundays and observing holidays like Semana Santa. Living in Hollywood, Florida, she also experiences a multicultural community, attends a bilingual preschool
    that incorporates both U.S. curriculum and lessons about Guatemalan geography, folklore, and celebrations like the Festival del Rocío. These influences shape her worldview, providing a blend of Central
    American cultural identity and American suburban life.
attributes:
  skills: '["basic literacy (recognizing letters and simple words)", "basic numeracy (counting to ten)", "bilingual communication (English and Spanish)", "fine‑motor skills (cutting, drawing, puzzle assembly)",
