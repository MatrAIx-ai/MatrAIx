  hobbies: '["building block play", "drawing and coloring", "listening to and singing songs (English and Spanish)", "exploring nature in the backyard", "small group playdates", "helping in simple cooking
    tasks"]'
  career_goals: Although still very young, Tania often talks about wanting to be a teacher who helps children learn, or a veterinarian who cares for animals. She is drawn to roles where she can combine
    her love of learning with practical help for others. Her short‑term ambition is to master reading simple storybooks in both languages and to learn to care for the family’s pet rabbit responsibly.
