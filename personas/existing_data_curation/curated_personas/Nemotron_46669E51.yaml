personas:
  professional: Carla Montgomery, a veteran laboratory technician proficient in microscopy, PCR, GIS, and statistical analysis, channels her curious, organized yet adaptable nature into leading interdisciplinary
    STEAM research projects, mentoring junior staff, and crafting science‑art exhibits that bridge community outreach and rigorous scientific inquiry.
  sports: Carla Montgomery embraces outdoor fitness, hiking the Nebraska sandhills weekly, running with the Omaha Trail Runners Club for Friday night 5Ks, cross‑country skiing at Pine Ridge in winter, and
    passionately supports the Nebraska Cornhuskers football team and the Kansas City Royals baseball club.
  arts: Carla Montgomery expresses her artistic side through watercolor landscapes inspired by Georgia O'Keeffe, frequents the Joslyn Art Museum to study modernist works by Mark Rothko, performs in a community
    theater troupe tackling plays like 'Our Town', and finds inspiration in the music of Joni Mitchell and the poetry of Maya Angelou.
  travel: Carla Montgomery favors meticulously planned road trips using GIS mapping, often exploring Midwest gems like Badlands National Park and Great Sand Dunes, while also indulging in annual overseas
    cultural tours to Florence and Kyoto, balancing adventure with family commitments and a modest travel budget.
  culinary: Carla Montgomery, an intermediate home chef, delights in crafting dishes such as grilled Nebraska steak with herb chimichurri, quinoa‑stuffed peppers with smoked paprika, and fermented kimchi,
    sourcing ingredients from local farmer's markets, yet occasionally over‑salts in excitement, and they love sharing meals at community gatherings.
  core: Carla Montgomery merges scientific rigor with artistic curiosity, nurturing community through interdisciplinary projects while balancing meticulous planning with spontaneous creativity.
background:
  cultural: Carla grew up in a small town in the American Midwest, raised in a family with deep Midwestern roots tracing back to German and Irish immigrants. The values of community involvement, practicality,
    and a strong work ethic were central to her upbringing. Frequent trips to Omaha's cultural institutions and county fairs exposed her early to both the arts and science, fostering a lifelong curiosity.
    Her white Midwestern heritage blends with a progressive outlook that embraces diversity and interdisciplinary collaboration. Carla's marriage and long-term residence in Bennington, Nebraska, keep her
    connected to local traditions while her professional and artistic pursuits reflect a broader, globally-aware perspective.
attributes:
  skills: '[''Laboratory techniques (microscopy, spectrophotometry, PCR)'', ''Specimen collection and preservation'', ''Statistical analysis using R and SPSS'', ''GIS mapping for environmental studies'',
    ''Research documentation and SOP development'', ''Laboratory safety compliance'', ''Inventory and quality-control management'', ''Interdisciplinary project coordination'', ''Science communication and
    public presentation'', ''Curatorial planning for science-art exhibits'', ''Digital archiving of research data and artifacts'', ''Grant-writing assistance and proposal development'', ''Community outreach
    and STEAM program facilitation'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading contemporary fiction, poetry, and cultural non-fiction'', ''Community theater acting'', ''Volunteering for science-outreach
    programs'', ''Hiking and nature walks'', ''Birdwatching'', ''Gardening'', ''Experimenting with new cooking recipes'', ''Participating in local book clubs'']'
  career_goals: Carla aims to advance to a senior research coordinator role where she can lead large-scale interdisciplinary projects that blend scientific inquiry with artistic expression. She envisions
    establishing a regional STEAM outreach program that partners local schools, museums, and community groups, providing hands-on workshops and public exhibitions. In the longer term, she hopes to become
    the director of a science museum or cultural center, shaping its educational strategy and curating exhibitions that reflect both her technical expertise and her passion for the arts. Additionally, Carla
    is committed to mentoring emerging technicians and securing grant funding to sustain collaborative research initiatives.
