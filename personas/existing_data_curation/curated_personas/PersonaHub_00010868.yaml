persona_description: A trauma therapist who is a BIPOC, LGBTQIA+ person with disabilities, and has experienced trauma. They have a deep understanding of the impact of systemic oppression on trauma survivors
  and have a passion for integrating social justice frameworks into trauma processing. They are interested in building access to joy, community, and centeredness in a traumatic world through communal practices
  such as singing, dancing, and call-and-response. They are inspired by the wisdom of marginalized communities and have a unique perspective on how to respond to trauma in a way that serves the individual
  and their communities.
