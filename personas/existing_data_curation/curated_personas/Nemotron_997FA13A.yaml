personas:
  professional: A marketing analyst in training, Raphaela Quigley blends a solid grounding in data analysis with a flair for social media storytelling, leveraging tools like Tableau, Trello, and Canva to
    craft data-driven campaigns while balancing curiosity with practical execution; they thrive on turning raw numbers into compelling narratives.
  sports: An outdoor enthusiast, Raphaela Quigley spends weekends hiking the Boise Foothills and mountain biking with the Boise Bike Club, practices yoga at a downtown studio three times a week, and roots
    for the Boise State Broncos and the Idaho Steelheads during football and hockey seasons; they balance high-energy activities with calm support for local teams.
  arts: A creative soul, Raphaela Quigley captures Idaho's sunrise vistas with their DSLR, immerses themselves in indie concerts featuring Phoebe Bridgers and Sufjan Stevens, and unwinds with board games
    like Catan while devouring sci-fi classics by Ursula K. Le Guin.
  travel: A wanderlust-driven explorer, Raphaela Quigley plans trips around spring break, having trekked through Yellowstone and Crater Lake, while dreaming of Iceland's auroras and Kyoto's temples, favoring
    a mix of backpacker hostels and eco-friendly lodges; they balance adventure with mindful budgeting.
  culinary: A budding home chef, Raphaela Quigley experiments with seasonal Idaho produce, whipping up mushroom risotto, roasted beet and goat-cheese salad, and herb-marinated trout, while perfecting a
    tangy sourdough starter discovered at a local farmers market; they love pairing dishes with a splash of locally roasted coffee.
  core: Spirited yet meticulous, Raphaela Quigley channels their curiosity into data-driven marketing projects, balances a love for mountain trails with a habit of hoarding coffee coupons, and occasionally
    procrastinates on paperwork until midnight.
