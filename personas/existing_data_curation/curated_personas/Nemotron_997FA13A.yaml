  career_goals: Raphaela aims to leverage her business education and digital skills into a role as a marketing analyst or brand strategist within a forward‑thinking company in Boise. She plans to enroll
    in a bachelor's program in Marketing or Business Administration to deepen her strategic knowledge while pursuing certifications such as Google Analytics and HubSpot Inbound Marketing. In the medium
