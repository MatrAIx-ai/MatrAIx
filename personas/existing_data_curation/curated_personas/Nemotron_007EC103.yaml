personas:
  professional: Joshua Sharko, a seasoned commercial driver with a CDL, excels at meticulous route optimization, strict DOT compliance, and on‑the‑spot vehicle maintenance, while they calm, structured demeanor
    turns each delivery into a customer‑service opportunity and fuels their ambition to become a fleet coordinator and eventually launch a community‑focused independent trucking business.
  sports: Joshua Sharko roots for the Los Angeles Lakers in basketball, the San Francisco 49ers in football, and participates in the Walnut Grove Fishing Club, balancing seasonal gym workouts with low‑impact
    activities like weekend reservoir fishing and occasional trail hikes to keep their back healthy.
  arts: Joshua Sharko immerses themselves in classic rock, blasting Led Zeppelin, The Rolling Stones, and AC/DC on long hauls, frequents the local community theater for productions such as 'Our Town', admires
    Norman Rockwell prints, and treats the restoration of their 1970s Chevrolet pickup as a hands‑on canvas of personal expression.
  travel: Joshua Sharko meticulously plans road‑trip itineraries in their truck, favoring scenic drives to Lake Tahoe, Yellowstone, and the Grand Canyon, while dreaming of conquering Alaska’s Dalton Highway,
    all balanced against the budgeting goals for a future Walnut Grove home.
  culinary: Joshua Sharko’s culinary routine centers on grilling smoked brisket, simmering beef chili seasoned with cumin and smoked paprika, and pan‑searing catfish with lemon‑butter sauce, complemented
    by a morning cold‑brew coffee, reflecting a moderate cooking skill set that blends comfort‑food cravings with occasional fast‑food taco indulgences.
  core: Joshua Sharko lives by a steady rhythm of long‑haul routes, classic‑rock playlists, and weekend fishing, balancing meticulous planning with a calm, predictable outlook while occasionally splurging
    on vintage auto parts.
background:
  cultural: Joshua grew up in a small, predominantly white Midwestern community in Greene County, Missouri. His family has deep roots in the region’s agricultural and working‑class traditions, emphasizing
    hard work, self‑reliance, and community support. Raised in a Protestant household, he internalized values of humility, cooperation, and service to others. The close‑knit nature of Walnut Grove shaped
    his preference for modest social circles, and the practical, no‑frills lifestyle of the area reinforced his focus on structure, reliability, and pragmatic problem‑solving.
attributes:
  skills: '[''Commercial Truck Driving (CDL)'', ''Route Optimization'', ''Vehicle Maintenance & Basic Repairs'', ''DOT Safety & Compliance'', ''Time Management & Log Keeping'', ''Customer Service & Relationship
    Building'', ''Sales Negotiation'', ''Inventory Tracking'', ''Fleet Management Software'', ''Hazardous Materials (HAZMAT) Certification (in progress)'']'
  hobbies: '[''Fishing'', ''Classic Car Restoration'', ''Listening to Classic Rock'', ''Reading Logistics & Business Non-fiction'', ''Volunteering at Local Food Bank'', ''Church Small-Group Fellowship'',
    ''Strategy Board Games'', ''Driving Simulation Video Games'']'
  career_goals: Joshua aims to advance into a supervisory role within his company, such as fleet coordinator or safety trainer, within the next three years. He plans to complete his Hazmat endorsement and
    obtain additional logistics certifications to qualify for higher‑value freight contracts. Long‑term, he aspires to launch a small independent trucking business that emphasizes reliable, community‑focused
    service. Financially, he seeks to purchase a home in Walnut Grove and build a stable retirement fund while maintaining the predictable work‑life balance he values.
