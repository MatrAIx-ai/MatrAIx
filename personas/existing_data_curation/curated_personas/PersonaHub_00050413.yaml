persona_description: A rheumatologist who specializes in the diagnosis and management of gout, particularly in clinical practice. They are aware of the limitations of the current 1977 American Rheumatism
  Association classification criteria and are actively seeking improved criteria for epidemiology and clinical research. They are also familiar with the use of ultrasound in the diagnosis of gout and are
  interested in the emerging role of serum uric acid in the management of the condition.
