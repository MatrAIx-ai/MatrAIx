personas:
  professional: Leda Mckinnon is an aspiring young engineer who channels their love for building functional LEGO mechanisms into designing simple Scratch games, approaching each project with meticulous
    planning and a competitive drive to outdo their own prototypes.
  sports: Leda Mckinnon anchors the midfield for their elementary school soccer team, trains with the local youth soccer club, avidly tracks the performances of the national women’s team, and they spend
    weekends cheering for the regional junior baseball squad.
  arts: Leda Mckinnon explores creative expression through intricate LEGO Technic builds, devours mystery novels like the ‘Alex Rider’ series, solves chess puzzles, and they tune into the pop‑rock sounds
    of Imagine Dragons during study sessions.
  travel: Leda Mckinnon has trekked the red rock trails of a nearby national park on Girl Scouts outings, visited the interactive science museum in a nearby city, dreams of exploring Tokyo’s Akihabara district
    for its gaming culture, and they hope to revisit Disneyland next summer.
  culinary: Leda Mckinnon favors pizza slices, homemade macaroni‑and‑cheese, and the occasional Ghirardelli chocolate chip cookie, enjoys crafting LEGO‑shaped fruit skewers, and they are learning to whisk
    simple pancake batter under parental supervision.
  core: Leda Mckinnon blends a precise, schedule‑driven mindset with a love for building and competitive sports, all while juggling a midnight habit of checking a budgeting app and forgetting to floss.
background:
  cultural: Leda is a white American raised in Oxford, Massachusetts, a small New England town that values community, education, and self‑reliance. Her family has deep, generational roots in the region,
    reflecting Anglo‑American cultural traditions and a modest, neighborly lifestyle. She attends the local public school, participates in town events such as the Fourth of July parade and library reading
    programs, and celebrates typical American holidays. The New England cultural values of punctuality, orderliness, and personal responsibility have shaped her upbringing.
