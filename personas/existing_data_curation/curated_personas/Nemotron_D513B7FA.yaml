personas:
  professional: Heather Bennett is a budding correctional officer who blends a pragmatic, self‑reliant mindset with sharp observational acuity to de‑escalate inmate incidents, writes concise incident reports
    despite a loosely organized schedule, and they channel their curiosity about systemic reform into pursuing supervisory responsibilities.
  sports: Heather Bennett stays fit by trail‑running with the Mojave Trail Runners club, enjoys seasonal desert yoga sessions, roots for the Arizona Cardinals in the NFL and the Phoenix Suns in the NBA,
    and they prefer solitary hikes over organized team sports, reflecting a self‑reliant yet community‑connected approach to exercise.
  arts: Heather Bennett expresses their love of the Southwest through desert photography inspired by Ansel Adams, unwinds to the haunting folk strings of Iron & Wine, binge‑watches gritty crime dramas like
    'True Detective' starring Matthew McConaughey, and they occasionally attend local open‑mic nights featuring emerging singer‑songwriters, weaving a solitary yet culturally attuned artistic tapestry.
  travel: Heather Bennett favors low‑key, self‑planned road trips to desert gems such as Death Valley, the Grand Canyon, and Sedona, has a wish‑list that includes Patagonia’s arid steppe and Iceland’s volcanic
    fields, and they balance a modest travel budget with spontaneous detours, reflecting a pragmatic yet curious wanderlust.
  culinary: Heather Bennett’s palate leans toward Southwestern flavors, they often whip up quick chicken‑and‑black‑bean tacos seasoned with cumin and fresh cilantro, relish grilled nopales and roasted sweet‑potato
    salads, and occasionally indulge in a gourmet desert‑inspired quinoa bowl topped with pomegranate seeds, reflecting a modest cooking skill set paired with a love for bold, earthy ingredients.
  core: Heather Bennett is a solitary desert‑wanderer who balances a keen eye for inmate safety with a penchant for camera‑gear splurges, an occasional missed deadline due to relaxed planning, and they
    habitually listen to true‑crime podcasts while navigating the Mojave.
background:
  cultural: Heather grew up as a White American in a close‑knit, semi‑rural community near Fort Mohave, Arizona. The region’s Southwest frontier ethos—self‑reliance, respect for the land, and a pragmatic
    approach to daily life—shaped her values. Her family has a tradition of public‑service work, which guided her toward a career in corrections. While her cultural environment is predominantly Anglo‑American,
    she is aware of the nearby Hopi and Hualapai tribal cultures and the growing Hispanic presence in Mohave County, influencing her appreciation for diverse perspectives and community cooperation.
attributes:
  skills: '[''Inmate supervision'', ''De‑escalation techniques'', ''Crisis response'', ''Report writing'', ''Observational awareness'', ''Physical fitness and self‑defense'', ''Firearms and less‑lethal
    weapon handling'', ''Basic first aid'', ''Knowledge of correctional policies and regulations'', ''Effective interpersonal communication'']'
  hobbies: '[''Hiking and desert trail exploration'', ''Landscape photography'', ''Reading true‑crime books and investigative journalism'', ''Listening to legal and forensic podcasts'', ''Volunteering at
    a local animal shelter'', ''Playing strategy video games'']'
  career_goals: She aims to complete her associate’s degree in criminal justice, qualify for a supervisory role within the next five years, and eventually pursue a position as a correctional administrator
    or transition into a specialized investigative role in law enforcement. Heather also hopes to design and implement a vocational‑training program for inmates that bridges practical skills with rehabilitative
    outcomes, reflecting her blend of curiosity and practicality.
