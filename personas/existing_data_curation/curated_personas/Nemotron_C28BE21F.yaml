  hobbies: '["Cooking Puerto Rican cuisine", "Salsa dancing", "Reading mystery novels", "Exploring Worcester historic sites", "Crocheting", "Listening to coffee‑brewing podcasts", "Volunteering at food
    drives", "Experimenting with fusion recipes"]'
  career_goals: Driven by a blend of curiosity and practicality, Natasha aims to move from host to floor supervisor within the next two years, using her on‑the‑floor experience to learn operational details.
    She plans to enroll in an associate program in Hospitality Management to qualify for a restaurant manager role, where she can shape service standards and mentor new staff. Long‑term, she aspires to
    open a small coffee shop that fuses New England brewing traditions with Puerto Rican flavors, creating an inclusive community space that reflects her cultural roots and love for flexible, creative entrepreneurship.
