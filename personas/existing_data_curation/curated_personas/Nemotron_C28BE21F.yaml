personas:
  professional: Natasha Tijerina leverages her bilingual fluency and keen observational skills as a host to create a warm atmosphere while deftly handling rushes, using her practical flexibility to resolve
    seating conflicts and mentor staff, all while eyeing a floor supervisor role within two years.
  sports: Natasha Tijerina stays active by attending beginner salsa lessons, jogging a few miles along Worcester’s historic streets on weekends, and cheering for the Worcester Red Sox and the Boston Celtics,
    while preferring low‑impact group exercise over intense gym workouts.
  arts: Natasha Tijerina weaves scarves to the rhythm of Marc Antonio’s salsa tracks while binge‑listening to the 'Criminal' podcast and devouring cozy mystery novels by Agatha Christie, and she often revisits
    the classic films of Pedro Almodóvar for a cinematic escape.
  travel: Natasha Tijerina plans her travel around weekend getaways to New England’s coastal towns like Newport and Portland, but dreams of a summer culinary tour to a Caribbean island to sample local market
    fare, balancing these trips with a modest travel budget and her busy hospitality schedule.
  culinary: Natasha Tijerina loves preparing island‑style arroz con gandules with locally sourced lobster and maple‑glazed sweet potatoes, perfecting a caramelized coffee‑infused crème brûlée after tuning
    into barista‑focused podcasts, and she often crafts her own adobo‑spiced empanadas using the week’s fresh harvest.
  core: Natasha Tijerina blends a relaxed, curiosity‑driven outlook with a practical knack for organization, turning salsa rhythms, crochet loops, and coffee aromas into a vibrant, community‑focused lifestyle
    despite occasional bouts of disarray.
background:
  cultural: Natasha was raised in a tight‑knit Puerto Rican household in Worcester, where Spanish was spoken daily and family gatherings centered around traditional foods like arroz con gandules, lechón,
    and pastelón. Celebrations of Navidad, Three Kings Day, and the San Juan festivities infused her childhood with a strong sense of community and hospitality. Her parents, who once managed a modest taquería,
    introduced her early to the rhythms of the service industry. The blend of Puerto Rican warmth and New England practicality shapes her bilingual communication, her cooking style, and her desire to create
    welcoming spaces that honor both cultures.
attributes:
  skills: '["Customer service", "Bilingual communication (English/Spanish)", "Seating coordination", "Reservation management", "Conflict resolution", "Basic barista skills", "Knowledge of Puerto Rican and
