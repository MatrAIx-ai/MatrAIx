  career_goals: Michael envisions a future where he blends art and technology, aiming to become a creative professional such as a video game designer or a museum exhibit developer. He hopes to design interactive
    experiences that tell stories and inspire others, while also contributing to his community by creating educational projects for local schools and youth programs. His ambitions reflect his curiosity,
    methodical nature, and desire to support others.
