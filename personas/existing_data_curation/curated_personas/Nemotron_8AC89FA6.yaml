personas:
  professional: Ai Chu, a 26‑year‑old multidisciplinary engineer, translates abstract artistic concepts into functional prototypes, thriving as a bridge between software, hardware, and creative teams thanks
    to their rapid learning, collaborative energy, and willingness to embrace unconventional ideas despite occasional disorganization.
  sports: 'Ai Chu fuels their energetic social life with community sports: they join a Wednesday night intramural basketball league, cycle to street‑photography spots on weekends, attend Saturday morning
    runs with the city’s Urban Striders club, and cheer for the local professional teams, the Seattle Sounders FC and the Seattle Kraken, during the season.'
  arts: Ai Chu immerses themselves in creative expression by crafting generative art inspired by Refik Anadol, snapping urban street shots reminiscent of Henri Cartier‑Bresson’s work, strumming guitar covers
    of The Beatles and Tame Impala at a community jam circle, attending gallery openings featuring Banksy and Ai Weiwei, and performing improv sketches alongside fans of Tina Fey’s sketch comedy.
  travel: Ai Chu’s travel style mixes impromptu weekend escapes to nearby nature spots like Yosemite with meticulously planned tech‑art pilgrimages to Tokyo’s teamLab Borderless and Berlin’s urban mural
    tours, preferring budget hostels but splurging on a VR‑enhanced exhibit in Reykjavik, all while budgeting for flights through a points‑reward credit card.
  culinary: Ai Chu is a self‑taught cook who gravitates toward bold, quick dishes such as spicy ramen, shakshuka with feta, avocado toast topped with chili flakes, experiments with edible ink for plating,
    loves the freshness of cilantro, lime, and sesame oil, and frequently satisfies post‑hackathon cravings with street‑taco stalls or sushi rolls.
  core: Ai Chu is a curiosity‑driven, socially‑charged engineer who channels artistic chaos into kinetic prototypes while juggling anxiety‑fuelled overthinking and a habit of forgetting deadlines.
background:
  cultural: Ai is a second‑generation East Asian American whose family maintains strong ties to Chinese cultural traditions. He grew up bilingual, speaking Mandarin at home while navigating the multicultural
    environment of Union City, CA. Celebrations like Chinese New Year and the Mid‑Autumn Festival are important family rituals, and he often blends these customs with West Coast influences, such as enjoying
    dim sum brunches with friends after weekend hikes. His cultural heritage informs his respect for community, a collaborative work ethic, and a deep appreciation for both traditional arts and modern technological
    expression.
