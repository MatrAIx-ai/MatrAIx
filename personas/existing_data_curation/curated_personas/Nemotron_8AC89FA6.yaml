  career_goals: Ai aims to become a technical lead who drives innovative products at the intersection of engineering and art, such as interactive installations or immersive AR experiences. Over the next
    five years he hopes to spearhead cross‑functional teams, mentor junior engineers, and eventually launch his own startup focused on generative design tools that empower artists with real‑time engineering
    feedback. He also values contributing to open‑source communities and championing inclusive, flexible work cultures that reduce stress for creative professionals.
