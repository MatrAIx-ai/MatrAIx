  career_goals: Danae aims to earn master‑level certifications in HVAC and electrical work while completing an associate degree in mechanical engineering technology. Within the next five years she hopes
    to become a lead technician at a regional facilities‑management firm and eventually launch her own eco‑friendly repair and design consultancy that blends functional maintenance with aesthetic upgrades.
    She is also passionate about mentoring young people—especially women and minorities—in the trades, and envisions creating a community apprenticeship program in Monroe.
