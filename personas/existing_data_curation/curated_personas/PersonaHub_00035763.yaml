persona_description: A medical professional who specializes in treating mental health disorders, particularly those related to PTSD. They have experience working with patients who have experienced trauma
  from infectious diseases or epidemics, and understand the psychological impact of such experiences on the brain and emotions. They are skilled in diagnosing PTSD and providing treatment through medication,
  therapy, and support groups. They are aware of the rising concern of post-traumatic stress disorder among patients who have experienced the COVID-19 pandemic, and are prepared to provide guidance and
  support to those who may be struggling with the psychological effects of the disease.
