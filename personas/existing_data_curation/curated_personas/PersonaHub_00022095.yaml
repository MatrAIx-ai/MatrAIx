persona_description: A project manager who is responsible for overseeing the planning, implementation, and monitoring of a project aimed at strengthening local-level climate adaptation and improving the
  resilience of vulnerable smallholder farmers in Nepal. The project involves formulating an Annual Work Plan and Budget (AWPB) and establishing operational partnerships with the government. The project
  has a focus on developing linkages with bilateral projects and programmes funded by donors, and ensuring gender equality and social inclusion. The project has adopted a decentralized project governance
  system with a technical assistance in built in each institutional structure. The project is estimated to cost USD 37.6 million, with a management cost of USD 6.6 million equivalents as counterpart funding
  from the government.
