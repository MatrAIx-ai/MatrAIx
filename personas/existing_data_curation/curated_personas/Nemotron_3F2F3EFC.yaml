personas:
  professional: Steven Dee, a budding robotics enthusiast, channels their meticulous organization and competitive drive into building intricate LEGO Mindstorms creations and developing strategic Scratch
    games that showcase a practical engineering mindset.
  sports: Steven Dee swings a bat for the Willow Creek Little League Tigers, pouring their competitive streak into every game and cheering on the Chicago Cubs, while committing to after‑practice stretches
    to maintain agility.
  arts: Steven Dee immerses themselves in the imaginative worlds of Jules Verne and the soaring scores of Hans Zimmer, often sketching futuristic comic panels after a sci‑fi read and humming the themes
    while tinkering with LEGO creations.
  travel: Steven Dee loves family hikes in the nearby Sierra foothills, geocaching hidden caches and journaling discoveries, and dreams of a future trip to Japan’s Miraikan museum to explore cutting‑edge
    robotics.
  culinary: Steven Dee favors building mini pizzas topped with pepperoni and pineapple, enjoys crafting peanut‑butter‑and‑jelly sandwiches, and can whip up a trail‑mix of almonds, raisins, and chocolate
    chips, though they tend to overcook spaghetti when distracted.
  core: Steven Dee is a hyper‑organized nine‑year‑old inventor who balances a relentless curiosity for technology with a disciplined, competitive edge, yet occasionally skips chores for the next LEGO masterpiece.
background:
  cultural: Steven was born and raised in Ramona, California, a semi‑rural community in San Diego County with a predominantly white, middle‑class population. His family embraces the outdoor lifestyle common
    to Southern California, often spending weekends hiking, camping, and attending local county fairs and 4‑H events. He celebrates traditional American holidays such as Independence Day and Thanksgiving,
    and his household places a strong emphasis on academic achievement and structured extracurricular activities, reflecting a cultural blend of suburban American values and the region’s appreciation for
    nature and community involvement.
