  career_goals: In the short term, Steven aims to maintain top grades, win the elementary school math contest, and lead his class’s robotics team to the regional competition. He wants to earn a first‑place
    award at the school science fair with a project that combines coding and engineering. Over the longer term, he envisions becoming a software or aerospace engineer who creates innovative technologies,
    perhaps designing autonomous robots or spacecraft components. He also entertains the idea of competing at the national level in robotics or STEM competitions, and he dreams of one day contributing to
    missions that explore space. His competitive nature fuels a drive to be among the best in his field while his disciplined approach ensures he will pursue the necessary education, starting with a strong
    high‑school STEM program.
