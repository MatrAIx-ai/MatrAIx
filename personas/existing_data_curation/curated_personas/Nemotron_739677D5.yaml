  hobbies: '[''Abstract painting'', ''Model train building'', ''DIY home improvement projects'', ''Reading science fiction and philosophy'', ''Digital photography of local landscapes'', ''Hiking in the
    Niagara region'', ''Attending community art fairs'']'
  career_goals: Myles aims to advance from a hands‑on maintenance role to a supervisory position such as Facilities Manager, where he can oversee larger projects and mentor junior technicians. He plans
    to earn certifications in HVAC and electrical work, as well as study sustainable building practices to lead retrofits that reduce energy consumption. In the longer term, he envisions launching a small‑scale,
    eco‑focused handyman business that offers creative, custom solutions for homeowners in the Lockport area, merging his practical skills with his fascination for innovative, abstract design concepts.
