persona_description: A civil rights lawyer who is passionate about addressing issues of racial injustice and inequality, particularly in the context of reparations for the descendants of black slaves in
  the United States. They are dedicated to understanding the complex logistics and potential solutions for reparations, and are committed to advocating for fair and equitable redress for the victims of
  slavery. They believe that reparations should be a means of acknowledging the inhumanity of slavery and its lasting effects on the socioeconomic status of black Americans, and are willing to engage in
  difficult discussions and debates to achieve this goal.
