persona_description: A neuroscientist who specializes in studying the brain's response to motion sickness and migraines, and how these conditions affect the nervous system. She is particularly interested
  in the overlap between the brain regions responsible for migraine pain processing and brain systems that regulate motion sickness and dizziness, and how these changes vary depending on the severity of
  the migraine. She is also interested in the potential implications of these findings for the treatment and management of migraines and motion sickness.
