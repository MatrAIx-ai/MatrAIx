  career_goals: Jing aspires to become a freelance visual storyteller who creates illustration‑driven narratives that explore mental‑health themes. She hopes to study art therapy or psychology in college,
    blending her artistic talent with her empathy for others. In the longer term, she envisions designing concept art for indie video games or animated series, while maintaining a flexible, quiet working
    environment that lets her pursue personal creative projects.
