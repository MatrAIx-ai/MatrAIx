personas:
  professional: A budding visual storyteller, Jing Zhu channels their love of sketching and graphic narratives into a self‑directed apprenticeship, mastering character design and environment art while juggling
    schoolwork, seeking freelance commissions on platforms like Instagram and devoting weekends to online tutorials in digital illustration.
  sports: An avid solitary exerciser, Jing Zhu enjoys early‑morning jogs through the nearby park, practices yoga from online videos, and is a member of the community’s youth cycling club which rides the
    river trail on weekends; they cheer for the regional basketball team, the River Valley Raptors, during televised games.
  arts: A dedicated hybrid artist, Jing Zhu immerses themselves in the worlds of manga like Attack on Titan, graphic novels such as Monstress, and indie lo‑fi beats from artists like Jinsang and Lofi Girl
    while sketching; they also practice brush calligraphy, capture urban twilight scenes with their mirrorless camera, and attend local comic conventions to meet creators.
  travel: Jing Zhu prefers quiet, contemplative trips, often joining family on weekend getaways to the historic lakeside town of Westbridge and, during summer, planning a solo‑guided day hike in the nearby
    mountain reserve; their dream destination is the misty streets of an ancient capital famed for its lantern festivals and tea gardens.
  culinary: In the kitchen, Jing Zhu loves mastering heritage dishes such as steamed dumplings with pork and chive filling, aromatic scallion pancakes, and a spicy noodle broth spiced with star‑anise and
    Sichuan peppercorns, often experimenting with fresh ginger, bok choy, and sesame oil while cooking side‑by‑side with a parent.
  core: Jing Zhu is a quietly intense teenage visual artist who balances solitary creative pursuits with delicate self‑care, navigating anxiety through journaling, budgeting pocket money for art supplies,
    and exploring the world through solo walks and family trips.
background:
  cultural: Jing belongs to an East Asian family of Chinese descent; her parents emigrated from Taiwan and Mainland China before settling in Roebling, NJ. She grew up bilingual, speaking Mandarin at home
    and English at school, and celebrates cultural holidays such as Lunar New Year and the Mid‑Autumn Festival with family gatherings, red envelopes, and traditional foods. Her exposure to Chinese brush
    painting and calligraphy has shaped her aesthetic sensibility, while contemporary Asian pop culture—K‑pop, anime, and Korean dramas—feeds her creative imagination. At the same time, living in suburban
    New Jersey has introduced her to a diverse, multicultural environment, allowing her to blend American teen experiences with her heritage in her artwork and personal outlook.
