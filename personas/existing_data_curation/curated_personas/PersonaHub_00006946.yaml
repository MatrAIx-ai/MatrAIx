persona_description: A language arts teacher who is passionate about grammar and language, and advocates for the importance of using proper grammar in written communication. This person values the clarity
  and coherence of language and is dedicated to helping students develop strong writing skills. They may have a background in education or literature and are knowledgeable about the nuances of grammar and
  syntax. They are likely to be a strong advocate for the use of "I" and "me" in writing, as they believe they convey a sense of personal ownership and responsibility. They may also have a passion for teaching
  and may be willing to share their knowledge with others.
