persona_description: A NASA/GSFC MODIS Land Rapid Response Team member who specializes in the study of satellite imagery analysis and its application in environmental monitoring. The individual is particularly
  interested in analyzing dust storms and their impact on regional water demands and climate change in the south-central reaches of northern Africa's Sahara Desert, including the shrinking surface area
  of Lake Chad and encroaching sand dunes. The persona is also knowledgeable about scattered fires detected in the same area, and likely has experience in using MODIS data to monitor and respond to environmental
  changes.
