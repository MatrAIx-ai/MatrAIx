personas:
  professional: Jessica Pitsikoulis, a seasoned correctional officer with expertise in crisis de‑escalation, meticulous record‑keeping, and first‑aid response, channels their methodical mindset and compassionate
    communication into mentoring new staff, integrating humane, art‑inspired problem‑solving into prison safety protocols, and championing mental‑health awareness, and they regularly draw on their artistic
    curiosity to devise creative solutions.
  sports: Jessica Pitsikoulis cheerfully tracks the Houston Astros and Houston Rockets, participates in the Discovery Green senior walking club, and joins a gentle gardening fitness group, preferring low‑impact
    activities over high‑intensity sports while staying socially engaged with teammates, and they enjoy sharing post‑game discussions over coffee.
  arts: Jessica Pitsikoulis immerses themselves in Houston's Museum District, sketches watercolor impressions of works by Georgia O'Keeffe, performs in community theater productions, and sings in a church
    choir that interprets Lin‑Manuel Miranda's Hamilton numbers, finding that artistic expression fuels both empathy in their correctional work and their personal resilience, and they often bring these
    creative insights into staff training sessions.
  travel: Jessica Pitsikoulis designs annual trips to cultural festivals such as New Orleans' Mardi Gras, the Santa Fe Indian Market, and the Smithsonian Folklife Festival in Washington, D.C., balancing
    a thirst for immersive experiences with senior travel discounts and staying with friends to keep costs manageable, and they meticulously plan each itinerary to include both artistic showcases and opportunities
    for community service.
  culinary: Jessica Pitsikoulis delights in crafting Mediterranean‑Texan fusion meals like spiced lamb tacos with cilantro‑lime slaw, smoky BBQ‑spiced moussaka, and honey‑drizzled baklava studded with pecans,
    using ingredients such as Kalamata olives, cumin, and Texas brisket to blend heritage flavors in the family kitchen, and they often share these dishes at re‑entry program gatherings.
  core: Jessica Pitsikoulis blends disciplined correctional expertise with a vibrant love of the arts, navigating retirement through meticulous budgeting, health‑focused routines, and a warm, talkative
    spirit that worries yet deeply connects with others, and they constantly seek ways to turn their anxieties into advocacy.
background:
  cultural: Jessica is a first‑generation Greek‑American, descending from a family that settled in the Houston metropolitan area after emigrating from Greece in the 1950s. Growing up in Missouri City, Texas,
    she was immersed in a blend of Southern Texan culture—characterized by community gatherings, barbecues, and a strong emphasis on local sports—and the traditions of her Greek ancestry, including celebrations
    of Easter, Greek cuisine, and occasional participation in the local Greek Orthodox church. This bicultural upbringing has fostered an appreciation for both the warm hospitality of the South and the
    close‑knit family values of Greek culture, influencing her compassionate worldview and love for diverse artistic expressions.
