  hobbies: '[''Visiting art museums and galleries'', ''Watercolor sketching'', ''Community theater acting and workshops'', ''Singing in a church choir'', ''Volunteering at a re‑entry program'', ''Gardening'',
    ''Yoga and meditation'', ''Reading historical fiction'', ''Cooking Greek‑Texan fusion meals'', ''Traveling to cultural festivals'']'
  career_goals: Although she is approaching the traditional retirement age, Jessica aims to channel her decades of experience into mentorship and community advocacy. She hopes to become a senior trainer
    for correctional staff, focusing on humane inmate management and mental‑health awareness. Simultaneously, she aspires to join a local re‑entry program, using her compassionate nature to support formerly
    incarcerated individuals as they transition back into society. Jessica also dreams of authoring a memoir that weaves together her insights on criminal justice, art, and personal resilience, with the
    goal of sparking dialogue on reform and empathy.
