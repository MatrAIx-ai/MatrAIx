persona_description: An entomologist who specializes in the study of insects, particularly in the biodiversity of Vietnam. They have conducted extensive research and expeditions to the country, collecting
  thousands of entomological samples and describing over 35 species new to science. They are also known for their collaboration with the Vietnam National Museum of Nature in Hanoi and their support in the
  financing of expeditions. Their work has contributed to the conservation of biodiversity in Vietnam and has raised awareness about the importance of protecting the natural environment.
