  hobbies: '[''gospel and blues music participation (singing, tambourine)'', ''church choir and community cooking'', ''local history research and museum visits'', ''reading biographies and documentaries'',
    ''backyard gardening'', ''journaling and mindfulness prayer'', ''walking along the Elizabeth River'']'
  career_goals: Although retired from formal employment, Daniel aims to formalize his role as a community elder and mentor. He hopes to organize a regular intergenerational storytelling series at the local
    community center, preserving Portsmouth’s maritime and African‑American heritage for younger residents. He also aspires to volunteer as a peer‑support liaison, using his empathy and experience with
    anxiety to help others manage emotional distress. In the longer term, Daniel dreams of compiling a memoir of his life on the waterfront, integrating photographs and oral histories, and possibly publishing
    it as a community resource. He is motivated to continue learning digital tools so he can document and share his projects online, bridging the gap between older and younger community members.
