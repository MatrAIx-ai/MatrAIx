  hobbies: '["Gardening (native California plants)", "Watercolor painting", "Digital generative illustration", "Walking/Bay Trail hikes", "Community theater", "Bridge (card game)", "Travel to national parks",
    "Volunteer STEM outreach"]'
  career_goals: Although retired from formal employment, Elizabeth is driven to keep contributing to the intellectual and cultural life of her community. She hopes to launch an intergenerational ‘Art‑Science
    Lab’ at the Campbell Public Library where seniors and youth co‑create digital art projects grounded in scientific themes. She also aims to author a memoir that weaves together her experiences as a woman
    in STEM during the 20th century with reflections on creativity and lifelong learning. Additionally, she aspires to serve on the advisory board of a local museum, helping shape exhibitions that highlight
    the intersection of technology and art, and to mentor emerging digital artists through a monthly workshop series.
