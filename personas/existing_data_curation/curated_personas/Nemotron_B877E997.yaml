personas:
  professional: A retired engineering professor named Elizabeth Correa, now 81, leverages her extensive data‑analysis and CAD expertise to design and lead the ‘Art‑Science Lab’ at the Campbell Public Library,
    where they mentor seniors and youth in creating generative digital artworks rooted in scientific concepts.
  sports: Elizabeth Correa enjoys brisk walks along the Bay Trail with bridge club friends, participates in a light‑weight yoga class at the Campbell Senior Fitness Club, and never misses a home game of
    the San Jose Earthquakes, all while they keep a gentle rivalry with a local senior bowling league.
  arts: Elizabeth Correa channels their love of watercolor roses and algorithmic patterns into abstract paintings inspired by Georgia O'Keeffe and Frida Kahlo, attends community theater productions by the
    California Shakespeare Company, and they experiment with Adobe Illustrator and Procreate while drawing inspiration from musicians like Sufjan Stevens.
  travel: Elizabeth Correa prefers weekend road trips to national parks such as Yosemite, Sequoia, and Joshua Tree, where they photograph sunrise vistas for later reinterpretation in digital art, and they
    dream of a spring pilgrimage to Kyoto to explore its historic temples and tea gardens.
  culinary: Elizabeth Correa delights in cooking with herbs harvested from their garden—lavender shortbread, rosemary‑infused grilled salmon, and a seasonal heirloom tomato gazpacho—while their moderate
    culinary skill shines most during intimate potluck gatherings at the senior center, and they enjoy sharing recipes with neighbors.
  core: Elizabeth Correa, an 81‑year‑old curiosity‑driven polymath, fuses science and art in community projects, balances disciplined routines with whimsical late‑night sketching, and they occasionally
    forget to water their roses when a new generative code experiment captures their attention.
background:
  cultural: Elizabeth identifies as a White American with ancestry tracing back to Irish and German immigrants who settled in the Midwest during the early 1900s. She grew up in a close‑knit Midwestern town
    where community gatherings and local festivals shaped her social outlook. After moving to the Bay Area in the 1980s for graduate studies in engineering, she embraced the region’s progressive, multicultural
    atmosphere. Her marriage to a partner of Hispanic heritage introduced bilingual elements into family life, fostering an appreciation for diverse cultural traditions. Living in Campbell, California,
    she actively participates in neighborhood events, celebrates both American holidays and the cultural festivals of the larger Silicon Valley community, and values the blend of suburban tranquility with
    the innovative spirit of the area.
