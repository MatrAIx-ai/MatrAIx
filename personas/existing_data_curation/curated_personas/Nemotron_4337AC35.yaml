personas:
  professional: An aspiring story architect, Kiara Robinson channels her vivid imagination into sketching characters, building LEGO narrative worlds, and tinkering with simple coding projects, and they
    demonstrate early signs of a future multimedia storyteller who balances meticulous detail with playful flexibility.
  sports: Kiara Robinson swims with the local community team during summer, cheers for the nearby Riverdale Raccoons baseball club, and practices weekend soccer drills, yet they prefer the creative freedom
    of LEGO building over intense competition, making them a laid-back but occasionally assertive player.
  arts: Kiara Robinson immerses herself in graphic novels like Raina Telgemeier's 'Smile', draws inspiration from Disney animators, and listens to a playlist ranging from Beyoncé's contemporary R&B to John
    Coltrane's jazz and Mozart's classical symphonies, a blend that fuels their storytelling and artistic style.
  travel: Kiara Robinson loves beachcombing for shells at Seaside Cove, dreams of exploring Tokyo's anime districts, and enjoys family road trips to the historic Cape Harbor lighthouse, though they often
    balance wanderlust with school obligations and parental budgeting.
  culinary: Kiara Robinson enjoys crafting cheddar-and-basil pizza, snacking on sea-salted veggie chips, and sipping warm chocolate milk while sketching, yet they have a habit of leaving unfinished plates
    on the kitchen counter, prompting gentle reminders from their parents.
  core: Kiara Robinson is an eight-year-old with a vivid imagination who balances meticulous LEGO world-building with occasional worries about school projects, while sprinkling their day with creative bursts
    and impulsive spending.
background:
  cultural: Kiara grows up in a supportive African‑American family on the coastal city of Virginia Beach. Her parents weave African folklore, African‑American history, and Southern coastal traditions into
    daily life, celebrating events such as Juneteenth, Kwanzaa, and community beach clean‑ups. Family gatherings often feature soulful cooking, gospel and R&B music, and storytelling sessions that nurture
    her imagination. Participation in local cultural centers and school programs exposes her to diverse artistic expressions, reinforcing a strong sense of identity and pride in her heritage.
