  career_goals: Kiara dreams of turning her love for art and ideas into a future career. She envisions becoming a children's book illustrator who brings fantastical worlds to life, an astronaut‑scientist
    who explores space while sharing discoveries through visual media, or a community muralist who celebrates her heritage and inspires other children. Her ambition is to blend creativity with curiosity
    to make a positive impact.
