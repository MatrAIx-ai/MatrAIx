personas:
  professional: Jeannette Joslin is a retired church and historical society coordinator who leverages meticulous event planning, budget management, and advanced genealogical research skills to curate community
    exhibitions and mentor volunteers, all while channeling a fiercely competitive drive that pushes them to win the state senior art competition.
  sports: Jeannette Joslin follows the Minnesota Vikings, Twins, and Wild with loyal enthusiasm, participates in a senior walking club that meets twice weekly at the lakefront, and enjoys occasional community
    curling matches, balancing competitive fandom with gentle low‑impact exercise that they consider essential for joint health.
  arts: Jeannette Joslin creates abstract prairie‑inspired watercolor and collage works influenced by the bold color fields of Mark Rothko and the naturalist compositions of Georgia O’Keeffe, regularly
    attends Walker Art Center exhibitions featuring contemporary artist Julie Mehretu, and shares their enthusiasm for photography with local art lovers at the senior book club.
  travel: Jeannette Joslin prefers meticulously planned road trips that blend cultural stops with nature, having explored Door County’s shoreline, the historic streets of Quebec City, and the alpine trails
    of Banff National Park, while they budget modestly and travel chiefly with book‑club companions to balance adventure with financial prudence.
  culinary: Jeannette Joslin enjoys preparing homemade strawberry preserves, herb‑infused cheese spreads using thyme and sage from their garden, and seasonal rhubarb crisp, though they sometimes over‑salt
    their recipes in the pursuit of bold flavor, and they relish sharing these dishes at community potlucks.
  core: Jeannette Joslin is a fiercely organized, imaginative senior whose disciplined habit of journaling, competitive art ambitions, and skeptical eye for detail shape a life lived between quiet creativity
    and relentless pursuit of community legacy.
background:
  cultural: Jeannette was born and raised in Rothsay, a small agricultural town in Wilkin County, Minnesota. Her family traces its roots to German immigrants who settled the Red River Valley in the early
    20th century, and her upbringing was shaped by the region’s Lutheran traditions, close‑knit community values, and a deep connection to the prairie landscape. The local culture emphasized self‑reliance,
    modesty, and collective responsibility, fostering respect for seasonal cycles, harvest festivals, and communal gatherings such as church potlucks and county fairs. Throughout her life she has internalized
    the Midwestern ethos of hard work and quiet perseverance, while also developing an appreciation for the diverse histories of the area’s Native American peoples and the importance of preserving regional
    heritage.
attributes:
  skills: '["Watercolor painting", "Mixed-media art", "Event coordination", "Budget management", "Genealogical research", "Historical documentation", "Computer literacy (email, internet research)", "Digital
