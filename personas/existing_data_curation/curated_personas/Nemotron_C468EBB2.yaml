  hobbies: '["Watercolor painting", "Collage art", "Abstract sketching", "Journaling", "Birdwatching", "Nature photography", "Herb gardening", "Reading (fiction and philosophy)", "Senior book club", "Crossword
    puzzles", "Cooking and preserving"]'
  career_goals: Although retired, Jeannette is driven by a desire to leave a lasting cultural imprint and to pursue personal growth. She aims to curate a traveling exhibition of her abstract prairie‑inspired
    artworks for county libraries, complete a senior‑level art history course at a community college, and publish a compact memoir that intertwines her family’s genealogy with the early settlement story
    of the Red River Valley. She also aspires to mentor younger volunteers in archival techniques at the local historical society, develop a structured digital archive of community photographs, and win
    the state senior art competition, reflecting her high standards and competitive spirit.
