  hobbies: '[''Community gardening'', ''Cooking soul food'', ''Jazz listening'', ''Volunteer tutoring'', ''Board games with friends'', ''Walking clubs'', ''Historical nonfiction reading'', ''Woodworking'',
    ''Traveling to family reunions'']'
  career_goals: Now retired, Damien is dedicated to giving back. He plans to volunteer as a mentor for youth interested in STEM, help launch a robotics after‑school program at a local community center,
    serve on the board of a nonprofit that focuses on digital literacy for seniors, and eventually author a practical guide on home‑based DIY electronics for hobbyists.
