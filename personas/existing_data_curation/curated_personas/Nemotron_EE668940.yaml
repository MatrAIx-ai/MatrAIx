personas:
  professional: Rodney Blackburn, a 55‑year‑old resort operations manager with a humanities‑rooted storytelling flair, blends meticulous budgeting and structured event planning with a relaxed, adaptable
    style that lets them steer crises calmly while mentoring staff, forging community partnerships, and pursuing a regional director role.
  sports: Rodney Blackburn, an avid golfer who tees off daily at Bradenton Country Club, captains a local Gulf sailing crew, and cheers on the Tampa Bay Buccaneers each fall, balances competitive spirit
    with relaxed weekend fishing tournaments on the Gulf.
  arts: Rodney Blackburn, a backstage designer for the Bradenton community theater, regularly attends Sarasota’s Suncoast Symphony concerts featuring violinist Hilary Hahn and enjoys live performances by
    the Allman Brothers Band, while evenings often find them immersed in historical fiction and biographies of figures like Eleanor Roosevelt.
  travel: Rodney Blackburn prefers relaxed itineraries, spends summer weekends cruising the Gulf islands, cherishes a sailing trip to the Bahamas, and plans a future Pacific Coast road‑trip from Seattle
    to San Diego, all while keeping travel costs low with off‑season airfare deals.
  culinary: Rodney Blackburn loves cooking fresh Gulf snapper seasoned with smoked paprika, Meyer lemon, and garden‑grown basil, served alongside heirloom tomato salsa and cilantro, turning family Sunday
    seafood feasts into a culinary ritual.
  core: Rodney Blackburn blends a structured, budget‑savvy mind with a laid‑back love of sailing, golf, and community theater, navigating life’s responsibilities while never missing a chance for spontaneous
    seafood feasts and mentorship.
background:
  cultural: Rodney is a white American who grew up in the Midwest before relocating to Bradenton, Florida in his late twenties. He carries the Midwestern work ethic and modesty, blended with the Southern
    hospitality and laid‑back coastal vibe of the Gulf Coast. His upbringing exposed him to mainstream American culture while his humanities education fostered an appreciation for the arts, literature,
    and diverse perspectives. Living in a tourism‑driven city, he values community engagement and is comfortable navigating the cultural mix of residents, retirees, and visitors from across the country
    and abroad.
