  career_goals: Rodney intends to advance to a regional director position overseeing multiple hospitality properties in the Gulf Coast, where he can shape service standards and sustainability initiatives.
    He aims to formalize a mentorship program for emerging managers, leveraging his experience to foster a supportive leadership pipeline. Long‑term, he aspires to launch a boutique consultancy that helps
    small‑to‑mid‑size resorts and community venues improve employee engagement, guest experience, and local cultural integration, all while maintaining a balanced lifestyle that allows ample time for family
    and community involvement.
