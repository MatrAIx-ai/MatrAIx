personas:
  professional: Janet Steverson, a 34‑year‑old construction laborer with strong concrete forming and framing skills, blends practical know‑how with a curiosity for sustainable building methods, leads small
    crews assertively while championing flexible work planning, and is driven to become a forewoman and eventually launch an eco‑focused renovation business.
  sports: Janet Steverson, an early‑morning shoreline walker and occasional casual softball player at a Monmouth County community league, roots for the New York Giants and the New Jersey Devils, and joins
    a winter indoor rock‑climbing club to stay fit without the pressure of competitive sports.
  arts: Janet Steverson, who finds solace in capturing sunrise over the Atlantic with a DSLR, enjoys the acoustic storytelling of Sufjan Stevens and the tranquil piano works of Ólafur Arnalds, and frequents
    the local art gallery's exhibitions of realist painters like Andrew Wyeth for inspiration.
  travel: Janet Steverson, a solo traveler who favors low‑key, nature‑centric getaways, has trekked the Blue Ridge Parkway, spent a weekend in Cape May's historic district, and dreams of exploring the fjords
    of Norway to study sustainable timber architecture, always planning loosely to accommodate spontaneous photo stops.
  culinary: Janet Steverson, an avid backyard gardener, often prepares simple, fresh meals like roasted beet and goat‑cheese salad with rosemary‑infused olive oil, grills heirloom tomatoes with basil, and
    bakes sourdough using locally milled flour, while occasionally indulging in a crafted latte at a quiet café.
  core: Janet Steverson, a stress‑sensitive yet curious builder, balances hands‑on craftsmanship with eco‑conscious aspirations, thrives in solitary routines, and navigates life with a flexible, sometimes
    disorganized, approach that fuels both personal growth and occasional worry.
background:
  cultural: Janet grew up in a middle‑class family in suburban New Jersey, where a strong work ethic and practical problem‑solving were valued. Her white American heritage is reflected in a blend of mainstream
    U.S. cultural norms and the local coastal community’s emphasis on self‑reliance. Attending a nearby community college exposed her to a diverse mix of students but reinforced her appreciation for hands‑on
    learning. Living in Eatontown, she is part of the region’s working‑class construction culture, which values reliability, modesty, and a pragmatic approach to life.
attributes:
  skills: '[''Concrete forming and finishing'', ''Framing and carpentry'', ''Heavy equipment operation (e.g., backhoe, skid‑steer)'', ''Blueprint and plan reading'', ''OSHA safety compliance'', ''Basic
    project estimating'', ''On‑site troubleshooting'', ''Team coordination and assertive communication'', ''Sustainable building practices'']'
  hobbies: '[''Early‑morning shoreline walks'', ''Hiking local trails'', ''Gardening'', ''Woodworking projects'', ''Reading construction trade magazines and self‑improvement books'', ''Listening to podcasts
    about sustainable building'', ''Photography of natural landscapes'', ''DIY home improvement tinkering'']'
  career_goals: Janet aims to transition from general labor to a supervisory role such as forewoman or site safety coordinator within the next three years. She plans to obtain OSHA 30‑hour certification
    and a construction management certificate from her community college to strengthen her technical credibility. Long‑term, she hopes to start a small, eco‑focused renovation business that allows her to
    set her own schedule, providing more control over stress and enabling quieter, more solitary work environments. She also looks for a position that offers more predictable hours and flexible planning
    to mitigate her sensitivity to stress.
