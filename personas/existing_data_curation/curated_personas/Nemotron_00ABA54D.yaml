personas:
  professional: Leana Johnson is a seasoned first‑line supervisor with 15+ years of office‑administration expertise who excels at orchestrating daily operations, coordinating staff schedules, and streamlining
    workflows using advanced Microsoft Office and Google Workspace tools, while leveraging her love of structure to create predictable processes yet embracing enough flexibility to keep her team energized
    and collaborative as she works toward a regional office manager role and a Certified Administrative Professional credential.
  sports: Leana Johnson is a regular participant in community aerobics and Zumba classes, follows the St. Louis Cardinals for baseball, cheers on the St. Louis Blues during hockey season, and belongs to
    a local running club that meets twice a week for 5K jogs in the park.
  arts: Leana Johnson finds creative fulfillment singing in her church choir, dancing to classic soul legends like Aretha Franklin and Marvin Gaye at neighborhood festivals, and unwinding with occasional
    trips to the St. Louis Symphony Orchestra's spring concert, while also streaming contemporary gospel artists such as Kirk Franklin for inspiration.
  travel: Leana Johnson prefers short, purpose‑driven getaways that blend family visits with cultural immersion—favoring road trips to New Orleans for its music and cuisine, a yearly pilgrimage to Savannah’s
    historic squares, and a long‑awaited dream of wandering the vineyards of Tuscany to learn authentic cooking techniques, all while balancing travel budgets with a modest savings plan.
  culinary: Leana Johnson delights in cooking classic Southern comfort food—perfecting fried chicken, collard greens seasoned with smoked turkey, creamy cornbread, and peach cobbler—while using fresh herbs
    from her garden such as rosemary, thyme, and basil, and enjoys occasional pot‑lucks at her church where she shares her signature shrimp étouffée.
  core: Leana Johnson is a community‑centric, structure‑loving administrator who juggles spreadsheets, salsa steps, and garden herbs with a habit of misplacing keys yet never missing a church block party.
background:
  cultural: Leana is a second-generation African-American from East Saint Louis, a city with a rich history of Black resilience, music, and community activism. Growing up amid economic challenges, she was
    deeply influenced by the Black church, gospel music, and the close-knit support networks of her neighborhood. These cultural roots instilled in her a strong sense of collective responsibility, pride
    in her heritage, and an appreciation for soulful rhythms and storytelling. Leana’s identity is shaped by the legacy of civil‑rights movements in the area, the traditions of Southern cuisine, and the
    enduring spirit of community solidarity that guides both her personal life and professional ethos.
attributes:
  skills: '[''Office management'', ''Team supervision'', ''Scheduling and calendar coordination'', ''Customer service'', ''Conflict resolution'', ''Staff training and mentorship'', ''Microsoft Office Suite
