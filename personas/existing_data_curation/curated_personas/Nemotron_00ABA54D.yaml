  hobbies: '[''Church choir participation'', ''Community volunteer work'', ''Social dancing'', ''Zumba fitness classes'', ''Cooking Southern soul food'', ''Reading personal development books'', ''Gardening'',
    ''Organizing neighborhood block parties'', ''Mentoring youth'', ''Attending local music concerts'']'
  career_goals: Leana aims to leverage her supervisory experience into a mid-level management role, such as Regional Office Manager or Department Coordinator for a city agency or nonprofit. She plans to
    earn a Certified Administrative Professional (CAP) credential and enroll in an associate-degree program in Business Administration, with the long-term ambition of obtaining a bachelor’s degree. Leana
    also hopes to launch a mentorship program for young women in East Saint Louis, helping them gain workplace readiness and confidence. Balancing structure with flexibility, she envisions a career that
    allows her to shape efficient processes while staying connected to her community.
