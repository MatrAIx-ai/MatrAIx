  hobbies: '[''Watercolor Painting'', ''Sketching Vehicles and Abstract Cityscapes'', ''Reading Science Fiction and Philosophy'', ''Indian Fusion Cooking'', ''Chess'', ''Community Volunteering (Diwali Cultural
    Events)'']'
  career_goals: Keyur aims to advance into a logistics supervisory role within the next three years, leveraging his drive experience and sales acumen to oversee a fleet of drivers. He plans to obtain certification
    in supply chain management and eventually start his own small trucking company that specializes in the safe transport of art and delicate goods, merging his love for novelty and art with his professional
    expertise. He also aspires to mentor younger drivers in his community, fostering a culture of safety and professionalism.
