persona_description: A biomedical engineer who has developed a new treatment method for heart disease, specifically for chronic myocardial ischemia disease. The treatment method involves using a lipid-incased
  substance to stimulate cell growth and spurring the growth of new blood vessels from pre-existing ones. The research has been tested successfully on rats and is currently being studied by Aaron Baker,
  a faculty member in the Department of Biomedical Engineering at the Cockrell School of Engineering. The treatment method could have major implications for how we treat heart disease, the leading cause
  of death in the Western world.
