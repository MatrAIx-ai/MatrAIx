  hobbies: '[''Painting (watercolor & oil)'', ''Sketching'', ''Analog photography'', ''Reading speculative fiction and philosophy'', ''Live music jam sessions'', ''Chess and strategy board games'', ''Community
    trivia nights'', ''Volunteer workshop facilitation'', ''Local history exploration'', ''Gardening'']'
  career_goals: Although retired from formal employment, Wayne aims to leave a lasting creative imprint on his community. He plans to establish a modest community art studio where seniors can experiment
    with painting, photography, and crafts. He hopes to mentor younger artists through free workshops and to publish a collection of short speculative stories inspired by his lifelong love of abstract ideas.
    Competing in regional art contests and contributing to the local historical society’s archives are also part of his ambition, as is organizing an annual ‘Creative Futures’ festival that celebrates novelty
    and imagination.
