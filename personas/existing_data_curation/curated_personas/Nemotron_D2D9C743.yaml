personas:
  professional: Shana Walton, a 49‑year‑old advertising sales specialist, blends a natural talent for nurturing client relationships with a spontaneous adaptability that helps close deals, even as they
    grapple with tight deadlines and occasional disorganization.
  sports: Shana Walton follows the Atlanta Falcons and the Atlanta Hawks, participates in a community softball league each spring, hikes the nearby state parks for cardio, and they also attend weekly yoga
    classes at a boutique studio downtown.
  arts: Shana Walton finds creative solace in quilting to the soundtrack of gospel legends such as The Clark Sisters and Kirk Franklin, devours historical fiction by Philippa Gregory and biographies of
    Maya Angelou, and they occasionally attend local productions starring community theater veteran James Whitaker.
  travel: Shana Walton enjoys impromptu weekend road trips to Georgia’s Chattahoochee River State Park and the Blue Ridge Mountains, has taken a family vacation to Savannah’s historic district, and they
    dream of exploring New Orleans’ Mardi Gras celebrations and the culinary delights of Oaxaca, Mexico.
  culinary: Shana Walton, an adept home‑cook, perfects classic Southern fare such as buttermilk‑fried chicken, collard greens simmered with smoked ham hocks, shrimp and grits, and peach cobbler, while they
    occasionally experiment with new twists like jalapeño‑infused cornbread or a miso‑glazed pork roast.
  core: Shana Walton blends a love of routine with spontaneous bursts of creativity, they juggle client deadlines with garden chores, often forgetting to file paperwork on time yet never missing a Sunday
    choir rehearsal.
background:
  cultural: Shana is an African American woman rooted in the cultural traditions of the South. She grew up in a close‑knit community where church, family gatherings, and neighborhood support shaped her
    values of harmony, respect, and perseverance. Her heritage informs her love for soul food, gospel music, and storytelling, and she maintains strong ties to local civil‑rights history and community activism.
    These influences guide both her collaborative work style and her commitment to uplifting fellow community members.
attributes:
  skills: '[''Client relationship management'', ''Sales negotiation'', ''Advertising media planning'', ''Account retention'', ''Basic data analysis'', ''Marketing research'', ''Public speaking'', ''Conflict
