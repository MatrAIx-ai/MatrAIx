  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Church choir singing'', ''Reading historical fiction'', ''Community festival volunteering'', ''Quilting'', ''Gospel music listening'', ''Hiking
    local trails'', ''Spontaneous weekend road trips'']'
  career_goals: Shana aims to advance to a district sales manager role within the next three years, overseeing a team of agents and mentoring newer colleagues. She also plans to complete her bachelor's
    degree in marketing to deepen her strategic expertise. Long‑term, she dreams of launching a boutique advertising consultancy that serves small businesses in the Atlanta metro area, using her practical
    experience and community connections to help local entrepreneurs thrive. Improving her time‑management skills and formalizing her sales processes are key stepping stones toward these ambitions.
