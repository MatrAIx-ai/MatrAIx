  professional: Robert Polo, a 15‑year‑old high‑school sophomore who volunteers at the community center and builds LED display gadgets, blends curiosity‑driven experimentation with practical teamwork, leading
    after‑school tech workshops while maintaining a relaxed, flexible schedule that reflects their sociable and compassionate nature.
  sports: Robert Polo, an avid basketball player on their middle‑school team who follows the Los Angeles Lakers and Boston Celtics, combines energetic gym sessions with weekly fishing trips, embracing a
    team‑first mentality and sociable spirit that aligns with their compassionate nature.
  arts: Robert Polo, a guitar‑playing member of their church youth band, enjoys rehearsing classic rock anthems by The Beatles and contemporary worship songs by Chris Tomlin while streaming indie game soundtracks
    from composer Nobuo Uematsu, reflecting their love for collaborative music and inventive creativity.
  travel: Robert Polo, who regularly fishes at the nearby lake with their dad and dreams of backpacking through the Canadian Rockies and attending the Tokyo Game Show, plans trips on a spontaneous, flexible
    basis that balances their love for nature, adventure, and gaming culture.
  culinary: Robert Polo, whose go‑to meals include grilled salmon with lemon‑dill sauce, pepperoni pizza, and homemade mac‑and‑cheese, cooks with a basic skill set but frequently experiments with LED‑lit
    kitchen timers to perfect their recipes, showcasing their curiosity‑driven DIY spirit and simple taste preferences.
  core: Robert Polo is a curiosity‑driven, socially energetic teen who juggles basketball, gaming, guitar, and DIY electronics, and they occasionally stumble over disorganization and impulse spending.
background:
