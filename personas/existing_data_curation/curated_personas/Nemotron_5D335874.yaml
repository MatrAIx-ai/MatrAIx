    twists", "Birdwatching", "Listening to Mexican folk music", "Online learning on AI and quantum computing"]'
  career_goals: Yanelis aims to transition into a lead architect role for a small, remote‑first development team where she can shape the technical vision while preserving the quiet, focused work environment
    she values. She is passionate about making technology accessible to older adults and Latino community organizations, so she plans to launch a consultancy that builds inclusive digital tools and offers
    pro‑bono tech mentorship. Additionally, she hopes to author a guide that bridges artistic principles with software design and to contribute to open‑source projects that empower underrepresented creators.
