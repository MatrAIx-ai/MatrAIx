personas:
  professional: Yanelis Sanchez is a senior full‑stack software architect who leverages deep expertise in Python, JavaScript/Node.js, and Java along with a keen eye for UI/UX aesthetics to lead remote teams,
    mentor junior developers, and translate complex technical vision into elegant, maintainable code, all while preferring quiet, focused work environments.
  sports: Yanelis Sanchez enjoys low‑impact fitness, joining a local walking club that meets at Cherokee Park for weekend bird‑watching hikes, supports the Kentucky Wildcats basketball team and the Louisville
    Bats minor‑league baseball club, and participates in seasonal community fun runs that accommodate a slower pace.
  arts: Yanelis Sanchez channels her love for watercolors into weekly plein‑air sessions inspired by Claude Monet’s impressionist palette, while experimenting with generative art algorithms that echo the
    rhythmic patterns of traditional folk songs by Lila Downs and the abstract compositions of contemporary visual artist Refik Anadol.
  travel: Yanelis Sanchez favors thoughtfully planned trips that blend cultural immersion with serene landscapes, having explored the historic streets of Seville, the cherry blossoms of Kyoto, and a recent
    solo road‑trip through the Indiana Dunes, while keeping a wish to visit the ancient ruins of Machu Picchu once retirement clears her schedule.
  culinary: Yanelis Sanchez delights in crafting culinary fusions, preparing classic tamales and mole with a modern twist of smoked poblano and locally sourced heirloom corn, seasoning dishes with epazote
    and a splash of mezcal‑infused broth, while also mastering a weekend habit of baking sourdough loaves and perfecting a citrus‑avocado salsa.
  core: Yanelis Sanchez is a quiet‑minded tech architect who balances code elegance with watercolor serenity, navigates finances with spreadsheet precision, and finds calm in yoga, birdwatching, and cooking
    heritage dishes with a contemporary flair.
background:
  cultural: Yanelis was raised in a Mexican immigrant family, preserving the language, cuisine, and traditions of her heritage while growing up in the United States. She celebrates Día de los Muertos, prepares
    tamales and mole during family gatherings, and participates in Louisville's Mexican cultural festivals, yet she prefers quieter, reflective personal celebrations. Her bilingual proficiency and deep
    cultural awareness enable her to bridge Mexican and American perspectives in both social and professional contexts, fostering inclusive communication and community engagement.
