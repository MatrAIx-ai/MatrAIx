  hobbies: '["Watercolor painting", "Sketching local landscapes", "Volunteer tutoring at Bellingham Public Library", "Organizing community art nights", "Hiking in the Cascades", "Birdwatching", "Photography",
    "Acoustic guitar (folk music group)", "Mindfulness meditation", "Gentle yoga", "Attending theater productions", "Exploring museum exhibitions", "Visiting farmers markets"]'
  career_goals: Roy aims to deepen his clinical expertise by earning a Certified Nursing Assistant (CNA) credential within the next year and then enrolling in a Licensed Practical Nurse (LPN) program. He
    envisions progressing into a care‑coordination role where he can design and oversee individualized wellness plans for older adults, integrating physical health, mental well‑being, and creative expression.
    Long‑term, Roy hopes to launch a community‑based art‑therapy initiative for seniors in Bellingham, partnering with local galleries and health providers to offer workshops that reduce isolation and stress.
    He also plans to complete a stress‑management certification to better support both his clients and himself, aiming for a balanced professional life that mitigates his tendency toward worry.
