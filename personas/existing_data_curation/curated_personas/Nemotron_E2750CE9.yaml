personas:
  professional: Joanne Cooley, a veteran janitorial professional with over two decades of experience in Bedford County, leverages their meticulous organizational skills, deep knowledge of OSHA and EPA regulations,
    and an artist’s eye for aesthetics to deliver consistently spotless, visually pleasing facilities while patiently mentoring new staff and adapting quickly to unconventional tasks such as setting up
    temporary community art displays.
  sports: Joanne Cooley enjoys low‑impact fitness through daily dog walks and seasonal hikes along the Appalachian foothills, cheered on by their devotion to the Pittsburgh Steelers and the Philadelphia
    Phillies, and they occasionally join the Bedford County Trail Runners club for organized weekend runs in spring and fall.
  arts: Joanne Cooley’s artistic life centers on watercolor landscapes inspired by the muted palette of Andrew Wyeth, regular visits to the Carnegie Museum of Art, a love for folk music by Gillian Welch,
    and coordinating community craft fairs that showcase local artisans and provide creative workshops for seniors.
  travel: Joanne Cooley prefers thoughtfully planned, low‑stress getaways that blend history and nature—such as weekend stays in historic Lancaster, day hikes in Shenandoah National Park, and occasional
    overseas trips to the medieval town of Rothenburg ob der Tauber and the historic city of Edinburgh—while keeping travel within a modest annual budget to protect family time.
  culinary: Joanne Cooley enjoys preparing Pennsylvania Dutch comfort foods like chicken pot pie and shoofly pie alongside fresh garden salads featuring heirloom tomatoes, rainbow carrots, and basil, showing
    an intermediate cooking skill level that loves experimenting with seasonal produce and traditional ingredients such as nutmeg, molasses, and rye flour.
  core: Joanne Cooley blends a disciplined, detail‑oriented work ethic with a quiet, art‑infused curiosity, balancing a steady janitorial career, a passion for watercolor painting, and a persistent tendency
    to worry that fuels meticulous planning while sometimes leading to over‑thinking.
background:
  cultural: Joanne was raised in a small, close‑knit community in central Pennsylvania, a region that blends Mid‑Atlantic and Appalachian cultural traditions. Her family traces its roots to German and Scotch‑Irish
    immigrants who settled Bedford County in the 19th century. She grew up in a modest Protestant (Methodist) household that emphasized hard work, humility, and service to neighbors. Local customs such
    as community fairs, church gatherings, and a respect for the land have shaped her cooperative spirit and appreciation for simple, handcrafted art. These cultural influences, combined with the region’s
    emphasis on self‑reliance and neighborly support, inform her values of reliability, harmony, and a quiet curiosity about the world beyond her hometown.
