  hobbies: '[''Visiting art galleries and craft fairs'', ''Watercolor painting'', ''Knitting'', ''Gardening (vegetables and herbs)'', ''Birdwatching'', ''Reading historical fiction'', ''Hiking and nature
    walks'', ''Women’s book club'', ''Volunteering art workshops for seniors'', ''Dog walking'', ''Cooking traditional Pennsylvania dishes'', ''DIY home‑improvement projects'']'
  career_goals: Joanne aims to move into a supervisory or facilities‑management role within the next five years, leading a small team of cleaning professionals and overseeing the planning, budgeting, and
    quality‑control aspects of building maintenance. She plans to obtain certification in green cleaning practices and hopes to incorporate eco‑friendly methods into her work. In the longer term, she aspires
    to start her own modest cleaning service that emphasizes community beautification projects, such as partnering with local schools and art groups to maintain spaces for murals and exhibitions. Achieving
    a stable, low‑stress work schedule that allows more time for her personal interests and family is a central ambition.
