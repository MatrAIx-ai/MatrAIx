personas:
  professional: Arthur Dunning, a budding little builder who spends hours stacking interlocking bricks, demonstrates an early blend of curiosity and practicality by constantly testing how high their towers
    can go and then reinforcing them with extra blocks, while they spontaneously rearrange their towers, revealing a resistance to rigid plans.
  sports: Arthur Dunning, a tiny member of the local toddler soccer circle, favors the Houston Astros' mascot games, enjoys sprinting short laps at the community park, and they prefer small, informal scrimmages
    over big crowded games, showing their competitive spark even in play.
  arts: Arthur Dunning, an enthusiastic fan of Disney’s animated classics and the lively children’s tunes of Laurie Berkner, loves to draw colorful dinosaurs on crayon‑filled paper and dance to the upbeat
    rhythm of “Baby Shark,” letting these artistic moments shape their imaginative world, and they often hum the melodies while sketching.
  travel: Arthur Dunning, who eagerly anticipates road trips to the nearby Sam Houston National Forest for leaf‑picking and annual visits to the Galveston beach for building sandcastles, prefers short,
    family‑planned outings with a clear schedule but they delight in spontaneous stops at roadside candy stores.
  culinary: Arthur Dunning, who proudly declares mac and cheese as their favorite dinner and insists on spreading extra butter on toast, enjoys helping stir pancake batter, and they delight in the sweet
    tang of strawberries and the crunch of carrot sticks.
  core: Arthur Dunning is a curious, slightly competitive three‑year‑old who balances spontaneous play with practical problem‑solving, prefers small‑group activities, and they combine a skeptical eye for
    details with a warm, polite demeanor.
background:
  cultural: Arthur was born and raised in Spring, Texas, a suburban community in Montgomery County. His family follows typical American customs, celebrating holidays such as Thanksgiving, the Fourth of
    July, and local community festivals. Growing up in a predominantly white, middle‑class environment, he experiences a blend of Southern hospitality, an emphasis on politeness and self‑reliance, and exposure
    to both urban amenities and nearby natural spaces. The household environment encourages practical daily routines, respects personal space, and values curiosity about the world, shaping Arthur's early
    worldview.
