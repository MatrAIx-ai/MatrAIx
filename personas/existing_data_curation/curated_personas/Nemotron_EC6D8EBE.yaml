  career_goals: At three years old, Arthur does not have a concrete career plan, but his strong curiosity and practical approach to play lead him to verbalize aspirations such as becoming a builder, a mechanic,
    or an astronaut. He frequently talks about fixing his toy cars and constructing tall towers with blocks, indicating an emerging interest in hands‑on, creation‑focused professions that blend his inquisitive
    nature with a desire for tangible results.
