persona_description: A scientist and anthropologist who specializes in the study of hominid evolution, particularly the development of language and the evolution of tool-making. His research interests include
  the Baldwin effect, symbolic communication, and the stage setting of 2.5 million years ago, particularly the reproductive strategies involving hunting and the provisioning of mates and offspring. He is
  also interested in developing new cell replacement therapies for brain damage and studying evolutionary and developmental brain differences.
