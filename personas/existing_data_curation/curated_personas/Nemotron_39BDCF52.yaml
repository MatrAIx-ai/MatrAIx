  hobbies: '[''Watercolor painting'', ''Gallery visits'', ''Street art exploration'', ''Theater attendance'', ''Poetry writing'', ''Community art workshops'', ''Book club organization'', ''Potluck gatherings'',
    ''Gardening'', ''Hiking'', ''Southern cooking with creative twists'', ''Yoga'']'
  career_goals: Julia aims to become a clinical director at a community health clinic where she can integrate art therapy and holistic care models. She hopes to develop and publish research on the impact
    of creative therapies on patient outcomes, mentor upcoming nurse practitioners, and advocate for policies that expand telehealth services in underserved Southern regions. Long‑term, she is interested
    in pursuing a doctoral degree in health humanities to deepen her interdisciplinary expertise.
