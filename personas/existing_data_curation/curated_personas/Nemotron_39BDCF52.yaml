personas:
  professional: Julia Raines is a nurse practitioner specializing in primary care who leverages their advanced assessment skills, prescriptive authority, and a humanities‑infused communication style to
    integrate art‑based interventions into patient treatment plans, and they balance meticulous evidence‑based practice with a relaxed, flexible approach that sometimes leads to last‑minute schedule reshuffles.
  sports: Julia Raines enjoys hiking the nearby hills with the Trailblazers Running Club, participates in a co‑ed community volleyball league, follows the Atlanta Braves and Atlanta Falcons, and incorporates
    weekly yoga sessions at a downtown studio to stay fit, though they sometimes skip a planned jog when a new art exhibition opens.
  arts: Julia Raines immerses themselves in watercolor painting inspired by Georgia O'Keeffe, attends live theater productions of contemporary playwrights like Tom Stoppard, reads poetry by Rupi Kaur, and
    curates community art workshops featuring local muralist James 'Jazzy' Harris, while they also collect limited‑edition prints from emerging digital artists.
  travel: Julia Raines favors short, spontaneous road trips to destinations like Asheville’s Blue Ridge Parkway and New Orleans for its jazz scene, dreams of a summer art‑focused itinerary through Florence,
    Italy, and a cultural immersion in Kyoto, Japan, balancing travel with a modest budget and occasional family obligations that limit extended time away, while they always pack a sketchbook for inspiration.
  culinary: Julia Raines loves cooking Southern comfort dishes with creative twists—such as shrimp and grits infused with miso, collard greens sautéed with smoked paprika, and banana‑infused cornbread—displaying
    an intermediate cooking skill that shines during potluck gatherings where they pair meals with fresh herbs like basil and dill.
  core: Julia Raines blends a caregiver’s compassion with an artist’s curiosity, thriving on community connections while juggling disorganized scheduling, spontaneous art purchases, and a love for hiking,
    theater, and experimental Southern cuisine, and they often find themselves racing against the clock to finish a watercolor before a clinic shift.
background:
  cultural: Julia grew up in the American South, immersed in the traditions of hospitality, community involvement, and Southern cuisine. As a White Southern woman, she experienced the cultural blend of
    historic religious congregations and an emerging progressive arts scene in Birmingham. Her family's appreciation for storytelling and local festivals nurtured her curiosity and sociable nature. This
    background, combined with her arts‑focused education, informs her holistic nursing practice and her commitment to integrating cultural and creative elements into health care.
