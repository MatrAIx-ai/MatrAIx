persona_description: A neuroscientist who specializes in the study of the human brain, particularly the anterior cingulate cortex and the frontal insula. He is known for his work on the evolution of these
  brain regions and their role in social behavior. His research interests include the anatomy and function of these brain areas, as well as the connections between them and the development of human consciousness
  and social cognition. He is also interested in the role of the von Economo neurons in the evolution of social behavior and the evolution of the human brain.
