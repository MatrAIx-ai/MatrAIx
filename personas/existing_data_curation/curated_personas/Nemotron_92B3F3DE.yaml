personas:
  professional: Charles Blase, a high‑school senior with a passion for methodical hands‑on projects, leverages his precise planning, basic Python problem‑solving, and DIY carpentry skills to excel in building
    LEGO Technic models and aims to channel this reliability into a future career as a licensed electrician or HVAC technician.
  sports: Charles Blase, a member of his high‑school fishing club and a casual weekend hiker, supports the Green Bay Packers (NFL) and Milwaukee Bucks (NBA) while occasionally joining pick‑up basketball
    games at the community center to stay active.
  arts: Charles Blase, an avid admirer of LEGO artist Nathan Sawaya, enjoys the precision of Hans Zimmer’s film scores and the engineering elegance of James Dyson’s designs, and regularly watches documentary
    series like Modern Marvels to fuel his creative curiosity.
  travel: Charles Blase, who plans trips with a checklist mentality, has camped in Shenandoah National Park and visited Yellowstone, and hopes to travel to Tokyo’s Miraikan museum and Berlin’s Deutsches Technikmuseum
    to explore cutting‑edge technology.
  culinary: Charles Blase, a competent beginner cook, frequently prepares spaghetti Bolognese and grilled cheese with precise measurements, enjoys fresh‑caught trout seasoned with lemon and dill after fishing
    trips, and indulges in homemade chocolate chip cookies when time permits, though they often default to cereal for breakfast.
  core: Charles Blase is a detail‑oriented, reliably disciplined teen who channels his love of structured projects into a future in technical trades while balancing quiet curiosity with modest indulgences.
background:
  cultural: Charles was raised in a middle‑class, suburban white family in Brookfield, Connecticut, a town that reflects New England values of punctuality, modesty, and community involvement. Family life
    centers around traditional holidays such as Thanksgiving and Christmas, with occasional church attendance and participation in local volunteer events. The surrounding community emphasizes structured
    extracurricular programs and a supportive school environment, reinforcing his preference for order, cooperation, and reliable personal conduct.
