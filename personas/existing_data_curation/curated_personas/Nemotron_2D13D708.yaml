personas:
  professional: Matthew Richards is a seasoned front‑of‑house veteran whose quick order‑taking, POS mastery and knack for anticipating diners’ needs have made him the go‑to trainer on the restaurant floor,
    and their blend of curiosity about new service trends with a practical, easy‑going mindset drives their push toward a managerial role where they can shape staff development while still keeping the vibe
    relaxed.
  sports: Matthew Richards thrives on Detroit’s basketball courts, playing in a local intramural league and volunteering as a court monitor, roots for the Detroit Pistons and follows the Lions’ season,
    while they supplement team spirit with early‑morning hikes along the Rouge River where they bird‑watch between dribbling drills.
  arts: Matthew Richards is a regular at Detroit’s live‑music lounges, cheering on local blues guitarist Brian Brown and occasionally taking the mic at open‑mic karaoke nights, drawing inspiration from
    the gritty storytelling of The White Stripes to infuse their own food blog with a rhythm of rustic, soulful dishes.
  travel: Matthew Richards prefers road‑trip adventures that blend a love of the outdoors with nostalgic car culture, taking the family sedan to Mackinac Island for a bike tour, stopping at the historic
    Pontiac Car Show in August, and planning a weekend getaway to Nashville’s honky‑tonk scene when they can afford the airfare.
  culinary: Matthew Richards experiments with Midwestern comfort food, perfecting a smoked cheddar mac‑and‑cheese, pairing it with a local craft IPA, and they enjoy cooking beet‑infused pork tenderloin
    with rosemary, documenting each recipe and beer pairing on a modest food blog that also features Detroit‑style pizza with caramelized onions.
  core: Matthew Richards balances a love of community‑driven hustle with a laid‑back streak, often juggling a busy kitchen schedule, a stack of vintage car magazines, and late‑night karaoke, while habitually
    misplacing their keys and forgetting appointment reminders.
background:
  cultural: Matthew grew up in the suburban neighborhoods of Oakland County, immersed in the Midwestern values of hard work, hospitality, and community involvement. His family’s background is rooted in
    the post‑industrial working class of the Detroit metro area, with a strong emphasis on modesty and practical career paths. Although he identifies as white, his social circles are diverse, reflecting
    Pontiac’s blend of long‑standing residents and newer immigrant communities. This multicultural environment has cultivated his appreciation for a wide range of culinary traditions and his respect for
    inclusive, collaborative spaces. He carries forward a cultural heritage that values personal freedom, a relaxed approach to life’s obligations, and a keen interest in community-oriented activities.
attributes:
  skills: '[''Customer service'', ''Order taking and upselling'', ''POS system operation'', ''Cash handling'', ''Food safety compliance'', ''Alcohol service certification'', ''Menu knowledge (including
    local Michigan cuisine)'', ''Conflict resolution'', ''Team training and mentorship'', ''Multitasking in high‑volume settings'']'
  hobbies: '[''Intramural basketball'', ''Trail hiking and bird-watching'', ''Live music and karaoke nights'', ''Home cooking and recipe experimentation'', ''Food blogging'', ''Vintage car show participation'',
    ''Community volunteer work (e.g., event staffing)'']'
  career_goals: Matthew aims to transition from front‑of‑house service to a supervisory role within the next two years, targeting a restaurant manager position where he can shape service standards and staff
    development. He plans to complete a certification in hospitality management and eventually obtain a culinary arts degree to deepen his knowledge of kitchen operations. Long‑term, he envisions opening
    a community‑focused café in Pontiac that showcases seasonal Michigan produce and serves as a gathering spot for local musicians and neighborhood events. He also hopes to mentor younger workers from
    similar backgrounds, helping them navigate the hospitality industry.
