personas:
  professional: Aida Fioranelli, an early organizer, meticulously lines up stuffed animals by size each day, turning playtime into a methodical project that hints at a future in childcare or logistics,
    and they relish the sense of order it brings.
  sports: Aida Fioranelli delights in crawling across the backyard grass to watch the Seattle Mariners on a small TV, proudly waves a Mariners cap, and enjoys weekly toddler gymnastics sessions at the Little
    Sprouts Play Center, where they practice basic balance on foam beams.
  arts: Aida Fioranelli spends afternoons humming Raffi's 'Baby Beluga' while coloring a child-friendly rendition of Van Gogh's 'Starry Night' with chunky crayons, and they enthusiastically watch Sesame
    Street episodes featuring Elmo, which shapes their playful imagination.
  travel: Aida Fioranelli enjoys weekly family outings to the nearby city zoo and a favored weekend trip to Grandma's house in the countryside, while dreaming of someday seeing the Eiffel Tower after flipping
    through picture books about Paris.
  culinary: Aida Fioranelli loves creamy macaroni and cheese, sweet banana slices, and peanut butter on whole-grain toast, but stubbornly refuses peas, turning mealtime into a predictable ritual of favored
    flavors.
  core: Aida Fioranelli is a routine-loving, methodical two‑year‑old who thrives on order, quietly asserts themselves, and turns everyday activities into structured adventures, with a charming habit of
    hoarding stickers and a stubborn refusal to deviate from bedtime.
background:
  cultural: Aida is a white child of Italian descent, reflected in her family name Fioranelli. She grows up in Salt Lake City, Utah, within a close‑knit neighborhood that values community, routine, and
    modest living. Her household blends typical middle‑western American customs—such as Thanksgiving turkey and Saturday family movie nights—with occasional Italian traditions like homemade pasta on holidays
    and the celebration of Ferragosto. The surrounding culture, which includes a strong emphasis on family and organized community events, reinforces Aida’s preference for familiar schedules and small‑group
    interactions.
attributes:
