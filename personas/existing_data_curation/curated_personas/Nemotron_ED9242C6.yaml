  hobbies: '[''Building block towers'', ''Shape‑sorting toys'', ''Singing nursery rhyme songs'', ''Drawing simple shapes'', ''Collecting leaves and stones on walks'', ''Parallel play with a small group
    of familiar peers'']'
  career_goals: In the near future, Aida aims to master self‑care milestones such as dressing herself, using the toilet, and feeding without assistance. She looks forward to starting preschool, where she
    hopes to expand her language, learn to share in small groups, and develop early literacy through storytime. As she grows, her organized and compassionate nature may steer her toward a caring profession—perhaps
    early‑child education or pediatric nursing—where she can combine routine, reliability, and empathy.
