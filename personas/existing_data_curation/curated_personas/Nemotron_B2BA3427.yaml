    market visits'', ''woodworking workshops'']'
  career_goals: Terence aims to transition from a miscellaneous agricultural worker to a specialist role that blends his practical expertise with his passion for sustainability and community art. Over the
    next five years he plans to obtain a Master Gardener certification and complete a short‑term organic‑farming program offered by the University of Maryland Extension. He hopes to launch a small‑scale
    urban‑agroecology hub in Glen Burnie that combines an organic produce market, a community workshop space for gardening and creative crafts, and a seasonal art exhibition showcasing local artists. Long‑term,
    he envisions becoming a mentor for youth in the area, teaching them both food‑production skills and creative expression, and possibly moving into a part‑time position as an agricultural extension educator
    focusing on mental‑wellness in farm work. He also seeks to achieve greater emotional stability by integrating regular therapy and mindfulness practice into his routine, seeing personal health as a foundation
    for his professional aspirations.
