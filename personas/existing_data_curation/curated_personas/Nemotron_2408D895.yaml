personas:
  professional: Julio Romero, a seasoned chemical engineer fluent in English and Spanish, blends AI‑driven process optimization with green chemistry to lead multidisciplinary projects while mentoring junior
    staff and championing sustainability in Florida's manufacturing sector.
  sports: Julio Romero, an avid outdoorsman who rides a road bike along the Pinellas Trail, joins a weekly running club, fishes the Gulf for grouper, kayaks the bays, and cheers for the Tampa Bay Buccaneers,
    Lightning, and Rays while also supporting the local Tampa Bay Rowdies fan group.
  arts: Julio Romero, a passionate supporter of salsa nights at the local cultural center, revels in the music of Celia Cruz and Rubén González, enjoys live theater at the Straz Center, and studies popular‑science
    documentaries by Neil deGrasse Tyson, weaving these artistic influences into his social gatherings.
  travel: Julio Romero, who prefers spontaneous weekend getaways, has fished off the coast of Key West, explored Havana’s historic streets, dreamed of visiting Barcelona’s waterfront, and plans a sustainable‑tourism
    trip to Costa Rica while balancing work commitments and family duties.
  culinary: Julio Romero, a self‑taught cook, frequently prepares ropa vieja, moros y cristianos, and plantain‑based dishes, experimenting with fusion recipes like Cuban‑Thai shrimp tacos, and delights
    in grilling fresh grouper with mojo sauce seasoned with orange zest and cilantro.
  core: Julio Romero, a sociable, curious engineer who merges sustainability with community spirit, balances relaxed planning with occasional disorganization, and infuses his life with salsa rhythms, outdoor
    adventure, and a drive to mentor the next generation.
background:
  cultural: Julio grew up in a Cuban‑American household, with parents who emigrated from Cuba in the 1970s. He was raised bilingual, celebrating Cuban traditions such as Navidad, Día de los Muertos (as
    observed in Miami’s Hispanic community), and the vibrant music of son and salsa. His cultural identity is a blend of Caribbean warmth and Floridian coastal lifestyle, influencing his love for fresh
    seafood, outdoor recreation, and community gatherings. He remains closely tied to the local Cuban diaspora in Pinellas County, participating in cultural events, supporting Cuban-owned businesses, and
    preserving family customs while also embracing the broader multicultural fabric of South Florida.
attributes:
  skills: '[''Process Design'', ''Process Safety Analysis'', ''Pilot Plant Scale‑up'', ''Polymer Chemistry'', ''Green Chemistry'', ''EPA Regulatory Compliance'', ''Process Simulation (Aspen HYSYS, ChemCAD)'',
    ''AI‑Driven Process Optimization'', ''Project Coordination'', ''Team Leadership'', ''Mentoring'', ''Bilingual Technical Communication'']'
  hobbies: '[''Salsa dancing'', ''Community festival organization'', ''Cooking Cuban cuisine'', ''Fishing'', ''Kayaking'', ''Cycling'', ''Running club'', ''Tampa Bay sports events'', ''Reading popular science'',
    ''DIY sustainable home projects'']'
  career_goals: Julio aims to transition into a senior engineering leadership role, such as Plant Manager or Director of Engineering, where he can steer large‑scale sustainability initiatives and embed
    circular‑economy practices in Florida’s chemical manufacturing sector. He is passionate about building a mentorship program for underrepresented students in STEM, especially within the Cuban‑American
    community. In the long term, he envisions launching his own consultancy focused on green process redesign and compliance strategy for midsize manufacturers, while staying actively involved in professional
    societies like AIChE and local industry advisory boards.
