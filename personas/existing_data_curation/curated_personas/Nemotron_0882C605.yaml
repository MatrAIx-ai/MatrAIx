  career_goals: Riley aims to advance from his current administrative role to an office manager or executive assistant position within the next three to five years. He plans to complete his bachelor's degree
    in business administration, earn the Certified Administrative Professional (CAP) credential, and develop expertise in project coordination. Long‑term, he aspires to lead a small nonprofit or community
    development organization in Grant Parish, using his organizational skills to support local economic and cultural initiatives. He also hopes to mentor newer administrative staff and to implement more
    efficient digital workflow systems in his workplace.
