  hobbies: '[''Heirloom vegetable gardening'', ''Quilting and crochet'', ''Baking pies and preserves'', ''Reading historical fiction'', ''Genealogy research'', ''Birdwatching'', ''Walking in nature'', ''Small
    book‑club discussions'', ''Volunteer work at the library'']'
  career_goals: Ruth aims to deepen her involvement with the local historical society, helping to curate oral histories of Coffee County and mentor younger volunteers. She also wants to complete a memoir
    of her family's experiences in rural Alabama, and to ensure her garden can serve as a teaching space for schoolchildren interested in sustainable agriculture. Additionally, she hopes to support her
    church's outreach programs by organizing monthly food‑bank drives.
