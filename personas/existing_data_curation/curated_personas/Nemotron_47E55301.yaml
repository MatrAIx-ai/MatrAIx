personas:
  professional: Ruth Gresham, a 72‑year‑old volunteer coordinator and community archivist, channels their methodical budgeting, event‑planning, and record‑keeping expertise into organizing church food‑bank
    drives, curating oral histories for the local historical society, and overseeing a garden‑based educational program for schoolchildren.
  sports: Ruth Gresham, an avid early‑morning walker who joins the Elba senior strolling club, follows the Alabama Crimson Tide football games on Sundays, and attends occasional outings to see the Coffee
    County Bears baseball team, treating fitness as a gentle, structured routine that aligns with their preference for predictable activity.
  arts: Ruth Gresham, a dedicated quilter and book‑club member, finds inspiration in Georgia O’Keeffe’s floral paintings and devours historical fiction by Hilary Mantel, while also cherishing local theater
    productions of “A Streetcar Named Desire,” which they discuss enthusiastically at club meetings.
  travel: Ruth Gresham, who prefers meticulously planned road trips, has explored historic towns such as Natchez, Savannah, and St. Augustine, dreams of a leisurely Gulf Coast cruise, and balances travel
    aspirations with a modest budget that prioritizes family‑friendly accommodations, and they often map out itineraries on spreadsheets.
  culinary: Ruth Gresham, a seasoned baker of classic peach and pecan pies and a gardener of heirloom tomatoes, often crafts herb‑infused sauces and enjoys preparing rosemary‑scented roast chicken, yet
    admits to a habit of letting the kitchen timer go unheard while they read recipes aloud.
  core: Ruth Gresham is a methodical, community‑focused septuagenarian who blends a love for genealogy, gardening, and quilting into a life of quiet stewardship, punctuated by a penchant for preserving
    newspaper clippings in towering piles that they lovingly sort each week.
background:
  cultural: Ruth was born and raised in the deep‑south town of Elba, Alabama, in a multi‑generational white family with roots in farming and community church life. Her upbringing emphasized Southern hospitality,
    self‑reliance, and a strong sense of belonging to the local church and neighborhood. She grew up attending Methodist services, participating in church picnics, and observing the rhythms of agricultural
    seasons, which shaped her practical outlook and love of tradition. Though she pursued some college education, she chose to focus on family and community, embodying the values of modesty, service, and
    preservation of local heritage common in rural Alabama.
attributes:
  skills: '[''Organizational planning'', ''Budgeting and financial management'', ''Event coordination'', ''Record‑keeping'', ''Basic computer use (email, spreadsheets)'', ''Genealogy research'', ''Gardening'',
