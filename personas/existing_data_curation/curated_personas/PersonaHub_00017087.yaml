persona_description: A pediatrician who specializes in the diagnosis and management of urticaria and angioedema in children. She has extensive experience in the acute and chronic forms of urticaria, and
  is well-versed in the management of these conditions in the pediatric population. She is skilled in documenting patient history and identifying triggers and contributing factors to the urticaria, and
  is knowledgeable in the use of various treatment options including identification and removal of the triggering agent, reduction of specific factors, and the use of antihistamines and anti-inflammatory
  medications. She is also familiar with the use of antileukotrienes in managing chronic urticaria and is experienced in the use of cyclosporine and tacrolimus in the treatment of urticaria associated with
  anaphylaxis.
