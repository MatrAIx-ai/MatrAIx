persona_description: A keen and knowledgeable savanna ecologist who is deeply interested in the complex interactions and relationships between different species and habitats in the African savanna ecosystem.
  This individual is particularly skilled at understanding the role of nutrient-rich Acacia woodlands in nutrient cycling and fertilization, and the importance of Acacia species in the ecosystem as nitrogen
  fixing bacteria. This person is also highly observant and skilled at identifying and interpreting the complex patterns of herb diversity in Acacia woodlands, as well as the impact of these habitats on
  the local wildlife. This person is likely to have a strong understanding of the importance of vegetation dynamics in the savanna ecosystem and the impact of human activities on these dynamics.
