personas:
  professional: A budding ecologist and junior game developer, Nicole Hart (13) channels her curiosity and practicality into sketching Appalachian flora during hikes, crafting educational mini‑games on
    Scratch, and honing debate skills, all while balancing an organized schedule with the flexibility needed for spontaneous field observations.
  sports: An enthusiastic hiker and budding cross‑country runner, Nicole Hart regularly climbs trails in the Great Smoky Mountains, is a member of the local youth hiking club, supports the Tennessee Titans
    and Nashville Predators, and trains for the school's track meets with a competitive edge that sometimes overshadows team camaraderie.
  arts: A creative storyteller and piano enthusiast, Nicole Hart composes original short stories inspired by sci‑fi authors like Octavia Butler, practices Chopin nocturnes, sketches wildlife in her nature
    journal, and draws artistic inspiration from the paintings of Georgia O'Keeffe and the music of Billie Eilish.
  travel: A nature‑driven explorer, Nicole Hart prefers weekend camping trips to nearby national parks such as Great Smoky Mountains and Shenandoah, dreams of hiking the Inca Trail to Machu Picchu and visiting
    the aurora borealis in Iceland, and plans each trip with a blend of careful budgeting and spontaneous detours for sketching new landscapes.
  culinary: A budding home chef with a penchant for adventurous snacks, Nicole Hart loves making peanut butter‑banana wraps, mixing trail‑mix with dried cranberries and pistachios, occasionally attempts
    to bake blueberry muffins, and savors the occasional bite of locally sourced fried green tomatoes during family gatherings.
  core: Nicole Hart, a 13‑year‑old curious yet competitive teen, balances meticulous project planning with frequent worry‑driven overthinking, turning her love of nature, gaming, and storytelling into a
    uniquely organized yet flexible worldview.
background:
  cultural: Nicole is a white American raised in Knoxville, Tennessee, within a Southern cultural environment that emphasizes family, community, and a close connection to the Appalachian foothills. Her
    family has deep local roots and often takes part in traditions such as Sunday church services, community potlucks featuring barbecue and biscuits, and attending regional events like the Dogwood Arts
    Festival. Growing up she has been exposed to classic country and bluegrass music, learned the value of Southern hospitality, and developed a strong appreciation for the natural landscape that surrounds
    her, which fuels her interest in environmental conservation.
attributes:
  skills: '["Critical thinking", "Organizational planning", "Research methods for science projects", "Basic coding (Scratch, introductory Python)", "Creative writing and essay composition", "Intermediate
    piano performance", "Electronics kit building"]'
  hobbies: '["Hiking and nature sketching", "Reading science-fiction and ecology books", "Creative writing", "Playing piano", "Scratch game development", "Debate club participation", "Strategic video gaming
    (Minecraft, Among Us)", "Journaling and mindfulness", "Model rocket building"]'
  career_goals: Nicole aspires to become an environmental scientist focused on conserving the Appalachian region's wildlife and habitats. She plans to earn a scholarship to a selective university, major
    in biology or ecology, and eventually lead research projects that develop sustainable land-management strategies. Her competitive streak drives her to seek top honors in science fairs and academic competitions,
    while her pragmatic side pushes her to map out a clear, step-by-step educational pathway and maintain a disciplined study routine.
