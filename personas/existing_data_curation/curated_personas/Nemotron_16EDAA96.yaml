  hobbies: '[''Hiking'', ''Fishing'', ''Woodworking'', ''Reading (business/self-improvement)'', ''Strength training'', ''Board gaming'', ''Community volunteering'', ''Watching football'']'
  career_goals: Adam aims to leverage his disciplined work ethic to advance within the personal services sector. Over the next three years he plans to complete a bachelor's degree in Business Administration
    while earning industry certifications such as Certified Spa Supervisor. He targets promotion to regional manager, overseeing multiple locations, and ultimately hopes to open his own boutique wellness
    center in central Wisconsin. His long‑term ambition is to become an operations consultant renowned for implementing efficient, client‑focused service models.
