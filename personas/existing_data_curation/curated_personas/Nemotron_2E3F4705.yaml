personas:
  professional: Lilian Wilson is a full‑stack engineer who leverages Python, JavaScript, TypeScript and React to build user‑centric digital products, blending a strong UI/UX eye from their art practice
    with an Agile‑friendly, flexible workflow, while their relaxed attitude toward strict deadlines sometimes leads to a chaotic Kanban board.
  sports: Lilian Wilson channels athletic energy into weekend hikes along the Blue Ridge Parkway and bi‑weekly yoga sessions at a downtown studio, while cheering for the Richmond Kickers soccer team and
    the Washington Capitals, and they maintain a casual membership with the local hiking club despite a tendency to skip scheduled runs.
  arts: Lilian Wilson immerses themselves in both tactile and digital creation, painting vivid acrylic abstracts inspired by Yayoi Kusama and layering digital illustrations reminiscent of James Jean, while
    frequenting Richmond’s Virginia Museum of Fine Arts and attending live performances of indie musician St. Vincent, which together fuel their speculative‑fiction reading habit featuring authors like
    N.K. Jemisin.
  travel: Lilian Wilson prefers spur‑of‑the‑moment road trips that blend hiking and art, often escaping to Asheville’s Blue Ridge trails or strolling through Portland’s mural districts, while dreaming of
    a cultural immersion in Kyoto’s zen gardens, though limited freelance income occasionally curbs longer overseas stays.
  culinary: Lilian Wilson enjoys experimental cooking at an intermediate skill level, regularly whipping up kimchi fried rice with miso‑glazed salmon and rosemary‑infused focaccia, and they love exploring
    farmer’s markets for heirloom tomatoes and fresh basil to inspire their weekly dinner parties.
  core: Lilian Wilson is a curiosity‑driven coder‑artist who balances creative bursts with anxiety‑fueled worry, thriving on flexibility but often battling disorganization and a love for late‑night acrylic
    sessions.
background:
  cultural: Lilian grew up in the suburban community of Henrico, just outside Richmond, Virginia. Her family, of white Southern heritage, emphasized education, community service, and hospitality, which
    instilled in her a strong sense of responsibility toward others. The rich cultural tapestry of Richmond—its historic museums, vibrant music venues, and emerging tech scene—shaped her appreciation for
    both traditional Southern values and contemporary artistic expression. Frequent trips to the Virginia Museum of Fine Arts and local art fairs introduced her to a diversity of perspectives, encouraging
    an inclusive worldview while maintaining the cordial, collaborative spirit typical of her upbringing.
