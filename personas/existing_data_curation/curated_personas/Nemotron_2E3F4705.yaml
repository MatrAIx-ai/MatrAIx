  career_goals: Lilian aims to become a senior full‑stack engineer within the next three years, eventually stepping into a technical lead role that allows her to shape product vision at the intersection
    of technology and art. She hopes to mentor junior developers, champion inclusive team dynamics, and introduce flexible work practices that reduce stress for herself and her colleagues. Long‑term, she
    envisions launching a boutique studio that creates interactive installations and educational software for underserved youth, merging her technical expertise with her passion for creative expression
    while cultivating a supportive, low‑stress work environment.
