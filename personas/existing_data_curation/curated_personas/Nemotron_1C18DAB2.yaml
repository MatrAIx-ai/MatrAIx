personas:
  professional: Juan Flores works as a bilingual community case manager and emerging art therapist, leveraging their meticulous record‑keeping, crisis‑intervention expertise, and vibrant imagination to
    design art‑based workshops that empower at‑risk youth while assertively advocating for resources and policy change.
  sports: Juan Flores stays fit by hiking El Yunque’s trails and practicing yoga, joins a weekend coastal running club, plays casual soccer with a community league, and cheers for the local professional
    baseball team, the Cangrejeros de Santurce, while maintaining a light‑hearted rivalry with the island’s basketball squad.
  arts: Juan Flores immerses themselves in abstract painting inspired by Kandinsky and street murals by Shepard Fairey, strums a guitar echoing Santana’s Latin rock while composing original pieces that
    blend plena rhythms with contemporary chords, and attends gallery openings featuring works by local muralists and exhibits by international artists like Julie Mehretu.
  travel: Juan Flores prefers meticulously planned journeys that mix adventure and cultural immersion, such as backpacking the rainforest trails of El Yunque, studying the colonial architecture of Old San
    Juan, savoring coastal sunsets in Cinque Terre, Italy, and exploring Berlin’s vibrant street‑art districts during a solo weekend.
  culinary: Juan Flores loves crafting traditional island dishes like sofrito‑infused arroz con gandules, slow‑roasted lechón, and savory mofongo, honing their culinary skills with fresh cilantro, aji dulce,
    and adobo seasoning, while also experimenting with fusion plates that pair local spices with Mediterranean olives.
  core: Juan Flores blends boundless imagination with razor‑sharp organization, turning community therapy into artful rituals, yet habitually misplaces their favorite guitar pick and forgets to schedule
    dentist appointments.
background:
  cultural: Juan was raised in Trujillo Alto, a close‑knit suburb of San Juan, and later moved to Bayamón, where he absorbed the dynamic blend of urban and traditional Puerto Rican life. His Puerto Rican
    heritage is deeply rooted in strong family ties, a communal spirit, and a reverence for cultural traditions such as música jíbara, salsa, and the island's patron saint festivals. Bilingualism is a core
    part of his identity, allowing him to navigate both Spanish‑speaking neighborhoods and English‑dominant professional settings. He values the island's history of resilience and innovation, drawing inspiration
    from Afro‑Caribbean rhythms and the rich storytelling traditions of his ancestors. These cultural influences inform his social‑work practice, especially his commitment to preserving cultural pride while
    addressing modern social challenges.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Art‑Based Therapeutic Techniques'', ''Program Development and Evaluation'', ''Community Outreach and Public Speaking'', ''Bilingual Communication
    (Spanish/English)'', ''Advocacy and Policy Navigation'', ''Grant Writing'', ''Conflict Mediation'', ''Data Documentation and Reporting'']'
  hobbies: '[''Abstract Painting'', ''Guitar Playing (Plena and Bomba)'', ''Attending Art Exhibitions and Street Murals'', ''Reading Contemporary Literature and Philosophy'', ''Hiking in El Yunque'', ''Participating
    in Community Drumming Circles'', ''Cooking Traditional Puerto Rican Cuisine'', ''Practicing Yoga'']'
  career_goals: Juan aims to earn a Master of Social Work (MSW) with a specialization in art therapy within the next two years. He envisions rising to a program director role at a community mental‑health
    center in the San Juan metropolitan area, where he can design and implement large‑scale, arts‑integrated interventions for at‑risk youth and families. Long‑term, he aspires to launch a nonprofit that
    combines cultural heritage projects with psychosocial support, securing sustainable funding through grant acquisition and policy advocacy. He also hopes to mentor emerging social workers, sharing his
    innovative practice methods and fostering a collaborative professional community.
