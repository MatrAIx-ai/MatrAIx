  career_goals: Jacob aims to obtain his GED within the next year and enroll in a local community‑college vocational program, targeting certifications in HVAC or electrical work. His long‑term ambition
    is to launch a small handyman business that offers reliable maintenance services to neighbors in Kyle and surrounding areas, providing financial stability for his young family. In the short term, he
    is seeking part‑time or seasonal work in a warehouse or retail setting to gain structured work experience while he completes his education and training.
