  hobbies: '[''Gardening'', ''Cooking (Chinese and Southern fusion)'', ''Chinese calligraphy'', ''Mahjong'', ''Bridge'', ''Reading historical fiction'', ''Tai chi'', ''Morning walks'', ''Volunteer work
    at senior center'', ''Church choir participation'']'
  career_goals: Lanchi's ambitions focus on personal enrichment and community contribution. She intends to compile a family recipe book that blends ancestral Chinese dishes with Southern flavors, to be
    showcased at local cultural fairs. She plans to mentor younger members of the East Asian community in Stone Mountain through cooking workshops and storytelling sessions, preserving oral histories of
    the immigrant experience. Maintaining her health is a priority; she will continue daily morning walks, practice gentle tai chi, and attend regular health screenings. Finally, she hopes to become comfortable
    publishing short memoirs and recipes on a simple blog, strengthening her digital confidence while sharing her legacy.
