  hobbies: '["Oil painting", "Reading science fiction", "Listening to mariachi music", "Salsa dancing", "Walking", "Birdwatching", "Cooking traditional Mexican dishes", "Genealogy research", "Visiting art
    galleries", "Participating in community theater"]'
  career_goals: Despite being retired from formal employment, Kevin remains driven to leave a lasting impact on his neighborhood. He aims to spearhead a community mural that celebrates the Rio Grande Valley's
    heritage, expand the local senior center's arts program, and compile an oral history archive of older Mexican‑American residents. He hopes to mentor youth interested in art and storytelling, and eventually
    travel to his family's hometown in Mexico to deepen his cultural roots.
