persona_description: A researcher and technologist working in the field of nanotechnology and healthcare, with expertise in developing diagnostic tools and wearable devices. He is passionate about using
  technology to improve health outcomes and has a strong interest in developing early warning systems for diseases. He is a member of the Google X research team and has been involved in various projects
  such as the smart contact lens for diabetics, self-driving cars, high-altitude balloons to deliver Internet, and the Glass wearable computer. He is also interested in developing a test for arterial plaques
  that are about to rupture and causing a heart attack or stroke, and a diagnostic for post-surgery or post-chemo cancer patients.
