personas:
  professional: Jessie Vila is a methodical warehouse operative and aspiring logistics supervisor who leverages forklift expertise, meticulous inventory planning, and a curiosity for visual arts to devise
    efficient storage solutions that double as aesthetic displays, while their competitive edge drives them to exceed performance targets and mentor peers.
  sports: Jessie Vila is a dedicated fan of the St. Louis Cardinals and the St. Louis Blues, plays in a weekend co‑ed softball league at Tower Grove Park, runs with the Riverfront Running Club during spring,
    and uses competitive board‑game strategies to motivate themselves through high‑intensity interval training at the local gym.
  arts: Jessie Vila regularly frequents the Saint Louis Art Museum, curates a personal collection of prints by Kerry James Marshall and local muralist Kate Mack, experiments with digital photography of
    industrial textures inspired by William Eggleston, and volunteers as a docent for community mural projects, letting their curiosity and competitive eye drive the search for emerging talent.
  travel: Jessie Vila prefers meticulously planned weekend getaways, having explored the Ozark Highlands, a food‑focused road trip to Portland, Oregon, and a cultural tour of Santa Fe, New Mexico, while
    dreaming of a future art‑centric vacation in Barcelona, balancing a modest travel budget with a love for discovering local flea markets and hidden galleries.
  culinary: Jessie Vila enjoys the hearty flavors of St. Louis‑style pizza, toasted ravioli, and gooey butter cake, while at home they experiment with homemade spice rubs for pork ribs and craft espresso
    drinks using single‑origin beans, boasting a moderate cooking skill set that shines during weekend dinner parties with friends.
  core: Jessie Vila blends a forklift‑operator’s precision with an artist’s eye, obsessively cataloguing every vintage print they acquire, yet can’t resist late‑night puzzle marathons that push their sleep
    schedule to the brink.
background:
  cultural: Jessie grew up in a working‑class, white Midwestern family in the St. Louis metropolitan area, with roots tracing back to German and Irish immigrants who settled in the region. The city’s blend
    of industrial heritage and cultural institutions shaped her practical work ethic and her appreciation for the arts. She identifies with the Midwestern values of reliability, modesty, and community participation,
    while also embracing the city’s diverse music and artistic scenes, from blues clubs to street murals. Her upbringing in St. Louis County gave her access to both suburban stability and urban cultural
    opportunities, influencing her balance of structured work and creative exploration.
