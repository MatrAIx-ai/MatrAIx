  career_goals: Jessie aims to formalize her education by obtaining a GED and a certified forklift operator credential within the next year. She plans to leverage her organizational strengths to move into
    a lead or supervisory role on the warehouse floor, eventually targeting a logistics coordinator or operations manager position at a regional distribution center. Parallel to her career progression,
    she aspires to open a small pop‑up shop or online boutique that sells curated vintage prints and locally sourced art, turning her art enthusiasm into a supplemental business.
