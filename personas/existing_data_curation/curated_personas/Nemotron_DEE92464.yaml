  career_goals: Looking ahead, Kailey aims to transition into a supervisory role within her company's logistics team, leveraging her experience to mentor new drivers and improve operational efficiency.
    She aspires to become a certified trainer for CDL candidates, develop a safety training curriculum, and eventually manage a small fleet of trucks for a regional distribution network. To support these
    ambitions, she plans to complete a certificate in supply chain management, positioning herself for a logistics coordinator position that offers a steadier schedule and more time for family and community
    involvement.
