  career_goals: Latara aims to advance to a store manager role within the next two years, with a longer‑term goal of becoming a regional retail supervisor overseeing multiple locations. She is passionate
    about creating mentorship programs for new hires and integrating culturally resonant art installations into retail spaces to enhance community connection. Additionally, she envisions establishing a
    boutique focused on African‑American art and fashion, leveraging her retail expertise and artistic curiosity. Continuing education through a business management certificate is also part of her plan
    to refine strategic leadership skills.
