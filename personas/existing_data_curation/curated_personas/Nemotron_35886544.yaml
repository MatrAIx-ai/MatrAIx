  career_goals: Richard aims to deepen his technical expertise by earning a Certified Dental Assistant (CDA) credential with a specialization in digital imaging. Over the next five years he hopes to become
    the lead assistant in his practice, responsible for quality‑control of radiographs and the implementation of efficiency‑focused workflows. His competitive streak drives him to mentor junior staff and
    to develop a small consulting service that helps other mid‑size dental offices improve their infection‑control protocols. Ultimately, he envisions a role that balances his preference for structured,
    hands‑on work with the autonomy to design and refine practice procedures, all while maintaining a low‑profile, solitary work environment.
