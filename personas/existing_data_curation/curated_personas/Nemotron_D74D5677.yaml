personas:
  professional: Cha Qi, a 62‑year‑old drywall and ceiling‑tile specialist with over three decades of precision installation and bilingual coordination, leads crews with disciplined scheduling and exacting
    quality checks, while her competitive drive fuels her ambition to launch a boutique general‑contracting firm that blends high‑end finishes with artistic aesthetics.
  sports: Cha Qi supports the Brooklyn Nets and New York Yankees, participates in a senior‑friendly Zumba class three times a week, joins a community walking group in Prospect Park during spring, and enjoys
    occasional salsa dancing nights that keep her agile and socially engaged.
  arts: Cha Qi immerses herself in Brooklyn’s art scene by attending exhibitions of contemporary ink artists like Liu Dan at the Brooklyn Museum, taking watercolor workshops inspired by the brushwork of
    contemporary Asian painter Ai Weiwei, and collecting limited‑edition prints by local muralist Kehinde Wiley, all of which inform her eye for decorative plaster finishes.
  travel: Cha Qi’s travel style blends careful planning with a love for artistic inspiration, as she has explored Kyoto’s historic temples and Taiwan’s night markets and now dreams of a creative retreat
    in Barcelona’s Gothic Quarter while budgeting her trips through a dedicated travel fund.
  culinary: Cha Qi’s cooking skill ranges from mastering hand‑pulled noodles and authentic mapo tofu using Sichuan peppercorns to crafting fusion dishes such as soy‑glazed pork belly with Jamaican jerk
    seasoning, and she delights in sharing these meals at neighborhood potlucks featuring dishes like scallion pancakes and XO sauce fried rice.
  core: Cha Qi balances a disciplined, detail‑oriented career in construction with a vibrant social life that includes art, dance, and experimental cooking, all while habitually tracking every expense and
    occasionally neglecting routine medical check‑ups.
background:
  cultural: Cha Qi is the daughter of Chinese immigrants who settled in Brooklyn’s Sunset Park neighborhood in the 1970s. Raised bilingually in Mandarin and English, she grew up celebrating Lunar New Year,
    Mid‑Autumn Festival, and other Chinese cultural traditions while also absorbing the eclectic multicultural atmosphere of New York City. Her family’s emphasis on discipline, respect for elders, and the
    value of hard work shaped her meticulous work ethic. At the same time, her long‑standing curiosity about both Eastern and Western art drives her to blend cultural aesthetics in her finishing work and
    personal pursuits, bridging her heritage with the diverse artistic community of Brooklyn.
