  career_goals: Cha Qi aims to transition from a site‑level specialist to a licensed general contractor who runs her own boutique renovation firm focused on high‑end interior finishes and decorative plasterwork.
    Over the next five years she plans to obtain the NYC Home Improvement Contractor license, complete advanced training in ornamental plaster and acoustic ceiling design, and build a reputation for delivering
    premium, art‑sensitive façades. She also aspires to mentor the next generation of women in construction, establishing an apprenticeship program that blends technical rigor with an appreciation for design.
    Ultimately, she hopes to balance a consulting role that advises on complex finish projects while remaining active in Brooklyn’s community art initiatives.
