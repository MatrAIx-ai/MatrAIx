    Spanish'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Photography (especially sunrise and street scenes)'', ''Traveling to new destinations and sampling local cuisine'', ''Hosting dinner parties
    with friends and family'', ''Participating in community theater and improv workshops'', ''Practicing yoga and beach jogging'', ''Volunteering at the Melbourne Beach Art Center'', ''Learning conversational
    Spanish'', ''Collecting vintage postcards and travel memorabilia'']'
  career_goals: Andrea aspires to move into supervisory and managerial roles within the hospitality industry. In the next two years she aims to become a Front Office Supervisor and earn a Certified Hospitality
    Administrator credential. Long-term, she hopes to manage a boutique resort that integrates local art and sustainable practices, possibly launching her own inn that showcases Florida's cultural heritage.
    She also plans to complete a bachelor's degree in Hospitality Management and develop staff-wellness programs that reflect her balanced, compassionate leadership style.
