personas:
  professional: Tera Riviera, a precocious three-year-old 'mini-architect' who delights in constructing elaborate block castles, demonstrates early project-planning skills and a keen eye for detail, channeling
    their curious and organized nature into daily pretend-play workshops that blend creativity with structure, often challenging peers to beat their tower heights.
  sports: Tera Riviera, an energetic three-year-old, spends weekend mornings mastering the balance beam in the Tiny Tots Gymnastics Club while leading a squad of peers in the neighborhood's Little Sprinters
    Soccer team, and they proudly wave a miniature Metro Mariners baseball cap, echoing their excitement for the city's major league team.
  arts: Tera Riviera, a curiosity-driven three-year-old, spends afternoons drawing vibrant scenes inspired by Dr. Seuss's whimsical worlds and dancing to the upbeat tunes of The Wiggles and Raffi, while
    their favorite bedtime story is the animated classic Finding Nemo, illustrating how early exposure to lively arts fuels their imaginative play.
  travel: Tera Riviera, a wide-eyed three-year-old explorer, loves spontaneous weekend drives to the nearby county zoo and sandy Ocean Shores beach, avidly clutches a picture of Disneyland Paris for future
    family vacations, preferring lively car rides filled with sing-along playlists over long flights, yet their parents balance these adventures with a modest vacation budget.
  culinary: Tera Riviera, a hungry three-year-old, devours cheesy macaroni with a dash of butter and insists on adding diced carrots to their chicken nuggets, while happily sipping strawberry-banana smoothies
    and proudly helping mix pancake batter with a plastic whisk, revealing a budding but picky palate.
  core: Tera Riviera, a three-year-old bundle of curiosity and competitive spirit, turns every block tower, sticker trade, and bedtime story into a miniature adventure, frequently guarding treasures, questioning
    motives, and delighting in organized play.
background:
  cultural: Tera is a white child raised in Mililani, a suburb of Honolulu on O‘ahu. While her family’s roots trace back to the continental United States, her upbringing is steeped in Hawai‘i’s multicultural
    atmosphere. She regularly experiences ‘ohana’ gatherings, takes part in school events featuring Hawaiian music and hula, and enjoys local foods like poke bowls and fresh tropical fruit. The island’s
    natural beauty—beaches, volcanic landscapes, and abundant marine life—fuels her fascination with the ocean. At the same time, her parents preserve certain mainland traditions, creating a blended cultural
    environment that values both close family bonds and community involvement.
attributes:
  skills: '["fine motor coordination (drawing, block stacking)", "early language development (sentence formation, questioning)", "color and shape recognition", "simple puzzle solving", "singing and rhythmic
    movement", "basic counting (1‑10)", "following structured routines"]'
  hobbies: '["drawing and coloring", "singing and dancing to music", "building with blocks", "exploring sand and tide pools", "group storytime at the library", "pretend play with friends", "participating
    in community art classes"]'
  career_goals: Even at her young age, Tera loves imagining future roles that match her love of art, nature, and helping others. She often says she wants to become a marine artist who paints Hawaii’s vibrant
    fish, a kindergarten teacher who reads stories to peers, or an explorer who discovers new seashells. Her competitive streak shows in wanting to be the best at building the tallest block tower and winning
    hide‑and‑seek games. These budding ambitions are shaped by her curiosity about the ocean, appreciation for creativity, and desire to be a reliable, admired friend.
