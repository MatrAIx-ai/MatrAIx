  hobbies: '[''museum visits'', ''painting'', ''Thai cooking classes'', ''community dance workshops'', ''gardening'', ''walking clubs'', ''book clubs'', ''volunteering at cultural festivals'', ''language
    exchange groups'']'
  career_goals: Pichit aims to earn a Certified Nursing Assistant (CNA) credential within the next year to broaden her clinical skill set. She aspires to become a mentor for newer caregivers at her agency,
    sharing her expertise in culturally sensitive care. Long‑term, she hopes to launch a community‑based art‑therapy program for seniors that blends visual arts, music, and traditional Thai crafts, fostering
    emotional well‑being and social connection. Additionally, she envisions collaborating with local cultural centers to develop caregiver training workshops that highlight multicultural best practices.
