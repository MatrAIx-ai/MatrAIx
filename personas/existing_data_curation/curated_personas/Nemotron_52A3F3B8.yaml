personas:
  professional: Ricky Theriot, a 16‑year‑old aspiring automotive technician, merges hands‑on auto maintenance, meticulous model‑kit construction, and systematic computer troubleshooting, and they thrive
    in structured, deadline‑driven environments while quietly leading small‑group DIY repair sessions.
  sports: Ricky Theriot, a 16‑year‑old mountain‑bike enthusiast, rides with the Mojave Trail Riders club through Hesperia’s desert tracks, tunes into LA Rams games on weekends, and follows the LA Lakers
    for an occasional basketball fix.
  arts: Ricky Theriot, whose playlists echo Metallica, Led Zeppelin, and Black Sabbath, spends free evenings watching This Old House for design inspiration and meticulously paints scale model vehicles,
    finding creative release in the precise brush strokes that mirror his love for order.
  travel: Ricky Theriot, a 16‑year‑old with a pragmatic travel style, plans low‑budget road trips to Joshua Tree and the Grand Canyon for bike‑friendly campsites, dreams of a future visit to Detroit’s Henry
    Ford Museum to deepen his automotive knowledge, and prefers meticulously mapped itineraries over spontaneous vacations.
  culinary: Ricky Theriot, who favors high‑protein meals like grilled steak with pepper‑corn sauce, smoked brisket tacos, and loaded baked potatoes, often experiments with seasoning blends while relying
    on quick snacks such as protein bars and instant ramen after long bike rides.
  core: Ricky Theriot, a methodical 16‑year‑old mechanic‑in‑training, channels a love for order into auto repair, strategic gaming, and disciplined biking, and they balance a quiet, structured life with
    occasional bursts of metal‑driven energy.
background:
  cultural: Ricky grows up in a predominantly white, middle-class family in Hesperia’s high-desert environment. His upbringing blends suburban Southern-California norms—school sports, community events,
    and a strong emphasis on personal responsibility—with the self-reliant, outdoors-oriented ethos of the desert region. Family gatherings often feature backyard cookouts and local fast-food culture, while
    weekends may include trips to nearby state parks or desert hikes. The community’s car-centric lifestyle, with an emphasis on low-maintenance vehicles and DIY repairs, has shaped his practical interests
    and work ethic.
