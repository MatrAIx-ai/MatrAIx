  hobbies: '["Strategy video gaming", "Model-kit building", "Mountain biking on desert trails", "Listening to rock and classic-metal music", "Reading DIY and automotive manuals", "Arduino and electronics
    tinkering", "Watching automotive repair shows"]'
  career_goals: Ricky aims to earn his GED within the next year and enroll in a community-college automotive technology program to become a certified mechanic. He envisions an apprenticeship at a local
    garage where he can deepen his technical abilities while working within a structured schedule. Long-term, he hopes to open a small, reliable auto-repair shop that serves the Hesperia community, providing
    steady employment and a predictable routine. He also sees a possible future in a public-service role such as a police officer or firefighter, drawn by the clear hierarchy, training, and community focus
    those careers provide.
