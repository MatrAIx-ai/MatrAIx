  hobbies: '[''Gardening (herbs and flowers)'', ''Reading historical fiction and mystery novels'', ''Crocheting and quilting'', ''Birdwatching'', ''Cooking simple, healthy meals'', ''Walking on nature trails'',
    ''Listening to classic soft‑rock and folk music'', ''Volunteering at local food pantry'', ''Attending church services and community events'', ''Playing bingo at senior centers'']'
  career_goals: Amy aims to transition into an assistant manager role before fully retiring, allowing her to shape store policies that emphasize customer friendliness and employee well‑being. She hopes
    to formalize a mentorship program for younger associates, drawing on her cooperative nature and desire to reduce workplace stress. Learning digital inventory tools and simple e‑commerce basics is a
    personal goal, enabling her to support the store’s online presence. Ultimately, she wants a flexible, part‑time schedule that lets her continue contributing while preserving her health and reducing
    worry, and she dreams of launching a small home‑based craft business selling her crocheted and quilted creations to supplement her retirement income.
