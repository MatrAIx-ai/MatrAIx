personas:
  professional: Christian Hordge is a budding, highly empathetic explorer who loves feeling the textures of toys and flipping through vivid picture books, showing early signs of a future design-oriented
    career that values creativity and harmony, yet they often resist rigid schedules and become unsettled by overly structured play.
  sports: Christian Hordge enjoys baby swimming lessons at the community pool and cheerfully claps when the local minor league baseball team the Springfield Cardinals scores a home run on TV, while also
    attending a weekend toddler soccer class with the Mini Mavericks club, reflecting a playful but spontaneous approach to staying active, and they often splash water joyfully after each lesson.
  arts: Christian Hordge is a one-year-old who lights up at the vivid illustrations of Eric Carle's The Very Hungry Caterpillar, giggles to the gentle piano pieces of Ludovico Einaudi played on a baby-friendly
    music box, and delights in the colorful animations of Studio Ghibli's My Neighbor Totoro, reflecting an early, instinctive appreciation for visual and auditory art, and they often point to bright pictures
    with wide-eyed wonder.
  travel: Christian Hordge has already taken a stroller-friendly trip to the sunny shores of San Diego with grandparents and a brief flight to Chicago's Museum of Science and Industry, and their parents
    hope to later explore the interactive exhibits at Tokyo's Miraikan museum, showing a budding love for varied experiences while they rely heavily on caregiver guidance and a predictable routine.
  culinary: Christian Hordge is a one-year-old who eagerly devours mashed sweet potatoes seasoned with a pinch of cinnamon, slurps banana puree, and smears avocado on crackers, yet stubbornly pushes away
    green peas, illustrating a selective palate and a playful, tactile approach to eating.
  core: Christian Hordge is a curious, compassionate one-year-old who explores the world through texture and color, often worries about new stimuli, yet thrives on spontaneous play and artistic discovery.
background:
  cultural: Christian is a Black child growing up in Washington, a community within St. Landry Parish, Louisiana. His family’s cultural life blends Southern African‑American traditions with the rich Creole
    and Cajun heritage of the region. He regularly attends a local Baptist church where gospel music, communal singing, and storytelling reinforce his sense of community and compassion. Family gatherings
    feature traditional foods such as jambalaya and fried catfish, and celebrations often include zydeco dancing and second‑line parades, exposing him early to the rhythms, colors, and communal values that
    shape his developing aesthetic and social sensibilities.
