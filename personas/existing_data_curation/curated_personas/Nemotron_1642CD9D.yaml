  hobbies: '[''Hosting neighborhood barbecues'', ''Coaching youth baseball'', ''Church volunteer work'', ''Woodworking and DIY furniture building'', ''Gardening (vegetable garden)'', ''Attending high‑school
    football games'', ''Playing board games and trivia'', ''Listening to classic rock music'', ''Karaoke'', ''Watching sitcoms and movies'', ''Participating in charity runs'']'
  career_goals: Fredrick aims to re‑enter the workforce in a role that leverages his organization and people skills, such as a community‑center coordinator, event‑management assistant, or retail supervisory
    position. He plans to earn his GED and pursue a certification in project management or hospitality management within the next two years. His long‑term ambition is to become a manager at a local nonprofit
    or to start his own small event‑planning business that provides affordable services to families in Gwinnett County.
