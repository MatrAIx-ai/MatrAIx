  career_goals: Rosa dreams of a future where she can combine her love for structure, education, and helping others. In the short term, she aims to maintain honor‑roll status, lead the student council,
    and expand her volunteer work at the local community center. Long‑term, she envisions becoming a teacher or a pediatric health professional—such as a nurse or school counselor—so she can create supportive,
    organized learning environments for children, especially those from Mexican‑American families. She is determined to earn a scholarship that will allow her to study education or health sciences in college,
    and she hopes to one day develop community programs that promote bilingual literacy and cultural pride.
