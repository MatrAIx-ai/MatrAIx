personas:
  professional: Rosa Guerra, an aspiring young tech creator, channels their disciplined love of structure into designing Scratch games that promote teamwork and inclusion while also helping plan school
    dances and charity drives through the student council.
  sports: Rosa Guerra, a lively 11‑year‑old, excels on the co‑ed Lakeside Cubs youth soccer team at the community park, follows the City Lions professional soccer club closely, and complements on‑field
    training with weekly dance rehearsals, balancing structured practice with spontaneous kick‑around games after school.
  arts: Rosa Guerra, a creative spirit, blends their love for drawing with vibrant folk dance routines performed with the local youth troupe "Canto del Pueblo," finds inspiration in the melodies of the
    traditional ensemble "Los Trovadores" and the pop hits of artists like Taylor Swift, shaping a colorful artistic identity that flourishes in school art projects and community performances.
  travel: Rosa Guerra, an adventurous planner, loves weekend trips to the nearby historic lighthouse and family camping at Grandma's hill farm, dreams of exploring the colorful streets of Barcelona and
    the theme parks of Orlando, prefers a detailed itinerary mixed with spontaneous free play, yet balances travel costs with their modest allowance and parental guidance.
  culinary: Rosa Guerra, a budding home‑chef, enjoys mastering family recipes such as tamales and enchiladas, expertly shaping corn masa, stirring rich chili sauce, and adding fresh cheese and avocado,
    while also experimenting with homemade guacamole and simple pasta dishes, though they sometimes forget to clean up the kitchen after cooking.
  core: Rosa Guerra blends disciplined organization with a vibrant social spirit, turning anxiety into meticulous planning for school and community projects, though they sometimes get lost in perfectionism
    and late‑night worries about upcoming events.
background:
  cultural: Rosa comes from a proud Mexican heritage, raised in a bilingual household in Bakersfield, California. At home, Spanish fills the air, interwoven with English at school and in the broader community.
    Family gatherings are vibrant, featuring traditional foods like mole, tamales, and arroz con pollo, and celebrations of holidays such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day.
    Her family places a strong emphasis on respect for elders, communal responsibility, and the value of education as a pathway to upward mobility. The Kern County area, with its deep agricultural roots
    and large Latino population, exposes Rosa to a close‑knit community where neighbors often support one another through church events, neighborhood festivals, and volunteer initiatives. Catholic traditions
    influence some of her family customs, but the overarching cultural ethos is one of resilience, hospitality, and pride in her Mexican identity, which shapes her compassionate outlook and desire to give
    back.
