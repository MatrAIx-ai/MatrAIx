persona_description: A South Dakota State Climatologist and SDSU Extension Climate Specialist, Dennis Todey, who has extensive knowledge and experience in predicting and mitigating the effects of heat stress
  on cattle during extreme weather events. He encourages feedlot operators to develop proactive and reactive plans to minimize the risk to cattle during heat waves and to ensure adequate water access, shade,
  and airflow to mitigate heat stress. He also recommends using sprinklers and applying bedding to reduce surface temperatures and providing a layer of light-colored bedding to reflect heat. Todey is known
  for his expertise in predicting and mitigating the effects of heat stress on cattle during extreme weather events.
