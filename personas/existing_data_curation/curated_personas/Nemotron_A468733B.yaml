  hobbies: '[''Reading non‑fiction (self‑help, finance, technology)'', ''Weight‑lifting routine'', ''Yoga and meditation for stress relief'', ''Strategy video gaming (e.g., Civilization)'', ''Cooking traditional
    Indian dishes'', ''Volunteer teaching basic computer skills'']'
  career_goals: Dipal aims to secure a stable entry‑level position in the technology or logistics sector, such as an IT support specialist or warehouse coordinator, where his structured approach and reliability
    are valued. He plans to enroll in a community college program in Dallas to earn an associate degree in Information Technology or Supply Chain Management. In the longer term, he aspires to launch a small
    e‑commerce venture selling curated South Asian food products, leveraging his cultural knowledge, budgeting skills, and meticulous planning to build a reliable business model.
