personas:
  professional: Toni Byers, a veteran teaching assistant with over three decades of hands‑on classroom support, uses her competitive drive, sociable charisma, and improvisational flair to lead engaging
    workshops, mentor fellow assistants, and strive toward full elementary certification while navigating a tension between her love of structure and occasional disorganization.
  sports: Toni Byers enjoys leisurely walks along Lake Champlain trails, participates in a senior softball league during spring, roots for the New York Knicks and the Vermont Lake Monsters, and uses bridge
    nights at the neighborhood bar as a strategic mental workout.
  arts: Toni Byers chairs a lively book club that dives into Toni Morrison and Margaret Atwood, volunteers to direct arts‑and‑craft sessions at a senior center, regularly attends community theatre productions
    of 'Our Town' and 'The Glass Menagerie', and finds inspiration in the folk songs of Bob Dylan and the pottery of local studio artists.
  travel: Toni Byers favors short, well‑planned road trips to the Finger Lakes and Adirondack region, enjoys spontaneous detours to local farmers’ markets and historic sites, dreams of revisiting Quebec
    City’s cobblestone streets and eventually hiking the Scottish Highlands with friends.
  culinary: Toni Byers loves cooking regional New York comfort foods such as chicken‑and‑dumplings, apple‑cider glazed pork shoulder, and blueberry buckwheat pancakes, frequently incorporating garden‑fresh
    herbs like sage, thyme, and rosemary into her recipes.
  core: Toni Byers is a sociable, structured‑yet‑disorganized educator who balances a competitive drive with anxiety‑fueled spontaneity, thriving on community connections while juggling health, finances,
    and a love for nature and the arts.
background:
  cultural: Toni is a white American raised in the Upper Valley of New York, an area steeped in New England values of self‑reliance, community involvement, and modesty. Growing up near the Canadian border,
    she was exposed to a subtle French‑Canadian cultural influence, evident in the region’s culinary traditions and bilingual signage. Her family background includes generations of New York State educators,
    reinforcing a strong belief in the importance of public education. As a lifelong resident of Plattsburgh, Toni's cultural identity blends rural sensibilities with a close‑knit town spirit, emphasizing
    personal connections, civic participation, and a pragmatic approach to daily life.
