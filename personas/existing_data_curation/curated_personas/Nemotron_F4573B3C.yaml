  hobbies: '[''Book club facilitation'', ''Community theatre attendance'', ''Senior center volunteering'', ''Lake Champlain walking trails'', ''Gardening'', ''Bridge and trivia games'', ''Yoga'', ''Cooking
    and hosting dinner gatherings'']'
  career_goals: Toni aims to earn full teaching certification within the next two years, transitioning from a teaching assistant to a certified elementary teacher. She hopes to lead curriculum development
    projects that embed practical, hands‑on learning experiences, and to spearhead a community adult‑literacy program that leverages her sociable nature. As she approaches retirement age, Toni also plans
    to mentor newer staff, offering workshops on classroom management and technology use, while eventually moving into a part‑time counseling or support role that allows her to continue influencing student
    success without the demands of full‑time teaching.
