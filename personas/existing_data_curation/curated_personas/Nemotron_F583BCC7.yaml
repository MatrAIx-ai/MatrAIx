personas:
  professional: Linda Wright, a budding toddler explorer in the world of early learning, uses their curiosity and practical instincts to turn sandbox play into miniature experiments; they reliably organize
    block towers but stay flexible enough to improvise when a piece falls, and they assert themselves during storytime to share ideas, showcasing an early knack for balanced problem-solving.
  sports: Linda Wright, a lively two-year-old, joins the community Tiny Tots Soccer Club for toddler-friendly drills; they cheer enthusiastically for the Los Angeles Dodgers during family game nights, and
    they eagerly participate in preschool gymnastics, balancing structured play with spontaneous backyard sprint races.
  arts: Linda Wright, who fills her afternoons with singing along to Raffi's 'Baby Beluga' and dancing to The Wiggles, delights in creating crayon sketches of rainbow unicorns after watching the show 'Bluey';
    they proudly showcase a collection of sticker-filled art books, blending creative joy with a nascent appreciation for music and visual storytelling.
  travel: Linda Wright, who has already marveled at the sea otters in Monterey Bay Aquarium and giggled through a week of enchantment at Disneyland, prefers stroller-friendly itineraries with planned snack
    breaks; they dream of one day spotting the Eiffel Tower's twinkling lights on a family trip to Paris.
  culinary: Linda Wright, a selective eater who revels in golden chicken nuggets, creamy avocado mash, and strawberry-yogurt swirls, insists on using her favorite bright-colored kid's fork for mac & cheese;
    they frequently refuse peas with a determined frown, showing a blend of adventurous curiosity and picky habits.
  core: Linda Wright, a curious yet practical two-year-old, balances relentless block-building with occasional tantrums over mismatched socks; they demonstrate a charming mix of independence, cooperative
    play, and a steadfast refusal to share their favorite blanket.
background:
  cultural: Linda comes from a White, European‑American family living in Tampa, Florida. Her upbringing blends Southern hospitality with a diverse, multicultural community. Family traditions include Sunday
