  hobbies: '[''Recreational soccer'', ''Pick‑up basketball'', ''Trivia nights'', ''Volunteer at senior center'', ''Hiking'', ''Riverfront kayaking'', ''Cooking French‑inspired dishes'', ''Live music concerts'',
    ''Playing guitar'']'
  career_goals: Shane aims to advance from a nursing assistant to a licensed practical nurse (LPN) within the next two years by enrolling in a part‑time LPN program at a local community college. He plans
    to obtain additional certifications in geriatric care and wound management, and eventually complete a Bachelor of Science in Nursing (BSN) to become a registered nurse (RN). Long‑term, he envisions
    a supervisory role in a skilled nursing facility or community health center, where he can apply his organizational strengths and passion for patient‑centered care. He is also interested in participating
    in quality‑improvement initiatives and contributing to staff training programs.
