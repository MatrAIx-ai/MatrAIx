personas:
  professional: Shane Aschbrenner, a Certified Nursing Assistant at a skilled nursing facility, blends meticulous vital‑sign monitoring, basic wound care, and EHR proficiency with a naturally sociable and
    organized demeanor, efficiently coordinating care teams while leading group recreation for residents.
  sports: Shane Aschbrenner, a dedicated member of the West Chester Recreational Soccer League and a regular pick‑up basketball player at the Community Center, roots for the Philadelphia Eagles, Philadelphia
    76ers, and follows the Philadelphia Union in MLS, committing to cardio drills twice weekly and weekend hikes in Wissahickon Valley.
  arts: Shane Aschbrenner, an avid attendee of Philly’s live‑music scene, enjoys acoustic sets by local indie acts like The War on Drugs, classic French chansons by Édith Piaf, and occasional rock concerts
    featuring Foo Fighters, while casually strumming a vintage Gibson guitar at home.
  travel: Shane Aschbrenner, who prefers structured weekend getaways, often explores nearby destinations such as the Hudson Valley and New Hope, has taken a spring trip to Asheville’s Blue Ridge Mountains,
    dreams of a culinary tour of Provence, and keeps a meticulously planned travel journal on their phone.
  culinary: Shane Aschbrenner, a competent home cook who favors comfort dishes, frequently prepares coq au vin with Burgundy red wine, ratatouille with zucchini, eggplant, and fresh thyme, and experiments
    with seasonal farm‑to‑table ingredients like heirloom tomatoes, while occasionally ordering pizza after a night of trivia.
  core: Shane Aschbrenner, a 30‑year‑old CNA who balances a structured, detail‑oriented work ethic with a lively social calendar, loves soccer, French cooking, and late‑night trivia, yet tends to sacrifice
    sleep for fun and forgets to cancel unused gym membership fees.
background:
  cultural: Shane comes from a white, French‑American family rooted in the Mid‑Atlantic region. His grandparents emigrated from France, bringing traditions such as celebrating Bastille Day and cooking classic
    French cuisine, which he still enjoys preparing. Raised in the suburbs of Philadelphia and now residing in Gloucester City, NJ, he blends the modest, community‑oriented values of the Northeast with
    a strong work ethic. His cultural influences include the local Pennsylvania‑New Jersey blend of sports fandom (e.g., Eagles, Phillies), Catholic holiday observances, and participation in community events
    like the annual Gloucester City street fair. This background fosters his sociable, cooperative nature and his appreciation for structured, reliable environments.
attributes:
  skills: '[''Patient care and hygiene assistance'', ''Vital signs measurement'', ''Basic wound care'', ''Infection control procedures'', ''Electronic health record documentation'', ''Communication and
