  hobbies: '[''Reading graphic novels and short stories'', ''Drawing and creating comic strips'', ''Playing ukulele'', ''Cooking traditional Mexican dishes with family'', ''Gardening (herb patch)'', ''Participating
    in community cultural events (Día de los Muertos)'', ''Book club membership'', ''Weekend art class'']'
  career_goals: Marianita aspires to continue her academic success through high school and eventually earn a degree that lets her help others in a structured setting. She dreams of becoming a bilingual
    elementary school teacher or a veterinary technician, both of which combine her love for order, her compassion for people and animals, and her desire to give back to her community. She is motivated
    to attend a university in California, obtain a teaching credential, and later work in schools with a high Latino population, fostering cultural pride and academic achievement. Alternatively, she envisions
    working in a veterinary clinic where she can care for animals while using her language skills to assist Spanish‑speaking clients.
