personas:
  professional: Marianita is an aspiring comic‑strip creator who blends a love of graphic novels with a practical, organized workflow, sketching daily in a structured notebook and eagerly sharing their
    stories with a small book club.
  sports: Marianita enjoys playing on a co‑ed youth soccer team after school and follows the Los Angeles Dodgers for family baseball outings, appreciating the predictable practice schedule and the community
    spirit of small‑group sports.
  arts: Marianita immerses themselves in the worlds of graphic‑novel legends like Stan Lee and the whimsical storytelling of Rebecca Sugar, attends a weekend art class led by local illustrator Ms. Ortiz,
    and strums simple ukulele chords to songs by Jack Johnson during family gatherings, weaving their love of drawing, music, and cultural workshops into a vibrant personal palette.
  travel: Marianita prefers meticulously planned weekend getaways with her family, such as visits to the national museum in the capital city and trips to the regional botanical garden, dreams of exploring
    the mural‑rich streets of Mexico City, and chooses small‑group tours to keep travel manageable and budget‑friendly.
  culinary: Marianita delights in cooking salsa, guacamole, and tamales alongside her grandmother, seasoning the guacamole with fresh cilantro, lime juice, and serrano pepper, and tending a balcony herb
    patch of basil, mint, and oregano that adds aromatic flair to each family dish.
  core: Marianita is a meticulous, introverted 12‑year‑old who channels a love of comics, ukulele chords, and herb gardening into a structured daily routine, carefully budgeting allowance while occasionally
    hoarding extra snacks and doodling in every spare margin.
background:
  cultural: Marianita is a first‑generation Mexican‑American who grew up in a bilingual household in San Diego. Her family maintains Mexican traditions such as celebrating Día de los Muertos, cooking regional
    foods, and speaking Spanish at home. These cultural roots shape her identity, influencing her love for Mexican cuisine, music, and community gatherings. She feels a strong sense of responsibility to
    honor her heritage, which drives her interest in becoming a bilingual teacher or a professional who can serve the Latino community. Her cultural background also fosters her respect for family, harmony,
    and collective well‑being.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Organizational and time‑management skills'', ''Basic computer literacy (typing, educational software)'', ''Drawing and sketching'', ''Basic cooking
