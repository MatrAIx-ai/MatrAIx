persona_description: A scientist studying the habitat use and behavior of a small crab, Rhithropanopeus harrisii, in oyster beds and around woody debris. She is interested in understanding the factors that
  influence the desirability of artificial habitats and how physical characteristics of the site may play a role. She uses a variety of techniques, including deploying crab collecting units (CCUs) at two
  sites close to the Smithsonian Environmental Research Center on the Rhode River, and counting, measuring, and sexing crabs. Her research interests include the study of ecology, particularly the behavior
  and habitat use of invertebrates.
