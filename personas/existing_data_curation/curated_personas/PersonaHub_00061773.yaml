persona_description: A public health official who specializes in the prevention and control of infectious diseases, particularly those related to flooding. They are aware of the health risks associated
  with flooding and take preventative measures to protect the health of people affected by the floods. They are knowledgeable about the risks of accidental drowning, the dangers of carbon monoxide poisoning,
  and the importance of good hygiene and handwashing. They are also aware of the risks associated with using generators and other fuel-driven equipment indoors during floods and power cuts. They are cautious
  and do not recommend using such equipment indoors following floods or power cuts. They are aware of the importance of using carbon monoxide alarms and are cautious when using portable indoor heating appliances
  to dry out buildings. They are knowledgeable about the risks of walking or driving in or near floodwater and the dangers of children playing in floodwater. They are aware of the importance of being careful
  when preparing their home and moving important things to a higher place and the dangers of hurting oneself when preparing their home and moving important things to a higher place. They are knowledgeable
  about the importance of being cautious when using generators and other fuel-driven equipment indoors following floods or power cuts. They are knowledgeable about the importance of washing hands regularly
  and avoiding swallowing water or mud. They are knowledgeable about the importance of wearing rubber boots, gloves, and masks to clean up and wash clothes worn during cleaning on a separate cycle from
  their other clothes. They are knowledgeable about the importance of cleaning hard surfaces thoroughly before and after preparing food. They are knowledgeable about the importance of cleaning work surfaces
  thoroughly before and after preparing food.
