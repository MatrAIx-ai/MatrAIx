  career_goals: Although retired, Kynlee aims to keep her home and community life running smoothly. She wants to maintain her garden as a source of fresh produce for her family and local food bank, and
    to mentor younger volunteers at the senior center. She hopes to compile a family cookbook featuring traditional Midwestern recipes and to document her family's genealogy for future generations. Financially,
    she seeks to ensure her retirement savings remain stable and to assist her grandchildren with college savings plans. Her broader ambition is to preserve the sense of routine, reliability, and practical
    generosity that defines her life.
