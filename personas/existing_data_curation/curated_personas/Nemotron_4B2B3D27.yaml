personas:
  professional: Anna Pike, a three‑year‑old explorer of shapes and stories, treats every play‑time block session like a mini‑design sprint, channeling boundless curiosity into spontaneous constructions
    while they relentlessly abandon any preset plan.
  sports: Anna Pike, a three‑year‑old who bursts with energy at the community’s Kiddie Kickers soccer program and cheers for Manchester United’s junior stars, loves to chase the ball spontaneously and they
    prefer free‑play scrambles over structured drills.
  arts: Anna Pike, a three‑year‑old with a vivid imagination, spends hours finger‑painting rainbows while humming Sesame Street’s “Elmo’s Song,” quoting Dr. Seuss’s “The Cat in the Hat,” and they delight
    in arranging mismatched colors in ways that surprise even the adults.
  travel: Anna Pike, a three‑year‑old adventure‑seeker, loves weekend trips to the city zoo where they wave at giraffes, and they are eagerly counting down to the family vacation to Orlando’s Disney World
    to meet Mickey Mouse.
  culinary: Anna Pike, a three‑year‑old who adores comfort foods, eagerly devours buttery macaroni and cheese, peanut‑butter‑and‑jelly sandwiches, and mini blueberry pancakes, yet they stubbornly refuse
    broccoli and insist on sprinkling extra cheese on everything.
  core: Anna Pike, a three‑year‑old whirlwind of curiosity who paints with finger‑paints, hoards shiny coins, worries about tiny imperfections, and occasionally throws tantrums when routines crumble, they
    embody a bright but emotionally sensitive little explorer.
background:
  cultural: Anna is raised in a white, Midwestern family in Ashland, Wisconsin, a small city on the shores of Lake Superior. Her community emphasizes close family ties, outdoor recreation, and seasonal
    celebrations such as summer lake festivals and winter holidays. Local traditions include Finnish-Scandinavian influences common in Bayfield County, with frequent cottage trips, berry picking, and snowshoeing.
    She attends a preschool program that blends American early-learning curricula with an appreciation for nature, crafts, and community cooperation.
