  career_goals: Although she is retired from formal employment, Joyce aims to deepen her impact on Santa Barbara’s cultural life. She plans to complete a series of paintings that capture the city’s coastline
    at different times of day and to exhibit the collection in a local gallery. She also wishes to write and self‑publish a memoir of her travels and artistic journey, using it to mentor younger artists
    through occasional workshops. A personal ambition is to travel to the French Riviera to explore her family’s ancestral roots and draw inspiration for new work. Finally, she hopes to establish a small,
    volunteer‑run pop‑up studio where seniors can experiment with mixed media without rigid schedules.
