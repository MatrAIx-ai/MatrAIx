personas:
  professional: Joyce Bourgeois, a retired museum docent and community art organizer in Santa Barbara, leverages her calm yet competitive demeanor and love of watercolor to curate senior‑focused pop‑up
    exhibitions, so they blend artistic expertise with persuasive volunteer leadership.
  sports: Joyce Bourgeois, an avid walker who enjoys gentle sunrise strolls along the Santa Barbara shoreline and occasional beach volleyball games, follows the Santa Barbara Foresters baseball team and
    the Los Angeles Dodgers, practices tai chi twice weekly to ease arthritic knees, and they prefer low‑impact activities that keep them active without the strain of competitive sports.
  arts: Joyce Bourgeois, a watercolor and pottery enthusiast who spends weekends sketching the Pacific coastline and experimenting with bold color palettes, draws inspiration from Claude Monet, Georgia
    O'Keeffe, and local painter Henry Hordes, and they regularly attend the Santa Barbara Symphony's chamber concerts and jazz nights featuring Miles Davis and John Coltrane, weaving visual and auditory
    arts into her daily rhythm.
  travel: Joyce Bourgeois, a lover of leisurely coastal road trips along Highway 101 to Monterey, Big Sur, and Napa Valley, dreams of strolling the Promenade des Anglais in Nice and painting the azure cliffs
    of the French Riviera, and they favor flexible itineraries that leave room for spontaneous sketch sessions and garden‑inspired meals.
  culinary: Joyce Bourgeois, whose kitchen is perfumed by rosemary, thyme, and lavender from her herb garden, prepares Mediterranean dishes such as ratatouille, grilled sardines with lemon‑herb oil, bouillabaisse,
    and saffron‑infused paella, and they occasionally over‑salt their sauces, a quirk they laugh off while sharing the meals with friends.
  core: Joyce Bourgeois, a 70‑year‑old calm yet competitively spirited artist‑volunteer, balances a love of Mediterranean cooking, spontaneous coastal travels, and low‑impact fitness with a modest bond‑focused
    portfolio and a gentle approach to health despite mild hypertension and arthritic knees.
background:
  cultural: Joyce descends from French‑Canadian ancestors, a heritage reflected in her surname and occasional family traditions. Raised in the post‑war American West, she came of age during the vibrant
    cultural shifts of the 1960s, participating in community music festivals and the early environmental movement. After moving to Santa Barbara in her thirties, she embraced the city’s Mediterranean ambience,
    blending American coastal culture with an appreciation for European art and cuisine. She regularly celebrates local holidays such as the Summer Solstice Festival, and she supports the Santa Barbara
    Arts & Crafts Guild, aligning her personal aesthetic with the region’s blend of seaside relaxation and refined artistic sensibility.
