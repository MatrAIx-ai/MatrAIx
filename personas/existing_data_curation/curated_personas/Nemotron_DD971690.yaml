personas:
  professional: Lakisha Lynch merges cutting‑edge experimental physics with a flair for visual storytelling, designing Raman and electron microscopy experiments while coding bespoke Python analysis pipelines,
    and aims to lead an interdisciplinary photonic‑materials team that secures a major NSF grant and mentors underrepresented scholars.
  sports: Lakisha Lynch cycles with the Boston Pedalers club, hikes the White Mountains in summer, follows the Boston Celtics, Bruins, and New England Patriots, and joins intramural soccer matches for social
    fitness.
  arts: Lakisha Lynch frequents the Institute of Contemporary Art and the Museum of Fine Arts, captures cityscapes inspired by photographers like Nan Goldin, and fuels their social evenings with live jazz
    at Scullers and indie shows featuring Big Thief, while also exploring African dance workshops led by artists such as Aisha Diallo.
  travel: Lakisha Lynch prefers compact, adventure‑focused trips, having trekked the White Mountains, explored Reykjavik’s geothermal pools, and savored Lisbon’s pastel de nata, while dreaming of a cultural
    immersion in Kyoto’s tea houses and a Patagonia trek for landscape photography.
  culinary: Lakisha Lynch experiments in the kitchen with Ethiopian injera, Korean kimchi, and homemade ramen, enjoys Boston clam chowder and tacos al pastor on weekends, and showcases a talent for plating
    that mirrors their photographic eye, often using fresh herbs and chili oil for flavor bursts.
  core: Lakisha Lynch is a hyper‑curious physicist‑artist hybrid who cycles, codes, and captures urban light, balances tight budgets with strategic investing, and channels competitive drive into bold interdisciplinary
    research.
background:
  cultural: Lakisha was born and raised in Boston to parents who emphasized academic excellence and cultural pride. Growing up in the diverse neighborhoods of the city, she was deeply influenced by the
    rich history of Black intellectuals and artists in New England. Her family traditions include celebrating African American heritage through music, storytelling, and community gatherings, which fostered
    her appreciation for collective experiences. While navigating a predominantly white scientific field, Lakisha draws strength from her cultural identity, seeking to amplify underrepresented voices in
    STEM and to blend her scientific pursuits with the artistic expressions rooted in her heritage.
attributes:
  skills: '[''Experimental design'', ''Spectroscopy'', ''Electron microscopy'', ''Computational modeling'', ''Python programming'', ''MATLAB'', ''Statistical data analysis'', ''Scientific writing'', ''Grant
    proposal development'', ''Public speaking'', ''Interdisciplinary collaboration'', ''Creative problem solving'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Urban photography'', ''Live jazz and indie music concerts'', ''Community science outreach workshops'', ''Cycling around Boston'', ''Hiking in New
    England'', ''Exploring new cuisines'', ''African dance workshops'', ''Reading speculative fiction and graphic novels'']'
  career_goals: Lakisha aspires to lead an interdisciplinary research team at a top university or national lab, focusing on next‑generation photonic materials for sustainable energy applications. She aims
    to secure a major NSF or DOE grant within the next five years, build a lab culture that encourages bold, unconventional thinking, and mentor early‑career scientists from underrepresented backgrounds.
    Long‑term, she hopes to become a tenured professor recognized for bridging physics and visual art through scientific visualization, and to expand her impact as a science communicator through public
    talks and multimedia outreach.
