  hobbies: '[''Watercolor painting'', ''Reading magical realism literature'', ''Traditional Mexican cooking'', ''Herb gardening'', ''Social dancing (cumbia, salsa)'', ''Volunteer art workshops'', ''Storytelling
    circles'', ''Digital photography'', ''Cultural blogging'']'
  career_goals: Maria’s primary ambition is to preserve and share her Mexican heritage with younger generations. She plans to compile a bilingual memoir and cookbook that blends family stories with traditional
    recipes, and she hopes to launch a community storytelling series at her senior center. Additionally, she aspires to learn digital photography and create an online archive of local cultural events, eventually
    collaborating with the Houston Museum of Fine Arts to curate a small exhibition of folk art. While she is no longer employed, she aims to remain an active volunteer leader, mentoring emerging artists
    and organizing cultural celebrations that bridge tradition and contemporary creativity.
