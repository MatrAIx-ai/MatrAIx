persona_description: A team of astronomers and engineers who are working on the commissioning and operation of the Near-Infrared Multi-Object Spectrograph (MOSFIRE) instrument at the W. M. Keck Observatory
  on Mauna Kea, Hawaii. The team is responsible for the integration of the instrument into the Keck I telescope and infrastructure, and for the ongoing commissioning and operation of the instrument. The
  team includes experts in infrared astronomy, instrument design, and telescope operations, and they are working to gather data on the sky using the instrument. The team is also working to study the time
  when most galaxies formed, as well as the so-called period of re-ionization, when the universe was just a half-billion to a billion years old.
