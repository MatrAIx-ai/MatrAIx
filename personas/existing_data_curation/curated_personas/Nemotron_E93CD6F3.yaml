personas:
  professional: Lynda Hayes is a budding young scientist who channels curiosity and practicality into elaborate LEGO engineering projects and simple home chemistry experiments, while their competitive streak
    shines through meticulous documentation and methodical problem solving.
  sports: Lynda Hayes is a member of an after-school swimming club, occasionally kicks a soccer ball with the neighborhood youth team, and avidly follows the New York Yankees baseball team and the Los Angeles
    Lakers basketball team on TV, and they use regular exercise as a quiet outlet to balance stress.
  arts: Lynda Hayes channels artistic flair into elaborate animal sketches inspired by the detailed watercolors of John James Audubon, while they admire the fantastical worlds of J.K. Rowling and the whimsical
    score of the Pixar film 'Coco', and their playlist features child-friendly tracks by Taylor Swift and soothing piano pieces by Yiruma.
  travel: Lynda Hayes prefers carefully planned short trips with their parents, having already explored the Magic Kingdom in Orlando and the Smithsonian National Air and Space Museum in Washington, D.C.,
    while they daydream of a future adventure to the towering cliffs of the Scottish Highlands and the vibrant streets of Kyoto, Japan.
  culinary: Lynda Hayes loves the cheesy stretch of a classic pepperoni pizza and the comforting bite of homemade mac and cheese, proudly mixes their own fruit kebabs using strawberries, grapes, and banana
    slices, and occasionally helps their parents whisk together buttery blueberry pancakes for a weekend breakfast.
  core: Lynda Hayes is a quiet, fiercely curious eight‑year‑old whose love for intricate LEGO builds and fantasy worlds fuels a competitive mind that constantly worries about perfection, yet they find solace
    in solitary sketching and strategic chess matches.
background:
  cultural: Lynda is a white Midwestern American raised in Elyria, Ohio. Her family participates in local community events such as county fairs, Fourth‑of‑July parades, and church gatherings. She experiences
    typical Midwestern values of independence, self‑reliance, and appreciation for the outdoors, while also attending a public elementary school where she interacts with a diverse peer group.
