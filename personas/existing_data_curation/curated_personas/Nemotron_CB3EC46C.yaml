personas:
  professional: Jayce Roy, a budding young engineer, channels disciplined curiosity into detailed LEGO constructions, model‑rocket builds, and Scratch game coding, constantly refining solutions with the
    precision of a chess player.
  sports: Jayce Roy enjoys casual soccer matches with a close‑knit group of friends on Saturday evenings, cheers for the Durham Bulls minor league baseball team, and participates in weekly swimming practice
    at the community pool, favoring structured drills that match their disciplined mindset.
  arts: Jayce Roy spends after‑school hours at the piano mastering pieces by Ludwig van Beethoven and modern film scores by Hans Zimmer, while also devouring sci‑fi novels by Andy Weir and listening to
    whimsical soundtracks from Studio Ghibli, which together fuel their creative imagination.
  travel: Jayce Roy prefers nature‑focused trips, having hiked the Redwood forests of California and explored the bird‑rich wetlands of the Everglades with family, while dreaming of a future field trip
    to Kyoto’s bamboo groves, favoring meticulously planned itineraries over spontaneous amusement‑park excursions.
  culinary: Jayce Roy enjoys carefully measuring ingredients for homemade chocolate chip cookies and assembling simple sushi rolls with avocado and cucumber, while also relishing classic kid‑friendly meals
    like pepperoni pizza and macaroni and cheese, often requesting extra carrots to balance nutrition.
  core: Jayce Roy is a meticulously organized nine‑year‑old who balances boundless curiosity with disciplined routines, turning LEGO bricks and chess moves into lifelong learning tools while occasionally
    forgetting to drink enough water.
background:
  cultural: Jayce was raised in a middle-class family in Zanesville, Ohio, within the predominantly white, Midwestern American cultural setting. His upbringing reflects the community’s emphasis on modesty,
