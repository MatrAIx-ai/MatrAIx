personas:
  professional: Sarah Cowen, a 57‑year‑old singer‑songwriter and freelance music entrepreneur, blends folk‑rock storytelling with market‑savvy pop hooks, overseeing every stage from songwriting and self‑producing
    in Pro Tools to contract negotiation, royalty management, and Instagram‑driven promotion while they mentor emerging vocalists and engineer a multidisciplinary studio concept.
  sports: Sarah Cowen, an avid hiker, joins the Seattle Hiking Club for weekend treks of the Cascade foothills with her golden retriever, follows the Seattle Seahawks and Seattle Sounders on game nights,
    and schedules weekly yoga classes at a local studio to balance endurance with flexibility, while they also organize trail clean‑up events as a way to give back to the community.
  arts: Sarah Cowen’s artistic life intertwines music, vinyl collecting, and watercolor, as they curate a personal library of rare 1970s folk records, sketch misty Puget Sound vistas on the back of rehearsal
    notebooks, and lose themselves in Agatha Christie mysteries between studio sessions.
  travel: Sarah Cowen favors road‑trip itineraries that blend scenic drives through the Olympic Peninsula, weekend stays at boutique B&Bs in Portland, and occasional music‑festival pilgrimages to Austin’s
    South by Southwest, while they plan future hikes in New Zealand’s Southern Alps once their album crowdfunding goal is met.
  culinary: Sarah Cowen, a farm‑to‑table enthusiast, transforms garden herbs like sage and lavender into a signature lemon‑rosemary roasted chicken, pairs it with locally sourced Pinot Gris from Woodinville,
    and they experiment with wild mushroom risotto infused with foraged chanterelles during post‑recording supper sessions.
  core: Sarah Cowen is a fiercely competitive 57‑year‑old musician‑entrepreneur who channels anxiety into meticulous budgeting, relentless streaming growth goals, and weekend hikes, yet they can’t resist
    a spontaneous vintage vinyl find or a glass of local wine when stress peaks.
background:
  cultural: Sarah is a white American with mixed Irish, English, and German ancestry, raised in the suburban environment of Lynnwood, Washington. The Pacific Northwest's indie‑folk and grunge legacy shaped
    her musical taste, while the region's emphasis on environmental stewardship and community engagement informs her activism and lifestyle. Her business education adds a pragmatic, entrepreneurial edge
    to her artistic pursuits, reflecting a blend of traditional American suburbia and the creative, collaborative spirit of the Seattle area.
attributes:
  skills: '["Vocal performance (folk‑rock, pop, adult‑contemporary)", "Songwriting and lyric composition", "Music production (DAW: Pro Tools, Logic Pro)", "Acoustic guitar and piano accompaniment", "Live‑performance
