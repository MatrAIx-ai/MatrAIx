    for freelance artists", "Teaching vocal lessons and music‑business workshops"]'
  hobbies: '["Hiking in Cascade foothills", "Native plant gardening", "Farm‑to‑table cooking", "Wine tasting and vintage vinyl collecting", "Music‑therapy volunteering at senior centers", "Reading mystery
    novels", "Yoga and meditation for stress relief", "Watercolor painting of Puget Sound vistas"]'
  career_goals: Sarah aims to release a critically acclaimed full‑length album that showcases her blend of introspective folk and polished pop, using a community‑crowdfunded model. She plans to open a multidisciplinary
    music studio in Lynnwood that offers rehearsal space, recording services, and a business incubator for local indie artists. Over the next five years, she hopes to mentor at least twenty emerging singers,
    launch a regional singer‑songwriter festival, and secure a recurring residency at a popular downtown Seattle venue. Her competitive drive pushes her to increase her streaming audience to 100,000 monthly
    listeners while maintaining a financially viable freelance touring schedule.
