persona_description: A scientist interested in the study of coral holobiont communities, particularly in understanding the series of events involved in the shift from mutualism to pathogenesis. This person
  is likely to be interested in evaluating structural and functional changes in coral microbial communities, as well as the role of Vibrio spp. in altering microbiome metabolism and contributing to the
  health status of the coral holobiont. They may be particularly interested in the use of metagenomic and functional gene analysis to investigate the changes in taxonomy and microbial genes involved in
  virulence, stress resistance, sulfur and nitrogen metabolism, motility and chemotaxis, fatty acid and lipid utilization, and secondary metabolism.
