persona_description: A government official or official responsible for overseeing and implementing flood mitigation measures and policies in the aftermath of natural disasters, particularly those related
  to coastal areas such as the Jersey Shore. This individual is likely to be familiar with the latest developments in FEMA's flood insurance maps and the impact of major storms on coastal communities. They
  are also likely to be aware of the potential long-term cost savings and short-term cost increases associated with building to the new standards advocated by FEMA. Additionally, they are likely to have
  experience in managing disaster recovery efforts and working with local communities to ensure that rebuilding efforts are done in a way that is both resilient and cost-effective.
