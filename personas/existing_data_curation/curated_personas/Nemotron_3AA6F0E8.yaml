  hobbies: '[''Watercolor painting'', ''Sketching'', ''Woodworking'', ''Gardening'', ''Bird-watching'', ''Reading philosophy and speculative fiction'', ''Jigsaw puzzles'', ''Metal jewelry making'', ''Attending
    local art fairs'', ''Reflective journaling'']'
  career_goals: Evelyn aims to move into a lead assembler or workshop supervisor role where she can guide a small team and shape process improvements while retaining hands‑on work. She also dreams of launching
    a side venture that creates custom decorative metal art pieces, blending her fabrication expertise with her love of abstract visuals. Over time she hopes to teach occasional workshops at the local maker
    space, sharing her inventive repurposing techniques and encouraging others to explore the intersection of craft and imagination. Her ambition is less about climbing corporate ranks and more about achieving
    personal fulfillment through mentorship, craftsmanship, and creative expression.
