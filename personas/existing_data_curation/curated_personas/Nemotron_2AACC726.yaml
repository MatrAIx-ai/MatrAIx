  career_goals: Although retired, Philip aims to channel his lifelong curiosity into mentoring younger community members, especially through workshops on art, storytelling, and local heritage. He aspires
    to complete a memoir that interweaves personal anecdotes with the history of Mobridge and the surrounding prairie, potentially publishing it as a self‑produced book. He also wishes to curate a small
    traveling exhibition of his paintings and photographs to display in regional libraries and senior centers, fostering appreciation for abstract art among diverse audiences. Ultimately, Philip hopes to
    leave a lasting cultural imprint on his hometown by establishing a modest community art space that encourages collaborative projects and creative exploration.
