  hobbies: '["Cooking traditional Mexican dishes", "Gardening (herbs, chilies, tomatoes)", "Attending community festivals and cultural events", "Folk dancing (cumbia, salsa, folkloric)", "Playing Lotería
    and card games with friends", "Volunteer work at the senior center", "Walking along the waterfront and local parks", "Listening to mariachi and Norteño music"]'
  career_goals: Although retired, Joshua aims to stay actively engaged in his community. He aspires to continue organizing cultural festivals and senior‑center activities, mentor younger family members
    in cooking and cultural traditions, and expand his digital literacy to stay connected with grandchildren. He also hopes to preserve his family’s oral histories and contribute to local oral‑history projects,
    ensuring his Mexican heritage remains vibrant for future generations. Maintaining his health and independence so he can remain a dependable presence for his wife and community is a core personal ambition.
