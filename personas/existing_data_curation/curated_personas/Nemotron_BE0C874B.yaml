personas:
  professional: Joshua Fernandez, a retired electrician turned community event organizer, leverages their practical, methodical mindset and warm, talkative nature to orchestrate church festivals, senior‑center
    activities, and local cultural celebrations with seamless precision.
  sports: Joshua Fernandez, a devoted fan of the San Diego Padres and the LA Galaxy, participates in a weekly senior walking club along the bay with the National City Senior Center group, plays casual bocce
    with their church cohort in the spring, and follows the Pacific Coast Highway marathon as a spectator, balancing low‑impact activity with local team spirit.
  arts: Joshua Fernandez immerses themselves in folk dancing to the rhythms of mariachi ensembles like Mariachi Los Camperos and regional norteño groups such as Los Tigres del Norte, while regularly attending
    performances at the Old Globe Theatre and collecting traditional papel picado for home décor.
  travel: Joshua Fernandez prefers planned road trips that blend cultural immersion and family time, having recently visited Oaxaca's bustling markets to study authentic mole recipes, and dreaming of a
    leisurely cruise to the historic towns of San Miguel de Allende and the coastal charm of Cabo San Lucas, all while balancing a modest retirement budget.
  culinary: Joshua Fernandez, an accomplished home cook, masters mole negro using ancho, pasilla, and mulato chilies, crafts hand‑rolled tamales seasoned with epazote, and prepares fresh salsa verde with
    tomatillos, cilantro, and serrano peppers, savoring the ritual of sharing these dishes at family gatherings.
  core: Joshua Fernandez blends meticulous organization with a sociable heart, turning community festivals into cherished traditions while quietly battling high blood pressure and a penchant for hoarding
    spice jars.
background:
  cultural: Joshua’s cultural identity is rooted in his Mexican heritage and the vibrant Mexican‑American community of San Diego’s National City. Raised in a bilingual household, he grew up celebrating
    Día de los Muertos, Las Posadas, and Catholic holidays with family. The proximity to the U.S.–Mexico border has reinforced a strong connection to Mexican customs, cuisine, and music, which he shares
    through cooking and storytelling. He values family cohesion, community solidarity, and the preservation of cultural traditions, often participating in local Mexican festivals and church activities that
    reflect the Chicano experience in Southern California.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Community event planning and coordination", "Traditional Mexican cooking", "Gardening (herbs, chilies, tomatoes)", "Basic home repair and maintenance",
