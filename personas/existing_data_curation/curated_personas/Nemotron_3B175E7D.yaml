personas:
  professional: Frederick Andrus is an aspiring multimedia artist who blends digital illustration, traditional sketching of Utah’s rugged canyons, and self‑produced acoustic melodies, and their curious,
    detail‑oriented nature pushes them to experiment with unconventional brush algorithms while meeting school deadlines, and they often stay up late perfecting a piece.
  sports: Frederick Andrus enjoys seasonal trail hiking in the Wasatch Mountains, is a member of the local Wasatch Trail Club, and follows the Utah Jazz and Real Salt Lake, but they rarely join team sports,
    preferring solitary cardio workouts that double as sketching expeditions.
  arts: Frederick Andrus is deeply immersed in independent cinema, regularly streaming the works of Wong Kar‑wai and the animated surrealism of Hayao Miyazaki, while their musical palette includes acoustic
    covers of Sufjan Stevens and the lo‑fi beats of Nujabes, and they often quote the verses of poet Rupi Kaur in their own short stories.
  travel: Frederick Andrus prefers low‑key weekend getaways to Utah’s national parks like Arches and Zion for sunrise photography, dreams of trekking Iceland’s volcanic landscapes, and they balance these
    adventures with a tight school budget that forces them to plan trips months in advance.
  culinary: Frederick Andrus experiments with simple home‑cooked meals like avocado toast with feta and cherry tomatoes, loves the smoky flavor of chipotle in homemade tacos, and indulges in artisanal coffee
    drinks such as vanilla oat‑milk latte, though they often forget to clean their kitchen after late‑night snack sessions.
  core: Frederick Andrus is a thoughtful teen artist whose curiosity fuels creative projects, yet their perpetual worry and occasional procrastination make their artistic drive a delicate dance between
    inspiration and overanalysis, and they often wrestle with self‑criticism before sharing work.
background:
  cultural: Frederick was born and raised in Farmington, Utah, a suburban community in Davis County known for its close‑knit neighborhoods and easy access to the Wasatch Range. His family traces its ancestry
    mainly to English and German immigrants, reflecting the typical European heritage of many white Utah residents. The local culture is heavily influenced by the Latter‑Day Saint (Mormon) tradition, emphasizing
    family, community service, and outdoor recreation, although Frederick's personal religious practice is modest. Growing up, he absorbed the region's love for nature—hiking, skiing, and appreciation for
    the expansive landscape—while also being exposed to broader digital and artistic influences through online communities, tutorials, and streaming media. This combination of a rural, outdoors‑oriented
    upbringing and a globally connected artistic milieu shapes his values of self‑reliance, curiosity, and an appreciation for both natural beauty and diverse creative expression.
attributes:
  skills: '[''Digital illustration (Photoshop, Procreate)'', ''Traditional sketching and watercolor painting'', ''Basic Python programming for creative coding'', ''Landscape and nature photography (DSLR)'',
    ''Acoustic guitar and piano (self‑taught)'', ''Critical thinking and research'', ''Time management and organization'', ''Collaborative project work in small groups'']'
  hobbies: '[''Digital illustration and art creation'', ''Traditional sketching in a personal journal'', ''Landscape and nature photography'', ''Playing acoustic guitar and composing music'', ''Reading
    science‑fiction and fantasy literature'', ''Hiking and exploring local trails'', ''Watching independent and foreign films'', ''Writing short stories and poetry'']'
  career_goals: Frederick aspires to become a concept artist for video games or animated films, blending his love for storytelling and visual design. He plans to apply to a university program that combines
    Fine Arts and Interactive Media to strengthen both his technical and creative skills. Building a professional portfolio that showcases his traditional and digital work is a priority, as is securing
    internships at creative studios. Over the long term, he hopes to create immersive narrative experiences that integrate art, technology, and environmental themes, potentially collaborating with interdisciplinary
    teams.
