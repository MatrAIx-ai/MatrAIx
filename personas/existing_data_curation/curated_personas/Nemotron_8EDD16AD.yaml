personas:
  professional: Keith Walters is a hands‑on mechanical assembler who leverages bilingual fluency, G‑code programming, and a knack for quick troubleshooting to keep production lines humming, while their
    talkative, competitive spirit turns informal training sessions into lively workshops that both motivate and occasionally stir rivalries among teammates.
  sports: Keith Walters casually follows the El Paso Locomotive FC soccer team and roots for the El Paso Chihuahuas during baseball season, but their own fitness routine is a haphazard mix of spontaneous
    pickup basketball games at the community park and sporadic high‑intensity interval sessions, driven more by a desire to out‑perform friends than by a long‑term training plan.
  arts: Keith Walters channels a love for gritty cityscapes into quick charcoal sketches of downtown skylines while humming to The Strokes and Los Tigres del Norte, spends weekends mastering cumbia steps
    at local dance halls, and fuels their improv comedy sessions with the spontaneity of street‑art legends like Banksy, all of which blend into a vibrant personal aesthetic that colors everything from
    their sketchbooks to their custom‑metal art concepts.
  travel: Keith Walters prefers impromptu road trips that weave between the desert mesas of New Mexico and the bustling mercados of northern Mexico, often ending up at a roadside fishing spot on the Rio
    Grande, but they dream of a future pilgrimage to the industrial districts of Osaka and the vibrant street‑art corridors of Berlin, balancing a shoestring travel budget with the occasional splurge on
    a music‑festival pass.
  culinary: Keith Walters, a self‑taught home cook, often whips up charcoal‑grilled catfish tacos with fresh cilantro, lime, and a smoky chipotle aioli after an afternoon on the Rio Grande, while also experimenting
    with indie‑cuisine fusions like miso‑marinated carne asada burritos, preferring hands‑on flavors over restaurant meals but occasionally splurging on a night of haute‑Mexican tasting menus at the city’s
    top bistro.
  core: Keith Walters is a restless creative tinkerer who juggles spontaneous fishing trips, midnight gaming marathons, and a never‑ending sketchbook, all while battling a chronic over‑thinking habit that
    makes them both hyper‑competitive and oddly disorganized.
background:
  cultural: Keith grew up in Sullivan City, a tight‑knit Mexican‑American community on the U.S.–Mexico border. He was raised bilingual, speaking Spanish at home and English at school, and his family maintains
    traditions such as Día de los Muertos altars, quinceañera celebrations, and weekly family meals centered on Tex‑Mex cuisine. The cultural mix of Mexican heritage, Catholic influences, and the practical,
    hard‑working ethos of the Rio Grande Valley shapes his values of familismo, respect for elders, and a communal spirit. Though he embraces modern American pop culture, he remains proud of his Mexican
    roots, often incorporating traditional motifs into his artwork and appreciating the rhythm of regional music.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint reading'', ''CNC machine operation'', ''MIG/TIG welding'', ''Basic CAD modeling'', ''Troubleshooting production equipment'', ''Bilingual communication (English/Spanish)'',
    ''Informal peer training'', ''Material experimentation'']'
  hobbies: '[''Urban sketching'', ''Digital illustration'', ''Multiplayer video gaming'', ''Cumbia and salsa dancing'', ''Community festival volunteering'', ''Improv comedy'', ''Street photography'', ''Fishing
    at the Rio Grande'', ''Exploring local mural art'']'
  career_goals: He aims to move from a floor assembler to a shift supervisor within the next three years, leveraging his sociability to motivate a team while still having room for creative input in process
    improvements. Long‑term, Keith envisions obtaining a journeyman certification in fabrication and launching a small custom‑metal art studio that blends his love for art and hands‑on making. He also hopes
    to mentor younger workers, perhaps through a community makerspace, to keep the trade lively and inclusive. Balancing his desire for flexibility, he prefers roles that let him schedule some creative
    projects alongside his day job, avoiding overly rigid corporate structures.
