  career_goals: She aims to become a lead engineering manager overseeing a distributed team, focusing on building scalable cloud‑native products while fostering a culture of continuous learning and work‑life
    flexibility. In the next five years, she plans to obtain AWS Solutions Architect certification, spearhead a mentorship program for women in tech in Appalachia, and potentially launch a side‑project
    that leverages AI to support local small businesses. She also aspires to work remotely enough to spend more weekends exploring the outdoors with her family.
