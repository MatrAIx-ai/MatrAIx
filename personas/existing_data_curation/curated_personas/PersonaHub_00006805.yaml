persona_description: A neurobiologist who has made a significant contribution to the field of neurobiology through her research on the expression and function of junctional adhesion molecule-C (JAM-C) in
  peripheral nerves. Her work has identified JAM-C as a key player in regulating the structural integrity and function of peripheral nerves, and potentially provides insight into the causes of certain peripheral
  nerve disorders. She has conducted her research in collaboration with scientists from Imperial College London, University College London, Cancer Research UK, and the University of Geneva.
