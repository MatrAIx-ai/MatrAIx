persona_description: Nick Trent, a Chief Pilot from the David Sheldrick Wildlife Trust, who joined forces with other pilots from various organizations to conduct an intensive five-day aerial census in the
  greater Amboseli-West Kilimanjaro and Natron-Magadi ecosystems. The purpose of this census was to establish the wildlife population, trends, and distribution in each habitat, and to make informed management
  decisions in protecting the wildlife and environmental stability. The census covered over 25,000 km2 of the Amboseli area, 6,348 km2 of the Namanga-Magadi areas in South-Western Kenya, 3,013 km2 of the
  West Kilimanjaro, and 7,047 km2 of the Natron areas in North Tanzania. The census was conducted during the period of October 7th to 11th 2013, and the Kenya Wildlife Service is yet to release the October
  2013 dry-count aerial census report. The David Sheldrick Wildlife Trust will be the Kenya Wildlife Service's main partner in supporting the Tsavo Conservation Area Aerial Count in Feb 2014, donating all
  the aviation fuel required to carry out this very important census.
