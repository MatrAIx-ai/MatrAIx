  career_goals: Donnalee aims to earn National Board Certification for elementary education within the next year and enroll in a Master’s program in Educational Leadership to prepare for school‑wide leadership
    roles. She plans to spearhead a district pilot that integrates local history and civic engagement into the 4th‑grade social‑studies curriculum, and to expand the school’s drama program as a platform
    for student expression. In the long term, she aspires to become an instructional coach or assistant principal, where she can influence curriculum development, mentor teachers, and champion inclusive,
    humanities‑rich learning experiences across the district.
