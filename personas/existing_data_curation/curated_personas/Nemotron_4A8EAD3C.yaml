personas:
  professional: Maria Acosta, a seasoned educator with three decades of experience, blends bilingual instructional support, curriculum design, and technology integration to craft lesson plans that marry
    traditional methods with innovative digital tools while mentoring colleagues and spearheading adult‑literacy initiatives, and they are now pursuing a master’s in adult education to publish a bilingual
    teaching guide and lead a university community‑engagement office.
  sports: Maria Acosta enjoys disciplined morning walks in Brittlebranch Park, volunteers with the senior walking club of Lawrence, and follows the Cleveland Guardians baseball team and the Cleveland Browns
    football team, but they rarely engage in competitive sports, preferring low‑impact exercise and bird‑watching as their primary fitness pursuits.
  arts: Maria Acosta spends evenings listening to Juan Luis Guerra’s merengue and bachata classics while crocheting blankets for grandchildren, often quoting lines from Caribbean historical novels, and
    they attend local community theater productions featuring works by August Wilson, drawing inspiration from the storytelling tradition.
  travel: Maria Acosta favors leisurely road trips to historic towns like Old San Juan and Charleston, plans trips around family visits and cultural festivals, and they balance a modest travel budget with
    occasional splurges on riverboat cruises on the Ohio River, always packing a notebook to record oral histories of fellow elders.
  culinary: Maria Acosta delights in preparing mangú with ripe plantains, sancocho brimming with yautía and beef, and seasoned yucca with cilantro, expertly seasoning each dish with ají dulce and oregano,
    while they experiment with garden‑fresh herbs to infuse traditional flavors into every family meal.
  core: Maria Acosta, a pragmatic‑curious former teacher, farms, crochetes, and curates bilingual lessons, navigating retirement with disciplined finances, steady health routines, low‑key fitness, a taste
    for Caribbean cuisine, and a penchant for documenting elders’ stories, and they embody a quietly competitive spirit.
background:
  cultural: 'Maria was born in the Dominican Republic and moved to Lawrence with her family as a child, growing up navigating the rhythms of Caribbean life within a Midwestern setting. Her household maintained
    Spanish as the family language, Catholic traditions, and a love for Dominican music and cuisine. This bicultural upbringing informs her identity: she celebrates Dominican Independence Day, participates
    in local Latino festivals, and mentors younger Dominican-Americans. At the same time, she embraces Kansas community values of modesty, practicality, and a strong work ethic, allowing her to serve as
    a cultural bridge between the two worlds.'
attributes:
  skills: '["Bilingual instruction (English‑Spanish)", "Curriculum development", "Instructional technology integration", "Student mentorship and tutoring", "Adult literacy program coordination", "Cultural
