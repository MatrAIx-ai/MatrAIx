  hobbies: '["Reading historical fiction", "Gardening (vegetable plot)", "Cooking traditional Dominican dishes", "Listening to merengue and bachata", "Walking in Brittlebranch Park", "Crocheting blankets",
    "Podcast listening on education and gerontology", "Volunteer language tutoring", "Collecting antique postcards", "Birdwatching"]'
  career_goals: Although nearing retirement, Maria aims to formalize her expertise by completing a master’s degree in adult education and publishing a guide on bilingual teaching strategies for Midwestern
    schools. She aspires to lead the university’s community‑engagement office, expanding the Spanish‑language tutoring program she helped start, and to receive a regional award for cultural‑educational
    outreach. Additionally, she hopes to document oral histories of Dominican elders in Lawrence, creating a lasting resource that bridges her heritage with her professional legacy.
