  career_goals: Woodson aims to transition from his current period of unemployment into a stable, skilled‑trade career that balances structure with the flexibility he values. He plans to enroll in an apprenticeship
    program to become a certified HVAC technician or electrician, eventually earning the credentials needed to launch his own handyman business. Simultaneously, he wants to complete his associate’s degree
    in business administration so he can manage the enterprise effectively. His longer‑term ambition is to be recognized as a reliable community resource—offering quality repair services while continuing
    to organize local events and volunteer projects, all while strengthening his ability to meet deadlines and manage stress.
