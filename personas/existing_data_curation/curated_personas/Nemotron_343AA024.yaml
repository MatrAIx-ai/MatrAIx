  hobbies: '[''drawing and coloring'', ''building with LEGO bricks'', ''exploring local parks and nature trails'', ''collecting rocks, leaves, and insects'', ''storytime at the De Pere Public Library'',
    ''playing soccer with friends'', ''competitive tag and racing games'', ''educational puzzle apps on a tablet'']'
  career_goals: Silas dreams of becoming an explorer who can paint the places he discovers. He often talks about wanting to travel to space as an astronaut and sketch the planets he would see, or to become
    a wildlife photographer who captures animals in the Wisconsin woods. He is excited by the idea of winning a school science fair or a soccer match, and he imagines growing up to design cool inventions
    that combine art and technology. His long‑term ambition is to stay curious, keep creating, and turn his playful ideas into real projects that amaze others.
