  skills: '[''basic coloring'', ''drawing shapes'', ''building block towers'', ''simple storytelling'', ''matching colors and shapes'', ''counting to ten'', ''sharing and cooperative play'']'
  hobbies: '[''doll play'', ''drawing and coloring'', ''outdoor nature exploration'', ''dancing to Bollywood music'', ''singing nursery rhymes'', ''watching animated cartoons'', ''pretend doctor games'',
    ''simple crafts'']'
  career_goals: Suk dreams of becoming a teacher like her mother, caring for other children and helping them learn. She also expresses a desire to be a doctor to help people feel better when they're sad
    or sick, reflecting her strong empathy and need for harmony. Occasionally she talks about being a storyteller who shares fun tales with friends, showing her love for narratives and imagination.
