personas:
  professional: A budding junior architect named Suk Joshi channels a four-year-old’s love of building block towers into early spatial reasoning, and they balance inventive new-idea constructions with familiar
    stacking methods, while their relaxed, flexible play schedule and generous sharing habit foster cooperative building sessions, though occasional intense frustration erupts when a tower collapses.
  sports: A sporty four-year-old named Suk Joshi dashes onto the field with the Tiny Tigers junior soccer club, they eagerly chant for the New York Yankees and the New York Knicks on game day, preferring
    spontaneous tag play over structured drills, yet their relaxed attitude sometimes leads them to wander off mid-practice.
  arts: An arts-loving four-year-old named Suk Joshi hums the soaring "Let It Go" by Idina Menzel from Frozen, they giggle with Sesame Street’s Big Bird and Elmo, and they spread colorful crayon scribbles
    inspired by Eric Carle’s illustrations, though occasional frustration flares when a crayon snaps.
  travel: A travel-curious four-year-old named Suk Joshi explores the city zoo and the nearby aquarium with wide-eyed wonder, they dream of a magical trip to Disneyland and the awe-inspiring Grand Canyon,
    yet they cling to the security of a parent's hand when itineraries shift, balancing spontaneous excitement with a need for comforting routine.
  culinary: A culinary-adventurous four-year-old named Suk Joshi spreads peanut butter, strawberry jam, sliced banana, and a pinch of cinnamon on whole-grain toast with enthusiastic but messy gusto, they
    gnaw on cheesy macaroni, adore crunchy apple slices, yet they scrunch their nose at broccoli and refuse any dish spiced with hot sauce.
  core: Suk Joshi is a bright-eyed four-year-old whose boundless curiosity and generous kindness are tempered by occasional anxiety, and they navigate the world with a delightfully disorganized, free-spirited
    approach.
background:
  cultural: Suk comes from an Indian (Marathi) family that maintains strong cultural ties while living in Cordova, Tennessee. At home, she hears Hindi and Marathi phrases, enjoys family meals of dal, rice,
    and chapati, and participates in celebrations like Diwali and Holi, where she lights small diyas and plays with colored powders. Her parents encourage respect for elders, community involvement, and
    the value of education. The local Indian community hosts weekend gatherings and cultural classes, giving her exposure to traditional dance and music. While she is assimilated into American preschool
    culture, her South Asian heritage informs her daily routines, food preferences, and celebrations.
