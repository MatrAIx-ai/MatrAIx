persona_description: A scientist and archaeologist who specializes in the field of ice patch archaeology, focusing on the discovery and preservation of ancient artifacts from melting ice patches. They have
  expertise in using geographic information systems to identify and locate ancient ice patches and have worked with other researchers to recover and preserve organic materials, such as clothing and wooden
  tools, that have been entombed in these ice patches. They are passionate about understanding the technologies, social protocols, and high-altitude subsistence practices of late Paleoindian societies through
  their work.
