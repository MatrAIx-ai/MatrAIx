  hobbies: '["Sketching", "Photography", "Visiting Art Galleries", "Hiking", "Yoga & Mindfulness", "Cooking Mexican Cuisine", "Journaling", "Volunteer Community Murals", "Indie Film Watching", "Reading
    Philosophy & Art Books"]'
  career_goals: Pedro aims to complete a bachelor’s degree in Visual Communication or Art Therapy within the next three years. He envisions a career that merges design, storytelling, and community outreach,
    such as working as a museum education coordinator or a freelance multimedia designer for social‑impact NGOs. He also wants to build a portfolio of mental‑health‑focused visual projects, using art as
    a therapeutic tool for youth dealing with anxiety. Long‑term, he aspires to establish a community art space in Salt Lake City that offers workshops, mural projects, and mental‑wellness programming,
    bridging his Mexican cultural heritage with inclusive artistic expression.
