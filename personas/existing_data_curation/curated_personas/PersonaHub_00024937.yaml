persona_description: A Swiss architect and researcher who specializes in the use of digital tools in the construction industry. He is co-director of the Swiss architectural practice Gramazio & Kohler, which
  operates out of ETH Zürich, one of Europe's most prestigious universities. His research focuses on the creation of a fluid connection between current design tools and possible fabrication strategies,
  turning the building industry into a knowledge industry. His firm first came to attention in architecture circles at the 2008 Venice Biennale with a bricklaying robot named R-O-B. R-O-B is essentially
  a mobile robotic arm that has the speed, efficiency, and beyond-human accuracy of the assembly line, but free from the confines of the factory and its linear production processes. He is also teaching
  his robots how to respond to variations in material and site, much like a human builder would. He believes that construction will always be a hybrid solution, meaning humans and machines working together.
  His interest is definitely not in automation, but more about introducing new architectural possibilities.
