  career_goals: He plans to complete an associate’s degree in automotive technology or obtain a trade certification as an electrician, secure a stable full‑time position as a mechanic or journeyman electrician,
    and eventually open his own small repair shop serving the Maryville area. His ambitions focus on achieving financial independence, maintaining a predictable routine, and building confidence that helps
    mitigate his anxiety.
