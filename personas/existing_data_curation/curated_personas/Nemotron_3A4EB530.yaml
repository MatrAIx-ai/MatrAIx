personas:
  professional: Christopher Webster is a budding automotive technician who leverages their hands‑on woodworking and problem‑solving skills to excel in a structured shop environment, balancing meticulous
    organization with the flexibility required to diagnose routine mechanical issues, while they double‑check each repair for confidence.
  sports: Christopher Webster spends weekends fishing at Norris Lake, hiking the foothills of the Great Smoky Mountains, cheering on the Maryville High School Wildcats football team, and follows the Tennessee
    Titans, while they occasionally play pickup soccer with friends at the local park.
  arts: Christopher Webster relaxes after a day in the shop by strumming acoustic guitar to the tunes of John Mayer and Bob Dylan at informal gatherings, watches tactical video games like XCOM 2 for their
    clear objectives, and draws inspiration from carpenter‑designer Norm Abram for their woodworking projects.
  travel: Christopher Webster prefers meticulously planned road trips, having already explored Asheville’s Blue Ridge Parkway and Nashville’s music scene, and dreams of a fishing charter in the Florida
    Keys, always mapping routes ahead and budgeting each mile to keep anxiety at bay.
  culinary: Christopher Webster enjoys cooking simple, hearty meals such as cedar‑plank grilled trout with rosemary, chicken pot pie, and classic mac & cheese, often preparing them on a portable camp stove
    after a hike, and takes pride in crafting their own wooden cutting boards to enhance the dining experience.
  core: Christopher Webster balances a love for routine‑driven, hands‑on work with a persistent undercurrent of anxiety, finding calm in fishing, woodwork, and structured gaming while occasionally over‑indulging
    in late‑night video sessions.
background:
  cultural: Raised in Maryville, Tennessee, Christopher grew up in a close‑knit, predominantly white Appalachian community steeped in Southern traditions. Family gatherings, church involvement, and community
    service have shaped his values of practicality, self‑reliance, and respect for tradition. He identifies with the region’s emphasis on hard work, modesty, and a preference for familiar, routine‑oriented
    lifestyles.
attributes:
  skills: '[''Basic automotive maintenance'', ''Woodworking and furniture repair'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Customer service'', ''Time management and scheduling'', ''Practical
