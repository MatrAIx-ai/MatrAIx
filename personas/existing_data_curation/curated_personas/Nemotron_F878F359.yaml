personas:
  professional: Edward Duncan is a retail sales associate who leverages meticulous organization, consultative selling, and data‑driven visual merchandising to consistently exceed targets while mentoring
    staff with a calm, cooperative style.
  sports: Edward Duncan jogs the Lake Apopka trail three times a week, participates in the local Orlando Running Club’s weekend long‑run meetups, and is an avid supporter of the Orlando Magic, the Tampa
    Bay Buccaneers, and the Florida Gators, balancing solitary cardio with occasional pickup basketball games for cross‑training.
  arts: Edward Duncan pursues street photography with a compact Nikon, drawing inspiration from Vivian Maier and Henri Cartier‑Bresson, while listening to jazz legends like Nina Simone and deep‑southern
    blues from B.B. King during editing sessions, and attends local gallery openings featuring emerging Southern artists.
  travel: Edward Duncan prefers meticulously planned short trips that blend nature and culture, having explored the Everglades, Savannah’s historic squares, and the historic French Quarter of New Orleans,
    while dreaming of a solo road‑trip along the Pacific Coast Highway to capture sunrise over Big Sur.
  culinary: Edward Duncan experiments in the kitchen with Creole classics such as shrimp étouffée and jambalaya, adds a Florida twist by incorporating fresh stone crab and key lime, and enjoys sourcing
    ingredients at local farmers’ markets while occasionally over‑seasoning dishes in their quest for bold flavor.
  core: Edward Duncan blends quiet curiosity with rigorous discipline, channeling their love of order into a career in retail, a balanced financial strategy, a methodical fitness routine, and a habit of
    documenting life through street photography.
background:
  cultural: Edward was raised in a close‑knit African‑American family in the Greater Orlando area and spent his formative years in Winter Garden, where a vibrant Black community shaped his values. Family
    gatherings centered around church, music, and soulful cooking, instilling in him a deep appreciation for gospel, R&B, and hip‑hop. He grew up hearing stories of the civil‑rights movement and the contributions
    of African‑American Floridians, which fostered a sense of pride and responsibility. Local cultural events such as the Winter Garden African‑American Heritage Festival introduced him to regional traditions,
    from Juneteenth celebrations to barbecues featuring Southern comfort food infused with fresh Floridian ingredients. Although he has faced occasional microaggressions, Edward draws strength from his
    community’s emphasis on resilience, education, and mutual support. He remains actively involved in a church youth mentorship program and supports local Black‑owned businesses, reflecting his commitment
    to lifting his cultural community.
attributes:
  skills: '[''Customer Service'', ''Consultative Selling'', ''POS System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Data Analysis (Excel)'', ''Process Improvement'', ''Team Training'',
    ''Conflict Mediation'', ''Digital Marketing Basics'']'
  hobbies: '[''Reading non-fiction (business, psychology, African‑American history)'', ''Strategy video games'', ''Tutoring at community center'', ''Bodyweight workouts and jogging'', ''Birdwatching'',
    ''Cooking Southern & Creole dishes'', ''Street photography'']'
  career_goals: Edward aims to complete a bachelor's degree in Business Administration within the next two years, leveraging his current coursework and part‑time study. He is targeting a promotion to assistant
    store manager within the next year, and to store manager within two to three years, where he can apply his organizational and process‑improvement strengths to drive higher profitability and employee
    engagement. Long‑term, Edward aspires to become a district manager overseeing multiple locations in Central Florida, and eventually launch his own boutique that showcases curated African‑American fashion
    and lifestyle products. He also plans to earn the Certified Retail Management Professional (CRMP) credential to formalize his expertise.
