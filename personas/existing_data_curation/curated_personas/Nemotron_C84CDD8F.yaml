  career_goals: He aims to advance from a management analyst to a senior strategy consultant within the next five years, positioning himself to lead cross‑functional initiatives that shape corporate direction.
    David plans to earn a professional certification such as PMP or Six Sigma and eventually pursue an MBA to deepen his strategic acumen. In the longer term, he aspires to become a director of business
    transformation, where he can blend data‑driven decision making with innovative growth strategies while maintaining the flexibility to work in environments that respect his need for focused, solitary
    work. He also envisions mentoring junior analysts, sharing his practical curiosity, and contributing to a culture of continuous learning.
