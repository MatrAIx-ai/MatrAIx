    snack recipes'']'
  career_goals: Kirk plans to earn his GED within the next two years and then pursue a certificate in athletic training or sports coaching, with the long‑term ambition of becoming a high school basketball
    coach and a mentor for at‑risk youth in Spring Valley. He also hopes to leverage his digital media skills to launch a community‑focused YouTube channel that highlights local talent, offers study tips,
    and promotes positive mental‑health strategies for teenagers who experience stress and anxiety.
