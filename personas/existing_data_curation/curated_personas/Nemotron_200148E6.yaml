    nights with spouse and close friends'',''Gardening and growing native plants'']'
  career_goals: Over the next five to seven years, Frank aims to earn his CFA designation and pursue a part-time MBA to deepen his strategic and leadership capabilities. He aspires to move into a senior
    finance leadership role such as Finance Director or Chief Financial Officer within a regional or national organization, where he can drive data-enabled decision-making and embed innovative, creative
    approaches into financial strategy. Frank also intends to launch a financial-literacy outreach program for high-school students in Clovis, contributing to his community while reinforcing his commitment
    to harmony and others' needs. Maintaining a balanced work-life schedule that supports his family remains a core ambition.
