personas:
  professional: Jalisa Whitfield is a 61‑year‑old logistics veteran who has spent over three decades mastering freight handling, systematic inventory control, and OSHA safety compliance; they now leverage
    their methodical planning and competitive drive to pursue a supervisory safety officer role while mentoring crews and aiming to cut warehouse errors by at least ten percent.
  sports: Jalisa Whitfield enjoys low‑impact fitness through daily garden walks and occasional community senior yoga classes, follows the Green Bay Packers and the Chicago Cubs with seasonal enthusiasm,
    and plays in a local recreational bowling league that meets monthly, balancing structured exercise with relaxed spectator sports.
  arts: Jalisa Whitfield weaves classic jazz and blues into their daily routine, favoring recordings by Ella Fitzgerald, B.B. King, and Count Basie, while expressing creativity through hand‑stitched quilts
    inspired by traditional patterns, and they regularly perform with their church choir, which sings gospel arrangements reminiscent of Mahalia Jackson.
  travel: Jalisa Whitfield prefers well‑planned, historically themed trips, such as guided tours of Civil War battlefields in Virginia, a weekend retreat to the historic Biltmore Estate in Asheville, and
    a leisurely river cruise along the Mississippi, always booking accommodations in advance to ensure a predictable itinerary.
  culinary: Jalisa Whitfield loves farm‑to‑table cooking, often preparing roasted heirloom tomatoes, sautéed kale, and sweet potato mash harvested from their own garden, and they add a dash of aged cheddar
    and smoked paprika to their signature vegetable gratin, while indulging in weekend brunches featuring chicken‑and‑waffles with maple syrup.
  core: Jalisa Whitfield is a methodical logistics expert whose love of puzzles, quilting, and jazz reflects a structured, reliable, and quietly competitive approach to life and work.
background:
  cultural: Born and raised in Houston’s historic African‑American neighborhoods, Jalisa’s cultural identity is shaped by the city’s vibrant Black heritage, church community, and Southern culinary traditions.
    She grew up hearing gospel music, attending community events in the Third Ward, and celebrating family gatherings with soul‑food dishes like collard greens and black‑eyed peas. Her upbringing instilled
    a strong sense of resilience, self‑reliance, and pride in African‑American history, which she honors through her involvement in local cultural festivals and mentorship of younger community members.
