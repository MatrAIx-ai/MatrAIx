    to teach computer basics to seniors'']'
  career_goals: Looking ahead, Jalisa aims to transition into a supervisory safety officer role where she can formalize her expertise in OSHA compliance and staff training. She plans to earn a certified
    safety trainer credential within the next year and leverage her competitive drive to streamline warehouse processes, reducing errors by at least ten percent. Ultimately, she hopes to secure a part‑time
    consulting position after retirement, advising small logistics businesses on efficient, safe operations while maintaining a steady income for her future.
