  career_goals: Hana aims to progress to a senior systems analyst role within the next two years, followed by a transition into solutions architecture. She plans to earn certifications such as AWS Certified
    Solutions Architect, PMP, and CISSP to deepen her strategic influence on cloud‑based and secure system designs. Long‑term, she aspires to lead a cross‑functional technology team, drive digital transformation
    initiatives that align with business goals, and mentor emerging analysts. Throughout her career growth, she prioritizes a stable work‑life balance that allows her to support her family and stay engaged
    with her community.
