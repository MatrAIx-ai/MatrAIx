  hobbies: '[''improv comedy'', ''volunteering at food bank'', ''organizing game nights'', ''walking along Maumee River parks'', ''volleyball'', ''vlogging local food and music'', ''attending live concerts'']'
  career_goals: Ruth aims to complete her associate degree in communications and then pursue a bachelor's in marketing or public relations. She aspires to work as a community outreach coordinator for a
    nonprofit or as an entry‑level public relations specialist at a regional firm. In the longer term, she hopes to lead a team that designs and executes public events and campaigns that strengthen community
    ties in the Midwest.
