persona_description: A physicist known for his contributions to theoretical astrophysics, particularly in the areas of spectral line formation, the dynamical evolution of star clusters, and star formation.
  Spitzer was the first to propose a large telescope in space and led the development and operation of the ultraviolet astronomy satellite Copernicus. He was the founder and first director of the Princeton
  Plasma Physics Laboratory (originally called Project Matterhorn). Spitzer died in 1997, and one of NASA's four Great Observatories is named the Spitzer Space Telescope in his memory.
