  hobbies: '[''Hiking and nature walks'', ''Fly fishing'', ''Traditional basket weaving'', ''Drumming at tribal events'', ''Cooking southwestern and tribal cuisine'', ''Gardening native herbs'', ''Reading
    Indigenous and regional history'', ''Watching classic western movies'', ''Listening to folk and country music'', ''Volunteering for senior meal deliveries'']'
  career_goals: Marlon aims to advance from his current courier role to a supervisory position overseeing regional delivery operations, eventually obtaining a professional certification in supply chain
    management. He envisions launching a small, community‑focused courier service that prioritizes reliable access for tribal members and local businesses. To support these goals, he plans to pursue additional
    training in logistics management, strengthen his leadership skills, and ensure a stable financial future for his family while maintaining the routine and predictability he values.
