personas:
  professional: An aspiring junior robotics engineer, Maria Galeano channels their vivid imagination and penchant for building with LEGO bricks into designing simple programmable robots, keeping a colorful
    notebook of schematic ideas while also improvising with recycled materials, and often leads their school’s after‑school tech club with a confident yet collaborative style.
  sports: Maria Galeano enjoys playing soccer with the Everett Youth Soccer Club, cheering for the Seattle Seahawks on game nights, and spends weekend afternoons hiking the trails of Evergreen Arboretum,
    balancing team spirit with a love for solo nature walks.
  arts: Maria Galeano devotes afternoons to sketching fantasy dragons inspired by the world of Harry Potter, crafting colorful mosaics from recycled bottle caps, dancing to the lively tunes of Mariachi
    Vargas de Tecalitlán, and humming along to the songs of Taylor Swift, all while proudly displaying their latest LEGO sculpture on the bedroom shelf.
  travel: Maria Galeano dreams of trekking the moss‑laden paths of Olympic National Park, revisiting the sandy shores of Cannon Beach, and has eagerly saved for a family road trip to the historic plazas
    of Mexico City, where they hope to collect more stories from grandparents.
  culinary: Maria Galeano loves helping in the kitchen to roll homemade tamales, whisk churro batter, and experiment with avocado‑lime guacamole, often adding a sprinkle of cinnamon to their chocolate chip
    cookies, though they sometimes burn the edges when distracted by a new LEGO creation.
  core: Maria Galeano blends boundless imagination with a disciplined love for building, music, and family traditions, navigating school life with a creative spark, occasional messes, and a heart that beats
    to both mariachi rhythms and the hum of LEGO motors.
background:
  cultural: Maria grows up in a Mexican‑American household where Spanish is spoken daily and cultural celebrations such as Día de los Muertos, Fiesta de la Virgen, and traditional Mexican holidays are observed.
    Her family maintains culinary traditions like making tamales and churros, and she frequently hears stories from her grandparents about Mexico’s history and folklore. Living in Everett, Washington, she
    also experiences the Pacific Northwest’s natural environment, combining Mexican cultural values of family, respect, and community with an appreciation for the local outdoors and a diverse school community.
