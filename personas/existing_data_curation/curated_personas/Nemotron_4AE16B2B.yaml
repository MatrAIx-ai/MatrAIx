  career_goals: Maria dreams of becoming a multidisciplinary creator—perhaps an illustrator who tells stories that blend Mexican folklore with futuristic themes, or a scientist‑artist who designs innovative
    inventions. She is fascinated by space exploration and hopes to be an astronaut or astrophysicist one day, while also aspiring to share her cultural heritage through community workshops and storytelling.
