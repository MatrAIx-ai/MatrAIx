  career_goals: At 56, Joyce aims to transition from operational credit counseling into a leadership role within her institution. She aspires to become a branch manager or senior loan-operations supervisor,
    where she can shape policies that enhance borrower education and community outreach. She plans to obtain the Certified Credit Counselor (CCC) designation and pursue a Certified Financial Planner (CFP)
    credential to broaden her advisory scope. Joyce also wishes to develop a free financial-literacy workshop series for seniors and first-time homebuyers in Suffolk County, leveraging her network and community
    ties. Long-term, she envisions launching an independent consulting practice that helps small businesses and community organizations design responsible lending and budgeting programs.
