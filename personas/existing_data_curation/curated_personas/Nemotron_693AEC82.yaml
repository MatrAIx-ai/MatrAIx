personas:
  professional: Mattie Zacharias, a two‑year‑old budding mini‑engineer, channels curiosity about new ideas into block stacking and shape‑sorting projects, balancing meticulous organization with spontaneous
    improvisation, and often competes with peers to construct the tallest tower, though they sometimes become upset when their creations wobble.
  sports: Mattie Zacharias, a two‑year‑old who squeals with delight at each Chicago Cubs home run on television and attends the Little Legends Kids Soccer Club’s toddler soccer sessions, also splashes enthusiastically
    in the community’s Kids Swim Club, showing an energetic yet sometimes cautious approach to physical activity that balances competitive bursts with a need for familiar routines, and they often request
    a gentle push on the swing after a practice.
  arts: Mattie Zacharias, a two‑year‑old with a budding appreciation for bright illustrations, spends afternoons flipping through Eric Carle’s *The Very Hungry Caterpillar*, humming along to Raffi’s 'Baby
    Beluga', watching Sesame Street’s Elmo and Mister Rogers, and swaying to Disney’s 'Let It Go', revealing a quiet yet inquisitive artistic palate that flourishes in small, familiar settings, and they
    often pause to stare at the vibrant colors before attempting their own crayon sketches.
  travel: Mattie Zacharias, a two‑year‑old who has already experienced the sensory wonder of Orlando’s Walt Disney World and a family road‑trip to the Grand Canyon, prefers short, stroller‑friendly excursions
    with familiar caregivers, yet daydreams about future adventures to Tokyo’s Disneyland and the sandy beaches of Santorini, and they often point excitedly at picture books of faraway places during car
    rides.
  culinary: Mattie Zacharias, a two‑year‑old with a palate that oscillates between enthusiastic bites of creamy macaroni and cheese, crunchy banana slices, and occasional peanut butter on whole‑grain toast,
    proudly mixes plain yogurt with diced strawberries at snack time, yet often refuses broccoli, reflecting a classic toddler selective‑eater’s curiosity and occasional stubbornness, and they giggle whenever
    the spoon clatters against the bowl.
  core: Mattie Zacharias, a two‑year‑old whirlwind of curiosity and quiet competitiveness, obsessively lines up blocks in perfect rows, hoards shiny stickers in a secret stash, and they can swiftly shift
    from delighted exploration to stubborn meltdowns when routine is disrupted.
