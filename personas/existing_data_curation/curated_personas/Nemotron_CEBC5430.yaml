  hobbies: '[''Visiting Art Galleries'', ''Community Theater Set Design'', ''Pottery Classes'', ''Watercolor Painting'', ''Hiking'', ''Gardening'', ''Playing Folk Guitar'', ''Reading Literature'', ''Genealogy
    Research'', ''Hosting Dinner Clubs'']'
  career_goals: Although retired from formal employment, John aims to become a leading volunteer curator for the Bedford Historical Society, organizing rotating art exhibits and community mural projects
    that celebrate local heritage. He hopes to mentor high‑school students interested in the visual arts, sharing his knowledge through after‑school workshops. John also plans to write a memoir chronicling
    his travels and artistic encounters, and he aspires to serve on the town’s Arts Advisory Board to advocate for public art funding and accessible cultural programming for seniors and youth alike.
