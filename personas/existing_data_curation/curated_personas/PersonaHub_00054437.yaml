persona_description: A healthcare professional who specializes in the treatment of diarrhoea in children and adults, particularly focusing on the assessment and treatment of dehydration and the use of oral
  rehydration salts (ORS) in the management of diarrhoea. This professional is likely to be interested in studying the treatment guidelines and protocols for diarrhoea management, and may have a special
  interest in the use of zinc supplements for young children with diarrhoea. They may also be familiar with the importance of assessing other general danger signs and providing appropriate treatment for
  other health problems, as well as the role of fluids and electrolytes in the treatment of diarrhoea.
