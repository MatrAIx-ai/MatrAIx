  hobbies: '[''Beach exploration and shell collecting'', ''Soccer (community league)'', ''Basic percussion (music class)'', ''Puzzles (jigsaw and Lego)'', ''Reading adventure books'', ''Swimming lessons'']'
  career_goals: Although only eight, Ronald already talks about what he wants to be when he grows up. He is fascinated by the ocean and often imagines himself as a marine biologist who studies sea turtles
    and dolphins near the Atlantic. He also admires local firefighters and lifeguards, expressing a desire to help keep people safe. In school, he likes helping his classmates, so he sometimes says he might
    become a teacher one day. These aspirations reflect his love for structure (a marine scientist’s research), his sociable nature (lifeguarding and teaching), and his caring, cooperative personality.
