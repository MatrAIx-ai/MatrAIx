  hobbies: '[''Football (linebacker)'', ''Basketball'', ''Competitive video gaming (Fortnite, Call of Duty)'', ''Mechanical tinkering and bike repair'', ''Woodworking (model building)'', ''Church youth
    group event planning'', ''Fishing with family'']'
  career_goals: Christian aims for a career that blends his love of structure, hands‑on work, and competitive drive. His primary goal is to become a marine mechanic or naval engineering technician, drawn
    by the Gulf Coast environment and the clear, systematic pathways of technical trades. He plans to earn certifications such as ASE automotive, welding, and marine engine maintenance, and hopes to join
    the U.S. Navy’s engineering division where he can apply his skills in a disciplined setting. At the same time he is working to earn a football scholarship that could fund a college degree in engineering.
    In the long term he envisions a stable, well‑paying position that allows him to give back to his community by mentoring younger students in technical trades.
