personas:
  professional: Christian Resler, a 14‑year‑old high school sophomore, channels his love of structure into leading defensive drills as a linebacker, organizing community‑service events for his church youth
    group, and applying his hands‑on mindset to fixing his brother's bike and building simple wooden models.
  sports: Christian Resler, a linebacker for the Moss Point Tigers, also drills basketball after school, avidly follows the New Orleans Saints, the Mississippi State Bulldogs, and the Tampa Bay Rays, and
    spends weekends fishing off the Gulf Sound with his dad while dreaming of joining the local youth hunting club.
  arts: Christian Resler regularly tunes into Chris Tomlin worship songs, country hits by Luke Bryan, and the orchestral scores of Fortnite, and they volunteer as a stagehand for youth‑group concerts, finding
    that the blend of gospel choir, country twang, and video‑game beats shapes their creative downtime.
  travel: Christian Resler loves planning weekend road trips, having already explored New Orleans' French Quarter during Mardi Gras, fished the backwaters of Biloxi, and visited Orlando's theme parks, while
    dreaming of a future solo backpacking adventure to the Grand Canyon’s rim, balancing a desire for new scenery with the safety of family‑accompanied journeys.
  culinary: Christian Resler often cooks fried catfish with a crunchy cornmeal crust, slathers ribs in smoky hickory BBQ sauce, whips up buttery jalapeño‑infused cornbread, and reaches for a slice of pepperoni
    pizza after late‑night gaming, showing a preference for bold, salty flavors and a modest kitchen skill set that shines on weekend family meals.
  core: Christian Resler, a competitive 14‑year‑old linebacker and avid gamer, balances a love for structured teamwork, community service, and hands‑on tinkering with a tendency toward worry, occasional
    impulse spending, and a steadfast tie to local traditions and bold Southern flavors.
background:
  cultural: Christian grew up in Moss Point, Mississippi, a small Gulf‑Coast town in Jackson County with a predominantly white, Southern‑conservative population. His family attends a local Southern Baptist
    church, where weekly worship, community service, and family values are emphasized. The local culture celebrates high‑school football, outdoor activities such as fishing and hunting, and close‑knit neighborhood
    connections. Growing up in a region that has faced economic challenges and hurricane impacts has fostered a pragmatic, self‑reliant outlook. Family traditions include Sunday church gatherings, meals
    featuring Southern cuisine like fried catfish and BBQ, and participation in community events such as the annual Blessing of the Fleet. These influences have shaped Christian’s respect for order, sense
    of community responsibility, and competitive spirit.
