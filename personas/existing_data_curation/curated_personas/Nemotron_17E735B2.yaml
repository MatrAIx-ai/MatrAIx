personas:
  professional: Marcela Betancourt, a 20‑year‑old aspiring community health worker, blends strong organizational skills and bilingual fluency with a compassionate, structured approach to coordinating youth
    outreach programs and volunteer initiatives, and they consistently apply practical problem‑solving to ensure reliability and harmony.
  sports: Marcela Betancourt spends weekends playing competitive beach volleyball with the Isla Verde Beach Club, hikes the trails of El Yunque to stay fit, roots for the Cangrejeros de Santurce baseball
    team, and they regularly join local pick‑up basketball games.
  arts: Marcela Betancourt channels their outgoing spirit into salsa and reggaetón dancing to the beats of Marc Anthony, Bad Bunny, and Gilberto Santa Rosa, captures vibrant street festivals with their
    Canon DSLR, and they find inspiration in the prose of Chimamanda Adichie and the poetry of José Alvarez.
  travel: Marcela Betancourt prefers short, well‑planned trips that blend adventure and cultural immersion, having explored the rainforest trails of El Yunque and the historic streets of Old San Juan, and
    they aim to visit the music‑rich city of New Orleans and the Caribbean island of Jamaica next summer.
  culinary: Marcela Betancourt, an adept home cook, proudly prepares arroz con gandules with sofrito, tender pasteles wrapped in banana leaves, and they often experiment with fresh cilantro, adobo, and
    sazón while savoring the flavors of plantain‑based mofongo.
  core: Marcela Betancourt is a vibrant, organized 20‑year‑old who balances structured community service with lively dancing, a love for the outdoors, and a steadfast commitment to youth mental‑wellness.
background:
  cultural: Marcela is a proud Puerto Rican from Trujillo Alto in the San Juan metropolitan area. She grew up in a close‑knit family where Spanish is the primary language, but she also speaks English fluently
    thanks to her schooling. Her heritage reflects the island's blend of Taino roots, Spanish colonial influence, and African rhythms, which are evident in the music, dance, and food she loves. Community
    celebrations such as fiestas patronales and parrandas have shaped her sense of identity and her strong commitment to helping others. The island's values of resilience, hospitality, and collective support
    are central to her worldview.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Event planning and coordination", "Team leadership", "Basic computer literacy (Microsoft Office, social media)", "First aid and CPR certification",
    "Peer tutoring (math and science)", "Conflict resolution", "Community outreach"]'
  hobbies: '["Salsa and reggaetón dancing", "Beach volleyball", "Hiking in El Yunque National Forest", "Cooking Puerto Rican cuisine", "Reading personal development and social issues", "Photography of local
    festivals", "Volunteering at senior community centers"]'
  career_goals: Marcela aims to enroll in a community college program that leads to a bachelor's degree in social work or public health, with the long‑term goal of becoming a community health worker focused
    on youth empowerment and mental wellness. In the short term, she plans to complete a certified nursing assistant course, obtain additional certifications in mental health first aid, and continue volunteering
    with local non‑profits that serve at‑risk teens. Ultimately, she envisions leading outreach initiatives for the Department of Health or a nonprofit organization in San Juan, creating mentorship networks
    and health‑education programs that address health equity on the island.
