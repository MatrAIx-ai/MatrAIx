personas:
  professional: A retired homemaker turned community educator, Donna Story leverages her analytical mind, budgeting savvy, and hands‑on home‑maintenance skills to lead computer‑literacy workshops for seniors,
    organize local history articles, and compete successfully in bridge tournaments, all while maintaining a meticulous, yet flexible, approach that balances curiosity with practicality.
  sports: Donna Story enjoys casual strolls along St. Pete Beach, participates in a senior walking club that meets thrice weekly, follows the Tampa Bay Buccaneers in the fall and the Tampa Bay Lightning
    in winter, and occasionally joins a beginner’s pickleball group, emphasizing steady low‑impact activity over competitive sports.
  arts: Donna Story finds artistic inspiration in the paintings of Winslow Homer, the folk tunes of Joan Baez, and the classic films of Cary Grant, while channeling creativity through crochet and knitting
    projects that often feature motifs of coastal birds she watches on the beach.
  travel: Donna Story prefers low‑key, historically rich road trips, having already explored Savannah, Georgia, Charleston, South Carolina, and Key West, Florida, and she dreams of visiting St. Augustine’s
    colonial sites and the vineyards of the Finger Lakes, always planning itineraries through library archives and budgeting carefully to keep travel modest.
  culinary: Donna Story delights in preparing fresh garden harvests into dishes like citrus‑glazed grouper, pickled okra, rosemary‑infused roasted carrots, and strawberry‑lime jam, showcasing a proficient
    kitchen hand who balances healthful meals with occasional indulgent desserts, and she proudly uses locally sourced Florida honey and heirloom tomatoes in her cooking.
  core: Donna Story is a meticulous, curiosity‑driven retiree who channels competitive energy into bridge, balances a thrifty budget with a passion for native gardening, and occasionally hoards heirloom
    seed packets while neglecting to water a few backyard succulents.
background:
  cultural: Donna is a white, mid‑Atlantic‑born American who has lived most of her adult life in Florida. Her upbringing reflects traditional American values, with an emphasis on self‑reliance and practicality
    common in the post‑World‑II generation. In Pinellas County, she has absorbed the retiree‑friendly, coastal‑community culture, which blends Southern hospitality with a laid‑back, outdoor lifestyle. She
    participates in local church social gatherings, enjoys the multicultural influences of the Tampa Bay area (especially its Hispanic and Caribbean flavors in food), yet maintains a personal identity rooted
    in classic Americana and the independent spirit of her generation.
attributes:
  skills: '[''Home maintenance (basic plumbing, electrical, painting)'', ''Cooking and meal planning'', ''Food preservation (jams, pickles)'', ''Budgeting and personal finance'', ''Basic computer and internet
