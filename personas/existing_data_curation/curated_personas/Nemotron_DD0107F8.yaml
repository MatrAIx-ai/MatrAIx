  hobbies: '[''Gardening (native Florida plants)'', ''Birdwatching'', ''Historical nonfiction reading'', ''Genealogy research'', ''Walking on the beach'', ''Crochet and knitting'', ''Bridge club'', ''Crossword
    puzzles'', ''Volunteer at senior center book exchange'']'
  career_goals: Although retired from formal employment, Donna aims to stay intellectually active and contribute to her community. She plans to complete a GED to formalize her education and to obtain a
    caregiving certification so she can volunteer at the local senior center. She aspires to lead a weekly computer‑literacy class for seniors, publish a series of articles on Pinellas County’s historical
    sites in the community newsletter, and enter regional gardening competitions with her native‑flower garden. Long‑term, she hopes to compile her family’s genealogy into a self‑published memoir and perhaps
    start a small home‑based business selling homemade preserves at local farmers markets.
