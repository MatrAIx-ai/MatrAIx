  career_goals: Kimberly aims to advance into a laboratory supervisory or clinical coordinator role within the next five years, leveraging her strong performance metrics to lead a phlebotomy team. She plans
    to obtain a Certified Phlebotomy Technician (CPT) credential and pursue an associate degree in medical laboratory technology to qualify as a medical lab technician. Her competitive drive pushes her
    to achieve top patient satisfaction scores and zero draw errors, positioning her for recognition as "Phlebotomy Technician of the Year" at her health system. She also intends to expand her community
    impact by organizing regular mobile blood‑drive events across Montgomery County and eventually develop a small independent mobile phlebotomy service serving underserved neighborhoods.
