  career_goals: Angela hopes to turn her love of cooking into a small home‑based catering service, specializing in traditional Ponceño recipes for weddings and community festivals. She plans to enroll in
    a short food‑safety certification program at the local community college and to obtain a GED to formalize her education. Additionally, she aspires to lead a weekly cooking workshop at the neighborhood
    community center, where she can share her culinary knowledge and mentor adolescent girls interested in culinary arts. Her broader ambition is to strengthen community bonds by organizing cultural celebrations
    that showcase local music, dance, and food.
