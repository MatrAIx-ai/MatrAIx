  career_goals: Cecilia aims to stay actively involved in her community, ensuring that the traditions of her Venezuelan heritage are celebrated in St. Cloud. She aspires to mentor younger volunteers at
    the senior center, sharing her event‑planning know‑how and culinary skills. She also wishes to become more proficient with digital tools, such as video‑calling apps, to maintain regular contact with
    relatives abroad. While she no longer seeks formal employment, she is committed to leading the annual multicultural festival at the community center, creating a predictable schedule that reinforces
    her love for structure while fostering social interaction. Additionally, she hopes to document family recipes in a modest handwritten booklet to pass down to future generations.
