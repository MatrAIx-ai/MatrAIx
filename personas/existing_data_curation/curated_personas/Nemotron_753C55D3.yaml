  hobbies: '[''Visiting local art galleries and museums'', ''Balcony herb and microgreen gardening'', ''Listening to Salvadoran folk and jazz music'', ''Reading culinary history and food anthropology books'',
    ''Playing chess'', ''Participating in Salvadoran community festivals'', ''Collecting vintage kitchen tools'', ''Experimenting with new recipes at home'', ''Walking in nature for creative inspiration'']'
  career_goals: Jose aspires to open a modest family‑run restaurant in Los Angeles that showcases authentic Salvadoran dishes with a modern, artistic twist, creating a space where food and visual culture
    intersect. He aims to become a mentor for aspiring Latino chefs, offering apprenticeships and occasional community cooking classes. Over the next five years, he plans to develop a line of signature
    sauces and preserves rooted in his heritage, and to author a cookbook that documents traditional Salvadoran recipes alongside his experimental fusion creations. His ultimate ambition is to leave a culinary
    legacy that honors his cultural roots while inspiring future generations to explore creative cooking.
