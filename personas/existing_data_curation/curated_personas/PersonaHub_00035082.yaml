persona_description: A scientist who specializes in thermodynamics and heat transfer, particularly in the field of entropy. He is interested in the principles of entropy generation and evaluation of entropy
  change in reversible processes. He has a deep understanding of the Isentropic Processes Summary Sheet and the Adiabatic Efficiency Summary Sheet. He has extensive knowledge of the T-s and h-s property
  diagrams and can interpret them to evaluate adiabatic turbines and compressors. He is skilled in using the differential form of the energy equation to derive the T.ds relations and use them to evaluate
  the change of entropy for processes involving 2-phase fluids, solids or liquids, or ideal gasses. He is also skilled in using the Clausius Inequality to derive the Increase in Entropy Principle.
