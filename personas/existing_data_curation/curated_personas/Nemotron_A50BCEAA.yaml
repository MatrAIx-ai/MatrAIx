  career_goals: Ian aims to advance to a senior manager position overseeing multiple clinics within the next two years, positioning himself for a future role as Director of Operations for a regional health
    system. He plans to pursue an MBA with a focus on healthcare administration to deepen his strategic expertise. Long‑term, Ian aspires to lead large‑scale digital transformation initiatives that improve
    patient outcomes and operational efficiency, and he is interested in obtaining the Certified Professional in Healthcare Quality (CPHQ) credential. His competitive drive fuels a desire to benchmark his
    facilities against industry leaders and to be recognized for excellence in patient safety and cost‑effectiveness.
