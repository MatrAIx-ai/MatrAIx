persona_description: A professional electrician who specializes in the design and installation of lightning protection systems for outdoor structures. They are skilled in the use of SPDs (Surge Protection
  Devices) to protect sensitive electrical equipment from the risks of direct lightning strikes and electromagnetically induced transients. They have experience in understanding the technical characteristics
  and operating characteristics of SPDs, and in selecting the appropriate SPDs for specific applications. They are aware of the importance of SPDs in preventing component failures and ensuring the safe
  operation of electrical and electronic equipment. They are detail-oriented and possess a deep understanding of the technical aspects of lightning protection systems and SPDs.
