personas:
  professional: Francis Thompson, a pragmatic warehouse operations specialist with deep expertise in inventory management, shipping documentation, and forklift safety, leverages their structured mindset
    and compassionate teamwork approach to train new staff, resolve high‑pressure conflicts, and design employee‑friendly workflow improvements while occasionally relying on flexible, on‑the‑fly problem
    solving.
  sports: Francis Thompson, a devoted follower of the Brooklyn Nets and New York Knicks who plays casual basketball at a neighborhood court each summer, logs regular waterfront walks for cardio, and joins
    a low‑key Saturday bowling league to stay fit without the pressure of intense training schedules.
  arts: Francis Thompson, a classic‑rock enthusiast who fills the kitchen with Led Zeppelin, The Rolling Stones, and Fleetwood Mac while cooking, hosts weekly board‑game nights featuring Settlers of Catan,
    and enjoys catching Broadway revivals like Hamilton or intimate jazz sets at local Brooklyn venues.
  travel: Francis Thompson, who prefers spontaneous weekend road trips to nearby coastal towns such as the Hamptons or historic Boston, dreams of a culinary tour of Tuscany but currently opts for budget‑friendly,
    short‑duration getaways that align with their need for predictable schedules and limited family obligations.
  culinary: Francis Thompson, a confident home chef who perfects comfort dishes like creamy chicken pot pie, homemade mac and cheese, and rosemary‑infused beef stew using herbs from their balcony garden,
    regularly treats the family to takeout from Brooklyn’s famous Junior’s cheesecake shop, yet sometimes over‑season dishes when anxiety spikes.
  core: Francis Thompson, a 47‑year‑old logistics professional who balances a love of comfort cooking, classic rock, and volunteering at a food pantry with a persistent anxiety that fuels daily meditation,
    spontaneous balcony gardening, and the occasional habit of misplacing paperwork despite a desire for structure.
background:
  cultural: Francis is a white American raised in Brooklyn, with roots in Irish and Italian immigrant families. He grew up in a close‑knit working‑class neighborhood that emphasized community, hard work,
    and family gatherings. His cultural identity blends the East Coast urban lifestyle with traditional values of hospitality and mutual support.
