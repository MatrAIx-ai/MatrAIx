  career_goals: Francis aims to advance to a supervisory or managerial role within logistics, such as Warehouse Supervisor or Operations Manager, where he can lead a team, implement process improvements,
    and mentor junior staff. He plans to obtain a Certified in Production and Inventory Management (CPIM) credential and explore opportunities to develop more efficient, employee‑friendly workflows. Long‑term,
    he may consider starting his own consulting service to help small businesses optimize their supply chains while maintaining a supportive workplace culture.
