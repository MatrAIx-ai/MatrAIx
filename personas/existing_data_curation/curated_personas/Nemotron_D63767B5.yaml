  hobbies: '[''Soccer'', ''Hiking'', ''Thai Cooking'', ''Community Hosting'', ''Cultural Festivals'', ''Volunteer Work at Thai Temple'', ''Mindfulness Meditation'', ''Yoga'', ''Karaoke'', ''Board Games'',
    ''Exploring Local Arts and Music'']'
  career_goals: Gregorio aims to progress from his current administrative assistant role to an office manager or executive assistant position within the next three to five years. He plans to complete a
    bachelor's degree in Business Administration while obtaining the Certified Administrative Professional (CAP) credential. He is motivated to lead a small office team, develop and implement efficient
    workflow systems, and mentor junior staff. Additionally, he hopes to contribute to his community by organizing cultural events at the local Thai cultural center, balancing his professional ambitions
    with a stable, predictable work environment that supports his well‑being.
