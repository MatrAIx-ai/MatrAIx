persona_description: A member of the OIE (Organization International des Epizooties) who is closely monitoring the world animal health situation, particularly with regard to infections of all susceptible
  animals with the pandemic H1N1 2009 virus. This person is knowledgeable and experienced in animal disease surveillance and reporting mechanisms, and is aware of the importance of international collaboration
  and communication between animal health and public health authorities. They are also familiar with the ongoing research on the transmission and pathogenesis of the pandemic H1N1 2009 virus in different
  species of animals, and are aware of the ongoing scientific research being led by the OFFLU network (OIE-FAO joint network of expertise on animal influenza).
