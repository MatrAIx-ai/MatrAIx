  hobbies: '["Building block construction", "Drawing and coloring", "Storytime listening", "Playing with toy trucks and farm equipment", "Preschool soccer", "Visiting family garden and farm", "Sunday school
    singing and crafts"]'
  career_goals: Maurice often pretends to be a firefighter or a teacher during play. He loves the idea of helping people and keeping his community safe, which reflects his desire for a structured, responsible
    role. He talks about wearing a bright red helmet, sliding down a pole, and teaching younger kids how to count. While his ambitions are still imaginative, they show an early inclination toward careers
    that involve clear rules, teamwork, and service to others.
