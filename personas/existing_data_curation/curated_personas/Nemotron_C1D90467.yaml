personas:
  professional: Maurice Sellu, a four‑year‑old preschool class helper, thrives on the predictable routine of circle time and tidy cubbies, applying their practical focus and reliability to keep the classroom
    organized and offering assertive suggestions when playtime gets chaotic.
  sports: Maurice Sellu enjoys the structured fun of weekly preschool gymnastics sessions, proudly wears the Tiny Tigers youth soccer jersey on Saturdays, and, with parental support, cheers for the nearby
    professional baseball team the Chicago Cubs while they occasionally attempt to imitate the team's signature slides on the playground.
  arts: Maurice Sellu, a four‑year‑old who spends afternoons drawing vibrant Crayola masterpieces inspired by Eric Carle’s bright illustrations, sings loudly to The Wiggles and the soundtrack of Moana,
    and they eagerly watch Disney Pixar shorts, letting these artistic experiences shape a vivid imagination.
  travel: Maurice Sellu loves family road trips that stick to a predictable schedule, cherishes the familiar routine of visits to the nearby beach park in summer, and they still dream of a magical excursion
    to Disneyland in California and a brief glimpse of the towering Grand Canyon, preferring short flights and familiar hotel rooms.
  culinary: Maurice Sellu, a four‑year‑old with a love for buttery macaroni‑and‑cheese, chicken nuggets dipped in ketchup, and strawberry‑banana smoothies, eagerly helps whisk batter for pancakes but they
    stubbornly refuse to try broccoli, preferring sweet, familiar flavors.
  core: Maurice Sellu, a four‑year‑old who thrives on orderly routines, saves every coin for a dinosaur toy, battles occasional eczema with disciplined bedtime routines, and they insist on wearing matching
    socks even when one goes missing, epitomizes a tiny blend of practical precision and whimsical stubbornness.
background:
  cultural: Maurice is an African-American child raised in Immokalee, a small town in Collier County known for its agricultural roots and a vibrant mix of cultures, especially Hispanic farm-worker families.
    His family maintains strong ties to the local Black community, attending church services, celebrating holidays like Juneteenth and Thanksgiving with traditional dishes such as fried chicken, collard
    greens, and sweet potato pie. At the same time, Maurice is exposed to Spanish language and customs through neighbors and school activities, picking up simple greetings and enjoying multicultural festivals
    that feature corn-based foods and music. This blend of Southern African-American traditions and the multicultural environment of the Everglades region gives him a unique cultural perspective that values
    family, community service, and a love of rhythm and routine.
attributes:
  skills: '["Letter recognition", "Counting to 20", "Shape and colour sorting", "Fine-motor skills (drawing, block building)", "Following daily routines", "Basic self-care (dressing, toileting)", "Cooperative
