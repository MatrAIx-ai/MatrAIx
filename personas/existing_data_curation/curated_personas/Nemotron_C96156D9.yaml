  career_goals: Debbie aims to become a senior director of insights within a consumer‑focused organization, leading cross‑functional teams to shape brand strategy. She plans to deepen her expertise in AI‑driven
    analytics and earn a professional research certification. Over the next five years, she hopes to manage large‑scale research programs, mentor junior analysts, and eventually launch her own boutique
    consultancy that specializes in socially responsible market research. She also wants to balance career growth with family life, advocating for flexible work arrangements and fostering a collaborative,
    harmonious workplace culture.
