persona_description: A researcher or clinician interested in the impact of hormonal contraceptive use on the transmission of HIV among women. The individual is likely to be familiar with the literature
  on the topic, including the studies conducted by Clark and the previous studies on the association between hormonal contraceptive use and HIV genital shedding. The individual is also likely to be interested
  in the potential mechanisms underlying the association, such as changes in hormonal levels or changes in immune function. The individual may also be interested in the potential implications of their findings
  for public health policy and practice.
