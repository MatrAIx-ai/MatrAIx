personas:
  professional: Duvier Gil, a retired civil infrastructure engineer, now leads a volunteer task force that redesigns irrigation channels and audits rural road safety with meticulous AutoCAD plans, leveraging
    bilingual communication to coordinate seniors, youth, and local officials while mentoring a robotics club that reflects their methodical, community‑first mindset.
  sports: Duvier Gil, an avid hiker, spends Saturday mornings traversing the Sangre de Cristo foothills with the Santa Rosa Hiking Club, cheers on the New Mexico United soccer team from their living room,
    and joins the senior bowling league at the local community center, balancing gentle exercise with their love for local sports camaraderie.
  arts: Duvier Gil, musically inclined, strums acoustic guitar in the town’s folk ensemble, rehearses traditional dances for Día de los Muertos celebrations, and delights in the songs of Carlos Santana,
    Joan Baez, and Los Lobos, which shape their creative expression and social gatherings.
  travel: Duvier Gil enjoys weekend trips to historic Taos for its art markets, has a bucket‑list entry for the Gila River Canyon canoe route, and dreams of visiting the coastal villages of the Baja Peninsula
    to compare desert flora, all while preferring modest travel budgets that allow them to make frequent family visits.
  culinary: Duvier Gil, an enthusiastic cook, prepares tamales and pozole using chilies, cilantro, and masa from their garden, perfects a smoky chile verde salsa, and occasionally treats themselves to a
    plate of enchiladas with roasted corn, reflecting their moderate cooking skills and deep love for traditional flavors.
  core: Duvier Gil, with a disciplined mind, a love for community music, and a garden full of chilies, blends engineering precision with festive spirit, often forgetting to water their plants while planning
    the next irrigation upgrade.
background:
  cultural: Duvier was born in Santa Rosa, New Mexico, to parents who emigrated from the state of Jalisco, Mexico. Growing up in a bilingual household, he celebrated Mexican holidays such as Día de los
    Muertos, Cinco de Mayo, and Las Posadas, while also participating in New Mexican traditions like the annual Fiestas de Santa Rosa. His Catholic faith and strong family ties reinforced values of mutual
    support, respect for elders, and community solidarity. The fusion of Mexican heritage and the frontier spirit of the Southwest shaped his pragmatic outlook, love for communal gatherings, and commitment
    to preserving cultural stories. He remains active in the local parish, attends cultural workshops, and maintains close relationships with relatives both in the United States and Mexico.
attributes:
  skills: '[''Civil infrastructure project management'', ''Technical drafting (AutoCAD)'', ''Mechanical troubleshooting and repair'', ''Bilingual communication (Spanish/English)'', ''Community meeting facilitation'',
