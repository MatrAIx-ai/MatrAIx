  hobbies: '[''Gardening (chilies, cilantro, herbs)'', ''Playing acoustic guitar'', ''Traditional Mexican dancing'', ''Model train building and operation'', ''Hiking in local foothills'', ''Reading popular
    science magazines'', ''Volunteering at senior center (bingo, crafts)'', ''Cooking family recipes (tamales, pozole)'', ''Participating in community folk music group'', ''Organizing community events'']'
  career_goals: In retirement, Duvier’s primary ambition is to apply his engineering knowledge to improve the local community. He hopes to lead a volunteer task force that upgrades irrigation channels and
    maintains safe road conditions for seniors. He also aims to mentor the next generation through an after‑school robotics club at the local elementary school, preserving his legacy of practical problem‑solving.
    He wishes to compile oral histories of Mexican‑American families in Santa Rosa for the county archives, and to stay physically active by participating in senior fitness programs. His long‑term goal
    is to leave a tangible, sustainable impact on Guadalupe County while remaining connected to his family and cultural roots.
