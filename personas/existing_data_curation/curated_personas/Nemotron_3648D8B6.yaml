personas:
  professional: A seasoned firefighter, Jeaneth Cabrera, they blend Firefighter I & II, EMT‑Basic, and hazmat certifications with bilingual communication skills to lead disciplined incident command teams,
    while methodically pursuing an associate degree in fire science and a paramedic credential to fulfill their goal of becoming fire captain within five years.
  sports: An avid weight‑training enthusiast and weekend hiker, Jeaneth Cabrera, they belong to the Brazoria Trail Club, regularly tackle the coastal trails of Galveston, and cheer for the Houston Astros
    and Houston Rockets, while also participating in local 5K runs that double as community fundraisers.
  arts: A mystery‑novel aficionado, Jeaneth Cabrera, they devote evenings to reading Agatha Christie and Gillian Flynn, attend live performances by regional folk bands, and volunteer at cultural festivals
    where they help coordinate traditional music and dance showcases, drawing inspiration from the storytelling traditions they grew up celebrating.
  travel: A balanced traveler, Jeaneth Cabrera, they prefer well‑planned road trips that combine coastal hikes in South Padre Island, historic tours of San Antonio’s missions, and culinary pilgrimages to
    Oaxaca for authentic mole, while budgeting vacations to fit their career advancement goals and family commitments.
  culinary: A dedicated home cook, Jeaneth Cabrera, they cultivate tomatoes, chilies, and cilantro in their backyard garden to craft authentic tacos al pastor, pozole, and chiles en nogada, and they enjoy
    experimenting with homemade salsas using roasted tomatillos and smoked paprika, though they occasionally burn the edges of their corn tortillas in a rush.
  core: Jeaneth Cabrera is a disciplined, community‑focused firefighter who balances structured ambition with a love for gardening, mystery novels, and weekend hikes, they secretly indulge in occasional
    culinary experiments and impulse gym‑gear purchases.
background:
  cultural: Jeaneth is a second‑generation Mexican‑American raised in the close‑knit Hispanic community of Brazoria County, Texas. Bilingual in Spanish and English, she grew up with strong family and Catholic
    traditions, celebrating holidays such as Día de los Muertos and Navidad with her extended family. The blend of Texan self‑reliance and Latino communal values has shaped her commitment to public service,
    emphasizing teamwork, respect, and a deep sense of responsibility toward her neighbors.
