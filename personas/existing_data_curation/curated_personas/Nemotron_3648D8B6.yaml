  career_goals: Jeaneth aims to advance to the rank of fire captain within the next five years, leveraging her experience to lead larger incident command teams. She plans to earn an associate degree in
    fire science and pursue paramedic certification to broaden her medical capabilities. Additionally, she is passionate about developing a community outreach program that delivers fire safety and emergency
    preparedness training in Spanish to underserved neighborhoods, and she hopes to mentor new recruits, especially women and Hispanic candidates, to foster greater diversity in the fire service.
