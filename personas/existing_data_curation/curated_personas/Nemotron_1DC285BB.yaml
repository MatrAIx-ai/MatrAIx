personas:
  professional: Jack Castonguay, a veteran automotive service technician with over forty years of hands‑on experience, blends their methodical diagnostic expertise and calm, organized demeanor with a passion
    for artistic vehicle restoration, mentoring apprentices and drafting detailed repair procedures while preparing to launch a boutique garage that offers hands‑on classic‑car workshops and community outreach.
  sports: Jack Castonguay, an avid hiker who straps on their boots for weekly treks on the Kickapoo State Recreation Area trails, follows the Peoria Chiefs baseball team and the Chicago Cubs with the same
    steady dedication they apply to shop work, maintains a modest cardio routine through morning walks, and occasionally joins a local senior cycling club for weekend rides.
  arts: Jack Castonguay, a devoted oil‑painter who emulates the chiaroscuro of Caravaggio while capturing the sleek lines of vintage automobiles in their canvases, frequents the Peoria Riverfront Museum
    and the Contemporary Art Center, collects works by local realist painter Sarah Thompson, and regularly attends gallery openings featuring emerging Midwestern artists.
  travel: Jack Castonguay, who plans their journeys with the same precision they apply to restoration schematics, enjoys weekend road trips to iconic car shows such as the Pebble Beach Concours d’Elegance
    and the Detroit Auto Show, has already toured the Mercedes‑Benz Museum in Stuttgart, and hopes to explore the historic streets of Savannah, Georgia, while savoring the quiet of their garden at home
    between travels.
  culinary: Jack Castonguay, a competent home cook who often whips up rosemary‑marinated grilled chicken, beet and goat cheese salad using vegetables from their garden, and a slow‑cooked beef bourguignon
    for Sunday gatherings, balances their love of hearty, smoky barbecues with a penchant for a perfectly pulled espresso shot while occasionally indulging in a classic shrimp étouffée at their favorite
    downtown bistro.
  core: Jack Castonguay, a calm, methodical automotive veteran who fuses classic‑car restoration with oil‑painting flair, mentors apprentices, devotes weekends to hiking and chess, and never misses an opportunity
    to blend art into engineering, even if it means a few extra coffee stains on their workshop floor.
background:
  cultural: Jack grew up in East Peoria, Illinois, in a family with French‑Canadian roots that settled in the Midwest generations ago. The region’s Midwestern values of hard work, reliability, and community
    service shaped his upbringing. Exposure to the local automotive industry and the town’s modest art scene fostered his dual appreciation for mechanical craftsmanship and visual arts. He identifies with
    the pragmatic, neighborly spirit of the area while also valuing the cultural traditions passed down from his ancestry, such as celebrating family gatherings, attending local festivals, and supporting
    community institutions.
