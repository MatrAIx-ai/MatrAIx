  career_goals: Martha aims to advance from her current cleaning role into a supervisory position within the facilities management team, eventually becoming a cleaning manager responsible for multiple sites.
    She plans to earn a Certified Facility Manager (CFM) credential and complete an associate’s degree in Business Administration at a local community college. Long‑term, she envisions launching her own
    eco‑friendly cleaning business that prioritizes sustainable chemicals and employee well‑being, while also offering training workshops for other janitorial professionals in the Mesa area. Throughout
    her career progression, she hopes to mentor newcomers and champion workplace safety and environmental stewardship.
