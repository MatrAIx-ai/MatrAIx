  career_goals: William hopes to move beyond his current general office clerk role into a supervisory position within the next three to five years. He plans to earn his GED and take evening courses at the
    nearby community college in business administration or bookkeeping, which would qualify him for an office manager or inventory coordinator role. He also dreams of eventually running a small local hardware
    store or a mobile repair service, allowing him to combine his practical mechanical skills with customer interaction. In the short term, he wants to improve his organizational habits, reduce workplace
    stress, and become the go‑to person for streamlining office processes, which could lead to a promotion or salary increase.
