  hobbies: '["Church choir", "Book club", "Community gardening", "Cooking Southern soul‑food", "Knitting and quilting", "Brisk walking", "Senior dance class", "Family reunions", "Local festivals"]'
  career_goals: Whittney aims to shift from day‑to‑day clerical tasks to a senior administrative coordinator role where she can shape workflows and mentor newer staff. She hopes to partner with a local
    nonprofit or community organization to apply her office expertise in support of social programs, while reducing her weekly hours to create space for personal wellness and family time. In the longer
    term, she envisions semi‑retirement that includes occasional consulting on office efficiency and leading a peer‑support group for seniors coping with workplace stress. Continuing education in stress‑management
    techniques and basic project management is also on her agenda.
