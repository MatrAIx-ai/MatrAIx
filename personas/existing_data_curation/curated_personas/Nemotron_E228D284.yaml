personas:
  professional: Shah Starzer, a retired farmhand and community volunteer, leverages decades of hands‑on carpentry, plumbing, electrical, and gardening expertise to mentor younger neighbors while balancing
    a pragmatic curiosity with a relaxed, sometimes haphazard approach to project planning.
  sports: Shah Starzer enjoys tranquil weekend fishing at local ponds, follows the Minnesota Twins baseball team, participates in a senior bowling league at the community center, and occasional helps maintain
    the bird‑watching trail, embodying a low‑intensity, nature‑focused approach to fitness.
  arts: Shah Starzer immerses themselves in historical nonfiction, tunes into vintage radio broadcasts of folk legends like Woody Guthrie and Bob Dylan, attends intimate choir performances at their church,
    and plans to capture family moments through a short digital photography course, revealing a quiet but deep appreciation for storytelling and melody.
  travel: Shah Starzer prefers relaxed, road‑trip style travel with their spouse, aiming to explore Midwestern heritage sites such as the Gateway Arch in St. Louis, the Henry Ford Museum in Dearborn, and
    the historic town of Galena, Illinois, relying on spontaneous itineraries rather than strict scheduling.
  culinary: Shah Starzer delights in cooking garden‑fresh meals, often preparing roasted carrots with rosemary, homemade tomato soup with basil, and pickled cucumbers, while occasionally indulging in hearty
    chicken pot pie, showcasing a comfort‑food palate anchored in seasonal, home‑grown ingredients.
  core: Shah Starzer blends a quiet, hands‑on curiosity with a laid‑back, sometimes forgetful nature, always ready to lend a tool or an ear, even if their own schedule is a bit tangled.
background:
  cultural: Michael grew up on a family farm in the rural Midwest and has spent most of his life in Nebraska’s Sarpy County. His cultural background reflects the plains‑state values of self‑reliance, community
    cooperation, and modest practicality, with influences from Protestant (likely Lutheran) traditions and a strong sense of local heritage, while maintaining openness to new ideas and technologies.
