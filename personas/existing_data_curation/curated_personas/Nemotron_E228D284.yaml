  career_goals: Although retired, Michael aims to stay active by mentoring younger community members in practical skills, expanding his knowledge of sustainable gardening, and supporting his wife’s involvement
    in church outreach. He also hopes to complete a short course on digital photography to capture family memories and to travel to a few Midwest historical sites with his spouse.
