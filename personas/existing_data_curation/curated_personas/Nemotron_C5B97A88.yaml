personas:
  professional: Jacqueline Thompson, an aspiring digital illustrator and high school sophomore, channels their curious and competitive spirit into meticulously sketched concept art, digital paintings, and
    short fiction, balancing school responsibilities with regular volunteer work at the community art center.
  sports: Jacqueline Thompson pedals their bike through the Cuyahoga Valley Trail for fitness, follows the Cleveland Browns and Guardians with fervor, plays on the high school co‑ed floor hockey team, and
    occasionally joins a local youth soccer club, approaching each sport with a competitive edge that outweighs cooperative play.
  arts: Jacqueline Thompson, a budding visual artist, draws inspiration from Van Gogh’s brushwork, the surreal worlds of Hayao Miyazaki, and the indie sounds of Phoebe Bridgers and Tame Impala, regularly
    visits the Cleveland Museum of Art and the Akron Art Museum, and spends weekends photographing everyday moments to enrich their sketchbooks.
  travel: Jacqueline Thompson loves road‑trip adventures, having explored Niagara Falls and the Rock & Roll Hall of Fame on family vacations, planning a future solo bike tour of the Appalachian Trail, while
    balancing school commitments and a modest travel budget that prioritizes free outdoor experiences over pricey resorts.
  culinary: Jacqueline Thompson enjoys whipping up homemade pizza topped with fresh basil and mozzarella, perfecting a classic Midwest mac & cheese, and experimenting with ramen broth infused with miso
    and chili oil, though they occasionally skip breakfast for a quick granola bar before cycling to school.
  core: Jacqueline Thompson, a 15‑year‑old digital art enthusiast, blends a competitive drive with calm resilience, channeling skeptical curiosity into vibrant creations, methodical savings, and a love
    for bike‑centric exploration.
background:
  cultural: Jacqueline grows up in a middle‑class White family in Strongsville, a suburban community in Cuyahoga County, Ohio. Her ancestry includes German and Irish roots, common among many Midwestern
    families. The region’s emphasis on community, modesty, self‑reliance, and volunteerism informs her worldview, while proximity to Cleveland’s museums, music venues, and cultural festivals provides exposure
    to broader artistic influences. Family traditions feature annual holiday gatherings, church attendance, and participation in local farmers’ markets, fostering an appreciation for both local heritage
    and the wider world. This blend of Midwestern values and access to diverse cultural resources shapes her open‑minded yet grounded perspective.
