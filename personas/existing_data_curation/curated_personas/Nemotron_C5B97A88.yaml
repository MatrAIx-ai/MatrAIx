  career_goals: Jacqueline aims to turn her love for art and technology into a career as a multimedia creator. She envisions studying Visual Arts or UI/UX Design at a college that encourages interdisciplinary
    work, with the long‑term goal of becoming a concept artist for video games or an independent digital illustrator. She hopes to merge her storytelling passion with visual design, eventually launching
    her own freelance studio that produces artwork, interactive media, and immersive experiences. Her calm resilience and competitive drive fuel an ambition to create innovative work that stands out while
    maintaining a balanced, flexible lifestyle.
