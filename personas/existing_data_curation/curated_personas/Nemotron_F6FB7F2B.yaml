  hobbies: '["Reading non-fiction", "Jogging", "Landscape photography", "Woodworking", "Single-player video gaming", "Cooking barbecue", "Volunteer at food bank", "Hiking", "Visiting farmers markets"]'
  career_goals: Byron aims to rise to a Senior Account Manager position within the next three years, followed by a Regional Sales Manager role overseeing sustainable manufacturing product lines. He plans
    to pursue a part-time MBA to deepen his strategic and financial acumen, with a focus on green supply chains. Long‑term, he aspires to a strategic sales leadership position that allows for remote work,
    enabling him to balance his need for solitude with a meaningful impact. He also seeks recognition for championing ethical sales practices and for mentoring new sales representatives, ultimately contributing
    to community development initiatives tied to his industry.
