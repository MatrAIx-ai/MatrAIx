personas:
  professional: Nicomedes Tinoco, a highly organized two‑year‑old who runs a pretend toy store in the living room, they meticulously arrange stuffed animals on shelves, negotiate play‑time deals with peers,
    and proudly flaunt their role as the center of attention during family gatherings, showing early signs of entrepreneurial curiosity balanced with a practical love for routine.
  sports: Nicomedes Tinoco, an energetic two‑year‑old enrolled in the Provo Little Kickers soccer clinic, they love sprinting in the park, cheer loudly for the Utah Jazz during family game nights, and proudly
    wear their miniature Real Salt Lake cap, channeling a competitive spirit that pushes them to win every tag game.
  arts: Nicomedes Tinoco, a vibrant little artist who spends afternoons drawing bright marigold flowers while mariachi music plays in the background, they idolize the colorful murals of Frida Kahlo and
    the playful melodies of Luis Miguel, and eagerly imitate characters from Pixar's Coco, allowing their sociable nature to sparkle during family storytelling sessions.
  travel: Nicomedes Tinoco, a curious explorer who loves weekend trips to Zion National Park’s easy trails and recalls a family vacation to Mexico City’s bustling markets, they prefer well‑planned itineraries
    with plenty of playtime stops, but occasionally demand a repeat of the ice‑cream stand they discovered in Salt Lake City, reflecting a mix of adventure and comfort.
  culinary: Nicomedes Tinoco, a selective eater who adores the aroma of freshly steamed tamales and cheesy quesadillas, they also enjoy occasional chicken nuggets, can proudly sprinkle shredded cheese onto
    their own plate, and insist on using a bright red fork, showcasing both a disciplined palate and a playful stubbornness when presented with new foods.
  core: Nicomedes Tinoco, a talkative two‑year‑old who merges meticulous toy‑organizing with a competitive love for games, balances curiosity with a practical streak, and refuses to share the last cookie
    without a playful debate.
background:
  cultural: Nicomedes is raised in a Mexican‑American household in Provo, Utah. At home, Spanish is spoken alongside English, giving him bilingual exposure from an early age. Family traditions such as celebrating
    Día de los Muertos, preparing tamales, and listening to mariachi music are part of his daily life, fostering a strong connection to his Mexican heritage. The local community's values of family togetherness
    and outdoor recreation also influence his upbringing, as he often joins neighborhood families for park outings and community events. This blend of Mexican cultural practices and the Utah environment
    shapes his identity and worldview.
