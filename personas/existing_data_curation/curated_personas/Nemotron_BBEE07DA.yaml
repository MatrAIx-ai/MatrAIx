  career_goals: Zoe aspires to attend a top university for a STEM field, aiming to become a biomedical engineer or a science communicator who can translate complex technical concepts into engaging public
    presentations. She dreams of designing innovative medical devices while also speaking at conferences and producing educational video content. Her long‑term ambition includes earning scholarships, leading
    interdisciplinary research teams, and eventually influencing policy that promotes science education and community health.
