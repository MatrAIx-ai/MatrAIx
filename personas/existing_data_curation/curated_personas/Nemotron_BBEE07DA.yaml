personas:
  professional: Zoe Alvarez, an aspiring robotics engineer and debate prodigy, channels their organized, methodical mindset and love of competition into leading the school’s robotics club projects while
    relentlessly questioning conventional designs to craft pragmatic, innovative solutions.
  sports: Zoe Alvarez, a competitive member of the Eastside United youth soccer club and an avid weekend hiker on the Sierra Trail, passionately roots for the Los Angeles Lakers and follows the US Women’s
    National Soccer Team, often analyzing match statistics to improve their own play.
  arts: Zoe Alvarez, a drama‑club lead who strums acoustic guitar inspired by John Mayer, delights in performing monologues from Lin‑Manuel Miranda’s works, and captures street‑scene photography reminiscent
    of Nan Goldin, while curating a playlist that mixes Taylor Swift, the Beatles, and K‑pop group BTS.
  travel: Zoe Alvarez, who prefers meticulously planned weekend road trips, has explored Yosemite and the Grand Canyon with friends, dreams of a cultural exchange summer in Kyoto, and routinely adds new
    destinations to a travel journal that alternates between adventure hikes and museum tours.
  culinary: Zoe Alvarez, a budding kitchen experimenter, loves crafting homemade ramen with miso broth, pork belly, and soft‑boiled eggs, devours tacos al pastor with pineapple and cilantro on busy weeknights,
    but often resorts to ordering pizza after late‑night robotics rehearsals.
  core: Zoe Alvarez, the charismatic teen multitasker, blends curiosity and practicality by engineering robot prototypes, debating heated topics, and humming guitar riffs while never missing a hike or a
    fundraising deadline.
background:
  cultural: Zoe was raised in Woodland, California, a small agricultural community in Yolo County. Her family, with European ancestry, emphasizes education, self‑reliance, and community involvement. She
    celebrates mainstream American holidays and participates in local festivals and farmers' market events. The cultural environment blends suburban middle‑class values with a strong appreciation for outdoor
    activities, local history, and a pragmatic approach to problem‑solving.
