  career_goals: John aims to move into a senior strategic role where he can shape organizational change across multiple agencies or private‑sector clients. He plans to formalize his expertise by earning
    a recognized certification such as Certified Management Analyst and to mentor junior analysts, sharing his curiosity‑driven, unconventional approach. In the long term, he envisions founding a community‑focused
    consulting practice that helps local nonprofits and small businesses integrate data‑driven decision making with creative, arts‑based initiatives, providing him the flexibility to balance professional
    impact with his personal passions.
