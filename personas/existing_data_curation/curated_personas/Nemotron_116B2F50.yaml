personas:
  professional: Alvaro Torres, a one‑year‑old methodical explorer, spends their mornings meticulously arranging stacking cups in a consistent order, turning playtime into a disciplined routine that mirrors
    the planning and reliability of an aspiring engineer.
  sports: Alvaro Torres, a lively toddler who loves splash‑time swimming lessons in summer and imitates soccer drills from watching Manchester United matches on family TV, regularly joins a parent‑child
    gymnastics class at the local community center.
  arts: Alvaro Torres, an energetic baby who eagerly sings along to Raffi's 'Baby Beluga', claps to the rhythmic beats of 'Baby Shark', and is fascinated by the colorful characters of Sesame Street, often
    reenacting scenes with plush friends.
  travel: Alvaro Torres, who has already explored the sandy beaches of Cancun, marveled at the bright lights of Disneyland in Orlando, and enjoyed a weekend roadtrip to their grandparents' farm in upstate
    New York, prefers itineraries that stick to familiar routines but still relish new sensory experiences.
  culinary: Alvaro Torres, a picky yet adventurous eater, favors smooth mashed sweet potatoes, banana‑oat porridge with a pinch of cinnamon, and soft avocado cubes, and shows a growing fondness for tiny
    chicken puree bites seasoned with mild herbs.
  core: Alvaro Torres blends methodical routine, early financial savvy, diligent eczema care, toddler sports enthusiasm, a love for Raffi's tunes, and a wanderlust for beach and theme‑park adventures, all
    while occasionally resisting nap schedule changes.
background:
  cultural: 'Alvaro is a first‑generation Salvadoran‑American raised in Kennedale, Texas. His home life is steeped in Salvadoran traditions: Spanish is spoken alongside English, family meals feature pupusas
    and tamales, and celebrations such as Día de los Muertos and Navidad incorporate music, dance, and religious customs. The close‑knit extended family and community emphasize respect for elders, responsibility,
    and the value of hard work, shaping Alvaro’s practical outlook and love for routine.'
