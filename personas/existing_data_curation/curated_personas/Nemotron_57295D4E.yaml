  career_goals: Looking ahead, Elisabeth envisions a gradual shift from full‑time cashier duties toward a role that blends her love of art with community service. She aims to complete an arts administration
    certificate, volunteer as a docent at the Nelson‑Atkins Museum, and eventually secure a part‑time position as an education coordinator or gallery assistant. Within her current workplace, she hopes to
    become a trainer for new cashiers, champion a customer‑service mentorship program, and lead initiatives that make the store a more welcoming space for seniors and caregivers. Ultimately, she aspires
    to launch a monthly art‑craft circle for neighborhood elders, fostering creative expression and social connection.
