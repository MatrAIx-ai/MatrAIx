personas:
  professional: Kathryn Bethurem leverages over a decade of meticulous housekeeping expertise—mastering deep‑cleaning, eco‑friendly product selection, and minor home repairs—to lead a small, performance‑driven
    cleaning crew, balancing systematic organization with adaptive problem‑solving as she pursues the ISSA Cleaning Management Certification and plans a boutique, sustainability‑focused service in Portland.
  sports: Kathryn Bethurem hikes the Columbia River Gorge and Mount Hood trails year‑round, jogs with the Portland Trail Running Club, and cheers for the Portland Timbers, integrating fitness into a solitary
    yet community‑linked routine.
  arts: Kathryn Bethurem devours Agatha Christie mysteries, Hilary Mantel’s historical sagas, and true‑crime podcasts like *Serial*, while knitting inspired by the geometric patterns of Yayoi Kusama and
    attending occasional performances at the Portland Center Stage.
  travel: Kathryn Bethurem prefers meticulously planned solo road trips along the Pacific Coast Highway and weekend escapes to the Oregon wine country, with a long‑standing wish to trek New Zealand’s South
    Island after a memorable camping stint in Yosemite.
  culinary: Kathryn Bethurem cooks simple, garden‑to‑table meals such as roasted beet and goat‑cheese salad, quinoa‑wild‑rice pilaf with fresh thyme, and occasional sourdough bread, favoring seasonal produce,
    high‑quality olive oil, and sustainable ingredients while maintaining intermediate cooking confidence.
  core: Kathryn Bethurem is a pragmatic, curiosity‑driven cleaning professional who blends eco‑conscious ambition with a solitary love of gardens, hikes, and meticulous self‑improvement, all while guarding
    against complacency with a quietly competitive edge.
background:
  cultural: Kathryn was raised in a middle‑class, white family in the Pacific Northwest, where self‑reliance, practicality and a respect for the natural environment were core values. Growing up near Portland,
    she absorbed a regional appreciation for sustainability and outdoor recreation, which informs her preference for eco‑friendly cleaning methods and her love of hiking and gardening. Her community emphasizes
    hard work and modest ambition, shaping her competitive yet pragmatic mindset and her desire to provide a stable, reliable foundation for her married life.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning methods'', ''Stain removal'', ''Floor care'', ''Eco‑friendly cleaning practices'', ''Inventory management'', ''Time management'', ''Scheduling and flexibility'',
