  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Hiking'', ''Knitting'', ''DIY home improvement projects'', ''Listening to true‑crime podcasts'', ''Journaling'', ''Small‑group community gardening'']'
  career_goals: Kathryn aims to move beyond individual assignments to a supervisory role, where she can train and mentor a small team of cleaners. She plans to obtain the ISSA Cleaning Management Certification
    and eventually launch her own boutique housekeeping service that specializes in environmentally responsible cleaning for mid‑size homes in the Portland metro area. In the longer term, she envisions
    expanding the business to offer seasonal deep‑cleaning packages and partnering with local sustainable‑product suppliers, allowing her to increase her earnings while maintaining a practical, stable lifestyle
    for her family.
