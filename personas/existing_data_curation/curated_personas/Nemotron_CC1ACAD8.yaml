personas:
  professional: Liming Chun, an aspiring visual storyteller, blends meticulous project planning with spontaneous creative bursts as they craft anime‑inspired digital illustrations, mix‑media collages, and
    short video edits while organizing peer art workshops that reflect a collaborative, community‑first mindset.
  sports: Liming Chun enjoys casual pickup basketball at the Norcross Community Center, cheers on the Atlanta Hawks, and occasionally attends Atlanta United matches, approaching fitness with a playful,
    community‑oriented mindset rather than strict training regimens.
  arts: Liming Chun explores anime‑style sketching while listening to BTS, Bon Iver, and Studio Ghibli soundtracks, draws inspiration from the High Museum of Art’s contemporary photography exhibit and the
    works of Hayao Miyazaki, and translates this eclectic mix into experimental mixed‑media collages and digital graphics.
  travel: Liming Chun favors itineraries that combine scheduled gallery tours in New York’s MoMA with spontaneous street‑photography walks through Savannah’s historic squares, and dreams of a summer backpacking
    adventure to Tokyo to capture vibrant pop‑culture scenes, all while balancing school commitments and a modest travel budget.
  culinary: Liming Chun loves cooking traditional mooncake fillings, mastering stir‑fry techniques for mapo tofu and scallion pancakes at home, while also indulging in spicy ramen after late‑night art sessions
    and occasionally ordering bubble tea for a sweet break.
  core: Liming Chun merges disciplined planning with an impulsive love for bright pens, late‑night sketching, and a relentless drive to weave cultural narratives into modern design, all while championing
    community art collaborations.
background:
  cultural: Liming was raised in a Chinese‑American household in Norcross, Georgia. His parents immigrated from mainland China and preserved many cultural traditions, such as celebrating Lunar New Year,
    eating mooncakes, and speaking Mandarin at home. This bicultural upbringing gives him a strong sense of family responsibility, respect for elders, and an appreciation for both Eastern aesthetics and
    Western individuality. Growing up in the diverse suburb of Gwinnett County, he has also absorbed Southern hospitality and community values, which shape his collaborative and harmonious approach to group
    activities. He identifies as part of the broader AAPI community and is keen to use his artistic voice to bridge cultural gaps and showcase the richness of his heritage.
attributes:
  skills: '[''Traditional sketching'', ''Digital illustration (Procreate, Photoshop)'', ''Basic graphic design'', ''Video editing (iMovie, Premiere Rush)'', ''Social media content creation'', ''Bilingual
