  hobbies: '[''Sketching and digital illustration'', ''Mixed‑media collage'', ''Photography'', ''Pickup basketball'', ''Listening to diverse music genres'', ''Visiting museums and galleries'', ''Participating
    in cultural festivals'', ''Cooking Chinese cuisine'', ''Learning Mandarin poetry'', ''Tinkering with electronics for art projects'']'
  career_goals: Liming aims to earn his GED and enroll in a community college program in visual arts or multimedia design, eventually transferring to a four‑year university with a strong graphic design
    curriculum. He dreams of building a professional portfolio that blends Eastern artistic motifs with contemporary Western design, and he hopes to work as a graphic designer or art director for a culturally
    focused agency. In the longer term, he envisions founding a community art center in Gwinnett County that offers free workshops for youth, celebrates multicultural expression, and uses art as a tool
    for social cohesion. He also aspires to become a mentor for other Asian‑American teens navigating education and creative careers.
