  career_goals: Looking ahead, Maria envisions a future where she can combine her caring nature, love of animals, and desire to help others. She dreams of becoming a veterinarian to care for pets and wildlife,
    but also imagines a role as an elementary school teacher where she can share her enthusiasm for learning. She is curious about community organizing and hopes to lead neighborhood events that bring people
    together. To achieve these goals, she plans to pursue science and education pathways, participate in youth science camps, and continue volunteering in school and community programs.
