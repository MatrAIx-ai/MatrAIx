personas:
  professional: Maria Derbonne, a 10-year-old with a love for teamwork and structure, channels their energetic sociability into a budding role as junior soccer captain and Girl Scouts troop helper, balancing
    responsibilities like organizing practice drills and coordinating badge projects with the enthusiasm of a peer leader.
  sports: Maria Derbonne is an avid participant in the Chicopee Comets U10 soccer team, practices three times a week, enjoys after-school bike rides along the Connecticut River trail, and takes beginner
    Hip-Hop dance classes, treating each activity as a chance to stay active and bond with friends.
  arts: Maria Derbonne expresses creativity through weekly arts-and-craft projects using Crayola markers and glitter glue, admires the animation of Disney's Moana, draws inspiration from the musical performances
    of Taylor Swift and the storytelling of Adventure Time, often reenacting scenes with homemade props.
  travel: Maria Derbonne dreams of spring trips to Boston's Museum of Science and summer outings to the shores of Cape Cod, enjoys weekend bike excursions around local Chicopee parks, and hopes to one day
    visit Disney World in Florida, though family budgets and school schedules shape travel planning.
  culinary: Maria Derbonne revels in family cooking nights, often whisking together spaghetti sauce with fresh tomatoes, basil, and grated Parmesan, proudly makes mini pizza bites topped with pepperoni
    and mozzarella, and delights in making strawberry-banana smoothies, though they occasionally over-salt the pasta water in excitement.
  core: Maria Derbonne is a structured, sociable 10-year-old who balances a love for teamwork, budgeting, and creative expression, while occasionally over-committing to activities and forgetting small details.
background:
  cultural: Maria is raised in a white, primarily Italian-American family in Chicopee, Massachusetts. Her household celebrates traditional Italian holidays such as the Feast of St. Joseph and observes Catholic
    customs, attending mass with her family. The community's strong emphasis on family gatherings, neighborhood festivals, and civic participation has shaped her cooperative and responsible demeanor. Exposure
    to both Italian cultural practices and broader New England values of hard work and community service informs her worldview.
