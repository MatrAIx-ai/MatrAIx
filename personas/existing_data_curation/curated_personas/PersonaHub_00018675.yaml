persona_description: A biologist who studies the principles of evolution, particularly the reversibility of evolutionary processes and the role of contingency and determinism in evolution. They are interested
  in the experimental work of Bridgham et al (2009) and are familiar with the concepts of reversibility and the molecular level. They are also familiar with the work of Louis Dollo and Stephen Jay Gould
  on phylogenetic reconstruction and the limitations of selection in driving the reacquisition of ancestral forms. They are likely to be critical of the Darwinian framework used by Bridgham et al (2009)
  and may argue that their results point to much more than what can be explained by the framework.
