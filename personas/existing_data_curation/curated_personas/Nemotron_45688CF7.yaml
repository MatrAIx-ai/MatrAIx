    Management'', ''Team Leadership'', ''Critical Evaluation of Literature'']'
  hobbies: '[''Hiking in Sierra Nevada'', ''Rock climbing with friends'', ''Science outreach volunteering'', ''Board-game nights'', ''Yoga and mindfulness meditation'', ''Reflective journaling'', ''Reading
    science-fiction novels'', ''Attending indie music concerts'', ''Cooking classes and recipe experimentation'']'
  career_goals: Lydia aims to transition from an associate scientist to an independent principal investigator leading her own translational research program focused on developing novel immunotherapies for
    autoimmune diseases. She is driven to secure a prestigious NIH R01 grant within the next five years, publish in high-impact journals, and build a collaborative lab that balances rigorous science with
    practical clinical applications. While ambitious, she also values stability and plans to cultivate a work environment that supports mental-health resilience, seeking mentorship opportunities to guide
    early-career researchers. In the longer term, she envisions a hybrid role that combines academic leadership with industry partnerships, positioning her work to move breakthroughs from bench to bedside
    efficiently.
