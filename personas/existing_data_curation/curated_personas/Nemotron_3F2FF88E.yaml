    Country trails'']'
  career_goals: John is focused on completing his high‑school equivalency within the next two years and then enrolling in a vocational program for automotive technology at a community college. He aims to
    earn certifications as an automotive technician and eventually work at a local repair shop or dealership where clear career steps and hands‑on work are valued. He also considers the possibility of joining
    the military or a law‑enforcement academy to benefit from the structured training and steady career path they provide.
