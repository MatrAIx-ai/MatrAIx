personas:
  professional: John Davis is a high‑school‑age aspiring automotive technician whose hands‑on knack for repairing bikes and small engines is matched by a methodical, spreadsheet‑keeping approach to projects,
    making them a reliable team player who follows clear instructions and thrives on structured learning pathways.
  sports: John Davis shoots hoops at the local park, idolizes the San Antonio Spurs and follows the Dallas Cowboys for football, and after a weekend of fishing for catfish in the Guadalupe River, they belong
    to the town's youth basketball league and a community fishing club.
  arts: John Davis listens to classic country legends like Johnny Cash and rock icons such as AC/DC while they tinker with model vehicles, and they often flip through woodworking manuals and attend the
    town’s annual spring arts fair that features local folk musicians and a community‑driven theater troupe.
  travel: John Davis prefers short road trips with family, has visited Austin for the South by Southwest music showcases and hiked in New Mexico’s Sandia Mountains, and they dream of driving to Detroit’s
    Automotive Hall of Fame while budgeting each trip in a shared spreadsheet.
  culinary: John Davis favors hearty Texas‑style barbecue, cracking open a plate of smoked brisket with a side of bean chili, enjoys cooking simple fish tacos with fresh cilantro and lime after a day on
    the Guadalupe River, and they can reliably whip up a grilled cheese using cheddar and buttery bread for quick snacks.
  core: John Davis is a practical, structure‑loving teen who balances school, hands‑on mechanics, and community duties, sometimes skipping chores for an extra video‑game session, yet always keeping a spreadsheet
    of goals and a toolbox at the ready.
background:
  cultural: John grew up in New Braunfels, a city known for its blend of Texas and German heritage. His family celebrates traditional German festivals like Wurstfest while also embracing the broader Texan
    culture of hospitality, football, and country music. He attends a local Lutheran church, where community service is emphasized, and he feels a strong connection to the Hill Country’s outdoor lifestyle.
    This mix of German roots and Texas values shapes his practical outlook, love of structure, and appreciation for community gatherings.
