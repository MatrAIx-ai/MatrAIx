  career_goals: Isabel aims to transition from full-time bedside nursing to a hybrid role that blends education, leadership, and innovation. In the next five years, she hopes to obtain a nursing master’s
    degree or a certification in health education, enabling her to become a clinical instructor for nursing students at a local community college. She is also determined to expand the art-therapy pilot
    she started, seeking grant funding to embed creative-arts programs within the hospital’s chronic-illness wards. Additionally, she envisions serving on the Muskegon County Health Advisory Board, where
    she can advocate for policies that improve elder-care services and integrate holistic, patient-centered approaches.
