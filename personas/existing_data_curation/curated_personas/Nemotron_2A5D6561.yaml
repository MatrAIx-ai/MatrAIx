  career_goals: W aims to earn his GED and enroll in a community college or art school to study visual arts and graphic design. He aspires to become a freelance illustrator or concept artist for video‑game
    studios or publishing houses, blending his love for fantasy storytelling with visual media. Long‑term, he hopes to open a collaborative art space in Pittsburg where local youth can explore creativity
    together, and he envisions mentoring peers while eventually exhibiting his work in regional galleries and contributing to the visual identity of community events.
