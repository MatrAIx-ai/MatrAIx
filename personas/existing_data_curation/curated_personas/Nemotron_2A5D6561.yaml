personas:
  professional: W Long is an aspiring visual storyteller whose knack for hand‑drawing and free‑software digital illustration fuels imaginative concept art for indie game studios, and their natural curiosity,
    organized mindset, and collaborative flair enable them to lead community art workshops that blend fantasy narratives with local folklore.
  sports: W Long is a devoted Saturday‑football enthusiast who cheers on the Dallas Cowboys, plays forward on a community recreational soccer team, and stays fit by hiking the pine‑covered trails of the
    nearby East Texas wilderness, preferring steady cardio over weightlifting while they also keep up with the Houston Astros in the spring.
  arts: W Long is a budding illustrator who draws nightly inspiration from Hayao Miyazaki’s animated worlds, Becky Cloonan’s graphic storytelling, and Sufjan Stevens’s folk‑indie melodies, while they regularly
    attend performances at the Tyler Lyric Theatre and contribute murals to local church festivals, shaping their identity through a blend of visual and musical arts.
  travel: W Long prefers low‑cost road trips, having driven to Austin’s vibrant South Congress for live music, explored the Hill Country’s wineries on a weekend, and ventured to New Orleans for jazz, but
    dreams of backpacking through the misty Hoh Rainforest in Washington State to sketch towering evergreens, all while they balance a limited family budget and school responsibilities.
  culinary: W Long loves a plate of smoky Texas brisket seasoned with a dry rub of paprika, garlic, and brown sugar, but also enjoys crafting fresh fish tacos with tilapia, lime zest, and cilantro, often
    baking whimsical doodle‑themed cupcakes for friends while they admit to over‑indulging in cola during late‑night gaming marathons.
  core: W Long is a high‑school visual dreamer who converts late‑night Minecraft quests into sketchbook concepts, fuels creativity with sugary soda, and they can’t resist humming original folk‑rock verses
    while doodling on napkins.
background:
  cultural: Raised in a working‑class white family in Pittsburg, a small town in East Texas, W grew up amid close‑knit community values—mutual support, frequent church gatherings, high‑school football Saturdays,
    and local festivals that celebrate regional traditions. While his household holds many traditional Southern attitudes, the cultural mosaic of East Texas—exposure to nearby Hispanic food and music, the
    Tyler art scene, and an appreciation for folk storytelling—has broadened his perspective. This blend of rural Texan heritage and openness to new ideas fosters his collaborative spirit, respect for harmony,
    and drive to weave diverse influences into his artistic pursuits.
