persona_description: A pediatrician or a pediatric infectious diseases specialist who is responsible for the treatment of children with infectious diseases in a hospital setting. The person is likely to
  be familiar with the prevalence and distribution of antibiotic resistance in children and the importance of antibiotic usage in preventing the spread of infections. The person may have experience in developing
  and implementing antibiotic usage guidelines and may be interested in the development of local guidelines for antibiotic use in children. The person may also be interested in improving antibiotic prescribing
  tendencies in hospitalised children treatment and may have a background in public health or infectious diseases.
