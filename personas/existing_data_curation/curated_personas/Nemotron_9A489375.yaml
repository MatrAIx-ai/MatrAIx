  career_goals: Although fully retired, Kalen aims to stay professionally active by providing occasional mentorship and pro‑bono consulting for small engineering firms in the Ohio area. He plans to serve
    on the board of a local nonprofit that promotes STEM education for middle‑school students, and to lead volunteer projects that improve the physical environment of the senior center in Westerville. Maintaining
    his health and mobility so he can continue participating in community activities and support his children and grandchildren remains a primary personal ambition.
