personas:
  professional: Michael Justus, a retired corporate finance executive, channels their decades‑long expertise in strategic planning and budgeting into mentoring emerging entrepreneurs and serving on nonprofit
    boards, applying their hallmark discipline and results‑oriented communication style.
  sports: Michael Justus plays 18‑hole rounds every Wednesday at La Grange Country Club, follows the Chicago Cubs and Chicago Bears religiously, and they maintain a disciplined fitness regimen of morning
    stretches and occasional brisk walks, balancing the competitive spirit of golf with a pragmatic approach to health.
  arts: Michael Justus enjoys attending productions at the La Grange Chamber Theater, especially classic plays like "Our Town," and they collect vinyl records of Frank Sinatra and Bob Dylan, finding that
    the storytelling in music and theater complements their love for historical biographies.
  travel: Michael Justus plans meticulous itineraries for trips with their spouse, favoring historic towns such as Williamsburg, Virginia, and national parks like Grand Canyon and Acadia, where they allocate
    time for guided tours and leisurely garden walks while staying within a moderate budget.
  culinary: Michael Justus experiments in the kitchen with garden‑fresh heirloom tomatoes, rosemary, and sage, mastering recipes like rosemary‑infused roast chicken, beet and goat‑cheese salad, and an old‑fashioned
    apple crisp, and they host occasional dinner gatherings for friends from the Rotary club.
  core: Michael Justus is a disciplined, garden‑loving retiree who blends strategic financial acumen with classic car restoration, golf, and a passion for community service, all while never missing a chance
    to savor a well‑cooked meal.
background:
  cultural: Michael was raised in a traditional Midwestern white family in Illinois during the post‑war era. His upbringing reflects Protestant values, a strong sense of community, and an emphasis on hard
    work and self‑reliance. He celebrates classic American holidays such as Thanksgiving and the Fourth of July with family gatherings and neighborhood events. His cultural identity is rooted in the civic-minded
    spirit of suburban Cook County, where participation in local charities, church activities, and community clubs is a norm.
