  career_goals: Although retired, Michael aims to leverage his experience by mentoring emerging entrepreneurs and serving on nonprofit boards in the La Grange area. He plans to author a memoir that captures
    lessons from his business career, contribute to local economic development initiatives, and maintain his health to enjoy an active lifestyle with his wife. His long‑term ambition is to leave a lasting,
    positive impact on his community while preserving his family's legacy.
