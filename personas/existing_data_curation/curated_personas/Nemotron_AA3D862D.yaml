  career_goals: Donovan aims to complete his associate degree and transition into a bachelor’s program in business administration or information systems. He envisions a career that blends his analytical
    curiosity with real‑world impact, such as a junior project manager at a tech startup or a data analyst for a local nonprofit. In the long term, he aspires to lead cross‑functional teams, develop community‑focused
    initiatives, and perhaps launch his own venture that leverages technology to improve regional small‑business operations.
