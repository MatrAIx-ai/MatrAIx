    inspections'']'
  hobbies: '[''Street and documentary photography'', ''Reading (biographies, African‑American history, mystery novels)'', ''Visiting local art galleries and museums'', ''Listening to jazz, blues, and soul
    music'', ''Solving puzzles (crosswords, sudoku)'', ''Woodworking (handcrafted furniture)'', ''Herb gardening'', ''Attending community cultural events (e.g., Juneteenth celebrations)'']'
  career_goals: Approaching retirement, Joseph aims to leverage his extensive surveillance experience into a consulting role that helps smaller venues—such as community centers, museums, and boutique casinos—strengthen
    their security operations. He plans to obtain the Certified Protection Professional (CPP) credential within the next two years and to mentor younger security staff through formal training workshops.
    Joseph also hopes to transition part‑time to a security advisory position that allows him more time for his artistic interests, such as curating security for local art exhibitions or serving on a safety
    committee at the local historical society. Ultimately, his ambition is to achieve financial stability while remaining engaged in a field where his curiosity and meticulous approach can continue to add
    value.
