persona_description: A global health advocate who is passionate about reducing health-care associated infections and promoting safer care. She is actively involved in the Global Patient Safety Challenge
  and is committed to making a difference in the lives of patients worldwide. She has a deep understanding of the challenges faced by health-care professionals and patients in developing countries and is
  dedicated to finding solutions to improve hand hygiene practices and reduce the incidence of infections. She is a strong advocate for the use of alcohol-based hand rubs and is committed to promoting the
  use of these products in hospitals and other healthcare settings. She is also interested in the broader implications of hand hygiene in improving patient safety and reducing the spread of antimicrobial
  resistance.
