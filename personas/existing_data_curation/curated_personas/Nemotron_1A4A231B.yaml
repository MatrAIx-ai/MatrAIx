personas:
  professional: Lorraine Gittin, a 15‑year‑old aspiring data analyst, channels her methodical curiosity and competitive puzzle‑solving mindset into Python scripts that mine environmental data from her creekside
    field journal, they treat each line of code as a logical challenge to master.
  sports: Lorraine Gittin prefers solitary endurance training, joining the Wimberley Trail Runners club to prepare for the spring cross‑country season while logging weekly 5K runs, they also follow the
    Dallas Cowboys and San Antonio Spurs for a touch of team spirit during off‑days.
  arts: Lorraine Gittin captures the local flora through nature photography inspired by Ansel Adams, crafts creative writing pieces echoing Mary Oliver’s lyrical simplicity, and relaxes to the minimalist
    piano compositions of Ludovico Einaudi, they find each artistic pursuit a structured outlet for their analytical mind.
  travel: Lorraine Gittin plans meticulous weekend getaways to Enchanted Rock and the Austin Botanical Gardens, dreaming of a science‑focused expedition to the Galápagos Islands, they balance their travel
    budget with saved allowance and occasional school‑sponsored trips.
  culinary: Lorraine Gittin, a precise home‑chef, enjoys assembling quinoa salads with roasted beet and fresh basil, perfecting avocado toast with heirloom tomatoes, and experimenting with sourdough starter
    ratios, they sometimes skip dinner to squeeze in extra coding practice.
  core: Lorraine Gittin is a solitary, methodical teen whose curiosity drives her to turn puzzles, coding, and nature observation into structured projects, even if it means skipping meals and social events,
    they thrive on measurable progress.
background:
  cultural: Lorraine comes from a white, Anglo‑American family that has lived in the Texas Hill Country for several generations. Her upbringing in Wimberley, a small town known for its artistic community
    and natural beauty, blends traditional rural values—self‑reliance, respect for land, and a pragmatic work ethic—with an appreciation for local arts and environmental stewardship. Though she attends
    a nearby public middle school, much of her family life revolves around community gatherings, church events, and weekend drives to ranches and farms in Blanco County. This cultural setting fosters her
    independent, practical outlook while exposing her to the region’s rich natural heritage, which informs her hobbies and emerging career interests.
attributes:
  skills: '[''Analytical problem solving'', ''Self‑directed learning'', ''Basic Python programming'', ''Data organization with spreadsheets'', ''Project planning and time‑management'', ''Critical evaluation
    of information'', ''Nature observation and photography'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Creative writing'', ''Competitive coding challenges'']'
  hobbies: '[''Reading science and technology non‑fiction'', ''Coding small Python projects and participating in online coding challenges'', ''Hiking and field journaling in the Hill Country'', ''Wildlife
    and landscape photography'', ''Puzzle solving (Sudoku, logic puzzles, Rubik’s Cube)'', ''Creative writing and journaling'']'
  career_goals: She aims to pursue a technical career that leverages her problem‑solving aptitude and pragmatic approach. Lorraine plans to complete high school with a focus on STEM electives, then enroll
    in a community college or university program in computer science or data analytics. Her long‑term ambition is to become a software engineer or data analyst who designs efficient tools for environmental
    monitoring, allowing her to combine her love of technology with her interest in the natural world of the Texas Hill Country. She also envisions eventually contributing to open‑source projects that promote
    transparent data practices, aligning with her skeptical and competitive nature.
