  career_goals: Mitchell dreams of a career that blends structure with creative freedom. He is interested in becoming a civil engineer, where he could design practical, tangible projects like bridges or
    community facilities, or a video game designer, allowing him to build interactive worlds. He envisions a path that includes strong STEM coursework in high school, participation in robotics clubs, and
    eventually a college degree in engineering or computer science. He values a profession that offers clear goals and routines while still leaving room for innovative problem‑solving and personal expression.
