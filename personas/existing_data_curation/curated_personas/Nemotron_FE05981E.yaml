personas:
  professional: Mitchell Sepulvado, a budding robotics enthusiast, channels their practical focus on clear objectives into designing and programming simple machines for the school’s after‑school robotics
    club, while their relaxed attitude toward strict deadlines leads them to seek flexible project timelines and enjoy collaborative brainstorming with teammates.
  sports: Mitchell Sepulvado, a member of the neighborhood skate club 'Riptide Rollers' and a point guard on the middle‑school basketball team the Hawks, spends weekends practicing ollies at the local skate
    park, shooting free throws at the community gym, and cheering for the Los Angeles Lakers and Chicago Bulls, balancing structured team drills with spontaneous street‑skate sessions.
  arts: Mitchell Sepulvado, an avid reader of Rick Riordan’s adventure novels and a devoted fan of Imagine Dragons and Taylor Swift, spends evenings constructing intricate LEGO dioramas and drafting short
    fantasy stories, often drawing inspiration from the cinematic world‑building of Guillermo del Toro.
  travel: Mitchell Sepulvado, who dreams of exploring Tokyo’s Akihabara district after mastering Minecraft’s Redstone circuits, prefers itineraries that mix scheduled museum visits—like the American Museum
    of Natural History—with spontaneous arcade hunts, yet family budget constraints currently focus their trips on weekend getaways to the nearby Huntington beach.
  culinary: Mitchell Sepulvado, a self‑taught snack chef, can whip up a reliable pepperoni pizza and perfect chocolate chip cookies, often pairs meals with chicken nuggets and honey‑mustard dip or homemade
    guacamole on tortilla chips, though they frequently neglect to clean the kitchen after cooking.
  core: Mitchell Sepulvado, a twelve‑year‑old robotics whiz who builds LEGO masterpieces, balances a love for structured video‑game quests with a laid‑back habit of forgetting to tidy up after snack raids.
background:
  cultural: Mitchell comes from a white, middle‑class family in Rockford, Illinois, reflecting a typical Midwestern upbringing. His family values community involvement, hard work, and modesty, and they
    often take part in local events such as the Rockford County Fair, school sports games, and neighborhood gatherings. He has been exposed to American cultural traditions, including Thanksgiving, Fourth
    of July fireworks, and occasional church services. The region's emphasis on practical education, outdoor recreation, and collaborative activities shapes his interests in sports, building projects, and
    hands‑on learning.
