personas:
  professional: April Hadaway is a seasoned office administrator whose knack for empathetic communication and basic graphic design skills streamlines museum and gallery operations, while her flexible, slightly
    disorganized approach lets her juggle scheduling, correspondence, and community event coordination as she works toward a supervisory role in arts nonprofit management.
  sports: April Hadaway fuels her fitness by paddling with the Charleston Kayak Club, joins a weekend beach‑volleyball league at Folly Beach, cheers on the Charleston Battery during soccer season, and balances
    occasional hikes in the nearby Palmetto Trail with her love of water sports, all while preferring low‑impact, flexible workouts over rigid gym routines.
  arts: April Hadaway immerses herself in the coastal art scene by visiting the Gibbes Museum of Art and the Halsey Institute, sketching seascapes inspired by Winslow Homer, listening to Fleetwood Mac and
    the indie folk of The Avett Brothers, attending community theater productions of August Wilson plays starring local talent, and collecting handcrafted ceramics from artisans like Jane Brown, while her
    basic graphic design work often echoes the bold colors of Mickalene Thomas.
  travel: April Hadaway favors flexible, last‑minute trips, often escaping to the Outer Banks for quiet beach walks, returning annually to Asheville’s Blue Ridge Mountains for craft fairs, dreaming of exploring
    the Amalfi Coast’s cliffside villages, and occasionally jetting off to Barcelona to soak in Gaudí’s architecture, always balancing family time with solo photo expeditions.
  culinary: April Hadaway experiments in the kitchen by fusion‑cooking shrimp and grits with coconut milk, lime zest, and Thai chilies, whipping up jalapeño‑cheddar cornbread alongside kimchi fried rice
    featuring collard greens and miso, and she often adds a dash of smoked paprika to her gumbo, though her creative streak sometimes leaves the stove unattended as she sketches.
  core: April Hadaway is a creatively curious, ocean‑loving community champion who balances art‑filled days with spontaneous, slightly disorganized, yet deeply compassionate life rhythms.
background:
  cultural: April is a White American with roots in the Gulf Coast region, tracing ancestry to Anglo‑Irish and German settlers. Growing up in a close‑knit suburban community in Florida’s panhandle, she
    internalized Southern hospitality, a strong sense of family, and a love for the seaside lifestyle. The multicultural atmosphere of Panama City, with its blend of Southern, Caribbean, and Latin influences,
    has broadened her cultural perspective, fostering an openness to diverse art forms and traditions. She celebrates typical American holidays such as Thanksgiving and Christmas, often incorporating beach
    barbecues and community festivals into family gatherings, and she maintains an appreciation for both traditional Southern cuisine and the emerging global flavors she encounters.
