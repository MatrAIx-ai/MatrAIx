    at Animal Shelter'', ''Neighborhood Clean‑up'']'
  career_goals: April aims to move into a supervisory role such as office manager or community program coordinator within a cultural or nonprofit organization. She plans to complete a certification in nonprofit
    management or event planning, deepen her knowledge of arts administration, and eventually lead community art initiatives that promote inclusivity and social harmony. While she seeks career advancement,
    she also values a flexible schedule that preserves time for family, artistic pursuits, and volunteer work.
