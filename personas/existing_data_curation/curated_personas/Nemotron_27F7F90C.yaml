    coding club (small group)'', ''Listening to pop and country music'', ''Volunteering at a community animal shelter'']'
  career_goals: Charmaine dreams of one day becoming a wildlife biologist or a veterinarian so she can help animals and protect the natural habitats she loves exploring. She aspires to earn a science scholarship,
    attend a university with a strong environmental program, and eventually work at a wildlife sanctuary or research center in Louisiana. While she values her community roots and hopes to give back to her
    hometown, she also wants to travel occasionally to learn about different ecosystems and conservation methods.
