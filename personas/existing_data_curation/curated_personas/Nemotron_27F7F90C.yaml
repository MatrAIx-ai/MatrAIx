personas:
  professional: Charmaine Strong is an aspiring young programmer who channels her curiosity and practical mindset into designing simple Scratch games, constructing intricate LEGO models, and collaborating
    in her after‑school coding club; they embrace a relaxed, flexible approach to deadlines that occasionally leaves projects a bit disorganized.
  sports: Charmaine Strong enjoys seasonal outdoor activities, joining the local youth soccer team, the Red River Rangers, for spring kick‑offs, cheering on the Minnesota Twins in the summer, and tackling
    cross‑country runs in the fall, while they prefer impromptu hikes on the Red River Trail over structured gym workouts, reflecting their love of flexible, nature‑focused fitness.
  arts: Charmaine Strong spends afternoons sketching wildlife inspired by John James Audubon and listening to pop hits from Taylor Swift and country tunes by Luke Bryan, often displaying their drawings
    in the library’s art corner where they share work and draw inspiration from the vivid storytelling of J.K. Rowling’s Harry Potter series, blending visual creativity with a soundtrack that fuels their
    imagination.
  travel: Charmaine Strong prefers spontaneous day trips, often exploring nearby state parks and the historic Red River Trail, while they dream of a future adventure to the Harry Potter Warner Bros. Studio
    Tour in London and a family road‑trip across the Canadian Rockies, balancing a modest allowance with a love of nature‑focused travel that reflects their flexible, curiosity‑driven outlook.
  culinary: Charmaine Strong enjoys cooking simple meals like homemade pizza topped with pepperoni and pineapple, whipping up a comforting bowl of chicken noodle soup, and snacking on trail mix with almonds,
    raisins, and chocolate chips, showcasing a budding kitchen confidence that mixes classic kid‑favorite dishes with occasional experimental twists like avocado toast, and they often eat while humming
    pop and country tunes.
  core: Charmaine Strong is a curious, slightly disorganized 12‑year‑old who weaves together LEGO building, Scratch coding, and animal sketching, all while humming pop and country tunes, and they habitually
    misplace their favorite sketchbook.
background:
  cultural: Charmaine comes from a non‑Hispanic white family rooted in Shreveport, Louisiana. Her upbringing blends traditional Southern values—such as hospitality, community involvement, and church attendance
    (she often joins a local United Methodist youth group)—with contemporary influences like digital media and coding. Family gatherings feature classic Southern dishes (fried catfish, gumbo, sweet potato
    pie) alongside modern snacks she helps prepare. She celebrates holidays with both regional flair (Mardi Gras beads and parades) and nationwide customs (Thanksgiving, Christmas). The cultural mix of
    Cajun, Creole, and broader Southern heritage in Shreveport shapes her appreciation for local music, food, and outdoor activities, while her school and community environment encourages curiosity, practicality,
    and collaborative learning.
