personas:
  professional: Kevin Carrion, a retired mechanical and civil engineer renowned for his meticulous structural analyses and CAD expertise, channels his methodical, curiosity‑driven mindset into mentoring
    junior engineers and documenting Pittsburgh’s industrial legacy through precise technical writing and detailed bridge models.
  sports: Kevin Carrion enjoys low‑impact fitness like morning walks in Schenley Park, avidly follows the Pittsburgh Steelers, Penguins, and Pirates, participates in a senior bowling league at the community
    center, and occasionally joins a local recreational tennis club during the summer months.
  arts: Kevin Carrion finds artistic fulfillment in hand‑tool woodworking, scales models of historic steel bridges, and regularly attends performances by the Pittsburgh Symphony Orchestra and classic cinema
    screenings of Audrey Hepburn films, while his evenings are often filled with listening to folk legend Bob Dylan and studying the paintings of Andrew Wyeth.
  travel: Kevin Carrion prefers meticulously planned trips that blend engineering curiosity with leisurely pace, such as his recent self‑guided tour of the historic bridges of the United Kingdom, a weekend
    getaway to the Appalachian Trail’s Blue Ridge Mountains, and a future dream of visiting the renewable‑energy showcase in Copenhagen, all while balancing a modest travel budget.
  culinary: Kevin Carrion delights in cooking garden‑fresh dishes like heirloom tomato basil pasta, roasted beets with goat cheese, and steaming steel‑cut oatmeal, while also indulging in classic Pittsburgh
    staples such as the Primanti Bros. sandwich with coleslaw and French fries, and he is notorious for over‑baking his chocolate chip cookies during late‑night puzzle sessions.
  core: Kevin Carrion is a methodical, curiosity‑driven retiree whose love of bridge models, precise record‑keeping, and quiet worry about every detail colors both his disciplined volunteer work and his
    occasional tendency to over‑schedule his days.
background:
  cultural: Kevin grew up in a working‑class neighborhood of Pittsburgh’s Hill District, the third generation of an Irish‑German American family. His upbringing was shaped by the city’s steel‑mill heritage,
    the strong sense of community fostered by local churches and unions, and the Midwestern values of hard work, self‑reliance, and modesty. These cultural influences instilled in him a deep respect for
    education, a cooperative spirit, and an appreciation for the practical contributions of everyday people.
attributes:
