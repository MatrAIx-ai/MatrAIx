  hobbies: '[''Model bridge building'', ''Historical nonfiction reading'', ''Gardening'', ''Bird watching'', ''Woodworking'', ''Puzzle solving'', ''Small‑group book club'']'
  career_goals: Although retired, Kevin aims to stay intellectually engaged by completing a series of memoirs that document his career and Pittsburgh’s industrial evolution. He plans to volunteer as a mentor
    for high‑school STEM clubs, offering practical workshops on design and problem‑solving. He also hopes to join the board of a local community garden to apply his organizational skills toward sustainable
    urban projects, and to pursue a short online certificate in renewable‑energy engineering to satisfy his curiosity for emerging technologies.
