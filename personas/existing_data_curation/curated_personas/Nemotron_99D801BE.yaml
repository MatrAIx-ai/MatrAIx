  career_goals: Erick aims to channel his love of structure and competition into a technology‑focused career. He hopes to join a technical high‑school program, study computer science or software engineering,
    and eventually become a game developer who designs competitive multiplayer experiences. As a backup path, he is interested in automotive or diesel mechanic work, valuing clear procedures and tangible
    results. Long‑term, he dreams of earning a scholarship to a Texas university, working independently on complex projects while preserving room for creative problem‑solving.
