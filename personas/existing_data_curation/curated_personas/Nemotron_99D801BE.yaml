personas:
  professional: Erick Ponce is a budding esports strategist who blends their love for real‑time strategy video games and chess to devise winning tactics, while also crafting intricate LEGO battle scenes
    that mirror in‑game dynamics, hinting at a future in game design or competitive gaming.
  sports: Erick Ponce shuttles to the neighborhood park to practice one‑on‑one basketball shooting drills, favoring a solo routine over team scrimmages, while cheering on the NBA’s Miami Heat and dreaming
    of joining the school’s informal basketball club if they ever find a teammate who matches their competitive intensity.
  arts: Erick Ponce channels their creative energy into assembling custom LEGO dioramas inspired by classic sci‑fi novels like Dune, while vibing to reggaetón hitmaker Bad Bunny and cumbia legend Celso
    Piña, turning each building session into a soundtrack‑driven storytelling ritual.
  travel: Erick Ponce prefers spontaneous weekend getaways over meticulous itineraries, having explored the bustling streets of Mexico City on a family road trip and now dreaming of a future adventure to
    Tokyo’s Akihabara district to hunt exclusive gaming gear.
  culinary: Erick Ponce, a budding home cook, whips up quick baleadas with refried beans, queso fresco, and avocado while blasting reggaetón, and occasionally experiments with spicy taco al pastor using
    pineapple and chipotle, though their kitchen often ends in a cluttered mess of LEGO bricks and game controllers.
  core: Erick Ponce blends a competitive gaming mindset with a love for solitary LEGO construction, navigating teenage life with a relaxed approach to obligations, occasional disorganization, and a steadfast
    ability to stay cool under pressure.
background:
  cultural: Erick comes from a Honduran‑American family that preserves strong Central American traditions while adapting to life in Texas. At home, Spanish is spoken daily, and family gatherings feature
    classic dishes like baleadas, tamales, and pupusas. He celebrates Honduran holidays such as Día de la Independencia (September 15) and participates in Catholic rituals observed by his extended family.
    Growing up in Red Oak, Erick blends this heritage with the suburban Texan environment—attending a public middle school, supporting local sports teams, and enjoying regional activities like football.
    This bicultural experience gives him a pragmatic outlook, a respect for community, and the ability to navigate both Honduran and American social norms.
