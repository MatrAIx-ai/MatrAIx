  hobbies: '[''Sketching and drawing in a notebook'', ''Exploring street murals and graffiti in Queens'', ''Listening to Ecuadorian folk music and contemporary Latin pop'', ''Watching art documentaries
    and experimental films'', ''Playing competitive video games with friends'', ''Practicing salsa at a community center'', ''Cooking traditional Ecuadorian dishes (e.g., encebollado)'', ''Reading graphic
    novels and comic books'', ''Journaling personal reflections and ideas'', ''Collecting vintage vinyl records'']'
  career_goals: Maria aims to earn her GED within the next year and enroll in a community‑college associate program focused on graphic design or visual arts. She plans to build a cohesive portfolio that
    blends Ecuadorian cultural motifs with the vibrant street art aesthetic of Queens, seeking freelance illustration commissions for indie publishers and online platforms. Ambitious and competitive, she
    hopes to win local art contests, secure a scholarship to a four‑year art school, and eventually launch a small pop‑up studio/gallery in Far Rockaway that showcases emerging Latin American artists while
    serving as a community hub for creative exchange.
