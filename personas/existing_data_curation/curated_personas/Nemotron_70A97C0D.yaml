personas:
  professional: Maria Ponce is a budding visual artist and digital illustrator who merges urban street sketches with motifs drawn from family culinary traditions, harnessing self‑taught Photoshop and Canva
    skills while navigating a relaxed, sometimes chaotic workflow, channeling competitive instincts into a drive to win local art contests and secure freelance commissions.
  sports: Maria Ponce follows the New York Knicks and the New York Yankees, joins pickup basketball games at the local community center, and treats salsa dancing as a vigorous workout, favoring informal,
    competitive street‑ball sessions and dance circles over structured league commitments.
  arts: Maria Ponce immerses themselves in experimental art documentaries, collects vintage vinyl records from artists like Bad Bunny and Carlos Vives, sketches vibrant urban murals, and draws inspiration
    from graphic novel creators such as Alison Bechdel, letting these diverse influences shape their identity and leisure time.
  travel: Maria Ponce dreams of wandering through the bustling markets of Oaxaca and the renowned street‑art corridors of Berlin while also taking budget‑friendly weekend trips to nearby Coney Island for
    seaside sketches, preferring spontaneous, low‑cost itineraries over meticulously planned tours but always keeping a notebook ready to capture new visual ideas.
  culinary: Maria Ponce loves cooking family recipes like encebollado and arroz con pollo, relies on fresh cilantro, lime, and plantains for flavor, enjoys experimenting with plating while following YouTube
    tutorials, yet often lets dishes sit on the counter for hours, creating a cluttered kitchen that mirrors their relaxed approach to chores.
  core: Maria Ponce is a fiercely curious, slightly disorganized teen artist who blends street‑culture visuals with family‑rooted flavors, channels a competitive fire into solitary sketching, and turns
    fleeting moods into vibrant storytelling while occasionally succumbing to procrastination.
background:
  cultural: Maria is the daughter of Ecuadorian immigrants who settled in Far Rockaway, bringing with them the vibrant customs of Guayaquil and the Andean highlands. Raised in a bilingual household, she
    speaks Spanish at home and English at school, navigating a dual identity that blends Ecuadorian family traditions—such as celebrating Carnaval de Guaranda and preparing communal meals—with the multicultural
    rhythms of Queens. Her community ties include attending local Latin dance classes, participating in neighborhood festivals that showcase Latin American cuisine and music, and maintaining close relationships
    with extended family members who visit from Ecuador. This rich cultural tapestry informs her artistic perspective, fueling a desire to represent her heritage within the dynamic urban canvas of New York
    City.
attributes:
  skills: '[''Digital illustration (self-taught)'', ''Basic graphic design using Canva and Photoshop'', ''Street photography'', ''Creative writing (poetry and short stories)'', ''Bilingual Spanish‑English
