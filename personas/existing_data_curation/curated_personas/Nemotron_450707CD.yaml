  hobbies: '[''Fishing trips on Chesapeake Bay'', ''Community historical society involvement'', ''DIY workshops at the local community center'', ''Barbecue cooking for family gatherings'', ''Vegetable gardening'',
    ''Woodworking projects'', ''Listening to classic rock music'', ''Attending county fairs and church picnics'']'
  career_goals: Approaching retirement, Jeremy aims to attain the Certified Stationary Engineer (CSE) credential and formalize his extensive on‑the‑job knowledge. He hopes to mentor younger technicians,
    lead a plant‑wide energy‑saving initiative, and serve on the company's safety committee. Over the next few years, he plans to transition into a part‑time consulting role, advising small industrial facilities
    on boiler efficiency and compliance, while also dedicating more time to community volunteer projects related to fire safety and vocational training.
