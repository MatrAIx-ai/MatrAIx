  career_goals: Anthony aims to transition into a senior regional director role within the next five years, where he can oversee multiple facilities and champion a culture of continuous improvement. He
    is motivated to lead organization‑wide digital transformation projects that increase efficiency and reduce waste. Mentorship is a personal priority; he plans to formalize a mentorship program for early‑career
    employees and expand community partnership initiatives that align business goals with local economic development. Ultimately, he envisions leaving a legacy of operational excellence and stronger community
    ties before considering a consultancy venture in retirement.
