  career_goals: Although retired, Karen’s ambitions focus on personal growth and community contribution. She aims to launch a series of watercolor workshops for seniors at the public library, compile a
    memoir that preserves her family’s oral histories, and become a volunteer docent at the Indianapolis Museum of Art. She also wishes to mentor younger volunteers, sharing her organizational skills and
    fostering intergenerational connections.
