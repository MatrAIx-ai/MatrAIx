personas:
  professional: Conya Myers is an aspiring visual storyteller who blends traditional sketching with digital fan art, using their vivid imagination and organized work habits to craft intricate illustrations
    for fantasy novels and hopes to pursue a career as a concept artist or graphic novelist.
  sports: Conya Myers enjoys hiking the foothills around Boise and participates in the school’s outdoor adventure club, cheering for the Idaho Vandals while occasionally joining a community soccer pick‑up
    game, and they keep fit by trail walks and bird‑watching excursions rather than formal training.
  arts: Conya Myers immerses themselves in the arts by drawing daily in a sketchbook, creating digital fan art of characters from Neil Gaiman’s "Neverwhere" and Studio Ghibli films, playing the ukulele
    to original folk‑pop songs, and drawing inspiration from musicians like J‑Pop duo ClariS and indie singer‑songwriter Phoebe Bridgers.
  travel: Conya Myers loves weekend road trips to places like Yellowstone National Park and the coastal town of Cannon Beach, dreams of visiting Kyoto to explore its tea houses and anime districts, and
    prefers low‑key, nature‑focused travel that fits within their school schedule and modest family budget.
  culinary: Conya Myers enjoys snacking on roasted Idaho potatoes with sour cream, cooking simple ramen bowls with fresh veggies, and baking banana bread with chocolate chips, while their favorite dish
    to make after a long drawing session is a quick avocado toast topped with chili flakes.
  core: Conya Myers is a 15‑year‑old imaginative artist who balances school responsibilities with a love for sketching, ukulele music, and nature hikes, often staying up late perfecting fan art, saving
    diligently for art supplies, and battling seasonal allergies with a resilient, harmony‑seeking spirit.
background:
  cultural: Conya is a white American teen raised in Sugar City, a small, close‑knit community in Fremont County, Idaho. The town’s lifestyle is rooted in agricultural traditions and a strong sense of local
    cooperation, where community events like county fairs, church gatherings, and high‑school sports are central. While many families in the area share a heritage of Latter‑Day Saint influence, Conya’s
    upbringing emphasizes kindness, harmony, and mutual support rather than strict religious practice. The wide open landscapes, seasonal changes, and a slower pace of life nurture her appreciation for
    nature and provide a quiet backdrop for her imaginative pursuits. At the same time, she stays connected to broader pop culture through online communities, video games, and books, blending rural values
    with a curiosity for novelty and abstract ideas.
