  career_goals: Conya dreams of turning her love for art and storytelling into a career as a concept artist or illustrator for video games, animation studios, or publishing houses. She hopes to attend a
    college with a strong visual arts program where she can refine her digital design skills and study narrative art. Long‑term, she envisions creating a community art workshop in Sugar City to mentor younger
    teens, blending her creative passions with her desire to foster harmony and cooperation. She also aspires to write and illustrate her own graphic novel someday, using her imaginative ideas to explore
    abstract concepts.
