  career_goals: Hopes to attend a STEM‑focused high school and later earn a degree in computer science or mechanical engineering, with the aim of becoming a software developer or robotics engineer. He wants
    to lead a technology team that creates tools for his community, compete in national robotics competitions, and eventually return as a mentor for younger students in Burke County. He also envisions participating
    in college‑level research projects and securing internships with tech firms.
