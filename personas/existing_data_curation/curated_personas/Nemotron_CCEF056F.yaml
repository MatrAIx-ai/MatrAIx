personas:
  professional: Derek Corbin, a 13‑year‑old robotics enthusiast, blends curiosity and practicality by designing Arduino‑controlled LEGO Technic models for their school’s robotics club while serving as a
    methodical organizer on the student council.
  sports: Derek Corbin devotes their after‑school hours to playing pickup basketball with friends on the local park courts, follows the Atlanta Hawks and the University of Georgia Bulldogs for inspiration,
    and maintains a competitive edge by incorporating strength‑training drills and weekly runs, while occasionally joining the school’s track club during the spring season.
  arts: Derek Corbin balances their analytical mindset with creative escapes, blasting Kendrick Lamar and J. Cole while devouring William Gibson’s novels and the Saga comic series, attending local comic‑book
    conventions where they trade fan art, and occasionally trying their hand at sketching robotics concepts inspired by their LEGO builds.
  travel: Derek Corbin prefers short family road trips that blend adventure with comfort, having explored the National Mall in Washington, D.C., and the historic French Quarter of New Orleans on school
    field trips, and dreaming of a future visit to Tokyo to experience its cutting‑edge robotics scene and anime culture, all while budgeting their allowance for travel expenses.
  culinary: Derek Corbin, an eager junior chef, assists with family‑made fried chicken, buttery biscuits, and collard greens seasoned with smoked paprika on weekends, while also mastering a homemade pepperoni
    pizza dough and experimenting with honey‑glazed chicken wings, showcasing a moderate cooking skill that balances following classic Southern recipes with creative twists, and they love sharing their
    dishes with friends.
  core: Derek Corbin is a methodical, competition‑driven 13‑year‑old who intertwines a passion for LEGO Technic robotics, strategic video gaming, and hip‑hop beats with a habit of neglecting warm‑ups before
    basketball, making them both a reliable organizer and a quirky, endlessly curious teen.
background:
  cultural: Derek is a Black teenager raised in Sardis, a small community in Burke County, Georgia. He grew up in a close‑knit extended family where church, gospel music, and community gatherings play central
    roles. The legacy of the civil rights movement and the pride of local African‑American history inform his sense of identity and responsibility. Family meals feature Southern soul food staples such as
    collard greens and cornbread, and storytelling about ancestors’ perseverance is common. Local church youth groups and school programs provide mentorship and encourage academic achievement. These cultural
    influences, combined with the region’s strong emphasis on community support and resilience, shape Derek’s values of hard work, teamwork, and giving back.
