  skills: '[''Reading'', ''Basic Math'', ''Spelling'', ''Creative Writing'', ''Scratch Programming'', ''Beginner Piano'', ''Organizing Classroom Supplies'', ''Team Collaboration'']'
  hobbies: '[''Exploring nature'', ''Reading adventure books'', ''Writing short stories'', ''Playing soccer'', ''Building LEGO creations'', ''Piano practice'', ''Singing in school choir'', ''Crafting friendship
    bracelets'', ''Collecting rocks and insects'']'
  career_goals: Lucy dreams of a future where she can combine caring for living things with structured learning. She often talks about becoming a veterinarian because she loves her family’s rabbit and enjoys
    watching farm animals on school field trips. She also imagines herself as an elementary teacher who can design clear lesson plans yet sprinkle in surprise experiments and outdoor adventures. Occasionally,
    she mentions a wish to be a wildlife photographer, merging her love of nature with creative expression. Overall, her ambitions focus on roles that offer a balance of predictable routines and occasional
    spontaneous experiences.
