  hobbies: '[''Watercolor Painting'', ''Visiting Art Museums'', ''Reading Historical Biographies'', ''Gardening (Roses & Native Plants)'', ''Knitting and Quilting'', ''Birdwatching'', ''Cooking Traditional
    Midwestern Recipes'', ''Volunteering at Local Senior Center'', ''Genealogy Research'', ''Puzzles (Crosswords, Jigsaw)'', ''Attending Community Theater'', ''Yoga for Seniors'', ''Journaling'']'
  career_goals: Tina aims to leave a lasting imprint on her community by launching a sustainable intergenerational art program at the Lenexa senior center, creating a small archive of local family histories,
    and completing a memoir that weaves together her family's migration story and personal reflections. She also hopes to mentor emerging volunteers, serve as a board member for the local historical society,
    and secure a modest endowment to fund art supplies for low‑income seniors. While mindful of her health, she dreams of traveling to a few major art museums in the Midwest and East Coast, enriching her
    own appreciation of art and sharing those experiences through talks at community gatherings.
