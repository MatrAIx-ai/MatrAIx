  career_goals: Veronique envisions a future where she can blend her sociable nature and her practical curiosity to help other young people thrive. In the short term she aims to join her middle‑school’s
    drama and peer‑support clubs, start a small blog or YouTube channel about coping with school‑related stress, and take on leadership roles in student‑council projects. Long‑term, she hopes to pursue
    a career as a high‑school teacher or youth counselor, possibly studying psychology or education, and to design after‑school programs that combine creative expression, hands‑on STEM activities, and mental‑health
    awareness.
