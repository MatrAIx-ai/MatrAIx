personas:
  professional: Veronique Fister is an aspiring robotics enthusiast who merges a love for LEGO construction with beginner Scratch coding, and they channel their outgoing, talkative nature into leading school
    drama club improv scenes while balancing curiosity with practical problem-solving.
  sports: Veronique Fister enjoys casual pickup soccer on weekends, is a fan of Sacramento Republic FC and the Golden State Warriors, practices yoga once a week to stay flexible, and they approach fitness
    with a sociable, laid-back mindset that favors fun over strict training regimens.
  arts: Veronique Fister immerses themselves in the arts by singing in the school choir, performing improv sketches with the drama club, dancing to folk rhythms at community classes, and they draw inspiration
    from pop icons like Taylor Swift and BTS as well as fantasy authors such as J.K. Rowling for their character sketches.
  travel: Veronique Fister loves spontaneous road trips to nearby Yosemite National Park and the Sacramento River Parkway, dreams of exploring the Greek islands of Crete and Santorini to experience family
    traditions, and they balance these travel wishes with a modest family budget that prioritizes weekend getaways over long vacations.
  culinary: Veronique Fister enjoys a culinary blend of Mediterranean and Californian flavors, often assembling quick mezze of hummus, feta, olives, and pita, can confidently bake baklava using a grandma's
    recipe, and they delight in occasional taco nights featuring pepper jack cheese and fresh cilantro, reflecting both cultural pride and modern palate.
  core: Veronique Fister is a chatty, curiosity-driven twelve-year-old who juggles LEGO robotics and drama, worries about school performance, and occasionally forgets homework in their quest for spontaneity.
background:
  cultural: Veronique comes from a Greek‑American family that maintains a blend of Mediterranean traditions and contemporary Californian life. Her parents speak Greek at home on special occasions and celebrate
    holidays such as Greek Easter and name days with traditional foods like baklava and souvlaki. The family attends a Greek Orthodox church in nearby Sacramento, where she participates in youth gatherings
    and learns folk dances. Growing up in Rancho Cordova exposes her to the region’s multicultural festivals, farm‑to‑table food markets, and the tech‑savvy culture of the Bay Area periphery. This mix of
    Greek cultural values—emphasis on family, hospitality, and education—and the inclusive, diverse environment of her California community shapes her worldview, interests, and the way she connects with
    peers from many backgrounds.
