personas:
  professional: Benjamin Draves, a 42‑year‑old multidisciplinary visual artist and project manager, leverages his oil‑painting expertise, digital illustration skills, and methodical budgeting to run large‑scale
    mural commissions while strategically marketing his work through social media and cultivating gallery relationships.
  sports: Benjamin Draves competes weekly in Tampa’s adult recreational soccer league with the “Riverwalk Rovers,” cycles the Riverwalk with the “Tampa River Riders” club, follows the Tampa Bay Rowdies
    for soccer inspiration, and incorporates yoga classes at “Sunrise Flow Studio” to balance his athletic routine.
  arts: Benjamin Draves avidly attends live shows at Tampa’s “Schnitzelburg” music venue, explores community art fairs featuring artists like Maya Lin and Jeff Koons, draws inspiration from the bold colors
    of Georgia O’Keeffe and the street‑art vibrancy of Banksy, and volunteers his painting talent for Habitat for Humanity projects, where his competitive drive fuels high‑quality finishes.
  travel: Benjamin Draves favors well‑planned weekend getaways, having biked the Florida Keys with a detailed route itinerary, sampled craft beers on a brewery tour in Portland, Oregon, and dreamed of an
    art‑focused expedition to Barcelona’s Gothic Quarter to study coastal‑urban interplay firsthand.
  culinary: Benjamin Draves enjoys experimenting in the kitchen, often preparing eclectic dishes like seafood paella with chorizo, kimchi‑infused tacos, and bourbon‑glazed ribs, while pairing them with
    locally brewed IPAs such as “Cigar City Jai Alai” and mastering the art of balancing bold flavors.
  core: Benjamin Draves blends a structured, competitive mindset with a sociable, energetic approach, channeling meticulous project management into vibrant art while balancing sport, craft beer, and weekend
    culinary experiments.
background:
  cultural: Benjamin grew up in a middle‑class suburb of the Midwest before relocating to Tampa to immerse himself in its vibrant, multicultural art scene. As a white American with a humanities background,
    his cultural perspective blends mainstream U.S. values—such as individualism and a pragmatic work ethic—with the eclectic influences of Florida’s diverse population, including Southern hospitality and
    a strong appreciation for outdoor, coastal life. His upbringing emphasized structure and reliability, while his years in Tampa have broadened his social outlook, fostering an outgoing, community‑focused
    demeanor that informs both his art and personal interactions.
