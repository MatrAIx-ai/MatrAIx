  career_goals: Enrique dreams of turning his love for art and structure into a future career as an architect or urban designer, envisioning buildings that blend aesthetics with functional order. He is
    also fascinated by museums and hopes to one day work as a curator, selecting and presenting works that inspire curiosity in others. His long‑term ambition includes studying engineering or design in
    college to acquire the technical skills needed for these roles, while also ensuring a stable, low‑stress professional environment.
