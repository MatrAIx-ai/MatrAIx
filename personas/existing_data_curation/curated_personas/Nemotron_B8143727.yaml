personas:
  professional: Cody Dickens is an experienced senior machinist and CNC specialist who excels at precision machining, blue‑print interpretation, and shop‑floor mentorship, applying his love for structure
    and meticulous hands‑on work while tolerating occasional disorganization and using his calm under pressure to lead a future shop team.
  sports: Cody Dickens enjoys low‑impact fitness through weekend fishing trips on Astoria Bay, occasional pick‑up basketball at the Astoria Recreation Center, supports the New York Yankees, Knicks and Islanders,
    and participates in the local Astoria Fishing Club, preferring structured, solitary sports over high‑intensity gym routines.
  arts: Cody Dickens indulges in classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd while building intricate model ships that echo maritime museums, attends occasional community
    theater performances at the Astoria Performing Arts Center, and listens to audiobooks of historical nonfiction, letting the rhythmic cadence of guitar solos and the tactile creativity of model building
    shape their artistic outlet.
  travel: Cody Dickens prefers carefully planned, low‑stress trips such as a fishing charter in British Columbia, a historical shipyard tour in Cornwall, and a family weekend getaway to Lake Placid, often
    choosing small‑group tours that provide structure and keep anxiety at bay while balancing a moderate budget.
  culinary: Cody Dickens cooks simple, comforting meals like grilled salmon with dill, spaghetti carbonara, and roasted root vegetables, favoring fresh herbs, garlic, and smoked paprika, and while their
    cooking skill is modest, they relish the ritual of preparing family dinners after a day in the shop.
  core: Cody Dickens is a precision‑driven machinist who balances meticulous craftsmanship with a laid‑back, anxiety‑prone temperament, often juggling model‑building obsessions, spontaneous hobby splurges,
    and a yearning for structured independence.
background:
  cultural: Cody comes from a working‑class white family with mixed Irish and Italian roots, typical of many long‑time Queens neighborhoods. Raised in Astoria, he grew up surrounded by a mosaic of immigrant
    cultures, which fostered a practical, no‑nonsense attitude and a strong sense of community. His family observed Catholic traditions, celebrating holidays like St. Patrick's Day and Easter, and valued
    hard work, reliability, and modest living. This background instilled in him respect for craftsmanship, a preference for stable routines, and an appreciation for the close‑knit social fabric of his neighborhood.
attributes:
  skills: '["Manual lathe operation", "CNC milling", "Blueprint reading", "Precision measurement (micrometers, calipers)", "Machine troubleshooting", "Preventive maintenance", "Welding (MIG)", "Metal fabrication",
