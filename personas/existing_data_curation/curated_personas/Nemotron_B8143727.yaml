  hobbies: '["Scale model building", "Woodworking", "Weekend fishing", "Classic rock music", "Chess", "Reading technical manuals", "Yoga/meditation", "Home cooking", "Small‑group community events", "Model
    rocket building"]'
  career_goals: Cody aims to transition from a senior machinist to a lead shop supervisor, leveraging his extensive practical know‑how to guide a small team and improve workflow efficiency. He plans to
    earn a CNC programming certification within the next year, which would enable him to design and optimize machining programs himself. Long‑term, he envisions opening a modest, family‑run machine shop
    that balances steady, predictable work with the flexibility he values, allowing him to set a schedule that supports his mental‑health needs and family life. He also hopes to develop better personal
    organization habits to reduce the anxiety that stems from disarray at work.
