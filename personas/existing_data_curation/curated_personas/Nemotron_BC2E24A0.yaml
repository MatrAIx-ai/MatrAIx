  hobbies: '[''Reading chapter books'', ''Building LEGO sets'', ''Drawing and coloring'', ''Baking traditional recipes'', ''Listening to Mexican music'', ''Dancing'', ''Playing soccer'', ''Participating
    in school cultural club'']'
  career_goals: Lourdes dreams of a future where she can combine her love of routine, caring for others, and her cultural roots. She often talks about becoming a teacher or a pediatric nurse—professions
    that let her create predictable, supportive environments for children while helping them learn and grow. She also imagines incorporating Spanish language lessons and Mexican cultural stories into a
    classroom, fostering inclusion and celebrating heritage.
