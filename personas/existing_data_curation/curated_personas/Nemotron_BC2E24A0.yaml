personas:
  professional: A meticulous young builder and avid chapter-book reader, Lourdes Guzmanmendez channels their love for step-by-step LEGO instructions and organized storytelling into leading the class book-swap
    club, where they keep a tidy schedule, assign roles, and ensure every project follows a clear plan.
  sports: A dedicated participant in the Eastside Eagles youth soccer program, Lourdes Guzmanmendez attends Tuesday and Thursday practices, follows the coach's structured drills, models after forward Alex
    Morgan, and cherishes the teamwork and predictable schedule the sport provides.
  arts: A creative enthusiast, Lourdes Guzmanmendez loves sketching scenes of La Llorona and other folklore figures, dancing to the rhythms of Los Tigres del Norte at family gatherings, and losing themselves
    in the adventures of the "Magic Tree House" series, all of which blend cultural appreciation with imaginative play.
  travel: When not at school, Lourdes Guzmanmendez enjoys weekend trips to the nearby state park's lake for picnics, dreams of visiting the historic city of Oaxaca to see its vibrant Day of the Dead celebrations,
    and prefers itineraries that balance familiar routines with a splash of new scenery.
  culinary: In the kitchen, Lourdes Guzmanmendez assists with stirring creamy arroz con leche, shaping sugar cookies with cinnamon and vanilla, and occasionally crafting simple guacamole using avocado,
    lime, and a pinch of salt, showcasing a budding palate for both sweet and savory traditional flavors.
  core: Lourdes Guzmanmendez combines a love for structured LEGO builds, rhythmic cultural dances, and careful pocket-money management into a bright, organized eight-year-old who thrives on routine yet
    finds joy in creative bursts.
background:
  cultural: Lourdes comes from a Mexican family that maintains strong cultural ties while living in Minneapolis, Minnesota. At home, Spanish is spoken alongside English, and family meals often feature dishes
    such as tacos, tamales, and atole. She celebrates Mexican holidays like Día de los Muertos and Cinco de Mayo with crafts, music, and special foods, while also observing American traditions such as Thanksgiving.
    The local Mexican community center provides her with after‑school programs that teach traditional dances and arts, helping her stay connected to her heritage. This blend of Mexican roots and Midwestern
    life shapes her identity, fostering bilingual fluency, appreciation for diverse celebrations, and a sense of belonging in both cultures.
