persona_description: A policy analyst who is skeptical of the Common Core Standards and believes that they will have little to no effect on student achievement. They are an advocate for setting clear and
  rigorous standards and believe that a thoughtfully and faithfully implemented rigorous curriculum can move the achievement needle, sometimes dramatically. They are also critical of the lack of alignment
  between standards, assessments, and accountability, and believe that it is up to the states to commit themselves to properly implementing the standards.
