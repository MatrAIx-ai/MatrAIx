persona_description: A person who is interested in the health and safety aspects of medical imaging and radiation exposure. They are concerned with the risks and benefits of medical X-rays, fluorography,
  and other forms of radiation exposure, and seek to understand the guidelines and norms that govern these practices. They are likely to be knowledgeable about the natural and artificial sources of radiation,
  and the various types of radiation that can be harmful or beneficial. They may also be concerned with the potential health risks associated with living in an environment that is highly exposed to radiation,
  and may seek out information about the sources and effects of natural radiation.
