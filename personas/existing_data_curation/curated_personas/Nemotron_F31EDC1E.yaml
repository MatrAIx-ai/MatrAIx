  career_goals: Heidi aims to transition into a community health ambassador role that blends her nursing expertise with her love of outreach. She plans to earn a certification in palliative and hospice
    care, lead senior wellness workshops throughout Jefferson Parish, and develop a mentorship program for alumni nurses returning to practice part‑time. While she values flexibility and enjoys a relaxed
    schedule, she remains driven to influence local health policy, advocate for nurse‑led preventive care models, and eventually co‑author a guidebook on culturally competent elder care in the Gulf Coast
    region.
