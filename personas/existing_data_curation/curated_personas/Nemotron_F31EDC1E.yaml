personas:
  professional: Heidi Su is a veteran registered nurse with over three decades of geriatrics and chronic disease experience who uses their calm, resourceful demeanor and talkative, sociable nature to lead
    interdisciplinary care teams, mentor novice nurses, and champion data‑driven quality improvement projects in New Orleans community health settings.
  sports: Heidi Su is an avid follower of the New Orleans Saints and Pelicans, joins a senior walking club for weekly levee strolls, and plays pick‑up pickleball at the St. Bernard Community Center, while
    avoiding marathon training due to a preference for low‑impact activities.
  arts: Heidi Su is a devoted patron of live jazz, often attending performances by the Preservation Hall Jazz Band and Wynton Marsalis at the Saenger Theatre, while also knitting to the rhythm of classic
    blues records by B.B. King and recounting stories about historic venues to friends.
  travel: Heidi Su is a seasoned traveler who enjoys leisurely river cruises on the Mississippi to St. Louis, weekend road trips to Savannah and Charleston, and hopes to explore the jazz heritage of New
    York City’s Harlem neighborhood, balancing limited retirement funds with occasional splurges on cultural tours.
  culinary: Heidi Su is an enthusiastic home cook who skillfully prepares jambalaya, gumbo, beignets, and crawfish étouffée using fresh herbs like thyme and filé powder, while sharing secret spice blends
    at neighborhood potlucks and occasionally over‑salting dishes due to a love of bold flavors.
  core: Heidi Su blends a lifelong nursing career with a love for New Orleans jazz, spontaneous potluck cooking, and a tendency to procrastinate on paperwork, creating a vibrant, community‑focused life
    that leans on talkative charm and occasional fiscal slip‑ups.
background:
  cultural: Heidi grew up as a white Southern family member in New Orleans, steeped in the city’s unique blend of traditions. Raised Catholic, she celebrates holidays with a distinct Louisiana flavor—Mardi
    Gras, Creole feasts, and Thanksgiving centered on local cuisine. Her upbringing exposed her to the rhythms of brass bands, the flavors of Creole and Cajun cooking, and the warm hospitality that defines
    Southern community life. While she identifies with mainstream American customs, she embraces the multicultural tapestry of New Orleans, respecting French, African‑American, and Caribbean influences
    that shape the city’s social fabric and inform her inclusive, harmony‑focused outlook.
