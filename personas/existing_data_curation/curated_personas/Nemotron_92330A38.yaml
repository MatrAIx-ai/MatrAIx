  hobbies: '[''organic gardening'', ''hiking in Mendocino forests'', ''cooking farm‑to‑table meals'', ''quilting and knitting'', ''reading mystery novels'', ''playing bridge'', ''leading a craft circle'',
    ''bird watching'', ''photography of local landscapes'', ''volunteering at senior center'', ''participating in community theater'', ''attending local music festivals'']'
  career_goals: Although retired from formal employment, Ashlee aims to deepen her impact on Redwood Valley by achieving Master Gardener certification and expanding the town’s community garden into a year‑round
    educational hub. She plans to compile her favorite farm‑to‑table recipes and the stories behind them into a locally‑focused cookbook, and to organize an annual Harvest Festival that celebrates sustainable
    agriculture and local artisans. Additionally, she aspires to lead a seniors’ advocacy committee, mentor younger volunteers in event planning, and secure grant funding to improve emergency preparedness
    resources for the neighborhood.
