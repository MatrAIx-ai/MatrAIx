  hobbies: '[''drawing'', ''painting'', ''reading fantasy novels'', ''collecting rocks'', ''exploring local woods'', ''playing with Legos'', ''making up stories'', ''learning piano'', ''birdwatching'']'
  career_goals: She dreams of one day combining her love for art and nature by becoming a wildlife illustrator or a museum curator who creates interactive exhibits for children, and she also hopes to help
    classmates discover their own creativity, perhaps as an elementary school art teacher.
