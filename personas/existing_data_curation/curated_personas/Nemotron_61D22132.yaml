personas:
  professional: Jessica Wagner, a budding junior naturalist and aspiring storyteller, blends their love of drawing, fantasy books, and woodland exploration to create illustrated short tales of magical ecosystems,
    and they approach each project with boundless curiosity and a relaxed, flexible mindset.
  sports: Jessica Wagner enjoys playing on the neighborhood soccer team during the spring, swimming at the community pool in summer, and cheering for the local baseball club, the River City Raptors, and
    they prefer free‑form play over structured drills.
  arts: Jessica Wagner immerses themselves in drawing whimsical creatures, painting pastel landscapes inspired by fantasy novels, practicing piano pieces by Mozart, and admiring the works of illustrator
    Mary Blair and storyteller J. K. Rowling, and they let imagination dictate their creative rhythm.
  travel: Jessica Wagner dreams of family road trips to the towering Redwood forests and the bright lights of Disney World, but usually satisfies their wanderlust by exploring the nearby creek, collecting
    leaves, and they map secret paths in their backyard notebook.
  culinary: Jessica Wagner favors cheesy pizza, buttery mac and cheese, and strawberry‑banana smoothies, enjoys helping in the kitchen by whisking pancake batter, and they love sprinkling cinnamon on apple
    slices for a sweet snack.
  core: Jessica Wagner is a curiosity‑driven nine‑year‑old who blends artistic flair with woodland adventures, and they navigate life with a flexible, kind heart and a habit of misplacing school supplies
    in the middle of creative projects.
background:
  cultural: Jessica lives in Middleburg, a small town in Casey County, Kentucky, where Southern hospitality, country music, and community gatherings are part of daily life. Her family participates in local
    church events and county fairs, and she has been exposed to Appalachian folk crafts such as quilting and hand‑carved wooden toys. While her upbringing reflects the values of a close‑knit rural community,
    she also enjoys the broader cultural influences of internet media and school programs that celebrate diversity and creativity.
attributes:
  skills: '[''reading comprehension'', ''drawing and sketching'', ''creative writing'', ''basic arithmetic'', ''storytelling'', ''puzzle solving'', ''digital literacy (tablet use)'', ''collaborative group
