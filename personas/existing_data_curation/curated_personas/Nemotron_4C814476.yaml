  hobbies: '["Model railroading", "Gardening (vegetable and ornamental)", "Reading historical nonfiction", "Crossword puzzles and Sudoku", "Woodworking", "Genealogy research", "Attending small community
    book clubs"]'
  career_goals: Although retired, Carl’s ambitions focus on legacy, stability, and community contribution. He aims to keep his estate and personal documents in perfect order, ensuring his will and power
    of attorney are current. Maintaining his health through a disciplined routine of daily walks, gentle stretching, and a balanced diet is a top priority. Carl wishes to mentor younger volunteers at the
    Lansdale Historical Society, passing on his research methods and organizational habits. He also hopes to preserve his family home and garden so they remain a source of pride for future generations.
    Finally, he seeks structured involvement in a senior‑center committee where he can apply his planning skills to benefit his neighbors.
