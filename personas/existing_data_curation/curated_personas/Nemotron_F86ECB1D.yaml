personas:
  professional: Mariaeliza Fuentes is a methodical interior designer who leverages her strong background in arts and humanities to excel in space planning, color theory, and sustainable material selection,
    delivering meticulously budgeted projects that subtly infuse coastal-inspired motifs while they consistently outperform peers in regional design contests.
  sports: Mariaeliza Fuentes enjoys early‑morning jogs along the river trail and practices yoga at the local Insight Studio, follows the Chicago Bulls and the St. Louis Cardinals for their strategic play,
    and participates in a community running club called River Run Collective, though they rarely join large team sports due to their preference for solitary or small‑group activities.
  arts: Mariaeliza Fuentes immerses herself in historical fiction by authors like Hilary Mantel and Ken Follett, attends intimate gallery openings featuring contemporary painter Ana Rodriguez, draws inspiration
    from the organic forms of Zaha Hadid’s architecture, and regularly experiments with watercolor sketches during design workshops to keep their creative edge sharp.
  travel: Mariaeliza Fuentes plans trips with precision, favoring short getaways to coastal towns such as Carmel‑by‑the‑Sea and Charleston for their architectural charm, while dreaming of a longer immersion
    in the historic streets of Granada, Spain, and always books boutique eco‑lodges that align with their sustainability values.
  culinary: Mariaeliza Fuentes loves to craft coastal‑inspired ceviche with lime, cilantro, and firm white fish, perfects a hearty encebollado stew brimming with fresh fish and root vegetables, and showcases
    their culinary experiments during intimate tasting evenings where they pair dishes with locally sourced wines and craft beers.
  core: Mariaeliza Fuentes blends a competitive, detail‑driven design mindset with a love for solitary puzzles, sustainable cooking, and carefully curated travel, all while navigating a habit of occasional
    budget‑busting tasting parties.
background:
  cultural: Born to Ecuadorian parents, Mariaeliza grew up with a strong connection to her heritage, speaking Spanish at home and celebrating festivals like Carnaval and Día de los Difuntos. The vibrant
    colors, intricate weaving, and craftsmanship of Andean textiles have shaped her aesthetic sensibility. While living in Oklahoma City, she blends this cultural legacy with Midwestern practicality, often
    incorporating natural wood, woven textiles, and bold accent colors reminiscent of Ecuadorian marketplaces into her designs. She remains active in the local Ecuadorian community, volunteering at cultural
    events and supporting newcomer families, which reinforces her identity as a bridge between her Latin American roots and American life.
attributes:
  skills: '["Space planning", "Color theory", "Material selection", "AutoCAD", "SketchUp", "Revit", "Adobe Photoshop", "Adobe Illustrator", "Project management", "Budgeting", "Client presentation", "Sustainable
