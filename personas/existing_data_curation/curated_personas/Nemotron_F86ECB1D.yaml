  hobbies: '["Ecuadorian cooking", "Historical fiction reading", "Architecture monographs", "Attending design workshops", "Visiting local art galleries", "Indoor succulents gardening", "Participating in
    design competitions", "Solving crosswords and Sudoku", "Small group book clubs"]'
  career_goals: Mariaeliza aims to become a senior interior designer and eventually open her own boutique studio focused on sustainable residential and boutique commercial projects that celebrate Latin
    American craftsmanship. She plans to earn LEED AP credentials within the next three years, lead high‑profile design competitions, and publish a portfolio of culturally infused designs that blend Ecuadorian
    motifs with modern Midwestern sensibilities. Her long‑term ambition is to be recognized as a thought leader in cross‑cultural sustainable interior design and mentor emerging designers.
