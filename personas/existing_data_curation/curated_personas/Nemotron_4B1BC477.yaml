  hobbies: '[''Fishing'', ''Hunting'', ''Classic Chevrolet truck restoration'', ''Listening to classic rock and country music'', ''Reading transportation trade magazines'', ''Volunteering at the church
    food‑bank'', "Veterans'' organization", ''Nature walks'']'
  career_goals: At 61, John aims to transition to a part‑time dispatch or mentorship role, sharing his practical knowledge with younger drivers while securing a stable retirement income through a modest
    fleet of delivery trucks that he can lease to local businesses. He also seeks a more predictable schedule to reduce stress and improve his health, and he is determined to maintain a reputation for reliability
    and competitiveness in his community.
