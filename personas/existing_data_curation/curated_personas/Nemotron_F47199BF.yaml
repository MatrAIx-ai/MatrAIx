personas:
  professional: Jonathan Flowers, a 19‑year‑old apprentice electrician in Streator, Illinois, combines meticulous NEC‑compliant wiring work with a growing curiosity for solar PV and smart‑home automation,
    often sketching circuit upgrades on the back of a coffee napkin while keeping the job site organized yet adaptable to on‑the‑fly challenges.
  sports: Jonathan Flowers dominates the local pickup basketball court at St. James Community Park, cheers for the Chicago Bulls and Chicago White Sox, laces up for the Streator United weekend soccer league,
    and caps off the season with early‑morning hikes and fly‑fishing trips along the Kankakee River, often swapping stories with teammates at the town’s sports bar.
  arts: Jonathan Flowers strums rhythm guitar in a garage band that riffs on Foo Fighters and Jack White tracks, drops into multiplayer sessions of Rocket League after rehearsals, enjoys streaming the indie
    folk duo The Lumineers, and occasionally volunteers to help set up lighting for the church’s holiday pageant, reflecting a blend of modern music tastes and community‑rooted performance.
  travel: Jonathan Flowers prefers budget road trips on long weekends, having already explored Starved Rock State Park’s waterfalls, driven up to Mackinac Island for a historic bike ride, and dreamed of
    a pilgrimage to Germany’s Bavarian Alps to see solar farms, all while coordinating travel with his soccer teammates to keep costs low.
  culinary: Jonathan Flowers’ palate favors hearty Midwestern fare—think smoked bratwurst, pulled pork BBQ, and a perfectly seared salmon filet seasoned with lemon and dill—while his modest cooking skills
    shine in a go‑big chili recipe he perfects for the local Habitat for Humanity fundraiser, and he never skips the nightly cup of drip coffee brewed with locally roasted beans.
  core: Jonathan Flowers is a socially‑charged, tech‑curious young electrician whose boundless energy fuels community service, yet his frequent anxiety swings keep him juggling optimism with the need for
    structured self‑care.
background:
  cultural: Jonathan grew up in Streator, Illinois, a small Midwestern town with deep roots in manufacturing and trade. His family is of German‑American descent, with generations of skilled laborers who
    emphasize hard work, practicality, and community involvement. He attended a local public high school where he participated in the robotics club and varsity sports, reinforcing his teamwork values. The
    town's close‑knit culture, alongside regular church attendance and neighborhood gatherings, has shaped his cooperative, kind‑hearted outlook while also providing a supportive environment as he navigates
    his emotional challenges.
attributes:
  skills: '[''Residential wiring'', ''Circuit troubleshooting'', ''Interpretation of electrical blueprints'', ''NEC compliance'', ''Use of multimeters and diagnostic tools'', ''Safety protocol enforcement'',
