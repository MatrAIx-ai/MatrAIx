  hobbies: '[''Basketball'', ''Soccer'', ''Hiking'', ''Fishing'', ''Arduino/Raspberry Pi electronics projects'', ''Smart‑lighting experimentation'', ''Guitar playing'', ''Multiplayer video gaming'', ''Habitat
    for Humanity volunteering'']'
  career_goals: Jonathan aims to earn his journeyman electrician license within the next two years and later achieve master electrician status. He wants to specialize in green‑energy installations, particularly
    residential solar and smart‑home automation, and eventually launch his own contracting firm that offers eco‑friendly electrical solutions. To support this vision, he plans to complete an associate degree
    in electrical engineering technology, obtain certifications in renewable energy, and build a reputation for reliability and client‑centered service. Balancing financial stability with a manageable workload
    is a priority, as it will help him better manage his anxiety and maintain a healthy work‑life rhythm.
