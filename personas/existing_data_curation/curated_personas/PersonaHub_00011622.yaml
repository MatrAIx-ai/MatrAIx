persona_description: A cultural historian who specializes in the study of Indonesian architecture and its relationship with other regions and cultures around the world. His research interests include the
  traditional architecture of East Java and its relationship with other architectural traditions, as well as the use of eclectic architecture in preserving traditional Indonesian architecture. He is also
  interested in the cultural and social implications of the use of ornamentation in traditional architecture, and how it relates to economic development and social status. He is a professor at a university
  in Indonesia and has written extensively on the topic of Indonesian architecture.
