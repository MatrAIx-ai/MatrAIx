  career_goals: Although only three, Christopher’s emerging desire for structure leads him to talk about "being a teacher" or "helping people" when asked about the future. He imagines a career where he
    can keep things tidy, help others, and follow clear rules—such as a teacher, librarian, or community helper. His parents encourage early literacy and problem‑solving to support these ambitions.
