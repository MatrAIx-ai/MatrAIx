personas:
  professional: Christopher Chadwick is a three-year-old future engineer; they spend every afternoon meticulously constructing block towers, following step-by-step plans, and demanding perfection in alignment,
    reflecting their early love for structure and achievement.
  sports: Christopher Chadwick is an enthusiastic three-year-old who attends the Little Sprouts Soccer Club on Saturday mornings, idolizes the Chicago Cubs, and practices backyard fastball throws while
    they follow a disciplined routine of arranging obstacle-course blocks and balancing on a low beam, reflecting their love for structured physical play.
  arts: Christopher Chadwick is a three-year-old who delights in singing Raffi’s ‘Baby Beluga’, dancing to Disney’s ‘Let It Go’ from Frozen, and drawing pictures of Mickey Mouse; they incorporate these
    familiar melodies and characters into daily play, satisfying their preference for predictable, repetitive rhythms and creative expression.
  travel: Christopher Chadwick is a three-year-old who prefers short, well-planned trips such as weekend visits to the family farm in Iowa, day outings to the San Diego Zoo, and annual vacations to Orlando’s
    Walt Disney World; they relish the comfort of familiar schedules and the excitement of seeing beloved cartoon characters in person.
  culinary: Christopher Chadwick is a three-year-old who favors mac and cheese with extra cheddar, peanut butter and jelly sandwiches, and banana slices; they enjoy arranging foods into smiley faces on
    the plate and occasionally help stir pancake batter with a small wooden spoon, reflecting their love of order and sensory comfort.
  core: Christopher Chadwick is a three-year-old perfectionist; they organize toys by size, demand bedtime routines, and delight in repetitive songs, balancing a gentle kindness with an unwavering need
    for structure.
background:
  cultural: Christopher comes from a Mexican‑American family in Harbor City, Los Angeles County. Spanish is spoken at home alongside English, and he participates in cultural celebrations such as Día de
    los Muertos, Mexican Independence Day, and family‑centered fiestas. The blend of Mexican traditions and the diverse community of Harbor City shapes his values of cooperation, respect for elders, and
    a love for communal meals and music.
