personas:
  professional: Andree Givens is a seasoned operations executive in the Research Triangle area, expertly blending data‑driven decision‑making, lean‑six‑sigma methodology, and emerging IoT technologies to
    streamline multi‑site supply chains while championing equity and mentorship, and they are known for turning meticulous strategic plans into tangible, inclusive results.
  sports: Andree Givens enjoys early morning hikes and weekend kayaking at Umstead State Park, participates in a local spin class and a recreational softball league with the Raleigh Ringers, staunchly supports
    the Carolina Hurricanes and the Durham Bulls, and they schedule cross‑training sessions to maintain endurance for the upcoming marathon season.
  arts: Andree Givens immerses themselves in vibrant arts scenes, regularly attending live jazz performances by Gregory Porter and R&B sets featuring H.E.R., curates a personal vinyl collection of classic
    soul, reads contemporary leadership titles alongside fiction by Chimamanda Ngozi Adichie, and they occasionally dabble in watercolor painting inspired by local street murals.
  travel: Andree Givens favors culturally immersive travel, having explored the jazz heritage of New Orleans, the diaspora festivals of Accra, Ghana, and the culinary delights of Cartagena, Colombia, while
    planning future family trips to the Caribbean islands for their Afro‑Caribbean music festivals, and they balance these adventures with budget‑conscious travel apps and a love for spontaneous road trips
    along the Blue Ridge Parkway.
  culinary: Andree Givens is a confident home chef who reinvents classic collard greens with smoked paprika and quinoa, perfects shrimp and grits with a touch of orange zest, savors jerk chicken tacos with
    mango salsa, and they regularly experiment with seasonal farm‑to‑table ingredients at local Raleigh farmers’ markets while occasionally ordering takeout from the city’s top soul‑food bistro.
  core: Andree Givens combines a data‑driven mind with soulful community involvement, juggling rigorous operational metrics, a compulsive habit of collecting coffee cup lids for craft projects, and a love
    for late‑night jazz sessions.
background:
  cultural: Andree grew up in a close‑knit African‑American family in the South, where church, family gatherings, and community service were central pillars. She attended an HBCU for her undergraduate studies,
    which fostered a lifelong connection to historically Black professional networks. Living in Raleigh, she draws on the city's growing tech ecosystem while staying rooted in Black cultural traditions—celebrating
    Juneteenth, participating in local Black business coalitions, and preserving culinary heritage through soul‑food cooking with a contemporary flair. Her cultural identity informs her commitment to equity,
    mentorship, and uplifting underrepresented voices in the STEM and business arenas.
attributes:
  skills: '["Strategic Planning", "Process Optimization", "Supply‑Chain Analytics", "Statistical Programming (Python, R)", "ERP Systems (SAP, Oracle NetSuite)", "Lean Six Sigma (Black Belt)", "Project Management
    (PMP)", "Data Visualization (Tableau, Power BI)", "Change Management", "Budgeting & Financial Forecasting", "Risk Assessment", "IoT & Automation Integration"]'
  hobbies: '["STEM Mentoring (Black Girls CODE, Girls Who Code)", "Hiking and Kayaking in Umstead State Park", "Yoga", "Exploring Raleigh’s Culinary Scene", "Live Jazz & R&B Concerts", "Book Club (Contemporary
    Fiction & Leadership)", "Traveling to African Diaspora Cultural Festivals"]'
  career_goals: Andree aims to advance to a senior executive role such as Vice President of Operations or Chief Operating Officer within the next five to seven years, focusing on digital transformation
    and sustainable operational practices. She wants to lead a multi‑site organization in the Research Triangle area, championing data‑driven efficiency while embedding diversity, equity, and inclusion
    initiatives across the workforce. Additionally, she plans to mentor emerging Black professionals in STEM and operations, and eventually launch a consultancy that helps small and medium‑size enterprises
    adopt lean and technology‑enabled processes.
