  career_goals: He aims to regain a stable income by offering his handyman services part‑time to neighbors and local businesses, and is exploring a certification in home‑energy retrofitting to increase
    his marketability. He also wants to finish a short course in stress‑management and cognitive‑behavioral techniques to better cope with anxiety, and eventually volunteer as a mentor at the local community
    center, teaching practical skills to younger residents. His overarching ambition is to build a predictable routine that secures financial stability while preserving his independence.
