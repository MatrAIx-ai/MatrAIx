  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Hiking'', ''Quilting'', ''Volunteering at church food bank'', ''Reading historical fiction'', ''Yoga'']'
  career_goals: Kimberly aims to progress from her current managerial position to a regional manager role within the next five years, overseeing multiple locations and driving operational efficiency. She
    plans to earn a Certified Manager (CM) credential and possibly complete an associate's degree in business administration to strengthen her strategic capabilities. Long‑term, she envisions mentoring
    emerging leaders, spearheading process‑improvement initiatives, and eventually transitioning to a consulting role that helps small businesses in the Piedmont region optimize their operations while maintaining
    work‑life balance for her family.
