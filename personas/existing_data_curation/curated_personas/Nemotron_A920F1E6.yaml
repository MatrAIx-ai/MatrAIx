  career_goals: Kenneth hopes to attend a community college or technical institute to study computer science or engineering. He aims to become a software developer or robotics engineer who builds tools
    that solve real‑world problems and encourage teamwork. He is also interested in mentoring younger students and plans to combine his technical expertise with community service, possibly leading STEM
    outreach programs in his hometown.
