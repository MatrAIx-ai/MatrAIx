personas:
  professional: Kenneth Nelson, a 16‑year‑old aspiring robotics engineer, merges their curiosity for Arduino and Python programming with natural leadership, routinely designing collaborative code projects
    for their school's coding club while organizing weekend build‑sessions for peers.
  sports: Kenneth Nelson plays forward on the local youth soccer league and point guard for the high school basketball team, cheers for the hometown professional football team (the River City Titans), follows
    the NBA's Golden State Warriors, and participates in weekend trail hikes with the school outdoor club, often rallying teammates with their energetic pep talks.
  arts: Kenneth Nelson strums acoustic guitar at family barbecues, attends weekend concerts featuring artists like Tame Impala, Billie Eilish, and the regional indie group The Riverstones, and channels
    creative flair into detailed model‑building projects of classic cars, often sharing their creations on social media.
  travel: Kenneth Nelson prefers short, action‑packed trips such as weekend camping at Pine Ridge State Park, a school field trip to Washington, D.C., and a summer road‑trip to the Grand Canyon, while dreaming
    of a future visit to Tokyo to explore its tech museums and anime districts, and they plan each outing with a balance of spontaneity and a carefully drafted checklist.
  culinary: Kenneth Nelson enjoys mastering the art of barbecue, regularly cooking slow‑smoked ribs, spicy chicken wings, and veggie kebabs for friends, and can whip up quick snack‑size nachos with jalapeños
    and cheddar during gaming sessions, though they sometimes over‑salt the dishes in enthusiasm.
  core: Kenneth Nelson is a hands‑on, tech‑enthusiastic teen who balances a love for group sports and gaming with a drive to mentor peers, even if they occasionally stay up all night perfecting a new Arduino
    prototype.
background:
  cultural: Kenneth is a white Texan raised in the suburban community of Richardson, Dallas County. His family traces its ancestry to German and English settlers who moved to Texas in the early 1900s. He
    grew up with Southern hospitality, a strong work ethic, and a sense of community pride typical of the Dallas‑Fort Worth region. He celebrates American holidays such as Thanksgiving and the Fourth of
    July with Texas‑style barbecue and regional traditions, and he is comfortable navigating Richardson’s multicultural environment, which exposes him to diverse cuisines and cultural events from neighboring
    Asian and Hispanic communities.
