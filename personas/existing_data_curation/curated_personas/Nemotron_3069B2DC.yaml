  career_goals: Janet aims to pursue a STEM-oriented career, with a particular interest in biomedical engineering or environmental science. She plans to earn a merit-based scholarship to a university known
    for its engineering programs, leveraging her strong academic record and competition experience from science fairs. Her short‑term goal includes securing a summer internship at a local research lab to
    gain hands‑on experience. Long‑term, she aspires to develop sustainable health technologies that benefit her community while also exploring the intersection of food science and technology, potentially
    creating healthier, culturally resonant food products.
