personas:
  professional: Janet Nelms, an aspiring robotics engineer who spends after‑school hours designing and programming simple machines for their school’s robotics club, applies their methodical planning and
    competitive drive to perfect every circuit and code iteration.
  sports: Janet Nelms, a point guard on the Riverbank Middle School basketball team, drills three‑point shots before practice, follows the NBA’s Golden State Warriors playbook for strategic moves, and joins
    the local youth club’s summer league to sharpen their competitive edge.
  arts: Janet Nelms, a dedicated violinist who practices classical pieces by Bach and contemporary tunes from the band The Devil Wears Prada, regularly attends Zydeco festivals to soak in the accordion
    rhythms of BeauSoleil, and sketches bird photographs from their bayou excursions.
  travel: Janet Nelms, an adventurous yet budget‑conscious traveler, has explored the Atchafalaya Basin for birdwatching, dreams of visiting the National Air and Space Museum in Washington, D.C., and plans
    a family road trip to New Orleans to taste authentic gumbo and attend a live Zydeco jam.
  culinary: Janet Nelms, a budding home cook, experiments with Cajun cuisine by preparing jambalaya with Andouille sausage, shrimp, and bell peppers, perfects the roux for gumbo using dark flour and oil,
    and often adds a pinch of cayenne to their family’s Sunday pasta, though they sometimes over‑spice in their enthusiasm.
  core: Janet Nelms blends teenage curiosity with disciplined pragmatism, juggling robotics code, basketball drills, and Cajun cooking while keeping a tight budget spreadsheet and a vigilant eye on allergies.
background:
  cultural: Janet was raised in Lafayette, Louisiana, a city where Southern hospitality intertwines with vibrant Cajun and Creole traditions. Her family participates in community celebrations such as Mardi
    Gras parades, local seafood festivals, and church gatherings that emphasize togetherness. She has grown up enjoying regional foods like crawfish étouffée and listening to Zydeco and Cajun music, often
    picking up French phrases at cultural events. While her ethnic background is white, her upbringing reflects the multicultural tapestry of Acadie, fostering a respect for both longstanding customs and
    progressive ideas. This environment nurtures her balanced outlook—valuing tradition while remaining open to new possibilities.
