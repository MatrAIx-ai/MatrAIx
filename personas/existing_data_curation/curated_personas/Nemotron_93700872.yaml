  career_goals: Jesus aims to earn his GED within the next year and enroll in a community college program in graphic design or visual communications. He plans to develop a professional portfolio showcasing
    his illustration and branding work, secure an internship at a creative agency, and eventually transition from retail to a full‑time role as a graphic designer or creative strategist. Long‑term, he aspires
    to launch his own brand that fuses contemporary design with Puerto Rican cultural motifs, and to become a creative director who leads projects that celebrate Latin heritage while pushing artistic boundaries.
