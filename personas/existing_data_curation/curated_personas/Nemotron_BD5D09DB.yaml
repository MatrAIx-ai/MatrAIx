  career_goals: Looking ahead, Carol dreams of a career that blends her love for art, curiosity, and innovative thinking. She envisions becoming a museum curator or a multimedia artist who creates immersive
    exhibitions, or perhaps an interactive game designer that teaches scientific concepts. She aims to win regional art and science competitions during middle school, earn a scholarship for a specialized
    arts program, and eventually study visual arts and technology at a university. Her competitive spirit drives her to be recognized as a top young creator in her community, while her calm resilience ensures
    she will persist through rigorous training.
