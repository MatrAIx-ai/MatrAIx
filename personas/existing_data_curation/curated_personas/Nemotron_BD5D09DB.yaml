personas:
  professional: A budding naturalist and digital creator, Carol Lee blends curiosity about the Black Hills ecosystem with a knack for coding simple games in Scratch, leveraging her organized yet flexible
    approach to manage both field sketches and pixel art, while her competitive streak drives her to win school science fairs.
  sports: An energetic weekend adventurer, Carol Lee spends Saturdays hiking Black Hills trails, plays on the local under‑10 soccer team, cheers for the Rapid City Rush ice‑hockey club and the Denver Broncos,
    and follows a methodical warm‑up routine that channels her competitive energy into personal bests on the school track.
  arts: A nature‑inspired creator, Carol Lee produces watercolor landscapes reminiscent of Claude Monet and the whimsical storytelling of Studio Ghibli, sketches characters while listening to Ludovico Einaudi’s
    piano compositions, and curates a small collection of classmates’ sketchbooks for artistic exchange.
  travel: An adventurous day‑tripper, Carol Lee prefers self‑guided hikes in the Black Hills and weekend camping trips to Yellowstone, while dreaming of a future family vacation to Kyoto’s bamboo forests
    after saving enough from her allowance for travel costs.
  culinary: A budding home chef, Carol Lee loves making fluffy blueberry pancakes topped with fresh maple syrup, experimenting with stir‑fried rice filled with carrots, peas, and shrimp, and enjoys trail
    mix of dried cranberries, almonds, and dark chocolate, though she sometimes forgets to eat a balanced lunch before school.
  core: Carol Lee is a calm, curiosity‑driven ten‑year‑old who balances nature‑inspired art, digital creation, and a competitive spirit, while managing her allowance and mild allergies with quiet resilience.
background:
  cultural: Carol comes from a European-American family with roots common to the Great Plains, including German and Scandinavian ancestry. Growing up in Rapid City, she is surrounded by the expansive plains
    and the distinctive Black Hills, which shape her appreciation for outdoor activities and natural art. The community emphasizes school involvement, local festivals, and respect for the region's Indigenous
    heritage; through school curricula she has learned about the Lakota Sioux culture and participates in cultural awareness events. Her family's values of self-reliance and modest competitiveness reflect
    the wider cultural atmosphere of South Dakota's rural Midwest.
