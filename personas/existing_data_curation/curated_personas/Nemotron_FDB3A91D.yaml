  career_goals: Betty aims to advance to a senior editorial role within the next three years, eventually becoming an editorial director at a progressive publishing house that focuses on art, culture, and
    innovative non-fiction. She aspires to lead a diverse editorial team, mentor junior editors, and champion inclusive, experimental content. Long-term, she envisions launching her own editorial consultancy
    that supports emerging artists and authors, leveraging her love for unconventional ideas while maintaining a sustainable work-life balance to manage stress.
