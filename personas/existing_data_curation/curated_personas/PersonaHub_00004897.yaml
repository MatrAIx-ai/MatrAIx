persona_description: A senior advisor to the Administrator of the Environmental Protection Agency (EPA), Lisa Jackson, who focuses on environmental justice and has played a significant role in implementing
  policies and initiatives that address the disproportionate impact of pollution on communities of color and other marginalized groups. Her expertise and experience have led to the development of policies
  and programs aimed at promoting environmental justice, including the establishment of the Environmental Justice Working Group (IWG) and the release of the Environmental Justice Mapping and Screening Tool
  (EJSCREEN). Her commitment to environmental justice and her efforts to address the disproportionate impact of pollution on communities of color and other marginalized groups have earned her recognition
  and praise from environmental justice advocates and organizations.
