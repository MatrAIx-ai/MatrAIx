personas:
  professional: Maiya Creary, an aspiring young engineer and LEGO architect, blends her love for structured storytelling from Magic Tree House with meticulous building skills to craft miniature educational
    scenes she shares during Girl Scout community projects, and they consistently apply her organized, compassionate approach to each project.
  sports: Maiya Creary swims three times a week with the Brookside Dolphins youth team, cheers for the local minor‑league baseball club the River City Rattlers, and joins seasonal community soccer games
    in spring, all while they maintain a consistent training routine.
  arts: Maiya Creary delights in playing Beethoven’s "Für Elise" on piano, listens to the Harry Potter film scores, watches movies starring Emma Watson, and draws inspiration from LEGO artist Nathan Sawaya’s
    sculptural creations, and they often incorporate these artistic influences into their own LEGO designs.
  travel: Maiya Creary enjoys weekend nature hikes at Willow Creek State Park, has visited Washington D.C.’s National Museum of Natural History, dreams of exploring the historic castles of Scotland on a
    future family vacation, and they meticulously plan each trip with a detailed checklist.
  culinary: Maiya Creary assists in preparing family‑favorite dishes like baked mac and cheese, roasted sweet potatoes, and cinnamon‑spiced apple pie, loves experimenting with fresh basil and mozzarella
    on homemade pizza, and eagerly tastes spicy mango salsa, all while they keep a tidy kitchen station.
  core: Maiya Creary fuses meticulous LEGO engineering with a warm, community‑focused heart, often over‑scheduling their week while occasionally losing track of time in the library’s reading nook.
background:
  cultural: Maiya is an African‑American girl raised in Baytown, Texas, within a close‑knit, multigenerational family. Her household blends Southern Texas traditions with African‑American cultural practices.
    Frequent church gatherings, gospel music, and celebrations of Juneteenth and Black History Month shape her sense of identity. Family meals often feature soul‑food favorites such as collard greens, cornbread,
    and barbecue, and storytelling sessions pass down community values and history. The diverse Baytown community provides exposure to a range of cultural festivals, reinforcing her appreciation for harmony
    and mutual respect.
