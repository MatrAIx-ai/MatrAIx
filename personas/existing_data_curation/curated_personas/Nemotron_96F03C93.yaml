  career_goals: Maiya imagines a future where she can help others every day. She dreams of becoming a pediatric nurse or an elementary school teacher, roles that combine her love of caring for people with
    her passion for learning. She also hopes to work on community projects that create safe, fun spaces for children, reflecting her structured, compassionate mindset.
