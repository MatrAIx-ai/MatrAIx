  career_goals: Taylor hopes to turn her love for helping others and her natural knack for organization into a future career in a caring, structured field. She envisions becoming either a pediatric nurse
    or an elementary school teacher, roles that let her support children’s well‑being while maintaining routine. She also dreams of leading youth‑mentoring or community‑outreach programs in her hometown,
    where she can combine her sociable, compassionate nature with her reliable work ethic. To achieve these goals, she plans to maintain strong grades, continue volunteering at local events, and develop
    leadership skills through school clubs.
