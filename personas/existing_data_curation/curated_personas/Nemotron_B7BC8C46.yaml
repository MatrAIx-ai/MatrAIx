personas:
  professional: Taylor Tierney, a diligent elementary student who leads the school’s library story‑time volunteers, applies meticulous planning and a caring demeanor to coordinate reading sessions and Girl
    Scout projects, and they consistently follow through on every commitment.
  sports: Taylor Tierney, a forward on the Litchfield Park Junior Soccer Club, practices thrice weekly, cheers for the Arizona Cardinals and Phoenix Suns, leads a neighborhood pick‑up game at Desert Breeze
    Park each Saturday, balancing competitive drive with team spirit, and they always encourage teammates to play fair.
  arts: Taylor Tierney, an enthusiastic piano player who practices Chopin etudes every Sunday, devours adventure novels like the Percy Jackson series, creates friendship bracelets inspired by vibrant Southwest
    textiles, streams songs by Taylor Swift and Ariana Grande while baking cookies—a creative routine that fuels their imagination, and they love sharing their latest creations with friends.
  travel: Taylor Tierney prefers family‑oriented trips with detailed itineraries, having explored the Grand Canyon, Sedona’s red rocks, and Disneyland, while dreaming of a summer vacation to New York City’s
    Central Park and a cultural exchange in Japan, always packing a sketchbook for the journey, and they meticulously plan each stop to make the most of every experience.
  culinary: Taylor Tierney loves baking warm chocolate chip cookies and snickerdoodles, frequently adds a pinch of cumin to homemade salsa for a Southwest twist, enjoys building taco bowls with seasoned
    black beans and fresh avocado, experiments with growing prickly pear cactus in the backyard garden to incorporate in desserts, and they delight in sharing their treats at Girl Scout meetings.
  core: Taylor Tierney is an organized, outgoing 11‑year‑old whose love for routines, community service, and creative pursuits like soccer, piano, and baking shapes a compassionate, slightly perfectionist
    outlook on life, and they often set detailed checklists to keep everything on track.
background:
  cultural: Taylor grew up in Litchfield Park, a family‑oriented suburb of Maricopa County, Arizona. Her household reflects mainstream American (white) traditions, emphasizing community involvement, school
    participation, and outdoor recreation typical of the Sonoran Desert region. She regularly attends local celebrations such as the Desert Festival, enjoys Southwest cuisine that blends Mexican and American
    flavors, and participates in a community church that values service. Although her ethnic background is white, the multicultural environment of Arizona has shaped her appreciation for neighborliness,
    volunteerism, and the blend of cultural influences present in her daily life.
