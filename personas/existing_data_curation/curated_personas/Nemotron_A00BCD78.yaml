personas:
  professional: Bobby White, a seasoned IT technician with over two decades of hands‑on experience in hardware repair, LAN/WAN networking, and Windows/Linux administration, leverages their methodical planning
    and patient demeanor to craft clear SOPs and mentor non‑technical users while eyeing a strategic leadership role in the county school district.
  sports: Bobby White stays active by hiking the nearby hills during spring, participates in a local recreational baseball league, follows the Atlanta Braves and the Green Bay Packers for baseball and football
    respectively, and enjoys weekend fishing trips on the Green River with the community’s angling club.
  arts: Bobby White’s creative outlet extends beyond woodworking to a deep appreciation for bluegrass, regularly streaming Bill Monroe and the Del McCoury Band, attending the annual regional bluegrass festival,
    and collecting vintage model train kits that double as kinetic art pieces.
  travel: Bobby White prefers low‑key road trips that fit around work and family, often driving to the Great Smoky Mountains for hiking, the Texas Hill Country for BBQ tastings, and dreaming of a future
    scenic cruise along the Pacific Northwest’s coastline, always planning itineraries with detailed checklists.
  culinary: Bobby White excels at Southern BBQ, perfecting smoked pork ribs with hickory wood, a tangy vinegar‑based sauce, and homemade coleslaw, while also experimenting with cedar‑plank grilled trout
    caught on the Green River and mastering a side of cornbread infused with jalapeños.
  core: Bobby White is a dependable, curiosity‑driven tech veteran who balances solitary woodworking and fishing with a quiet passion for mentoring, all while keeping an ever‑present spreadsheet for life’s
    minutiae.
background:
  cultural: 'Bobby was born and raised in the rolling hills of Casey County, Kentucky, in a family that has lived in the region for several generations. His upbringing reflects the values of rural Southern
    Appalachia: a strong emphasis on family, community, and self‑reliance, combined with a practical work ethic and hospitality. He grew up attending local church services, community fairs, and high‑school
    events, learning the importance of helping neighbors. While deeply rooted in these traditions, his curiosity for computers led him to embrace modern technology, creating a bridge between his heritage
    and contemporary digital life.'
attributes:
  skills: '[''Hardware troubleshooting and repair'', ''Network configuration and maintenance (LAN/WAN)'', ''Windows and Linux system administration'', ''Virtualization (VMware, Hyper‑V)'', ''Desktop support
    and help‑desk assistance'', ''Technical documentation and SOP creation'', ''Basic cybersecurity best practices'', ''Project planning and task scheduling'', ''User training for digital literacy'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Reading technology and science magazines'', ''Model railroading'', ''Gardening'', ''Volunteering for community computer literacy programs'', ''Hiking'', ''Cooking
    (especially Southern BBQ)'']'
  career_goals: Bobby aims to transition from a hands‑on technician role to a leadership position where he can shape the IT strategy for local institutions such as the county school district or public library.
    He plans to earn certifications like CompTIA Network+ and Cisco CCNA to strengthen his credentials, and eventually launch his own small consulting firm that provides reliable, affordable technology
    services to the rural community. His long‑term ambition is to mentor younger tech enthusiasts and help bridge the digital divide in his hometown.
