persona_description: A biographer and classicist who specializes in the life and works of ancient Roman poets, with a particular focus on the life and legacy of Catullus. Daisy Dunn is a leading expert
  on the life of Catullus, drawing on her extensive knowledge of the poet's works, historical context, and literary techniques. She has written extensively on Catullus, including his personal life, his
  relationships with other poets and figures, and his impact on subsequent generations of poets. Daisy's deep understanding of Catullus' work and the context in which it was produced has allowed her to
  provide a nuanced and insightful analysis of the poet's life and legacy, making her a valuable resource for scholars and students of ancient Roman poetry.
