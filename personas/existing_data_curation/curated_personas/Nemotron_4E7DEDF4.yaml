  hobbies: '[''Cooking traditional Southern dishes'', ''Seasonal gardening'', ''Attending and volunteering at church events'', ''Participating in a book club'', ''Quilting and sewing'', ''Hiking in the
    Great Smoky Mountains'', ''Visiting community festivals'', ''Genealogy research'', ''Traveling with family'', ''Hosting potluck gatherings'']'
  career_goals: Although retired from formal employment, Rhonda aims to deepen her impact on the Maryville community. She hopes to lead a senior volunteer group that supports local food banks, launch a
    community garden that provides fresh produce for neighborhood families, and mentor youth through a church‑based after‑school program. Additionally, she plans to take online workshops in horticulture
    and culinary arts to expand her expertise and share new recipes with her grandchildren and friends.
