personas:
  professional: Rhonda Hawkins, a retired administrative professional turned community volunteer, leverages their hands‑on learning style and outgoing nature to coordinate senior volunteer initiatives,
    manage food‑bank drives, and mentor youth in church programs, all while balancing curiosity for new horticultural ideas with a practical, flexible approach to project planning.
  sports: Rhonda Hawkins stays active by hiking the Great Smoky Mountains trails with the local senior walking group Smoky Trail Walkers, cheering on the Tennessee Volunteers football team and the Nashville
    Predators, and playing on the Maryville Mavericks senior softball league during summer weekends.
  arts: Rhonda Hawkins finds artistic fulfillment in quilting circles and a lively book club where they discuss works by Jane Austen and Toni Morrison, while also enjoying gospel classics by Mahalia Jackson,
    folk hits from Dolly Parton, and attending the Maryville Community Theatre’s productions of 'Our Town' and 'The Legend of Sleepy Hollow.'
  travel: Rhonda Hawkins prefers family‑focused road trips to historic sites and cultural festivals, having explored the Revolutionary‑era streets of Colonial Williamsburg, the vibrant Mardi Gras celebrations
    in New Orleans, and the Civil War battlefields at Chickamauga, while they dream of a leisurely summer visit to the Scottish Highlands for a clan‑tartan festival.
  culinary: Rhonda Hawkins showcases their Southern cooking flair by perfecting fried chicken, collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler, often using garden‑fresh
    tomatoes, okra, and sweet potatoes to add a home‑grown twist to classic recipes at community potlucks.
  core: Rhonda Hawkins is a community‑centered, garden‑loving retiree who balances curiosity with practicality, thrives on social gatherings, occasionally misplaces keys and appointments, yet consistently
    turns every potluck into a celebration of Southern hospitality.
background:
  cultural: Rhonda grew up in a white, Southern family in the foothills of the Appalachians, steeped in the values of hospitality, community, and faith typical of Maryville, Tennessee. Her cultural identity
    blends traditional Southern customs—such as church participation, family‑centric celebrations, and respect for local history—with an openness to new ideas and a practical mindset. She cherishes the
    region's strong sense of neighborliness, the rhythm of seasonal agriculture, and the comfort of longstanding community rituals, while also embracing contemporary influences through learning and social
    engagement.
