persona_description: A policy analyst who specializes in the study of abandoned wells, particularly the economic and regulatory frameworks for their site reclamation in Pennsylvania and Texas. She is knowledgeable
  about the environmental impacts of abandoned wells, the costs associated with plugging and restoring the land, and the benefits and risks of different policy options such as well bonds, retrofitting wells,
  and mandating reclamation trusts. She is also interested in the challenges of collecting data about orphaned and abandoned wells and the potential for well operators to forfeit bond payments instead of
  plugging and restoring the land.
