  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Landscape photography'', ''Listening to indie/folk music'', ''Reading philosophy, psychology, and art history'', ''Playing
    narrative video games'', ''Creative cooking'', ''Hiking in the Ozarks'', ''Journaling'']'
  career_goals: Kyle aims to move beyond his current cashier role into retail management, targeting a store‑manager position within the next two to three years. While gaining on‑the‑job experience, he plans
    to complete a Business Administration degree part‑time, with a focus on arts‑management electives that blend his commercial skill set with his passion for the arts. Long‑term, he envisions working in
    a museum gift shop or an independent gallery where he can curate visual displays and assist with community‑outreach programming. He also dreams of launching a modest online shop selling his own photography
    prints and locally sourced artwork, allowing him to combine entrepreneurial ambition with creative expression. Throughout these pursuits, he hopes to strengthen his coping strategies for stress and
    maintain a balanced lifestyle that includes regular artistic practice.
