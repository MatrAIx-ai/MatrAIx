personas:
  professional: Rickey Ohandley blends his budding management analyst role with a design-thinking mindset, channeling his curiosity, sociable energy and occasional disorganization into data-driven insights
    that delight stakeholders while they aim to lead strategy teams that prioritize sustainable, people-centered solutions.
  sports: Rickey Ohandley competes in the Portland State University Vikes ultimate frisbee club, follows the Portland Timbers and Trail Blazers for professional thrills, and spends weekend hikes with the
    Columbia River Gorge Hiking Society, balancing a laid-back approach to fitness with occasional missed gym days while they prioritize spontaneous social outings.
  arts: Rickey Ohandley frequents the Portland Art Museum and the Doug Fir Lounge, sketches digital collages inspired by Shepard Fairey, strums acoustic renditions of Bon Iver and Phoebe Bridgers in a campus
    band, and volunteers backstage at the community theater, where they channel their empathetic nature into set design collaborations that blur the line between function and art.
  travel: Rickey Ohandley prefers spontaneous weekend getaways to places like Bend, Oregon, the Scottish Highlands, and Tokyo's Shibuya district, planning trips on a whim with a mix of budget backpacking
    and occasional splurges on boutique stays, and while they enjoy the freedom of flexible itineraries, they sometimes miss flight deadlines due to their relaxed approach to obligations.
  culinary: Rickey Ohandley enjoys a moderate level of cooking, whipping up avocado-lime quinoa bowls, spicy tofu stir-fry with matcha-infused sauces, and occasional artisanal ramen, while they delight
    in indie food trucks serving locally sourced kale salads and craft-beer-paired charcuterie platters that fuel their creative evenings.
  core: Rickey Ohandley is a creatively restless 22-year-old who oscillates between spontaneous artistic bursts and bouts of anxiety, juggling a love for data, music, and mountain hikes with a habit of
    forgetting appointments and over-indulging in caffeine while they try to keep their scattered schedule afloat.
background:
  cultural: Rickey grew up in a Midwestern, white American family in Indiana, where community ties, modesty, and a strong work ethic were emphasized. His hometown values of self-reliance and neighborly
    support shaped his cooperative nature, while exposure to Purdue University's vibrant cultural scene sparked his curiosity for art, technology, and unconventional ideas. He blends traditional Midwestern
    hospitality with a progressive, open-minded outlook, often bridging the gap between local community values and broader, global perspectives.
