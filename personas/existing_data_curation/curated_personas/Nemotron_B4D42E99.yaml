  career_goals: Rickey aims to transition from a junior management analyst to a senior strategy consultant within the next five years, eventually leading cross-functional teams that blend analytical rigor
    with innovative, human-centered design. He plans to complete his Bachelor's degree and pursue an MBA focused on strategic management and entrepreneurship. Long-term, he envisions founding a boutique
    consultancy that helps mid-size firms integrate sustainable business practices and creative culture, while also advocating for workplace mental-health initiatives to support employees facing anxiety
    and stress.
