  hobbies: '[''Sketching'', ''Digital Illustration'', ''Acoustic Guitar'', ''Visiting Art Galleries'', ''Attending Live Music Shows'', ''Ultimate Frisbee'', ''Hiking'', ''Mindfulness Meditation'', ''Journaling'',
