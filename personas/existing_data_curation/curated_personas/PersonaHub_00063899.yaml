persona_description: A business owner or financial manager who is responsible for managing the cash flow and financial transactions of a restaurant or retail business. They are familiar with the banking
  and financial processes involved in running a business, including the use of debit and credit cards, and the management of cash and bank accounts. They are also knowledgeable about accounting principles
  and the use of software tools for bookkeeping and reconciliation. They may have experience with QuickBooks or other accounting software, and may be responsible for managing the deposits and payments for
  the business. They are likely to have a keen eye for detail and a strong understanding of financial reporting and analysis.
