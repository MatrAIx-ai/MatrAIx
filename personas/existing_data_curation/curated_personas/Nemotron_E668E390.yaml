  career_goals: Adriana aspires to attend a specialized high school for visual arts where she can deepen her skills in illustration and digital media. She aims to pursue a bachelor's degree in Fine Arts
    with an interdisciplinary focus that integrates technology, such as UI/UX design or interactive installations. Long‑term, she dreams of becoming a concept artist for video games or a creative director
    who blends Colombian cultural motifs with contemporary visual storytelling. She also hopes to win youth art competitions, secure a scholarship for her studies, and eventually mentor other young artists
    from immigrant backgrounds.
