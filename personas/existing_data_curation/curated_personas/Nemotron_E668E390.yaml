personas:
  professional: Adriana Tuya, a 15‑year‑old budding digital illustrator and interactive media hobbyist, blends hand‑drawn sketches with simple JavaScript animations to create micro‑projects for her online
    portfolio, demonstrating a meticulous yet experimental workflow, a balanced mix of organization and flexibility, and a competitive drive to out‑innovate peers on platforms like Behance.
  sports: Adriana Tuya, 15, regularly joins after‑school pickup soccer games, follows the national league’s “Los Guerreros” team with intense enthusiasm, competes in a weekend volleyball club where her
    competitive edge shines, prefers short, high‑intensity workouts over long runs, and balances her athletic pursuits with a disciplined study schedule.
  arts: Adriana Tuya, a 15‑year‑old visual artist, splits her time between sketching in a worn‑in notebook, creating glitch‑style digital paintings on her tablet inspired by James Jean and Beeple, curates
    a Behance board of speculative sci‑fi concept art, listens to Vallenato and Cumbia legends such as Carlos Vives while she works, and channels her curiosity and competitive spirit into weekly challenges
    to out‑do her peers.
  travel: Adriana Tuya, 15, prefers meticulously planned weekend getaways to nearby coastal towns like Mar Azul, dreams of wandering the vibrant street‑art districts of Buenos Aires to fuel her sketchbook
    ideas, balances her desire for adventure with a modest family budget, and chooses travel companions from her close‑knit group of friends rather than large crowds.
  culinary: Adriana Tuya, aged 15, regularly helps her family craft crispy cheese‑filled arepas and sweet guava empanadas, experiments with adding avocado salsa to the fillings, enjoys drawing the perfect
    swirl of mango‑mousse for Instagram posts, and, while competitive in the kitchen, often forgets to clean her tablet screen after dining, reflecting a blend of organized cooking habits and occasional
    neglect.
  core: Adriana Tuya, a 15‑year‑old digital‑art enthusiast with a competitive streak, balances meticulous sketching and code‑driven animation, hoards limited‑edition art supplies, occasionally skips lunch
    while deep in a project, and lets her skeptical nature keep impulse purchases at bay.
background:
  cultural: Adriana is a Colombian‑American teenager living in Marietta, GA. Her parents immigrated from the Antioquia region of Colombia, so she grew up speaking Spanish at home while attending English‑language
    schools. Family gatherings celebrate Colombian traditions with music, dance, and dishes like bandeja paisa, arepas, and empanadas. She participates in local cultural events such as Colombian Independence
    Day celebrations at the community center, and she balances the vibrant, expressive storytelling of her heritage with the Southern hospitality and community values of Georgia. This blend of cultures
    informs her artistic palette, often featuring bold colors and narrative elements drawn from Colombian folklore.
