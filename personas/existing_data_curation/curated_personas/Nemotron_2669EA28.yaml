  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Scale model building'', ''Woodworking'', ''Acoustic guitar'', ''Community theater'', ''Softball league'', ''Gardening'', ''Attending craft
    fairs'', ''Science fiction reading'']'
  career_goals: David aims to transition from a production worker to a supervisory role, such as shift supervisor or lead process improvement specialist, within the next three years. He plans to earn a
    Six Sigma Green Belt certification and pursue the Certified Production Technician credential to formalize his expertise. Leveraging his creative interests, he hopes to lead an internal design‑innovation
    team that integrates aesthetic enhancements into the company's product line. Long‑term, David envisions establishing a small side business crafting custom wooden furniture and artwork, allowing him
    to blend his technical skills with his passion for art while providing mentorship opportunities for younger workers in his community.
