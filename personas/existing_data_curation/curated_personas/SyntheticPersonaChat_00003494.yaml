    User 2: That''s so funny. I''ve never heard of someone not being able to eat fish because they''re pretty.

    User 1: Well, I think they''re beautiful, so I can''t bring myself to kill them.

    User 2: That''s really kind of you. I''m sure the fish appreciate it.

    User 1: I hope so. So, what do you like to do for fun?

    User 2: I like to go shopping, drive in the countryside, and read.

    User 1: Oh, I like to go shopping too. I''m a big fan of buying things I don''t need.

    User 2: Me too! I love getting a good deal.

    User 1: I know what you mean. I''m always looking for a bargain.

    User 2: I''m glad to meet someone who shares my love of shopping.

    User 1: Me too. I feel like I''ve found my soul mate.

    User 2: I know, right? It''s like we''re two peas in a pod.

    User 1: We totally are. I''m so glad we met.

    User 2: Me too. I think we''re going to be great friends.'
