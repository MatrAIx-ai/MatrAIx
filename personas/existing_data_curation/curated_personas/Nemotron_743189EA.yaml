  career_goals: At three years old, Abigale’s ambitions are expressed through imaginative play. She frequently pretends to be an artist, a storyteller, or a nature guide, showing a budding interest in creative
    and educational roles. While not yet formed, she dreams of drawing pictures for others and sharing stories, hinting at future aspirations to become an artist, teacher, or park ranger when she grows
    older.
