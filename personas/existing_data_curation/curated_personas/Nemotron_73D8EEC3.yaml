personas:
  professional: Arthur Harvey, a 27‑year‑old personal‑care aide aiming for CNA certification, draws on their methodical organization, compassionate communication, and curiosity for emerging caregiving technologies
    to provide meticulous home‑care support and to prototype culturally responsive health programs for Charlotte’s historic neighborhoods.
  sports: Arthur Harvey, a 27‑year‑old runner who logs three weekly miles in Freedom Park, joins the Charlotte Running Club for weekend 5 K races, supports the Charlotte Hornets during basketball season
    and the Charlotte FC in the MLS, and balances their fitness routine with occasional pick‑up basketball games that satisfy their strategic mindset.
  arts: Arthur Harvey, 27, immerses themselves in the soulful sounds of John Coltrane, Erykah Badu, and Mahalia Jackson while devouring historical biographies like Walter Isaacson's 'Steve Jobs' and sci‑fi
    classics by Octavia Butler, and occasionally attends live jazz sessions at Blumenthal Performing Arts to fuel their reflective creativity.
  travel: Arthur Harvey, 27, prefers meticulously planned weekend road trips to culturally rich destinations such as Asheville’s Blue Ridge Mountains, the historic museums of Washington, D.C., and New Orleans
    for its jazz heritage, while dreaming of a longer solo adventure to the beaches of Barbados once their savings goal is met.
  culinary: Arthur Harvey, 27, enjoys cooking soul‑food staples such as collard greens and cornbread, often adding modern twists like quinoa‑infused greens, miso‑glazed sweet‑potato pancakes, and jalapeño‑feta
    cornbread, demonstrating a moderate cooking skill that blends traditional flavors with experimental ingredients like kimchi and smoked paprika.
  core: Arthur Harvey, 27, is a methodical caregiver who balances a love for strategic chess, soulful cooking, and reflective reading with a disciplined budget and occasional forgetfulness about their allergy
    inhaler, making them a quietly ambitious yet grounded presence in their community.
background:
  cultural: Arthur was raised in Charlotte’s East Charlotte area, a predominantly African‑American community with deep ties to Southern Black traditions. He grew up attending a Baptist church, where weekly
    services, gospel music, and community outreach shaped his values of cooperation and service. Family gatherings featuring collard greens, fried chicken, and sweet potato pie reinforced a strong sense
    of culinary heritage. Experiencing both the vibrancy and the challenges of a historically underserved neighborhood, Arthur is attuned to the importance of culturally sensitive care, multigenerational
    family involvement, and community solidarity. His cultural background informs his respectful approach to clients, his appreciation for collective wellbeing, and his ambition to uplift the health of
    Black residents in Mecklenburg County.
attributes:
  skills: '["Personal hygiene assistance", "Medication reminder and management", "Patient mobility support", "Basic wound care", "Vital signs monitoring", "Care documentation", "Scheduling and time management",
    "Effective communication with clients and families", "Team collaboration", "Problem solving"]'
  hobbies: '["Reading historical biographies", "Playing chess", "Running in local parks", "Cooking soul food with modern twists", "Listening to jazz, R&B, and gospel music", "Volunteering at a community
    food pantry", "Attending church small‑group meetings", "DIY woodworking projects"]'
  career_goals: Arthur plans to earn his Certified Nursing Assistant (CNA) credential within the next year and later pursue an Associate’s degree in Nursing to become a Licensed Practical Nurse (LPN). He
    is driven to advance into a supervisory role in a community health agency, where he can design culturally responsive care programs for older adults in Charlotte’s historically Black neighborhoods. Long‑term,
    he aspires to become a registered nurse and eventually a health services manager, using his organizational strengths and community insight to reduce health disparities and mentor other young Black caregivers.
