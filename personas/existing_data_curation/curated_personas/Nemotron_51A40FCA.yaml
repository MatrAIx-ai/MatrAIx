  hobbies: '["Watercolor painting","Reading classic and contemporary literature","Attending art exhibitions","Cooking traditional Peruvian dishes","Participating in community dance groups","Gardening","Volunteering
    as a reading mentor at the local library","Traveling to explore historical sites","Collecting folk music recordings","Engaging in book clubs"]'
  career_goals: Although retired from formal employment, Noel aims to remain an active contributor to the educational and cultural life of her community. She aspires to mentor retired and aspiring educators
    through informal study circles, document and share her Peruvian heritage by curating a series of intergenerational storytelling workshops, and author a memoir that weaves together her experiences in
    education, art, and migration. Noel also hopes to collaborate with local museums and cultural centers to develop programs that celebrate Latin American art and history, thereby fostering greater cultural
    understanding in Westchester County.
