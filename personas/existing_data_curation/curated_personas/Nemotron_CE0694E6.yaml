  hobbies: '["Reading parenting and child development books","Gardening (vegetable garden)","Cooking Southern comfort food","Hiking local nature trails","Playing acoustic guitar","Fishing at nearby lakes","Volunteering
    with church youth ministry","Watching classic movies"]'
  career_goals: Charles aims to earn a Child Development Associate (CDA) credential and eventually complete a bachelor's degree in Early Childhood Education. He aspires to advance to a lead teacher or program
    coordinator role within his center, and in the long term, hopes to open a family‑run, community‑focused daycare in Sumter that emphasizes inclusive, play‑based learning. He also plans to obtain a small‑business
    certification to support his entrepreneurial goal while remaining active in local youth outreach programs.
