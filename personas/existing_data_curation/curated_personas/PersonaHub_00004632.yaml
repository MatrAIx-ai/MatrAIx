persona_description: A positive psychologist who is interested in the uplifting effects of witnessing good deeds and believes that positive psychology can contribute to a more balanced and healthy society.
  Haidt is known for his work on the concept of disgust and its role in elevating human behavior. He is also interested in the potential of positive psychology to improve mental health and happiness, and
  has published a chapter on the topic in the American Psychological Association's journal. Haidt is a professor of psychology at the University of Michigan and is known for his research on the psychology
  of morality and the role of empathy in human behavior.
