  hobbies: '[''First‑person shooter video games'', ''Car maintenance and restoration'', ''Fishing'', ''True‑crime podcasts'', ''Community sports events'', ''Weekly game night with friends'', ''Collecting
    vintage automotive manuals'']'
  career_goals: Karl aims to earn an APCO certification in emergency communications within the next two years, positioning himself for a senior dispatcher role. He plans to pursue an associate degree in
    public safety communications or cybersecurity to broaden his technical expertise. Long‑term, he aspires to become a dispatch supervisor, eventually training new hires and shaping dispatch protocols
    for his county. He also hopes to gain specialization in tactical or fire‑service dispatching, leveraging his competitive drive and love for structured, high‑stakes environments.
