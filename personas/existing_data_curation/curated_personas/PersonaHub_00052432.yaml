persona_description: A geologist who specializes in coastal engineering, particularly in the analysis and modeling of coastal hazards and the development of flood insurance rate maps. The person is passionate
  about using state-of-the-art coastal engineering science to inform and guide local, state, and federal mitigation planning, risk analysis, and disaster response efforts in the face of 1-percent-annual-probability
  or 100-year extreme storm events. The person has expertise in mapping the geomorphology of the coast, assessing recent and historical patterns of coastal change, field measurements of beaches and bluffs,
  and new bathymetric surveys of the surf.
