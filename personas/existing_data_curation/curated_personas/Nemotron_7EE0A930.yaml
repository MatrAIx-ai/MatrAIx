    novels","Baking weekend treats"]'
  career_goals: Suzana aims to earn manufacturer‑specific certifications (such as NCR/Diebold and CompTIA A+), which would qualify her for senior field‑service roles and eventually a supervisory position
    within the regional service team. She is also interested in eventually running her own small repair shop that can serve local businesses while offering flexible hours that accommodate her love of spontaneity
    and community involvement. Continuing education toward a bachelor's in information technology is a longer‑term ambition, allowing her to blend her practical repair expertise with emerging fields like
    IoT device maintenance.
