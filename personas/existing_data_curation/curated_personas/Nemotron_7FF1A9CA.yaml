  hobbies: '[''Painting'', ''Attending art fairs'', ''Community theater volunteering'', ''Swing dancing'', ''Gardening'', ''Cooking Tex‑Mex cuisine'', ''Antique hunting'', ''Reading mystery novels'', ''Book
    club participation'', ''Birdwatching'']'
  career_goals: Lila is working toward earning her GED within the next year to expand her career options. Her short‑term goal is to be promoted to shift supervisor and eventually to store manager, where
    she can mentor new cashiers and shape store merchandising strategies. Long‑term, she dreams of transitioning into a role that blends retail with the arts—perhaps managing a community art‑center gift
    shop or opening a small boutique that showcases local artists' work. She also hopes to lead community‑wide events that celebrate creativity and to become a recognized advocate for arts education in
    Red River County.
