  career_goals: Dexter aims to advance to a supervisory or management role within the casino’s security department, seeking certification as a Certified Protection Officer and possibly overseeing a team
    of surveillance analysts. He also hopes to develop a specialized expertise in video‑analytics software to become an in‑house consultant. Over the next five years, Dexter plans to secure a stable retirement
    package, perhaps transitioning to private security consulting for local businesses, and mentor younger African‑American men interested in security careers. He wants to balance increased responsibility
    with time to support his family and community.
