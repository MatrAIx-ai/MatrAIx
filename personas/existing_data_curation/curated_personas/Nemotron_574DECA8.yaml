    theater productions'']'
  career_goals: Martha aims to complete her Bachelor of Social Work and pursue a Master’s degree in Social Work to become a Licensed Clinical Social Worker (LCSW). She aspires to specialize in school‑based
    social work with a focus on trauma‑informed care, eventually taking on a role as a program director for youth services in Orange County. Long‑term, she hopes to influence policy that improves support
    for at‑risk families and to launch a community nonprofit that provides mentorship and resources for underserved children.
