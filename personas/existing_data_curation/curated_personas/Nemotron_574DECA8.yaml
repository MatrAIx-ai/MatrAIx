personas:
  professional: Martha Campbell is an aspiring school‑based social worker completing a Bachelor of Social Work who blends evidence‑based trauma‑informed care with a warm, cooperative style, leverages strong
    listening and case‑planning skills to build trust with students and families, utilizes digital case‑management platforms despite occasional lapses in documentation due to their relaxed approach to scheduling,
    and they hope to direct youth services to shape policy for at‑risk families.
  sports: Martha Campbell enjoys hiking the Hudson Valley’s rocky ridgelines with the local Hudson Valley Hikers club, practices yoga twice weekly at a community studio, follows the New York Yankees and
    New York Red Bulls avidly, and they occasionally join an intramural volleyball league on campus to stay active.
  arts: Martha Campbell expresses creativity through nature photography, acoustic guitar sessions covering Joni Mitchell and Ed Sheeran, devouring contemporary fiction by Sally Rooney and historical novels
    by Ken Follett, and they regularly perform in community theater productions at the Orange County Playhouse where the works of Lin‑Manuel Miranda especially inspire them.
  travel: Martha Campbell favors weekend getaways to the Catskills and spontaneous road trips through Vermont’s fall foliage, makes annual pilgrimages to historic sites such as Gettysburg, and they dream
    of a modest backpacking adventure across the scenic Scottish Highlands once financial constraints ease.
  culinary: Martha Campbell enjoys cooking Mediterranean dishes like chickpea falafel and lemon‑herb grilled shrimp, perfecting a seasonal root‑vegetable stew with locally sourced carrots, parsnips, and
    potatoes, and baking banana bread with walnuts while listening to acoustic guitar, and they often share meals at communal potlucks.
  core: Martha Campbell is a curious yet practical 21‑year‑old social‑work student who balances community service, artistic pursuits, and a flexible lifestyle, and they navigate occasional disorganization
    that colors both their professional ambitions and personal habits.
background:
  cultural: Martha identifies as a white American with European (Irish and English) ancestry, raised in a middle‑class family in the Hudson Valley region of New York. Growing up near West Point exposed
    her to a culture of service, discipline, and community involvement, which shaped her cooperative and considerate nature. She values civic engagement and the diverse cultural fabric of Orange County,
    incorporating inclusive practices into her social work. Her upbringing emphasized family ties, modesty, and a practical outlook, balancing curiosity about new ideas with a grounded approach to problem‑solving.
