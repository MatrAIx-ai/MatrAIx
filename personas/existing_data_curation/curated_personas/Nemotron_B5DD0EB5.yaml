  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Quilting'', ''Cooking Southern comfort food'', ''Walking along Roanoke River trail'', ''Volunteering at senior center'', ''Community theater
    participation'', ''Meditation and yoga'']'
  career_goals: Nora aims to advance to an office manager or senior administrative supervisor role within the next two years, seeking certification as a Certified Administrative Professional (CAP) to formalize
    her expertise. She plans to lead initiatives that streamline office operations, mentor younger employees, and introduce digital workflow solutions to reduce manual tasks. In the longer term, she aspires
    to transition into a part-time consulting position, helping small businesses in Halifax County adopt best-practice administrative systems while maintaining a balanced, low-stress lifestyle.
