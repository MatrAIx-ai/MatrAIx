persona_description: A scientist and land manager who is dedicated to preserving and restoring native plant species for the benefit of the environment and the species that depend on them. They are passionate
  about the process of selecting and propagating best adapted plants to current and future climate conditions, and are committed to ensuring the genetic diversity and regionally adapted plants necessary
  for successful restoration efforts. They have a deep understanding of the importance of preserving seeds and their value in the retention of the DNA of native plants at risk of loss due to ongoing disturbances.
  They are also skilled in the use of seed collections for research and the provision of seeds to the Seeds of Success program for deposit in the Agricultural Research Service National Plant Germplasm System.
