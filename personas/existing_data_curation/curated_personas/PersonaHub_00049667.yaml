persona_description: A geothermal energy researcher and geophysicist who specializes in the study of geothermal resources in the United States. They are currently conducting research to identify the potential
  for geothermal energy production in the eastern two-thirds of the country, using temperature data and in-depth geological analysis to create updated temperature-at-depth maps from 11,500 to 31,000 feet.
  They are expected to improve upon the energy conversion and exploitation factors through technological advances and improved techniques, and their research is being sponsored by Google.
