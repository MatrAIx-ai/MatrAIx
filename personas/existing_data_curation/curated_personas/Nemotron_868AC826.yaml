personas:
  professional: Im Yang, a 63-year-old veteran bus driver with three decades of route-optimization expertise, now mentors new drivers while championing culturally inclusive transit planning.
  sports: Im Yang enjoys low-impact fitness through a weekly Baltimore Walking Club, avidly watches the Ravens during football season, occasionally joins a community badminton league, and prefers casual,
    social activity over rigorous training.
  arts: Im Yang spends weekends exploring the Baltimore Museum of Art’s current Kehinde Wiley exhibition, attends live jazz sets at the Baltimore Soundstage featuring artists like Christian McBride, and
    collects small watercolors by local emerging painter Leila Davis, which inspire their own creative mindset.
  travel: Im Yang favors unplanned day trips by bus to historic Annapolis and the scenic Shenandoah Valley, dreams of a cultural immersion tour of Kyoto’s historic districts, but often caps longer journeys
    due to budgeting constraints and a preference for familiar, community-oriented experiences.
  culinary: Im Yang, a confident home cook, perfects Korean staples like bibimbap and kimchi jjigae using gochujang, sesame oil, and napa cabbage while experimenting with Mediterranean dishes such as moussaka,
    sharing elaborate potluck meals with friends at local community centers.
  core: Im Yang is a curious, sociable bus veteran who blends a love for art and Korean cooking with a laid-back, slightly disorganized lifestyle, constantly seeking ways to make everyday commutes more
    vibrant.
background:
  cultural: Im Hung was born to Korean immigrant parents and grew up in the Baltimore area, blending traditional Korean values of family harmony, respect for elders, and community cooperation with the diverse
    cultural fabric of his city. He celebrates Korean holidays such as Chuseok and Seollal while also embracing American traditions, creating a hybrid cultural identity. Fluent in both Korean and English,
    he often serves as a cultural bridge within his neighborhood, helping new immigrants navigate everyday life. His widowed status has deepened his appreciation for communal support, reinforcing his commitment
    to kindness, cooperation, and contributing to the social well‑being of those around him.
