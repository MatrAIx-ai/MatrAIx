  career_goals: At 63, Im Hung aims to transition from full‑time driving to a part‑time role where he can share his wealth of knowledge by training and mentoring new bus drivers within the transit authority.
    He also hopes to collaborate on community outreach programs that introduce seniors and recent immigrants to public transportation, making the system more welcoming. While still open to occasional driving
    shifts for flexibility, his long‑term ambition is to contribute to route planning initiatives that incorporate cultural landmarks, turning daily commutes into richer, more engaging experiences for riders.
