  career_goals: Abigail aims to advance to senior executive leadership within the next five years, targeting a VP of Operations or Chief Operations Officer position where she can drive digital transformation
    and operational excellence across the organization. She is committed to fostering a culture of data‑driven innovation while maintaining pragmatic efficiency. She also seeks to become a recognized thought
    leader in process improvement, speaking at industry conferences and publishing articles. Balancing her ambition with family, she plans to mentor emerging talent and expand her professional network throughout
    the Bay Area tech community.
