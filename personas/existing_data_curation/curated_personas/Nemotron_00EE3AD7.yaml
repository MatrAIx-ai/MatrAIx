  hobbies: '["Soccer (adult league)", "Cooking Mexican cuisine (tamales, mole, etc.)", "Classic car restoration", "Electric vehicle DIY projects", "Hiking coastal trails", "Surfing", "Volunteer automotive
    workshops for youth", "Photography (cars, beaches)"]'
  career_goals: Ambrosia aims to formalize his academic credentials by completing a bachelor's degree in Automotive Engineering or Education within the next three years, positioning himself for a department
    head role at the community college. He hopes to design and launch a cutting‑edge curriculum focused on electric and hybrid vehicle maintenance, securing industry partnerships with local auto shops and
    green‑tech firms. Additionally, he aspires to mentor more first‑generation Mexican‑American students, establishing a scholarship program and a community outreach workshop that offers free basic automotive
    training. On a personal level, he is working to improve his time‑management and organizational skills to meet accreditation deadlines consistently.
