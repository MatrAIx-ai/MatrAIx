personas:
  professional: Ambrosia Samuel is a seasoned automotive technician with ASE certifications who leverages bilingual fluency and an improvisational teaching style to develop high‑pass‑rate curricula for
    a community college while grappling with deadline pressures.
  sports: Ambrosia Samuel competes in the Vista Hills United adult soccer league on weekends, cheers for the San Diego Wave FC and Los Angeles FC, hikes the Torrey Pines State Reserve trails, and catches
    early‑morning surf sessions at La Jolla Shores whenever the swell permits.
  arts: Ambrosia Samuel captures sunrise over the Pacific and vintage automobile details with a Canon EOS R, drawing inspiration from Henri Cartier‑Bresson’s street photography and the bluesy storytelling
    of Johnny Cash, while curating a modest collection of classic car posters and attending occasional live performances at the Balboa Theatre.
  travel: Ambrosia Samuel enjoys weekend road trips along the Pacific Coast Highway, has visited the wine country of Napa Valley, plans a future cultural immersion trip to Barcelona, and frequently escapes
    to the nearby seaside towns of Carlsbad and La Jolla for spontaneous surf‑and‑sunset getaways.
  culinary: Ambrosia Samuel cooks traditional mole with dried mulato chiles, toasted seeds, and a hint of Mexican chocolate alongside hand‑made pork tamales wrapped in corn husks, demonstrating a competent
    yet experimental kitchen style that balances family recipes with occasional fusion twists such as surf‑inspired fish tacos.
  core: Ambrosia Samuel is a competitive automotive educator who blends structured curriculum design with spontaneous car‑restoration projects, lives on the edge of deadline chaos, and fuels life with soccer,
    surf, and simmering mole.
background:
  cultural: Ambrosia grew up in a bicultural Mexican‑American household in Southern California. His parents emigrated from Jalisco, bringing with them strong family ties, a deep respect for community, and
    a love of Mexican cuisine. Raised speaking both Spanish and English, he celebrates traditional holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often hosting gatherings
    that blend Mexican customs with Californian influences. His identity as a Mexican-American informs his teaching philosophy, emphasizing perseverance, respect for elders, and the importance of giving
    back to the community. He stays connected to local cultural organizations, participates in neighborhood festivals, and mentors students who share his heritage, helping them navigate both academic and
    cultural pathways.
attributes:
  skills: '["Automotive Technology (ASE Certified)", "Bilingual Instruction (Spanish/English)", "Curriculum Development for CTE Programs", "Hands‑on Workshop Facilitation", "Instructional Technology (Moodle,
