  career_goals: Laura dreams of becoming someone who helps solve puzzles and cares for living things. She often says she wants to be a scientist who discovers new things, a veterinarian who cares for animals,
    or a teacher who shares exciting ideas. She envisions a future where she can combine her love of learning with practical work that makes a difference, such as creating inventions that help people or
    protecting the environment.
