personas:
  professional: Alicia Kosecki, an 18‑year‑old aspiring freelance visual artist, blends digital illustration, wildlife photography, and poetic prose into a self‑directed practice that thrives on solitary
    studio sessions in the Wyoming plains, balancing a relaxed attitude toward deadlines with a charmingly chaotic workflow as they build an online portfolio and dream of a future home studio.
  sports: Alicia Kosecki enjoys early‑morning hikes and occasional trail‑run sessions on the quiet paths of the Bighorn Mountains that double as photographic expeditions, while rooting for the Wyoming Cowboys
    football team each fall and the Denver Broncos during the NFL season, preferring natural, low‑impact fitness over structured gym workouts.
  arts: Alicia Kosecki’s artistic soul resonates with the stark black‑and‑white landscapes of Ansel Adams, the bold prairie hues of Georgia O’Keeffe, and the lyrical verses of poet Mary Oliver, while ambient
    soundscapes from Brian Eno and the soothing cello of Yo‑Yo Ma accompany their sketching, photography, and poetry sessions.
  travel: Alicia Kosecki favors low‑key, nature‑focused getaways, often planning spontaneous weekend trips to nearby places like Yellowstone’s sunrise over the Lamar Valley or the Bighorn Mountains, while
    day‑dreaming about future pilgrimages to Iceland’s volcanic coasts and Kyoto’s tranquil zen gardens, all arranged on a modest budget with a well‑worn backpack.
  culinary: Alicia Kosecki enjoys farm‑to‑table cooking that showcases herbs from their garden—such as rosemary, thyme, and sage—into simple yet flavorful dishes like roasted root vegetable medleys, wild
    mushroom risotto, and honey‑glazed carrots, while they occasionally treat themselves to a steaming bowl of pho with fresh basil and lime.
  core: Alicia Kosecki is a quietly curious 18‑year‑old who channels solitary wanderings into art and nature, juggling a love for sunrise photography with occasional procrastination and a habit of losing
    a brush in the garden.
background:
  cultural: Alicia comes from a multigenerational white family that has lived in eastern Wyoming for several generations. Her surname, Kosecki, reflects Polish ancestry; family stories recall her great‑grandparents
    emigrating from Poland in the early 20th century and settling on a small ranch near Torrington. While she was raised with a modest appreciation for Polish holiday foods and a few phrases in Polish,
    her everyday cultural frame is shaped by the rugged, self‑reliant ethos of the American West. Community gatherings such as county fairs, church potlucks, and the local library’s art nights are familiar
    touchstones. This blend of Polish heritage and rural Wyoming life nurtures her respect for tradition, a deep love of open landscapes, and a quiet, cooperative spirit.
