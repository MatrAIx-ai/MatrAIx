  career_goals: Alicia’s career aspirations revolve around a flexible, self‑directed creative practice that allows her to work from the solitude of her hometown. She aims to develop a freelance portfolio
    of illustrations, prints, and written pieces that can be sold online or commissioned by clients, ultimately supporting a modest independent lifestyle. In the medium term, she hopes to enroll in a BFA
    program or a specialized workshop to deepen her technique, while also contributing to the local arts scene by organizing quiet, low‑pressure art workshops at the Torrington public library. Long‑term,
    she envisions opening a small home studio where she can create and curate her own exhibits, perhaps integrating her love for nature photography and regional folklore.
