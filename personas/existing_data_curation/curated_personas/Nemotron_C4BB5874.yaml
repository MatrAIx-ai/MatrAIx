  career_goals: Harold aims to transition into an engineering leadership role where he can blend his technical depth with his collaborative, people‑first approach. Over the next five years, he plans to
    become a senior engineering manager or director, focusing on building high‑performing, psychologically safe teams that deliver resilient, user‑centric products. He also aspires to champion sustainable
    development practices, such as reducing technical debt and improving system reliability, while continuing to explore emerging technologies like serverless architectures and responsible AI. Balancing
    ambition with his well‑being, Harold seeks a role that allows him to mentor junior engineers, influence product strategy, and maintain a healthy work–life integration.
