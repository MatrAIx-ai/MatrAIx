  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading contemporary literature'', ''Attending art workshops'', ''Yoga and meditation'', ''Exploring culinary diversity'', ''Podcast listening
    on psychology and creativity'', ''Volunteering at community art projects'', ''Urban photography'', ''Balcony gardening'']'
  career_goals: Cynthia aims to advance from her current childcare worker role to a lead teacher position while pursuing a Master’s degree in Early Childhood Education. She is passionate about developing
    an arts‑focused enrichment program for underserved neighborhoods in Brooklyn and hopes to become a program coordinator for a nonprofit that blends creative arts with early learning. Ultimately, she
    envisions opening her own boutique daycare that emphasizes artistic expression, cultural inclusivity, and evidence‑based pedagogy, allowing her to shape curriculum and mentor new educators.
