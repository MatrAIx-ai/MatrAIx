  career_goals: Lee aims to complement his hands‑on experience with formal education in hospitality management, planning to enroll in a community‑college program within the next two years. He dreams of
    moving into regional restaurant management, eventually opening a family‑style eatery that blends his Italian‑American roots with contemporary casual dining. A key ambition is to achieve a stable, predictable
    work schedule that reduces his stress while allowing him to mentor younger staff and maintain a supportive, harmonious workplace.
