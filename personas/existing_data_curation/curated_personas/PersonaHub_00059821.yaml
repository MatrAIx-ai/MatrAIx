persona_description: A chemist and materials scientist who has made significant contributions to the field of transparent, non-volatile, heat- and radiation-resistant memory chips, specifically those created
  from silicon oxide sandwiched between electrodes of graphene. His research has led to the development of paper-thin, see-through memories that have the potential to be manufactured with extraordinarily
  large capacities at a reasonable price, and have been sent to the International Space Station for evaluation. He is currently working with several companies that are interested in either getting their
  chips to do this kind of switching or in the possibility of making radiation-hard devices out of this.
