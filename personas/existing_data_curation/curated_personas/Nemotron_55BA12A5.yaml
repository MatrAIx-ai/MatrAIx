  career_goals: Roger aims to re‑enter the workforce in a part‑time consulting capacity that leverages his business background while allowing a flexible schedule. He is exploring opportunities to offer
    small‑business advisory services to local startups or launch an online store selling hand‑crafted garden tools. He also considers earning a certification in project management (PMP) to formalize his
    skills. His long‑term ambition is to achieve financial stability that supports a low‑stress lifestyle, with the ability to spend more time on personal projects and community volunteering.
