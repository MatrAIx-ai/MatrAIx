  hobbies: '[''Mindfulness meditation'', ''Yoga'', ''Journaling'', ''Cooking Vietnamese cuisine'', ''K‑pop dance practice'', ''Reading mystery and contemporary fiction'', ''Volunteering at Vietnamese cultural
    center'']'
  career_goals: Xuanhuong aims to progress from an entry‑level administrative role to an office manager or executive assistant position within the next three to five years. She plans to earn a Certified
    Administrative Professional (CAP) credential and enroll in an associate’s degree program in business administration. Long term, she wishes to lead a team that supports Vietnamese‑American entrepreneurs,
    combining her competitive drive with a desire to give back to her community. Secure, structured environments appeal to her pragmatic side, while her curiosity pushes her to master new office technologies
    and project‑management software.
