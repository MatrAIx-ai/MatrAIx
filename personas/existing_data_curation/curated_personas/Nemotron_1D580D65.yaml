  career_goals: May dreams of turning her love for imagination and technology into a future career. She wants to become a concept artist or animator who creates fantastical worlds for video games or movies,
    and she also envisions designing interactive experiences that blend art and code. Inspired by the tech environment of Silicon Valley, she hopes to study computer science and visual arts in high school
    and later at a university known for interdisciplinary programs. Ultimately, she aims to launch her own creative studio where she can lead a team in building immersive storytelling projects, and she
    is determined to win competitions that showcase her innovative ideas.
