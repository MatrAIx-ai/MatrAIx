personas:
  professional: May Wu, a budding robotics enthusiast and digital manga illustrator, channels her vivid imagination and competitive spark into building inventive LEGO robots and crafting eye‑catching digital
    characters, often letting her relaxed attitude toward deadlines turn prototype testing into spontaneous, delightful experiments that keep her teachers both amazed and exasperated.
  sports: May Wu cheers for the Toronto Raptors during basketball season and the Toronto Maple Leafs in hockey, while playing forward for the Riverdale Strikers youth soccer club and attending a local gymnastics
    class, approaching fitness with high‑energy bursts that match her competitive streak but often slipping when her disorganized schedule causes missed practices.
  arts: May Wu spends evenings drawing manga‑style characters inspired by Makoto Shinkai and Studio Ghibli, dancing to BTS and Blackpink while remixing their beats in Scratch, and performing in the school
    drama club’s renditions of beloved anime scenes, letting her boundless imagination shape both her artwork and social life.
  travel: May Wu loves spontaneous family trips, recalling a recent adventure exploring Tokyo’s Akihabara and a magical weekend at Disney World, while dreaming of future visits to Singapore’s futuristic
    gardens and the Kennedy Space Center’s Mars simulation camp, though school projects and a limited allowance keep her travel plans modest and carefully budgeted.
  culinary: May Wu is an adventurous eater who delights in spicy ramen, cheesy pepperoni pizza, and homemade pork dumplings seasoned with scallions and soy sauce, often helping roll dough and stir sauces
    for festive New Year feasts while experimenting with digital recipe apps, though they frequently forget to clean up the kitchen afterwards.
  core: May Wu is a hyper‑creative, competitive ten‑year‑old who turns every spare moment into a manga sketch or LEGO robot, yet habitually misplaces her sketchbooks and worries about missing the next big
    K‑pop dance challenge.
background:
  cultural: May is a second‑generation Chinese‑American. Her family maintains many East Asian traditions, such as speaking Mandarin at home, celebrating Lunar New Year with red envelopes and homemade dumplings,
    and visiting the local temple during festivals. Growing up in Sunnyvale’s multicultural Silicon Valley, she is exposed to a blend of high‑tech innovation and diverse cultures, which fuels her curiosity
    about both art and science. Her parents emphasize the value of education while encouraging creative exploration, allowing her to attend weekend art classes and after‑school coding clubs. This bicultural
    environment shapes her perspective, giving her a strong sense of heritage alongside an openness to new ideas.
