personas:
  professional: Murrell Ragle is a teenage skate‑park regular who channels their curiosity and sociable energy into leading informal brainstorming sessions for community art fairs, using free design tools
    to sketch street‑art‑inspired graphics and prototype DIY skateboard decks as they prepare for a graphic‑design program.
  sports: Murrell Ragle spends weekends mastering new skate tricks at the local skate park, shooting hoops in pickup games with the Mentor High School Knights, cheering for the Cleveland Cavaliers, and
    they occasionally join the community’s weekend BMX club.
  arts: Murrell Ragle blends indie rock playlists—featuring The Strokes, local band The Riverwalks, and alternative hip‑hop from Kendrick Lamar—with a passion for street‑art legends like Banksy, creating
    vivid mural sketches, photographing lakefront sunsets, and they play acoustic guitar at neighborhood open‑mic nights.
  travel: Murrell Ragle explores the Great Lakes shoreline with a camera, takes weekend road trips to Cleveland’s art districts and Detroit’s music scene, dreams of a solo backpack adventure through Portland’s
    famed mural alleys and coffee‑shop culture, and they plan to document each journey with short video edits for social media.
  culinary: Murrell Ragle’s palate is an experimental playground, swapping classic pizza for ramen‑topped tacos, savoring truffle‑fries with sriracha mayo at food trucks, attempting to recreate their favorite
    hazelnut‑chocolate churros at home despite a knack for burning the edges, and they eagerly scout new eateries for bold flavor combos.
  core: Murrell Ragle is a 17‑year‑old skate‑boarding creative who thrives on spontaneous community projects, revels in eclectic music, balances a love for impulse food splurges with occasional disorganization,
    and they constantly chase fresh ideas.
background:
  cultural: Murrell grew up in Mentor, a suburban community in Lake County, Ohio, steeped in Midwestern values of friendliness, hard work, and community involvement. His family background is primarily of
    European descent, with Irish and German ancestry, and he was raised in a modest, middle‑class household that emphasized independence and practical skills. The local culture—rooted in the legacy of the
    Great Lakes manufacturing belt, the love of Cleveland sports teams, and a small‑town emphasis on seasonal lake activities—has shaped his outlook. Access to the Mentor Public Library, community art center,
    and the nearby shoreline gave him early exposure to art, music, and outdoor recreation. While identifying as white American, Murrell’s cultural identity is informed by the blend of traditional Midwestern
    customs, a modest religious upbringing (mainly Protestant), and the diverse cultural offerings of the Greater Cleveland area.
