  hobbies: '[''Skateboarding'', ''Street art and graffiti sketching'', ''Photography'', ''Video editing and social media content creation'', ''Playing guitar'', ''Listening to indie and alternative music'',
    ''Pickup basketball'', ''Participating in community art fairs'', ''Volunteering with youth art programs'', ''Exploring Lake Erie shoreline and local eateries'', ''DIY projects (building ramps, customizing
    skateboards)'']'
  career_goals: Murrell aspires to turn his love of art and community into a flexible, creative career. He plans to enroll in a community‑college program in graphic design or multimedia production after
    finishing high school, hoping to build a portfolio that blends visual art, street‑art aesthetics, and digital media. In the longer term he envisions working as an independent multimedia artist or content
    creator, possibly launching a small business that designs custom apparel, skateboard graphics, and promotes youth art workshops in the Mentor area. He values a career that lets him stay socially engaged,
    explore new ideas, and maintain a flexible schedule.
