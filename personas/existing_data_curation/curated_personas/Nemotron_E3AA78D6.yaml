  hobbies: '[''Soccer'', ''Folklorico dance'', ''Listening to regional Mexican and reggaeton music'', ''Online multiplayer gaming (FIFA, Fortnite)'', ''Volunteering at community center events'', ''Cooking
    traditional Mexican dishes'', ''Social media content creation (Instagram, TikTok)'', ''Attending local cultural festivals'']'
  career_goals: Fernando aims to earn his GED within the next year and enroll in a community‑college program for an associate degree in business administration. He seeks an entry‑level position in logistics,
    customer service, or retail that offers a clear, structured career path and regular interaction with people. In the medium term, he aspires to become a shift supervisor or a community‑outreach coordinator,
    leveraging his sociability and organizational skills to foster harmony in the workplace and local neighborhoods. He also hopes to obtain a forklift certification to broaden his employment options in
    the supply‑chain sector.
