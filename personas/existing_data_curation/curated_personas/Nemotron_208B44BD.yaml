    and practical life‑skill teaching"]'
  hobbies: '["Gardening (seasonal vegetable garden)", "Woodworking", "Traditional Puerto Rican cooking", "Playing bongos (percussion)", "Reading historical fiction", "Watching classic movies", "Crossword
    puzzles", "Walking in local parks", "Volunteering at the church", "Attending Puerto Rican cultural festivals"]'
  career_goals: 'Although retired, Andy’s ambition centers on preserving his legacy and reinforcing family stability. He aims to compile a family cookbook that documents cherished Puerto Rican recipes and
    the stories behind them, ensuring the culinary heritage passes to future generations. He also aspires to continue mentoring his grandchildren and local youth, teaching them practical skills like basic
    home repairs, budgeting, and gardening. Volunteering remains a priority: Andy plans to lead a senior‑center workshop focused on DIY home maintenance and organized cultural events that celebrate Puerto
    Rican traditions within the Dumont community. Maintaining his health and independence so he can remain an active, reliable presence for his family is a core personal goal.'
