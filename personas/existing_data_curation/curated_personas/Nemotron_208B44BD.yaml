personas:
  professional: Andy Calero, a 76‑year‑old retired handyman and community mentor, leverages decades of hands‑on home‑maintenance expertise and meticulous budgeting skills to lead senior‑center workshops
    and organize local cultural events celebrating island traditions, applying a methodical, competitive edge to ensure every project is completed on schedule and within budget, and they take pride in ticking
    every item off their detailed checklists.
  sports: Andy Calero, a 76‑year‑old retiree, enjoys daily walks in local parks and participates in the Dumont senior walking club, avidly follows the New York Yankees and New Jersey Devils, and occasionally
    joins a community bocce league, yet they tend to critique younger teammates' strategies.
  arts: Andy Calero, a 76‑year‑old retiree, immerses himself in classic cinema by watching films by Frank Capra and Alfred Hitchcock, collects vinyl of Celia Cruz and Tito Puente for the vibrant bomba and
    plena rhythms that echo his island roots, reads historical fiction by Ken Follett, and they occasionally hum along with the bongos during family gatherings, though they sometimes argue about modern
    reinterpretations of classics.
  travel: Andy Calero, a 76‑year‑old retiree, favors purposeful travel, planning trips that combine family visits and cultural exploration such as a recent pilgrimage to Old San Juan, a weekend in Savannah,
    Georgia for its historic districts, and a planned cruise to the Caribbean that aligns with their budget constraints and desire to showcase the island's cuisine to relatives.
  culinary: Andy Calero, a 76‑year‑old retiree, revels in cooking traditional island dishes like arroz con gandules, pernil, and pasteles, meticulously measuring sofrito, adobo, and plantain leaves, while
    experimenting with occasional side dishes like seasoned quinoa salads, and they boast a knack for improvising dessert sauces using rum and cinnamon.
  core: Andy Calero, a 76‑year‑old retiree, blends disciplined organization with creative hands‑on hobbies, channeling a competitive spirit into gardening, woodworking, and cooking while safeguarding family
    heritage and occasionally indulging in budget‑busting garden tool splurges.
background:
  cultural: Andy was born to Puerto Rican parents and grew up immersed in the island’s rich traditions, from vibrant music and dance to the flavors of its cuisine. After moving to New Jersey, he retained
    strong ties to his heritage, speaking Spanish fluently at home while mastering English for daily life. Family and community are central to his identity; he celebrates holidays like Three Kings Day and
    San Juan’s patron saint festivals with elaborate meals and gatherings. His Catholic faith, nurtured by the local parish, informs his values of responsibility and service. Andy actively participates
    in the nearby Puerto Rican cultural association, helping organize events that showcase island art, music, and food. He cherishes passing on cultural knowledge—especially culinary techniques and stories
    of migration—to his children and grandchildren, ensuring the Puerto Rican legacy thrives within the diaspora.
attributes:
  skills: '["Home maintenance and repairs (carpentry, basic plumbing, electrical troubleshooting)", "Mechanical aptitude (appliance repair, minor car maintenance)", "Traditional Puerto Rican cooking", "Budgeting
