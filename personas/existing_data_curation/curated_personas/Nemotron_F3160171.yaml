personas:
  professional: Javier Soto, an aspiring systems administrator who currently works as a junior IT support specialist, leverages curiosity about emerging tech and a practical troubleshooting mindset to deliver
    rapid, compassionate solutions while thriving in a flexible, unstructured workflow.
  sports: Javier Soto, a weekend hiker and casual soccer enthusiast, joins a small local trail‑running club that meets at the nearby forest preserves and roots for the Chicago Bears, valuing low‑key physical
    activity over spectator sports.
  arts: Javier Soto, a devoted board‑game collector and sci‑fi aficionado, regularly dives into titles like Terraforming Mars while streaming Latin salsa, bomba, and reggaeton tracks from artists such as
    Celia Cruz and Bad Bunny, allowing music to punctuate his creative problem‑solving sessions.
  travel: Javier Soto, a budget‑conscious explorer, prefers short trips to regional state parks and occasionally plans tech‑focused weekend visits to Seattle’s museum of pop culture, balancing a love for
    nature with a curiosity about innovation hubs while still saving for a future semester abroad in Tokyo.
  culinary: Javier Soto, an experimental home‑cooker, often whips up quick ramen bowls, pepperoni pizza, and homemade arepas seasoned with queso fresco, using simple ingredients that complement his Latin‑infused
    playlists and late‑night gaming marathons.
  core: Javier Soto is a curious yet laid‑back tech whiz who blends compassionate problem‑solving with a penchant for gadget‑driven hobbies, budget‑tight finances, sporadic self‑care, and a love for niche
    music and low‑key adventures.
background:
  cultural: Javier was raised in a bilingual Puerto Rican household, with parents who immigrated to the United States in the early 2000s. At home, Spanish was the primary language, and family gatherings
    centered around traditional dishes such as arroz con gandules, pasteles, and lechón, accompanied by salsa and bomba music. The family maintained strong ties to the island’s cultural calendar—celebrating
    events like Noche Buena, Día de los Reyes, and the annual San Juan festivities—often through community gatherings at Chicago’s Casa Borinquen cultural center. Growing up in Westmont, a suburban enclave
    of DuPage County, he experienced a blend of Midwestern values and vibrant Puerto Rican diaspora traditions. This dual environment fostered a deep appreciation for community solidarity, respect for elders,
    and a collaborative spirit that permeates his personal and professional life. His bilingual fluency allows him to bridge communication gaps within the local Latino community, and his cultural heritage
    informs his commitment to giving back, especially through tech‑focused outreach aimed at improving digital inclusion for fellow Puerto Ricans in the Chicago area.
attributes:
  skills: '["Hardware troubleshooting", "Software installation and configuration", "Operating system administration (Windows, macOS, Linux)", "Remote desktop support", "Ticketing system management (ServiceNow)",
    "Basic networking (TCP/IP, Wi‑Fi, firewall basics)", "Scripting in Python and PowerShell", "SQL query writing", "Technical documentation and knowledge‑base creation", "Bilingual customer support (English/Spanish)",
    "Team collaboration tools (Slack, Microsoft Teams)", "Problem‑solving under pressure", "CompTIA A+ and Network+ preparation"]'
  hobbies: '["Arduino and Raspberry Pi tinkering", "Custom PC building", "Home‑automation scripting", "Strategy and puzzle video gaming", "Reading science‑fiction (English and Spanish)", "Listening to Latin
    music (salsa, bomba, reggaeton)", "Board‑game nights with close friends", "Hiking in local forest preserves", "Mentoring youth in basic computing", "Providing tech assistance to seniors"]'
  career_goals: Javier aims to convert his early technical experience into a progressive IT career that balances growth with flexibility. In the next 1–2 years he plans to earn CompTIA A+ and Network+ certifications,
    followed by Security+, positioning himself for a Systems Administrator role. He envisions moving into cloud infrastructure—particularly AWS or Azure—by pursuing a cloud associate certification and gaining
    hands‑on experience with virtualization and containerization. Long‑term, he hopes to lead a small, tight‑knit support team where he can mentor junior staff and design automated support tools that improve
    service efficiency. His compassionate drive motivates him to volunteer his expertise for local non‑profits serving the Puerto Rican community in Chicago, eventually establishing a community tech‑help
    desk that provides affordable troubleshooting and digital literacy workshops. Throughout his career, he seeks positions that allow remote or hybrid work, giving him the flexibility he values while maintaining
    a healthy work‑life balance.
