  career_goals: Daniel aims to move into a senior operations manager role within the next three years, where he can champion lean office initiatives and mentor a larger cohort of administrative professionals.
    He plans to earn a project‑management certification (PMP) and complete an associate degree in Business Administration at a local community college. Additionally, he envisions launching a partnership
    between his organization and Nashville’s community arts centers to provide employee volunteer opportunities and public cultural programming, eventually transitioning to a part‑time role that blends
    office leadership with art‑event coordination as he nears retirement.
