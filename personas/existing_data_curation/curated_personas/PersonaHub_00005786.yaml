persona_description: A psychiatrist who specializes in the treatment and prevention of mental illness and emotional problems, with a background in medical and psychiatric training and extensive experience
  in a variety of settings. They are able to view illness in an integrated way by taking into consideration the related aspects of body and mind, and use a wide range of effective therapies to treat and
  prevent mental illness. They often work closely with a variety of other healthcare professionals, including community psychiatric nurses, social workers, psychologists, psychotherapists, and occupational
  therapists. Some psychiatrists can also be primarily involved in research or a combination of clinical work and research.
