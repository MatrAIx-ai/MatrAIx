    supervision & training'', ''Client communication & contract negotiation'', ''Budgeting & resource allocation'', ''Sustainable practices (rain gardens, xeriscaping, composting)'', ''Use of CAD and landscape
    design software (SketchUp, AutoCAD, Landscape Designer)'', ''OSHA safety compliance and risk assessment'', ''Community outreach and volunteer coordination'', ''Artistic rendering for proposals (watercolor
    & hand‑drawing)'']'
  hobbies: '[''Watercolor painting of gardens and architecture'', ''Nature photography (macro and landscape)'', ''Visits to botanical gardens and arboretums'', ''Reading modern art theory and speculative
    fiction'', ''Weekly bridge club'', ''Volunteer park stewardship'', ''Farm‑to‑table cooking with home‑grown herbs'', ''Woodworking garden furniture'', ''Local history walking tours'', ''Attending community
    theater productions'', ''Cultivating specialty plants (succulents, carnivorous plants)'', ''Calligraphy and sketchbook journaling'']'
  career_goals: Arnold aims to transition from day‑to‑day groundskeeping to a mentorship‑focused role, establishing a boutique landscape‑design studio that specializes in sustainable, art‑driven gardens
    for private residences and community spaces in Montgomery County. He hopes to develop a formal apprenticeship program for younger workers, publish a guide that blends horticultural practice with creative
    design principles, and win local awards for innovative green installations that integrate living walls, rain gardens, and interactive public art. Over the next five years, he plans to collaborate with
    local arts organizations and municipal parks to create seasonal installations that reflect both ecological stewardship and his love for novelty.
