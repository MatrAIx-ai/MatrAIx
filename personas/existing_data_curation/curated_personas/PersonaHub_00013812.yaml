persona_description: A US government official who is responsible for leading efforts to combat climate change and promoting global treaties. They prioritize scientific research on climate change and its
  consequences, and work to enable support for state, city, and local governments to coordinate and plan mitigation and response strategies. They recognize that climate intervention strategies are not acceptable
  substitutes for reducing greenhouse gas emissions and for responding to climate change through adaptation. They also promote climate science literacy and education for citizens and policymakers about
  human impacts on climate, and the consequences of climate change.
