personas:
  professional: Brant Hanson, a seasoned retail salesperson, leverages their methodical, routine‑driven approach to master POS systems, inventory control, and staff scheduling, aiming to step into a store
    manager role where they can codify loss‑prevention protocols and mentor younger employees.
  sports: Brant Hanson, a regular bowler in the Omaha Community League, also follows the Omaha Storm Chasers baseball team and the Nebraska Cornhuskers football squad, supplementing their weekly 2‑mile
    river trail walk with occasional gym sessions to maintain joint health, and they enjoy the social camaraderie of the bowling alley.
  arts: Brant Hanson, an avid fan of classic American cinema, regularly re‑watches titles such as Casablanca, The Magnificent Seven, and Singin’ in the Rain, and enjoys historical nonfiction by authors
    like David McCullough, while they occasionally attend local community theater productions of classic plays.
  travel: Brant Hanson prefers low‑key road trips to nearby destinations like the Badlands National Park and the historic town of Dead Wood, often planning itineraries months in advance, balancing a modest
    travel budget with a desire to explore American history and natural scenery, and they relish the calm of driving with familiar playlists.
  culinary: Brant Hanson loves preparing family‑style pot roast with root vegetables from their garden, the occasional corn casserole seasoned with fresh rosemary, and a traditional apple crisp, handling
    recipes with a pragmatic, step‑by‑step approach that relies on fresh, locally sourced ingredients, and they often experiment with new spice blends only after thorough research.
  core: Brant Hanson, a routine‑obsessed, detail‑oriented 55‑year‑old, channels their worry‑driven meticulousness into early river walks, disciplined budgeting, and careful store management, yet they occasionally
    let a missed physiotherapy session slide when stress peaks.
background:
  cultural: Brant comes from a multi‑generational Midwestern family of German‑Scandinavian descent that settled in Nebraska's farmland in the early 1900s. Raised in a Lutheran household in a suburban neighborhood
    of Omaha, he embodied the region's emphasis on hard work, self‑reliance, community service, and modest, practical values. This cultural upbringing reinforces his preference for routine, reliability,
    and harmony.
attributes:
  skills: '[''Customer Service'', ''Point of Sale (POS) System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Cash Handling'', ''Staff Scheduling'', ''Loss Prevention'', ''Conflict Resolution'',
    ''Retail Reporting'', ''Employee Training'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Walking along the Missouri River trail'', ''Reading historical nonfiction'', ''Bowling league'', ''Church participation'', ''Food bank volunteering'', ''Classic
    movie watching'', ''Cooking family recipes'']'
  career_goals: Brant aims to advance to a store manager position where he can apply his methodical approach to streamline operations, improve loss‑prevention measures, and mentor younger staff. Over the
    next few years he plans to create a mentorship program for new hires, achieve a stable work schedule that reduces stress, and secure enough savings to retire comfortably while still contributing to
    his community through part‑time consulting for small local retailers.
