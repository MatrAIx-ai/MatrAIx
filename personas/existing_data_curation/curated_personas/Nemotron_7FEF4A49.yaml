  career_goals: John aims to attend a four‑year college where he can combine his practical curiosity with a desire to help people. He is considering majors such as industrial engineering with a focus on
    human factors, or psychology with an emphasis on community mental‑health outreach. In the short term, he plans to earn a certification in electrical or mechatronics technology to secure a stable, hands‑on
    job in the region’s manufacturing sector. Long‑term, he hopes to work in a role that blends technical problem‑solving with direct community impact, such as a technical support specialist for a local
    firm or a mental‑health outreach coordinator that leverages his empathy and leadership skills.
