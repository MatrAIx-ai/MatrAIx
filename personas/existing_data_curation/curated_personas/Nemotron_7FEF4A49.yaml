personas:
  professional: John James, an aspiring technical support specialist who blends his varsity basketball teamwork and event‑planning experience with hands‑on Arduino projects and social‑media content creation,
    channels their curiosity and practicality into solving everyday tech problems for local manufacturers while mentoring peers with empathy.
  sports: John James, a varsity basketball point guard for the Lorain Titans, they combine competitive drive with relaxed outdoor activity, spending weekends skating with the EriSkate Crew at the local
    park, hiking the Lake Erie shoreline, and proudly rooting for the Cleveland Cavaliers and the Cleveland Guardians.
  arts: John James channels his creative energy by playing guitar in a garage band that covers Foo Fighters and Jimi Hendrix, they also volunteer as a set‑builder for community theater productions, and
    curate the school's Instagram feed with graphic designs inspired by artists like Banksy and the visual style of Wes Anderson.
  travel: John James prefers half‑day road trips that balance adventure and budget, they have explored Cedar Point amusement park, taken a weekend bike ride to the historic town of Amherst, and hiked the
    dunes at Cedar Point National Lakeshore, while dreaming of a future backpacking trek through the Canadian Rockies and a cultural immersion trip to Tokyo.
  culinary: John James enjoys a mix of comfort and experimental foods, often ordering buffalo wings with a honey‑sriracha glaze, cooking avocado toast with poached eggs and smoked paprika at home, and savoring
    fish tacos with fresh cilantro and lime, while they consider their cooking skill solid enough to whip up quick meals but still leave room for occasional burnt toast mishaps.
  core: John James is a high‑energy teen who fuses technical tinkering, team sports, and artistic expression, yet they wrestle with intense anxiety that fuels both their empathy and occasional impulsive
    spending.
background:
  cultural: John grew up in Lorain, Ohio, a Midwestern lake‑front community with a strong working‑class heritage tied to manufacturing and the Great Lakes. His family background reflects typical Northern
    European ancestry—German and Irish roots—common among many white residents of the area. Local culture emphasizes community solidarity, straightforward communication, and a blend of practical work ethic
    with a love for outdoor recreation on the lake and civic events like the Lorain County Fair. These regional values shape John’s balanced view of curiosity and practicality, his willingness to help neighbors,
    and his comfort in both structured and flexible social settings.
