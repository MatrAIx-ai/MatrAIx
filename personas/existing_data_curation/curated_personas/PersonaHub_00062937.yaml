persona_description: A mental health practitioner who specializes in the evaluation and treatment of children with severe mental health disorders, particularly those referred to the Centers for Disease
  Control and Prevention (CDC) for evaluation and treatment. This practitioner has experience working with a diverse range of clients, including those with a history of hospitalization and those who have
  been referred for high-level interventions such as out-of-home placements. This practitioner is also familiar with the Nurtured Heart Approach, which has been used to help transition children from high-level
  interventions to normal family life and regular levels of treatment. Additionally, this practitioner is familiar with the Connor's Parent Rating Scale and has experience working with a variety of families,
  including those without insurance benefits.
