    "Team training and mentorship", "Customer communication and negotiation", "Problem solving in manufacturing processes", "Adoption of emerging welding technologies (e.g., laser welding, additive manufacturing)"]'
  hobbies: '["Karaoke singing", "Cooking and sharing Chinese/Taiwanese dishes", "Hiking in the Angeles National Forest", "Tai Chi practice", "DIY electronics and custom keyboard building", "Photography
    of urban and industrial scenes", "Participating in local Asian cultural festivals", "Volunteering as a welding mentor for youth programs", "Playing Mahjong with friends", "Attending live music concerts",
    "3D printing and prototyping"]'
  career_goals: Chao aims to advance from skilled operator to recognized leader in his field. In the next five years he plans to earn his American Welding Society Certified Welding Inspector (CWI) credential
    and take on a supervisory role overseeing a small team of welders. He dreams of eventually opening his own boutique metal‑fabrication shop that specializes in custom artistic pieces and precision components
    for electronics manufacturers. Parallel to his professional growth, Chao wants to become a regular speaker at trade schools and community workshops, using his sociable personality to inspire the next
    generation of tradespeople and promote the value of skilled labor within the broader East‑Asian American community.
