personas:
  professional: Chao Chen, a 42‑year‑old welding specialist with advanced expertise in MIG, TIG, brazing, and precision soldering, blends meticulous blueprint analysis with charismatic mentorship, steering
    their team toward strict OSHA compliance while championing innovative metal‑fabrication projects and staying curious about emerging welding technologies.
  sports: Chao Chen, an avid hiker, frequently explores the Angeles National Forest trails, follows the Los Angeles Lakers and Dodgers, practices Tai Chi in Griffith Park, and joins a weekend Mahjong club
    that doubles as a social fitness meetup, while they occasionally sign up for charity 5K runs.
  arts: Chao Chen channels their sociable energy into karaoke nights where they belt out classic rock anthems from The Rolling Stones and Bruce Springsteen, capture industrial landscapes through black‑and‑white
    photography, and curate a home collection with prints from modernist sculptor Isamu Noguchi, while also enjoying live concerts ranging from indie folk to metal.
  travel: Chao Chen prefers a blend of spontaneous road trips to nearby spots like Yosemite and the Grand Canyon and carefully planned overseas adventures to Kyoto and Taiwan, balancing a love of hiking
    with curiosity for cultural festivals, and budgeting their travel fund to align with the goal of opening a metal‑fabrication studio.
  culinary: Chao Chen, a confident home chef, prepares family‑style dishes such as braised pork belly, xiao long bao, and spicy beef noodle soup using staples like soy sauce, five‑spice powder, and fresh
    ginger, often hosting dinner parties where guests sample inventive fusion plates while they experiment with sous‑vide techniques and pairings of craft beer.
  core: Chao Chen is a talkative welding virtuoso who balances meticulous craftsmanship with an unending appetite for social gatherings, karaoke, and DIY projects, though their habit of over‑committing
    sometimes leaves personal projects lagging.
background:
  cultural: Chao is a first‑generation Chinese American whose family immigrated to the United States in the early 1980s. He grew up bilingual, speaking Mandarin at home while attending American schools,
    which gave him a dual cultural lens. He celebrates Lunar New Year with traditional foods, red envelopes, and temple visits, and he maintains a strong respect for the values of diligence, humility, and
    familial responsibility that were emphasized by his parents. Living in Glendale, he is part of a vibrant Asian‑American community, participating in local cultural festivals, Chinese language classes,
    and community service events. His East‑Asian heritage informs his appreciation for balance—mirroring the yin‑yang philosophy—while his American upbringing reinforces a pragmatic, individualistic approach
    to problem‑solving and career advancement.
attributes:
  skills: '["MIG welding", "TIG welding", "Brazing", "Soldering of electronic components", "Blueprint reading and interpretation", "Metallurgy and material selection", "CNC machine operation", "Welding
