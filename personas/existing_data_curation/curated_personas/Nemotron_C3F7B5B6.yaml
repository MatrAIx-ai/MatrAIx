personas:
  professional: Danny Shubert, a budding robotics enthusiast and soccer midfielder, leverages meticulous planning and teamwork to design autonomous LEGO Technic models that blend practical engineering with
    creative problem-solving, while also tutoring peers in math to reinforce their disciplined, collaborative approach.
  sports: Danny Shubert, a midfielder for the Apex Soccer Club and the Apex High School Cougars, spends evenings honing stamina with interval runs, follows the Charlotte Hornets for NBA excitement, supports
    the Carolina Panthers during NFL season, and volunteers to coach junior soccer, blending disciplined training with community spirit.
  arts: Danny Shubert strums acoustic renditions of Ed Sheeran and John Mayer during weekend jam sessions, immerses in sci-fi novels by Isaac Asimov and fresh releases by Becky Chambers, and draws inspiration
    from the visual storytelling of Pixar's Soul and the humor of The Office, weaving these artistic influences into personal creative projects.
  travel: Danny Shubert loves road trips to Wilmington's surf-lined beaches and spontaneous family visits to Washington, D.C., but dreams of a backpacking adventure to Tokyo's anime districts and a soccer-tour
    of Barcelona, planning each journey with meticulous checklists and a modest savings pot sourced from their allowance.
  culinary: Danny Shubert enjoys cooking his favorite barbecue pulled-pork sandwiches with homemade slaw, perfecting creamy mac and cheese with sharp cheddar and a dash of paprika, and experimenting with
    sushi rolls using fresh salmon, avocado, and nori, reflecting a budding culinary confidence balanced by occasional burnt-toast mishaps.
  core: Danny Shubert's blend of disciplined curiosity, organized teen hustle, and a love for LEGO, soccer, and guitar makes them a relentlessly curious and community-focused junior who never lets a half-finished
    project or a missed practice slip by unchecked.
background:
  cultural: Danny was raised in a suburban middle‑class family in Apex, North Carolina. His upbringing reflects typical Southern‑influenced American values such as community involvement, hospitality, and
    a strong emphasis on education. Family traditions include weekend barbecues, attending local high‑school sporting events, and participation in church youth activities. The diverse, growing environment
    of Wake County, with its blend of historic Southern culture and modern tech‑driven growth, has shaped his appreciation for both tradition and innovation.
attributes:
  skills: '[''Organizational Planning'', ''Time Management'', ''Team Leadership'', ''Public Speaking'', ''Basic Python Programming'', ''Research and Fact‑Checking'', ''Event Coordination'']'
  hobbies: '[''Soccer (midfielder and team organizer)'', ''Robotics Club programming'', ''LEGO Technic building'', ''Reading science‑fiction and popular science'', ''Playing acoustic guitar'', ''Library
    tutoring volunteer'', ''Strategic video gaming'']'
  career_goals: Danny aims to graduate at the top of his class and earn a scholarship to a reputable university where he will major in engineering—preferably civil or computer engineering—to combine his
    curiosity for how things work with practical, real‑world solutions. He envisions a future where he designs sustainable infrastructure or tech products that benefit his community, and he hopes to take
    on leadership roles such as project manager or team lead. Alongside his technical ambitions, he wants to mentor younger students, serve in student council, and eventually contribute to community development
    projects in the Raleigh‑Durham area.
