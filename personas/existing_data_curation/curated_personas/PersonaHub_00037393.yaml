persona_description: A social entrepreneur and advocate for girls' education and microfinance, specifically targeting West African communities to create opportunities for girls to obtain a quality education
  and for women to obtain access to credit for income-generating activities. The individual is committed to using established local organizations to address the injustice of girls' out-of-school status
  and the indirect positive effects of education and microcredit programs on the community, including the teaching of skills by mothers in microcredit programs to other women in the community.
