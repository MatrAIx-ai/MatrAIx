  career_goals: Tamyra aims to move into a supervisory role within her retail setting, such as shift manager or assistant store manager, where she can apply her practical knowledge while gaining more predictable
    scheduling. She plans to enroll in a GED program to broaden her qualifications and eventually consider a part-time college course in business administration. Her long-term ambition is to achieve financial
    stability for her family, possibly opening a small neighborhood convenience shop that would let her set her own hours and reduce daily stress.
