personas:
  professional: John Colston is a veteran computer support specialist with three decades of experience troubleshooting hardware and software across Windows, macOS, and Linux, and they leverage their methodical
    curiosity and practical assertiveness to craft clear documentation, empathetic user training, and proactive network solutions.
  sports: John Colston spends weekends hiking the Appalachian Trail with the Hagerstown Outdoor Club, maintains modest cardio fitness through moderate trail walks, and follows the Baltimore Ravens, Washington
    Nationals, and the Maryland Terrapins with loyal enthusiasm, while they also partake in a senior center walking group during the cooler months.
  arts: John Colston, a regular backstage crew member at the Hagerstown Community Theater, unwinds by savoring Ken Burns’ Civil War documentaries, attending Baltimore Symphony Orchestra concerts, and listening
    to folk legends like Woody Guthrie, which together color their appreciation for storytelling and history, and they often share these insights with library patrons during tech‑training sessions.
  travel: John Colston plans meticulous road trips to historic sites such as Gettysburg National Military Park and the Blue Ridge Parkway, while also earmarking a future pilgrimage to the English Midlands
    to trace family roots, favoring budget‑friendly lodging and senior discounts, and they rely on detailed itineraries crafted in spreadsheet form.
  culinary: John Colston enjoys home‑cooked garden‑to‑table meals, frequently preparing heirloom tomato salads with basil and fresh corn succotash, while also indulging in Southern comfort foods like shrimp‑and‑grits
    and classic pot roast, and they display a competent but modest cooking skill set, often experimenting with new herbs from their garden.
  core: John Colston blends a historian’s curiosity with a tech‑savvy pragmatism, spending afternoons restoring vintage computers, evenings tending a vegetable garden, and occasionally hoarding obscure
    genealogy books, all while steadfastly adhering to a disciplined retirement savings plan, and they rarely let stress disturb their steady routine.
background:
  cultural: John was raised in a small town in western Maryland during the post-war era, within a white, middle-class family of mixed German and Irish ancestry. His upbringing emphasized self-reliance,
    community service, and an appreciation for the region’s rich Civil War history. He identifies with Mid-Atlantic culture, combining the agricultural heritage of the Appalachian foothills with the suburban
    development of Washington County. Family traditions include celebrating American holidays with community gatherings, attending local church services, and supporting regional sports teams. This background
    informs his practical outlook, respect for established methods, and curiosity about both past and emerging technologies.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software troubleshooting (Windows, macOS, Linux)'', ''Network diagnostics'', ''Remote desktop support'', ''Ticketing system management (ServiceNow, JIRA Service
    Desk)'', ''Technical documentation and knowledge-base creation'', ''User training and workshop facilitation'', ''Process automation with PowerShell'', ''Basic cybersecurity awareness'', ''Legacy system
    maintenance'', ''Interpersonal communication'', ''Conflict resolution'']'
  hobbies: '[''Historical nonfiction reading'', ''Genealogy research'', ''Volunteer computer teaching'', ''Vegetable gardening'', ''Woodworking'', ''Hiking'', ''Community theater involvement'', ''Chess'',
    ''Retro computer restoration'']'
  career_goals: 'John aims to deepen his expertise in cloud services and cybersecurity by earning certifications such as CompTIA Security+ and Microsoft 365 Certified: Modern Desktop Administrator. Over
    the next few years he hopes to transition into a senior technical advisor role where he can mentor junior staff and lead a structured onboarding program for new hires. He is also interested in spearheading
    a department-wide initiative to modernize the support knowledge base with interactive tutorials. As he approaches retirement, John plans to shift to part-time consulting for local small businesses,
    helping them upgrade legacy infrastructure while sharing his accumulated practical knowledge.'
