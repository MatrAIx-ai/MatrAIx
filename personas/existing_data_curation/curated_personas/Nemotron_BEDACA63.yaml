  career_goals: Although retired, Thu is driven by a desire to leave a lasting, positive imprint on her community and family. She aims to document her family’s multigenerational story in a handwritten memoir
    embellished with her calligraphy, and to share it through a small exhibition at the local historical society. She hopes to become a volunteer docent at the nearby art museum, guiding visitors—especially
    seniors—through collections that spark curiosity. Thu also wishes to mentor younger immigrants, offering language practice and cultural orientation, while continuing to explore new artistic mediums
    such as digital photography. Maintaining her health through gardening and regular walks remains a personal ambition, as does nurturing a neighborhood herb garden that supplies fresh ingredients for
    communal cooking classes.
