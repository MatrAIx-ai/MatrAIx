personas:
  professional: Anibal Carenza, a 42‑year‑old middle‑school STEM teacher in Los Angeles, blends their curiosity for science with practical classroom strategies, delivering hands‑on project‑based lessons
    that weave Arduino tinkering, bilingual instruction, and interactive technology while flexibly adjusting plans on the fly, and their reserved yet collaborative style enables them to mentor peers and
    lead community outreach despite occasional disorganization.
  sports: Anibal Carenza, a 42‑year‑old outdoor enthusiast, spends weekends trekking the San Gabriel Mountains with the Los Angeles Hiking Meetup, cycles on the coastal bike lane during spring, follows
    the LA Galaxy and Los Angeles Lakers with spirited yet reserved enthusiasm, favors low‑impact cardio over gym routines, and occasionally joins a community soccer pick‑up league when a small group of
    friends organizes a game, allowing them to stay active while maintaining their preference for small‑group settings.
  arts: Anibal Carenza, an avid classical guitarist, often performs Segovia‑inspired arrangements at intimate gatherings while absorbing contemporary murals by Shepard Fairey at downtown LA galleries and
    devoting evenings to LACMA exhibitions featuring works by Frida Kahlo and Edward Hopper, weaving music and visual art into their relaxation routine.
  travel: Anibal Carenza approaches travel with a hybrid blend of spontaneous curiosity and practical budgeting, planning weekend getaways to nearby science museums such as the California Science Center,
    taking annual hikes in Sedona’s red‑rock country, dreaming of a future trip to Mexico City’s historic markets to explore culinary roots, while usually booking flights and lodging on short notice through
    a mix of deal‑alert apps and last‑minute Airbnb finds that they find both exciting and efficient.
  culinary: Anibal Carenza, an enthusiastic home chef, skillfully prepares authentic tamales and richly layered mole poblano using roasted ancho chilies, cacao, and corn masa, frequently experiments with
    fusion dishes that blend cilantro‑lime quinoa salads and smoked paprika‑infused chicken, often showcasing their creations at community garden potlucks, and savors occasional fine‑dining outings at Los
    Angeles’ Pujol‑inspired Mexican restaurants.
  core: Anibal Carenza balances a relentless curiosity for science with a relaxed, sometimes scattered approach to life, juggling Arduino projects, classical guitar sessions, and a love for mole while habitually
    misplacing lesson plans and overlooking minor deadlines, yet always finding time to mentor curious minds and share sustainable gardening tips.
background:
  cultural: Aníbal is the son of Mexican immigrants who settled in East Los Angeles, where he grew up immersed in a bilingual, bicultural environment. He celebrates Mexican holidays such as Día de Los Muertos
    and Las Posadas, and he incorporates Mexican scientific contributions and cultural narratives into his teaching. His fluency in Spanish enables him to communicate effectively with Spanish‑speaking families,
    fostering strong home‑school partnerships. While fully integrated into the Pasadena community, he maintains close ties to his heritage through family gatherings, traditional cuisine, and active participation
    in local Mexican cultural events.
attributes:
  skills: '[''Project‑based learning facilitation'', ''Differentiated instruction'', ''Educational technology integration (Google Classroom, Scratch, Arduino)'', ''Bilingual communication (English/Spanish)'',
