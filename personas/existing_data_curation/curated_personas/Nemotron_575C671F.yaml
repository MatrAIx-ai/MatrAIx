  hobbies: '[''Reading science‑fiction and popular‑science books'', ''Arduino and Raspberry Pi tinkering'', ''Hiking in the San Gabriel Mountains'', ''Cooking traditional Mexican cuisine'', ''Playing classical
    guitar in intimate settings'', ''Visiting local art galleries'', ''Volunteering at a community garden'']'
  career_goals: Aníbal aims to transition into a district‑wide STEM curriculum specialist role where he can design flexible, inquiry‑driven programs that balance innovative ideas with practical feasibility.
    He plans to pursue a master's degree in education with a focus on technology integration, mentor early‑career teachers, and launch a bilingual after‑school robotics club. Additionally, he aspires to
    author a children’s science book that weaves Mexican cultural stories with scientific concepts, and to expand his involvement in community science festivals throughout Los Angeles County.
