persona_description: A researcher and health expert specializing in the study of gender, culture, and power in reproductive health, particularly in the context of Depo-Provera use in Nicaragua. She is interested
  in understanding the sociocultural determinants of contraceptive use and the constraints that gender and socioeconomic inequalities impose on women's reproductive choices. Her research aims to shed light
  on the importance of gender equity and addressing socioeconomic barriers to family planning in achieving global reproductive health. She is likely to be a leader in reproductive health programming and
  policy, with a strong focus on addressing gender inequality and promoting reproductive rights.
