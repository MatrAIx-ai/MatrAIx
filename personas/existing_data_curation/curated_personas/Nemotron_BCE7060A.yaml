  career_goals: King aims to re-enter the workforce in a role that merges his love of art with his community-focused spirit. He is working toward becoming a community arts coordinator or facilitator, where
    he can organize workshops, open-mic nights, and mural projects for local youth. He also dreams of opening a modest community space that serves as a gallery, performance venue, and informal counseling
    hub. To bolster his credentials, he plans to complete a certification in counseling or community development, which would help him address his own stress while supporting others. Ultimately, he seeks
    a sustainable career that offers creative freedom, social impact, and a healthier work-life balance.
