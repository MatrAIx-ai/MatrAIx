personas:
  professional: King Sanders, an aspiring community arts coordinator, blends their adeptness at event facilitation, visual storytelling through painting and photography, and natural sociability into a role
    that energizes local youth, yet often wrestles with deadlines and project paperwork due to a preference for flexible, loosely structured environments.
  sports: King Sanders, a devoted fan of the New York Knicks and New York Yankees, participates in a weekly pickup basketball game at the community center and enjoys weekend hikes along the Hudson River
    Trail, though they often forgo consistent gym workouts, preferring spontaneous, social activity over regimented exercise.
  arts: King Sanders, an avid participant in Newburgh’s vibrant arts scene, frequents jazz performances by Miles Davis tribute bands, blues nights featuring B.B. King covers, and hip‑hop shows spotlighting
    Kendrick Lamar’s catalog, while also creating urban landscape paintings inspired by Basquiat and capturing neighborhood moments with a Leica camera, channeling their curiosity and openness into creative
    expression.
  travel: King Sanders, an adventurous yet budget‑conscious traveler, has taken weekend road trips to the jazz‑rich streets of New Orleans and the cultural festivals of Chicago, dreams of a future art pilgrimage
    to Amsterdam’s museums, and prefers spontaneous itineraries that balance community obligations with personal discovery.
  culinary: King Sanders, a soulful home cook, loves preparing hearty stews with smoked sausage, okra, and root vegetables, baking buttery cornbread, and experimenting with seasonal herbs from their own
    garden, while occasionally indulging in late‑night snack runs for fried chicken, reflecting both a love for comfort food and a spontaneous palate.
  core: King Sanders, a socially‑charged, art‑obsessed 52‑year‑old who thrives on community connection yet battles disorganization and stress, channels their curiosity into painting, public speaking, and
    impromptu jazz nights, all while juggling spontaneous spending and health worries.
background:
  cultural: King grew up in a Black family that migrated from the rural South to the Hudson Valley in the 1970s, bringing with them a rich tapestry of Southern gospel, storytelling, and culinary traditions.
    Living in Newburgh, he has been shaped by the region’s diverse African-American community, local churches, and cultural festivals that celebrate Black art, music, and history. His upbringing emphasized
    resilience, community solidarity, and a deep appreciation for creative expression—values that continue to influence his worldview, social interactions, and artistic pursuits.
