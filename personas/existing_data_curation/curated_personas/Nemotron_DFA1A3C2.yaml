personas:
  professional: Clark Woods, a teen robotics enthusiast, merges his sci‑fi curiosity with practical Arduino craftsmanship, reliably organizing small‑team builds in his school’s robotics club while quietly
    steering projects toward tangible results.
  sports: Clark Woods enjoys quiet outdoor pursuits like fishing on the Salt Fork River and hiking local trails with the Junior Rangers Hiking Club, while cheering on the St. Louis Cardinals baseball team
    and occasionally playing pickup soccer with friends after school.
  arts: Clark Woods finds creative release in building detailed model airplanes and immersing in the soundtracks of Hans Zimmer and M83, while devouring science‑fiction novels by authors such as Alastair
    Reynolds and attending occasional local theater performances of classic plays.
  travel: Clark Woods prefers low‑key, nature‑focused trips, having camped at the Ozark National Forest and planning a future road trip to the Grand Canyon, while balancing a limited travel budget with
    a keen eye for free outdoor festivals and sci‑fi conventions like Seattle’s Dragon Con.
  culinary: Clark Woods favors simple, high‑energy meals such as peanut‑butter and jelly sandwiches, mac and cheese, and homemade trail mix with almonds, raisins, and chocolate chips, and, while a novice
    cook, they can reliably whip up a grilled cheese using cheddar and butter after a long day of tinkering.
  core: Clark Woods is a quietly driven teen whose curiosity for futuristic tech fuels late‑night Arduino projects, yet they often lose track of time, forget homework deadlines, and hoard stray screws and
    cables like trophies.
background:
  cultural: Clark grew up in Kingfisher, a small Midwestern town in Oklahoma, within a family rooted in the region’s agricultural and community values. His cultural upbringing blends typical white rural
    Oklahoman traditions—such as attending town events like the county fair, enjoying country music, and participating in church‑based community service—with a strong emphasis on self‑reliance, respect
    for nature, and a close‑knit family network. This environment fosters a practical mindset while allowing room for curiosity, especially through local school programs that encourage STEM learning.
attributes:
  skills: '[''Mathematics (algebraic reasoning)'', ''Science (basic physics and chemistry concepts)'', ''Basic Python programming'', ''Woodworking and basic hand tools'', ''Elementary electronics (circuit
    building)'', ''Project organization and time management'']'
  hobbies: '[''Reading science‑fiction'', ''Model airplane building'', ''Arduino tinkering'', ''Fishing'', ''Hiking'', ''Online strategy gaming (small group)'', ''Robotics club projects'']'
  career_goals: Clark aspires to pursue a career in engineering—preferably mechanical or mechatronics—where he can blend his curiosity for new technologies with practical problem‑solving. He aims to attend
    a technical college after high school, earn an associate degree, and eventually work on designing sustainable farming equipment or automated systems that support his rural community. In the short term,
    he hopes to earn a robotics certification through his school’s STEM program and secure a summer internship at a local agricultural equipment dealer.
