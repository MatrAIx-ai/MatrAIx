personas:
  professional: Leandra Duany combines meticulous event‑planning expertise, bilingual communication, and a competitive drive to excel as a program coordinator for a Tampa community nonprofit, and they leverage
    their budgeting acumen and hands‑on DIY experience to deliver measurable impact.
  sports: Leandra Duany energizes their routine with Zumba classes, salsa dancing at local nightclubs, and weekend hikes in Hillsborough County parks, while they cheer on the Tampa Bay Buccaneers and Tampa
    Bay Lightning and participate in a community running club that meets at Al Lopez Park.
  arts: Leandra Duany immerses themselves in the arts by attending art and music festivals featuring performers like Bad Bunny, Rosalía, and the Latin Jazz Ensemble, joining a Spanish‑language book club
    that reads works by Gabriel García Márquez, and decorating their home with prints inspired by Frida Kahlo and Diego Rivera, allowing cultural motifs to shape their creative expression.
  travel: Leandra Duany plans travels with the precision of a spreadsheet, favoring weekend getaways to nearby gems like Clearwater Beach, Asheville’s Blue Ridge Mountains, and a dream trip to Oaxaca, Mexico,
    while they balance their love for adventure with a tight budget as they save for their future catering startup.
  culinary: Leandra Duany delights in cooking authentic Latin dishes such as arroz con pollo, ceviche, and mole, expertly using ingredients like achiote, plantains, and fresh cilantro, and while their cooking
    skill is advanced they still joke about their habit of over‑seasoning salsa to the point of extra spiciness during impromptu dinner parties.
  core: Leandra Duany fuses a competitive, methodical mindset with a vibrant social spirit, orchestrating community events like choreographed salsa nights while they secretly hoard extra taco shells for
    late‑night snack raids.
background:
  cultural: Leandra identifies as Hispanic, tracing her roots to Cuban heritage while growing up in Tampa’s vibrant Latino community. Bilingualism shaped her upbringing; Spanish is spoken at home, and she
    celebrates cultural traditions such as Día de los Muertos, Carnaval, and family gatherings centered around music and food. This background instilled a strong sense of community, respect for family ties,
    and an appreciation for both traditional customs and the broader American cultural landscape. She draws on these influences in her social life, community involvement, and career aspirations.
