  career_goals: Leandra aims to transition from her current hiatus into a full‑time role that leverages her organizational talent and cultural insight. She plans to earn a certificate in nonprofit management
    within the next year and target a position as a program coordinator for a Hispanic‑focused community organization in Tampa. Long‑term, she aspires to lead a community development initiative or launch
    a small catering business that showcases traditional Latin flavors while providing job training for other young adults in her neighborhood. Her competitive drive pushes her to seek leadership opportunities
    where she can set measurable goals and track her impact.
