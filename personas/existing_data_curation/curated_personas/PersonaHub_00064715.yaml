persona_description: 'A person who has experienced and fought against racism and hatred towards Japanese during the post-WW2 era, and has used intolerance and ignorance as fuel to become a better person
  and fight for equality. This person has a strong commitment to education and has made significant contributions to the Asian American community through activism and advocacy. They are an active member
  of the Asian Coalition for Equality (ACE) and have been involved in numerous campaigns in the growing local Asian movement. They have a passion for writing and have published an autobiographical essay,
  "A Professor, Not a Porter," in Community and Difference. They are currently writing a novel, "Catching Salmon with Dolphins," and traveling the country with their poetry. They have won a Northwest Regional
  Emmy for their work on the documentary "Fighting for America: Nisei Soldiers," which was adapted from their graphic novel.'
