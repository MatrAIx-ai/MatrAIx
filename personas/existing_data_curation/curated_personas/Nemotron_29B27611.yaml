  career_goals: Matthew aims to complete a Master of Divinity within the next two years, positioning himself for a senior pastor role at a mid‑sized congregation in Fairfield County. He envisions building
    a multi‑site ministry that integrates practical community services—such as a job‑training hub and a food‑security program—using his business expertise to create sustainable funding models. Long‑term,
    he aspires to become a regional pastoral mentor within his denomination, promoting structured leadership development and innovative outreach strategies.
