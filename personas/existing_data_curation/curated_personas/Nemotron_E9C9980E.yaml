  career_goals: Eric aims to graduate high school with strong grades, earn a soccer scholarship, and eventually play professionally, either in Major League Soccer or abroad. He also wants to study computer
    science to design his own video games, combining his love for technology and creativity. In the meantime, he hopes to mentor younger kids in his neighborhood by coaching youth soccer and teaching basic
    coding, serving as a positive role model for other Mexican‑American children. He sees these goals as complementary pathways that let him use both his athletic and technical talents.
