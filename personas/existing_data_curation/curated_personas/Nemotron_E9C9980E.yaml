personas:
  professional: Eric Marino, a budding soccer enthusiast who captains his school's under‑12 team, channels their knack for quick decision‑making and organized practice routines into leading drills, while
    their easy‑going nature lets them improvise tactics during pick‑up games and keep the squad’s morale high.
  sports: Eric Marino lives for soccer, playing as a midfielder for his neighborhood club and cheering for Manchester United, while also mastering tricks at the local skate park and trading sports cards
    featuring legends like Lionel Messi and LeBron James, a combination that showcases their sociable, competitive spirit.
  arts: Eric Marino strums beginner guitar chords on evenings at home, draws inspiration from live performances by artists like Bad Bunny and Ed Sheeran at community festivals, and designs custom Minecraft
    skins that echo their favorite album covers, reflecting their creative side and love for collaborative expression.
  travel: Eric Marino enjoys spur‑of‑the‑moment road trips to nearby state parks such as Yosemite and dreams of attending the Tokyo Game Show, planning most get‑aways collaboratively with his family while
    balancing school commitments, a flexible approach that mirrors their preference for structure without rigid schedules.
  culinary: Eric Marino loves helping his mother prepare family staples like tacos al pastor with pineapple and cilantro, perfecting guacamole with fresh lime, and experimenting with pizza toppings like
    jalapeño and pineapple, showing a moderately skilled yet adventurous palate that they pursue with a practical, hands‑on attitude.
  core: Eric Marino balances a love for on‑the‑fly skate sessions with a hidden talent for meticulously budgeting their allowance and can often be found humming guitar riffs while trading sports cards.
background:
  cultural: Eric was raised in a bilingual Mexican household in Plainfield, Illinois. He speaks Spanish with his parents and grandparents and uses English at school, giving him a bicultural perspective.
    Family traditions such as celebrating Día de los Muertos with altars, cooking holiday meals of tamales and pozole, and listening to regional Mexican music like banda and norteño are central to his upbringing.
    At the same time, he embraces Midwestern customs—participating in school sports, attending local fairs, and integrating into the diverse community of Will County. This blend of Mexican heritage and
    American suburban life shapes his values, language, and social experiences.
