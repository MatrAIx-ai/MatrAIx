personas:
  professional: Carolyn Daudier is a 28‑year‑old pipefitter / steamfitter who combines precise welding, blueprint analysis, and stress‑testing expertise with a curious eye for sustainable design, leveraging
    her organized, competitive drive to finish high‑pressure steam projects ahead of schedule while mentoring the next wave of women apprentices.
  sports: Carolyn Daudier rides a vintage steel‑frame bike with the Worcester Cycling Club on crisp autumn routes along the Blackstone River, hikes the Berkshires in summer, and roots for the Boston Red
    Sox while squeezing in functional‑training circuits at the local gym to maintain the stamina needed for demanding pipe‑installation days.
  arts: Carolyn Daudier pursues industrial photography inspired by Edward Burtynsky, curates a personal collection of rust‑textured prints, creates DIY metal sculptures echoing the forms of historic mill
    turbines, and frequently attends shows at the Worcester Art Museum featuring contemporary artists like Sarah Sze and local indie band The Drones.
  travel: Carolyn Daudier prefers meticulously planned weekend getaways that blend adventure with research, having explored Portland’s lighthouse trail and Detroit’s revitalized factories, while dreaming
    of an Icelandic road trip to study geothermal steam systems and the remote Scottish Highlands for their rugged industrial ruins.
  culinary: Carolyn Daudier’s kitchen experiments fuse New England clam chowder with Korean gochujang, she loves searing cedar‑plank salmon with miso glaze, and often incorporates reclaimed copper pipe
    as a makeshift grill, while her go‑to comfort dish remains a hearty lobster roll seasoned with fresh dill and lemon zest.
  core: Carolyn Daudier is a steel‑hearted pipefitter who snaps rusted skylines, sketches sustainable systems, and juggle competition‑driven work ethic with a restless curiosity that occasionally leaves
    her inbox overflowing and her back sore.
background:
  cultural: Carolyn grew up in a working‑class family in Worcester, Massachusetts, steeped in New England’s tradition of self‑reliance, practicality, and community solidarity. Her family has a legacy of
    trade work, and she was the first woman to pursue a plumbing apprenticeship in her neighborhood, navigating a historically male‑dominated field with a blend of perseverance and competitive spirit. She
    identifies with the region’s appreciation for industrial heritage, often reflecting on the historic mills and steam plants that shaped the local landscape. Active in the local plumbers' union, she values
    collective bargaining, safety advocacy, and mentorship, while also embracing the broader cultural tapestry of Worcester’s diverse arts scene and progressive values.
attributes:
  skills: '[''Pipefitting'', ''Steam System Installation'', ''Blueprint Reading'', ''Advanced Welding (MIG & Oxy‑Acetylene)'', ''Pipe Bending and Threading'', ''Pressure Testing & Leak Detection'', ''Hydraulic
    & Steam System Troubleshooting'', ''Basic AutoCAD Drafting'', ''Pipe Stress Analysis'', ''Safety Compliance (OSHA)'', ''Project Planning'', ''Technical Communication'', ''Team Coordination'']'
  hobbies: '[''Industrial photography'', ''DIY metal sculpture'', ''Visiting art galleries and museums'', ''Reading technical journals and science‑fiction'', ''Cycling and hiking in New England'', ''Attending
    indie music concerts'', ''Experimental cooking'', ''Participating in community trade workshops'']'
  career_goals: Carolyn aims to achieve journeyman status within the next year and then pursue a lead pipefitter certification focused on large‑scale steam systems. She plans to obtain LEED Green Associate
    credentials to specialize in energy‑efficient heating solutions for historic New England buildings. In the medium term, she aspires to become a project supervisor overseeing multi‑disciplinary construction
    crews, and eventually launch her own consultancy that blends sustainable pipe engineering with artistic design elements. She also hopes to mentor apprentices, especially women entering the trade, and
    become an active voice in her local union advocating for safety standards and equitable work practices.
