  hobbies: '[''Community theater improv'', ''Organizing trivia nights'', ''Playing chess'', ''Hiking local trails'', ''Reading historical biographies'', ''Cooking Southern‑inspired dishes'', ''Gardening'',
    ''Volunteering at the public library'', ''Attending live music'', ''Watching college football'']'
  career_goals: Shahram aims to re‑enter the workforce in a part‑time role that leverages his communication and research strengths, such as a community‑outreach coordinator for a local historical society
    or a freelance writer on regional cultural topics. He plans to obtain a project‑management certification to bring a more structured framework to his initiatives while still preserving the flexibility
    he enjoys. Long‑term, he hopes to launch a modest consulting practice offering workshops on Southern heritage and storytelling, balancing steady income with the autonomy to manage his stress and emotional
    well‑being.
