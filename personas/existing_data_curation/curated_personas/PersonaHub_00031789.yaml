persona_description: A Mexican meteorologist who has expertise in forecasting and understanding extreme weather conditions, particularly droughts. He has been actively involved in raising awareness of the
  drought crisis in Mexico and has been working with other experts in the southwestern United States to address the issue. He is concerned about the impact of droughts and wildfires on food security and
  climate change, and is advocating for more conscientious stewardship of the ecosphere. He is a leader in the effort to mitigate the impact of droughts and wildfires on Mexico and is dedicated to finding
  solutions to address the urgent drought crisis.
