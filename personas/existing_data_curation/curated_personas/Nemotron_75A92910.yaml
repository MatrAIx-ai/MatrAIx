personas:
  professional: An archivist-researcher, Joan Bigham merges their methodical love of order with a lifelong curiosity for Texan heritage, they apply advanced Microsoft Office and basic web content skills
    to organize community records while quietly championing collaborative projects at the San Antonio Public Library.
  sports: A devoted fan of the San Antonio Spurs and San Antonio FC, Joan Bigham enjoys quiet weekend hikes in the Hill Country, they participate in a local birdwatching club that meets after game nights,
    and occasionally play low-intensity pickleball with neighbors to stay active.
  arts: An avid lover of Tex-Mex folk music and classic Southern literature, Joan Bigham fills evenings listening to the soulful guitar of Flaco Jimenez, they read Cormac McCarthy’s novels, and meticulously
    knit intricate quilts inspired by the designs of folk artist Faith Ringgold, all while curating a small personal collection of vintage photographs of historic San Antonio architecture.
  travel: A meticulous planner, Joan Bigham prefers low-key cultural trips, they have explored the historic missions of San Antonio, the art deco streets of Galveston, and a week-long pilgrimage to Santa
    Fe’s Pueblo architecture, while dreaming of a quiet autumn visit to the vineyards of the Loire Valley to photograph sunrise over the vines.
  culinary: A dedicated Tex-Mex home chef, Joan Bigham regularly prepares smoky enchiladas verdes with locally grown tomatillos and cilantro from their garden, they experiment with mesquite-flour corn tortillas,
    and delight in crafting prickly-pear jam to accompany hand-stitched quinoa salads.
  core: Joan Bigham is a methodical, solitary historian-genealogist who balances a love of order with quiet curiosity, they tend native gardens, knit intricate quilts, and channel a modest entrepreneurial
    spirit into documenting San Antonio’s multicultural past.
background:
  cultural: Joan is a white Anglo‑American Texan raised in a middle‑class family in the Greater San Antonio area. Her upbringing blended traditional Southern hospitality with the vibrant multicultural atmosphere
    of Bexar County, where Mexican and Hispanic influences shape food, music, and community celebrations. She values independence, reliability, and a strong sense of community service, reflecting both the
    frontier spirit of Texas and the inclusive, diverse fabric of the region. Her cultural lens emphasizes quiet self‑reliance, respect for established practices, and an appreciation for the layered histories
    that define her hometown.
attributes:
  skills: '[''Project Management'', ''Financial Planning'', ''Data Organization'', ''Research & Information Literacy'', ''Microsoft Office Suite Proficiency'', ''Basic Web Content Management'', ''Creative
