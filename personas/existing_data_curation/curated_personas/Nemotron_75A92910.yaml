  hobbies: '[''Historical Fiction Reading'', ''Genealogy Research'', ''Birdwatching'', ''Gardening'', ''Tex-Mex Cooking'', ''Knitting'', ''Puzzle Solving (Crosswords)'', ''Nature Photography'', ''Volunteer
    Archivist at the San Antonio Public Library'']'
  career_goals: Although currently not in the formal workforce, Joan aims to complete her associate degree in History to deepen her understanding of Texas heritage. She aspires to become a recognized local
    genealogist, publishing a well‑researched family‑history book that highlights the multicultural roots of San Antonio. In parallel, she plans to launch a modest online shop featuring handcrafted quilts
    and plant arrangements, merging her creative hobbies with modest entrepreneurial ambition. Volunteering as an archivist for the San Antonio Public Library remains a central goal, allowing her to apply
    her organizational strengths while remaining within a quiet, solitary environment.
