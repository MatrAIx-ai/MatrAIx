personas:
  professional: Oneida Nunez is a full‑stack engineer who blends Python and JavaScript expertise with a meticulous, calm demeanor, championing inclusive UI/UX design and weaving generative art into educational‑tech
    platforms, while they mentor bilingual junior developers and steer agile teams toward socially impactful product outcomes.
  sports: Oneida Nunez hits the New England trails on weekends with the Boston Hiking Club, plays pickup soccer in a local league that supports immigrant families, and they stay loyal to the Boston Red
    Sox and New England Patriots, balancing cardio hikes with strength‑building yoga flows.
  arts: Oneida Nunez immerses herself in watercolor workshops, draws inspiration from Frida Kahlo and contemporary Latin American novelist Valeria Luiselli, curates digital generative pieces in p5.js, and
    they regularly attend exhibitions featuring Kehinde Wiley and performances by the Boston Symphony Orchestra.
  travel: Oneida Nunez plans meticulous itineraries that blend cultural immersion with outdoor adventure, having trekked Patagonia’s Torres del Paine, savored street food in Buenos Aires, and they now dream
    of exploring the coastal city famed for its carnival while budgeting for future trips through a dedicated travel savings fund.
  culinary: Oneida Nunez is a competent home cook who perfects arepas stuffed with black beans and queso fresco, rolls crisp empanadas with plantain‑spiced filling, and brews specialty coffee using high‑altitude
    beans from the Andes with a French press, often pairing meals with fresh avocado and cilantro salsa, while they habitually forget to water their houseplants, leading to a jungle of wilted succulents.
  core: Oneida Nunez merges tech savvy and artistic curiosity, staying organized and calm while turning code into vibrant, inclusive experiences, yet they habitually forget to water their houseplants, leading
    to a jungle of wilted succulents.
background:
  cultural: Oneida was raised in a bilingual Colombian household in Quincy, MA, where Spanish and English mingled daily. Her parents brought the warmth of Colombian traditions—celebrations like Carnaval
    de Barranquilla, a shared love for coffee, and rhythms of cumbia and vallenato—into her upbringing. She remains active in the local Colombian diaspora, participating in cultural festivals, cooking community
    meals, and preserving family stories. This heritage fuels her appreciation for storytelling, communal harmony, and vibrant visual expression, all of which manifest in her collaborative work style, her
    dedication to inclusive community projects, and her artistic pursuits.
