  career_goals: Oneida aims to become a senior full‑stack engineer within the next three to five years, eventually stepping into a technical lead role where she can guide cross‑functional teams building
    educational‑technology platforms that marry artistic expression with learning outcomes. She is driven to champion inclusive design practices, mentor underrepresented junior developers, and contribute
    to open‑source projects that explore generative art and human‑centered AI. Long‑term, she envisions transitioning into product leadership, steering initiatives that have measurable social impact while
    maintaining a deep connection to creative technology.
