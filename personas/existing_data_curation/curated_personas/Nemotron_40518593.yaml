  hobbies: '[''Gardening'', ''Reading African‑American history'', ''Woodworking'', ''Chess'', ''Gospel and soul music listening'', ''Fishing'', ''Church volunteering'', ''Journaling'']'
  career_goals: He aims to channel his lifetime of practical knowledge into mentoring younger members of his community through a local apprenticeship program and by leading a community garden. Dariel also
    hopes to complete a memoir that captures the African‑American experience in rural Florida, and to continue participating in support groups that help him manage his anxiety while supporting others.
