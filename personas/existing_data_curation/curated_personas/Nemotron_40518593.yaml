personas:
  professional: Dariel Bethel, a seasoned building maintenance veteran with deep expertise in HVAC, plumbing, and carpentry, draws on a methodical planning style and church‑rooted values of mutual aid to
    mentor apprentices and lead a community garden, balancing curiosity for new repair methods with practical, budget‑conscious solutions, and they are known for drafting detailed work schedules that ensure
    projects finish on time.
  sports: Dariel Bethel enjoys early‑morning fishing on Lake Weir, follows the Tampa Bay Rays as a lifelong baseball fan and the Orlando Magic during the NBA season, and stays active by joining a senior
    bowling league at the community center, where they appreciate the camaraderie and low‑impact competition.
  arts: Dariel Bethel’s artistic life revolves around gospel hymns by Mahalia Jackson, classic soul tracks from Aretha Franklin and Sam Cooke, and reading memoirs by Alex Haley and the plays of August Wilson,
    and they find inspiration for their own journaling and community storytelling sessions in these works.
  travel: Dariel Bethel favors low‑key road trips that blend history and food, having explored Savannah’s riverfront, the jazz‑filled streets of New Orleans, and the monuments of Washington, D.C., while
    dreaming of a future pilgrimage to the Gullah coastal villages of South Carolina’s Sea Islands, and they plan each journey using a modest notebook filled with handwritten maps.
  culinary: Dariel Bethel’s culinary repertoire is anchored in Southern comfort foods, from simmered collard greens with smoked ham hocks and garden‑fresh tomatoes to crispy fried catfish, cornbread with
    honey butter, and a daily sweet tea brewed with a pinch of mint, and they prepare most dishes in a well‑worn cast‑iron skillet that has become a family heirloom.
  core: Dariel Bethel is a methodical, community‑oriented handyman who balances a lifelong love of hands‑on problem solving with deep compassion, a disciplined budgeting habit, and a quiet battle against
    anxiety that fuels a reflective journaling practice, and they often surprise friends by humming gospel tunes while fixing a leaky faucet.
background:
  cultural: Dariel is a Black Floridian whose upbringing was shaped by Southern African‑American traditions. He grew up in a close‑knit, predominantly Black neighborhood of Ocala, attending a historically
    Black church where gospel music, communal meals, and mutual aid were central. His family traces its roots to the Great Migration, with grandparents who moved from the Deep South to seek work in the
    citrus and agricultural sectors of central Florida. The local culture of church fellowship, storytelling, and Southern cooking, combined with the broader legacy of civil‑rights activism in the region,
    informs his compassionate outlook and strong sense of community.
attributes:
  skills: '[''Facilities maintenance'', ''HVAC repair'', ''Plumbing and electrical troubleshooting'', ''Carpentry and woodworking'', ''Project planning and scheduling'', ''Budget management'', ''Conflict
