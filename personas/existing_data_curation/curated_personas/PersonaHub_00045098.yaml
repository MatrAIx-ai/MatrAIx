persona_description: A conservation biologist who is responsible for implementing and monitoring beaver dam removal projects in Alberta, Canada. This involves inspecting the study area periodically to determine
  the presence, locations, and numbers of beaver dams to be removed, and monitoring walleye movements after dam removal to ensure that beaver dams are not being rebuilt. The person is knowledgeable about
  the history of beaver dams in Alberta, the importance of walleye in the maintenance of the Iosegun Lake walleye population, and the challenges of removing beaver dams in the presence of active spawning
  migration. They have experience working with the Alberta Conservation Association and the Alberta Sustainable Resource Development program to carry out the project.
