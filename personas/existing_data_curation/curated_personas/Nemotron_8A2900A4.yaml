  career_goals: Jerline aims to advance to a senior leadership role such as Director of Procurement within the next five years, where she can spearhead initiatives that integrate technology, sustainability,
    and supplier diversity. She plans to pursue an MBA with a focus on supply chain innovation to deepen her strategic capabilities. Her ambition includes establishing a mentorship program for emerging
    Black professionals in procurement and championing the inclusion of minority‑owned businesses in the company's supply base, positioning her organization as a benchmark for responsible and competitive
    sourcing.
