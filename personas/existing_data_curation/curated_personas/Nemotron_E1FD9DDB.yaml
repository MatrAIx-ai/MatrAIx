personas:
  professional: Kari Alford is an experienced elementary and middle school teacher who blends curiosity-driven inquiry with standards‑aligned instruction, they leverage technology and local community resources
    to craft project‑based STEM units while mentoring new teachers, yet their relaxed attitude toward administrative deadlines sometimes results in disorganized paperwork.
  sports: Kari Alford competes in a co‑ed recreational softball league, follows the Albuquerque Isotopes baseball team and New Mexico United soccer club, they tackle the Sandia Mountains on weekends and
    relish the competitive edge of league play while also enjoying the camaraderie of group fitness.
  arts: Kari Alford immerses themselves in the Albuquerque International Balloon Fiesta, the New Mexico Film Festival, and community drum circles, they draw inspiration from artists such as Lila Downs,
    filmmaker Robert Rodriguez, and actor Pedro Pascal, and they often discuss these works during board‑game nights and craft sessions.
  travel: Kari Alford favors spontaneous road trips to nearby gems like Santa Fe, Taos, and Carlsbad Caverns, they also plan annual getaways to Mexico City to practice Spanish, balancing travel plans around
    the school calendar and modest savings while seeking a blend of adventure and cultural immersion.
  culinary: Kari Alford delights in preparing New Mexican staples such as green chile stew, carne adovada, and sopapilla‑filled desserts, they experiment with Hatch, Chimayo, and Pasilla de Oaxaca chilies,
    and they keep a well‑stocked pantry of corn masa, blue corn flour, and toasted cumin for their culinary creations.
  core: Kari Alford is a curious, sociable teacher whose competitive drive and relaxed, occasionally disorganized approach to life fuels a passion for outdoor adventures, community arts, and spicy culinary
    experiments.
background:
  cultural: Kari is a white American whose family roots trace back to the Midwest, where she grew up in a close‑knit, self‑reliant community. After college, she relocated to Albuquerque, drawn to the Southwest’s
    vibrant blend of Hispanic, Native American, and Anglo cultures. She embraces New Mexican traditions—celebrating local holidays, incorporating Pueblo stories into lesson plans, and enjoying regional
    foods—while maintaining the Midwestern values of independence and community service. Her cultural perspective fuels a commitment to creating inclusive, culturally responsive learning environments that
    honor the diverse heritage of her students.
