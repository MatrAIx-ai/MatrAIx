  career_goals: Kari aims to move into school leadership within the next five years, pursuing an assistant principal credential while championing a district‑wide STEM initiative for elementary grades. She
    hopes to publish research on project‑based learning in a regional education journal and win a state award for innovative teaching. Securing grant funding to upgrade classroom technology and expanding
    after‑school enrichment programs are also high on her agenda. Long‑term, she envisions a role as a curriculum specialist shaping inclusive, culturally responsive curricula across the district.
