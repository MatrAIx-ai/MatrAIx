  hobbies: '[''Gardening (roses, herbs, vegetables)'', ''Reading historical novels and biographies'', ''Genealogy research'', ''Sewing and quilting'', ''Cooking nutritious meals'', ''Volunteering at the
    senior center'', ''Bird watching'', ''Playing chess and participating in trivia nights'', ''Attending church choir and community festivals'']'
  career_goals: Although officially retired, Amna aims to leave a lasting impact on her community. She plans to launch a senior mentorship program that pairs experienced elders with younger volunteers to
    preserve local history and practical skills. She aspires to complete a comprehensive family genealogy and create a searchable digital archive for future generations. Amna also wants to become proficient
    in video‑conferencing tools to lead virtual workshops on budgeting and home gardening for seniors, ensuring she stays technologically relevant. Additionally, she seeks to maintain her health and independence
    by participating regularly in the local senior walking club and achieving a personal best in the annual senior puzzle tournament.
