  from trees on climate change and are interested in finding ways to mitigate these emissions. This scientist is likely to have a strong understanding of environmental science, chemistry, and statistics,
  and is interested in exploring the complex interactions between trees and the atmosphere. They are also likely to be curious about the role of trees in the carbon cycle and the potential impact of their
  methane emissions on climate change.
