personas:
  professional: Derek Hargis is a budding little builder who spends rainy afternoons stacking wooden blocks, experimenting with cause‑and‑effect, and they channel their natural curiosity and love of art
    into imaginative constructions, even though they prefer unstructured play over rigid schedules.
  sports: Derek Hargis loves the splash of the community splash pad at Onondaga Lake Park and eagerly joins the local toddler soccer slice, often cheering for the nearby Syracuse Mets while they pretend
    to be a tiny outfielder, and they adore watching the Buffalo Bills on Sundays with a bowl of popcorn.
  arts: Derek Hargis spends Saturday mornings drawing bright, squiggly creatures after attending the Everson Museum's kiddie art workshop, often humming the tunes of the Disney movie Frozen and idolizing
    the playful illustrations of Mo Willems and the colorful murals of Yayoi Kusama that they saw in a family trip to the museum.
  travel: Derek Hargis prefers short car rides to nearby adventures, such as exploring the enchanted trails of Green Lakes State Park or taking a family weekend trip to the roaring Niagara Falls, and they
    dream of someday seeing the snow‑capped peaks of the Adirondacks while holding a stuffed bear for comfort.
  culinary: Derek Hargis delights in making peanut butter and banana sandwiches with their dad, proudly stirring batter for homemade pancakes that top with maple syrup, and they always request the cheesy
    macaroni from the family’s traditional Thanksgiving table along with a side of crisp apple slices.
  core: Derek Hargis is a curious, art‑loving three‑year‑old who collects pennies, builds towers of blocks, and prefers quiet corners to noisy crowds, though they sometimes trade storytime snacks for an
    extra sticker.
background:
  cultural: Derek is being raised in a middle‑class white family in Syracuse, New York. His family participates in typical American cultural traditions such as Thanksgiving, Christmas, and the Fourth of
    July, and they often attend local community events like the Syracuse Children’s Museum programs and the Everson Museum of Art’s kid‑friendly exhibitions. He occasionally hears stories about his ancestors’
    Irish and German heritage, which influence occasional family recipes and holidays. Growing up in Onondaga County, he benefits from a blend of suburban and urban experiences, including trips to nearby
    parks, library storytimes, and community art workshops that nurture his curiosity and love for creative expression.
