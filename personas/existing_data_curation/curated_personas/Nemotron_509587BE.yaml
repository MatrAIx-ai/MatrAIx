personas:
  professional: Jolanda Glaze is a senior convention strategist who harnesses a STEM foundation and a decade of event‑planning expertise to design immersive, data‑driven gatherings that weave cutting‑edge
    technology, contemporary art, and sustainability into seamless experiences, applying a methodical, competitive mindset to negotiate multimillion‑dollar contracts and deliver flawless execution.
  sports: Jolanda Glaze is a sunrise jogger who logs 5‑7 miles along the Fort Lauderdale Beach Trail three times a week, is a member of the South Florida Trail Runners club, follows the Miami Heat basketball
    season and the Miami Dolphins football schedule religiously, and attends a quarterly yoga retreat in Costa Rica to deepen their practice.
  arts: Jolanda Glaze frequents the NSU Art Museum and contemporary galleries, drawing inspiration from artists like Julie Mehretu, Ai Weiwei, and Mark Bradford; they create digital illustrations echoing
    James Turrell’s light installations, capture urban skylines in photography reminiscent of Andreas Gursky, and unwind at intimate jazz sessions featuring the Chris Potter Quartet or a local trio led
    by pianist Bill McHenry.
  travel: Jolanda Glaze plans trips with meticulous spreadsheets, balancing tech‑art conferences such as SITEX in Berlin and design festivals in Copenhagen with low‑key escapes like a solo weekend road
    trip to the Florida Keys for sunrise yoga and fresh seafood, while future itineraries include a month‑long immersion in Kyoto’s traditional crafts and a visit to the Venice Biennale.
  culinary: Jolanda Glaze enjoys cooking Mediterranean‑inspired dishes, frequently preparing grilled sea‑bass with lemon‑olive tapenade, roasted eggplant Parmesan, and saffron risotto, favoring ingredients
    such as Kalamata olives, capers, and pomegranate molasses; they are an adept home chef who experiments with food photography, but occasionally splurges on a deluxe sushi omakase for buttery toro at
    a high‑end Japanese restaurant.
  core: Jolanda Glaze is a solitary, detail‑driven convention architect who fuses art, technology, and sustainability, obsessively plans every facet of life, yet can’t resist late‑night puzzle binges and
    occasional luxury gadget splurges.
background:
  cultural: Jolanda grew up in a middle-class, primarily Anglo-American household in the Southeast United States, with family roots tracing back to Northern European (British and German) ancestors. Her
    upbringing emphasized self-reliance and education, while her adult life in Fort Lauderdale has immersed her in a multicultural, coastal environment. She embraces the region’s blend of Latin American,
    Caribbean, and international influences, which informs her appreciation for diverse artistic expressions and her ability to navigate cross-cultural event logistics.
attributes:
  skills: '[''Event logistics planning'', ''Project management'', ''Budgeting and financial oversight'', ''Vendor negotiation and contract management'', ''Risk assessment and contingency planning'', ''Data
    analysis and reporting'', ''Event technology integration (AV, streaming, virtual platforms)'', ''Creative concept development'', ''Strategic planning'', ''Sustainability and green event initiatives'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Digital photography and image editing'', ''Reading non-fiction on technology, philosophy, and design'', ''Sunrise yoga and coastal running'',
    ''Solving puzzles and logic games'', ''Attending intimate live music performances'', ''Experimenting with digital illustration'']'
  career_goals: She aims to become a senior director of conventions within a leading hospitality group, overseeing international flagship events that blend technology, art, and sustainability. In the next
    five years, she plans to earn CMP (Certified Meeting Professional) and PMP certifications, launch a boutique consultancy specializing in immersive tech-art experiences, and speak at industry conferences
    on data-driven event design. Long-term, she envisions establishing an annual South-Florida summit that attracts innovators from the creative and STEM sectors, positioning Fort Lauderdale as a hub for
    cross-disciplinary conventions.
