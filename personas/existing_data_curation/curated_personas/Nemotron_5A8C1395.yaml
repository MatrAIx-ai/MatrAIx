  hobbies: '[''Basketball'', ''LEGO building'', ''Science club projects'', ''Reading adventure books'', ''Puzzle solving (Sudoku)'', ''Listening to hip‑hop/R&B music'', ''Scratch programming'', ''Minecraft'',
    ''Community youth league activities'']'
  career_goals: In the near term, Marcus aims to become the captain of his elementary school basketball team and to earn a badge in his school's safety patrol program, reflecting his love for routine and
    community service. Looking ahead, he envisions a career that combines structure, teamwork and service, such as becoming a firefighter or police officer in his hometown of Rome, Ohio, where he can protect
    his community while working within a predictable schedule. He is also interested in engineering or construction, hoping to one day design and build projects that require meticulous planning. Winning
    a regional science fair and receiving a scholarship for his academic and athletic achievements are among his long‑term ambitions.
