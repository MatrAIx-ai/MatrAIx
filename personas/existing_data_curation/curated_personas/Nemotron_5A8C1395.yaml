personas:
  professional: Marcus Hernandez, an aspiring junior scientist, channels his love for methodical experiments and step-by-step LEGO building into a reputation as the go-to problem solver in his school's
    science club, always adhering to a strict plan and delivering polished presentations.
  sports: Marcus Hernandez, a point guard for the middle-school Hawks, devotes his after-school hours to mastering jump shots and defensive drills, idolizes the Los Angeles Lakers, especially LeBron James,
    for their disciplined play, and insists on a strict warm-up routine before each game.
  arts: Marcus Hernandez, an avid fan of hip-hop and R&B, frequently grooves to Kendrick Lamar and SZA while constructing elaborate LEGO scenes, and spends evenings immersed in adventure series like Rick
    Riordan's Percy Jackson, letting music and storytelling fuel his creative Minecraft worlds.
  travel: Marcus Hernandez, whose family road trips follow a meticulous checklist, loves revisiting Washington, D.C.'s museums, dreams of exploring Orlando's Disney World theme parks, and treasures summer
    stays at a nearby lake where he can practice basketball drills under the sun.
  culinary: Marcus Hernandez, who can confidently make a grilled cheese sandwich and eagerly adds extra cheese to his homemade pepperoni pizza, delights in the sweet crunch of chocolate chip cookies and
    the tangy zest of mango salsa on tacos, frequently requesting these dishes at family dinners.
  core: Marcus Hernandez balances a competitive spark and methodical mindset, turning routine LEGO builds and basketball drills into daily triumphs while battling occasional worry and a stubborn reluctance
    to deviate from familiar patterns.
background:
  cultural: Marcus is a Black boy raised in Rome, a small town in Ashtabula County, Ohio. His family is part of the local African American community that descends from migrants who moved north during the
    Great Migration, bringing a legacy of resilience, church involvement, and a strong emphasis on education. While the family primarily practices Christianity at a Baptist church, they also celebrate cultural
    traditions such as Juneteenth, soul food gatherings, and music that includes gospel, hip‑hop, and R&B, which shape Marcus’s identity. His surname, Hernández, reflects his mother’s Hispanic roots, giving
    him a mixed Afro‑Latino heritage that is celebrated at family gatherings with Spanish‑language dishes and stories. Growing up in the Midwest, Marcus benefits from a supportive neighborhood that values
    hard work, community service, and practical skills, all of which reinforce his routine‑oriented and service‑focused outlook.
attributes:
  skills: '[''Organizational skills'', ''Attention to detail'', ''Team collaboration'', ''Basic mathematics'', ''Reading comprehension'', ''Scratch programming'', ''Basketball fundamentals'', ''Time management'',
