personas:
  professional: Phuong Bandong is an aspiring data analyst who blends a solid foundation in molecular techniques with Python, R, and statistical modeling to extract public‑health insights from biomedical
    datasets, leveraging their cooperative nature and empathetic communication to bridge interdisciplinary teams while balancing a curiosity for novel methods with the practicality of meeting project deadlines.
  sports: Phuong Bandong is an avid hiker who spends weekends exploring Gooseberry Falls and Split Rock State Parks, practices yoga three times a week, follows the Minnesota Twins (MLB) and Minnesota Wild
    (NHL), and participates in the North Shore Trek Club’s group climbs, viewing fitness as a therapeutic outlet rather than a competitive pursuit.
  arts: Phuong Bandong is a weekend guitarist who strums acoustic renditions of Sufjan Stevens and Mitski for personal relaxation, regularly attends Southeast Asian cultural festivals to enjoy traditional
    dance and music, and immerses themselves in science‑fiction novels by N.K. Jemisin and the cinematic worlds of Christopher Nolan, letting creative narratives balance their analytical mind.
  travel: Phuong Bandong favors low‑budget adventures that combine nature and culture, having backpacked along the Upper Peninsula’s shoreline, taken a road trip to Yellowstone, and dreaming of strolling
    through Kyoto’s cherry‑blossom gardens; they meticulously plan itineraries using travel forums but leave room for spontaneous detours, while a student‑loan budget limits lengthy overseas trips.
  culinary: Phuong Bandong is a home cook who masters family‑heritage dishes such as fragrant lemongrass broth with rice noodles and herb‑infused grilled fish, while experimenting with fusion creations
    like pho‑tacos topped with cilantro and pickled daikon; they relish fresh herbs like coriander, Thai basil, and chilies, and often blend post‑yoga smoothies featuring spinach, mango, and chia seeds.
  core: Phuong Bandong is a data‑driven idealist who tempers curiosity with caution, using mindfulness rituals to counteract an anxious mind while juggling analytical projects and creative hobbies.
background:
  cultural: Phuong is a first‑generation American of Southeast Asian descent, with her family originating from Vietnam. Growing up in Saint Paul, she was raised in a bilingual household where Vietnamese
    language, cuisine, and holiday traditions were integral to daily life. Her parents emphasized education, respect for elders, and community solidarity, values that still guide her decisions. She actively
    participates in the local Vietnamese community, attending Tet celebrations and supporting cultural preservation initiatives. While she embraces American customs and values independence, she also maintains
    strong ties to her heritage through family gatherings, traditional music, and a deep appreciation for the resilience of immigrant experiences. This dual cultural lens informs her worldview, fostering
    both a sense of belonging and a desire to bridge gaps between diverse communities.
attributes:
  skills: '["Data analysis (Python, R)", "Statistical modeling", "Laboratory techniques (PCR, spectroscopy)", "Experimental design", "Technical writing", "Project coordination", "Problem solving", "Team
    collaboration", "Empathetic communication", "Time management"]'
  hobbies: '["Reading (science fiction, popular science)", "Cooking Vietnamese and fusion cuisine", "Yoga and meditation", "Hiking in local parks", "Volunteer tutoring in STEM", "Playing acoustic guitar",
    "Journaling", "Attending cultural festivals"]'
  career_goals: Phuong aims to build a career at the intersection of data science and public health, leveraging her analytical skills to uncover insights that improve community health outcomes. She plans
    to pursue a master's degree in bioinformatics or health informatics to deepen her expertise in handling large‑scale biomedical data. In the short term, she seeks an entry‑level data analyst position
    where she can apply her statistical knowledge while learning industry best practices. Long‑term, she aspires to lead multidisciplinary research projects that address health disparities in underserved
    Southeast Asian immigrant communities, balancing her curiosity for new methodologies with a practical focus on tangible impact. She also intends to cultivate resilience strategies—such as mindfulness
    and structured work routines—to manage stress and maintain well‑being throughout her professional journey.
