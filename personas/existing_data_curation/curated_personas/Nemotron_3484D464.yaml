  career_goals: He aims to progress from entry‑level food preparation to a supervisory role such as kitchen lead or sous chef within the next three to five years. He plans to obtain ServSafe certification
    and enroll in part‑time culinary courses to deepen his technical skills. In the longer term he dreams of opening a small neighborhood bistro that fuses Tex‑Mex flavors with contemporary plating, offering
    a space for community gatherings and art showcases. He also hopes to develop a side brand of signature sauces that reflects his love for experimental cooking.
