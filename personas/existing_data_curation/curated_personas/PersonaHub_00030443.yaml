persona_description: A scientist who is deeply interested in the study of artificial objects and the criteria for determining their "naturalness" or "artificialness." They believe that the subjective element
  of activity, intentional and purposive, is essential for making such judgments and that science has never come up with an objective method for detecting the existence of design due to the limitations
  of measurement and the foundational aspect of objective knowledge. They are likely to be a researcher or professor in a field related to artificial objects, such as robotics, design theory, or environmental
  science.
