personas:
  professional: Eric Cooper is a budding architect who loves snapping LEGO bricks together into intricate structures, using their spontaneous curiosity to experiment with unconventional designs while often
    neglecting to follow step‑by‑step instructions.
  sports: Eric Cooper is a spirited member of the Little Lions youth soccer team, cheering loudly at matches, while also delighting in spontaneous games of tag and hide‑and‑seek at the neighborhood playground,
    though they often resist the routine of scheduled practices.
  arts: Eric Cooper delights in painting bright landscapes inspired by Dr Seuss, constructing LEGO sculptures, and singing along to childhood music icons like Raffi while watching animated Disney classics,
    all of which shape their imaginative identity.
  travel: Eric Cooper has explored the city zoo and a state amusement park with family, dreams of visiting Disney World in Florida and the Grand Canyon for a grand outdoor adventure, and prefers spontaneous
    day trips over meticulously planned vacations because they love impromptu discovery.
  culinary: Eric Cooper favors cheesy pizza slices, chicken nuggets, and strawberry smoothies, enjoys mixing fruit and yogurt to create colorful parfaits, and often experiments with kitchen play dough made
    from flour and water, though they frequently forget to wash their hands before snack time.
  core: Eric Cooper is a curious, energetic six‑year‑old who blends artistic LEGO building with spontaneous play, occasionally losing track of organization and impulsively spending allowance on bright treats.
background:
  cultural: Eric grows up in a Midwestern American household in Grand Rapids, Michigan, with Euro‑American roots that may include German, Irish, or Scandinavian ancestry—common in the region. His family
    celebrates traditional holidays such as Thanksgiving, Halloween, and the winter holiday season, and they participate in local community events like ArtPrize and neighborhood festivals. At preschool,
    multicultural awareness is encouraged, exposing him to a variety of cultural stories and activities. This background blends a strong sense of community, respect for nature, and an appreciation for the
    arts.
