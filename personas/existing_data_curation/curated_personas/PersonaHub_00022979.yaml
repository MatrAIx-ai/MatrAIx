persona_description: A Java Developer who is interested in using JSF and ADF to build enterprise applications. This person is familiar with the concepts of managed beans, JSF components, and ADF data bindings.
  They have experience with XML configuration files and are looking for a way to register managed beans in a way that keeps the presentation logic separate from the application logic. This person is likely
  to be interested in the Create Managed Bean dialog in the JSF configuration file, which allows them to register and create new managed beans. They are looking for a way to define and manage managed beans
  in a way that allows them to keep the presentation logic separate from the application logic, while also being able to easily access and manipulate the beans within their application.
