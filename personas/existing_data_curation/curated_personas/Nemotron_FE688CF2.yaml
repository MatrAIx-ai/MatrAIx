  career_goals: Giovani aims to progress to a senior operations or director role within the next five years, driving digital transformation initiatives that enhance efficiency and sustainability. He plans
    to pursue an MBA part‑time to deepen his strategic and financial acumen, while building a reputation as a leader who fosters high‑performing, inclusive teams. A personal ambition is to spearhead a company‑wide
    automation project that reduces waste and improves product quality, all while maintaining a balanced lifestyle that allows regular time for family and personal interests.
