  career_goals: She aspires to pursue a career that combines her curiosity for science and her desire to help others. Melissa aims to become a pediatric nurse or a health educator, where she can apply her
    practical knowledge and compassionate nature. In the short term, she plans to join a high school STEM program, volunteer at the local community health center, and develop leadership skills through student
    council. Ultimately, she hopes to earn a degree in nursing or public health to contribute to community well‑being.
