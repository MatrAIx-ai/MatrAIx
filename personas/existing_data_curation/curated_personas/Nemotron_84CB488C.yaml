personas:
  professional: Alida Gutierrez, an aspiring elementary school teacher, already practices practical classroom management by leading soccer drills and theater rehearsals with her friends, combining her strong
    compassion and cooperative spirit with a relaxed, flexible approach that keeps the group harmonious while allowing room for spontaneous fun.
  sports: Alida Gutierrez dashes around the neighborhood park as a striker for the City Youth Soccer Club’s U9 "Strikers" squad, idolizes the Los Angeles Galaxy, and channels her energy into weekly dance
    practice to upbeat folk rhythms, making fitness a social, spontaneous adventure.
  arts: Alida Gutierrez lights up school theater rehearsals with the enthusiasm of a budding actress, sketches vibrant family portraits reminiscent of Dr. Seuss’s whimsical style, and sways to the lively
    beats of Shakira’s music, weaving performance, illustration, and sound into her everyday play.
  travel: Alida Gutierrez prefers family‑led excursions that blend adventure and routine, having explored the local zoo and the Grand Canyon on school trips while dreaming of a future stay at Disney World’s
    Magic Kingdom where she can wander themed lands with her friends.
  culinary: Alida Gutierrez enjoys stirring sweet rice pudding (arroz con leche) with a pinch of cinnamon and hand‑rolling cheese‑filled empanadas alongside her mother, and proudly practices making simple
    mozzarella pizza slices topped with fresh tomato sauce, though she often leaves a smudge of flour on her cheek.
  core: Alida Gutierrez, a socially vibrant eight‑year‑old who thrives on routine yet happily embraces spontaneous play, balances compassion with occasional forgetfulness, and sprinkles every day with soccer
    kicks, theater flair, and a sprinkle of flour on her cheek.
background:
  cultural: Alida comes from an Ecuadorian family that maintains strong ties to its cultural roots while living in Passaic, New Jersey. At home, Spanish is spoken daily, and she participates in family traditions
    such as preparing dishes like ceviche, llapingachos, and pan de yuca during holidays. The family celebrates Ecuadorian festivals, listens to Andean music, and teaches Alida traditional dances like the
    San Juanito. Growing up in a vibrant Latino neighborhood, she attends cultural events at local community centers, learns about the importance of family solidarity, and balances these heritage practices
    with the multicultural environment of her school and city.
attributes:
  skills: '[''Bilingual reading (English & Spanish)'', ''Basic arithmetic'', ''Team collaboration and conflict mediation'', ''Empathy and peer support'', ''Following step-by-step instructions (e.g., cooking,
