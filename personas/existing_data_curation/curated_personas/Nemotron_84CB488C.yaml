  hobbies: '[''Playing soccer with friends'', ''Traditional Ecuadorian dancing'', ''Reading bilingual storybooks'', ''Drawing and coloring'', ''Cooking simple family recipes'', ''Participating in school
    clubs and theater'', ''Attending community festivals'', ''Girl Scouts badge activities'']'
  career_goals: Alida dreams of a future where she can care for and teach children, aspiring to become a pediatric nurse or elementary school teacher. She is also interested in supporting her community's
    health and cultural well-being, imagining a role as a community health aide who helps families access resources while preserving Ecuadorian traditions. Her long-term ambition is to blend her compassionate
    nature with practical skills, ensuring she can make a positive, hands-on difference in people's lives.
