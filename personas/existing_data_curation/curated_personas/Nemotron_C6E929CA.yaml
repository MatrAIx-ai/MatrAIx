  career_goals: Marling aims to advance from supervising a single office to overseeing multiple locations as an Operations Manager within the next five years. She plans to complete a Bachelor’s degree in
    Business Administration and earn a Project Management Professional (PMP) certification, followed by a Lean Six Sigma Green Belt. Her ambition is to lead organization‑wide efficiency initiatives, mentor
    emerging supervisors, and eventually transition into a strategic role that shapes policy and growth for a regional hospitality or tourism enterprise in Lake Havasu City.
