personas:
  professional: Donovan Badger, a playful 3-year-old aspiring builder, assembles towering block structures with meticulous order, demonstrating an early love for organization while they eagerly share pieces
    with friends during group play.
  sports: Donovan Badger, a member of the Tiny Jumpers gymnastics class that meets twice a week, loves sprinting across the backyard and enthusiastically cheers for the Los Angeles Lakers while they mimic
    the team's victory dances.
  arts: Donovan Badger, an avid fan of The Wiggles and Sesame Street's Elmo, splashes colorful crayons on paper while humming 'Hot Potato' and often imitates Peppa Pig's playful squeals during storytime,
    delighting everyone as they express their boundless creativity.
  travel: Donovan Badger, who prefers short car rides with familiar caregivers, has delighted in a family trip to Disney World in Florida and a weekend visit to grandparents' farm in Iowa, dreaming of a
    future adventure to the snowy peaks of the Swiss Alps as they imagine new horizons.
  culinary: Donovan Badger, who adores mac and cheese with shredded cheddar and peas, loves dipping apple slices in peanut butter, and proudly pretends to stir a pot in his wooden play kitchen, often requesting
    extra cheese on their meals as they explore flavors.
  core: Donovan Badger combines a toddler's boundless energy with a surprising love for order, insisting on lining up toys by color before play, yet they can't resist stealing a cookie when no one watches.
background:
  cultural: Donovan is raised in Arcadia, Wisconsin, a small Midwestern town where community gatherings, local fairs, and a connection to the land shape everyday life. His family values cooperation, modesty,
    and a strong sense of belonging, and they often participate in neighborhood events and seasonal agricultural activities. This environment emphasizes practicality, respect for nature, and close family
    ties, providing Donovan with a cultural foundation rooted in rural Wisconsin traditions.
attributes:
  skills: '["basic motor coordination", "vocabulary building", "color and shape sorting", "simple puzzle solving", "following daily routines", "participating in group play", "assertive communication", "practical
    problem solving"]'
  hobbies: '["building block towers", "shape‑sorting games", "rhythmic storybooks", "dancing to simple songs", "outdoor park play", "sandbox play with peers", "pretend firefighting games", "group sing‑along
    sessions", "observing farm animals", "simple puzzle solving"]'
  career_goals: Although still a toddler, Donovan often talks about future roles that involve clear structure, helping others, and hands‑on work. He dreams of becoming a firefighter because he likes the
    idea of order, safety, and wearing a uniform. He also shows interest in farm life, inspired by visits to the family’s rural surroundings, and imagines himself as a builder or construction helper who
    creates things he can see and touch. His ambitions reflect a desire to be reliable, community‑focused, and practical.
