personas:
  professional: Michael Barton is a budding architect who meticulously arranges Lego bricks into orderly cityscapes, follows a strict daily schedule for building sessions, and they become upset if any piece
    is misplaced.
  sports: Michael Barton plays organized soccer with the Tiny Kickers club, cheerfully watches the New York Yankees on weekends, and they adhere to a structured practice timetable that includes timed drills
    and a daily cool-down stretch.
  arts: Michael Barton immerses in drawing with colorful crayons, delights in watching Pixar's Toy Story and listening to The Wiggles, they often stage miniature puppet shows at home, arranging every character
    in precise rows.
  travel: Michael Barton prefers family vacations that follow a detailed itinerary, like a weekend trip to the local zoo with set feeding times and a planned afternoon at the aquarium, and they dream of
    seeing the cherry blossoms in Tokyo during spring.
  culinary: Michael Barton loves macaroni and cheese with extra cheddar, proudly makes peanut butter and banana sandwiches, they request a dash of honey on their pancakes for a sweet finish, and they meticulously
    line up their snack plates for visual symmetry.
  core: Michael Barton is a meticulous five-year-old who thrives on rigid routines, competes fiercely with their own block towers, and is prone to intense anxiety whenever plans shift unexpectedly, often
    prompting them to clutch a favorite stuffed rabbit and they frequently ask for extra reassurance from their parents.
background:
  cultural: Michael comes from a white, middle‑class family rooted in the Harrisonburg, Virginia community. His household observes Protestant (Methodist) traditions, celebrating holidays such as Christmas,
    Thanksgiving, and Easter with family meals, church services, and seasonal crafts. He often participates in local community events like the county fair and the town's summer festival, where he enjoys
    simple games and homemade foods. His parents place a strong emphasis on routine, education, and polite manners, reflecting the broader Southern‑Appalachian values of respect, hospitality, and community
    involvement.
attributes:
  skills: '[''Organizing toys by category'', ''Following multi‑step routines'', ''Completing jigsaw puzzles'', ''Counting and basic addition'', ''Reciting the alphabet'', ''Reading simple sight‑words'',
