  hobbies: '[''Building LEGO constructions'', ''Solving jigsaw and matching puzzles'', ''Reading picture books'', ''Playing with a train set'', ''Drawing detailed pictures'', ''Listening to story podcasts'',
    ''Collecting and sorting natural objects on nature walks'']'
  career_goals: Even at five, Michael is drawn to careers that promise clear rules, structure, and a chance to prove himself. He talks about wanting to become a police officer or firefighter because he
    admires the orderly schedules, uniforms, and the idea of helping others while following protocols. He also day‑dreams about being an engineer or architect, envisioning himself designing buildings and
    bridges where everything fits perfectly. His competitive streak pushes him to imagine being "the best" in any role he chooses, and he often says he wants to lead a class or be a team captain when he
    grows older.
