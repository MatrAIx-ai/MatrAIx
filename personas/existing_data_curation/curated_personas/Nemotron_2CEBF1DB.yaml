personas:
  professional: Charles Thompson is a 17‑year‑old aspiring diesel mechanic and welder who leverages his hands‑on mechanical intuition and practical woodworking skills to troubleshoot engines and build small
    projects, while his laid‑back, somewhat disorganized nature means he prefers learning by doing rather than following strict curricula.
  sports: Charles Thompson enjoys snowmobiling with the Mancelona Trail Riders club in winter, fishes lakes in summer, and follows the Detroit Red Wings and Michigan Wolverines, while they keep fit by hiking
    local forest trails and doing occasional garage‑based strength work.
  arts: Charles Thompson channels creative energy into video editing set to the soundtrack of Bob Dylan and Jack Johnson, while they admire indie filmmaker Greta Gerwig and attend the county fair’s live
    folk music shows featuring the local Bluegrass Band.
  travel: Charles Thompson prefers spontaneous road trips to nearby gems like Mackinac Island and Pictured Rocks, balances a modest travel budget with a desire to someday explore Iceland’s geothermal farms,
    and they plan most outings on a whim using maps drawn on their phone rather than detailed itineraries.
  culinary: Charles Thompson loves cooking campfire‑style smoked trout, hearty chili with beans, and homemade apple pie, their cooking skill is modest but they enjoy experimenting with fresh‑caught fish,
    juniper‑infused rubs, and using a cast‑iron skillet for wilderness meals.
  core: Charles Thompson is a curiosity‑driven teen mechanic who trades organized schedules for hands‑on projects, impulsively buys tools, battles occasional allergies, and finds peace in lakeside solitude
    and the hum of an engine.
background:
  cultural: Charles grew up in the small, close‑knit community of Mancelona, Michigan, a town steeped in Upper‑Peninsula traditions. His family’s heritage blends German, Irish, and Scandinavian roots, common
    among the region’s early settlers. The local culture emphasizes self‑reliance, modesty, and a strong connection to the natural environment. Community life often revolves around church gatherings, school
    sports, county fairs, and seasonal outdoor activities like hunting and snowmobiling. These surroundings have fostered Charles’s respect for nature, his collaborative outlook, and his appreciation for
    both old‑world craftsmanship and modern practical skills.
attributes:
  skills: '["Basic automotive troubleshooting", "Routine car maintenance", "Simple woodworking and carpentry", "Fishing and hunting safety knowledge", "Outdoor navigation and map reading", "Computer literacy
