  hobbies: '["Fishing", "Snowmobiling", "Hiking", "Woodworking projects", "Video gaming (strategy and sandbox genres)", "Basic video editing", "Community fair participation", "DIY car and bike modifications"]'
  career_goals: Charles aims to channel his curiosity and practical skills into a skilled trade. He plans to obtain a high‑school equivalency credential and then enroll in a community‑college apprenticeship
    program for diesel mechanics or welding. His long‑term ambition is to become a certified technician who can run his own workshop, allowing him the flexibility he values while staying grounded in hands‑on
    problem solving. He also hopes to keep learning new technologies, possibly branching into renewable‑energy equipment maintenance.
