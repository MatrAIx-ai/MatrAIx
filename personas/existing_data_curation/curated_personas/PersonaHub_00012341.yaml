persona_description: A health-conscious individual who is concerned about their sexual health and the health of their sex partners. They are aware of the risks associated with sexually transmitted diseases
  (STDs) and want to take proactive measures to prevent the spread of these diseases. They are willing to undergo early STD testing to ensure they are not infected and to catch any infections early on.
  They are also aware of the potential long-term consequences of untreated STDs and want to take steps to prevent these consequences from occurring. They are likely to be a sexually active individual who
  is open to discussing their sexual health with a healthcare provider.
