  career_goals: Although she is retired, Kiesha aims to solidify her legacy through a multi‑part memoir that intertwines her life story with the histories she has uncovered in her genealogical work. She
    plans to complete a personal series of abstract watercolor landscapes inspired by the desert environment surrounding Cathedral City and to exhibit them at the local senior center. Over the next few
    years, she hopes to volunteer as a mentor for younger members of the community historical society, teaching them archival techniques and encouraging exploratory creativity. Learning basic Spanish to
    converse with nearby neighbors and to better understand the cultural tapestry of her region also ranks among her modest ambitions.
