persona_description: A public health researcher who specializes in the study of HPV vaccination and its impact on cervical, genital, and anal cancers. She is particularly interested in the effects of vaccination
  on oral cancer risk and the potential for the HPV vaccine to become one of the most significant cancer prevention tools ever developed. Her research has focused on evaluating the effectiveness of HPV
  vaccines in reducing the risk of these cancers, and the impact of vaccination rates on the prevalence of HPV infection.
