  hobbies: '[''Chinese calligraphy'', ''Watercolor painting'', ''Visiting art galleries'', ''Cooking East Asian cuisine'', ''Hiking'', ''Tai chi'', ''Reading philosophy'', ''Medical literature review'',
    ''Mentoring high‑school students'', ''Participating in small community art workshops'']'
  career_goals: Kwi aims to transition into a nurse informatics leadership role within the next five years, using his data‑driven mindset to design patient‑centered technology solutions. He plans to earn
    a Doctorate in Nursing Practice (DNP) with a focus on health informatics and evidence‑based practice. He also intends to spearhead a pilot program that incorporates visual art and calligraphy sessions
    for patients undergoing long‑term treatment, measuring improvements in patient satisfaction and outcomes. Additionally, he aspires to mentor junior nurses, develop continuing‑education workshops on
    cultural competency, and eventually serve as a nursing director for a community health organization in Montgomery County.
