personas:
  professional: Ruth Marsh is a budding LEGO architect who meticulously follows building instructions, turning each step into a mini‑project that satisfies their love for structure and predictable outcomes,
    and they take pride in keeping each piece neatly organized.
  sports: Ruth Marsh joins the local Little Sprouts soccer team for weekly Saturday practices, loves splashing in the community pool during summer swim lessons, and cheers for the hometown baseball club,
    the Riverdale Runners, while they prefer small‑group games over large, chaotic matches.
  arts: Ruth Marsh delights in drawing bright animal sketches while listening to Raffi's 'Baby Beluga' and reading Mo Willems picture books, and they occasionally stage spontaneous dress‑up performances
    inspired by Disney's 'Frozen' characters, proudly collecting stickers of their favorite illustrator, Dr. Seuss.
  travel: Ruth Marsh loves family outings to the nearby nature reserve where they collect shells and rocks, dreams of a magical weekend at Disneyland, and enjoys brief visits to Grandma's countryside cottage,
    preferring short, structured trips that fit their need for routine and comfort, and they often bring along a small notebook to sketch the scenery.
  culinary: Ruth Marsh favors cheesy pizza slices, peanut butter & jelly sandwiches, and apple slices with caramel dip, and they enjoy helping stir batter for chocolate chip cookies, proudly naming their
    favorite dish as 'rainbow veggie pasta' featuring bright carrots, peas, and corn.
  core: Ruth Marsh balances a love for predictable LEGO builds with spontaneous dress‑up adventures, clings to routine while they secretly cherish small‑group games, and they tend to misplace spare change
    in their pink piggy bank.
background:
  cultural: Ruth is raised in a middle‑class, primarily Anglo‑American family in Bonney Lake, Washington. Her upbringing reflects the Pacific Northwest’s emphasis on outdoor recreation, community involvement,
    and respect for nature. The family celebrates mainstream holidays such as Thanksgiving, Christmas, and the Fourth of July, and participates in school and neighborhood events that value politeness, cooperation,
    and modesty. Exposure to local parks, hiking trails, and seasonal activities has fostered her love of nature, while a strong focus on education encourages her curiosity and structured learning habits.
attributes:
  skills: '[''reading simple sentences'', ''writing her name and basic words'', ''counting to 20'', ''basic addition and subtraction with objects'', ''organizing school supplies'', ''following multi-step
    craft instructions'', ''building with LEGO'', ''solving simple jigsaw puzzles'', ''basic tablet navigation for educational apps'', ''empathetic and cooperative play'']'
  hobbies: '[''reading picture books'', ''drawing and coloring animals'', ''building LEGO constructions'', ''playing simple board games with a small group of friends'', ''collecting rocks and shells during
    nature walks'', ''caring for the family dog'', ''exploring local parks and trails'', ''solving jigsaw puzzles'', ''listening to children’s music'', ''spontaneous dress‑up play'']'
  career_goals: Ruth often says she wants to be a teacher or a librarian when she grows up because she loves books, enjoys helping friends learn, and likes creating calm, organized spaces. She also imagines
    becoming a veterinarian, caring for animals with gentle hands, which reflects her kindness and desire to keep harmony. These aspirations combine her preference for structure, her practical focus on
    helping others, and her flexible imagination about future possibilities.
