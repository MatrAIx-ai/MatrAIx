personas:
  professional: Carmela Tran, a high school sophomore and aspiring visual storyteller, blends hand‑drawn sketches, mixed‑media collages, and iPad illustration to craft graphic narratives that explore cultural
    identity while balancing school responsibilities and collaborative art workshops at the local community center.
  sports: Carmela Tran, an avid hiker on Laguna Beach trails and a member of her high school’s cross‑country team, follows the Los Angeles Angels baseball and supports the LA Galaxy soccer club, while playing
    weekend beach volleyball at local parks.
  arts: Carmela Tran, a passionate visual creator, devours graphic novels by Marjane Satrapi, draws inspiration from manga artist Naoko Takeuchi, curates playlists featuring Billie Eilish and K‑pop hits,
    and attends local community theater performances of traditional dance recitals, integrating these influences into her own mixed‑media collages.
  travel: Carmela Tran, who enjoys spontaneous day trips to the Santa Monica Pier and annual family vacations to the bustling streets of Saigon, dreams of exploring Tokyo’s Akihabara district and backpacking
    through the coastal villages of Bali for fresh artistic inspiration.
  culinary: Carmela Tran, who loves cooking bánh mì with avocado and a dash of sriracha, perfects her family’s phở broth with extra star anise, experiments with fusion dishes like phở ramen, and delights
    in making mango sticky rice for dessert, while mastering the art of crafting artisanal matcha lattes for friends.
  core: Carmela Tran, a curious teen artist who balances vibrant cultural traditions with modern creativity, often loses sleep over school projects but never skips a sketch session, and can’t resist adding
    a splash of avocado to every bánh mì.
background:
  cultural: Carmela is a second‑generation Southeast Asian American, born to Vietnamese immigrant parents who settled in Orange County’s vibrant Little Saigon community. She grew up in a bilingual household,
    speaking Vietnamese with her family while attending an English‑language school. The family celebrates Vietnamese holidays such as Tet and Mid‑Autumn Festival, and often gathers for traditional meals
    and cultural performances. These customs instill a strong sense of respect for elders and community solidarity. At the same time, Carmela embraces typical American teenage culture—pop music, social
    media, and school clubs—creating a bicultural identity that blends her heritage with her Californian upbringing. This dual perspective informs her artistic voice, prompting her to explore themes of
    cultural pride, assimilation, and intergenerational dialogue.
