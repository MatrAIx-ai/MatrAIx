  career_goals: Carmela dreams of turning her love for visual storytelling into a professional career. In the next few years she plans to apply to a competitive arts‑focused high school, deepen her digital‑art
    portfolio, and take advanced courses in illustration and graphic design. Her long‑term ambition is to study visual communication or multimedia art at a college where she can merge creativity with social
    impact. She hopes to work as a graphic designer or visual storyteller for non‑profit organizations that champion immigrant and cultural‑heritage causes, creating posters, animations, and campaigns that
    celebrate Southeast Asian traditions while fostering cross‑cultural understanding. Eventually, Carmela also envisions teaching art workshops for younger students in her community, passing on the confidence
    and skills she has gained.
