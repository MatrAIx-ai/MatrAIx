personas:
  professional: Gary Schuyler is an auditor at a midsized public accounting firm who combines GAAP and IFRS expertise with Power BI visual storytelling, mentors junior staff through collaborative workshops,
    and champions sustainability‑focused integrated reporting as they work toward CPA certification.
  sports: Gary Schuyler stays active by hiking the White Mountains with a local trail club, participating in charity 5K runs organized by their food‑pantry volunteer group, and cheering on the Boston Red
    Sox and Boston Celtics, while occasionally joining intramural soccer matches for a social workout.
  arts: Gary Schuyler fuels their creative side by visiting New England galleries such as the Museum of Fine Arts, attending the Boston Calling music festival, playing acoustic guitar at open‑mic nights
    at The Sinclair, painting watercolors of mountain vistas, and performing improv with a downtown theater troupe, drawing inspiration from Monet, Georgia O’Keeffe, and singer‑songwriter Bon Iver.
  travel: Gary Schuyler blends meticulous itinerary planning with spur‑of‑the‑moment road trips, having trekked the White Mountains, explored New York City’s art districts, and sampled Portland’s food scene,
    while dreaming of a month‑long immersion in Tuscany’s Renaissance towns and vineyards.
  culinary: Gary Schuyler enjoys experimenting in the kitchen, regularly preparing dishes like seared scallops with corn risotto, homemade gnocchi with sage brown butter, and classic New England clam chowder,
    favoring fresh herbs, wild mushrooms, and locally sourced seafood, and often hosts informal dinner gatherings for friends.
  core: Gary Schuyler is a curiosity‑driven accountant‑artist who balances spreadsheets with watercolor sketches, thrives on community engagement, and occasionally forgets to floss after late‑night jam
    sessions.
background:
  cultural: Gary is a third‑generation New Englander of Irish and English descent. He grew up in a modest suburban family in the Merrimack Valley, where community involvement, self‑reliance, and a respect
    for education were core values. The region’s seasonal changes, historic colonial towns, and strong local traditions—such as the New Hampshire Agricultural Fair and Fourth of July parades—shaped his
    appreciation for both heritage and innovative ideas. His participation in volunteer drives and local arts events reflects a deep commitment to the collaborative, harmony‑seeking spirit characteristic
    of his cultural upbringing.
