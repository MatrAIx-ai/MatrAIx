  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Landscape photography'', ''Acoustic guitar playing'', ''Improv theater'', ''Volunteering at food pantry'', ''Organizing charity runs'',
    ''Cooking experimental cuisine'', ''Hiking in the White Mountains'', ''Attending music festivals'']'
  career_goals: Gary aims to obtain his CPA license within the next year and advance to a senior manager position in his firm, where he can lead strategic initiatives in sustainability and integrated reporting.
    Long‑term, he envisions becoming a CFO for a mid‑sized nonprofit or technology company, using his financial expertise to drive social impact. He also plans to launch a community‑focused consulting practice
    that provides pro‑bono financial guidance to local small businesses and charities, combining his professional skills with his strong desire to help others and maintain harmony within his community.
