  career_goals: Quoc imagines future jobs that involve helping others and exploring new frontiers. He frequently says he wants to become a firefighter, an astronaut, or a teacher. In the preschool setting,
    he strives to earn gold stars and stickers, aiming to be the top reader and the best at completing puzzles, reflecting his drive for structured achievement.
