personas:
  professional: Quoc Duong, a budding block architect, meticulously arranges LEGO bricks into precise towers and bridges, and they channel their natural discipline and love for order into early engineering
    play.
  sports: Quoc Duong shuffles between Saturday soccer practice with the local under-5 team, waves a tiny Detroit Tigers cap during family baseball outings, and they love sprinting around the playground
    on a bright orange scooter.
  arts: Quoc Duong delights in drawing cartoon dragons after Lunar New Year festivities, sings along to the catchy tunes of 'Moana' on repeat, and they collect plush toys of their favorite Sesame Street
    characters.
  travel: Quoc Duong prefers short road trips to nearby parks like Belle Isle for picnics, occasionally joins family outings to the Ann Arbor Art Fair, and they dream of one day seeing the lanterns of a
    distant Asian city.
  culinary: Quoc Duong loves slurping warm pho broth at home, proudly rolls tiny spring rolls with their grandparents, and they insist on biting into crunchy chicken nuggets topped with a drizzle of ketchup.
  core: Quoc Duong blends meticulous orderliness with a playful curiosity, hoarding stickers and arranging toys while dreaming of building towering LEGO kingdoms, and they often nap with a favorite stuffed
    turtle.
background:
  cultural: Quoc comes from a Southeast Asian family, likely of Vietnamese heritage, that settled in Warren, Michigan. At home, Vietnamese is spoken alongside English, and the family observes cultural traditions
    such as Lunar New Year celebrations, enjoys foods like pho and spring rolls, and participates in community events at a local Vietnamese cultural center. This bicultural environment blends values of
    respect, discipline, and communal harmony with the American preschool experience.
