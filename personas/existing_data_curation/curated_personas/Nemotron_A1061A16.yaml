  career_goals: His near‑term goal is to secure a senior operations leadership position—such as Operations Manager or Director of Business Operations—where he can spearhead data‑driven process transformation
    across product, engineering, and customer success teams. He aims to integrate AI‑enabled analytics into operational dashboards, reduce cycle times by 20% through intelligent automation, and nurture
    a culture of continuous improvement. Over the next five years, he envisions obtaining a PMP certification and an executive MBA to broaden his strategic perspective, and eventually founding a consultancy
    that helps fast‑growing startups embed scalable, inclusive operational frameworks. He also seeks to become a mentor for younger professionals from immigrant backgrounds, championing diversity and resilience
    in the workplace.
