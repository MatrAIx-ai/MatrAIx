persona_description: A researcher interested in the study of language and social cognitive skills in patients with schizophrenia, specifically focusing on the impact of disfluency on dialogue. This researcher
  is interested in exploring the differences in disfluency behaviors between patients with schizophrenia and their interlocutors who are unaware of the patient's diagnosis, compared to healthy control groups.
  This research aims to contribute to the understanding of how these problems impact patients' experience of social exclusion and to inform future interventions aimed at improving social skills in patients
  with schizophrenia.
