personas:
  professional: Cheryl Rosa is a rising community arts program manager who blends meticulous event planning with magnetic public speaking; they channel their curiosity and sociability into curating inclusive
    pop‑up exhibitions and forging partnerships between local businesses and emerging artists.
  sports: Cheryl Rosa follows the Chicago Bulls and the St. Louis Cardinals with fervor, joins a local yoga studio for thrice‑weekly flow sessions, runs the annual Danville 5K in spring, and rides with
    the Midwest Cycling Club on summer weekends, preferring a flexible fitness schedule that fits around their event planning duties.
  arts: Cheryl Rosa immerses herself in the local arts scene by frequenting the Danville Art Gallery, attending community renditions of Tennessee Williams' The Glass Menagerie, snapping street murals inspired
    by Banksy and Shepard Fairey, and drawing inspiration from contemporary creators like Olafur Eliasson and Frida Kahlo, which fuels both her photography and event curating.
  travel: Cheryl Rosa seeks out art‑focused travel, having explored the minimalist installations of Marfa, Texas, the bustling street art of Austin's SXSW art block, the Santa Fe International Folk Art
    Market, and Berlin's Gallery Weekend, planning trips via Airbnb and a points‑earning travel credit card while balancing a modest budget and occasional weekend getaways with friends.
  culinary: Cheryl Rosa enjoys experimenting in the kitchen, whipping up intermediate‑level dishes such as shakshuka with harissa, miso‑glazed salmon, and kimchi fried rice, favoring bold ingredients like
    sumac, za'atar, and preserved lemons, and often stocks obscure spice jars from local farmer's markets for her game‑night feasts.
  core: Cheryl Rosa blends an insatiable curiosity for the arts with a charismatic, talkative nature, turning every social gathering into a collaborative canvas while juggling a penchant for spontaneous
    coffee‑shop brainstorming sessions and a tendency to forget timely bill payments.
background:
  cultural: Cheryl is a white Midwesterner raised in the small‑town environment of Danville, Illinois. Her family’s roots trace back to German and Irish ancestry, common in the region, and she grew up with
    the values of Midwestern hospitality, modesty, and a strong work ethic. Church gatherings, county fairs, and community sports were central to her upbringing, fostering a deep appreciation for local
    traditions. While she embraces these cultural foundations, Cheryl’s curious personality pushes her to seek diverse artistic perspectives, blending the practicality of her Midwestern background with
    an open‑minded enthusiasm for unconventional ideas and experiences.
attributes:
  skills: '[''Public speaking'', ''Networking'', ''Event planning'', ''Community outreach'', ''Social media management'', ''Basic graphic design'', ''Research and data organization'', ''Microsoft Office
    proficiency'', ''Conflict resolution'', ''Customer service'', ''Peer tutoring in writing and presentation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater and live music'', ''Photography'', ''Reading contemporary fiction and art theory'', ''Experimental cooking'', ''Traveling
    to regional art festivals'', ''Yoga'', ''Volunteering at youth art programs'', ''Hosting game nights and social mixers'']'
  career_goals: Cheryl aims to transition into a role that merges her love for art with her sociable, organized nature, such as becoming a community arts program manager or freelance cultural event coordinator.
    She envisions working for a nonprofit arts council in the Midwest, designing inclusive workshops, curating pop‑up exhibitions, and fostering partnerships between local businesses and artists. To solidify
    these ambitions, she plans to pursue a bachelor's degree in arts administration or marketing while building a portfolio of successful community events. Long‑term, Cheryl dreams of opening a boutique
    art space in Danville that serves as a hub for emerging creators and a venue for interactive, unconventional art experiences.
