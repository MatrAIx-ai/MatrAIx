  career_goals: Gregory aims to turn his diverse creative talents into a sustainable portfolio career that blends freelance design, illustration, and community arts leadership. He envisions launching a
    small studio that offers custom artwork, graphic design for local businesses, and curated pop‑up exhibitions in Kirkland. He also wants to develop an online channel featuring tutorials, art trips, and
    behind‑the‑scenes looks at his creative process, building a personal brand that attracts commissions and sponsorships. Long‑term, he hopes to open a community art space that provides workshops, gallery
    shows, and mentorship for emerging artists, allowing him to stay flexible, avoid a conventional 9‑to‑5 job, and contribute to the region’s vibrant cultural scene.
