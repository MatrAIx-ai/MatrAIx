  career_goals: Yong aims to become a senior hardware architect within the next five years, leading the design of next‑generation edge computing platforms that integrate AI accelerators. He seeks to broaden
    his leadership experience by managing multidisciplinary teams, driving product strategy from concept to production, and influencing company‑wide hardware roadmaps. Long‑term, he envisions founding a
    boutique hardware startup focused on low‑power IoT devices, while also mentoring emerging engineers and speaking at industry conferences.
