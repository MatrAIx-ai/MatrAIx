personas:
  professional: Yong Shim, a 30‑year‑old hardware engineer at a Chicago tech firm, leverages deep expertise in analog and digital circuit design, FPGA/ASIC development, and meticulous documentation to spearhead
    complex edge‑computing projects, and they are known for their organized, talkative presence in cross‑functional meetings, making them a natural mentor for junior engineers.
  sports: Yong Shim, a 30‑year‑old Chicagoan, spends Saturday mornings shooting hoops with the local Chicago Basketball Club, follows the Chicago Bulls and Bears religiously, and they treat these weekly
    basketball sessions as essential stress‑relief therapy, though they sometimes skip the gym when project deadlines loom.
  arts: Yong Shim, a 30‑year‑old hardware enthusiast, channels their creative side by jamming on electric guitar to the sounds of Tame Impala and Tycho during informal evenings, regularly attending live
    shows at Chicago’s Metro and The Hideout, and they curate playlists that blend synth‑wave with classic rock, which fuels their innovative mindset in circuit design.
  travel: Yong Shim, a 30‑year‑old engineer, meticulously plans short but tech‑focused trips—such as a weekend hackathon‑turned‑food‑tour in Tokyo, a DIY electronics pilgrimage to Seoul’s Dongdaemun market,
    and annual visits to Chicago’s Millennium Park—and they balance these adventures with a modest budget that prioritizes conference fees over luxury accommodations.
  culinary: Yong Shim, a 30‑year‑old hobbyist chef, blends Korean flavors with American comfort by whipping up gochujang‑glazed pork tacos and kimchi‑infused macaroni‑and‑cheese, frequently sourcing fresh
    napa cabbage and Korean short ribs from Chicago’s Maxwell Street Market, and they practice sous‑vide techniques with a custom Arduino temperature controller.
  core: Yong Shim, a 30‑year‑old hardware architect‑in‑training, balances relentless curiosity for DIY electronics with an anxiety‑driven habit of over‑planning every project, and they become the life of
    both board‑game nights and technical presentations, even if they sometimes sacrifice sleep to chase the next prototype.
background:
  cultural: Yong was raised in a Korean immigrant family in Chicago’s multicultural neighborhoods. His parents emphasized education, perseverance, and respect for tradition, which shaped his disciplined
    work ethic. He fluently speaks both Korean and English, celebrates holidays such as Seollal and Chuseok with his extended family, and participates in local Asian American engineering groups that blend
    cultural heritage with professional development. While deeply rooted in his Korean cultural values, he also embraces the diverse, inclusive atmosphere of Chicago, integrating both collectivist and individualist
    perspectives into his personal and professional life.
