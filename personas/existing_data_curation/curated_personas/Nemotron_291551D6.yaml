  career_goals: 'David aims to earn the Certified Executive Chef credential within the next two years, then open a modest farm‑to‑table restaurant in Rowlett that showcases locally sourced Texan ingredients
    with an emphasis on quiet, intimate dining. He also plans to author a cookbook titled "Quiet Flavors: A Texan Chef''s Journey," and to teach part‑time culinary fundamentals at a community college, sharing
    his love of culinary art with adult learners.'
