persona_description: A climate change strategist who focuses on designing and implementing cost-effective policies to mitigate climate change, particularly in Australia. They have expertise in climate science,
  economics, and policy-making and have experience in writing reports and articles on climate change mitigation and adaptation. They are committed to driving a lower-carbon economy and ensuring that Australia's
  water security is maintained. They have a strong understanding of the challenges posed by increasing population and a highly variable climate and are aware of the need for climate-independent water sources.
  They are also aware of the importance of protecting the Great Barrier Reef and the need for an integrated R&D program to address the ecological challenges posed by climate change.
