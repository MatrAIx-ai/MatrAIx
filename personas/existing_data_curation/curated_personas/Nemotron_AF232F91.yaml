personas:
  professional: Elizabeth Batis, a seasoned electrical and electronic engineering technologist with over twenty years of circuit design, PCB layout, and PLC expertise, channels her preference for quiet,
    predictable environments into leading small, focused renewable-energy project teams while they maintain meticulous documentation and a low-stress schedule.
  sports: Elizabeth Batis keeps fit through gentle yoga and early-morning jogs with the Savannah Runners Club, while they cheerfully support the Atlanta Falcons in football and enjoy the summertime spectacle
    of the Savannah Bananas baseball team.
  arts: Elizabeth Batis immerses herself in historical fiction by Hilary Mantel and science narratives by Carl Sagan, unwinds to the piano sonatas of Chopin, and occasionally attends intimate chamber music
    concerts featuring violinist Midori at the Savannah Music Festival, while they find the blend of narrative and melody deeply restorative.
  travel: Elizabeth Batis prefers low-stress, self-guided trips that blend history and nature, such as weekend visits to Charleston’s historic downtown, a solitary pilgrimage to the Cotswold villages of
    England, and a long-planned adventure to Crete’s ancient ruins and fragrant herb gardens, while they savor the quiet moments of solitary exploration.
  culinary: Elizabeth Batis enjoys crafting herb-infused meals in her modest kitchen, regularly preparing rosemary-garlic grilled chicken, lavender-honey drizzled fresh peaches, and aromatic rose-petal
    jam for sourdough toast, while they take pride in using garden-grown ingredients to elevate familiar dishes.
  core: Elizabeth Batis is a meticulous engineer who finds solace in solitary gardening and hobby electronics, yet they habitually procrastinate on paperwork, allowing stress-induced worry to surface in
    last-minute rushes.
background:
  cultural: Elizabeth grew up in Savannah, Georgia, within a middle‑class, white Southern family that valued community ties, modesty, and self‑reliance. The city's historic charm and slower tempo shaped
    her appreciation for quiet, reflective spaces, while local traditions—such as attending church on Sundays and participating in neighborhood block parties—instilled a sense of hospitality and respect
    for personal boundaries. Though culturally rooted in the South, she pursued a STEM education and career that positioned her within a broader national professional community, allowing her to blend Southern
    sensibilities with a forward‑looking, progressive outlook on technology and gender equity in engineering.
attributes:
  skills: '[''circuit board design'', ''analog and digital troubleshooting'', ''PCB layout (Altium Designer, KiCad)'', ''PLC programming (Rockwell, Siemens)'', ''industrial automation'', ''preventive maintenance
    of power systems'', ''NEC code compliance'', ''oscilloscope and spectrum analyzer operation'', ''technical documentation'', ''training and mentorship'']'
  hobbies: '[''reading (historical fiction, science non-fiction)'', ''gardening (native plants, herbs)'', ''building hobby electronics kits (Arduino, Raspberry Pi)'', ''yoga and meditation'', ''birdwatching'',
    ''journaling'']'
  career_goals: Elizabeth aims to transition into a senior technologist role where she can lead small, focused project teams while maintaining a largely independent work environment that respects her need
    for quiet and predictability. She plans to earn the Certified Electrical Technologist (CET) designation and deepen her specialization in renewable energy integration, positioning herself as a go‑to
    expert for solar‑PV and battery storage installations in the Georgia market. Over the next five years she also hopes to mentor emerging female engineers, develop a part‑time consulting practice offering
    troubleshooting services to local manufacturers, and ultimately secure a position that balances technical leadership with a stable, low‑stress schedule.
