persona_description: A member of the BirdLife organization, who is actively involved in the conservation of migratory birds and their habitats through the Convention on Migratory Species (CMS) and its various
  daughter agreements. They are also involved in policy advocacy and have a special focus on improving the conservation status of migratory landbirds in the African Eurasian region. They have hosted and
  co-hosted side events on topics related to global waterbird flyway conservation and have a keen interest in the concept of national biodiversity working groups to ensure on-the-ground implementation of
  biodiversity conventions.
