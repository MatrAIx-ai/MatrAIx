  hobbies: '[''Salsa dancing'', ''Hawaiian hula'', ''Cooking Puerto Rican cuisine'', ''Hiking coastal trails'', ''Visiting art galleries'', ''Attending community festivals'', ''Reading contemporary fiction'',
    ''Volunteering at community center'', ''Yoga and mindfulness practice'', ''Crafting jewelry'']'
  career_goals: Stephanie aims to complete her GED and enroll in a community college program in business administration or arts management. She hopes to advance to a shift supervisor role and eventually
    become a store manager, leveraging her leadership and organizational strengths. Long‑term, she envisions working at a local cultural center or opening a small boutique that showcases Puerto Rican and
    Hawaiian artisan crafts, allowing her to blend her love of art with community service. She also seeks personal growth through stress‑management training to better handle her emotional reactivity.
