  hobbies: '["woodworking", "model train building", "fishing", "hiking", "gardening", "puzzle solving (crossword, sudoku)", "listening to logistics podcasts", "cooking family meals"]'
  career_goals: Daniel aims to advance from a material mover to a supervisory role within the next three years, targeting a shift supervisor or warehouse manager position at his current facility. He plans
    to obtain an OSHA safety trainer certification and complete a professional certificate in supply‑chain management to deepen his strategic expertise. His long‑term ambition is to lead a high‑performing
    logistics team that consistently meets on‑time delivery targets while maintaining zero workplace incidents. He also envisions eventually opening a small consultancy that helps regional warehouses improve
    operational efficiency, allowing him to leverage his organized, process‑driven mindset while preserving a balanced family life.
