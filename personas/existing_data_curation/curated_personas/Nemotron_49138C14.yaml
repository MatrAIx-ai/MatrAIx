    workshop facilitation'', ''Empathy and active listening'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Reading contemporary fiction and philosophy'', ''Participating in local book clubs'', ''Attending community theater talk‑backs'',
    ''Taking salsa and swing dance classes'', ''Gardening (herbs and vegetables)'', ''Volunteering to lead art workshops for seniors'', ''Hiking on Chesapeake Bay shoreline trails'', ''Bird‑watching'',
    ''Journaling and reflective writing'', ''Yoga and mindfulness meditation'']'
  career_goals: Lisa aims to transition her graduate education background into a community‑focused role while leveraging her strong organizational and interpersonal abilities. In the short term, she plans
    to earn a certification in adult education and start leading weekly art‑ appreciation workshops at the local library, providing accessible cultural experiences for seniors and young adults. Over the
    next five years, she hopes to secure a part‑time coordinator position with the Queen Anne’s County public‑library system, overseeing a suite of lifelong‑learning programs that blend visual arts, literacy,
    and wellness. Simultaneously, she is pursuing a supervisory track at her current employer, aspiring to become an assistant manager where she can formalize staff training curricula and improve workplace
    support for employees dealing with stress. Her long‑term ambition is to establish a nonprofit that offers free art‑based therapy sessions for individuals coping with anxiety and depression, marrying
    her creative interests with her desire to help others manage emotional distress.
