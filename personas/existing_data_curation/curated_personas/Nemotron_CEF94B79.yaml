  hobbies: '["Native‑plant gardening", "Canning and food preservation", "Reading historical biographies and mystery novels", "Knitting", "Coastal walks and bird‑watching", "Volunteer work at the local senior
    center"]'
  career_goals: Although retired, Whitney aims to deepen her community involvement by leading a neighborhood garden that donates produce to the local food bank. She plans to enroll in a short course on
    digital photography to document her garden and share her work on a personal blog, fostering connections with family and friends. She also aspires to complete a series of workshops on advanced budgeting
    to help seniors at the community center manage their finances more effectively. Maintaining a stable, well‑organized home life and supporting her husband in their shared retirement plans remain central
    to her ambitions.
