  career_goals: Hyewon aims to become a senior talent scout for a major professional sports league within the next five years, leveraging her analytical skill set to influence roster decisions at the highest
    level. Long‑term, she envisions founding a nonprofit youth development academy in New York that integrates athletic training with academic tutoring and life‑skill workshops, positioning herself as a
    thought leader in holistic athlete mentorship. She also aspires to publish a guide on data‑informed scouting methods for emerging coaches and scouts.
