personas:
  professional: Hyewon Kim is a data-driven youth sports talent scout who fuses meticulous performance analytics with a flexible, relationship-focused coaching style, leveraging strategic planning, bilingual
    communication, and strong networking to build trust while they often juggle tight deadlines with a laid-back approach to paperwork.
  sports: Hyewon Kim is an avid urban runner who trains with the Hudson River Greenway running group, follows the New York Knicks and NYCFC, and volunteers as a basketball mentor for community after-school
    programs, balancing personal fitness with scouting fresh talent on local high school courts as they stay connected to the city's athletic pulse.
  arts: Hyewon Kim channels their love for performance into weekly K-Pop dance classes set to BTS and BLACKPINK tracks, while capturing the multicultural pulse of the city through street photography inspired
    by Vivian Maider's candid style, often curating their images in a personal Instagram gallery.
  travel: Hyewon Kim prefers a blend of spur-of-the-moment weekend trips to the Hudson Valley's vineyards and meticulously planned overseas adventures to Tokyo and Barcelona, balancing a modest travel budget
    with a yearning to immerse themselves in vibrant street cultures and culinary scenes.
  culinary: Hyewon Kim enjoys cooking heritage dishes like kimchi jjigae and bibimbap, mastering the balance of spicy gochujang, fermented cabbage, and silky sesame oil, while also experimenting with fusion
    tacos that combine bulgogi-marinated beef and fresh cilantro, proving their culinary skill ranges from home-kitchen comfort to adventurous street-food creativity.
  core: Hyewon Kim weaves disciplined data analysis with spontaneous street-art inspiration, juggling meticulous scouting spreadsheets and impromptu K-Pop dance moves, all while they worry they'll miss
    the next perfect photo opportunity.
background:
  cultural: Hyewon is a second‑generation Korean‑American who grew up in a bilingual household in New York City. Her family maintains Korean traditions such as celebrating Chuseok and Lunar New Year, and
    places a strong emphasis on education, respect for elders, and community solidarity. These cultural values inform her disciplined yet flexible approach to coaching, as she balances structured training
    plans with the need to adapt to each athlete’s personal context. Navigating both Korean and American cultural norms has equipped her with a nuanced perspective on identity, enabling her to connect with
    a diverse range of athletes and families across the city.
