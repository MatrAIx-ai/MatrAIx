  career_goals: Elizabeth aims to advance to a senior office management or operations director role within the next five years, focusing on data‑driven process improvements and fostering a culture of continuous
    learning among staff. She plans to earn a Six Sigma Black Belt certification, lead a department‑wide digital transformation project, and develop a mentorship program to prepare the next generation of
    supervisors. As she approaches retirement, she hopes to transition into a part‑time consulting capacity, offering her expertise to local nonprofit organizations and small businesses to enhance their
    administrative efficiency while maintaining a balanced work‑life schedule.
