  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Reading art journals and philosophy'', ''Hiking'', ''Gardening'', ''Creative writing'', ''Learning French'', ''Meditation'', ''Cooking experimental
    recipes'', ''Listening to classical music'']'
  career_goals: Anita aims to become a senior paralegal specializing in intellectual‑property and art law, positioning herself as an expert in provenance disputes and licensing agreements for artists and
    museums. Over the next three to five years she plans to earn a specialized paralegal certification in IP law, attend workshops on cultural‑heritage legislation, and possibly pursue a Master’s in Legal
    Studies with a focus on art and cultural policy. She is driven to lead a small legal team within a museum or cultural institution, leveraging remote‑work flexibility to maintain her preferred solitary
    work style while rapidly advancing her professional standing.
