  career_goals: She plans to complete her associate degree and transfer to a four‑year program in Business Administration or Health Services Management, aiming to work in community outreach or nonprofit
    program coordination. Sabrina aspires to develop leadership capabilities, eventually becoming a program manager who designs and implements practical solutions that improve local health and wellbeing.
