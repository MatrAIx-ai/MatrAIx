personas:
  professional: Zahily Acosta, an aspiring junior scientist and LEGO architect, blends their love of adventure books with meticulous building skills, channeling a curious yet organized mindset into small‑scale
    experiments and prototypes that they proudly showcase at school science fairs.
  sports: Zahily Acosta, a spirited member of the Brooklyn Youth Soccer League and an enthusiastic fan of the New York Red Bulls, spends weekends honing dribbling skills on the local field, cheering on
    the Red Bulls during games, and leads a friendly kick‑about with neighborhood friends after school, demonstrating their organized approach to practice and teamwork, and they thrive on the camaraderie.
  arts: Zahily Acosta, a budding visual artist who fills sketchbooks with vibrant scenes inspired by Pixar films and the colorful murals of local street artists, also loves dancing to the lively rhythms
    of Sergio George’s salsa tracks and Lin‑Manuel Miranda’s Broadway tunes, letting those melodies guide their rhythmic strokes and imaginative storytelling, and they often share their artwork with family
    and friends.
  travel: Zahily Acosta, an inquisitive traveler who has explored Central Park’s hidden gardens, enjoyed a family beach trip to the Dominican Republic, and dreams of seeing the dinosaur fossils at the American
    Museum of Natural History and the geysers of Yellowstone, often plans trips with a simple map and a well‑worn backpack while balancing school and family schedules, and they savor each new adventure
    as a chance to learn and draw.
  culinary: Zahily Acosta, a culinary whiz‑kid who loves to assist in preparing mangu with ripe plantains, sautéed onions, and garlic, enjoys sprinkling fresh cilantro on arroz con pollo, and proudly crafts
    colorful fruit salads with mango, pineapple, and lime, showcasing a developing palate that embraces both traditional flavors and new textures, and they take pride in presenting each dish to the family.
  core: Zahily Acosta balances a fierce curiosity for science and LEGO engineering with disciplined planning, and they channel that energy into salsa dancing, meticulous saving, and managing mild allergies
    like a mini‑pro.
background:
  cultural: Zahily is a second-generation Dominican-American living in New York City. She grows up in a bilingual household where Spanish is spoken daily, and Dominican traditions are celebrated through
    music, dance, and cuisine. Family gatherings feature dishes like mangú and sancocho, and she participates in community events such as Dominican Independence Day parades. While immersed in the rich cultural
    heritage of her parents, Zahily also embraces the diverse influences of her urban environment, blending both worlds in her daily life.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Organization and scheduling", "Bilingual communication (English & Spanish)", "Basic computer and tablet use"]'
  hobbies: '["Reading adventure and science books", "Building LEGO models", "Soccer", "Dancing (merengue & salsa)", "Drawing and coloring", "Cooking traditional Dominican dishes with family", "Nature walks
    in Central Park", "Educational tablet games"]'
  career_goals: Zahily dreams of a future where she can blend her love for learning and helping others. She aspires to become a teacher or a scientist who can inspire curiosity in young minds, and she also
    imagines working as a veterinarian to care for animals. Her practical side wants her to pursue a path that lets her give back to her community in New York, perhaps by volunteering at local schools or
    community gardens.
