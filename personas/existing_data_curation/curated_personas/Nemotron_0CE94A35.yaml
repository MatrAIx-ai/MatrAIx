  career_goals: Claudio aims to leverage his bilingual and digital skillset into a career in digital marketing or content creation, ideally focusing on sports and lifestyle brands that bridge Argentine
    and American audiences. He plans to pursue a bachelor's degree in Communication or Computer Science, secure internships in social media management, and eventually launch his own boutique agency. He
    also hopes to develop a personal YouTube channel where he combines soccer analysis, tech tutorials, and Argentine cooking, balancing his curiosity with practical business acumen. He seeks to build discipline
    around deadlines to overcome his natural resistance to structure.
