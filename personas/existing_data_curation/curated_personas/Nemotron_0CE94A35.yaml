personas:
  professional: Claudio is an 18‑year‑old bilingual digital‑media enthusiast who channels his competitive gamer instincts into short‑form video editing, and they aim to secure social‑media internships with
    sports‑focused brands and eventually launch a boutique agency, all while wrestling with a stubborn resistance to strict deadlines.
  sports: Claudio is a soccer aficionado who plays pickup matches at the local community field, is a member of the Palm Beach Soccer Academy, follows the South American club Boca Juniors and the MLS side
    Inter Miami, and they tackle fitness through spontaneous drills rather than regimented gym routines, reflecting a competitive edge and aversion to structured schedules.
  arts: Claudio is an amateur acoustic guitarist who blends classic rock riffs from The Beatles and Queen with folk ballads their family sings, and they spend evenings crafting TikTok clips that merge rapid
    jump‑cuts with meme‑style captions, drawing creative inspiration from YouTube creators like Peter McKinnon and musicians such as John Mayer.
  travel: Claudio enjoys spontaneous weekend road trips to the sunny beaches of West Palm Beach and dreams of a summer pilgrimage to the tango‑laden streets of Buenos Aires, while they also plan a future
    backpacking route through Barcelona’s football stadiums and the coastal cliffs of Portugal.
  culinary: Claudio is a budding home cook who spends Saturday evenings hand‑rolling empanadas stuffed with seasoned beef and olives, grilling choripán slathered in chimichurri, and experimenting with a
    side of smoky BBQ ribs, and they demonstrate a confident yet sometimes sloppy culinary style that flips between traditional family recipes and American comfort food.
  core: Claudio is a bilingual 18‑year‑old digital‑media whiz who balances a fierce competitive streak with spontaneous creativity, and they constantly wrestle with deadline anxiety while indulging a love
    for soccer, guitar, and late‑night video edits.
background:
  cultural: Claudio comes from an Argentine family that moved to Florida when he was a child. He grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties to Argentine
    culture through family traditions, music, and cuisine. His upbringing blends the warmth and communal spirit of Argentine society—with frequent family gatherings, celebrations of events like Carnaval
    and national holidays—with the laid‑back, outdoor lifestyle of coastal Florida. This bicultural background informs his love for soccer, his appreciation for both Argentine rock and US pop music, and
    his desire to connect the two cultures through his future work.
