  career_goals: Peggy aims to move from front‑line material moving to a supervisory role within the next two years, targeting a position such as Warehouse Operations Lead or Logistics Coordinator at a regional
    distribution center. She plans to earn a Certified Supply Chain Professional (CSCP) credential and complete a Lean Six Sigma Green Belt certification to strengthen her qualifications. In the longer
    term, she envisions managing an entire logistics hub in the Pacific Northwest, introducing sustainable practices like electric forklift fleets and waste‑reduction initiatives. Additionally, she hopes
    to merge her love of art with her organizational talent by curating a community pop‑up gallery that showcases local artists in repurposed warehouse space.
