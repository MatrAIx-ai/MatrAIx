  career_goals: Although only five, Salnave already dreams of a future where he can bring his imagination to life. He aspires to become an illustrator or author, creating books that spark wonder in other
    children. He is fascinated by scientists who explore unknown worlds and occasionally imagines himself as an astronaut discovering new planets. Ultimately, he wants a career that combines creativity,
    exploration, and the ability to share stories that make people feel connected.
