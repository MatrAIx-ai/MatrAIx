personas:
  professional: An aspiring junior scientist, Salnave Denmark, builds whimsical experiments with LEGO bricks and kitchen supplies, letting imagination drive each trial while shunning rigid step‑by‑step
    instructions.
  sports: Salnave Denmark darts across the playground playing tag, practices with the Neighborhood Soccer Club, and cheers loudly for the local professional baseball team, the City Cubs, while preferring
    spontaneous games over structured drills.
  arts: Salnave Denmark immerses in the world of crayons, drawing inspiration from Eric Carle’s bright illustrations, the animated songs of Disney’s "Frozen," and the lively rhythms of Taylor Swift’s pop
    hits, often performing impromptu dances for friends.
  travel: Salnave Denmark loves unplanned family outings, has visited the downtown aquarium and the Grand Canyon, and dreams of exploring Disney World’s Magic Kingdom, favoring adventures that promise bold
    new sights over strict itineraries.
  culinary: Salnave Denmark favors cheesy macaroni, peanut‑butter‑jelly sandwiches, and strawberry‑topped yogurt, can pour cereal unaided, and occasionally attempts to stir a pot of soup under parental
    supervision, though they often spill the spoon.
  core: A boundlessly curious yet worried five‑year‑old, Salnave Denmark, flits between imaginative creations and anxious moments, frequently misplacing socks in the quest for the next adventure.
background:
  cultural: Salnave is raised in a Black family in Saint Paul, Minnesota, where community ties and cultural heritage play an important role. His family celebrates African-American traditions through storytelling
    evenings and musical gatherings featuring jazz, hip‑hop, and gospel influences, while also participating in local events such as the Saint Paul Winter Carnival and the annual African-American Heritage
    Festival. He attends a neighborhood preschool that integrates multicultural curricula, exposing him to a variety of languages, histories, and artistic styles. The supportive neighborhood and his family's
    emphasis on kindness and cooperation shape his worldview, encouraging him to appreciate both his cultural roots and the diverse community around him.
