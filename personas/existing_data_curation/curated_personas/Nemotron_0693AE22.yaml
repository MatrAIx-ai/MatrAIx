  career_goals: She aims to advance to a shift-supervisor position within the next two years, using her extensive front-line experience to mentor younger staff and improve store workflow. Cristina plans
    to earn her high-school equivalency (GED) through a local adult-education program, which will boost her confidence for part-time bookkeeping or administrative tasks. In the longer term she dreams of
    starting a small home-based business selling traditional Salvadoran pastries such as pupusas and empanadas to neighbors and at community festivals. Additionally, she hopes to dedicate more time to volunteering
    at the local senior center, coordinating cultural events that celebrate Latino heritage.
