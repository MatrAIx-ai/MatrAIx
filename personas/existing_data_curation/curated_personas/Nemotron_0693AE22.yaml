personas:
  professional: Suen Dobarganes, a 61‑year‑old veteran supermarket cashier, blends 25 years of bilingual POS mastery and practical curiosity with an easygoing, sociable demeanor to turn hectic checkouts
    into friendly gatherings while informally mentoring newcomers, and they make sure to double‑check register balances before clock‑out despite occasional disorganization.
  sports: Suen Dobarganes stays active by strolling the Lake Worth promenade five mornings a week, joins a senior‑friendly volleyball league at the local community center, and cheers for the Miami Heat
    and Miami Marlins on game nights, balancing low‑impact exercise with a passion for team spirit.
  arts: Suen Dobarganes lights up church services as a choir member, teaches Cumbia and Salsa steps at community socials while humming classics by Celia Cruz and Shakira, unwinds with telenovelas starring
    Thalía, and spends evenings quilting intricate patterns alongside their sister, letting the rhythmic beats and vibrant colors shape their lively spirit.
  travel: Suen Dobarganes prefers short, budget‑friendly getaways, often taking weekend drives to Key West for sunset walks, has toured family gatherings in New York’s Salvadoran festival circuit, dreams
    of a cultural immersion trip to Oaxaca, Mexico, and avoids lengthy planning by booking spontaneous day trips with their sister, balancing wanderlust with financial prudence.
  culinary: Suen Dobarganes excels at hand‑crafting pupusas stuffed with cheese and seasoned pork, simmering tamales in corn husks, and frying crisp yuca frita, all seasoned with garden‑fresh cilantro,
    oregano, and a dash of lime, and they relish sharing these traditional plates at neighborhood festivals while occasionally treating themselves to a fresh ceviche bowl from the nearby fish market.
  core: Suen Dobarganes is a charismatic, community‑centric cashier who channels a blend of practical curiosity, occasional disorganization, and an infectious love for dance, cooking, and choir, and they
    navigate life with a worry‑prone yet deeply caring spirit.
background:
  cultural: Born to Salvadoran parents who emigrated to the United States in the 1970s, Cristina grew up in a bilingual household where Spanish was spoken at home and English at school. She maintains a
    strong connection to Salvadoran culture through family traditions, Catholic celebrations such as Semana Santa and Día de los Difuntos, and the preparation of staple foods like pupusas. The Salvadoran
    community in Lake Worth and nearby Palm Beach County provides a network of support, with regular gatherings at the local Latino cultural center and church. Cristina’s upbringing emphasized family solidarity,
    respect for elders, and a communal approach to celebrations, all of which shape her values and social interactions today.
