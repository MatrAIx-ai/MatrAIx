  career_goals: While approaching retirement age, Katyanne aims to formalize her expertise by obtaining a Licensed Vocational Nursing (LVN) credential through a part‑time program, allowing her to take on
    expanded clinical responsibilities. She hopes to transition into a supervisory role within her current facility, overseeing a team of nursing assistants and driving patient‑safety initiatives. Additionally,
    she aspires to launch a small home‑care consultancy that provides organized, evidence‑based support for elderly clients in Mesa, leveraging her competitive drive to build a reputable service. Volunteering
    as a patient advocate and mentoring future aides remain long‑term passions.
