personas:
  professional: An experienced facilities manager, Malva Niebla leverages rigorous organization, strategic budgeting, and a curiosity for sustainable tech to orchestrate building operations, negotiate vendor
    contracts, and act as the sociable bridge between tenants, executive leadership, and the community, all while championing green initiatives and mentoring emerging talent.
  sports: An avid salsa dancer and weekend jogger, Malva Niebla follows the Brooklyn Nets, New York Knicks, and New York Yankees, participates in a local salsa league, and trains for the annual New York
    City Marathon, balancing high‑energy dance sessions with disciplined cardio workouts.
  arts: Immersed in Brooklyn’s vibrant art scene, Malva Niebla frequents the Bushwick Collective murals, attends openings featuring artists like Theaster Gates and Kehinde Wiley, and draws creative inspiration
    from musicians such as Celia Cruz, Rosalía, and local jazz saxophonist Ben Webster, shaping both their professional aesthetic and personal décor.
  travel: With a penchant for curated experiences, Malva Niebla spends a few long weekends exploring the Hudson Valley’s farm‑to‑table retreats, has a bucket‑list trip to Barcelona for its architecture,
    and dreams of a sustainable eco‑lodge stay in Costa Rica, always planning trips around work deadlines and family obligations.
  culinary: An enthusiastic home cook, Malva Niebla excels at preparing mangú with fried cheese, hearty sancocho, and plantain‑based mofongo, often layering fresh cilantro, lime, and a dash of smoked paprika,
    while balancing their love for traditional Caribbean flavors with experimental fusions like avocado‑infused stew bowls.
  core: Malva Niebla is a detail‑driven facilities leader who fuses an art‑loving curiosity with salsa‑driven energy, a habit of obsessively tracking energy usage, and a tendency to forget personal appointments
    when the next community block party calls.
background:
  cultural: Malva is a first‑generation Dominican‑American who grew up bilingual in Spanish and English in the vibrant Dominican neighborhoods of the Bronx before moving to Brooklyn. Her family maintains
    strong ties to Dominican customs, celebrating holidays like Dominican Independence Day and Día de la Merengue with music, dance, and traditional cuisine. She actively participates in local Dominican
    cultural associations, supporting community events and advocating for immigrant‑family resources. The blend of Caribbean warmth, communal solidarity, and Brooklyn’s diverse urban tapestry shapes her
    worldview, driving her commitment to community‑focused leadership and inclusive workplace practices.
attributes:
  skills: '[''Facilities Operations Management'', ''Preventive Maintenance Scheduling'', ''Budget Development and Control'', ''Vendor Negotiation'', ''Energy Management and Sustainability'', ''Workplace
    Safety Compliance (OSHA)'', ''Project Management (Renovations, Capital Projects)'', ''Space Planning and Utilization'', ''Team Leadership and Training'', ''Emergency Preparedness and Response'', ''Smart
    Building Technologies Integration'', ''Stakeholder Communication and Relations'', ''Diversity and Inclusion Initiatives'']'
  hobbies: '[''Salsa dancing'', ''Latin cooking classes'', ''Visiting contemporary art galleries'', ''Brooklyn street-art tours'', ''Community gardening'', ''Volunteer work at local shelters'', ''Organizing
    neighborhood block parties'', ''Yoga and mindfulness practice'', ''Exploring smart-home technology'', ''Reading about sustainable architecture'']'
  career_goals: Malva aims to ascend to a Director of Facilities role within the next five years, where she can lead enterprise-wide sustainability initiatives and transform building portfolios into energy-efficient,
    technology-enabled environments. She seeks to earn the Certified Facility Manager (CFM) and LEED Accredited Professional credentials, and eventually launch a consulting practice that helps small-to-mid-size
    property owners in the Bronx and Brooklyn adopt green building standards. Mentoring emerging facilities professionals, especially women and members of the Dominican community, is a core component of
    her long-term vision.
