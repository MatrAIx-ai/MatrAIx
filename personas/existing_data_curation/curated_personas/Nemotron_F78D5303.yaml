  career_goals: Alex aspires to pursue a career that blends his love for practical problem solving with his desire to make a tangible impact on his community. He aims to study civil engineering with a focus
    on sustainable coastal infrastructure, eventually working on designing resilient flood mitigation systems and eco-friendly public spaces in Florida’s shoreline cities. In the short term, he plans to
    excel in STEM subjects, join the school’s robotics and environmental clubs, and seek mentorship from local engineers. He also hopes to develop his leadership skills to eventually lead multidisciplinary
    project teams that address environmental challenges.
