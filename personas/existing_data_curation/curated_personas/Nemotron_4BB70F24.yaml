personas:
  professional: William Sandridge, an aspiring arts administrator and communications major at Salisbury University, leverages their keen eye for visual storytelling, strong interpersonal communication,
    and organized yet flexible approach to coordinate campus events and digital content, while their curiosity and assertiveness drive them to propose innovative community arts programs.
  sports: William Sandridge enjoys playing intramural soccer for the university’s Red Rovers, hikes the dunes of Assateague Island as a member of the Outdoor Adventure Club, cheers on the Delmarva Shorebirds
    and the Washington Capitals, and maintains a flexible fitness routine that balances team sport camaraderie with solitary trail runs.
  arts: William Sandridge, an avid member of the campus photography club, regularly experiments with documentary shots inspired by Annie Leibovitz, curates playlists featuring Tame Impala and Mitski for
    art events, attends indie film screenings of Wes Anderson’s works, and volunteers to coordinate installations at the annual Eastern Shore Arts Festival, letting their open‑minded curiosity shape their
    artistic taste.
  travel: William Sandridge prefers budget‑friendly road trips, has explored the historic streets of Philadelphia and the vibrant jazz scene of New Orleans, dreams of visiting the art‑rich city of Santa Fe
    and the coastal cliffs of Galway, and plans each outing using a spreadsheet that balances travel costs with opportunities for cultural immersion.
  culinary: William Sandridge loves Maryland crab cakes seasoned with Old Bay, enjoys cooking simple shrimp étouffée and homemade pizza topped with mozzarella and fresh basil, experiments with digital recipes
    on a tablet, and often pairs meals with craft beers from local breweries, though they sometimes skip breakfast in favor of late‑night coffee runs.
  core: William Sandridge blends a curiosity for visual art with a sociable, organized energy, curating community events while juggling student life, occasional coffee cravings, and a habit of overcommitting
    to club projects.
background:
  cultural: William grew up in Salisbury, Maryland, in a family with deep Mid-Atlantic roots that trace back to Irish and German ancestors. The region’s blend of coastal traditions, small-town community
    values, and a growing appreciation for the arts has shaped his worldview. He was raised with a respect for local customs such as seasonal fishing trips and community fairs, while also being exposed
    to the diverse cultural events that the Eastern Shore now hosts, including African-American heritage festivals and Chesapeake Bay ecology programs. This background instilled in him a balanced sense
    of tradition and openness, encouraging his curiosity for new ideas and his desire to contribute to the cultural vibrancy of his hometown.
attributes:
  skills: '["Interpersonal communication", "Group facilitation", "Digital photography", "Basic graphic design", "Social media management", "Event planning", "Research and analysis", "Public speaking", "Microsoft
