  hobbies: '["Photography", "Volunteering at arts festivals", "Visiting museums and galleries", "Indie film and live music appreciation", "Intramural soccer", "Hiking (Assateague Island)", "Curating music
    playlists", "Reading contemporary fiction", "Digital art creation"]'
  career_goals: William aims to complete a bachelor's degree in Communications or Arts Management at Salisbury University, building a foundation for a career that merges his love of art with his knack for
    community engagement. He aspires to work in arts administration, focusing on program development for local cultural institutions or festivals in the Eastern Shore region. Over the next five years, he
    hopes to secure an entry-level position in a museum, gallery, or nonprofit arts organization, where he can apply his event planning and digital content skills to broaden public access to the arts. Long-term,
    he envisions launching a community-driven arts initiative that provides workshops and exhibition space for emerging artists in Wicomico County, leveraging his organizational talents and network of peers.
