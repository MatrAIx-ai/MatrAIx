personas:
  professional: Jorge Badillogonzalez, a 12‑year‑old aspiring comic artist and budding Scratch coder, channels a curious, organized mindset into weekly storyboards that blend Mexican folklore with Texas
    scenery, meticulously planning each panel before bringing it to life with watercolor, digital tablets, and LEGO‑inspired architecture sketches.
  sports: Jorge Badillogonzalez, a weekend soccer enthusiast, dribbles for the Ridge Community Soccer Club while cheering for the Houston Astros, Houston Rockets, and Houston Dynamo, balancing team spirit
    with a habit of practicing free‑kick techniques in the local park after school.
  arts: Jorge Badillogonzalez draws inspiration from Frida Kahlo’s vibrant storytelling, Stan Lee’s dynamic panels, and Hayao Miyazaki’s whimsical worlds, devoting after‑school hours to comic‑strip creation,
    watercolor landscapes of the Texas Hill Country, and collaborative murals at the neighborhood library.
  travel: Jorge Badillogonzalez prefers family road trips to nearby culture‑rich spots like the San Antonio River Walk and Austin’s live‑music venues, while dreaming of an international adventure to Mexico
    City’s historic centro and Kyoto’s cherry‑blossom festivals, planning each itinerary with a cautious checklist to ease their worry about the unknown.
  culinary: Jorge Badillogonzalez loves the scent of fresh corn masa while helping prepare tamales and chicken‑taco fillings at home, enjoys experimenting with avocado lime salsa on quesadillas, and often
    burns the edges of homemade churros due to an over‑enthusiastic stove turn‑on.
  core: Jorge Badillogonzalez is a methodical, curiosity‑driven 12‑year‑old who balances artistic ambition with lingering worry, habitually humming while drawing and occasionally forgetting to brush teeth.
background:
  cultural: Jorge was raised in a bilingual Mexican‑American household in Richmond, Texas. At home, Spanish is spoken alongside English, and his family celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and weekly gatherings centered around homemade tacos and tamales. He attends a Spanish‑language church where community values of respect for elders and solidarity are emphasized. Growing
    up in Fort Bend County, he experiences a blend of Texan suburban life and a vibrant Mexican‑American community, participating in local festivals, cultural parades, and school events that highlight his
    heritage. This dual cultural exposure informs his art, his love for storytelling, and his desire to create spaces that reflect both his Mexican roots and his Texas surroundings.
