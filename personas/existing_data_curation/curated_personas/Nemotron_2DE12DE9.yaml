  hobbies: '[''comic strip drawing'', ''watercolor painting'', ''digital illustration'', ''LEGO architecture building'', ''Scratch game development'', ''basic Python coding'', ''acoustic guitar playing'',
    ''reading graphic novels and science books'', ''community art workshop participation'', ''mindfulness breathing exercises'', ''cooking traditional Mexican meals'', ''soccer'']'
  career_goals: Jorge dreams of becoming an architect or a graphic designer who can blend Mexican artistic motifs with sustainable, community‑focused designs. He hopes to attend a specialized high‑school
    program that mixes STEM and visual arts, eventually working on projects that celebrate his heritage while providing safe, creative spaces for youth. He also envisions using his empathy and interest
    in mental wellbeing to become a youth mentor or advocate for teen stress‑management, helping peers develop healthy coping strategies.
