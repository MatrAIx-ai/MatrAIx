  hobbies: '[''Reading historical non-fiction'', ''Hiking local trails'', ''Woodworking'', ''Chess'', ''Photography'', ''Writing essays on criminal justice reform'', ''Community gardening'', ''Attending
    historical society talks'', ''Gym training (weightlifting)'', ''Playing tabletop strategy games'']'
  career_goals: Wayne aims to rise to a senior supervisory role within the Massachusetts Department of Probation and Parole, ultimately becoming a regional coordinator who oversees evidence‑based reentry
    programs. He plans to earn a master’s degree in public administration to strengthen his policy‑making credentials and to publish research that blends his humanities perspective with correctional practice.
    Over the next five years, he hopes to launch a community‑focused pilot program that reduces recidivism through targeted cognitive‑behavioral interventions and to be recognized for measurable improvements
    in client outcomes. His competitive drive pushes him to achieve top performance metrics and mentor junior officers toward similar excellence.
