  hobbies: '[''Hiking the Metacomet Trail'', ''Running local 5K races'', ''Woodworking'', ''Playing acoustic guitar'', ''Reading business and psychology books'', ''Strategic board games (Settlers of Catan,
    chess)'', ''Photography of New England scenery'', ''Mindfulness meditation'']'
  career_goals: David aims to advance to a senior development leadership role—ideally Vice President of Development for a regional health system or university—where he can oversee a $10 million+ capital
    campaign. He plans to earn the Certified Fund Raising Executive (CFRE) credential, publish a practical guide on data‑driven fundraising, and become a recognized speaker at industry conferences. In the
    longer term, he envisions launching his own consulting practice to help mid‑size nonprofits implement efficient, results‑oriented fundraising models, while also mentoring emerging fundraisers and creating
    a supportive network that balances high performance with well‑being. Personal financial security for his family and establishing a predictable, high‑impact fundraising legacy are key drivers of his
    ambition.
