personas:
  professional: An inventive 7‑year‑old budding game developer named Sterling Espinoza uses Scratch to design simple adventure games, merging the step‑by‑step logic from building LEGO inventions with their
    natural curiosity about the outdoors, while their relaxed attitude toward deadlines lets them tinker until a perfect bug‑free version emerges, and they often share their creations with friends during
    playdates.
  sports: An enthusiastic junior athlete named Sterling Espinoza participates in after‑school soccer with the local Howard City Tigers youth club, follows the Detroit Lions and the Detroit Red Wings on
    TV, and enjoys spontaneous bike rides on forest trails, preferring informal, small‑group games over structured practice sessions, and they often cheer loudly when their team scores.
  arts: A budding LEGO architect named Sterling Espinoza devotes weekends to crafting intricate models inspired by the whimsical worlds of Pixar’s 'Toy Story' and the vibrant illustrations of Dr. Seuss,
    while they also cherish listening to the classic folk tunes of Woody Guthrie and the pop rhythms of Billie Eilish during quiet reading time, proudly displaying their creations at family gatherings.
  travel: A curious explorer named Sterling Espinoza loves day trips to Sleeping Bear Dunes and summer visits to Michigan’s Upper Peninsula, while dreaming of a future family vacation to the Grand Canyon
    and a weekend getaway to Disneyland in California, and they often sketch maps of these places in a worn notebook.
  culinary: A budding home chef named Sterling Espinoza enjoys assembling snack plates of peanut butter‑banana sandwiches and homemade trail mix with almonds, dried cranberries, and pretzel sticks, and
    occasionally attempts to bake simple chocolate chip cookies under dad’s supervision, though they often forget to set a timer, resulting in slightly over‑browned treats.
  core: A curious, practical 7‑year‑old named Sterling Espinoza blends a love for LEGO inventions, simple coding, and outdoor adventures with a laid‑back, sometimes messy approach to chores and savings,
    making them an inventive yet easily distracted youngster, and they often switch between projects mid‑way.
background:
  cultural: Sterling comes from a white, Midwestern family with roots in German and Irish ancestry, typical of many long‑standing households in Howard City, Michigan. The community values self‑reliance,
    neighborly cooperation, and a close connection to the outdoors—activities like fishing, attending county fairs, and exploring the nearby forests are common family pastimes. Growing up in this setting,
    Sterling has internalized a blend of practical work ethic and a curiosity about the natural world, while also participating in the small‑town traditions that emphasize modesty, personal responsibility,
    and community support.
