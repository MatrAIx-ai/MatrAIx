  career_goals: Sterling dreams of a future where he can blend his love of nature with his knack for building things. He aspires to become an engineer or wildlife biologist who designs tools and habitats
    that help animals and people alike. He imagines creating simple robots or community workshop projects that solve everyday problems, and one day maybe leading a local nature‑education program where he
    can share his curiosity with other kids. His goals reflect a balance of practical problem‑solving and exploratory learning.
