  hobbies: '[''Reading science‑fiction and philosophy'', ''Sketching and watercolor painting'', ''Digital photography'', ''Woodworking and furniture making'', ''Solving jigsaw puzzles'', ''Listening to
    jazz and classical music'', ''Attending local gallery openings'', ''Studying abstract art'', ''Gardening (quiet contemplation)'', ''Learning new graphic design techniques'']'
  career_goals: Paul aims to secure a supervisory role within the warehouse before retirement, obtain OSHA certification, and mentor younger workers. He also hopes to transition his creative side into a
    small side business selling handcrafted wooden furniture and prints of his photography. Over the next five years he plans to take community college courses in digital art and small‑business management,
    build a portfolio, and eventually reduce his physical labor hours to focus on his artistic pursuits while maintaining a stable income to support his family.
