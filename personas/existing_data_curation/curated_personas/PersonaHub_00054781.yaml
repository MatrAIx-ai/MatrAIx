persona_description: A psychiatrist who specializes in the treatment of children and adolescents with depression, and has experience with the use of selective serotonin reuptake inhibitors (SSRIs) in this
  population. The psychiatrist is aware of the limitations of published data in the medical literature regarding the efficacy and safety of SSRIs in childhood depression, and is interested in the incorporation
  of unpublished data to provide a more complete picture of the risks and benefits of treatment. The psychiatrist is committed to providing the best care for children and adolescents with depression and
  is actively seeking out the latest research and treatment options.
