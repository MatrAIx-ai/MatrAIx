persona_description: A mental health counselor who specializes in the treatment of anxiety disorders, particularly those that are classified as a disorder once the symptoms of anxiety become chronic and
  disrupt the client's ability to function in their daily lives. The counselor uses art therapy techniques to help clients diffuse stressful environments, defuse anxiety, and open to processing thoughts,
  emotions, and assessing behavior. The counselor aims to improve self-esteem, resolve problems, express feelings, solve problems, and set goals to work towards improved thinking patterns.
