personas:
  professional: Leopoldo Santiesteban leverages nearly four decades of supply-chain and logistics expertise to drive process improvements and mentor emerging bilingual professionals, blending analytical
    rigor with a relaxed, collaborative leadership style.
  sports: Leopoldo Santiesteban enjoys low‑impact activities such as weekend hikes with the New Mexico Desert Hiking Club and occasional rounds of golf at the Albuquerque Country Club, while cheering on
    New Mexico United in MLS and the Albuquerque Isotopes during baseball season.
  arts: Leopoldo Santiesteban channels his creative side through desert photography inspired by Ansel Adams, immerses himself in the literary worlds of Octavio Paz and Juan Rulfo, and enjoys local folk‑music
    evenings featuring the sounds of Lydia Mendoza and regional mariachi ensembles.
  travel: Leopoldo Santiesteban prefers self‑planned, solitary road trips that blend photography and cultural immersion, having already explored the dunes of White Sands, the canyons of Monument Valley,
    and the historic streets of Santa Fe, while dreaming of a future expedition to Patagonia's Torres del Paine.
  culinary: Leopoldo Santiesteban delights in crafting authentic mole poblano and hand‑made tamales, meticulously sourcing heirloom chilies, cacao, and masa harina, and balances his culinary experiments
    with a modest garden yielding fresh cilantro, tomatillos, and heirloom corn.
  core: Leopoldo Santiesteban is a curious, pragmatic solitary who blends logistics mastery with a love for desert photography, heirloom gardening, and low‑key cultural gatherings, all while navigating
    retirement planning with a relaxed, occasionally disorganized approach.
background:
  cultural: Leopoldo’s cultural identity is rooted in his Mexican heritage and the Southwestern tapestry of New Mexico. Raised in a bilingual household, he maintains fluency in Spanish and celebrates traditions
    such as Día de los Muertos, quinceañeras, and regional fiestas that blend Mexican folklore with Pueblo influences. His family places a strong emphasis on respect for elders (respeto) and hospitality
    (hospitalidad), which inform his cooperative approach at work. He actively participates in the local Hispanic community, volunteering at cultural festivals and supporting Mexican‑American arts initiatives.
    This blend of Mexican customs, Catholic faith, and the open‑air ethos of the high desert shapes his worldview and daily practices.
attributes:
