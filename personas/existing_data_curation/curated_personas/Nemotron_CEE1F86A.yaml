  hobbies: '[''Hiking (Santa Monica Mountains)'', ''Landscape Photography'', ''Solo Chess (online)'', ''Python Programming (side projects)'', ''Reading Non‑fiction (technology, psychology, business)'',
    ''Meditation'', ''Home Automation Projects'', ''Running (beach)'', ''Documentary Watching'']'
  career_goals: Cole aims to rise to a regional Vice President of Sales role within the next five years, overseeing a multi‑state tech sales organization and shaping go‑to‑market strategies for emerging
    SaaS and hardware solutions. He is driven to break company sales records, earn industry recognition as a top performer in the Los Angeles market, and eventually launch a boutique consultancy that advises
    startups on scaling sales operations. Balancing his ambition with his awareness of stress, he also seeks to implement sustainable performance practices that protect his well‑being while maintaining
    a competitive edge.
