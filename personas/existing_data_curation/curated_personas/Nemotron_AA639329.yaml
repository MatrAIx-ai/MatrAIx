personas:
  professional: Susan Gordon, a 26‑year‑old insurance sales agent, blends their curiosity about policy nuances with a practical, results‑driven mindset, translating complex coverage language into relatable
    stories while relying on flexible planning and spontaneous problem‑solving to consistently meet targets, mentor junior teammates, and cultivate a supportive, low‑stress team environment.
  sports: Susan Gordon, a 26‑year‑old dog lover who prefers low‑impact activity, walks their golden retriever Milo five times a week through Riverfront Park, plays on a casual weekend softball league with
    a tight‑knit group of friends, cheerfully supports the local minor‑league baseball team the Springfield Sluggers, and occasionally attends a community yoga class at the Wellness Hub.
  arts: Susan Gordon, a 26‑year‑old watercolor enthusiast, spends evenings painting soft‑hued cityscapes after reading Agatha Christie mysteries, knits scarves inspired by Van Gogh’s Starry Night, unwinds
    to the soulful crooning of Norah Jones, reserves Saturday nights for intimate board‑game gatherings, and occasionally attends indie‑film screenings like The Grand Budapest Hotel at the downtown art
    house.
  travel: Susan Gordon, a 26‑year‑old weekend adventurer, enjoys short road trips to nearby coastal towns such as Ogunquit, Maine for lobster rolls and beachfront walks, dreams of hiking the red rock cliffs
    of Sedona, Arizona, and keeps a growing list of solo watercolor retreats in places like England’s Lake District, all while balancing travel plans around their flexible work schedule and budget constraints
    for future family needs.
  culinary: Susan Gordon, a 26‑year‑old home cook, favors herb‑forward meals—their signature dish is lemon‑rosemary grilled chicken with sautéed Swiss chard—frequently brews chamomile‑lavender tea using
    fresh herbs from their balcony garden, enjoys occasional indulgence in artisanal sourdough with avocado, and treats themselves to oat‑milk lattes at the neighborhood café Bean & Bloom during quiet reading
    breaks.
  core: Susan Gordon, a 26‑year‑old insurance agent who blends curiosity with practicality, soothes stress through yoga and watercolor, yet habitually misplaces invoices, worries about tomorrow’s sales
    quota, and nurtures their community through knitting, dog walks, and quiet coffee‑shop moments.
background:
  cultural: Susan grew up in the greater Belleville area of St. Clair County, a region steeped in Midwestern values of modesty, hard work, and community solidarity. Raised in a white, working‑class family
    with German and Irish roots, she attended Belleville East High School, where church youth groups and local sports fostered her appreciation for cooperation and harmony. The area's blend of industrial
    heritage and small‑town agricultural charm shaped her practical outlook, while the close‑knit neighborhoods encouraged her reserved yet kind demeanor. Local traditions—such as county fairs, volunteer
    drives, and neighborhood potlucks—reinforce her belief in giving back and maintaining strong, supportive relationships within a modest, familiar setting.
attributes:
  skills: '[''Insurance sales'', ''Customer relationship management'', ''Risk assessment'', ''Negotiation'', ''Product knowledge (auto, home, health)'', ''CRM software (e.g., Salesforce)'', ''Effective
