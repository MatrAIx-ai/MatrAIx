  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Knitting'', ''Walking her dog'', ''Visiting local coffee shops'', ''Volunteer work at community food bank'', ''Painting (watercolors)'', ''Listening
    to personal finance podcasts'', ''Yoga'', ''Genealogy research'']'
  career_goals: Susan aims to become a senior sales consultant and eventually a branch manager within her insurance agency, where she can mentor newer agents and shape a supportive, low‑stress work culture.
    She plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen her expertise and increase credibility with clients. Balancing her ambition with her desire for personal harmony,
    she hopes to secure a stable income that supports her growing family while maintaining enough flexibility to prioritize self‑care and community involvement. In the longer term, she envisions launching
    her own boutique brokerage focused on personalized, community‑centered insurance solutions.
