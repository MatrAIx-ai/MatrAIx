    horticultural theory'', ''Sustainable farming practices'', ''Farm equipment maintenance'']'
  hobbies: '[''Gardening'', ''Landscape sketching'', ''Nature photography'', ''Reading abstract art and philosophy books'', ''Poetry writing'', ''Stargazing'', ''Hiking in coastal trails'', ''DIY aquaponics
    projects'', ''Home brewing kombucha'', ''Developing garden monitoring software'']'
  career_goals: Michael aims to transition from a miscellaneous agricultural worker to the owner‑operator of a boutique sustainable farm that blends high‑quality organic produce with artistic installations.
    He plans to obtain a Certified Organic Horticulturist credential and to develop a small‑scale vertical farming operation that showcases innovative growing methods such as aquaponics and hydroponics.
    Long‑term, he hopes to author a guide on creative, data‑driven farming practices and to mentor other solitary, curiosity‑driven individuals through community‑supported agriculture projects in the San
    Diego area.
