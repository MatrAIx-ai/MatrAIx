personas:
  professional: Magan Dangalan, a budding teen programmer and science‑fiction storyteller, combines her curiosity and practicality by leading modest coding club projects where they apply algorithmic logic
    to narrative design, balancing organized task management with flexible creative brainstorming.
  sports: Magan Dangalan, an avid hiker and birdwatcher, is a member of the school’s outdoor adventure club, follows the Oklahoma City Thunder basketball team, enjoys occasional pick‑up soccer games with
    friends, and spends weekends exploring the trails of Osage Hills while cheering on the Oklahoma State Cowboys football team during televised matches.
  arts: Magan Dangalan, a dedicated digital illustrator, spends evenings crafting character sketches inspired by Hayao Miyazaki’s Studio Ghibli art and James Gurney’s Dinotopia paintings, while drawing
    narrative influence from Becky Chambers’ science‑fiction novels and listening to synth‑wave music by Com Truise during drawing sessions.
  travel: Magan Dangalan, an exploratory teen, prefers meticulously planned nature getaways, has trekked the rolling vistas of Osage Hills multiple times, dreams of backpacking Yellowstone’s Grand Prismatic
    Spring trail, and hopes to visit the cliff dwellings of Mesa Verde National Park next summer.
  culinary: Magan Dangalan, an aspiring home‑chef, favors quick, nutrient‑dense meals such as avocado toast sprinkled with hemp seeds, banana‑oat pancakes drizzled with maple syrup, and herb‑infused teas
    brewed from sage and lavender collected during hikes, while occasionally treating themselves to artisanal dark chocolate on weekends.
  core: Magan Dangalan, a curious yet grounded 13‑year‑old, blends solitary sci‑fi reading with practical outdoor adventures, and they approach life with calm resilience, organized flexibility, and a habit
    of losing track of time while sketching.
background:
  cultural: Magan comes from a middle‑class family with mixed European ancestry, primarily Irish and German roots, typical of many White families in Tulsa, Oklahoma. Growing up in Tulsa County, she has
    been shaped by Midwestern values of modesty, hard work, and community involvement. Her family participates in local traditions such as the Tulsa State Fair and supports community service projects through
    their church. The city’s rich history, including its Native American heritage and the legacy of the oil boom, informs her appreciation for regional history and diversity, while the surrounding prairies
    and nearby Osage Nation lands inspire her love for outdoor exploration. These cultural influences combine with her family’s emphasis on education and self‑reliance to form a grounded, pragmatic outlook.
