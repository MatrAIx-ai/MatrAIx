  career_goals: Magan aspires to channel her curiosity and practical mindset into a career that blends technology and community impact. She hopes to become a software engineer specializing in educational
    technology, creating tools that help students learn more effectively. In the longer term, she envisions leading initiatives that integrate STEM education with local community programs in Tulsa. She
    also aims to pursue a degree in computer science while maintaining her commitment to small‑group mentorship and peer support.
