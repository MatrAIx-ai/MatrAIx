  hobbies: '[''Drawing colorful pictures'', ''Building forts with cushions'', ''Reading picture books'', ''Listening to Mexican folk and pop music'', ''Dancing'', ''Collecting leaves and stones'', ''Pretend
    cooking'', ''Playing with modeling clay'']'
  career_goals: Mirtha dreams of a future where she can turn her boundless imagination into a career that lets her create and share beauty. She often talks about becoming a painter who makes magical pictures,
    a storyteller who writes picture books, or even an astronaut who explores distant stars. Her ambition is to stay curious, keep learning new things, and one day use her art and ideas to make other children
    laugh and dream.
