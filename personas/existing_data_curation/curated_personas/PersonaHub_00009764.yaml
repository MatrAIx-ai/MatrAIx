persona_description: A fashion designer who is interested in using virtual reality and augmented reality technologies to enhance the shopping experience and promote sustainability in the fashion industry.
  They are also interested in the digitalisation of the fashion industry and the creation of virtual avatars and libraries. They are looking for a solution that can help them test and visualise garments
  during the designing process, provide AR try-ons and virtual fitting rooms, and promote sustainability and a circular economy. They are also interested in the possibility of using the avatars to prevent
  materialised modifications and the shipment of samples from Europe to Asia and back.
