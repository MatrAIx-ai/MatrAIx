personas:
  professional: Tonika Harmon, a 73‑year‑old sustainable agriculture specialist, combines meticulous record‑keeping, permaculture design, seed‑saving expertise, and oral‑history storytelling to lead a community
    garden project that mentors young women farmers while preserving regional low‑country planting traditions.
  sports: Tonika Harmon participates in daily beach walks, senior birdwatching club outings, and a low‑impact yoga class at the community center, follows the Charleston RiverDogs baseball team for summer
    entertainment, and treats gardening as her primary fitness routine, while carefully avoiding overexertion due to joint concerns.
  arts: Tonika Harmon frequents local galleries showcasing coastal folk‑art, collects hand‑stitched quilts by regional artists such as Mary K. Hines, listens to Miles Davis, B.B. King, and Etta James while
    knitting, and occasionally creates her own textile pieces inspired by the colors of sunrise over the marshes.
  travel: Tonika Harmon prefers slow, purpose‑driven travel, enjoys weekend trips to historic Charleston, Savannah, and Beaufort to study historic gardens, dreams of a guided tour of the rice terraces in
    Southeast Asia, yet balances these desires with a modest travel budget and occasional family responsibilities.
  culinary: Tonika Harmon delights in preparing Lowcountry shrimp and grits, orange‑glazed sweet potatoes, and okra stew, often experimenting with heirloom tomatoes, wild herbs, and smoked paprika, while
    brewing herbal tea infused with local rosemary and mint, and despite a tendency to over‑salt the stew when stressed, she consistently shares meals at neighborhood potlucks.
  core: Tonika Harmon, a 73‑year‑old garden‑savvy storyteller, merges disciplined record‑keeping with a curious love of folk‑art, yet wrestles with chronic worry that fuels both meticulous planning and
    occasional over‑cautiousness.
background:
  cultural: Tonika is an elderly Black woman rooted in the Gullah/Geechee heritage of the Sea Islands in Beaufort County, South Carolina. Her ancestors were enslaved rice and indigo cultivators who brought
    West‑African agricultural knowledge that shaped the Lowcountry’s landscape. Growing up in Seabrook, she was immersed in a close‑knit community where the Gullah language, storytelling, and coastal cuisine
    were daily life. The church has been a central institution, offering both spiritual support and a venue for communal music, oral histories, and mutual aid. Tonika’s cultural identity is marked by resilience,
    an emphasis on self‑reliance, and a deep reverence for the land and its traditions. She actively participates in local heritage festivals that celebrate Gullah arts, music, and food, and she strives
    to pass these traditions to younger generations while integrating contemporary sustainable practices.
attributes:
  skills: '[''organic gardening'', ''permaculture design'', ''crop rotation and soil health management'', ''small livestock husbandry (chickens, goats)'', ''farm equipment operation and maintenance'', ''detailed
    record‑keeping and budgeting'', ''seed saving and heirloom preservation'', ''community outreach and workshop facilitation'', ''folk art appreciation and curation'', ''oral history documentation'', ''quilt
    making and textile craft'']'
  hobbies: '[''folk‑art collection and quilting'', ''reading African‑American poetry'', ''listening to jazz and blues'', ''birdwatching and nature photography'', ''walking on the beach and marshes'', ''cooking
    and experimenting with Gullah cuisine'', ''attending small community and church gatherings'', ''maintaining a personal journal of art exhibits'', ''gardening for pleasure with heirloom flowers'']'
  career_goals: Tonika aims to leave a lasting legacy of sustainable agriculture and cultural preservation in the Lowcountry. She plans to formalize a community‑garden project that showcases traditional
    Gullah planting techniques and serves as a training hub for younger residents. She hopes to mentor aspiring farmers, especially women, by offering hands‑on workshops and sharing her extensive oral histories.
    Achieving Master Gardener certification through the local extension service is a concrete goal, as is publishing a memoir that weaves together her farming experiences, family stories, and reflections
    on Black life in coastal South Carolina. Ultimately, she seeks to see her garden become a recognized site for food security and cultural tourism during regional heritage festivals.
