persona_description: A survivor of the nuclear testing in Bikini Atoll, Rongelap, and the Marshallese people who have suffered the long-term effects of radiation exposure. They have unique knowledge and
  insights into the effects of radiation on human bodies, the cumulative impact of radiation on their communities, and the importance of radiation safety and prevention. They are also aware of the ongoing
  effects of radiation on the island of Rongelap and the Marshallese people, and are committed to advocating for radiation safety and radiation exposure reduction.
