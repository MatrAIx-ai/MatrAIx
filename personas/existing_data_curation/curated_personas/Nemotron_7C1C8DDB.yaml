  hobbies: '[''Visiting art museums and galleries'', ''Collecting contemporary African American art'', ''Playing jazz saxophone'', ''Attending live music performances'', ''Photography of street art and
    historic sites'', ''Traveling to African diaspora cultural destinations'', ''Mentoring at‑risk youth'', ''Serving on nonprofit arts board'', ''Hosting dinner parties and professional networking events'',
    ''Cooking Southern cuisine with African influences'', ''Gardening'', ''Cycling along the James River trail'']'
  career_goals: Danish aims to advance to a senior director or chief analytics officer role, where he can shape enterprise‑wide data strategy and drive evidence‑based decision making. He is pursuing an
    executive MBA to deepen his leadership acumen and plans to earn a certification in data science to stay at the cutting edge of analytics. A core ambition is to leverage his position to champion community‑focused
    projects that promote equitable economic development in Richmond, especially initiatives that integrate cultural data to support local arts institutions. He also hopes to expand his mentorship footprint,
    creating pipelines for underrepresented talent in analytics through university partnerships and corporate DEI programs. Ultimately, he aspires to be a thought leader who bridges analytical rigor with
    creative problem solving, speaking at conferences and publishing on the intersection of data, art, and social impact.
