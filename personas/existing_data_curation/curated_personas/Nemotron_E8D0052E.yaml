  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Cooking Salvadoran dishes'', ''Hiking in the Hill Country'', ''Reading science‑fiction and Salvadoran literature'', ''Attending
    cultural festivals'', ''Yoga and meditation'', ''Learning new programming languages'']'
  career_goals: Maria aspires to become a senior engineering manager leading large‑scale sustainable infrastructure projects in the Greater Houston area, with a focus on integrating community‑centered design
    and artistic elements into built environments. She aims to champion diversity and inclusion by mentoring upcoming Latina engineers and building partnerships with local schools and non‑profits to promote
    STEM education among underrepresented youth. Long‑term, she envisions founding a consultancy that bridges engineering innovation with cultural relevance, creating solutions that are both technically
    robust and socially resonant. While ambitious, she is committed to maintaining a balanced lifestyle, prioritizing mental health practices to manage stress and sustain her creative drive.
