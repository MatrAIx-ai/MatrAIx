personas:
  professional: Maria Heredia, a 36‑year‑old multidisciplinary engineer specializing in sustainable product design, leverages design‑thinking, advanced simulation (FEA, CFD), and bilingual stakeholder engagement
    to craft energy‑efficient solutions while infusing artistic community elements into Houston’s infrastructure projects.
  sports: Maria Heredia hikes the Texas Hill Country on weekends, practices yoga three times a week, participates in the local Houston Hiking Club, follows the Houston Astros in baseball season and the
    Houston Dynamo during soccer season, and occasionally joins a community 5K run organized by the city’s health department.
  arts: Maria Heredia immerses herself in Houston’s arts scene by watercolor‑painting bright murals inspired by Frida Kahlo and local street artists, attending exhibitions at the Museum of Fine Arts, dancing
    to the rhythms of Los Tigres del Norte at cultural festivals, and regularly enjoying performances by the Houston Ballet and concerts by the Latin rock band Café Tacvba.
  travel: Maria Heredia balances a love for short weekend trips to Austin’s music venues and long‑planned excursions to Oaxaca’s food markets, dreams of hiking the Inca Trail to Machu Picchu, and recently
    booked a sustainable‑tour package to Costa Rica’s rainforests, preferring Airbnb stays that let her cook traditional dishes with local families.
  culinary: Maria Heredia delights in hand‑making pupusas stuffed with quesillo and loroco, simmering tamales with masa harina and annatto, sautéing cilantro‑lime grilled fish with chilies, and occasionally
    experimenting with saffron in paella, all while sourcing fresh masa, heirloom tomatoes, and locally roasted coffee for her kitchen experiments.
  core: Maria Heredia blends rigorous sustainability engineering with vibrant cultural advocacy, channels artistic curiosity into community‑focused design, and steadies a worry‑prone mind through yoga,
    even as she occasionally overcommits to projects and splurges on art supplies.
background:
  cultural: Maria is a first‑generation Salvadoran‑American raised in Houston's vibrant Latino community. Fluent in both Spanish and English, she grew up speaking the melodic cadence of Salvadoran dialects
    at home while navigating an American educational environment. Family gatherings featured traditional foods, folk music, and stories of resilience that shaped her values of collectivism, family solidarity,
    and respect for elders. She actively participates in local Salvadoran organizations, celebrating holidays like Día de la Virgen de la Merced and joining community events such as the annual Fiesta de
    Pupusas. This cultural immersion informs her worldview, fostering a deep appreciation for diversity and a commitment to design solutions that honor the lived experiences of underserved communities.
attributes:
  skills: '[''Sustainable product design'', ''Finite element analysis'', ''Computational fluid dynamics (CFD)'', ''Project management'', ''Design thinking'', ''Cross‑functional team leadership'', ''Spanish‑English
