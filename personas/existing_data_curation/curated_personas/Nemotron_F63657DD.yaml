personas:
  professional: Armin Donnelly is an aspiring multidisciplinary teen artist who blends sketching, mixed‑media collage, photography, and songwriting, channeling their curiosity and sociable charisma into
    leading school art workshops while they let their competitive streak and occasional self‑doubt drive meticulous organization and bold experimentation.
  sports: Armin Donnelly enjoys pick‑up basketball games at a local park, follows the Chicago Bulls and Chicago Blackhawks avidly, participates in the Chesterton Youth Skate Club during the summer, and
    occasionally joins school intramural soccer, all while they channel their competitive nature into fast‑paced, social sports.
  arts: Armin Donnelly frequently sketches street scenes inspired by the bold lines of Basquiat and the stencil work of Banksy, attends Chicago art gallery openings featuring artists like Kehinde Wiley,
    writes guitar‑driven lyrics echoing the storytelling of Joni Mitchell and the raw edge of Nirvana, and performs in community theatre productions of 'The Crucible', weaving together visual, musical,
    and theatrical influences into their creative identity while they relish being the center of attention.
  travel: Armin Donnelly prefers weekend trips that blend structured itineraries with spontaneous exploration, having visited Milwaukee’s lakefront, New York’s MoMA, and a family road‑trip to Detroit, while
    they dream of photographing street art in Berlin, strolling through Paris’s Louvre, and experiencing the cherry blossoms of Kyoto, all balanced against a modest travel budget and school responsibilities.
  culinary: Armin Donnelly enjoys the hearty flavor of Chicago deep‑dish pizza topped with mozzarella and pepperoni, the bright tang of Vietnamese pho broth, and the fresh zest of avocado toast with chili
    flakes, cooking at an intermediate level in the family kitchen where they often experiment with homemade salsa using jalapeño, cilantro, and lime.
  core: Armin Donnelly is a hyper‑social, art‑obsessed teen who juggles sketchbooks, guitar riffs, and gaming battles while they wrestle with anxiety and a relentless curiosity that fuels both bold creativity
    and occasional self‑critical worry.
background:
  cultural: Armin grew up in Chesterton, Indiana, a small Midwestern town near Lake Michigan. His family’s heritage blends German, Irish, and English ancestry, reflecting the common ethnic roots of many
    white families in the region. The community emphasizes modesty, hard work, and close‑knit neighborhood ties, with frequent participation in local festivals, high‑school sports events, and church gatherings.
    Proximity to Chicago exposes him to a broader cultural scene, including modern art, live music, and diverse cuisine, which fuels his curiosity for new ideas. The blend of traditional Midwestern values
    and exposure to urban creativity shapes his perspective, encouraging both a respect for community traditions and an eagerness to explore unconventional artistic expressions.
