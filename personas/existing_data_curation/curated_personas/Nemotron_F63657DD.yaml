  career_goals: Armin aspires to turn his passion for visual storytelling and performance into a career in multimedia creativity. He aims to attend a university with a strong communications or fine arts
    program, where he can refine his skills in digital media, film production, and interactive design. His long‑term ambition is to become a creative director or content strategist for a forward‑thinking
    agency, leading innovative campaigns that blend art, technology, and social impact. He also hopes to build his own personal brand on platforms like YouTube or TikTok, leveraging his outgoing personality
    to engage audiences. Recognizing his competitive drive, he plans to enter student film festivals and entrepreneurship contests, seeking recognition that will open doors to professional mentorship and
    internships.
