personas:
  professional: Kristen Turk, a three‑year‑old with a surprising knack for organizing playtime, pretends to run a ‘block construction office’ where they methodically sort colorful bricks by size and color,
    delighting in planning mini‑building projects before they even begin.
  sports: Kristen Turk energetically swings at the local playground, proudly wears a miniature New York Yankees cap, and joins the community’s Little Lions toddler soccer group, where they relish running
    in circles during warm‑up drills and cheering for the team.
  arts: Kristen Turk delights in crafting crayon masterpieces of dinosaurs while singing along to Disney’s “Let It Go” and watching Sesame Street’s Elmo, which fuels their vivid imagination and early appreciation
    for storytelling.
  travel: Kristen Turk prefers short family road trips to the nearby zoo or the beach, where they eagerly collect seashells and marvel at the giraffes, yet occasionally dreams of a magical visit to Disneyland,
    balancing their love for familiar routines with a spark of adventure.
  culinary: Kristen Turk savors chicken nuggets paired with sweet potato fries and often asks for a side of apple slices, while their growing independence shines as they attempt to spread peanut butter
    on toast, though they sometimes forget to clean the sticky fingers.
  core: Kristen Turk is a brightly curious three‑year‑old who blends a love for orderly play with the boundless energy of a social explorer, constantly arranging their world while happily sharing it with
    peers.
background:
  cultural: Kristen was born and raised in New Berlin, a small rural town in Otsego County, upstate New York. Her family is of European descent, with roots in German and Irish heritage common to the region.
    She grows up in a close-knit community that values family gatherings, local church participation, and seasonal celebrations such as harvest festivals, Thanksgiving, and Fourth of July picnics. Outdoor
    activities like hiking, fishing, and gardening are a regular part of her life, reflecting the area’s connection to nature. The community’s emphasis on cooperation, modesty, and practical hard work shapes
    her upbringing.
