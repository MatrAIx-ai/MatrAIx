  career_goals: Although still very young, Kristen already dreams of roles that let her nurture, organize, and explore. She often talks about wanting to be a teacher who helps other children learn, a veterinarian
    who cares for animals, or a park ranger who protects the outdoors. Her long-term ambition is to combine her love for learning with her natural kindness, eventually pursuing a career in early childhood
    education or community service where she can create structured, supportive environments for others. In the near future she looks forward to starting preschool, learning to read more books, and helping
    her parents with simple chores.
