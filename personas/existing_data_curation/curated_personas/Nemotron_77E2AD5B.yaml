  hobbies: '[''Exploring Street Art'', ''Painting'', ''Cooking Ecuadorian Cuisine'', ''Salsa Dancing'', ''Group Yoga'', ''Attending Live Music'', ''Community Volunteering'', ''Beach Walks'', ''Reading Travel
    Literature'']'
  career_goals: Silda aims to move into a training and mentorship role within the transit agency, becoming a certified driver trainer and eventually a senior route coordinator. She envisions leveraging
    her love of art and community to launch a partnership program that integrates public transportation with local cultural initiatives, such as bus‑board art displays and stop‑side pop‑up galleries. Over
    the long term, she hopes to pursue a degree in community development or social work, allowing her to design outreach projects that support immigrant families and promote cultural exchange across Los Angeles
    County.
