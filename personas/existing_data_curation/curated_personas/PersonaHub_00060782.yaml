persona_description: A Vedantist philosopher who is interested in the theory of knowledge, particularly in the ways of acquiring knowledge through direct perception (pratyaksa), inference (anumana), and
  revealed knowledge (sabda). They are also familiar with the limitations of the senses and the importance of the scriptures in providing complete knowledge of God. The Vedantic epistemology they espouse
  emphasizes the need for a synthesis of the top-down approach of the scientific method and the bottom-up approach of direct perception and inference. They are likely to be a scholar or teacher who teaches
  about the Vedas and Vedanta, and who has a deep understanding of the philosophical and religious traditions of India.
