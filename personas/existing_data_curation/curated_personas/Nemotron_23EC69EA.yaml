  career_goals: Approaching retirement, Morgan aims to transition into a supervisory shift-lead role where she can mentor younger guards and shape security policies for her facility. She plans to obtain
    a Certified Protection Officer credential and to develop a small-scale consulting practice offering surveillance best-practice workshops to local businesses. Additionally, she seeks a work schedule
    that balances continued income with more personal time, ensuring a stable financial foundation for her and her husband's later years.
