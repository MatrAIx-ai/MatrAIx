personas:
  professional: A ten‑year‑old budding architect, Sheila Lacson channels her love for intricate LEGO sets into designing detailed blueprints for school science fairs, leveraging her strategic mind from
    chess to anticipate judges’ criteria.
  sports: A disciplined swimmer, Sheila Lacson attends the Rockaway Community Aquatics Club, training under Coach Martinez to improve lap times while cheering for the New York Yankees and the New Jersey
    Devils during the off‑season.
  arts: An avid admirer of structured creativity, Sheila Lacson enjoys listening to the cinematic scores of Hans Zimmer while assembling LEGO architecture, and they often study the detailed illustrations
    of Shaun Tan in graphic novels to inspire their own design concepts.
  travel: A curious explorer, Sheila Lacson has visited the Smithsonian National Air and Space Museum on a school field trip and dreams of touring the Kennedy Space Center, preferring meticulously planned
    itineraries over spontaneous trips.
  culinary: A budding home chef, Sheila Lacson loves preparing spaghetti with meatballs, perfecting the ratio of sauce to pasta, and occasionally experiments with making class‑room‑friendly LEGO‑shaped
    sugar cookies, favoring fresh basil and Parmesan as signature ingredients.
  core: Sheila Lacson is a methodical ten‑year‑old who thrives on structure, turning every puzzle, chess match, and LEGO project into a measurable challenge, though they sometimes obsess over perfect scores.
background:
  cultural: Sheila comes from a middle‑class, predominantly white American family in Rockaway, New Jersey. Her household celebrates typical American holidays such as Thanksgiving, Christmas, and Independence
    Day, and she occasionally attends a local community church with her family. Growing up in a suburban environment, she has had access to well‑resourced public schools, after‑school programs, and community
    sports facilities, which have fostered her appreciation for education, structured extracurricular activities, and community involvement.
attributes:
  skills: '["Organizational planning", "Time management", "Problem solving", "Attention to detail", "Basic coding (Scratch)", "Chess strategy", "Mathematics"]'
  hobbies: '["LEGO building", "Puzzle solving", "Chess", "Reading non-fiction (space, engineering)", "Swimming lessons", "School math club", "Nature walks (structured hikes)"]'
  career_goals: Although still in elementary school, Sheila is already thinking about a future that blends her love for structure, problem solving, and building. She aspires to become a civil engineer or
    architect, envisioning herself designing safe, efficient spaces and perhaps leading community projects one day. She aims to consistently achieve top grades, win school science fairs, and eventually
    serve as president of the school's STEM club. Her competitive nature drives her to seek challenges in math competitions and chess tournaments, and she hopes these experiences will pave the way toward
    a career in engineering or a related technical field.
