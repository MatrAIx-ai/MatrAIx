  hobbies: '["Art Gallery Visits", "Sketching and Painting", "Landscape Photography", "Group Hiking in Desert Trails", "Pickup Basketball", "Salsa Dancing", "Cooking Mexican Cuisine", "Volunteer at Cultural
    Festivals", "Listening to Music (Mexican folk & indie)", "Reading Business & Self‑Improvement Books"]'
  career_goals: Rafael aims to advance from senior sales associate to store manager within the next two years, followed by a regional management role. To support this trajectory, he plans to earn an associate
    degree in business administration and obtain a certified retail‑management credential. His competitive drive pushes him to be the top‑performing salesperson in Graham County, while his curiosity fuels
    a long‑term ambition to launch his own boutique that showcases Mexican‑inspired art, crafts, and culinary products. He also seeks to mentor emerging Hispanic talent and champion culturally inclusive
    retail experiences.
