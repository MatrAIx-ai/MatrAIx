  hobbies: '[''Church choir singing'', ''Cooking soul‑food'', ''Hosting potlucks'', ''Zumba fitness classes'', ''Community gardening'', ''Philadelphia Eagles and Phillies fandom'', ''Volunteering with Habitat
    for Humanity'', ''Reading mystery novels'', ''DIY home improvement projects'']'
  career_goals: Ayahna aims to advance to a foreman or facility‑manager role within the next five years, leveraging her technical expertise and people‑oriented leadership style. She plans to earn a Master
    Electrician license and additional certifications in building automation. Long‑term, she hopes to launch her own community‑focused repair service that offers affordable maintenance for low‑income households
    in Philadelphia, while also creating apprenticeship opportunities for other black women entering the trades. She is also interested in taking a union steward position to advocate for workers’ rights
    and safety.
