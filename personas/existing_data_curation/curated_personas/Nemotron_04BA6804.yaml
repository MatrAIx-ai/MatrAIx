personas:
  professional: Ayahna Ivy is a seasoned journeyman electrician with 15 years of experience in electrical, HVAC, and plumbing installations, whose practical mindset and meticulous attention to safety standards
    enable her to diagnose faults swiftly, while they leverage a sociable, talkative nature to mentor apprentices and coordinate teams, positioning themselves for a future foreman or facility‑manager role.
  sports: Ayahna Ivy fuels her fitness through weekly Zumba classes and community gardening, while cheering on the Philadelphia Eagles in the fall and the Philadelphia Phillies during baseball season, and
    they occasionally join a local co‑ed softball league to stay active.
  arts: Ayahna Ivy expresses her artistic side as a lead vocalist in her church choir, draws inspiration from jazz legends like Ella Fitzgerald and contemporary hip‑hop artists such as Kendrick Lamar, and
    they unwind by devouring mystery novels by Agatha Christie and Tana French.
  travel: Ayahna Ivy prefers road‑trip adventures that blend cultural immersion and family time, having explored New Orleans for its blues roots, taken a weekend pilgrimage to Ghana’s Cape Coast to connect
    with ancestral heritage, and they dream of strolling through the historic streets of Charleston while budgeting each trip through a dedicated travel fund.
  culinary: Ayahna Ivy is a proficient home cook who delights in preparing soul‑food staples like collard greens simmered with smoked turkey, buttery cornbread, and sweet potato pie, often spicing dishes
    with okra, hot sauce, and a pinch of smoked paprika, and they love hosting potlucks where they showcase these flavors alongside fresh garden herbs.
  core: Ayahna Ivy balances a disciplined trade career with a vivacious social life, habitually humming hymns while wiring circuits, over‑committing to community events, and they secretly keep a stash of
    candy bars in their tool bag for late‑night troubleshooting.
background:
  cultural: Ayahna is a second‑generation African‑American who grew up in West Philadelphia, a neighborhood shaped by the city's rich history of black culture, music, and activism. Her family traces its
    roots to the Great Migration from the rural South, bringing traditions of communal support and resilience. She draws pride from Philadelphia’s vibrant cultural scene, from the annual Odunde Festival
    celebrating African heritage to local jazz and hip‑hop venues. Her upbringing in a close‑knit church community reinforced values of cooperation, service, and mentorship, which she carries into her professional
    life and community involvement.
