personas:
  professional: Jesus Arrarte, a budding architect in the making, channels a methodical love for order into building elaborate LEGO cityscapes, planning each structure with quiet focus, and learning through
    picture books about animals and space, while humming lullabies that keep their solitary workflow harmonious.
  sports: Jesus Arrarte, an enthusiastic member of the local kids' soccer club that practices under the guidance of the Colorado Rapids youth program, spends Saturdays dribbling a small ball on the grass
    after nature hikes, while also joining the weekend family hike club that explores the Rocky Mountain trails, preferring low‑key, team‑oriented play over noisy crowds.
  arts: Jesus Arrarte, a dedicated young artist, fills sketchbooks with detailed drawings of insects, mountains, and folklore scenes while listening to folk singer Lila Down's melodies and classic cartoon
    soundtracks, and spends evenings coloring intricate mandala pages, proudly displaying their creations on the hallway wall beside papel picado decorations.
  travel: Jesus Arrarte, who loves quiet, nature‑filled adventures, enjoys family road trips to the Grand Canyon and to the far‑away town where their grandparents grew up, planning each outing with a hand‑drawn
    map and a checklist of rocks, leaves, and snacks, always eager to bring home a small souvenir for the collection.
  culinary: Jesus Arrarte, a budding junior chef, delights in helping prepare tamales and enchiladas for holiday feasts, enjoys snacking on fresh fruit slices and queso fresco, and spends afternoons perfecting
    a simple guacamole recipe using ripe avocados, lime, and a pinch of salt while humming a lullaby.
  core: Jesus Arrarte, a six‑year‑old explorer of quiet worlds, blends a love for solitary LEGO architecture, meticulous saving habits, and gentle, steady resilience, all while humming familial lullabies
    and collecting nature’s tiny treasures.
background:
  cultural: Jesus is raised in a Mexican‑American household in Johnstown, Colorado, where Spanish is spoken at home alongside English. His family celebrates traditional holidays such as Día de los Muertos
    and Mexican Independence Day, preparing foods like tamales and enchiladas and displaying colorful papel picado. He often hears stories about his grandparents’ hometown in Mexico, learns Mexican folk
    songs, and participates in community events at the local cultural center. This bicultural upbringing blends the warmth of Mexican traditions with the quiet, nature‑rich lifestyle of the Rocky Mountain
    region, shaping his values of family harmony, respect, and curiosity about the world.
