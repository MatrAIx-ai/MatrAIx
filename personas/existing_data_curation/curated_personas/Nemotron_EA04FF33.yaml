  hobbies: '[''Reading picture books'', ''Coloring and drawing'', ''Building LEGO structures'', ''Solving jigsaw puzzles'', ''Collecting rocks and insects'', ''Listening to Mexican folk music'']'
  career_goals: Jesus talks about becoming an engineer or inventor who can design rockets, robots, or useful gadgets. He loves figuring out how things work and imagines building his own space‑exploration
    models one day. He also mentions a wish to help animals, dreaming of being a veterinarian who cares for pets and wildlife. His ambitions blend curiosity, practical problem‑solving, and a desire to create
    things that improve the lives of others.
