personas:
  professional: Luigi McKenzie, a retired handyman turned community mentor, blends their meticulous carpentry and emergency‑prep know‑how with a laid‑back, flexible schedule, and they teach neighbors sustainable
    high‑desert living while selling handcrafted furniture at regional craft fairs.
  sports: Luigi McKenzie, a dedicated early‑morning hiker and bird‑watcher, participates with the Phelan Trail Walkers senior club for spring and fall treks, and they loosely track the Los Angeles Rams
    (NFL) and Los Angeles Dodgers (MLB) while favoring low‑impact cardio over team sports.
  arts: Luigi McKenzie finds creative outlet in crafting wooden model airplanes and hand‑painting Navajo‑style birdhouses while they spin classic rock vinyl from Led Zeppelin, The Rolling Stones, and Bruce
    Springsteen, and their evenings often include reading Louis L’Amour westerns that echo their love for rugged landscapes.
  travel: Luigi McKenzie prefers low‑key road trips with their well‑maintained Subaru to nearby national parks such as Joshua Tree, Death Valley, and the Grand Canyon, plans itineraries months ahead yet
    leaves room for spontaneous detours to small desert towns like Lone Pine, and they balance their love of solitude with occasional family visits to their niece in Seattle.
  culinary: Luigi McKenzie, a modest home cook, favors hearty desert fare like sage‑rubbed grilled chicken, chili con carne with locally sourced pinto beans, and cactus‑pad (nopales) salad, often seasoning
    dishes with fresh rosemary and chilies harvested from their garden while they listen to classic rock records.
  core: Luigi McKenzie blends a disciplined, hands‑on mindset with a relaxed, sometimes forgetful approach to schedules, and they channel their love of solitude into woodworking and bird‑watching while
    occasionally splurging on vintage vinyl and procrastinating on routine medical check‑ups.
background:
  cultural: Luigi's cultural background is rooted in a white, Midwestern American family with Scottish ancestry, reflected in his surname. Growing up during the 1960s-70s, he absorbed traditional American
    values of hard work, self-reliance, and modest living. Relocating to Phelan, California, he adopted the West Coast mountain-community lifestyle, which emphasizes a close connection to nature, practical
    know-how, and a low-key, neighborly ethos. He celebrates mainstream American holidays, participates in the annual county fair, and values the quiet, self-sufficient rhythm of life in the San Bernardino
    high desert.
attributes:
