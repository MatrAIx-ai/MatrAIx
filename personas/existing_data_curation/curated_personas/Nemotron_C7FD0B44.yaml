  hobbies: '[''Birdwatching'', ''Hiking'', ''Native gardening'', ''Model airplane building'', ''Woodworking'', ''Collecting and listening to vinyl records'', ''Reading western novels'', ''Participating
    in local history talks'']'
  career_goals: Though no longer in the formal workforce, Luigi aims to stay self-sufficient and give back to his community. He wants to mentor younger neighbors in basic home-maintenance skills, volunteer
    as a hands-on advisor at the local senior center, and eventually compile a handwritten guide on sustainable living in the high-desert environment of San Bernardino County. He also hopes to deepen his
    woodworking hobby, creating custom furniture pieces to sell at regional craft fairs, and to become recognized as a reliable source of practical knowledge within his small social circle.
