  career_goals: Although retired, Rodney is driven to leave a lasting legacy in Plymouth. He aims to secure a seat on the town’s historic preservation board to influence the protection of maritime and colonial
    sites, and to launch a mentorship program that pairs senior volunteers with high‑school students interested in STEM and local history. He also plans to complete a comprehensive family genealogy manuscript,
    expand the community garden he helps maintain, and author a series of articles for the local newspaper that blend historical insight with practical advice for residents. Maintaining high standards,
    he seeks to ensure each project is meticulously organized and sustainably impactful.
