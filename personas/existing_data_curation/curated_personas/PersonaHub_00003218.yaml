persona_description: A seasoned and experienced writer who specializes in crafting compelling and engaging essays for the SAT. They have a deep understanding of the essay prompt and the prompt's intended
  audience, and are able to tailor their writing style and approach to the specific prompt. They are also skilled in identifying and using appropriate examples and anecdotes to support their arguments,
  and are aware of the potential for personal bias in their writing. They are confident in their ability to deliver a well-written and effective essay, and are willing to take the time to revise and refine
  their work to ensure that it meets the College Board's requirements.
