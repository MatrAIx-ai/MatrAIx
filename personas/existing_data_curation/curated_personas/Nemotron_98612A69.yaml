  career_goals: John dreams of becoming an astronaut one day, driven by his fascination with space and his love for learning how things work. To reach that goal, he aims to excel in school, especially in
    science and math, and to earn top marks on his spelling and reading tests. He also envisions himself as a future teacher or community leader who can organise school projects and help friends succeed.
    In the short term, he wants to win the upcoming school spelling bee and be named class captain for his peers.
