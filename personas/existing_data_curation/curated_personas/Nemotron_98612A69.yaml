personas:
  professional: John Owen, a budding LEGO architect, channels their curiosity and disciplined nature into designing elaborate brick structures that mirror miniature engineering projects, always documenting
    each step with color‑coded labels.
  sports: John Owen, an energetic midfielder for the Maple Grove Junior Soccer Club, dribbles with gusto during after‑school matches, cheers for the Chicago Cubs on game nights, and idolizes Tottenham Hotspur’s
    Harry Kane while also participating in a weekend park gymnastics class.
  arts: John Owen, a budding illustrator who fills sketchbooks with vibrant scenes from the Magic Tree House series, practices recorder tunes after school, and draws inspiration from Dr. Seuss’s whimsical
    style and The Wiggles’ lively songs.
  travel: John Owen, a curious explorer, spends weekend hikes in the nearby state forest collecting leaves and insects, has visited the Chicago Children’s Museum, and dreams of standing before the Eiffel
    Tower, often planning trips with hand‑drawn maps and a trusty plastic suitcase.
  culinary: John Owen, a self‑declared snack connoisseur, prefers cheese‑filled pizza bites, carrot sticks with ranch dip, and helps roll homemade granola bars, but has a mischievous habit of sneaking extra
    chocolate chips into the cookie dough.
  core: John Owen blends LEGO precision with soccer energy, saves pennies for future builds, explores bugs on nature walks, and never skips storytime—though they sometimes forget to finish their veggies.
background:
  cultural: John grows up in a middle‑class family in Dublin, Ohio, a suburb known for its close‑knit community and strong emphasis on school involvement. His household celebrates typical Midwestern traditions
    such as Thanksgiving dinner with extended family, Fourth of July fireworks, and community Halloween festivals. He attends a local elementary school where parent‑teacher partnerships are encouraged,
    and he often participates in neighborhood youth programs like the Cub Scouts and the public library’s reading club. Though his ancestry is broadly white American—reflecting a mix of German, English,
    and Irish roots—his upbringing blends the values of hard work, politeness, and community service common to the region.
