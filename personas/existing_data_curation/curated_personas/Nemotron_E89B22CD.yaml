personas:
  professional: Anna Pineiro, a seasoned maintenance and repair specialist with deep expertise in mechanical, electrical, plumbing, and HVAC systems, prefers solitary hands‑on work and leverages their curiosity
    and meticulous organization to design preventive maintenance schedules, adopt building automation and renewable retrofits, and lead complex troubleshooting projects while competitively pursuing certifications
    and a future as a lead technician and business owner.
  sports: Anna Pineiro, an avid hiker who tackles the Sandia Mountains year‑round with the local Sandia Mountain Hiking Club and follows the Albuquerque Isotopes, New Mexico Lobos football, and New Mexico
    United soccer teams, they maintain a solitary yet disciplined fitness routine that blends trail runs, occasional rock‑climbing sessions, and weekend DIY yard‑work cardio, viewing physical activity as
    both a stress‑relief outlet and a test of personal resilience.
  arts: Anna Pineiro, a lover of vintage audio culture who spends evenings listening to classic radio dramas from Orson Welles and curating playlists featuring Mexican singer‑songwriter Carla Morrison and
    folk artist Iron & Wine, frequently visits the Albuquerque Museum of Art to admire Southwestern painters like R.C. Gorman, and they draw creative inspiration from sustainable‑architecture documentaries
    by Ken Burns, integrating these artistic influences into their hands‑on projects.
  travel: Anna Pineiro, a detail‑oriented solo traveler who plans meticulous road‑trip itineraries spanning desert hikes in Sedona, culinary immersion in Oaxaca, and art‑laden stays in Santa Fe, they prefer
    low‑key accommodations that allow quiet work on personal projects, and dreams of exploring the Atacama Desert and Patagonia for inspiration on desert‑garden design and renewable‑energy retrofits.
  culinary: Anna Pineiro, an adept home cook who passionately explores Mexican regional cuisine by mastering dishes such as chiles en nogada, mole poblano, and cochinita pibil, frequently incorporates desert‑grown
    ingredients like prickly pear, nopales, and roasted chiles into their meals, and they balance their culinary experiments with a practical, budget‑conscious approach that favors sourcing fresh produce
    from local farmers’ markets.
  core: Anna Pineiro, a 33‑year‑old solitary tinkerer with a competitive edge, blends relentless curiosity for sustainable tech with a disciplined, detail‑oriented work ethic, often hoarding spare parts
    while neglecting social gatherings, and they turn every repair into a personal quest for efficiency.
background:
  cultural: Anna is a first‑generation Mexican American raised in a bilingual household, speaking both Spanish and English. She celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo with
    her extended family and values the cultural emphasis on hard work, community, and respect for elders. These traditions shape her diligent work ethic, her close ties to the local Hispanic community in
    Los Lunas, and her appreciation for Mexican cuisine, music, and family gatherings.
attributes:
  skills: '["Mechanical repair", "Electrical troubleshooting", "HVAC maintenance", "Plumbing repairs", "Preventive maintenance scheduling", "Building codes compliance", "OSHA safety protocols", "Inventory
    management", "Vendor negotiation", "Basic carpentry", "Diagnostic electronics", "Renewable energy system retrofits", "Project documentation"]'
  hobbies: '["Vintage radio restoration", "DIY home improvement", "Desert gardening", "Hiking", "Mexican cooking", "Reading technical manuals", "Documentary watching on sustainability"]'
  career_goals: She aims to earn professional certifications in HVAC and electrical work, progress to a lead maintenance technician role, and eventually manage a small facilities team in Valencia County.
    Long‑term, Anna aspires to launch her own independent maintenance contracting business that specializes in energy‑efficient retrofits for residential and small commercial properties, leveraging her
    blend of practical skill and innovative curiosity.
