  career_goals: 'Although officially retired, Dorothy remains motivated to lead a purposeful life. She aims to expand her volunteer work with the Independence Historical Society, including leading a senior
    storytellers program and helping preserve local heritage sites. She aspires to learn watercolor painting and attend workshops on contemporary art to deepen her artistic appreciation. Dorothy plans to
    document her family’s genealogy and write a memoir that captures the social changes she witnessed over eight decades. Maintaining her health is also a priority: she intends to keep walking daily, continue
    gardening, and join a senior yoga class. Finally, she hopes to advocate for more senior‑friendly community programs and support local arts funding.'
