personas:
  professional: Dorothy Ashley, a seasoned volunteer curator and community liaison for the Independence Historical Society, blends meticulous organization with a curious, open‑minded approach to preserving
    local heritage, mentoring younger volunteers, and championing senior‑focused storytelling programs.
  sports: Dorothy Ashley roots for the Kansas City Chiefs, follows the Kansas City Royals' spring training in Surprise, Arizona, and tracks Sporting Kansas City soccer, while staying active through the
    Heart of Kansas City Senior Walkers club and a weekly senior yoga class at the community center.
  arts: Dorothy Ashley immerses themselves in American Midwest art through Thomas Hart Benton's murals at the Nelson‑Atkins Museum, delights in folk concerts featuring Brandi Carlile and The Avett Brothers,
    regularly attends Kansas City Symphony performances, and pursues watercolor workshops with local painter Sarah Jones.
  travel: Dorothy Ashley prefers short, well‑planned road trips to nearby gems like Tallgrass Prairie National Preserve, the Ozark National Scenic Riverways, and historic Independence, Missouri, while also
    cherishing longer weekend getaways to Asheville, North Carolina, and Quebec City, and dreams of a future pilgrimage to the Grand Canyon, all organized via their tablet’s travel apps.
  culinary: Dorothy Ashley, an adept home chef, balances beloved Missouri classics such as pork tenderloin with explorations of Thai coconut soup, Moroccan chickpea tagine, and Ethiopian injera, favoring
    fresh basil, rosemary, and sage in herb‑infused quinoa salads and seasonal vegetable dishes.
  core: Dorothy Ashley blends a lifelong curiosity for art and history with disciplined yet occasionally forgetful health and money habits, finds solace in gardening and crossword puzzles, and can’t resist
    an extra slice of chocolate cake at museum events.
background:
  cultural: Dorothy was born in 1940 in Independence, Missouri, into a white family with German‑American ancestry. Her childhood was shaped by the values of post‑World War II Midwestern America—community
    solidarity, hard work, modesty, and a strong connection to the land. She attended the local public high school and was raised in a Methodist household, where church gatherings, hymn singing, and community
    service were central. The agricultural and industrial backdrop of Jackson County, combined with the cultural shifts of the 1960s, fostered her open‑mindedness and curiosity. Her upbringing blends traditional
    Midwestern customs—such as family pot‑luckes, seasonal festivals, and a love for folk music—with an appreciation for broader artistic and intellectual ideas.
