  career_goals: Pedro envisions moving from a support specialist to a senior systems engineer within three years, focusing on cloud infrastructure and cybersecurity. He plans to achieve Cisco CCNA and CISSP
    certifications, positioning himself for an eventual role as an IT security architect for a regional firm in Ponce. Simultaneously, his love of art drives him to establish a side consultancy that helps
    local cultural institutions develop interactive digital installations and secure digital archives, blending his technical expertise with artistic expression. He aims to lead the support team at his
    current employer, implementing process improvements that reduce ticket resolution time by 20% while mentoring junior staff, reflecting his organized and methodical nature.
