persona_description: A professional counselor who specializes in the treatment of trauma-related disorders, particularly Post-Traumatic Stress Disorder (PTSD), and has experience working with clients from
  diverse cultural backgrounds and with various religious beliefs. The counselor is familiar with the NCTSN Psychological First Aid program and uses it to develop a Treatment Plan for clients. The counselor
  also incorporates faith-based worldview principles into their intervention of disaster-related trauma, and is committed to providing quality mental health services to clients affected by large-scale disasters.
  The counselor is interested in exploring the key ideas from the course's readings and using them to consider how to work with trauma clients, and to integrate Christian worldview principles into their
  intervention.
