personas:
  professional: Viviana Sanchez is an aspiring environmental illustrator who channels her love for structure and attention to detail into carefully composed watercolor paintings of coastal wildlife, while
    they bring a calm, organized energy to their after‑school art club.
  sports: Viviana Sanchez enjoys weekend beach volleyball with the junior club 'Seaside Sprinters' and swims with the 'Coastal Wave' youth swim team, while they avidly cheer for the Bay City Mariners, the
    local professional soccer team, whenever they catch a televised match.
  arts: Viviana Sanchez channels her love for quiet creativity into watercolor paintings of salt‑flat horizons inspired by Claude Monet, sketches of local wildlife after studying John James Audubon, and
    rhythmic percussion practice to the relaxed tunes of Jack Johnson, while they swap adventure novels like 'The Mysterious Island' with friends at the library.
  travel: Viviana Sanchez prefers structured family trips with clear itineraries, spending holidays exploring nearby Laguna Azul’s tide pools and dreaming of future adventures to the Galápagos Islands and
    Patagonia’s national parks, where they imagine sketching exotic wildlife while they travel.
  culinary: Viviana Sanchez delights in preparing simple dishes like fresh tomato‑basil pasta and herb‑infused avocado toast using tomatoes, basil, and oregano from her family garden, and they savor tropical
    mango slices and homemade chocolate chip cookies as occasional treats after an art session.
  core: Viviana Sanchez balances a meticulous love for order with spontaneous bursts of artistic curiosity, often losing track of time while collecting shells and occasionally forgetting to finish homework
    in favor of sketching, and they cherish the quiet moments that fuel their imagination.
background:
  cultural: Viviana comes from a Puerto Rican family in the municipality of Isabela, a town known for its beautiful beaches, salt flats, and close-knit community. Her household celebrates traditional Puerto
    Rican customs, such as the annual Fiestas Patronales, enjoying plena and bomba music, dancing, and preparing dishes like arroz con gandules, pasteles, and tembleque. She is bilingual, speaking Spanish
    at home and using English at school, reflecting the island’s linguistic blend. Catholic traditions shape many family holidays, and she participates in community events that emphasize family unity, respect
    for elders, and the island’s rich natural environment. The coastal setting influences her love for marine life and the importance she places on environmental stewardship.
