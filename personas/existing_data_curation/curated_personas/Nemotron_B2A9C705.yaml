  career_goals: Viviana dreams of becoming a primary school teacher. She is motivated by the idea of creating a structured, nurturing classroom where she can help young children learn to read, write, and
    explore the world in a safe, organized environment. Her long-term ambition includes obtaining a teaching certification, possibly specializing in bilingual education, so she can support students in both
    Spanish and English. She also hopes to later mentor younger students and contribute to community programs that promote literacy and academic confidence.
