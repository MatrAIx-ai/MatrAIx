personas:
  professional: Lymari Barajas is an entry‑level marketing analyst who leverages strong Excel, Tableau, and Google Analytics skills to turn data into actionable campaign insights, while their natural sociability
    and competitive drive help them shine in client negotiations and cross‑functional teamwork, even as a tendency toward disorganization pushes them to adopt quick‑fix time‑management hacks.
  sports: Lymari Barajas fuels their competitive spirit by playing in the Marietta Volleyball Club league each spring, hiking the Appalachian foothills on weekends, and dancing salsa and bachata at local
    clubs, while cheering on the Atlanta Hawks and following the New York Yankees for a dose of professional sports excitement.
  arts: Lymari Barajas channels their love for rhythm and storytelling into salsa nights set to Victor Manuelle and Marc Anthony, binge‑listens to true‑crime audiobooks narrated by Gillian Anderson, and
    draws inspiration from actress Gina Rodriguez’s charismatic roles, weaving these artistic influences into their personal brand vision.
  travel: Lymari Barajas prefers spontaneous weekend getaways that blend adventure and cultural immersion, having explored New York City’s street art scene and the historic districts of a coastal city,
    while dreaming of a future trip to Barcelona’s tapas bars and the tranquil beaches of Bali, balancing a limited student budget with occasional splurges on weekend flights.
  culinary: Lymari Barajas enjoys cooking at an intermediate level, mastering dishes like mofongo, arroz con gandules, and pasteles with plantains, sofrito, and adobo seasoning, and they love pairing these
    meals with a glass of chilled rosé while exploring new street‑food stalls for fresh flavor inspiration.
  core: Lymari Barajas is a socially magnetic data‑driven dreamer who juggles fierce competition, spontaneous dance nights, and occasional disorganization, all while feeding a relentless curiosity with
    podcasts, yoga, and a love for sizzling flavors.
background:
  cultural: Lymari grew up in a bilingual Puerto Rican household, celebrating traditions such as Noche de San Juan, bomba and plena music, and family gatherings centered around food. Her parents instilled
    a strong sense of community and pride in Caribbean roots, which she carries into her life in Marietta, Georgia. She participates in local Puerto Rican festivals, frequents the cultural hub at the Center
    for Latino Cultural Community, and blends Southern hospitality with her island heritage. This dual cultural lens influences her communication style—warm, expressive, and inclusive—and fuels her interest
    in promoting Puerto Rican culture through her future professional ventures.
attributes:
