  hobbies: '[''Salsa and bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking'', ''Volleyball'', ''Yoga'', ''Listening to business podcasts'', ''True Crime audiobooks'', ''Volunteering at community
    center (teaching Spanish)'']'
  career_goals: Short‑term, Lymari aims to secure an entry‑level marketing or business development role where she can apply her analytical skills and outgoing personality to drive brand growth. She wants
    to gain experience in campaign management and cross‑functional teamwork while mastering time‑management techniques to counter her tendency toward disorganization. Long‑term, she dreams of launching
    her own boutique lifestyle brand that fuses contemporary fashion with Puerto Rican cultural motifs, or a digital marketing consultancy that helps small Caribbean‑owned businesses expand nationally.
    She is motivated by competition and seeks leadership positions where she can set ambitious targets, mentor peers, and build a career that balances creative freedom with structured performance metrics.
