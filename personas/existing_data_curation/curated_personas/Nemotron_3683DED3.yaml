  hobbies: '[''Soccer'', ''LEGO Technic building'', ''Arduino tinkering'', ''TikTok video creation'', ''Listening to Mexican and pop music'', ''Cooking Mexican dishes with family'', ''Attending community
    festivals'', ''Playing multiplayer video games'']'
  career_goals: Roberto dreams of turning his love for building things into a future career in engineering—ideally mechanical or robotics—so he can design gadgets that help people. He also sees himself
    as a content creator who can blend his cultural heritage with tech tutorials, aiming to grow a YouTube channel that showcases DIY projects in both English and Spanish. In the long term, he hopes to
    represent his community by competing in high‑school robotics competitions and, perhaps, earning a scholarship to study engineering while staying connected to his Mexican roots.
