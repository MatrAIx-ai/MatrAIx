personas:
  professional: Roberto Henao, a budding technologist who mixes LEGO Technic building with Arduino tinkering, channels his curious‑practical mindset into methodical project documentation while often leaving
    the final polishing to a last‑minute competitive burst of energy.
  sports: Roberto Henao, a forward for his town's youth soccer league, trains intensively during the spring season, draws tactical inspiration from Club América matches, and prefers spontaneous pickup games
    to rigid drills, embodying his competitive and flexible attitude toward fitness.
  arts: Roberto Henao, a creator of comedic TikTok sketches featuring friends and family, curates playlists that blend regional Mexican bands like Los Tigres del Norte with pop icons such as Ariana Grande
    and Billie Eilish, and models his video style after popular YouTubers like Mark Rober.
  travel: Roberto Henao, after weekend excursions to the historic streets of Guanajuato and sunny beaches of Cancún, now dreams of touring the soccer museums of Barcelona, though budget constraints keep
    his travel plans modest and family‑oriented.
  culinary: Roberto Henao, a capable kitchen aide for his grandparents, loves preparing traditional tamales and pozole using fresh corn masa and pork, while also craving classic arcade snacks like nachos
    topped with jalapeño cheese and a cold soda.
  core: Roberto Henao, a soccer‑driven, LEGO‑loving teen who churns out TikTok comedy, thrives on competition, yet habitually misplaces schoolwork and lives for the next arcade high‑score.
background:
  cultural: 'Roberto was raised in a Mexican‑American household in Sherman, Texas. At home, Spanish is spoken daily, and family gatherings revolve around Mexican traditions such as Día de los Muertos, quinceañeras,
    and holiday meals featuring tamales and pozole. His parents instilled a strong sense of family loyalty and respect for cultural heritage, while his schooling and community life exposed him to broader
    Texan and American customs. This blend of cultures gives Roberto a bicultural identity: he feels comfortable navigating both Mexican and mainstream U.S. environments, often acting as a bridge between
    his peers and his family’s cultural practices.'
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Team-oriented soccer tactics'', ''Basic coding (Scratch, Arduino)'', ''Video editing for social media'', ''Electronics troubleshooting'', ''Cooking
