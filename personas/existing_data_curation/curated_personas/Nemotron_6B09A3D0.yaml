personas:
  professional: A diligent IT help‑desk aspirant, Ivan Witte leverages solid Excel and basic Python skills while applying a cooperative, conflict‑mediating style to support users at a local nonprofit, balancing
    a preference for predictable routines with a flexible, low‑key work approach.
  sports: Ivan Witte enjoys low‑impact fitness, regularly hiking Hudson Valley trails with the Hudson Valley Trail Club, cheering on the New York Knicks and New York Rangers, and participates in casual
    weekend pickup basketball at a community center, preferring solitary jogs over organized league play.
  arts: Ivan Witte immerses in creative pursuits by strumming acoustic guitar to folk classics like Bob Dylan and The Lumineers, reading mystery novels by Agatha Christie and historical fiction by Hilary
    Mantel, and curating board‑game evenings featuring titles such as Catan and Terraforming Mars, while also photographing wildlife during hikes.
  travel: Ivan Witte prefers self‑planned, low‑key getaways, having explored the Adirondacks and a weekend trip to Burlington, Vermont, and dreaming of a future trek through Iceland’s volcanic landscapes,
    all while budget‑conscious travel keeps trips short and focused on nature.
  culinary: Ivan Witte enjoys cooking comfort foods like homemade mac and cheese with sharp cheddar, chicken pot pie seasoned with thyme and rosemary, and weekend pancake breakfasts topped with maple syrup,
    demonstrating a competent yet uncomplicated kitchen skill set.
  core: Ivan Witte is a practical, nature‑loving 21‑year‑old who balances a steady IT ambition with a penchant for woodworking, solitary hikes, and a relaxed approach to budgeting and health routines.
background:
  cultural: Ivan grew up in a middle‑class, predominantly white suburb of Poughkeepsie, Dutchess County, an area with deep Dutch and German settlement roots. His family background includes Northern European
    ancestry—primarily Dutch, German, and English—reflected in occasional cultural traditions such as celebrating the Dutchess County Fair, enjoying classic regional foods like apple pie and sauerkraut,
    and observing mainstream American holidays like Thanksgiving and Christmas. He was raised with an emphasis on community involvement, self‑reliance, and practical education, attending the local public
    high school before enrolling at a community college.
attributes:
