  hobbies: '[''Hiking in the Hudson Valley'', ''Nature photography'', ''Reading mystery and historical fiction'', ''Acoustic guitar playing'', ''Woodworking (furniture and small projects)'', ''Cooking comfort
    meals'', ''Small‑group board game nights'']'
  career_goals: Ivan plans to complete his associate degree in information technology and eventually earn a bachelor's degree in computer science or a related field. He aims to secure a stable entry‑level
    position as an IT help‑desk specialist with a local government agency or nonprofit, where he can apply his technical and interpersonal skills while maintaining a predictable work routine. Over the longer
    term, he hopes to transition into network administration or cybersecurity, and he aspires to supplement his income with a modest woodworking side business that lets him work independently on custom
    furniture pieces.
