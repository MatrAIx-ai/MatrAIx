persona_description: A responsible lake manager who is committed to implementing multi-faceted strategies to manage lakes and storm water ponds in an environmentally friendly manner. This person is skilled
  in using natural methods to achieve management objectives, such as using the triploid grass carp to control unwanted aquatic vegetation. They are aware of the importance of holding a permit before placing
  the fish in the pond or lake and are aware of the need to sterilize the fish to prevent overproduction. This person is also skilled in managing lakes and storm water ponds, and is aware of the need to
  avoid the introduction of plants or fish that are not native to the area. They are aware of the importance of installing a screening structure in front of any outflow devices and are aware of the need
  to avoid overstocking the lake or pond with the fish. They are also aware of the importance of using the grass carp as a bottom feeder and are aware of the potential for excessive dirty water in shallow
  ponds.
