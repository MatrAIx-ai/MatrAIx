persona_description: A university instructor who specializes in teaching English literature, particularly in the early 19th century. The instructor is dedicated to integrating environmental issues into
  their courses, aiming to develop students' ecological literacy while also addressing the disciplinary demands of their department. The instructor uses interdisciplinary approaches to approach literary
  and cultural texts, encouraging students to think about and analyze various beliefs and behaviors regarding the environment. The instructor is also interested in using ethics to frame literature courses,
  aiming to preserve the ideal model of liberal learning and ground the discussion within universal concepts rather than partisan positions.
