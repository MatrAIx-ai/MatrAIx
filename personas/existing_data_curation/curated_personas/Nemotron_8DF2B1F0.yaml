personas:
  professional: Sharonda Blake, an 84‑year‑old community historian and arts organizer in the Bronx, merges her imagination‑driven watercolor cityscapes with a relentless drive to document neighborhood stories,
    skillfully coordinating block parties, senior gatherings, and intergenerational workshops while remaining skeptical of outsiders' motives and fiercely competitive about preserving the local narrative.
  sports: Sharonda Blake enjoys low‑impact fitness through daily walks in the Bronx Botanic Garden and weekly chair‑yoga sessions at the senior center, while cheering for the New York Yankees and the Knicks
    on televised games, occasionally joining the senior walking club that meets at Pelham Bay Park and following local recreational leagues for inspiration.
  arts: Sharonda Blake spends mornings painting fantastical watercolor cityscapes inspired by the Bronx skyline, evenings immersed in the soulful sounds of Louis Armstrong, Nina Simone, and classic R&B,
    contributes poetry to the senior‑center newsletter, and regularly attends church choir rehearsals and storytelling circles that celebrate historical fiction and biographies of trailblazing figures.
  travel: Sharonda Blake prefers structured day trips like guided tours of the Smithsonian in Washington, D.C., weekend excursions to the Catskill Mountains for garden inspiration, and occasional train
    rides to historic sites such as Savannah, while dreaming of a leisurely river cruise that blends relaxation with cultural lectures, all planned around her modest budget and family visits.
  culinary: Sharonda Blake is a proficient home cook who delights in preparing soulful dishes such as slow‑cooked collard greens with smoked turkey, sweet potato pie, corn‑bread, and rich black‑eyed pea
    stew, using fresh garden herbs and nostalgic family recipes while occasionally over‑seasoning in her enthusiasm for bold flavors.
  core: Sharonda Blake blends imaginative watercolor art, meticulous community memory‑keeping, cautious financial habits, age‑defying health routines, modest fitness pursuits, soulful music love, purposeful
    travel plans, and a kitchen brimming with comfort food, all while navigating occasional skepticism and a competitive streak toward preserving her neighborhood’s legacy.
background:
  cultural: Sharonda’s cultural background is rooted in the African-American experience of the mid-20th-century Great Migration, with her parents originally from the Jim Crow South before settling in the
    Bronx. Growing up in a vibrant, working-class Black neighborhood, she was immersed in church life, gospel music, and community solidarity. The Bronx’s rich tapestry of Caribbean, Latin, and hip-hop
    cultures added layers to her identity, influencing her artistic sensibilities and love for rhythm. She witnessed the civil‑rights movement, the rise of Black empowerment, and the evolution of the Bronx
    from industrial hub to cultural epicenter. These experiences shape her values of resilience, storytelling, and preservation of Black heritage.
attributes:
  skills: '["Oral history storytelling", "Watercolor painting", "Community event coordination", "Basic digital communication", "Soul-food cooking", "Creative writing (poetry)"]'
  hobbies: '["Watercolor sketching", "Reading historical fiction and biographies", "Listening to jazz, soul, and R&B", "Poetry writing", "Community gardening", "Crossword puzzles", "Church choir singing",
    "Storytelling circles", "Attending local museums"]'
  career_goals: Sharonda aims to create a lasting legacy by compiling a memoir that blends her personal story with the collective memory of the Bronx's African-American community. She hopes to mentor younger
    residents through storytelling workshops, help launch a neighborhood mural project that showcases local history, and contribute weekly to a senior-center newsletter. Even at 84, she aspires to be a
    cultural ambassador, linking past and present, and to ensure that her family's recipes and artistic techniques are passed down to future generations.
