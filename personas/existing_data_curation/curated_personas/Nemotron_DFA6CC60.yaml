personas:
  professional: Sean Lyon, a secondary‑school physics and advanced mathematics teacher in Minneapolis, they blend rigorous inquiry‑based curricula with data‑driven classroom management, leverage interactive
    simulations and Arduino projects to spark student curiosity, mentor new teachers, and methodically pursue district leadership through an upcoming Ed.D. and evidence‑based research.
  sports: Sean Lyon, an energetic participant in Minneapolis’s co‑ed soccer league and a regular cyclist on the Grand Rounds trail, they also hike the rugged North Shore state parks, proudly root for the
    Minnesota Vikings, Minnesota United FC, and the Minnesota Twins, and coach a junior robotics club that incorporates a fall fitness challenge, reflecting their competitive and sociable nature.
  arts: Sean Lyon, a landscape photography enthusiast who captures misty North Shore vistas with a DSLR, they frequently attend craft‑brewery events featuring live performances by Bon Iver and The Strokes,
    devour science‑fiction works by Isaac Asimov and Octavia Butler, and host a monthly podcast interviewing educators on innovative teaching, all of which shape their appreciation for storytelling across
    mediums.
  travel: Sean Lyon, a meticulously organized traveler, they spend weekends exploring Minnesota’s lake‑lined borders, dream of photographing Yellowstone’s geysers and hiking the Grand Canyon’s rim, balance
    adventure with budgeting by using travel reward points for flights, and prefer trips that combine outdoor photography with educator conference networking, though academic deadlines sometimes force postponement.
  culinary: Sean Lyon, an avid craft‑beer connoisseur, they pair favorite local brews like Surly Furious with homemade pretzel bites, enjoy cooking intermediate‑level dishes such as beer‑braised short ribs
    and wild‑rice stuffing, experiment with spice rubs inspired by science‑fiction narratives, regularly photograph their culinary creations for Instagram, yet admit to over‑indulging on weekends after
    a long week of grading.
  core: Sean Lyon, a curious yet pragmatic educator, they balance relentless drive for academic innovation with a competitive streak, a penchant for craft‑beer and tinkering, and a persistent undercurrent
    of stress‑induced worry that fuels meticulous planning and occasional over‑commitment.
background:
  cultural: Sean grew up in a middle‑class suburban neighborhood of Minneapolis, shaped by the region’s Midwestern values of reliability, community involvement, and a pragmatic outlook. His family’s heritage
    includes German and Norwegian roots, common in Minnesota, which introduced him to traditions such as celebrating midsummer and enjoying hearty, seasonal cuisine. The local public‑school system fostered
    his early interest in science, and the city’s strong emphasis on civic engagement encouraged his participation in community service and local clubs. While identifying with the broader American cultural
    mainstream, Sean also values the inclusive, progressive ethos of Minneapolis, which informs his commitment to equitable education and collaborative community partnerships.
