  career_goals: Sean aims to move into a leadership role within his district, such as STEM department chair or curriculum coordinator, where he can scale his innovative teaching practices school‑wide. He
    plans to pursue an Ed.D. in Curriculum and Instruction to combine his research skills with policy influence. A long‑term ambition is to author peer‑reviewed articles on inquiry‑based STEM pedagogy and
    secure grant funding for a district‑wide project that integrates project‑based robotics and environmental science. He also hopes to be recognized as Teacher of the Year and to establish a community
    partnership network that brings local industry mentors into the classroom, thereby bridging academic learning with practical career pathways.
