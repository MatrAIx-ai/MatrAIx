    and culture'']'
  career_goals: Alissa aims to transition into a senior leadership role such as Director of People or Vice President of Human Resources within the next three to five years, where she can shape organizational
    culture at a strategic level. She is passionate about embedding inclusive practices and leveraging data analytics and emerging technologies to craft flexible, arts‑centric employee experiences. Additionally,
    she hopes to earn the SHRM‑Senior Certified Professional (SHRM‑SCP) credential, mentor emerging HR talent, and eventually launch a boutique consulting practice focused on culture transformation and
    creative wellness programs for mid‑size companies in the Rocky Mountain region.
