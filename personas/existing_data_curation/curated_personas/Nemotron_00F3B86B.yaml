personas:
  professional: Alissa Elsass, a seasoned human‑resources leader with over thirty years of expertise in talent acquisition, DEI program development, HRIS analytics and creative employee‑wellness design,
    channels their curiosity and love of the arts into data‑driven culture‑building initiatives while often juggling a chaotic inbox and a spontaneous schedule, aiming to step into a Director of People
    role within the next five years.
  sports: Alissa Elsass, an avid weekend hiker who joins the local Trailblazers Hiking Club, stays fit with weekly yoga and a summer co‑ed softball league, and passionately follows the Colorado Rockies,
    Denver Broncos and Colorado Avalanche, while occasionally swapping hiking boots for a ski board during the winter season.
  arts: Alissa Elsass, a regular attendee of the Fort Collins Museum of Art and a participant in community theater and pottery workshops, draws inspiration from Georgia O’Keeffe’s paintings, The Shins’
    indie melodies, and Greta Gerwig’s films, often infusing that creative spark into improv classes and their HR wellness programs.
  travel: Alissa Elsass, who prefers spontaneous road trips over rigid itineraries, spends their vacation time exploring nearby mountain towns like Estes Park, enjoys an annual wine‑country retreat in Napa
    Valley, and dreams of capturing sunrise over the Scottish Highlands after a recent photo‑walk through Kyoto’s historic districts.
  culinary: Alissa Elsass, a self‑taught home cook who loves experimenting with Colorado’s local produce, frequently prepares elk chili with roasted poblano peppers, bakes pretzels and Irish soda bread
    for Oktoberfest and St Patrick’s Day gatherings, and pairs each dish with a rotating selection of craft ales such as New Belgium’s Fat Tire.
  core: Alissa Elsass, a curiosity‑driven HR veteran who blends data analytics with community theater, often misplaces their planner yet never skips a weekend hike, and can’t resist a good craft‑brew after
    a long day of spreadsheets.
background:
  cultural: Alissa identifies with a mainstream American cultural background rooted in the Midwestern values of independence, community service, and an appreciation for practicality. Her family heritage
    includes German and Irish ancestry, which she celebrates through occasional cultural festivals and cooking traditions. Relocating to Fort Collins in her late twenties introduced her to the vibrant Rocky
    Mountain lifestyle—outdoor recreation, a progressive arts scene, and a strong emphasis on sustainability. These experiences have shaped her worldview, blending a pragmatic work ethic with an openness
    to diverse perspectives and a deep respect for Colorado’s cultural and natural heritage.
