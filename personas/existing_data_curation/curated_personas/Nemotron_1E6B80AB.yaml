personas:
  professional: Maria Azer, a 68-year-old curatorial veteran with deep expertise in Mexican and Latin American art history, leverages their bilingual fluency, digital photography skills, and flexible, occasionally
    chaotic planning style to design community exhibitions, mentor emerging artists through free workshops, and volunteer as a docent at the San Jose Museum of Art while juggling a modest digital archive
    project; they also enjoy curating informal gatherings that blend traditional folk motifs with cutting‑edge AI art.
  sports: Maria Azer, a dedicated fan of the San Jose Sharks and an occasional participant in local pickleball sessions, combines weekly gentle yoga with brisk walks in the community garden, joins a senior
    walking club that meets to cheer on the Oakland Athletics during baseball season, and they relish the occasional friendly rivalry that fuels their competitive streak.
  arts: Maria Azer, an enthusiastic watercolorist who paints Californian and Mexican landscapes, frequently visits SFMOMA and the Oakland Museum of Art, studies the works of Frida Kahlo, Diego Rivera, and
    contemporary muralist Shepard Fairey, curates informal workshops that blend traditional folk motifs with emerging AI‑generated art, and they often challenge participants to think beyond conventional
    boundaries.
  travel: Maria Azer, an adventurous yet health‑conscious traveler, has explored Oaxaca’s historic markets, strolled through the streets of Mexico City’s murals, taken weekend road trips to Napa Valley
    wine country and Big Sur’s coastal trails, prefers flexible, low‑stress itineraries that accommodate occasional forgetfulness about packing, and they enjoy spontaneous detours that reveal hidden cultural
    treasures.
  culinary: Maria Azer, a passionate home cook, perfects mole negro and tamales using dried chilies, corn masa, and fresh herbs, often experiments with modern twists like quinoa‑filled tacos, sometimes
    neglects to defrost meat in time, leading to spontaneous midnight cooking sessions, and they savor the creative chaos that comes with late‑night improvisation.
  core: Maria Azer, a curious 68‑year‑old art aficionado with a flexible, slightly disorganized approach, channels competitive drive into community curation while balancing gentle yoga, vibrant kitchen
    experiments, and a love for spontaneous travel, and they remain steadfastly emotionally stable amid life’s challenges.
background:
  cultural: Born to Mexican immigrant parents who settled in the Bay Area in the 1960s, Maria grew up bilingual and deeply immersed in cultural traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day celebrations. She was raised amidst Mexican folk art forms like alebrijes and papel picado, and the Catholic rituals that shape her family life. Maintaining close ties with her extended
    family in Jalisco, she regularly sends remittances and participates in virtual family gatherings. Living in Palo Alto, she blends her heritage with Silicon Valley's diverse cultural landscape, actively
    participating in local Mexican-American festivals and contributing to community cultural projects.
attributes:
  skills: '[''Mexican and Latin American art history'', ''Curatorial and exhibition planning'', ''Bilingual communication (Spanish/English)'', ''Creative writing and memoir development'', ''Digital photography'',
