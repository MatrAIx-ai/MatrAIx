  hobbies: '[''Gallery and museum visits'', ''Watercolor painting'', ''Digital photography of street murals'', ''Attending art lectures and talks'', ''Exploring AI-generated art'', ''Cooking traditional
    Mexican cuisine'', ''Gardening with native plants'', ''Gentle yoga'']'
  career_goals: Maria aspires to curate a community exhibition that highlights contemporary Mexican folk art, mentor emerging local artists through a free monthly workshop series, publish a collection of
    personal essays reflecting on art, aging, and cultural identity, develop an online digital archive documenting Mexican diaspora cultural artifacts, and serve as a volunteer docent at the San Jose Museum
    of Art, blending her passion for education, art, and community service.
