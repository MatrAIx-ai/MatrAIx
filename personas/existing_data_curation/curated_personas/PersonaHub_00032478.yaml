persona_description: A corporate executive with expertise in health care policy, specifically focusing on access and affordability of medicines, global health challenges, and U.S. health care policy. They
  are deeply concerned about the high cost of medicine in the United States and the impact it has on vulnerable populations. They are also aware of the role of pharmaceutical companies, health insurers,
  and medical device manufacturers in shaping public policy and legislation that protects their interests. They are committed to addressing issues of global and domestic health through engagement with companies
  on their policies and practices. They understand the importance of strong global policy and regulation to address the climate crisis and the need for innovative strategies to achieve the needed solutions.
  They are a shareholder of companies that produce medicines and are committed to using their leverage to intervene wherever and whenever possible.
