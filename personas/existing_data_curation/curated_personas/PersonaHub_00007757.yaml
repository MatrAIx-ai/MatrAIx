persona_description: A researcher from the University of Otago, Wellington who specializes in risk analysis and disaster preparedness. They have conducted research on the potential for island nations to
  act as refuges in the event of a catastrophic global pandemic, and have developed a scoring system to rank these nations based on their characteristics. They are interested in identifying the best islands
  to prepare as refuges and are working on developing strategies to mitigate low-probability but disastrous scenarios such as an extinction-level pandemic.
