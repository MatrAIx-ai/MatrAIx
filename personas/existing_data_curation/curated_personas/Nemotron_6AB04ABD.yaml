  hobbies: '[''Grilling and Barbecue'', ''Attending Dallas Cowboys and Mavericks Games'', ''Volunteer Work (Food Bank, Church Outreach)'', ''DIY Home Improvement Projects'', ''Listening to Business and
    Tech Podcasts'', ''Reading Sales and Marketing Books'', ''Playing Acoustic Guitar'', ''Participating in Local Networking Events'']'
  career_goals: Steven aims to transition from a high‑performing sales representative to a sales manager within the next three to five years, overseeing a regional team of reps in the Dallas metro area.
    He plans to earn the Certified Professional Sales Leader (CPSL) credential, develop a formal training program for new hires, and increase his territory’s year‑over‑year revenue by at least 20%. Longer‑term,
    he envisions launching his own consultancy focused on helping service‑based businesses refine their sales processes, while ensuring financial stability and a comfortable future for his family.
