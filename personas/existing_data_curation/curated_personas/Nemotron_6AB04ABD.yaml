personas:
  professional: Steven Brooks, a 43-year-old high-performing sales representative in the Dallas metro area, leverages his disciplined organization, consultative selling expertise, and charismatic communication
    to consistently exceed quotas while mentoring junior reps and cultivating client trust.
  sports: Steven Brooks, a devoted fan of the Dallas Cowboys and Mavericks, tailgates at every home game, plays pickup basketball at the local YMCA during the winter, and competes in a weekly Saturday softball
    league, balancing his love of high-energy fandom with a disciplined weekly jogging routine for fitness.
  arts: Steven Brooks, who unwinds by playing acoustic guitar for his kids, queues classic rock legends like Bruce Springsteen and The Eagles, enjoys country icons such as Willie Nelson, and occasionally
    attends Dallas Theater Center productions featuring actors like Sarah Paulson, weaving music and theater into his family's weekend rituals.
  travel: Steven Brooks, a planner who maps out trips on a spreadsheet, prefers road-trip adventures to Texas hill country vineyards, has toured New Orleans for its music scene, visited Yellowstone National
    Park with his family, and dreams of a Mediterranean cruise to Italy's Amalfi Coast, balancing limited vacation days with his desire for memorable experiences.
  culinary: Steven Brooks, an enthusiastic grill master, perfects smoked brisket with a solid oak wood chip blend, seasons ribs with a homemade rub of brown sugar, paprika, and cumin, enjoys crafting caramelized
    onion queso for Texas-style nachos, and treats himself to a craft IPA after each barbecue session.
  core: Steven Brooks blends disciplined sales acumen with a sociable, grill-centered family life, obsessively tracks numbers, loves tailgating, strums guitar for his children, and occasionally lets his
    penchant for perfection slip into late-night spreadsheet marathons.
background:
  cultural: Steven grew up in a middle‑class white family in the suburbs of Dallas, Texas, where Southern hospitality and Texan pride are woven into daily life. His upbringing emphasized strong family values,
    hard work, and community involvement, often centered around church activities and local sports traditions. He embraces Texas customs such as football fandom, barbecue culture, and a pragmatic, self‑reliant
    outlook, while also appreciating Dallas’s growing multicultural environment through occasional cross‑cultural interactions at work and community events.
attributes:
  skills: '[''Strategic Sales Planning'', ''Consultative Selling'', ''Solution‑Based Selling'', ''Negotiation'', ''Pipeline Management'', ''Customer Relationship Management'', ''CRM Software Proficiency
