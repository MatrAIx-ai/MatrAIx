persona_description: A graduate student or postdoctoral researcher interested in environmental science, particularly in the field of urban ecology and sustainable development. This individual is passionate
  about the potential of nature-based solutions to address climate change and is eager to learn about the principles and practices of nature-based carbon solutions in urban environments. They are interested
  in the integration of natural features into urban planning and design to enhance carbon storage, and are willing to work collaboratively with peers to develop a nature-based carbon storage plan for the
  Yale campus and natural lands. They are also interested in conducting economic analysis and financial accounting of carbon storage as investments to offset urban emissions and meeting with Yale campus
  planners and land managers to learn about the information needed to formulate actionable policy to maximize carbon storage on the Yale campus and natural lands as an offset to Yale’s carbon emissions.
