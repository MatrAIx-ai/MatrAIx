  hobbies: '[''Gardening'', ''Cooking'', ''Reading memoirs and biographies'', ''Quilting'', ''Church choir'', ''Volunteer work'', ''Digital photography'', ''Walking'', ''Music listening'', ''Genealogy research'',
    ''Bridge'']'
  career_goals: Even at 80, Thomasine remains goal‑oriented with a focus on legacy and personal enrichment. She aims to compile a memoir that weaves together her family’s oral histories, photographs, and
    recipes, preserving this heritage for future generations. She plans to expand the community garden she tends, incorporating sustainable practices and inviting local youth to learn. Thomasine hopes to
    develop a series of short video stories that capture the histories of Birmingham’s Black neighborhoods, leveraging her newfound digital photography skills. Continuing her volunteer work, she aspires
    to mentor younger church members in both practical crafts and life skills, while maintaining her health through regular walks and balanced nutrition.
