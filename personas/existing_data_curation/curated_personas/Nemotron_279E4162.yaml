personas:
  professional: Loren Hunter is a data‑driven food‑service operations manager who leverages a STEM graduate background to fine‑tune inventory control, menu engineering, and POS integration across a bustling
    Spokane‑area restaurant chain; their methodical planning and reliability ensure tight cost margins, while their sociable, curious nature drives cross‑functional team collaboration and continuous experimentation
    with sustainable dining concepts.
  sports: Loren Hunter is an avid weekend hiker on the Palouse hills, a regular angler on Lake Coeur d'Alene, and a member of a local pickup basketball league affiliated with the Spokane Athletic Club;
    they cheer for the Seattle Seahawks and the Seattle Sounders, and during summer they join the Spokane Trail Runners for organized runs, while winter sees them snowshoeing in nearby Stevens Pass.
  arts: Loren Hunter is a weekend attendee of the Spokane International Film Festival and a frequent listener of folk‑rock bands like The Decemberists and local indie group The Zephyr Project; they enjoy
    painting with watercolor during quiet evenings, drawing inspiration from Pacific Northwest landscapes, and they volunteer to help arrange community art shows that showcase native craftspersons.
  travel: Loren Hunter is a meticulous trip planner who favors road‑trip adventures that blend scenery and food, having driven to Glacier National Park for sunrise hikes, explored Bend, Oregon’s craft‑brew
    scene, and scheduled a future vacation to New Zealand’s South Island to study sustainable farming practices; they balance travel with budget constraints, often using points from a travel rewards credit
    card they manage carefully.
  culinary: Loren Hunter is a home‑chef who experiments with sous‑vide salmon, cedar‑plank trout, and hand‑crafted pale ales brewed with Cascade hops, often sourcing local produce from farmers' markets
    to test new farm‑to‑table recipes that later inform menu redesigns at work; they keep a well‑used spice rack and a slightly over‑stocked home brewing kit that sometimes crowds the kitchen counter.
  core: Loren Hunter is a methodical food‑service strategist who balances data‑driven precision with a love for outdoor adventure, craft brewing, and community volunteering, yet worries about stress and
    occasionally lets perfectionism spill into personal life.
background:
  cultural: Loren was raised in a middle‑class white family in the Pacific Northwest, where values of self‑reliance, hard work, and community involvement are emphasized. His STEM education instilled a pragmatic,
    curiosity‑driven mindset, while his career in food‑service management exposed him to diverse culinary traditions and collaborative workplace cultures. Living in Post Falls, Idaho, he embraces the region’s
    blend of small‑town camaraderie and rugged natural environment, shaping his practical, hospitable, and harmony‑focused outlook.
