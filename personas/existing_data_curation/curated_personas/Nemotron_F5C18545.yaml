personas:
  professional: Teri Moore, a veteran low‑voltage technician with over 30 years of experience in residential and small‑commercial alarm systems, blends rigorous NFPA‑72 compliance with an artist’s eye,
    turning security panels into decorative focal points and now pursues a consultancy that merges safety, IoT innovation, and bespoke lighting for boutique spaces while mentoring the next generation of
    female technicians.
  sports: Teri Moore enjoys low‑impact fitness through weekly pickleball matches at the senior league, hikes the Wichita Mountains in spring, follows the Oklahoma City Thunder and the Oklahoma State Cowboys
    football team on TV, and combines birdwatching walks with informal cardio, preferring community‑based activity over high‑intensity sports.
  arts: Teri Moore expresses creativity through watercolor abstracted Oklahoma plains, crafts Arduino‑driven kinetic installations that react to motion, reads authors like Octavia Butler and Ted Chiang,
    writes haiku‑style poems, curates vintage alarm panel wall art, and regularly visits folk‑art exhibitions featuring artists such as Grandma Moses, all of which feed their imagination and quiet social
    life.
  travel: Teri Moore favors spontaneous road trips that blend artistic inspiration with nature, such as a spring drive through the Texas Hill Country to attend a craft fair, a summer stay in Santa Fe for
    its adobe architecture and local galleries, and a planned autumn pilgrimage to Kyoto’s temple gardens, yet they must balance these wanderlust ventures with the modest budget of an emerging consultancy.
  culinary: Teri Moore, an intermediate home cook, favors farm‑to‑table dishes like roasted beet and goat‑cheese salad, grilled heirloom tomatoes, and slow‑cooked chicken with rosemary, often seasoning
    with smoked paprika from their garden’s fresh herbs while occasionally treating themselves to pecan pie, and they relish experimenting with a modest spice rack inspired by speculative‑fiction worlds.
  core: Teri Moore is an imaginative low‑voltage artisan who blends security tech with watercolor and kinetic art, mentors aspiring female technicians, indulges in birdwatching and vintage alarm panel collections,
    yet their spontaneous streak sometimes leads to missed deadlines and forgotten appointments.
background:
  cultural: Teri grew up in a small town on the outskirts of Oklahoma City, raised in a family that valued hard work, self‑reliance, and community involvement—traits characteristic of the Midwestern and
    Southern blend of Oklahoma culture. While her upbringing emphasized practicality and modesty, the region's vibrant folk‑art traditions and the state's strong sense of neighborly support nurtured her
    appreciation for creativity and collaborative harmony. She identifies with the cultural heritage of the American Midwest, drawing on the values of independence, hospitality, and a deep connection to
    the land, which continue to shape her worldview and interpersonal style.
attributes:
  skills: '[''Low-voltage wiring'', ''Fire alarm system installation'', ''Security system programming'', ''NFPA 72 compliance'', ''System troubleshooting'', ''Technical blueprint reading'', ''Customer service
    and needs assessment'', ''Creative aesthetic integration'', ''Basic home automation platform configuration (SmartThings, Control4)'', ''DIY electronics prototyping (Arduino, Raspberry Pi)'']'
  hobbies: '[''Watercolor painting'', ''Speculative fiction reading'', ''Short poetry writing'', ''Arduino kinetic art projects'', ''Birdwatching'', ''Vegetable gardening'', ''Collecting and repurposing
    vintage alarm panels'', ''Local museum and folk art visits'', ''Small-group book club'', ''DIY home automation tinkering'']'
  career_goals: Teri aims to transition from routine field installations to a consultancy role where she can design bespoke security‑and‑art integrations for boutique retailers, galleries, and historic
    homes. She plans to obtain a NICET Level II certification and deepen her expertise in IoT‑enabled alarm technologies. Over the next few years, she hopes to launch a small specialty firm that offers
    personalized safety solutions combined with artistic lighting, mentor emerging female technicians through apprenticeship programs, and possibly author a guidebook on integrating security systems with
    interior design. Additionally, she wishes to organize community workshops on home safety and technology creativity to leave a lasting legacy in her field.
