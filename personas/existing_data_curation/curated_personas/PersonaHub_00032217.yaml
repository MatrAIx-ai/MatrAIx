persona_description: A radiologist who specializes in functional anatomic mapping technology, a diagnostic tool used to provide physicians with a sharper picture of tumors and other abnormalities in their
  patients. She has conducted clinical trials with the mapping technology and has expertise in the development and application of nuclear medicine techniques to provide accurate information about cancer
  diagnosis and management. She is part of a research and training site for GE Medical Systems worldwide and has helped design the next generation of systems that will include a combined positron emission
  tomography (PET) and CT scanner.
