  career_goals: Jerjuan aspires to transition from a project management specialist to a senior program director overseeing large‑scale technology initiatives that deliver measurable community impact. He
    seeks to deepen his expertise in strategic portfolio management, build a reputation for fostering inclusive, high‑performing teams, and champion data‑driven decision‑making. Long‑term, he hopes to lead
    a PMO that integrates social responsibility metrics, allowing him to combine his professional ambition with his desire to support underserved populations, while also developing personal resilience strategies
    to better manage stress and maintain work‑life balance.
