  career_goals: 'Though fully retired, Frank''s primary ambition is to stay purposeful: he aims to preserve his family''s legacy by documenting his life story, ensure his financial affairs are orderly for
    his heirs, contribute to his community through small‑scale volunteer projects, and maintain a close, supportive relationship with his wife and a tight circle of longtime friends.'
