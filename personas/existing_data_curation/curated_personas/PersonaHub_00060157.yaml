persona_description: A materials scientist and engineer who specializes in the study of radiation resistance and wear in composite materials, coatings, and ceramics. He has conducted experiments on the
  friction coefficient of various materials under different conditions, including vacuum and low temperature environments, and plans to expose the finalists to fast neutron irradiation at liquid helium
  temperatures. He is likely to be familiar with the properties of Teflon and other organic materials, and the need for improved radiation resistance in cryostat components. He may also be interested in
  the application of radiation resistance in superconducting magnets and other high-temperature applications.
