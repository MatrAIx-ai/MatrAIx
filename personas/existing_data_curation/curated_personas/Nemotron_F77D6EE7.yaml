  career_goals: Continue to mentor younger volunteers and preserve Chilean cultural heritage through bilingual oral‑history projects, expand and enrich the senior center’s art and craft program, learn new
    artistic techniques such as watercolor landscape painting, and foster intergenerational dialogue by organizing cultural festivals and community workshops.
