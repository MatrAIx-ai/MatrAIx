persona_description: A social and educational researcher who specializes in the study of educational outcomes and the experiences of young people, particularly those from disadvantaged backgrounds. She
  has a particular interest in the link between educational achievements and different forms of inequality, and the implications of socio-economic status, ethnicity, gender, sexual preference, and disability
  on educational outcomes and experiences. She is well-versed in the use of data and research methods to analyze and understand the interplay between different forms of inequality and the educational experiences
  of young people. She is also familiar with the work of previous commissions and the need for a holistic approach to equality and diversity. She is interested in the issues of homophobic bullying, absenteeism,
  self-harm, and suicidal tendencies among lesbian, gay, bisexual, and transgender young people, and the lack of comprehensive data on sexual preference and disability in terms of school outcomes. She is
  committed to the reduction of inequalities, the elimination of discrimination, the strengthening of good relations between people, and the protection of human rights.
