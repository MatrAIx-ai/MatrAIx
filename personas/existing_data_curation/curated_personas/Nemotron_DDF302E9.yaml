  career_goals: Approaching retirement, Carlos aims to shift into a part‑time clinical instructor role at a local community college, where he can formalize his mentorship skills while maintaining the flexibility
    he values. He aspires to develop a culturally sensitive health education program tailored for Pacific Islander elders in the Modesto area, blending traditional wellness concepts with modern nursing
    practice. Additionally, he hopes to advocate for improved staffing structures that balance predictability with the ability to respond spontaneously to patient needs, ensuring high‑quality care without
    sacrificing his adaptable work style.
