  career_goals: Donna aims to secure a more stable and predictable work schedule while advancing within the retail and logistics sector. Over the next two years she plans to earn her GED and complete a
    certification in supply chain fundamentals, which would qualify her for a supervisory role such as shift lead or inventory coordinator. She hopes to transition into a manager position where she can
    implement structured processes that reduce workplace stress for herself and her team. Long‑term, Donna is interested in exploring opportunities in warehouse management for larger resort or casino supply
    chains in Las Vegas, leveraging her forklift certification and experience with high‑volume inventory. She also wants to build financial security to support possible future educational pursuits or a
    small side business, like a home‑based catering service that reflects her cultural cuisine.
