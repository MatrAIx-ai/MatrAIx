personas:
  professional: Donna Shepherd, a 31‑year‑old stocker and order filler at a busy Las Vegas retailer, uses precise inventory tracking, certified forklift skills, and a calm yet assertive approach to resolve
    floor conflicts, aiming to convert this structured expertise into a shift‑lead role while subtly advocating for process efficiencies that ease team stress.
  sports: Donna Shepherd finds balance in regular hikes through Red Rock Canyon, occasionally joins a local yoga class at the community center, roots for the Las Vegas Raiders and the Golden Knights, and
    keeps a modest membership with the city’s indoor climbing club.
  arts: Donna Shepherd unwinds by drifting through classic R&B and soul playlists featuring Marvin Gaye, Jill Scott, and A Tribe Called Quest, reads contemporary fiction like The Vanishing Half to explore
    resilience, streams series such as Insecure, and attends small gospel‑focused choir gatherings at their church.
  travel: Donna Shepherd prefers low‑key weekend getaways, planning trips on a shoestring budget to places like Sedona’s red rocks and New Orleans for its vibrant music scene, while dreaming of a future
    road trip down the Pacific Coast Highway once finances stabilize.
  culinary: Donna Shepherd loves cooking family‑style dishes like smoky gumbo, collard greens, and cornbread, often using fresh herbs from their indoor garden—basil, thyme, and cilantro—to add flavor, experiments
    with hot sauces and smoked paprika, yet occasionally over‑indulges in sweet desserts after a long shift.
  core: Donna Shepherd blends a love for orderly shelves and soulful music with a quiet determination to rise beyond the warehouse floor, all while juggling anxiety, late‑night plant care, and a habit of
    journaling every thought that crosses their mind.
background:
  cultural: Donna identifies as African American and grew up in a close‑knit Black community within the Las Vegas metropolitan area. Her family traditions emphasize resilience, mutual support, and a strong
    sense of cultural pride, often expressed through church involvement, soulful music, and shared meals. She participates in local Juneteenth celebrations and community outreach events, which reinforce
    her connection to Black heritage while navigating a predominantly diverse urban environment. These cultural influences shape her values of perseverance, respect for elders, and the importance of community
    solidarity. Growing up in a city known for its entertainment industry, Donna also appreciates the vibrancy of Black artistic expression, from music to fashion, which informs her personal style and leisure
    preferences.
