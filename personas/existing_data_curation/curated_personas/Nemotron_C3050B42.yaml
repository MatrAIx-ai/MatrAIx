personas:
  professional: Gregory Tedder, a retired facilities operations manager for a regional school district, channels his three‑decades of HVAC, electrical, and budgeting expertise into mentoring high‑school
    vocational students, serving on the Layton City Infrastructure Advisory Committee, and consulting for small nonprofits, where their methodical curiosity and assertive yet cooperative style ensure projects
    stay on schedule and within budget.
  sports: Gregory Tedder, an avid fly‑fisher who spends weekend mornings casting on the Provo River, also participates in a local senior hiking club that tackles the Wasatch trails, cheers for the Utah
    Jazz and Real Salt Lake, and they occasionally join a community softball league in the summer.
  arts: Gregory Tedder, a dedicated woodworker who designs and builds furniture from plans they draft themselves, complements this craft with detailed model‑railroad layouts of early‑20th‑century lines,
    reads biographies of engineers like John Roebling, and enjoys listening to folk legends such as Woody Guthrie and attending intimate book‑discussion circles at the local library.
  travel: Gregory Tedder, a meticulous planner of road trips, favors scenic drives to western national parks like Zion, Bryce Canyon, and Yellowstone, often camping in modest RVs while documenting routes
    in a leather‑bound journal, and they dream of extending their travels to Canada’s Banff and the historic rail towns of Colorado.
  culinary: Gregory Tedder, a garden‑to‑table enthusiast, frequently cooks trout caught on the Provo River seasoned with fresh dill and lemon, prepares hearty stews featuring heirloom carrots and potatoes
    from the backyard, and they take pride in mastering sourdough starter maintenance while occasionally treating themselves to a slice of homemade apple pie.
  core: Gregory Tedder is a methodical retiree who blends a love for hands‑on craftsmanship, disciplined thrift, and quiet community stewardship, and they occasionally indulge in rare model‑railroad collectibles.
background:
  cultural: Gregory was raised in the Wasatch Front region of Utah, in a modest, working-class family of Anglo-American heritage. The local culture, shaped by a blend of pioneer self-reliance, a strong
    emphasis on community service, and the values associated with the LDS tradition—such as modesty, thrift, and family cohesion—has left a lasting imprint on his worldview. He respects the mountain environment
    and often partakes in outdoor recreation that reflects the regional appreciation for nature. While not necessarily a practicing member, Gregory participates in community events, celebrates mainstream
    American holidays, and values the close-knit relationships typical of small-town Utah life.
attributes:
  skills: '[''Facilities Management'', ''Project Planning'', ''HVAC & Electrical Systems Maintenance'', ''Budget Development'', ''Regulatory Compliance'', ''Technical Documentation'', ''Team Leadership'',
