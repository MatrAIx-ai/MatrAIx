  hobbies: '[''Woodworking'', ''Organic Gardening'', ''Fly Fishing'', ''Model Railroading'', ''Reading Historical Non-fiction'', ''Trail Maintenance Volunteering'', ''Puzzle Solving'', ''Small-Group Book
    Discussions'']'
  career_goals: Although retired from full-time employment, Gregory intends to stay professionally active by sharing his knowledge with the next generation. He aims to volunteer as a mentor for high-school
    vocational programs, guide students in practical trades, and serve on the Layton City Infrastructure Advisory Committee, where his experience can help shape sustainable building and maintenance policies.
    He also plans to offer occasional consulting services to small non-profit organizations seeking efficient facility management. On a personal level, Gregory wants to preserve his health through regular
    physical activity, travel to national parks in the western United States, and complete a memoir documenting his life lessons and the evolution of community infrastructure over the past five decades.
