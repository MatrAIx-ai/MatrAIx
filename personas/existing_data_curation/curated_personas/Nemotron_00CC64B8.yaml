  career_goals: Kit aims to secure a full‑time role in a nonprofit or public service organization where he can combine his organizational talent with his drive to help others. He plans to complete his associate’s
    degree in Business Administration or Human Services, earn a Project Management certification, and eventually move into a supervisory position such as Program Coordinator or Case Manager. Long‑term,
    he hopes to lead community‑impact initiatives that promote harmony and resilience in his hometown.
