  career_goals: Jonathan aims to become a Certified Public Accountant (CPA) within the next two years and pursue the Certified Internal Auditor (CIA) designation to deepen his audit expertise. In the medium
    term, he hopes to lead a regional audit team as a senior manager, driving process efficiencies through automation and data analytics. Ultimately, he envisions attaining a partnership position at his
    firm or launching his own boutique advisory practice focused on helping mid-sized California businesses streamline financial reporting and navigate regulatory changes. He also wants to mentor junior
    accountants and contribute to professional development programs within his organization.
