personas:
  professional: Theresa Pickett blends a STEM‑rooted analytical mindset with a modest, community‑first ethos, excelling at casino surveillance, deftly handling risk assessments and conflict de‑escalation
    while quietly pursuing a supervisory track and the Certified Protection Professional credential.
  sports: Theresa Pickett enjoys kayaking on Lake Winnebago and hiking the Fox River Trail during summer, participates in a local adult softball league, roots for the Green Bay Packers and Milwaukee Brewers,
    and belongs to the Fox River Runners club that meets for early‑morning jogs on Saturdays.
  arts: Theresa Pickett finds creative balance in attending escape‑room challenges, listening to folk‑rock artist Bon Iver, catching a performance at the Milwaukee Repertory Theater, and scrolling through
    digital galleries of Midwest muralists while occasionally humming classic Broadway tunes from "The Sound of Music" during breaks.
  travel: Theresa Pickett plans weekend getaways using a meticulously organized spreadsheet, enjoys seasonal trips to Door County’s cherry orchards and the Upper Peninsula’s sandstone cliffs, dreams of
    kayaking in Iceland’s fjords, and squeezes a few days each year for a cultural jaunt to Nashville’s music scene when work permits.
  culinary: Theresa Pickett cooks hearty family meals featuring bratwurst, sauerkraut, cheese curds, and fresh garden tomatoes, whips up a fish fry with locally sourced perch, experiments with homemade
    pesto using basil from their modest vegetable plot, and treats themselves to a nightly slice of apple pie that they claim is for "stress relief".
  core: Theresa Pickett is a diligent, curiosity‑driven security professional who balances meticulous surveillance work with a love for puzzles, outdoor recreation, and community service, all while navigating
    personal quirks like an occasional latte splurge and a forgetful garden‑watering habit.
background:
  cultural: Theresa was raised in a middle‑class, predominantly white community in the Midwest, with German‑Scandinavian ancestry common to the region. Her upbringing emphasized hard work, modesty, and
    community involvement, reinforced by participation in a local Lutheran church and school events. She values the practical, down‑to‑earth mindset of Wisconsin culture, while also appreciating the diversity
    of the casino environment where she works.
attributes:
  skills: '["CCTV operation and digital monitoring", "Risk assessment and threat analysis", "Basic networking and hardware troubleshooting", "Data interpretation and pattern recognition", "Knowledge of
    gambling regulations", "Conflict de‑escalation", "Incident report writing", "Team coordination and communication", "Time management and scheduling", "First aid and emergency response"]'
  hobbies: '["Kayaking on Lake Winnebago", "Hiking the Fox River Trail", "Escape‑room puzzle solving", "Computer literacy tutoring", "Cooking and family meals", "Gardening", "Reading mystery novels", "Board
    game nights with friends"]'
  career_goals: Theresa aims to advance to a supervisory role in casino security, overseeing a team of surveillance officers and shaping operational protocols. She plans to earn the Certified Protection
    Professional (CPP) credential and pursue continuing education in cyber‑security to integrate advanced analytics into surveillance. In the longer term, she envisions transitioning to corporate security
    management for a regional hospitality group, leveraging her technical background to develop comprehensive risk‑mitigation strategies.
