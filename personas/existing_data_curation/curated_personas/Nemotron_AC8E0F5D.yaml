personas:
  professional: April Simmons, a seasoned residential cleaner with deep‑cleaning expertise, fabric care mastery, and a knack for budgeting eco‑friendly supplies, blends curiosity about green products with
    a compassionate, flexible approach to client interactions, and they reliably meet deadlines while adapting to last‑minute changes.
  sports: April Simmons, a casual fitness enthusiast who enjoys early‑morning bird‑watching walks and weekend hikes, follows the Kansas City Chiefs in football, the Nebraska Cornhuskers for college sports,
    and is a member of the Fort Calhoun Trail Runners club, yet they prefer low‑impact activities over intense gym sessions.
  arts: April Simmons, an avid knitter and mystery‑novel reader, often listens to folk‑rock duo The Avett Brothers while crafting scarves inspired by Agatha Christie’s plots, attends local performances
    at the Nebraska Repertory Theatre, and they find solace in the blend of literary intrigue and acoustic melodies.
  travel: April Simmons, who favors low‑stress, family‑oriented trips, has road‑traveled to Lake Geneva, Wisconsin and Mackinac Island, Michigan for relaxed lakeside retreats, dreams of exploring the historic
    streets of Edinburgh, Scotland, but they typically plan vacations months in advance to accommodate work flexibility and school schedules.
  culinary: April Simmons, a competent home cook with a love for traditional Midwestern comfort foods like chicken pot pie and cornbread, often experiments by adding smoked paprika to deviled eggs or swapping
    rosemary for sage in roasted carrots, favors fresh local produce and occasionally incorporates kimchi for a tangy twist, and they relish sharing these modest culinary inventions at neighborhood potlucks.
  core: April Simmons, a pragmatic garden‑loving cleaner who secretly hoards mismatched yarns and thrives on balancing eco‑friendly curiosity with a relaxed, slightly chaotic schedule, they navigate life
    with quiet compassion and a knack for turning ordinary chores into gentle acts of stewardship.
background:
  cultural: April grew up in a modest, predominantly white Midwestern community in Nebraska, shaped by values of self-reliance, thrift, and neighborly cooperation. Her family’s heritage includes German
    and Irish roots, and she was raised attending a local Protestant church where community service and harmony were emphasized. These cultural influences fostered her practical outlook, compassionate attitude,
    and preference for small-group connections, while her environment nurtured a curiosity about sustainable living practices.
attributes:
  skills: '["Residential cleaning", "Deep cleaning", "Laundry and fabric care", "Organizational decluttering", "Eco-friendly cleaning methods", "Customer service", "Compassionate caregiving", "Basic home
    maintenance", "Inventory management", "Flexible scheduling"]'
  hobbies: '["Gardening", "Knitting/Crocheting", "Reading mystery novels", "Cooking traditional Midwestern recipes", "Listening to classic country music", "Walking her dog on local trails", "Participating
    in small community potlucks", "DIY home improvement projects", "Birdwatching"]'
  career_goals: April aims to become a certified green-cleaning specialist and eventually lead a small team of cleaners serving the Fort Calhoun community. She envisions offering workshops on sustainable
    housekeeping practices while maintaining the stable income needed to support her family. In the longer term, she hopes to launch her own boutique cleaning service that emphasizes personalized care,
    flexibility, and environmental responsibility, allowing her to balance work with more time for family and community volunteering.
