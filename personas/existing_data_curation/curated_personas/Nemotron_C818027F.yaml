personas:
  professional: Donald Thompson, a budding LEGO engineer who loves inventing custom builds and experimenting with Minecraft world design, channels a curious yet practical mindset into hands‑on problem solving,
    and they often let projects evolve spontaneously due to a relaxed approach to obligations.
  sports: Donald Thompson, an enthusiastic member of the Riverside Youth Soccer League with a favorite team the Los Angeles Galaxy, spends weekends dribbling at the neighborhood park, skates at the local
    skate park where they practice tricks, and follows the LA Lakers for basketball inspiration, balancing team play with solo skate sessions.
  arts: Donald Thompson, a creative LEGO builder and comic‑book enthusiast who sketches cartoon characters inspired by the whimsical art of Dr. Seuss and the vibrant animation of Hayao Miyazaki, also enjoys
    the playful soundtrack of the Lego Movie and the upbeat tunes of pop artist Billie Eilish, and they weave these influences into their imaginative play.
  travel: Donald Thompson, a curious explorer of Riverside’s river trails who has taken family trips to San Diego’s SeaWorld and the amusement parks of Anaheim, dreams of visiting Tokyo to see anime culture
    and the Great Wall of China, and they prefer spontaneous weekend day‑trips over meticulously planned vacations, often using a hand‑drawn map of local parks.
  culinary: Donald Thompson, a self‑declared pizza aficionado who loves pepperoni pizza, chicken nuggets, and crafting homemade macaroni‑and‑cheese, enjoys snack‑time peanut‑butter‑jelly sandwiches, and
    they experiment with simple recipes like LEGO‑shaped sugar cookies, but often forget to finish chores before dinner, reflecting a playful yet sometimes disorganized kitchen habit.
  core: Donald Thompson blends a boundless imagination for LEGO and Minecraft with a relaxed, occasionally disorganized routine, turning curiosity into spontaneous creations while they juggle school, soccer,
    and snack‑time adventures.
background:
  cultural: Donald is a White American child raised in the suburban community of Riverside, California. His family follows typical middle‑class American traditions, celebrating holidays such as Thanksgiving
    and the Fourth of July, and participates in local events like the Riverside County Fair. Living in a culturally diverse region, he is exposed to Hispanic influences—enjoying Mexican food, hearing Spanish
    greetings, and attending multicultural school activities. This environment encourages openness to new ideas while grounding him in a familiar American upbringing that values flexibility, outdoor recreation,
    and community involvement.
