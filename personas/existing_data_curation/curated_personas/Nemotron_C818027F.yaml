  career_goals: Although still in elementary school, Donald already imagines a future where he can blend his love of science with hands‑on creation. He hopes to become an engineer or astronaut who designs
    innovative tools, and he is also fascinated by the idea of caring for animals as a veterinarian. He dreams of inventing useful gadgets that help his community, such as a solar‑powered water filter,
    and values a career that lets him stay flexible, explore new ideas, and occasionally work on team projects or solo research.
