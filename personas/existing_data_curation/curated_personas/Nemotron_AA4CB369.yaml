  career_goals: Although still young, Sal envisions himself as someone who explores and creates. He dreams of becoming an astronaut who can travel to space, an artist who paints vivid scenes, or an inventor
    who builds clever machines. He aspires to win science fair competitions, exhibit his artwork at school exhibitions, and be recognized for solving tricky problems. His competitive streak pushes him to
    set personal milestones, such as mastering a new LEGO set or reading a whole series of books.
