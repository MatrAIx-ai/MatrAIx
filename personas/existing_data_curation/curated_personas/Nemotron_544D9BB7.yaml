personas:
  professional: Geronimo Delgado, a 49‑year‑old aspiring handyman entrepreneur, blends meticulous checklist‑driven craftsmanship with bilingual communication to win trust in his East Los Angeles community,
    channeling his competitive drive into building the most reliable home‑repair service for low‑income families.
  sports: Geronimo Delgado, a devoted pick‑up basketball player at his neighborhood court, follows the Los Angeles Lakers with fervor, joins a local recreational league each summer, and embraces a competitive
    edge that keeps his fitness routine sharp despite occasional knee aches.
  arts: Geronimo Delgado, a weekend volunteer organizer of Día de los Muertos celebrations, draws inspiration from the murals of Diego Rivera and the vocals of Vicente Fernández, and regularly attends performances
    at the East L.A. community theater to stay connected with his creative roots.
  travel: Geronimo Delgado, a pragmatic traveler with a modest budget, prefers road trips to the desert towns of New Mexico to photograph adobe churches, dreams of a cultural pilgrimage to Oaxaca’s markets,
    and plans family visits to coastal California spots like Santa Barbara for a balance of relaxation and heritage connection.
  culinary: Geronimo Delgado, a self‑taught chef, perfects classic mole poblano and carnitas while experimenting with quinoa‑infused tortillas, favors fresh poblano chiles, roasted corn, and local avocado,
    and often hosts communal meals where he showcases his penchant for blending tradition with modern twists.
  core: Geronimo Delgado, a meticulous 49‑year‑old handyman with a competitive streak, balances community devotion, disciplined budgeting, and a love for Mexican‑inspired cooking, all while juggling health
    checks, basketball games, and a dream of owning a home that serves as a family hub.
background:
  cultural: Geronimo grew up in East Los Angeles within a close‑knit Mexican‑American community. His parents immigrated from Jalisco, Mexico, and instilled in him the values of family loyalty, hard work,
    and respect for tradition. He was raised speaking Spanish at home and learned English through school and the neighborhood, becoming fully bilingual. Catholic customs such as Las Posadas and Día de los
    Muertos are central to his family gatherings, and he actively participates in local cultural festivals that celebrate Mexican heritage. Despite never marrying, he maintains strong ties with an extended
    family network, often assisting with childcare and financial support. The blend of his Mexican roots and the diverse, entrepreneurial spirit of Los Angeles shapes his practical outlook, competitive
    drive, and cautious optimism.
attributes:
