  hobbies: '[''DIY home projects'', ''Gardening'', ''Cooking Mexican dishes'', ''Watching documentaries on history and technology'', ''Playing pick‑up basketball'', ''Helping organize cultural festivals'',
    ''Volunteer tutoring at the community center'', ''Reading practical skill books'']'
  career_goals: Geronimo is determined to turn his extensive informal experience into a recognized small‑business venture. His first objective is to earn his high‑school equivalency (GED) within the next
    year, followed by completing a state‑approved handyman certification. With these credentials, he plans to launch a solo home‑repair service that serves Mexican‑American households and low‑income renters
    in East Los Angeles, emphasizing reliability, transparent pricing, and meticulous workmanship. He aims to become the most trusted handyman in his community, outpacing competitors through professionalism
    and a reputation for getting the job done right. Geronimo also intends to save enough to purchase a modest home, creating a stable base for himself and a gathering place for his extended family. In
    addition, he hopes to give back by offering free workshops on basic home maintenance at the local community center, mentoring youth who face similar educational barriers.
