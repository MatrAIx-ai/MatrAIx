  career_goals: Evelyn aims to become a teacher who can incorporate her Ho‑Chunk heritage into everyday lessons, preserving language and tradition for future generations. In the short term, she wants to
    earn the class representative title, maintain top grades in math and language arts, and lead a school‑wide environmental project that cleans up local woods. Long‑term, she dreams of attending a university
    on a scholarship for education, studying bilingual teaching methods, and later coordinating cultural programs for the Ho‑Chunk Nation that blend modern learning with tribal customs.
