personas:
  professional: Evelyn White, an 11‑year‑old aspiring youth leader, channels their competitive edge and love of structure into coaching soccer teammates, guiding debate club rounds, and designing Scratch
    games that blend strategic planning with creative storytelling.
  sports: Evelyn White, a spirited member of the River Valley Soccer Club who captains the U‑12 team, leads drills with meticulous precision, idolizes Manchester City’s midfield dynamism, and enthusiastically
    cheers for the U.S. Women’s National Team during the World Cup, treating each practice as a tactical challenge.
  arts: Evelyn White, an avid LEGO builder and budding beadwork artist, spends afternoons crafting necklaces inspired by traditional patterns while reading adventure series by Rick Riordan and J.K. Rowling,
    and expands their creative toolkit by programming whimsical Scratch games influenced by the pixel art of Studio Ghibli’s ‘My Neighbor Totoro’.
  travel: Evelyn White, an eager explorer who meticulously maps weekend hikes in the nearby Greenleaf Forest and has already camped in Yosemite National Park, dreams of backpacking through the ancient woods
    of Kyoto and touring the museums of London, balancing family‑approved itineraries with spontaneous trail discoveries.
  culinary: Evelyn White, a self‑taught kitchen tinkerer, whips up quick snacks like peanut‑butter banana wraps and cheesy margherita pizza slices, enjoys assembling chicken quesadillas with fresh cilantro,
    and delights in experimenting with trail‑ready granola bars flavored with honey and dried cranberries.
  core: Evelyn White, an organized yet fiercely competitive 11‑year‑old, channels boundless curiosity into soccer leadership, debate sharpness, and crafty beadwork, all while juggling a neat allowance ledger
    and a notebook of nature observations.
background:
  cultural: Evelyn is a member of the Ho‑Chunk Nation, growing up in Birnamwood, Wisconsin, a region with deep tribal roots. Her family celebrates seasonal powwows, participates in community storytelling
    circles, and teaches her the Ho‑Chunk language at home. She regularly attends cultural workshops at the tribal center, learning traditional drumming, crafts, and the values of stewardship toward the
    land. While she attends the local public school, her teachers incorporate elements of Native history and language, allowing Evelyn to bridge her American Indian heritage with mainstream education. Her
    upbringing emphasizes respect for elders, communal responsibility, and the preservation of tribal customs alongside her academic pursuits.
