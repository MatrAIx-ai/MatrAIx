personas:
  professional: Nelson Riggleman is a seasoned welder and brazier in the Lehigh Valley manufacturing sector, blending MIG, TIG, and stick welding expertise with a flair for artistic metal sculpture, and
    uses their relaxed, curiosity‑driven approach to troubleshoot complex blueprints while planning to earn AWS Certified Welding Engineer and Certified Welding Inspector credentials.
  sports: Nelson Riggleman shreds the basketball court at the Allentown community center on weekend pickup games, hits the Appalachian Trail for afternoon hikes each fall, and chants for the Philadelphia
    Eagles, 76ers, and Lehigh Valley IronPigs while occasionally attending IronPigs games at Coca‑Cola Park.
  arts: Nelson Riggleman channels the rhythmic drive of drumming in his garage band—where they jam to Metallica and The Who—into kinetic metal sculptures influenced by Richard Serra and the vibrant murals
    seen at the Allentown Art Fair, while regularly catching live‑music sets by local folk‑rock act The Dames and perusing the works of emerging ceramic artist Maya Chen.
  travel: Nelson Riggleman prefers spur‑of‑the‑moment road trips, often loading the car with welding gear and a portable speaker to head to nearby New York City for a weekend art gallery crawl, hiking the
    Shenandoah National Park in the spring, savoring the sushi lanes of Tokyo during an annual work‑related trip, and dreaming of a future summer venture to the metal‑craft workshops of Västerås, Sweden.
  culinary: Nelson Riggleman delights in co‑cooking hearty dishes—such as smoked brisket rubbed with paprika, rosemary‑infused grilled vegetable kebabs, and a build‑your‑own pizza topped with pepperoni,
    feta, and fresh basil—sharing the meals at neighborhood potlucks, even if their laid‑back timing occasionally leaves the oven door ajar a minute too long.
  core: Nelson Riggleman is a steel‑savvy welder‑artist who drums in a garage band, lives on a flexible schedule, and habitually misplaces their tool belt while dreaming up the next metal sculpture for
    a local café.
background:
  cultural: Nelson grew up in a modest, blue‑collar family in Carbon County, a region with deep roots in Pennsylvania’s coal‑mining and steel‑manufacturing heritage. His ancestry traces back to German and
    Irish immigrants who settled in the Lehigh Valley in the late 19th century, bringing a strong work ethic, community solidarity, and a fondness for local traditions such as annual county fairs and church
    picnics. The cultural environment emphasized practical skills, mutual assistance, and a respect for hands‑on craftsmanship, values that still shape his identity as a tradesperson today. While he respects
    these traditions, his curiosity and openness to new ideas also draw him toward contemporary art scenes and collaborative community projects.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Brazing'', ''Precision soldering'', ''Blueprint reading'', ''CNC plasma cutting'', ''Metal fabrication'', ''Material inspection'', ''Safety
    compliance'', ''Problem solving'', ''Custom metal art creation'']'
  hobbies: '[''Playing drums in a garage band'', ''Attending local art fairs and live‑music venues'', ''Creating custom metal sculptures'', ''Pickup basketball games'', ''Hiking the Appalachian Trail'',
    ''Volunteer set construction for community theater'', ''DIY home improvement projects'', ''Cooking and hosting neighborhood potlucks'']'
  career_goals: Nelson plans to earn his AWS Certified Welding Engineer designation within the next two years, followed by certification as a Certified Welding Inspector. He envisions launching a small
    studio where he can merge functional metal fabrication with artistic commissions for local businesses, restaurants, and community events. While he values the stability of his current employment, he
    wants the flexibility to take on freelance projects, mentor apprentices through the local trade school, and eventually transition to owning his own shop. He prefers to set broad milestones rather than
    rigid timelines, allowing room for spontaneous opportunities and creative collaborations.
