persona_description: A speech-language pathologist with expertise in teaching children with autism to use augmentative and alternative communication (AAC). She has a deep understanding of the unique challenges
  and complexities involved in teaching these children, including the need for consistent follow-through in the home and school settings. She has a comprehensive knowledge of applied behavior analysis (ABA)
  and how it can be used to complement and supplement her speech therapy approach. She is highly skilled in teaching children to use AAC and has a passion for helping children with autism communicate more
  effectively.
