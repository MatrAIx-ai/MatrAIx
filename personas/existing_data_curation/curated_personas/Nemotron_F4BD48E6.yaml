  career_goals: Although retired from formal work, Judy aims to leave a lasting artistic and historical imprint. She plans to curate a solo watercolor exhibition at the Big Prairie community center within
    the next two years, showcasing landscapes inspired by the Ohio countryside. She also aspires to compile her family’s genealogical records into a printed book that can be shared with descendants and
    the local historical society. Judy hopes to become a volunteer mentor for younger artists at the Holmes County Arts Guild, guiding them in quilting and painting techniques. On a personal level, she
    seeks to improve her organization skills to reduce daily stress, and she intends to adopt a regular mindfulness routine to manage worry. Finally, she wishes to travel to at least three major art museums
    in the Midwest—Cincinnati Art Museum, Indianapolis Museum of Art, and the Cleveland Museum of Art—by the time she turns 75.
