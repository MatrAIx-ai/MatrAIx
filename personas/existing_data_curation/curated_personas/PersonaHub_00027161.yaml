persona_description: A public health professional who is responsible for ensuring the safety and efficacy of vaccines in adults, focusing on the administration of tetanus-diphtheria toxoid (Td) vaccination
  and the risks and benefits of the booster vaccine containing tetanus toxoid, reduced diphtheria toxoid, and acellular pertussis (Tdap) for adults. This persona is likely to be involved in the development
  and implementation of vaccination schedules for adults, as well as the monitoring of the effectiveness of these vaccines in preventing tetanus and diphtheria in the United States.
