personas:
  professional: Orlando Bryant is a budding junior engineer who transforms science‑fiction ideas into LEGO constructions and Minecraft prototypes, blending curiosity with a methodical, organized approach
    while they eagerly plan future STEM competitions and volunteer to lead small robotics workshops for peers.
  sports: Orlando Bryant is a spirited point guard on Westside Middle School’s basketball team, cheering for the Miami Heat, practicing drills at the local community center, and using their teamwork skills
    to coordinate pick‑up games after school, though they sometimes skip practice when overwhelmed by homework stress.
  arts: Orlando Bryant is an avid comic‑strip creator who sketches heroes grappling with self‑doubt, draws inspiration from the lyrical storytelling of Kendrick Lamar, Beyoncé, and gospel artist Kirk Franklin,
    and dabbles on a beginner drum kit, using rhythm to channel intense emotions into artistic expression.
  travel: Orlando Bryant loves family nature walks in Shenandoah National Park and day trips to the nearby aquarium, dreams of attending a space‑camp program in Florida’s Kennedy Space Center, and prefers
    itineraries that mix hands‑on science activities with relaxed outdoor exploration, though limited allowance sometimes narrows travel options.
  culinary: Orlando Bryant enjoys building a custom pizza topped with pepperoni, pineapple, and extra mozzarella, frequently helps their family garden basil and cherry tomatoes for fresh sauces, and masters
    making microwave mug brownies, yet they have a guilty habit of over‑indulging in sugary cereal after school.
  core: Orlando Bryant is a meticulously organized 12‑year‑old whose curiosity fuels creative engineering projects, yet their intense emotions and occasional anxiety drive both disciplined routines and
    sporadic bursts of impulsive spending and late‑night gaming.
background:
  cultural: Orlando is raised in an African‑American family in Ashland City, Tennessee, where Southern hospitality and strong community ties shape his daily life. Family gatherings feature soulful cooking,
    such as fried chicken, collard greens, and cornbread, while stories of his ancestors' resilience are shared during holidays like Juneteenth and Black History Month. The local church plays a central
    role, providing both spiritual guidance and a venue for music and youth mentorship. He experiences the blend of Southern culture—football games, country roads, and BBQ festivals—with the rich traditions
    of African‑American heritage, including gospel choirs, hip‑hop influences, and an emphasis on collective uplift. This background informs his values of respect for elders, community service, and an awareness
    of the challenges faced by Black youth in a predominantly white rural setting.
