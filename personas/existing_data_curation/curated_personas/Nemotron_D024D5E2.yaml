  career_goals: Orlando dreams of becoming an engineer or computer programmer who designs practical solutions for his community, such as building sustainable playgrounds or creating educational apps for
    younger students. He aims to graduate high school with strong grades, earn a scholarship for a STEM‑focused college, and eventually work on projects that blend technology with everyday life in rural
    Tennessee. Alongside his technical ambitions, he hopes to mentor peers who struggle with anxiety, using his own experiences to foster a supportive environment. He also envisions contributing to local
    community initiatives, perhaps through a youth technology club or a small business that offers repair services for household electronics.
