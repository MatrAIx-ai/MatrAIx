  hobbies: '[''Softball league'', ''Fishing on the Chesapeake Bay'', ''Volunteer work at food pantry'', ''Barbecue cooking'', ''Live music events'', ''Model train building'', ''Woodworking'', ''Baltimore
    Ravens games'']'
  career_goals: David aims to transition into a senior supervisory role where he can oversee equipment programs and mentor junior operators. He plans to earn a crane‑operator certification and obtain a
    Commercial Driver’s License to expand his qualifications. Over the next five years, he hopes to become a certified safety trainer for his company, lead safety workshops, and eventually explore starting
    a small equipment‑rental or consulting business that leverages his deep practical knowledge while allowing a more regular schedule as he approaches retirement.
