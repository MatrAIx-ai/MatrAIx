persona_description: A conservation biologist who specializes in the study of wild Mexican wolves, particularly the captive breeding program and the recovery efforts in Arizona and New Mexico. The individual
  is passionate about the reintroduction of the species and the progress made towards recovery, and is dedicated to understanding the methods and processes used to monitor and manage the population. They
  are knowledgeable about the Interagency Field Team's methods for counting the wolf population and are interested in learning more about the challenges and successes of the captive breeding program.
