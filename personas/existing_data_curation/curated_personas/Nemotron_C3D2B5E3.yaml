personas:
  professional: Marcy Santos, a seasoned groundskeeper turned landscape‑design consultant, blends meticulous plant‑science expertise—including soil health assessment, irrigation design, and rain‑water harvesting—with
    a vivid artistic imagination, leveraging CAD and SketchUp to craft native‑plant installations that are both sustainable and visually striking, while their calm, resilient demeanor and balanced organization‑flexibility
    allow them to manage crews, troubleshoot on‑site challenges, and adapt plans with creative confidence.
  sports: Marcy Santos fuels their fitness through regular hikes along the Allegheny trails and seasonal birdwatching, supports the Pittsburgh Steelers and Penguins with enthusiastic game‑day rituals, and
    stays locally active as a member of the Allegheny Trail Club and a player in the Titusville Community Softball League, achieving a balanced, low‑impact exercise routine.
  arts: Marcy Santos draws creative inspiration from the tranquil palettes of Claude Monet, the bold botanicals of Georgia O’Keeffe, and the crisp compositions of Ansel Adams, channeling that influence
    into watercolor landscapes, macro photography of wildflowers, and hand‑thrown pottery exhibited at the Titusville Artisan Market, while often listening to Bon Iver as they sketch in their nature journal.
  travel: Marcy Santos prefers immersive, nature‑focused travel that blends careful itinerary planning with spontaneous detours, having trekked the Hocking Hills of Ohio and the Columbia River Gorge in
    Oregon, dreaming of strolling Kyoto’s zen gardens and wandering the lavender fields of Provence, all while budgeting trips around their part‑time studio work and occasional family visits.
  culinary: Marcy Santos, a competent home cook, regularly transforms garden herbs like rosemary, thyme, and sage into dishes such as heirloom tomato bruschetta, wild‑mushroom risotto, and rosemary‑infused
    focaccia, delights in fermenting heirloom peppers into kimchi, and occasionally over‑salts their soups, favoring simple, seasonal flavors that echo their outdoor pursuits.
  core: Marcy Santos is a calm, endlessly curious gardener‑artist who balances meticulous sustainable design with spontaneous watercolor splashes, occasionally overspends on art supplies while neglecting
    dentist visits, and thrives on turning native plants into living canvases.
background:
  cultural: Marcy’s cultural roots are grounded in a multi‑generational white Appalachian‑Midwestern heritage typical of western Pennsylvania. Her family traces back to Irish and German immigrants who settled
    in Venango County in the late 19th century, working in the oil fields and later on family farms. Growing up in Titusville, she was immersed in the region’s strong sense of community, self‑reliance,
    and respect for the surrounding hills and waterways. Local customs such as the Venango County Fair, seasonal apple‑picking trips, and church‑based potluck gatherings shaped her appreciation for seasonal
    rhythms and community solidarity. While she does not practice a formal religion regularly, the values of modesty, hard work, and stewardship of the land—often reinforced through Lutheran and Methodist
    congregations in the area—remain central to her outlook. She also takes pride in the area’s historical ties to the early oil industry and the ongoing effort to preserve native ecosystems, which informs
    her commitment to sustainable landscaping.
