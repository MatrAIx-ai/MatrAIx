  hobbies: '[''Watercolor painting'', ''Mixed‑media collage'', ''Macro photography'', ''Herb and vegetable gardening'', ''Hiking'', ''Birdwatching'', ''Nature journaling'', ''Reading (art history, speculative
    fiction, ecology)'', ''Volunteering at community garden'', ''Pottery'', ''Attending local art exhibitions'', ''Participating in craft fairs'']'
  career_goals: Marcy aims to advance from hands‑on groundskeeping to a senior landscape‑design consultant role, eventually launching her own boutique design studio that specializes in environmentally sustainable,
    art‑infused public and private gardens in western Pennsylvania. She plans to obtain the Professional Landscape Designer (PLD) certification and a horticulture degree to deepen her technical knowledge.
    Her long‑term ambition is to lead a regional community‑gardening program that educates residents about native ecosystems, rain‑water harvesting, and the therapeutic benefits of creative outdoor spaces.
    She also hopes to mentor the next generation of groundskeepers, sharing both her practical skills and her imaginative approach to design.
