    User 1: So, what do you like to do for fun?

    User 2: I like to read, watch movies, and spend time with my family.

    User 1: That sounds like a lot of fun.

    User 2: It is! I love my life.

    User 1: It sounds like you''re a very busy person.

    User 2: I am, but I wouldn''t have it any other way.

    User 1: Well, it sounds like you''re doing a lot of great things. I''m sure you''re making a big difference in the world.

    User 2: I hope so! I just try to do my best.'
