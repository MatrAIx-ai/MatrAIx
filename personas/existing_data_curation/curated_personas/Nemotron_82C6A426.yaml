  hobbies: '["coloring and finger painting", "building block tower construction", "spontaneous dancing to music", "group games at the park", "listening to stories and Spanish lullabies", "helping with simple
    cooking tasks", "collecting leaves and stones", "playing with simple puzzles"]'
  career_goals: Although she is only three, Zaida often talks about what she would like to be when she grows up. She dreams of becoming a teacher who can tell stories in both English and Spanish, an artist
    who paints bright, colorful pictures like the ones she loves to create now, or a dancer who performs lively folk dances. She is drawn to roles that let her share her love of art, music, and community
    with other children, and she hopes to be recognized as the best at drawing and dancing.
