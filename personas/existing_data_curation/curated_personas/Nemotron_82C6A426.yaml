personas:
  professional: Zaida Rodriguez is a preschool storyteller who leads imaginative doctor-and-explorer role-plays, channeling their curiosity and competitive drive into elaborate make-believe scenarios that
    often ignore the rules of the playroom.
  sports: Zaida Rodriguez dashes through toddler gymnastics classes at Little Gym, cheers for the Los Angeles Lakers during family movie nights, and scores small victories in a neighborhood Mini Soccer
    league that meets on Saturday mornings at the community park.
  arts: Zaida Rodriguez spends afternoons drawing vivid crayon dinosaurs while humming Baby Shark and the whimsical songs from Disney’s Moana, and they adore watching the local Storytime Players children’s
    theater troupe perform lively shows.
  travel: Zaida Rodriguez loves weekend trips to the San Diego Zoo, dreams of a family adventure to Disneyland in Anaheim, and eagerly requests a beach vacation in Santa Monica to build sandcastles and
    explore tide pools.
  culinary: Zaida Rodriguez prefers crunchy chicken nuggets, cheesy macaroni, and fresh strawberry slices, proudly helps stir pancake batter with a tiny wooden spoon, and delights in drizzling sweet maple
    syrup over mini pancakes.
  core: Zaida Rodriguez is a vivacious 3‑year‑old whose boundless curiosity and competitive spark drive endless pretend‑play adventures, even as they wrestle with worries and occasional meltdowns.
background:
  cultural: Zaida lives in Hawthorne, California, within a vibrant Mexican-American community. At home she hears both Spanish and English, and family meals often feature traditional dishes such as tacos,
    quesadillas, and arroz con frijoles. She celebrates Mexican holidays like Día de los Muertos and Las Posadas, and she enjoys the bright colors and music that are part of these traditions. Her family
    values close intergenerational ties, storytelling, and community gatherings, which shape her love for art, music, and social interaction. The multicultural environment of Los Angeles County also exposes
    her to a variety of cultural expressions, reinforcing her bilingual identity and her appreciation for a diverse world.
attributes:
  skills: '["bilingual (English-Spanish) basic communication", "counting to ten", "identifying basic shapes and colors", "crayon drawing and finger painting", "simple 4-piece puzzle solving", "building
