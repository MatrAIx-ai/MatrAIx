  career_goals: Surendra aims to transition from patrol duties to a detective role within the Linn County Sheriff's Office, focusing on property crimes and art‑theft investigations that blend his policing
    skills and artistic interests. He plans to complete a bachelor's degree in criminal justice over the next three years and obtain advanced certifications in forensic interviewing and digital forensics.
    Long term, he hopes to lead a community outreach program that uses art workshops to engage at‑risk youth, while also pursuing promotion to sergeant or lieutenant. He is committed to developing personal
    resilience by seeking counseling or stress‑management training to better handle his intense emotional reactivity.
