personas:
  professional: Surendra Lyerly, a 23‑year‑old patrol officer in the Linn County Sheriff’s Office, leverages his meticulous observation and improvisational problem‑solving—honed by a fascination with art—to
    excel in traffic enforcement while quietly preparing for a transition to detective work on property crimes and art theft.
  sports: Surendra Lyerly stays loosely fit by fishing the Iowa River on weekends, hiking prairie trails in the off‑season, cheering for the Iowa Hawkeyes football team and the Cedar Rapids Kernels during
    baseball season, and occasionally joining a neighborhood “Run‑Club” that meets at the city park for a casual jog, though they rarely commit to a strict training regimen.
  arts: Surendra Lyerly nurtures a quiet artistic side by sketching at the Cedar Rapids Museum of Art, admiring Grant Wood’s Regionalist paintings and the surreal photography of Man Ray, streaming indie
    soundtracks by Bon Iver, and collecting limited‑edition prints of contemporary muralists like Shepard Fairey, often using their camera to capture nuanced textures for later forensic comparisons.
  travel: Surendra Lyerly favors low‑key, spontaneous road trips over meticulous itineraries, weekend‑hopping between Iowa State Parks such as Ledges State Park and distant wanderings to the deserts of
    New Mexico for night‑sky photography, while dreaming of a future cultural pilgrimage to Jaipur’s art galleries to compare its vibrant street art with Midwestern motifs.
  culinary: Surendra Lyerly enjoys cooking simple Midwestern comfort foods like pork tenderloin with apple chutney, corn‑bread, and fresh‑caught Iowa River catfish fried in buttermilk batter, while occasionally
    experimenting with spiced lentil dal and turmeric‑infused quinoa, reflecting a modest cooking skill that leans toward hearty, home‑cooked meals and occasional food‑truck outings for gourmet tacos.
  core: Surendra Lyerly blends a small‑town sheriff’s sense of duty with a restless curiosity for art, juggling competitive ambition and chronic anxiety in a habitually disorganized but passionately observant
    life.
background:
  cultural: Surendra was raised in Hiawatha, a small agricultural town in eastern Iowa, within a white, Midwestern family that values hard work, community service, and modesty. His paternal grandparents
    were farmers, while his mother worked as a schoolteacher, giving him a blend of rural and educational influences. Although his name reflects an appreciation for Indian literature—chosen by his parents
    after studying Indian poetry—he grew up primarily immersed in typical Midwestern cultural traditions such as county fairs, high school football, and local church gatherings. This background, combined
    with his personal curiosity about art and unconventional ideas, gives him a broad yet grounded cultural perspective.
