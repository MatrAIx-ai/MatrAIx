  hobbies: '[''Hiking and trail walking'', ''Kayaking on Lake Michigan'', ''Cross-country skiing'', ''Woodworking and furniture making'', ''Reading non-fiction (economics, technology, psychology)'', ''Chess
    (club play)'', ''Fantasy football league'', ''Volunteer financial literacy tutoring'', ''Attending live music concerts'']'
  career_goals: Gregory aims to obtain his CPA license within the next year and advance to a senior manager role at a regional public accounting firm, with a long‑term ambition of becoming a partner. He
    is focused on pioneering digital audit methodologies that integrate data‑analytics and AI, and he aspires to specialize further in forensic accounting to lead high‑profile fraud investigations. Over
    the next five years, he plans to transition into a CFO position for a manufacturing company, leveraging his blend of technical, analytical, and leadership skills, while also mentoring junior accountants
    and contributing to professional publications on audit innovation.
