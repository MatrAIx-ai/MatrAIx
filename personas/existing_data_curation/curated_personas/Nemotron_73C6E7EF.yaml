  career_goals: Charles aims to secure a senior supervisory position within the claims department, allowing him to mentor junior clerks and shape best-practice workflows. He wants to leverage his deep institutional
    knowledge to lead quality-assurance projects, while maintaining a predictable schedule that supports his goal of a smooth transition to retirement within the next two to three years. He also hopes to
    obtain a professional certification, such as the Certified Insurance Service Representative (CISR), to formalize his expertise, and eventually offer freelance consulting to small insurance agencies
    in the Spokane area.
