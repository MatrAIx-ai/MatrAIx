personas:
  professional: Linda Montenegro is an aspiring cultural‑heritage program coordinator; they leverage their analytical writing, archival research, and project‑management skills to design community‑focused
    museum exhibits and grant proposals, while balancing a practical, detail‑oriented approach with a curiosity for the stories woven into Amarillo’s plains and historic sites.
  sports: Linda Montenegro is a casual fan of the Dallas Cowboys and Dallas Mavericks, plays intramural soccer at the local community center, hikes the trails of Palo Duro Canyon with the "Canyon Explorers"
    club, and joins a weekend pick‑up basketball league organized by the Amarillo Recreation Center; they relish the blend of team spirit and solitary trail time.
  arts: Linda Montenegro regularly curates a personal photography portfolio of winter skies and historic adobe buildings, strums acoustic guitar to the folk stylings of Joni Mitchell and contemporary singer‑songwriters
    like Taylor Swift, and participates in the Amarillo Public Library book club where they discuss works by Margaret Atwood and essays by bell hooks, while also attending occasional performances at the
    Amarillo Symphony.
  travel: Linda Montenegro prefers road‑trip itineraries that blend scenic drives across the Texas Panhandle with budget‑friendly stays, having explored Lubbock, Santa Fe, and Austin, dreaming of a future
    adventure to the Grand Canyon and a cultural exchange program in Barcelona, though family obligations sometimes limit longer voyages; they balance wanderlust with a pragmatic eye on costs.
  culinary: Linda Montenegro enjoys cooking simple Tex‑Mex dishes such as chicken fajitas with fresh cilantro, lime, and chipotle, perfects a smoky brisket using a small countertop smoker on weekends, and
    frequently experiments with corn‑masa‑based enchiladas while pairing meals with local craft beers like the Amarillo‑brewed Lone Star Lager, though they occasionally burn the edges of their cornbread.
  core: Linda Montenegro blends a love for solitary reflection with a community‑centric drive; they channel curiosity into cultural storytelling while navigating occasional coffee‑induced jitters and a
    habit of late‑night journaling.
background:
  cultural: Linda grew up in Amarillo, a city on the edge of the Texas Panhandle, in a family that values hard work, education, and community ties. Her white American heritage includes roots in the Midwestern
    United States, with grandparents who migrated to Texas in the 1970s seeking opportunities in agriculture and the oil industry. The cultural fabric of Amarillo—its blend of cowboy traditions, wide‑open
    landscapes, and strong Hispanic influences—has shaped her worldview. She enjoys regional customs such as high school football games, county fairs, and the annual Tri‑State Fair, while also appreciating
    the diverse culinary scene, especially barbecue and Tex‑Mex cuisine. Her upbringing in a modest, middle‑class household instilled a balance between self‑reliance and community involvement, which informs
    her academic and personal interests.
attributes:
  skills: '["Analytical writing", "Literary analysis", "Archival research", "Digital research tools", "Presentation design", "Project planning and time management", "Graphic design basics", "Basic Spanish
    proficiency", "Interpersonal negotiation", "Self-directed learning"]'
  hobbies: '["Reading contemporary fiction and poetry", "Creative writing and journaling", "Landscape and architectural photography", "Hiking in Palo Duro Canyon", "Acoustic guitar playing", "Cooking Tex-Mex
    dishes", "Participating in small book clubs", "Sketching and drawing", "Volunteering at Amarillo Public Library", "Birdwatching"]'
  career_goals: Linda aims to leverage her humanities background to build a career at the intersection of cultural preservation and community engagement. She envisions working for a regional museum or public
    library in Texas where she can develop educational programs, curate exhibits that highlight local history, and write grant proposals to secure funding. While she is open to further graduate study in
    museum studies or public history, she also wants to gain hands‑on experience through internships and volunteer projects that allow her to apply her research skills in real‑world settings. Long‑term,
    she hopes to become a program manager for cultural outreach, creating small‑group workshops and events that foster a sense of place and identity among Amarillo residents.
