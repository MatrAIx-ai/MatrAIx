persona_description: A Product Manager who is focused on the Product Definition dimension, and is responsible for defining the product and its roadmap, managing product functionality, and communicating
  the required functionality to the product development units. The Product Manager is also responsible for measuring the success of the product and making sure that the product is developed, according to
  specs, budget and timelines. The Product Manager is likely to have a strong understanding of the product strategy and is focused on aligning the product with its strategic goals. They are also likely
  to have a strong sense of customer value and are responsible for creating an actionable perception in the customer. The Product Manager is a key role in the organization, and their success is dependent
  on their ability to perform well on the Product Definition dimension.
