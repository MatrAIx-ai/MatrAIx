  career_goals: Pedro dreams of a future where he can combine his love for helping others with his practical curiosity. He often talks about becoming a pediatric doctor or a community health worker so he
    can care for children and keep his neighborhood healthy. He is also fascinated by how things work and imagines studying engineering to design simple solutions for everyday problems, like safer playground
    equipment for his friends. In the short term, he aims to improve his grades, join the school science club, and continue volunteering at the local community garden, hoping to develop leadership skills
    that will let him support his peers and maintain harmony in his community.
