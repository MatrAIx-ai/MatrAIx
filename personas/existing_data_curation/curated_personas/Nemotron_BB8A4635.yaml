personas:
  professional: Pedro Restrepo, a 10‑year‑old budding game creator, combines a methodical love for building LEGO structures with their curiosity for coding, channeling their organized mind into Scratch
    projects that blend imaginative storylines with practical problem‑solving.
  sports: Pedro Restrepo, a spirited member of the after‑school soccer squad, idolizes the local professional soccer club they cheer for, and spends Saturdays at the community field sharpening dribbling
    skills, while also joining a school‑run gardening club that doubles as a low‑impact fitness routine.
  arts: Pedro Restrepo, an avid acoustic‑guitar enthusiast, strums family‑passed folk melodies on evenings, drafts expressive sketches that capture their roller‑coaster emotions, and reads adventure series
    like 'Percy Jackson', allowing fictional heroes to inspire their own creative LEGO narratives.
  travel: Pedro Restrepo dreams of exploring the vibrant markets of Oaxaca and the ancient ruins of Teotihuacan, but currently prefers day trips to the nearby botanical garden and weekend visits to grandparents'
    home where they help prepare tamales, balancing curiosity for new places with family responsibilities.
  culinary: Pedro Restrepo, a junior kitchen helper, enjoys mixing masa with hand‑pressed fillings for tamales, savoring the aroma of roasted chilies, and experimenting with simple pepper‑corn seasoning
    on grilled corn, while their favorite snack remains a cheese‑filled LEGO‑shaped quesadilla.
  core: Pedro Restrepo is a meticulous, curiosity‑driven ten‑year‑old who balances LEGO engineering, Scratch game design, soccer, and family cooking, all while navigating intense anxiety that fuels both
    careful planning and occasional over‑thinking.
background:
  cultural: Pedro comes from a Mexican‑American family in Bakersfield, California. He grows up speaking both Spanish and English, with Mexican traditions woven into daily life. His family celebrates Día
    de los Muertos, Cinco de Mayo, and religious holidays like Christmas and Easter with homemade foods, music, and community gatherings. The aromas of tacos, tamales, and pozole often fill his home, and
    he enjoys listening to mariachi and norteña music. Cultural values such as respeto (respect), familismo (family loyalty), and trabajo duro (hard work) guide his actions. Being part of a vibrant Latino
    community in Kern County, Pedro participates in local festivals, church events, and neighborhood clean‑up projects, reinforcing his sense of cultural identity and responsibility to help others.
