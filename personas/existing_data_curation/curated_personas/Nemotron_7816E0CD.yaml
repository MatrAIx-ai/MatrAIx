personas:
  professional: Kimberly Simmons, a budding young engineer and coder, blends her love for clear rules with practical problem‑solving by designing detailed LEGO constructions and creating interactive Scratch
    stories, all while meticulously organizing her projects for her small group of sticker‑trading peers.
  sports: Kimberly Simmons, a dedicated community‑pool swimmer who logs regular laps each week, follows the Orlando Magic and Orlando City SC with enthusiasm, and balances structured swim practice with
    occasional pick‑up basketball games at school, all while holding a Girl Scouts fitness badge.
  arts: Kimberly Simmons, a keen sketch artist and avid reader of mystery series such as Harry Potter and Nancy Drew, immerses herself in Disney animated classics and the pop tunes of Taylor Swift, often
    channeling that inspiration into detailed LEGO dioramas and Scratch storyboards.
  travel: Kimberly Simmons prefers family‑oriented day trips and occasional weekend adventures, having explored Disney World and the sunny beaches of Clearwater, while dreaming of a school‑field‑trip to
    Washington, D.C.’s monuments and a future summer visit to New York City’s Central Park, always planning with a detailed checklist to quell her worry.
  culinary: Kimberly Simmons, a picky‑but‑curious eater, favors classic mac and cheese, chicken nuggets with honey‑mustard, and fruit‑laden smoothies, yet delights in baking strawberry shortcake cupcakes
    topped with rainbow sprinkles, often practicing the recipes she sees on kid‑friendly cooking shows.
  core: Kimberly Simmons is a meticulously organized ten‑year‑old who balances a love for LEGO building and Scratch coding with a steady stream of worries, a penchant for sticker trading, and a disciplined
    allowance‑saving habit that keeps her both grounded and perpetually double‑checking details.
background:
  cultural: Kimberly was raised in a middle‑class, predominantly Anglo‑American household in Oviedo, Florida. Her family lives in a suburban neighborhood characterized by quiet streets, nearby parks, and
    easy access to the Orlando metropolitan area. She celebrates typical U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July, often with family gatherings that include traditional foods
    and community fireworks displays. The local culture emphasizes outdoor activities like swimming and biking, and occasional exposure to the diverse multicultural environment of Central Florida through
    school and community events. Her family participates in a local Baptist church, which adds a modest religious component to her upbringing.
attributes:
  skills: '[''Organizational skills'', ''Reading comprehension'', ''Basic mathematics'', ''Scratch programming'', ''LEGO building'', ''Puzzle solving'', ''Small‑group collaboration'']'
  hobbies: '[''Reading'', ''LEGO building'', ''Drawing'', ''Scratch programming'', ''Girl Scouts badge projects'', ''Swimming'', ''Sticker trading'']'
  career_goals: She hopes to become a veterinarian, drawn to the idea of caring for animals in a structured, science‑based environment. She also expresses interest in becoming a teacher, valuing the orderly
    routine and the chance to help peers. Her long‑term ambition includes pursuing a career that allows her to apply her love of organization and responsibility to help others, while providing a clear path
    for professional growth.
