  hobbies: '[''Custom LED art installations'', ''Arduino/Raspberry Pi home automation tinkering'', ''Improvisational theater'', ''Guitar playing and band performances'', ''Hiking local trails and lakes'',
    ''Urban street photography'', ''Reading speculative fiction'', ''Volunteer teaching electrical safety'', ''Attending art galleries and museum exhibitions'', ''Participating in board game nights at local
    cafés'']'
  career_goals: Barry aims to earn master electrician licensure within the next three years and to obtain certifications in renewable energy and smart-building technologies. He aspires to launch his own
    contracting firm that specializes in sustainable electrical solutions and creative lighting design for commercial spaces, galleries, and public installations. Over the long term, Barry envisions expanding
    into project management for municipal renewable energy projects, mentoring apprentices, and establishing a community workshop where art and technology intersect.
