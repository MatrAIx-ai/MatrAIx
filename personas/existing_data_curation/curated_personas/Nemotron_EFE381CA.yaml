personas:
  professional: Barry Lee, a journeyman electrician with a flair for marrying rigorous code‑compliant wiring to eye‑catching LED art installations, leverages their methodical planning, sociable client interactions,
    and boundless curiosity, and they lead small teams on sustainable smart‑home and renewable‑energy projects throughout Madison.
  sports: Barry Lee, an avid weekend hiker and intramural soccer participant, follows the Wisconsin Badgers football and Milwaukee Brewers baseball teams, stays fit through Saturday trail runs around the
    Finger Lakes and monthly spin classes with the Madison Cyclists Club, and they balance their high‑energy social schedule with a disciplined strength‑training routine at the local community gym.
  arts: Barry Lee, a self‑taught LED installation artist and improv theater enthusiast, draws creative fuel from folk icons like Bob Dylan, indie performers such as The Lumineers, and street‑art provocateur
    Banksy, regularly performs with a folk‑rock band at Madison coffee houses, and they attend Overture Center productions starring Lin‑Manuel Miranda.
  travel: Barry Lee, a meticulous planner who still leaves room for last‑minute art festivals, has trekked the Finger Lakes trail system and explored Portland’s eco‑district, dreams of soaking in Iceland’s
    geothermal pools and wandering Dublin’s historic lanes, and they prefer budget‑friendly train travel punctuated by occasional weekend road trips to nearby state parks.
  culinary: Barry Lee, a capable home cook who loves grilling bratwurst with caramelized onions, crafting a perfect cheese‑curd poutine, and whipping up Thai green curry with coconut milk, lemongrass, and
    fresh basil, often pairs meals with a locally brewed Jolly Pumpkin craft beer and they enjoy occasional late‑night snack runs for deep‑dish pizza.
  core: Barry Lee, a 23‑year‑old electrician‑artist, blends Midwestern reliability with a restless creative spark, obsessively catalogues LED projects while still succumbing to impulse buys of glittering
    components, and they never miss a Sunday jam session.
background:
  cultural: Barry grew up in a middle-class white Midwestern family in Madison, Wisconsin. His parents, who valued practical skills and community involvement, encouraged both hands-on trades and a love
    of the arts. The city's progressive atmosphere, strong university presence, and vibrant local arts scene shaped his appreciation for creativity and civic engagement. He identifies with Midwestern values
    of hard work, reliability, and friendliness, while also embracing the diverse cultural offerings of Madison, from folk music festivals to contemporary art spaces.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical installation'', ''Circuit troubleshooting'', ''Electrical code (NEC) compliance'', ''AutoCAD electrical schematics'', ''Renewable energy system
