persona_description: A climate scientist who specializes in the impact of climate change on marine ecosystems and the conservation of fish populations. This individual is likely to be interested in the
  University of British Columbia study titled "Multi-model ensemble projections of climate change effects on global marine biodiversity" which examines the potential effects of climate change on fish populations
  in the tropics. The scientist is knowledgeable about the Intergovernmental Panel on Climate Change and the projections of temperature changes by 2100, and is interested in the potential impact on marine
  biodiversity. They may also be interested in the potential consequences of climate change on the Arctic and Antarctic oceans, as well as the role of changing temperatures in driving fish populations into
  these regions.
