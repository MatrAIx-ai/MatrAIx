persona_description: A dedicated and experienced educator in the field of teaching, learning, and curriculum, who is responsible for ensuring that all students in Maricopa Unified School District achieve
  their potential in school, career, and life. This person is committed to unifying students, staff, curriculum, and community in a safe, supportive, challenging, empowering, and innovative learning environment.
  They are skilled in curriculum and instruction, early childhood education, student services, English language learners, gifted services, technology integration, academic coaching, data and assessment,
  and are responsible for implementing recommended teaching methods, integrating new resources, technology, and materials, developing appropriate academic and social-emotional core curriculum, providing
  counseling crisis response and intervention, developing assessments to measure complex learning, and supporting professional learning to assist staff in acquiring the knowledge, skills, and behaviors
  to work effectively with a culturally and linguistically diverse student body.
