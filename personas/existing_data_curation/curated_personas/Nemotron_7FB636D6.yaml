  career_goals: Dieu often imagines future jobs that blend practical help and familiar routines. He says he wants to become a firefighter because he likes the idea of protecting people, wearing a uniform,
    and working on a predictable schedule. He also enjoys helping his mother in the kitchen and dreams of learning to prepare simple Vietnamese dishes like pho broth, hoping one day to become a chef who
    shares his family’s flavors. These ambitions reflect his desire for community‑oriented roles that involve teamwork, routine, and a clear purpose.
