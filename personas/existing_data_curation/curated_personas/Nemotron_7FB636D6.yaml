personas:
  professional: Dieu Nguyen, a four‑year‑old classroom helper at their preschool, excels at organizing snack‑time routines and leading circle games, using their love of familiar structure and outgoing energy
    to keep peers on track while flexibly adapting when things get chaotic.
  sports: Dieu Nguyen loves the sunny Orlando City SC youth soccer drills on weekends, watches the Orlando Magic on TV with wide‑eye excitement, and eagerly attends swimming lessons at the community pool,
    always eager to race their friends in the water.
  arts: Dieu Nguyen delights in drawing cartoon dragons, practicing calligraphy strokes at Saturday school, and singing along to Disney’s ‘Moana’ soundtrack, often reenacting favorite scenes with neighborhood
    friends.
  travel: Dieu Nguyen relishes family trips to Walt Disney World Resort and beach days at Clearwater, dreams of a future visit to their grandparents’ hometown during Tết celebrations, and enjoys meticulously
    coloring maps of dreamed‑about destinations.
  culinary: Dieu Nguyen prefers sticky rice cake bánh chưng at holiday feasts, slurps pho broth with tender noodles, snacks on chicken nuggets and mac and cheese, and proudly helps stir batter for pancakes
    using butter, flour, and a splash of vanilla.
  core: Dieu Nguyen, an energetic four‑year‑old, blends a love for routine, group play, and sugary treats with a happy‑go‑lucky knack for turning chores into mini‑adventures, even if they sometimes forget
    to clean up their crayons.
background:
  cultural: Dieu is a first‑generation Vietnamese‑American raised in a bilingual household in Orlando, Florida. His parents immigrated from Vietnam and keep many cultural traditions at home. He speaks both
    Vietnamese and English, celebrating Tết (Lunar New Year) with family gatherings, traditional foods like bánh chưng, and red envelopes. The family also observes the Mid‑Autumn Festival, enjoying mooncakes
    and lanterns. He attends a local Vietnamese Saturday school where he learns language, calligraphy, and folk stories. The multicultural environment of Orlando blends his Southeast Asian heritage with
    typical Floridian activities, giving him a hybrid identity that values family, community, and the shared enjoyment of both cultures.
