personas:
  professional: Megan Fantasia, a seasoned freight logistics specialist with over three decades mastering Austin’s delivery routes, blends meticulous route optimization, hands‑on vehicle maintenance, and
    savvy customer negotiations, while now channeling her curiosity into training the next generation of drivers as a part‑time instructor.
  sports: Megan Fantasia enjoys weekend hikes along the Barton Creek Greenbelt, supports the Austin FC soccer team and the Texas Longhorns football squad, participates in a low‑impact yoga class at the
    community center, and volunteers as a driver for a senior fitness outreach program, all while cheering on the Dallas Cowboys during football season.
  arts: Megan Fantasia’s evenings often find her at Antone’s listening to Texas country legends like George Strait and blues icons such as Stevie Ray Vaughan, while her knitting circle brings her close
    to folk art traditions, and she regularly attends classic car shows that double as moving sculptures of Americana.
  travel: Megan Fantasia favors scenic road trips through the Texas Hill Country, with recent highlights including a weekend getaway to Marfa’s art installations, a family reunion road trip to New Orleans
    for its music scene, and plans to drive the Pacific Coast Highway next summer, all while balancing travel costs with a modest travel fund.
  culinary: Megan Fantasia delights in cooking Tex‑Mex staples—flame‑grilled carne asada, smoky chicken enchiladas, fresh pico de gallo crowned with hand‑picked cilantro and jalapeños from her garden, and
    she pairs meals with homemade guacamole and occasional margaritas, though she sometimes over‑spices dishes in her enthusiasm.
  core: Megan Fantasia is a methodical, sociable logistics veteran who blends her love of music, road adventures, and community service with a disciplined approach to health, finance, and lifelong learning,
    all while occasionally indulging in vintage car nostalgia and overly spicy Tex‑Mex cuisine.
background:
  cultural: Megan is a white Texan with roots in a modest, middle‑class family from the Hill Country. She was raised with traditional Southern values of hospitality, self‑reliance, and community service,
    and grew up attending church events and local fairs. Though she never completed formal education beyond eighth grade, her hands‑on experience reflects the pragmatic, work‑oriented ethos of her upbringing.
    Living in Austin, she embraces the city’s eclectic culture while retaining a love for Texas traditions such as barbecue, rodeos, and country music. She respects the multicultural influences evident
    in Austin’s food and music scenes, yet her identity remains anchored in her Texan heritage.
