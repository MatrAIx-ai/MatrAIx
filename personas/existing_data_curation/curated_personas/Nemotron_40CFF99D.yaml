  hobbies: '[''Live music concerts'', ''Hiking and birdwatching'', ''Gardening'', ''Knitting/crocheting'', ''Cooking Tex-Mex cuisine'', ''Volunteer driver for seniors'', ''Attending classic car shows'',
    ''Group road trips'', ''Community food bank volunteering'']'
  career_goals: Megan aims to transition into a part‑time driver trainer role at a local trucking company, where she can share her decades of on‑the‑road experience with new drivers while maintaining a
    light driving schedule that keeps her active. She plans to obtain a CDL endorsement for hazardous materials to broaden her opportunities and is exploring the creation of a modest home‑based courier
    service focused on serving seniors and local businesses with a personal touch. Additionally, she wishes to volunteer as a driver for community health services and ensure financial stability for her
    grandchildren.
