persona_description: A historian who specializes in the study of ancient Israelite history and archaeology, particularly the events and practices associated with the Jordan Valley and the Israelites' religious
  rituals. He is interested in the orientation of the Jordan Valley theaters and the significance of the Jabbok River in the eyes of the Israelites. He is also interested in the archaeological evidence
  for the Israelite invasion of Canaan and the possibility of a major crossing in the area of Jericho during the conquest period.
