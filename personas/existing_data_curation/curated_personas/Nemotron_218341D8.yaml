  career_goals: Moon aspires to pursue a career that merges her compassion with concrete impact on people's wellbeing. She is drawn to professions such as pediatric nursing or child psychology, where she
    can directly support young people. She also entertains the idea of becoming an environmental educator, integrating her love for nature and community outreach. In the long term, she hopes to earn a college
    degree in a health-related field, obtain certifications, and eventually work in a community health center or school setting, fostering supportive and inclusive environments.
