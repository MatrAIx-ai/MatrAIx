  career_goals: Rocky aims to deepen his administrative expertise by earning a certification in office management or business administration within the next two years. He aspires to progress from receptionist
    to office manager, overseeing day‑to‑day operations and mentoring new front‑desk staff. Long‑term, he envisions moving into a role that blends community outreach with operational leadership—such as
    a regional customer experience manager for a hospitality chain or a public information coordinator for a municipal agency—leveraging his sociable nature and curiosity for improving service delivery.
    He also plans to pursue part‑time studies at a community college to broaden his knowledge of business processes and project coordination.
