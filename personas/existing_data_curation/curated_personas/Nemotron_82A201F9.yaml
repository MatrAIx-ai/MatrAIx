personas:
  professional: Lourdes Macias is a budding builder‑engineer who spends hours assembling intricate LEGO sets and designing redstone contraptions in Minecraft; they blend curiosity with practicality, favoring
    spontaneous creation over rigid plans, though their relaxed attitude sometimes leads to scattered workspaces.
  sports: Lourdes Macias enjoys the local youth soccer league and weekend kayaking on the St. Johns River, cheering for Orlando City SC and the Orlando Magic, while preferring solo practice drills over
    team scrimmages, a habit that mirrors their competitive yet solitary nature.
  arts: Lourdes Macias is an avid reader of mystery series like Nancy Drew, a fan of the animated adventure 'Adventure Time', and spends free time sketching marine creatures inspired by National Geographic
    Kids; they often hum the 'Let It Go' soundtrack from Frozen while building LEGO creations.
  travel: Lourdes Macias loves spontaneous family outings along the St. Johns River and has visited the Kennedy Space Center, dreaming of exploring the Galápagos Islands and Belize’s coral reefs, but they
    often plan trips at the last minute due to a relaxed attitude toward scheduling and school commitments.
  culinary: Lourdes Macias enjoys helping in the kitchen, mastering the crisp texture of plantain fritters and mixing mango salsa, while also savoring simple comforts like cheese pizza and banana smoothies,
    though they sometimes over‑salt the fritters while chasing the perfect crunch.
  core: Lourdes Macias is a curious, solitary puzzle‑solver with a competitive streak, a habit of worrying, and a love for building, nature walks, and kitchen experiments, and they navigate life with a
    relaxed, often disorganized approach.
background:
  cultural: Lourdes is a first‑generation Dominican‑American raised in a bilingual household in Jacksonville’s vibrant Dominican community. At home, Spanish is spoken alongside English, and family gatherings
    feature merengue and bachata music as well as traditional foods such as mangú, tostones, and guava pastries. She participates in local cultural events like the Dominican Republic Independence Day parade
    and enjoys learning about her Caribbean heritage. The values of family solidarity, resilience, and respect for elders are central in her upbringing, shaping her practical outlook, competitive spirit,
    and occasional skepticism.
