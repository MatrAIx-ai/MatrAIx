  career_goals: Lourdes dreams of becoming a marine biologist or environmental engineer to explore and protect the coastal ecosystems near Jacksonville, blending her love for practical problem‑solving with
    her curiosity about sea life. She also imagines designing innovative, hands‑on toys or tools that help other kids learn through play. As she grows, she hopes to earn a scholarship to study science,
    prove her ideas through experiments, and eventually lead her own research projects, earning recognition for her competitive spirit and independent thinking.
