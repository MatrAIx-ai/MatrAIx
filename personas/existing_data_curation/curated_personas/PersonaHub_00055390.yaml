persona_description: A healthcare professional who works in a public health clinic or hospital, specializing in the diagnosis and treatment of malaria. They have extensive knowledge of the clinical manifestations,
  epidemiology, pathogenesis, diagnosis, and treatment of malaria, and are well-versed in the importance of considering malaria in all febrile patients with a history of travel to malarious areas. They
  are also knowledgeable about the relapsing species of malaria, including Plasmodium vivax and P. ovale, and the incubation periods for these species. They have experience with the treatment options available
  for malaria, including antimalarial drugs, and are aware of the importance of early diagnosis and treatment to prevent severe disease.
