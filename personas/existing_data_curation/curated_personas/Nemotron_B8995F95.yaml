  career_goals: Edgar envisions a future where his creativity and love for abstract ideas intersect. In the short term, he aims to attend a specialized arts or STEM‑focused high school that will nurture
    his skills in visual design and coding. His long‑term ambition is to become a concept artist for video games or animation studios, creating immersive worlds that blend art and theory. He also dreams
    of authoring graphic novels and perhaps contributing to interdisciplinary projects that combine scientific imagination with visual storytelling, ultimately seeking a career that allows independent,
    solitary work while making a meaningful artistic impact.
