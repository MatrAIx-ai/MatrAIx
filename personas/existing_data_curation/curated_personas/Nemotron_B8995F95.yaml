personas:
  professional: An aspiring indie game creator, Edgar Canterbury combines a love for science‑fiction storytelling with methodical coding in Python and Scratch, channeling their vivid imagination into interactive
    comic‑style adventures while reliably meeting weekly project milestones.
  sports: A solitary runner, Edgar Canterbury enjoys early‑morning laps around the local lake trail for inspiration, occasionally joins the school’s cross‑country team in autumn and follows the River City
    Raptors hockey games with enthusiasm, preferring low‑key exercise over crowded gym sessions.
  arts: A prolific digital illustrator, Edgar Canterbury crafts comic strips inspired by Alan Lee’s fantasy art and composes piano pieces ranging from Debussy’s Clair de Lune to original ambient soundscapes,
    often listening to Studio Ghibli soundtracks while sketching, which fuels their creative identity.
  travel: An inquisitive explorer, Edgar Canterbury has trekked the nearby state nature reserve and plans a future visit to the Kennedy Space Center, while also dreaming of witnessing the Northern Lights
    in Iceland, favoring detailed itineraries that balance quiet reflection with hands‑on museum experiences.
  culinary: A budding home chef, Edgar Canterbury regularly whips up pepperoni pizza with fresh basil, perfects a simple miso ramen topped with soft‑boiled egg, and experiments with chocolate chip cookies,
    yet they often snack on sugary cereal while coding, revealing a love for comfort foods paired with occasional indulgent habits.
  core: Edgar Canterbury is an introspective teen who channels boundless imagination into solitary creative projects, balances meticulous planning with occasional procrastination, and navigates life with
    a quiet confidence that sometimes masks a penchant for late‑night caffeine.
background:
  cultural: Edgar is a white American teenager raised in Libertyville, a suburban community in Lake County, Illinois. His upbringing reflects midwestern middle‑class values that emphasize self‑reliance,
    privacy, and the importance of education. The family background includes subtle German and Polish ancestral influences common in the region, though cultural practices are primarily rooted in mainstream
    American traditions. He regularly visits the nearby Chicago museums and public libraries, participates in local community events such as summer fairs and lake outings, and balances a respect for quiet,
    solitary pursuits with an appreciation for the broader cultural offerings of the Greater Chicago area.
