  career_goals: Robert aims to become a paramedic within the next two years by enrolling in a community‑college paramedic program and obtaining advanced certifications such as Advanced Cardiac Life Support
    (ACLS) and Pre‑hospital Trauma Life Support (PHTLS). In the longer term, he aspires to join a specialized rescue unit—such as a flight‑medic team or a hazardous‑materials response group—and eventually
    move into a supervisory or training role where he can mentor new EMTs and influence EMS protocols. His competitive nature drives him to achieve measurable milestones and seek leadership positions within
    his department.
