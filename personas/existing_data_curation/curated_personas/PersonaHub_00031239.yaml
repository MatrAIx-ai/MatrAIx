persona_description: A professional in the field of sample preparation and chromatography, particularly in the use of SPE (Solid Phase Extraction) technology. This individual is likely to be a chemist,
  biochemist, or a researcher in the pharmaceutical or environmental science fields. They are skilled in the design, development, and application of SPE cartridges, as well as in the interpretation and
  analysis of the results obtained from SPE samples. They are familiar with the technical aspects of SPE and are capable of performing complex analytical testing on samples using SPE techniques. They may
  also be involved in the development of new SPE techniques and the optimization of existing SPE methods for improved performance and efficiency.
