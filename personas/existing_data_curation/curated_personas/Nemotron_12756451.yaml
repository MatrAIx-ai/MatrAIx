  career_goals: Taylor aims to rise to a director‑level position within a regional health system where she can shape strategic initiatives and champion innovative patient‑centred care models. She is pursuing
    certification in healthcare administration and plans to lead a cross‑functional team that implements cutting‑edge health IT solutions while maintaining cost efficiency. Driven by competition, she seeks
    to be recognized as a top performer in operational metrics and hopes to mentor emerging managers, using her blend of curiosity and practicality to foster a culture of continuous improvement.
