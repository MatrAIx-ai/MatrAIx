personas:
  professional: Marisol Rios, a retired elementary school teacher specializing in bilingual education, channels their methodical lesson-planning expertise and compassionate mentorship to design community
    tutoring workshops, intergenerational cultural festivals, and teacher-training sessions, always carrying a clipboard and a detailed schedule.
  sports: Marisol Rios stays active by joining low-impact salsa dance classes at the Fredericksburg senior center, taking daily walks through historic parks, cheering for the Washington Nationals, and participating
    in a weekly senior bowling league at the local community club.
  arts: Marisol Rios expresses their artistic side through a thriving church choir where they sing both hymns and Latin gospel songs, devour historical novels by Isabel Allende, knit while listening to
    Celia Cruz and Beethoven, and attend community theatre productions starring local actors such as James McShane.
  travel: Marisol Rios prefers meticulously planned trips, often revisiting their family's island home for the annual San Juan celebrations, taking leisurely day excursions to Colonial Williamsburg and
    the Shenandoah Valley, and dreaming of a future pilgrimage to Seville to trace the roots of the folk songs they cherish.
  culinary: Marisol Rios delights in preparing arroz con gandules with homemade sofrito, steaming pasteles wrapped in banana leaves, and whisking rich coquito with coconut milk and rum, while also cultivating
    fresh tomatoes, peppers, and plantains in their garden to enrich daily meals.
  core: Marisol Rios is a steadfast, organized community matriarch whose love for tradition, meticulous planning, and compassionate outreach shines through daily rituals, even as they quietly battle the
    worries that accompany their golden years.
background:
  cultural: Marisol was born and raised in Puerto Rico, where she absorbed a rich tapestry of Spanish language, Catholic faith, and island traditions. After moving to Virginia following her marriage, she
    continued to celebrate Puerto Rican holidays such as Noche de San Juan, La Navidad, and the Feast of St. Juan Bautista, often preparing dishes like arroz con gandules, pasteles, and coquito for her
    neighbors. She remains fluent in both Spanish and English, acting as a cultural bridge within the local Hispanic community and the broader Fredericksburg area. Her identity is rooted in strong family
    ties, communal solidarity, and a deep respect for the rituals and stories passed down through generations.
attributes:
  skills: '[''Curriculum Development'', ''Bilingual Education'', ''Lesson Planning'', ''Classroom Management'', ''Instructional Assessment'', ''Spanish-English Translation'', ''Community Outreach'', ''Event
