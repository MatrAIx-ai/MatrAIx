persona_description: A scientist who specializes in the study of cell biology, particularly the mechanisms of chromosome movement and the role of molecular motors in nuclear organization. The researcher
  has developed a novel method for observing nuclear motion and has shown that chromosomes in the nucleus are capable of directed, long-range movement that depends on actin and myosin, the major molecular
  motor complex in the cytoplasm. The scientist has collaborated with researchers from the University of Illinois at Chicago to publish their findings in the journal Current Biology.
