  career_goals: Giovanni aims to progress to a Principal Engineer or Architect role where he can shape the technical direction of projects that merge technology with artistic expression. He aspires to lead
    a small, high‑performing team that values collaboration and harmony, while championing innovative user experiences through creative coding and advanced visualization. In the longer term, he hopes to
    launch a boutique startup that provides digital tools for artists and educators, and to author a book on integrating design thinking with software engineering. Throughout his career, maintaining work‑life
    balance and supporting his family remain top priorities.
