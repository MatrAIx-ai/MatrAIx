  hobbies: '[''Volunteering at local food bank'', ''Zumba group fitness classes'', ''Weekend trivia nights'', ''Baking traditional family recipes'', ''Singing in community choir'', ''Gardening'', ''Reading
    mystery and true‑crime novels/podcasts'', ''Playing bridge at senior center'', ''Participating in recreational softball league'']'
  career_goals: At 54, Cara is motivated to advance into a senior sales leadership role while maintaining the flexibility she values. Her primary ambition is to become a regional sales manager overseeing
    a team of service representatives, where she can mentor younger colleagues and shape sales strategy. She also aims to achieve top‑performer status in her current territory, earn recognition such as
    “Salesperson of the Year,” and increase her commission‑based earnings for greater financial security. Looking ahead, she envisions eventually launching a boutique consulting service that offers sales‑training
    workshops for small businesses in Long Island, allowing her to blend her practical expertise with her desire for a more autonomous schedule.
