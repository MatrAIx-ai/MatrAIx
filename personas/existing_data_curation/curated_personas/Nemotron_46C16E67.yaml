personas:
  professional: Selim Barnette is a budding digital illustrator and imaginative storyteller who channels their curiosity and organized creativity into crafting detailed fantasy characters using Procreate,
    while volunteering at the library's kids' reading corner to hone their collaborative spirit.
  sports: Selim Barnette is a regular member of the Suncoast Youth Soccer Club, practices soccer and swims at Lake Istokpoga during the summer, cheers for the Orlando Magic and Tampa Bay Buccaneers, and
    balances structured drills with spontaneous kickball games to keep fitness fun.
  arts: 'Selim Barnette delights in sketching fantastical beasts inspired by the works of Hayao Miyazaki and the illustrations of Jim Lee, composes simple melodies on a beginner keyboard echoing the tunes
    of Disney''s movie scores, and spends weekends devouring graphic novels like ''Avatar: The Last Airbender'' and ''Saga'' for artistic inspiration.'
  travel: Selim Barnette prefers weekend road trips to nearby natural spots such as the Everglades and historic St. Augustine, while dreaming of an immersive cultural adventure to Tokyo's anime districts
    and the castles of Edinburgh, planning trips with meticulous maps and a scrapbook of imagined story settings.
  culinary: Selim Barnette enjoys crafting cheesy macaroni bites, experimenting with homemade pizza topped with fresh basil, cherry tomatoes, and mozzarella, and sipping strawberry-banana smoothies, yet
    often forgets to clean the kitchen after snack-making sprees.
  core: Selim Barnette is a hyper-creative 11-year-old whose boundless imagination fuels art, storytelling, and LEGO builds, while their organized yet whimsical nature leads to occasional messes and a relentless
    quest for new ideas.
background:
  cultural: Selim grew up in Sebring, Florida, in a family that values both Southern hospitality and an appreciation for the arts. His household blends a traditional Midwestern white heritage with the multicultural
    atmosphere of central Florida, where community events celebrate nature, local history, and creative expression. Exposure to the lakes and wildlife of Highlands County nurtured his love for the outdoors,
    while school programs and local art workshops fostered his artistic curiosity. The supportive family environment encourages independent exploration while emphasizing cooperation and giving back to the
    community.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''storytelling'', ''basic coding (Scratch)'', ''peer mediation'', ''team project coordination'', ''community service participation'']'
  hobbies: '[''drawing'', ''digital art'', ''LEGO building'', ''reading graphic novels'', ''creative writing'', ''playing keyboard'', ''nature sketching'', ''library volunteer work'']'
  career_goals: Selim dreams of turning his love for art and imagination into a career where he can create immersive experiences for others—such as becoming an animator, video game designer, or interactive
    media artist. He also hopes to leverage his empathetic nature by learning how to design inclusive, supportive environments for children, perhaps through educational technology or youth mentorship programs.
    His long‑term ambition is to fuse creativity with compassion, using his skills to inspire and help peers navigate challenges.
