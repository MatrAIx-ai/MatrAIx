personas:
  professional: Gabrielle Prince is an aspiring young scientist who, at five, already organizes their classroom experiments with meticulous charts and delights in asking 'why' questions, turning playtime
    into mini research projects that they proudly present to family.
  sports: Gabrielle Prince loves splashy backyard water games, proudly wears a Tampa Bay Lightning jersey during recess, and plays in the local Lakeland Tigers youth baseball league, where they practice
    catching with the same disciplined focus they apply to school.
  arts: Gabrielle Prince spends afternoons drawing colorful scenes inspired by Disney's 'Moana' and singing along to Taylor Swift's 'Shake It Off', often reenacting favorite movie moments with their stuffed
    animals.
  travel: Gabrielle Prince dreams of returning to Walt Disney World's Magic Kingdom after a recent family visit to the Florida Aquarium, and hopes to someday explore the ancient streets of Rome, sketching
    every landmark they imagine.
  culinary: Gabrielle Prince prefers crunchy chicken nuggets, cheesy macaroni, and mango smoothies, and while they can't yet cook, they love to help sprinkle shredded cheese on their own mini pizzas and
    insist on a dash of ranch dressing on everything.
  core: Gabrielle Prince is a meticulously organized five-year-old who balances a fierce curiosity for science with a sweet tooth for stickers and candy, often turning ordinary play into structured experiments
    that they meticulously document.
background:
  cultural: Gabrielle was born and raised in Lakeland, Florida, within a white, middle‑class family. Her upbringing blends typical Floridian suburban life—sunny weather, frequent trips to nearby lakes,
    orange groves, and community events like the Polk County Fair—with family traditions that celebrate holidays such as Thanksgiving, Christmas, and the Fourth of July. While her household’s practices
    are primarily American, she is also exposed to the multicultural flavors of Central Florida, including Hispanic food and music in the community, which enrich her curiosity about different cultures.
