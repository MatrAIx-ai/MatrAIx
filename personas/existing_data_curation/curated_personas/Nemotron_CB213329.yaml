  career_goals: She dreams of a future where she can explore the world and create beauty. Gabrielle often talks about becoming an astronaut who travels among the stars, a marine biologist who studies sea
    turtles, or an artist who paints the vivid Florida landscapes she loves. She aspires to combine scientific discovery with art, aiming to inspire others and meet high standards in whatever path she chooses.
