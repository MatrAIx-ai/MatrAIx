persona_description: A political scientist who specializes in the study of the psychology of wealth and its impact on political behavior. Their research interests include the relationship between wealth
  and political ideology, the role of the wealthy in politics, and the potential for democratic institutions to be compromised by the psychology of wealth. They are interested in the need for institutions
  that can limit the tendencies of the wealthy to opt out and control the process, and they are advocating for the defence of the social contract from the perspective of the vulnerable social contract to
  the psychology of wealth.
