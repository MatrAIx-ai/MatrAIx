  Best Generated Conversation: 'User 1: Hi! I''m new to PA. I just moved from VA.

    User 2: Welcome to PA! What brought you here?

    User 1: My husband got a job here.

    User 2: That''s great! What does he do for a living?

    User 1: He''s a mechanic.

    User 2: Cool. My dad''s a mechanic too.

    User 1: Oh, that''s cool.

    User 2: What do you like to do for fun?

    User 1: I like to do beadwork. I also like to write my own patterns.

    User 2: That''s cool. I''ve never done beadwork, but I''ve always thought it looked interesting.

    User 1: It''s really fun. You should try it sometime.

    User 2: I might just do that.

    User 1: I also grew up on a large farm.

    User 2: That''s cool. I''ve always wanted to live on a farm.

    User 1: It was a lot of work, but it was also a lot of fun.

    User 2: I can imagine.

    User 1: I''m not sure how I''m going to adjust to the harsher winters here in PA.

    User 2: I''m sure you''ll do fine. Just bundle up and you''ll be fine.

    User 1: I hope so.

    User 2: I''m sure you''ll be fine.

    User 1: Thanks.'
