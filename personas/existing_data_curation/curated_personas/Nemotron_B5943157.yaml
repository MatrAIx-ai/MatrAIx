  career_goals: Looking ahead, Denis aims to transition his practice into a mentorship‑focused model, gradually reducing his direct patient load while training an associate to carry on his legacy. He plans
    to expand services for geriatric patients, integrating tele‑health consultations to improve accessibility. Denis also aspires to author articles on minimally invasive dentistry and to present at regional
    dental conferences. Additionally, he wishes to increase his volunteer work at community health clinics serving underserved populations in Maricopa County and to serve on the board of the local dental
    society, helping shape policies that promote preventive oral health.
