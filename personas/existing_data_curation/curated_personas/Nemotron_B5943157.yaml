personas:
  professional: Denis Polcyn, a 63‑year‑old dentist with 35 years of experience, blends evidence‑based restorative and prosthodontic expertise with a curiosity for digital workflows, using intraoral scanning
    and CAD/CAM to mentor younger clinicians while slowly shifting his practice toward a mentorship model and geriatric tele‑health services.
  sports: Denis Polcyn hikes the Sonoran foothills most weekends, follows the Arizona Diamondbacks and Phoenix Suns, and belongs to a local senior walking club that meets twice weekly, preferring low‑impact
    exercise over competitive sports.
  arts: Denis Polcyn captures the desert’s subtle hues with a DSLR, drawing inspiration from Ansel Adams and Georgia O’Keeffe, enjoys chess with a close circle of friends, and reads biographies of historic
    figures like Leonardo da Vinci and scientific works by Carl Sagan, reflecting a lifelong appreciation for both visual and intellectual art.
  travel: Denis Polcyn plans trips with meticulous itineraries, favoring solo road journeys to Sedona, the Grand Canyon, and historic Santa Fe, while budgeting carefully to keep family visits during holidays
    affordable, and they occasionally dream of a quiet retreat in the vineyards of Napa Valley.
  culinary: Denis Polcyn prepares southwestern dishes such as carne asada with roasted chiles, cilantro‑lime quinoa, and prickly pear salsa, showing an intermediate cooking skill that blends traditional
    flavors with occasional culinary experiments using mesquite flour and roasted tepary beans.
  core: Denis Polcyn is a methodical yet curious senior dentist who balances meticulous practice management with a love for solitary desert photography, disciplined finances, and a gentle, sometimes stubborn,
    commitment to personal health and community service, and they often reflect on the quiet moments that shape their decisions.
background:
  cultural: Denis grew up in a Midwestern American family that emphasized hard work, self‑reliance, and community involvement. After moving to Arizona in his early thirties for his dental career, he embraced
    the desert’s relaxed pace while retaining his Midwestern values. Living in Mesa, he is familiar with the region’s blend of Southwestern culture, including local festivals, an appreciation for the natural
    environment, and a strong sense of community service. He integrates these influences into both his professional practice and personal life, reflecting a balance of practicality and curiosity rooted
    in his cultural upbringing.
