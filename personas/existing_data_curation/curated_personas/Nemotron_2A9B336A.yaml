personas:
  professional: Andy Buenfil, a budding student council leader and aspiring community organizer, leverages methodical planning, reliable follow‑through, and a love for group teamwork to coordinate school
    events and local volunteer initiatives, while envisioning a future career that blends sports leadership with social service.
  sports: Andy Buenfil channels their energetic, routine‑driven nature into playing forward for Westland High School’s soccer team and a local community league, while rallying behind Detroit City FC during
    the MLS season and cheering the Michigan Wolverines football team in the fall, maintaining a disciplined weekly training schedule that they adjust whenever anxiety spikes.
  arts: Andy Buenfil delights in the sounds of Los Tigres del Norte, Banda El Recodo, and contemporary pop icons like Billie Eilish, curates shared playlists for friends, and channels meticulous creativity
    into building intricate LEGO architecture sets, while regularly attending local Día de los Muertos art installations and cinema screenings of animated classics.
  travel: Andy Buenfil prefers family‑guided trips that blend cultural immersion with relaxed downtime, having explored Detroit’s Eastern Market and a weekend getaway to San Antonio’s River Walk, while
    dreaming of a future pilgrimage to Oaxaca’s bustling markets and the sun‑kissed beaches of Cancún.
  culinary: Andy Buenfil enjoys the hands‑on ritual of cooking tacos al pastor, tamales, and sopes alongside their parents, mastering the balance of fresh cilantro, roasted chilies, and corn masa, and while
    their skill level sits at an adept home‑cook, they eagery experiment with homemade salsa verde and seasonal mole sauces.
  core: Andy Buenfil thrives on routine, community, and the buzz of soccer and video games, yet often battles intense anxiety that fuels nightly journaling and occasional impulsive sneaker splurges.
background:
  cultural: Andy is a second‑generation Mexican‑American raised in Westland, Michigan. His household blends Mexican traditions with Midwestern American life; Spanish is spoken at home, and his family celebrates
    holidays such as Día de los Muertos, Las Posadas, and the quinceañera of his cousin. Catholic values shape family gatherings and community involvement. He enjoys Mexican cuisine, both as a consumer
    and as a participant in cooking meals with his parents. The local Mexican community in the Detroit metro area provides a supportive network, with access to cultural events, bilingual religious services,
    and a strong emphasis on family cohesion. Andy's identity reflects this bicultural experience, influencing his language skills, culinary interests, and desire to give back to his community.
