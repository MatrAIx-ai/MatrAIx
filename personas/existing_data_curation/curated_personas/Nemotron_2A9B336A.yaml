  career_goals: Andy envisions a future where he can combine his love for routine, practicality, and helping others. He aspires to pursue a career as a community health worker or a high school teacher,
    roles that would allow him to support his local neighborhood and share his bilingual abilities. He is also interested in skilled trades such as automotive technology, attracted by the clear structure
    and hands‑on problem solving the field offers. Andy hopes to earn a scholarship to attend a technical college, eventually securing a stable, service‑oriented job that lets him give back to his family
    and the Mexican‑American community in Westland.
