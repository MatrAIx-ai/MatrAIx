  career_goals: Even at four, Ahmed enjoys imagining future roles. He often says he wants to become a firefighter because he loves the bright trucks and helping people, reflecting his practical side and
    desire to be reliable. His fascination with the night sky and curiosity about how things work also lead him to dream of being an astronaut one day, showcasing his imaginative side. In the more immediate
    future, he wishes to be a soccer player on a team, driven by his competitive spirit and love for energetic group activities. He views these aspirations as fun possibilities rather than fixed plans,
    but they give him a sense of direction and excitement.
