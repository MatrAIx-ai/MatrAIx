  career_goals: Marilyn aims to graduate high school with a strong academic record and secure a scholarship to study Business Administration with a concentration in Project Management at a California university.
    In the short term, she plans to take on leadership roles in the student council and the school newspaper, and to complete a summer internship with a local event‑planning firm. Long‑term, she envisions
    a career as a project manager or events coordinator for community‑focused organizations, leveraging her organizational talent, tech savvy, and love for bringing people together. She also hopes to continue
    playing competitive volleyball at the collegiate level and eventually coach youth teams, combining her athletic passion with mentorship.
