personas:
  professional: Hannah Brown, a 26-year-old public library cataloger in Wilmington, blends meticulous MARC expertise with a flair for storytelling, designing digital history portals and art-focused workshops
    that reflect her Southern hospitality and curiosity about diverse cultures.
  sports: Hannah Brown enjoys kayaking on the Intracoastal Waterway with the Wilmington Kayak Club, hikes the trails of Greenfield Lake Park on weekends, and follows the Carolina Panthers and the Wilmington
    Sea Dragons, occasionally joining a local pick-up volleyball game at the community center to stay active.
  arts: Hannah Brown curates a personal photography blog featuring the historic homes of Wilmington, frequents the Cameron Art Museum to view works by contemporary artists like Kehinde Wiley, reads novels
    by Sally Rooney and poetry by Ocean Vuong, and regularly attends productions by New Hanover Regional Theatre, where she admires performances by local actors such as Ben Hall.
  travel: Hannah Brown prefers thoughtfully planned road trips that combine coastal scenery with cultural immersion, having explored Charleston’s historic district, Savannah’s riverfront festivals, and
    a weekend getaway to Asheville’s Blue Ridge Mountains, while dreaming of a future visit to Edinburgh’s literary festivals and a culinary tour of Oaxaca.
  culinary: Hannah Brown experiments in her modest kitchen with global dishes like Thai Pad Thai, Ethiopian injera with berbere-spiced lentils, and Japanese okonomiyaki, while still cherishing Southern
    staples such as shrimp-and-grits, and she delights in using fresh herbs like basil, cilantro, and thyme to infuse her meals with vibrant flavor.
  core: Hannah Brown is a curious, community-oriented librarian who balances meticulous organization with artistic spontaneity, often swapping a cataloging task for a sunrise kayak or a spontaneous photo
    shoot of a historic porch.
background:
  cultural: Hannah grew up in a middle‑class Southern family in North Carolina, where community, hospitality, and a respect for local history were emphasized. Her upbringing combined traditional Southern
    values—such as politeness, strong family ties, and an appreciation for regional food and festivals—with a broad liberal arts education that fostered curiosity about art, literature, and diverse cultures.
    She is deeply connected to Wilmington’s coastal heritage and the complex narratives of the area, and she strives to honor that history through inclusive library programming that reflects both her Southern
    roots and her commitment to broader cultural understanding.
