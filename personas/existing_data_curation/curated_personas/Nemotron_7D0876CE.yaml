    ''Effective communication'', ''Collaborative project management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Photography (historic architecture and nature)'', ''Reading contemporary fiction and poetry'', ''Book club participation'', ''Local theater attendance'',
    ''Kayaking on the Intracoastal Waterway'', ''Hiking in local parks'', ''Cooking international dishes'', ''Crocheting'', ''Volunteering as a museum docent'']'
  career_goals: She aims to earn a Master of Library and Information Science within the next two years, followed by certification in digital preservation. Hannah envisions leading the special collections
    and digital archives department at the New Hanover County Public Library, creating innovative, art‑focused community programs and an interactive online local‑history portal. Long‑term, she aspires to
    become a senior curator or library director who champions inclusive access, interdisciplinary collaborations, and sustainable preservation practices while balancing a fulfilling family life.
