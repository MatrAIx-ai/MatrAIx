  hobbies: '[''Community barbecue organization'',''Volunteer fire department safety training'',''Intramural softball'',''Hiking in local conservation areas'',''DIY home renovation projects'',''Attending
    Kansas City jazz concerts'',''Hosting a book club'']'
  career_goals: Judy aims to earn the Certified Building Official (CBO) credential within the next two years and to progress into a senior inspector or supervisory role within the Jackson County Building
    Department. She plans to pursue an associate degree in Construction Management to broaden her technical expertise and to lead community outreach initiatives that educate homeowners and contractors about
    preventative safety practices. Long‑term, she aspires to influence regional code development, potentially serving on a state‑level advisory committee, while maintaining a hands‑on presence in field
    inspections.
