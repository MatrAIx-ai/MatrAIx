personas:
  professional: Richard Rosa, a seasoned facilities custodian with over 15 years of experience, combines meticulous knowledge of industrial cleaning equipment and OSHA safety with a pragmatic, slightly
    laid‑back attitude that makes them excellent at troubleshooting on‑site repairs while still championing green‑cleaning initiatives as they eye a supervisory role.
  sports: Richard Rosa, an avid outdoorsman, spends weekends hiking the Cascades with the Northwest Trail Club, casts a line on Lake Washington while following Seattle Seahawks football Saturdays, and hits
    the local YMCA for weight training, balancing relaxed scheduling with a practical commitment to staying fit.
  arts: Richard Rosa, a hobbyist acoustic guitarist, often strums folk classics from Neil Young and Joni Mitchell while sipping coffee at the local café, and occasionally catches performances by the Seattle
    Symphony and indie band The Head and the Heart, letting music shape his weekend downtime.
  travel: Richard Rosa favors low‑key, flexible travel—spontaneous weekend getaways to the San Juan Islands or a quick hike in Olympic National Park, with a long‑term wishlist that includes a Patagonia
    trek and a cultural tour of Kyoto, balancing his desire for adventure with a modest family budget.
  culinary: Richard Rosa, an enthusiastic but not gourmet‑level cook, often prepares grilled Lake Washington trout seasoned with lemon, rosemary, and garlic alongside garden‑grown roasted carrots and kale,
    and enjoys pairing meals with locally roasted coffee and occasional craft IPA.
  core: Richard Rosa blends pragmatic hands‑on expertise with a love for sustainable living, tackling home projects and outdoor hobbies in a relaxed, slightly disorganized style that keeps both his toolbox
    and his life intriguingly balanced.
background:
  cultural: Richard grew up in a middle‑class, white, suburban American family in the Pacific Northwest. His upbringing emphasized a strong work ethic, practicality, and community involvement. He identifies
    with traditional blue‑collar American values, values punctuality and reliability, and appreciates the multicultural environment of Redmond while maintaining his heritage rooted in Midwestern U.S. culture.
