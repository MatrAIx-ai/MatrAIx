  career_goals: Richard aims to advance into a supervisory role within facilities management, such as lead custodian or shift supervisor, within the next two years. He plans to earn a Certified Custodial
    Technician credential and complete a community‑college course in facilities management to broaden his technical expertise. He also hopes to champion green‑cleaning initiatives at his workplace, reducing
    chemical usage and improving sustainability. In the longer term, he is open to launching his own residential cleaning business to gain greater control over his schedule and serve his local community.
