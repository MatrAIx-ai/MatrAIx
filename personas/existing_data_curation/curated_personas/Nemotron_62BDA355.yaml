personas:
  professional: Lan Chien is a bilingual literary writer and editor who leverages meticulous project planning and a collaborative workshop style to create culturally resonant fiction, and they balance deadline‑driven
    precision with the gentle harmony of group feedback.
  sports: Lan Chien enjoys a mix of low‑impact fitness, attending a community yoga studio three times a week, rowing on the Staten Island waterfront with a local club, and they cheer for the New York Mets
    while also supporting the Gotham FC women's soccer team during the spring season.
  arts: Lan Chien curates their artistic life through regular visits to the MoMA, a love for Wong Kar‑wai cinema, reading contemporary Asian‑American authors such as Celeste Ng and Viet Thanh Nguyen, and
    they draw inspiration from the paintings of Yayoi Kusama, often incorporating these influences into journal prompts.
  travel: Lan Chien prefers meticulously planned trips, having recently crafted a two‑week itinerary to Taiwan that combined family reunion meals, a sunrise hike on Alishan, and a tea‑ceremony workshop,
    and they also dream of a weekend retreat in the Catskills to photograph autumn foliage and practice sketching.
  culinary: Lan Chien is an enthusiastic home cook who blends traditional recipes like gua bao, beef noodle soup, and pineapple cake with seasonal New York ingredients, frequently sourcing fresh pork belly
    and Taiwanese 5‑spice powder from local markets, yet a quirky habit is that they leave a pot of tea steeping far longer than intended, resulting in a pleasantly bitter brew for guests.
  core: Lan Chien merges disciplined storytelling with a love for communal rituals, and they balance meticulous planning and spontaneous creativity while nurturing harmony in every endeavor.
background:
  cultural: Born to East Asian (Chinese‑Taiwanese) parents who immigrated to the United States, Lan grew up navigating a bicultural identity that blends Confucian values of family harmony, respect, and
    collective well‑being with the individualistic ethos of American society. Her household celebrated traditional festivals such as Lunar New Year and Mid‑Autumn, while also embracing the multicultural
    vibrancy of New York City. This dual cultural perspective informs her writing, granting her a nuanced lens on themes of belonging, cultural preservation, and adaptation. Lan’s fluency in Mandarin and
    familiarity with Chinese literary traditions enrich her storytelling, allowing her to weave intergenerational narratives that resonate with both diaspora communities and broader audiences.
attributes:
  skills: '["Creative writing", "Literary editing", "Bilingual (English & Mandarin)", "Research and thematic development", "Project planning and deadline management", "Content management systems (CMS)",
