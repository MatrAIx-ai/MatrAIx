  hobbies: '["Themed journaling", "Curated reading (literature, Asian‑American authors)", "Cooking traditional Chinese/Taiwanese dishes", "Hosting communal meals", "Yoga and mindfulness meditation", "Nature
    walks and sketching in Staten Island", "Photography of urban‑natural scenes"]'
  career_goals: Lan aims to publish her first novel—a literary work that explores the immigrant experience and intergenerational dynamics—through a reputable literary press within the next two years. She
    also seeks to build a steady portfolio of freelance articles for cultural and lifestyle magazines, providing a reliable income stream that aligns with her preference for predictability. Long‑term, Lan
    aspires to develop a series of short‑story collections and possibly a children’s book series that reflects East Asian heritage, while also establishing a community writing workshop in Staten Island
    where she can mentor emerging writers, fostering collaborative harmony and mutual support.
