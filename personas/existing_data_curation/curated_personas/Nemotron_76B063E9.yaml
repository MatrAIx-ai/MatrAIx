personas:
  professional: Teresa Godwin, a veteran child, family and school social worker in Boulder County, they combine four decades of case‑management expertise, strengths‑based counseling, and a love of abstract
    art to design community‑driven art‑therapy workshops that nurture resilient, empathetic youth while mentoring emerging professionals.
  sports: Teresa Godwin, an avid member of the Boulder County Hikers’ Club and a regular at the Yoga Loft studio, enjoys gentle yoga, seasonal cross‑country skiing on the Front Range, hikes the foothills
    with binoculars for birdwatching, and they passionately root for the Denver Broncos, Colorado Rockies, and Colorado Avalanche.
  arts: Teresa Godwin, a watercolorist inspired by Georgia O’Keeffe’s bold palettes and Mark Rothko’s color fields, attends the Boulder Philharmonic’s evening concerts, revels in folk songs by Joan Baez,
    and they frequently quote the poetry of Mary Oliver during their abstract‑inspired art‑therapy circles.
  travel: Teresa Godwin, who prefers thoughtfully planned trips that combine serene nature retreats with cultural immersion, they have explored the Alpine vistas of Banff, wandered the historic streets
    of Kyoto, and dream of trekking Patagonia’s Torres Del Paine, all while budgeting travel expenses through a dedicated senior travel savings account.
  culinary: Teresa Godwin, a confident home cook who delights in seasonal, locally sourced dishes, they often prepare quinoa pilaf with Colorado trout, wildflower honey‑glazed carrots, and a side of roasted
    beet and goat‑cheese salad, while experimenting with aromatic herbs like sage and lavender in teas brewed from their native‑wildflower garden.
  core: Teresa Godwin blends a lifetime of social‑work wisdom, abstract artistic curiosity, and gentle community stewardship into a quietly vibrant legacy, punctuated by occasional forgetfulness about medication
    and a habit of buying too many watercolor brushes, and they often smile at their own quirks.
background:
  cultural: Teresa was raised in a small Midwestern town where her family emphasized hard work, community service, and a respect for education. As a white American of the Silent Generation, she grew up
    amid post-World War II optimism and later witnessed the social upheavals of the 1960s, which sparked her commitment to social justice and gender equality. After earning a bachelor’s degree in arts and
    humanities, she moved to Colorado, immersing herself in the state’s outdoors-oriented and environmentally conscious culture. Living in Lafayette and the broader Boulder County region, she adopted the
    area’s progressive values, integrating an appreciation for indigenous stewardship of the land and a vibrant local arts scene into her personal and professional life. This blend of Midwestern heritage,
    liberal-arts education, and the culturally rich, nature-focused community of Boulder County shapes Teresa’s worldview, driving her collaborative, harmonious, and creatively curious approach to both
    her work and everyday life.
