  hobbies: '[''Watercolor painting'', ''Hiking in the Rocky Mountains'', ''Birdwatching'', ''Reading contemporary poetry'', ''Studying philosophy'', ''Attending monthly gallery walks'', ''Volunteering as
    art-therapy facilitator'', ''Practicing yoga'', ''Gardening native wildflowers'', ''Knitting quilts with symbolic patterns'']'
  career_goals: Teresa’s current ambitions focus on leaving a lasting legacy of intergenerational empathy and creative healing. She aims to establish a community-wide art-based mentorship program that pairs
    senior volunteers with at-risk middle-school students, fostering mutual learning and emotional resilience. She also plans to author a memoir that weaves personal narratives with reflections on the evolution
    of child-welfare practice, to be used as a teaching resource in social-work programs. In addition, Teresa seeks to continue her advocacy work by serving on a state advisory board for child mental-health
    services, contributing her decades of field experience to shape evidence-based policies. Finally, she remains committed to lifelong learning, enrolling in philosophy and contemporary art courses at
    the local community college.
