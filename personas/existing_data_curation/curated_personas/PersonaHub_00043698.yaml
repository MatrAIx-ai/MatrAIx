persona_description: 'A professional who is interested in the workings of the U.S. Congress, particularly in the committees and their activities. They are knowledgeable about the administrative information
  provided by the Clerk of the House, and have access to the extensive congressional committee hearing transcripts and reports. They are interested in the financial disclosure reports of Members of Congress
  and the Gift and Travel Filings. They are also interested in the Earmarks Database, which lists information on congressionally provided funds for projects, programs, or grants where usual congressional
  direction goes around usual merit-based or competitive allocation processes, or restricts executive branch ability to manage fund allocation processes. They are also interested in the House Practice:
  A Guide to the Rules, Precedents, & Procedures of the House, which provides a guide to the rules, precedents, and procedures of the House.'
