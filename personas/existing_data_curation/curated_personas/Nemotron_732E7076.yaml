personas:
  professional: Nicole Irving, a 13‑year‑old budding game designer, channels their disciplined focus and vivid imagination into crafting fantasy‑themed Scratch and Python games that subtly weave traditional
    bead patterns and storytelling motifs into the pixel art.
  sports: Nicole Irving runs on the Rio Rancho middle school track club, training solo on the desert trails to improve sprint times while cheering for the New Mexico State Aggies football team and the Albuquerque
    Isotopes baseball club during weekends, balancing a competitive streak with a preference for quiet, individual workouts.
  arts: Nicole Irving fills sketchbooks with dragons and star‑lit citadels inspired by the cinematic worlds of Hayao Miyazaki and the lyrical prose of N.K. Jemisin, practices piano pieces by Ludovico Einaudi
    to sharpen concentration, and curates a personal playlist featuring the folk tones of R. Carlos Nakai and the ethereal synthscapes of composer Yoko Shimomura.
  travel: Nicole Irving prefers meticulously planned weekend getaways, having explored the red dunes of White Sands and the ancient cliff dwellings at Bandelier, while day‑dreaming about a future solo pilgrimage
    to Kyoto’s historic temples and the anime‑filled streets of Akihabara, balancing curiosity for distant cultures with family budget constraints.
  culinary: Nicole Irving enjoys crafting blue‑corn pancakes topped with roasted red chile syrup for breakfast, devouring hearty green‑chile enchiladas for lunch, and experimenting with a homemade cactus‑flower
    salsa, yet often forgets to finish chores because they get lost in creating new fantasy recipes.
  core: Nicole Irving is a fiercely imaginative teenager who balances disciplined world‑building and coding with an anxiety‑driven need for meticulous planning, a habit of staying up late to perfect pixel
    art, and a quiet competitive edge that fuels both solo adventures and creative pursuits.
background:
  cultural: Nicole belongs to a Pueblo community in New Mexico. Her family maintains a blend of modern life in Rio Rancho and traditional Pueblo customs, such as seasonal ceremonies, weaving, pottery, and
    storytelling. She occasionally hears the Tiwa language spoken by elders, participates in community events like powwows and craft workshops, and helps document tribal stories. This heritage has imparted
    a deep respect for the land, a strong sense of collective identity, and a motivation to incorporate Pueblo artistic motifs into her own creative work.
