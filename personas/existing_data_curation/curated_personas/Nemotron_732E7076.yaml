  career_goals: Nicole aims to attend a specialized high‑school program in visual arts or a STEM‑focused academy where she can combine her love for illustration, storytelling, and technology. Her long‑term
    ambition is to become a concept artist for video games or a cultural researcher who documents and revitalizes indigenous artistic traditions. She hopes to earn scholarships that recognize both her artistic
    talent and academic rigor, and eventually to lead collaborative projects that blend contemporary digital media with traditional American Indian art forms.
