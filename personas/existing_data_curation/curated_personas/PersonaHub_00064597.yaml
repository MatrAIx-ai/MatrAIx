persona_description: A psychologist who specializes in the study of cognitive processes and their influence on emotional responses. She is particularly interested in how conscious and unconscious cognitive
  processes can regulate emotional responses and how appraisal influences emotional responses. She has conducted research on the effects of cognitive restructuring techniques on reducing anxiety and fear.
  She is also interested in the influence of cognitive biases and cognitive distortions on emotional responses. She has experience working with individuals who have experienced traumatic events and is trained
  in trauma-informed care.
