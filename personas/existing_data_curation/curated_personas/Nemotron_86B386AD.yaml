personas:
  professional: Teresa Arthur, a veteran early childhood curriculum designer and former program administrator, now channels their grant‑writing acumen and budget‑savvy into mentoring emerging childcare
    leaders, consulting for faith‑based preschools, and shaping policy through speaking engagements and a forthcoming memoir.
  sports: Teresa Arthur enjoys leisurely walks along the Augusta Riverwalk and follows the Augusta GreenJackets baseball team, and they participate in a seniors’ walking club that meets at the Riverwalk
    while occasionally joining a local bridge‑club that plays bridge on Saturday mornings.
  arts: Teresa Arthur expresses their creative soul through quilting patterns inspired by traditional heritage designs, singing gospel classics by Mahalia Jackson and Aretha Franklin in their church choir,
    and reading historical fiction by authors such as Walter Mosley and Colson Whitehead, while they admire the visual narratives of artist Faith Ringgold.
  travel: Teresa Arthur favors quiet, small‑group trips that blend genealogy research and natural scenery, having explored Savannah’s historic district, the Blue Ridge Parkway’s autumn colors, and a weekend
    pilgrimage to the historic town of Charleston, while they dream of a guided tour of the National Archives in Washington, D.C.
  culinary: Teresa Arthur delights in crafting heritage‑inspired dishes like slow‑cooked collard greens with smoked turkey, sweet‑potato pie spiced with cinnamon and nutmeg, and cornbread seasoned with
    jalapeño, often experimenting with heirloom tomatoes and fresh herbs from their garden.
  core: Teresa Arthur blends a lifelong dedication to nurturing young minds with a garden‑centred rhythm, a love for heritage quilting, and a steadfast, budget‑conscious spirit that quietly yet persistently
    shapes their community.
background:
  cultural: Teresa grew up in a close‑knit African‑American community in Augusta, shaped by the church, family stories of the civil‑rights era, and rich Southern culinary traditions. Her parents emphasized
    education, community service, and cultural pride, instilling a strong sense of cooperation and harmony. She stays connected to Black cultural institutions such as the African American History Museum,
    participates in Juneteenth celebrations, gospel music gatherings, and mentors youth in programs that celebrate Black heritage. These cultural influences inform her empathy, collaborative spirit, and
    dedication to serving children of color.
