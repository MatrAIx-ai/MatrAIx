  hobbies: '[''Gardening'', ''Quilting'', ''Reading Historical Fiction'', ''Church Choir'', ''Genealogy Research'', ''Walking in Riverfront Park'', ''Cooking Southern Soul Food'', ''Local History Lectures'',
    ''Birdwatching'']'
  career_goals: In her later years, Teresa aims to shift from daily administration to mentorship and legacy work. She hopes to advise emerging childcare administrators, contribute to policy discussions
    on equitable early learning, help launch a scholarship for local students entering early childhood education, and serve as a consultant for faith‑based childcare programs. She also envisions sharing
    her decades of experience through speaking engagements and a memoir documenting her journey.
