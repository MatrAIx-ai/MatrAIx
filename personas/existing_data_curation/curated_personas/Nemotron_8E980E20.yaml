  career_goals: Jameshenry aspires to merge his love for art and technology, aiming to become a digital illustrator or video‑game concept artist who creates immersive visual stories. He also dreams of studying
    environmental science or science communication so he can design compelling visual campaigns that raise awareness about conservation. His curiosity drives him to explore unconventional creative pathways,
    while his organized side pushes him to build a strong academic foundation and a disciplined creative workflow. Ultimately, he wants a career that lets him innovate, express his artistic vision, and
    make a positive impact on the world.
