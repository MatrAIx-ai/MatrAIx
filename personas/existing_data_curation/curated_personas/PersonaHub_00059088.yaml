persona_description: A physicist at the U.S. Department of Energy's Princeton Plasma Physics Laboratory who specializes in plasma physics and plasma devices. The physicist has conducted research on preventing
  short circuits in plasma devices and has developed a technique using microscopic structures resembling feathers and whiskers to keep these devices operating at peak performance. The physicist has published
  findings in the Journal of Applied Physics and has a provisional patent on the feathered-texture technique. The physicist has worked on plasma thrusters, wall interactions, and wall materials effects
  in plasma devices, and has collaborated with other physicists on experimental findings on secondary electron emission.
