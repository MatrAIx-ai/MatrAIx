personas:
  professional: An aspiring museum curator, Michael Phipps blends a keen visual eye, strong research and essay‑writing skills, and fluency in Photoshop and Illustrator to design boundary‑pushing exhibitions,
    while their spontaneous, structure‑averse nature drives them toward fluid, improvisational project environments.
  sports: A nature‑loving hiker and casual basketball player, Michael Phipps members the East Texas Trailblazers Hiking Club for weekend treks in pine forests, joins pickup games at the Tyler Community
    Center, and cheers for the Dallas Cowboys, Houston Astros, and Texas Rangers on game nights.
  arts: A multidisciplinary creator, Michael Phipps frequents Tyler galleries, sketches the city’s murals, collages mixed‑media pieces inspired by Banksy and Shepard Fairey, captures urban landscapes in
    street photography, and fuels late‑night studio sessions with the sounds of Radiohead, Aphex Twin, and experimental local bands.
  travel: A spontaneous road‑trip enthusiast, Michael Phipps has driven to Austin’s music scene, New Orleans for jazz brunches, and Dallas for museum tours, while dreaming of a future visit to New York’s
    MoMA, Paris’s Louvre, and the vibrant street art of Berlin, preferring flexible itineraries over rigid travel plans.
  culinary: A novice home‑cook with a penchant for Tex‑Mex flavors, Michael Phipps often whips up chicken fried steak, tacos al pastor with chipotle‑lime salsa, and occasional ramen bowls, experimenting
    with smoked paprika, fresh cilantro, and quick‑fire skillet techniques while still relying on local food trucks for culinary inspiration.
  core: Michael Phipps is a curious, spontaneous 18‑year‑old who merges a love of art, philosophy, and outdoor exploration with a tendency to sprint toward new experiences while occasionally stumbling over
    deadlines, budgeting, and organized plans.
background:
  cultural: Raised in a middle‑class family in Tyler, Texas, Michael’s cultural upbringing blends traditional Southern hospitality with a liberal, arts‑focused worldview. He grew up attending community
    events like county fairs and church gatherings while also being exposed to a vibrant local arts community through the Tyler Museum of Art and East Texas cultural festivals. His white Southern background
    informs his appreciation for regional folk art and storytelling, yet his curiosity drives him to seek out diverse artistic perspectives beyond his hometown.
attributes:
  skills: '["Visual analysis", "Critical thinking", "Creative writing", "Digital design (Adobe Photoshop, Illustrator)", "Research methodology", "Improvisational brainstorming", "Basic photography", "Social
