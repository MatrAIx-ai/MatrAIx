  hobbies: '["Visiting art galleries and museums", "Sketching and mixed-media collage", "Writing poetry and short fiction", "Street photography", "Live music concerts", "Hiking East Texas nature trails",
    "Reading speculative philosophy", "Playing narrative-driven video games"]'
  career_goals: Michael aims to build a career that bridges art and storytelling. He hopes to work as a museum curator or arts program coordinator, eventually launching his own independent gallery or digital
    media platform that showcases emerging artists. In the short term, he plans to secure internships with local cultural institutions, develop a robust portfolio, and possibly pursue graduate studies in
    art history or museum studies to deepen his expertise.
