  career_goals: Although retired, Akhenaton remains driven by a desire to give back. He aims to compile a written and audio collection of oral histories from older Black residents of Ascension Parish, preserving
    their stories for future generations. He hopes to publish a memoir that weaves his personal journey with the broader cultural narrative of the region. Akhenaton also plans to volunteer as a docent at
    the nearby parish museum, leading tours that highlight African‑American contributions to local history. Additionally, he wants to mentor high‑school students in entrepreneurship and arts appreciation,
    helping them develop confidence and practical skills. On a personal level, he aspires to stay healthy, reduce his anxiety through mindfulness gardening, and perhaps learn to play the saxophone in his
    church’s jazz band.
