  hobbies: '[''Reading historical non-fiction and classic literature'', ''Journaling personal reflections'', ''Woodworking and tool restoration'', ''Road biking in the Pine Barrens'', ''Hiking in Wharton
    State Forest'', ''Listening to industrial innovation podcasts'', ''Attending local museum lectures'', ''Experimenting with new cooking recipes'']'
  career_goals: George aims to move from first-line supervision to an operations manager position within the next five years, overseeing multiple production lines and driving strategic efficiency initiatives.
    To support this progression, he plans to obtain a Six Sigma Green Belt and a Certified Safety Professional credential, deepening his expertise in quality control and occupational health. He is eager
    to mentor emerging supervisors, fostering a culture of continuous improvement and collaborative problem solving on the shop floor. In the longer term, George envisions establishing a consultancy that
    helps mid-size manufacturers in the Northeast adopt lean practices, allowing him to blend his practical experience with his passion for teaching and writing about best-practice processes.
