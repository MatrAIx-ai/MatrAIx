personas:
  professional: Willie Smith is a veteran carpenter who leverages three decades of framing, custom cabinetry, and dock construction expertise to run a disciplined, code‑compliant shop that values meticulous
    project scheduling, safety, and mentorship of apprentices, reflecting a practical, structured approach to business.
  sports: Willie Smith enjoys seasonal fly‑fishing on the Patuxent River and follows the Washington Nationals, Capitals, and Commanders, while also playing in a local community softball league and cheering
    for the Calvert County youth baseball team each summer.
  arts: Willie Smith expresses creativity through a church gospel choir, humming along to classic blues artists such as B.B. King and modern soul voices like Leon Bridges, while their workshop walls display
    prints of maritime paintings and they relish documentary films on African American history for inspiration.
  travel: Willie Smith prefers well‑planned road trips that balance adventure with budget, having explored the historic streets of Annapolis, the oyster farms of Virginia’s Eastern Shore, and a memorable
    weekend in New Orleans for its music scene, while they dream of a guided pilgrimage to Ghana’s coastal villages.
  culinary: Willie Smith favors cooking Chesapeake Bay crab cakes with Old Bay seasoning, smoking catfish on a backyard grill, and cultivating native herbs such as ramps and sweetgrass, showing a moderate
    cooking skill that delights friends at frequent backyard BBQs.
  core: Willie Smith blends disciplined craftsmanship, a love for quiet river mornings, and a competitive spirit into a life where structure meets community, even if occasional tool‑obsession and a stubborn
    skepticism keep them grounded.
background:
  cultural: Willie is an African American whose family has deep roots in the Chesapeake Bay region, tracing back to generations of artisans and laborers who built homes, docks, and boats along the water.
    Growing up in a close‑knit black community, he was immersed in the values of hard work, mutual support, and perseverance despite the challenges of systemic inequities. His cultural identity is expressed
    through gospel music, church fellowship, and the celebration of traditions like Juneteenth and local storytelling. These influences shape his commitment to mentoring younger black tradespeople, preserving
    craftsmanship as a form of cultural heritage, and contributing to the economic vitality of his community in Lusby, Maryland.
