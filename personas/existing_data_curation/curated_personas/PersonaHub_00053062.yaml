persona_description: A botanist who specializes in the study of cacti, particularly the Saguaro cactus. Their research interests include the biology, physiology, and ecology of the Saguaro cactus, as well
  as its adaptations to the desert environment. They have a keen interest in understanding the unique characteristics and functions of the Saguaro cactus, such as its stem store of water, photosynthesis
  in the top layer, and its large net of roots that collect water after rain and store it in the stem for the plant's survival until the next rain. The botanist is also knowledgeable about the Saguaro cactus's
  fruit, its uses in jam and its woody skeletons, and its habitat, the Sonoran desert.
