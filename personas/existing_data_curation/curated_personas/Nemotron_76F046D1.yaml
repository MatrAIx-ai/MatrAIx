  hobbies: '["Mountain biking", "Live‑music attendance", "Improv comedy", "Tex‑Mex cooking", "Home‑brewing craft beer", "Science‑fiction reading", "Science‑fair judging", "Tabletop role‑playing games"]'
  career_goals: Gary aims to become a department head or STEM program coordinator within his district, leading the development of an interdisciplinary STEM academy that blends engineering, robotics, and
    environmental science. He plans to earn a master's degree in STEM education leadership, publish a high‑school physics textbook focused on real‑world applications, and expand community outreach by establishing
    a weekend makerspace for local youth. Ultimately, he aspires to transition into school administration as a principal, using his organized, achievement‑driven mindset to drive schoolwide academic excellence
    while fostering a collaborative, inclusive culture.
