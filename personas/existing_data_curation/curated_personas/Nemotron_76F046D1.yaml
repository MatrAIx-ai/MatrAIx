personas:
  professional: Gary Howard is a secondary physics, mathematics, and computer science teacher who leverages data‑driven assessment, interactive simulations, and rigorous project‑based curricula to spark
    curiosity while maintaining disciplined classroom order, and they are actively charting a path toward STEM program coordination and eventual school administration.
  sports: Gary Howard is an avid mountain biker who conquers Texas Hill Country trails every weekend with a local riding club, supports the Dallas Cowboys and Austin FC with enthusiastic tailgating at backyard
    barbecues, and they complement their rides with weekly pickup soccer games to keep a balanced fitness regimen.
  arts: Gary Howard immerses themselves in Austin’s vibrant live‑music scene, regularly catching indie folk acts like Sufjan Stevens and blues legends such as Stevie Ray Vaughan, while sharpening quick
    wit on a weekly improv comedy troupe and escaping into speculative worlds by reading Neal Stephenson and Ann Leckie.
  travel: Gary Howard prefers short, well‑planned road trips to nearby Hill Country vineyards and the historic streets of New Mexico, but they also budget for an annual tech‑focused visit to Tokyo and dream
    of a spring adventure in Iceland’s geothermal landscapes, balancing adventure with budget constraints.
  culinary: Gary Howard enjoys crafting Tex‑Mex fusion dishes such as smoked brisket tacos with pineapple salsa and black bean queso, blends homemade habanero hot sauce into their recipes, and they pair
    these meals with a self‑brewed pale ale, showcasing a confident yet experimental home‑cook style.
  core: Gary Howard is a disciplined, community‑driven STEM educator who balances fierce curiosity with practical achievement, fueled by mountain‑bike adrenaline, live‑music energy, and a penchant for meticulously
    budgeting both time and resources.
background:
  cultural: Gary was raised in a suburban Texas family with deep Anglo‑American roots, attending local community and church events that emphasized self‑reliance, hard work, and service. Growing up in central
    Texas, he absorbed a blend of traditional Texan customs—such as backyard barbecues, outdoor recreation, and a respect for personal space—with the progressive, eclectic spirit of Austin’s music, tech,
    and arts scenes. This cultural mix informs his balanced outlook, allowing him to appreciate both established methods and innovative ideas while maintaining a strong sense of community responsibility.
attributes:
  skills: '["Physics instruction", "Mathematics instruction", "Computer Science instruction", "Curriculum development", "Technology integration", "Data-driven assessment", "Project‑based learning facilitation",
