persona_description: A museum education officer who has assembled and trained a team of freelance educators to interpret the history and archaeology of Nottingham Castle for all ages and abilities, providing
  opportunities for children to understand better the processes and methods of history and archaeology through sensory experiences and story-telling. The education officer has used a process of using all
  senses, starting with the senses of touch and sight, to reinforce historical sequence and archaeological principles, and encourages children to think critically and creatively about the history and archaeology
  of the castle. The education officer has also used a process of bringing children's ideas together while they are still fresh, expressing themselves orally, in pictures, and in writing.
