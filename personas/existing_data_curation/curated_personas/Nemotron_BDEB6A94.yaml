  career_goals: Juan aims to attend a university with a strong visual communication or graphic design program, where he can develop a professional portfolio of illustrations, comics, and digital media.
    In the short term, he plans to expand his art skills through local workshops, enter regional art contests, and secure a scholarship that recognizes his bilingual and multicultural perspective. Long‑term,
    he envisions a career as a graphic designer or illustrator who tells culturally resonant stories, possibly working for a design studio or as a freelance visual storyteller. He also hopes to use his
    skills to mentor younger students in his community and, eventually, combine his growing programming knowledge to create interactive media projects.
