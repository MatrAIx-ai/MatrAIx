persona_description: A health professional with expertise in infectious diseases, particularly in the prevention and control of mosquito-borne viruses like West Nile virus. This person is likely to be a
  medical doctor or a public health expert who is involved in monitoring and managing outbreaks of mosquito-borne diseases. They may work for the Centers for Disease Control and Prevention (CDC) or other
  public health agencies, where they are responsible for conducting research, developing and implementing prevention strategies, and coordinating with local and international partners to control outbreaks.
  They may also have experience in epidemiology, virology, or other related fields.
