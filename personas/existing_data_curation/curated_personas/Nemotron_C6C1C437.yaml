    optimization'']'
  hobbies: '[''Cycling on Bay Area trails'', ''Recreational soccer league'', ''Architectural photography'', ''Attending art exhibitions and museum talks'', ''Cooking experimental dishes'', ''Board games
    and escape rooms'', ''Tech meetups on smart building innovations'', ''Weekend hiking trips'', ''Volunteering with Habitat for Humanity'', ''Reading urban planning and design literature'']'
  career_goals: He aims to become a senior director of integrated design in a leading tech driven architecture firm, overseeing large scale sustainable urban projects that blend advanced engineering with
    cultural and artistic narratives. Within the next five years he plans to obtain professional licensure as a registered architect, lead a team that wins national design awards, and launch a mentorship
    program for junior designers. Long term, he envisions founding his own boutique practice focused on climate resilient, culturally responsive architecture while influencing policy for greener building
    standards.
