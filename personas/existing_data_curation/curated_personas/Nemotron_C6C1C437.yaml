personas:
  professional: Todd Hodgkiss, a 36‑year‑old architectural designer with a strong foundation in BIM coordination, LEED‑certified sustainable design, and California code compliance, leverages his humanities
    background to weave cultural narratives into technically rigorous projects while maintaining a fiercely organized, goal‑driven, and competitively skeptical approach as he eyes a senior director role
    and eventual licensure.
  sports: Todd Hodgkiss, an avid road cyclist with the Silicon Valley Cyclists club, competes weekly in the San Jose City Soccer League, joins group hikes with the Sierra Trail Crew in the Santa Cruz Mountains,
    and follows the San Jose Earthquakes and Golden State Warriors, balancing a disciplined training schedule on Strava with a competitive edge that pushes him to improve his personal bests.
  arts: Todd Hodgkiss, a passionate architectural photographer, spends weekends capturing the historic missions and modern skylines of the Bay Area, frequents the San Jose Museum of Art and gallery talks
    at the Tech Museum, draws inspiration from architects like Zaha Hadid and Frank Gehry, and curates playlists featuring Tame Impala and Bonobo for his editing sessions, blending visual and auditory culture
    into his creative process.
  travel: Todd Hodgkiss, a purposeful traveler who plans weekend escapes using sustainable transport options, has trekked Yosemite’s Half Dome, sampled Napa Valley wines, explored Kyoto’s temples during
    cherry blossom season, and admired Gaudí’s Sagrada Família in Barcelona, always balancing professional development conferences with leisure to broaden his design perspective while adhering to a moderate
    travel budget.
  culinary: Todd Hodgkiss, an experimental home cook, enjoys crafting fusion dishes such as Korean BBQ tacos with kimchi slaw, miso‑glazed salmon paired with quinoa and avocado, and Sichuan‑Greek lamb gyro,
    favoring ingredients like jalapeño, cilantro, miso paste, and fresh herbs, and often refines recipes after tasting sessions with friends at board‑game nights.
  core: Todd Hodgkiss, a 36‑year‑old organized architect with a competitive streak, fuses design, sport, and culture into a relentlessly curious, socially vibrant lifestyle, occasionally letting perfectionism
    fuel late‑night coffee binges.
background:
  cultural: Todd grew up in a middle class white family in Santa Clara County, where his father worked as an electrical engineer and his mother taught high school English. Early exposure to both the technical
    world of Silicon Valley and the liberal arts fostered an appreciation for analytic thinking and cultural expression. He earned an undergraduate degree in Art History at UC Berkeley and completed a graduate
    humanities program, deepening his understanding of historical and contemporary cultural narratives. Living in San Jose - a multicultural hub of Asian, Latino, and other communities - has broadened his
    perspective, making him comfortable navigating diverse environments while staying rooted in mainstream American cultural values.
attributes:
