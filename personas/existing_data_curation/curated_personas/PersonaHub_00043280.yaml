persona_description: A health advocate who is interested in the prevention and management of cardiovascular disease, type 2 diabetes, and cancer. They are a strong proponent of a plant-based diet and avoid
  saturated fats. They are also open to evidence-based practices and are skeptical of overly simplistic explanations. They are aware of the limitations of certain studies and are cautious about accepting
  claims without evidence. They are interested in debunking common myths and misconceptions about health and nutrition. They are also interested in the role of lifestyle factors in health and disease and
  are open to alternative explanations for health outcomes.
