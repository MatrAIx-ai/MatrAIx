personas:
  professional: Angela Moore, a seasoned data analyst and project coordinator, leverages advanced statistical modeling, meticulous technical writing, and CAD fluency to steer interdisciplinary engineering
    initiatives while mentoring junior staff and championing STEM pathways for seniors and youth alike.
  sports: Angela Moore follows the Golden State Warriors and the San Francisco Giants, participates in a senior walking club that meets at Redwood Regional Park for weekly hikes, and plays light pickleball
    at the Oakland recreation center, balancing a competitive spirit with low‑impact exercise.
  arts: Angela Moore enjoys intimate jazz nights featuring Diana Krall and the Kyle Eastwood Band at Yoshi’s, collects vinyl records of bebop legends like Charlie Parker, regularly attends San Francisco
    Symphony concerts, and finds inspiration in the paintings of Georgia O’Keeffe.
  travel: Angela Moore prefers meticulously planned trips, having explored Yosemite National Park, the coastal charm of Mendocino, and the historic streets of Florence, Italy, she now dreams of a summer
    pilgrimage to Kyoto, Japan, balancing cultural immersion with familiar itineraries.
  culinary: Angela Moore delights in cooking garden‑fresh roasted beet and quinoa salad with feta, seasonal heirloom tomato gazpacho, a comforting chicken pot pie, and occasionally forgets to set the timer
    when baking her famed cinnamon rolls, always seasoning with garlic, rosemary, and fresh basil.
  core: Angela Moore’s structured mind thrives on spreadsheets, garden rows, and intricate knitting patterns, yet a secret habit of humming jazz standards while solving crossword puzzles late into the night
    reveals a playful side.
background:
  cultural: Angela is a second‑generation African‑American whose family roots trace back to the Deep South, where her grandparents were sharecroppers who later participated in the Great Migration. Growing
    up during the civil‑rights movement, she was shaped by the activism of local Black churches and community organizations. In the 1970s she moved to Oakland, becoming part of the city’s vibrant Black
    cultural scene, which blended music, art, and political engagement. Her identity is informed by a blend of Southern culinary traditions, jazz and gospel music, and a deep respect for self‑reliance and
    collective uplift within the African‑American community. While appreciative of her heritage, her critical and skeptical nature leads her to carefully evaluate institutions and advocate for pragmatic
    solutions in her community.
attributes:
  skills: '["Data analysis", "Statistical modeling", "Technical writing", "Project management", "Budgeting", "Organizational planning", "Problem solving", "Computer literacy (Microsoft Office, Basic Python)",
