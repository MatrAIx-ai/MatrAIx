  hobbies: '["Raised‑bed gardening", "Knitting", "Crossword puzzles", "Reading biographies of African‑American scientists", "Walking in regional parks", "Listening to jazz in small venues", "Volunteering
    for STEM tutoring at senior centers", "Attending small book clubs"]'
  career_goals: She aims to solidify her legacy by mentoring the next generation of Black STEM students in Oakland, contributing occasional consulting expertise to community‑based projects, and authoring
    a memoir that chronicles her experiences during the civil‑rights era, her engineering career, and life in the Bay Area. Maintaining health, independence, and mental vitality through continuous learning
    and participation in small, structured discussion groups also rank high among her personal ambitions.
