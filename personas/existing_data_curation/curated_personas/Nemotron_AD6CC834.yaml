personas:
  professional: Sayoko Dong is an aspiring graphic artist and concept designer who leverages hand‑drawn sketching, free‑software illustration (Krita, Procreate), and analog photography to create visual
    stories that fuse East Asian motifs with contemporary pop aesthetics, while thriving on flexible deadlines and occasionally scrambling to finish projects due to a relaxed, disorganized work style.
  sports: Sayoko Dong enjoys casual skateboarding at the city skate park, attends Ohio State Buckeyes football games in the fall, follows the Columbus Blue Jackets hockey team, and practices yoga at a local
    studio when the mood strikes, favoring low‑pressure, socially‑oriented fitness activities over regimented training.
  arts: Sayoko Dong curates indie playlists featuring Mitski, Clairo, and Japanese band RADWIMPS while drawing inspiration from street muralists like Shepard Fairey, contemporary illustrators such as James Jean,
    and Japanese pop‑art pioneer Takashi Murakami, often spending evenings reading graphic novels by Adrian Tomine and sketching in city parks.
  travel: Sayoko Dong prefers spontaneous weekend trips to nearby artistic hubs—like exploring the galleries of Detroit, the ramen alleys of Seattle, and the cherry‑blossom parks of Washington, D.C.—and
    dreams of a future backpacking adventure through Kyoto, Seoul, and Bangkok, balancing a limited teen budget with a love for culture‑rich urban experiences.
  culinary: Sayoko Dong delights in sampling spicy mapo tofu, bowl‑sized ramen, and buttery croissants, often experimenting at home with matcha‑infused desserts, homemade boba tea, and beginner‑level calligraphy‑styled
    plating, though they sometimes burn toast while multitasking on illustration projects.
  core: Sayoko Dong is a curiosity‑driven teen who channels chaotic creativity into vibrant visual stories, habitually misplaces sketchbooks, trades sleep for coffee‑shop doodling, and navigates life with
    a blend of laid‑back flexibility and occasional last‑minute panic.
background:
  cultural: Sayoko is a second‑generation East Asian American with a mixed Chinese (family name Dong) and Japanese (given name Sayoko) heritage. Her household blends Mandarin and Japanese linguistic elements
    with Midwestern American customs, celebrating Lunar New Year, Obon, and local holidays. Growing up in Columbus, Ohio, she participates in the city’s vibrant Asian community events, while also absorbing
    the region’s emphasis on friendliness, modesty, and a strong work ethic. This bicultural upbringing informs her artistic sensibility, often merging traditional East Asian motifs with modern American
    pop culture.
