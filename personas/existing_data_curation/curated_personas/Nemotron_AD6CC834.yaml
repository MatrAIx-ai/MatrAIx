  career_goals: She aspires to turn her passion for visual storytelling into a career as a graphic artist and concept designer. After obtaining a GED, Sayoko plans to enroll in a community college art program
    or an art‑focused apprenticeship, aiming to build a robust portfolio that blends East Asian cultural motifs with contemporary pop aesthetics. Long‑term, she dreams of working for a design studio or
    launching her own freelance brand that produces illustrations, merchandise, and digital media that celebrate multicultural narratives.
