personas:
  professional: Jason Gilstrap, a veteran office operations manager with three decades of supervisory experience, leverages meticulous workflow analysis and a curiosity for AI-powered scheduling tools to
    drive digital transformation while deploying a competitive, skeptical eye to vet vendors and maintain a balanced blend of structure and flexibility.
  sports: Jason Gilstrap follows the Phoenix Suns with fervor, supports the Arizona Diamondbacks during baseball season, regularly hikes Sonoran‑Trail Club outings, and channels competitive energy into
    community trivia nights, while preferring early‑morning birdwatching sessions over crowded gyms.
  arts: Jason Gilstrap immerses in contemporary Southwestern art at the Phoenix Art Museum, collecting limited‑edition prints by James Turrell and works by contemporary Native American artists, practices
    digital photography inspired by Ansel Adams, and attends intimate poetry readings featuring local voices, all while using Adobe Photoshop to craft personal visual narratives.
  travel: Jason Gilstrap favors meticulously planned weekend getaways to desert gems like Sedona and Monument Valley for sunrise photography, while also dreaming of a spring trip to Kyoto’s historic temples
    to capture seasonal blossoms, balancing a love for solo exploration with occasional group tours that align with their modest budget and limited consulting commitments.
  culinary: Jason Gilstrap enjoys cooking southwestern‑style grilled chicken with cumin, cilantro, and roasted corn, skillfully using a cast‑iron skillet, and occasionally over‑char the meat when caught
    up editing photos, while also indulging in occasional upscale dining at local farm‑to‑table spots to sample dishes like smoked pork belly with chipotle glaze.
  core: Jason Gilstrap blends a meticulous, competitive work ethic with a solitary, curiosity‑driven love for desert photography, art, and hands‑on projects, often juggling budget‑tracking spreadsheets
    alongside spontaneous camera outings, yet sometimes neglects medication in favor of a new woodworking tool.
background:
  cultural: Jason was raised in a middle‑class, predominantly Anglo‑American household in the Phoenix metropolitan area. His family’s roots trace back to the Midwest, instilling values of self‑reliance,
    punctuality, and a strong work ethic. Growing up in Arizona exposed him to the region’s desert culture, including an appreciation for Native American art and the influence of Hispanic cuisine and community
    festivals. While he identifies as white, he has embraced the multicultural tapestry of the Southwest, which informs his curiosity about diverse artistic expressions and his openness to unconventional
    ideas.
