  career_goals: As he approaches retirement, Jason aims to transition from day‑to‑day supervision to a strategic advisory role within the organization, focusing on mentoring emerging supervisors and guiding
    the office through a digital transformation. He aspires to lead a pilot program that integrates AI‑assisted scheduling and document management, thereby improving efficiency for the entire department.
    Outside the company, he hopes to offer part‑time consulting for small non‑profits in Phoenix that need help establishing effective administrative systems. Ultimately, he wants to leave a legacy of a
    more agile, technology‑savvy support environment while also carving out time for his personal interest in community art projects.
