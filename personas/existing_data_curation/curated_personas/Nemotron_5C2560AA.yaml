  career_goals: Julio aims to turn his passion for community art into a sustainable career. In the short term, he plans to earn his GED and build a portfolio that can secure freelance graphic‑design gigs
    for local businesses and cultural events. Long‑term, he envisions opening a collaborative studio in Bell Gardens that offers workshops for youth, curates public‑space murals, and partners with the city’s
    cultural department to launch neighborhood art festivals. He is competitive about gaining recognition as a leading street artist in the Los Angeles area and hopes to eventually secure commissions for
    larger municipal projects.
