personas:
  professional: Julio Deleon is an emerging community muralist and freelance graphic designer in Bell Gardens, leveraging bilingual storytelling, AR experiments, and rapid event coordination to turn abstract
    concepts into vibrant public art while juggling a loosely structured schedule.
  sports: Julio Deleon cheers for the LA Lakers and follows the LA Galaxy’s season, occasionally joins a local pick‑up basketball league at the community center, and runs weekend street‑dance cardio sessions
    that double as informal workouts.
  arts: Julio Deleon immerses themselves in street‑art culture, drawing inspiration from Shepard Fairey’s graphic boldness, the kinetic murals of Os Gêmeos, and the cinematic world‑building of director
    Denis Villeneuve, while also curating community film nights featuring sci‑fi classics.
  travel: Julio Deleon prefers impulsive road trips along the Pacific Coast, especially visiting the vibrant murals of San Diego’s Barrio Logan, the neon alleyways of Tokyo, and the historic plazas of Oaxaca,
    balancing limited budget with a desire for cultural immersion.
  culinary: Julio Deleon enjoys cooking hearty corn‑based stews and smoky chilied sauces, mastering dishes like tamale‑style dumplings and roasted poblano‑filled salsas, while their cooking skill hovers
    between confident home‑chef and experimental flavor‑messenger.
  core: Julio Deleon blends restless creativity with a laid‑back schedule, channeling competitive drive into bold murals, yet often forgets deadlines in favor of a spontaneous dance‑floor improv.
background:
  cultural: Julio grew up in Bell Gardens, a city with a vibrant Mexican‑American community, and his cultural identity is a fusion of traditional Mexican customs and contemporary Chicano street culture.
    He speaks Spanish at home, celebrates Día de los Muertos with family‑centered altars, and participates in local fiestas that feature mariachi music, taco trucks, and community murals. At the same time,
    he is immersed in Los Angeles’ multicultural arts scene, drawing inspiration from the city’s diverse neighborhoods, activist art movements, and the dynamic exchange between heritage and modernity. This
    bicultural perspective informs his artistic voice, his community engagement, and his ambition to bridge cultural traditions with innovative expression.
