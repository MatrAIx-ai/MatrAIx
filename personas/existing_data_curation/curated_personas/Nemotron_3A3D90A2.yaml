personas:
  professional: Secundino Muniz leverages two decades of hands‑on construction cost estimating to produce meticulous line‑item budgets using ProEst, RSMeans, and advanced Excel, blending a methodical, organized
    workflow with a curiosity for innovative value‑engineering while guiding project teams with reliable communication and a competitive drive to become a senior estimator and future cost‑control manager.
  sports: Secundino Muniz dominates pickup basketball games at Arcadia Park, coaches youth baseball for the West Sarasota Little League, and cheers passionately for the Tampa Bay Rays and Tampa Bay Buccaneers,
    channeling a competitive spirit both on the court and in community sports leagues.
  arts: Secundino Muniz dances salsa at the local cultural center to the beats of Marc Anthony and Celia Cruz, enjoys the vibrant murals at the Sarasota Art Museum by regional artists, and hones his DIY
    skills while following home‑renovation shows like This Old House, reflecting a sociable love for rhythm, visual creativity, and hands‑on craftsmanship.
  travel: Secundino Muniz plans meticulous weekend getaways to Gulf Coast fishing spots such as Siesta Key and Fort Myers, enjoys relaxed stays in the Florida Keys, and dreams of exploring Barcelona’s architecture,
    balancing his love for both adventure and relaxation within a budget-conscious travel style.
  culinary: Secundino Muniz prepares traditional island dishes like mofongo with chicharrón and garlic sofrito, arroz con gandules seasoned with annatto, and pasteles wrapped in plantain leaves, showcasing
    solid cooking skills that blend heritage flavors with fresh catches from his morning fishing trips.
  core: Secundino Muniz blends methodical cost expertise with an outgoing, competitive spirit, navigating stress through community activities while juggling a cautious yet occasionally impulsive approach
    to money and health.
background:
  cultural: Secundino is a second‑generation Puerto Rican American whose parents migrated to Florida in the early 1980s. Raised in a bilingual household, he speaks Spanish at home and English at work, absorbing
    the musical traditions of bomba, plena, and salsa. The tight‑knit Puerto Rican community in Sarasota County shapes his values of collective support, family loyalty, and pride in island heritage, even
    though he has never married. He regularly attends a local Catholic parish, participates in cultural festivals like Noche de San Juan, and maintains close ties with relatives in Puerto Rico through weekly
    calls and annual visits. The Caribbean flavors of his cooking, his love for baseball, and his participation in community events reinforce his cultural identity. Living in the historic, slower‑paced
    town of Arcadia, he appreciates its agricultural roots, which resonate with his practical, methodical outlook.
attributes:
  skills: '[''Cost estimating'', ''Quantity takeoff'', ''Budget development'', ''ProEst software'', ''RSMeans data'', ''Advanced Excel modeling'', ''Building code interpretation'', ''Project variance analysis'',
