  hobbies: '[''Salsa dancing'', ''Playing dominoes'', ''Fishing'', ''Pickup basketball'', ''DIY home improvement'', ''Cooking Puerto Rican cuisine'', ''Volunteering as youth baseball coach'', ''Beach walks'',
    ''Watching baseball games'', ''Competitive video gaming'']'
  career_goals: Secundino aims to become a senior cost estimator and eventually lead a cost‑estimating team within a mid‑size construction firm, leveraging his practical experience to guide project financial
    decisions. He plans to earn an AACE International Certified Cost Technician (CCT) credential and pursue the Certified Cost Professional (CCP) designation to solidify his expertise. Over the next five
    years, he envisions transitioning into a cost‑control manager role, integrating sustainable building practices and LEED‑compliant cost strategies into his work. Parallel to his professional growth,
    he intends to obtain a GED and attend continuing‑education courses in construction management to enhance his qualifications and ensure long‑term financial security. He also harbors a long‑term ambition
    to launch his own cost‑consulting boutique, serving small developers in the Tampa Bay area.
