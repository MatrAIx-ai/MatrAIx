personas:
  professional: Ronda Cheung, a 53‑year‑old business operations specialist, channels their methodical process‑analysis and competitive drive into redesigning cross‑functional workflows with spreadsheet
    precision, while they keep a skeptical eye on vendor contracts and pursue a path toward a director‑level role and eventually launching their own consulting firm.
  sports: Ronda Cheung, an enthusiastic member of the Evergreen Cycling Club, attends weekly Zumba and Pilates sessions at Sola Fitness Studio, zealously follows the Seattle Seahawks in football and the
    Seattle Sounders FC in soccer, and they carve out early‑morning jogs with the local senior running group during summer, balancing structured workouts with spontaneous community sports events.
  arts: Ronda Cheung, a vibrant community‑theater actress, showcases classic productions like "The Crucible" with the Riverside Players, leads book‑club debates on works by Chimamanda Ngozi Adichie, and
    they unwind to the soulful crooning of Adele and the smooth piano of Norah Jones, weaving artistic appreciation into their social circles.
  travel: Ronda Cheung, a meticulous planner of weekend road trips, maps out routes through historic Pacific Northwest towns such as Astoria and Port Townsend, schedules museum tours and farm‑stand lunches
    for their husband and adult children, while they leave room for spontaneous detours along scenic coastal highways, ensuring travel remains both affordable and enriching.
  culinary: Ronda Cheung, a confident home chef, designs Mediterranean‑themed dinner parties featuring rosemary‑infused roasted chicken, lemon‑garlic quinoa, and garden‑fresh ratatouille, paired with aged
    balsamic vinegar, artisan cheeses, and a selection of local wines, and they delight guests by weaving stories from their recent theater roles into the dining experience.
  core: Ronda Cheung, a 53‑year‑old operations expert who blends spreadsheet precision with Zumba energy, meticulously plans themed dinner parties and weekend road trips, yet they wrestle with anxiety that
    spikes during unexpected budget overruns or performance setbacks.
background:
  cultural: Ronda comes from a second‑generation European‑American family rooted in the Northeast, with Italian and Irish ancestry. Raised in the suburban communities of Middlesex County, New Jersey, she
    grew up celebrating traditional American holidays such as Thanksgiving and the Fourth of July, while also participating in local cultural festivals that reflect the region’s diversity. Her marriage
    to a partner of Asian heritage has broadened her cultural perspective, introducing her to a blend of culinary traditions and family customs that she embraces alongside her own European roots.
