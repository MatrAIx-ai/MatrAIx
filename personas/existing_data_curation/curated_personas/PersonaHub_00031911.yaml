persona_description: A scientist or environmental engineer who is interested in studying the dynamics of sediment and phosphorus transport in agricultural watersheds, particularly in Wisconsin, USA. They
  are likely to be involved in research or fieldwork to determine the sources of sediment and phosphorus pollution in these systems, and to develop best management practices to reduce the impact of NPS
  pollution. They may also be interested in using radiometric fingerprinting techniques to link the spatial and temporal aspects of sediment and P transport, and to understand the role of sediment resuspension
  in stream channels during the later part of the year.
