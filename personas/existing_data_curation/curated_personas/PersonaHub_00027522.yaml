persona_description: A senior executive at a development bank or international organization, with a particular focus on climate change mitigation and sustainable forest management. This individual is responsible
  for overseeing and implementing large-scale projects that aim to reduce carbon emissions and protect forests, often working with local communities to ensure that the benefits of these projects are shared
  equitably. This persona has extensive experience in conducting thorough risk assessments, developing partnerships with non-governmental organizations and international organizations, and implementing
  voluntary standards and codes of conduct to ensure that investments in forest carbon projects are ethical and sustainable. They are also knowledgeable about the potential risks associated with market-based
  forestry projects, including the threat of unethical operators and the need for local communities to obtain substantive benefits from any proposed projects.
