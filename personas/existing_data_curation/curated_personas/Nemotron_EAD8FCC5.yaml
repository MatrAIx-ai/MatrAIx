personas:
  professional: Jessica Khawly, a meticulous senior‑center program coordinator, applies their lifelong expertise in budgeting, scheduling, and record‑keeping to orchestrate community events with quiet precision,
    while also mentoring younger volunteers and digitizing volunteer rosters using Microsoft Word and Excel.
  sports: Jessica Khawly enjoys low‑impact beach walks with the Sunset Strollers, follows the Miami Heat and Miami Dolphins on TV, occasionally participates in senior water‑aerobics at the community pool,
    and avoids high‑intensity workouts to protect their knees.
  arts: Jessica Khawly finds solace in classic mystery novels by Agatha Christie and historical fiction by Ken Follett, attends local theater productions of classic plays, listens to Vivaldi’s Four Seasons
    while crocheting, and collects prints of Monet’s garden scenes that echo their own tropical flower beds.
  travel: Jessica Khawly prefers carefully planned short trips, such as a weekend cruise to the Bahamas and a road‑trip to Key West with their grandchildren, values restful beach stays over adventurous
    itineraries, and relies on senior‑friendly travel agencies to handle logistics.
  culinary: Jessica Khawly’s culinary repertoire includes grilling fresh mahi‑mahi with mango salsa, simmering black beans with rice for family gatherings, and crafting tropical fruit salads with papaya,
    passion fruit, and a dash of fresh garden basil, reflecting their love for vibrant flavors and home‑cooked comfort.
  core: Jessica Khawly blends disciplined organization with a love for quiet garden mornings, crochet afternoons, and occasional beach walks, yet they sometimes forget to water new seedlings and hoard vintage
    crochet patterns in a cluttered notebook.
background:
  cultural: Jessica grew up in a middle‑class white family in the Midwest before relocating to Miami in the 1970s. While her upbringing reflects traditional American values and a Protestant Christian background,
    decades of living in a multicultural city have given her an appreciation for Cuban and Caribbean food, music, and a modest working knowledge of Spanish greetings. She maintains close ties with a network
    of longtime white retirees while also participating in the diverse cultural festivals that define Miami’s community life.
