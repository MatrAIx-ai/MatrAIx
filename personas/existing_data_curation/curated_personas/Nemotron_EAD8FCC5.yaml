    band music'']'
  career_goals: Even at 82, Jessica’s primary ambition is to remain independent and healthy while deepening her contribution to the Miami senior community. She hopes to mentor younger volunteers, finish
    a handwritten memoir of her family’s history, and become proficient with smartphones and video‑calling so she can stay connected with her grandchildren.
