persona_description: A historian who specializes in the history of Spain and the Mediterranean region, particularly focusing on the historical and political developments during the 13th to 18th centuries.
  His research interests include the rise and fall of the Aragonese-Catalan dynasty, the Spanish state, and the political and social transformations of the Mediterranean world during this period. He is
  particularly knowledgeable about the historical context of the union between Aragon and Castile, the establishment of the Spanish state, and the subsequent political involution of the Principality of
  Catalonia and other Aragonese dominions. He has a deep understanding of the impact of the Spanish War of Succession, the French conquest of Spain, and the subsequent Spanish Constitution on the evolution
  of the Catalan society.
