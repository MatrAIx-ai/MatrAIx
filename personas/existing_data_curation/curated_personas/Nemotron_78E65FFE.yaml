  career_goals: Steven aims to advance to a lead maintenance supervisor role at his current plant, where he can mentor younger technicians and shape maintenance protocols. He plans to earn a journeyman
    certification in HVAC and a safety officer credential to solidify his expertise. Looking ahead to retirement, he hopes to transition into a part‑time consulting business offering handyman services to
    local homeowners, leveraging his reputation for reliability and practical problem‑solving.
