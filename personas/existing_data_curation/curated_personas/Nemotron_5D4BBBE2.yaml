  career_goals: Joshua aims to advance from a first‑line supervisor to a senior project manager within the next five years, eventually overseeing large‑scale commercial or infrastructure projects in the
    Colorado region. He plans to complete his bachelor's degree in construction management and obtain certifications such as PMP and LEED Green Associate. Long‑term, he aspires to launch his own construction
    firm that specializes in eco‑friendly, design‑forward projects, integrating his appreciation for art and innovative architecture into his business model.
