personas:
  professional: Joshua Nicholson, a 26‑year‑old first‑line construction supervisor in the Colorado Rockies, blends a methodical, organized mindset with a competitive edge to expertly interpret blueprints,
    enforce OSHA safety standards, coordinate diverse trades, and fine‑tune project budgets, while constantly scouting eco‑friendly building innovations to prepare for a future senior project manager role.
  sports: Joshua Nicholson fuels a competitive streak on the weekends by playing pickup basketball at Denver’s City Park courts while cheering for the Denver Broncos and Denver Nuggets, climbs at REI’s
    Colorado Rock Gym and hikes the Flatirons, regularly logging altitude gains with Strava and belonging to a local mountaineering club that meets monthly.
  arts: Joshua Nicholson spends Saturday afternoons sketching the stark lines of the Denver Art Museum’s contemporary design wings, captures sunrise over the Rockies in monochrome like Sebastião Salgado,
    and collects prints by Olafur Eliasson, while unselfishly sharing their own urban landscape photography on Instagram and attending live shows by The Lumineers and Tame Impala.
  travel: Joshua Nicholson plans all trips with a spreadsheet, prefers active adventures such as a summer trek in Banff, a spring road‑trip along the Pacific Coast Highway, and an autumn photography safari
    in Kyoto’s Arashiyama bamboo forest, yet keeps a tight budget that postpones a long‑term goal of hiking the Inca Trail to Machu Picchu.
  culinary: Joshua Nicholson, an intermediate home chef, perfects Thai green curry with fresh lemongrass and Thai basil, experiments with Ethiopian injera served alongside spiced lentils, and enjoys crafting
    homemade rosemary‑infused focaccia, often pairing meals with craft Colorado IPAs while occasionally over‑seasoning in a quest for bold flavor.
  core: Joshua Nicholson is a competitively curious construction supervisor who obsessively checks off checklists, scales cliffs on weekends, paints the Rockies in monochrome, saves rigorously for a green‑building
    venture, yet sometimes skates by on missed dental appointments.
background:
  cultural: Joshua comes from a middle‑class, white American background, raised in the Rocky Mountain region where outdoor recreation and self‑reliance are valued. His family emphasizes hard work, community
    involvement, and an appreciation for the natural environment, which aligns with the cultural norms of Colorado’s mountain communities. While his heritage ties him to broader American traditions, his
    upbringing has given him a strong connection to the local outdoor lifestyle and a respect for the region’s artistic and environmental sensibilities.
