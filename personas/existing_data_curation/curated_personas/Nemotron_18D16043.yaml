  hobbies: '[''gardening'', ''quilting'', ''painting'', ''visiting art galleries'', ''historical fiction reading'', ''birdwatching'', ''bridge'', ''volunteering at the library'', ''cooking and baking'',
    ''digital photography'']'
  career_goals: Although retired, Kristen is eager to deepen her impact on the community. She plans to become the volunteer coordinator for the Mount Pleasant senior center, organizing intergenerational
    activities and health workshops. She hopes to author a modest memoir that weaves together local history, family stories, and reflections on art, preserving the cultural memory of Washington County for
    future generations. Kristen also aspires to learn pottery at the nearby community college, adding a new medium to her artistic repertoire, and to take a road‑trip series to major art museums in Chicago,
    Minneapolis, and St. Louis to broaden her appreciation of contemporary and folk art.
