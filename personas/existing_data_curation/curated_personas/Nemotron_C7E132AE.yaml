personas:
  professional: Sharon Dubois, a budding young artist, channels their relentless curiosity and love for the forest into detailed sketches and vivid paintings of leaves, rocks, and fossils, using a relaxed,
    flexible workflow that often leads to spontaneous, imaginative creations while turning Lego building sessions into competitive design challenges.
  sports: Sharon Dubois cheers for the Atlanta Braves and the Georgia Bulldogs, plays on the Candler Kids Soccer Club in the spring, rides their bike and engages in informal tag games during the summer,
    and approaches every race or match with a competitive edge that often turns friendly play into a spirited showdown.
  arts: Sharon Dubois immerses themselves in the vibrant worlds of Beatrix Potter's illustrated tales, the whimsical colors of Mary Blair's Disney concept art, and the soulful strains of Appalachian folk
    musicians like Doc Watson, channeling these influences into their own drawings, Lego sculptures, and occasional recorder melodies at family gatherings.
  travel: Sharon Dubois enjoys spontaneous family road trips to nearby Great Smoky Mountains trails and annual visits to Washington DC's National Mall, while dreaming of exploring the towering redwoods
    of California's Yosemite National Park, balancing their love for nature with the practical limits of a modest family budget and school schedule.
  culinary: Sharon Dubois delights in simple kitchen adventures like making peanut-butter-and-jelly sandwiches, stirring a pot of homemade macaroni and cheese with extra cheddar, and experimenting with
    natural food colors derived from crushed berries and leaf pigments, though they remain picky about trying new vegetables beyond carrot sticks.
  core: Sharon Dubois is a quietly curious 7-year-old who blends a love for nature, art, and friendly competition into a calm, resilient outlook, while navigating life with a relaxed, sometimes disorganized,
    but deeply inquisitive spirit.
background:
  cultural: Sharon comes from a white Appalachian family in Haywood County, North Carolina. Her cultural upbringing emphasizes a close connection to the natural landscape, storytelling traditions, and handcrafted
    folk art such as quilting and wood carving. Family gatherings often involve sharing folk songs and local legends, fostering her appreciation for art and history. The community's values of self‑reliance,
    modesty, and respect for the environment shape her calm resilience and love for solitary, nature‑inspired creativity.
attributes:
  skills: '[''Imaginative storytelling'', ''Drawing and sketching'', ''Basic reading comprehension'', ''Nature observation'', ''Lego building'', ''Tablet drawing apps'']'
  hobbies: '[''Drawing and painting'', ''Exploring woods'', ''Reading picture books'', ''Lego building'', ''Collecting leaves and rocks'', ''Listening to folk music'', ''Playing a recorder'']'
  career_goals: Sharon dreams of a future where she can blend art and discovery. She envisions becoming a muralist who paints the stories of her Appalachian hometown, a wildlife illustrator who sketches
    animals she finds in the woods, or a children's author who tells curious tales. She aims to win school art contests, master new drawing techniques, and eventually travel to explore diverse cultures
    while keeping her love for solitary, focused creation.
