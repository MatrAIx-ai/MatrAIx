persona_description: A policy or practice representative who is interested in contributing to the evaluation of practical interventions and the generation of evidence to inform the delivery of non-NHS interventions
  intended to improve the health of the public and reduce inequalities in health. This person has a background in public health, policy, or practice, and is looking for ways to support the proposed research
  through co-applicant status, advisory or steering group involvement, or the inclusion of a letter or statement of support from a senior policy or practice partner from relevant organizations. This person
  is aware of the remit of the NIHR Public Health Research Programme and its scope, and is interested in the affordability of the intervention and the stakeholder commitment to funding. This person is looking
  for guidance on appropriate research methods and the potential for joint funding with other organizations.
