personas:
  professional: Sheri Fields, a 38‑year‑old cleaning supervisor‑in‑training, leverages fifteen years of deep‑cleaning mastery, meticulous scheduling, and a knack for turning client homes into art‑friendly
    spaces while championing eco‑friendly products and mentoring new staff, and they bring a chatty, community‑centered energy to every client interaction.
  sports: Sheri Fields stays active by joining the local pickleball league at the Magnolia community center, cheering on the Houston Astros and Rockets on weekends, hitting the trails with the Southwest
    Texas Running Club for a weekly 5‑kilometer jog to balance the physical demands of their cleaning work, and they view each game as a chance to socialize and unwind.
  arts: Sheri Fields channels their curiosity for art history into weekly trips to the Houston Museum of Fine Arts, where they study works by Georgia O'Keeffe and Andy Warhol, craft mixed‑media collages
    inspired by the Texas landscape, and they unwind to the folk‑country sounds of Willie Nelson and Emmylou Harris while sketching in a sunlit corner of the local library.
  travel: Sheri Fields prefers well‑planned road trips that blend cultural stopovers—like the music scene of Austin, the historic French Quarter of New Orleans, and the art galleries of Santa Fe—while dreaming
    of leisurely days strolling through Savannah’s oak‑lined streets and a future culinary tour of Provence’s lavender fields, and they always pack a portable speaker for a soundtrack of country classics.
  culinary: Sheri Fields whips up Southern comforts such as smoked brisket with a homemade barbecue rub, shrimp and grits seasoned with garden‑fresh thyme and rosemary, and a buttery pecan pie showcasing
    locally sourced pecans, while they experiment with occasional Cajun twists like a gumbo‑inspired collard green stew and share their dishes at community potlucks.
  core: Sheri Fields blends meticulous cleaning expertise with a zest for art, community, and eco‑friendly living, often humming country tunes while polishing floors and secretly hoarding vintage postcards
    from every fair they attend, making them the friendly whirlwind of their Magnolia neighborhood.
background:
  cultural: Sheri grew up in a working-class, white family in the outskirts of Waller County, Texas. Her upbringing was shaped by the values of Southern hospitality, community cooperation, and a strong
    work ethic. She attended a local public high school and later took college courses while working, which gave her a practical, hands-on education. The region’s blend of rural traditions and proximity
    to Houston’s cultural scene exposed her to a mix of country music, regional festivals such as the Magnolia Fair, and diverse culinary influences. Sheri is active in her church community, where she finds
    social connection and opportunities to serve, reflecting her cooperative and kind disposition.
