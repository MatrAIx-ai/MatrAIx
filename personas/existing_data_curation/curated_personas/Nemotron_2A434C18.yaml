  hobbies: '[''Visiting art galleries'', ''Attending community art fairs'', ''Mixed-media collage making'', ''Reading art history and design books'', ''Dancing at local socials'', ''Gardening'', ''Southern
    cooking'', ''Book club participation'', ''Volunteering at community center'', ''Leading cleaning workshops'']'
  career_goals: Sheri aims to move into a supervisory role within her cleaning company, eventually becoming the manager of the Magnolia branch. She plans to earn a certification in facilities management
    and to incorporate eco-friendly practices across all client sites. Long-term, she dreams of launching her own boutique cleaning service that emphasizes personalized client experiences and supports local
    artists by curating artwork in client homes. She also hopes to secure a stable financial future that would allow her to purchase a home and support her community through volunteer cleaning projects.
