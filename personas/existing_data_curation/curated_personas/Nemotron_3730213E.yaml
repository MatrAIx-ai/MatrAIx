personas:
  professional: Aracelia Falcon is a mid‑career visual designer who translates client briefs into cohesive brand identities by marrying meticulous color theory and typography with folk‑inspired motifs,
    wielding Adobe Creative Cloud and Figma with a collaborative, detail‑oriented yet flexible workflow that reflects their preference for structure balanced by a relaxed approach to deadlines.
  sports: Aracelia Falcon habitually explores the Sierra Nevada foothills with the Fresno Trail Runners club, occasionally joins a community 5 K charity run, and follows the Fresno State Bulldogs football
    and Los Angeles Dodgers baseball teams for seasonal excitement.
  arts: Aracelia Falcon immerses themselves in artistic culture by restoring vintage mid‑century furniture, curating booths at local art fairs, and drawing inspiration from Frida Kahlo’s vivid storytelling,
    Diego Rivera’s muralist legacy, and Carlos Santana’s rhythmic guitar work, all of which shape their design aesthetic.
  travel: Aracelia Falcon prefers a blend of meticulously planned weekend getaways to nearby wine country in Napa Valley and spontaneous cultural pilgrimages to Oaxaca’s historic markets, and they balance
    a modest travel budget with a love for vibrant festivals and the occasional road‑trip along Pacific Coast Highway.
  culinary: Aracelia Falcon delights in crafting homemade mole poblano, slow‑cooked tamales, and refreshing horchata‑style aguas frescas using heirloom tomatoes, fire‑roasted chiles de árbol, and fresh
    cilantro from their garden, while their medium‑skill kitchen prowess shines during community potlucks where they proudly showcase family recipes.
  core: Aracelia Falcon navigates life with a structured eye for detail tempered by a delightfully messy love of vintage finds, spontaneous garden experiments, and community‑centered storytelling, and they
    fuel it with a steady stream of coffee while habitually misplacing their keys.
background:
  cultural: Aracelia is a first-generation Mexican-American, raised in a bilingual household in the Central Valley. Her parents emigrated from Jalisco, bringing with them a rich tapestry of cultural traditions,
    language, and culinary practices. She celebrates Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often integrating these themes into her design work. Her cultural
    identity influences her aesthetic sensibility, favoring vibrant color palettes, folkloric patterns, and storytelling through visual media. Active in the local Mexican community, she mentors youth through
    art programs and contributes to cultural events that preserve and share her heritage with a broader audience.
