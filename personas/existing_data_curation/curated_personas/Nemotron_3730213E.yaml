  hobbies: '[''Traditional Mexican Cooking'', ''Gardening'', ''Hiking'', ''Yoga'', ''Local Art Fairs'', ''Volunteering at Día de los Muertos Events'', ''Vintage Furniture Restoration'']'
  career_goals: Aracelia aims to advance from her current design role to a senior designer position within the next three years, focusing on projects that celebrate and amplify Mexican-American culture
    in the Central Valley. She aspires to lead a multidisciplinary design team, championing inclusive branding initiatives for local businesses and community organizations. In the longer term, she envisions
    launching her own boutique studio that offers culturally attuned design services while mentoring emerging designers from underrepresented backgrounds. She also plans to deepen her skill set in motion
    graphics and sustainable design practices to broaden her creative impact.
