personas:
  professional: Mark Wilson is a retired civil‑engineer and flood‑mitigation specialist who now mentors students, teaches part‑time, and applies their methodical, curiosity‑driven approach to community
    resilience projects while still hand‑crafting furniture and restoring their 1965 Chevrolet Impala.
  sports: Mark Wilson supports the New Orleans Saints and the Pelicans, rows with the Bayou St. John Fishing Club each spring, and maintains fitness through daily walks along the lake trail, though they
    admit to skipping the occasional gym session when a restoration project demands their attention.
  arts: Mark Wilson immerses themselves in jazz, zydeco, and blues, regularly attending the New Orleans Jazz & Heritage Festival and listening to legends like Louis Armstrong, Wynton Marsalis, and Clifton
    Chenier, while also singing in their parish choir and reading historic biographies.
  travel: Mark Wilson prefers thoughtfully planned road trips that blend relaxation with discovery, having explored historic Charleston, Savannah, and the Texas Gulf Coast, and they dream of a guided pilgrimage
    to Acadia National Park and the Bayeux Tapestry Museum next summer.
  culinary: Mark Wilson’s kitchen is a fusion of garden‑fresh tomatoes, okra, and southern herbs, where they perfect gumbo, jambalaya, and beignets, often experimenting with filé powder and smoked andouille
    while occasionally treating themselves to a po’ boy from a beloved local deli.
  core: Mark Wilson combines an engineer’s precision with a love for jazz, fishing, and community service, balancing their disciplined budgeting and health routines with a slightly forgetful propensity
    to over‑commit to restoration projects.
background:
  cultural: Mark grew up in Metairie, a suburb of New Orleans, where the rhythm of Southern hospitality intertwines with the vibrant French-Creole heritage of the Gulf Coast. Raised in a Catholic household,
    he celebrated traditional holidays and was immersed in the music, cuisine, and community festivals that define the region, from jazz on Frenchmen Street to Mardi Gras parades. His family's lineage includes
    both Anglo-American and French-Acadian (Cajun) ancestors, giving him a personal connection to the area's blend of cultures. The frequent threat of flooding shaped his worldview and career, fostering
    a practical, solution-oriented mindset. This cultural mosaic informs his values of community service, respect for tradition, and a pragmatic curiosity about new ideas.
attributes:
  skills: '[''Structural analysis'', ''Hydrologic modeling'', ''Project management'', ''Technical documentation'', ''CAD (AutoCAD, Revit)'', ''Data analysis (MATLAB, R, Python)'', ''Statistical modeling'',
