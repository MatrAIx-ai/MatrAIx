  hobbies: '[''Fishing'', ''Gardening'', ''Cajun/Creole cooking'', ''Mardi Gras and jazz festivals'', ''Reading (history, engineering)'', ''Chess'', ''Woodworking'', ''Classic car restoration'', ''Genealogy'',
    ''Habitat for Humanity volunteering'', ''Church choir'']'
  career_goals: In retirement, Mark aims to remain intellectually active by mentoring engineering students through local STEM outreach programs and serving on advisory boards for Gulf Coast flood-resilience
    initiatives. He plans to complete a memoir that chronicles the evolution of civil-engineering practice in Jefferson Parish and to publish a guide on practical flood-control design for community groups.
    Mark also wishes to deepen his understanding of renewable-energy technologies, especially solar and wind, so he can advise his church and neighborhood association on sustainable projects. He is committed
    to preserving the cultural heritage of Metairie by supporting Mardi Gras historical societies, documenting oral histories, and volunteering with Habitat for Humanity on affordable-housing projects.
    Maintaining his health through regular fishing trips, walking, and chess is also a personal priority.
