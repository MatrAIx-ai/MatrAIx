  career_goals: Terrence aspires to become a lead engineer or principal architect at a forward‑thinking tech company where creativity and technology intersect. He envisions launching a startup that builds
    AI‑driven creative tools for artists and designers, and he hopes to open‑source a library for generative visual experiences. Pursuing a master’s degree in Human‑Computer Interaction or Computer Graphics
    is part of his plan to deepen his design expertise. He aims to mentor junior developers, speak at conferences like SIGGRAPH and IndieCade, and shape product strategy that balances innovative freedom
    with reliable delivery, all while cultivating a healthier work‑life balance to manage his stress sensitivity.
