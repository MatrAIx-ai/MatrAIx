persona_description: A music therapist who specializes in using music to support individuals with dementia or recovering from a stroke. She has experience working with active music therapy, receptive music
  therapy, and kinesthetic learning. She enjoys teaching individuals to play musical instruments and singing, and has a passion for helping seniors improve their walking speed and stride through rhythmic
  exercises. She is also skilled in freehand drawing while listening to music and meditating while listening to music. She has a unique ability to connect with individuals through music and uses it to enhance
  their mental and physical health.
