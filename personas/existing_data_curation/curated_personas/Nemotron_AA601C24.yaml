personas:
  professional: Zannatul Mehar is a seasoned IT support specialist who blends a business degree with deep technical troubleshooting across Windows, macOS, and Linux, using their love of structure and competitive
    drive to streamline ticketing workflows, exceed service‑level agreements, and mentor a growing team of technicians.
  sports: Zannatul Mehar captains a co‑ed softball team in the Milwaukee league, leads a weekly Zumba class at the community center, and hikes with the Kettle Moraine Trail Club on weekends, cheering on
    the Milwaukee Brewers and Green Bay Packers while keeping a competitive edge in every game.
  arts: Zannatul Mehar unwinds by devouring mystery novels from Gillian Flynn and Stephen King, strategizing over Settlers of Catan nights with friends, and attending local theater productions of contemporary
    playwrights, all while curating a playlist that alternates between Lizzo’s high‑energy hits and classic film scores.
  travel: Zannatul Mehar plans vacations with meticulous itineraries, favoring a blend of outdoor adventure and cultural immersion such as weekend hikes in Door County, a spring road‑trip to Banff’s alpine
    trails, and occasional overseas escapes to Kyoto’s temples, all balanced against family and work obligations.
  culinary: Zannatul Mehar prides themselves on cooking aromatic dishes like spiced lentil dal, saffron‑infused biryani, and grilled paneer with mango chutney for potluck picnics, showcasing a solid intermediate
    skill set that blends bold cumin, coriander, and fresh cilantro, though they sometimes over‑spice in their quest for the perfect flavor.
  core: Zannatul Mehar is a high‑energy, structure‑loving tech pro who combats a chronic worry habit with relentless cardio Zumba, board‑game battles, and a meticulously budgeted life that still leaves
    room for impulsive sneaker splurges.
background:
  cultural: Zannatul’s family emigrated from Bangladesh in the early 1990s, and she grew up in a bilingual household speaking Bengali and English. Her cultural upbringing emphasizes education, family cohesion,
    and community service, with regular observance of Eid al‑Fitr, Eid al‑Adha, and Pohela Boishakh. She maintains ties to the local Bangladeshi‑American association in Milwaukee, where she helps organize
    cultural festivals and language classes. While fully integrated into Midwestern life in Plymouth, Wisconsin—participating in local volunteer groups, community events, and neighborhood activities—her
    South Asian roots shape her values of hospitality, resilience, and respect for tradition.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Operating system support (Windows, macOS, Linux)'', ''Remote desktop assistance'', ''Ticketing system management (e.g., ServiceNow)'', ''Customer service
    and communication'', ''Business process analysis'', ''Standard operating procedure (SOP) development'', ''Project coordination and scheduling'', ''Data analysis using Excel and Power Query'', ''Training
    and onboarding of technical staff'', ''Time management and prioritization'', ''Conflict resolution and de‑escalation'', ''ITIL v4 Foundation knowledge'']'
  hobbies: '[''Co‑ed softball league'', ''Weekly Zumba fitness class'', ''Hiking in Kettle Moraine State Forest'', ''Cooking and sharing South Asian cuisine'', ''Board games (Settlers of Catan, Pandemic)'',
    ''Tech podcasts (e.g., Darknet Diaries, Clockwise)'', ''Reading mystery and thriller novels'', ''Volunteer basic computer skills workshops'']'
  career_goals: In the next two to three years, Zannatul aims to earn the ITIL v4 Foundation and CompTIA Network+ certifications, transition into a Service Delivery Manager role, and lead a small team of
    support technicians. She wants to design a knowledge‑base system that reduces repeat tickets and improves response times. Over the longer term, she envisions becoming an IT Operations Director for a
    mid‑size firm or launching her own consultancy that blends technical support with business process optimization for small businesses in the Upper Midwest. She also hopes to mentor junior staff, champion
    workplace wellness programs to mitigate stress, and eventually contribute to community tech‑education initiatives.
