  hobbies: '[''Reading contemporary fiction'', ''Coastal beach walks'', ''Gardening (vegetables and native flowers)'', ''DIY home décor projects'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Cooking
    and baking'', ''Volunteering at local food bank'', ''Listening to personal development podcasts'']'
  career_goals: Helen aspires to transition from a sales associate role to a supervisory or store‑manager position within the next few years. She wishes to develop stronger organizational and leadership
    skills, perhaps through a short‑term management certification or on‑the‑job mentorship, to better handle deadlines and team scheduling. Long‑term, she dreams of opening her own boutique that blends
    curated local products with a welcoming community space, allowing her to blend her curiosity for new ideas with her practical retail experience. She also hopes to incorporate training modules that emphasize
    employee well‑being, reflecting her own sensitivity to stress and desire for a harmonious workplace.
