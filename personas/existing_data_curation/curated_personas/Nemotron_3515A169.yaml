  career_goals: Ruben aims to advance to a senior director of operations role within the next five years, overseeing multiple manufacturing sites and driving enterprise‑wide efficiency initiatives. He plans
    to attain a Six Sigma Black Belt and the APICS Certified Production and Inventory Management (CPIM) certification to deepen his expertise. A key ambition is to spearhead the plant’s transition to advanced
    automation and sustainable manufacturing practices, cutting waste by 30% and reducing the carbon footprint. He also envisions launching a community art program that integrates creative workshops for
    employees, blending his passion for art with employee engagement. Ultimately, he seeks to balance high performance with a healthier work‑life rhythm, developing stress‑management practices for himself
    and his team.
