  hobbies: '[''Sketching and drawing'', ''Digital illustration with Procreate'', ''Photography of urban murals and nature'', ''Reading science‑fiction and fantasy novels'', ''Writing short stories'', ''Learning
    Python through online tutorials'', ''Playing acoustic guitar'', ''Listening to traditional Mexican music'', ''Cooking traditional Mexican dishes with family'', ''Participating in school science fairs'',
    ''Creating murals for community events'']'
  career_goals: Wilfredo aspires to merge his love of art, technology, and his cultural roots into a career that builds inclusive, aesthetically meaningful spaces. In the short term, he plans to join his
    middle‑school art club, enter the regional science fair with a project that mixes coding and design, and attend a summer workshop on architectural drawing. He hopes to earn a scholarship to a magnet
    high school focused on STEM and visual arts, where he can deepen his skills in graphic design and computer‑aided drafting. Long‑term, he envisions studying architecture or industrial design at a university,
    eventually working as an architect who integrates sustainable design with Mexican artistic motifs, or as a graphic designer creating visual campaigns that celebrate and preserve Mexican‑American heritage.
