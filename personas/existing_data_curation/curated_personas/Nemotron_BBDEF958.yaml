personas:
  professional: Wilfredo Sam, a budding digital illustrator and junior interactive artist, blends hand‑drawn sketches, Python‑driven animations, and storytelling into small comics, leveraging their curious
    mind and methodical planning to meet each creative deadline.
  sports: Wilfredo Sam, a member of the Pflugerville Youth Soccer League and a fan of the Austin FC, enjoys weekly practices, prefers the midfield position for its balance of strategy and movement, and
    follows the Dallas Mavericks for basketball inspiration.
  arts: Wilfredo Sam, an avid sketcher inspired by muralists like Diego Rivera and contemporary illustrators such as Rebecca Sugar, devotes evenings to acoustic guitar renditions of folk classics and pop
    hits, while curating a personal playlist featuring artists like Juan Gabriel, Yo‑Yo Ma, and the indie band Bad Bunny.
  travel: Wilfredo Sam, who loves family road trips to the Texas Hill Country and weekend visits to Austin’s street art districts, dreams of exploring the historic plazas of San Antonio and the desert landscapes
    of New Mexico, preferring well‑planned itineraries that balance cultural immersion with quiet sketching sessions.
  culinary: Wilfredo Sam, an enthusiastic kitchen helper, can roll tamales from scratch, zest lime for fresh guacamole, and experiment with adding roasted pumpkin to classic enchilada sauce, though they
    often over‑salt the dishes in excitement.
  core: Wilfredo Sam, a curious and organized teen artist, balances quiet creative work with meticulous budgeting, health routines, and family‑centric adventures, all while nurturing a modest knack for
    over‑seasoning meals.
background:
  cultural: 'Wilfredo is a first‑generation Mexican‑American raised in Pflugerville, Texas. His household blends Mexican traditions with Texan influences: Spanish is spoken at home, Catholic holidays are
    observed, and family gatherings revolve around foods like tacos, tamales, and horchata. He takes pride in his heritage, celebrating Día de los Muertos with handmade altars and learning about Mexican
    muralists such as Diego Rivera and José Clemente Orozco. The local Mexican community provides cultural festivals, dance groups, and language classes, which have shaped his values of family solidarity,
    respect for elders, and communal harmony. This bicultural upbringing informs his artistic sensibility and his desire to honor Mexican culture in his future work.'
