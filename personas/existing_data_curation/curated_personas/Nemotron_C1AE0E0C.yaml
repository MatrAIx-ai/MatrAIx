  career_goals: She plans to pursue a bachelor's degree in computer science or information systems with a focus on product management, aiming to blend her technical aptitude with her love for teamwork and
    organized processes. Ultimately, Sun hopes to work for a technology company that creates tools for mental‑health support, leveraging her personal experience with stress and anxiety to design user‑friendly,
    evidence‑based solutions for young adults. She also envisions leading community‑tech workshops that empower other students from underrepresented backgrounds to develop digital skills.
