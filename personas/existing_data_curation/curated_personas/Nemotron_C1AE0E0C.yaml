personas:
  professional: Sun Jang, a high‑school senior aiming for a career in product management, leverages their strong time‑management, project coordination, and bilingual communication skills to lead school
    robotics projects and student council initiatives, thriving in structured team settings while staying mindful of their own stress levels.
  sports: Sun Jang plays forward on Riverside High School’s co‑ed soccer team, trains with the City Youth Soccer Club during the fall, follows the Los Angeles Galaxy in the MLS and the Korean national team
    for inspiration, and balances weekly workouts with a preference for structured, team‑oriented training sessions.
  arts: Sun Jang expresses creativity through manga‑style illustration, draws inspiration from artists like Akira Toriyama and Naoko Takeuchi, enjoys K‑Pop performances by BTS and Blackpink, and spends
    free time binge‑watching dramas starring Lee Min‑ho and reading contemporary fiction by Sally Rooney.
  travel: Sun Jang prefers well‑planned trips, having saved for weekend getaways to Seoul and Tokyo, dreaming of a summer road‑trip along the Pacific Coast to explore national parks while balancing school
    responsibilities and a modest travel budget.
  culinary: Sun Jang enjoys experimenting in the kitchen with homemade bibimbap, kimchi stew, and japchae, mastering the perfect balance of gochujang, sesame oil, and roasted sesame seeds, and often treats
    friends to Korean street‑food‑style tteokbokki and hotteok during study sessions.
  core: Sun Jang is a meticulously organized 18‑year‑old who channels social energy into soccer, K‑Pop dance, and coding mentorship, while battling chronic anxiety that fuels both their drive for structure
    and occasional over‑planning.
background:
  cultural: Sun Jang is a second‑generation Korean‑American raised in San Jose’s vibrant multicultural community. Her family places high value on education, respect for elders, and maintaining cultural
    traditions, which she experiences through Korean holidays such as Seollal and Chuseok, home‑cooked meals like kimchi jjigae, and weekly Korean language practice with her grandparents. Growing up in
    a city with a strong tech industry and a sizable Asian diaspora, she has blended her heritage with American teenage culture, adopting both the disciplined work ethic common in many East Asian families
    and the collaborative, socially‑connected lifestyle of her peers.
