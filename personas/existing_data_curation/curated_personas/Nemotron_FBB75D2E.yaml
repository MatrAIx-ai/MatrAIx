  career_goals: Maria aims to attain professional engineer (PE) licensure and advance to a senior principal engineer role within her firm, where she can lead large-scale infrastructure projects such as
    river bridges and highway upgrades. She is driven to be recognized for delivering cost-effective, reliable designs that meet stringent safety standards. Over the next five years, she plans to spearhead
    a flagship bridge rehabilitation project in Louisville, publish a technical paper on durability-focused design, and mentor junior engineers through one-on-one technical coaching rather than large group
    settings. Ultimately, she seeks a stable, high-impact position that leverages her practical expertise while preserving her preference for solitary, focused work.
