persona_description: A healthcare professional who is committed to improving the quality of care provided to patients and clients from diverse cultural backgrounds. This individual is dedicated to learning
  about their own cultural orientation and its impact on interactions with patients and clients. They are skilled in conducting comprehensive medical histories that include health literacy, social, economic,
  and cultural identity factors. They are also experienced in negotiating care management and treatment plans that take into consideration the different individual, family, and community-level variables
  that affect the patient/client's life and health experiences. Additionally, they are skilled in implementing clinical, programmatic, and policy strategies that effectively reduce disparities in healthcare
  among population groups.
