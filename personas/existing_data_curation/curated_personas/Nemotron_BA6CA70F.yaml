personas:
  professional: Denise Jones, a retired community volunteer, now spearheads Starke's neighborhood garden program, mentors senior center volunteers, and archives oral histories for the local historical society,
    applying her practical curiosity and flexible, kindness‑driven approach to organize events despite occasional disorganization.
  sports: Denise Jones enjoys gentle morning walks on the nearby Gainesville Trail, participates in the Starke Senior Fitness Club, cheers for the Jacksonville Jaguars and the Florida Gators, and occasionally
    helps out at local community softball games, reflecting her love of low‑key activity and community spirit.
  arts: Denise Jones expresses creativity through quilting while listening to Dolly Parton and Elvis Presley, contributes backstage at the Starke community theater, sings in the church choir, and delights
    in classic films starring Meryl Streep and Gregory Peck, allowing artistic appreciation to weave into her daily life.
  travel: Denise Jones prefers relaxed road trips with her husband, favoring historic Southern towns such as Savannah, Charleston, and St. Augustine, while dreaming of a genealogy‑focused pilgrimage to
    Dublin, Ireland, balancing modest budgets with a curiosity for history.
  culinary: Denise Jones blends Southern comfort cooking with garden harvests, crafting dishes like tomato‑blueberry BBQ sauce, magnolia‑infused peach cobbler, and shrimp étouffée, confidently using fresh
    basil, thyme, and rosemary, and enjoys sharing these meals at church potlucks.
  core: Denise Jones is a garden‑loving, history‑obsessed retiree who quilts, sings, and curiously fuses tradition with new ideas, though she often misplaces her glasses and forgets to file her bills on
    time.
background:
  cultural: Denise comes from a white Southern background, with roots in the traditional values of the American Southeast. Her upbringing emphasized hospitality, community service, and a strong connection
    to family and church. Growing up in a small-town environment, she internalized a respect for local traditions while maintaining a curious openness to new ideas, which she expresses through her interest
    in gardening innovations and historical research. Living in Starke, Florida, she blends classic Southern customs—such as sharing home-cooked meals and participating in church events—with the region’s
    unique cultural mix, including an appreciation for the state’s natural landscape and its growing retirement-friendly community.
