  career_goals: Although officially retired, Denise’s ambition is to remain a vibrant contributor to her community in Starke. She hopes to lead the town’s neighborhood garden program, mentor younger volunteers
    at the local senior center, and document the oral histories of longtime residents for the Clay County historical society. A personal goal is to compile a family recipe book that blends traditional Southern
    dishes with the fresh produce from her garden, and to travel modestly with her husband to visit historic sites in the Southeast. She also aspires to expand her genealogy research, helping relatives
    trace their ancestry.
