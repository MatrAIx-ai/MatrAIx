personas:
  professional: Shepherd King blends two decades of stage experience with a graduate STEM background, assertively steering creative teams while also listening to collaborators, directing productions that
    weave scientific concepts into narratives and acting in TV roles to secure steady income, using their analytical eye for script analysis and technical prowess in lighting and sound design to craft immersive
    performances.
  sports: Shepherd King follows the Rochester Red Wings baseball team in spring, roots for the Buffalo Bills during fall football, plays weekly pick‑up basketball at a local gym, and hikes the Finger Lakes
    trails as a member of the Finger Lakes Trail Conservancy, balancing competitive spirit with a low‑key commitment to personal fitness.
  arts: Shepherd King immerses themselves in community theater projects that spotlight underrepresented voices, draws inspiration from playwright August Wilson and director Lin‑Manuel Miranda, and finds
    solace in the improvisational jazz of John Coltrane and the soulful vocals of Nina Simone while regularly attending the Rochester Fringe Festival and reading science‑fiction classics like 'Dune'.
  travel: Shepherd King prefers planned road trips that interlace cultural festivals and natural scenery, having explored the Adirondack Mountains, spent a weekend in New Orleans for its music heritage,
    and visited London annually for West End shows, while dreaming of an immersive experience in Iceland’s geothermal pools and northern lights.
  culinary: Shepherd King enjoys crafting contemporary twists on soul‑food staples, such as collard greens simmered with smoked turkey and chipotle‑maple glaze, sweet potato mash infused with miso, and
    black‑eye pea salads tossed with quinoa and fresh cilantro, often experimenting with sous‑vide techniques and seasonal ingredients like local maple syrup.
  core: Shepherd King is a methodical actor‑director who fuses tech and storytelling, balances creative ambition with prudent financial habits, and counters chronic worry with yoga, jazz, and a dash of
    vintage audio tinkering.
background:
  cultural: Shepherd was raised in an African‑American family in the Rochester metropolitan area, where community storytelling and cultural celebrations were central to his upbringing. His parents emphasized
    education and perseverance, encouraging his pursuit of a STEM degree while supporting his passion for the performing arts. He draws on the rich oral and musical traditions of Black culture, infusing
    rhythm, emotional depth, and social consciousness into his acting. Shepherd participates in local Black cultural events such as Juneteenth celebrations, African drumming circles, and community theater
    projects that amplify underrepresented voices. This heritage fuels his commitment to mentorship and to creating works that reflect the intersection of Black identity and contemporary societal issues.
attributes:
  skills: '[''Acting (Method & Classical)'', ''Script Analysis'', ''Improvisation'', ''Vocal Technique'', ''Physical Movement'', ''Stagecraft'', ''Lighting Design'', ''Sound Engineering'', ''Digital Media
    Management'', ''Problem Solving'', ''Data Analysis'', ''Project Management'', ''Acting Coaching'', ''Directing'']'
  hobbies: '[''Robotics building'', ''Vintage audio equipment restoration'', ''Science‑fiction reading'', ''African American literature'', ''Chess'', ''Yoga'', ''Mindfulness meditation'', ''Cooking (soul
    food with modern twists)'', ''Hiking in Finger Lakes'', ''STEM mentorship'', ''Theater production volunteering'']'
  career_goals: Shepherd aims to broaden his creative impact by directing a series of productions that fuse scientific concepts with African‑American narratives, while also securing recurring character
    roles on television to ensure financial stability. He plans to launch a mentorship program for emerging Black actors that incorporates both performance and technical theater skills, and to partner with
    local universities for interdisciplinary workshops that bridge STEM and the arts. Long‑term, he hopes to produce an independent sci‑fi film that explores identity and resilience, leveraging his technical
    background to manage low‑budget production. Balancing his curiosity for new ideas with a practical need for steady income, he also intends to teach acting classes part‑time and become a recognized versatile
    actor within the regional and national theater communities.
