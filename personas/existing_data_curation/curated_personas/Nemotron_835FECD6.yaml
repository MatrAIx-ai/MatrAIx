  hobbies: '[''Basketball (recreational league)'', ''Volunteering at food bank'', ''Community event planning'', ''Fishing'', ''Hiking'', ''Watching Buffalo Bills football'', ''Tailgating'', ''Reading personal
    finance'', ''Grilling and cooking'', ''Participating in Toastmasters'']'
  career_goals: Lamont aims to become a senior sales manager within his agency, eventually overseeing a regional team of agents in western New York. He plans to earn the Chartered Property Casualty Underwriter
    (CPCU) designation and obtain his life/health insurance license to broaden his product offerings. In the longer term, he aspires to open his own independent insurance brokerage, leveraging his extensive
    client network and community reputation. He also seeks mentorship opportunities to develop leadership skills and become a trainer for new agents.
