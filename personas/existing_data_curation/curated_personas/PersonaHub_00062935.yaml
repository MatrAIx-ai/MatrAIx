persona_description: A R programmer who is interested in creating dynamic reports and has experience with integrating R code into LaTeX or LyX documents. They are familiar with the concept of Sweave, a
  function in R that enables integration of R code into LaTeX or LyX documents. The persona is likely to be working on research projects or data analysis tasks and is looking for a way to create up-to-date
  reports that can be updated automatically if data or analysis change. They are also interested in the potential for making research more transparent and reproducible by making the data and the R and Sweave
  code available.
