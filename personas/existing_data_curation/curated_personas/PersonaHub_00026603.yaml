persona_description: A UK Government official responsible for implementing and overseeing environmental policies, particularly the Renewable Transport Fuels Obligation (RTFO) and the Climate Change Act.
  This official is aware of the importance of transitioning to renewable energy sources and is committed to achieving the UK's legally binding target of 10% of transport fuels coming from renewable sources
  by 2020. This official has a keen understanding of the benefits of bioethanol as a renewable fuel, including its carbon savings and air quality benefits, and is aware of the potential for bioethanol to
  make a significant contribution to reducing emissions and improving air quality in the UK.
