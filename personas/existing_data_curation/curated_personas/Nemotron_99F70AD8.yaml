    trails'', ''Woodworking and furniture making'', ''Genealogy research'', ''Volunteering at community theater productions'', ''Quilting'']'
  career_goals: She aims to transition into a senior advisory role within the county’s inspection department, helping to shape future building code updates and safety protocols. Angela plans to author a
    guidebook on integrating aesthetic considerations into construction inspections and to lead community workshops that educate homeowners on safe and beautiful building practices. She also envisions consulting
    part‑time for historic preservation projects, leveraging her blend of technical expertise and artistic curiosity.
