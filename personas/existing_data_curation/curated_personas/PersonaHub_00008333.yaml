persona_description: A professional decision maker or urban planner who is interested in enhancing the capacity of local decision makers and urban and transportation planners to formulate and implement
  policies that contribute to the sustainability of urban transport in developing nations. This individual is likely to be involved in urban planning and transportation issues and is interested in understanding
  the environmental and social impacts of increased private motor vehicles in developing countries. They are also interested in exploring the issues of demand management, improved public and non-motorized
  transport, environmental protection, road safety, and gender in the broad field of transportation.
