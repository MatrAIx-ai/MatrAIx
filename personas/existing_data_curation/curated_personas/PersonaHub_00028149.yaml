persona_description: A university professor who specializes in the study of archaeology, specifically the ancient Greek and Roman periods. The professor has experience with various excavation sites in Greece
  and is currently leading the new excavations at Troy, directed by Rüstem Aslan. The professor has a strong background in ceramic studies and has participated in excavations and surveys in the wider Greek
  world. He has also worked as a trench supervisor in the 2017 excavation at Troy and is currently in the finishing stage of his research Master in Archaeology at the University of Amsterdam.
