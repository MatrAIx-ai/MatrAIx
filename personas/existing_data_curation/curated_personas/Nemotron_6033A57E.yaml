  hobbies: '[''museum visits'', ''watercolor painting'', ''Spanish cooking'', ''gardening'', ''historical reading'', ''genealogy research'', ''chess'', ''book club'', ''community theater attendance'', ''classical
    guitar listening'']'
  career_goals: Although retired from formal employment, Juan aims to channel his expertise into community service and personal growth. He plans to volunteer as a mentor for younger volunteers at the local
    senior center, sharing his woodworking and cooking skills. He aspires to lead a weekly cultural‑heritage workshop where he will teach basic Spanish phrases, traditional recipes, and art appreciation
    to senior and teen participants. Juan also hopes to author a memoir that combines his immigrant family history with reflections on art and resilience, hoping it will inspire others. Additionally, he
    wants to stay active in the local Spanish cultural association, eventually becoming a coordinator for an annual arts festival, and to manage his stress through regular meditation and a garden project.
