personas:
  professional: Corinne Millender, a retired community mentor who facilitates a senior‑center book club and leads intergenerational art‑and‑gardening workshops, blends their lifelong bookkeeping savvy,
    storytelling flair, and relaxed, flexible approach to keep the local cultural scene thriving.
  sports: Corinne Millender, a devoted early‑morning walker who joins the Waseca senior walking club and practices gentle yoga, supports the Minnesota Vikings and the Minnesota Twins, and occasionally participates
    in community bridge tournaments as a low‑impact mental sport.
  arts: Corinne Millender, a watercolor enthusiast whose prairie‑inspired canvases reflect admiration for Georgia O'Keeffe and Claude Monet, regularly tours the Minneapolis Institute of Art, attends local
    gallery openings featuring artist Jane Larson, and enjoys listening to folk legend Bob Dylan while knitting.
  travel: Corinne Millender, a relaxed traveler who favors short weekend trips to Minneapolis museums, occasional road trips to the Badlands, and plans a future pilgrimage to her ancestors' homestead in
    the Black Forest region of Germany, always booking senior discounts and staying with family when possible.
  culinary: Corinne Millender, an accomplished Midwestern cook who bakes classic apple‑pie and rhubarb crumble, preserves seasonal jams like wild blueberry and lingonberry, expertly pickles beets and cucumbers,
    and delights in using fresh garden herbs like basil, thyme, and dill in their meals.
  core: Corinne Millender, a sprightly octogenarian who stitches stories into quilts, paints prairies in watercolors, and shares garden wisdom at the senior center, all while occasionally misplacing their
    glasses and forgetting to take their medication on time.
background:
  cultural: Corinne grew up in a small farming community in southern Minnesota, raised in a family of German‑Scandinavian heritage that attended a Lutheran church. The values of thrift, self‑reliance, and
    neighborly cooperation ingrained by the region’s agrarian culture shaped her upbringing, especially during the hardships of the Great Depression and World War II. While honoring these traditions, she
    cultivated an openness to new ideas, nurtured by her curiosity about art, literature, and different perspectives. The close‑knit community of Waseca, with its emphasis on volunteerism and modest celebration
    of the arts, has provided her with a sense of belonging and a platform to share her cultural and creative passions across generations.
