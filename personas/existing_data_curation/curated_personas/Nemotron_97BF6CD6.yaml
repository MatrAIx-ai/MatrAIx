personas:
  professional: A budding junior illustrator named Keri Mims channels their love of drawing and meticulous planning into creating detailed watercolor scenes for class projects, where their organized, compassionate
    nature ensures every teammate’s ideas are included and their art reflects the community spirit of their hometown.
  sports: An energetic backyard explorer named Keri Mims loves playing soccer with the Muskogee Little Kickers club, cheering for the Oklahoma City Thunder and the Dallas Cowboys during game nights, and
    balances active play with a habit of joining school‑wide fitness challenges whenever the fall sports season kicks off.
  arts: A creative enthusiast named Keri Mims delights in sketching characters inspired by Eric Carle, Mo Willems, and classic Disney figures, while singing along to Raffi’s “Baby Beluga” and attending
    community art fairs that showcase local folk crafts, which fuels their imagination and artistic growth.
  travel: A curious adventurer named Keri Mims enjoys family trips to the Oklahoma City National Memorial and the Wichita Mountains Wildlife Refuge, and dreams of visiting Disneyland and the Grand Canyon,
    often planning imaginary itineraries with colorful maps and stickers.
  culinary: A budding chef named Keri Mims prefers peanut butter and jelly sandwiches, mac & cheese with a sprinkle of paprika, apple slices with cinnamon, and helps their parents stir soft tacos with shredded
    cheese, while proudly adding rainbow sprinkles to homemade cupcakes as a finishing touch.
  core: Keri Mims is a curious, organized, and compassionate seven‑year‑old who fills each day with art, nature, and community games, even if they occasionally lose their crayons in the backyard.
background:
  cultural: Keri is raised in Muskogee, Oklahoma, a small city that blends Southern hospitality, Midwestern practicality, and a rich Native American heritage. Her family participates in local community
    traditions such as county fairs, 4‑H projects, and church gatherings, where she learns the value of cooperation and service. The region's exposure to various cultural festivals, including celebrations
    of the nearby Muscogee (Creek) Nation, introduces her to diverse art forms and stories, feeding her appreciation for varied experiences. Growing up in this environment, Keri internalizes a sense of
    community belonging while also being curious about the broader world.
