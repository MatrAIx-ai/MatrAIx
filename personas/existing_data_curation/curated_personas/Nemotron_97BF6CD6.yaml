  career_goals: Keri dreams of a future where she can combine her love for caring for others with her artistic curiosity. She envisions herself as a teacher who uses colorful visual aids to make learning
    joyful, or as a veterinarian who helps animals feel safe and healthy. She also enjoys the idea of creating community murals that brighten public spaces, reflecting her desire to improve her hometown's
    environment.
