personas:
  professional: Janet Ratliff, a 44‑year‑old visual storyteller and community arts organizer, blends acrylic painting, digital illustration, and poetic writing into a flexible freelance venture while casually
    curating an annual Allegany County art fair, though her relaxed approach to scheduling often leads to last‑minute scrambles.
  sports: Janet Ratliff, who enjoys seasonal outdoor activity, hikes with the local Appalachian Trail Club in spring, jogs along the river in the fall, attends Baltimore Ravens games for the community vibe,
    and participates in a casual yoga class at the county community center, yet admits to skipping regular cardio when competitive board‑games consume the evenings.
  arts: Janet Ratliff, an avid connoisseur of avant‑garde music, regularly streams Laurie Anderson and Aphex Twin, studies the experimental theater troupe The Red Clay Theatre, collects works by Georgia
    O'Keeffe for inspiration, and attends poetry readings featuring Mary Oliver, all of which fuel their own landscape paintings and flash fiction.
  travel: Janet Ratliff, a curious traveler with a modest budget, has explored the historic streets of Savannah, taken weekend hikes in Shenandoah National Park, dreamt of a creative retreat in Portland,
    Oregon, and keeps a detailed travel journal documenting each sketch made on the road.
  culinary: Janet Ratliff, a self‑taught home cook, favors hearty Appalachian dishes like cabbage rolls, apple butter, and smoked trout, experiments with Thai green curry and fresh sushi rolls on weekends,
    and enjoys crafting herbal teas from locally foraged sage and mint while occasionally over‑salting their experimental loaves.
  core: Janet Ratliff channels boundless imagination into art and writing while wrestling with chronic worry, a penchant for disorganized scheduling, and a competitive streak that turns board‑games into
    daily battles.
background:
  cultural: Janet grew up in the Appalachian foothills of western Maryland, in a middle‑class family with deep German and Irish roots common to the region. Her upbringing blended traditional rural values—community
    gatherings, seasonal festivals, and an appreciation for handcrafted skills—with the broader American cultural emphasis on individualism and self‑expression. Though raised in a modest Protestant household,
    she has always been drawn to the artistic and intellectual currents of larger urban centers, seeking novelty through books, independent films, and online creative communities, while retaining a strong
    sense of local heritage and connection to the natural landscape of Allegany County.
attributes:
  skills: '["Painting and drawing", "Digital illustration", "Creative writing", "Conceptual brainstorming", "Self‑directed research", "Photo editing", "Basic graphic‑design software", "Community arts coordination",
