  hobbies: '["Landscape painting", "Acrylic and watercolor art", "Creative writing (poetry, flash fiction)", "Visiting galleries and experimental theater", "Listening to avant‑garde music", "Nature walks
    in the Cumberland River area", "Strategic board‑gaming (e.g., chess, Settlers of Catan)", "Scrapbooking and knitting", "Daily journaling"]'
  career_goals: Janet dreams of turning her creative passions into a low‑pressure, flexible venture. She aims to publish a collection of short stories and poems that explore speculative and philosophical
    themes, while also developing an online studio where she sells original artwork and limited‑edition prints. Locally, she hopes to curate an annual community art fair that showcases emerging talent from
    Allegany County, providing her a platform to mentor younger artists. Throughout, she seeks to build a routine that balances her competitive drive with her tendency toward worry, allowing her imagination
    to flourish without overwhelming stress.
