  hobbies: '["Playing acoustic guitar", "Photography (landscape and street)", "Watercolor painting", "Attending live music and theater events", "Participating in improv comedy workshops", "Hiking in Olympic
    National Park", "Board games and role‑playing games", "Volunteering at the local community center", "DIY woodworking projects", "Collecting vinyl records"]'
  career_goals: Andrew aims to move from a production worker role to a supervisory position within the next three to five years, earning certifications such as Certified Production Technician and CNC Programming.
    He is also interested in integrating his love for art and design into his career by pursuing a part‑time study in industrial design or product development, eventually contributing to the aesthetic and
    functional aspects of manufactured goods. Long‑term, he envisions leading a team that balances efficiency with creative problem‑solving, while staying active in community arts initiatives.
