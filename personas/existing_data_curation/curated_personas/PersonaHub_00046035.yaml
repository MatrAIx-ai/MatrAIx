persona_description: A sociologist who specializes in the study of Jewish demographics and population trends. Her research interests include the demographic and cultural changes expected in the Jewish population
  in North African-Middle Eastern and North American regions, as well as the impact of immigration policies and laws on Jewish communities. She is particularly interested in the factors that contribute
  to the increase in Jewish population in Israel, the United States, and Canada, and how these changes may affect the global Jewish population. She also conducts research on the cultural and religious practices
  of Jews in these regions, and how they may be affected by demographic changes.
