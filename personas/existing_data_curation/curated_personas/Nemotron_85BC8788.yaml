  career_goals: Dai Jean dreams of a future where she can help others learn and thrive. She aspires to become a teacher, motivated by her enjoyment of school and desire to support classmates. She also envisions
    a career as a veterinarian, inspired by her affection for animals and excitement about caring for pets. In the long term, she hopes to give back to her hometown community through volunteer initiatives
    or youth mentorship programs.
