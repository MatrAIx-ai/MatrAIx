    and Historical Non‑Fiction)'', ''Arduino and Raspberry Pi Tinkering'', ''Cooking Filipino and Fusion Cuisine'', ''Chess Club'', ''Small‑Group Book Discussions'']'
  career_goals: Bao aims to become a senior partner at his firm and to establish a boutique practice that bridges cutting‑edge technology with ethical legal frameworks, particularly in artificial intelligence
    and sustainable innovation. He aspires to mentor young Asian‑American attorneys, contribute scholarly articles on AI ethics to law journals, and influence state policy on data privacy. Additionally,
    Bao envisions leading pro‑bono initiatives that provide legal assistance to immigrant families in San Diego, integrating his cultural empathy with his professional expertise.
