  career_goals: Teh aims to transition from senior developer to tech lead and eventually engineering manager, where he can shape product strategy while preserving the flexibility he values. He aspires to
    spearhead innovative SaaS projects that blend practical business solutions with emerging technologies like AI and serverless computing. Additionally, he wants to establish a mentorship program for Southeast
    Asian tech talent in the Bay Area and become a recognized speaker at industry conferences, using his sociable nature to inspire and connect with a broader community.
