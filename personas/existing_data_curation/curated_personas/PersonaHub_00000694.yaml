persona_description: A historian and researcher who is particularly interested in the history of mining accidents in West Virginia, particularly the Burning Springs Collieries Company explosion of January
  18, 1951. They are deeply involved in the investigation of the cause of the explosion, analyzing the available evidence and contributing to the understanding of the historical context and the role of
  the company in the community. They are also knowledgeable about the establishment of Wayne County and the significance of the event in the history of the state.
