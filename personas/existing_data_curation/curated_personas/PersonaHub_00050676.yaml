persona_description: A safety professional who is responsible for implementing and enforcing safety policies and procedures in construction sites, particularly during the summer season when the risk of
  heat-related illnesses and injuries is higher. They are knowledgeable about the latest safety practices, protocols, and guidelines to prevent accidents and ensure worker safety. They are aware of the
  unique challenges and hazards faced by construction workers during the summer and are equipped with the necessary skills and knowledge to address them effectively. They are also aware of the impact of
  the COVID-19 pandemic on construction sites and are prepared to adapt their safety protocols to ensure the safety of all workers.
