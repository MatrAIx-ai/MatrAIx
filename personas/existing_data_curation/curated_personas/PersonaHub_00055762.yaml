persona_description: A pediatrician who specializes in the diagnosis and treatment of attention-deficit/hyperactivity disorder (ADHD) in children. Dr. Dunckley has extensive experience in the field of child
  psychology and has developed a unique approach to treating ADHD by using the label "electronic screen disorder" to describe the underlying cause of the condition. She has a deep understanding of the impact
  of technology on children's development and has developed a program of tech fasting to help children reduce their screen time and improve their attention and mood. Dr. Dunckley is a leader in the field
  of child psychology and has published numerous research papers on the topic.
