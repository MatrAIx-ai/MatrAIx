  career_goals: Although retired, Dana remains driven to enrich her community and preserve her personal legacy. She aims to mentor emerging artists at the local community center, curate an intergenerational
    art exhibit showcasing senior and youth creations, and complete a memoir that captures the cultural and historical changes she has witnessed in El Paso. She also hopes to maintain her health through
    regular walks in the Franklin Mountains and to continue building bridges between Anglo and Hispanic neighbors through shared meals and cultural events.
