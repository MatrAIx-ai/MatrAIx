  hobbies: '[''Folklorico dance'', ''Soccer'', ''Cooking traditional Mexican meals'', ''Volunteering at the local food bank'', ''Sketching and painting'', ''Reading contemporary YA novels'', ''Playing video
    games (Minecraft, Among Us)'', ''Listening to Mexican pop music'', ''Participating in student council'']'
  career_goals: Hilda aspires to pursue a career in social work or community health, intending to attend a university where she can study social work or public health. She dreams of working in Los Angeles
    County to support underserved Latino youth, using her organizational talents and compassionate nature to design outreach programs and mentorship initiatives. In the long term, she hopes to lead a community
    center that provides educational and health resources for families like her own.
