personas:
  professional: Hilda Gonzalez, a high‑school junior with a knack for organization, serves as the youth outreach coordinator for her local food bank, where they design structured donation‑drive schedules,
    lead a team of peers, and channel their sociable energy into community events, while also training rigorously in folklorico dancing with the aim of earning a scholarship in cultural arts.
  sports: Hilda Gonzalez, a devoted midfielder for Long Beach FC’s youth league, spends Saturdays at the community park perfecting set‑pieces, cheers on the LA Galaxy during the MLS season, and joins an
    indoor futsal team in winter to keep their fitness routine year‑round.
  arts: Hilda Gonzalez finds creative release in sketching urban street scenes inspired by Frida Kahlo’s bold colors, immerses in the rhythms of folklorico performances at local festivals, and unwinds with
    YA novels like Angie Thomas’s 'The Hate U Give' and the multiplayer soundtrack of Minecraft, while occasionally binge‑watching series starring Zendaya.
  travel: Hilda Gonzalez dreams of visiting the historic streets of Guanajuato to explore their family’s roots, already loved weekend trips to Catalina Island’s beaches, and plans a future road trip along
    the Pacific Coast Highway to capture sunrise photos for their sketchbook.
  culinary: Hilda Gonzalez chops fresh cilantro, grinds chilies, and slowly braises pork for authentic carnitas, pairs them with handmade corn tortillas and a squeeze of lime, and while still mastering
    the art of perfect tamales, they delight in experimenting with guava‑infused aguas frescas.
  core: Hilda Gonzalez is a methodical yet lively teen who balances soccer drills, folklorico rehearsals, and volunteer shifts, but habitually stays up late sketching Minecraft builds, often sacrificing
    sleep.
background:
  cultural: Hilda was raised in a Mexican‑American household in Long Beach, where Spanish is spoken at home and English at school. Her family maintains strong ties to Mexican traditions, celebrating Día
    de los Muertos, quinceañeras, and regional holidays, while also embracing the multicultural vibe of Southern California. These experiences have given her a bicultural perspective that informs her values
    of family, community service, and respect for cultural heritage.
attributes:
