  hobbies: '[''Comic drawing'', ''Digital illustration'', ''Creating games with Scratch'', ''Reading sci‑fi and fantasy novels'', ''Playing basketball'', ''Hiking around Lake Lanier'', ''Listening to hip‑hop,
    soul, and gospel music'', ''Participating in church youth choir'', ''Building LEGO models'', ''Helping with family cooking'']'
  career_goals: He dreams of becoming a visual storyteller—perhaps a graphic novelist or a game designer—who can combine his love of art, technology, and community messages. He hopes to study art and computer
    science in high school and eventually create projects that celebrate diverse cultures and inspire peers. In the longer term, he imagines mentoring younger kids in after‑school art programs, using his
    collaborative nature to foster a supportive environment.
