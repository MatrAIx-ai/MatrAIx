personas:
  professional: Allen Nyborg, an aspiring comic creator and Scratch game designer, blends his curious eye for visual storytelling with disciplined project planning, often collaborating with classmates to
    build imaginative digital worlds while they balance school responsibilities and community service.
  sports: Allen Nyborg, a dedicated member of the Gainesville Recreation Center Bulls basketball team, idolizes the Atlanta Hawks, spends weekends jogging the Lake Lanier trails, and while enthusiastic
    about staying active, sometimes forgets proper stretching, leading to occasional shin splints, yet they keep a positive attitude toward improvement.
  arts: Allen Nyborg, an avid comic sketcher and digital art enthusiast, draws inspiration from creators like Stan Lee, Sakimichan, and the lyrical flow of Kendrick Lamar, while also singing gospel harmonies
    in his church’s youth choir and attending local spoken‑word poetry slams featuring poets such as Sarah Kay, weaving these influences into his own storytelling, and they often experiment with mixed media
    to push creative boundaries.
  travel: Allen Nyborg, who plans family weekend getaways with a mix of spontaneous hikes around Lake Lanier and organized trips to Atlanta’s interactive Children’s Museum, dreams of exploring the historic
    streets of New Orleans and the futuristic attractions of Orlando’s theme parks, balancing his love for adventure with the budget limits set by his parents, and they eagerly map out each trip using colorful
    brochures and online videos.
  culinary: Allen Nyborg, a modest kitchen assistant at family barbecues, loves grilling corn on the cob, assembling smoky pulled pork sliders topped with tangy coleslaw, and experimenting with a secret
    honey‑chipotle glaze, while showcasing their budding skill by mastering the perfect mac and cheese using sharp cheddar and a dash of smoked paprika, and they often help set the table for neighbors after
    cooking.
  core: Allen Nyborg, a curious twelve‑year‑old who fuses comic art, basketball, and gospel harmonies into a vibrant worldview, can spend hours perfecting a digital sketch yet sometimes forgets their homework
    until the last minute, channeling their community’s spirit of cooperation into every project, and they always end the day with a quick sketch of the sunset.
background:
  cultural: Allen is an African‑American growing up in Gainesville, a small town in Hall County, Georgia. His family is deeply rooted in the local black community, where church gatherings, neighborhood
    barbecues, and storytelling traditions play a central role. He is exposed to a blend of Southern hospitality and African‑American cultural expressions—such as gospel music, spoken‑word poetry, and community
    volunteerism—which shape his values of cooperation, respect for elders, and a desire to uplift others. While navigating the broader regional culture, he carries a strong sense of pride in his heritage
    and is motivated to share it through his creative pursuits.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration using a tablet'', ''Basic coding with Scratch'', ''Creative writing and storytelling'', ''Public speaking in class presentations'', ''Collaborative
