personas:
  professional: Terrence Ndao, a 26‑year‑old construction manager with a business administration degree, leverages his meticulous scheduling expertise in Microsoft Project, Primavera P6, and Procore, alongside
    his imaginative flair for BIM modeling and green‑building solutions, to lead cross‑functional teams that deliver sustainable, design‑rich projects on time and under budget.
  sports: Terrence Ndao engages in weekly pick‑up basketball games at the Mission District Community Center, cheers for the Golden State Warriors and San Francisco 49ers, plays in the Bay Area Chess Club’s
    amateur league, and treats weekend runs along the Embarcadero as his cardio regimen, balancing competition with camaraderie.
  arts: Terrence Ndao channels his imagination through sketching cityscapes, watercoloring neon‑lit streets, capturing graffiti in his DSLR, and attending live sets by Kamasi Washington and Kendrick Lamar,
    while regularly visiting galleries featuring works by Banksy, Yayoi Kusama, and local mural collectives that inspire his own visual storytelling.
  travel: Terrence Ndao plans his trips like mini‑project schedules, favoring architecture‑focused itineraries that blend adventure and cultural immersion, having explored Barcelona’s Sagrada Família, Tokyo’s
    Shibuya crossing, and the vertical gardens of Singapore, while dreaming of a future research stay in Copenhagen to study sustainable urban design within his limited savings.
  culinary: Terrence Ndao enjoys a semi‑home‑cook lifestyle, perfecting a rosemary‑infused ribeye steak and hand‑rolling sushi with fresh tuna and avocado, while his weekend indulgences include spicy Cajun
    jambalaya and Ethiopian injera, and he never shies away from testing new plant‑based protein recipes that align with his green‑building ethos.
  core: Terrence Ndao is a fiercely organized dreamer who channels his competitive edge into both construction timelines and basketball courts, habitually sketches on coffee napkins, and occasionally lets
    perfectionism delay his own downtime.
background:
  cultural: Terrence is an African American raised in Trenton, New Jersey, a city with a rich history of civil rights activism and a vibrant multicultural community. Growing up, he was immersed in the traditions
    of the Black diaspora—celebrating Juneteenth, participating in Kwanzaa gatherings, and absorbing the rhythms of jazz, hip‑hop, and spoken‑word poetry that shaped his neighborhood. His family emphasized
    education, perseverance, and community service, values that guided his pursuit of a business degree and a career in construction—a field where he could help revitalize urban neighborhoods. He draws
    inspiration from Black architects and designers who blend cultural narratives with modern aesthetics, and he seeks to reflect that legacy in his work by championing inclusive, sustainable projects that
    benefit historically underserved communities.
attributes:
  skills: '[''Project Management'', ''Construction Scheduling (Microsoft Project, Primavera P6)'', ''Budgeting & Cost Estimation'', ''Risk Assessment & Mitigation'', ''Contract Negotiation'', ''Stakeholder
