    Analysis & Reporting'']'
  hobbies: '[''Urban sketching'', ''Watercolor painting'', ''Architectural photography'', ''Live music (jazz, hip‑hop)'', ''Basketball'', ''Chess'', ''Escape‑room puzzles'', ''Drone piloting for site inspections'',
    ''Virtual reality (VR) design exploration'', ''Community youth mentorship in construction'']'
  career_goals: Terrence aims to become a senior construction executive within the next five years, targeting roles such as Director of Construction or Vice President of Operations at a firm that prioritizes
    innovative, sustainable building. He plans to earn PMP and LEED AP certifications, pursue a master’s degree in construction engineering or an MBA to deepen his strategic expertise, and lead large‑scale
    mixed‑use projects that integrate artistic elements and green technologies. He also envisions establishing his own consultancy focused on affordable housing development in underserved urban neighborhoods,
    leveraging his business acumen and creative vision to deliver cost‑effective, high‑quality solutions. Ultimately, he wants to be recognized as a thought leader who bridges the gap between practical
    construction management and cutting‑edge design.
