persona_description: A marine biologist who specializes in the study of beaked whales, particularly the Giant Beaked Whale species. His research interests include the genetic and morphological differences
  between the two species, as well as the potential for additional cryptic subspecies or species to be described in the future. He has published research on the genetic and morphological differences between
  the two species and has also studied the genetic and morphological differences between the Japanese populations of the two species. He is likely to be familiar with the literature on beaked whales and
  the various species within the genus Berardius.
