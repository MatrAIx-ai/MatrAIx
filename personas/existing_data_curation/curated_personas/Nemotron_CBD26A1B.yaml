personas:
  professional: Carlos Velazquez is a meticulous community arts coordinator and aspiring docent who blends their curious eye for unconventional visual concepts with a methodical, budget‑savvy approach to
    planning free workshops for seniors, though they sometimes feel a surge of anxiety before large visitor groups.
  sports: Carlos Velazquez enjoys daily long walks with their dog along the Trinity River Trail, is a devoted fan of the Dallas Cowboys and Texas Rangers, and competes in the Fort Worth Senior Softball
    League each spring, balancing low‑impact fitness with a spirited community involvement.
  arts: Carlos Velazquez creates watercolor landscapes inspired by Spanish hills and Texan sunsets, attends gallery openings featuring contemporary artists such as Kehinde Wiley, and regularly listens to
    flamenco legend Paco de Lucía and classical guitarist Andrés Segovia, a routine that satisfies their curiosity and need for reflective calm.
  travel: Carlos Velazquez favors thoughtfully planned journeys that intertwine heritage and leisure, revisiting Andalusian treasures like the Alhambra and Seville’s Alcázar while also exploring historic
    U.S. sites such as the Fort Worth Stockyards and the Alamo, yet they sometimes book impulsive weekend trips when emotional turbulence spikes.
  culinary: Carlos Velazquez prepares authentic Spanish fare, favoring paella valenciana seasoned with saffron, chorizo and fresh green beans, alongside tapas of patatas bravas and jamón serrano, and they
    delight in simmering gazpacho on hot Texan afternoons, reflecting a skilled yet modest culinary passion.
  core: Carlos Velazquez is a detail‑oriented, art‑loving senior who channels their anxiety into community workshops and watercolor painting, while they occasionally over‑plan to the point of hesitation.
background:
  cultural: Carlos is a first‑generation American of Spanish descent, with his parents originally from Andalusia. Raised in a bilingual household, he grew up celebrating Spanish holidays such as Semana
    Santa, Día de los Reyes, and regional festivals that feature flamenco, tapas, and communal gatherings. Living in Fort Worth, Texas, he blends these traditions with local Texan customs, participating
    in community events that honor both his heritage and his adopted home. His Catholic upbringing informs his observance of religious holidays, while his love for Spanish art, music, and cuisine remains
    a central thread in his identity, shaping his social engagements, volunteer work, and personal passions.
