personas:
  professional: Alina Charpia, a seasoned event logistics specialist, leverages meticulous project planning, advanced spreadsheet analysis, and sustainable event practices to orchestrate seamless gatherings;
    they thrive in solitary, detail‑driven work while quietly mentoring emerging planners as they pursue CMP certification and launch a boutique consultancy in Ocean Shores.
  sports: Alina Charpia, an early‑morning shoreline walker and yoga enthusiast, supports the Seattle Seahawks and follows the Seattle Sounders FC, and belongs to the Ocean Shores Seniors' Beach Walkers
    club for low‑impact cardio; they prefer seasonal activities like spring tide kayaking over competitive sports.
  arts: Alina Charpia, a quiet connoisseur of nature photography, draws inspiration from Ansel Adams, enjoys the folk storytelling of Joan Baez, reads historical fiction by Ken Follett, and attends occasional
    community theater performances of Arthur Miller's plays; they often knit hand‑dyed scarves while listening to classical piano recordings of Ludovico Einaudi.
  travel: Alina Charpia, a methodical traveler who favors serene coastal retreats, has explored the Oregon Coast, the Scottish Highlands, and the Greek islands of Crete and Santorini, and now dreams of
    a slow‑travel itinerary through Norway's fjords; they always budget trips within their modest consultancy earnings and plan each itinerary down to tide schedules.
  culinary: Alina Charpia, a proficient home chef who embraces seasonal, locally sourced ingredients, frequently prepares grilled sea bass with lemon zest, rosemary, and a side of sautéed native wild greens,
    bakes rustic apple‑cinnamon galettes using heirloom apples from their garden, and experiments with hand‑dyed wool‑inspired plating designs; they relish the meditative rhythm of chopping vegetables as
    a counterpart to their puzzle‑solving hobby.
  core: Alina Charpia, a solitary, detail‑oriented event planner, blends sustainable logistics with a love for coastal walks, over‑organizes every project yet forgets to schedule personal downtime, and
    occasionally indulges in hand‑dyed wool hobbies as a quiet rebellion against routine; they embody disciplined curiosity tempered by a gentle, cooperative spirit.
background:
  cultural: Alina’s cultural background is rooted in a white, European-American family lineage, likely with ancestors from German and Polish origins. She grew up in the Midwest before moving to the Pacific
    Northwest, where she embraced the region’s maritime culture and appreciation for outdoor life. Living in Ocean Shores, Washington, she is influenced by the coastal, small-town values of self-reliance,
    environmental stewardship, and community connectivity. Her divorce and later life stage have reinforced a pragmatic, resilient outlook, while her upbringing instilled a strong work ethic and respect
    for tradition.
attributes:
  skills: '[''Event planning and coordination'', ''Budget development and financial oversight'', ''Vendor negotiation and contract management'', ''Timeline creation and logistical scheduling'', ''Risk assessment
    and contingency planning'', ''Use of event management software (Cvent, Eventbrite, Whova)'', ''Advanced Microsoft Office and Google Workspace proficiency'', ''Data analysis for attendee metrics'', ''Sustainable
    event practices'', ''Team leadership and remote collaboration'', ''Attention to detail and quality control'']'
  hobbies: '[''Reading historical fiction'', ''Coastal birdwatching'', ''Photography of marine landscapes'', ''Gardening'', ''Knitting and textile crafts'', ''Puzzle solving (crosswords, sudoku)'', ''Walking
    tide pools and beachcombing'', ''Yoga and meditation'', ''Cooking with seasonal ingredients'', ''Learning about local history'']'
  career_goals: Alina aims to transition from full-time employment with large venues to establishing her own boutique event-planning consultancy in Ocean Shores, focusing on intimate, sustainable gatherings
    for senior groups, corporate retreats, and community events. She seeks certification as a Certified Meeting Professional (CMP) within the next two years, and hopes to become a speaker and trainer on
    efficient event logistics, sharing her disciplined approach with emerging planners. Additionally, she wishes to mentor younger women entering the field, nurturing a supportive, collaborative network
    while maintaining her preference for quieter, behind-the-scenes work.
