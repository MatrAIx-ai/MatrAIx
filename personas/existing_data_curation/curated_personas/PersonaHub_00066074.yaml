persona_description: A researcher or policy analyst who is interested in the impact of migration on health, particularly in relation to the social model of health. They are familiar with the concept of
  place effect on health and its relationship with ethnicity and migration. They have a particular interest in examining the relationship between ethnic density and health outcomes among migrants, particularly
  in the context of the UK. They are aware of the growing diversity of migrant categories and changing settlement patterns and are interested in understanding the effects of place on health in this context.
  They have a background in public health or social policy and are interested in the policy implications of their findings.
