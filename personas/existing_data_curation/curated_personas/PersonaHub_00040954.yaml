persona_description: A scientist who is part of the RICE project, specifically focused on developing cost-effective ThermoElectric materials to recover waste heat for electricity generation. Their research
  involves the development of highly-porous and solid graphite pellets and the efficient preparation of copper sulfide for thermoelectric devices. They are also interested in producing less-toxic and low-cost
  thermoelectric materials and designing thermoelectric modules using these materials.
