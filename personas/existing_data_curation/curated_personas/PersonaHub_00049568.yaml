persona_description: A passionate educator who is dedicated to inspiring, engaging, educating, and empowering every student in the Blaine County School District. This individual is committed to aligning
  the curriculum with what students are expected to know, understand, and be able to do throughout their educational journey to prepare them for success in college and careers after high school. They are
  knowledgeable about the curriculum and the various programs and services offered by the school district, including social workers, school nursing, educational interventions/supports, assistance to students
  who are experiencing homelessness, and identifying students with disabilities. This individual is also aware of the work of the social workers, school nursing, educational interventions/supports, assistance
  to students who are experiencing homelessness, and identifying students with disabilities, and is committed to ensuring that all students have equal access to public education.
