personas:
  professional: Jose Blanco is an aspiring engineer in training, turning everyday toys into miniature construction projects, applying early analytical skills and a practical love for order while preferring
    solitary play and quietly observing peers.
  sports: Jose Blanco loves kicking a soft soccer ball in the backyard, enjoys toddling through a local toddler gymnastics class, and watches the Dallas Cowboys on Sundays, blending a quiet enthusiasm for
    movement with family‑rooted fandom for Texas football.
  arts: Jose Blanco delights in listening to country legend George Strait and folk singer Lila Downs, drawing vivid sugar‑skull‑inspired doodles with crayons, and mimicking story‑time characters from the
    animated series 'Paw Patrol', shaping a bilingual creative imagination.
  travel: Jose Blanco has road‑tripped with family to grandparents’ home in San Antonio, explored the desert vistas of Big Bend National Park, and dreams of seeing the bright lights of Disneyland in Anaheim,
    preferring short, familiar drives over long, unplanned adventures.
  culinary: Jose Blanco adores the soft texture of chicken enchiladas, the warmth of homemade tamales, and the crunch of apple slices with peanut butter, eagerly helps stir pancake batter with a wooden
    spoon, yet sometimes refuses to try new vegetables, reflecting a selective palate shaped by family meals.
  core: Jose Blanco is a curious yet cautious toddler whose bilingual world fuels gentle empathy, a penchant for solitary play, and occasional worries that surface as fussiness around new experiences.
background:
  cultural: Jose is raised in a Mexican‑American household in Comanche, Texas. His family speaks both Spanish and English at home, celebrating holidays such as Día de los Muertos, Navidad, and Cinco de
    Mayo with traditional foods like tamales, enchiladas, and homemade salsa. The close‑knit community of Mexican families in rural Texas influences his upbringing, emphasizing family unity, respect for
    elders, and cooperative values. Local Texas culture adds elements like country music, rodeo fairs, and a love for the outdoors, which blend with his Mexican heritage to shape a bicultural identity.
attributes:
