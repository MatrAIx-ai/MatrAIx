persona_description: An Arborist who is interested in diagnosing and maintaining the health of trees. They are skilled in air spading, a technique used to clear soil from the base of trees and expose the
  root flare, which is crucial for diagnosing and gathering information about the tree's health. They are also knowledgeable about the effects of grade and soil changes on tree health and are interested
  in detecting signs of root decay that can lead to tree failure.
