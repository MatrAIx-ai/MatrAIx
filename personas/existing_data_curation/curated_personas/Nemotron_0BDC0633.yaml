  hobbies: '[''Community gardening'', ''Fishing'', ''Sailing'', ''Woodworking'', ''Reading historical non-fiction'', ''Genealogy research'', ''Cooking'', ''Volunteering at local food bank'', ''Senior centre
    dance nights'', ''Attending local cultural festivals'']'
  career_goals: Although retired, Danny is determined to stay actively engaged and turn his life‑experience into service. His primary ambition is to become a certified senior mentor and peer‑support facilitator,
    leading regular groups that address anxiety, grief, and social isolation among older adults. He also aims to expand his digital fluency by learning video‑calling platforms and basic social‑media tools
    so he can stay connected with his grandchildren and help other seniors navigate technology. Danny hopes to spearhead a community‑garden program that supplies fresh produce to the local food bank, combining
    his love of gardening with his desire to combat food insecurity. Finally, he plans to document his family’s genealogy and Jacksonville’s local history in a memoir that can serve as a cultural bridge
    for younger generations.
