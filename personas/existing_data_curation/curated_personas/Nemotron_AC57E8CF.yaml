personas:
  professional: Ronald Hunter is a pragmatic part‑time handyman in Slaton who combines carpentry, mechanical, electrical, and plumbing expertise with meticulous planning and a sociable, assertive demeanor,
    ensuring projects stay on schedule while their occasional worry about deadlines drives them to double‑check every detail.
  sports: Ronald Hunter is an avid bowler in the Lubbock Community League, a seasonal fan of the Dallas Cowboys and Texas Tech Red Raiders, and a member of the Lubbock County Anglers Club, balancing weekly
    Thursday lane nights with early‑morning turkey hunts and weekend fly‑fishing trips on the Canadian River, all while maintaining a practical fitness routine of weekend hikes and stretching to ease joint
    pain.
  arts: Ronald Hunter channels creative energy by drumming for the West Texas Rhythm Crew, capturing the stark beauty of Caprock Canyons with a Canon EOS 5D, and attending the Lubbock County Fair to admire
    local crafts, while drawing inspiration from Willie Nelson, Stevie Ray Vaughan, and the storytelling films of Sam Elliott.
  travel: Ronald Hunter prefers well‑planned, modest‑budget trips that blend adventure with relaxation, such as annual hunting excursions to the Texas Panhandle, a weekend getaway to Carlsbad Caverns in
    New Mexico, and a dream itinerary that includes a spring elk hunt in Wyoming’s Bighorn Mountains and a summer fly‑fishing trip to Colorado’s Blue River, all coordinated around family commitments and
    the seasonal bowling league schedule.
  culinary: Ronald Hunter enjoys moderate‑level cooking, specializing in Texas‑style barbecue like mesquite‑smoked brisket, jalapeño cornbread, and pickled onions, often using fresh tomatoes, peppers, and
    herbs from their garden, and occasionally experimenting with a dry rub that mixes paprika, brown sugar, and cumin while sharing meals at church potlucks.
  core: Ronald Hunter is a community‑focused handyman whose love of bowling, BBQ, and the outdoors is balanced by a habit of obsessively double‑checking bolts and worrying about the next bill.
background:
  cultural: Ronald grew up in Slaton, a close‑knit town in West Texas, within a family of ranching and farming roots. His cultural identity is shaped by the values of self‑reliance, community service, and
    conservative, Protestant traditions common to many white Texan families in the region. He values modesty, hard work, and the camaraderie of small‑town gatherings, while also respecting the diverse heritage
    of the broader Lubbock County area.
