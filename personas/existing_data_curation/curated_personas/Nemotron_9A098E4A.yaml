personas:
  professional: Hollis Watkins, a budding LEGO architect and junior problem‑solver who channels a love for step‑by‑step construction and routine into designing intricate playsets, often organizing neighborhood
    game nights and offering calm leadership in group projects.
  sports: Hollis Watkins, an energetic member of the Brookside Youth Soccer Club’s U10 team who delights in cheering for the Cityshire Eagles, rides a bike through Willow Park each afternoon, and joins
    the after‑school nature‑trail scouting group, balancing structured team practice with spontaneous outdoor exploration.
  arts: Hollis Watkins, a budding storyteller who sketches heroic rescue scenes inspired by Studio Ghibli’s animation and writes fan‑fiction chapters based on 'Harry Potter', enjoys playing the piano pieces
    of Yiruma, and frequently challenges friends to chess matches, blending imagination with strategic calm.
  travel: Hollis Watkins, an enthusiastic explorer who loves weekend trips to the nearby Redwood Trail and dreams of camping in Yellowstone National Park, prefers day‑long excursions planned with a kid‑friendly
    map app over long flights, and always packs a spare notebook for nature observations.
  culinary: Hollis Watkins, a junior kitchen assistant who frequently bakes chocolate‑chip cookies, assembles LEGO‑shaped fruit kebabs with grapes and melon, and loves crunchy carrot sticks with hummus,
    often experimenting with adding sprinkles to pancakes for extra fun.
  core: Hollis Watkins, a calm, routine‑loving nine‑year‑old builder who blends imagination with meticulous step‑by‑step projects, always carries a spare LEGO brick and a kind smile.
background:
  cultural: Hollis comes from a middle‑class white American family in Sacramento, California. His upbringing reflects suburban West‑Coast values, emphasizing family meals on weekends, participation in community
    events, and an appreciation for outdoor activities. He celebrates national holidays such as Thanksgiving and the Fourth of July with family gatherings and fireworks, and his family often visits local
    farms and parks, aligning with the region’s farm‑to‑fork culture. While his immediate cultural practices are rooted in mainstream American traditions, his exposure to Sacramento’s diverse school environment
    and neighborhood activities fosters a respectful awareness of different cultures and a sense of inclusivity.
attributes:
  skills: '["Organizing personal space and school supplies", "Following step-by-step instructions (e.g., LEGO building)", "Fundamental arithmetic and reading comprehension", "Basic computer skills (typing,
    educational software)", "Collaborative teamwork and conflict mediation", "Puzzle solving and strategy board games"]'
  hobbies: '["Building LEGO sets", "Reading adventure/fantasy books", "Playing soccer", "Biking around local parks", "Collecting rocks and observing insects", "Playing board games (chess, Ticket to Ride)",
    "Drawing and writing short stories"]'
  career_goals: Hollis envisions a future where he can serve his community in a stable, structured role. He is drawn to the idea of becoming a firefighter because the clear routines, teamwork, and ability
    to protect others align with his practical mindset and calm resilience. At the same time, his love for animals and gentle nature spark a budding ambition to become a veterinarian, allowing him to care
    for living beings with kindness. To prepare for these goals, he aims to keep his school grades strong—especially in science and math—participate in physical activities to build fitness, and continue
    developing responsibility through regular chores and community service projects.
