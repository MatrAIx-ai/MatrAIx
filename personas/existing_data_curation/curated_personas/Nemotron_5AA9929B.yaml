personas:
  professional: Sabrina Evans is a research‑focused teaching assistant in the humanities, adept at literary analysis, curriculum design, and digital pedagogy, who channels their high emotional intelligence
    and preference for solitude into nurturing students through one‑on‑one mentorship and thoughtfully crafted interdisciplinary workshops.
  sports: Sabrina Evans enjoys low‑impact fitness like sunrise yoga sessions at the Detroit Riverwalk and weekly jogs with the Riverfront Runners club, while also following the Detroit Tigers and Detroit
    Red Wings as relaxed spectator sports fans.
  arts: Sabrina Evans immerses themselves in watercolor painting of the Detroit waterfront, draws inspiration from jazz greats like Miles Davis and soul icons such as Aretha Franklin, finds resonance in
    spoken‑word performances by poet Sarah Kay, and appreciates the visual artistry of Claude Monet and Georgia O'Keeffe.
  travel: Sabrina Evans prefers thoughtful, low‑stress getaways, often planning weekend trips to nearby Mackinac Island or the Upper Peninsula’s lighthouses, and dreams of a solo photography expedition
    to the dramatic fjords of Norway after saving enough through careful budgeting.
  culinary: Sabrina Evans enjoys cooking simple yet flavorful meals, frequently preparing lemon‑ricotta pancakes with fresh Michigan cherries and a side of roasted asparagus drizzled with balsamic glaze,
    while savoring occasional fine‑dining experiences such as a mushroom‑truffle risotto at a downtown restaurant.
  core: Sabrina Evans is a quietly driven scholar‑artist whose intense inner world fuels both meticulous academic work and a habit of over‑analyzing every coffee order, yet they find solace in the steady
    rhythm of watercolor brushes and mindful breathing.
background:
  cultural: Sabrina is an African American raised in Grosse Pointe, Michigan, a suburb with a predominantly white demographic where her family has long valued education and cultural preservation. Her grandparents
    migrated north during the Great Migration, bringing Southern traditions, storytelling, and a deep appreciation for African American music, literature, and visual arts. Growing up, she attended a predominantly
    White high school but remained connected to the larger Detroit Black community through church, local cultural festivals, and family gatherings that celebrated Black heritage. This dual exposure shaped
    her understanding of cultural hybridity and inspired her academic focus on African diaspora studies. She actively participates in community events like Juneteenth celebrations, supports local Black
    artists, and incorporates the rich tapestry of her heritage into her teaching and creative work.
attributes:
  skills: '["Academic research", "Critical literary analysis", "Curriculum development", "Lesson planning", "Student mentorship", "Academic counseling", "Digital learning platforms (Canvas, Blackboard)",
