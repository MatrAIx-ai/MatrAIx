  hobbies: '["Reading contemporary Black literature", "Watercolor painting", "Sketching", "Curating personal photo essays", "Listening to jazz and soul music", "Writing poetry and reflective essays", "Mindfulness
    meditation", "Gentle yoga", "Volunteering at after‑school art clubs", "Visiting museum exhibitions during quiet hours", "Participating in Black History Month community events"]'
  career_goals: Sabrina aims to pursue a PhD in African American Studies or Art History within the next five years, with the long‑term goal of securing a tenure‑track professorship at a liberal‑arts college
    where she can design interdisciplinary courses that blend art, cultural theory, and mental‑health awareness. She is passionate about publishing scholarship on African diaspora visual culture and intends
    to develop a community‑based art program that provides creative outlets for under‑served youth in Detroit. Parallel to her professional aspirations, she seeks to cultivate sustainable coping strategies
    for her own anxiety and emotional reactivity, prioritizing self‑care while fostering inclusive, supportive academic environments.
