background:
  cultural: Edison is the child of Puerto Rican parents living in Phoenix, Arizona. His family maintains strong ties to Puerto Rican heritage through language, food, and traditions. Daily life includes
    bilingual communication, with Spanish spoken at home alongside English, facilitating cultural fluency. He celebrates Puerto Rican holidays such as Día de la Constitución and enjoys traditional dishes
    like mofongo and arroz con gandules prepared by his grandparents. The multicultural environment of Phoenix allows him to blend island customs with Southwestern influences, fostering a harmonious cultural
    identity that values hospitality, family cohesion, and community involvement.
