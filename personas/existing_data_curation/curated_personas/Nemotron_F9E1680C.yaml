personas:
  professional: Elena Park, a 36‑year‑old master housekeeper with a knack for eco‑friendly deep cleaning and meticulous organization, leverages their precision, artistic eye, and disciplined scheduling
    to orchestrate seamless household operations while mentoring junior staff and preparing for a future as a property manager of a Gulf‑Coast boutique resort.
  sports: Elena Park, a dedicated supporter of the Tampa Bay Buccaneers and Miami Heat, spends their early mornings paddle‑boarding along Anna Maria Island, joins the Sarasota Beach Volleyball Club each
    summer, and incorporates gentle yoga twice a week to sustain flexibility for their physically demanding housekeeping duties.
  arts: Elena Park, an enthusiastic patron of the Ringling Museum of Art, draws artistic inspiration from Monet, Frida Kahlo, and contemporary Floridian muralist Joy McKeen, regularly sketches watercolor
    coastal scenes, curates a rotating home gallery of affordable prints by emerging Gulf artists, and volunteers as a co‑facilitator at community art workshops, where they share their love of color and
    composition.
  travel: Elena Park, who favors low‑key, eco‑conscious getaways, regularly explores Sarasota’s cultural districts and the tranquil beaches of Anna Maria Island, takes annual weekend road trips to historic
    Savannah, and dreams of a spring vacation in Seville’s orange‑grove neighborhoods, always planning itineraries with a digital travel app and budgeting ahead to fund both personal enrichment and future
    business travel, ensuring they stay within their carefully set travel budget.
  culinary: Elena Park, an adventurous home cook, blends Southern comfort with Latin zest by preparing jambalaya‑style arroz con pollo, collard greens sautéed with chorizo, shrimp étouffée tacos, and banana‑infused
    key lime pie, favoring ingredients such as smoked paprika, plantains, fresh cilantro, and Gulf shrimp, while sourcing produce from the local farmers’ market and experimenting with spice blends in their
    backyard kitchen.
  core: Elena Park, a meticulously organized professional with a secret stash of tropical houseplants, habitually aligns everything by color, balances a disciplined work ethic with spontaneous bursts of
    artistic flair, and occasionally procrastinates on filing taxes despite their otherwise strict schedules.
background:
  cultural: Elena grew up in the Suncoast region of Florida, a predominantly white, middle-class community where Southern hospitality and a lively arts culture intersect. Her family values of discipline,
    order, and a strong work ethic reflect a traditional American ethos, while living in Bradenton has immersed her in the multicultural flavors of Gulf Coast life—including Latin American cuisine, Caribbean
    rhythms, and a tourism-driven economy. She identifies as a White American who embraces the local beach lifestyle, the vibrant art scene, and a commitment to community service.
