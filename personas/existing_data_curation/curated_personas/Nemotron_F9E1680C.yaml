  career_goals: Elena aims to advance from a household cleaner to a property household manager for a high-end estate or boutique resort along Florida's Gulf Coast. She plans to obtain a Certified Professional
    Housekeeper credential and launch an eco-friendly cleaning business that specializes in vacation rentals and private homes in Bradenton. In the long term she envisions building a brand that blends sustainable
    cleaning practices with artistic interior styling, mentoring other women in the cleaning industry, and achieving financial independence to support her family.
