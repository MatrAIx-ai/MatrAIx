  career_goals: Although still young, John imagines a future where he can blend his love of building with helping others. He dreams of becoming an engineer or an environmental scientist, fascinated by how
    structures are designed and how nature can be protected. He also expresses a desire to serve his community, picturing himself as a firefighter or a volunteer who uses his practical skills to solve real‑world
    problems. These aspirations reflect his balance of curiosity, practicality, and compassion.
