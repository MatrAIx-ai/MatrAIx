personas:
  professional: John Maddox is a budding mechanical‑engineer‑in‑training who spends weekends constructing intricate LEGO machines, applying their curiosity and practical problem‑solving to troubleshoot
    missing pieces and improvise designs while their relaxed approach to scheduling lets them experiment freely, even if it leaves a trail of scattered bricks.
  sports: John Maddox is a spirited midfielder for the West Hartford Youth Soccer Club, a fan of the New England Patriots and Boston Red Sox, who also spends summer weekends hiking the Metacomet Trail to
    collect rocks and staying fit with bike rides, showing they enjoy teamwork and outdoor adventure.
  arts: John Maddox is an enthusiastic LEGO builder and budding comic‑strip artist who idolizes LEGO Masters host Nathan Sawaya, draws inspiration from Stan Lee’s dynamic heroes, enjoys the animated series
    Adventure Time, and often recreates favorite scenes with LEGO dioramas while listening to the soundtrack of The Greatest Showman, reflecting they blend visual storytelling with playful construction.
  travel: John Maddox is an eager explorer who loves autumn foliage drives to the Berkshires, has visited Mystic Seaport Museum, dreams of a family road trip to the Grand Canyon, and prefers carefully planned
    day trips with a snack‑filled backpack over spontaneous overseas travel due to school and budget constraints, showing they value both discovery and structure.
  culinary: John Maddox is a budding kitchen helper who can whip up classic mac and cheese with cheddar elbow pasta, loves apple slices dipped in peanut butter, enjoys making rock‑style trail mix with almonds,
    pretzels, and dried cranberries, and proudly bakes chocolate chip cookies with their mother, though they often forget to clean up the flour spill.
  core: John Maddox is a curious, LEGO‑loving ten‑year‑old who balances a love for hands‑on projects with occasional impulse spending, a habit of forgetting to tidy up, and a resilient spirit that turns
    every sneeze into a chance to learn about allergies, showing they turn challenges into learning opportunities.
background:
  cultural: John grows up in a middle‑class, predominantly white neighborhood in West Hartford, Connecticut, a community that values education, outdoor recreation, and civic involvement. His family’s heritage
    traces back to European American roots, likely with a blend of Irish, German, or English ancestry common to the region. The home environment includes participation in New England traditions such as
    celebrating Thanksgiving, enjoying fall leaf‑changing hikes, and attending seasonal community events at the local library and town center. These cultural influences shape his appreciation for both academic
    pursuits and communal activities.
