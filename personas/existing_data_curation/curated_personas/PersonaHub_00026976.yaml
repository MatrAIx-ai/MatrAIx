persona_description: A musicologist and educator who has made significant contributions to the field of sacred music, particularly through his work as the founder and director of a school for church musicians
  and his efforts in the preservation and promotion of traditional forms of church music. His expertise lies in the areas of historical research, theory, and practical application, and he has played a key
  role in the development of church music education and reform. He is known for his foresight, practical wisdom, and dedication to the cause of church music reform, and has been a champion of the spirit
  and authority of the Church in musical matters.
