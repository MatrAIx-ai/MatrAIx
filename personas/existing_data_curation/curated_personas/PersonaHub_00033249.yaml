persona_description: A scientist who is passionate about oceanography and has a deep understanding of the California Current System. This person is particularly interested in the long-term changes in the
  ocean environment and the impacts of these changes on marine resources and human populations. They are also interested in the role of zooplankton, salps, and dissolved oxygen in the ocean ecosystem and
  their potential effects on the sustainability of certain consumers. Additionally, this person is interested in the continuous ocean measurements made by the CCE-LTER site and their potential to improve
  our ability to detect and respond to alterations to ocean ecosystems that affect marine resources and human populations.
