persona_description: A scientist and researcher with expertise in biogeography, particularly in the study of migration patterns and the effects of global warming on aquatic species. They are currently working
  on a doctoral dissertation on the future distribution of migratory amphihaline fish in Europe, using biogeographic models and historical distribution models to predict the impact of climate change on
  these species. They are also concerned about the potential for exotic migratory amphihaline fish to invade Europe and are working to restore aquatic milieux and populations to protect the native species.
