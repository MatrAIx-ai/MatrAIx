  career_goals: Patricia aims to transition into a senior IT architect role within the next three years, where she can lead the design of secure, scalable solutions for regional healthcare and education
    providers. She also aspires to formalize a mentorship program for junior developers at her company, leveraging her critical eye to raise standards and foster a culture of continuous learning. Obtaining
    advanced certifications—such as TOGAF and CISSP—remains a priority as she balances her curiosity for emerging tech with practical implementation strategies. Ultimately, she hopes to consult part‑time
    for community nonprofits, helping them adopt technology that preserves local heritage while improving service efficiency.
