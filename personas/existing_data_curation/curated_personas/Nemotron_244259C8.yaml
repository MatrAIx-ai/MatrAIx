  career_goals: Even at six, Charlene dreams of protecting marine life; she imagines becoming a marine biologist who studies sea turtles, a wildlife rescue worker, a teacher who shares fun science facts,
    or an artist who paints the beach. Her practical side leads her to think about concrete ways to help, such as organizing a beach clean‑up with friends, learning how to protect sand dunes, or creating
    a school project about ocean conservation, while she sometimes worries about doing a good job and wants to practice and learn a lot now.
