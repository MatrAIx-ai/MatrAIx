personas:
  professional: Charlene Boone, an aspiring junior marine biologist who loves collecting shells, rocks, and sea glass, applies keen observational skills and hands‑on curiosity to beach discoveries, while
    their spontaneous streak often leads them to abandon neat cataloging in favor of imaginative storytelling and practical problem‑solving.
  sports: Charlene Boone darts around the boardwalk on their bike for daily cardio, splashes in the community pool’s junior swim lessons, cheers for the Coastal City Pelicans during baseball season, and
    proudly wears the Sea Sprouts Kids’ Beach Soccer Club jersey while practicing sandcastle building as a form of strength training.
  arts: Charlene Boone pours color into dolphin sketches while humming pop hits by Taylor Swift and BTS, enjoys watching Pixar’s Finding Nemo for marine inspiration, and proudly displays a hand‑drawn portrait
    of their favorite Disney princess, Ariel, in their bedroom.
  travel: Charlene Boone loves spontaneous sand‑dune adventures, often packing a small bucket and spade for day trips to nearby Seaside State Beach, dreams of visiting the Great Barrier Reef’s coral lagoons,
    and enjoys occasional family road trips to the historic lighthouse at Cape Point, preferring short, low‑stress outings over long flights.
  culinary: Charlene Boone delights in mixing batter for chocolate‑chip pancakes, prefers crunchy carrot sticks and strawberry slices, and often adds a pinch of sea‑salt to their homemade fruit smoothies,
    proudly serving seaside‑themed snack plates to family.
  core: Charlene Boone is a curious beach‑combing explorer whose boundless imagination is balanced by occasional forgetfulness and a habit of trading treasured shells for extra sticker charts.
background:
  cultural: Charlene lives in Myrtle Beach, South Carolina, a coastal Southern town where family, community, and the beach shape daily life. She attends a public kindergarten that emphasizes kindness, manners,
    and respect for nature. Her family celebrates Southern traditions such as holiday barbecues, church gatherings, and local festivals like Myrtle Beach Bike Week and the Carolina Beach Music Festival.
    She enjoys Southern foods like shrimp po'boys, boiled peanuts, and sweet tea, often found at local restaurants or school events. The warm climate encourages outdoor play, beach trips, and participation
    in community clean‑up days, fostering her early love for marine environments. Her upbringing blends a polite, hospitality‑focused Southern demeanor with a laid‑back beach lifestyle, reinforcing her
    cooperative yet assertive personality.
