personas:
  professional: Mary Cisowski is a secondary‑education curriculum specialist who fuses humanities and visual arts, designing interdisciplinary projects, securing grant funding for after‑school programs,
    and leading teacher workshops, all while balancing meticulous organization with a curiosity‑driven flexibility that fuels innovative lesson planning.
  sports: Mary Cisowski hikes the Sierra foothills with the Sacramento Trail Riders club each spring, practices yoga three times a week for flexibility, follows the Sacramento Kings and San Jose Earthquakes
    for occasional game nights, and prefers low‑key, solo fitness routines over competitive team sports.
  arts: Mary Cisowski explores contemporary galleries such as the Crocker Art Museum’s modern wing, sketches downtown Sacramento’s skyline in a weathered sketchbook, enjoys the ambient piano works of Max
    Richter while reading Virginia Woolf, and occasionally plays Debussy’s Claire de Lune on piano, letting these experiences inform her curriculum designs.
  travel: Mary Cisowski prefers curated cultural trips, having studied the Musée d'Orsay in Paris and trekked the vineyards of Cinque Terra, Italy, she plans weekend solo getaways to nearby Napa Valley
    wineries on a modest budget, while dreaming of a scholarly retreat among Kyoto’s temple gardens.
  culinary: Mary Cisowski experiments with international cuisine, confidently preparing Korean bibimbap with gochujang, Moroccan tagine scented with preserved lemons, and Japanese matcha tiramisu, sourcing
    fresh herbs from the local farmer’s market, yet occasionally over‑salts dishes when lesson planning deadlines loom.
  core: Mary Cisowski blends scholarly rigor with artistic curiosity, channeling calm resilience into transformative curricula while indulging in sketching, hiking, and culinary experiments, all managed
    through a disciplined yet occasionally impulsive approach to finances.
background:
  cultural: Born and raised in the Sacramento suburbs, Mary Lynn is a White American of European descent who grew up in a middle-class family that valued education and community involvement. The progressive
    West Coast educational environment and the region’s rich agricultural and artistic heritage shaped her appreciation for both traditional humanities and innovative, experiential learning. While she identifies
    with mainstream American cultural norms, her experiences in a diverse California community have fostered an openness to varied cultural expressions and a commitment to inclusive arts education.
attributes:
  skills: '[''Teaching English Literature'', ''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Art Integration'', ''Digital Media Tools'', ''Grant Writing'', ''Student
