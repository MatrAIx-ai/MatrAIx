  hobbies: '[''Visiting art galleries'', ''Sketching urban landscapes'', ''Reading literary fiction and philosophy'', ''Journaling'', ''Hiking in the Sierra foothills'', ''Yoga and meditation'', ''Cooking
    international dishes'', ''Small book club participation'', ''Playing piano'', ''Museum education volunteering'']'
  career_goals: She aims to become the lead curriculum coordinator for the arts within the Sacramento City Unified School District, expanding interdisciplinary art-history-literature initiatives and securing
    sustainable funding for after-school art programs. Mary Lynn also aspires to publish research on the impact of arts integration on student resilience, present at national education conferences, and
    eventually assume an administrative role—such as department chair or principal—focused on fostering a creatively driven school culture while maintaining a balanced personal life.
