    Football (Dallas Cowboys)'', ''Gardening'', ''Landscape Photography'']'
  career_goals: He aims to advance to a senior engineering management role where he can lead strategic sustainability initiatives and drive digital transformation in manufacturing. Over the next five years,
    Andrew plans to obtain his Professional Engineer (PE) license, broaden his expertise in IoT‑enabled systems, and eventually take on a director‑level position that blends technical leadership with operational
    strategy. He also envisions launching a consultancy focused on lean, eco‑friendly production practices.
