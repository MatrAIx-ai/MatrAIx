  career_goals: David aspires to become an engineering professional who can blend his curiosity for technology with a practical commitment to environmental stewardship. He envisions studying civil or environmental
    engineering at a top university, eventually working on sustainable infrastructure projects that protect the Bay Area's natural habitats. In the shorter term, he plans to deepen his programming skills,
    earn certifications in robotics, and participate in science fairs to build a strong academic portfolio. He also hopes to mentor younger students in STEM clubs, reflecting his cooperative yet assertive
    nature.
