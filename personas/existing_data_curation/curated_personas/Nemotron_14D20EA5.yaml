personas:
  professional: David Putnam, a 13‑year‑old robotics enthusiast, blends curiosity with practicality by leading his school’s robotics club, programming autonomous bots for competitions, and designing intricate
    Minecraft redstone circuits, all while applying their organized, methodical approach to every project.
  sports: David Putnam, an avid cyclist who rides with the Marin Youth Cycling Club, hikes the Bay Area’s tide‑pools and trails, seasons his activities with participation in a junior soccer league, and
    cheers for the Golden State Warriors and San Francisco 49ers, exemplifies their love for both individual adventure and team sport.
  arts: David Putnam, who practices piano pieces ranging from Beethoven’s Moonlight Sonata to Debussy’s Clair de Lune, builds redstone contraptions inspired by Mumbo Jumbo’s tutorials, and listens to Hans
    Zimmer’s cinematic scores, showcases how their artistic pursuits harmonize with their technical curiosity.
  travel: David Putnam, after exploring Marin County’s Muir Woods and Point Reyes, dreams of visiting the Kennedy Space Center in Florida and attending a robotics expo in Tokyo, prefers carefully planned
    itineraries that blend nature hikes with tech‑focused destinations, and often saves for family road trips to places like Yosemite.
  culinary: David Putnam, who favors high‑energy trail mix with almonds, dried cranberries, and dark chocolate, enjoys cooking simple quinoa stir‑fry with broccoli and soy sauce, and occasionally experiments
    with homemade sushi rolls after watching online tutorials, reflects a moderate cooking skill set oriented toward nutritious, on‑the‑go meals.
  core: David Putnam is a methodical teen who balances weekend hikes and robot building with piano practice, yet sometimes forgets to charge their smartwatch before a long bike ride.
background:
  cultural: David grows up in an affluent, progressive community in Belvedere-Tiburon, Marin County, where environmental awareness and academic achievement are highly valued. His family's cultural norms
    emphasize education, community service, and an appreciation for the natural beauty of the Bay Area. He is exposed to a diverse set of perspectives through school programs and local cultural events,
    fostering an inclusive outlook while maintaining traditions rooted in his white, middle-class American heritage. This background shapes his pragmatic curiosity, organized work ethic, and dedication
    to sustainable living.
