  hobbies: '[''Softball league'', ''Volleyball group'', ''Community festivals'', ''Salsa and line dancing'', ''Weekend hiking'', ''Street photography'', ''Mystery and thriller novels'', ''Cooking experimental
    dishes'', ''Karaoke nights'', ''Board‑game gatherings'']'
  career_goals: Tracy aims to advance into a supervisory role within the dispatch center, ultimately becoming a shift supervisor and later a training coordinator for new telecommunicators. She plans to
    obtain a Certified Emergency Services Dispatcher (CESD) credential and pursue an associate‑level certification in emergency management to broaden her expertise. Long‑term, she dreams of contributing
    to community outreach initiatives that educate residents about emergency preparedness and fostering mentorship programs for at‑risk youth interested in public safety careers.
