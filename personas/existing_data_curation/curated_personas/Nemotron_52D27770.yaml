personas:
  professional: Roger James, a 14‑year‑old aspiring illustrator, combines meticulous planning with a vivid imagination, channeling their curiosity and love for graphic novels into detailed sketches and
    digital art projects that they share in school exhibitions, while their reserved nature drives them to work independently and their emotionally reactive side fuels intense, expressive storytelling.
  sports: Roger James, a fan of the Kansas City Chiefs and the St. Louis Cardinals, participates in the Liberty Youth Soccer Club during the fall, joins the middle‑school cross‑country team in the spring,
    and spends their free weekends hiking the local park trails to sketch nature scenes, favoring low‑impact exercise over crowded gym sessions.
  arts: Roger James, an avid sketcher and digital creator, draws inspiration from the storytelling of Neil Gaiman, the line work of Alan Moore, and the animation of Studio Ghibli, regularly attends the
    Liberty community art center’s weekend workshops, contributes to the school’s literary magazine, and eagerly anticipates the annual Midwest Comic Con where they meet fellow creators.
  travel: Roger James, who prefers meticulously planned road trips with their family, has explored St. Louis’s City Museum and the Ozark National Forest, dreams of visiting Kyoto to experience authentic
    manga culture, and balances their limited teenage budget by saving for occasional weekend getaways to nearby lakes for sketching retreats.
  culinary: Roger James, a modest home‑cook with a knack for simple comfort foods, whips up grilled cheese sandwiches with extra sharp cheddar and a dash of smoked paprika, delights in ordering Kansas City‑style
    burnt‑end ribs on family outings, and occasionally experiments with sushi rolls after reading about Japanese cuisine in their favorite graphic novels.
  core: Roger James, a 14‑year‑old introverted artist, channels their curiosity, organized mindset, and intense emotions into vivid sketches while cautiously managing their allowance and battling frequent
    anxiety.
background:
  cultural: Roger grew up in Liberty, Missouri, a suburban community in Clay County characterized by Midwestern values of friendliness, modesty, and community involvement. His family maintains traditions
    typical of small-town white households in the region, such as seasonal community festivals, church gatherings, and local sports events, though his personal interests lean more toward artistic and introspective
    pursuits. The cultural environment emphasizes education, respect for others, and a supportive neighborhood network, which aligns with Roger's cooperative nature and desire for harmonious interactions.
    Exposure to local museums, public library programs, and school art initiatives has nurtured his appreciation for diverse artistic expressions while reinforcing his sense of belonging within a close-knit,
    culturally familiar setting.
