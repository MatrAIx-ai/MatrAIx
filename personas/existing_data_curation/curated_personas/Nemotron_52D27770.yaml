  career_goals: Roger aspires to become a professional visual storyteller, envisioning a future as a concept artist or graphic novelist where he can combine his love for art and narrative. He also dreams
    of studying at a university with a strong fine arts program, eventually working in the video game industry as a character designer or animator. Because he values harmony and helping others, he hopes
    to mentor younger students in art clubs or community workshops, using his skills to foster creativity in safe, supportive environments. He seeks a career that offers a balance of solitary creative work
    and occasional collaborative projects, allowing him to manage his anxiety while contributing meaningfully.
