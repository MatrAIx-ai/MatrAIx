persona_description: A professional psychologist who conducts exploratory and confirmatory factor analyses to examine the measurement and dimensions of a new scale, the Money Ethic Scale (MES), using a
  sample of mental health workers. The psychologist is interested in understanding the independent and dependent constructs of the MES and how it relates to organizational citizenship behavior, job satisfaction,
  and organizational commitment. The psychologist is also interested in the limitations of the studies and how they can be addressed to improve the validity and reliability of the MES.
