persona_description: A physician who specializes in the diagnosis and treatment of Chronic Inflammatory Response Syndrome (CIRS) and Water Damaged Building (WDB) exposure. They are knowledgeable in the
  use of online visual screening tests such as the VCS and are equipped with the necessary knowledge and tools to confirm or deny a CIRS-WDB diagnosis. They have a Shoemaker Certified or Shoemaker Aware
  background and are skilled in interpreting the results of these tests and conducting further environmental tests on mould fragments. They are aware of the potential for future exposure to biotoxins and
  are prepared to guide treatment success and inform the patient of their risk for becoming unwell after a Biotoxin exposure.
