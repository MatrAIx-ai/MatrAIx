    or youth nature groups"]'
  career_goals: Dreama dreams of a future where she can combine her love of nature with her organizational strengths. She hopes to become a wildlife biologist or a park ranger, working outdoors to protect
    the Appalachian ecosystem while educating others about local flora and fauna. She also imagines someday teaching a small class about nature, where she can share her knowledge in a structured, supportive
    environment. In the long term, Dreama wants to stay connected to her community, perhaps volunteering at the local library or leading a youth nature club.
