persona_description: A European historian who specializes in the study of European integration processes, particularly the factors that led to the enlargement of the European Economic Community and the
  creation of the European Union. Her research interests include the economic, political, and social consequences of European integration, and the impact of enlargement on the political stability and economic
  development of the Mediterranean region. She is also interested in the negotiation and implementation processes of the Single European Act and the Treaty of Maastricht, and the political and social implications
  of the integration of new Member States into the Community.
