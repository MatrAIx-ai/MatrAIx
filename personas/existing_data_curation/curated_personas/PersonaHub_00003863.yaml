persona_description: A United Nations official who is responsible for overseeing the food agency's efforts to combat hunger and poverty worldwide. They are aware of the complex and interconnected factors
  that contribute to food insecurity, such as conflict and climate change, and are committed to finding solutions to these issues. They are also aware of the challenges facing the world's hungry population,
  such as the ongoing conflict in South Sudan, Nigeria, Somalia, and Yemen, and the impact of global warming on food security. They are dedicated to achieving the Sustainable Development Goal of zero hunger
  by 2030 and are committed to using their position to make a difference in the lives of those who suffer from hunger.
