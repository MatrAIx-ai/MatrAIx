  hobbies: '[''Reading historical fiction and biographies'', ''Gardening (seasonal planting)'', ''Attending art workshops'', ''Jazz and blues listening'', ''Walking along the St. Clair River'', ''Small
    book club participation'', ''Knitting scarves for charity'', ''Community gospel music events'']'
  career_goals: Although retired from formal employment, Shawana aims to remain an active elder voice in Port Huron. She plans to complete her GED to formalize her education, volunteer as a mentor at the
    local cultural center, and lead a small workshop series on oral history and crafts for youth. She also aspires to write a memoir chronicling her family's migration story and the evolution of the local
    African American community. Learning a new artistic medium, such as pottery, and advocating for improved senior services and accessible art programs are among her long‑term ambitions.
