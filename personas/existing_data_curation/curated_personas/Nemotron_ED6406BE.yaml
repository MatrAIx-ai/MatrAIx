personas:
  professional: Shawana Yarborough, a retired community storyteller turned senior mentor, leverages their curiosity, knack for oral history, and relaxed approach to obligations to lead informal workshop
    series on crafts and local history at the Port Huron Cultural Center, while navigating the occasional disorganization of scheduling with flexible, small‑group sessions.
  sports: Shawana Yarborough enjoys leisurely walks along the St. Clair River and participates in the local senior walking club, roots for the Detroit Tigers and Detroit Lions, and follows the Port Huron
    Northern Lights high school hockey team, while preferring low‑impact stretching over organized sports.
  arts: Shawana Yarborough engages in mixed‑media painting at the Port Huron Museum of Arts, draws inspiration from Georgia O'Keeffe, Claude Monet, and Basquiat, tunes into Ella Fitzgerald, John Coltrane,
    and B.B. King during studio sessions, and weaves their storytelling flair into quilt designs that echo the improvisational spirit of jazz.
  travel: Shawana Yarborough favors relaxed road trips to nearby historic sites like Mackinac Island and the Motown Museum in Detroit, dreams of a culturally rich pilgrimage to New Orleans for its jazz
    heritage and to Savannah’s historic districts, and plans each journey with flexible itineraries that balance limited senior travel discounts with occasional visits from adult grandchildren.
  culinary: Shawana Yarborough, an adept home cook, blends soulful dishes such as collard greens, smoked turkey, sweet potato pie, and Midwestern apple‑cabbage stew, often seasoning with smoked paprika
    and fresh thyme, and enjoys cooking for community potlucks while occasionally over‑seasoning in their experimental fusion attempts.
  core: Shawana Yarborough embodies a curious, relaxed elder who weaves storytelling, gardening, and art into community life, even if occasional forgetfulness and a penchant for spontaneous craft splurges
    keep their days delightfully unpredictable.
background:
  cultural: Shawana is the daughter of parents who moved north from the Deep South during the Great Migration, settling in Michigan's industrial corridor. She grew up immersed in African American church
    traditions, gospel music, and communal storytelling, which shaped her identity and values. Her family maintains oral histories of civil‑rights activism and the challenges of adapting to life in the
    Midwest. In Port Huron, she is part of a close‑knit Black community that celebrates its heritage through food, music, and cultural festivals. Her cultural outlook blends Southern culinary roots with
    Midwestern sensibilities, and she remains connected to broader Black artistic movements through local museum programs and online forums.
attributes:
