  hobbies: '[''herb gardening'', ''wine tasting and pairing'', ''folk dancing (salsa, Andean)'', ''acoustic guitar'', ''hiking'', ''river fishing'', ''farmers market visits'', ''reading culinary memoirs'',
    ''watching cooking competitions'', ''volunteering at cultural festivals'']'
  career_goals: Michael aims to open a family‑run restaurant in Santa Rosa that showcases sustainable cuisine rooted in his Latin American Indian heritage while highlighting the region’s wines. He plans
    to write a cookbook that documents his grandmother’s recipes and his own adaptations, and to host regular cooking classes for the local community. Over the next five years he hopes to achieve a Michelin
    Guide "Bib Gourmand" recognition, expand his kitchen team to include apprentices from underserved backgrounds, and become a culinary consultant for local farms seeking to develop value‑added products.
