  hobbies: '[''Hiking in the Ozarks'', ''Community volunteering'', ''Book club'', ''Line dancing'', ''DIY natural cleaning product experimentation'', ''Vegetable gardening'', ''Yoga'', ''Gratitude journaling'',
    ''Listening to classic pop music'']'
  career_goals: Gladys aims to become a lead housekeeper or facilities manager within the next three to five years, leveraging her meticulous organization and reliability. She plans to obtain certification
    in green cleaning and occupational safety, then advance to supervising a team of cleaners at a larger property or hotel. Ultimately she aspires to open her own eco‑friendly cleaning service in the Ozarks,
    differentiating herself through rigorous standards and innovative, low‑impact products. She views these goals as a pragmatic path to financial security and personal fulfillment.
