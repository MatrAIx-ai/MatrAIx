personas:
  professional: A detail‑oriented housekeeper with a knack for eco‑friendly product formulation, Gladys Page leverages their methodical scheduling skills and competitive drive to train new staff, maintain
    immaculate standards, and streamline inventory for a boutique resort in the Ozarks, while remaining skeptical of shortcuts that could compromise quality.
  sports: An active outdoor enthusiast, Gladys Page regularly hikes the Ozark Trail with the local Ozark Trail Enthusiasts Club, participates in weekly line‑dancing cardio sessions, roots for the St. Louis
    Cardinals in baseball and the Kansas City Chiefs in football, and they occasionally join a community‑center volleyball league to stay fit.
  arts: A culturally grounded arts lover, Gladys Page spends evenings listening to classic pop icons such as The Beatles, Fleetwood Mac, and ABBA while also cheering on the local community theater’s productions
    of classic American plays, and they occasionally draw inspiration from country‑pop stars like Dolly Parton and Carrie Underwood for their line‑dancing routines.
  travel: An adventurous but budget‑mindful planner, Gladys Page enjoys weekend road trips to nearby natural gems such as the Great Smoky Mountains and Arkansas’ Hot Springs National Park, has already explored
    Nashville’s music scene, and they dream of a future hiking expedition through Colorado’s Rocky Mountain National Park while they balance travel costs against their savings goals.
  culinary: A home‑cooking enthusiast, Gladys Page delights in turning garden tomatoes, zucchini, and fresh basil into a rustic Caprese salad and simmering a hearty vegetable soup with rosemary and thyme,
    while they also occasionally treat themselves to a sizzling fried chicken and buttermilk biscuit dinner at the local diner, reflecting a blend of farm‑to‑table simplicity and classic Midwestern comfort.
  core: Gladys Page is a meticulous, eco‑focused housekeeper whose competitive streak drives them to perfect every clean, while a lingering anxiety fuels their habit of double‑checking schedules and they
    indulge in line dancing that balances seriousness with spontaneous joy.
background:
  cultural: Gladys was raised in a small, predominantly white community in Mountain View, Shannon County, Missouri. Her family emphasized hard work, modesty, and community service, typical of Midwestern
    rural culture. She grew up attending a local Methodist church, participating in town fairs, and learning practical skills from her parents, such as cooking, gardening, and caring for the home. The Ozarks
    environment fostered a deep respect for nature and self‑sufficiency, while the close‑knit town life cultivated her outgoing, sociable nature. Though she identifies with mainstream American culture,
    she also values the regional traditions of the Missouri Ozarks.
attributes:
  skills: '[''Residential cleaning'', ''Deep‑cleaning techniques'', ''Eco‑friendly cleaning product formulation'', ''Linen and laundry management'', ''Inventory control'', ''Task scheduling and coordination'',
