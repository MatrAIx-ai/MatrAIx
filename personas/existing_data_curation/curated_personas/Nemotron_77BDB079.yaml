personas:
  professional: Scott Scarbrough, a senior creative‑technologist‑in‑the‑making, they leverage their STEM expertise and stage‑craft charisma to design and execute immersive, tech‑enhanced live productions,
    from interactive lighting rigs programmed in Python to AR experiences that respond to audience feedback, while juggling project‑management discipline with a flair for spontaneous improvisation that
    keeps crews engaged and safe.
  sports: Scott Scarbrough, an avid outdoor enthusiast, they spend weekends trekking the rolling trails of Pike County and playing pick‑up ultimate frisbee with the local Ridge Runners club, while cheering
    for the Tennessee Titans in the NFL and the Nashville Predators in the NHL, and they participate in an annual charity 5K that raises funds for arts education.
  arts: Scott Scarbrough, a regular at the Black Box Experimental Theatre and the local Improv Collective, they create abstract canvases reminiscent of Jackson Pollock’s drip technique and program generative
    visual loops inspired by Refik Anadol, while curating immersive installations for community festivals and citing performance artists like Marina Abramović as sources of inspiration.
  travel: Scott Scarbrough, whose wanderlust blends meticulous research with spur‑of‑the‑moment detours, they have hiked the Appalachian Trail sections in Tennessee, attended the Edinburgh Fringe Festival
    seeking avant‑garde performances, and they dream of exploring Japan’s neon‑lit Akihabara for inspiration, all while balancing studio costs and family responsibilities.
  culinary: Scott Scarbrough, a self‑taught home chef, they regularly host themed dinner parties featuring smoked brisket glazed with bourbon maple, artisanal cheese boards heavy on aged gouda and manchego,
    and experimental molecular dishes like basil‑infused agar spheres, while maintaining a pantry stocked with locally sourced sweet potatoes, heirloom tomatoes, and smoked paprika.
  core: Scott Scarbrough, a 49‑year‑old technophile‑artist, they blend relentless curiosity for interactive tech with a flamboyant social streak, juggling midnight DIY rigs and weekend hikes while compulsively
    collecting vintage synthesizer knobs and occasionally over‑booking their calendar.
background:
  cultural: Scott grew up in Pleasant Hill, a small Midwestern town in Illinois, where community gatherings like county fairs, high‑school sports, and church socials shaped his early worldview. The region's
    emphasis on self‑reliance, modesty, and neighborly support remains a touchstone for him, even as his career has taken him into more cosmopolitan entertainment circles. His white, largely Protestant
    Midwest upbringing imparts a pragmatic work ethic and a fondness for Americana, yet his curiosity and exposure to diverse artistic subcultures have broadened his cultural palate, allowing him to blend
    traditional values with avant‑garde creative expression.
attributes:
  skills: '[''Audio‑Visual Equipment Operation'', ''Live Lighting Design'', ''Python Scripting for Interactive Installations'', ''Arduino/Raspberry Pi Prototyping'', ''Data Analysis of Guest Feedback'',
    ''Event Planning and Coordination'', ''Public Speaking and MC-ing'', ''Crowd Management'', ''Customer Service Excellence'', ''Creative Concept Development'', ''Agile Project Management'']'
  hobbies: '[''Experimental Theater and Improvisation'', ''Abstract Painting and Digital Generative Art'', ''Arduino/Raspberry Pi Interactive Installations'', ''Reading Speculative Fiction and Philosophy'',
    ''Strategic Board Games (Go, Settlers of Catan)'', ''Hiking in Pike County'', ''Hosting Themed Dinner Parties'', ''Attending Live‑Music and Folk Festivals'', ''Maker Meetups and DIY Electronics'']'
  career_goals: Scott aims to transition from front‑line entertainment attendant to a senior creative‑technologist role, eventually directing immersive, tech‑enhanced live productions. He envisions launching
    his own boutique production company that melds AR/VR, interactive lighting, and narrative storytelling for festivals and themed attractions. Over the next five years, he plans to lead a cross‑functional
    team, secure patents for novel audience‑interaction systems, and become a recognized speaker at industry conferences on the convergence of STEM and performance art. Financially, he seeks to build a
    stable post‑divorce foundation that supports a personal studio space for continual experimentation.
