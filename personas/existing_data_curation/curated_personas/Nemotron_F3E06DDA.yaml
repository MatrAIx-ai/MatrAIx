  career_goals: Marlene dreams of caring for animals as a veterinarian, inspired by her love for pets and wildlife. She also imagines becoming an artist or illustrator who brings stories to life with pictures.
    She sees herself learning more about science in school, exploring nature, and later combining her artistic talent with scientific knowledge to create educational wildlife illustrations.
