persona_description: A researcher and engineer working on the development of electric buses and hybrid systems, specifically focusing on the dual battery system. They are part of the Federal Transit Administration's
  research project with the Northeast Advanced Vehicle Consortium, funded by the National Fuel Cell Bus Program. They are skilled in combining the best attributes of sodium and lithium batteries into a
  single system to optimize performance and reduce cost. Their expertise includes the trade-offs between power and energy storage in batteries, and the potential benefits of a dual battery system in reducing
  the cost of battery systems for larger vehicles. They are passionate about the electrification of transportation and the potential for a more sustainable future.
