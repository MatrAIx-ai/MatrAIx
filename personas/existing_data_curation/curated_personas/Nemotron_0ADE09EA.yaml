  career_goals: At 60, Brandon is focused on transitioning from a front‑line sales role to a leadership position that leverages his experience and curiosity. His primary goal is to become a store manager
    within the next two years, where he can shape merchandising strategies and drive team performance. Concurrently, he plans to launch a small consulting practice that helps independent retailers adopt
    digital tools and streamlined inventory processes. Over the longer term, he hopes to mentor aspiring retail professionals through a local community college or vocational program, sharing practical knowledge
    while staying engaged with the evolving industry.
