  hobbies: '[''Hiking'', ''Landscape Photography'', ''Woodworking'', ''Reading (History, Business, Retail Trends)'', ''Chess'', ''Community Volunteering (Library, Local Food Bank)'', ''Cross‑Country Skiing'',
