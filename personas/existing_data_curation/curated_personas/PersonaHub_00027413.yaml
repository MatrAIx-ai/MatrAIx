persona_description: A scholar and writer who is known for his prolific contributions to the field of natural history and his extensive writings on various topics such as astronomy, physics, morals, and
  history. He is a strong supporter of the Catholic Church and an opponent of the philosophy of Occam. Konrad von Megenberg's writings have been widely read and are still of importance for the history of
  culture. He was born in Mainberg, near Schweinfurt, Bavaria, on 2 February, 1309, and died in Ratisbon, on 11 April, 1374.
