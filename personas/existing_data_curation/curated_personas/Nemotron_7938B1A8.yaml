  hobbies: '[''Heirloom vegetable gardening'', ''Birdwatching at Matherson State Park'', ''Reading historical fiction and biographies'', ''Genealogy research'', ''Knitting and quilting'', ''Bridge (card
    game) at the senior center'', ''Volunteering as a financial archive assistant at Cortland Public Library'', ''Walking on local nature trails'']'
  career_goals: While transitioning toward semi‑retirement, Angela aims to leverage her expertise to support local nonprofits by providing pro‑bono bookkeeping and financial consulting. She hopes to obtain
    the Certified Bookkeeper designation to formalize her knowledge, mentor younger accounting professionals through a community college program, and compile a practical guide on small‑business bookkeeping
    for senior entrepreneurs. Additionally, she wishes to volunteer as a financial archivist for the Cortland Public Library, preserving historical financial records that reflect the city’s economic heritage.
