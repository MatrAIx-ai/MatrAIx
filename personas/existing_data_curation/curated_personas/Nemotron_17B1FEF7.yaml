  hobbies: '[''building sandcastles at the beach'', ''drawing and coloring with crayons and watercolors'', ''singing and dancing to music'', ''pretend play with dolls and stuffed animals'', ''playing simple
    board games with peers'', ''watching educational cartoons about art and nature'']'
  career_goals: Even at four, Alexis dreams of growing up to become a painter who fills large canvases with bright colors, or a musician who can play the piano and share songs with friends. She is eager
    to travel to new places, especially beaches and museums, and imagines herself leading a creative team someday. Her competitive streak pushes her to aim to win little art contests at preschool, and she
    often declares that she will be the 'best artist' in her class. She views school and future work as exciting adventures where she can keep exploring new ideas.
