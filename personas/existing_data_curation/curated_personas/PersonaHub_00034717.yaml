persona_description: A public health researcher who specializes in the analysis and interpretation of epidemiological evidence for the development of health policy. This person is familiar with the use
  of IPM models and the DisMod and DisMod II software for analyzing empirical data. They have experience with the limitations and potential issues associated with the use of epidemiological evidence in
  health planning, including inconsistencies in incidence, prevalence, and mortality data. They are interested in developing valid and internally consistent epidemiological estimates to inform health policy
  decisions.
