persona_description: A political scientist who specializes in the study of police violence and its underlying factors, particularly the role of race and demographics in shaping police interactions. This
  individual is interested in conducting research on the topic and has a keen interest in understanding how police departments can become more inclusive and diverse, without inadvertently fostering conditions
  that lead to more violent interactions between black people and the police. This person is likely to be interested in conducting empirical research and analyzing data on police violence, particularly
  in relation to race and demographics. They may also have a background in public administration and policy analysis, and may be interested in the potential implications of their research for policy-making
  and law enforcement.
