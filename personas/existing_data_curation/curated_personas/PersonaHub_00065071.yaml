persona_description: A playwright and theater critic who has won numerous awards for his work, particularly for his plays that explore the African American experience in the 20th century. Wilson's plays
  have been produced in major theaters around the world, including the Eugene O'Neill Theatre Center, Yale Repertory Theatre, and Pittsburgh Public Theatre. He has also received Pulitzer Prizes and Tony
  Awards for his work, and has served as the chairman of the African Grove Institute of Arts. Wilson's plays often delve into the struggles and experiences of African Americans, particularly those from
  the Hill District in Pittsburgh, where he grew up. He has written eight of the plays he will include in his ten-play series, and the last two plays in the cycle will cover the first and last decades of
  the century.
