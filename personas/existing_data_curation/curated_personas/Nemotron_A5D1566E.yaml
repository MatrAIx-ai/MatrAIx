personas:
  professional: Erik Mosley, an 18‑year‑old aspiring museum curator, leverages strong research abilities, meticulous project planning, and proficiency with Zotero and Evernote to volunteer at Dayton’s public
    library reading program while actively seeking an internship at the Dayton Historical Society to translate his curiosity about Ohio’s regional heritage into practical curatorial experience.
  sports: Erik Mosley, an 18‑year‑old who prefers low‑key fitness, hikes the trails of Cedar Point Park on weekends, joins the Dayton Outdoor Enthusiasts running club for seasonal 5K events, and follows
    the Dayton Flyers basketball team and the Cincinnati Reds as his primary sports affiliations.
  arts: Erik Mosley, an 18‑year‑old literature aficionado and budding photographer, curates a small vintage vinyl collection featuring Bob Dylan, The Beatles, and Miles Davis, writes reflective poetry inspired
    by Emily Dickinson, studies the black‑and‑white compositions of Ansel Adams, and frequents the Dayton Art Institute to admire works by Edward Hopper.
  travel: Erik Mosley, an 18‑year‑old who plans trips with methodical precision, spends school breaks exploring historic sites such as Gettysburg, taking a weekend road‑trip to Chicago’s Museum of Science
    & Industry, and embarking on a low‑budget backpacking tour of Boston’s Freedom Trail, while dreaming of a future study‑abroad semester in Edinburgh to deepen his public‑history perspective.
  culinary: Erik Mosley, an 18‑year‑old home‑cooking enthusiast, enjoys crafting simple yet thoughtful meals like avocado toast with poached eggs, spaghetti carbonara, and homemade tacos seasoned with cumin
    and fresh cilantro, often sourcing local produce from Dayton’s farmers market and sharing his culinary experiments with a close circle of friends.
  core: Erik Mosley, an 18‑year‑old methodical history buff, channels his curiosity into carefully cataloged research and vintage vinyl collections, yet habitually stays up late solving chess puzzles, often
    sacrificing sleep and occasionally forgetting to water his growing houseplants.
background:
  cultural: Raised in Dayton, Ohio, Erik’s cultural upbringing reflects typical Midwestern American values—community orientation, modesty, reliability, and a strong work ethic. His family traces its roots
    to German and Irish ancestry, and he grew up participating in local traditions such as county fairs, holiday parades, and community service events. Attending a liberal arts college in Ohio exposed him
    to a broad range of cultural perspectives, deepening his appreciation for both his own heritage and the diverse narratives that shape American society.
