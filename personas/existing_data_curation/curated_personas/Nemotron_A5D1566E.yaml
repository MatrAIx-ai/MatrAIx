  hobbies: '[''Reading classic literature'', ''Visiting museums and historical sites'', ''Photography (urban and nature)'', ''Chess'', ''Writing poetry'', ''Hiking in nearby parks'', ''Listening to history
    podcasts'', ''Volunteering at a local library'', ''Collecting vinyl records'', ''Cooking'']'
  career_goals: Erik aims to pursue graduate studies in public history or museum studies, seeking an internship at the Dayton Historical Society or a local museum to gain hands‑on experience. His long‑term
    ambition is to become a museum curator or archivist focused on preserving Ohio’s regional heritage, while also developing educational programs that make history accessible to younger audiences. He values
    a stable, meaningful career that blends his curiosity with practical contributions to the community, and he is open to teaching part‑time at a community college or leading workshops on historical research
    techniques.
