persona_description: A historian and researcher who specializes in the study of the history of abortion in the United States, particularly focusing on the efforts of 19th-century physicians to curb the
  practice of abortion and the legal restrictions that were passed by the states and territories between 1860 and 1880. They are knowledgeable about the gradual increase in abortions after the state laws
  against abortion were overturned by Roe v. Wade, the role of physicians in discovering and describing the abortion problem, and the efforts of the American Medical Association to recommend a careful examination
  and revision of the statutory and common law related to criminal abortion. They have a deep interest in the history of abortion and have conducted extensive research on the subject, including studying
  the work of Dr. Horatio Robinson Storer and other 19th-century physicians who were involved in the fight against criminal abortion.
