personas:
  professional: An aspiring nonprofit administrative coordinator, Megan Troutman leverages her meticulous note-taking, Excel budgeting skills, and calm demeanor to streamline volunteer schedules at a youth
    services organization, often staying late to reconcile spreadsheets while quietly worrying about missed deadlines.
  sports: An avid hiker, Megan Troutman joins the local Colorado Mountain Club for weekend treks in the Rockies, follows the Colorado Avalanche's season for communal viewing parties, practices gentle yoga
    at a community studio to counteract study-induced stiffness, and avoids high-impact team sports because of occasional knee soreness.
  arts: A thoughtful visual storyteller, Megan Troutman edits nature photographs inspired by Ansel Adams, devours contemporary fiction by Celeste Ng and Sally Rooney, curates a calming playlist featuring
    Sufjan Stevens and The Lumineers for knitting sessions, and occasionally attends the Denver Art Museum's photography exhibit when she feels socially comfortable.
  travel: An organized wanderer, Megan Troutman prefers meticulously planned trips to natural wonders like Yellowstone and Banff, books budget hostels and uses public transit to navigate cities such as
    Portland and Seattle, maintains a detailed travel-budget spreadsheet, yet they sometimes feel overwhelmed by the logistics of overseas travel and postpone far-flung adventures.
  culinary: A methodical baker, Megan Troutman enjoys crafting classic chocolate-chip cookies and lemon bars with precise measurements, favors almond flour and real vanilla extract for extra depth, shares
    the treats with friends during board-game evenings, but they occasionally rely on coffee and skip balanced meals when deadlines loom.
  core: A detail-oriented, quietly anxious 19-year-old who blends solitary creativity with a deep commitment to community service, Megan Troutman balances meticulous planning with occasional bouts of over-worry.
background:
  cultural: Megan is a second-generation Colorado native of German and Irish ancestry. She grew up in a middle-class suburban neighborhood of Colorado Springs, where family traditions emphasized modesty,
    self-reliance, and community involvement. The local outdoors culture, with frequent trips to the nearby mountains and parks, shaped her appreciation for nature. While she identifies as white, she is
    aware of the diverse cultural landscape of the region and values inclusive, cooperative interactions, reflecting the harmonious and considerate aspects of her upbringing.
