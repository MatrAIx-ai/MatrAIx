  hobbies: '[''reading (fiction and psychology nonfiction)'',''journaling'',''nature photography'',''hiking'',''knitting'',''baking'',''board game nights with small groups'',''volunteer nature preservation'']'
  career_goals: Megan plans to enroll in a community-college program in Business Administration or Library Science, aiming to become an administrative coordinator for a nonprofit organization that supports
    local youth and community services. She seeks a stable, supportive work environment where her organizational strengths can be applied to project planning, budgeting, and fostering a harmonious workplace.
    In the longer term, she hopes to earn a certification in project management and eventually lead a small team that designs community outreach programs, allowing her to combine her practical skills with
    her desire to help others.
