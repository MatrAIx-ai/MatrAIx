  hobbies: '[''Fly fishing on the Tennessee River'', ''Restoring vintage motorcycles'', ''Woodworking projects'', ''Stagehand work in community theater'', ''Volunteering at local church youth group'', ''Listening
    to classic Southern rock'', ''Reading biographies of business leaders'']'
  career_goals: Sergio aims to advance from his current supervisory role to a district or regional sales manager position within the next five years, leveraging his growing analytical skills and industry
    knowledge. He intends to earn his GED and pursue certifications in sales management and project coordination to solidify his credentials. Long‑term, he envisions establishing a small consulting firm
    that helps midsize manufacturers streamline their sales processes, while also creating a mentorship program for workers without formal education backgrounds.
