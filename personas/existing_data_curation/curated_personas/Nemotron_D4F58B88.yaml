personas:
  professional: Sergio Daugherty, a 49‑year‑old supervisor of non‑retail sales operations, leads a frontline team with data‑driven performance reporting and basic Lean/Six Sigma improvements, embracing
    new sales technologies with practical caution while they assertively mentor junior staff.
  sports: Sergio Daugherty, an avid fan of the Tennessee Titans and Nashville Predators, spends Saturday mornings fly‑fishing on the Tennessee River, joins the River Rats adult softball league each spring,
    and participates in a charity 5K run with the local Rotary Club, balancing low‑key outdoor activity with spirited support for their hometown teams.
  arts: Sergio Daugherty, a devoted listener of classic Southern rock icons like Lynyrd Skynyrd and The Allman Brothers, volunteers as a stagehand at the community theater where they help stage productions
    of 'Our Town' and 'The Crucible,' and devours biographies of business leaders such as Howard Schultz and Indra Nooyi, integrating those stories into their creative problem‑solving.
  travel: Sergio Daugherty, who prefers planning weekend getaways that combine outdoor adventure with cultural immersion, has already explored the Great Smoky Mountains, fished in the Ozarks, enjoyed the
    jazz and cuisine of New Orleans, and trekked the historic streets of Savannah, and now they aim to cycle the Camino de Santiago in Spain next summer.
  culinary: Sergio Daugherty, a competent home cook with a penchant for smoky flavors, frequently grills pork ribs seasoned with a coffee‑infused rub, pan‑sears catfish with a lemon‑cayenne glaze, and hand‑crafts
    a pepper–corn crusted steak, proudly serving their creations alongside cedar‑plank roasted vegetables at family gatherings.
  core: Sergio Daugherty balances a data‑driven sales leadership role with a hands‑on love for vintage motorcycles, fly‑fishing, and Southern rock, navigating life with pragmatic curiosity, occasional back
    pain, and a habit of hoarding every spare part that crosses their garage.
background:
  cultural: Sergio was raised in the Deep South, specifically in Madison County, Alabama, where a strong work ethic, family ties, and community involvement are core values. His cultural upbringing blends
    traditional Southern hospitality and church participation with a pragmatic, resourceful mindset shaped by the region's industrial and aerospace presence. While he respects established customs, his curiosity
    drives him to adopt new practices and ideas, creating a balanced cultural identity that values both heritage and progress.
attributes:
  skills: '[''Team leadership'', ''Sales strategy development'', ''Customer relationship management'', ''Negotiation'', ''Conflict resolution'', ''Operational logistics coordination'', ''Data analysis and
