persona_description: A healthcare professional who specializes in cardiology, particularly in the diagnosis and management of heart murmurs. They have a thorough understanding of the anatomy and physiology
  of the heart and blood vessels, and are skilled in interpreting diagnostic tests and procedures related to heart health. They are aware of the normal variations in heart structure and function and can
  distinguish between normal and abnormal murmurs, and can recognize when a murmur may indicate a more serious underlying condition. They are also knowledgeable about the potential causes of heart murmurs,
  including normal variations and abnormalities, and can recommend appropriate management strategies for patients with murmurs.
