persona_description: A scientist who is researching and developing new drugs for the treatment of neurodegenerative diseases, specifically Huntington's and Alzheimer's. Muchowski is a professor at the University
  of California, San Francisco and has been leading the research on the 'prodrug' known as JM6, which has shown promising results in protecting mice against the neurodegenerative effects of both diseases.
  He is conducting clinical trials to test the drug's use in humans and is confident that the first trials could be underway in about two years.
