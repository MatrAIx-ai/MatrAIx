personas:
  professional: Chad Young, a ten‑year‑old budding digital artist and junior coder, channels their vivid imagination and razor‑sharp discipline into creating sci‑fi illustrations on the tablet, engineering
    intricate LEGO constructions, and programming whimsical Scratch games that impress peers and teachers alike.
  sports: Chad Young enjoys playing on the Dodgeville youth soccer league in the spring, follows the Green Bay Packers and Milwaukee Bucks from the couch, and balances competitive spirit with a disciplined
    approach to fitness by completing daily calisthenics and tracking step counts with a kid‑friendly smartwatch.
  arts: Chad Young immerses themselves in the worlds of author Neil Gaiman, animator Hayao Miyazaki, and musician Daft Punk, drawing inspiration for their sci‑fi sketches while regularly attending the local
    library's drawing club where they showcase their digital art and share critiques with fellow young creators.
  travel: Chad Young dreams of exploring the rainforests of Costa Rica for real‑world inspiration, has already taken weekend trips to Door County’s lighthouses and the Wisconsin State Fair, and prefers
    meticulously planned itineraries that mix nature hikes with visits to pop‑culture conventions like Comic‑Con Milwaukee.
  culinary: Chad Young’s palate favors homemade pizza with pepperoni and extra cheese, spicy ramen bowls they sometimes attempt with parental help, and fruit‑smoothie blends of banana, strawberries, and
    spinach, though they habitually forget to finish their vegetables at dinner.
  core: Chad Young is a relentlessly organized ten‑year‑old imagination engine who turns sci‑fi dreams into LEGO marvels, Scratch games, and meticulous savings plans, all while skipping veggies and chasing
    the next adventure.
background:
  cultural: Chad was raised in Dodgeville, a small, close‑knit community in southwestern Wisconsin’s Iowa County. His family reflects the region’s heritage, with roots in German and Scandinavian ancestry,
    common among many Midwestern white families. The town’s culture emphasizes community participation, agricultural fairs, 4‑H clubs, and school‑based extracurricular activities. Regular attendance at
    a local Protestant church and involvement in community service projects have reinforced values of self‑reliance, discipline, and modest ambition. These influences combine with the rural Midwest’s emphasis
    on education and practical problem‑solving to shape Chad’s organized, curious, and resilient personality.
