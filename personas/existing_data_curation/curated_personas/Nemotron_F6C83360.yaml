  career_goals: Chad dreams of turning his love for art and structure into a future career as an architect or a video‑game designer, where he can blend imaginative world‑building with technical precision.
    He is also intrigued by robotics and hopes to study engineering, aiming to create innovative devices that solve real‑world problems. As a competitive spirit, he aspires to win regional science fairs
    and eventually contribute to cutting‑edge design projects that push the boundaries of creativity and functionality.
