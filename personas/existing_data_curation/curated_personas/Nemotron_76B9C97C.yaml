personas:
  professional: Thomas Gattis, an aspiring young mechanical engineer, delights in constructing intricate LEGO Technic models, disassembling gadgets, and programming his beginner drone, channeling his balance
    of curiosity and practicality into methodical, competitive problem‑solving.
  sports: Thomas Gattis, a member of the local youth hiking club, enjoys weekend treks through the Allegheny forest while cheering for the Pittsburgh Steelers and supporting the junior soccer team at the
    community center, preferring solo endurance challenges over team drills.
  arts: Thomas Gattis, a devoted fan of Studio Ghibli animated films and the sci‑fi author Andy Weir, spends free evenings sketching futuristic vehicle designs inspired by his LEGO builds and listening
    to Hans Zimmer soundtracks while reading.
  travel: Thomas Gattis dreams of a road trip to the Kennedy Space Center after a summer visit to Washington, D.C., but usually settles for weekend camping in Pennsylvania’s state parks, favoring carefully
    planned itineraries that balance exploration with time for personal projects.
  culinary: Thomas Gattis enjoys assembling veggie‑laden stir‑fry with carrots and peas from his mother’s garden, devouring pepperoni pizza after a long build session, and perfecting homemade fruit smoothies
    with blueberries and banana as a post‑study treat.
  core: Thomas Gattis blends relentless curiosity with practical precision, competes fiercely in solitary pursuits, yet often wrestles with worry and a preference for quiet, focused spaces.
background:
  cultural: Thomas was raised in Emlenton, a small town in Butler County, Pennsylvania, where community life centers around close‑knit family ties, local schools, and seasonal town events such as fairs
    and high‑school sports games. His family lives a modest, middle‑class lifestyle that values self‑reliance, hard work, and education. Religious gatherings and community service are part of his upbringing,
    reflecting the region’s traditional values. While his cultural exposure is primarily that of a typical rural white American setting, his parents encourage curiosity about the broader world by providing
    books, museum visits, and internet resources. This blend of grounded local values and encouragement to explore outside his immediate environment shapes Thomas’s outlook, work habits, and long‑term aspirations.
