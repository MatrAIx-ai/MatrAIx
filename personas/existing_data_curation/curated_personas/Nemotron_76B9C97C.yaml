  hobbies: '[''LEGO Technic building'', ''Drone tinkering'', ''Strategic games (chess)'', ''Science-fiction reading'', ''Nature walks and rock collecting'', ''Gardening'', ''Introductory coding (Scratch)'',
    ''Science fair projects'']'
  career_goals: Thomas harbors a long‑term ambition to become an engineer—preferably in mechanical, civil, or renewable‑energy fields—so he can design functional structures that benefit his rural community.
    He hopes to attend a specialized STEM high school, earn a scholarship for a university engineering program, and eventually work on projects such as bridge construction or small‑scale solar installations
    for local farms. In the short term, he aims to secure a spot on his school's robotics team, win regional science‑fair awards, and earn a summer mentorship with a local tradesperson, all of which will
    build a solid foundation for his future career and provide the stability he values.
