  hobbies: '[''Gardening'', ''Reading mystery and historical fiction'', ''Small book club'', ''Bird watching'', ''Hiking local trails'', ''Knitting'', ''Volunteering at community library'', ''DIY woodworking'']'
  career_goals: Sharon aims to advance to a lead‑operator or shift‑supervisor role where she can mentor younger workers and oversee safety compliance. She plans to obtain an OSHA 10 certification and complete
    a short course in advanced PLC programming to broaden her technical qualifications. While seeking job stability, she also intends to transition gradually to a part‑time schedule as she approaches retirement,
    balancing income with reduced stress. Additionally, she hopes to develop a small side venture creating handcrafted wooden kitchen tools, leveraging her DIY interests.
