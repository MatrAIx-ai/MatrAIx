personas:
  professional: Adrianna Cabaleiro, a methodical high‑school junior, blends a budding expertise in automotive repair with hands‑on agricultural tech projects, leading 4‑H initiatives and planning future
    vocational training with the same organized precision that defines their approach to problem‑solving.
  sports: Adrianna Cabaleiro keeps fit by hiking the Ozark trails on weekends, joining the local 4‑H youth equestrian team for occasional riding drills, cheering on the Arkansas Razorbacks football and
    St. Louis Cardinals baseball, and they also squeeze in backyard weight‑lifting sessions to stay strong for automotive work.
  arts: Adrianna Cabaleiro spends evenings strumming acoustic versions of John Mayer and traditional corridos on a battered guitar, admiring the mural work of Jeff Smith at the town cultural center, and
    volunteering at community open‑mic nights where they occasionally showcase original folk‑inspired songs.
  travel: Adrianna Cabaleiro enjoys budget‑friendly road trips across the Ozarks, has visited Santa Fe for its art festivals and the Grand Canyon for a sunrise hike, dreams of exploring Oaxaca’s vibrant
    food markets, and they plan a future study tour of Detroit’s automotive factories to deepen their technical knowledge.
  culinary: Adrianna Cabaleiro loves cooking chicken tinga tacos with locally sourced catfish, fresh corn tortillas, and chipotle‑smoked salsa, while they also experiment with jalapeño‑infused chili verde
    and perfect homemade guacamole for family gatherings.
  core: Adrianna Cabaleiro is a curious‑yet‑practical teen who balances hands‑on tinkering with community service, meticulous planning with spontaneous guitar jams, and they love both local hills and global
    flavors.
background:
  cultural: Adrianna is a second‑generation Hispanic‑American whose family roots trace back to Mexico and Central America. Growing up in the small, rural town of Higden, Arkansas, he blends Latino cultural
    traditions—such as bilingual language use, celebrating Día de los Muertos, and a love for Mexican cuisine—with the Southern Appalachian lifestyle of church community gatherings, outdoor recreation,
    and a strong emphasis on self‑reliance. This hybrid cultural experience shapes his values of family, community, and hard work.
