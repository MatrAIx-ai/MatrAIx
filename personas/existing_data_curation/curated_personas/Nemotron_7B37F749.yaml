  career_goals: Adrianna aims to enroll in a vocational training program to become a certified automotive technician while also exploring agricultural technology that can improve his family's small farm.
    He envisions opening his own auto repair shop that also serves as a community hub for sustainable gardening and bilingual outreach. Over the next few years, he plans to earn certifications, gain apprenticeship
    experience, and eventually combine his mechanical skills with his passion for community service and cultural bridge‑building.
