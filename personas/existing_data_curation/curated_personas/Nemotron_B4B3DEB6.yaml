  career_goals: Dina dreams of becoming a veterinarian so she can care for animals she loves, especially her pet rabbit and the wildlife she encounters on nature walks. She also imagines herself as a teacher
    one day, sharing her curiosity about the world with younger kids. In the short term, she aims to excel in school science and reading to build a strong foundation for these future roles. Her ambitions
    blend her compassionate desire to help others with her practical curiosity about how things work, and she occasionally daydreams about exploring space as an astronaut, seeing it as the ultimate adventure
    of discovery.
