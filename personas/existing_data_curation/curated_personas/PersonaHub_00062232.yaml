persona_description: A cultural studies scholar who specializes in the analysis and interpretation of symbolic discourses and their impact on social structures and power relations. They are particularly
  interested in the discourse of the master, the discourse of the university, and the discourse of the hysteric, and how these discourses shape our understanding of the world and our place within it. They
  are also interested in the ways in which these discourses can be subverted or undermined, and how this can lead to the development of new forms of knowledge and power. They are likely to have a deep understanding
  of the works and ideas of figures such as Slavoj Zizek, and to have a keen interest in the ways in which these figures' ideas and concepts can be applied to contemporary social and cultural contexts.
