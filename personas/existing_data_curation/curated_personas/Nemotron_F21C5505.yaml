  hobbies: '["Basketball", "Soccer", "Playing guitar", "Listening to music (indie/rock)", "RC car building and racing", "Arduino and basic robotics projects", "Photography and photo editing", "Volunteer
    work at youth center", "County fair participation", "Hiking and fishing", "Puzzle solving (Sudoku, crosswords)", "DIY woodworking projects"]'
  career_goals: Christopher aims to complete his high‑school education through a GED program within the next year, then enroll in a technical college to study automotive technology or mechatronics. He hopes
    to earn an apprenticeship, gain professional certifications, and eventually open his own small auto‑repair and custom‑fabrication shop that serves the local community. In the longer term he is interested
    in taking on a leadership role as a community outreach coordinator, leveraging his organizational skills to plan local events and youth programs.
