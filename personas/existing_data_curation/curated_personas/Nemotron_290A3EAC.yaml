  hobbies: '[''Watercolor painting of desert landscapes'', ''Native desert gardening'', ''Docenting at the Phoenix Art Museum'', ''Reading historical biographies and contemporary fiction'', ''Participating
    in a local book club'', ''Gentle yoga and mindfulness meditation'', ''Salsa dancing classes'', ''Attending cultural festivals featuring Native American and Mexican art'']'
  career_goals: Although retired from formal employment, Amanda intends to deepen her impact on the Phoenix cultural scene. She aims to serve as a board member of the Phoenix Art Museum’s volunteer council,
    where she can help design inclusive programming for seniors. She plans to launch a mentorship program that pairs seasoned artists with high‑school students interested in visual arts, and to organize
    an annual ‘Desert Art & Wellness’ festival that blends artistic exhibits with mindfulness workshops. Amanda also hopes to complete a certificate in gerontology counseling so she can provide informal
    emotional support to older adults facing anxiety and stress. Ultimately, she aspires to author a memoir that weaves her personal journey with reflections on art, community, and aging gracefully.
