  hobbies: '[''building blocks'', ''drawing with crayons'', ''listening to songs (nursery rhymes and gospel)'', ''interactive storytime'', ''backyard exploration'', ''water play'', ''dancing to music'',
    ''pretend play with toy animals'']'
  career_goals: Though still a toddler, Dedriana shows early ambitions toward greater independence. She enjoys dressing herself, wants to master using the potty, and aims to speak in longer sentences. She
    takes pride in helping with simple chores like putting away her toys after play and looks forward to exploring new picture books and nature walks with her family. These budding goals reflect a desire
    to be a helpful, capable member of her household and community as she grows.
