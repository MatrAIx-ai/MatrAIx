personas:
  professional: Dedriana Mckeever, a two-year-old budding builder, approaches playtime with the precision of a small engineer, methodically arranging brightly colored blocks into orderly towers, eagerly
    solving simple puzzles, and they pride themselves on completing tasks they set out to do, reflecting a balance of curiosity and practicality.
  sports: Dedriana Mckeever, a budding fan of the Los Angeles Dodgers, enjoys weekly toddler gymnastics sessions at the community center and enthusiastic kick‑about games of mini soccer with neighborhood
    friends, balancing active play with the structure of simple routines they love to repeat.
  arts: Dedriana Mckeever, a little enthusiast of bright crayon art and catchy children’s songs, spends afternoons drawing dinosaurs while humming tunes by The Wiggles and Raffi, and they eagerly await
    storytime at the local library where they can recite lines from Sesame Street characters.
  travel: Dedriana Mckeever, who delights in family road trips, has explored the seaside boardwalk of Santa Monica, the interactive exhibits at the Children’s Museum of Indianapolis, and a weekend getaway
    to the Grand Canyon’s South Rim, and they favor itineraries that include scheduled nap breaks and familiar snack stations to keep their adventurous spirit balanced with comfort.
  culinary: Dedriana Mckeever, a self‑proclaimed fan of creamy macaroni‑and‑cheese, banana slices, and peanut butter sandwiches, can confidently spread peanut butter with a plastic knife, yet fiercely rejects
    peas and broccoli, and they often negotiate for extra fruit to finish a meal.
  core: Dedriana Mckeever is a methodical two‑year‑old who balances boundless curiosity with a practical streak, delights in orderly block building, maintains a disciplined snack routine, and they occasionally
    throw a brief tantrum when peas appear on the plate.
background:
  cultural: Dedriana is part of an African‑American family deeply rooted in the Southern traditions of Orangeburg, South Carolina. Her upbringing is shaped by strong family bonds, regular church attendance,
    and community gatherings that celebrate Black heritage. Family meals feature Southern comfort foods such as collard greens and cornbread, and she is regularly exposed to gospel, rhythm‑and‑blues, and
    contemporary Black music. The local Gullah influences and family storytelling traditions enrich her sense of cultural identity and community belonging.
