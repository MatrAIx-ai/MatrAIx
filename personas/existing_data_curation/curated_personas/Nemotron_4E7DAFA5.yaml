  career_goals: Ghazal aims to become a regional sales director within the next three years, overseeing a multi‑city team and driving revenue growth in emerging market segments. She plans to earn an MBA
    or relevant sales leadership certification to strengthen her strategic toolkit while maintaining a flexible work style that suits her preference for autonomy. Long‑term, she envisions launching her
    own consultancy that helps tech startups craft culturally resonant sales narratives for South Asian diaspora markets, leveraging her competitive edge and calm resilience to build a trusted brand.
