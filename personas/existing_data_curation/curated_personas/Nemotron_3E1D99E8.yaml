  hobbies: '[''Urban gardening'', ''Cooking traditional soul and Caribbean dishes'', ''Knitting and crocheting'', ''Reading local histories and biographies'', ''Walking in Prospect Park'', ''Participating
    in church gospel choir'', ''Listening to jazz and R&B'', ''Volunteering at senior center'', ''Collecting and preserving family recipes'', ''Attending cultural festivals'']'
  career_goals: Kaneesha aims to translate her lifelong community service into a formal leadership role. Within the next two years she plans to earn her GED and complete a certification as a Community Health
    Worker, positioning herself to advocate for senior residents on Brooklyn’s Community Board. She also envisions launching a modest home‑based catering service that showcases her signature soul‑food recipes,
    providing both supplemental income and a platform to mentor younger women interested in culinary entrepreneurship. Ultimately, she seeks recognition as a trusted neighborhood resource and hopes to document
    her family’s oral histories for future generations.
