personas:
  professional: Sharmane Reed, an 81‑year‑old retired handyman, applies their lifelong woodworking, plumbing, and storytelling abilities to mentor grandchildren and coordinate volunteer projects at the
    senior center, blending a curious enthusiasm for new repairs with a practical, hands‑on approach that often sidesteps paperwork and deadlines.
  sports: Sharmane Reed follows the Cleveland Browns and Ohio State Buckeyes, attends occasional local high‑school baseball games, and participates in light walking groups at the senior center, but prefers
    to watch matches from their porch while feeding birds rather than engaging in strenuous activity.
  arts: Sharmane Reed enjoys classic rock legends such as The Rolling Stones, Led Zeppelin, and The Who on vinyl, attends community theater productions of historical dramas, and draws inspiration from the
    local WWII museum for their memoir, while occasionally humming tunelessly while working in the workshop.
  travel: Sharmane Reed takes spontaneous short drives to nearby county fairs, historic towns like Marietta, and the Gettysburg battlefield, favoring road trips with garden‑fresh picnic lunches over long
    vacations, yet sometimes dreams of a pilgrimage to Normandy’s D‑Day beaches, balancing wanderlust with limited mobility.
  culinary: Sharmane Reed favors home‑cooked meals featuring garden vegetables—roasted carrots with thyme, hearty chicken pot pie, and apple crisp with locally sourced apples—seasoned with fresh rosemary
    and sage, though they often forget to defrost meat before cooking, leading to improvised recipes and occasional burnt edges.
  core: Sharmane Reed is a curious yet practical 81‑year‑old craftsman who balances spontaneous tinkering, community storytelling, and a worry‑laden quest for independence while navigating health quirks,
    modest finances, and a tendency to procrastinate on appointments.
background:
  cultural: Sharmane is a white Midwesterner whose family roots trace back to German and Irish immigrants who settled in Dayton during the early 20th century. Raised in a post‑World‑War II working‑class
    neighborhood, he grew up with the values of modesty, self‑reliance, and community loyalty typical of the region. His upbringing was shaped by the industrial boom of Dayton, a strong church presence
    (he identifies as Methodist), and participation in local clubs such as the senior center and neighborhood volunteer groups. These cultural influences have instilled in him a practical outlook, an appreciation
    for tradition, and a deep sense of belonging to his Ohio community.
