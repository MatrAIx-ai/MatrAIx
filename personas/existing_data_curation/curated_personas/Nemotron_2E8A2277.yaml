  career_goals: Mary Ruth often talks about becoming a "creator" when she grows up. She imagines herself as an artist who paints pictures that tell stories, or as a teacher who shares her love of learning
    with small groups of children. Her curiosity about animals leads her to occasionally say she wants to be a veterinarian. She also mentions wanting to write her own books, reflecting her appreciation
    for art and imaginative ideas. While she sometimes worries about new places, her ambition remains to explore and create in a safe and supportive environment.
