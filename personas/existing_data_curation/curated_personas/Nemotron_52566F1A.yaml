  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Cooking and experimenting with Vietnamese‑Hawaiian fusion dishes'', ''Community gardening with native Hawaiian plants'', ''Hiking coastal
    trails and paddleboarding'', ''Reading history and philosophy'', ''Playing board games and social gatherings at the senior center'', ''Volunteering as a cultural mentor'', ''Attending live music and
    dance performances'']'
  career_goals: Although not currently in the formal workforce, Nhung aims to become a recognized cultural ambassador in Waianae, organizing annual heritage festivals that celebrate both Vietnamese and
    Hawaiian arts. He plans to launch a series of cooking workshops for youths, publish a blog of fusion recipes, and develop a community garden that serves as an educational hub. He also hopes to travel
    back to Vietnam to document family histories and eventually write a memoir that weaves his immigrant experience with Hawaiian island life. By nurturing intergenerational connections, he aspires to leave
    a lasting legacy of shared cultural pride and creativity.
