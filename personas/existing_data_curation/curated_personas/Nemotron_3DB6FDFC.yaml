  hobbies: '["Fishing on Albemarle Sound","Vegetable gardening (tomatoes, peppers, collard greens)","DIY woodworking projects","Reading DIY manuals and survival guides","Listening to classic rock, country,
    and folk music","Playing acoustic guitar in small gatherings","Participating in small‑group church Bible studies","Volunteering at the county food bank"]'
  career_goals: Darryl plans to earn his GED within the next year to open up vocational training options. He is interested in enrolling in a local community‑college program for carpentry or welding, aiming
    to combine his hands‑on abilities with formal credentials. In the short term, he hopes to start a modest side business offering handyman services and garden maintenance to neighbors, allowing him to
    earn income while maintaining flexible hours. Long‑term, Darryl envisions a stable part‑time position in a landscaping or maintenance crew where his practical skills and cooperative attitude can contribute
    to a team. He also wants to continue volunteering, eventually taking a leadership role in the town’s community garden program to promote local food sustainability.
