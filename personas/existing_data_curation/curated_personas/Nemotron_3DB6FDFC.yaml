personas:
  professional: Darryl Simpson, a 31‑year‑old aspiring handyman‑entrepreneur, blends self‑taught carpentry, engine repair, and garden‑maintenance know‑how with a curiosity‑driven, laid‑back work style as
    they launch a modest side service while eyeing a part‑time role on a local landscaping crew.
  sports: Darryl Simpson enjoys low‑key sport activities such as weekend fishing on Albemarle Sound and occasional pick‑up softball games, follows the Durham Bulls for baseball and the Carolina Hurricanes
    for hockey, and maintains fitness through regular walks while preferring solitary exercise over gym crowds.
  arts: Darryl Simpson channels a quiet creative streak by strumming an acoustic guitar at small gatherings, listening to classic rock legends like Led Zeppelin, country stars such as Willie Nelson, and
    folk icons like Bob Dylan, and devouring historical biographies that inspire new DIY projects.
  travel: Darryl Simpson prefers relaxed, self‑guided road trips to nearby outdoor spots like the Outer Banks, Cape Hatteras, and the Blue Ridge Mountains, often planning last‑minute camping or fishing
    outings on a modest budget while dreaming of a future adventure to Acadia National Park.
  culinary: Darryl Simpson enjoys cooking Southern comfort meals such as smoked pork ribs, collard greens seasoned with smoked ham hocks, and tomato‑based sauces made from heirloom garden tomatoes, and
    they often experiment with homemade pickles and fresh, home‑grown peppers in their dishes.
  core: Darryl Simpson is a practical, curiosity‑driven handyman who cherishes solitary, low‑key pursuits, values community harmony, and balances an easygoing tempo with a quiet determination to improve
    both their craft and their neighborhood.
background:
  cultural: Darryl grew up in rural Hertford, North Carolina, within a close‑knit Southern community where family, church, and local traditions shape daily life. His upbringing reflects the values of modesty,
    hospitality, and self‑reliance common to the region. He was raised with an appreciation for Southern cuisine, especially slow‑cooked barbecue and comfort foods that bring families together. Community
    events such as county fairs, church potlucks, and volunteer drives have reinforced his cooperative nature. Though he never completed high school, he learned many practical skills from neighbors and
    through community workshops, embodying the resourceful spirit of the rural Eastern North Carolina culture.
attributes:
  skills: '["Basic carpentry and woodworking","Small‑engine and routine automotive maintenance","Vegetable gardening and composting","Everyday computer literacy (email, internet research, social media)","Volunteer
