  hobbies: '[''Reading non‑fiction (economics, psychology, tech)'', ''Puzzle solving (Sudoku, chess)'', ''Hiking in the Pacific Northwest'', ''Traditional Mexican cooking'', ''Playing piano'', ''DIY electronics
    and IoT projects'']'
  career_goals: Abimael aims to transition into senior leadership within the next five years, targeting roles such as Director of Operations or VP of Strategy where he can shape company‑wide efficiency
    initiatives. He is driven to spearhead large‑scale technology integration projects that enhance productivity and reduce waste, leveraging his analytical background. Long‑term, he envisions establishing
    a boutique consulting firm focused on operational excellence for tech startups, allowing him to apply his competitive edge and critical mindset to help emerging companies scale sustainably.
