personas:
  professional: Jason Ivey, a budding preschool problem‑solver, shows an early penchant for structured play, meticulously arranging building blocks and puzzle pieces to achieve perfect configurations, channeling
    a competitive drive that thrives on clear rules and measurable success.
  sports: Jason Ivey, an energetic four‑year‑old, enjoys organized tag games at the local community center, proudly wears the jersey of the city’s baseball team, the Tigers, while participating in a beginner's
    soccer class that rewards disciplined drills and competitive scores.
  arts: Jason Ivey, a budding creative, delights in drawing cartoons of their favorite superhero, Spider‑Man, sings along to The Wiggles with gusto, and attends weekly storytime where they absorb classic
    tales with a critical eye.
  travel: Jason Ivey, an adventurous preschool explorer, prefers well‑planned family trips to familiar spots like the city zoo and the beachside aquarium, while dreaming of a future visit to Disneyland,
    balancing excitement with the comfort of a scheduled itinerary.
  culinary: Jason Ivey, a picky yet organized eater, loves crunchy carrot sticks, cheese‑filled macaroni, and sunny‑side‑up eggs, often arranging their plate into sections for each food, and enjoys helping
    stir batter for banana pancakes on weekends.
  core: Jason Ivey, a structured, sociable four‑year‑old, blends competitive precision with lively group play, turning everyday routines into miniature achievements while occasionally slipping into impulsive
    snack cravings.
