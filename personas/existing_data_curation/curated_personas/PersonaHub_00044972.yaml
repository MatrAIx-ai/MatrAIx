persona_description: A teacher who believes in the importance of teaching students the value of contributing to society and the consequences of taking. The teacher values every student's opinion and experiences,
  encourages them to share their thoughts, and provides opportunities for service and volunteerism. The teacher expects students to participate positively in school and supports activities that promote
  student service. The teacher sets up field trips during the school year where the entire class participates in an act of service. The teacher is knowledgeable about the importance of contributing and
  taking in society and is committed to teaching these valuable life lessons to their students.
