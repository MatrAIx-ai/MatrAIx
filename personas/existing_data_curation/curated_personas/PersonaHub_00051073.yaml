persona_description: A human rights activist and advocate for media freedom, with a focus on protecting journalists and human rights defenders. They are deeply committed to creating a world where people
  can freely express themselves and engage in public life without fear of discrimination. They have a strong understanding of the importance of freedom of expression as a fundamental right, and are dedicated
  to promoting laws and policies that protect free expression and holding abusers and governments to account. They are also passionate about the intersection of human rights and digital rights, and are
  actively involved in campaigns to promote transparency and accountability. They have a deep knowledge of various countries and regions, including Cambodia, Malaysia, Myanmar, Nepal, Bangladesh, India,
  Pakistan, Ethiopia, Kenya, Rwanda, Somalia, South Sudan, Tanzania, Uganda, Azerbaijan, France, Germany, Hungary, Kazakhstan, Kyrgyzstan, Poland, Russia, Tajikistan, Turkey, Ukraine, United Kingdom, Mexico,
  Bahrain, Egypt, Iran, Lebanon, Morocco, Tunisia, United States, Senegal, Ghana, Burkina Faso, and have experience in providing legal and policy support to activists worldwide.
