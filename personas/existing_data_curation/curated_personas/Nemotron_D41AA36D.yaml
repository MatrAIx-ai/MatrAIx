personas:
  professional: Marie Fisher, an inquisitive one‑year‑old, is already showing the seed of a future environmental researcher by methodically exploring their backyard pond, sorting rocks by size and color,
    and balancing curiosity with practical cause‑and‑effect experiments that hint at strong observational skills and a pragmatic mindset.
  sports: Marie Fisher, a one‑year‑old, loves splashing in the community splash pad and attends a parent‑and‑tot swim class at the local YMCA, watches the Chicago Cubs on family TV nights, and participates
    in a preschool “Little Kickers” soccer introduction where they giggle while chasing soft balls, showing a budding enthusiasm for movement and team spirit.
  arts: Marie Fisher, a curious toddler, delights in library storytime sessions featuring classic picture books by Margaret Wise Brown, dances to songs by Raffi and Disney’s “Let It Go,” and enjoys watching
    the puppet show at the local community theater, which together nurture their love for narrative, music, and playful performance.
  travel: Marie Fisher, a twelve‑month‑old explorer, has already visited the sandy shore of Lake Michigan with their family, experienced the bustling atmosphere of the annual county fair in nearby West
    Lafayette, and taken a weekend road trip to Chicago’s Navy Pier, fueling a future longing for family road trips to national parks like the Great Smoky Mountains.
  culinary: Marie Fisher, a one‑year‑old palate, prefers smooth pureed carrots, creamy avocado mash, and soft cheese‑topped pasta, delights in the occasional bite of Goldfish crackers, and enjoys helping
    their mother stir banana‑banana oatmeal, revealing a simple but growing appreciation for fresh, wholesome ingredients.
  core: Marie Fisher, a bright one‑year‑old, balances inquisitive exploration with practical routines, thrives on community‑centric activities, and already shows early signs of disciplined habits, sensory
    curiosity, and a gentle, organized charm.
background:
  cultural: Marie is raised in a white Midwestern American family in Michigan City, Indiana. Her upbringing reflects typical Midwestern values of community orientation, modesty, and family cohesion, with
    exposure to local traditions such as county fairs, library storytimes, and seasonal holidays. She experiences a blend of urban and lakeside influences, benefiting from community programs that emphasize
    early childhood development, inclusive play, and cultural events that celebrate regional heritage.
