personas:
  professional: Carol Hagans is a budding creative orchestrator who treats every art session like a project, meticulously arranging crayons by color, scheduling daily drawing time, and leading group play
    with the same disciplined enthusiasm as a tiny studio manager.
  sports: Carol Hagans is an energetic participant in the local Kids' Soccer Club, a proud fan of the Chicago Cubs, a regular member of the Little Sprouts Dance Troupe, and a weekly attendee of kids' yoga
    classes at the community center, approaching each activity with organized practice schedules and a cheerful competitive spirit.
  arts: Carol Hagans is an avid illustrator who loves drawing Mo Willems’ characters with watercolors, practices simple melodies on a miniature keyboard while humming Raffi’s “Baby Beluga,” and eagerly
    attends library storytime featuring Sesame Street puppets, letting these creative influences shape their vivid imagination.
  travel: Carol Hagans is a curious explorer who prefers short family trips to nearby attractions like the city botanical garden, the natural history museum, and Disney’s Magic Kingdom, where they pack
    a coloring book and a snack‑filled backpack, delighting in the balance of adventure and familiar routine.
  culinary: Carol Hagans is a budding kitchen helper who enjoys assembling banana pancakes with a drizzle of honey, munching on carrot sticks with hummus, and carefully arranging fruit skewers topped with
    rainbow sprinkles, while proudly insisting on using their own plastic whisk for every stir.
  core: Carol Hagans is a hyper‑organized, endlessly curious six‑year‑old whose love of crayons, LEGO, and group games is matched only by their habit of aligning every toy in perfect rows and humming the
    same lullaby to stay calm.
background:
  cultural: Carol comes from a white, middle-class family in Fontana, California. Her upbringing reflects mainstream American cultural traditions, such as celebrating holidays like Thanksgiving, Fourth
    of July, and Christmas, attending community events at her local elementary school and neighborhood parks, and participating in church activities when applicable. Living in a diverse Southern California
    city, she is exposed to multicultural influences, including Spanish language signage, multicultural festivals, and friendships with peers from varied backgrounds, which enrich her worldview while her
    family maintains the values of kindness, cooperation, and personal achievement.
