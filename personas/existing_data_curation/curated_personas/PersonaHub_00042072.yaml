persona_description: A linguist with expertise in the field of Indo-European languages, particularly Punjabi and Lahanda/Multani. He specializes in descriptive grammar, syntax, morphology, phonology, and
  sociolinguistics. He has published extensively in the field and is an Associate Professor of Linguistics and South Asian Languages at Syracuse University, New York. His research interests include the
  standard language of Punjabi and Lahanda/Multani, as well as the sociolinguistic properties of these languages.
