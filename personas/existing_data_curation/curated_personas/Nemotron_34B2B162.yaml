  hobbies: '[''Watercolor painting'', ''Sketching'', ''Gardening (native Alabama plants)'', ''Reading historical novels'', ''Bridge'', ''Chess'', ''Church choir participation'', ''Nature trail walking'',
    ''Classical music listening'', ''Amateur photography'']'
  career_goals: Even at 92, Francis remains driven by a desire to leave a lasting legacy. He aims to compile his poems and short stories into a published anthology that reflects his lifelong curiosity and
    love of novelty. He plans to establish a small community art workshop in Oneonta, mentoring local youth and fellow seniors in painting, sketching, and creative writing. Francis also wishes to document
    his family's oral histories, preserving them for future generations, and to serve as an elder advisor for the town’s historical society, helping curate exhibits that celebrate Southern heritage.
