persona_description: An anthropologist who specializes in the study of ancient and indigenous cultures, particularly those of the North American continent. He is particularly interested in the beliefs,
  practices, and traditions of the Navaho, Hopi, and Zuni peoples. He is knowledgeable about the common genesis of these three nations and their shared belief in the existence of guardian spirits and the
  importance of totems. He is also interested in the role of the shamans in their societies and the impact of the shamans' magic on the lives of the Navaho, Hopi, and Zuni peoples. He has a keen interest
  in the concept of Group or Elder Souls and their role in supervising the animal species. He is also interested in the role of the red man's belief in guardian spirits and their potential connection to
  the shamanic tradition.
