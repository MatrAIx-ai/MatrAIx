  career_goals: Samantha hopes to combine her love for art and community stewardship in a future career. She plans to attend a liberal‑arts high school with a strong visual‑arts program, then pursue a bachelor's
    degree in museum studies or graphic design. Her long‑term ambition is to work as a museum curator or visual communications specialist, creating exhibitions that celebrate both contemporary art and Appalachian
    heritage. She is also interested in environmental education, envisioning a role that blends artistic storytelling with outreach about local ecosystems, and intends to secure scholarships through her
    art portfolio and community service.
