  career_goals: Carrie aims to transition from hands‑on driving to a supervisory logistics role within the next three years, targeting a position as a logistics coordinator or fleet manager for a regional
    distribution center. She plans to obtain a Class A Commercial Driver’s License and a Certified Logistics Associate (CLA) certification to bolster her credentials. Long‑term, she envisions launching
    a boutique, eco‑focused courier service that emphasizes personalized client relationships and supports local artists by offering delivery for their works. To support this vision, she is enrolling in
    online courses in supply‑chain analytics and small‑business management, while seeking mentorship from experienced transportation managers. Throughout her career progression, she remains committed to
    balancing professional advancement with manageable stress levels, integrating mindfulness practices and flexible work arrangements where possible.
