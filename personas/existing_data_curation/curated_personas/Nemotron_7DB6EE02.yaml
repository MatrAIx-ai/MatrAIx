  career_goals: Marcella aims to pursue a degree in Computer Engineering or Mechanical Engineering at a top research university, blending her curiosity for new ideas with a practical mindset. She aspires
    to work in product development for sustainable technologies, eventually leading a tech startup that creates accessible educational tools. Her competitive drive pushes her toward roles that challenge
    her problem‑solving skills, and she hopes to mentor younger students in STEM fields while continuing to refine her technical expertise.
