personas:
  professional: Marcella Prieto, a 15‑year‑old robotics club member and budding video content creator, merges curiosity‑driven engineering with practical project management by designing Arduino‑controlled
    competition bots while simultaneously editing tutorials for her YouTube channel, and they bring a data‑centric, competitive edge to their debate team presentations.
  sports: Marcella Prieto, a fan of the Boston Celtics, Boston Bruins, and New England Patriots, participates in the Blue Hills Trail Crew hiking club, runs on the high school cross‑country team during
    the fall, and follows the Boston Marathon closely, using each trail run as a practical test of stamina for upcoming robotics competitions.
  arts: Marcella Prieto, who practices piano pieces by Ludovico Einaudi and Yiruma during quiet evenings, curates indie playlists featuring Arctic Monkeys, Phoebe Bridgers, and Tame Impala, follows graphic
    designer Bee Pee Bee for visual inspiration, and watches indie films starring Saoirse Ronan, weaving these artistic influences into their video editing style.
  travel: Marcella Prieto, whose family road trips have taken them to Cape Cod’s beaches, Acadia National Park’s sunrise hikes, a semester‑short school field trip to Washington, D.C., and a weekend visit
    to New York City’s Broadway district, now dreams of attending a robotics expo in Tokyo and backpacking through the Icelandic Highlands for the ultimate blend of technology and wilderness.
  culinary: Marcella Prieto, an occasional home chef, frequently whips up spaghetti carbonara with pancetta, perfects avocado toast topped with radish and a drizzle of sriracha, enjoys pepperoni pizza sprinkled
    with fresh basil, savors pumpkin pie at Thanksgiving, and experiments with California rolls using fresh avocado and sushi‑grade salmon sourced from the local farmers market.
  core: Marcella Prieto balances a fierce competitive drive in robotics and gaming with a pragmatic, organized approach to schoolwork, yet can’t resist late‑night code debugging sessions and a habit of
    scrolling through gadget deals before bedtime.
background:
  cultural: Marcella was raised in Braintree, a suburban community in Norfolk County, Massachusetts, within a predominantly white, middle‑class American family. Her upbringing reflects typical New England
    values of independence, self‑reliance, and a strong emphasis on education. Family traditions include celebrating Thanksgiving, Christmas, and Fourth of July gatherings, often involving multi‑generational
    participation and local community events such as farmers markets and town parades. Exposure to the multicultural Boston metropolitan area has broadened her perspective, allowing her to navigate diverse
    social settings while maintaining a pragmatic, results‑oriented mindset.
