  career_goals: Victor aspires to become a civil engineer, designing bridges, roads, and community infrastructure that reflect his love for structure and tangible results. In the near term, he aims to boost
    his grades in math and science, join his school's robotics club, and compete in local STEM and chess tournaments. He also dreams of earning a black belt in karate, channeling his competitive drive and
    desire for disciplined achievement. Ultimately, he hopes to contribute to the safety and growth of his hometown while enjoying a career that offers clear, predictable challenges.
