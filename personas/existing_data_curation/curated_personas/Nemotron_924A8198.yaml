  career_goals: Dalyce aims to earn her GED within the next year and then enroll in a community college program focused on communications or marketing. Her long‑term ambition is to become a youth outreach
    coordinator or community organizer in her hometown, using her sociable nature to develop programs that address teen mental‑health awareness. She also dreams of launching an online boutique that showcases
    Midwestern fashion trends, leveraging her social media savvy to build a brand that resonates with other rural teens. In the short term, she wants to grow her personal vlog into a platform where she
    can share coping strategies for anxiety and sadness, positioning herself as a relatable voice for her peers.
