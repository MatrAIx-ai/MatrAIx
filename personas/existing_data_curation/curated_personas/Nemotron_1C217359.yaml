personas:
  professional: Cecilia Montesdeoca, a 15‑year‑old forward on her school's soccer team and active student‑council member, combines their love of routine, meticulous planning, and competitive drive to excel
    in organizing school events and leading team practices, always ensuring every detail is accounted for.
  sports: Cecilia Montesdeoca, as the forward for her high‑school soccer squad and a member of the local Eagle Soccer Club, trains five days a week, tracks their fitness with a wearable, passionately roots
    for the LA Galaxy and the USWNT, and treats every match as a tactical contest, rarely missing a practice despite occasional social events.
  arts: Cecilia Montesdeoca, who devotes evenings to rehearsing Mexican folkloric dance, often listens to Lila Downs and Los Tigres del Norte while choreographing routines, admires the mural work of Diego
    Rivera, and enjoys streaming teen‑focused dramas starring Millie Bobby Brown, drawing inspiration for their TikTok videos.
  travel: Cecilia Montesdeoca, who prefers group road trips with friends and plans itineraries down to the snack stops, has already visited the historic town of San Miguel de Allende during a family festival,
    dreams of exploring the coastal cliffs of Puerto Vallarta, and balances their wanderlust with a limited teen budget by saving from their allowance.
  culinary: Cecilia Montesdeoca, a confident home‑cook at age 15, regularly prepares tamales stuffed with pork and salsa verde, masters enchiladas covered in queso blanco, experiments with chipotle‑infused
    guacamole, and enjoys sharing their dishes at family gatherings, while they occasionally order pizza for late‑night study sessions.
  core: Cecilia Montesdeoca is a methodical, socially driven teen who thrives on routine, competition, and community, juggling soccer, student‑council duties, folk dance, and family cooking while they navigate
    occasional teenage skepticism and snack‑induced procrastination.
background:
  cultural: Cecilia was raised in a close‑knit Mexican‑American household in Harlingen, Texas, a city shaped by its proximity to the U.S.–Mexico border. Spanish is spoken at home alongside English, and
    she participates in cultural traditions such as Día de los Muertos altars, Cinco de Mayo celebrations, and family gatherings around holiday feasts. Her Catholic upbringing influences her values of respect,
    responsibility, and community service. The blend of Mexican culinary heritage, bilingual communication, and border‑region sensibilities informs her identity, giving her a strong sense of pride in her
    roots while navigating the diverse cultural landscape of South Texas.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Event planning and coordination", "Time management and scheduling", "Public speaking and presentation", "Teamwork and strategic thinking (soccer)",
    "Basic computer skills (Microsoft Office, Scratch)", "Culinary skills (traditional Mexican cooking)", "Mathematics problem solving"]'
  hobbies: '["Soccer (school team)", "Student council involvement", "Mexican folkloric dance", "Cooking traditional Mexican meals", "Listening to regional Mexican music", "Creating TikTok videos with friends",
    "Volunteering at community center", "Reading young adult novels"]'
  career_goals: Cecilia aims to graduate high school with strong academic standing and enroll at the University of Texas Rio Grande Valley to pursue a Bachelor of Science in Nursing. She is drawn to the
    stability and clear advancement path of healthcare, and she wants to specialize in family and pediatric nursing to serve the many bilingual families in her community. Her long‑term ambition is to establish
    a community health outreach program in Harlingen that provides bilingual health education, preventative care, and support services, combining her practical skill set with her desire to give back to
    the Mexican‑American community.
