  career_goals: Alyssa aims to transition from a supportive administrative role to a supervisory position, such as Office Manager or Community Arts Coordinator, where she can combine her love of art with
    her organizational talents. She plans to obtain a Certified Administrative Professional (CAP) credential to formalize her expertise and to enroll in a short‑term arts administration course offered by
    a local community college. Her ambition includes leading a small team, mentoring junior staff, and curating regular art‑focused events at local venues. Additionally, she hopes to develop better time‑management
    habits to reduce stress and increase her capacity for project leadership.
