personas:
  professional: Brian Jones, a 39-year-old aspiring warehouse logistics supervisor, channels his hands-on automotive, small-engine and woodworking expertise into meticulously organized inventory systems
    and schedule plans that satisfy his need for structure and predictability.
  sports: Brian Jones spends weekends fishing on Lake Shelbyville, practices precision shooting at the local NRA-affiliated range, follows the Chicago Cubs and Green Bay Packers avidly, and they keep fit
    by maintaining a modest vegetable garden and occasional jogs rather than joining formal sports leagues.
  arts: Brian Jones finds creative solace in building model aircraft of designs by Howard Hughes, listening to Johann Sebastian Bach's fugues while repairing engines, and binge-watching true-crime series
    starring Anthony Hopkins, which together shape his quiet yet analytical appreciation for the arts.
  travel: Brian Jones prefers meticulously planned, low-key trips that combine his love for aviation history and fishing, such as a weekend visit to the National Air & Space Museum in Washington, D.C.,
    followed by a secluded cabin stay on Lake Tahoe's north shore, and they often budget these getaways to stay within a modest savings target.
  culinary: Brian Jones, an adept home-cook, favors hearty meals like roasted chicken with rosemary, pan-seared trout caught from local lakes, and a vegetable stir-fry featuring home-grown zucchini and
    bell peppers, often seasoning with smoked paprika and garlic, reflecting his practical yet comforting palate.
  core: Brian Jones is a solitary, precision-driven tinkerer who balances a love for meticulous order with a secret habit of hoarding obscure model-airplane kits and an occasional tendency to over-worry
    about every detail.
background:
  cultural: Brian grew up in a middle‑class, white, Midwestern family in La Porte, Indiana. His upbringing emphasized the Protestant work ethic, self‑reliance, and practical skills, typical of the region’s
    small‑town culture. He attended the local high school, participated in community programs such as 4‑H, and was exposed to both traditional values and the quieter, independent lifestyle that now informs
    his preferences for solitude and structured routines.
attributes:
