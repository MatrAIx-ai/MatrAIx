personas:
  professional: Joseph Coletti, a budding young technologist and artist, merges his love of LEGO engineering, Scratch coding, and watercolor painting into imaginative solitary projects, and they use their
    curiosity and relaxed approach to planning to experiment without the need for strict schedules.
  sports: Joseph Coletti stays active through daily bike rides and weekend hikes in the local park, participates in the River Valley Junior Soccer Club’s Saturday practices, yet they prefer solitary cardio
    over team play and cheer for the New York Yankees and Golden State Warriors while watching games.
  arts: Joseph Coletti immerses themselves in watercolor painting inspired by Claude Monet, and they draw scenes after reading graphic novels such as 'Bone' and 'Amulet', practicing piano pieces by Yiruma
    and Ludovico Einaudi while listening to instrumental scores by Hans Zimmer.
  travel: Joseph Coletti prefers carefully planned weekend excursions to nearby state parks where they gather leaves for sketching, yet they dream of a family adventure to the Grand Canyon and hope to one
    day explore Tokyo’s Akihabara district, the birthplace of their favorite anime.
  culinary: Joseph Coletti enjoys simple homemade dishes such as cheese pizza with fresh basil, spaghetti with tomato sauce, and chocolate chip cookies, and they're proud of their ability to whisk together
    pancake batter using flour, eggs, and milk for weekend breakfasts.
  core: Joseph Coletti is a quietly curious nine‑year‑old who channels imagination into solitary LEGO inventions and watercolor worlds, yet they frequently misplace school supplies while searching for the
    perfect leaf.
background:
  cultural: Joseph is a third‑generation Italian‑American raised in Springfield, Illinois. His family maintains some Italian traditions, such as Sunday pasta dinners, occasional celebrations of cultural
    holidays, and a Catholic background that includes attending Mass. Growing up in the Midwest, he also absorbs local values of community involvement, appreciation for public libraries and museums, and
    participation in school events. The blend of Italian heritage and Midwestern upbringing gives him a multicultural perspective, while his environment offers access to art museums, local parks, and a
    supportive school system that nurtures his curiosity.
attributes:
  skills: '[''basic sketching and watercolor painting'', ''building complex LEGO structures'', ''solving puzzles and logic games'', ''introductory coding with Scratch'', ''beginner piano playing'', ''reading
