  hobbies: '[''drawing and watercolor painting'', ''LEGO building and invention'', ''introductory coding with Scratch'', ''reading sci‑fi, fantasy, and science books'', ''listening to instrumental music
    while creating'', ''beginner piano practice'', ''nature walks and sketching'', ''model rocket and electronics tinkering'']'
  career_goals: Joseph dreams of someday turning his creative passions into a career that lets him work independently and explore unconventional ideas. He envisions becoming a concept artist or video‑game
    designer who blends illustration, storytelling, and simple programming to craft immersive worlds. He also imagines inventing quirky mechanical projects in a home workshop, where his love for building
    and problem solving can flourish. While still valuing flexibility and solitude, he hopes to collaborate on projects that inspire others and allow him to keep learning new artistic and technical skills.
