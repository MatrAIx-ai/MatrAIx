  career_goals: In the next few years, Linda aims to formalize a company‑wide sustainable procurement framework that balances cost efficiency with environmental responsibility. She plans to earn the Certified
    Professional in Supply Management (CPSM) credential and mentor emerging procurement talent, drawing on her outgoing nature to lead workshops and peer‑learning circles. Long‑term, Linda envisions transitioning
    to a consulting role where she can advise regional businesses on cost‑effective, ethically sourced supply chains, while also serving on a local sustainability advisory board.
