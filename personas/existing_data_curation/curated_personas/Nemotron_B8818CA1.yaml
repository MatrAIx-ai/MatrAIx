  career_goals: Jaime aims to become a senior engineer and eventually a technical lead, overseeing product development that merges technology with creative expression. She aspires to launch a side venture
    that leverages AI‑driven generative art tools for independent creators. Over the next five years, she plans to deepen her expertise in cloud‑native architectures and machine learning, earn certifications
    such as AWS Solutions Architect and TensorFlow, and speak at tech conferences about the intersection of software and art. She also hopes to mentor more developers from underrepresented areas in rural
    Kentucky, fostering a local tech community while maintaining a healthy work‑life balance.
