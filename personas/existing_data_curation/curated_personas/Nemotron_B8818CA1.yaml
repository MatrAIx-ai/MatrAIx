personas:
  professional: Jaime Mangum, a full-stack software engineer who blends meticulous test-driven development with a vivid imagination for generative UI art, channels their organized, methodical work ethic
    and reserved yet assertive communication style into leading agile teams and mentoring junior developers while steering product roadmaps toward creative-technology synergies.
  sports: Jaime Mangum, an avid hiker who joins the local Ohio County Trail Club for weekend treks and practices yoga for flexibility, follows the Kentucky Wildcats basketball team and the Cincinnati Bengals
    for a dash of community spirit, and prefers solitary trail runs over crowded gyms.
  arts: Jaime Mangum, an acrylic painter and generative art coder inspired by Yayoi Kusama’s immersive installations, the glitch-electronica of Aphex Twin, and the speculative narratives of author Ted Chiang,
    regularly attends Paducah’s art walks and contributes to open-source visualisation projects that fuse code and canvas.
  travel: Jaime Mangum, who plans trips with a meticulous itinerary that balances solo nature immersion—such as photographing the fall foliage in New England’s White Mountains and hiking the Great Smoky
    Mountains—with occasional cultural pilgrimages to Berlin’s vibrant street-art districts and Kyoto’s serene temples, all while keeping flights within a modest budget.
  culinary: Jaime Mangum, an intermediate home cook who favors seasonal, farm-to-table meals like roasted beet salad with goat cheese, hand-rolled sushi featuring pickled daikon, and occasional experiments
    with molecular gastronomy using agar-agar and liquid nitrogen, often pairs meals with a curated playlist of lo-fi beats.
  core: Jaime Mangum, a methodical yet wildly imaginative developer-artist who channels solitary hikes into code-driven art, budgets rigorously while occasionally splurging on tech gear, and balances a
    disciplined health routine with a habit of forgetting dental appointments.
background:
  cultural: Jaime grew up in Hartford, a small town in Ohio County, Kentucky, within a predominantly white, middle‑class community that values self‑reliance, hospitality, and close family ties. Her family
    encouraged academic achievement, leading her to pursue a STEM degree and a career in technology. While the local culture is rooted in Appalachian traditions—folk music, storytelling, and seasonal festivals—Jaime
    also gravitated toward broader digital culture through the internet, giving her a global perspective. This blend of rural Midwestern values and contemporary tech influences informs her pragmatic work
    ethic, her appreciation for community, and her curiosity about diverse artistic expressions.
