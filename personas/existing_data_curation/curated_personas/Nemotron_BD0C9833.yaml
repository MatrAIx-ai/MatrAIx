personas:
  professional: William Woods, a 73‑year‑old senior janitor in Kilauea, leverages his practical curiosity and calm, collaborative demeanor to spearhead a green‑cleaning initiative at the community center,
    integrating hazardous‑material safety, minor plumbing repairs, and mentorship of new staff while they balance meticulous organization with flexible problem‑solving.
  sports: William Woods, an avid early‑morning hiker of Kauai’s coastal trails, follows the Hawaii Rainbow Warriors men’s basketball and the local Kauai Anglers Club, occasionally joining community fishing
    outings, and they support the Seattle Seahawks during football season as a nostalgic nod to family traditions.
  arts: William Woods, a senior ukulele enthusiast, plays at community gatherings, sings in his church choir, draws inspiration from Israel Kamakawiwo'ole’s melodies, enjoys the hula performances of Hula
    Hālau 'Ōlelo, and they occasionally read works by historian Nainoa Thompson, weaving cultural arts into their daily routine.
  travel: William Woods, who prefers organized group tours with clear itineraries, enjoys revisiting the volcanic landscapes of the Big Island, occasionally travels to historic sites in Washington D.C.,
    and they dream of a gentle cruise to the islands of Tahiti, balancing their love for nature with the comfort of accessible travel.
  culinary: William Woods, an adept home cook, frequently prepares poke bowls with ahi tuna, kalua pork wrapped in ti leaf, and seasonal taro poi, savoring the sweet aroma of coconut milk and fresh pineapple,
    while they occasionally treat themselves to a dinner at a beachfront restaurant featuring seared mahi‑mahi with mango salsa.
  core: William Woods, a calm, curiosity‑driven senior custodian who blends meticulous green‑cleaning practices with a love for ukulele jams and early‑morning hikes, often forgets to water his garden at
    night but they compensate by meticulously scheduling volunteer clean‑ups.
background:
  cultural: William is a white American who moved to Kauai with his wife in the early 1970s. Over five decades he has embraced the local way of life, adopting the aloha spirit in his daily interactions.
    He respects Hawaiian traditions, knows basic Hawaiian phrases such as “Aloha” and “Mahalo,” and participates in community festivals and cultural events. While his ethnic heritage remains European‑American,
    his identity is deeply intertwined with the island’s natural environment and multicultural community, reflecting a blend of mainland upbringing and long‑term Hawaiian residency.
