  career_goals: Even at 73, William remains ambitious about contributing to his workplace and community. He aims to be promoted to head custodian of the local community center, where he can design and implement
    a green-cleaning program that reduces chemical use and water consumption. He also hopes to formalize a mentorship track for younger custodial staff, sharing his practical knowledge and calm problem-solving
    style. Beyond the workplace, William wants to volunteer as a safety officer for the annual Kauai County beach-cleanup events and help preserve historic buildings through his maintenance expertise.
