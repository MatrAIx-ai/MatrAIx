persona_description: A meteorologist who specializes in atmospheric dispersion modeling and is responsible for predicting the spread of atmospheric contaminants over long distances. He or she is part of
  the Met Office, a Regional Specialized Meteorological Centre (RSMC), and a contributor to the Comprehensive Test Ban Treaty Organisation (CTBTO). The persona is skilled in the use of NAME, a pollution
  dispersion model, and has extensive experience in predicting the spread of atmospheric contaminants, including radioactive releases, industrial fires, volcanic eruptions, and animal diseases. The persona
  is also involved in international emergency response activities, coordinating with other RSMCs and the International Atomic Energy Agency (IAEA) to provide accurate and timely advice for radiological
  incidents.
