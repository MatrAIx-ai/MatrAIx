  hobbies: '["Wildlife Photography", "Watercolor Painting", "Mystery Novels", "Puzzle Solving", "Scale Model Building", "Backcountry Hiking", "Astronomy", "Classical Guitar"]'
  career_goals: Gary aims to rise to the rank of detective lieutenant and ultimately command a specialized unit—such as a cold‑case or cybercrime division—within the Wisconsin State Police. He is driven
    to integrate cutting‑edge technology, like predictive analytics and AI‑assisted investigative tools, into everyday policing to improve clearance rates. Long‑term, he envisions authoring a handbook on
    data‑driven investigative methods and establishing a mentorship program that emphasizes disciplined, solitary research skills, positioning himself as a thought leader in modern law enforcement.
