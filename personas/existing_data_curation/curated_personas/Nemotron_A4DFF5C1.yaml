personas:
  professional: Frazier Mcduffie, a budding team captain in the community center’s Mini‑Kickers soccer squad and a meticulous LEGO builder, uses their practical, structured mindset to organize drills and
    assemble complex set pieces, while they display early leadership and reliable teamwork skills.
  sports: Frazier Mcduffie, a lively member of the Mini‑Kickers soccer squad at the community center, regularly kicks the ball with the same enthusiasm they show while cheering for the city’s Riverdale
    Rockets, and they spend Saturdays playing casual pick‑up games with friends at the neighborhood park.
  arts: Frazier Mcduffie, a budding reader of Eric Carle’s “The Very Hungry Caterpillar” and a fan of space‑themed picture books, grooves to the beats of Kendrick Lamar and Beyoncé at family gatherings,
    often attempting the latest dance moves from TikTok videos while they proudly display a hand‑drawn replica of the solar system made from LEGO bricks.
  travel: Frazier Mcduffie, who loves family road trips that blend adventure with learning, has explored the county’s botanical garden, a nearby zoo featuring exotic animals, and a weekend getaway to Space
    Center Houston, and they now dream of traveling to the Grand Canyon for a rover‑like exploration game.
  culinary: Frazier Mcduffie, a budding chef who often helps harvest cherry tomatoes and carrots from their grandparents’ garden, eagerly munches on crunchy carrot sticks and fresh cucumber slices, but
    also insists on a cheesy margherita pizza with extra basil for snack time, and they love experimenting with simple stir‑fry recipes that include sweet bell peppers and soy sauce.
  core: Frazier Mcduffie, a six‑year‑old with boundless energy, a penchant for LEGO precision, a love for soccer teamwork, and a habit of pocket‑sizing every sticker they collect, balances structure with
    spontaneous dance parties at family gatherings.
background:
  cultural: Frazier grows up in a close‑knit African‑American family in Jonesboro, Georgia. His family celebrates Southern black traditions, from church gatherings and gospel music to family barbecues featuring
    soul food like fried chicken, collard greens, and cornbread. Community ties are strong; he attends a local Baptist church where he participates in Sunday school, choir rehearsals, and holiday events
    such as Juneteenth celebrations. His cultural identity is shaped by stories of resilience, respect for elders, and a shared love for basketball, hip‑hop, and family storytelling nights. The multicultural
    environment of Clayton County also exposes him to a variety of languages and foods, enriching his worldview.
