  hobbies: '[''soccer'', ''LEGO building'', ''reading picture books'', ''listening to hip‑hop and R&B music'', ''dancing'', ''gardening with grandparents'']'
  career_goals: Frazier’s biggest ambition is to become a community helper—he dreams of being a firefighter, police officer, or teacher who can keep people safe and help others. Inspired by the organized
    routine of his elementary school and local community programs, he also hopes to learn how to coach a kids’ soccer team one day. He enjoys thinking about how his practical skills can serve his neighborhood.
