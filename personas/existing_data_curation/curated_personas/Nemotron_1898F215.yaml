  career_goals: Jay aims to turn his creative passions into a professional career in multimedia design or UX/UI. He plans to enroll in a specialized art and design program at a community college or vocational
    school, build a freelance portfolio serving local businesses in Woodbridge, and eventually become a creative director who crafts inclusive visual experiences. He also seeks to use his art to support
    community projects and promote social harmony.
