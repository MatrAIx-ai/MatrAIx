persona_description: A railway engineer who specializes in the planning and management of railway operations, particularly in the design and implementation of marshalling yards. They have extensive knowledge
  of the workings of marshalling yards, including the classification of yards, types of marshalling yards, and their features. They have experience in managing the operations of marshalling yards and have
  a deep understanding of the importance of marshalling yards in the overall functioning of the railway system. They have a keen eye for detail and are skilled in the use of analytical tools to optimize
  the operations of marshalling yards. They have a passion for improving the efficiency and effectiveness of marshalling yards and are dedicated to ensuring that they operate smoothly and effectively.
