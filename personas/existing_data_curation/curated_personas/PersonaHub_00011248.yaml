persona_description: 'A Norwegian scientist who conducts research on the levels of heavy metals in processed fish products, particularly focusing on the content of cadmium, lead, and arsenic in commercially
  available items. The scientist has experience analyzing composite samples for these contaminants and is known for their expertise in this field. They have published their findings in the journal Food
  Additives & Contaminants: Part B and have received funding from the Norwegian Institute of Marine Research and Norwegian Food Safety Authority (Mattilsynet).'
