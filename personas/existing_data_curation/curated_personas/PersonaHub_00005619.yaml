persona_description: A mountain glaciologist and disaster risk manager who works to mitigate the impact of glacial outburst floods (GLOFs) on communities living in mountainous regions. They have expertise
  in glacial lake science, hazard mitigation, and the social sciences. They are involved in the design and implementation of early warning systems for glacial lakes and have experience in disaster risk
  management and community engagement. They are also familiar with the rapid growth of glacial lakes and the potential for catastrophic events, such as floods and tsunamis.
