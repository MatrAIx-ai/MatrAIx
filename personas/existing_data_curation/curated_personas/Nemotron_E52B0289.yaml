  hobbies: '[''Building LEGO sets'', ''Reading adventure books'', ''Playing soccer'', ''Participating in school talent shows'', ''Playing Minecraft'', ''Collecting baseball cards'', ''Attending community
    sports events'', ''Helping organize class projects'']'
  career_goals: Harry dreams of a future where he can blend his love for structure and people. He aspires to become a school principal, overseeing schedules and ensuring smooth operations, or a soccer coach,
    guiding a team with clear routines and a competitive spirit. He also imagines playing professional soccer, enjoying the spotlight and competition. He is motivated to keep getting good grades to keep
    his options open.
