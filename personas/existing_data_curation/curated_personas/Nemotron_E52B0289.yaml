personas:
  professional: Harry Lee is a budding LEGO architect who channels their love for routine, meticulous planning, and talkative confidence into constructing complex LEGO sets, positioning themself as an emerging
    problem-solver among their peers.
  sports: Harry Lee is a forward for the Eastside Lions U-9 soccer club, thrives during spring league practices, cheers for FC Barcelona and the Los Angeles Lakers, and balances a competitive drive with
    a routine of after-school drills and weekend matches.
  arts: Harry Lee is an avid LEGO creator who stages dramatic presentations of their builds during school talent shows, devours adventure novels by J.K. Rowling and Rick Riordan, and draws creative energy
    from the cinematic scores of John Williams and the pop beats of Billie Eilish.
  travel: Harry Lee plans family vacations with a detailed checklist, enjoys structured sightseeing trips like the recent visit to Disneyland in Anaheim and the Smithsonian in Washington, D.C., and dreams
    of exploring Kyoto, Japan to see cherry blossoms and ancient temples that echo the myths they love.
  culinary: Harry Lee prefers familiar comfort foods, can whip up a passable mac-and-cheese using elbow pasta and cheddar, loves pepperoni pizza topped with extra mozzarella, and, when indulging, secretly
    adds gummy bears into homemade brownies.
  core: Harry Lee blends a love for orderly creativity with a chatty confidence, turning every LEGO set and soccer match into a stage for their competitive spirit and occasional snack-stashing habit.
background:
  cultural: Harry comes from a middle‑class, white family in Toledo, Ohio. He grows up in a Midwestern environment that values hard work, punctuality, and community involvement. Family traditions include
    weekly Sunday meals, attending local high school football games, and participating in neighborhood block parties. The city’s industrial heritage and proximity to Lake Erie shape his appreciation for
    local sports teams and outdoor activities. His upbringing reflects the modest, practical values common in the region, with an emphasis on education, routine, and friendly competition.
attributes:
  skills: '[''Organizing school supplies'', ''Following daily routines'', ''Basic arithmetic (addition and subtraction)'', ''Reading comprehension (chapter books)'', ''LEGO building and spatial reasoning'',
