    equipment"]'
  hobbies: '["Photography", "Sketching natural scenes", "Visiting art galleries and museums", "Playing basketball", "Weekend camping and hiking", "DIY woodworking projects", "Barbecue cooking", "Attending
    live music performances (jazz, hip‑hop, gospel)", "Participating in community festivals", "Exploring new cuisines"]'
  career_goals: Kristian aims to move into a supervisory role within the logging industry, eventually becoming a forester or land‑use manager who champions sustainable practices. Over the next five years
    he plans to earn a bachelor’s degree in natural resources management, acquire certifications in forest stewardship, and lead a crew that implements low‑impact harvesting methods. Parallel to his professional
    trajectory, he dreams of opening a small custom woodworking studio that fuses his love of art with responsibly harvested timber, creating functional art pieces for the local market. He also wants to
    develop a community outreach program that introduces local youth to forestry, safety training, and creative expression through woodcraft.
