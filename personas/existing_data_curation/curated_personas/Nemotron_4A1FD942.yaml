    management'', ''Stakeholder communication'', ''Team mentorship'']'
  hobbies: '[''Salsa dancing'', ''Marimba dancing'', ''Cooking Guatemalan cuisine'', ''Hosting multicultural potlucks'', ''Volunteering at after-school STEM program'', ''Yoga and mindfulness meditation'',
    ''Gratitude journaling'', ''Hiking in Brazos Bend State Park'', ''Photography'', ''Reading mystery novels'', ''Attending improv comedy shows'']'
  career_goals: Yolanda aims to advance from senior database administrator to a lead data architect role within the next three to five years, pursuing certifications such as AWS Certified Solutions Architect
    – Professional and SnowPro Core. She envisions directing the enterprise data strategy for a mid-size organization, shaping governance policies, and ensuring equitable data access across departments.
    Long-term, she aspires to become a Chief Data Officer, where she can influence business decisions at the executive level. Parallel to her technical ambitions, she plans to expand her mentorship outreach
    by organizing workshops for women and Latinx professionals and speaking at regional tech meet-ups, reflecting her commitment to community building.
