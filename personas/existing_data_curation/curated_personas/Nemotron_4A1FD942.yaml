personas:
  professional: Yolanda Fernandez is a senior database administrator who translates complex data architecture into clear business value, leveraging expertise in relational and NoSQL models, AWS and Azure
    migrations, and data governance; they mentor junior staff and energize team meetings with a talkative, inclusive style.
  sports: Yolanda Fernandez enjoys cheering on the local soccer club and occasionally playing in a mixed‑gender weekend league; they also hike the wetlands of Brazos Bend State Park on Saturday mornings,
    balancing a love for team camaraderie with solo cardio sessions.
  arts: Yolanda Fernandez immerses themselves in salsa and marimba dancing, captures vibrant street scenes with a DSLR, and attends improv comedy shows for quick laughs; they tune into the sounds of Celia
    Cruz and Rubén Blades while devouring mystery novels by Agatha Christie during quiet evenings.
  travel: Yolanda Fernandez blends purposeful travel with familial ties, taking annual trips to the highlands of Central America to visit relatives, while also exploring culinary tours in Oaxaca, weekend
    road trips to Austin’s live‑music scene, and planning a future adventure to the historic streets of Cartagena; they balance adventure with budget awareness.
  culinary: Yolanda Fernandez delights in cooking pepian, kak’ik, and corn‑based tamales, meticulously grinding chiles and scraping fresh corn husks; they often forget to set timers, leading to occasional
    over‑cooked rice, but always serve friends a table brimming with aromatic, spicy comfort.
  core: Yolanda Fernandez balances a data‑driven career with community‑centered traditions, channeling a structured mindset into meticulous budgeting, proactive health routines, and lively cultural gatherings,
    all while wrestling with a perpetual worry that fuels relentless preparation.
background:
  cultural: Yolanda was born to Guatemalan immigrant parents who settled in Fort Bend County, Texas, when she was a child. Growing up bilingual in Spanish and English, she maintains strong ties to her cultural
    roots through family celebrations of Día de los Muertos and Semana Santa, and by preparing traditional foods such as tamales, pepian, and atol de elote. Her upbringing emphasized education, community
    service, and respect for her Maya and Catholic heritage. Today she participates in local Guatemalan festivals, is a member of a cultural association that supports new immigrants, and regularly travels
    to Guatemala to visit relatives, infusing her personal and professional life with a collaborative, inclusive mindset.
attributes:
