personas:
  professional: Itia Stevenson is a veteran hairdresser with over three decades of experience, renowned for precision cutting, advanced balayage and ombre color work, and meticulous salon management, who
    leverages their disciplined routine and organized mindset to mentor junior stylists and deliver consistently high client satisfaction.
  sports: Itia Stevenson enjoys low‑impact fitness, practicing sunrise yoga on the beach, walking her dog along the coastline, and joining a community beach‑volleyball league with the Inglewood Beach Club,
    while cheering on the Los Angeles Lakers and Dodgers during the NBA and MLB seasons.
  arts: Itia Stevenson participates in a community choir that performs traditional songs and classics, finds inspiration in the soulful guitar work of Carlos Santana and the vocal stylings of Adele, and
    collects prints by local street artist Maya Thompson, integrating these artistic influences into salon ambience and personal leisure.
  travel: Itia Stevenson prefers well‑planned road trips to coastal retreats, having recently explored the lush landscapes of Maui and the cultural markets of Bali, while regularly weekend‑hopping to nearby
    Santa Barbara and the Sonoma wine country for relaxation and culinary inspiration, always balancing travel costs with budget constraints.
  culinary: Itia Stevenson enjoys cooking at home, skillfully preparing poke bowls with fresh ahi tuna, aromatic poke sauce, and pickled ginger, as well as traditional laulau wrapped in banana leaves and
    smooth poi made from taro, while frequently using basil, mint, and kukui nut oil from her herb garden to enhance flavors.
  core: Itia Stevenson blends disciplined routine with creative flair, orchestrating her salon like a finely tuned orchestra, yet often forgets to water her herb garden during hectic weeks, and secretly
    hoards vintage hair‑dryers as a nostalgic quirk.
background:
  cultural: Itia is of Polynesian descent, with family roots tracing back to Samoa and Hawai'i. Growing up in a close‑knit Pacific Island community in Los Angeles County, she was immersed in values of family
    loyalty, respect for elders, and communal support. These cultural influences shape her approach to hairstyling, where she incorporates traditional hair‑braiding techniques and natural oil treatments
    passed down through generations. She celebrates cultural holidays such as Samoan Independence Day and Hawaiian Makahiki, often decorating her salon with woven mats, kapa fabric art, and ocean‑themed
    motifs. Her faith and participation in a local church further reinforce her sense of service, prompting her to offer free hair‑care sessions during community outreach events.
