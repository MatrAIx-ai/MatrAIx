  hobbies: '[''Gardening'', ''Cooking traditional Polynesian cuisine'', ''Attending cultural festivals'', ''Community choir participation'', ''Volunteering at youth hairstyling workshops'', ''Yoga'', ''Reading
    business and self‑development books'', ''Dog walking'', ''Beach walks'']'
  career_goals: Itia aspires to open a boutique salon in Inglewood that blends modern styling with Polynesian heritage, offering a curated line of organic hair‑care products featuring kukui nut, coconut,
    and ti plant extracts. She seeks master‑stylist certification and aims to become a recognized mentor within the local hair‑industry community, hosting workshops on natural hair care for Pacific Island
    clients. Long‑term, she hopes to expand her brand to include a small retail space and partner with community centers to provide free styling services for low‑income families during cultural festivals.
