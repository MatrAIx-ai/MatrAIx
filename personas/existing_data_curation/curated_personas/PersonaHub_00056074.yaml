persona_description: A concerned animal rights advocate and researcher who is deeply concerned about the ethical treatment of animals in medical research in New South Wales. They are a member of the animal
  welfare community and are concerned about the potential impact of the RSPCA's withdrawal of support from ethics committees on the treatment of animals in research. They are also concerned about the potential
  cost and effectiveness of a government inspectorate as a replacement for ethics committees.
