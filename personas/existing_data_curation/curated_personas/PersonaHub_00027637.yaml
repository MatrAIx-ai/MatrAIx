persona_description: A planner who specializes in Traditional Neighborhood Development (TND) zoning, particularly in the context of implementing comprehensive regulations to create walkable, mixed-use neighborhoods
  that preserve historic and architectural significance. The planner has experience in collaborating with sustainability officers and city/town planning departments to ensure that TND regulations are implemented
  in a holistic manner to prevent conflicts and address sustainability concerns. They are skilled in identifying creative nuances and problematic departures from TND principles to ensure that TND regulations
  are enforced effectively. The planner is passionate about creating high-quality neighborhoods that encourage economic diversity, vitality, and sustainable development while minimizing infrastructure costs
  and traffic congestion.
