personas:
  professional: Jonathan Mane, an aspiring teenage engineer who spends weekends building Arduino circuits and assembling model rockets, channels his methodical curiosity and competitive edge into meticulous
    project planning and problem‑solving, earning a reputation among teachers for reliably delivering polished prototypes and often inspiring peers with the way they systematically troubleshoot each obstacle.
  sports: Jonathan Mane, a dedicated member of his town’s junior basketball league and a hopeful varsity player at his high school, channels his competitive spirit into daily shooting drills while rooting
    for the Los Angeles Lakers, believing that disciplined practice and strategic teamwork translate into better scores on the court and in his electronics projects, and they thrive on the adrenaline of
    close games.
  arts: Jonathan Mane, who spends evenings strumming guitar chords to The Beatles’ “Let It Be” and editing school video projects with a flair inspired by director Christopher Nolan’s visual storytelling,
    finds that the blend of classic rock melodies and cinematic suspense fuels his creative problem‑solving and offers a soothing counterbalance to his methodical engineering pursuits, and they often experiment
    with layering synth sounds to capture futuristic vibes.
  travel: Jonathan Mane, who plans his family’s summer vacations months in advance, enjoys weekend camping trips to the nearby Rocky Mountain National Park and a nostalgic visit to Washington D.C.’s Smithsonian
    Air and Space Museum, and dreams of a future field trip to the Kennedy Space Center in Florida to witness the launch pads that inspire his rocket builds, and they keep a scrapbook of maps and ticket
    stubs to track every adventure.
  culinary: Jonathan Mane, who can barely boil pasta without overcooking it but proudly perfects a pepperoni pizza topped with extra mozzarella and a side of homemade garlic knots, often trades snack bars
    for fresh fruit like apple slices and occasionally experiments with trail‑mix recipes featuring almonds, dried cranberries, and dark chocolate chips when camping, and they occasionally binge‑watch cooking
    tutorials to improve their kitchen skills.
  core: Jonathan Mane, a teenage tinkerer who balances a relentless curiosity for electronics with a habit of procrastinating on homework until the last minute, blends disciplined project planning with
    occasional skepticism about peers’ motives, and they become both a reliable teammate and a quietly competitive thinker.
background:
  cultural: Jonathan grew up in Rickman, a small community in Overton County, Tennessee, where rural Southern values and Appalachian traditions shape daily life. His family participates in local church
    activities and community events such as county fairs and high school football games, fostering a sense of belonging and modesty. The region’s emphasis on self‑reliance and practical skills encouraged
    his hands‑on hobbies, while the school's curriculum and internet access provide exposure to broader ideas. He admires the region’s natural landscape, often exploring nearby woods and streams, and he
    carries forward the storytelling and music heritage of the Appalachians through his interest in folk tunes on the guitar. This blend of tradition and modern curiosity informs his worldview and aspirations.
