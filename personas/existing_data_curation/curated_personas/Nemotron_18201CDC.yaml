  career_goals: Jonathan hopes to turn his love for building and problem‑solving into a career in engineering. He aims to attend a STEM‑focused high school and later pursue a degree in mechanical or computer
    engineering, with an emphasis on sustainable technology. He dreams of joining a robotics team, competing in national contests, and eventually designing innovative devices or software that solve real‑world
    problems. In the medium term, he plans to earn a scholarship for his academic achievements, secure a technical internship during high school, and perhaps start a small business offering tech repair
    or custom gadget services for his community. His long‑term ambition is to become a leader in a tech‑driven field, combining his practical skills with his curiosity about new ideas.
