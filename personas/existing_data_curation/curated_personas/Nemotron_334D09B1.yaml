  hobbies: '[''Reading non-fiction (science, self-help)'', ''Sudoku and logic puzzles'', ''Piano practice (classical repertoire)'', ''Lap swimming'', ''Baking precise recipes'', ''Chess club'', ''Gardening
    (vegetable garden)'', ''Volunteering for community recycling'', ''Collecting stickers'']'
  career_goals: Marcella aims to follow a clear, disciplined career path. She intends to graduate with honors, pursue a Bachelor's degree in civil engineering or a related field, and ultimately work as
    a project manager overseeing sustainable infrastructure projects. She is also considering a role as a data analyst where her detail-orientation and spreadsheet skills can be applied. Her long-term ambition
    is to lead teams that deliver reliable, well-planned constructions.
