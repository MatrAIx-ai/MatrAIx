  hobbies: '[''Hiking'', ''Gardening'', ''Birdwatching'', ''Reading Sci‑Fi & Fantasy'', ''DIY Electronics & Robotics'', ''Baking'', ''Painting'', ''Community Theater'', ''Board Games'', ''Volunteering at
    Local Library'']'
  career_goals: Patrice aims to transition into a leadership role within early childhood education, aspiring to become a director of a preschool or community learning center that integrates robust STEM
    curricula. She plans to pursue a master’s degree in Early Childhood Education, develop a regional makerspace for children, create inclusive, inquiry‑based learning programs, and eventually influence
    state policy to support early STEM education initiatives.
