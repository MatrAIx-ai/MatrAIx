persona_description: A public health advocate and environmental scientist who specializes in developing real-time air quality maps and algorithms to assist the public in interpreting air quality data. They
  have developed a method to blend model data, regulatory monitoring data, and calibrated/quality controlled low-cost sensor data to provide air quality index (AQI) values at 5 km resolution that are considerably
  more accurate than previous methods, especially during wildfires. They have used statistical checks on two PurpleAir channels and compared the differences between the A and B channels over a one week
  moving window using several statistical techniques to identify sensors with large bias or scatter between the two sensors. They have also considered wind speed and direction when interpolating monitoring
  data and have used location-specific uncertainties for low-cost sensor data. They have a system that updates the map in near-real time and has siting criteria for Purple Air sensors.
