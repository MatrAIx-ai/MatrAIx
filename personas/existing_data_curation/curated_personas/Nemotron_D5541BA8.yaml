  hobbies: '[''Reading Historical Nonfiction'', ''Psychology and Mindfulness Literature'', ''Gardening'', ''Tex-Mex Cooking'', ''Yoga'', ''Guided Meditation'', ''Small Book Club'', ''Volunteer Adult‑Education
    Tutoring'']'
  career_goals: Alyson aims to re‑enter the education field on a flexible, part‑time basis that accommodates her family responsibilities and stress‑management needs. She plans to launch a community‑focused
    tutoring service that offers adult literacy and lifelong‑learning workshops, leveraging her curriculum design skills to create inclusive, culturally responsive programs. To deepen her impact, she intends
    to pursue a certification in educational counseling or mental‑health first aid, enabling her to support learners dealing with anxiety and stress. Long‑term, Alyson hopes to collaborate with local schools
    and nonprofit organizations in San Antonio to develop mentorship initiatives that bridge gaps for underserved students, while maintaining a sustainable work‑life balance.
