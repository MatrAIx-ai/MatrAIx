personas:
  professional: A veteran educator and curriculum designer, Alyson Douglas leverages their graduate training in education and strong organizational skills to craft inclusive adult‑learning workshops, while
    their preference for low‑pressure environments and natural empathy guide them toward part‑time tutoring services that balance community impact with family responsibilities.
  sports: A low‑impact sports enthusiast, Alyson Douglas follows the San Antonio Spurs closely, participates in a Saturday morning walking group at Brackenridge Park, and occasionally joins a co‑ed recreational
    softball league at the community center, preferring activities that provide stress relief without intense competition.
  arts: A culturally curious arts lover, Alyson Douglas devotes evenings to reading historical nonfiction and mindfulness books, while also savoring music by Carlos Santana and poetry readings of Maya Angelou,
    and often attends the San Antonio Museum of Art’s Mexican folk art exhibit, finding inspiration for both their garden and cooking.
  travel: A thoughtful traveler, Alyson Douglas prefers carefully planned, low‑key weekend getaways to nearby destinations like the Texas Hill Country vineyards, the historic missions of San Antonio, and
    occasional cultural trips to Oaxaca, Mexico, balancing a desire for exploratory learning with family commitments and a modest travel budget.
  culinary: A culinary creative, Alyson Douglas enjoys crafting moderately spicy Tex‑Mex dishes such as chicken enchiladas with cilantro‑lime rice and fresh salsa made from garden‑grown tomatoes and jalapeños,
    often hosting intimate dinner gatherings for close friends where they experiment with native herbs like epazote.
  core: Balancing a meticulous, community‑focused mindset with a lingering tendency toward worry, Alyson Douglas channels solitary creativity into gardening, mindful cooking, and low‑stress adult education,
    while occasionally surrendering to impulsive seed‑buying splurges.
background:
  cultural: Alyson is a white, middle‑class Texan whose family has lived in Central Texas for several generations. She was raised with the values of Southern hospitality and community service, often attending
    church gatherings and neighborhood potlucks in San Antonio. While she identifies with mainstream American culture, she embraces the multicultural fabric of Bexar County—enjoying local festivals, respecting
    diverse culinary traditions, and supporting bilingual education initiatives in her community. Her upbringing emphasized self‑reliance, modesty, and a deep respect for family and neighbors, shaping her
    cooperative and considerate nature.
