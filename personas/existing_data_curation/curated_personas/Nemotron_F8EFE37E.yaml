  career_goals: Seeking flexible, part‑time or volunteer roles that blend her love of art and community, Luz aims to become a cultural liaison for local museums or festivals, develop a community art workshop
    series that highlights Mexican heritage, and launch an online blog or podcast sharing stories of artists and traditions. She also plans to pursue a bachelor's degree in cultural studies to deepen her
    expertise, and possibly start a small pop‑up gallery or craft market that offers a flexible schedule, allowing her to continue curating and teaching without the constraints of a full‑time job.
