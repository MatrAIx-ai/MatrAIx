  career_goals: She dreams of becoming an artist who paints murals that celebrate her community and perhaps curates an exhibit at a local museum. She also imagines teaching younger children, sharing her
    love of curiosity and art. She hopes to lead a school art club or become a captain of a sports team, where she can combine her competitive drive with teamwork. Long‑term, she aspires to explore science
    or technology, thinking of creating interactive art installations that blend coding and creativity.
