personas:
  professional: Shirley Henry is a budding young artist who blends bright media in drawings and enjoys turning story ideas into illustrated comic strips, channeling their curiosity and competitive spirit
    into mastering new techniques.
  sports: Shirley Henry thrives on the energy of their local youth soccer team, the Kiddie Kicks Falcons, competes in the Saturday afternoon drills at the community field, also twirls in ballet at the Twirl
    & Leap dance studio, and proudly wears a New York Knicks jersey while cheering for the team on game nights.
  arts: Shirley Henry lives for bright colors and fresh beats, sketching scenes inspired by Van Gogh’s swirling skies while humming Beyoncé’s empowering anthems and occasionally rapping along to Chance
    the Rapper during family road trips, making their art sessions a lively mash‑up of visual and musical influences.
  travel: Shirley Henry’s travel style blends curiosity and imagination, having collected pine cones from the Redwood National Park, dreaming of a future trip to the Louvre in Paris, and eagerly planning
    a family weekend at the nearby Lakeview Nature Reserve where they can hunt for rocks and leaves.
  culinary: Shirley Henry’s palate loves bold, colorful foods, often snacking on rainbow fruit salads with strawberries, blueberries, and kiwi, crafting macaroni‑and‑cheese topped with cheddar and crunchy
    breadcrumbs, and insisting on a dollop of honey on their whole‑grain toast for extra sweetness.
  core: Shirley Henry is a vibrant, competitive eight‑year‑old who channels curiosity into bright art, soccer, and a pocket‑sized ledger of allowance, while occasionally forgetting to take their allergy
    meds during play.
background:
  cultural: Shirley is raised in a close‑knit African‑American community in Roxboro, North Carolina. Family gatherings, church activities, and neighborhood block parties are central to her life. She often
    hears stories about her grandparents’ experiences in the Civil Rights era, fostering a sense of pride and resilience. Celebrations like Juneteenth and local cultural festivals bring music, food, and
    art that reinforce her heritage. The local church choir introduces her to gospel music, while her parents play a mix of R&B, hip‑hop, and soul at home. The Southern hospitality of Person County, combined
    with the strong emphasis on community support, shapes her values of respect, perseverance, and collective responsibility.
