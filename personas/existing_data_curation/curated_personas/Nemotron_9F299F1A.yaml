personas:
  professional: Veronica Rover, an aspiring young playwright and theater enthusiast, leverages their meticulous organization and love for the spotlight to script, direct, and star in school productions,
    ensuring rehearsals run on schedule and every prop is perfectly placed, and they thrive on receiving applause from classmates.
  sports: Veronica Rover cheerfully supports the Milwaukee Brewers, swims with the Milwaukee Aquatics Club during summer, and participates in after-school soccer drills with the local East Side Juniors,
    balancing a structured practice schedule with enthusiastic fandom that showcases their sociable drive and love of routine, and they often lead cheers at games.
  arts: Veronica Rover, an avid pianist who practices Chopin etudes while humming the 'Harry Potter' soundtrack, crafts detailed scrapbooks inspired by J.K. Rowling’s magical worlds, studies John Williams’s
    orchestral scores, and writes whimsical short stories echoing Lin-Manuel Miranda’s lyrical flair, channeling their talkative personality into every creative endeavor, and they often perform for friends
    at school events.
  travel: Veronica Rover enjoys planning weekend trips to the Wisconsin Dells waterparks, eagerly anticipates annual family visits to Chicago’s Museum of Science and Industry, dreams of a future vacation
    to Disneyland’s castle, and, while preferring meticulously written itineraries, they occasionally deviate to explore spontaneous local festivals like Summerfest.
  culinary: Veronica Rover favors homemade macaroni and cheese topped with crunchy breadcrumbs, delights in baking cupcakes with colorful sprinkles, chocolate chips, and a secret dash of cinnamon for birthday
    parties, yet they sometimes overindulge in soda and candy after school, reflecting their love for sweet celebrations and their occasional lack of moderation.
  core: Veronica Rover is an energetic, detail-obsessed 11-year-old who orchestrates theatrical productions, saves every spare coin, and transforms each birthday into a meticulously themed extravaganza,
    all while they remain delightfully talkative and occasionally forget to take their allergy medication.
background:
  cultural: Veronica comes from a white, Midwestern family rooted in Milwaukee's neighborhoods. Her household reflects the region's practical, community‑oriented values, emphasizing education, punctuality,
    and participation in local traditions such as county fairs, church gatherings, and support for the city's sports teams. While her family may have German and Polish ancestry common to the area, they
    prioritize inclusivity and active engagement in the diverse fabric of Milwaukee's community life.
attributes:
