  hobbies: '[''reading fantasy novels'', ''writing short stories'', ''playing piano'', ''school theater'', ''scrapbooking'', ''organizing parties'', ''attending local festivals'', ''Milwaukee Brewers fan'',
    ''volunteering at food bank'']'
  career_goals: Veronica aims to maintain top grades throughout high school, earn a scholarship, and eventually become a teacher or school administrator where she can blend her love for organization with
    helping others. She also dreams of hosting a community radio show or a local children's TV program, using her talkative nature and confidence to connect with an audience. In the short term, she wants
    to lead the student council, organize a school‑wide charity drive, and continue building a record of academic achievement.
