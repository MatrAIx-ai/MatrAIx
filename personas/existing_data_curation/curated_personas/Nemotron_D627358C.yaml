  hobbies: '[''Beach walks'', ''Fishing'', ''Seashell collecting'', ''Salsa/bolero/pleña dancing'', ''Herb gardening'', ''Traditional cooking experimentation'', ''Reading Puerto Rican history novels'',
    ''Chess'', ''Card games'', ''Watching classic Puerto Rican films'']'
  career_goals: Though retired, Mauricio aims to deepen his contribution to his community. He plans to mentor younger residents in traditional cooking and music, lead intergenerational storytelling workshops
    at the local senior center, and compile a modest memoir of barrio life to be digitized for future generations. He also wishes to learn simple digital photography to document family moments and local
    festivals, and hopes to travel with his wife to visit relatives in the mainland United States while still remaining a vibrant presence in Toa Baja’s cultural life.
