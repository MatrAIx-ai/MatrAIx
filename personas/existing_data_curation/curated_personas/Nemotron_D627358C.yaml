personas:
  professional: Mauricio Ibarra, a retired handyman turned community storyteller, blends hands‑on carpentry, plumbing, and electrical fixes with a talent for bilingual translation and basic digital outreach,
    channeling his curious, spontaneous nature into lively workshops that celebrate local heritage while juggling a delightfully chaotic schedule.
  sports: Mauricio Ibarra starts each day with a sunrise beach walk that doubles as low‑impact cardio, follows the Cangrejeros de Santurce basketball team religiously, participates in the senior center’s
    weekly shuffleboard league, and still feels a rush when joining informal fishing competitions at the pier.
  arts: Mauricio Ibarra sways to the timeless salsa of Celia Cruz, the bolero croon of José José, and the lively plena beats of Los Pleneros, strums his cuatro alongside the rhythms, and spends evenings
    watching classic films starring Rita Moreno and Tommy Lee Jones, letting the music and cinema shape his storytelling.
  travel: Mauricio Ibarra prefers relaxed, family‑oriented road trips that blend sunrise beach picnics in Culebra, historic wandering through Old San Juan’s cobblestones, and occasional visits to his daughter’s
    home in Miami, while secretly dreaming of a tranquil art‑tour of Kyoto’s temples once his health permits.
  culinary: Mauricio Ibarra, a master of island cuisine, whips up arroz con gandules with a secret sofrito blend of cilantro, garlic, and annatto, perfects mofongo using green plantains and a splash of
    smoked bacon, and experiments with alcapurrias stuffed with crab and a pinch of lime zest, always topping his creations with fresh herbs from his garden.
  core: Mauricio Ibarra is a sunrise‑walking, cuatro‑strumming raconteur whose spontaneous spirit fuels endless storytelling, yet his habit of misplacing his glasses while cooking often leads to impromptu
    herb‑sniffing improvisations.
background:
  cultural: Mauricio’s cultural roots are steeped in the coastal Puerto Rican traditions of Toa Baja and Trujillo Alto. Raised in a modest barrio household, he grew up immersed in Spanish‑colonial customs,
    Afro‑Caribbean rhythms, and the lingering influence of the indigenous Taino heritage. Catholicism and family gatherings are central to his worldview, and local festivals such as the Fiesta de San Juan
    keep the community tightly knit. His multilingual ability in Spanish and functional English reflects the island’s bicultural reality. He values the communal spirit of “barrio,” where sharing food, music,
    and stories preserves identity across generations.
