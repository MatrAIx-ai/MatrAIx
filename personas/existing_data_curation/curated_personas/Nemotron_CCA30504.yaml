  hobbies: '[''Woodworking'', ''Fishing'', ''Reading historical biographies'', ''Watching documentary series'', ''Gardening'', ''Volunteer work at animal shelter'', ''Bicycle riding on rural trails'', ''Model
    train building'']'
  career_goals: Raymond aims to advance from a frontline representative to a supervisory role within his call center, where he can lead a small team, design training modules, and improve workflow efficiency.
    He plans to earn an associate's degree in business administration through night classes, strengthening his qualifications for operations management. Long‑term, he envisions opening a modest home‑services
    venture—perhaps a handyman business—that combines his practical curiosity about tools with his desire for stable, community‑focused work after retirement. Achieving a promotion, increasing his earning
    potential, and establishing a reliable post‑career income are key milestones for him.
