personas:
  professional: An aspiring Certified Nursing Assistant, Kassidy Salib leverages hands‑on experience caring for elderly and disabled Chicago residents, combining meticulous wound‑care and vital‑sign monitoring
    with a curiosity‑driven eagerness to adopt new caregiving technologies, while their spontaneous nature and competitive edge sometimes clash with the rigid schedules of home‑health assignments.
  sports: Kassidy Salib hits the Lakefront Trail for jogs each weekend, often joining the Chicago Road Runners club for group runs while cheering on the Chicago Cubs and Chicago Bears, and dabbles in indoor
    swimming at a community center during the colder months to balance cardio with low‑impact exercise.
  arts: Kassidy Salib captures the gritty downtown vibe through street photography, sketches neighborhood scenes with charcoal, devours contemporary fiction by Sally Rooney, and unwinds to the haunting
    melodies of Phoebe Bridgers and the cinematic scores of Hans Zimmer.
  travel: Kassidy Salib prefers spontaneous weekend road trips, having explored the culinary hotspots of Milwaukee and the indie music scene in Austin, while dreaming of a solo backpacking adventure through
    Japan’s Kyoto and Osaka after saving enough from their part‑time gigs.
  culinary: Kassidy Salib experiments in the kitchen with limited pantry staples, often improvising a kimchi fried rice using leftover rice, gochujang, and fresh cilantro, while also mastering a simple
    avocado toast with balsamic reduction and occasionally treating themselves to Chicago‑style deep‑dish pizza on a Friday night.
  core: Kassidy Salib blends relentless curiosity with pragmatic caregiving, channeling competitive drive into personal growth while habitually bouncing between spontaneous projects and unfinished plans,
    all while finding solace in solitary reflection along the Lakefront.
background:
  cultural: Kassidy was raised in a middle‑class Irish‑American household on Chicago’s northwest side, where Catholic traditions and Midwest pragmatism shaped her values. Growing up in a city known for
    its ethnic diversity, she was exposed to a mosaic of cultures—from Latinx neighborhoods to African‑American communities—instilling a respect for varied perspectives while reinforcing the Midwestern
    emphasis on hard work, self‑reliance, and community service. Family gatherings often centered around hearty meals, holiday traditions, and storytelling, reinforcing a sense of belonging and an appreciation
    for both her own heritage and the broader cultural fabric of Chicago.
