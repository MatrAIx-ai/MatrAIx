  hobbies: '[''reading contemporary fiction'', ''listening to true‑crime podcasts'', ''indie video gaming'', ''street photography'', ''urban sketching'', ''experimental cooking'', ''solo jogging along Lake
    Michigan'', ''mindfulness meditation'', ''exploring DIY home projects'']'
  career_goals: Kassidy aims to leverage her practical experience to become a Certified Nursing Assistant within the next year, then pursue an associate degree in nursing to qualify as a registered nurse
    specializing in home health care. She is also interested in obtaining certifications in geriatric care and adult dementia support. Long‑term, she envisions starting her own boutique personal‑care agency
    that blends evidence‑based practices with flexible, client‑centered schedules, allowing her to apply her competitive drive to build a reputable brand in the Chicago metro area.
