  hobbies: '[''watercolor painting'', ''poetry and short story writing'', ''native garden cultivation'', ''historical sketching walks'', ''museum and art exhibit attendance'', ''bridge (card game)'', ''crossword
    puzzles'', ''experimental culinary cooking'']'
  career_goals: Although retired from formal employment, Jennifer is driven to leave a lasting creative imprint on her community. She aims to compile and publish a memoir that blends personal reminiscences
    with Wilmington's mid‑century history, curate an annual senior art exhibition at the local community center, and establish a digital archive of her watercolor series that can be accessed by schools
    and historians. She also hopes to master basic digital photography and social‑media tools so she can share her work online, and she aspires to mentor younger neighbors by leading a weekly sketch‑and‑storytelling
    workshop.
