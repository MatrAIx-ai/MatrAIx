    User 1: So, what kind of books do you like to read?

    User 2: I like to read a variety of books, but I''m mostly into fantasy and science fiction. I also love graphic novels and manga.

    User 1: I''ve never read a graphic novel or manga before. What are they like?

    User 2: Graphic novels are like comic books, but they''re usually longer and more complex. Manga is a type of Japanese comic book that''s often serialized.

    User 1: That sounds interesting. I might have to check them out sometime.

    User 2: I highly recommend it!

    User 1: So, what do you like about comic cons?

    User 2: I love the atmosphere! It''s so much fun to be around people who are passionate about the same things you are. I also love seeing all the costumes and artwork.

    User 1: I can imagine! I''ve always wanted to go to a comic con, but I''ve never had the time.

    User 2: You should definitely go to one sometime! They''re so much fun.

    User 1: I will! Thanks for the recommendation.'
