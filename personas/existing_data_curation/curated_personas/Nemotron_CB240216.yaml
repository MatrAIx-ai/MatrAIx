personas:
  professional: Makena Watkins, a 17‑year‑old high‑school senior, channels their strong interpersonal, event‑planning, and digital design talents into leading the student council’s brand‑promotion team,
    where their competitive drive and skeptical eye keep campaigns inventive yet data‑informed, and their calm under pressure makes them the go‑to crisis manager during school events.
  sports: Makena Watkins, an avid soccer enthusiast, plays forward on their high‑school varsity team, trains weekly with the community center’s youth league, follows the MLS club Seattle Sounders FC, and
    they combine competitive drills with relaxed pick‑up matches to maintain stamina and sharpen tactical instincts.
  arts: Makena Watkins creates kinetic TikTok videos inspired by Casey Neistat’s editing style, strums acoustic covers of Billie Eilish and Tame Impala on guitar, curates an Instagram feed that echoes the
    vibrant street aesthetic of photographer Brandon Woelfel, and they regularly attend local open‑mic nights featuring indie folk artists.
  travel: Makena Watkins prefers meticulously planned weekend getaways, has explored New York City’s art districts and Miami’s coastal beaches, and dreams of a spring trip to Kyoto’s cherry‑blossom festivals
    and a summer music festival in Barcelona, and they balance their family’s budget constraints with a hunger for youthful, culture‑rich experiences.
  culinary: Makena Watkins enjoys bold flavors, often whipping up spicy shrimp tacos with mango salsa, perfecting miso‑sriracha ramen broth, and crafting pizza topped with smoked mozzarella, basil, and
    prosciutto on Saturday nights, while they still fall back on quick avocado toast and cereal when event preparations run late.
  core: Makena Watkins is a socially magnetic, competition‑driven teen who transforms every group activity into a strategic brand‑building experiment, yet they sometimes skip bedtime and forget to eat regular
    meals in the hustle.
background:
  cultural: Makena grew up in Cherry Hill, a suburban town in Camden County, New Jersey. Her family belongs to a middle‑class, predominantly white community that values education, extracurricular involvement,
    and community service. The proximity to Philadelphia exposes her to a diverse cultural scene, influencing her appreciation for varied music, food, and social causes. Her upbringing blends typical American
    suburban traditions with exposure to neighboring urban cultural dynamics, shaping her outgoing, competitive, yet pragmatic outlook.
