  career_goals: Makena aims to build a career that blends her love for community interaction, creativity, and strategic planning. She envisions working in marketing or event management, perhaps as a brand
    strategist for youth‑focused companies, or launching her own content‑creation and community‑building platform. After obtaining a GED, she plans to attend a community college for marketing or communications,
    secure an entry‑level marketing coordinator role within a few years, and eventually move into project management or entrepreneurial ventures.
