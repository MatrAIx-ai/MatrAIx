  career_goals: His dreams are shaped by his love of creativity and exploration. He often pretends to be an artist, a builder, or a soccer player who scores winning goals, saying he wants to be a 'big painter'
    or a 'great builder' when he grows up. His competitive streak pushes him to imagine achievements that earn applause, while his curiosity fuels a desire to keep discovering new things.
