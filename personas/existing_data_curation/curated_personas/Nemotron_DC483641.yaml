personas:
  professional: Agustin Albors, a budding preschool architect, channels their curiosity and competitive spirit into constructing elaborate block castles, balancing meticulous organization with spontaneous
    creativity while eagerly sharing their creations with peers.
  sports: Agustin Albors, a lively member of the Salinas Little Soccer Stars club, spends afternoons dribbling a bright orange ball on the community field, idolizes the San Diego Padres for their teamwork,
    and treats each practice like a friendly competition, always eager to race the other kids during recess.
  arts: Agustin Albors, an enthusiastic mini‑performer, loves to doodle bright cartoon characters during storytime and mimics traditional folk dance moves to the upbeat tunes of Los Tigres del Norte, often
    putting on impromptu shows for friends and family.
  travel: Agustin Albors, a tiny explorer, loves weekend trips to the Monterey Bay Aquarium and the sandy shores of Santa Cruz, dreams of visiting the historic streets of Cartagena, Colombia, and prefers
    traveling with the whole family, where the itinerary is guided by colorful storybooks and snack breaks.
  culinary: Agustin Albors, a picky yet adventurous eater, savors warm cheese pupusas with tangy curtido, delights in crunchy apple slices dipped in peanut butter, and insists on helping stir the batter
    for homemade corn tamales, though they sometimes throw a fit if vegetables appear on the plate.
  core: Agustin Albors is a curious three‑year‑old who balances fierce competition with boundless sociability, turning everyday play into organized adventures while never missing a chance to negotiate for
    extra stickers.
background:
  cultural: Agustin grows up in a Salvadoran household in Salinas, where Spanish is spoken daily and traditional foods like pupusas are a staple. Family gatherings celebrate Salvadoran holidays such as
    Día de los Reyes and feature folk music and dance that he eagerly imitates. The close‑knit Latino community in Monterey County instills values of family loyalty, respect for elders, and communal celebrations,
    shaping his identity and outlook.
