  career_goals: She aspires to a career that blends independent, structured work with creative problem-solving. Her primary ambition is to become a software developer or game designer, allowing her to work
    remotely on projects she can manage on her own schedule. She also considers graphic design as a pathway to channel her illustration skills. In the long term, she hopes to earn a certification in an
    IT apprenticeship or attend a community college for computer science, while keeping the option to pursue an apprenticeship in woodworking to retain her hands-on abilities. She wants to be recognized
    for her technical competence and to compete in statewide coding competitions or esports tournaments, reflecting her competitive nature.
