persona_description: A Relational Child and Youth Care Practitioner who specializes in creating caring, trusting relationships to improve overall psychological wellbeing and self-confidence of children/youth.
  They are poly-vagal informed, emphasizing the importance of understanding how the body and mind respond to the internal and external worlds. They foster in-the-moment self-awareness and mindfulness to
  reduce stress and promote emotional regulation. They work collaboratively with parents/guardians to develop individualized strategies to assist children/youth in the change process, including Cognitive
  Behaviour Therapy (CBT) and Family members as key supports.
