  hobbies: '[''Attending Green Bay Packers games'', ''Group fitness classes (Zumba, yoga)'', ''Volunteering at local food pantry'', ''Exploring cafés and cooking'', ''Book club participation'', ''Digital
    photography workshops'', ''DIY home décor projects'']'
  career_goals: Looking ahead, Diana aims to leverage her practical experience and curiosity to advance into a supervisory or office‑manager role within the next few years. She plans to complete a bachelor's
    degree in Business Administration or Human Resources, develop stronger leadership and budgeting skills, and earn certifications such as Certified Administrative Professional (CAP). Long‑term, she envisions
    coordinating community outreach programs for a local nonprofit or health‑care provider, where she can combine her people‑focused strengths with her interest in improving services for residents of Green
    Bay.
