  career_goals: Jerry often dreams about becoming an astronaut or a teacher because he loves exploring new ideas while helping others learn. He also imagines being the host of a kid TV show, where he can
    talk to a big audience and be the center of attention. His competitive streak pushes him to picture himself at the top of his class or leading a sports team, and he worries about performing perfectly
    in those future roles.
