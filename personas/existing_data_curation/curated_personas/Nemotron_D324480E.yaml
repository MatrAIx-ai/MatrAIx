personas:
  professional: Jerry Raines, a budding sandbox entrepreneur, organizes block‑building projects in preschool, applying early spatial reasoning and step‑by‑step practicality while channeling their talkative,
    competitive spirit to lead peers in collaborative constructions.
  sports: Jerry Raines thrills at family outings to see the Chicago Cubs, proudly dons a Cubs cap while sprinting through Little League T‑ball drills with the Northbrook Youth Soccer Club, and channels
    their competitive drive into weekend playground soccer matches, reflecting a love for team sports and local fan loyalty.
  arts: Jerry Raines delights in reenacting scenes from Disney’s Frozen while humming Idina Menzel’s soaring vocals, dances to The Wiggles’ upbeat tunes, and sketches beloved characters like Mickey Mouse
    and Bluey, turning their sociable chatter into animated storytelling sessions.
  travel: Jerry Raines prefers family‑guided adventures, fondly recalling a magical week at Walt Disney World in Orlando and dreaming of exploring the towering Grand Canyon, often insisting on mapping the
    route with crayons before the trip.
  culinary: Jerry Raines adores cheesy macaroni, buttery peanut butter‑and‑jelly sandwiches, and bright strawberry‑banana smoothies, can proudly stir pancake batter with a wooden spoon despite spilling
    extra chocolate chips, showcasing a sweet tooth, budding kitchen curiosity, and a habit of over‑indulging desserts.
  core: Jerry Raines is a talkative, competition‑driven four‑year‑old who blends unbridled curiosity with cautious practicality, thrives on social interaction, yet frequently worries about tiny setbacks.
background:
  cultural: Jerry is raised in Seguin, Texas, a close‑knit community that blends Southern hospitality with subtle Hispanic influences. His family values regular church attendance, community events like
    neighborhood BBQs, and celebrations of holidays such as Thanksgiving and the Fourth of July with picnics and fireworks. While primarily English‑speaking, he hears Spanish words from neighbors and local
    signage, giving him a modest bilingual awareness. Outdoor play is encouraged by the warm climate, and local traditions like attending the Seguin River Walk Festival foster his love for music, food,
    and community togetherness.
