personas:
  professional: Vida Hill is a budding junior detective-in-training, weaving together a love for mystery picture books and meticulous LEGO building into a habit of mapping clues, and their organized, reliable
    nature makes them excel at planning treasure hunts for friends.
  sports: Vida Hill is an enthusiastic participant in the local YMCA swim team and a member of the Colorado Springs youth soccer club, cheering for the Colorado Rockies during baseball season and constantly
    practicing sprints on the game field, showing their preference for small-group activities and structured exercise.
  arts: Vida Hill delights in sketching detailed animal illustrations inspired by National Geographic kids articles, loves listening to the whimsical scores of Pixar movies and the folk guitar tunes of
    John Denver, and they often practice beginner piano pieces like Twinkle Twinkle Little Star and Ode to Joy, channeling their reserved creativity into quiet artistic pursuits.
  travel: Vida Hill has eagerly explored Rocky Mountain National Park's alpine trails, collected souvenirs from a family trip to Yellowstone's geysers, and dreams of visiting the historic landmarks of Washington,
    D.C., preferring short, well-planned adventures that include picnic lunches and plenty of time for drawing in nature.
  culinary: Vida Hill favors homemade mac and cheese with extra cheddar, enjoys carrot sticks dipped in hummus, and eagerly helps their parents roast marshmallows over a campfire, often requesting the addition
    of crisp apple slices to their oatmeal, reflecting a simple yet adventurous palate.
  core: Vida Hill blends a detective-like curiosity with a methodical, worry-prone heart, turning every mystery book into a structured game, saving every penny for LEGO, and sketching animals while humming
    piano tunes under the Colorado sky.
background:
  cultural: Vida comes from a White, American family with roots in the Midwestern United States, now settled in Colorado Springs. Her upbringing blends typical suburban customs—celebrating holidays like
    Thanksgiving and July 4th—with a strong appreciation for Colorado’s outdoor culture, including weekend hikes, camping trips, and community events at local parks. Her family values education, community
    cooperation, and modest self‑reliance, which shape her respectful and considerate demeanor.
attributes:
