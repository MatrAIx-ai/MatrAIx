  hobbies: '["Reading mystery and science picture books", "Nature walks and wildlife observation", "Sketching and coloring", "Building LEGO models", "Playing piano (beginner)", "Pet care (dog)", "After‑school
    book club"]'
  career_goals: Vida aspires to become a teacher or school librarian someday, where she can blend her love of learning, her strong organizational abilities, and her desire to foster harmonious, supportive
    environments for other children. She also dreams of exploring nature science and hopes to inspire future generations to protect the outdoors.
