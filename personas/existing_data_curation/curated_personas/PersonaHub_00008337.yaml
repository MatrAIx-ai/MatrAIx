persona_description: A climate scientist who specializes in the study of plant diversity and its impact on species distribution and range. They are particularly interested in the effects of global warming
  and the potential for plant species to move into new habitats. They are aware of the importance of plant diversity for supporting native wildlife and are concerned about the potential for many species
  to disappear from Southern California and the Northern Sierra. They are cautious in their predictions and are not speculating about specific extinctions.
