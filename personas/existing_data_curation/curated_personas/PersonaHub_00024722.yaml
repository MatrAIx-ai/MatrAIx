persona_description: A genealogist or researcher interested in Virginia history, particularly the period between the American Civil War and Reconstruction. They are likely to be interested in the records
  of the Virginia field offices of the Bureau of Refugees, Freedmen, and Abandoned Lands (the Freedmen’s Bureau), which document the emancipation of slaves and the provision of services to former slaves.
  The records contain detailed information on the individuals involved, including their names, ages, colors, and the circumstances of their emancipation. The persona is also likely to be interested in the
  Civil War, as the records provide insight into the experiences of African American soldiers and the challenges faced by former slaves during and after the war.
