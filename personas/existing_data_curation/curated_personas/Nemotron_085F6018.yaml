    ''Caregiving'']'
  hobbies: '[''Vegetable gardening'', ''Quilting'', ''Cooking southern cuisine'', ''Reading historical novels'', ''Church choir'', ''Walking'', ''Community volunteering'']'
  career_goals: Although retired from formal employment, Evelyn is determined to channel her organizational talent into a part-time volunteer coordinator role at the local senior center, where she can design
    activity calendars, oversee budget-friendly events, and train other volunteers. She also plans to complete a GED program to formalize her education, which would enable occasional consulting for nearby
    churches on budget and event planning. A personal ambition of hers is to compile a family cookbook that documents traditional African-American Southern recipes, and to host quarterly cooking workshops
    for neighborhood youth, preserving cultural heritage while fostering intergenerational connections.
