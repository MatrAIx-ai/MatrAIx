  hobbies: '[''Gardening'', ''Quilting'', ''Book club'', ''Bridge'', ''Community theater'', ''Historical tours'', ''Cooking traditional recipes'', ''Listening to classic jazz'', ''Volunteer coordination'',
    ''Genealogy research'']'
  career_goals: While retired, Martha wants to remain an active pillar of her community. She aims to lead the local senior center’s cultural programs, launch an oral‑history project that records the stories
    of longtime residents, and mentor younger volunteers in organizing events. She hopes to complete a memoir that captures her family’s history, ensure her grandchildren have a financial safety net, and
    maintain her health to sustain her involvement in group activities. Her long‑term ambition is to leave a tangible legacy of community cohesion and intergenerational connection.
