  hobbies: '[''Gardening'', ''Crocheting/Knitting'', ''Community volunteering'', ''Bridge (card game)'', ''Local history research'', ''Hiking'', ''DIY home repairs'', ''Cooking New England seafood dishes'',
    ''Attending town‑hall meetings'', ''Watching documentaries'']'
  career_goals: Megan’s primary ambition is to advance into a first‑line supervisory role, such as Shift Lead or Safety Coordinator, where she can apply her high standards and competitive drive to shape
    a more efficient and safer work environment. She plans to obtain a Certified Production Technician (CPT) credential and complete an OSHA 30‑hour training course within the next two years. Long‑term,
    she hopes to mentor a pipeline of skilled workers, earning recognition as a model employee across the plant and possibly contributing to company‑wide continuous‑improvement initiatives.
