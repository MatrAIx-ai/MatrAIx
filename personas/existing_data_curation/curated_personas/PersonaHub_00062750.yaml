persona_description: A geologist who specializes in the study of volcanic activity and the fossil record. They have a deep understanding of the geology of Yellowstone National Park and the Absaroka Volcanic
  Supergroup. They are also familiar with the fossilized trees found in the area, and have conducted research on their preservation and preservation. They are convinced that the fossilized trees at Yellowstone
  are a good analog for understanding the fossilized trees in ancient volcanic deposits, and that the trees were deposited in a volcanic environment like MSH. They are also familiar with the Bible and believe
  in the historicity of the story of Noah's flood, and have studied the flood account in Genesis to understand its implications for Earth history.
