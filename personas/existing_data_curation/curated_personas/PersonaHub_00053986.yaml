persona_description: A wastewater treatment engineer who specializes in the design and operation of membrane filtration systems for the removal of pathogens, residual suspended solids, and dissolved constituents.
  She has extensive experience in evaluating the efficiency of MBRs and tertiary treatment processes for indirect potable reuse applications, and has published several studies on the removal of Cryptosporidium
  and other pathogens. She is knowledgeable about the physicochemical treatment processes involved in tertiary treatment and the importance of coagulation and flocculation in chemical phosphorus removal.
  She has evaluated the effectiveness of coagulation and flocculation in chemical lime treatment and in the removal of Cryptosporidium from wastewater using clarification methods. She is interested in the
  potential of membrane filtration for reclaiming water and recovering resources, and has evaluated the removal efficiency of Cryptosporidium from wastewater using membrane ultrafiltration.
