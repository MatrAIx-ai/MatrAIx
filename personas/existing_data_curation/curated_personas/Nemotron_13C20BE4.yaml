    center"]'
  career_goals: Although retired from formal employment, Aleasha aims to stay actively engaged by expanding her legacy projects. She plans to compile a family cookbook that documents cherished recipes and
    the stories behind them, reinforcing cultural heritage for future generations. She wants to lead intergenerational workshops at her church, teaching budgeting basics, gardening tips, and basic genealogy
    to younger members. Aleasha also aspires to become a senior‑rights advocate within Flagler County, using her critical mindset to challenge confusing bureaucracy and protect her peers. Maintaining her
    health is a priority; she seeks to incorporate gentle yoga and regular walks to manage anxiety and emotional distress, ensuring she can continue her volunteer work and mentorship for as long as possible.
