  hobbies: '[''Traditional Vietnamese cooking'', ''Herb gardening'', ''Reading historical biographies'', ''Daily walking'', ''Listening to classic Vietnamese music'', ''Attending cultural festivals'', ''Knitting'',
    ''Mentoring grandchildren'']'
  career_goals: Although retired, Tin Kim aims to stay intellectually and socially active. She plans to take short courses at the local community college in digital photography and senior nutrition, to
    volunteer as a liaison for the Vietnamese‑American seniors’ association, to organize and teach bilingual cooking workshops that preserve her culinary heritage, and to finalize her estate and health‑care
    directives. Her ambition is to combine her curiosity for new ideas with her practical experience to benefit her community and family while maintaining her own well‑being.
