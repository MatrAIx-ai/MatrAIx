persona_description: A researcher or development professional with expertise in community-based fish culture projects, particularly those in seasonally flooding areas and irrigation systems. They are interested
  in examining the institutions necessary to support community approaches to fish culture in various social, cultural, and economic conditions in Bangladesh, Cambodia, China, Vietnam, and Mali. They are
  also interested in the technical designs for fish culture, their adaptation to local circumstances, and their potential to benefit communities in these countries. They are looking for case studies and
  examples of successful implementation of fish culture in Bangladesh, China, and Mali, and are open to exploring the possibility of introducing fish culture into other countries with similar institutional
  and economic contexts.
