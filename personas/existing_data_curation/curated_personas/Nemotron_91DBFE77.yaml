  hobbies: '[''Cooking traditional Guatemalan dishes'', ''Gardening and growing herbs'', ''Reading historical fiction and local history'', ''Walking in parks and hiking trails'', ''Listening to Latin American
    music and community radio'', ''DIY home repair projects'', ''Exploring basic coding and digital tools'', ''Attending small cultural events'', ''Birdwatching'', ''Photography of everyday life'']'
  career_goals: Reinaldo hopes to translate his practical skills into a part‑time role that offers flexibility and a sense of contribution, such as a handyman for a community center or a vendor of homemade
    Guatemalan meals at local farmers’ markets. He aims to acquire modest digital skills—like using online platforms for scheduling and payment—to market his services and gain a steadier income. Additionally,
    he seeks to volunteer as a cultural mentor for younger Guatemalan immigrants, sharing language and cooking traditions, while using the structured volunteer schedule to help manage his anxiety and create
    a healthier routine.
