personas:
  professional: Sabrina Burton, a seasoned nursing assistant in Monroe, skillfully blends meticulous vital sign monitoring with a competitive drive to mentor new aides, and they leverage curiosity for emerging
    best practices while upholding rigorous safety protocols.
  sports: Sabrina Burton enthusiastically supports the New Orleans Saints and the LSU Tigers, participates in the Monroe Parkwalkers walking club on weekend trails, and they channel their competitive spirit
    into Zydeco dance contests at local festivals, keeping their fitness routine lively and socially engaging.
  arts: Sabrina Burton's artistic side shines as a gospel vocalist in her church choir, where they often harmonize with Mavis Staples, they read historical fiction by Philippa Gregory, and they crochet
    vibrant blankets inspired by the rhythmic patterns of Boozoo Chavis's Zydeco tunes.
  travel: Sabrina Burton favors road trips that blend family bonding and cultural immersion, having visited the FestivAll Culture Festival in Lafayette and the historic district of Natchitoches, while they
    dream of a solo pilgrimage to Savannah's historic squares and a culinary tour of New Orleans' Creole eateries.
  culinary: Sabrina Burton enjoys reimagining Southern classics by seasoning garden‑grown collard greens with smoked paprika, baking a low‑fat okra casserole, and serving fresh tomato salsa alongside a
    hearty shrimp étouffée, and they swap recipes with fellow choir members at church potlucks.
  core: Sabrina Burton melds a competitive nursing mindset with soulful gospel rhythms, garden‑grown health hacks, and a steadfast drive to uplift her community, and they keep a skeptical eye toward shortcuts
    while indulging in occasional impulse buys of specialty spices.
background:
  cultural: Sabrina’s identity is rooted in the African‑American community of Monroe, Louisiana, where church, family, and Southern traditions play central roles. Raised in a multigenerational household,
    she grew up with deep respect for gospel music, soul food, and community gatherings such as Juneteenth celebrations and local Mardi Gras festivities. Her upbringing emphasized resilience, education,
    and service, values she carries into her nursing work and volunteer efforts. The rich blend of Black Southern heritage and the historic ties to the civil‑rights movement in Ouachita Parish inform her
    worldview, fostering a strong sense of empathy, cultural pride, and a commitment to uplifting her neighbors.
attributes:
