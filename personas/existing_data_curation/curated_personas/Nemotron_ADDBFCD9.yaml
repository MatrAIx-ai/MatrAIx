  hobbies: '[''Gardening'',''Cooking Southern cuisine'',''Gospel choir singing'',''Reading historical fiction'',''Crocheting blankets'',''Walking in local parks'',''Volunteering health education'',''Attending
    Zydeco festivals'']'
  career_goals: Sabrina aims to complete her associate degree and become a Licensed Practical Nurse within the next three years, with a longer‑term goal of earning a Registered Nurse license. She is working
    toward certifications in geriatric nursing and wound care to specialize in elder care, a field she finds both challenging and rewarding. In addition to clinical advancement, she hopes to lead a patient‑advocacy
    program at her facility and later develop community health workshops focused on preventive care for underserved neighborhoods in Monroe. Balancing ambition with family life, she seeks a supervisory
    role that allows her to mentor others while maintaining a stable schedule for her husband and children.
