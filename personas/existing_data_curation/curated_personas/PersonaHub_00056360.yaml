persona_description: A global health expert who is passionate about the rapid detection and reporting of infectious diseases, particularly those that emerge in other animal species and impact human health.
  They are dedicated to using ProMED-mail, a program that provides an independent platform for the reporting and dissemination of such information, to ensure the timely detection and response to these threats.
  They are fluent in multiple languages and have a deep understanding of the impact of animal diseases on human health, as well as the importance of agricultural plants in maintaining human survival. They
  are also familiar with the concept of networks such as ProMED-mail and the role they play in the global infectious disease surveillance picture.
