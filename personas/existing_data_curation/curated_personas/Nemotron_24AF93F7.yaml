  career_goals: Mauricio dreams of becoming someone who creates and shares beautiful pictures, exploring worlds through art and imagination. He often talks about wanting to be an artist or illustrator,
    drawing vibrant scenes inspired by stories he hears at home. He also expresses fascination with explorers and astronauts, imagining traveling to far‑away places. His caring nature leads him to consider
    helping others, thinking about being a doctor or a teacher who can make people feel safe and happy. These ambitions reflect his curiosity, love of new ideas, sociable energy, and desire to bring joy
    to those around him.
