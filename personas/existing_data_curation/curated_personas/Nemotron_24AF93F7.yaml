personas:
  professional: Mauricio Vega, a budding junior architect, spends hours stacking LEGO blocks into sprawling cityscapes, applying spontaneous creativity and a keen eye for color while resisting tidy instructions
    from adults; they often rally neighborhood friends into collaborative build sessions, showcasing natural leadership despite an aversion to rigid schedules.
  sports: Mauricio Vega, a lively member of the Mighty Minis Soccer Club, dashes across the park every Saturday chasing a bright orange ball, relishes impromptu tag games with friends, yet often skips structured
    drills, preferring the spontaneity of free play; they love cheering on the local youth baseball team on TV when not playing themselves.
  arts: Mauricio Vega, an enthusiastic little art lover, spends afternoons finger‑painting vivid rainbows while humming Raffi’s ‘Baby Beluga’ and they insist on reenacting scenes from Pixar’s ‘Toy Story’
    with action figures, weaving music and visual play into every creative burst.
  travel: Mauricio Vega, a curious explorer, loves short car trips to the nearby aquarium and beachside sandcastle contests, and they dream of visiting the giant dinosaur park in Orlando and the historic
    castles of Scotland, yet sometimes cling to the comfort of the familiar playroom when new routes feel overwhelming.
  culinary: Mauricio Vega, a picky yet adventurous eater, devours cheesy macaroni, dips apple slices in peanut butter, and squeals with delight over strawberry yogurt topped with granola, while occasionally
    refusing broccoli because its texture feels too ‘scratchy’ for their sensitive palate.
  core: Mauricio Vega’s world spins on a kaleidoscope of colorful play, impulsive generosity, and vivid imagination, balanced by bursts of anxiety that turn a simple puzzle into an epic adventure, and they
    often find comfort in rhythmic lullabies after a restless night.
background:
  cultural: Mauricio grows up in a Guatemalan‑American household in Calhoun, Georgia. His parents speak Spanish at home and share traditions such as celebrating Día de los Santos, enjoying dishes like pepián
    and tamales, and listening to marimba music. He attends community events at the local Latino cultural center, where he learns traditional dances and stories. While immersed in Southern American culture
    — weekend trips to the local park, enjoying Southern cuisine — his family maintains a strong connection to Guatemalan values of family cohesion, respect for elders, and vibrant cultural expression.
    This blend shapes his identity, language, and worldview.
