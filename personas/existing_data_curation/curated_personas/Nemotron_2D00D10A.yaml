personas:
  professional: Song Ho, a 47‑year‑old operations manager with a humanities‑infused analytical mindset, leverages meticulous project planning, data‑driven performance analysis, and bilingual communication
    to drive strategic initiatives for cultural nonprofits, balancing a curiosity for new ideas with pragmatic execution and an assertive yet collaborative leadership style.
  sports: Song Ho finds fitness in solitary hikes along the Blue Ridge Parkway, participates in a local walking club during spring, avidly follows the Atlanta Braves for baseball, and occasionally joins
    a weekend kayaking group on the nearby lake, preferring low‑impact activities that blend nature appreciation with moderate cardio.
  arts: Song Ho enriches evenings with Korean calligraphy practice, attends performances at the local symphony featuring works by Philip Glass, reads contemporary Korean literature by Han Kang alongside
    Virginia Woolf’s classics, and curates a small book club that discusses both traditional poetry and modern graphic novels.
  travel: Song Ho prefers meticulously planned cultural trips, having explored Jeju Island’s volcanic landscapes, toured the historic temples of Kyoto, and taken a weekend retreat to Asheville’s Blue Ridge
    Mountains, always seeking off‑season travel to avoid crowds while staying within a modest budget.
  culinary: Song Ho enjoys cooking intermediate‑level traditional dishes such as kimchi jjigae, bulgogi, and bibimbap, favoring ingredients like gochujang, sesame oil, and Korean pear, while also appreciating
    farm‑to‑table restaurants that feature seasonal Georgia produce like peach‑glazed pork.
  core: Song Ho blends disciplined project leadership with a solitary love for calligraphy and hiking, yet often hoards receipts in a vintage shoebox and forgets to schedule personal rest days.
background:
  cultural: Song Kim Ho is a first‑generation Korean‑American who grew up in a bilingual household that emphasized respect for elders, educational achievement, and communal harmony. She celebrates Korean
    holidays such as Seollal and Chuseok while also embracing Southern hospitality and community traditions in Flowery Branch, GA. Her upbringing instilled a blend of collectivist values and personal responsibility,
    shaping her methodical work style and her ability to navigate multicultural environments with empathy and assertiveness.
