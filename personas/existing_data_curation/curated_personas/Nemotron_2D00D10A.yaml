  hobbies: '[''Reading Korean literature'', ''Reading classic English novels'', ''Korean calligraphy'', ''Cooking traditional Korean dishes'', ''Gardening native Georgia plants'', ''Hiking Blue Ridge trails'',
    ''Participating in a local book club'', ''Volunteering at Korean cultural festivals'', ''Mentoring young professionals'']'
  career_goals: She aims to step into a senior executive role—such as Director of Operations or Executive Director—within a regional arts or cultural nonprofit, where she can integrate her managerial expertise
    with her passion for humanities and cultural preservation. Over the next five years, she plans to acquire a master's degree in nonprofit leadership, expand her professional network through mentorship
    programs for women in management, and launch a community‑based cultural center that celebrates Korean heritage while fostering local artistic collaboration.
