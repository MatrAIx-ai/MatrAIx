  hobbies: '[''Gardening'', ''Community theatre'', ''Knitting'', ''Bridge playing'', ''Genealogy research'', ''Local history storytelling'', ''Walking'', ''Volunteer work'']'
  career_goals: Although retired, Nancy aims to stay actively engaged in her community. She hopes to become the senior volunteer coordinator at the Whitman Public Library, where she can design weekly social
    programs for older adults. She also aspires to mentor her grandchildren and younger neighbors, sharing her practical life skills and local history knowledge. Writing a memoir of her life in New England,
    with a focus on the changes she’s witnessed in the town, is another personal ambition. Maintaining a structured daily routine that balances her social activities with self‑care to manage stress is a
    core goal, as is staying physically independent to support her husband’s needs.
