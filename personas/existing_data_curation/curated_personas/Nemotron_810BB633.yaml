  hobbies: '[''Watercolor and acrylic painting'', ''Reading speculative fiction and poetry'', ''Garden design and experimentation'', ''Birdwatching'', ''Cooking Southern cuisine'', ''Creative writing (poetry,
    memoir)'', ''Volunteer backstage work in community theater'', ''Attending craft fairs and learning new craft techniques'', ''Participating in a local book club'']'
  career_goals: Even though retired, Doris is driven by a desire to leave a creative legacy. She aims to compile a self‑published anthology that pairs her poems and paintings, capturing themes of memory,
    place, and change. She plans to organize a traveling exhibition of works by local seniors, fostering intergenerational dialogue. Doris is eager to master digital illustration tools to broaden her artistic
    reach online. She also hopes to complete a comprehensive genealogical record of her ancestors in Northampton County, contributing the findings to the local historical society. Ultimately, she seeks
    to mentor younger community members in both artistic practice and historical research, reinforcing her commitment to lifelong learning and cultural preservation.
