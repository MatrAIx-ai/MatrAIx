  hobbies: '[''Beach volleyball'', ''Surfing'', ''Cooking Vietnamese and Hawaiian fusion dishes'', ''Karaoke'', ''Attending music festivals'', ''Volunteering at youth mentorship programs'', ''Hiking'',
    ''Photography'', ''Listening to personal finance podcasts'']'
  career_goals: Adelaida aims to progress from her current loan clerk role to become a certified loan officer within the next three years. She plans to enroll in a part‑time associate’s degree in business
    administration and pursue the Certified Financial Services Counselor (CFSC) credential. Long‑term, she aspires to a branch management position where she can lead a team, develop community‑focused lending
    programs, and mentor other young professionals, especially those from immigrant backgrounds. She also hopes to launch financial‑literacy workshops for her local Southeast Asian community.
