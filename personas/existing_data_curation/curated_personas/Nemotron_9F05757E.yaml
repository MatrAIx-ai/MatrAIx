  career_goals: Looking ahead, Lany dreams of becoming an elementary school teacher, specifically in a community‑focused, hands‑on learning environment. She imagines creating structured yet engaging lesson
    plans that help young students discover practical subjects like science and math through experiments and group projects. She is also interested in combining her love for animals with education, hoping
    to incorporate pet‑care modules or volunteer at a local animal shelter as part of her future teaching career. Lany’s ambition includes obtaining a degree in education with a minor in environmental science,
    allowing her to teach about local ecosystems and encourage students to appreciate the outdoors.
