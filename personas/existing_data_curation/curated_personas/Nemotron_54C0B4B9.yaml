  career_goals: Linda aims to advance to a senior software engineer role within the next two years, focusing on leading complex projects that require strong architectural planning and cross‑functional coordination.
    She aspires to become a technical lead or engineering manager, where she can blend her structured mindset with her natural sociability to mentor junior developers and champion inclusive, high‑performing
    teams. Long‑term, she envisions launching a small tech consultancy that supports local businesses in Giles County with digital transformation, while also contributing to open‑source projects that promote
    accessibility and reliability in software tools.
