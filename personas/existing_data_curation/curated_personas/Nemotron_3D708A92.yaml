  career_goals: Ethan aspires to earn his Certified Public Accountant (CPA) license within the next three years, aiming to transition from a clerk position to a senior accountant role in a mid‑size firm.
    He is interested in expanding his expertise into forensic accounting and financial analytics, integrating technology to automate routine bookkeeping tasks. Long‑term, Ethan hopes to lead a finance team
    for a locally based arts nonprofit or cultural organization, blending his passion for finance with his love of the arts. He also plans to complete an associate’s degree in accounting and, eventually,
    consider running his own boutique bookkeeping practice serving small businesses in the Austin–Leander area.
