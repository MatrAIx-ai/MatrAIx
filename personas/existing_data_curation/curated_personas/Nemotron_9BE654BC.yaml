  hobbies: '[''Salsa Dancing'', ''Cooking Traditional Mexican Dishes'', ''Community Volunteering'', ''Reading Contemporary Fiction'', ''Exploring Museums and Art Galleries'', ''Photography'', ''Playing
    Soccer'', ''Educational Podcast Listening'', ''Journaling'', ''Urban Gardening'']'
  career_goals: Dayanis aims to become a certified bilingual teacher in the Chicago Public Schools, initially working as a substitute and later securing a full-time classroom position that serves the Mexican-American
    community. She aspires to develop an innovative curriculum that blends Mexican cultural heritage with STEM concepts, using technology to personalize learning. Within five years she plans to earn a master's
    degree in educational leadership, with the long-term ambition of advancing to an instructional coach or school administrator role where she can influence policy and mentor fellow educators. Her practical
    mindset drives her to seek evidence-based strategies, while her curiosity pushes her to stay ahead of emerging teaching tools.
