personas:
  professional: Dayanis Fernandez is a budding bilingual educator who leverages their disciplined lesson‑planning and tech‑savvy integration, and they blend curiosity with practical strategies to design
    data‑driven, culturally resonant STEM curricula for Chicago public schools.
  sports: Dayanis Fernandez plays co‑ed soccer with the Lakeview Strikers on Thursdays, follows the Chicago Fire FC avidly by wearing a team jersey, balances match practice with weekend salsa socials, and
    maintains a disciplined home workout routine to stay fit for both activities.
  arts: Dayanis Fernandez immerses themselves in Chicago's art scene, frequenting the Museum of Contemporary Art, documenting street murals for a personal blog, dancing to live Afro‑Cuban salsa bands at
    the Green Mill, and drawing creative inspiration from photographers like Vivian Maier and musicians such as Celia Cruz.
  travel: Dayanis Fernandez prefers purposeful short trips that blend cultural immersion and volunteer work, having organized a teaching stint in Oaxaca, a photography retreat in Santa Fe, and dreaming
    of exploring Seville's historic neighborhoods while budgeting for affordable hostels.
  culinary: Dayanis Fernandez loves preparing vibrant, spice‑rich dishes such as chicken mole, chilaquiles, and roasted corn elotes, expertly balancing flavors with fresh cilantro, ancho chilies, and lime,
    and often hosts communal meals where friends gather around a modest kitchen island to share stories.
  core: Dayanis Fernandez is a highly organized, curiosity‑driven 19‑year‑old who balances bilingual teaching ambitions, salsa dance nights, community‑center activism, and meticulous planning, never missing
    a beat despite a tendency to over‑schedule.
background:
  cultural: Dayanis grew up in a bilingual Mexican-American household in Chicago, where Spanish was spoken at home and English at school. Her family preserved Mexican traditions such as Día de los Muertos
    celebrations, quinceañera gatherings, and weekend cooking of mole and tamales, while also embracing the multicultural fabric of the city. This hybrid upbringing gave her a strong sense of cultural pride
    and an acute awareness of the challenges faced by immigrant families. She draws inspiration from her heritage to foster inclusive classroom environments and to serve as a bridge between her community
    and broader educational opportunities.
attributes:
  skills: '[''Lesson Planning'', ''Classroom Management'', ''Bilingual Communication (Spanish-English)'', ''Educational Technology Integration'', ''Curriculum Development'', ''Public Speaking'', ''Workshop
