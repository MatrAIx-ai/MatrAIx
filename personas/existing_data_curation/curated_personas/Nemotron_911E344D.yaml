  career_goals: Although only three years old, Suching already shows an imagination that hints at future ambitions. She loves looking at picture books and watching artists create, which fuels a budding
    desire to become an artist or illustrator. She also enjoys listening to simple science videos about animals and the sky, suggesting an early interest in exploring the natural world as a future scientist
    or explorer. In play, she often pretends to teach other children, indicating a potential future goal of becoming a teacher who shares knowledge with kindness and creativity.
