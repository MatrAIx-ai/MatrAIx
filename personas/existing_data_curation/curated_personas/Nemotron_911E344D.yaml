personas:
  professional: Suching Yang, a budding mini‑organizer, spends hours arranging toy cars by color and size, proudly presents their orderly display to delighted parents, and they often narrate the sorting
    process with bright, confident chatter, reflecting a methodical curiosity that hints at future leadership in logistics.
  sports: Suching Yang, a spirited member of the preschool soccer club, darts across the field each Saturday, cheers for the hometown junior team, and they also cherish quiet moments swinging solo on the
    playground.
  arts: Suching Yang, an eager little artist, fills sketchbooks with bold crayon dragons, admires the bright colors of a child‑friendly Van Gogh print, and they joyfully sing along to The Wiggles' catchy
    tunes during playtime.
  travel: Suching Yang, an inquisitive traveler, enjoys family road trips to the nearby zoo and coastal boardwalk, collects seashells for a scrapbook, and they dream of someday experiencing the magic of
    Disneyland.
  culinary: Suching Yang, a selective yet adventurous eater, savors cheesy macaroni, dips carrot sticks in hummus, proudly helps stir pancake batter, and they always seek the sweet scent of fresh blueberries.
  core: Suching Yang, a methodical mini‑curator of toys and treats, balances relentless curiosity with a love for routine, often swapping a meticulously built block tower for a spontaneous burst of sticker‑flinging
    fun, and they delight in both order and surprise.
background:
  cultural: Suching is raised in an East Asian (Chinese‑American) household in San Leandro, California. Her parents speak Mandarin at home while also encouraging English proficiency, providing her with
    a bilingual foundation. Family traditions such as celebrating Lunar New Year, making dumplings together, and attending the local Chinatown festival expose her to cultural arts, music, and cuisine. The
    community’s emphasis on respect for elders, value of education, and sharing of cultural stories influences her developing sense of identity. Growing up in the diverse Bay Area, she also interacts with
    peers from various backgrounds, fostering an inclusive worldview while retaining her cultural heritage.
