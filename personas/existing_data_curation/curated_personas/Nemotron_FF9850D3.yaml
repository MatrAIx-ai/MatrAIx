  hobbies: '["Community Basketball League","Cooking Soul Food and Barbecuing","Attending Live Jazz/R&B/Hip‑Hop Shows","Volunteering at Youth Mentorship Programs","Exploring Local History and Museums","Listening
    to African‑American Music"]'
  career_goals: Bobbie’s near‑term goal is to step into a store manager position within his current retail chain, where he can shape the sales floor, coach staff, and implement efficient processes that
    boost revenue. In the longer term, he aspires to become a district manager overseeing several locations, applying his organizational strengths to improve regional performance. Ultimately, he dreams
    of opening his own boutique that highlights African‑American culture, local artisans, and community events, while also offering mentorship opportunities for young people interested in retail careers.
