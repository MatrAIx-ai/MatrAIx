  hobbies: '["Baking sweet treats", "Knitting and crocheting", "Gardening (vegetables and herbs)", "Reading young-adult and classic books", "Listening to country and soft pop music", "Volunteering at church
    events", "Dog walking and birdwatching"]'
  career_goals: Nazia hopes to complete her high school education and pursue a vocational program that leads to a stable, community‑focused career. She is interested in roles such as a medical office receptionist,
    school administrative assistant, or library aide, where her reliability and organizational strengths can be applied. In the longer term, she dreams of turning her love of baking into a modest home‑based
    business, providing treats for local events and family gatherings. She also considers a future as a caregiver or support worker for seniors, valuing the routine and the chance to help others.
