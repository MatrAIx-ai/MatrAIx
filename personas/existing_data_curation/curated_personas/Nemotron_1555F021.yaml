  career_goals: Autumn aims to progress from front‑line surveillance to a supervisory role within the casino’s security department, eventually becoming a shift manager or operations supervisor. She plans
    to earn certifications such as Certified Protection Officer (CPO) and Advanced First Responder, and to pursue a part‑time certificate in Criminal Justice to broaden her strategic understanding of security
    management. Long‑term, she aspires to design and implement integrated security solutions that blend traditional monitoring with cutting‑edge technology, and to mentor newer guards, fostering a culture
    of continuous learning and professional development.
