personas:
  professional: Autumn Snyder is a seasoned surveillance officer at a high‑traffic casino, blending meticulous CCTV monitoring, AI‑driven video analytics, and crisp incident reporting with a calm, assertive
    demeanor that de‑escalates conflicts while actively pursuing CPO certification and a future supervisory role.
  sports: Autumn Snyder is a casual fan of the Tampa Bay Buccaneers, Tampa Bay Lightning, and the Florida Gators, participates in a weekly senior yoga class, joins a weekend recreational softball league
    at the community center, and volunteers as a guide for the county’s bird‑watching club during migration hikes.
  arts: Autumn Snyder indulges in literary worlds by devouring Agatha Christie mysteries and Hilary Mantel’s historical sagas, curates children’s reading events at the local library featuring authors like
    Dav Pilkey, and relaxes to the mellow twang of Jimmy Buffett and the soulful blues of B.B. King at nearby waterfront music festivals.
  travel: Autumn Snyder prefers low‑key road trips that blend bird‑watching stops with historic towns, having explored the coastal charm of Savannah, the art‑deco streets of Key West, and the medieval castles
    of Edinburgh, while planning future spring hikes through the Great Smoky Mountains to pair nature photography with seasonal wildflower spotting.
  culinary: Autumn Snyder’s kitchen fuses Southern comfort with experimental flair, regularly serving shrimp‑and‑grits seasoned with fresh garden basil, baking peach cobbler using locally sourced peaches,
    perfecting a fiery jambalaya spiced with smoked paprika and Worcestershire sauce, and harvesting okra, collard greens, and heirloom tomatoes from their backyard garden for daily meals.
  core: Autumn Snyder is a detail‑driven surveillance officer who balances a love for bird‑watching, Southern cooking, and quiet mysteries with a pragmatic drive for career advancement, all while navigating
    mild health quirks and a disciplined yet occasionally indulgent financial style.
background:
  cultural: Autumn grew up in a middle‑class, predominantly white community in the southeastern United States, with roots in Floridian small‑town culture. Her family emphasized modesty, hard work, and community
    involvement, shaping her practical outlook and cooperative spirit. While she identifies with the broader American cultural narrative, her upbringing near the Gulf Coast exposed her to diverse seasonal
    visitors and a blend of Southern hospitality and multicultural influences, especially through the casino’s international clientele. This environment fostered an appreciation for varied perspectives,
    which she integrates into her professional demeanor and personal interactions.
