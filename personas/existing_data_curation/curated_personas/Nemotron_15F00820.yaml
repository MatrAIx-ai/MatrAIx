personas:
  professional: Stephen Entrekin is an aspiring comic artist and budding coder who merges graphic storytelling with Scratch programming, using their curiosity and sociable flair to lead school debate club
    projects while they stay reliably organized with homework and LEGO building schedules.
  sports: Stephen Entrekin is a ten-year-old midfielder for the Hillsboro Youth Soccer Club who idolizes the Portland Timbers and the Portland Trail Blazers, enjoys weekend pick-up games with friends, and
    balances a love of cardio drills with occasional bouts of skipping practice when school stress builds up, while they also keep a close eye on team tactics.
  arts: Stephen Entrekin immerses themselves in the world of graphic novels, drawing inspiration from Marvel's Spider-Man and indie creators like Becky Cloonan, while listening to Arctic Monkeys and The
    Beatles and attending local theatre productions such as the Hillsboro High School's rendition of 'Peter Pan,' which fuels their talkative habit of sharing sketches during lunch, and they often discuss
    the performances with classmates.
  travel: Stephen Entrekin loves spontaneous hikes along the Forest Grove woods and weekend trips to Multnomah Falls, dreams of visiting the San Diego Comic-Con and the Grand Canyon, plans trips using colorful
    map stickers, but their travel choices are limited by school schedules and parental budgeting, and they often negotiate with parents for a weekend getaway.
  culinary: Stephen Entrekin enjoys cooking simple dishes like spaghetti with meatballs and banana pancakes, often adding a dash of cinnamon while blasting classic rock, loves assembling trail-mix with
    pretzels, chocolate chips, and dried cranberries, and they occasionally sneak extra cookies after homework, reflecting a playful but slightly careless approach to nutrition.
  core: Stephen Entrekin is a lively ten-year-old whose endless curiosity fuels comic-making, coding, and debate, tempered by a habit of over-thinking finances and an occasional sweet-snack binge, and they
    sometimes indulge in extra cookies after school.
background:
  cultural: Stephen was raised in a close‑knit, largely white, middle‑class family in Hillsboro, Ohio. His upbringing reflects typical Midwestern values of community involvement, respect for tradition,
    and a strong work ethic. Family gatherings often revolve around church events, seasonal fairs, and backyard barbecues. He celebrates holidays such as Fourth of July parades, Thanksgiving, and local
    county fairs, and his cultural identity is shaped by the small‑town ethos of friendliness, self‑reliance, and appreciation for the outdoors.
