personas:
  professional: Jose Negron is a seasoned architect with over three decades of hands‑on experience, seamlessly integrating sustainable, energy‑efficient design with a pragmatic understanding of construction
    realities; they master BIM (Revit) and hand drafting, navigate complex building codes, lead collaborative community‑focused projects, and mentor emerging architects while championing culturally inclusive
    design in the desert Southwest, often relying on a relaxed, flexible planning style that occasionally leads to a chaotic schedule but keeps team dynamics harmonious.
  sports: Jose Negron plays forward in a local community soccer league, follows FC Tucson and the Arizona Diamondbacks for weekend games, hikes the Sonoran Desert trails year‑round for cardio, and practices
    yoga twice a week, blending team sport camaraderie with solitary desert workouts to stay fit.
  arts: Jose Negron is an avid photographer who captures the stark beauty of Sonoran desert light and mid‑century modern architecture, draws inspiration from Edward Weston's black‑and‑white desert images,
    enjoys woodworking projects influenced by the clean lines of Bauhaus furniture, regularly attends architecture talks featuring designers like Bjarke Ingels, and relaxes to the sounds of regional banda
    and norteño ensembles such as Banda El Recodo.
  travel: Jose Negron prefers flexible road trips that combine adventure with cultural immersion, taking seasonal drives to the Grand Canyon and Sedona for landscape photography, attending the annual arts
    festival in Santa Fe, and dreaming of exploring the historic plazas of Andalusia and the desert town of Marrakech, all while balancing a modest travel budget and occasional family commitments.
  culinary: Jose Negron cooks with confidence, expertly preparing dishes like slow‑cooked pork with herb‑infused salsa, layered sauces using home‑grown chilies, corn masa, and fresh herbs, and experimenting
    with cactus‑pear glaze for grilled fish, while alternating between intimate dinner parties for friends and sampling farm‑to‑table menus at Tucson’s seasonal eateries.
  core: Jose Negron blends a relaxed, community‑oriented spirit with a meticulous eye for sustainable design, juggling a love for desert hikes, soccer, photography, and gardening while quietly wrestling
    with worry and occasional disorganization.
background:
  cultural: 'Jose is of Mexican heritage and has spent most of his life in Tucson, a city where Mexican and Southwestern cultures intertwine. He grew up bilingual, celebrating traditions like Día de los
    Muertos, quinceañeras, and communal meals centered on Mexican cuisine. His architectural sensibility reflects this dual identity: he frequently incorporates Mexican courtyards, vibrant colors, and locally
    sourced materials such as adobe and terra cotta into his designs, while respecting the desert climate and Sonoran landscape. Jose maintains strong family ties, participates in the local Latino community,
    and values the contributions of Mexican craftsmanship and folk art, which inform both his professional practice and personal life.'
