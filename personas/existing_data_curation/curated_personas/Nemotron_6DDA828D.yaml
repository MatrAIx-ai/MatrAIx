  career_goals: Jose aims to transition from project execution to strategic consultancy, positioning himself as a mentor for emerging architects and a champion of culturally inclusive, sustainable design
    in the desert Southwest. He plans to obtain LEED AP certification and eventually earn a professional architect license to broaden his influence. His long‑term ambition is to establish a boutique firm
    that delivers affordable, environmentally responsive housing for Latino families in Tucson, while also shaping local building policies to reflect Mexican‑American heritage. Balancing his professional
    drive with personal well‑being, he seeks to maintain a flexible schedule that reduces stress and allows him to stay engaged with his community.
