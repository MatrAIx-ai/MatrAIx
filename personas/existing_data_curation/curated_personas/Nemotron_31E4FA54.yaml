personas:
  professional: A seasoned electrician with 15+ years of hands‑on expertise, Federico Velez combines rigorous NEC knowledge with a curiosity for solar and smart‑home technologies, leveraging their practical
    problem‑solving and clear communication to lead small crews, mentor apprentices, and chart a path toward a Master Electrician license and an owner‑operator renewable‑energy contracting business.
  sports: An avid outdoor enthusiast, Federico Velez hikes the trails of Red Rock Canyon during cooler months, joins a local fishing club for weekend trips to Lake Mead, and bonds with close friends over
    weekly Liga MX match viewings, cheering for a popular team while also keeping an eye on the Vegas Golden Knights during the hockey season.
  arts: A reflective creative, Federico Velez spends evenings strumming acoustic guitar to classic regional folk tunes and enjoying blues‑infused rhythms from artists like John Mayer, while they occasionally
    browse technical magazines for inspiration and attend intimate community music gatherings when their schedule allows.
  travel: A purposeful traveler, Federico Velez plans trips that balance family reunions in their native Jalisco with adventurous road trips to U.S. national parks such as the Grand Canyon and Yosemite,
    favoring a mix of detailed itineraries for camping gear and spontaneous detours to discover hidden desert oases, while budgeting carefully to support their future business.
  culinary: A passionate home chef, Federico Velez masterfully prepares family‑favorite tacos, tamales, and mole—infusing each with fresh corn masa, smoky chiles, and a hint of chocolate—while they sometimes
    experiment with fusion by adding avocado and lime zest, though late‑night tinkering can lead to burnt tortillas.
  core: Balancing a toolbox of technical curiosity with a deep love for family rituals, Federico Velez is the reserved, detail‑driven electrician who forgets to water houseplants while perfecting smart‑home
    scripts and never skips a Sunday mole feast.
background:
  cultural: Federico was born in a small town in Jalisco, Mexico, and moved to the United States as a young adult. He is bilingual, speaking Spanish at home with his wife and extended family, and English
    at work. His upbringing was rooted in Catholic traditions and Mexican family values, emphasizing respect for elders, communal celebrations like Día de los Muertos and Las Posadas, and a love for traditional
    music and cuisine. While he has adapted to life in Las Vegas, he maintains strong ties to his heritage through language, food, holiday observances, and occasional visits to Mexico to reconnect with
    relatives.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''Electrical troubleshooting'', ''NEC compliance'', ''Solar photovoltaic installation'', ''Smart home automation'', ''Low‑voltage data cabling'',
    ''Conduit bending'', ''Load calculations'', ''Safety inspections'', ''Customer communication'', ''Team coordination'']'
  hobbies: '[''DIY electronics'', ''Home‑automation projects'', ''Cooking Mexican cuisine'', ''Hiking in Red Rock Canyon'', ''Desert photography'', ''Watching soccer'', ''Playing acoustic guitar'', ''Reading
    technical magazines'', ''Fishing'', ''Attending small community gatherings'']'
  career_goals: Federico aims to obtain his Master Electrician license within the next two years and acquire NCCER certifications in solar energy and energy‑efficiency retrofits. He plans to transition
    from employee to owner‑operator by starting a small electrical contracting business that focuses on renewable‑energy solutions for Nevada homes. Mentoring apprentices and leading community safety workshops
    are also important to him, as is ensuring long‑term financial stability for his wife and future children.
