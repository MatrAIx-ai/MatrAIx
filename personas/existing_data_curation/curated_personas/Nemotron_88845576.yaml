personas:
  professional: Brandon Carter, a veteran electrician with three decades of hands‑on wiring, solar‑panel integration, and HVAC electrical work, blends meticulous code compliance with a practical mindset,
    and they now mentor apprentices while pursuing a Master Electrician license and solar‑energy certification to launch a boutique energy‑efficiency consultancy.
  sports: Brandon Carter, a steadfast Atlanta Falcons fan who also enjoys watching the Braves and the Hawks, spends Saturday mornings fishing at Lake Allatoona and joins a local seniors’ walking club for
    light hikes on the Red Top Mountain trail, while they keep a modest routine of weight‑training with resistance bands to maintain strength.
  arts: Brandon Carter relaxes to the twang of classic country legends like George Strait and the Southern rock riffs of Lynyrd Skynyrd while woodworking, and they occasionally attend gospel concerts at
    their church, finding inspiration in the storytelling of Willie Nelson and the soulful harmonies of the Blind Boys of Alabama.
  travel: Brandon Carter prefers low‑key road trips that blend fishing and heritage, having driven the Blue Ridge Parkway to explore Asheville’s craft breweries and planning a future drive to the Grand
    Canyon, while they budget travel through a dedicated savings jar and avoid crowded international itineraries.
  culinary: Brandon Carter enjoys cooking comfort food—smoked BBQ ribs glazed with a homemade brown‑sugar sauce, shrimp and grits infused with fresh thyme, and buttery cornbread—while they casually season
    dishes with cayenne and collard greens, yet they often skip meal prep on busy weeks, resorting to fast‑food burgers.
  core: Brandon Carter is a methodical, worry‑prone electrician who balances hands‑on craftsmanship, quiet hobbies, and a budding mentorship role while clinging to structured routines and a hearty love
    for classic Southern flavors.
background:
  cultural: Brandon grew up in a small community in the deep South and carries the values of Southern hospitality, hard work, and close‑knit family ties. He identifies with a traditional white Southern
    cultural heritage, which includes attending church regularly, enjoying Southern cuisine such as barbecue and peach cobbler, and participating in community events like volunteer clean‑up days. His upbringing
    in Georgia has shaped his practical outlook, respect for personal responsibility, and a preference for stable, familiar routines.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Electrical code compliance'', ''Blueprint reading'', ''Troubleshooting and diagnostics'', ''Safety inspections (OSHA)'', ''Solar
    panel installation'', ''HVAC electrical integration'', ''Small team leadership'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Classic truck restoration'', ''Listening to country music'', ''Following Atlanta Falcons'', ''Church service projects'', ''Journaling'', ''Light hiking'']'
  career_goals: Approaching retirement, Brandon aims to obtain his Master Electrician license and formal certification in solar-energy systems so he can expand his service offerings. He hopes to transition
    from full-time field work to a consulting and mentorship role, training younger apprentices and possibly launching a boutique contracting firm that focuses on energy-efficient retrofits for local homes.
    Financial stability for his family and the ability to reduce daily stress are central to his objectives.
