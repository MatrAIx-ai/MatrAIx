persona_description: A nutrition and health advocate who is passionate about improving access to safe water, sanitation, and hygiene (WASH) in the world's poorest communities. They are committed to promoting
  the positive health impacts of access to WASH and advocating for the inclusion of WASH in the post-2015 development framework. They believe that WASH plays a fundamental role in improving nutritional
  outcomes and that a goal on nutrition should be accompanied by time-bound targets that mitigate the challenges that contribute to under-nutrition, including those linked to behaviour change and the realisation
  of human rights. They are aware of the impact of WASH on nutritional outcomes and believe that any post-2015 goals must better reflect the central importance of WASH to human health, education, welfare,
  and economic productivity and ensure their interconnectedness is reflected.
