personas:
  professional: Willias Planter is a seasoned brick, block, and stone mason with over 15 years of hands‑on experience in blueprint interpretation, precise mortar mixing, and crew leadership, and they channel
    their love for structure and predictability into methodical job‑site planning that mirrors the detailed checklists they use for fishing trips.
  sports: Willias Planter hits the neighborhood park every Thursday for pickup basketball, proudly wearing a retro Atlanta Hawks jersey while cheering for the team, participates in the East Cobb Community
    Basketball League, and spends summer weekends fishing at Lake Allatoona, treating it as a low‑key sport that complements their love for teamwork.
  arts: Willias Planter fills both workshop and home with the soaring harmonies of the Fairfield Four gospel choir and the soulful croon of Aretha Franklin, often humming along while sanding stone and crediting
    these musical legends for the rhythmic cadence that steadies their hands on the job.
  travel: Willias Planter prefers meticulously planned weekend road trips, having mapped detailed itineraries for fishing excursions to Lake Lanier, family getaways to Savannah’s historic district, and
    dreaming of a spring pilgrimage to New Orleans for its culinary scene, though a tight budget and school schedules keep longer vacations on hold.
  culinary: Willias Planter showcases culinary pride by faithfully recreating soul‑food classics—slow‑cooked collard greens seasoned with smoked turkey hocks, crispy fried catfish coated in seasoned cornmeal
    batter, and a bubbling peach cobbler topped with a buttery crumble—following each recipe with the same precision they apply to laying brick.
  core: Willias Planter is a methodical mason who blends the disciplined cadence of bricklaying with the soulful rhythms of gospel music, the quiet patience of fishing, and a steadfast commitment to family,
    community, and meticulous planning.
background:
  cultural: Willias is an African‑American man whose roots lie in the deep‑south culture of Georgia. He was raised in a close‑knit Black community where church, family gatherings, and neighborhood camaraderie
    were central to daily life. The traditions of gospel music, soul‑food cooking, and stories of Black artisans who built countless homes and churches in the South have shaped his identity. He participates
    in local Juneteenth celebrations, values the legacy of Black masons who contributed to historic buildings, and passes on cultural values of resilience, mutual support, and pride in craftsmanship to
    his children.
attributes:
  skills: '[''Brick laying'', ''Concrete block installation'', ''Stone cutting and shaping'', ''Blueprint reading'', ''Structural layout and measurement'', ''Mortar mixing and application'', ''Construction
