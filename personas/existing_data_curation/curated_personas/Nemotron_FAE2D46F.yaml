  hobbies: '[''Fishing'', ''Pickup basketball'', ''Soul‑food cooking'', ''Gospel and R&B music listening'', ''DIY home‑improvement projects'', ''Community garden volunteering'', ''Mentoring apprentices'',
    ''Family road trips'', ''Model building'', ''Car restoration'']'
  career_goals: Willias aims to advance from journeyman mason to crew foreman within the next two years, obtaining OSHA 30‑hour certification and the Certified Masonry Professional designation from the
    Masonry Institute. His long‑term ambition is to launch his own small masonry contracting company that can take on both residential remodels and historic preservation projects in the Atlanta metro area.
    He wants to provide a stable, well‑paid future for his wife and children, create apprenticeship opportunities for local youth, and become a respected voice in the Cobb County trade community.
