  hobbies: '[''reading speculative fiction and graphic novels'', ''drawing and sketching characters'', ''creative writing (short stories, poetry)'', ''making TikTok videos'', ''playing sandbox video games
    (Minecraft)'', ''listening to indie and classic rock music'', ''participating in drama club'', ''volunteering at community events'', ''exploring local parks and fairs'']'
  career_goals: Eric dreams of turning his love for art and narrative into a career that lets him shape ideas and connect with audiences. He aims to study fine arts or multimedia storytelling in college,
    eventually working as a creative director, visual storyteller, or digital content strategist for socially‑oriented brands. He hopes to blend his visual skills with his knack for public engagement, perhaps
    leading creative workshops or producing short films that explore abstract concepts and inspire community dialogue. Flexibility and creative freedom are central to his long‑term professional vision.
