personas:
  professional: Eric Farr, a 15‑year‑old aspiring digital storyteller, blends sketching, rap lyricism, and TikTok filmmaking to prototype narrative worlds while dabbling in Minecraft set design, hoping
    to turn their school drama club experience into a future media production career.
  sports: Eric Farr enjoys casual pick‑up basketball at the community center, cheers for the local high school football team the Riverside Rams, follows the Los Angeles Lakers, and participates in an esports
    club where they compete in Minecraft speed‑building tournaments.
  arts: Eric Farr’s artistic side shines through sketching superhero mash‑ups in a battered notebook, rapping verses inspired by Childish Gambino and Tame Impala, curating indie playlists that feature The
    Strokes and J‑Cole, and starring in school drama productions that fuel their love for storytelling.
  travel: Eric Farr prefers spontaneous weekend trips to nearby county fairs and state parks like Redwood Forest, dreams of backpacking through Kyoto’s manga districts, and hopes to attend Comic‑Con in
    San Diego next summer, all while budgeting travel on a part‑time lawn‑mowing gig.
  culinary: Eric Farr’s palate leans toward spicy ramen, pepperoni pizza, and homemade tacos; they can whip up a quick garlic‑butter stir‑fry using only pantry staples, yet they often order take‑out after
    late‑night gaming marathons and experiment with unconventional toppings like sriracha‑drizzled pineapple.
  core: Eric Farr is a wildly imaginative, chatter‑filled teen who juggles sketchbooks, rap verses, and TikTok clips, while flirting with disorganized habits and a relentless thirst for novelty.
background:
  cultural: Eric was raised in Burlington, a modest city in Guilford County, North Carolina. His family is white with deep roots in the American South, and his upbringing reflects a blend of traditional
    Southern hospitality, community involvement, and modern digital culture. He grew up attending public schools that offered robust art and drama programs, participated in church youth groups, and regularly
    attended local festivals and high school football games. While valuing the close‑knit community spirit and regional traditions of the South, Eric also engages heavily with global pop culture through
    social media, music streaming, and online creative platforms, giving him a broad, yet locally grounded, cultural perspective.
attributes:
  skills: '[''digital illustration'', ''creative writing (fiction & poetry)'', ''improv acting'', ''public speaking'', ''social media content creation'', ''basic graphic design (Canva)'', ''storyboarding'',
