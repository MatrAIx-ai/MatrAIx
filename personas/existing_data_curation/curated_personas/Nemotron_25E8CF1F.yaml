  career_goals: Although retired and not seeking formal employment, Eddy aims to remain active and purposeful within his community. He hopes to expand his garden into a small organic plot that can provide
    fresh produce for his neighbors and the local food bank. He also aspires to teach his grandchildren and interested youth the basics of cooking Colombian dishes and simple home repair skills, preserving
    cultural knowledge while fostering practical competence. Additionally, Eddy wishes to become more proficient with digital tools to archive family photos and stories, creating an online repository that
    connects his Colombian heritage with his Pennsylvania community. These goals reflect his blend of curiosity, practicality, and desire for harmonious contribution despite occasional worries about health
    and technology.
