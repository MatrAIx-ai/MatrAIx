  hobbies: '[''building sandcastles'', ''collecting and sketching seashells'', ''drawing and coloring'', ''puzzle solving'', ''singing and dancing'', ''dress‑up role play'', ''reading picture books'', ''educational
    tablet games'']'
  career_goals: In her vivid imagination, Anna dreams of becoming a teacher because she loves helping friends understand new things and enjoys leading storytime. She also expresses a strong desire to be
    a veterinarian, inspired by her affection for neighborhood pets and the turtles she sees at the beach. Occasionally, she imagines herself as a dancer or a friendly firefighter, roles that allow her
    to bring joy and safety to others. These aspirations reflect her caring nature, love for helping, and playful curiosity about the world.
