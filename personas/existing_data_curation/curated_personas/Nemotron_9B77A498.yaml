personas:
  professional: Anna Rhodes, a budding preschool teacher in training, loves arranging storytime circles with meticulous order while spontaneously inserting imaginative play, showing they blend structure
    and flexibility in early classroom leadership.
  sports: Anna Rhodes kicks a ball for the Little Sprouts Soccer Club, cheers for the Chicago Cubs during family game nights, and enjoys splash time at the local community pool, balancing team play with
    aquatic fun while they relish both competition and water play.
  arts: Anna Rhodes draws vibrant dinosaurs with crayons, sings along to Disney’s 'Frozen' soundtrack, and mimics the animated choreography of 'Moana', especially idolizing Lin-Manuel Miranda’s rhythmic
    storytelling, and they channel this creative energy into daily play.
  travel: Anna Rhodes loves short road trips to the nearby seaside town of Myrtle Beach and family visits to Grandma’s farmhouse, preferring the familiar comfort of car rides over long flights and they
    often collect seashells as souvenirs.
  culinary: Anna Rhodes delights in peanut butter and jelly sandwiches, slurps spaghetti with marinara sauce, and savors strawberry yogurt parfaits, often insisting on adding extra cheese to their macaroni,
    and they proudly declare themselves a tiny food connoisseur.
  core: Anna Rhodes is a kind, organized yet spontaneous five‑year‑old who treasures routine, bursts into imaginative play, saves pocket money for art, and balances social giggles with quiet crayon moments,
    and they often surprise adults with their thoughtful gestures.
background:
  cultural: Anna comes from a middle‑class, white family in Ormond Beach, a coastal community in Volusia County, Florida. Her cultural environment blends typical suburban American values with the relaxed,
    beach‑oriented lifestyle of the Atlantic coast. Her family celebrates national holidays such as Thanksgiving, Christmas, and the Fourth of July, and they attend a local church where community service
    and kindness are emphasized. The community places a high value on respect, cooperation, and friendliness—principles that resonate with Anna’s gentle and cooperative personality. Growing up near the
    ocean, she frequently participates in beach outings, nature walks, and local festivals that highlight Florida’s natural environment and its multicultural influences.
