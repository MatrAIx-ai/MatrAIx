personas:
  professional: Armando Heinrich, a four‑year‑old budding architect at preschool, meticulously builds towering block cities while they catalog each piece in a color‑coded notebook, balancing boundless curiosity
    with a surprisingly practical, methodical approach to play.
  sports: Armando Heinrich darts around the Maple Leaf Minis toddler soccer squad on Saturday mornings, imitates Lionel Messi’s dribbles, proudly dons a New York Yankees cap, and tunes in with Dad to watch
    FC Barcelona matches, preferring structured drills over chaotic tag games, while they relish the competitive spirit of the match.
  arts: Armando Heinrich fills sketchbooks with crayon swirls inspired by Vincent van Gogh’s Starry Night, belts out Idina Menzel’s “Let It Go” from Frozen, and loses themselves in Dr. Seuss picture books,
    letting these artistic idols shape their playful imagination, and they often rehearse the songs in the bathtub.
  travel: Armando Heinrich recalls the thrill of Dumbo at Disney World in Orlando, the salty breezes of weekend trips to the San Diego beach, and now dreams of building a sandcastle at the Great Barrier
    Reef, always planning itineraries with a checklist of snacks and nap times, while they prefer structured travel agendas over spontaneous detours.
  culinary: Armando Heinrich devours buttery macaroni and cheese with extra cheddar, spreads peanut butter on whole‑grain toast, tops banana pancakes with fresh strawberries, and proudly claims they can
    “cook” these dishes all by themselves, even if they sometimes forget to wash their hands first.
  core: Armando Heinrich is a meticulously organized, curious four‑year‑old who balances imaginative play with a competitive streak, and they maintain a calm, steady temperament.
background:
  cultural: Armando is raised in a vibrant Cuban‑American household in Hialeah, Florida, where Spanish is spoken alongside English. His family maintains strong ties to Cuban traditions, celebrating holidays
    such as Nochebuena and Día de la Candelaria with special foods like lechón, plantains, and black coffee. He grows up hearing classic Cuban music—salsa, son, and bolero—from his parents and grandparents,
    which shapes his rhythm and love for dance. Extended family gatherings are frequent, creating a close‑knit support network that emphasizes respect for elders and communal values. The local community
    in Hialeah is densely populated with other Cuban families, providing a cultural environment rich in bilingual signage, Cuban restaurants, and community festivals. This blend of Cuban heritage and American
    influences informs his bilingual communication, culinary preferences, and an appreciation for both collective celebrations and personal discipline.
attributes:
  skills: '[''Bilingual communication (English and Spanish)'', ''Basic reading recognition'', ''Counting to 20'', ''Fine motor skills (drawing, cutting, building)'', ''Spatial reasoning (block construction)'',
