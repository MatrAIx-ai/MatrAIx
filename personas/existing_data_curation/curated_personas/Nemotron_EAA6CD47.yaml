  hobbies: '[''Building with Duplo/Lego bricks'', ''Drawing and coloring'', ''Listening to salsa music'', ''Playing soccer drills'', ''Storytime reading'', ''Helping in kitchen (simple tasks)'', ''Puzzle
    solving (jigsaw, memory games)'', ''Exploring educational tablet apps'']'
  career_goals: He dreams of becoming someone who designs and builds. He often pretends to be an architect, drawing floor plans for his playroom, and talks about constructing bridges with his block set.
    He is fascinated by space exploration, occasionally naming astronauts and saying he wants to be a scientist who discovers how things work. He also enjoys watching his grandparents cook and expresses
    a wish to become a chef who creates traditional Cuban dishes. His aspirations reflect his love for orderly creation, problem solving, and the desire to be the best at what he does, often imagining himself
    winning a science fair or a building competition.
