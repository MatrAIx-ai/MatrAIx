  career_goals: Jeremiah aims to turn his hands‑on abilities into a career as a certified automotive or small‑engine technician, with the long‑term ambition of opening his own repair shop that also offers
    custom woodworking services. He plans to enroll in a vocational trade program after high school or obtain an apprenticeship to earn industry certifications. He also hopes to develop a side‑business
    selling refurbished electronics and handcrafted wooden items online, giving him financial independence and a platform to showcase his competence.
