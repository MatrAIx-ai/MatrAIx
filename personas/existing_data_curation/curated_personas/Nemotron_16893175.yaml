  career_goals: Although officially retired, Ramon remains driven by a desire to leave a lasting, positive imprint on his community. He hopes to establish a mentorship program that pairs retired engineers
    with local high-school students interested in STEM, and to create a public mural that celebrates Seminole's coastal heritage. He also plans to write a memoir that weaves together his experiences in
    engineering, art, and the social changes he witnessed, and to set up a small scholarship fund for under-represented youth pursuing science or the arts.
