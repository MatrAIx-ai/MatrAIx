persona_description: A historian or art curator who is particularly interested in the evolution of sculpture during the late 19th and early 20th centuries, particularly focusing on the works of Camille
  Claudel and the context in which she lived and worked. They are knowledgeable about the historical and cultural influences that shaped the development of sculpture during this period, and are skilled
  in contextualizing the works of Claudel within the broader context of the time. They are also interested in the impact of the rediscovery of the Florentine Quattrocento and the influence of the academic
  and symbolist milieus on the development of sculpture during this period.
