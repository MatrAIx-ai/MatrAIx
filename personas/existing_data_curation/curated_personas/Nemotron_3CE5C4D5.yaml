personas:
  professional: Francis Simpson is a budding junior programmer who channels their love of building and order into Scratch projects, methodically planning each animation step by step, testing for bugs, and
    proudly sharing functional games with classmates.
  sports: Francis Simpson plays for the Pekin Thunder U10 soccer team, where disciplined drills and teamwork mirror their structured personality, and they cheer for the Chicago Cubs and Chicago Bulls while
    sporting a lucky red wristband during matches.
  arts: Francis Simpson devotes free time to reading mystery books like "The Secret of the Old Clock," crafting detailed LEGO cityscapes, and enjoying a playlist that blends pop hits from Dua Lipa, classic
    jazz from Miles Davis, and uplifting gospel chants by Mahalia Jackson, all of which fuel their creative expression.
  travel: Francis Simpson prefers family‑organized trips that balance adventure with safety, having explored the interactive exhibits at Chicago’s Museum of Science and Industry, camped at a nearby state
    park, and dreaming of a future road‑trip to the Grand Canyon with cousins.
  culinary: Francis Simpson favors comfort foods such as pepperoni pizza, cheesy macaroni, and homemade chicken nuggets, enjoys perfecting a thick‑sliced grilled cheese with a crunchy edge, and occasionally
    experiments with unexpected toppings like pineapple, though they often over‑bake the crust.
  core: Francis Simpson is a methodical 10‑year‑old who blends a love for structured play—LEGO, Scratch coding, and soccer—with meticulous planning and occasional crumb‑laden mischief on their bedroom carpet.
background:
  cultural: Francis is a 10‑year‑old African American boy growing up in Pekin, Illinois, a small Midwestern city. His family maintains strong ties to the African American community through church gatherings,
    cultural celebrations such as Juneteenth, and storytelling that highlights Black history and achievements. While embracing Midwestern values of hard work, modesty, and community service, he also experiences
    cultural traditions like family‑cooked soul food meals, rhythmic gospel music, and participation in local cultural festivals. His school environment is diverse, and he benefits from mentorship from
    older community members who encourage academic success and involvement in extracurricular activities.
attributes:
  skills: '[''Organizational planning'', ''Reading comprehension'', ''Basic arithmetic'', ''Tablet and educational app proficiency'', ''Time management'', ''LEGO model building'', ''Basic Scratch programming'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Scratch programming'', ''Reading adventure books'', ''Listening to music (pop, jazz, gospel)'', ''Community events and volunteer activities'']'
  career_goals: Francis aspires to become a robotics or mechanical engineer because he enjoys building things that work predictably and helping solve real‑world problems. He is also fascinated by the idea
    of serving his community as a firefighter, appreciating the clear structure, teamwork, and sense of purpose the role provides. In the short term, he aims to improve his grades, join the school robotics
    club, earn a Boy Scouts merit badge in STEM, and keep developing his coding and construction skills.
