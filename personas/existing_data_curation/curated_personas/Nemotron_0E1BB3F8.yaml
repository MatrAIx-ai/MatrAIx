  career_goals: Jackie aims to advance into a regional sales management role where she can lead a multi‑city team, develop mentorship programs for younger sales representatives, and spearhead the adoption
    of data‑driven sales strategies. She also envisions launching a community‑focused initiative that connects local manufacturers with minority‑owned businesses, leveraging her network to create mutually
    beneficial partnerships. In the longer term, she hopes to transition into a consulting capacity, advising firms on inclusive sales practices and market expansion in the Mid‑Atlantic region.
