personas:
  professional: Jackie Pearson, a veteran wholesale and manufacturing sales strategist with three decades of experience, leverages a creative, data‑driven approach to negotiating contracts, analyzing market
    trends, and mentoring junior staff, while channeling their sociable energy into building regional teams and inclusive partnerships between local manufacturers and minority‑owned businesses.
  sports: Jackie Pearson embraces energetic Zumba classes at the local community center, joins a weekend hiking club called Shenandoah Trailblazers for explorations of the valley, and cheerfully supports
    the Washington Commanders, Washington Capitals, and DC United while occasionally playing pick‑up volleyball with neighbors.
  arts: Jackie Pearson immerses themselves in Richmond's vibrant arts scene, attending gallery openings featuring works by Kerry James Marshall, listening to performances by the Virginia Symphony Orchestra,
    reciting poetry by Maya Angelou at slam events, and crafting pottery and textiles inspired by the tactile aesthetics of contemporary artist Faith Ringgold.
  travel: Jackie Pearson prefers thoughtfully planned road trips that blend cultural immersion and outdoor adventure, frequently revisiting the historic streets of Charleston, the jazz clubs of New Orleans,
    and the hiking trails of Shenandoah Valley, while dreaming of a future Mediterranean cruise that would combine culinary tours of Italy with visits to coastal art festivals.
  culinary: Jackie Pearson delights in cooking flavorful Southern dishes such as shrimp and grits, jalapeño‑infused collard greens, and ginger‑lime glazed salmon, often experimenting with pottery‑baked
    casseroles and incorporating fresh herbs like rosemary and cilantro, though they admit to occasionally over‑indulging in dessert cheesecakes after a night at the theater.
  core: Jackie Pearson blends a tireless curiosity for art and commerce with a sociable, organized streak, leading them to orchestrate inclusive sales strategies by day and dance through Zumba classes by
    night, all while juggling a penchant for spontaneous dessert indulgence.
background:
  cultural: Jackie is an African‑American woman with deep roots in the Richmond area. Growing up during the civil‑rights era, she was nurtured by a close‑knit family and a historically Black church that
    emphasized community service, education, and cultural pride. She celebrates traditions such as Juneteenth, Soul Food festivals, and gospel music gatherings, which reinforce her connection to the broader
    Black diaspora. Her cultural identity informs her professional ethos—valuing relationship‑building, mutual respect, and the empowerment of underrepresented voices within the manufacturing and sales
    sectors.
