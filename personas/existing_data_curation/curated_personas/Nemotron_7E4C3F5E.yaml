  hobbies: '[''Reading'', ''Bird Watching'', ''Drawing'', ''Journaling'', ''LEGO Building'', ''Nature Walks'', ''Simple Coding (Scratch Jr.)'', ''Listening to Instrumental and R&B Music'']'
  career_goals: Constance dreams of becoming a wildlife veterinarian who can combine caring for animals with practical tools that make treatment easier, and she also imagines herself as a young scientist
    studying rivers and forests in the Pacific Northwest, using her curiosity and love of quiet, hands‑on research to protect the environment. She plans to stay focused on school, earn good grades, and
    later attend a high school with strong STEM programs to turn these early ambitions into reality.
