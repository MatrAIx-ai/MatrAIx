personas:
  professional: Constance Sanders, an aspiring junior naturalist and coder, blends meticulous observation skills with practical problem‑solving as they design Scratch Jr. projects that simulate bird habitats,
    while their love of quiet, organized spaces lets them excel at building detailed LEGO ecosystems.
  sports: Constance Sanders enjoys low‑impact fitness like weekend swimming at the community pool and quietly cheering for the Boston Red Sox and Boston Celtics while keeping a membership in the school’s
    bird‑watching club, preferring nature walks over noisy team sports.
  arts: Constance Sanders spends free time sketching botanical illustrations inspired by the works of Maria Sibylla Merian and draws on the calming piano pieces of Yiruma and classic R&B tunes by Marvin
    Gaye, while occasionally re‑watching animated films by Studio Ghibli for creative inspiration.
  travel: Constance Sanders favors calm, nature‑focused trips such as family visits to Yellowstone National Park for wildlife spotting and a recent short vacation to the San Diego Zoo, dreaming of a future
    expedition to the Amazon rainforest to study rare bird species.
  culinary: Constance Sanders prefers simple comfort foods like mac and cheese with a sprinkling of cheddar, homemade banana‑strawberry smoothies, and occasionally experiments with building their own mini
    pizza topped with bell peppers and mushrooms, though they often rush meals to get back to their journal.
  core: Constance Sanders is a quiet, curiosity‑driven eight‑year‑old who balances meticulous observation with hands‑on creation, thrives in solitary pursuits, and occasionally forgets to tidy up their
    LEGO pieces after a successful build.
background:
  cultural: Constance is raised in a Black family that celebrates African‑American heritage while living in the diverse, environmentally conscious community of Portland, Oregon. Her parents share stories
    of their own parents' experiences during the civil‑rights era, observe Juneteenth and honor ancestors through food traditions like collard greens, cornbread, and sweet potato pie, and attend a local
    church that emphasizes community service and cultural pride. At home, she hears a mix of gospel, soul, and contemporary R&B, and she participates in family gatherings where storytelling, folk music,
    and discussions about resilience are common. This cultural foundation blends with Portland’s love for nature, outdoor activities, and sustainability, shaping Constance’s values of compassion, self‑reliance,
    and a quiet determination to make a positive impact.
attributes:
