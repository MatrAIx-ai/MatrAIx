  career_goals: Although retired from formal employment, Jessica aspires to preserve and share her family's Nicaraguan heritage through a published memoir and a curated collection of oral histories. She
    aims to expand her role as a cultural liaison, coordinating intergenerational art workshops that blend traditional crafts with contemporary abstract techniques. Jessica also hopes to deepen her digital
    skills to create an online archive of community stories, and she envisions guiding local youth in exploring both their artistic curiosity and cultural roots.
