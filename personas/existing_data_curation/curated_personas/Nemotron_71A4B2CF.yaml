  career_goals: She aims to excel in high school STEM courses and earn a scholarship to study biomedical engineering or environmental science, with a long‑term ambition to design affordable medical devices
    or sustainable solutions for coastal communities affected by flooding. Her practical mindset drives her to seek real‑world applications of scientific knowledge, while her curiosity fuels her desire
    to explore cutting‑edge research. Anjali also hopes to mentor younger students, especially those from South‑Asian or under‑represented backgrounds, fostering a supportive learning environment.
