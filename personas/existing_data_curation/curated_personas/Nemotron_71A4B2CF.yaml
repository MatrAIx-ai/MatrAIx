personas:
  professional: Anjali Iqbal, a budding robotics enthusiast and high‑school freshman, blends a love of science‑fiction reading with methodical engineering practice, leading a small team to design autonomous
    beach‑cleanup bots and recently programmed a simple LED display for Eid celebrations at the local mosque, balancing curiosity with practical project timelines.
  sports: Anjali Iqbal enjoys early‑morning beach jogs along Galveston, follows the Houston Astros for baseball and the Houston Rockets for basketball, and participates in a community junior swimming club
    that meets twice weekly, preferring low‑key, consistent fitness over competitive team sports.
  arts: Anjali Iqbal spends afternoons sketching marine life inspired by the Gulf coast, draws influence from visual storytellers like Hayao Miyazaki and painter Frida Kahlo, and unwinds listening to A.R.
    Rahman's film scores alongside indie artists like Mitski, shaping a hybrid artistic palette.
  travel: Anjali Iqbal’s travel style blends careful planning with spontaneous curiosity, having explored the historic districts of Galveston and the vibrant food markets of Austin, while dreaming of a
    family trip to the mangrove‑covered islands of the Maldives to study marine ecosystems up close.
  culinary: Anjali Iqbal enjoys cooking family recipes such as spiced rice pilaf, fluffy naan‑style flatbreads, and savory chickpea patties, especially preparing them for Eid feasts and suhoor during Ramadan,
    while experimenting by adding quinoa, avocado, and smoked paprika to create fusion dishes like lentil‑quinoa kebabs, and they often use fresh citrus and cilantro to brighten flavors.
  core: Anjali Iqbal is a quietly curious 14‑year‑old who pairs solitary sketching on beach walks with collaborative robotics projects, habitually over‑indulges in late‑night graphic novels, never misses
    a sunset prayer, and sometimes forgets homework after staying up perfecting a new sketch.
background:
  cultural: Anjali comes from a South‑Asian Muslim family originally from Pakistan/India, settled in Texas City. Her household is bilingual, speaking English and Urdu, and places a strong emphasis on education,
    respect for elders, and communal harmony. She celebrates cultural and religious events such as Eid al‑Fitr, Eid al‑Adha, and Ramadan, often helping to prepare festive meals and participate in community
    service through the local mosque. Growing up on the Gulf Coast, she has also embraced coastal Texan traditions, including beach outings and observing local festivals, which blend with her South‑Asian
    heritage to shape a unique multicultural identity.
