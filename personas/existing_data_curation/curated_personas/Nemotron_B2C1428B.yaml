personas:
  professional: Karla Newton, a budding teenage game developer, blends curiosity with practicality by turning sci‑tech experiments and digital sketches into simple, playable prototypes, while they organize
    school projects and coordinate with friends to test new ideas.
  sports: Karla Newton is a lively soccer enthusiast who plays midfield for the Downtown Falcons youth league, cheers for the LA Galaxy during televised matches, and they incorporate salsa dance warmups
    into every training session to stay agile and fit.
  arts: Karla Newton expresses creativity through digital drawings inspired by artists like Bad Bunny and Aitana, blends salsa beats with contemporary pop while choreographing short routines, and they tinker
    with simple game engines to showcase their artwork in interactive stories.
  travel: Karla Newton prefers family road trips that mix beach relaxation with cultural hikes, has explored the Grand Canyon and a coastal town renowned for its seafood, and they dream of visiting Machu Picchu
    and Disneyland to experience both adventure and nostalgia.
  culinary: Karla Newton loves helping the family prepare tacos al pastor, guacamole with fresh cilantro and lime, and churros dusted in cinnamon, and they often add extra cheese to tacos while proudly
    mastering the art of sifting masa dough.
  core: Karla Newton is a curious, sociable teen who balances soccer, salsa dancing, and game creation, and they juggle school duties, a modest allowance, and an occasional guilty‑pleasure snack.
background:
  cultural: Karla grows up in a bicultural Mexican‑American household in Lakeside, California. Spanish is spoken at home, and family traditions such as Día de los Muertos, quinceañera preparations, and
    weekly homemade meals are celebrated alongside the diverse cultural life of Southern California. This blend of Mexican heritage and American surroundings shapes her values of family loyalty, community
    cooperation, and a respect for both tradition and contemporary influences.
