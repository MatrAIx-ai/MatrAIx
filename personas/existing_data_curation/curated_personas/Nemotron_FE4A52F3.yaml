personas:
  professional: Lysandra Trejo, a seasoned bookkeeping specialist with three decades of experience in ledger maintenance, accounts payable/receivable, and audit assistance, combines a methodical Excel‑savvy
    approach with a creative problem‑solving mindset sparked by her art involvement, and now pursues the Certified Bookkeeper designation while mentoring junior staff and positioning herself as a part‑time
    financial consultant for local small businesses and nonprofit arts groups.
  sports: Lysandra Trejo stays active by performing with a senior folklorico and salsa dance troupe, attends weekly Tuesday morning walks with the Austin Senior Running Club, and devotes weekend evenings
    cheering for Austin FC soccer while also following the Texas Longhorns football season closely.
  arts: Lysandra Trejo immerses herself in Austin’s vibrant art scene, regularly attending openings featuring works by contemporary Mexican‑American artists like Frida Kahlo‑inspired painters, participating
    in community mural projects that echo Diego Rivera’s public art ethos, and honing her own visual storytelling through evening digital photography courses that capture the city’s street murals and historic
    architecture.
  travel: Lysandra Trejo prefers purposeful travel that blends cultural immersion with relaxation, often planning weekend road trips to New Mexico’s Santa Fe for its art markets, dreaming of a future pilgrimage
    to Oaxaca to experience authentic Día de los Muertos celebrations, while balancing her itinerary around a modest retirement budget and occasional family obligations in Austin.
  culinary: Lysandra Trejo delights in cultivating heirloom chilies and fresh herbs in her garden to craft family‑style dishes such as chili relleno, salsa verde, and pork pozole, skillfully blending traditional
    recipes with contemporary twists while occasionally over‑seasoning a batch, a quirk that her friends both admire and gently tease.
  core: Lysandra Trejo channels her meticulous bookkeeping expertise, artistic curiosity, and energetic sociability into a retirement phase marked by lively mural collaborations, senior dance performances,
    and a habit of double‑checking every receipt—while occasionally hoarding old tax documents like treasured memorabilia.
background:
  cultural: Lysandra is a first‑generation Mexican‑American whose family roots trace back to Jalisco. She grew up in a bilingual household in Texas, celebrating Mexican holidays such as Día de los Muertos,
    Las Posadas, and Mexican Independence Day while also embracing Texas traditions. Her Catholic upbringing instilled values of community service and family solidarity. Throughout her life, she has balanced
    the rich culinary, artistic, and musical traditions of her heritage with the multicultural environment of Cedar Park and the broader Austin area. This dual cultural perspective influences her professional
    demeanor—bringing warmth, respect for hierarchy, and a collaborative spirit—while also fueling her appreciation for diverse artistic expression and her commitment to supporting neighboring Mexican‑American
    communities.
