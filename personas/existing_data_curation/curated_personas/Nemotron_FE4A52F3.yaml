  hobbies: '[''Visiting art galleries and exhibitions'', ''Participating in community mural projects'', ''Folklorico and salsa dancing'', ''Digital photography classes'', ''Spanish literature study'', ''Gardening
    (heirloom chilies, herbs)'', ''Cooking traditional Mexican cuisine'', ''Volunteering at Mexican Cultural Center'', ''Organizing financial literacy workshops'']'
  career_goals: Though approaching retirement, Lysandra aims to leverage her extensive experience to become a senior bookkeeping specialist or part‑time financial consultant for local small businesses and
    nonprofit arts organizations. She plans to earn the Certified Bookkeeper designation from the American Institute of Professional Bookkeepers within the next two years, and to mentor younger staff at
    her firm, sharing her knowledge of best practices and emerging accounting technologies. She also hopes to lead community workshops on financial literacy for seniors and recent immigrants, blending her
    love of education, art, and community service.
