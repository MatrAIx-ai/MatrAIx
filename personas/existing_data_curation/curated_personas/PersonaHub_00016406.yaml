persona_description: Matthew K. Nock, Ph.D. is a renowned psychologist and director of the Nock Lab at Harvard University. His research focuses on understanding suicide and other forms of self-harm, and
  developing effective treatments to prevent these behaviors. Nock's work has been recognized with career awards and grants from the US National Institutes of Health, US Department of Defense, and private
  foundations, and has been published in over 250 scientific papers. His presentations on the latest technologies and computing advancements in suicide prevention are of great interest to professionals
  in the field of psychology and public health.
