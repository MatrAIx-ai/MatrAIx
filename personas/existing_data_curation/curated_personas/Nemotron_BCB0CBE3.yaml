personas:
  professional: Shannon Searcy is a budding junior explorer whose love of collecting rocks and building Lego creations fuels a practical curiosity that often leads them to design impromptu experiments for
    school science fairs while still keeping a tidy workspace.
  sports: Shannon Searcy plays for the Little Tigers youth soccer team, idolizes the Cincinnati Bengals for their teamwork, spends weekends tagging friends at the riverbank, and approaches fitness with
    boundless energy tempered by a habit of forgetting to stretch.
  arts: Shannon Searcy delights in drawing whimsical scenes inspired by Dr. Seuss and Ariel from Disney's The Little Mermaid, sings upbeat choruses with their school choir alongside classics from Kidz Bop,
    and frequently decorates cupcakes with artistic frosting patterns.
  travel: Shannon Searcy loves family road trips to the Ohio River museums, enjoys exploring the interactive exhibits at the Cincinnati Zoo, dreams of visiting the Grand Canyon for its massive rocks, and
    prefers short, supervised adventures over long flights.
  culinary: Shannon Searcy enjoys baking vanilla cupcakes with rainbow sprinkles alongside their mother, often adding a dash of cinnamon for extra flavor, and they proudly claim their specialty dish is
    homemade macaroni and cheese with diced carrots.
  core: Shannon Searcy is an energetic, curiosity‑driven seven‑year‑old who balances playful exploration with a practical streak, often juggling Lego builds, soccer matches, and cupcake frosting while habitually
    misplacing spare change.
background:
  cultural: Shannon is a white American child raised in Maysville, Kentucky, a small town along the Ohio River in Mason County. Her family values community, church, and local traditions such as the county
    fair, high school football games, and family gatherings. She experiences a blend of rural and small‑town culture, with access to outdoor activities like fishing and hiking, and a strong emphasis on
    kindness, cooperation, and community service that shapes her outlook.
