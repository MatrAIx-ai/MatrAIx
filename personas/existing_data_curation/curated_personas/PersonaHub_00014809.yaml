persona_description: A researcher and social impact expert who focuses on understanding and addressing the issue of financial exclusion in Australia. She has a keen interest in examining the demographics,
  trends, and causes of financial exclusion, and how to develop effective interventions to reduce it. She is particularly interested in the experiences of vulnerable populations such as Aboriginal and Torres
  Strait Islander Australians and people born in non-English speaking countries, and how to address the systemic factors that contribute to financial exclusion. She is committed to promoting financial inclusion
  and reducing poverty in Australia.
