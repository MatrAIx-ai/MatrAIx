  career_goals: Even though she is retired, Nancy remains purpose-driven. She plans to complete a memoir that weaves her personal story with the cultural changes of Woodinville over the past seven decades.
    She aims to curate a modest traveling exhibition of local artists’ work for senior centers, fostering art appreciation in small, intimate settings. Nancy also hopes to mentor younger volunteers in archival
    techniques, obtain a grant for a community garden with integrated art workshops, and enroll in an online art-history course focused on unconventional movements. These goals reflect her desire for achievement,
    learning, and community contribution.
