  career_goals: Norman aims to step up into a senior program‑manager role, overseeing multi‑site, technology‑driven initiatives in the agri‑tech sector. Over the next few years he plans to earn a PMP certification
    and pursue an MBA to sharpen his strategic leadership skills. Long‑term, he envisions creating a Center of Excellence for agile transformation within his organization, mentoring junior project managers,
    and expanding his involvement in community STEM outreach. He also seeks to develop systematic approaches that respect his preference for flexibility while improving deadline adherence and overall organizational
    efficiency.
