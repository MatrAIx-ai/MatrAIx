persona_description: A professional auditor who is responsible for conducting audits and evaluating the internal control processes of organizations. They are knowledgeable in the technical aspects of auditing
  and have a keen interest in understanding the underlying principles and structures of internal control systems. The persona is likely to read formal reports that summarize the findings and recommendations
  of the audit, and is looking for a clear and concise presentation of the information. They may also be interested in learning about the organizational structure and practices of the companies being audited,
  as well as the methods used to evaluate internal control processes.
