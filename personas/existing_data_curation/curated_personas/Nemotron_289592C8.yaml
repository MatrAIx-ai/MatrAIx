  career_goals: Jovan aims to transition into a store‑manager role within the next two years, seeking a position that lets him shape floor operations while supporting his team’s development. He plans to
    complete the National Retail Federation’s Certified Retail Management program to formalize his expertise. Long‑term, he envisions a phased move toward part‑time consulting for small local retailers,
    sharing best‑practice strategies that emphasize efficient stock flow and customer‑centric service. At the same time, he wants to solidify a retirement savings plan that reduces financial worry and affords
    more flexible evenings with his wife. By aligning his career trajectory with his desire for predictable schedules and reduced stress, he hopes to maintain a harmonious work‑life balance.
