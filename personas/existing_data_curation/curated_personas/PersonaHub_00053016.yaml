persona_description: A Oracle9i OLAP Services Developer who is interested in designing and implementing programs that utilize the OLAP DML feature, specifically in the context of sending output to a file.
  This persona is likely to be familiar with the standard filename format for operating systems, the use of the OUTFILE command to write output to a file, and the concept of routing output to a default
  outfile. They may also be interested in the use of the OUTFILE EOF command to ensure that output is sent to the default outfile when errors cause abnormal termination of the program. Additionally, this
  persona may have experience with setting the ECHOPROMPT option to YES, creating debugging files, and setting paging options for files.
