  career_goals: Ronald aims to transition from his current unemployment into a stable, structured role where performance is measured by clear metrics. He is pursuing a Commercial Driver’s License (CDL)
    with the goal of becoming a long‑haul truck driver, a career that offers predictable schedules and tangible progress. Simultaneously, he is exploring certification as a Service Technician for small‑engine
    repair, hoping to eventually launch a solo handyman business that leverages his existing mechanical and woodworking expertise. His overarching ambition is to achieve financial independence while maintaining
    the routine and accountability he values.
