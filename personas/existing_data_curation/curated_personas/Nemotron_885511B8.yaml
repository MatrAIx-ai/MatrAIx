personas:
  professional: Anthony Livie, a retired civil engineer specializing in coastal infrastructure, leverages their meticulous record‑keeping, CAD and GIS expertise, and competitive drive to mentor high‑school
    STEM students and contribute precise engineering insights to historic preservation projects in Currituck County.
  sports: Anthony Livie, a devoted fan of the Carolina Hurricanes and Carolina Panthers, rows with the Currituck Yacht Club during spring regattas, competes in senior fishing tournaments, and joins pick‑up
    senior softball games at the community park, balancing competitive rivalry with the social camaraderie of local sports.
  arts: Anthony Livie finds inspiration in John James Audubon’s bird illustrations, unwinds listening to Bob Dylan’s folk classics, and attends performances by the North Carolina Symphony, while their appreciation
    for maritime paintings by local artist Susan Hargis informs the aesthetic of their model‑ship builds.
  travel: Anthony Livie plans journeys with the same precision as their engineering projects, having explored Cape Hatteras National Seashore, historic St. Augustine, and the Galápagos Islands for birdwatching,
    and now dreams of visiting the maritime museums of Portsmouth, England, and the coastal trails of New Zealand.
  culinary: Anthony Livie enjoys preparing fresh crab cakes seasoned with Old Bay, simmering garden‑grown tomato‑basil soup, and savoring classic shrimp and grits, often pairing meals with locally caught
    bluefish and a splash of dry white wine.
  core: Anthony Livie blends an engineer’s love for order with a competitive spirit in birdwatching and model‑ship building, yet their obsessive checklist‑making can overwhelm casual acquaintances and sometimes
    leads to missed social invitations.
background:
  cultural: Anthony grew up in a Midwestern white American family of English and Irish ancestry, raised in a Methodist tradition that emphasized hard work, punctuality, and community service. After relocating
    to Corolla, NC, he embraced the Outer Banks culture, which blends a love of the sea, respect for local history, and a self‑reliant lifestyle. His cultural identity combines traditional American values
    of reliability and order with the relaxed, nature‑focused ethos of coastal North Carolina.
attributes:
  skills: '[''Civil engineering'', ''Structural analysis'', ''Coastal infrastructure design'', ''Project management'', ''Technical writing'', ''CAD (AutoCAD, MicroStation)'', ''GIS'', ''Data analysis (Excel,
