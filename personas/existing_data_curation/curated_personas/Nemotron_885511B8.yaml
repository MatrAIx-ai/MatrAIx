  hobbies: '[''Birdwatching'', ''Scale model shipbuilding'', ''Fishing'', ''Sailing'', ''Historical reading'', ''Gardening'', ''Genealogy research'', ''Volunteer work at local historical society'', ''Chess'']'
  career_goals: Although retired, Anthony aims to leave a lasting professional legacy by mentoring local high‑school students interested in STEM, contributing his engineering knowledge to the Currituck
    County Historical Society’s preservation projects, and authoring a memoir that chronicles both his career in coastal engineering and the evolution of the Outer Banks. He also seeks recognition in regional
    model‑ship competitions and hopes to support community initiatives that protect the coastal environment.
