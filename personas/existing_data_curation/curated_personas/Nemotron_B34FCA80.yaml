  career_goals: Although retired from full‑time employment, Trung remains driven to make a lasting impact. He aims to mentor emerging engineers through local maker‑spaces and university outreach, sharing
    his expertise in sustainable robotics and renewable‑energy solutions. He plans to publish a series of white papers and a memoir that intertwines his journey as a Southeast Asian immigrant with the evolution
    of the tech industry. Trung also seeks to curate a small traveling exhibition of his photography and Southeast Asian artwork, fostering cultural exchange. Additionally, he wishes to organize a community
    garden dedicated to heritage herbs, and to lead a competitive senior chess team that challenges regional opponents. These goals reflect his curiosity, competitive spirit, and desire for personal fulfillment.
