persona_description: A scientist who specializes in the study of gamma-ray bursts and their causes, particularly the role of black holes in their formation. He is interested in using the Ultra-Violet/Optical
  Telescope (UVOT) aboard the NASA Swift satellite to gather new information about the galaxies that host these explosions and the impact they have on their environments. He is also interested in learning
  more about the chemistry of the host galaxies and how they formed during the early universe.
