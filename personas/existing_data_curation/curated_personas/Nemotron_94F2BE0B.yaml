personas:
  professional: Corlisa Lewis, a 26‑year‑old recreation specialist in Miami, blends a humanities education with practical project‑management expertise to craft inclusive arts workshops, beach‑volleyball
    clinics, and wellness sessions, balancing innovative ideas with proven methods, staying organized yet flexible, and fostering collaborative environments that prioritize participants’ diverse needs.
  sports: Corlisa Lewis spends her weekends playing competitive beach volleyball at South Beach and watches the Miami Heat and Miami Dolphins for inspiration, while also participating in a co‑ed sunrise
    yoga class at a local park; she balances team camaraderie with solo jogs along the shoreline, and her fitness routine includes occasional lapses when project deadlines loom, revealing a flexible but
    generally committed approach to staying active.
  arts: Corlisa Lewis is a regular at Wynwood gallery openings, a dedicated follower of muralist JR and photographer Alex Webb, and a frequent attendee of live Latin‑jazz sets at Lagniappe, where she dances
    salsa and Afro‑Latin rhythms; these artistic experiences shape her identity, prompting her to collect affordable limited‑edition prints, though she sometimes leaves her phone in cafés, missing spontaneous
    photo opportunities of street art.
  travel: Corlisa Lewis’s travel style blends meticulously budgeted weekend getaways to the Florida Keys and spontaneous day trips to the Everglades with a longing to explore Cartagena’s historic old town
    and the vibrant streets of New Orleans for their music scene, balancing careful planning for flights and accommodations with an openness to last‑minute detours that feed her curiosity and love for multicultural
    environments.
  culinary: Corlisa Lewis delights in cooking Caribbean‑inspired dishes such as jerk chicken with scotch bonnet pepper, coconut rice, and callaloo soup, often experimenting with fresh cilantro, ginger,
    and mango salsa; while she enjoys hosting small dinner parties, she sometimes forgets to prep ingredients in advance, leading to rushed meals that nevertheless reflect her adventurous palate.
  core: Corlisa Lewis is a pragmatic dreamer who balances vibrant cultural pursuits with disciplined career ambitions, navigating community recreation with organized flexibility, occasional impulsive splurges,
    and a habit of juggling deadlines with beach volleyball games.
background:
  cultural: Corlisa is an African American woman whose parents emigrated from Jamaica, giving her a blend of Black American and Caribbean cultural influences. Growing up in Miami’s diverse neighborhoods,
    she embraces the city’s multilingual, multicultural environment while staying connected to the traditions of her heritage through music, food, and community celebrations. Her cultural perspective informs
    her commitment to inclusive programming that honors the varied identities of the residents she serves.
attributes:
  skills: '["Program Development", "Event Coordination", "Community Outreach", "Arts and Cultural Activity Facilitation", "Conflict Resolution", "Safety and Risk Management", "Budget Management", "Customer
    Service", "Cultural Competency", "Adaptability", "Team Leadership", "Data Collection and Evaluation"]'
  hobbies: '["Salsa dancing", "Beach volleyball", "Photographing street art", "Reading contemporary fiction", "Cooking Caribbean cuisine", "Mentoring youth", "Yoga and mindfulness practice", "Attending
    live music events"]'
  career_goals: Corlisa aims to progress from a recreation worker to a Recreation Director within the Miami-Dade Parks and Recreation Department, where she can shape policy for equitable access to leisure
    resources. She plans to pursue a Master’s in Public Administration to deepen her understanding of urban planning and community development, and eventually launch a nonprofit that provides after‑school
    arts and wellness programs for underserved youth.
