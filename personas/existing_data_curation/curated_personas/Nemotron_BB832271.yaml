  hobbies: '[''hiking'', ''skiing'', ''recreational soccer'', ''volunteering at health fairs'', ''triathlons'', ''obstacle-course races'', ''cooking'', ''hosting dinner parties'', ''live music events'']'
  career_goals: Regan aims to become a board-certified physician assistant with a specialization in emergency medicine, while taking on a supervisory role in a rural urgent-care clinic in Casper. She plans
    to pursue a master’s degree in health administration to eventually oversee a network of rural health facilities, lead community health initiatives to improve access to care, mentor new PAs, and advocate
    for policy changes that support underserved populations.
