persona_description: A conservationist and environmentalist who is passionate about protecting and preserving biodiversity, particularly in the Kirmir Valley in Beypazarı. They have a deep understanding
  of the unique flora and fauna found in the area, as well as the threats to biodiversity posed by hydropower projects and intensive agricultural practices. They are committed to working with local communities
  to establish a baseline for the future survival of the KBA as a community conserved area. They are also interested in the sustainable interaction of the local community with nature, as evidenced by their
  work with the Gazi University to save the last location on earth where the critically endangered plant species Beypazarı Astragalus (Astragalus beypazaricus) occurs.
