  hobbies: '[''Playing soccer in local leagues'', ''Cooking traditional Peruvian dishes'', ''Listening to Andean folk music'', ''Vehicle mechanics and tinkering'', ''Road‑trip photography'', ''Reading mystery
    novels'', ''Fishing on weekends'']'
  career_goals: Ernesto aims to obtain a Class A commercial driver’s license and move into a lead-driver or fleet-supervisor role within the next three years. He hopes to deepen his logistics knowledge
    by completing a certificate program in supply-chain management, which would position him to oversee route optimization and driver training. Ultimately, he dreams of launching his own small trucking
    business that services local Hispanic markets, allowing him to combine his practical driving expertise with his sales background while providing reliable employment for members of his community.
