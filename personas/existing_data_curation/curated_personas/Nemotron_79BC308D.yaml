  career_goals: Rada aims to advance to a supervisory position such as security supervisor or shift manager, where she can shape safety policies, lead a team, and mentor junior staff. She plans to earn
    the Certified Protection Professional (CPP) credential and complete advanced crisis‑intervention training. Over the longer term, she hopes to transition into risk‑management consulting for municipal
    agencies and to develop a community‑focused safety outreach program that promotes public awareness and preparedness.
