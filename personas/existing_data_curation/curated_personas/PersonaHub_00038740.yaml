persona_description: A sociologist who specializes in the study of social structures and the relationships between individuals and communities in the context of displacement and humanitarian action. The
  individual has a deep understanding of the psychological, social, and cultural effects of displacement and the challenges of adaptation to new and unfamiliar social and cultural environments. They are
  particularly interested in understanding the impact of displacement on gender roles and relationships, the challenges of adaptation in refugee camps, and the demographic effects of forced migration. The
  individual is also interested in the anthropological research and training programs on refugee health at leading schools of public health such as Johns Hopkins and Columbia University.
