persona_description: A conservation biologist who specializes in the study of chimpanzees and their habitats, particularly in the African continent. They are knowledgeable about the species' population
  trends, threats to their survival, and conservation efforts. They are also interested in the taxonomic classification of the species and the implications of population reductions for their survival. They
  are likely to be familiar with the IUCN Red List criteria and the importance of a regional approach for conservation efforts. They may have experience working with data on chimpanzee population trends,
  habitat loss, and poaching.
