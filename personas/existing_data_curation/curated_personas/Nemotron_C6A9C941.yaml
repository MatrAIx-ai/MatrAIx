personas:
  professional: Gregg Dobbs, a budding junior engineer who loves building LEGO structures, demonstrates methodical planning and reliability in play while eagerly sharing ideas with peers, and they often
    organize the building session so everyone knows their role.
  sports: Gregg Dobbs dashes around the playground, loves the Tiny Tykes Soccer Club, and cheers loudly for the nearby Major League Baseball team, the Chicago Cubs, while also enjoying swimming lessons
    at the community pool, and they thrive on the camaraderie of team games.
  arts: Gregg Dobbs delights in drawing creatures inspired by Dr. Seuss, dances to the catchy tunes of Disney movies like "Frozen", and watches classic Sesame Street episodes featuring Big Bird and Elmo,
    shaping a vivid creative world, and they often share their artwork with friends during playdates.
  travel: Gregg Dobbs has explored the local zoo, taken a family road trip to the Grand Canyon, and dreams of flying to Disneyland Paris, preferring trips that blend adventure with the comfort of familiar
    routines, and they love packing their favorite stuffed animal for every journey.
  culinary: Gregg Dobbs prefers cheesy mac and cheese, enjoys peanut butter and jelly sandwiches, and loves occasional bites of sushi rolls with cooked fish, proudly spreading peanut butter on toast all
    by themselves, and they sometimes sneak a cookie before dinner.
  core: Gregg Dobbs is a curious, organized five‑year‑old who bursts with energy, loves sharing ideas, and can’t resist a sweet treat before bedtime, and they often ask "why" about everything they see.
background:
  cultural: Gregg was raised in Crow Agency, Montana, a rural community on the Crow Nation reservation. While his family identifies as White and lives a traditional Montanan farming lifestyle—attending
    church, participating in county fairs, and enjoying outdoor ranch work—he is also regularly exposed to Native American cultural events such as powwows, tribal storytelling, and local museum visits.
    This blend of White rural customs and the vibrant Crow cultural environment shapes his appreciation for art, nature, and community shared celebrations.
attributes:
  skills: '[''reading simple storybooks'', ''counting to 20'', ''drawing and coloring'', ''building with LEGO and wooden blocks'', ''using educational tablet apps'', ''organizing toys'', ''cooperating in
    group games'']'
  hobbies: '[''drawing and sketching nature'', ''collecting rocks and fossils'', ''reading picture books'', ''playing tag and hide‑and‑seek'', ''building forts with blocks'', ''exploring nature trails'',
    ''attending community art workshops'']'
  career_goals: Gregg dreams of becoming an artist who can capture the wide Montana skies on canvas, and he also imagines exploring the natural world as a wildlife photographer or park ranger. He is fascinated
    by space and sometimes talks about being an astronaut, reflecting his curiosity about new ideas. He aspires to keep learning, stay organized, and help his friends solve problems as he grows older.
