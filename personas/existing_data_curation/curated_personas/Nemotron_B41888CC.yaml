  hobbies: '[''Historical reading'', ''Acoustic guitar'', ''Cooking Mexican cuisine'', ''Vegetable gardening'', ''Woodworking'', ''Puzzle solving'', ''Crossword puzzles'', ''Hiking'']'
  career_goals: Over the next five years, Luis aspires to transition into a leadership role within his clinic, aiming to become a Clinical Operations Manager or Director of Primary Care Services. He plans
    to obtain a Master's in Healthcare Administration to strengthen his administrative expertise and to gain certification as a Certified Physician Assistant (PA‑CS) in primary care. He is motivated to
    develop and lead community outreach programs targeting diabetes prevention and hypertension control among the Mexican‑American population in Hidalgo County, establishing measurable improvements in health
    outcomes. Luis also seeks to mentor junior physician assistants, fostering a culture of precision and accountability.
