persona_description: A seismologist from the University of California, Berkeley who specializes in the study of earthquakes and their causes. The seismologist has conducted research on the collapse of a
  mine in southern Utah and has published a study confirming that the shaking was not caused by an earthquake, but more likely by the collapse itself. The seismologist has also established criteria to distinguish
  between different types of seismic events, including underground explosions and crack collapses.
