  hobbies: '[''Participating in local car meetups'', ''Playing pickup basketball'', ''Acoustic guitar jam sessions'', ''Exploring Brooklyn’s food scene'', ''Cooking weekend brunches for friends'', ''Volunteering
    at community bike‑repair workshops'', ''Urban hiking and street‑art discovery'', ''Attending live music gigs'']'
  career_goals: Matthew aims to become an ASE‑master technician within the next three years, earning certifications across all major automotive systems and specializing in electric‑vehicle service. He plans
    to complete his associate degree in automotive technology, then move into a supervisory role at his current shop. Long‑term, he envisions opening his own community‑focused garage that offers affordable
    repairs, mentorship for apprentices, and regular car‑care workshops, combining his love for structure with a flexible, collaborative environment. He also wants to stay ahead of emerging automotive technologies
    by pursuing advanced driver‑assistance system certifications.
