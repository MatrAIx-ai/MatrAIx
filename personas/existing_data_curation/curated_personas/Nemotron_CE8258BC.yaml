personas:
  professional: A seasoned installation and maintenance technician, Dora Saffold applies three decades of hands‑on expertise in electrical, HVAC, and plumbing systems, delivering meticulous, code‑compliant
    service with a preference for structured processes, and they passionately mentor apprentices while maintaining clear, courteous communication.
  sports: An avid walker, Dora Saffold joins the Tombigbee River Walkers club for weekly strolls along the river, cheers on the Columbus Blue Jackets and the Columbus Crew, and they occasionally attend
    Columbus Clippers baseball games, balancing low‑impact exercise with community spirit.
  arts: An enthusiastic member of her church’s gospel choir, Dora Saffold finds solace in singing classics by Mahalia Jackson and Mavis Staples, while dancing to blues legends like Etta James and soul icons
    such as Aretha Franklin, and they occasionally attend performances at the local theater to deepen their appreciation for live storytelling.
  travel: Preferring well‑planned itineraries, Dora Saffold enjoys short road trips to nearby gems such as Savannah, the Great Smoky Mountains, and the historic streets of New Orleans, while dreaming of
    a soulful pilgrimage to Memphis’s blues museums and a relaxing Caribbean cruise that fits within her modest travel budget.
  culinary: A seasoned home cook, Dora Saffold delights in turning garden‑grown collard greens and sweet potatoes into soul‑satisfying dishes like collard‑green braise, sweet‑potato casserole, and peach
    cobbler, while they also master classic Southern comforts such as fried catfish, cornbread, and chicken‑and‑dumplings for family potlucks.
  core: Dora Saffold fuses disciplined, detail‑oriented craftsmanship with a lively gospel‑sung community life, juggling careful budgeting and Southern cooking while occasional anxiety sparks impulsive
    bingo splurges and missed med refills.
background:
  cultural: Dora’s cultural identity is rooted in the African‑American traditions of the Deep South. Growing up in Lowndes County, she was shaped by the close‑knit church community, the legacy of the civil‑rights
    movement, and a family emphasis on oral storytelling and soulful music. Food, faith, and family gatherings—especially holidays centered on dishes like fried catfish, cornbread, and sweet tea—play a
    central role in her life. She values the resilience and communal support that have defined the black community in Columbus, often volunteering at church events and local festivals that celebrate black
    heritage, such as Juneteenth parades and gospel music festivals.
attributes:
  skills: '[''Electrical wiring'', ''HVAC installation and maintenance'', ''Basic plumbing repairs'', ''Preventive maintenance'', ''Equipment troubleshooting'', ''Blueprint and schematic reading'', ''Safety
