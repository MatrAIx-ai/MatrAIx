  hobbies: '[''Gospel choir'', ''Community gardening'', ''Bingo nights'', ''Cooking Southern cuisine'', ''Walking with friends'', ''DIY home improvement projects'', ''Attending blues concerts'', ''Gratitude
    journaling'', ''Support group participation'']'
  career_goals: Looking ahead, Dora aims to earn a Journeyman Electrician certification and obtain an EPA‑approved certification for refrigerant handling within the next two years, positioning herself for
    a senior technician or foreperson role at her current firm. She hopes to mentor more young women and African‑American trainees, potentially establishing a small community‑focused repair service that
    offers affordable upkeep for seniors in Columbus. In parallel, she is planning a phased transition toward semi‑retirement, ensuring a stable pension and exploring opportunities to teach basic home‑repair
    workshops at the local community center.
