personas:
  professional: Blake Moreno, a budding game designer, channels their curiosity and practical mindset into creating Scratch video games while they reliably meet school project deadlines, balancing inventive
    ideas with the step‑by‑step logic that keeps peers on track.
  sports: Blake Moreno, a member of the Lindsay Community Soccer Club and the local Little League baseball team, spends weekends sprinting across the field, while they idolize the Los Angeles Dodgers and
    the Sacramento Kings and they dream of one day hitting a home run at the historic Dodger Stadium.
  arts: 'Blake Moreno, an avid fan of the animated series Avatar: The Last Airbender and the music of Billie Eilish, channels that creative spark into building detailed LEGO dioramas of movie scenes and
    designing Scratch game characters inspired by the adventures of Harry Potter, and they often share these creations with friends at school.'
  travel: Blake Moreno loves spontaneous road trips with family, having camped beside Lake Tahoe’s crystal‑clear waters, explored the towering sequoias of Yosemite National Park, and now dreams of snorkeling
    in the Great Barrier Reef after watching a marine documentary, and they often pick out travel books to plan their next adventure.
  culinary: Blake Moreno enjoys making quick kitchen creations like cheesy quesadillas with cheddar and salsa, mastering the art of perfectly grilled cheese while still craving pepperoni pizza and a side
    of chocolate chip pancakes on weekend brunches, and they proudly serve their siblings whenever they can.
  core: Blake Moreno is a perpetually energetic ten‑year‑old who balances a love for building intricate LEGO sets with a habit of misplacing the tiniest pieces, and they turn every backyard adventure into
    a science‑fiction saga.
background:
  cultural: Raised in the small town of Lindsay, Texas, Blake’s upbringing reflects a close‑knit rural community with strong family ties, church involvement, and a love for local traditions such as county
