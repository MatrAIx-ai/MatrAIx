    finance management'']'
  career_goals: Ana aspires to transition into a leadership role within the Osceola County School District, aiming to become a curriculum coordinator where she can champion the integration of entrepreneurship
    and financial literacy across elementary and middle school programs. She plans to enroll in a master's program in Educational Leadership to deepen her expertise in instructional design and school administration.
    Ana also envisions establishing an after-school enrichment program focused on bilingual STEM and business skills for Latinx youth, leveraging community partnerships and grant funding. Long-term, she
    hopes to influence district policy to expand bilingual education and to serve as a mentor for teachers navigating multicultural classrooms. Balancing professional growth with personal stability, she
    seeks to achieve a sustainable work-life balance that supports her independent household.
