persona_description: A forest health monitoring expert who is interested in the analysis and interpretation of forest health data. They are likely to be a scientist or researcher working in the field of
  forestry or environmental science, and have expertise in using Forest Inventory and Analysis phase 3 data to analyze forest communities and tree mortality. They are also familiar with landscape context
  and environmental factors that influence forest health and are interested in exploring the potential for monitoring changes in these factors. They may have experience using spatial modeling and microscale
  data to analyze forest health and may be interested in the application of these techniques to monitoring and managing forest ecosystems.
