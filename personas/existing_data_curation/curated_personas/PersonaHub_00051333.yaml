persona_description: A neurobiologist who specializes in the study of the vestibular organ (VO) in the inner ear, particularly its role in maintaining balance and posture. Their research interests include
  the mechanisms by which the VO adapts to changes in the head position and movement, and the neural and muscle activity required for locomotion. They are known for their collaboration with Dr. John Simmers
  at the CNRS at the University of Bordeaux and their findings on the adaptive alteration of the sensitivity of the hair cells in the VO. Their work has been published in the online journal "Nature Communications".
