  hobbies: '[''Gardening (vegetable and herb beds)'', ''Reading historical fiction'', ''Bird watching at Onondaga Lake'', ''Hiking local trails'', ''Knitting scarves and blankets'', ''DIY home‑repair projects'',
    ''Volunteering at community food pantry'', ''Small‑group book club'']'
  career_goals: Mary Ann aims to advance from a front‑line mover to a supervisory role within the next two to three years. She plans to complete a certified logistics coordinator program at a community
    college and earn a certified forklift trainer credential, allowing her to lead a small team of material handlers. She hopes to combine her practical expertise with formal training to improve warehouse
    efficiency, ultimately positioning herself for a warehouse supervisor or operations coordinator position. Balancing ambition with family life, she also wants to secure a stable income that supports
    her children's college plans and her husband's retirement savings.
