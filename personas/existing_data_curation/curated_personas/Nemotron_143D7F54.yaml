  hobbies: '[''Abstract Painting'', ''Reading Philosophy'', ''Digital Photography'', ''Gardening'', ''Listening to Jazz'', ''Playing Harmonica'', ''Community Arts Volunteering'', ''Book Club Participation'']'
  career_goals: Although retired from formal employment, Tommy aims to channel his curiosity and imagination into legacy‑building projects. He plans to author a memoir that weaves together personal history,
    local folklore, and reflections on abstract art, and to curate a traveling exhibition of works created by senior artists in Jonesboro. He also hopes to mentor young volunteers at the local historical
    society, sharing his research methods and artistic techniques. In the next five years, Tommy aspires to complete a series of community‑center workshops on creative photography, help preserve historic
    homes through guided tours, and perhaps enroll in a university‑offered art‑history course to deepen his understanding of modernist movements.
