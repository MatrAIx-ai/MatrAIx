personas:
  professional: Kavan Mays is a budding technologist who merges a love for LEGO engineering with Scratch programming, using their curiosity and practical mindset to prototype playful robots while embracing
    a relaxed, sometimes disorganized, approach to project planning.
  sports: Kavan Mays plays midfield for the Mount Vernon Youth Soccer Club's Trailblazers team, cheers for the Washington Capitals and Washington Commanders, and maintains a modest home workout routine
    that includes parkour moves inspired by online videos.
  arts: Kavan Mays immerses themselves in the worlds of J.K. Rowling and Rick Riordan, draws comic strips inspired by classic superhero artist Stan Lee, and unwinds with the music of Imagine Dragons and
    the orchestral scores from the Harry Potter movies, which shape their creative play.
  travel: Kavan Mays loves weekend trips to Shenandoah National Park for rock‑collecting hikes, dreams of exploring Dinosaur National Monument in Colorado, and prefers spontaneous, family‑driven itineraries
    over strict schedules, balancing a love of nature with the excitement of discovering new Minecraft‑inspired landscapes.
  culinary: Kavan Mays enjoys building homemade pizza with a thick crust topped with mozzarella, pepperoni, and fresh basil, shows modest cooking chops by whisking batter for blueberry pancakes, and frequently
    snacks on trail mix containing almonds, raisins, and chocolate chips during outdoor explorations.
  core: Kavan Mays is a curious, laid‑back ten‑year‑old who transforms forest finds into LEGO inventions, sometimes misplaces schoolwork amid a scramble of creative projects, yet remains remarkably calm
    and resilient.
background:
  cultural: Kavan grew up in Mount Vernon, a small Midwestern town in Morrow County, Ohio, within a middle‑class white family that values practicality, self‑reliance, and community involvement. Local traditions
    such as the county fair, high‑school football games, and church gatherings have shaped his worldview. The area’s agricultural heritage and emphasis on hands‑on learning foster his interest in building,
    repairing, and exploring the outdoors. While he enjoys mainstream American pop culture through school and media, he also embodies the modest, down‑to‑earth values characteristic of the Midwest.
attributes:
  skills: '[''Problem solving'', ''Basic programming (Scratch)'', ''LEGO robotics'', ''Mechanical repair (bicycles)'', ''Strategic board games (chess)'', ''Mental math'', ''Clear writing'']'
