  career_goals: Kavan dreams of becoming a robotics engineer or an astronaut, merging his love for building functional machines with his curiosity about space and technology. He aims to design autonomous
    tools that could assist in agriculture or exploration missions. In the near term, he wants to win his school’s science fair, earn a spot on the regional robotics competition team, and eventually contribute
    his practical skills to community service, perhaps as a future emergency responder.
