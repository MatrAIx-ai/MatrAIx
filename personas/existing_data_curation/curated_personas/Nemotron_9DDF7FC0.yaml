  career_goals: Even though she is retired, Alfreeda aims to leave a lasting imprint on her community. She plans to record oral histories of longtime residents in Upper Marlboro to preserve African‑American
    heritage, create a mentorship network that pairs retired educators with middle‑school students in Prince George's County, and establish a modest scholarship for high‑school seniors pursuing visual arts.
    She also hopes to complete a memoir that blends personal reflections with broader cultural narratives, and to serve on the local historical society’s advisory board, offering her perspective on inclusive
    cultural programming.
