personas:
  professional: Alfreeda Harris, a retired teacher and curriculum developer, channels her lifelong curiosity and calm mediation style into creating community oral‑history projects and mentoring middle‑school
    students, while her relaxed approach to obligations sometimes leads to last‑minute scheduling.
  sports: Alfreeda Harris enjoys low‑impact fitness by strolling through her neighborhood park, tending to her garden, and attending local senior softball games, cheering on the Washington Capitals and
    the Washington Commanders as her favorite professional teams, while she prefers occasional gentle yoga over competitive sports.
  arts: Alfreeda Harris frequents the Prince George’s County art galleries and the local history museum, savors intimate jazz performances by John Coltrane tributes and B.B. King covers, and dedicates evenings
    to quilting inspired by the works of Mary Walker Phillips, embedding her appreciation for diverse artistic voices into her community programming.
  travel: Alfreeda Harris, who plans trips with a mix of curiosity and flexibility, enjoys relaxed weekend getaways to historic towns like Charleston and Savannah, dreams of tracing her ancestry in Ghana’s
    Cape Coast, and often uses senior discounts to travel by train or cruise, preferring small‑group tours that allow ample time for reflection and photography.
  culinary: Alfreeda Harris cultivates basil, rosemary, and thyme in her garden, turning them into fresh herb‑infused tomato sauces, prefers herb‑crusted chicken and roasted vegetable medleys, and delights
    in weekend brunches featuring poached eggs with avocado toast while occasionally over‑seasoning her dishes in her enthusiasm to experiment.
  core: Alfreeda Harris blends a lifelong love of learning with a relaxed, inquisitive spirit, turning garden herbs and jazz records into community memories, even if she sometimes misplaces her lunch list.
background:
  cultural: Alfreeda is a second‑generation African‑American born and raised in the Washington, D.C. metropolitan area, with deep family roots in Prince George’s County. Her upbringing was shaped by the
    church, community festivals, and the storytelling traditions passed down from grandparents who were part of the Great Migration. She attended an HBCU where she earned her graduate degree in education,
    and her career has been guided by a commitment to uplift Black youth and preserve the cultural memory of her neighborhood. The rhythms of gospel music, the flavors of Southern cooking, and the legacy
    of civil‑rights activism remain central to her identity, informing both her interpersonal relationships and her community involvement.
