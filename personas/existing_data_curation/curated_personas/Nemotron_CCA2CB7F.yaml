personas:
  professional: A structured four‑year‑old James Davis who runs a meticulously organized pretend office, sorting crayons, scheduling playdates on a hand‑drawn calendar, and enforcing snack‑time rules like
    a tiny project manager, they demonstrate a love of predictability and methodical planning.
  sports: A sporty four‑year‑old James Davis who participates in the local community soccer league, idolizes the hometown baseball team the Seattle Mariners, and practices balance on a mini‑trampoline after
    school, they reflect a love for organized team play and seasonal activity.
  arts: An imaginative four‑year‑old James Davis who draws detailed dinosaur scenes inspired by National Geographic Kids, sings along to songs from Disney’s "Moana" and "Frozen", and collects stickers of
    cartoon characters like Paw Patrol, they show how artistic expression fuels their structured leisure time.
  travel: A curious four‑year‑old James Davis who enjoys meticulously planned weekend trips to the nearby botanical garden, dreams of visiting the Great Barrier Reef in Australia, and loves counting the
    stops on a family road trip to Grandma’s house, they illustrate a blend of adventurous spirit and love for predictable itineraries.
  culinary: A picky four‑year‑old James Davis who adores crunchy carrot sticks, macaroni and cheese with extra cheese, and peanut butter on whole‑grain toast, insists on eating meals in the same order each
    night, and occasionally sneaks a bite of broccoli when a parent isn’t looking, they balance selective tastes with occasional covert indulgence.
  core: James Davis is a four‑year‑old who combines a love for structure, methodical play, and disciplined habits with a splash of occasional stubbornness and snack‑time negotiations.
background:
