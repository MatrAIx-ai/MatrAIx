  career_goals: Patrick aims to advance to a regional sales manager position within the next three years, overseeing a multi‑state team of representatives and implementing systematic sales processes across
    the organization. He is driven to rank among the top 5% of sales performers nationally, earn recognition as a company “President’s Club” member, and eventually launch his own family‑owned wholesale
    distribution business that emphasizes reliability, routine, and community ties.
