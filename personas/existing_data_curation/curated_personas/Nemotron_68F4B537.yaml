personas:
  professional: Eartha Womack, a 73‑year‑old retired community elder, leverages her sharp organizational skills, basic digital fluency, and competitive spirit to orchestrate church‑based cultural celebrations,
    mentor high‑school students in genealogy, and draft grant proposals that keep local programs thriving, and they approach each task with a balanced blend of practicality and curiosity.
  sports: Eartha Womack is an avid supporter of the Dallas Cowboys and the Amarillo Sod Poodles, joins weekly low‑impact walking groups at the community garden, competes spiritedly in senior bingo and bridge
    tournaments, and they occasionally challenge friends to step‑count contests, showcasing their competitive nature.
  arts: Eartha Womack sings gospel with the church choir, often interpreting Mahalia Jackson and Ella Fitzgerald classics, while they piece quilts inspired by the blues rhythms of Nina Simone, and regularly
    visit the Amarillo Museum of Art to view works by regional painters like Jim Richardson.
  travel: Eartha Womack enjoys seasonal road trips to family reunions in New Orleans, Savannah, and Washington, DC, plans weekend getaways to the Texas Hill Country and historic civil‑rights landmarks,
    favoring budget‑friendly lodging and detailed itinerary maps, and they revel in the balance of adventure and familial connection.
  culinary: Eartha Womack’s kitchen is a hub of Southern soul food where collard greens, fried chicken, cornbread, and sweet‑potato pie simmer alongside fresh basil and thyme from her herb garden, and they
    sometimes over‑salt dishes in their quest for the perfect bite, yet they always serve with generous hospitality.
  core: Eartha Womack is a lively 73‑year‑old community storyteller whose competitive edge, skeptical optimism, and love of gospel, quilting, and home gardening shape a richly woven tapestry of service
    and tradition, and they delight in sharing anecdotes at every gathering.
background:
  cultural: Eartha Joyce Womack’s cultural identity is rooted in her African American heritage, shaped by growing up in the Jim Crow South and later making her home in Amarillo, Texas. She was raised with
    the traditions of Southern soul food, gospel music, and a strong church community that continues to be a cornerstone of her life. Her family’s oral history emphasizes resilience, storytelling, and the
    importance of communal support, values she carries into her volunteer work. Eartha actively participates in local Juneteenth celebrations and Black History Month events, helping to educate younger generations
    about the civil rights movement and Black contributions to Texan culture. Her experiences as a Black woman inform her cautious optimism, competitive spirit, and deep commitment to preserving cultural
    legacy.
attributes:
  skills: '[''event planning'', ''community volunteer coordination'', ''basic computer literacy'', ''Southern cuisine cooking'', ''quilting and textile crafts'', ''tutoring and mentorship'', ''budgeting
    and grant writing'', ''conflict mediation'']'
  hobbies: '[''church choir singing'', ''knitting and quilting'', ''gardening'', ''bridge club'', ''bingo nights'', ''reading historical fiction'', ''family reunions'', ''visiting museums'']'
  career_goals: Although retired from formal employment, Eartha aims to deepen her impact as a community elder. She aspires to develop a mentorship program that pairs senior volunteers with local high school
    students interested in genealogy and oral history, preserving Black Texan narratives. She also hopes to earn a community service award and obtain a certification in senior health advocacy to better
    support aging neighbors. Another ambition is to author a family cookbook that blends treasured recipes with stories from her upbringing, thereby creating a tangible legacy for future generations. Eartha
    remains eager to attend workshops on digital storytelling to broaden her ability to share cultural histories online.
