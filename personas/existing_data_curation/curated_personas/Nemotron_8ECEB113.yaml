  hobbies: '[''Cooking Mexican cuisine'', ''Folklorico dancing'', ''Hiking'', ''Gardening'', ''Reading historical fiction'', ''Yoga and meditation'', ''Volunteering at community center'', ''Knitting'',
    ''Collecting Mexican pottery'', ''Attending cultural festivals'']'
  career_goals: Noemi aims to move into a district‑wide instructional leadership role where she can shape financial literacy standards for all elementary and middle schools in Tulare County. She envisions
    becoming a curriculum specialist or instructional coach, mentoring new teachers, and designing professional development that blends business concepts with pedagogy. Long‑term, she hopes to launch a
    community‑based after‑school program that offers entrepreneurship and budgeting workshops for students and families, positioning herself as a bridge between the school system and local small‑business
    owners. Personally, she seeks greater work–life balance to reduce stress, planning to achieve certifications in mindfulness education to support both her own well‑being and that of her students.
