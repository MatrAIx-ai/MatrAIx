  career_goals: Rohan aims to leverage his extensive experience into a leadership role within oral health, such as becoming a Clinical Director or an Oral Health Program Coordinator for a regional health
    system. He aspires to develop a sustainable community outreach program that targets underserved neighborhoods in Fulton County, and he is considering pursuing a master’s degree in public health to broaden
    his impact. Additionally, he hopes to become a certified dental hygiene educator, mentoring the next generation of hygienists while integrating evidence‑based practices into everyday patient care.
