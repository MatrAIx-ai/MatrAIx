personas:
  professional: Rohan Merrick, a seasoned dental hygienist with a STEM bachelor’s degree, blends 25 years of preventive and periodontal expertise, digital charting mastery, and a data‑driven mindset to
    elevate practice efficiency and patient education, while their meticulous organization and compassionate communication propel them toward a Clinical Director role that integrates community outreach
    and public‑health leadership.
  sports: Rohan Merrick enjoys weekend fishing trips on Lake Lanier, follows the Atlanta Braves in spring, cheers for the Atlanta Falcons during football season, and participates in a local recreational
    softball league as an outfielder, balancing the excitement of live games with low‑impact outdoor activity.
  arts: Rohan Merrick finds solace in jazz legends like Miles Davis and John Coltrane and lifts their spirit with gospel powerhouses such as Mahalia Jackson and The Clark Sisters, often playing these records
    while woodworking, fostering a rhythmic backdrop that fuels both creativity and relaxation.
  travel: Rohan Merrick plans trips that intertwine heritage and history, having visited the National Civil Rights Museum in Memphis, the historic Selma voting sites, and the Freedom Trail in Boston, while
    also enjoying leisurely stays in Savannah’s historic district and the Great Smoky Mountains, always booking early‑bird deals to stretch a modest travel budget.
  culinary: Rohan Merrick delights in cooking Southern‑style fare like crispy fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler, often incorporating fresh tomatoes,
    okra, and sweet corn from their garden and seasoning with smoked paprika and hot sauce to achieve authentic flavor.
  core: Rohan Merrick harnesses razor‑sharp organization and a data‑centric outlook to champion community oral health, yet their worry‑prone nature sometimes leads to late‑night budgeting checks and occasional
    impulse purchases of garden gadgets.
background:
  cultural: Rohan is an African American who grew up in the Atlanta metropolitan area during the 1970s and 80s, a period marked by strong community ties, church involvement, and a deep appreciation for
    Southern culture. His family’s heritage traces back to the Great Migration, embedding a legacy of resilience, education, and collective responsibility. These influences shape his values of service,
    harmony, and perseverance. In Roswell, he navigates a diverse suburban environment while maintaining connections to his cultural roots through church fellowship, family traditions, and participation
    in local cultural festivals. His background informs his commitment to improving oral health equity within Black communities and his dedication to mentoring youth who aspire to professional careers.
