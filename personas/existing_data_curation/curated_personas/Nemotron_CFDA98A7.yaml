personas:
  professional: Melissa Witter is a mid‑career construction supervisor who blends a business degree with hands‑on site expertise, using emerging tools like BIM and modular construction to boost efficiency
    while staying grounded in safety compliance, and they channel their competitive streak into driving crews to meet tight deadlines despite a naturally relaxed, flexible approach that sometimes leads
    to spontaneous schedule changes.
  sports: Melissa Witter plays co‑ed softball for the Lincoln Lancers, hikes the scenic Niobrara River trails each summer, and roots for the Nebraska Cornhuskers football team and the Omaha Storm Chasers
    baseball club, balancing a competitive edge on the field with a relaxed, social approach to fitness that includes occasional missed gym days due to their flexible schedule.
  arts: Melissa Witter unwinds by sketching rustic landscapes after work, devours historical fiction by Hilary Mantel and business biographies by Walter Isaacson while cranking up classic rock legends like
    Led Zeppelin, and attends the yearly Omaha Film Festival and local county fairs, blending a competitive curiosity for new ideas with a pragmatic love for familiar cultural comforts.
  travel: Melissa Witter prefers road‑trip adventures that mix work site scouting with leisure, having driven to Yellowstone for a weekend hike, explored Santa Fe’s adobe architecture, and planning a future
    trip to Iceland’s geothermal districts to study sustainable building, all while maintaining a flexible itinerary that leaves room for spontaneous detours and occasional last‑minute cancellations.
  culinary: Melissa Witter’s culinary experiments feature herb‑crusted chicken with rosemary and thyme, heirloom tomato gazpacho souped with fresh basil, and corn succotash spiked with jalapeño, all prepared
    while classic rock playlists from Fleetwood Mac play in the background, reflecting their hands‑on, trial‑and‑error cooking style and love for bold, garden‑fresh flavors.
  core: Melissa Witter is a curiosity‑driven yet practical construction leader who balances competitive drive with a love for DIY projects, gardening, classic rock, and a habit of flexible, sometimes disorganized,
    planning.
background:
  cultural: Melissa was raised in a small town in eastern Nebraska within a white, Midwestern family with deep agricultural roots. Her upbringing emphasized hard work, self‑reliance, and community service,
    values that continue to shape her professional ethic. She grew up attending Lutheran church services and family gatherings centered around potluck meals and county fairs. The region's open landscapes
    and distinct seasons fostered her love for outdoor activities and a practical, down‑to‑earth outlook.
attributes:
  skills: '[''Construction site supervision'', ''Safety compliance management'', ''Budgeting and cost control'', ''Team leadership and staff development'', ''Project scheduling and resource allocation'',
