    equipment operation'', ''Implementation of new construction technologies (e.g., BIM)'', ''Conflict resolution'', ''Business analytics and performance tracking'']'
  hobbies: '[''DIY home improvement projects'', ''Gardening'', ''Hiking'', ''Softball league'', ''Reading historical fiction and business biographies'', ''Volunteering with Habitat for Humanity'', ''Attending
    county fairs'', ''Cooking new recipes'', ''Listening to classic rock'', ''Quiet evenings of reading and sketching'']'
  career_goals: Melissa aims to advance to a senior regional construction manager role, overseeing multi‑million‑dollar projects across Nebraska and neighboring states. She plans to earn a PMP certification
    and become a licensed construction manager, focusing on safety culture and the integration of sustainable building technologies. Long‑term, she envisions launching her own consulting firm that helps
    contractors improve efficiency, safety, and environmental performance, while also mentoring women and other underrepresented groups in the trades.
