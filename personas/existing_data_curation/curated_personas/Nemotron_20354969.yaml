  hobbies: '[''soccer'', ''cooking Mexican cuisine'', ''listening to regional Mexican music'', ''volunteering at food pantry'', ''gym weight training'', ''DIY car repairs'', ''watching soccer and NFL games'',
    ''reading self‑help books on anxiety'', ''video gaming with friends'']'
  career_goals: Juancarlos aims to earn his GED within the next year and obtain formal certification as a forklift operator and OSHA‑approved safety coordinator. He plans to enroll in community‑college
    courses in logistics and business administration to qualify for a warehouse supervisor position. Long‑term, he envisions moving into a managerial role where he can improve workplace safety and mentor
    newer workers, especially those from immigrant backgrounds. He is also passionate about using his compassionate nature to develop a peer‑support program for coworkers dealing with anxiety and mental‑health
    challenges, eventually expanding that effort into a broader community outreach initiative for Latinx laborers in Kern County.
