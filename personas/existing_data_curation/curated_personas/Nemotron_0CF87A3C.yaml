    ''mental‑health podcast listening'']'
  career_goals: Tonya aims to transform her passion for art and her personal experience with anxiety into a career that blends creativity with healing. In the next two years she plans to build a strong
    portfolio, seek mentorship from local artists, and secure a part‑time internship at the nearby library or community center where she can lead small art‑workshop sessions for teens. She intends to enroll
    in a community college art program and eventually pursue a BFA with a concentration in illustration or art therapy. Long‑term, she hopes to work as a freelance illustrator for children’s books that
    celebrate Black culture, or as an art therapist in schools, using visual expression to help other young people manage emotional challenges.
