personas:
  professional: Tonya Macedon, a 17‑year‑old emerging visual artist, blends watercolor, mixed media, and digital illustration to craft emotionally resonant pieces, leveraging her meticulous organization
    and intense empathy to design teen‑focused art‑therapy workshops while navigating her own anxiety‑driven creative bursts.
  sports: Tonya Macedon favors low‑impact fitness, incorporating daily walks along the Scioto Trail and weekend yoga classes, while cheering on the Columbus Blue Jackets and occasionally joining a local
    running club that meets at the Ohio State campus for a casual 5K.
  arts: Tonya Macedon draws artistic inspiration from the soulful melodies of Erykah Badu and the improvisational brilliance of Miles Davis, reveres the bold narratives of Kehinde Wiley, and spends evenings
    sketching in the style of Frida Kahlo while curating a digital gallery of her watercolor and mixed‑media pieces on Instagram.
  travel: Tonya Macedon, with a shoestring budget, dreams of visiting New Orleans for its vibrant jazz festivals, exploring the historic streets of Savannah, and taking a weekend road‑trip to Hocking Hills
    State Park to photograph autumn foliage, all while balancing school obligations and her part‑time job.
  culinary: Tonya Macedon enjoys crafting simple yet comforting meals like avocado toast topped with feta, whipping up quick ramen bowls spiced with sriracha, and indulging in homemade blueberry muffins,
    though her cooking skill hovers at the 'college‑freshman' level, often relying on YouTube tutorials for guidance.
  core: Tonya Macedon is a creatively intense teen who channels anxiety into art, balances meticulous planning with spontaneous sketching, and occasionally splurges on supplies while neglecting physical
    health appointments.
background:
  cultural: Tonya is an African‑American teenager raised in Powell, Ohio, a largely suburban community. Her family maintains strong ties to Black cultural traditions, including church‑based gospel music,
    storytelling, and celebrations of holidays such as Juneteenth and Kwanzaa. She grew up hearing the histories of the civil‑rights movement from elders, which fuels her interest in representing Black
    experiences through art. While navigating a predominantly white school environment, Tonya draws on her cultural heritage for creative inspiration and often blends contemporary Black aesthetics with
    the Midwestern landscapes she encounters locally. Her identity shapes both her artistic voice and her commitment to fostering inclusive spaces for other young Black creators.
