personas:
  professional: Ebony Hayes, a retired elementary literacy teacher turned community mentor, blends three decades of structured lesson‑planning, budget management, and compassionate counseling to lead a
    neighborhood tutoring collective, oversee a senior garden, and mentor novice teachers through a local education foundation, all while maintaining a methodical, organized approach that satisfies their
    preference for predictability.
  sports: Ebony Hayes enjoys gentle low‑impact activity, favoring morning walks through the countryside for birdwatching, occasionally volunteering as a scorekeeper for the local senior softball league,
    and cheering on the nearby Asheville Tourists minor‑league baseball team from the bleachers whenever the weather permits.
  arts: Ebony Hayes finds solace in gospel hymns and classic soul records—listening to Mahalia Jackson, Ray Charles, and Aretha Franklin while knitting—and regularly attends performances by the community
    theater troupe’s rendition of "A Raisin in the Sun," though they rarely showcase their own artistic creations beyond quilts and scarves.
  travel: Ebony Hayes prefers short, purposeful trips, often taking weekend drives to the Blue Ridge Mountains for berry picking and birdwatching, and harbors a modest wish to visit historic Charleston,
    South Carolina, to explore its preserved colonial gardens, but they rarely travel farther due to budget constraints and a desire for familiar, quiet settings.
  culinary: Ebony Hayes delights in preserving family recipes, frequently canning collard greens, pickled okra, and homemade peach jam using heirloom varieties, and their cooking skill sits at a confident
    intermediate level—able to craft a perfect quiche crust but prone to over‑salting soups when stressed.
  core: Ebony Hayes is a meticulous, solitary elder who channels a lifelong love of teaching and gardening into community service, balances careful financial stewardship with gentle self‑care, yet sometimes
    lets worry linger and indulges in nostalgic music while lovingly preserving their family's culinary heritage.
background:
  cultural: Ebony grew up in a tight‑knit African‑American community in rural Virginia during the era of segregation, attending a historically Black high school before earning her bachelor's in education
    at Virginia State University. The church has been a central pillar of her life, shaping her values of resilience, community service, and collective memory. Family storytelling, holiday cook‑outs, and
    the tradition of quilting passed down from her great‑grandmother are integral to her identity. She participates in local Juneteenth celebrations and helps preserve the oral histories of older Black
    residents in Cumberland County, bridging past and present for future generations.
attributes:
  skills: '["Lesson planning", "Classroom management", "Curriculum development", "Literacy tutoring", "Community outreach coordination", "Budget management", "Gardening and horticulture", "Food preservation
