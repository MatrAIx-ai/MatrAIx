  hobbies: '["Gardening", "Knitting and quilting", "Reading historical fiction and biographies", "Genealogy research", "Crossword puzzles", "Listening to gospel and soul music", "Food preservation (canning)",
    "Birdwatching", "Nature walks", "Journaling", "Attending prayer group"]'
  career_goals: Ebony aims to stay engaged by mentoring new teachers through a local education foundation, documenting oral histories of older Black residents in Cumberland County, and expanding her community
    garden to provide fresh produce for a senior pantry. She hopes to complete a senior certificate in digital storytelling to create a memoir and a family cookbook, preserving culinary and cultural traditions.
    Additionally, she prioritizes her own well‑being by attending weekly mindfulness sessions and maintaining her health through gentle walking. She aspires to be a respected elder voice in local church
    and town meetings, advocating for senior services and intergenerational programs.
