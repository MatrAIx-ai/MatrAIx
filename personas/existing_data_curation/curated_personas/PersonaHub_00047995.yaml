persona_description: A philosophy professor who specializes in the study of community engagement and digital community design. She is interested in gathering input from citizens who interact with a physical
  system (like a park) every day, and using big data and analytics to inform better decisions. Her research facilitates a dialogue between Confucianism and Western ethics through the study of moral emotions
  such as empathy, honesty, and shame. She is currently working on the Shame Project, which aims to understand people's emotional experiences within cities and inform better-designed spaces that promote
  wellbeing.
