personas:
  professional: An organized, sociable leader of group activities, Joanne Bergeron channels their knack for scheduling and volunteer coordination into a part‑time restaurant host role, blending first‑aid
    basics and customer service to keep the floor running smoothly while eyeing a future in culinary arts and community health care.
  sports: A dedicated fan of high‑school football and a spirited cheerleader, Joanne Bergeron cheers for the local Eastbrook Eagles, follows the professional basketball team the Chicago Bulls, and participates
    in weekly intramural volleyball games at school, balancing competitive spirit with a practical approach to staying active.
  arts: An enthusiastic performer and musician, Joanne Bergeron shines in the school drama club, strums acoustic guitar to the tunes of Ed Sheeran and Taylor Swift, and devotes weekends to attending community
    theater productions starring local actors like Maya Lopez, using the arts as a creative outlet that fuels their sociable energy.
  travel: With a structured yet adventurous travel style, Joanne Bergeron prefers planning weekend road trips to nearby state parks such as Shenandoah for camping, has visited New York City on a school
    field trip, dreams of exploring the vineyards of Napa Valley, and balances limited teen budget with a yearning for new cultural experiences.
  culinary: An experimental home baker, Joanne Bergeron perfects vanilla cupcakes with raspberry buttercream, frequently tries recipes featuring almond flour and cream cheese frosting, shares their treats
    at drama club bake sales, and, while skilled, sometimes burns the edges of a batch when juggling multiple school commitments.
  core: Joanne Bergeron blends a love for organized group activity with a sweet tooth, juggling high school responsibilities, part‑time work, and a passion for baking while occasionally overcommitting and
    forgetting to schedule downtime.
background:
  cultural: Joanne comes from a white Midwestern background typical of Erie County, Ohio. Her family’s heritage includes German, Irish, and English roots, and she was raised in a close‑knit suburban community
    that values hard work, modesty, and community involvement. Local traditions such as county fairs, high‑school football games, church gatherings, and 4‑H club projects have shaped her cultural identity
    and fostered a strong sense of local pride and civic responsibility.
