  career_goals: Joanne aims to obtain her GED within the next year and enroll in a vocational program for culinary arts or hospitality management at the local community college. She hopes to secure a part‑time
    position in a restaurant or hotel to gain practical experience, with a longer‑term goal of becoming a certified nursing assistant or a youth program coordinator, roles that offer stability, a clear
    schedule, and the chance to help others in her community.
