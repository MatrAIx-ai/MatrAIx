  career_goals: As a playful toddler, Kendrick expresses a vivid imagination about future roles that involve helping others and being admired. He often talks about wanting to become a firefighter because
    he loves the bright red trucks he sees on the street and wants to rescue people. He also mentions being a 'helper' like his parents, perhaps caring for a baby doll or a pet, and imagines himself as
    a friendly teacher for younger children. These aspirations reflect his desire for routine‑based, hands‑on work and the chance to be at the center of attention while caring for others.
