  career_goals: Kassandra aims to formalize her expertise by completing a GED and enrolling in a community‑college business program, with the long‑term goal of earning a Certified Business Analysis Professional
    (CBAP) credential. Professionally, she envisions moving from her current analyst position to a senior management role where she can lead cross‑functional teams and shape strategic initiatives for regional
    businesses or local government agencies. Ultimately, she hopes to launch a boutique consulting firm that helps small, family‑owned enterprises along the U.S.–Mexico border improve efficiency and profitability
    while preserving cultural values. Alongside career advancement, she is committed to developing better stress‑management habits so she can maintain her energetic, people‑focused work style.
