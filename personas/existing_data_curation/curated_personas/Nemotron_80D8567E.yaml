  hobbies: '[''Social dancing (cumbia, salsa, merengue)'', ''Neighborhood potlucks and communal cooking sessions'', ''Card games (rummy, bridge, euchre)'', ''Gardening (chilies, herbs, tomatoes)'', ''Following
    Milwaukee Brewers baseball games'', ''Watching documentaries (history, culture)'', ''Restoring and tinkering with a vintage motorcycle'', ''Photography of community events'']'
  career_goals: Even though Daniel is not formally employed, he remains goal‑oriented. He aims to deepen his role as a volunteer coordinator at the local senior center, leading weekly cooking workshops
    that celebrate Mexican cuisine. He hopes to launch a small pop‑up food stall at neighborhood fairs, using it as a platform to share cultural stories and generate modest income for a community garden.
    Improving his digital skills so he can document his family’s history and stay connected with relatives abroad is also a priority. Ultimately, he wants to stay physically active, manage stress through
    his hobbies, and leave a lasting positive impact on the Milwaukee community.
