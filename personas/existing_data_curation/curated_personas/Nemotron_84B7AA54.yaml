  hobbies: '[''Reading home‑organization guides'', ''Yoga'', ''Vegetable gardening'', ''Quilting'', ''Listening to folk music'', ''Community clean‑up volunteering'', ''DIY home‑improvement projects'', ''Attending
    sustainable‑living workshops'']'
  career_goals: She aims to earn a Certified Professional Housekeeper credential within the next year, advance to a crew supervisor position, and eventually launch her own residential cleaning business
    that emphasizes eco‑friendly services for families in Hampden County. Kathleen also hopes to mentor newer workers, develop specialized training programs, and explore opportunities in property management
    to broaden her professional scope.
