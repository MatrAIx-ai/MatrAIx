personas:
  professional: Kathleen Rhodes, a 38‑year‑old residential cleaning specialist with fifteen years of systematic housekeeping experience, combines meticulous eco‑friendly product knowledge, a talent for
    training new staff, and a curiosity for sustainable DIY solutions to pursue Certified Professional Housekeeper certification and a future crew supervisor role, and they plan to leverage these strengths
    to launch an eco‑focused cleaning business.
  sports: Kathleen Rhodes stays active by joining the local summer softball league, cross‑country snowshoeing in winter, cheering for the New England Patriots and Boston Celtics, supplementing fitness with
    weekly yoga classes at a nearby studio, and they balance competitive play with a community‑oriented spirit.
  arts: Kathleen Rhodes expresses creativity through quilting intricate folk‑inspired patchwork blankets, listening to Boston folk artists like Gillian Welch and Celtic fiddlers such as Alec Finn, attending
    community theater performances of classic American plays, and they find these artistic pursuits a soothing counterpoint to a demanding work schedule.
  travel: Kathleen Rhodes prefers low‑key road trips exploring New England’s coastal towns like Portland, Maine, and historic villages in Vermont, while dreaming of sustainable farm tours in Denmark and
    folk festivals in Galway, balancing travel planning with family responsibilities and budget constraints, and they often use these journeys to gather ideas for eco‑friendly practices at home.
  culinary: Kathleen Rhodes enjoys preparing wholesome meals such as roasted root vegetable medleys, quinoa salads with fresh herbs, and classic chicken pot pies flavored with sage, experiments with lavender‑infused
    eco‑cleaning solutions, bakes buttery scones with honey for family gatherings, and they relish sharing these dishes as part of community potluck events.
  core: Kathleen Rhodes is a detail‑oriented cleaner turned eco‑entrepreneur hopeful who balances a love for order with a quiet yearning for creative DIY projects, yet they often wrestle with over‑worry
    and the occasional coffee‑driven jitter.
background:
  cultural: Born and raised in Chicopee, Massachusetts, Kathleen comes from a working‑class New England family with Irish and Polish ancestry. Raised in a Catholic household, she grew up attending parish
    gatherings and community festivals that emphasized hard work, modesty, and mutual support. The legacy of the region’s former textile mills and tight‑knit neighborhoods informs her values of reliability,
    community service, and appreciation for practical skills.
