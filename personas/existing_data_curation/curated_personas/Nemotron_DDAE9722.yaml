  career_goals: Although approaching retirement, Leslie aims to leave a lasting legacy by mentoring younger financial professionals and establishing a senior-focused financial literacy program in Moss Point.
    She aspires to volunteer as a pro bono financial advisor for local nonprofits, write a guidebook on practical retirement planning, and influence local policy to provide better financial resources for
    seniors. Her goals reflect her preference for structure, her desire to contribute to the community, and her outgoing nature, seeking collaborative initiatives that create measurable, lasting impact.
