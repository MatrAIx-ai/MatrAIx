    and Process Innovation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Participating in improv theater workshops'', ''Yoga and beach workouts'', ''Playing in a recreational soccer
    league'', ''Reading contemporary fiction and sci‑fi'', ''Listening to indie tech and science podcasts'', ''Hiking in local nature preserves'', ''Volunteering at community health fairs'', ''Experimenting
    with digital storytelling or photography'']'
  career_goals: Jan aims to become a senior health services manager within the next five years, eventually overseeing a multi‑site clinic network in the Long Island region. She plans to pursue a bachelor's
    degree in health administration followed by a Master’s in Healthcare Leadership, and to earn the Certified Medical Manager (CMM) credential. Leveraging her competitive mindset, she intends to spearhead
    innovative, patient‑centered initiatives such as integrating art‑therapy programs into outpatient care and developing data‑driven strategies that improve operational efficiency and patient satisfaction.
    In the longer term, she envisions launching a community‑focused health startup that offers flexible telehealth services combined with wellness and creative expression resources.
