personas:
  professional: A burgeoning health services manager, Jan Wisdom leverages their competitive drive and curiosity to streamline multi‑site clinic operations with Epic and Athenahealth while they champion
    art‑therapy programs that fuse data‑driven efficiency with creative patient care.
  sports: A beach‑yoga enthusiast and casual soccer midfielder, Jan Wisdom trains at the local sands, supports NYCFC and the Brooklyn Nets, and they frequently join a weekend co‑ed league in Queens to satisfy
    their competitive streak while maintaining a balanced fitness routine.
  arts: An avid watercolor hobbyist, Jan Wisdom spends weekends sketching Long Island shoreline scenes, draws inspiration from Monet and Yayoi Kusama, curates playlists featuring Phoebe Bridgers and Mitski,
    and they regularly attend experimental theater improv workshops at the Bowery Poetry Club.
  travel: Jan Wisdom favors low‑key weekend getaways, having explored Fire Island, Portland’s art districts, and a recent backpacking stint in Lisbon, they plan future trips to Barcelona’s galleries while
    balancing limited student finances and a love for spontaneous road trips.
  culinary: A modest home cook, Jan Wisdom delights in preparing lemon‑garlic shrimp tacos, avocado‑dressed quinoa bowls seasoned with fresh basil and cilantro, and occasionally indulges in New York style
    pizza, while their kitchen staples include seaweed snacks and artisanal cheese.
  core: Jan Wisdom is a curiosity‑driven health‑admin aspiring professional who blends a competitive edge with a laid‑back, art‑infused lifestyle, often juggling spontaneous creativity against a tendency
    toward relaxed planning, and they occasionally wrestle with procrastination when deadlines loom.
background:
  cultural: Jan was raised in a middle‑class, suburban family in Suffolk County. Her heritage is primarily Anglo‑American with roots in the Northeastern United States, and her family traditions include
    typical American holidays such as Thanksgiving and Christmas. Growing up near the Atlantic shoreline, she spent much of her youth at the beach and local community centers, which fostered an appreciation
    for outdoor recreation and community involvement. While her immediate cultural environment is largely mainstream White American, the proximity to New York City and the diverse population of Long Island
    exposed her to a wide range of artistic and cultural experiences, fueling her curiosity and openness to new ideas.
attributes:
  skills: '[''Medical Office Management'', ''Electronic Health Record (EHR) System Administration'', ''Staff Scheduling and Coordination'', ''HIPAA Privacy and Security Compliance'', ''Basic Medical Billing
