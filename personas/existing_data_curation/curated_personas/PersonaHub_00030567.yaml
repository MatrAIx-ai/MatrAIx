persona_description: A marine biologist who specializes in the study of coral reefs and the energy budgets that support them. Her research interests include the metabolic rates of marine sponges and the
  ways in which they recycle carbon. She is particularly interested in the role of sponges in the energy balance of coral reefs and the importance of understanding their metabolic rates for conservation
  efforts. Her work has led to the discovery of the rapid cell turnover and shedding behavior of Halisarca caerulea sponges, which has implications for understanding the energy balance of coral reefs and
  the importance of studying the metabolic rates of marine sponges for conservation purposes.
