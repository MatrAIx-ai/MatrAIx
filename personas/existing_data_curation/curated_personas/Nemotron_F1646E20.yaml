  career_goals: Victoria aims to earn her high school equivalency (GED) within the next year and then enroll in a certified nursing assistant (CNA) program to secure a reliable, structured position at a
    local nursing home. Simultaneously, she plans to launch a modest online boutique on platforms like Etsy, selling handmade bracelets and other crafts she creates in her free time. Her competitive drive
    also motivates her to join a local esports team and eventually stream her gameplay to build a small following. Over the next five years, she envisions a balanced life where a steady healthcare job provides
    financial security while her creative side business and gaming pursuits offer flexibility and personal fulfillment.
