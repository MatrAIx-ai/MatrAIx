  career_goals: Jeffrey aims to complete his bachelor's degree in criminal justice within the next two years, positioning himself for promotion to detective in the Investigative Services Division. Long‑term,
    he aspires to specialize in forensic analysis or become a senior investigative analyst, allowing him to focus primarily on data and evidence rather than frontline patrol. He also seeks a supervisory
    role such as sergeant, where he can lead a team while maintaining a structured work environment. To support these goals, he plans to acquire additional training in cybercrime investigation, advanced
    interview techniques, and stress‑resilience programs, reflecting his desire for predictable career progression and personal growth.
