  career_goals: Carlos aspires to turn his hands‑on abilities into a stable career. He plans to enroll in a community college program for automotive technology or culinary arts, aiming to earn a certificate
    within two years. His ultimate ambition is to launch a small mobile food‑truck business that serves authentic Mexican street food in East Texas, providing affordable meals and creating jobs for other
    local youth. He also hopes to work part‑time as a community outreach aide, using his natural empathy to organize health‑awareness events and mentorship programs for at‑risk teens. Overcoming his anxiety
    about finances and future stability is a key personal goal that drives his educational and entrepreneurial plans.
