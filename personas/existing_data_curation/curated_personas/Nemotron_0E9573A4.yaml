  hobbies: '["DIY home improvement projects", "Gardening", "Hiking in Patapsco Valley State Park", "Running/fitness", "Cooking and recipe experimentation", "Reading mystery novels", "Volunteering at local
    community center", "Puzzle solving (crosswords, Sudoku)", "Attending local farmers'' markets", "Playing board games with friends"]'
  career_goals: Virginia aims to advance from her current operator role to a supervisory position within the next three to five years, such as shift lead or production supervisor. She plans to earn certifications
    like the Certified Production Technician (CPT) and Six Sigma Green Belt to deepen her expertise in process improvement. Long‑term, she envisions moving into a maintenance manager or plant operations
    role where she can shape safety protocols and efficiency initiatives. Balancing career growth with family stability, she also hopes to complete an associate's degree in industrial technology to broaden
    her technical knowledge.
