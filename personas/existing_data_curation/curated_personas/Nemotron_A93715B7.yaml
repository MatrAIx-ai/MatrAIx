  hobbies: '[''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Reading mystery novels'', ''Attending classic car shows'', ''Baking for church potlucks'', ''Volunteering at senior center'', ''Nature
    walks'']'
  career_goals: Seeking to advance from entry‑level cleaning to a supervisory or lead detailer role within the next three years, Katie aims to earn a professional automotive detailing certification that
    will validate her expertise. She plans to refine cleaning processes to enhance efficiency and set quality benchmarks, positioning herself as the most reliable and efficient employee in her shop. Long‑term,
    she envisions launching a modest mobile detailing service that leverages her routine‑driven workflow and reputation for meticulous work, providing supplemental income for retirement while allowing her
    to maintain a predictable schedule.
