personas:
  professional: An experienced automotive detailing specialist, Katie Hauck leverages their precise chemical handling, inventory mastery, and methodical work rhythm to set quality benchmarks, while their
    competitive edge drives them toward a supervisory role within three years.
  sports: A steady fitness enthusiast, Katie Hauck enjoys brisk nature walks on the Wissahickon Trail, follows the Philadelphia Eagles and Phillies, and participates in a local senior walking club that
    meets Wednesdays, balancing low-impact cardio with community camaraderie as they value routine and modest competition.
  arts: A devoted lover of classic culture, Katie Hauck knits while listening to the folk stylings of Johnny Cash, devours Agatha Christie mysteries, and attends seasonal classic-car shows where the nostalgic
    tunes of the Glenn Miller Orchestra provide a soundtrack to the polished chrome, reflecting how they blend quiet creativity with an appreciation for timeless craftsmanship.
  travel: A methodical traveler, Katie Hauck prefers short, well-planned trips such as a weekend stay in historic Lancaster County and a summer getaway to the Bavarian town of Rothenburg ob der Tauber,
    where they enjoy guided tours that fit a tidy itinerary and leave little room for spontaneity.
  culinary: A home-cooking enthusiast, Katie Hauck bakes beloved church potluck staples like Amish chicken pot pie and apple crumble using garden-fresh carrots, zucchini, and heirloom tomatoes, while their
    skill in the kitchen is modest yet dependable, often relying on trusted family recipes and a well-worn Dutch oven as they cherish the comfort of familiar flavors.
  core: A routine-driven detailer with a competitive streak, Katie Hauck blends meticulous automotive cleaning, garden stewardship, and pragmatic budgeting into a life of orderly productivity, punctuated
    by occasional forgetfulness of appointments and a habit of hoarding extra cleaning supplies as they strive for flawless results.
background:
  cultural: Katie comes from a White American background typical of suburban Montgomery County, Pennsylvania. Her family roots trace to German and Irish immigrants who settled in the region in the early
    20th century, bringing values of hard work, self‑reliance, and community involvement. Raised in a middle‑class, predominantly Protestant environment, she often attended church services and community
    events that emphasized practicality, modesty, and family cohesion. These cultural influences reinforce her preference for routine, practicality over abstract ideas, and her competitive yet independent
    outlook. The local suburban culture, with its emphasis on orderly neighborhoods, reliable service jobs, and modest home ownership, continues to shape her everyday choices and priorities.
attributes:
  skills: '[''Interior shampooing'', ''Exterior polishing'', ''Stain removal'', ''Odor neutralization'', ''Chemical safety handling'', ''Cleaning equipment maintenance'', ''Inventory management'', ''Standard
