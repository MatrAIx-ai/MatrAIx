personas:
  professional: Traci Montagne, a 23‑year‑old aspiring elementary teacher, blends her curiosity‑driven lesson designs with pragmatic classroom management, energizing students with improv‑style activities
    while often scrambling to keep meticulous records due to a relaxed, somewhat disorganized approach.
  sports: Traci Montagne enjoys weekend hikes along the local bluffs, plays intramural volleyball with the university club, and avidly follows the city’s professional baseball team, the River City Raptors,
    while occasionally joining a running group that meets for 5K races.
  arts: Traci Montagne channels her creative spark into watercolor paintings inspired by the works of John Singer Sargent and the fluid improvisation of The Second City troupe, while also devouring contemporary
    YA novels by Angie Thomas and blasting indie folk playlists featuring Phoebe Bridgers during craft sessions.
  travel: Traci Montagne prefers spontaneous road trips to national parks like Zion and the Great Smoky Mountains, balances a modest travel budget with occasional splurges on boutique hostels in Portland,
    and often drafts itineraries on the fly while juggling a demanding class schedule.
  culinary: Traci Montagne loves quick, colorful meals such as quinoa bowls with roasted bell peppers, feta, and fresh basil, enjoys experimenting with sushi rolls at home, and considers Sunday brunches
    featuring avocado toast and poached eggs as the perfect excuse to socialize over coffee.
  core: Traci Montagne is a high‑energy, improvisational educator whose curiosity fuels innovative classrooms, but their relaxed, disorganized nature and intense emotional reactivity often lead to last‑minute
    scrambles and occasional anxiety spikes.
background:
  cultural: Traci grew up in New Baden, a small town in St. Clair County with deep French-Canadian roots and a strong Midwestern ethos. The community's close-knit, modest values (emphasizing hard work,
    practicality, and neighborly support) have shaped her outlook. While many local families maintain Catholic traditions, Traci's upbringing was marked by a mix of church-based community events and secular
    school activities. This background gives her a sense of belonging to a region that values both tradition and adaptability, informing her balanced blend of curiosity and practicality.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Differentiated instruction'', ''Technology integration (SmartBoard, educational apps)'', ''Social-emotional learning facilitation'', ''Group
    activity coordination'', ''Conflict mediation'', ''Creative curriculum design'']'
  hobbies: '[''Improv theater'', ''Board game nights'', ''Trivia contests'', ''After-school tutoring volunteer'', ''Hiking'', ''Watercolor painting'', ''DIY crafts'', ''Reading YA novels'']'
  career_goals: Traci aims to earn a bachelor's degree in Elementary Education within the next two years and obtain full certification. She aspires to become a grade-level lead or instructional coach who
    can champion innovative, curiosity-based teaching while preserving practical standards. Long-term, she envisions developing a school-wide social-emotional learning program and designing a curriculum
    that balances hands-on discovery with proven academic outcomes. She also plans to acquire mental-health first-aid certification to better support students experiencing anxiety or distress, and eventually
    mentor new teachers.
