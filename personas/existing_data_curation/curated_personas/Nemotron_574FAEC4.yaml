  hobbies: '["Reading classic literature", "Gardening", "Seasonal cooking", "Knitting", "Hiking local trails", "Photography", "Volunteering at the community library", "Book club participation", "Community
    theatre attendance", "Organizing neighborhood events"]'
  career_goals: Rosemary aims to be promoted to store manager within the next two years, using her organizational strengths to lead a high‑performing team. She plans to pursue an MBA part‑time to transition
    into a regional management role, where she can influence broader retail strategies. Long‑term, she hopes to open her own boutique that showcases locally crafted goods, combining her visual merchandising
    talent with her commitment to supporting the community.
