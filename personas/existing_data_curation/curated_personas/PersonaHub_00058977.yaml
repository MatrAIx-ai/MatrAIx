persona_description: A passionate environmentalist who is committed to the protection of the planet and its ecosystems. Lorna Howarth is a writer and environmentalist who has been working tirelessly to
  bring the law of 'Ecocide' to the statute book. She is a contributing editor to Resurgence & Ecologist magazine and the founder of a small independent publishing agency, The Write Factor. Lorna is convinced
  that the EU needs to introduce new standards into European law to recognize Ecocide and facilitate the shift towards a sustainable economy and society.
