  career_goals: Over the next five years Albert aims to obtain the Certified Professional in Supply Management (CPSM) credential and lead a company‑wide procurement transformation that embeds sustainable
    sourcing and AI‑driven analytics. He aspires to progress into a senior director or chief procurement officer role where he can shape long‑term supply‑chain strategy, champion supplier diversity, and
    mentor junior procurement professionals, all while maintaining a structured, results‑oriented work environment.
