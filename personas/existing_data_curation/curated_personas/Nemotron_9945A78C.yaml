  career_goals: Blanca aims to move beyond her current cashier role into a supervisory or assistant manager position within the next two years. She plans to complete her associate degree in business administration
    through evening classes at a community college, which will equip her with the managerial and financial knowledge needed for store leadership. Her long-term ambition is to one day open a small convenience
    store that caters to the Mexican community in Chicago, offering authentic products and a friendly, structured shopping experience.
