persona_description: A geoscience educator who is passionate about integrating place-based approaches in geoscience education and is committed to engaging students in learning about the Earth's past and
  present through the study of fossils, sedimentary rocks, and the application of paleontology to various disciplines. They are trained observers who have conducted observations of 204 unique geoscience
  classes across the US using the Reformed Teaching Observation Protocol (RTOP) and have experience with the Gustavus Adolphus program that connects faculty with climate science expertise with non-expert
  faculty members from a wide variety of disciplines to create a series of lessons (mini-modules) for teaching Earth science content. They are interested in the topic of sustainability education and how
  it can be applied to a broad range of courses in the geosciences and provide the necessary resources and support for educators to effectively teach Earth science content.
