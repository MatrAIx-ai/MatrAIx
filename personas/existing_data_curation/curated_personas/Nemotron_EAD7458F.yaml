personas:
  professional: A seasoned housekeeper named Della Boston leverages her meticulous floor‑care expertise, OSHA‑aligned safety knowledge, and knack for systematic inventory management to train staff and streamline
    operations, and they plan to earn the Certified Professional Cleaner credential while moving into a supervisory role at a senior‑living facility.
  sports: Della Boston supports the Chicago Cubs and Chicago Bears with fervent loyalty, joins a community walking club that meets on weekends for mile‑long strolls along the river, and occasionally plays
    in a church‑organized softball league during the summer, treating these activities as both social engagement and low‑impact fitness.
  arts: Della Boston indulges in classic detective novels by Agatha Christie, enjoys the folk storytelling of Johnny Cash and the regionalist paintings of Grant Wood, and attends the local community theater's
    monthly productions, finding that these artistic touchstones reinforce her love for order and narrative.
  travel: Della Boston favors carefully planned road trips to small‑town destinations like Mackinac Island, the Amish communities of Ohio, and the lakeside cabins of Wisconsin’s Door Peninsula, balancing
    a modest budget with a desire for quiet relaxation and occasional family visits in Indiana, always mapping routes in advance to avoid surprises.
  culinary: Della Boston delights in preparing Midwestern comfort foods such as chicken pot pie, baked casserole with sweet potatoes, and apple crumble, seasoning dishes with garden‑fresh herbs like rosemary
    and thyme, and they showcase their culinary skill at church pot‑luck gatherings, though they sometimes over‑salt their sauces in pursuit of robust flavor.
  core: Della Boston is a pragmatic, structure‑driven housekeeping professional who couples a competitive edge with a modest skepticism toward trendy products, finds solace in crossword puzzles and river
    walks, and secretly hoards extra garden herbs for winter cooking.
background:
  cultural: Della grew up in a modest, working‑class white family in rural Illinois, with German and Irish ancestry that shaped a Midwestern cultural identity valuing hard work, self‑reliance, and community.
    She attended local public schools and earned an associate’s degree from a community college, reflecting the region’s emphasis on practical education. The community’s close‑knit nature, church involvement,
    and seasonal agricultural cycles have ingrained a sense of responsibility, punctuality, and modesty. These cultural influences are evident in her practical outlook, structured daily habits, and commitment
    to serving others through reliable, diligent work.
