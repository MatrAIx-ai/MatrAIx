  hobbies: '[''Gardening'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Cooking traditional Midwestern recipes'', ''Walking nature trails'', ''Church pot‑luck gatherings'', ''Reading detective novels'']'
  career_goals: Della aims to move into a supervisory role as a lead housekeeper at a reputable senior‑living or hospitality facility, where she can apply her structured approach to managing teams and schedules.
    She plans to earn the Certified Professional Cleaner (CPC) credential and a small‑business certification to eventually launch her own locally‑focused cleaning service that emphasizes reliable, eco‑conscious
    practices and transparent pricing. Over the next five years, she also wants to build a modest retirement fund, mentor younger workers, and establish a reputation for excellence in her community.
