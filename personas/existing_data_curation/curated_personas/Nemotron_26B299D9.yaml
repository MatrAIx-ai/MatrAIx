  career_goals: Teresa aims to transition from sales associate to store manager within the next two years, leveraging her organized work style and leadership potential. She plans to complete a retail management
    certification offered by a community college in nearby Tucson and to shadow the current manager to learn budgeting and staffing strategies. Long‑term, she dreams of opening a boutique that blends retail
    with a rotating gallery of local artists, turning her store into a community cultural hub. Her competitive nature drives her to achieve top‑sales awards each quarter and to increase the store’s annual
    revenue by at least 10 % through innovative merchandising and targeted promotions. She also hopes to mentor new hires, passing on her methodical approach and curiosity for new product trends.
