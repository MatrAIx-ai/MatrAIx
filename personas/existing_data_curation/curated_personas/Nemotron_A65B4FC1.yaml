    art program development'']'
  hobbies: '[''Painting and watercolor'', ''Sketching'', ''Visiting local art galleries'', ''Reading contemporary fiction and non-fiction'', ''Creative writing'', ''Journaling'', ''Gardening'', ''Cooking
    experimental recipes'', ''Yoga and meditation'', ''Volunteering for art therapy programs'']'
  career_goals: Maria aims to advance from a licensed practical nurse to a registered nurse and eventually become a certified nursing educator. Over the next five years she plans to complete an RN bridge
    program, obtain a teaching certification, and take on a role as a clinical instructor for nursing students in her region. Her long‑term ambition is to lead a community health education center in Jasper
    County that blends preventive health services with creative wellness programs, such as art therapy workshops for seniors and stress‑reduction classes. She is driven by a desire to raise the standard
    of care in her rural community, mentor new nurses, and achieve professional recognition for innovative health‑education initiatives.
