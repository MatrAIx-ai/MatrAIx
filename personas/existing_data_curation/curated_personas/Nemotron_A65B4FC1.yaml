personas:
  professional: Maria Kelly, a licensed practical nurse with a bachelor's degree in education, blends meticulous clinical skills in patient assessment, wound care, and medication administration with an
    organized, art-infused approach to health education, using their curiosity and disciplined nature to design evidence-based curricula and lead small interdisciplinary teams while quietly championing
    innovative art-therapy programs in their rural community.
  sports: Maria Kelly keeps fit by joining a local adult soccer league that practices on Saturday mornings, follows the Houston Astros and the Houston Rockets closely, and supplements team sports with solitary
    sunrise hikes in the nearby state forest, preferring low-impact cardio over intense gym sessions while they monitor progress through a minimalist habit-tracking app.
  arts: Maria Kelly, a quiet watercolor enthusiast, spends weekends sketching botanicals inspired by Monet and Georgia O'Keeffe, finds solace in listening to Ludovico Einaudi's piano compositions while
    they volunteer at the community art gallery, and frequently draws creative inspiration from the modern folk duo First Aid Kit and the indie film 'Moonrise Kingdom', shaping their artistic voice through
    a blend of classic and contemporary influences.
  travel: Maria Kelly favors carefully planned, low-stress getaways that combine nature and cultural enrichment, such as a solo camping trip to the Great Smoky Mountains, a weekend art retreat in Asheville
    where they explored the River Arts District, and a future voyage to Kyoto to study traditional Japanese garden design, always budgeting travel costs in their spreadsheet to avoid financial anxiety.
  culinary: Maria Kelly loves experimenting in the kitchen with Mediterranean flavors, often preparing ratatouille topped with fresh basil and thyme or a spicy Sichuan tofu stir-fry seasoned with ginger
    and garlic, and while their cooking skill is intermediate, they meticulously document each recipe in a handwritten journal, though they occasionally burn the edges of a soufflé when they get distracted
    by a new watercolor project.
  core: Maria Kelly is a methodical, art-driven nurse-educator whose curiosity fuels creative health initiatives, yet their tendency toward worry and occasional impulsive spending adds an endearing complexity
    to their disciplined routine.
background:
  cultural: Maria grew up in a middle‑class white family in Carthage, Missouri, with German and Irish ancestry common to the region. Her upbringing emphasized Midwestern values such as hard work, self‑reliance,
    modesty, and a strong sense of community. Family and church gatherings, local festivals like the Jasper County Fair, and a tradition of service shaped her worldview. While rooted in these traditions,
    Maria’s curiosity leads her to explore diverse artistic and intellectual pursuits beyond her hometown, blending her cultural heritage with a broader appreciation for new ideas and experiences.
