  hobbies: '[''beach volleyball'', ''surfing'', ''fishing'', ''visiting art galleries'', ''street art festivals'', ''sketching and painting'', ''cooking Guatemalan cuisine'', ''salsa dancing'', ''photography'',
    ''volunteering at youth center (teaching Spanish and photography)'']'
  career_goals: Gonzalo aims to advance from his current operator role to a shift supervisor position within the next two years, leveraging his organizational skills and competitive drive to lead a high-performing
    team. He plans to obtain certifications in industrial maintenance and safety management, positioning himself for future roles as a plant manager or technical trainer. Parallel to his career progression,
    Gonzalo hopes to merge his appreciation for art and industrial environments by curating an employee-led art showcase that celebrates creativity on the factory floor.
