  career_goals: Although only four, Maria often talks about what she wants to be when she grows up. She dreams of becoming a teacher because she enjoys structured classroom routines and helping younger
    children learn. She also expresses a wish to work with animals, imagining herself as a veterinarian, reflecting her nurturing side. Her goals are shaped by a desire for stability, clear expectations,
    and the opportunity to care for others.
