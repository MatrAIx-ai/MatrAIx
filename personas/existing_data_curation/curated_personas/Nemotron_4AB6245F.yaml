personas:
  professional: Maria Lee, a four-year-old with a budding fascination for order, transforms playtime at preschool into a miniature project management session, arranging puzzle pieces in precise patterns
    while occasionally abandoning the plan to chase a butterfly, showing a blend of structure-loving practicality and relaxed spontaneity.
  sports: Maria Lee enjoys structured play at the neighborhood park, regularly attending Tuesday's tiny soccer practice with the local kids’ club and swinging on the swing set in a predictable rhythm, yet
    they sometimes forget their water bottle, revealing a relaxed stance toward obligations.
  arts: Maria Lee delights in drawing colorful dinosaurs with their favorite set of crayons and humming along to songs by The Wiggles, often insisting on using the same blue crayon for outlines while occasionally
    dropping the activity if a peer demands attention, a mix of cooperative creativity and assertive focus.
  travel: Maria Lee prefers short family trips to Grandma's house where familiar bedtime stories and peanut‑butter cookies provide comfort, yet they also show excitement for the distant aquarium they glimpsed
    on a brochure, dreaming of watching fish in a big tank.
  culinary: Maria Lee loves buttery macaroni and cheese sprinkled with peas, insisting the cheese sits perfectly on top, while they occasionally hide the peas in a secret corner of the bowl to avoid the
    texture, reflecting a practical palate tempered by whimsical disorganization.
  core: Maria Lee is a four‑year‑old who clings to predictable play routines, worries about missing crayons, and balances a structured imagination with sudden bursts of spontaneity.
background:
  cultural: Maria comes from a white, Midwestern American background in Aberdeen, South Dakota. Her family’s life reflects the small‑town values of community, rural outdoors, and school‑centered activities.
    She participates in local traditions such as the annual county fair, church‑related events, and community picnics, and her upbringing includes exposure to typical American children's media, seasonal
    holidays, and a close‑knit extended family network.
