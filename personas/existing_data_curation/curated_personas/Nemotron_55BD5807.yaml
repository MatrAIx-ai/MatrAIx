personas:
  professional: Ray Hornbacher, a 39‑year‑old technical support specialist with a business degree, leverages strong troubleshooting, scripting, and ITIL incident‑management expertise to deliver reliable
    OS‑agnostic solutions while their curiosity and low‑key, flexible work style drive them to mentor junior staff and champion practical, proven technologies.
  sports: Ray Hornbacher, who relishes low‑intensity fitness, spends weekends hiking with the Monmouth County Trail Club, follows the New York Giants for football and the New York Yankees for baseball,
    and occasionally joins friends for casual pickup basketball at the local community center.
  arts: Ray Hornbacher, an avid fan of classic science‑fiction authors such as William Gibson and Philip K. Dick, enjoys ambient electronica from Tycho, the cinematic scores of Hans Zimmer, and channels
    creative energy into designing custom board‑game scenarios for intimate Settlers of Catan nights with close friends.
  travel: Ray Hornbacher prefers spontaneous weekend escapes, often driving to the Catskill Mountains for hiking and the historic streets of Philadelphia for tech‑museum tours, while dreaming of a future
    solo adventure across Iceland’s volcanic landscapes once finances allow.
  culinary: Ray Hornbacher, an experimental home cook, blends practical skill with curiosity by mastering charcoal‑grilled ribeye glazed with miso, perfecting homemade sourdough using a wild‑fermented starter,
    and whipping up Southeast Asian pad Thai featuring tamarind, fish sauce, and rice noodles, all while savoring the occasional classic Margherita pizza.
  core: Ray Hornbacher, a 39‑year‑old tech‑savvy tinkerer, balances methodical problem‑solving with spontaneous, low‑key projects, often forgetting to schedule appointments but never missing a chance to
    tweak a custom PC at midnight.
background:
  cultural: Ray grew up in the suburban setting of Eatontown, New Jersey, reflecting a typical Mid‑Atlantic American upbringing. His family emphasized a practical work ethic, modest community involvement,
    and the celebration of common U.S. holidays such as Thanksgiving and Independence Day. While his cultural identity is broadly American, his exposure to the diverse populations of Monmouth County has
    fostered an appreciation for individualism, practicality, and the value of cooperative, harmonious relationships within his community.
attributes:
  skills: '["Hardware troubleshooting","Software installation and configuration","Windows, macOS, Linux support","Remote desktop assistance (TeamViewer, LogMeIn)","Network diagnostics (TCP/IP, Wi‑Fi)","Ticketing
