  hobbies: '["Custom PC building","Raspberry Pi / home automation tinkering","Reading science-fiction and tech non-fiction","Hiking local trails","Nature photography","Single-player video gaming","Volunteer
    work at animal shelter","Cooking and experimenting with recipes","Listening to technology podcasts","Small-group board gaming with close friends"]'
  career_goals: 'Ray aims to advance into a senior technical support or systems administrator position where he can mentor junior staff and contribute to service‑improvement initiatives. He plans to earn
    certifications such as CompTIA Network+ and Microsoft Certified: Modern Desktop Administrator to broaden his expertise. Valuing flexibility, he seeks roles that allow remote work and a balanced schedule,
    enabling him to maintain his personal projects. Ultimately, he envisions consulting for small businesses, leveraging his business background and technical skills to design practical IT solutions while
    fostering a collaborative and harmonious work environment.'
