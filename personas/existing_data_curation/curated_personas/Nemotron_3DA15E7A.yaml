personas:
  professional: Domingo Perez, a diligent physical therapy assistant-in-training, leverages his anatomy expertise, bilingual communication, and calm bedside manner to design individualized rehab programs
    for seniors while maintaining meticulous documentation and fostering collaborative clinic environments; they thrive on routine and community partnership, though they sometimes forget to log a quick
    coffee break in their schedule.
  sports: Domingo Perez, a regular on the Marco Island Beach Volleyball Association and a member of the Collier County Soccer League, blocks, spikes, and nets for fun while cheering on the Miami Dolphins
    and Inter Miami CF for his love of football, always fitting in early morning runs on the Gulf shoreline to stay fit; they thrive on team camaraderie and the rhythm of the beach sand underfoot, though
    they occasionally linger after matches to watch the sunset, missing the occasional post‑game snack.
  arts: Domingo Perez finds solace at local Mariachi evenings featuring groups like Los Hermanos de la Costa, often humming classic boleros by Luis Miguel and Vicente Fernández while also attending occasional
    performances of the regional folk dance troupe that celebrates his family's traditions; they cherish the melodic ties to their roots and the communal spirit of music, though they sometimes stray off‑key
    when caught up in the emotion of a favorite ballad.
  travel: Domingo Perez enjoys weekend getaways to the Everglades and seasonal trips to the historic streets of Puebla, while dreaming of a future pilgrimage to the sun‑kissed beaches of Tulum, balancing
    his travel plans around his family’s reunions and his clinic’s schedule; they favor a mix of nature, culture, and relaxation in each journey, though they frequently overpack their suitcase with extra
    beach towels and fishing gear.
  culinary: Domingo Perez excels at cooking aromatic pozole, smoky carne asada tacos, and hand‑rolled tamales using fresh cilantro, epazote, and sweet corn masa, and he delights in pairing his meals with
    grilled grouper caught from the Gulf and a splash of lime; they savor each bite as a tribute to family gatherings and the flavors of home, though they sometimes add an extra pinch of chili powder, turning
    the dish a little hotter than intended.
  core: Domingo Perez blends a calm, routine‑driven work ethic with lively community spirit, turning every senior rehab session, beach volleyball match, and family feast into a celebration of caring and
    tradition; they embody steady dedication wrapped in vibrant sociability, even if they occasionally double‑check the calendar for a missed appointment.
background:
  cultural: Domingo was raised in a bilingual Mexican-American household that emphasized family cohesion, respect for elders, and Catholic traditions. Celebrations such as Dia de los Muertos, Cinco de Mayo,
    and family reunions with authentic Mexican cuisine are central to his identity. His fluency in Spanish and love for traditional music and dance keep his heritage alive. Since relocating to Marco Island,
    Florida, he has blended his cultural roots with the coastal lifestyle, engaging in beach activities while participating in local Hispanic community events and volunteering to support fellow Spanish-speaking
    residents.
attributes:
  skills: '[''Patient assessment'', ''Manual therapy techniques'', ''Therapeutic exercise design'', ''Medical documentation'', ''Patient education'', ''Bilingual Spanish-English communication'', ''Team
    collaboration'', ''Time management'', ''Safety compliance'', ''Basic anatomy and physiology'']'
  hobbies: '[''Beach volleyball'', ''Community soccer'', ''Cooking Mexican cuisine'', ''Fishing'', ''Gardening'', ''Volunteering at senior center'', ''Attending cultural festivals and concerts'', ''Watching
    Mexican football'', ''Listening to classic boleros'']'
  career_goals: Domingo aims to become a fully certified Physical Therapist Assistant (PTA) and eventually specialize in geriatric and orthopedic rehabilitation, focusing on improving the quality of life
    for seniors in his community. He plans to pursue continuing education courses, obtain certification in manual therapy, and take on a leadership role as a lead aide or clinical coordinator. In the long
    term, he envisions opening a community wellness center on Marco Island that offers physical therapy services, group exercise classes, and health education workshops, especially for the Spanish-speaking
    population.
