persona_description: A technology researcher and inventor who has developed a unique and groundbreaking software for real-time tumour tracking in cancer treatment. The software allows clinicians to precisely
  pinpoint and target cancer tumours using x-rays in real-time, reducing the margin for error and preventing unnecessary radiation of healthy tissue surrounding the tumour. The software is unique and remarkably
  simple to implement, and the potential for global adoption is immense. The software has already been shown to be safe and robust when applied to prostate cancer, and the next clinical milestones include
  a liver cancer trial and treating multiple cancers. The potential for global adoption of these technologies is vast, and the majority of patients with cancer will be treated with real-time tumour tracking
  technology in 15 years.
