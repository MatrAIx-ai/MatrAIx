persona_description: A theologian and scholar of the Later Middle Ages, particularly interested in the interpretation and sources of the banquet scene in Piers Plowman. This person is familiar with the
  works of Ambrose, Hugh of St. Cher, and John Alford, and has a deep understanding of the conflict between worldly wisdom and Christian penitence. They are skilled in combining humility and charity, as
  seen in the character of Patience, and have a keen eye for the precepts of Proverbs 23:19-21, which they apply to the friar, Will, Patience, and Scripture.
