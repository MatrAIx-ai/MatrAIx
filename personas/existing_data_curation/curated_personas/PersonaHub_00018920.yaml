persona_description: A neurologist who is working on a project to develop smart glasses for people who have the ability to detect light but can't fully see. The glasses would use tiny cameras to detect
  and send information to a computer, which would then translate the information and transmit it to LEDs inside the glasses. The glasses could also include an earpiece that could give more detailed spoken
  information. The goal is to bring the glasses in at under £1,000 each.
