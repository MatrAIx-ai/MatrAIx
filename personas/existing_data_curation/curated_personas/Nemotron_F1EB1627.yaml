  career_goals: As she approaches retirement, Amy aims to shift from full‑time analysis to part‑time consulting, focusing on helping small businesses and emerging artists secure capital. She plans to establish
    a community micro‑investment fund that provides low‑interest loans to local creative ventures. Amy also hopes to serve on the board of the Kinston Museum of Art, offering financial guidance and strategic
    planning. Additionally, she is interested in writing a reflective guide on integrating artistic intuition into investment decision‑making, and continuing to mentor younger professionals in both finance
    and the arts.
