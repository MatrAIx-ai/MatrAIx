personas:
  professional: Amy Follmann is a seasoned financial analyst who blends rigorous quantitative modeling with a painter's eye for pattern, crafting nuanced investment strategies while championing artistic
    ventures, and they thrive on translating complex data into stories that resonate with both boardrooms and community art circles.
  sports: Amy Follmann follows the Carolina Hurricanes with devotion, cheers for the NC State Wolfpack basketball team, and they maintain fitness through a weekly birdwatching walk with the local Audubon
    Society and a gentle tai chi class at the community center.
  arts: Amy Follmann devotes evenings to watercolor landscapes of the eastern North Carolina shoreline and occasional pottery, regularly visits the North Carolina Museum of Art to study works by Monet,
    Winslow Homer, and Georgia O'Keeffe, and they volunteer as a set designer for community theater productions while mentoring emerging local artists.
  travel: Amy Follmann prefers leisurely road trips that allow stops at coastal lighthouses, has explored the Outer Banks and historic Savannah, dreams of strolling through Kyoto’s art districts, and they
    often combine travel with sketching sessions at each new locale.
  culinary: Amy Follmann relishes cooking Southern comfort classics such as shrimp and grits, collard greens seasoned with smoked ham hocks, and pecan pie, frequently enhancing these dishes with fresh basil,
    heirloom tomatoes, and a splash of hot sauce from their garden herbs.
  core: Amy Follmann sees the world through a dual lens of numbers and pigments, savoring the rhythm of a balanced portfolio as much as a fresh brushstroke, yet they habitually misplace their favorite sketchbook
    in the garden while hunting for the perfect thyme sprig.
background:
  cultural: Amy grew up in a close‑knit, multi‑generational White family in the rural outskirts of Kinston, North Carolina. Her upbringing was shaped by Southern hospitality, church community, and a strong
    work ethic rooted in the agricultural heritage of Lenoir County. Family traditions include large Thanksgiving gatherings, participation in local festivals such as the Peanut Festival, and a love for
    folk music and quilting. These cultural influences fostered her appreciation for both community cohesion and artistic expression, which continues to inform her personal and professional life.
