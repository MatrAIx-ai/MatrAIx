personas:
  professional: Rosaria Berry, an aspiring museum curator in the making, blends their strong research and critical analysis skills from art history coursework with their knack for organization and digital
    media editing to plan accessible exhibitions and manage volunteer programs, all while using their public speaking confidence to engage diverse audiences.
  sports: Rosaria Berry enjoys bi‑weekly yoga classes for flexibility, follows the New York Knicks and New Jersey Devils with fervor, and joins a local weekend running club that charts scenic routes through
    the Watchung Reservation to stay active, using their disciplined schedule to balance exercise with study.
  arts: Rosaria Berry immerses themselves in contemporary art by frequenting MoMA, the Whitney, and local galleries, sketching cityscapes in their travel notebook, photographing historic Fanwood streets,
    and drawing inspiration from artists like Yayoi Kusama, Ai Weiwei, and the indie music of The National and Tame Impala for creative ambiance.
  travel: Rosaria Berry prefers meticulously planned weekend getaways, such as exploring Philadelphia’s historic Old City or wandering the cobblestone lanes of Bruges, yet they always leave a spare day
    for spontaneous photography excursions and seek budget‑friendly hostels to stretch their limited travel fund.
  culinary: Rosaria Berry loves experimenting in the kitchen, often whipping up homemade ramen broth, Mediterranean falafel wraps, and aromatic basil‑pesto pasta, while favoring fresh ingredients like heirloom
    tomatoes, shiitake mushrooms, and locally sourced honey for their occasional brunch gatherings.
  core: Rosaria Berry, an organized 18‑year‑old art enthusiast, balances meticulous planning with spontaneous creativity, channels their curiosity into curatorial dreams, and occasionally overindulges in
    coffee‑fueled late‑night sketching sessions.
background:
  cultural: Rosaria grew up in a middle‑class, white family in Fanwood, New Jersey, with deep roots in Italian ancestry and some Irish‑German lineage. Her family practiced Catholic traditions, celebrating
    Christmas, Easter, and Saint Rosalia’s feast day with communal meals and religious observances. The suburban setting emphasized academic achievement and community participation, leading her to attend
    local schools that encouraged involvement in arts programs. Proximity to New York City exposed her to a vibrant museum and cultural scene, fostering an appreciation for both American and European art.
    While she identifies with mainstream American values, she also cherishes her European heritage, often cooking family recipes and attending cultural events throughout the greater New Jersey area.
attributes:
