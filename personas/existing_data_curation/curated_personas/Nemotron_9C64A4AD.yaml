  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and art criticism'', ''Photography'', ''Yoga and mindfulness'', ''Volunteering
    at community art programs'', ''Cooking and experimenting with recipes'', ''Traveling to historic and cultural sites'', ''Writing a personal art blog'', ''Listening to indie and alternative music'']'
  career_goals: Rosaria aims to complete a bachelor's degree in Art History or Museum Studies, securing internships at nearby institutions such as the Newark Museum or the Montclair Art Museum. Her long‑term
    ambition is to become a museum curator or education coordinator, designing accessible exhibitions and educational programs that engage diverse audiences. She also hopes to develop an online platform
    that highlights emerging artists from underrepresented backgrounds, blending her organizational strengths with her passion for contemporary art. Ultimately, she envisions pursuing graduate studies in
    Curatorial Practice to deepen her expertise and lead curatorial projects that fuse traditional collections with digital media.
