  career_goals: Ronny aims to secure a stable, hands-on career that leverages his practical strengths and love for routine. He plans to pursue a technical apprenticeship after high school, ideally with
    a local manufacturing firm such as Corning Inc., where he could train as a production technician or glass-processing specialist. Alternatively, he is interested in becoming an automotive or HVAC mechanic
    through a trade-school program. His long-term ambition is to earn certifications, achieve mastery in a skilled trade, and provide reliable support for his family while maintaining a clear, organized
    work life.
