  hobbies: '[''Book club participation'', ''Quilting'', ''Gardening'', ''Church choir singing'', ''Walking in the park'', ''Playing bridge'', ''Cooking soul‑food'', ''Storytelling circles'', ''Genealogy
    research'', ''Reading aloud to children'']'
  career_goals: Brittanni remains committed to making a lasting impact on her community. Her primary goal is to ensure that the values of education, cultural pride, and civic responsibility she championed
    throughout her teaching career are passed on to younger generations. She aims to mentor retired educators and new teachers through structured workshops and informal coaching, sharing best practices
    and classroom anecdotes. Brittanni is also passionate about preserving local African American history; she plans to continue collecting and transcribing oral histories, collaborating with the Saginaw
    public library to create an accessible archive. Additionally, she aspires to author a memoir reflecting her experiences as a black educator during the civil rights era, hoping to inspire future educators
    and celebrate the resilience of her community. Although relaxed about personal accolades, she hopes to remain an active participant in community events, serving on advisory boards for after‑school programs
    and youth literacy initiatives.
