personas:
  professional: Brittanni Standifer, a retired elementary and middle school educator turned community mentor, leverages four decades of curriculum design, differentiated instruction, grant writing, and
    event planning to orchestrate workshops for new teachers, curate oral history archives for the local library, and champion literacy initiatives with the same methodical reliability and sociable energy
    that defined their classroom.
  sports: Brittanni Standifer maintains their vitality by taking daily walks in the city park, cheering on the Detroit Lions football team each fall, attending the community’s senior softball games, and
    sharpening their mind as a member of the local senior bridge club, all of which blend physical activity with social engagement.
  arts: Brittanni Standifer channels their creative spirit into quilting designs influenced by folk art motifs and the pastel hues of impressionist painters such as Claude Monet, attends monthly performances
    at the local community theater, and fills their home with classic jazz and gospel recordings from the 1940s and 1950s, which they often share during choir rehearsals.
  travel: Brittanni Standifer prefers organized, low‑impact travel and enjoys short train excursions to historic cities like Washington, D.C., and Charleston, exploring museums and botanical gardens, while
    they dream of a gentle river cruise along the Mississippi to connect with the migration stories uncovered in their genealogy research.
  culinary: Brittanni Standifer, a seasoned home cook, delights in preparing comforting dishes such as savory chicken and dumplings, seasoned greens simmered with smoked turkey, buttery cornbread, and sweet
    potato pie spiced with cinnamon and nutmeg, and they frequently incorporate fresh herbs from their garden to enhance each potluck gathering.
  core: Brittanni Standifer blends a lifetime of disciplined teaching, community service, and vibrant storytelling into a steadfast yet warm presence, punctuated by meticulous planning, weekly bridge battles,
    and occasional forgetfulness that keeps their family on their toes.
background:
  cultural: Brittanni Elisa Standifer’s cultural background is rooted in African American heritage and the Midwestern experience of Saginaw, Michigan. Born in the early 1930s, she grew up in a family that
    had migrated north during the Great Migration, bringing Southern customs, oral storytelling traditions, and strong church involvement to the industrial heartland. Throughout her life, Brittanni witnessed
    and participated in the civil rights movement, integrating its principles of equality and empowerment into her teaching and community work. Her upbringing was shaped by the close‑knit black community
    of Saginaw, where churches, local schools, and family gatherings served as cultural anchors. These influences fostered a deep appreciation for African American literature, music, and culinary traditions,
    which she continues to celebrate through her hobbies and community engagement. Brittanni also values the intergenerational transmission of heritage, actively preserving family histories and contributing
    to local archives to ensure that the narratives of Black Michiganders are recognized and honored.
attributes:
