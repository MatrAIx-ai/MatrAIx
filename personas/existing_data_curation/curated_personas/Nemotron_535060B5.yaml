personas:
  professional: Annabel Goens, a 37‑year‑old senior accountant at a public accounting firm, blends rigorous GAAP and IFRS audit expertise with a painter’s eye for visual storytelling, turning data into
    striking Power BI dashboards, and they channel their relaxed, occasionally disorganized work style into last‑minute bursts of creative problem‑solving while their compassionate nature makes them a go‑to
    mentor for junior staff.
  sports: Annabel Goens embraces a mix of rhythmic salsa classes, early‑morning bootcamps at Curtis Hixon Park, and weekend kayak excursions on the Hillsborough River; they cheer loudly for the Tampa Bay
    Lightning, Buccaneers, and Rays, and they are a member of a local paddleboarding club that meets every Saturday in summer.
  arts: Annabel Goens finds artistic renewal in strolling through the Tampa Museum of Art and spotting street murals by local talent like James Rizzi, channels the bold colors of Frida Kahlo into watercolor
    sketches, and they regularly attend live performances by the Florida Orchestra and improv theater nights featuring actors from the Second City.
  travel: Annabel Goens favors spontaneous, culture‑rich getaways, alternating between weekend road trips to Asheville’s Blue Ridge Mountains and meticulously planned overseas ventures to Barcelona’s street‑art
    districts and Kyoto’s serene temples, and they blend a modest travel budget with occasional splurges on culinary tours with friends.
  culinary: Annabel Goens enjoys experimenting in the kitchen, whipping up Thai green curry with fresh lemongrass and galangal, Ethiopian injera paired with berbere‑spiced lentils, and perfectly seared
    ahi tuna topped with yuzu‑soy glaze, and they host eclectic dinner parties where guests savor the blend of flavors as much as the storytelling behind each recipe.
  core: Annabel Goens is a creatively wired CPA who sketches audit charts on napkins, juggles spontaneous art‑gallery visits with midnight deadline sprints, and battles relentless anxiety with a cocktail
    of salsa dancing, mindfulness books, and occasional coffee‑fueled all‑nighters.
background:
  cultural: Annabel grew up in a suburban Florida environment shaped by Southern hospitality and the vibrant multicultural tapestry of the Tampa Bay area. Her white American upbringing blends traditional
    Midwestern values of diligence and practicality with a progressive appreciation for diversity and inclusivity. Exposure to local cultural festivals, coastal lifestyles, and a strong community focus
    fostered her love for the arts, civic engagement, and collaborative problem‑solving. This background informs her balanced outlook—combining a relaxed, flexible approach to life with a deep commitment
    to helping others and celebrating creative expression.
