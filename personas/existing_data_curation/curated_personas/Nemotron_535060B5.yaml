  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Salsa dancing and group fitness classes'', ''Kayaking and paddleboarding on the Hillsborough River'', ''Reading
    psychology and mindfulness literature'', ''Participating in a local book club'', ''Volunteering for financial literacy workshops'', ''Experimenting with international cooking'', ''Attending community
    theater events'']'
  career_goals: Annabel aims to advance to a senior manager position within a public accounting firm, with a long‑term ambition of becoming a partner who leads the firm’s ESG (environmental, social, governance)
    audit practice. She is interested in integrating sustainability metrics into traditional financial audits and eventually establishing a consultancy that supports non‑profit arts organizations with financial
    stewardship. Pursuing her CPA certification and further education in sustainable finance are immediate priorities. She also seeks a work environment that offers flexible scheduling and remote‑work options
    to better balance her professional drive with personal well‑being.
