  career_goals: Hung aims to become an innovator at the intersection of education and the arts. In the next few years he plans to freelance as a curriculum developer and multimedia designer for progressive
    schools and community programs, building a portfolio that showcases immersive, art‑driven learning experiences. He dreams of launching a startup that uses AR/VR technology to make abstract concepts
    tangible for middle‑school learners, giving him creative control and the flexibility he values. Long‑term, he envisions himself as a thought leader in experiential education, publishing research on
    artistic integration in STEM curricula and mentoring other young creators.
