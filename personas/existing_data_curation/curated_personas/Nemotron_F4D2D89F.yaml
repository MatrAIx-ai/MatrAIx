personas:
  professional: An aspiring curriculum developer and multimedia designer, Hung Purpura blends digital illustration, video editing, and pedagogical know-how to craft AR‑enhanced lessons for middle‑school
    STEM, while their love of spontaneous collaboration sometimes leads to missed deadlines but fuels innovative prototypes.
  sports: Hung Purpura thrives on kinetic play, regularly lacing up for ultimate frisbee matches with the Shawnee Flyers and joining casual soccer kick‑abouts at the community park, while cheering on the
    Oklahoma City Thunder and following the Tulsa Roughnecks; their competitive streak pushes them to sprint extra laps after games, even when homework looms.
  arts: Hung Purpura immerses themselves in a vibrant creative ecosystem, producing abstract digital paintings inspired by the neon glow of Bangkok night markets, performing improv sketches with the local
    Tall Grass troupe, jamming on synth loops reminiscent of Flying Lotus, and snapping street‑photography series that capture the stark contrast of Oklahoma wheat fields against graffiti‑adorned alleyways,
    all while idolizing artists like Beeple and James Turrell.
  travel: Hung Purpura’s travel cravings map a line from family visits in a bustling Southeast Asian metropolis—where they collect vintage market prints—to solo backpacking dreams through Kyoto’s cherry‑blossom
    avenues and Berlin’s street‑art districts; domestically they’ve hiked the Ozark Trail, camped at the Tallgrass Prairie, and plan a road trip to New Mexico’s White Sands for a VR‑ready sunrise photo
    shoot.
  culinary: Hung Purpura’s kitchen is a fusion lab where traditional pho broth meets miso‑infused ramen, bánh xèo batter is brightened with turmeric and fresh cilantro, and they experiment with lemongrass‑tamarind
    glaze on grilled pork, all while perfecting a matcha‑latte foam that rivals coffee‑shop standards; their favorite ingredient is fish sauce, which they sprinkle like a secret spice.
  core: Hung Purpura is an 18‑year‑old digital art enthusiast who blends unconventional curricula with VR, spends impulsively on creative tech, juggles teen health with occasional neglect, plays ultimate
    frisbee fiercely, and cooks modern Southeast Asian twists while dreaming of global street‑art pilgrimages.
background:
  cultural: Hung is a first‑generation American of Vietnamese descent. His parents emigrated from Vietnam in the late 1990s and settled in the Tulsa‑Shawnee area, where they found work in the oil and service
    industries. Growing up in Shawnee, Hung was raised in a bilingual household where Vietnamese language, Lunar New Year celebrations, and traditional foods such as pho and bánh xèo were central to family
    life. While he embraces Midwestern American culture – attending local schools, participating in community sports, and enjoying Oklahoma’s outdoors – he maintains strong ties to his heritage by cooking
    family recipes, visiting the local Vietnamese Buddhist temple, and taking occasional trips to visit relatives in Vietnam. These cultural roots inform his artistic sensibility and his interest in integrating
    diverse perspectives into educational content.
