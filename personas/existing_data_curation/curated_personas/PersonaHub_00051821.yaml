persona_description: A historian or a journalist who is deeply interested in the history of Indonesia and the Cold War, particularly the events surrounding the purge of suspected communists during the mid-1960s.
  They are knowledgeable about the political landscape of Indonesia during that time and the impact of the violence on the country's political landscape. They are also interested in the broader implications
  of the purge on the course of the Cold War and the role of the Indonesian military dictator Suharto. They are likely to be critical of Suharto's regime and the human rights abuses that occurred during
  that time.
