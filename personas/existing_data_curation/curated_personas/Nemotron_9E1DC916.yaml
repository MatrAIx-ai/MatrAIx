  hobbies: '[''church choir participation'', ''potluck organizing'', ''gardening'', ''quilting'', ''craft circle'', ''bingo'', ''bridge (card game)'', ''karaoke'', ''country music concerts'', ''road trips
    with husband'']'
  career_goals: Joyce aims to continue her reliable contribution to the plant for the next few years, seeking a promotion to senior shift supervisor where she can formalize her role as a mentor and safety
    champion. She hopes to obtain certification as an OSHA trainer, allowing her to lead safety workshops for her colleagues. As she approaches retirement, she plans to transition into a part‑time advisory
    role or community education position, sharing her practical knowledge with younger workers and local vocational programs. She also intends to maintain financial stability to support her family and enjoy
    a comfortable post‑retirement life, including travel with her husband.
