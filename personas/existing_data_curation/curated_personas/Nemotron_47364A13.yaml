  career_goals: Gloria is focused on advancing within the engineering technology career ladder while maintaining the stability she values. Her short‑term goal is to complete a bachelor’s degree in Engineering
    Technology, building on her associate’s foundation. She also plans to earn the Certified Manufacturing Technologist (CMfgT) credential and become a Six Sigma Green Belt within the next two years. In
    the medium term, she aims to step into a senior technologist role, leading small project teams on equipment upgrades and process optimization initiatives. Ultimately, Gloria aspires to a supervisory
    or manager position where she can oversee plant operations, mentor junior technicians, and drive continuous improvement programs across the facility, all while preserving a balanced work schedule that
    supports her family.
