  hobbies: '["Gardening (vegetables and roses)", "Historical site visits and reading historical fiction", "Southern cooking and food preservation", "Raspberry Pi home‑automation projects", "Volunteer tech
    training for seniors", "Hiking in the Blue Ridge Mountains", "Birdwatching"]'
  career_goals: Misty aims to transition from a managerial role to a senior director position within the next five years, where she can shape organization‑wide technology strategies and champion cybersecurity
    resilience. She is committed to building a pipeline of women leaders in IT by establishing mentorship programs and partnerships with local colleges. Additionally, she wishes to launch a community digital‑inclusion
    initiative in Frederick‑sburg and Culpeper County, providing technology training for seniors and underserved youth, while maintaining a balanced work‑life schedule to support her family.
