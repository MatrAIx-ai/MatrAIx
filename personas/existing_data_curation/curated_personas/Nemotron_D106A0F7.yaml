personas:
  professional: A budding junior developer and storyteller, Karl Torrance merges coding, sketching, and LEGO engineering to prototype interactive narratives, thriving on creative freedom while often postponing
    organization.
  sports: A weekend member of the Kalamazoo Youth Soccer Club and a devoted Detroit Lions fan, Karl Torrance dribbles a soccer ball after school, rides a bike along the river trail for spontaneous fitness,
    and prefers unstructured play over formal training sessions.
  arts: A prolific sketch artist, Karl Torrance fills sketchbooks with fantasy scenes drawn from favorite books, listens to the music of Tame Impala and video‑game soundtracks while building LEGO dioramas,
    and draws inspiration from the vibrant murals at the Kalamazoo Institute of Arts.
  travel: A nature‑enthusiast explorer, Karl Torrance spends summer weekends on the Kalamazoo River Trail, has taken a school field trip to the Museum of Science and Industry in Chicago, and dreams of a
    road trip to the Grand Canyon for its dramatic vistas.
  culinary: An aspiring home‑chef, Karl Torrance loves customizing pepperoni pizza with extra veggies, perfecting cinnamon‑sugar pretzel bites, and occasionally crafting chocolate LEGO‑shaped treats after
    school cooking experiments.
  core: An imaginative 11‑year‑old who stitches stories, code, and bricks into a vivid personal universe, yet occasionally misplaces school supplies and forgets to tidy their workspace.
background:
  cultural: Karl grew up in a typical Midwestern family in Kalamazoo, Michigan, where community events, public libraries, and school art programs play a central role. His upbringing blends the region's
    emphasis on friendliness, self‑reliance, and a strong work ethic with exposure to a modest but vibrant local arts scene, including museum workshops and seasonal festivals. While his household reflects
    a predominantly white cultural heritage, his school and community provide opportunities to engage with diverse perspectives through multicultural celebrations and collaborative projects, shaping a balanced
    sense of identity rooted in both local traditions and broader creative influences.
attributes:
  skills: '[''Sketching and illustration'', ''Creative writing (short stories, comics)'', ''LEGO construction and design'', ''Basic coding with Scratch and Python'', ''Digital illustration using tablet
