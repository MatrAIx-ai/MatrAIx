  hobbies: '[''Reading fantasy and sci‑fi novels'', ''Sketching comics and character designs'', ''Building and storytelling with LEGO'', ''Coding simple games in Scratch and Python'', ''Exploring local
    nature trails for inspiration'', ''Playing sandbox video games like Minecraft'']'
  career_goals: While still young, Karl envisions a future where he can blend his love for art and technology. He aspires to become an illustrator or animator for fantasy books and video games, dreaming
    of creating his own comic series or designing immersive story worlds. He also imagines working on collaborative projects that let him experiment with new media, such as interactive storytelling platforms,
    while valuing the freedom to let his imagination guide the process.
