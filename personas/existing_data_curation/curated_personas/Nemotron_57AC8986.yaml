  hobbies: '[''Community volunteering'', ''Organizing neighborhood events'', ''Listening to R&B and gospel music'', ''Cooking soul food'', ''Pickup basketball'', ''Chess club'', ''Urban gardening'', ''Reading
    personal development books'', ''Listening to time management podcasts'']'
  career_goals: Williams aims to progress from individual housekeeper to supervisory roles, seeking a position as lead housekeeper or facilities coordinator within a large property management firm in Toledo.
    He wants to obtain the Certified Professional Housekeeper credential and gain expertise in sustainable cleaning practices. Over the next five years, he plans to launch his own small cleaning business
    focused on reliable, eco‑friendly services for local families and businesses, leveraging his organizational strengths and network. Additionally, he hopes to mentor aspiring cleaners, especially from
    the African‑American community, and contribute to workforce development programs.
