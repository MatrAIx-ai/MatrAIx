  hobbies: '[''Historical site exploration'', ''Photography'', ''Reading travel memoirs'', ''Hiking'', ''Mindfulness meditation'', ''Yoga'', ''Chess'', ''Volunteer work at historical societies'', ''Cooking
    Midwestern cuisine'']'
  career_goals: Kevin aims to transition from a frontline tour guide to a senior guide specializing in thematic tours such as historic Indianapolis, culinary experiences, and heritage rail trips. He plans
    to earn advanced certifications in adventure tourism and cultural heritage interpretation. Over the next five years, he hopes to take on a supervisory role, mentoring new guides and contributing to
    curriculum development for his company's training program. Ultimately, Kevin aspires to launch his own boutique travel company offering curated, immersive experiences for small groups, and to author
    a guidebook series that combines his storytelling talent with practical travel advice.
