personas:
  professional: Sandra Cabrera, a detail-oriented event planner in the Washington, D.C. metro area, leverages bilingual fluency, meticulous budgeting, and a curiosity for emerging technology to design inclusive
    hybrid conferences that honor community traditions while meeting strict timelines and fiscal goals.
  sports: Sandra Cabrera spends her weekends trekking the Anacostia River Trail and practicing Vinyasa flow at Tribe Yoga, supports the Washington Capitals during the NHL season, and occasionally joins
    the Prince George's County Running Club's 5 K races.
  arts: Sandra Cabrera captures the rhythm of D.C.'s streets through black-and-white photography, participates in a bilingual book club reading works by Isabel Allende and Juan Rulfo, and draws creative
    inspiration from the folk sounds of Lila Downs and the murals at the Anacostia Arts Center.
  travel: Sandra Cabrera favors thoughtfully curated cultural trips, such as a weekend wine tour in Loudoun County, a culinary road trip through New Orleans, and an upcoming itinerary to Buenos Aires to
    explore tango and street art, balancing adventure with her demanding event schedule.
  culinary: Sandra Cabrera excels at preparing aromatic stews like pepian and kak'ik and perfecting relleno de plátano, often sourcing heirloom corn, ripe plantains, and smoky chilies from the local farmers
    market, yet she sometimes spends too much time arranging the garnish, delaying dinner.
  core: Sandra Cabrera is a disciplined, curiosity-driven event strategist who blends meticulous planning with cultural storytelling, balancing a love for quiet reflection with bursts of culinary creativity.
background:
  cultural: Sandra was raised in a Guatemalan immigrant family, growing up with Spanish as her first language and a strong connection to Central American customs. Family gatherings centered around traditional
    foods, music, and the annual celebration of Día de la Independencia (September 15). The values of hard work, respect for elders, and communal support shaped her pragmatic yet curious outlook. Living
    in Hyattsville, a multicultural suburb of Washington, D.C., she bridges her heritage with the diverse fabric of Prince George’s County, participating in local Latinx festivals and community organizations.
    Her cultural identity influences her professional ethos, prompting her to create events that honor multicultural narratives and provide inclusive spaces for underrepresented communities.
attributes:
  skills: '["Event logistics and operations","Budget creation and financial oversight","Vendor negotiation and contract management","Hybrid and virtual event technology integration","Bilingual communication
    (English/Spanish)","Risk assessment and contingency planning","Timeline development and project scheduling","Client relationship management","Team coordination for small groups","Sustainable event design","Accessibility
    compliance","Post‑event data analysis and reporting"]'
  hobbies: '["Hiking in local parks","Yoga practice","Photography (urban and event documentation)","Cooking Guatemalan cuisine","Bilingual book club (Latin American literature)","Hand‑woven textile crafts","Volunteering
    at community cultural workshops","Exploring event technology trends","Video editing for event recap"]'
  career_goals: Sandra aims to become a senior director of events within a regional corporation or a leading nonprofit serving the Latino community in the Washington, D.C. metro area. She plans to earn
    the Certified Meeting Professional (CMP) credential and pursue advanced coursework in event sustainability and inclusive design. Over the next five years, she envisions launching her own boutique firm
    that specializes in culturally resonant conferences and community festivals, leveraging her Guatemalan heritage to create authentic experiences. She also hopes to mentor junior planners from underrepresented
    backgrounds, fostering a more diverse event‑industry pipeline.
