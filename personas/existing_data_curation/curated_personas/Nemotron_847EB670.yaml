personas:
  professional: Misleydis Hernandez, a 20‑year‑old budding graphic designer and visual storyteller, leverages Adobe Photoshop, Illustrator, and Premiere Pro alongside bilingual communication to craft vibrant
    campaigns for local nonprofits, while their curiosity fuels experimental mixed‑media projects and their occasional disorganization pushes them to thrive under tight deadlines.
  sports: Misleydis Hernandez enjoys the kinetic rhythm of salsa dancing as their primary fitness outlet, joins a weekend co‑ed volleyball league at the YMCA, and cheers for the Houston Astros, Dynamo,
    and Rockets, balancing competitive board‑game nights with a laid‑back approach to structured exercise.
  arts: Misleydis Hernandez immerses themselves in the downtown Houston indie scene, drawing inspiration from Frida Kahlo’s bold colors, Basquiat’s street‑art edge, and Henri Cartier‑Bresson’s photographic
    storytelling, while regularly showcasing abstract mixed‑media murals at The Art League and curating pop‑up galleries that amplify emerging community voices.
  travel: Misleydis Hernandez prefers spontaneous weekend trips, often hopping a bus to Austin’s live‑music scene or grabbing a budget flight to Oaxaca to capture street murals, while their limited student
    budget nudges them toward affordable hostels and couch‑surfing adventures rather than luxury resorts.
  culinary: Misleydis Hernandez delights in crafting homemade pupusas, tamales, and yuca frita with freshly grated cheese and a cajeta drizzle, balancing novice cooking skills with a confident flair for
    mixing traditional masa dough with experimental spice blends, and they pair these meals with fresh lime‑squeezed agua fresca and artisan coffee.
  core: Misleydis Hernandez is a curiosity‑driven, socially vibrant graphic design student who juggles artistic ambition with a penchant for last‑minute splurges, occasional anxiety, and an unfiltered love
    for salsa‑filled nights and midnight mural sessions.
background:
  cultural: Misleydis is a first‑generation Salvadoran‑American raised in the vibrant, multicultural neighbourhood of Spring, Texas. She grew up in a household where Spanish was spoken daily, and family
    traditions—from celebrating Las Posadas and the Feast of Our Lady of Guadalupe to cooking home‑style pupusas—instilled a strong sense of cultural identity. Her parents emigrated from El Salvador in
    the early 2000s, and she maintains close ties with the local Salvadoran community through church gatherings, cultural festivals, and a neighbourhood association that promotes Latino arts. While she
    embraces American customs and the diverse influences of Harris County, she blends them with Salvadoran rhythms, flavours, and visual motifs in her creative work. This bicultural perspective fuels her
    curiosity about hybrid art forms and informs her desire to represent Latino voices in the broader Texas art scene.
attributes:
