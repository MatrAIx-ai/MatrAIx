    competency and community outreach'']'
  hobbies: '[''Sketching and painting'', ''Street photography'', ''Cooking Salvadoran cuisine (pupusas, tamales, yuca frita)'', ''Salsa dancing and folk‑dance workshops'', ''Exploring art galleries and
    pop‑up exhibitions'', ''Participating in community mural projects'', ''Volunteering to teach art at local schools'', ''Playing trivia and board‑game nights'', ''Journaling and mindfulness sketching'',
    ''Yoga and casual fitness activities'']'
  career_goals: Misleydis aims to turn her passion for visual storytelling into a stable, full‑time career. She plans to complete her associate degree in Graphic Design, then pursue a bachelor’s in Communications
    while earning professional certifications in the Adobe Creative Cloud suite. In the short term, she seeks a junior graphic‑designer position at a Houston‑based digital agency or cultural nonprofit where
    she can leverage her bilingual skills to produce culturally resonant visual content. Over the next five years, she wants to build a freelance portfolio that includes branding for local Salvadoran businesses,
    social‑media campaigns for community events, and curated exhibitions showcasing contemporary Latino art. Ultimately, she dreams of opening her own creative studio that blends graphic design, photography,
    and cultural programming, providing a platform for emerging artists while supporting her growing family and offering financial stability to offset her sensitivity to stress.
