personas:
  professional: An aspiring community organizer, Stephen Thompson leverages their meticulous planning skills, hands-on repair experience, and compassionate communication to lead school projects and volunteer
    events, aiming to transition into a youth program coordinator role after completing an associate degree.
  sports: A versatile athlete, Stephen Thompson captains the Terre Haute Community Center basketball team, plays forward for the local Hoosier United soccer club, follows the Indiana Pacers and Indianapolis
    Colts passionately, and adheres to a disciplined fitness routine that blends early-morning runs, weekend pick-up games, and weekly strength training at the county gym.
  arts: A budding performer and set builder, Stephen Thompson volunteers with the Terre Haute community theater, occasionally steps onto stage in productions of Our Town and The Sound of Music, strums acoustic
    guitar in a garage band that covers The Lumineers, Bon Iver, and Sufjan Stevens, and draws inspiration from local folk festivals to craft original songs.
  travel: An inquisitive road-tripper, Stephen Thompson enjoys planning weekend getaways to Indiana's state parks like Shades and Turkey Run, has taken a school-organized cultural trip to Chicago to see
    the Art Institute, dreams of backpacking through the Scottish Highlands, but balances these aspirations with the modest budget of a high-school student and family responsibilities.
  culinary: A pragmatic home-cook, Stephen Thompson favors hearty Midwestern dishes such as pork tenderloin sandwiches, corn succotash, and homemade chicken pot pie, enjoys experimenting with fresh herbs
    like rosemary and thyme, and can reliably fix a breakfast omelet while still being the go-to person for grilling at community barbecues, though they sometimes forget to clean the grill promptly.
  core: A meticulously organized, community-focused teen, Stephen Thompson channels their curiosity, compassion, and occasional worry into leading projects, saving diligently, and balancing hands-on hobbies
    with a drive to help others.
background:
  cultural: Stephen grew up in Terre Haute and surrounding Clay County, a region with deep Midwestern roots characterized by a mix of agricultural and manufacturing heritage. His family’s background is
    typical of rural white Indiana households, with a strong emphasis on hard work, community involvement, and modesty. He was raised attending a local Protestant church, where service projects and fellowship
    encouraged his compassionate outlook. Local traditions such as county fairs, high school sports nights, and family gatherings at the community diner have shaped his social values. The prevailing Midwestern
    culture of practicality, politeness, and self‑reliance informs his everyday interactions and his desire to contribute positively to his community.
attributes:
  skills: '[''Event planning'', ''Team leadership'', ''Effective communication'', ''Basic carpentry'', ''Bike and small-engine repair'', ''Automotive maintenance'', ''Microsoft Office proficiency'', ''Video
