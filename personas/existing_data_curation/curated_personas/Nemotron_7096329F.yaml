  hobbies: '[''Basketball'', ''Soccer'', ''Community theater (acting & set design)'', ''Bike repair'', ''Small-engine tinkering'', ''Guitar playing'', ''Garage band'', ''Documentary watching (productivity,
    self-improvement)'', ''Mindfulness meditation'', ''Volunteer work at county fair'']'
  career_goals: Stephen aims to complete his GED within the next year and then pursue an associate degree in Business Administration or Social Work at a community college. He envisions a career that combines
    his organizational talent with his desire to help others, such as becoming a youth program coordinator for a nonprofit, a community outreach manager, or a school counselor. In the longer term, he hopes
    to lead a regional nonprofit that provides after‑school services and food security programs for families in rural Indiana. He also considers an apprenticeship in automotive repair if he decides to stay
    in a more hands‑on trade, valuing the practical skills and steady employment it would offer.
