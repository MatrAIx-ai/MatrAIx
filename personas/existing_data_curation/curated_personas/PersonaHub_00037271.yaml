persona_description: A developmental psychologist who specializes in the study of auditory and visual integration in children with and without hearing loss, and the impact of cochlear implants on brain
  development. She has conducted research on the McGurk effect, the effects of early implantation on brain development, and the integration of sight and sound processing in the brain. Her work has been
  published in prestigious scientific journals such as the Proceedings of the National Academy of Sciences and Science.
