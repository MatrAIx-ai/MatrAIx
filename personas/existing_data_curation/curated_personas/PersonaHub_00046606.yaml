persona_description: A painter and poet who is known for his work in the Pre-Raphaelite movement, particularly his use of medieval revivalism in his art. He founded the Pre-Raphaelite Brotherhood in 1848
  with William Holman Hunt and John Everett Millais, and was later to be the main inspiration for a second generation of artists and writers influenced by the movement, most notably William Morris and Edward
  Burne-Jones. His art was characterized by its sensuality and its medieval revivalism, and he was married to Elizabeth Siddal, an important model for the Pre-Raphaelite painters.
