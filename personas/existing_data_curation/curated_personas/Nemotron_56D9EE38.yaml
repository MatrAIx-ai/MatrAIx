personas:
  professional: Gean Jones, a seasoned fundraising strategist in the nonprofit sector, combines a STEM‑rooted expertise in Python data visualizations and Salesforce Nonprofit Cloud with a community‑service
    ethos learned from church and civil‑rights family traditions, crafting equity‑focused donor campaigns that blend meticulous organization with a competitive, data‑driven edge, thriving in small‑team
    collaborations.
  sports: Gean Jones enjoys weekend hikes along San Diego’s coastal bluffs, practices sunrise yoga at a local studio, supports the San Diego Padres and LA Galaxy, and participates in a small community running
    club that meets for 5K runs each Saturday, balancing solitary outdoor pursuits with modest team sports enthusiasm.
  arts: Gean Jones spends evenings immersed in contemporary literature by Toni Morrison and Ta‑Nehisi Coates, and frequents intimate jazz sessions featuring John Coltrane standards and improvisational sets
    by local saxophonist Maya Roberts, allowing the improvisational spirit of the music to echo their blend of curiosity and practicality.
  travel: Gean Jones prefers low‑key, purpose‑driven travel, often planning solo weekend retreats to the Joshua Tree desert or historic civil‑rights sites in Montgomery, while dreaming of a quiet coastal
    stay in Cinque Terre and a mindful yoga retreat in Bali, balancing curiosity with a cautious budgeting mindset.
  culinary: Gean Jones delights in crafting soulful kitchen creations such as shrimp and grits seasoned with smoked paprika, collard greens simmered with ham hocks, and sweet‑potato cornbread, often using
    fresh rosemary and sage from their native‑plant garden to infuse heritage flavors into modern meals.
  core: Gean Jones melds razor‑sharp analytical curiosity with a quietly competitive drive, turning anxiety into meticulous data‑driven fundraising while occasionally over‑analyzing social cues and hoarding
    spare coffee mugs as a quirky source of comfort.
background:
  cultural: Gean is a Black woman whose family roots trace back to the Southern United States, with grandparents who participated in the civil rights movement. Growing up in a multicultural environment
    in Southern California, she was shaped by the Black church’s emphasis on community service and resilience. Her cultural heritage instills a strong sense of responsibility toward uplifting underrepresented
    communities, influencing her career choice in fundraising for social impact. She actively engages with local Black professional networks and community organizations, drawing on her cultural identity
    to foster inclusive, data-informed fundraising practices that address systemic inequities.
attributes:
  skills: '["Data-driven fundraising strategy", "Donor database management (Raiser’s Edge, Salesforce)", "Quantitative grant writing", "Financial budgeting and forecasting", "Strategic campaign planning",
    "Project management and timeline coordination", "Small-group event coordination", "Data analysis and visualization (Python, Tableau)"]'
  hobbies: '["Reading contemporary African-American literature", "Scientific nonfiction reading", "Personal data visualization projects (Python, Tableau)", "Hiking local coastal and desert trails", "Yoga
    and meditation for stress management", "Cultivating a native‑plant garden", "Cooking and experimenting with soul food recipes", "Attending small-group jazz performances"]'
  career_goals: Gean aims to transition into a senior development leadership role, such as Director of Development, where she can design large-scale capital campaigns that prioritize equity and community
    impact. She aspires to spearhead fundraising initiatives for organizations serving underserved Black youth and health equity in San Diego County. Long-term, she envisions launching her own consulting
    firm that offers data-driven fundraising solutions and mentorship programs for emerging Black women professionals in the nonprofit sector. She is driven to achieve measurable growth for her organization
    while building a legacy of empowerment and resilience within her community.
