persona_description: A historian or archaeologist who specializes in the study of Native American cultures and migrations, particularly focusing on the Akonapi Indians. They have a keen interest in the
  Delawares and their interactions with the Akonapi, and have extensive knowledge of the ancient Walam Olum record and Brinton's work on the Akonapi. They are familiar with the identities of the Akonapi
  with the Akowini and Towakon, and have a deep understanding of the Delawares' interactions with the Ottawa. They are also knowledgeable about the concepts of subgroups, isomorphisms, and group theory,
  as well as the theory of group automorphisms.
