  hobbies: '[''Urban and street photography'', ''Skateboarding at local skate parks'', ''Listening to Afro‑Latin jazz, experimental hip‑hop, and reggaeton'', ''Creating experimental short videos and visual
    diaries'', ''Reading speculative and Afrofuturist literature'', ''Playing basketball in community courts'', ''Cooking traditional Puerto Rican dishes (mofongo, arroz con gandules)'', ''Attending local
    art and music festivals'', ''Exploring graffiti and mural art around Toa Alta/Toa Baja'', ''Learning basic graphic design for personal projects'']'
  career_goals: Ronel aims to become a recognized voice in Puerto Rican cinema by producing and directing short films and documentaries that foreground Afro‑Puerto Rican histories and contemporary experiences.
    He envisions launching an independent production company that experiments with hybrid storytelling—blending live‑action, animation, and emerging AR/VR techniques—to push narrative boundaries. A near‑term
    goal is to secure a slot at the San Juan International Film Festival and later target broader platforms like Sundance or the Guadalajara International Film Festival. He also plans to collaborate with
    local reggaeton and Afro‑Latin musicians on visually striking music videos, and eventually pursue formal film studies to deepen his theoretical grounding while maintaining his hands‑on, curiosity‑driven
    approach.
