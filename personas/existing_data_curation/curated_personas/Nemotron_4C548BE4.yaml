personas:
  professional: Ronel Pierre, a 20‑year‑old indie filmmaker, blends bilingual storytelling, hands‑on cinematography with Sony A7 series and RED cameras, and adaptive direction to craft vivid visual journals
    that celebrate local patron saint festivals and street‑art vibrancy while thriving under tight budgets and flexible schedules.
  sports: Ronel Pierre spends afternoons skating at the community park, joins pickup basketball games at the local gym, and cheers for the Santurce Cangrejeros baseball team while maintaining a relaxed
    fitness routine that blends street culture with occasional park workouts.
  arts: Ronel Pierre curates a personal photo series of Toa Alta’s murals, edits experimental short videos set to the beats of Bad Bunny, Residente, and underground Afro‑Latin jazz collectives, and immerses
    themselves in salsa nights and the annual Art Fest, letting the rhythm of bomba and plena shape both their visual storytelling and social gatherings.
  travel: Ronel Pierre prefers spontaneous road trips along the island’s coastal highways, exploring places like Rincón’s surf beaches, the rainforest trails of El Yunque, and the historic streets of Old
    San Juan, while dreaming of a future study tour to Berlin’s film scene and a low‑budget adventure to New York’s indie theater district.
  culinary: Ronel Pierre loves cooking mofongo with plantain, chicharrón, and garlicky sofrito, perfects a side of crispy tostones, and pairs the meals with a cold Medalla beer, yet they often forget to
    refrigerate leftovers, leading to occasional midnight snack runs for alcapurrias at the street cart.
  core: Ronel Pierre is a night‑owl filmmaker who captures every moment on camera, balances work with skate sessions, and lives on a flexible budget while never missing a beat of the island’s drum‑filled
    celebrations.
background:
  cultural: Ronel is an Afro‑Puerto Rican raised in the neighboring municipalities of Toa Alta and Toa Baja, a region where suburban living meets coastal vibrancy. His upbringing is steeped in bilingualism—Spanish
    at home and English at school—reflecting Puerto Rico’s complex colonial and American ties. His family’s African roots trace back to the island’s plantation era, fostering a strong sense of cultural
    pride and community solidarity. He participates in traditional celebrations such as the Fiestas Patronales and dances to bomba and plena, while also immersing himself in the contemporary Afro‑Latin
    music scene that dominates local playlists. The island’s street art, culinary traditions, and communal spirit have shaped his worldview, encouraging him to blend heritage with modern expression in both
    his personal life and creative pursuits.
