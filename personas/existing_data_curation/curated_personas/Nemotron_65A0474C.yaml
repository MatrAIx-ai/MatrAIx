personas:
  professional: Brandon Hinchliffe is a seasoned construction project manager with over 15 years of experience; they excel at budgeting, scheduling with MS Project and Primavera, and mediating stakeholder
    conflicts, blending a practical, methodical work ethic with a curiosity for emerging tech like BIM and sustainable materials.
  sports: Brandon Hinchliffe is a dedicated youth baseball coach who cheers loudly at Buffalo Bills games, follows the New York Knicks in winter, and runs with a local weekend running club at the Finger
    Lakes trailhead; they also join community soccer pickup games when time permits.
  arts: Brandon Hinchliffe immerses themselves in Civil War reenactments, curates historical exhibits at the Livingston County Historical Society, and enjoys the storytelling of Johnny Cash and the realism
    of Norman Rockwell paintings; they find inspiration in Ken Burns documentaries and often quote historical anecdotes during conversations.
  travel: Brandon Hinchliffe favors weekend road trips to the Finger Lakes for hikes and nearby Gettysburg for reenactments, has visited historic sites in Europe such as Normandy and the Imperial War Museum
    in London, and dreams of a summer trek through the Canadian Rockies; they plan each journey with a detailed itinerary that balances adventure with budget constraints.
  culinary: Brandon Hinchliffe enjoys hearty meals like slow‑roasted pork shoulder with apples, fresh Finger Lakes trout grilled with herbs, and indulgent Buffalo wings while watching the Bills, and they
    indulge in a guilty pleasure of midnight pizza delivery after late‑night project work.
  core: Brandon Hinchliffe is a methodical construction leader who channels competitive energy into community coaching, battles stress with jogging and caffeine, and meticulously balances sustainable ambition
    with a love for history; they often overthink decisions and can be skeptical of others' motives.
background:
  cultural: Brandon grew up in a small, predominantly white community in upstate New York, with family roots primarily in Irish and English ancestry. The local culture emphasizes hard work, self‑reliance,
    and close‑knit community ties, which shaped his dependable and organized nature. His liberal arts education fostered an appreciation for history and literature, influencing his involvement with the
    county historical society. Living in Mount Morris, he is attuned to rural sensibilities, seasonal outdoor activities, and regional pride in supporting local sports and small‑town events.
attributes:
  skills: '["Project Management", "Construction Scheduling", "Budgeting & Cost Control", "Building Code Compliance", "Team Leadership", "Safety Management", "Vendor Negotiation", "Risk Assessment", "Technical
    Drawing Interpretation", "Effective Communication", "Conflict Resolution"]'
  hobbies: '["Youth Baseball Coaching", "Hiking in the Finger Lakes Region", "Buffalo Bills Fan", "Historical Society Volunteering", "Collecting Civil War Literature", "DIY Home Renovation", "Morning Jogging",
    "Meditation"]'
  career_goals: Brandon aims to advance to a regional senior project director position, overseeing larger multi‑site developments and mentoring junior managers. He is pursuing PMP certification and LEED
    AP accreditation to lead sustainable building initiatives. Within five years, he hopes to launch his own consulting firm that helps small‑town contractors adopt modern project‑delivery methods while
    maintaining cost efficiency. He also seeks a healthier work‑life balance after his recent separation, dedicating more time to personal growth and community involvement.
