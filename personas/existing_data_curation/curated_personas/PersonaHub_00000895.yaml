persona_description: A Canadian teenager who is passionate about inventing and solving problems. Makosinski is a 15-year-old girl from British Columbia, Canada, who won the 15-16 age group category of the
  Google Science Fair for her innovative invention, the Hollow Flashlight. She is particularly interested in finding efficient, lightweight energy storage solutions and has developed a flashlight that runs
  on four Peltier tiles, converting heat into energy using the temperature differential between a person's hand and the ambient air. Makosinski's design has potential applications in classrooms, medical
  sensors, and cell phone charging, and she plans to use the scholarship funds and other prizes to further develop her invention.
