  hobbies: '[''Model ship building'', ''Birdwatching'', ''Crossword puzzles and sudoku'', ''Gardening'', ''Volunteering at senior center'', ''Historic preservation society'', ''Morning beach walks'']'
  career_goals: Although retired, Charles aims to preserve his health through regular walking, light strength exercises, and routine medical check‑ups. He aspires to deepen his community involvement by
    mentoring younger volunteers at the senior center and documenting his family’s history for future generations. Maintaining financial stability for his wife remains a priority, so he continues to monitor
    investments and explore low‑risk income options. He also hopes to travel to coastal destinations on carefully planned trips, such as Catalina Island and coastal Oregon, while staying within a predictable
    itinerary. Finally, Charles wishes to expand his horticultural knowledge by taking occasional adult‑education classes on native plant landscaping.
