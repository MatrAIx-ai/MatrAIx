  career_goals: Although retired, Andrew aims to leave a lasting legacy by mentoring younger generations in STEM, expanding the community garden he helped establish, preserving local Appalachian music and
    crafts, and mastering new digital tools such as photography and online learning platforms. He also aspires to document his family's Eastern European heritage for future descendants and to continue fostering
    harmony and cooperation within his volunteer circles.
