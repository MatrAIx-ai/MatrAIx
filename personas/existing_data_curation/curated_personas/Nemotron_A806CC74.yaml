personas:
  professional: Andrew Zivanov, a retired mechanical engineer with a knack for translating complex STEM concepts into everyday language, spends their days tutoring students, leading community workshops
    on safety and DIY repairs, and meticulously documenting garden and volunteer project plans, and they embody a blend of practical curiosity and organized optimism.
  sports: Andrew Zivanov, a devoted line‑dancer and weekend hiker, frequents the Blue Ridge trails for birdwatching while they cheer on the nearby Appalachian State Mountaineers football team and attend
    local high‑school cross‑country meets, blending low‑impact fitness with community spirit.
  arts: Andrew Zivanov, an accomplished fiddle player at Appalachian music festivals, draws inspiration from artists like Doc Watson, Alison Krauss, and the Carter Family, while they nurture a woodworking
    hobby that mirrors the craftsmanship of folk artisans such as William Morris, and their evenings often include watching classic films starring James Stewart.
  travel: Andrew Zivanov, an avid explorer of heritage and nature, has trekked the Great Smoky Mountains, visited historic Williamsburg, and plans a pilgrimage to the ancestral villages spoken of in their
    family stories, and they favor meticulously planned road trips with stops at local museums and farm‑to‑table eateries despite their modest travel budget.
  culinary: Andrew Zivanov, a garden‑to‑table enthusiast, delights in cooking heirloom tomato gazpacho, roasted sweet potatoes with fresh rosemary, and sourdough cornbread using home‑grown beans, and they
    approach each meal with modest skill, confidently grilling while still relying on pre‑made spice mixes for occasional stew.
  core: Andrew Zivanov blends a lifelong curiosity with practical hands‑on skills, turning every garden row, fiddle tune, and community workshop into a chance to connect, teach, and leave a lasting, albeit
    sometimes forgetful, legacy, and they cherish each small triumph as proof of their enduring vigor.
background:
  cultural: Andrew John Zivanov is a white American with Eastern European roots—his surname indicates Ukrainian or Russian ancestry—that his grandparents carried to Virginia. Raised in rural Galax, VA,
    he grew up immersed in Appalachian traditions while preserving family customs from his immigrant forebears. He participates in the local church, celebrates holidays with a blend of Southern hospitality
    and Eastern European dishes such as borscht and pierogi, and values self‑reliance, community cooperation, and hospitality—principles common to both Appalachian culture and his heritage.
