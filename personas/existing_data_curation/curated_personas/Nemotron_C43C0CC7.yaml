personas:
  professional: Todd Sherrer is a soon‑to‑graduate Business Administration student who channels a love for structured processes, Excel‑driven data analysis, and hands‑on problem solving into entry‑level
    operations roles, where their reliable yet flexibly assertive style aims to streamline logistics while pursuing a Lean Six Sigma Yellow Belt.
  sports: Todd Sherrer avidly follows the Houston Rockets and the Dallas Cowboys, and they spike a basketball whenever possible with the East Houston Rec League, while also hitting the trails at Brazos
    Bend State Park for cardio, blending fandom with hands‑on activity.
  arts: Todd Sherrer unwinds at local venues like The House of Blues Houston while blasting classic rock legends such as Led Zeppelin and The Rolling Stones, sways to country icons like George Strait, and
    they occasionally dig into sci‑fi novels by Frank Herbert for a creative boost.
  travel: Todd Sherrer prefers meticulously planned road trips that blend hiking in Guadalupe Mountains, weekend music festivals in New Orleans, and occasional culinary tours of Mexico's border towns, all
    while they budget to keep future business funding intact.
  culinary: Todd Sherrer boasts an intermediate cooking skill set, regularly preparing spicy chicken enchiladas, homemade salsa with cilantro and jalapeños, and savory chili con carne, while they also treat
    themselves to a rib‑smoked brisket at a local BBQ joint when the weekend calls.
  core: Todd Sherrer blends a methodical, process‑driven mindset with a hands‑on DIY spirit, balancing classic‑rock marathons and gaming binges against a disciplined budget, and they sometimes make impulsive
    tech purchases that betray their otherwise orderly routine.
background:
  cultural: Todd was raised in a suburban neighborhood of Houston, Texas, in a middle‑class, Anglo‑American family. His upbringing blended traditional Southern values—such as a strong work ethic, respect
    for community, and church involvement (Methodist)—with the multicultural influences of Houston’s diverse population. He grew up celebrating holidays like Thanksgiving and the Fourth of July with family
    barbecues, and his exposure to the city’s large Hispanic community fostered an appreciation for Tex‑Mex cuisine and Spanish phrases. These experiences, combined with a pragmatic, down‑to‑earth outlook
    typical of many young adults in the Greater Houston area, shape his cultural identity.
