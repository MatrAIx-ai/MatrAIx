  career_goals: Todd aims to complete his bachelor’s degree in Business Administration within the next two years and obtain a Lean Six Sigma Yellow Belt certification. He plans to secure an entry‑level
    role in operations or logistics at a regional shipping or manufacturing company, where he can apply his organizational strengths. Over the next five years, he aspires to move into a supervisory position,
    eventually managing a small team and streamlining processes. In the longer term, he hopes to open his own home‑repair and electronics‑service business, leveraging his hands‑on skills and desire for
    a predictable, self‑directed career path.
