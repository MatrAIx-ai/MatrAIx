personas:
  professional: Joseph Farraj, a 29‑year‑old surveillance specialist at an Omaha casino, leverages razor‑sharp observational skills, real‑time video analytics, and a methodical yet adaptable mindset to
    spot suspicious behavior while eyeing promotion to security manager, and they regularly draft clear incident reports that reflect a blend of analytical precision and practical Midwestern pragmatism.
  sports: Joseph Farraj follows the Nebraska Cornhuskers football team, hunts and fishes with a local club during summer, practices target shooting at the Omaha Precision Shooting Range, and hits the gym
    four times a week, mixing a competitive drive with a pragmatic view of personal health that they sustain through a regimented workout schedule.
  arts: Joseph Farraj spends weekends at Jerome’s Tavern catching live sets by country star Chris Stapleton and rock legend Bruce Springsteen, while unwinding at home with hefty biographies of World War II
    battles and classic Midwestern folk tales, letting the narratives feed their analytical mind, and they often quote obscure historical facts during conversations.
  travel: Joseph Farraj favours road‑trip adventures that blend natural solitude with historic intrigue, having camped in the Badlands and fished the Platte River, while dreaming of a pilgrimage to Normandy’s
    WWII beaches and a weekend escape to New Orleans for its music and cuisine, and they plan each trip with a flexible itinerary that balances budget constraints and a desire for spontaneous discovery.
  culinary: Joseph Farraj enjoys grilling Omaha‑style steak with a smoky paprika rub, whipping up spicy buffalo burgers topped with jalapeños and blue cheese, and occasionally mastering a hearty beef chili
    using a blend of ancho and chipotle peppers, reflecting a practical yet flavor‑curious palate, and they relish sharing these dishes at community potlucks.
  core: Joseph Farraj is a disciplined surveillance pro who balances a competitive poker habit and a love of Midwestern history with a laid‑back approach to planning, often juggling spreadsheets and fishing
    gear, and they occasionally forget to refill the coffee pot at work.
background:
  cultural: Joseph is a white American raised in Omaha, Nebraska, within a middle‑class family of European (predominantly German and Irish) ancestry. Growing up in the Midwest, he internalized values of
    self‑reliance, practicality, and modesty, while also embracing the community spirit evident at county fairs and local sports events. His bachelor's degree in the humanities broadened his cultural awareness,
    yet his daily work in casino surveillance immersed him in the unique gambling culture of the region. He identifies with the straightforward communication style typical of Midwesterners, values hard
    work, and respects the frontier independence that characterizes Nebraska's heritage. Though not overtly religious, he was exposed to Protestant traditions and occasionally participates in community
    volunteer activities.
