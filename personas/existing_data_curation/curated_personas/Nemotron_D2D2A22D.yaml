  career_goals: Joseph aims to advance to a senior surveillance officer or security manager position within the next three to five years, overseeing a team of guards and managing the surveillance infrastructure
    for a major casino or entertainment complex in Omaha. He plans to obtain professional certifications such as Certified Protection Professional (CPP) and Physical Security Professional (PSP), and is
    considering a master's degree in security studies or criminology to deepen his strategic expertise. Long‑term, he envisions founding his own private security consultancy focused on integrated physical
    and cyber‑physical surveillance solutions for local businesses, leveraging his blend of practical field experience and analytical training.
