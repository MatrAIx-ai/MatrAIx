  hobbies: '[''Visiting art galleries and museums'', ''Listening to live jazz'', ''Reading historical fiction and biographies'', ''Gardening (herbs and native plants)'', ''Senior book club'', ''Volunteering
    as museum docent'', ''Playing chess'', ''Cooking soul‑food with Caribbean influences'', ''Walking tours of Teaneck’s historic neighborhoods'', ''Attending cultural festivals (e.g., Juneteenth, Caribbean
    Night)'']'
  career_goals: Although retired from formal employment, Jamaica aims to continue shaping his community’s cultural landscape. He aspires to create a comprehensive oral‑history project documenting the experiences
    of Black families in Teaneck, to publish a memoir that weaves personal reflections with broader social change, and to mentor younger artists and activists through a series of workshops. He also hopes
    to earn a certification in digital preservation so he can assist the local historical society in safeguarding archival materials, and he plans to travel to major art festivals and museums across the
    United States to broaden his artistic perspective.
