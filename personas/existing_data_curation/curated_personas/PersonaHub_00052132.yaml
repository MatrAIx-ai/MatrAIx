persona_description: A music teacher who specializes in teaching students to play the organ, particularly focusing on the tempo management and cadence technique. The teacher has experience with various
  students and has observed tempo fluctuations in students playing the Two-Part Invention in C major, BWV 772. The teacher emphasizes the importance of counting out loud to prevent tempo fluctuations and
  suggests that students should master difficult passages before moving on to easier ones.
