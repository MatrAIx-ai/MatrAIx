  career_goals: Daisy aspires to study environmental science and marine biology at university, hoping to work on coastal conservation projects that protect the Chesapeake Bay and Atlantic shoreline. She
    envisions a career that blends field research with community outreach, allowing her to apply her practical skills and compassionate approach. In the short term, she aims to deepen her coding abilities,
    earn a high school diploma with strong science grades, and secure a summer internship with a local wildlife rehabilitation center.
