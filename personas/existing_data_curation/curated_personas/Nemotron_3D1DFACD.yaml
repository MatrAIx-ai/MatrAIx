  hobbies: '[''Hiking coastal and mountain trails'', ''Surfing and paddleboarding'', ''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Volunteer work at community garden'', ''Mentoring
    high school students in STEM'', ''Reading scientific and technical publications'', ''Woodworking'', ''Wine tasting in local vineyards'', ''Attending Mexican cultural festivals'']'
  career_goals: Jeronimo aims to move from first‑line supervision to an operations manager role within the next three to five years, eventually targeting a plant‑manager position at a company that prioritizes
    sustainable manufacturing practices. He plans to earn a Six Sigma Black Belt and pursue an MBA part‑time to complement his technical expertise with broader business acumen. In addition to climbing the
    corporate ladder, he wants to champion safety and environmental initiatives that reduce waste and energy use, and to mentor rising talent, especially members of the local Mexican‑American community,
    helping them enter skilled‑trade careers.
