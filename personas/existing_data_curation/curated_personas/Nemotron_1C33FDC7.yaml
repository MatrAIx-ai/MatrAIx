  career_goals: Zillah dreams of turning her love for art and cultural stories into a future career as an illustrator or museum curator, where she can share Native American narratives with a wider audience.
    She aspires to become a community storyteller who preserves her tribe’s oral traditions and teaches younger children about their heritage. At the same time, her curiosity about science and technology
    fuels an ambition to explore a path in STEM, perhaps as a space scientist or software developer, blending creativity with innovation. She also hopes to hold a leadership role in her school, such as
    student council president, to advocate for inclusive programs and cultural appreciation.
