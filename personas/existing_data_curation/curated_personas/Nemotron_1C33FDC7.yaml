personas:
  professional: Zillah Sharma is a budding young artist who blends watercolor, digital illustration, and bead jewelry to craft imaginative characters, applying their organized, methodical approach to each
    project while channeling their competitive edge in school art competitions.
  sports: Zillah Sharma loves playing on the neighborhood under‑8 soccer team, the Riverbend Rangers, cheering for the local professional soccer club, FC Harbor City, and spends weekends climbing trees
    and exploring Riverside Park, where they often challenge friends to mini‑trek contests.
  arts: Zillah Sharma draws inspiration from fantasy illustrators like John Howe and Hayao Miyazaki, spends free afternoons sketching scenes from the latest Harry Potter book, creates bead necklaces echoing
    tribal motifs, and attends community powwows where traditional drum rhythms fuel their creative imagination.
  travel: Zillah Sharma dreams of visiting the Grand Canyon and the Aurora Borealis after their family road‑trip to Yellowstone, and eagerly plans weekend outings to the local science museum and the coastal
    boardwalk, balancing their love for adventure with the constraints of school schedules and a modest travel allowance.
  culinary: Zillah Sharma enjoys snacking on mango‑glazed chicken wraps and experimenting with making simple fruit kebabs using pineapple and strawberries, while their budding cooking skills are evident
    in the occasional over‑salting of homemade spaghetti Bolognese, a quirk they laugh off after tasting the result.
  core: Zillah Sharma is a curious, energetic 10‑year‑old who fuses art, sport, and storytelling into a vibrant daily routine, though they sometimes splurge on Minecraft skins and forget their jacket on
    chilly evenings.
background:
  cultural: Zillah is raised by a family that proudly embraces their American Indian heritage, specifically belonging to the Lumbee community of North Carolina. Her household celebrates tribal traditions
    through storytelling evenings, seasonal powwows, and the practice of beadwork and basket weaving passed down from elders. She learns about the Lumbee history, values of respect for nature, and the importance
    of community solidarity. While living in Fayetteville, she participates in local cultural events at the North Carolina Museum of History and attends summer workshops on Native American crafts at the
    nearby tribal center. This blend of cultural immersion and modern upbringing informs her identity, encouraging a strong sense of pride, curiosity about her ancestry, and a desire to share her culture
    with peers.
