personas:
  professional: An accomplished electrician with an associate’s degree in electrical technology, Fatou Zaragoza masterfully handles residential and commercial wiring, conduit installation, and solar PV
    integration, applying their methodical, detail‑oriented mindset and competitive spirit to pursue master electrician certification and lay the groundwork for a sustainable contracting business.
  sports: A dedicated fitness enthusiast, Fatou Zaragoza races with the Austin Runners Club, incorporates bi‑weekly strength training at the Iron Forge Gym, cheers on Austin FC during MLS season, and roots
    for the Texas Rangers at baseball, blending disciplined workouts with local sports camaraderie.
  arts: A culturally hybrid artist, Fatou Zaragoza expresses rhythm through djembe performances inspired by West African masters like Fela Kuti, immerses in science‑fiction worlds by Ursula K. Le Guin and
    Nnedi Okorafor, and finds solace in the cinematic storytelling of Bong Joon‑ho and the lyrical depth of Billie Eilish.
  travel: An inquisitive traveler, Fatou Zaragoza has explored the historic streets of Fez, marveled at the solar farms of Seville, savored gumbo and beignets in New Orleans, and now dreams of trekking
    the volcanic landscapes of Iceland and hiking the coastal cliffs of Cape Verde on the next sabbatical.
  culinary: A culinary innovator, Fatou Zaragoza delights in merging Southern comfort flavors—shrimp and grits, collard greens sautéed with smoked turkey—with West African staples like jollof rice and suya‑spiced
    grilled chicken, frequently seasoning with smoked paprika, ginger, and okra, and perfecting plantain chips as a weekend kitchen experiment.
  core: A meticulous electrician and urban gardener, Fatou Zaragoza balances a competitive drive that fuels career ambitions with a lingering worry that fuels an ever‑growing balcony herb garden, while
    sometimes neglecting water schedules in favor of late‑night wiring plans.
background:
  cultural: Fatou belongs to the African‑American community in Marion, Arkansas, with family roots tracing back to West Africa—her given name "Fatou" reflects a Senegalese heritage. Her surname "Zaragoza"
    comes from a marriage that blended Hispanic influences, creating a multicultural household that celebrates African rhythms, Southern hospitality, and Spanish language traditions. She grew up attending
    church gatherings, community festivals, and family cookouts that emphasized resilience, communal support, and a strong work ethic, all of which shape her identity and outlook today.
attributes:
  skills: '["Residential wiring","Commercial conduit installation","Blueprint interpretation","NEC code compliance","Advanced troubleshooting and fault diagnosis","Solar PV system design and installation","Electrical
    load calculations","Project documentation and scheduling","OSHA safety training and compliance","Mentorship and team coordination"]'
  hobbies: '["Urban gardening","Cooking Southern and West African dishes","Reading science‑fiction novels","Running and strength training","DIY home improvement projects","Playing the djembe","Volunteering
    at STEM outreach programs","Learning Spanish"]'
  career_goals: Fatou aims to become a Master Electrician within the next two years, obtain certifications in renewable energy installations, and eventually launch her own electrical contracting firm specializing
    in sustainable residential projects. She also aspires to develop a training program for underrepresented youth in STEM, leveraging her competitive drive to build a reputable business that blends technical
    excellence with community impact.
