  career_goals: Carlos aims to transition into a senior solutions architect role within the next three years, leading cross‑functional teams to build innovative platforms that blend technology with artistic
    expression, such as a digital marketplace for visual artists. He plans to obtain AWS Solutions Architect and Certified Scrum Professional credentials, and eventually launch his own startup that leverages
    AI‑driven tools to empower creators. Parallel to his professional aspirations, he is committed to mastering advanced cloud security and continuously refining his leadership skills, while maintaining
    a structured schedule to manage stress.
