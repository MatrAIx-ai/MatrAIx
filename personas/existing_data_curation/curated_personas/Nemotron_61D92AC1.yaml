personas:
  professional: April Diggs, a veteran Purchasing Manager with more than thirty years of strategic sourcing, contract negotiation, and supplier diversity leadership, applies her methodical, organized mindset
    and assertive yet collaborative communication style to deliver measurable cost savings, drive data‑driven process improvements, and mentor the next generation of procurement professionals.
  sports: April Diggs stays active through daily walks along the St. Johns River, weekly Zumba classes, and cheers on the Jacksonville Jaguars and Jacksonville Jumbo Shrimp while occasionally joining a
    community rowing club during the cooler months.
  arts: April Diggs immerses herself in the arts by painting watercolors inspired by community narratives, attending talk series at the Jacksonville Museum of Contemporary Art, and drawing inspiration from
    artists like Claude Monet, Frida Kahlo, and Banksy, while also volunteering backstage at local theater productions.
  travel: April Diggs favors immersive cultural trips, having visited the Oaxaca Day of the Dead festival, the Edinburgh Festival Fringe, and the New Orleans Mardi Gras, and she plans her next adventure
    to the Osaka International Film Festival, balancing travel budgeting with her retirement savings goals.
  culinary: April Diggs enjoys experimenting in the kitchen, skillfully preparing dishes such as Thai green curry, Spanish paella, and Ethiopian injera during community cooking classes, while also favoring
    farm‑to‑table meals on her patio garden and indulging in occasional brunch outings at the local eatery Café L'Arome.
  core: April Diggs blends a sharp procurement mind with a vibrant artistic soul, juggling rigorous cost analyses by day and watercolor explorations by night, all while never missing a Zumba session and
    occasionally forgetting to water her patio plants.
background:
  cultural: April grew up in a close‑knit African‑American community in Jacksonville, where church, family, and neighborhood gatherings shaped her values of resilience, hospitality, and collective uplift.
    Her heritage is reflected in her pride for Black cultural traditions—from soul food cooking to the rhythmic influences of gospel and jazz. Over the years, she has blended Southern roots with a progressive
    outlook, championing education, civil‑rights awareness, and economic empowerment. This cultural foundation informs her professional focus on supplier diversity, community mentorship, and her personal
    love for art that tells stories of the Black experience.
attributes:
  skills: '[''Strategic Sourcing'', ''Supplier Negotiations'', ''Contract Management'', ''Cost Analysis'', ''Inventory Optimization'', ''Demand Forecasting'', ''ERP Systems (SAP, Oracle)'', ''Risk Management'',
    ''Supplier Diversity Programs'', ''Team Leadership'', ''Process Improvement'', ''Data-Driven Decision Making'']'
  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Community Theater Volunteering'', ''Book Club'', ''Cooking Exotic Cuisines'', ''Riverwalk Walking'', ''Zumba Classes'', ''Organic Gardening'',
    ''Traveling to Cultural Festivals'', ''Mentoring Young Professionals'']'
  career_goals: April aims to advance into a Director of Procurement or Supply Chain role, where she can shape corporate sustainability strategies and expand supplier diversity initiatives across the enterprise.
    She plans to earn the Certified Professional in Supply Management (CPSM) credential and is considering completing a bachelor’s degree in Business Administration to complement her associate’s credential.
    Mentorship is a personal priority; she wants to formalize a mentorship program for emerging Black professionals in procurement and eventually launch a consulting practice that helps regional companies
    build ethical and resilient supply chains.
