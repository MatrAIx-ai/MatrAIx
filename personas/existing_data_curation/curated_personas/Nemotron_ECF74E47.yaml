personas:
  professional: Alfred Pedraza is a seasoned secondary‑school STEM teacher who fuses bilingual instruction with hands‑on Arduino and Raspberry Pi projects, turning abstract concepts into vibrant STEAM lessons,
    yet they sometimes miss grant deadlines due to a spontaneous, art‑first mindset.
  sports: Alfred Pedraza enjoys weekend hikes with the Redwood Trail Club, follows the San Francisco Giants in spring and the Golden State Warriors in the winter, and they play recreational ultimate frisbee
    on a co‑ed team, balancing a love for low‑key outdoor exercise with occasional spirited game‑day gatherings.
  arts: Alfred Pedraza channels their imagination into abstract canvases inspired by Mark Rothko, experiments with acoustic guitar improvisations that echo John Cage’s avant‑garde techniques, and they attend
    speculative fiction readings and local art exhibitions, finding creative solace in the interplay of color, sound, and narrative.
  travel: Alfred Pedraza prefers spontaneous road trips that blend cultural immersion and natural wonder, having explored the historic streets of Oaxaca, trekked the towering redwoods of Northern California,
    and they dream of wandering the ancient ruins of Machu Picchu and the cherry‑blossom festivals of Kyoto.
  culinary: Alfred Pedraza delights in hand‑crafting rich mole negro with dried chilies, chocolate, and spices, rolling savory tamales with masa and roasted pumpkin filling, and they often experiment with
    avocado‑lime salsa and saffron‑infused paella, balancing seasoned confidence in the kitchen with occasional over‑seasoning that fuels playful, spicy mishaps.
  core: Alfred Pedraza is a creatively restless 45‑year‑old educator who weaves art into science, chases spontaneous tech projects, battles frequent anxiety with meditation, and they occasionally misplace
    deadlines amid a kitchen of simmering mole.
background:
  cultural: Alfred was raised in a Mexican‑American household where Spanish was spoken daily and family gatherings centered around music, food, and storytelling. He carries forward traditions such as Día
    de los Muertos celebrations and the preparation of festive dishes, infusing these cultural touchstones into his teaching through bilingual resources and culturally resonant examples. Living in San Leandro’s
    diverse Bay Area, he bridges his Mexican roots with the multicultural environment, fostering inclusive classroom practices that honor both his heritage and the varied backgrounds of his students.
attributes:
  skills: '[''Curriculum development (STEM/STEAM)'', ''Project‑based learning facilitation'', ''Bilingual instruction (English/Spanish)'', ''Educational technology integration (Google Classroom, Arduino)'',
    ''Laboratory safety management'', ''Mentoring and coaching'', ''Grant writing for educational programs'', ''Interdisciplinary lesson design'', ''Creative problem solving'', ''Community outreach and
    partnership building'']'
  hobbies: '[''abstract painting'', ''acoustic guitar'', ''Arduino electronics projects'', ''Mexican cooking'', ''poetry writing'', ''hiking'', ''mindfulness meditation'', ''sci‑fi/fantasy reading'', ''visiting
    art galleries'', ''volunteering at community garden'']'
  career_goals: Alfred aims to become a district‑wide STEAM coordinator, championing interdisciplinary curricula that weave artistic expression into science and mathematics. He hopes to secure funding for
    a makerspace at his school, providing hands‑on opportunities for underrepresented students. Long‑term, he aspires to pursue a Ph.D. in educational psychology to deepen his understanding of student anxiety
    and develop evidence‑based interventions. He also envisions authoring a textbook that integrates Mexican cultural perspectives into STEM education, thereby increasing relevance and engagement for bilingual
    learners.
