personas:
  professional: David Mcneal, a seasoned county property appraiser, leverages his systematic valuation expertise, GIS proficiency, and mentorship mindset to champion a pragmatic, structured transition to
    a fully digital appraisal system while allowing adaptable problem‑solving in a tight‑knit community, and they balance their exacting standards with a willingness to bend procedures for the good of the
    public.
  sports: David Mcneal, an avid early‑morning fly‑fisher on the Snake River and weekend hiker of the Sawtooth Mountains, laces up his boots with the local Fremont Trail Club, roots for the Idaho Falls Chukars
    baseball team, and they occasionally join a modest pickup basketball game at the community center during summer.
  arts: David Mcneal, who finds solace in the gentle strumming of John Denver and the storytelling of Willie Nelson, often visits the local historical museum’s art exhibits featuring Albert Bierstadt’s
    western vistas and enjoys occasional community theater productions starring regional actors like Susan Collins, while they nurture a nostalgic love for classic model‑train craftsmanship inspired by
    John Allen.
  travel: David Mcneal, who dreams of a relaxed five‑day fishing and hiking road trip to Yellowstone and Glacier National Parks with his wife, prefers to book modest lodgings and map out routes at the kitchen
    table while they leave room for spontaneous detours to small towns like Bozeman or Coeur d’Alene.
  culinary: David Mcneal, who relishes cooking fresh river‑caught trout drizzled with lemon‑dill butter, hearty Idaho potato casseroles, and garden‑grown tomato‑basil salads, boasts a competent home‑cook
    status but they occasionally over‑salt their dishes when distracted by late‑night model‑train tinkering.
  core: David Mcneal, a pragmatic yet easy‑going steward of his community, blends a lifetime of systematic property expertise with a love of quiet outdoors, modest frugality, occasional forgetfulness, and
    a steadfast belief that orderly stewardship can coexist with flexible, hands‑on craftsmanship.
background:
  cultural: David grew up in a multi‑generational white American family that settled in southeastern Idaho during the mid‑20th century, tracing ancestry to Northern European (primarily Scandinavian) immigrants
    who were drawn to the region’s farming and mining opportunities. The values of self‑reliance, modesty, and community service were reinforced by his involvement in a local church that emphasizes cooperative
    stewardship. Living his entire life in Sugar City, he internalized the tight‑knit, small‑town culture — a blend of agricultural heritage, respect for the outdoors, and a civic duty to support fellow
    residents. While proud of his heritage, he also acknowledges the broader cultural tapestry of the area, including the traditions of the indigenous Shoshone‑Bannock peoples and the diverse viewpoints
    within his county.
attributes:
  skills: '[''Real estate valuation'', ''Property tax assessment'', ''GIS and spatial analysis'', ''Data analysis and statistical modeling'', ''Regulatory compliance'', ''Report writing and documentation'',
    ''Customer service and public communication'', ''Budgeting and financial forecasting'', ''Negotiation and dispute resolution'', ''Mentoring and staff training'']'
  hobbies: '[''Fly fishing'', ''Hiking in the Sawtooth Mountains'', ''Gardening (vegetable garden)'', ''Woodworking'', ''Reading historical non‑fiction'', ''Volunteering with the local historical society'',
    ''Attending community potlucks'', ''Building model trains'', ''Reading business strategy books'', ''Home cooking for family'']'
  career_goals: Approaching retirement, David aims to leave a lasting imprint on Fremont County’s assessment practices by spearheading the transition to a fully digital appraisal system that blends rigorous
    data standards with user‑friendly flexibility. He hopes to formalize a mentorship program that pairs seasoned appraisers with newer employees, fostering a culture of cooperation and assertive problem‑solving.
    Over the next five years, he also plans to author a guide on equitable property tax methods for rural counties, positioning himself as a consultant after stepping down from full‑time duties. On a personal
    level, he seeks to solidify his family’s financial security, enabling a modest travel plan with his wife and occasional contributions to community projects he cares about.
