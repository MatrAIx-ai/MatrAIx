  career_goals: Even at a young age, Annette dreams of careers that let her care for and teach others. She often says she wants to be a teacher so she can share stories and help children learn, a doctor
    to keep her family healthy, and an artist to create pictures that make people smile. Her imagination blends practical curiosity about how things work with a deep desire to support her community.
