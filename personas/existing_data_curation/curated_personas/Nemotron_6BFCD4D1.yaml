personas:
  professional: Annette Adams, a budding junior scientist in the making, applies methodical curiosity to building block experiments and insists on following step‑by‑step instructions, yet often worries
    that a misplaced piece will ruin the whole project.
  sports: Annette Adams, an enthusiastic member of the preschool soccer club, loves cheering for the Chicago Cubs with her family, practices her kicks at the park’s tiny goal, but often pauses to check
    the ground for safety before sprinting, reflecting her cautious nature.
  arts: Annette Adams, a tiny Disney music enthusiast, sings along to Idina Menzel’s ‘Let It Go,’ draws elaborate Frozen characters during art time, and enjoys watching the animated series ‘Bluey’ for its
    gentle storytelling.
  travel: Annette Adams, a budding explorer of family weekend trips, delights in visits to the local zoo, remembers the magical ride at Disneyland in California, and dreams of seeing the cherry blossoms
    in Washington, D.C., while preferring car rides with her favorite stuffed rabbit tucked in her lap.
  culinary: Annette Adams, a budding kitchen helper, loves mac and cheese with extra cheddar, enjoys crunchy carrot sticks and apple slices, can stir pancake batter with a wooden spoon all by herself, but
    occasionally sneaks an extra drizzle of honey despite her parents’ gentle reminders.
  core: Annette Adams, a curious yet cautious four‑year‑old, blends methodical wonder with a tender heart, often worrying about tiny details while delighting in playful discovery.
background:
  cultural: Annette is raised in a close‑knit African‑American family in Pittsburgh, where community and cultural heritage are celebrated. Her parents emphasize family bonds, regular visits to a local church,
    and participation in community‑center programs that highlight African‑American music, storytelling, and history. She partakes in cultural observances such as Juneteenth and enjoys occasional trips to
    the August Wilson Center for African American Culture, fostering a strong sense of pride in her roots while growing up in the diverse neighborhoods of Allegheny County.
