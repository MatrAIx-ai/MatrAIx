personas:
  professional: Ashley Short is a methodical full‑stack web developer who leverages graduate business training and a disciplined Agile workflow to craft data‑driven, SEO‑optimized e‑commerce platforms for
    Cape May’s tourism businesses, and they consistently deliver clean code, thorough testing, and reliable AWS deployments while mentoring junior developers through structured project pipelines.
  sports: Ashley Short, a Cape May resident who favors low‑impact exercise, spends weekends hiking the wetlands with the local Cape May Hiking Club, follows the New Jersey Devils for NHL excitement, plays
    casual Sunday‑league beach volleyball at the boardwalk, and they maintain a disciplined routine of three brisk walks per week combined with monthly yoga sessions to balance solo reflection with team
    camaraderie.
  arts: Ashley Short nurtures their creative side through intricate knitting and crocheting projects inspired by the patterns of folk artist Margaret Taylor, enjoys the storytelling of classic novelist
    Jane Austen during quiet evenings, and they regularly attend performances at the Cape May Stage featuring actors like Larry Pine while listening to the acoustic melodies of contemporary singer‑songwriter
    John Grant to unwind after coding marathons.
  travel: Ashley Short prefers meticulously planned getaways, favoring short road trips to historic towns such as Philadelphia’s Old City and Newport, Rhode Island, while dreaming of a summer culinary tour
    of the Adriatic coast in Croatia to explore fresh seafood markets, and they balance travel with the need to maintain their garden by organizing watering schedules before each departure.
  culinary: Ashley Short enjoys cooking detailed New Jersey seafood dishes like She‑Crab Soup, blue‑crab cakes with Old Bay seasoning, and steamed clams in garlic‑butter broth, carefully following recipes
    from The Joy of Cooking, and they experiment with fresh herbs like dill and thyme harvested from their coastal garden to source ingredients for their seasonal meals.
  core: Ashley Short merges a love for structured problem‑solving with a penchant for solitary creativity, orchestrating code, gardens, and knits with precision while occasionally neglecting self‑care in
    pursuit of perfection.
background:
  cultural: Ashley was raised in a suburban community near Atlantic City, New Jersey, in a family with German‑Irish ancestry. The Mid‑Atlantic coastal culture—characterized by a strong work ethic, practical
    problem‑solving, and deep ties to seasonal tourism—has shaped her values of reliability, community involvement, and a pragmatic outlook. Her upbringing emphasized education and steady career progression,
    which aligns with her graduate business degree and methodical approach to technology. While identifying as white American, she embraces the diverse, close‑knit atmosphere of Cape May County, participating
    in local festivals, supporting small businesses, and maintaining a sense of regional pride.
attributes:
  skills: '["Full‑stack web development (React, Vue, Node.js, Django)", "Responsive UI/UX design", "Relational database design (PostgreSQL, MySQL)", "E‑commerce platform integration (Shopify, Magento)",
    "SEO and performance optimization", "Digital marketing analytics", "Agile/Scrum project management", "Business analysis and ROI alignment", "Version control (Git) and CI/CD (AWS)", "Cloud services (AWS)
    and infrastructure as code"]'
  hobbies: '["Coastal gardening", "Knitting and crocheting", "Crossword puzzles and Sudoku", "Cooking (seafood recipes)", "Volunteering at the historical society", "Hiking the Cape May wetlands", "Mentoring
    at community hackathons", "Board games with friends"]'
  career_goals: Ashley aspires to move into a senior technical leadership role where she can shape digital strategy for small‑business owners in the Cape May tourism and hospitality sector. Over the next
    five years she plans to earn AWS Solutions Architect certification, deepen her expertise in cloud‑native architectures, and lead cross‑functional teams delivering end‑to‑end e‑commerce solutions. Ultimately
    she envisions launching her own boutique web‑development consultancy that offers structured, data‑driven digital transformation services to local retailers and restaurants, leveraging her business acumen
    to drive measurable growth.
