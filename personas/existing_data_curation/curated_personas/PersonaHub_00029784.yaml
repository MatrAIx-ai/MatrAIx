persona_description: A radar astronomer who specializes in the study of asteroid radar imaging, particularly the techniques and applications of radar data collection and analysis. He is knowledgeable about
  the process of generating high-resolution images of near-Earth objects from radar data, and has experience with the 70-meter Deep Space Network antenna at Goldstone, California. He is also aware of the
  trajectory of asteroid 2005 YU55 and its proximity to Earth, and has expertise in the detection and understanding of puzzling structures on its surface.
