personas:
  professional: Julian Edgerson is a budding game designer who blends their love for Minecraft building and Scratch programming with a practical, structured mindset, turning imaginative level concepts into
    working prototypes while balancing the relaxed, spontaneous nature of their after-school activities.
  sports: Julian Edgerson regularly joins pick-up basketball games on the neighborhood court, cheering for the Los Angeles Lakers, and rides their bike with the local youth cycling club during weekend outings,
    preferring informal play over organized leagues.
  arts: Julian Edgerson channels the rhythmic flow of Kendrick Lamar and the soulful harmonies of Kirk Franklin into their homemade beats, while their comic sketches draw inspiration from the bold lines
    of Stan Lee and the vibrant colors of Studio Ghibli's Totoro, making digital art a central outlet for their creativity.
  travel: Julian Edgerson's travel style blends spontaneous family road trips to the Grand Canyon with a dream of exploring Tokyo's Akihabara district, favoring hands-on experiences like biking along coastal
    trails over meticulously planned itineraries.
  culinary: Julian Edgerson prefers quick, flavorful meals such as pepperoni pizza, chicken-tender wraps with honey-mustard sauce, and occasionally experiments with homemade chocolate chip cookies using
    dark chocolate chunks and sea salt, though cooking is more of a weekend hobby than a daily habit.
  core: Julian Edgerson is a structure-loving 12-year-old who builds digital worlds, collects Pokemon cards, and bikeshifts through neighborhood adventures, all while juggling a tendency to procrastinate
    and an unstoppable curiosity.
background:
  cultural: Julian grew up in a Black community within Columbus’s Hilltop area, where family ties, church, and local youth centers shape daily life. His parents and grandparents share stories of their Southern
    roots and the migration that brought their family to Ohio, instilling a sense of pride and resilience. Celebrations such as Juneteenth and Black History Month are marked with family meals, music, and
    storytelling, reinforcing his cultural identity. At school, Julian participates in the African American History club, learning about influential Black innovators in technology, art, and civil rights,
    which fuels his interest in coding and digital creativity. The rhythmic sounds of hip‑hop, R&B, and gospel that fill his home influence his artistic tastes and beat‑making hobby. Community programs
    like the Columbus Metropolitan Library’s STEM workshops and the local Boys & Girls Club provide supportive spaces where Julian can explore his interests while staying connected to a network that values
    teamwork, creativity, and mutual support.
