  career_goals: Julian dreams of turning his early fascination with technology and storytelling into a career in software development or video‑game design. In the short term he hopes to deepen his coding
    skills by learning Python through his school’s computer‑science electives and by participating in the robotics club. Long‑term, he envisions attending a high‑school program that offers advanced programming
    courses and eventually studying computer science at a university such as Ohio State. He also wants to give back to his neighborhood by creating after‑school workshops that teach other kids basic coding
    and digital art, combining his desire for a structured technical role with the flexibility to work on personal projects and collaborate in small, focused teams.
