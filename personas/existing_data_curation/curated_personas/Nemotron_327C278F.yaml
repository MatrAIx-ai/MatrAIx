personas:
  professional: Sheila Douglas, a seasoned civil engineer with a knack for marrying structural analysis and BIM modeling to the visual language of public art, leverages their calm, resilient demeanor to
    lead multidisciplinary teams while navigating New York’s building codes and tight budgets with a flexible, often improvised, project management style.
  sports: Sheila Douglas fuels their love of movement through weekend hikes with the Hudson Valley Trail Club, casual 5‑k runs with the local joggers’ group, and cheering on the New York Knicks and Rangers,
    while a flexible schedule lets them swap a yoga session for a pick‑up basketball game at the community center.
  arts: Sheila Douglas channels curiosity into weekly visits to MoMA and the Whitney, sketches street murals by artists like Shepard Fairey and JR, and sharpens improvisational wit at the Upright Citizens
    Brigade on open‑mic nights, blending the structural precision of engineering with the fluid spontaneity of performance art.
  travel: Sheila Douglas prefers spontaneous weekend escapes to the Hudson Valley’s wineries and art farms, while dreaming of a summer immersion in Barcelona’s modernist architecture and the Greek islands’
    sun‑lit markets, planning trips on a rough outline rather than rigid itineraries to keep space for unplanned artistic inspiration.
  culinary: Sheila Douglas, an intermediate home chef, delights in crafting Mediterranean plates like zucchini‑laden moussaka, chickpea‑rich shakshuka, and herb‑infused tzatziki, often sourced from Saturday’s
    farmers’ market stalls featuring heirloom tomatoes, Kalamata olives, and fresh rosemary.
  core: Sheila Douglas merges an engineer’s precision with an artist’s wanderlust, navigating life with calm resilience, a dash of disorganization, and an unquenchable appetite for spontaneous creativity.
background:
  cultural: Sheila is a white American woman raised in a middle‑class suburban environment in the Greater New York area, with family roots tracing back to the Northeast (primarily Irish and Anglo‑Saxon
    ancestry). Growing up near the cultural mosaic of Queens, she was exposed early to a blend of mainstream American values and the rich diversity of immigrant neighborhoods. This upbringing fostered a
    pragmatic work ethic and an appreciation for independence, while the multicultural vibrancy of her surroundings nurtured her curiosity for art, new ideas, and unconventional thinking. Her cultural lens
    combines a traditional emphasis on education and professional achievement with an open‑hearted embrace of the city’s artistic and communal spirit.
