  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Photography (urban landscapes and street art)'', ''Sketching architectural details'', ''Reading science fiction and futurist non-fiction'',
    ''Improvisational theater and open‑mic nights'', ''Cooking Mediterranean dishes'', ''Yoga and meditation'', ''Weekend hikes in the Hudson Valley'', ''Volunteering for community mural projects'']'
  career_goals: Sheila aims to become a senior project manager overseeing large‑scale urban infrastructure projects that blend functionality with public art. In the next five years she plans to obtain her
    Professional Engineer (PE) license, mentor young women engineers, and launch a boutique consultancy that specializes in art‑integrated public spaces and sustainable design for New York City. Long‑term,
    she envisions influencing municipal policy to promote resilient, aesthetically enriching infrastructure, while maintaining a flexible work schedule that allows for creative exploration and personal
    growth.
