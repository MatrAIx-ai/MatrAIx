personas:
  professional: Diana Guerrero, a retired community organizer and cultural curator, leverages her bilingual fluency, meticulous planning, and deep love for folk art to design senior‑center workshops, coordinate
    traveling folk‑art exhibitions across Roseville’s libraries, and mentor emerging leaders in intergenerational storytelling projects.
  sports: Diana Guerrero enjoys daily walks through Roseville’s arboretum, participates in weekly tai chi classes at the senior center, and faithfully cheers on the Sacramento River Cats during spring baseball
    season, combining gentle exercise with community spirit.
  arts: Diana Guerrero paints delicate watercolor scenes of California sunsets, curates folk‑art displays that spotlight contemporary Mexican artisans such as Guillermo Kuitca, frequents museum exhibitions,
    and finds inspiration in mariachi and ranchera melodies that echo through her studio.
  travel: Diana Guerrero’s travel style blends meticulous planning with spontaneous family reunions, having explored the historic streets of Oaxaca, trekked Yosemite’s granite cliffs, and scheduled a future
    pilgrimage to her ancestors’ village in Jalisco for an immersive cultural retreat.
  culinary: Diana Guerrero’s kitchen is a vibrant workshop where she prepares traditional mole poblano, hand‑rolled tamales, and fresh salsa verde using herbs and chilies from her garden, while regularly
    experimenting with fusion twists like chipotle‑infused paella and sharing generous meals with friends.
  core: Diana Guerrero is an 81‑year‑old, curiosity‑driven cultural steward whose disciplined organization, sociable energy, and love of art, food, and mentorship shape a lively legacy across her community.
background:
  cultural: Diana was born in the Yucatán peninsula and moved to California with her family in the early 1960s. Her upbringing blended traditional Mexican customs—such as Día de los Muertos altars, quinceañeras,
    and weekly family meals of mole and tamales—with the values of her new community in Roseville. She maintains strong ties to her Mexican heritage through language, cuisine, music, and folk art, while
    also embracing the multicultural environment of Northern California. A devout Catholic, she celebrates religious holidays with both Mexican and American traditions, and she actively participates in
    local Mexican‑American organizations that promote cultural exchange. Her bicultural identity informs her commitment to preserving stories of immigration, sharing Mexican artistry, and fostering intergenerational
    connections within the broader Roseville community.
