  career_goals: Even in retirement, Diana aims to leave a lasting cultural legacy in Roseville. She plans to lead a senior‑center program that celebrates Mexican heritage through workshops, storytelling,
    and intergenerational art projects. She hopes to curate a traveling exhibition of Mexican folk art for the city’s libraries and community centers. Diana also aspires to publish a memoir documenting
    her family’s journey from Mexico to the United States, preserving their stories for future generations. Finally, she seeks to mentor younger women in community leadership, encouraging them to pursue
    organized, impactful projects.
