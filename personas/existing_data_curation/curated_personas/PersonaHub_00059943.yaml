persona_description: A microbiologist and immunologist who specializes in the study of bacterial pneumonia and its potential impact on the heart. He has published research on the direct evidence of heart
  damage caused by the bacteria Streptococcus pneumoniae, and the role of the molecule CbpA in allowing the bacteria to enter the heart. His research has led to the development of a vaccine that prevents
  heart damage caused by bacterial pneumonia. He is also interested in the potential use of antibiotics to damage the heart.
