    ''Patrol scheduling and logistical planning'', ''Training and mentorship of junior officers'', ''Cultural liaison and arts program coordination'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Photography (landscape and urban)'', ''Hiking and backpacking in the Cascades'', ''Mountain biking on regional trails'', ''Kayaking on the
    Spokane River'', ''Community theater improv workshops'', ''Playing acoustic guitar and attending jam sessions'', ''Cooking and exploring new recipes'', ''Reading speculative fiction and fantasy novels'',
    ''Volunteering as a youth sports mentor'', ''Organizing neighborhood block parties and community events'', ''Collecting vinyl records from local bands'']'
  career_goals: Sammy’s primary career ambition is to advance to the rank of sergeant within the Spokane Police Department and eventually become a lieutenant overseeing the Community Affairs Unit. He envisions
    expanding the department’s partnership with local artists and cultural organizations, creating regular art‑based workshops, youth murals, and public‑safety exhibitions that promote dialogue and mutual
    respect. To support these goals, he plans to complete a bachelor’s degree in criminal justice or public administration, attend the Washington State Police Leadership Academy, and earn certification
    in crisis intervention and community mediation. Additionally, Sammy hopes to develop a specialized training curriculum that equips officers with cultural‑competency skills and encourages innovative
    problem‑solving approaches.
