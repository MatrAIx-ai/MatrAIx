personas:
  professional: Evelyn Cutner, a veteran STEM teaching assistant with three decades of lab instruction and safety expertise, merges analytical rigor with vivid imagination to craft interdisciplinary STEAM
    curricula that spark curiosity, while their relaxed attitude toward deadlines sometimes leads to last‑minute revisions, yet their collaborative nature ensures student‑centered outcomes.
  sports: Evelyn Cutner, a Dallas‑based enthusiast of low‑impact fitness, walks the Trinity River Trail almost daily, attends Dallas Mavericks games for social enjoyment, participates in a senior tennis
    club at the community center, and practices gentle yoga, favoring routine and community over competitive sports.
  arts: Evelyn Cutner, an avid watercolorist and mixed‑media creator, draws inspiration from the cosmic abstractions of Yayoi Kusama and the lyrical improvisations of John Coltrane, regularly attends gospel
    performances by The Clark Sisters, and leads a quilting circle that explores fractal patterns, weaving together visual, musical, and textile arts.
  travel: Evelyn Cutner, who prefers thoughtfully planned yet flexible getaways, enjoys weekend escapes to the Texas Hill Country’s wildflower fields, annual trips to New Orleans for jazz festivals, and
    dreams of a summer pilgrimage to Kyoto’s historic gardens, balancing cultural immersion with a modest travel budget.
  culinary: Evelyn Cutner, a confident home cook, blends rich comfort flavors by preparing collard greens with smoked turkey, sweet‑potato casserole topped with marshmallows, and jambalaya seasoned with
    paprika, thyme, and cayenne, often using fresh herbs from their garden to add a personal touch.
  core: Evelyn Cutner, a 61‑year‑old STEAM advocate, channels boundless curiosity into art‑science projects, balances a love of community with occasional disorganization, and combats chronic worry through
    yoga, meditation, and creative expression.
background:
  cultural: Evelyn is an African‑American woman who grew up in the vibrant Black community of Cedar Hill, Texas. Her family’s traditions are steeped in church life, gospel music, and the celebration of
    Juneteenth, honoring the legacy of emancipation and cultural pride. She values Southern hospitality, soulful cuisine, and the storytelling traditions passed down through generations. Evelyn’s upbringing
    was influenced by the civil‑rights activism of the Dallas area, fostering a deep commitment to education equity and community service. She draws inspiration from pioneering Black educators and integrates
    cultural narratives into her teaching, ensuring her students see themselves reflected in science. Her cultural identity remains a source of resilience, creativity, and connection to the broader African‑American
    diaspora.
attributes:
  skills: '[''Laboratory instruction'', ''Curriculum development'', ''Educational technology integration'', ''STEAM interdisciplinary teaching'', ''Scientific writing'', ''Data analysis'', ''Mentoring'',
