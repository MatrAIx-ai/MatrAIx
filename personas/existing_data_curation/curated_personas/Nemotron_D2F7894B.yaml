  hobbies: '[''Watercolor painting'', ''Abstract mixed-media art'', ''Reading speculative fiction'', ''Poetry writing'', ''Gardening'', ''Jazz and gospel music appreciation'', ''Quilting'', ''Cooking soul‑food
    inspired meals'', ''Yoga and meditation'', ''Community tutoring'']'
  career_goals: Evelyn aims to formalize her passion for the arts–science crossover by developing a district‑wide STEAM program that provides underrepresented youth in Dallas County with hands‑on research
    and creative expression opportunities. She aspires to transition into a senior instructional designer or adjunct professor role, where she can mentor new educators and shape inclusive curricula. Evelyn
    also hopes to secure a modest research grant to document effective interdisciplinary teaching strategies, and she dreams of publishing a reflective memoir that intertwines her scientific career with
    her artistic journey. Throughout these ambitions she seeks a flexible schedule that respects her need for self‑care and reduces stress, allowing her to continue volunteering at local community centers
    and practicing mindfulness.
