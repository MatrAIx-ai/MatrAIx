  career_goals: Although retired from formal employment, Jessica is committed to giving back to her community. She aims to mentor aspiring entrepreneurs, conduct financial‑literacy workshops for seniors,
    and serve on the board of a local nonprofit focused on youth development. She also plans to author a guide on retirement budgeting, maintain active participation in her church’s outreach programs, and
    prioritize her health and family relationships.
