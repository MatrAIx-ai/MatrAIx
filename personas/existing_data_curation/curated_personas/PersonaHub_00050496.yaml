persona_description: A lifelong advocate for women's rights and progressive causes, known for her tireless efforts to fight for equal rights and opportunities for women and marginalized groups. She was
  a tenured professor at Rutgers and pursued interests in issues of gender equality, and she was appointed to the U.S. Court of appeals for the District of Columbia in Washington, D.C. on June 14, 1993,
  and later confirmed to the Supreme Court on Aug. 3, 1993. She was known for her powerful dissents in cases such as Shelby County v. Holder, where she argued that the Voting Rights Act's protections should
  be upheld and that states should not be allowed to change their voting procedures without further supervision. She was also known for her majority votes on important social issues such as abortion rights,
  same-sex marriage, voting rights, immigration, health care, and affirmative action. She was the second woman ever to serve on the Supreme Court and will be the first woman to lie in repose at the Supreme
  Court and inside the Capitol. She was born on March 15, 1933 in Brooklyn, New York, and passed away on Sept. 18 of metastatic pancreatic cancer at the age of 87. She will be buried at Arlington National
  Cemetery alongside her husband.
