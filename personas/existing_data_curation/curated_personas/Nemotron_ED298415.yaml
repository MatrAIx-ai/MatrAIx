personas:
  professional: An aspiring digital illustrator, Sarah Matherne blends their disciplined approach with a love for fantasy storytelling, and they translate sketches into tiny storyboards using Scratch, aiming
    someday to develop interactive graphic novels.
  sports: An energetic junior explorer, Sarah Matherne spends Saturday mornings birdwatching at Riverside Park, laces up for weekly practices with the Brookside Tigers U12 soccer team, and they cheer loudly
    for the hometown baseball squad, the River City Raptors, whenever games are on TV.
  arts: A passionate creator, Sarah Matherne draws inspiration from the whimsical worlds of J.K. Rowling and the watercolor serenity of Claude Monet, crafts digital sketches in the style of artist Loish,
    practices piano pieces by Beethoven and Debussy, and they actively contribute to the school art club’s 'Fantasy Week' mural each semester.
  travel: An inquisitive traveler, Sarah Matherne has trekked the trails of Yosemite National Park, explored the interactive exhibits of the Smithsonian in Washington, D.C., and they eagerly anticipate
    a family trip to Kyoto’s Arashiyama bamboo forest, preferring meticulously planned itineraries that include bird‑watching stops and sketch‑breaks.
  culinary: A budding baker, Sarah Matherne delights in whisking up chocolate‑chip cookies with a pinch of sea salt and a dash of cinnamon, rolling out homemade pizza topped with fresh mozzarella and basil,
    and they keep a scrapbook of illustrated recipes alongside sketches of each dish.
  core: Sarah Matherne blends meticulous organization with boundless imagination, turning every art project, piano practice, and park excursion into a carefully charted adventure, even if they sometimes
    obsess over perfect symmetry in their drawings.
background:
  cultural: Sarah comes from a white Southern American family in Denham Springs, Louisiana. Her heritage includes Anglo‑American roots with some French‑Acadian influence common to the region. She grows
    up attending a local Methodist church, celebrating typical American holidays such as Thanksgiving and Christmas, while also taking part in regional traditions like Mardi Gras parades and community high‑school
    football games. The local cuisine, music (zydeco and blues), and the close‑knit community spirit shape her cultural experiences, fostering a sense of hospitality and pride in her Louisiana home.
attributes:
  skills: '[''Organized note‑taking'', ''Time management'', ''Project planning for school assignments'', ''Basic coding (Scratch)'', ''Digital illustration'', ''Drawing and sketching'', ''Reading comprehension'',
