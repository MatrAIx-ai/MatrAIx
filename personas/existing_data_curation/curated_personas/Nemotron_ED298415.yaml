  hobbies: '[''Drawing'', ''Painting'', ''Reading fantasy novels'', ''Writing short stories'', ''Birdwatching'', ''Rock collecting'', ''Playing piano'', ''Baking with family'', ''School art club'', ''Scratch
    coding club'', ''Event organization'']'
  career_goals: Sarah dreams of a future where she can combine her love for art, science, and organization. She aspires to become a museum curator or exhibition designer, envisioning herself creating immersive
    displays that educate visitors about nature and culture. She is also fascinated by environmental science and imagines a career as an environmental artist or marine biologist who uses visual storytelling
    to protect Louisiana’s wetlands. Her short‑term ambition is to improve her coding and artistic portfolio, aiming for a high‑school program focused on STEAM (science, technology, engineering, arts, mathematics).
