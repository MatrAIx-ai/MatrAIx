personas:
  professional: Carmen Arce is a seasoned bank teller with over 20 years of cash‑handling expertise, fluent bilingual communication, and a methodical, competitive drive that fuels their ambition to become
    a branch supervisor while mentoring staff and streamlining operations.
  sports: Carmen Arce channels their energy into salsa and marinera dancing, weekly trail‑runs in the Wasatch Mountains, follows the Real Salt Lake soccer team and the Utah Jazz, and belongs to the Midvale
    Hiking Club, where they often lead group outings on weekends.
  arts: Carmen Arce immerses themselves in the arts by learning salsa moves to the rhythms of Celia Cruz and Juan Luis Guerra, devouring contemporary Latin American novels by Gabriel García Márquez and
    Isabel Allende, and attending local theater productions directed by creators like Lin Manuel Miranda, all of which they discuss passionately at book club meetings.
  travel: Carmen Arce plans travel that balances cultural immersion and budget, having explored the historic streets of Cartagena, the Andean ruins near Cusco, and the vibrant markets of Oaxaca, while dreaming
    of a road trip along the Pacific Coast from San Diego to Monterey, and they always draft detailed itineraries months in advance.
  culinary: Carmen Arce’s kitchen showcases traditional dishes such as causa, lomo saltado, and ceviche, seasoned with cilantro, ají amarillo, and lime, complemented by herbs harvested from their modest
    garden, and they occasionally treat themselves to a weekend brunch at a local farm‑to‑table bistro.
  core: Carmen Arce, a 52‑year‑old banking professional, blends organized ambition with a love for dance, hiking, and home‑cooked heritage meals, while they juggle a skeptical eye toward new ideas and a
    habit of over‑planning their social calendar.
background:
  cultural: Carmen was born to Peruvian immigrants who settled in the United States in the 1970s. Growing up in a bilingual household, she learned Spanish at home and English at school, preserving Andean
    traditions such as celebrating Inti Raymi and preparing homemade dishes. Her family’s emphasis on hard work and community involvement shaped her values. After moving to Utah, she integrated into the
    Midvale community while maintaining strong ties to the Peruvian diaspora, regularly attending meet‑ups at the Peruvian Consulate and cultural gatherings. The blend of her Andean heritage and the outdoor,
    family‑oriented culture of Utah gives her a unique perspective that she brings to both her professional and personal life.
