  hobbies: '[''Salsa and marinera dancing'', ''Hiking and trail running in the Wasatch Mountains'', ''Cooking traditional Peruvian cuisine'', ''Gardening herbs and vegetables'', ''Volunteering at local
    cultural festivals'', ''Participating in a book club'', ''Cycling with her spouse'', ''Attending community fitness classes'']'
  career_goals: Carmen aims to advance within banking, aspiring to become a branch supervisor or assistant manager within the next five years. She plans to earn a bachelor’s degree in Finance while continuing
    her role as a teller. Her goals include leading a team, developing training programs for new tellers, and improving operational efficiency at her branch. Carmen also wants to become a financial‑literacy
    advocate in the Midvale community, offering workshops for Spanish‑speaking residents. Long‑term, she envisions a position in loan operations or small‑business banking where she can leverage her competitive
    drive to meet targets and build strategic partnerships.
