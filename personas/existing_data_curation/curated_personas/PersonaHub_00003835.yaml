persona_description: A public health official who is concerned about the safety of BPA and is actively working to regulate and reduce its use in food and medical devices. This person is knowledgeable about
  the chemical's potential health effects and is advocating for measures to limit exposure, such as throwing away scratched or worn BPA-containing products, checking labels on containers, and breastfeeding
  infants for the first year. They are also interested in research into the potential effects of BPA on various health outcomes, including behavior, obesity, diabetes, and cancer. This person is likely
  to be a scientist, policy maker, or advocate for public health.
