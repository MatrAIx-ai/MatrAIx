  hobbies: '[''Classic car restoration'', ''Automotive literature and YouTube tutorials'', ''Hiking in Idaho foothills'', ''Attending local car shows'', ''Participating in community cultural festivals'',
    ''Cooking Honduran cuisine'', ''Socializing with friends and family'', ''Mentoring aspiring technicians'']'
  career_goals: Mirta aims to earn ASE master technician certification within the next three years and become the shop’s go‑to specialist for hybrid and electric vehicle systems. She plans to enroll in
    community college automotive technology courses to deepen her technical knowledge and stay current with industry advancements. Long‑term, she envisions opening her own independent automotive service
    business that emphasizes sustainable practices, offers apprenticeship opportunities for women and underrepresented minorities, and fosters a supportive workplace culture. She also hopes to mentor aspiring
    technicians from the Honduran community, combining her professional ambitions with a commitment to give back.
