personas:
  professional: Mirta Ronda is a 24‑year‑old automotive technician who blends meticulous diagnostic skills, hands‑on proficiency with internal‑combustion, hybrid and electric vehicle systems, and a curiosity
    for emerging tech, while their practical, organized approach and calm under pressure make them the shop’s reliable go‑to specialist for complex repairs.
  sports: Mirta Ronda enjoys weekend hikes in the foothills of the Rockies and they join the Nampa Trail Runners club for trail runs, proudly cheering for the Boise State Broncos football team in the fall
    and the Idaho Steelheads hockey team in the winter, while their balanced approach to fitness blends structured cardio sessions with spontaneous bike rides when shop traffic eases.
  arts: Mirta Ronda finds inspiration in classic car design magazines and local street art, often listening to the guitar riffs of Carlos Santana and the soulful vocals of Shakira while cooking, and they
    regularly attend Boise Philharmonic concerts and community dance nights that keep their cultural roots alive through music and movement.
  travel: Mirta Ronda prefers meticulously planned road trips that combine scenic drives with off‑road hiking, having recently explored the volcanic landscapes of Costa Rica and the coastal charm of Maui,
    while they dream of future adventures to Japan’s cherry‑blossom festivals and the historic streets of Oaxaca, balancing a modest travel budget with a desire for cultural immersion.
  culinary: Mirta Ronda is an intermediate home cook who masters traditional baleadas with refried beans, queso fresco, and ripe avocado alongside hearty tamales stuffed with pork and masa, while they also
    experiment with grilled salmon drizzled with lime‑cilantro sauce, often pairing meals with a side of fresh mango salsa and a glass of local craft beer.
  core: Mirta Ronda blends a tireless curiosity for engines with a steady, community‑focused mindset, yet they can’t resist a midnight snack of stale chips after a long shift and occasionally forget to
    turn off the shop lights, leaving a soft hum of idle equipment as a reminder of their occasional absent‑mindedness.
background:
  cultural: Mirta is a first‑generation American of Honduran descent. She grew up in a bilingual household, speaking Spanish at home and English in school, which gave her a deep appreciation for both cultures.
    Her family maintains strong ties to Honduran traditions, celebrating events like Semana Santa and Semana de la Independencia with music, dance, and traditional foods. These cultural roots instill in
    her a sense of community, resilience, and respect for family values. Living in Nampa, Idaho, she bridges her Central American heritage with the local community by participating in multicultural events,
    supporting fellow Honduran immigrants, and sharing her cultural cuisine, while also embracing the work ethic and practicality that define her identity as an automotive technician.
attributes:
  skills: '[''Engine diagnostics'', ''Brake and suspension repair'', ''Transmission service'', ''Electrical and electronic systems troubleshooting'', ''Hybrid and electric vehicle maintenance'', ''Welding
