personas:
  professional: Shiran Guillama, an aspiring data analyst and front-end developer, leverages Python, JavaScript, and data-visualization tools to turn local agricultural data into clear, actionable dashboards,
    thriving in collaborative, loosely structured sprints that satisfy their curious yet pragmatic mindset and dedication to community impact.
  sports: Shiran Guillama stays active by hiking coastal trails with the Monterey Bay Hiking Club in the spring, playing in a local women's soccer league that rallies behind the San Jose Earthquakes during
    the MLS season, and catching occasional surf sessions at Santa Cruz in summer, preferring flexible, low-commitment fitness over rigid training regimens.
  arts: Shiran Guillama channels their artistic side by strumming acoustic renditions of Bob Dylan and Joni Mitchell on their guitar, sketching vibrant digital illustrations inspired by Hayao Miyazaki’s
    animation, and losing themselves in sci-fi novels by Neil Gaiman, which together shape a reflective yet imaginative outlook.
  travel: Shiran Guillama favors spur-of-the-moment road trips along the Pacific Coast, often camping in Yosemite or catching sunset waves in Santa Cruz, while saving up for a future pilgrimage to Oaxaca
    to join family celebrations, balancing their modest student budget with a love for immersive cultural experiences.
  culinary: Shiran Guillama enjoys cooking beloved family recipes such as spice-rich pork carnitas and hand-made tamales using fresh Monterey market avocados, heirloom tomatoes, and locally sourced corn,
    skillfully blending traditional flavors with experimental twists while hosting casual dinner parties for friends.
  core: Shiran Guillama is a community-oriented tech enthusiast who trades meticulous code for spontaneous guitar jam sessions, balances disciplined data analysis with a habit of missing bill due-dates,
    and finds solace in hiking and family feasts.
background:
  cultural: Shiran grew up in a Mexican-American household in Salinas, a city known for its agricultural roots and vibrant Latino community. Her parents raised her bilingually, instilling a deep appreciation
    for Mexican traditions—such as festive celebrations, family meals, and respect for elders—while also navigating the multicultural landscape of California. The blend of her heritage and the local farming
    culture has shaped her identity, giving her a strong sense of community responsibility and an interest in how technology can support the people and environment around her. She frequently visits her
    extended family in nearby towns, participates in community gatherings, and carries forward the values of cooperation, humility, and cultural pride.
