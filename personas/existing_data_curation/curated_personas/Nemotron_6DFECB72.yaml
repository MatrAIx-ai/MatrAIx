  career_goals: Shiran aims to translate her curiosity for emerging technologies into practical solutions that benefit her community. In the short term, she hopes to secure an internship or entry-level
    role as a data analyst or front-end developer with a local agritech firm or a nonprofit focused on STEM education, where she can apply her analytical skills while collaborating in supportive teams.
    Long-term, she envisions pursuing a master’s degree in data science or environmental engineering, eventually leading projects that use data-driven insights to improve sustainable farming practices in
    the Salinas Valley. Throughout her career, she wants to stay flexible, continue learning new tools, and mentor other young Mexican-American students interested in tech.
