  skills: '[''AutoCAD'', ''SketchUp'', ''Revit'', ''Space Planning'', ''Material Specification'', ''Sustainable Design'', ''Budget Management'', ''Code Compliance'', ''Project Coordination'', ''Color Theory'']'
  hobbies: '[''Sketching design concepts'', ''Reading design journals'', ''Succulent gardening'', ''Interior photography'', ''Woodworking'', ''Yoga'', ''Mindfulness meditation'', ''Cooking'', ''Listening
