persona_description: A researcher and advocate for maternal and child health, particularly in the context of violence and low birth weight. They are interested in understanding the interplay between violence
  experienced by pregnant women and the subsequent health outcomes for their infants, including low birth weight and associated health problems. They are also concerned with the potential intergenerational
  effects of poverty and violence on health and income. They are likely to be a member of the medical community, such as a pediatrician, obstetrician, or researcher, and are familiar with the latest research
  and policies related to maternal health and violence against women.
