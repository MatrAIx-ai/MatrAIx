persona_description: A computational biologist who specializes in molecular phylogenetics, particularly in the use of Bayesian inference methods such as Markov chain Monte Carlo (MCMC) algorithms for maximum
  likelihood estimation of phylogenetic trees from DNA sequences. They are likely to be familiar with software tools such as MrBayes, BEAST, and MrModeltest, as well as theoretical concepts in molecular
  evolution, such as the relationship between molecular phylogenetics and phylogenetic inference. They may also have expertise in data analysis, such as the use of NEXUS file format for systematic information
  and the use of NEXUS format in phylogenetic analysis. They may also be interested in the reliability and accuracy of Bayesian posterior probabilities and bootstrap frequencies in phylogenetic inference,
  as evidenced by their references to Felsenstein and Swofford.
