  hobbies: '[''Beach Walks & Photography'',''Gardening'',''Reading (marine biology, local history, classic literature)'',''Knitting & Quilting'',''Cooking (seafood experimentation)'',''Small‑Group Book
    Club'',''Shoreline Clean‑up Volunteering'']'
  career_goals: Although currently not in the formal workforce, Lesley aims to expand her impact by taking on a leadership role in local environmental and community organizations, develop a small consulting
    practice focused on sustainable living for coastal homeowners, and eventually author a guidebook that blends practical home‑management advice with ecological stewardship. She also hopes to mentor younger
    volunteers and secure a financial cushion that supports a comfortable retirement lifestyle.
