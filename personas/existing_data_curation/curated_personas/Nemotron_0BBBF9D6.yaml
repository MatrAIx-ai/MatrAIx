  hobbies: '[''DIY home projects'', ''Gardening'', ''Cooking Mexican cuisine'', ''Soccer (Liga MX)'', ''Attending cultural festivals'', ''Fishing'', ''River trail walking'', ''Reading interior design magazines'',
    ''Community volunteer painting'']'
  career_goals: Luis aims to expand his expertise into a boutique painting and paper‑hanging business that emphasizes sustainable, decorative finishes for homes and community spaces in Toledo. He plans
    to earn certification as a green‑building painter and eventually mentor apprentices, sharing his reliable work ethic and compassionate client service. He also hopes to secure steady, low‑stress contracts
    that allow him to provide financial stability for his family while giving him time for personal well‑being.
