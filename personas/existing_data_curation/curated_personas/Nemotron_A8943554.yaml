personas:
  professional: Belinda Martin, an aspiring marine‑science storyteller, blends her love of fantastical creature illustration, LEGO architecture, and beginner‑level coding to design interactive models of
    Gulf tide‑pool ecosystems, approaching each project with vivid imagination, meticulous organization, and a competitive drive to win school science fairs.
  sports: Belinda Martin, a budding swimmer and beach‑volleyball enthusiast, trains with the Dolphin Bay junior swim team, kick‑starts weekend games on the Gulf shoreline, follows the Houston Astros and
    Dallas Cowboys for inspiration, and competes in local youth soccer leagues where her competitive spirit fuels her drive to improve lap times and match scores.
  arts: Belinda Martin channels her vivid imagination into drawing intricate fantasy creatures inspired by the whimsical worlds of Hayao Miyazaki and the ethereal illustrations of James R. Eads, writing
    short adventures in a journal that echo the storytelling style of Neil Gaiman, while listening to soulful blues legends like B.B. King and modern indie band Tame Impala during family evenings of music
    and art.
  travel: Belinda Martin prefers small family road trips along the Texas Gulf Coast—she has explored Padre Islander National Seashore and dreams of snorkeling the coral reefs of Belize, while also longing
    for a cultural visit to New Orleans to experience its vibrant music festivals and the deep‑rooted traditions she glimpses during Juneteenth celebrations at school.
  culinary: Belinda Martin enjoys the bold flavors of collard greens, black‑eyed peas, and seasoned Gulf shrimp tacos, often helping to whisk together lime‑cilantro sauce for taco night, experimenting with
    drawing edible sea‑creature platters, and eagerly tasting cinnamon‑spiced apple pancakes that remind her of Sunday brunches with her grandparents.
  core: Belinda Martin is an eight‑year‑old imagination powerhouse who builds LEGO tide‑pool kingdoms, tracks every allowance cent, battles occasional asthma, and never misses a chance to sketch a sea monster
    while humming soulful blues.
background:
  cultural: Belinda comes from an African American family with roots in the Southern United States; her grandparents migrated from the Mississippi Delta region. Living in Corpus Christi, she blends this
    heritage with the vibrant coastal culture of South Texas. Family gatherings often feature soulful music, collard greens, black‑eyed peas, and Gulf seafood dishes. She participates in community events
    such as Juneteenth celebrations, local school cultural fairs, and church activities that emphasize storytelling and community support. This mix of African American traditions and Texas coastal influences
    shapes her appreciation for music, art, and a strong sense of community.
