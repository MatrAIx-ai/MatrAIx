  career_goals: She aspires to become a marine biologist or astronaut who can explore the unknown depths of the ocean or space, and also dreams of illustrating and authoring children’s books that spark
    curiosity in other kids. Her competitive streak drives her to aim for top honors in science fairs, art contests, and school competitions.
