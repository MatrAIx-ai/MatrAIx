personas:
  professional: Liza Prince merges a data‑driven business education with people‑focused career counseling to design and lead strategic career‑development initiatives at a regional university, where their
    competitive drive pushes them to adopt technology‑enhanced guidance platforms while their community‑oriented values keep workshops interactive and accessible.
  sports: Liza Prince is a regular participant in the Bentonville Trail Runners club, competes in seasonal charity 5K races, hikes the Ozark hills on weekends, and avidly supports the Arkansas Razorbacks
    football team and the St. Louis Cardinals baseball club, balancing competitive spirit with community fitness events.
  arts: Liza Prince shines on stage with the local community theater troupe performing classics like "Our Town", leads a book club that frequently discusses works by Margaret Atwood and Toni Morrison, and
    finds inspiration in the photography of Ansel Adams and the music of Dolly Parton, weaving creative expression into every social gathering.
  travel: Liza Prince enjoys meticulously planned road trips through the Midwest, cherishes a recent weekend getaway to Asheville, North Carolina for its arts scene, dreams of exploring Savannah’s historic
    squares and the vibrant streets of New Orleans, and balances spontaneous weekend hikes with budget‑conscious travel.
  culinary: Liza Prince delights in hosting dinner parties featuring Southern‑style fried catfish, honey‑glazed carrots, and a side of buttery corn succotash, while experimenting with Mediterranean dishes
    like lemon‑roasted chicken, seasoning with fresh rosemary, thyme, and locally sourced heirloom tomatoes.
  core: Liza Prince is a socially magnetic, data‑savvy career counselor who balances competitive ambition with community‑centric generosity, all while navigating anxiety through yoga, theater, and strategic
    budgeting.
background:
  cultural: Liza grew up in a middle‑class, white family in the Midwest before moving to Arkansas for graduate school. Her upbringing emphasized self‑reliance, education, and community involvement, values
    that blend with the Southern hospitality she experienced in Bentonville. Living in the corporate hub of Walmart, she is exposed to a pragmatic, results‑oriented culture while maintaining strong ties
    to local traditions such as volunteerism and neighborhood gatherings. This mix of Midwestern work ethic and Southern community spirit informs her balanced outlook, practical curiosity, and competitive
    drive.
attributes:
  skills: '["Career counseling", "Student assessment (Strong Interest Inventory, MBTI)", "Program development and evaluation", "Strategic planning and budgeting", "Public speaking and workshop facilitation",
    "Data analysis for outcome tracking", "Conflict resolution", "Networking and partnership building", "Business consulting for educational initiatives", "Client-centered advisory techniques"]'
  hobbies: '["Community theater", "Book club", "Hosting dinner parties", "Hiking in the Ozarks", "Running in charity races", "Yoga", "Nature photography", "Volunteer tutoring", "Trivia contests", "Chess"]'
  career_goals: Liza aims to advance from her current counseling role to a director-level position overseeing career services for a regional university or a nonprofit focused on workforce development. She
    wants to spearhead the integration of technology‑enhanced guidance platforms, publish research on effective counseling interventions, and influence state education policy on career readiness. In the
    longer term, she envisions launching her own consultancy that helps schools and small businesses design strategic career development programs, blending her business acumen with her passion for helping
    individuals find purposeful work.
