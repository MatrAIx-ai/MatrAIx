persona_description: A Brazilian educator who is knowledgeable about the Individualized Educational Plan (IEP) and its implementation in schools. They have experience in the development and evaluation of
  educational plans for students with disabilities and are familiar with the legal framework and guidelines for the creation and execution of IEPs in the United States. They have a strong understanding
  of the role of the IEP in promoting inclusion and equity in education for students with disabilities. This persona is likely to be involved in the development of educational policies and practices related
  to the inclusion of students with disabilities in the general education curriculum, and is interested in the implementation of IEPs in Brazilian schools.
