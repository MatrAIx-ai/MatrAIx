  career_goals: Raquel aspires to expand her impact beyond bedside care by leading community‑based health initiatives in Villalba. She aims to obtain a certification in geriatric nursing and develop a senior
    wellness program that integrates mental‑health support, nutrition, and physical activity. Additionally, she hopes to become a part‑time nursing educator at a local community college, sharing her practical
    knowledge and cultural insights with the next generation of nurses. Raquel is also interested in advocating for mental‑health resources for the elderly in rural Puerto Rico and plans to collaborate
    with churches and civic groups to establish support groups. Her long‑term ambition is to create a sustainable network of volunteers and healthcare professionals that promotes holistic well‑being for
    the island’s aging population.
