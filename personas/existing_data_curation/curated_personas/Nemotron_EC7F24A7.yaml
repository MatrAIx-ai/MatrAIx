personas:
  professional: Raquel Olivares, a veteran registered nurse with over three decades of primary and community care experience, leverages her meticulous assessment skills, bilingual communication, and deep
    compassion to harmonize interdisciplinary teams while navigating her spontaneous schedule with a pragmatic curiosity about emerging health technologies.
  sports: Raquel Olivares enjoys rhythm-filled cardio through bomba and salsa dance sessions, hikes the nearby Sierra de Cayey trails with the Villalba Trail Trekkers club, and avidly follows the Cangrejeros
    de Santurce baseball team while participating in a senior walking group that meets every Saturday.
  arts: Raquel Olivares finds creative fulfillment in the church choir and listening to salsa legends like Willie Colón, Rubén Blades, and Marc Anthony, while also indulging in classic films starring Rita
    Hayworth and contemporary novelas for cultural storytelling.
  travel: Raquel Olivares prefers short, soulful getaways to coastal Rincón for sunrise swims and historic Old San Juan for its plazas, yet dreams of a cultural pilgrimage to Cartagena's Caribbean festivals
    and Portugal's Algarve cliffs, balancing limited travel budget with a yearning for vibrant community immersion.
  culinary: Raquel Olivares cooks traditional Puerto Rican dishes such as arroz con gandules, lechón, and pasteles with a practiced hand, infusing each recipe with homemade sofrito, adobo seasoning, and
    fresh cilantro, while also experimenting with tropical fruit salsas on grilled fish for friends.
  core: Raquel Olivares blends a heartfelt nursing career with lively dance, garden serenity, and community service, all while navigating occasional anxiety and a love for spontaneous culinary adventures.
background:
  cultural: Raquel Olivares was born and raised in the rural municipality of Villalba, Puerto Rico. Growing up in a close‑knit, predominantly Spanish‑speaking community, she was immersed in the island’s
    rich traditions, including jíbaro music, the Catholic faith, and a strong emphasis on family and communal support. These cultural roots shaped her compassionate approach to nursing, where she routinely
    provides bilingual care and respects local customs such as involving family members in health decisions. Her upbringing taught her resourcefulness and a practical outlook, while her curiosity about
    new ideas reflects Puerto Rico’s vibrant blend of tradition and innovation. Raquel continues to participate in local festivities, community gatherings, and neighborhood mutual‑aid groups, reinforcing
    her deep connection to Puerto Rican heritage.
