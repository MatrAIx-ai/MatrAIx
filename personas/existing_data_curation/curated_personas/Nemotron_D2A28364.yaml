personas:
  professional: Milena Batista, a structural engineer specializing in sustainable coastal design, leverages AutoCAD, Revit, and Python to deliver precision‑driven BIM models while her disciplined project
    leadership and compassionate mentorship style keep multidisciplinary teams aligned and motivated.
  sports: Milena Batista hikes the Palisades Trail with the Hudson Valley Trail Club in spring, cycles the Jersey City waterfront on weekends, and roots for the New York Yankees, New York Giants, and New
    Jersey Devils, blending competitive spirit with community‑oriented outdoor activity.
  arts: Milena Batista channels her love of rhythm into salsa nights to the beats of Marc Anthony and Carlos Vives, captures urban light in her photography inspired by Edward Burtynsky, and unwinds with
    sci‑fi novels by Octavia Butler and Neil Gaiman, while occasional evenings include board‑game battles with friends.
  travel: Milena Batista prefers meticulously planned weekend escapes to the Hudson Valley’s farms and seasonal festivals, while dreaming of a spring immersion in Barcelona’s architecture and a family reunion
    in San Juan, balancing adventure with her budget and professional commitments.
  culinary: Milena Batista, an adept home chef, expertly prepares traditional mofongo with green plantains, garlic, chicharrón, and a side of arroz con gandules, and experiments with fresh cilantro and
    citrus‑infused chimichurri sauces for friends gatherings.
  core: Milena Batista is a disciplined, sociable engineer who fuses community spirit with a love for salsa, hiking, and sustainable design, though she sometimes over‑commits to volunteer projects at the
    expense of personal downtime.
background:
  cultural: Milena was raised in a bilingual Puerto Rican household, learning Spanish at home and English at school, which gave her a strong bicultural identity. Family traditions such as Nochebuena, Three
    Kings Day, and participation in the Puerto Rican Day Parade in New York have reinforced her sense of community and hospitality. She maintains close ties with relatives in San Juan, regularly sharing
    recipes, music, and stories that keep her heritage alive. In Hudson County, she engages with the local diaspora through cultural festivals, language‑exchange groups, and volunteer work supporting Hispanic
    families. Her cultural values of community support, resilience, and celebration inform both her professional collaboration style and her dedication to community‑focused engineering projects.
attributes:
  skills: '[''Structural analysis'', ''AutoCAD'', ''Revit'', ''BIM coordination'', ''Python programming'', ''Data analysis'', ''Project management (MS Project)'', ''Lean Six Sigma Green Belt'', ''Risk assessment'',
    ''Budgeting and cost control'', ''Bilingual communication (English/Spanish)'', ''Stakeholder engagement'', ''Team leadership'', ''STEM outreach mentoring'', ''Regulatory compliance (OSHA, building codes)'']'
  hobbies: '[''Salsa and bachata dancing'', ''Hiking (Palisades and nearby trails)'', ''Cooking Puerto Rican cuisine'', ''STEM mentorship volunteering'', ''Photography (urban and nature)'', ''Reading science-fiction'',
    ''Board game nights'', ''Yoga'', ''Cycling along the waterfront'', ''Attending tech meetups'']'
  career_goals: Milena aims to become a licensed Professional Engineer (PE) and transition into senior project management, leading large‑scale sustainable infrastructure projects such as resilient coastal
    designs and affordable housing in the Hudson County region. She seeks to champion diversity in engineering by establishing mentorship programs for underrepresented students and contributing to corporate
    social‑responsibility strategies. To broaden her strategic capabilities, she plans to earn a Master’s in Engineering Management, eventually moving into an executive role that shapes the firm’s direction
    toward equitable, community‑focused development.
