personas:
  professional: Adelaide Perdomo, a 49‑year‑old production equipment operator at a Minnesota manufacturing plant, leverages their industrial‑technology background, hands‑on expertise with CNC lathes and
    hydraulic presses, and a competitive drive to lead small crews, troubleshoot machinery, and champion continuous‑improvement projects, and they are actively pursuing a shift‑lead or maintenance‑manager
    role.
  sports: Adelaide Perdomo cycles with the Owatonna Cycling Club, follows the Minnesota Vikings and the Minnesota Timberwolves with fervor, and they enjoy summer trail rides through the Mississippi River
    Valley while occasionally joining community softball games organized by the local recreation department.
  arts: Adelaide Perdomo immerses themselves in the arts by photographing Minnesota’s changing landscapes in the style of Ansel Adams, attending pottery and mixed‑media workshops at the Owatonna Arts Council,
    listening to Prince on vinyl, and admiring the abstract works of Bridget Riley, all of which feed their creative problem‑solving at work.
  travel: Adelaide Perdomo prefers road‑trip adventures that blend photography opportunities with cultural stops, having recently explored the North Shore of Lake Superior, the historic charm of Mackinac
    Island, and a week‑long art‑focused itinerary in Portland, Oregon, while they dream of a future cycling pilgrimage through the vineyards of Tuscany.
  culinary: Adelaide Perdomo enjoys cooking hearty Midwestern fare like walleye fish fry and wild‑rice casserole, often incorporating fresh herbs from their garden such as rosemary and thyme, and they delight
    in experimenting with rustic sourdough bread and seasonal vegetable stir‑fries using locally sourced carrots and beets.
  core: Adelaide Perdomo is a 49‑year‑old production equipment operator whose curiosity for machinery and love of art create a uniquely energetic, slightly disorganized yet fiercely competitive approach
    to life, and they thrive on community connections.
background:
  cultural: Adelaide was raised in Owatonna, a small Midwestern city in Minnesota with deep German‑Scandinavian roots. Her family’s heritage includes German and Norwegian ancestry, which is reflected in
    the region’s traditions of seasonal festivals, potluck gatherings, and a strong work ethic. Growing up in a close‑knit community, she internalized the values of modesty, self‑reliance, and cooperation,
    while also benefiting from a vibrant local arts scene supported by the Owatonna Arts Council and the public library. The town’s blend of agricultural pragmatism and community‑driven cultural events
    fostered Adelaide’s appreciation for both hands‑on craftsmanship and creative expression. Her Lutheran upbringing emphasized communal service, which continues to influence her involvement in neighborhood
    events and volunteer work. This Midwestern cultural backdrop, combined with her personal curiosity, shapes her balanced outlook—practical, yet open to new artistic ideas.
attributes:
  skills: '[''operating CNC lathes and mills'', ''hydraulic press setup and troubleshooting'', ''preventive maintenance scheduling'', ''reading mechanical schematics'', ''basic electrical circuit diagnostics'',
    ''safety compliance and OSHA standards'', ''shift coordination and crew leadership'', ''process optimization and lean manufacturing'', ''creative problem solving for equipment downtime'', ''training
    and mentoring new operators'', ''basic CAD reading'', ''DIY equipment modifications'']'
  hobbies: '[''photography of landscapes and industrial scenes'', ''pottery and mixed‑media painting'', ''joining a local cycling club'', ''volunteering at community art fairs and block parties'', ''gardening'',
    ''bird‑watching'', ''DIY woodworking and small metal fabrication projects'', ''attending community theater performances'', ''participating in local book clubs'']'
  career_goals: Adelaide aims to transition from a hands‑on operator role to a supervisory position within the next three years, aspiring to become a shift lead or maintenance manager at her plant. She
    plans to earn certifications such as the Certified Production Technician (CPT) and OSHA 30‑hour General Industry, and to complete an advanced welding course to broaden her technical toolkit. While pursuing
    these credentials, she intends to spearhead a continuous‑improvement project that reduces equipment downtime by 15% and showcases her competitive drive. In the longer term, Adelaide dreams of launching
    a small side business that offers custom metal fabrication and artistic installations for local businesses and community spaces, blending her technical expertise with her love for art. She also hopes
    to mentor younger women in manufacturing, encouraging them to explore skilled‑trade careers.
