personas:
  professional: Gregoria Gonzalezperez is a senior full‑stack software developer who blends practical Python back‑end expertise, React‑driven UI craftsmanship, and a curiosity for serverless and containerized
    solutions, while her reliable yet flexible nature shines in agile Scrum teams and when mentoring junior engineers.
  sports: Gregoria Gonzalezperez enjoys weekday morning runs along the waterfront, participates in a co‑ed adult soccer league during the winter, roots for the Miami Heat in the NBA and follows the Miami
    Marlins in baseball, while they prioritize functional strength training over extreme cardio, preferring a balanced fitness routine.
  arts: Gregoria Gonzalezperez often streams a blend of R&B and pop, listing John Legend, Beyoncé, and Coldplay among her favorite performers, and she frequents local galleries where she admires contemporary
    muralists and mixed‑media installations that spark her creative problem‑solving.
  travel: Gregoria Gonzalezperez favors weekend escapades to nearby coastal towns like Key West and cultural city trips to New Orleans, often employing last‑minute flight deals and Airbnb rentals, yet they
    also dream of a longer‑term adventure to Caribbean islands, balancing travel with a modest savings plan.
  culinary: Gregoria Gonzalezperez enjoys preparing hearty family‑style meals such as slow‑cooked shredded beef stew (ropa vieja) and seasoned plantain mash (mofongo), skillfully balancing bold spices and
    fresh herbs, and they love exploring new flavors by incorporating avocado, chipotle, and citrus zest into weekend cooking experiments.
  core: Gregoria Gonzalezperez navigates life with a practical tech mind, a contagious enthusiasm for dance and cooking, a tendency to over‑think under stress, and an unapologetic habit of checking code
    repositories late into the night.
background:
  cultural: Gregoria was born to Cuban immigrant parents and grew up in a bilingual household in Miami’s diverse neighborhoods. Her heritage informs her daily life through fluency in both Spanish and English,
    a deep appreciation for Cuban music, dance, and cuisine, and active participation in community events such as the Calle Ocho Festival. She values familial bonds, the concept of familismo that emphasizes
    collective well‑being, and she often bridges her Cuban cultural roots with her professional environment by fostering inclusive collaborations and celebrating multicultural perspectives.
