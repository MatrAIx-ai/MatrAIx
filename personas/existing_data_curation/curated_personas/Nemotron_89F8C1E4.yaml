    ''Training and mentorship of new staff'', ''Basic digital tools (email, scheduling apps)'']'
  hobbies: '[''Church fellowship and potluck organization'', ''Gardening (herbs and vegetables)'', ''Cooking and experimenting with Greek and modern recipes'', ''Walking the Willamette River trails'', ''Community
    book clubs (mystery genre)'', ''Knitting scarves for grandchildren'', ''Volunteering at senior‑reading program'', ''Senior aerobics classes'', ''Attending local craft fairs'']'
  career_goals: Vera aims to transition from individual housekeeping assignments to a supervisory role within a senior‑living facility or a boutique cleaning company, where she can oversee a team, develop
    training programs, and introduce green‑cleaning standards. She also dreams of launching a small, community‑focused cleaning consultancy that offers affordable services to fellow seniors and low‑income
    households while mentoring younger workers. Achieving a recognized certification in environmentally safe cleaning and completing a short course in business basics are part of her plan before she gradually
    reduces hours as she approaches retirement.
