personas:
  professional: Vera Stavrakakis, a 62‑year‑old cleaning specialist, channels her methodical organization, practical curiosity, and sociable confidence into overseeing a senior‑living facility’s housekeeping
    team, where she implements eco‑friendly cleaning standards, trains new staff, and balances client expectations with cost‑effective budgeting.
  sports: Vera Stavrakakis stays fit by joining a senior aerobics class at the Salem Community Center, walking the Willamette River Trail with the local Riverwalk Seniors club, cheering on the Portland
    Timbers in soccer season, and occasionally attending the Salem‑Keizer Volcanoes’ summer baseball games for a light‑hearted social outing.
  arts: Vera Stavrakakis nurtures her artistic side through knitting vibrant scarves inspired by the patterns of folk textiles, attending the Salem Public Library’s mystery‑novel book club featuring Agatha
    Christie, and admiring the piano compositions of Ludovico Einaudi at the local community theater’s monthly concert series.
  travel: Vera Stavrakakis favors well‑planned, low‑stress trips, often exploring Oregon’s scenic coast at Cannon Beach, taking weekend getaways to the historic vineyards of Willamette Valley, and dreaming
    of a leisurely cruise through the Mediterranean islands that echo the flavors of her favorite family recipes.
  culinary: Vera Stavrakakis, an avid home gardener, delights in transforming her fresh herbs—such as rosemary, thyme, and basil—into aromatic herb‑infused roasted chicken, lemon‑garlic grilled salmon,
    and layered vegetable casseroles that she tweaks with modern twists and shares at church potlucks and neighborhood craft fairs.
  core: Vera Stavrakakis blends a lifelong love of meticulous cleaning with a curious palate, a habit of over‑organizing her pantry, and an occasional tendency to lose track of time while knitting, creating
    a lively, reliable presence that brightens any community gathering.
background:
  cultural: Vera is a second‑generation Greek‑American. Although raised in Oregon, her family maintained strong ties to Greek culture through language, cuisine, and the Greek Orthodox faith. She grew up
    hearing stories of her grandparents’ migration from Greece and celebrated holidays such as Easter and Name Days with traditional music, dances, and food. This heritage instilled a deep sense of hospitality
    and respect for elders, which she carries into her work and community life. Living in Salem, she blends her Greek roots with the Pacific Northwest’s emphasis on environmental stewardship, reflected
    in her preference for green cleaning products and love for outdoor activities.
attributes:
