  career_goals: Hoping to build on his love for structure and people, Jason envisions himself in a role that combines leadership, teamwork, and community service. He dreams of becoming an elementary school
    teacher who designs organized, hands‑on lessons, or a youth soccer coach who leads a team with clear rules and encouragement. He also admires local firefighters and imagines joining the fire department
    one day to protect his neighbors. These ambitions reflect his desire to be dependable, socially engaged, and to make a tangible impact on others.
