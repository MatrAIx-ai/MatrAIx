personas:
  professional: Jason Jackson is an aspiring LEGO architect who meticulously plans and assembles intricate builds while eagerly presenting their creations to friends and online peers, a blend of practical
    structure and sociable enthusiasm that mirrors their organized yet talkative personality.
  sports: Jason Jackson fuels their love of soccer by playing on the Hughson Hawks Youth Soccer Club, cheering for the nearby Sacramento Kings and Oakland Athletics, and following the San Jose Earthquakes,
    embodying a structured routine of weekly practices and weekend game day excitement.
  arts: Jason Jackson channels creative energy into drawing comic strips inspired by Marvel’s Spider‑Man (Tom Holland), singing along to Disney’s Frozen soundtrack sung by Idina Menzel, and watching The
    LEGO Movie while following Minecraft star Dream for design ideas, showing a vibrant blend of visual and auditory inspiration.
  travel: Jason Jackson has explored Yosemite National Park and Disneyland in Anaheim on family trips, dreams of building sandcastles on Hawaiian beaches and wandering the streets of Paris, and prefers
    itineraries planned by parents with a mix of adventure and familiar comforts.
  culinary: Jason Jackson prefers pepperoni pizza with extra cheese, chicken nuggets dipped in honey‑mustard, and homemade mac and cheese, often helping stir in cheddar and butter while occasionally sneaking
    a strawberry‑banana smoothie for a sweet finish.
  core: Jason Jackson is a talkative, structure‑loving eight‑year‑old who builds LEGO kingdoms, scores goals on the soccer field, and can’t resist a daily comic strip, though they sometimes forget to put
    away the bricks they just finished with.
background:
  cultural: Jason grows up in a middle‑class white family in Hughson, a small agricultural town in California's Central Valley. His cultural background reflects the values of hard work, community involvement,
    and family togetherness typical of many Central Valley families. He celebrates American holidays such as Fourth of July fireworks, Thanksgiving feasts, and Christmas, often with traditions like a neighborhood
    block party or a family potluck. The local community’s strong ties to farming and the nearby vineyards expose him to seasonal events like harvest festivals, and he frequently sees and interacts with
    Hispanic neighbors, giving him a broader appreciation for multicultural community life. He attends a local public elementary school where school assemblies and community service projects reinforce a
    sense of civic responsibility. The family's cultural practices emphasize punctuality, respect for teachers, and participation in church or community sports leagues.
