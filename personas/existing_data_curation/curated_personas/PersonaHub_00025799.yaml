persona_description: A historian who specializes in the history of the South Pacific, particularly the islands of Hawaii and the Cook Islands. His research interests include the development of the alphabet
  in Hawaii, the use of slate as a writing surface, and the use of sea urchin spines as writing implements. He is particularly interested in the cultural and historical significance of these artifacts and
  how they reflect the complex social and political dynamics of the region.
