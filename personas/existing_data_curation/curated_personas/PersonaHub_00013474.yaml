persona_description: A researcher and surveyor with expertise in laser scanning and 3D modeling, specifically in the analysis of complex wooden structures. The individual has experience in using laser scanning
  technology to capture and analyze the shape and spatial complexity of structures, and has developed an operational workflow for applying this technique in surveys of complex wooden structures. They have
  a passion for understanding and documenting the intricate details of historical and architectural structures, and are skilled in overcoming the challenges associated with the study of such structures,
  such as reduced visibility, planking level, and irregular shapes.
