personas:
  professional: Nicole Patrick is an aspiring junior scientist who spends weekends conducting simple experiments in the school science club, channeling their curiosity into exploring how magnets attract
    metal and dreaming of one day designing rockets, while they also love sketching space rockets during art time.
  sports: Nicole Patrick plays forward on the local youth soccer team, the Little Ravens, loves sprinting after the ball in weekend matches and cheering for the professional soccer club Manchester United
    on TV, and they also enjoy joining playground tag games where they sprint like a cheetah, showing they thrive on kinetic energy and teamwork.
  arts: Nicole Patrick is a prolific young artist who fills sketchbooks with colorful crayon drawings of animals and space scenes, attends community art workshops where they experiment with watercolor techniques,
    eagerly watches the animated films of Pixar and the music of The Wiggles, and they often recreate their favorite Disney characters on LEGO bricks, making art a central part of their daily routine.
  travel: Nicole Patrick loves family hikes in the nearby Blue Ridge Mountains where they collect fallen leaves and study insects, dreams of visiting the Grand Canyon on a school field trip, and they also
    hope to one day explore the bright coral reefs of Australia's Great Barrier Reef, preferring trips that blend outdoor exploration with hands‑on learning.
  culinary: Nicole Patrick enjoys munching on peanut‑butter‑and‑jelly sandwiches, building mini pizza toppings with shredded mozzarella and pepperoni, sipping strawberry‑banana smoothies they help blend,
    and they often add a sprinkle of cinnamon to apple slices, showing a budding palate that favors familiar comfort foods with a dash of creativity.
  core: Nicole Patrick is an endlessly curious 7‑year‑old who mixes art, science, and soccer in every day, carries a crayon behind their ear, sometimes forgets to tidy up their LEGO creations, and brightens
    any room with their enthusiastic hum.
background:
  cultural: Nicole lives in Belleville, a small town in Monroe County, Michigan, where Midwestern values such as community involvement, modesty, and respect for nature are prominent. Her family celebrates
    typical American holidays like Thanksgiving, Fourth of July, and Christmas, and participates in local school and church events. Growing up in a predominantly White, suburban environment, she is exposed
    to regional foods, outdoor activities, and a supportive school system that encourages curiosity, creativity, and teamwork.
