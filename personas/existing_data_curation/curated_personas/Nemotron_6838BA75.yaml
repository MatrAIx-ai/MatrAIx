  career_goals: Nicole dreams of becoming an artist who creates vibrant murals that brighten her community, or a scientist who explores space and discovers new planets. She also imagines working as a teacher
    to share her love of art and curiosity with other children. Ultimately, she aspires to combine creativity and discovery in a career that lets her inspire others while staying connected to the people
