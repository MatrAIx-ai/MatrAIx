personas:
  professional: Yadira Gomez, an aspiring CNC machinist, leverages her precision‑assembly expertise, SolidWorks CAD skills, and methodical safety mindset to excel in industrial technology coursework while
    pursuing CNC programming and welding certifications; they aim to move from general assembly to a lead fabricator role within two years.
  sports: Yadira Gomez stays active by jogging on the trails of Cedar Ridge Park with the Cedar Ridge Runners club and joining the Denton Youth Robotics intramural soccer league, while they cheer on the
    Dallas Cowboys in the fall, the Dallas Mavericks during the NBA season, and the Texas Rangers in summer, using these team loyalties as a social anchor.
  arts: Yadira Gomez revels in dancing with the local folklórico troupe Alegres Raíces, attending lively performances by the mariachi group Los Caballeros, and escaping into science‑fiction worlds penned
    by NK Jemisin and Becky Chambers, while they collect film soundtracks from director Guillermo del Toro for inspiration.
  travel: Yadira Gomez prefers budget‑friendly weekend road trips to Texas Hill Country vineyards and the rugged landscapes of Big Bend National Park, while they dream of a spring backpacking adventure
    through Oaxaca’s markets and the ancient ruins of Teotihuacan, meticulously planning each itinerary to balance school commitments and limited funds.
  culinary: Yadira Gomez’s culinary passion shines when she crafts homemade tamales using masa, pork carnitas, and ancho chile, perfects a smoky chipotle mole infused with cacao and oregano, and they source
    fresh cilantro, queso fresco, and heirloom corn from the local farmers’ market for family feasts.
  core: Yadira Gomez is a meticulous teen machinist with a love for high‑tech fabrication and folklórico dance; they have a habit of double‑checking bolts, and an ever‑present low‑level anxiety that fuels
    both their precision and sleepless journaling.
background:
  cultural: Yadira grew up in a Mexican‑American household in Denton, where Spanish and English intermingle and family life centers on shared meals and celebrations such as Día de los Muertos, Cinco de
    Mayo, and Christmas posadas. Her parents emphasized hard work, respect for elders, and community responsibility, values that shape her cooperative yet assertive demeanor. She blends Mexican cultural
    traditions—cooking mole, listening to mariachi, participating in church festivities—with the independent spirit of Texas. Bilingual and bicultural, Yadira often bridges her community and workplace,
    bringing cultural awareness and a sense of belonging to her teams.
attributes:
  skills: '[''precision assembly'', ''technical drawing interpretation'', ''CNC router and mill operation'', ''MIG/TIG welding'', ''basic electrical wiring'', ''quality inspection with calipers and micrometers'',
    ''mechanical troubleshooting'', ''occupational safety compliance'', ''SolidWorks CAD basics'', ''CNC programming fundamentals'']'
  hobbies: '[''cooking Mexican dishes'', ''folklórico dancing'', ''attending cultural festivals'', ''building robotics kits'', ''3D printing experimentation'', ''journaling'', ''mindfulness meditation'',
    ''nature walks'', ''reading science fiction'', ''following engineering blogs'', ''volunteering in youth tool‑safety program'']'
  career_goals: Yadira aims to transition from general assembly to a specialized CNC machinist role within the next two years by completing her associate degree in industrial technology and earning certifications
    in CNC programming and welding. She aspires to become a lead fabricator or production supervisor, eventually moving into quality assurance management. Long‑term, she hopes to launch a community workshop
    in Denton that provides training in modern fabrication techniques for underrepresented youth, blending her practical skills with her curiosity for emerging technologies.
