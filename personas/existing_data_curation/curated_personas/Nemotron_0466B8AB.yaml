  career_goals: Mariela aims to earn her Commercial Driver's License (CDL) within the next two years and secure a full‑time long‑haul truck driving position with a reputable logistics company, seeking a
    stable schedule and reliable income. She also hopes to advance into a supervisory role, such as fleet coordinator or sales manager in the transportation sector, leveraging her sales background. In the
    longer term, she dreams of launching a small family‑run delivery service for authentic Salvadoran foods in the Montgomery County area, merging her driving expertise with her cultural heritage.
