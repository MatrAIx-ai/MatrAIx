personas:
  professional: Mariela Rucker, a 19‑year‑old part‑time sales associate and driver, blends hands‑on route‑planning expertise with a customer‑service flair, leveraging a routine‑driven work ethic and an
    ability to stay calm under last‑minute detours to excel in logistics and sales interactions.
  sports: Mariela Rucker enjoys low‑intensity fitness like walking in local parks and casually follows the Washington Commanders (NFL) and Washington Capitals (NHL), while playing on a community recreational
    softball team that meets on Saturday afternoons during the spring season.
  arts: Mariela Rucker finds solace in cumbia and bolero classics, regularly listening to artists such as Celso Piña, Grupo Niche, and Lucho Gatica, while also knitting while watching classic golden‑age
    films starring Pedro Infante, merging auditory and tactile creativity.
  travel: Mariela Rucker prefers short, budget‑friendly road trips to nearby historic towns like Annapolis and the Shenandoah Valley, planning trips on a spreadsheet with a flexible itinerary that leaves
    room for spontaneous stops at family‑run diners serving familiar comfort food.
  culinary: Mariela Rucker’s culinary passion revolves around mastering pupusas filled with cheese and loroco, simmering tamales in banana leaves, and perfecting a side of curtido, showcasing a skillful
    yet methodical cooking style that balances precise measurements with improvisation when a new spice catches their eye.
  core: Mariela Rucker is a routine‑loving, 19‑year‑old driver‑sales hybrid who channels anxiety into detailed journaling, cooks hearty comfort dishes, and occasionally loses track of appointments when
    the comfort of knitting calls.
background:
  cultural: Mariela is a second‑generation Salvadoran American raised in a bilingual household where Spanish and English are spoken daily. Her family maintains Salvadoran traditions such as celebrating
    La Semana Santa, preparing pupusas for family meals, and emphasizing communal support. While adapting to life in Hyattsville, MD, she balances the collectivist values of her heritage—family loyalty,
    respect for elders, and hard work—with the individualistic expectations of American society. Her cultural identity influences her love for Salvadoran cuisine, her participation in local Latino community
    events, and her desire to someday share her heritage through a food‑focused delivery business.
