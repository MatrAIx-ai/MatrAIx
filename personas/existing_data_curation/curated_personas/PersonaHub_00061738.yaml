persona_description: A neuroscientist who studies the effects of acid on the brain, particularly in relation to panic disorders, anxiety, and depression. His work has led to the development of a new non-invasive
  method to detect and monitor changes in brain pH, which has been published in the Proceedings of the National Academy of Sciences. He is interested in the possibility that changes in acidity are important
  for normal brain function and has previously suggested a role for pH changes in certain psychiatric diseases.
