  career_goals: 'Jorge dreams of growing up to help others: he imagines becoming a doctor who makes children feel better, a teacher who tells stories in both languages, or an engineer who builds fun playgrounds
    for his friends. He also enjoys the idea of being a soccer coach who teaches teamwork. These ambitions reflect his compassionate nature and his love for practical problem‑solving.'
