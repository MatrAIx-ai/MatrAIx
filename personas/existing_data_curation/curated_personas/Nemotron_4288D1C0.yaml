personas:
  professional: Jorge Martinez, a budding LEGO architect in preschool, constructs intricate brick towers while balancing curiosity with practicality, keeps a tidy work area thanks to an innate love of organization,
    and calmly assists classmates with puzzles, reflecting compassionate cooperation and resilient composure.
  sports: Jorge Martinez, an enthusiastic member of the neighborhood kindergarten soccer club, loves dribbling a mini soccer ball, cheers for the Houston Astros during spring baseball outings, enjoys swimming
    lessons at the community pool, and balances energetic play with quiet moments of drawing game scores, reflecting cooperative teamwork and calm resilience.
  arts: Jorge Martinez, a tiny dancer who twirls to cumbia and vallenato rhythms and sketches colorful Carnaval masks, fills the preschool art wall with bright crayon portraits of Carlos Vives and Shakira,
    shares crayons generously with peers, and watches Mickey Mouse cartoons, embodying compassionate creativity and organized imagination.
  travel: Jorge Martinez, a curious five‑year‑old who loves family road trips to Austin’s Zilker Park and the San Antonio River Walk, keeps a tiny scrapbook of stickers from each destination, helps choose
    a small travel checklist, and dreams of visiting Disney World in Orlando, preferring trips where parents guide the itinerary while they explore with calm wonder.
  culinary: Jorge Martinez, an eager kitchen helper who proudly flips cheese‑filled arepas and assembles mini tacos with avocado, beans, and salsa, enjoys sipping a banana‑strawberry smoothie after school,
    savors mac and cheese on rainy days, and often leaves a playful trail of flour on the countertop, showing curiosity, practicality, and compassionate sharing of food.
  core: Jorge Martinez is a calm, curious five‑year‑old who blends bright Carnaval celebrations, lively cumbia music, and Houston community life into joyful teamwork, modest savings, and a love of flavorful
    dishes, all while maintaining compassionate cooperation and resilient composure.
background:
  cultural: Jorge is raised in a Colombian‑American household in Houston. At home, Spanish is spoken and Colombian traditions such as celebrating Carnaval, making arepas, and listening to cumbia and vallenato
    music are part of daily life. His family observes both Colombian holidays and typical American celebrations, blending the warmth and close‑family ties of Colombian culture with the multicultural vibrancy
    of Houston. He attends a local preschool where he learns English, participates in community events that showcase Latin American culture, and enjoys a mix of Colombian and Texan foods, giving him a bicultural
    identity that values community, hospitality, and bilingual communication.
