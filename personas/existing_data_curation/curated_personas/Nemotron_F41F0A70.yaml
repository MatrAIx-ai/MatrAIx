  career_goals: Although still in early childhood, Yadira frequently declares ambitions that echo her adult‑like desire for structure and personal achievement. She often says she wants to be a teacher because
    she enjoys organizing storytime for her dolls and giving clear instructions, a role she imagines will let her set orderly routines. She also expresses a competitive wish to be the fastest runner on
    the playground and dreams of becoming a doctor to help my family when they are sick, reflecting a personal‑interest‑driven motivation. These goals are framed within her love for predictable, responsible
    roles and a budding competitive spirit.
