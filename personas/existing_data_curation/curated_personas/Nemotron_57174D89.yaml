  career_goals: Renante dreams of a future where she can blend her love of discovery with a practical way to help people. She often talks about becoming a teacher or youth mentor who turns fun experiments
    into real‑world lessons, or a veterinarian who cares for animals while educating families about pet health. Her goal is to stay connected to her community, using her social strengths to inspire others
    and create supportive, hands‑on learning environments.
