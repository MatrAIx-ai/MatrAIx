personas:
  professional: Renante Reynolds, a budding game designer in the making, blends their curiosity for new ideas with a practical knack for building simple Scratch projects, turning classroom collaborations
    into early prototypes while thriving on the flexible, disorganized flow of their creative process.
  sports: Renante Reynolds, a spirited member of the neighborhood youth soccer league and the school’s basketball team, dashes across the field in spring matches for the Eastside Eagles while cheering for
    the Los Angeles Lakers during winter, embracing teamwork and energetic play despite a tendency to forget to stretch after games.
  arts: Renante Reynolds, an enthusiastic hip‑hop and R&B dancer, crafts impromptu routines to the beats of Kendrick Lamar and Beyoncé, sketches comic‑style characters inspired by Spider‑Man and Studio
    Ghibli, and swaps graphic novels like Amulet with friends, letting vibrant pop culture fuel their artistic expression.
  travel: Renante Reynolds loves weekend trips to the city’s science museum and annual community festivals, dreams of riding the roller coasters at Disneyland, and eagerly plans summer visits to national
    parks like Yosemite, balancing a love for adventure with the family’s budget constraints.
  culinary: Renante Reynolds enjoys helping Mom stir up cheese quesadillas, blend fruit smoothies with bananas and strawberries, and assemble simple spaghetti with marinara, proudly taking charge of the
    kitchen timer while occasionally over‑seasoning the sauce in a burst of youthful enthusiasm.
  core: Renante Reynolds is a curious, energetic ten‑year‑old who swaps LEGO bricks for Scratch scripts, dashes between soccer fields and dance floors, and balances a love for spontaneous fun with occasional
    forgetfulness about chores.
background:
  cultural: Renante grows up in a close‑knit African‑American family in Gaithersburg, Maryland, where the suburban community offers a blend of cultural programming and everyday life. Her parents emphasize
    learning about African‑American history and often attend events at the Montgomery County Cultural Arts Center, celebrate Juneteenth with family gatherings, and visit the National Museum of African American
    History & Culture in nearby Washington, D.C. At home, the household enjoys cooking soul‑food dishes such as collard greens and cornbread and listening to R&B and hip‑hop music that spans generations.
    Through school and neighborhood programs, Renante interacts with peers from various backgrounds, learning the value of inclusion while staying grounded in her own heritage.
