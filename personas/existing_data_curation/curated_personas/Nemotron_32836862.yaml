  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical nonfiction'', ''Listening to big band music'', ''Birdwatching'', ''Chess'', ''Cooking traditional New England dishes'', ''Genealogical research'',
    ''Volunteer teaching practical skills'']'
  career_goals: Now retired, Douglas focuses on personal legacy and health. He aims to preserve his independence through a daily routine of walking and gentle exercise, and to complete a detailed autobiography
    that captures his experiences from the Great Depression to his centennial. He plans to finalize a genealogical project and produce a printed family history book for future generations. Douglas also
    seeks to volunteer at the local senior center, teaching practical repair skills to younger volunteers, and to help organize a community history event celebrating Johnston’s heritage. He hopes to receive
    recognition from the town’s centennial club and to ensure a comfortable, supportive environment for his wife in their later years.
