personas:
  professional: Douglas Pope, a centenarian retired mechanical engineering technician, channels his lifelong hands‑on pragmatism into volunteer workshops at the local senior center where he teaches basic
    carpentry, plumbing and small‑engine repair while weaving oral histories of Johnston’s maritime heritage into each lesson, and they find great satisfaction in preserving both skills and stories for
    future generations.
  sports: Douglas Pope, a loyal fan of the Boston Red Sox and the New England Patriots, keeps up with each season from his porch while cheering with a modest flag, joins the Johnston Golden Walkers for
    gentle morning strolls, and they treat weekly chess matches at the senior center as their preferred competitive sport, preferring low‑impact activity over strenuous exercise.
  arts: Douglas Pope, an avid listener of classic big‑band swing by Glenn Miller, Duke Ellington and Count Basie, enriches his garden evenings with these recordings while savoring clam chowder, admires
    Winslow Homer maritime paintings, and they attend occasional community theater productions of timeless plays like 'Our Town,' finding comfort in familiar artistic traditions.
  travel: Douglas Pope, who favors leisurely, memory‑laden journeys, enjoys regular day trips to historic New England towns such as Plymouth and Boston, cherishes annual visits to Acadia National Park’s
    coastal trails, spent his seventies on a guided tour of Normandy’s D‑Day beaches, and they now limit travel to short drives to nearby coastal villages like New Bristol for fresh seafood and gentle walks.
  culinary: Douglas Pope, a modest home chef, prepares New England staples like creamy clam chowder, buttery lobster bisque, and spiced apple pie with farm‑fresh herbs from his garden, seasoning his dishes
    with thyme and parsley while twirling a vintage record of Duke Ellington in the background, and they relish the comforting ritual of cooking as a daily anchor.
  core: Douglas Pope, a centenarian who blends disciplined routine with nostalgic craftsmanship, preserves their legacy through gardening, woodworking, and community storytelling while savoring big‑band
    jazz and New England flavors, and they find comfort in the familiar rhythms of daily life.
background:
  cultural: Douglas is a lifelong Rhode Island native of Anglo‑American heritage, with roots tracing back to Irish immigrants who settled in Providence County in the early 1900s. Raised in a working‑class,
    Protestant (later ecumenical) family, he grew up in a tight‑knit New England community that valued self‑reliance, thrift, and community service. His cultural identity reflects the practical, modest
    values of mid‑century New England, shaped by the Great Depression, service in the U.S. Navy during World War II, and post‑war suburban life. He maintains a strong connection to local traditions such
    as church attendance, community fairs, and a love for regional foods like clam chowder. His worldview is grounded in routine, respect for tradition, and a pragmatic approach to everyday life.
attributes:
  skills: '[''Carpentry'', ''Plumbing basics'', ''Electrical troubleshooting'', ''HVAC maintenance'', ''Budgeting and financial management'', ''Gardening'', ''Small‑engine repair'', ''Classic car restoration'',
