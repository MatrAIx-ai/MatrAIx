personas:
  professional: Amy Burd, a business administration student with strong Excel and event coordination skills, leverages her love of structure and meticulous time‑management to excel as a campus event planner
    while calmly mediating group conflicts and designing data‑driven budgeting spreadsheets for student organizations.
  sports: Amy Burd, a member of the campus hiking club, hikes the Texas Hill Country trails on weekends, follows the Dallas Cowboys and Austin FC loyally, and occasionally plays intramural soccer with the
    university’s recreation league, balancing structured fitness with spontaneous outdoor adventures.
  arts: Amy Burd enjoys non‑fiction titles like Cal Newport’s *Deep Work* and James Clear’s *Atomic Habits*, listens to indie folk artist Sufjan Stevens while cooking, and attends local theater productions
    at the Austin Playhouse, allowing creative insights to inform her structured approach to life.
  travel: Amy Burd plans trips using detailed itineraries, having explored New Orleans for its music scene and Santa Fe’s art markets, she now dreams of visiting the Azores for volcanic hikes and Iceland
    for the Northern Lights, preferring budget‑friendly travel with a mix of adventure and relaxation.
  culinary: Amy Burd loves recipe‑driven cooking, frequently preparing quinoa bowls with avocado, lemon vinaigrette, and fresh cilantro, as well as sheet‑pan salmon with roasted asparagus, delighting in
    precise measurements and the occasional indulgence of dark chocolate mousse.
  core: Amy Burd is a detail‑obsessed planner who channels her anxiety into structured routines, balancing meticulous budgeting, regimented self‑care, and spontaneous hikes while occasionally succumbing
    to coffee cravings.
background:
  cultural: Amy was raised in a middle‑class white family in East Texas, where community ties, Southern hospitality, and church involvement were central. Growing up near College Station exposed her to the
    vibrant Aggie culture of Texas A&M University, giving her a blend of traditional Texan values and the diverse perspectives of a college town. Her upbringing emphasized practicality, a strong work ethic,
    and respect for structured environments, all of which continue to shape her personal and professional outlook.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Data entry and basic spreadsheet analysis'', ''Event planning and coordination'', ''Academic research and writing'', ''Time management and task
    prioritization'', ''Budget tracking'', ''Basic first aid certification'', ''Conflict resolution and collaborative teamwork'']'
  hobbies: '[''Journaling'', ''Yoga and mindfulness meditation'', ''Reading non‑fiction (productivity, self‑help)'', ''Cooking (recipe‑driven meals)'', ''Hiking in the Texas Hill Country'', ''Volunteering
    at a local animal shelter (event coordination)'']'
  career_goals: Amy aims to complete her Bachelor’s degree in Business Administration within the next two years, focusing on courses that emphasize operations and supply‑chain fundamentals. She plans to
    secure an entry‑level role as an office coordinator or project assistant where clear processes and structured tasks are valued. In the medium term, she aspires to advance to a senior operations or logistics
    manager position, possibly pursuing a master’s in Organizational Leadership. Her long‑term ambition is to work for a company with a strong corporate culture that supports employee well‑being, allowing
    her to apply her organizational strengths while maintaining a balanced, low‑stress work environment.
