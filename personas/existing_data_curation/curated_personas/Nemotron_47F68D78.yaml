personas:
  professional: Leonardo Encina leverages fifteen years of hands‑on aircraft maintenance expertise, bilingual communication, and a creatively improvisational mindset to diagnose complex avionics issues
    while juggling a relaxed approach to deadlines, aiming to secure an A&P certification this year and ultimately lead a senior team at a major hub, all while dreaming of opening a boutique vintage‑aircraft
    restoration shop that doubles as a canvas for his urban‑art flair.
  sports: Leonardo Encina thrives on pick‑up basketball games at Union City's Riverside Park, cheering for the New York Knicks while also trekking the Watchung Reservation on weekends, and they follow the
    New Jersey Nets as their favorite professional team, balancing competitive play with occasional solo runs.
  arts: Leonardo Encina spends evenings painting acrylic urban landscapes reminiscent of Banksy’s street art, contributes to community murals, and tunes in to bachata legend Juan Luis Guerra, salsa powerhouse
    Marc Anthony, and merengue queen Milly Quezada while devouring sci‑fi novels by William Gibson, letting both visual and auditory arts shape his creative identity.
  travel: Leonardo Encina prefers spontaneous road trips to the Hudson Valley’s wineries and planned escapades to New Orleans for its vibrant music scene, yet harbors a bucket‑list dream of visiting the
    historic streets of Cartagena, balancing flexible itineraries with occasional budget constraints.
  culinary: Leonardo Encina's kitchen showcases moderate cooking skill, regularly whipping up mangú with caramelized onions, hearty sancocho brimming with yucca and plantains, and spicing dishes with sofrito
    while listening to salsa beats, though they often lose track of time and over‑season in the rhythm of the music.
  core: Leonardo Encina is a mechanically gifted, art‑obsessed aviation technician who channels stress into vibrant canvases, impulsive hobby spending, and a relentless quest for certification, all while
    harboring a skeptical, competitive edge and a habit of misplacing his keys.
background:
  cultural: Leonardo was raised in a bilingual Dominican household in Union City, a city with one of the largest Dominican diasporas in the United States. He grew up speaking Spanish at home and English
    at school, giving him fluency in both languages. Family gatherings centered around food, music, and stories of the island, instilling a deep appreciation for Dominican traditions such as Carnaval, the
    Dominican Independence Day parade, and the rhythms of merengue and bachata. This cultural foundation fuels his creative pursuits and his sense of community responsibility—he frequently volunteers at
    local Dominican cultural festivals and mentors youth from similar backgrounds. While he identifies strongly with his Caribbean roots, his daily life blends those customs with the urban, multicultural
    environment of New Jersey, shaping a hybrid identity that informs both his work ethic and his artistic expression.
attributes:
  skills: '[''Aircraft structural repair'', ''Engine overhaul'', ''Avionics diagnostics'', ''FAA Part 145 compliance'', ''Technical manual interpretation'', ''Welding and sheet‑metal fabrication'', ''Bilingual
    communication (English/Spanish)'', ''Creative troubleshooting'', ''Maintenance documentation'', ''Use of diagnostic test equipment'']'
  hobbies: '[''Acrylic painting'', ''Scale model aircraft building'', ''Flight simulator gaming'', ''Listening to Dominican music (bachata, merengue, salsa)'', ''Cooking traditional Dominican meals'', ''Participating
    in community mural projects'', ''Pickup basketball'', ''Hiking in Watchung Reservation'', ''Reading science‑fiction literature'', ''Following urban art blogs'']'
  career_goals: Leonardo aims to obtain his FAA Airframe and Powerplant (A&P) certification within the next year, then progress to a senior lead technician role at a major airline hub such as Newark Liberty
    International Airport. His long‑term ambition is to become a maintenance supervisor, overseeing a team while championing safety culture and integrating new technologies like predictive maintenance analytics.
    Eventually, he hopes to launch his own boutique aviation‑maintenance shop specializing in the restoration of vintage aircraft, where he can combine his technical expertise with his love for historical
    livery art. Alongside these professional goals, he wants to mentor younger mechanics from the Dominican community, offering apprenticeships that blend technical training with cultural pride.
