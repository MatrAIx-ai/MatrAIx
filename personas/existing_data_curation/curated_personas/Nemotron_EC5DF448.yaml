  hobbies: '[''Book Club'', ''Gardening'', ''Senior Fitness Classes'', ''Volunteer at Community Kitchen'', ''Live Music Events'', ''Cooking'', ''Day Trips to Parks'']'
  career_goals: Although retired from formal employment, Tresha aims to deepen her involvement in local community service. She hopes to serve on the board of the Schaumburg Senior Center, mentor younger
    volunteers, and develop a weekly support group for widowed seniors. She also aspires to improve her digital proficiency to lead virtual workshops and to maintain her independence and health through
    regular activity.
