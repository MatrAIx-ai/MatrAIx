personas:
  professional: A budding young architect, Fe Vo constructs intricate LEGO DUPLO cities, balancing creative imagination with a practical need for stability, and their meticulous note‑taking on leaves and
    rocks shows early project‑planning skills while occasional worries about the perfect design drive them to rebuild towers repeatedly.
  sports: Fe Vo enjoys weekly soccer practice with the local Riverdale Rookies, cheers for the hometown basketball team the City Hawks, and spends rainy afternoons building a miniature obstacle course in
    the backyard, preferring free play over structured competition while sometimes feeling anxious about missing a goal.
  arts: Fe Vo delights in coloring scenes from Eric Carle’s books, humming along to classic Disney soundtracks featuring Alan Menken’s melodies, and often reenacts stories from the animated series Octonauts,
    letting vibrant colors and catchy tunes shape their imaginative world while occasionally getting frustrated when crayons break.
  travel: Fe Vo loves weekend trips to the nearby botanical garden where they collect leaves, dreams of visiting the Great Barrier Reef to see coral fish, and prefers meticulously planned outings with a
    checklist over spontaneous adventures, though occasional worry about getting lost makes them cling to a favorite stuffed rabbit.
  culinary: Fe Vo assists in rolling spring rolls and sprinkling sesame seeds on rice bowls, favors sweet mango slices and crunchy cucumber sticks, enjoys experimenting with peanut sauce, yet sometimes
    gets distracted and leaves a trail of flour across the kitchen counter while humming a folk tune.
  core: Fe Vo is a curious, detail‑oriented six‑year‑old who builds balanced LEGO towers, worries about perfection, hoards stickers, and sings folk tunes while sketching the world’s tiny wonders.
background:
  cultural: 'Fe is a first‑generation Vietnamese‑American. Her parents emigrated from Vietnam and preserve many cultural traditions at home: they speak Vietnamese, celebrate Tet (Lunar New Year) and the
    Mid‑Autumn Festival, and prepare dishes like pho, spring rolls, and bánh mì. Family values emphasize respect for elders, dedication to education, and community solidarity. Living in Huron, South Dakota,
    Fe also experiences Midwestern American culture through outdoor play, school activities, and local events such as county fairs. She blends these influences, enjoying both Vietnamese music and stories
    as well as the wide open spaces and friendly community life of her hometown.'
attributes:
  skills: '[''basic reading and sight word recognition'', ''writing her name'', ''counting to 20 and simple addition'', ''building stable structures with LEGO DUPLO and magnetic tiles'', ''sorting objects
    by color, size, and shape'', ''following multi-step instructions'', ''empathy and conflict mediation'', ''basic Vietnamese conversational phrases'', ''digital literacy with educational apps'']'
  hobbies: '[''reading picture books about animals and science'', ''drawing and coloring'', ''building with LEGO DUPLO and magnetic tiles'', ''collecting leaves, rocks, and insects'', ''listening to Vietnamese
    folk songs'', ''helping prepare simple Vietnamese dishes'', ''playing educational tablet games'', ''attending library storytime'', ''participating in community cultural celebrations'']'
  career_goals: Fe often talks about wanting to become a veterinarian because she loves animals, is curious about how their bodies work, and wants to help them stay healthy. She also dreams of being an
    architect someday, inspired by her enjoyment of building sturdy things with blocks and her practical side that imagines designing spaces that are both beautiful and functional. Though she is only six,
    she is proud to share these ambitions and works hard at school to learn more about science and drawing.
