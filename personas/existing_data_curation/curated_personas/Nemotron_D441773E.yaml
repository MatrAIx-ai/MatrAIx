  career_goals: Alfonso dreams of one day becoming a scientist‑engineer who invents tools and technologies to help people, especially children who are sick. He is fascinated by space and imagines himself
    as an astronaut exploring the stars, reflecting his blend of curiosity and practicality. He also talks about wanting to be a teacher or community mentor, because he enjoys helping friends learn and
    feel supported. Occasionally, he envisions being a superhero doctor who can make others feel better, showing his deep desire to bring comfort and harmony to those around him.
