personas:
  professional: Alletta Romero, a 33‑year‑old structural iron and steel worker in Toledo, leverages MIG and TIG welding expertise, blueprint interpretation, and heavy‑equipment operation to lead small crews
    on high‑rise projects, while infusing the precision of their metal‑sculpture hobby into on‑site problem solving; they value flexibility over strict planning, occasionally misplace tools in the workshop,
    and are pursuing Certified Ironworker credentials and a forewoman role to eventually launch a custom metal‑art studio for architectural clients.
  sports: Alletta Romero enjoys early‑morning runs along the Maumee River and pick‑up basketball games at the union recreation hall, proudly supports the Toledo Mud Hens and Detroit Lions, and participates
    in the Steelworkers’ Outdoor Club’s seasonal hikes to Hocking Hills, balancing a modest fitness routine with a competitive streak that drives them to outpace fellow crew members on weekend races, and
    they relish the camaraderie of these small‑group activities.
  arts: Alletta Romero channels their solitary creativity into metal sculpting, oil and acrylic painting of Toledo’s industrial panoramas, and urban photography of rusted steel structures, drawing inspiration
    from Georgia O'Keeffe’s bold colors, Ansel Adams’ stark contrasts, and Anthony Gormley’s kinetic forms, while regularly attending exhibitions at the Toledo Museum of Art and local craft fairs, and they
    find these experiences feed both their practical eye and artistic imagination.
  travel: Alletta Romero prefers impulsive road trips in their aging van, charting routes along the Great Lakes shoreline to visit vintage radio shops in Detroit and craft workshops in Asheville, while
    dreaming of a European tour of industrial heritage sites in Germany and Poland; a modest budget confines them to domestic getaways and weekend adventures, yet they value the rugged, DIY spirit of each
    journey.
  culinary: Alletta Romero enjoys grilling smoked steel‑cut ribeye steaks seasoned with smoked paprika and rosemary, whipping up a bold beet‑and‑goat‑cheese risotto flavored with rendered bacon fat, and
    hand‑rolling pierogi stuffed with sauerkraut and caramelized onions, but on hectic workweeks they often opt for a quick slice of pepperoni pizza from a local joint rather than cooking.
  core: Alletta Romero is a steel‑working sculptor who blends a pragmatic, union‑driven work ethic with a quiet, solitary love of metal art, juggling a competitive edge, a habit of leaving tools scattered,
    and a surprisingly relaxed attitude toward long‑term planning, and they often surprise themselves by turning ordinary steel beams into expressive pieces of personal narrative.
background:
  cultural: Raised in the industrial heartland of Ohio, Alletta comes from a midwestern white American background with family roots in manufacturing and trade work. The strong work ethic of the region,
    the close‑knit union community of steelworkers, and the blend of European immigrant heritage (e.g., German and Polish influences) shape her pragmatic yet open‑minded worldview. Living in Toledo, she
    is immersed in a city that balances an industrial legacy with a vibrant arts scene, influencing her appreciation for both sturdy craftsmanship and creative expression.
attributes:
  skills: '["Welding (MIG/TIG)", "Blueprint reading", "Structural steel erection", "Rigging and hoisting", "Safety compliance (OSHA)", "Heavy equipment operation", "Metal fabrication", "Construction site
    coordination", "Basic CAD modeling", "Metal sculpture techniques", "Problem solving under pressure"]'
  hobbies: '["Metal sculpting", "Painting (oil/acrylic)", "Architectural sketching", "Hiking", "Science-fiction reading", "Urban photography", "Attending local art exhibitions", "Blacksmithing workshops",
    "Vintage radio restoration", "Small-group board games"]'
  career_goals: Alletta aims to advance into a supervisory role, such as forewoman or site supervisor, and plans to earn Certified Ironworker (CII) credentials. She wants to specialize in prefabricated
    steel modules, blending her construction expertise with artistic metalwork. In the longer term, she envisions launching a small custom metal art studio that provides unique sculptural pieces for architectural
    projects while also mentoring apprentices in the trade.
