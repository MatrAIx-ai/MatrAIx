  career_goals: Alan aims to advance to a senior operational leadership role such as Director of Operations, where he can embed sustainability, digital transformation, and design-thinking principles into
    manufacturing processes. He seeks to champion continuous-improvement initiatives that blend artistic creativity with efficiency, mentor emerging production managers, and eventually transition into a
    consulting practice focused on lean transformation for New England manufacturers. Throughout his career progression, he prioritizes work-life balance, community involvement, and the professional growth
    of his team.
