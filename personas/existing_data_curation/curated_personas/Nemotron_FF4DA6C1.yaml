  career_goals: Valerie aims to advance to senior executive leadership within a regional health system, such as Regional Director of Clinical Services or Vice President of Patient Experience. She is passionate
    about scaling arts‑driven healing initiatives across multiple facilities, championing staff wellness programs that address stress and burnout, and expanding accessible, culturally sensitive care in
    rural Texas. Additionally, she seeks to mentor emerging healthcare managers—particularly women—and eventually launch a nonprofit that leverages community arts to improve health outcomes.
