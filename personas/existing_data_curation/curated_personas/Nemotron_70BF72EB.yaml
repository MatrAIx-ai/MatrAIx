  career_goals: Ming aims to shape the next generation of sustainable, human‑centered products by leading an interdisciplinary engineering group at a forward‑thinking tech firm or a clean‑technology startup.
    He envisions spearheading projects that integrate renewable energy mechanisms into everyday devices, such as energy‑harvesting wearables or low‑impact consumer robotics. Concurrently, he seeks to formalize
    a mentorship pipeline that connects Bay Area engineers with underserved youth, especially within Asian‑American communities, to democratize access to STEM education. Over the next five years, his ambition
    is to ascend to a principal engineer or director of engineering role where he can influence product strategy, champion inclusive design practices, and champion corporate social responsibility initiatives
    that align technical innovation with societal wellbeing.
