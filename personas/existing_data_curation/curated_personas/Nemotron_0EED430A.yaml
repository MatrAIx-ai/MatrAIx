personas:
  professional: Phiyen Nong is an aspiring junior game creator who blends watercolor sketching with digital sprites, using Scratch to prototype simple platformers while channeling the disciplined creativity
    learned from crafting paper lanterns and cooking family meals; they often test their games on friends during quiet after‑school sessions.
  sports: Phiyen Nong enjoys casual soccer matches with the Alameda Youth Soccer Club, cheering for the San Jose Earthquakes and the Oakland Athletics on game days, and spends weekend nature walks at Crown
    Memorial State Beach for light cardio, though they prefer small, friendly groups over large crowds.
  arts: Phiyen Nong immerses in drawing with watercolors inspired by Jillian Tamaki’s expressive panels, re‑creates scenes from Mike Mignola’s graphic novels, crafts luminous paper lanterns during cultural
    art classes, and listens to indie pop favorites like Clairo while humming traditional folk melodies, allowing their imagination to flourish even during moments of self‑doubt.
  travel: Phiyen Nong loves family road trips to the Golden Gate Bridge and Yosemite National Park, weekend visits to the Monterey Bay Aquarium, and dreams of exploring the lantern‑lit streets of Hoi An
    during a future cultural exchange, preferring meticulously planned itineraries that blend curious sightseeing with quiet reading breaks.
  culinary: Phiyen Nong enjoys whipping up aromatic pho broth with star anise and lime, helping roll sweet bánh chuối for celebrations, experimenting with fresh basil, cilantro, and coconut milk, and often
    pauses to sketch steam swirling above the pot, turning kitchen time into a lively, slightly messy studio.
  core: Phiyen Nong is a curious, reserved 10‑year‑old artist‑inventor who meticulously sketches, carefully saves allowance, and combats frequent worry with mindful coloring, finding solace in lantern crafts,
    indie pop, and family‑cooked meals.
background:
  cultural: Phiyen comes from a Southeast Asian family (Vietnamese heritage) that maintains strong cultural traditions while living in Alameda, California. At home she hears both English and Vietnamese,
    celebrates Tet and the Mid‑Autumn Festival, and helps prepare dishes such as pho and bánh chuối. Her parents share stories of their homeland, and she participates in a local cultural center’s art and
    dance classes, where she learns traditional crafts like paper lantern making. This blend of Vietnamese customs and the multicultural environment of the Bay Area shapes her worldview, giving her a rich
    repertoire of visual motifs and a deep appreciation for both her heritage and her American community.
