  career_goals: Phiyen dreams of a future where she can combine her love of art with a desire to help others manage emotions. She hopes to study art therapy or psychology so she can use drawing, painting,
    and digital media as tools for children’s mental well‑being. She also imagines becoming a graphic novelist or interactive exhibit designer, creating stories and spaces that inspire curiosity while offering
    calm, supportive environments. Ultimately, she aims to lead community workshops that let kids explore creativity as a way to cope with stress.
