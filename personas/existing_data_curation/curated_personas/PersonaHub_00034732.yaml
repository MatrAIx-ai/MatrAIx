persona_description: A printmaker and drawing enthusiast who is interested in exploring the traditional and new techniques of printmaking and drawing. They appreciate the creative process of printing and
  the ability to spread ideas through prints, multiples, and artist's books. They are drawn to the specific properties of print and graphic art and enjoy developing their own visual language through drawing
  and printmaking. They are open to collaboration and are interested in the collective dimensions of printmaking. They have a strong academic background in printmaking and are interested in developing their
  own artistic practice.
