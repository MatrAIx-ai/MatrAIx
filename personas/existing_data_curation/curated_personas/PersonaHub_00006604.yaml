persona_description: A team of UBC engineering researchers who are conducting a study to improve the safety and health of swimmers in community pools by reducing the presence of chemical compounds in the
  air and water. The team includes Prof. Rehan Sadiq, who is the lead investigator, and Prof. Manuel Rodriguez, who is a PhD candidate. The project involves examining pool design, chemical exposure, and
  energy efficiency. The team has attracted community and industry partners, including AME Consulting Group, DB Perks, Waterplay Solutions Corp., Acton Ostry Architects Inc., MacLennan Jaunkalns Miller
  Architects, and Healthy Buildings, and is expected to inform the operations of UBC Vancouver's new aquatic center.
