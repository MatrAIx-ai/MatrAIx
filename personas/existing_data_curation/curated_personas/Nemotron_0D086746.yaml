  career_goals: Sarah aspires to work in a field where she can blend her love for animals, science, and community interaction. Her primary long‑term ambition is to become a veterinarian or a wildlife rehabilitation
    specialist, allowing her to apply practical problem‑solving skills to help living creatures. In the shorter term, she aims to lead her school's science club, win a regional science fair with an environmental
    project, and volunteer at the local animal shelter. She also hopes to develop leadership experience by organizing community clean‑up events, which aligns with her desire to make a positive impact while
    honing her collaborative abilities.
