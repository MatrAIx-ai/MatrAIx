personas:
  professional: Sarah West, a 12‑year‑old middle‑schooler, blends curiosity with practicality as she leads her school’s 4‑H animal‑care projects, designs digital illustrations for her personal blog, and
    coordinates impromptu soccer drills for friends, showing early interdisciplinary teamwork skills.
  sports: Sarah West, an enthusiastic member of the school’s soccer team and occasional cheer squad, drills after school at the local YMCA, roots for the UNC Tar Heels women’s soccer and the Carolina Hurricanes,
    and enjoys weekend pick‑up games at the Chapel Hill Community Park.
  arts: Sarah West, a budding cartoonist, draws inspiration from Bill Watterson’s ‘Calvin and Hobbes,’ Hayao Miyazaki’s animated films, and the pop‑culture vibes of Ariana Grande, while posting short stories
    on her blog flavored by the whimsical style of Neil Gaiman.
  travel: Sarah West, a curious explorer of the North Carolina woods, loves day trips to Eno River State Park, dreams of camping in the Great Smoky Mountains, and hopes to visit the Smithsonian museums
    in Washington, D.C., all while relying on parents’ family vacations to fund adventures.
  culinary: Sarah West, a self‑declared snack enthusiast, delights in crafting homemade pizza with pepperoni and extra cheese, whisking up strawberry‑banana smoothies with fresh mint from their 4‑H garden,
    but often forgets to eat balanced meals when engrossed in gaming.
  core: Sarah West, a 12‑year‑old mix of boundless curiosity, social energy, and occasional worry, channels creativity into art and storytelling while juggling soccer drills, a penchant for impulsive spending,
    and mindfulness rituals to keep stress at bay.
background:
  cultural: Sarah's cultural background is rooted in the Southern Appalachian region of central Tennessee. Growing up in the small, close‑knit community of Chapel Hill, she experiences a blend of traditional
    Southern hospitality, strong family ties, and community‑centered values. Her family attends a local Baptist church, where participation in youth groups and church events is common. The local culture
    emphasizes outdoor activities such as hiking, fishing, and community gatherings like county fairs and high‑school football games. The region's emphasis on self‑reliance and practical skills is reflected
    in Sarah's involvement with the 4‑H program and her hands‑on approach to learning. While her cultural setting is predominantly white, she is exposed to diverse perspectives through school and online
    communities.
