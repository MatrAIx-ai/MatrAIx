persona_description: A long-time Republican politician who served as the Governor of Massachusetts, and later as a United States Representative and Senator, known for his anti-imperialist stance and his
  reputation as a maverick. McCall was a member of the Massachusetts House of Representatives and the United States House of Representatives, and he introduced legislation to regulate corrupt practices
  in politics and abolish imprisonment for debt. He was also a delegate to the Republican National Convention and served as the state's ballot commissioner. McCall was known for his progressive views and
  his efforts to unify the Massachusetts Republican Party.
