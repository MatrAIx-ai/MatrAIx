persona_description: A historian who specializes in the study of maritime history, particularly the interactions between humans and marine organisms. Their research interests include, but are not limited
  to, the history of marine life, the impact of human activities on marine ecosystems, and the role of marine animals in cultural and religious beliefs. They are particularly interested in the history of
  the barnacle goose and its connection to human belief systems.
