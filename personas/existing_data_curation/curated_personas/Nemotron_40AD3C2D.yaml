  career_goals: Over the next three years Jaime intends to earn advanced certifications such as the Certified Telecommunications Network Specialist (CTNS) and the FCC General Radiotelephone Operator License,
    positioning herself as a 5G field specialist. She aims to move into a crew‑lead role where she can mentor junior technicians and help shape best‑practice standards for installations. Long‑term, she
    envisions launching a boutique consulting service that assists small businesses in the Las Vegas area with resilient in‑building wireless networks, allowing her to balance a flexible work schedule with
    family life.
