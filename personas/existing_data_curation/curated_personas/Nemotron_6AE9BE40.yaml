  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Visiting Art Museums'', ''Reading Philosophy and Psychology'', ''Journaling'', ''Cooking'', ''Hosting Dinner Parties'', ''Yoga'', ''Mindfulness Meditation'',
    ''Hiking'', ''Vintage Shopping'']'
  career_goals: Crystal aspires to advance from a server to a supervisory role within the next two years, aiming to become a shift manager and eventually a restaurant manager. She plans to enroll in a community
    college hospitality management program and obtain a certification in food safety and service excellence. In the longer term, she dreams of opening a boutique café that doubles as a community art space,
    where local artists can exhibit work and the menu features locally sourced, seasonal dishes. She also wants to develop leadership skills that balance her competitive drive with collaborative teamwork,
    and to achieve a stable income that reduces financial stress.
