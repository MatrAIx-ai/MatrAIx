  skills: '[''oil painting'', ''watercolor'', ''digital photography'', ''Spanish-English translation'', ''garden design'', ''genealogy research'', ''community event planning'', ''creative writing'']'
  hobbies: '[''painting'', ''sketching'', ''visiting art museums'', ''gardening'', ''Spanish cooking'', ''reading art history and philosophy'', ''stargazing'', ''crossword puzzles'', ''small group gatherings'']'
  career_goals: Rosa aims to solidify her legacy as a regional artist and cultural storyteller. She plans to hold a solo exhibition at the Hunterdon County Art Society featuring a series of abstract paintings
    inspired by Spanish folklore and New Jersey landscapes. Concurrently, she intends to publish a collection of short reflective essays and poems that weave together her bilingual heritage and personal
    experiences. Rosa also aspires to develop a quarterly bilingual art-and-story workshop for senior residents, fostering creative expression while preserving Spanish cultural traditions. Ultimately, she
    hopes to travel to Spain to study historic murals in Andalusia, deepening her artistic practice.
