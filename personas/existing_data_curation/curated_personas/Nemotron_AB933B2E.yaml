personas:
  professional: Rosa Kalili, a 66‑year‑old self‑taught painter, photographer, and bilingual cultural storyteller, channels their vivid imagination into abstract canvases inspired by Spanish folklore while
    they meticulously plan senior art workshops, balancing creative freedom with the reliable organization demanded by their community role.
  sports: Rosa Kalili, an avid member of the Princeton Seniors Walking Club who enjoys gentle morning walks and occasional tai chi, follows the New York Giants in football and the New Jersey Devils in hockey
    with quiet enthusiasm, and they prefer low‑impact activities that complement their garden routine.
  arts: Rosa Kalili, a regular at the Hunterdon County Art Society’s gallery openings, finds inspiration in the bold colors of Joaquín Sorolla, the abstract forms of Jackson Pollock, and the lyrical brushwork
    of Georgia O'Keeffe, and they spend evenings translating Spanish poetry into visual sketches while curating intimate discussion circles with fellow art lovers.
  travel: Rosa Kalili, who meticulously plans trips in a leather‑bound journal, has already explored the historic streets of Seville and the Alhambra in Granada, and they dream of a slow‑paced pilgrimage
    through rural Andalusia to study mural techniques, while weekend getaways to Cape May and the Hudson Valley satisfy their love for coastal scenery.
  culinary: Rosa Kalili, a confident home chef, often prepares paella with saffron, rabbit, and locally grown heirloom tomatoes, whips up a fluffy tortilla española with smoked chorizo, and they delight
    neighbors with seasonal gazpacho infused with fresh cucumber and red pepper, all while experimenting with native herbs from their garden.
  core: Rosa Kalili, a reserved yet competitively‑spirited 66‑year‑old painter, loses hours in crossword puzzles, hoards vintage postcards in their attic, and habitually delays bill payments until the last
    minute, balancing solitary brushstrokes with a skeptical eye toward external advice.
background:
  cultural: Rosa was born to a family of Spanish immigrants who settled in New Jersey when she was a child. She grew up speaking both Castilian Spanish and English, celebrating major Spanish holidays such
    as Semana Santa and Día de los Reyes, while also adopting American customs. Her upbringing in a bilingual household fostered an appreciation for the rich artistic traditions of Spain—particularly the
    vivid colors of Andalusian art, flamenco music, and Mediterranean cuisine—that continue to inspire her creative work. Although she has lived most of her adult life in Hunterdon County, Rosa remains
    actively involved in the local Hispanic community, participating in cultural festivals, language exchange groups, and volunteer events that aim to preserve Spanish heritage within the diaspora.
