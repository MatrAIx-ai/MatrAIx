  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries and museums'', ''Attending indie film festivals'', ''Listening to experimental jazz'', ''Cooking fusion cuisine'', ''Sailing
    on the Elizabeth River'', ''Community rowing'', ''Journaling'', ''Reading philosophy'', ''Playing chess'', ''Hosting dinner gatherings'']'
  career_goals: Khaliff aims to transition into a senior executive role—such as Director of Project Management or Program Management Office Lead—where he can shape organizational strategy and foster a culture
    of innovative, flexible delivery. He seeks to spearhead large‑scale transformation initiatives that integrate emerging technologies like IoT and AI within the maritime and logistics sectors of the Hampton
    Roads area. Over the next five years, he intends to obtain the PMP® and Agile Certified Practitioner (PMI‑ACP) certifications, mentor emerging project managers from under‑represented backgrounds, and
    eventually launch his own consultancy focused on agile transformation for community‑based enterprises and nonprofit organizations. He also desires a work‑life balance that permits more time for his
    artistic pursuits and family.
