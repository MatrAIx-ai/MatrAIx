persona_description: A midwife who is experienced in waterbirth and is confident in their skills to help women give birth in water. They are knowledgeable about the use of epidural anaesthesia and other
  procedures in routine use, and are aware of the importance of providing assistance at waterbirth. They are aware of the controversy surrounding waterbirth and the potential for hospitals to discourage
  women from waterbirth when a certain midwife is not on duty. They are familiar with the International Waterbirth Movement and the work of Ethel Burns, who has assisted at more than 500 waterbirths and
  has done research into waterbirth and aromatherapy. They are also aware of the benefits of waterbirth and the potential risks associated with waterbirth, and are committed to providing safe and effective
  care to women during labor.
