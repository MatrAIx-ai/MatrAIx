personas:
  professional: Gloria Moreno is a seasoned construction laborer with expert concrete finishing, heavy equipment operation, and bilingual crew coordination who leverages their OSHA knowledge and partial
    college training to pursue a foreman certification and eventually launch a women‑owned affordable‑housing firm in Riverside County.
  sports: Gloria Moreno enjoys weekend hikes in the Santa Ana foothills, follows the Los Angeles Dodgers and the LA Galaxy for baseball and soccer, and participates in a local co‑ed softball league that
    meets at the community park each summer.
  arts: Gloria Moreno fills their free time listening to banda and ranchera classics such as Los Tigres del Norte and Vicente Fernández, attending occasional performances by the Riverside County Symphony,
    and joining their church choir to rehearse traditional hymns and regional folk songs.
  travel: Gloria Moreno favors road‑trip adventures that blend nature and culture, having explored Joshua Tree National Park, taken a weekend getaway to Santa Barbara, and dreaming of a future trip to Oaxaca
    to study sustainable building techniques while balancing a modest travel budget.
  culinary: Gloria Moreno loves cooking with ingredients from their vegetable garden—like tomatillos, chilies, and corn masa—to prepare dishes such as pozole, chiles rellenos, and homemade salsa verde,
    and they often host Sunday family‑style meals that showcase these flavors.
  core: Gloria Moreno blends hands‑on construction expertise with community‑focused compassion, juggling a green thumb, a love for regional music, and a disciplined path toward entrepreneurship while occasionally
    neglecting dental care.
background:
  cultural: Gloria grew up in a Mexican‑American household where family, faith, and community were central. She is fluent in Spanish and English, celebrates holidays such as Día de los Muertos and Cinco
    de Mayo, and maintains close ties with extended family in both California and Mexico. Her Catholic upbringing influences her involvement in church activities and community service. Living in Norco,
    she blends the region’s equestrian and agricultural heritage with her own traditions, often sharing Mexican dishes at neighborhood gatherings and supporting local cultural festivals.
attributes:
  skills: '[''Concrete finishing'', ''Masonry'', ''Basic carpentry'', ''Heavy equipment operation'', ''Site safety compliance'', ''Blueprint interpretation'', ''Team coordination'', ''Bilingual communication
    (Spanish/English)'', ''Construction project scheduling'', ''Problem solving under pressure'']'
  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Volunteer work with Habitat for Humanity'', ''Hiking in local trails'', ''DIY home improvement projects'', ''Reading about sustainable
    construction'', ''Listening to regional music (banda, ranchera)'', ''Bilingual community outreach'', ''Church choir participation'', ''Woodworking'']'
  career_goals: Gloria aspires to advance into a foreman or site supervisor role within the next few years. She plans to obtain formal certifications such as OSHA 30‑hour and NCCER credentials, and is considering
    completing an associate’s degree in construction management. Her long‑term ambition is to start a small, women‑owned contracting business that focuses on affordable housing and community renovation
    projects in Riverside County. Gloria also hopes to mentor younger workers, especially women and Latino youth, fostering a safer and more inclusive construction environment.
