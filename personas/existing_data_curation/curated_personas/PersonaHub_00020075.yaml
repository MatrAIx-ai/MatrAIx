persona_description: A Filipino economist who specializes in poverty reduction and development issues, particularly those related to urban poverty, debt management, and the impact of economic policies on
  the poor. She has extensive experience working with government and international organizations on poverty alleviation programs and has authored several research papers on these topics. She is interested
  in understanding the dynamics of poverty and the factors that contribute to its persistence, including the role of land distribution, human capital, and access to basic services. She is also interested
  in exploring the impact of debt on the poor and the challenges faced by the government in providing social services to the poor while still managing its debt obligations.
