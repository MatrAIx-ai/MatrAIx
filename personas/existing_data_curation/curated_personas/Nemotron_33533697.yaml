  hobbies: '[''Reading non-fiction (healthcare policy, statistics)'', ''Puzzle solving (sudoku, crosswords)'', ''Solitary nature walks/hiking'', ''Gardening'', ''Cooking and baking'', ''Miniature model
    building'', ''Podcast listening (healthcare management)'', ''Yoga and meditation'']'
  career_goals: Linda aims to advance from her current managerial role to a senior director position within a regional health system, overseeing multiple facilities. She plans to earn the Certified Medical
    Manager (CMM) credential and later pursue a Master’s in Health Administration to deepen her strategic expertise. Her long-term ambition is to lead large-scale quality-improvement initiatives that demonstrably
    increase patient satisfaction and operational efficiency, eventually positioning herself as a thought leader in health services optimization. She also envisions opening a consultancy focused on data-driven
    healthcare operations for small rural clinics.
