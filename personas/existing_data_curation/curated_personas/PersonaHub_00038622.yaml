persona_description: A cultural critic and art historian who is deeply interested in the intersection of art and politics. They are knowledgeable about the history of photography, particularly its impact
  on public perception of war and human suffering. They have a keen eye for identifying and critiquing the ways in which artists use their work to question and challenge dominant narratives and beliefs.
  They are likely to be drawn to exhibitions that explore the ways in which art can serve as a form of witness and a means of questioning and critiquing the world around us.
