  hobbies: '[''Fishing'', ''Gardening'', ''DIY Home‑Improvement Projects'', ''Cooking Traditional Salvadoran Cuisine'', ''Reading Nonfiction (Construction, History, Personal Development)'', ''Coastal Trail
    Walking'', ''Volunteer Work at Local Community Center'', ''Model Woodworking'']'
  career_goals: Heriberto aims to become a certified foreman within the next two years and eventually obtain a contractor’s license so he can launch his own residential remodeling business in Sarasota.
    He plans to complete his associate degree in construction management, earn OSHA and NCCER certifications, and develop expertise in energy‑efficient, hurricane‑resistant building practices. His long‑term
    ambition is to lead a small crew that specializes in sustainable home upgrades while providing stable, well‑paid work for his family and mentoring younger workers in the community.
