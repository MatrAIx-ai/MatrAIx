personas:
  professional: Heriberto Lopez, a 37‑year‑old construction supervisor with expertise in carpentry, concrete formwork, and blueprint interpretation, leverages meticulous organization and bilingual communication
    to keep job sites on schedule while fostering teamwork and safety, and they consistently apply a disciplined mindset to every project.
  sports: Heriberto Lopez is an avid early‑morning fisherman on the Gulf, a regular member of the Sarasota Rowing Club’s weekend drills, and a devoted fan of the Tampa Bay Buccaneers and Tampa Bay Rays,
    often fitting in short runs with the local YMCA running group during cooler evenings, and they value the balance of solo and team activities.
  arts: Heriberto Lopez enjoys the soulful ballads of José José, attends performances at Sarasota’s Asolo Repertory Theatre, and collects prints by Frida Kahlo, and they find that music and visual art provide
    a quiet backdrop for their evening reading sessions.
  travel: Heriberto Lopez prefers meticulously planned road trips that blend fishing excursions in the Florida Keys with cultural visits to historic towns like St. Augustine, yet they dream of a future
    vacation to the highlands of Guatemala to explore coffee farms, balancing travel aspirations with family commitments and a modest travel budget.
  culinary: Heriberto Lopez takes pride in hand‑rolling pupusas with fresh masa, cheese, and loroco, perfecting tamales stuffed with pork and chilies, and is also comfortable preparing grilled mahi‑mahi
    seasoned with cilantro, lime, and garlic, showcasing a solid home‑cooking skill set that blends traditional flavors with local seafood, and they love sharing these meals with family gatherings.
  core: Heriberto Lopez merges disciplined craftsmanship with a quiet love for family traditions, balancing meticulous work ethic, prudent finances, and a solitary yet community‑rooted lifestyle that values
    practical skill and cultural continuity, and they embody a steady, reliable presence in every sphere of life.
background:
  cultural: Heriberto grew up in a Salvadoran immigrant household in Florida, where Spanish was spoken at home and Salvadoran customs were celebrated. He maintains strong ties to his cultural heritage through
    family meals, the preparation of pupusas and other traditional foods, and participation in local Hispanic festivals and church gatherings. His upbringing emphasizes familismo, respect for elders, and
    a collaborative spirit, which he brings to his work and community life. While fully integrated into the multicultural environment of Sarasota, he balances his Salvadoran identity with the broader American
    culture, navigating both worlds with bilingual fluency and a deep appreciation for his roots.
attributes:
