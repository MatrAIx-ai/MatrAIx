personas:
  professional: Donna Givhan is an aspiring visual storyteller who blends watercolor sketches with budding photography to capture lakeside scenes, using her curiosity and relaxed attitude toward deadlines
    to freely experiment, even if it sometimes results in unfinished projects.
  sports: Donna Givhan enjoys playing on a Madison youth soccer team on Saturday afternoons, eagerly follows the Wisconsin Badgers football during the fall, and roots for the Milwaukee Bucks when the NBA
    playoffs arrive, preferring low‑key group activities over high‑intensity competitions.
  arts: Donna Givhan immerses herself in the impressionistic brushwork of Claude Monet while listening to Bon Iver’s indie folk and the piano compositions of Ludovico Einaudi, often re‑imagining scenes
    from Greta Gerwig’s indie films in her sketchbook, and cites JK Rowling’s fantasy worlds as narrative inspiration.
  travel: Donna Givhan’s travel adventures include family road trips to Door County’s lighthouse‑lined shores and a weekend excursion to Chicago’s Art Institute, while she daydreams of a future visit to
    the Scottish Highlands, yet she usually plans lakeside hikes around Madison on a whim, using a sketch‑filled map to guide her.
  culinary: Donna Givhan loves blending fresh strawberries with garden basil into a summer smoothie, dabbles in quick vegetable stir‑fry with soy sauce, rice, and snap peas, and often snacks on cheese‑filled
    pretzel bites while sketching, occasionally treating herself to a slice of pepperoni pizza after a successful art workshop.
  core: Donna Givhan is a quietly imaginative 12‑year‑old who channels her emotional intensity into art, prefers spontaneous plans, and balances a love of nature with a habit of leaving projects unfinished.
background:
  cultural: Donna grows up in a suburban neighborhood of Madison, Wisconsin, where Midwestern values of community, modesty, and appreciation for the outdoors are woven into daily life. Her family celebrates
    seasonal traditions such as summer picnics at the lake, autumn apple picking, and winter holiday gatherings that emphasize togetherness and generosity. The city’s vibrant arts scene, public libraries,
    and progressive school environment expose her to diverse artistic expressions and encourage her open‑minded curiosity. While her ethnic background is white, she is taught to respect cultural diversity
    and frequently participates in multicultural events hosted by the local community center.
