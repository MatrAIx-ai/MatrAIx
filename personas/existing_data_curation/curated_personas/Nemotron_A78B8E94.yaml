  career_goals: Donna dreams of becoming an artist who creates immersive worlds—through illustration, graphic novels, or animated storytelling. She also envisions a future where she can teach art and creative
    writing to other children in a community‑center setting, blending her love for creativity with her desire to nurture harmony and support others. Her long‑term ambition is a flexible, self‑directed career
    that allows her to explore new ideas and collaborate in small, like‑minded groups.
