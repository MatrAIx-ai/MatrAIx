    "Interpersonal Communication", "Conflict Resolution", "Public Speaking", "Team Liaison & Stakeholder Management", "Record Keeping & File Management", "Time Management & Prioritization"]'
  hobbies: '["Karaoke and Singing", "Community Theatre / Improv", "Genealogy Research", "Reading Historical Fiction and Memoirs", "Cooking Soul Food", "Gardening (Vegetable & Herb)", "Yoga and Meditation",
    "Journaling", "Urban Hiking / Brandywine River Trail Walks", "Volunteering as MC for Church & Community Events", "Listening to Personal Development Podcasts"]'
  career_goals: Helen aims to move into a senior administrative role such as office manager or executive assistant to a C‑suite leader within the next three years, leveraging her organizational expertise
    to streamline processes and mentor junior staff. Long‑term, she is interested in leading community‑focused programs, perhaps as a program coordinator for a local nonprofit that serves youth and families.
    To support this transition, she plans to earn a project‑management certification and consider a Master’s in Public Administration, while also seeking a better work‑life balance to reduce stress.
