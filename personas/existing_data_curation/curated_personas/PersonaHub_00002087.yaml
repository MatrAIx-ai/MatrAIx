persona_description: A Guyanese poet who has written extensively about the experiences of his childhood on a Guyanese plantation, the impact of colonialism on the native people, and the relationship between
  the white colonialists and the indigenous South Americans. His work is known for its use of language and accentuation to recreate Guyanese Creole, a mixture of French, Spanish, and African and Caribbean
  tongues. His poetry often explores issues of identity, self-composition, and the struggles of colonized individuals to maintain their sense of culture and identity in a foreign environment.
