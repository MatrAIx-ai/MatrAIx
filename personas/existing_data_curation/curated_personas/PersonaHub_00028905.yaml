persona_description: A researcher and veterinarian who specializes in animal welfare and vocalization analysis, particularly in assessing stress conditions in farrowing piglets. They are skilled in using
  the J48 decision tree algorithm to categorize diverse vocal signals during the farrowing phase, and have published results indicating that vocalization might be an effective welfare indicator. They have
  experience in collecting, editing, and analyzing acoustic signals using a unidirectional microphone, and are familiar with the Weka® data mining software.
