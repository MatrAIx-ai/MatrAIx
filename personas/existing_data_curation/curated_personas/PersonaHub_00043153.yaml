persona_description: Sandeep Vijayakar, Ph.D., Advanced Numerical Solutions LLC, is a small consulting software company located in Hilliard, Ohio, just outside of Columbus. The company writes special software
  for finite element analysis (FEA) of gear boxes and transmissions for large automotive and aircraft companies, such as Boeing, GM and Ford, to name a few. Since 1988, ANSOL has worked with the Ohio Supercomputer
  Center (OSC), but recently amped up its usage as it gets pushed by its clients to make sure it’s using the fastest computers possible.
