    "Smart home automation integration", "Community electrical safety education"]'
  hobbies: '["Watercolor painting", "Photography (lighting and architecture)", "Birdwatching", "Gardening", "Reading (art history, technology, sustainability)", "Crossword puzzles", "Scale model house building",
    "DIY home‑improvement projects", "Listening to jazz and blues", "Researching solar and smart home technologies"]'
  career_goals: Amber aims to obtain the Georgia Master Electrician license and a NABCEP Certified PV Installation Professional credential within the next two years. She plans to transition from full‑time
    field work to a boutique consulting practice that blends her electrical expertise with her passion for artistic lighting and energy efficiency, focusing on historic homes and small businesses in rural
    Georgia. Additionally, she seeks to establish a mentorship program for young Black women interested in the trades, and to teach electrical safety workshops at the local community college.
