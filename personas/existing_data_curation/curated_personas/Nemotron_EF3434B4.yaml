personas:
  professional: Amber Dennis is a veteran electrical contractor with three decades of hands‑on expertise in residential and small‑commercial wiring, specializing in sustainable technologies like solar PV,
    LED lighting design, and smart‑home automation, and they blend meticulous blueprint interpretation with an artistic eye for historic‑home lighting while mentoring apprentices and laying the groundwork
    for a boutique consulting practice focused on energy‑efficient, aesthetically resonant solutions.
  sports: Amber Dennis is a loyal fan of the Atlanta Braves and watches the Atlanta Falcons each fall, yet their personal fitness routine centers on solitary early‑morning birdwatching walks through their
    garden, a weekly gentle yoga class at the local community center, and occasional rides with a senior cycling club that meets on Saturday afternoons.
  arts: Amber Dennis channels their artistic curiosity into watercolor landscapes inspired by the luminous brushwork of John Singer Sargent and the bold colors of Georgia O'Keeffe, captures architectural
    shadows with a Nikon DSLR echoing Ansel Adams' compositional precision, and winds down with classic jazz records by Miles Davis and B.B. King that fill their workshop with mellow blues.
  travel: Amber Dennis prefers meticulously planned solo getaways that blend quiet reflection with cultural immersion, such as sunrise hikes in the Blue Ridge Mountains, weekend explorations of Savannah’s
    historic squares, a musical pilgrimage to New Orleans’ French Quarter, and a cherished dream of strolling the cobblestone streets of Bruges, all orchestrated on a modest budget that balances consulting
    income and retirement savings.
  culinary: Amber Dennis enjoys farm‑to‑table Southern cooking, expertly preparing dishes like roasted sweet potatoes seasoned with sage, herb‑marinated grilled salmon, and collard greens slow‑cooked with
    smoked turkey, while frequently harvesting heirloom tomatoes, fresh basil, and jalapeños from their own garden to enrich each meal.
  core: Amber Dennis fuses quiet creativity with methodical engineering, turning solitary artistic pursuits into sustainable lighting solutions while championing mentorship for underrepresented women in
    the trades.
background:
  cultural: Amber was raised in a close‑knit African‑American community in Seminole County, where church, family, and oral storytelling were central to daily life. Her parents emphasized hard work, self‑reliance,
    and respect for craftsmanship, exposing her early to sewing, quilting, and woodworking traditions. Growing up during the tail end of the civil‑rights era, she internalized a sense of responsibility
    to break barriers, which guided her entry into the male‑dominated electrical trade. She maintains cultural ties through gospel music, Southern cooking, participation in a local Black women’s club, and
    the quiet reflection that comes from her community’s emphasis on resilience and communal support.
attributes:
  skills: '["Residential wiring", "Commercial wiring", "Electrical code compliance (NEC)", "Troubleshooting and diagnostics", "Blueprint reading", "Solar photovoltaic installation", "LED lighting design",
