personas:
  professional: Thomas Stjohn, a four‑year‑old classroom organizer at Bright Beginnings Preschool, meticulously lines up books, sorts crayons, and leads the daily clean‑up routine, demonstrating early organizational
    skill, reliability, and a quiet confidence that comforts peers.
  sports: Thomas Stjohn is a member of the Little Tigers Soccer Club, loves the structured practice every Saturday, cheers for the New York Yankees on Sundays, and enjoys backyard catch with a soft ball,
    preferring calm, low‑impact activities and predictable schedules over chaotic competitive games.
  arts: Thomas Stjohn delights in watching Sesame Street and listening to The Wiggles, frequently draws Mickey Mouse and dinosaurs, attends weekly storytime at the local library featuring Mo Willems, and
    collects stickers of Tim Burton characters, finding quiet creative moments essential for their emotional balance.
  travel: Thomas Stjohn has visited the local zoo, spent a week at Disneyland, and taken a family road trip to the Grand Canyon, always traveling with a detailed itinerary that includes scheduled nap times
    and quiet breaks, because spontaneous changes can trigger anxiety and distress.
  culinary: Thomas Stjohn loves creamy mac and cheese, crispy chicken nuggets, and carrot sticks, can assemble a peanut butter and jelly sandwich with minimal help, and enjoys blending banana‑strawberry
    smoothies with a splash of almond milk, while often refusing mushy peas due to texture sensitivity.
  core: Thomas Stjohn is a meticulous, gentle four‑year‑old whose love of routine, kindness, and emotional sensitivity shape a calm yet occasionally anxious view of the world.
background:
  cultural: Thomas is raised in a white American family in Fresno, California. His household follows mainstream American traditions such as celebrating Thanksgiving, Halloween, and the Fourth of July, and
    they attend a local preschool where he interacts with a culturally diverse group of children typical of the Central Valley. The family reflects suburban middle‑class values, with occasional references
    to European ancestry (e.g., German and Irish roots), and he is exposed to the agricultural community surrounding Fresno through family visits to nearby farms and community events.
attributes:
  skills: '[''Letter Recognition'', ''Number Recognition'', ''Block Sorting'', ''Puzzle Solving'', ''Following Routines'', ''Empathetic Interaction'', ''Toy Organization'']'
