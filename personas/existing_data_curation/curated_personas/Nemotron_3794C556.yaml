  career_goals: Even at four, Thomas talks about wanting to help people and keep things orderly. He imagines becoming a teacher or a librarian, where he could organize books, guide younger children, and
    maintain a calm, structured environment. He also expresses a fascination with being a firefighter because he likes the idea of protecting and assisting others, reflecting his caring nature and desire
    for predictable roles.
