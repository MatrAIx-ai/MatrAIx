  career_goals: Janet aims to build a stable career that blends her caring nature with her practical strengths. In the next two years she plans to enroll in a community‑college program in early childhood
    education or health services, aspiring to become a preschool teacher or a certified nursing assistant, roles that let her work closely with children or patients. She also dreams of launching a small
    home‑based bakery or craft shop that sells homemade pies, preserves, and hand‑stitched quilts, turning her culinary and creative hobbies into a modest income source. She hopes to balance further education
    with part‑time work, allowing her to stay close to her family while gaining financial independence.
