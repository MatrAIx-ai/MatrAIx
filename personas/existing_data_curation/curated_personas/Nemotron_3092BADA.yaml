personas:
  professional: Janet Baker, a 22-year-old from a small North Carolina town, merges clear communication, basic tech skills, and hands‑on experience in cooking, gardening, and first‑aid into a budding path
    toward early‑childhood education or certified nursing assistance while sketching plans for a home‑based bakery and quilt shop, they balance reliability with a flexible, curiosity‑driven approach.
  sports: Janet Baker, a 22-year-old who enjoys light hiking on nearby trails, participates in a local walking club that meets at the community center, they follow the Charlotte Hornets and Carolina Panthers
    on television, and practice yoga at home three times a week, balancing modest fitness goals with a relaxed attitude toward competitive sports.
  arts: Janet Baker, a 22-year-old who expresses creativity through quilting and knitting, gifts embroidered scarves while listening to true‑crime podcasts like Serial, reads historical fiction by Philippa
    Gregory, and they find comfort in the folk sounds of Old Crow Medicine Show and the soulful voice of Beyoncé during church potlucks, allowing music and storytelling to shape her identity.
  travel: Janet Baker, a 22-year-old who loves weekend drives to the Blue Ridge Mountains and the Outer Banks, has visited Asheville’s arts district and longs to explore Edinburgh’s historic castles and
    Savannah’s oak‑lined squares, they plan trips with a modest budget, prefer low‑key nature retreats over crowded tourist hubs, and use their savings account to fund occasional train adventures.
  culinary: Janet Baker, a 22-year-old who delights in baking apple‑cinnamon pie and peach crumble using fresh basil and thyme from her garden, crafts homemade strawberry preserves, experiments with a sourdough
    starter, and they sometimes over‑sugar their desserts out of nervous energy, balancing modest cooking skill with a deep love for family‑recipe comfort foods.
  core: Janet Baker, a 22-year-old caring community member with a knack for quilting, baking, and worrying over every decision, they blend practical ambition with a habit of over‑thinking and occasional
    sugar‑laden stress relief.
background:
  cultural: 'Janet grew up in Newton, a small town in Catawba County, North Carolina, within a predominantly white, working‑class community. Her family’s roots are intertwined with Southern traditions:
    regular church attendance at a local Baptist congregation, weekly family meals featuring regional dishes, and participation in community events such as high‑school sports games and county fairs. The
    close‑knit nature of her town fostered a sense of responsibility toward neighbors, and her upbringing emphasized humility, hospitality, and the value of hard work. These cultural influences shape her
    cooperative demeanor, her preference for harmony, and her desire to contribute to her community.'
