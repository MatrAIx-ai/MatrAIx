  career_goals: Damaris aims to transition from senior developer to technical architect, where she can shape the overall structure of large‑scale systems and enforce disciplined engineering standards. She
    is pursuing AWS Solutions Architect certification to broaden her cloud expertise and to position herself for roles that offer greater predictability and stability. Long‑term, she wishes to mentor emerging
    developers, especially bilingual or underrepresented talent, while championing mental‑health‑friendly work practices that mitigate the stress she personally experiences. Ultimately, she hopes to lead
    a development team that values rigorous planning, transparent communication, and reliable delivery, allowing her to balance her competitive drive with a structured, low‑stress environment.
