  hobbies: '[''Watercolor painting'', ''Ceramics'', ''Visiting art museums'', ''Reading art history and contemporary fiction'', ''Gardening native plants'', ''Cooking Cuban and Caribbean cuisine'', ''Walking
    on South Beach'', ''Yoga'', ''Volunteering as a story‑time reader'']'
  career_goals: Approaching retirement, Dianna aims to transition into a leadership role that leverages her expertise in arts‑infused education. She plans to lead a school‑wide STEAM initiative, develop
    a mentorship program for early‑career teachers, and author a guidebook on integrating business concepts into elementary curricula. Additionally, she hopes to earn a Master of Education with a focus
    on curriculum innovation, and to volunteer as a consultant for local non‑profits that provide arts enrichment to under‑served youth. Ultimately, Dianna envisions leaving a lasting legacy of creative,
    flexible teaching practices that empower future generations.
