personas:
  professional: Anthony Sebastian, a 33-year-old home health aide who blends meticulous vital-sign monitoring and Medicaid paperwork expertise with spontaneous art-themed storytelling, leverages their sociable,
    improvisational flair to boost patient morale, and they are actively pursuing CNA certification and a future case-manager role in community wellness.
  sports: Anthony Sebastian, a devoted fan of the Kentucky Wildcats basketball and Louisville Cardinals football, spends summer weekends playing pick-up basketball at the local YMCA, joins the Georgetown
    Trail Hikers for autumn hikes through Red River Gorge, and squeezes in occasional Tuesday night yoga classes, and they treat fitness more as a social outlet than a rigid routine.
  arts: Anthony Sebastian, a regular at Georgetown's seasonal art fairs and improv nights with the Bluegrass Improv Collective, delights in harmonica jams inspired by Little Walter and Bob Dylan, collects
    prints by contemporary folk illustrator Rhiannon Giddens, and they often cite the storytelling of actor Frances McDormand as a model for their own community workshops.
  travel: Anthony Sebastian favours spontaneous, low-budget road trips to nearby gems like Mammoth Cave, Red River Gorge, and Shenandoah National Park, while dreaming of a future culinary pilgrimage to
    Oaxaca, Mexico, and they balance a love for outdoor adventure with occasional yearning for the vibrant festivals of New Orleans and the art scene of Barcelona.
  culinary: Anthony Sebastian's experimental kitchen swaps Southern staples - fried chicken, collard greens, and cornbread - for global twists like kimchi-infused slaw, cajun-spiced shrimp etouffee, and
    mango-chili BBQ glaze, showcasing their moderate cooking skills and they love sriracha, smoked paprika, fresh basil, and sweet potato mash as a canvas for flavor improvisation.
  core: Anthony Sebastian is a sociable, art-obsessed home health aide who blends Southern comfort cooking with global flavors, runs impromptu community events, and they embrace a relaxed, improvisational
    life rhythm that sometimes leaves their planner in disarray.
background:
  cultural: Anthony was raised in a small-town, working‑class white family in central Kentucky, with deep ties to the Appalachian cultural region. His upbringing emphasized Southern hospitality, storytelling,
    and a strong sense of community. He grew up participating in local festivals, church gatherings, and bluegrass music sessions, which fostered his appreciation for shared experiences and collective well‑being.
    While his heritage is primarily Anglo‑American, he actively seeks out diverse cultural expressions through art, music, and cuisine, reflecting an open‑minded attitude shaped by his curious personality.
attributes:
  skills: '[''Patient care'', ''Medication assistance'', ''Vital sign monitoring'', ''Basic wound care'', ''Electronic health record navigation'', ''Medicaid/Medicare paperwork handling'', ''Interpersonal
