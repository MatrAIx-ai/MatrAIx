    ''Improvisational storytelling'']'
  hobbies: '[''Attending local art fairs'', ''Playing harmonica'', ''Improv theater participation'', ''Listening to folk and bluegrass music'', ''Spontaneous road trips to state parks'', ''Cooking Southern
    dishes with international twists'', ''Hosting game nights'', ''Mentoring youth in art programs'', ''Organizing community wellness events'']'
  career_goals: Anthony aims to advance from home health aide to a supervisory or case manager role within home health services. He plans to earn a Certified Nursing Assistant (CNA) credential and later
    an Associate's degree in Health Sciences to broaden his clinical knowledge. Long‑term, he envisions opening a community wellness hub that blends health care with art‑therapy workshops, providing a holistic
    approach to well‑being for residents of Georgetown and surrounding rural areas. He also hopes to start a nonprofit organization that offers affordable home health services and cultural enrichment programs
    for underserved populations in Kentucky.
