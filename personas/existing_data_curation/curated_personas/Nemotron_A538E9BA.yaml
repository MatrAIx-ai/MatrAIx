  hobbies: '[''Cooking Mexican and Tex‑Mex cuisine'', ''Gardening'', ''Hiking in Hill Country'', ''Cycling'', ''Attending live music concerts'', ''Salsa dancing'', ''Reading psychological thrillers'', ''Yoga'',
    ''Volunteering at health fairs'']'
  career_goals: Rosa aims to transition into an advanced practice role within the next five years, pursuing a Master of Science in Nursing with a focus on community health and health equity. She aspires
    to become a Family Nurse Practitioner serving underserved Latino neighborhoods in Austin, develop and lead community outreach programs that promote preventative care, and mentor junior nurses. Long‑term,
    Rosa envisions taking on a leadership position—such as nursing manager or director of community health—where she can influence policy, integrate innovative health‑technology solutions, and champion
    culturally responsive care.
