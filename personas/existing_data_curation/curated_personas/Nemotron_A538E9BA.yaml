personas:
  professional: Rosa Morales, a seasoned nurse with over two decades of acute and community experience, blends her expertise in clinical assessment, medication administration, health informatics, and bilingual
    communication to champion evidence‑based, culturally responsive care while juggling a relaxed, sometimes disorganized approach to planning.
  sports: Rosa Morales enjoys hiking Hill Country trails and cycling around Lady Bird Lake for fitness, roots for the Austin FC soccer team and the Texas Longhorns football squad, and joins a local weekend
    cycling club, though they sometimes skip workouts when community events demand their time.
  arts: Rosa Morales frequents live concerts ranging from indie folk at Stubb’s to salsa nights at community halls, dances to the rhythms of artists like Carlos Vives and Rubén Blades, and devours psychological
    thrillers by Gillian Flynn and Tana French, finding that music and suspenseful fiction fuel their creative spirit.
  travel: Rosa Morales prefers road‑trip adventures that mix hiking in the Grand Canyon, exploring the historic districts of New Orleans, and relaxing on a coastal getaway in Puerto Vallarta, planning trips
    around family commitments and budgeting constraints while dreaming of a future cultural immersion in Barcelona.
  culinary: Rosa Morales delights in preparing tortilla‑wrapped stews, chili‑spiced grilled chicken, fresh cilantro‑lime rice, and homemade salsa using garden‑grown herbs like cilantro, oregano, and jalapeño,
    demonstrating a confident home‑cooking skill set that balances traditional family recipes with experimental twists from the farmer’s market.
  core: Rosa Morales is a compassionate, bilingual nurse who balances a love for fresh, herb‑laden cooking and salsa dancing with a laid‑back, occasionally disorganized lifestyle that sometimes leads them
    to postpone personal health check‑ups while championing community wellness.
background:
  cultural: Rosa is a first‑generation Mexican‑American who grew up in a close‑knit bilingual household in Texas. Her family traditions—celebrating Día de los Muertos, sharing tamales during holidays, and
    participating in local Latino festivals—have shaped her sense of identity. Fluently speaking Spanish and English, she often serves as a cultural bridge in her nursing practice, ensuring that patients
    from diverse backgrounds receive respectful, culturally appropriate care. Her Catholic upbringing and strong family values emphasize community support and collective wellbeing, which inform her compassionate
    approach to both personal life and professional responsibilities.
attributes:
  skills: '[''Clinical assessment'', ''Medication administration'', ''IV therapy'', ''Wound care'', ''Emergency triage'', ''Health informatics'', ''Bilingual communication (English/Spanish)'', ''Culturally
