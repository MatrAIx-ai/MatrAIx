  career_goals: Although retired, Travis aims to deepen his engagement with Seattle’s arts community by volunteering as a docent at the Seattle Art Museum and leading a series of community workshops on
    sustainable home repair and woodworking. He aspires to write a memoir that captures his life experiences and the cultural changes he has witnessed. Travel to world‑renowned art destinations such as
    the Louvre and the Van Gogh Museum is a personal ambition, as is continuing to mentor younger volunteers and maintain his health through regular hikes and active participation in local events.
