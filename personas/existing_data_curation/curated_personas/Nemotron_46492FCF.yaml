personas:
  professional: Hnin Cho is an aspiring data analyst with a strong foundation in molecular biology, proficient in Python, R, and Tableau, who seeks a predictable, low‑stress research environment where they
    can apply rigorous statistical modeling to mental‑health studies, and leverages bilingual fluency to craft clear, culturally sensitive reports for cross‑cultural collaborations.
  sports: Hnin Cho prefers solitary, low‑impact fitness routines, practicing gentle yoga at a quiet Brooklyn studio three times a week, jogging along the Hudson River on crisp mornings, and quietly supporting
    the New York Rangers during the NHL season, while being a member of the local yoga club’s meditation circle.
  arts: Hnin Cho’s artistic expression flourishes through watercolor paintings of serene botanical scenes, often created while listening to ambient composer Brian Eno and the piano works of Yiruma, and
    they unwind by reading contemporary fiction by Sally Rooney and revisiting classic poems written in the language of her parents, which together shape a contemplative aesthetic.
  travel: Hnin Cho’s travel style leans toward short, reflective escapes, such as a weekend hike at Mohonk Preserve in the Catskills, a spring pilgrimage to Kyoto’s Zen gardens, and a summer stroll through
    Singapore’s Botanic Gardens, planning each trip with meticulous itineraries and modest budgets to ensure tranquility without overwhelming social demands.
  culinary: Hnin Cho delights in preparing traditional dishes from her family’s homeland such as mohinga broth and lahpet thoke for family gatherings, while also experimenting with matcha‑infused avocado
    toast and seasonal salads featuring lemongrass, turmeric, and fresh basil sourced from the Union Square Greenmarket, turning cooking into a meditative bridge between heritage and contemporary flavors.
  core: Hnin Cho is a disciplined, introspective analyst who balances meticulous data work with quiet creative rituals, navigating anxiety through structured routines and gentle mindfulness.
background:
  cultural: Hnin is a second‑generation East Asian American whose parents immigrated from Myanmar (Burma) and settled in Queens before moving to Manhattan. Raised bilingual, she speaks Burmese at home and
    English at school, and was nurtured in a family environment that emphasized academic achievement, collective harmony, and respect for Buddhist traditions. Community celebrations such as Thingyan (Burmese
    New Year) and regular visits to local Burmese cultural centers reinforced her connection to heritage. Balancing these cultural expectations with the diverse, fast‑paced life of New York City, Hnin has
    cultivated a disciplined yet compassionate identity that values structure, responsibility, and supportive relationships.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''MATLAB modeling'', ''Data visualization (Tableau, PowerBI)'', ''SQL database management'', ''Molecular biology laboratory techniques'',
