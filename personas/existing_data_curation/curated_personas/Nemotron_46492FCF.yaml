  hobbies: '[''Reading contemporary fiction'', ''Burmese literature'', ''Journaling'', ''Mindfulness meditation'', ''Gentle yoga'', ''Watercolor painting'', ''Sketching'', ''Puzzle solving (Sudoku, crosswords)'',
    ''Personal coding projects (data visualization)'', ''Visiting botanical gardens and quiet cafés'', ''Cooking traditional Burmese dishes'']'
  career_goals: Hnin aims to secure a data‑focused or research role that offers a predictable schedule and a calm work environment, ideally with opportunities for remote or quiet‑lab work. She is passionate
    about applying her analytical skills to mental‑health research, aspiring to contribute to evidence‑based solutions for anxiety and depression. In the long term, she hopes to pursue a master’s degree
    in data science or public health, advance to a lead analyst or research scientist position, and eventually lead projects that combine technology with compassionate care while maintaining a healthy work‑life
    balance.
