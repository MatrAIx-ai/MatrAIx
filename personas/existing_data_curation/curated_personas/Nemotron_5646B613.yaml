personas:
  professional: Rogers Barrino, a certified registered nurse with extensive acute and primary care experience, combines methodical patient assessments, strong EHR proficiency in Epic and Cerner, and a collaborative
    leadership style to drive quality‑improvement projects and precept new staff, positioning themselves for a future nurse‑manager role.
  sports: Rogers Barrino energizes their mornings with jogs around Lake Ellen, logs distance and pace in a fitness app, joins pickup basketball games at the community center three times a week, cheers on
    the Orlando Magic and Tampa Bay Buccaneers, and participates in seasonal 5K charity runs to stay fit.
  arts: Rogers Barrino immerses themselves in the smooth sounds of John Coltrane, Nina Simone, and contemporary R&B artist H.E.R., reads biographies like 'When Breath Becomes Air' and contemporary literary
    works, and unwinds by playing strategic video games such as 'Civilization VI' on weekends, occasionally attending local jazz club performances.
  travel: Rogers Barrino prefers weekend getaways that mix cultural immersion with relaxation, having explored Savannah’s historic squares, Asheville’s mountain arts scene, and the Gulf Coast’s seafood
    towns, while planning a future road trip along the Pacific Northwest to balance family time with personal discovery.
  culinary: Rogers Barrino crafts weekly Southern‑inspired meals such as baked collard greens with smoked turkey, quinoa jambalaya, and sweet‑potato‑glazed salmon, using fresh herbs and vegetables from
    their garden and swapping heavy cream for Greek yogurt to keep dishes heart‑healthy, while skillfully balancing flavor and nutrition.
  core: Rogers Barrino blends methodical nursing expertise with early‑morning runs, soulful jazz, community‑focused cooking, and a curiosity for health‑tech, always balancing practical stewardship with
    a drive to serve.
background:
  cultural: Rogers was raised in a close‑knit African‑American family in Central Florida, where church, community service, and family gatherings were core pillars of his upbringing. He draws on the traditions
    of Southern Black culture—such as soulful cuisine, gospel music, and a strong emphasis on collective welfare—to shape his personal values and professional ethos. His heritage informs his commitment
    to culturally competent care, especially for Black and Hispanic patients facing health inequities in Polk County. Rogers also honors his family's legacy of resilience and education by actively supporting
    local mentorship programs that empower youth from similar cultural backgrounds to pursue careers in healthcare.
attributes:
  skills: '[''Patient assessment'', ''IV therapy'', ''Wound care'', ''Medication administration'', ''Electronic health record (EHR) proficiency'', ''BLS/ACLS/PALS certification'', ''Quality improvement
    initiatives'', ''Patient education'', ''Preceptorship and mentorship'', ''Multidisciplinary care coordination'']'
  hobbies: '[''Jogging'', ''Pickup basketball'', ''Reading medical non-fiction and Black literature'', ''Cooking healthy soul food'', ''Gardening'', ''Volunteer health outreach'', ''Mentoring students'',
    ''Listening to jazz and R&B'', ''Strategic video gaming'']'
  career_goals: Rogers aims to advance from bedside nursing to a leadership role within the next five years. He plans to complete his Bachelor of Science in Nursing (BSN) and subsequently pursue a Master’s
    degree in Nursing Administration. His long‑term ambition is to become a Nurse Manager or Clinical Nurse Leader at a community hospital in Polk County, where he can integrate evidence‑based practice
    with efficient operational processes. He is also interested in spearheading community outreach programs that address health disparities among underserved Black and Hispanic residents, leveraging his
    curiosity for new health technologies while maintaining the practical, patient‑centered focus that defines his nursing philosophy.
