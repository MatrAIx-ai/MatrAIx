persona_description: A political scientist who specializes in the study of American politics, particularly the history and development of the Southern states' relationship with the federal government. Their
  research interests include the impact of federal policies on the South, the role of the Democratic Party in the region, and the changing dynamics of state loyalty and political affiliation in the post-war
  era. They are also interested in the development of a strong federal government as a tool for economic and social transformation in Dixie, and the need for a Jeffersonian revival to address the current
  challenges of cronyism, class divisions, and a hollowed-out sense of American self-reliance.
