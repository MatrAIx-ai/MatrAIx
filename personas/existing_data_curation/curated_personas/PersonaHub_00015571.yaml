persona_description: A geologist who specializes in remote sensing and mapping of the Moon's surface, particularly focusing on the radar data collected from the SP cone and lava flow, Sunset Crater National
  Monument, and Meteor Crater. He/she is passionate about interpreting and understanding the surface conditions of the Moon based on the data collected by the instrument orbiting the Moon. The person is
  knowledgeable about the properties and characteristics of volcanic features, impact craters, and lunar surface conditions, and is skilled in using the radar data to compare and contrast different areas
  of the Moon.
