personas:
  professional: Shelia Chavis is a budding young storyteller who channels their love of adventure and historical picture books into comic-style illustrations, and they organize each page with a methodical
    storyboard routine that mirrors their preference for structure and their cooperative spirit in sharing ideas with classmates.
  sports: Shelia Chavis plays on the Midtown Junior Soccer Club and the Little League Ravens T-ball team, cheering for the local minor league team while also following the New York Yankees and watching
    the Chicago Bulls on TV, and they approach each practice with the same organized, rule-following attitude they apply to classroom tasks.
  arts: Shelia Chavis spends afternoons drawing detailed comic-style panels inspired by Stan Lee's superheroes and Disney's classic characters, while also crafting friendship bracelets with multicolored
    beads and performing gospel songs in the church children's choir, an artistic blend that frames their creative expression within disciplined practice.
  travel: Shelia Chavis enjoys family trips that balance structured itineraries with imaginative play, having visited Disney World in Florida, explored the Grand Canyon's rim, and taken a weekend road-trip
    to Washington, D.C., where they loved the Smithsonian's Air and Space Museum, while they eagerly keep a scrapbook of stickers from each destination.
  culinary: Shelia Chavis loves the comforting taste of mac and cheese, the crisp crunch of carrot sticks with hummus, and the sweet burst of strawberry smoothies, often helping her parents knead pizza
    dough and sprinkle extra cheese on toppings, though they sometimes sneak an extra spoonful of peanut butter onto their sandwich when no one is watching.
  core: Shelia Chavis, a 7-year-old with a love for organized storytelling, methodical LEGO building, and heartfelt choir singing, balances their practical nature with creative bursts, occasionally over-schedules
    playtime and forgets to wear sunscreen.
background:
  cultural: Shelia belongs to a close‑knit African‑American family in Georgetown, South Carolina, a region with deep ties to the Gullah/Geechee heritage. Her upbringing is rooted in community values, church
    participation, and family storytelling that celebrate the legacy of ancestors who lived through the Reconstruction era and the civil‑rights movement. She regularly partakes in cultural traditions such
    as celebrating Juneteenth, enjoying soul food dishes like collard greens and cornbread at family gatherings, and listening to gospel and R&B music. These experiences shape her sense of identity, resilience,
    and connection to her local community.
