  hobbies: '[''Reading adventure and historical picture books'', ''Drawing comic‑style illustrations'', ''Making friendship bracelets'', ''Playing soccer and T‑ball'', ''Singing in the church children’s
    choir'', ''Solving jigsaw puzzles'', ''Building LEGO sets'', ''Gardening with family'']'
  career_goals: Shelia dreams of becoming an elementary school teacher because she loves structured learning environments and wants to help other children develop reading and math skills. She also imagines
    herself as a pediatric nurse, caring for kids and animals, combining her compassion with her methodical approach to tasks. Her long‑term ambition is to graduate high school with honors, attend a university
    in South Carolina, and give back to her community by mentoring younger kids and participating in local youth programs.
