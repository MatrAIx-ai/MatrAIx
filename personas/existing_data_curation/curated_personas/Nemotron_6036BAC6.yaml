  career_goals: She dreams of growing up to explore both the outer world and the world of ideas. Elizabeth imagines herself as an astronaut who can see Earth from space, a children’s book author who brings
    fantastical worlds to life, or a TV host who makes science fun and accessible for kids. She also loves the idea of being a community leader who organizes art workshops and storytelling events for her
    neighborhood, combining her sociable nature with her passion for creativity.
