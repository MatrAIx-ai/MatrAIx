personas:
  professional: Elizabeth Merritt is an aspiring junior illustrator who blends vivid imagination with meticulous LEGO engineering, channeling their love for storytelling into intricate character sketches
    and lively short plays that often become the centerpiece of family gatherings, and they proudly showcase each new creation at school art shows.
  sports: Elizabeth Merritt dabbles in community soccer with the Tiny Tigers club, cheers on the local baseball team, the Harbor Hawks, enjoys splash‑up swimming at the nearby Aquatic Center during summer,
    and they practice butterfly‑style stretches inspired by her fascination with real butterflies, blending competitive play with whimsical movement.
  arts: Elizabeth Merritt dives into the worlds of Studio Ghibli films, Marvel comics, and Dr. Seuss books, drawing inspiration from artists like Hayao Miyazaki and musicians such as Kidz Bop, while they
    perform impromptu skits to the soundtrack of Taylor Swift’s 'Shake It Off' during family movie nights.
  travel: Elizabeth Merritt loves planning treasure‑map style itineraries for family trips, has explored the sandy shores of Seaside Beach collecting shells, trekked through Redwood National Park’s kid‑friendly
    trails, and they dream of visiting the magical realms of Disneyland in California and the ancient castles of Edinburgh.
  culinary: Elizabeth Merritt delights in crafting rainbow fruit kebabs, mixing chocolate chip cookie dough, and topping their favorite spaghetti with heart‑shaped meatballs, often insisting on sprinkling
    extra parmesan and they cheer 'bon appétit' after each bite.
  core: Elizabeth Merritt is a boundlessly creative eight‑year‑old who turns everyday moments into vibrant stories, saves allowance in glittery jars, and they dance through life with an infectious energy
    that sometimes leaves a trail of LEGO bricks and crayon marks.
background:
  cultural: Elizabeth comes from a white, middle‑class family that has lived in Miami for several generations. While her household primarily celebrates typical American holidays and traditions, the vibrant
    multicultural atmosphere of Miami—especially its strong Latin and Caribbean influences—has seeped into her upbringing. She often hears Spanish phrases from neighbors, enjoys occasional salsa music at
    community events, and has attended art workshops that showcase diverse cultural styles. Her family values education, community involvement, and artistic expression, encouraging her curiosity and her
    love for sharing stories with others.
attributes:
  skills: '[''drawing and painting'', ''creative storytelling'', ''reading comprehension'', ''basic arithmetic'', ''singing'', ''dancing'', ''leading group games'']'
