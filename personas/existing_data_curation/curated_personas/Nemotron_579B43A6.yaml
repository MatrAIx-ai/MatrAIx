    to traditional Mexican music"]'
  career_goals: Christina aims to advance to a senior account‑manager or regional‑lead position within the next two years, where she can shape sales strategy for service portfolios and mentor emerging talent.
    She is pursuing a certification in cloud‑service sales to deepen her technical credibility and plans to leverage her experience to launch a part‑time consulting practice that assists local small businesses
    in digital transformation. Balancing ambition with her desire for manageable stress, she also seeks to embed wellness practices into her daily routine and to champion a supportive, collaborative culture
    within her team.
