    and embroidery'', ''Hosting intimate dinner gatherings'']'
  career_goals: Asha’s aspirations center on deepening her contribution to community arts and cultural preservation while maintaining the flexibility she values. She hopes to assume a leadership role at
    a local South Asian cultural center, designing intimate workshops that blend traditional Indian crafts with contemporary art techniques. She also dreams of launching a modest home‑based online boutique
    to sell her hand‑knit scarves and embroidered home décor, using her culinary storytelling to brand the products. Additionally, Asha intends to document her family’s migration history in a written memoir
    that can serve as both a personal legacy and a resource for younger generations. These goals allow her to give back, explore new creative avenues, and stay engaged without sacrificing the balanced,
    relaxed lifestyle she cherishes.
