  hobbies: '["Sketching landscapes", "Digital photography of nature", "Playing acoustic guitar (folk/bluegrass)", "Creative writing (short stories, poetry)", "Hiking and birdwatching", "Volunteer work at
    community library art programs", "Improv theater", "Attending craft fairs and music festivals", "Woodworking small projects", "Reading graphic novels"]'
  career_goals: Nicholas hopes to turn his artistic passions into a sustainable career that blends creativity with community service. He plans to earn his GED and enroll in a local community college or
    trade program where he can study graphic design, multimedia storytelling, or furniture making. Ultimately, he aims to become a visual artist or cultural‑heritage craftsman, perhaps running a community
    art space or teaching workshops that celebrate Appalachian traditions while embracing contemporary ideas. He also envisions opportunities to work as a freelance photographer or musician, allowing him
    flexibility and the freedom to explore diverse projects.
