personas:
  professional: Andrea Molen is a hands-on construction laborer who leverages a blend of practical tool expertise, curiosity about green building methods, and strong teamwork to keep crews safe and on schedule
    while they eye a foreman role within three years.
  sports: Andrea Molen enjoys pick-up basketball games at Flushing Meadow Park, follows the New York Knicks with a loyal fan's enthusiasm, and adds salsa dancing nights to stay fit while they thrive on
    the social energy of group movement.
  arts: Andrea Molen immerses themselves in the arts by dancing salsa to the sounds of Marc Anthony and Celia Cruz, attending Queens cultural festivals showcasing local muralists like Shepard Fairey, and
    curating playlists that blend Latin rhythms with indie folk for creative downtime while they celebrate community vibrancy.
  travel: Andrea Molen loves short-haul trips that combine cultural immersion and sustainability, having explored the street-food markets of Mexico City, the salsa scene in Barcelona, and they dream of
    a bicycle-friendly weekend in Portland's Pearl District.
  culinary: Andrea Molen experiments in the kitchen with international dishes such as Thai green curry, Moroccan chickpea tagine, and Japanese ramen, favoring fresh herbs, sustainable seafood, and occasional
    avocado-lime garnish while they whisk up meals after a long workday.
  core: Andrea Molen is an energetic, community-driven future foreman whose curiosity fuels sustainable building ideas, whose compassion shines through volunteer work, and whose occasional worry finds calm
    in yoga and disciplined budgeting while they stay focused on long-term goals.
background:
  cultural: Andrea comes from a white, European‑American family with roots in the Northeastern United States; her grandparents were of Italian and Irish descent, and she was raised in a bilingual household
    where occasional Italian phrases are spoken. Growing up in Woodside, Queens, she was immersed in a vibrant, multicultural community that celebrates a mix of traditions, from Italian feasts to diverse
    Asian and Latino festivals. This environment fostered her appreciation for cultural diversity while grounding her in mainstream American values of hard work, community involvement, and family cohesion.
    Her upbringing blends modest ethnic customs with the dynamic, inclusive spirit of her neighborhood.
attributes:
  skills: '[''Concrete mixing and pouring'', ''Basic carpentry'', ''Operating hand and power tools'', ''Reading blueprints and construction plans'', ''Site safety management'', ''Team coordination and communication'',
