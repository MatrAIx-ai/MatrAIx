  hobbies: '[''Salsa dancing'', ''Pick‑up basketball'', ''Community gardening'', ''Volunteer work with Habitat for Humanity'', ''DIY home renovation projects'', ''Reading architecture and sustainable design'',
    ''Listening to construction and personal‑development podcasts'', ''Yoga and meditation for stress relief'', ''Cooking international dishes'', ''Attending local cultural festivals'']'
  career_goals: Andrea aims to advance from laborer to foreman within the next three years, pursuing certifications such as OSHA 30‑hour and a carpentry apprenticeship. Her long‑term ambition is to become
    a construction manager who leads projects focused on affordable housing and community development, blending her compassion for helping others with her practical expertise. She also hopes to mentor young
    workers, especially those from underrepresented backgrounds, and to integrate green building practices into her future projects, reflecting her curiosity about sustainable construction. Managing stress
    and anxiety is part of her professional plan, so she intends to develop strong organizational systems and stress‑relief routines to sustain her career growth.
