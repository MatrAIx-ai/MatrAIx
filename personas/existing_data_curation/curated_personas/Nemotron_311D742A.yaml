  hobbies: '[''Softball'', ''Barbecue cooking'', ''Community gardening'', ''Fishing'', ''Desert hiking'', ''Watching NFL football'', ''Listening to classic rock'', ''DIY home projects'', ''Church fellowship'',
    ''Family road trips'']'
  career_goals: Richard aims to secure a stable, long‑term position that leverages his strengths in routine work while allowing for modest advancement. He hopes to earn a Certified Production Technician
    (CPT) credential and eventually move into a lead‑hand or shift‑supervisor role where he can mentor teammates and help shape a safe, efficient work environment. He also wants to develop better stress‑management
    skills, so he plans to attend workplace wellness workshops and possibly pursue a part‑time certification in occupational health and safety to broaden his career options without sacrificing the predictable
    schedule he values.
