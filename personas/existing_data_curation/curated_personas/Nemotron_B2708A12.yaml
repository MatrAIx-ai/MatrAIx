  hobbies: '["Vietnamese cooking", "Community choir", "Gardening", "Walking in local parks", "Card games (bridge)", "Volunteering at senior center", "Attending cultural festivals", "Baking traditional pastries",
    "Tai chi", "Crafts (knitting, quilting)"]'
  career_goals: Although approaching retirement, Nhan aims to transition into a mentor‑lead role where she can train new janitorial staff and promote best practices for workplace safety and hygiene. She
    hopes to obtain a Certified Professional Cleaner credential and, in the next few years, lead a small community‑based cleaning service that supports local churches and senior centers. Keeping active
    and contributing to a harmonious environment remains central to her long‑term ambition.
