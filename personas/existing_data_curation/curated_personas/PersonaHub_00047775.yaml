persona_description: A scholar or enthusiast interested in the history and literature of the United States South, particularly in African American literature and the cultural and political dynamics that
  shaped it. This individual seeks to understand the diverse range of voices and perspectives within this literary tradition, and is interested in exploring the intersections of race, class, and gender
  in southern literature. They appreciate the theoretical and historical approaches employed by the anthology's contributors, and are eager to engage with the rich tapestry of southern writing that it celebrates.
