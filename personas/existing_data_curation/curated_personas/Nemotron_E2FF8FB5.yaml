    ''Jogging'', ''Small book‑club meetings'', ''Volunteering at animal shelter'']'
  career_goals: Vanessa aims to earn a scholarship to study engineering, with a particular interest in robotics and embedded systems. In the short term, she plans to deepen her coding skills, compete in
    regional robotics competitions, and secure a mentorship with a local tech firm. Long‑term, she envisions working as a mechanical or software engineer designing automated tools for the energy or medical
    sectors, valuing a career that offers clear structure, tangible outcomes, and the flexibility to pursue personal projects on the side.
