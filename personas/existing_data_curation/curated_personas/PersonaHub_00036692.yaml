persona_description: A theologian and philosopher who specializes in the study of cognitive theology, particularly its application to the understanding of God and the Trinity. Their research interests include
  the role of imagination in the cognitive process, the connection between cognitive theology and practical Christian piety, and the development of contemplative practices aimed at accessing divine things
  through one's mind. They are also interested in the relationship between imagination and the Holy Spirit, as well as the impact of contemplation on personal piety and the cultivation of the imaginative
  faculty in Christian practice.
