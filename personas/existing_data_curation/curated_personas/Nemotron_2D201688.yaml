personas:
  professional: An experienced structural and mechanical engineer with a four‑decade track record designing sustainable infrastructure, Jose Chavez blends rigorous CAD modeling, rapid prototyping, and a
    vivid abstract aesthetic to produce solar micro‑grid concepts and flood‑resilient public art installations, while leveraging bilingual communication to mentor Spanish‑speaking youth and facilitating
    open‑ended brainstorming sessions despite a tendency to resist rigid deadlines.
  sports: An avid supporter of the Jacksonville Jaguars and the Tampa Bay Rays, Jose Chavez spends his weekends kayaking the St. Johns River, walking with a senior fan club that meets at the local park,
    and joining a seasonal senior softball league, all while maintaining a relaxed membership in a community rowing club that satisfies his penchant for fluid motion and teamwork.
  arts: Deeply immersed in the creative scene, Jose Chavez paints large abstract canvases inspired by Caribbean sunsets and engineering schematics, plays the cuatro improvising salsa and plena at neighborhood
    jam sessions, and frequents art fairs showcasing artists like Jackson Pollock and Yayoi Kusama, while also curating a small collection of local muralists’ work that fuels his interdisciplinary design
    philosophy.
  travel: Driven by a love for vibrant festivals and wetlands photography, Jose Chavez plans loosely organized trips that blend leisure with creative inspiration, such as visiting the historic streets of
    Old San Juan to capture sunrise over forts, exploring the Florida Keys for mangrove kayaking, and attending the New Orleans Jazz & Heritage Festival to soak in live brass bands, all while balancing
    travel costs with his modest retirement budget.
  culinary: An enthusiastic home chef, Jose Chavez experiments with fusion dishes like pernil tacos topped with plantain‑infused salsa and arroz con gandules enriched with fresh Gulf shrimp, meticulously
    selects ingredients such as adobo, sofrito, and a splash of orange zest, but often over‑sauces his creations and neglects to cool hot pans before cleaning, reflecting both his culinary curiosity and
    occasional absent‑mindedness.
  core: A contemplative engineer‑artist who fuses sustainable design with vibrant abstraction, Jose Chavez navigates life with boundless curiosity, occasional skepticism, and a rhythm of spontaneous creativity
    tempered by mindfulness practice.
background:
  cultural: Jose was born to Puerto Rican parents who migrated to the mainland United States in the early 1960s. He grew up in a bilingual household, speaking Spanish at home while attending English-language
    schools, which gave him a bicultural perspective. Family celebrations centered around music—especially plena, bomba, and salsa—and traditional dishes like arroz con gandules, pernil, and flan. The island’s
    emphasis on community, improvisation, and artistic expression shaped his imaginative outlook and his competitive yet collaborative spirit. He honors his heritage by celebrating Puerto Rican holidays
    such as Día de la Constitución and the Feast of San Juan, participating in local diaspora events in Florida, and sharing his cooking, music, and stories with neighbors. This cultural foundation informs
    his blend of technical rigor with creative flair, his bilingual communication style, and his commitment to giving back to both his ethnic community and the broader Starke area.
attributes:
  skills: '[''Structural engineering'', ''Mechanical engineering'', ''Sustainable design'', ''Renewable energy systems'', ''CAD modeling (AutoCAD, SolidWorks)'', ''Finite element analysis'', ''Rapid prototyping
