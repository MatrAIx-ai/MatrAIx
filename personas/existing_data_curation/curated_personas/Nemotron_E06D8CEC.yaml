  career_goals: Kristy aims to advance into a senior operations or director role within a cultural organization or community‑development nonprofit, where she can champion arts‑based initiatives, mentor
    emerging leaders, and shape policies that promote employee well‑being and inclusive collaboration. She also envisions launching a consulting practice that helps businesses embed creativity and cultural
    awareness into their organizational culture.
