personas:
  professional: Kristy Williams, a 52‑year‑old operations leader in a cultural nonprofit, leverages their team‑building, budget oversight and data‑visualization savvy to turn artistic concepts into inclusive
    programs, while their curiosity and talkative charm make them the go‑to facilitator for cross‑department brainstorming sessions.
  sports: Kristy Williams, a Chicago resident, passionately follows the Bulls, Cubs and Blackhawks, runs with the Chicago Road Runners club each spring and summer, maintains a disciplined yoga practice
    at the downtown Chicago Yoga Studio, but often lets the rainy fall months derail their cardio routine in favor of lingering over coffee at a local café.
  arts: Kristy Williams, an avid patron of the arts, spends weekends at the Art Institute admiring Monet and Kusama, delights in live performances of Miles Davis‑inspired jazz trios and Lin‑Manuel Miranda’s
    Broadway revivals, and often reenacts scenes from classic films starring Meryl Streep to spark creative brainstorming at work.
  travel: Kristy Williams, at 52, plans trips with a blend of meticulous itineraries and spontaneous art‑festival detours, having already explored Kyoto’s temples, the vibrant souks of Marrakech, and the
    jazz scene in New Orleans, while dreaming of a cultural immersion in Barcelona’s street‑art districts and weekend escapes to Door County’s lakeside galleries.
  culinary: Kristy Williams, a self‑taught home chef, regularly whips up roasted beet and goat‑cheese salads, saffron‑infused risotto with locally foraged wild mushrooms, and spicy Thai basil chicken, all
    while savoring fresh heirloom tomatoes, rosemary, and occasional farm‑to‑table tasting menus at the city’s rooftop bistro.
  core: Kristy Williams, a 52‑year‑old arts‑obsessed operations leader, blends managerial rigor with a chatty, curiosity‑driven love of culture, turning every boardroom into a canvas while occasionally
    overindulging in spontaneous camera gear purchases and postponing routine health checkups.
background:
  cultural: Born and raised in Kansas City, KS, Kristy grew up immersed in Midwestern values of community, modesty, and hard work while being exposed to the city’s rich jazz heritage and vibrant arts scene.
    Her family's European ancestry (German and Irish) contributed to traditions such as holiday gatherings and an appreciation for folk music, but she identifies primarily with the eclectic culture of the
    Kansas City metropolitan area, which blends practical Midwestern sensibilities with a growing emphasis on arts, diversity, and civic engagement.
