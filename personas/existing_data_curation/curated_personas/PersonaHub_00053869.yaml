persona_description: A biologist or medical doctor who is interested in the scientific understanding of life and its characteristics, particularly in the context of biologists dealing with life on earth
  and physicians dealing with life and death. This person is likely to be familiar with the concept of life as a self-contained, self-regulating, self-organizing, self-reproducing, interconnected, open
  thermodynamic network of component parts which performs work, existing in a complex regime which combines stability and adaptability in the phase transition between order and chaos, as a plant, animal,
  fungus, or microbe. This person is also interested in the philosophical and scientific debates surrounding the definition of life, such as the work of Neil A. Manson, Thaddeus Metz, Robert T. Pennock,
  Christophe Malaterre, Marc Lange, Bernard Korzeniewski, Abel Schejter & Joseph Agassi, Carol E. Cleland, Christopher Southgate & Andrew Robinson, Gerard Jagers op Akkerhuis, and others.
