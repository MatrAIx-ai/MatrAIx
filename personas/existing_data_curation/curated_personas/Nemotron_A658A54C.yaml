  career_goals: Although retired from formal employment, Angelina aims to leave a lasting legacy by mentoring youth and preserving family and community histories. She plans to author a memoir that weaves
    personal anecdotes with Philadelphia’s Black heritage, and to organize a quarterly senior‑mental‑health support group that blends storytelling with coping strategies. She also aspires to become an advisory
    elder for local cultural festivals, helping shape programs that celebrate African‑American art, music, and culinary traditions while advocating for more resources for emotionally vulnerable seniors.
