personas:
  professional: Angelina Jackson, a retired community organizer turned senior‑center mentor, channels their storytelling flair and meticulous budgeting, and they design workshops that balance practical
    curiosity with flexible, community‑driven activities.
  sports: Angelina Jackson stays active by walking three times a week in Fairmount Park, cheering for the Philadelphia Eagles on Sundays, and they belong to the neighborhood seniors’ walking club that meets
    after Phillies games at the local community center.
  arts: Angelina Jackson’s evenings are filled with listening to jazz legends like Miles Davis and gospel choruses by Mahalia Jackson, while they often read novels by Harper Lee and historical biographies,
    and they attend local theater productions featuring works by August Wilson, letting music and literature shape their storytelling style.
  travel: Angelina Jackson favors relaxed heritage trips, such as a weekend tour of historic Charleston, a river cruise through Washington, D.C.’s monuments, and they plan a future pilgrimage to the jazz
    streets of New Orleans, balancing limited mobility with a desire for cultural immersion.
  culinary: Angelina Jackson enjoys cooking soul‑food classics like baked collard greens, black‑eyed peas, and sweet‑potato pie, tweaking them with olive oil, reduced‑sodium broth, and a dash of smoked
    paprika, and they proudly host potluck Sundays where friends savor their healthier take on traditional dishes.
  core: Angelina Jackson is a gregarious yet anxious 71‑year‑old who weaves community stories, quiets anxiety with garden walks, and occasionally hoards extra quilting fabric in the attic for no reason.
background:
  cultural: Angelina grew up in a close‑knit African‑American neighborhood in Philadelphia, a legacy of the Great Migration that brought her ancestors from the rural South to the city. Her family’s cultural
    fabric is woven with strong church traditions, soul‑food cuisine, and a reverence for oral storytelling. She has been immersed in the city’s rich tapestry of Black history, from the historic Mother
    Bethel A.M.E. Church to the African American Museum, and participates regularly in cultural festivals that celebrate music, art, and heritage. This background fuels her sense of community, her commitment
    to preserving cultural memory, and her desire to mentor future generations.
