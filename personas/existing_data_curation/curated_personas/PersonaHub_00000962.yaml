persona_description: A scientist or researcher involved in environmental conservation and restoration, particularly focused on the study of marine and freshwater ecosystems and the role of certain species,
  such as the alewife, in maintaining ecological balance and supporting commercial fisheries. This persona is interested in learning about the return of sea-run alewives to their historic spawning grounds
  in the St. Croix River and the potential benefits they bring to freshwater and marine food chains. They may have experience working with agencies and organizations in Canada and the United States, as
  well as knowledge of the Clean Water Act and the importance of protecting aquatic habitats.
