    Technology and Art'', ''Racing Simulators'', ''Collecting Vintage Car Posters'']'
  career_goals: Viorel aims to achieve Master Technician status and obtain specialized certifications in electric‑vehicle technology within the next three years. She dreams of opening a boutique auto shop
    that merges high‑performance tuning with artistic custom finishes, offering her community a space where mechanical skill meets creative expression. Additionally, she aspires to mentor more women and
    underrepresented individuals in the trades, creating workshops that blend technical training with confidence‑building activities. Long‑term, she envisions becoming a regional trainer for an automotive
    equipment manufacturer, helping garages adopt cutting‑edge diagnostic tools while maintaining a balanced work schedule that supports her mental‑health needs.
