  career_goals: Michael plans to earn a Bachelor of Science in Nursing (BSN) and later a Master’s degree to specialize in critical care or pursue a Nurse Manager role. He aims to lead quality‑improvement
    efforts, mentor junior nurses, and contribute to clinical research that enhances patient outcomes. His ambitions are grounded in practical steps, balancing professional growth with his desire to remain
    in the Columbus healthcare community.
