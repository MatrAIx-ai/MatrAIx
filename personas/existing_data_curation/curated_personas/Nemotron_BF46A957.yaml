personas:
  professional: Michael Cole, a 29-year-old registered nurse at a Columbus hospital, blends meticulous EPIC documentation and solid clinical competencies - patient assessment, IV therapy, wound care, and
    infection control - with a calm, resilient demeanor and a curiosity for evidence-based practice that drives his involvement in quality-improvement projects and mentorship of new staff.
  sports: Michael Cole stays active through early-morning runs with the Columbus Outdoor Club, watches Ohio State Buckeyes football each fall, cheers on the Columbus Crew during MLS season, and spends weekend
    afternoons fly-fishing at Grand Lake, balancing structured team loyalty with solitary outdoor pursuits.
  arts: Michael Cole nurtures his creative side by strumming acoustic renditions of Bob Dylan and John Mayer for a close circle of friends, capturing sunrise shots of the Scioto River inspired by Ansel
    Adams, and reading engaging works by Malcolm Gladwell and Mary Roach, weaving these artistic influences into his leisure time.
  travel: Michael Cole prefers low-key, well-planned weekend getaways to Hocking Hills State Park and the Lake Erie shoreline while saving for a summer trek to Iceland's volcanic landscapes, balancing his
    love for nature photography with a modest travel budget and a desire to stay close enough to his Columbus community for volunteer commitments.
  culinary: Michael Cole, an avid home cook, enjoys mastering dishes like pan-seared trout with lemon-dill sauce, hearty chicken pot pie, and a seasonal apple-crumble made with locally sourced Ohio apples,
    and his modest woodworking hobby even extends to crafting his own cutting board and spice rack.
  core: Michael Cole blends a calm, community-oriented spirit with disciplined curiosity, spending evenings tinkering with woodworking projects while quietly perfecting guitar chords and meticulously tracking
    his health and finances, a habit that sometimes leads him to double-check medication dosages on his phone before bedtime.
background:
  cultural: Michael grew up in a middle‑class, Midwestern white family in Ohio, where values such as self‑reliance, modesty, practicality, and community service are emphasized. He celebrates traditional
    American holidays, supports local sports teams like the Ohio State Buckeyes, and embraces the region’s focus on hard work and stewardship. Exposure to the healthcare field through family and community
    reinforced a collective mindset of caring for others, shaping his compassionate and cooperative approach to both work and personal life.
