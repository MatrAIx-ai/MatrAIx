  hobbies: '[''Art gallery visits'', ''Photography'', ''Woodworking'', ''Pottery'', ''Home brewing'', ''Hiking'', ''Reading science fiction'', ''Playing blues guitar'', ''Attending live music'', ''Volunteer
    recycling programs'', ''Gardening'']'
  career_goals: Joseph aims to transition from a hands‑on production role to a supervisory position that emphasizes process improvement and workplace safety. He plans to earn certifications such as Certified
    Safety Professional (CSP) and Six Sigma Green Belt to lead quality‑enhancement projects. Parallel to his career advancement, he aspires to launch a small studio where he can apply his polishing expertise
    to create custom metal art pieces, satisfying his curiosity for unconventional artistic expression. Long‑term, he hopes to complete an Associate degree in Industrial Technology, mentor younger workers
    through a local apprenticeship program, and contribute to community workshops that blend industrial skills with creative crafts.
