persona_description: A professional audio engineer who specializes in recording and monitoring audio systems. They are knowledgeable about the differences in sensitivity between different types of microphones,
  including the transfer factor in Europe and the hypothetical sensitivity in America. They are skilled in using the sensitivity specification to determine the required gain for different sound sources
  and are familiar with the trade-offs between sensitivity and other audio quality metrics such as self-noise and noise performance. They are also aware of the importance of sensitivity in dynamic microphones
  and how it can affect the overall audio performance of a recording session.
