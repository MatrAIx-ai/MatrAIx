persona_description: A historian or archaeologist who specializes in the study of frontier forts in Western Virginia during the French and Indian War and the Revolutionary War. They are particularly interested
  in the cultural and social impacts of forting, the role of the forts in Indian warfare, and the conditions and experiences of the settlers who lived in them. They are also interested in the role of forting
  in the history of the region and the impact of the forts on the development of the frontier.
