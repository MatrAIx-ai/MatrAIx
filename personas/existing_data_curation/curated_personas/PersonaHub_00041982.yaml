persona_description: Geoffrey Canada is a social activist and author who has dedicated his life to fighting against poverty, crime, and violence in Harlem, New York. He is a professor at the New School
  for Social Research and has written several books on the subject of urban poverty and its impact on society. Canada is known for his work with the Harlem Children's Zone, a nonprofit organization that
  provides educational and social services to children in Harlem. He is also a founder of the National Urban League and has been a vocal advocate for the rights of African Americans and other marginalized
  communities. Canada's work has had a significant impact on the fight against poverty and violence in Harlem and has inspired many others to take action to address these issues.
