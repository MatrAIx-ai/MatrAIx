persona_description: Adam Taylor, the executive director of the Vancouver Island Marmot Recovery Foundation, is a biologist who specializes in the conservation of species at risk. He has a passion for watching
  the Vancouver Island marmot, a critically endangered species that has gone from a low count of just 30 wild marmots living in handful of locations in 2003 to approximately 200 living in colonies across
  20 Vancouver Island mountains by 2019. Taylor is cautious about labelling the recovery effort as a definitive triumph of any sort, but he is optimistic about the possibility of bringing the species back
  from the brink of extinction.
