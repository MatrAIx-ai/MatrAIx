  hobbies: '[''drawing'', ''digital painting'', ''reading speculative fiction'', ''creative writing (short stories, poetry)'', ''Minecraft world‑building'', ''listening to ambient/experimental music'',
    ''photography'', ''visiting art galleries and museums'', ''journaling'']'
  career_goals: She envisions a future as a multidisciplinary visual storyteller—ideally a concept artist for video games or film and a novelist of speculative fiction. In the short term, she aims to build
    a polished portfolio, attend summer art intensives, and enroll in a specialized high‑school program in visual arts. Long‑term, she hopes to study fine arts and creative writing at a university with
    a strong interdisciplinary focus, eventually working in a studio that blends illustration, narrative design, and interactive media.
