  career_goals: Gail aspires to become a certified senior building inspector with a specialization in sustainable and historic preservation projects. She plans to complete her bachelor's degree in construction
    management, earn the Certified Building Official (CBO) and LEED Green Associate credentials, and eventually lead a consultancy that bridges regulatory compliance with innovative, environmentally friendly
    design. In the long term, she hopes to mentor new inspectors and contribute to community-focused redevelopment initiatives in Chester County.
