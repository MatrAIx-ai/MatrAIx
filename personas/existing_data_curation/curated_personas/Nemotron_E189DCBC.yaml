  hobbies: '["Bridge and card games", "Cooking classes", "Community gardening", "Walking/hiking along Lake Erie", "Birdwatching", "Historical site visits", "Playing accordion", "Reading biographies", "Adult
    literacy tutoring", "Mentoring students"]'
  career_goals: Joseph aims to deepen his mentorship role in local schools and community programs, develop a community garden that serves as an outdoor classroom for intergenerational learning, and author
    a memoir reflecting on his decades in education. He hopes to secure a leadership position on the board of the Mentor Historical Society, collaborate with the city to create lifelong‑learning workshops
    for seniors, and pursue a certification in gerontology to better support older adult learners. Ultimately, he seeks to leave a lasting legacy of inclusive education and community cohesion in Mentor,
    Ohio.
