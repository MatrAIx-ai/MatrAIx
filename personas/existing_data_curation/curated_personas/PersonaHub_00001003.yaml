persona_description: A Canadian environmental activist and climate change advocate who is passionate about promoting a just and sustainable energy transition in Canada. This person is likely to be a member
  of the Green Party or a similar political organization, and is actively engaged in advocating for policies and initiatives that address climate change and promote a more sustainable future. They are knowledgeable
  about the impacts of climate change on Indigenous communities and are committed to advocating for their rights and sovereignty. This person is likely to be a vocal advocate for a 100% clean economy by
  2050 and is supportive of measures that prioritize Indigenous rights and title to the land. They are likely to be well-versed in the ideas and arguments presented in Naomi Klein's book "This Changes Everything"
  and are actively seeking to popularize these ideas among a broad range of social forces.
