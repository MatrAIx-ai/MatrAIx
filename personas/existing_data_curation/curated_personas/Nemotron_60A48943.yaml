personas:
  professional: Marilyn King, a veteran CPA with over forty years in public accounting, specializes in financial auditing, forensic accounting, and tax compliance, and channels their meticulous, skeptical
    nature and artistic sensibility into AI‑assisted audit tools and innovative data visualizations while preferring quiet, one‑on‑one mentorship over group settings.
  sports: Marilyn King stays active through low‑impact trail walks with the Camp Verde Hiking Club, follows the Arizona Cardinals for football and the Arizona Diamondbacks for baseball, and joins a senior
    tennis round‑robin at the local community center each spring, favoring steady, solitary exercise over competitive leagues.
  arts: Marilyn King expresses their artistic soul by painting watercolor landscapes inspired by the high‑desert hues of Georgia O'Keeffe and photographing light and texture à la Ansel Adams, while regularly
    attending Verde Valley galleries showcasing works by local artists such as James Borden and finding solace in the classical piano compositions of Debussy.
  travel: Marilyn King prefers meticulously planned road trips that blend quiet reflection with cultural immersion, having explored the Grand Canyon, Sedona, and Santa Fe on past journeys, while dreaming
    of a serene week in Kyoto’s historic temples and a culinary tour of Tuscany’s vineyards.
  culinary: Marilyn King, an adept home cook, delights in crafting herb‑infused roasted chicken with rosemary and thyme from their garden, sautéed artichokes drizzled with lemon, and vibrant green‑chile
    enchiladas topped with fresh cilantro, while occasionally treating themselves to a fine‑dining tasting menu of seared scallops and beurre blanc.
  core: Marilyn King blends relentless analytical rigor with a quiet, solitary love of desert art, trading occasional forgetfulness of social invitations for a habit of hoarding vintage accounting manuals
    in their home office.
background:
  cultural: Marilyn is a White American who grew up in the post‑war Midwest before moving to the American Southwest in her early thirties. Her upbringing emphasized self‑reliance, modesty, and a respect
    for privacy—values that align with her preference for solitude. Living in Camp Verde, Arizona, she has absorbed the region’s blend of high‑desert environment, ranching heritage, and appreciation for
    Native American and Hispanic artistic traditions. These cultural influences shape her community involvement, especially her support for local arts initiatives, while her STEM education reflects a broader
    American emphasis on upward mobility through higher education and professional expertise.
attributes:
  skills: '["Financial Auditing", "Forensic Accounting", "Tax Compliance", "Risk Assessment", "Internal Controls", "Process Improvement", "Advanced Excel", "Data Analytics (Power Query, Tableau)", "ERP
