persona_description: A mental health and early years professional who is passionate about promoting positive mental health and wellbeing in early years settings. They have experience working with children
  who have a fixed smile on their face and understand the importance of having a wide emotional vocabulary and understanding from a young age. They have written books on emotional literacy and are interviewed
  by Kathy Brodie on her Early Years summit. They are aware of the growing range of resources available to help children understand feelings and emotions and support mental wellbeing.
