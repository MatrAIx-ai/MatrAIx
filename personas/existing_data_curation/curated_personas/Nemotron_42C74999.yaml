  hobbies: '["Reading science books", "Collecting rocks and insects", "Building LEGO models", "Birdwatching", "Sketching/drawing nature scenes", "Playing educational video games", "Journaling/planning",
    "Listening to gospel and jazz music"]'
  career_goals: Darion dreams of growing up to design and build practical solutions that help his community. He imagines becoming a civil or environmental engineer who can create safe, sustainable playgrounds
    and protect the wetlands around Crowley. He is also fascinated by wildlife and hopes to work as a wildlife biologist, studying local species and educating others about conservation. Combining his love
    for technology and nature, he aspires to develop educational games that teach kids about science and the environment, merging his curiosity with a methodical, problem‑solving approach.
