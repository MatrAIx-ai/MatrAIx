personas:
  professional: Darion Mosley is an aspiring junior scientist who merges their love of space, animals, and ecosystems with a methodical approach to building LEGO robotics, documenting each experiment in
    detailed journals and demonstrating early problem‑solving and organizational skills.
  sports: Darion Mosley prefers quiet outdoor activities, joining a local youth nature club for birdwatching hikes along the bayou, occasionally swimming at the community pool, and silently supporting the
    nearby junior baseball team, the Bayou Cubs, from the sidelines.
  arts: Darion Mosley is drawn to the soulful sounds of gospel, blues, and jazz that echo during family gatherings, often humming along while sketching birds in their notebook and attempting to mimic saxophone
    riffs on a toy recorder, blending auditory and visual creativity.
  travel: Darion Mosley enjoys day trips to nearby nature reserves and bayous, planning each outing with a detailed checklist of binoculars, sketchbook, and bird‑identification guide, while dreaming of
    a future visit to the Kennedy Space Center to see rockets up close.
  culinary: Darion Mosley favors familiar comfort foods like homemade macaroni and cheese topped with sharp cheddar and a side of crisp apple slices, occasionally helping to grind fresh beans for a family
    blues‑inspired stew, yet shows a picky streak when offered unfamiliar vegetables.
  core: Darion Mosley is a methodical, curiosity‑driven eight‑year‑old who finds comfort in organized collections, quiet exploration, and structured routines, yet wrestles with frequent worry and a craving
    for solitary discovery.
background:
  cultural: Darion is an African American boy raised in Crowley, Louisiana, a town where Southern, Creole, and Cajun cultures intersect. His family participates in community traditions such as the Crowley
    Peanut Festival and Mardi Gras celebrations, cooking dishes like jambalaya and gumbo that reflect the region’s culinary heritage. The local church plays a central role in his life, providing a space
    for gospel music, storytelling, and moral guidance. Through his grandparents, Darion learns about his ancestors’ resilience during the civil‑rights era and hears stories that foster pride in his heritage.
    The natural landscape of Acadia Parish—its bayous, wetlands, and sugarcane fields—shapes his love for the outdoors and informs his interest in environmental stewardship. This blend of cultural pride,
    community values, and connection to the land nurtures his organized, practical, and thoughtful personality.
attributes:
  skills: '["Organizing personal belongings", "Following step-by-step instructions", "LEGO building", "Basic reading comprehension", "Nature observation (birds, insects)", "Basic Scratch Jr. programming",
