personas:
  professional: Ann Ducote, a seasoned elementary and middle‑school teacher, blends curriculum alignment expertise, differentiated instruction, and literacy development with a sociable, organized‑yet‑flexible
    style that makes classroom projects both rigorously structured and delightfully interactive.
  sports: Ann Ducote enjoys hiking the Blue Hills Reservation in the spring and early fall, participates in a community yoga class at a local studio, and roots for the Boston Red Sox and New England Patriots
    while occasionally joining a neighborhood softball league during summer, a blend of individual and team activities they cherish.
  arts: Ann Ducote channels their creative side by directing youth theater productions of classics like ‘A Midsummer Night’s Dream,’ curating a book club that devours works by Sally Rooney and J.K. Rowling,
    and attending local concerts featuring folk singer Brandi Carlile and the Boston Symphony Orchestra, experiences they cherish and that shape their community‑focused identity.
  travel: Ann Ducote prefers meticulously planned weekend getaways that blend modest adventure with relaxation, often exploring New England gems like Martha’s Vineyard and the White Mountains, while dreaming
    of a spring trip to Kyoto’s cherry blossoms and a cultural festival in Dublin, balancing travel costs with a modest family budget they carefully monitor.
  culinary: Ann Ducote, a confident home cook, delights in preparing classic New England clam chowder, garlic‑roasted rosemary potatoes, and seasonal vegetable lasagnas for potluck gatherings, savoring
    fresh herbs, butter‑rich sauces, and the communal joy of sharing a lovingly plated feast they proudly serve.
  core: Ann Ducote balances a community‑first mindset with a restless curiosity, constantly juggling lesson plans, potluck menus, and hiking trails while habitually losing their keys in the school locker
    room.
background:
  cultural: Ann identifies as a white American who grew up in Peabody, Massachusetts, a town steeped in New England's historic emphasis on education, civic duty, and community ties. Her family’s values
    reflect the region’s tradition of public service and participation in local events such as town festivals, seasonal fairs, and volunteer initiatives. This cultural milieu has fostered Ann’s appreciation
    for collaborative efforts, respect for established educational practices, and openness to innovative ideas that benefit the broader community.
attributes:
  skills: '["Lesson planning", "Classroom management", "Differentiated instruction", "Literacy development", "STEM project facilitation", "Technology integration (Google Classroom, interactive whiteboards)",
    "Assessment design and data analysis", "Parent communication and community outreach", "Collaborative team teaching", "Conflict resolution"]'
  hobbies: '["Reading contemporary and children''s literature", "Community gardening", "Youth theater production", "Volunteering at the public library''s storytime", "Hiking in the Blue Hills Reservation",
    "Cooking and hosting potluck dinners", "Attending local music festivals", "Yoga and mindfulness practice"]'
  career_goals: Ann aims to deepen her impact on the district by earning a master's degree in Educational Leadership within the next three years. Her short‑term goal is to become a grade‑level team leader,
    where she can mentor newer teachers and champion inclusive instructional practices. Long‑term, she aspires to serve as an instructional coach or curriculum specialist, focusing on integrating project‑based
    learning and technology across the school. Ultimately, Ann envisions stepping into a principal role, where she can shape school culture to balance academic rigor with a supportive, community‑focused
    environment.
