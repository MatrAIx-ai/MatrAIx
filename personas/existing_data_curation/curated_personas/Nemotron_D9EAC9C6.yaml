  career_goals: James wants to channel his curiosity and practicality into a future career in technology that helps others. He dreams of becoming a software engineer who designs educational and mental‑health
    apps for kids, combining his love for coding, problem solving, and empathy. He also hopes to study engineering or computer science in high school and college, eventually contributing to tools that make
    learning and emotional well‑being more accessible. His long‑term ambition includes creating a community‑focused platform that encourages small‑group collaboration and supports peers dealing with anxiety.
