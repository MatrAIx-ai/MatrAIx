personas:
  professional: Samaria Clarke is a retired community volunteer who leverages decades of caregiving expertise to orchestrate senior‑center programs, blending her love for orderly schedules with occasional
    spontaneous initiatives, all while mediating conflicts with a calm, compassionate approach.
  sports: Samaria Clarke enjoys low‑impact fitness, taking daily walks along the nearby beach and playing in a senior volleyball league, and she is a devoted fan of the local minor‑league baseball team,
    the Seaside Mariners, attending their summer games whenever she can.
  arts: Samaria Clarke fills her afternoons with gospel choirs, classic R&B from Aretha Franklin, and jazz standards by Ella Fitzgerald, while weekend matinees of classic Hollywood films like "Casablanca"
    and "Singin' in the Rain" provide cultural nourishment, and she regularly reads biographies of civil‑rights leaders for inspiration.
  travel: Samaria Clarke prefers short, purposeful trips, often traveling by train to historic coastal towns such as Charleston and Savannah to explore gardens and local festivals, but she dreams of a tranquil
    pilgrimage to the gardens of Versailles, balancing modest travel budgets with her desire for cultural enrichment.
  culinary: Samaria Clarke delights in preparing soul‑food classics such as fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler, often seasoning dishes with fresh
    basil and thyme harvested from her garden, and she weaves these flavors into family gatherings and heartfelt gifts.
  core: Samaria Clarke is a compassionate, structured yet occasionally spontaneous elder who gardens, knits, and cooks with heart, worries about details, and devotes herself to community service and preserving
    family legacy.
background:
  cultural: Samaria’s cultural identity is rooted in the African‑American community of Miami, shaped by her grandparents’ migration from the rural South during the Great Migration. Growing up in the historically
    Black neighborhoods of Overtown and later Little Haiti, she absorbed a blend of Southern traditions and Caribbean influences that characterize South Florida’s multicultural fabric. Her life is anchored
    by a deep commitment to the church, gospel music, and communal celebrations such as Juneteenth and Kwanzaa. These cultural pillars inform her values of compassion, cooperation, and the importance of
    preserving family stories and community solidarity.
