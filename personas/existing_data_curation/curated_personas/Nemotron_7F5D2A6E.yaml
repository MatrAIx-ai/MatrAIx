  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Cooking traditional soul food'', ''Listening to gospel, classic R&B, and jazz music'', ''Attending church services and Bible study'', ''Volunteering
    at senior community center'', ''Reading biographies and civil‑rights history'', ''Watching classic Hollywood films'', ''Walking on the beach'', ''Participating in local cultural festivals'']'
  career_goals: Even in retirement, Samaria aims to stay active and healthy, dedicating more time to mentoring younger volunteers at her church and the senior center. She hopes to become an advocate for
    senior mental‑wellness, sharing strategies to manage worry and stress with her peers. Samaria also dreams of documenting her family’s history in a memoir, preserving oral traditions for future generations,
    and ensuring her legacy of compassion and community service endures.
