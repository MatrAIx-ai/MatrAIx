  hobbies: '[''Woodworking'', ''Gardening (vegetable and native plants)'', ''Birdwatching'', ''Reading (historical biographies and popular science)'', ''Volunteering as a STEM mentor'', ''Walking/hiking
    local trails'', ''3D printing projects'', ''Playing bridge'']'
  career_goals: Although retired from formal employment, William aims to deepen his impact as a mentor and community builder. He aspires to expand the local STEM mentorship program, develop a small makerspace
    for seniors, master 3D‑printing techniques to create educational models, document and preserve the history of Keller’s early neighborhoods, and maintain his physical and mental health through regular
    walking and lifelong learning.
