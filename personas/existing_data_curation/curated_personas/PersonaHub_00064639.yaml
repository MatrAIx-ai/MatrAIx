persona_description: A renowned American poet and author, Paul Laurence Dunbar, who was born in Dayton, Ohio, in 1872 and died in 1906 at the age of thirty-three. Dunbar was a gifted student who started
  writing poetry as a young child and gained significant acceptance as a poet. He was associated with some of the most important and famous people of his time, including his former classmates and lifelong
  friends Orville and Wilbur Wright and the two most prominent African-Americans then living-Frederick Douglass and Booker T. Washington. Dunbar's works include numerous volumes of poetry and five novels.
  His illness, however, led to an early death. Dunbar was a poet who specialized in the field of American literature and poetry.
