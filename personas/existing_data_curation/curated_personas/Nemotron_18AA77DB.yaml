  hobbies: '[''Woodworking'', ''Scale model building'', ''Fishing'', ''Classic car restoration'', ''Reading technical manuals'', ''Listening to classic rock'', ''Evening walks'', ''Meditation'', ''Journaling'']'
  career_goals: Troy aims to advance within the sheet‑metal trade by becoming a certified foreman over the next five years. He plans to obtain a Journeyman Sheet Metal Fabricator credential, complete advanced
    CNC programming coursework, and earn additional OSHA certifications. Ultimately, he hopes to lead large commercial projects while maintaining a predictable schedule, and eventually launch a modest custom‑metal
    shop that allows him to work independently, secure a stable income, and purchase a home in the Garland area.
