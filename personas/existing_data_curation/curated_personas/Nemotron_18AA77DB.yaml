personas:
  professional: Troy Curtis, a 30‑year‑old sheet‑metal fabricator, blends his meticulous, routine‑driven work ethic with expert MIG/TIG welding and CNC programming skills to deliver precise metal assemblies
    while they quietly supervise crews toward OSHA‑compliant excellence.
  sports: Troy Curtis enjoys solitary early‑morning walks, weekend fishing on Lake Ray Hubbard with the local Bass Anglers Club, and maintains a modest gym routine at Garland Fit Club, while they root for
    the Dallas Cowboys in football, the Dallas Mavericks in basketball, and tune into Texas Rangers games during baseball season.
  arts: Troy Curtis unwinds by listening to classic rock legends like AC/DC and Lynyrd Skynyrd alongside country icons such as George Strait and Willie Nelson while they occasionally visit the Dallas Museum
    of Art for photography exhibits and enjoy classic westerns starring John Wayne for a dose of nostalgic storytelling.
  travel: Troy Curtis prefers carefully planned road trips that balance fishing excursions in the Colorado Rockies, culinary stops in Austin’s BBQ joints, and cultural tours of Stuttgart’s Mercedes‑Benz
    Museum, while they budget conservatively to keep a modest home purchase in Garland within reach.
  culinary: Troy Curtis, a competent home cook, relishes smoking brisket with a rub of smoked paprika and cayenne pepper, whipping up chili con carne and grilled jalapeño‑stuffed cheese quesadillas for
    family dinners, yet they often skip vegetables and rely on quick skillet meals after long workdays.
  core: Troy Curtis is a routine‑obsessed, solitary metalworker who balances meticulous craftsmanship with a habit of over‑planning finances, occasional back‑pain from long lifts, and nightly meditation
    to quiet a mind prone to worry.
background:
  cultural: Troy was raised in a working‑class, white family on the suburban edge of Dallas, Texas. Growing up in Garland, he absorbed the region’s emphasis on hard work, self‑reliance, and practical skill
    development. His family’s modest, no‑frills lifestyle reinforced a down‑to‑earth mindset that values routine, responsibility, and community respect. He attended the local public high school, where trade
    programs were encouraged, and his cultural identity reflects the blend of Southern hospitality and Texan industriousness, with occasional participation in local fairs, regional cuisine, and the diverse
    cultural tapestry of the Dallas‑Fort Worth metroplex.
attributes:
  skills: '[''Blueprint reading'', ''MIG welding'', ''TIG welding'', ''CNC press brake operation'', ''Plasma cutting'', ''Metal forming and bending'', ''HVAC duct installation'', ''Quality inspection'',
