personas:
  professional: Carmen Matos is a medical records specialist at a fast‑paced clinic, leveraging deep expertise in Epic and Cerner, meticulous ICD‑10/CPT coding, and HIPAA compliance while channeling their
    love of structure, reliability, and competitive drive to streamline workflows and mentor junior staff.
  sports: Carmen Matos throws for the Shelby County co‑ed softball league in the spring, keeps their cardio up with weekly Zumba classes and line‑dancing socials in the winter, and they root for the Cleveland
    Browns and Cincinnati Reds, often wearing team gear to games as a reminder of hometown pride.
  arts: Carmen Matos fuels their love of mystery by devouring Agatha Christie and Gillian Flynn novels at the local book club, enjoys Dolly Parton’s storytelling in country music, and they attend community
    theater productions of classics like ‘Chicago,’ weaving these artistic touches into their social conversations and weekend plans.
  travel: Carmen Matos prefers meticulously planned road trips, such as their yearly weekend getaway to Hocking Hills State Park and a recent three‑day visit to Chicago for a concert, while they dream of
    a future cultural immersion in Dublin during St. Patrick’s Day and a summer festival tour of Munich’s Oktoberfest, balancing adventure with budget‑friendly itineraries.
  culinary: Carmen Matos, an adept home chef, regularly perfects hearty Midwestern staples like chicken pot pie, shepherd’s pie, and pork tenderloin with caramelized apples, while infusing fresh garden
    tomatoes, sweet corn, and basil into new recipes such as a rustic beet and kale risotto, showcasing their blend of tradition and culinary curiosity.
  core: Carmen Matos channels a competitive, structure‑loving spirit into every facet of life, from meticulous record‑keeping to weekend softball, yet they can’t resist a nightly crossword that often delays
    bedtime, revealing a charming blend of disciplined ambition and light‑hearted stubbornness.
background:
  cultural: Carmen grew up in Sidney, Ohio, a small Midwestern town with deep agricultural roots. Her family traces its ancestry to German and Irish immigrants who settled the region in the early 20th century,
    instilling values of hard work, reliability, and community service. The local culture emphasizes friendliness, practicality, and a modest, down‑to‑earth outlook, which aligns with Carmen's preference
    for structure and predictability. Community events such as the county fair, church gatherings, and volunteer drives are central to her social life, reinforcing a sense of belonging and collective responsibility
    while allowing her to express her outgoing and competitive side within a supportive environment.
attributes:
  skills: '["Medical coding (ICD‑10, CPT)", "Electronic health record (EHR) management", "HIPAA compliance", "Data entry and validation", "Record retrieval and archiving", "Quality assurance and audit",
    "Microsoft Office (Excel, Word)", "Process improvement", "Team coordination", "Customer service"]'
  hobbies: '["Co‑ed softball league", "Zumba classes", "Line‑dancing socials", "Crossword puzzles and Sudoku", "Volunteering at health fairs", "Cooking Midwestern recipes", "Backyard vegetable gardening",
    "Mystery book club"]'
  career_goals: Carmen aims to obtain her Registered Health Information Technician (RHIT) certification within the next year and enroll in an associate program in Health Information Management to broaden
    her technical foundation. Over the next five years she envisions moving into a senior medical records specialist role, leading a small team and spearheading workflow efficiencies that reduce record
    turnaround time. Long‑term, she aspires to become a health information manager for a regional health system, overseeing compliance, analytics, and staff development, while possibly pursuing a bachelor’s
    degree in Health Informatics to support data‑driven decision making.
