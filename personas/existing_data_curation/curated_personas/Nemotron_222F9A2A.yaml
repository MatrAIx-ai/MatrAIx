  hobbies: '["Visiting art galleries and museums", "Sketching and painting", "Photography", "Playing acoustic guitar", "Improv comedy / open‑mic performances", "Volunteering at community events", "Playing
    basketball", "Hiking local trails", "Reading business and philosophy books", "Listening to entrepreneurship podcasts"]'
  career_goals: Neil aims to finish his associate degree in business administration within the next year, then advance to an assistant manager role at his current store. Over the next five years he plans
    to become a store manager, developing leadership skills and implementing innovative visual‑merchandising concepts that blend retail with local art. In the longer term he aspires to open a boutique‑gallery
    space in Tulsa that showcases regional artists while offering a curated shopping experience, and eventually to manage a small chain of such concept stores across Oklahoma. He also hopes to become a
    speaker at regional retail conferences, sharing his ideas on customer engagement and community‑focused retail design.
