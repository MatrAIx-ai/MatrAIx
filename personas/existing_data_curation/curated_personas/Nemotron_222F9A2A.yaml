personas:
  professional: Neil Adams, a 20‑year‑old retail salesperson in Tulsa, leverages strong customer‑service communication, POS expertise, and visual‑merchandising flair to create art‑infused store promotions,
    while their organized, talkative nature makes them a natural trainer and conflict‑resolution guide for new staff.
  sports: Neil Adams, an avid basketball player who joins a Tulsa Community Rec League each Thursday night, also hikes the Osage Hills on weekends and cheers on the Oklahoma City Thunder and Tulsa Drillers,
    balancing a love for team camaraderie with solo outdoor adventures.
  arts: Neil Adams immerses themselves in Tulsa’s art scene by sketching murals inspired by Banksy, photographing street pieces by local artist Maya Santiago, performing acoustic renditions of John Mayer
    at open‑mic nights, and attending improv workshops that echo the spontaneity of comedian Bill Burr.
  travel: Neil Adams prefers spontaneous weekend road trips, having road‑tripped to the Oklahoma City Poetry Festival and the historic Hill Country of Texas, while also dreaming of a spring backpacking
    tour through Lisbon’s Alfama district and the vibrant murals of Mexico City, yet budget constraints keep their international travel plans tentative.
  culinary: Neil Adams, a modest home cook, delights in whipping up chicken‑fried steak with homemade gravy, spicing up tacos al pastor using pineapple and chipotle, and perfecting avocado toast with smoked
    salmon, while often ordering a hearty BBQ pork sandwich from a local joint after a night of gigs.
  core: Neil Adams blends a methodical retail mind with a restless creative soul, turning every store aisle into a gallery while juggling coffee‑fuelled conversations, occasional impulsive art‑supply purchases,
    and a habit of over‑planning weekend hikes that sometimes end up as spontaneous detours.
background:
  cultural: Neil is a white American of mixed German and Irish ancestry who grew up in suburban Tulsa, Oklahoma. His upbringing reflects typical Midwestern values—hard work, reliability, and a strong sense
    of community. While his family celebrates regional traditions such as the Tulsa State Fair, Thanksgiving cook‑outs, and local barbecue, he also embraces the city’s cultural diversity, including exposure
    to Native American heritage and the vibrant music scene of Tulsa’s historic Spavinaw District. He enjoys regional foods like chicken‑fried steak and participates in local festivals such as the Tulsa
    Oktoberfest. Although raised with occasional church attendance, Neil considers himself broadly secular, drawing inspiration from the city’s artistic and entrepreneurial spirit.
attributes:
