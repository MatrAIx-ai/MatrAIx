persona_description: A Kansas state legislator who is committed to improving the health outcomes of young children in the state. The legislator recognizes the barriers that families face in accessing health
  coverage for their children and is actively seeking ways to address these challenges. They understand the importance of preventive care, immunizations, and routine screenings for young children and are
  dedicated to ensuring that every eligible child has access to coverage. The legislator is also aware of the negative impacts of postpartum depression on young children and is working to address this issue
  by advocating for Medicaid expansion.
