  hobbies: '["playing at the playground", "building LEGO structures", "reading picture books", "nature walks and collecting leaves and rocks", "soccer", "dancing to country music", "simple cooking with
    parents", "drawing and coloring", "play‑acting with dolls"]'
  career_goals: Danielle dreams of growing up to be a teacher who can share stories and help classmates learn, or a veterinarian who can care for the animals she loves. She also imagines becoming a community
    helper who organizes fun activities for kids at the local park. Her ambition is to make a positive difference while staying connected to friends and family.
