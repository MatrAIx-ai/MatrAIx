personas:
  professional: Danielle, an aspiring mini-engineer, spends afternoons constructing elaborate LEGO skyscrapers and invents simple play-engineered solutions for playground problems, channeling her curiosity
    and practical knack while happily collaborating with friends.
  sports: Danielle, a spirited member of the Little Kickers soccer club, dashes across the schoolyard in bright green cleats, idolizes the New York City FC's dynamic midfield, and eagerly joins seasonal
    activities like backyard tag and nature scavenger hunts, preferring spontaneous play over structured practice.
  arts: Danielle, a budding story-lover, devours picture books by Mo Willems and Dr. Seuss, dances to Luke Bryan's country hits at family gatherings, shares her crayon murals of forest scenes with friends,
    and enjoys showing off her creations to anyone who stops by.
  travel: Danielle, an enthusiastic explorer who thrives on spontaneous adventures, has trekked the local botanical garden, splashed in the waves at Myrtle Beach during a summer family trip, and dreams
    of camping under the Northern Lights in Iceland while insisting on packing extra crayons for the journey.
  culinary: Danielle, a junior kitchen helper who loves mixing batter with her parents, relishes whisking chocolate chip cookie dough, sprinkling cinnamon on homemade pancakes, and assembling cheesy macaroni
    bites, proudly insisting on tasting every bite before the dish hits the table.
  core: Danielle, the six-year-old LEGO architect who trades cookie crumbs for stickers, transforms playgrounds into imaginative labs, and never forgets to ask why at every turn.
background:
  cultural: Danielle lives in Whitesville, a small town in Daviess County, Kentucky, surrounded by a close‑knit community that values hospitality, family gatherings, church events, and local traditions
    such as county fairs and 4th of July fireworks. Her family participates in Southern‑influenced celebrations, enjoys country music, and often attends community soccer games and church potlucks. This
    cultural atmosphere blends rural Midwestern values with a warm, friendly Southern charm, shaping Danielle’s love for community, outdoor play, and shared stories.
