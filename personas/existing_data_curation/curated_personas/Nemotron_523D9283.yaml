  hobbies: '[''Strategy video gaming'', ''Digital drawing'', ''LEGO building'', ''Custom PC assembly'', ''Science‑fiction/fantasy reading'', ''Fishing'', ''Biking'', ''Board‑game nights'', ''Journaling'']'
  career_goals: Michael aims to turn his tech curiosity into a career in software development, with a focus on creating educational games that help other students learn in an engaging way. In the short
    term, he plans to earn a Cisco IT Essentials certification and secure a part‑time job at a local computer repair shop to gain real‑world experience. After high school he intends to pursue an associate
    degree in Computer Science at a community college, then transfer to a four‑year program. Long‑term, he hopes to work remotely as a user experience (UX) designer for a company that blends technology
    and pedagogy, allowing him to maintain a flexible schedule while contributing to projects that promote learning and cooperation.
