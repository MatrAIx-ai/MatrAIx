personas:
  professional: Michael Rogers, a high‑school junior with a budding talent for game design and coding, leverages his love of structure and practical problem‑solving to craft intricate mods for simulation
    games, while his relaxed attitude toward obligations lets him improvise creative tweaks during late‑night PC build sessions.
  sports: Michael Rogers, a casual cyclist who logs weekend rides on the Indian River Lagoon trail as part of the St. Johns County Youth Cycling Club, drops a line for largemouth bass with his dad each
    summer, and follows the Miami Heat and Tampa Bay Buccaneers with avid enthusiasm, though he prefers solo physical activity to organized school sports.
  arts: Michael Rogers, who channels his artistic side into detailed digital sketches on a tablet inspired by Studio Ghibli’s Hayao Miyazaki and fantasy illustrator Alan Lee, regularly streams the ambient
    scores of C418 and Jeremy Soule while scrolling through anime fan‑art forums, and spends evenings re‑watching sci‑fi classics like *Blade Runner* and *Interstellar* for creative fuel.
  travel: Michael Rogers, who dreams of a budget‑friendly road trip to the Everglades and a weekend fishing getaway in the Keys with his dad, already enjoys annual visits to Orlando’s theme parks and hopes
    to one day explore Tokyo’s anime districts for inspiration, preferring to research itineraries online yet leaving room for spontaneous detours.
  culinary: Michael Rogers, whose palate swings from classic pepperoni pizza and cheesy mac‑and‑cheese to a fascination with sushi—especially salmon nigiri and spicy tuna rolls—enjoys experimenting with
    fresh basil, mozzarella, and avocado in his kitchen, yet often forgets to clean up promptly, leaving a growing stack of dishes after late‑night gaming sessions.
  core: Michael Rogers, a reserved fifteen‑year‑old strategist who builds digital worlds, hoards LEGO pieces, and forgets to water his plants while daydreaming about futuristic cities, perfectly blends
    disciplined planning with a laid‑back love of spontaneous creativity.
background:
  cultural: Michael was raised in a suburban neighborhood of Melbourne, Florida, on the Space Coast. His family is White with Midwestern roots and embraces typical American holidays and traditions. The
    local culture blends coastal recreation, a strong connection to NASA and aerospace endeavors, and Southern hospitality. Exposure to the Indian River Lagoon and nearby beaches spurred his love for fishing,
    biking, and outdoor exploration. Community events such as the Melbourne Art Walk and beach clean‑ups have shaped his appreciation for civic involvement. While his household mainly reflects mainstream
    U.S. culture, the diversity of Brevard County—visible in local festivals, seafood cuisine, and occasional Spanish‑language signage—adds a subtle multicultural flavor to his everyday life.
