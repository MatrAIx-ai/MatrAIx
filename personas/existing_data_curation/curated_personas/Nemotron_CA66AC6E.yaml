personas:
  professional: Diana Blackstock is a rural social worker in Idaho who leverages a background in education to deliver trauma‑informed care, using active listening and meticulous documentation while designing
    small‑group workshops for at‑risk youth; they balance curiosity about emerging best practices with a pragmatic reliance on proven methods, and they assertively advocate for clients while maintaining
    organized case loads.
  sports: Diana Blackstock is a member of the Monteview Trail Runners club, favoring weekend hikes on foothill trails and cross‑country skiing in winter, while also playing on a local women’s basketball
    league; they cheer for the Boise State Broncos football team and follow the Idaho State Bengals basketball season, preferring low‑impact, small‑group fitness activities that complement their solitary
    nature.
  arts: Diana Blackstock enjoys historical fiction such as Hilary Mantel's Wolf Hall, immerses themselves in folk music by Gillian Welch, studies Ansel Adams’ landscape photography, and attends the annual
    Jefferson County art fair; they knit scarves using William Morris‑inspired patterns and occasionally volunteer to curate a community photo exhibit at the local library.
  travel: Diana Blackstock favors low‑key road trips with detailed itineraries, taking yearly weekend getaways to Yellowstone and dreaming of hiking the Scottish Highlands; they have visited New Zealand's
    South Island for a photography retreat, love weekend drives to Portland for coffee culture, and usually plan travel around budget constraints and seasonal work demands.
  culinary: Diana Blackstock cooks simple farm‑to‑table meals, favoring roasted beet salad with goat cheese, quinoa pilaf with rosemary and thyme, and sourdough bread baked on weekends; they relish dark
    chocolate as a nightly treat, enjoy fresh salmon with lemon‑dill sauce, and occasionally indulge in fast‑food pizza when pressed for time, reflecting a balance of health awareness and pragmatic comfort.
  core: Diana Blackstock is a determined rural social worker who balances meticulous planning with spontaneous hikes, channels compassion into community care, and finds calm in photography, knitting, and
    mindful practices.
background:
  cultural: 'Diana was raised in a middle‑class, predominantly white community in Eastern Idaho, where values of self‑reliance, modesty, and community service are deeply ingrained. Her family’s Methodist
    upbringing emphasized helping neighbors, volunteering, and respecting individual autonomy. Growing up amid expansive natural landscapes fostered an appreciation for the outdoors and a pragmatic, down‑to‑earth
    worldview. These cultural influences shape her social‑work approach: practical, collaborative, and rooted in a strong sense of duty to her community, while also honoring personal independence and quiet
    introspection.'
