  hobbies: '[''hiking'', ''nature photography'', ''reading historical fiction'', ''gardening'', ''knitting'', ''yoga'', ''mindfulness meditation'', ''volunteering at animal shelter'']'
  career_goals: Over the next three years Diana plans to earn a Master of Social Work and become a Licensed Clinical Social Worker, focusing on rural mental‑health services. She aims to design and lead
    a community‑based program that integrates school counseling, family support, and substance‑abuse prevention for at‑risk youth in Jefferson County. In the longer term she envisions a supervisory role
    where she mentors newer social workers and collaborates with local officials to secure increased funding for mental‑health resources. Ultimately, Diana hopes to found a nonprofit that offers a continuum
    of care—including housing assistance, counseling, and job‑training—to families confronting homelessness and addiction, aligning her practical expertise with her compassionate drive for systemic change.
