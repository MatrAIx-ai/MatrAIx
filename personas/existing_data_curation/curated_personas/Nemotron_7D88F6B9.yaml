  hobbies: '[''Gallery and museum visits'', ''Theater attendance'', ''Volunteer art event coordination'', ''Hiking in the Teton Range'', ''Bridge and chess clubs'', ''Lecture series on technology and philosophy'',
    ''Mindfulness meditation'']'
  career_goals: Even in retirement, Joshua aims to mentor emerging entrepreneurs in Jackson, fostering sustainable business practices that balance profit with community stewardship. He plans to establish
    a scholarship fund for students pursuing arts and business studies, author a memoir recounting his career lessons, and serve as a senior advisor for the local arts council to shape cultural initiatives
    that reflect both tradition and innovation.
