persona_description: A project procurement manager who is responsible for overseeing the process of identifying and procuring project services, goods, or results from outside vendors. This person is typically
  involved in the planning and execution of project procurement processes, including contract planning, requesting seller responses, selecting vendors, and administering contracts. The persona is skilled
  in managing the resources necessary for the acquisition and ensuring that the acquisition does not stray from the stated objectives. They are also experienced in controlling contract changes and documenting
  lessons learned in executing the contract. The persona is likely to have a strong understanding of the project management industry and is familiar with the six processes widely recognized by the industry
  as integral to project procurement management.
