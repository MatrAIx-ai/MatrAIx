personas:
  professional: Ralph Teodosio is a budding young engineer who channels his curiosity and practical mindset into building intricate LEGO moving models and coding Scratch games, meticulously planning each
    project while his competitive edge drives him to outdo his peers' creations.
  sports: Ralph Teodosio plays midfield for the local Junior Strikers U‑9 soccer team, trains after school with methodical drills, avidly follows Manchester United and watches their matches for tactical
    inspiration, and channels their energetic, competitive nature into both weekend games and occasional after‑school basketball sessions.
  arts: Ralph Teodosio expresses creativity through constructing futuristic LEGO sets, designing redstone contraptions in Minecraft, coding interactive stories in Scratch, and enjoying the upbeat tunes
    of KIDZ BOP alongside the iconic soundtrack of The LEGO Movie, all of which fuel their imagination and satisfy their critical eye for detail.
  travel: Ralph Teodosio prefers family‑guided adventures that blend learning and fun, having explored the county fair and a nearby natural history museum, while dreaming of a future trip to the Kennedy
    Space Center in Florida and the Jurassic Park‑inspired Dinosaur Museum in London, planning each outing with a checklist to ease their worry.
  culinary: Ralph Teodosio favors classic kid favorites like pepperoni pizza, cheesy mac and cheese, and chicken nuggets, delights in building snack plates with gummy dinosaurs and broccoli florets that
    look like tiny trees, can assemble a simple peanut butter‑banana sandwich with moderate success, yet often overindulges in sugary cereal, leading to occasional energy crashes.
  core: Ralph Teodosio is a curious, organized, and competitively driven 8‑year‑old whose love of building, coding, and soccer is balanced by frequent worries and a meticulous approach to every hobby.
background:
  cultural: Ralph was born and raised in Houston, Texas, in a middle‑class white family. His upbringing blends Southern hospitality with the multicultural vibrancy of Houston. He celebrates traditional
    American holidays such as Thanksgiving and the Fourth of July with family barbecues and enjoys local Tex‑Mex favorites like tacos and queso. The family often attends community festivals, including the
    Houston Livestock Show & Rodeo, and participates in neighborhood block parties. They are active members of a local church, which adds a sense of community and shared values. Ralph attends a public elementary
    school that emphasizes diversity, exposing him to peers from many cultural backgrounds and reinforcing his outgoing, sociable nature.
