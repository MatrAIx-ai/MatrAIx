personas:
  professional: Michelle Dehaan, a retired field researcher in water quality with a background in applied physics and environmental science, blends meticulous data analysis, statistical reporting, and a
    serene, methodical problem‑solving style into community workshops that fuse scientific insight with visual storytelling through photography and watercolor, mentoring students with calm confidence while
    navigating their lightly chaotic schedule.
  sports: Michelle Dehaan enjoys low‑impact fitness, joining the Willow Creek Walking Club for daily river strolls, cheering on the Chicago Cubs and Chicago Bears from their porch, and they occasionally
    participate in community senior softball games, balancing a love of gentle activity with a keen eye for birdwatching during the spring migration.
  arts: Michelle Dehaan immerses themselves in the arts by painting watercolors inspired by Monet’s soft palettes, photographing seasonal river scenes à la Ansel Adams, reading Maya Angelou’s poetry, attending
    Illinois Symphony Orchestra concerts featuring Yo‑Yo Ma on cello, and they weave these influences into community exhibitions that celebrate the intersection of science and creativity.
  travel: Michelle Dehaan favors thoughtful, slow‑paced travel, often planning weekend getaways to historic river towns like Galena, Wisconsin, or cultural retreats in Sedona, Arizona, while dreaming of
    a future trip to Kyoto to photograph cherry blossoms, and they balance these adventures with a modest travel fund that prioritizes restorative experiences over luxury.
  culinary: Michelle Dehaan delights in experimenting with global flavors, frequently preparing ratatouille with fresh herbs from their garden, mastering sourdough starter while adding a pinch of smoked
    paprika, and they love the comfort of a roasted beet and goat‑cheese salad, all while enjoying the occasional indulgence of a Korean kimchi stew for its vibrant spice.
  core: Michelle Dehaan is a calm, curiosity‑driven septuagenarian who melds science and art, tends a thriving garden, sporadically misplaces their reading glasses, and never misses an opportunity to capture
    a sunrise over the river.
background:
  cultural: Michelle hails from a multi‑generational Midwestern family with Dutch‑German ancestry that settled in central Illinois in the early 1900s. Raised on a modest farm near Peoria, she internalized
    a strong work ethic, self‑reliance, and an appreciation for the rhythms of nature. Her family values emphasized punctuality, modesty, and community service, which continue to shape her involvement in
    local volunteer initiatives. While identifying as white, her worldview blends the region's pragmatic conservatism with the progressive curiosity fostered by her STEM education and lifelong love of the
    arts.
attributes:
  skills: '["Analytical problem solving", "Data collection and statistical analysis", "Technical writing", "Scientific research methodology", "Science communication and public outreach", "Digital photography",
    "Archival curation", "Mentoring and tutoring"]'
  hobbies: '["Watercolor painting", "Digital photography", "Gardening", "Birdwatching", "Reading contemporary literature", "Attending local theater productions", "Cooking experimental dishes", "Genealogy
    research", "Volunteer science and art programs for youth"]'
  career_goals: Although officially retired, Michelle aims to keep contributing her knowledge and curiosity to the community. She hopes to mentor high‑school students in her county through science fairs,
    develop a series of informal workshops on photography and environmental awareness, and collaborate with the local historical society to create a traveling exhibition of digitized personal and regional
    archives. On a personal level, she aspires to complete a memoir that weaves her scientific background with her love of art, and to learn to play the cello, an instrument she has admired since childhood.
    Her flexible approach allows her to pursue these projects without rigid schedules, while her assertive yet cooperative demeanor helps her lead volunteer initiatives.
