personas:
  professional: Mark Kiser, an 18‑year‑old aspiring IT support specialist, leverages their calm, methodical troubleshooting and Excel‑driven budgeting expertise to deliver repeatable, process‑oriented solutions,
    while their competitive drive fuels ambition to earn CompTIA A+, Network+, and CCNA certifications and ascend to network administration.
  sports: Mark Kiser, a disciplined weight‑lifter and avid hiker, follows the Utah Jazz and Real Salt Lake, logs their trail progress on Strava, and attends the Layton Trail Runners club meet‑ups, all while
    applying a periodized training schedule that mirrors their project‑planning mindset.
  arts: Mark Kiser channels their systematic nature into landscape photography inspired by Ansel Adams, spends weekends building intricate LEGO architecture after studying Frank Gehry’s designs, and relaxes
    listening to the precise compositions of Hans Zimmer.
  travel: Mark Kiser prefers highly organized road trips, having meticulously charted a solo drive through Yellowstone and Glacier National Parks, and dreams of a future backpacking expedition across Norway’s
    fjords once their savings and certification goals are met.
  culinary: Mark Kiser, who enjoys the precision of meal prepping, often cooks chicken teriyaki with gram‑level soy sauce measurements and quinoa, while occasionally rewarding themselves with a perfectly
    engineered pepperoni pizza from a local pizzeria that follows a strict crust‑to‑topping ratio.
  core: Mark Kiser is a relentlessly organized 18‑year‑old who turns every hobby—from board games to budgeting—into a spreadsheet, yet habitually forgets to water their houseplants for weeks.
background:
  cultural: Mark was raised in Layton, Utah, a predominantly white, suburban community within Davis County where the cultural climate reflects a blend of Western pragmatism and the values of the larger
    LDS‑influenced region. While his family is not overtly religious, the surrounding community emphasizes self‑reliance, hard work, modest ambition, and service. Outdoor recreation such as hiking, skiing,
    and mountain biking is common, and there is a cultural appreciation for orderly, family‑centered lifestyles. These regional influences have shaped Mark's practical, structured outlook, his competitive
    spirit, and his commitment to community involvement.
attributes:
