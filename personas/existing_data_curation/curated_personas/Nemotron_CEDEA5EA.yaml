  hobbies: '[''Strategy board games (Chess, Settlers of Catan)'', ''Real‑time strategy video games (StarCraft, Civilization)'', ''Scale model and LEGO building'', ''Planned hiking with route mapping'',
    ''Structured weight‑lifting routine'', ''Landscape photography with methodical editing'', ''Personal finance budgeting'', ''Organized volunteering at local food bank'']'
  career_goals: Mark aims to obtain an entry‑level IT support or help‑desk position within a structured organization that values clear processes. He plans to earn CompTIA A+ and Network+ certifications
    within the next year, followed by a Cisco CCNA credential. Over the next five years, he aspires to transition into a network administrator or project coordinator role, eventually achieving PMP certification
    and possibly launching a small tech‑service business serving local businesses in the Layton area. His career trajectory emphasizes steady progression, measurable milestones, and a competitive drive
    to be a top performer.
