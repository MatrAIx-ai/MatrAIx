  career_goals: Robert aspires to turn his passion for visual storytelling into a professional career. He aims to build a robust portfolio of digital illustrations and concept art that merges his South
    Asian heritage with futuristic aesthetics, with the goal of securing a junior position at a game development or animation studio. He also hopes to enroll in an art-focused community college or an online
    certificate program to formalize his skills. Parallel to that, he envisions launching a personal YouTube or Twitch channel where he streams his creative process and competitive gaming sessions, eventually
    monetizing his content. Ultimately, he wants to be recognized as a versatile creator who can blend narrative, illustration, and interactive media, providing both personal fulfillment and financial stability.
