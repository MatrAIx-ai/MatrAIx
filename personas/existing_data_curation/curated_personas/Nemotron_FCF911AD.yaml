personas:
  professional: A budding LEGO architect named Marcelo Garcia, age five, delights in building structured, step‑by‑step creations that satisfy their need for predictability while also improvising when blocks
    run out, showcasing an early knack for spatial reasoning and practical problem‑solving.
  sports: An enthusiastic junior soccer fan, Marcelo Garcia plays forward for the neighborhood Wildcats U‑6 team, practices dribbling after school, cheers for the local professional club the City FC during
    weekend broadcasts, and they balance a love of sprinting races with a laid‑back attitude toward structured training.
  arts: A creative little movie buff, Marcelo Garcia enjoys animated classics like \"Frozen\" and \"Moana\", sings along to The Wiggles, and proudly displays a hand‑drawn picture of Mickey Mouse, reflecting
    how colorful storytelling fuels their imagination and occasional need for solitary drawing sessions.
  travel: A curious explorer, Marcelo Garcia has visited the nearby beach town of Sunny Cove with family, dreams of seeing the towering Eiffel Tower in Paris, and they prefer short car trips with plenty
    of snack breaks over long flights, finding comfort in familiar routines while discovering new places.
  culinary: A budding chef in training, Marcelo Garcia loves helping whisk together macaroni and cheese, proudly adds a sprinkle of cheddar on top of their chicken nuggets, and delights in fruit salads
    featuring strawberries, bananas, and kiwi, though they often forget to clean up the kitchen afterward.
  core: Marcelo Garcia is a structured‑yet‑flexible five‑year‑old who balances playful creativity with a need for routine, occasionally gets tangled in their own disorganization, and they approach life
    with a gentle mix of independence and cooperation.
background:
  cultural: Marcelo grows up in a Mexican‑American household in Las Vegas, where Spanish is spoken alongside English. His family maintains cultural traditions such as celebrating Día de los Muertos with
    homemade altars, preparing tamales during holidays, and attending local Mexican festivals that feature música norteña and dance. Catholic customs, like attending Mass on Sundays and observing Christmas
    posadas, are part of his weekly routine. At the same time, his exposure to the diverse Las Vegas community introduces him to a variety of cuisines and cultural events, fostering an appreciation for
    multiculturalism. Marcelo’s parents emphasize family cohesion, respect for elders, and the importance of education, while also encouraging his curiosity and playfulness.
