  career_goals: Marcelo dreams of becoming a firefighter because he admires their bravery and the clear structure of their daily schedule. He also imagines himself as a teacher, enjoying the idea of sharing
    stories and leading a group of younger kids. These aspirations reflect his love for helping others while valuing predictable roles and routines. Occasionally, he pretends to be a superhero, showcasing
    his assertive side and desire to protect his friends.
