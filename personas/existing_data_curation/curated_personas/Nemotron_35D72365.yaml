    night'']'
  career_goals: Gary aims to transition from senior individual contributor to a principal engineer or technical director role where he can shape the long‑term architecture of a product suite. He is driven
    to lead the creation of highly reliable, scalable platforms that support millions of users while maintaining strict security standards. Over the next five years, he plans to earn a recognized industry
    certification (e.g., AWS Certified Solutions Architect – Professional) and publish a technical paper on micro‑service resilience. He also aspires to mentor a new generation of engineers and, eventually,
    spin off a consultancy that helps startups embed disciplined engineering practices from day one.
