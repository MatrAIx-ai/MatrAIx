personas:
  professional: Gary Johnson, a veteran software engineer with 25 years of experience in Java, Python, Go, and cloud‑native micro‑services, applies a rigorously structured, results‑oriented approach to
    designing high‑throughput, security‑focused systems while they competitively mentor junior talent, embodying his blend of practical Midwestern values and Silicon Valley’s meritocratic drive.
  sports: Gary Johnson stays active through weekend hikes along the Pacific coastline, membership in a Bay Area cycling club that meets on Saturday mornings, regular viewings of the San Francisco 49ers
    and Golden State Warriors, and occasional pick‑up tennis games at a local club, favoring disciplined, small‑group exercise over large‑scale sports spectacles, while they prioritize consistency over
    intensity.
  arts: Gary Johnson indulges in classic 70s rock, spinning records by Led Zeppelin, The Rolling Stones, and Pink Floyd on his vintage turntable, attends intimate performances at venues like the SF Jazz
    Center, and captures natural landscapes with a 35mm film camera, all of which satisfy their appreciation for timeless, structured artistry, while they often discuss the music’s cultural context with
    close friends.
  travel: Gary Johnson prefers meticulously planned, low‑stress trips that blend nature and culture, such as a week‑long road tour of the Pacific Northwest’s wineries and hiking spots in Oregon, a weekend
    getaway to Napa Valley’s vineyards, and an annual visit to his family’s farm in the Midwest, while they balance a love of structure with a yearning for serene escape.
  culinary: Gary Johnson enjoys home‑brewing craft ales, experimenting with hop varieties like Citra and Mosaic, and cooking farm‑to‑table dishes such as roasted vegetable ratatouille, grilled salmon with
    dill, and classic Irish stew, often using fresh herbs from their garden, reflecting a hands‑on, structured approach to both cooking and brewing.
  core: Gary Johnson is a disciplined, results‑driven technologist who channels Midwestern pragmatism into meticulous engineering, cautious finance, selective fitness, classic‑rock devotion, and a penchant
    for home‑brewed beer, all while they maintain a skeptical, competitive edge and occasional work‑induced health neglect.
background:
  cultural: Gary grew up in a middle‑class suburban household in the Midwest, the son of Irish‑American and German‑American parents. He moved to California after college to join the burgeoning tech scene,
    and has lived in the Menlo Park area for the past two decades. His cultural identity blends traditional American values—family, work ethic, and community service—with the fast‑paced, merit‑based ethos
    of Silicon Valley. He celebrates major U.S. holidays, enjoys classic rock from the 70s, and maintains a pragmatic, results‑oriented outlook shaped by both his Midwestern upbringing and his professional
    immersion in tech culture.
