  career_goals: Carla aims to turn her lifelong passion for visual and literary arts into a sustainable freelance career. Over the next five years she plans to launch an online studio that sells original
    paintings, limited‑edition prints, and handcrafted journals, while also offering paid workshops in painting and creative writing for local schools and community centers. She aspires to publish a chapbook
    of her poems and a collection of illustrated short stories, and to curate an annual community art exhibition that highlights emerging talent in Merced County. To support these goals she intends to complete
    a professional certificate in graphic design and to develop a modest studio space in the countryside where she can collaborate with other artists.
