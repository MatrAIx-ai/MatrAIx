personas:
  professional: Thomas Cerbone is a disciplined 13‑year‑old robotics club member who designs, builds, and programs competition robots, applies strategic thinking from chess to engineering challenges, and
    consistently meets tight project deadlines with meticulous documentation, showing they thrive on structured problem‑solving.
  sports: Thomas Cerbone shoots free throws at the school basketball court three times a week, follows the Los Angeles Lakers and the Golden State Warriors for tactical inspiration, and participates in
    the local youth league where they prioritize personal scoring stats over team passing, reflecting their competitive streak.
  arts: Thomas Cerbone enjoys listening to Daft Punk’s electronic soundscapes while coding, collects vintage science‑fiction posters of Stanley Kubrick’s films, and watches the documentary series ‘Cosmos’
    for visual inspiration, blending a love of futuristic art with a practical engineering mindset, and they often draw creative parallels between music and circuitry.
  travel: Thomas Cerbone has camped in the nearby prairie reserves, trekked the Badlands National Park, and dreams of visiting the Kennedy Space Center and the European Space Agency’s launch site in Kourou,
    planning trips with detailed checklists and budgeting spreadsheets, showing they satisfy their need for order.
  culinary: Thomas Cerbone often assembles quick meals like spaghetti with marinara sauce topped with mozzarella and fresh basil, enjoys snacking on homemade trail mix with almonds, raisins, and chocolate
    chips, and occasionally experiments with a Raspberry Pi‑controlled mini‑oven for precise temperature cooking, proving they enjoy precise control even in the kitchen.
  core: Thomas Cerbone is a hyper‑organized teen who balances robotics brilliance with anxiety‑driven perfectionism, competitive sports, meticulous budgeting, and a quirky habit of journaling every win
    and worry, showing they constantly measure their progress.
background:
  cultural: Thomas grew up in Andover, a small, close knit community in Butler County, Kansas. His family’s roots are typical of the Midwestern white demographic, with a strong emphasis on hard work, self
    reliance, and community involvement. Local traditions such as county fairs, high school sports events, and church gatherings have shaped his sense of belonging. The prevailing cultural values—practicality,
    modesty, and a respect for education—reinforce his disciplined approach to life. While his environment is relatively homogenous, Thomas’s curiosity drives him to explore diverse ideas through the internet
    and school programs, blending his Midwestern upbringing with a broader global perspective.
