  career_goals: Thomas aims to channel his disciplined work ethic and love of practical problem solving into a career as a mechanical or aerospace engineer, with a particular interest in robotics and renewable
    energy technology. He dreams of earning a scholarship to a leading engineering program, leading a collegiate robotics team, and eventually designing innovative machines that address real world challenges.
    His competitive spirit drives him to set measurable milestones such as winning regional Science Olympiad and VEX competitions, while his cautious, worry-prone side ensures he plans each step carefully.
    He also keeps an eye on the possibility of playing basketball at the collegiate level, but his primary ambition remains a STEM focused professional path.
