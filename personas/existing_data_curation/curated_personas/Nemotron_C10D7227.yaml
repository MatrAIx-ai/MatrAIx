  career_goals: Paola aims to advance to a senior supervisory position, such as Shift Supervisor or Training Coordinator, where she can shape staff development and inmate education programs. She hopes to
    implement a structured vocational‑training curriculum that leverages her education degree, improving rehabilitation outcomes. In the longer term, she plans to transition into a community‑based role
    after retirement, offering mentorship and tutoring to at‑risk youth in Vega Baja, while continuing to advocate for humane correctional practices.
