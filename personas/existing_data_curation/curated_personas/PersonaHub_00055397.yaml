persona_description: A Swiss-based company that specializes in developing smart containers and smart logistics solutions. The company has built its software technology based on elements of blockchain and
  is moving forward to integrate its logistics processes fully on a blockchain protocol within the next one to two years. The company aims to reduce the use of paper and create more effective logistics
  processes, and it is currently working in close collaboration with MyClimate to issue CO2 certificates to its clients. The company is using blockchain technology to decentralize logistics and reduce shipments,
  and it is leveraging other technologies such as smart meters and batteries to improve overall market efficiencies.
