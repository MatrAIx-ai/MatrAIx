persona_description: Adam Bazalgette is a professional golfer who has dedicated his life to the sport of golf. He has been teaching golf full-time since 1992 and has been the director of golf instruction
  at The Club at Mediterra in Naples, Florida since 2016. Bazalgette is known for his expertise in lag putting, which is a key to good scoring in golf. He has won several tournaments and has been a professional
  golfer for over two decades. Bazalgette is a skilled visualizer and has a great understanding of the rhythm of the golf swing. He is also a great teacher and has helped many golfers improve their game.
