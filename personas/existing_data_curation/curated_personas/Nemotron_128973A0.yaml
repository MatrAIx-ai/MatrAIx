  career_goals: Short‑term, Alexsandro aims to earn an OSHA 30‑hour certification and a certified crane operator credential, which will open doors to supervisory roles on larger projects. He plans to complete
    his associate’s degree in construction management within the next two years, leveraging his college coursework to transition from laborer to foreman. Long‑term, he dreams of launching his own construction
    firm that specializes in affordable housing for the Robstown community, combining his practical experience, entrepreneurial drive, and desire to give back to his neighbors.
