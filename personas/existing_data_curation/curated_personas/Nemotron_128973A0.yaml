personas:
  professional: Alexsandro Moralesgarcia, a 21‑year‑old construction laborer in Robstown, Texas, blends hands‑on expertise with bilingual communication, excelling at operating excavators, reading blueprints,
    and ensuring safety compliance while their spontaneous curiosity pushes them to experiment with new building methods, even as they sometimes wrestle with deadline‑driven organization.
  sports: Alexsandro Moralesgarcia powers through pickup soccer and basketball games at the local park, hits the community gym for weight‑training three times a week, cheers for the Houston Texans on Sundays
    and the Dallas Cowboys on Fridays, and has a seasonal habit of fishing on the Nueces River with a local angling club.
  arts: Alexsandro Moralesgarcia strums a battered guitar at family gatherings while blasting Banda El Recodo and Los Tigres del Norte, swears by the storytelling of José José, occasionally streams indie
    rock on Spotify, and volunteers to set up sound for the annual Fiesta de la Feria, where they also admire local mural artists.
  travel: Alexsandro Moralesgarcia prefers spontaneous road trips, having already explored South Padre Island’s beaches, taken a weekend dip into New Mexico’s White Sands, and dreaming of a cultural pilgrimage
    to Tulum’s ruins, all while balancing a limited budget that forces them to rely on cheap motels and rideshare deals.
  culinary: Alexsandro Moralesgarcia enjoys cooking tamales, carnitas, and homemade guacamole for family feasts, experiments with grilling brisket on weekends, has a growing appetite for sushi rolls after
    ordering from a local Japanese spot, and claims they can’t resist a good slice of pepperoni pizza after a long workday.
  core: Alexsandro Moralesgarcia is a hands‑on, bilingual construction enthusiast who juggles a love for music, soccer, and gaming with a penchant for late‑night snacks, occasional disorganization, and
    a competitive streak that fuels both they work and they weekend pursuits.
background:
  cultural: Alexsandro is a first‑generation Mexican‑American raised in Robstown, Texas. He grew up in a bilingual household where Spanish was spoken at home and English at school, giving him a fluid cultural
    duality. Family gatherings revolve around traditional Mexican cuisine such as tacos al pastor, tamales, and pozole, and he celebrates holidays like Día de los Muertos and Mexican Independence Day with
    community parades and church services. The close‑knit, hardworking ethos of his Mexican heritage blends with the Texan emphasis on independence and entrepreneurship, shaping his values of loyalty, perseverance,
    and a strong desire to uplift his neighborhood through skilled trade work.
