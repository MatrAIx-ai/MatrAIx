personas:
  professional: Carla Telsee is a boutique talent agent who combines razor‑sharp contract negotiation, meticulous budget forecasting, and data‑driven branding strategies with a disciplined, methodical work
    style, channeling their love of structured planning and community uplift into building a roster of diverse musicians and athletes.
  sports: Carla Telsee is an avid half‑marathon runner who trains with the Louisville Running Club, follows the Louisville Cardinals men’s basketball team and supports Louisville City FC, and they volunteer
    as a coach for a local youth basketball league to blend competition with community mentorship.
  arts: Carla Telsee immerses themselves in the city’s jazz and spoken‑word scene, regularly attending performances at the Red Garter, collecting vintage vinyl from icons like Miles Davis, Nina Simone,
    and Marvin Gaye, and they draw creative inspiration from these soulful sounds for their branding campaigns.
  travel: Carla Telsee plans trips with the same checklist mindset they use at work, favoring curated itineraries that balance music festivals in New Orleans, culinary tours in Nashville, and a dream visit
    to the Montreux Jazz Festival in Switzerland, while keeping travel budgets disciplined to fund their mentorship program.
  culinary: Carla Telsee enjoys cooking Southern comfort dishes such as shrimp and grits, smoked brisket, and buttermilk biscuits, seasoning them with fresh basil and thyme from their backyard garden, and
    they treat each meal as a ritual that connects personal heritage with disciplined culinary practice.
  core: Carla Telsee blends disciplined organization, a competitive edge, and a deep‑rooted community ethos into every facet of life, from meticulously negotiated contracts to morning runs, and they nurture
    a secret stash of vintage vinyl and a habit of double‑checking every spreadsheet.
background:
  cultural: Carla grew up in a close‑knit Black community in Louisville, where church gatherings, family barbecues, and local music festivals shaped her sense of identity. She draws on the rich legacy of
    African‑American music in the city—especially jazz, soul, and hip‑hop—to inform her work with performers, and she incorporates Southern culinary traditions into her social life. Her cultural roots emphasize
    resilience, entrepreneurship, and community uplift, values that drive her commitment to represent Black talent and to mentor the next generation of agents. Carla also participates in cultural celebrations
    such as Kwanzaa and Juneteenth, and she volunteers with youth programs that use arts and sports as pathways to empowerment.
attributes:
  skills: '[''Contract negotiation'', ''Legal agreement drafting'', ''Financial budgeting and forecasting'', ''Event and tour logistics'', ''Brand development'', ''Social media strategy'', ''Public relations'',
    ''Stakeholder relationship management'', ''Data analysis for performance metrics'', ''Risk assessment and mitigation'', ''Project management'', ''Talent scouting'', ''Business development'']'
  hobbies: '[''Reading business and leadership literature'', ''Playing chess'', ''Running and training for half‑marathons'', ''Gardening herbs and vegetables'', ''Attending intimate jazz and spoken‑word
    shows'', ''Collecting vintage vinyl records'', ''Cooking Southern comfort meals'']'
  career_goals: Carla aims to expand her boutique agency into a regional powerhouse that represents a diverse roster of Black artists, musicians, and athletes from the Kentucky area and beyond. Over the
    next five years she plans to secure at least three national touring acts, negotiate multi‑million‑dollar endorsement deals for her athlete clients, and launch a mentorship program for up‑and‑coming
    Black agents. She also aspires to develop a proprietary analytics platform that tracks fan engagement and revenue streams, positioning her firm at the intersection of technology and entertainment. Ultimately,
    her ambition is to become a recognized thought leader in talent management while championing greater equity and representation within the industry.
