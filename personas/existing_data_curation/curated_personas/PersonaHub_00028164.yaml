persona_description: A professional water utility worker who is involved in developing and implementing response networks to restore service after severe weather events. They are familiar with the importance
  of preparedness and the role of water utilities in providing clean and safe water to customers. They have experience with the establishment and operation of WARNs, and are knowledgeable about the impact
  of climate change on water utilities. They are committed to promoting climate science and adaptation measures to reduce impacts on utility operations and ensure that customers are not disrupted by severe
  weather events.
