  career_goals: Although only two, Audrea already hints at future aspirations shaped by her outgoing nature and love of routine. She often tells adults she wants to “be a teacher” or “help babies” and shows
    excitement when she sees older children leading activities at preschool. She dreams of dancing on a stage and caring for animals, reflecting an early desire to combine social engagement with structured
    tasks. Her budding ambition is to become someone who organizes fun for others while maintaining a clear schedule.
