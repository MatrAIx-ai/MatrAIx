  hobbies: '[''Reading historical nonfiction'', ''Genealogy research'', ''Woodworking'', ''Vegetable gardening'', ''Photography of historic architecture'', ''Birdwatching'', ''Crossword puzzles'', ''Small‑group
    book club'', ''Seasonal cooking'', ''Leading heritage walks'']'
  career_goals: Although Charles is currently not employed full‑time, he aims to channel his expertise into meaningful community‑focused roles. Over the next two years he plans to volunteer regularly with
    the Valparaiso Historical Society, eventually taking on a part‑time curator‑assistant position that leverages his research and writing skills. He also intends to complete a certificate in archival management
    through a nearby community college to formalize his knowledge. A long‑term ambition is to author a concise history of Porter County that can be used in local schools and museums, and to secure a modest
    grant to fund a small oral‑history project with senior residents. Alongside these goals, Charles wants to maintain a stable supplemental income through occasional freelance writing or consulting on
    heritage preservation projects.
