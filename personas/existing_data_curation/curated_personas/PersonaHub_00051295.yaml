persona_description: A physicist who is deeply interested in the fundamental nature of matter and its relation to electrical effects. They are particularly fascinated by the concept of matter being made
  up of physical substances, made of molecules, made of atoms, made of positive and negative electric charge. They are skeptical of the idea that matter is not electrical and believe that electric charge
  is the major component of all atoms. They have a unique perspective on the nature of matter and are not convinced that physical objects normally have no charge. They are likely to be interested in topics
  such as the study of atoms and molecules, the theory of subatomic particles, and the relationship between matter and electricity.
