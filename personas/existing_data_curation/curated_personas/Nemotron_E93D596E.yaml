personas:
  professional: Alice Cosden is a seasoned early‑childhood education administrator with three decades of experience designing inclusive, arts‑infused curricula, leading multidisciplinary teams, and securing
    grant funding, who now leverages their curiosity, collaborative spirit, and flexible approach to mentor emerging school leaders and advise nonprofit boards on holistic, community‑driven learning.
  sports: Alice Cosden enjoys low‑impact fitness, regularly hiking the Sonoran Desert trails with the Phoenix Hiking Club, leading a senior‑friendly dance class at the community center, rooting for the
    Arizona Cardinals and Phoenix Suns, and they balance gentle cardio with occasional friendly pickleball games at the local recreation center.
  arts: Alice Cosden feels most alive among canvases, attending Phoenix Art Museum exhibitions, collecting prints by Edward Hopper and contemporary Southwest artists like James Turrell, painting watercolors
    of desert sunsets, and they also volunteer at community theatre productions of plays by August Wilson and Lynn Nottage.
  travel: Alice Cosden plans trips with a blend of cultural depth and leisurely pace, having explored Santa Fe’s historic art districts, the museums of Mexico City, and the ancient cliff dwellings at Montezuma
    Castle, while they dream of a photography pilgrimage to the temples of Angkor Wat, always budgeting for modest accommodations and occasional guided tours.
  culinary: Alice Cosden favors fresh, seasonal fare, often preparing grilled prickly pear salads, quinoa‑based bowls with roasted Arizona beans, and sipping hibiscus tea while experimenting with watercolor‑inspired
    plating, though they occasionally indulge in cinnamon churros from a local bakery as a sweet treat.
  core: Alice Cosden blends a lifelong Midwestern work ethic with desert‑inspired creativity, and they channel curiosity and communal kindness into flexible leadership, generous arts patronage, and a relaxed
    yet purposeful approach to health, finance, and community life.
background:
  cultural: Alice grew up in a middle‑class white family in the Midwest, where community service and a strong work ethic were emphasized. After moving to Arizona in her early forties, she embraced the Southwestern
    culture—its vibrant arts scene, appreciation for the desert’s natural beauty, and diverse community traditions. The loss of her husband five years ago deepened her involvement in supportive networks
    and reinforced her commitment to fostering harmony and resilience. Her upbringing instilled a respect for collaborative decision‑making and a dedication to nurturing the next generation, values that
    continue to guide both her professional and personal life.
