persona_description: A researcher at Washington State University who specializes in 3D printing and has expertise in the fabrication of materials from lunar or Martian surface matter. He has worked with
  NASA to explore the possibility of 3D printing using simulated moon rock and has successfully printed simple shapes using the material. His research interests include the development of stronger building
  materials and the minimization of the weight and expense of transporting raw materials from Earth.
