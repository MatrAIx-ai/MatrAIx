    club'', ''Yoga'', ''Evening walks'', ''Journaling'']'
  career_goals: Jacquelyn aims to transition into a senior leadership role that allows her to shape regional social service strategies across Susquehanna County. She is working toward becoming the Director
    of Community Services, where she can expand inter‑agency collaborations, secure long‑term grant funding, and implement evidence‑based programs that address mental health and senior services in rural
    areas. Additionally, she hopes to mentor emerging social‑service professionals, institutionalize a structured mentorship program within her department, and champion policies that strengthen community
    resilience while balancing her desire for a manageable workload to mitigate stress.
