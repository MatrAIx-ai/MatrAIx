  hobbies: '[''traditional Cuban cooking'', ''experimenting with new recipes'', ''yoga'', ''mindfulness meditation'', ''walking in Buffalo parks and waterfront'', ''small group socializing with Cuban community'',
    ''salsa dancing'', ''volunteering at local church events'', ''reading historical fiction'', ''DIY home improvement projects'']'
  career_goals: Valentina aims to move from a material mover to a supervisory role within the next two to three years. She plans to pursue an associate degree in supply chain management and obtain a Certified
    Logistics Associate credential. In the medium term, she aspires to become a shift supervisor or logistics coordinator, overseeing a small team, implementing efficiency initiatives, and contributing
    to safety culture. Ultimately, she hopes to develop enough expertise to transition into a senior logistics planner role, where she can blend her practical warehouse experience with strategic planning,
    while ensuring a stable work schedule that reduces physical strain and supports her family.
