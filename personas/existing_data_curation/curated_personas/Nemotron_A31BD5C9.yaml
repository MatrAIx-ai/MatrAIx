  hobbies: '[''Watercolor painting'', ''Hiking'', ''Bird‑watching'', ''Reading biographies and philosophy'', ''Attending small art exhibitions'', ''Restoring vintage radios'', ''Collecting antique farm
    tools'']'
  career_goals: Although retired from formal employment, Almir aims to leave a lasting cultural imprint on his hometown. He plans to author a illustrated book on Sauk County’s local history and folk art,
    curate a traveling exhibit of his own watercolor paintings at the North Freedom library, and win the regional senior woodworking competition. Additionally, he hopes to mentor a small group of high‑school
    students interested in DIY crafts and preserve oral histories by recording interviews with longtime residents.
