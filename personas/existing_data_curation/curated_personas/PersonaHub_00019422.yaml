persona_description: A researcher at Tianjin University of Traditional Chinese Medicine who conducted a controlled clinical trial on the effectiveness of acupuncture in reducing fevers in patients with
  the common cold. The researcher quantified the antipyretic actions of acupoint Dazhui (GV14) and compared its efficacy with a control group receiving a medication with antipyretic actions. The researcher
  notes that acupuncture at Dazhui (GV14) outperforms the antipyretic drug in reducing fever in patients with the common cold. The researcher concludes that acupuncture at Dazhui has a definite therapeutic
  effect on high fever due to the common cold.
