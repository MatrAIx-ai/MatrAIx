personas:
  professional: An emerging art therapist and community arts coordinator, Sandra Brookshire blends meticulous budgeting, crafting expertise, and empathetic listening to design therapeutic workshops at the
    Deer Park library while navigating their own anxiety through structured creativity, and they continuously refine their program based on participant feedback.
  sports: An outdoor‑oriented fitness enthusiast, Sandra Brookshire tackles weekly hikes in the Selkirk Mountains, captures wildlife photography, participates in a local trail‑running club, cheers for the
    nearby Deer Park Hawks soccer team, uses physical exertion to counterbalance anxious rumination, and they find the rhythm of trail runs calms their mind.
  arts: A devoted arts aficionado, Sandra Brookshire spends evenings watercoloring pastoral scenes inspired by Claude Monet, knits intricate scarves patterned after William Morris’s textile designs, attends
    local workshops featuring ceramicist Maya Lin, curates a rotating gallery of prints from emerging local artists like Jenna Alvarez in their home, and they often drift into late‑night sketching sessions
    fueled by quiet podcasts.
  travel: A thoughtfully curated traveler, Sandra Brookshire has explored the alpine trails of Banff National Park and the historic canals of Amsterdam, prefers planning trips with detailed itineraries
    and budget spreadsheets, dreams of attending a summer art residency in Provence while balancing family commitments, and they keep a travel journal of each adventure to reflect on personal growth.
  culinary: A culinary experimenter, Sandra Brookshire whips up nutrient‑dense family meals featuring quinoa‑crusted salmon with rosemary, roasted beet and goat‑cheese salad, and seasonal garden harvests
    like heirloom tomatoes, delights in baking artisan sourdough loaves and perfecting a signature turmeric‑spiced chicken stew, and they love sharing recipes with friends via Instagram stories.
  core: A curiosity‑driven, organized homemaker turned budding art therapist, Sandra Brookshire balances meticulous budgeting and community craft projects with bouts of anxiety, channeling creative impulses
    into therapeutic workshops and handcrafted goods, and they constantly seek ways to harmonize self‑care with service.
background:
  cultural: Sandra identifies as a white, third‑generation Pacific Northwest resident whose family lineage includes German and Scandinavian ancestors who settled in eastern Washington in the early 1900s.
    Growing up in Deer Park, she was immersed in a close‑knit rural community that values self‑reliance, cooperation, and a deep connection to the surrounding forests and rivers. She regularly participates
    in local traditions such as the Pend Oreille County Fair, church potlucks, and volunteer projects that honor the heritage of the Kalispel tribal peoples. Her upbringing blends a respect for regional
    natural beauty with an appreciation for both traditional crafts and contemporary art.
