  hobbies: '[''Painting'',''Reading fiction and non‑fiction'',''Hiking and nature photography'',''Cooking experimental recipes'',''Gardening'',''Knitting and crocheting'',''Attending local art workshops'',''Journaling'',''Listening
    to mental‑health podcasts'']'
  career_goals: Sandra hopes to transition from full‑time homemaking to a part‑time role that blends her love of art with community service. She plans to complete a GED and enroll in a community‑college
    course on art therapy, aiming to use her personal experience with anxiety to help others. In the near term, she wants to launch an online boutique selling her handcrafted home‑decor items and to organize
    weekly art‑craft workshops at the Deer Park library. Long‑term, she envisions a flexible career that allows her to contribute creatively while maintaining a balanced family life and financial independence.
