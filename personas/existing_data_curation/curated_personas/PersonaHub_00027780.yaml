persona_description: 'A French native speaker with extensive teaching experience, who is passionate about the development of communicative and authentic French contexts for students preparing for DELF and
  DALF certification. The course is designed to teach students to interact in progressively more complex communicative contexts, emphasizing language learning alongside the cultures of French-speaking countries.
  The course is based on the TaSk approach, incorporating modern communication techniques like e-mail and text messages. The course is designed to teach students the 4 language skills: listening, speaking,
  reading, and writing, according to CEFR criteria. The course is based on research and state-of-the-art tools for teaching French.'
