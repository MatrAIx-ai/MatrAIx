personas:
  professional: Jose Colon, a veteran Class A commercial driver with over twenty years of long‑haul and regional trucking experience, combines meticulous route‑optimization, strict DOT compliance, and bilingual
    customer service to serve as a dependable bridge between warehouses and clients, while actively pursuing certifications and an associate degree to step into a supervisory route‑manager role.
  sports: Jose Colon follows the Chicago Fire in MLS and passionately supports the Guatemalan national soccer team, watches weekend matches with friends at the local Hispanic cultural center, participates
    occasionally in a community rec soccer league, and treats fishing on Lake Michigan as a relaxing sport that balances his screen‑time.
  arts: Jose Colon enjoys classic rock legends like The Rolling Stones and Latin pop icons such as Carlos Santana, spends evenings listening to vinyl records while cooking, attends cultural performances
    at the Hispanic cultural center, and reads historical non‑fiction about Central America to stay connected to his roots.
  travel: Jose Colon favors road‑trip itineraries that fit between trucking assignments, has taken family vacations to Mexico City and Antigua, dreams of exploring the Pacific coast of Chile and the historic
    streets of Granada, but typically chooses nearby lake‑side cabins for weekend getaways due to budget and time constraints.
  culinary: Jose Colon masters traditional dishes like pepian, tamales, and atol de elote, experimenting with family recipes that feature roasted chiles, corn masa, and panela, and cultivates his own cilantro,
    oregano, and jalapeños on a balcony garden to add fresh flavor to his cooking.
  core: Jose Colon blends a structured, safety‑first trucking career with a vibrant love for cooking, soccer, and community gatherings, while occasionally letting work fatigue delay health routines and
    indulging in late‑night fishing trips.
background:
  cultural: Jose grew up in a Guatemalan immigrant household in Chicago, where Spanish is spoken at home and Guatemalan traditions are celebrated. He maintains strong ties to the Guatemalan diaspora, attending
    local festivals, celebrating holidays such as Día de los Muertos and Semana Santa, and sharing traditional foods with friends and neighbors. His cultural identity influences his values of hard work,
    family solidarity, and communal responsibility. While fully integrated into Chicago’s multicultural fabric, he continues to preserve Guatemalan customs through language, cuisine, and participation in
    community organizations that support recent immigrants and promote cultural heritage.
attributes:
  skills: '[''Class A CDL operation'', ''Route planning and optimization'', ''DOT compliance and safety regulations'', ''Cargo handling and load securement'', ''Dispatch software (e.g., McLeod, KeepTruckin)'',
