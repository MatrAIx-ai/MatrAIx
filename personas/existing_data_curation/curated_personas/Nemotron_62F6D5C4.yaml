  career_goals: Although retired, Maria Karina aims to stay active and contribute to her community. She plans to volunteer at the local senior center by teaching Spanish cooking classes and offering basic
    financial‑literacy workshops for younger residents. She also hopes to mentor grandchildren and neighborhood teens, sharing her practical knowledge of budgeting, organization, and cultural traditions.
    A long‑term personal ambition is to compile her life story and family recipes into a memoir that celebrates her Puerto Rican heritage for future generations. Maintaining her health through regular walking
    and gardening, she aspires to lead by example, demonstrating that structure and flexibility can coexist at any age.
