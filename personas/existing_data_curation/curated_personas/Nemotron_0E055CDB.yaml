  career_goals: Although Michael is only five, his imagination already leans toward careers that blend creativity, practicality, and helping others. He often talks about wanting to become an engineer or
    architect who designs sturdy, useful structures, inspired by his love of building with blocks. He also expresses excitement about space and has dreamed of being an astronaut who explores the stars while
    conducting experiments. Michael sets high standards for himself even in play, practicing perseverance, and he hopes to one day mentor younger children, sharing his organized approach and kindness.
