personas:
  professional: Britian Herberth, a seasoned HR leader with three decades of expertise in employee relations, talent acquisition, and wellness program design, blends their curiosity for the arts with a
    relaxed, flexible management style to craft culturally enriched workplace initiatives and empathetic leadership coaching.
  sports: Britian Herberth, a devoted supporter of the Minnesota Twins, Vikings, and Timberwolves, enjoys low‑impact fitness through weekly hikes at Lake Rebecca Park, occasional community pickleball matches,
    and seasonal bird‑watching walks along the Minnesota River, favoring gentle exercise over intense competition while sometimes skipping sessions when stress overwhelms them.
  arts: Britian Herberth immerses themselves in the Minneapolis arts scene, regularly attending exhibitions at the Walker Art Center featuring Anish Kapoor, painting watercolors inspired by Georgia O'Keeffe's
    desert palette, volunteering at community theater productions of classic plays, and capturing candid moments of the Minnesota River's sunrise with a vintage Nikon, while finding occasional solace in
    listening to Prince's funk‑infused catalog.
  travel: Britian Herberth favors spontaneous, modest‑budget getaways, often taking flexible weekend road trips to Minnesota's North Shore for kayaking while also dreaming of a curated cultural tour of
    New Orleans' jazz districts and a photogenic summer escape to Iceland's waterfalls, balancing the desire for adventure with a carefully managed retirement budget and ensuring they have enough time for
    their artistic pursuits.
  culinary: Britian Herberth, an enthusiastic home cook with intermediate skill, delights in preparing herb‑infused grilled salmon with fresh dill, hearty wild‑rice and mushroom casserole, and occasionally
    experimenting with Ethiopian injera paired with berbere‑spiced lentils, while also savoring seasonal Minnesota berries topped with lavender honey, though they sometimes indulge in decadent apple‑cinnamon
    pie after a theater night.
  core: Britian Herberth, a 58‑year‑old HR veteran whose curiosity for art and gentle soul collides with a lovable habit of disorganized flexibility, drives a compassionate, stress‑aware approach to work,
    finance, health, and life, and they constantly seek balance through creative expression.
background:
  cultural: Britian grew up in a middle‑class, Midwestern family with deep roots in Minnesota's German‑Scandinavian heritage. The region’s strong community values, Lutheran church involvement, and appreciation
    for local arts have shaped her outlook. Living in Eden Prairie, she embraces the area’s blend of suburban tranquility and cultural vibrancy, often participating in community festivals, supporting local
    museums, and contributing to charitable initiatives. Her cultural background emphasizes modesty, cooperation, and a commitment to fostering inclusive, supportive environments both at work and in her
    community.
