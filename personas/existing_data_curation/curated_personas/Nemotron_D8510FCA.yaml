  career_goals: Britian aims to leave a lasting legacy of compassionate, culturally enriched workplaces. Over the next five years she plans to earn the SPHR certification, spearhead a company‑wide arts‑in‑the‑workplace
    initiative, mentor emerging HR talent, and develop a handbook on stress‑aware leadership. She also hopes to transition to a part‑time consulting role focused on employee well‑being and flexible work
    arrangements, allowing more time for personal pursuits while ensuring financial stability after her husband's passing.
