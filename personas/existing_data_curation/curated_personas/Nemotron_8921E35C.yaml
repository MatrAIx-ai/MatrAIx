  career_goals: Now approaching retirement, David aims to codify his investigative methodology into a handbook for new private detectives, ensuring his systematic approach endures. He wishes to mentor two
    younger investigators through a formal apprenticeship within his agency, fostering a culture of reliability and precision. He also seeks to collaborate with the Sweetwater County Sheriff’s Office on
    cold‑case reviews, leveraging his deep local knowledge to bring resolution to unsolved crimes. Ultimately, David hopes to leave a legacy of community‑focused investigative service and perhaps author
    a memoir that highlights the evolution of private investigation in the American West.
