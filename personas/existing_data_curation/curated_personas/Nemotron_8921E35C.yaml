personas:
  professional: David Wallace, a seasoned private investigator with 45 years of experience in systematic surveillance, evidence collection, and forensic photography, now channels his methodical mindset
    into authoring a handbook, mentoring apprentices, and collaborating on cold‑case reviews while maintaining meticulous precision in every report.
  sports: David Wallace stays active through seasonal fishing excursions on the Green River, participates in the Rock Springs Senior Center Chess Club and the local senior bowling league, follows the Denver
    Broncos and the University of Wyoming Cowgirls basketball team, and joins the Wyoming Paddlers Fishing Club for organized outings each spring.
  arts: David Wallace’s artistic life is anchored by rereading Raymond Chandler and Agatha Christie to dissect narrative structure, capturing high‑plain vistas inspired by Ansel Adams through landscape
    photography, listening to Frank Sinatra and Johnny Cash while woodworking, and attending community theater productions of classic plays whenever his schedule permits.
  travel: David Wallace plans his travels with a detailed itinerary, favoring road trips that combine scenic photography and historical stops, having visited Yellowstone, Grand Teton, Santa Fe, and a detective‑writers
    festival in London, while dreaming of a future drive along the Pacific Coast Highway and a pilgrimage to the Scottish Highlands, all balanced against his fixed retirement budget.
  culinary: David Wallace enjoys cooking pan‑seared trout with lemon butter, bison chili seasoned with rosemary and garlic, and homemade apple crumble topped with Wyoming honey, possessing an intermediate
    skill level that lets him craft functional wooden kitchen tools, though he admits to over‑salting dishes when he’s focused on perfecting a measurement.
  core: David Wallace blends a detective’s meticulous mind with a retiree’s love of quiet craftsmanship, fishing, and classic cars, while occasionally over‑organizing his schedule and hoarding vintage parts.
background:
  cultural: David was born and raised in the high‑plain communities of southwestern Wyoming, a region shaped by mining, ranching, and frontier resilience. He grew up in a predominantly white, modest‑middle‑class
    family that emphasized self‑reliance, hard work, and community solidarity. The cultural values of the American West—pragmatism, respect for the land, and a straightforward, no‑nonsense communication
    style—inform his approach to both work and personal life. His long‑standing marriage and deep ties to Rock Springs embed him in a close‑knit network of longtime residents, fostering a sense of duty
    to protect and serve his neighbors.
