persona_description: A chemist who specializes in the field of polymer chemistry, particularly the study of mechanophores and their effects on chemical reactions. His research interests include the use
  of mechanical force to steer chemical reactions along specific pathways, and the application of ultrasound to create cavitation in a solution to enhance localized heating and mixing. He has demonstrated
  that mechanical force can be used to bias the direction and speed of chemical reactions, and has shown that certain types of molecules are likely to be mechanophores.
