  hobbies: '[''Visiting art galleries and murals'', ''Playing soccer in community league'', ''Participating in poker nights and trivia competitions'', ''Exploring Mexican cuisine and cooking'', ''Traveling
    to Mexico for family and festivals'', ''Photography of urban and cultural scenes'', ''Playing guitar at gatherings'', ''Mindful breathing exercises'', ''Spontaneous road trips to natural parks'']'
  career_goals: Camilo aims to transition into a senior security leadership role, targeting a Chief Information Security Officer (CISO) position within a mid-size enterprise. Over the next five years, he
    plans to earn CISSP and CISM certifications, spearhead a company-wide security transformation that aligns with business objectives, and establish a mentorship program for junior analysts. He is motivated
    to become a recognized thought leader through speaking at industry conferences and publishing articles on innovative security strategies, while also seeking a healthier work‑life balance to mitigate
    stress.
