personas:
  professional: Stephanie Barnes is a meticulous tax preparer who leverages her mastery of TurboTax, TaxAct, and IntelliTax alongside advanced Excel modeling to untangle complex federal and Tennessee tax
    scenarios, all while applying the same creative problem‑solving she uses in her watercolor sketches to deliver calm, detail‑driven service during the frenetic filing season.
  sports: Stephanie Barnes enjoys solitary cardio, logging weekly hikes with the Bristol Hiking Club through the Appalachian foothills and joining the Tennessee Titans fan club for Sunday game rituals,
    but she avoids team sports, preferring the personal challenge of weekend 5‑k runs while listening to podcasts on economics.
  arts: Stephanie Barnes spends weekends sketching impressionistic watercolors inspired by Monet and O’Keeffe, frequents the local Bristol Art Museum to view contemporary installations, cites musician Nick
    Drake and playwright August Wilson as creative influences, and volunteers as a backstage assistant for the community‑theater troupe at the Braddock Center whenever the schedule aligns.
  travel: Stephanie Barnes prefers low‑key, art‑focused getaways, having explored Asheville’s River Arts District and taken a weekend road trip to the historic streets of Savannah, while dreaming of a spring
    pilgrimage to Florence’s Uffizi and the cherry‑blossom festivals of Kyoto, always planning itineraries in a hand‑drawn map but leaving room for spontaneous sketch‑stops.
  culinary: Stephanie Barnes enjoys cooking hearty southern dishes like chicken and dumplings and experimenting with Mediterranean flavors such as lemon‑ricotta pasta, boasting a modest knack for sautéing
    fresh basil and garlic, but they often over‑season their soups with oregano, and they favor farm‑to‑table bistros where the menu features heirloom tomatoes and locally sourced trout.
  core: Stephanie Barnes combines a competitive, solitary drive with an artistic soul, turning tax codes into puzzles, watercolor sketches into business plans, and occasional coffee‑fueled all‑night work
    sessions into disciplined yet quirky habits.
background:
  cultural: Raised in Bristol, Tennessee, Stephanie grew up in a middle‑class, predominantly white community with deep Appalachian roots. Her family background includes English and Scotch‑Irish ancestry,
    and she was exposed early to the region’s folk music, storytelling traditions, and the legacy of the "Birthplace of Country Music". While attending a local Methodist church, she absorbed values of self‑reliance,
    modesty, and community service. At the same time, her curiosity led her to seek out diverse artistic experiences, from gallery openings to independent film screenings. This blend of traditional Southern
    hospitality and an open‑minded appreciation for new ideas shapes her worldview, fostering both a respect for local heritage and an eagerness to explore unconventional perspectives.
