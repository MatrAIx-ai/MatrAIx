  career_goals: Stephanie aims to build a reputation as a trusted tax professional in the Bristol area, eventually earning her Enrolled Agent designation and enrolling in a bachelor's program in accounting
    to qualify for the CPA exam. Her long‑term ambition is to launch her own boutique tax consultancy that specializes in serving artists, freelancers, and small‑scale entrepreneurs, combining her tax expertise
    with her passion for the arts. She also hopes to become a mentor for younger community members interested in finance, leveraging her competitive drive to raise the professional standard locally.
