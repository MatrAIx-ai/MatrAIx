  hobbies: '["Hiking and nature exploration", "Bird-watching", "Fishing", "Reading nonfiction (business, technology, natural history)", "Journaling", "Woodworking", "Building mechanical model kits", "Playing
    acoustic guitar", "Online learning (process optimization, sustainability)", "Podcast listening"]'
  career_goals: Eugene aims to advance from his current general/operations manager role to a senior operations manager within a mid‑size manufacturing or agricultural business in the Upper Midwest. He plans
    to deepen his expertise in supply chain management, lean process improvement, and digital automation through certifications such as Six Sigma Green Belt and a community college's associate degree in
    Business Management. Over the next five years, he hopes to lead larger teams, oversee multi‑site operations, and eventually launch his own boutique production venture that emphasizes sustainability
    and locally sourced materials. While he values career progression, he also seeks to maintain a work‑life balance that preserves his need for solitude and quiet.
