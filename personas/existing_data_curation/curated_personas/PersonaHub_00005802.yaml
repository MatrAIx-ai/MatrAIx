persona_description: A software engineer who is interested in validating and verifying the accuracy of a linear-elastic wave propagation model for spherically symmetric problems. The persona is particularly
  interested in the code's ability to accurately model the twisting motion of a linear elastic annulus subjected to a slowly varying twisting angle. The persona seeks to ensure that the model is physically
  applicable and physically appropriate, and that the code produces reasonable approximations of reality.
