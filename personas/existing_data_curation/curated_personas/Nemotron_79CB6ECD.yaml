  career_goals: Kevin aims to transition from teaching assistant to a senior lecturer or faculty position where he can shape interdisciplinary curricula that integrate STEM and the arts. He aspires to lead
    a departmental initiative on experiential learning, publish research on innovative teaching methods, and expand community outreach programs that bring science and creativity to local schools. Over the
    next five years, he also seeks to earn a tenure-track appointment, mentor early‑career educators, and contribute to policy development that supports inclusive and holistic education.
