personas:
  professional: Kevin Hendon, a seasoned teaching assistant in environmental science, they leverage advanced data analysis in Python and MATLAB, meticulous lab design, and a calm, collaborative demeanor
    to mentor diverse undergraduates while integrating artistic perspectives into STEM curricula.
  sports: Kevin Hendon enjoys weekend hikes with the Willamette Valley Hiking Club, they follow the Portland Trail Blazers and Oregon State Beavers with avid enthusiasm, play casual pick‑up basketball at
    a community center during spring, and practice yoga at a local studio to balance flexibility with the occasional snowshoe trek in the Cascades during winter.
  arts: Kevin Hendon spends evenings painting Pacific Northwest landscapes inspired by Albert Bierstadt, they capture analog photographs reminiscent of Ansel Adams, and strum acoustic renditions of Joni
    Mitchell and local folk musician Greg Brown at open‑mic nights, while curating a personal collection of vintage vinyl and attending regional art fairs.
  travel: Kevin Hendon prefers meticulously planned road trips through Oregon’s coastal routes and the Cascade foothills, they also eagerly book spontaneous week‑long hikes in Banff and wine‑tasting tours
    in Tuscany, balancing a modest travel budget with a yearning for cultural immersion.
  culinary: Kevin Hendon, an adept home cook, they favor grilling wild salmon seasoned with fresh dill and lemon, preparing Oregon hazelnut‑crusted mushroom risotto, and savoring a well‑crafted Pinot Noir
    alongside artisanal cheese plates, while occasionally indulging in spontaneous ramen outings for a taste of umami.
  core: Kevin Hendon is a calm, curiosity‑driven educator who blends scientific rigor with artistic flair, hikes mountains, sips Pinot, and gently nudges the world toward integrative learning while they
    occasionally forget to water houseplants.
background:
  cultural: Kevin is a white American whose upbringing in the Pacific Northwest instilled a deep appreciation for nature, community, and progressive values. Growing up in a small town near the Willamette
    Valley, he absorbed a blend of rural self‑reliance and the region’s encouragement of artistic expression and environmental stewardship. His family background includes generational ties to agriculture
    and public education, shaping his collaborative spirit and commitment to lifelong learning. The cultural milieu of Oregon—marked by support for the arts, sustainability, and inclusive education—continues
    to influence his worldview and career aspirations.
