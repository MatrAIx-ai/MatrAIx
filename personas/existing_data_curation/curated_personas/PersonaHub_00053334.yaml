persona_description: A web developer who is passionate about creating accessible and responsive websites, particularly for disabled users and for environments where users cannot install or upgrade software.
  This person values the importance of basic content, basic functionality, and semantic markup in creating accessible web pages. They are familiar with the basic rules of progressive enhancement and are
  willing to invest time and effort to ensure that their website is accessible to all users, including those with disabilities. This person is likely to be working on projects that require creating responsive
  and accessible websites for a wide range of users and environments.
