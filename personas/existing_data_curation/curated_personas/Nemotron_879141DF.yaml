    "Solving puzzles"]'
  career_goals: Mercedez imagines a future where she can blend her love of animals, her desire to help others, and her competitive spirit. She dreams of becoming a veterinarian because she enjoys caring
    for neighborhood pets and wants a clear, step‑by‑step path of schooling to reach that goal. She also thinks about being a teacher someday, motivated by the structured environment of a classroom and
    the chance to guide younger children. Additionally, she entertains the idea of playing soccer at a high level, seeing competition as a way to test herself and bring pride to her community.
