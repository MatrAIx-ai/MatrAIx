  career_goals: Yu Cong Le aims to re‑enter the workforce within the next year, targeting positions that leverage his bilingual abilities, organizational talent, and community‑engagement experience, such
    as a community outreach coordinator or small‑scale event planner. He also aspires to eventually open a modest family‑run eatery that blends traditional Chinese dishes with the local seafood cuisine
    of Atlantic Beach, providing a stable income and preserving cultural heritage. Parallel to his professional ambitions, he seeks to establish a structured routine for stress management—including regular
    mindfulness practice and journaling—to maintain emotional well‑being and reduce his tendency toward worry.
