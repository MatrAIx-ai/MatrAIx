  hobbies: '[''Reading mystery and science‑fiction books'', ''Building LEGO models'', ''Coding simple games in Scratch'', ''Playing chess'', ''Swimming'', ''Nature hikes with a small group of friends'']'
  career_goals: In the short term, April aims to earn top grades in math and science, win her school's coding competition, and qualify for the regional chess tournament. Looking ahead, she aspires to become
    a civil engineer or software developer—fields that combine her love for structure, logical problem‑solving, and creating reliable systems. She envisions designing sustainable infrastructure or writing
    clean, well‑organized code that makes everyday life more predictable and efficient.
