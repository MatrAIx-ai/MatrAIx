personas:
  professional: A budding young technologist named April Gouveia channels their love for structure into building intricate LEGO bridges, coding Scratch animations, and mastering chess tactics, all while
    keeping meticulous notes that hint at future aspirations in engineering and problem‑solving.
  sports: An enthusiastic swimmer named April Gouveia belongs to the Brookside Junior Swim Club, attends structured practices three times weekly, competes in local meets, and supports the Springfield Sluggers
    baseball team, while also joining family nature hikes that satisfy their curiosity about wildlife.
  arts: A creative reader‑engineer named April Gouveia immerses themselves in mystery novels by Arthur Conan Doyle, sci‑fi classics by Isaac Asimov, and scores from Hans Zimmer, while sketching LEGO designs
    and humming along to Billie Eilish's 'bad guy' during building sessions.
  travel: An organized traveler named April Gouveia plans trips with a detailed checklist, has explored the Grand Canyon on a school field trip, enjoys family weekends at Disney World, and dreams of visiting
    the cherry blossoms in Kyoto and the LEGOLAND park in Billund, all within the limits of parental approvals and a modest travel allowance.
  culinary: A pragmatic kitchen assistant named April Gouveia loves assembling pepperoni pizza with mozzarella, cooking spaghetti Bolognese with ground beef, and blending banana‑strawberry smoothies, while
    confidently following step‑by‑step recipes but occasionally sneaking a handful of gummy bears as a secret treat.
  core: April Gouveia, a methodical ten‑year‑old, masters LEGO bridges, Scratch coding, and chess moves while rigorously tracking every allowance cent, allergy flare, and hobby milestone.
background:
  cultural: April was raised in Naperville, a suburban city in DuPage County, Illinois, within a family that identifies as white with Portuguese heritage. Her household blends typical Midwestern American
    values—punctuality, community involvement, and self‑reliance—with occasional Portuguese traditions, such as celebrating São João with family meals and hearing Portuguese phrases from grandparents. She
    attends a public elementary school and participates in local community events, reflecting a mix of mainstream American culture and her family's cultural roots.
attributes:
  skills: '[''Organizational planning for school projects'', ''Basic coding in Scratch'', ''Strategic board game play (chess, Settlers of Catan Junior)'', ''Fluent reading and structured writing'', ''Multi‑step
