  hobbies: '[''Bollywood dancing'', ''Zumba fitness classes'', ''Cooking Punjabi cuisine'', ''Community volunteering'', ''Spontaneous road trips'', ''Watching Indian films'', ''Reading self‑help books'']'
  career_goals: Pooja aspires to advance from a frontline driver to a supervisory position within her logistics company, aiming to become a fleet manager who mentors new drivers and oversees route efficiency.
    She plans to obtain a CDL with hazardous‑material endorsement and pursue a certification in supply‑chain management to broaden her expertise. In the longer term, Pooja dreams of launching her own small
    transport business that combines her love for driving with community‑focused services, such as delivering locally sourced groceries to neighborhoods. She also wants to develop her sales skills further
    to transition into a hybrid role that merges logistics leadership with client relationship management, providing a stable income while maintaining the flexible schedule she values for family life.
