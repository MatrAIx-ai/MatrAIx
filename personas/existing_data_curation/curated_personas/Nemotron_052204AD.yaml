personas:
  professional: Pooja Kadam is a multilingual logistics driver who expertly navigates Houston’s traffic in both light vans and heavy trucks, blending hands‑on vehicle maintenance with on‑the‑road sales,
    and they leverage curiosity and people‑skills to chase a fleet‑manager role despite a habit of leaving paperwork for the last minute.
  sports: Pooja Kadam roots for the Houston Astros and Dynamo, regularly joins community Zumba classes and weekend pick‑up soccer games at the local park, and they occasionally play in a women’s recreational
    softball league, though a spontaneous road trip can cause them to skip a scheduled gym session.
  arts: Pooja Kadam channels creativity through a weekly Bollywood dance class, rehearsing to A.R. Rahman’s scores and Diljit Dosanjh’s beats, and they unwind by streaming classic films starring Shah Rukh
    Khan and Priyanka Chopra, while occasionally attending downtown theater productions for a taste of Houston’s eclectic arts scene.
  travel: Pooja Kadam favors spontaneous road trips, often loading the family van for weekend escapes to the Texas Hill Country, Galveston’s Gulf shores, or Austin’s music‑filled streets, keeping a loose
    itinerary on a shared spreadsheet and they dream of a future cross‑country adventure to the Pacific Northwest.
  culinary: Pooja Kadam delights in cooking butter chicken, sarson da saag with makki di roti, and experimenting with homemade naan, often pairing these with Texas‑style smoked brisket or fresh guacamole‑topped
    tacos at weekend potlucks, proudly claiming a ‘master’ level in spice blending while they occasionally forget to defrost the chicken until the last minute.
  core: Pooja Kadam is a sociable, flexible logistics driver who balances a love for community celebrations and road‑trip spontaneity with an ambition to lead a fleet, all while navigating occasional disorganization,
    and they treat themselves to flavorful feasts.
background:
  cultural: Pooja is a second‑generation South Asian American whose family originates from Punjab, India. Raised in a bilingual household, she grew up speaking Punjabi and Hindi at home while navigating
    English‑dominant schools and community life in Houston. Her cultural identity blends traditional Sikh values—such as seva (selfless service), strong family ties, and hospitality—with the diverse, multicultural
    environment of Texas. She regularly celebrates festivals like Vaisakhi, Diwali, and Lohri, often hosting gatherings that feature music, dance, and communal meals. Pooja participates in her local Gurdwara’s
    community events, which reinforce her sense of belonging and encourage her volunteer spirit. At the same time, she embraces Texan customs, enjoying BBQ outings, attending local sports events, and exploring
    the city’s vibrant food scene. This hybrid cultural background informs her warm, inclusive demeanor, her love for community gatherings, and her practical approach to balancing family expectations with
    personal ambitions.
