  hobbies: '[''Art gallery visits'', ''Painting'', ''Quilting'', ''Gardening'', ''Cooking'', ''Reading historical fiction'', ''Genealogy research'', ''Gospel choir participation'', ''Volunteering'', ''Attending
    live music festivals'']'
  career_goals: Lesly aims to deepen her impact in Lockhart by taking on a leadership role at the local senior center, coordinating arts-and-crafts workshops and intergenerational activities that blend
    gardening, cooking, and storytelling. She hopes to launch a community garden that provides fresh produce for low-income families while offering a therapeutic space for seniors. Additionally, she aspires
    to share her culinary knowledge through informal cooking classes focused on African-American and Southern dishes, and to mentor teenage girls interested in community service and the arts. While she
    values flexibility, she seeks to create sustainable programs that foster harmony and cultural pride within her neighborhood.
