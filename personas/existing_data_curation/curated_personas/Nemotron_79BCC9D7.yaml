personas:
  professional: Briana Munera, a seasoned interior‑finishing specialist, blends meticulous surface preparation, precision paper‑hanging, and eco‑friendly paint expertise with her sociable, curiosity‑driven
    nature to deliver on‑time renovations that delight clients while fostering mentorship for apprentices.
  sports: Briana Munera stays active through salsa dance sessions, weekend hikes with the Fort Wayne Outdoor Enthusiasts, and cheering on the Indiana Pacers, Indianapolis Colts, and local minor‑league baseball
    team the Fort Wayne TinCaps, blending energetic group workouts with moderate cardio to maintain her stamina for both work and community projects.
  arts: Briana Munera channels her creative energy into vibrant community murals, lively salsa dancing to the rhythms of Marc Anthony, and devouring Agatha Christie mystery novels, while also admiring the
    bold colors of Gustav Klimt’s paintings, which together inform her eye for design in interior finishing.
  travel: Briana Munera prefers thoughtfully planned weekend getaways to nearby hiking gems like Hocking Hills State Park and spontaneous cultural escapes to vibrant cities such as Seville, Spain, and Buenos
    Aires, Argentina, where she can immerse herself in dance festivals and local cuisine while balancing her modest budget and family responsibilities.
  culinary: Briana Munera, an intermediate‑to‑advanced home cook, delights friends with flavorful dishes like chilaquiles, tamales, pozole, and fresh guacamole seasoned with home‑grown cilantro and oregano,
    constantly experimenting with sustainable ingredients while occasionally over‑spicing to the point of needing a glass of water.
  core: Briana Munera blends an outgoing, hands‑on craftsmanship with eco‑conscious curiosity, often juggling paint swatches and salsa steps, yet has a habit of forgetting to water her indoor succulents.
background:
  cultural: Briana grew up in a bicultural Mexican‑American household, speaking both Spanish and English, and cherishing traditions such as Día de los Muertos, quinceañeras, and family gatherings centered
    around home‑cooked meals. Her Mexican heritage informs her vibrant aesthetic sensibility, love for bold colors, and communal spirit. Living in Fort Wayne, she has blended these cultural influences with
    Midwestern values of hard work and neighborliness, often participating in local Hispanic community events and sharing her culinary and artistic talents with a diverse audience.
attributes:
  skills: '[''surface preparation'', ''paper hanging'', ''paint application'', ''color consultation'', ''eco-friendly coating knowledge'', ''safety compliance'', ''project scheduling'', ''customer communication'',
