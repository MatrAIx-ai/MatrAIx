  hobbies: '[''salsa dancing'', ''cooking Mexican cuisine'', ''community mural volunteering'', ''hiking'', ''attending cultural festivals'', ''DIY home improvement'', ''reading mystery novels'', ''gardening'']'
  career_goals: Briana aims to become a certified painting contractor and eventually launch her own interior‑finishing business in Fort Wayne. She plans to obtain the Painting Contractors Association certification,
    expand her services to include specialty mural work and sustainable paint solutions, and mentor apprentices from the local community. Long‑term, she hopes to be recognized as a trusted small‑business
    owner who blends craftsmanship with environmentally conscious practices.
