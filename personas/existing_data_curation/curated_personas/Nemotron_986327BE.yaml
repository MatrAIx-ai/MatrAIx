personas:
  professional: Paula Brooks, a meticulous former cashier with a STEM degree, leverages their precision in cash handling and Excel data analysis to pursue a data analyst assistant role in Dayton's manufacturing
    sector, where their love of routine and methodical problem‑solving shines.
  sports: Paula Brooks stays active by walking the Little Miami Scenic Trail several times a week, charts their steps in a fitness log, supports the Dayton Dragons baseball team and the Ohio State Buckeyes
    football team, and participates in a local walking club that meets each Saturday morning.
  arts: Paula Brooks indulges in creative outlets like knitting patterns inspired by classic quilts, enjoys classic movie nights featuring Alfred Hitchcock and Francis Ford Coppola, and listens to 80s pop
    icons such as Madonna and Duran Duran while reading Jane Austen and self‑help titles, allowing art to provide both structure and escape.
  travel: Paula Brooks prefers well‑planned road trips with detailed itineraries, has explored historic sites in Williamsburg, Virginia, and the Amish Country of Lancaster, Pennsylvania, and hopes to visit
    the colonial town of St. Augustine, Florida, for its blend of tradition and quiet charm.
  culinary: Paula Brooks loves farm‑to‑table cooking, using fresh vegetables from their garden to bake precise zucchini‑bread muffins and rosemary‑infused focaccia, follows recipes down to the gram, and
    enjoys savoring classic comfort dishes like chicken pot pie and homemade apple crumble.
  core: Paula Brooks is a detail‑driven, routine‑loving planner who balances meticulous work with comforting hobbies, yet wrestles with anxiety that fuels their quest for orderly control.
background:
  cultural: Paula is a white Midwesterner from Fairborn, Ohio, raised in a middle‑class suburban setting that emphasizes traditional family values, community involvement, and practical sensibilities. The
    region’s proximity to Wright‑Patterson Air Force Base and a strong manufacturing presence has fostered a pragmatic, service‑oriented mindset. She grew up attending church gatherings, local high‑school
    sports events, and county fairs, and she celebrates seasonal traditions such as Halloween, Thanksgiving, and Christmas with extended family. These experiences have ingrained a work ethic rooted in reliability,
    modesty, and collective responsibility, while her university education broadened her perspective yet left her feeling most comfortable within the familiar, routine‑driven culture of the Midwest.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Inventory management'', ''Microsoft Excel (advanced)'', ''Data entry'', ''Basic programming (Python fundamentals)'', ''Analytical problem solving'',
