  hobbies: '[''Gardening'', ''Baking'', ''Knitting'', ''Puzzle solving (crossword, Sudoku)'', ''Reading (classic literature, self-help)'', ''Walking/hiking on familiar trails'', ''Volunteer work at local
    library'', ''Attending community fairs'', ''Classic movie watching'']'
  career_goals: Paula aims to transition from retail to a role that leverages her STEM background while preserving the routine and predictability she values. She plans to enroll in evening courses or obtain
    certifications in data analytics, Lean Six Sigma, or project coordination to qualify for positions such as data analyst assistant, lab technician, or project coordinator within the Dayton‑area manufacturing
    or aerospace sectors. She seeks a career path that offers clear procedures, incremental advancement, and work‑life balance, with the long‑term goal of moving into a supervisory or administrative role
    that blends her operational experience with systematic process improvement.
