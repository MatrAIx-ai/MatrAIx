persona_description: A scientist who specializes in the study of wasp behavior and ecology, particularly focusing on the variation and distribution of Indo-Australian wasps. This person is likely to be
  a zoologist or entomologist who has conducted extensive research on the palaearctic and Indo-Australian wasps, and has published several papers on the variation and distribution of these species. They
  are likely to be familiar with the work of K. Zimmermann and have read the article "On Eumenes Arcuatus (Fabricius) and some Allied Indo-australian wasps (Hymenoptera, Vespidae)" by J. van der Vecht,
  which discusses the variation and distribution of the Indo-Australian Eumenes arcuatus.
