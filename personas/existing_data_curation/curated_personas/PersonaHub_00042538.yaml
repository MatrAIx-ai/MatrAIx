persona_description: A HSE inspector who is responsible for inspecting and ensuring the compliance of industrial automation and control systems (IACS) with the Cyber Security (CS) standards. This persona
  is likely to be experienced and knowledgeable in the field of industrial automation and control systems, and has a strong understanding of the potential threats and vulnerabilities they may face. They
  are also likely to be familiar with the HSE's interpretation of current standards on industrial communication network and system security, and functional safety in so far as they relate to major hazards
  workplaces. This persona is responsible for conducting trial inspections to test the HSE's operational guidance OG86 'Cyber Security for Industrial Automation and Control Systems (IACS)' and providing
  useful guidance on how compliance might be achieved.
