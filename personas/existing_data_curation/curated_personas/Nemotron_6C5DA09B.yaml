  career_goals: Jon aims to step into a senior data‑science leadership role within Houston’s energy sector, where he can direct the development of predictive analytics platforms for renewable‑energy forecasting.
    Over the next five years, he plans to deepen his expertise in advanced machine‑learning techniques, earn a part‑time PhD in applied mathematics, and obtain the Certified Analytics Professional credential.
    He also seeks to publish research on statistical methods for large‑scale time‑series data, mentor junior analysts, and ultimately become a chief data officer who shapes data‑driven strategy while operating
    in a structured, results‑oriented environment that aligns with his competitive drive.
