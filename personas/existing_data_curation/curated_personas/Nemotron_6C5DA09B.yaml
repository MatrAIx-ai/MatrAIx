personas:
  professional: Jon Martinez is a senior‑level data scientist specializing in predictive analytics for the energy sector, leveraging Python, R, and MATLAB to build reproducible machine‑learning pipelines
    while channeling their methodical, competitive nature into meticulous documentation and data‑driven decision making.
  sports: Jon Martinez trains three times a week in Brazilian Jiu‑Jitsu at the Houston BJJ Academy, hits the weight room for strength cycles, hikes the Memorial Park trails on weekends, and follows the
    Houston Rockets and Houston Dynamo, viewing sport as a disciplined outlet for stress relief.
  arts: Jon Martinez enjoys immersing themselves in strategic video games like Civilization VI, reads non‑fiction works by Daniel Kahneman and Malcolm Gladwell, attends the Houston Museum of Fine Arts for
    contemporary installations, and relaxes to the folk guitar melodies of artists like Vicente Fernández while reflecting on their competitive drive.
  travel: Jon Martinez prefers meticulously planned itineraries, often weekend‑driving to Austin for live music, taking annual road trips to the Colorado Rockies for hiking, and saving for a future cultural
    immersion tour of Barcelona, balancing adventure with a structured budget.
  culinary: Jon Martinez cooks family‑heritage dishes such as mole poblano, tamales, and chiles en nogada using fresh tomatillos, dried chilies, and epazote sourced from local farmers’ markets, demonstrating
    intermediate to advanced skill in balancing authentic flavors with health‑conscious tweaks.
  core: Jon Martinez is a data‑driven strategist who channels competitive precision into both their analytical career and disciplined fitness routine, while battling intense anxiety that fuels both meticulous
    planning and occasional impulsive spending.
background:
  cultural: Jon is a first‑generation Mexican‑American raised in Houston's vibrant Hispanic community. His parents immigrated from Jalisco, and he grew up bilingual, speaking Spanish at home and English
    at school. Family gatherings centered around traditional Mexican cuisine, music, and holidays such as Día de los Muertos and Mexican Independence Day. While he embraces the entrepreneurial spirit and
    diversity of Houston, he maintains strong ties to his heritage through regular visits to Mexico, participation in local cultural festivals, and preserving Mexican culinary traditions in his cooking.
    His cultural identity informs his values of family loyalty, respect for tradition, and a deep appreciation for community celebrations.
