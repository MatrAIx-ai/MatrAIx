persona_description: A plant biologist who specializes in the study of plastids and their roles in photosynthesis and cellular metabolism. Her research interests include the comparative genomics of plastids
  in different plant species, the evolution of plastid genomes, and the functional and regulatory mechanisms of plastid proteins and enzymes. She is also interested in the potential of plastids for biotechnology
  and bioprocessing applications.
