personas:
  professional: David Durrance, a seasoned project manager with a logistics background, leverages their methodical planning and reliable coordination skills to deliver community events and small‑business
    consulting projects on schedule, all while infusing a love for woodworking and group collaboration into practical solutions.
  sports: David Durrance regularly pitches for the Bixby Softball League, casts lines on the Arkansas River for catfish tournaments, cheers on the Oklahoma City Thunder and Dallas Cowboys, and maintains
    a twice‑weekly routine of light weight‑training at the local community center to keep their joints limber.
  arts: David Durrance plays acoustic guitar at church gatherings, enjoys classic country legends like Johnny Cash and modern folk artists such as Brandi Carlile, and supplements their creative side by
    crafting custom wooden furniture inspired by regional barn designs.
  travel: David Durrance favors low‑key road trips to nearby destinations like the Wichita Mountains Wildlife Refuge and the Blue Ridge Parkway, plans itineraries months ahead to secure campgrounds, and
    dreams of a fishing weekend in the Florida Keys to escape the Oklahoma heat.
  culinary: David Durrance prepares weekend barbecues featuring smoked brisket, tangy coleslaw, and cedar‑plank catfish, relies on a well‑stocked spice rack of paprika, brown sugar, and cayenne, and proudly
    boasts a 'just‑right' charcoal grill skill level earned from countless backyard cookouts.
  core: David Durrance is a reliable, structure‑loving community craftsman who juggles consulting, group sports, and guitar sessions while secretly hoarding an ever‑growing collection of vintage hand tools.
background:
  cultural: David was raised in the heartland of Oklahoma, where strong family ties, self‑reliance, and community involvement are core values. His White, Midwestern heritage blends with the Southern Plains
    traditions of the region, including a love for outdoor recreation, country music, and church life. He reflects the modest, pragmatic, and friendly spirit typical of Bixby and the broader Tulsa County
    area.
attributes:
  skills: '[''Project Management'', ''Event Coordination'', ''Volunteer Management'', ''Budgeting and Financial Planning'', ''Basic Carpentry and Home Repair'', ''Mechanical Troubleshooting'', ''Time Management'',
