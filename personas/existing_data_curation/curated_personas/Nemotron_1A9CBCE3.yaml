personas:
  professional: Carol Mitchell is a seasoned residential housekeeping professional who leverages their associate degree in Business Administration to implement systematic, eco‑friendly cleaning protocols—using
    steam cleaners and smart‑home devices—while their organized, reliable nature ensures meticulous scheduling, staff training, and customer service that consistently exceed client expectations.
  sports: Carol Mitchell supports the Atlanta Braves and the Tennessee Titans, participates in their town’s bowling league, and hikes sections of the Appalachian Trail each spring, combining low‑impact
    cardio with the camaraderie of group sport.
  arts: Carol Mitchell channels their love for country music and line dancing by regularly attending festivals featuring Dolly Parton, Kacey Musgraves, and Willie Nelson, and they draw artistic inspiration
    for their quilts from classic Southern films starring Sissy Spacek.
  travel: Carol Mitchell prefers organized, moderate‑budget road trips that blend scenic hiking in the Great Smoky Mountains with culinary stops in Nashville, and they dream of a weekend getaway to Asheville’s
    Blue Ridge Parkway while balancing church commitments and family obligations.
  culinary: Carol Mitchell, a confident home cook, delights family gatherings with buttermilk fried chicken, slow‑cooked collard greens, sweet‑potato pie, and freshly baked cornbread, while their passion
    for sustainable living leads them to incorporate organic herbs, locally sourced okra, and farm‑fresh eggs into every Southern‑style recipe.
  core: Carol Mitchell is a community‑driven organizer with a green heart, blending meticulous housekeeping expertise, line dancing, gardening, and charity quilting, while they juggle a meticulous budget
    and an occasional late‑night cookie binge.
background:
  cultural: Carol grew up in a middle‑class white family with deep roots in the Appalachian region of East Tennessee. Her ancestry traces back to English and Scots‑Irish settlers, fostering a strong sense
    of regional heritage. She embraces Southern hospitality, church‑centered life, and the work ethic typical of her community. Traditional celebrations feature fried chicken, collard greens, peach cobbler,
    and lively country or bluegrass music. Carol values the self‑reliance and close‑knit community spirit of Appalachia, which informs her practical, reliable nature and her dedication to helping others
    through both her profession and volunteer activities.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning'', ''Carpet and upholstery care'', ''Laundry and fabric care'', ''Eco‑friendly chemical handling'', ''Inventory management'', ''Time and schedule planning'',
