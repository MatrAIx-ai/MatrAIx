  hobbies: '[''Community volunteering'', ''Gardening'', ''Line dancing'', ''Southern cooking and baking'', ''Reading home organization books'', ''Hiking'', ''Quilting and crocheting'', ''Socializing at
    local events'']'
  career_goals: Carol aims to obtain the Certified Executive Housekeeper (CHB) credential within the next three years and transition into a supervisory role overseeing multiple residential properties for
    a property‑management firm. She plans to launch her own eco‑friendly cleaning business that emphasizes sustainable practices and comprehensive home organization. To support these ambitions, she intends
    to complete a bachelor’s degree in Hospitality Management, develop a structured training program for junior housekeepers, and eventually move into estate management, handling budgeting, vendor coordination,
    and full‑service household oversight.
