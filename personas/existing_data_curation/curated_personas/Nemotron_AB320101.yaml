    "Attending community theater workshops"]'
  career_goals: Melany dreams of a future where she can use her voice to engage and inform others. She imagines becoming a television news anchor or a young journalist for her school's newspaper, delivering
    stories that matter to her community. At the same time, she values stability and envisions a role like a teacher or youth program coordinator, where she can combine structure with the excitement of
    guiding classmates and younger kids. She hopes her career will let her stay connected with friends, inspire peers, and create a supportive environment for kids facing stress or worry.
