  hobbies: '[''Chess'', ''Running'', ''DIY Home Improvement'', ''Cooking (especially meal prep)'', ''Reading Non-fiction (business, health policy)'', ''Listening to Podcasts on Leadership'', ''Attending
    Houston Astros games'', ''Meditation and mindfulness exercises'']'
  career_goals: Daniel aims to advance from his current manager role to a senior executive position, such as Director of Healthcare Operations or Vice President of Clinical Services, overseeing multiple
    facilities across the Houston region. He plans to augment his expertise with a healthcare administration certification or an MBA, focusing on advanced analytics, patient experience optimization, and
    cost‑containment strategies. His long‑term ambition is to build a reputation for delivering measurable improvements in operational efficiency, regulatory excellence, and staff engagement while positioning
    himself as a competitive leader in the industry.
