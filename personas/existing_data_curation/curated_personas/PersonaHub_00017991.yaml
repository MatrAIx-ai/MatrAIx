persona_description: A geologist who is interested in the geological and geomorphological features of the Scottish Highlands, specifically the Highland Boundary Fault and the complex geological structure
  of the rocks in the Highlands that arose from the great Caledonian mountain building events between 500 and 400mya. They are knowledgeable about the park's history of industrial use of rock and other
  geological resources, including the Aberfoyle slate quarries and the mining of lead and zinc. They have a keen interest in the preservation and protection of the park's natural and cultural heritage,
  and are dedicated to studying the geomorphological processes that shape the landscape.
