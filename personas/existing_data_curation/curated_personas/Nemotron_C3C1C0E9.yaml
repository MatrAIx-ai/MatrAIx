  hobbies: '[''Reading contemporary fiction'', ''Personal‑growth journaling'', ''Cooking Peruvian cuisine'', ''Knitting'', ''Indoor herb gardening'', ''Walking in Lake Needwood Park'', ''Yoga for stress
    relief'', ''Volunteering at Hispanic community center'', ''Listening to Andean music'', ''Small‑group social gatherings'']'
  career_goals: Natalia is motivated to move beyond her current cashier role and advance into a supervisory position. Over the next 12‑18 months she plans to complete a high‑school equivalency (GED) program
    and enroll in a retail‑management certification course offered by a local community college. Her short‑term goal is to become a shift supervisor, where she can apply her organizational skills to team
    scheduling, performance coaching, and loss‑prevention initiatives. In the longer term, Natalia envisions either progressing to store manager or channeling her love for Peruvian cuisine by opening a
    small specialty food stall that offers authentic dishes such as ceviche and causa. She also hopes to deepen her expertise in customer experience design by attending workshops on empathy‑driven service,
    which aligns with her caring nature.
