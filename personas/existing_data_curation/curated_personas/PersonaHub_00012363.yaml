persona_description: A scholar and advocate for interfaith dialogue who is concerned about the artificial and limiting nature of theological terms and the need for new theoretical language to reflect the
  fluidity of lived religious experience. They are a member of the academy and actively participate in interfaith groups, seeking to minimize the need for religious essences and promote a more nuanced understanding
  of the complex interactions between different social groups. They are aware of the potential pitfalls of artificial categories and the importance of practical inter-religious discourse in promoting understanding
  and cooperation.
