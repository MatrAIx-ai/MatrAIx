personas:
  professional: Felicia Vergara, a bilingual B2B sales operations veteran with over twenty years of experience, translates complex data into actionable insights, leads an inside-sales team with pragmatic
    problem-solving, and nurtures a collaborative, energetic environment that balances proven frameworks with a curiosity-driven willingness to experiment.
  sports: Felicia Vergara heads a Bay Area coastal-trail hiking club, organizes group bike rides on her road bike every Saturday, and cheers for the San Francisco Giants and Golden State Warriors, turning
    fitness into social outings that match her energetic personality.
  arts: Felicia Vergara fuels her evenings with tango lessons to the sounds of Astor Piazzolla, attends local theater productions such as Hamilton and La Casa de Bernarda Alba, and decorates her living
    space with Frida Kahlo prints, weaving dance, drama, and visual art into her social life.
  travel: Felicia Vergara favors spontaneous, wine-focused road trips—exploring Napa, Sonoma, and Paso Robles on the West Coast—and has earmarked Rioja in Spain and Tuscany in Italy as future destinations
    for her curated tasting itineraries, all while balancing travel with family and community commitments.
  culinary: Felicia Vergara, an adept home chef, prepares a South American-style asado featuring grilled ribeye, chimichurri, and roasted vegetables, pairing the feast with Malbec and a drizzle of Ortega
    olive oil, while occasionally improvising with fresh herbs like rosemary and cilantro when a planned menu slips.
  core: Felicia Vergara blends data-driven sales leadership with a passion for tango, wine, and spontaneous hikes, thriving on social energy despite a relaxed, sometimes disorganized schedule that keeps
    her team and friends constantly engaged.
background:
  cultural: Felicia was born to Argentine parents who emigrated to the United States in the early 1970s. She grew up in a bilingual household where Spanish was spoken at home and English at school, fostering
    a deep connection to Argentine traditions—from family gatherings around the asado grill to a lifelong passion for fútbol and tango. The values of collectivism, warmth, and adaptability she inherited
    blend seamlessly with the entrepreneurial spirit of Silicon Valley, allowing her to bridge cultural perspectives in both personal and professional settings.
attributes:
  skills: '["Data-Driven Sales Analysis", "Team Coaching", "CRM Administration (Salesforce)", "Pipeline Forecasting", "Negotiation and Deal Closing", "Process Optimization", "Bilingual Communication (Spanish/English)",
    "Technical Product Knowledge", "Cross-Cultural Client Management", "Strategic Planning"]'
  hobbies: '["Tango dancing", "Cooking Argentine cuisine (asado, empanadas)", "Hiking coastal Bay Area trails", "Wine tasting clubs", "Attending tech meetups", "Reading historical fiction", "Volunteering
    as youth mentor", "Participating in book clubs"]'
  career_goals: Felicia aims to step into a regional sales leadership role within the next three years, expanding her influence beyond her current team to shape broader go-to-market strategy. She is pursuing
    an executive certification in sales leadership to complement her practical experience, and is passionate about mentoring emerging women and Hispanic leaders in tech. In the longer term, she envisions
    launching a boutique consulting practice that helps mid-size firms integrate data-centric sales processes while leveraging her Latin-American market insights. Throughout, she seeks to retain a flexible
    schedule that allows for family and community involvement.
