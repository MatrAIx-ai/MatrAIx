  hobbies: '["Classical Music (chamber concerts)", "Reading (historical non-fiction, classic literature)", "Gardening (roses, heirloom vegetables)", "Woodworking", "Genealogy and Local History Research",
    "Chess", "Volunteer Financial‑Literacy Tutoring", "Visiting Art Museums"]'
  career_goals: As he approaches the next stage of his career, Hector aims to transition into a senior advisory role where he can mentor junior analysts and shape the firm’s ethical‑investment strategy.
    He plans to launch a community‑based financial‑literacy program for retirees in Northville, leveraging his teaching experience and his commitment to harmony and service. Hector also aspires to author
    a book that integrates humanities insights with modern finance, promoting a more human‑centred approach to wealth management. While remaining open to emerging fintech tools, he intends to adopt them
    judiciously, ensuring they complement established, reliable practices.
