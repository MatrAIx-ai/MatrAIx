persona_description: A political scientist who specializes in the study of federalism and its various forms around the world. They have a deep understanding of the concept of division of authority between
  a central government and its political units, and are knowledgeable about the examples of federal governments in various countries such as the United States, Canada, and the European Union. They are also
  familiar with the workings of the United States Constitution and how the federal government and state governments have power when they disagree. They have a passion for understanding how different countries
  use federalism to govern themselves and how it influences their political systems.
