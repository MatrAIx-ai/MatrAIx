    cuisines'', ''Volunteering at the public library for literacy programs'', ''Playing board games with friends'', ''Listening to podcasts about art and cultural trends'', ''Journaling personal reflections'',
    ''Learning basic Spanish through language apps'', ''DIY home organization projects'']'
  career_goals: Bryant aims to advance from his current administrative role to a senior office manager position, where he can lead a team and oversee broader operational functions. He plans to obtain the
    Certified Administrative Professional (CAP) credential and, in the long term, pursue a project management certification such as PMP to transition into project coordination for arts and cultural organizations.
    Leveraging his interest in creativity, he aspires to manage or curate community art events and possibly open a small boutique gallery that combines his administrative expertise with his passion for
    visual arts. He also envisions completing an associate degree in business administration to solidify his strategic and leadership skill set.
