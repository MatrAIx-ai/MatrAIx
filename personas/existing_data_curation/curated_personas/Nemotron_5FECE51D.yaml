    communication and correspondence'', ''Customer service and client liaison'', ''Office technology troubleshooting'', ''Process improvement and workflow optimization'', ''Confidential information handling'',
    ''Time management and multitasking'', ''Basic graphic design (Canva, Adobe Spark)'', ''Research and information synthesis'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Photography of urban and natural landscapes'', ''Reading contemporary fiction and non‑fiction (art history,
