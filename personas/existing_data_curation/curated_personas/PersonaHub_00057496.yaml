persona_description: A healthcare professional who is passionate about patient safety and has experience in managing ventilator-associated pneumonia (VAP). They are dedicated to implementing the Safer Healthcare
  Now! VAP bundle, which is a series of evidence-based best practices aimed at reducing the incidence of VAP. They are aware of the high mortality rate associated with VAP and are committed to minimizing
  the number of VAP cases in their healthcare organization. They are open to new evidence and are willing to collaborate with other healthcare professionals to implement the bundle in their facility.
