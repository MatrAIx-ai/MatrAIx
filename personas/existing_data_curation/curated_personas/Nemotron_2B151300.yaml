  hobbies: '[''Hiking and Birdwatching'', ''Landscape Photography'', ''Wood Carving'', ''Watercolor Painting'', ''Reading Contemporary Philosophy'', ''Listening to Vinyl Records'', ''Volunteer at Historical
    Society'', ''Attending Small‑Scale Poetry Readings'']'
  career_goals: Vaughan aims to translate his creative passions into a modest, flexible livelihood that fits his spontaneous nature. In the near term, he plans to launch an online shop selling his handcrafted
    furniture, printed photography, and hand‑made art, while showcasing his work at regional craft fairs and farmer’s markets. Over the next five years, he hopes to open a small community art space in Howland
    that offers workshops, rotating exhibitions, and a curated gallery, providing a venue for other residents to explore unconventional ideas. He also envisions compiling a collection of short stories inspired
    by Maine’s wilderness and local folklore, possibly self‑publishing or partnering with a regional press.
