personas:
  professional: Yong Shi, a veteran elementary and middle-school educator, leverages three decades of experience in designing culturally responsive curricula, data-driven assessment, and technology-enhanced
    lessons, while their methodical planning, calm demeanor, and natural charisma make them a sought-after workshop leader and mentor.
  sports: Yong Shi, an avid hiker of the Bay's coastal trails and a regular participant in the local Walking Club's Saturday strolls, stays fit through brisk walks and occasional yoga, while they cheer
    on the San Francisco Giants in spring and the Golden State Warriors during the NBA season.
  arts: Yong Shi, a passionate calligrapher and story-time presenter, draws inspiration from the brush strokes of Tang master Wang Xizhi, the soothing cello of Yo-Yo Ma, and the lyrical storytelling of
    Lin-Manuel Miranda, and they weave these influences into community workshops and library readings.
  travel: Yong Shi, who prefers meticulously planned itineraries, spends their vacations exploring the redwoods of Muir Woods, tasting the vineyards of Napa Valley, and savoring a week-long cultural immersion
    in Taiwan's night markets, balancing their love for nature with a curiosity for heritage sites.
  culinary: Yong Shi, an accomplished home chef, delights in hand-rolling xiao long bao, simmering mapo tofu with Sichuan peppercorns, and crafting mooncake fillings of lotus seed paste, often hosting potluck
    gatherings where they showcase these classics alongside experimental tofu-infused salads.
  core: Yong Shi, a reluctantly organized yet gregarious educator, channels their lifelong love of community into bustling festivals and classroom workshops, while quietly battling a habit of over-scheduling
    every evening with three pending tasks.
background:
  cultural: Yong Shi is a first‑generation Chinese‑American whose parents emigrated from Guangdong province in the 1970s. Raised in a bilingual household in the Bay Area, he grew up speaking Mandarin at
    home while attending public schools in San Francisco, where he absorbed both Chinese cultural norms—respect for elders, emphasis on education, and communal harmony—and American values of individual
    expression and civic engagement. He celebrates Lunar New Year, Mid‑Autumn Festival, and integrates Chinese stories, proverbs, and historical perspectives into his lessons. Active in local Chinese community
    associations, he bridges his heritage with his professional role, fostering cross‑cultural understanding among his students and their families.
attributes:
