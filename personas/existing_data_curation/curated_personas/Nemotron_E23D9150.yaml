  hobbies: '[''Community Festival Organization'', ''Cooking Traditional Chinese Cuisine'', ''Mahjong'', ''Hiking and Nature Photography'', ''Educational Technology Exploration'', ''Reading (Chinese literature,
    educational theory)'', ''Music Appreciation (traditional Chinese music)'', ''Calligraphy'', ''Volunteer Storytime at Local Library'']'
  career_goals: Yong aims to leverage his extensive experience to shape district‑wide bilingual education policies and become a curriculum specialist focused on Mandarin integration. He plans to mentor
    emerging teachers, design culturally inclusive lesson frameworks, and champion community‑school partnerships. To support these goals, he intends to complete a teacher‑leadership credential while continuing
    to lead workshops and present at regional education conferences. In the longer term, he envisions a part‑time advisory role after retirement, offering consultancy to schools and local cultural organizations,
    and possibly serving on the school board to advocate for multicultural initiatives.
