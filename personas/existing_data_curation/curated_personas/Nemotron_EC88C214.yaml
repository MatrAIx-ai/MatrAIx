personas:
  professional: Kathy Harryton, a systems analysis specialist with deep expertise in data modeling, Python, Java, AWS, and SAP, channels their curiosity and meticulous organization into designing scalable,
    AI‑ready architectures for healthcare and education, while their visual storytelling flair turns complex technical roadmaps into clear, compelling presentations for diverse stakeholders.
  sports: Kathy Harryton enjoys weekend hikes on the Eno River trail, follows the Carolina Hurricanes for NHL excitement, cheers on the NC State Wolfpack basketball team during March Madness, and participates
    in a local women's hiking club that meets monthly.
  arts: Kathy Harryton frequents the CAM Raleigh and Ackland Art Museum for contemporary exhibitions, immerses in jazz sextets at the Coke‑Zero Theatres, captures street scenes with a Fuji X‑100, practices
    watercolor landscapes of Granville County, and devours novels by Sally Rooney and philosophy by Alain de Botton, letting these experiences inform their creative problem‑solving at work.
  travel: Kathy Harryton plans meticulously, opting for culturally rich short getaways like a culinary tour of New Orleans, a photography hike in the Great Smoky Mountains, and a dream trip to Kyoto's historic
    temples, balancing curiosity with budget constraints while occasionally joining a family road trip to the Outer Banks.
  culinary: Kathy Harryton experiments with Southern comfort staples—smoked collard greens, shrimp‑and‑grits—and infuses them with global twists like harissa‑spiced okra or ginger‑marinated plantain mash,
    cooking with confidence in a modest kitchen but occasionally over‑salting, which they later correct with a dash of citrus.
  core: Kathy Harryton blends analytical rigor with artistic curiosity, turning data into vivid narratives while savoring watercolor sunsets, jazz riffs, and bold kitchen experiments, all guided by a calm,
    organized yet flexible outlook.
background:
  cultural: Kathy’s cultural background is rooted in African‑American heritage in the American South. She grew up in a close‑knit extended family that celebrated church, music, and storytelling, and earned
    her STEM degree at a historically Black university where she was active in organizations supporting Black women in engineering. Living in Wake Forest, she participates in local Juneteenth celebrations,
    supports the Carolina Black Arts Festival, and draws inspiration from North Carolina’s civil‑rights legacy. Her identity as a Black woman in tech informs her dedication to representation, community
    mentorship, and the infusion of African diasporic artistic sensibilities into both her personal and professional pursuits.
