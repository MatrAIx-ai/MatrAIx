  career_goals: Kathy aims to advance into a senior systems architect role where she can shape enterprise‑wide technology strategy, particularly by integrating AI‑driven analytics and cloud‑native solutions.
    Over the next two years she plans to obtain TOGAF and PMP certifications, lead cross‑functional teams delivering mission‑critical systems for healthcare or education platforms serving underserved communities,
    and build a regional internship pipeline with local HBCUs. She is also committed to mentoring more Black women in tech and championing inclusive design practices that reflect diverse user experiences.
