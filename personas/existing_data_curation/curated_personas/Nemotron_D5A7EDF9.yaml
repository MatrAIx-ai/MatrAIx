    Management'']'
  hobbies: '[''Model Railroading'', ''Woodworking'', ''Herb Gardening'', ''Reading (Transportation History, Logistics)'', ''Crossword Puzzles'', ''Sudoku'', ''Volunteer Food‑Bank Delivery'']'
  career_goals: Joshua aims to transition into a senior logistics coordinator or safety manager role within his current transportation company, where he can apply his organizational expertise to improve
    route efficiency and safety standards. He also aspires to develop a structured apprenticeship program for new drivers, leveraging his mentoring abilities. Long‑term, he hopes to launch a small family‑owned
    freight brokerage that emphasizes reliable service, fair treatment of drivers, and community responsibility, securing financial stability for his family while giving back to his Brooklyn neighborhood.
