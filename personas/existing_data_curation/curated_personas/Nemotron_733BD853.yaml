  career_goals: Lee aims to deepen his culinary expertise by completing a professional chef certification and eventually enrolling in a culinary arts program. He aspires to become a sous‑chef and later
    open his own farm‑to‑table restaurant that blends Southern comfort food with artistic plating and community‑focused dining experiences. He also hopes to develop programs that provide job training for
    at‑risk youth in food service, combining his desire to help others with his industry knowledge. Improving his organizational and time‑management skills is a personal goal to better lead larger operations.
