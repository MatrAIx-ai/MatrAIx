personas:
  professional: Lee Knoch is a front‑line food service manager at a bustling Tallahassee eatery, blending Southern hospitality with inventive plating, using their knack for mediation and visual design to
    keep the kitchen humming while constantly battling a love‑of‑spontaneity that makes strict schedules feel like shackles.
  sports: Lee Knoch is a devoted fan of the Florida State Seminoles football and basketball teams, regularly attends games at Doak Campbell Stadium, hikes the Apalachicola National Forest with a local trail
    club, and occasionally joins a weekend pick‑up basketball league at the Tallahassee Community Center.
  arts: Lee Knoch is an avid visitor of Tallahassee’s LeMoyne Center for the Arts, sketches urban scenes of downtown streets, keys an acoustic guitar at open‑mic nights featuring local singer‑songwriters
    like John Prine, and draws inspiration from artists such as Georgia O’Keeffe and contemporary muralist Shepard Fairey.
  travel: Lee Knoch loves spontaneous road trips, having explored the Florida Keys and New Orleans for their culinary scenes, trekked the Blue Ridge Mountains in Asheville, and now dreams of a culinary
    pilgrimage to Tuscany’s farm‑to‑table villages and the night markets of Osaka, always budgeting travel with a mix of savings and occasional gig earnings.
  culinary: Lee Knoch is an experimental home chef who perfects shrimp and grits with a miso‑infused beurre blanc, mixes collard greens with kimchi for a fermented twist, and whips up sweet‑potato gnocchi
    tossed in a smoky paprika butter, favoring ingredients like okra, cane sugar, and fresh thyme while maintaining a moderate skill level but a voracious appetite for learning.
  core: Lee Knoch is a compassionate, art‑loving culinary enthusiast who balances Southern comfort with global flair, wrestles with anxiety and a penchant for spontaneity, and dreams of turning community
    kitchens into creative, inclusive dining hubs.
background:
  cultural: Lee is a white American who grew up in the Southern United States, absorbing the values of hospitality, community, and a strong culinary tradition centered on comfort foods and seasonal ingredients.
    Living in Tallahassee, he is influenced by the vibrant college atmosphere of Florida State University and the diverse cultural mix of the city, which exposes him to a variety of cuisines and artistic
    expressions. His background blends traditional Southern customs—such as sharing meals with family and neighbors—with a modern, open‑minded outlook shaped by his college experiences and his curiosity
    for new ideas.
