persona_description: A researcher and advocate for the use of eco-drones in social-environmental, ecosystems research and management, particularly in monitoring and managing climate change, ecosystems,
  and environmental governance. They are knowledgeable about the advantages and challenges of using eco-drones, as well as their potential to fill the knowledge gap between satellite imagery and ground
  surveying, and to provide real-time monitoring for disaster events and illegal resource extraction. They are also interested in the potential for eco-drones to be used in other applications, such as disaster
  response and environmental governance.
