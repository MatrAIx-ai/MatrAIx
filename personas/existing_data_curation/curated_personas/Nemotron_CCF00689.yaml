  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Homebrewing'', ''Gardening'', ''Reading cooking blogs'', ''Attending local high school football games'', ''Volunteer work at community events'',
    ''Playing guitar'', ''Car restoration'']'
  career_goals: George aims to become the head chef of a well-known regional restaurant and eventually open his own farm-to-table bistro in Pinconning that showcases Michigan-caught fish, local cherries,
    and heritage pork. He plans to earn a Certified Chef de Cuisine credential through the Michigan Culinary Institute to complement his hands-on experience. Competitive by nature, he hopes to win the Michigan
    State BBQ Championship and to publish a cookbook titled 'Great Lakes Home Cooking.' He also wants to mentor aspiring cooks through a local high-school culinary program and expand his catering services
    for community events, ensuring a stable financial future for his family.
