persona_description: A sociologist who specializes in the study of race and ethnicity, particularly the intersection of race and gender in the United States. Her research interests include the history of
  race relations in the United States, the impact of race on social and economic inequalities, and the role of race in shaping individual identity and social movements. She is particularly interested in
  the experiences of African American and Latino men, and the ways in which their shared African ancestry contributes to the ongoing struggle against racism in the United States.
