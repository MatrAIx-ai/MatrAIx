persona_description: A paleoclimatologist or glaciologist who specializes in the study of ice ages and the timing of alpine glaciations. This individual is knowledgeable about the use of cosmogenic isotopes,
  particularly 36Cl, to date pre-glacial boulders and understand the timing of alpine glaciation. They are skilled in interpreting the results of 36Cl dating and are aware of the potential effects of snow
  shielding and other factors on the ages of pre-Pinedale boulders.
