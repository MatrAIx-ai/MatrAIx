  career_goals: Camar aspires to combine his passion for art and community engagement by pursuing a career in arts administration or cultural programming, ideally working for a museum, gallery, or nonprofit
    arts center in the Washington, D.C. area. He plans to complete a bachelor's degree in arts management or communications, secure an internship that deepens his curatorial and outreach experience, and
    eventually lead initiatives that amplify under‑represented voices in the visual arts. His long‑term ambition includes founding a community‑based arts hub that offers mentorship and exhibition opportunities
    for emerging Black artists.
