personas:
  professional: Marian Snyder is a budding community recreation professional, leveraging strong verbal communication and basic tech skills to coordinate volunteer-driven events for Crow Wing County Parks,
    where her competitive edge pushes her to set ambitious participation targets while her pragmatic outlook keeps budgets realistic.
  sports: Marian Snyder competes in intramural softball and volleyball leagues, paddles kayaks on Lake Britt, ice‑fishes on frozen lakes in winter, and cheers for the Minnesota Twins and Wild, while also
    volunteering as a youth coach for the local Aitkin County Lakes Club, channeling their competitive drive into both play and mentorship.
  arts: Marian Snyder enjoys attending live shows at The Norseman and the Cedar Rapids Café, where they often belt out trivia answers, while also indulging in crafting homemade candles and baking pies for
    community potlucks, drawing inspiration from folk artists like The Lumineers and singer‑songwriter Brandi Carlile.
  travel: Marian Snyder prefers weekend road trips to nearby Minnesota gems such as the Boundary Waters, Duluth’s Canal Park, and the Iron Range, yet they dream of backpacking through the Canadian Shield
    and exploring Portland’s food scene, balancing a love for spontaneous adventure with a practical budget that limits longer, costly vacations.
  culinary: Marian Snyder favors hearty Midwestern fare—wild rice casserole, walleye fish fry, and apple crumble—while proudly perfecting their own cinnamon rolls and scented soy candles, often experimenting
    with locally sourced maple syrup and fresh lake herbs in their kitchen, though they sometimes over‑salt dishes when eager to impress friends.
  core: Marian Snyder is a socially driven, competition‑infused community advocate who blends structured event planning with a relaxed, sometimes disorganized lifestyle, using their outgoing nature to rally
    friends around outdoor fun while occasionally questioning others’ motives.
background:
  cultural: Marian grew up in a predominantly white, Midwestern small‑town environment in Aitkin, Minnesota, where community ties and outdoor recreation are central to daily life. Her family background
    reflects the region's German‑Scandinavian heritage, with traditions of modest living, self‑reliance, and a strong work ethic. She has been active in local churches and community groups, which emphasized
    volunteerism, seasonal celebrations like the county fair, and respect for the natural landscape. These cultural influences have shaped her values of teamwork, practicality, and a love for the outdoors,
    while also fostering an appreciation for organized community events and social connections.
attributes:
  skills: '["Verbal communication", "Group event coordination", "Basic Microsoft Office proficiency", "Social media content creation", "First aid certification", "Outdoor safety and navigation", "Team motivation
    and leadership", "Budgeting and resource allocation"]'
  hobbies: '["Intramural softball", "Volunteering at county fairs", "Kayaking and lake outings", "Hiking and trail exploring", "Ice‑fishing", "Candle making", "Baking for potlucks", "Live music events",
    "Trivia night competitions"]'
  career_goals: Marian aims to pursue a career in community recreation and tourism development. She plans to enroll in a community college program for recreation management, followed by a bachelor's degree
    in tourism or hospitality. Her short‑term goal is to secure an entry‑level position as an event assistant or youth program coordinator with the Crow Wing County Parks and Recreation department, where
    she can apply her event‑planning skills and love for outdoor activities. Long‑term, she aspires to become a Community Recreation Coordinator, designing inclusive, seasonal programs that attract both
    locals and visitors while fostering a sense of community pride and economic growth.
