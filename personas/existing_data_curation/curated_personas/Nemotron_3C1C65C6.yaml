personas:
  professional: A seasoned full‑stack software developer, Neal Pepe leverages two decades of expertise in Java, Python, and modern JavaScript frameworks to craft scalable, secure systems, while their methodical,
    organized approach and collaborative spirit translate into meticulous code reviews, mentorship, and a drive to align technology with user‑centric, mental‑health solutions.
  sports: Neal Pepe is a regular starter in the Lake County adult soccer league, a weekend rider with the Lake County Cycling Club, and a devoted fan of the Cleveland Browns (NFL) and Cleveland Cavaliers
    (NBA), balancing competitive play with low‑intensity yoga sessions to temper post‑game anxiety.
  arts: Neal Pepe expresses creativity through acoustic guitar sessions at backyard barbecues—often covering John Mayer and Joni Mitchell—while also curating board‑game nights inspired by the storytelling
    of Game of Thrones and attending indie film screenings of Christopher Nolan’s work, weaving music and narrative into their social fabric.
  travel: Neal Pepe prefers meticulously planned road trips that blend adventure with relaxation, having explored the Oregon Coast, the vineyards of Napa Valley, and the temples of Kyoto, while budgeting
    for weekend getaways that fit around family obligations and therapy appointments.
  culinary: Neal Pepe, an enthusiastic home chef, delights in grilling marinated salmon with dill, lemon, and smoked paprika, crafting rustic rosemary‑infused focaccia, and perfecting a signature herb‑laden
    meatball dish that showcases garlic, oregano, and fresh basil, often paired with a robust red wine during summer barbecues.
  core: Neal Pepe is a methodical yet sociable tech veteran who channels their anxiety into disciplined mindfulness, community mentorship, and guitar‑driven gatherings, often juggling impulsive splurges
    on gear with a steadfast commitment to building inclusive, health‑focused technology.
background:
  cultural: Neal’s cultural background is rooted in the Midwestern United States with a blend of Italian heritage reflected in his family name. Raised in the suburbs of Chicago, he grew up immersed in the
    region’s emphasis on community, reliability, and modesty. Family gatherings often centered around hearty Italian meals—home‑made pasta, fresh sauces, and Sunday casseroles—passed down from his grandparents
    who immigrated from Southern Italy. The values of hard work, straightforward communication, and a strong sense of neighborly responsibility, typical of the Great Lakes area, shaped his worldview. Today,
    living in Grayslake, Illinois, Neal maintains ties to both his Italian traditions, celebrating holidays like Ferragosto and participating in the local Catholic parish, and the broader white Midwestern
    culture that prioritizes volunteerism, “small‑town” camaraderie, and an appreciation for the outdoors.
