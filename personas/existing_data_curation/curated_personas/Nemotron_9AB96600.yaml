  hobbies: '[''Watercolor painting'', ''Community art workshops'', ''Gardening'', ''Birdwatching'', ''Reading historical biographies'', ''Genealogy research'', ''Quilting'', ''Knitting'', ''Volunteering
    at senior reading program'', ''Attending heritage festivals'', ''Listening to classic jazz and folk music'']'
  career_goals: Mary Ann aims to transition into a supervisory or trainer role within the distribution center, where she can mentor newer employees and champion more efficient, environmentally friendly
    packaging methods. She plans to earn a certification in supply‑chain management and seek part‑time opportunities that provide a flexible schedule, allowing her to balance work with her artistic pursuits.
    In the longer term, she hopes to gradually reduce her workload while volunteering to teach crafting and basic computer skills at the local senior center, and eventually enjoy a semi‑retired lifestyle
    that includes travel to regional art museums.
