persona_description: A public health researcher who specializes in the surveillance and prevention of infectious diseases, particularly hepatitis C. This individual has experience working with state and
  local health departments to analyze and interpret surveillance data, identify trends, and develop strategies to reduce the spread of hepatitis C among adolescents and young adults. They are particularly
  interested in the factors that contribute to the rise in hepatitis C infections among this age group, including injection drug use and the use of drug injection equipment, and are advocating for increased
  surveillance and education efforts to prevent the spread of the virus.
