persona_description: A healthcare professional who works in obstetrics and gynecology, specializing in prenatal care and emergency care for pregnant women. They are aware of the risks associated with preeclampsia
  and are trained to recognize the signs and symptoms of the condition. They are also aware of the consequences of not properly diagnosing and treating preeclampsia, including the potential for uncontrolled
  or misdiagnosed preeclampsia to lead to eclampsia, placental abruption, and other serious complications. They are trained to recognize the importance of early diagnosis and treatment of preeclampsia,
  and are prepared to take legal action to recover compensation if necessary.
