  career_goals: At this stage, Armindo aims to deepen his involvement in cultural preservation by documenting family recipes and oral histories for future generations. He hopes to organize a small community
    cookbook project, volunteer as a docent at the local art museum, and learn basic digital photography to capture neighborhood murals. He also aspires to stay physically active through gardening and walking
    groups, and to maintain his role as a supportive mentor for his grandchildren and local youth.
