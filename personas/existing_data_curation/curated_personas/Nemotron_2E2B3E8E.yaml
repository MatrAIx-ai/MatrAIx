personas:
  professional: Steven Lowe is a hands‑on agricultural specialist who leverages his methodical planning, machinery expertise, and crew‑coordination skills to optimize farm operations, and his competitive
    streak drives him to pursue a precision‑farming certification and a foreman role within the next five years.
  sports: Steven Lowe enjoys playing pick‑up basketball at the community park with the 'Coastline Hoops Club' and follows the New Orleans Pelicans in the NBA and the Mississippi State Bulldogs during college
    basketball season, balancing his competitive nature on the court with a routine of early‑morning runs along the Gulf shoreline to stay fit.
  arts: Steven Lowe finds spiritual and cultural resonance in singing gospel classics like Mahalia Jackson’s 'Take My Hand, Precious Lord' and country hits by George Strait and Dolly Parton, often listening
    to these artists while grilling, which reinforces his love for tradition and community.
  travel: Steven Lowe plans his trips like he plans planting cycles—carefully mapping routes, budgeting for fuel, and targeting destinations such as the Florida Keys for sportfishing, New Orleans for culinary
    festivals, and the Great Smoky Mountains for a respite from farm work, yet his family commitments keep most vacations short and region‑focused.
  culinary: Steven Lowe treats barbecue as a craft, mastering a Kansas‑City–style dry rub for pork ribs, perfecting smoked brisket with mesquite wood, and regularly cooking fresh garden tomatoes into a
    zesty salsa that he serves alongside grilled catfish, reflecting his moderate skill level and love for bold, hearty flavors.
  core: Steven Lowe is a routine‑driven 29‑year‑old farm operator whose competitive edge fuels his pursuit of precision agriculture while his love for gospel, BBQ, and weekend fishing grounds his life in
    Southern traditions and modest quirks like obsessively checking irrigation timers.
background:
  cultural: Steven is an African-American raised in the coastal town of Biloxi, Mississippi. His upbringing reflects the intertwined traditions of the Gulf Coast black community, where family, church, and
    a strong work ethic on the land are central. He grew up hearing stories of his grandparents’ labor on farms and the significance of community gatherings, which instilled in him a respect for heritage,
    hospitality, and practical self-reliance. The local cuisine, music, and seasonal festivals have shaped his tastes and social connections, while his experience navigating the region’s social landscape
    informs his cautious, competitive outlook.
attributes:
  skills: '["Tractor and equipment operation", "Crop planting and maintenance", "Livestock handling", "Irrigation system management", "Equipment maintenance and repair", "Inventory tracking and record-keeping",
    "Work scheduling and logistics", "Basic agronomy knowledge", "Safety compliance", "Team coordination"]'
  hobbies: '["Fishing", "Gardening", "Barbecue cooking", "Church choir and community service", "Gospel and classic country music listening", "Truck restoration", "Pickup basketball", "Woodworking"]'
  career_goals: Steven seeks a stable, upward‑moving career in agriculture. Over the next five years he aims to earn a certification in precision farming and take on a supervisory role as a farm foreman
    or manager at a midsize operation. He hopes to eventually own a small diversified farm that combines row crops with sustainable aquaculture, allowing him to apply his practical expertise while providing
    a steady income for his family.
