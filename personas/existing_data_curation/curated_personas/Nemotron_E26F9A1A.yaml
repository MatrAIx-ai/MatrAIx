  hobbies: '[''Gardening'', ''Reading (Science Biographies, Black History)'', ''Chess'', ''Crossword Puzzles'', ''Woodworking'', ''Jazz Listening'', ''Saxophone Playing'', ''Coastal Walking'', ''Volunteer
