personas:
  professional: Amada Campos, a 22‑year‑old aspiring health‑services administrator, uses their bilingual fluency and meticulous scheduling expertise to supervise personal‑care staff in fast‑paced assisted‑living
    settings, applying a skeptical, data‑driven eye to ensure compliance while fostering a lively, team‑spirit atmosphere.
  sports: Amada Campos channels their sociable energy into Zumba classes, competes in a co‑ed weekend soccer league with the Orlando United club, and roots for the Orlando Magic and Orlando City SC, balancing
    group fitness with a competitive edge.
  arts: Amada Campos lights up local Latin clubs with bachata and merengue nights, moving to the beats of Prince Royce, Marc Anthony, and Shakira, while curating a small wellness vlog that blends dance
    tutorials with personal‑growth book reviews.
  travel: Amada Campos prefers weekend getaways that blend culture and nature, planning day trips to the Everglades and occasional flights to Santo Domingo to reconnect with family, all while budgeting
    travel through discount airlines and travel‑deal apps.
  culinary: Amada Campos delights friends with traditional Caribbean dishes like mangú, sancocho, and arroz con pollo, expertly seasoning with cilantro, oregano, and achiote, though they sometimes over‑spice
    a stew when experimenting with new flavor combos.
  core: Amada Campos is a pragmatic, fiercely organized social butterfly who balances a competitive drive with a love for community dance, budget‑savvy living, and a habit of double‑checking every spreadsheet
    before bedtime.
background:
  cultural: Amada was raised in a close‑knit Dominican family that values hospitality, music, and strong family ties. Bilingual in Spanish and English, she blends Caribbean rhythms with mainland U.S. customs,
    celebrating holidays like Dominica and participating in Orlando's vibrant Dominican diaspora events. Her cultural roots inform her empathetic approach to caregiving and her desire to create supportive
    spaces for fellow immigrants.
attributes:
  skills: '[''Team Leadership'', ''Client Relations'', ''Bilingual Spanish‑English Communication'', ''Scheduling and Workforce Management'', ''Health and Safety Compliance'', ''Electronic Health Record
    (EHR) Utilization'', ''Inventory Management'', ''Conflict Resolution'', ''Staff Training and Development'', ''Data Entry and Report Generation'']'
  hobbies: '[''Bachata and Merengue Dancing'', ''Cooking Dominican Cuisine'', ''Volunteering at Community Health Fairs'', ''Zumba Group Fitness Classes'', ''Soccer League Participation'', ''Exploring Orlando
    Theme Parks and Cultural Festivals'', ''Reading Personal Development Books'', ''Maintaining a Wellness Vlog'']'
  career_goals: Amada aims to obtain a Certified Nursing Assistant (CNA) credential and later pursue a bachelor's degree in Health Services Administration, positioning herself for a facility‑manager role
    within an assisted‑living or home‑care organization. Over the next five years she plans to lead a regional team of care providers, implement evidence‑based care protocols, and eventually launch a culturally‑focused
    community wellness center that serves the growing Dominican population in Orlando.
