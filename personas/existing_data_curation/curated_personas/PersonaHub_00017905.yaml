persona_description: A veterinarian who specializes in the diagnosis and treatment of abdominal distension in dogs. They have extensive knowledge and experience in diagnosing and treating various causes
  of abdominal distension, including tumors, loss of abdominal muscle tone, and fluid accumulation. They are skilled in performing diagnostic tests such as abdominal radiographs, ultrasonography, and thoracic
  radiographs to determine the underlying cause of the abdominal distension. They are also knowledgeable in treating abdominal distension with diuretic administration, surgery, and other treatments.
