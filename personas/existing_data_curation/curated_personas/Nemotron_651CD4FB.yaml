  career_goals: Axel dreams of becoming a civil engineer or architect who designs safe, functional spaces for his community. He is motivated by a desire to create practical solutions that improve the lives
    of his family and neighbors. He also entertains the idea of working in technology, such as software development, where his curiosity for coding can be applied to real‑world problems. Axel wants a career
    that offers stability, allows him to help others, and lets him continue learning new skills.
