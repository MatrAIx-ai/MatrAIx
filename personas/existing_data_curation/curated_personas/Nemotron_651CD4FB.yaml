personas:
  professional: Axel Madrigal, an aspiring junior developer, spends hours coding simple games in Python while meticulously planning LEGO constructions, blending curiosity with practicality and a reserved
    yet collaborative mindset to troubleshoot problems and share progress with a tight‑knit circle of friends.
  sports: Axel Madrigal, a midfield enthusiast for the local youth club Eagles FC U13, enjoys small‑sided soccer games after school, cheering on the professional City United team on weekends, and uses quick
    warm‑ups to stay agile despite occasional pre‑match nerves.
  arts: Axel Madrigal, a digital art hobbyist who layers vibrant comic‑style illustrations with influences from regional folk singers and contemporary pop icons like Billie Eilish, simultaneously sculpts
    elaborate LEGO scenes and collects graphic novels such as "Saga" and "Monstress", letting imagination guide their creative expression.
  travel: Axel Madrigal prefers well‑planned weekend trips with family, favoring visits to nearby natural parks like Redwood Forest and cultural museums in San Francisco, while dreaming of exploring historic
    ruins in South America and the bustling streets of Tokyo, balancing curiosity with a need for familiar routines.
  culinary: Axel Madrigal helps prepare family’s cherished recipes, from hand‑rolled corn tortillas with slow‑cooked pork to spiced bean stews, and experiments with adding digital art flair to plating,
    yet often forgets to clean the kitchen promptly, a quirk that reflects their focus on creation over chores.
  core: Axel Madrigal is a curious, detail‑oriented twelve‑year‑old who channels solitary passions like coding and LEGO building into collaborative bursts of creativity, while juggling anxiety‑induced worries,
    disciplined budgeting, and a love for family‑rooted cooking and modest soccer games.
background:
  cultural: Axel grows up in a Mexican‑American household in Eastvale, California, surrounded by a close‑knit Latino community. He speaks Spanish at home and celebrates cultural traditions such as Día de
    los Muertos, Cinco de Mayo, and family gatherings centered around homemade foods like tamales and pozole. These customs emphasize respect for elders, cooperation, and communal harmony, values that shape
    his considerate nature. The local cultural festivals, his school's Spanish language program, and visits to relatives in Mexico help him stay connected to his heritage while navigating a diverse suburban
    environment.
