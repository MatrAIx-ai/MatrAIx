personas:
  professional: Mark Dacosta is a budding junior robotics enthusiast who channels their practical, structure‑loving mindset into methodical problem‑solving on the school robotics team, while their spontaneous
    flair lets them improvise creative solutions during build sessions and Minecraft collaborations.
  sports: Mark Dacosta skates for the Riverview Junior Ice Hawks, follows the Minnesota Wild with fervor, and balances winter hockey with summer fishing trips on Lake Thief River and weekend snowmobile
    rides, all while being a member of the local youth outdoor adventure club.
  arts: Mark Dacosta channels their love of fantasy into drawing comic‑style characters inspired by Harry Potter and Stan Lee, builds detailed model kits with the same precision they apply to Minecraft
    constructions, and spends free afternoons replaying Hayao Miyazaki’s animated classics for creative inspiration.
  travel: Mark Dacosta loves weekend road trips to the Boundary Waters for canoeing, dreams of exploring the geysers of Yellowstone, and often plans family day hikes in the nearby woods using a handwritten
    map, preferring low‑cost, nature‑focused adventures over theme‑park vacations.
  culinary: Mark Dacosta enjoys the simple comfort of pepperoni pizza and grilled cheese after gaming marathons, shows budding kitchen confidence by cooking fish tacos with fresh lake‑caught trout, and
    delights in baking chocolate chip cookies with the family during holiday gatherings.
  core: Mark Dacosta blends a methodical, structure‑driven work ethic with the spontaneous imagination of a gamer, often losing track of bedtime while meticulously crafting digital and physical worlds.
background:
  cultural: Mark comes from a white, Midwestern family rooted in Thief River Falls, a small town in northwestern Minnesota. His heritage includes German-Scandinavian ancestry common to the region, and his
    family maintains traditions such as celebrating Lutheran holidays, attending the local church, and participating in community events like the Summerfest and the annual ice-fishing derby. The local culture
    emphasizes self-reliance, outdoor recreation, and strong community ties, which have shaped Mark's values of cooperation, kindness, and respect for nature. He often experiences the distinct Minnesota
    seasons—from long, cold winters that encourage snow sports to warm summers that bring fishing trips and backyard barbecues.
