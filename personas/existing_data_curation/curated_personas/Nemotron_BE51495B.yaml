  career_goals: Mark dreams of a future where he can combine his love for animals and the outdoors with a career that lets him help others. He hopes to become a wildlife biologist or a veterinarian, which
    would allow him to work with animals and protect Minnesota's natural habitats. He also entertains the idea of studying engineering to design better tools for outdoor recreation. In the short term, he
    aims to improve his grades in science and math, earn a spot on his high school's robotics club, and secure a summer internship or volunteer position at the local wildlife rehabilitation center. He aspires
    to earn a scholarship that will support his college education and enable him to pursue these ambitions.
