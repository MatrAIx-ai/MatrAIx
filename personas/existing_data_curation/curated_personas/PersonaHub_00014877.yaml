persona_description: A high school teacher who advocates for project-based learning (PBL) as a way to transform the way children learn in the twenty-first century. The teacher believes that PBL is a paradigm-shifting
  approach that emphasizes the acquisition of knowledge through doing, but is concerned that it is not personalized enough, lacks specific reference to mastery, and suffers from a "free rider" problem.
  The teacher is dedicated to developing skills in team leadership and project management, and believes that failure is an important part of a robust learning system. The teacher is also interested in developing
  PBL-based schools and believes that highly qualified teachers are necessary for its success.
