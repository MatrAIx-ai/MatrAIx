personas:
  professional: Connor Dennis is a budding mini‑architect who loves building intricate LEGO structures, and they channel their curiosity and practicality into turning imagined superhero hideouts into real‑world
    models, often organizing their bricks by color and shape while still leaving room for spontaneous creations.
  sports: Connor Dennis is an enthusiastic member of the neighborhood soccer club that supports the LA Galaxy junior team, and they dominate tag games at recess while also delighting in collecting interesting
    rocks during off‑season park hikes.
  arts: Connor Dennis passionately draws superheroes like Spider‑Man and Batman, and they regularly visit the local library to read picture books such as "The Very Hungry Caterpillar" while also listening
    to the upbeat tunes of Disney’s "Moana" soundtrack while building LEGO creations.
  travel: Connor Dennis loves family trips to the annual melon festival in the nearby town and day trips to the state park where they explore bug habitats, and they dream of visiting the Grand Canyon and
    Disneyland, favoring short, adventure‑filled outings over long vacations.
  culinary: Connor Dennis favors bright, juicy watermelon slices and chicken nuggets with honey mustard, and they often attempt to recreate simple LEGO‑inspired snack platters at home, though they sometimes
    sneak extra chocolate chip cookies when no one is watching.
  core: Connor Dennis blends boundless curiosity with organized play, turning everyday LEGO bricks and soccer games into miniature adventures while juggling a tiny allowance and occasional health hiccups.
background:
  cultural: Connor is raised in a white, middle‑class family in Clementon, New Jersey, a suburban community in Camden County. His cultural environment reflects typical American values, with celebrations
    of holidays such as Thanksgiving, Fourth of July, and Christmas, and participation in school and neighborhood activities. The family’s European ancestry—likely a mix of German, Irish, and Anglo‑American
    roots—appears in occasional recipes and traditions, but the dominant influence is the regional South Jersey culture, which includes community events like the local melon festival, public park gatherings,
    and a strong emphasis on school involvement and sports. He attends a local public elementary school where diversity of classmates adds to his social learning.
