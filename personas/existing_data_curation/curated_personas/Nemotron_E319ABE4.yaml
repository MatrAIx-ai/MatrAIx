  career_goals: Connor dreams of exploring the world and helping others, often talking about becoming an astronaut to travel among the stars or a firefighter to rescue people. He also expresses interest
    in building things, saying he might be an engineer or a teacher who shares what he learns. His short‑term ambitions include mastering reading, improving his math facts, joining the school soccer team,
    and learning more about space and how rockets work.
