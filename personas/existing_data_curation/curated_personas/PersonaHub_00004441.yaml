persona_description: A computational scientist at Freie Universität Berlin who specializes in the simulation and modeling of large biomolecules, particularly proteins. They are particularly interested in
  the use of machine learning and statistical physics to overcome the technical challenges of simulating large proteins. Their research focuses on understanding the switching behavior of protein building
  blocks and the social network of these building blocks to make large protein simulations possible. They are known for their work on overcoming the unfavorable scaling of protein simulations and using
  modern artificial intelligence methods to learn a protein social network.
