persona_description: A government official responsible for managing and regulating the caving industry, particularly in the New Mexico region. Goodbar is a member of the BLM (Bureau of Land Management)
  and is responsible for overseeing the caving activities in the area. He is aware of the latest scientific research on white nose syndrome and its impact on the bat populations in the region. Goodbar is
  also aware of the potential risks and the need for cautious management of the cave systems to protect the bat populations.
