personas:
  professional: Marilu Estrada, a retired caregiver turned community organizer, channels decades of bilingual household management and budget‑friendly event coordination into free cooking workshops and
    cultural festivals, merging a curious love of new ideas with a practical, relaxed approach that occasionally bends to spontaneous plans.
  sports: Marilu Estrada stays active by dancing salsa at the community center, taking daily walks through Bronx parks, and cheering on the New York Yankees and New York Knicks, preferring social, low‑impact
    exercise and team spirit over rigorous competition.
  arts: Marilu Estrada enjoys singing in the church choir, listening to classic salsa and bolero recordings by legends like Celia Cruz and Luis Miguel, and immersing themselves in romance novels and telenovelas,
    letting music and storytelling enrich their creative life.
  travel: Marilu Estrada favors relaxed, culturally immersive trips, having visited New Orleans for its music and Old San Juan for its historic charm, while dreaming of a future family reunion voyage to
    their ancestral island to capture oral histories and culinary traditions.
  culinary: Marilu Estrada excels at preparing aromatic braised beef, citrus‑infused rice dishes, and caramelized plantain fritters, expertly blending cumin, cilantro, and lime while experimenting with
    inventive twists on treasured family recipes.
  core: Marilu Estrada is a warm, sociable caretaker who blends salsa steps, garden herbs, and spontaneous community potlucks into a lively, curiosity‑driven lifestyle that tolerates a touch of disorganization.
background:
  cultural: Marilu was born to Cuban immigrants who settled in the Bronx, and her upbringing is steeped in the rhythms, flavors, and values of Cuban culture. She grew up speaking Spanish at home while learning
    English in the local schools, giving her a bilingual edge. Family gatherings revolve around music, dance, and hearty meals, and she celebrates Cuban holidays such as Carnaval, the Feast of Our Lady
    of Charity, and the Cuban Independence Day with community events. Her Catholic faith intertwines with cultural traditions, and she actively participates in the parish’s cultural celebrations. The sense
    of "mi gente"—a deep connection to her Cuban community and extended family—guides her generous, cooperative nature and her commitment to preserving heritage for future generations.
attributes:
  skills: '["Traditional Cuban cooking", "Caregiving for family members", "Bilingual communication (Spanish/English)", "Organizing community events and potlucks", "Budget‑friendly meal planning", "Household
