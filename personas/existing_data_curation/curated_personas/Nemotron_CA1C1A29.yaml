  hobbies: '["Salsa and merengue dancing", "Traditional Cuban cooking", "Balcony herb gardening", "Church choir and outreach", "Walking in Bronx parks", "Reading romance novels", "Watching telenovelas",
    "Knitting", "Bingo nights", "Neighborhood block parties"]'
  career_goals: Although retired, Marilu aspires to continue contributing to her community by leading free cooking workshops at the local senior center, preserving and teaching Cuban culinary heritage to
    younger generations. She hopes to become a mentor for new immigrants and teenage volunteers, helping them navigate life in the Bronx. Marilu plans to volunteer as a coordinator for cultural festivals
    that celebrate Cuban traditions, and she dreams of organizing a family reunion trip back to Cuba to document oral histories and family recipes for future generations. Maintaining her health and independence,
    she also aims to stay active through regular dance classes and weekly walks in nearby parks.
