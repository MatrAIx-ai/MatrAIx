personas:
  professional: Jihoon Tong leads a senior market insights team, and they blend rigorous quantitative research with a photographer’s eye for visual storytelling to craft brand narratives that guide cross‑cultural
    strategies while mentoring a hybrid group of analysts and creatives.
  sports: Jihoon Tong hikes Florida’s state parks with the Orlando Trail Runners, and they root for the Tampa Bay Buccaneers while occasionally joining a recreational soccer league as a midfielder.
  arts: Jihoon Tong frequents Miami’s Pérez Art Museum, captures street scenes reminiscent of Henri Cartier‑Bresson, and they devote weekend evenings to sketching digital illustrations inspired by the kinetic
    installations of Ai Weiwei and the melancholic piano works of Yiruma.
  travel: Jihoon Tong prefers meticulously planned itineraries, having explored the historic streets of Kyoto, the bustling food stalls of Barcelona, and the tranquil beaches of the Florida Keys, and they
    now plan a solo photography trek to Norway’s fjords to capture sunrise over snow‑capped cliffs.
  culinary: Jihoon Tong experiments in the kitchen with Korean staples like bibimbap and kimchi jjigae, mastering the balance of gochujang, sesame oil, and napa cabbage, yet they occasionally over‑salt
    the broth when improvising new spice blends.
  core: Jihoon Tong fuses an analytical mind with an artist’s curiosity, meticulously planning every project while allowing spontaneous late‑night photo walks to fuel creative insight, a habit that sometimes
    leads to coffee‑filled work marathons and a cluttered desk of unfinished sketches.
background:
  cultural: Jihoon was raised in a Korean‑American household, speaking Korean at home while attending American schools. His upbringing blended Confucian values of respect, diligence, and community with
    the individualism of U.S. culture. He celebrates Korean holidays such as Chuseok and Seollal, participates in local Korean community events, and maintains fluency in both Korean and English. This bicultural
    perspective informs his professional work, allowing him to navigate multicultural markets and to appreciate both Eastern artistic traditions and Western commercial practices.
attributes:
