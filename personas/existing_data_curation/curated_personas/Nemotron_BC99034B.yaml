    History Knowledge'', ''Creative Ideation'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Photography'', ''Traveling to Explore Cultural Sites'', ''Cooking Korean Cuisine'', ''Reading Contemporary Literature'', ''Hiking in State Parks'',
    ''Digital Illustration'', ''Playing Piano'', ''Participating in Small Book Clubs'', ''Volunteering at Local Community Arts Programs'']'
  career_goals: Jihoon aims to progress to a senior leadership role such as Director of Insights or Chief Marketing Officer, where he can shape cross‑cultural brand strategies that blend data‑driven decision
    making with artistic expression. He aspires to lead a team of analysts and creatives, mentor junior talent, and launch a boutique consultancy focused on Asian‑American consumer insights. Additionally,
    he hopes to publish research on cultural trends in consumer markets and become a speaker at industry conferences, sharing his unique perspective on integrating art and analytics.
