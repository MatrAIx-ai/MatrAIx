personas:
  professional: Freddy Salazar, though only an infant, follows a meticulously timed schedule of sensory play and quiet observation that hints at a future as a diligent research scientist who will apply
    calm, methodical analysis to complex problems.
  sports: Freddy Salazar participates in weekly parent‑baby water fitness sessions that enhance motor development, enjoys watching the local baseball team, the Seattle Mariners, with family on weekend mornings,
    and looks forward to a future enrollment in toddler gymnastics.
  arts: Freddy Salazar is soothed and intrigued by the gentle cello melodies of Yo‑Yo Ma, the whimsical illustrations of Eric Carle’s "The Very Hungry Caterpillar," and the melodic lullabies of Johann Sebastian
    Bach, nurturing an early appreciation for visual and musical arts.
  travel: Freddy Salazar’s early travels include a serene beach stay in Maui and a spring excursion to the Grand Canyon, both meticulously planned around feeding and nap schedules to ensure a relaxed, family‑focused
    journey.
  culinary: Freddy Salazar’s diet consists primarily of breastmilk, supplemented with pureed carrots, sweet potatoes, and ripe pear slices, reflecting a preference for natural sweetness and smooth textures.
  core: Freddy Salazar’s newborn calmness, innate curiosity, and structured routines forge a foundation for a life of peaceful exploration and methodical growth.
background:
  cultural: Freddy is raised in a Guatemalan‑American household in Raleigh, North Carolina, where both Spanish and English are spoken daily. His family maintains cultural traditions such as celebrating
    Día de los Muertos, preparing dishes like tamales and pepian, and listening to marimba and folk music. These customs foster a strong sense of familial loyalty, respect for elders, and pride in his heritage,
    shaping his worldview and informing his creative pursuits.
