  career_goals: Freddy aspires to blend his love for art and community by pursuing a future career as a graphic designer or cultural arts coordinator. He dreams of creating visual storytelling that honors
    his Guatemalan heritage while engaging diverse audiences. Over time, he also envisions a role in education or community outreach, using his calm demeanor and organizational strengths to mentor younger
    students and promote cultural awareness.
