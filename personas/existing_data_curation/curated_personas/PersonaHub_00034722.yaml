persona_description: A virologist and researcher who specializes in HIV cure research and has recently shifted his focus to researching the coronavirus. He is a senior virologist at the Gladstone Institutes
  in San Francisco, California, and a senior investigator with a focus on HIV cure research. He is also a bigger college basketball fan than he is a college football fan, particularly a fan of Stanford.
  He has spent over 25 years focusing on HIV and recently had to shift his laboratory focus to researching the coronavirus. He is a key figure in the discussion about the safety of college football programs
  during the COVID-19 pandemic.
