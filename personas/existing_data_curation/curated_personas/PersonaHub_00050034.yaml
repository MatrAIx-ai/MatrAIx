persona_description: A business owner or manager who is responsible for overseeing the protection of confidential, accurate, and available information within their organization. This person is committed
  to the effective implementation and maintenance of information security measures, as well as the understanding and application of administrative, physical, and technical controls. They are aware of the
  importance of confidentiality, integrity, and availability in their business operations and are proactive in addressing any potential risks to these aspects. This person understands the role of senior
  management in promoting and supporting information security initiatives, and is actively involved in the risk management process.
