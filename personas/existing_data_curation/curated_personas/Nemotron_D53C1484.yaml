personas:
  professional: Angel Orozco is a field technician specializing in radio and telecommunications equipment, leveraging strong troubleshooting, spectrum analysis, and FCC compliance skills while balancing
    a love for structured documentation with a laid‑back approach to on‑site scheduling, and they aim to earn the General Radiotelephone Operator License within three years to lead a small installation
    team.
  sports: Angel Orozco enjoys hiking the Santa Ana National Wildlife Refuge and birdwatching as a solo fitness routine, joins occasional pickup soccer games at a community field affiliated with the local
    professional soccer club, and they cheer on the Dallas Cowboys during football season while preferring flexible, low‑key workouts over regimented gym classes.
  arts: Angel Orozco listens to Lila Downs’ folk ballads and Bad Bunny’s contemporary Latin pop while attending intimate art fairs featuring traditional papel picado displays, and they often recite poetry
    from modern authors in their bilingual book club, finding creative inspiration in the blend of heritage rhythms and modern beats.
  travel: Angel Orozco prefers spontaneous weekend road trips to the Hill Country vineyards or the desert towns of New Mexico, dreams of a cultural pilgrimage to a historic colonial town across the border
    known for its vibrant markets, and they navigate travel planning with a modest budget, favoring immersive, low‑key experiences over luxury resorts.
  culinary: Angel Orozco, an avid home‑cook, masters tamales filled with seasoned pork and simmered mole poblano flavored with chiles pasilla, chocolate, and cinnamon, enjoys experimenting with ingredients
    like huitlacoche and epazote, yet they often improvise on the fly, leading to both delicious discoveries and occasional kitchen messes.
  core: Angel Orozco is a quietly driven tech enthusiast who balances meticulous circuitry work with solitary hikes, spontaneous music sessions, and a habit of juggling messy schedules while maintaining
    a warm, community‑focused spirit.
background:
  cultural: Angel is a second‑generation Mexican‑American from Edinburg, Texas. Raised in a bilingual household, she fluently speaks both Spanish and English and embraces cultural traditions such as Día
    de los Muertos, Mexican holidays, and family gatherings that emphasize community and harmony. Her Catholic upbringing and close ties to the border region shape her values of cooperation, respect for
    elders, and a strong sense of belonging to both her Mexican heritage and the broader Texas community.
attributes:
  skills: '[''Installation and maintenance of radio/telecommunications equipment'', ''RF signal troubleshooting and spectrum analysis'', ''Cable termination and splicing (coaxial and fiber optic)'', ''Reading
    and interpreting technical schematics'', ''Use of hand and power tools (drill, crimping, soldering)'', ''Compliance with FCC regulations and safety standards'', ''Basic networking concepts (Ethernet,
    IP addressing)'', ''Customer communication and service documentation'', ''Systematic field work documentation'', ''Time management and adaptable problem solving'']'
  hobbies: '[''Listening to Mexican folk and Latin pop music'', ''Cooking traditional Mexican dishes'', ''Solo hiking and birdwatching in local nature reserves'', ''Gardening and maintaining a vegetable
    plot'', ''Reading technical magazines and DIY repair forums'', ''Participating in a small bilingual book club'', ''Volunteering at community food drives'']'
  career_goals: Angel aims to earn the General Radiotelephone Operator License (GROL) and become a senior field technician within the next three years. She hopes to lead a small team of installers, specialize
    in fiber‑optic deployments, and eventually start her own boutique telecommunications service that offers reliable installations for rural Texas communities while maintaining a balance between structured
    processes and flexible client needs.
