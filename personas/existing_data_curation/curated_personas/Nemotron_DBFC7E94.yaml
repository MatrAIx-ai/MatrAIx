  hobbies: '["Abstract painting", "Photography", "Reading science fiction and popular science", "Maker‑space projects (electronics, 3D printing)", "Hiking and nature walks", "Heirloom gardening", "Journaling
    and mindfulness", "Volunteering at community art programs"]'
  career_goals: Shannon aims to move from senior HR specialist to strategic HR director, leading a forward‑thinking HR function that integrates AI‑driven talent management and cultivates a culture of creativity
    and continuous learning. She aspires to become a recognized thought leader in innovative HR practices, eventually launching her own consultancy that helps organizations fuse data analytics with artistic
    approaches to employee well‑being. Mentoring the next generation of HR professionals—especially women navigating career transitions—remains a central long‑term ambition.
