  hobbies: '["Abstract painting", "Digital illustration", "Speculative fiction reading", "Poetry writing", "Photography (urban and nature)", "Attending gallery openings", "Indie music concerts", "Escape
    room challenges", "Minimalist home organization", "Virtual reality art experiments"]'
  career_goals: Susan aims to turn her imaginative vision and disciplined work ethic into a career as a creative director or UX/UI designer within an innovative agency or tech startup. In the next five
    years she plans to complete a bachelor's degree in Graphic Design, develop a professional portfolio that showcases experimental visual projects, and secure a senior design role where she can lead cross‑functional
    teams. Long‑term, she aspires to launch her own boutique studio that fuses abstract art with interactive digital experiences, earning recognition as a thought‑leader in the Gulf Coast creative community
    and winning regional design awards.
