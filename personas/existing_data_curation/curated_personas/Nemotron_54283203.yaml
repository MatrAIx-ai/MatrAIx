personas:
  professional: Susan Farmer, a 23‑year‑old visual communicator with an associate’s degree, channels their meticulous organization and competitive drive into crafting pixel‑perfect UI mockups and experimental
    brand concepts, positioning themselves for a future creative director role at a forward‑thinking tech startup.
  sports: Susan Farmer, a casual beach‑volleyball enthusiast and member of the Gulf Coast Rock‑Climbing Club, tracks the Miami Heat and New Orleans Saints for seasonal excitement, and integrates short,
    high‑intensity interval workouts into their weekly routine to boost creative stamina.
  arts: Susan Farmer, who curates digital collections on Behance and draws inspiration from abstract pioneer Wassily Kandinsky and contemporary media artist Refik Anadol, regularly attends gallery openings
    at the Gulf Art Collective, indie shows featuring Snail Mail, and stages poetry readings echoing the surreal tones of Ocean Vuong.
  travel: Susan Farmer, an organized wanderer, plans concise weekend escapes to New Orleans for its jazz and culinary scene, a solo trip to Reykjavik to photograph ice caves, and dreams of a month‑long
    immersion in Kyoto’s traditional tea houses, always booking low‑cost flights and using travel budgeting apps to keep expenses in line with their creative fund.
  culinary: Susan Farmer, a minimalist home cook, favors Gulf‑fresh shrimp scampi with lemon‑infused olive oil, crafts quinoa salads laced with avocado and toasted pine nuts, and experiments with charcoal‑black
    pasta for visual impact, while refusing fast‑food chains and insisting on locally sourced, organic produce.
  core: Susan Farmer is a fiercely organized, imagination‑driven visual artist who balances relentless career ambition with a love for abstract experimentation, occasionally splurging on cutting‑edge tech
    while obsessively tracking every minute of their day.
background:
  cultural: Born and raised in Beaumont, Texas, Susan’s cultural background reflects a mix of Southern hospitality, Gulf Coast traditions, and a modest working‑class upbringing. Family gatherings often
    centered around community events such as high‑school football tailgates, church potlucks, and local Juneteenth celebrations, instilling values of hard work, perseverance, and communal support. The city’s
    proximity to the petrochemical industry and the nearby coastal environment have shaped her appreciation for both industrial resilience and natural beauty. Exposure to Texan cuisine—seafood boils, barbecue,
    and comfort foods—alongside the multicultural influences of Hispanic and African‑American neighbors broadened her perspective on artistic expression and community life.
attributes:
  skills: '["Graphic design (Adobe Photoshop, Illustrator, InDesign)", "Digital illustration", "Photography", "Creative writing", "Project planning and coordination", "Time management", "Research and analysis",
