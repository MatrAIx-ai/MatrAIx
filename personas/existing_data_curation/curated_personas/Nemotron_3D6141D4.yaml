personas:
  professional: An inquisitive 12-year-old named Alexander Mcfarland channels their love for drawing and programming into a budding role as a junior robotics club member, where they design LEGO-based mechanisms,
    code simple Scratch games, and apply methodical planning with a flair for unconventional problem-solving.
  sports: A 12-year-old named Alexander Mcfarland delights in weekend hikes through Snake River Canyon, they cheer on the Boise State Broncos football team every Saturday, support the Boise Hawks minor-league
    baseball club, and occasionally join the youth soccer league at Boise Soccer Academy, balancing an outdoor endurance drive with enthusiastic team fandom.
  arts: A 12-year-old named Alexander Mcfarland dives into creative expression by sketching canyon vistas in the style of Ansel Adams, they idolize graphic-novel masters Jim Lee and Mike Mignola, strum
    acoustic renditions of Taylor Swift's 'Shake It Off' and The Beatles' 'Here Comes the Sun', and eagerly attend community art fairs featuring local painter Sarah Monroe, letting these influences shape
    both their comic-book storytelling and weekend soundtrack.
  travel: A 12-year-old named Alexander Mcfarland has trekked to Yellowstone National Park with family and explored Seattle's museums on a school trip, they day-dream about a future adventure to Kyoto's
    historic streets, and keep a scrapbook of postcards from the Boise tourism booth, balancing a curiosity for natural wonders with a love for urban pop-culture sites.
  culinary: A 12-year-old named Alexander Mcfarland enjoys mastering buttery mashed Idaho potatoes with chives, whipping up homemade pizza topped with pepperoni, pineapple, and extra mozzarella, and crafting
    trail-mix snacks of almonds, dried cranberries, and chocolate chips, yet they often forget to clean up the kitchen after enthusiastic cooking sessions.
  core: An organized yet curious 12-year-old named Alexander Mcfarland blends sketchbooks, LEGO bricks, and Scratch code into a hobby-rich life, they occasionally hoard rocks in their backpack, procrastinate
    on bedtime, and burst into spontaneous guitar riffs while day-dreaming about future inventions.
background:
  cultural: Alexander comes from a middle‑class family rooted in the agricultural and small‑town culture of Nampa, Idaho. His upbringing reflects the region’s values of self‑reliance, community involvement,
    and appreciation for the outdoors. Family traditions include attending the annual Canyon County Fair, weekend trips to local state parks, and celebrating holidays with community potlucks and church
    gatherings. The local school emphasizes hands‑on learning, which has nurtured his curiosity in STEM and the arts. While his household is predominantly white and reflective of the broader demographic
    of the area, Alexander’s school exposes him to a modest diversity of peers, fostering an openness to different perspectives. The blend of rural Idaho heritage, a supportive community network, and access
    to nearby cultural institutions like the Boise Art Museum informs his worldview and inspires his creative pursuits.
attributes:
  skills: '[''Organizational planning'', ''Detailed notebook keeping'', ''Basic robotics building'', ''Scratch programming'', ''LEGO Mindstorms construction'', ''Traditional drawing'', ''Digital illustration'',
