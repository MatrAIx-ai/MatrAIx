  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Scratch programming'', ''Reading sci‑fi/fantasy novels'', ''Writing short stories'', ''Hiking local trails'', ''Birdwatching'', ''Rock collecting'',
    ''Robotics club participation'', ''Volunteering at community art events'', ''Playing acoustic guitar'']'
  career_goals: Alexander envisions a future where he can merge his love for art, technology, and community. He dreams of becoming an architect or a video‑game designer who creates immersive, environmentally‑friendly
    spaces and interactive experiences for kids. He is also fascinated by sustainable design and hopes to study engineering or environmental science to help build greener playgrounds and public areas in
    Nampa. In the short term, he plans to deepen his coding skills, take advanced art classes, and seek mentorship through a local youth STEM program, laying the groundwork for a career that blends creativity
    with practical problem‑solving.
