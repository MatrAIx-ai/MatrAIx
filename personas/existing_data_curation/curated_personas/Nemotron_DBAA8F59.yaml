  hobbies: '[''Church choir singing'', ''Community gardening'', ''Senior center bingo and games'', ''Knitting and crocheting'', ''Quilting'', ''Cooking soul food for potlucks'', ''Walking in local parks'',
    ''Listening to gospel and jazz music'', ''Watching classic sitcoms'']'
  career_goals: As she approaches retirement, Florita aims to secure a more stable, part-time supervisory position that leverages her decades of hands-on cleaning experience while allowing her to mentor
    younger workers. She plans to complete a short-term certification in home health aide or certified housekeeper to broaden her service offering. Ultimately she hopes to launch her own modest cleaning
    business focused on serving senior clients in Rochester, providing reliable, trustworthy care and generating supplemental income for her later years. She also wishes to reduce her own stress by establishing
    a predictable schedule and building a supportive professional network.
