persona_description: A theoretical physicist who specializes in the study of quantum mechanics, specifically the symmetrization postulate and its implications for the behavior of identical particles in
  two dimensions. He is known for his work on deriving the symmetrization postulate using an information-theoretic approach that does not involve labeling the electrons, and for his critique of previous
  attempts to understand the symmetrization postulate. He is also interested in the experimental phenomena known as the fractional quantum Hall effect, and how it relates to the symmetrization postulate.
  He is a strong advocate for the importance of understanding the symmetrization postulate in basic chemistry and star formation.
