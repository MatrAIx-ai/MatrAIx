  career_goals: Although retired, Citlali aims to share her expertise by mentoring young entrepreneurs in her community, offering free workshops on budgeting and tax basics. She is also working on a family
    cookbook that blends traditional Mexican recipes with modern twists, hoping to publish it locally. Additionally, she aspires to travel to her hometown in Veracruz to reconnect with her roots, while
    maintaining a stable routine that respects her need for predictability.
