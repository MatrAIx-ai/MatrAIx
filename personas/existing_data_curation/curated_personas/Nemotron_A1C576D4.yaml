personas:
  professional: Citlali Sanborn, a retired financial manager renowned for meticulous budgeting and tax preparation, leverages their analytical precision and competitive negotiation style to mentor budding
    entrepreneurs through free workshops at Chicago’s community centers.
  sports: Citlali Sanborn enjoys cheering for the Chicago White Sox and Chicago Bulls, participates in a senior walking club that meets weekly in Grant Park for low‑impact exercise, and occasionally plays
    traditional pelota during community festivals in the summer.
  arts: Citlali Sanborn immerses themselves in the paintings of Frida Kahlo and the poetry of Octavio Paz, attends local Día de los Muertos art showcases, and occasionally joins a small acoustic group to
    play the accordion at neighborhood gatherings.
  travel: Citlali Sanborn dreams of returning to Veracruz to wander the waterfront market stalls of their childhood, while also favoring weekend trips to New Orleans for jazz festivals and quiet drives
    along the Lake Michigan shoreline for reflection.
  culinary: Citlali Sanborn is a master of tamales, mole negro, and ceviche, cultivates cilantro, oregano, and lime in a modest indoor garden to ensure fresh flavor, and delights in experimenting with pineapple‑infused
    mole, though they sometimes over‑salt dishes when excitement takes hold.
  core: Citlali Sanborn is a structured yet spontaneous 71‑year‑old who balances meticulous financial mentoring with a love for traditional cooking, a skeptical eye on others, a habit of meticulous record‑keeping,
    and a penchant for gardening, chess, and community festivals.
background:
  cultural: Citlali was born in Veracruz, Mexico, and moved to Chicago with her family at age eight. Raised in a bilingual household, she retained strong ties to Mexican customs, Catholic traditions, and
    a communal sense of family responsibility. Living in Chicago's vibrant Pilsen neighborhood, she engages with the local Mexican-American community, celebrating holidays like Día de los Muertos, Navidad,
    and Cinco de Mayo with traditional foods, music, and altars. Her cultural identity blends the richness of Mexican heritage with the multicultural dynamics of urban Chicago.
