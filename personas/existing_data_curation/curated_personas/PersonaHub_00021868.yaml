persona_description: A concerned environmental activist and advocate for responsible fishing practices. Alexandra Morton, a member of the Raincoast Research Society, is passionate about protecting the environment
  and the health of fish populations. She supports the testing of fish off the coast of British Columbia for radiation stemming from the Fukushima nuclear disaster in Japan, but believes it is a political
  move and calls for more responsible and immediate action to address the issue. Morton is particularly concerned about the wide-ranging migration patterns of salmon, which can take them right across the
  Pacific Ocean to the coast of Japan, and believes that the testing should have been conducted earlier.
