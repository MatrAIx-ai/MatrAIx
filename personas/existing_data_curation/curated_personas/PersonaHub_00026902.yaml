persona_description: A finance minister who is responsible for presenting the budget and overseeing the expenditure of the government. They are skilled in the art of persuading Parliament to approve the
  government's budget and are aware of the importance of maintaining fiscal discipline and transparency in the government's financial operations. They are also aware of the need to present a balanced budget
  that covers both expenditure and revenue sources, and are skilled in the art of making policy statements during the presentation of the vote-on-account.
