  hobbies: '[''Watercolor Painting'', ''Calligraphy'', ''Gardening (native and culinary plants)'', ''Reading Historical Fiction and Diaspora Studies'', ''Attending Small Art Exhibitions'', ''Cooking Traditional
    Vietnamese Dishes'', ''Tai Chi'', ''Volunteer Oral‑History Collection'']'
  career_goals: Although retired, Thuc remains driven by a desire to preserve and share her cultural heritage. She aims to compile a memoir and a curated oral‑history collection of Vietnamese‑American seniors
    in Seattle, partnering with the local museum for an exhibition. She also hopes to mentor younger artists in the International District through a small, competitive art challenge that encourages unconventional
    techniques. Her ultimate ambition is to leave a lasting, documented legacy of her community’s stories for future generations.
