personas:
  professional: Thuc Potter, a retired anthropology‑trained oral‑history curator, leverages their meticulous research and bilingual fluency to document senior narratives through digital photography, producing
    nuanced museum exhibitions while balancing disciplined project planning with a willingness to experiment with unconventional presentation formats, ensuring they can adapt quickly to new curatorial ideas.
  sports: Thuc Potter stays active through a weekly Tai Chi class at the neighborhood community center, joins a leisurely senior walking group that circles Lake Washington, and they follow Seattle’s Seahawks,
    Mariners, Sounders FC, and Kraken with a quiet enthusiasm that blends personal fitness with local team pride.
  arts: Thuc Potter, a watercolor enthusiast, draws inspiration from the misty palettes of J.M.W. Turner and the subtle lyricism of Claude Monet while integrating the bold minimalism of contemporary artist
    Ai Weiwei into their calligraphy, and they regularly attend gallery openings featuring Seattle‑based creators such as Lucia Willen and listen to the ambient compositions of Philip Glass and Kitaro.
  travel: Thuc Potter favors carefully planned, small‑group cultural tours that blend leisurely garden strolls with historic immersion, having explored Kyoto’s ancient temples, Sedona’s red rock vistas,
    Banff’s alpine lakes, and the geothermal wonders of New Zealand while maintaining a modest travel budget that accounts for mobility accommodations, ensuring they can comfortably manage any journey.
  culinary: Thuc Potter, an accomplished home chef, delights in preparing aromatic phở broth, meticulously rolled gỏi cuốn, and traditional bánh chưng layered with lemongrass, Thai basil, and caramelized
    mung beans, often hosting small dinner gatherings where they meticulously balance flavors yet occasionally indulge in second servings out of sheer culinary enthusiasm.
  core: Thuc Potter blends a lifelong curiosity for cultural preservation with a disciplined, yet quietly experimental, approach to art and community, and they have a habit of over‑seasoning dishes while
    hoarding rare calligraphy ink.
background:
  cultural: Thuc Bich Potter is a first‑generation Vietnamese‑American who arrived in Seattle with her family as a child following the aftermath of the Vietnam War. Growing up in the city’s International
    District, she was immersed in both Vietnamese traditions—such as Tet celebrations, bánh chưng making, and folk music—and the progressive, environmentally conscious culture of the Pacific Northwest.
    Her educational journey included studies in anthropology and art history at a local college, where she cultivated a critical, skeptical lens toward cultural narratives. Even after a divorce, she maintained
    close ties to her heritage through community involvement, bilingual communication, and preserving family stories. Her cultural identity blends the resilience and communal values of her Southeast Asian
    roots with Seattle’s emphasis on individuality, lifelong learning, and artistic experimentation.
