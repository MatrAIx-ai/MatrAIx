personas:
  professional: Michael Bernard, a three-year-old with an insatiable curiosity, spends hours constructing elaborate block cities, negotiates play rules with friends, and spontaneously invents new games,
    reflecting a flexible, cooperative yet assertively creative mindset that hints at future pursuits in design or engineering.
  sports: Michael Bernard, a three-year-old who attends toddler gymnastics class on Tuesdays, plays in a community preschool soccer league with the Tiny Tots FC, and watches the Chicago Cubs on TV, approaches
    fitness through imaginative play and occasional bursts of energy, balancing social interaction with periods of quiet rest in the sandbox.
  arts: Michael Bernard, a three-year-old who spends afternoons coloring Dr. Seuss illustrations, dancing to the whimsical tunes of The Wiggles, and humming the theme of Sesame Street, shows a genuine appreciation
    for varied artistic expressions and uses these creative outlets to explore new ideas.
  travel: Michael Bernard, a three-year-old who has explored the city zoo, enjoyed a weekend beach trip to the nearby shoreline, and dreams of a future adventure to Disney World in Florida, prefers short
    car rides with frequent snack stops and delights in spotting playgrounds at every rest area.
  culinary: Michael Bernard, a three-year-old who loves crunchy apple slices, cheesy macaroni, and peanut butter and honey sandwiches, can proudly spread peanut butter on toast with a child-sized knife,
    yet often makes a mess of the kitchen and insists on a splash of ketchup on everything.
  core: Michael Bernard, a curious three-year-old who mixes block-building with sticker trading, forgets to brush teeth after playtime, and insists on a bedtime story featuring dragons.
background:
  cultural: Michael was born and raised in Indianapolis, Indiana, within a family of white Midwestern ancestry. His upbringing reflects typical Midwestern values of friendliness, community involvement,
    and appreciation for local cultural institutions such as the Indianapolis Museum of Art and the Children's Museum. Family traditions include celebrating holidays like Thanksgiving and Christmas with
    shared meals, and participating in community events like the Indianapolis 500 parade. The local environment provides access to parks, libraries, and family-friendly educational programs that influence
    his curiosity and love for art.
