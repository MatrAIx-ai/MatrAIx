  hobbies: '[''Herb gardening'', ''Tai chi'', ''Traditional cooking'', ''Historical reading'', ''Puzzle solving (Sudoku, crosswords)'', ''Model train building'', ''Birdwatching'', ''Listening to classical
    piano'']'
  career_goals: As he approaches retirement, Huichen aims to formalize his decades of experience by earning the Certified Public Safety Telecommunicator (CPT) credential and authoring a comprehensive SOP
    manual for the Orlando dispatch center. He aspires to transition into a part‑time trainer role, guiding new dispatchers in best practices and fostering a culture of reliability. Additionally, he wishes
    to volunteer with local community emergency preparedness programs, sharing practical safety knowledge with senior citizens and non‑English‑speaking residents.
