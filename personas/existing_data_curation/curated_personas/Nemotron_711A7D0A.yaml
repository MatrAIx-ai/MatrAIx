personas:
  professional: Fern Hurtado, a seasoned police detective with advanced investigative interviewing and artistic crime‑scene rendering skills, they blend meticulous evidence documentation with creative problem‑solving,
    channeling their vivid imagination into community‑focused liaison work.
  sports: Fern Hurtado enjoys seasonal hiking on the Ozark trails, practices yoga twice weekly for flexibility, follows the St. Louis Cardinals and Kansas City Chiefs, and they volunteer with the local
    senior walking club, combining low‑impact exercise with community engagement.
  arts: Fern Hurtado paints pastoral landscapes inspired by Ansel Adams and Georgia O’Keeffe, captures community events through photography reminiscent of Dorothea Lange, writes speculative short stories
    echoing Ursula Le Guin, and they perform in the Osage County Community Theater alongside local folk musician Sarah Jones.
  travel: Fern Hurtado prefers road trips that blend scenic drives through the Ozarks with visits to historic towns such as Hermann, Missouri, and Santa Fe, New Mexico, they plan trips months ahead yet
    occasionally yield to spontaneous weekend getaways to nearby state parks, balancing a modest travel budget with a love for cultural immersion.
  culinary: Fern Hurtado is a competent home cook who delights in hearty Midwestern fare like pan‑fried catfish with buttermilk, cornbread, and apple crisp, skillfully seasoning dishes with locally sourced
    heirloom tomatoes and sweet corn, and they confess a weak spot for indulgent chocolate brownies after theater performances.
  core: Fern Hurtado is a veteran detective who fuses investigative rigor with artistic flair, channeling Midwestern community values into creative outreach while juggling a love of hiking, theater, and
    occasional indulgent desserts, and they never miss a chance to mentor younger officers.
background:
  cultural: Fern was raised in a Midwestern white family with deep roots in Missouri’s rural communities. Her upbringing reflected a blend of traditional Midwestern values—hard work, community service,
    and modesty—combined with an appreciation for the arts fostered by her parents’ involvement in local cultural events. Growing up in Osage County, she developed a strong connection to the region’s natural
    landscapes and history, which informs both her policing approach and her creative pursuits. While her religious background is loosely affiliated with Protestant traditions, she identifies primarily
    through her community ties, valuing civic duty, hospitality, and collective well‑being.
attributes:
  skills: '[''Investigative interviewing'', ''Crisis negotiation'', ''Crime scene documentation and sketching'', ''Community policing'', ''Leadership and training'', ''Firearms proficiency'', ''De‑escalation
