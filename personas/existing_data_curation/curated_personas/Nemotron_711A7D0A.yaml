  hobbies: '[''Painting'', ''Photography'', ''Speculative fiction reading'', ''Short story writing'', ''Community theater'', ''Hiking'', ''Yoga'', ''Historical society volunteering'', ''Gardening'', ''Attending
    craft fairs'']'
  career_goals: Fern aims to transition into a senior detective role focused on community liaison, where she can combine her policing experience with her creative strengths to develop innovative outreach
    programs. She also hopes to lead training workshops on de‑escalation and creative problem‑solving for younger officers, and eventually serve as a consultant for law‑enforcement agencies seeking to improve
    community relations. In the longer term, she envisions establishing a local art‑and‑safety community hub that engages youth in creative projects while promoting public safety awareness.
