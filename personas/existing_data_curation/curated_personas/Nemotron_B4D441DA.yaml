  hobbies: '["Sketching", "Acrylic painting", "Mixed‑media collage", "Street photography", "Gallery visits", "Live music concerts", "Campus dance club", "Yoga", "Meditation", "Reading contemporary fiction",
    "Reading philosophy", "Reading art history", "Volunteering art workshops", "Beachcombing", "Cooking experimental dishes"]'
  career_goals: She aims to pursue a career that merges her passion for art with her organizational talent. Over the next five years, Kelcie plans to complete a bachelor's degree in Museum Studies or Arts
    Administration, secure an internship at a local museum or cultural nonprofit in Wilmington, and eventually become a museum curator or community arts program director. She also envisions creating a youth
    arts outreach program that brings contemporary art workshops to underserved neighborhoods, and hopes to develop expertise in grant writing to fund such initiatives.
