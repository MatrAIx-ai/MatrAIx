personas:
  professional: Kelcie Burdett, a 19‑year‑old museum studies major, merges her organized, methodical nature with an insatiable curiosity to curate immersive pop‑up exhibitions on campus, wielding Adobe
    Photoshop and Illustrator alongside Trello to blend scholarly research, striking visual design, and flawless event logistics, while they constantly replay potential critiques in their mind, obsessively
    checking every caption for accuracy.
  sports: Kelcie Burdett follows the Wilmington Blue Rocks minor‑league baseball team and the Philadelphia Eagles with weekend enthusiasm, participates in their campus dance club’s high‑energy rehearsals,
    adds morning jogs along the Christina River and occasional intramural volleyball to stay fit, and they log each activity on a smartwatch to ensure a balanced, modest fitness regimen despite occasional
    burnout.
  arts: Kelcie Burdett draws creative fuel from Yayoi Kusama’s Infinity Rooms, Banksy’s politically charged street murals, and the atmospheric soundscapes of The War on Drugs, often sketching beside the
    river while they listen to their albums, and channels that inspiration into mixed‑media collages and digital illustrations that blend contemporary art theory with personal narrative.
  travel: Kelcie Burdett prefers meticulously planned art‑centric trips, having already explored the Museum of Modern Art in New York, the vibrant street‑art districts of Berlin, and Asheville’s curated
    mural walk, yet they dream of a summer residency in Barcelona’s El Raval to study urban creativity, balancing these aspirations with a limited student budget that confines travel to semester breaks.
  culinary: Kelcie Burdett enjoys crafting avocado‑lime sushi bowls, mastering a spicy kimchi fried rice recipe, and experimenting with sumac‑spiced roasted carrots, cooking at an intermediate level in
    their tiny dorm kitchen while occasionally splurging on artisanal cheese plates at local farm‑to‑table pop‑ups, and they always keep a stash of matcha powder for calming ritual tea breaks.
  core: Kelcie Burdett is a curiosity‑driven, meticulously organized 19‑year‑old whose relentless worry fuels an exhaustive hobby list—from curating campus art shows and teaching kids to paint, to juggling
    a strict budget, yoga practice, and a penchant for spontaneous concert tickets; they often double‑check plans even as they dive into the next creative project.
background:
  cultural: Kelcie grew up in a suburban neighborhood near Wilmington, North Carolina, in a family with deep Southern roots. Her upbringing blended traditional Southern hospitality—church gatherings, family
    barbecues, and a love of coastal outdoor life—with a progressive, college‑age exposure to diverse cultures and ideas. She identifies as a White American with a strong connection to the Lowcountry’s
    maritime heritage, while also embracing contemporary art and multicultural influences she encounters through her education and community involvement.
