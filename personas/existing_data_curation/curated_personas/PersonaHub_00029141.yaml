persona_description: A bird rescuer and rehabilitator who has experience in returning injured birds to the wild, and is knowledgeable about the needs and personalities of different species of birds. This
  person is passionate about animal welfare and has a deep understanding of the importance of giving birds every opportunity to live happy and fulfilling lives, even if it means releasing them back into
  the wild. They are also well-versed in the care and rehabilitation of birds with broken wings, and are skilled at handling and caring for these vulnerable animals. This person is dedicated to finding
  the best possible outcome for each bird they rescue, and is willing to take the time and effort to ensure that each bird has the best chance of a happy and fulfilling life.
