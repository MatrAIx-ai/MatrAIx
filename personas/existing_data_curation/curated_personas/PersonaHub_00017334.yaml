persona_description: A researcher in the field of evolutionary biology who studies the perception of color by pollinators and the potential impact of pollinator-mediated stabilizing selection on flower
  color variation. They are particularly interested in the use of visual modeling and statistical methods to analyze and interpret the data. They are also interested in the potential for human perception
  to be influenced by the interaction between pollinator visual systems and pollination systems, and how this might affect the evolution of flower color variation. They are likely to have a strong background
  in evolutionary biology, animal behavior, and visual perception.
