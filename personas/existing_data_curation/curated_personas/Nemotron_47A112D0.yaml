personas:
  professional: Jose Alcaraz, a frontline information clerk at the Mercer County community center, leverages their bilingual fluency, meticulous data‑entry proficiency, and quiet curiosity to streamline
    front‑desk operations while fostering a calm, courteous atmosphere for visitors.
  sports: Jose Alcaraz, an avid Appalachian trail hiker who joins a community running club for weekend hill sprints, also follows the West Virginia Mountaineers football team and cheers for the Pittsburgh
    Steelers on Sundays.
  arts: Jose Alcaraz, a member of a small book club at the Princeton public library, immerses themselves in historical non‑fiction, occasional poetry that echoes Mediterranean rhythms, and relaxes to classical
    guitar recordings while preparing traditional tapas.
  travel: Jose Alcaraz, a methodical planner who prefers low‑key escapes, has trekked the Blue Ridge Parkway, explored the historic streets of Charleston, SC, and is saving for a culinary pilgrimage to
    the sun‑lit island of Crete.
  culinary: Jose Alcaraz, a home‑cooking enthusiast, masters paella using locally sourced trout, fire‑roasted peppers, and saffron, pairs it with simple tapas like chorizo‑studded potatoes, and frequently
    experiments with Appalachian foraged mushrooms in their dishes.
  core: Jose Alcaraz, a quietly curious bilingual administrator, balances meticulous organization with a love for solitary puzzles, paella nights, and thoughtful community service while wrestling with a
    persistent habit of over‑worrying.
background:
  cultural: Jose was raised in a Spanish‑heritage household; his grandparents emigrated from Spain in the late 1970s, bringing with them a love for language, family gatherings, and Mediterranean cuisine.
    Growing up in Princeton, WV, he learned to blend these traditions with the region’s close‑knit community values. Bilingual from childhood, he often serves as an informal bridge between Spanish‑speaking
    relatives and his English‑speaking neighbors. While he celebrates Spanish holidays such as Semana Santa with modest family meals, he also participates in local Appalachian events like the Mercer County
    Fair, appreciating the shared emphasis on hospitality and community. This dual cultural perspective informs his courteous, inclusive approach to service and his desire to foster connections across diverse
    groups.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Data entry'', ''Scheduling and calendar management'', ''Office software proficiency (Microsoft Office, Google Workspace)'',
