personas:
  professional: Uriel Boffill is a senior quality inspector with two decades of experience in manufacturing, they blend meticulous statistical sampling, ISO 9001 and HACCP compliance expertise, and a vivid
    imagination that fuels creative problem‑solving for atypical measurement challenges while preparing for a Six Sigma Black Belt to lead a continuous‑improvement program.
  sports: Uriel Boffill follows the Cangrejeros de Santurce baseball team and the Capitanes de Arecibo basketball squad, participates in the local hiking club that treks the Cayey hills every other weekend,
    and plays pick‑up volleyball at the community center, balancing competitive spirit with community bonding.
  arts: Uriel Boffill channels their vivid imagination into abstract canvases inspired by tropical sunsets, draws inspiration from Frida Kahlo and Arnaldo Roche, enjoys the rhythmic bomba drums of La Casa
    del Son, and regularly visits the neighborhood art gallery to support emerging artists.
  travel: Uriel Boffill prefers meticulously planned trips that blend cultural immersion with adventure, having explored Old San Juan’s forts, hiked the El Yunque rainforest, savored the street food of
    Oaxaca, and dreaming of trekking the Andes to Machu Picchu while balancing travel costs with family responsibilities.
  culinary: Uriel Boffill is an enthusiastic home chef who masterfully blends traditional lechón, arroz con gandules, and sofrito with global twists like miso‑marinated pork belly and plantain‑infused paella,
    frequently using ingredients such as achiote, recaito, and tropical mango in experimental dishes.
  core: Uriel Boffill is a disciplined yet wildly imaginative quality professional who harmonizes rigorous standards with creative flair, thrives on community rituals, and balances meticulous planning with
    spontaneous artistic bursts.
background:
  cultural: Uriel was born and raised in Cayey, within the Caguas Municipio, to a close‑knit Puerto Rican family that values community, family ties, and bilingual fluency. Growing up among the coffee‑plantation
    hills, she absorbed the island’s rich traditions—such as the rhythms of bomba and plena, the festive spirit of patron saint celebrations, and the culinary heritage of lechón, arroz con gandules, and
    cafecito. Her upbringing instilled a deep respect for resilience, a hallmark of Puerto Rican identity, and a sense of pride in contributing to the island’s economic development. While her professional
    path led her into the technical realm, she continuously weaves her cultural roots into her everyday life, honoring the island’s history while embracing modern, innovative perspectives.
attributes:
  skills: '[''Quality Inspection'', ''Statistical Sampling'', ''Instrument Calibration'', ''Regulatory Compliance (FDA, ISO 9001, HACCP)'', ''Data Analysis (Excel, Minitab)'', ''Process Documentation'',
    ''Lean Six Sigma Green Belt'', ''Project Management'', ''Bilingual Technical Communication (Spanish/English)'', ''Continuous Improvement'']'
  hobbies: '[''Abstract painting'', ''Reading science‑fiction and philosophy'', ''Hiking in the Central Mountain Range'', ''Creative cooking (fusion of Puerto Rican and global cuisines)'', ''Landscape photography'',
    ''Participating in local cultural festivals'', ''Yoga and meditation'', ''Community book club'']'
  career_goals: Uriel aspires to transition from senior inspector to a quality‑assurance leadership role, ultimately becoming a Quality Assurance Manager overseeing multiple production lines. She plans
    to earn a Six Sigma Black Belt to deepen her expertise in process optimization and to spearhead a company‑wide continuous‑improvement program that blends rigorous standards with innovative testing methodologies.
    Additionally, she envisions mentoring emerging female talent in technical fields and, later in her career, establishing a consultancy that helps local manufacturers adopt cutting‑edge quality systems
    while preserving Puerto Rican cultural values.
