personas:
  professional: David Boothe is a seasoned dishroom specialist who leverages his deep knowledge of industrial dishwashing equipment, strict sanitation protocols, and sharp inventory control to train fast‑paced
    kitchen teams while constantly seeking sustainable cleaning innovations, and they thrive on turning chaotic service periods into organized success.
  sports: David Boothe plays in a local Saturday softball league affiliated with the Riverside Athletic Club, cheers loudly for the Chicago Cubs and Chicago Bears during the season, and they squeeze in
    weekend runs to stay fit, though their competitive nature sometimes leads to heated banter on the field.
  arts: David Boothe relaxes by streaming classic rock from The Rolling Stones and blues legend B.B. King, enjoys the cinematic storytelling of actors like Morgan Freeman and Frances McDormand, and occasionally
    attends live performances at the local theater where they admire the choreography of Broadway revivals, all of which fuel their appreciation for narrative depth and improvisational flair.
  travel: David Boothe favors road trips to nearby culinary hotspots such as Austin’s BBQ joints and New Orleans’ jazz districts, has visited the historic sites of Gettysburg and the Great Smoky Mountains
    for weekend getaways, and dreams of a future vacation to Kyoto to explore its tea ceremony culture, preferring to plan itineraries on spreadsheets while balancing family obligations and a modest travel
    budget.
  culinary: David Boothe experiments with dry‑rubbed Texas brisket, a smoky apple‑cider‑glazed pulled pork, and seasonal vegetable medleys featuring heirloom tomatoes and rosemary, often sourcing local
    pork shoulder from the farmer’s market and using a cast‑iron skillet and a pellet smoker, while they proudly serve these dishes at neighborhood potlucks, earning a reputation as the go‑to BBQ host.
  core: David Boothe is a competitively curious dishroom veteran whose love for BBQ, spreadsheets, and community drives blend practicality with a touch of stress‑fueled perfectionism, and they constantly
    juggle ambition with the occasional worry‑induced over‑thinking.
background:
  cultural: David grew up in a working‑class family in the greater Prince William County area, where the blend of suburban and rural Virginian culture shaped his values. He was exposed to Southern hospitality
    traditions, regional foods like smoked meats and Chesapeake seafood, and a community emphasis on self‑reliance and family ties. Proximity to Washington, D.C. introduced him to a broader cultural mosaic,
    fostering an appreciation for diverse perspectives while he maintains a grounded, Mid‑Atlantic identity. His marriage and involvement in local church and community events reinforce a strong sense of
    belonging and responsibility to his neighborhood.
attributes:
  skills: '["Industrial dishwashing operation", "Sanitation & health code compliance", "Inventory management", "Basic food preparation", "Equipment troubleshooting", "Time management", "Team training and
