  hobbies: '["Home cooking & BBQ experimentation", "Pickup softball and team sports", "Local trivia nights", "Competitive video gaming", "Science and history podcasts", "DIY home‑improvement projects",
    "Car maintenance", "Leading community food‑bank drives", "Socializing at neighborhood barbecues"]'
  career_goals: David aims to move beyond the dishroom into supervisory and managerial roles within the hospitality sector. He plans to enroll in a hospitality‑management certificate program at a nearby
    community college to formalize his knowledge and broaden his strategic skill set. His long‑term ambition is to open a modest, family‑focused restaurant that blends Southern comfort food with the efficiency
    he values, providing a stable income that eases his stress while allowing him to apply both his practical expertise and his curiosity about culinary trends.
