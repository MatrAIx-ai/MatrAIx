persona_description: A healthcare professional who is interested in infection prevention and control in hospitals. They are passionate about reducing the burden of infectious diseases and are looking for
  innovative ways to prevent drug-resistant infections. They are also interested in the development of new antibiotics and rapid diagnostic tests, and are open to the idea of using natural remedies to combat
  infections. They are dedicated to the one health approach and believe that infection prevention, particularly in hospitals, could reinvent the tried and tested method for reducing the burden of infectious
  diseases and help stop AMR in its tracks.
