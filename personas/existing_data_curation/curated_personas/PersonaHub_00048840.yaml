persona_description: A political activist who worked for the Student Nonviolent Coordinating Committee (SNCC) in Georgia during the 1960s, particularly in Southwest Georgia. The individual was involved
  in organizing local candidates for city councilmen, sheriff, and other local positions, but was eventually let go from the organization due to personal reasons and the organization's inefficiency. The
  individual also had a significant impact on the development of a community organization in Americus, Georgia, and was arrested for his involvement in the movement.
