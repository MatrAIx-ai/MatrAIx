personas:
  professional: Nancy Baity, a retired community organizer turned senior arts docent, leverages their meticulous event‑planning expertise, digital‑literacy training for seniors, and strategic bridge thinking
    to coordinate volunteer schedules, curate a senior art exhibition, and they mentor emerging artists, while balancing reliability with a healthy dose of skepticism toward collaborators.
  sports: Nancy Baity, a dedicated member of the Rockford Senior Walking Club, enjoys gentle morning walks, participates in low‑impact water aerobics, and they passionately follow the Chicago Cubs, attending
    occasional games at Wrigley Field while carefully managing their joint health through regular stretching.
  arts: Nancy Baity, an avid watercolorist inspired by Monet’s soft palettes and Grant Wood’s prairie narratives, regularly attends gallery openings featuring artists like Kerry James Marshall, volunteers
    as a docent at the Rockford Art Museum, and they find solace crocheting while listening to folk classics by Joan Baez.
  travel: Nancy Baity, a meticulous road‑trip planner, devotes their limited retirement budget to curated art pilgrimages to Chicago’s Art Institute, New York’s MoMA, and Washington D.C.’s National Gallery,
    while they also indulge in weekend drives to the Cedar Rapids Art Fair and local Midwestern heritage festivals, always balancing a packed schedule with the need for comfortable accommodations.
  culinary: Nancy Baity, an intermediate home chef, relishes cultivating heirloom tomatoes, sweet corn, and prairie sage in their garden and turning them into vibrant dishes such as roasted beet and goat‑cheese
    salad, corn chowder with fresh herbs, and spiced apple‑rhubarb crumble, while they occasionally splurge on farm‑to‑table lunches at Rockford’s Harvest Table.
  core: Nancy Baity, a fiercely curious and competitively spirited senior, weaves their love of art, genealogy, and community leadership into a vibrant, organized life that balances meticulous planning
    with spontaneous creative bursts, and they constantly seek new avenues to mentor others.
background:
  cultural: Nancy was born and raised in Rockford, Illinois, to a family of German‑Polish descent. Growing up in the post‑war Midwest, she was immersed in a community that prized hard work, modesty, and
    neighborly support. Her family attended a Lutheran church, and church socials and local festivals were central to her social life. The Midwestern ethos of straightforward communication, hospitality,
    and a strong sense of civic responsibility shaped her worldview. While she respects tradition, her innate curiosity has led her to embrace diverse artistic expressions and contemporary ideas, blending
    her traditional Midwestern roots with an openness to new cultural experiences.
