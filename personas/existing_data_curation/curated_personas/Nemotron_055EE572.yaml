  career_goals: Although retired, Nancy aims to deepen her influence on the local arts scene. She plans to become a certified docent at the Rockford Art Museum, curate a senior art exhibition, and mentor
    emerging artists through a volunteer program. She also wishes to author a memoir chronicling her life and community contributions, and to establish a small scholarship fund for high school students
    pursuing visual arts. Over the next five years, she intends to travel to major art hubs such as Chicago, New York, and Washington, D.C., attending exhibitions and participating in workshops.
