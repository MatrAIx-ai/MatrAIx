  career_goals: Kim often talks about wanting to become a veterinarian because she loves animals and enjoys caring for her goldfish. She also imagines helping others as a teacher, describing a future where
    she can share knowledge and foster a harmonious classroom. Her ambition is to keep learning, earn good grades, and participate in school science fairs, gradually building the skills needed for these
    future roles.
