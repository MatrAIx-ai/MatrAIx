personas:
  professional: An aspiring naturalist and budding scientist, Kim Johnson spends afternoons cataloguing the insects they find in the backyard, translating curiosity about animals into organized nature journals
    while balancing the desire for imaginative LEGO habitats with practical record‑keeping.
  sports: An energetic backyard explorer who joins the O’Fallon Mini Soccer Club on Saturdays, cheers for the St. Louis Cardinals during spring, and prefers a leisurely bike ride through the local park
    over large crowds, reflecting a love for low‑key movement.
  arts: A creative sketcher and budding pianist, Kim Johnson delights in drawing detailed animal scenes inspired by Dr. Seuss and Beatrix Potter, practices beginner piano melodies from the Disney Classics
    collection, and enjoys watching wildlife documentaries for artistic inspiration.
  travel: A curious weekend adventurer, Kim Johnson has explored Shawnee National Forest, visited the Chicago Shedd Aquarium, dreams of seeing Yellowstone's geysers, and prefers short, family‑oriented trips
    that blend nature hikes with the comfort of familiar customs like Thanksgiving turkey feasts.
  culinary: A garden‑helping young foodie, Kim Johnson loves harvesting crisp carrots and cherry tomatoes from the backyard, enjoys mac and cheese with a side of fresh salads, snacks on apple slices while
    drawing, yet occasionally sneaks a candy bar after bedtime stories.
  core: Kim Johnson blends quiet curiosity with practical habits, turning backyard insect hunts into science notes, saving allowance for LEGO, managing mild allergies, enjoying low‑key soccer and nature
    trips, while expressing creativity through drawing, piano, and garden cooking.
background:
  cultural: Kim comes from a Midwestern American family with Anglo‑American roots living in O’Fallon, Illinois. Her upbringing reflects typical Midwestern values such as community involvement, politeness,
    and a strong emphasis on education. Family traditions include celebrating holidays like Thanksgiving, Christmas, and the Fourth of July with communal meals and local parades. She attends a public elementary
    school where multicultural curricula introduce her to a variety of cultural perspectives, while her household maintains occasional church attendance and seasonal customs passed down from her grandparents.
