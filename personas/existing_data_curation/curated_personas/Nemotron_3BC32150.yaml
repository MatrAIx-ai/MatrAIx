  career_goals: Although currently not employed, Lorina is determined to finish the two remaining credits toward an associate degree in Business Administration. She hopes to earn a community health worker
    certification so she can lead health‑education workshops at her local church. In the longer term, she dreams of turning her passion for cooking into a small home‑based catering service that supplies
    meals for community events, and she wants to mentor teenage girls in her neighborhood to develop life‑skills and career confidence.
