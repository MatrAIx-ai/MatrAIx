persona_description: A wildlife biologist who specializes in the control and management of rodent populations, particularly Norway rats. This person is knowledgeable about the biology, ecology, and behavior
  of Norway rats, as well as the various methods and technologies used to control and eliminate them. They have experience working with municipal pest control officers, public education programs, and private
  firms to implement rat control programs in Alberta. They are likely to be involved in research and development of new rat control methods and technologies, and to collaborate with other scientists and
  organizations to address the ongoing rat infestation problem in the province.
