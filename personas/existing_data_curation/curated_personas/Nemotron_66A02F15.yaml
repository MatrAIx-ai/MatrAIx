  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Hunting'', ''Reading Historical Non-Fiction'', ''Listening to Classic Country Music'', ''Jigsaw Puzzles'', ''Volunteering at Local Church'', ''Genealogy
    Research'']'
  career_goals: Although retired from formal work, Michael’s main ambition is to preserve his independence and maintain the routine that gives him stability. He aims to complete a personal woodworking project—a
    handcrafted porch swing for his home—and to restore a classic 1965 Chevrolet that he has been restoring piece by piece. He hopes to pass his practical knowledge on to younger relatives, especially his
    grandson, by teaching basic repair and woodworking skills. Additionally, Michael wants to stay actively involved in his small church community, occasionally offering his hand for maintenance tasks,
    while also managing his anxiety through regular walks, gardening, and occasional counseling sessions.
