personas:
  professional: Michael Pettibone, a retired hands‑on specialist, harnesses their lifelong expertise in automotive repair, woodworking, and small‑scale farming to serve as a dependable community handyman,
    methodically tackling each task with a quiet competitiveness and a steadfast reliance on routine.
  sports: Michael Pettibone, a devoted follower of the Carolina Panthers and Charlotte Hornets, competes in the Lake Norman Fishing Club’s spring bass tournaments, joins the regional deer‑hunting league
    each autumn, and stays fit through daily sunrise walks and occasional low‑impact resistance‑band workouts, preferring their solitary activity over team sports.
  arts: Michael Pettibone, an avid listener of classic country icons Johnny Cash, Merle Haggard, and Dolly Parton and a fan of vintage westerns starring John Wayne and Clint Eastwood, spends evenings on
    the porch spinning vinyl records, curates a modest collection of Civil War paintings, and occasionally crafts wooden replicas of frontier wagons, allowing these artistic pursuits to punctuate their
    orderly routine.
  travel: Michael Pettibone, who favors meticulously planned road trips over spontaneous travel, journeys each autumn to the historic Gettysburg battlefield, spends summers at a family cabin near the Blue
    Ridge Mountains, and dreams of a future pilgrimage to Scotland’s Highlands to trace ancestral roots, always traveling with their spare tire, a detailed itinerary, and a cooler of homemade apple preserves.
  culinary: Michael Pettibone, an accomplished home cook who cultivates heirloom tomatoes, crisp apples, and sweet corn, delights in preparing rustic apple pie with a flaky crust, hearty chicken and dumplings,
    and smoked pork ribs seasoned with paprika, brown sugar, and garlic, and proudly canning their own apple butter, pickles, and preserves for year‑round comfort.
  core: Michael Pettibone, a routine‑driven, anxiety‑prone handyman, finds solace in gardening, classic country music, and the quiet satisfaction of fixing their own 1965 Chevrolet, yet often hoards spare
    parts and double‑checks every lock on their doors out of lingering skepticism.
background:
  cultural: Michael grew up in a traditional white, Southern, Protestant (Baptist) family in rural North Carolina. His upbringing emphasized self‑reliance, hard work, and respect for established customs.
    The close‑knit community of Stanley, Lincoln County, reinforced values of personal responsibility and practical skill‑building. Over the decades, he has witnessed shifts in the region’s social fabric,
    yet he remains rooted in the familiar rhythms of small‑town life, church gatherings, and seasonal outdoor activities that reflect his cultural heritage.
