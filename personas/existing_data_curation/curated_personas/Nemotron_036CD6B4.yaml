  career_goals: Janet aspires to advance to a supervisory role, such as sergeant, where she can shape departmental policy and mentor junior officers. She plans to complete a bachelor's degree in Criminal
    Justice, earn certifications in advanced investigative techniques and law‑enforcement analytics, and spearhead a precinct‑wide initiative that integrates predictive policing tools with community‑based
    safety programs. Her ambition includes establishing a formal peer‑review process to evaluate tactical methods, ensuring that innovative practices are vetted against proven standards. At the same time,
    she seeks balance, aiming to maintain her hands‑on field work while contributing strategic insight at the administrative level.
