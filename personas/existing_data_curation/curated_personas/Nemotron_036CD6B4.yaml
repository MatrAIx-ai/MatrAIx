personas:
  professional: Janet Mcafee, a seasoned protective services officer with two decades of tactical response, firearms expertise, and data‑driven crime analysis, leverages their skeptical curiosity and competitive
    drive to modernize precinct procedures while mentoring junior officers toward disciplined, evidence‑based policing.
  sports: Janet Mcafee, a dedicated long‑distance runner who logs 40‑plus miles weekly with the County Running Club, competes in monthly target‑shooting matches for the local marksmanship league, volunteers
    as a field operative for the county’s search‑and‑rescue team, and tunes in to Chicago Bulls games for basketball while cheering on the St. Louis Cardinals in baseball, embodying a disciplined yet competitive
    approach to fitness.
  arts: Janet Mcafee, an avid consumer of true‑crime literature and podcasts, frequently revisits classics by Agatha Christie and Gillian Flynn, enjoys the atmospheric scores of David Fincher’s films, attends
    occasional live performances of the Chicago Symphony Orchestra, and relaxes to the gritty storytelling of Johnny Cash and the suspenseful narratives of the TV series 'Mindhunter', weaving these artistic
    tastes into their analytical mindset.
  travel: Janet Mcafee prefers meticulously planned solo trips that combine historical immersion and outdoor challenge, having trekked the Appalachian Trail segment in Virginia, explored crime‑scene museums
    in Salem, Massachusetts, and toured the medieval streets of York, England, while eyeing future adventures to the Scottish Highlands and the forensic anthropology labs of Canberra, Australia, reflecting
    their blend of curiosity and disciplined preparation.
  culinary: Janet Mcafee, a competent home cook who balances a runner’s need for lean fuel with culinary curiosity, regularly prepares grilled salmon with quinoa, roasted kale, and turmeric‑spiced sweet
    potatoes, enjoys the occasional hearty steak‑frites with peppercorn sauce, and savors craft IPA’s while meticulously logging macronutrient intake to align taste with performance goals.
  core: Janet Mcafee blends a relentless investigative curiosity with disciplined practicality, channeling a love for solitary puzzles, long runs, and precise marksmanship into a career of data‑driven policing,
    all while guarding a habit of over‑obsessing over spreadsheets and occasional caffeine‑induced insomnia.
background:
  cultural: Janet grew up in a rural Midwestern community near Joplin, Missouri, immersed in the region’s traditional work ethic, self‑reliance, and close‑knit family values. As a white American of Midwestern
    descent, she was raised in an environment that emphasized punctuality, community responsibility, and modesty, while also encouraging independent thought and skepticism. Her upbringing in a small‑town
    setting fostered a preference for intimate social circles and a comfort with solitude. The local culture’s blend of conservative sensibility and pragmatic problem‑solving resonates in her professional
    demeanor and personal pursuits.
