personas:
  professional: Aramus Sledge, a 17‑year‑old aspiring automotive technician, leverages their hands‑on repairs, budgeting savvy, and modest leadership from food‑pantry volunteering to excel in school‑based
    shop projects, while their preference for routine and reliability makes them a go‑to trouble‑shooter for family friends.
  sports: Aramus Sledge enjoys playing sports‑simulation video games like FIFA and NBA 2K, supports the local high‑school basketball team, and occasionally joins a community youth soccer league, preferring
    the predictability of structured practice over spontaneous pick‑up games.
  arts: Aramus Sledge finds comfort in classic R&B legends like Marvin Gaye, contemporary soul artists such as Leon Bridges, and uplifting gospel tracks by Kirk Franklin, often listening while assembling
    LEGO models, which blends auditory nostalgia with tactile focus.
  travel: Aramus Sledge prefers low‑key, budget‑friendly trips, such as a weekend camping excursion at nearby state parks and a family reunion road‑trip to a historic Southern town, planning itineraries
    meticulously to avoid unexpected costs, yet dreams of a future naval deployment that would combine travel with structured duty.
  culinary: Aramus Sledge cooks hearty meals like chicken and rice soup, spaghetti Bolognese, and herb‑infused roasted potatoes, frequently harvesting basil, rosemary, and thyme from their garden, but sometimes
    burns the garlic when multitasking between gaming and cooking.
  core: Aramus Sledge is a routine‑driven, quietly diligent teen who balances model‑building, budgeting, and backyard gardening with a steady soundtrack of soul and gospel, yet wrestles with anxiety and
    a tendency to stay up late gaming.
background:
  cultural: Aramus is a Black American raised in Oklahoma City, with family roots that trace back to the Southern United States, especially the Mississippi Delta region, part of the Great Migration that
    brought many families to Oklahoma. His upbringing is anchored in a close‑knit African‑American community centered around the local Baptist church, where he has taken part in gospel choirs, potluck meals,
    and annual Juneteenth celebrations that honor his heritage. Family traditions include storytelling evenings, seasonal dishes like fried catfish, collard greens, and sweet potato pie, and a strong emphasis
    on mutual support. Growing up in an inner‑city neighborhood, he has been exposed to both the challenges and the vibrant cultural expressions of Black life in the Midwest, fostering a sense of identity
    that blends Southern roots with the urban rhythm of Oklahoma City.
attributes:
  skills: '["Basic automotive maintenance (oil changes, fluid checks)", "Home repair tasks (faucet repair, simple carpentry)", "Household budgeting and organization", "Basic computer literacy (word processing,
    internet research)", "Volunteer coordination at local food pantry", "Regular physical fitness and weight training"]'
  hobbies: '["Playing sports‑simulation and strategy video games", "Listening to classic R&B, soul, and gospel music", "Building model kits (cars, airplanes, LEGO)", "Cooking simple meals for family", "Tending
    a small herb garden", "Reading practical self‑help and organization books", "Participating in small‑group church youth service projects"]'
  career_goals: Aramus aims to complete his GED within the next year and enroll in a vocational training program to become a certified automotive technician or electrician, careers that provide a clear
    routine and dependable income. He sees a stable trade job as a way to support his family and reduce the financial stress that often worries him. As a longer‑term ambition, he is considering joining
    the U.S. Army or Navy, drawn by the structured environment and educational benefits they offer. Regardless of the path, his primary goal is to secure a reliable career that lets him apply his practical
    skills while contributing positively to his community, perhaps eventually mentoring younger teens who face similar educational challenges.
