  career_goals: Lynn aspires to become a primary‑school teacher or a veterinarian, roles that combine her love for helping others, her disciplined nature, and her interest in science and animals. She envisions
    attending a high‑performing middle school, then pursuing a degree in education or animal science, with the long‑term goal of creating a nurturing, well‑organized learning environment for children or
    providing compassionate care to farm animals in her community. She also hopes to earn a scholarship that will allow her to attend summer enrichment programs in science and education.
