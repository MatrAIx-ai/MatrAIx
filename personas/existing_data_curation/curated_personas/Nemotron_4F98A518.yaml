personas:
  professional: Victor Coq, an aspiring teen game developer who channels his curiosity and practicality into creating Scratch animations and robotics projects, meticulously plans each iteration, and collaborates
    confidently with his after‑school club peers.
  sports: Victor Coq, an energetic middle‑schooler who guards for the local junior basketball team, idolizes the Chicago Bulls, and spends weekends at the neighborhood skate park with the ‘Ridge Riders’
    crew, constantly refining his jump tricks while staying organized with a personal fitness log.
  arts: Victor Coq, a creative enthusiast who drums in the school band, designs Scratch projects inspired by Studio Ghibli’s animation style, devours sci‑fi graphic novels like "Saga" and "Watchmen," and
    explores music ranging from Billie Eilish to The Foo Fighters, often blending these influences into his own rhythmic compositions.
  travel: Victor Coq, a curious traveler who plans weekend trips to the nearby state park for hiking and skate sessions, dreams of a school‑organized visit to Tokyo’s Akihabara district to experience anime
    culture, and balances these ambitions with family budget constraints and school‑year scheduling.
  culinary: Victor Coq, a teenage food explorer who loves pepperoni pizza, crafts homemade chicken teriyaki bowls with a dash of sriracha, and indulges in midnight chocolate chip cookies, often experimenting
    with soy sauce and hot sauce to give his dishes a bold kick.
  core: Victor Coq, a methodical yet outgoing teen who blends a love for basketball, robotics, and graphic novels, hoards candy in his backpack, stays up late perfecting Scratch games, and always keeps
    a checklist for every hobby.
background:
  cultural: Victor’s family roots are in the African‑American community of West Philadelphia. He grew up surrounded by the city’s rich musical traditions, community festivals, and neighborhood youth programs
    that celebrate Black culture. Church gatherings and local after‑school centers have taught him the value of community service and resilience. He takes pride in the history of civil rights leaders from
    Philadelphia and incorporates elements of hip‑hop, soul food, and family storytelling into his daily life, all of which shape his identity and aspirations.
