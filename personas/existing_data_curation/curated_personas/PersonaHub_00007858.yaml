persona_description: A technology enthusiast who is interested in the field of virtual reality and its applications in heritage preservation. Lon presents results of a virtual heritage project that utilized
  long-range laser scanning to capture detailed model data of the Baths of Caracalla and the Colosseum. He is knowledgeable about touch, photogrammetric, and laser range-finding systems currently employed
  in capturing built history and has presented his work at the Virtual Systems and MultiMedia (VSMM98) conference in 1998. He is also familiar with the Colosseum project, a massive multi-country, multi-discipline
  project funded by the Bank of Rome that employed multiple survey techniques, and the San Francisco city block scan done for Francis Ford Coppola, the film director.
