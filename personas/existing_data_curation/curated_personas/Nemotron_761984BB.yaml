  career_goals: Nancy aims to advance into a supervisory role within her customer service department, such as Team Lead or Quality Assurance Manager, where she can mentor staff and shape service standards.
    She plans to complete her associate degree in Business Administration and earn certifications like the Certified Customer Service Professional (CCSP) and Six Sigma Yellow Belt to strengthen her leadership
    credentials. Long‑term, she is interested in transitioning to a community outreach or cultural program coordinator position that merges her love of the arts with her people skills, possibly overseeing
    local art workshops or museum education programs. Throughout, she seeks a balanced work environment that supports her well‑being and provides stability for her family.
