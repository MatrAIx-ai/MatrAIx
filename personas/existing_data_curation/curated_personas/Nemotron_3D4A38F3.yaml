  hobbies: '["Hiking in East Bay Regional Parks", "Nature and architectural photography", "Vegetable gardening", "Reading practical non‑fiction (DIY, sustainability, efficiency)", "Listening to environmental
    and workplace podcasts", "Playing chess online", "DIY home improvement projects", "Volunteer neighborhood clean‑up events", "Cooking simple, healthy meals", "Exploring low‑impact technology gadgets"]'
  career_goals: Looking ahead, Scott aims to transition from a frontline cleaning role to a supervisory position, such as Lead Janitorial Coordinator or Facilities Services Supervisor, within the next three
    to five years. He plans to earn certifications in Green Building Operations and Low‑Impact Cleaning, and to deepen his knowledge of sustainable facility management through community college courses
    and industry workshops. Scott is motivated to design and roll out a campus‑wide eco‑cleaning program that reduces chemical waste and energy consumption, aligning with his practical curiosity about new
    technologies. In the longer term, he envisions either advancing to a Facilities Manager role overseeing multiple properties or launching a small, employee‑owned cleaning enterprise that prioritizes
    fair wages, environmental stewardship, and a cooperative work culture.
