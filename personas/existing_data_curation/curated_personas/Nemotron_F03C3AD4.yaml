  career_goals: Ivan aims to become a chief financial officer within the next five years, spearheading digital transformation of finance functions by integrating AI-driven analytics, blockchain-based payment
    systems, and sustainable investment strategies. He aspires to lead his organization toward innovative, data-centric decision-making while championing ESG initiatives. In the longer term, he envisions
    founding a boutique consulting firm that helps mid-size tech companies adopt cutting-edge financial technologies and socially responsible investment practices.
