personas:
  professional: Maria Mendoza, a 54‑year‑old general and operations manager in Houston's manufacturing sector, leverages their bilingual fluency and curiosity to blend lean principles with cloud‑based ERP
    tools, while delegating detailed schedules to trusted supervisors to maintain flexibility.
  sports: Maria Mendoza enjoys watching the Houston Astros and Houston Dynamo while occasionally joining a local yoga class and a weekend recreational softball league, preferring low‑impact activities that
    fit their flexible schedule.
  arts: Maria Mendoza frequently visits the Houston Museum of Fine Arts, where they sketch and find inspiration in works by Frida Kahlo and Diego Rivera, and they unwind by painting watercolors of distant
    landscapes at home.
  travel: Maria Mendoza loves cultural getaways, having explored Oaxaca’s vibrant markets and Florence’s Renaissance galleries, and they plan future trips to Kyoto for its gardens, preferring itineraries
    that blend art, cuisine, and ample time for spontaneous detours.
  culinary: Maria Mendoza experiments with traditional dishes like mole, pozole, and tamales, often adding fresh cilantro, dried chilies de árbol, and a splash of mezcal, while their garden yields herbs
    that they harvest daily, though they sometimes over‑salt recipes in a quest for deeper flavor.
  core: Maria Mendoza is a curious operations leader who balances disciplined ambition with spontaneous creativity, channeling stress into yoga, watercolor painting, and spicy culinary experiments, even
    as they occasionally let worry dictate their schedule.
background:
  cultural: Maria was born to Mexican immigrant parents who settled in Houston, and she grew up in a bilingual household where Spanish and English were spoken interchangeably. Her upbringing blended Mexican
    traditions—such as celebrating Día de los Muertos, quinceañeras, and weekly family meals with corn tortillas and salsa—with the multicultural tapestry of Houston’s diverse neighborhoods. A practicing
    Catholic, she participates in local church celebrations and community outreach. Maria’s cultural roots shape her values of family loyalty, hospitality, and collective responsibility, while her daily
    life reflects the Texan spirit of independence and entrepreneurship. Her fluency in Spanish and deep understanding of Mexican customs enable her to connect authentically with the city’s large Hispanic
    workforce, making her a bridge between cultural heritage and modern business practices.
