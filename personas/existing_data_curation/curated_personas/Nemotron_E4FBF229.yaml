  career_goals: Maria aims to ascend to a senior director of operations role within the next five years, where she can shape strategic growth initiatives and champion innovative, sustainability‑focused
    practices. She is passionate about creating a mentorship pipeline for women and Latino employees, leveraging her own journey to inspire the next generation. To balance her ambition with well‑being,
    she plans to introduce wellness and mindfulness programs across the workplaces she leads, reducing stress for herself and her teams. Additionally, Maria envisions launching a boutique consulting firm
    that helps small Mexican‑American businesses streamline their operations using lean principles and culturally attuned strategies.
