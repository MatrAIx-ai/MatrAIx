personas:
  professional: Juan Castillo, a retired agricultural operations specialist, leverages decades of expertise with tractors, irrigation pumps, and crop management while applying a practical, structured mindset
    to volunteer work; however, they have a relaxed approach to obligations that sometimes leads to spontaneous, improvised solutions on the farm.
  sports: Juan Castillo follows the San Francisco Giants baseball team and the Sacramento Kings basketball team on television, participates in a local senior walking club that meets by the irrigation canals
    each morning, and occasionally joins a community garden fitness class that incorporates light weight‑lifting, though they rarely engage in high‑intensity sports.
  arts: Juan Castillo spends evenings listening to recordings by Mariachi Vargas de Tecalitlán and bolero legends like José José, watches classic films starring Pedro Infante and María Félix, and collects
    vintage vinyls, letting these artistic touchstones shape their leisurely evenings and inspire their cooking rhythms.
  travel: Juan Castillo prefers low-key, family-centered travel, taking annual trips with their spouse to Veracruz, Mexico to visit relatives, and short weekend drives to the nearby Sierra Nevada foothills
    for scenic walks, planning most itineraries around modest budgets and the comfort of familiar companions.
  culinary: Juan Castillo is a seasoned home chef who regularly prepares pozole, tamales, and carne asada using home-grown tomatoes, beans, and chilies, perfects salsa verde with tomatillos and cilantro,
    and enjoys sharing these meals with close friends around a modest kitchen table.
  core: Juan Castillo is a garden-loving retiree who blends a methodical, practical outlook with a laid-back love for puzzles, family meals, and spontaneous music sessions, though a habit of misplacing
    keys and forgetting appointments often adds a charming chaos to their steady routine.
background:
  cultural: Juan Manuel was born in Mexico and moved to the Central Valley as a teenager to work in the agricultural fields, a common pathway for many Mexican families seeking opportunity. He grew up in
    a Spanish-speaking household where Catholic traditions, communal celebrations such as Día de Muertos, and family loyalty were central. In Delano, he maintains these cultural ties through food, music,
    and participation in local Mexican community events, while also navigating the bilingual environment of California’s farmworker communities.
attributes:
  skills: '["operating farm machinery","routine maintenance of agricultural equipment","knowledge of crop cycles and pest identification","bilingual Spanish-English communication","basic carpentry and fence
