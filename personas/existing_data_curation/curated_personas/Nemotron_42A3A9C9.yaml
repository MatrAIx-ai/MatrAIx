  hobbies: '["vegetable gardening","traditional Mexican cooking","listening to mariachi and bolero music","watching classic Mexican films","solving crossword puzzles","walking along irrigation canals","participating
    in parish gatherings"]'
  career_goals: Now retired, Juan Manuel’s primary ambitions focus on staying healthy, supporting his wife, and being a steady presence for his grandchildren. He aims to keep his garden productive enough
    to provide fresh vegetables for his family, to mentor younger relatives in practical skills, and to volunteer occasionally at the local parish by helping with food preparation for events. He also hopes
    to travel with his wife to visit relatives in Mexico once a year, preserving the family’s cultural roots.
