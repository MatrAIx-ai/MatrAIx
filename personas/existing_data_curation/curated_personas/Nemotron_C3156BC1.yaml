  career_goals: Teresa aims to transition from a generalist role to an HR manager position within the next two years, eventually earning a senior HR certification (SHRM‑SCP) and leading strategic initiatives
    such as a data‑driven talent analytics program for her organization. She is also exploring the possibility of launching a boutique HR consulting practice that helps small businesses in the Puget Sound
    area adopt flexible, technology‑enabled HR solutions while preserving proven, compliance‑first processes. Her long‑term ambition is to be recognized as a pragmatic innovator in HR—someone who balances
    curiosity for new ideas with reliable execution.
