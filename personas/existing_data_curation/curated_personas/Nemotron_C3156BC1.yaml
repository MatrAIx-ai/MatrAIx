personas:
  professional: Teresa Slattery leverages eight years of HR generalist experience to champion employee relations, talent acquisition, and benefits administration, while their competitive drive pushes them
    to rigorously evaluate emerging HR tech like BambooHR and ADP and implement data-driven solutions with a pragmatic, flexible approach that values reliable processes over rigid plans.
  sports: Teresa Slattery fuels their fitness through weekend hikes in Mount Rainier National Park, kayaking on the Puyallup River, occasional yoga sessions at a downtown studio, and cheering for the Seattle
    Seahawks and Seattle Sounders while belonging to the Cascade Hiking Club, preferring low-commitment outdoor challenges over regimented gym routines.
  arts: Teresa Slattery immerses themselves in the worlds of Hilary Mantel and Niccolo Machiavelli at a spirited local book club, attends performances at the Seattle Repertory Theatre, enjoys the folk-rock
    melodies of Fleet Foxes and Joni Mitchell, and displays their creative side through knitting and DIY home projects that double as tactile art.
  travel: Teresa Slattery prefers spontaneous, low-commitment weekend getaways to the Pacific Northwest's Cascades, San Juan Islands, and Oregon Coast, while dreaming of trekking Patagonia's Torres del
    Paine and cruising New Zealand's Milford Sound, balancing their modest travel budget with occasional splurges on boutique cabins.
  culinary: Teresa Slattery relishes cooking smoked salmon with dill, crafting wild mushroom risotto, and baking sourdough bread, all while experimenting with foraged herbs and maintaining a moderately
    skilled kitchen repertoire that often competes with their love of yarn and a growing collection of knitting patterns.
  core: Teresa Slattery is a fiercely competitive HR strategist who blends curiosity for emerging tech with pragmatic execution, thrives on solitary hikes and board-game showdowns, and keeps a delightfully
    chaotic schedule that fuels their creative crafts.
background:
  cultural: Teresa grew up in a middle‑class, predominantly white suburb of the Pacific Northwest, where self‑reliance, practicality, and appreciation for the outdoors were core values. Her family’s cultural
    roots trace to mid‑western American traditions, with a modest Catholic upbringing that emphasized education and community service, though she now identifies more with secular, progressive values common
    in Washington state. The region’s blend of tech‑forward thinking and strong environmental consciousness influences her openness to new HR technologies while maintaining a grounded, pragmatic approach.
    Her cultural identity includes a respect for individual autonomy, a competitive spirit nurtured by local sports leagues, and a relaxed attitude toward scheduling that mirrors the laid‑back lifestyle
    of the Puget Sound area.
