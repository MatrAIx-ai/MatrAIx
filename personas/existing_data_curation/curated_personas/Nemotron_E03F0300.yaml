  career_goals: Looking ahead, Timothy aims to move into a supervisory role within the dispatch center, where he can mentor newer staff and help refine standard operating procedures. He plans to earn a
    certification in Emergency Management (such as FEMA IS‑100) and become a certified Critical Incident Stress Management (CISM) facilitator to support his colleagues’ well‑being. Over the next few years
    he hopes to lead a community outreach program that educates residents on emergency preparedness, and eventually transition to a part‑time consulting position that leverages his experience while allowing
    more time for family and hobbies as he approaches retirement.
