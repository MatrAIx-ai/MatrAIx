  career_goals: Maria aims to push her store into the top tier of regional sales performance before she retires, using her competitive drive to out‑pace neighboring locations. She plans to formalize a mentorship
    program that equips junior supervisors with practical tools for managing retail teams, reflecting her curiosity about proven management techniques while remaining focused on tangible outcomes. In the
    next few years, she hopes to transition into a regional district manager role, overseeing multiple stores and implementing data‑driven process improvements she has rigorously vetted. Post‑retirement,
    Maria envisions consulting for small local businesses on retail operations and perhaps opening a boutique that showcases Mexican artisanal goods, merging her cultural heritage with her practical business
    acumen. Throughout, she seeks financial security for her twilight years, balancing personal interest with responsible planning.
