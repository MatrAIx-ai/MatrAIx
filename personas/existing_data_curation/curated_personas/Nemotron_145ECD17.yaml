personas:
  professional: Maria Negrete is a seasoned retail supervisor who leverages three decades of front‑line management to drive her store toward top‑tier regional sales, crafting data‑driven mentorship programs,
    designing visually appealing store layouts, and using bilingual communication to build customer loyalty, all while their competitive streak pushes them to outpace neighboring locations.
  sports: Maria Negrete embraces low‑impact fitness through biweekly nature walks in the Columbia River Gorge, follows the Portland Timbers in the MLS and the Oregon State Beavers football team with fervor,
    and competes in a senior bowling league where their competitive edge often leads them to practice extra frames despite occasional knee discomfort.
  arts: Maria Negrete cultivates artistic appreciation by devouring historical fiction novels by Ken Follett, knitting while listening to folk legend Joan Baez, and curating a modest collection of watercolor
    works by Oregon artist James Lavadour, plus a deep admiration for Frida Kahlo’s paintings which inspire their creative expression.
  travel: Maria Negrete prefers flexible, self‑directed travel, often arranging last‑minute weekend getaways to Willamette Valley wineries or scenic drives along the Oregon coast, while dreaming of a future
    cultural immersion tour through historic European cities such as Seville and Granada, balancing wanderlust with a modest retirement budget.
  culinary: Maria Negrete fuses traditional tamales, mole, and pozole with Oregon staples like smoked salmon, foraged chanterelle mushrooms, and garden‑fresh herbs such as sage, cilantro, and rosemary,
    experimenting boldly yet often improvising recipes on the fly while entertaining family and friends.
  core: Maria Negrete blends a fiercely competitive retail mindset with a relaxed, occasionally chaotic daily rhythm, soothing stress with garden‑grown herbs while frequently misplacing reading glasses
    and forgetting to water her begonias on time.
background:
  cultural: Maria was born to Mexican immigrant parents who settled in the Pacific Northwest when she was young. Growing up in a bilingual household, she learned Spanish at home while attending American
    schools, giving her a bicultural perspective that she carries into adulthood. She celebrates Mexican holidays such as Día de los Muertos and Las Posadas with family gatherings that blend traditional
    foods, music, and storytelling. Living in Salem, Oregon, she has also embraced local customs, participating in community festivals and adopting an appreciation for the region's outdoors and horticulture.
    Her Mexican heritage influences her cooking, craftsmanship interests, and commitment to close‑knit community ties, while her Oregon residency informs her love of gardening, birdwatching, and regional
    wine culture. This dual cultural identity shapes her worldview, fostering both a respect for tradition and a practical adaptability to her surroundings.
