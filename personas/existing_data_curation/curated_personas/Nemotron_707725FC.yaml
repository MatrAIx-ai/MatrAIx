personas:
  professional: Thomas Cohen, a one-year-old with an astonishingly vivid imagination and early abstract curiosity, spends hours arranging colorful building blocks in intricate patterns, showing a methodical,
    organized play style that hints at future engineering prowess.
  sports: Thomas Cohen, a one-year-old who delights in toddler gymnastics classes at the Bright Kids Gym and eagerly watches the Cityville Sliders baseball games on television with his family, often waving
    a miniature foam bat during the summer season.
  arts: Thomas Cohen, a one-year-old fascinated by the bright illustrations in Eric Carle’s books and the catchy lullabies of The Beatles and Raffi, spends afternoons finger‑painting with Crayola paints
    and humming along to "Yellow Submarine", making creative expression a core part of his early days.
  travel: Thomas Cohen, a one-year-old who has already visited Grandma’s farm in Vermont, the sandy beaches of Cancun, and the Eiffel Tower in Paris during family trips, prefers itineraries that blend stroller‑friendly
    museums with plenty of nap time, yet dreams of a future adventure to Tokyo’s Shibuya Crossing.
  culinary: Thomas Cohen, a one-year-old with a burgeoning palate for sweet potatoes, mashed bananas, and a occasional bite of mac and cheese, enjoys being fed by his parents using a bright blue silicone
    spoon and often throws peas on the floor as a playful experiment in texture.
  core: Thomas Cohen, a one-year-old explorer who turns everyday play into organized storytelling, hoards shiny coins, manages eczema with diligent moisturization, and can’t resist a good lullaby or a tossed‑peas
    rebellion.
background:
  cultural: Thomas is an African‑American child raised in West Columbia, South Carolina, within a close‑knit Black community that celebrates Southern traditions, gospel music, and communal gatherings at
    the local church. His family emphasizes storytelling, soulful cuisine, and intergenerational support, and they participate in community events such as church picnics, cultural festivals, and local history
    tours that reflect the area’s rich civil‑rights heritage. These cultural influences nurture his cooperative nature, appreciation for rhythm and art, and his sociable, harmony‑seeking personality.
