  career_goals: As he grows, Thomas aspires to channel his vivid imagination and love for novelty into a creative career—envisioning roles such as an artist, musician, or scientist—where he can explore
    abstract concepts, invent new ideas, and share them with a community. He aims to become a person who uses his natural sociability to lead collaborative projects, inspire others, and perhaps teach or
    mentor future creators.
