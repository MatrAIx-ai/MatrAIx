persona_description: A political leader who was involved in the struggle for independence of Kashmir from British rule and played a significant role in the process of its accession to India. He was a key
  figure in the negotiations and the decision-making process leading to the legal and constitutional accession of Kashmir to India on 27 October 1947. He was aware of the grave situation in Kashmir and
  the need for India to accede to the State quickly to save it from the threat of Pakistani invasion. He was also aware of the potential for resistance from the Muslim community and the need to ensure that
  the accession process was smooth and without any hindrances. He was able to overcome the hesitation of the Maharaja and the resistance of the Muslim community through his efforts to dispel their doubts
  and convince them of the benefits of acceding to India. He was also aware of the need to ensure that the legal and constitutional accession of Kashmir to India was accepted by the Security Council and
  that the plebiscite was held as promised.
