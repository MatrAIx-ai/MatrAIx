personas:
  professional: Criss Santanadelgado, an aspiring software developer proficient in Python and Arduino, channels a blend of curiosity and practicality into crafting accessible mental‑health apps while volunteering
    to teach coding to middle‑schoolers, thriving in solitary, low‑stimulus environments where they can meticulously organize code and iterate on user‑friendly designs.
  sports: Criss Santanadelgado, a quiet enthusiast of the El Paso Locomotive FC soccer matches and occasional follower of the El Paso Chihuahuas baseball team, spends weekends hiking with the Franklin Peaks
    Trekking Club to capture night skies, favoring low‑intensity cardio over team sports due to a preference for solitary exercise.
  arts: Criss Santanadelgado, a digital illustrator who draws inspiration from the vibrant cyber‑aesthetic of BeeBee and the surreal compositions of James White, pairs their art sessions with lo‑fi beats
    from J Dilla and Nujabes, while devouring classic science‑fiction novels by Isaac Asimov and Octavia Butler for narrative fuel.
  travel: Criss Santanadelgado, a budget‑conscious traveler who has explored Carlsbad Caverns and trekked the rims of Big Bend National Park, dreams of stargazing in Patagonia’s Torres del Paine and chasing
    the Northern Lights in Iceland, and they plan trips around academic breaks while prioritizing low‑key, nature‑focused adventures over crowded tourist hotspots.
  culinary: Criss Santanadelgado, an adept home cook, lovingly prepares family‑heritage dishes such as tamales stuffed with pork and masa, simmered pozole flavored with hominy, dried chiles, and fresh cilantro,
    often experimenting with new spice blends like smoked paprika while listening to lo‑fi playlists in the kitchen, and they enjoy sharing the meals with close friends.
  core: Criss Santanadelgado blends quiet curiosity with a meticulous streak, spending late nights coding under lo‑fi beats, worrying about every detail, yet finding peace in starlit hikes, homemade tamales,
    and the simple joy of solitary creation.
background:
  cultural: Criss grew up in a bilingual Mexican-American household in El Paso, where both Mexican traditions and border-city life shape his identity. He celebrates Día de los Muertos, Las Posadas, and
    family quinceañeras, enjoys mariachi music and foods such as tamales, pozole, and chiles rellenos, and follows Catholic customs like attending Mass with his parents. The values of familismo, respeto,
    and community service are central to his upbringing, while his daily life also reflects the Texan influence of English language schooling and a multicultural community.
