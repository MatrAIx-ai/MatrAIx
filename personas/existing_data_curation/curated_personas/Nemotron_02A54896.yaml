  career_goals: Criss plans to enroll in a community college to earn an associate’s degree in Computer Science, focusing on software development that improves mental-health resources for his community.
    His long-term ambition is to become a software engineer at a company that prioritizes accessibility and diversity, eventually leading projects that build user-friendly apps for stress management and
    community outreach. He also hopes to give back by volunteering to teach basic coding to middle-school students in El Paso.
