  that students with Lyme disease receive appropriate educational supports and accommodations. This person would have experience working with students who have disabilities, including those with cognitive
  deficits, and would be skilled in working with teachers and other school staff to provide the necessary support. They would also be knowledgeable about the medical and educational impacts of Lyme disease,
  and would be able to provide accurate information to parents and students about the condition and its effects on education.
