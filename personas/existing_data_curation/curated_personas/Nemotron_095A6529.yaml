  career_goals: Lindsey dreams of becoming an explorer of ideas—a future scientist or artist. She imagines herself discovering new colors, inventing cool gadgets, or traveling to space. She also expresses
    interest in helping animals as a veterinarian. Her competitive streak fuels a desire to win science fairs or art contests. Though she is young, these aspirations reflect her curiosity and love for learning.
