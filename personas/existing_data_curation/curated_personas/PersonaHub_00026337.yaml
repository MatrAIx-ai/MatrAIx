persona_description: A healthcare professional who is dedicated to educating and empowering individuals about the prevention and treatment of colorectal cancer. They are knowledgeable about the importance
  of regular screening, a healthy diet, and regular exercise in reducing the risk of colorectal cancer. They are also skilled in conducting and interpreting screening tests such as stool occult blood and
  abnormal DNA testing, flexible sigmoidoscopy, colonoscopy, double contrast barium enema, or CT colonography. They are aware of the benefits of early detection and the role of colorectal surgeons in treating
  colorectal cancer.
