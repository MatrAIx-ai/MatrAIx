  career_goals: Even though Albert is retired, he aims to stay mentally and physically active by mastering new technology tools that help him stay connected with family and community members. He hopes to
    become a mentor at the local senior center, teaching basic computer and DIY skills to fellow retirees. He also aspires to document his family’s genealogy and local history stories in a small booklet
    that can be shared with the community library.
