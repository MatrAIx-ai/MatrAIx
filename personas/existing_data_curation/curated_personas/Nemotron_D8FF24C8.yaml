  career_goals: Sandra aims to progress from her current janitorial role to a supervisory position within the next three years, targeting a building superintendent or facilities coordinator role. She plans
    to earn the Certified Professional Cleaner (CPC) credential and enroll in the Facilities Management program at Brooklyn College or a comparable community‑college offering a certificate in Environmental
    Health. Long‑term, she dreams of launching her own eco‑friendly cleaning business that partners with local art galleries and community centers, melding her passion for sustainability with her appreciation
    for the arts.
