  hobbies: '["Duplo building", "Coloring and drawing", "Collecting leaves and insects", "Storytime listening", "Singing and dancing", "Pretend doctor and teacher play", "Riding a tricycle", "Visiting the
    local park"]'
  career_goals: As a four‑year‑old, Ricci imagines future roles that blend her curiosity with a desire for practical help. She often says she wants to be a teacher because she enjoys sharing stories and
    helping friends learn. She also loves her family’s rabbit and dreams of becoming a veterinarian to care for animals. When playing with building blocks, she talks about building houses, hinting at an
    interest in architecture or engineering. Overall, her ambitions are driven by a wish to create orderly, caring environments for others.
