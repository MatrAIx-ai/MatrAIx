personas:
  professional: Ricci Jemison is a preschool class organizer who channels their curiosity about how things work and their methodical, reliable nature into arranging daily activity stations, often drawing
    colorful schedules on the whiteboard and quietly reminding friends to follow the plan.
  sports: Ricci Jemison participates in the Fountain Inn Little League tee-ball team and practices swimming with the community pool's junior splasher club, loving the rhythm of running bases yet sometimes
    feeling anxious before big games, especially when they cheer for the nearby Greenville Swamp Rabbits minor league baseball squad.
  arts: Ricci Jemison delights in singing folk tunes like She'll Be Coming 'Round the Mountain from preschool's holiday program and copying the bright colors of local Appalachian quilt patterns in crayon
    art, while they quietly hum Raffi's Baby Beluga at bedtime.
  travel: Ricci Jemison enjoys family road trips to the historic streets of Charleston and the breezy trails of the Great Smoky Mountains, preferring short, well-planned excursions that include a picnic
    of peanut-butter-jelly sandwiches and a stop at a local ice-cream stand where they savor a vanilla cone.
  culinary: Ricci Jemison loves buttery biscuits, creamy mac and cheese, and sweet corn pudding, and they proudly help stir the batter with a tiny wooden spoon while often requesting a drizzle of honey
    on their fresh strawberries.
  core: Ricci Jemison is a meticulously curious four-year-old who balances organized play with occasional worry, turning everyday routines into tiny adventures while keeping a careful eye on their piggy
    bank and inhaler.
background:
  cultural: Ricci grows up in Fountain Inn, South Carolina, within a family that reflects typical Southern middle‑class values. Her upbringing includes participation in community events such as the Laurens
    County fair, weekly church attendance, and family gatherings emphasizing hospitality and shared meals. Local traditions and stories about the Appalachian foothills shape her appreciation for nature,
    while her preschool incorporates regional folk songs and celebrations of holidays like Thanksgiving and Fourth of July. This blend of Southern hospitality, community involvement, and exposure to the
    area's natural environment informs her worldview.
attributes:
  skills: '["Counting to ten", "Letter recognition", "Fine motor drawing and cutting", "Basic puzzle solving", "Gross motor skills like tricycle riding", "Organizing toys", "Following multi‑step instructions",
