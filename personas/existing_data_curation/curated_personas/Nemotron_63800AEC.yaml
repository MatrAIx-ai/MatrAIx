personas:
  professional: Steven Cozad, a seasoned retail manager with four decades of hands‑on leadership, orchestrates daily store operations, meticulous inventory audits, and staff scheduling with the same methodical
    precision he brings to church choir rehearsals, while his compassionate, cooperative nature turns routine loss‑prevention meetings into mentorship sessions for younger associates.
  sports: Steven Cozad, a devoted fan of the Bowling Green Hot Rods minor‑league baseball team and the Kentucky Wildcats football program, spends Saturday mornings walking with his local walking club, attends
    every home game of the high‑school football team he once coached in the stands, and keeps fit by alternating gentle hikes along the Green River with light resistance training at the senior center’s
    gym.
  arts: Steven Cozad, who sings bass in his United Methodist church choir and devotes evenings to reading Appalachian history by authors such as James Still, finds artistic fulfillment in listening to folk
    legends like Doc Watson and John Prine while sharing bridge strategies with fellow seniors, and occasionally attends a community theater production of 'The Glass Menagerie'.
  travel: Steven Cozad, who plans his vacations with the same check‑list precision he uses for inventory, enjoys leisurely road trips to nearby Appalachian gems such as Shenandoah National Park, the Great
    Smoky Mountains, and Asheville’s Biltmore Estate, and dreams of an organized group tour of Ireland’s coastal cliffs and New Zealand’s South Island, while balancing travel costs against his fixed retirement
    income.
  culinary: Steven Cozad, an enthusiastic home cook who transforms his garden’s tomatoes, sweet corn, and beans into hearty succotash and bakes golden cornbread to accompany freshly grilled Green River
    trout seasoned with lemon, dill, and garlic, often finishing meals with a slice of apple‑cinnamon pie made from his own orchard apples.
  core: Steven Cozad blends methodical retail expertise with a warm, community‑centric spirit, turning weekly fishing trips, choir rehearsals, and meticulous budgeting into a rhythm that keeps his life
    structured, socially rich, and improbably organized despite a tendency to forget his glasses on the porch.
background:
  cultural: Steven grew up in a small farming community in central Kentucky, where values of hard work, hospitality, and community service were deeply ingrained. As a white American from a Protestant (United
    Methodist) background, he was raised with a strong sense of family loyalty, respect for tradition, and participation in church and local civic activities. His life in Bowling Green and Butler County
    has reinforced a connection to Southern Appalachian culture, including an appreciation for regional music, outdoor recreation, and preserving local heritage through storytelling and genealogy.
