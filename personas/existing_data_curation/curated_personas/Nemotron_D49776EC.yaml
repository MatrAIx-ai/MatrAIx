personas:
  professional: Angelo Bui, a 15-year-old aspiring multimedia creator, blends sketching, digital painting, photography, and set design into school projects, channeling his curiosity and sociable energy
    to lead collaborative art assignments while his meticulous organization and occasional self-imposed pressure ensure polished results.
  sports: Angelo Bui, a 15‑year‑old outdoor enthusiast, spends weekends hiking the Niagara Escarpment with the local trail club, plays casual soccer with friends after school, follows the Toronto Raptors
    in the NBA and the Buffalo Bills in the NFL, and maintains fitness through daily bike rides to school, balancing a love for nature with team spirit.
  arts: Angelo Bui, a 15‑year‑old visual storyteller, fills sketchbooks with charcoal studies of the Niagara landscape, draws inspiration from the works of David Hockney and the street artistry of Banksy,
    curates indie playlists featuring Arcade Fire and Tame Impala while strumming his guitar, and regularly attends community theater productions of Tim Burton’s films, letting these eclectic influences
    shape his artistic identity.
  travel: Angelo Bui, a 15‑year‑old wanderlust‑driven teen, prefers spontaneous weekend road trips to nearby gems like Toronto’s Art Gallery of Ontario and Boston’s Freedom Trail, has already visited New
    York City’s Museum of Modern Art, and dreams of a future backpacking adventure through Kyoto’s historic temples and the bustling art districts of Berlin, all while balancing school obligations and a
    modest travel budget.
  culinary: Angelo Bui, a 15‑year‑old budding home chef, loves crafting pepperoni pizza with fresh basil and mozzarella, experiments with avocado toast topped with radish slices and chili flakes, and is
    currently mastering Pad Thai using tamarind paste, shrimp, and bean sprouts, while also indulging in occasional sushi rolls featuring tuna and cucumber during weekend outings with friends.
  core: Angelo Bui, a 15‑year‑old artistic socialite, channels boundless curiosity into sketching and guitar riffs, thrives on being the center of conversation, yet often worries about unfinished projects
    and stays up late gaming, making them a creatively driven yet occasionally sleep‑deprived teen.
background:
  cultural: Angelo was raised in Gasport, a small town in Niagara County, New York, within a predominantly white, middle‑class community. His family values community involvement, education, and exposure
    to the arts, often attending local festivals, museum exhibits, and outdoor concerts. Growing up near the natural wonder of Niagara Falls has fostered his appreciation for scenic beauty and inspired
    his artistic pursuits. While his surname hints at Vietnamese ancestry, his household largely follows typical American cultural traditions, blending regional customs with a modern, internet‑influenced
    worldview.
