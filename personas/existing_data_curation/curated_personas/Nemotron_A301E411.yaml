personas:
  professional: Candice Yee, a retired high‑school English teacher turned community‑service organizer, leverages their curriculum design and grant‑writing expertise to develop oral‑history collections,
    volunteer tutoring programs, and senior‑center events, balancing a love of structure with flexible, people‑first solutions.
  sports: Candice Yee, a member of the Caddo Parish Senior Walking Club, starts each morning with a brisk garden walk, joins the senior center’s weekly shuffleboard league, engages in bridge tournaments
    for mental agility, and avidly roots for the New Orleans Saints, LSU Tigers, and New Orleans Pelicans.
  arts: Candice Yee immerses themselves in Southern literature from Faulkner, Welty, and Morrison, regularly attends performances by the Louisiana Shakespeare Festival, finds inspiration in the jazz of
    Ellis Marsalis and folk ballads of Odetta, and delights in classic Hollywood films starring Bette Davis and Cary Grant during quilting breaks.
  travel: Candice Yee and their husband carefully plan historic getaways, using senior discounts to explore Colonial Williamsburg, the French Quarter, Monticello, the Alamo, and St. Augustine, blending
    guided tours with spontaneous museum stops, though they often overpack and forget a few essentials.
  culinary: Candice Yee delights in cooking gumbo, jambalaya, and crawfish étouffée, mastering a dark roux seasoned with andouille and cayenne while adding fresh garden okra and tomatoes, and although they
    are an intermediate cook, they sometimes over‑season or burn the roux when juggling quilting projects.
  core: Candice Yee is a community‑focused, structure‑loving yet adaptable 77‑year‑old who balances meticulous heritage preservation with a lively social life, occasional forgetfulness, and a passion for
    quilting, gardening, and soulful Southern cuisine.
background:
  cultural: Candice was born and raised in a modest, white family in Northwestern Louisiana, immersed in Southern hospitality and close‑knit community values. Her upbringing blended Protestant church traditions
    with the region's Cajun influences, giving her an appreciation for local music, festivals, and cuisine. Strong family ties, a respect for practical self‑reliance, and a lifelong commitment to community
    service reflect the cultural norms of her rural Louisiana environment.
attributes:
  skills: '["Curriculum development", "Public speaking", "Event planning", "Grant writing", "Nonprofit budgeting", "Mentoring", "Genealogy research", "Community outreach"]'
  hobbies: '["Quilting", "Gardening", "Book club (Southern literature)", "Bridge", "Senior center dance nights", "Cooking Louisiana cuisine", "Church participation", "Historical travel"]'
  career_goals: Although retired, Candice aims to channel her expertise into preserving the cultural memory of Caddo Parish by compiling and publishing a community oral‑history collection. She also aspires
    to become a certified volunteer tutor for adult learners, serve on the board of the local historical society, and complete a basic digital literacy course to share her genealogy work online. Maintaining
    her health and managing stress through regular mindfulness practices are personal priorities that support her broader goal of staying active and engaged in community life.
