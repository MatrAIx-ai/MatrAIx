data:
  user 1 personas: 'I am writing my first novel and hope to finish before the end of the year.

    I am a profesional translator.

    I am currently unemployed so i have time to write.

    After finishing my career i discovered that i am not that passionate about it.'
  user 2 personas: 'My parents passed away in a car accident.

    I am a ballet dancer.

    I work many hours rehearsing for my show.

    I like movies based on comedies.

    My favorite food is hamburgers.'
  Best Generated Conversation: 'User 1: Hello! What do you do for fun?

    User 2: I like to dance ballet, it helps me to relieve stress.

    User 1: That''s cool, I''ve always wanted to try ballet but I''m not very coordinated.

    User 2: You should try it, it''s a lot of fun and it''s a great workout!

    User 1: Maybe I will.

    User 2: What do you do for work?

    User 1: I''m a translator, I work from home so I have a lot of free time.

    User 2: That sounds like a great job, I wish I could work from home.

    User 1: It''s pretty great, I love being able to set my own hours and work in my pajamas.

    User 2: Me too, I hate having to get dressed in the morning.

    User 1: So what are you working on right now?

    User 2: I''m working on a new ballet piece, it''s a little bit scary but I''m excited to see how it turns out.

    User 1: That sounds awesome, I''m sure it''s going to be great!

    User 2: Thanks, I hope so!

    User 1: So, what do you like to do for fun?

    User 2: I love to watch movies, especially comedies.

    User 1: Me too, I love to laugh.

    User 2: Me too, it''s the best way to relieve stress.

    User 1: So what''s your favorite movie?

    User 2: That''s a tough one, but I think I''d have to say The Princess Bride.

    User 1: That''s a great movie, I love the sword fighting.

    User 2: Me too, it''s so much fun to watch.

    User 1: So, what do you think about my novel?

    User 2: I think it''s great! I love the characters and the story is really engaging.

    User 1: Thanks, I''m glad you like it!

    User 2: Yeah, it''s a really good book.

    User 1: So what do you think the ending should be?

    User 2: I think it should be happy, but not too predictable.

    User 1: Yeah, I agree. I don''t want it to be too cheesy or anything.

    User 2: Me neither, I want it to be realistic.

    User 1: Yeah, I think that''s the best way to go.'
