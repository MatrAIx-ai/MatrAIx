personas:
  professional: Saeed Starkey is a teenage robotics hobbyist who builds custom drones, codes automation scripts, and applies a disciplined, methodical approach to each project, reflecting they love structure
    and competitive perfectionism.
  sports: Saeed Starkey trains with the Boyertown Youth Weightlifting Club, runs the varsity cross-country team at Boyertown High School, follows the Philadelphia Eagles and the Reading Fightin Phils, and
    logs every lift and mile in a meticulously kept training log, reflecting they competitive edge and love for structured routines.
  arts: Saeed Starkey curates a collection of custom-painted RC drones inspired by the kinetic art of Ryohei Ishii, streams tutorials from YouTube creator Adam Savage, and they unwind with progressive metal
    playlists featuring Dream Theater and the orchestral scores of Hans Zimmer, infusing technical precision into their artistic side.
  travel: Saeed Starkey prefers meticulously planned weekend getaways, having toured the historic Gettysburg battlefield, the Amish Country roadways of Lancaster, and they dream of a spring trip to the
    robotics exhibit in Tokyo's Miraikan, all while balancing school schedules and a finite budget.
  culinary: Saeed Starkey favors high-protein meals like grilled chicken breast with quinoa, broccoli, and a side of roasted sweet potatoes, enjoys crafting protein shakes with whey, banana, and almond
    butter, and they occasionally indulge in a classic Pennsylvania Dutch pork and sauerkraut plate, reflecting both dietary discipline and a nod to local tradition.
  core: Saeed Starkey is a detail-driven teen who turns every hobby into a data-driven experiment, obsessively tracks progress, and they sometimes forget to step outside the comfort of spreadsheets and
    static routines.
background:
  cultural: Saeed grew up in a predominantly white, middle‑class community in Boyertown, Pennsylvania, a town with historic Pennsylvania‑Dutch roots and a strong emphasis on self‑reliance and modesty. His
    family values punctuality, responsibility, and practical achievement, reflecting the broader cultural ethos of the region. Community events such as local fairs, high school sports, and volunteer service
    projects have reinforced his sense of belonging while allowing him to maintain his preference for small, familiar groups. The cultural environment encourages practicality, modest ambition, and a respect
    for skilled trades, all of which shape Saeed’s outlook and aspirations.
