  career_goals: Saeed aspires to channel his practical skills and competitive drive into a technical career that offers clear progression and measurable outcomes. He aims to obtain a GED, followed by an
    apprenticeship in automotive mechanics or a certification in information technology support. In the longer term, he envisions becoming a certified automotive technician or IT specialist, eventually
    moving into a supervisory role where he can apply his critical thinking and reliability. He also entertains the possibility of entering competitive esports or game development, leveraging his strategic
    gaming experience.
