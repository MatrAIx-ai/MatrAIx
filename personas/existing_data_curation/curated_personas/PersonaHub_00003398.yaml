persona_description: A mechanical engineer with expertise in finite element modeling and crash testing, particularly in the design and analysis of side impact dummy models for vehicle safety standards.
  They have experience working with NHTSA to develop detailed finite element models for the side impact dummy, ensuring the device is capable of accurately simulating the impact response of the human body
  in a side-impact crash. The persona is also skilled in analyzing and interpreting the results of impact tests, and is likely to have a deep understanding of the physics of vehicle crashes and the role
  of anthropomorphic test devices in vehicle safety.
