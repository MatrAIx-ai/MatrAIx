  career_goals: Douglas aims to transition from senior technical specialist to a leadership role where he can shape innovative geospatial strategies for regional planning in King County. He envisions directing
    a multidisciplinary GIS team, championing the integration of AI‑driven mapping with artistic visualization to support sustainable urban development. Long‑term, he hopes to launch his own consultancy
    that offers cutting‑edge photogrammetric services combined with community‑focused map storytelling, while also publishing research on flexible, user‑centric spatial data workflows. Competitive drive
    pushes him to earn industry certifications and speak at national conferences, positioning himself as a recognized thought leader in the field.
