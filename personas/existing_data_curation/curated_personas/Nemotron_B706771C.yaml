personas:
  professional: Douglas Frisby is a senior geospatial specialist whose deep expertise in high‑resolution aerial photogrammetry, Python‑driven GIS analysis, and creative cartographic visualization is complemented
    by a restless curiosity and a penchant for flexible, sometimes chaotic project planning, allowing them to lead multidisciplinary teams with an artistic storytelling flair while staying open to unconventional
    AI‑driven mapping methods.
  sports: Douglas Frisby fuels their energy by hiking the Cascades with the Northwest Trail Club in summer, paddling kayaks along the Puget Sound in spring, and squeezing in weekend pick‑up basketball games
    while cheering for the Seattle Seahawks, Seattle Sounders FC, and Seattle Mariners, yet their flexible approach to fitness means they often skip scheduled runs when a board‑game night or hackathon beckons.
  arts: Douglas Frisby channels their artistic side through landscape photography inspired by Ansel Adams, watercolor studies echoing Claude Monet’s soft palettes, and impromptu guitar circles where they
    riff on Bob Dylan classics, regularly visiting the Seattle Art Museum’s contemporary exhibits and curating visual stories that blend scientific maps with artistic flair.
  travel: Douglas Frisby prefers spontaneous, culture‑rich travel itineraries that blend historic site tours—like walking the ancient streets of Kyoto and exploring the Roman ruins of Pompeii—with outdoor
    adventures in places such as Patagonia’s glacier fields, often planning trips on a modest budget after work and dreaming of a future immersive expedition to Iceland’s volcanic landscapes.
  culinary: Douglas Frisby, an enthusiastic home chef, experiments with Mediterranean paella brimming with saffron and fresh mussels, masters the art of hand‑rolled ramen featuring miso broth and cha‑shu
    pork, and frequently forages local mushrooms to garnish their rustic sourdough, all while hosting dinner parties that showcase a rotating menu of global recipes and a curated wine selection.
  core: Douglas Frisby is a curiosity‑driven geospatial wizard who balances high‑tech drone mapping with watercolor day‑dreams, occasionally letting disorganization and worry hijack deadlines, yet always
    turning stress into a new map narrative.
background:
  cultural: Douglas grew up in a middle‑class family of mixed European ancestry—primarily Irish and Scandinavian roots—deeply embedded in the Pacific Northwest’s culture of independence, environmental stewardship,
    and appreciation for natural beauty. Raised near Seattle, he internalized the region’s outdoor‑oriented lifestyle, its strong tech community, and a respect for the Coast Salish peoples and their relationship
    to the land. This blend of western heritage and Pacific Northwest values informs his open‑minded curiosity, his competitive drive in professional settings, and his commitment to using cartography as
    a bridge between modern data and the cultural narratives of his community.
