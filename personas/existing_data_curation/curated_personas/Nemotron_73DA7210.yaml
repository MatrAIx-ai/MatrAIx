personas:
  professional: Maria Zuniga, a veteran non‑retail sales supervisor, translates data‑driven performance metrics and bilingual coaching into consistent target‑beating results, applying a structured, practical
    leadership style while they assertively champion a supportive work environment.
  sports: Maria Zuniga supports the Houston Astros and the Dallas Cowboys, and they stay active by walking their dog with the Riverbend Strollers walking club and participating in a local senior softball
    league each spring.
  arts: Maria Zuniga enjoys listening to regional folk music by Los Tigres del Norte and Jenni Rivera, watches telenovelas such as "La Reina del Sur", and they attend community cultural festivals featuring
    traditional dance performances, finding that the rhythms and stories shape their sense of identity.
  travel: Maria Zuniga prefers low‑stress, family‑oriented trips, often planning detailed itineraries for weekend getaways to the Texas Hill Country and annual pilgrimages to the historic San Antonio River
    Walk, while they dream of exploring the ancient architecture of Seville, Spain on a future cultural cruise.
  culinary: Maria Zuniga expertly prepares mole sauce with dried chilies, chocolate, and a hint of smoked paprika, crafts tamales using corn masa and fresh cilantro, and they love incorporating Southern
    okra and collard greens into traditional family recipes, turning each meal into a celebration of flavor.
  core: Maria Zuniga balances meticulous organization with gentle self‑care, channeling their structured mindset into thriving sales leadership, home‑cooked feasts, and a steady quest for financial and
    health stability, all while wrestling with occasional worry‑driven splurges and a penchant for late‑night telenovela marathons.
background:
  cultural: Maria was raised in a Mexican‑immigrant family in the Atlanta metropolitan area, where Spanish was spoken at home alongside English. She maintains strong ties to Mexican culture through celebrations
    of Día de los Muertos, Cinco de Mayo, and family traditions that emphasize respect for elders and communal support. Her culinary practices reflect a blend of Mexican and Southern flavors, and she participates
    in local cultural festivals that showcase Mexican heritage. While embracing the Southern hospitality of Georgia, Maria preserves her bilingual abilities, familial values, and a deep sense of community,
    which influence both her personal life and professional interactions.
