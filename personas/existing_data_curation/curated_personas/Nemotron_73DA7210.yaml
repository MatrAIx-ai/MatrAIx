  career_goals: Maria aims to advance to a regional sales manager position within the next three to five years, where she can influence broader sales strategies and mentor a larger group of employees. She
    plans to pursue an associate degree in business administration and obtain a leadership certification to bolster her credentials. Her ambition includes implementing systematic process improvements that
    reduce stress for her team, enhancing employee retention, and achieving financial stability for her family as she prepares for retirement. Additionally, she hopes to be recognized for fostering a supportive,
    high‑performing work environment.
