personas:
  professional: Gabriel Lewis, a 37‑year‑old network architect in the Bay Area, combines deep mastery of BGP, SDN, and Terraform with a methodical, competitive mindset that drives them to architect zero‑trust,
    AI‑augmented infrastructures while meticulously documenting every change.
  sports: Gabriel Lewis, at 37, favors low‑impact endurance activities—hiking the Pacific coastal trail on weekends and cycling with the San Francisco MTB club—while cheering the Golden State Warriors and
    San Francisco Giants from home and avoiding crowded gyms.
  arts: Gabriel Lewis spends evenings mastering Chopin Nocturnes on piano, curates a digital photo archive of vibrant murals by artists like Rigo 23 and Shepard Fairey in San Francisco, and draws inspiration
    from sci‑fi authors such as William Gibson and philosophers like Nietzsche, while often listening to the minimalist compositions of Philip Glass.
  travel: Gabriel Lewis plans trips with the same precision as a network rollout, having meticulously explored the street art of Berlin, the geothermal wonders of Iceland, and coastal hikes in New Zealand,
    while favoring off‑peak travel to avoid crowds and budgeting for solo photography expeditions.
  culinary: Gabriel Lewis approaches cooking as a structured experiment, frequently preparing sous‑vide duck breast with a pomegranate glaze, perfecting saffron risotto, and crafting fine‑dining tasting
    menus that blend molecular techniques with classic French sauces, all while sourcing fresh produce at the Ferry Plaza Farmers Market.
  core: Gabriel Lewis is a methodical network architect who channels his curiosity and competitive edge into solitary artistic pursuits, meticulous financial engineering, and disciplined self‑care, all
    while battling a persistent undercurrent of worry.
background:
  cultural: Gabriel grew up in a middle‑class suburban environment in the Pacific Northwest, where his parents emphasized rigorous education, self‑reliance, and an appreciation for both the sciences and
    the arts. His family’s European heritage (German and Irish roots) fostered a cultural outlook that values practicality, critical thinking, and community involvement. Relocating to San Francisco for
    his career immersed him in a diverse, innovation‑driven tech culture that celebrates individuality, curiosity, and boundary‑pushing ideas. While he embraces the city’s openness to unconventional thinking,
    he retains a reserved, introspective demeanor shaped by his upbringing, balancing personal privacy with a professional drive for excellence.
attributes:
  skills: '["Network Architecture", "Network Security", "Software‑Defined Networking (SDN)", "Network Function Virtualization (NFV)", "Cloud Networking (AWS, Azure)", "Infrastructure as Code (Terraform,
