    "Project Management (Agile, Scrum)", "Data Visualization (Grafana, Tableau)", "Routing Protocols (BGP, OSPF, MPLS)"]'
  hobbies: '["Digital Photography", "Street Art Exploration", "Classical Piano", "Science‑Fiction & Philosophy Reading", "Model Railway Building", "Raspberry Pi Home Automation", "Mindfulness Meditation",
    "Bay Area Hiking", "Gourmet Cooking"]'
  career_goals: Gabriel aims to ascend to a senior leadership role such as Director of Network Architecture or Chief Network Officer within the next five years, steering strategic network transformation
    initiatives that incorporate AI‑driven automation and zero‑trust security. He plans to earn the highest tier of Cisco and cloud certifications, publish whitepapers on resilient network design, and contribute
    to open‑source projects like FRRouting. He also intends to mentor emerging engineers, build a reputation as a thought leader in the Bay Area tech community, and eventually launch a consultancy focused
    on secure, decentralized networking solutions for fintech startups.
