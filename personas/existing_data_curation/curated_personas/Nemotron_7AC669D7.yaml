  career_goals: Rebecca aspires to turn her artistic passion into a sustainable freelance career. She envisions working as a digital illustrator and content creator, collaborating with independent game
    studios or publishing her own comic strips online. She aims to develop a personal brand on social media where she shares her artwork, short stories, and behind‑the‑scenes process videos, eventually
    monetizing through commissions, merchandise, and Patreon support. In the longer term, she hopes to complete her GED and attend a community‑college art program to refine her technique, while preserving
    the flexibility that allows her to travel, explore new cultures, and draw inspiration from varied experiences. She also dreams of curating community art events in Tracy, giving other young creators
    a platform.
