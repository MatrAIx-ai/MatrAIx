personas:
  professional: Rebecca Ellis is a sixteen‑year‑old digital illustrator and budding content creator who blends hand‑drawn cityscapes with animated TikTok time‑lapse videos, leverages Adobe Photoshop and
    Procreate to fulfill commission requests for indie game studios, and channels their relaxed yet adaptable work ethic into a freelance brand that emphasizes flexibility over rigid schedules, where they
    thrive on spontaneous client briefs.
  sports: Rebecca Ellis rolls through the local skate park with the Tracy Skate Collective every Saturday, cycles the Delta waterways as part of the 'Delta Pedalers' club during the summer, and they cheer
    for the Sacramento Kings in basketball season and the San Jose Earthquakes in soccer, preferring low‑pressure, community‑oriented activities over competitive sports.
  arts: Rebecca Ellis spends hours sketching wetlands and farm vistas with charcoal, translates those scenes into digital paintings on Procreate while streaming lo‑fi beats from artists like J Dilla and
    the indie folk tunes of Fleet Foxes, shares time‑lapse process videos of their work on TikTok, and they draw inspiration from the surreal landscapes of Studio Ghibli and the street art of Banksy, which
    inform their emerging comic‑strip style.
  travel: Rebecca Ellis plans weekend escapades on a mix of impulsive bike rides and Pinterest‑inspired road trips, having already biked the Sacramento River Trail, hiked the misty groves of Muir Woods,
    visited the vibrant farmers’ market in Santa Cruz, and they dream of backpacking through Kyoto’s temples and the colorful streets of Oaxaca, all while balancing school commitments and a modest travel
    budget.
  culinary: Rebecca Ellis experiments in the kitchen with recipes ranging from Japanese ramen broth and Mexican chilaquiles to Moroccan tagine, loves mixing miso, coriander, and chili flakes into a homemade
    veggie stir‑fry, documents each dish on their blog with candid photos and occasional blooper reels, and they admit to a quirky habit of sketching the plating before cooking.
  core: Rebecca Ellis is a laid‑back teenage artist who turns sketchbook doodles into digital commissions, lives on a stipend of allowance and side gigs, casually navigates health and fitness, and they
    fuel creativity with spontaneous cooking, skateboarding, and day‑dream‑filled travel plans.
background:
  cultural: 'Rebecca grew up in Tracy, a small city in California’s San Joaquin Valley, where the community blends a traditional agricultural heritage with the progressive, multicultural vibe of the broader
    Bay Area. Her family is of predominantly Anglo‑American descent, and her upbringing reflects typical middle‑class suburban values: an emphasis on independence, practicality, and community involvement.
    While her immediate cultural environment is largely white, the region’s proximity to diverse ethnic neighborhoods and the presence of farmworker cultures have exposed her to a variety of foods, music,
    and viewpoints, fostering an open‑minded outlook. The central‑valley lifestyle—outdoor activities, seasonal festivals, and a strong sense of local identity—shapes her appreciation for nature and community
    art initiatives, aligning with her calm, resilient, and flexible personality.'
