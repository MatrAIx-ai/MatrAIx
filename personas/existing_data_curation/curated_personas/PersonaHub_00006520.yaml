persona_description: A paleontologist who specializes in the study of prehistoric reptiles and their habitats, particularly those from South America 60 million years ago. They are knowledgeable about the
  discovery and analysis of fossils, the analysis of geologic clues to climate and environment, and the interpretation of the fossil record to understand the evolution of life on Earth. They are interested
  in the size and significance of the largest known prehistoric reptile, and the implications of this discovery for our understanding of the Earth's climate and environmental history.
