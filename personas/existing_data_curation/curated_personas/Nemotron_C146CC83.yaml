  career_goals: Byron aims to move from a hands‑on assembler role to a supervisory position within the next three years, leveraging his deep technical knowledge and competitive drive to lead a shift team
    that consistently exceeds production goals. He plans to obtain OSHA certified trainer status and a Journeyman Welder credential, which will qualify him for a lead‑fabricator role. Long‑term, he envisions
    opening a small custom‑metal shop that serves local contractors and the growing marine‑recreation market in Myrtle Beach, offering bespoke railings, boat fittings, and decorative steel art. To achieve
    this, he is pursuing night courses in small‑business management and exploring financing options through community development programs that support minority entrepreneurs in South Carolina.
