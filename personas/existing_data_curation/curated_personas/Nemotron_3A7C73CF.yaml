  career_goals: Pamela aims to transition into a leadership role within the next two years, pursuing certification as a Nurse Manager and completing a BSN program to strengthen her clinical expertise. She
    envisions spearheading a hospital-wide initiative that incorporates arts‑based therapies into patient recovery programs, thereby blending her curiosity for unconventional ideas with her nursing background.
    Long‑term, she hopes to mentor a cohort of nurses, champion senior‑patient wellness through community education workshops, and eventually retire with a part‑time consultancy that focuses on quality
    improvement and health‑literacy projects for rural populations.
