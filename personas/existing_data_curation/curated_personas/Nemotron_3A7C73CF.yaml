personas:
  professional: Pamela Hoang, a 56‑year‑old seasoned registered nurse, leverages her methodical organization and curiosity to excel in acute care assessments, IV therapy, wound care, and to pioneer evidence‑based
    art‑integrated health education programs while mentoring new nurses with exacting documentation standards.
  sports: Pamela Hoang, an avid follower of the Alabama Crimson Tide football and the Birmingham Barons baseball, participates in a weekly senior walking club at Oak Mountain and enjoys gentle yoga sessions
    at the local community center, maintaining a modest fitness routine that balances her love of nature with low‑impact exercise.
  arts: Pamela Hoang, who regularly visits curated exhibitions featuring artists such as Claude Monet and regional painter John T. Woeltjen, spends evenings watercoloring Alabama countryside scenes inspired
    by Winslow Homer while listening to Norah Jones, and finds her creative practice essential for personal reflection and community health workshops.
  travel: Pamela Hoang, who prefers low‑key, culturally rich trips, has explored historic Savannah, Georgia, and the art‑laden streets of Santa Fe, New Mexico, while dreaming of a canvas‑filled pilgrimage
    to Paris’s Musée d’Orsay and a heritage tour of Vietnamese ancestral villages tied to her genealogy research.
  culinary: Pamela Hoang, a confident cook of Southern‑inspired cuisine, delights in preparing shrimp and grits with fresh thyme and lemon, perfects her buttermilk biscuits using heirloom flour, and frequently
    experiments with native herbs like sweet basil and sorrel harvested from her garden to flavor dishes such as collard‑green pilaf.
  core: Pamela Hoang, a 56‑year‑old nurse‑artist, blends meticulous care with a competitive curiosity, turning solitude into watercolor landscapes while fiercely guarding her financial future and indulging
    in secret late‑night mystery novels.
background:
  cultural: Pamela was raised in a close‑knit, predominantly white, Southern community in Calhoun County, Alabama, after her family relocated from the Midwest during her childhood. Her upbringing emphasized
    modesty, hard work, and community service rooted in the region's traditions of Southern hospitality and church involvement. While she respects these cultural foundations, her curious nature has led
    her to seek broader artistic and intellectual experiences, from museum visits to literature from diverse cultures. This blend of regional values and an appreciation for varied perspectives informs her
    compassionate nursing practice and her interest in integrating arts into healthcare.
