  career_goals: After completing his associate’s degree, Marlon plans to transfer to a four‑year university to earn a bachelor’s degree in Public Administration or Community Development. His long‑term ambition
    is to work as a project manager within his tribal government, overseeing initiatives that improve health services, education, and economic opportunities for the Yavapai community. He also hopes to develop
    youth mentorship programs that blend modern skills with cultural traditions, and eventually pursue elected leadership on the tribal council to advocate for sustainable development and cultural preservation.
