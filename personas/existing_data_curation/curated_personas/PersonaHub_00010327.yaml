persona_description: A healthcare professional who works in the emergency department or a pediatric practice, responsible for diagnosing and treating children with major trauma. They are aware of the potential
  risks associated with ionising radiation and strive to balance their patients' exposure to radiation with the need for diagnostic accuracy. They are familiar with the current guidelines on which body
  part to scan and when in paediatric major trauma, and are dedicated to ensuring that all sustained injuries are identified and treated.
