  hobbies: '[''Digital drawing'', ''Swimming'', ''Beachcombing'', ''Reading fantasy novels'', ''Writing fan-fiction'', ''Playing Minecraft and Animal Crossing'', ''Journaling'', ''Volunteering at animal
    shelter'', ''Participating in beach cleanup'']'
  career_goals: Victoria aspires to combine her love for the ocean with a desire to help others by pursuing a career in marine conservation or environmental education. She hopes to study marine biology
    in college and eventually work with organizations that protect coastal habitats and educate the public about sustainable practices. Recognizing the practical need for job stability, she also considers
    a backup plan in environmental health or teaching, where she can apply her communication strengths. Her long‑term ambition is to create community programs that engage young people in hands‑on environmental
    projects, blending her curiosity with a pragmatic approach to making a tangible impact.
