personas:
  professional: Jason France, a 31‑year‑old full‑stack engineer based in the Sonoran desert region, blends curiosity with pragmatic design, leading agile squads to architect cloud‑native solutions on AWS
    and GCP, emphasizing test‑driven development, security, and mentorship as they work toward a technical leadership role.
  sports: Jason France competes in a local basketball league that regularly faces off against a Phoenix Suns alumni team, rides with the Desert Trail Riders mountain‑bike club for weekend raids in the Sonoran
    desert, and supports the Arizona Diamondbacks, Phoenix Suns, and Seattle Seahawks, using hiking as primary cardio and keeping a Garmin watch for performance metrics.
  arts: Jason France captures sweeping desert landscapes and urban skylines with a DJI Mavic drone, finds creative inspiration in the works of Ansel Adams and Edward Hopper, curates playlists featuring
    Tycho, The Strokes, and Daft Punk, and frequents monthly gallery openings at the Phoenix Art Museum, where they network with fellow tech‑creative enthusiasts.
  travel: Jason France prefers DIY itineraries, having trekked Antelope Canyon, snorkeled the Great Barrier Reef, and camped under the stars in Sedona, while dreaming of witnessing the Northern Lights in
    Iceland and treating themselves to a beach retreat in Maui, mixing desert adventure with occasional relaxed getaways.
  culinary: Jason France experiments with craft brewing, favoring hop‑forward IPAs and occasional sour ales, cooks spicy ramen from scratch, grills smoked brisket with a dry‑rub seasoning, and always tops
    tacos with fresh cilantro and lime, while their go‑to comfort meal is a perfectly seared ribeye steak paired with roasted sweet potatoes.
  core: Jason France is a competitive, curiosity‑driven tech professional who balances disciplined ambition with a love for desert adventures, drones, and home‑brewed experiments.
background:
  cultural: Jason grew up in a middle‑class, predominantly Anglo‑American household in the Midwest, where values of self‑reliance, practicality, and community participation were emphasized. His family celebrated
    traditional American holidays and fostered curiosity and personal achievement. After relocating to Scottsdale, he embraced elements of Southwest lifestyle—outdoor recreation, a relaxed but tech‑savvy
    urban environment, and the region’s mix of diverse cultures. His cultural identity is rooted in mainstream American culture, shaped by both his upbringing and the vibrant, innovative community of the
    Phoenix metropolitan area.
