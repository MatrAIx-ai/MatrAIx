personas:
  professional: Aaron Hammons is a budding young engineer who transforms detailed LEGO kits into custom structures, writes Scratch programs that simulate simple mechanical systems, and leads the school’s
    chess and robotics clubs with the same disciplined, competitive precision that defines his meticulous, goal‑driven mindset.
  sports: Aaron Hammons enjoys structured physical activities like after‑school swimming with the Riverside Sharks club and seasonal soccer with the Meadowbrook Tigers, while cheering for the Cleveland
    Browns and Cleveland Guardians, and they track each lap and practice session in a logbook as meticulously as they do their LEGO builds.
  arts: Aaron Hammons immerses in creative arts by building narrative LEGO scenes inspired by the visual storytelling of The LEGO Movie, listening attentively to cinematic scores from Hans Zimmer, and rereading
    graphic nonfiction works by National Geographic Kids, all of which shape his analytical imagination.
  travel: Aaron Hammons enjoys meticulously planned trips, from weekend visits to the Great Lakes Science Center in Cleveland and the Kennedy Space Center in Florida to a dream excursion to Tokyo’s Miraikan
    museum, always drafting checklists and itineraries that satisfy his desire for structure and measurable milestones.
  culinary: Aaron Hammons prefers precise, measured cooking, often measuring out ingredients for classic spaghetti Bolognese, buttery chocolate chip cookies, and vegetable stir‑fry with carrots, peas, and
    bell peppers, and they take pride in following step‑by‑step recipes that align with his organized, rule‑following nature.
  core: Aaron Hammons is a disciplined nine‑year‑old who channels a calm, competitive drive into LEGO engineering, chess, and meticulously structured routines, even counting each LEGO brick and cereal piece
    with exacting precision.
background:
  cultural: Aaron was raised in a predominantly white, Southern community in Cairo, Georgia. The town’s culture emphasizes close family ties, church involvement, and a strong work ethic rooted in rural
    traditions. He attends a local Baptist church where Sunday school and community service reinforce values of responsibility, order, and modest ambition. The surrounding farmland and small-town environment
    foster a practical mindset, encouraging activities like 4-H projects and Boy Scouts that teach self-reliance and hands-on skills. These cultural influences, combined with his family's encouragement
    of discipline and achievement, shape his organized and competitive personality.
attributes:
  skills: '[''Organizational planning'', ''Mental arithmetic'', ''Strategic chess'', ''LEGO engineering'', ''Scratch programming'', ''Attention to detail'']'
  hobbies: '[''LEGO building'', ''Chess'', ''Reading science and engineering books'', ''Scratch programming'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Rock collecting and cataloguing'', ''Boy Scouts
    merit badge projects'']'
  career_goals: Aaron's long-term ambition is to work in a field where structure, precision, and competition are valued. He dreams of becoming a mechanical or robotics engineer who designs reliable machines
    and competes in national youth robotics contests. He plans to pursue advanced STEM education, earn merit badges in engineering through Boy Scouts, and eventually lead a team that creates innovative,
    practical technology for his community. His competitive nature drives him to aim for top rankings in science fairs and engineering challenges.
