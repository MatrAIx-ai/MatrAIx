    ''Collecting rocks and identifying local flora'']'
  career_goals: Rachel imagines a future where she works alone in a quiet lab or field setting, studying wildlife and designing technology that protects the environment. She dreams of becoming a wildlife
    biologist or an environmental engineer, developing sensors or small robots to monitor habitats. Her competitive streak fuels a desire to win science fairs and earn recognition for innovative projects.
    While still young, she also entertains the idea of creating her own video games that blend educational content with adventure, hoping to inspire other curious kids.
