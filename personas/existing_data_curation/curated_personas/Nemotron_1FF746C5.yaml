personas:
  professional: Rachel Hill is a budding young coder and LEGO architect who blends imaginative storytelling with practical problem‑solving by creating simple Scratch games and intricate custom LEGO city
    models, thriving in quiet corners of the library where their curiosity fuels self‑directed learning while their relaxed approach to deadlines sometimes leads to a scattered workspace.
  sports: Rachel Hill enjoys wandering the nearby hills and riding a bike through the local park, participates in the community’s U10 soccer league with the Tigers, and cheers for the region’s professional
    baseball team, the Blue Jays, while preferring solitary nature hikes over organized team sports.
  arts: Rachel Hill channels their love of fantasy into lively sketches of imagined worlds while listening to instrumental pieces by Ludovico Einaudi and Yiruma, and they also admire the storytelling of
    J.K. Rowling and the whimsical art of Hayao Miyazaki, often recreating scenes from Spirited Away in their sketchbook.
  travel: Rachel Hill prefers low‑key, nature‑focused trips, often spending weekends hiking in nearby state parks and cataloguing flora, while dreaming of a family road adventure to the Grand Canyon and
    a future visit to the Scottish Highlands, all arranged with careful parental planning to fit a modest allowance.
  culinary: Rachel Hill enjoys simple, comforting meals like cheesy mac‑and‑cheese and homemade pepperoni pizza, proudly adds pine nuts to fruit salads, and loves experimenting with cookies that include
    dark chocolate chips and a dash of cinnamon, though their cooking skill is limited to assembling pre‑made ingredients under parental supervision.
  core: Rachel Hill is a quietly curious builder who blends imagination with practical problem‑solving, prefers solitary adventures, and habitually arranges collected rocks alphabetically in their sketchbook
    while occasionally forgetting to finish school assignments.
background:
  cultural: Rachel comes from a white, middle‑class family in suburban San Bernardino, California. Her upbringing reflects typical Southern California cultural influences, including celebrating holidays
    like Thanksgiving, Christmas, and the Fourth of July, and participating in community events such as the county fair. While her household embraces a predominantly Anglo‑American heritage, the diverse
    environment of San Bernardino County exposes her to a mosaic of cultures—Mexican, Asian, and African American—that enrich her perspective on food, music, and community life. Her family values education,
    outdoor exploration, and independence, which align with her solitary and curiosity‑driven personality.
