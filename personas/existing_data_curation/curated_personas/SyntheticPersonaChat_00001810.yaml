    User 2: That''s always a plus.

    User 1: Yeah, it was.

    User 2: So, what do you like to do in your free time?

    User 1: I like to go out dancing, go to concerts, and hang out with my friends.

    User 2: That sounds like a lot of fun. I like to do those things too.

    User 1: Cool! Maybe we can go out dancing sometime.

    User 2: That would be fun!

    User 1: Great! I''ll let you know when I''m free.

    User 2: Okay, thanks!'
