    to music and dancing","Helping with household chores"]'
  career_goals: She dreams of becoming an illustrator or author of children's books, where she can combine her love of art and storytelling to bring joy to other kids. She also imagines caring for animals
    as a future veterinarian or wildlife photographer, hoping to protect nature. Ultimately, she aspires to use her creativity to make the world a kinder, more beautiful place.
