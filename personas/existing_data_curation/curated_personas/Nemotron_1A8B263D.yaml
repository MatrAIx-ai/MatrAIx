personas:
  professional: Sidney Stokley, an 8‑year‑old aspiring nature illustrator who translates lake vistas onto sketch pads, invents whimsical storylines for her characters, thrives on spontaneous creativity,
    and often misplaces her art supplies, reflecting both a love for art and a struggle with organization.
  sports: Sidney Stokley, an 8‑year‑old who enjoys casual soccer with the River Valley Raptor junior squad, participates in swim lessons at Lakeside Aquatics Club, cheers for the Seattle Mariners during
    family outings, and favors exploratory play at the community park over rigidly structured competitions.
  arts: Sidney Stokley, an 8‑year‑old who spends afternoons drawing lake scenes inspired by the whimsical illustrations of Mary Ann Hoberman, listens to Disney soundtracks and the upbeat pop of Taylor Swift,
    and spontaneously dances to the chorus of "Let It Go," weaving those rhythms into their imaginative storybooks.
  travel: Sidney Stokley, an 8‑year‑old who loves weekend trips to nearby Lake Evergreen to collect shells, dreams of visiting the coastal cliffs of Big Sur to hunt for sea glass, and enjoys planning simple
    family outings on a colorful map while balancing curiosity with the comfort of familiar surroundings.
  culinary: Sidney Stokley, an 8‑year‑old who favors peanut butter & jelly sandwiches, bright strawberry smoothies, and occasional fish‑shaped crackers, delights in stirring mac‑and‑cheese in the kitchen,
    and feels thrilled when a dish includes crunchy carrot sticks or a sprinkle of shredded cheese.
  core: Sidney Stokley, an 8‑year‑old art‑loving explorer who doodles lake vistas, collects shells, dances spontaneously, and navigates intense emotions with a blend of curiosity, kindness, and occasional
    anxiety‑induced hesitations.
background:
  cultural: Sidney grows up in a suburban, predominantly white neighborhood in Land O Lakes, Florida, where community life revolves around local parks, lakes, and family-friendly activities. Her family
    participates in typical middle‑class cultural traditions, including church gatherings, holiday celebrations, and community events such as the annual Lakeside Art Fair. The warm climate and proximity
    to nature have nurtured her love of outdoor exploration, while the regional emphasis on arts education through schools and after‑school programs has fostered her appreciation for creative expression.
