  hobbies: '[''Surfing'', ''Stand‑up paddleboarding'', ''Ukulele playing'', ''Songwriting'', ''Coastal hiking'', ''Photography'', ''Watercolor painting'', ''DIY costume making'', ''Reading speculative fiction'',
    ''Cooking with foraged ingredients'', ''Beach clean‑up volunteering'']'
  career_goals: Kathie aims to create a year‑round community arts hub in Gold Beach that merges performance art, surf culture, and environmental education. She plans to launch an annual coastal arts‑and‑sports
    festival that showcases local musicians, dancers, and surf athletes, positioning herself as a cultural ambassador for the Oregon coast. Long‑term, she hopes to mentor youth through workshops that blend
    music, theater, and water‑sport skills, and to develop a digital series highlighting the stories of coastal creatives. Ultimately, she wants her original musical‑theater piece, inspired by Pacific Northwest
    folklore, to tour regional theaters.
