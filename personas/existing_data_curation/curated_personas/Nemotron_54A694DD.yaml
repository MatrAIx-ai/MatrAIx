personas:
  professional: Kathie Cummings is a community arts and surf‑culture coordinator who blends ukulele folk‑rock performance, improvisational storytelling, and lifeguard‑level safety training into immersive
    beach festivals, letting their curiosity and relaxed approach to obligations fuel a fluid, sometimes improvised programming style while they channel a competitive streak to secure high‑profile collaborators.
  sports: Kathie Cummings is an avid surfer and stand‑up paddleboarder who tackles the Oregon coastal trail in the off‑season, trains with the local Pacific Wave Riders surf club, cheers for the Portland
    Trail Blazers and Timbers, and they maintain fitness through spontaneous beach sessions rather than rigid routines, reflecting their flexible, competitive spirit.
  arts: Kathie Cummings channels their curiosity into folk‑rock ukulele songwriting inspired by Bob Dylan and Joanna Newsom, paints impressionistic seascape watercolors reminiscent of J.M.W. Turner, crafts
    DIY stage costumes while admiring the theatrical flair of David Bowie, and they participate in underground jam sessions that often feature improvisations on Sufjan Stevens’ melodies, all of which shape
    their vibrant community‑art identity.
  travel: Kathie Cummings prefers spontaneous, surf‑driven mini‑adventures, often hopping from coastal gems like Cannon Beach, the San Juan Islands, and Victoria, BC to occasional far‑flung escapes such
    as Maui’s North Shore, and they plan itineraries on the fly while balancing a limited festival‑budget with a desire for authentic, low‑key experiences.
  culinary: Kathie Cummings is an experimental home chef who whips up seaweed‑pesto linguine, dulse‑and‑chickweed buttered salmon, and wild‑mushroom risotto flavored with locally foraged rosemary and fennel,
    delighting in the tactile process of foraging and plating, yet they often skip proper food‑safety steps when juggling a surf coaching session, leading to occasional kitchen mishaps.
  core: Kathie Cummings is a 38‑year‑old coastal‑minded muse who blends surf‑coach vigor, folk‑rock ukulele flair, and watercolor serenity into community projects, thriving on spontaneous creativity while
    they habitually forget appointments and overpack for every adventure.
background:
  cultural: Kathie is a white American raised in the Pacific Northwest with a mixed heritage that includes Russian roots from her mother’s side, reflected in her patronymic Vladimirovna. Growing up in coastal
    Oregon shaped her deep appreciation for the ocean, rugged landscapes, and a laid‑back, nature‑centered lifestyle. She blends the storytelling traditions of Slavic folk culture with the bohemian, surf‑and‑arts
    vibe of the Oregon coast, resulting in a hybrid cultural identity that values creativity, environmental stewardship, and community collaboration. Her background informs both her artistic expression
    and her commitment to local cultural initiatives.
attributes:
  skills: '[''Ukulele playing'', ''Vocal performance'', ''Improvisational storytelling'', ''Event hosting'', ''Surf instruction'', ''Stand‑up paddleboard coaching'', ''Basic first aid'', ''Stage makeup'',
