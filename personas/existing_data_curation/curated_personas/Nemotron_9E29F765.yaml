  career_goals: 'David aims to open a boutique farm‑to‑table restaurant in the East End of Houston that showcases his signature blend of classic Texas dishes and experimental flavors. Within the next five
    years, he seeks a James Beard Award nomination for Best Chef: Southwest and plans to publish a cookbook focused on practical yet inventive cooking for home chefs. He also wants to establish a mentorship
    program for aspiring cooks without formal culinary education and, eventually, become a culinary consultant helping hospitality groups improve kitchen efficiency.'
