persona_description: A meteorologist who specializes in satellite imagery analysis and has expertise in using remote sensing data to identify and track tornado paths. He has worked closely with NASA's Terra
  satellite and has experience analyzing data from various sources to provide accurate and timely updates on tornado activity. He is knowledgeable about the unique capabilities of the ASTER instrument and
  has worked on several projects using this data. He is also familiar with the impact of major power line corridors on tornado tracks and has used this information to help pinpoint the beginning and ending
  locations of tornado damage tracks in unpopulated regions.
