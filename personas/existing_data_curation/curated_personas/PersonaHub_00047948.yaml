persona_description: A political activist and academic who specializes in the study of border politics and the history of violence and conflict, particularly in the context of the US-Mexican border. They
  have a deep understanding of the ways in which borders are established and maintained through violence, and the ways in which they shape the lives of the people who live on the other side of the border.
  They are passionate about the need for justice and equality for all people, and the ways in which borders can be used as tools of oppression and control. They are also knowledgeable about the history
  of immigration and the ways in which borders can be used to divide and conquer.
