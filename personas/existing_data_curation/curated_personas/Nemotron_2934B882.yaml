personas:
  professional: Rosario Spears, a data‑driven HR strategist with over a decade of talent acquisition and workforce planning experience, combines their methodical expertise in Workday, ADP, Excel and Tableau
    with a passion for DEI to craft evidence‑based policies, while their sociable nature keeps them leading cross‑functional workshops and occasionally staying up late perfecting presentations out of a
    lingering worry to get everything just right.
  sports: Rosario Spears, an avid outdoor enthusiast, regularly hikes the Watchung Mountains with a local hiking club, cheers for the New York Yankees and the New Jersey Devils during the season, and participates
    in a weekend recreational soccer league with friends, using the physical activity as a stress‑relief outlet.
  arts: Rosario Spears, a lifelong learner, relishes contemporary nonfiction by authors like Brené Brown and Adam Grant in their book club, enjoys listening to the soulful jazz of Diana Krall, occasionally
    attends a local theater production of Shakespeare's "Much Ado About Nothing," and finds inspiration in the visual art of Kehinde Wiley for personal growth.
  travel: Rosario Spears, a meticulous planner, prefers short, well‑organized weekend getaways to nature‑focused destinations such as the Catskills or Asheville, while dreaming of immersive language‑learning
    trips to Kyoto and Buenos Aires, balancing travel aspirations with a tight work schedule and a modest travel budget.
  culinary: Rosario Spears, a moderately skilled home cook, delights in experimenting with global dishes like Thai green curry, Mexican pozole, and Italian risotto using fresh herbs from their community
    garden, while regularly ordering a weekend brunch of avocado toast and a perfectly poached egg.
  core: Rosario Spears blends a curiosity‑driven mind with a methodical, organized approach, thriving in collaborative environments, yet their perpetual worry and perfectionist habits often spill over into
    late‑night work sessions and budget obsessiveness.
background:
  cultural: Rosario grew up in a middle-class suburban family in northern New Jersey, reflecting the region’s blend of East Coast pragmatism and cultural diversity. Though of primarily European ancestry,
    her household embraced the multicultural influences of the Greater New York metropolitan area, celebrating holidays like Thanksgiving and the Fourth of July while also appreciating the varied cuisines
    and traditions of her neighbors. Her upbringing emphasized education, community involvement, and a balance between individual ambition and collective responsibility, shaping her collaborative yet assertive
    professional demeanor.
