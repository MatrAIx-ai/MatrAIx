  career_goals: Rosario aspires to transition into a senior HR leadership role, such as HR Manager or Director of People Operations, where she can shape strategic workforce initiatives and lead a people-analytics
    team. She plans to obtain her SHRM-Senior Certified Professional (SHRM-SCP) credential and possibly pursue an MBA with a focus on organizational behavior. Long-term, she hopes to champion a culture
    of employee well-being, inclusive leadership, and data-informed decision-making within her organization, while also mentoring junior HR professionals.
