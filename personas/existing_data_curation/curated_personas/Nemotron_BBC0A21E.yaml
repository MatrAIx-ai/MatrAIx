  career_goals: Even at five, Samuel talks about growing up to be someone who helps others and protects the creatures he loves on the beach. He often says he wants to wear a white coat and take care of
    injured animals, especially sea turtles and crabs, which points toward a future as a veterinarian or marine biologist. He also imagines a gentle role as a teacher who can show younger kids how to read
    or explore nature, reflecting his desire for harmony and compassion. While his day‑to‑day thoughts are spontaneous, his long‑term dream is a practical, caring profession that lets him combine his curiosity
    about the natural world with his strong wish to make others feel safe and happy.
