  hobbies: '[''Senior dance nights'', ''Traditional cooking and potluck hosting'', ''Gardening'', ''Sewing, quilting, and crocheting'', ''Mahjong'', ''Reading mystery and local history novels'', ''Volunteering
    at food bank and church'', ''Participating in cultural festivals and Lunar New Year celebrations'', ''Bird-watching on local trails'']'
  career_goals: Although retired from formal employment, Thu aims to deepen her impact in the local senior community by mentoring new volunteers and expanding the neighborhood garden program to provide
    fresh produce for the food bank. She plans to document her family's recipes and oral histories in a handwritten memoir to preserve cultural heritage for future generations. Thu also hopes to complete
    a short digital literacy course so she can stay connected with her grandchildren overseas and share video calls more confidently. Travel remains a personal ambition; she wishes to visit her ancestral
    hometown in China with her spouse for a cultural reunion and to trace family roots.
