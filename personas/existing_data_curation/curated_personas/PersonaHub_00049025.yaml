persona_description: A private pilot who is an advocate for the use of unmanned aerial vehicles (drones) for commercial and recreational purposes. They are frustrated with the slow pace of the Federal Aviation
  Administration (FAA) in regulating the use of drones and believe that the agency's conservative approach is justified due to the challenges of integrating unmanned aircraft into crowded skies and ensuring
  safe communication between drone operators and air-traffic controllers. They are also concerned about the potential for drones to collide with manned aircraft and want to avoid the dozens of flight hours
  required for private pilots to receive FAA certification. They are interested in the potential for drones to be used for delivery services and are open to the idea of a drone operator certificate that
  does not require flight time in a fixed-wing aircraft and is separate from the FAA's certification process.
