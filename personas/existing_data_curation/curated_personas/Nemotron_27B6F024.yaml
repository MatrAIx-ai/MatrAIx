  hobbies: '[''Gardening'', ''Bird Watching'', ''Crossword & Logic Puzzles'', ''Bridge (Competitive)'', ''Woodworking'', ''Home Fermentation (Kimchi, Sauerkraut)'', ''Volunteer at Public Library (Financial
