    ''Process improvement'']'
  hobbies: '[''Herb gardening'', ''Cooking traditional Mexican cuisine'', ''Attending cultural festivals'', ''Social dancing (cumbia, salsa)'', ''Volunteer teaching for seniors'', ''Reading historical fiction'',
    ''Walking in local parks'', ''Quilting with folk designs'', ''Participating in church community events'']'
  career_goals: In the next two years, Genesis aims to obtain the Certified Administrative Professional (CAP) credential and transition into a senior office manager role where she can lead a team of administrative
    staff. She hopes to leverage her bilingual abilities to spearhead community outreach initiatives for a nonprofit serving Houston's Hispanic population. Long‑term, she envisions consulting for small
    Mexican‑owned businesses, helping them streamline operations and navigate regulatory requirements, while also mentoring younger professionals entering the administrative field.
