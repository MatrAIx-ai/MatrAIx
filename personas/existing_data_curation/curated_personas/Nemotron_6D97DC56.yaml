  hobbies: '["Watercolor painting", "Mixed-media collage", "Attending local art fairs and the Appalachian Heritage Festival", "Exploring vintage flea markets", "Hiking in the Blue Ridge Mountains", "Recreational
    softball league", "Community line-dancing nights", "Leading a contemporary fiction book club", "Volunteering as a historic museum docent", "Cooking fusion recipes (Southern & Eastern European)"]'
  career_goals: Tabitha’s short-term goal is to move into a regional sales manager role within the next three years, overseeing a multi-state team for a home-decor or art-retail brand. To qualify for that
    position she plans to complete a Bachelor of Business Administration through a flexible online program and earn the Certified Professional Sales Leader (CPSL) credential. In parallel, she intends to
    launch an e-commerce boutique that curates works by emerging regional artists, blending her sales expertise with her passion for art. Long-term, Tabitha envisions building a community art-sales hub
    in Patrick County that offers workshops, exhibition space, and retail opportunities for local creators while mentoring a network of women sales professionals.
