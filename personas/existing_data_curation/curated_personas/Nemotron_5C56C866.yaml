personas:
  professional: Daisy Castillo is a budding home‑based caterer and aspiring certified home health aide who leverages their associate’s degree in Business Administration, sharp Excel budgeting skills, and
    bilingual communication to run a low‑stress, flexible micro‑enterprise while navigating a relaxed approach to planning and occasional disorganization.
  sports: Daisy Castillo enjoys early‑morning walks in Flushing Meadows Corona Park, follows the New York Knicks during basketball season, plays casual senior yoga at the local community center, and occasionally
    joins a neighborhood walking club that meets on Saturdays for low‑impact cardio.
  arts: Daisy Castillo relaxes by listening to traditional folk ballads from their heritage and contemporary jazz artists such as Miles Coleman and Esperanza Spalding, while devouring mystery novels by
    Agatha Christie and historical biographies by Hilary Mantel, and expressing creativity through knitting, crocheting, and occasional amateur quilting projects.
  travel: Daisy Castillo favors low‑stress, self‑guided trips that blend garden tours and historic sites, having explored the Royal Botanic Gardens, Kew in England and the medieval Old Town of Dubrovnik,
    while dreaming of a quiet lavender field retreat in Provence and weekend hikes in the Catskill Mountains.
  culinary: Daisy Castillo, an avid home cook with a green thumb, delights in herb‑infused roasted chicken, aromatic quinoa‑and‑vegetable stews, and hand‑rolled pastries seasoned with cumin and oregano,
    often adapting recipes for gluten‑free or low‑sodium needs and sharing these comfort meals at intimate gatherings.
  core: Daisy Castillo is a quietly ambitious, herb‑loving caregiver‑chef who balances meticulous budgeting with occasional disorganization, finds comfort in solitary crafts, yet constantly worries about
    future stability.
background:
  cultural: Daisy was born in a small town in the Andean region of Ecuador, where family gatherings centered around shared meals of dishes like locro, ceviche, and empanadas. She grew up speaking Spanish
    and observing Catholic traditions, including celebrations of Semana Santa and Día de los Difuntos, which reinforced a strong sense of community and respect for elders. After moving to Queens, she became
    part of a vibrant Ecuadorian diaspora that maintains cultural ties through festivals, salsa and pasillo music, and community kitchens. She continues to celebrate her heritage by preparing traditional
    foods, participating in local Latin American cultural events, and speaking Spanish with relatives and neighbors, while also adapting to the multicultural tapestry of New York City.
attributes:
  skills: '[''Basic bookkeeping and budgeting'', ''Microsoft Office (Excel, Word)'', ''Spanish-English translation'', ''Traditional Ecuadorian cooking'', ''Indoor gardening and plant care'', ''Empathetic
    listening and informal mediation'', ''Adaptable recipe development'']'
  hobbies: '[''Herb and succulent gardening'', ''Reading mystery novels and biographies'', ''Knitting and crocheting'', ''Listening to Ecuadorian folk music and jazz'', ''Early-morning park walks'', ''Gentle
    yoga and mindfulness meditation'']'
  career_goals: Daisy hopes to turn her culinary passion into a modest home‑based catering service that specializes in Ecuadorian comfort food for the Queens community, using her budgeting skills to keep
    operations sustainable. She also plans to earn a Certified Home Health Aide credential so she can provide paid companionship and basic care for elderly neighbors, aligning with her empathetic nature.
    To support these ambitions, she intends to complete a short online course in digital marketing, enabling her to promote her services through social media while maintaining the flexible, low‑stress work
    style she prefers.
