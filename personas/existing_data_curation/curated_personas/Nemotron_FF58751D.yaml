personas:
  professional: Max Rappaccioli channels their bilingual public‑speaking confidence, methodical event‑planning talent, and a curiosity‑driven passion for adolescent psychology into leading the school’s
    mental‑health peer‑support group and organizing community wellness workshops, all while eagerly preparing for a future career as a licensed counselor.
  sports: Max Rappaccioli captains the high‑school soccer team’s midfield, joins informal pick‑up games at Bayfront Park, follows Inter Miami CF and the Miami Heat, and balances disciplined conditioning
    drills with the social energy of weekend tournaments, embodying their sociable, organized, and competitive spirit.
  arts: Max Rappaccioli strums acoustic versions of John Mayer and Ed Sheeran, practices tango and salsa to the beats of Bad Bunny and Shakira, creates TikTok cooking clips inspired by Binging with Babish,
    and draws on their bilingual creativity to remix traditional folk melodies, showcasing their curiosity and love for collaborative expression.
  travel: Max Rappaccioli enjoys weekend road trips to Orlando’s theme parks, relishes family visits to New York City’s museums, meticulously plans a future cultural exchange to Barcelona and Buenos Aires
    using travel forums and teen‑friendly guidebooks, and prefers a blend of DIY itineraries and curated group tours, reflecting their organized yet adventurous mindset.
  culinary: Max Rappaccioli crafts intermediate‑level empanadas filled with seasoned beef and queso fresco, brews mate with a traditional bombilla, whips up salsa verde using tomatillos and jalapeños, and
    experiments with fusion dishes like chimichurri pizza for friends, all while documenting recipes on TikTok to share cooking tips with peers.
  core: Max Rappaccioli is a sociable, methodical teen who channels their curiosity and anxiety into soccer, guitar, mental‑health advocacy, and late‑night gaming, constantly balancing meticulous planning
    with spontaneous bursts of creativity.
background:
  cultural: Max is a first‑generation Argentine‑American. His parents emigrated from Buenos Aires in the early 2000s, preserving strong ties to Argentine customs—regularly drinking mate, celebrating Día
    de la Independencia, and cooking family recipes such as empanadas, asado, and dulce de leche desserts. Growing up in Hialeah, a vibrant Cuban‑dominant enclave, Max has been immersed in a blend of Latin
    cultures, picking up Cuban music, food, and the Spanish dialect spoken locally. He attends a bilingual public school, which reinforces his fluency in both Spanish and English and exposes him to diverse
    classmates from various Hispanic backgrounds. This multicultural environment, combined with his Argentine heritage, shapes his identity as a proud Latino who navigates both Argentine traditions and
    South Floridian influences.
