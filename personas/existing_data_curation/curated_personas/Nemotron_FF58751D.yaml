  career_goals: Max aspires to pursue a degree in psychology or social work with a focus on adolescent mental health, aiming to become a licensed counselor who designs and leads community outreach programs
    in South Florida. He hopes to combine his organizational talent and sociable nature to create peer‑support groups and wellness workshops that reduce anxiety and promote emotional resilience among teens.
    In the longer term, he envisions a leadership role in a non‑profit organization where he can influence policy and develop culturally sensitive mental‑health initiatives for Hispanic youth.
