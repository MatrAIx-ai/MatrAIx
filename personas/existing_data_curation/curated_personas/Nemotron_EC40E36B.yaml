personas:
  professional: Torey Craft, a veteran curriculum designer and educational technologist, leverages a methodical, data‑driven approach to create culturally responsive middle‑school programs while mentoring
    novice teachers with a competitive edge that balances curiosity for new pedagogies with proven instructional practices.
  sports: Torey Craft enjoys early‑morning desert hikes and joins a senior walking club that meets twice weekly, follows the Phoenix Suns for basketball, the Arizona Diamondbacks for baseball, and plays
    occasional pickleball at a community center, balancing solitary fitness with light team‑sport participation.
  arts: Torey Craft finds creative release in watercolor painting while attending live jazz at The Rhythm Room, where they regularly hear saxophonist Zach Taylor, and they also cherish recordings by Miles Davis,
    Ella Fitzgerald, and contemporary composer Kamasi Washington, weaving music into their artistic inspiration.
  travel: Torey Craft prefers meticulously planned trips that blend outdoor adventure with cultural immersion, having trekked the Sonoran Desert, explored Sedona’s red rocks, visited Oaxaca’s culinary markets,
    and longing to hike Japan’s Kumano Kodo pilgrimage routes, all while budgeting within a modest retirement allowance.
  culinary: Torey Craft excels at reimagining Southern soul food with health‑conscious twists, preparing dishes like quinoa‑jambalaya with smoked turkey, baked sweet‑potato casserole with kale, and black‑eyed‑pea
    salad flavored with olive oil, lime, and smoked paprika, and they favor fresh collard greens, low‑fat ricotta, and heirloom tomatoes in their kitchen.
  core: Torey Craft blends disciplined curiosity with practical skepticism, turning daily hikes, data‑driven teaching, and health‑focused cooking into a lifelong quest for balance, even if they occasionally
    overcommit to projects and indulge in too much coffee.
background:
  cultural: Torey’s cultural background is rooted in African‑American traditions that emphasize resilience, education, and community solidarity. Her grandparents migrated from the Deep South during the
    Great Migration, instilling a strong respect for self‑advancement and collective uplift. Growing up in Phoenix, she has woven Southwest influences—such as an appreciation for Native‑American art and
    desert horticulture—into her identity while maintaining ties to Black cultural celebrations like Juneteenth and local church gatherings. Her experiences as a Black woman educator shape her perspective
    on equity, driving her commitment to mentor students and teachers of color and to advocate for policies that address systemic disparities.
