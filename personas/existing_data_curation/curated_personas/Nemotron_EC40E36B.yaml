  hobbies: '[''Desert hiking'', ''Reading historical nonfiction and education research'', ''Book club participation'', ''Cooking soul food with a healthy twist'', ''Xeriscape gardening'', ''Watercolor painting'',
    ''Volunteer tutoring'', ''Attending jazz performances'']'
  career_goals: In the next few years, Torey aims to transition from full‑time teaching to a consulting role where she can design culturally responsive curricula for district‑wide implementation. She plans
    to publish a practical guide on integrating technology in middle‑school math, secure a grant to launch a STEM enrichment program for underrepresented Black youth in Phoenix, and mentor a cohort of emerging
    teachers through a structured apprenticeship. She is also considering a part‑time adjunct position at a local university to share her expertise in educational leadership and equity.
