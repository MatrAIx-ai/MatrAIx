  career_goals: Carolyn aims to transition into a supervisory role—such as lead driver, dispatch coordinator, or fleet safety officer—within the next few years, securing a stable, predictable schedule that
    supports her financial security after divorce. She plans to obtain a commercial driver’s license with a passenger endorsement and pursue a part‑time driving position as she approaches retirement, while
    also mentoring younger drivers and helping improve safety protocols at her company.
