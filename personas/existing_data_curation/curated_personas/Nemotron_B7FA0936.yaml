personas:
  professional: Mariana Rios, a textile care specialist with deep expertise in fabric identification, industrial washer operation, and eco‑friendly cleaning chemistry, channels their obsessive organization
    and quiet focus into meticulously tracking inventory, streamlining workflow, and delivering courteous bilingual service, while their curiosity about sustainable practices fuels a vision of leading a
    boutique dry‑cleaning studio that doubles as a community art space.
  sports: Mariana Rios, who prefers solitary workouts, jogs the desert trails near Indio at sunrise, attends weekly yoga sessions at the Coachella Valley Yoga Studio, and cheers quietly for the Los Angeles
    Dodgers and Lakers while avoiding crowded gyms.
  arts: Mariana Rios finds solace in sketching folk‑inspired motifs and reveres artists such as Grandma Moses and Georgia O'Keeffe, enjoys listening to Joni Mitchell while painting, frequents the Riverside
    Art Museum, and curates a personal collection of limited‑edition prints from contemporary illustrator James Jean.
  travel: Mariana Rios favors low‑key, culturally rich trips, having explored historic adobe towns in Southern California, the desert scenery of Joshua Tree, and the art galleries of Barcelona, while planning
    a future solo retreat to the quiet fjords of Norway to study Nordic textile traditions.
  culinary: Mariana Rios, an adept home cook, spends weekends perfecting family tamales and mole using corn masa, dried chilies, and dark chocolate, experiments with fresh herbs from their indoor garden
    to create herb‑infused sauces, and enjoys pairing their meals with a glass of agave‑based mezcal on occasion.
  core: Mariana Rios blends a meticulous, solitary work ethic with a vibrant love for folk art, sustainable living, and family cooking, yet they wrestle with constant worry that fuels both disciplined planning
    and occasional over‑cautiousness.
background:
  cultural: Mariana is a first‑generation Mexican American who grew up in a bilingual household, speaking Spanish at home and English in school. Her family maintains strong ties to Mexican customs, celebrating
    Día de los Muertos, Las Posadas, and other holidays with traditional foods, music, and storytelling. She identifies with the collectivist values of her heritage, emphasizing respect for elders, community
    solidarity, and hospitality. Living in Indio, she engages with the larger Latino community, attending local festivals that blend Mexican and Californian influences. Mariana's cultural identity also
    informs her aesthetic preferences, drawing inspiration from Mexican muralists like Diego Rivera and folk art patterns, which she integrates into her personal art projects and her vision for a future
    boutique that showcases local cultural expression.
attributes:
  skills: '["Fabric identification","Stain removal techniques","Industrial laundry equipment operation","Inventory management","Quality control","Bilingual customer service (Spanish/English)","Time management","Organizational
    systems development","Safety and environmental compliance","Problem solving under pressure"]'
  hobbies: '["Sketching and painting","Art gallery visits","Art history reading","Yoga and meditation","Indoor herb gardening","Cooking traditional Mexican dishes","Knitting and quilting","Listening to
    Mexican folk music","Learning sustainable practices"]'
  career_goals: Mariana aims to advance from her current role to a supervisory position within the laundry industry, eventually managing a team while preserving the high standards she values. She plans
    to obtain a certified Textile Care Technician credential and complete a GED program to broaden her professional options. Long‑term, she dreams of opening a boutique, eco‑friendly dry‑cleaning shop that
    combines sustainable practices with personalized service, possibly offering a small in‑store gallery space where local artists can display work, merging her love of art with her career. Throughout this
    journey, Mariana seeks roles that allow her to work independently in quiet, organized environments while fostering a harmonious workplace culture.
