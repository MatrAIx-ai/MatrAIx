persona_description: A technologist or a futurist who is interested in emerging technologies such as nanotechnology, synthetic biology, and geoengineering. They are aware of the potential benefits and risks
  of these technologies, and are concerned about their social and economic impacts. They are also familiar with the precautionary principle and the importance of transparency and participatory decision-making
  in the deployment of new technologies. They are likely to be involved in the creation of Technology Observation Platforms (TOPs) to monitor and assess the impacts of these technologies.
