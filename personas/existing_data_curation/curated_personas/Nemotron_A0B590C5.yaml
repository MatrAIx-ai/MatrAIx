personas:
  professional: Jitendrakumar Acharya, a disciplined high-school senior with a passion for Python and robotics, channels their analytical mind and meticulous organization into leading school hackathons,
    tutoring peers, and building prototypes that merge data analysis with mental-health insights, all while aspiring to study Computer Science or Biomedical Engineering at a top university.
  sports: Jitendrakumar Acharya, an avid hiker, spends weekends trekking the Nandi Hills, follows the Indian Premier League team Kolkata Knight Riders, trains with a local cricket academy, and occasionally
    watches the NBA's Golden State Warriors to unwind after long coding sessions.
  arts: Jitendrakumar Acharya, a sci-fi and psychology aficionado, devours novels by Isaac Asimov and Philip K. Dick, tunes into the ambient piano of Ludovico Einaudi and the innovative scores of A.R. Rahman,
    and regularly attends indie film screenings featuring Christopher Nolan's work, letting these artistic influences spark creative problem-solving.
  travel: Jitendrakumar Acharya, a meticulous planner, has mapped out trips to Coorg and Darjeeling with detailed itineraries, dreams of backpacking through Japan's tea gardens and Switzerland's alpine
    trails, and balances wanderlust with the financial pressure of upcoming university tuition.
  culinary: Jitendrakumar Acharya, a confident home cook, perfects paneer tikka masala using fresh coriander, cumin, and garam masala, experiments with quinoa biryani for a health-focused twist, and occasionally
    over-spices dishes in the excitement of sharing meals with friends.
  core: Jitendrakumar Acharya, a hyper-organized yet anxiety-prone teen, merges strategic gaming, data-driven curiosity, and heartfelt community service into a disciplined pursuit of tech-enabled mental-health
    solutions, while sometimes over-committing to projects and forgetting to unwind.
background:
  cultural: Jitendrakumar is a second‑generation South Asian American raised in a Gujarati family in the Bay Area. He grew up bilingual, speaking English at school and Hindi at home, and celebrates cultural
    festivals such as Diwali and Holi with relatives. His upbringing emphasizes education, family cohesion, respect for elders, and community service, while also embracing the independent, tech‑forward
    environment of Silicon Valley. He regularly attends cultural events at the local Hindu temple, maintains close ties with his extended family, and blends traditional Indian values with American social
    norms.
