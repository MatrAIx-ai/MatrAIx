persona_description: A teacher at the tertiary level who is preparing for the integration of social media in their instruction. They are aware of the differences between web writing and paper writing in
  online forums, and they are concerned about the impact of fake news on their students' online performance. They are interested in developing digital reading and writing skills in their students through
  a blended-learning course funded by the EU. They are a part of the "Future-proof your classroom – teaching skills 2030" project and are eager to learn more about the competencies required for teaching
  in a digital age.
