personas:
  professional: A budding network security analyst named Suhail Estevez merges bilingual fluency, Python scripting, and solid networking fundamentals with a pragmatic curiosity and organized flexibility,
    aiming to safeguard tourist‑centric digital platforms in St. Johns County while bridging historic preservation with modern innovation.
  sports: Active in the St. Augustine Youth Soccer Club, Suhail Estevez laces up for weekly matches as a midfield playmaker, cheers for Orlando City SC, and occasionally joins beach volleyball pick‑ups
    at St. Johns County beaches to stay agile during the off‑season.
  arts: Creative and reflective, Suhail Estevez documents Saint Augustine’s colonial architecture on a personal blog, plays acoustic renditions of Paco de Lucía and Ed Sheeran at community open‑mic nights,
    and curates a digital collection that blends Mediterranean light with Floridian hues, shaping their identity through visual and musical storytelling.
  travel: Eager to blend exploration with cultural immersion, Suhail Estevez often weekend‑hops from Saint Augustine to nearby historic towns, has already visited the Alhambra in Granada and the historic
    district of Cartagena, prefers spontaneous road itineraries over rigid itineraries, and hopes to embark on a cross‑country road‑trip across Andalusia after college.
  culinary: Passionate home chef Suhail Estevez regularly whips up authentic paella with saffron‑infused rice, shrimp, mussels, and chorizo, experiments with gazpacho using ripe tomatoes and cucumber, and
    balances these Mediterranean flavors with local Florida stone crab and citrus‑y lime zest, while still polishing their guitar and coding between bites.
  core: At 18, Suhail Estevez is a curious, pragmatic tech enthusiast who balances teamwork on the soccer field with solitary coding projects, blends Mediterranean culinary traditions with Floridian flair,
    and navigates life’s challenges with cooperative assertiveness and a dash of late‑night caffeine.
background:
  cultural: Suhail’s family traces its roots to Andalusia in southern Spain, and he was raised in a bilingual household where both Spanish and English were spoken daily. This heritage instilled a respect
    for family cohesion, communal celebrations, and a love for Mediterranean cuisine, which he often recreates at home. While living in Saint Augustine, he blends his Spanish traditions with the local Floridian
    culture, participating in Hispanic festivals, attending regional folk music events, and maintaining strong ties to the Spanish-speaking community in St. Johns County. His cultural background informs
    his worldview, emphasizing hospitality, a collaborative spirit, and an appreciation for both historic preservation and modern innovation.
attributes:
  skills: '[''Python programming'', ''Computer network troubleshooting'', ''Basic automotive repair'', ''Arduino/Raspberry Pi prototyping'', ''Spanish–English bilingual communication'', ''Project planning'',
