  hobbies: '[''Historical walking tours and photography'', ''Arduino/Raspberry Pi electronics projects'', ''Soccer'', ''Acoustic guitar'', ''Cooking Spanish cuisine'', ''Beach clean‑up volunteering'']'
  career_goals: Suhail plans to leverage his technical foundation by enrolling in a bachelor’s program in Computer Science with a concentration in cybersecurity. His short‑term goal is to secure an entry‑level
    position as a network security analyst for a company that supports the tourism sector in St. Johns County, where he can protect guest data and implement secure digital solutions for local attractions.
    Over the next five to ten years, he aims to advance to a leadership role, overseeing cross‑functional teams that develop secure platforms for historic sites and heritage tourism, thereby merging his
    interest in technology with the region’s cultural assets.
