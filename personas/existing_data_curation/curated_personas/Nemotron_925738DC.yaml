  hobbies: '[''Reading historical fiction and classic mysteries'', ''Gardening (roses, tomatoes, herbs)'', ''Knitting and crocheting for charity'', ''Baking pies, cookies, and family recipes'', ''Book club
    participation'', ''Community involvement (church events, bingo, senior center volunteering)'', ''Birdwatching and nature walks'', ''Listening to 60s/70s music'', ''Jigsaw puzzles'']'
  career_goals: While no longer seeking formal employment, Alisha aims to maintain her independence and continue contributing to her community. She hopes to expand her home‑cooking repertoire into small‑scale
    selling of preserves and baked goods at local farmers’ markets, providing modest supplemental income. She is also motivated to improve her digital literacy so she can share her life stories through
    an online blog, connect more easily with grandchildren, and possibly mentor other seniors in basic computer skills. Ultimately, Alisha wants to remain socially engaged, health‑conscious, and emotionally
    resilient.
