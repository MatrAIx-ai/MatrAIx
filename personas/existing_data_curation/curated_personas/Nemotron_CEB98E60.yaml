background:
  cultural: Shatana is an African‑American infant raised in Bensalem, Pennsylvania, within a close‑knit Black family that honors traditions of resilience, communal support, and cultural expression. Her
    household regularly participates in church gatherings where gospel music and storytelling play central roles, and they celebrate cultural holidays such as Juneteenth with family meals and community
    reflections. Growing up in Bucks County, she is exposed to a diverse suburban environment while maintaining strong ties to the Black cultural heritage of her ancestors, which shapes her emerging identity,
    values, and future aspirations.
