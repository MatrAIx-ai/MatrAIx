personas:
  professional: Heriberto Rodriguez, a meticulous automotive service technician renowned for systematic fault diagnosis with OBD‑II scanners and precise engine rebuilds, channels their love of structure
    and calm into a workshop where every repair is documented, parts are inventory‑tracked, and client communications are clear and considerate, while also mentoring junior mechanics with the same methodical
    rigor.
  sports: Heriberto Rodriguez, a devoted outdoors enthusiast who hikes the Yakima River Canyon with the Yakima Hiking Circle in spring, fishes local lakes for solitude, follows the Seattle Seahawks, Seattle
    Mariners, and Seattle Sounders with casual fan enthusiasm, and maintains basic fitness through weekend bike rides on the Columbia River Trail.
  arts: Heriberto Rodriguez, an acoustic guitarist who performs modestly at community cultural festivals, draws inspiration from Los Lobos, Bob Dylan, and traditional folk songsters, and spends quiet evenings
    listening to classic cinema scores by Ennio Morricone while meticulously polishing their instrument.
  travel: Heriberto Rodriguez, an organized traveler who prefers structured road trips to nearby gems like Olympic National Park and the Oregon Coast, has already visited Seattle, Portland, and San Francisco,
    and dreams of an extended journey to Patagonia’s glaciers and a cultural tour of Kyoto, all while budgeting trips with a detailed spreadsheet to avoid financial strain after divorce.
  culinary: Heriberto Rodriguez, a diligent home cook who perfects tamales and mole using dark chocolate, ancho chilies, and roasted seeds, crafts salsa verde with fresh tomatillos and cilantro, and treats
    each dish as a precise project, measuring ingredients with a digital scale and documenting variations in a notebook.
  core: Heriberto Rodriguez blends a methodical mind, a love for hands‑on creation, and a quiet worry about stability into a life of measured repairs, precise cooking, and solitary exploration.
background:
  cultural: Heriberto grew up in a Mexican‑American household where Spanish was spoken daily and family gatherings centered around shared meals, music, and holiday traditions like Día de los Muertos and
    Cinco de Mayo. His parents instilled a strong work ethic, respect for community, and the importance of harmony in relationships. These values translate into his courteous customer service and his willingness
    to help neighbors with basic car care. He maintains ties to the local Mexican community in Yakima County, often volunteering at cultural events and teaching cooking classes that showcase regional Mexican
    flavors. His bicultural identity enriches his perspective, blending Mexican hospitality with the practical, organized mindset of his American upbringing.
attributes:
  skills: '[''Automotive diagnostics'', ''Engine rebuilding and repair'', ''Transmission servicing'', ''Brake system maintenance'', ''Electrical and electronic system troubleshooting'', ''Hybrid and electric
