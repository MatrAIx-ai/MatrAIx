personas:
  professional: Shelley Corley, a veteran building‑cleaning specialist with four decades of floor‑care, chemical safety, and staff‑training expertise, now channels their curiosity and practicality into
    a supervisory consulting role where they champion eco‑friendly cleaning protocols for schools and senior‑living facilities.
  sports: Shelley Corley enjoys low‑impact morning walks at Riverside Park, participates in weekly pickleball games at the community center, and proudly follows the Springfield Spinners, the local minor‑league
    baseball team, while cheering for the New York Knicks during the NBA season.
  arts: Shelley Corley finds inspiration in historical fiction by Hilary Mantel, knits intricate sweater patterns while listening to folk singer Joan Baez, and captures sunrise haze in digital photographs
    reminiscent of Monet's 'Impression, Sunrise', often sharing prints at the town library's art exhibit.
  travel: Shelley Corley prefers leisurely road trips to coastal national parks like Acadia and historic towns such as Bath, England, planning trips with their pen‑pal group and balancing travel excitement
    with a fixed travel budget and the occasional desire to visit family in nearby suburbs.
  culinary: Shelley Corley delights in preparing garden‑fresh ratatouille and herb‑infused roasted chicken, seasoning with basil, thyme, and locally sourced rosemary, while their knitting‑fueled snack breaks
    often include crisp apple slices and homemade granola, though they sometimes forget to water their herbs before a dinner party.
  core: Shelley Corley blends a lifelong passion for clean, green facilities with a quiet devotion to birds, letters, and knitting, turning modest quirks like over‑cataloguing receipts and forgetting to
    stretch into endearing habits that keep their community thriving.
background:
  cultural: Shelley was raised in a mid-western, white working-class family that later settled in Southern California. Her upbringing emphasized hard work, modesty, and community involvement, values that
    were reinforced by her participation in a local Protestant church and neighborhood events. As a baby-boomer, she experienced the cultural shift toward greater social awareness and environmental consciousness,
    which now informs her preference for green cleaning and volunteer service. Her cultural identity blends traditional American values with the laid-back, nature-appreciating lifestyle of the San Bernardino
    region.
attributes:
  skills: '[''Floor care and polishing'', ''Chemical safety and proper disposal'', ''Inventory and supply management'', ''Time and schedule coordination'', ''Basic facilities maintenance and troubleshooting'',
    ''Ergonomic work practices'', ''Team leadership and staff training'', ''Customer service and conflict resolution'', ''Green cleaning techniques'', ''Record-keeping and documentation'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Knitting'', ''Nature photography'', ''Volunteer work at library and church'', ''Walking/hiking in the San Bernardino hills'',
    ''Pen-pal correspondence'']'
  career_goals: Shelley aims to transition into a supervisory or consulting role where she can share her extensive knowledge with younger staff and promote sustainable cleaning practices. She plans to earn
    a green-cleaning certification and lead a small team in implementing eco-friendly protocols at local schools and community centers. In the longer term, she hopes to volunteer her expertise to improve
    sanitation standards in senior-living facilities and possibly start a part-time cleaning service focused on environmentally conscious clients.
