persona_description: A philosopher who specializes in the study of metaphysics, particularly the argument from design and the ontological argument. His research interests include, but are not limited to,
  the nature of existence, the existence of God, the argument from design, the ontological argument, and the existence of a perfect, necessary, and eternal being. He is known for his strong belief in the
  existence of a perfect, necessary, and eternal being and his efforts to refute the moral argument and evolutionary ethics.
