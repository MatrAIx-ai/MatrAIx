personas:
  professional: Julie Holcomb, a budding junior illustrator who fills sketchbooks with neon‑bright characters inspired by Las Vegas light shows, blends their natural curiosity with a tidy, checklist‑driven
    approach to art supplies, and delights in sharing their creations during school art circles.
  sports: Julie Holcomb, an enthusiastic member of the Desert Springs Youth Soccer team and a weekend participant in Little Gym gymnastics, cheers loudly for the Vegas Golden Knights and the Las Vegas Aces,
    and channels their boundless energy into dancing during after‑school activity hour while keeping a neatly packed water bottle for each practice, even though they sometimes forget to hydrate during hot
    drills.
  arts: Julie Holcomb, an avid young artist who spends afternoons mimicking the vivid murals of local street artist Eric Zim and re‑creating scenes from Disney’s “Moana” while humming along to The Wiggles
    and KIDZ BOP, attends beginner piano lessons where they experiment with improvisation, and treasures visits to the Las Vegas Arts District galleries with their family, though they sometimes get distracted
    by glitter glue bubbles.
  travel: Julie Holcomb, a curious explorer who loves organized family trips to Red Rock Canyon for rock‑collecting, dreams of riding a camel at the Grand Canyon and visiting the Eiffel Tower, but currently
    prefers short drives to nearby desert campsites where they can set up a fort and keep a detailed travel journal, balancing excitement with parents’ budget constraints, even as they sometimes worry about
    getting lost on the trail.
  culinary: Julie Holcomb, a budding chef who proudly mixes colorful veggie sticks with ranch dip, whips up a strawberry‑banana smoothie for snack time, can competently bake chocolate chip cookies under
    adult supervision, yet occasionally over‑saturates their pancakes with syrup, turning breakfast into a sticky masterpiece, while they sometimes sneak extra sprinkles for extra sparkle.
  core: Julie Holcomb, a bright‑eyed 7‑year‑old who fills sketchbooks, piggy banks, and nature journals with kaleidoscopic ideas, worries about school projects yet finds comfort in bright art, friendly
    games, and the glow of Las Vegas neon lights, and they often hum a tune while doodling.
background:
  cultural: Julie is a White child growing up in Las Vegas, Nevada, within a family‑oriented suburban community. Her daily life blends typical Mid‑Western values with the unique entertainment atmosphere
    of the city, exposing her to performances, bright neon culture, and diverse visitors. She participates in local school activities, community events, and occasional church gatherings that emphasize kindness
    and cooperation. The desert Southwest influences her love of outdoors exploration, such as occasional trips to nearby parks and nature reserves, while the city's vibrant arts scene fuels her appreciation
    for creative expression.
