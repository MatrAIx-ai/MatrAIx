  career_goals: Julie dreams of a future where she can blend her love of art and learning. She hopes to become an artist who creates vibrant illustrations that tell stories, or a teacher who shares her
    enthusiasm for discovery with other children. She also imagines exploring the world as a young scientist, conducting experiments that uncover new ideas—reflecting her curiosity about both creative and
    analytical pursuits.
