personas:
  professional: Madeleine Caporicci, a five‑year‑old aspiring architect, loves building intricate towers with wooden blocks, applying practical problem‑solving skills while thriving on the predictable routine
    of sorting pieces, yet they enjoy the freedom to rearrange them in spontaneous designs.
  sports: Madeleine Caporicci, a five‑year‑old member of the Little Kickers under‑5 soccer league, dashes across the field with a bright orange ball while proudly wearing a Manchester United jersey and
    cheering for the local high school Wildcats basketball team during family game nights, yet they prefer the unstructured fun of playground recess.
  arts: Madeleine Caporicci, a five‑year‑old who spends afternoons drawing vibrant unicorns, singing loudly along to The Wiggles and Disney’s 'Let It Go' by Idina Menzel, and watching animated adventures
    starring Mickey Mouse, they channel their creative energy into playful performances that blend imagination with a love for familiar melodies.
  travel: Madeleine Caporicci, a five‑year‑old whose family enjoys weekend road trips, eagerly anticipates visits to the nearby zoo and the magical world of Disneyland in Anaheim while day‑dreaming about
    a future beach vacation to Cancun, they balance a love for adventure with the comfort of familiar routines and a snug car seat.
  culinary: Madeleine Caporicci, a five‑year‑old who can confidently spread peanut butter on whole‑grain bread, stir a pot of cheesy macaroni, and savor the sweet tang of fresh strawberry slices, yet they
    occasionally refuse broccoli, showcasing a selective palate that mixes budding cooking confidence with typical childhood pickiness.
  core: Madeleine Caporicci, a five‑year‑old who lines up crayons by color before drawing and bursts into giggles at new puzzles, they blend a love for structure with spontaneous play, making every day
    a neatly organized adventure.
background:
  cultural: 'Madeleine comes from a white family with Italian ancestry living in Anchorage, Alaska. Her upbringing blends typical American suburban life with the unique seasonal rhythms of the far north:
    long summer daylight, snowy winters, and community events like the Anchorage Fur Rendezvous. Family gatherings often feature Italian dishes such as pasta and pizza, while community activities include
    building snow forts, learning about native wildlife, and participating in local festivals that celebrate Alaska’s cultural heritage.'
