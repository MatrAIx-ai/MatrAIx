  hobbies: '[''Gardening'', ''Baking'', ''Book club participation'', ''Hiking'', ''Health education volunteering'', ''Singing in church choir'', ''Attending local sports events'']'
  career_goals: Gina aims to obtain a Master’s in Nursing Administration within three years so she can step into a nurse‑manager role at McPherson Community Hospital. In that capacity she plans to champion
    patient‑safety initiatives, mentor junior nurses, and expand quality‑improvement programs. Long‑term, she envisions developing a community‑health outreach program focused on diabetes and hypertension
    management for rural Kansas residents, and earning a Certified Case Manager credential to enhance care coordination across the health‑care continuum.
