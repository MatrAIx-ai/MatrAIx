personas:
  professional: Gina Ross is a registered nurse on a fast-paced medical-surgical unit whose clinical expertise in patient assessment, IV therapy, wound management, and EMR optimization is amplified by her
    sociable, talkative nature, allowing her to serve as a trusted bridge between patients, families, and multidisciplinary teams while championing data-driven quality improvement projects.
  sports: Gina Ross embraces an active lifestyle by hiking the Flint Hills with a local walking club, cheering on the Kansas City Chiefs on Sundays and supporting the University of Kansas Jayhawks during
    basketball season, while also attending McPherson High School football games to soak up community spirit, and she fits in weekly 30‑minute cardio sessions to maintain stamina for her demanding nursing
    shifts.
  arts: Gina Ross channels her artistic side through a vibrant church choir where she sings hymns by Chris Tomlin and traditional gospel, leads a book club exploring contemporary fiction from authors like
    Sally Rooney and Chimamanda Ngozi Adichie, enjoys occasional community theater productions starring local actors, and treats her baking of apple pie and sourdough as a creative outlet.
  travel: Gina Ross prefers carefully planned weekend road trips—like her annual drives to Kansas City for jazz festivals, a summer getaway to the Lake of the Ozarks, and a spring hike in Colorado's Rocky
    Mountains—while dreaming of a future adventure exploring Yellowstone’s geysers and Italy’s Tuscan vineyards, balancing her itineraries with the flexibility to detour for a community volunteer project.
  culinary: Gina Ross, an adept home cook, delights in baking classic apple and cherry pies with flaky crusts, hand‑kneading sourdough loaves, and crafting vibrant vegetable medleys of zucchini, heirloom
    tomatoes, and carrots from her garden, while she balances regular family dinner nights with occasional visits to a local farm‑to‑table bistro for seasonal dishes like beet‑goat cheese salad.
  core: Gina Ross is a pragmatic, sociable nurse‑leader who juggles a structured schedule with community gardening, choir singing, and spontaneous baking marathons, all while fueling her busy days with
    a lingering love for strong coffee and the occasional late‑night spreadsheet.
background:
  cultural: Gina grew up in a small town near McPherson, Kansas, in a family with deep Midwestern roots, primarily of German and Irish ancestry. The region’s emphasis on community involvement, self‑reliance,
    and modesty shaped her values. She attended local public schools, where a strong work ethic and respect for practicality were reinforced. Church and volunteer service have been central to her cultural
    identity, and she celebrates traditional Midwestern customs such as county fairs, potluck gatherings, and seasonal harvest festivals. While she identifies as a white American, Gina is conscious of the
    diverse needs of her community and integrates inclusive practices into both her professional and personal life.
attributes:
