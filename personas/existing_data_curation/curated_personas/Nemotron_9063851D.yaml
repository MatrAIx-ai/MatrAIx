personas:
  professional: Grace Jones, a 46‑year‑old environmental data analyst and aspiring maker‑space founder, blends their GIS‑savvy statistical modeling with a curious eye for visual storytelling, channeling
    a relaxed yet competitive spirit into freelance consulting and mentoring underserved youth in science‑art intersections.
  sports: Grace Jones fuels their fitness routine with weekend hikes in Kisatchie National Forest, pick‑up basketball games at the community center cheering on the New Orleans Pelicans, and membership in
    the Baton Rouge Trailblazers running club, balancing a competitive streak with a relaxed, nature‑focused mindset.
  arts: Grace Jones immerses themselves in the local art scene, sketching digital illustrations inspired by Kara Walker’s abstract narratives, snapping photographs of historic neighborhoods reminiscent
    of Gordon Parks, and listening to the soulful brass of Trombone Shorty while devouring speculative fiction by N. K. Jemisin.
  travel: Grace Jones favors spontaneous, budget‑friendly road trips along the Gulf Coast, often revisiting New Orleans for its Mardi Gras vibrancy and the historic charm of Savannah, while the next adventure
    on their list is a planned week‑long hike through the Appalachian Trail’s Blue Ridge segment.
  culinary: Grace Jones, a confident home chef, delights in simmering slow‑cooked gumbo with fresh okra, smoked sausage, and a dark roux, while frequently experimenting with a Creole‑infused quinoa bowl
    seasoned with filé powder and hot sauce, though they admit to occasionally burning the roux when juggling a new art project.
  core: Grace Jones is a curious data‑driven storyteller who blends scientific rigor with Creole‑spiced creativity, juggling freelance consulting, a budding maker space, and a habit of over‑caffeinating
    late‑night sketch sessions.
background:
  cultural: Grace grew up in a close‑knit African‑American family in Baton Rouge, where church music, storytelling, and community gatherings were central to daily life. Her parents emphasized education
    and cultural pride, encouraging her interest in both science and the arts. She identifies with the rich heritage of the Gulf South, from the rhythms of jazz and zydeco to the flavors of Creole cooking.
    As a Black woman in STEM, she has navigated underrepresentation and uses her experiences to mentor younger students of color. She celebrates Juneteenth, participates in local Mardi Gras parades, and
    engages with historic African‑American neighborhoods that have shaped her sense of identity and purpose.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Python programming'', ''R programming'', ''GIS mapping'', ''Technical writing'', ''Digital illustration'', ''Photography'', ''DIY electronics prototyping'',
    ''Mentoring and workshop facilitation'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Digital illustration and mixed‑media art'', ''Photography'', ''Reading science fiction and popular science books'', ''Cooking Creole and
    Southern cuisine'', ''Attending live jazz and blues performances'', ''Hiking and nature walks'', ''Meditation and mindfulness practices'', ''Volunteering at community science fairs'']'
  career_goals: Grace aims to blend her analytical background with her artistic passions by launching a community maker space in Baton Rouge that offers workshops at the intersection of science and art.
    She envisions working as a freelance data consultant on flexible projects while teaching coding and visual storytelling to underserved youth. Over the next five years she hopes to earn a professional
    certification in data science, secure grant funding for her maker space, and become a recognized advocate for equitable STEM education in the local African‑American community. She prefers roles that
    give her autonomy, allow creative problem solving, and let her schedule adapt to her personal rhythm.
