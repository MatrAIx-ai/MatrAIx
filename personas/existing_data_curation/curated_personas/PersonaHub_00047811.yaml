persona_description: A geologist or geophysicist who specializes in the study of subsidence and its causes, particularly in the Hampton Roads region of the United States. They have expertise in analyzing
  satellite imagery and GPS data to map and quantify subsidence rates, and have developed innovative techniques to integrate SAR and GPS measurements to create high-resolution subsidence maps. They have
  experience collaborating with NASA and other organizations to develop and apply these techniques to other regions and contexts. They have presented their findings to planning and emergency management
  committees in the Hampton Roads area.
