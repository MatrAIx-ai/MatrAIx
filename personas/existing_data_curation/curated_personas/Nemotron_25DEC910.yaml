personas:
  professional: Alain Riossantiago drives full‑stack development teams with a methodical, Agile mindset, leveraging bilingual fluency to translate user stories across English and Spanish, while championing
    inclusive UI/UX that reflects community values, and mentors junior developers through structured sprint planning and rigorous code review.
  sports: Alain Riossantiago captains a local amateur soccer squad, the San Antonio Firebirds, plays weekly matches in the summer league, regularly hikes the Hill Country trails like Enchanted Rock, and
    cheers for San Antonio FC during the USL season, blending structured team play with solo outdoor endurance.
  arts: Alain Riossantiago strums an acoustic guitar to reinterpret classic Tejano hits by Selena and Los Lonely Boys, devours contemporary novels by Valeria Luiselli and Juan Felipe Herrera, and attends
    regional performances by mariachi ensembles, weaving music and literature into his weekend routine.
  travel: Alain Riossantiago plans trips with spreadsheet‑level precision, allocating annual leave to explore culturally rich cities like Mexico City and Barcelona, while also carving out weekend getaways
    to Texas Hill Country vineyards and the rugged trails of Big Bend, balancing immersive cultural experiences with outdoor adventure.
  culinary: Alain Riossantiago excels at preparing carnitas tacos, mole poblano, and smoky grilled corn seasoned with ancho chilies and coriander, frequently hosting family barbecues where he blends heritage
    flavors with Tex‑Mex twists like chili‑lime queso and homemade salsa verde.
  core: Alain Riossantiago is an organized, community‑driven full‑stack developer who balances methodical code reviews with lively soccer matches, acoustic guitar sessions, and a steadfast commitment to
    mentoring, even if late‑night debugging sometimes steals his sleep.
background:
  cultural: Alain is a first‑generation Mexican‑American raised in San Antonio’s vibrant Latino community. Bilingual in English and Spanish, he grew up celebrating Día de los Muertos, Christmas posadas,
    and local fiestas, while also embracing the broader Texan cultural landscape. His family places a strong emphasis on communal harmony, respect for elders, and hospitality, values that inform his collaborative
    work style and community‑oriented pursuits. He identifies with both his Hispanic heritage and the multicultural fabric of Texas, navigating and bridging these worlds in his personal and professional
    life.
