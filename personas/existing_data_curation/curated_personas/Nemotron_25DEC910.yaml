  career_goals: Alain aims to transition into a senior leadership role such as Lead Architect or Engineering Manager, where he can shape technology strategy and champion inclusive development practices.
    He plans to spearhead community‑focused tech initiatives in San Antonio, mentoring Latinx youth and expanding access to coding education. Over the next five years, he also hopes to launch a startup
    that creates culturally relevant educational software for bilingual learners, leveraging his blend of technical expertise and humanities insight.
