  hobbies: '[''Reading children’s literature'', ''Gardening'', ''Yoga and mindfulness practice'', ''Knitting/crochet'', ''Hiking and biking on the Connecticut River Trail'', ''Photography'', ''Volunteering
    at a food pantry'', ''Community theater involvement'']'
  career_goals: Breanna aims to expand her impact beyond her own classroom by moving into a curriculum specialist role within the district, where she can shape preschool programming across multiple schools.
    She plans to earn a master's degree in Early Childhood Education with a focus on leadership and mental‑health integration, positioning herself for a future as a director of a community early‑learning
    center. Breanna is also passionate about fostering teacher wellbeing; she hopes to develop a district‑wide wellness initiative that provides mindfulness training and stress‑management resources for
    early‑education staff. In the longer term, she envisions authoring a practical guide for parents and teachers on nurturing emotional resilience in preschoolers, drawing on her classroom experience and
    research interests.
