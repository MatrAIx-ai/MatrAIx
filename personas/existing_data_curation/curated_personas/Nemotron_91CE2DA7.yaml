personas:
  professional: Breanna Steelfox, a veteran early‑childhood educator with fifteen years of classroom experience, designs play‑based curricula that blend neurodevelopment research with pragmatic state standards,
    while they champion inclusive practices for children with mild autism or ADHD and lead staff development on cooperative learning and emotional‑social support.
  sports: Breanna Steelfox enjoys low‑impact fitness, joining the local cycling club that rides the Connecticut River Trail, cheering for the New England Patriots and Boston Celtics, and occasionally participating
    in community fun runs organized by the town’s wellness initiative.
  arts: Breanna Steelfox curates contemporary children’s literature and illustrators like Oliver Jeffers and Mo Willems for their classroom, knits blankets while listening to folk artist Brandi Carlile,
    and contributes set design to the town’s seasonal theater productions, finding inspiration in the work of visual artist Yayoi Kusama.
  travel: Breanna Steelfox prefers mindful road trips, often biking the Connecticut River Trail to explore small river towns, and dreams of a cultural immersion in Edinburgh’s historic festivals, while
    they balance weekend getaways with the financial constraints of their graduate studies.
  culinary: Breanna Steelfox favors wholesome, plant‑forward meals, regularly prepares quinoa‑black bean salads with roasted butternut squash and thyme, enjoys brewing chamomile tea, and occasionally treats
    themselves to a New England clam chowder at a coastal seafood shack.
  core: Breanna Steelfox blends compassionate teaching with a meticulous yet flexible approach to life, juggling worries about finances and health through yoga, budgeting, and creative hobbies like knitting
    and theater set design.
background:
  cultural: Breanna grew up in a middle‑class, white New England family in suburban Massachusetts, where Protestant (Unitarian Universalist) values of community service, self‑reliance, and respect for individuality
    were emphasized. Her upbringing in the Boston‑Worcester corridor exposed her to a blend of traditional New England customs—such as celebrating Thanksgiving with a focus on gratitude and the Fourth of
    July parades—and the increasingly diverse cultural fabric of Worcester County, prompting her to value inclusivity and multicultural awareness. She maintains strong ties to local traditions, including
    attending town meetings, supporting the regional farmers’ market, and participating in town‑wide holiday festivals. These experiences have shaped her teaching philosophy, encouraging her to honor each
    child’s background while fostering a sense of belonging within a broader community.
