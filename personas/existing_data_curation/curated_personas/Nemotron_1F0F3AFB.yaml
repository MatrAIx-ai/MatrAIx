personas:
  professional: Vicki Mahoney is a seasoned electrical and electronic engineering technologist who leverages their curiosity and methodical planning to lead cross‑functional prototype teams, integrate sensor
    networks into renewable‑energy projects, and fuse precision circuitry with kinetic LED art installations, reflecting a sociable, talk‑ative nature that thrives on unconventional thinking.
  sports: Vicki Mahoney fuels their active lifestyle by trail‑running the Kennebec River valleys with the Waterville Runners Club, cheering the Boston Red Sox and Boston Bruins, joining a weekend kayaking
    crew along the Maine coastline, and squeezing in occasional cross‑country ski trips to Snow‑Valley during winter months.
  arts: Vicki Mahoney channels their love for watercolor landscapes inspired by Claude Monet into vivid Maine coastline paintings, crafts kinetic LED installations reminiscent of James Turrell, strums a
    ukulele to Jake Shimabukuro tunes at open‑mic nights, and dives into contemporary art theory alongside sci‑fi authors like Margaret Atwood and William Gibson, making art a central lens for interpreting
    technology.
  travel: Vicki Mahoney prefers purposeful travel that blends outdoor adventure with creative inspiration, having hiked Iceland’s geothermal fields, explored Japan’s robotics museums, and cherished road
    trips along the Maine coast to Acadia, all while leveraging a points‑based travel credit card to stretch a modest budget.
  culinary: Vicki Mahoney enjoys brewing a hop‑forward IPA with Cascade and Citra hops, cooking fresh lobster rolls with drawn butter, serving homemade blueberry crumble, and occasionally experimenting
    with Thai green curry, showcasing a competent home chef who favors New England seafood, craft beer experiments, and bold flavor contrasts.
  core: Vicki Mahoney is a sociable engineer‑artist who blends circuitry with paint, plans every project down to the last resistor, yet never says no to a late‑night jam session or a new brew batch.
background:
  cultural: Vicki comes from a long-standing New England white American family with deep roots in Maine, embodying the region’s values of self-reliance, modesty, and community participation. She grew up
    celebrating local traditions such as the Kennebec County Fair, coastal seafood festivals, and fall foliage tours. Her upbringing emphasized respect for the natural environment and an awareness of the
    Penobscot Nation’s heritage. These cultural influences shape her collaborative spirit, love of the outdoors, and commitment to fostering inclusive, community-focused technology initiatives.
