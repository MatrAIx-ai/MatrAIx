  career_goals: Vicki aims to advance into a senior engineering technologist role where she can lead large-scale renewable energy and automation projects for regional utilities. She plans to earn the Certified
    Engineering Technologist (CET) credential and eventually complete a master’s degree in engineering management to transition into project management. Long-term, she envisions directing interdisciplinary
    teams that fuse engineering with interactive art, while mentoring young women in STEM and establishing a community maker space that supports innovative, socially responsible technology solutions.
