personas:
  professional: Hannah Collie is a budding technologist who blends their curiosity for fantasy worlds with pragmatic problem‑solving by designing Scratch games and constructing intricate LEGO models, showing
    organized yet flexible work habits and occasional assertive leadership in their school’s robotics club.
  sports: Hannah Collie trains three times weekly with the Riverdale Youth Swim Team, joins the Greenfield Birdwatching Club for weekend nature hikes, and channels that active lifestyle into cheering for
    the New York Knicks and Los Angeles Dodgers, balancing structured workouts with relaxed outdoor exploration.
  arts: Hannah Collie cultivates a vivid artistic side by sketching comic‑style panels inspired by Noelle Stevenson, playing piano pieces from Hans Zimmer’s film scores, devouring fantasy novels by J.K.
    Rowling and Neil Gaiman, and listening to pop icons like Taylor Swift and BTS, weaving these influences into their own short stories and illustrations.
  travel: Hannah Collie prefers family‑planned road trips with detailed itineraries, having explored Yellowstone National Park, the interactive exhibits at the Smithsonian in Washington, D.C., and a day
    at Disney World, while dreaming of a future adventure to Kyoto’s ancient temples and the fjords of Norway’s Lofoten Islands.
  culinary: Hannah Collie enjoys simple but flavorful meals such as pepperoni pizza with mozzarella, chicken teriyaki sushi rolls with cucumber and avocado, and chocolate chip pancakes drizzled with maple
    syrup, often cooking these dishes themselves using fresh strawberries, broccoli, and cheddar cheese, while occasionally treating themselves to a scoop of vanilla ice cream at the local ice‑cream shop.
  core: Hannah Collie blends a quiet curiosity with practical organization, channeling a love for fantasy storytelling and hands‑on building into creative projects while maintaining a disciplined allowance
    routine and occasionally forgetting their glasses at the pool.
background:
  cultural: Hannah is a white American growing up in Lutz, a suburban community in Hillsborough County, Florida. Her family lives a typical middle‑class lifestyle, observing mainstream U.S. holidays such
    as Thanksgiving and Christmas while also participating in local community events like county fairs and school fundraisers. The region’s Southern hospitality, emphasis on outdoor recreation, and proximity
    to the Gulf Coast shape her experiences, giving her frequent access to beaches, wetlands, and nature centers. While she primarily identifies with broader American cultural values—such as a focus on
    education, personal responsibility, and community service—she is also exposed to the multicultural fabric of the Tampa area, including Hispanic and Caribbean influences that enrich the local food, music,
    and community activities.
