  career_goals: Hannah aspires to become a marine biologist or environmental scientist, motivated by her love of Florida’s wetlands and her curiosity about marine life. She wants to combine her practical
    problem‑solving abilities with scientific research to protect coastal ecosystems. In the short term, she aims to excel in her science classes, join the school’s STEM and ecology clubs, and secure a
    summer volunteer position at the nearby aquarium or a local conservation organization. Long‑term, she envisions earning a degree in marine biology, conducting field research, and possibly developing
    technology‑driven solutions for habitat restoration.
