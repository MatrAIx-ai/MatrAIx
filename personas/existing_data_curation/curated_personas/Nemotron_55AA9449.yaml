personas:
  professional: Kathleen Thompson is a dedicated front‑desk professional at a boutique wellness center, leveraging strong interpersonal communication and multitasking abilities while battling a spontaneous
    aversion to rigid schedules, and she is actively pursuing an office administration certification to transition into an office manager role within the next few years.
  sports: Kathleen Thompson enjoys casual beach volleyball with a local women’s club, follows the Miami Heat and Miami Marlins avidly, and practices morning yoga on the sand while occasionally jogging with
    friends to watch the Tampa Bay Buccaneers’ Sunday games.
  arts: Kathleen Thompson attends weekly Caribbean music festivals where a calypso tribute band plays, frequents art fairs showcasing Miami street artist Kelsey Montague, and unwinds with contemporary novels
    by Sally Rooney and mysteries by Tana French.
  travel: Kathleen Thompson prefers low‑key weekend getaways, often renting a modest Airbnb in Key West to surf sunrise, and pursues longer cultural escapes to the Bahamas and the historic streets of Seville,
    all planned with a spontaneous itinerary list that she tweaks on the fly.
  culinary: Kathleen Thompson demonstrates a modest yet adventurous kitchen skill set, regularly preparing Mediterranean dishes such as grilled chicken souvlaki with tzatziki and Caribbean staples like
    jerk shrimp with plantain fritters, favoring fresh basil, lime zest, and cumin.
  core: Kathleen Thompson blends a Southern work ethic with South‑Florida breezy spontaneity, juggling a love for organized admin tasks and a habit of last‑minute planning that often leaves her wrestling
    with worries while delighting in shell‑collecting on the shore.
background:
  cultural: Kathleen is a white American who grew up in a middle‑class suburban community in the southeastern United States before relocating to Lake Worth Beach, Florida. Her upbringing reflects traditional
    Southern values of hard work and community involvement, while her current environment embraces the relaxed, multicultural, and beach‑oriented lifestyle of South Florida. She engages with the local cultural
    scene, including Caribbean music festivals, art shows, and community volunteer initiatives, blending her roots with the diverse influences of her coastal hometown.
