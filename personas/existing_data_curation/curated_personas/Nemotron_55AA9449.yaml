  hobbies: '["Beach walks and shell collecting", "Yoga", "Reading contemporary fiction", "Gardening", "Cooking Mediterranean and Caribbean cuisine", "Attending art fairs and live music events", "Volunteering
    at senior community center", "Playing board games with friends"]'
  career_goals: Kathleen aims to advance from her current secretarial role to an office manager or senior executive assistant position within the next three to five years. She plans to obtain a certification
    in office administration or project coordination to strengthen her organizational skills and meet deadlines more consistently. In the longer term, she hopes to launch a freelance administrative consulting
    business that allows her to work flexibly while leveraging her curiosity for new tools and her practical problem‑solving abilities. She also aspires to develop more structured work habits to reduce
    her stress and improve work‑life balance.
