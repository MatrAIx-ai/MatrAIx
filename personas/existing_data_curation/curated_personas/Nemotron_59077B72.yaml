  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Gardening'', ''Nature photography'', ''Birdwatching'', ''Reading philosophy'', ''Volunteering at food pantry'', ''Community theater attendance'',
    ''Cooking experimental recipes'', ''Playing bridge'']'
  career_goals: Although he is no longer in the formal workforce, Christopher is eager to channel his experience into purposeful community impact. He aims to earn a Volunteer Management certification, lead
    a neighborhood art‑and‑culture initiative that includes murals and pop‑up exhibitions, and mentor at‑risk youth through a local nonprofit. He also hopes to expand his knowledge in community health by
    completing a basic counseling workshop, and to serve on the board of the York County Food Bank, where he can help shape programs that promote food security and social harmony. His flexible, curiosity‑driven
    mindset pushes him to explore unconventional volunteer roles, such as organizing interdisciplinary art‑therapy sessions for seniors.
