  hobbies: '[''Soccer (U10 team)'', ''LEGO building'', ''Adventure & mystery books'', ''Minecraft'', ''Boy Scouts'', ''Jigsaw puzzles'', ''Piano practice'', ''Bike riding'']'
  career_goals: Robert dreams of one day serving his community as a firefighter or police officer, roles that combine his desire for structure, teamwork, and helping others. He also loves building things,
    so he hopes to become a civil engineer who designs bridges and roads. In the short term, he aims to become the captain of his soccer team and the president of his class' student council, showcasing
    his leadership and competitive spirit.
