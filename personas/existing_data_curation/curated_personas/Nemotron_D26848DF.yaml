personas:
  professional: Robert Murphy is an aspiring junior builder‑engineer who spends weekends turning LEGO instructions into functional prototypes, channeling their methodical nature, love of puzzles, and competitive
    spirit into designing miniature bridges and robotic models that they proudly show off to their soccer teammates.
  sports: Robert Murphy plays forward on the River Valley Rangers youth soccer team, thriving on structured drills and competitive matches, and they cheer for the national soccer team during the World Cup
    while also following the local minor league baseball team, the Meadowfield Miners, whenever they have a weekend free.
  arts: Robert Murphy enjoys the upbeat beats of Imagine Dragons, the whimsical piano tunes of Yiruma, and often hums Gorillaz's 'Feel Good Inc.' while building LEGO creations, and they eagerly anticipate
    new LEGO‑themed animated specials starring voice actors like Tom Hanks.
  travel: Robert Murphy loves weekend camping trips with the Boy Scouts at Pine Creek Camp, where they map out routes on a pocket‑size trail guide; they also cherish family visits to the interactive science
    museum in Chicago and dream of exploring the LEGO House in Billund, Denmark, though their travel plans always require parental approval and a tight schedule.
  culinary: Robert Murphy prefers pizza with extra cheese, chicken nuggets, and mac‑and‑cheese, often mixing in broccoli for a 'healthy' twist, enjoys helping to bake gingerbread cookies shaped like LEGO
    bricks, can name the ingredients—flour, butter, sugar, cinnamon—and usually asks for a side of strawberry milk, and they proudly serve their creations to friends during playdates.
  core: Robert Murphy is a structured, competitive 8‑year‑old who blends a love for LEGO engineering, soccer teamwork, and meticulous savings habits with occasional stubbornness and a sweet tooth; they
    often negotiate trades with friends at school.
background:
  cultural: Robert was raised in Shelbyville, Tennessee, a small city in Middle Tennessee known for its close‑knit community and Southern hospitality. His family participates in local church activities
    and community events such as the annual Tennessee Walking Horse festivals. He grew up with Southern traditions like family barbecues, listening to country and classic rock music, and cheering for the
    local high school football team. The region’s emphasis on respect, teamwork, and community service is reflected in his involvement with Boy Scouts and his aspiration to become a firefighter. At the
    same time, modern influences like video games and online learning are part of his daily life, giving him a balanced blend of traditional and contemporary cultural experiences.
