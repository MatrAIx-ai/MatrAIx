personas:
  professional: Juan Amos, an aspiring landscape architect, blends hands‑on planting, storm‑water design, and rapid digital drafting to create resilient community spaces, while his spontaneous brainstorming
    style sometimes clashes with the deadlines of his associate‑degree coursework.
  sports: Juan Amos, a street‑ball enthusiast, plays pickup games at the Dorchester courts, follows the Boston Celtics and New England Patriots, and belongs to a local kayaking club that meets weekly to
    paddle the Boston Harbor, while he occasionally joins a weekend ultimate frisbee league for extra cardio.
  arts: Juan Amos, a drummer in a neighborhood band and a hip‑hop dance fan, draws inspiration from artists like Questlove, Kendrick Lamar, and photographer Vivian Maier, often spending evenings capturing
    urban‑nature contrasts on his DSLR before heading to improv comedy jams with friends.
  travel: Juan Amos, an adventurous traveler, has kayak‑explored the Boston Harbor, taken weekend road trips to the historic streets of Philadelphia and the coastal cliffs of Cape Cod, and dreams of backpacking
    through the vibrant neighborhoods of Montreal to experience its street art and music festivals.
  culinary: Juan Amos, an intermediate home‑cook, loves tossing fresh basil, cherry tomatoes, and mozzarella into a quick caprese salad, grilling marinated chicken thighs with a smoky chipotle rub, and
    perfecting homemade fish tacos with cabbage slaw and avocado crema after harvesting herbs from his community garden.
  core: Juan Amos, a high‑energy community‑focused design student, balances spontaneous creativity with a habit of forgetting deadlines, while juggling basketball, drumming, and a love for DIY projects.
background:
  cultural: Juan grew up in Dorchester's vibrant Black community, a neighborhood steeped in a mix of New England urban history and Caribbean family traditions. He attended local churches where gospel music
    and spoken‑word poetry were part of everyday life, and he participates in community festivals that celebrate African‑Diaspora art and cuisine. This cultural richness informs his design sensibility—he
    often incorporates motifs from African textiles and Caribbean flora into his landscape concepts, aiming to reflect the heritage and resilience of the residents he serves.
attributes:
  skills: '[''Conceptual sketching'', ''Digital drafting (AutoCAD, SketchUp)'', ''Plant selection and horticulture'', ''Sustainable water management'', ''Basic GIS mapping'', ''Soil and site analysis'',
    ''Construction documentation'', ''Team collaboration'', ''Client communication'', ''DIY project implementation'']'
  hobbies: '[''Street basketball'', ''Hip‑hop dancing'', ''Playing drums'', ''Community gardening'', ''Kayaking'', ''Urban photography'', ''DIY furniture building'', ''Multiplayer video gaming'', ''Improv
    comedy'']'
  career_goals: Juan plans to earn his GED and complete an associate‑degree program in landscape architecture through a local community college. He aims to obtain professional licensure within the next
    five years and eventually lead design projects that revitalize under‑served neighborhoods in Dorchester with resilient green infrastructure, community gardens, and culturally resonant public spaces.
    He also hopes to mentor other young Black residents who are interested in design and environmental stewardship, and to one day launch his own collaborative studio that integrates technology, sustainability,
    and community participation.
