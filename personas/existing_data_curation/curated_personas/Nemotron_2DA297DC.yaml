  career_goals: Robert dreams of turning his imagination into a career that blends art and technology. He aspires to become a video game designer or animator who creates immersive, story‑driven worlds.
    He is also fascinated by architecture and hopes to design innovative, flexible spaces that inspire curiosity. In the short term, he plans to lead a school‑based makers club, organize community art showcases,
    and continue exploring coding and robotics to build a portfolio that bridges his creative and technical interests.
