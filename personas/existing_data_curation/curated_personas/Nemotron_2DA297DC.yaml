personas:
  professional: Robert Popova is an aspiring comic artist and junior game programmer who channels their vivid imagination into detailed storyboard sketches and LEGO engineering challenges, while they adopt
    a laid-back attitude toward deadlines that lets them freely experiment with narrative pacing and simple code loops.
  sports: Robert Popova plays forward for the local youth soccer club River City Rovers U11, delights in fast-paced drills and weekend matches, and cheers for Manchester United and the Los Angeles Lakers,
    while they treat each after-school training session as a chance to unleash their boundless energy and build teamwork skills.
  arts: Robert Popova devotes their free time to sketching comic panels influenced by Brian K. Vaughan, drumming to Travis Barker's explosive rhythms, and soaking up Hayao Miyazaki's animated storytelling,
    while they transform school improv sessions into spontaneous visual performances.
  travel: Robert Popova prefers spontaneous bike rides through nearby parks and occasional family road trips to places like Yellowstone National Park, while day-dreaming about a future adventure to Tokyo's
    Akihabara district to explore manga cafes and LEGO exhibitions, balancing a love for relaxed exploration with an appetite for bold, tech-centric travel.
  culinary: Robert Popova enjoys devouring pepperoni pizza and crafting customizable ramen bowls with miso broth, soy sauce, and soft-boiled eggs, and often attempts to bake chocolate chip cookies, though
    their habit of getting lost in imagination mid-recipe sometimes yields undercooked treats.
  core: Robert Popova is a wildly imaginative 11-year-old who sketches superhero epics while juggling half-finished LEGO creations, hoards graphic novels, and habitually misplaces school worksheets inside
    comic sketchbooks.
background:
  cultural: Robert grows up in a middle‑class white American family in Doylestown, Pennsylvania, an area known for its historic charm and vibrant community arts scene. His family celebrates traditional
    American holidays and incorporates stories of their German and Irish ancestry during gatherings. Frequent visits to the Doylestown Historical Society, the local library's creative workshops, and community
    festivals have nurtured his appreciation for both heritage and contemporary culture. This suburban upbringing emphasizes community involvement, education, and a love for the outdoors, all of which shape
    his worldview and personal interests.
