persona_description: A construction manager or project manager who is responsible for overseeing the construction of large-scale infrastructure projects. They are tasked with managing the project's budget,
  timelines, and quality standards while ensuring that the project stays on schedule and within budget. They must have a deep understanding of construction projects, their duration, and the cash flow associated
  with them. They must also be able to prepare an estimated cash flow from start to finish for all the projects that have started in backlog. They must have experience in analyzing construction projects,
  identifying the types of projects that make up the backlog, and predicting spending based on the duration of the projects and the cash flow schedule. They must be able to interpret the text and understand
  the distinction between backlog, backlog ETC, and cumulative cash flow to predict spending. They must have a good grasp of construction projects and their duration, and be able to analyze the types of
  projects that make up the backlog and predict spending based on the duration of the projects and the cash flow schedule.
