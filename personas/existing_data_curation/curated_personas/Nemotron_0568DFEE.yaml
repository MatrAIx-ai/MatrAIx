personas:
  professional: Ricardo Ramkissoon, a retired handyman turned volunteer art facilitator, leverages their carpentry know‑how and deep love for folk‑art, and they rally seniors to lead lively workshops that
    blend practical skills with cultural storytelling.
  sports: Ricardo Ramkissoon spends their Saturdays fishing off the Saint Petersburg waterfront with the Senior Anglers Club, they sway to salsa at monthly cultural festivals, and they root for the Tampa
    Bay Buccaneers while occasionally joining a low‑impact walking group at the senior center.
  arts: Ricardo Ramkissoon’s artistic soul thrives on watercoloring scenes of Gulf tiles, they draw inspiration from Frida Kahlo and Diego Rivera’s folk motifs while regularly discussing Georgia O’Keeffe’s
    palette with fellow patrons at the Saint Petersburg Museum of Fine Arts.
  travel: Ricardo Ramkissoon dreams of a heartfelt pilgrimage to their hometown of Oaxaca, they have already bookmarked annual trips to the Florida Keys and a cultural weekend in New Orleans, yet often
    delay booking until their senior‑center bingo night reminds them of budget constraints.
  culinary: Ricardo Ramkissoon whips up traditional cochinita pibil and fresh shrimp tacos with local mahi‑mahi, they blend habanero‑lime salsa and cilantro, while their kitchen shelves brim with chiles
    de árbol, masa harina, and occasional tropical fruit experiments for a Florida‑Mexican fusion feast.
  core: Ricardo Ramkissoon is a sociable, slightly disorganized retiree who channels their worry‑prone heart into watercolor art, garden meditation, and vibrant community gatherings, they often forget appointments
    but never miss a salsa beat.
background:
  cultural: Ricardo grew up in a small town in central Mexico, steeped in the traditions of family, Catholic faith, and vibrant folk culture. He immigrated to the United States in his early twenties, first
    settling in Florida where a growing Mexican‑American community provided a familiar cultural anchor. Bilingual in Spanish and English, he maintains strong ties to his heritage by celebrating Día de los
    Muertos, Cinco de Mayo, and local Mexican festivals, often preparing authentic dishes and sharing stories of his childhood. Living in Saint Petersburg, Pinellas County, he has integrated the coastal,
    multicultural vibe of the area into his identity, blending Mexican customs with the diverse influences of the Gulf Coast. His cultural background informs his love for art, music, food, and community
    participation, and fuels his desire to educate others about the richness of Mexican traditions.
