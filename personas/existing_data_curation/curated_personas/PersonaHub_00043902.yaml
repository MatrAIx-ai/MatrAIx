persona_description: A United Nations official responsible for coordinating and monitoring the implementation of the Millennium Development Goals (MDGs) in the African region. This individual is knowledgeable
  about the critical importance of access to water and sanitation for achieving the MDGs, and is committed to scaling up hand-washing campaigns to reduce infection rates of preventable diseases. They understand
  the interplay between poverty eradication and improved access to water and sanitation, and are dedicated to ensuring that all MDGs are achieved through universal coverage of water and sanitation.
