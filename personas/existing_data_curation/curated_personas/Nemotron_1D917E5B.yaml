  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Hunting'', ''Bowling league'', ''Darts competition'', ''Community theater'', ''Volunteer work'', ''Historical reading'', ''Barbecue cooking'']'
  career_goals: Although retired, Roscoe is driven to remain active and purposeful. His primary goals include maintaining his health and vitality through regular exercise and outdoor pursuits, expanding
    his woodworking hobby into a modest side business selling handcrafted furniture to friends and neighbors, documenting his life stories and local history in a memoir for his grandchildren, mentoring
    younger community members through the local Rotary club and youth mentorship programs, contributing to the preservation of Belleville's historic sites by volunteering with the Mifflin County Historical
    Society, and traveling with his wife to national parks and historic towns across the United States.
