personas:
  professional: Nhan Yap, a meticulous 16‑year‑old aspiring health‑information specialist, channels their love of detailed planners, spreadsheet budgeting, and bilingual document handling into volunteer
    cataloguing and event coordination at the local library, showcasing a blend of disciplined organization and a desire to serve.
  sports: Nhan Yap, who thrives on structured routines, runs with the Midtown High School cross‑country team (the Hawks) and follows the United States Women’s National Soccer Team, using early morning jogs
    to clear their mind and maintain a calm cadence after school.
  arts: Nhan Yap, whose evenings are spent practicing calligraphy inspired by classic lettering masters like Hermann Zapf and modern typographer Lauren Elder, devotes free time to reading historical novels
    by Ken Follett and Bernard Cornwell, while listening to ambient piano works by Ludovico Einaudi and indie folk singer Sufjan Stevens.
  travel: Nhan Yap prefers meticulously planned trips, enjoys the quiet of national parks such as Grand Canyon and the historic charm of Savannah, Georgia, and dreams of organized tours to Kyoto, Japan
    and Lake Bled, Slovenia, balancing an adventurous spirit with a careful budget.
  culinary: Nhan Yap finds comfort in preparing the family’s aromatic herb‑infused broth soup, hand‑rolling fresh spring rolls, and simmering caramelized pork with star anise and ginger, seasoning dishes
    with cilantro, lemongrass, and Thai basil harvested from their windowsill herb garden of basil, mint, and chives.
  core: Nhan Yap, a detail‑driven 16‑year‑old who balances a routine‑loving, anxiety‑prone inner life with a pragmatic drive to organize, help, and master the minutiae of daily tasks.
background:
  cultural: Nhan was raised in a Vietnamese‑American household in Saint Paul, Minnesota. Her family emphasizes respect for elders, close family ties, and the preservation of cultural traditions such as
    Tet celebrations and traditional cooking. These values have instilled in her a strong sense of responsibility, cooperation, and harmony within her community. While she integrates into the broader American
    school environment, she maintains fluency in Vietnamese, participates in cultural festivals at the local community center, and helps her parents with the family’s modest restaurant, reinforcing her
    connection to Southeast Asian heritage.
attributes:
  skills: '[''Time management'', ''Organizational planning'', ''Detailed note‑taking'', ''Basic spreadsheet use'', ''Elementary accounting'', ''Bilingual communication (Vietnamese/English)'', ''Cooking
