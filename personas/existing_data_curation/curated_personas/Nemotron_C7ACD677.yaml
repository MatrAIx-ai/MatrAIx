  hobbies: '[''Journaling'', ''Reading self‑help and historical fiction'', ''Calligraphy (Vietnamese and English)'', ''Cooking family recipes'', ''Indoor herb gardening'', ''Solving Sudoku and jigsaw puzzles'']'
  career_goals: Nhan aspires to pursue a stable, routine‑oriented career that blends her love for organization with her desire to help others. She is drawn to fields such as medical records administration,
    accounting, or library science, where she can apply her meticulous attention to detail and her disciplined work ethic. In the long term, she hopes to attend a community college and earn an associate
    degree in health information management, eventually securing a full‑time position in a hospital’s records department. She also envisions continuing to support her family’s small restaurant by handling
    its bookkeeping and inventory management.
