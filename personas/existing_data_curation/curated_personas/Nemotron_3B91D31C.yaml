  career_goals: Eula plans to finish her associate degree in Business Administration at a local community college and secure a stable clerical or administrative role that offers a predictable routine with
    room for occasional flexibility. She values job security, a clear set of responsibilities, and the chance to apply her practical skills in a supportive environment. In the longer term, she hopes to
    save enough to open a modest neighborhood café or bakery, blending her love of baking with entrepreneurship while staying close to her community. Managing her stress, building confidence in professional
    settings, and maintaining a work‑life balance are key personal ambitions.
