personas:
  professional: Eula Brooks, an aspiring administrative assistant, blends solid basic office software skills with a knack for cash handling and a calm, routine‑oriented demeanor, allowing them to thrive
    in predictable clerical environments while occasionally offering flexibility in scheduling community events.
  sports: Eula Brooks supports the Kansas City Chiefs during weekend games, joins a local church softball league each spring, and stays active with gentle yoga sessions and daily dog walks in the city park.
  arts: Eula Brooks reads contemporary romance novels by Nora Roberts, devours mystery thrillers by Gillian Flynn, and bonds with friends over classic country icons like Dolly Parton and Willie Nelson at
    local music nights.
  travel: Eula Brooks prefers short, budget‑friendly road trips, has explored nearby state parks and spent a weekend in Nashville to catch live country music, and dreams of a relaxed getaway to New Orleans’
    French Quarter once savings from their future café allow.
  culinary: Eula Brooks bakes classic chocolate chip cookies, lemon bars, and banana‑bread using fresh rosemary from their garden, balances these treats with hearty home‑cooked meals such as meatloaf and
    mashed potatoes, and occasionally experiments with a pinch of cinnamon in an old‑fashioned apple pie recipe.
  core: Eula Brooks is a routine‑loving, anxiety‑prone future bakery owner who juggles a love for simple comforts, a habit of over‑organizing their journal, and a stubborn tendency to forget scheduled appointments.
background:
  cultural: Eula comes from a white, middle‑class family in Springfield, Missouri, embedded in the Midwestern cultural tapestry. Her upbringing emphasized practicality, modesty, and community involvement,
    with strong ties to her local Protestant church and neighborhood traditions. She grew up attending public schools, celebrating regional holidays like Thanksgiving and the Fourth of July with family
    gatherings, and participating in community events such as farmers’ markets and school sports. This cultural background has fostered a pragmatic outlook, a respect for routine, and a sense of loyalty
    to her hometown and its values.
