  career_goals: Although currently not in the formal workforce, Briana aims to re‑enter part‑time employment in a role that leverages her organizational strengths, such as a part‑time office administrator
    for a local nonprofit serving military families. She is considering obtaining a Certified Nursing Assistant (CNA) credential to provide home‑based health support, which aligns with her practical mindset
    and desire for a predictable schedule. Additionally, she hopes to launch a small home‑based catering service focused on traditional Southern comfort foods for community events, allowing her to blend
    her love for cooking with her entrepreneurial spirit. Long‑term, she aspires to become a trusted community resource, perhaps serving on the Onslow County Neighborhood Association board.
