  hobbies: '[''Gardening (vegetables and flowers)'', ''Cooking comfort‑food meals'', ''Reading mystery novels'', ''Volunteering at the local food bank'', ''Listening to classic rock and talk‑radio'', ''Hiking
    trails in the Brandywine Valley'', ''Attending community church events'', ''Knitting scarves and blankets'']'
  career_goals: Brandy aims to solidify her reputation as a dependable driver while gradually shifting toward mentorship and supervisory roles. Over the next few years she hopes to become a driver trainer
    or safety coordinator, sharing her calm, resilience‑based approach with new hires. She is also considering the long‑term goal of starting a modest, family‑run transportation business that would allow
    her to maintain a predictable income while preserving the flexibility needed for family commitments and community involvement.
