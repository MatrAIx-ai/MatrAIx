  hobbies: '[''Community theater acting'', ''Group dance classes'', ''Volunteering at food pantry'', ''Cooking and baking for friends'', ''Gardening'', ''Hiking local trails'', ''Crafting (knitting, crochet)'',
    ''Listening to podcasts on self‑improvement and community issues'', ''Playing ukulele'', ''Participating in neighborhood block parties'']'
  career_goals: Kim aims to obtain her GED within the next year and pursue a certification as a Community Health Worker or Certified Nursing Assistant, allowing her to formalize her passion for helping
    others. She seeks a flexible, part‑time position at a local non‑profit or community center where she can support youth or senior programs while maintaining a schedule that accommodates her social commitments.
    Long‑term, Kim envisions leading a community outreach program in Fall River, organizing wellness workshops and peer‑support groups that foster cohesion and mutual aid.
