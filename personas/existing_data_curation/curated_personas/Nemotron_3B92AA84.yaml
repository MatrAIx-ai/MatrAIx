personas:
  professional: Teresa Rivera, a 47-year-old business strategist, leverages her meticulous financial planning skills and passion for contemporary art to launch a boutique consultancy that equips micro-entrepreneurs
    with artistic branding, sustainable practices, and rigorous cash-flow models, all while navigating stakeholder negotiations with a competitive edge.
  sports: Teresa Rivera cycles the 12-kilometer loop of Parque del Tren five mornings a week, is a member of the Bayamón Pedalers Club, follows the Bayamón Maulers basketball team with fervor during the
    season, and incorporates salsa dancing sessions as a high-energy cardio workout.
  arts: Teresa Rivera spends Saturday afternoons exploring the contemporary galleries at the Museum of Art, paints watercolor scenes of island landscapes inspired by artists like Carlos Méndez, and volunteers
    to curate pop-up art markets that showcase emerging local talent.
  travel: Teresa Rivera favors weekend escapes to historic Old San Juan, annual cultural immersion trips to Barcelona’s vibrant art districts, and dreams of touring Kyoto’s Zen temples and tea houses to
    study serene garden design.
  culinary: Teresa Rivera reinvents classic island arroz con gandules by swapping rice for quinoa, seasons it with cilantro, oregano, and epazote from her herb garden, and prepares a signature sofrito that
    serves as a flavorful foundation for experimental sauces.
  core: Teresa Rivera fuses analytical business expertise with a relentless creative drive, turning community workshops into branding laboratories while never missing a beat on the salsa floor.
background:
  cultural: Teresa was born and raised in Bayamón, a lively municipality on the northern coast of Puerto Rico, and spent much of her adult life in the neighboring Trujillo Alto area. Her upbringing immersed
    her in the island’s rich tapestry of Spanish, African, and Taíno influences, fostering a deep appreciation for music (plena, salsa, bomba), family gatherings, and community festivals such as San Juan’s
    fiestas patronales. Bilingual from an early age, she navigated both Spanish-speaking household traditions and the English‑language environment of her schooling, cultivating strong communication skills.
    Her Catholic upbringing shaped values of service and stewardship, which later manifested in volunteer leadership. Teresa’s Puerto Rican identity is reflected in her love of food, art, and the collective
    pride of a close‑knit community, while her curiosity drives her to blend those roots with contemporary, global ideas.
