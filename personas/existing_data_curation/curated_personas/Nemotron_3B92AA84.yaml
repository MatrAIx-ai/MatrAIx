  career_goals: Teresa aims to re‑enter the professional sphere by launching a boutique consultancy that supports micro‑entrepreneurs in the Bayamón area, helping them integrate artistic branding, sustainable
    practices, and sound financial planning. Over the next two years she plans to complete a Certified Nonprofit Professional (CNP) credential, strengthening her ability to lead community‑focused initiatives.
    She envisions curating pop‑up art markets and offering workshops that blend creative expression with entrepreneurship, thereby marrying her love for art and her business acumen. In five years she hopes
    to be a regular speaker at local economic development forums, mentor at least twenty aspiring women business owners, and hold a part‑time advisory role with a cultural institution that promotes Puerto
    Rican heritage through entrepreneurship.
