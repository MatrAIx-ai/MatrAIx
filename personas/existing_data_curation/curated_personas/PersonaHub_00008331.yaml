persona_description: Dr. Changwoo Ahn, a researcher with a passion for wetland plant functional group diversity and its effects on carbon storage and nitrogen removal. His research aims to understand how
  the gain of plant diversity at early stages of restoration affects the development of soil properties and processes. He is conducting this study to improve the design and management of wetlands, ensuring
  their structural and functional success. Dr. Ahn is a PhD student at George Mason University and is supported by the Thomas F. and Kate Miller Jeffress Memorial Trust Fund and a Virginia Academy of Sciences
  small project research grant.
