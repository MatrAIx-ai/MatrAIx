personas:
  professional: Camilla Torres, an aspiring junior engineer, spends afternoons turning LEGO architecture sets into functional mini‑structures, applying meticulous step‑by‑step planning and a knack for troubleshooting
    mechanical parts, all while dreaming of designing real‑world bridges someday.
  sports: Camilla Torres, a member of the local youth soccer team, loves cheering on the city’s professional baseball club the Mariners during summer weekends and frequently joins her family on brisk forest
    hikes to spot owls and feathered friends, blending fitness with her bird‑watching hobby.
  arts: Camilla Torres, an enthusiastic sketcher, fills her notebook with detailed drawings of squirrels, owls, and forest scenes, enjoys re‑reading mystery novels by Enid Blyton for inspiration, and creates
    pixel‑style animations on Scratch that showcase her favorite animal characters.
  travel: Camilla Torres, an enthusiastic explorer, favors day trips to nearby state parks for bird‑watching and nature walks, dreams of visiting the historic castle ruins in Scotland she read about in
    a storybook, and often maps out her adventures on a colorful calendar.
  culinary: Camilla Torres, a budding home‑chef, delights in assembling simple peanut‑butter and jelly sandwiches, experimenting with fruit‑topped oatmeal, and occasionally bakes chocolate chip cookies
    with her parents, while always keeping a stash of gummy bears for quick energy during LEGO sessions.
  core: Camilla Torres blends meticulous curiosity with a love for tiny adventures, turning LEGO bricks, sketchbooks, and friendship‑bracelet trades into a personal world of structured imagination.
background:
  cultural: 'Camilla grows up in a middle class, predominantly white family in Bealeton, Virginia, a small community surrounded by farmland and open countryside. Her upbringing reflects typical American
    suburban rural values: emphasis on education, community involvement, and respect for nature. She participates in local activities such as school science fairs, community garden projects, and seasonal
    celebrations like Fourth of July parades and holiday church services. Her family''s cultural heritage includes European (British and Irish) roots, which influence occasional traditions such as baking
    holiday pies and telling family stories. This environment nurtures Camilla''s curiosity, practicality, and sense of responsibility toward her community.'
