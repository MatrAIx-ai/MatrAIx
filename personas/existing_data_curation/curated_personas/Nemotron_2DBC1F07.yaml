  hobbies: '[''Reading adventure/mystery novels'',''Building LEGO models'',''Sketching animals and nature'',''Bird watching in local woods'',''Scratch coding (games and animations)'',''Making and trading
    friendship bracelets'']'
  career_goals: Although she is only eight, Camilla already dreams of a career that mixes her curiosity about the natural world with practical problem solving. She hopes to become a wildlife biologist who
    can study and protect the ecosystems of Virginia's rural landscapes, and she is also fascinated by veterinary science, imagining a future where she cares for animals in her community. Camilla considers
    teaching at an elementary level, where she could share her love of reading and organized learning with younger children. She also enjoys engineering challenges, so she envisions designing simple devices
    or community garden projects that improve everyday life. Her overarching ambition is to make a tangible, positive impact on both people and nature.
