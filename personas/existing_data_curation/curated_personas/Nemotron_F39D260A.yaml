  career_goals: In the near term, Antonio aims to step into a lead developer role where he can shape technical roadmaps, mentor junior engineers, and champion best‑practice standards that blend innovation
    with stability. He is keen to deepen his expertise in cloud‑native architectures and AI‑enhanced services, positioning himself to contribute to high‑impact, data‑driven products. Long‑term, Antonio
    dreams of founding a tech startup focused on creating inclusive digital tools for mental‑health support within underrepresented communities, merging his compassionate outlook with entrepreneurial ambition.
    Throughout his career progression, he intends to remain an active voice in Black tech networks, helping to broaden access to opportunities and foster a culture of representation in the industry.
