personas:
  professional: Patricia Kruse is a senior development strategist who blends rigorous data analysis with creative storytelling to design donor engagement campaigns, leverages their STEM background to troubleshoot
    fundraising crises, and uses their sociable, assertive yet flexible nature to rally volunteers and stakeholders while occasionally letting loose details slip due to their relaxed approach to obligations.
  sports: Patricia Kruse embraces an active lifestyle by kayaking on the Santa Fe River in summer, joining the Santa Fe Trail Hiking Club for autumn treks, practicing yoga year‑round, cheering on the New
    Mexico United soccer team and the New Mexico Lobos basketball squad, and participating in a local senior cycling group that meets every Saturday, all while they maintain a relaxed, flexible attitude
    toward structured workouts.
  arts: Patricia Kruse cultivates a rich artistic life by crocheting intricate Amigurumi designs inspired by the works of Kiki Smith, attending performances at the Santa Fe Playhouse featuring regional
    playwrights like Luis Valdez, devouring mystery novels by Agatha Christie and Tana French in their weekly book club, and relaxing to the soulful blues of B.B. King and the folk storytelling of Joan
    Baez.
  travel: Patricia Kruse prefers flexible, low‑key travel plans that blend nature and culture, having kayaked the turquoise waters of Lake Atitlán in Guatemala, hiked the ancient trails of the Inca Path
    to Machu Picchu, explored the historic streets of Savannah, Georgia for Southern culinary inspiration, and dreamily awaiting a sunrise yoga retreat in Rishikesh, India, all while they balance a modest
    travel budget with occasional splurges on artisanal souvenirs.
  culinary: Patricia Kruse enjoys cooking Southern‑style comfort food with a flair for detail, whipping up crispy fried chicken seasoned with smoked paprika, creamy collard greens simmered with ham hocks,
    sweet potato pie spiced with nutmeg, and homemade biscuits using buttermilk and flour, while they experiment with fresh herbs like thyme and rosemary and often crochet a dishcloth as they wait for the
    oven timer, reflecting both their creativity and occasional tendency to over‑salt.
  core: Patricia Kruse is a community‑focused fundraising veteran who balances data‑driven strategy with spontaneous generosity, worries about deadlines while thriving on social gatherings, and occasionally
    misplaces their crochet hooks during a kayak trip.
background:
  cultural: Patricia grew up in a small Midwestern town before moving to Florida for college, where she earned a B.S. in a STEM field. Her upbringing emphasized self‑reliance, community involvement, and
    a modest, practical outlook. Living in Fort White, she embraces the Southern rural lifestyle, valuing hospitality, local traditions, and a close connection to nature. While she identifies as white,
    her cultural identity is shaped by a blend of Midwestern sensibilities and the laid‑back, community‑oriented culture of North‑Central Florida.
