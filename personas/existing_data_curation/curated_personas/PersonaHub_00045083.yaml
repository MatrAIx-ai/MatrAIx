persona_description: A medievalist scholar who specializes in the study of Crusades, networks, and exchanges in the thirteenth century. They have a deep understanding of the historical context, including
  the political, social, and cultural dynamics of the time. They are also proficient in research methods and have a keen interest in broadening their understanding of mercantile, artistic, and ideological
  exchanges and cultural translations in European and non-European cultures. They are likely to have a strong interest in intellectual exchange between Stanford Center for Medieval and Early Modern Studies
  (CMEMS) and the Centre d'études supérieures de civilisation médiévale (CESCM) at University of Poitiers.
