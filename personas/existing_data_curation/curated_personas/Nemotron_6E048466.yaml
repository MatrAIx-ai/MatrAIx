personas:
  professional: A budding young marine enthusiast and LEGO architect, Dina Mendel dreams of one day designing underwater habitats, turning her love for beachcombing, science-fiction reading, and collaborative
    Minecraft builds into a future career in marine engineering while they already lead class projects and amaze peers with intricate LEGO schools of fish.
  sports: An avid beach‑volleyball player for the North Shore Junior Beach Volleyball Club and a dedicated swimmer on the Oceanview Aquatics Junior Swim Team, Dina Mendel follows the Los Angeles Lakers
    and the Seattle Mariners, often cheering them during games at school while they compete fiercely in local sand‑court tournaments and relentlessly practice perfect serves.
  arts: A passionate admirer of pop music and marine art, Dina Mendel fills their playlists with Taylor Swift, BTS, and Billie Eilish while drawing detailed kelp forests inspired by Jacques Cousteau illustrations,
    and they eagerly attend school talent shows to perform choreographed dances to K‑pop hits.
  travel: Having collected shells from family trips to Maui and the Florida Keys, Dina Mendel dreams of snorkeling the Great Barrier Reef and exploring the turquoise lagoons of the Maldives, preferring
    spontaneous road‑trip planning over airline travel because they get nervous in airports, yet they never miss a chance to stay at beachfront cabins during summer vacations.
  culinary: From crafting tuna poke bowls with seaweed and sesame seeds to mixing mango‑pineapple smoothies thick enough to soak a LEGO brick, Dina Mendel enjoys cooking seafood‑inspired dishes like shrimp
    tacos with avocado salsa, while they occasionally overindulge on sugary gummy candies after intense Minecraft sessions.
  core: Dina Mendel is a hyper‑curious, beach‑obsessed nine‑year‑old with a fierce competitive streak, an anxiety‑prone heart, and a knack for turning LEGO bricks into marine wonderlands, and they often
    channel that energy into building intricate sea‑scapes.
background:
  cultural: Dina is raised in a White, Ashkenazi‑Jewish family in Imperial Beach, California. Her household celebrates Jewish holidays such as Hanukkah, Passover, and Rosh Hashanah, while also embracing
    the laid‑back Southern California beach culture—surf outings, picnics, and local community festivals. Growing up near San Diego's diverse neighborhoods, she has been exposed to Mexican food, bilingual
    signage, and multicultural community events, blending these experiences into a multicultural, yet primarily American, upbringing.
attributes:
  skills: '[''Leadership in group activities'', ''Organizational planning'', ''Hands‑on building (LEGO, model kits)'', ''Basic scientific experimentation'', ''Computer literacy'', ''Attention to detail'',
    ''Critical thinking (skepticism)'', ''Reliability'', ''Conflict observation'']'
  hobbies: '[''Beach volleyball'', ''Swimming'', ''LEGO building'', ''Minecraft'', ''Reading adventure books'', ''Collecting shells'', ''Science experiments with kits'', ''Drawing and sketching'', ''Group
    board games'', ''Listening to pop music'']'
  career_goals: As a child of 9, Dina dreams of becoming a marine biologist who explores tide pools and discovers new sea creatures, motivated by her love of Imperial Beach. She also imagines designing
    environmentally‑friendly inventions as an engineer, hoping to create tools that keep the ocean clean. Over time, she hopes to lead teams that combine science and community action.
