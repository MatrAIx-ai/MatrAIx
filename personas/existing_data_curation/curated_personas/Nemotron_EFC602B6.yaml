  hobbies: '[''Volunteering at local community center'', ''Organizing group outings with friends'', ''Participating in dance classes (hip‑hop and contemporary)'', ''Running and fitness classes'', ''Reading
    self‑improvement and business books'', ''Cooking Southern‑inspired meals with family'', ''Attending live R&B and gospel concerts'', ''Playing piano'', ''Mentoring younger students in academic coaching'']'
  career_goals: Pamela aims to become a senior underwriter within the next five years, pursuing the Chartered Property Casualty Underwriter (CPCU) designation to deepen her technical expertise. She plans
    to enroll in a bachelor's program in Risk Management or Business Administration, while seeking mentorship opportunities within her firm to develop leadership skills. Long‑term, she envisions moving
    into underwriting management, leading a team that prioritizes fair and inclusive risk assessment practices, and contributing to community outreach programs that improve insurance literacy among underserved
    populations in Kentucky.
