persona_description: A software developer who specializes in the creation and maintenance of software routines for converting drawings from AutoCAD to Geospatial Information System (GIS) format. This routine
  is designed to recreate boundaries around hatch patterns in a drawing and convert them into Gis polygons, using a process that is similar to the one used by common desktop GIS when importing drawings.
  The routine is tested on AutoCAD 2012 and can be loaded from the Tools menu > AutoLISP > Load application in Autocad.
