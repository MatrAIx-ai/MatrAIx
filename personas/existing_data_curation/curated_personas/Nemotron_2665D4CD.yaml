  career_goals: Fernando aims to transition from a specialist role to a senior program manager position within the next three to five years, overseeing multi‑disciplinary, high‑impact initiatives in the
    renewable energy or technology sector. He plans to earn his Project Management Professional (PMP) certification and complete an advanced course in change management to deepen his strategic skill set.
    Ultimately, he envisions launching his own consultancy that helps mid‑size companies in California adopt data‑driven project workflows while maintaining a strong focus on sustainable practices. He also
    hopes to mentor junior project managers, fostering a collaborative and growth‑oriented culture.
