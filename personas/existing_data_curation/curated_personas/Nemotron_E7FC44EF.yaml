personas:
  professional: An aspiring multimedia creator, Skyler Hamed blends sketching, digital illustration, acoustic guitar, and beginner-level programming to craft concept art and interactive storytelling, while
    their spontaneous, improvisational workflow and strong empathy help them thrive in collaborative school projects but often clash with tight deadlines.
  sports: A seasonal athlete and dedicated fan, Skyler Hamed plays intramural soccer in the fall and joins a local skateboarding club during summer afternoons, while cheering for the LSU Tigers football
    team each Saturday and following the New Orleans Pelicans' NBA season, and occasionally attends Baton Rouge Rougarou baseball games to satisfy their love of community sports.
  arts: A devoted art aficionado, Skyler Hamed immerses themselves in Baton Rouge's street‑art murals, draws inspiration from the bold graphics of Shepard Fairey and the dreamy lyricism of Bon Iver, frequently
    performs original songs at open‑mic nights echoing the storytelling of Bob Dylan and Joni Mitchell, and collects limited‑edition prints by Japanese illustrator Yoshitaka Amano.
  travel: A flexible explorer, Skyler Hamed loves spontaneous road trips to nearby New Orleans for its music festivals and sunrise shoots along the Gulf Coast, dreams of photographing the lavender fields
    of Provence and cherry blossoms in Kyoto, but budget constraints keep most international travel limited to school‑organized cultural exchanges and occasional family vacations to Atlanta.
  culinary: A budding home‑chef with a palate for comfort and experimentation, Skyler Hamed enjoys whipping up avocado toast with smoked salmon, perfecting a Cajun jambalaya with andouille sausage, and
    savoring beignets dusted with powdered sugar, while their favorite dish to photograph is a colorful poke bowl featuring ahi tuna and mango.
  core: Skyler Hamed is a creatively restless teen who blends art, music, and tech, navigates anxiety with meditation, and lives on a budget that swings between thriftiness and impulsive art‑splurges.
background:
  cultural: Skyler grew up in a middle‑class white family in Baton Rouge, where Southern hospitality, Cajun and Creole influences, and a strong community spirit shape daily life. His family celebrates traditional
    Southern holidays, enjoys Louisiana cuisine such as gumbo and po’boys, and participates in local festivals like Mardi Gras and the Baton Rouge Blues Festival. Although his heritage is primarily Anglo‑American,
    the multicultural environment of the city exposes him to French‑Canadian, African‑American, and Hispanic cultural elements, which he absorbs through music, food, and regional art. This blend of Southern
    roots and the vibrant cultural mosaic of East Baton Rouge Parish informs his appreciation for eclectic artistic expression.
attributes:
  skills: '[''Sketching and digital illustration'', ''Basic photography'', ''Acoustic guitar playing'', ''Introductory Python coding'', ''HTML/CSS website creation'', ''Creative writing (poetry and short
    stories)'', ''Empathetic listening and peer mediation'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Photography'', ''Acoustic guitar'', ''Creative writing (poetry, short stories)'', ''Attending open‑mic and local art events'', ''Playing
    narrative‑driven indie video games'', ''Tinkering with Arduino/robotics projects'', ''Journaling and mindfulness meditation'']'
  career_goals: Skyler hopes to turn his artistic passions into a sustainable career that allows freedom and creativity. He aims to build a strong portfolio of digital art and illustration, eventually freelancing
    as a graphic designer or concept artist for games or indie films. He is also interested in pursuing an apprenticeship in multimedia production or a community‑college program in visual arts while continuing
    to develop his coding skills to create interactive media. Long‑term, he envisions a role that blends art and technology, such as a UI/UX designer or digital storyteller, giving him the flexibility to
    set his own schedule and avoid overly rigid environments.
