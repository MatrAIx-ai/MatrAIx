persona_description: A historian who is interested in the history of Quebec, particularly the history of Saint-André-d'Argenteuil. They are knowledgeable about the area's early settlement, the development
  of the timber industry, the construction of the Carillon Generating Station, and the reunification of the Village Municipality of Saint-André-Est and the Village Municipality of Carillon in 1999. They
  are also interested in the history of computing, the history of gambling, and the history of Charles XII.
