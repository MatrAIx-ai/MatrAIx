personas:
  professional: Barbara Oakes is a meticulous home manager poised to become a Certified Nursing Assistant, channeling years of budgeting, DIY repairs, and caregiving instincts into a competitive yet practical
    pursuit of certification, and they balance curiosity for new medical techniques with a reliable, organized approach to family responsibilities.
  sports: Barbara Oakes cheers for the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks, jogs the neighborhood park with their dog each morning, plays in a local women's softball league during spring,
    and they prefer low‑impact workouts like yoga, balancing a competitive spirit with practical time constraints.
  arts: Barbara Oakes sings in the church choir performing works by Mahalia Jackson and Kirk Franklin, devours Agatha Christie mysteries, and binge‑watches cooking shows hosted by Ina Garten and Samin Nosrat,
    and they let the melodies and narrative twists inspire both their scrapbook creations and experimental recipes.
  travel: Barbara Oakes enjoys weekend drives to nearby botanical gardens and historic towns like Savannah, dreams of a culinary tour through Provence, but they plan trips around family schedules and a
    modest budget, often securing deals through credit‑card points and staying in affordable Airbnbs.
  culinary: Barbara Oakes masters Southern comfort food, perfecting fried chicken with buttermilk brine, collard greens simmered with smoked ham hocks, and pecan pie, while also crafting strawberry‑basil
    preserves and experimenting with Thai coconut‑curry sauce flavored with lemongrass and kaffir lime, and they relish blending practical homegrown ingredients with adventurous flavor gambits.
  core: Barbara Oakes, a 41‑year‑old garden‑loving aspiring CNA, balances competitive ambition with a pragmatic love of mystery novels and cooking experiments, yet they sometimes forget to take blood‑pressure
    meds when absorbed in a new recipe.
background:
  cultural: Barbara is a white Texan rooted in the South Houston community of Harris County. Her upbringing reflects Southern hospitality, a strong emphasis on family and church life, and an appreciation
    for Texan culinary traditions such as barbecue and Tex‑Mex flavors. Living in a multicultural area, she is accustomed to interacting with diverse neighbors, especially of Hispanic background, which
    subtly influences her cooking and community involvement. Her values combine modest, middle‑class sensibilities with a pragmatic, self‑reliant mindset shaped by the region's blend of Southern tradition
    and modern suburban life.
