  hobbies: '[''Trivia Nights'', ''Reading Marathon'', ''Biking on Local Trails'', ''Photography of Industrial Architecture'', ''Book Club Participation'', ''Live Blues and Country Concerts'', ''Harmonica
    Playing'', ''Gardening'', ''Backyard Barbecuing'', ''Collecting Vintage Postcards'', ''Local History Exploration'', ''Potluck Hosting'']'
  career_goals: Terrence aims to secure a contract with a major publishing house for a historical novel set in the Mississippi River Valley, thereby amplifying Midwestern working‑class voices. He plans
    to launch an annual regional literary festival in Collinsville that brings together emerging writers and established authors, positioning himself as a cultural catalyst. A parallel goal is to publish
    a memoir series reflecting his personal journey through divorce, career pivots, and community activism, with an eye toward adapting the material into a podcast or screen production. He also seeks a
    recurring column in a regional newspaper that blends local history with contemporary commentary, and he hopes to mentor younger writers through weekly workshops and a practical guidebook on writing
    for non‑academics.
