persona_description: A conservation biologist who specializes in the study of freshwater fish and their habitats, particularly the lower American River. This person is responsible for implementing the right
  flow regime to ensure the health and survival of the 43 species of fish inhabiting the river. They are committed to developing and implementing a rigorous flow management standard that balances the needs
  of the fishery with the needs of local water supply reliability and environmental protection. This person is skilled in adapting to changing conditions and is constantly seeking ways to improve salmonid
  habitat and water temperature, as well as protecting Folsom Reservoir levels.
