  career_goals: Kevin aims to become a Certified Public Accountant and eventually move into a senior audit manager role where he can lead a small, close‑knit team focused on nonprofit and community‑based
    clients. He is interested in expanding his expertise in sustainability accounting and fraud detection to better protect the organizations he serves. Long‑term, he hopes to mentor younger accountants,
    develop a workplace culture that balances structure with supportive collaboration, and achieve a healthier work‑life balance that reduces his stress while allowing him to contribute meaningfully to
    his community.
