  hobbies: '[''Hiking'', ''Live music concerts'', ''Art gallery visits'', ''Street photography'', ''Ukulele playing'', ''Cooking (Vietnamese and Hawaiian fusion)'', ''Volunteer community events'', ''Exploring
    coffee shops'', ''Indie film watching'', ''Reading (art, history)'']'
  career_goals: Hong aims to transform his passion for community art and cultural exchange into a full‑time role as a community arts coordinator or freelance creative consultant. He envisions establishing
    a small nonprofit space in Aiea that offers workshops in photography, traditional cooking, and cross‑cultural storytelling. To solidify his expertise, he plans to pursue an associate’s degree in arts
    administration or hospitality management. In the longer term, Hong aspires to become a recognized cultural liaison who curates multicultural festivals, leads guided cultural tours, and helps integrate
    the Vietnamese diaspora with the broader Hawaiian community, thereby fostering greater cultural understanding and appreciation.
