  career_goals: Robert dreams of becoming a firefighter because he admires the bright trucks and wants to help people in emergencies. He also pretends to be a doctor, caring for his stuffed animals, reflecting
    his desire to heal and support others. Occasionally, he speaks about being an astronaut, fascinated by space and exploration. In the short term, he takes pride in being a "big helper" at home—setting
    the table, feeding the family pet, and tidying his room—showcasing his practical mindset and love for structured responsibilities.
