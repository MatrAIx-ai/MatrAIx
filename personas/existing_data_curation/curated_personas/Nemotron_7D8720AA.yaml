personas:
  professional: Juan Gleason, a veteran elementary and middle‑school language arts teacher, leverages two decades of data‑driven lesson planning and tech‑savvy classroom management to drive literacy improvements
    while spearheading extracurricular programs like debate club, all with a competitive eye toward district‑wide instructional leadership.
  sports: Juan Gleason competes in a local recreational basketball league, follows the Oklahoma City Thunder and Arkansas Razorbacks, hikes the Ouachita Trail in the spring, and joins a weekend fishing
    club on Lake Ouachita, blending competitive team play with solitary outdoor pursuits.
  arts: Juan Gleason performs in a community theater troupe, strums guitar at jam sessions that often cover Bob Dylan and The Avett Brothers, and discusses historical nonfiction works by David McCullough
    and Doris Kearns Goodwin in a book club, weaving artistic expression into a love for narrative history.
  travel: Juan Gleason plans meticulously for weekend getaways to Hot Springs National Park and the Grand Canyon, dreams of tracing ancestral roots in the Scottish Highlands, and balances travel ambition
    with a mid‑life budget by leveraging airline points and preferring modest Airbnb stays.
  culinary: Juan Gleason favors Arkansas‑style smoked catfish, black‑eyed peas, and sweet‑potato cornbread, regularly cooks on a backyard grill using locally sourced honey and fresh herbs gathered on hikes,
    though they admit a habit of over‑seasoning to mask occasional burnt edges.
  core: Juan Gleason is a structured, community‑driven educator who mixes competitive drive with a love for history, music, and the outdoors, while occasionally juggling a coffee‑filled work schedule and
    a penchant for over‑seasoned meals.
background:
  cultural: Juan grew up in the American Midwest before settling in Owasso, Oklahoma, and identifies with a white American heritage rooted in Midwestern values of hard work, community involvement, and pragmatic
    problem‑solving. His humanities education and long‑term residence in Oklahoma have deepened his appreciation for the state’s rich Native American history and the cultural diversity of Rogers County,
    influencing both his teaching perspective and his active participation in local cultural events.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Curriculum development'', ''Differentiated instruction'', ''Assessment design'', ''Educational technology integration'', ''Student mentorship'',
