  hobbies: '[''Community theater'', ''Guitar playing'', ''Historical nonfiction reading'', ''Hiking'', ''Fishing'', ''Adult book club'', ''Recreational basketball'', ''Youth mentorship volunteering'', ''Genealogy
    research'', ''Local history tours'']'
  career_goals: Juan aims to transition into a district‑wide instructional leadership role, such as curriculum coordinator or instructional coach, where he can shape literacy initiatives and professional
    development programs. He plans to earn a master's degree in Educational Leadership within the next three years, author a middle‑school literature guide, and eventually mentor novice teachers. His competitive
    drive motivates him to improve standardized test performance across his schools while preserving a supportive, structured learning environment.
