personas:
  professional: An experienced diesel technician, Maria Korte leverages over three decades of heavy‑duty truck and equipment maintenance expertise to mentor apprentices, streamline shop workflows, and pursue
    ASE Master Technician and Cummins Certified Diesel Technician credentials, all while championing a data‑driven maintenance tracking system that reflects their love of structure, hands‑on problem solving,
    and community service.
  sports: Maria Korte combines a love of the outdoors with low‑impact fitness, spending Saturday mornings fishing on Lake Willow with their husband while cheering on the local high school football team
    and the regional minor‑league baseball club the Riverbend Raptors; as a member of the Classic Truck Enthusiasts Club, they also join the community’s seasonal softball league in spring, balancing competitive
    play with social camaraderie.
  arts: Maria Korte finds creative release in folk music and community theater, often humming Johnny Cash ballads while kneading rosemary‑infused sourdough and attending the county’s annual production of
    'Our Town' starring local actors, and they cherish the paintings of regionalist artist Grant Wood, which inspire the garden’s layout and the rustic aesthetic of their workshop.
  travel: Maria Korte favors road‑trip adventures that blend relaxation and service, having driven historic Route 66 to the Grand Canyon and Napa Valley vineyards, they now dream of a pilgrimage to the
    Tuscan countryside to study traditional olive‑oil production, yet their travel plans remain anchored by budget constraints and the desire to keep weekend fishing trips with their husband.
  culinary: Maria Korte’s culinary repertoire centers on hearty, home‑grown meals—baking crusty sourdough bread infused with rosemary, simmering a tomato‑and‑bean stew harvested from their garden, and grilling
    fresh lake trout seasoned with lemon and dill—though they sometimes over‑salt dishes in an effort to mask the lingering taste of joint‑pain medication.
  core: Maria Korte is a pragmatic diesel expert who balances meticulous shop leadership, community devotion, and occasional impulsive splurges, all while navigating hypertension, a love for folk tunes,
    and a tireless pursuit of weekend fishing serenity.
background:
  cultural: Maria grew up in a small town in Iowa, raised by parents of German‑American descent who emphasized hard work, reliability, and community involvement. Her upbringing in the Midwest instilled
    values of practicality, self‑reliance, and a strong sense of neighborly support. She maintains close ties to local traditions, such as county fairs and church gatherings, and her cultural identity blends
    a modest Protestant heritage with the broader American rural ethos.
attributes:
  skills: '[''Diesel engine repair'', ''Hydraulic and pneumatic system troubleshooting'', ''Preventive maintenance scheduling'', ''Welding and metal fabrication'', ''Diagnostic software operation'', ''Technical
    manual and blueprint interpretation'', ''Safety compliance and OSHA standards'', ''Inventory management'', ''Apprentice mentorship'', ''Team coordination'']'
  hobbies: '[''Church outreach potluck events'', ''Backyard vegetable gardening'', ''Classic truck enthusiast club participation'', ''Weekend fishing trips'', ''Baking bread and pies'', ''Volunteering with
    the county 4‑H program'']'
  career_goals: Maria aims to become the shop foreperson at her current service center, overseeing workflow and implementing a data‑driven maintenance tracking system to reduce downtime. She plans to earn
    an ASE Master Technician certification and a Cummins Certified Diesel Technician credential within the next two years. Additionally, she wishes to start a small side venture offering mobile on‑site
    equipment repairs for local farms, allowing her to blend her technical expertise with her desire to serve the community while maintaining a balanced schedule.
