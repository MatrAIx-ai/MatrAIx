  hobbies: '[''Weight lifting'', ''Trail running'', ''Fishing'', ''Classic rock music'', ''Chicago Cubs fandom'', ''Mentoring fire explorers'', ''Restoring classic automobiles'', ''Reading non‑fiction (history,
    leadership)'']'
  career_goals: Antony aims to advance to a fire lieutenant role within the next five years, pursuing additional certifications such as Fire Officer I & II, paramedic training, and advanced hazardous‑materials
    response. He plans to obtain a bachelor's degree in fire science or public administration to broaden his leadership qualifications. Long‑term, he envisions becoming a fire captain or chief, shaping
    departmental policy, and establishing a community fire safety education program that partners with local schools and civic groups.
