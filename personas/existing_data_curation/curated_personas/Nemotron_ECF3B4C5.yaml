  hobbies: '[''Hiking in the Cascades'', ''Fishing in the Stillaguamish River'', ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Building DIY wooden furniture'', ''Tinkering with electronics
    kits'', ''Watching Mexican soccer (Liga MX)'', ''Reading non‑fiction science books'', ''Participating in community cultural festivals'']'
  career_goals: Luciano aims to earn an ASQ Certified Quality Inspector credential within the next two years and to move into a supervisory role where he can lead a team of inspectors, drive continuous‑improvement
    initiatives, and mentor new hires. He plans to pursue an associate degree in industrial technology to deepen his analytical skills and eventually transition into a quality engineering position. Long‑term,
    he envisions leveraging his practical experience to consult for small manufacturers on lean processes while maintaining a stable role that supports his financial independence.
