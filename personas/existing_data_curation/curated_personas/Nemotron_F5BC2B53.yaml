personas:
  professional: An aspiring young comic artist, Teresa Behbahani (8) channels her boundless curiosity and love for bright colors into sketching characters from adventure picture books, building intricate
    LEGO scenes as storyboards, and experimenting with tablet‑based animation tools to bring her whimsical narratives to life, often juggling schoolwork with her creative projects in a delightfully disorganized
    but enthusiastic way.
  sports: An energetic soccer enthusiast, Teresa Behbahani dashes around the local community field every Saturday with her friends, cheering for the New York City FC kids team, and complements her footwork
    with weekly dance bursts to pop hits from Ariana Grande, all while occasionally joining a city‑wide “Kids’ Marathon” that offers a fun, low‑pressure way to stay active.
  arts: A vibrant budding illustrator, Teresa Behbahani spends afternoons at the Brooklyn Botanic Garden sketching blooming flowers, revels in the street art festival’s kaleidoscopic murals by artists like
    Banksy and Keith Haring, and devours the animated worlds of Studio Ghibli’s “My Neighbor Totoro” and Disney’s “Moana,” often recreating these scenes with her own twist in comic strips.
  travel: An inquisitive explorer, Teresa Behbahani has trekked through the seasonal displays at the Brooklyn Botanic Garden, taken a weekend family trip to Coney Island’s amusement park, and dreams of
    visiting Tokyo’s teamLab Borderless museum to experience immersive light art, balancing her childhood budget constraints with a vivid imagination that turns a backyard picnic into a grand adventure.
  culinary: A lively little chef, Teresa Behbahani loves constructing rainbow fruit kebabs with strawberries, blueberries, and kiwi, perfecting pancake art shaped like her favorite superhero characters,
    and eagerly indulges in cheesy pizza slices topped with extra mozzarella, yet she sometimes forgets to finish vegetables, bargaining with her parents for an extra scoop of ice cream as a trade‑off.
  core: Teresa Behbahani, an eight‑year‑old whirlwind of curiosity and color, merges sketching, LEGO storytelling, and soccer kicks into a delightfully chaotic yet heartfelt quest for creativity, often
    worrying about perfection while sprinkling laughter and bright ideas wherever she goes.
background:
  cultural: Teresa is a White American child raised in the vibrant, multicultural neighborhood of Brooklyn, New York. Her daily life is shaped by the eclectic mix of cultures that surround her—street murals
    inspired by hip‑hop and Latin rhythms, community festivals featuring Caribbean music, and the diverse foods from food trucks lining her block. While her family celebrates classic American holidays like
    Thanksgiving and Christmas, they also occasionally share traditions linked to her surname's Persian roots, such as enjoying aromatic rice dishes at family gatherings. This blend of urban New York energy
    and subtle heritage influences has cultivated in Teresa an openness to varied experiences, a love for artistic expression, and a deep appreciation for the cultural mosaic of her community.
