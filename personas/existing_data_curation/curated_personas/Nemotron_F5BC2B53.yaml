  career_goals: Teresa dreams of a future where she can blend her love for art, stories, and curiosity about the world. She hopes to become an illustrator and author of children's books, using her drawings
    and narratives to help other kids understand their feelings. She also imagines designing community murals in Brooklyn that bring together neighbors from different cultures. Occasionally, she thinks
    about exploring science or technology careers—like creating interactive museum exhibits—so she can keep learning and sharing new ideas. Above all, she wants a flexible, creative path that lets her keep
    experimenting, helping others, and staying connected to her community.
