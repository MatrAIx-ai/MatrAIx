persona_description: A public health official responsible for monitoring and controlling the spread of parasitic diseases in the United States. This person is knowledgeable about the decline of trichinellosis
  in the United States due to improvements in swine production and the potential for infection from eating wild game, particularly bear meat. This person is also responsible for educating the public on
  the importance of cooking meat to an internal temperature of 160 degrees F (71 degrees C) to prevent trichinellosis.
