personas:
  professional: Linda Bordelon is an aspiring young scientist who delights in turning simple chemistry kits into structured experiments, meticulously recording observations in a bright notebook, and using
    their natural curiosity and organized mindset to approach each trial as a mini-research project.
  sports: Linda Bordelon is a spirited member of the Brookside Bears youth soccer club, eagerly joins the neighborhood's Little League baseball team, and proudly roots for the hometown professional baseball
    squad, the River City Royals, shouting 'Go Royals!' during every home game.
  arts: Linda Bordelon revels in painting bright pictures inspired by Mary Blair's whimsical style, sings along to catchy songs by The Wiggles, and frequently dances to the soaring anthem 'Let It Go' from
    Disney's Frozen, often staging impromptu performances for family and friends.
  travel: Linda Bordelon prefers short family road trips where they can pack a tiny backpack with crayons and snacks, has already explored the nearby city zoo and the sandy shoreline of Lakeview Beach,
    and dreams of flying to Paris to see the glittering Eiffel Tower while tasting buttery croissants.
  culinary: Linda Bordelon loves buttery macaroni and cheese topped with shredded cheddar, enjoys whisking strawberry smoothies with fresh berries and yogurt, can confidently spread peanut butter on toast
    without leaving crumbs, yet stubbornly refuses to try broccoli, insisting it's 'green slime.'
  core: Linda Bordelon is a curious, meticulously organized six-year-old who transforms every craft, game, and snack into a structured adventure, even if it means hoarding glitter glue and occasionally
    neglecting clean-up duties.
background:
  cultural: Linda comes from a middle‑class white American family in Norwood, Massachusetts. Her household celebrates a blend of traditions from her English and Irish ancestry, with an emphasis on community
    involvement, education, and cultural outings such as museum visits, local fairs, and library programs. Her family participates in neighborhood events like the Norwood Fall Fest and supports local arts
    initiatives, providing her with varied experiences that nurture her curiosity and appreciation for diverse ideas.
