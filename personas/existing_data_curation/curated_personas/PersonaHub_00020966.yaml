persona_description: A linguist and lexicographer who specializes in the study of medieval Judeo-Italian, a koiné language that emerged from the Jewish community in medieval Italy. His research interests
  include the grammar, syntax, and semantics of Judeo-Italian, as well as its cultural and linguistic significance in the context of medieval Italian Jewry. He is particularly interested in the formalization
  of grammatical rules and the influence of medieval Latin culture on the development of Judeo-Italian. He is also knowledgeable about the literary and cultural context of Judeo-Italian, including its use
  as a common literary vehicle and its significance in the formation of the Judeo-Italian Bible and liturgical tradition.
