personas:
  professional: Satish Patel, a budding UX/UI designer interning at a Philadelphia startup, channels a curious, spontaneous mindset and sharp analytical edge into crafting interactive prototypes inspired
    by street photography and avant‑garde jazz, yet they still battle the need for tighter deadline management.
  sports: Satish Patel, who follows the Philadelphia Eagles, Phillies, and 76ers with fervent loyalty, joins a local pick‑up basketball league on weekends and practices yoga in the park to balance their
    competitive streak with a need for stress‑reduction.
  arts: Satish Patel, an avid explorer of contemporary art, curates experimental jazz playlists featuring Kamasi Washington and Sun Ra while they frequent the Philadelphia Museum of Art and capture urban
    street scenes influenced by the works of Banksy and Vivian Maier.
  travel: Satish Patel, a spontaneous traveler, prefers weekend trips to New York City for its gallery openings and plans a future solo adventure to Tokyo to immerse in emerging tech culture, all while
    managing a student budget that limits longer vacations.
  culinary: Satish Patel, a creative home cook, blends traditional butter chicken and chaat with fusion twists like masala tacos, delighting friends with dishes spiced with turmeric, cumin, and cilantro,
    though they occasionally over‑salt recipes in a quest for bold flavor.
  core: Satish Patel, a 20‑year‑old visual storyteller, balances relentless curiosity and competitive drive with spontaneous creativity, all while wrestling with stress‑induced worry and a penchant for
    impulsive spending.
background:
  cultural: Satish is a second‑generation Indian American of Gujarati descent. He grew up in a close‑knit household that celebrates Diwali, Navratri, and Holi, speaking Gujarati with his parents while using
    English at school. The family places strong emphasis on education, respect for elders, and community service, reflected in his regular participation at the local Hindu temple and cultural festivals
    in Media, PA. While rooted in traditional Indian values, Satish embraces a bicultural identity, blending his heritage with the diverse, artistic atmosphere of the Philadelphia suburbs and the broader
    American pop culture.
attributes:
  skills: '["Digital illustration (Adobe Photoshop, Illustrator)", "Photography and photo editing (Adobe Lightroom)", "Video editing (Adobe Premiere Pro)", "Front‑end web development (HTML, CSS, JavaScript)",
