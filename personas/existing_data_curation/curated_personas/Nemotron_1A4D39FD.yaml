  hobbies: '["Visiting contemporary art galleries and museums", "Digital sketching and illustration", "Street photography", "Listening to experimental jazz and curating playlists", "Reading philosophy,
    science‑fiction, and tech articles", "Meditation and journaling for stress management", "Cooking Indian and fusion cuisine", "Improvisational theatre workshops", "Volunteering for youth art programs"]'
  career_goals: Satish aims to channel his passion for visual storytelling into a career as a UX/UI designer or creative director at an innovative startup where he can blend art and technology. He plans
    to complete a bachelor's degree in Visual Communication within the next two years while building a freelance portfolio of branding, illustration, and interactive prototypes. Long‑term, he dreams of
    founding a boutique design studio that produces socially conscious campaigns and collaborates with artists worldwide. Recognizing his stress sensitivity, he intends to improve his organizational and
    deadline‑management skills through structured coursework and mentorship, allowing him to meet professional expectations without sacrificing his creative spontaneity.
