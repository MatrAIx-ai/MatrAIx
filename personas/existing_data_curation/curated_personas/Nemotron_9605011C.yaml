  career_goals: Venessa dreams of finishing middle school with strong grades and then pursuing a career that lets her combine her love for learning, helping others, and creativity. She is fascinated by
    science and nature, so she hopes to become an environmental scientist or a teacher who can inspire young students to explore the natural world. She also imagines participating in community projects
