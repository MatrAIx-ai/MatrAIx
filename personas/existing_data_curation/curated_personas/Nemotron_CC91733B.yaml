    market analysis'']'
  hobbies: '[''Visiting contemporary art galleries and street‑mural tours'', ''Cooking and perfecting Salvadoran dishes such as pupusas and tamales'', ''Photography, especially urban and documentary subjects'',
    ''Hiking in Prince William Forest Park'', ''Reading non‑fiction on innovation, business strategy and art history'', ''Listening to Latin jazz and cumbia'', ''Participating in small‑group soccer matches
    with the local Salvadoran community'']'
  career_goals: Lazaro aims to advance to a regional sales manager position within the next three to five years, overseeing a small team and expanding his company's footprint into Central American markets
    by leveraging his bilingual abilities. He plans to complete a bachelor's degree in Business Administration and obtain a Certified Professional Sales Person (CPSP) credential to reinforce his expertise.
    Long‑term, he envisions launching a consultancy that helps small manufacturers adopt modern sales strategies, while also mentoring junior reps and speaking at industry conferences about innovative,
    cross‑cultural sales practices.
