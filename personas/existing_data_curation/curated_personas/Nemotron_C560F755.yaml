  hobbies: '[''Hiking in the Medicine Bow Mountains'', ''Horseback riding'', ''Volunteer science outreach for schools'', ''Organizing health-fair booths at Cheyenne Frontier Days'', ''Hosting dinner parties'',
    ''Playing piano'', ''Reading popular science books'', ''Participating in a local book club'', ''Gardening'']'
  career_goals: Laura aims to lead a translational research program that develops low-cost diagnostic tools for infectious diseases prevalent in rural Wyoming and similar communities. She aspires to become
    a senior principal scientist, fostering a collaborative environment where junior researchers are empowered to explore innovative ideas while maintaining practical pathways to implementation. Over the
    next decade she envisions partnering with state health agencies and local biotech startups to bridge the gap between academic research and public health impact, and eventually establishing a small venture
    focused on accessible health technologies.
