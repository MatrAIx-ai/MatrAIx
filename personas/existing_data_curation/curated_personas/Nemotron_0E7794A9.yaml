  career_goals: Mackenzie is intent on re‑entering the professional sphere by securing a remote data analyst or research associate position that leverages her analytical strengths while allowing flexible
    hours to manage personal stress. She plans to obtain a professional certification in project management (PMP) within the next year to broaden her managerial prospects. In parallel, she aims to launch
    a small consultancy that provides data‑driven sustainability assessments and solar‑energy retrofits for local farms in Kern County. Her long‑term ambition is to become a senior analyst or project lead
    in an organization focused on environmental technology, achieving both financial stability and the ability to influence sustainable practices in her community.
