  hobbies: '["Drawing and painting", "Building with Duplo bricks", "Pretend storytelling with stuffed animals", "Singing and dancing", "Participating in preschool group games", "Exploring parks and tide
    pools", "Listening to picture‑book audio stories", "Collecting stickers and achievement charts", "Simple color‑mixing science experiments"]'
  career_goals: Laura often shares her dreams of becoming an artist who paints huge murals, an astronaut who explores distant planets, or a teacher who helps other children learn. She wants to be known
    for her creativity, curiosity, and ability to bring people together, and she already sets high standards for herself, hoping to master new skills quickly and excel in whatever path she eventually chooses.
