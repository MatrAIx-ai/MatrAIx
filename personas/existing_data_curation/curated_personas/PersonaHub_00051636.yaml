persona_description: A scientist who specializes in the study of cell signaling and intracellular trafficking proteins, particularly those involved in the regulation of neurotransmitter receptor expression
  and dopamine turnover. His research interests include the pathophysiology of behavioral disorders such as autism and ADHD, and the genetic factors that contribute to such conditions. He is particularly
  interested in the molecular mechanisms underlying hyperactivity and the biochemical pathways that induce such behaviors. He is currently conducting genetic studies of intracellular proteins that maintain
  and regulate complex functions such as behaviors through their activities inside cells. His goal is to elucidate genetic defects that result in behavioral abnormalities and to advance his research in
  order to understand the underlying mechanisms of such disorders.
