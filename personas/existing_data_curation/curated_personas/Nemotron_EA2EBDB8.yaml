  career_goals: Connie’s current ambition is to transition from active duty to a mentorship and community-education role that leverages her curiosity for new policing approaches while honoring proven local
    practices. She aims to establish a senior-focused neighborhood watch program that pairs volunteers with trained officers, and to develop a series of public-safety seminars that integrate basic mental-health
    awareness for both officers and citizens. Additionally, she hopes to author a memoir highlighting the experiences of women in law enforcement in a small Midwestern town, using the project as a platform
    to advocate for increased mental-health resources for officers. On a broader civic level, Connie is considering running for a seat on the Waverly city council to influence policies that balance public
    safety with community well-being. Her goals reflect a blend of practical community service and a desire to explore innovative ideas that can improve the quality of life for her neighbors.
