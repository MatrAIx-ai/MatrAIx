persona_description: A group of post-graduate philosophers who were interested in the idea of developing a moral philosophy that included non-humans, particularly the novelists Brigid Brophy and Stephen
  R. L. Clark. They co-operated in this cause and helped to formulate a counter-position, engaging in political activism too, writing and handing out leaflets protesting against animal testing and hunting.
  Two of its members, Richard D. Ryder and Andrew Linzey, organized the Cambridge Conference on Animal Rights at Trinity College, Cambridge in 1977, the first international conference devoted explicitly
  to animal rights.
