  hobbies: '[''Recreational volleyball'', ''Pick‑up basketball'', ''Gulf Coast fishing'', ''Line dancing'', ''Cooking Texas BBQ'', ''Backyard gardening'', ''Coaching youth sports'', ''Reading biographies'',
