persona_description: A medical historian who specializes in the study of Jewish medical contributions to medicine in the pre-World War II era, particularly in Russia, Poland, and South America. His research
  interests include the development and achievements of Jewish medical scientists, the demographic and political consequences of Jewish participation in medicine, and the impact of World War I, the Russian
  Revolution, and the Balfour Declaration on Jewish participation in medicine. He is also interested in the contributions of Jewish medical scholars to the Western world and the isolation of Russian Jewry
  from the Western world.
