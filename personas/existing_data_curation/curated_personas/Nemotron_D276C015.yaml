personas:
  professional: Rowena Pulice is an aspiring teenage robotics hobbyist who blends their love of strategy‑packed multiplayer games with hands‑on building and programming of small Arduino‑based bots, applying
    a practical, curiosity‑driven approach to troubleshoot problems while casually juggling school projects and a messy desk.
  sports: Rowena Pulice roams the local soccer field with the Clermont Youth Soccer Club, cheers on FC Cincinnati during the MLS season and keeps a skateboard stashed at the neighborhood skate park, yet
    their competitive streak sometimes leads them to skip warm‑ups and push through minor injuries.
  arts: Rowena Pulice revels in digital art inspired by creators like Loish and Bee Bee Bee, sketches mystery‑plot twists in a battered journal while listening to Billie Eilish’s alt‑pop tracks, and spends
    evenings binge‑watching Hayao Miyazaki films for storytelling ideas.
  travel: Rowena Pulice’s travel style mixes impromptu weekend trips to Hocking Hills State Park and annual family road‑trips to the nearby Ohio State Fair, while they daydream about a future visit to Tokyo’s
    Akihabara district to soak up the tech‑culture and arcade scene.
  culinary: Rowena Pulice prefers the comfort of pepperoni pizza and buttery popcorn at the county fair, but they also experiment with simple kitchen projects like perfecting a golden‑crust mac and cheese
    or whipping up a batch of chocolate‑chip cookies using a basic recipe they found on a teen cooking blog.
  core: Rowena Pulice is a curiosity‑driven, competitively charged 13‑year‑old whose love for robotics, gaming, and skateboarding is balanced by a laid‑back approach to planning, a penchant for forgetting
    chores, and a habit of hoarding spare change for future tech projects.
background:
  cultural: Rowena grew up in Batavia, a small community in Clermont County, Ohio, immersed in Midwestern values of neighborliness, self‑reliance, and a strong connection to local traditions such as county
    fairs and community sports. Her family’s heritage includes Northern European (German and Irish) roots, which influence occasional holiday customs and a respect for familial gatherings. The region’s
    emphasis on public school events, local libraries, and youth clubs provides her with avenues to explore both academic interests and recreational activities, while her environment encourages practical
    problem‑solving and an appreciation for both new ideas and time‑tested methods.
