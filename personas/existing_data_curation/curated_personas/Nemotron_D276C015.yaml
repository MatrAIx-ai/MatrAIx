  career_goals: Rowena envisions a future where she can blend curiosity with practical impact. She aspires to become a robotics engineer or a product designer, creating devices that solve everyday problems.
    She is also intrigued by environmental science, imagining a role that lets her develop sustainable tech solutions for her community. Though still young, she aims to keep her education flexible, seeking
    mentorships, summer STEM camps, and project‑based learning opportunities that align with her competitive drive and love for tangible results.
