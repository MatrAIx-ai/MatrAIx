  career_goals: As an 84‑year‑old, Sharon’s ambitions center on personal enrichment and legacy. She hopes to deepen her knowledge of visual art by attending regional museum tours and taking occasional watercolor
    workshops. She wishes to compile a family memoir that weaves together stories, photographs, and genealogical findings, preserving her heritage for future generations. Sharon also aspires to remain an
    active, supportive presence for her spouse and local friends, offering her experience in organizing small community events and volunteering at the senior centre. Finally, she seeks to maintain her emotional
    well‑being through regular gardening, mindfulness journaling, and occasional visits to her church group, aiming to stay curious and engaged despite the challenges of advancing age.
