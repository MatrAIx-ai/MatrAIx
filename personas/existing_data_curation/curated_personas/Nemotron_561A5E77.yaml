  career_goals: Ramiro aims to complete a bachelor's degree in Computer Science or Information Systems within the next three years, focusing on projects that combine technology with social impact. He envisions
    starting his career as a junior software developer or data analyst at a company that values collaboration, continuous learning, and culturally inclusive products. Simultaneously, he intends to use his
    bilingual abilities to develop digital tools that serve Spanish-speaking communities in the Pacific Northwest, such as language-learning apps or community resource platforms. Over the medium term, he
    hopes to lead cross-functional teams, integrating data-driven decision-making with community-focused initiatives. Ultimately, Ramiro aspires to launch a social-tech venture that addresses the digital
    divide among underrepresented groups while maintaining a balanced, pragmatic approach to growth and innovation.
