personas:
  professional: Ramiro Desai, a 20‑year‑old computer science major, blends basic Python and web development expertise with bilingual communication and graphic design skills to create community‑focused digital
    tools, balancing curiosity with practicality while they assertively contribute to collaborative projects.
  sports: Ramiro Desai hikes the Columbia River Gorge with the Columbia River Hiking Club, supports the Seattle Seahawks and Portland Timbers, and stays fit by playing casual basketball at a local community
    center, approaching fitness with a balanced mix of structured training and spontaneous outdoor adventures, and they enjoy the sense of camaraderie these activities foster.
  arts: Ramiro Desai enjoys strumming acoustic guitar while covering songs by José González and Alejandro Fernández, attends local art exhibitions featuring Frida Kahlo reproductions, and draws inspiration
    from the storytelling of Guillermo del Toro's films, weaving these artistic influences into a personal creative expression, and they often share their renditions at community gatherings.
  travel: Ramiro Desai prefers meticulously planned weekend trips to nearby destinations like Portland's Japanese Garden and Seattle's Pike Place Market, while dreaming of a cultural immersion tour of Oaxaca
    and the historic streets of Mexico City, balancing adventure with budget‑conscious spontaneity, and they relish mixing itinerary precision with on‑the‑fly discoveries.
  culinary: Ramiro Desai experiments with traditional dishes such as tacos al pastor, mole poblano, and esquites, adjusting recipes with Pacific Northwest ingredients like smoked salmon and local mushrooms,
    and their intermediate cooking skill shines in casual gatherings where they pair meals with homemade aguas frescas featuring hibiscus and cucumber.
  core: Ramiro Desai is a calm, curiosity‑driven 20‑year‑old who balances tech ambition with community service, occasionally overindulges in late‑night gaming marathons, keeps a tidy budget while perfecting
    tacos, and they manage all this with a side of DSLR adventures.
background:
  cultural: Ramiro's Mexican heritage is a central thread in his identity, shaping his values, worldview, and daily practices. Raised by parents who migrated from Mexico to the United States, he grew up
    bilingual, celebrating traditions such as Dia de los Muertos and family gatherings, while navigating the broader American cultural landscape of the Pacific Northwest. This bicultural upbringing cultivates
    respect for community cohesion, hospitality, and perseverance, and fuels his desire to bridge cultural gaps through technology and service. He regularly participates in local Mexican community events,
    volunteers as a Spanish tutor for recent immigrants, and incorporates Mexican culinary techniques into his cooking. The blend of Mexican familial warmth with the pragmatic, individualistic ethos of
    his American environment informs his balanced personality—curious yet practical, cooperative yet assertive, and calm in the face of challenges.
attributes:
