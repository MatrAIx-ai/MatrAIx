personas:
  professional: A budding architect in training, Dante Loso builds elaborate LEGO cityscapes with tidy grids and whimsical towers, turning the love for structure into a playground for imaginative design
    while their practical focus helps them keep instructions straight, hinting at a future career in design or engineering.
  sports: An eager soccer participant, Dante Loso attends weekly practice with the under‑6 team called the Little Lions, thriving on the predictable drill routines while grabbing moments of free play to
    improvise fun moves, and they proudly cheer for the United States Men's National Soccer Team during big tournaments.
  arts: A creative cartoon enthusiast, Dante Loso sketches vibrant comic strips starring brave animal heroes to process strong feelings, while they sway to country hits like Dolly Parton's ‘Jolene’ during
    family listening sessions and occasionally break into a spontaneous dance in the living room.
  travel: A curious explorer, Dante Loso enjoys family road trips to nearby state parks where they collect smooth rocks and watch insects, yet they also dream of seeing the Grand Canyon’s awe‑inspiring
    vistas one day, balancing comfortable backyard adventures with a yearning for spectacular natural wonders.
  culinary: A budding food adventurer, Dante Loso favors comfort staples like cheesy macaroni, loves dipping chicken nuggets in honey‑mustard, and can name their favorite pizza topping—pepperoni—while they
    sometimes sneak an extra cookie after dinner, revealing a sweet spot for simple flavors and occasional rule‑bending snacks.
  core: A structured yet imaginatively curious six‑year‑old, Dante Loso blends LEGO precision with spontaneous backyard discoveries, feels emotions intensely, and navigates the world through playful design,
    music, and occasional sticky‑fingers for extra treats.
background:
  cultural: Dante is raised in Weatherford, Texas, a small‑town community in Parker County with a blend of West‑Texan, Southern, and Anglo‑American cultural influences. His family celebrates typical regional
    traditions such as community fairs, high‑school football games, and local rodeos, while also observing holidays common in the broader American culture. The neighborhood reflects a mix of rural and suburban
    life, with open spaces for outdoor play and a strong emphasis on family ties and community involvement. The local school emphasizes structured learning, which aligns with Dante’s preference for routine.
    He is exposed to the modest, friendly ethos of the area, and his upbringing includes occasional church attendance and participation in community service activities.
