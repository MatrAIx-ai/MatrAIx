  career_goals: Dante imagines a future where he can help his community in hands‑on ways. He dreams of becoming a firefighter, attracted by the clear structure, teamwork, and the chance to protect others.
    He also expresses a fascination with space, sometimes saying he wants to be an astronaut, reflecting his love for exploring immediate realities through imagination. More immediately, he often says he
    wants to be a "handyman" because he likes fixing toys and helping his dad with small repairs around the house.
