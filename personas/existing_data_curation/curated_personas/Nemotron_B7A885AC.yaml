  hobbies: '[''Abstract Painting'', ''Mixed Media Art'', ''Graphic Design'', ''Reading Speculative Fiction'', ''Philosophy'', ''Yoga'', ''Hiking'', ''Local Art Gallery Visits'', ''Community Theater Workshops'',
    ''Youth Art Mentorship'']'
  career_goals: Jessica aims to advance to a district‑level management role within the next five years, overseeing multiple retail locations in the Mid‑South. She plans to earn a Certified Manager credential
    and deepen her expertise in supply‑chain analytics and digital marketing. Long‑term, she envisions launching her own curated boutique that showcases emerging African‑American artists and designers,
    blending her managerial acumen with her passion for art and novelty. She also aspires to mentor young professionals, particularly women of color, and to develop community‑focused programs that link
    local businesses with cultural events.
