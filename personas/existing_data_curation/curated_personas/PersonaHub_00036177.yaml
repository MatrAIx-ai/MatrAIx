persona_description: A Brazilian agricultural economist who specializes in post-harvest losses and storage capacity in the Brazilian state of Mato Grosso. He is particularly interested in the challenges
  faced by corn and soybean farmers due to the abundance of grain followed by a 10 percent post-harvest loss, partially due to a lack of storage. His research has focused on mapping the coordinates of commercial,
  cooperative, and private grain storage facilities in Mato Grosso using Geographic Information System (GIS) software, and analyzing the potential for succession crop production to mitigate the problem
  of under-capacity storage. His expertise in the field has led him to publish research on the topic in leading agricultural journals and to collaborate with other researchers and government agencies in
  the area.
