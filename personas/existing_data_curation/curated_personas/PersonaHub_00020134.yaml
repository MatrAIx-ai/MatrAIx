persona_description: A French military officer who served in various capacities during World War I, including command of the Fifth Army, Sixth Army, and Tenth Army, and played a key role in the Allied offensive
  campaigns of 1917 and 1918. He was known for his aggressive tactics and his ability to lead his troops in costly but ultimately successful operations. He was also a member of the Rhenish separatist movement
  and was removed from his positions by the French government due to concerns about his political ambitions. After leaving the Rhineland, he returned to active duty in France's African Empire and died there
  in 1925.
