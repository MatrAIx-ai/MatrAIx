personas:
  professional: Jorge Gonzalez is a seasoned landscaper with expertise in low‑maintenance design, irrigation systems, and crew coordination, who blends his practical, structured mindset with a relaxed approach
    to scheduling to mentor new workers and drive community‑focused projects toward a future supervisory role.
  sports: Jorge Gonzalez is a dedicated member of a local recreational soccer league, cheering for the Chicago Fire and the Chicago Cubs while they regularly join community pick‑up games and fit cardio
    sessions into their routine, balancing competition with a love for teamwork.
  arts: Jorge Gonzalez spends quiet evenings immersed in regional Mexican music, favoring artists like Los Tigres del Norte, Vicente Fernández, and Natalia Lafourcade, while also appreciating classic Mexican
    cinema from the Golden Age and occasionally attending local mariachi performances.
  travel: Jorge Gonzalez enjoys weekend road trips to the Great Lakes shoreline and annual visits to Oaxaca for its culinary festivals, while they also dream of exploring the historic streets of Seville,
    Spain, balancing an active travel style with a modest budget that prioritizes family gatherings.
  culinary: Jorge Gonzalez loves to prepare authentic tacos al pastor, hand‑made tamales, and rich mole, often using fresh chiles, corn masa, and locally grown cilantro from their garden, and while they
    excel at cooking for groups, they sometimes forget to refrigerate leftovers promptly.
  core: Jorge Gonzalez blends a structured, eco‑mindful work ethic with a laid‑back social life, mentoring crews, cooking lavish Mexican feasts, and leading community clean‑ups, all while juggling a habit
    of misplacing tools and an almost uncanny calm under pressure.
background:
  cultural: Jorge was raised in a Mexican-American household; his parents immigrated from Jalisco and instilled in him a strong sense of family, hospitality, and cultural pride. He grew up bilingual, speaking
    both Spanish and English, and celebrates traditional holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with a blend of Mexican customs and Midwestern traditions. His Catholic faith,
    community-oriented values, and love for Mexican food shape his daily life. Living in Collinsville, Illinois, he actively participates in the local Mexican community association, helping organize cultural
    events and sharing his heritage with neighbors while also embracing the broader regional culture of the St. Clair County area.
attributes:
  skills: '[''Landscape design'', ''Plant identification and health assessment'', ''Irrigation system installation and maintenance'', ''Mower and power-tool operation'', ''Pest and disease management'',
    ''Team coordination and leadership'', ''Customer service and client communication'', ''Project scheduling and resource planning'', ''Safety compliance and risk management'', ''Community outreach and
    volunteering'']'
  hobbies: '[''Recreational soccer'', ''Community gardening'', ''Cooking Mexican cuisine'', ''Family barbecues and gatherings'', ''Volunteer park clean-ups'', ''Listening to regional Mexican music'', ''DIY
    home improvement projects'', ''Watching sports (especially baseball and soccer)'', ''Attending local cultural festivals'', ''Fishing at nearby lakes'']'
  career_goals: Jorge aims to move into a supervisory role within the next three years, becoming a crew foreman or site manager where he can combine his technical expertise with his natural ability to mentor
    and foster a harmonious team environment. He plans to earn an associate’s degree in horticulture and obtain certifications in landscape design and irrigation efficiency. Long-term, he dreams of launching
    his own small landscaping business that specializes in eco-friendly, community-focused projects—such as creating accessible gardens for senior centers and partnering with local schools for outdoor education
    programs. He also hopes to expand his volunteer work by leading neighborhood beautification initiatives.
