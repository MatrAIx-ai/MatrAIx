persona_description: A historian and filmmaker who is interested in exploring the rich cultural heritage and history of the King-Lincoln District in Columbus, Ohio. They are particularly drawn to the neighborhood's
  vibrant African-American community, its musical legacy, and the impact of the interstate highway on its development. They are also interested in the civil rights movement and the businesses along Mt.
  Vernon Avenue, which were in the midst of some of the hottest confrontations of the Civil Rights Movement. They are passionate about preserving the neighborhood's history and its cultural significance,
  and are committed to its rebirth and revitalization.
