  career_goals: Muhammed aims to complete his GED within the next year and enroll in a vocational apprenticeship program, preferably in electrical or mechanical trades, where he can apply his hands‑on skills
    and disciplined work ethic. He is also attracted to the structured environment of the U.S. Army, seeing it as a pathway to develop leadership and technical expertise. In the longer term, he envisions
    establishing his own small‑scale bike‑repair and maintenance shop, using his organizational strengths to build a reputable service for his neighborhood. He aspires to achieve financial independence,
    gain respect in his community, and eventually mentor other youth.
