personas:
  professional: Jose Sanchez is a veteran front‑line customer service representative turned mentor, leveraging over 20 years of bilingual communication, conflict‑de‑escalation expertise, and Salesforce/Zendesk
    fluency, while his curiosity‑driven, flexible approach and love for community art sometimes leads to a relaxed scheduling style that can cause occasional missed internal deadlines.
  sports: Jose Sanchez anchors a Bradenton community softball team, enjoys beach volleyball at Anna Maria Island, and follows the Tampa Bay Rays, Miami Dolphins, and Florida Panthers, treating his fitness
    routine as a social outlet rather than a strict regimen.
  arts: Jose Sanchez sketches Gulf Coast sunsets inspired by the vibrant palettes of Frida Kahlo, strums a guitar in a local band covering Tito Puente and Pat Metheny, and regularly visits the Manatee County
    Art Museum to admire works by emerging Florida artists such as Kelly Rutherford.
  travel: Jose Sanchez balances relaxed beach getaways to Siesta Key with heartfelt trips to his relatives in Oaxaca, Mexico for family celebrations, and dreams of exploring the colorful streets of Barcelona
    and the street‑art hub of Wynwood in Miami.
  culinary: Jose Sanchez excels at preparing mole poblano using ancho chilies, Mexican chocolate, and sesame seeds, rolls tamales with masa harina, pork, and fresh cilantro, and crafts zesty ceviche with
    lime, shrimp, jalapeño, and avocado, often pairing his meals with locally caught snapper.
  core: Jose Sanchez is a sociable, art‑loving customer‑service veteran who juggles a flexible, sometimes disorganized work style with community passions, always finding time for salsa, sketching, and fresh
    fish tacos.
background:
  cultural: Jose Danilo is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish was spoken at home and English at school. His upbringing blended traditional Mexican customs—such
    as celebrating Día de los Muertos, cooking family recipes, and emphasizing close‑knit family ties—with the relaxed, outdoor lifestyle of coastal Florida. He carries forward the values of hospitality,
    respect for elders, and communal celebration that are central to Mexican culture, while also embracing the multicultural environment of Bradenton, where Hispanic, Caribbean, and Southern influences
    intersect. His cultural identity informs his work ethic, his preference for building harmonious relationships, and his desire to create spaces where art and community converge.
