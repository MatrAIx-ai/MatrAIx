personas:
  professional: Brian Shoupe, a 50-year-old community-oriented multitasker, leverages their knack for creative problem-solving, event organization, and basic photography to spearhead local art workshops
    while pursuing a part-time role as a community arts facilitator and a weekend portrait-and-event photography side business.
  sports: Brian Shoupe stays active through weekly community softball leagues and spontaneous pick-up basketball games, cheering on the Atlanta Braves and the Atlanta Falcons while treating casual exercise
    as a social outlet rather than a regimented fitness regimen.
  arts: Brian Shoupe immerses themselves in Atlanta's vibrant arts scene, snapping photos of street murals by local artists like The Co-Op Creators, attending jazz gigs featuring Wynton Marsalis at the
    Tabernacle, and curating indie shows that spotlight bands such as Algiers, while also leading intergenerational photography workshops that blend storytelling with visual literacy.
  travel: Brian Shoupe prefers spur-of-the-moment road trips to nearby historic towns like Savannah, Macon, and Asheville, packing a camera and a cooler of home-grown snacks, and they plan travel loosely
    around weekend windows, balancing a modest budget with the desire to capture Southern charm on film.
  culinary: Brian Shoupe experiments in the kitchen by turning heirloom tomatoes, hot peppers, and fresh herbs from their backyard garden into dishes such as pepper-infused gazpacho, tomato-bashed shrimp
    étouffée, and a miso-glazed collard greens side, showcasing a comfortable but improvisational cooking style that blends Southern comfort with global flavors.
  core: Brian Shoupe is a curious, sociable 50-year-old who fuses art, gardening, and spontaneous road trips into a life of flexible community-building, even if they sometimes misplace tools and delay bill
    payments.
background:
  cultural: Brian is a White American who grew up in the suburban South during the 1970s and 1980s, absorbing the region’s traditions of hospitality, community involvement, and Southern culinary heritage.
    Raised in a modest, middle‑class family, he attended public schools and earned a high‑school diploma before entering the local manufacturing workforce. Over the decades, the cultural diversity of Atlanta
    has broadened his perspective, and he now actively embraces the city’s multicultural influences—particularly its vibrant music, art, and food scenes. While his upbringing emphasized respectful interpersonal
    relations and modesty, Brian’s current life reflects an open‑minded curiosity and a willingness to blend Southern roots with contemporary, eclectic experiences.
