  career_goals: Although currently not employed, Brian aims to channel his energetic, outgoing personality into community‑focused roles. He hopes to volunteer as a coordinator for local art festivals and
    eventually secure a part‑time position as a community arts facilitator, where he can mentor youth in photography and visual storytelling. Brian also envisions starting a small weekend‑side business
    offering portrait and event photography, while continuing to lead a neighborhood garden project that promotes sustainable eating and social interaction. Learning digital design tools and earning a certification
    in community recreation are among his short‑term ambitions.
