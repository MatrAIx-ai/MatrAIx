  career_goals: Betty aims to earn a Certified Dental Assistant credential and complete advanced training in radiology and infection control to broaden her clinical expertise. Over the next several years
    she hopes to move into a lead assistant or office manager position where she can mentor new staff, streamline workflow, and introduce creative health‑education initiatives that integrate visual arts.
    Long‑term, she envisions partnering with local art organizations to develop community workshops that blend oral‑health awareness with artistic expression, strengthening both health outcomes and cultural
    engagement in Myakka City.
