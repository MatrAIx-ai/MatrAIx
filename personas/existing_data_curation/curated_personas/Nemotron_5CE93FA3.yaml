personas:
  professional: Betty Crump, a 38-year-old dental assistant in Myakka City, leverages meticulous radiography skills and a flair for watercolor illustration to create patient education posters, while their
    relaxed approach to scheduling sometimes leads to a cluttered inbox, but their empathy and collaborative spirit make them a go-to mentor for new staff.
  sports: Betty Crump enjoys casual trail hikes in Myakka River State Park, joins the Sarasota Runners weekly for 5‑k runs, follows the Tampa Bay Buccaneers and Rays, and occasionally plays beach volleyball
    with friends, favoring low‑impact workouts that fit their flexible schedule.
  arts: Betty Crump, an avid watercolorist, frequents Sarasota’s gallery openings and the annual River Arts Festival, draws inspiration from Monet’s misty landscapes and O’Keeffe’s bold florals, and captures
    nature’s details through a Nikon D5600, weaving art into both work and leisure.
  travel: Betty Crump prefers spontaneous weekend road trips, often exploring nearby Gulf Coast towns like St. Petersburg and historic Savannah, while dreaming of a creative retreat in Santa Fe and a leisurely
    art‑focused tour of Florence, Italy, and they balance a limited budget with a love for cultural immersion.
  culinary: Betty Crump, a moderately skilled home cook, experiments with recipes like shrimp scampi with fresh Gulf shrimp, key lime pie featuring local limes, and herb‑infused quinoa bowls, relishing
    the aroma of basil and rosemary while occasionally over‑seasoning in pursuit of bold flavors.
  core: Betty Crump, a 38-year-old dental assistant who blends watercolor artistry with a delightfully disorganized schedule, habitually forgets to water houseplants but never misses a chance to design
    a vibrant patient brochure, and they balance kindness with a relaxed attitude toward obligations.
background:
  cultural: Betty grew up in a middle‑class white family in central Florida, absorbing the relaxed, community‑oriented values of the Sun Belt. Her upbringing emphasized Southern hospitality, modest perseverance,
    and a strong sense of neighborly support. Living near Sarasota exposed her to a multicultural arts environment, including Latino cuisine, music, and festivals, which broadened her appreciation for diverse
    perspectives. She identifies with the laid‑back, nature‑loving culture of Myakka City, where outdoor activities, casual social gatherings, and a close‑knit community are central to daily life.
