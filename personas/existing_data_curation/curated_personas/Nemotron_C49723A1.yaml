  career_goals: Kris aims to lead a pioneering research program focused on next‑generation photovoltaic materials that combine high efficiency with low environmental impact. She is working toward a senior
    scientist position where she can shape the research agenda, secure multi‑year federal and industry grants, and build a collaborative lab culture that values both rigorous science and creative exploration.
    In the next five years she hopes to publish a landmark paper on perovskite stability, mentor a cohort of graduate students, and develop a spin‑off consultancy that advises startups on translating laboratory
    breakthroughs into marketable technologies. Eventually, she envisions a semi‑retired phase where she can devote more time to science policy advocacy and community outreach, leveraging her business acumen
    to influence sustainable energy legislation while maintaining an active role as an advisor and reviewer.
