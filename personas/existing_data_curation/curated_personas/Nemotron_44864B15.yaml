  career_goals: Angel aims to stay actively engaged in her community by expanding the intergenerational Spanish‑language reading program at the local senior center, mentoring young teachers through a structured
    volunteer mentorship, and documenting her family's migration story in a memoir that can serve as a cultural resource for Nicaraguan‑American youth. She also aspires to enhance the community garden’s
    sustainable practices and to host quarterly workshops on traditional Nicaraguan cuisine, fostering cultural pride while maintaining a manageable, low‑stress schedule.
