  career_goals: While approaching retirement, Lori aims to cement her legacy by mentoring the next generation of office leaders and establishing a succession plan for her team. She aspires to spearhead
    a pilot program that integrates local art initiatives with senior community services, using her organizational talents to create lasting cultural partnerships. Lori also hopes to transition into a part‑time
    consultancy role, offering lean office management and staff development workshops to nearby nonprofits, while maintaining a balanced lifestyle that supports her health and family commitments.
