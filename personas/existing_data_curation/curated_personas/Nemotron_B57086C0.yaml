  hobbies: '[''Hiking'', ''Surfing'', ''Kayaking'', ''Community Volunteer Projects'', ''Charity Runs'', ''Music Jam Sessions'', ''Lei‑making Workshops'', ''Cooking Hawaiian Cuisine'', ''Reading on Social
    Policy and Psychology'', ''Youth Mentorship'']'
  career_goals: Timothy aims to transition into a leadership role within a community health organization, where he can design and oversee evidence‑based programs that address mental health and substance‑use
    challenges among at‑risk youth in Waipahu. He plans to complete his bachelor’s degree in Social Work, pursue a Master’s in Public Administration, and obtain licensure as a Clinical Social Worker. Over
    the next five years, he hopes to secure multi‑year grant funding for a culturally tailored youth resilience program, mentor junior social workers, and influence local policy to enhance services for
    underserved families.
