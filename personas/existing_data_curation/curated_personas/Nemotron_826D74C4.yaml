personas:
  professional: Edward Longenecker, a seasoned automotive service technician with ASE Master certifications in engine performance and brakes, blends their methodical fault‑tree analyses with a pragmatic
    curiosity about electric‑vehicle systems, mentoring apprentices while charting a path toward a foreman role that will let them integrate classic‑car restoration with emerging EV technology.
  sports: Edward Longenecker, a competitive bowler in the Tippecanoe Bowlers league, a fervent follower of South Whitley High School football and an avid supporter of the Indiana Pacers, regularly joins
    a pickup basketball group at the local gym and follows the annual county 5‑K bowling tournament, balancing their love of team spirit with a personal drive to top their own scores.
  arts: Edward Longenecker, a lover of vintage aesthetics, spends rainy afternoons listening to classic rock icons like AC DC and The Rolling Stones, attends community theater productions of ‘Our Town’,
    and frequently admires the custom‑car artistry of Chip Foose, integrating these creative sparks into their own restoration projects.
  travel: Edward Longenecker, an organized traveler, enjoys weekend road trips to the Michigan shoreline and the Detroit Automotive Heritage Museum, has taken a memorable drive along historic Route 66 to
    California, dreams of attending the Goodwood Festival of Speed in the UK, and they prefer meticulously planned itineraries that balance automotive pilgrimages with relaxed fishing excursions at Lake
    Erie.
  culinary: Edward Longenecker, a competent home cook, favors hearty Midwestern dishes like pork tenderloin with apple butter glaze, homemade chili topped with shredded cheddar, and fresh‑caught walleye
    grilled with lemon‑dill butter, often pairing meals with a cold craft beer from a local brewery while occasionally treating themselves to an expensive cut of Wagyu steak for special occasions.
  core: Edward Longenecker, a methodical mechanic with a competitive edge, balances a love for classic‑car restoration and emerging EV tech while juggling budgeting quirks, health worries, and a robust
    social calendar of bowling, basketball, and community garden volunteering, and they often reflect on the tension between meticulous planning and spontaneous impulses.
background:
  cultural: Edward grew up in a working‑class, white, Midwestern family in Kosciusko County, Indiana. His paternal grandparents were of German descent, and the family embraced the region’s Protestant values,
    attending a local Methodist church in his youth. The community emphasized self‑reliance, hard work, and neighborly support, shaping Edward’s practical and reliable character. He attended the local high
    school, where he earned his first automotive certification through a vocational program, and has remained in South Whitley, developing deep ties to the town’s small‑town culture, local fairs, agricultural
    rhythms, and the blue‑collar ethos that values skill, loyalty, and straightforward communication.
attributes:
  skills: '["Engine overhaul", "Transmission repair", "Brake system service", "Hybrid and electric vehicle diagnostics", "ASE Master Technician (Engine & Brakes)", "Diagnostic software (e.g., OBD-II scanners)",
