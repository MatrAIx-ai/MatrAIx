  hobbies: '["Classic‑car club participation", "Car restoration projects", "Bowling league (competitive)", "DIY electronics and home automation", "Fishing at Tippecanoe Lake", "Community garden volunteering",
    "High‑school football fan", "Pickup basketball games"]'
  career_goals: Edward aims to transition from a senior mechanic to a shop foreman or service manager within the next five years, positioning himself to oversee a small team, streamline workflow, and introduce
    best practices for emerging vehicle technologies. He is also pursuing additional certifications in electric‑vehicle systems and advanced diagnostics to stay ahead of industry trends. Long‑term, he hopes
    to open a modest independent repair garage that specializes in classic car restoration combined with modern EV servicing, allowing him to blend his love of tradition with curiosity for new technology
    while providing mentorship opportunities for younger technicians.
