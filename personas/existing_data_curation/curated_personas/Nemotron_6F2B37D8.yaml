  career_goals: Charles dreams of becoming an astronaut or aerospace engineer one day, inspired by his love of space and the practical challenge of building things. He also imagines working as a mechanic
    or inventor, where he could apply his hands‑on skills to solve real‑world problems. In the short term, he aims to win his school’s science fair, earn the All‑Star soccer award, and develop his first
    independent Scratch game, believing these milestones will keep him on a path toward turning his curiosity into a future career of invention and exploration.
