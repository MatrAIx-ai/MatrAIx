personas:
  professional: Charles Rutchka, a budding young engineer, combines a vivid imagination with practical problem‑solving by designing LEGO vehicles that they later animate in Scratch, showing a calm yet occasionally
    scattered approach to projects that values flexible play over strict schedules.
  sports: Charles Rutchka, a member of the Chicago Sockers U10 soccer team, loves riding their bike through neighborhood streets, cheering for the Chicago Cubs on Saturday afternoons, and watching the Chicago
    Bulls’ highlight reels, bringing a lighthearted competitive spirit tempered by occasional worry about missing a goal.
  arts: Charles Rutchka channels creativity through building intricate LEGO space stations, sketching comic strips featuring a dinosaur astronaut named Rex, and listening to the upbeat scores of Super Mario
    Odyssey and Minecraft, which influence the bright color palettes they use in their drawings.
  travel: Charles Rutchka dreams of visiting the Kennedy Space Center in Florida, has already toured the Field Museum’s dinosaur exhibit in Chicago, and enjoys spontaneous weekend trips to nearby state
    parks where they collect rocks and insects, balancing parental itinerary constraints with a love for unplanned backyard explorations.
  culinary: Charles Rutchka favors classic pizza with pepperoni and a surprise slice of pineapple, delights in spaghetti with meatballs, and often attempts to make simple snacks like peanut butter‑banana
    sandwiches, while sometimes forgetting to wash their hands before eating, a quirk their mom gently reminds them about.
  core: Charles Rutchka is a curious, LEGO‑building nine‑year‑old who blends boundless imagination with occasional disorganization, worries about tiny setbacks, and finds comfort in the rhythmic beats of
    video‑game music while sketching heroic dinos.
background:
  cultural: Charles was raised in a middle‑class suburban household in Clovis, a small city in California’s Central Valley. His family follows typical American traditions—celebrating holidays like Thanksgiving
    and Fourth of July, attending community events at the local park, and taking occasional trips to nearby farms or the Sierra foothills. The multicultural environment of Fresno County, with its mix of
    Hispanic, agricultural, and suburban cultures, has given him exposure to Spanish greetings and farm‑to‑table food, though his household’s heritage is predominantly European‑American. He attends a public
    elementary school where he participates in after‑school clubs and local youth sports, grounding his identity in a blend of regional community values, school‑centric social life, and the broader American
    cultural narrative.
