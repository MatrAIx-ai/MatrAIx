  career_goals: Joshua aims to transition into a senior advisory role where he can mentor emerging developers and shape the technical strategy of his organization. He plans to author a practical guide on
    building reliable, maintainable software systems, and to contribute to open‑source projects focused on security and performance. Additionally, he seeks to establish a consulting practice that helps
    small businesses adopt structured, scalable software solutions, ensuring his legacy of high standards continues beyond his formal retirement.
