  career_goals: Aida dreams of channeling her love for visual storytelling into a career where she can merge art and technology. She hopes to attend an arts‑focused high school or a specialized STEM‑arts
    program that will let her explore graphic design, animation, or concept art, eventually working as a freelance illustrator or creative technologist. Inspired by the natural environment around Lake Wales,
    she also considers studying environmental communication so she can create compelling visual campaigns that highlight the preservation of local waterways. Over the long term, Aida aims to build a diverse
    portfolio that reflects both her Salvadoran heritage and her modern, experimental aesthetic, securing scholarships or commissions that give her the flexibility to work on projects she chooses.
