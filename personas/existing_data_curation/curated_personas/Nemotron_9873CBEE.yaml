personas:
  professional: Aida Sabo, a 13‑year‑old aspiring game designer and digital artist, channels their curiosity and competitive spirit into crafting whimsical Scratch animations and hand‑drawn characters,
    even though their sketchbook often resembles a chaotic battlefield of crayons and ideas that they still love to share with a tight‑knit group of friends.
  sports: Aida Sabo, who plays casual soccer with the Lakeview Youth Soccer Club in the spring and cycles along nearby nature trails for solo cardio, roots for the Los Angeles Lakers and the San Francisco
    Giants, yet their competitive drive is more evident in online chess matches than in team sports, leading to occasional missed practices.
  arts: Aida Sabo immerses themselves in a vibrant arts world, sketching original characters in a perpetually messy notebook, crafting digital illustrations on Procreate while humming tunes by Billie Eilish
    and C. Tangana, and drawing inspiration from graphic novels such as Raina Telgemeier’s Smile and Shaun Tan’s The Arrival, which together shape a solitary yet expressive creative identity.
  travel: Aida Sabo prefers low‑key weekend getaways to nearby lakes and forest paths, capturing sunrise reflections with their phone, while dreaming of a summer family trip to Yosemite National Park and
    a cultural excursion to Barcelona’s vibrant streets, balancing a love for quiet nature with a budding curiosity for bustling urban landscapes.
  culinary: Aida Sabo, an enthusiastic junior chef, often assists in the kitchen to hand‑press pupusas filled with cheese and loroco, occasionally experiments with homemade guacamole and mango salsa, yet
    their cooking skill remains at a playful, trial‑and‑error level, preferring the tactile joy of shaping dough over precise recipes.
  core: Aida Sabo, a curious yet laid‑back 13‑year‑old, channels a competitive spark into solitary arts and chess, navigates life with a habit of organized chaos, and balances a skeptical mind with a deep
    love for quiet creativity and family‑rooted flavors.
background:
  cultural: Aida was born and raised in Lake Wales, Florida, to Salvadoran‑immigrant parents. At home, Spanish is the primary language, and the family celebrates Salvadoran traditions such as Día de los
    Santos, cooking pupusas, and sharing folk stories passed down from grandparents. She participates in the local Salvadoran community center’s cultural festivals, where she learns traditional dances and
    visits with other families who share similar heritage. Growing up in a multicultural part of Central Florida, she balances the values of her parents—hard work, close family ties, and respect for elders—with
    the broader American influences of school and peer groups. This bicultural upbringing informs her artistic perspective, giving her a deep appreciation for both Central American visual motifs and contemporary,
    diverse artistic expressions.
