  career_goals: Jeffrey aims to advance within the corrections field while integrating his interest in rehabilitation and the arts. Over the next two years he plans to complete a Bachelor’s degree in Criminal
    Justice, positioning himself for a shift-supervisor role. He seeks certification in mental-health first response and hopes to coordinate an arts-therapy program for inmates, leveraging his appreciation
    for creative expression. In the longer term, he aspires to become a Correctional Program Coordinator or eventually a Warden, where he can influence policy toward more humane, evidence-based practices.
    Parallel to his professional trajectory, Jeffrey hopes to contribute articles to criminal-justice reform publications and mentor at-risk youth through community outreach.
