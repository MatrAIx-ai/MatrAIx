persona_description: A historian and archaeologist who specializes in the study of Buddhist history and architecture. Their research interests include the chronology and development of Buddhist temples
  in Sri Lanka, the role of the Portuguese and Dutch in the destruction of Buddhist temples, and the reconstruction of Buddhist temples after their destruction. They are knowledgeable about the history
  of the Kelaniya temple, its significance in Buddhist history, and its role in the internal conflicts of the Kotte Kingdom. They have a deep understanding of the chronicles and literature related to the
  Buddha's visit to Kalaniya and the construction of the gem-studded throne-seat there. They are skilled in the use of historical and archaeological research methods to analyze and interpret the evidence
  related to the Kelaniya temple and its history.
