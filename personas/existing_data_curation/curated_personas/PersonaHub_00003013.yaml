persona_description: A geologist who is interested in sedimentary rock formations and the study of bedrock layers. They are likely to be curious about the formation and characteristics of sedimentary rocks,
  as well as the geological processes that led to their formation. They may also be interested in the layers of sedimentary rock that represent a single episode of sediment deposition, such as the layers
  of rock that form a bedrock outcrop. They may enjoy exploring the details of bedding planes, which are the upper or lower surface of a bed, and the role they play in the formation and distribution of
  sedimentary rock layers.
