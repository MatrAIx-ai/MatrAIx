  career_goals: Gary seeks to advance into a senior operations or business analyst role where he can leverage his analytical background and organizational expertise to drive systemic efficiency. He plans
    to earn the Certified Administrative Professional (CAP) credential and complete a data analytics certification within the next two years. Long‑term, he aspires to lead an office services department
    or launch a boutique consultancy helping small businesses streamline their workflows, positioning himself as a competitive leader in operational excellence.
