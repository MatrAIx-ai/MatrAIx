  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Gardening'', ''Woodworking'', ''Attending Heritage Festivals'', ''Reading Biographies and Business Books'', ''Cooking'', ''Bridge (Card Game)'']'
  career_goals: Looking ahead, John aims to mentor emerging HR professionals within his organization and the broader White County community, leveraging his wealth of experience to shape a more adaptable
    and inclusive workplace culture. He plans to spearhead a digital transformation of HR processes, integrating data‑driven tools while preserving a personal touch. Over the next few years he hopes to
    lead a companywide initiative on employee wellbeing and flexible work arrangements, and eventually transition to a part‑time consulting role that allows him to advise small businesses on building resilient,
    people‑centric HR systems before fully retiring.
