personas:
  professional: Sergio Ortiz, a retired civil and structural engineer with four decades of experience designing bridges, roads, and water treatment facilities, brings his methodical precision, competitive
    drive, and bilingual communication skills to volunteer consulting for the El Dorado County Planning Department while mentoring high‑school and community‑college students in STEM.
  sports: Sergio Ortiz, an avid hiker in the Sierra foothills and regular participant in senior‑center bridge and poker tournaments, follows the Sacramento Kings, San Francisco 49ers, and Los Angeles Dodgers,
    and maintains fitness through weekly hikes on the American River Trail and the physical labor of gardening and woodworking.
  arts: Sergio Ortiz, who finds inspiration in the guitar work of Carlos Santana, the vibrant canvases of Frida Kahlo at the local museum, and community theater productions of folk stories, channels their
    creative energy into hand‑crafted wooden furniture and enjoys attending live performances whenever they can.
  travel: Sergio Ortiz, a deliberate itinerary planner, balances family visits in Oaxaca with scenic drives through Yosemite, budgets carefully for annual trips to coastal towns like Puerto Vallarta, and
    dreams of a future pilgrimage to historic missions in San Antonio, all while preferring structured travel arrangements over spontaneous getaways.
  culinary: Sergio Ortiz, a devoted home cook, perfects mole poblano and handmade tamales using heirloom tomatoes, dried chilies, and fresh cilantro from their garden, documents recipes in a notebook, and
    occasionally overindulges in extra servings after a successful card night.
  core: Sergio Ortiz, a 73‑year‑old retired engineer, blends methodical precision with sociable enthusiasm, turning a love for gardening, woodworking, and competitive card games into community mentorship
    while maintaining disciplined finances and a pragmatic health routine.
background:
  cultural: 'Sergio was born in a modest town in Mexico and migrated to the United States as a teenager with his family. Growing up in a bilingual household, he internalized the values of familismo, respect
    for elders, and communal solidarity typical of Mexican culture. These values continue to shape his interactions and his commitment to giving back to the community. While he embraces the laid‑back, outdoor
    lifestyle of Northern California, he also preserves Mexican traditions: he celebrates Día de los Muertos with family altars, prepares festive meals for holidays, and maintains a collection of folk art
    that decorates his home. His Catholic upbringing influences his participation in church events and his perspective on service, blending seamlessly with the multicultural environment of El Dorado Hills.'
