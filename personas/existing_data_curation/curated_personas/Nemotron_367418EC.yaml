personas:
  professional: Caridad Rodriguez is a ten‑year‑old budding interactive storyteller who builds mystery‑filled Scratch games, pairing strategic puzzles with vivid digital sketches; they apply a practical,
    detail‑oriented mindset while constantly questioning game mechanics to stay ahead of peers.
  sports: Caridad Rodriguez devotes their afternoons to playing forward for the Westside Youth Soccer Club; they idolize the Chicago Fire FC’s attacking style, track the Chicago Bulls for winter inspiration,
    and drill dribbling and endurance with a competitive edge that pushes them to improve even when school stress creeps in.
  arts: Caridad Rodriguez channels their imagination into digital sketches of daring detectives; they draw creative fuel from Lila Downs’ folk melodies and the whimsical animation of Studio Ghibli, and
    enjoy performing traditional dances at community festivals where they replicate the vibrant steps of celebrated dancers.
  travel: Caridad Rodriguez loves family road trips that blend adventure with cultural immersion; they recall summer visits to the Grand Canyon and a weekend exploring San Antonio’s River Walk, while dreaming
    of strolling the museum corridors of Washington, D.C., and wandering the colorful streets of Oaxaca on future vacations, though budget limits sometimes anchor them to local park adventures.
  culinary: Caridad Rodriguez helps their grandmother roll tamales and simmer pozole; they have a knack for seasoning salsa with fresh cilantro, jalapeño, and roasted tomatoes, and often swap a store‑bought
    snack for a homemade quesadilla filled with cheese and crispy chicharrón.
  core: Caridad Rodriguez blends a detective’s curiosity with a soccer player’s competitive streak; they obsessively check their inhaler before every game, hoard spare tokens for video‑game packs, and can’t
    resist rereading the same mystery novel until the plot twist feels predictable.
background:
  cultural: Caridad is a first‑generation Mexican‑American growing up in Chicago's vibrant Latino community. At home, Spanish is spoken alongside English, creating a bilingual environment that shapes her
    identity. Family gatherings are filled with traditional foods like tamales and pozole, and she helps prepare these dishes during holidays. She proudly celebrates Día de los Muertos, crafting colorful
    altars and learning stories of ancestors from her grandparents. Local community events, such as cultural parades and bilingual storytimes at the library, reinforce her connection to Mexican heritage
    while integrating her into the broader Chicago landscape. This multicultural upbringing influences her values of family loyalty, respect for elders, and a strong sense of community, all of which guide
    her aspirations and everyday interactions.
