  career_goals: Caridad dreams of excelling in school, especially in science and math, with the long‑term ambition of becoming a veterinarian so she can care for animals—a goal that satisfies her curiosity
    about biology and her practical desire to help others. She also imagines herself as an environmental engineer, designing projects that improve her Chicago neighborhood while honoring her Mexican heritage.
    Competitive by nature, she aims to win science fairs and earn top grades, though she sometimes worries about meeting these high expectations. Ultimately, she hopes to attend a university where she can
    blend her cultural roots with cutting‑edge research.
