  hobbies: '[''Photography'', ''Urban sketching'', ''Cooking Peruvian cuisine'', ''Hiking'', ''Listening to jazz and folk music'', ''Reading sci‑fi novels'', ''Watching tech documentaries'', ''DIY electronics
    projects'', ''Mentoring middle‑school STEM'', ''Visiting art galleries'']'
  career_goals: Ramon aims to transition back into the workforce by combining his technical background with his love for art and cultural storytelling. Over the next few years, he plans to complete a certification
    in user‑experience design and seek part‑time or project‑based roles as a data analyst or product designer at a design‑tech startup that values interdisciplinary creativity. Long‑term, he envisions founding
    a community makerspace in Ventura County where he can run workshops on 3D printing, digital art, and Peruvian craft traditions, offering hands‑on STEM experiences that reflect his heritage and collaborative
    spirit. He also hopes to mentor more youth in STEM, creating educational kits that blend engineering concepts with cultural narratives.
