persona_description: A neurologist with a specialization in the diagnosis and treatment of disorders of the vestibular system, including vertigo, dizziness, and other vestibular disorders. The neurologist
  has extensive experience in the evaluation and management of patients with vestibular disorders, including the assessment of multiple sensory deficits that can contribute to vertigo. The neurologist is
  skilled in the use of diagnostic tests and procedures, such as optokinetic stimulation, to evaluate the vestibular system and identify the underlying cause of vertigo. The neurologist is also knowledgeable
  about the pathophysiology of vestibular disorders, including the mechanisms of autonomic neuropathy, orthostatic hypotension, and the effects of thyroid deficiency on vestibular function. The neurologist
  is committed to providing comprehensive care to patients with vestibular disorders, including the development of personalized treatment plans and the management of symptoms.
