persona_description: A scientist and researcher who specializes in the study of the Atlantic Meridional Overturning Circulation (AMOC), particularly in its role in driving sudden changes in climate. They
  are interested in reconstructing the historical flow of key currents, such as the Glacial Eastern Boundary Current (GEBC), and analyzing the grain sizes and isotope levels in sediment cores to gain insights
  into the current's strength and timing of changes in the AMOC. They are also knowledgeable about the role of major ice-melting events in weakening the current and the AMOC in general.
