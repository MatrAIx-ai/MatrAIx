personas:
  professional: Diane Reynoso, a 21‑year‑old occupational therapy aide in Boulder, blends meticulous patient documentation with a flair for digital illustration to craft bespoke, art‑infused activity plans,
    while competitively tracking evidence‑based advances in VR‑enabled therapy to outpace peers and position herself for future OT licensure.
  sports: Diane Reynoso embraces solo hikes on the Flatirons during spring and autumn, practices yoga three times weekly at a downtown studio, is a member of the Boulder Rock Club, follows the Colorado
    Avalanche for statistical intrigue while rarely attending games, and occasionally watches the Denver Broncos on TV, preferring quiet exercise over large‑crowd sports events.
  arts: Diane Reynoso channels a love for solitary creativity into nightly sketching sessions inspired by Georgia O'Keeffe’s desert palettes and the immersive installations of Olafur Eliasson, regularly
    visits the Boulder Museum of Contemporary Art to study works by Yayoi Kusama and Wangechi Mutu, and curates custom playlists of ambient electronic music by Aphex Twin to accompany their digital illustration
    practice, allowing art to serve both as personal solace and a foundational element of their future therapy approach.
  travel: Diane Reynoso prefers low‑key, self‑planned trips that combine artistic immersion with nature, having trekked solo through Zion National Park and spent a weekend exploring the contemporary galleries
    of Kyoto, while dreaming of a future solo expedition to Iceland’s basalt coast to sketch the aurora, all within a modest student budget that necessitates booking hostels and leveraging a points‑earning
    credit card.
  culinary: Diane Reynoso enjoys simple, wellness‑focused meals such as quinoa salad with roasted beet, goat cheese, and toasted walnuts, masters a decent avocado toast with radish and hemp seeds, and occasionally
    treats themselves to a handcrafted matcha latte at a local café, while their culinary confidence peaks when arranging a sushi roll but stalls at more elaborate baking projects.
  core: Diane Reynoso, a 21‑year‑old introspective OT aide‑in‑training, fuses a competitive curiosity for tech‑enhanced therapy with a solitary love of art and hiking, while navigating chronic anxiety through
    disciplined yoga and reflective journaling.
background:
  cultural: Diane grew up in a middle‑class white family in the Denver metropolitan area, where she was exposed to both the outdoorsy Colorado lifestyle and a strong appreciation for the arts. Her upbringing
    emphasized independence, self‑reliance, and a respect for environmental stewardship, which aligns with Boulder’s culture of sustainability and outdoor recreation. Though culturally rooted in mainstream
    American traditions, she has adopted progressive values common in Boulder, including openness to diverse ideas, a critical mindset toward conventional norms, and an appreciation for solitary, introspective
    experiences. Her family’s modest support for higher education allowed her to pursue some college coursework before entering the occupational therapy field.
attributes:
  skills: '["Patient assessment","Therapeutic exercise and activity planning","Adaptive equipment training","Electronic health record documentation","Critical evaluation of evidence-based practices","Adaptive
    use of assistive technology","Visual arts for therapeutic design","Organizational and time-management skills","Flexible adaptation of treatment protocols","Independent research on emerging OT techniques"]'
  hobbies: '["Sketching and painting","Visiting contemporary art galleries","Reading philosophy and psychology","Reflective journaling","Solo hiking on the Flatirons","Yoga and meditation for stress management","Digital
    illustration and design","Listening to experimental music"]'
  career_goals: Diane aims to advance from her current aide position to become a Certified Occupational Therapist within the next five years, pursuing a bachelor's degree in occupational therapy and eventually
    a master's to specialize in mental health and neurological rehabilitation. She is competitive and wants to distinguish herself by developing a niche expertise in technology‑enhanced interventions, such
    as virtual reality and custom‑made adaptive devices. Long‑term, she envisions opening a solo practice in Boulder that offers individualized, art‑integrated therapy for adults dealing with anxiety and
    stress, combining her clinical knowledge with her artistic background. She also hopes to contribute research articles to professional journals to validate unconventional therapeutic methods she is passionate
    about.
