  hobbies: '["Reading books (fiction & nonfiction)", "Drawing and sketching", "Lego building", "Exploring nature (collecting leaves, rocks, insects)", "Listening to music (gospel, R&B, hip‑hop)", "Playing
    soccer", "Participating in after‑school music circles"]'
  career_goals: Otis dreams of becoming a creator who blends art and science—he imagines designing inventions that look beautiful and solve real‑world problems, like a solar‑powered water fountain for his
    community park. He is fascinated by space and often talks about being an astronaut who can draw the planets he visits. At school, he aspires to be the class “science and art” helper, leading projects
    that let his classmates explore experiments and make posters. His long‑term ambition is to work in a museum or a research lab where he can both discover new ideas and share them through illustrations,
    showing others how curiosity leads to invention.
