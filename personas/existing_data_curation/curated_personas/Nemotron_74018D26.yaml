personas:
  professional: Otis Burton, a budding young inventor‑explorer, combines a methodical habit of sketching detailed wildlife and imagined machines with a deep curiosity for how things work, often turning
    Lego cityscapes into prototypes for future inventions while proudly documenting every step in a notebook.
  sports: Otis Burton plays forward for the local Under‑8 soccer club, idolizes the hometown MLS team's striker, and channels the same organized energy they use in building Lego into disciplined drills
    on the field.
  arts: Otis Burton pours their love of drawing into sketchbooks filled with wildlife, comic‑style heroes, and futuristic machines, while their soundtrack — ranging from gospel legend Kirk Franklin to classic
    R&B icon Stevie Wonder and kid‑friendly hip‑hop by Will i.am — fuels creative bursts during after‑school music circles.
  travel: Otis Burton's travel dreams blend backyard expeditions of collecting leaves and rocks with big‑picture wishes to visit the Kennedy Space Center, explore the Grand Canyon's rim, and experience
    a weekend Disney adventure with family, always planning routes with handwritten maps.
  culinary: Otis Burton enjoys crafting simple dishes like grilled cheese sandwiches, mac and cheese, and peanut butter jelly rolls, while delighting in crunchy carrot sticks and fruit salad, often insisting
    on adding a dash of ketchup to everything—including occasional experimental spicy peanut butter creations.
  core: Otis Burton is a calm, curious 7‑year‑old who balances meticulous LEGO engineering with a love for soccer and music, yet secretly hoards extra socks in a secret drawer, often forgetting where they
    placed their favorite sketchbook.
background:
  cultural: Otis is part of a close‑knit African‑American family in Valdosta, Georgia, where church, family gatherings, and community events shape his worldview. He celebrates traditions such as Sunday
    worship services with gospel music, family barbecues featuring Southern soul food, and storytelling evenings where elders share historical accounts of the civil‑rights movement and local heritage. His
    grandparents often recount tales of the Great Migration and encourage pride in his ancestry. The vibrant African‑American cultural scene in Lowndes County—local museums, art festivals, and the historic
    downtown—exposes him to black art, jazz, and blues, nurturing his appreciation for creative expression. These cultural influences intertwine with his curiosity, encouraging him to explore both his roots
    and the wider world.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Drawing and sketching", "Block coding (ScratchJr)", "Organizing personal space", "Following multi‑step instructions", "Cooperative problem‑solving",
