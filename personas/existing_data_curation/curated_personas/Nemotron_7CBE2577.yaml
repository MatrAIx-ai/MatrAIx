personas:
  professional: Colleen Banks is an aspiring medical assistant and budding IT support specialist whose methodical planning, keen curiosity for technology and biology, and empathy honed through animal‑shelter
    volunteering shape her disciplined approach to school labs, computer repairs, and community‑service projects.
  sports: Colleen Banks is a solitary fitness enthusiast who follows a disciplined weekly schedule of early‑morning desert hikes with the Gilbert Desert Hikers Club, weekday yoga sessions, and occasional
    pickup basketball games with close friends, while avidly cheering for the Phoenix Suns, Arizona Diamondbacks, and Arizona Cardinals.
  arts: Colleen Banks expresses creativity through nature photography inspired by Ansel Adams, intricate self‑designed knitting patterns that echo M. C. Escher’s geometric motifs, and a study soundtrack
    of ambient composer Brian Eno and indie folk artist Sufjan Stevens that frames her solitary sessions.
  travel: Colleen Banks prefers meticulously planned road trips that blend solitary desert photography excursions—like weekend drives to Sedona’s red rocks and sunrise shoots at the Grand Canyon—with occasional
    culturally immersive journeys abroad, such as a student‑exchange week in Kyoto, Japan, where they hope to document the contrast between ancient temples and cutting‑edge technology.
  culinary: Colleen Banks enjoys cooking simple, health‑focused meals such as quinoa bowls with roasted butternut squash, fresh basil pesto, and toasted pine nuts, while their snack repertoire includes
    spiced roasted chickpeas and herbal tea infused with mint and lemongrass, reflecting a practical palate anchored by garden‑grown herbs.
  core: Colleen Banks is a methodical teen who blends solitary curiosity with practical organization, obsessively journaling daily reflections and tending to succulents while occasionally procrastinating
    on social media scrolling.
background:
  cultural: Colleen grew up in a middle-class, suburban white family in Gilbert, Arizona. Her family heritage includes German and Irish roots, and they value self-reliance, hard work, and community involvement.
    The Southwest environment has shaped her appreciation for desert ecosystems and outdoor activities. She participates in local community events, attends a non-denominational church, and enjoys regional
    traditions such as county fairs and holidays. While her cultural identity is primarily American, she is aware of the diverse influences in Arizona, including Hispanic cuisine and celebrations, which
    she appreciates in a supportive and inclusive way.
