  career_goals: Colleen plans to complete her GED within the next year and enroll in a community college program focused on health-sciences or information technology. She aims to become a certified medical
    assistant or an IT support specialist, roles that blend her attention to detail, empathy for others, and practical problem-solving. In the longer term, she hopes to gain enough experience to manage
    a small clinic’s front-office operations or lead a tech support team, while maintaining a stable work-life balance that allows her to continue personal learning.
