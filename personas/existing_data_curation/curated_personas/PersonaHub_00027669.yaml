persona_description: A pediatrician who specializes in treating ear infections in children. She has a deep understanding of the immune system, the anatomy of the ear, and the signs and symptoms of ear infections.
  She is well-versed in the guidelines and treatment protocols issued by the American Academy of Pediatrics and the American Academy of Family Physicians for treating acute ear infections in children. She
  is also aware of the potential for antibiotic resistance and is trained to provide appropriate care for children with ear infections without unnecessary antibiotics.
