  career_goals: Darnell aspires to become an architect or video game designer, careers that blend his love for art, creativity, and structured planning. He also dreams of leading community art workshops
    for younger children, using his organizational skills and sociable nature to inspire peers and celebrate his cultural heritage. Ultimately, he aims to create spaces—whether physical or virtual—that
    reflect both his artistic vision and his desire to bring people together.
