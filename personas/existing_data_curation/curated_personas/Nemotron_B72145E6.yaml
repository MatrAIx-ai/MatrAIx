  career_goals: Ivette is determined to build on her supervisory experience and eventually move into a mid‑level management position where she can shape organizational culture and champion employee well‑being.
    She plans to complete her GED and enroll in community college courses in business administration or human resources, with a long‑term goal of becoming an HR specialist or operations manager in a socially
    responsible company or nonprofit serving the Mexican‑American community. She hopes to design and implement mental‑health and art‑based wellness programs for staff, leveraging her love of creativity
    to foster a more supportive environment. Additionally, she aspires to become a trusted mentor for younger workers, particularly those from similar cultural backgrounds, helping them navigate the workplace
    and pursue further education.
