personas:
  professional: Ivette Garcia, a 22-year-old office administrator with frontline supervisory experience, blends meticulous schedule coordination and bilingual mediation with an innovative, art-inspired
    approach to workplace harmony, aiming to transform employee well-being through creative HR programs.
  sports: Ivette Garcia, a yoga-enthusiast who prefers low-impact exercise, joins a community-run yoga circle at the Eastside Recreation Center, watches the Los Angeles Lakers in the basketball season,
    and occasionally plays pick-up soccer with a local youth mentorship league, balancing a desire for gentle movement with occasional competitive team spirit.
  arts: Ivette Garcia, an avid sketcher and gallery-hopper, draws inspiration from Frida Kahlo’s vivid self-portraits, Diego Rivera’s murals, and the indie sounds of Mitski and The National, while regularly
    attending open-mic nights and crafting papel picado for Día de los Muertos celebrations, letting art and music weave into their personal narrative.
  travel: Ivette Garcia, a thoughtful traveler who prefers curated cultural itineraries over spontaneous backpacking, has explored Oaxaca’s vibrant folk-art markets and Santa Fe’s Southwest art scene, while
    dreaming of a study-tour to Barcelona’s street murals, always budgeting trips around modest savings and occasional volunteer sabbaticals.
  culinary: Ivette Garcia, a passionate home cook with intermediate skills, experiments with regional dishes such as cochinita pibil, mole negro, and chiles en nogada, relishing the aroma of toasted ancho
    chilies, fresh masa, and roasted pumpkin seeds, yet sometimes over‑spices meals in a quest for bold flavor.
  core: Ivette Garcia, a 22‑year‑old bilingual art lover with a penchant for crafting colorful papel picado, juggles a meticulous office routine and bouts of anxious overthinking, often fueling late‑night
    sketch sessions with extra espresso.
background:
  cultural: Ivette is a second‑generation Mexican American raised in San Ysidro, a border community with a vibrant Latino culture. Her family values strong ties to Mexican traditions, including celebrations
    like Día de los Muertos, quinceañeras, and weekly family meals featuring homemade tamales and tacos. Growing up in a bilingual household, she is fluent in Spanish and English, allowing her to navigate
    both cultures. The Catholic faith influences her worldview, though she also embraces secular community events. She feels a deep connection to the Chicano heritage of the region, often participating
    in local mural projects and cultural festivals that highlight Mexican art and history. Living near the border has made her aware of cross‑border issues and motivated her to support fellow immigrants
    through mentorship and community service.
