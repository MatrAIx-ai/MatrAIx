personas:
  professional: Edgardo Menendez, an aspiring bilingual elementary educator, blends interactive, hands‑on lesson design with a competitive drive to benchmark student outcomes, while their relaxed, improvisational
    classroom style reflects a preference for flexibility over rigid planning.
  sports: Edgardo Menendez dominates local park basketball games with the New Haven Youth League, cheering for the Boston Celtics and following the NBA season closely, while also joining a community salsa
    dance club that keeps them active year‑round, and they consider rhythm as essential to staying fit.
  arts: Edgardo Menendez, a salsa enthusiast, regularly dances at Latin music nights featuring artists such as Marc Anthony and Celia Cruz, and unwinds with sci‑fi novels by N.K. Jemisin and Isaac Asimov,
    letting both rhythms and speculative worlds shape their creative outlook, and they often share favorite tracks with friends.
  travel: Edgardo Menendez favors spontaneous, budget‑friendly trips, ranging from weekend hikes in the White Mountains to a dream visit to the Caribbean island of Puerto Rico to explore its culinary scene,
    always booking student discounts and relying on shared rides with friends, and they keep a travel journal to record each adventure.
  culinary: Edgardo Menendez loves cooking traditional island dishes like arroz con gandules and pasteles, meticulously prepping sofrito, sazón, and plantains, yet sometimes forgets to clean the kitchen
    in the excitement of sharing meals with friends, and they consider each dish a celebration of community.
  core: Edgardo Menendez combines a competitive streak with a laid‑back, social vibe, turning classroom improvisation, pickup basketball, and salsa dancing into a lively formula for personal growth, despite
    occasional budgeting slip‑ups and missed stretches, and they often joke about being a ‘creative’ procrastinator.
background:
  cultural: Edgardo grew up in a bilingual household in New Haven with parents who emigrated from Puerto Rico. He was raised with strong familismo values, celebrating traditions such as Nochebuena, Día
    de los Reyes, and the vibrant festivals of San Juan. His daily life blends Puerto Rican customs—music, food, and storytelling—with the multicultural environment of Connecticut. This bicultural experience
    informs his teaching philosophy, prompting him to integrate Puerto Rican folklore, history, and language into lessons to honor his heritage while fostering inclusive learning for all students.
attributes:
  skills: '[''Lesson design (interactive & standards‑aligned)'', ''Bilingual instruction (Spanish/English)'', ''Classroom facilitation and group dynamics'', ''Adaptive improvisation in lesson delivery'',
    ''Student assessment and data analysis'', ''Community outreach and cultural integration'', ''Curriculum adaptation and resource creation'']'
  hobbies: '[''Basketball'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Attending Latin music concerts'', ''Exploring educational tech gadgets'', ''Community volunteering'', ''Reading science‑fiction'']'
  career_goals: Edgardo aims to complete his teacher certification and earn a master’s degree in Education within the next three years, focusing on bilingual curriculum development. He aspires to become
    a lead teacher or curriculum coordinator for a district-wide Spanish immersion program, leveraging his competitive drive to set performance benchmarks. Long‑term, he hopes to launch a community‑based
    after‑school initiative that blends academic support with Puerto Rican cultural activities, positioning himself as a bridge between his heritage and the broader New Haven educational landscape.
