persona_description: Mrs. Sherry Anderson is a teacher who leads a team at Imagine South Lake School to create World Wednesdays, a weekly activity that enables students to learn about the cultures of people
  throughout the world. She engages students' emotions, intellect, and five senses to encourage students to fully experience cultures while they travel throughout the seven continents, learning about geography.
  Mrs. Anderson partners with parents to develop meaningful lessons that incorporate character values and encourage appreciation for different ways of life. Her lessons are designed to give the students
  a full sensory "experience" of each country to make it as memorable and meaningful as possible. She encourages students to explore tolerance by identifying important differences and similarities between
  the country they visited and the United States. Finally, she completes a reflection form with the top three things that she learned and wants to share with her families.
