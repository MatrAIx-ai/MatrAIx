persona_description: A materials scientist who specializes in the study of thin films and their properties, particularly the properties of copper oxide thin films. They are interested in the effects of
  doping copper oxide thin films with lithium and how it affects the properties of the films. They are looking for ways to improve the transducers and wedges used for studying the films, and they are interested
  in the potential applications of the films in solar cell fabrication.
