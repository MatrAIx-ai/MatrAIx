  hobbies: '["Reading historical fiction and African American literature","Gardening (vegetable and herb garden)","Cooking soulful Southern dishes with a health focus","Gentle yoga and mindfulness meditation","Journaling","Small‑group
    book club","Listening to jazz and blues","Volunteering for adult literacy programs"]'
  career_goals: Kennisha aims to attain tenure and eventually serve as department chair, where she can champion inclusive curricula and expand mentorship programs for junior faculty. She aspires to develop
    a community partnership initiative that links the college with local cultural organizations, creating experiential learning opportunities for students. Long‑term, she hopes to author a textbook on culturally
    responsive teaching in higher education and lead workshops on diversity, equity, and inclusion across regional institutions.
