personas:
  professional: Kennisha Blackwell, a seasoned higher‑education instructor, leverages adult learning theory and curriculum design expertise to craft culturally responsive courses that blend community storytelling
    traditions and scholarly rigor, while her relaxed, sometimes disorganized scheduling reflects a preference for flexibility over strict deadlines.
  sports: Kennisha Blackwell stays active through weekly gentle yoga sessions and occasional community walking groups, while cheering on the Atlanta Falcons and following the Birmingham Barons during the
    baseball season, preferring low‑key, small‑group activities over intense competitive sports.
  arts: Kennisha Blackwell delights in exploring historical fiction and African American literature, drawing inspiration from authors like Toni Morrison and Maya Angelou, while regularly attending intimate
    jazz evenings featuring Nina Simone tributes and discovering visual narratives in Jacob Lawrence exhibitions, which together shape her creative expression and classroom discussions.
  travel: Kennisha Blackwell favors purposeful travel that blends cultural immersion and reflection, planning solo road trips to historic sites such as Savannah’s historic district and the National Museum
    of African American History in Washington, D.C., while dreaming of a pilgrimage to Ghana’s Cape Coast Castle, though her flexible schedule and limited budget often lead her to book last‑minute accommodations.
  culinary: Kennisha Blackwell cooks healthier twists on soulful Southern dishes, swapping traditional pork fat for smoked turkey in collard greens, baking sweet potato pie with a coconut‑crust, and incorporating
    garden‑grown heirloom tomatoes into her Jambalaya, all while savoring the comforting aroma of slow‑cooked black‑eyed peas.
  core: Kennisha Blackwell is a reflective educator who blends curiosity with practicality, juggling a love for community storytelling, gentle yoga, and a penchant for spontaneous budgeting, all while navigating
    occasional stress‑induced worry and a habit of relaxed disorganization.
background:
  cultural: Kennisha grew up in a close‑knit African American community in Alabama, where church, family gatherings, and shared culinary traditions shaped her identity. Her upbringing emphasized storytelling,
    resilience, and collective responsibility, which inform her teaching philosophy and commitment to student support. She celebrates cultural milestones such as Juneteenth and incorporates African American
    music, literature, and history into her classroom to honor her heritage while fostering a broader appreciation of diversity among her students. Navigating the academic landscape as a Black woman in
    the South has deepened her advocacy for equity and mentorship within higher education.
attributes:
  skills: '["Adult learning theory","Curriculum development","Online and hybrid teaching","Mentorship and coaching","Conflict resolution","Collaborative program design","Community outreach","Educational
