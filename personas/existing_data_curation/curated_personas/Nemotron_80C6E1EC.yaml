  career_goals: Jibrail aims to transition into a senior leadership role such as Director of Supply Chain or Head of Logistics Innovation where he can steer large-scale, environmentally responsible initiatives.
    He is driven to embed cutting-edge technologies—like AI-enhanced forecasting and blockchain traceability—into the logistics network of a forward-thinking organization. He also aspires to mentor emerging
    logisticians, particularly those from under-represented backgrounds, and to publish thought-leadership pieces that bridge logistics theory with artistic and philosophical perspectives. Ultimately, he
    seeks to leave a legacy of a more resilient, humane, and creatively engineered supply chain ecosystem.
