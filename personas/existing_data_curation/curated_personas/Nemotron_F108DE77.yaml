personas:
  professional: Larry Wells, a 66‑year‑old self‑taught visual artist and writer, channels a lifelong habit of philosophical reading into abstract oil paintings that examine memory and time, while their
    love of novelty and relaxed approach to obligations leads to a spontaneous, unstructured studio routine that blends gardening, woodworking, and occasional digital photography.
  sports: Larry Wells enjoys leisurely birdwatching walks through the nearby nature preserve and attends weekly yoga sessions at the community center, while cheering on the River City Rapids baseball team
    each summer and playing in a senior softball league that meets on Saturdays.
  arts: Larry Wells immerses themselves in avant‑garde jazz legends like Ornette Coleman and ambient soundscapes by Brian Eno while sketching watercolor studies inspired by Mark Rothko’s color fields, and
    regularly attends poetry readings featuring Emily Dickinson at the town’s historic library.
  travel: Larry Wells prefers low‑key, small‑group travel itineraries, often joining art‑focused tours to Santa Fe’s galleries, weekend retreats in Asheville’s Blue Ridge Mountains, and occasional day trips
    to Chicago’s Art Institute, balancing a love of visual culture with a desire for quiet reflection.
  culinary: Larry Wells delights in cooking garden‑fresh dishes such as rosemary‑infused roasted carrots and a fragrant ratatouille, while occasionally experimenting with edible pigments for artistic plating
    and sipping chamomile tea while reviewing their latest sketchbook.
  core: Larry Wells is a 66‑year‑old wandering mind of an artist who paints memories on canvas, worries about that next bill, forgets to water the houseplants, yet finds peace in a daily cup of tea and
    the soft hum of ambient jazz.
background:
  cultural: Larry was raised in a modest, middle‑class white family in the Midwest, with roots in German and Irish ancestry. Growing up in the suburbs of Chicago, he absorbed the region’s values of self‑reliance,
    community involvement, and a pragmatic work ethic, even though he left high school before earning a diploma to support his family. His marriage and life in Burbank, Illinois, reflect a strong attachment
    to small‑town culture, local church gatherings, and neighborhood camaraderie. While he does not identify with any particular ethnic tradition, his worldview is shaped by Midwestern sensibilities—plainspoken,
    modest, and appreciative of everyday creativity—combined with an enduring curiosity for art and abstract ideas.
