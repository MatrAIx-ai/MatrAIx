personas:
  professional: George Gowin, a retail salesperson in a small-town hardware store, leverages meticulous inventory control, calm customer service, and spreadsheet-driven reporting to design logical store
    layouts and resolve issues with measured respect, aiming to climb to assistant manager by channeling their disciplined, harmony-seeking work ethic.
  sports: George Gowin enjoys weekend hikes on the Maquoketa Caves trail, plays pickup basketball at the local community center, follows the Iowa Hawkeyes football team and the Des Moines Men's Soccer Club,
    and pitches for the adult softball league 'Olds Harvesters,' and they balance low-key activity with a steady, disciplined fitness routine.
  arts: George Gowin channels their love of craftsmanship into building model railways and woodworking while finding inspiration in the photography of Ansel Adams, the folk storytelling of John Prine, and
    the piano ballads of Norah Jones, and they often attend the county fair's live-music stage to hear local bluegrass groups.
  travel: George Gowin prefers meticulously planned road trips, having explored Chicago's museums and Mackinac Island's horse-drawn streets, and they now plan a family-friendly drive to Yellowstone National
    Park, balancing their modest budget with a desire to capture sunrise vistas for their photography.
  culinary: George Gowin, a competent home cook, favors hearty Midwestern fare like pork tenderloin with apple chutney, butter-baked corn casserole, and honey-glazed carrots, and they often source fresh
    heirloom tomatoes and locally harvested herbs to create precise, comforting meals for family gatherings.
  core: George Gowin blends Midwestern steadiness with obsessive organization, trading late-night model-railway sessions for early-morning spreadsheets, and they quietly conquer life's puzzles while keeping
    a spreadsheet of every receipt.
background:
  cultural: George grew up in Olds, a close‑knit farming community in Henry County, Iowa, immersed in Midwestern values of hard work, humility, and neighborly cooperation. His family participates in local
    church activities and community events such as county fairs and Thanksgiving gatherings. The town’s culture emphasizes practicality, self‑reliance, and a supportive social network, which shaped his
    preference for harmony, reliability, and a calm, resilient outlook on life. His limited college experience at a regional community college added exposure to business fundamentals while reinforcing his
    deep ties to his hometown.
attributes:
