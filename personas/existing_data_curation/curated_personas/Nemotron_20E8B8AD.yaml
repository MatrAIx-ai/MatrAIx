  hobbies: '[''Model railroading'', ''Woodworking'', ''Puzzle solving (Sudoku, crosswords)'', ''Reading non-fiction (self‑help, business)'', ''Hiking with small groups'', ''Nature photography'']'
  career_goals: George aims to advance from retail salesperson to assistant store manager within the next two years, leveraging his disciplined work ethic and organized approach. He plans to complete a
    bachelor’s degree in Business Administration to qualify for higher managerial roles, ultimately targeting a district manager position or the ownership of a small, community‑focused retail store in Olds.
    He is committed to creating efficient, harmonious work environments and values career stability that aligns with his preference for structure and predictability.
