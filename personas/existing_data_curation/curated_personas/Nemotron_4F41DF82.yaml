  career_goals: Patrick aims to earn a certified logistics and supply‑chain qualification within the next two years and move into a supervisory role overseeing a warehouse team. He hopes to develop expertise
    in process optimization so he can lead initiatives that reduce waste and increase throughput. Long‑term, he envisions starting his own regional freight and material‑moving service, leveraging his hands‑on
    experience and the network he builds in the Appalachian logistics corridor. He is also interested in furthering his education in supply‑chain management to complement his practical background.
