personas:
  professional: David Shepherd, a 33‑year‑old integrated pest‑management technician in Boulder, blends meticulous diagnostic expertise and eco‑friendly pesticide handling with a practical curiosity and
    calm assertiveness that lets them troubleshoot complex infestations while keeping client relationships smooth.
  sports: David Shepherd, an avid hiker of the Flatirons and a member of the Boulder Mountain Bikers club, follows the Denver Broncos and Colorado Rockies while they regularly log weekend rides on local
    trails and occasional trail‑run sessions with the Boulder Ultra Club.
  arts: David Shepherd, a wildlife photographer who favors macro shots of insects and small mammals, draws creative inspiration from Ansel Adams’ landscapes and the folk melodies of Fleet Foxes, while they
    apply the minimalist aesthetics of Scandinavian design to their woodworking projects.
  travel: David Shepherd, a meticulous planner of solo wilderness getaways, has trekked through Rocky Mountain National Park, Iceland’s volcanic trails, and New Zealand’s South Island, and they dream of
    backpacking Patagonia’s Torres del Paine while balancing a limited travel budget with their love for low‑impact adventure.
  culinary: David Shepherd, who brews their own Colorado Pale Ale, prefers hearty dishes like elk chili with beans, grilled trout seasoned with fresh sage, and occasionally experiments with a smoky campfire
    paella, though they often forget to thoroughly clean their brewing gear between batches.
  core: David Shepherd, a solitary outdoor enthusiast with a pragmatic curiosity, blends eco‑friendly pest control expertise, craft‑beer brewing, and meticulous planning—though they occasionally splurge
    on pricey camera lenses and forget to clean their brewing equipment.
background:
  cultural: David was raised in a middle‑class white family in the American Midwest, where self‑reliance, modesty, and a strong work ethic were emphasized. Relocating to Colorado in his early twenties exposed
    him to the state’s outdoors‑focused culture, valuing environmental stewardship and rugged individualism. His marriage and stable community ties reinforce traditional family values common in suburban
    Boulder County. He identifies with mainstream American cultural norms while also appreciating the local Colorado emphasis on nature, sustainability, and volunteerism.
attributes:
  skills: '["Pest identification", "Integrated pest management", "Pesticide application and safety", "Equipment maintenance", "Route planning and logistics", "Customer communication", "Regulatory compliance",
    "Electronic reporting", "First aid", "Basic entomology knowledge"]'
  hobbies: '["Hiking", "Mountain biking", "Camping", "Wildlife photography", "Woodworking", "Engine tinkering", "Reading (entomology, environmental science)", "Homebrewing", "Community trail maintenance
    volunteering"]'
  career_goals: David aims to obtain a Certified Pest Management Professional (CPMP) license and further specialize in eco‑friendly IPM, eventually moving into a supervisory or regional manager role within
    his company. In the longer term, he hopes to start his own boutique pest‑control firm focused on sustainable practices for residential clients in the Boulder area. He also plans to mentor new technicians
    and develop training modules on environmentally responsible pest control.
