    services'', ''Cultural competency with Latinx communities'']'
  hobbies: '[''Salsa and Merengue dancing'', ''Cooking traditional Dominican dishes'', ''Zumba and group fitness classes'', ''Volunteer tutoring at community centers'', ''Reading true crime and behavioral
    psychology books'', ''Exploring NYC cultural festivals'', ''Weekend hikes in upstate New York'']'
  career_goals: Bettsy aims to progress from frontline probation officer to a supervisory role where she can shape policy and program design across New York City’s correctional system. She plans to earn
    a Master’s degree in Social Work or Criminal Justice within the next three years, focusing on restorative justice and trauma‑informed care. Her long‑term ambition is to become a director of community‑based
    treatment programs, creating culturally tailored interventions for Dominican and other immigrant populations. She also aspires to serve on a citywide task force that revises risk‑assessment tools to
    reduce bias and improve reintegration outcomes. Ultimately, Bettsy envisions mentoring new officers, promoting a collaborative, compassionate workforce, and contributing to legislative reforms that
    prioritize rehabilitation over incarceration.
