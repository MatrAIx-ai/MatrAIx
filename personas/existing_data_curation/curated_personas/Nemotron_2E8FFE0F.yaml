personas:
  professional: Bettsy Mendoza is a bilingual probation officer in New York City who blends data‑driven risk assessment with compassionate case management, leveraging her criminal‑justice expertise and
    strong written communication to design culturally nuanced rehabilitation programs, and they consistently mentor junior staff while steering toward a future supervisory role.
  sports: Bettsy Mendoza energizes weekends with Zumba sessions, organized hikes in the Hudson Valley, and a place on a co‑ed recreational soccer team, while cheering for the New York Knicks and following
    the NYCFC, and they treat each activity as both a social rally and a personal fitness challenge.
  arts: Bettsy Mendoza immerses themselves in the city’s cultural pulse by dancing at salsa and merengue nights, attending gallery openings featuring artists like Kehinde Wiley and Tschabalala Self, and
    enjoying Broadway productions starring Lin‑Manuel Miranda, and they find creative inspiration that informs both their community work and personal expression.
  travel: Bettsy Mendoza prefers spontaneous weekend getaways that combine adventure and cultural immersion, such as hiking the Catskills, exploring the historic streets of Cartagena, revisiting family
    roots in the Dominican Republic, and they dream of trekking Patagonia’s Torres del Paine while balancing a busy work schedule.
  culinary: Bettsy Mendoza showcases culinary skill by preparing traditional dishes like mangú with sautéed onions, sancocho brimming with root vegetables, and plantain tostones for potlucks, while experimenting
    with Caribbean‑inspired tacos flavored with cilantro, lime, and habanero, and they find joy in sharing these meals with friends after dancing classes.
  core: Bettsy Mendoza blends a relentless zest for community dance, data‑driven probation work, and weekend cooking marathons, and they habitually juggle a notebook of case notes and recipes, a habit that
    sometimes leads to missed coffee breaks.
background:
  cultural: Bettsy is a first‑generation Dominican‑American raised in the Washington Heights neighborhood of Manhattan, a vibrant enclave of Dominican culture. Her parents emigrated from Santo Domingo in
    the early 1990s, instilling in her a deep appreciation for family, community, and the island’s musical and culinary traditions. Growing up bilingual, she celebrates Dominican holidays such as Independence
    Day and Día de los Héroes, and she regularly participates in church and neighborhood events that emphasize solidarity and mutual support. This cultural upbringing informs her professional ethos, driving
    her to advocate for immigrant clients and to incorporate Dominican values of respect, resilience, and collective responsibility into her casework. While fully integrated into the diverse fabric of New
    York City, Bettsy maintains strong ties to her heritage through language, food, dance, and community activism.
attributes:
  skills: '[''Risk assessment and case planning'', ''Crisis intervention and de‑escalation'', ''Conflict resolution and mediation'', ''Bilingual communication (English-Spanish)'', ''Community outreach and
