persona_description: A state governor who recognizes the importance of cybersecurity and its role in protecting critical infrastructure, national security, and daily operations of government. This governor
  is committed to working with the federal government to develop and implement innovative cybersecurity practices at the state level, including the use of state National Guard resources to defend critical
  infrastructure. This governor also anticipates that cybersecurity incidents may result in consequences triggering state emergency response processes and plans, and is actively seeking to identify resources
  states can bring to bear, including private and nongovernmental organizations within states, to improve cybersecurity preparedness.
