persona_description: A group of Mysore engineering students who have developed a device to help the visually-impaired by generating the embedding transducers in their shoes. The students have worked hard
  for six months to improve the quality of the gadget and have incorporated GPS and GSM systems to track and send the location of the disabled person to their tracking person caretaker (caretaker). The
  power required for operating the unit is obtained from the energy that is generated when the person walks. The durability of the model depends on the lifespan of the rechargeable battery used to store
  the energy from the piezoelectric sensors. The drawback in existing mobility aids is that they are less-efficient and less-accurate in detecting obstacles.
