    film screenings'', ''Book club (speculative fiction)'', ''Strategic board games'']'
  career_goals: John aims to advance from his current managerial role to a regional operations director position within the next five years, overseeing multiple locations and driving company‑wide efficiency
    initiatives. He plans to earn a professional certification in supply chain management (e.g., APICS CPIM) to solidify his expertise. Long‑term, he envisions launching his own boutique retail space that
    merges his love for art with curated merchandise, creating a community hub for emerging local artists. Additionally, he seeks to mentor emerging leaders within his organization, promoting disciplined
    innovation and competitive excellence.
