personas:
  professional: Maria May is a budding digital creator who combines her love for drawing, mixed‑media art, and Scratch programming to craft interactive story games, channeling her curiosity and competitive
    spirit into ambitious weekly projects.
  sports: Maria May is an enthusiastic forward on the Kenosha Youth Soccer League team, idolizing the Chicago Fire FC and training at the local park’s soccer fields with a competitive edge that drives them
    to win every weekend match, while also cheering for the nearby Milwaukee Brewers during baseball season.
  arts: Maria May is a fervent mixed‑media enthusiast who spends weekends sketching in the Kenosha Public Museum’s art studio, drawing inspiration from artists like Yayoi Kusama and Vincent van Gogh, and
    curates a personal gallery of painted rocks and shells displayed on their bedroom wall.
  travel: Maria May is an adventurous explorer who loves day trips to the Lake Michigan shoreline and the nearby state parks, has already visited Chicago’s Shedd Aquarium and dreams of a family road trip
    to the Grand Canyon and a future summer vacation in Iceland’s geysers.
  culinary: Maria May is a budding home chef who delights in making homemade pizza topped with fresh basil, mozzarella, and sliced cherry tomatoes, crafts creative snack bowls with popcorn, pretzels, and
    honey‑drizzled fruit, and often experiments with colorful frosting to decorate cupcakes after art class.
  core: Maria May is a curious, art‑obsessed 11‑year‑old who balances competitive soccer, LEGO building, and mixed‑media projects while occasionally neglecting homework in favor of late‑night gaming sessions.
background:
  cultural: Maria grew up in Kenosha, Wisconsin, a Midwestern city on the western shore of Lake Michigan. Her family’s heritage is primarily Northern European—German and Scandinavian—reflecting the cultural
    mix common in the region. The local culture emphasizes community involvement, modesty, a strong work ethic, and a love for outdoor recreation on the lake and in nearby parks. Kenosha’s vibrant arts
    scene, seasonal festivals, and environmental stewardship initiatives have nurtured Maria’s curiosity about nature and her appreciation for visual art. She attends a public elementary school that encourages
    both academic achievement and creative expression, and she participates in community events such as the Kenosha Street Art Festival and lake clean‑up projects, embodying the city’s Midwestern values
    of civic responsibility and respect for the environment.
