  career_goals: Maria dreams of combining her love for the Great Lakes ecosystem with her passion for visual art, aspiring to become a marine biologist who creates scientific illustrations, or a professional
    artist who highlights environmental themes. In the short term, she aims to win her school's science fair, contribute a mural to a community art project, and develop a simple interactive game in Scratch.
    Long‑term, she hopes to study environmental science and pursue a career that lets her explore, protect, and creatively represent nature.
