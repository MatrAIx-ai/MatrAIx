  career_goals: Suzan dreams of becoming a marine biologist who studies tide‑pool creatures and helps protect the Pacific coastline, a goal inspired by her frequent beach outings in San Diego. She also
    expresses an interest in teaching younger children how to explore nature, indicating a future as an elementary science educator. Additionally, she sometimes imagines working as a veterinarian to care
    for animals, showing a compassionate ambition to help living beings. Her career aspirations balance her curiosity about the natural world with a practical desire to make a positive impact on her community.
