personas:
  professional: Suzan Neyra, an aspiring marine biologist, combines her beach-side shell collecting and detailed sketching with a practical knack for organizing LEGO-built habitats and a curiosity-driven
    approach to fiddling with beginner robotics kits, showing how her balanced curiosity and practicality would shape a future career in marine research.
  sports: Suzan Neyra enjoys swimming lessons at the local Splash Kids pool and beginner soccer drills with the Seaside Strikers youth club, proudly cheering for the Los Angeles Dodgers during baseball
    season and the San Jose Earthquakes during soccer season, balancing structured practice with spontaneous backyard dance parties to pop music.
  arts: Suzan Neyra immerses herself in creative worlds by sketching marine life after reading the 'Magic Tree House' books, dancing to Ariana Grande’s pop hits, idolizing the whimsical art of Dr. Seuss
    and the vibrant paintings of Claude Monet, and crafting stories that blend Disney’s adventure spirit with her own LEGO-built characters.
  travel: Suzan Neyra loves family beach trips to the nearby Silver Cove shore, weekend hikes in Pine Ridge Park, and dreams of snorkeling among the coral reefs of Belize and exploring the giant red rocks
    of Monument Valley, preferring the comfort of organized itineraries while still leaving room for spontaneous seashell hunts.
  culinary: Suzan Neyra, a budding kitchen helper, delights in assembling cheesy macaroni, scooping crunchy fruit salads with strawberries and mangoes, and making fish sticks with a dash of lemon, though
    she often sneaks extra chocolate chips into pancake batter when her parents aren’t watching.
  core: Suzan Neyra is a curious, organized explorer who balances beach-side shell hunts with LEGO city building, yet can’t resist sneaking extra chocolate chips into breakfast.
background:
  cultural: Suzan grows up in a predominantly white, middle‑class family in San Diego, California. Her household celebrates traditional American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, while also incorporating local cultural influences from the nearby Mexican‑American community—she enjoys occasional family outings to attend the annual San Diego Latino Film Festival, tasting
    tacos and churros, and learning basic Spanish greetings. The coastal environment shapes her daily life, with frequent visits to La Jolla Cove and participation in community beach clean‑up events. Her
    family maintains a blend of European (Irish and German) ancestry traditions, such as baking gingerbread cookies at Christmas, which together create a multicultural yet distinctly Southern California
    upbringing.
