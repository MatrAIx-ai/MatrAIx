personas:
  professional: Max Ellis, a 28‑year‑old independent documentary producer and director, leverages their meticulous production planning, budgeting expertise, and educator‑style communication to craft socially
    thoughtful films about Southern life while imposing a rigid schedule that shields them from the unpredictability of collaborative chaos.
  sports: Max Ellis, who prefers solitude, reserves weekends for early‑morning hikes and bird‑watching with the Mississippi Outdoor Adventure Club, follows the Mississippi State Bulldogs football team for
    the camaraderie of college sport, and occasionally attends Memphis Grizzlies basketball games when the schedule aligns with their meticulously planned calendar.
  arts: Max Ellis channels their creative outlet through a small home studio where they experiment with Emmanuel Lubezki‑inspired lighting, study Laura Mulvey’s feminist film theory, compose acoustic renditions
    of Nick Drake songs, and curate a personal library of Southern‑themed documentaries ranging from Ken Burns’s Civil War series to the indie narrative short 'Midnight in the Garden.'
  travel: Max Ellis plans travel trips with a storyboard‑like precision, opting for solitary, research‑focused excursions to film‑friendly locales such as Savannah’s historic district, the misty hills of
    Asheville, and the Cannes Film Festival, while budgeting tightly to keep their production company’s capital intact.
  culinary: Max Ellis enjoys cooking low‑key Southern comfort meals like shrimp and grits and collard greens, often experimenting with a coffee‑rubbed pork belly or fresh rosemary‑infused quinoa, and unwinds
    by strumming a home‑grown basil and cilantro garnish into their weekend plates while sipping dark roast coffee.
  core: Max Ellis is a methodical 28‑year‑old filmmaker who channels solitary curiosity into meticulously budgeted documentaries, balances relentless productivity with anxiety‑driven perfectionism, and
    finds refuge in early‑morning hikes, acoustic guitar, and a strict spreadsheet.
background:
  cultural: Max grew up in a modest, middle-class family in the Mississippi Delta, steeped in Southern cultural traditions and a Protestant (Baptist) upbringing. His early life was shaped by community events,
    church gatherings, and a strong emphasis on storytelling and hospitality. The regional values of self-reliance, respect for tradition, and close-knit community ties inform his worldview, while his education
    degree reflects a commitment to knowledge sharing common in his cultural environment. Though now separated, he retains a connection to local customs, Southern cuisine, and the close-reading of regional
    literature, which often influences his creative work.
attributes:
