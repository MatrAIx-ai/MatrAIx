  hobbies: '[''Reading (film theory, Southern history, psychology)'', ''Scriptwriting'', ''Home cinematography and sound design'', ''Morning hikes and bird-watching'', ''Mindfulness meditation'', ''Journaling'',
    ''Acoustic guitar'']'
  career_goals: Max aims to become a recognized independent producer and director known for meticulously crafted, socially thoughtful documentaries and narrative shorts that explore the complexities of
    Southern life. He plans to establish his own production company within the next three years, focusing on projects that blend educational impact with compelling storytelling. He also seeks to leverage
    his education background to develop mentorship programs for aspiring filmmakers in Mississippi, positioning himself as both a creative leader and a community educator.
