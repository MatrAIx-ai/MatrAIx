personas:
  professional: A budding cultural heritage professional, Linda Southworth leverages their humanities research acumen, meticulous event‑planning skills, and digital media savvy to curate community‑driven
    art projects, while their outgoing nature fuels lively museum tours and collaborative grant‑writing initiatives.
  sports: Linda Southworth enjoys jogging with the Atlanta Track Club’s early‑morning group, passionately cheering for the Atlanta Hawks during basketball season, following the Atlanta Braves in spring,
    and playing weekend pick‑up volleyball at a local community center, all while balancing these activities with daily yoga sessions.
  arts: Linda Southworth immerses herself in the art world by sketching Atlanta’s street murals, attending openings featuring works by Kehinde Wiley and emerging local muralists, listening to Solange’s
    avant‑garde R&B while reading contemporary novels by Zadie Smith, and drawing inspiration from experimental theater productions starring Jeremy O. Harris.
  travel: Linda Southworth plans culturally immersive trips on a modest student budget, preferring weekend escapes to Savannah’s historic squares, road‑tripping through Asheville’s artsy neighborhoods,
    and an annual pilgrimage to New York City’s museum corridors, all while using public‑transit passes and booking hostels to stretch every dollar.
  culinary: Linda Southworth experiments in the kitchen by whipping up kimchi‑topped tacos, miso‑glazed eggplant, and turmeric‑infused lentil stew, pairing their love for bold flavors with a solid intermediate
    cooking skill set and often hosting themed dinner nights featuring locally sourced heirloom tomatoes and artisanal cheeses.
  core: Linda Southworth blends insatiable curiosity for art with a meticulous planner’s mind, turning every sketch, social gathering, and grant draft into a vibrant mosaic of community‑focused creativity,
    even if they sometimes over‑book their calendar and forget to water their houseplants.
background:
  cultural: Raised in a middle‑class, white family on the outskirts of Atlanta, Linda grew up immersed in Southern hospitality and a community that valued education and public service. Her childhood was
    enriched by the city's multicultural tapestry, exposing her to African‑American history, Southern cuisine, and the civic pride of the civil‑rights legacy. Family trips to regional festivals and frequent
    visits to the BeltLine art installations fostered an appreciation for diverse artistic expressions. While maintaining her Southern roots, she actively seeks out cross‑cultural experiences, forging friendships
    across varied backgrounds and integrating those perspectives into her academic and creative pursuits.
