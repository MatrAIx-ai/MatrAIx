  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Sketching urban scenes'', ''Photography of city life'', ''Reading contemporary literature'', ''Creative writing and essay drafting'', ''Attending
    live music and performance events'', ''Organizing community walking tours'', ''Volunteering at youth art workshops'', ''Practicing yoga'', ''Experimenting with themed cooking and hosting dinner parties'']'
  career_goals: Linda aspires to build a career at the intersection of cultural heritage and community engagement. She aims to pursue a master's in Museum Studies or Arts Administration, with a long‑term
    goal of becoming a curator or program director at a regional museum such as the High Museum of Art. In the short term, she plans to secure an internship in exhibition development, expand her grant‑writing
    capabilities, and launch a community‑driven pop‑up art series that highlights emerging local artists and underrepresented voices.
