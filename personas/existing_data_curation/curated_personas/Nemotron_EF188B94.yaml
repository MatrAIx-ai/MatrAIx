personas:
  professional: Kimberley Corley, a seasoned financial manager with over three decades of expertise in budgeting, cash‑flow analysis, regulatory compliance and risk oversight, channels their methodical,
    organized style into senior advisory work where they mentor emerging professionals, steer strategic planning with robust Excel models and SAP dashboards, and assertively guide cross‑functional teams
    toward clear, predictable outcomes.
  sports: Kimberley Corley avidly follows the Phoenix Suns and Arizona Cardinals, joins the Scottsdale Senior Trail Walkers for weekly desert hikes that balance low‑impact cardio with scenic tranquility,
    and participates in a community pickleball league treating the sport as a strategic social outlet akin to bridge.
  arts: Kimberley Corley finds solace in community theater, regularly attending productions of classic plays starring local talent like Susan Howard, appreciates the timeless scores of composer John Williams,
    and rereads historical fiction novels by authors such as Ken Follett, allowing these artistic pursuits to inform their strategic thinking and provide a graceful escape from spreadsheets.
  travel: Kimberley Corley enjoys purposeful travel, having explored the red rock canyons of Sedona, the cultural museums of Santa Fe, and a tranquil retreat in Kyoto while planning future trips to the
    Amalfi Coast and New Zealand’s South Island, always balancing a modest travel budget with a desire for immersive cultural experiences.
  culinary: Kimberley Corley takes pride in preparing a buttery herb‑roasted turkey with sage and rosemary, honey‑glazed ham, sweet‑potato casserole and pumpkin pie for holiday feasts, often sourcing fresh
    vegetables from their own garden and seasoning dishes with locally grown cilantro, thyme and jalapeño for a personalized touch.
  core: Kimberley Corley is a meticulous financial sage who gardens, bridges and plans neighborhood literacy workshops with the same disciplined precision they apply to budgeting yet occasionally loses
    track of time on crosswords and over‑stocks garden seed packets.
background:
  cultural: Kimberley identifies as a White American whose family lineage includes English and German ancestry. Raised in a suburban Midwestern environment, she carries forward traditions such as celebrating
    Thanksgiving, Christmas, and Fourth of July with close family gatherings. After relocating to North Las Vegas, she has embraced local customs, including community festivals and desert outdoor activities,
    while maintaining active involvement in her local Methodist church. Her cultural outlook blends mainstream American values of independence and self-reliance with a strong emphasis on community service
    and family cohesion.
attributes:
  skills: '["Financial Planning", "Budget Management", "Cash Flow Analysis", "Regulatory Compliance", "Risk Management", "Investment Portfolio Oversight", "Strategic Planning", "Process Improvement", "Team
