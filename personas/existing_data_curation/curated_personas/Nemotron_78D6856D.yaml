  hobbies: '[''Hiking and Nature Walks'', ''Cooking Traditional Mexican Cuisine'', ''Listening to Music (Latin and Pop)'', ''Travel Reading and Cultural Exploration'', ''Photography'', ''Community Volunteering
    and Mentoring'']'
  career_goals: In the short term, Caridad aims to obtain a full Commercial Driver’s License (CDL) and complete a certification program in supply chain logistics while continuing her college coursework
    toward an associate’s degree in Business Administration or Logistics. She plans to gain deeper experience as a delivery driver and sales associate. Mid‑term, she hopes to become a logistics coordinator
    for a regional distribution center, overseeing route optimization and driver scheduling. Long‑term, she aspires to launch her own transport and logistics company serving the Mid‑Atlantic region, employing
    other young drivers and offering community‑focused services such as delivering goods to local farms and senior homes. She also intends to earn a bachelor’s degree in Supply Chain Management and mentor
    other Hispanic youth entering the transportation field.
