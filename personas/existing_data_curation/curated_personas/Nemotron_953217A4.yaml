personas:
  professional: Jacqueline Harville, an aspiring junior wildlife illustrator, blends their curiosity about animals with a disciplined approach to sketching, producing watercolor drawings that delight classmates
    and teachers alike.
  sports: Jacqueline Harville, a lively midfielder on the Oakwood Elementary soccer team, balances daily drills with cheering for the nearby Springfield Sluggers baseball club and revels in weekend hikes
    through the woods, showcasing that they have boundless energy and a strong sense of teamwork.
  arts: Jacqueline Harville, a passionate young artist, spends afternoons painting watercolor forest animals while drawing inspiration from Frida Kahlo’s bold colors and Van Gogh’s swirling skies, and they
    delight in shaping clay figurines at the community summer art camp.
  travel: Jacqueline Harville, an adventurous eight-year-old, enjoys weekend excursions to the nearby state park for leaf‑collecting, has explored the city science museum, and they dream of visiting the
    Grand Canyon and the dinosaur fossils of Dinosaur National Monument.
  culinary: Jacqueline Harville, a budding kitchen helper, loves kneading chocolate‑chip cookie dough, experimenting with apple‑cinnamon muffins, and adding bright green food coloring to cupcakes, though
    they sometimes forget to clean up the flour mess afterward.
  core: Jacqueline Harville, a curious eight-year-old with a sketchpad in one hand and a soccer ball in the other, balances art, sport, and a love for nature while they occasionally forget to finish homework
    during leaf‑collecting adventures.
background:
  cultural: Jacqueline is raised in a white, Southern‑American household in Dublin, Georgia, a small town with close‑knit community values. Her family participates in local traditions such as church gatherings,
    Fourth of July parades, and high‑school football tailgates. The region’s emphasis on hospitality, community service, and respect for nature influences her caring demeanor and desire to help others.
    While she enjoys Southern comfort foods and folk music, she also embraces broader cultural experiences through school art programs and library resources that expose her to diverse ideas and creative
    expressions.
attributes:
  skills: '["Drawing and coloring", "Reading comprehension (fiction and non‑fiction)", "Basic Scratch coding", "Team sports (soccer)", "Singing in school choir"]'
  hobbies: '["Drawing and painting", "Reading (fiction and science books)", "Outdoor nature exploration", "Soccer", "Dancing", "Baking with family", "Art camp activities (pottery, clay)"]'
  career_goals: Jacqueline dreams of a future where she can combine her love for animals, art, and discovery. She imagines becoming a veterinarian who helps sick pets, an environmental artist who paints
    to raise awareness about nature, or an astronaut exploring space. At the moment, she enjoys planning a “pet‑care club” at school and wants to earn more stickers on her reading chart to become a “young
    scientist”. Her long‑term ambition is to use her creativity and curiosity to make the world a kinder place.
