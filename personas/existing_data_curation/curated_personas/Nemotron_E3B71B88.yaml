    and crocheting'', ''Watching telenovelas'', ''Listening to mariachi music'']'
  career_goals: Although retired from formal employment, Zugeily aims to solidify her legacy as a community cultural historian. She plans to compile her family’s migration story and the broader Mexican-American
    experience in Elmwood Park into a published memoir and a series of short videos for the local senior centre. She also aspires to expand the annual heritage festival, adding a cooking competition where
    she can showcase her recipes and mentor younger participants. Learning advanced digital tools, such as photo-editing and podcast production, is a personal ambition that will help her document oral histories
    and share them online. Maintaining her health and independence remains a priority, so she has set a goal to complete a “Senior Fitness” program and to travel to her hometown in Mexico for a family reunion
    within the next two years.
