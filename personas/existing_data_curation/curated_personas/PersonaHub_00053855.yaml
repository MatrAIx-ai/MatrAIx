persona_description: 'A historian and author who specializes in the study of economic policy and segregation in urban communities. His latest book, "The Color of Law: The Forgotten History of How the Government
  Segregated America," is a comprehensive analysis of how government intervention during the New Deal era created segregation in urban communities. He attributes de facto segregation as a cause for the
  present state of America''s educational system and continued institutional segregation, and maintains that governmental institutions are the primary reason for segregation, especially in schools. He is
  a former columnist for The New York Times and a fellow at the Thurgood Marshall Institute of the NAACP Legal Defense Fund. He is also a fellow of the Haas Institute at the University of California-Berkeley.'
