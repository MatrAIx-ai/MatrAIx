  hobbies: '[''DIY truck repairs'', ''fishing'', ''watching Colts and Hoosiers games'', ''jogging in White River State Park'', ''building model cars'', ''playing strategy video games'', ''listening to classic
    rock'', ''attending the Indiana State Fair'']'
  career_goals: Thomas aims to advance from a laborer to a supervisory role within the next three years, targeting a shift lead or safety officer position. He plans to complete a certified forklift operator
    program and attend an OSHA 30‑hour training course to strengthen his credentials. In the longer term, he dreams of owning a small logistics or moving company that emphasizes safety and reliability,
    leveraging his competitive drive to carve out a niche in the Indianapolis market. He also hopes to develop better coping strategies for his anxiety, possibly by integrating regular exercise and professional
    counseling into his routine, which he believes will enhance his leadership capacity.
