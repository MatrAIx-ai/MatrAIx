  career_goals: Christopher aspires to pursue a degree in civil engineering or business administration, aiming to become a project manager who can design and oversee community infrastructure projects. He
    is motivated by the desire to apply his organizational strengths to tangible improvements in his hometown, such as building recreational facilities or improving local roadways. He also envisions earning
    a scholarship for a technical program and, in the longer term, possibly joining a structured service like the Army Reserve to blend discipline with community service.
