  hobbies: '[''Gardening'', ''Cooking and baking'', ''Reading mystery novels'', ''Crossword puzzles and Sudoku'', ''Walking in local parks'', ''Volunteering at senior center'', ''Attending church services
    and choir'', ''Knitting and crocheting'', ''Playing bingo'']'
  career_goals: Although retired, Doris aims to deepen her impact in the Orlando senior community. She plans to launch a weekly cooking class at the senior center that blends structured recipes with participants’
    personal twists, hoping to be recognized as a go‑to culinary mentor for retirees. She also intends to finalize and distribute a concise budgeting and stress‑reduction booklet tailored for seniors, seeking
    publication through the county’s aging services department. Doris is enrolling in a community college’s basic computer literacy course to keep pace with new digital tools, allowing her to assist peers
    in navigating telehealth and online banking. Additionally, she aspires to win the annual senior‑center bingo championship, reflecting her competitive spirit, and to travel to at least three Florida
    state parks each year to maintain an active lifestyle.
