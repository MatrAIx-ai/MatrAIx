personas:
  professional: John Hall, a budding concept artist and strategic gamer, channels their methodical planning and love for sci‑fi narratives into detailed sketches of characters and draft level designs for
    indie video game projects they aspire to develop.
  sports: John Hall enjoys biking the Caddo Parish trails and hiking the nearby Kisatchie woods, follows the LSU Tigers football team and the New Orleans Pelicans basketball club with enthusiasm, and participates
    in a local youth soccer league on weekends.
  arts: John Hall, a sketch‑enthusiast who captures everyday moments with a phone camera, draws inspiration from the blues legends B.B. King and the jazz stylings of Louis Armstrong while listening to the
    acoustic covers of Ed Sheeran, and they regularly attend community art fairs where they display their own mixed‑media pieces.
  travel: John Hall prefers road‑trip adventures that blend planned itineraries with spontaneous stops, cherishes past visits to New Orleans for Mardi Gras festivities and a family weekend in Austin, Texas,
    and dreams of exploring the giant redwoods of Northern California when budget and school schedules allow.
  culinary: John Hall loves the aromatic richness of Cajun classics like gumbo and jambalaya, eagerly helps stir the roux during family cooking nights, and enjoys experimenting by adding a dash of smoked
    paprika to homemade shrimp tacos, though they occasionally burn the garlic when distracted by music.
  core: John Hall is a methodical, curiosity‑driven teen who balances sketching, strategic gaming, and community volunteering, while occasionally neglecting chores and forgetting to floss.
background:
  cultural: John grew up in Shreveport, Louisiana, within a White, Southern-American family that emphasizes community, family ties, and a strong work ethic. His upbringing includes participation in regional
    traditions such as Mardi Gras parades and local music festivals, where he is exposed to blues, jazz, and country sounds. Family meals often feature Cajun and Creole dishes like gumbo and jambalaya.
    He attends a public middle school that reflects the cultural diversity of Caddo Parish, providing him with exposure to a variety of perspectives. Though his family’s religious background is rooted in
    the Baptist tradition, they encourage curiosity and support his involvement in community activities such as library programs and city art fairs, fostering an appreciation for both his Southern heritage
    and broader artistic influences.
