  career_goals: Looking ahead, John aims to attend a magnet high school that offers robust visual-arts and STEM programs. He hopes to develop his artistic talent further and eventually pursue a career as
    a graphic designer, illustrator, or concept artist in the video-game or animation industry. He also envisions studying architecture or industrial design at university, where he can combine his love
    of art with his methodical problem-solving skills. Additionally, he wishes to use his organizational strengths to lead collaborative creative projects or mentor younger students in art clubs.
