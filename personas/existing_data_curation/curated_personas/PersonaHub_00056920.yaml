persona_description: A conservation biologist who specializes in the study of marine ecosystems and their interactions with human activities. He is particularly interested in the conservation of marine
  resources, particularly the lobster fishery, and has developed a keen eye for spotting and measuring undersized lobsters. He is a strong advocate for the development of uniform regulations for the lobster
  fishery, both at the state and federal levels. He is also interested in the impact of human activities on the lobster population and the potential for conservation measures to be effective in conserving
  the resource. He is a strong believer in the importance of enforcing regulations and is willing to work with other conservationists to develop and implement effective conservation measures.
