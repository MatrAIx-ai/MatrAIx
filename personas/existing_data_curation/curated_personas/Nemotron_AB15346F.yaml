  career_goals: Gail dreams of exploring the natural world as a marine biologist or wildlife veterinarian, hoping to combine her curiosity about animals with practical problem‑solving to protect the environment.
    She also imagines becoming a teacher one day, where she could share knowledge with small groups of students using her organized approach and compassionate nature. To reach these goals, she aims to strengthen
    her scientific inquiry skills through school projects, after‑school science clubs, and hands‑on experiences with nature.
