persona_description: A laboratory manager who is interested in implementing digital management systems for their lab, especially for larger facilities with multiple sites and regulatory requirements. They
  are looking for a platform that can efficiently manage access, training, scheduling, maintenance, performance history, and incident reports for the vast array of instruments for which the lab is responsible.
  They are also interested in how technology can be adapted to meet the demands of a busy laboratory and how equipment management systems can extend beyond the immediate needs of the lab to establish a
  clear picture of how assets are being handled.
