  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''DIY crafts and upcycling projects'', ''Community theater and live‑music events'', ''Swing and line dancing'', ''Group fitness
    classes (Zumba, aerobics)'', ''Hosting dinner parties'', ''Trivia nights and board‑game evenings'', ''Puzzle solving and escape rooms'', ''Volunteering at local festivals and art fairs'']'
  career_goals: Lorrin aims to translate her retail expertise into a supervisory or managerial position within the next three years, seeking a role that offers autonomy and the chance to mentor others.
    She plans to complete her remaining college credits toward an associate degree in business administration or arts management, giving her the credentials to transition into a community‑oriented arts
    role. Long‑term, she dreams of opening a small boutique or community art space where she can curate local artwork, host hands‑on workshops, and sell handcrafted items, blending her love of art with
    her people‑focused, competitive drive for recognition and success. She is motivated to become a respected leader who balances operational efficiency with creative, flexible work environments.
