personas:
  professional: Lorrin Gehling leverages a decade of front‑line retail experience—expertise in POS, cash handling, inventory management and conflict resolution—to mentor staff and streamline store operations,
    and they channel their spontaneous, critical, and competitive nature into innovative, people‑focused process improvements that position them for a managerial role in a creative retail setting.
  sports: Lorrin Gehling embraces an eclectic fitness routine that includes weekly Zumba classes, line‑dancing at community events, and Saturday morning jogs with the Run St. Louis club, while passionately
    rooting for the St. Louis Cardinals, St. Louis Blues, and St. Louis City SC, and they occasionally play casual badminton at a local recreation center.
  arts: Lorrin Gehling immerses themselves in the St. Louis arts scene by frequenting the Contemporary Art Museum, the Pulitzer Arts Foundation, and live jazz nights featuring saxophonist Hamiet Bluiett,
    while painting urban landscapes in a home studio, sketching street murals inspired by local painter David Bradley, and they curate DIY upcycling workshops that blend community, competition, and spontaneous
    creativity.
  travel: Lorrin Gehling favors spur‑of‑the‑moment weekend getaways that mix art‑focused exploration with social fun—road‑tripping to Kansas City’s Crossroads Arts District, Nashville’s music venues, or
    the vineyards of Missouri’s Hermann area—while dreaming of an extended cultural immersion in Barcelona’s street‑art scene and Parisian galleries, and they budget these adventures carefully within a
    dedicated travel fund alongside their savings plan.
  culinary: Lorrin Gehling delights in preparing hearty Missouri BBQ ribs glazed with apple‑cider‑brown sugar sauce, whipping up fresh beet‑and‑goat‑cheese salads with arugula and toasted walnuts, experimenting
    with upcycled pantry staples like chickpea‑flour flatbread, and they savor occasional fine‑dining nights featuring pan‑seared duck breast with a cherry‑balsamic reduction, reflecting a blend of comfort
    cooking, adventurous palate, and community‑focused dinner parties.
  core: Lorrin Gehling is a socially driven, art‑obsessed retail veteran whose spontaneous, competitive drive fuels both meticulous store leadership and eclectic creative pursuits, all while juggling a
    love of community events and occasional indulgent splurges, and they constantly seek the next opportunity to blend commerce with canvas.
background:
  cultural: Lorrin grew up in a middle‑class white family in Arnold, Missouri, steeped in Midwestern values of friendliness, practicality, and community involvement. Her upbringing included regular church
    attendance, family gatherings, and participation in local events, which fostered a strong work ethic and a modest, down‑to‑earth outlook. Proximity to St. Louis exposed her to a vibrant cultural landscape—museums,
    theaters, and music venues—that nurtured her curiosity for visual and performing arts. While her heritage reflects the German‑Irish ancestry common in the region, she identifies most with the inclusive,
    community‑focused spirit of the Jefferson County area, blending traditional Midwestern customs with an appreciation for creative expression.
