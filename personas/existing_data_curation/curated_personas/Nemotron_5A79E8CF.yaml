personas:
  professional: Rebecca Whittemore is a veteran retail sales specialist who leverages meticulous inventory control, calm conflict resolution, and a curiosity for visual arts to design eye-catching displays,
    mentor new associates, and they advocate for a store-wide art corner—all steps toward their goal of becoming a manager who can launch a community-focused boutique.
  sports: Rebecca Whittemore enjoys low-impact weekend walks along the Ohio River, plays weekly pickleball with the Evansville Riverfront Club, cheers enthusiastically for the Evansville Otters baseball
    team and follows the Indianapolis Colts during football season, and they treat themselves to occasional yoga classes to stay flexible.
  arts: Rebecca Whittemore spends their free time curating visits to regional galleries featuring works by Georgia O'Keeffe and Indiana photographer Maya Jones, attends community theatre productions of
    classics like 'Our Town' starring local actor Thomas Greene, practices watercolor painting inspired by Claude Monet, experiments with digital photography of river sunsets, and they admire the ceramic
    techniques of contemporary potter Wendy Berger.
  travel: Rebecca Whittemore prefers carefully planned weekend road trips that combine scenic river drives with cultural stops, having explored Charleston's historic district, the vineyards of Napa Valley,
    and the art festivals of Santa Fe, while budgeting each journey to preserve funds for their upcoming boutique and they often travel with a small group of fellow art enthusiasts.
  culinary: Rebecca Whittemore, an adept home cook, delights in preparing herb-roasted chicken glazed with wildflower honey, sauteed Indiana greens with garlic and heirloom tomatoes, and often enjoys farm-to-table
    bistros where they savor pork tenderloin with apple compote, always finishing dishes with fresh basil and a drizzle of extra-virgin olive oil.
  core: Rebecca Whittemore is a calm, curiosity-driven retail veteran who balances meticulous budgeting with spontaneous art-supply splurges, tends to their native wildflower garden before sunrise, and
    they habitually sketch store layout ideas in a pocket notebook while waiting in line.
background:
  cultural: Rebecca grew up in a middle‑class white family in southern Indiana, where Midwestern values of diligence, modesty, and neighborly responsibility are deeply rooted. Her upbringing emphasized
    community involvement, regular church attendance, and appreciation for local traditions such as county fairs and high school sports. These influences have nurtured her cooperative spirit, reliability,
    and a calm resilience that is characteristic of the region. While she respects these cultural norms, her personal curiosity drives her to seek out artistic and unconventional experiences beyond the
    typical Indiana lifestyle.
attributes:
  skills: '[''Customer Service'', ''Sales and Upselling'', ''POS System Operation'', ''Inventory Management'', ''Visual Merchandising'', ''Conflict Resolution'', ''Staff Training and Mentoring'', ''Basic
    Bookkeeping'', ''Digital Photography'', ''Community Event Coordination'']'
  hobbies: '[''Visiting Art Galleries'', ''Community Theatre Performances'', ''Watercolor Painting'', ''Digital Photography'', ''Native Wildflower Gardening'', ''Historical Fiction Book Club'', ''Volunteering
    at Riverfront Festival'', ''Pottery Classes'']'
  career_goals: Rebecca aims to progress into a store management role where she can shape team culture, streamline operations, and introduce a dedicated art‑focused corner that showcases local artists'
    work. She is passionate about creating a mentorship program for young retail staff and hopes to eventually launch a small boutique that blends her love for art, handcrafted goods, and community storytelling.
    In the longer term, she envisions contributing to the Evansville arts council by organizing pop‑up exhibitions within commercial spaces.
