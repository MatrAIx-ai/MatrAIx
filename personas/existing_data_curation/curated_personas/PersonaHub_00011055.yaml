persona_description: A historian who specializes in the study of colonialism, particularly the impact of colonial violence on African, Turkish, and Tartar populations in the 18th century. She has a deep
  understanding of the history of the Dutch-Prussian relations and the involvement of Brandenburg-Prussia in the transatlantic slave trade. She is also knowledgeable about the history of the Netherlands,
  the Dutch quarter in Potsdam, and the history of Chinese presence in Potsdam. She has a passion for critical reworking of traditional figures and practices and has successfully addressed the issue of
  blackface in the Netherlands. She has a deep understanding of the history of the Potsdam agglomeration, the colonial genealogy of botanical gardens, and the workings of colonial capital and globalization.
  She is also knowledgeable about the history of the Babelsberg film studios and the history of the palace Sans-Souci. She has a deep understanding of the Audio-Guide and has collected recommendations from
  workshop participants and critical observer Nouria Asfaha from the organization Each One Teach One.
