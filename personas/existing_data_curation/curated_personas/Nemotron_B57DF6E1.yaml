personas:
  professional: Fernando Sanchez, a 13‑year‑old budding robotics enthusiast, combines their knack for precise planning with a love for strategic video games, building and programming small autonomous bots
    for their middle‑school engineering club while dreaming of entering national STEM competitions, and they often spend evenings debugging code after soccer practice.
  sports: Fernando Sanchez, a disciplined midfielder for the St. George Youth Soccer Club, also hikes the Wasatch local trails on weekends, proudly cheers for the Utah Jazz, and they participate in a junior
    snow‑boarding club during the winter months.
  arts: Fernando Sanchez, who draws vibrant comic strips inspired by Marvel heroes and classic sci‑fi novels, vibes to Los Tigres del Norte corridos and pop hits from Billie Eilish, and they regularly showcase
    a folk dance performance at the community cultural festival.
  travel: Fernando Sanchez, having camped at Zion National Park with their family and visited their grandparents in Guadalajara for the holidays, prefers road‑trip adventures plotted on Google Maps, balancing
    school obligations with a yearning to explore the ancient ruins of Chichén Itzá when older, and they often dream of future study abroad trips.
  culinary: Fernando Sanchez, experimenting in the kitchen with their abuela, often perfects recipes for tacos al pastor, homemade tamales, and spicy salsa verde, while also mastering pepperoni pizza for
    their friends after soccer practice, and they love sharing the finished dishes at community gatherings.
  core: Fernando Sanchez, a methodical 13‑year‑old who blends a passion for robotics, soccer teamwork, and family tradition, spends evenings drawing comics, saves allowance for gadgets, and they secretly
    hoard extra game credits despite a habit of putting off chores.
background:
  cultural: Fernando grows up in a bilingual Mexican‑American household in Washington County, Utah. His parents preserve Mexican traditions—celebrating Día de los Muertos, Las Posadas, and cooking festive
    tamales—while also embracing the outdoors and community spirit of the Intermountain West. He speaks Spanish at home and English at school, navigating a bicultural identity that values family cohesion,
    respect for elders, and communal responsibility. Participation in a local Latino student association and regular visits to his extended family keep him connected to his heritage, shaping his worldview
    and informing his desire to give back to both his cultural community and his broader hometown.
