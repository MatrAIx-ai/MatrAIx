  career_goals: Short‑term, Fernando aims to graduate high school with honors, expand his robotics experience, and earn a summer internship with a local engineering or tech firm. He plans to pursue a bachelor's
    degree in engineering—preferably biomedical or mechanical—so he can design affordable health‑care devices that benefit underserved Latino communities. Long‑term, he envisions leading multidisciplinary
    projects that blend technology, community outreach, and his cultural heritage, while also mentoring younger bilingual students to pursue STEM pathways.
