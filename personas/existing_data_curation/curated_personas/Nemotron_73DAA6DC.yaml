personas:
  professional: Donald Stokes, an aspiring quality‑assurance engineer fresh out of a STEM bachelor’s program, leverages their strong Python, MATLAB, and SolidWorks skills to build reliable test protocols
    while channeling their competitive streak and need for routine into meticulous documentation and data‑driven process improvements.
  sports: Donald Stokes, a dedicated gym regular and weekend jogger along the Scioto Mile, follows the Ohio State Buckeyes football and the Cleveland Browns, occasionally joins a local recreational basketball
    league, and treats weight training as both a structured workout and a disciplined outlet for their competitive energy.
  arts: Donald Stokes, an avid fan of science‑fiction novels like "The Expanse" and "Dune", enjoys listening to classic rock bands such as The Eagles while building model aircraft, and regularly participates
    in board‑game nights featuring strategy games like Settlers of Catan, all of which satisfy their need for structured creative engagement.
  travel: Donald Stokes, a budget‑conscious traveler, prefers short, well‑planned road trips to nearby cities such as Chicago, Indianapolis, and Nashville, enjoys exploring local breweries and historical
    sites, but dreams of a future solo backpacking adventure through the national parks of the Pacific Northwest once their career stabilizes.
  culinary: Donald Stokes, a competent home cook, loves grilling classic backyard barbecues—think burgers, chicken wings, and corn on the cob—while experimenting with a dash of smoked paprika and homemade
    BBQ sauce, and often pairs their meals with a cold craft lager from a local Ohio brewery.
  core: Donald Stokes, a pragmatic 21‑year‑old who channels their intense anxiety and competitive nature into structured gaming marathons, methodical model building, and disciplined workouts, while occasionally
    over‑spending on tech gear and obsessively tracking their routines.
background:
  cultural: Donald grew up in a middle‑class suburban family in Columbus, Ohio, steeped in Midwestern values that emphasize practicality, self‑reliance, and community responsibility. His ancestry is primarily
    Northern European—German and Irish—reflected in family traditions such as holiday gatherings, backyard barbecues, and strong support for local high school and Ohio State sports. Raised within a Protestant
    (United Methodist) environment, he was taught the importance of routine, discipline, and accountability. The region’s modest, work‑oriented culture shaped his preference for stable, practical careers,
    while seasonal outdoor opportunities fostered an appreciation for activities like hiking and occasional fishing, which he engages in selectively as a means of stress relief.
