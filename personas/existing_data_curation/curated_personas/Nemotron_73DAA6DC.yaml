  career_goals: Donald aims to secure a stable, entry‑level position that offers clear routines and predictable expectations, such as a quality‑assurance engineer or data analyst at a well‑established manufacturing
    firm in the Columbus area. He seeks to build a career that balances structured responsibilities with modest flexibility, allowing him to apply his analytical strengths while maintaining a schedule that
    helps manage his anxiety. In the next few years, he plans to obtain a professional certification (e.g., Six Sigma Green Belt or AWS Cloud Practitioner) to boost his marketability. Long‑term, he aspires
    to become a reliable senior specialist who mentors newer staff, stays within a competitive but collaborative environment, and contributes to process‑improvement initiatives that enhance efficiency and
    reliability.
