persona_description: A historian of science who specializes in the study of the transmission of knowledge from the Islamic Golden Age to the European Enlightenment, particularly the role of translations
  and the impact of the European intellectual awakening on the spread of knowledge. His research interests include the development of universities and libraries in Muslim Spain, the impact of the Spanish
  Inquisition on the transmission of knowledge, and the role of the Ottoman and Mughal empires in the decline of Muslim scholarship. He is particularly interested in the ways in which the separation of
  Islamic sciences from other branches of knowledge in the Islamic learning institutions contributed to the decline of Muslim scholarship and the subsequent rise of European intellectualism.
