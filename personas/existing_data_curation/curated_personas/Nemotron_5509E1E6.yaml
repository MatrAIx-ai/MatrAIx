  hobbies: '["gardening", "cooking", "potluck hosting", "quilting", "gospel choir", "reading local history", "crossword puzzles", "karaoke", "volunteering at food bank", "hiking in Red Rock Canyon"]'
  career_goals: Although retired, Tamika aims to deepen her impact in Pahrump by joining the board of the local senior center and establishing a community garden to provide fresh produce for low‑income
    families. She plans to complete a certificate in nonprofit management through a community college, write a cookbook that blends Southern soul‑food traditions with Nevada desert flavors, and continue
    mentoring younger women in organizational and leadership skills. Additionally, she hopes to advocate for senior services and expand volunteer training programs in her community.
