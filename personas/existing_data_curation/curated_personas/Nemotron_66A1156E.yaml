  hobbies: '[''Gardening'', ''Crossword Puzzles'', ''Chess'', ''Historical Fiction Book Club'', ''Volunteer Work at Local Historical Society'', ''Coastal Trail Hiking'', ''Yoga and Meditation'', ''Cooking
    New England Seafood'', ''Knitting'']'
  career_goals: Shirley aims to advance to a senior leadership position—ideally Director of Information Technology or Chief Operating Officer—where she can drive a company‑wide digital transformation that
    boosts efficiency and profitability. Over the next three years she plans to earn a Certified Scrum Master credential and lead a high‑visibility system‑integration project, showcasing her ability to
    align technology strategy with business goals. She also seeks to formalize a mentorship program for emerging women in tech within her organization, leaving a lasting legacy before transitioning to a
    part‑time consulting role as she approaches retirement in the next five to six years.
