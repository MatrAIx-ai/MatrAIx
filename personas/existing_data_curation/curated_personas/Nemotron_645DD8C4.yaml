personas:
  professional: David Cumberbatch, a budding LEGO architect, they meticulously follow instruction manuals and invent their own block designs, channeling their practical curiosity and methodical nature into
    every play‑construction session while eagerly sharing creations with Sunday school friends who gather around his small tabletop.
  sports: David Cumberbatch, an enthusiastic member of the Aledo Little Kickers soccer club, they dash across the field after school, cheer loudly for the Dallas Cowboys on Sunday afternoons, and treat
    organized playground games as a way to blend their energetic social spirit with structured teamwork.
  arts: David Cumberbatch, a bright‑eyed four‑year‑old who sings gospel choruses at Sunday services, they imitate Beyoncé's dance moves in the living room, and proudly display crayon drawings of their favorite
    cartoon heroes, weaving together musical tradition and contemporary pop culture into creative play.
  travel: David Cumberbatch, a curious traveler who loves weekend trips to the Dallas Zoo and family picnics at the Austin State Capitol gardens, they dream of riding the attractions at Disney World, preferring
    short, stroller‑friendly adventures that blend familiar church outings with the excitement of new sights.
  culinary: David Cumberbatch, a food‑loving four‑year‑old who eagerly devours smoky Texas barbecue ribs, comfort‑food mac & cheese, and freshly baked chocolate‑chip cookies, they insist on sprinkling cinnamon
    on their oatmeal and sipping homemade sweet tea from a kid‑size glass.
  core: David Cumberbatch is a lively, methodical four‑year‑old whose curiosity, love for community gatherings, and occasional worry blend into a charming mix of organized play, generous sharing, and a
    penchant for sweet treats and bright stickers, and they often brighten the room with endless energy.
background:
  cultural: David is part of an African American family rooted in Aledo, Texas. His household blends Southern traditions—like Sunday church services, family barbecues, and gospel music—with contemporary
    urban influences such as hip‑hop and R&B. Community events, church gatherings, and neighborhood celebrations reinforce values of kindness, cooperation, and shared heritage, shaping his social outlook
    and everyday experiences.
