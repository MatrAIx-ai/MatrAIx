persona_description: A team of scientists who specialize in the study of the placenta during pregnancy, particularly in understanding how the placenta functions and how it affects the delivery of vital
  nutrients to the baby. They use MRI scanning to gain detailed insights into the flow of blood through the placenta, the oxygenation of fetal blood, and the variations in flow and oxygenation in pre-eclamptic
  pregnancies. They are also interested in the purpose of the uteroplacental pump contractions and how they can help explain the smaller size and premature delivery of babies in pre-eclamptic pregnancies.
