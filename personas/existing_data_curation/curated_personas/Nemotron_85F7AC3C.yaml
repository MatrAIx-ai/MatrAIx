  career_goals: In the short term, Nanci aims to complete her associate degree in Business Administration or Communications and secure an entry‑level role in a nonprofit or community organization where
    she can apply her people‑focused skills. Long‑term, she envisions becoming a community outreach manager or human‑resources coordinator, leading inclusive programs and teams while maintaining a balance
    of predictable structure and occasional creative spontaneity. She also plans to pursue a bachelor's degree in Human Services to deepen her expertise and broaden career prospects.
