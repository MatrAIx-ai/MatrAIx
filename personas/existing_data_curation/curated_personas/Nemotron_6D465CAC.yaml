  hobbies: '[''Gardening'', ''Crocheting'', ''Book Club'', ''Community Theater'', ''Cooking Southern Cuisine'', ''County Fair Attendance'', ''Hiking'', ''Karaoke'', ''Volunteering at Church'']'
  career_goals: Rebecca aims to move into a supervisory or team‑lead role within her call‑center, where she can mentor newer agents and design training modules that balance tried‑and‑true techniques with
    fresh ideas. She is interested in gaining certifications in customer‑experience management and eventually launching a part‑time consulting service for small businesses in her county, helping them improve
    client interactions. Long‑term, she hopes to complete a GED and take evening courses in business communication to broaden her career options while maintaining the flexibility she values.
