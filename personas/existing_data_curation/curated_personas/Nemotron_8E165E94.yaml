  hobbies: '[''Gardening'', ''DIY home improvement'', ''Reading business non‑fiction'', ''Reading history'', ''Chess'', ''Fishing'', ''Community theater attendance'', ''Mentoring youth workforce program'']'
  career_goals: Boyd aims to advance from first‑line supervisor to district manager, overseeing multiple store locations and driving regional performance. He plans to earn a business management certificate
    from a community college to deepen his strategic and analytical capabilities. He also seeks to pilot innovative customer‑engagement initiatives, such as integrating e‑commerce solutions with brick‑and‑mortar
    operations, and to mentor emerging retail leaders as he prepares for a post‑retirement consulting role.
