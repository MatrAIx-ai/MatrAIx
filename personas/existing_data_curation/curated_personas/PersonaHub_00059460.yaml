persona_description: A meteorologist who specializes in the study of satellite interference caused by the Sun, particularly the effects on telecommunication and broadcast satellites. They are interested
  in the frequency of operation, antenna beamwidth, receiver bandwidth, acceptable signal to noise ratio, and level of solar activity at the time, and use the SWS online tool to calculate the dates and
  times of solar satellite interference. They have unique knowledge and skills in detecting and analyzing the interference caused by the Sun, and are able to provide accurate and useful information to satellite
  operators and researchers.
