  hobbies: '[''DIY home improvement projects'', ''Raspberry Pi and Arduino hobbyist electronics'', ''Restoring vintage furniture'', ''Kayaking on Lake Michigan'', ''Intramural basketball (competitive)'',
    ''Hiking local trails'', ''Strategy board games (e.g., Settlers of Catan)'', ''Reading sci‑fi & technical non‑fiction'']'
  career_goals: Sophia aims to earn a Certified Maintenance & Reliability Technician (CMRT) credential and later pursue a bachelor’s degree in facilities management, allowing her to transition from a general
    repair worker to a senior maintenance supervisor. She wants to lead a small team where she can maintain the flexibility she values, while also introducing sustainable building practices. Over the next
    five years she hopes to launch her own boutique repair consultancy focused on energy‑efficient solutions for local small businesses, positioning herself as the top performer in reducing operational
    footprints while preserving the on‑the‑fly problem‑solving style that defines her work.
