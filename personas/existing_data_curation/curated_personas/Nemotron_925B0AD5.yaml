  hobbies: '[''Gardening'', ''Traditional Vietnamese cooking'', ''Tai chi'', ''Reading historical biographies'', ''Jigsaw puzzles'', ''Walking in nature'', ''Journaling'', ''Small-group volunteering at
    health fairs'']'
  career_goals: Thu aims to advance to a regional director role overseeing multiple health‑service facilities, earn professional certifications such as Certified Medical Manager (CMM) or Certified Professional
    in Healthcare Quality (CPHQ), and possibly complete a bachelor’s degree in health administration. She intends to implement data‑driven efficiency programs, champion patient‑centered care models, mentor
    emerging managers, and expand community health outreach initiatives within Orange County.
