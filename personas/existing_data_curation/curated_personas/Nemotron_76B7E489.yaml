personas:
  professional: Salma Bellamy is a dedicated middle‑school STEAM teacher who designs interdisciplinary curricula blending Python coding, robotics, and visual art, leverages Canvas and interactive whiteboards
    to engage students, leads an after‑school robotics club, and quietly aspires to a district‑wide curriculum specialist role while balancing meticulous organization with a lingering anxiety about meeting
    every deadline; they often stay late refining lesson plans and checking student data.
  sports: Salma Bellamy enjoys low‑impact fitness, hitting the trails of Massasoit State Park on weekends, joining a small co‑ed tennis group at the local community center, cheering the Boston Red Sox in
    the spring and the New England Patriots in the fall, while keeping a modest running routine that balances their desire for solitude with occasional socializing; they find the rhythm of a trail run revitalizing.
  arts: Salma Bellamy spends quiet evenings at the New England Museum of Art absorbing contemporary installations by artists like Ja'tara Lee, translates the coastal light into delicate watercolors, and
    relaxes with the indie folk sounds of Bon Iver and Sufjan Stevens, allowing art to counterbalance the analytical demands of their teaching career; they often doodle sketchbook pages while listening
    to the music.
  travel: Salma Bellamy prefers low‑key, solo or small‑group escapes, having explored the historic streets of Salem, the lighthouses of Cape Cod, and the Portuguese culinary scene in Lisbon, while they
    dream of a future cultural immersion trip to Kyoto’s temples, all planned meticulously around their teaching calendar and modest vacation budget.
  culinary: Salma Bellamy delights in experimenting with molecular gastronomy at home, concocting sous‑vide salmon with a miso glaze, spherified balsamic pearls for a modernized lobster bisque, and matcha‑infused
    tiramisu, all while wielding a well‑stocked pantry of saffron, truffle oil, and locally sourced clams to satisfy their scientifically curious palate; they often document each experiment in a notebook
    before serving.
  core: Salma Bellamy, an inherently curious and artistically inclined teacher, channels their anxiety into tight lesson planning, often skips meals when immersed in projects, and can be found humming Bon
    Iver while perfecting a watercolor of the Atlantic shoreline; they view each day as a blend of meticulous preparation and spontaneous creativity.
background:
  cultural: 'Salma grew up in a middle‑class New England family in the Boston suburbs, where education and community involvement were emphasized. Her white Anglo‑American heritage is intertwined with the
    regional history of Massachusetts, from the colonial era to the textile mills that shaped South Easton. She values the independent spirit and pragmatism characteristic of New England culture, while
    also appreciating the rich diversity of Bristol County, which includes many immigrant communities. Salma participates in local town meetings, supports the public library, and enjoys regional traditions
    such as attending the annual South Easton Fourth of July Parade and the nearby Portuguese Festival in New Bedford. Her cultural identity informs her teaching philosophy: she strives to honor historical
    context, promote civic responsibility, and celebrate multicultural perspectives in the classroom.'
attributes:
  skills: '[''STEAM curriculum design'', ''Project‑based learning facilitation'', ''Educational technology integration (Canvas, Google Classroom, SMART Boards)'', ''Python programming for data analysis'',
    ''Scientific lab safety and equipment management'', ''Lesson planning with flexibility'', ''Student mentorship and counseling'', ''Conflict resolution and cooperative learning strategies'', ''Mindfulness
    and stress‑reduction facilitation'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Reading science‑fiction and popular science'', ''Journaling and reflective writing'', ''Yoga and mindfulness meditation'',
    ''Hiking local nature trails'', ''Volunteering for after‑school robotics club'', ''Experimenting with molecular gastronomy'']'
  career_goals: Salma aims to move into a leadership role where she can shape district‑wide STEAM initiatives, such as becoming a curriculum specialist or department chair for mathematics and science. She
    plans to pursue a master's degree in Instructional Design or Educational Technology to deepen her expertise in blended learning. Long‑term, she hopes to create a community outreach program that partners
    local art galleries and science museums with her school, giving students hands‑on experiences that bridge artistic expression and scientific inquiry. Throughout her career, she wants to maintain a healthy
    work‑life balance that allows her to continue personal growth and manage stress, possibly by advocating for teacher wellness programs within her district.
