persona_description: A member of the International Court of Justice who is responsible for hearing cases concerning the interpretation and application of the Convention on the Rights of the Child. The Court
  has jurisdiction over cases submitted by the States Parties to the Convention, and the Secretary of the Court has the responsibility of appointing the Court's Secretary and establishing the Court's Secretariat.
  The Court has the authority to rule on cases involving violations of rights protected by the Convention, and may also act on a case-by-case basis. The Court also has the responsibility of submitting a
  report to the General Assembly of the Organization of American States on its work during the previous year.
