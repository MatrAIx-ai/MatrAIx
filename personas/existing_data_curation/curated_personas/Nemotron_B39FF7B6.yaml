personas:
  professional: Justin McBride, a 21‑year‑old aspiring automotive technician, combines a practical hand for car maintenance, small‑engine troubleshooting, and basic carpentry with a strong preference for
    routine and step‑by‑step checklists, thriving in a predictable garage environment where they can work in small‑team settings while assertively taking ownership of each repair job, even though they sometimes
    let tools sprawl due to a laid‑back attitude toward strict organization.
  sports: Justin McBride, a 21‑year‑old who prefers low‑key physical activity, spends weekends fishing at Goose Creek and hiking the Blue Ridge Trail while cheering on the Washington Commanders (NFL) and
    Washington Capitals (NHL), and they belong to the Round Hill Outdoor Club’s weekend 5K running group, which satisfies their need for routine exercise without the pressure of competitive sports.
  arts: Justin McBride, a 21‑year‑old who finds solace in simple craftsmanship, often listens to folk‑rock artists like The Avett Brothers and Neil Young while building birdhouses, admires the natural sculptures
    of Andy Goldsworthy, and they occasionally unwind by watching classic countryside films such as ‘Field of Dreams’ that echo their love of practical, grounded storytelling.
  travel: Justin McBride, a 21‑year‑old who favors low‑cost, solo road trips that blend routine planning with outdoor adventure, has explored the Appalachian Trail’s Blue Ridge sections and the historic
    streets of Williamsburg, and they dream of driving to the Canadian Rockies or trekking New Zealand’s South Island once their apprenticeship income stabilizes.
  culinary: Justin McBride, a 21‑year‑old with modest cooking chops, enjoys whipping up a garden‑fresh ratatouille using home‑grown tomatoes, eggplants, and zucchini, and they often pair it with a hearty
    chicken pot pie made from eggs laid by their backyard hens and herbs like rosemary and thyme grown in their vegetable patch.
  core: Justin McBride, a 21‑year‑old who thrives on routine but stubbornly leaves a trail of scattered tools after each project, balances a quiet, solitary lifestyle with an assertive streak when fixing
    cars, and they find comfort in the predictable rhythm of hands‑on work.
background:
  cultural: Justin was raised in Round Hill, a small town in Loudoun County that blends a historic agricultural heritage with the newer suburban growth of Northern Virginia. His family traces its roots
    to early 20th-century European immigrants - primarily English and German - who settled the Shenandoah Valley, and they have maintained a modest, middle-class lifestyle centered around home ownership,
    property upkeep, and community involvement. The local culture emphasizes self-reliance, a practical work ethic, and modesty, values reinforced by the area's Protestant churches - he attended a Methodist
    congregation. Annual county fairs, farm-to-table markets, and neighborhood gatherings are common, fostering a sense of belonging while respecting personal space - an environment that aligns with Justin's
    preference for routine, familiarity, and small-group interactions. This background has shaped his pragmatic outlook, respect for tradition, and desire to contribute quietly to his community.
attributes:
  skills: '["Basic automotive maintenance and repair", "General carpentry and small-furniture building", "Landscaping and lawn care", "Small-scale animal husbandry (chickens)", "Computer troubleshooting
    (Windows OS)", "Customer service and small-group communication", "Personal budgeting for projects"]'
  hobbies: '["Car restoration projects", "Woodworking (birdhouses, simple furniture)", "Vegetable gardening", "Fishing at Goose Creek", "Hiking on Blue Ridge trails", "Strategic video gaming", "Reading
    DIY and home-improvement guides", "Volunteer work with community clean-ups and fire-prevention club"]'
  career_goals: Justin's career aspirations revolve around a stable, hands-on profession that provides a predictable daily rhythm while letting him deepen his practical expertise. In the near term, he plans
    to enter an apprenticeship or associate-degree program in automotive technology or HVAC servicing, aiming to earn a journeyman certification within two years and secure a part-time position at a local
    garage where his routine-oriented work style will be valued. Over the longer term, he envisions either managing facilities maintenance for a school or municipal building - roles that combine routine
    scheduling with occasional flexibility - or starting his own modest auto-repair shop serving the Round Hill community. He also hopes to eventually own a small parcel of land where he can maintain a
    personal garden and a modest flock of chickens, merging his career with the familiar, practical lifestyle he enjoys.
