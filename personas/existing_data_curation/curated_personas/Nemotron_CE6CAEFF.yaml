  hobbies: '["Weight training", "Soccer", "Cooking Mexican cuisine", "Model building", "Sudoku puzzles", "Strategy video games", "Reading non‑fiction (personal finance, self‑improvement)", "Attending cultural
    festivals"]'
  career_goals: Luis aims to become a Collections Manager within the next three to five years, obtaining the Certified Credit and Collections Professional (C3P) credential and later a Master's in Business
    Analytics. He aspires to integrate data‑driven insights and automation into collection strategies to improve recovery rates while maintaining respectful client interactions. Long‑term, he envisions
    launching a financial consultancy that helps small businesses streamline their accounts receivable processes and mentoring Hispanic youth interested in finance and technology.
