  career_goals: Sarah aspires to attend a reputable college for visual arts or multimedia design, aiming to become a concept artist and illustrator for graphic novels or video games. She also hopes to create
    educational animation content that blends storytelling with art. In the long term, she envisions a freelance career that allows flexibility to pursue unconventional creative projects while collaborating
    with small, like‑minded teams.
