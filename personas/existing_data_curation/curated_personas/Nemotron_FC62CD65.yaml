personas:
  professional: Sarah Poole, a budding digital illustrator and self‑taught coder, leverages their curiosity for new ideas and meticulous organization to craft interactive storyboards that blend hand‑sketched
    textures with Scratch‑coded animations, often asserting creative direction in school art projects while remaining open to collaborators.
  sports: Sarah Poole enjoys casual fitness through daily walks with their dog along Riverside Park trails and seasonal beach volleyball with friends, follows the Jacksonville Jaguars and the Florida Gators
    with enthusiastic loyalty, and participates in the middle school swim club during the winter months.
  arts: Sarah Poole immerses themselves in creative expression by drawing in sketchbooks inspired by the bold lines of Banksy and the emotive color palettes of Frida Kahlo, listening to acoustic renditions
    of John Mayer while playing guitar, and adoring the world‑building of Hayao Miyazaki’s films and the lyrical poetry of Taylor Swift.
  travel: Sarah Poole prefers low‑budget, small‑group trips that blend adventure and relaxation, having spent family weekends exploring the historic streets of St Augustine and a school field trip to Washington
    DC, they dream of hiking the red rocks of Sedona, strolling through the galleries of London’s Tate Modern, and attending a manga convention in Tokyo, all while navigating parental curfews and a modest
    allowance.
  culinary: Sarah Poole enjoys crafting avocado toast topped with feta and cherry tomatoes, experimenting with shrimp tacos seasoned with lime, cilantro, and chipotle mayo, and occasionally cooking simple
    pasta al pesto with fresh basil, while preferring shared homemade pastries at school bake‑sales over dining at upscale restaurants.
  core: Sarah Poole, a curious and orderly teen artist, blends sketchbook magic with digital coding, saves diligently for supplies, navigates mild eczema with proactive care, and lives for quiet beach walks
    with their dog, all while occasionally splurging on limited‑edition graphic novels.
background:
  cultural: Sarah comes from a middle‑class white family rooted in Jacksonville’s suburban community. Her upbringing blends Southern hospitality and a strong emphasis on education with an appreciation for
    the city’s coastal lifestyle and vibrant art scene. Family traditions include weekend trips to the beach, shared meals featuring Southern comfort food, and encouragement to explore creative pursuits
    through local community art programs.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration (Procreate)'', ''basic Scratch programming'', ''HTML/CSS basics'', ''creative writing'', ''time management'', ''small‑group collaboration'']'
