personas:
  professional: Angel Rivera, a 41‑year‑old freelance science communicator, merges their data‑analysis expertise with digital illustration to turn complex research into vivid infographics and videos while
    pursuing a part‑time Master’s in Science Communication.
  sports: Angel Rivera, a regular participant in the South Orange Running Club’s Saturday jogs, supports the New York Giants and New York Knicks, practices yoga three times a week at a local studio, and
    they often sign up for seasonal 5K charity races to keep active without overcommitting.
  arts: Angel Rivera, an avid visitor to the Montclair Art Museum and local gallery openings, draws inspiration from painter Joaquín Sorolla, photographer Ansel Adams, and flamenco guitarist Paco de Lucía,
    while honing their own digital illustration skills to blend scientific concepts with artistic storytelling.
  travel: Angel Rivera, who prefers thoughtfully planned trips over spontaneous getaways, has explored Barcelona’s Gothic Quarter, trekked the Blue Ridge Mountains, dreams of savoring the Amalfi Coast’s
    lemon risotto, and they balance travel ambitions with a freelance budget that favors weekend getaways to nearby Upstate New York.
  culinary: Angel Rivera, an advanced home cook, often perfects paella with saffron, chorizo, and local seafood, prepares tapas like gambas al ajillo, experiments with a quinoa‑infused tortilla española,
    and enjoys pairing their dishes with a crisp Albariño or a locally sourced Pinot Grigio.
  core: Angel Rivera, a 41‑year‑old freelance visual storyteller, turns curiosity into artful science content, wrestles with persistent worry, and they can’t resist midnight experiments with saffron‑spiced
    paella.
background:
  cultural: Born to Spanish immigrant parents, Angel grew up in a bilingual household where Spanish language, folklore, and Mediterranean culinary traditions were daily staples. Family gatherings often
    featured tapas, paella, and lively flamenco music, instilling a deep appreciation for communal celebration and expressive art forms. While she identifies strongly with her Spanish heritage—celebrating
    holidays such as Día de los Reyes and Semana Santa—she also embraces the multicultural fabric of South Orange, engaging in local Hispanic community events and American civic life. This dual cultural
    lens informs her worldview, fostering an inclusive mindset that values both personal heritage and the diverse perspectives of her New Jersey community.
attributes:
  skills: '[''Data analysis'', ''Statistical programming (R, Python)'', ''Experimental design'', ''Scientific writing'', ''Digital illustration'', ''Photography'', ''Community organizing'', ''Volunteer
    coordination'', ''Conflict resolution'', ''Mindfulness and stress management'']'
  hobbies: '[''Visiting art museums'', ''Sketching'', ''Photography (urban and nature)'', ''Cooking Spanish cuisine'', ''Yoga and meditation'', ''Journaling'', ''Book club (contemporary literature & philosophy)'',
    ''Volunteering for community science outreach'', ''Learning classical guitar'', ''Weekend hiking'']'
  career_goals: Angel aims to combine her scientific background with her artistic sensibility by becoming a freelance science communicator and visual storyteller. She plans to pursue a part‑time Master’s
    in Science Communication within the next two years, with the goal of producing educational videos, infographics, and articles that make STEM topics accessible to diverse audiences. Long‑term, she envisions
    launching a community‑based program in South Orange that offers workshops on sustainable living, data literacy, and creative expression, thereby merging her passion for education, environmental stewardship,
    and cultural heritage. She also hopes to secure stable freelance contracts that afford her flexibility while allowing ample time for self‑care and family.
