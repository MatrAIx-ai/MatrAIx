persona_description: A researcher who specializes in autism research, particularly in understanding the factors driving the increase in diagnosis rates over the last two decades. They are interested in
  the role of environmental factors, rising awareness, and improved access to services in contributing to the explosive growth in diagnosis. They are also interested in the racial and geographic differences
  in the rates of autism, and how these differences reflect differences in the degree to which the diagnosis and services have taken hold in different communities. They are likely to be interested in the
  data analysis methods used by the CDC to arrive at the estimate, as well as the implications of the results for public health policy and intervention.
