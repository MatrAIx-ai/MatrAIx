  hobbies: '[''community basketball league'', ''volunteering at food bank'', ''playing acoustic guitar'', ''reading historical non-fiction'', ''hiking'', ''gardening'', ''cooking family meals'']'
  career_goals: Michael aims to expand his church's impact by establishing a multi‑phase discipleship pathway that integrates small‑group learning, service projects, and mentorship. He aspires to become
    a district superintendent within his denomination, overseeing several congregations and fostering collaborative ministry models. In the longer term, he envisions authoring a practical guide on balancing
    structured worship with dynamic community engagement, and possibly teaching at a seminary to equip future clergy with organizational and pastoral competencies.
