personas:
  professional: Arthur Bailey, a budding robotics hobbyist and self‑taught programmer, combines curiosity for new tech with a practical, organized approach to building LEGO robots, while their competitive
    streak drives them to excel in school robotics club challenges.
  sports: Arthur Bailey, a member of the Chicago Youth Hoops League, spends after‑school afternoons shooting hoops at the local park, rooting for the Chicago Bulls while also dabbling in seasonal inline
    skating during summer, and they approach fitness with a competitive mindset that pushes them to improve their jump shot.
  arts: Arthur Bailey, an avid digital sketcher who listens to Kendrick Lamar, Miles Davis, and HER while creating fan art inspired by the graphic novel Saga, often admires street works by Banksy, and their
    artistic practice reflects a blend of curiosity and disciplined iteration.
  travel: Arthur Bailey favors local field trips to Chicago’s Museum of Science and Industry and the Art Institute, yet dreams of attending the Tokyo Robot Expo and exploring the historic streets of Rome
    to see how ancient engineering influenced modern innovation.
  culinary: Arthur Bailey, whose palate swings between Chicago deep‑dish pizza, spicy ramen, and loaded nachos, can confidently whip up a pepper‑jack mac and cheese or a quick sushi roll with avocado and
    crab, though they often over‑season with hot sauce.
  core: Arthur Bailey is a curious, competitive teen who fuses robotics, basketball, and beats into a disciplined yet slightly skeptical worldview, occasionally trading sleep for code and impulsively splurging
    on the next cool gadget.
background:
  cultural: Arthur is a Black American teenager raised in Hoffman Estates, a suburban community near Chicago. His family emphasizes education, resilience, and cultural pride, often celebrating traditions
    such as Kwanzaa and engaging in church youth activities. He draws inspiration from the vibrant African‑American culture of the Chicago area—music, art, and community activism shape his worldview. While
    navigating a diverse suburban environment, Arthur remains connected to his heritage through family stories, local cultural events, and a strong sense of social responsibility.
