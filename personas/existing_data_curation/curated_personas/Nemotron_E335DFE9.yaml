  career_goals: Arthur aspires to study engineering or computer science in college, aiming to become a software engineer who creates educational technology tools for underserved students. He hopes to win
    regional robotics competitions and earn a scholarship that enables him to mentor younger kids in STEM. Long‑term, he envisions launching a startup focused on interactive learning apps that blend innovative
    ideas with proven teaching methods, while also staying involved in community outreach programs.
