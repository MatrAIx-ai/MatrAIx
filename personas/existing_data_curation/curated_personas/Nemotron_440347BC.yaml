    in Columbia River Gorge'', ''Collecting vintage vinyl records'', ''Attending independent film screenings'', ''Writing personal essays and poetry'', ''Exploring local coffee shops and bookstores'']'
  career_goals: Looking ahead, Carrie aims to leverage her extensive retail experience into a supervisory role, such as shift manager or trainer, where she can mentor new cashiers and improve store operations.
    Simultaneously, she hopes to deepen her involvement in Portland’s art community by obtaining a certificate in museum studies and volunteering as a docent at the Portland Art Museum. In the long term
    she envisions launching a modest online shop to sell her handcrafted knitted items and curated vintage finds, allowing her to blend her entrepreneurial spirit with her artistic passions while maintaining
    a balanced, part‑time schedule.
