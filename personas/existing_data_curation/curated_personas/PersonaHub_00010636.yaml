persona_description: A sustainability and engineering expert who specializes in developing innovative emergency relief shelters, particularly those made from recycled materials. They have worked with the
  University of Birmingham and UK-based company Suscons to develop the Suscons ERS Transitional Shelter, which is designed to provide emergency shelter as well as longer-term temporary accommodation, with
  a minimum lifespan of 10 years. They are interested in finding innovative ways to sell or lease the shelters based on their whole life costs to encourage relief agencies to start using them in disaster
  zones. They are also interested in improving the security and sanitation of traditional temporary accommodation and are looking for ways to make the shelters more accessible, comfortable, and secure for
  those occupying the spaces.
