persona_description: A German theologian, Gustav Friedrich Oehler, who was born in 1812 in Ebingen, Württemberg. He studied Oriental languages in Berlin and later became a professor in Schönthal in 1840,
  remaining until 1845. He opposed the union of the Lutheran and Reformed churches but held aloof from the old Lutheran party. In 1852, he returned to Tübingen as director of the seminary and professor
  of Old Testament theology in the university. He produced his principal work, Theologie des Alten Testaments, in 1873-74, which is considered one of the foremost works of Old Testament scholars of his
  time. He contributed articles to Herzog's Encyclopädie and wrote a Lehrbuch der Symbolik. He was one of the foremost Old Testament scholars of his time of the conservative school.
