personas:
  professional: Richard Husser is a budding junior naturalist who channels a love for step‑by‑step LEGO construction and organized garden chores into a methodical habit of cataloguing backyard insects,
    showing early scientific curiosity tempered by a strong need for predictable routines, and they often share their findings with friends.
  sports: Richard Husser bolts through backyard tag with the same enthusiasm they reserve for weekend practices with the Lone Star Youth Soccer Club, cheering for the Dallas Cowboys and the Houston Astros
    while they also organize hide‑and‑seek tournaments that satisfy their love for structured play.
  arts: Richard Husser spends afternoons sketching family portraits and prairie scenes inspired by Beatrix Potter and Dr. Seuss, while evenings are reserved for nature documentaries that fuel their imagination
    of wildlife, and they often sing along to Disney soundtracks while adding colorful stickers to their artwork.
  travel: Richard Husser dreams of exploring the Texas Hill Country’s bluebonnet fields and the towering cliffs of Big Bend National Park, and they already have cherished memories of a family road trip
    to the San Antonio River Walk, while hoping to one day ride a roller coaster at Walt Disney World.
  culinary: Richard Husser delights in building cheesy tortilla roll‑ups with fresh lettuce from the garden, munching on chicken nuggets dipped in honey mustard, and sipping strawberry‑banana smoothies,
    though they sometimes sneak extra cookies when feeling anxious.
  core: Richard Husser is a structured, compassionate six‑year‑old who balances LEGO engineering with backyard wildlife obsessions, saves pennies in a pink piggy bank, wrestles with bouts of anxiety, and
    brightens every game of tag with an unstoppable laugh.
background:
  cultural: Richard was born and raised in Clifton, Texas, a small town in Coryell County with deep roots in Southern‑Texas culture. He grows up attending a local Baptist church, celebrating community events
    like the Clifton Founders Day parade, and participating in school activities that emphasize teamwork and respect. His family values hard work, hospitality, and a close connection to the surrounding
    countryside, including ranching and outdoor recreation.
