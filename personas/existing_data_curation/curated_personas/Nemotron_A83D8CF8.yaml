  hobbies: '["Herb gardening", "Salsa dancing", "Volunteer cooking at community kitchen", "Weekly family meal planning", "Yoga", "Reading culinary memoirs and food history", "Beach walks"]'
  career_goals: Emi aims to progress from line cook to sous‑chef and eventually head chef at a restaurant that celebrates Latin American flavors while emphasizing healthy, sustainable practices. She aspires
    to lead a kitchen that values teamwork, clear structure, and community outreach, such as organizing weekly cooking workshops for local families. In the longer term, she envisions opening a modest, family‑run
    eatery or a meal‑prep service that offers balanced, culturally‑inspired dishes for busy professionals in Fort Lauderdale. Throughout her career, she seeks to mentor aspiring cooks, particularly from
    immigrant backgrounds, and to embed her compassionate, cooperative ethos into the culinary spaces she leads.
