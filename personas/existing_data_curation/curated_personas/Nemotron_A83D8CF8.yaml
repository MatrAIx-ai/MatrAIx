personas:
  professional: Emi Ruiz, a 34‑year‑old line cook with a decade of high‑volume kitchen experience, they leverage meticulous inventory control, menu‑planning expertise, and bilingual communication to streamline
    prep stations, mentor junior staff, and deliver consistently high‑quality dishes while infusing a compassionate, team‑first mindset into every shift.
  sports: Emi Ruiz, a 34‑year‑old sports enthusiast, they regularly play beach volleyball with the Fort Lauderdale Beach Volleyball Club, attend weekly yoga classes at South Florida Yoga Studio for stress
    relief, cheer on the Miami Heat, follow the Miami Dolphins’ seasons, and keep tabs on the Tampa Bay Rays, while occasionally joining a recreational adult soccer league in the winter months.
  arts: Emi Ruiz, at 34, enjoys immersing themselves in the arts by attending local theater productions of Lin‑Manuel Miranda’s works, listening to salsa legends like Celia Cruz and Tito Puente during dance
    practice, and curating playlists that blend Stevie Wonder’s soul with contemporary pop icons such as Beyoncé for inspiration while cooking.
  travel: Emi Ruiz, who is 34, plans travel with a balance of spontaneity and structure, they have explored the Bahamas and the Yucatán Peninsula for beach relaxation, trekked through Tuscany’s culinary
    towns on a food‑focused itinerary, savored street food in Tokyo, and now dream of attending a culinary workshop in Oaxaca while also penciling in a future eco‑tour of Patagonia for a blend of adventure
    and sustainable tourism.
  culinary: Emi Ruiz, a seasoned line cook at 34, they excel at crafting balanced plates such as a quinoa‑citrus salad with fresh basil, roasted chickpeas, and grilled lemon‑thyme salmon, overlaying classic
    techniques with modern twists, and relish sourcing herbs from their balcony garden to finish dishes with aromatic cilantro, rosemary, and tarragon.
  core: Emi Ruiz, a 34‑year‑old culinary professional, they are a meticulously organized kitchen strategist who blends a love for herb‑filled home cooking with a habit of over‑seasoning recipes before taste‑testing,
    yet always prioritizes team harmony and community outreach.
background:
  cultural: Emi was born in Colombia and moved to the United States as a teenager. Her upbringing was steeped in Colombian culinary traditions, including family gatherings centered around dishes like bandeja
    paisa, arepas, and sancocho. These experiences instilled a deep appreciation for hearty, flavor‑rich meals and the communal aspect of sharing food. In Fort Lauderdale, she blends her heritage with the
    diverse culinary scene, often incorporating fresh Florida produce into classic Colombian recipes. Her bilingual fluency and strong family ties keep her connected to Colombian customs, such as celebrating
    Carnaval and Día de los Santos, while also embracing the multicultural dynamics of her Floridian community. This dual cultural perspective informs her cooking style, community involvement, and desire
    to bridge cultures through food.
