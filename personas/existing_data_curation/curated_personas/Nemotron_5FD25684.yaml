personas:
  professional: Heather Manning is a budding robotics enthusiast who spends afternoons designing simple machines in the school robotics club and programming them in Scratch, applying her methodical planning
    and competitive edge to win the regional junior challenge.
  sports: Heather Manning plays casual midfield for the local youth soccer club, roots for the "Chicago Fire" MLS team, and joins the school’s track team for cross‑country, treating each practice as a strategic
    puzzle where her organized mindset helps her improve lap times.
  arts: Heather Manning practices piano three times a week, immerses herself in the works of "J.K. Rowling" and "Rick Riordan", knits cozy pine‑cone‑themed scarves for family during winter, and enjoys listening
    to Taylor Swift’s newest album while sketching fantasy landscapes.
  travel: Heather Manning prefers meticulously planned weekend hikes in nearby state forests, has visited Yellowstone National Park on a school field trip, and dreams of backpacking through the Scottish
    Highlands, always packing a checklist of rocks, bird‑watching guide, and extra laces.
  culinary: Heather Manning favors homemade pizza with pepperoni and pine‑nut topping, loves munching on trail mix with dried cranberries, and occasionally experiments with baking simple sugar cookies,
    though she sometimes burns them because she rushes the timer.
  core: Heather Manning is a curious, organized twelve‑year‑old who balances outdoor adventures with indoor creations, competes fiercely in robotics and soccer, saves every penny, and never misses a chance
    to read a new fantasy chapter.
background:
  cultural: Heather grew up in Dixfield, a small, predominantly White town in rural Maine, where New England values of self‑reliance, modesty, and community involvement are woven into daily life. Her family
    participates in seasonal traditions such as maple‑syrup tapping in the spring, leaf‑peeping hikes in the fall, and community snow‑mobile rides in winter. Local school events, church gatherings, and
    town fairs emphasize cooperation and neighborly support. This environment nurtured her practical mindset and appreciation for the natural world while reinforcing a cultural heritage rooted in modest,
    hardworking Mid‑Atlantic American life.
