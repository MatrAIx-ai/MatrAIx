  career_goals: Heather aspires to combine her love for nature with her analytical talents, aiming to become a wildlife biologist or an environmental engineer. She hopes to earn a scholarship to a competitive
    high school STEM program, win her middle‑school science fair, and later attend a university with strong conservation and engineering departments. Long‑term, she envisions leading research projects that
    protect Maine’s forest ecosystems while also developing technology solutions for sustainable resource management. Her competitive drive pushes her to seek leadership roles in school clubs and community
    initiatives.
