  hobbies: '[''Cooking regional Mexican dishes'', ''Hiking in Franklin Mountains'', ''Reading mystery novels'', ''Community gardening'', ''Learning basic automotive repair'', ''Listening to regional music
    and podcasts'', ''Participating in local trivia nights'', ''Volunteer Spanish tutoring'']'
  career_goals: With more than two decades behind the wheel, Yvette aims to leverage her experience into a leadership role within the transit system. She plans to complete her college coursework in logistics
    and transportation management, positioning herself for a driver‑trainer or route‑supervisor position where she can mentor newer drivers, champion safety initiatives, and introduce efficiency‑boosting
    technologies. Her competitive streak drives her to earn recognition such as the "Driver of the Year" award, and she hopes to contribute to district‑wide programs that improve on‑time performance and
    passenger satisfaction. Ultimately, Yvette seeks a stable, respected position that offers both personal growth and the ability to shape the future of public transportation in El Paso.
