persona_description: A pediatric dentist who is conducting research on the periodontal health status of children with sickle cell disease (SCD). The dentist is interested in understanding the potential
  effects of SCD on gingival tissues and is evaluating the differences in periodontal health between children with SCD and systemically healthy controls. The dentist is also looking for patterns of gingival
  enlargement in children with SCD and is comparing these findings with the control group to assess the impact of SCD on the health of the gingiva.
