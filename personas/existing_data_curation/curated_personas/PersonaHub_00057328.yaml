persona_description: A teacher or student who is interested in using GIS tools to analyze and visualize potential consequences of sea-level rise due to a tsunami run-up in a specific region, such as the
  Oregon coast near Seaside. They are likely to be familiar with Geobrain Online Analysis System (GeOnAS) and Arc Explorer Java Edition (AEJEE), and have a background in environmental science or geography.
  They may also have an interest in natural disasters and their impact on coastal communities.
