personas:
  professional: Hamed Guzman, a 42‑year‑old bilingual business educator, blends rigorous data‑driven curriculum design with hands‑on entrepreneurship projects, yet often rolls out lesson plans at the last
    minute because their relaxed attitude toward deadlines clashes with an analytical instinct for precision.
  sports: Hamed Guzman starts each weekend with a solitary sunrise hike on the San Lorenzo foothills, belongs to the San Lorenzo Mountain Hikers club, follows the Capitanes de Arecibo in basketball and
    the Cangrejeros de Santurce in baseball, and prefers low‑impact cardio over team sports, using fitness as a quiet counterbalance to work stress.
  arts: Hamed Guzman captures the island’s rugged scenery through black‑and‑white photography inspired by Ansel Adams and Sebastião Salgado, listens to folk percussion rhythms while cooking, and finds solace
    in the literary works of Yuval Noah Harari and the jazz improvisations of Miles Davis, shaping a creative outlet that satisfies both analytical curiosity and a need for solitude.
  travel: Hamed Guzman plans trips with meticulous research yet flexible itineraries, favoring off‑peak visits to historic Old San Juan, the quiet trails of the Blue Ridge Mountains, and the cultural mosaics
    of Kyoto, while budget constraints keep the occasional dream of a sailing excursion in the Caribbean as a distant goal.
  culinary: Hamed Guzman experiments with health‑conscious twists on traditional island dishes like mofongo stuffed with roasted vegetables, quinoa‑infused arroz con gandules, and grilled plantain chips
    seasoned with cumin and lime, balancing modest cooking skills with a meticulous habit of noting ingredient ratios in a weather‑proof notebook.
  core: Hamed Guzman is a solitary, worry‑laden scholar‑craftsman who mirrors their analytical mind in both curriculum design and woodworking, yet struggles with chronic disorganization, occasional impulsive
    spending, and a relentless quest for quiet control over a chaotic world.
background:
  cultural: Born and raised in Las Piedras, Hamed grew up immersed in Puerto Rican traditions, speaking both Spanish and English at home and school. He participates in community celebrations like San Juan
    festivals and respects the island's Catholic heritage, while also valuing the resilience demonstrated during recovery from Hurricane Maria. Family gatherings centered around arroz con gandules and pasteles
    reinforce his connection to the local cuisine. His cultural identity informs his teaching, as he integrates Puerto Rican history, local entrepreneurship stories, and bilingual resources into the classroom
    to make learning relevant and empowering for his students. Though introspective by nature, he honors the collectivist spirit of his community by striving to equip the next generation with practical
    tools for economic self‑sufficiency.
attributes:
  skills: '[''Curriculum development'',''Financial literacy instruction'',''Bilingual (Spanish/English) communication'',''Classroom management'',''Budgeting and financial planning'',''Entrepreneurship education'',''Data
