personas:
  professional: Felicia Keitt, a retired archivist and genealogist, uses meticulous research skills and community‑event planning expertise to launch an oral‑history project documenting senior residents
    while curating an annual exhibition of local artists, all with a disciplined, competitive drive to see her initiatives succeed.
  sports: Felicia Keitt, an avid walker who attends a local senior yoga class, follows the Daytona Tortugas minor‑league baseball team, enjoys bird‑watching hikes in nearby nature preserves, and participates
    in a small bridge club that doubles as a mental‑sharpness exercise, reflecting a low‑impact yet disciplined approach to fitness.
  arts: Felicia Keitt, a watercolor hobbyist and frequent gallery‑goer, draws inspiration from Monet, O'Keeffe and local contemporary painters, curates a monthly art‑appreciation group where she offers
    thoughtful critiques, and captures bird photography reminiscent of Audubon, all while maintaining a competitive edge in her own creative output.
  travel: Felicia Keitt, who prefers meticulously planned trips, has visited historic Savannah and Charleston, spent a week exploring the Smithsonian museums in Washington, D.C., and hopes to travel to
    New England’s colonial towns, balancing her love of history with the constraints of a fixed retirement budget.
  culinary: Felicia Keitt, a Southern‑comfort cooking enthusiast, perfects dishes like shrimp‑and‑grits, collard greens with smoked turkey, and peach cobbler, enjoys sourcing heirloom tomatoes and fresh
    thyme from her garden, and often knits scarves for her grandchildren while the oven timer reminds her to pause her crossword puzzles.
  core: Felicia Keitt, a curious, methodical septuagenarian, blends a competitive drive with a deep love for heritage, art, and community, balancing meticulous organization with occasional skeptical streaks
    and a penchant for bird‑watching and crossword puzzles.
background:
  cultural: Felicia’s cultural identity is shaped by her African‑American heritage and a lifelong connection to the South. Growing up during the civil‑rights era, she carries the resilience and communal
    spirit of that generation, often sharing stories and traditions passed down from her grandparents. Church and gospel music have been central to her family life, while Southern cuisine, such as collard
    greens and fried chicken, reflects the culinary legacy of her ancestors. Her appreciation for Black art, from the Harlem Renaissance to contemporary Afro‑centric artists, informs her curatorial interests.
    In Volusia County, she actively participates in local heritage festivals and contributes to preserving the narratives of Black Floridians.
attributes:
