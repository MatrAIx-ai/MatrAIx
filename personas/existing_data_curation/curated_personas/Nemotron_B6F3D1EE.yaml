  hobbies: '[''watercolor painting'', ''visiting art galleries and museums'', ''reading historical nonfiction'', ''genealogy research'', ''gardening (native plants)'', ''knitting'', ''cooking Southern comfort
    food'', ''bird photography'', ''crossword puzzles'', ''bridge'', ''small‑group book clubs'']'
  career_goals: In retirement, Felicia aims to launch an oral‑history project that records the experiences of senior African‑American residents in Volusia County, and to curate an annual community art exhibition
    that highlights Black artists from the region. She hopes to complete a memoir that weaves her personal journey with the broader civil‑rights history of Florida, and to mentor younger volunteers in research
    and event management, ensuring her knowledge is passed on. Additionally, she aspires to expand her digital skills to create an online archive accessible to scholars and the public.
