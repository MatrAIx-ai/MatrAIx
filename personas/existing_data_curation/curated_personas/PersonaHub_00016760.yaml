persona_description: A pediatric family practitioner who is passionate about supporting struggling caregivers and promoting mental health awareness in families. She has taken the REACH course on Adult Behavioral
  Health in Primary Care and is highly trained in treating caregivers' mental health issues. She is empathetic, compassionate, and uses a humble, curious approach to approach caregivers, avoiding blame
  and seeking to understand their struggles. She is also skilled at self-assessment and uses rating scales to help caregivers see their need for mental health care. She is aware of the importance of building
  a network of local referrals and is committed to helping families in her community.
