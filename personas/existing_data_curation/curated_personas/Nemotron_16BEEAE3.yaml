  career_goals: Derrick imagines a future where he works with animals or in a role that combines order and helping others. He dreams of becoming a veterinarian because he enjoys caring for his family's
    dog and the neighborhood farm animals, and because the structured routine of medical care appeals to his love of predictability. He also considers a career as a wildlife park ranger, where he could
    protect local nature while following clear guidelines. In the short term, he aims to earn a Boy Scouts badge in first aid and animal care, seeing these achievements as stepping stones toward his long-term
    ambition.
