  hobbies: '[''drawing'', ''reading adventure books'', ''hiking'', ''LEGO building'', ''Scratch programming'', ''piano practice'', ''art club'', ''competitive board games'', ''rock collecting'', ''wildlife
    identification'']'
  career_goals: Connie dreams of becoming an astronaut or a marine biologist, inspired by her love of new ideas and the natural world around the Great Lakes. She also imagines herself as an artist or a
    designer, combining her appreciation for art with her methodical planning skills. While she enjoys learning about science and space, she is also curious about teaching, hoping one day to share her discoveries
    with other kids.
