personas:
  professional: An aspiring young coder and visual storyteller, Connie Cole weaves imaginative LEGO constructions with Scratch programming, showing meticulous planning and reliability in every project while
    channeling a healthy skepticism that fuels innovative problem‑solving.
  sports: A budding athlete who thrives during weekend swim sessions in the nearby lake and plays forward on the Thomson Youth Soccer League, Connie Cole cheers for the Green Bay Packers and the Milwaukee
    Brewers, approaches fitness with systematic practice drills, and keeps a competitive edge by striving to outscore teammates in chess‑like strategy drills on the field.
  arts: An enthusiastic young painter and pianist, Connie Cole spends afternoons at the De Pere Art Club crafting vibrant water‑color scenes of forest trails, practices Beethoven’s “Für Elise” on piano,
    and draws inspiration from the whimsical illustrations of Mary Blair and the folk songs performed at the annual Brown County Fair.
  travel: A curious explorer who maps weekend road trips on a colorful sticker‑filled notebook, Connie Cole has ventured to Lake Michigan’s sand dunes, the historic streets of Chicago, and the mystical
    limestone caves of Wisconsin Dells, preferring family‑guided itineraries but dreaming of a solo backpack trek through the Appalachian Trail someday.
  culinary: An adventurous eater who loves buttery macaroni‑and‑cheese, blueberry pancakes drizzled with maple syrup, and grilled trout seasoned with lemon and dill from lake catches, Connie Cole often
    experiments by adding a pinch of paprika to classic peanut‑butter‑jelly sandwiches, while proudly showing off their collection of rock‑shaped cookie cutters.
  core: Connie Cole is a methodical, competition‑driven kid who balances a love for art, coding, and nature with a penchant for over‑saving allowance, occasional snack indulgence, and a secret habit of
    whisking rocks through the dishwasher for extra sparkle.
background:
  cultural: Connie grows up in De Pere, Wisconsin, a small Midwestern town with strong community ties and a legacy of German and Scandinavian ancestry common among many white families in the region. Her
    family participates in local traditions such as the Brown County Fair, community church events, and weekend trips to the nearby lakes for fishing and swimming. She attends a public elementary school
    that emphasizes both academic achievement and extracurricular arts, reflecting the area's value on education, hard work, and appreciation of nature.
