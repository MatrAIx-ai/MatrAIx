  career_goals: Byron seeks to move from attendant roles into a supervisory position within Las Vegas hospitality, aiming to become a Guest Relations Manager or Event Coordinator for a resort that integrates
    arts programming. He plans to complete a degree in hospitality management while earning certifications in event planning and mixology. In the longer term, he hopes to design immersive, art‑focused entertainment
    experiences that cater to small, curated audiences, combining his love for creativity with his strengths in organization and customer care. He also aspires to mentor new employees, fostering a supportive,
    low‑stress work environment that aligns with his cooperative nature.
