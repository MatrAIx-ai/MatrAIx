  career_goals: Skyler envisions a future where he can blend his curiosity for technology with a practical impact on his community. He aims to earn a scholarship to a four‑year university to study engineering—preferably
    civil or mechanical—with a focus on sustainable infrastructure. Long‑term, he hopes to work on projects that improve local transportation and public spaces in the Midwest, possibly collaborating with
    municipal planners or nonprofit organizations. He also dreams of mentoring younger students through a STEM outreach program, leveraging his organized approach and sociable personality to inspire the
    next generation of innovators.
