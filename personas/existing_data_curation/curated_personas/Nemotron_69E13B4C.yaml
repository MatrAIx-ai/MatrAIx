personas:
  professional: Skyler Amador is a middle-school robotics enthusiast who combines methodical problem-solving with a collaborative spirit, often leading the school's robotics club projects while juggling
    soccer practice and acoustic-guitar jam sessions, and they approach each build with a blend of curiosity and practicality.
  sports: Skyler Amador plays forward for the Riverside Middle School soccer team and joins pick-up basketball games at the Eastside Community Center, while they cheer for the Seattle Seahawks and the Los
    Angeles Lakers as their favorite NFL and NBA franchises, embodying a competitive yet team-oriented spirit.
  arts: Skyler Amador strums acoustic covers of John Mayer and Ed Sheeran while sketching original comic strips inspired by Neil Gaiman's narrative flair and Marvel's Spider-Man visual style, and they unwind
    by listening to the Fortnite soundtrack during gaming sessions, blending musical creativity with visual storytelling.
  travel: Skyler Amador plans occasional weekend trips with family to nearby Yellowstone National Park and dreams of attending a rocket launch at Kennedy Space Center, preferring detailed itineraries that
    include museum tours and hands-on workshops while still allowing spontaneous jam sessions with friends, reflecting a blend of structured curiosity and adventurous spirit.
  culinary: Skyler Amador favors pepperoni pizza and homemade chicken quesadillas, often customizing them with extra mozzarella and jalapeños, and they practice basic cooking by whipping up quick spaghetti
    aglio e olio with garlic, olive oil, and parmesan, while occasionally indulging in energy drinks after late-night gaming sessions.
  core: Skyler Amador is a high-energy teen who simultaneously leads robotics projects, scores goals on the soccer field, and strums guitar, yet habitually leaves a trail of half-finished comic sketches
    and snack-covered notebooks, embodying a vibrant curiosity tempered by occasional disorganization.
background:
  cultural: Skyler was raised in a predominantly white, middle‑class family in Harrison, Ohio, a small town with deep ties to the region's manufacturing heritage. His family’s ancestry includes German and
    Irish roots, and the Amador surname reflects a distant Spanish lineage, though culturally the household identifies with Midwestern American values—emphasizing community involvement, hard work, and modesty.
    He attends a public middle school where local traditions such as the county fair, church gatherings, and high school sports are central to community life. These influences foster a strong sense of belonging
    and a collaborative spirit that shapes his outlook and aspirations.
