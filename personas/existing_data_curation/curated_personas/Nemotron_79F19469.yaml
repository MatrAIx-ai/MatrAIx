  career_goals: While still very young, Salon's caregivers notice his natural inclination toward helping and order. He often watches picture books about teachers, firefighters, and community helpers, expressing
    excitement at the idea of "helping people". His future aspirations are likely to center on roles that combine caring for others with predictable structures, such as becoming a teacher, a community health
    aide, or a firefighter, reflecting his kind, cooperative nature and desire for routine.
