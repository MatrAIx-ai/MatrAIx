personas:
  professional: A miniature organizer of play routines, Salon Gonzales thrives on arranging blocks into predictable patterns and gently nudges peers toward sharing, embodying a practical, harmony‑seeking
    spirit even at two, and they take pride in keeping the play area tidy.
  sports: An enthusiastic member of a local toddler soccer group, Salon Gonzales cheers for the Arkansas Razorbacks during weekend games, often clutching a tiny plush football while delighting in the rhythm
    of park swing sets and the occasional splash at the community pool, and they giggle whenever the ball rolls to them.
  arts: Salon Gonzales delights in the melodic tunes of Raffi and the colorful stories of Sesame Street, often recreating the characters with finger paints, while parents encourage visits to the Little
    Rock Zoo’s interactive music exhibit, and they often hum the chorus after bedtime.
  travel: Salon Gonzales enjoys short family road trips to the Ozark National Forest, where they press their nose against the car window to watch fluttering leaves, and dreams of a future beach vacation
    in Destin, Florida, though their current journeys are limited to stroller‑friendly park strolls.
  culinary: Salon Gonzales prefers the comforting taste of sweet potato puree and grilled chicken nuggets, often requesting extra corn on the cob—an homage to backyard barbecues—while their tiny hands eagerly
    attempt to spread peanut butter on whole‑grain toast, and they clap with delight when the spoon hits their lips.
  core: Salon Gonzales is a gentle, routine‑loving toddler who balances a love for organized play with occasional worries, finding comfort in familiar foods, family rituals, and the soothing rhythms of
    childhood, and they often seek reassurance with a hug.
background:
  cultural: Salon was born and raised in Fayetteville, Arkansas, a small city that blends Southern hospitality with the vibrant community life of a college town. His family participates in local traditions
    such as Sunday church services, backyard barbecues, and seasonal community festivals that emphasize togetherness and kindness. The surrounding Ozark landscape fosters an appreciation for nature, and
    his household places a strong emphasis on routine, cooperation, and respect for others, shaping his practical, harmonious personality.
