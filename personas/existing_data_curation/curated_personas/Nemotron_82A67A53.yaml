personas:
  professional: Ruthanna Gresko, a budding mental‑health advocate with a humanities degree, blends her analytical literary skills and compassionate storytelling to craft supportive blog posts and organize
    volunteer shifts for a local crisis hotline, even as her relaxed, sometimes disorganized approach forces her to improvise schedules and rely on collaborative teammates.
  sports: Ruthanna Gresko enjoys low‑intensity fitness such as sunrise beach walks and bird‑watching hikes along the Gulf Coast, casually cheers on the New Orleans Saints during football season, and occasionally
    joins a neighborhood yoga circle that meets at the community garden, preferring small, relaxed gatherings over organized team sports.
  arts: Ruthanna Gresko weaves her love for folk acoustic sounds—from Joni Mitchell and Iron & Wine to the Lumineers—into her poetry and nature sketches, while her crochet projects feature pastel yarns
    inspired by sunrise palettes, and she curates an Instagram portfolio of sunset photographs that echo Ansel Adams' tonal mastery.
  travel: Ruthanna Gresko favors spontaneous, low‑budget road trips along the Gulf Coast—such as weekend escapes to Galveston and the Everglades—and dreams of a modest pilgrimage to Dublin's literary cafés
    and the misty cliffs of the Scottish Highlands, balancing her love of nature with occasional anxiety about travel logistics.
  culinary: Ruthanna Gresko prefers farm‑to‑table comfort meals, often turning garden‑grown zucchini, heirloom tomatoes, and fresh basil into a rustic ratatouille or a simple herb‑infused quinoa bowl, while
    she treats herself to artisanal sourdough and a steaming cup of chamomile tea after a long day of writing.
  core: Ruthanna Gresko is a quietly intense 21‑year‑old poet‑advocate who balances a compassionate drive to help others with an anxiety‑fuelled habit of over‑thinking, a tendency to let her notebook overflow
    with half‑finished verses, and a soft spot for midnight sunsets captured on a battered DSLR.
background:
  cultural: Ruthanna grew up in Summerdale, a small town in Baldwin County, Alabama, within a predominantly white, Southern community. Her upbringing combined traditional Southern hospitality, church involvement,
    and strong neighborhood ties with the broader, liberal‑arts perspective she gained at university. She is familiar with local customs such as family BBQs, church potlucks, and regional festivals, while
    also valuing inclusive, compassionate attitudes toward diversity. This blend of Southern roots and academic exposure shapes her respectful, community‑oriented outlook.
