  hobbies: '["reading", "poetry writing", "journaling", "sketching", "gardening", "nature walks", "birdwatching", "volunteering at animal shelter", "listening to folk music", "crochet", "photography"]'
  career_goals: Ruthanna aims to turn her empathy and academic background into a career in mental‑health advocacy or community outreach. She plans to pursue a master’s degree in social work or counseling
    so she can become a licensed therapist or a program coordinator for a nonprofit that supports youth mental‑health in the Gulf Coast region. In the short term, she hopes to secure a volunteer coordinator
    position at the local crisis hotline and to develop a peer‑support blog that blends her writing with mental‑health resources. Ultimately, she wants a role that allows flexible schedules, creative problem‑solving,
    and direct impact on individuals’ emotional well‑being.
