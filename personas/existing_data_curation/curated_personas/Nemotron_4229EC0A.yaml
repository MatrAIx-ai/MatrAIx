  hobbies: '[''Fishing'', ''Gardening'', ''Gospel music'', ''Watching classic baseball'', ''Cooking'', ''Church volunteering'', ''Family reunions'', ''Model car building'']'
  career_goals: Henry aims to strengthen the existing youth football program by establishing a clear pipeline for scholarships to nearby colleges, while also mentoring the next generation of volunteer coaches.
    He envisions creating a modest community sports academy that offers structured, routine‑based training and seeks a role on the advisory board of the local athletic association to shape long‑term development
    policies. His goals are grounded in practicality and a desire to leave a lasting, supportive legacy for the children of Titusville.
