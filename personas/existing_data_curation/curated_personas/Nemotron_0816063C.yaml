personas:
  professional: Jenni Miles is an aspiring freelance illustrator and content creator who blends hand‑drawn sketches, digital Photoshop work, and candid street photography into a portfolio that reflects
    their curiosity and spontaneous approach, while juggling community‑college graphic design classes and occasional mentorship at the local library despite a chronic struggle with deadlines.
  sports: Jenni Miles enjoys weekend hikes in the Appalachian foothills, volunteers with a local trail‑maintenance club, follows the Carolina Panthers for NFL excitement, and occasionally joins friends
    for impromptu pickup basketball games at the community center.
  arts: Jenni Miles is a devoted explorer of experimental indie music, streaming artists such as Tame Impala, Mitski, and Perfume Genius while attending intimate acoustic shows, and they regularly sketch
    murals by Banksy and local muralist Maya Hernandez, crafting digital illustrations inspired by poet Ocean Vuong and filmmaker Wes Anderson.
  travel: Jenni Miles dreams of art‑inspired wanderings, having already backpacked to New York’s Brooklyn art scene, visited Berlin’s street‑art districts, and sampled Kyoto’s traditional tea houses, while
    budgeting future trips with a mix of hostel stays, student discount flights, and careful savings.
  culinary: Jenni Miles experiments with unconventional recipes like kimchi‑fried rice, turmeric‑infused shakshuka, and vegan ramen topped with pickled radish, and they often source fresh herbs from the
    local farmers’ market to accompany their signature avocado‑toast‑with‑gochujang spread.
  core: Jenni Miles is a curious, spontaneous 18‑year‑old artist who channels their love of sketching, indie music, and hiking into a freelance dream, yet frequently battles disorganization, acne, and a
    habit of splurging on creative impulses.
background:
  cultural: Jenni grew up in Allentown, Pennsylvania, within a middle‑class white American family that values independence and community involvement. The Lehigh Valley region, with its blend of industrial
    history, Pennsylvania Dutch influences, and vibrant local arts scene, has shaped her appreciation for diverse artistic expressions. She was exposed to community events such as county fairs, local theater
    productions, and neighborhood art programs, which nurtured her curiosity and openness to unconventional ideas while maintaining a grounded connection to her hometown.
