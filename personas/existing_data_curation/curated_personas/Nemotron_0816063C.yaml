  hobbies: '["visiting art galleries and street murals", "sketching in public spaces", "photography of urban scenes", "listening to indie and experimental music", "attending small acoustic performances",
    "reading speculative fiction and poetry", "journaling", "experimenting with cooking unique recipes", "hiking in local nature trails", "participating in mixed-media art workshops", "DIY screen printing
    and crafts"]'
  career_goals: Jenni aspires to turn her passion for visual storytelling into a sustainable career. She plans to enroll in a community college program in graphic design or fine arts, build a robust portfolio
    of illustrations and photography, and eventually work as a freelance illustrator and content creator. She hopes to collaborate with indie publishing houses or boutique design studios, and dreams of
    traveling to artistic hubs such as New York, Berlin, and Kyoto to expand her creative perspective. In the long term, she envisions launching an online shop selling prints and handcrafted art, while
    also mentoring other young artists in her community.
