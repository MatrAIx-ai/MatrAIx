personas:
  professional: Teresa Cornthwaite, a budding junior naturalist and LEGO engineer, channels their relentless curiosity into cataloging backyard specimens and constructing intricate models, and they apply
    practical problem‑solving skills while embracing a flexible, sometimes chaotic, work style that balances imagination with methodical observation.
  sports: Teresa Cornthwaite enjoys weekend hikes through nearby woods, plays forward for the Maple Creek Junior Soccer Club (U12), avidly follows the Seattle Mariners, Seattle Seahawks, and the local high
    school basketball team the Ridgeview Raptors, and they blend a love of nature with team sport camaraderie.
  arts: Teresa Cornthwaite expresses creativity by painting landscapes inspired by Van Gogh’s ‘Starry Night,’ crafting friendship bracelets while listening to the indie pop of Tegan and Sara, and they immerse
    themselves in the fantasy worlds of J.K. Rowling’s ‘Harry Potter’ series and the cinematic scores of Howard Shore.
  travel: Teresa Cornthwaite favors spontaneous family road trips to state parks like Acadia and the Grand Canyon, dreams of backpacking through the Scottish Highlands, yet they keep a travel journal to
    stay budget‑conscious and fit trips around school schedules.
  culinary: Teresa Cornthwaite shows a budding culinary flair by helping prepare a vegetable stir‑fry with broccoli, bell peppers, and soy sauce, mastering the perfect mac and cheese crust, and they delight
    in baking an apple pie with a buttery flaky crust and a hint of cinnamon.
  core: Teresa Cornthwaite is a curious, slightly disorganized 11‑year‑old who balances imaginative LEGO builds and nature explorations with practical chores, often worrying about small setbacks but finding
    calm in sketching and quiet reading.
background:
  cultural: Teresa was raised in Roanoke, a small community in Denton County, Texas. Her family follows many Southern traditions, such as celebrating holidays with large family gatherings, attending a local
    church, and enjoying Texas‑style cuisine like barbecued brisket and Tex‑Mex dishes. The close‑knit nature of the town encourages community involvement; she participates in school events, county fairs,
    and occasional volunteer activities. While her cultural upbringing emphasizes friendliness, self‑reliance, and a respect for nature, Teresa also encounters a blend of rural and suburban influences that
    shape her open‑minded yet practical outlook.
