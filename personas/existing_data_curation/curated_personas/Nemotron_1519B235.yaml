  career_goals: Teresa imagines a future where she can combine her love for animals, nature, and helping people. She dreams of becoming a veterinarian or a wildlife biologist, hoping to protect local ecosystems
    and care for pets. At the same time, she is drawn to the idea of teaching younger kids, because she enjoys sharing knowledge in a practical, hands‑on way. She wants a career that lets her stay curious
    while providing a stable routine that eases her worries about stress and uncertainty.
