personas:
  professional: Evaline Gaither is a diligent phlebotomist working in a fast‑paced Detroit clinic, where their precise venipuncture skills, infection‑control expertise, and calming bedside manner enable
    them to soothe anxious patients while efficiently managing specimen flow and championing trauma‑informed protocols.
  sports: Evaline Gaither regularly attends yoga classes and participates in a local running club that meets at Belle Isle, cheers on the Detroit Lions on Sundays, supports the Pistons during the NBA season,
    and occasionally plays pickup basketball at the community center, blending structured fitness with team loyalty.
  arts: Evaline Gaither expresses creativity through watercolor paintings of Detroit’s skyline, captures vibrant street art with a vintage DSLR during weekend walks, and finds inspiration in the timeless
    sounds of Stevie Wonder, contemporary R&B artist H.E.R., and the soulful poetry of Maya Angelou, weaving visual and auditory art into daily life.
  travel: Evaline Gaither favors short, purpose‑driven trips—spending a weekend exploring the historic jazz scene of New Orleans, a daytrip to Ann Arbor’s farmers market for fresh produce, and dreaming
    of a future cultural immersion in Ghana—balancing limited funds with a deep desire for community‑focused travel experiences.
  culinary: Evaline Gaither loves reinventing classic soul‑food by preparing collard greens sautéed with smoked turkey and kale, baked sweet‑potato mac and cheese topped with whole‑grain breadcrumbs, and
    quinoa cornbread infused with jalapeño, often pairing these dishes with fresh produce from Eastern Market and a splash of hot sauce.
  core: Evaline Gaither balances relentless empathy and meticulous organization with a penchant for over‑thinking and occasional anxiety, channeling soulful cooking, watercolor art, and community health
    advocacy into a purpose‑driven yet sometimes emotionally fraught life.
background:
  cultural: Evaline is a Black Detroit native who grew up in a close‑knit neighborhood where church, family gatherings, and community solidarity shaped her worldview. The rich musical heritage of Motown,
    the tradition of soulful cooking, and the resilience of African‑American culture in the face of economic challenges have informed her values of perseverance, empathy, and collective well‑being. She
    is keenly aware of the health disparities that affect Black communities in Michigan and draws motivation from her cultural roots to improve access to quality care and foster supportive environments
    for those who feel marginalized.
