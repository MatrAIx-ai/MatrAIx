  career_goals: Evaline aims to earn her GED and pursue certification as a Medical Laboratory Technician within the next two years, with a long‑term ambition to become a registered nurse and eventually
    a community health coordinator. She hopes to leverage her hands‑on experience to develop trauma‑informed phlebotomy protocols that address patient anxiety, and to lead outreach programs that bring preventive
    screening services to underserved neighborhoods in Detroit. Ultimately, she envisions a supervisory role where she can mentor new phlebotomists, advocate for health equity, and contribute to policies
    that reduce racial disparities in access to care.
