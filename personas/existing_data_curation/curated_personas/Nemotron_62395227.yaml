  hobbies: '[''Cooking Cuban cuisine'', ''Salsa dancing'', ''Gardening'', ''Walking and birdwatching'', ''Reading mystery and criminal‑justice books'', ''Volunteering at senior center'', ''Attending Cuban
    cultural festivals'', ''Church participation'']'
  career_goals: Maricarmen aims to advance to a senior supervisory role, such as shift supervisor or unit manager, where she can mentor new officers and shape staff development programs. She is passionate
    about improving inmate rehabilitation initiatives and hopes to collaborate with local reentry organizations to facilitate successful transitions. Long‑term, she envisions contributing to policy reforms
    within the correctional system and, after retirement, serving as a community liaison or consultant on public safety and criminal‑justice issues.
