personas:
  professional: Maricarmen Segundo, a seasoned correctional supervisor with nearly thirty years of inmate supervision and crisis de-escalation experience, balances a practical, detail-oriented approach
    with a curiosity for innovative rehabilitation programs, using bilingual communication and meticulous incident reporting to mentor new officers while confidently advocating for policy improvements.
  sports: Maricarmen Segundo stays active by walking the trails of Oleta River State Park with a senior fitness group, cheering the Miami Heat during basketball season, and participating in a weekly salsa-dance
    fitness class at the local community center, while occasionally joining a casual Miami Dolphins viewing party with friends.
  arts: Maricarmen Segundo nurtures a love for live music, regularly dancing to the timeless sounds of Celia Cruz and the Buena Vista Social Club at neighborhood venues, enjoys reading mystery novels by
    Agatha Christie and contemporary works on criminal-justice reform, and occasionally attends community theater productions featuring local actors.
  travel: Maricarmen Segundo prefers organized, low-stress trips that combine cultural immersion with family bonding, often returning to the Florida Keys for sun-filled weekends, having explored New Orleans
    for its jazz scene, and now dreaming of a pilgrimage to Seville, Spain to experience Semana Santa and flamenco.
  culinary: Maricarmen Segundo, an accomplished home cook, delights in preparing arroz con pollo with saffron-infused sofrito, slow-cooked ropa vieja seasoned with cumin and oregano, and savory picadillo
    featuring raisins and olives, while also sourcing fresh plantains and yucca from the local market for family gatherings.
  core: Maricarmen Segundo merges a disciplined correctional career with a vibrant love for salsa dancing, community service, and traditional cooking, all while juggling a stubborn sweet tooth for flan
    and a penchant for meticulously planning retirement savings.
background:
  cultural: Maricarmen is a first‑generation Cuban‑American raised in the vibrant Cuban community of Hialeah, Florida. Her family preserves traditions such as celebrating Nochebuena, listening to classic
    Cuban music, and speaking Spanish at home. She actively engages with local Cuban cultural organizations, participates in community events like the Calle Ocho Festival, and maintains a strong Catholic
    faith that informs her values of family, respect, and service. Her identity blends Cuban heritage with Floridian influences, shaping her worldview and everyday practices.
