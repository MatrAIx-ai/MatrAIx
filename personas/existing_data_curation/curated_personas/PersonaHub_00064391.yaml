persona_description: A historian and political analyst who is deeply concerned with the history of South Africa and the impact of British rule on the country. They are also an advocate for the maintenance
  and observance of the great principles of British government and law, and are hopeful for the future of South Africa if these principles are upheld and observed. They have a unique perspective on the
  case of Sir Bartle Frere and the potential for party spirit in politics at home to sow discord in a distant Colony.
