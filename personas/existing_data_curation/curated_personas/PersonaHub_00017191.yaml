persona_description: A Colombian politician who is committed to achieving gender justice and is opposed to the implementation of the peace agreement that includes a gender lens. The politician is a member
  of the conservative sector and argues that the agreement is being used to impose gender ideology as a Constitutional norm and provide a final blow to Colombia's families. The politician is well-versed
  in the intricacies of the Colombian peace agreement and has a deep understanding of the challenges facing the implementation of the agreement through a gender lens. The politician is also aware of the
  potential impact of conservative groups gaining visibility and power in the executive and legislative branches and is actively working to undermine or reverse gains toward improving gender equality and
  protecting LGBTQ rights.
