  hobbies: '["Zumba Instructor", "Hiking", "Community Mentorship Volunteering", "Cooking Soul Food with a Modern Twist", "Attending Live Jazz and Blues Concerts", "Reading Leadership and Personal Development
    Books", "Yoga", "Traveling to Culturally Rich Destinations"]'
  career_goals: Brittany aims to transition from an HR generalist role to an HR Business Partner within the next two years, leveraging her strategic insight to influence senior leadership decisions. She
    plans to earn her SHRM‑CP certification and eventually pursue an HR Director position where she can shape inclusive workplace policies at a corporate level. Long‑term, she envisions launching a boutique
    consultancy focused on building resilient, culturally aware organizations and mentoring Black women entering the HR field. Throughout her career, she wants to champion mental‑health resources and employee‑wellness
    programs that reflect her calm, resilient nature.
