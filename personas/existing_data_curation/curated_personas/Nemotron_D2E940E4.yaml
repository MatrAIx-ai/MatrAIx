personas:
  professional: Brittany Surtain, an HR professional with a knack for blending data‑driven analytics and human empathy, leverages their talent acquisition expertise, DEI program development, and benefits
    administration to drive strategic workforce initiatives while navigating the tension between structured compliance and flexible, people‑first solutions.
  sports: Brittany Surtain, an energetic Zumba instructor and avid hiker, joins the Chicago Cubs season ticket holder group for camaraderie, supports the Chicago Bears on Sundays, and incorporates weekend
    trail runs along the Lakefront Trail into their fitness regimen, preferring community‑driven activities over solitary workouts.
  arts: Brittany Surtain immerses themselves in Chicago’s vibrant jazz scene, regularly attending shows by artists like Christian McBride and the Chicago Blues Festival headliners Buddy Guy and Shemekia Copeland,
    while also appreciating contemporary theater productions at the Steppenwolf Theatre Company.
  travel: Brittany Surtain, a culturally curious traveler, plans balanced itineraries with their husband that blend structured museum visits in Kyoto, spontaneous street‑food tours in Oaxaca, and relaxed
    days exploring historic neighborhoods in Savannah, always scheduling enough downtime to recharge.
  culinary: Brittany Surtain, a confident home cook, blends soulful Southern flavors such as smoked turkey collard greens and spicy shrimp étouffée with modern twists like quinoa‑based jambalaya, frequently
    sourcing fresh fish at the Chicago Green City Market and experimenting with heirloom tomatoes and fresh herbs.
  core: Brittany Surtain balances a structured, data‑driven HR career with a spontaneous, socially vibrant lifestyle, thriving on community activities while occasionally letting organization slip in favor
    of real‑time joy.
background:
  cultural: Brittany grew up in the vibrant neighborhoods of Chicago, where African‑American traditions and a strong sense of community shaped her worldview. Family gatherings often centered around music,
    storytelling, and shared meals, reinforcing the values of resilience, mutual support, and celebration of heritage. Her upbringing included active participation in church and local cultural events such
    as Juneteenth festivals, which fostered an appreciation for historical legacy and social justice. These influences inform her commitment to diversity, equity, and inclusion in the workplace, as well
    as her dedication to giving back through mentorship and community outreach.
attributes:
  skills: '["Talent Acquisition", "Employee Relations", "Benefits Administration", "Performance Management", "HR Information Systems (HRIS)", "DEI Program Development", "Conflict Mediation", "Training and
