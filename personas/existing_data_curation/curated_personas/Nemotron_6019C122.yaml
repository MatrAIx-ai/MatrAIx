  hobbies: '[''Gardening'', ''Cooking'', ''Reading (Historical Fiction)'', ''Crossword Puzzles'', ''Walking the Dog'', ''Volunteering at Food Pantry'', ''Attending Community Theater'', ''Knitting/Quilting'',
    ''Local History Exploration'', ''Planning Family Outings'']'
  career_goals: Monica aims to transition from full‑time homemaking into a part‑time role that leverages her organizational expertise, such as a volunteer coordinator for a neighborhood association or an
    administrative assistant at a local nonprofit. She plans to enroll in a nonprofit management certificate program at a community college to formalize her skills. Her long‑term ambition is to secure a
    stable, predictable part‑time position that allows her to contribute to community welfare while maintaining a balanced schedule that supports her family life.
