  hobbies: '[''Watercolor painting'', ''Visiting local art galleries'', ''Reading art‑history books'', ''Hiking and birdwatching'', ''Nature photography with film camera'', ''Woodworking and furniture making'',
    ''Playing acoustic guitar'', ''Listening to classical and jazz music'', ''Volunteering with Habitat for Humanity'', ''Gardening (herb garden)'', ''Collecting vintage radios'']'
  career_goals: Clinton aims to transition from a frontline maintenance role to a senior facilities management position within the next five years, overseeing multiple properties in the Greenville area.
    He plans to obtain advanced certifications in HVAC and building automation, and to earn a Certified Facilities Manager (CFM) credential. Ultimately, he hopes to launch a small consulting firm that specializes
    in energy‑efficiency retrofits for historic homes, blending his technical expertise with his appreciation for art and architecture. Additionally, he wants to formalize a mentorship program for young
    tradespeople in his community, ensuring the next generation inherits both high standards of workmanship and a collaborative spirit.
