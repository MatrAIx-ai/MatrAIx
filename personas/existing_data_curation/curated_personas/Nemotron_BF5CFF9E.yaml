  career_goals: Ernesto aims to cement his legacy as a leading voice in applied operations research, particularly in designing resilient supply-chain solutions for healthcare and disaster response in the
    New England region. He plans to publish a series of case-study articles in peer-reviewed journals and co-author a practical guide that blends quantitative methods with visual storytelling for non-technical
    audiences. Over the next few years, he seeks to transition to a senior advisory role—either within a regional hospital network or as the founder of a boutique consultancy—where he can steer strategic
    initiatives and influence policy decisions. A passionate mentor, Ernesto also intends to expand his involvement with local universities and community programs to increase Latinx participation in STEM,
    establishing a scholarship fund and delivering workshops that combine analytical rigor with creative problem-solving.
