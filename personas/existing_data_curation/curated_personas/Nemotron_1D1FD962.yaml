personas:
  professional: Edgar Knight, a 27‑year‑old mechanical engineer, leverages their mastery of SolidWorks, CFD, and Python to spearhead renewable‑energy design projects, channeling a competitive drive honed
    at hackathons into charismatic stakeholder presentations while maintaining methodical Agile planning and a skeptical eye for untested ideas.
  sports: Edgar Knight, a 27‑year‑old tech enthusiast, drills at a downtown Houston MMA gym five times a week, competes in the local chess club’s monthly tournaments, roots for the Houston Rockets and Astros,
    and spends Saturdays kayaking on Buffalo Bayou while logging performance data in a custom Python script.
  arts: Edgar Knight, a 27‑year‑old mechanical engineer, frequents the House of Blues to catch live performances by Gary Clark Jr. and The Black Keys, curates a personal vinyl collection featuring Tame Impala
    and classic jazz, and admires sci‑fi concept art by Syd Mead, allowing the rhythm of music and visual imagination to spark innovative design ideas in their work.
  travel: Edgar Knight, a 27‑year‑old engineer, prefers meticulously planned tech‑focused trips, having explored Akihabara in Tokyo for gadget inspiration, road‑tripping to Austin’s live‑music scene for
    a weekend of blues festivals, and booking a future adventure to Iceland’s geothermal sites, balancing budget constraints with occasional splurges on boutique hotels that cater to their craft‑beer palate.
  culinary: Edgar Knight, a 27‑year‑old culinary hobbyist, expertly smokes Texas‑style brisket using hickory wood and pairs it with Saint Arnold’s Fancy Lawnmower craft beer, experiments with Raspberry Pi‑controlled
    sous‑vide for perfect pork ribs, and, though they relish impressing dinner guests, they sometimes over‑salt dishes in the excitement of hosting.
  core: Edgar Knight, a 27‑year‑old mechanical engineer, fuses a relentless competitive streak with organized curiosity, turning every hackathon win and BBQ experiment into a bold, talk‑filled showcase—though
    they often sacrifice sleep and postpone routine health checks in the pursuit of the next challenge.
background:
  cultural: Edgar grew up in a suburban Houston neighborhood in a family of Anglo‑American roots, blending traditional Southern hospitality with the multicultural vibrancy of the city. Texas values of independence,
    hard work, and community service were reinforced by his parents' emphasis on education and practical problem‑solving. Exposure to Houston's diverse culinary scene, music festivals, and international
    communities broadened his worldview, while his involvement in local engineering societies kept him connected to the region's strong oil‑and‑energy heritage. This mix of Southern pragmatism and urban
    diversity shapes his approachable yet results‑driven demeanor.
