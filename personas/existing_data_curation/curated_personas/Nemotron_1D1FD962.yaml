  career_goals: Within the next five to seven years, Edgar aims to become a Principal Engineer and later a Director of Engineering in the energy sector, focusing on sustainable technology solutions. He
    plans to obtain his Professional Engineer (PE) license, complement his technical expertise with an MBA, and lead multidisciplinary teams developing next‑generation renewable‑energy and advanced manufacturing
    projects. He also aspires to become a recognized thought leader by publishing technical papers, presenting at industry conferences, and mentoring junior engineers.
