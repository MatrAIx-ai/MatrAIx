  hobbies: '["Salsa dancing", "Cooking traditional Mexican cuisine", "Hiking in the San Bernardino mountains", "Community volunteering at food banks", "Mentoring youth", "Gardening", "Reading marketing
    and personal development books", "Attending local cultural festivals", "Traveling", "Yoga", "Photography"]'
  career_goals: Norma aims to advance into senior leadership, such as Director of Marketing or Vice President of Marketing, where she can shape regional or national brand strategy. She is passionate about
    designing inclusive, culturally relevant campaigns that resonate with the Hispanic community in Southern California and beyond. In addition, she seeks to mentor emerging marketers—especially women and
    Latinx professionals—and eventually launch her own boutique agency offering strategic consulting and creative services to small businesses and non‑profits.
