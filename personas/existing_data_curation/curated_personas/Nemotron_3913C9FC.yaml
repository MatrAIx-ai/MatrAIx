personas:
  professional: Norma Cruzortiz, a seasoned marketing manager, leverages strategic planning, data‑driven analytics, bilingual copywriting, and cross‑functional leadership to craft integrated campaigns,
    while their structured, results‑oriented mindset and sociable, collaborative style keep teams aligned and projects on schedule.
  sports: Norma Cruzortiz stays active by dancing salsa at local clubs, hiking the San Bernardino mountains on weekends with the Southern California Trail Riders, and practicing yoga at the LA Flow Studio,
    while cheering for the Los Angeles Dodgers, the LA Lakers, and supporting the LA Galaxy as a season ticket holder, blending structured workout routines with community‑focused team spirit.
  arts: Norma Cruzortiz captures everyday moments through street photography inspired by the works of Henri Cartier‑Bresson, enjoys listening to salsa legends like Marc Anthony and contemporary pop icons
    such as Beyoncé, and attends live performances at the Walt Disney Concert Hall featuring the Los Angeles Philharmonic, allowing the arts to fuel both their creative outlet and professional storytelling.
  travel: Norma Cruzortiz plans trips with careful itineraries, favoring a blend of adventure and relaxation by hiking the Grand Canyon, strolling through Napa Valley's vineyards, and exploring Barcelona's
    architecture, while also scheduling frequent weekend getaways to nearby Joshua Tree and occasional family reunions in Texas, demonstrating a love for both structured travel and spontaneous cultural
    immersion.
  culinary: Norma Cruzortiz, an intermediate home chef, delights in preparing traditional dishes such as chicken mole with ancho chile, pork carnitas simmered in orange juice, and fresh guacamole topped
    with cilantro and lime, often sourcing heirloom tomatoes and corn from their garden, and enjoys pairing meals with artisanal craft beers at family gatherings.
  core: Norma Cruzortiz balances a data‑driven marketing mindset with a love for spontaneous salsa nights, a habit of over‑booking their calendar, and a persistent tendency to over‑season every dish, reflecting
    a disciplined yet delightfully unpredictable spirit.
background:
  cultural: Norma was raised in a bilingual, Mexican‑American household in Southern California. Her parents immigrated from Mexico, and she grew up speaking both English and Spanish, celebrating traditions
    such as Día de los Muertos and quinceañeras with close family ties. This rich cultural heritage ingrained a strong sense of community, family responsibility, and respect for diverse perspectives. It
    also shapes her professional outlook, driving her to create marketing messages that honor cultural nuances and foster authentic connections. Living in Ontario, CA, she blends her Mexican roots with
    the multicultural environment of San Bernardino County, allowing her to navigate and celebrate a wide spectrum of cultural experiences.
attributes:
  skills: '["Marketing Strategy", "Integrated Campaign Management", "Brand Management", "Market Research", "Data Analysis", "SEO/SEM", "Social Media Management", "Content Creation", "Copywriting", "Budget
