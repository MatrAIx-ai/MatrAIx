persona_description: A chemist with a background in the fields of organic chemistry, inorganic chemistry, and analytical chemistry, who has made significant contributions to the study of transition metals,
  particularly the elements cobalt, nickel, manganese, and tungsten. Donnelly has also made notable contributions to the study of oxygen, chlorine, and other elements, and has published extensively in these
  areas. He has a strong interest in the history and development of chemistry, and has a policy of "each one teach one," meaning that he trains new graduate students in chemistry.
