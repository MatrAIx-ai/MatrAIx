  career_goals: Samuel often talks about becoming an astronaut who draws the stars or an artist who paints animals he discovers in the woods. In the short term, he aims to read more fluently, write his
    name and simple sentences, and master more complex LEGO creations. Long‑term, he envisions a role that blends his love of art, curiosity about the natural world, and desire to help others—perhaps as
    a scientist‑artist, teacher, or wildlife photographer. He looks forward to joining school art classes, participating in community nature walks, and continuing to develop the skills that support those
    dreams.
