  career_goals: Although he plans to fully retire within the next year, Christian aims to channel his experience into a part‑time consultancy role with the Utah Police Academy, designing curriculum on investigative
    ethics and evidence integrity. He hopes to author a memoir that candidly recounts the evolution of policing in Salt Lake County, emphasizing the balance between curiosity about new methods and a sober,
    practical assessment of their effectiveness. He also seeks to mentor a small cohort of retiring officers, helping them transition to civilian life while maintaining community safety through volunteer
    neighborhood‑watch initiatives. On a personal level, he wants to stay physically active, reduce stress by practicing routine meditation and regular hikes in the Wasatch Mountains, and allocate time
    for travel to several national parks before health considerations limit his mobility.
