personas:
  professional: Asha Stephens, an aspiring teen community organizer who leverages their curiosity and practical problem‑solving to coordinate after‑school tutoring at the local community center while balancing
    school responsibilities and basketball practice.
  sports: Asha Stephens, a ball‑handing enthusiast who spends afternoons dribbling at the River Valley Hoops Club and cheers for the nearby NBA team the Detroit Pistons, balances competitive pick‑up games
    with daily jogs, and values teamwork as a reflection of their cooperative spirit.
  arts: Asha Stephens, an avid fan of gospel powerhouse Kirk Franklin and hip‑hop lyricist Kendrick Lamar, devours mystery novels by Agatha Christie and Gillian Flynn, and spends weekend evenings crafting
    friendship bracelets while listening to contemporary R&B playlists, letting music and literature fuel their creative outlet.
  travel: Asha Stephens, who plans weekend getaways through school’s travel club and cherishes family road trips to New Orleans for Mardi Gras and hikes in the Great Smoky Mountains, dreams of exploring
    Washington, D.C. museums while balancing a modest travel budget and school commitments.
  culinary: Asha Stephens, an enthusiastic budding cook who experiments with Southern classics like fried chicken, collard greens, cornbread with buttermilk, and sweet tea, often follows her grandmother’s
    handwritten recipes while tossing in fresh herbs like thyme and basil to personalize each dish.
  core: Asha Stephens blends boundless curiosity with a friendly, organized hustle, yet they often forget to charge their phone after late‑night music sessions and habitually leave basketball sneakers at
    the park before remembering to fetch them.
background:
  cultural: Asha is a Black teenager raised in Gadsden, Alabama, where her family's roots trace back to the African‑American community of the South. She grew up immersed in Southern traditions—church gatherings,
    gospel music, and family meals featuring soul food. The civil‑rights history of Alabama and the close‑knit support of her extended family and church have shaped her values of community service, resilience,
    and cultural pride. Her upbringing blends the warmth of Southern hospitality with a strong sense of identity and solidarity typical of African‑American culture in the region.
