  career_goals: Asha aims to pursue a career that lets her continue helping others, with a goal of becoming a community health worker or a school counselor after completing high school and earning a college
    degree in social work. She envisions leading youth mentorship programs in Gadsden and advocating for health and educational resources in underserved neighborhoods.
