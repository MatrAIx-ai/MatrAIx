  hobbies: '[''Powwow drumming'', ''Wood carving'', ''Beadwork'', ''Painting'', ''Digital photography'', ''Reading philosophy and Indigenous literature'', ''Hiking'', ''Gardening'', ''Community theater
    participation'', ''Poker and strategic card games'', ''Journaling'']'
  career_goals: Prince aspires to establish a community cultural center in Stilwell that offers art workshops, language classes, and a space for tribal elders to share stories with younger generations.
    He hopes to become a recognized cultural educator, creating curriculum for local schools that integrates Cherokee history and contemporary Indigenous perspectives. He also seeks to launch a small business
    selling handcrafted wood and bead items, providing sustainable income while preserving traditional skills. Long‑term, Prince wants to author a memoir that weaves his personal journey with broader tribal
    narratives, contributing to the preservation of his community’s heritage.
