  career_goals: Howard aspires to blend his love for visual creativity with his organizational strengths in a future career. He dreams of becoming a graphic designer or multimedia artist, where he can produce
    compelling visual content while managing projects from concept to completion. In the longer term, he imagines working in a creative agency or a museum’s education department, shaping engaging art experiences
    for the public. He intends to pursue a high school diploma, followed by a degree in visual arts or design, and hopes to gain internships that allow him to develop professional portfolios and collaborative
    skills.
