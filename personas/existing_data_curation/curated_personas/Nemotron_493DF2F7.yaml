personas:
  professional: Nellie Salone is a community event coordinator and aspiring caterer who leverages their natural charisma and public‑speaking talent to turn informal block parties into smooth, lively gatherings,
    relying on their hands‑on budgeting and conflict‑resolution skills to keep things on track despite their laid‑back, sometimes disorganized planning style.
  sports: Nellie Salone is a fan of the Dallas Cowboys and enjoys playing in a local co‑ed softball league, while also joining early‑morning jogs along the Trinity River Trail and attending occasional yoga
    classes at the community center to stay active.
  arts: Nellie Salone sings gospel in their church choir, drawing inspiration from Aretha Franklin and Kirk Franklin, and spends their free time attending performances at the Fort Worth Playhouse and enjoying
    the rhythmic beats of local jazz nights featuring artists like Kamasi Washington.
  travel: Nellie Salone favors spontaneous weekend trips to Austin for its live‑music buzz and to explore new eateries, dreams of a culinary pilgrimage to New Orleans, yet typically plans travel on a modest
    budget, opting for affordable rideshares and budget‑friendly Airbnbs.
  culinary: Nellie Salone loves preparing Southern‑style soul‑food classics such as collard greens simmered with smoked turkey, crispy fried chicken, and buttery corn‑bread, frequently using smoked paprika,
    hot sauce, and sweet cornmeal, and they delight in experimenting with homemade peach chutney to accompany their dishes.
  core: Nellie Salone turns every impromptu neighborhood gathering into a vibrant celebration with their charismatic, talkative energy, even as a relaxed, sometimes chaotic planner who thrives on connecting
    people through food, music, and craft.
background:
  cultural: Nellie is an African‑American woman rooted in the Fort Worth Black community. Her upbringing was shaped by Southern traditions, church life, and close‑knit family gatherings that celebrate milestones
    with music, food, and storytelling. She participates in cultural observances such as Juneteenth parades, soul‑food cook‑outs, and neighborhood block parties that honor the history and resilience of
    Black residents in Tarrant County. The local churches and community centers have been pivotal in fostering her sense of belonging, providing spaces where she can practice gospel singing, volunteer,
    and share her culinary heritage. Her identity reflects a blend of contemporary urban influences and the rich legacy of African‑American culture in North Texas.
attributes:
  skills: '["Interpersonal communication", "Public speaking", "Community outreach", "Event coordination (informal)", "Hospitality", "Basic cooking (southern soul food)", "DIY crafts and jewelry making",
