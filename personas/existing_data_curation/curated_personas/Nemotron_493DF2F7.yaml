  hobbies: '["Singing in church choir", "Cooking soul food dishes", "Crafting (quilting, jewelry)", "Attending community festivals", "Hosting neighborhood gatherings", "Exploring new restaurants", "Watching
    reality TV shows", "Reading lifestyle blogs", "Volunteering at community center", "Socializing at local coffee shops"]'
  career_goals: Nellie aims to secure her high‑school equivalency (GED) within the next year, followed by a short‑term certification in either culinary arts or cosmetology, fields that combine her love
    for cooking and her talent for personal interaction. Leveraging her sociable nature, she plans to launch a home‑based catering and event‑styling service featuring traditional soul‑food menus and vibrant
    décor inspired by her DIY craft skills. In parallel, she hopes to grow a local social‑media presence that highlights Fort Worth’s Black cultural events, eventually positioning herself as a community
    liaison for a nonprofit organization that supports neighborhood development and youth programs. Her long‑term ambition is to create a sustainable small business that allows flexibility to balance family
    life while contributing to the cultural vitality of her community.
