  hobbies: '[''Building LEGO Technic sets'', ''Reading nonfiction (local history, science)'', ''Playing chess (small club)'', ''Basic coding with Scratch'', ''Solving puzzles (jigsaw, Sudoku)'', ''Exploring
    local parks (White River trail)'']'
  career_goals: Joey aspires to a career that rewards careful planning, systematic problem solving, and tangible outcomes. He envisions attending a STEM‑focused high school and later studying civil or mechanical
    engineering, with the goal of designing safe infrastructure and community spaces in Indianapolis. He is also intrigued by the idea of becoming a systems analyst or logistic coordinator, roles that require
    precise organization and reliability. To prepare, he aims to maintain strong grades in math and science, join his school’s robotics club, and seek mentorship from professionals in engineering fields.
