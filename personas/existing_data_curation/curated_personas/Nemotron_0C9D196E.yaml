personas:
  professional: Joey Ohlerking, an aspiring junior robotics enthusiast, channels their methodical planning and love for step‑by‑step challenges into building intricate LEGO Technic models and coding simple
    Scratch games, meticulously documenting each project in a color‑coded planner to track progress and troubleshoot any hiccups.
  sports: Joey Ohlerking follows the Indianapolis Colts and Indiana Pacers on television while personally keeping fit through routine walks along the White River trail and a weekly Saturday bike ride with
    the local neighborhood cycling club, preferring low‑key, solitary activity over organized team sports.
  arts: Joey Ohlerking finds creative inspiration in the precise engineering of LEGO Technic, the whimsical storytelling of Pixar's 'Inside Out', and the soaring orchestral scores of Hans Zimmer, often
    sketching mechanical designs while listening to Zimmer’s music to spark imagination.
  travel: Joey Ohlerking prefers carefully plotted family road trips, having already visited the Indiana State Fair, a weekend excursion to Chicago’s Museum of Science and Industry, and dreaming of a summer
    hike in the Great Smoky Mountains, where they intend to chart each trail segment in their trusty planner.
  culinary: Joey Ohlerking favors classic Midwestern comfort foods like chicken tenders and mac & cheese, but also enjoys assembling DIY pizza slices with pepperoni and olives, rigorously following step‑by‑step
    recipe cards with the same precision as their LEGO builds, though they sometimes over‑bake the crust when distracted by a new puzzle.
  core: Joey Ohlerking is a detail‑driven 11‑year‑old who blends a love for structured creativity with disciplined planning, balanced by occasional impulsive snack cravings and a habit of leaving LEGO pieces
    scattered on the floor.
background:
  cultural: Joey grows up in a middle‑class family in Indianapolis, Indiana, where Midwestern values of practicality, community involvement, and modesty are emphasized. His family celebrates common American
    holidays such as Thanksgiving and Independence Day, and they often attend local community events like the Indiana State Fair and neighborhood block parties. He attends a public elementary school that
    encourages participation in extracurricular clubs, including a robotics group and a small chess club. The local culture, which values organized public spaces and a strong work ethic, reinforces Joey’s
    preference for structure and his desire to contribute reliably to group activities. While he enjoys the occasional family sports viewing, his personal interests lean toward solitary or small‑group pursuits
    that align with his reserved nature.
attributes:
  skills: '[''Mathematics (arithmetic and problem solving)'', ''Organizational planning (classroom chores, project coordination)'', ''Detail‑oriented building (LEGO Technic, model kits)'', ''Basic coding
