  career_goals: Justin aims to advance to a supervisory role, such as shift lead or team captain, where he can apply his expertise to improve safety and efficiency while gaining a more predictable schedule
    that eases his stress. He plans to earn a Certified Production Technician (CPT) credential and a formal safety officer certification within the next two years. Long‑term, he is interested in transitioning
    to a training specialist position, delivering one‑on‑one mentorship to new hires, which aligns with his competitive drive to be recognized for competence while allowing him to work in a more controlled,
    quieter environment.
