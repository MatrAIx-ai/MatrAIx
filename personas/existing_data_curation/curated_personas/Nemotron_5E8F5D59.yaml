  career_goals: Although officially retired, Melba aims to leave a lasting imprint on her community by documenting Sag Harbor's local history through a memoir and a series of oral‑history recordings with
    longtime residents. She aspires to mentor her great‑grandchildren in reading and writing, encourage intergenerational storytelling, and support her husband in maintaining an active, healthy lifestyle.
    Her personal ambition is to ensure that the values of kindness, cooperation, and cultural preservation she holds dear endure beyond her years, perhaps by establishing a small scholarship for local arts
    students.
