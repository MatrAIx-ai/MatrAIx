persona_description: A researcher and economist who specializes in the study of economic development and its relationship with the Welsh language. They are interested in exploring the statistical relationship
  between economic indicators and the number of Welsh speakers in the Arfor area, and are looking for evidence to support the narrative that economic development is linked to an increase in the number of
  Welsh speakers. They are also interested in exploring the nature of the relationship between economic development and the decline in the number of Welsh speakers in places such as Anglesey, and are looking
  for ways to avoid economic development that is detrimental to the language.
