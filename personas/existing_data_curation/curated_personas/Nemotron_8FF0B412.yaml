    and shift coordination'', ''Process optimization and workflow design'', ''Public speaking and training facilitation'', ''Critical tasting and quality assessment'', ''Competitive culinary competition
    participation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Food photography'', ''Attending local food and wine festivals'', ''Experimenting with new recipes at home'',
    ''Hosting themed dinner parties for friends and family'', ''Participating in community theater improv workshops'', ''Hiking in the Cascade foothills'', ''Collecting vintage kitchenware'', ''Writing
    a food-and-art blog'']'
  career_goals: Looking ahead, Michael aims to transition from daily line supervision to a strategic leadership role within the regional food-service sector. Over the next three to five years he plans to
    secure a position as a regional culinary operations manager, where he can implement cost-saving initiatives and elevate kitchen standards across multiple locations. Parallel to this, he aspires to open
    a boutique farm-to-plate restaurant in the Willamette Valley that treats each dish as a work of art, integrating his love of visual arts into the dining experience. He also intends to launch a community
    workshop series that teaches aspiring cooks the intersection of culinary technique and artistic presentation, and to author a memoir that chronicles his journey through the restaurant industry and his
    lifelong passion for art.
