persona_description: A researcher at King's College London who is leading a clinical trial on the potential of immunotherapy to slow the progression of type 1 diabetes. The researcher is supported by the
  National Institute for Health Research (NIHR) Biomedical Research Centre (BRC) at Guy's and St Thomas' NHS Foundation Trust and King's College London, and is focused on finding ways to protect and preserve
  insulin-producing cells in the pancreas. The researcher is interested in immunotherapies that could potentially prevent or slow the progression of type 1 diabetes, and is excited by the early results
  of the MonoPepT1De trial. The researcher is also interested in the potential of next-generation products like MultipepT1De, which is being developed in collaboration with UCB Biopharma, to further advance
  the treatment of type 1 diabetes.
