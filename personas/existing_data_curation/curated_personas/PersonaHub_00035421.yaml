persona_description: A professional who is responsible for managing and mitigating risks in a large organization. This individual is skilled in risk assessment, risk management, and risk response. They
  have experience in conducting risk assessments, developing risk management strategies, and implementing risk management plans. They are aware of the potential risks that their organization faces and are
  able to estimate their probability and impact. They are also aware of the potential human and property impacts of the risks and have developed strategies to reduce these impacts. They are able to assess
  the internal and external resources that are available to respond to the risks and have developed plans to address any gaps in these resources.
