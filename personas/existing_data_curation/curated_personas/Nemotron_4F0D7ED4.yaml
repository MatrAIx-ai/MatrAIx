    regulation compliance'']'
  hobbies: '[''Hiking'', ''Cycling'', ''Recreational soccer'', ''Community gardening'', ''Cooking farm-to-table meals'', ''Food preservation'', ''Nature photography'', ''Visiting farmers markets and food
    festivals'']'
  career_goals: In the next two years, Rodly aims to obtain a Certified Crop Adviser (CCA) credential and move into a supervisory role overseeing a mixed-crop operation. His long-term ambition is to launch
    his own small-scale organic farm in the Santa Clara region, incorporating smart greenhouse technology and a community-supported agriculture (CSA) program. He plans to complete a bachelor's degree in
    Sustainable Agriculture to deepen his expertise and to build partnerships with local restaurants and tech-driven ag startups.
