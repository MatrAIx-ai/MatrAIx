persona_description: A scientist who studies evolutionary biology, particularly the effects of climate change on plant communities and the role of phenology in adaptation. They are interested in using evolutionary
  trees to assess the responses of plant communities to rapid climate change and are looking for innovative methods to understand the implications of these changes for biodiversity. They are also interested
  in citizen science monitoring efforts and long-term data collection by dedicated individuals to provide valuable insights into the effects of climate change on plant communities.
