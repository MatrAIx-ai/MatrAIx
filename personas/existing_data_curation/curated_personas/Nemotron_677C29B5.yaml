  hobbies: '[''Basketball (recreational league)'', ''Group fitness classes'', ''Classic car restoration'', ''Weekend hikes'', ''Barbecues and social gatherings'', ''Live music concerts'', ''Reading business
    and technology non‑fiction'', ''Volunteering with family support program'']'
  career_goals: He aspires to advance into a senior sales leadership role, such as Regional Sales Manager or Director of Wholesale Operations, where he can shape strategic growth initiatives for his company.
    He aims to deepen his expertise in supply chain optimization and earn a certification like the Certified Supply Chain Professional (CSCP) to complement his sales acumen. Over the next five years, David
    plans to lead a high‑performing sales team, mentor junior representatives, and drive market expansion into emerging manufacturing sectors. He also envisions leveraging his experience to eventually start
    a boutique consultancy focused on sales process improvement for midsize manufacturers.
