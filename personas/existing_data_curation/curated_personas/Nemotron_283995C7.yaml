    Potluck Dinners'', ''Playing Piano (casual)'', ''Participating in Neighborhood Potluck Games'']'
  career_goals: Betty aims to pursue a Master’s in Educational Leadership with the goal of becoming a curriculum specialist or assistant principal within the Leon County School District. She hopes to influence
    district‑wide literacy initiatives and develop professional‑development workshops that blend structured best practices with flexible, student‑centered approaches. Additionally, she aspires to mentor
    more teachers, champion community‑school partnerships, and eventually shape policy around equitable access to arts and humanities education. While valuing stability, she seeks a role that still allows
    her to maintain a direct classroom connection part‑time, perhaps through tutoring or summer enrichment programs.
