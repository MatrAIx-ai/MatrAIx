personas:
  professional: Betty Pierce, a veteran elementary and middle school teacher with over 25 years of experience, blends rigorous, literacy‑focused curriculum design with the flexibility to seize spontaneous
    teachable moments, leveraging tools like Google Classroom and interactive whiteboards while assertively mentoring new teachers and fostering community outreach programs.
  sports: Betty Pierce enjoys leisurely hikes through Apalachicola National Forest, participates in a local walking club, and cheerfully follows the Florida State Seminoles football team, attending games
    when the schedule aligns, while eschewing intense gym workouts in favor of gentle stretching and yoga sessions at the community center.
  arts: Betty Pierce nurtures a creative side through watercolor painting influenced by Georgia O’Keeffe’s landscapes, attends community theater productions of August Wilson’s plays, and fills evenings
    with folk‑bluegrass tunes by Alison Krauss, which they view as extensions of storytelling.
  travel: Betty Pierce prefers relaxed road trips to historic Southern cities like Savannah and Charleston, occasional weekend escapes to New Orleans for its music and cuisine, and spontaneous detours along
    the Gulf Coast, planning just enough to secure accommodations while leaving plenty of room for unplanned discoveries.
  culinary: Betty Pierce delights in cooking classic Southern comfort foods—shrimp and grits, collard greens, biscuits, and fried chicken—while experimenting with herb‑infused rubs from their garden, mastering
    a silky roux for gumbo, and hosting lively potluck dinners featuring heirloom tomato salads and lavender‑kissed shortbread.
  core: Betty Pierce is a structure‑loving educator who mixes meticulous lesson planning with spontaneous storytelling, tends a herbal garden, occasionally forgets bill deadlines, and can’t resist a good
    potluck.
background:
  cultural: Betty Ann grew up in a middle‑class white family in the Florida Panhandle, where Southern hospitality, church community, and a reverence for tradition were daily touchstones. Her upbringing
    emphasized the value of public education, community service, and a strong work ethic. Though she identifies with the modesty of her rural roots, her humanities education and years teaching in a diverse
    Tallahassee district have broadened her worldview, fostering an appreciation for multicultural perspectives and inclusive curricula. She maintains ties to Southern cultural practices—celebrating local
    festivals, cooking gumbo and pecan pie, and attending church gatherings—while also embracing the progressive, civic‑engaged atmosphere of the state capital.
