  hobbies: '[''Reading (business & non‑fiction)'', ''Yoga'', ''Balcony Gardening'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Cooking (international recipes)'', ''Walking in Parks'', ''Volunteering (financial
    literacy teaching)'', ''Jazz Music Appreciation'', ''Book Club Participation'']'
  career_goals: Helena aims to move from her specialist role into senior leadership within operations, targeting positions such as Director of Business Operations or Vice President of Operations within
    the next five years. To support this progression, she plans to earn a Project Management Professional (PMP) certification and a Six Sigma Black Belt, while also enrolling in a part‑time MBA program
    to broaden her strategic management perspective. Her ambition includes leading enterprise‑wide operational transformation initiatives that embed data‑driven decision making, sustainability, and heightened
    employee engagement. Additionally, she is passionate about mentoring emerging talent—particularly women in business—and contributing to corporate social responsibility projects that benefit the Bronx
    community.
