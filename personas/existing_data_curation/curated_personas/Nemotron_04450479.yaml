  career_goals: Yecenia aims to advance to a supervisory role within the Seguin Police Department, targeting a sergeant or detective position within the next five years. She wants to spearhead a community‑outreach
    program that pairs police officers with local schools to provide safety education and mentorship for at‑risk youth, leveraging her education background. Long‑term, she hopes to become a police academy
    instructor or a precinct commander, shaping policy that emphasizes cultural sensitivity, mental‑health awareness, and collaborative problem‑solving.
