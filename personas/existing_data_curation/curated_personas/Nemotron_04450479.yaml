personas:
  professional: Yecenia Gonzalez is a bilingual police officer in Seguin who leverages their education background to excel in community policing, de‑escalation, and training workshops, merging structured
    investigative skills with a sociable, caring approach to building trust across the community, and they consistently prioritize clear communication with residents.
  sports: Yecenia Gonzalez plays recreational soccer with the Seguin Dreamers league, follows the San Antonio Spurs and the Houston Astros, and hikes the Texas Hill Country trails every Saturday, balancing
    competitive spirit with a love for group fitness, and they often join teammates for post‑game celebrations.
  arts: Yecenia Gonzalez enjoys salsa dancing to the rhythms of Carlos Santana and Ana Tijoux, reads crime thrillers by Gillian Flynn and Tana French, and attends live performances by local mariachi ensembles
    and the San Antonio Symphony, weaving vibrant cultural and artistic expression into their evenings, and they often explore new galleries on weekend outings.
  travel: Yecenia Gonzalez prefers organized weekend getaways, having trekked the Bluebonnet Trail in Texas, explored the historic plazas of Oaxaca, and dreaming of joining the Carnival in Rio de Janeiro,
    blending adventure with structured planning and mindful budgeting, and they always map out routes in advance.
  culinary: Yecenia Gonzalez excels at cooking tamales de rojo, chiles rellenos, and fresh guacamole with coriander and tomatillos, often sourcing ingredients at local farmer's markets for family celebrations,
    yet they frequently add a little too much chili powder, a harmless quirk that friends tease them about.
  core: Yecenia Gonzalez blends disciplined policing with vibrant community roots, juggling structured career goals, spontaneous salsa steps, and a habit of over‑seasoning every sauce they make.
background:
  cultural: Yecenia grew up in a Mexican‑American household in Seguin, where Spanish was spoken alongside English and family gatherings centered around food, music, and Catholic traditions. Her parents
    instilled values of respeto, familismo, and community service, shaping her commitment to public safety and helping others. She celebrates Día de los Muertos and Mexican Independence Day with her extended
    family, and she maintains strong ties to the local Hispanic community, often serving as a cultural liaison in her police work.
