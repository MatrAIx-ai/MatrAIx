personas:
  professional: Sharon Conley, a budding wildlife explorer who recreates zoo keeper duties with stuffed animals and building blocks, shows early practical problem‑solving and relentless curiosity while
    favoring spontaneous play over strict schedules, and occasionally competes to be the 'most knowledgeable' about animal facts, they navigate their pretend world with a competitive spark.
  sports: Sharon Conley, a tiny soccer enthusiast on the community park’s mini‑league who prefers small‑team drills, roots for the Indiana Pacers during family game nights, and watches the Indianapolis
    Colts’ touchdowns from the backyard, they channel their competitive streak into tag games with two or three friends while staying comfortable in low‑stress, intimate settings.
  arts: Sharon Conley, who spends afternoons drawing zoo animals with crayons while humming The Wiggles and Disney’s ‘Let It Go,’ often explores the Children’s Museum’s interactive art stations, and delights
    in folk music at the local fair, they let their imagination run wild with each colorful stroke.
  travel: Sharon Conley, a four‑year‑old explorer who enjoys short family trips to the Indianapolis Zoo and state fair, dreams of a road‑trip to the Great Smoky Mountains, prefers car rides with mom and
    dad over crowded planes, and loves planning adventures with sticker‑filled map books, they navigate new places with a curious, low‑stress style.
  culinary: Sharon Conley, a selective yet adventurous eater whose top kitchen hits are mac‑and‑cheese, chicken nuggets, and strawberry slices, proudly declares the perfect cheese melt on their personal
    pizza, and often spills their milky cereal in a joyful mess, they approach mealtime with a blend of practicality and playful experimentation.
  core: Sharon Conley, a bright, four‑year‑old with practical curiosity, a quiet, small‑group nature, a secret competitive spark, and a love for zoo visits, crayons, and simple savings, they navigate life
    with relaxed flexibility and occasional mess‑making.
background:
  cultural: Sharon is raised in a white, middle‑class family in Indianapolis, Indiana. Her upbringing reflects typical Midwestern values of practicality, independence, and community involvement. Family
    traditions include celebrating Thanksgiving, Fourth of July fireworks, and local fairs, while weekend trips to the Indianapolis Zoo and the Children’s Museum reinforce a love of learning. At preschool,
    she is exposed to a blend of American cultural norms and occasional multicultural activities, such as learning simple Spanish greetings. The local environment of parks, riverfront trails, and a supportive
    neighborhood shapes her preference for small‑group, low‑stress social interactions and a flexible, curiosity‑driven approach to everyday life.
attributes:
  skills: '[''stacking building blocks'', ''solving simple jigsaw puzzles'', ''identifying colors and shapes'', ''following basic step‑by‑step instructions'', ''self‑directed drawing and storytelling'',
