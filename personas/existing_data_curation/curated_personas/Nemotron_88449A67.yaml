  hobbies: '[''building blocks and magnetic tiles'', ''simple jigsaw puzzles'', ''drawing colorful pictures'', ''reading picture books about science and how things work'', ''visiting children’s museum exhibits'',
    ''quiet park explorations with a small group of friends'', ''inventing speed‑based games'']'
  career_goals: Even at four, Sharon already talks about becoming someone who can create and fix things. She dreams of being an "inventor" or "engineer" who builds cool machines, inspired by the way she
    takes apart her toys to see how they work. She also imagines herself as a teacher for a small group of kids, where she can share her curiosity and guide others in hands‑on projects. Her ambition is
    to be the best at building and solving problems, reflecting her competitive spirit and practical mindset.
