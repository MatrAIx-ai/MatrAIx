  career_goals: Sarah dreams of one day becoming a wildlife biologist or veterinarian, careers that combine her love of animals with her curiosity about how ecosystems work. She is motivated to excel in
    science classes, hopes to win her school science fair with an experiment about local pollinators, and plans to join a robotics club to deepen her coding skills. In the longer term, she envisions studying
    environmental science and using her practical abilities to help protect the natural world.
