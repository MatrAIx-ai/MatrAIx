personas:
  professional: Sarah Julian is a budding naturalist and aspiring scientist who spends afternoons cataloguing birds and leaves in her nature journal, and they blend their organized curiosity with practical
    experiment design to turn simple backyard observations into miniature research projects.
  sports: Sarah Julian plays forward for the Sandhills Youth Soccer Club U10 co‑ed team, enjoys cheering the Chicago Cubs and admiring pitcher Dylan Cease during family game nights, and they also join the
    school’s spring intramural track for 800‑meter runs.
  arts: Sarah Julian practices piano each evening, focusing on simple variations of 'Twinkle Twinkle Little Star', reads adventure novels like 'Percy Jackson' and 'The Chronicles of Narnia', draws detailed
    botanical sketches inspired by John James Audubon, and they find inspiration in Studio Ghibli films such as 'My Neighbor Totoro'.
  travel: Sarah Julian loves family trips that mix education and fun, from the annual Illinois State Fair where they savor corn dogs and ride the Ferris wheel, to weekend visits to Chicago’s Museum of Science
    and Industry, and they dream of exploring Yellowstone National Park while staying within a modest family budget.
  culinary: Sarah Julian delights in rustic Midwestern meals, helping bake apple pie for Thanksgiving, seasoning homemade mac and cheese with fresh basil from their herb garden, and they often sneak extra
    chocolate chips into cookie dough despite their mother’s gentle reminders.
  core: Sarah Julian blends quiet curiosity with practical flair, turning nature walks into scientific journals, pocket budgets into savings goals, and piano riffs into daily rituals, all while navigating
    the occasional mess of a small‑team soccer field.
background:
  cultural: Sarah is raised in a white, Midwestern family in Sandwich, Illinois, a small town in DeKalb County with deep agricultural roots. Her family values community involvement, self‑reliance, and modesty,
    which are reflected in local traditions such as county fairs, church gatherings, and school events. She celebrates holidays like Thanksgiving and Christmas with extended family, often helping to prepare
    meals and organize neighborhood activities. The town’s emphasis on outdoor life—farms, parks, and seasonal festivals—has nurtured her appreciation for nature and practical skills, while the close‑knit
    school environment supports her reserved yet cooperative personality.
