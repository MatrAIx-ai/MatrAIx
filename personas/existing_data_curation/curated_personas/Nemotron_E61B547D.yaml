personas:
  professional: Maria Marquez, an aspiring digital illustrator and budding interactive storyteller, channels their boundless curiosity and competitive streak into creating folklore-inspired characters on
    their tablet while methodically organizing Scratch projects, yet often frets over the polished finish of each piece.
  sports: Maria Marquez, a dedicated member of the Oakland Youth Soccer Club, idolizes the San Jose Earthquakes, trains competitively after school, and balances their athletic pursuits with a passion for
    art and coding.
  arts: Maria Marquez devotes evenings to sketching characters drawn from folklore, dissecting graphic novels like "Amulet," and curating playlists that blend Latin pop star Bad Bunny with indie band Snail
    Mail, shaping their creative voice.
  travel: Maria Marquez often explores Redwood Regional Park and the vibrant murals of the Oakland Arts District, and they dream of a school field trip to the historic streets of San Francisco's Chinatown
    and the colorful markets of Mexico City to inspire new artwork.
  culinary: Maria Marquez helps their mother prepare tamales, mastering the art of seasoning pork and shaping masa, while also enjoying avocado toast, fresh mango slices, and experimenting with oatmeal
    spiced with cinnamon and cocoa.
  core: Maria Marquez is a fiercely curious 12‑year‑old doodler who codes weekend stories, worries about every brushstroke, and can’t resist a good soccer goal.
background:
  cultural: Maria Liz is a first‑generation Mexican‑American. Her parents immigrated from Jalisco, and she grew up in Oakland’s vibrant Fruitvale community, where Spanish is spoken at home and cultural
    celebrations like Día de los Muertos, Cinco de Mayo, and Las Posadas are central. She actively participates in the local Mexican cultural center’s art workshops and the community’s danza folklórica
    troupe. Her bilingual upbringing and family’s emphasis on respect for elders, communal values, and storytelling shape her identity and inspire her artistic work, which often blends contemporary themes
    with traditional Mexican motifs.
attributes:
  skills: '["Bilingual Spanish-English", "Sketching and drawing (pencil, charcoal)", "Digital illustration (Procreate on tablet)", "Basic coding in Scratch", "Creative writing and storytelling", "Classroom
    presentations and public speaking", "Math problem solving", "Soccer team player"]'
  hobbies: '["Drawing and sketching", "Digital illustration (Procreate)", "Scratch programming", "Reading graphic novels", "Playing soccer", "Listening to music (Latin pop, indie)", "Cooking Mexican recipes
    with family", "Folkloric dance (danza folklórica)", "Exploring local parks and sketching cityscapes", "Journaling"]'
  career_goals: Maria Liz dreams of merging her love for art and technology by becoming a visual designer or concept artist for video games and multimedia projects. In the short term, she aims to earn a
    spot in the Oakland Art & Tech Academy, win a regional youth art competition, and develop a portfolio that highlights her Mexican cultural themes. Long‑term, she envisions studying graphic design or
    interactive media at a university, creating culturally‑rich digital stories that celebrate Mexican traditions, and eventually working as a user‑experience designer or illustrator for a studio that values
    diversity.
