personas:
  professional: Belal Handoo, a 19‑year‑old associate‑degree Computer Science student, translates a methodical, spreadsheet‑driven planning style and a competitive spark into reliable Python scripts and
    Arduino prototypes, often taking the lead in hackathon teams while they question teammates’ assumptions to ensure practical, data‑backed outcomes.
  sports: Belal Handoo spends weekend afternoons playing competitive cricket with a local New England club while they cheer for the Boston Red Sox and Boston Celtics, and maintains a disciplined fitness
    routine of three‑day‑a‑week treadmill sprints to counterbalance the sedentary coding lifestyle.
  arts: Belal Handoo captures New England’s vibrant autumn foliage with a DSLR, emulating Ansel Adams’ use of light and shadow, while they let their playlists oscillate between Ravi Shankar’s sitar improvisations
    and Tame Impala’s psychedelic rock, reflecting a blend of analytical precision and creative curiosity.
  travel: Belal Handoo plans trips with spreadsheet‑level precision, favoring weekend getaways to Boston’s historic neighborhoods and New York’s tech meetups, while they dream of a spring pilgrimage to
    Kyoto’s cherry blossoms and a summer hike through the Swiss Alps, balancing the thrill of new tech scenes with the restorative calm of nature.
  culinary: Belal Handoo routinely cooks aromatic dishes like aloo gobi, chicken tikka masala, and paneer butter masala using cumin, coriander, and garam masala, while they also perfect a New England apple
    crumble that blends local apples with a pinch of cardamom, showcasing a modest but adventurous kitchen skill set.
  core: Belal Handoo is a 19‑year‑old tech‑savvy strategist who juggles meticulous coding projects and cricket matches, lives by spreadsheets, indulges in occasional late‑night gaming marathons, and they
    habitually over‑analyze both code and social cues.
background:
  cultural: Belal comes from a South Asian (Gujarati) family that immigrated to the United States a generation ago. Raised in Plainville, Connecticut, he balances a strong sense of cultural heritage—celebrating
    Diwali, Holi, and Navratri with family gatherings and traditional cuisine—with the American emphasis on individual achievement and practical career planning. His parents value education and stability,
    which reinforces his methodical approach to studies and work, while his community ties keep him connected to the diaspora through language, cultural events, and a supportive network of peers.
attributes:
  skills: '["Python programming (beginner)", "Data analysis with Excel and Google Sheets", "Technical writing for lab reports", "Project planning and time management", "Basic circuit design and Arduino
    prototyping", "Bilingual: English and Gujarati", "Critical thinking and problem solving", "Advanced Microsoft Office Suite (Word, PowerPoint, Outlook)"]'
  hobbies: '["Competitive online gaming (e‑sports)", "Cricket (community league)", "Strategic board games (chess, Settlers of Catan)", "Arduino hobby projects", "Cooking Indian cuisine", "Landscape photography
    (especially autumn foliage)", "Volunteer event planning for South Asian cultural festivals"]'
  career_goals: Belal aims to translate his curiosity for technology into a stable, growth‑oriented career in software engineering or data analytics. He plans to complete his associate degree in Computer
    Science, transfer to a four‑year university, and secure an internship that blends practical problem solving with emerging tech. In the long term, he envisions a role where he can lead small development
    teams, apply data‑driven decisions, and eventually launch a tech startup that offers affordable automation tools for small businesses—aligning his competitive drive with a desire to create practical
    solutions for his community.
