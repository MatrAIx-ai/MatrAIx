persona_description: A researcher and historian who specializes in the study of ancient South American civilizations, particularly the Paracas people and their history. They are interested in the genetic
  and evolutionary history of these ancient peoples, and how their cranial shape and volume may have influenced their behavior and culture. They are also interested in the possibility of the Paracas people
  having interbred with other ancient human species, such as Neanderthals and Denisovans.
