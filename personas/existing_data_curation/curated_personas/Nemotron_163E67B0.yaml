personas:
  professional: Page Morris, a veteran electrician with three decades of residential and light‑commercial experience, blends meticulous blueprint reading and NEC compliance with a creative flair for renewable‑energy
    retrofits, mentoring apprentices, and pioneering smart‑home prototypes, all while leveraging their curious, sociable nature to lead collaborative projects and push for Master Electrician certification.
  sports: Page Morris stays active by joining the Scranton/Wilkes‑Barre RailRiders fan club for baseball outings, cheering on the Philadelphia Eagles during football season, and participating in a local
    hiking group that tackles the Appalachian Trail’s easy segments on weekends, all while keeping a light jogging routine to counter back discomfort.
  arts: Page Morris nurtures artistic passions by painting watercolor landscapes of the Pennsylvania countryside in the style of Andrew Wyeth, attending productions at the Steamtown Theater featuring works
    by Lin‑Manuel Miranda, and discussing contemporary fiction and art criticism in a book club that often references the writings of Susan Sontag and the music of Ella Fitzgerald.
  travel: Page Morris prefers carefully planned weekend getaways that blend hiking in the Adirondack Mountains, a weekend art tour of New York City’s galleries, and occasional longer trips to the historic
    streets of Florence, Italy, balancing a modest travel budget with a yearning for cultural immersion and a habit of photographing every sunrise.
  culinary: Page Morris enjoys cooking farm‑to‑table meals, frequently preparing heirloom tomato caprese salads with fresh basil, basil‑infused focaccia, and roasted beet and goat cheese salads, while their
    moderate skill level shines in occasional homemade sourdough loaves and a love for robust Pennsylvania Dutch scrapple at local diners.
  core: Page Morris blends a lifelong electrician’s precision with a curious artist’s improvisation, juggling renewable‑energy projects, watercolor brushes, and lingering worry about deadlines, all while
    never letting a missing screwdriver stay misplaced for long.
background:
  cultural: Page grew up in the small‑town environment of western Pennsylvania, a region shaped by the legacy of coal mining and a strong blue‑collar work ethic. Her family traces its roots to Irish and
    German immigrants who settled in Luzerne County in the early 20th century, bringing traditions of community solidarity, self‑reliance, and a love of folk music and crafts. The local culture values practical
    skill, perseverance, and close‑knit neighborhood ties, which have informed Page’s pragmatic approach to life and her commitment to mentoring the next generation of tradespeople. While she identifies
    as white and comes from a predominantly Protestant background, she embraces the diverse cultural festivals and artistic events that the county now hosts, reflecting an openness to new ideas while honoring
    her heritage.
