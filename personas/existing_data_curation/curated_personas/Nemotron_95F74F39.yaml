  career_goals: Ramona aims to transition into a supervisory role within the next three years, such as a crew foreperson or site safety officer, leveraging her dependable work ethic and deep knowledge of
    routine site processes. She plans to complete an associate’s degree in construction management at a local community college and to obtain a supervisory certificate through the New York State Department
    of Labor. Long‑term, she envisions starting her own small‑scale renovation business that serves the Rochester community, focusing on affordable home repairs and leveraging her network of reliable tradespeople.
