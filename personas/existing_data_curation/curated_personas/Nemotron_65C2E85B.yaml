personas:
  professional: Geraldine Oramous, a meticulous agricultural worker with a knack for digital farm management and community outreach, is leveraging their expertise in crop cultivation, livestock handling,
    and data‑driven inventory control to transition into a farm‑manager role while integrating art installations and educational workshops into their future agritourism venture.
  sports: Geraldine Oramous is a devoted fan of the Detroit Tigers and local high‑school softball leagues, participates in a community running club that meets for sunrise jogs through the nearby state parks,
    and they practice cross‑country skiing each winter to balance their love of seasonal outdoor sports with their farm‑based lifestyle.
  arts: Geraldine Oramous, an avid landscape painter and nature photographer, draws inspiration from Ansel Adams and Claude Monet, sings in a community choir that performs folk classics by Gillian Welch,
    and they regularly attend workshops at the local art center where they experiment with mixed‑media installations for their agritourism vision.
  travel: Geraldine Oramous prefers meticulously planned weekend getaways to Michigan’s Sleeping Bear Dunes and the Upper Peninsula’s shoreline cabins, but they dream of immersive agritourism tours through
    Tuscany’s vineyards and Provence’s lavender fields, balancing their travel budget between modest road trips and occasional overseas farm‑study scholarships.
  culinary: Geraldine Oramous enjoys cooking farm‑to‑table meals like heirloom tomato gazpacho, rosemary‑infused roasted corn, and kale‑and‑wild mushroom risotto, skillfully using fresh Michigan cherries,
    heritage beans, and locally sourced cheese to impress friends at potluck gatherings while they constantly experiment with new seed varieties for their garden.
  core: Geraldine Oramous, an energetic yet anxiety‑prone farm enthusiast, balances rigid organization with spontaneous bursts of creativity, juggling yoga, choir rehearsals, seed trials, and a habit of
    over‑packing their schedule with community commitments, and they often find themselves staying up late drafting event flyers.
background:
  cultural: Geraldine comes from a Midwestern white American background rooted in the farming traditions of Michigan's Great Lakes region. Her family has been involved in small-scale agriculture for generations,
    emphasizing hard work, self-reliance, and community involvement. Raised in a suburban setting in Wayne County, she grew up attending local public schools and participating in community events such as
    county fairs and church picnics, reflecting a blend of Protestant cultural values and regional pride. The local culture, with its strong emphasis on seasonal cycles, seasonal foods, and neighborly support,
    informs her appreciation for both the practical and artistic aspects of farm life. While she identifies with broader American cultural norms, she also embraces the region's growing interest in sustainability,
    farm-to-table movements, and grassroots arts initiatives.
attributes:
  skills: '["Crop cultivation", "Livestock handling", "Greenhouse management", "Irrigation system maintenance", "Farm equipment maintenance", "Safety compliance", "Inventory control", "Supply-chain coordination",
