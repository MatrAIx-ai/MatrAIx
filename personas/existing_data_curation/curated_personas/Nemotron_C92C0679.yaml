  hobbies: '[''Drama club'', ''School newspaper'', ''Playing guitar'', ''Volleyball'', ''Hiking'', ''Biking'', ''DIY crafts'', ''TikTok content creation'', ''Cooking'', ''Volunteer at local library'']'
  career_goals: Rebecca envisions a career that lets her blend storytelling, people‑focused interaction, and practical execution. She hopes to become a community journalist or digital content creator, covering
    stories that matter to her hometown and sharing them through podcasts, blogs, or local news outlets. Long‑term, she is interested in studying communications, public relations, or journalism in college,
    with the ambition to lead outreach programs, organize community events, or work in media production that highlights Midwestern life. She also dreams of launching her own social‑media channel where she
    can showcase DIY projects, local culture, and youth perspectives.
