  hobbies: '[''Woodworking'', ''Model car kit building'', ''DIY electronics'', ''Jazz and blues listening'', ''Chess'', ''Gardening'', ''Cooking (soul‑food and BBQ)'', ''Attending Cardinals games'', ''Community
    volunteering (youth metal‑working workshops)'']'
  career_goals: Levie aims to transition from a senior assembler to a production supervisor within the next three years, leveraging his technical expertise and leadership skills. He plans to earn a Certified
    Manufacturing Technologist (CMfgT) credential and enroll in part‑time coursework toward a bachelor's degree in industrial engineering. Levie is also interested in learning additive manufacturing techniques
    to integrate 3D‑printed components into the plant’s product line. Long‑term, he envisions opening a modest custom metal‑fabrication shop that could provide apprenticeship opportunities for youth in
    his community, merging his passion for craftsmanship with a desire to give back.
