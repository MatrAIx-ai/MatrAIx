  career_goals: Kang aims to leverage his practical expertise and curiosity to advance within the logistics sector. In the next five years, he plans to obtain a transportation safety certification and transition
    into a fleet supervisory role, where he can mentor new drivers and streamline operations. He is also exploring the possibility of launching his own small-scale delivery service that focuses on eco-friendly
    practices, such as using electric vans for city routes. Additionally, Kang wishes to deepen his bilingual abilities and acquire basic managerial training to eventually move into logistics coordination
    or a key account management position at a regional freight company.
