personas:
  professional: Kenneth Coombs, a 24‑year‑old field technician with a self‑directed foundation in electrical engineering, they channel their proficiency in analog/digital circuit design, KiCad PCB layout,
    and Arduino/STM32 programming into rapid IoT prototypes for solar micro‑inverters while meticulously documenting each iteration, balancing a restless curiosity for emerging sustainable technologies
    with proven engineering rigor.
  sports: Kenneth Coombs, an outdoor‑oriented fitness enthusiast, they spend weekends trekking the Kettle Moraine State Forest, casting for steelhead trout on the Fox River, competing in a local ultimate
    frisbee league, and cheering for the Milwaukee Bucks and Green Bay Packers during game nights.
  arts: Kenneth Coombs, a creative outlet seeker, they strum acoustic guitar in a community circle covering John Mayer and Bon Iver, devour science‑fiction novels by Isaac Asimov and N.K. Jemisin, dominate
    board‑game nights with titles like Terraforming Mars and Codenames, and occasionally host indie film screenings featuring Shane Carruth.
  travel: Kenneth Coombs, a budget‑conscious explorer, they favor rugged short‑range trips such as Door County hikes, Upper Peninsula road trips to Pictured Rocks, and are planning a solo pilgrimage to
    Japan’s alpine villages to study renewable micro‑grid installations, all coordinated through a points‑earning credit card and a meticulously kept travel spreadsheet.
  culinary: Kenneth Coombs, an experimental home chef, they frequently grill trout with fresh dill, craft spicy ramen bowls using miso and sriracha, perfect sourdough loaves on weekends, and fuel trail
    hikes with a homemade mix of almonds, dried mango, and dark chocolate chips.
  core: Kenneth Coombs is a meticulous tinkerer who balances a restless curiosity for sustainable tech with a steady love of hiking, guitar chords, and sci‑fi, they habitually worry about deadlines and
    overindulge in hobby component sprees.
background:
  cultural: Kenneth was raised in a middle‑class, white family in the Upper Midwest, with ancestry tracing back to German and Polish immigrants who settled in Wisconsin generations ago. Growing up in De Pere,
    he experienced a close‑knit community where church socials, local high‑school sports, and seasonal festivals like Oktoberfest and Apple Fest were central to social life. His upbringing emphasized values
    of hard work, modesty, self‑reliance, and helping neighbors, which continue to shape his cooperative and considerate nature. He enjoys regional traditions such as summer barbecues, winter snowmobiling
    outings, and the holiday practice of volunteering at the local food pantry.
attributes:
  skills: '["Circuit design", "PCB layout", "Microcontroller programming (C/C++, Python)", "Analog and digital troubleshooting", "Soldering and rework", "Power systems analysis", "Test equipment operation
    (oscilloscope, multimeter, logic analyzer)", "3D printing for prototypes", "Technical documentation", "Team collaboration"]'
  hobbies: '["Arduino and IoT tinkering", "DIY electronics projects", "3D printing prototypes", "Hiking local trails", "Fishing on the Fox River", "Acoustic guitar playing", "Reading science‑fiction", "Board‑game
    evenings", "Robotics club mentorship"]'
  career_goals: Kenneth aims to formalize his technical knowledge by earning an associate's degree in electrical engineering technology within the next two years and obtaining certifications such as Certified
    Electronics Technician (CET) and IPC Designer. Over the next five to seven years, he aspires to become a lead design engineer focusing on sustainable energy solutions, particularly solar micro‑inverters
    and smart‑grid integration. He also hopes to mentor junior technicians, contribute to community STEM outreach programs, and eventually transition into a project‑management role that lets him blend his
    practical engineering instincts with his curiosity for emerging technologies, all while maintaining a healthy work‑life balance to manage his tendency toward stress.
