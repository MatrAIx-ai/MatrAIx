persona_description: A local environmental non-profit dedicated to protecting, preserving, restoring, and celebrating the South River watershed and its interdependent community. They utilize all available
  tools, ranging from scientific water quality monitoring to rain garden installation and large-scale stream restoration, and their restoration efforts are locally focused and driven by one-on-one landowner
  education. The South River Federation believes in a holistic approach to cleaning up the South River and their mission is to strengthen the connection between people and the watershed. They are the principal
  partner for the National Park Service on the Captain John Smith Chesapeake National Historic Trail and helped create 132 new public access sites and permanently protect some of the Bay's special places
  like Werowocomoco, Blackwater National Wildlife Refuge, Harriet Tubman Underground Railroad National Historical Park, and Fort Monroe National Monument.
