  career_goals: Johnny aims to earn a certified horticulture/landscape technician credential within the next two years and to complete the remaining coursework toward an associate degree in horticulture.
    He envisions transitioning to a senior foreman role, eventually launching his own small landscaping business that specializes in sustainable, native‑plant designs for residential clients in the Detroit
    metro area. By integrating his appreciation for art, he hopes to offer signature garden installations that include sculptural elements and custom water features. Long‑term, he wants to become a trusted
    mentor for apprentices, secure financial stability for his family, and contribute to community green‑space projects that enhance urban neighborhoods.
