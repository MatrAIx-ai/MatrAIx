personas:
  professional: Eric Condon, an 81‑year‑old farmer and self‑taught carpenter, merges a lifetime of horticultural mastery and improvisational farm‑equipment repair with a competitive drive to perfect his
    folk‑art collection, while his relaxed, flexible attitude leads him to favor hands‑on tinkering over rigid planning and his occasional skepticism pushes him to personally verify each piece’s provenance.
  sports: Eric Condon follows the Los Angeles Dodgers and Los Angeles Lakers avidly, belongs to the Sequoia Birdwatching and Hiking Club where they trek light forest trails for fitness, and participates
    in weekly bocce games at the senior center that satisfy a quietly competitive streak while providing low‑impact exercise.
  arts: Eric Condon regularly attends jazz evenings featuring Miles Davis and John Coltrane at the Porterville Community Hall, enjoys community theater productions of Tennessee Williams' The Glass Menagerie,
    and curates a personal collection of vintage Norman Rockwell posters and hand‑stitched quilts inspired by Faith Ringgold, viewing each art form as a conduit for inventive curiosity.
  travel: Eric Condon favors relaxed, self‑driven road trips planned loosely around garden seasons, has recently visited the Getty Center in Los Angeles and the Museum of Modern Art in New York via a bus
    tour, and dreams of future pilgrimages to the vineyards of Tuscany and the folk‑art museums of Kyoto, balancing modest travel budgets with a yearning for artistic immersion.
  culinary: Eric Condon delights in preparing heirloom tomato bruschetta with fresh basil, lavender‑infused honey drizzled over goat cheese, and rosemary‑roasted chicken, often cooking simple farm‑to‑table
    meals using garden produce, though they sometimes over‑salt dishes from an old shaker that never seems to empty.
  core: Eric Condon is an 81‑year‑old farmer‑carpenter whose curiosity fuels a competitive quest for authentic folk art, balanced by a laid‑back, slightly disorganized lifestyle that blends garden stewardship,
    storytelling, and occasional salt‑over‑seasoning.
background:
  cultural: Eric grew up in a multi‑generational farming family that moved from the Midwest to the Central Valley in the 1940s. His upbringing was steeped in the values of self‑reliance, community cooperation,
    and modest Catholic traditions common among rural Anglo‑American families of that era. Living in Porterville, he was surrounded by a culturally diverse agricultural workforce, especially Hispanic farmworkers,
    which gave him an appreciation for the region’s blended cultural celebrations such as the Tulare County Fair and local quinceañeras. The small‑town environment fostered a close‑knit network of neighbors,
    church gatherings, volunteer fire‑department events, and county fairs, all of which shaped his identity as a community‑oriented yet independently curious individual.
attributes:
  skills: '[''Horticulture (ornamental & heirloom vegetables)'', ''Basic Carpentry and Furniture Making'', ''Mechanical Repair of Small Farm Equipment'', ''Folk Art Evaluation and Authentication'', ''Oral
    History Storytelling'', ''Gardening Design'', ''Community Event Organizing'']'
  hobbies: '[''Gardening (roses, lavender, heirloom tomatoes)'', ''Folk Art Collecting and Study'', ''Reading Artist and Inventor Biographies'', ''Attending Jazz Concerts and Community Theater'', ''Birdwatching'',
    ''Model Airplane and Boat Building'', ''Storytelling at Senior Center'', ''Exploring Digital Photography'']'
  career_goals: Eric hopes to complete a memoir of his family's farming legacy and the local histories he has recorded, aiming to have it published by a regional historical society. He also aspires to curate
    an exhibit of his folk‑art collection at the Porterville Museum of Art, hoping to earn recognition for the quality and authenticity of his selections. He plans a short road‑trip to major art institutions
    such as the Getty Center and the Museum of Modern Art to broaden his artistic exposure. Additionally, he wants to volunteer as a storytelling mentor at the senior center, passing his oral‑history skills
    to younger volunteers, and to learn new digital tools—like photography and audio recording—to document his projects.
