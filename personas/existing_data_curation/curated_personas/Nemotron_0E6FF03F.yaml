  career_goals: Jolynn hopes to turn her love of art, storytelling, and social interaction into a career as a multimedia content creator and visual storyteller. She envisions building a personal brand on
    platforms such as TikTok and Instagram, producing short-form videos, sketches, and original music that reflect her spontaneous style. In the longer term she aspires to work in the creative department
    of an entertainment or advertising agency, or to launch her own independent production studio that blends community events, live performance, and digital media. Her ambition also includes traveling
    to draw inspiration from diverse cultures while maintaining a flexible, self-directed work life.
