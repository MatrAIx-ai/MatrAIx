  career_goals: Although retired, Christy seeks to stay actively engaged in her community. She aims to volunteer as a reading tutor for elementary students, share her storytelling expertise in senior‑center
    programs, and help preserve local history by contributing oral histories to the Englewood Historical Society. She also hopes to document her own life story in a memoir and to master digital photography
    so she can capture the coastal landscape. Learning to use tablet technology for remote family connections is another personal goal, as is fostering mentorship relationships with younger educators.
