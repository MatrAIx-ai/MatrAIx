personas:
  professional: Christy Killian, a retired elementary school teacher, channels decades of curriculum design and literacy expertise into volunteer tutoring and intergenerational storytelling workshops, blending
    tablet‑based reading apps with gentle classroom management while navigating her relaxed, sometimes disorganized approach to planning.
  sports: Christy Killian hikes coastal trails and joins a local senior walking club that gathers at the Englewood beachfront, occasionally watches the New York Giants on Sundays and the New York Knicks
    on television, and practices gentle water aerobics at the community pool, balancing her love of nature with low‑impact fitness despite her occasional worry about staying active.
  arts: Christy Killian fills her evenings with classic jazz records from Duke Ellington, Benny Goodman, and Billie Holiday, volunteers at the church choir’s holiday performances, enjoys historical fiction
    by Philippa Gregory, and knits hand‑crafted scarves inspired by bold 1940s textile patterns, all while occasionally fretting about missing a favorite concert.
  travel: Christy Killian prefers short, well‑planned road trips to historic coastal towns like Mystic, Connecticut and Charleston, South Carolina, where she explores maritime museums, strolls boardwalks,
    and occasionally joins family cruises that let her capture sunrise photos with her new tablet camera, though she sometimes worries about traveling alone and forgetting essential items.
  culinary: Christy Killian loves cooking fresh seafood dishes such as lemon‑butter cod, shrimp scampi, and New England clam chowder, augments her garden harvest of tomatoes, basil, and zucchini in recipes,
    and, while competent at following recipes, occasionally over‑salts meals when distracted by bird‑watching thoughts.
  core: Christy Killian is a curious, gentle‑spirited octogenarian who blends lifelong teaching passion with a love for gardens, jazz, and storytelling, though she often misplaces her glasses and frets
    over every detail.
background:
  cultural: Christy was born in 1935 in a Midwestern farming community and raised in a Protestant (Methodist) household that emphasized education, hard work, and community service. Growing up during World
    War II and the post‑war boom, she witnessed profound social changes, including the civil‑rights movement and the rise of television and later personal computers. Her decision to become a teacher reflected
    the era’s expectations for women seeking professional roles that aligned with caring and nurturing values. After a long teaching career, she retired to Englewood, Florida, joining a vibrant community
    of retirees while retaining the modesty, hospitality, and respect for tradition instilled in her youth. She balances a reverence for the values of her upbringing with a curiosity for new ideas, such
    as using technology to stay connected with family and to document local history.
