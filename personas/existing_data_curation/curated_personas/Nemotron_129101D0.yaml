  hobbies: '[''Abstract painting'', ''Sketching'', ''Visiting art galleries'', ''Reading speculative fiction'', ''Writing poetry'', ''Salsa dancing'', ''Group fitness classes (Zumba)'', ''Hiking'', ''Cooking
    fusion cuisine'', ''Volunteering art workshops for youth'']'
  career_goals: Natacha aims to advance to detective and eventually a precinct commander, focusing on building bridges between law enforcement and the culturally diverse neighborhoods of Los Angeles. She
    wants to spearhead a community‑arts outreach program that uses creative workshops to engage at‑risk youth and reduce crime. Long‑term, she envisions shaping department policy on officer mental‑health
    and cultural competency, and becoming a trainer in crisis negotiation and stress resilience. Her ambition balances personal career growth with a commitment to compassionate, inclusive policing.
