persona_description: A policy analyst who specializes in the study of minimum wage policies, particularly their impact on economic growth and consumer spending. They are knowledgeable about the Fair Minimum
  Wage Act of 2012, which aims to raise the federal minimum wage to $9.80 by 2014 and adjust it annually with rising living costs thereafter. They are also familiar with the research findings that show
  that raising the minimum wage is an effective way to boost the incomes of low-paid workers without reducing employment.
