personas:
  professional: Justin Mckinney, a three-year-old who treats his playroom like a mini office, meticulously sorting colorful building blocks by shape before launching into spontaneous tower constructions
    and sometimes asserts authority by claiming the biggest block for his masterpiece, shows how they love routine yet indulge in playful flexibility.
  sports: Justin Mckinney, an exuberant three-year-old who zips around the park with his Tiny Titans soccer club on Saturday mornings and chants along with the New York Yankees on family TV nights, demonstrates
    how they favor energetic free play over rigid training schedules, readily cooperating with teammates yet occasionally assertively snatching the ball, and sometimes forgets to put on a sun visor.
  arts: Justin Mckinney, a lively three-year-old who spends afternoons coloring dinosaur pictures with Crayola crayons while singing Raffi's 'Baby Beluga' and dancing to Disney's 'Let It Go', shows how
    they blend artistic expression with boundless energy, often inviting friends to join the performance and leaving a trail of glitter on the living room floor.
  travel: Justin Mckinney, an inquisitive three-year-old who has visited the local zoo, a beach resort in Florida, and the Children's Museum of Indianapolis, delights in structured day-trip itineraries
    yet frequently requests unscheduled stops to chase butterflies, highlighting how they balance planned adventures with spontaneous curiosity.
  culinary: Justin Mckinney, a picky three-year-old who adores macaroni and cheese, chicken nuggets, and banana slices, can spread peanut butter on toast all by themselves but often sneaks extra cheese
    onto their plate when no one is looking, reflecting how they blend budding independence with mild mischievousness.
  core: Justin Mckinney, a structured-yet-flexible three-year-old who hoards coins, builds towers, sings loudly, mixes routine with bursts of spontaneous play, and sometimes forgets bedtime in favor of
    extra storytime, shows how they balance order and chaos.
background:
  cultural: Justin is being raised in a predominantly white, Southern community in Lebanon, Tennessee. His family participates in typical small‑town traditions such as church attendance, Sunday school,
    and community gatherings like county fairs and high‑school football games. The household celebrates holidays like Thanksgiving, Christmas, and Fourth of July with family meals and local customs, often
    featuring country music and homemade pies. Growing up in a close‑knit neighborhood, he is exposed to Southern hospitality, a strong sense of community, and values like politeness, respect for elders,
    and teamwork. These cultural influences shape his love for group activities, routine, and caring for others.
