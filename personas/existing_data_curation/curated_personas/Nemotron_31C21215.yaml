  hobbies: '["Drawing fantastical creatures", "Reading fantasy and science‑fiction novels", "LEGO building (future cities, mythic castles)", "Scratch coding for interactive stories", "Beginner piano practice",
    "Puzzle solving (jigsaw, Rubik''s Cube)", "Chess club (competitive play)", "Listening to jazz, gospel, and R&B"]'
  career_goals: Mary dreams of becoming a children's book author and illustrator, where she can combine her love for storytelling and art to create magical worlds for other kids. She also aspires to design
    video games that let players explore her imaginative realms, so she hopes to deepen her coding skills. Occasionally she imagines herself as an astronaut or scientist discovering new universes, reflecting
    her fascination with abstract concepts. Her ambition is to win a national youth art contest or a school science‑fair award, showing that her creative ideas can be celebrated on a larger stage.
