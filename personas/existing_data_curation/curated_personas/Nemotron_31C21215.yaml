personas:
  professional: Mary Wright, a budding visual storyteller who thrives in solitary creative sessions, merges her love for fantasy comics and Scratch animation to prototype interactive narratives, channeling
    her innate curiosity into early design thinking while balancing school responsibilities.
  sports: Mary Wright plays in the community’s youth soccer league, practices at the local park, is an avid fan of the Los Angeles Lakers (NBA) and Los Angeles Galaxy (MLS), and treats fitness as a mission
    to stay ready for her marathon of LEGO building, channeling her competitive spirit into every practice.
  arts: Mary Wright, a budding illustrator who prefers solo sketching sessions, fills sketchbooks with mythic beasts inspired by folklore, draws influence from artists like Jim Lee and Studio Ghibli’s Hayao
    Miyazaki, and listens to jazz legend Miles Davis while sketching, often reimagining classic comic panels with her own imaginative twists.
  travel: Mary Wright dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and the magical world of Disneyland in Anaheim, and, when planning family trips, she creates detailed
    map doodles, preferring short, adventure‑filled getaways over long beach vacations because she enjoys exploring new settings for story ideas in a low‑key, intimate setting.
  culinary: Mary Wright’s palate favors cheesy macaroni, honey‑glazed chicken nuggets, and strawberry‑banana smoothies, and she often takes charge of simple kitchen tasks alone, helping her parents bake
    chocolate chip cookies and experimenting with colorful fruit kebabs, insisting on adding a sprinkle of cinnamon for extra flavor.
  core: Mary Wright blends boundless imagination with a disciplined pocket‑money plan, channeling competitive curiosity into comics, LEGO kingdoms, and Scratch stories while navigating childhood health
    and leisure with a pragmatic, solitary flair.
background:
  cultural: Mary comes from a proud African‑American family rooted in Greensboro’s historic Black community. Her grandparents often share stories of the civil‑rights movement and celebrate Juneteenth with
    traditional foods, music, and family gatherings. She attends a local Baptist church where gospel singing and community service are integral parts of life. School events like Black History Month and
    visits to the International Civil Rights Center & Museum reinforce her connection to African‑American heritage. Family meals feature soul‑food favorites such as collard greens and fried chicken, and
    she enjoys listening to artists ranging from classic Motown to contemporary hip‑hop, which influence her artistic sensibilities. The rich cultural tapestry of Greensboro, combined with strong family
    ties, nourishes her imagination and drives her desire to tell diverse, inclusive stories.
attributes:
