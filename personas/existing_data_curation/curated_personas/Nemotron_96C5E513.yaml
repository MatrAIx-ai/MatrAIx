  hobbies: '[''Habitat for Humanity volunteering'', ''Book club participation'', ''Architectural photography'', ''Vegetable gardening'', ''Bridge (card game) league'', ''Community theater acting'', ''Hiking
    in the Great Lakes region'']'
  career_goals: Megan aims to advance to a senior leadership role within the regional public works department, where she can shape large‑scale, climate‑resilient infrastructure initiatives for Flint and
    surrounding municipalities. She is pursuing her Professional Engineer (PE) license renewal and plans to obtain certification in sustainable infrastructure. Megan also aspires to mentor the next generation
    of engineers, particularly women and underrepresented groups, by expanding the local chapter of Engineers Without Borders and establishing a structured apprenticeship program. Long‑term, she envisions
    transitioning into a consultancy that partners with government agencies to address water equity and urban renewal challenges.
