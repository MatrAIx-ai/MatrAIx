personas:
  professional: Megan Hoddinott, a seasoned civil engineer with over two decades of experience in structural analysis, water resources, and transportation planning, leverages AutoCAD Civil 3D, BIM, and
    GIS to design climate‑resilient infrastructure while they use their talkative, people‑focused style to unite multidisciplinary teams and champion community‑centered solutions.
  sports: Megan Hoddinott, an avid supporter of the Detroit Lions and Detroit Pistons, jogs the Flint River Trail five times a week, competes in a regional bridge league, and they join the city’s adult
    softball league every spring, balancing competitive spirit with a cooperative team ethic.
  arts: Megan Hoddinott, a community theater enthusiast and photography aficionado, regularly stages productions of classic dramas, channels the visual style of Ansel Adams in industrial‑heritage photo
    walks, devours contemporary fiction by Sally Rooney, and they sing along to folk‑rock legends like Gillian Welch at local open‑mic nights.
  travel: Megan Hoddinott, a meticulous road‑trip planner, spends weekends exploring Michigan’s Upper Peninsula, has documented a summer getaway to Door County, dreams of a week‑long cultural tour of Italy’s
    historic cities, and they prefer booking family‑friendly B&Bs that showcase local craftsmanship.
  culinary: Megan Hoddinott, a garden‑to‑table cook, delights in harvesting heirloom tomatoes and carrots for a summer ratatouille, perfects a hearty chicken pot pie with a flaky crust during winter, and
    they occasionally splurge on a deep‑fried corn dog at the Flint farmers market for nostalgic comfort.
  core: Megan Hoddinott blends precise engineering expertise with a gregarious community spirit, turning structured plans into collaborative action while they tend their garden, lead theater rehearsals,
    and never miss a chance to chat over a coffee.
background:
  cultural: Megan grew up in Flint, Michigan, within a middle‑class, white, Midwestern family that valued hard work, practical problem‑solving, and community solidarity. Her parents were employed in the
    automotive supply chain, instilling an appreciation for manufacturing and infrastructure. The city’s industrial roots and the challenges of the water crisis have shaped her civic consciousness, motivating
    her to contribute to local resilience and public health. She identifies with the modest, polite, and cooperative ethos typical of the Great Lakes region, while actively engaging in local church and
    neighborhood associations that emphasize collective well‑being and mutual support.
