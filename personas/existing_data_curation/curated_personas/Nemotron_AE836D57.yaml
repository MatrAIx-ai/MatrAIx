personas:
  professional: Robert Karki, a seasoned construction veteran with over four decades of concrete finishing, framing carpentry, and site preparation expertise, they blend their practical hands‑on skills
    with a curiosity for new safety methods, mentoring younger crews, reading simple blueprints, and championing teamwork on the job site.
  sports: Robert Karki, an avid follower of the Oakland Athletics and a regular participant in the senior center’s walking club, enjoys weekend fishing trips on the Kings River, joins a local community
    softball league for seniors, they tune into live baseball broadcasts while cheering for the team, reflecting an energetic yet relaxed approach to fitness.
  arts: Robert Karki, a classic‑rock aficionado who revels in the sounds of The Rolling Stones, Led Zeppelin, and The Who while attending local fairs and classic‑car shows, also enjoys community theater
    productions like 'Our Town' and watches classic movies on Friday nights, they often discuss the music and performances with friends at the senior center, showing how the arts shape their social life.
  travel: Robert Karki, a fond road‑trip lover, has driven the Pacific Coast Highway to explore Monterey and Big Sur, fished in the waters of Lake Tahoe, plans a future sailing trip to the Oregon coast,
    they prefer modest, budget‑friendly itineraries that allow for quick returns to their garden and woodworking projects, balancing adventure with a desire for stability.
  culinary: Robert Karki, who delights in cooking fresh garden vegetables into a hearty vegetable stew, grilling his own trout from the Kings River, and baking apple pie with a crisp crust, is a competent
    home cook who favors simple, rustic dishes like cornbread, pork chops with herb rub, and homemade chili, they often share these meals with neighbors after community events.
  core: Robert Karki, a sociable yet worry‑prone retiree, mixes hands‑on woodworking, classic‑rock listening, and community volunteering with a practical eye toward health and finances, all while occasionally
    forgetting to take blood‑pressure meds.
background:
  cultural: Robert grew up in a small, working‑class community in California’s Central Valley, where agriculture and construction shaped daily life. His family’s values reflect a Midwestern‑influenced work
    ethic—hard work, self‑reliance, and community cooperation. As a white Baby Boomer from Hanford, he identifies with the regional culture of close‑knit neighborhoods, annual county fairs, and a strong
    sense of mutual help among neighbors. These cultural roots contribute to his outgoing, cooperative demeanor, his commitment to supporting others, and his practical, yet curious approach to learning
    new skills, even as he copes with occasional worries about health and finances.
attributes:
  skills: '[''Concrete finishing'', ''Basic framing carpentry'', ''Site preparation and clean‑up'', ''Operation of handheld construction equipment (jackhammer, concrete mixer)'', ''Interpretation of simple
    blueprints and work orders'', ''Safety compliance and hazard identification'', ''Team coordination and mentoring'']'
  hobbies: '[''Fishing at Kings River'', ''Gardening (vegetables and herbs)'', ''Woodworking and DIY home projects'', ''Playing cards and board games at the senior center'', ''Volunteering for community
    park clean‑ups'', ''Attending local fairs, classic car shows, and baseball games'', ''Listening to classic rock from the 60s‑70s'']'
  career_goals: Approaching retirement, Robert aims to secure a stable, low‑impact role that allows him to transition into a part‑time crew lead or site supervisor position where he can guide younger laborers.
    He plans to obtain his GED and pursue a short OSHA safety certification to formalize his knowledge. In the longer term, he hopes to start a modest handyman business serving his local community, providing
    affordable home‑repair services while staying active and engaged.
