    mapping for project sites'']'
  hobbies: '[''Cajun cooking and recipe experimentation'', ''Fishing on Bayou Lafourche'', ''Playing in a community basketball league'', ''Attending Zydeco and Cajun music festivals'', ''Dancing to accordion
    music'', ''DIY electronics and Arduino projects'', ''Mindfulness meditation'', ''Hiking in coastal wetlands and birdwatching'', ''Volunteering at local clean-up events'', ''Mentoring high-school STEM
    students'']'
  career_goals: He aims to earn his Project Management Professional (PMP) certification within the next year and pursue a PgMP to qualify for senior program leadership. Darnley envisions moving into a senior
    project manager role overseeing large‑scale infrastructure or renewable‑energy initiatives in the Gulf Coast, where he can apply his technical insight and community‑focused mindset. Long‑term, he hopes
    to become a program director driving multi‑disciplinary projects that enhance regional resilience to hurricanes and support sustainable economic growth. He also plans to mentor emerging project managers,
    share best practices for stress‑aware leadership, and eventually launch a boutique consulting firm that helps local businesses implement agile, data‑driven project processes.
