  career_goals: Although officially retired, Donquez aims to make a lasting impact through volunteer mentorship and community engagement. He aspires to expand the reach of local STEM outreach programs for
    underrepresented youth, collaborate with city officials to improve senior-friendly public spaces, and author a memoir reflecting on his experiences during the civil rights era and his lifelong commitment
    to practical innovation. He also hopes to serve as a trusted advisor for small engineering firms in the Pittsburgh area, offering occasional consultancy on sustainable design projects.
