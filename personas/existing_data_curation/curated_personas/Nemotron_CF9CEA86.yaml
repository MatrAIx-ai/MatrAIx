personas:
  professional: Sade Moore is a budding digital illustrator who spends afternoons sketching comic characters, rehearsing school theater monologues, and dreaming of turning their Minecraft creations into
    animated shorts, all while delighting classmates with charismatic performances.
  sports: Sade Moore enjoys dance‑focused physical education classes, roots for the New York Knicks and follows the local Newark Little League team, and joins a weekend community basketball pickup at the
    neighborhood park to stay active.
  arts: Sade Moore is captivated by the graphic storytelling of Alan Moore and the vibrant murals of local Newark artists, jams to Beyonce and Kendrick Lamar while sketching, and regularly sings in their
    church youth choir, drawing inspiration from Lin‑Manuel Miranda’s Broadway numbers.
  travel: Sade Moore dreams of visiting the Museum of Modern Art in New York City, has taken a family day‑trip to Philadelphia’s Independence Hall, and hopes to explore the mural‑covered streets of Barcelona
    during a future school art exchange.
  culinary: Sade Moore prefers cheesy pizza slices, homemade mac and cheese, and loves experimenting with rainbow cupcakes topped with sprinkles, while also enjoying fresh strawberries and chocolate chip
    cookies after weekend choir rehearsals.
  core: Sade Moore is a chatty, curiosity‑driven ten‑year‑old who turns every hallway into a stage, worries about missing the next art supply sale, and thrives on bright colors, beats, and bold imagination.
background:
  cultural: Sade is African‑American and grew up in Irvington, New Jersey, a community with deep roots in the Black experience of the Northeast. Her family celebrates traditions such as soul‑food gatherings,
    Juneteenth, and church holidays, and she often hears stories of the civil‑rights era from grandparents who lived through the 1960s. The neighborhood’s vibrant street art, local jazz and hip‑hop scenes,
    and community festivals have shaped her appreciation for creative expression and collective resilience. She identifies with the values of cooperation, storytelling, and self‑advocacy that are prominent
    in her cultural milieu.
