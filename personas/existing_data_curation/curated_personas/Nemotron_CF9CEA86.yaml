  career_goals: Sade dreams of turning her love for art and performance into a future career. She envisions becoming a children's book author and illustrator who can bring diverse stories to life, or a
    stage performer who uses music, dance, and storytelling to inspire others. She also hopes to one day lead community art workshops in Irvington, empowering other kids to express themselves creatively.
    Her ambition blends a desire to entertain and uplift with a commitment to mental well‑being, reflecting her understanding of stress and her wish to help others feel heard.
