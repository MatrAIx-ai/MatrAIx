  career_goals: He aspires to move into a regional sales leadership role within the next three years, overseeing a team of representatives and shaping sales strategy for a growing service firm. Additionally,
    he plans to obtain a GED and complete a digital marketing certification to integrate modern channels into his sales approach. In the long term, Mark envisions founding a boutique consultancy that helps
    small-town businesses adopt innovative service solutions, leveraging his art-inspired storytelling techniques to differentiate client offerings.
