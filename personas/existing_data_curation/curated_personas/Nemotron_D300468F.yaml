personas:
  professional: Quynh Nguyen is a budding junior scientist and imaginative storyteller who mixes hands-on experiments with Minecraft world-building, and they channel their curiosity and practical mindset
    into school projects while often forgetting to tidy up their work area.
  sports: Quynh Nguyen drifts between the soccer field of the local DC United Juniors club in the spring and the community swimming pool in the summer, cheering on the Washington Capitals during hockey
    season while they shy away from large crowds and prefer practicing drills with a close-knit group of friends.
  arts: Quynh Nguyen spends afternoons lost in the worlds of J.K. Rowling and J.R.R. Tolkien, sketching fantasy creatures while they practice calligraphy to the tune of popular songs and admire the pixel
    art of Minecraft creators and the animation style of Studio Ghibli’s My Neighbor Totoro.
  travel: Quynh Nguyen prefers short family road trips to nature spots like Shenandoah National Park and occasional city excursions to Washington, D.C., while dreaming of a future adventure to Kyoto’s lantern
    festivals and the Eiffel Tower’s lights, though they often rely on parents’ schedules and a modest allowance for travel planning.
  culinary: Quynh Nguyen enjoys helping at the kitchen table to roll bánh chưng with sticky rice and mung beans, stir-fry pho broth with star anise and basil, and bake chocolate chip cookies using butter
    and vanilla extract, though their measuring can be a bit chaotic as they often lose track of sugar amounts.
  core: Quynh Nguyen is a curious, slightly disorganized dream-builder who balances a love for science and fantasy with a tendency to worry about schoolwork while finding comfort in quiet, cozy corners
    of imagination.
background:
  cultural: Quynh is a Vietnamese‑American raised in Centreville, Virginia. At home she speaks Vietnamese with her parents and grandparents, celebrates Tet and the Mid‑Autumn Festival, and enjoys traditional
    foods such as pho, bánh chưng, and spring rolls. Her family places high value on education, respect for elders, and community, often gathering for cultural events at the local Vietnamese community center.
    Growing up in a suburban American setting, she balances these heritage traditions with school life, participating in both Vietnamese language classes and typical U.S. elementary school activities. This
    blend of cultures shapes her identity, giving her a strong sense of family, a love for both Eastern and Western cuisines, and a curiosity about the world that drives her personal and academic pursuits.
