  hobbies: '[''Reading adventure and fantasy books'', ''Drawing and sketching characters'', ''Playing Minecraft and building virtual worlds'', ''DIY science experiments (slime, volcano)'', ''Collecting
    rocks, leaves, and insects'', ''Baking cookies and simple Vietnamese desserts'', ''Learning Vietnamese through songs and calligraphy'', ''Visiting local parks and exploring nature'']'
  career_goals: Quynh dreams of becoming a scientist—especially a marine biologist or environmental researcher—who can discover practical ways to protect animals and ecosystems. She also hopes to combine
    her love of storytelling and art by writing illustrated books that teach kids about nature and science, all while staying in a career that lets her work hands‑on and make a real difference.
