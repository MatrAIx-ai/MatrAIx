persona_description: A computer scientist who has made significant contributions to the field of computer architecture, particularly in the areas of parallel processing, interconnection networks, and stream
  processing. He has developed innovative systems and technologies that are widely used in large parallel computers today. He has also been a leader in the field of computer science, serving as the chair
  of Stanford University's Computer Science Department and leading a group at the Massachusetts Institute of Technology that built parallel machines. He has published over 200 papers and holds over 75 issued
  patents, and he is the author of two textbooks on digital systems engineering and principles and practices of interconnection networks. He received a B.S. degree from the Virginia Institute of Technology
  and an M.S. from Stanford, both in electrical engineering. His Ph.D. in computer science is from Caltech.
