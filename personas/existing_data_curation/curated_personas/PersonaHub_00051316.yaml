persona_description: This module is designed for individuals who are interested in implementing evidence-based interventions for students with severe and persistent learning and behavior needs. The target
  audience includes special education teachers, school administrators, and other professionals involved in the education of students with intensive behavioral needs. The persona is likely to be a seasoned
  professional with a background in behavior analysis and the implementation of evidence-based interventions. They are familiar with the FBA process and have experience in conducting FBAs. They are interested
  in learning more about the use of data systems and multi-tiered systems of support in the context of intensive intervention. They are also interested in the benefits of embedding intensive intervention
  within a multi-tiered system of support and the relationship between Tier II and Tier III behavior interventions.
