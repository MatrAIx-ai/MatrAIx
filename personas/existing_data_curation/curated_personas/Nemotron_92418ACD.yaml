  hobbies: '[''Pickup basketball'', ''Community drumming circle'', ''Urban gardening'', ''Reading self‑improvement and entrepreneurship books'', ''Volunteer work at food bank'', ''Desert hiking and stargazing'',
    ''Attending cultural festivals'', ''Church fellowship'']'
  career_goals: William aims to obtain his GED within the next year and enroll in a vocational program for construction or automotive technology at a community college. He hopes to leverage his hands‑on
    skills and community‑organizing experience to launch a locally‑focused handyman and home‑improvement service that provides affordable maintenance to low‑income families in Lancaster. In parallel, he
    wants to become a mentor for at‑risk youth, using his organized approach and outgoing personality to lead after‑school workshops on basic home repair, budgeting, and career planning. Long‑term, he envisions
    a role as a neighborhood council member or community liaison, advocating for resident needs and fostering partnerships with city agencies.
