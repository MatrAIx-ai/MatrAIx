  career_goals: Pernie aims to become a senior investment analyst within the next three years and to earn the CFA charter to deepen her expertise in portfolio management. She aspires to specialize in ESG
    and sustainable finance, integrating her humanities perspective into responsible investing strategies. In the long term, she envisions leading a portfolio management team, shaping strategic investment
    decisions for a regional firm, and mentoring junior analysts. Her ambition balances steady career progression with a commitment to ethical and data‑driven financial stewardship.
