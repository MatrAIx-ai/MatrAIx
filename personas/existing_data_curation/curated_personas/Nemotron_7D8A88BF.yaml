personas:
  professional: Pernie Kubicki is a meticulous financial analyst who leverages Python and Excel VBA to build robust ESG investment models, delivering concise, data‑driven presentations that blend her humanities
    insight with a disciplined, risk‑aware approach.
  sports: Pernie Kubicki hits the nearby Blue Ridge trail system every Saturday for brisk hikes, is a member of the local hiking club “Summit Seekers,” and cheers for the Washington Capitals during the
    NHL season while occasionally joining a casual intramural ultimate frisbee league.
  arts: Pernie Kubicki devotes evenings to exploring the city’s modern art museum, where they particularly admire works by Yayoi Kusama and the atmospheric landscapes of Caspar David Friedrich, and they
    unwind by playing strategy board games like Terraforming Mars while sipping Earl Grey tea.
  travel: Pernie Kubicki prefers structured, budget‑conscious trips, planning detailed itineraries for weekend getaways to Asheville’s Blue Ridge Parkway and dreaming of a week‑long cultural immersion in
    Florence, Italy, where they can combine Renaissance art tours with culinary workshops.
  culinary: Pernie Kubicki channels their love of precision into baking, mastering sourdough starter schedules, perfecting flaky croissants with butter folded in a “tour de force” lamination process, and
    experimenting with matcha‑infused shortbread to balance tradition with a modern twist.
  core: Pernie Kubicki is a detail‑driven 25‑year‑old financial analyst who balances disciplined ESG investing, methodical budgeting, health‑focused yoga routines, and a creative streak that surfaces in
    baking, board games, and art museum visits, all while maintaining a pragmatic, low‑drama outlook.
background:
  cultural: Pernie is a white American of Polish descent, raised in suburban Indianapolis. Her family valued education, community involvement, and practical responsibility—a hallmark of Midwestern culture.
    She grew up attending local events at the Indianapolis Museum of Art and community theater, fostering an appreciation for the arts alongside a pragmatic outlook. While she identifies primarily as American,
    she maintains occasional Polish family traditions, such as baking pierogi for holidays. Her liberal arts education broadened her cultural perspective, allowing her to integrate a humanistic lens into
    her analytical profession while staying rooted in the reliable, modest values of her Midwestern upbringing.
