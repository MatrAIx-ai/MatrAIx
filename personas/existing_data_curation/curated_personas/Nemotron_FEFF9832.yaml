  career_goals: Joseph aims to transition from his current role as a staff physical scientist to leading his own research team within the next five years. He is actively pursuing a senior research position
    that will give him authority over project selection, grant acquisition, and technology transfer. His primary ambition is to develop a commercially viable material for improving energy efficiency in
    agricultural equipment, a goal that blends his curiosity about advanced composites with the practical needs of his Midwestern community. Securing a multi-year NSF or DOE grant to fund this work is a
    top priority. He also plans to mentor junior scientists and graduate students, author high-impact journal articles, and become a recognized speaker at national conferences. In the longer term, Joseph
    envisions a hybrid role that combines R&D leadership with part-time adjunct teaching at a nearby university, allowing him to shape the next generation of physical scientists while staying closely connected
    to industry.
