  skills: '[''Woodworking'', ''Home repair'', ''Gardening'', ''Basic electrical work'', ''Basic plumbing'', ''Volunteer coordination'', ''Community event planning'', ''Peer support counseling'', ''Art appreciation'']'
  hobbies: '[''Attending art fairs'', ''Sketching landscapes'', ''Genealogy research'', ''Bird‑watching'', ''Gardening'', ''Playing harmonica'', ''Reading historical nonfiction'', ''Book‑exchange group'',
    ''Volunteering at shelter'']'
  career_goals: Victor aims to formalize his role as a community mentor by completing a GED and obtaining certification in peer support, allowing him to serve at the local mental‑health outreach center.
    He hopes to launch a small handmade‑crafts stall at the Lancaster County farmers’ market, showcasing his woodworking and up‑cycled art pieces. Additionally, he wishes to organize a monthly art‑therapy
    workshop for seniors and individuals coping with anxiety, merging his compassion with his love of art.
