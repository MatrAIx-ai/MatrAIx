  hobbies: '[''Salsa dancing'', ''Teaching beginner salsa'', ''Cooking traditional Puerto Rican dishes'', ''Fusion cuisine experimentation'', ''Urban herb gardening'', ''Board game nights'', ''Pharmacy
    trivia contests'', ''Volunteering at community health fairs'', ''Spontaneous weekend trips to upstate New York'', ''Exploring new restaurants'', ''Attending Broadway shows'', ''Participating in cultural
    festivals (e.g., Puerto Rican Day Parade)'']'
  career_goals: Alyssa is driven to transition from a frontline pharmacist to a pharmacy manager within the next three years, aiming to lead a high‑volume NYC community pharmacy that integrates clinical
    services such as chronic disease monitoring and flu‑shot clinics. She plans to earn a Board Certified Ambulatory Care Pharmacist (BCACP) credential and become a preceptor for pharmacy students at a
    local college. Her competitive streak fuels a desire to achieve the highest patient‑satisfaction scores in her network and to be recognized as ‘Pharmacist of the Year’ by the state association. Long‑term,
    she dreams of opening her own boutique pharmacy that offers bilingual health counseling and culturally tailored wellness programs for the Latino community.
