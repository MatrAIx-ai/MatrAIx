  hobbies: '[''Painting'', ''Sketching'', ''Digital illustration'', ''Reading speculative fiction'', ''Writing poetry'', ''Hiking'', ''Biking'', ''Volunteering at library storytime'', ''Community theater'',
    ''Improv comedy'', ''Playing acoustic guitar'', ''Exploring educational technology'']'
  career_goals: Tara aims to become a certified elementary school teacher who champions art‑integrated learning. In the short term, she plans to complete her teaching credential and secure a position at
    a local school in Nampa where she can design innovative, creativity‑focused lesson units. Over the next five years, she hopes to pursue a Master’s degree in Education with a concentration on curriculum
    design and educational technology, eventually moving into a curriculum specialist role that shapes district‑wide art and technology initiatives. Parallel to her professional trajectory, she envisions
    founding a community after‑school art lab to provide youth with accessible creative outlets and to inspire a culture of curiosity and collaboration within her hometown.
