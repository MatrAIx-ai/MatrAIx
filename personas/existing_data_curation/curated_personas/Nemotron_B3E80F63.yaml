personas:
  professional: Tara Gagliano, a 19‑year‑old aspiring elementary teacher, blends her strong lesson‑planning expertise, digital illustration flair, and knack for collaborative facilitation to design art‑integrated
    curricula that energize young learners while she occasionally forgets to file paperwork until the last minute.
  sports: Tara Gagliano, a 19‑year‑old adventure lover, spends weekends hiking the foothills, rides with the Idaho River Riders bike club along the Snake River, plays casual soccer for a local youth league,
    roots for the Boise State Broncos football team and Portland Trail Blazers, and attends yoga classes to balance her active lifestyle.
  arts: Tara Gagliano, a 19‑year‑old multidisciplinary artist, draws inspiration from Frida Kahlo’s bold colors, Hayao Miyazaki’s whimsical storytelling, and the lyrical introspection of Sufjan Stevens
    and Phoebe Bridgers, regularly performs with the Nampa Improv troupe, acts in community theater productions of 'Our Town', and composes acoustic folk songs that echo her personal narratives.
  travel: Tara Gagliano, a 19‑year‑old wanderer, has road‑tripped to Yellowstone and taken weekend getaways to Seattle and Portland, prefers spontaneous, budget‑friendly hostel stays organized via Hostelworld,
    dreams of trekking New Zealand’s South Island and exploring Kyoto’s temples, yet balances these cravings with her part‑time job and school commitments.
  culinary: Tara Gagliano, a 19‑year‑old food enthusiast, enjoys cooking intermediate‑level dishes like rosemary‑infused roasted potatoes, wild mushroom risotto, and pan‑seared Idaho trout, often pairing
    them with fresh garden salads and occasional sushi rolls, while she can’t resist grabbing avocado toast and oat‑milk lattes from her favorite local café.
  core: Tara Gagliano, a 19‑year‑old imaginative explorer, fuses art, education, and adventure into a lively, sometimes scattered, yet passionately collaborative lifestyle, occasionally losing track of
    deadlines in pursuit of the next creative spark.
background:
  cultural: Raised in Nampa, Idaho, Tara grew up in a predominantly White, small‑town environment that blends Midwestern modesty with the independent spirit of the intermountain West. Her family heritage
    includes Italian roots on her father's side, reflected in the surname Gagliano, and a broader European‑American background shaped by community values, self‑reliance, and a strong emphasis on education.
    The agricultural landscape of Canyon County and the proximity to the Boise metropolitan area exposed her to both rural traditions and a budding arts scene. Local fairs, outdoor recreation, and community
    gatherings have reinforced her appreciation for collaboration, harmony, and the natural environment, while the growing cultural initiatives in Nampa have nurtured her artistic curiosity and commitment
    to contributing positively to her community.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Early childhood development'', ''Differentiated instruction'', ''Creative writing'', ''Visual arts (painting, sketching)'', ''Digital illustration'',
