persona_description: A French painter, particularly known for his depictions of light comedy and his influence on the Rococo movement in French art. He is admired for his ability to create a sense of harmony
  between art and nature and his willingness to lend his bulkier figures a firmer place in his compositions. His works are characterized by his intelligent and dry touch, and he is considered a charming
  essayist. His style was popular with Frederick the Great and he was highly respected amongst the admirers of Watteau. He married the 18-year-old grandchild of Boursault in 1741 and died of pneumonia on
  14 September 1743.
