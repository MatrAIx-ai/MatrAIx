persona_description: A researcher at the University of California, San Diego (UC San Diego), who specializes in the study of RNA biology and RNA modifications, particularly m6A RNA methylomes in HIV infection.
  His/her research interests include the dynamics of RNA modifications, their impact on function, and the development of drugs targeting RNA targets, particularly m6A modifications. The researcher has published
  groundbreaking findings in Nature Microbiology, revealing m6A modifications in HIV RNA for the first time and identifying a new mechanism for the control of HIV-1 replication and its interaction with
  the host immune system.
