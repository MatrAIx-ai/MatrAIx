  career_goals: Tania aims to steer her organization toward sustainable, inclusive growth, expanding market presence while embedding social responsibility and diversity at its core. She aspires to launch
    a company-wide mentorship program for Latinx women, strengthen community investment initiatives, and eventually transition to a board-level role that leverages her experience to influence broader industry
    standards. Simultaneously, she seeks to cultivate a healthier work culture that reduces stress for herself and her teams, integrating wellness practices and more flexible structures.
