personas:
  professional: Tania Santiago, a seasoned executive with over twenty years of strategic planning and operational leadership, blends a methodical, data‑driven approach with a love for visual arts to drive
    inclusive growth, mentor women from underrepresented backgrounds, and embed social responsibility into corporate strategy, all while they maintain a disciplined focus on measurable outcomes.
  sports: Tania Santiago, an avid solo hiker of the Sonoran desert, logs weekly sunrise treks with the Desert Trail Hikers club, practices yoga thrice weekly at the Phoenix Yoga Studio, follows the Phoenix
    Suns during the basketball season, roots for the Arizona Cardinals in fall football, and they sprinkle occasional weekend runs to stay fit while balancing a demanding executive schedule.
  arts: Tania Santiago, a devoted watercolorist and collector of folk art, frequents the Phoenix Art Museum and the Museum of Contemporary Art for inspiration, admires the vibrant canvases of Frida Kahlo
    and the immersive light installations of James Turrell, delighting in the playful patterns of Yayoi Kusama, and they weave these artistic influences into both their business presentations and personal
    creations.
  travel: Tania Santiago, a solo traveler who blends meticulous itinerary planning with spontaneous cultural immersion, has explored the colonial streets of Santa Fe, the ancient ruins of Palenque, and
    the tea houses of Kyoto, dreams of trekking the Inca Trail to Machu Picchu and attending the lantern festival in Chiang Mai, yet they balance these adventures with family obligations that often require
    short, budget‑conscious trips.
  culinary: Tania Santiago, an accomplished home chef, invests hours each weekend perfecting mole poblano—slow‑cooking dried chilies, cacao, and a blend of spices—and hand‑rolling tamales stuffed with masa,
    pork, and roasted chilies, relishing the therapeutic ritual of simmering sauces, yet they sometimes over‑season in enthusiasm, and they source heirloom chilies and fresh corn from local farmers' markets
    to keep their dishes authentic and vibrant.
  core: Tania Santiago, a data‑driven executive who finds balance in watercolor strokes, desert hikes, and mindful rituals, constantly worries about details yet channels that anxiety into meticulous planning
    and compassionate leadership.
background:
  cultural: Born to Mexican immigrant parents, Tania grew up in a bilingual household that celebrated Mexican traditions, music, and cuisine. Her heritage imbues her with a strong sense of community (familismo)
    and respect for collective well-being, which informs her compassionate leadership style. She maintains close ties to the vibrant Mexican-American community in Phoenix, regularly attending events like
    Cinco de Mayo and Día de los Muertos, and she incorporates Mexican artistic motifs and values of solidarity into her personal and professional life.
