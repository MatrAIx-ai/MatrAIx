personas:
  professional: Laura Rump, a retired community arts facilitator, leverages her vivid imagination, flexible planning, and empathetic mediation to organize weekly seniors’ craft circles, curate local amateur
    art exhibitions, and mentor budding storytellers in Pulaski County.
  sports: Laura Rump enjoys seasonal hiking in the nearby state parks, participates in the Pulaski County Senior Walking Club, and avidly follows the Virginia Tech Hokies football team and the Washington
    Nationals baseball club, cheering from her balcony during spring and summer games.
  arts: Laura Rump paints abstract landscapes inspired by the bold palettes of Georgia O'Keeffe and Joan Mitchell, delights in listening to bluegrass legends Bill Monroe and Old Crow Medicine Show, frequently
    attends community theater renditions of Tennessee Williams plays, and reads speculative fiction by Neil Gaiman and Octavia Butler, blending these influences into her storytelling workshops.
  travel: Laura Rump prefers spontaneous weekend getaways to Shenandoah National Park, has enjoyed a craft-focused trip to Asheville, North Carolina, dreams of an artistic pilgrimage to Santa Fe, New Mexico,
    and longs to explore the literary cafés of Dublin, Ireland, all while budgeting her travel around modest savings and occasional library grants.
  culinary: Laura Rump enjoys farm-to-table cooking, skillfully prepares roasted vegetable medleys with heirloom carrots, rosemary, and feta, bakes a comforting apple crisp with cinnamon and nutmeg, and
    delights friends at potlucks with her signature garden-herb infused chicken soup, though she sometimes over-season dishes in her enthusiasm for bold flavors.
  core: Laura Rump is a garden-loving, art-driven community catalyst who balances a relaxed, sometimes chaotic schedule with boundless curiosity, generosity, and a love for bluegrass melodies.
background:
  cultural: Laura was raised in a small farming community in central Kentucky, immersed in Appalachian traditions. Her family emphasized self‑reliance, oral storytelling, and music, with church playing
    a central role in community life. She embraces Southern hospitality, enjoys regional dishes like fried chicken and cornbread, and participates in county fairs, quilting circles, and local music sessions.
    While she identifies with the white Appalachian cultural heritage of the area, she remains open to new experiences and values the harmony and cooperation that characterize her community.
