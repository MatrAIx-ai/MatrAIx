persona_description: A Washington State Department of Ecology official with expertise in aquatic invasive species prevention and enforcement, specifically focusing on the management of zebra and quagga
  mussels in the Columbia River Basin and the Pacific Northwest. This individual has been involved in the development and implementation of prevention and enforcement programs, as well as monitoring and
  surveying of aquatic ecosystems for the detection of invasive species. They are responsible for ensuring that the state's aquatic resources are protected from the impacts of invasive species, including
  the risk of water contamination, ecosystem disruption, and economic and human health hazards.
