  hobbies: '[''Reading mystery novels and historical non-fiction'', ''Puzzle solving (Sudoku, crosswords, jigsaw puzzles)'', ''Gardening with native Floridian plants'', ''Precise baking and cooking'', ''Yoga
    and guided meditation'', ''Early morning beach walks and birdwatching'', ''Collecting seashells'', ''Journaling'', ''Knitting and crocheting'']'
  career_goals: Tracy’s career plan centers on advancing within the structured environment of clinical laboratory science while preserving a predictable schedule that supports her emotional wellbeing. Over
    the next two years she intends to earn the ASCP Certified Technologist (MLT) credential and complete an associate‑degree program in Clinical Laboratory Science. Her long‑term ambition is to move into
    a supervisory or laboratory manager role, where she can design quality‑assurance programs, oversee staff compliance, and implement continuous‑improvement initiatives. Tracy also aspires to specialize
    in molecular diagnostics, gaining expertise in PCR and next‑generation sequencing methods, and ultimately to lead a dedicated molecular testing team. Throughout her progression, she seeks leadership
    opportunities that allow her to maintain high standards without excessive social demands.
