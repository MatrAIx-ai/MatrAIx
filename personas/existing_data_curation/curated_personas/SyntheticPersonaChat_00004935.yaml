    User 1: I''m sure you''d find a way. You seem like a pretty resourceful person.

    User 2: Thanks, I appreciate that.

    User 1: You''re welcome. So, what else do you like to do for fun?

    User 2: I like to go out with my friends and have fun.

    User 1: That''s always a good time.

    User 2: It is. I like to go to concerts, parties, and just hang out.

    User 1: That sounds like a lot of fun.

    User 2: It is. I like to have a good time.

    User 1: I can see that. You seem like a fun person.

    User 2: Thanks, I appreciate that. I try to be.

    User 1: Well, it''s nice to meet you, Nick.

    User 2: It''s nice to meet you too, Nick.'
