personas:
  professional: A meticulous little builder, Ricki Lebright transforms colorful Lego bricks into orderly skyscrapers and train tracks, delighting in the predictability of step‑by‑step instructions while
    occasionally improvising a surprise tunnel when the set runs out of pieces.
  sports: A budding athlete, Ricki Lebright attends the Little Sprouts Soccer Club on Saturday mornings, cheering for the local Chicago Cubs while mastering the basics of kicking a soft ball, and also enjoys
    swimming laps at the community pool during the summer, though they sometimes stubbornly skip the warm‑up stretches.
  arts: A creative preschooler, Ricki Lebright loves painting rainbows with Crayola markers, dancing to the upbeat tunes of The Wiggles and Disney’s "Let It Go," and can recite verses from Dr. Seuss’s "Green
    Eggs and Ham," while occasionally refusing to sit still during story time unless a bubble‑wrap pop is incorporated.
  travel: An adventurous traveler, Ricki Lebright has explored the interactive exhibits at the Children’s Museum of Indianapolis, built sandcastles on the bright shores of Clearwater Beach, and dreamed
    of a future trip to Disney World, often insisting on packing a favorite stuffed giraffe for each journey.
  culinary: A picky eater with a developing palate, Ricki Lebright adores cheesy macaroni, chicken nuggets with honey‑mustard dip, and strawberry yogurt, but consistently turns their nose up at broccoli
    and green beans, preferring to "make a face" at any unfamiliar vegetable on the plate.
  core: Ricki Lebright is a structure‑loving, four‑year‑old explorer who balances orderly play with bursts of spontaneous creativity, insists on tidy piggy banks, monitors tiny allergies, and navigates
    the world with a mix of charming confidence and occasional stubbornness.
background:
  cultural: Ricki is a White American child raised in Leola, a small town in Lancaster County, Pennsylvania. She attends a local preschool where the curriculum emphasizes routine, hands‑on learning, and
    community participation. Her family celebrates traditional holidays such as Christmas and Thanksgiving with gatherings that feature seasonal foods and story‑telling. Community events like the Lancaster
    County fair, church picnics, and seasonal farmers' market visits are regular parts of her life, giving her exposure to the region’s agricultural heritage. The close‑knit nature of the town and the emphasis
    on courtesy, family ties, and respect for the outdoors shape her cultural outlook.
attributes:
  skills: '[''routine-following'', ''toy organization'', ''basic counting'', ''letter recognition'', ''phonemic blending'', ''fine motor coordination'', ''story retelling'', ''cooperative play'']'
  hobbies: '[''arranging stuffed animals'', ''coloring with crayons'', ''building block towers'', ''jigsaw puzzles'', ''listening to picture books'', ''nature walks'']'
  career_goals: While still exploring the world, Ricki often talks about becoming a teacher because she loves helping friends learn and enjoys the predictability of a classroom routine. She also expresses
    a wish to be a nurse or a veterinarian, drawn by the idea of caring for people and animals. Occasionally, she imagines building bridges and tall towers, hinting at an ambition to be an engineer. At
    this stage, her goals reflect a blend of compassion, a desire for orderly environments, and a curiosity about creating practical solutions.
