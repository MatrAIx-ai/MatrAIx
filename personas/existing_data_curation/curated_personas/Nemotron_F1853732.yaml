personas:
  professional: Angie Pinard, a nursing assistant in a bustling long‑term care facility, leverages her meticulous vital‑sign monitoring, infection‑control expertise, and warm interpersonal style to ensure
    consistent, patient‑centered care while training new aides, and they are channeling this practical routine‑driven foundation toward completing an LPN program and steering quality‑improvement projects
    in geriatric nursing.
  sports: Angie Pinard fuels their fitness routine with lively Zumba sessions and weekend group hikes along the Maine shoreline, while cheering on the Portland Sea Dogs in baseball, the Boston Red Sox for
    summer home runs, and the New England Revolution during the MLS season, and they occasionally join a community volleyball league for additional social exercise.
  arts: Angie Pinard enriches their evenings with a blend of classic New England folk—listening to the Avett Brothers and Gregory Alan Isakov—while they attend local theater productions of "Our Town" at
    the Ogunquit Playhouse, discussing recent reads like Donna Tartt's "The Secret History" in a book club, and occasionally dabbling in watercolor painting of coastal scenes.
  travel: Angie Pinard prefers low‑key, nature‑focused trips, planning weekend drives to Acadia National Park for sunrise hikes, arranging a summer road‑trip through coastal Maine towns such as Camden and
    Bar Harbor, while dreaming of an adventurous spring tour of Iceland's waterfalls and a future cultural getaway to Kyoto during cherry blossom season, and they often compare itineraries on travel forums
    while balancing travel costs with their budgeting plan.
  culinary: Angie Pinard delights in cooking wholesome New England fare—whipping up clam chowder with fresh clams, thyme, and bay leaf, baking lobster rolls with buttered rolls, and simmering herb‑infused
    roasted chicken with rosemary and sage—while their garden supplies basil, parsley, and kale that flavor their daily meals, and they enjoy occasional farm‑to‑table dining at local seafood shacks.
  core: Angie Pinard blends routine‑driven practicality with spontaneous social energy, turning everyday caregiving, community Zumba, and herb gardening into a harmonious, purpose‑filled life that balances
    ambition, kindness, and occasional impulsive quirks.
background:
  cultural: Angie is a White American from South Portland, Maine, raised in a close‑knit New England community. Her upbringing reflects the region's pragmatic values, strong work ethic, and appreciation
    for community involvement. She grew up with a mix of Irish and English family heritage, celebrating traditional holidays and maritime traditions of the coastal area. Her cultural background emphasizes
    reliability, cooperation, and a practical approach to everyday life.
attributes:
  skills: '[''Patient care and assistance'', ''Vital signs monitoring'', ''Basic wound care'', ''Infection control'', ''Effective communication'', ''Team collaboration'', ''Emergency response'', ''Training
    and mentorship'', ''Documentation and record keeping'', ''Adaptability to changing patient needs'']'
  hobbies: '[''Zumba fitness classes'', ''Group hiking and coastal walks'', ''Cooking family and New England recipes'', ''Backyard gardening (herbs and vegetables)'', ''Volunteering at local food bank'',
    ''Book club'']'
  career_goals: Angie aims to advance her healthcare career by completing an LPN program within the next two years, using her existing college credits. She hopes to become a licensed practical nurse specializing
    in geriatrics, eventually pursuing RN certification and a supervisory role in a long‑term care facility. She also envisions participating in quality‑improvement projects that enhance patient safety
    and workflow efficiency, aligning with her practical and routine‑oriented mindset.
