persona_description: A researcher or education expert who is interested in the gender gap in science and its cultural implications, particularly in the context of developing countries where cultural attitudes
  play a significant role. This person is likely to have a strong background in education research, statistical analysis, and cultural anthropology. They are knowledgeable about the science gender gap and
  its global variation, and have a keen interest in understanding the factors that contribute to this gap, including cultural biases and societal structures. They are likely to have conducted research in
  countries with a high proportion of women in science and engineering and have observed the cultural forces that shape the gender gap in these regions. They are also likely to be aware of the importance
  of education in social mobility and how it can be a tool to bridge the gender gap in science.
