persona_description: A historian who specializes in the study of the Maccabean revolt and the role of the Temple in Jewish history. His research interests include the military tactics of the Maccabees,
  the role of the Temple in Jewish culture, and the political and religious implications of the Maccabean revolt. He is particularly interested in the historical implications of the Temple's purification
  and re-dedication into an eight-day holiday to thank God for helping them and to do the best they could at celebrating a late Sukkot.
