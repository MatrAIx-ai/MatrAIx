  career_goals: Steven plans to earn his GED within the next year and then enroll in a vocational program or community college to study automotive technology or welding, fields that satisfy both his practical
    mindset and his desire to work with his hands. He aims to combine his technical training with his natural inclination toward mentorship, aspiring to become a skilled service technician who also guides
    younger apprentices or volunteers with a nonprofit that teaches trade skills to at‑risk youth. Ultimately, he seeks a stable, community‑focused career that lets him apply his curiosity, reliability,
    and cooperative spirit to help others succeed.
