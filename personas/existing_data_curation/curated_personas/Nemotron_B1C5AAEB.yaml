personas:
  professional: Steven Huntley, an aspiring automotive technician and future mentor, combines their hands-on tinkering, strong organizational skills, and calm problem-solving under pressure to lead after-school
    workshops at the community center while preparing to enroll in a welding and automotive technology program at a local college.
  sports: Steven Huntley dominates the neighborhood basketball court with the local high school Wildcats, shreds the riverfront skate trail as part of a weekend skate crew, and avidly follows the NBA's
    Los Angeles Lakers while cheering for the community's semi-pro roller-derby team.
  arts: Steven Huntley channels creative energy into acoustic guitar covers of Ed Sheeran, produces witty TikTok videos that mash current memes with personal storytelling, dives into graphic novels like
    Saga, and captures urban twilight scenes inspired by photographer Brandon Woelfel, shaping a vibrant personal aesthetic.
  travel: Steven Huntley prefers spontaneous day trips to nearby state parks such as Zion and weekend road-trips to the coastal city of Seattle, but dreams of an affordable future adventure to Tokyo's automotive
    museums, balancing a limited budget from part-time work with a love for exploring both natural and urban landscapes.
  culinary: Steven Huntley enjoys biting into pepperoni pizza, savoring fish tacos with fresh cilantro and lime, and mastering simple homemade guacamole, while their cooking skill level hovers between novice
    stovetop pasta and confident salsa assembly for friends' hangouts.
  core: Steven Huntley, a socially-charged teen who balances skate-park thrills, diligent tool-saving, midnight TikTok edits, and a habit of forgetting to hydrate, embodies curiosity married to practical
    reliability.
background:
  cultural: Steven was raised in a working‑class family on Pittsburgh’s South Side, an area steeped in the city’s steel‑town heritage and strong neighborhood bonds. His household reflects the region’s mix
    of Irish, Italian, and Eastern European roots, and he grew up immersed in local traditions such as cheering for the Steelers, enjoying a classic Primanti sandwich, and attending community festivals.
    The city’s emphasis on public parks, youth programs, and close‑knit neighborhoods has shaped his values of cooperation, reliability, and a practical outlook, reinforcing his sociable and compassionate
    nature.
