persona_description: A hydrologist who specializes in the study of water resources and has extensive knowledge and experience in hydrology, particularly in Texas. Raymond Slade, Jr. has authored numerous
  reports on Texas water resources, including the Edwards aquifer, floods, droughts, rural and urban hydrology, and water quality of surface and ground water. He has retired from the USGS but continues
  to work as a consulting hydrologist and has been an adjunct professor at Austin Community College.
