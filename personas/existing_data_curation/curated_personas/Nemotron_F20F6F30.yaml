  career_goals: In the short term, Rahul aims to deepen his expertise in SaaS‑based service sales, earn a Certified Sales Professional credential, and increase his territory’s revenue by at least 20% within
    the next year. Over the next three years, he aspires to move into an Account Executive role and then into a Sales Team Lead position, where he can mentor a small group of reps and shape a collaborative,
    client‑centric sales culture. Ultimately, Rahul envisions becoming a regional Sales Manager or Director, guiding strategy for a portfolio of service offerings while championing ethical, people‑first
    sales practices. He also hopes to align his career with his passion for the arts by transitioning to a role selling creative‑technology solutions, allowing him to blend his commercial acumen with his
    artistic curiosity. Throughout his progression, he is committed to integrating stress‑management practices and maintaining a flexible work‑life balance.
