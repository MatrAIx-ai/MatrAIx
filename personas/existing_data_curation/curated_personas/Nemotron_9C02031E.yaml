personas:
  professional: Tonya Lee is a seasoned community arts coordinator who leverages their meticulous planning, persuasive grant‑writing, and charismatic storytelling to organize senior art fairs, lead workshops,
    and serve as the vibrant centerpiece of local cultural events.
  sports: Tonya Lee enjoys low‑impact fitness through weekly tai chi classes at the Portland Community Center, occasional senior tennis matches at the Laurelhurst Club, and fervently cheers for the Portland
    Timbers and Trail Blazers, balancing their love of gentle movement with enthusiastic support of local teams.
  arts: Tonya Lee immerses themselves in the arts by painting abstract watercolors inspired by Georgia O'Keeffe, reciting modernist poems by Wallace Stevens at community theater open‑mic nights, and attending
    performances by the Oregon Symphony and spoken‑word artist Saul Williams, letting these experiences shape their creative identity.
  travel: Tonya Lee prefers thoughtfully planned, leisurely trips, such as a nostalgic visit to Maui’s Hana Highway to revisit Hawaiian flavors, a scenic train ride along the Oregon Coast, and annual pilgrimages
    to the Smithsonian in Washington, D.C., balancing their desire for adventure with the comforts of senior travel groups.
  culinary: Tonya Lee delights in baking haupia and integrating coconut with macadamia nuts into fusion desserts like haupia cheesecake, while also mastering roasted salmon with miso glaze and expertly
    pairing fresh lavender honey with artisanal breads, reflecting both their Hawaiian roots and Portland’s farm‑to‑table ethos.
  core: Tonya Lee is an imaginative, organized octogenarian whose boundless curiosity fuels daily watercolor sessions and community storytelling, yet their chronic worry often leads to meticulous budgeting
    and a tendency to over‑schedule social engagements.
background:
  cultural: Tonya is a white American who was born and raised in the lower Willamette Valley of Oregon, where her family’s roots trace back to Irish and German immigrants who settled in the Pacific Northwest
    during the early 20th century. Her childhood was steeped in the region’s natural landscape—forests, rivers, and a strong DIY culture—which fostered her early interest in crafts and gardening. In her
    twenties she married a U.S. Navy officer who was frequently stationed in Hawaii; the experience left a lasting imprint, prompting her to adopt the middle name “Kapiolani” and to develop a deep appreciation
    for Hawaiian art, music, and cuisine. After her husband’s passing, she retained those cultural ties, regularly participating in Honolulu‑style hula workshops and Hawaiian‑themed community events in
    Portland. Living in Portland’s vibrant, progressive arts scene has further broadened her cultural outlook, encouraging her to blend Pacific‑Northwest sensibilities with island aesthetics in her artwork
    and community projects. This hybrid background informs her inclusive approach to cultural exchange and her commitment to celebrating diversity within her local community.
