  career_goals: As a widowed octogenarian, Tonya’s ambitions focus on leaving a creative legacy and nurturing the next generation of community artists. She aims to complete and self‑publish a memoir that
    weaves together her personal history, Hawaiian influences, and Portland’s cultural evolution. She envisions founding an annual “Senior Art Showcase” at a local gallery, giving older adults a platform
    for experimental and abstract works. Tonya also seeks to mentor younger seniors in storytelling and digital art, helping them overcome tech anxieties. Finally, she hopes to master a new digital illustration
    program each year, integrating her love of novelty with her established painting practice.
