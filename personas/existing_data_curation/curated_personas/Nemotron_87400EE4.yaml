personas:
  professional: Michael Corbett, a 54‑year‑old veteran mechanical engineer with three decades of expertise in product design, thermodynamics, and structural analysis, leverages their methodical curiosity
    and love for unconventional ideas to lead cross‑functional teams, integrate sustainable design practices, and mentor junior engineers toward innovative solutions.
  sports: Michael Corbett, an avid hiker, spends weekends traversing the Appalachian Trail near Buckhannon, occasionally joins a local trail‑running club for 10‑k races, and they are a steadfast supporter
    of the West Virginia Mountaineers football team and the Pittsburgh Steelers.
  arts: Michael Corbett, a quiet but passionate collector, frequents the West Virginia University art museum and nearby galleries to acquire modern abstraction prints by Ellsworth Kelly and industrial‑inspired
    works by Zaha Hadid, while their evenings are filled with classic science‑fiction novels by Isaac Asimov and contemporary works by N.K. Jemisin, which spark speculative ideas for their engineering projects.
  travel: Michael Corbett, who prefers methodical trip planning, often escapes to the Blue Ridge Parkway for weekend drives, has explored the historic streets of Savannah, and dreams of an immersive study
    of Japan’s carpentry workshops and Berlin’s design museums, all while balancing travel costs against their upcoming consulting transition.
  culinary: Michael Corbett, a self‑taught cook, delights in smoking trout over hickory on weekends, crafts custom cutting boards in their workshop, and savors a strong black coffee paired with a locally
    brewed IPA and a rustic cornbread‑based skillet dish.
  core: Michael Corbett, a methodical engineer who fuses precise mechanical design with a love for abstract art, solitary hikes, disciplined savings, and quiet mentorship, quietly pursues sustainable innovations
    while indulging in occasional vintage model‑kit splurges.
background:
  cultural: Michael was born and raised in the Appalachian foothills of West Virginia, a region where self‑reliance, close‑knit community ties, and a reverence for the natural landscape shape daily life.
    His white, Anglo‑American heritage reflects the demographic makeup of Buckhannon and Barbour County, and his upbringing was infused with modest, work‑oriented values typical of rural Appalachia. He
    grew up in a family that emphasized education as a pathway to broader opportunities, encouraging his curiosity and support for higher learning, which eventually led him to pursue a graduate degree in
    a STEM discipline. While rooted in traditional Appalachian culture—evident in his appreciation for folk music, local festivals, and a strong sense of neighborly responsibility—Michael also embraces
    broader artistic and intellectual influences, fostering a blend of local pride and open‑minded curiosity.
attributes:
  skills: '[''Advanced CAD modeling (SolidWorks, AutoCAD)'', ''Finite element analysis (FEA)'', ''Thermodynamics and heat transfer analysis'', ''Structural analysis'', ''Product development lifecycle management'',
    ''Project management (Agile, Waterfall)'', ''Lean manufacturing implementation'', ''CNC machining and prototyping'', ''Sustainable design and renewable energy integration'', ''Failure mode and effects
    analysis (FMEA)'', ''Team leadership and mentorship'', ''Technical writing and presentation'']'
  hobbies: '[''Visiting art galleries and collecting prints'', ''Woodworking and furniture making'', ''Hiking Appalachian trails'', ''Reading science‑fiction literature'', ''Building scale model aircraft'',
    ''Volunteer STEM tutoring for middle‑school students'', ''Photography of industrial landscapes'']'
  career_goals: Looking ahead, Michael aims to leverage his extensive experience to move into a senior technical leadership role such as Principal Engineer or Director of Engineering, where he can shape
    long‑term product strategy and champion sustainable design initiatives. He is particularly motivated to spearhead projects that integrate renewable energy technologies into traditional manufacturing
    processes, reflecting his curiosity for unconventional solutions. Michael also aspires to mentor the next generation of engineers by establishing a regional STEM mentorship program and contributing
    technical articles to industry journals. In the longer term, he envisions transitioning to a part‑time consultancy, allowing him to continue solving complex engineering challenges while dedicating more
    time to his artistic and community interests.
