    Seasonal Meals'', ''Reading Historical Fiction'', ''Listening to Folk and Indie Music'', ''Journaling'', ''Volunteering at Library Art Programs'', ''Traveling to Nearby Towns for Local Festivals'']'
  career_goals: Katherine aspires to move into a supervisory role, aiming to become a store manager where she can shape visual merchandising strategies and mentor staff. She hopes to earn a retail management
    certification and eventually oversee multiple locations, giving her the flexibility to balance family commitments. Inspired by her love of art, she plans to open a small boutique that features locally
    crafted home‑decor items and her own handmade creations. She also envisions creating a community art corner within the store to host workshops and local artist showcases, merging her retail expertise
    with her artistic curiosity. Long‑term, she dreams of becoming a regional trainer for her retail chain, sharing best practices and encouraging creative merchandising across stores.
