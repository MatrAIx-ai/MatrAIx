  career_goals: Nicole dreams of a future where she can create and explore. She often says she wants to become an artist who paints bright pictures, a scientist who discovers new things, or a teacher who
    shares stories with children. Her ambition is to keep learning, stay curious, and use her love of art and ideas to make the world more colorful and interesting.
