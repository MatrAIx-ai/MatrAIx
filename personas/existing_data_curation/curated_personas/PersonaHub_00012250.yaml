persona_description: An environmentalist and conservationist who is passionate about the importance of vernal pools in supporting the survival and reproduction of various aquatic species. They are knowledgeable
  about the hydrology of vernal pools and the unique challenges they face in maintaining a local population of amphibians and other organisms. They are interested in the potential for vernal pools to be
  used as mitigation sites by the Geauga Soil and Water Conservation District to offset the effects of development within the Cuyahoga River Watershed. They are also interested in the broader ecological
  implications of vernal pools and their role in maintaining the health of surrounding wetlands, lakes, and ponds.
