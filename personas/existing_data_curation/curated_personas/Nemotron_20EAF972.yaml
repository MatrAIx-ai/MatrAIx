personas:
  professional: Alicia Matirne, a seasoned retail specialist with a flair for visual merchandising, leverages their curiosity, empathetic nature, and knack for conflict resolution to create engaging store
    environments while mentoring staff toward collaborative excellence, and they consistently foster a supportive team culture.
  sports: Alicia Matirne cheers on the Chicago Cubs (MLB) and the Chicago Bears (NFL) while weekly joining the town’s Sunrise Walkers Club and participating in a low‑impact yoga class at the community center,
    balancing their love for team spirit with gentle fitness routines, and they feel rejuvenated after each session.
  arts: Alicia Matirne finds inspiration at local gallery openings featuring works by emerging artists like Maya Torres, delights in community theater productions of classics such as 'Our Town' starring
    local talent, and fills quiet evenings listening to folk legends Joan Baez and contemporary singer‑songwriter Brandi Carlile, all of which fuel their quilting designs and creative retail displays, and
    they often incorporate these artistic influences into workshop curricula.
  travel: Alicia Matirne enjoys meticulously planned weekend road trips to historic sites like Colonial Williamsburg, Savannah’s cobblestone squares, and the Gettysburg battlefield, while dreaming of a
    spring pilgrimage to Florence, Italy’s Renaissance art museums, balancing travel enthusiasm with a modest retirement budget, and they sketch travel journals along the way.
  culinary: Alicia Matirne delights in cooking comforting dishes such as chicken tikka masala with garam masala spices, rustic ratatouille featuring fresh zucchini and basil, and home‑baked apple crisp
    topped with rolled oats, and they eagerly sample new cuisines like Korean bibimbap and Peruvian ceviche at farmers’ markets and local eateries.
  core: Alicia Matirne is a socially vibrant, art‑obsessed retail mentor who worries about the future, indulges in weekend road‑trip history tours, and occasionally splurges on handcrafted treasures despite
    a disciplined budget, and they remain ever‑optimistic about the next creative venture.
background:
  cultural: Alicia was raised in the American South, deeply rooted in the traditions of rural Georgia. Her upbringing emphasized Southern hospitality, close‑knit community values, and a respect for local
    history and crafts. As a white Southern woman, she identifies with the region’s strong church involvement, love of country and gospel music, and the emphasis on personal relationships and mutual support
    within Jasper County.
