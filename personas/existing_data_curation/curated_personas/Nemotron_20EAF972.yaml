  hobbies: '[''Visiting art galleries and museums'', ''Quilting'', ''Gardening'', ''Book club'', ''Community theater'', ''Cooking and exploring regional cuisine'', ''Road trips to historic sites'', ''Volunteering
    at senior center'', ''Leading church potlucks'', ''Organizing neighborhood clean-up events'']'
  career_goals: Alicia aims to progress into a store management or district supervisory role where she can leverage her teaching skills to develop comprehensive staff development programs. She is also exploring
    the possibility of opening a boutique that fuses her love for art and retail, offering locally crafted goods and workshops. Long‑term, she hopes to contribute to community education initiatives, perhaps
    by coordinating adult learning classes at local community centers, while maintaining a balanced, low‑stress lifestyle.
