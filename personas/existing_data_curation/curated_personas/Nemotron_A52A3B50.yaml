  hobbies: '[''Reading (fiction, psychology, business)'', ''Journaling and reflective writing'', ''Winter nature walks and birdwatching'', ''Winter photography'', ''Knitting and crocheting'', ''Baking with
    precise recipes'', ''Small local book club participation'', ''Beginner coding workshops (Python)'', ''DIY home organization projects'']'
  career_goals: Eiman aims to transition from her current non‑working status into a role as a Business Analyst or Operations Coordinator within the next two to three years. She plans to enroll in a Bachelor’s
    program in Business Administration to deepen her theoretical knowledge while obtaining professional certifications such as the CAPM (Certified Associate in Project Management). Her goal is to secure
    an entry‑level analyst position at a regional healthcare or logistics company in the Upper Midwest, where she can apply her practical curiosity to streamline workflows and improve efficiency. Over time
    she aspires to advance into a supervisory or consulting role, allowing her to design and implement process improvements that benefit both the organization and the local community, while also maintaining
    a work environment that supports her mental‑health needs.
