personas:
  professional: Eiman Tennant, a budding business analyst with an associate’s degree in Business Administration, leverages advanced Excel, Trello, Asana, and nascent Python skills to create meticulously
    documented process reports, while their disciplined curiosity drives them to seek structured improvements in regional healthcare logistics.
  sports: Eiman Tennant, an avid winter nature‑walker and bird‑watcher, joins a local Audubon Saturday club for field outings, enjoys cross‑country skiing on the Koochiching trails, and follows the Minnesota
    Wild for hockey while preferring low‑impact, solitary activities over team sports.
  arts: Eiman Tennant, an enthusiastic reader of contemporary fiction like The Night Circus and a diligent knitter, draws creative inspiration from photographers like Ansel Adams, enjoys the folk‑indie
    sound of Sufjan Stevens, and contributes to a monthly book club where they discuss psychological insights from authors such as Malcolm Gladwell.
  travel: Eiman Tennant, a planner‑oriented traveler who maps trips in Excel, favors quiet winter photography expeditions to places like Iceland’s Snæfellsjökull and local stays at Boundary Waters cabins,
    balancing a modest budget with a desire to capture stark natural landscapes.
  culinary: Eiman Tennant, a precise baker who follows detailed recipes for croissants, lemon bars, and sourdough loaves using high‑quality butter, almond flour, and dark chocolate, couples their knitting
    sessions with the aroma of rosemary‑infused roasted chicken, and treats themselves with artisanal cheese after perfecting a new pastry.
  core: Eiman Tennant channels disciplined curiosity into meticulous data work and solitary creative hobbies, while battling intense anxiety that fuels both their high standards and occasional self‑critical
    spirals.
background:
  cultural: Eiman was raised in International Falls, Minnesota, a small border town in Koochiching County known for its long, cold winters and tight‑knit community. Her family’s heritage is primarily German
    and Scandinavian, reflecting the historical settlement patterns of the Upper Midwest. Local culture emphasizes self‑reliance, modesty, and communal support, especially during the harsh winter months
    when activities such as ice‑fishing, snowmobiling, and community potlucks are common. Growing up, she participated in regional traditions like the county fair and cross‑border events that foster a subtle
    awareness of Canadian influences. These cultural elements have shaped her disciplined work ethic, love for organized routines, and appreciation for nature and practical, hands‑on skills.
attributes:
  skills: '[''Advanced Microsoft Excel'', ''Data entry and spreadsheet management'', ''Budgeting and financial reporting'', ''Project coordination (Trello, Asana)'', ''Basic Python programming for data
