  hobbies: '[''Vegetable gardening'', ''Reading technical non-fiction and biographies'', ''Logic puzzles and Sudoku'', ''Woodworking'', ''Small‑group book club'', ''Teaching basic computer skills at community
    center'']'
  career_goals: Rose aims to step into a senior IT manager role within the next five years, focusing on enhancing cybersecurity posture for small businesses in her region. She plans to earn the Cisco Certified
    Network Professional (CCNP) and Certified Information Systems Security Professional (CISSP) credentials to broaden her expertise. Additionally, she is interested in establishing a boutique IT consultancy
    that offers structured, reliable support to local firms, allowing her to balance her competitive drive with a desire for predictable, well‑organized work environments.
