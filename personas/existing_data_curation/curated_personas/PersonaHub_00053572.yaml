persona_description: A scientist who specializes in the study of meteor impacts and their effects on the Earth's environment. Her research focuses on the analysis of carbon molecules trapped in rocks dating
  back to the Permian period, which she believes indicate a mass extinction event two hundred fifty million years ago. She is skeptical of the existence of any large hole to mark the impact site, and believes
  the impact spread buckyballs around the planet. Her expertise in the field of meteorology and her ability to analyze complex geological data make her the ideal candidate to investigate the evidence of
  a massive meteor impact.
