persona_description: A researcher in the field of molecular markers for colorectal cancer screening, focused on the development and validation of non-invasive stool DNA tests for the early detection and
  prevention of the disease. This persona is highly skilled in the evaluation of molecular markers, particularly DNA, proteins, and messenger RNA, and is actively involved in the advancement of innovative
  screening tests for CRC. They are dedicated to understanding the genetic and epigenetic changes that drive the development of CRC, and are actively involved in the development of clinical applications
  for these tests. This persona is also interested in the use of stool DNA tests in high-risk populations and in the management of false-positive results.
