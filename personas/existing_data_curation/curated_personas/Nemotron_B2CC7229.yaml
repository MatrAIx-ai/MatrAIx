  hobbies: '[''drawing'', ''digital illustration'', ''listening to indie music'', ''attending concerts'', ''skateboarding'', ''community theater'', ''volunteering at animal shelter'', ''journaling'', ''hiking'',
    ''creating TikTok videos'']'
  career_goals: Julie hopes to earn her GED and pursue post‑secondary education in graphic design or visual arts. She dreams of becoming a professional illustrator or a social media content creator who
    can blend art with storytelling. She also envisions a role that allows her to support other teens, perhaps as a youth mentor or counselor, and values flexible, creative work environments.
