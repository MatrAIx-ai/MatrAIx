personas:
  professional: Julie Smith, a 16‑year‑old high school junior, blends sketching and digital illustration skills with a knack for peer communication, channeling them into freelance commission work and teen‑focused
    TikTok storytelling, despite frequent disorganization that makes meeting deadlines a challenge.
  sports: Julie Smith frequents the town’s skate park with the local Parkside Skate Crew, joins the high school’s varsity soccer team in the fall, and cheers for the Chicago Bulls (NBA) and the Chicago
    Cubs (MLB) during televised games.
  arts: Julie Smith draws inspiration from digital illustrators like Loish and Syd Mead, while indie musicians such as Mitski and Tame Impala score their TikTok edits, and they regularly attend community
    theater productions featuring local actors and the live shows of The Strokes.
  travel: Julie Smith prefers spontaneous weekend road trips to nearby nature trails like the Blue Ridge Parkway, has dreamed of exploring the street art of Berlin and the cherry blossoms of Kyoto, but
    budget constraints keep most travel limited to small group getaways with friends.
  culinary: Julie Smith loves crafting avocado toast topped with feta and chili flakes, munching on spicy ramen bowls with soft‑boiled eggs, and treating themselves to midnight pizza slices loaded with
    pepperoni and extra cheese, while their cooking skills are limited to microwaving popcorn and making smoothies.
  core: Julie Smith is a creatively restless teen who balances a vivid imagination and a love for community with chronic procrastination and a tendency to over‑worry about every new project.
background:
  cultural: Julie comes from a middle‑class white family in the Lehigh Valley of Pennsylvania, with roots in German and Irish ancestry. The region’s blend of industrial history, Pennsylvania Dutch influences,
    and strong community ties shape her values of hard work, modesty, and neighborly cooperation. Local traditions such as town fairs, high school football games, and regional foods like pretzels and cheesesteaks
    are part of her upbringing, while her family’s church (likely Methodist/Episcopal) and emphasis on family gatherings contribute to a supportive, community‑focused cultural background.
