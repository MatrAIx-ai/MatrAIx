  career_goals: Robert aims to secure a supervisory role as a shift lead or EMS manager within Daviess County's emergency services, providing him with a more predictable schedule and structured responsibilities.
    He also plans to obtain a Certified Emergency Management Specialist certification and become a certified paramedic instructor to train the next generation of EMS professionals. Additionally, he hopes
    to earn recognition through awards for excellence in patient care and contribute to developing updated regional EMS protocols.
