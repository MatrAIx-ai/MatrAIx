  hobbies: '[''Gardening'', ''Listening to classic country music'', ''Church involvement and volunteering'', ''Quilting and crocheting'', ''Reading mystery novels'', ''Visiting farmers’ markets'', ''Fishing'',
    ''DIY home improvement projects'']'
  career_goals: Gail aims to move from receptionist to office manager within the next few years. She plans to earn her GED and enroll in a community‑college certificate program in office administration
    to formalize her skill set. Driven by a competitive streak, she seeks to become the top performer in customer‑service metrics and eventually supervise a small team. Long‑term, she envisions opening
    a modest boutique or a community café in Quitman, leveraging her organizational talents and love for local culture while providing a gathering place for neighbors.
