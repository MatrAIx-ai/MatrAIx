  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Miniature painting'', ''Birdwatching'', ''Coastal trail walking'', ''Volunteering at senior center (yoga and crafts)'', ''Meditation
    and mindfulness'', ''Journaling'']'
  career_goals: Eleanor aims to transition into a mentorship role within the next two years, guiding younger technicians through apprenticeships and workshops that blend traditional craftsmanship with emerging
    digital technologies. She plans to obtain a Certified Dental Technician (CDT) credential and explore advanced certifications in ocular prosthetics to stay at the forefront of her field. Recognizing
    her deep‑rooted curiosity, she hopes to spearhead a small pilot program at her lab to integrate 3‑D printed provisional devices, improving turnaround times for patients. While she values her longstanding
    commitment to the community, she also envisions gradually reducing her hours to part‑time, allowing more time for family, volunteering, and personal wellness, without fully retiring from the profession
    she loves.
