  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical biographies'', ''Reading popular science'', ''Jigsaw puzzles'', ''Birdwatching'', ''Volunteering at food pantry'', ''Bridge (card game)'',
    ''Home mechanical tinkering'']'
  career_goals: Randy intends to stay engaged through mentorship and community service, focusing on projects that combine his technical background with his compassionate nature. He aims to expand his volunteer
    tutoring program for high‑school STEM clubs, serve as an advisory member on the Raymore Planning Commission to guide practical, safety‑oriented infrastructure improvements, and write a handbook for
    seniors on simple home repairs. He also hopes to support his grandchildren's education by providing hands‑on STEM experiences, all while maintaining a flexible schedule that respects his desire for
    low‑stress, predictable routine.
