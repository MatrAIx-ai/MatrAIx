    (English/Spanish)'']'
  hobbies: '[''Street art exploration'', ''Mixed‑media collage making'', ''Salsa and folklórico dancing'', ''Cooking Mexican‑American fusion cuisine'', ''Hiking coastal trails'', ''Listening to innovation
    podcasts'', ''Mentoring local youth'']'
  career_goals: Lilia aims to advance to an Operations Manager role within the next five years, overseeing larger administrative units and spearheading digital transformation initiatives for her department.
    She plans to complete a bachelor's degree in Business Administration and earn the Certified Administrative Professional (CAP) credential to solidify her expertise. Long‑term, she envisions launching
    a consulting practice that helps small businesses in Compton streamline their office processes while integrating culturally resonant practices that honor her Mexican heritage.
