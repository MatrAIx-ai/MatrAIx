  career_goals: Although officially retired, Maria aims to complete a memoir that weaves together her family recipes, personal anecdotes, and the history of Towanda. She hopes to become a volunteer docent
    at the Bradford County Historical Society, sharing her knowledge with school groups. She also seeks to continue learning by attending watercolor classes at the senior center, exploring digital photography
    to document her garden, and leading a weekly storytelling circle for fellow seniors. Maintaining her independence and mental sharpness remains a central ambition.
