  hobbies: '[''LEGO Technic model building'', ''Reading science‑fiction and popular science books'', ''Playing competitive chess'', ''Scratch programming and animation projects'', ''Journaling and sketching
    for emotional regulation'', ''Solving logic puzzles (Sudoku, brain teasers)'', ''Watching educational YouTube channels (Vsauce, SciShow)'']'
  career_goals: He aspires to become a software or robotics engineer, motivated by the desire to design functional machines that solve real‑world problems. He plans to attend a specialized STEM high school
    in Fairfax County, earn top honors in math and science competitions, and eventually pursue a computer engineering degree. His competitive nature drives him to seek scholarships and internships that
    will validate his abilities, while his practical mindset pushes him toward projects that have tangible outcomes, such as building a functioning robot for a school exhibition. He also hopes to develop
    resilience strategies to manage his anxiety, aiming to turn emotional challenges into motivation for academic excellence.
