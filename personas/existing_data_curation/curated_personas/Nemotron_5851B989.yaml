personas:
  professional: Hoang Hoang is an aspiring young engineer who channels a meticulous, disciplined mindset into building complex LEGO Technic creations and coding interactive Scratch projects, constantly
    refining designs for optimal functionality while balancing curiosity with a practical, achievement‑driven approach.
  sports: Hoang Hoang plays in a local youth soccer team affiliated with the Northern Virginia Soccer Club, where they appreciate the regimented practice schedule and competitive environment, and they fervently
    support the Washington Capitals and D.C. United, often channeling their drive into after‑school treadmill runs and personal fitness challenges.
  arts: Hoang Hoang enjoys drawing sci‑fi scenes inspired by the works of Akira Toriyama and the animation style of Studio Ghibli, frequently listening to Imagine Dragons and Billie Eilish while coding
    Scratch projects, and they attend annual cultural center performances featuring traditional drum ensembles and classic folk dances.
  travel: Hoang Hoang prefers meticulously planned weekend trips, such as family visits to the National Air and Space Museum in Washington, D.C., and a recent vacation to Tokyo's high‑tech districts, while
    dreaming of a future road trip to the Grand Canyon to experience its vastness firsthand.
  culinary: Hoang Hoang enjoys helping prepare bánh chưng during Tet, mastering the art of layering sticky rice with mung beans and pork, while also craving pepperoni pizza and experimenting with simple
    ramen broth, showcasing a palate that blends savory noodles, aromatic herbs like cilantro, and sweet sticky rice.
  core: Hoang Hoang is a disciplined, curiosity‑driven 11‑year‑old who channels intense emotions into meticulous LEGO engineering, strategic chess, and thoughtful journaling, balancing high standards with
    a quiet, competitive spirit.
background:
  cultural: Hoang is a Vietnamese‑American growing up in Springfield, Virginia. At home, his family speaks Vietnamese and celebrates traditional holidays such as Tet, where he helps prepare dishes like
    bánh chưng and enjoys community gatherings at the local Vietnamese cultural center. His parents, who immigrated for better educational opportunities, emphasize academic achievement and respect for elders,
    reinforcing the disciplined, high‑standard mindset evident in his daily routine. While he participates in a Vietnamese weekend school that offers language and cultural lessons, he also engages with
    the broader multicultural environment of Fairfax County, attending a public middle school with diverse classmates and exploring American pop culture. This blend of Vietnamese family values and American
    school life shapes his worldview, giving him a strong sense of cultural heritage while encouraging curiosity about the wider world.
attributes:
  skills: '[''Advanced arithmetic'', ''Geometry problem solving'', ''Scratch programming (block‑based)'', ''Strategic chess play'', ''Project organization and time management'', ''Research and fact‑finding'',
