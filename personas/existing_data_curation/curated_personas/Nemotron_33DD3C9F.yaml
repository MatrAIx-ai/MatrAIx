personas:
  professional: Neha Taheri, a 38‑year‑old engineering technologist on Long Island, leverages meticulous CAD expertise and regulatory documentation skills to diagnose plant equipment issues while acting
    as the sociable bridge between engineers, vendors, and senior leadership, using her competitive drive to launch continuous‑improvement projects that align technical detail with clear business outcomes.
  sports: Neha Taheri embraces weekend hikes on Long Island trails like Bethpage and Montauk Point, supports the New York Islanders and New York Mets, participates in a local run‑club that meets for a 5K
    every Saturday, and treats her weekly Bollywood dance class as a high‑energy cardio workout that keeps her competitive spirit alive.
  arts: Neha Taheri channels her love for performance through Bollywood dance classes, where she idolizes choreographer Shiamak Davar and rehearses to A.R. Rahman’s soundtracks, frequently streams films
    starring Priyanka Chopra and attends off‑Broadway productions at the Long Island Theater Center, citing actor Lin‑Manuel Miranda’s lyrical storytelling as a source of inspiration for her own public
    speaking.
  travel: Neha Taheri balances meticulous trip planning with spontaneous getaways, having organized family vacations to Delhi and Jaipur to reconnect with culinary roots, solo yoga retreats in Bali, and
    quarterly weekend escapes to the Hamptons and the Adirondacks, while dreaming of a sustainable‑energy conference in Copenhagen that would merge her professional ambitions with travel.
  culinary: Neha Taheri is an adept home chef who crafts authentic biryani, butter chicken, and paneer tikka using whole spices such as cumin, coriander, and turmeric, often experimenting with regional
    variations like Goan fish curry, while occasionally ordering take‑out on nights when her CAD deadlines run late, a habit she jokes leads to extra calories but fuels her love for sharing meals at community
    gatherings.
  core: Neha Taheri is a detail‑oriented, talkative technologist who channels competitive ambition into plant‑level improvements, battles chronic worry with yoga, and sparks community joy through spicy
    Indian feasts and Bollywood dance.
background:
  cultural: Neha’s South Asian heritage is a central part of her identity; her parents emigrated from Gujarat, India, and instilled values of hard work, education, and family cohesion. Bilingual in English
    and Hindi, she celebrates Diwali, Holi, and regional festivals with the vibrant Indian community in Suffolk County. This cultural foundation shapes her emphasis on community service, respect for tradition,
    and a collaborative spirit, while her upbringing in the United States has fostered adaptability and an appreciation for diverse perspectives.
attributes:
  skills: '[''Technical troubleshooting'', ''CAD design (SolidWorks, AutoCAD)'', ''Project coordination'', ''Quality assurance & compliance'', ''Process improvement (Lean Six Sigma)'', ''Cost estimation
    and budgeting'', ''Vendor negotiation'', ''Data analysis with Excel and PowerBI'', ''Technical documentation'', ''Team training and mentorship'', ''Stakeholder communication'']'
  hobbies: '[''Cooking authentic Indian cuisine'', ''Bollywood dance classes'', ''Yoga and mindfulness practice'', ''Hiking on Long Island trails'', ''Reading business and technology books'', ''Volunteering
    in STEM outreach programs'', ''Attending professional networking events'']'
  career_goals: Neha aims to move from a senior technician role to engineering management within the next five years, targeting a Plant Manager or Operations Director position at a midsize manufacturing
    firm on Long Island. She plans to earn a PMP certification and a Master’s in Engineering Management to complement her business background. Her long‑term ambition is to lead a cross‑functional team that
    implements sustainable energy solutions, while also championing mentorship programs for women and underrepresented groups in STEM.
