personas:
  professional: A diligent retail stock associate, Tiffany Fox leverages her inventory‑management expertise and calm demeanor to keep store aisles orderly, while her penchant for structure fuels her goal
    of earning forklift certification and moving into a supervisory role, even though she sometimes misplaces a barcode scanner after a busy shift.
  sports: An enthusiastic supporter of local teams, Tiffany Fox rallies behind the San Antonio Spurs and follows San Antonio FC soccer matches, joins community softball leagues in the summer, hits the trails
    for weekly hill‑country hikes, and balances her love of activity with occasional couch‑potato sessions playing casual video games after a long day.
  arts: A devoted country‑pop aficionado, Tiffany Fox streams Luke Combs and Kacey Musgraves on repeat, attends live performances at the Tobin Center whenever possible, participates in Fiesta San Antonio’s
    music parades, and finds inspiration for journaling in the storytelling of Maren Morris’s ballads.
  travel: A weekend explorer with a love for Texas scenery, Tiffany Fox has road‑tripped to New Braunfels for river tubing, explored the artily streets of Austin’s South Congress, plans a future getaway
    to Santa Fe for its vibrant art scene, and prefers budget‑friendly hostels over luxury hotels, often using a travel‑planning spreadsheet on her phone.
  culinary: A budding Tex‑Mex home cook, Tiffany Fox whips up chicken fajitas with fresh cilantro and jalapeños, experiments with homemade guacamole using ripe avocados, perfects a quick beef enchilada
    casserole for friends, and never misses a chance to top everything with a squeeze of lime and a dash of queso fresco.
  core: Tiffany Fox is an organized yet relaxed 18‑year‑old who balances structured work ambitions with spontaneous hobbies, from stocking shelves to savoring country‑pop, all while navigating budget goals
    and occasional quirks like forgetting to charge her phone.
background:
  cultural: Tiffany comes from a white, Midwestern-American family that has lived in San Antonio for several generations. Growing up in Bexar County, she was exposed to the rich blend of Texan and Hispanic
    cultures that shape the city. Family gatherings feature barbecue, fried chicken, and Tex-Mex dishes like tacos and queso. She celebrates holidays such as Thanksgiving and Christmas and enjoys participating
    in local traditions like Fiesta San Antonio, where she appreciates the music, food, and community spirit. Her upbringing emphasized a strong work ethic, friendliness, and respect for diverse cultures,
    reflecting the values of the broader Texas community.
attributes:
  skills: '["inventory management", "stock organization", "order fulfillment", "barcode scanning", "point-of-sale operation", "teamwork", "communication", "conflict resolution", "safety compliance", "manual
