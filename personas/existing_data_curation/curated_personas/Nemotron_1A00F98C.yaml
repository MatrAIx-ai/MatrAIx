  career_goals: Tiffany aims to build on her experience as a stocker by obtaining a forklift certification and a certification in inventory control. She plans to enroll in community college to study business
    administration with a focus on supply chain management. Her short-term goal is to move into a supervisory role within a retail or warehouse environment, and her long-term ambition is to become a store
    manager or eventually open her own small boutique grocery shop that highlights locally sourced products.
