personas:
  professional: Jessica Pickens is a postsecondary instructor who crafts flexible, interdisciplinary curricula that weave watercolor painting, digital photography, and experiential learning, leveraging
    their curiosity and laid‑back planning style to mentor adult learners, resolve classroom conflicts, and chase grant opportunities for community‑based arts programs.
  sports: Jessica Pickens enjoys weekend hikes with the Hudson River Hiking Club, scaling the Palisades cliffs for sunrise views, follows the New York Knicks and New York Rangers for occasional game‑night
    camaraderie, and they balance the solitude of trail walking with sunrise yoga sessions at the community center to keep fit.
  arts: Jessica Pickens finds inspiration in painting Hudson River landscapes in watercolor, capturing them through black‑and‑white photography reminiscent of Ansel Adams, attending gallery openings that
    showcase contemporary artists like Julie Mehretu, and they savor off‑Broadway productions starring Lin‑Manuel Miranda, all of which feed into their interdisciplinary teaching.
  travel: Jessica Pickens prefers low‑key, flexible road trips that blend art festivals in Santa Fe, a weekend gallery crawl in London’s Shoreditch, and spontaneous kayak excursions on the Hudson, planning
    just enough to reserve boutique B&Bs while they leave room for impromptu sketch‑stopovers and local farm‑to‑table meals.
  culinary: Jessica Pickens is a confident home cook who experiments with miso‑glazed salmon tossed with fresh garden basil, beet and goat‑cheese salads drizzled with walnut vinaigrette, and hand‑stretched
    sourdough flatbreads topped with caramelized onions and thyme, and they treat each dish as a tactile extension of their watercolor brushwork.
  core: Jessica Pickens blends a curator’s eye with a gardener’s patience, turning everyday moments into art while they habitually misplace lecture notes in their garden tote.
background:
  cultural: Jessica is a White American who grew up in the suburban environment of Rockland County, New York, an area with deep Dutch and English colonial roots and a vibrant Hudson Valley arts scene. Her
    upbringing combined classic American family traditions with exposure to the cultural offerings of nearby New York City. This blend has fostered her appreciation for community, art, and lifelong learning,
    and informs her inclusive, flexible teaching style.
