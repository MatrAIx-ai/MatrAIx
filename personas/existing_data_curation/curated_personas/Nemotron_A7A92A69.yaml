  hobbies: '[''Watercolor painting'', ''Photography'', ''Reading contemporary fiction'', ''Hiking'', ''Yoga'', ''Crocheting'', ''Cooking'', ''Attending small gallery openings'', ''Local theater'', ''Community
    garden volunteering'']'
  career_goals: Jessica aims to expand her impact by developing a community‑based arts education program that partners the college with local galleries and cultural institutions. She aspires to become a
    department coordinator, mentor newer faculty, and publish a guide on integrating art into adult learning. Over the next five years she hopes to secure a grant to launch a “Living Arts” series of workshops
    and to complete a bachelor's degree in education to formalize her qualifications.
