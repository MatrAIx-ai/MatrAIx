personas:
  professional: Eric Serranocolon, a seasoned analog photo lab operator, blends meticulous chemical handling and quality‑control expertise with a steady, structure‑oriented work style, positioning themselves
    as a reliable candidate for senior lab technician and future boutique lab manager.
  sports: Eric Serranocolon hikes with the Los Angeles Hiking Club in Griffith Park foothills, tracks the Los Angeles Galaxy and LA Dodgers as their primary sports teams, and joins a local adult basketball
    league every Thursday, reflecting a balanced yet schedule‑driven approach to staying active.
  arts: Eric Serranocolon frequents acoustic‑focused venues like The Troubadour and The Echo, admires guitarists such as John Mayer and Rodrigo y Gabriela, curates a personal collection of black‑and‑white
    street photography inspired by Henri Cartier‑Bresson, and volunteers to teach youth photography, weaving artistic expression into both leisure and community service.
  travel: Eric Serranocolon prefers meticulously planned road trips that combine photography opportunities and culinary stops, having explored the historic streets of Oaxaca, the coastal cliffs of Big Sur,
    and the winter markets of Kyoto, while balancing family responsibilities that limit extended overseas stays.
  culinary: Eric Serranocolon cooks family recipes like tamales, mole, and pozole with confident skill, experiments with fresh corn masa, dried chilies, and chocolate, and enjoys occasional evenings at
    local taquerías where they relish street tacos al pastor with pineapple and cilantro.
  core: Eric Serranocolon channels a structured, methodical mindset into analog photography, disciplined finances, and community teaching, while indulging in late‑night guitar jams and occasional impulsive
    vintage camera splurges.
background:
  cultural: Eric was raised in a close‑knit Mexican‑American family in East Los Angeles. He grew up bilingual, speaking both Spanish and English at home, and participated in cultural celebrations such as
    Día de los Muertos and Mexican Independence Day. The values of hard work, family loyalty, and respect for tradition that his parents instilled continue to shape his worldview. At the same time, his
    daily life in the diverse urban environment of Los Angeles blends Mexican heritage with the broader multicultural influences of the city.
attributes:
  skills: '[''Black & white film development'', ''Color film processing'', ''Minilab printer operation'', ''Chemical solution mixing and safety'', ''Equipment troubleshooting and maintenance'', ''Quality
    control and color grading'', ''Digital scanning of negatives'', ''Adobe Photoshop basics'', ''Inventory and supply management'']'
  hobbies: '[''Street photography'', ''Mexican cooking'', ''Acoustic guitar'', ''Soccer watching'', ''Hiking'', ''Mechanical puzzles'', ''Community photography workshops'']'
  career_goals: Eric aims to advance from a machine operator to a senior lab technician, taking on supervisory responsibilities for a shift and mentoring newer staff. He plans to obtain a Certified Photo
    Lab Technician credential to formalize his expertise. In the longer term, he envisions managing a boutique photography lab that blends traditional analog processes with digital services, allowing him
    to shape workflow efficiencies while preserving the craft he values. His goals are practical and grounded, reflecting his preference for structured progress and reliable outcomes.
