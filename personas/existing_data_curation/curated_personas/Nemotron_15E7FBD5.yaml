  hobbies: '[''sketching'', ''digital illustration'', ''Minecraft building'', ''reading sci‑fi/fantasy novels'', ''listening to hip‑hop/jazz music'', ''school art club'', ''maker workshops at the library'',
    ''volunteering at community art sessions'', ''journaling'', ''mindfulness breathing'']'
  career_goals: Everett dreams of turning his love for art and technology into a career that lets him create visual stories that reach wide audiences. He envisions becoming a concept artist or digital illustrator
    for video games or animated films, where he can blend his drawing skills with his growing coding abilities to design characters and environments. He also hopes to develop his own indie game or graphic
    novel that reflects diverse perspectives, especially those of Black youth in the Midwest. Long‑term, he wants to lead a community art program in Springfield that mentors younger students and integrates
    art with STEM learning, giving back to his neighborhood while pursuing his creative passions.
