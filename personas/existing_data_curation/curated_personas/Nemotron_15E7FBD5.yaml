personas:
  professional: Everett Womack, a budding comic‑book illustrator and Minecraft architect in middle school, channels their curiosity and love for unconventional ideas into intricate sketchbooks and digital
    builds, balancing meticulous line work with spontaneous color experiments, and they often share finished pieces with classmates for feedback.
  sports: Everett Womack, a middle‑school soccer enthusiast who plays forward on the local youth league team and avidly follows the Los Angeles Galaxy, spends Saturday mornings at the community center’s
    indoor rock‑climbing wall, and uses fitness trackers to log short, high‑energy workouts that balance their love for creative pursuits, and they often challenge friends to mini‑matches after school.
  arts: Everett Womack, an aspiring illustrator, draws inspiration from comic legends like Jim Lee and Stan Lee, mixes contemporary hip‑hop beats from Kendrick Lamar with Miles Davis jazz and classic soul
    from Aretha Franklin while sketching pastel‑hued characters, showcases work at the school art club’s quarterly exhibit, and they frequently experiment with mixed media to push the boundaries of traditional
    comic art.
  travel: Everett Womack, a curious teen traveler, dreams of visiting Japan’s Akihabara district to explore anime culture, has already toured the Grand Canyon on a family road trip, prefers meticulously
    planned weekend getaways to local museums over spontaneous overnight camps, and they keep a scrapbook of travel tickets and postcards as a source of inspiration for their drawings.
  culinary: Everett Womack, a budding home chef, loves crafting neon‑colored avocado toast with lime zest, whipping up quick ramen bowls spiced with sriracha, and perfecting chocolate chip cookies for school
    bake sales, though they often neglect meal prep when a new comic release distracts them, and they enjoy sharing their culinary experiments with friends during after‑school hangouts.
  core: Everett Womack blends a vivid imagination with a penchant for worry, turning sketchbooks and Minecraft builds into safe outlets while they juggle school, art club, and the occasional over‑caffeinated
    late‑night comic binge.
background:
  cultural: Everett’s cultural background is rooted in his African‑American heritage and the Midwest environment of Springfield, Ohio. His family’s story includes ancestors who moved north during the Great
    Migration, bringing traditions of Southern gospel music, storytelling, and a strong sense of community that have been passed down through church gatherings and family celebrations. He grew up hearing
    the rhythm of gospel choirs at Sunday services and the lyrical flow of contemporary Black artists, which shape his musical taste. Local Black History Month events at his school and visits to the Ohio
    Black Cultural Center expose him to the artistic achievements of Black painters, musicians, and writers, inspiring his own creative aspirations. The blend of these cultural influences, combined with
    a supportive neighborhood that values education and artistic expression, fuels his desire to create work that reflects his identity and gives voice to his community.
