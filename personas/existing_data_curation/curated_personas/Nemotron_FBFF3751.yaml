  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Reading historical fiction'', ''Knitting'', ''Birdwatching'', ''Walking/hiking'', ''Volunteering at community center'', ''Participating
    in church activities'', ''Mentoring youth in STEM'', ''Attending cultural festivals'']'
  career_goals: Although retired, Bertha aims to leave a lasting impact on her town by expanding the junior STEM mentorship program she helped start at the Lone Wolf elementary school. She hopes to develop
    a bilingual science‑fair curriculum that celebrates Mexican contributions to engineering and mathematics. In the next few years she plans to spearhead a seed‑bank initiative for the community garden,
    promoting sustainable agriculture practices she learned from her engineering background. She also aspires to document family recipes and stories in a small cookbook that blends culinary heritage with
    reflections on resilience, intending to share it with future generations and local cultural festivals.
