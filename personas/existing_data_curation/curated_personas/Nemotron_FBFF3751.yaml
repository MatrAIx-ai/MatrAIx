personas:
  professional: Bertha Wences, a retired engineer turned community STEM mentor, blends her bilingual fluency, spreadsheet modeling, and hands-on problem solving to design accessible science workshops, and
    they bring gentle, practical compassion to every mentorship session.
  sports: Bertha Wences enjoys gentle morning walks on the Kiowa County trails with the Lone Wolf Senior Hiking Club, cheering on the Oklahoma City Thunder during basketball season and rooting for the Dallas
    Cowboys each fall, and they find that tending her garden serves as low-impact cardio.
  arts: Bertha Wences finds solace in knitting while listening to Vicente Fernandez and Celia Cruz, often rehearsing traditional folk dances to music by Los Lobos during community festivals, and they admire
    the vibrant paintings of Frida Kahlo and the storytelling of Isabel Allende.
  travel: Bertha Wences prefers relaxed, culturally immersive road trips, having driven the historic Route 66 to explore Santa Fe's art districts and the vineyards of Napa, and they dream of visiting the
    ancient ruins of Oaxaca to trace the recipes shared by their grandparents.
  culinary: Bertha Wences, an accomplished home cook, delights in hand-rolling tamales stuffed with pork and masa nixtamalized from heirloom corn, simmering rich mole with chilhuacle peppers and chocolate,
    and sipping atole flavored with vanilla and cinnamon, while they experiment with native herbs like epazote from their garden in everyday dishes.
  core: Bertha Wences combines a gentle, curiosity-driven mind with a practical, garden-rooted lifestyle, effortlessly bridging generations through bilingual STEM mentorship, and they habitually misplace
    their reading glasses on the kitchen counter.
background:
  cultural: Bertha was born to Mexican immigrant parents who settled in Oklahoma during the 1970s. She grew up bilingual, celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day alongside
    the local Kiowa and Western Oklahoma traditions. Her family’s recipes and storytelling have preserved a strong sense of Mexican identity, while her community involvement has woven her into the multicultural
    fabric of Lone Wolf. She regularly attends the town’s annual rodeo and the Kiowa County cultural fair, bringing her Mexican folk music and dance to the events. Her Catholic faith, intertwined with community
    service, reflects both her heritage and the rural Oklahoma context, shaping a worldview that values family, harmony, and mutual support.
