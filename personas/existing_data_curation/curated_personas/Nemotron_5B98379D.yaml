personas:
  professional: Armando Bernabe, a retired construction and automotive repair specialist, now channels their woodworking, engine‑troubleshooting, and bilingual communication skills into volunteer tutoring
    and cooking workshops at a community center, applying a relaxed, curiosity‑driven mindset to teach without rigid scheduling.
  sports: Armando Bernabe, a member of the Sun Valley Senior Walking Club, keeps fit through daily forest walks and occasional senior softball games, while they root for the Los Angeles Dodgers in baseball
    and the LA Galaxy in soccer during the respective seasons.
  arts: Armando Bernabe immerses themselves in folk‑art, drawing inspiration from the vibrant murals of Diego Rivera and the intimate portraits of Frida Kahlo, while listening to Mariachi Vargas de Tecalitlán
    and studying the black‑and‑white photography of Dorothea Lange, which informs their own digital landscape compositions.
  travel: Armando Bernabe prefers reflective, low‑key travel, having recently visited Oaxaca, Mexico to reconnect with family stories, dreaming of photographing the historic streets of Guanajuato and the
    canyons of Zion National Park, while they budget each trip around a modest retirement income.
  culinary: Armando Bernabe is an adept home chef, delighting in preparing traditional dishes such as chiles en nogada, pozole, and mole poblano, skillfully layering flavors with epazote, ancho chilies,
    roasted cumin, and fresh heirloom tomatoes from their garden while they experiment with cilantro‑infused sauces.
  core: Armando Bernabe is a solitary, curiosity‑driven retiree who blends hands‑on craftsmanship with cultural storytelling, juggling a love of gardening, folk‑art, and cooking while they occasionally
    forget appointments and splurge on heirloom seeds.
background:
  cultural: Armando was born in the town of Xalapa, Veracruz, Mexico, where he grew up surrounded by vibrant festivals, Catholic traditions, and a close-knit family network. He emigrated to the United States
    in his early thirties, eventually settling in Springfield, Kentucky after marrying his long-time partner, a native Kentuckian. While he has embraced the rhythms of rural Appalachian life, participating
    in local fairs, enjoying Southern hospitality, and adapting to the region's climate, he maintains a strong connection to his Mexican heritage. He celebrates Dia de los Muertos and Las Posadas, prepares
    authentic dishes such as mole and tamales, and keeps his native Spanish alive at home. His bicultural experience informs his worldview, allowing him to bridge Mexican and American customs in both family
    gatherings and community involvement.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Automotive and small-engine repair'', ''Woodworking and carpentry'', ''Home maintenance and DIY repairs'', ''Traditional Mexican cooking'', ''Basic
