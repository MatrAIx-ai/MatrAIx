  hobbies: '[''Reading art history and folklore books'', ''Watercolor sketching and painting'', ''Nature walks and birdwatching'', ''Gardening (herbs, vegetables, heirloom tomatoes)'', ''Cooking traditional
    Mexican meals'', ''Listening to mariachi and folk music'', ''Digital photography of local scenery'', ''Writing memoir entries and journal reflections'']'
  career_goals: In retirement, Armando aims to channel his practical knowledge and cultural heritage into community-focused projects. He hopes to volunteer as a Spanish-language tutor and cooking instructor
    at the local community center, preserve his family's stories in a written memoir, and establish a modest garden that showcases heirloom Mexican vegetables. He also aspires to learn watercolor painting
    and experiment with digital art, eventually curating a small exhibition of his work and folk-art collection to share with neighbors and younger generations. Travel to his hometown in Mexico and documenting
    that journey is another long-term ambition.
