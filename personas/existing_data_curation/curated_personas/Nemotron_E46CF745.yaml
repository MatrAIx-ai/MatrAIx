  hobbies: '[''watercolor painting'', ''sketching'', ''visiting art galleries'', ''community theater attendance'', ''gardening (native wildflowers)'', ''hiking on the Carolina Thread Trail'', ''listening
    to folk/blues podcasts'', ''reading eclectic literature'', ''crocheting'', ''cooking Southern cuisine'', ''volunteering at the local library'']'
  career_goals: Sophia hopes to move beyond the cash register by taking on a supervisory role, such as shift lead or assistant manager, where she can mentor newer employees and shape store policies. She
    also dreams of integrating her love of art into her work, perhaps by curating rotating local-artist displays within the store or launching a small boutique that sells handmade crafts and regional artwork.
    To support these ambitions, she plans to complete a bachelor’s degree in arts administration through evening classes at a community college. Ultimately, she wants a position that blends stable income
    with creative expression, while also allowing her the flexibility to care for her grandchildren and maintain a balanced personal life.
