personas:
  professional: Sophia Finley is a seasoned retail cashier who uses her strong cash‑handling and point‑of‑sale expertise to deliver courteous, personalized service while improvising practical solutions
    during rushes and quietly dreaming of curating rotating local‑artist displays and stepping into a shift‑lead role.
  sports: Sophia Finley enjoys regular walks along the Carolina Thread Trail, participates in the local “Thread Trail Ramblers” walking club, roots for the Charlotte Hornets and Carolina Panthers, and occasionally
    joins a community softball league in the spring, using these activities as low‑key ways to stay fit and socially connected.
  arts: Sophia Finley paints watercolors of historic Charlotte streets, sketches everyday scenes, volunteers at community theater productions, crochets small accessories, listens to folk and blues podcasts
    featuring Bob Dylan and Mavis Staples, and finds inspiration in the literary worlds of Virginia Woolf and N.K. Jemisin.
  travel: Sophia Finley prefers low‑key weekend getaways that blend art and history, having explored Asheville’s art galleries, wandered the historic districts of Charleston and Savannah, trekked the Great
    Smoky Mountains, and she dreams of visiting Santa Fe for its vibrant folk‑music festival while balancing visits with her grandchildren’s schedules.
  culinary: Sophia Finley enjoys experimenting with Southern recipes such as shrimp and grits, fried green tomatoes, and collard greens, uses ingredients like okra, sweet potatoes, and fresh herbs from
    her garden, and cooks at a comfortable skill level that balances home‑cooked meals for family with occasional outings to local farm‑to‑table restaurants.
  core: Sophia Finley blends quiet curiosity with spontaneous problem‑solving, nurturing art, gardens, and grandchildren while occasionally letting deadlines slip in pursuit of creative fulfillment.
background:
  cultural: Sophia is a white American whose family lineage traces back to English and Irish ancestors who settled in the Appalachian foothills of North Carolina in the early 1900s. Raised in a small town
    near Waxhaw, she grew up with the Southern values of hospitality, community involvement, and a strong connection to the land. Church gatherings, county fairs, and local crafts fairs have shaped her
    appreciation for regional traditions and folk art. As a widowed mother of adult children, she now lives in Waxhaw, Union County, where she supports a close‑knit circle of friends and family. Her cultural
    identity blends a respect for Southern heritage with an openness to new artistic ideas and experiences.
