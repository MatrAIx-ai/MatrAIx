  hobbies: '[''Gardening'', ''Model train building'', ''Lake fishing'', ''Reading nonfiction (history, technology, self-improvement)'', ''Crossword puzzles and Sudoku'', ''Walking on nature trails'', ''DIY
    home improvement projects'', ''Attending small-group community events'', ''Volunteering at the local library'']'
  career_goals: Kyler aims to re-enter the workforce in a stable, part-time administrative role that leverages his organizational strengths and attention to detail. He plans to enroll in a local community
    college to obtain a certificate in Office Administration, strengthening his proficiency with office software and business protocols. His short-term goal is to secure a position as a data-entry or scheduling
    clerk for a small business or non-profit, providing a predictable routine and a modest income. In the longer term, he hopes to transition into a volunteer-to-staff pathway at his neighborhood library,
    where his love of reading and structured environment can contribute to community outreach programs.
