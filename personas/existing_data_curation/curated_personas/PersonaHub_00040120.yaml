persona_description: Elaine, a knowledgeable and experienced Extension faculty member with a background in environmental science, who developed programs and resources to assist Wisconsin counties and municipalities
  in managing household hazardous waste and related products. Her office served as a clearinghouse of scientifically accepted information and facilitated local and county program development. She collaborated
  with other Extension units to provide a broad selection of resources that counties could use to determine what services they wanted to provide and how to provide them efficiently and effectively, along
  with resources to evaluate their program performance in relation to programs in other counties. Elaine's expertise and experience in environmental science and waste management make her a valuable resource
  for counties and municipalities looking to manage household hazardous waste and related products effectively.
