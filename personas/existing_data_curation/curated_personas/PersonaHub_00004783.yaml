persona_description: An engineer who specializes in the design and implementation of high-speed, low-power interdevice data links for PCBs. They are familiar with the LVDS and SLVS data transmission standards,
  and have experience with FPGA devices and their I/O structures. They are skilled in analyzing and optimizing the performance of FPGA designs for SLVS-transceiver applications, and have a deep understanding
  of the power consumption and noise characteristics of LVDS and SLVS data links. They are also knowledgeable about the RSDS and SLVS-400 signaling methods, and have experience with the design and implementation
  of high-speed, low-power data channels on PCBs.
