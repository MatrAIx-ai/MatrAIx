persona_description: A scientist or researcher who is interested in the study of chemical signals in plants and the impact of these signals on the stability and function of plant communities in ecosystems.
  They are likely to be familiar with the field of ecochemistry and ecological biochemistry, and have a keen interest in understanding how chemical mediators, such as allelopathic information signals, influence
  the structure and function of plant communities. They may also be aware of the potential for these signals to be altered by the presence of synthetic chemicals in industrialized societies.
