personas:
  professional: Casio Rogers is a budding game developer who spends evenings crafting simple Scratch animations and multiplayer mods, channeling their curiosity for new ideas with a practical knack for
    debugging, yet often misses school deadlines because they prefer spontaneous coding sessions over structured homework.
  sports: Casio Rogers loves playing pick‑up basketball at the community center and weekend soccer matches with friends, follows the Los Angeles Lakers and the US Men's National Soccer Team for inspiration,
    and belongs to the local youth basketball league and the Midtown Soccer Club, where they channel their energetic, sociable nature onto the court and field.
  arts: Casio Rogers blends a love for hip‑hop and R&B—streaming artists like Kendrick Lamar, Beyoncé, and SZA—while creating LEGO sculptures and Scratch animations, and captures the countryside with a
    smartphone, an eclectic mix that satisfies their curiosity for new media and their practical eye for detail, and they often share their creations online.
  travel: Casio Rogers dreams of biking through the scenic trails of Banff National Park and exploring Tokyo’s gaming arcades after school trips to the city’s science museum, preferring spontaneous weekend
    getaways over meticulously planned vacations, yet their budget constraints keep most adventures within nearby state parks, and they sometimes map out bike trails on a free app before heading out.
  culinary: Casio Rogers enjoys pepperoni pizza, chicken nuggets, and homemade mac and cheese, often experimenting with simple sauces using oregano and garlic while binge‑watching cooking videos, and they
    occasionally attempt a fruit‑smoothie with banana and spinach after a bike ride.
  core: Casio Rogers is a socially‑charged 13‑year‑old who fuses spontaneous creativity in gaming and LEGO with a practical streak for project completion, yet they habitually battle disorganization and
    late‑night screen time.
background:
  cultural: Raised in an African‑American family in the small town of Bronson, Michigan, Casio’s cultural background blends the rich traditions of Black heritage with the close‑knit community values of
    the Midwest. Family gatherings often feature soulful music, storytelling, and home‑cooked meals that reinforce his sense of identity. The local Baptist church serves as a central hub, providing worship,
    choir participation, and youth programs that nurture leadership and service. While the town’s population is primarily white, his family celebrates Black cultural milestones such as Juneteenth and encourages
    pride in his roots, fostering a balanced appreciation of both his heritage and the broader community.
