  career_goals: Casio aspires to merge his love of technology with his desire to help his community. He dreams of studying engineering or computer science in high school and college, eventually designing
    practical inventions or software that improve everyday life in small towns like Bronson. He also envisions mentoring younger students through after‑school tech clubs, combining his leadership skills
    with his passion for hands‑on problem solving.
