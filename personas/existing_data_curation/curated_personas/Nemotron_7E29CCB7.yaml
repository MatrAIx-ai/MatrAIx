  career_goals: Manuel aims to re‑enter the workforce in a stable, structured role that leverages his practical talents. He plans to obtain a certified electrician credential within the next year and launch
    a modest handyman business that offers reliable, predictable services to local homeowners. Long‑term, he hopes to achieve financial security for his family, develop stronger organizational habits, and
    eventually expand his venture into a small team that can handle larger renovation projects.
