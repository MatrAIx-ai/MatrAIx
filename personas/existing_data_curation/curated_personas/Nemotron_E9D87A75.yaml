  career_goals: Jennifer aims to turn her household expertise into a modest, flexible income stream. She plans to complete a local community‑college certificate in bookkeeping or personal finance within
    the next year, enabling her to offer freelance bookkeeping services to small businesses in the Milwaukee area. Simultaneously, she hopes to expand her home‑based baking hobby into a weekend catering
    side‑business for neighborhood gatherings, leveraging her cooking skills and love of organized preparation. In the longer term, she envisions a part‑time role in a senior‑care facility, using a Certified
    Nursing Assistant (CNA) credential to provide reliable care while preserving a predictable schedule that reduces her worry about financial stability.
