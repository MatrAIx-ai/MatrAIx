  hobbies: '[''Gardening'', ''Baking and cooking'', ''Reading (historical fiction, self‑help)'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Knitting and quilting'', ''Woodworking'', ''Nature walks'',
