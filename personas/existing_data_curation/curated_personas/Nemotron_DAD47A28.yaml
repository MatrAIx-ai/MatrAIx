personas:
  professional: Jan Martin is a hands‑on maintenance professional who mixes electrical, plumbing, carpentry, and HVAC expertise with a vivid imagination, turning routine repairs into artful, ergonomic upgrades,
    while their spontaneous nature drives creative problem‑solving yet sometimes clashes with the strict deadlines needed to climb toward a lead supervisor role.
  sports: Jan Martin hikes the rolling trails of Van Buren County in spring and fall, cycles with the Van Buren County Cycling Club during summer, and rallies behind the Detroit Lions, Tigers, and Pistons
    on game nights, preferring spontaneous outdoor workouts over regimented gym routines.
  arts: Jan Martin channels an abstract sensibility inspired by Jackson Pollock and Wassily Kandinsky into weekend canvases, drafts furniture sketches echoing Charles Eames, fuels improvisational energy
    at local theater workshops reminiscent of The Second City, and unwinds with speculative novels by Octavia Butler while listening to Flying Lotus’s experimental beats.
  travel: Jan Martin embarks on spur‑of‑the‑moment road trips to Michigan’s Upper Peninsula, has already explored Chicago and Mackinac Island, dreams of hiking Iceland’s volcanic landscapes and soaking
    in Japan’s tech‑infused culture, and balances these wanderlust drives with a tight budget earmarked for launching a renovation business.
  culinary: Jan Martin cooks at an inventive intermediate level, frequently preparing a roasted beet and goat‑cheese salad drizzled with balsamic reduction, spicing dishes with turmeric and smoked paprika,
    crafting matcha‑infused smoothies, and rewarding themselves with visits to local craft breweries for hop‑forward IPAs.
  core: Jan Martin lives at the crossroads of hands‑on engineering and vibrant artistry, channeling spontaneous creativity into every project while battling a perpetual worry and a habit of letting deadlines
    slip.
background:
  cultural: Jan Beth grew up in a small Midwestern town in Michigan, raised in a family of German‑Polish descent that values hard work, practicality, and community involvement. The region’s Protestant‑based
    cultural norms emphasized self‑reliance and neighborly support, while her exposure to college courses, online media, and regional arts festivals broadened her perspective, fostering a blend of traditional
    Midwestern sensibility with a curiosity for artistic novelty and technological innovation.
attributes:
  skills: '[''Electrical troubleshooting'', ''Plumbing repair'', ''Basic carpentry'', ''HVAC maintenance'', ''Creative problem solving'', ''Customer service communication'', ''Safety compliance'', ''Smart‑home
