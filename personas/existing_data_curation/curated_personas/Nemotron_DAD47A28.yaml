  hobbies: '[''Painting'', ''Sketching'', ''DIY furniture building'', ''Community theater improv'', ''Hiking'', ''Cycling'', ''Reading speculative fiction'', ''Arduino/Raspberry Pi tinkering'']'
  career_goals: Jan Beth aims to become a lead maintenance supervisor within the next five years, obtaining an electrician’s license and EPA certification to broaden her technical authority. She envisions
    eventually launching a boutique renovation business that merges her technical proficiency with her artistic flair, offering custom, environmentally‑friendly home upgrades. Additionally, she hopes to
    mentor younger tradespeople, sharing both practical skills and her passion for innovative, design‑oriented solutions.
