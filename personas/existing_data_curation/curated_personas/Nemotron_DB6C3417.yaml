  career_goals: Thomas aims to transition into a part‑time senior sales consultant role, focusing on mentorship and strategic advisory for emerging sales professionals. He hopes to lead a regional sales
    training program that integrates unconventional sales approaches drawn from his artistic interests. Over the next few years, he wants to earn recognized certifications (e.g., Certified Professional
    Sales Leader) and contribute to his company's expansion into new market segments, particularly those that serve the creative and design industries.
