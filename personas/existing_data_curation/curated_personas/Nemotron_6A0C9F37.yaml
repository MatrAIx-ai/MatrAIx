  career_goals: Josue aims to ascend to a senior leadership role, such as Director of Aerospace Engineering or Principal Engineer, where he can steer next‑generation propulsion projects focused on sustainability
    and electric thrust. He is motivated to secure patents for innovative engine designs, become a recognized thought leader at industry conferences, and influence aerospace policy. Additionally, he aspires
    to mentor emerging Hispanic engineers, champion diversity in STEM, and balance his career ambitions with a flexible schedule that supports his family's well‑being.
