personas:
  professional: Josue Salcedo is a seasoned aerospace engineer who leverages deep expertise in propulsion system design, fluid dynamics, and high‑fidelity computational simulations, coupling a methodical
    risk‑assessment mindset with a charismatic, talkative style that turns complex technical briefs into engaging presentations, while their competitive streak drives them to champion innovative, sustainable
    electric thrust projects and pursue senior leadership.
  sports: Josue Salcedo rides the Pacific swell at La Jolla on weekends, dominates the local beach‑volleyball league at the Pacific Beach courts, hikes the Torrey Pines trails for cardio, and loyally cheers
    for the San Diego Padres and the LA Lakers, while balancing a casual gym routine that favors functional training over strict schedules.
  arts: Josue Salcedo lights up salsa nights at downtown Latin clubs, spinning to the rhythms of Marc Antony and Celia Cruz, while unwinding with science‑fiction novels by Neal Stephenson and rewatching
    the classic Blade Runner, and occasionally catching live performances at the La Jolla Playhouse.
  travel: Josue Salcedo alternates between spontaneous weekend road trips along the Pacific Coast Highway, a recent getaway to a Caribbean island for family bonding, and annual pilgrimages to aerospace
    conferences in Houston and Seattle, balancing a love for adventure with a family‑friendly schedule that favors short stays over extended vacations.
  culinary: Josue Salcedo is a passionate home chef who masterfully prepares arroz con gandules, pernil, and crispy plantain fritters using sofrito and adobo, while also experimenting with fresh fish tacos
    from San Diego’s fish markets, often pairing meals with a crisp Sauvignon Blanc and occasionally ordering sushi for a quick night out.
  core: Josue Salcedo blends a structured engineering mind with a laid‑back love of surf, salsa, and daring drone races, turning competitive drive into mentorship while occasionally letting disorganization
    sneak into their calendar.
background:
  cultural: Josue was raised in a bilingual Puerto Rican household, speaking both Spanish and English fluently. He maintains close ties to his island heritage through family traditions, celebrating events
    such as Día de la Constitución and San Sebastián, and sharing Puerto Rican music, food, and stories with his colleagues. Active in San Diego's vibrant Puerto Rican community, he participates in cultural
    festivals, collaborates with local Latino professional groups, and often brings a festive, communal spirit to social gatherings.
