  hobbies: '[''Surfing'', ''Beach volleyball'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Aerospace conferences'', ''STEM mentorship'', ''Science-fiction reading'', ''Hiking'', ''Drone building'',
