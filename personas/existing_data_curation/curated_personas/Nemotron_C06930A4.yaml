personas:
  professional: Eva Camargo is a front‑of‑house specialist at a high‑tempo fast‑food outlet, where their bilingual fluency, rapid order‑taking, and self‑taught graphic‑design flair help craft eye‑catching
    menu displays, yet their spontaneous, structure‑averse streak often leads to missed scheduling deadlines.
  sports: Eva Camargo enjoys weekend hikes in the Texas Hill Country, follows the San Antonio Spurs for basketball thrills, attends local yoga sessions at a community studio, and occasionally joins a weekend
    cycling club that rides the Loop Trail.
  arts: Eva Camargo immerses themselves in watercolor painting inspired by the vibrant street murals of their city, draws creative energy from the works of Banksy and Shepard Fairey, and frequents open‑mic
    nights where spoken‑word poets like Sarah Kay perform, while also curating evenings at galleries featuring artists whose work celebrates ancestral storytelling.
  travel: Eva Camargo favors spontaneous road trips, having explored the desert landscapes of New Mexico, the wine country of Texas Hill Country, and a weekend getaway to Asheville, North Carolina, yet
    dreams of a culinary pilgrimage to the patisserie capital of Lyon to study traditional dessert techniques.
  culinary: Eva Camargo blends traditional family recipes with modern twists, crafting spiced corn cakes topped with hibiscus glaze and matcha‑infused churros, often experimenting with ingredients like
    cacao nibs, lavender, and fresh cilantro after watching Chef John's tutorials on YouTube.
  core: Eva Camargo is a curious, art‑driven culinary enthusiast who balances front‑of‑house hustle with spontaneous kitchen experiments, battles chronic worry through journaling, and channels their reserved
    nature into vibrant watercolor creations.
background:
  cultural: Eva grew up in a Mexican‑American household steeped in the traditions of her family's Mexican roots while embracing the multicultural tapestry of San Antonio. She speaks Spanish fluently at
    home, celebrating Día de los Muertos and other national holidays with family gatherings that feature homemade tamales and papel picado decorations. The city's rich Mexican heritage influences her palate,
    artistic sensibilities, and community values. Eva participates in local cultural festivals, supports neighborhood taquerías, and often volunteers at community centers that offer art and cooking workshops
    for youth, reflecting her commitment to preserving and sharing her cultural legacy.
attributes:
