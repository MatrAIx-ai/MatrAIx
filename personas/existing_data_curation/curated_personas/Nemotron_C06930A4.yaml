  hobbies: '[''sketching'', ''watercolor painting'', ''visiting art galleries'', ''attending open‑mic poetry nights'', ''experimenting with Mexican recipes'', ''watching cooking tutorials'', ''listening
    to indie folk music'', ''hiking in hill country'', ''journaling'']'
  career_goals: Eva aspires to transition from fast‑food service to a role that blends her love for food and art, such as becoming a pastry chef or a culinary artist at a boutique café. She is considering
    enrolling in a community college culinary program while continuing to work part‑time to gain formal credentials. In the longer term, she hopes to open a small, community‑focused eatery in San Antonio
    that showcases Mexican-inspired desserts and hosts art workshops, creating a welcoming space for her friends and local residents. Her ambition is also to develop a modest online presence where she can
    share her recipe experiments and visual designs, eventually monetizing her creative side.
