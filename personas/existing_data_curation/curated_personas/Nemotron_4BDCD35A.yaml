personas:
  professional: Mark Perdue, an 18‑year‑old communications enthusiast, leverages their methodical planning, public‑speaking confidence, and budding HTML/CSS skills to coordinate campus marketing projects
    while charming teammates with their talkative charisma.
  sports: Mark Perdue, an 18‑year‑old basketball enthusiast, dribbles at the San Bernardino Community Center, cheers for the Los Angeles Lakers and Cal State San Bernardino Coyotes, hikes the San Bernardino
    National Forest with the local Trailblazers Club, and maintains a casual membership in a weekend pick‑up soccer league, where they often organize team line‑ups.
  arts: Mark Perdue, an 18‑year‑old culture‑curious socialite, frequents live concerts ranging from indie rock acts like Tame Impala to hip‑hop performances by Kendrick Lamar, curates photography portfolios
    inspired by Ansel Adams, and engages their Twitch audience with lively commentary while streaming games featuring titles such as Fortnite and Apex Legends.
  travel: Mark Perdue, an 18‑year‑old adventure‑seeking student, has road‑tripped to the Grand Canyon and Las Vegas, spent a weekend backpacking in Big Bear Lake, and dreams of exploring Tokyo’s food markets
    and hiking Patagonia’s Torres del Paine after graduation, all while they map each journey in a travel journal.
  culinary: Mark Perdue, an 18‑year‑old culinary experimenter, whips up Korean bibimbap with gochujang, Mexican tacos al pastor seasoned with pineapple, and Japanese ramen broth infused with miso, while
    they polish their skillet skills on Instagram reels and swap recipes on Discord foodie groups.
  core: Mark Perdue, an 18‑year‑old social dynamo who blends meticulous planning with spontaneous streaming marathons, constantly juggles basketball drills, global cooking experiments, and a budding marketing
    career, all while they keep a sticky‑note wall of ideas plastered across their bedroom.
background:
  cultural: Mark is a White American raised in Corona, California, a suburb of Riverside County known for its cultural diversity. His family’s roots trace back to the Midwest, and they instilled traditional
    middle‑class values of hard work, community involvement, and respect for education. Growing up in a city with a strong Hispanic presence, Mark has been exposed to a mix of cultural foods, festivals,
    and bilingual social circles, which he enjoys. He celebrates typical American holidays such as Thanksgiving and the Fourth of July, and also participates in community events like the Corona Summer Festival,
    reflecting a blend of mainstream and local influences.
