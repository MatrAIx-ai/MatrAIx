persona_description: A microbiologist who is interested in the use of blood agar for the isolation, identification, and antimicrobial susceptibility testing of Streptococci. They are familiar with the properties
  of hemolysis and its importance in the identification of Streptococci. They also have knowledge of the various types of hemolysis produced by Streptococci and their clinical significance. They are interested
  in the use of blood agar for the detection of Streptococci in blood cultures and for the identification of Streptococci in the laboratory. They may also be interested in the use of blood agar in other
  applications, such as the detection of other bacteria and the detection of other pathogens.
