persona_description: A historian who is interested in the history of Bavaria and the struggle between the Papacy and the Empire, particularly the works of Aventinus, the author of the Annales Boiorum and
  the Bayersche Chronik. They are also familiar with the works of other historians and scholars who have contributed to the study of history, particularly those who have adopted the reformed faith and sympathized
  with the reformers. They are interested in the modern scientific method of writing history and have a strong appreciation for the work of Aventinus, who is often referred to as the "Bavarian Herodotus".
  They are also interested in the works of other authors who have written on the history of Bavaria, particularly those who have written on the period from the earliest times to 1460.
