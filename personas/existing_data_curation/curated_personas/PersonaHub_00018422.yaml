persona_description: A historian who specializes in the history of the Catholic Church and the development of the Diocese of Chicago, with a particular focus on the history of the Saint Damian School and
  the parish of Oak Forest. He has a deep understanding of the cultural, social, and religious changes that have shaped the community and the development of the school over the past several decades. He
  is also knowledgeable about the lives and works of the twin saints, Cosmas and Damian, and their significance in the history of medicine and the Catholic Church. He has a passion for sharing his knowledge
  and insights with others and is always eager to learn more about the rich history of the community.
