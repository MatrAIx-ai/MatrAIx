persona_description: A scientist who conducts research on the development and evaluation of alternative methods for monitoring vital signs in animals, specifically focusing on the use of infrared imaging
  (IR) thermography as a safer and less stressful alternative to rectal temperature (RT) in pigs. The scientist has expertise in the field of animal physiology, animal behavior, and animal health, and is
  particularly interested in the effects of stress on animal health and the potential for alternative methods to improve animal welfare. The scientist is likely to be interested in the statistical analysis
  of data collected using IR thermography and the development of predictive models for monitoring animal health.
