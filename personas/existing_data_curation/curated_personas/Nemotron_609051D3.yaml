  hobbies: '[''gardening'', ''farm-to-table cooking'', ''book club participation'', ''bridge'', ''senior center dance classes'', ''volunteering at library reading program'', ''hiking'', ''bird‑watching'',
    ''quilting'', ''participating in local festivals'']'
  career_goals: Although retired from formal employment, Miriam aims to deepen her impact in Oshkosh by taking on larger leadership roles within community organizations. She plans to spearhead the annual
    Summer Fest, mentor younger volunteers, and secure a seat on the board of the local historical society. Aware of her competitive nature, she sets measurable fundraising goals and seeks certification
    in community health outreach to better serve seniors. Miriam also wishes to author a memoir that captures her Midwestern upbringing and to advocate for mental‑health resources and senior‑friendly city
    policies, turning her natural skepticism into constructive civic engagement.
