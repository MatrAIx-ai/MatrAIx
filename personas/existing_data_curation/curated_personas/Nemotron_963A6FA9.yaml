  career_goals: Although Elana is no longer in formal employment, she sets purposeful goals that align with her desire to give back and stay engaged. She aims to become the volunteer coordinator for the
    local senior‑center, using her organizational talent to create a predictable schedule of activities that foster connection. She plans to complete a certified caregiver training program to formalize
    the skills she has already practiced, allowing her to offer trusted support to widowed neighbors. Elana also hopes to launch a community‑garden mentorship program, teaching younger residents how to
    grow and maintain garden plots. A personal ambition is to compile a small cookbook that intertwines family recipes with the stories behind them, preserving cultural heritage for future generations.
    These goals reflect her commitment to practical, tangible contributions that reinforce the routines and relationships she values.
