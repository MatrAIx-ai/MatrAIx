  career_goals: Jean aims to secure tenure at her institution while launching a new interdisciplinary program that connects literature, digital humanities, and regional cultural studies. She is committed
    to publishing a monograph on American colonial narratives and obtaining a major grant from the NEH to support campus-community research collaborations. Over the next five years she hopes to assume a
    leadership role, such as department chair or program director, to influence curriculum policy and mentor junior faculty. She also envisions expanding outreach initiatives with Connecticut historical
    societies, creating service‑learning opportunities for students, and maintaining a balanced work‑life schedule that allows time for her family and personal interests.
