personas:
  professional: Jean Day, an experienced postsecondary humanities educator at a Connecticut college, blends structured curriculum design with flexible digital media integration, using their meticulous project
    management and public speaking skills to launch interdisciplinary programs that link literature, colonial history, and community partnerships while navigating the tenure track with assertive yet collaborative
    leadership.
  sports: Jean Day, a dedicated coastal-trail hiker and member of the Norwich Walking Club, supports the New England Patriots, the Boston Red Sox, and the Hartford Yard Goats, and participates in a seasonal
    adult softball league, balancing structured cardio hikes with occasional yoga sessions for flexibility.
  arts: Jean Day, a community-theater enthusiast who writes poetry and essays for regional literary journals, regularly stages Shakespearean monologues with the local drama group, draws inspiration from
    poets like Emily Dickinson and Maya Angelou, admires the photography of Ansel Adams, and enjoys the folk-rock sound of Sufjan Stevens during creative writing retreats.
  travel: Jean Day, an avid road-trip planner, delights in meticulously mapped coastal drives through New England, recently exploring Acadia National Park and historic Williamsburg, and dreams of a semester-long
    research sabbatical in colonial-era Boston, balancing budget-conscious travel with occasional splurges on boutique B&B stays.
  culinary: Jean Day, a proficient home cook who harvests heirloom tomatoes and fresh basil from their Norwich garden, regularly prepares New England clam chowder, roasted vegetable ratatouille, and apple-cinnamon
    crumble, and favors ingredients like rosemary, thyme, and locally sourced maple syrup, while occasionally treating themselves to a lobster roll at a seaside café.
  core: Jean Day, a structured yet adaptable humanities professor, balances tenure ambitions, garden devotion, and creative pursuits, all while navigating budget spreadsheets, health routines, and occasional
    theatrical indulgences with a pragmatic charm.
background:
  cultural: Jean comes from a multi‑generational Anglo‑American family rooted in the Northeast. Raised in suburban Connecticut, she grew up surrounded by the region’s colonial history, small‑town community
    values, and a strong emphasis on education. Her parents, both educators, fostered a love of literature and civic engagement. This background has imbued her with a respect for tradition paired with a
    pragmatic approach to everyday life. She identifies with the New England cultural milieu that values self‑reliance, public service, and appreciation for the arts, which informs both her professional
    ethos and personal pursuits.
