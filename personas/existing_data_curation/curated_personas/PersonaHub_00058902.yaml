persona_description: A psychologist who studies the relationship between intelligence and problem-solving ability in various species, particularly primates. Deaner's research focuses on the domain-general
  cognitive abilities of animals, which allow them to tackle new and unpredictable situations. He believes that some species may outperform others in a problem-solving test not because they are smarter,
  but because one species is poorly suited to that particular testing situation. Deaner's study was published in the journal Evolutionary Psychology and was funded by the medical center's Department of
  Biological Anthropology and Anatomy.
