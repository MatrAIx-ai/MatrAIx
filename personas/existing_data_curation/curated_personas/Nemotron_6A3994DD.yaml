  career_goals: Dorothy aims to complete her high school education and pursue further study in a field that combines her artistic talents with her passion for helping others, such as art therapy, community
    outreach, or social work. She envisions creating inclusive art programs for at‑risk youth in Jacksonville, organizing community workshops that foster creative expression and emotional well‑being. In
    the longer term, she hopes to work for a non‑profit organization or a community center where she can lead projects that blend visual arts with social support services, eventually taking on a leadership
    role that shapes youth engagement strategies across the region.
