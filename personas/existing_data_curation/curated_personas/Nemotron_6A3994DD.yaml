personas:
  professional: Dorothy Hull, a 17‑year‑old high‑school senior, leverages their strong digital illustration skills, knack for event planning, and innate compassion to lead the school art club, organize
    community clean‑up murals, and lay the groundwork for a future career in art therapy that blends creativity with social support.
  sports: Dorothy Hull stays active by playing varsity volleyball during the fall season, attending energetic hip‑hop dance classes on weekends, and passionately supporting the Jacksonville Jaguars and
    the Jacksonville Jumbo Shrimp, maintaining a balanced fitness routine that mixes structured practice with occasional jogs along the St. Johns River.
  arts: Dorothy Hull fuels their creativity by painting murals at local street festivals, curating a vibrant Instagram feed of digital illustrations inspired by indie acts like Tame Impala and Mitski, and
    drawing artistic influence from figures such as Frida Kahlo and Keith Haring, while also writing a community‑focused blog that reviews gallery openings and cultural events.
  travel: Dorothy Hull prefers short, budget‑friendly road trips—spending summer weekends exploring historic St. Augustine, hiking the Ocala National Forest, and fantasizing about a future backpacking adventure
    through Berlin’s eclectic art scene—while meticulously planning itineraries that fit around school commitments and their love for spontaneous photo‑journalism.
  culinary: Dorothy Hull enjoys experimenting in the kitchen, whipping up avocado toast with cherry tomatoes, mastering a fragrant homemade ramen broth with kombu and miso, and hosting spicy taco nights
    with fresh cilantro, lime, and chipotle, though they often forget to clean the stovetop after enthusiastic cooking sessions.
  core: Dorothy Hull is a curious, socially vibrant teen who blends artistic passion with community activism, often staying up late perfecting sketches while juggling volunteer projects, and habitually
    buying too many sketch supplies in a single shopping trip.
background:
  cultural: Dorothy is a white teenager raised in Jacksonville, Florida, with family roots tracing back to Irish and German ancestry. Growing up in a coastal Southern city, she has been shaped by the region’s
    blend of traditional Southern hospitality and the multicultural vibrancy of Jacksonville’s arts and festival scene. She participates in community youth programs and local church events, which reinforce
    values of cooperation and service. Exposure to the city’s diverse population, including nearby Caribbean influences, has broadened her appreciation for varied artistic expressions and community traditions,
    fostering an inclusive outlook that combines Southern community spirit with a modern, creative ethos.
