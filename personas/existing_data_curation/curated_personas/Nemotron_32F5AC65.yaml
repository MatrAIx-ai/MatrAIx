personas:
  professional: Matthew Pelland is an aspiring mechanical engineer who channels his methodical love for model trains and LEGO Technic into designing intricate prototypes for his high school robotics club,
    consistently applying his organized, compassionate nature to lead collaborative projects.
  sports: Matthew Pelland is a midfielder for the Riverside Rockets youth soccer team, training thrice weekly and cheering for the Premier League's Manchester United, a routine that satisfies his love for
    structured teamwork and physical coordination.
  arts: Matthew Pelland immerses himself in science‑fiction literature—favoring authors such as Isaac Asimov and Liu Cixin—and enjoys the atmospheric scores of composer Hans Zimmer, while regularly streaming
    strategy video games like Civilization VI, which together shape his imaginative yet methodical worldview.
  travel: Matthew Pelland prefers carefully planned weekend getaways, having explored the National Railway Museum in York with his family and dreaming of a future trip to Tokyo's Shinkansen lines to witness
    cutting‑edge train engineering firsthand.
  culinary: Matthew Pelland enjoys building simple meals like pepperoni pizza and classic spaghetti Bolognese, while his snack stash of chocolate‑chip cookies and trail mix fuels his late‑night LEGO sessions,
    and he occasionally experiments with homemade caramel popcorn as a treat.
  core: Matthew Pelland blends a meticulous, builder’s mindset with a compassionate streak—organizing LEGO projects and senior‑center events with equal pride—yet habitually sacrifices sleep for strategy
    games, embodying a teen who balances structure, empathy, and occasional indulgence.
background:
  cultural: Matthew comes from a family of European-American roots, with ancestors tracing back to French-Canadian settlers in the Lehigh Valley region. Growing up in Catasauqua, a small town with a historic
    industrial heritage, he has been influenced by a close-knit community atmosphere, local school traditions, and occasional participation in church and community events that emphasize cooperation and
    mutual support.
