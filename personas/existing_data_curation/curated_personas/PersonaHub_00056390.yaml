persona_description: A scientist or researcher in the field of physics, particularly in the study of thermal physics and its applications in understanding heat flows, global warming, and the circulation
  of ocean currents. They are likely to be familiar with the Kelvin scale and have a keen interest in the measurement and understanding of temperature. They may also have a background in chemistry or physics
  and have a strong understanding of the principles of heat and energy flow. They may have a particular interest in the workings of rockets and the circulation of energy from the Sun to other parts of the
  universe.
