  career_goals: Although John is only two, his parents see early signs of a fascination with building and order. In the short term his goal is to master new words, walk confidently, and become proficient
    at stacking taller towers of blocks. Looking ahead, his methodical play and enjoyment of creating stable structures suggest a budding interest that could evolve into aspirations in engineering, architecture,
    or design as he grows older.
