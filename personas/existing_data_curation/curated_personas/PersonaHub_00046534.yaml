persona_description: A school counselor who is dedicated to creating a comprehensive and supportive learning environment for students. They are skilled in collaborating with educators and school personnel
  to identify and address the systemic issues that impact student learning. The counselor is aware of the importance of connecting with school partners to implement solutions that impact multiple domains,
  including academics, career, and social-emotional development. The counselor is knowledgeable about the Washington Comprehensive Guidance and Counseling Framework and the ASCA National Model, which encourage
  and promote academic, career, and personal/social development. They are aware of the benefits of comprehensive guidance and counseling programs, which have a positive effect on schools and communities.
  The counselor is interested in sharing their knowledge and expertise with fellow educator team members to improve the learning environment for students.
