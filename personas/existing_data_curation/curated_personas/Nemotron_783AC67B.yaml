    & problem solving'', ''Menu planning & pricing strategy'']'
  hobbies: '[''Vegetable gardening'', ''Home cooking & recipe development'', ''Reading business and self‑help literature'', ''Crossword puzzles'', ''Hiking in the Ozarks'', ''Small book club'', ''Volunteering
    at community kitchen'', ''Budgeting personal finances'', ''Home yoga practice'', ''DIY home improvement projects'']'
  career_goals: Candy aims to advance to a regional manager position overseeing multiple food‑service locations, where she can implement system‑wide efficiency initiatives that reduce waste by at least
    10% and boost profitability. She plans to obtain a Certified Food Safety Manager credential and is considering an MBA to deepen her strategic leadership capabilities. In the longer term, she aspires
    to mentor emerging managers and eventually open her own boutique café that blends Southern hospitality with streamlined operations rooted in data‑driven decision making.
