personas:
  professional: Candy German, a seasoned restaurant operations manager with over a decade of food‑service leadership, leverages meticulous standard operating procedures, data‑driven cost analysis, and a
    competitive drive to keep labor costs trim and service quality in the top quartile, all while laying the groundwork for a regional manager role.
  sports: Candy German follows the Arkansas Razorbacks football team and the St. Louis Cardinals baseball club, joins a local hiking club for weekend treks on the Ozark Trail, and plays occasional pickleball
    at the Springdale community center with a close‑knit group of friends.
  arts: Candy German enjoys the storytelling of playwright August Wilson, the folk melodies of John Prine, and the classic films of Sidney Poitier, often listening to a curated playlist while experimenting
    with recipe development in her kitchen.
  travel: Candy German prefers low‑key road trips to Nashville’s music scene and Santa Fe’s art markets, plans itineraries with spreadsheets, and dreams of a culinary tour of Tuscany, but family commitments
    keep most vacations to weekend getaways in the Ozarks.
  culinary: Candy German’s cooking style blends Southern hospitality with exacting technique, favoring dishes like pan‑seared catfish with lemon‑herb beurre blanc, heirloom tomato bruschetta, and slow‑roasted
    pork shoulder marinated in garden‑grown rosemary and garlic, and she often experiments with sous‑vide to ensure consistency.
  core: Candy German balances a data‑driven management style with a love for solitary garden work, yet she battles chronic worry and a tendency to micromanage, finding solace in meticulous recipe testing
    and weekend hikes.
background:
  cultural: Candy grew up in a middle‑class, white Southern family in northwestern Arkansas. The region’s emphasis on practicality, hospitality, and a strong work ethic shaped her values. While she embraces
    the Southern tradition of courteous service and community involvement, she balances it with a modern, business‑oriented perspective gained from her university education. Her married life in Springdale
    is rooted in family, quiet church attendance, and local community events, yet she prefers intimate gatherings over large social scenes.
attributes:
