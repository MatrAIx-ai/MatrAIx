  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museum exhibitions'', ''Reading historical fiction and biographies'', ''Herb and vegetable gardening'', ''Book club participation'', ''Cooking
    soul‑food and Southern cuisine'', ''Listening to jazz and gospel music'', ''Singing in a community choir'', ''Traveling to historic Black heritage sites'']'
  career_goals: Although retired, Andrea is eager to deepen her involvement in the cultural life of Oklahoma City. She aims to complete a community‑based oral‑history project that captures the stories of
    Black elders in the region, hoping to publish the collection as a locally distributed booklet. She also wants to enroll in a series of art‑history workshops at the Oklahoma City Museum of Art to broaden
    her knowledge of contemporary Black artists. In addition, Andrea aspires to mentor younger volunteers at the local senior center, sharing her cooking and storytelling skills. A long‑term ambition is
    to organize an intergenerational art exhibition that celebrates Oklahoma’s Black heritage, serving both as a personal legacy and a community bridge.
