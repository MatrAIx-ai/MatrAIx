personas:
  professional: Andrea Johnson, a retired liberal‑arts graduate who now channels her communication flair and artistic eye into guiding museum tours, mentoring senior volunteers, and coordinating a community
    oral‑history project on local elders, all while embracing a flexible, occasionally disorganized approach to planning.
  sports: Andrea Johnson, a devoted fan of the Oklahoma City Thunder and occasional participant in the local senior walking club after church services, balances passive fandom with light cardio exercise,
    though they rarely engage in competitive sports.
  arts: Andrea Johnson, a watercolor enthusiast inspired by prairie landscapes and the improvisational spirit of jazz legends such as Miles Davis, Louis Armstrong, and Ella Fitzgerald, regularly attends
    Oklahoma City Museum of Art openings featuring contemporary creators like Harmony Tan and Emily Rust, and enjoys singing gospel hymns with the community choir.
  travel: Andrea Johnson, who plans trips with both careful research and a spontaneous spirit, favors journeys to historic sites that illuminate the nation’s diverse stories—such as Washington, D.C.’s Smithsonian
    American History Museum, the Freedom Trail in Boston, and the multicultural festival scene of New Orleans—while balancing a limited travel budget with a deep desire for meaningful exploration.
  culinary: Andrea Johnson, whose kitchen is a hub of traditional Southern cooking, excels at preparing fried chicken, collard greens, cornbread, and sweet potato pie using fresh basil, rosemary, and thyme
    from their garden, but occasionally forgets to refrigerate leftovers after large church pot‑luck gatherings.
  core: Andrea Johnson, a 66‑year‑old watercolor‑loving, garden‑tending storyteller, blends relaxed spontaneity with a deep commitment to preserving local heritage, even if they misplace paintbrushes and
    overcommit to community events.
background:
  cultural: Andrea grew up as part of the African‑American community in Oklahoma City during the height of the civil‑rights movement, an era that instilled in her a strong sense of resilience and collective
    identity. Her family traces its roots to the Great Migration, and stories of ancestors who moved from the South to the Midwest are woven into her family narratives. Church has been a central pillar
    of her cultural life, providing a space for fellowship, music, and community service. She carries forward traditions of soul‑food cooking, oral storytelling, and gospel singing, which she shares with
    younger generations. Oklahoma’s Black cultural scene—marked by local jazz clubs, art collectives, and historical societies—continues to shape her interests and volunteer work, reinforcing her commitment
    to preserving and celebrating her heritage.
attributes:
  skills: '[''Effective interpersonal communication'', ''Community outreach'', ''Basic research and writing'', ''Culinary expertise in Southern and soul‑food cuisine'', ''Basic computer literacy (email,
