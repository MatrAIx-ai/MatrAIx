    tutoring for seniors)'', ''Attending community festivals and cultural events'', ''Exploring NYC art galleries'', ''Listening to Latin jazz and merengue'', ''Spontaneous weekend getaways'']'
  career_goals: Over the next five years Migdalia aims to step into a senior director role where she can shape digital‑inclusion strategies for underserved Bronx neighborhoods. She plans to earn a PMP certification
    and pursue a master’s in public administration to strengthen her policy‑making acumen. Her ambition includes establishing a community technology hub that offers free coding workshops, mentorship programs
    for Dominican youth, and sustainable tech solutions for local schools and health clinics. She also hopes to influence municipal IT procurement policies to prioritize equity and environmental responsibility,
    while continuing to mentor emerging leaders within her organization.
