  career_goals: She aims to become a senior electrical engineer leading multidisciplinary projects focused on sustainable energy and smart‑home technologies, eventually transitioning into a technical management
    role where she can mentor junior engineers—especially women—in a supportive environment. In the longer term, she aspires to launch her own consultancy that blends engineering expertise with interactive
    art installations for community spaces across New England, while also completing a bachelor’s degree in engineering to formalize her credentials.
