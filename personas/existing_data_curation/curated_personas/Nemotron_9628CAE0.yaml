personas:
  professional: Angelina Durham, a senior electrical engineer specializing in sustainable energy systems and smart‑home automation, leverages her meticulous circuit‑design expertise, Lean Six Sigma mindset,
    and love for aesthetic integration to lead multidisciplinary projects that blend functional efficiency with interactive LED art installations.
  sports: Angelina Durham enjoys solo hikes along the rugged coastal trails of Acadia National Park, participates in the Maine Coast Trail Association, follows the New England Patriots and Boston Red Sox,
    and incorporates regular yoga flow sessions into her fitness routine, preferring low‑impact, nature‑centric activity over team sports.
  arts: Angelina Durham indulges in watercolor painting of Maine seascapes, frequents small galleries showcasing artists such as Emily Mae Smith, draws inspiration from interactive installations by teamLab,
    and curls up with sci‑fi novels by Isaac Asimov while listening to the ambient folk of Sufjan Stevens during her creative evenings.
  travel: Angelina Durham favors thoughtfully planned getaways that balance solitary exploration and creative inspiration, having trekked the fjords of Iceland to study geothermal power, cherished weekend
    drives along the New England coastline, and now dreams of visiting the Swiss Alps to research high‑altitude solar installations.
  culinary: Angelina Durham delights in cooking fresh Maine lobster bisque, pan‑seared wild Atlantic salmon with dill and thyme, and herb‑infused lemon vinaigrette, often sourcing local seafood at the Portland
    fish market and experimenting with plating that mirrors her watercolor palettes.
  core: Angelina Durham blends disciplined engineering precision with a solitary, art‑driven soul, balancing meticulous project leadership, sustainable investment habits, and a penchant for quiet coastal
    hikes, all while occasionally succumbing to late‑night tinkering sprees.
background:
  cultural: Angelina comes from a white New England background, raised in the small‑town environment of Sanford, Maine. Her family’s values emphasize self‑reliance, modesty, and a deep connection to the
    natural landscape of coastal Maine. Growing up in a region with a strong tradition of craftsmanship and community‑oriented events, she developed an appreciation for both practical problem‑solving and
    the arts. As a white woman in a traditionally male‑dominated engineering field, she is attuned to the cultural dynamics of gender and regional identity, which inform her collaborative yet assertive
    approach.
