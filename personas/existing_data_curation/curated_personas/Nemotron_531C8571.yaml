  career_goals: Although retired, Justin aims to remain an active contributor to his community. He plans to expand his volunteer leadership by serving on the board of the local food bank and mentoring younger
    maintenance workers through a community apprenticeship program. He also hopes to compile a memoir that weaves together his family history, local Kentucky folklore, and lessons from his lifelong trades,
    preserving this narrative for future generations. Learning digital photography to document his garden and community events is another personal ambition, as is adopting mindfulness practices to better
    manage his anxiety and emotional distress.
