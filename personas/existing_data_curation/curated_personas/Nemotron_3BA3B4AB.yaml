  career_goals: Approaching retirement, Martha aims to transition from full‑time practice to a mentorship role, guiding a small cohort of junior architects in preserving Arvada’s historic neighborhoods.
    She plans to attain her LEED AP credential to deepen her sustainable design impact and to author a guide on incorporating Spanish Colonial design elements into modern Colorado homes. Additionally, she
    hopes to contribute pro bono consulting for community projects that enhance public spaces while maintaining practical, budget‑friendly solutions.
