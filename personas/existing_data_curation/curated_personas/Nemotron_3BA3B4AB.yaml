personas:
  professional: Martha Castillo, a 63‑year‑old architect with over three decades of experience, is known for translating client needs into practical, code‑compliant structures that honor Spanish Colonial
    aesthetics, using AutoCAD and Revit BIM with a systematic, routine‑driven project management style that balances organization with on‑site flexibility, and is now transitioning to mentorship and LEED
    AP certification to deepen sustainable impact.
  sports: Martha Castillo enjoys weekly walks on nearby trails and birdwatching, supplements this routine with occasional hikes in the Rockies, and supports local teams like the Denver Broncos, Colorado
    Rockies, and Colorado Rapids, often watching games after a morning of light exercise to balance physical activity with community spirit.
  arts: Martha Castillo participates in a historical society book club focused on architectural history, regularly attends Spanish cultural festivals featuring flamenco guitarists such as Paco de Lucía,
    and frequently visits the Denver Art Museum to view exhibitions on early American and Spanish Colonial art, using these experiences to fuel their design inspiration.
  travel: Martha Castillo prefers structured travel itineraries that blend cultural immersion with comfortable pacing, favoring weekend trips to historic sites in Spain like Seville and Barcelona, annual
    road trips to Rocky Mountain National Park for birdwatching, and occasional cruises that allow them to attend Spanish festivals abroad while staying within their retirement budget.
  culinary: Martha Castillo cultivates rosemary, thyme, and oregano in a modest garden to flavor their beloved paella and gazpacho, enjoys sourcing fresh saffron and chorizo from local markets, and spends
    Saturday afternoons expertly whisking the paella broth while humming traditional songs, though they sometimes over‑salt the gazpacho in their quest for bold flavor.
  core: Martha Castillo is a routine‑driven, 63‑year‑old architect who blends traditional Spanish Colonial design with sustainable modernity, mentors younger peers, savors garden‑fresh paella, and balances
    modest adventure with a disciplined, community‑rooted lifestyle.
background:
  cultural: Martha descends from a family that emigrated from Spain in the mid‑20th century, preserving strong ties to their Spanish roots. She grew up bilingual, speaking both Spanish and English at home,
    and remains fluent in both languages. Family traditions such as Sunday paella, celebrating Semana Santa, and regular gatherings at the local Catholic parish are central to her identity. She values the
    Mediterranean emphasis on community, craftsmanship, and respect for historic architecture, which informs both her professional designs and personal lifestyle. While fully integrated into her Arvada
    community, she retains a deep appreciation for Spanish art, music, and culinary customs, often sharing them with neighbors and friends.
