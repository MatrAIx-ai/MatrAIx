persona_description: A criminal justice professor who specializes in the theories of crime and deviance, particularly the constitutional theories and sociological theories that explain criminal behavior.
  He has a background in social and historical studies, and his research interests include the role of opportunity structures for crime and the impact of community, family, peers, schools, and economic
  structures on criminal conduct norms. He is known for his expertise in the measurement of crime and the measurement problems that arise from it, and he has taught classes that satisfy the core requirement
  in the criminal justice curriculum.
