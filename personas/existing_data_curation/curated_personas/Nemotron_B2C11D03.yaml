  career_goals: Samuel aims to advance to a supervisory role within the plant, obtain a journeyman welding certification, and eventually launch a side business designing custom metal art for local businesses
    and community spaces. He wants to integrate his love of art into manufacturing, become a recognized expert in artistic fabrication, and mentor apprentices from underrepresented backgrounds. Completing
    an associate degree in industrial engineering is also a priority, as is contributing to lean initiatives that improve efficiency while allowing room for creative projects.
