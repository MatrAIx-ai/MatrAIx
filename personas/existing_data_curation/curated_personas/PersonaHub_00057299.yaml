persona_description: A researcher with expertise in population genetics, particularly in the study of the evolution of invasive species and the genetic mechanisms associated with host switches. This person
  has collaborated with Maeva and Sasha on various projects related to Varroa destructor, a parasitic mite that has spread globally and offers the opportunity to reconstruct the history of its populations
  using demographic models and molecular methods. This researcher is interested in understanding the genetic mechanisms that enable the mites to switch hosts and the historical signatures of selection that
  have occurred after the switch. They are also interested in determining if gene flow has occurred among populations and between mite species and are using a combination of molecular methods and controlled
  experiments to tackle these questions.
