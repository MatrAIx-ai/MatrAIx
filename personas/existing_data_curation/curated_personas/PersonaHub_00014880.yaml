persona_description: A scientist who specializes in the study of solar and auroral phenomena, particularly those related to Jupiter and Saturn. They have conducted research on the correlation between the
  strength of the solar wind and the behavior of auroras on these planets, which challenges current theories about the processes controlling the biggest light shows in the Solar System. They have also studied
  the auroras on Saturn, which they have found to be caused by the explosive release of solar wind energy that is stored in the planet's magnetic field.
