  hobbies: '[''Hiking'', ''Community Gardening'', ''Theater Acting/Production'', ''Yoga'', ''Mindfulness Meditation'', ''Journaling'', ''Reading (Historical Fiction, Education Non-Fiction)'', ''Cooking'',
    ''Attending Bluegrass Concerts'', ''Road Trips to Historic Sites'']'
  career_goals: Short-term, Tabetha aims to complete her bachelor's degree in Education and enroll in a master's program focused on higher-education leadership. She intends to earn tenure-track status at
    the community college where she currently teaches, and to design a signature interdisciplinary program linking local business partners with student learning outcomes. Long-term, she aspires to become
    a department chair or dean, champion evidence-based teaching practices, and launch a regional adult-learning initiative that offers credit-bearing courses for underserved adults. She also hopes to embed
    wellness strategies into the curriculum to help students manage stress, reflecting her own experience with anxiety.
