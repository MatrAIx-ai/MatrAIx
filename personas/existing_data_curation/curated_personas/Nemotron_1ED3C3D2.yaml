personas:
  professional: Tabetha Spano, a twenty‑eight‑year‑old community college educator, blends adult‑learning expertise with a rigorously organized curriculum design process, leveraging Canvas and Blackboard
    to craft outcome‑driven courses that embed wellness practices and local business partnerships, while their sociable demeanor fosters collaborative classrooms and their underlying anxiety drives relentless
    attention to detail and continuous improvement.
  sports: Tabetha Spano, an avid hiker, leads a weekend Appalachian trail group, participates in a local running club that trains for the Georgia Marathon, cheers for the Georgia Bulldogs football team
    and the Atlanta Braves, and balances high‑energy fitness routines with occasional restorative yoga to counter the strain of an active schedule.
  arts: Tabetha Spano, a dedicated member of a small‑town theater troupe, performs in seasonal plays ranging from classic Southern dramas to contemporary works, coordinates backstage logistics, frequents
    bluegrass concerts featuring acts like The Avett Brothers and Alison Krauss, and draws creative inspiration from folk legends such as Dolly Parton.
  travel: Tabetha Spano prefers meticulously planned road trips to historic Georgia sites like Savannah’s riverfront, the Martin Luther King Jr. National Historic Site in Atlanta, and the Blue Ridge Mountains,
    while also taking spontaneous weekend drives to nearby Civil War battlefields, balancing a modest travel budget with a love for immersive, educational experiences.
  culinary: Tabetha Spano enjoys cooking Southern-inspired dishes such as shrimp and grits, collard greens seasoned with locally grown herbs like thyme and sage, peach cobbler, and cornbread, hosting communal
    meals where friends gather to share stories, while their moderate cooking skill is complemented by a garden‑to‑table approach that emphasizes fresh, seasonal ingredients.
  core: Tabetha Spano is a community‑focused educator and outdoor enthusiast whose meticulous planning and sociable nature are tempered by persistent anxiety that fuels both high achievement and occasional
    overthinking.
background:
  cultural: Tabetha was raised in a close-knit, white family in the rural hills of Murray County, Georgia. Her upbringing was shaped by Southern Appalachian traditions of hospitality, church involvement,
    and a strong sense of community responsibility. While she values the region’s emphasis on family, faith, and hard work, she also embraces diverse viewpoints through her college experiences and her role
    as an educator. Her cultural identity blends respect for local customs—such as seasonal festivals, folk music, and communal meals—with a curiosity about progressive educational methods and broader societal
    trends.
attributes:
