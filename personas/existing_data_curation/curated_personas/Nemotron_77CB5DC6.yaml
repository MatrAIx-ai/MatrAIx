personas:
  professional: Cecilia Torres is a hands‑on HVAC and refrigeration mechanic who excels at diagnosing complex refrigerant and electrical issues, designing on‑the‑fly ductwork adaptations, and communicating
    solutions fluently in English and Spanish; they channel their imaginative curiosity into creative, energy‑saving retrofits that keep customers comfortable while staying calm under pressure.
  sports: Cecilia Torres enjoys weekend hikes across the West Texas prairie and joins a local co‑ed basketball league during the spring, cheering on the Dallas Cowboys and the Texas Rangers while they blend
    cardio with functional strength training to offset the physical demands of their trade.
  arts: Cecilia Torres spends evenings watercoloring abstract skylines inspired by constellations and finds inspiration in the works of Frida Kahlo, Diego Rivera, and the ambient compositions of Gustavo
    Santaolalla; they volunteer at the community art center to lead workshops where they fuse technical drawing with storytelling.
  travel: Cecilia Torres prefers meticulously planned road trips that balance cultural immersion and stargazing, having explored the historic plazas of Oaxaca and the desert night skies of New Mexico’s
    White Sands, while they dream of a future pilgrimage to the ancient ruins of Palenque for both artistic and astronomical inspiration.
  culinary: Cecilia Torres cooks with the confidence of a seasoned home chef, mastering mole poblano, tamales wrapped in corn husks, and chiles en nogada using roasted ancho chilies, Mexican chocolate,
    and fresh pomegranate seeds, and they relish pairing these dishes with homemade aguas frescas flavored with hibiscus and lime.
  core: Cecilia Torres merges a mechanic's precision with a painter's imagination, often pausing a repair job to capture a nebula in watercolor, yet they habitually leave their toolbox open on the coffee
    table, inviting a perpetual game of find‑the‑screwdriver.
background:
  cultural: Cecilia grew up in a bicultural Mexican‑American household where Spanish and English were spoken interchangeably. Family traditions such as celebrating Día de los Muertos, quinceañeras, and
    holiday meals featuring dishes like pozole and arroz con pollo remain central to her identity. She retains a strong connection to her Mexican roots through music—listening to rancheras, corridos, and
    contemporary Latin pop—and by participating in local cultural events in Morton, Texas. While she embraces the independent, community‑oriented spirit of rural West Texas, she also honors the collectivist
    values of her heritage, prioritizing family ties and communal harmony. Her Catholic upbringing influences her gratitude practices and occasional attendance at church celebrations. This cultural blend
    informs her warm, cooperative demeanor and her desire to give back to both the Mexican‑American community and her broader Texan neighbors.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration system troubleshooting'', ''Preventive maintenance'', ''Energy‑efficiency retrofitting'', ''Electrical wiring and diagnostics'', ''Blueprint reading
    and duct layout design'', ''Bilingual customer communication (English/Spanish)'', ''Tool proficiency (multimeters, torque wrenches, refrigerant recovery units)'', ''Creative problem‑solving under time
    constraints'', ''Basic CAD sketching for system modifications'']'
  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Reading science‑fiction and speculative fiction'', ''Stargazing and night‑sky photography'', ''Hiking the West Texas plains'', ''Cooking traditional
    Mexican dishes'', ''DIY electronics projects with Arduino/Raspberry Pi'', ''Volunteering at community art workshops'']'
  career_goals: Cecilia aims to become a certified lead technician and eventually launch her own small, women‑owned HVAC service business that specializes in eco‑friendly, energy‑saving solutions for rural
    Texas homes. She plans to earn her NATE (North American Technician Excellence) certification and the EPA Section 608 certification within the next two years, and later pursue a GED and an associate’s
    degree in HVAC technology to deepen her technical foundation. Beyond personal advancement, she hopes to mentor other women and underserved youth interested in the trades, offering apprenticeships and
    community workshops that blend technical training with creative thinking. Long‑term, she envisions her business serving as a hub for community education on sustainable home comfort, while also providing
    reliable, affordable service to her neighbors in Cochran County.
