personas:
  professional: Barry King, a budding mini-engineer, channels curiosity and practicality into constructing elaborate LEGO creations that mimic real-world structures, demonstrating early problem‑solving
    skills while eagerly sharing the results with peers.
  sports: Barry King dashes across the neighborhood park to join the Little Rookies soccer team, cheering for Manchester United as a junior fan, and after practice they hop on their red bike to pedal around
    the cul‑de‑sac, demonstrating energetic teamwork and a love for outdoor play.
  arts: Barry King immerses in creative arts by sketching dinosaurs from picture books, watching the LEGO Movie and Wild Kratts, and piecing together intricate LEGO sets inspired by Pixar’s Toy Story characters,
    turning screen inspiration into hands‑on artistry.
  travel: Barry King dreams of a family road trip to the Grand Canyon after already tagging the local zoo and the nearby science museum on a scrapbook of favorite spots, preferring day‑long adventures that
    mix dinosaur exhibits and space planetarium shows, yet they sometimes grumble about long car rides.
  culinary: Barry King loves assembling mini pizzas with pepperoni and mozzarella, munching on mac & cheese, and enjoying strawberry‑banana smoothies, but they often skip veggies, preferring crunchy carrot
    sticks only when coaxed by a parent.
  core: Barry King is a curious, energetic six‑year‑old who balances LEGO ingenuity with soccer enthusiasm, savvy allowance savings, and a penchant for dinosaur books, yet occasionally forgets to eat greens
    or wear sunscreen.
background:
  cultural: Barry grows up in a white Southern family in Scottdale, Georgia, where family gatherings, church events, and community barbecues are regular parts of life. The close‑knit neighborhood emphasizes
    friendly interaction, youth sports leagues, and school activities. Living in DeKalb County also exposes him to a multicultural environment, introducing him to diverse foods, music, and celebrations
    that broaden his appreciation for different cultures while maintaining the values of his Southern upbringing.
