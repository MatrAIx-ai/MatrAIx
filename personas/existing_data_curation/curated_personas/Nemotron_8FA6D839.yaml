  career_goals: Susan dreams of exploring the worlds of science and art. She imagines becoming an astronaut to investigate space, or a marine biologist to study ocean life, while also envisioning herself
    as an artist who designs interactive installations that blend scientific concepts with visual creativity. She aspires to keep learning new ideas, share discoveries with others, and maybe one day lead
    a project that connects curiosity, art, and innovative thinking.
