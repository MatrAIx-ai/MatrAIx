personas:
  professional: An aspiring junior engineer, Susan Hall channels her curiosity and methodical nature into building intricate LEGO models that serve as storytelling stages, and they compete in school science
    fairs to test their inventions, constantly refining their designs with a critical eye.
  sports: A competitive youth athlete, Susan Hall laces up for the Wayzata Thunder Soccer Club, tracks the moves of Minnesota United FC forwards on television, and eagerly joins the neighborhood ice‑skating
    sessions on the frozen pond each winter, always aiming to outscore opponents with a keen strategic mind.
  arts: A budding art enthusiast, Susan Hall spends Saturday mornings at the Minneapolis Institute of Art sketching Monet’s water lilies and Georgia O’Keeffe’s bold blossoms, then recreates those color
    palettes in LEGO sculptures at home, humming along to Taylor Swift’s narrative lyrics, and they keep a scrapbook of museum postcards as a visual diary.
  travel: An enthusiastic planner, Susan Hall loves weekend road trips to kayak on Lake Minnetonka, dreams of trekking to the waterfalls of Itasca State Park, and eagerly anticipates a family vacation to
    Disney World in Orlando, mapping each destination with colorful stickers in their travel journal.
  culinary: A curious little chef, Susan Hall delights in layering fresh strawberries, blueberries, and vanilla yogurt into a parfait, mixes a quick cheese‑and‑crackers snack, and attempts to perfect a
    salmon dip seasoned with dill and lemon, though they often forget to rinse the leafy greens before tossing a salad.
  core: Susan Hall blends relentless curiosity with meticulous planning, turning bedtime reading into mystery‑novel marathons while habitually misplacing crayons in the fridge and occasionally skipping
    her nightly tooth‑brushing routine.
background:
  cultural: Susan comes from a white, middle‑class family in Wayzata, Minnesota, a suburban community that emphasizes education, outdoor recreation, and the arts. Her upbringing reflects typical Upper Midwest
    values, including participation in school activities, community sports leagues, and appreciation for the region's lakes and parks. Cultural influences include seasonal events such as Minnesota summer
    fairs, winter ice skating, and a subtle Scandinavian heritage common in the area. She regularly visits nearby cultural institutions like the Minneapolis Institute of Art and the Science Museum of Minnesota,
    shaping a well‑rounded, curiosity‑driven outlook.
