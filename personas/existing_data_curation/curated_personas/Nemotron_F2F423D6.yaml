  career_goals: Marc aims to transition from a high‑performing broker to the founder of a boutique brokerage that specializes in historic and architecturally significant homes in Orange County and the greater
    Hudson Valley. He plans to build a team of like‑minded agents who share his competitive drive and appreciation for design, while fostering a culture of mentorship and continuous learning. Over the next
    five years, he intends to earn top‑ranking status in regional sales volume, expand his portfolio into property development projects that preserve local heritage, and become a sought‑after speaker at
    real‑estate conferences. Additionally, Marc aspires to launch a quarterly podcast that blends market insights with discussions on art and culture, positioning himself as a thought leader at the intersection
    of real‑estate and lifestyle curation.
