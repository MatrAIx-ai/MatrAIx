  career_goals: She dreams of one day working closely with animals, envisioning herself as a wildlife biologist or a veterinarian who can protect and study the creatures she loves. She also imagines writing
    illustrated stories about nature, hoping to share her love of the outdoors with other children. While she knows she is still young, she sets small goals like joining a school science club and volunteering
    at the local animal shelter to explore these interests.
