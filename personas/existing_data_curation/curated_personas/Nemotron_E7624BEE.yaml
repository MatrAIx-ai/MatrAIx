personas:
  professional: Alexandra Chan, an aspiring junior scientist who loves turning everyday kitchen items into simple chemistry experiments, blends boundless curiosity with practical step‑by‑step documentation
    in a hand‑drawn lab notebook, and despite a relaxed attitude toward tidying up, they meticulously record observations while they drift into quiet reflection during solitary study sessions.
  sports: Alexandra Chan, a member of the Prairieville Tigers youth soccer club who prefers gentle evening walks with the family rabbit over structured drills, passionately watches the national women's
    soccer team on TV, and adopts an unplanned fitness routine that often includes spontaneous jumping‑rope sessions whenever they feel restless.
  arts: Alexandra Chan, who sketches prairie landscapes inspired by Claude Monet while listening to soothing instrumental pieces by Yiruma, transforms animal drawings into three‑dimensional LEGO sculptures,
    idolizes J.K. Rowling for her imaginative storytelling, and they often weave lyrical descriptions into their short stories.
  travel: Alexandra Chan, who favors quiet, nature‑focused trips, has explored the rolling plains of their home state and dreams of visiting the serene fjords of Norway, always planning adventures with
    a detailed sketchbook itinerary but they sometimes delay packing because of anxiety about unfamiliar surroundings.
  culinary: Alexandra Chan, whose palate leans toward comforting dishes such as homemade chicken noodle soup, cheese‑filled ravioli, and apple slices with peanut butter, and they enjoy helping stir the
    pot and carefully arranging garnish, yet tends to snack on gummy bears late at night when feeling stressed.
  core: Alexandra Chan is a solitary, curiosity‑driven ten‑year‑old who blends scientific tinkering with artistic sketching, navigates intense anxiety through structured creative rituals, and they often
    forget to tidy their space or budget, yet they find calm in quiet routines and the company of their rabbit.
background:
  cultural: Alexandra was raised in Fremont, Nebraska, a small Midwestern town with deep ties to agricultural life and community traditions. Her family is of European‑American descent, and her upbringing
    reflects typical Midwestern values such as self‑reliance, respect for nature, and a strong sense of community. She participates in local library programs, attends Sunday school, and celebrates holidays
    like Thanksgiving and the Fourth of July with family gatherings and outdoor activities. The quiet, open landscapes of the region nurture her love for solitary exploration and her interest in wildlife.
