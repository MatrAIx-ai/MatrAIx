  hobbies: '[''Gardening'', ''Reading'', ''Quilting'', ''Knitting'', ''Gospel Choir'', ''Cooking'', ''Walking'', ''Local History Research'', ''Community Potlucks'']'
  career_goals: She aims to complete her associate degree in social services, expand her volunteer leadership within the local church and community center, and launch a mentorship program for single mothers
    in Lafayette County. Over the next five years, she hopes to become a recognized community health advocate and possibly start a small home‑based catering service that supplies healthy meals to seniors.
