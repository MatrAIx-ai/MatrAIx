  hobbies: '[''Reading historical biographies'', ''Classic literature'', ''Volunteering at historical society'', ''Gardening'', ''Woodworking'', ''Hiking in state parks'', ''Fishing'', ''Attending Detroit
    Tigers games'', ''Listening to Motown and jazz music'']'
  career_goals: Alexander aims to advance into a supervisory position within the rental department, eventually becoming a floor manager and later a regional operations coordinator. He seeks to obtain a
    Certified Rental Management Professional credential to strengthen his expertise in asset oversight and customer satisfaction metrics. Long‑term, he envisions launching a niche boutique rental business
    specializing in vintage equipment and specialty furniture, merging his practical experience with his appreciation for history and design. Throughout his career progression, he values a predictable schedule,
    clear performance expectations, and opportunities to mentor newer staff, aligning with his preference for structure and cooperative work environments.
