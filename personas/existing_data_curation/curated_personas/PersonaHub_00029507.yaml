persona_description: A marine biologist who specializes in the study of seabirds, particularly the Lesser Black-backed Gull. She has conducted extensive research on the prey base of Lesser Black-backed
  Gulls and the factors that influence their feeding behavior. Her work has focused on understanding the natural prey base of the gull, the role of facilitated foraging, and the impact of fisheries discarding
  on the gull's diet. She is particularly interested in the multi-species feeding associations with Common Murre and the use of fisheries discarding bycatch and offal by Lesser Black-backed Gulls.
