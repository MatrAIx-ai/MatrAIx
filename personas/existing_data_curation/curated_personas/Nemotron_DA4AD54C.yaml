personas:
  professional: Najat Franklin is a veteran maintenance mechanic with 25 years of hands‑on expertise in industrial machinery, excelling at welding refractory components, diagnostic troubleshooting, and
    preventive maintenance scheduling, and channels their practical, assertive yet collaborative style into leading small crews while balancing a love for structured processes with a flexible, hands‑on
    problem‑solving approach.
  sports: Najat Franklin shreds the trails with the Solano County Hiking Club on weekends, dances salsa at community studios, and roots for the San Francisco Giants while packing a hiking pack that includes
    a spare water bottle and a tendency to skip formal gym workouts in favor of outdoor activity.
  arts: Najat Franklin immerses themselves in the local arts scene by attending live shows featuring Bruce Springsteen tribute bands at the downtown venue, discussing historical nonfiction with the book
    club, and occasionally humming along to KISS classics during community potlucks.
  travel: Najat Franklin prefers spontaneous road trips that blend hiking in national parks like Yosemite with pit‑stops at classic car shows in Detroit, while also dreaming of a cultural pilgrimage to
    Kyoto’s historic temples, balancing a modest travel budget with a love for adventure and family‑friendly destinations.
  culinary: Najat Franklin is a grill‑master who loves slow‑cooking pork ribs with hickory wood, seasoning them with smoky paprika and brown sugar, and routinely hosts potluck barbecues featuring classic
    sides like coleslaw, baked beans, and grilled corn on the cob.
  core: Najat Franklin blends a hands‑on, jam‑filled mechanic’s mindset with a community‑driven, spontaneous spirit, juggling classic car tinkering, weekend hikes, and occasional overdue bills while always
    ready to fire up the grill for friends.
background:
  cultural: Najat grew up in the San Francisco Bay Area, raised in a middle‑class white family with mixed European ancestry (primarily Irish and German). The Bay Area’s pragmatic, tech‑forward environment
    combined with its strong labor‑union tradition shaped her respect for hard work, safety, and teamwork. Living in Vallejo—a city with deep shipbuilding and manufacturing roots—has reinforced a community‑oriented
    mindset, while California’s progressive values have encouraged her active participation in gender‑equity initiatives within her industry. Her cultural background blends traditional American values of
    self‑reliance with the inclusive, collaborative spirit of the West Coast, influencing both her professional demeanor and personal life.
