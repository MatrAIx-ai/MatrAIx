  career_goals: Najat aims to advance into a lead mechanic or maintenance supervisor position within the next three years, leveraging her extensive hands‑on expertise to oversee a larger team and drive
    continuous improvement initiatives. She plans to obtain the Certified Maintenance & Reliability Professional (CMRP) credential and deepen her knowledge of automation and PLC programming to stay ahead
    of industry trends. In the longer term, she envisions opening a boutique repair shop specializing in refractory equipment for local manufacturers, allowing her to combine her technical skills with her
    entrepreneurial spirit while maintaining a flexible schedule for family and community activities.
