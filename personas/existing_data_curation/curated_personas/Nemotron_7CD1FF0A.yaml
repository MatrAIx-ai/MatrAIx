    instrumentation and control logic'']'
  hobbies: '[''Pickup basketball'', ''Playing guitar in a casual band'', ''Visiting local art galleries and murals'', ''Photography of natural landscapes'', ''Co‑op video‑gaming'', ''DIY electronics projects'',
    ''Vintage motorcycle restoration'', ''Community theater volunteer (set and lighting)'']'
  career_goals: Gregory aims to earn his NERC Certified Dispatcher credential within the next two years and advance to a senior dispatch or supervisory position, where he can mentor newer staff and lead
    operational improvements. He plans to complete an associate’s degree in electrical engineering technology and later pursue a bachelor’s degree focused on sustainable energy. His long‑term ambition is
    to manage a modern, low‑carbon power facility or become a consultant on grid modernization projects that integrate renewable resources and advanced analytics, merging his technical expertise with his
    interest in innovative, unconventional thinking.
