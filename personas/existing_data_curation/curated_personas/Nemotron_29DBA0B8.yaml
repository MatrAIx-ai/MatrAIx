personas:
  professional: Jason Hendershot, a veteran production supervisor at a mid-sized Montana manufacturing plant, blends disciplined lean‑manufacturing expertise with a creative, humanities‑inspired problem‑solving
    style, motivating diverse crews through clear organization and an appreciation for community harmony.
  sports: Jason Hendershot follows the University of Montana Grizzlies football team and the Denver Broncos, participates in the Gallatin Trail Running Club’s summer races, and spends weekends fly‑fishing
    the Missouri River, preferring low‑impact endurance activities that complement their age and love of the outdoors.
  arts: Jason Hendershot regularly volunteers at the Helena Community Arts Center, plays acoustic guitar in a folk quartet that covers Bob Dylan and Gillian Welch, and captures the rugged Gallatin landscape
    in large‑format prints, drawing inspiration from Western painter Charles M. Russell and local sculptor John Broughton.
  travel: Jason Hendershot plans meticulously for road‑trip adventures, favoring national‑park itineraries like Yellowstone, Glacier, and Banff, while dreaming of an Icelandic waterfall expedition, balancing
    their love of nature with family obligations and a modest travel budget.
  culinary: Jason Hendershot enjoys homebrewing seasonal ales, cooking smoky trout tacos with huckleberry salsa, and perfecting a hearty bison stew, boasting a solid intermediate skill set that mixes grill
    mastery with a willingness to experiment with exotic ingredients like Ethiopian berbere.
  core: Jason Hendershot is a 56‑year‑old production leader who melds frontier self‑reliance with artistic curiosity, obsessively organizes work processes, occasionally over‑commits to community projects,
    and balances a disciplined financial life with a love of craft beer, hiking, and folk music.
background:
  cultural: 'Jason grew up in a traditionally Midwestern-heritage family that settled in Montana, absorbing the frontier values of self‑reliance, hard work, and a deep respect for the natural environment.
    While his ethnic background is white American, his cultural identity blends the modest, community‑oriented ethos of the Mountain West with an appreciation for the broader American arts and humanities
    tradition fostered by his college education. This dual influence shapes his outlook: he values both the practical realities of industrial work and the enriching experiences that come from artistic expression
    and community involvement.'
attributes:
