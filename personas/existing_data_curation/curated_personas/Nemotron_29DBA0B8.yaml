  hobbies: '[''Visiting art galleries and museums'', ''Amateur photography'', ''Hiking in the Gallatin National Forest'', ''Fishing on the Missouri River'', ''Playing acoustic guitar in a folk group'',
    ''Volunteering at the Helena Community Arts Center'', ''Homebrewing craft beer'', ''Cooking for family gatherings'', ''Attending regional theater productions'', ''Participating in community volunteer
    events'']'
  career_goals: Jason aims to advance from first‑line supervisor to plant manager within the next three to five years, obtaining a Six Sigma Black Belt and spearheading a sustainability initiative that
    reduces waste and energy use at his facility. He also hopes to create a cross‑departmental arts‑and‑wellness program that blends his appreciation for creativity with employee engagement, ultimately
    positioning himself as a thought leader in both operational excellence and workplace culture within the regional manufacturing community.
