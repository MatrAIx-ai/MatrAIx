  hobbies: '[''Lego building'', ''Coloring'', ''Reading picture books'', ''Playing at the neighborhood park with a few friends'', ''Watching gentle cartoons'', ''Kid-friendly yoga'', ''Miniature train set
    play'']'
  career_goals: Even at five, Albert often talks about future jobs that involve clear rules, helping others, and a sense of safety; he imagines becoming a firefighter because of the orderly routines and
    teamwork, or a veterinarian because he wants to care for animals in a predictable, compassionate way, and he expresses a desire to one day work in a role where he can maintain a stable environment for
    his family.
