personas:
  professional: Anne Gomes, a curious preschooler who spends hours constructing elaborate towers with wooden blocks, balances inventive play with a practical preference for sturdy designs, and approaches
    each building challenge with the same competitive spirit they show in solitary puzzle games.
  sports: Anne Gomes, a tiny but determined member of the Portland Youth Soccer Club who idolizes the Portland Timbers and the Portland Trail Blazers, spends afternoons practicing dribbling alone in the
    backyard rather than joining team scrimmages, showing a competitive edge even in solitary play they enjoy.
  arts: Anne Gomes, an avid fan of the whimsical tunes of Raffi and the animated adventures of Sesame Street's Elmo, spends quiet afternoons drawing stick-figure families inspired by Mo Willems' books,
    and often re-enacts their favorite scenes from Pixar's Toy Story in solitary play, reflecting a blend of curiosity and a practical love for familiar narratives they cherish.
  travel: Anne Gomes, who dreams of a calm family road trip to Cannon Beach to build sandcastles and a future adventure to Disney World's Magic Kingdom, prefers carefully timed, low-stimulus stops over
    crowded itineraries, yet occasionally enjoys spontaneous visits to the local children's museum when the mood strikes, showing a balanced curiosity they bring to every journey.
  culinary: Anne Gomes, a picky yet enthusiastic eater who adores creamy mac and cheese, peanut butter and jelly sandwiches, and strawberry-spiked yogurt, proudly assists in stirring the cheddar cheese
    into the sauce and insists on adding a dash of cinnamon to their oatmeal, but often refuses broccoli, revealing a blend of curiosity about flavors and a practical love for comfort foods they favor.
  core: Anne Gomes, a solitary, curiosity-driven preschooler who balances inventive play with a practical streak, competitively hoards stickers while shunning noisy crowds, and embraces quiet routines despite
    occasional disorganization they occasionally display.
background:
  cultural: Anne grows up in a middle‑class, predominantly white neighborhood of San Antonio, Texas. Her family carries a Portuguese heritage reflected in occasional Portuguese meals such as caldo verde
    soup and pastel de nata, and they sprinkle simple Portuguese phrases into daily conversation. At the same time, Anne fully participates in Texas traditions like Fourth of July fireworks, Thanksgiving
    feasts, and local celebrations along the River Walk. The multicultural environment of Bexar County, with its blend of Anglo, Hispanic, and other cultures, provides a backdrop of diverse music, cuisine,
    and community events, though Anne's daily routine centers around quiet play at home and visits to the nearby suburban park.
