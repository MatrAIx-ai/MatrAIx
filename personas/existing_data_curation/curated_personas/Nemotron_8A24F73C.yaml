  career_goals: Even at four, Anne expresses a budding ambition to explore the natural world and create things. She frequently talks about wanting to "find out how bugs work" and imagines building inventions
    that help animals. As she grows, she hopes to become a scientist or engineer—perhaps an entomologist or a junior inventor—who can work independently in a quiet lab, solving complex problems and discovering
    new ways to protect the environment. Her competitive streak drives her to master puzzles and building challenges, reinforcing her desire to excel in a future scientific or technical career.
