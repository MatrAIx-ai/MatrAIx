persona_description: A public health official who is responsible for monitoring and managing the blood supply in the United States. This person is likely to be involved in the development and implementation
  of blood screening protocols, as well as the investigation of cases of transfusion-associated WNV infection. They would have a thorough understanding of the epidemiology of WNV and the testing methods
  used to detect and manage the virus. They would also be familiar with the CDC's response to the 2003 WNV outbreak, including the development of NATs and the identification of transfusion-associated cases.
