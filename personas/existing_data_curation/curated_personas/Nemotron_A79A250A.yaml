personas:
  professional: Jennie Roberge, a curious 1‑year‑old who already enjoys methodical block‑building and spontaneous color‑matching, shows early signs of analytical thinking and organization that foreshadow
    a future career in software engineering, where their competitive edge will drive precision while their calm resilience keeps them unfazed by bugs.
  sports: Jennie Roberge, a 1‑year‑old who loves crawling races, toddler gymnastics at the local Gymboree Junior Club, and splash‑time in a parent‑child swim class, energetically mimics moves they see on
    the TV broadcast of the New York Yankees, channeling their competitive streak into mastering the first steps of coordinated play.
  arts: Jennie Roberge, a 1‑year‑old fascinated by the swirling colors of a Mona Lisa print, the gentle lullaby of Beethoven’s Für Elise, and the upbeat tunes of Raffi’s Baby Beluga, regularly engages in
    sensory art sessions with finger paints and responds to live music by clapping and humming, shaping a budding appreciation for both classical and contemporary children’s art.
  travel: Jennie Roberge, a 1‑year‑old who has already enjoyed stroller‑friendly family road trips to the Grand Canyon and a weekend stay at Disneyland, prefers short, well‑planned excursions that balance
    parents’ careful budgeting with spontaneous playground stops, and they eagerly point at vivid signage, absorbing each new environment with calm curiosity.
  culinary: Jennie Roberge, a 1‑year‑old with a nascent palate for smooth avocado mash, sweet potato wedges, and banana puree, delights in self‑feeding with tiny spoons, occasionally smearing peas on their
    cheeks, and while they show a mild aversion to broccoli florets, they happily experience new textures during weekly family cook‑alongs that feature seasonal ingredients like fresh strawberries.
  core: Jennie Roberge, a calm and curious infant who balances structured play with spontaneous discovery, displays early hints of a competitive drive and artistic sensitivity, all while maintaining a relaxed
    demeanor that rarely shows distress.
background:
