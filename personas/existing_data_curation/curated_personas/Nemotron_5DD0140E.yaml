personas:
  professional: Jennifer Boult is a driven high school senior who blends disciplined project‑planning, confident public speaking, and budding Python and HTML/CSS skills to orchestrate school‑wide service
    events, design digital flyers for community health workshops, and mentor peers, embodying her curiosity‑practical blend and assertive yet cooperative leadership style.
  sports: Jennifer Boult fuels her fitness routine with cheerleading practices, weekly contemporary‑hip‑hop dance classes, Saturday hikes around Lake Whitney, and cheering on the Ellis County High School
    Eagles football team, the Dallas Cowboys, and the Houston Rockets, all while maintaining a disciplined training schedule that mirrors her organized mindset.
  arts: Jennifer Boult curates playlists featuring R&B legends like Erykah Badu and classic soul icons such as Marvin Gaye, alongside hip‑hop artists like J. Cole, while drawing inspiration from contemporary
    dance choreographers Martha Graham and Alvin Ailey and devouring sci‑fi novels by Isaac Asimov and personal‑development works by Brené Brown, which together shape her creative expression and social
    projects.
  travel: Jennifer Boult prefers weekend road trips in a family SUV, having explored Austin’s live‑music scene, the historic streets of New Orleans, and the hill country around Hill Country State Natural
    Area, while dreaming of a future study‑abroad stint in Washington, D.C., and a backpacking adventure through the Pacific Northwest’s national parks, balancing budget constraints with a love for discovery.
  culinary: Jennifer Boult enjoys mastering Southern‑style soul food dishes such as fried chicken, collard greens seasoned with smoked paprika, buttery cornbread, and comforting mac & cheese, often experimenting
    with Cajun spice blends and buttermilk marinades, and shares vibrant photos of her creations on Instagram, where she also posts quick tutorials for her friends.
  core: Jennifer Boult is an ultra‑organized teen who juggles cheerleading, coding habit‑tracker apps, cooking soulful family meals, and leading community projects, yet secretly hoards late‑night snacks
    and occasionally procrastinates on homework despite her disciplined façade.
background:
  cultural: Jennifer was raised in a close-knit African-American family in Ferris, a small town in Ellis County, Texas. Her parents instilled strong values of community service, education, and cultural
    pride. The family attends a historically Black Baptist church where she participates in the youth fellowship, celebrating traditions such as gospel music, annual homecoming events, and community outreach.
    Growing up, she observed and took part in local Juneteenth celebrations, which honor the emancipation of enslaved people in Texas, and she helped organize school-wide Black History Month projects. The
    multicultural fabric of Ellis County, with its Hispanic neighbors and Southern rural heritage, has also exposed her to a blend of cuisines, festivals, and bilingual interactions, enriching her appreciation
    for diverse perspectives. Jennifer’s cultural identity is a source of strength, guiding her commitment to uplift her community and preserve her family’s legacy.
