  career_goals: Jennifer aims to leverage her organizational talent, leadership experience, and growing technical skills toward a career that blends community impact with entrepreneurship. She plans to
    earn a scholarship to attend Texas A&M University, majoring in Business Administration with a concentration in Entrepreneurship, while also pursuing a minor in Public Health. Her long-term ambition
    is to launch a youth-focused non-profit that provides mentorship, academic tutoring, and health-education workshops for under-served students in Ellis County. In the meantime, she intends to complete
    a dual-enrollment program at a local community college to gain certifications in project management and basic health-care assistance, and to secure an internship with the Ellis County Health Department
    to gain practical experience.
