persona_description: A pharmacist who specializes in the management of acute decompensated heart failure in the inpatient setting, with a focus on providing recommendations on drug titration, monitoring,
  dose adjustments, and ensuring appropriate transition of care between inpatient and outpatient settings. She has completed both pharmacy practice and cardiology specialty residencies and works as a clinical
  pharmacist in advanced heart failure at Oregon Health and Science University. She has expertise in patient education and assessment of appropriate therapy to ensure optimal outcomes and improve overall
  care.
