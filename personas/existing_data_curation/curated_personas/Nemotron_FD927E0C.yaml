personas:
  professional: Taylor Larrieu is a seasoned facility maintenance specialist with two decades of hands‑on expertise in HVAC, electrical, plumbing, and custom woodworking, who blends a skeptical eye for
    vendor claims with a practical curiosity for emerging smart‑building technologies, and is actively pursuing the CMRP credential to transition into a supervisory role that champions renewable retrofits.
  sports: Taylor Larrieu is an avid outdoor enthusiast who hikes the trails around Gray's Lake Park with the Midwest Trail Runners club, joins occasional pick‑up basketball games at the community center,
    and cheers for the Iowa Cubs while participating in a local adult softball league.
  arts: Taylor Larrieu is a modestly theatrical soul who attends community theater workshops, immerses in historical nonfiction by authors like David McCullough, and unwinds to classic rock legends such
    as Fleetwood Mac and The Beatles, while occasionally visiting the Des Moines Art Center for contemporary exhibitions.
  travel: Taylor Larrieu is a road‑trip aficionado who favors scenic drives to places like Rocky Mountain National Park and Asheville for woodworking festivals, balances adventure with practicality by camping
    in state parks with a solar‑powered portable charger, and dreams of a sustainability‑focused study tour of Scandinavia, all while keeping family commitments and a modest travel budget in mind.
  culinary: Taylor Larrieu is a garden‑to‑table cook who delights in crafting roasted beet and goat‑cheese salads, pan‑seared trout with fresh herbs, and homemade sourdough using heirloom wheat, applying
    their woodworking skill to build a custom kitchen island that doubles as a prep station.
  core: Taylor Larrieu blends a competitive, skeptical mind with hands‑on curiosity, turning maintenance challenges into sustainable innovations while never missing a chance to craft, hike, or cheat on
    a spreadsheet with a well‑earned coffee break.
background:
  cultural: Taylor grew up in a modest, white, middle-class family in rural Iowa with deep Midwestern roots and a hint of French-Canadian heritage reflected in her surname. The regional culture emphasized
    self-reliance, a strong work ethic, and community involvement—values that still shape her approach to maintenance work and personal life. Her upbringing in the agricultural heartland taught her to appreciate
    practical solutions, while regular community gatherings, church functions, and local fairs fostered a balanced sense of social responsibility. The separation from her spouse has reinforced her independence,
    prompting her to lean into both individual pursuits and supportive local networks, embodying the pragmatic yet curious spirit typical of her cultural background.
attributes:
  skills: '["HVAC system maintenance", "Electrical troubleshooting", "Plumbing repair", "Carpentry and fixture installation", "Preventive maintenance scheduling", "CMMS (Computerized Maintenance Management
    System) operation", "Safety and OSHA compliance", "Budget tracking and vendor negotiation", "Team training and mentorship", "Basic welding and metal fabrication"]'
  hobbies: '["Woodworking", "Gardening", "DIY electronics projects", "Hiking", "Reading historical nonfiction", "Participating in local trivia leagues", "Volunteering at community senior center"]'
  career_goals: Taylor aims to transition from a frontline maintenance role to a supervisory position, ultimately becoming a facility manager for a large mixed-use property in Des Moines. She plans to earn
    the Certified Maintenance & Reliability Professional (CMRP) credential within the next two years to validate her expertise and give her a competitive edge. Leveraging her curiosity, she is exploring
    renewable energy retrofits such as solar water heating and energy-efficient lighting to position her future department at the forefront of sustainability. Taylor also aspires to mentor a new generation
    of maintenance technicians, fostering a culture of continuous improvement while maintaining the practical reliability she values.
