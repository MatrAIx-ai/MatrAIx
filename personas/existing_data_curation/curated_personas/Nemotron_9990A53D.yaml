personas:
  professional: Frankie Robinson, a veteran full‑stack software engineer with expertise in Java, Python, and JavaScript frameworks, blends a relaxed yet meticulous approach to architecture while championing
    inclusive mentorship and steering legacy healthcare modernization projects for local government agencies.
  sports: Frankie Robinson enjoys watching the Washington Capitals hockey team and the Washington Nationals baseball team, participates in a local senior walking club that meets twice a week, and occasionally
    plays casual pickleball at the community center.
  arts: Frankie Robinson frequents intimate jazz clubs in Washington, D.C., relishing the sounds of Miles Davis and Ella Fitzgerald, and attends the annual local theater festival featuring productions of
    classic plays by Arthur Miller, while their woodworking circle often creates functional art pieces inspired by mid‑century design.
  travel: Frankie Robinson favors low‑key road trips to historic towns such as Gettysburg, PA, and Savannah, GA, planning itineraries spontaneously with an eye on budget‑friendly B&Bs, and dreams of a leisurely
    pilgrimage to the Scottish Highlands to explore ancient castles.
  culinary: Frankie Robinson delights in preparing garden‑fresh dishes like roasted heirloom tomatoes with basil, sautéed kale with garlic, and a hearty vegetable stew featuring carrots and potatoes, often
    seasoning with rosemary and thyme harvested from a small herb patch.
  core: Frankie Robinson blends technical mastery with a tranquil, curiosity‑driven lifestyle, channeling a love for puzzles, gardening, and inclusive mentorship into a flexible, community‑focused career
    path.
background:
  cultural: Frankie is a second‑generation African‑American professional who grew up in the Washington, D.C. metropolitan area. Her upbringing in a close‑knit Black community instilled a strong sense of
    resilience and collective responsibility. She remains actively engaged with local cultural organizations, including the Maryland chapter of the National Society of Black Engineers and a community church
    that hosts quarterly tech outreach events. Frankie celebrates her heritage through participating in Juneteenth commemorations, supporting Black‑owned businesses in Rockville, and mentoring young Black
    women interested in STEM fields. Her cultural identity informs her commitment to fostering diversity and inclusion within the tech industry and her desire to give back to the community that shaped her.
attributes:
  skills: '[''Java'', ''Python'', ''JavaScript (React, Node.js)'', ''AWS (Lambda, EC2, RDS)'', ''Docker'', ''Kubernetes'', ''PostgreSQL'', ''MySQL'', ''CI/CD (Jenkins, GitHub Actions)'', ''Agile (Scrum,
    Kanban)'', ''System Architecture'', ''Legacy Code Refactoring'', ''Security (OWASP, authentication, encryption)'', ''Mentorship'', ''Code Review'']'
  hobbies: '[''Historical nonfiction reading'', ''Genealogy research'', ''Vegetable gardening'', ''Crossword and Sudoku puzzles'', ''Jazz and blues music appreciation'', ''Woodworking (furniture crafting)'',
    ''Introductory coding volunteer teaching'']'
  career_goals: Frankie aims to transition into a senior mentorship and thought‑leadership role over the next few years, leveraging her extensive experience to guide emerging Black women developers and
    champion inclusive engineering practices. She plans to lead a small cross‑functional team focused on modernizing legacy healthcare applications for local government agencies, while maintaining a flexible
    work schedule that supports her personal interests. Additionally, she seeks to contribute to open‑source projects that enhance accessibility, earn a DevOps professional certification, and eventually
    launch a community workshop series called 'Code & Coffee' to share practical coding insights with small groups of peers. Frankie also envisions gradually reducing her full‑time hours to pursue part‑time
    teaching at a nearby community college, ensuring a smooth transition toward retirement while leaving a lasting professional legacy.
