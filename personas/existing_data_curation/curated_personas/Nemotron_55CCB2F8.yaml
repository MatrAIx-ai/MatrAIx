  hobbies: '["Morning beach walks", "Vegetable gardening", "Bird‑watching", "Coastal fishing", "Reading historical fiction", "Crossword puzzles", "Knitting", "Science mentorship volunteering", "Bridge tournaments"]'
  career_goals: Although retired, Laura intends to remain professionally engaged by volunteering with local marine‑conservation nonprofits, mentoring high‑school students in science projects, and compiling
    a community‑focused record of shoreline changes for Carteret County. She hopes to establish a modest scholarship fund to support women pursuing STEM degrees and to write a memoir that weaves her scientific
    career with personal reflections on resilience, competition, and managing stress.
