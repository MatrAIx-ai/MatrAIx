personas:
  professional: Selina Jones, a versatile mechanical and civil engineer, blends structural analysis with aesthetic sensibility and sustainability, and they lead multidisciplinary Agile teams to develop
    IoT-enabled, generatively designed public spaces that merge function with artistic form.
  sports: Selina Jones prefers solitary fitness pursuits, regularly hiking the trails of the nearby Cypress Creek Preserve with the Georgia Trails Hiking Club, practices sunrise yoga in their backyard,
    and follows the Atlanta Falcons and Atlanta Hawks in the NFL and NBA for a touch of communal excitement on game days.
  arts: Selina Jones translates their love of acrylic painting and architectural photography into personal creative practice, often drawing inspiration from James Turrell’s light installations, Yayoi Kusama’s
    immersive patterns, and the urban compositions of Andreas Gursky, and they frequently attend exhibitions at the High Museum and the Savannah College of Art and Design Gallery to stay rooted in contemporary
    discourse.
  travel: Selina Jones cherishes meticulously planned solo journeys that blend architectural pilgrimage with quiet reflection, having explored the historic districts of Savannah and New Orleans, the modernist
    avenues of Barcelona, and the Zen gardens of Kyoto, while dreaming of a future retreat in the Japanese town of Arashiyama to study minimalist design.
  culinary: Selina Jones finds comfort in cooking Southern staples such as shrimp and grits, collard greens seasoned with home-grown basil and thyme from their herb garden, and sweet tea‑infused banana
    bread, while they experiment with low‑waste pantry meals and treat cooking as a therapeutic ritual.
  core: Selina Jones intertwines engineering precision with artistic intuition, thrives on solitary creative rituals, channels chronic worry into meticulous planning, and occasionally overindulges in coffee
    and impulse art‑supply purchases.
background:
  cultural: Selina’s cultural identity is rooted in her African‑American heritage in the Deep South. Growing up in Jackson, Mississippi, she was immersed in a rich tapestry of community traditions, gospel
    and blues music, and the legacy of the civil‑rights movement, which fostered resilience and a strong sense of social responsibility. Family gatherings centered around storytelling and Southern cuisine
    reinforced her appreciation for communal bonds. She actively participates in local cultural events such as the Mississippi Blues Trail tours and Black History Month celebrations, and she engages with
    professional networks like the local chapter of the National Society of Black Engineers to support and uplift other Black professionals in STEM.
attributes:
  skills: '[''Structural analysis'', ''Computer‑aided design (SolidWorks, AutoCAD)'', ''Python programming'', ''Data modeling and visualization'', ''Project management (Agile, Scrum)'', ''Technical writing
    and documentation'', ''Sustainability assessment (LEED)'', ''Problem solving'', ''Cross‑functional team coordination'']'
  hobbies: '[''Painting (acrylic)'', ''Architectural photography'', ''Reading (philosophy, modern art)'', ''Journaling'', ''Yoga'', ''Solo hiking'', ''Visiting art galleries'', ''Cooking Southern dishes'',
    ''Gardening (herbs)'', ''Arduino hobby projects'']'
  career_goals: Selina aims to advance to a senior engineering or project‑lead position within the next five years, focusing on sustainable infrastructure projects that blend functional engineering with
    artistic design elements. She is interested in leading a multidisciplinary team developing smart, energy‑efficient public spaces in the Southeast, leveraging IoT and generative design. Selina also aspires
    to mentor other Black women entering STEM, potentially through a formal mentorship program or as a speaker at NSBE conferences. Long‑term, she is considering pursuing a Master’s degree in Sustainable
    Architecture to deepen her expertise at the intersection of engineering, design, and community impact.
