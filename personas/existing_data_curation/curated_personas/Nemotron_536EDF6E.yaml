  career_goals: Francisco aims to pursue a career in software engineering or interactive technology, with a long‑term goal of creating educational games and digital tools that benefit his local Latino community.
    He dreams of attending a university such as UC Irvine to study computer science, where he can deepen his coding abilities and explore user‑experience design. In the future, he hopes to launch a small
    startup that develops affordable tech solutions for Hispanic‑owned businesses, blending his pragmatic mindset with his desire to give back to the community that shaped him.
