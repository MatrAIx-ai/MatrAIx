personas:
  professional: Francisco Castillo, a 14-year-old budding teen electronics hobbyist and strategic gamer, merges his curiosity for Arduino projects with a practical knack for optimizing gaming rigs, allowing
    them to constantly iterate on hardware setups while they balance schoolwork.
  sports: Francisco Castillo, a 14-year-old enthusiastic skateboarder at the local skate park and weekend soccer player on the community field, cheers for the LAFC and follows the Los Angeles Lakers, and
    they often practice new tricks while wearing his favorite branded sneakers.
  arts: Francisco Castillo, a 14-year-old digital art aficionado, creates memes and pixel art inspired by Bad Bunny's reggaeton beats and J. Cole's hip-hop verses, and they spend evenings sketching fan-art
    of beloved video-game characters using Photoshop and Procreate.
  travel: Francisco Castillo, a 14-year-old who dreams of visiting Tokyo's Akihabara district for its gaming culture, also enjoys short family road trips to the nearby desert park and has a scrapbook of
    photos from a memorable weekend at the beach in Baja, and they balance school schedules with a yearning for immersive experiences.
  culinary: Francisco Castillo, a 14-year-old hands-on kitchen helper, loves assembling tacos with fresh cilantro, lime, and chorizo, and they delight in mastering the art of perfect tamales while occasionally
    experimenting with ramen bowls spiced with sriracha and boiled eggs.
  core: Francisco Castillo, a 14-year-old who blends teenage curiosity with a laid-back resilience, juggling video-game tactics, skate tricks, and family cooking sessions while they habitually forget homework
    until the last minute.
background:
  cultural: Francisco is a second‑generation Mexican‑American raised in Santa Ana, California. His parents immigrated from Mexico and speak Spanish at home, so he grew up bilingual and often switches between
    languages depending on the context. Family gatherings are centered around Mexican traditions such as Día de los Muertos altars, celebrating Mexican Independence Day, and sharing homemade tamales during
    holidays. He regularly attends cultural festivals at the local Latino community center and participates in a Catholic youth group, reflecting the modest religious upbringing common in his family. The
    vibrant Mexican-American community of Orange County influences his food preferences, music tastes, and his sense of identity, while his schooling and friendships expose him to broader American cultural
    norms. This blend of cultures gives him a strong appreciation for his heritage and a desire to contribute positively to both his local community and the wider society.
