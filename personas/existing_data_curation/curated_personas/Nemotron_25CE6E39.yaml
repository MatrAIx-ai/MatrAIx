  hobbies: '[''gardening'', ''quilting'', ''reading classic literature'', ''crossword puzzles'', ''walking dogs'', ''book club'', ''listening to big band music'', ''volunteering at church'', ''birdwatching'',
    ''baking traditional recipes'']'
  career_goals: Although retired from formal employment, Gina is committed to staying active and purposeful within her community. She aims to continue mentoring younger volunteers at the local senior center,
    sharing her organizational know‑how and crafting techniques. Preserving family traditions is a personal ambition; she plans to compile a handwritten cookbook of cherished New England recipes and a scrapbook
    of her quilting patterns for future generations. Additionally, Gina hopes to complete a senior‑volunteer certification, enabling her to take on a more formal advisory role in community planning, and
    to maintain her health and independence through regular activity and social engagement.
