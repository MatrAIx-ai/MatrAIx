  hobbies: '[''Desert gardening'', ''Southern-inspired cooking'', ''Reading historical fiction'', ''Bridge (card game)'', ''Community trivia nights'', ''Quilting'', ''Genealogical research'', ''Church choir
    participation'']'
  career_goals: Although retired from formal employment, Shamia aims to channel her expertise into community leadership. She seeks a board position at a local nonprofit focused on youth empowerment, where
    she can mentor Black women entrepreneurs and apply her competitive spirit to drive measurable outcomes. She also plans to document her family's historical narrative, blending her curiosity with practical
    research methods, and hopes to publish a memoir that highlights resilience across generations. Travel to the Caribbean to explore ancestral roots is another personal ambition, balanced with her responsibility
    to support her grandchildren's education.
