personas:
  professional: Shamia Thomas, a retired office administrator turned community nonprofit strategist, leverages their decades‑long expertise in budgeting, event coordination, and IT troubleshooting with
    a competitive edge and skeptical rigor, and they transform volunteer projects into measurable outcomes while mentoring younger volunteers.
  sports: Shamia Thomas enjoys low‑impact fitness through a senior walking club that meets twice a week, cheers on the Atlanta Braves during baseball season, participates in a community senior softball
    league, and treats bridge tournaments as a competitive mental sport, all while they keep a pragmatic eye on staying active without overexertion.
  arts: Shamia Thomas finds artistic refuge in devouring historical fiction by Hilary Mantel, swaying to the smooth jazz of Duke Ellington, attending community theater productions of Tennessee Williams'
    'The Glass Menagerie,' and collecting vintage Southern postcards, and they let these creative outlets inform both their storytelling and community workshops.
  travel: Shamia Thomas prefers meticulously planned trips that balance cultural immersion with comfort, having savored a guided historic tour of Savannah and a panoramic road trip along the Blue Ridge
    Parkway, while dreaming of a Caribbean cruise to Saint Lucia to explore ancestral roots, and they budget carefully to support their grandchildren’s education.
  culinary: Shamia Thomas, an adept home chef, reimagines Southern classics such as roasted collard greens with smoked turkey, low‑sugar peach cobbler, and black‑eyed pea hummus, pairing them with nutrient‑dense
    staples like quinoa, olive oil, and fresh citrus harvested from their desert garden, and they constantly tweak recipes to maximize nutrition and cost efficiency.
  core: Shamia Thomas blends a relentless competitive spirit with nurturing curiosity, turning meticulous budgeting, desert gardening, and bridge victories into a life where exacting facts meet heartfelt
    storytelling, even if they hoard discount coupons like trophies.
background:
  cultural: Shamia was born and raised in the Deep South, where she absorbed a strong African‑American cultural heritage rooted in church, family storytelling, and community solidarity. After moving to
    Las Vegas in her early thirties, she became an active member of the local Black community, celebrating Juneteenth, Kwanzaa, and gospel music traditions. Her cultural identity informs her commitment
    to mentorship and preserving family history, and she bridges Southern roots with the diverse mosaic of Nevada's Black diaspora. She navigates the nuances of being a Black woman in a predominantly non‑Black
    environment with both skepticism toward external narratives and pride in her cultural legacy.
