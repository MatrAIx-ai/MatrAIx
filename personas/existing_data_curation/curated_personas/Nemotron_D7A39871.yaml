personas:
  professional: Thomas Vanhorn, a seasoned physical therapist with 30 years of experience in manual therapy and orthopedic assessment, leverages their methodical documentation and sociable bedside manner
    to develop art‑infused rehabilitation programs that motivate patients while positioning themselves for a clinical lead role.
  sports: Thomas Vanhorn, an avid outdoor enthusiast, leads weekly hikes with the Lincoln Trail Hiking Club, rides with the Lincoln Cycling Club, occasionally joins a local recreational soccer team, always
    wears a trail‑ready Patagonia jacket, and roots for the Omaha Storm (NHL) and Kansas City Chiefs (NFL) while occasionally betting on the occasional College World Series game.
  arts: Thomas Vanhorn, a regular patron of the Lincoln Museum of Art and volunteer at the Nebraska State Fair art exhibit, immerses themselves in community theater productions at the Lincoln Community
    Playhouse, plays acoustic guitar renditions of Bob Dylan and Joni Mitchell at neighborhood gatherings, and finds inspiration in the prairie photography of Ansel Adams alongside the vibrant canvases
    of Georgia O’Keeffe.
  travel: Thomas Vanhorn favors meticulously planned road trips that combine photography hikes through Badlands National Park, cultural immersion in the historic streets of Edinburgh, and weekend escapes
    to Santa Fe’s art markets, balancing family commitments with a modest travel budget that prioritizes off‑season airfare discounts and occasional luxury spa stays.
  culinary: Thomas Vanhorn, an enthusiastic home gardener, delights in crafting heirloom tomato bruschetta, beet and goat‑cheese salad, and slow‑roasted chicken seasoned with rosemary and local honey, often
    pairing meals with a Nebraska‑sourced craft beer while occasionally over‑spicing dishes in a quest for bold flavor and leaving the kitchen a tad messier than intended.
  core: Thomas Vanhorn, a 54‑year‑old physical therapist who fuses art, outdoor adventure, and meticulous organization, constantly juggles community projects, budget spreadsheets, and a lingering habit
    of over‑packing for weekend trips.
background:
  cultural: Thomas grew up in the Midwestern United States, rooted in the values of community, hard work, and modesty typical of rural Nebraska. His family heritage includes German and Dutch ancestry, reflected
    in traditions such as a love for seasonal festivals, farm-to-table cooking, and an appreciation for craftsmanship. He identifies with the broader white American cultural experience of the region, which
    emphasizes civic participation, support for local arts, and a pragmatic outlook balanced by an openness to new ideas. He maintains ties to his Lutheran church, which reinforces a sense of service and
    community involvement.
attributes:
  skills: '[''Manual therapy'', ''Therapeutic exercise design'', ''Orthopedic and sports injury assessment'', ''Gait and functional movement analysis'', ''Patient education and counseling'', ''Clinic operations
    and documentation'', ''Interdisciplinary coordination'', ''Evidence‑based practice research'', ''Telehealth service delivery'', ''Assistive device fitting'']'
  hobbies: '[''Visiting art galleries'', ''Community theater attendance'', ''Volunteering at art exhibitions'', ''Group hiking'', ''Cycling trips'', ''Pottery classes'', ''Gardening'', ''Landscape photography'',
    ''Acoustic guitar playing'', ''Reading on health and travel'']'
  career_goals: Thomas aims to become a clinical lead in his practice, guiding a team of therapists while championing innovative, art‑infused rehabilitation programs that tap into his appreciation for creativity.
    He plans to earn a board certification as a Clinical Specialist in Orthopedics, develop a community wellness initiative that combines physical therapy with local art workshops, and mentor upcoming therapists
    through a structured residency program. In the longer term, he aspires to open a boutique private practice focused on integrative musculoskeletal health, emphasizing holistic care, research participation,
    and community outreach in Lincoln and the broader Lancaster County area.
