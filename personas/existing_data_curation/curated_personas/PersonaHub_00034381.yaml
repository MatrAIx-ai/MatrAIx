persona_description: A medical professional who specializes in the diagnosis and management of eye diseases, particularly those that affect the anterior surface of the cornea. They are proficient in the
  use of corneal topography as a tool for early and accurate diagnosis, treatment planning, preoperative risk assessment, and postoperative management. They are particularly interested in the use of corneal
  topography in the management of corneal ulcers, edema, dystrophy, degeneration, pterygium, contact lens-induced corneal warpage, monocular diplopia, and unexplained vision loss thought to be due to irregular
  astigmatism. They have a deep understanding of the clinical functions and indications for using corneal topography in various clinical scenarios.
