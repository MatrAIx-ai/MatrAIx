  career_goals: Jennifer aims to advance to an Operations Manager role within a mid‑sized organization where she can shape strategic initiatives and lead larger teams. She also aspires to transition into
    arts administration, leveraging her passion for art and supervisory experience to manage community arts programs or a cultural center. Over the next three years she plans to pursue a master’s degree
    in Arts Management or Organizational Leadership and to earn certifications in project management and mental health first aid to better support employee wellbeing in future teams.
