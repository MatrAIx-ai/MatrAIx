  hobbies: '[''Cooking Mexican recipes'', ''Yoga'', ''Reading historical fiction and Mexican literature'', ''Salsa dancing'', ''Volunteering at a community center for immigrants'', ''Exploring Las Vegas
    culinary scene'', ''Puzzle solving'', ''Journaling'']'
  career_goals: Mariana aims to move beyond her receptionist role into a supervisory position within the hospitality sector, such as a Front Office Manager at a casino hotel. She plans to complete her associate
    degree in Business Administration and earn a certification in Hospitality Management. Over the next five years, she hopes to lead a team of front‑desk staff, develop training programs for new hires,
    and eventually transition into a community liaison role that bridges tourism services with the local Mexican‑American community in Las Vegas.
