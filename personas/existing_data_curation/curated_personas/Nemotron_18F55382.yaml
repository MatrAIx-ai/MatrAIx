personas:
  professional: Mariana Catalano, a 26‑year‑old front‑desk professional in Las Vegas, leverages bilingual fluency and meticulous organization to manage multi‑line phone systems, greet visitors, and resolve
    conflicts with poise, while eyeing a promotion to Front Office Manager and pursuing an associate degree in Business Administration alongside a Hospitality Management certification.
  sports: Mariana Catalano enjoys weekend yoga classes, participates in a local 5K running club, and follows the Las Vegas Golden Knights and Raiders, cheering them on at the arena while occasionally joining
    a recreational volleyball league for extra cardio.
  arts: Mariana Catalano immerses herself in historical fiction and contemporary literature, often discussing works by Juan Rulfo and Isabel Allende at book club meetings, while also dancing salsa to the
    rhythms of Luis Miguel and listening to the soulful ballads of Lila Downs, reflecting a deep appreciation for narrative and music.
  travel: Mariana Catalano favors thoughtfully planned trips that blend cultural immersion and relaxation, having explored the Day of the Dead festivities in Oaxaca, the vibrant street art of Barcelona,
    and the natural scenery of the Grand Canyon, while dreaming of a future pilgrimage to the historic plazas of Mexico City.
  culinary: Mariana Catalano delights in preparing family recipes such as chiles en nogada, homemade tamales, and pozole, honing her cooking skills with fresh chilies, masa, and epazote, yet she admits
    to occasionally over‑seasoning dishes while savoring the occasional tasting menu at Las Vegas's eclectic eateries.
  core: Mariana Catalano balances disciplined organization at work with a love for salsa dancing, culinary storytelling, and strategic budgeting, all while navigating seasonal allergies through yoga and
    a keen eye on future leadership roles.
background:
  cultural: Mariana is a first‑generation Mexican‑American who grew up in a bilingual household. Her parents emigrated from Mexico, and she was raised with strong family ties, Catholic traditions, and an
    appreciation for Mexican holidays such as Día de los Muertos and Cinco de Mayo. Fluent in both Spanish and English, she often serves as a cultural bridge in her workplace, helping Spanish‑speaking guests
    feel welcome. While she embraces her Mexican heritage through food, music, and community events, she also values the multicultural environment of Las Vegas, integrating American independence with Mexican
    collectivist values.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Multi‑line phone handling'', ''Appointment scheduling'', ''Data entry'', ''Microsoft Office Suite'', ''Google Workspace'',
