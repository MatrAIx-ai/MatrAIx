  hobbies: '[''Acrylic painting'', ''Watercolor sketching'', ''Photography (landscape)'', ''Reading speculative fiction and poetry'', ''Journaling and creative writing'', ''Yoga and meditation'', ''Hiking
    in East Texas forests'', ''Herb gardening'', ''Experimenting with fusion cooking (Tex-Mex and world cuisines)'', ''Ukulele playing (self‑taught)'', ''Visiting local art galleries'']'
  career_goals: Dorothy aims to deepen her impact on rural health by pursuing a Doctor of Nursing Practice (DNP) with a focus on health equity in underserved Texas communities. She envisions establishing
    a community health hub in Anderson County that blends primary care with wellness programs, including art‑therapy workshops and nutrition education. She aspires to lead interdisciplinary teams, mentor
    emerging nurse practitioners, and influence state health policy to improve access and quality of care. In the longer term, she hopes to author a guidebook on integrating creativity into patient education
    and become a recognized speaker at national nursing conferences.
