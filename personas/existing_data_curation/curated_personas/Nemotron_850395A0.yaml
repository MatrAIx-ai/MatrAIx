personas:
  professional: Jalen Pratt, a retired facilities maintenance veteran turned community mentor, leverages decades of HVAC and electrical expertise, woodworking skills, and meticulous event‑planning abilities
    to guide apprentices, coordinate local art exhibitions, and push for board membership at the senior center, all while channeling a competitive yet organized mindset into every project.
  sports: Jalen Pratt, a devoted fan of the Philadelphia Eagles and Phillies, joins the Lebanon County Senior Center Walking Group for brisk autumn strolls through historic districts, plays weekly pickleball
    at the community recreation center in winter, and participates in a local senior bowling league that meets every Thursday night.
  arts: Jalen Pratt, an avid explorer of regional galleries featuring contemporary artists like Mark Rothko and Yayoi Kusama, curates personal photo essays of community events, devotes evenings to listening
    to classic jazz legends such as Miles Davis and B.B. King on his cherished vinyl collection, and applies the same strategic focus he enjoys in senior chess tournaments to his appreciation of visual
    art.
  travel: Jalen Pratt prefers meticulously planned road trips that balance cultural immersion with comfortable pacing, having recently toured Gettysburg’s historic battlefields, taken a leisurely weekend
    in New Orleans for its music and cuisine, and dreaming of a spring visit to Paris’s Musée d’Orsay, while always budgeting trips within a modest retirement allowance.
  culinary: Jalen Pratt, a competent home cook, revives Southern soul‑food staples like shrimp and grits, collard greens seasoned with smoked paprika, and sweet potato pie, often experimenting with heirloom
    cornmeal and buttermilk while pairing the cooking session with his favorite vintage vinyl jazz records.
  core: Jalen Pratt merges a lifelong handyman’s precision with a collector’s nostalgia, balancing rigorous community mentorship and chess competitiveness against a penchant for hoarding vintage vinyl and
    occasionally over‑scheduling their own calendar.
background:
  cultural: Jalen’s family traces its roots to the American South, with grandparents who migrated north during the Great Migration, settling in Pennsylvania in the 1950s. Growing up in a close‑knit Black
    community, his upbringing was shaped by the traditions of church, storytelling, and a deep appreciation for African‑American music and cuisine. Living in Lebanon, a largely white rural area, he has
    become a bridge between cultures, often volunteering to lead Black History Month events and sharing his heritage through art exhibitions and mentorship, while maintaining strong ties to his extended
    family and cultural identity.
