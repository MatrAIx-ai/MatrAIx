  career_goals: Although retired, Jalen aims to channel his experience into mentoring younger tradespeople in Lebanon County through a community apprenticeship program. He also aspires to curate a rotating
    local art exhibit that highlights emerging Black artists from the region, and to serve on the board of the senior center to expand cultural programming for older adults.
