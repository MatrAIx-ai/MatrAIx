  career_goals: Marcelle aims to advance to a lead systems architect role where she can shape technology strategies that prioritize accessibility and user well-being. She aspires to lead interdisciplinary
    projects that blend art and technology, such as creating inclusive digital platforms for mental-health support and interactive art installations. In the long term, she hopes to establish a community
    tech hub in Riverview that offers mentorship, workshops, and resources for underrepresented groups, aligning her professional growth with her compassion and desire to foster harmony.
