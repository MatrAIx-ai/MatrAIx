personas:
  professional: Marcelle Butts, a 26‑year‑old computer systems analyst in Riverview, blends meticulous data modeling, Python scripting, and cloud expertise with a knack for empathetic stakeholder facilitation,
    turning chaotic project workshops into inclusive design sprints where they champion accessibility and user well‑being.
  sports: Marcelle Butts stays active by joining a Sunday beach‑volleyball club at Fort DeSoto, practicing sunrise yoga at a nearby studio, and cheering on the Tampa Bay Buccaneers and Rays while occasionally
    playing in a casual co‑ed soccer league at the community park.
  arts: Marcelle Butts spends weekends wandering the Tampa Museum of Art to study the bold colors of Frida Kahlo and the street wit of Banksy, then returns home to experiment with acrylics, strum acoustic
    covers of John Mayer, and improvise scenes at the local theater, while hosting board‑game nights that feature strategy titles like Terraforming Mars and Catan, feeding their eclectic creative appetite.
  travel: Marcelle Butts favors spontaneous weekend escapes, having road‑tripped to the historic streets of Savannah, the jazz‑filled neighborhoods of New Orleans, and the pastel‑hued villages of the Florida
    Keys, while day‑dreaming about a future art‑focused retreat in Asheville, North Carolina, balancing wanderlust with their community‑center volunteer schedule.
  culinary: Marcelle Butts, a moderately skilled home cook, adores assembling fresh fish tacos with cilantro‑lime slaw, whipping up quinoa bowls tossed with roasted sweet potatoes and feta, and experimenting
    with herb‑infused olive oil for a homemade Margherita pizza, while also relishing farmer’s‑market finds like heirloom tomatoes and locally sourced basil that inspire their experimental palate.
  core: Marcelle Butts is a talkative, art‑loving systems analyst whose compassionate yet anxious nature drives them to blend technology with creativity, even as their relaxed approach to planning and occasional
    forgetfulness keep life delightfully unpredictable.
background:
  cultural: Marcelle grew up in a middle-class, predominantly white suburban neighborhood in Riverview, Florida, within an Anglo-American family that values traditional Southern hospitality and community
    involvement. Proximity to the culturally diverse Tampa Bay area exposed her to a vibrant art scene, music festivals, and a variety of culinary traditions, fostering an appreciation for multicultural
    influences while maintaining a core American cultural identity rooted in holidays like Thanksgiving, independence celebrations, and family gatherings.
