personas:
  professional: Joaquin Ramirez is a 16‑year‑old aspiring automotive technician who leverages his systematic planning, bilingual communication, and hands‑on troubleshooting to excel in school workshops
    and community repair projects, and they apply the same methodical precision he uses when assembling model kits.
  sports: Joaquin Ramirez regularly competes in a school intramural basketball league, practices drills on Tuesdays and Thursdays, and supports the Brooklyn Nets, while they also train with the local Brooklyn
    Basketball Club to maintain structured fitness.
  arts: Joaquin Ramirez immerses themselves in traditional folk music by listening to Andean singer Juan Carlos, reveres classic salsa tracks by Celia Cruz, and channels that rhythmic appreciation into
    building intricate LEGO architecture models during downtime, often sharing his creations at the community center's art showcase.
  travel: Joaquin Ramirez enjoys planning organized weekend trips, having explored the historic plazas of Quito, the bustling streets of Manhattan's Lower East Side, and the seaside boardwalk of Coney Island,
    while they dream of hiking the Andes to experience the altitude that inspired their family’s culinary traditions.
  culinary: Joaquin Ramirez loves cooking family recipes such as hand‑folded empanadas, fresh ceviche with lime and cilantro, and arroz con menestra, mastering the balance of spices and freshness, and they
    experiment with ingredients like plantain and chonto fish while occasionally indulging in a slice of New York pizza to unwind.
  core: Joaquin Ramirez is a methodical teen who blends structured routines—painting model kits, playing basketball, and mastering family recipes—with a quiet ambition to become an automotive technician
    and a future restaurateur, all while navigating fast‑paced city life with disciplined planning and occasional late‑night gaming marathons, which they treat as a rewarding escape.
background:
  cultural: Joaquin is a second‑generation Ecuadorian American raised in the vibrant borough of Brooklyn, New York. At home, Spanish is the primary language, and family gatherings revolve around traditional
    dishes, Catholic celebrations, and stories of his parents’ migration. He maintains close ties to the Ecuadorian diaspora through the local community center, where he participates in cultural festivals,
    folk dancing, and Spanish language events. While deeply rooted in his heritage, he also embraces the multicultural fabric of Brooklyn, navigating both Spanish‑speaking and English‑speaking environments
    with ease. His identity blends the values of familial responsibility, respect for tradition, and the pragmatic, fast‑paced lifestyle of the city, shaping his outlook and daily routines.
