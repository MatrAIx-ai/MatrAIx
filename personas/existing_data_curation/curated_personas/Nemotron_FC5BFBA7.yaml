  career_goals: Joaquin aims to complete his GED by age 18 and then enroll in a vocational program focused on automotive technology or culinary arts, fields that combine his love for hands‑on work with
    his preference for routine and structure. He envisions starting as an entry‑level automotive technician, mastering vehicle diagnostics and repair, and eventually progressing to a service manager role
    where his organizational strengths can shine. Parallel to this, he hopes to support his family’s tradition of cooking by gaining formal training in Ecuadorian cuisine, with a long‑term ambition to open
    a modest neighborhood restaurant that offers authentic dishes in a dependable, family‑friendly setting. Throughout his career path, he prioritizes stability, clear progression, and the ability to contribute
    reliably to his community.
