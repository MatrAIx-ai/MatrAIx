personas:
  professional: Alvin Faust blends master carpenter precision with strategic business acumen, leading small crews to craft custom, art‑inspired furniture while they use SketchUp and Fusion 360 to translate
    abstract sketches into code‑compliant, sustainably sourced pieces.
  sports: Alvin Faust fuels fitness through weekend hikes in Umstead State Park and occasional 5 k runs with a modest local running club, while they cheer on the Charlotte Knights as a dedicated seasonal
    baseball fan and keep a modest schedule of light weight‑training at home.
  arts: Alvin Faust channels imagination into abstract sketches, acrylic paintings, and mixed‑media collages that double as furniture prototypes, while they unwind to Miles Davis and Beethoven, strum a
    ukulele for personal solace, and regularly attend gallery openings featuring emerging artists like Nadia Shwartz.
  travel: Alvin Faust plans travel with a meticulous spreadsheet, opting for weekend getaways to Asheville’s craft breweries and architecture tours, while they dream of a slow‑travel immersion in Copenhagen’s
    design museums, balancing budget constraints with a wish for quiet, inspiration‑rich locales.
  culinary: Alvin Faust favors farm‑to‑table cuisine, skillfully crafting miso‑ramen with locally sourced shiitake mushrooms and heirloom tomatoes, while they enjoy occasional splurges on artisan cheese
    boards at the downtown market and consider their kitchen ventures a calming counter‑balance to construction chaos.
  core: Alvin Faust is a quietly intense artisan who fuses imaginative design with disciplined craftsmanship, wrestles with perpetual worry, and finds refuge in solitary sketching, jazz, and the scent of
    fresh‑cut timber.
background:
  cultural: Alvin was raised in the African‑American community of Raleigh, where the legacy of Southern Black craftsmanship and storytelling shapes his worldview. He identifies with the resilience and collaborative
    spirit of his heritage, often incorporating subtle African‑inspired motifs and reclaimed materials that echo the region’s historical resourcefulness. His family’s church and neighborhood gatherings
    emphasized mutual support, influencing his cooperative work style. While navigating the broader North Carolina cultural landscape, he remains aware of the systemic challenges faced by Black professionals,
    which fuels his commitment to mentorship and creating inclusive spaces within the trades.
