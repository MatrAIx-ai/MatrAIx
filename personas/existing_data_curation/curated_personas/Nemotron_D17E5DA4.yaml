  hobbies: '[''abstract painting'', ''sketching'', ''reading speculative fiction'', ''listening to jazz'', ''playing ukulele'', ''hiking in Umstead State Park'', ''photography of urban architecture'', ''volunteering
    at community youth workshops'', ''collecting vintage hand tools'', ''exploring local art galleries'']'
  career_goals: Alvin aims to transition from contractor work to owning a boutique studio that produces limited‑edition, art‑inspired furniture. He envisions expanding the business to include apprenticeships
    for underserved youth, integrating sustainable practices, and selling pieces through curated online platforms and local galleries. Over the next five years, he hopes to establish a reputation as a regional
    “artisan‑designer,” secure a steady client base that values custom craftsmanship, and achieve financial stability that allows him more time for personal creative projects without compromising his well‑being.
