  career_goals: Diane plans to pursue a bachelor’s degree in visual communication or museum studies, aiming to become a curator or arts program coordinator at a regional museum or cultural institution.
    In the short term, she intends to build a freelance portfolio in photography and graphic design, securing contracts with local businesses, community events, and small galleries. She also aspires to
    launch a community‑based art initiative that engages small groups in collaborative, unconventional art projects, leveraging her methodical planning and love for new ideas. Long‑term, she hopes to combine
    her analytical and artistic interests in a user‑experience research role for a tech startup focused on creative tools, while maintaining the stability of a steady creative career.
