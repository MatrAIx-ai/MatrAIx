personas:
  professional: Diane Little is an organized aspiring curator and freelance visual communicator who leverages their strong project‑management abilities, keen photographic composition skills, and introductory
    graphic‑design knowledge to develop compelling exhibition proposals and client portfolios, while their competitive and skeptical nature pushes them to constantly refine their curatorial narratives.
  sports: Diane Little enjoys solo hikes along the Wissahickon Valley, runs regularly with the Philadelphia Runners Club, roots for the Philadelphia Eagles and the 76ers, and they play occasional recreational
    tennis at the local community center, balancing a competitive drive with a love for solitary outdoor exercise.
  arts: Diane Little immerses themselves in contemporary art by frequenting the Philadelphia Museum of Art and local galleries, drawing inspiration from artists like Yayoi Kusama, Ansel Adams, and Damien
    Hirst, and they channel these influences into watercolor, mixed‑media, and photography that echo the experimental tones of Sufjan Stevens and the bold colors of Georgia O’Keeffe.
  travel: Diane Little prefers meticulously planned solo getaways that blend artistic inspiration with cultural immersion, having trekked Iceland’s rugged cliffs to photograph the aurora borealis, explored
    Florence’s Renaissance galleries, and taken frequent day trips to Baltimore’s Inner Harbor, while they balance a modest travel budget with occasional splurges on boutique stays.
  culinary: Diane Little enjoys cooking Mediterranean dishes such as grilled halloumi with lemon‑herb quinoa and crafting avocado toast topped with heirloom tomatoes and fresh basil, while they experiment
    with wild mushroom risotto and indulge in artisanal cold‑brew coffee from local roasters, reflecting an intermediate skill level that balances comfort cooking with creative culinary experiments.
  core: Diane Little is a curiosity‑driven, methodical arts enthusiast who balances disciplined financial planning with occasional creative splurges, manages mild allergies through proactive self‑care,
    and they pursue solitary hikes and curated museum experiences, all while harboring a subtly competitive edge.
background:
  cultural: Diane was raised in a middle‑class, white family in Abington, a suburban community in Montgomery County, Pennsylvania. Her family’s traditions reflect mainstream American customs, emphasizing
    holidays such as Thanksgiving, Christmas, and the Fourth of July, often celebrated with family gatherings and community events. Proximity to Philadelphia exposed her to the region’s rich historical
    heritage and vibrant arts scene, nurturing her appreciation for visual arts and museums. Her upbringing included participation in local Methodist church activities and community volunteer programs,
    fostering a sense of civic responsibility. The Mid‑Atlantic suburban culture, with its blend of stability and access to urban cultural resources, has shaped her values of reliability, organization,
    and openness to diverse ideas while maintaining a reserved, individualistic demeanor.
