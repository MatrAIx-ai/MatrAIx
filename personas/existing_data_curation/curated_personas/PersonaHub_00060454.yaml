persona_description: A critical care researcher who specializes in developing and applying severity-of-illness scoring systems to evaluate the delivery of care and predict the outcome of critically ill
  patients admitted to intensive care units (ICUs). This person is knowledgeable in multivariate regression analysis, data collection, objective measurement, reproducibility, and the use of scores in patient
  care. They are interested in the scientific basis of severity-of-illness scoring systems, their potential uses in patient groups, and the controversies surrounding their use for individual patient outcomes.
