personas:
  professional: Nadirah Poitier is a full‑stack software developer who pairs a pragmatic, process‑driven mindset with hands‑on mentorship; they excel in Agile sprints, enforce thorough code reviews, and
    champion inclusive hiring while steering high‑impact cloud‑native projects toward senior technical leadership.
  sports: Nadirah Poitier spends weekends hiking the Griffith Park trails, they lead a community salsa‑fit class, proudly root for the Los Angeles Lakers during NBA season, and enjoy a weekly yoga session
    at a local studio to balance competitive drive with mindful movement.
  arts: Nadirah Poitier immerses in contemporary literature that challenges social norms, they relish the improvisational brilliance of John Coltrane and Miles Davis on jazz evenings, and channel that artistic
    energy into vibrant salsa and hip‑hop dances at community studios.
  travel: Nadirah Poitier favors soulful city escapes, they have visited New Orleans for its jazz and food scene, trekked the vineyards of Napa, dreamed of strolling through Kyoto’s cherry‑blossom avenues,
    and plan trips that blend cultural immersion with opportunities to mentor local coding groups.
  culinary: Nadirah Poitier loves cooking Southern comfort meals such as slow‑braised collard greens, crispy fried chicken, and sweet‑potato pie, they skillfully blend smoked paprika, cayenne, and a splash
    of buttermilk for extra flavor, and often host extended family feasts despite a habit of over‑seasoning and occasionally burning the crust.
  core: Nadirah Poitier blends disciplined engineering precision with vibrant community activism, balancing a competitive drive and occasional stress‑induced worry against a love for dance, jazz, and soulful
    cooking.
background:
  cultural: Nadirah identifies as African American and grew up in a close‑knit Black community in Los Angeles. Her family roots trace back to the Southern United States, and she carries forward traditions
    of storytelling, music, and food. She celebrates cultural milestones such as Juneteenth and participates in local Black cultural festivals. As a Black woman in tech, she is actively involved in organizations
    like Black Women in Tech, using her platform to advocate for representation, mentorship, and social justice within the industry.
