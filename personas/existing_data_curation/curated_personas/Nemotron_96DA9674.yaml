  career_goals: She aims to move into a senior technical leadership role within the next five years, targeting positions such as Tech Lead or Engineering Manager where she can shape architecture, drive
    high‑impact projects, and champion inclusive hiring practices. Nadirah plans to earn an AWS Solutions Architect certification and deepen her expertise in cloud‑native design. Long‑term, she dreams of
    launching her own SaaS product that addresses financial literacy challenges in underserved Black communities, while maintaining a stable work‑life balance to mitigate stress.
