persona_description: A sociologist or urban planner who is interested in the study of urban mobility and its impact on daily habits, public spaces, and the relationship between humans and their environment.
  They are curious about the shifts in transportation and communication patterns in Kampala and how they influence the daily lives of the city dwellers. They are also interested in the role of technology
  in shaping people's movements and perceptions and how it affects their ability to intervene and control their habits. They seek to explore the performative spaces and their impact on the landscape and
  the present moment. They are interested in the biennial Kampala Art Biennale and its potential to create debates and experiences that challenge the global issue of how we inhabit mobility today.
