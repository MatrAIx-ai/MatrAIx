persona_description: A professional marine protected area manager or researcher who is interested in the effectiveness of marine protected areas and is looking for tools and resources to evaluate and improve
  management measures. They are likely to be familiar with the IUCN, WWF, and NOAA organizations and their roles in conservation and management. They may also have a background in biological, socio-economic,
  and governance indicators for evaluating the performance of marine protected areas and have experience in using these indicators to assess the effectiveness of management actions. They are interested
  in learning about the specific biological, socio-economic, and governance indicators presented in the guidebook and how they can be used to improve MPA management.
