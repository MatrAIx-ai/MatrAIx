persona_description: A psychologist and psychiatrist who specializes in the treatment and counseling of children and adolescents who are questioning their gender identity, particularly those who are experiencing
  mental health problems, school drop-out, and suicide. She has been involved with 50 families in the New York area since she launched services two years ago and plans a major expansion with more facilities
  for teenagers and siblings. The Gender and Family Project operates within the Ackerman Institute in New York, the pioneering family therapy and psychotherapy training center.
