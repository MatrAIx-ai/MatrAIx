  career_goals: Although retired, Diane’s personal ambitions focus on maintaining independence, health, and a sense of purpose. She aims to stay actively involved in her church’s outreach programs, mentor
    younger volunteers in the senior center, and preserve her family’s culinary heritage by documenting cherished recipes in a handwritten cookbook. Diane also hopes to continue learning simple digital
    tools to keep in touch with her grandchildren, and she aspires to keep her home safe and comfortable through regular maintenance and seasonal home‑care routines.
