  hobbies: '["Art Museum and Gallery Visits", "Watercolor Sketching", "Historical Fiction and Biography Reading", "Herb Gardening", "Experimental Cooking and Recipe Development", "Kombucha Brewing", "Birdwatching",
    "Yoga Practice", "Collecting Vintage Postcards", "Listening to Classical Music"]'
  career_goals: Anita aims to leverage her extensive operational expertise to transition into a regional food‑service director role within the next three years, overseeing multiple venues while championing
    sustainability and culinary creativity. She also plans to open a boutique café‑gallery that showcases local visual artists and offers a curated menu that blends Texan and Portuguese flavors. Additionally,
    she seeks to earn the Certified Food Service Manager credential, mentor emerging managers, and publish a small‑batch cookbook that documents her experimental recipes and artistic inspirations.
