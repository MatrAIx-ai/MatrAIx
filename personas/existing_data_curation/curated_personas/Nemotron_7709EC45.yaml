  career_goals: Frederick aspires to pursue a STEM‑focused education, aiming to join his middle school’s robotics club and later attend a high‑school program that emphasizes engineering and computer science.
    His long‑term ambition is to become a civil or mechanical engineer who designs sustainable infrastructure for Columbus, while also developing personal resilience strategies to manage stress and help
    peers who experience anxiety.
