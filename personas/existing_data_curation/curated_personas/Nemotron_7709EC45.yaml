personas:
  professional: Frederick Kennedy is a junior robotics enthusiast who applies their methodical LEGO craftsmanship, strategic gaming mindset, and disciplined piano practice to design and program simple autonomous
    bots for the school’s robotics club, and they meticulously plan each project while reliably meeting deadlines.
  sports: Frederick Kennedy plays forward on their community’s Under‑12 soccer team, cheering for the New York Red Bulls, while also swimming laps at the local YMCA pool in the summer, and they prefer structured
    team drills to solo cardio workouts.
  arts: Frederick Kennedy nurtures their artistic side by practicing piano pieces ranging from Mozart’s Sonata in C major to contemporary video‑game scores by Koji Kondo, attending school concerts, and
    they admire composer Hans Zimmer for his innovative orchestration.
  travel: Frederick Kennedy prefers well‑planned family road trips, having explored Legoland California, dreaming of a future visit to the NASA Kennedy Space Center and the robotics exhibits at Tokyo’s
    Miraikan, and they balance adventure with a reliable itinerary.
  culinary: Frederick Kennedy favors hearty meals like pepperoni pizza and spaghetti carbonara, can reliably whip up a grilled‑cheese sandwich with precision, and they enjoy snacking on carrot sticks and
    hummus while listening to piano practice recordings.
  core: Frederick Kennedy blends meticulous LEGO engineering, strategic gaming, and piano discipline into a curious yet worry‑prone 12‑year‑old who meticulously budgets allowance, monitors stress symptoms,
    and they balance team sports with solo creative pursuits.
background:
  cultural: Frederick grows up in a middle‑class family in Columbus, Ohio, reflecting typical Midwestern values of reliability, community involvement, and a practical work ethic. His upbringing includes
    exposure to local school traditions, regional sports enthusiasm (e.g., Ohio State), and community events that emphasize teamwork and service. The multicultural atmosphere of Columbus also provides occasional
    exposure to diverse perspectives, while his family’s heritage—primarily of Northern European descent—reinforces a cultural background grounded in American mainstream customs.
