  hobbies: '[''photography'', ''Tai Chi'', ''cooking traditional and fusion Chinese cuisine'', ''balcony gardening'', ''reading Chinese literature and science fiction'', ''mahjong'', ''walking historic
    neighborhoods'', ''visiting art exhibits'']'
  career_goals: Although officially retired, Chun aspires to channel his curiosity and practical skills into low‑stress volunteer work. He hopes to mentor seniors at the local community center in digital
    literacy, offer occasional workshops on DIY repairs, and eventually compile his experiences into a memoir that blends personal anecdotes with the broader story of Chinese immigration to San Francisco.
    He also aims to contribute occasional articles to neighborhood newsletters, sharing simple, cost‑effective home‑improvement tips and cultural reflections.
