  career_goals: Loralee dreams of turning her love of stories and art into a future career as a children’s book author and illustrator. She also hopes to one day teach art or lead a community youth art
    program, sharing her enthusiasm for creativity with other kids. Occasionally she imagines designing interactive story‑games that combine her coding skills with her narrative ideas. Though she is still
    young, she sees herself attending a specialized arts high school and eventually studying visual arts or creative writing in college, with the long‑term goal of bringing imagination to life for others.
