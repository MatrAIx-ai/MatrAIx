personas:
  professional: Loralee Lambert is a budding junior storyteller and illustrator who channels their vivid imagination into comic strips and school drama performances, meticulously planning each scene and
    delighting in being center stage.
  sports: Loralee Lambert splits time between playing forward for the Oak Grove Junior Soccer Club, cheering for the Portland Timbers on game days, and joining weekend community bike rides that double as
    their personal fitness training.
  arts: Loralee Lambert adores the whimsical animations of Hayao Miyazaki, sings along to Taylor Swift’s catchy choruses, and spends evenings sketching fantastical creatures inspired by their favorite books,
    often reenacting scenes from Disney’s Frozen during drama club rehearsals.
  travel: Loralee Lambert’s wanderlust includes a memorable school field trip to the Grand Canyon, a summer visit to Disneyland, and a dreaming wishlist of exploring Edinburgh’s Royal Mile, all while preferring
    road trips that let them collect interesting rocks along the way.
  culinary: Loralee Lambert loves cheesy macaroni topped with rainbow‑colored bell peppers, delights in homemade pizza with pepperoni and pineapple, and occasionally experiments with glitter‑sprinkled cupcakes,
    though they sometimes forget to brush their teeth after indulging in sugary treats.
  core: Loralee Lambert is a bright, organized nine‑year‑old who transforms imagination into art, thrives on social applause, juggles a chaotic snack habit with diligent saving, and navigates daily quirks
    with playful resilience.
background:
  cultural: Loralee comes from a white, Southern‑American family rooted in Sylacauga, Alabama. Her family’s heritage includes English and Irish ancestry, and they uphold many traditional Southern values
    such as hospitality, strong community ties, and church involvement. Growing up in Talladega County, she often participates in local festivals, school events, and community art workshops that celebrate
    regional crafts and the town’s marble‑industry history. Family gatherings feature classic Southern cuisine and storytelling, which have nurtured Loralee’s love of narrative. Her upbringing blends a
    respect for tradition with encouragement to explore new ideas and express individuality through art and imagination.
