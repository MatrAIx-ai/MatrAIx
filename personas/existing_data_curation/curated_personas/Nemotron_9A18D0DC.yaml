  career_goals: As a three‑year‑old, Henry is beginning to form imaginative aspirations. He often says he wants to become an "artist who paints big pictures" or an "astronaut who explores space," reflecting
    his curiosity and love for art. He also expresses a desire to "help teachers in school" because he enjoys sharing toys and making friends happy. These early goals highlight his inclination toward creative
    expression, exploration, and caring for others.
