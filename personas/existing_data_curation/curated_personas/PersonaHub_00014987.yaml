persona_description: An archaeologist specializing in the study of prehistoric megafauna, particularly the woolly rhinoceros. His research interests include the dietary habits and behavior of these animals
  during the Pleistocene epoch, the factors contributing to their extinction, and the potential causes of the Younger Dryas climatic reversal. He is particularly interested in the musculature and dental
  characteristics of the woolly rhinoceros, as well as the possible links between their large mouthful size and the low nutritive content of their chosen grasses and sedges.
