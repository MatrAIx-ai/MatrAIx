personas:
  professional: Browne Spurgeon, a 33‑year‑old automotive parts salesperson, combines precise mechanical diagnostics with data‑driven inventory forecasting to out‑negotiate retailers, while their critical
    and competitive mindset ensures every deal aligns with long‑term profit margins and hands‑on product expertise.
  sports: Browne Spurgeon is an avid hiker of the Cascades and a weekend salmon‑catcher who follows the Seattle Seahawks and Seattle Kraken, participates in a local mountaineering club, and keeps their
    stamina sharp with occasional trail runs, preferring solitary endurance activities over team sports.
  arts: Browne Spurgeon channels their creative side through landscape photography inspired by Ansel Adams, curates a vinyl collection centered on classic rock bands like Led Zeppelin and AC/DC, and unwinds
    by playing strategic board games such as Terraforming Mars, reflecting a blend of visual appreciation and analytical artistry.
  travel: Browne Spurgeon prefers meticulously planned road trips in their restored classic Mustang, having already explored the rugged backroads of Yellowstone and the fjords of Norway, and now yearns
    to drive the volcanic terrains of Iceland while balancing travel costs with the goal of future automotive‑parts boutique market research.
  culinary: Browne Spurgeon enjoys cooking hearty meals like smoked brisket seasoned with a coffee rub and pan‑seared salmon topped with dill‑infused butter, exhibits intermediate home‑brewing skills producing
    hoppy IPA blends, and relishes pairing craft beers with classic comfort foods, reflecting a palate that values bold flavors and DIY experimentation.
  core: Browne Spurgeon is a 33‑year‑old competitive automotive parts specialist who balances meticulous data‑driven work with solitary, hands‑on hobbies—ranging from classic‑car restorations to mountain
    hikes—while maintaining a frugal yet strategic approach to finances and a pragmatic, somewhat skeptical outlook on life.
background:
  cultural: Browne grew up in a middle‑class family in the Pacific Northwest, with roots tracing back to English and Irish ancestry. His upbringing emphasized self‑reliance, practicality, and an appreciation
    for the region's outdoor lifestyle. Attending a community college in Washington, he earned an associate degree in automotive technology, reflecting the area's strong automotive service sector. He identifies
    with the local culture of Edmonds—supporting community events like farmers' markets and the Seattle Seahawks, while also valuing the quieter, family‑oriented atmosphere of Snohomish County. His cultural
    narrative blends classic American values of hard work and modesty with a regional affinity for nature, innovation, and independent problem solving.
attributes:
  skills: '[''Automotive parts knowledge'', ''Inventory forecasting'', ''ERP/CRM software proficiency'', ''Data‑driven sales analysis'', ''Mechanical diagnostics'', ''Negotiation and pricing strategy'',
