  hobbies: '[''Classic car restoration'', ''Hiking and nature photography'', ''Strategic board gaming'', ''Online chess'', ''Following EV technology trends'', ''Fishing'', ''Home‑brewing'']'
  career_goals: Browne aims to progress from his current parts salesperson role to a regional sales manager position within the next five years, overseeing a small team of sales representatives while retaining
    a hands‑on approach to product expertise. He seeks certification through the Automotive Service Excellence (ASE) program to deepen his technical credibility. Long‑term, he envisions launching an online
    boutique that curates specialized performance parts for enthusiasts, leveraging his market insights and competitive drive. Throughout his career trajectory, he values maintaining a work‑life balance
    that supports his marriage and occasional solo projects.
