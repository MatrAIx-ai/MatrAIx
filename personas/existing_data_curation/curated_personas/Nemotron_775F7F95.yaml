    in spelling bees and school games", "organizational skills (keeping supplies tidy)"]'
  hobbies: '["drawing and mixed‑media art", "reading comic books and graphic novels", "exploring desert nature (rock collecting, insect watching)", "attending community art workshops", "listening to Mexican
    folk and pop music", "playing competitive board and card games", "writing short stories and journaling", "visiting local museums (art and science)", "participating in school science fairs"]'
  career_goals: Noemi dreams of turning her love of art and storytelling into a career as a visual illustrator who can share Mexican‑American stories with a broad audience. She also imagines becoming a
    wildlife researcher who uses sketches and illustrations to raise awareness about the desert creatures near her home. She hopes to win a national art competition and later mentor younger kids in community
    art programs. Ultimately, she wants to bridge her bilingual heritage by creating bilingual picture books that celebrate her culture while encouraging curiosity and critical thinking.
