personas:
  professional: Noemi Rivera is an aspiring junior illustrator whose vibrant mixed-media projects blend comic-book heroes with traditional papel picado motifs, and their natural curiosity drives them to
    experiment with new materials while juggling school responsibilities with a competitive edge.
  sports: Noemi Rivera plays forward for the El Paso Lobo Soccer Club's U-9 team, cheers loudly for the El Paso Chihuahuas during baseball season, and incorporates a disciplined after-school stretching
    routine to stay agile, though their competitive nature sometimes leads to friction with teammates.
  arts: Noemi Rivera channels a love for comic-book storytelling and traditional folk art into mixed-media canvases that feature vibrant papel picado borders, drawing inspiration from artists like Frida
    Kahlo and illustrators such as Stan Lee, while attending weekend workshops at the Canutillo library and humming along to the melodies of Lila Downs and contemporary pop stars.
  travel: Noemi Rivera dreams of exploring the desert canyons of Big Bend, revisiting family in Ciudad Juárez during summer breaks, and has already collected postcards from a school field trip to the Grand
    Canyon, preferring road trips with their parents that blend adventure with the comfort of familiar border-town stops.
  culinary: Noemi Rivera enjoys helping their grandparents roll corn masa for tamales and simmer hearty pozole, while also indulging in a homemade chocolate-dipped churro they learned to make after watching
    a cooking video, and they prefer dishes that combine tangy green tomatillo sauce with crunchy tortilla chips.
  core: Noemi Rivera is a fiercely curious eight-year-old whose artistic imagination, competitive spark, and occasional anxiety shape a vibrant yet sometimes jittery outlook on life.
background:
  cultural: Noemi comes from a Mexican‑American family deeply rooted in both Mexican traditions and the border‑city culture of Canutillo, Texas. At home, Spanish is spoken alongside English, and she celebrates
    holidays such as Día de los Muertos with altar‑building and storytelling, and enjoys making tamales and pozole with her grandparents. Her family participates in local parades for Cinco de Mayo and attends
    a nearby Catholic church, where she experiences community festivals featuring mariachi music and folkloric dance. The proximity to the US‑Mexico border exposes her to a blend of cultural influences,
    from bilingual school programs to cross‑border family visits, shaping her identity and artistic inspiration.
attributes:
  skills: '["bilingual communication (Spanish & English)", "basic reading and comprehension", "basic arithmetic (addition, subtraction, time‑telling)", "drawing and painting (watercolors, colored pencils)",
