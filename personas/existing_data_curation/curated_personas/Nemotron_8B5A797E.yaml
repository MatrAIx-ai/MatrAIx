  hobbies: '[''Live music events'', ''Group fitness classes (yoga, spin)'', ''Hiking in Hill Country'', ''Cooking Tex-Mex cuisine'', ''Volunteering at local food bank'', ''Reading personal development books'',
    ''Improv comedy workshops'', ''Traveling'', ''Attending networking meetups'', ''Podcast listening (business and wellness)'']'
  career_goals: Connie aims to become a senior sales consultant within the next two years and earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen her expertise. She aspires to
    lead a team of agents as a sales manager, driving revenue growth for the Austin office while mentoring newer colleagues. Over the longer term, she envisions launching her own independent insurance brokerage,
    focusing on health and wellness coverage. Throughout her career progression, she seeks to balance professional advancement with personal wellbeing, continuing to refine her leadership, coaching, and
    stress‑resilience skills.
