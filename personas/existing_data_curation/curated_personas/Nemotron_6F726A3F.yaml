personas:
  professional: Chong Tsai is a methodical secondary school teacher of mathematics, physics, and computer science who designs rigorously structured curricula, leverages data‑driven assessment analytics,
    and integrates Arduino‑based projects into lessons, channeling their competitive drive and love of predictability into a clear path toward STEM department leadership and an EdD in Educational Leadership.
  sports: Chong Tsai is an avid weekend hiker of the Columbia River Gorge and a dedicated cyclist with the Portland Cycling Club, cheering the Portland Timbers in soccer season and the Trail Blazers in
    winter, approaching fitness with a regimented schedule that mirrors classroom lesson plans.
  arts: Chong Tsai immerses themselves in artistic pursuits through meticulous brush‑stroke calligraphy, strategic mahjong nights with friends, and devouring science‑fiction works by Isaac Asimov and Liu
    Cixin, while finding occasional inspiration in the ambient guitar melodies of John Fahey and the theatrical performances at Portland Center Stage.
  travel: Chong Tsai prefers meticulously planned trips that blend outdoor adventure with cultural immersion, such as hiking the volcanic trails of Crater Lake, cycling the historic streets of Kyoto, and
    weekend getaways to the coastal towns of Vancouver, always budgeting travel around school breaks and volunteer commitments.
  culinary: Chong Tsai enjoys precise culinary experiments, mastering traditional dishes like mapo tofu, xiao long bao, and hand‑rolled jiaozi with exact measurements of Sichuan peppercorn and fermented
    bean paste, while also embracing Portland’s salmon scene by grilling cedar‑plank salmon with ginger and soy glaze.
  core: Chong Tsai is a 49‑year‑old disciplined educator who channels a love of order into both classroom innovation and hobbyist tech projects, yet occasionally hoards time for meticulous planning at the
    expense of spontaneous leisure.
background:
  cultural: Chong was raised in a bilingual Chinese‑American household in the Pacific Northwest, blending Confucian values of diligence, respect for education, and community responsibility with the progressive,
    individualistic outlook of contemporary American society. He maintains strong ties to the local Chinese community, celebrating Lunar New Year and participating in cultural festivals, while also incorporating
    his heritage into his teaching through bilingual resources and culturally relevant examples. His never‑married status and professional focus reflect a personal commitment to stability and career development,
    aligning with his preference for structure, predictability, and purposeful achievement.
