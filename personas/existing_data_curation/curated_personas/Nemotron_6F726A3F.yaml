  hobbies: '[''Hiking'', ''Cycling'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Science‑fiction reading'', ''Non‑fiction education literature'', ''Cooking Chinese cuisine'', ''Calligraphy'', ''Mahjong'',
    ''Volunteer coding tutoring'']'
  career_goals: Chong aims to become the STEM department head at his school within the next five years, using his structured approach to spearhead interdisciplinary project‑based learning initiatives across
    the district. He plans to pursue an EdD in Educational Leadership to deepen his expertise in systemic change, publish research on effective STEM pedagogy, and launch a community outreach program that
    expands access to hands‑on STEM experiences for underrepresented students in Portland. His competitive drive pushes him to seek leadership roles that allow him to influence curriculum standards and
    teacher mentorship programs.
