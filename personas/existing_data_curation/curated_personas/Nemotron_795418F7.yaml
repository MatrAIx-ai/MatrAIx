  career_goals: He aims to move from a first-line supervisor role to a kitchen manager or regional culinary trainer within the next five years, leveraging his practical knowledge to shape menu innovation
    across multiple sites. Anthony also dreams of launching a small catering venture that showcases modern twists on traditional soul-food dishes, allowing him to blend his curiosity for new ideas with
    his cultural roots. Recognizing his challenges with organization, he plans to complete a short-term certification in culinary management and attend workshops on emotional resilience to improve his leadership
    effectiveness and meet his family's long-term financial goals.
