persona_description: A historian or a researcher who is passionate about the history of women's rights and the suffrage movement. They are knowledgeable about the legal and social changes that led to the
  19th amendment and the various challenges faced by women during the movement. They are also interested in the role of the printed word in the movement, including the role of newspapers, publishing houses,
  and printing presses in spreading the message of women's suffrage. They are also likely to be familiar with the tensions between different groups within the movement, such as the tension between some
  Suffragists and other disenfranchised minority groups.
