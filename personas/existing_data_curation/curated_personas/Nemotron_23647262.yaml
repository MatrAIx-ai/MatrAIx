personas:
  professional: Francis Amador, an aspiring young technologist, merges a love for strategy video games and LEGO robotics kits with a disciplined, self‑directed approach to coding in Python, creating text‑based
    adventure games while they meticulously document each iteration despite occasional bouts of self‑doubt.
  sports: Francis Amador, a quiet supporter of the local high school basketball team and the New York Knicks, prefers solo agility drills in the park, occasionally joins a junior chess club after school,
    and channels competitive energy into weekend pickup games of table tennis at the community center, where they relish the focused, low‑social interaction.
  arts: Francis Amador, an avid digital sketcher, draws detailed spacecraft inspired by Chris Foss and H.R. Giger, enjoys instrumental film scores by Hans Zimmer and John Williams while coding, and practices
    piano pieces such as Beethoven’s “Für Elise” to unwind, a routine they consider a perfect synthesis of visual and auditory creativity.
  travel: Francis Amador, who favors low‑key, curiosity‑driven trips, has visited the Kennedy Space Center in Florida and the local science museum, dreams of backpacking through the Japanese Alps to observe
    night skies far from city lights, and plans excursions with meticulous checklists to avoid unexpected social overload, ensuring they feel prepared and comfortable.
  culinary: Francis Amador, a beginner cook, loves constructing spaghetti carbonara with pancetta, parmesan, and black pepper, enjoys assembling homemade sushi rolls with cucumber and avocado, and often
    snacks on trail mix while they debug code.
  core: Francis Amador channels a blend of solitary curiosity and competitive precision into every hobby, from coding to chess, while battling an inner tide of worry that fuels meticulous planning and occasional
    avoidance of social fatigue, a pattern they both cherish and critique in themselves.
background:
  cultural: Francis grew up in a Venezuelan household in Fort Lauderdale, where Spanish is spoken at home and Venezuelan traditions are celebrated. His family maintains cultural ties through food—such as
    arepas, empanadas, and hallacas—and festivals like Carnaval and Día de los Santos Inocentes. He attends a local Catholic school and participates in community events that blend Venezuelan and Floridian
    cultures. This bicultural environment has given him a strong sense of identity, fluency in two languages, and an appreciation for both Latin American hospitality and the individualistic ethos of American
    society.
