  career_goals: Francis aspires to become a software engineer or data scientist who can create tools that solve real‑world problems. He dreams of attending a top high school STEM program and later studying
    computer science at a university, eventually working on artificial intelligence or cybersecurity where his skeptical mindset can protect systems. He also entertains the idea of competing in national
    math and coding competitions, aiming to win scholarships that support his education. In the longer term, he hopes to develop an independent app or game that reflects his love for strategy and solitary
    creativity.
