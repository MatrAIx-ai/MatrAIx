  career_goals: Though currently out of the formal labor market, Gustavo aims to translate his practical abilities into a small, community-focused venture. He plans to launch a home-based catering service
    specializing in authentic Mexican comfort food, possibly complemented by a part-time handyman service for neighbors. He seeks a sustainable, predictable income that allows flexibility for personal health
    and family responsibilities. Additionally, he hopes to take on a volunteer coordinator role at the local community center, mentoring younger residents and helping organize cultural events.
