persona_description: A researcher in the field of ecological modeling, specifically focusing on the dynamics of mistletoe invasion of fragmented woodlands. The researcher is interested in the interaction
  between landscape patterns and the dispersal biology of organisms, and how these factors affect the spread of mistletoe in the landscape. The researcher is also interested in the potential for controlling
  mistletoe spread through the manipulation of tree pattern and disinfection of appropriate trees. The researcher is likely to be working with a team of researchers, including Sandra Lavorel and Mark Stafford-Smith,
  from the C.N.R.S., Montpellier, France and CSIRO, Division of Wildlife and Ecology, Alice Springs.
