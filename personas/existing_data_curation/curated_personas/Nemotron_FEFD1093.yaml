  career_goals: Although retired, Leon is eager to stay engaged by offering pro‑bono consulting to local small businesses, especially those owned by minority entrepreneurs in Bergen County. He aims to run
    quarterly financial‑literacy workshops at the community center and to mentor aspiring entrepreneurs through the local Chamber of Commerce. Leon also hopes to author a concise guide titled “Practical
    Budgeting for Seniors” and to continue volunteering at his church’s outreach programs. Maintaining his health for daily walks along the Hudson River promenade and nurturing relationships with his grandchildren
    are personal priorities.
