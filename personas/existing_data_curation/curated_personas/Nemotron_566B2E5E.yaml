    writing and fundraising'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary fiction and poetry'', ''Painting and sketching'', ''Cooking traditional Mexican cuisine'', ''Hiking in Griffith Park'', ''Practicing
    yoga and meditation'', ''Volunteering at community arts programs'', ''Learning new languages (e.g., French)'', ''Attending cultural festivals and live music events'', ''Rooftop gardening'']'
  career_goals: Monique aims to advance to a senior leadership role, such as Director of a community education center or early childhood services agency in Los Angeles, where she can shape district-wide
    policies on arts-based learning. She plans to earn a Master's in Educational Leadership to deepen her strategic and organizational capabilities. Additionally, she dreams of establishing a nonprofit
    after‑school program that provides free arts workshops for children of widowed or single‑parent households, honoring her own experience of loss while fostering resilience through creative expression.
    Long‑term, she hopes to influence state legislation to increase funding for culturally responsive early education.
