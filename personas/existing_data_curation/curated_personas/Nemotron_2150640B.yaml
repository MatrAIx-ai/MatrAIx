personas:
  professional: Richie Thomas is a seasoned electrician with over 15 years of hands‑on experience in residential and light‑commercial wiring, solar PV installations, and NEC‑compliant code enforcement,
    who blends a practical, structured mindset with a relaxed, adaptable work style; they lead small crews efficiently, communicate clearly with clients, yet occasionally let spontaneity creep into project
    schedules, reflecting their preference for predictability balanced by a love for flexibility.
  sports: Richie Thomas competes in a weekly recreational basketball league with the Eastside Hoops Club, follows the Houston Rockets and Texas Rangers with avid fanfare, and spends sunrise weekends fishing
    the Sabine River as a member of the Sabine River Anglers Association, where they practice catch‑and‑release for bass and catfish.
  arts: Richie Thomas channels creative energy into acoustic guitar jam sessions at the local community hall, drawing inspiration from Stevie Ray Vaughan, John Mayer, and the Avett Brothers, while also
    attending the annual Texas Blues Festival where they relish live performances by Gary Clark Jr. and Susan Tedeschi.
  travel: Richie Thomas favors spontaneous road trips, having already explored the historic streets of New Orleans for its music scene, the Gulf Coast beaches of Galveston for fishing, and the scenic hill
    country of Fredericksburg; they dream of a solar‑focused vacation to Iceland’s geothermal hot springs and a restful retreat in the Smoky Mountains, usually planning trips on a flexible budget that leaves
    room for last‑minute detours.
  culinary: Richie Thomas is a barbecue aficionado who expertly smokes brisket with mesquite wood, rubs pork ribs with a blend of brown sugar, paprika, and cayenne, and often grills freshly caught catfish
    seasoned with lemon‑pepper and fresh dill, while their cooking skill level hovers between enthusiastic hobbyist and competent grill master.
  core: Richie Thomas is a practical yet adaptable electrician who balances a love for community, music, and smoked meat with a penchant for anxiety‑driven mindfulness, occasional financial disarray, and
    a flexible, sociable lifestyle.
background:
  cultural: Richie grew up in Beaumont’s historically Black neighborhoods, where church, family, and community solidarity were central. The city's blend of Southern hospitality and Gulf Coast culture shaped
    his values of resilience, hard work, and mutual support. He was raised on a mix of gospel music, blues, and R&B, which influences his love for live music. His experiences navigating both the challenges
    and strengths of the African‑American community in East Texas have fostered a strong sense of cultural pride and a commitment to giving back through mentorship and community service.
attributes:
  skills: '[''Residential wiring'', ''Commercial lighting installation'', ''Troubleshooting electrical systems'', ''Blueprint reading and interpretation'', ''NEC and Texas code compliance'', ''Solar PV
    system installation'', ''Conduit bending and cable management'', ''Team leadership and crew coordination'', ''Client communication'', ''Occupational safety (OSHA 30‑hour)'']'
  hobbies: '[''Acoustic guitar playing'', ''Recreational basketball'', ''Fishing at Sabine River'', ''Barbecue cooking'', ''Mindfulness meditation'', ''Journaling'', ''Teaching electrical safety workshops'']'
  career_goals: Richie aims to become a Master Electrician within the next three years and eventually launch his own electrical contracting firm focused on energy‑efficient upgrades and residential solar
    installations in the Gulf Coast region. He plans to earn additional certifications in renewable energy and project management, allowing him to offer comprehensive services to both homeowners and small
    businesses. While he values the stability of consistent work schedules, he also seeks a flexible business model that lets him allocate time for community involvement and personal well‑being.
