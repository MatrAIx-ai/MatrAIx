  career_goals: Viviana aims to transition into a lead foreman role within the next three years, leveraging her reliability and organizational strengths. She plans to obtain an OSHA 30‑hour certification
    and a forklift operator license to broaden her qualifications. Long‑term, she hopes to mentor younger laborers, formalize a safety‑training program for her crew, and secure a stable retirement through
    a union pension and personal savings. Her goal is to maintain a predictable work schedule that balances income stability with the flexibility needed to support her family and community commitments.
