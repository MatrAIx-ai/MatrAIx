personas:
  professional: Viviana Rodriguez is a seasoned construction supervisor with two decades of hands‑on expertise in concrete finishing, framing assistance, and safety compliance, who relies on their bilingual
    fluency and meticulous organizational style to coordinate crews and serve as the on‑site bridge between Spanish‑speaking laborers and English‑speaking supervisors.
  sports: Viviana Rodriguez enjoys cheering on Arizona Rising FC at local soccer matches, plays in Sunday pick‑up games with neighborhood friends, and stays active by walking several miles each week with
    a group at the Glendale Community Center, and they relish the camaraderie that comes with team sports.
  arts: Viviana Rodriguez participates in a folklórico dance troupe that rehearses twice monthly, regularly reads Spanish‑language newspapers for cultural news, and finds inspiration in the music of Los
    Panchos and the films of Pedro Infante, which shape their appreciation for traditional performance arts.
  travel: Viviana Rodriguez loves weekend road trips to New Mexico’s historic pueblos for Semana Santa celebrations, annually visits a mountain town in southern Arizona for Día de Los Muertos festivities,
    and dreams of exploring Oaxaca’s markets to deepen their culinary knowledge, all while traveling on a modest budget with family.
  culinary: Viviana Rodriguez takes pride in cooking pepian and tamales using herbs from their backyard garden such as cilantro, oregano, and epazote, enjoys sharing these dishes with grandchildren, and
    occasionally over‑salts the stew in their enthusiasm.
  core: Viviana Rodriguez blends a pragmatic work ethic with a vibrant community spirit, balancing structured career goals and careful finances with a love for cultural traditions, family gatherings, and
    hands‑on activities, and they approach life with unwavering dedication.
background:
  cultural: Viviana was born in a small town in the highlands of Guatemala where Catholic traditions and community celebrations shaped her early life. She grew up speaking Spanish and learned the customs
    of Semana Santa, Día de Los Muertos, and traditional Guatemalan music and dance. In her twenties she immigrated to the United States, first settling in California before moving to Glendale, AZ, where
    a growing Latino community gave her a sense of belonging. She maintains strong ties to her Guatemalan heritage through weekly family gatherings, cooking ancestral recipes, and participating in local
    cultural festivals. Her Catholic faith, respect for family elders, and commitment to communal harmony continue to influence her values and daily interactions.
