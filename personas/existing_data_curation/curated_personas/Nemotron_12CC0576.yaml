  hobbies: '[''Pickup basketball'', ''Barbecue and soul-food cooking'', ''DIY home improvement projects'', ''Community volunteering (food drives, church events)'', ''Watching NBA games'', ''Competitive
    video gaming (e.g., Call of Duty)'', ''Gym workouts (strength training)'', ''Attending local music concerts (R&B, hip-hop)'', ''Exploring new tech gadgets'', ''Weekend road trips'']'
  career_goals: Kenneth aims to transition from intermittent work to a stable, skilled trade. He plans to earn certifications in HVAC or electrical work within the next two years and eventually launch his
    own handyman business that serves Morristown and the surrounding communities. In the short term, he is targeting a supervisory role in a local warehouse or logistics firm where his reliability, organization,
    and leadership can be recognized. He also hopes to become a community liaison, using his networking skills to connect residents with local resources and job training programs. Financial security for
    his family and the ability to provide a comfortable future for his spouse are central motivators, and his competitive drive pushes him to be among the top performers in any role he takes on.
