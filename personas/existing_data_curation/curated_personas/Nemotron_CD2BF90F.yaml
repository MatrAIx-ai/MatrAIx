  hobbies: '[''Oil painting'', ''Photography'', ''Korean calligraphy'', ''Reading contemporary fiction'', ''Reading philosophy'', ''Meditation'', ''Yoga'', ''Cooking Korean cuisine'', ''Listening to classical
    music'', ''Coastal walking/hiking'']'
  career_goals: She aims to rise to a senior executive role—such as Director of Operations or Chief Administrative Officer—within a large health system that values innovative, patient‑centred care. Sookyung
    is passionate about integrating artistic and therapeutic elements into clinical environments, and she hopes to pilot a holistic care program at a community hospital in Monterey County. Over the next
    five years, she plans to pursue an executive MBA, earn a certification in healthcare quality, and lead a regional initiative to improve health equity for underserved Asian‑American communities.
