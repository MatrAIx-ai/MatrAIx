  hobbies: '[''Cooking traditional South Asian dishes'',''Gardening'',''Reading contemporary fiction'',''Knitting'',''Yoga'',''Participating in community cultural festivals'']'
  career_goals: Nishi aspires to formalize her practical expertise by completing a GED and earning a certificate in Business Administration from a community college. Her long‑term ambition is to launch
    a home‑based catering business that offers authentic South Asian home‑cooked meals to the Buffalo community, integrating her love for cooking with her strong organizational skills. In the shorter term,
    she seeks a part‑time administrative position with a local nonprofit or cultural organization where she can apply her routine‑focused reliability, manage schedules, and support event logistics while
    continuing to contribute to her community’s cultural life.
