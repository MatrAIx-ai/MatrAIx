personas:
  professional: Kaedyn Trejo, a 21‑year‑old industrial engineering student, leverages expertise in lean manufacturing, ergonomic design, and safety audits to craft visually engaging, culturally resonant
    safety programs, using their charismatic, talkative style to rally teams while occasionally battling disorganization and a tendency to improvise on the fly.
  sports: Kaedyn Trejo stays active by salsa‑dancing at cultural festivals, hiking the Appalachian Trail with the Sussex County Hiking Club, and cheering on the New Jersey Devils while squeezing in pickup
    basketball at the local YMCA during the winter months.
  arts: Kaedyn Trejo fuels their creative drive by frequenting the Montclair Art Museum to admire works by Frida Kahlo and Yayoi Kusama, volunteering backstage at the Princeton Community Theatre’s production
    of ‘Rent,’ and capturing street‑level moments inspired by Henri Cartier‑Bresson’s photography during weekend outings.
  travel: Kaedyn Trejo prefers spontaneous weekend trips to the Catskill Mountains and vibrant street‑art tours in Philadelphia, while day‑dreaming about a longer immersion in Barcelona’s mosaic‑filled
    alleys and a trek along the Andes once savings allow.
  culinary: Kaedyn Trejo, an intermediate home chef, delights in mastering arepas rellenas and avocado‑lime ceviche while regularly treating themselves to spicy tuna rolls at Sake Sushi Bar, and constantly
    experiments with fresh cilantro, cumin, and mango‑chili salsa in their kitchen experiments.
  core: Kaedyn Trejo, a 21‑year‑old social dynamo, channels an artistic soul into safety engineering, battles chronic over‑thinking, and habitually leaves important paperwork on the kitchen counter for
    later.
background:
  cultural: Kaedyn is a first‑generation American whose parents immigrated from Colombia. She grew up bilingual, speaking Spanish at home and English in school, which gives her a deep appreciation for both
    Colombian traditions and American culture. Family celebrations such as Día de la Independencia (July 20) and the vibrant Carnaval de Barranquilla have ingrained in her a love for music, dance, and communal
    gatherings. While she embraces the multicultural environment of Hopatcong, New Jersey, she remains connected to her heritage through cooking, participating in local Colombian festivals, and maintaining
    strong ties with the Colombian diaspora community. This bicultural upbringing informs her collaborative, inclusive approach at work and her desire to integrate culturally resonant practices into occupational
    health and safety programs.
attributes:
  skills: '[''Process Optimization'', ''Lean Manufacturing'', ''Ergonomic Design'', ''Safety Auditing'', ''Risk Assessment'', ''Statistical Process Control (SPC)'', ''Data Analysis (Excel, Minitab, Python)'',
    ''Project Management (MS Project, Agile)'', ''Bilingual Communication (Spanish/English)'', ''Creative Workplace Design'']'
  hobbies: '[''Visiting art galleries and museums'', ''Live music and concert attendance'', ''Salsa dancing and Latin social events'', ''Watercolor painting'', ''Nature photography'', ''Hiking in the Skylands
    region'', ''Cooking Colombian cuisine'', ''Yoga and mindfulness meditation'', ''Journaling for stress management'', ''Reading design thinking and tech trend books'']'
  career_goals: Kaedyn aims to become a Certified Safety Professional (CSP) within the next three years and to lead safety and health initiatives at a midsize manufacturing firm in the Northeast. She plans
    to pursue a master’s degree in Industrial Engineering with a focus on occupational health and sustainability, and to integrate artistic and culturally resonant elements into safety training programs
    to boost engagement and morale. Long‑term, she envisions founding a consultancy that helps manufacturers adopt lean, safe, and environmentally responsible processes while fostering inclusive workplace
    cultures that reflect the diverse backgrounds of their employees.
