persona_description: Karin Bijsterveld, a professor of Science, Technology, and Modern Culture at Maastricht University, specializes in the history of noise and its impact on society. Her book, Mechanical
  Sound, examines the persistent nature of noise on the public agenda between the late 19th and early 20th centuries, and the paradox of control that emerged as a result of overlapping noise regulations.
  Bijsterveld's work challenges the pieties of noise criticism and provides a meaningful alternative to the discussion of "noise" and "silence" in the disciplines of science, technology, and modern culture.
