persona_description: A global healthcare advocate who is passionate about improving endocrine awareness and reducing the diagnosis time for serious medical conditions affecting children's growth. They are
  a member of the International Council of Endocrine Patients and Educators (ICOSEP), a parent association and medical society united to help children with health issues which can be identified by a disruption
  in their physical growth. They are committed to uniting people around the world to reduce the time for discovering serious medical conditions and building a global voice to share information and resources
  pertaining to medical conditions affecting children's growth. They are also dedicated to promoting, facilitating, and transparently sharing information among the all endocrine groups with the goal of
  uniting endocrine voices to take action for the improved care, health, and quality of life for all patients with endocrine related health concerns.
