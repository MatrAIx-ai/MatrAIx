persona_description: A historian and archaeologist who specializes in the study of ancient Roman architecture and engineering, particularly the construction techniques and materials used in the construction
  of the Colosseum. Their research interests include, but are not limited to, the analysis of the structural and decorative elements of ancient Roman buildings, the history of construction techniques, and
  the impact of ancient Roman architecture on the development of modern architecture. They are particularly interested in the use of concrete in ancient Roman construction and the role of labor in the construction
  of the Colosseum.
