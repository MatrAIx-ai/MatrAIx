  hobbies: '[''Potluck hosting and recipe swapping'', ''Weekend baking (bread, pies, cookies)'', ''Herb gardening'', ''Attending local food festivals and community events'', ''Recreational soccer'', ''Karaoke
    nights'', ''Reading cozy mystery novels'', ''Volunteering at food drives'', ''Neighborhood block parties'']'
  career_goals: Laura aims to move from line cook to kitchen supervisor within the next two years, and eventually open her own family‑style eatery in Montvale that serves familiar, home‑cooked meals to
    the community. She plans to enroll in a part‑time culinary certification program to formalize her expertise, seek mentorship from an experienced head chef to develop leadership and menu‑development
    skills, and gain experience managing a small catering team. In the short term, she wants to master new baking techniques and improve her organizational habits to reduce stress, while her long‑term ambition
    is to run a modest bistro with a set daily menu that reflects her love for routine and traditional flavors.
