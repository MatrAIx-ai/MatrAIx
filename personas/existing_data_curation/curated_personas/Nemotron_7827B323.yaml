personas:
  professional: William Porter is a 15‑year‑old aspiring aerospace hobbyist who channels their curiosity and methodical nature into building model rockets, leading the robotics club’s design subteam, and
    documenting detailed schematics in a personal journal, showcasing a blend of practical engineering and creative problem‑solving.
  sports: William Porter enjoys solo desert hiking on local trails such as the Mojave Ridge, occasionally participates in the school’s cross‑country team for endurance training, and roots for the Los Angeles
    Lakers, balancing solitary fitness pursuits with a modest enthusiasm for professional basketball.
  arts: William Porter finds inspiration in sci‑fi film scores like Hans Zimmer’s “Interstellar” soundtrack, watches classic space‑exploration documentaries, collects prints of NASA’s iconic rocket art,
    and occasionally sketches futuristic mechanics in their journal, indicating a deep appreciation for visual and auditory storytelling.
  travel: William Porter prefers meticulously planned short trips, having already visited the Arizona desert’s Red Rock State Park for hiking and the Kennedy Space Center in Florida for a hands‑on space
    exhibit, while dreaming of a future pilgrimage to the European Space Agency’s launch site in French Guiana.
  culinary: William Porter favors quick, high‑energy meals such as instant ramen with added soy sauce and a boiled egg, snacks on trail‑friendly granola bars loaded with oats, honey, and almonds while hiking,
    and treats themselves to pepperoni pizza and soda during marathon gaming sessions.
  core: William Porter is a methodical teen rocket builder whose disciplined hobbyism coexists with anxiety‑driven impulsive spending, solitary journaling, and a love for desert hikes, video‑game strategy,
    and occasional pizza indulgence.
background:
  cultural: Growing up as a white teenager in Kingman, Arizona, William is shaped by the small‑town desert culture of Mohave County, where self‑reliance, close community ties, and an appreciation for the
    rugged landscape are common. His family has deep regional roots in mining, trucking, and service industries, and he is familiar with the history of the American Southwest—including nearby Native American
    heritage and the legacy of Route 66—fostering a practical, resourceful outlook that also values quiet reflection.
