personas:
  professional: Tamara Sharma is a curious young learner who, guided by structured after‑school language lessons and a love for building LEGO sets, uses step‑by‑step instruction manuals to explore early
    science projects and dreams of becoming a wildlife biologist, balancing a practical, methodical approach with a gentle, cooperative spirit.
  sports: Tamara Sharma is a member of the McAlester Mini Soccer Team (U‑8) that meets twice a week, and during the summer she joins a nature‑explorer club that blends light hiking with simple fitness games;
    she looks up to the Oklahoma City Thunder for their disciplined teamwork and often mimics their drills in the backyard, preferring low‑pressure, structured activities that keep her active without large
    crowds.
  arts: Tamara Sharma spends afternoons coloring nature scenes in the style of James Gurney’s watercolor landscapes, eagerly listens to the local tribal drum circle’s rhythmic beats, and draws inspiration
    from Eric Carle’s collage illustrations while practicing bead strings taught by her grandmother, often arranging beads in traditional patterns that echo the community’s cultural dances.
  travel: Tamara Sharma loves family trips that blend predictable itineraries with nature exploration; she has visited the tribal heritage center in Tahlequah, the Kansas City Science Center, and the Ouachita
    National Forest, and she dreams of seeing the Grand Canyon, preferring journeys where daily plans are drawn out with color‑coded charts and plenty of time for bird‑watching.
  culinary: Tamara Sharma enjoys helping her grandmother bake maple‑glazed sweet potato pancakes, loves nibbling fresh apple slices dusted with cinnamon, and delights in making colorful fruit kebabs with
    berries, banana, and a drizzle of honey; she prefers simple, wholesome meals that feature corn, beans, and seasonal berries, and she proudly adds a pinch of sage to her favorite vegetable soup.
  core: Tamara Sharma is a structured, nature‑loving seven‑year‑old who balances precise LEGO building with quiet birdwatching, keeps a meticulous allowance jar, and gently mixes cultural rhythms with bright
    crayons.
background:
  cultural: Tamara is a member of the Cherokee Nation, raised in McAlester, Oklahoma, where she lives close to the community’s cultural center. Her family emphasizes tribal values of harmony, respect for
    nature, and cooperation. She attends a weekly after‑school program where she learns basic Cherokee language and traditional stories from her grandparents. Seasonal celebrations, such as community powwows
    and harvest festivals, give her opportunities to see traditional dance, hear drum songs, and participate in age‑appropriate craft activities like beadwork. Her upbringing blends modern schooling with
    strong ties to Cherokee customs, fostering a deep appreciation for her heritage and the natural world.
attributes:
  skills: '[''Reading early chapter books fluently'', ''Basic addition and subtraction'', ''Writing her name legibly'', ''Following and organizing daily routines'', ''Basic tablet navigation for educational
    apps'', ''Introductory Cherokee language vocabulary'', ''Simple beadwork with adult guidance'', ''Observational skills during nature walks'']'
  hobbies: '[''Reading picture books and early chapter stories'', ''Drawing and coloring nature scenes'', ''Building Lego structures'', ''Collecting and arranging stones and shells'', ''Listening to tribal
    drumming and storytelling'', ''Simple beadwork with grandmother'', ''Nature hikes and wildlife observation'']'
  career_goals: Tamara dreams of growing up to work closely with animals, hoping to become a veterinarian or wildlife caretaker who helps the animals on her family's farm and in the local wildlife refuge.
    She also envisions herself preserving her tribe's stories and crafts, perhaps as a cultural educator who teaches younger children traditional beadwork and language. In the short term, she wants to be
    the class helper who keeps the classroom tidy and assists the teacher during small‑group activities, reflecting her love for structure, practicality, and caring for others.
