persona_description: A paleontologist who specializes in the study of dinosaur fossils, particularly the lambeosaur species and their unique features such as the bony crests on their heads. The paleontologist
  has conducted extensive research and analysis on the CT scans of the lambeosaur brains and nasal cavities, and has made significant contributions to the understanding of dinosaur communication and behavior.
  The paleontologist is known for their expertise in using 3D imaging and phylogenetic sampling to test ideas about the function and evolution of unusual structures in extinct animals.
