personas:
  professional: Denise Prescott, a 71‑year‑old veteran computer systems analyst, leverages over four decades of expertise in mainframe integration, network security and data modeling to lead senior‑level
    workshops for nonprofit digital‑inclusion initiatives, channeling her competitive drive into pragmatic, evidence‑based solutions while balancing a curiosity for emerging technologies with a practical
    focus on business needs.
  sports: Denise Prescott crew‑sails with the St. Simons Yacht Club, paddles‑boards twice weekly for low‑impact cardio, participates in community beach‑cleanup walks, and roots for the Atlanta Braves while
    holding a season pass to the Savannah Bananas baseball team.
  arts: Denise Prescott attends live jazz nights at Savannah’s Jumpship and Club One, where they enjoy performances by the John Coltrane Tribute Band and contemporary trumpeter Wynton Marsalis, while also
    taking part in local storytelling gatherings that celebrate the island’s oral heritage and reading contemporary literature that examines community and technology, often citing authors such as Colson
    Whitehead and Zadie Smith.
  travel: Denise Prescott prefers meticulously planned weekend getaways by ferry to nearby islands like Hilton Head and Jekyll, yet they also relish spontaneous group road trips to Charleston and New Orleans,
    and dream of a leisurely Caribbean cruise where sailing, culinary workshops, and community storytelling can intertwine.
  culinary: Denise Prescott favors cooking island’s historic culinary staples such as shrimp and grits, red rice, and oatbread, frequently seasoning with fresh rosemary and native roses harvested from their
    garden, while their culinary skill oscillates between enthusiastic home‑chef and occasional over‑salted experimenter, especially when they forget to rinse the cast‑iron skillet.
  core: Denise Prescott is a competitively curious septuagenarian technologist who blends relentless analytical rigor with a love for sailing, jazz, and community storytelling, all while juggling meticulous
    financial tracking and occasional health‑care slip‑ups.
background:
  cultural: Denise grew up in a close‑knit African‑American family in coastal Georgia, where the rhythms of Gullah culture and Southern hospitality shaped her worldview. The oral traditions, soulful music,
    and communal resilience of her community fostered a strong sense of identity and responsibility. Living now on Saint Simons Island, she embraces both the historic legacy of Black coastal settlers and
    the broader Southern multicultural fabric, often blending traditional Southern cooking with African culinary influences in her gatherings. Her background informs her commitment to mentorship, community
    service, and advocating for inclusive access to technology for older Black adults.
attributes:
  skills: '[''Computer Systems Analysis'', ''Legacy Mainframe Integration'', ''Network Security'', ''Data Modeling and Visualization'', ''SQL and Python Programming'', ''IT Project Management'', ''Technical
    Documentation'', ''Mentoring and Coaching'', ''Digital Inclusion Consulting'']'
  hobbies: '[''Sailing'', ''Senior Tech‑Learning Volunteer'', ''Beach Clean‑up Walks'', ''Gullah Heritage Cooking and Storytelling'', ''Live Jazz Attendance'', ''Native Rose Gardening'', ''Paddle‑boarding'',
    ''Reading African‑American Literature'', ''Writing Community Tech Reflections'']'
  career_goals: While approaching retirement, Denise aims to channel her competitive drive into thought leadership within the tech community. She plans to publish a series of case studies on optimizing
    legacy systems for modern cloud environments, secure a senior advisory role for a regional nonprofit focused on bridging the digital divide for older adults, and develop a mentorship program that pairs
    seasoned analysts with aspiring students from underrepresented backgrounds. She also aspires to become a keynote speaker at conferences that explore practical applications of emerging technologies in
    small businesses, and to eventually author a guidebook on pragmatic digital transformation for community organizations.
