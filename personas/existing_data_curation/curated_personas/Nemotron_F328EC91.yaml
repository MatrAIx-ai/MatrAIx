  hobbies: '[''Acrylic painting'', ''Digital illustration (Procreate)'', ''DIY fashion upcycling'', ''Quilting and textile crafts'', ''Hiking in the Rockies'', ''Rock climbing'', ''Board‑game nights'',
    ''Live music and festival attendance'', ''Volunteering at community arts center'', ''Reading speculative fiction'', ''Philosophy reading'', ''Experimental cooking and craft brewing'']'
  career_goals: David aims to transition from production floor work to a creative leadership role within the apparel industry. In the next five years he hopes to become a senior product developer or design
    manager, guiding collections that fuse artistic expression with sustainable textile innovations. He dreams of launching his own boutique line of upcycled and smart‑fabric clothing that reflects his
    love for novelty and abstract concepts, while also offering workshops that teach DIY fashion techniques to his local community. To support these ambitions, he plans to complete a bachelor’s degree in
    fashion design, earn certifications in textile technology, and build a network of collaborators in Denver’s vibrant arts scene.
