personas:
  professional: A seasoned apparel production specialist with deep hands‑on expertise in garment construction, CAD pattern drafting, and Adobe Illustrator, David Shull channels their vivid imagination and
    laid‑back flexibility into turning abstract concepts into sustainable clothing collections while leading small teams with a cooperative, yet assertive, approach.
  sports: An avid rock‑climber and weekend hiker, David Shull tackles the Colorado Rockies with the Denver Mountaineering Society, follows the Colorado Rockies baseball team and the Denver Nuggets basketball
    team, and maintains a flexible fitness routine that mixes high‑intensity bouldering sessions with leisurely trail runs, preferring the outdoors over a conventional gym.
  arts: A passionate acrylic painter and digital illustrator, David Shull draws inspiration from abstract expressionists like Jackson Pollock, ambient musician Brian Eno, and local muralist Maya Gonzalez,
    regularly attending the Colorado Springs Art Fair and volunteering at the Parker Arts Center teaching teens textile crafts, weaving their love for bold color palettes into both their art and fashion
    designs.
  travel: A spontaneous explorer with a love for both rugged landscapes and cultural immersion, David Shull frequently escapes on weekend drives to Utah’s Arches National Park, has trekked the trails of
    Banff in Canada, dreams of attending the Tokyo Textile Innovation Expo, and balances these adventures with a modest travel budget that prioritizes eco‑friendly lodging and group road trips with friends.
  culinary: An experimental home brewer and self‑taught chef, David Shull enjoys crafting craft ales infused with rosemary and orange zest while mastering dishes like quinoa‑seeded beet salad, smoked jalapeño‑lime
    chicken tacos, and homemade sourdough baguettes topped with aged gouda and balsamic reduction, often pairing their meals with a freshly brewed hop‑IPA and a side of artisanal cheese.
  core: David Shull is a 37‑year‑old textile innovator who fuses an unbridled imagination with a relaxed, sometimes chaotic, work style, turning thrifted fabrics into avant‑garde garments while constantly
    juggling craft‑brew experiments, spontaneous hikes, and a devotion to sustainable living.
background:
  cultural: David is a white American who grew up in the Midwest before relocating to Parker, Colorado. His family background is rooted in working‑class values, with parents who were involved in manufacturing
    and trades, fostering an appreciation for hands‑on craftsmanship. Living near Denver has immersed him in a blend of frontier outdoor culture and a thriving arts community, shaping his love for both
    rugged adventure and creative expression. He participates in local traditions such as farmers’ markets, mountain festivals, and community art fairs, and he embraces Colorado’s strong emphasis on sustainability
    and environmental stewardship. This mix of Midwestern work ethic, Colorado’s outdoor lifestyle, and the region’s collaborative artistic scene informs his identity and drives his personal and professional
    pursuits.
attributes:
