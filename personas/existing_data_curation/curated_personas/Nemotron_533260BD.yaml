personas:
  professional: Andrew Meng, a seasoned IT executive with a knack for strategic planning and empathetic leadership, designs robust cloud and cybersecurity architectures that keep the organization agile
    while translating technical jargon into clear business value; they balance curiosity with practicality and ensure solutions align with budget constraints and stakeholder goals.
  sports: Andrew Meng, an avid follower of the Kentucky Wildcats football team and a regular participant in the Ohio River kayak club, cheers on college football on Saturdays while maintaining fitness through
    weekend hikes and occasional pickleball matches at the Kenton County community center.
  arts: Andrew Meng, an amateur acoustic guitarist who reveres the storytelling of Johnny Cash and the fingerpicking of John Renbourn, often serenades family gatherings with renditions of classic folk songs
    while devouring historical biographies by David McCullough and attending performances at the Ashland Playhouse, and they relish the blend of music and history as a personal creative outlet.
  travel: Andrew Meng, a road‑trip enthusiast who prefers scenic drives through eastern Kentucky’s rolling hills to crowded airports, has explored bourbon distilleries like Woodford Reserve and historic
    towns such as Lexington, and they dream of hiking the Scottish Highlands while always planning trips around the school calendar to keep the mentorship program running smoothly.
  culinary: Andrew Meng, a competent grill master who loves preparing pan‑seared smallmouth bass with a bourbon‑infused glaze and pairing it with Kentucky burgoo and cornbread, enjoys experimenting with
    rosemary, smoked paprika, and locally sourced honey, and they occasionally over‑salt dishes when excited after a successful fishing outing.
  core: Andrew Meng blends meticulous IT leadership with a down‑to‑earth love for fishing, classic rock guitars, and bourbon, juggling strategic ambition and a stubborn habit of staying up late polishing
    his 1965 Mustang at the cost of a few missed bedtime hours.
background:
  cultural: Andrew was born and raised in the suburban community of Ft Mitchell, Kentucky, part of the Greater Cincinnati metropolitan area. His family has deep roots in the Bluegrass region, where values
    such as community cooperation, modesty, a strong work ethic, and faith have been central. Raised in a Methodist household, he grew up attending church services and community events that emphasized service,
    hospitality, and respect for tradition. The regional culture—a blend of Midwestern pragmatism and Southern hospitality—has shaped his compassionate, cooperative nature and his practical curiosity. He
    celebrates local customs like weekend family barbecues, bourbon tastings, and county fairs, reflecting his identity as a white Kentuckian who appreciates both the stability of established practices
    and the excitement of new ideas.
