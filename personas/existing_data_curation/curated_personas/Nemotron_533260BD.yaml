  hobbies: '[''Fly fishing'', ''Hiking'', ''Classic car restoration'', ''Acoustic guitar'', ''Tech literacy volunteering'', ''Church activities'', ''Historical reading'', ''College football'']'
  career_goals: Looking ahead, Andrew is focused on expanding his impact within the organization and the broader community. Over the next five years, he aims to step into a senior executive role—such as
    Chief Information Officer or Vice President of Technology—where he can drive digital transformation, enhance cybersecurity resilience, and foster a culture of continuous learning. He also plans to spearhead
    initiatives that bridge the digital divide in the Kenton County area by partnering with local schools and nonprofits to provide technology resources and training. On a personal level, he is working
    toward establishing a mentorship program for emerging IT professionals and eventually launching a consulting practice that supports small businesses in adopting sustainable tech solutions.
