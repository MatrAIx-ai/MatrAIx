personas:
  professional: Suzanne Marshall is a budding marine naturalist and junior artist who channels her insatiable curiosity and talkative charm into detailed shell collages, imaginative sea‑glass drawings,
    and lively storytelling during school show‑and‑tell sessions.
  sports: Suzanne Marshall loves playing on the Little Mariners swim club, proudly dons a tiny cape while cheering for the Los Angeles Lakers, and never misses a Saturday soccer practice with the Seahawk
    Sprouts junior team, where her energetic hide‑and‑seek skills translate into quick footwork on the field.
  arts: Suzanne Marshall thrives on creating sea‑inspired art, idolizing Dr. Seuss for his whimsical illustrations, dancing to The Wiggles in her weekly class, and singing every nursery rhyme she knows
    while proudly displaying friendship bracelets she crafts during playdates.
  travel: Suzanne Marshall’s travel diary boasts sunny trips to Santa Monica Beach, a family adventure at the Monterey Bay Aquarium, a weekend camping excursion in the Grand Canyon, and a dream to explore
    the Great Barrier Reef’s coral kingdoms one day.
  culinary: Suzanne Marshall delights in munching on mac‑and‑cheese with extra cheddar, building peanut‑butter‑and‑jelly sandwiches shaped like fish, snacking on blueberry‑topped yogurt, and helping stir
    a bowl of rainbow fruit kebabs during kitchen playtime.
  core: Six‑year‑old Suzanne Marshall blends boundless curiosity, artistic flair, and a social spark into a playful, organized explorer who never turns down a seashell or a story.
background:
  cultural: 'Suzanne comes from a white, middle‑class family living in Marmora, a small community in Cape May County, New Jersey. Her upbringing reflects typical American coastal culture: family traditions
    such as Thanksgiving, Halloween, and Fourth of July fireworks, frequent visits to the nearby beach, and participation in local community events like the summer fair and library programs. She is exposed
    to a mix of suburban and maritime influences, hearing stories of fishermen and sea life while also enjoying the suburban school environment that celebrates diversity through multicultural days and inclusive
    classroom activities. Her family values education, creativity, and social connection, encouraging her curiosity and love for art and nature.'
