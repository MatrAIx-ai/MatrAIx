    hide-and-seek'', ''attending library storytime'', ''watching educational videos about nature and space'']'
  career_goals: Suzanne dreams of growing up to be someone who shares knowledge and creativity with others. She talks excitedly about becoming a teacher who reads stories to children, an artist who paints
    bright pictures for galleries, or a marine biologist who explores the ocean and protects sea creatures she loves collecting at the beach. She also imagines performing on stage as a singer or dancer,
    hoping to make friends and bring joy to audiences. Her ambitions combine her love for learning, art, nature, and helping others.
