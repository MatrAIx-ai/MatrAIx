  career_goals: Although officially retired, Emilia aims to leave a lasting legacy in her community. She plans to serve as a volunteer consultant for historic preservation projects in Alexandria, helping
    to protect and adaptively reuse the city’s historic buildings. She also intends to establish a scholarship for women pursuing STEM degrees at George Washington University and to mentor emerging female
    engineers through local professional networks. Additionally, she aspires to author a memoir that reflects on the evolution of engineering practice, the intersection of art and technology, and the social
    changes she has witnessed throughout her career.
