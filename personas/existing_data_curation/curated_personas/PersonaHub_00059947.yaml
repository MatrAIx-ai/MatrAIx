persona_description: A learning health system researcher who collaborates with stakeholders within a health system to produce novel insights and evidence that can be rapidly implemented to improve the outcomes
  of individuals and populations and health system performance. This person must be embedded within the system that they are studying, either as an employee or invited guest, and execute scientific investigations
  in real-world settings in ways that do not disrupt day-to-day operations, ensuring that the researcher understands the context within which the work is being done. This individual has a highly specialized
  knowledge base that is constantly changing as they apply new things that they've discovered, whether in the lab, at the bedside, or within an emerging field called the learning health system.
