personas:
  professional: Wington Gaviria, a 24-year-old production operative in Vega Baja's manufacturing sector, leverages their knack for order and meticulous scheduling to excel at CNC and manual machine oversight,
    consistently logs precise production data, enforces safety protocols, and coordinates lean-manufacturing improvements while eyeing a shift-lead role within three years.
  sports: Wington Gaviria plays midfield for the Vega Baja Hurricanes community soccer league, joins beach volleyball matches with the local surf club, follows the Puerto Rico Islanders soccer team, and
    trains with the Bayamon Cyclists for weekend coastal rides, often coordinating practice times and they relish the camaraderie of team sports.
  arts: Wington Gaviria finds solace in strumming acoustic guitar while covering songs by John Mayer and Andres Cepeda, attends occasional live gigs featuring local salsa bands, and draws inspiration from
    the poetry of Julia de Burgos, weaving those influences into their creative downtime.
  travel: Wington Gaviria enjoys spontaneous weekend bike trips along the northern coast, has visited Old San Juan and Culebra for their historic charm and clear waters, dreams of exploring Barcelona's
    architecture and Japan's sushi markets, yet balances travel plans with budget constraints and family obligations.
  culinary: Wington Gaviria, an intermediate home cook, specializes in preparing mofongo with plantains, chicharron, and garlic sofrito, loves crafting alcapurrias and fresh seafood ceviche, and often experiments
    with cilantro, lime, and adobo seasoning while hosting family gatherings, where they enjoy sharing recipes and stories.
  core: Wington Gaviria is a structured, worry-prone 24-year-old who blends disciplined work ambitions with a love for soccer, guitar, and homemade Puerto Rican flavors, often juggling meticulous planning
    with moments of spontaneous indulgence, and they find balance through routine and creative outlets.
background:
  cultural: Wington was born and raised in Vega Baja, a coastal town in Puerto Rico known for its fishing heritage and tightly knit neighborhoods. He grew up speaking Spanish at home and learned English
    through school and work. His family follows Catholic traditions and actively participates in local fiestas that blend Afro‑Caribbean rhythms with Spanish customs. The strong sense of comunidad, respect
    for elders (respeto), and emphasis on helping neighbors have shaped his cooperative and considerate nature. Experiencing the island’s economic challenges has reinforced his practical outlook, desire
    for stability, and commitment to personal and professional growth.
attributes:
  skills: '[''Machine operation (CNC and manual)'', ''Technical drawing interpretation'', ''Preventive maintenance'', ''Quality inspection'', ''Safety protocol compliance'', ''Production scheduling'', ''Inventory
    tracking (ERP)'', ''Lean‑manufacturing basics'', ''Team coordination'', ''Record‑keeping'']'
  hobbies: '[''Soccer'', ''Acoustic guitar'', ''Cooking Puerto Rican cuisine'', ''Beach volleyball'', ''Coastal biking'', ''Reading self‑help and personal finance books'', ''Volunteering at community festivals'']'
  career_goals: Wington aims to transition from production worker to a supervisory role within the next three years, targeting positions such as shift lead or quality assurance specialist. He plans to obtain
    an OSHA 30‑hour certification and a Lean Six Sigma Yellow Belt while completing an associate degree in industrial technology. His long‑term ambition is to become a production manager, where he can design
    efficient workflows that reduce waste, improve worker safety, and foster a supportive team environment that helps mitigate stress for himself and his colleagues.
