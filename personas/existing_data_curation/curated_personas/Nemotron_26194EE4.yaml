personas:
  professional: Mariah Gardner, a veteran school bus driver with a Class B CDL, combines her deep knowledge of safety protocols and mechanical basics with a compassionate, calming presence that eases anxious
    children, while her innate curiosity pushes her to experiment with electronic route‑tracking tools even as her relaxed approach occasionally leads to last‑minute paperwork, and they often find themselves
    juggling mentorship duties with personal errands.
  sports: Mariah Gardner stays active through early‑morning birdwatching walks that serve as gentle cardio, participates in the Carroll County Senior Walking Club, and roots for the Baltimore Ravens and
    the Washington Capitals during the football and hockey seasons, while occasionally joining a neighborhood soft‑ball game for community fun, and they relish the camaraderie of the walking group despite
    occasional knee stiffness.
  arts: Mariah Gardner’s evenings echo the twang of Dolly Parton and the storytelling of Johnny Cash, her quilting projects draw inspiration from Appalachian folk patterns, and she regularly attends performances
    by the local Carroll County Playhouse, especially productions of classic Southern dramas by playwright Tennessee Williams, and they find solace in these artistic rituals after long days on the road.
  travel: Mariah Gardner favors flexible, self‑driven road trips that let her linger at historic Southern towns like Charleston, Savannah, and Natchez, while dreaming of a leisurely motorcoach tour of the
    English countryside, but her modest travel budget and weekly volunteer shifts at the church food bank keep her journeys short, often limited to weekend getaways, and they always pack a reusable water
    bottle and a pocket notebook for spontaneous sketches.
  culinary: Mariah Gardner, an accomplished home cook, frequently prepares Southern comfort foods such as chicken and dumplings, collard greens simmered with smoked ham hocks, and fresh garden tomato bruschetta,
    favoring ingredients like sweet corn, rosemary, honey, and locally grown heirloom tomatoes, and they delight in sharing these meals with neighbors during potluck evenings.
  core: Mariah Gardner blends a practical, safety‑first mindset with a curious love of history, yet her habit of misplacing route logs and chronic worry about minor mishaps keep her perpetually balancing
    order and chaos, and they often resort to making coffee at odd hours as a calming ritual.
background:
  cultural: Mariah grew up in a close‑knit, multigenerational family in rural Georgia, where Southern hospitality and Christian values shaped her worldview. Her upbringing emphasized community service,
    respect for tradition, and an appreciation for the region’s culinary and musical heritage. Although she identifies as white American, she feels a strong connection to the local landscape—its farms,
    churches, and small‑town festivals—and carries forward the legacy of practical, hands‑on craftsmanship and neighborly support that defines much of Carroll County’s cultural fabric.
attributes:
  skills: '[''Commercial Driver License (CDL) Class B'', ''Safe driving techniques'', ''School bus safety procedures'', ''Basic vehicle maintenance'', ''First aid and CPR'', ''Student behavior management'',
