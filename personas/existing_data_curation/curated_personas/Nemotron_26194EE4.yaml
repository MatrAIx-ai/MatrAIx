  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Quilting'', ''Country music'', ''Volunteering at the local church'', ''Cooking family recipes'', ''Birdwatching'', ''Nature walks'', ''Attending
    county fairs'', ''Collecting antique postcards'']'
  career_goals: While enjoying the flexibility of her current role, Mariah hopes to transition into a driver‑trainer position within the school district, where she can formalize her mentorship of new bus
    operators. She also envisions contributing to the development of a district‑wide safety curriculum that blends proven practices with emerging technology, such as electronic route‑tracking and driver
    wellness programs. Long‑term, she would like to support community transportation initiatives for seniors and individuals with limited mobility, leveraging her experience to create inclusive travel options
    in Carroll County.
