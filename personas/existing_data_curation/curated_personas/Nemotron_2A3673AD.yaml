personas:
  professional: Carol Palmer is a curious explorer who loves sorting blocks by colour and shape, already displaying organisational and problem‑solving skills that hint at a future career in engineering
    or design; they often arrange toys into neat rows before play.
  sports: Carol Palmer is a lively member of the Tiny Tots Soccer Club, frequently joining Sunday stroller‑run drop‑ins, and they cheer enthusiastically for the nearby professional soccer team City United
    FC.
  arts: Carol Palmer is an avid fan of the colourful tales by Seuss and the upbeat melodies of The Wiggles, often humming 'Twinkle Twinkle Little Star' while flipping through a board book, and they find
    that early art appreciation shapes their playful outlook.
  travel: Carol Palmer enjoys stroller‑friendly adventures, having recently explored the interactive children’s exhibit at the local science museum, soaked up sunshine on a family beach getaway to Santa
    Monica, and marveled at the bright lights of Disney World during a brief family vacation, and they always request a second snack after each outing.
  culinary: Carol Palmer shows a budding palate for soft foods, happily devouring mashed sweet potatoes seasoned with a pinch of cinnamon, gently slurping apple‑banana puree, and reaching eagerly for tiny
    cucumber sticks, though they often make a mess with the bright orange carrots.
  core: Carol Palmer combines boundless curiosity with a sociable, orderly spirit, turning everyday toddler routines into miniature adventures while they occasionally scatter toys in a delightful, chaotic
    trail.
background:
  cultural: Carol grows up in Hudsonville, Michigan, within a white Midwestern family that values community, modesty, and an appreciation for the outdoors. Local traditions such as county fairs, community
    potlucks, and seasonal celebrations shape her experience. Her household celebrates ordinary American holidays while also encouraging exposure to diverse art forms and open‑minded thinking, reflecting
    the region’s blend of traditional values and modern curiosity.
