personas:
  professional: Alexander Cranford, an aspiring teenage robotics enthusiast and budding mechanical engineer, channels curiosity and practicality through designing and programming small competition robots,
    balancing the strict schedule of their school's robotics club with the flexibility to iterate designs, and they assert their ideas while collaborating closely with a tight‑knit team of peers.
  sports: Alexander Cranford embraces the outdoors with weekend hikes in the Baraboo Range, occasional fishing trips on the Baraboo River, and a seasonal role on the Baraboo High School cross‑country team,
    while they cheer on Wisconsin’s Green Bay Packers and Milwaukee Brewers as their favorite professional teams.
  arts: Alexander Cranford cultivates artistic flair through sketching Baraboo’s historic architecture for a personal blog, drawing inspiration from Frank Lloyd Wright’s prairie‑style designs and Hayao Miyazaki’s
    animated narratives, and they often listen to Hans Zimmer’s orchestral scores during strategy‑game sessions.
  travel: Alexander Cranford prefers low‑cost, self‑planned getaways, having hiked Devil’s Lake State Park and explored the Milwaukee Art Museum, and they dream of an adventurous summer trip to Yellowstone
    National Park and a cultural immersion in Kyoto, Japan, budgeting these trips around school breaks and parental allowances.
  culinary: Alexander Cranford delights in crafting homemade margherita pizza with fresh basil, mozzarella, and San Marzano tomatoes, and they also master a simple chicken teriyaki stir‑fry seasoned with
    soy sauce, ginger, and garlic, and occasionally treat themselves to a bowl of clam chowder thick with potatoes and thyme.
  core: Alexander Cranford, a 15‑year‑old curiosity‑driven tinkerer, balances meticulous model‑building with solitary exploration of nature, often losing track of time sketching while they occasionally
    skimp on sleep and forget to stretch.
background:
  cultural: Alexander comes from a white, Midwestern family with deep roots in Wisconsin’s German‑Scandinavian heritage. Growing up in the historic mining town of Mineral Point, he is surrounded by a community
    that values self‑reliance, modesty, and respect for tradition. Local customs—such as seasonal county fairs, community potlucks, and church gatherings—have instilled in him a strong sense of community
    responsibility. The town’s emphasis on preserving its 19th‑century architecture and natural surroundings has fostered Alexander’s appreciation for history and the outdoors. While his family maintains
    a blend of Protestant and secular traditions, they encourage curiosity, education, and practical skill‑building, which align closely with his personal ambitions.
