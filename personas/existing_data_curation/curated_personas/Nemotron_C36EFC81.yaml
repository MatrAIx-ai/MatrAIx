  career_goals: Alexander hopes to combine his love of engineering and his practical mindset by pursuing a degree in Mechanical Engineering with a focus on sustainable energy solutions. He aims to attend
    a university that offers strong hands‑on labs, where he can work on projects such as designing small‑scale wind turbines or improving local water‑management systems. After graduation, he envisions joining
    a regional engineering firm that collaborates with rural communities to develop cost‑effective, environmentally friendly infrastructure. In the longer term, he aspires to use his expertise to help preserve
    the historic character of towns like Mineral Point while introducing modern, efficient technologies.
