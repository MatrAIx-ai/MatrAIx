persona_description: A historian who is fascinated by the study of societies and cultures throughout history, and is eager to understand the choices made in the past and consider in the future. They are
  curious about the foundations upon which our world is set and how it works, and are willing to explore the ideas and thoughts which have brought society to its current state. They are also skilled in
  connecting computer programming codes to the punch card systems used in the mechanised looms of late 18th century France, and are trained in evaluating texts and other cultural artefacts, formulating
  complex thoughts into easily understandable papers and presentations, and communicating new ideas to others.
