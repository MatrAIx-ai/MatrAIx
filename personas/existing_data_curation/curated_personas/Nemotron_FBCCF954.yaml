  hobbies: '[''Reading historical fiction'', ''Reading self‑improvement books'', ''Watching documentaries'', ''Gardening (vegetables and herbs)'', ''Journaling'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'',
