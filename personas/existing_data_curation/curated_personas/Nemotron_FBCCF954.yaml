  career_goals: Carla aims to advance from her current cashier role to a supervisory position within the next two years, targeting a shift‑lead or assistant manager role that emphasizes operational oversight
    and staff scheduling. She plans to enroll in a community college to earn an associate degree in Business Administration, followed by a QuickBooks certification to strengthen her bookkeeping expertise.
    Long‑term, Carla envisions managing a small retail or grocery store in her hometown, leveraging her organizational strengths and desire for a predictable, structured work environment. She also hopes
    to develop a side venture selling homemade baked goods at local markets, combining her culinary hobby with entrepreneurial ambition.
