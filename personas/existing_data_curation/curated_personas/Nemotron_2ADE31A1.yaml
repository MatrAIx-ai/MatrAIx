  career_goals: Margarita is driven to elevate health outcomes for underserved Latinx communities in Los Angeles County while advancing her own leadership trajectory. In the next five years, she aims to
    transition into a senior executive role—such as Director of Health Services or Vice President of Operations—where she can shape system-wide policies that address health disparities. To support this
    ambition, she plans to enroll in a Master’s program in Health Administration, deepening her strategic expertise. Margarita also seeks to launch a cultural-competency initiative that blends Guatemalan
    health traditions with evidence-based practices, enhancing patient education and engagement. Mentoring emerging health managers, integrating technology-enabled care coordination, and expanding community-based
    preventive clinics are key milestones in her vision to leave a measurable, lasting impact on regional health equity.
