personas:
  professional: Andrew Rogers is an aspiring junior architect‑in‑training who excels at translating detailed LEGO instructions into miniature structures, leveraging his methodical love of routine, practical
    mindset, and cooperative nature to meticulously plan each build while offering calm support to his cousin during chess games.
  sports: Andrew Rogers participates in the local after‑school soccer club, the Brookfield Bears, spends weekends practicing basic dribbling drills, and follows professional teams like the New York Yankees,
    the Chicago Bulls, and Manchester United on TV, preferring low‑pressure, routine‑based activities such as gentle backyard jogs during nature walks to stay fit.
  arts: Andrew Rogers delights in listening to Yiruma’s gentle piano piece "River Flows In You," humming along to Alan Menken’s Disney scores from "The Little Mermaid," admiring Chris Riddell’s whimsical
    illustrations in the Magic Tree House series, and occasionally improvises simple tunes on their small keyboard, weaving these artistic influences into quiet moments of creativity.
  travel: Andrew Rogers prefers well‑planned family trips, enjoying past visits to the Grand Canyon, Washington D.C.’s National Mall, and Disneyland in Anaheim, and dreaming of a future adventure to Machu
    Picchu in Peru, where they hope to combine their love of nature walks with organized guided tours.
  culinary: Andrew Rogers favors familiar comfort foods such as spaghetti with meatballs, chicken nuggets with honey‑mustard, pepperoni pizza, and peanut‑butter‑jelly sandwiches, often helping to stir soup
    or arrange toppings on pizza crust while carefully sprinkling shredded mozzarella, and they keep a small notebook of favorite recipes that includes ingredients like basil, cheddar, and strawberries.
  core: Andrew Rogers blends a meticulous love for routine with quiet curiosity, cataloguing rocks and LEGO builds, worrying over tiny details, yet finding calm in repetitive piano chords and chess strategy.
background:
  cultural: Andrew grew up in Monroe, a small town in Union County, North Carolina. His family reflects a typical Southern middle‑class upbringing, emphasizing community, hospitality, and family gatherings.
    He often participates in local events such as church youth activities, neighborhood barbecues, and holiday celebrations like Thanksgiving and the Fourth of July. The regional culture values modesty,
    politeness, and a strong sense of belonging, which aligns with Andrew’s cooperative and considerate nature. His household traditions include sharing meals, attending Sunday school, and enjoying Southern
    comfort foods, while also fostering his appreciation for personal responsibility and routine.
