  career_goals: Andrew dreams of a future where he can help others in a steady, predictable environment. He imagines becoming a teacher because he enjoys explaining things and likes the structure of a classroom
    routine. He also feels a strong affection for animals, which leads him to consider a career as a veterinarian or animal caretaker. Additionally, his love for building and problem‑solving makes him curious
    about engineering, especially designing simple machines. His ambitions are framed by his desire for stability, practical impact, and the chance to contribute to his community.
