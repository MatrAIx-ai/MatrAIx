  hobbies: '["drawing and sketching", "creative writing (short stories, poetry)", "reading fantasy and adventure books", "building LEGO creations", "participating in school drama club", "learning Mexican
    folk dance", "playing cooperative video games with friends", "digital art on a tablet", "DIY crafting", "helping with family cooking, especially making tamales"]'
  career_goals: Mirna dreams of becoming a visual storyteller—someone who blends illustration, writing, and animation to share vivid narratives. She hopes to attend an arts‑focused high school and eventually
    study graphic design or animation, with a long‑term goal of creating a graphic novel that weaves Mexican folk legends with modern adventure. She also envisions organizing community art workshops for
    kids, especially to celebrate and preserve her cultural heritage while encouraging imagination in others.
