personas:
  professional: Mirna Martinez is an aspiring digital illustrator and budding storyteller, whose vivid imagination and love for collaborative creativity drive them to experiment with sketch apps, narrative
    writing, and group projects, even as their relaxed attitude toward deadlines sometimes leads to unfinished pieces.
  sports: Mirna Martinez loves playing flag football during fall with the community youth league, cheers for the regional soccer club City FC, and enjoys dancing folk steps as cardio, though they often
    skip structured workouts in favor of spontaneous park games with friends.
  arts: Mirna Martinez immerses themselves in the whimsical worlds of Hayao Miyazaki’s animated films and the lyrical storytelling of Lin‑Manuel Miranda’s musical theatre, channeling that inspiration into
    detailed sketchbook doodles, LEGO dioramas, and original short poems performed at school drama club productions.
  travel: Mirna Martinez prefers spur‑of‑the‑moment weekend trips to nearby state parks like Redwood Ridge, delighting in nature hikes and pond‑skipping, while day‑dreaming about a future family vacation
    to the ancient ruins of Machu Picchu, though their lack of meticulous planning often means they rely on parents to arrange itineraries.
  culinary: Mirna Martinez loves the tactile joy of helping roll tamales with masa, pork, and chilies alongside family, but also experiments with simple sushi rolls and rainbow fruit smoothies, showcasing
    a budding cooking skill that mixes traditional hand‑crafted recipes with playful, colorful snacks.
  core: Mirna Martinez's boundless imagination fuels endless sketching and storytelling, yet their habit of leaving school projects half‑finished and losing track of time while gaming often lands them in
    a last‑minute scramble.
background:
  cultural: Mirna is a second‑generation Mexican American whose parents hail from Jalisco. At home, Spanish is spoken alongside English, and family traditions such as Día de los Muertos altars, Cinco de
    Mayo celebrations, and weekly meals featuring tacos, tamales, and pozole are central to her upbringing. She attends a local Hispanic Catholic parish where community festivals reinforce her connection
    to Mexican culture. Living in Sycamore, Illinois, she also embraces Midwestern customs—like Halloween, school sports, and summer picnics—blending them with her heritage. This bicultural environment
    nurtures her values of familismo, cooperation, and respect, influencing both her social interactions and creative pursuits.
attributes:
  skills: '["creative writing", "digital illustration", "basic HTML/CSS", "Scratch programming", "sketching and drawing", "bilingual communication in Spanish and English", "team collaboration", "public
