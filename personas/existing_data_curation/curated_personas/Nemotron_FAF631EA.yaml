  career_goals: Edilberto aspires to turn his artistic passion into a professional pathway. He aims to pursue graphic design or illustration through community college courses or an apprenticeship, building
    a strong portfolio for freelance work or joining a creative studio. He also hopes to lead community art initiatives that empower youth, possibly establishing a local art collective. Long‑term, he envisions
    using his creativity to influence social change, such as becoming an art therapist or cultural program coordinator where his imagination, empathy, and collaborative skills can make a meaningful impact.
