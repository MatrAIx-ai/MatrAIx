  hobbies: '["Heirloom vegetable gardening", "Native flower gardening", "Birdwatching", "Hiking in Yolo Bypass Wildlife Area", "Watercolor painting", "Yoga", "Mindfulness meditation", "Journaling", "Cooking
    farm-to-table meals", "Knitting", "Volunteering for community STEM workshops"]'
  career_goals: Approaching retirement, Jillianne plans to shift into a part‑time consulting role that helps local farms and small agricultural businesses adopt resilient irrigation and renewable‑energy
    solutions. She aims to mentor the next generation of engineers through structured apprenticeship programs, lead community‑driven sustainability projects, and author a practical guide on low‑impact water
    management for the Yolo County region. Balancing her desire for structure with her need for flexibility, she also seeks a lower‑stress work rhythm that supports her emotional well‑being.
