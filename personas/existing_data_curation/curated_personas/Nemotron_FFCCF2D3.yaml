personas:
  professional: A seasoned civil and mechanical engineer, Jillianne Soulia leverages 35 years of water‑resource design expertise—from AutoCAD‑driven irrigation schematics to GIS‑based site analyses—to mentor
    emerging engineers and consult part‑time on resilient, low‑impact irrigation and renewable‑energy projects for Central Valley farms, while they juggle a preference for structured planning against an
    innate flexibility that sometimes undermines deadline adherence.
  sports: A devoted member of the Yolo County Hiking Club, Jillianne Soulia spends weekends trekking the Yolo Bypass Wildlife Area while birdwatching, occasionally joins a local senior pickleball league,
    and roots for Bay Area teams such as the Sacramento Kings, Golden State Warriors, and Oakland Athletics, balancing low‑impact activity with their love for the outdoors.
  arts: An avid watercolorist and knitwear enthusiast, Jillianne Soulia captures the shifting light of Yolo's wetlands on canvas inspired by Claude Monet and Georgia O'Keeffe, spends evenings stitching
    scarves for family while listening to folk legends like Joan Baez, and regularly visits the Davis Arts Center exhibitions to stay connected with the regional art scene, reflecting their appreciation
    for both visual and tactile creativity.
  travel: Preferring contemplative, small‑group trips, Jillianne Soulia has explored the serene trails of Yosemite, the coastal beauty of Mendocino, and recently visited Japan's rice‑paddy terraces to study
    traditional irrigation, while they plan a future pilgrimage to the historic vineyards of Napa Valley for a blend of culinary and agronomic inspiration.
  culinary: An enthusiastic farm‑to‑table chef, Jillianne Soulia delights in preparing heirloom tomato gazpacho, roasted beet and goat cheese salad with local honey, and herb‑infused sourdough bread, often
    foraging fresh kale and rosemary from their garden and pairing meals with California pinot noir, though they sometimes over‑spice dishes in moments of heightened anxiety.
  core: Jillianne Soulia blends meticulous engineering precision with a spontaneous love for solitary gardening, watercolor painting, and mindful yoga, navigating chronic anxiety through structured routines
    they occasionally abandon for impulsive seed‑buying sprees and late‑night sketching sessions.
background:
  cultural: Jillianne was raised in a middle‑class, Midwestern family of German‑Irish ancestry and moved to California in her early thirties to pursue an engineering career. As a white American, she grew
    up celebrating traditional holidays such as Thanksgiving, Christmas, and the Fourth of July, while also adopting the West Coast appreciation for outdoor recreation and community involvement. Living
    in Dixon, Yolo County for the last three decades has immersed her in the region’s agricultural heritage, fostering a deep respect for sustainable farming practices and a strong sense of local civic
    duty. Her background blends Midwestern practicality with Californian environmental consciousness.
attributes:
  skills: '["Sustainable water resources engineering", "AutoCAD", "SolidWorks", "Geographic Information Systems (GIS)", "Project lifecycle management", "Regulatory compliance (EPA, California Water Code)",
