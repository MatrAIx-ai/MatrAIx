  career_goals: Hope dreams of turning her artistic curiosity into a professional career that merges creativity with structured project leadership. In the short term she hopes to gain admission to a specialized
    arts high school, then pursue a degree in visual design, animation, or museum curation, with the ultimate ambition of directing exhibitions and youth art programs that inspire group collaboration and
    innovative thinking.
