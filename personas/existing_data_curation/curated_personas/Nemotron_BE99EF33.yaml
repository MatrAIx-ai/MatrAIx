  career_goals: Eugene dreams of becoming an astronaut or an engineer who designs rockets and solves real-world problems. He also enjoys helping others learn, so he imagines himself as a teacher or community
    leader who can inspire his classmates. His goal is to combine his love of science and building with his sociable, organized personality to make a positive impact.
