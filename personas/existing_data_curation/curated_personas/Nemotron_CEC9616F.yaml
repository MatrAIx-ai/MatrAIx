personas:
  professional: Jose Herrera leverages his rigorous accounting expertise, from GAAP‑compliant financial reporting to ERP implementation, while channeling his natural talkativeness and compassion into leading
    audit teams, mentoring junior staff, and championing process improvements that keep his firm both compliant and collaborative.
  sports: Jose Herrera laces up for a community soccer league every Saturday, cheering on the Chicago Fire during the MLS season, follows the Chicago Cubs' games with family, and spends Sunday afternoons
    hiking the Palos Trail in a nearby forest preserve, mixing competitive play with relaxed outdoor fitness.
  arts: Jose Herrera enjoys salsa dancing to the rhythms of Celia Cruz and Marc Anthony at local Latin nights, attends annual Cinco de Mayo and Día de los Muertos festivals for their vibrant art installations,
    and unwinds by streaming classic films known for their visual storytelling while also volunteering at a community theater to practice public speaking.
  travel: 'Jose Herrera plans trips with a balance of structure and spontaneity: they’ve visited their extended family’s homeland in the region south of the border, enjoy weekend road trips to New Orleans
    for its music scene, and schedule annual hikes in the Canadian Rockies, while relying on meticulously organized itineraries and a spreadsheet of travel costs.'
  culinary: Jose Herrera masters traditional home‑cooked dishes like chicken mole, slow‑braised pork carnitas, and hand‑rolled corn tamales, often sourcing fresh chilies, corn masa, and locally milled flour
    from the farmer’s market, and showcases these meals at family gatherings, while also experimenting with modern plating techniques learned from online culinary classes.
  core: Jose Herrera is a detail‑driven accountant who juggles structured budgets, lively salsa nights, and community mentorship, all while habitually over‑scheduling and occasionally neglecting sleep in
    pursuit of both professional excellence and social connection.
background:
  cultural: Jose was raised in a bilingual Mexican household, speaking Spanish at home and English in school, which gives him fluency in both languages and a deep appreciation for Mexican traditions. Family
    ties, respect for elders, and a strong sense of community are central to his identity. Living in Wheaton, IL, he blends his cultural heritage with Midwestern values of punctuality and structure, fostering
    a balanced outlook that respects both his roots and his professional environment. He actively engages with the local Mexican community through festivals, volunteer work, and by supporting fellow Mexican‑American
    entrepreneurs.
attributes:
  skills: '["Financial Reporting","Audit Planning and Execution","Tax Preparation","GAAP Compliance","Financial Analysis","Data Visualization (Power BI)","Process Improvement","ERP System Management (SAP,
