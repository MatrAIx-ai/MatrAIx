  hobbies: '["Playing Soccer in Local Leagues","Cooking Traditional Mexican Dishes","Volunteering for Hispanic Community Outreach Programs","Attending Cultural Festivals (Cinco de Mayo, Día de los Muertos)","Reading
    Personal Development and Business Books","Participating in Toastmasters","Listening to Financial Podcasts","Traveling to Mexico to Visit Family","Hiking and Trail Running","Dancing Salsa","Board Games
    Nights with Friends"]'
  career_goals: Jose aims to become a Certified Public Accountant (CPA) within the next two years and advance to a senior auditor or audit manager role where he can lead complex engagements. His long‑term
    ambition is to transition into a strategic finance leadership position, such as CFO, or to launch his own boutique accounting consultancy that specializes in serving small Mexican‑American businesses
    in the Chicago suburbs. He seeks roles that combine analytical rigor with opportunities to mentor others, drive process improvements, and contribute to community‑focused financial literacy programs.
