persona_description: A music enthusiast and music historian who is particularly interested in the works and life of Felix Mendelssohn, a German composer, pianist, organist, and conductor of the early Romantic
  period. They appreciate his conservative musical tastes and his contributions to the Leipzig Conservatoire (now the University of Music and Theatre Leipzig), which became a bastion of this anti-radical
  outlook. They also admire his musical abilities and his ability to revive interest in the music of Johann Sebastian Bach.
