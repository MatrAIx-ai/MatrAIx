  career_goals: Victoria aims to leverage her extensive data entry experience into a supervisory role where she can lead a small team, oversee data integrity initiatives, and drive process improvements
    across the office. She plans to obtain a Microsoft Office Specialist certification and pursue a Certified Data Management Professional credential to strengthen her technical credibility. Over the next
    few years, she intends to enroll in a bachelor's program in Information Systems or Business Administration to broaden her strategic perspective. Her long‑term ambition includes transitioning into a
    data analyst position, focusing on generating actionable insights for her organization, while also establishing a mentorship program for junior staff within her community workplace.
