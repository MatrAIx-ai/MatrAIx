persona_description: A conservation biologist who is interested in the energy stores of cetaceans and the potential use of total lipid content in dart biopsy samples to estimate body condition. They are
  familiar with the challenges of collecting tissue samples from large, inaccessible animals and are looking for new methods to improve the accuracy and reliability of body condition assessments. They are
  also interested in the potential of other biomarkers in the blubber to provide additional information about individual energy stores.
