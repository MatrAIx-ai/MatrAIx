  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Desert landscape photography'', ''Hiking in Joshua Tree'', ''Yoga'', ''Reading literary fiction'', ''Local theater performances'', ''Gardening'',
    ''Mediterranean cooking'', ''Wine tasting'', ''Volunteering at community arts festivals'', ''Exploring new cultural experiences'']'
  career_goals: Tracy aspires to move into a supervisory position within the correctional system, aiming to become a unit manager or correctional program coordinator. She is passionate about institutionalizing
    arts‑based rehabilitation, seeking to launch a pilot creative‑therapy program that integrates visual arts, music, and storytelling for inmates. To support this, she plans to earn a certification in
    correctional counseling and a graduate certificate in arts administration. Over the long term, Tracy hopes to mentor junior officers, influence policy on humane inmate treatment, and eventually transition
    to a part‑time role that allows more time for community arts leadership in Palm Springs.
