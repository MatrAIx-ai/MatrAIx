persona_description: A member of the U.S. Census Bureau who is responsible for disseminating income, poverty and health insurance estimates for the 2010 Census, as well as the American Community Survey
  (ACS). This individual is likely to be interested in the detailed release schedule for the 2010 Census statistics, the analysis of socioeconomic and housing data from the ACS, and the upcoming topic-based
  briefs that will analyze a wide range of topics and change over time. This person is also likely to be knowledgeable about the history and procedures of the Census Bureau, and may be interested in the
  release of PUMS files for each of the three data sets.
