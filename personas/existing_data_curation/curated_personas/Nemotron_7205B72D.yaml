  hobbies: '[''Fishing'', ''Hunting'', ''Strategy video gaming'', ''Model airplane building'', ''Acoustic guitar'', ''Youth group activities'', ''Volunteer community service'', ''Reading science fiction'',
    ''Nature hiking'', ''DIY electronics projects'']'
  career_goals: Anthony aspires to become a certified automotive technician, aiming to enroll in a vocational program at a community college and earn an ASE certification. He also considers a parallel path
    in information technology support, attracted by his curiosity about computers. Long‑term, he hopes to open a small repair shop that serves his hometown and provide reliable service to neighbors. He
    values career options that blend practical problem‑solving with community contribution, and he is open to joining the National Guard in a technical role to gain disciplined training and give back to
    his region.
