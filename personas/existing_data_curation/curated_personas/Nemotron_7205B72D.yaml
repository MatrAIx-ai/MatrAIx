personas:
  professional: Anthony Phillips, a 15‑year‑old budding wildlife enthusiast, channels their curiosity and practicality into building model airplanes and strategizing video games, collaborates with friends
    on outdoor projects, and envisions a future career in environmental science where they can combine hands‑on engineering with a love for Mississippi’s rivers and woods.
  sports: Anthony Phillips enjoys the outdoors through weekend fishing and hunting excursions, follows the Mississippi State Bulldogs football team, participates in school cross‑country runs to stay fit,
    and is a member of the local youth hiking club that meets at the Natchez Trace trail.
  arts: Anthony Phillips expresses creativity on acoustic guitar by writing simple worship songs for their church youth group, draws lyrical inspiration from folk legends like Bob Dylan and contemporary
    storytellers such as Brandon Sanderson, and unwinds listening to lo‑fi soundtracks from the video game "Civilization VI" while assembling model airplanes, occasionally humming themes composed by Hans
    Zimmer.
  travel: Anthony Phillips prefers road trips that blend adventure with familiar comfort, having explored the Gulf Coast’s beaches in Biloxi, taken a family hike through Shenandoah National Park, and dreaming
    of future backpacking in the Rocky Mountains while budgeting trips around school breaks and parental permissions.
  culinary: Anthony Phillips enjoys cooking freshly caught catfish with a cornmeal crust, savors Southern classics like fried green tomatoes, collard greens, and biscuits topped with honey butter, and experiments
    with simple seasoning blends of garlic, smoked paprika, and lemon zest when preparing weekend barbecues for friends.
  core: Anthony Phillips is a pragmatic teen who balances a love for the outdoors, strategic gaming, and guitar songwriting, staying reliably kind and organized yet flexible, while occasionally leaving
    guitar picks scattered on the floor and forgetting to pause the game for homework.
background:
  cultural: Anthony grew up in Corinth, Alcorn County, Mississippi, within a white, working‑class Southern community where family, church, and high school football shape daily life. The region’s cultural
    values—Southern hospitality, respect for manual labor, modesty, and a pragmatic outlook—are reflected in his easygoing yet responsible demeanor. He participates in local traditions such as county fairs,
    church potlucks, and community service events, and he enjoys regional foods like fried catfish and barbecue. This background provides a strong sense of belonging, community responsibility, and a blend
    of traditional and practical influences that guide his personal and future professional aspirations.
attributes:
  skills: '[''Basic automotive repair'', ''Woodworking and DIY projects'', ''Computer troubleshooting'', ''Introductory coding (Scratch, Python)'', ''Project planning and organization'', ''Effective team
