  hobbies: '[''Watercolor painting'', ''Visiting modern art museums'', ''Exploring contemporary art galleries'', ''Cooking Puerto Rican cuisine'', ''Collecting vintage vinyl records'', ''Listening to salsa
    and plena music'', ''Reading biographies of innovators'', ''Playing chess'', ''Urban walking and street photography'', ''Attending small live music gigs'']'
  career_goals: Javier aims to become a senior audit manager within the next three years and eventually attain partnership or launch his own boutique advisory firm that offers data‑driven audit and consulting
    services to small and medium‑size enterprises, especially those owned by Latino entrepreneurs. He plans to complete his CPA certification, deepen his expertise in analytics and emerging audit technologies,
    and build a reputation as a trusted advisor who can bridge cultural nuances with rigorous financial oversight. Additionally, he hopes to mentor the next generation of accountants and support local arts
    and cultural nonprofits through pro‑bono financial guidance.
