    "Collaborative project facilitation"]'
  hobbies: '["Community theater", "Jazz and blues concerts", "Gardening", "Hiking in Contra Costa parks", "Cooking soul food with modern twists", "Reading multicultural children''s literature", "Yoga for
    stress relief", "Social dancing (hip hop, African dance)", "DIY crafts for classroom décor", "Volunteering at community center workshops"]'
  career_goals: Dorothy aims to become a lead teacher or curriculum coordinator at a progressive preschool where she can influence school‑wide instructional practices. She plans to pursue a Master’s degree
    in Early Childhood Education to deepen her expertise in inclusive curriculum development. Long‑term, she envisions launching a community‑based early literacy program that incorporates African‑American
    cultural narratives and family involvement, and eventually opening her own early learning center that serves as a hub for cultural enrichment and equitable access to quality preschool education. Additionally,
    she hopes to advocate for district policies that support flexible, child‑centered teaching models and professional development for early educators.
