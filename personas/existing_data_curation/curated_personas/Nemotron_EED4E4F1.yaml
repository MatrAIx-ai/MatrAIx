  career_goals: Corey aims to finish high school with strong grades in math and science so he can earn a scholarship to study computer science or mechanical engineering. He dreams of one day developing
    video games or working as a software engineer for a tech company, where clear project structures and measurable milestones suit his preference for predictability. In the short term, he wants to join
