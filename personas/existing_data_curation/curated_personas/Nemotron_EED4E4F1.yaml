personas:
  professional: Corey Miller is a teen esports enthusiast who channels strategic thinking from competitive multiplayer games into building Python scripts and designing intricate LEGO models, thriving on
    clear rules while they relish the occasional chaotic brainstorming session.
  sports: Corey Miller shuttles between shooting hoops at the neighborhood park, where they emulate the fast-break style of the NBA's Golden State Warriors, and skating with the local skate crew "Ramp Runners,"
    preferring spontaneous pick-up games over structured practice, which mirrors their love for flexibility and competition.
  arts: Corey Miller draws comic strips inspired by the irreverent humor of Jeff Smith's 'Bone' and the gritty storytelling of Alan Moore, while their playlist—filled with Arctic Monkeys, Foo Fighters,
    and Mitski—feeds the creative bursts they experience during late-night sketching sessions.
  travel: Corey Miller dreams of a backpacking trip to Kyoto's anime districts after a family road-trip to Yellowstone nurtured their love for immersive experiences, yet they usually plan short weekend
    outings to nearby skate parks and video-game conventions, balancing limited teen budget with a craving for adventure.
  culinary: Corey Miller's go-to meals are pepperoni pizza slices and instant ramen topped with a splash of sriracha, and they can modestly whip up a grilled cheese while experimenting with homemade guacamole,
    showing a casual yet curious approach to cooking that includes a love for bold, spicy flavors.
  core: Corey Miller is a competitively driven teen who oscillates between hyper-focused gaming marathons and impromptu skateboard tricks, often battling intense anxiety that fuels both their determination
    and occasional emotional meltdowns, and they frequently seek quiet moments to reset.
background:
  cultural: Corey grew up in North Royalton, a suburban community in Cuyahoga County, Ohio, where Midwestern values of modesty, community involvement, and family orientation are prominent. His household
    reflects typical White, middle‑class American culture, with occasional participation in local church activities and community events such as the county fair and high‑school sports nights. The region’s
    blend of industrial heritage and suburban life, combined with a strong emphasis on school sports and extracurricular clubs, shapes his worldview. As part of a generation raised on digital media, Corey
    balances his offline community ties with a vibrant online gaming culture.
