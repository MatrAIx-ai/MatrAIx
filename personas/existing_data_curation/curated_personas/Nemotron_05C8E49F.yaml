personas:
  professional: Kim Nation is an aspiring young naturalist who blends their love of reading wildlife books and hands‑on science club experiments with a methodical, organized approach that already sees them
    designing simple LEGO ecosystems and cataloging bird sightings.
  sports: Kim Nation plays on the Mariposa Youth Soccer League’s U‑10 team, where they balance competitive spirit with teamwork, cheer for the local high school soccer team, the Mariposa Warriors, and spend
    weekends sprinting up the trails to improve stamina for both sport and nature walks.
  arts: Kim Nation channels their imagination into sketching forest animals and practicing piano pieces like “Für Elise,” while also admiring illustrators such as Mary GrandPré and listening to the whimsical
    scores of the “Harry Potter” soundtracks, which inspire their own LEGO wildlife builds.
  travel: Kim Nation loves weekend nature hikes in the Sierra foothills, dreams of visiting Yellowstone’s geysers and the Redwood forests, and enjoys planning family road trips with a colorful map, though
    they sometimes overpack with too many rocks and stickers.
  culinary: Kim Nation revels in baking chocolate chip cookies with their family, perfects the balance of buttery dough and crisp edges, and experiments with adding rolled oats and dried cranberries, while
    also insisting on a side of carrot sticks after soccer practice.
  core: Kim Nation is a curious, organized nine‑year‑old who merges a love for wildlife, LEGO engineering, and piano into a methodical yet playful pursuit of knowledge, often juggling savings for new kits
    with the occasional cookie‑baking misadventure.
background:
  cultural: Kim is a Black American growing up in Mariposa, California. Her family honors African‑American traditions through music, storytelling, and food—celebrating Juneteenth, Black History Month, and
    attending a local church where she participates in youth events. Her parents emphasize education, community service, and pride in cultural heritage, sharing stories of relatives who migrated from the
    South and settled in California. While she enjoys the outdoor, rural lifestyle of the Sierra foothills, she also stays connected to broader Black cultural influences through music, family gatherings,
    and school programs that highlight diverse histories.
