  career_goals: Kim dreams of becoming a wildlife biologist or environmental scientist who can protect the animals and habitats of nearby Yosemite National Park. She also imagines herself as an elementary
    school teacher who can inspire curiosity in younger children. In the short term, she hopes to lead her school’s science club, volunteer for community clean‑up projects, and eventually help create a
    small community garden in Mariposa to combine her love of nature with practical stewardship.
