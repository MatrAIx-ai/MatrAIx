  career_goals: As he approaches retirement, Reginald aims to transition from full‑time field work to a part‑time mentor and safety instructor for the local union training program. He hopes to launch a
    modest consulting service that helps historic Branson hotels upgrade their plumbing and steam systems while preserving original architecture. He also wishes to write a practical guide for DIY homeowners
    on maintaining older pipework, providing a steady supplemental income. Ultimately, his goal is to secure enough financial stability to travel with his wife, reduce work‑related stress, and remain a
    valued resource for younger tradespeople.
