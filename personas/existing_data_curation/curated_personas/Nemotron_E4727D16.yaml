    problem solving: matching shape sorters'']'
  hobbies: '[''building wooden block towers'', ''reading picture books with repeated phrases'', ''singing and clapping to nursery rhymes'', ''pretend caring for stuffed animals'', ''shape‑sorting puzzles'',
