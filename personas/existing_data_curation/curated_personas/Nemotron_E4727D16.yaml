personas:
  professional: Lindsay Wade, a two-year-old who meticulously lines up building blocks each morning, already shows a budding professional mindset by treating playtime as a structured project where they
    reliably follow simple step-by-step routines and eagerly assist caregivers with tidy-up tasks.
  sports: Lindsay Wade, a two-year-old enrolled in a toddler gymnastics class at the local community center, energetically practices balance beams while they cheer for the nearby baseball team, the Milwaukee
    Brewers, and they enjoy weekend visits to the park’s splash pad as their version of a low-key athletic outing.
  arts: Lindsay Wade, a two-year-old who loves listening to Raffi’s "Banana Pancakes" and the classic lullaby "Twinkle, Twinkle, Little Star," spends afternoons coloring pictures of animals with Crayola
    crayons, and eagerly participates in weekly story-time sessions at the neighborhood library where they clap along to the narrated tales.
  travel: Lindsay Wade, a two-year-old who recently traveled with family to Yellowstone National Park, marvels at the steaming geysers during a carefully timed stroller walk, prefers trips that follow a
    familiar itinerary with designated nap slots, and dreams of someday visiting Disney’s Magic Kingdom where they imagine meeting their favorite cartoon characters.
  culinary: Lindsay Wade, a two-year-old with a fondness for cheesy macaroni, chicken nuggets, and sweet banana slices, can expertly use a child-safe spoon to stir yogurt, yet habitually pushes aside foods
    with strong textures like peas, often negotiating for extra cheese before agreeing to try a new bite.
  core: Lindsay Wade, a two-year-old who thrives on routine, shows compassion toward peers, and meticulously organizes toys, blends a quiet, cooperative spirit with a pragmatic approach to daily life, and
    they occasionally indulge in picky-eating habits and a relentless fascination with sorting objects.
background:
  cultural: 'Lindsay grows up in a white, middle‑class American family in Schenectady, New York, a city with Dutch colonial roots and a blend of industrial and suburban culture. Her upbringing reflects
    typical upstate New York customs: celebrating holidays such as Thanksgiving, Halloween, and Christmas; participating in community preschool programs; attending local events like the summer farmer''s
    market and the historic Stockade Festival. These cultural experiences provide a stable, community‑focused environment that supports her love of routine and her compassionate outlook.'
attributes:
  skills: '[''basic vocabulary (~50 words) and simple sentence use'', ''fine motor skills: stacking 3‑4 blocks, turning pages of board books'', ''gross motor skills: walking unassisted, climbing low steps'',
