  career_goals: Although only two years old, Lindsay frequently expresses a desire to "help people" and envisions herself in caring roles. She loves saying she wants to be a "helper", a "teacher" who reads
    stories, or a "doctor" who makes others feel better. These early ambitions reflect her compassionate, harmony‑seeking personality and hint at a future interest in education or health‑care professions
    where she can provide stability and support.
