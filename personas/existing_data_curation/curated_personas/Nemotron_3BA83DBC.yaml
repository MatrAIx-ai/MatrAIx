  career_goals: Stephanie aims to earn a GED and enroll in a community‑college program in visual arts or arts administration. Her long‑term ambition is to become a graphic designer or museum curator who
    can design inclusive exhibitions that reflect diverse perspectives. She also hopes to combine her love of art with community service by running after‑school art workshops for younger students in Traverse
    City and eventually working for a nonprofit that brings arts programming to underserved neighborhoods. Travel to major art hubs like New York, Chicago, and Montreal is a personal dream that she believes
    will broaden her creative outlook.
