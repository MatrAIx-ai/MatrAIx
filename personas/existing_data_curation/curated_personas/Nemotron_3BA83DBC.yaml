personas:
  professional: Stephanie Bessette, an aspiring visual artist with a budding interest in arts administration, channels their curiosity and methodical organization into digital illustrations, watercolor
    landscapes, and meticulously planned community art events at the Traverse City public library.
  sports: Stephanie Bessette stays active by hiking the dunes of Sleeping Bear each weekend, cheerfully tracks the Detroit Lions and Red Wings, and participates in a local Lake Michigan Trail Club run where
    their organized nature ensures they stick to a regular training schedule while still cherishing solitary moments on the trail.
  arts: Stephanie Bessette draws creative inspiration from the vivid watercolors of Georgia O'Keeffe, the intimate portraits of Annie Leibovitz, and the melodic folk of Bon Iver, weaving these influences
    into their own sketchbooks, poetry journals, and occasional acoustic guitar sessions at friends’ gatherings.
  travel: Stephanie Bessette approaches travel with a blend of meticulous planning and wanderlust, using spreadsheets and Pinterest boards to map art‑focused trips to New York’s MoMA, Chicago’s Art Institute,
    and a dream weekend in Montreal’s mural‑rich Plateau, while also savoring spontaneous road‑trips to Mackinac Island.
  culinary: Stephanie Bessette delights in preparing family recipes such as slow‑cooked lamb stew with rosemary, pan‑seared lake trout with lemon‑butter, and hand‑rolled cinnamon rolls, showcasing a solid
    home‑cook skill set that balances comforting tradition with occasional experimental spice pairings.
  core: Stephanie Bessette is a curiosity‑driven teen artist whose organized budgeting coexists with occasional impulsive sketch‑marathons, a love for lake‑side hikes, and a habit of procrastinating schoolwork
    for late‑night poetry.
background:
  cultural: Stephanie grew up in a predominantly white, middle‑class family in Traverse City, Michigan. Her ancestors include French‑Canadian settlers, and occasional family gatherings feature bilingual
    conversations and traditions such as maple‑syrup desserts and stories of the Great Lakes region. The Midwestern values of community cooperation, modesty, and an appreciation for the natural environment—especially
    the changing seasons around the lake and cherry orchards—have shaped her worldview. She participates in local art festivals, supports the region’s vibrant seasonal celebrations, and feels a strong sense
    of belonging to the close‑knit small‑town culture that emphasizes harmony, mutual support, and a love of the outdoors.
