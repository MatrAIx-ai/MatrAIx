  career_goals: Tamaria aims to transition from host to a supervisory role, such as floor manager or operations coordinator, where she can apply her systematic planning skills across multiple shifts. She
    hopes to leverage her associate degree in hospitality to mentor younger staff and implement modern reservation technologies. Long‑term, she dreams of opening a modest, community‑focused coffee shop
    that showcases local art and serves as a gathering place for seniors and families, reflecting her love for both tradition and innovation.
