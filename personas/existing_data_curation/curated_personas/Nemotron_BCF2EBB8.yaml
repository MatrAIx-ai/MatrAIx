personas:
  professional: Tamaria Love is a front‑of‑house specialist who blends curiosity for emerging reservation technologies with a methodical, detail‑oriented approach to guest flow, conflict resolution, and
    staff training, positioning herself for a supervisory role that can shape community‑focused dining experiences.
  sports: Tamaria Love enjoys leisurely walks in Arlington’s leafy parks, participates in a community senior softball league each spring, follows the Washington Nationals baseball team, and occasionally
    joins a local yoga class to counteract joint aches.
  arts: Tamaria Love weaves creativity through quilting intricate geometric patterns inspired by the works of Faith Ringgold, sings in her church choir covering classics by Ella Fitzgerald and Sam Cooke,
    and fills her evenings reading historical nonfiction about social justice while listening to the soulful brass of Louis Armstrong.
  travel: Tamaria Love prefers relaxed road trips to historic Southern towns like Savannah and Charleston, often planning itineraries around local heritage tours, while dreaming of a pilgrimage to the misty
    hills of Asheville’s Blue Ridge Parkway.
  culinary: Tamaria Love’s culinary experiments blend Southern comfort staples—such as fried chicken and collard greens—with global flavors like Thai coconut curry, leading her to create dishes like shrimp‑and‑grits
    pho, seasoned with smoked paprika, fresh basil, and a dash of ginger.
  core: Tamaria Love is a meticulous, community‑oriented hostess who channels her curiosity into culinary mash‑ups, balances garden‑fresh serenity with a lingering worry about the future, and can’t resist
    a nightly jazz record before bedtime.
background:
  cultural: Tamaria is an African‑American woman whose roots run deep in the Southern United States. Raised in a close‑knit, church‑centered community, she internalized values of hospitality, respect for
    elders, and collective responsibility. Family stories of the Great Migration and the civil‑rights era shape her worldview, and she actively celebrates cultural traditions such as Juneteenth and Kwanzaa.
    Her Southern upbringing influences her love of comfort cuisine, storytelling, and community gatherings, while her cultural heritage fuels a commitment to mentor younger generations and preserve the
    narratives of her ancestors.
