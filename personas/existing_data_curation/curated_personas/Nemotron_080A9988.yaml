  career_goals: Although retired, Lisa aims to deepen her impact on the Sugarloaf community by expanding the intergenerational art program she started, documenting the town's history for future archives,
    and publishing a memoir that weaves together personal memories with broader social changes she has witnessed. She hopes to travel to a few California museums and cultural sites each year to satisfy
    her curiosity, while also completing a series of watercolor paintings that capture the local landscape. Maintaining her health and emotional well-being is a personal ambition, prompting her to practice
    mindfulness and stress‑relief techniques.
