personas:
  professional: Andrea Imholz is a budding architect in the making, channeling her love for LEGO construction and systematic problem solving into designing intricate model buildings, while their methodical
    nature ensures they follow every step of the building guide with precision.
  sports: Andrea Imholz enjoys playing soccer with the Greenfield Tigers youth league, they follow a structured after‑school routine for conditioning, and they root for the Seattle Seahawks, cheering every
    Sunday game with a homemade foam finger.
  arts: Andrea Imholz immerses themselves in creative worlds by reading the Harry Potter series by J.K. Rowling, practicing piano pieces by Ludwig van Beethoven three times weekly, and they listen to upbeat
    songs by Taylor Swift while building LEGO sets, which fuels their imagination and sense of order.
  travel: Andrea Imholz loves family road trips to familiar places like Yellowstone National Park, cherishes the structured itinerary of their annual visit to Walt Disney World in Orlando, and dreams of
    a future adventure to Kyoto, Japan, where they can explore historic temples and cherry blossoms under a carefully planned schedule.
  culinary: Andrea Imholz, a budding home chef, delights in baking vanilla cupcakes topped with swirls of buttercream frosting, whipping up simple spaghetti with marinara using garden‑fresh tomatoes, and
    crafting carrot sticks with hummus, all following step‑by‑step recipes that satisfy their love for order, and they often share the treats with friends at Girl Scouts meetings.
  core: Andrea Imholz balances a love for routine with creative curiosity, turning structured activities like LEGO building, piano practice, and garden chores into a personal playground of order, while
    they occasionally slip into cookie‑craving impulsiveness.
background:
  cultural: 'Andrea comes from a white, Midwestern family rooted in Grand Rapids, Michigan. Her household reflects typical Midwestern values: punctuality, hard work, and community involvement. Family traditions
    include celebrating Thanksgiving with a turkey dinner, decorating the house for holidays, and attending the annual Grand Rapids Festival of Arts. The region’s Dutch and German heritage is visible in
    local architecture and seasonal foods, which Andrea enjoys during community events. Her parents encourage participation in school and extracurricular activities, fostering a sense of responsibility
    and belonging within the local community.'
