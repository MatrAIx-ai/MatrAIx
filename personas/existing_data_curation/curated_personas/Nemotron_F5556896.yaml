  career_goals: Andrea dreams of a future where she can combine her love for organization with helping others. She is drawn to careers such as school librarian, elementary teacher, or pediatric nurse—professions
    that require reliable routines, attention to detail, and compassionate interaction. She imagines herself arranging bookshelves, creating reading programs for younger students, or caring for children’s
    health, using her methodical strengths to make a positive impact in her community.
