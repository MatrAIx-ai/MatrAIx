persona_description: A scientist or engineer with expertise in additive manufacturing, specifically focusing on the use of Fused Deposition Modeling (FDM), Selective Laser Sintering (SLS), and Material
  Jetting (PolyJet) technologies. The person has conducted research on the application of Digital Image Correlation (DIC) as an optical method for strain analysis and has tested and compared the results
  with Finite Element Method (FEM). The person is interested in practical issues related to temperature measurements using thermal sensitive paint and is looking for alternatives to improve the accuracy
  of temperature measurements in laboratory settings. The person is also interested in the influence of underground mining operations on sewage pipelines built using the pipe jacking method and is looking
  for ways to mitigate the impact of these operations on the pipelines.
