personas:
  professional: Rubi Rosado is a budding programmer who crafts simple Python games and Scratch projects, leveraging their analytical curiosity and disciplined organization to solve puzzles while quietly
    humming lofi beats; they often code into the late afternoon.
  sports: Rubi Rosado follows the Cleveland Browns and the Cleveland Guardians avidly, participates in a community youth soccer league for occasional activity, and prefers strategic low‑impact games like
    chess at the local recreation center, they enjoy quiet nature walks in Cuyahoga Valley National Park as their main form of fitness.
  arts: Rubi Rosado is an avid digital illustrator who creates vibrant characters in Procreate, draws inspiration from sci‑fi authors like Isaac Asimov and visual artists such as Luis Rivera, practices
    piano pieces by Debussy, and curates playlists that blend lo‑fi beats with Caribbean percussion, they let these artistic outlets shape their quiet yet expressive identity.
  travel: Rubi Rosado enjoys planning low‑key trips to nature spots such as Cuyahoga Valley National Park, has visited San Juan during a family vacation and loves the historic streets there, they dream
    of backpacking through the Scottish Highlands while balancing school responsibilities and a limited travel budget.
  culinary: Rubi Rosado loves cooking arroz con gandules and hand‑rolling pasteles during family gatherings, while also experimenting with homemade sushi rolls and chocolate chip pancakes, they treat the
    kitchen as a quiet sanctuary where measured steps mirror code debugging.
  core: Rubi Rosado is a solitary, curiosity‑driven 13‑year‑old who blends coding, chess, and cultural cooking into a disciplined yet anxious routine, they constantly seek quiet mastery while battling self‑imposed
    pressures.
background:
  cultural: Rubi is a second‑generation Puerto Rican American raised in Cleveland’s vibrant Puerto Rican community. She grew up in a bilingual household where Spanish is spoken daily and English is used
    at school, allowing her to navigate both cultures fluently. Family gatherings revolve around traditional foods such as arroz con gandules, pasteles, and lechón, and she often helps prepare these dishes,
    which connects her to her heritage. She participates in the local Puerto Rican Cultural Club at school, celebrating events like the Puerto Rican Day Parade and learning about island history, music,
    and dance. Though she prefers quiet, she carries forward the island’s values of resilience, family loyalty, and pride, and she incorporates Puerto Rican rhythms into her personal music playlists.
