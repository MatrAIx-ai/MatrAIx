  career_goals: Rubi aspires to pursue a career in technology where she can combine her analytical mindset with creative problem‑solving. She hopes to earn a scholarship to a top university to study computer
    science, with a focus on artificial intelligence or data science, eventually developing tools that help students manage stress and stay organized. In the short term, she aims to compete in regional
    coding competitions and robotics clubs, earn recognition in mathematics olympiads, and build a personal portfolio of projects. She also envisions possibly becoming a forensic data analyst, using her
    skeptical and detail‑oriented nature to uncover truth in complex data sets. Ultimately, Rubi wants a career that allows independent, innovative work while making a tangible impact.
