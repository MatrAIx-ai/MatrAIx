personas:
  professional: A high school junior in Bonaire who blends traditional community values with a budding passion for digital illustration, photography, and collaborative game design, using curiosity and sociability
    to experiment with visual storytelling.
  sports: Craig Lange plays basketball after school for the Bonaire High Panthers, follows the Atlanta Hawks and Georgia Bulldogs football games, and prefers spontaneous pick-up matches at the local park
    over rigid training schedules.
  arts: Craig Lange sketches in a worn notebook, creates digital paintings of sunset fields, curates playlists featuring Phoebe Bridgers and Arcade Fire, admires street works by Banksy, and reads graphic
    novels like Saga and Watchmen for visual inspiration.
  travel: Craig Lange enjoys road trips with family to historic Savannah, music-filled nights in Nashville, and dreams of exploring Tokyo's arcade districts, favoring flexible itineraries over tightly booked
    tours while watching budget constraints.
  culinary: Craig Lange loves Southern barbecue such as pulled pork and mac and cheese, can grill burgers at backyard gatherings, enjoys occasional sushi rolls and homemade pizza, and favors sweet tea and
    peach cobbler as signature comfort foods.
  core: Craig Lange is a curious, socially-driven teenage artist who blends community traditions with digital creativity, yet often battles worry and a messy schedule.
background:
  cultural: Craig grew up in Bonaire, a small town in Houston County, Georgia, where a close‑knit, predominantly white community shapes daily life. His family’s roots are tied to the local agricultural
    and small‑business landscape, and they maintain many Southern traditions such as Sunday church gatherings, backyard barbecues, and high‑school football weekends. The community values hospitality, modesty,
    and a strong sense of neighborly support, which has fostered Craig’s cooperative and considerate nature. While his upbringing reflects classic Southern cultural markers—accent, love for country music,
    and participation in local fairs—Craig’s exposure to the internet and school art programs introduces him to a broader range of artistic and cultural influences, prompting him to blend his local heritage
    with contemporary, global creative ideas.
