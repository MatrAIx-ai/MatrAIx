  career_goals: Craig aspires to turn his passion for visual art and storytelling into a flexible, creative career. In the short term, he plans to enroll in his high school’s specialized art track and build
    a robust portfolio of illustrations, graphic designs, and short video projects. He hopes to study visual communications, multimedia design, or digital media at a college that values interdisciplinary
    work. Ultimately, Craig envisions working as a freelance content creator or graphic designer, crafting branding, illustrations, and short animations for small businesses and community events in his
    hometown. He also dreams of launching a modest side venture offering custom artwork and event branding for local festivals, allowing him to blend his artistic talent with his knack for organizing group
    activities. Throughout his career path, Craig wants to maintain the flexibility to explore new ideas and collaborate with diverse creative teams.
