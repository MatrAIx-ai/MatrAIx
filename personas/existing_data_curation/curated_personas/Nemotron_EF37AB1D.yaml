personas:
  professional: Donald Munoz, a seasoned diesel‑engine specialist with over thirty years diagnosing and overhauling bus and heavy‑truck powertrains, blends meticulous documentation, EPA emissions compliance,
    and a structured mentorship approach to guide apprentices, and they are pursuing ASE Master Diesel Technician certification and a foreman role to lead a small independent garage.
  sports: Donald Munoz spends his weekends fishing on nearby lakes for trout, competes in a community‑center darts league, follows the Chicago Bears and Chicago Cubs religiously, and keeps a modest fitness
    regimen of weekend walks and light weight‑lifting to counteract the physical demands of his diesel work, and they view these activities as essential to maintaining both community ties and physical well‑being.
  arts: Donald Munoz’s artistic life revolves around classic rock legends like Led Zeppelin, The Rolling Stones, and AC/DC that soundtrack his woodworking, occasional visits to the regional automobile museum
    for vintage truck exhibitions, and a fondness for John Wayne westerns that provide a nostalgic escape from the shop floor, and they often find that these cultural interludes soothe the stress that builds
    from daily repairs.
  travel: Donald Munoz prefers meticulously planned road trips, having driven historic Route 66 to attend the National Diesel Truck Show in Joliet, he also enjoys fishing getaways to Minnesota’s Boundary
    Waters and dreams of exploring Germany’s Stuttgart automobile museum on a future overseas excursion, and they meticulously map out each itinerary using spreadsheets.
  culinary: Donald Munoz favors hearty, home‑cooked meals such as grilled trout with lemon‑butter glaze, rosemary‑roasted chicken paired with garden‑fresh zucchini, and his signature corn‑bread, while occasionally
    indulging in classic barbecue ribs and a slice of New York cheesecake as a post‑project treat, and they consider these meals both fuel for the body and a comforting ritual after a day in the shop.
  core: Donald Munoz is a methodical diesel‑engine veteran whose love of structure fuels his workshop, garden, and volunteer efforts, yet they often trade a well‑planned schedule for an extra coffee and
    a sudden impulse to acquire a rare model engine kit.
background:
  cultural: Donald was raised in a small Midwestern town near Peoria, Illinois, in a White American family with German and Irish ancestry. His upbringing emphasized a strong work ethic, modesty, and community
    cooperation typical of Midwestern culture, reinforced by a Catholic household that celebrated holidays like Christmas, Thanksgiving, and local fairs. Though his surname reflects a Hispanic lineage,
    his cultural identity is rooted in the rural Illinois traditions of family gatherings, county fairs, high‑school football events, and a deep respect for neighborly help.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy‑vehicle overhauls'', ''Electrical and hydraulic system troubleshooting'', ''Preventive‑maintenance scheduling'', ''EPA emissions compliance'', ''Parts
    inventory management'', ''Shop safety and regulatory documentation'', ''Mentoring and training junior mechanics'', ''Diagnostic software (JPRO, Insite) operation'', ''Customer communication and service'']'
  hobbies: '[''Woodworking'', ''Scale diesel‑engine model building'', ''Fishing'', ''Gardening'', ''Volunteer work at local church food bank'', ''Attending classic truck shows'', ''Reading automotive history'',
    ''Playing darts'', ''Listening to classic rock music'']'
  career_goals: Donald intends to earn an ASE Master Diesel Technician certification and transition into a shop foreman role where he can supervise a team while maintaining a structured work environment.
    He hopes to mentor more apprentices, eventually opening a small independent garage focused on diesel‑engine repair for local businesses, thereby securing a steady income for a comfortable retirement.
    Reducing daily stress and achieving a better work‑life balance are also central to his long‑term plans.
