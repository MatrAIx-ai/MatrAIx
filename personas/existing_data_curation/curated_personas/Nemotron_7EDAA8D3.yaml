  career_goals: Juvy aims to move into a team‑lead role within the next two years, leveraging her organizational strengths and bilingual abilities to mentor a larger group of representatives. She plans
    to obtain a Certified Customer Service Professional credential and later pursue a bachelor’s degree in Business Administration to qualify for a supervisory or operations manager position. Long‑term,
    she envisions a career that blends customer experience leadership with community outreach, using her cultural background to support Vietnamese‑American customers or nonprofit initiatives while maintaining
    a balanced work‑life schedule for her marriage.
