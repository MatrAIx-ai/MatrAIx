  hobbies: '[''Hiking in the Pacific Northwest'', ''Backyard gardening'', ''DIY woodworking'', ''Reading science fiction and health‑technology non‑fiction'', ''Playing acoustic guitar'', ''Nature photography'',
    ''Watching documentary series on medical and scientific topics'', ''Casual puzzle video gaming'', ''Exploring new health‑tech gadgets'', ''Participating in small community volunteer events'']'
  career_goals: Tommy aims to advance his professional credentials by obtaining a Certified Nursing Assistant (CNA) certification within the next year, followed by enrollment in a bachelor’s program in
    nursing to become an RN. He aspires to transition into a supervisory role within a home health agency, where he can leverage his competitive drive to improve patient outcomes and mentor new aides. Long‑term,
    Tommy dreams of launching a boutique home‑health consultancy that integrates telehealth technology and personalized care plans, allowing him to blend his practical experience with innovative health
    solutions while maintaining the flexible, autonomy‑focused work style he values.
