personas:
  professional: Ramona Wright, a curious two‑year‑old who spends hours lining up toy blocks in neat rows and mimicking household chores, already shows an early penchant for methodical planning that hints
    at a future career in early childhood education or design, and they approach tasks with the same reliable routine they admire at home.
  sports: Ramona Wright, a sprightly toddler who joins the local Little Kicks soccer program on Saturday mornings and proudly wears an Atlanta Braves cap while cheering from the sidelines, enjoys t‑ball
    drills at the community park and prefers structured play over the chaos of big‑crowd games, and they eagerly anticipate each organized practice.
  arts: Ramona Wright, a budding aficionado of rhythmic gospel hymns sung during family Sunday services and early exposure to children's music by artists like Sesame Street’s Elmo and Disney’s Frozen soundtrack,
    loves drawing vibrant crayon pictures of Kermit the Frog and dancing to the lively beats of Kirk Franklin’s 'Stomp', and they express joy through both music and art.
  travel: Ramona Wright, who loves predictable road trips with their family, has explored the historic streets of Savannah, taken a weekend ferry ride to Tybee Island, and dreams of visiting the Magic Kingdom
    in Orlando, always insisting on looking out the car window for familiar landmarks and demanding a snack break at every rest stop, and they thrive on the comfort of well‑planned itineraries.
  culinary: Ramona Wright, whose palate favors the comforting flavors of mac and cheese, sweet potato pie, and tender fried chicken nuggets, enjoys helping their mother mash ripe bananas for banana pancakes
    and occasionally requests a spoonful of honey‑glazed carrots, delighting in the bright orange hue and the sweet‑savory balance, and they stubbornly refuse peas despite gentle persuasion.
  core: Ramona Wright, a methodical two‑year‑old with a love for routine, tiny piggy‑bank treasures, soulful church songs, and occasional snack demands, balances quiet curiosity with a touch of stubbornness,
    and they navigate each day with calm resolve.
background:
  cultural: Ramona is an African‑American child growing up in Fayetteville, Georgia, a community with deep Southern roots and a strong church presence. Her family celebrates cultural traditions such as
    Juneteenth, soul food gatherings, and weekly Sunday services, which emphasize community, family cohesion, and respect for routines. The local African‑American heritage includes storytelling, gospel
    music, and intergenerational bonds that shape her values of cooperation and modest assertiveness. These cultural influences, combined with the supportive environment of her neighborhood, foster a sense
    of belonging and contribute to her organized, predictable, and emotionally stable disposition.
attributes:
  skills: '[''Block stacking'', ''Toy sorting by shape/color'', ''Following daily routines'', ''Simple sentence formation'', ''Crayon drawing'', ''Puzzle manipulation'', ''Basic self‑care (hand washing,
    toilet training)'']'
  hobbies: '[''Reading picture books'', ''Stacking wooden blocks'', ''Crayon drawing'', ''Listening to nursery rhymes and dancing'', ''Small‑group playdates'', ''Backyard nature walks'']'
  career_goals: At two years old, Ramona does not yet have a concrete career plan, but she shows early curiosity about caring and organized roles. She enjoys watching her mother interact with community
    members at church and often asks about helping people. She expresses a wish to become a teacher when she grows up, admiring the orderly classroom environment, and she likes the idea of a nurse who follows
    clear routines to keep others healthy. Her developing sense of responsibility and love for predictable settings suggest future ambitions toward a stable, service‑oriented profession that allows her
    to help others within a structured framework.
