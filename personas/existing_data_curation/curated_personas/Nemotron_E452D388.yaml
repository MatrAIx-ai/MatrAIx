  career_goals: Francisco aims to become a senior systems analyst within the next three years, deepening his expertise in enterprise architecture and cloud solutions. He plans to earn professional certifications
    such as AWS Solutions Architect and Certified Information Systems Security Professional (CISSP) to broaden his technical leadership capabilities. Long‑term, he aspires to transition into a solutions
    architect role where he can design scalable, secure systems that improve community health and education services, especially for underserved Latino populations. He is also driven to lead initiatives
    that blend technology with social impact, establishing mentorship programs that introduce high‑school students from his local Puerto Rican community to STEM careers.
