personas:
  professional: Mary Logan is a medical records specialist with a knack for EHR optimization, who blends meticulous coding expertise with a relaxed, flexible approach to project timelines; they frequently
    leverage their curiosity to pilot data‑driven workflow improvements while navigating the occasional chaos of disorganized paperwork.
  sports: Mary Logan is an avid trail runner and ultimate Frisbee enthusiast who joins the Colorado Trailblazers hiking group, plays for the Denver City Ultimate league, and roots for the Colorado Avalanche,
    Colorado Rockies, and Denver Broncos; they treat every weekend as a chance to mix high‑altitude cardio with team sport camaraderie.
  arts: Mary Logan is a salsa and bachata dancer who regularly spins to the rhythms of Celia Cruz and Marc Antonio at local Latin clubs, captures the golden light of the San Juan Mountains in Ansel Adams‑inspired
    photographs, and discusses contemporary novels by Haruki Murakami with their book club; they also attend regional music festivals featuring The Lumineers and Bad Bunny.
  travel: Mary Logan is a spontaneous traveler who weekend‑hops from Telluride to Santa Fe for mountain hikes, plans an annual road trip to Zion National Park, dreams of salsa‑filled nights in Barcelona,
    and budgets each adventure using a flexible itinerary that leaves room for last‑minute festival tickets; they love the thrill of unplanned detours.
  culinary: Mary Logan is a self‑taught Southwestern fusion cook who perfects chipotle‑lime quinoa bowls, green‑chile enchiladas with blue‑cheese crumble, and cactus‑tenderloin tacos, frequently swapping
    recipes with friends while mastering the balance between bold flavors and the occasional burnt tortilla; they relish hosting dinner gatherings that double as informal tastings.
  core: Mary Logan is a curious yet laid‑back health informatics enthusiast who balances a love for mountain trail runs, salsa dancing, and experimental cooking with a practical drive to modernize clinic
    data; they also occasionally misplace their to‑do list.
background:
  cultural: Mary was raised in an Anglo-American family that relocated to Farmington, New Mexico when she was young. Her upbringing blends Midwestern values of independence, curiosity, and practicality
    with the diverse cultural fabric of north‑west New Mexico, where she embraces Southwestern traditions, local Native American art, and community‑centered celebrations. She celebrates both traditional
    American holidays and regional events such as the San Juan County Fair, feeling comfortable navigating both urban and rural cultural settings.
attributes:
  skills: '["Electronic health record management","Medical coding (ICD-10 & CPT)","HIPAA compliance and privacy","Patient record auditing","Health data entry and quality control","Basic health data analysis","Interpersonal
