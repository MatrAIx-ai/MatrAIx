  hobbies: '["Hiking and trail running","Salsa and bachata dancing","Southwestern fusion cooking","Ultimate frisbee","Volunteering at health fairs","Landscape photography","Book club participation","Regional
    music festivals"]'
  career_goals: Mary aims to obtain the Certified Health Informatics Administrator (CHIA) credential and complete a bachelor's degree in Health Informatics within the next three years. She wants to advance
    to a health information manager role, lead EHR optimization projects for her clinic, and eventually influence regional health data policies to improve patient access and care coordination.
