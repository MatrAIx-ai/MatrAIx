  career_goals: Looking ahead, Catherine aims to transition into a senior operations‑management role within the next five years, focusing on creating workplace environments that balance efficiency with
    employee wellbeing. She plans to complete a bachelor's degree in Business Administration and later pursue a part‑time MBA specializing in Organizational Leadership. Long‑term, she aspires to lead a
    nonprofit or corporate social‑responsibility department where she can leverage her managerial experience and compassionate disposition to drive community‑focused initiatives.
