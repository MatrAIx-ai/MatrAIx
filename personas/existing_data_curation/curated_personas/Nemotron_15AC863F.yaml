personas:
  professional: Catherine Kee, a floor manager at a regional retail chain, blends data‑driven inventory oversight and meticulous scheduling with a compassionate, conflict‑resolution style to boost store
    efficiency while keeping employee wellbeing front‑and‑center.
  sports: Catherine Kee joins the Sierra Trail Club for weekend hikes, roots for the Sacramento Kings, and plays intramural volleyball with coworkers during summer, embracing both outdoor endurance and
    light team sports.
  arts: Catherine Kee fuels their creative spark by tackling daily crosswords, devouring contemporary fiction such as Sally Rooney’s 'Normal People' and Ottessa Moshfegh’s 'My Year of Rest and Relaxation,'
    and curating playlists that feature indie folk artists like Phoebe Bridgers and Fleet Foxes.
  travel: Catherine Kee favors weekend road trips that blend nature and culture, having driven the Pacific Coast Highway to Big Sur, trekked Yosemite’s Mist Trail, and planning a future solo pilgrimage
    to Kyoto’s temples once they save enough from their disciplined travel fund.
  culinary: Catherine Kee’s culinary routine revolves around weekly meal‑prep, where they toss roasted heirloom carrots, quinoa, kale, and a squeeze of lemon into mason‑jar salads, while treating themselves
    to weekend brunches featuring avocado toast with poached eggs and a dash of smoked paprika.
  core: Catherine Kee is a methodical dreamer who schedules yoga between spreadsheet audits, packs their camera for hikes, and can’t resist a perfectly organized pantry, even if it means spending hours
    aligning spice jars.
background:
  cultural: Catherine was raised in a middle‑class, suburban family in the Sacramento region, with roots tracing back to Irish and German ancestry. Her upbringing emphasized self‑reliance, community service,
    and the value of education, reflecting broader American cultural norms of individualism tempered by a strong civic ethic common in California. Growing up in a diverse state, she was exposed to a multicultural
    environment that reinforced her compassionate and cooperative nature, while family traditions of holiday gatherings and farm‑to‑table cooking shaped her appreciation for practical, hands‑on activities.
