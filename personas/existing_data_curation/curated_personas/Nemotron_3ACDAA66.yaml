  career_goals: Approaching retirement, Xenia’s primary ambition is to pass on her decades of procurement knowledge to the next generation of buyers within her company. She hopes to mentor junior staff
    in a small‑group setting, emphasizing relationship‑focused negotiation and ethical sourcing. Xenia also aims to increase supplier diversity by integrating more locally owned Mexican‑American businesses
    into the supply chain, and to embed sustainable sourcing practices that reduce waste and support organic growers in Santa Barbara County. In the longer term, she envisions transitioning to a part‑time
    consulting role that lets her continue influencing procurement strategy while granting her flexibility to spend more time with family, community activities, and personal interests.
