personas:
  professional: Xenia Gonzalez is a seasoned purchasing agent with three decades of experience in agricultural procurement, adept at vendor negotiation, SAP MM, and Coupa, who blends curiosity for new e‑procurement
    tools with a relaxed, people‑first approach, favoring flexible, relationship‑driven solutions over rigid processes.
  sports: Xenia Gonzalez enjoys low‑impact fitness like walking with the Santa Barbara Walking Club, weekend beach volleyball with the local senior league, and cheering on the Los Angeles Dodgers and LA
    Lakers, and they avoid overly competitive sports that strain their knees.
  arts: Xenia Gonzalez is a devotee of mariachi and folk rhythms, often listening to Lila Downs and Vicente Fernández while crocheting blankets, and they find inspiration in Frida Kahlo’s paintings and
    the poetry of Pablo Neruda, which shape their creative downtime.
  travel: Xenia Gonzalez prefers relaxed road trips along the Pacific Coast Highway, weekend visits to the Santa Ynez wine region, and cultural pilgrimages to Oaxaca’s markets, planning trips spontaneously,
    and they avoid crowded tourist hotspots due to a desire for intimacy and family‑oriented experiences.
  culinary: Xenia Gonzalez excels at making traditional mole, tamales, and enchiladas verdes using garden‑fresh tomatoes, chilies, and herbs, and they relish sharing these dishes at intimate family gatherings,
    while also delighting in farmer’s‑market finds like heirloom corn and fresh cilantro.
  core: Xenia Gonzalez blends a lifelong devotion to family‑centric traditions with a practical, easy‑going work ethic, and they secretly hoard mismatched socks in their closet while always keeping a spare
    spoon for unexpected soup tastings.
background:
  cultural: Xenia was born and raised in Guadalupe, a close‑knit Mexican‑American town in Santa Barbara County. Her upbringing was steeped in Mexican cultural traditions—celebrating Día de los Muertos,
    preparing communal meals, and observing Catholic holidays such as Semana Santa. Bilingual from an early age, she speaks Spanish at home and English in school, which has shaped her warm, cooperative
    demeanor. The community places a strong emphasis on family solidarity, respect for elders, and mutual support, values that Xenia carries into her professional life by prioritizing harmony and collaborative
    relationships with suppliers and coworkers. Her cultural roots also inform her love for Mexican cuisine, folk music, and local celebrations, keeping her closely connected to her heritage while navigating
    a modern, diverse work environment.
