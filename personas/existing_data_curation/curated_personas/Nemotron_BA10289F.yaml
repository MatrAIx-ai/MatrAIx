  hobbies: '["Fishing on the Allegheny River", "Woodworking and furniture restoration", "Gardening", "Volunteer construction with Habitat for Humanity", "Walking in Schenley Park", "Listening to classic
    rock music", "Reading Pittsburgh history books", "Attending local community gatherings"]'
  career_goals: As he approaches retirement, Lawrence aims to shift from full‑time labor to a part‑time mentorship role, offering his experience to apprentices and small local contractors. He hopes to start
    a modest handyman service that lets him work on projects on his own schedule, ensuring steadier income while reducing physical strain. Additionally, he wants to volunteer regularly with community building
    programs like Habitat for Humanity, securing a sense of purpose and leaving a positive legacy for Pittsburgh’s next generation.
