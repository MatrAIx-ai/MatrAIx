  career_goals: Now approaching retirement, Jean aims to transition from full‑time case work to a mentorship and advocacy role. She plans to establish a senior‑focused outreach program that links older
    adults with intergenerational volunteers, leveraging her organized mindset to create sustainable service models. Additionally, she hopes to complete her Bachelor of Social Work, contribute articles
    on elder care to regional policy journals, and serve on the board of a local non‑profit that promotes affordable housing. Her long‑term ambition is to influence state‑level policy that improves access
    to mental health services for rural populations.
