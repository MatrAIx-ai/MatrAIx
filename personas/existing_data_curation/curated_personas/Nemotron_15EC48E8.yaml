personas:
  professional: Jean Olsen is a veteran social worker with 35+ years of case management expertise, adept at individualized counseling, crisis de‑escalation, and grant writing, who now channels their methodical,
    compassionate nature into mentoring new staff and designing senior‑focused outreach programs.
  sports: Jean Olsen is an avid hiker who tackles the Oregon Coast trail network each weekend, participates in the local "Coast Trail Walkers" club, attends gentle yoga classes, and passionately cheers
    for the Oregon State Beavers football team and the Portland Timbers soccer club.
  arts: Jean Olsen sings alto in the Eugene Community Choir, revels in the folk harmonies of Joni Mitchell and the classic compositions of Mozart, and devotes weekly book‑club meetings to contemporary fiction
    by Chimamanda Ngozi Adichie and historical biographies by David McCullough.
  travel: Jean Olsen prefers low‑key, road‑trip style travel that balances scenic hikes with cultural stops, having explored the Redwood National Park, visited Montreal for a folk music festival, and dreaming
    of trekking the Scottish Highlands while managing a modest retirement budget that includes a yearly family reunion in Bend.
  culinary: Jean Olsen enjoys preparing farm‑to‑table meals like roasted beet and goat‑cheese salad, herb‑crusted salmon with locally sourced asparagus, and quinoa‑pilaf with heirloom tomatoes, often sourcing
    ingredients at the Eugene Saturday farmers’ market and occasionally indulging in a slice of key‑lime pie for dessert.
  core: Jean Olsen blends organized compassion with a love for community — from mentoring young social workers to leading a choir, all while juggling a daily habit of misplacing their glasses and a stubborn
    refusal to give up late‑night knitting marathons.
background:
  cultural: Jean’s family traces its roots to Norwegian immigrants who settled in the Pacific Northwest in the early 20th century. Raised in a modest, Lutheran household in a small Oregon town, she grew
    up with values of hard work, self‑reliance, and service to the community. The region’s progressive social climate and strong emphasis on environmental stewardship have shaped her worldview, encouraging
    a blend of practicality and curiosity. Her cultural heritage informs her appreciation for collective well‑being, while her lifelong exposure to Oregon’s diverse communities fuels her inclusive, cooperative
    approach to social work.
