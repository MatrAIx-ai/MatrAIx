persona_description: A scientist who specializes in soil and plant ecology, specifically researching the effects of contaminated soil on plant growth and the potential for compost to neutralize the soil
  and halt erosion. This scientist has conducted research in the Midwest region of the United States, specifically in the area between Tulsa, Wichita, and Springfield, Mo., where the soil was heavily contaminated
  by toxic chemicals and metals. The scientist has found that compost can reduce the bulk of the toxic material and heat it generates, which can reduce pathogens and concentrate the inorganic nutrients.
  The scientist has also conducted experiments on the effects of the compost on the soil's pH, nutrient content, and the presence of heavy metals. The scientist has found that the compost can increase the
  carbon in the soil and promote the growth of microorganisms that recycle nutrients. The scientist is currently seeking funding to expand the experiment and to determine who would be responsible for paying
  for the process.
