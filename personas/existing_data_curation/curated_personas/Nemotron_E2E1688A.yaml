personas:
  professional: Steven Cagle, a two‑year‑old budding learner in early childhood education, excels at simple shape‑sorting tasks and thrives on routine such as scheduled snack and nap times, while occasional
    spontaneous problem‑solving shows a practical, organized yet flexible mindset that hints at future teamwork and analytical skills.
  sports: Steven Cagle, a two‑year‑old who loves the splash pad at the local park and attends Tiny Tots Soccer classes on Saturdays, proudly wears a miniature Chicago Cubs cap, enjoys watching cartoon soccer
    matches, and balances energetic play with occasional nap breaks.
  arts: Steven Cagle, a two‑year‑old fan of Raffi and The Wiggles, frequently sings Baby Beluga in the living room, dances to the Moana soundtrack, and delights in drawing thick‑crayon circles and smiley
    faces on paper, often clutching a favorite plush character while creating art.
  travel: Steven Cagle, a two‑year‑old with a growing curiosity for the world, has already visited Orlando’s theme parks and a family beach resort in Florida, loves feeding ducks at a local pond, and dreams
    of seeing the towering redwoods in California on a future family road trip.
  culinary: Steven Cagle, a two‑year‑old with a palate that prefers soft textures, adores creamy macaroni and cheese, banana slices, and sweet potato fries, often spills milk from their sippy cup, insists
    on eating with their hands, and occasionally refuses broccoli at dinner.
  core: Steven Cagle is a routine‑loving, spunky two‑year‑old who balances budding independence with a need for familiar structure, delighting in easy‑to‑eat foods, bright toys, and the occasional tantrum
    when their favorite snack is taken.
background:
  cultural: Steven comes from a white, New England family rooted in the small‑town community of Clinton, Maine. His upbringing reflects the region's emphasis on close‑knit neighborhood ties, seasonal outdoor
    activities such as leaf‑picking in autumn and snow play in winter, and a culture that values practical skills and self‑reliance. Family traditions include holiday gatherings featuring local seafood
    and apple dishes, participation in town fairs, and a modest appreciation for the natural landscape that surrounds his hometown.
