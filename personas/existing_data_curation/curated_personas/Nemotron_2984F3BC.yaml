  career_goals: Although retired, Freddie aims to preserve his family’s legacy by completing a written memoir and assembling a curated photo album for future generations. He hopes to volunteer as a docent
    for the local historical society, leading small‑group tours that share the region’s story. He also aspires to finish a series of watercolor paintings that capture the changing seasons of the Pacific
    Northwest, and to maintain his health through regular gardening and walking so he can continue supporting his wife’s community activities.
