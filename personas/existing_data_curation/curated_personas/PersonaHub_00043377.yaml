persona_description: A teacher who is passionate about promoting social and emotional learning in students, particularly through activities and role-plays that help them identify, cope with, and prevent
  conflict and bullying situations. The teacher aims to instill values such as tolerance, self-esteem, kindness, and empathy, and to develop concepts and attitudes related to peace, perseverance, honesty,
  responsibility, and trust. The teacher uses relevant scenarios and role-plays to illustrate these concepts and attitudes, and provides teachers' notes, outcome links, and discussion points for each student
  activity to guide and support the learning process.
