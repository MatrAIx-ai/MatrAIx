  career_goals: Stephanie aims to transition from entry-level stock work to a supervisory or visual merchandising role within the next three years, leveraging her love of art and design to enhance store
    layouts and customer experiences. She plans to complete her associate’s degree in business administration and pursue certifications in supply-chain management. Long-term, she hopes to combine her retail
    expertise with her creative pursuits by opening a boutique that showcases locally made artwork and crafts.
