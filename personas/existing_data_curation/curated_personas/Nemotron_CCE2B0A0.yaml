personas:
  professional: Stephanie Grafton, a 30-year-old stocker and order filler in a Colorado retail chain, channels their curiosity and love of art into precise inventory tracking and innovative visual merchandising
    concepts, leveraging their expertise with warehouse software and collaborative communication to propose store layouts that showcase local artists and enhance customer experience.
  sports: Stephanie Grafton, an avid hiker, regularly joins the Colorado Mountain Hiking Society for weekend treks, follows the Denver Broncos with enthusiastic game-day gatherings, and complements outdoor
    adventures with yoga classes at a downtown studio, favoring low-impact workouts that sustain their stamina for the slopes.
  arts: Stephanie Grafton immerses herself in Colorado’s art scene by frequenting exhibitions featuring local painter Gantt Bass and national icon Georgia O’Keeffe, creates pottery inspired by the Rocky
    Mountain palette, participates in community-theater productions of Stephen Sondheim’s works, and draws creative energy from the music of John Denver and the films of Wes Anderson.
  travel: Stephanie Grafton prefers weekend road trips to nearby natural gems such as Rocky Mountain National Park and the Great Sand Dunes, yet saves diligently for a spring journey to Florence, Italy
    to study Renaissance art, balancing spontaneous hikes with carefully budgeted cultural getaways.
  culinary: Stephanie Grafton, an enthusiastic home cook, experiments with international dishes like authentic Pad Thai using tamarind paste and fish sauce, fiery Ethiopian injera seasoned with berbere
    spice, and embraces Colorado’s local bison burgers topped with smoked jalapeños, showcasing a moderate culinary skill set that blends adventurous flavors with occasional kitchen mishaps.
  core: Stephanie Grafton, a 30-year-old Colorado creative, balances meticulous inventory work with spontaneous art projects, thrives on community connection, sometimes over-commits to volunteer events,
    and fuels curiosity with late-night photography sessions under the mountain stars.
background:
  cultural: Stephanie grew up in a middle-class, predominantly white suburban neighborhood in Colorado, where a blend of traditional American values and the state’s progressive, outdoor-oriented culture
    shaped her worldview. Family traditions emphasize hard work, education, and community involvement, while the local emphasis on nature and the arts fostered her appreciation for hiking, galleries, and
    creative expression. Living in Colorado Springs, she is also familiar with the city’s strong military presence, which has reinforced a sense of service and cooperation within her social circles.
