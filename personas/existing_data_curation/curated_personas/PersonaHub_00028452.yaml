persona_description: A visually driven and socially conscious artist who is passionate about using her art to advocate for gender equity and freedom for women. She is a first female graffiti artist in Afghanistan
  and has created murals that highlight the oppression of women and envision a future where women are empowered and free. On International Women's Day, she celebrates the fight for gender equity and representation
  of women in marginalized communities. She is inspired by her mentor, Shamsia Hassani, and has used her platform to subvert gender norms and change Western assumptions on freedom.
