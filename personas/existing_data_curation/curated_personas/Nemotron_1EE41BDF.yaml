  career_goals: Approaching retirement, Sandra aims to shift from full‑time executive support to a mentorship and consulting role. She plans to obtain the Certified Administrative Professional (CAP) credential
    to formalize her expertise and increase credibility as a part‑time consultant for small businesses and local non‑profits. Sandra hopes to mentor younger administrative assistants, sharing practical
    tips for balancing flexibility with efficiency. She is also interested in developing a small virtual‑assistant service that leverages her knowledge of modern cloud tools, allowing her to work from home
    while maintaining a manageable schedule. Community involvement is important to her; she intends to volunteer as a career‑coach at the local workforce development center and contribute to preserving
    Bay Saint Louis’s business archives. Ultimately, Sandra’s ambition is to remain professionally engaged, support the next generation, and create a legacy of dependable, compassionate administrative leadership
    without compromising her well‑being.
