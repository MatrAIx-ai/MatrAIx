personas:
  professional: Christian Hunter is a seasoned carpenter and project manager who blends masterful finish carpentry with historic preservation, leveraging a deep curiosity for art to craft bespoke furniture
    and collaborative installations, while their relaxed approach to scheduling often results in a chaotic workshop that fuels a competitive drive to outshine local designers.
  sports: Christian Hunter stays active by joining neighborhood basketball pick‑up games at the local YMCA during summer evenings and cheering on the Baltimore Ravens at every home game, while maintaining
    a weekly light‑weight routine at the Baltimore Athletic Club to offset the physical toll of carpentry, a regimen driven by a competitive spirit that fuels both their work and leisure pursuits.
  arts: Christian Hunter immerses themselves in the Baltimore Museum of Art—drawing design cues from Henri Matisse’s vibrant color palettes and contemporary muralist Gina Calle’s bold street pieces—while
    slipping into jam sessions that reinterpret Miles Davis standards and attending live theater performances featuring actors such as Denzel Washington, weaving visual and musical inspirations into the
    aesthetic of every custom furniture piece they create.
  travel: Christian Hunter prefers loosely planned road trips that blend historic architecture with culinary discovery, having explored the colonial squares of Savannah, Georgia, the Art Deco promenades
    of Miami, and the bustling markets of Accra, Ghana, while yearning for a future weekend pilgrimage to the stone terraces of Angkor Wat, all pursued with a flexible itinerary that favors spontaneous
    detours over strict schedules.
  culinary: Christian Hunter is an avid home chef who skillfully prepares Southern comfort dishes like shrimp and grits and fried chicken alongside West African staples such as jollof rice and groundnut
    stew, favoring ingredients like smoked paprika, okra, coconut milk, black‑eyed peas, and millet, and often hosts communal meals where friends share stories over the fragrant, spice‑laden plates.
  core: Christian Hunter is a curiosity‑driven carpenter whose competitive edge and love for community collaboration coexist with a habit of misplacing tools and letting loose plans drift, turning their
    workshop into a lively, slightly chaotic sanctuary of art, music, and Southern‑West African flavors.
background:
  cultural: Christian’s cultural identity blends African‑American heritage with his family's Nigerian Yoruba roots, reflected in his middle name Oluwaseyi. Raised in Baltimore’s diverse Westside neighborhoods,
    he was immersed in the city’s rich legacy of African‑American music, civil‑rights activism, and community solidarity. His upbringing in a Christian household reinforced values of perseverance and communal
    service, which he carries into his craft. He draws on traditional African woodworking philosophies—respect for material, rhythmic labor, and storytelling—while embracing the urban artistry of Baltimore’s
    mural scene and jazz clubs. This hybrid background informs his aesthetic sensibility, his commitment to mentoring local youth, and his pride in creating works that honor both his ancestral lineage and
    the city that shaped him.
