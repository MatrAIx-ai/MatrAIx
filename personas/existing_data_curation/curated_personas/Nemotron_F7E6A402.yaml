  career_goals: Christian aims to transform his solo carpentry practice into a boutique workshop that produces one‑of‑a‑kind furniture pieces with artistic collaborations, carving a niche in Baltimore’s
    high‑end interior design market. He aspires to achieve master carpenter certification, become a recognized authority in historic preservation projects, and open a community woodshop where local youth
    and hobbyists can learn and create together. By diversifying his services—offering consulting on heritage building restorations, designing interactive art installations for local galleries, and selling
    a limited‑edition furniture line—he seeks financial stability for retirement while preserving the flexibility to explore new ideas and artistic ventures.
