personas:
  professional: Lina Alaniz, a retired homesteader and volunteer oral‑history chronicler, blends practical carpentry, gardening, and first‑aid expertise with a relaxed, curiosity‑driven approach to coordinating
    community story‑time events and preserving local memories, and they love to share learned lessons with neighbors.
  sports: Lina Alaniz enjoys low‑impact fitness through daily walks along the Salmon River, joins the local senior hiking club for autumn treks, cross‑country skis on nearby trails in winter, and roots
    for the Boise State Broncos football team and the Idaho Falls Chukars minor‑league baseball club, and they cherish the small‑group camaraderie of these activities.
  arts: Lina Alaniz captures sunrise over the river with her modest DSLR, finds inspiration in Ansel Adams’ black‑and‑white landscapes, knits while listening to The Chieftains and Bob Dylan, and loses herself
    in classic mysteries by Agatha Christie and Dashiell Hammett during quiet evenings, and they often relay story snippets to library children.
  travel: Lina Alaniz dreams of a relaxed road‑trip through the western national parks, already planning stopovers at Yellowstone, Glacier, and Grand Teton after a recent weekend getaway to Crater Lake,
    while valuing the low‑stress pace that lets them savor each vista and avoid rush‑hour crowds, and they anticipate the quiet wonder of each sunrise.
  culinary: Lina Alaniz delights in home‑cooking Idaho staples like huckleberry‑laden trout, fingerling‑potato casserole, freshly baked sourdough, and seasonal garden salads topped with heirloom tomatoes,
    often preserving leftovers as pickles or jam while sprinkling a pinch of caraway into her bread dough, and they enjoy sharing these dishes at small family gatherings.
  core: Lina Alaniz is a quietly curious, self‑reliant retiree who balances a love of nature, community storytelling, and meticulous budgeting with a charming habit of occasional forgetfulness and a penchant
    for sunrise photography, and they cherish quiet mornings on the river.
background:
  cultural: 'Lina grew up on a modest farm in the Midwest before moving to Salmon, Idaho, where she and her husband have lived for decades. Her cultural identity reflects the intermountain western rural
    ethos: a blend of self‑reliance, neighborly cooperation, and deep respect for the surrounding natural landscape. Family traditions draw on her Irish‑German ancestry, evident in occasional holiday recipes
    and folk songs passed down through generations. She participates in community events such as the Lemhi County Fair, county‑sponsored clean‑up days, and small church gatherings, valuing the close‑knit,
    modest social fabric while preferring the quiet intimacy of smaller groups. This background informs her practical skills, love of nature, and commitment to preserving local heritage.'
attributes:
  skills: '[''organic vegetable gardening'', ''food preservation (canning & dehydrating)'', ''basic carpentry'', ''small engine repair'', ''budget management'', ''first‑aid certification'', ''community
    event coordination'', ''bird identification'', ''genealogy research'']'
  hobbies: '[''river walking and wildlife observation'', ''birdwatching'', ''reading historical nonfiction'', ''knitting'', ''cooking traditional dishes with garden produce'', ''landscape photography'',
    ''volunteering at the local library (story‑time)'']'
  career_goals: Although retired, Lina aims to leave a lasting imprint on her community. She hopes to compile and publish an oral‑history volume of longtime Salmon residents, mentor teenagers interested
    in conservation, and spearhead a small‑scale water‑quality monitoring program for the Salmon River. She also wishes to maintain financial independence for herself and her spouse, and eventually take
    a relaxed road‑trip to visit several national parks she has read about but never seen. Her ultimate ambition is to blend her love of learning with tangible community benefit, all while preserving her
    flexible, low‑pressure lifestyle.
