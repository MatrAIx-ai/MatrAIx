persona_description: A silage maker who is interested in the role of microorganisms in the production of silage. They are knowledgeable about the specific acids produced during the ensiling process and
  the importance of the presence of lactobacilli in the plant material. They are also interested in the factors that affect the quality of the silage, such as the moisture content and the formation of undesirable
  acids like acetic acid and butyric acid. They are looking for information on how to optimize the production of silage and maintain its quality.
