persona_description: A Cornell University researcher who specializes in plant breeding and genetics, focusing on the development of insect and virus-resistant tomato varieties. Her research has led to the
  isolation of a novel form of insect resistance mediated by acylsugars produced by plants, which she has successfully transferred into new lines and bred out undesirable traits. She is collaborating with
  an interdisciplinary team of scientists from seven other institutions to develop new, improved tomato varieties that can be used commercially to eliminate the need for pesticides in various regions. Her
  discoveries will be shared with seed companies to further refine her lines and create new, improved varieties.
