personas:
  professional: Angie Petty, a 57‑year‑old painting contractor in Greater San Diego, leverages their meticulous project planning, mastery of decorative finishes, and disciplined workflow to deliver custom
    murals and high‑end wallcoverings while assertively mentoring apprentices and obsessively checking every detail for code compliance.
  sports: Angie Petty enjoys weekend hikes on the Lake Jennings trail, participates in a low‑impact senior fitness class at the Lakeside community center, and follows the San Diego Padres and the Los Angeles
    Lakers, cheering quietly from home while preferring solitary jogs to crowded team sports.
  arts: Angie Petty immerses themselves in the local art scene, frequenting the Museum of Contemporary Art San Diego, painting watercolor sunsets of Lakeside hills, collecting vintage wallpaper samples
    for design research, studying mural masters from Diego Rivera to Art Deco interiors, and listening to John Coltrane and Johann Sebastian Bach while volunteering painting projects for community centers.
  travel: Angie Petty prefers meticulously planned road trips that blend research and relaxation, having recently driven to Oaxaca to study Mexican muralism, taken a weekend getaway to Joshua Tree for sunrise
    sketches, and dreaming of a quiet villa in Tuscany to source low‑VOC pigments, while balancing travel costs within their modest studio budget.
  culinary: Angie Petty’s palate leans toward fresh Mediterranean flavors, regularly preparing grilled salmon tacos with avocado‑lime salsa, drizzling lavender‑infused honey over roasted carrots, and crafting
    succulent‑based salads, while their cooking skill remains comfortably intermediate, favoring simple, health‑conscious meals that pair with a glass of Pinot Noir during evening sketching sessions.
  core: Angie Petty is a detail‑obsessed, art‑driven contractor whose disciplined routine balances meticulous craftsmanship with a quietly anxious mind that finds calm in watercolor landscapes, yoga, and
    the soft hum of jazz.
background:
  cultural: Born around 1968, Angie is a white (Anglo‑American) woman who grew up in a middle‑class suburban environment, likely on the West Coast or Midwest before settling in Lakeside, California. Her
    upbringing emphasized self‑reliance, hard work, and practical education, reflecting the broader cultural values of post‑war America. The DIY home‑improvement boom of the 1970s and 1980s, epitomized
    by shows like "This Old House," shaped her early interest in painting and paper‑hanging. Living in the Lakeside area of San Diego County exposes her to a blend of quiet, lakeside community life and
    the rich, multicultural artistic influences of Southern California, including Spanish‑Mexican architectural motifs and a vibrant public‑art scene. While her heritage traces primarily to European ancestors
    (e.g., German, Irish), she embraces the diverse cultural textures of the region, particularly in her appreciation for sustainable, low‑VOC materials and environmentally conscious practices.
