  career_goals: Kannah aims to advance to the role of Sanctuary Director within the next five years, leveraging her competitive drive to secure larger grant awards and expand the facility's rehabilitation
    capacity. She plans to develop a multidisciplinary education program that intertwines wildlife conservation with local history and humanities, creating immersive experiences for visitors and school
    groups. To bolster her expertise, she intends to earn Certified Wildlife Rehabilitator credentials and pursue a master's degree in Conservation Biology. Ultimately, she envisions publishing a field
    guide that combines practical animal care techniques with narrative storytelling, positioning her as a thought leader in humane wildlife stewardship.
