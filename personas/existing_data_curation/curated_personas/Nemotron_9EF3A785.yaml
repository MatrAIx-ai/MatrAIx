personas:
  professional: Kannah Burke, a senior wildlife rehabilitator at a Florida sanctuary, merges meticulous animal husbandry with narrative-driven public outreach, leveraging their humanities training to craft
    grant proposals that weave local history with conservation, while a habit of endlessly tweaking enrichment enclosures sometimes delays paperwork.
  sports: Kannah Burke, a devoted fan of the Orlando Magic and Tampa Bay Lightning, participates in a local bird‑watching club that doubles as a low‑impact fitness group, joins the annual Wekiwa Springs
    5K for wildlife conservation, and enjoys weekend paddle‑boarding on Lake Butler with their small crew.
  arts: Kannah Burke, a regular attendee of community theater productions and an avid admirer of folk singer John Denver and painter Winslow Homer, channels their love of storytelling into volunteer docent
    work at the local museum, where they often reference historic conservation narratives during tours.
  travel: Kannah Burke, who has trekked the Everglades, explored the historic streets of St. Augustine, and vacationed in the Greek islands of Crete and Santorini for culinary inspiration, now dreams of
    a guided wildlife photography expedition to the Galápagos while balancing their travel budget with their retirement savings.
  culinary: Kannah Burke, an enthusiastic home chef, frequently prepares Mediterranean dishes like grilled branzino with lemon‑oregano sauce, chickpea tabbouleh, and rosemary‑infused focaccia, often sourcing
    herbs from their native garden, yet habitually forgets to set the timer when knitting, leading to occasional over‑roasted vegetables.
  core: Kannah Burke blends a pragmatic, competitive drive with a deep love for nature and storytelling, balancing meticulous conservation work, strategic finances, and a sprinkle of quirky forgetfulness.
background:
  cultural: Kannah is a White American raised in a Midwestern suburb before relocating to Windermere, FL. Her family emphasized self‑reliance, community service, and an appreciation for the natural world,
    values that have guided her career in animal care. While she embraces the Southern hospitality and communal spirit of her current Florida community, she retains a pragmatic, independent outlook shaped
    by her liberal arts education. Her cultural identity informs her storytelling approach to conservation, linking the region's historical narratives with present‑day wildlife stewardship, and she actively
    participates in local historical societies and environmental outreach programs.
