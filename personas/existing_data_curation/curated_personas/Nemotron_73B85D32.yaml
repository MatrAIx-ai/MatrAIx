  career_goals: Vestalia aims to become a certified master painter and project manager within the next five years, earning NCIP journeyman status and OSHA 10‑hour certification. She plans to launch her
    own boutique painting and mural studio that specializes in sustainable, low‑VOC finishes and culturally resonant designs that celebrate African‑American heritage in Oklahoma City. She also hopes to
    mentor apprentices from underrepresented backgrounds, collaborate on historic preservation projects of Black neighborhoods, and eventually teach advanced painting techniques at a local community college.
    By integrating her craftsmanship with community art initiatives, she wants her work to both beautify spaces and tell stories of resilience and pride.
