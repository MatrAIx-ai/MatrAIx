personas:
  professional: Vestalia Lee, a 24‑year‑old interior painting specialist, blends meticulous surface preparation and eco‑friendly low‑VOC finishes with a flair for narrative murals, delivering projects on
    schedule while infusing each space with stories of community resilience.
  sports: Vestalia Lee stays fit by hiking the winding trails around Lake Hefner each Saturday, practicing sunrise yoga at a downtown studio, and cheering for the Oklahoma City Thunder while playing on
    a co‑ed recreational softball league each summer.
  arts: Vestalia Lee draws inspiration from the narrative paintings of Jacob Lawrence and the soulful sounds of Miles Davis, frequents live jazz at The Blue Door, contributes vibrant pieces to the Oklahoma
    City Mural Fest, and creates personal canvases that fuse abstract color bursts with portraiture echoing gospel rhythms.
  travel: Vestalia Lee balances careful itinerary planning with spontaneous road trips, having explored the blues‑rich streets of Memphis, the mural‑laden neighborhoods of Mexico City, and annually returning
    to New Orleans for jazz festivals, while dreaming of a cultural pilgrimage to Harlem’s historic galleries.
  culinary: Vestalia Lee perfects soul‑food staples like smoked collard greens, honey‑glazed sweet‑potato pie, and crispy fried catfish, often pairing them with herb‑infused hot sauce made from smoked paprika
    and cayenne, and loves to host low‑key dinner gatherings that showcase these dishes alongside craft coffee.
  core: Vestalia Lee merges disciplined craftsmanship with vibrant community storytelling, channeling eco‑friendly painting, mural art, and soulful cooking into a balanced, quietly ambitious life.
background:
  cultural: Vestalia is a Black woman whose family roots trace back to the Southern United States, with grandparents who migrated to Oklahoma during the mid‑20th century seeking new opportunities. Growing
    up in Oklahoma City’s vibrant African‑American community, she was immersed in church gatherings, gospel music, and family storytelling that emphasized resilience and cultural pride. She participates
    in local Juneteenth celebrations and draws artistic inspiration from African‑American visual traditions such as the Harlem Renaissance, Afro‑Modernism, and contemporary street murals that adorn the
    city’s neighborhoods. Her cultural heritage informs her preference for bold colors, rhythmic patterns, and narrative‑driven artwork, and she strives to honor her community’s history through her painting
    and mural work.
