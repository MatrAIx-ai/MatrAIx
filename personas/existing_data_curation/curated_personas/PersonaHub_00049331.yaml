persona_description: A historian interested in the history of Central Africa, particularly the Kongo kingdom and its interactions with European colonial powers. They are knowledgeable about the history
  of trade, mission, and colonialism in the region, and are interested in understanding how African and European social, political, and economic agendas intersected in the Kongo kingdom. They are also interested
  in the consequences of Kongo's incorporation into the European state system and the impact of colonial rule on local African structures of authority.
