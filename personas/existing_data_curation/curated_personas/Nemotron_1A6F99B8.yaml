  hobbies: '[''Karaoke and singing'', ''Community event organizing'', ''Dancing (R&B, hip‑hop)'', ''Hosting game nights'', ''Cooking soul‑food and Caribbean dishes'', ''Yoga and mindfulness'', ''Gratitude
    journaling'', ''Evening beach walks'', ''Social media content creation (fashion, food, fitness)'']'
  career_goals: Tiffanee aims to move into a supervisory role within the manufacturing environment, pursuing a Certified Production Technician credential and eventually a degree in supply chain management.
    She envisions becoming a shift supervisor who mentors a cohesive team, drives continuous‑improvement initiatives, and enhances workplace safety. Long‑term, she hopes to advance to plant manager or start
    her own consultancy focused on efficient packaging processes for small businesses, while remaining an active mentor for young workers entering the industry.
