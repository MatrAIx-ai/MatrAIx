  hobbies: '[''Reading contemporary fiction and self‑help books'', ''Journaling and reflective writing'', ''Hiking and nature photography'', ''Cooking and exploring new recipes'', ''Volunteering at a community
    garden'', ''Participating in a small book club'', ''Listening to podcasts on personal growth and community topics'']'
  career_goals: Cortlyn aims to complete a Bachelor’s degree in Business Administration or Human Services within the next three years, with a focus on nonprofit management. She envisions a career as a community
    outreach coordinator for a local youth mentorship program or a small nonprofit focused on mental‑health awareness, where she can blend her practical organizational abilities with her desire to support
    others. In the longer term, she is open to launching a modest boutique coffee shop that serves as a community gathering spot, allowing her to apply both her business acumen and her love for fostering
    harmonious environments.
