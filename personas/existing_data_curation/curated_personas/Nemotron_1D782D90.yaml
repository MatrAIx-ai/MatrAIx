personas:
  professional: Cortlyn Richards, a 20‑year‑old aspiring nonprofit coordinator, merges solid office administration and QuickBooks bookkeeping with Canva‑crafted social‑media graphics, leveraging their conflict‑resolution
    knack to foster harmonious small‑team collaborations while embracing a flexible, low‑key work rhythm that values practicality over strict schedules.
  sports: Cortlyn Richards spends weekends tackling the black‑top trails of Arbor Hills with the Dallas Outdoor Explorers, follows the Dallas Mavericks and Dallas Stars for a quick adrenaline boost, and
    balances nature hikes with gentle yoga and occasional summer pickup volleyball, embracing a low‑key fitness routine that mirrors their preference for small‑group activities.
  arts: Cortlyn Richards nurtures a quiet creative side with landscape photography inspired by Ansel Adams, devours contemporary novels by Celeste Ng and memoirs like Trevor Noah’s ‘Born a Crime’, and fills
    study sessions with the mellow indie folk of Bon Iver and the reflective lyricism of Phoebe Bridgers, allowing art to shape their introspective worldview.
  travel: Cortlyn Richards prefers spontaneous, low‑key getaways with a tight‑knit circle, often backpacking through Texas Hill Country and the Ozark Trail, while day‑dreaming about a budget‑friendly weekend
    in Iceland’s volcanic landscapes to capture sunrise photographs and practice mindfulness.
  culinary: Cortlyn Richards whips up nutritious meals such as quinoa‑kale bowls with roasted sweet potatoes, avocado, and lemon‑tahini, sourcing locally grown kale, heirloom tomatoes, and wild‑caught salmon,
    and indulges in aromatic pour‑over coffee made with single‑origin beans from a nearby micro‑roaster to fuel their culinary experiments.
  core: Cortlyn Richards is a quietly curious 20‑year‑old who balances a love of nature, community gardening, and reflective journaling with a laid‑back, occasionally disorganized approach that favors flexibility
    over rigid schedules.
background:
  cultural: Cortlyn grew up in the suburban environment of Plano, Texas, within a predominantly white, middle‑class community that blends Midwestern pragmatism with Southern hospitality. Her family’s cultural
    roots are Anglo‑American, with a modest Protestant upbringing that emphasized community service, modesty, and personal responsibility. Living in the Dallas‑Fort Worth metro area has exposed her to a
    diverse cultural tapestry, fostering an appreciation for multicultural perspectives while still valuing the close‑knit, neighborly ethos typical of Plano’s residential neighborhoods. This background
    informs her balanced outlook—practical yet curious, harmonious yet independent.
attributes:
  skills: '[''Microsoft Office Suite'', ''Google Workspace'', ''Basic QuickBooks bookkeeping'', ''Social media content creation (Canva, Photoshop)'', ''Online research and report writing'', ''Customer service'',
