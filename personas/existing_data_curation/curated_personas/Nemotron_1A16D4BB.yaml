    handling"]'
  hobbies: '["Painting and digital illustration", "Playing drums in a local band", "Participating in community basketball league", "Volunteer mentorship at local youth center", "Reading science fiction
    and philosophy", "Exploring emerging logistics technology (e.g., blockchain in supply chain)", "Cooking experimental fusion dishes", "Attending live music events", "Urban street photography"]'
  career_goals: Zachary aims to advance from his role as a cargo agent to a senior logistics coordinator and eventually a logistics manager, focusing on sustainable and technology‑driven freight solutions.
    He plans to obtain the Certified Transportation Professional (CTP) credential and explore emerging tools like blockchain for supply‑chain transparency. Long‑term, he hopes to launch his own boutique
    freight brokerage that prioritizes eco‑friendly practices and provides apprenticeship opportunities for youth in his Lorain community, blending his entrepreneurial drive with his commitment to helping
    others.
