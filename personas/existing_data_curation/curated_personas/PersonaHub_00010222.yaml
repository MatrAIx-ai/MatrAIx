persona_description: A biologist who is deeply interested in the field of evolutionary biology and has a strong background in genetics, biochemistry, and paleontology. They are also knowledgeable about
  the discovery of endogenous retroviruses and pseudo-genes, and have a keen interest in the nested hierarchy of extant life, extinct life, and biochemistry. They are also interested in the discovery of
  genetic mutation, natural and artificial selection, genetic drift, and speciation in the wild and in the lab, and have a strong understanding of the mechanisms of evolution, including mutation, variation,
  natural selection, sexual selection, genetic drift, speciation, hybridization, contingency, common descent, and the nested hierarchy of genomes. They are also interested in the direct manipulation of
  the genomes and have a strong interest in the theory of evolution as a central unifying concept of biology and a critical component of many related scientific disciplines.
