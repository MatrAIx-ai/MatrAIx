  hobbies: '[''Sketching and painting'', ''Visiting art galleries'', ''Open‑mic poetry nights'', ''Basketball'', ''Weightlifting'', ''Running'', ''Mindfulness meditation'', ''Journaling'', ''Reading contemporary
    literature'', ''Listening to jazz, blues, and hip‑hop'', ''Cooking Southern cuisine'']'
  career_goals: Trevis aims to move from his current protective‑service role into a supervisory position, eventually becoming a shift leader and then a security manager for a larger organization such as
    a university campus or corporate complex. He plans to earn certifications like Certified Protection Officer (CPO) and EMT‑B to broaden his qualifications. Parallel to his career progression, Trevis
    wants to fuse his love of art with public safety by launching community‑based projects that use murals and visual storytelling to build trust between residents and security personnel. Long‑term, he
    envisions a role as a community liaison or civilian outreach officer for the local police department, where he can mentor younger officers, promote mental‑health awareness, and advocate for culturally
    sensitive policing practices.
