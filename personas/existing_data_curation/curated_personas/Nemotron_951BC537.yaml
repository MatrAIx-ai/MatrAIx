personas:
  professional: Trevis Days is a methodical protective‑service professional who excels at risk assessment, conflict de‑escalation, and meticulous incident reporting, while leveraging their sociable charisma
    to coordinate event security and integrating visual storytelling into community safety initiatives.
  sports: Trevis Days organizes charity basketball games with the community league the Midtown Hoops and follows the NBA's Miami Heat while also maintaining a personal fitness regimen that includes early‑morning
    countryside jogs, weekly weightlifting sessions, and occasional trail runs in the Blue Ridge Mountains.
  arts: Trevis Days attends open‑mic nights where they perform spoken‑word pieces, draws inspiration from jazz legends like Miles Davis, blues icons such as B.B. King, hip‑hop artists like Kendrick Lamar,
    and gospel voices like Andra Day, and they channel this eclectic palette into sketching vibrant murals that blend contemporary literature motifs from authors like Margaret Atwood with their own visual
    designs.
  travel: Trevis Days favors spontaneous weekend road trips that combine cultural immersion with culinary exploration, having recently driven to New Orleans to experience the French Quarter’s music scene,
    while dreaming of a spring visit to Savannah’s historic squares and an eventual backpacking adventure through the Scottish Highlands, though limited budget and a full work schedule often shape a careful,
    last‑minute planning approach.
  culinary: Trevis Days enjoys experimenting with Southern cuisine, regularly cooking collard greens seasoned with smoked paprika and hot sauce, perfecting fried catfish with a crunchy corn‑meal crust,
    and adding creative twists like a cajun‑spiced jambalaya infused with quinoa, all while maintaining a decent but not professional cooking skill level and often sharing dishes with friends after a late‑night
    jog.
  core: Trevis Days blends a protective‑service career with a passionate flair for art, community activism, and experimental Southern cooking, while navigating intense emotional waves that fuel both creative
    bursts and occasional impulsive spending.
background:
  cultural: Trevis grew up as a Black male in Huntingdon, a small town in western Tennessee, where his family is part of a close‑knit African‑American community rooted in Southern traditions and church
    life. His grandparents migrated to the region during the early 20th century, seeking agricultural work, and passed down stories of resilience, civil‑rights activism, and the importance of community
    support. Church gospel music, Southern soul, and communal celebrations such as Juneteenth are integral to his cultural identity. The values of mutual respect, storytelling, and perseverance shaped his
    worldview, influencing his commitment to bridge gaps between protective services and his community. He honors family recipes, enjoys foods like fried catfish and collard greens, and draws pride from
    the legacy of African‑American leaders who championed equitable safety and social justice.
attributes:
  skills: '[''Threat assessment'', ''Surveillance operations'', ''First aid/CPR'', ''Conflict de‑escalation'', ''Report writing'', ''Security equipment management'', ''Public speaking'', ''Team coordination'',
