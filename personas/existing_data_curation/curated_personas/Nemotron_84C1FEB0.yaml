    first aid certification"]'
  hobbies: '["Cooking traditional Mexican dishes (tamales, mole, salsas)", "Gardening (cilantro, chiles, tomatoes)", "Senior center dance and fitness classes", "Storytelling and sharing family histories",
    "Knitting scarves and blankets", "Evening walks with neighbors in local parks", "Volunteering at the community food pantry and language tutoring", "Listening to classic Mexican music", "Watching Mexican
    cinema", "Playing dominoes and card games with friends"]'
  career_goals: Maria aims to stay physically active and socially engaged, hoping to lead intergenerational cooking workshops at the local senior center where she can share her culinary heritage. She wishes
    to compile a family cookbook that documents recipes and accompanying stories, preserving them for future generations. Traveling to her hometown in the state of Guanajuato to reconnect with extended
    family and cultural roots is a personal ambition. She also aspires to become more proficient with digital tools to help her grandchildren with online schoolwork and to digitize family photos. Finally,
    Maria hopes to expand her volunteer work at the community food pantry, organizing food drives and helping new immigrants navigate local resources.
