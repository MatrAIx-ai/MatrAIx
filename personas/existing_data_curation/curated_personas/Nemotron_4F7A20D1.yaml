  hobbies: '[''Playing pickup basketball'', ''DJing at local venues'', ''Building custom PC rigs'', ''Attending live music shows'', ''Cooking Southern-style barbecues'', ''Participating in community hackathons'',
    ''Hiking in the Ouachita Mountains'', ''Watching sci-fi series'', ''Board gaming nights'', ''Volunteering at local youth mentorship programs'']'
  career_goals: Jerome aims to move from frontline event support into a senior production management role within the next five years, eventually overseeing large‑scale festivals or convention center operations
    in the Arkansas River Valley. He plans to leverage his engineering background to integrate emerging technologies—such as augmented reality overlays, interactive lighting rigs, and smart crowd‑flow analytics—into
    live entertainment. To support this transition, he will pursue certifications in event management (e.g., PMP, Certified Meeting Professional) and cultivate a professional network through industry conferences.
    Long‑term, he envisions founding a boutique production company that prioritizes inclusive programming and community‑focused events.
