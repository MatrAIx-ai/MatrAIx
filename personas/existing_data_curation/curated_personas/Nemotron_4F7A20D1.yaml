personas:
  professional: Jerome Ramirez, a 30‑year‑old event production specialist, blends a STEM analytical mindset with frontline entertainment attendant experience, and they excel at designing, troubleshooting,
    and supervising complex audiovisual and lighting systems for live shows while applying data‑driven scheduling and a competitive yet pragmatic leadership style.
  sports: Jerome Ramirez, an avid pickup basketball player in the Arkansas River Valley, roots for the Arkansas Razorbacks and the Dallas Mavericks, hikes the Ouachita Mountains with the Trailblazers Outdoor
    Club, and they stay fit through weekly games and weekend bike rides.
  arts: Jerome Ramirez, a weekend DJ and concert enthusiast, spins eclectic sets that weave together the blues of B.B. King, the soulful power of Aretha Franklin, and the lyrical flow of Kendrick Lamar,
    while they unwind with strategy board games like Terraforming Mars and frequent the Little Rock Arts Center’s rotating mural exhibitions featuring Southern street artists.
  travel: Jerome Ramirez favors spontaneous road trips that blend hiking in the Ouachita Mountains with weekend music festivals, has already explored Austin’s vibrant live‑music scene and the culinary delights
    of New Orleans, and they’re plotting a future tech‑focused pilgrimage to Tokyo’s Akihabara district to source rare PC components.
  culinary: Jerome Ramirez, a self‑taught grill master, regularly serves smoked pork ribs glazed with bourbon‑infused barbecue sauce, collard greens seasoned with smoked paprika, and spicy jambalaya spiked
    with Scotch bonnet peppers, while they experiment with hot‑sauce blends featuring chipotle and maple syrup for friends’ gatherings.
  core: Jerome Ramirez channels a fierce competitive streak and pragmatic curiosity into building custom rigs, DJing eclectic sets, and engineering next‑gen event productions, all while never leaving home
    without their trusty leather‑bound notebook and a secret stash of energy drinks for late‑night projects.
background:
  cultural: Jerome grew up in a close‑knit African‑American community in North Little Rock, where church gatherings, family reunions, and shared meals helped shape his identity. He embraces Southern hospitality
    and the rich musical heritage of black Arkansas—from the blues and soul of local clubs to contemporary hip‑hop that fuels the city’s nightlife. His family’s culinary traditions—soul food staples and
    Arkansas barbecue—inform his love for cooking and communal feasts. Aware of the state’s civil‑rights history, Jerome feels a responsibility to foster inclusive entertainment experiences and often mentors
    younger community members, aiming to honor his cultural roots while contributing to the vibrancy of his hometown.
