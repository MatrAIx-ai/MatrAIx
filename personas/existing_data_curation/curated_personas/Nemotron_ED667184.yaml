  hobbies: '[''Gardening'', ''Quilting'', ''Reading biographies and historical fiction'', ''Listening to jazz, blues, and gospel music'', ''Cooking soul food'', ''Fishing'', ''Walking along the St. Johns
    River'', ''Volunteering at community center'', ''Book club'', ''Church fellowship'']'
  career_goals: Shirley aims to advance to a lead fabricator or shift‑supervisor role at her current plant, earning NCCER certification in welding and a OSHA trainer credential. She hopes to develop a formal
    safety‑training program for her colleagues and eventually become a certified health‑and‑safety instructor. Outside of work, she dreams of establishing a community workshop where she can teach basic
    metal‑working and DIY repair skills to local youth, especially encouraging more women and African‑American teens to explore skilled trades. Financial stability and recognition for her contributions
    to workplace safety are key motivations.
