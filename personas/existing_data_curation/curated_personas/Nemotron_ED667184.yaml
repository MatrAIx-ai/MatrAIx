personas:
  professional: Shirley Simon, a veteran metal fabricator with three decades of experience in CNC milling, MIG/TIG welding, and technical drawing interpretation, applies their curiosity‑driven practicality
    to balance meticulous quality inspections with inventive process improvements, while they leverage a reserved yet assertive demeanor to mentor new hires and pursue a lead‑fabricator or shift‑supervisor
    role.
  sports: Shirley Simon maintains low‑impact fitness through regular walks with the Jacksonville Riverwalk Walking Club, supports the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp as a dedicated
    local fan, and enjoys seasonal bass fishing with the Canal Anglers Association, preferring relaxed activity over high‑intensity workouts while they cherish the solitude of the water's edge.
  arts: Shirley Simon finds artistic fulfillment in quilting intricate patchwork blankets that blend heritage motifs with contemporary designs, while immersing themselves in the sounds of Miles Davis, Ella Fitzgerald,
    and B.B. King at intimate venues such as The Elbow Room, and they draw inspiration from biographies of historic leaders discussed in their book club.
  travel: Shirley Simon prefers thoughtfully planned road trips that combine scenic nature with cultural sites, having explored Savannah’s historic squares, Asheville’s mountain arts scene, and the jazz‑rich
    streets of New Orleans, while they dream of a relaxed week in the coastal town of St. Augustine and a summer voyage to the vineyards of Tuscany.
  culinary: Shirley Simon, an adept home cook, regularly prepares regional home‑style meals such as collard greens simmered with smoked turkey, crispy fried catfish seasoned with Cajun spices, and sweet
    potato pie spiced with cinnamon and nutmeg, often incorporating fresh basil, thyme, and rosemary from their garden, and they delight neighbors with generous potlucks that celebrate community and flavor.
  core: Shirley Simon blends steadfast practicality with quiet curiosity, navigating a seasoned metal‑working career, a thriving garden, and a love for quilting, all while they habitually forget to water
    their tomatoes during busy weeks yet never skip their morning walk along the St. Johns River.
background:
  cultural: Shirley’s cultural identity is rooted in the African‑American community of Jacksonville, a city with a rich civil‑rights legacy and vibrant Southern traditions. She grew up hearing stories of
    the local Black churches, gospel choirs, and community celebrations such as Juneteenth and the annual Jacksonville Jubilee. Family gatherings often revolve around soulful cooking, storytelling, and
    music that bridges old‑school blues with contemporary R&B. Her upbringing emphasized self‑reliance, mutual support, and a strong work ethic, values that continue to shape her approach to both her career
    and personal life. She maintains close ties with longtime neighbors in historic Springfield, participates in church outreach programs, and cherishes the collective resilience and cultural pride of her
    community.
attributes:
  skills: '[''Mechanical assembly'', ''Blueprint reading'', ''CNC operation'', ''MIG/TIG welding'', ''Quality inspection'', ''Safety compliance'', ''Process troubleshooting'', ''Inventory management'',
