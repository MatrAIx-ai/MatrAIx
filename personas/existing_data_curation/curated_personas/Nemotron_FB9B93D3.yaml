background:
  cultural: Ilia is born into a Mexican‑American family living in Austin, Texas. His household balances English and Spanish, celebrating Mexican traditions such as Día de los Muertos, Día de la Independencia,
    and family gatherings centered around homemade tamales and pozole. The family participates in local community events that blend Texan and Mexican cultures, fostering a bicultural identity. Religious
    practices rooted in Catholicism, frequent visits to parish celebrations, and a strong emphasis on family cohesion shape his early environment. This rich cultural tapestry, combined with Austin's vibrant
    multicultural atmosphere, provides Ilia with a blend of Mexican heritage and broader American influences that inform his values, language exposure, and social experiences.
