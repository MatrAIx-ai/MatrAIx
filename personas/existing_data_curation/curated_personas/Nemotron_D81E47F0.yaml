  hobbies: '[''Bhangra dancing'', ''Punjabi cooking'', ''Gardening'', ''Hiking'', ''Volunteer service at gurdwara'', ''Attending multicultural festivals'', ''Reading fiction'', ''DIY electronics tinkering'',
    ''Playing soccer'', ''Family travel'']'
  career_goals: She aims to advance to a supervisory or lead-track-maintenance role within the next five years, obtain advanced certifications such as the Certified Rail Safety Professional and the OSHA
    30-hour construction safety course, integrate emerging technologies like automated track-inspection drones into her workflow, mentor new operators—especially women and minorities—and eventually pursue
    an associate degree in transportation logistics to broaden her career options while ensuring long-term stability for her family.
