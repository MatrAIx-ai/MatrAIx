personas:
  professional: Theresa Smith, a seasoned metal fabricator and assembler, combines meticulous MIG-welding and CNC-machine skills with a naturally curious mind that constantly experiments with new techniques
    on the shop floor, while their sociable, slightly disorganized style makes them the go-to mentor for new hires and a bridge between precision production and creative problem-solving.
  sports: Theresa Smith stays fit by leading weekly Zumba classes at Baytown’s community center, joining a weekend hiking group that explores the Galveston Bay shoreline, and cheering on the Houston Astros,
    Texans, and Rockets, which satisfies their love for both social exercise and team spirit.
  arts: Theresa Smith immerses themselves in Baytown’s artistic scene, regularly attending Baytown Playhouse productions of classics like Our Town, exploring gallery openings that showcase contemporary
    painter Megan Allyn, crafting their own kinetic metal sculptures inspired by Alexander Calder, and dancing to live sets from the indie rock group The Lone Star Ramblers at local music venues.
  travel: Theresa Smith favors spontaneous weekend getaways— their favorite trips include sunrise hikes on Galveston Island, a music-filled road trip to Austin’s Sixth Street, a culinary weekend in New
    Orleans, and an adventurous two-week immersion in Oaxaca’s markets— balancing their love of adventure with a modest budget that they track loosely, while dreaming of a future European art-tour to see
    the works of the Renaissance masters.
  culinary: Theresa Smith enjoys cooking Tex-Mex at home, confidently whipping up chicken enchiladas, carne asada tacos, and fresh guacamole with cilantro, lime, and jalapeños, and they frequently test
    new spice blends at their kitchen island while savoring occasional meals at Houston’s beloved El Big Bad BBQ-Tex spot.
  core: Theresa Smith blends a hands‑on metal‑working talent with a spontaneous love for community art; they juggle a chaotic schedule that often forgets bill payments while thriving on social collaboration
    and a constant search for the next creative spark.
background:
  cultural: Theresa grew up in a working‑class family in East Texas, where she was immersed in a blend of Southern hospitality, Texan pride, and a strong community ethic. Raised in a predominantly white,
    middle‑income neighborhood, she enjoyed family barbecues, church gatherings, and local high school sports, reinforcing values of cooperation and friendliness. Living in Baytown, a city with a sizable
    industrial sector and a rich Gulf Coast cultural mix, she has been exposed to a diverse array of traditions, from Hispanic festivals to maritime heritage. This backdrop shapes her pragmatic outlook,
    love for hands‑on work, and openness to the artistic and cultural variety that the Bay Area offers.
