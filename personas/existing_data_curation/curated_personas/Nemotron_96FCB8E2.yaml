  career_goals: Theresa aims to move into a supervisory role on the shop floor within the next two years, seeking certification in welding and OSHA safety to strengthen her qualifications. She also dreams
    of turning her love for art and metalworking into a side business creating custom decorative metal pieces for local homes and festivals. While she values flexibility, she hopes to establish a more stable
    schedule that allows her to complete a GED credential, opening doors for further training or community college courses in industrial design. Ultimately, she wants to blend her practical assembly skills
    with her creative interests, positioning herself as a bridge between production efficiency and artistic craftsmanship.
