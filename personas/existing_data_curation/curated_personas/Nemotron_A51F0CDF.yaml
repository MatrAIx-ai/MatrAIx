personas:
  professional: Nicole Pena, an aspiring junior scientist, channels their boundless curiosity and practical tinkering into daily backyard experiments, confidently taking center stage during preschool science
    shows while competitively debating hypotheses with peers, reflecting their sociable yet skeptical nature.
  sports: Nicole Pena, a budding soccer player with the Little Stars Soccer Club, cheers loudly for the Los Angeles Dodgers during family game nights and brings that competitive spirit to every backyard
    sprint, often demanding to be the first to score a goal, which they relish.
  arts: Nicole Pena sings along to Idina Menzel's "Let It Go" from Frozen, reenacts scenes from Paw Patrol with boundless energy, and loves drawing bright crayon pictures of Mickey Mouse, often demanding
    an encore performance from their stuffed audience.
  travel: Nicole Pena cherishes family road trips to Grandma's farm in the countryside, unforgettable days at Disneyland in Anaheim, and dreams of exploring the Eiffel Tower in Paris, often packing a tiny
    suitcase with a favorite stuffed bunny and a snack of goldfish crackers for each imagined adventure.
  culinary: Nicole Pena delights in buttery macaroni‑and‑cheese topped with extra cheddar, loves the crunch of chicken nuggets dipped in honey mustard, and proudly spreads peanut butter on whole‑grain toast
    all by themselves, though they stubbornly refuse broccoli on their plate.
  core: Nicole Pena is a wildly talkative four‑year‑old who balances fearless curiosity with a love for instant fun, often sprinting to the center of attention while fiercely guarding their favorite toys.
background:
  cultural: Nicole's family maintains strong Mexican roots while living in Saratoga Springs, Utah. She hears both English and Spanish at home, celebrates Dia de los Muertos and Cinco de Mayo with traditional
    foods like tamales and pan de muerto, and learns simple Spanish prayers and lullabies. Family gatherings often involve music, dancing, and storytelling that connect her to her heritage. Her parents
    encourage bilingual literacy, and she participates in community events at the local church that blend Mexican Catholic traditions with the broader Utah community.
