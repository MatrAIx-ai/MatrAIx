personas:
  professional: Troy Howard, a budding mini‑architect, channels their love for LEGO builds and organized playground games into early design thinking; they favor practical, structured approaches while still
    thriving on the competitive buzz of group play.
  sports: Troy Howard, a high‑energy soccer enthusiast who leads his neighborhood's Saturday scrimmages, idolizes the Brooklyn Nets and the New York Yankees, and they alternate between intense tag games
    in the summer heat and indoor swimming lessons at the community center during the winter months.
  arts: Troy Howard, an imaginative drawer of rockets and fire trucks, devours picture books by Mo Willems, sings along to Kidz Bop’s “Happy” while sketching, and they frequently attend Saturday storytime
    sessions at the Brooklyn public library where animated performances of Disney’s “The Lion King” inspire their art.
  travel: Troy Howard, a curious explorer who prefers day trips to nearby landmarks like Coney Island’s boardwalk, the New York Transit Museum, and a weekend family visit to the Smithsonian in Washington,
    D.C., plans adventures with a simple checklist and a colorful map, and they delight in hands‑on exhibits that let them build mini‑structures, while their budget allows only short getaways rather than
    overseas travel.
  culinary: Troy Howard, a self‑declared pizza aficionado, loves assembling mini pepperoni slices on English muffins for a DIY snack, munches on mac and cheese and strawberry‑yogurt parfaits, and they occasionally
    sneak a bite of their parents’ spicy taco, showing a brave palate mixed with a preference for familiar, crunchy foods like carrot sticks and apple slices.
  core: Troy Howard, a competitive yet friendly 6‑year‑old with a LEGO‑shaped mind, balances a love for structured building and spontaneous playground battles, often forgetting to clean up their bricks
    but they are always ready with a grin for the next game.
background:
  cultural: Troy is a white American child growing up in the vibrant, multicultural borough of Brooklyn, New York. His family follows mainstream American traditions—celebrating holidays such as Thanksgiving,
    Christmas, and the Fourth of July—while also participating in local community events like summer street fairs and library storytimes. The neighborhood’s diversity subtly shapes his worldview, exposing
    him to a mix of languages, foods, and cultural celebrations, though his household maintains a primarily Anglo‑American cultural rhythm. Regular trips to nearby parks and the Brooklyn Public Library
    provide him with a blend of urban city life and close‑knit community ties.
