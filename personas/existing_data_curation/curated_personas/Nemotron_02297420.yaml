  career_goals: Troy dreams of a future where he can combine structure, teamwork, and competition. He often talks about becoming a firefighter because of the clear routines, teamwork, and the chance to
    help others. He also imagines being a professional soccer player, drawn by the competitive spirit and the camaraderie of a team. Occasionally, he mentions wanting to be an astronaut, intrigued by the
    precise training and the adventure of exploring new frontiers. These ambitions reflect his desire for roles that are organized, hands‑on, and allow him to lead or compete with peers.
