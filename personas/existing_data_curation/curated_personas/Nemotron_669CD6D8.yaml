  career_goals: Evan aims to progress into senior learning experience design roles, eventually leading a corporate Learning & Development department where he can shape inclusive, empathy‑driven training
    strategies. He envisions creating scalable, community‑focused learning programs that blend cutting‑edge technology with human‑centered design. In the longer term, he hopes to launch his own consultancy
    that helps organizations foster harmonious workplaces through flexible, curiosity‑fuelled development initiatives, while maintaining a work‑life balance that supports his personal values of flexibility
    and compassion.
