  career_goals: Seeking to transition from hands‑on analyst duties to a senior advisory role where he can mentor emerging security talent and shape organizational security strategy. Carlos aims to obtain
    the CISSP and CISM certifications within the next year to formalize his expertise, and he aspires to lead a community‑focused cybersecurity outreach program for small businesses and senior citizens
    in the Bronx. Ultimately, he hopes to balance his professional responsibilities with a more predictable schedule that reduces on‑call stress, allowing him to maintain his emotional well‑being while
    leaving a lasting legacy of knowledge and community resilience.
