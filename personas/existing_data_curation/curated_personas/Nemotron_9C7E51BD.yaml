personas:
  professional: Mark Sher, a 31‑year‑old physics teacher turning toward curriculum specialization, harnesses their analytical rigor and vivid speculative imagination to craft inquiry‑driven STEAM units
    that blend Arduino robotics, abstract art projects, and conceptual physics, and they also mentor students at science fairs while presenting cutting‑edge pedagogical research at regional conferences.
  sports: Mark Sher, a 31‑year‑old outdoor enthusiast, stays fit by hiking Georgia’s coastal trails with the Savannah Trail Club, follows the Atlanta Braves for baseball excitement, and they occasionally
    join the Savannah Runners’ 5K community runs, balancing solitary endurance training with low‑key group activity.
  arts: Mark Sher, a 31‑year‑old abstract watercolorist and electronic composer, finds inspiration in the gestural brushwork of Joan Mitchell and the ambient soundscapes of Aphex Twin, regularly showcasing
    pieces at intimate Savannah gallery openings and they often craft sci‑fi themed glitch tracks in Ableton Live during late‑night studio sessions.
  travel: Mark Sher, a 31‑year‑old curious explorer, meticulously plans weekend road trips to Charleston, SC and Asheville, NC, has trekked the misty paths of Great Smoky Mountains, dreams of a solo expedition
    to Iceland’s volcanic craters, and they balance modest travel savings with occasional splurges on boutique stays in Savannah’s historic district.
  culinary: Mark Sher, a 31‑year‑old experimental cook, gravitates toward smoky grilled oysters, spicy gumbo seasoned with filé powder, and precise sous‑vide salmon, often pairing meals with ambient electronic
    playlists while they improvise quick crustless quiches peppered with fresh basil and cherry tomatoes during busy lesson‑planning nights.
  core: Mark Sher is a 31‑year‑old physics educator whose speculative imagination fuels innovative STEAM curricula, whose competitive puzzle‑solving drives relentless self‑improvement, and they often let
    perfectionist tendencies delay budgeting and routine health check‑ups.
background:
  cultural: Mark grew up in Saint Marys, a historic fishing and military town on Georgia's Atlantic coast. Raised in a middle-class, two-generation white family, he internalized the Southern values of hospitality,
    family responsibility, and a strong work ethic. The community's close ties to local maritime history and the natural environment nurtured his appreciation for coastal ecosystems and regional heritage
    sites like Fort Frederica. While his cultural identity aligns with mainstream Southern American culture, he is also mindful of the area's multicultural fabric, including Gullah and military influences,
    which inform his inclusive teaching approach and his respect for diverse perspectives.
