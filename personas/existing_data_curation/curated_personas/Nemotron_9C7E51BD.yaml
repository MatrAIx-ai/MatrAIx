  career_goals: Over the next five years, Mark aims to earn a master's degree in Educational Technology and transition into a curriculum specialist role within the Camden County School District. He aspires
    to lead the development of a district-wide STEAM integration program that blends art, design, and abstract scientific concepts. He plans to publish a high-school physics textbook that emphasizes conceptual
    thinking and to secure competitive grants for expanding the school's robotics program. Ultimately, Mark hopes to become a department chair, mentor new teachers, and contribute research on fostering
    creativity in secondary STEM classrooms, positioning himself for future work with an ed-tech startup or nonprofit focused on equitable STEM education.
