personas:
  professional: Raoul Corzo, a retired museum docent and archivist, leverages meticulous cataloguing skills and bilingual fluency to mentor emerging artists and organize community heritage exhibitions,
    balancing methodical planning with a curious, open‑minded approach to new artistic expressions.
  sports: Raoul Corzo follows the Arizona Cardinals and Phoenix Suns avidly, participates in a bi‑weekly senior walking group at the Desert Botanical Garden as a member of the Green Valley Senior Walking
    Club, and plays strategic chess at the local senior center, viewing these activities as gentle ways to stay mentally sharp and socially engaged.
  arts: Raoul Corzo, an avid watercolorist of desert vistas inspired by Georgia O'Keeffe and a photogravure enthusiast echoing the precision of Ansel Adams, spends evenings in Tucson galleries discussing
    emerging artists with curators and curates small pop‑up exhibitions featuring local talent, letting classic and contemporary influences shape their creative outlook.
  travel: Raoul Corzo enjoys carefully planned trips that blend cultural research with leisurely exploration, having visited the historic missions of Southern Arizona, the vibrant streets of Oaxaca, and
    dreaming of a pilgrimage to his ancestral village in the mountains of Mexico alongside a week‑long photography retreat in Sedona.
  culinary: Raoul Corzo delights in preparing tamales, mole, and chiles rellenos using heirloom chilies, dried corn masa, and a pinch of roasted cacao, skillfully balancing traditional flavors with a modest
    garden harvest of succulents and native herbs, often sharing these meals at family gatherings that double as informal storytelling sessions.
  core: Raoul Corzo blends scholarly rigor with artistic curiosity, savoring late‑night gallery talks, meticulous archive work, and a love of heritage cuisine, all while navigating the quirks of senior
    life with a steadfast schedule and occasional forgetfulness about where they left their glasses.
background:
  cultural: Raoul is a third‑generation Mexican‑American whose family settled in Arizona after migrating from central Mexico in the early 20th century. He grew up bilingual, celebrating Día de los Muertos,
    Cinco de Mayo, and local fiestas that blend Mexican traditions with Southwestern influences. His upbringing emphasized respect for elders, community solidarity, and a deep appreciation for folk art,
    music, and cuisine. The desert environment of Green Valley, combined with his family's stories of Mexico's rich artistic legacy, has shaped his identity as someone who bridges cultures, preserves heritage,
    and continuously seeks new artistic perspectives.
attributes:
  skills: '[''Art history (Latin American & Southwestern)'', ''Spanish‑English translation'', ''Archival documentation'', ''Event planning and coordination'', ''Mentoring and teaching'', ''Community outreach'',
