personas:
  professional: Betty Williams, a production planning clerk known for coordinating material flow, troubleshooting bottlenecks with ERP and Excel, and diffusing shop‑floor tension through strong interpersonal
    skills, balances a curious, practical mindset with occasional deadline slips while they eye a future supervisory role.
  sports: Betty Williams, an avid line‑dancer and weekend hiker on the Allegheny trails, also roots for the Pittsburgh Steelers and Penguins, and they occasionally join a local co‑ed softball league to
    stay fit and socialize.
  arts: Betty Williams, a mystery‑novel aficionado who sings karaoke to Dolly Parton classics, enjoys board‑game nights featuring Catan, and attends regional theatre productions where they admire folk musicians
    like Joey Rash, blends literary intrigue with lively performance art.
  travel: Betty Williams, who prefers road trips over flights, has explored the southern sections of the Appalachian Trail, visited Nashville for the Country Music Festival, dreams of strolling through
    New Orleans’ French Quarter during Mardi Gras, and they plan future weekend getaways to Hocking Hills State Park while balancing a modest travel budget.
  culinary: Betty Williams, who delights in cooking comforting chicken pot pie and homemade apple crumble, often knits scarves while sipping chai tea, yet they also indulge in fair staples like funnel cake
    and corn dogs, and they keep a well‑stocked pantry of fresh herbs and canned tomatoes for quick meals.
  core: Betty Williams blends a love for line‑dancing, hiking, and community volunteering with a restless mind that worries often, using yoga and a gratitude journal to keep balance while they occasionally
    over‑indulge in craft supplies and fair treats.
background:
  cultural: Betty grew up in a working‑class family in the Appalachian region of West Virginia, where white European ancestry (primarily English and German roots) blends with a strong sense of community
    and self‑reliance. The local culture of Fairmont emphasizes hospitality, faith‑based gatherings, and a love for outdoor recreation, all of which have shaped her values of cooperation and kindness. The
    regional heritage of coal‑town resilience and modest living informs her practical outlook, while the rich tradition of folk music and regional cuisine (like biscuits, pepperoni rolls, and barbecue)
    nurtures her social spirit. Though she left high school before graduation, the emphasis on learning by doing and helping neighbors remains a core part of her identity.
