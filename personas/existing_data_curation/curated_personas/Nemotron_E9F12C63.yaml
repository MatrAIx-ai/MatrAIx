  career_goals: Betty aims to move from a clerk position to a supervisory role such as Production Coordinator or Logistics Team Lead within the next three to five years. She plans to earn an APICS Certified
    Production and Inventory Management (CPIM) credential through evening classes, which will boost her technical credibility and help her better manage deadlines. She also hopes to transition into a more
    stable work environment that offers clearer processes, thereby reducing her daily stress. Ultimately, she envisions a career where her people‑skills can be leveraged to mentor newer employees while
    she continues to refine her own organizational abilities.
