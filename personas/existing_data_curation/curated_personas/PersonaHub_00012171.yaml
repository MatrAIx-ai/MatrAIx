persona_description: A professional archaeologist who specializes in the exploration and research of ancient Egyptian history, focusing on the discovery and understanding of monumental cultic buildings
  and the first kings' terraces. They are interested in the systematic investigation of mysterious monuments and the interpretation of their significance, as demonstrated by projects such as the UAEE and
  the ARCE's member institutions' expeditions. They have expertise in archaeology, epigraphic work, documentation, and conservation. They are also familiar with the work of William Flinders Petrie and the
  Johns Hopkins University mission in Egypt, led by Dr. Betsy Bryan, who have contributed to the understanding of the first kings' terraces.
