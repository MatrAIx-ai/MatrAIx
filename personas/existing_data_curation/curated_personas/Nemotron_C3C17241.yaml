  career_goals: Bethany aims to transition back into the workforce by securing a full‑time role in the nonprofit sector, focusing on community arts and social services. She plans to complete a bachelor’s
    degree in social work or nonprofit management and obtain certification in grant writing and trauma‑informed care. Her long‑term ambition is to become a program director for a rural arts outreach organization,
    where she can design and implement art‑therapy programs, youth mentorship workshops, and community wellness initiatives. She also hopes to establish a local community center that combines creative expression
    with mental‑health support, leveraging her organizational expertise and compassionate leadership.
