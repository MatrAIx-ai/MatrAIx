persona_description: A scientist and engineer who specializes in the study of space and celestial phenomena, particularly solar and terrestrial electrodynamics. He has conducted research on using NASA's
  sounding rockets to gather dust from Comet Hale Bopp and has used these rockets for various solar physics experiments. He has also worked with NASA's Wallops Flight Facility to develop and test various
  sounding rockets, including the Brunswick Corporation/Aerolab/ARC Argo D-4 Javelin, the Nike/Thiokol-AstroMet Tomahawk, and the Atlantic Research Corporation IRIS. He has also worked with the Goddard
  Space Flight Center to develop and test various sounding rockets, including the Douglas Aircraft/Aerojet/ABL Delta-B Satellite Launch Vehicle (Thor Delta).
