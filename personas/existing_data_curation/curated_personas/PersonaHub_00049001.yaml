persona_description: A historian or scholar who is interested in the development of political theory, particularly in the context of natural rights theories. They are likely to have a background in European
  history and are familiar with the works of Jean Gerson, Hugo Grotius, and Thomas Hobbes. They appreciate the complexity and equivocal nature of modern right theories and seek to understand the significance
  of figures like Jean Gerson and Hugo Grotius in the formation of these theories. They are interested in the intersection of political theory and historical context, and seek to appreciate the nuances
  and subtleties of these theories.
