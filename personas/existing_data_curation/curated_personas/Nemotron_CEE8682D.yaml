personas:
  professional: A veteran elementary and middle school STEM teacher named Tierra Speaks leverages a structured yet flexible curriculum design, using Google Classroom and interactive whiteboards to deliver
    data-driven lessons that reflect the community's emphasis on education and service.
  sports: An enthusiastic youth basketball coach, Tierra Speaks leads a local league affiliated with the Prince George's County Parks and Recreation program, supports the Washington Wizards by attending
    games, and maintains a personal jogging routine through the county's Anacostia River Trail three times a week.
  arts: A gospel choir member and community book club organizer, Tierra Speaks finds inspiration in the soulful harmonies of artists like Kirk Franklin, the rhythmic pulse of African drummers, and the literary
    works of Dr. Mae Jemison, weaving these influences into classroom storytelling sessions.
  travel: When planning a getaway, Tierra Speaks prefers organized road trips to culturally rich cities like New Orleans, where they can explore jazz festivals and Creole cuisine, while also dreaming of
    an international heritage tour to Ghana to attend a drumming workshop and visit historic sites tied to family migration narratives.
  culinary: A devoted home cook, Tierra Speaks frequently prepares collard greens, smoked turkey, and sweet potato casserole for family gatherings, experiments with fresh basil and thyme in vegetable garden
    harvests, and enjoys occasional indulgence in spicy jambalaya at local festivals.
  core: Tierra Speaks blends structured teaching with a love for community rhythm, juggling disciplined lesson plans and spontaneous potluck parties, all while balancing a habit of missed bill reminders
    and an unwavering commitment to uplifting youth.
background:
  cultural: Born and raised in the Washington, D.C. metropolitan area, Tierra grew up steeped in African American traditions that prioritize education, community, and faith. Her grandparents were part of
    the Great Migration, bringing stories of resilience that shaped her commitment to uplifting Black youth. Active in a historically Black church, she participates in weekly worship and community outreach,
    drawing on the church’s emphasis on service and collective harmony. She celebrates family heritage through soul food cooking, African drumming workshops, and attending local events like the Prince George's
    County Black History Month celebrations. These cultural influences inform her teaching philosophy, leading her to embed culturally relevant pedagogy, highlight contributions of Black scientists, and
    create classroom spaces where students see their identities reflected and respected.
attributes:
  skills: '[''Curriculum Development'', ''Inquiry‑Based STEM Instruction'', ''Classroom Management'', ''Differentiated Instruction'', ''Data‑Driven Assessment'', ''Educational Technology Integration'',
