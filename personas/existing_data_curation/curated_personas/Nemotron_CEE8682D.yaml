  hobbies: '[''Community Book Club Leadership'', ''Youth Basketball Coaching'', ''Gospel Choir Participation'', ''Neighborhood Potluck Organization'', ''Gardening'', ''Jogging with Friends'', ''Reading
    African American Biographies'', ''Attending Black Cultural Festivals'', ''Volunteer Food Bank Service'', ''After‑School Robotics Club Facilitation'']'
  career_goals: Tierra aims to earn National Board Certification in Mathematics and pursue a master's degree in Educational Leadership, positioning herself for a future role as a STEM Curriculum Coordinator
    for Prince George's County Public Schools. She envisions launching a district‑wide after‑school robotics program that targets underrepresented students, advocating for equitable STEM resources, and
    mentoring emerging teachers—especially those of color—to foster a more diverse educational workforce.
