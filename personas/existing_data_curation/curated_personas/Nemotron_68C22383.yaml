  career_goals: Beatrice dreams of becoming an astronaut who can draw the cosmos, envisioning a future where she explores space and creates artwork that captures the wonder of the stars. She also imagines
    herself as a museum curator or science artist, merging her love for art and science to inspire other kids. Her competitive spirit fuels a desire to be "the best astronaut" and to win school science
    fairs, while her openness to unconventional ideas makes her think about inventing new ways to study the universe.
