personas:
  professional: Beatrice Tyson is an aspiring space engineer whose boundless curiosity fuels elaborate LEGO space stations, while they prefer spontaneous building sessions over strict schedules and their
    competitive streak drives them to design the most intricate rockets among friends.
  sports: Beatrice Tyson is a member of the Sunshine Rovers youth soccer club, cheers for the New York Yankees on game day, and regularly challenges peers in backyard races and climbing contests, while
    they demonstrate a competitive yet flexible approach to fitness.
  arts: Beatrice Tyson loves drawing vibrant rockets and colorful animals while they dance to Beyoncé’s upbeat R&B hits, gospel chants by Kirk Franklin, and catchy children’s songs from Sesame Street, letting
    music inspire their creative sketches.
  travel: Beatrice Tyson enjoys family road trips to the nearby state park where they collect leaves, dreams of visiting the Kennedy Space Center in Florida and the dinosaur halls of the American Museum
    of Natural History, and prefers spontaneous adventure over tightly planned itineraries.
  culinary: Beatrice Tyson delights in whisking batter for chocolate chip cookies, sprinkling cinnamon on pancakes, and helping stir mac and cheese, while they often marvel at the aroma of fresh‑baked biscuits
    and buttery corn muffins.
  core: Beatrice Tyson is a curious and competitively spirited six‑year‑old who builds LEGO space stations, dances to upbeat tunes, saves money in a piggy bank, and occasionally misplaces crayons amid their
    whirlwind of imagination, while they constantly explore new ideas.
background:
  cultural: Beatrice is an African‑American child raised in Huntsville, Alabama, a city known for its rich NASA heritage and vibrant Black community. Her family embraces Southern Black traditions, including
    church gatherings, soulful gospel music, and seasonal celebrations like Juneteenth and Kwanzaa. Storytelling is a cherished family pastime, with elders sharing tales of ancestry and local civil‑rights
    history. Soul food dishes such as collard greens, fried chicken, and cornbread are central to family meals, fostering a sense of cultural pride. The community’s emphasis on education, coupled with the
    local influence of the space industry, nurtures her fascination with science and art, while her cultural roots provide a strong foundation of resilience, creativity, and communal support.
