personas:
  professional: Luis Zunino, an 11‑year‑old aspiring robotics programmer, applies his curious yet practical mindset to design LEGO‑based autonomous vehicles in his school’s robotics club, balancing meticulous
    documentation with a willingness to tweak designs on the fly, while his competitive streak drives him to constantly outdo peers in weekly code challenges.
  sports: Luis Zunino, an energetic 11‑year‑old, plays midfielder for the Riverside Rangers youth soccer team, idolizes the city's professional club River City United, and follows their matches on TV, while
    his competitive drive fuels a personal goal of scoring fifteen goals this season, and he balances training with weekend hikes on desert trails near his home.
  arts: 'Luis Zunino devotes his free time to watching animated series like ''Adventure Time'' and ''Avatar: The Last Airbender'', immerses himself in graphic novels such as ''Amulet'' and ''The Witcher:
    Fox Children'', and draws inspiration from musicians like indie band Tame Impala and filmmaker Hayao Miyazaki, which feed his creative side during LEGO builds.'
  travel: Luis Zunino enjoys planning family road trips that blend adventure and relaxation, preferring desert hikes in places like White Sands and scenic drives to national parks such as Bryce Canyon,
    while dreaming of a future visit to Tokyo’s tech districts and the vibrant night markets of Marrakech, all within the constraints of his parents’ vacation budget.
  culinary: Luis Zunino joins his mother in the kitchen to perfect homemade tacos, craft fresh guacamole with ripe avocados, and experiment with sizzling fajitas, developing a growing skill set that ranges
    from chopping vegetables with precision to mastering the art of balancing flavors with a pinch of lime and cumin.
  core: Luis Zunino is an 11‑year‑old soccer‑loving, LEGO‑building, competitive video‑gamer who balances curiosity with practicality, thriving on group activities yet keeping a skeptical eye on shortcuts,
    and channels his energy into both the robotics lab and the family kitchen.
background:
  cultural: Luis grows up in a Mexican‑American household where Spanish is spoken at home and Mexican culinary traditions are celebrated, especially during holidays like Día de los Muertos and Navidad.
    Living in Buckeye, Arizona, he blends these cultural practices with the broader Southwestern U.S. lifestyle, participating in local community events and school activities. His family places a strong
    emphasis on education, respect for elders, and maintaining close ties with extended relatives, both in Arizona and when they visit relatives in Mexico. This bicultural environment shapes his identity,
    encouraging him to be bilingual, community‑oriented, and proud of his heritage while fully engaging with his American surroundings.
attributes:
  skills: '[''Problem solving (team projects)'', ''Basic Scratch programming'', ''LEGO engineering'', ''Soccer strategy'', ''Bilingual communication (Spanish/English)'', ''Organizational skills (school
    supplies)'', ''Critical thinking'', ''Leadership in group activities'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Scratch programming'', ''Competitive video gaming'', ''Hiking'', ''Cooking Mexican dishes'', ''Robotics club'', ''Graphic novels'', ''Community festivals'']'
  career_goals: Luis dreams of studying engineering, with a focus on robotics or renewable‑energy technologies, so he can design tools that help people in arid communities like Buckeye. He hopes to earn
    scholarships for STEM programs, compete in regional soccer tournaments, and eventually mentor younger kids in both robotics and sports. Long‑term, he envisions a career that blends technical innovation
    with community service, using his bilingual background to bridge cultural gaps.
