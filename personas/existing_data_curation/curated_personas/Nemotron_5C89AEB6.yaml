    heritage)", "Community outreach and workshop facilitation"]'
  hobbies: '["Community theater acting and direction", "Weekly book club participation", "Gardening (home and community garden)", "Cooking traditional Polish cuisine", "Senior walking group in Forest Preserve",
    "Yoga and meditation", "Genealogy research", "Attending Chicago Cubs games", "Volunteering at local festivals and cultural events"]'
  career_goals: As she approaches retirement, Maria aims to transition from full‑time teaching to a part‑time mentorship role, guiding younger educators through professional development workshops at the
    local school district. She hopes to launch an intergenerational community learning series that pairs seniors with middle‑school students for shared projects in history and storytelling, leveraging her
    love for group activities and community building. Maria also dreams of authoring a practical guidebook on integrating cultural heritage into core curricula, drawing on her Polish background and years
    of classroom practice. Ultimately, she seeks a balanced schedule that reduces administrative stress while allowing her to remain socially engaged, volunteer for literacy programs, and continue fostering
    harmonious learning environments.
