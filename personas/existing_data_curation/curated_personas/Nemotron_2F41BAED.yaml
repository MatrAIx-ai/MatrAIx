  hobbies: '[''Watercolor painting'', ''Hiking in the Siskiyou Mountains'', ''Bird watching'', ''Reading art history books'', ''Attending local gallery openings'', ''Gardening'', ''Yoga'', ''Photography
    of waterfalls'', ''Journaling'']'
  career_goals: Courtney aspires to transition from a front‑line waiter to a shift manager within the next two years, leveraging her organizational strengths and mentorship abilities. Long‑term, she dreams
    of opening a small community café that doubles as an art space, where local artists can exhibit work and occasional workshops can be held. She also hopes to volunteer as a guide for art tours at the
    Grants Pass Art Center, blending her love of hospitality with cultural education. Maintaining financial stability for her family while creating a supportive, creative environment for herself and the
    community remains her central ambition.
