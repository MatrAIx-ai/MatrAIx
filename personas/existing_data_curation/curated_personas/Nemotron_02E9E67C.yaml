personas:
  professional: Elizabeth Hayzlip, a seasoned elementary and middle‑school teacher who blends interdisciplinary STEM curricula with art and creativity, leverages interactive whiteboards and coding platforms,
    and channels their compassionate, flexible style into mentoring peers and fostering collaborative parent‑community partnerships, positioning them for a future role as a district STEAM curriculum specialist.
  sports: Elizabeth Hayzlip, an energetic outdoors enthusiast who hikes the Natchez Trace State Park, participates in weekly yoga classes, plays in a co‑ed recreational softball league, cheers for the Nashville
    Predators and Tennessee Titans, and volunteers as a youth soccer coach, embodying a balanced, community‑centric approach to fitness.
  arts: Elizabeth Hayzlip, a dedicated painter and sketch artist who frequents the Franklin Art Gallery and Nashville music venues, draws inspiration from Dolly Parton’s storytelling, the vibrant canvases
    of Kehinde Wiley, and the lyrical genius of Lin‑Manuel Miranda, and weaves these influences into classroom STEAM projects.
  travel: Elizabeth Hayzlip, a curious traveler who prefers flexible road trips to heritage towns like Savannah and Asheville, enjoys immersing in the music legacy of New Orleans, dreams of a culinary pilgrimage
    through Tuscany’s countryside, and plans trips that balance modest budgets, family visits, and community festivals.
  culinary: Elizabeth Hayzlip, an avid home cook who perfects Southern comfort dishes such as shrimp and grits, fried green tomatoes, and peach cobbler, experiments with heirloom tomatoes, fresh basil,
    and smoked paprika in creative fusion recipes, and often hosts potluck gatherings where friends sample her garden‑to‑table creations.
  core: Elizabeth Hayzlip, a 50‑year‑old educator who blends Southern hospitality with progressive STEAM innovation, juggling a love for community, art, and yoga while occasionally letting paperwork slip,
    embodies compassionate flexibility in both classroom and life.
background:
  cultural: Elizabeth grew up in the American South, raised in a close‑knit community that valued hospitality, neighborly support, and regional traditions such as church gatherings and Southern cuisine.
    Living in historic Franklin, Tennessee, she is deeply connected to the town’s heritage festivals, the nearby Nashville music scene, and the local emphasis on community service. Her white, Southern cultural
    roots blend with a progressive educational outlook, fostering a respect for tradition while eagerly embracing new ideas, artistic expression, and inclusive, collaborative learning environments.
attributes:
