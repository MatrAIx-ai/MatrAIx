  hobbies: '[''Visiting art galleries and museums'', ''Attending live music concerts'', ''Painting and sketching'', ''Gardening'', ''Hiking and nature walks'', ''Reading (fiction and science)'', ''Playing
    board games'', ''Cooking Southern cuisine'', ''Yoga and mindfulness practice'', ''Volunteer work at community centers'']'
  career_goals: She aims to become a district STEAM curriculum specialist, leading professional‑development workshops that emphasize compassionate, flexible teaching practices. Elizabeth also plans to earn
    a Master’s in Education Leadership to eventually serve as a school principal, where she can expand community‑wide outreach programs that combine art, science, and mentorship for under‑served youth.
