  career_goals: Halestine aims to advance to a shift supervisor or assistant manager role within the next two years, leveraging her reliability and leadership strengths. She also aspires to merge her passion
    for art with community service by coordinating youth art workshops at her local community center and eventually opening a modest café that showcases work by local Black artists. To broaden her professional
    options, she is planning to complete her GED and explore administrative positions in the hospitality sector.
