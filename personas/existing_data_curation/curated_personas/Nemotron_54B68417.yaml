personas:
  professional: Jerry Holloway is a methodical, imaginative butcher with deep expertise in meat processing and USDA compliance, who blends precise cutting techniques with artistic plating to create tailored
    cuts and instruct customers while leveraging his outgoing nature to build a loyal community of meat enthusiasts.
  sports: Jerry Holloway is a regular at the Homestead community basketball court, a fervent Miami Heat fan who also follows the Florida Gators during college season, and they use daily pick‑up games as
    both exercise and a social outlet for brainstorming new butcher shop ideas.
  arts: Jerry Holloway sketches vibrant street and wildlife scenes on evenings after attending live music and poetry nights featuring local poets like Carlos Ramirez and bands such as the indie soul group
    The Midnight Suns, and they channel that visual flair into striking food photography and promotional graphics for their future boutique.
  travel: Jerry Holloway alternates weekend kayak trips through the Everglades with quarterly getaways to New Orleans for its culinary heritage, and they keep a handwritten travel journal that lists future
    destinations like Tokyo’s Tsukiji Market, Barcelona’s La Boqueria, and the organic farms of the Hudson Valley, all while balancing business financing constraints.
  culinary: Jerry Holloway experiments with fusion dishes such as jerk‑spiced short‑rib tacos, miso‑glazed black cod with achiote‑infused rice, and a citrus‑cured pork belly ramen, blending bold spices,
    fresh coconut milk, and smoked paprika to create plates that they photograph and showcase alongside meticulously crafted meat cuts.
  core: Jerry Holloway merges meticulous butcher craftsmanship with boundless artistic curiosity, building a community‑focused shop while juggling a penchant for basketball, kayaking, and occasional over‑spending
    on exotic ingredients.
background:
  cultural: Jerry grew up in Homestead, a diverse community within Miami‑Dade County, where his family’s roots trace back to the African‑American diaspora of the southern United States. His parents migrated
    from Georgia and brought with them a rich tradition of Southern comfort cooking, soulful music, and storytelling that shaped his appreciation for communal meals and rhythm. Exposure to neighboring Caribbean
    cultures—especially Haitian and Jamaican—added layers of spice, vibrant festivals, and a strong emphasis on community solidarity. These cultural currents, combined with the agricultural landscape of
    Homestead, fostered Jerry’s respect for fresh, locally produced food and his desire to blend culinary heritage with contemporary artistic expression.
attributes:
