  hobbies: '[''Sketching and drawing'', ''Experimental cooking'', ''Food photography'', ''Live music and poetry events'', ''Basketball'', ''Volunteer cooking instructor'', ''Kayaking and nature exploration'',
    ''Reading science fiction and contemporary art literature'']'
  career_goals: Jerry aims to transition from an employee at a processing facility to owning a boutique, community‑focused butcher shop in Homestead that emphasizes locally sourced, sustainably raised meats.
    He envisions integrating his artistic flair by offering curated meat cuts with custom seasoning blends, hosting cooking workshops, and collaborating with local chefs and artists for pop‑up events. Over
    the next five years, he plans to obtain a culinary certification, develop a recognizable brand, and eventually expand to multiple locations while mentoring youth from his neighborhood interested in
    culinary trades.
