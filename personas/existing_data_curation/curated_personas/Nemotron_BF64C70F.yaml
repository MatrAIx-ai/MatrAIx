personas:
  professional: Joshua Watson, an 18‑year‑old assembler/fabricator who balances a part‑time job on the shop floor with community‑college coursework in Manufacturing Engineering, channels his love of precision
    into mastering CNC milling and turning, excelling at reading technical drawings, inventory management, and safety protocols, all while charting a clear path toward NIMS certification, a shift‑supervisor
    position, and eventually their own custom metal‑fabrication shop.
  sports: Joshua Watson, a weight‑lifting enthusiast who follows a disciplined split routine, roots for the Detroit Lions in the NFL and the Chicago Bulls in the NBA, plays intramural basketball at college,
    and tunes into Formula 1 races—especially the Monaco Grand Prix—while cheering for the local minor‑league baseball team, the Akron RubberDucks, and they often incorporate their love of precision into
    their workouts.
  arts: Joshua Watson, a fan of progressive rock and classic metal, regularly streams bands like Rush, Dream Theater, and Metallica, enjoys engineering documentaries such as Modern Marvels and sci‑fi films
    like Blade Runner, sketches automotive concepts in a notebook, and draws inspiration from industrial designers like Jony Ive during maker‑space workshops, and they often translate that inspiration into
    detailed sketches of mechanical parts.
  travel: Joshua Watson, a planner who prefers structured itineraries, has already taken road trips to the Petersen Automotive Museum in Los Angeles and aims to visit the Mercedes‑Benz Museum in Stuttgart,
    the Toyota Commemorative Museum of Industry and Technology in Nagoya, and the Detroit International Auto Show, balancing their limited budget with a love for automotive‑themed destinations, and they
    meticulously map out each stop to maximize exposure to automotive history.
  culinary: Joshua Watson, a protein‑centric eater, often cooks grilled steak, rosemary‑roasted chicken thighs, and homemade burgers on a cast‑iron skillet, experiments with sous‑vide for precise temperature
    control, fuels post‑workout recovery with whey protein shakes, and indulges in a classic eggs Benedict brunch at the local diner on Sundays, and they savor a side of roasted vegetables for balance.
  core: Joshua Watson, an 18‑year‑old aspiring CNC machinist, blends obsessive organization, competitive tinkering, and cautious budgeting into a life focused on precision‑driven creation and steady but
    stress‑laden ambition, and they constantly measure progress against their own high standards.
background:
  cultural: Joshua was raised in a suburban community in Anoka County, Minnesota, within a family of German‑Scandinavian heritage that emphasizes hard work, modesty, and reliability—values widely shared
    across the Upper Midwest. His upbringing included participation in local community events, frequent trips to the region's lakes for fishing and camping, and attendance at a Lutheran church that reinforced
    a sense of stewardship and community service. These cultural influences have shaped his practical outlook, appreciation for orderly environments, and a balanced blend of independence and teamwork.
attributes:
  skills: '["technical drawing interpretation","CNC milling and turning operation","hand and power tool proficiency","basic welding","quality inspection","shop floor safety compliance","inventory management","methodical
