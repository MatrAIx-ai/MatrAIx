  hobbies: '["scale model kit building","woodworking","automotive restoration","puzzle solving (Rubik''s Cube, Sudoku)","strategy video games (Civilization, Factorio)","maker space workshops","weightlifting"]'
  career_goals: Joshua aims to progress from his current assembler role to a certified CNC machinist within the next two years, targeting NIMS certification and gaining experience in high‑precision manufacturing.
    He plans to pursue an associate degree in Manufacturing Engineering to qualify for supervisory positions, eventually becoming a shift supervisor where his reliability and organizational strengths can
    benefit the team. Long‑term, he dreams of launching his own small fabrication shop that specializes in custom metalwork and prototyping, blending his competitive drive with his desire for a stable,
    self‑directed career.
