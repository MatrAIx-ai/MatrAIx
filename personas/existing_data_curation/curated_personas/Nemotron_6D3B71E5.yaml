personas:
  professional: Deidra Aarons, a 25‑year‑old automotive service technician, combines deep expertise in hybrid/electric diagnostics with a hands‑on curiosity and a compassionate, collaborative approach that
    makes customers feel heard while they mentor apprentices in the garage.
  sports: Deidra Aarons, an avid supporter of the Carolina Panthers and Charlotte Hornets, plays co‑ed softball in the Sumter Community League each weekend, practices yoga three times a week to stay limber
    for long hours in the garage, and they follow the NASCAR season with a particular fondness for the local track events.
  arts: Deidra Aarons curates classic soul playlists featuring Marvin Gaye and Aretha Franklin while swapping stories about auto design, frequently attends local arts festivals where contemporary R&B acts
    like H.E.R. and Jorja Smith perform, and they draw inspiration from the rhythmic craftsmanship of 1970s funk for their vehicle customizations.
  travel: Deidra Aarons prefers spontaneous road trips over rigid itineraries, having driven the Blue Ridge Parkway in autumn and planning a future pilgrimage to Stuttgart’s Mercedes‑Benz Museum to soak
    up automotive history, while they also fit in budget‑friendly weekend getaways to Asheville’s mountains.
  culinary: Deidra Aarons loves Southern comfort food, regularly cooks shrimp‑and‑grits seasoned with smoked paprika and fresh okra, experiments with homemade kombucha and kale salads harvested from their
    backyard garden, yet they admit to over‑relying on quick microwave popcorn during late‑night repairs.
  core: Deidra Aarons blends a garage‑hand’s practical know‑how with soulful playlists, a love of vintage cars, and a relaxed, community‑first mindset that sometimes leaves their tool‑box cluttered and
    their budget a little chaotic, yet they always manage to keep a smile on their face.
background:
  cultural: Deidra grew up in a close‑knit African‑American family in Sumter, where church, extended family, and neighborhood ties are central. Her grandparents’ Great Migration story instilled a strong
    work ethic and resilience. Active participation in the historic Ebenezer Baptist Church—through choir, community service, and fellowship—shaped her compassionate and cooperative nature. Local black
    cultural heritage, emphasizing mutual aid, storytelling, and pride in craftsmanship, informs her approach to work and life. She celebrates traditions such as Juneteenth and the Sumter Gullah Festival,
    enjoys Southern soul food and gospel music at family gatherings, and navigates the predominantly white automotive industry with confidence rooted in her cultural identity.
