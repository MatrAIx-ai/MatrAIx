  career_goals: Deidra aims to become a certified master technician within the next three years, acquiring advanced credentials in hybrid and electric vehicle repair. In the longer term, she envisions opening
    a community‑focused auto shop in Sumter that provides affordable services and offers free repair workshops for residents, especially those lacking reliable transportation. She also hopes to launch a
    youth apprenticeship program that teaches automotive skills to local high‑school students, merging her passion for cars with her drive to give back and promote harmony in her community.
