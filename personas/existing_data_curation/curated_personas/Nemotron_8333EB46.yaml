personas:
  professional: Claire Gillette, an aspiring community‑health nursing student, blends her meticulous organizational skill with a compassionate, methodical bedside manner to coordinate youth health workshops,
    leveraging her curiosity about mental‑health first aid and her practical experience in first aid and event planning.
  sports: Claire Gillette, an avid outdoor enthusiast, hikes the pine forests surrounding her hometown, runs with the Pine Forest Trail Runners club, plays casual basketball at the church gym, and closely
    follows the Mississippi State Bulldogs football team and the New Orleans Saints, using sports as both recreation and a stress‑relief outlet.
  arts: Claire Gillette, a devoted photographer and literature fan, captures the Mississippi countryside in the style of Ansel Adams, devours contemporary fiction by Sally Rooney and non‑fiction psychology
    titles, and playlists feature The Avett Brothers, Mumford & Sons, and the soulful piano works of Ludovico Einaudi, while she also attends community theatre productions such as a local staging of *The
    Glass Menagerie*.
  travel: Claire Gillette, a budget‑conscious traveler, enjoys weekend trips to New Orleans for its music scene, explores the historic streets of Charleston, dreams of wandering Kyoto’s temples and the
    Amalfi Coast’s cliffs, and plans future road‑trips across the Gulf Coast to capture sunrise over the Gulf of Mexico.
  culinary: Claire Gillette, a Southern‑cuisine enthusiast, perfects peach cobbler and pecan pie using garden‑fresh peaches and locally sourced pecans, experiments with sous‑vide shrimp and grits while
    never missing the classic comfort of fried catfish with collard greens, and she meticulously seasons with rosemary, thyme, and a dash of smoked paprika, though she sometimes over‑salts her dishes in
    the pursuit of flavor.
  core: Claire Gillette, an organized, curiosity‑driven teen who balances community‑focused compassion with a tendency to worry, keeps a meticulously alphabetized pantry, a "stress jar" for worries, and
    a habit of over‑planning every weekend, yet finds peace in garden‑grown meals and sunrise walks.
background:
  cultural: Raised in Wesson, a small town in Lawrence County, Mississippi, Claire's cultural identity is shaped by Southern traditions and a close‑knit, predominantly white community. Family gatherings,
    church services (she attends a Baptist congregation), and local events like county fairs and community potlucks have instilled values of hospitality, modesty, and mutual support. The region's rich musical
    heritage, love of comfort food, and emphasis on faith and community service influence her worldview and daily practices.
attributes:
  skills: '[''Organization and Planning'', ''Event Coordination'', ''Clear Communication'', ''Microsoft Office Proficiency'', ''Basic First Aid'', ''Cooking and Baking'', ''Gardening'', ''Digital Photography'']'
  hobbies: '[''Reading'', ''Journaling'', ''Cooking and Baking'', ''Gardening'', ''Volunteering'', ''Photography'', ''Podcast Listening'', ''Nature Walks'']'
  career_goals: Claire intends to pursue a degree in nursing at a nearby community college, with the long-term aim of becoming a registered nurse specializing in community health. She also hopes to earn
    certifications in mental health first aid and health education, enabling her to support vulnerable populations in her hometown. Ultimately, she aspires to combine her organizational strengths and compassionate
    nature to lead health outreach programs that improve wellness in rural Mississippi.
