  hobbies: '[''Fishing on Grand Lake'', ''Deer hunting'', ''Woodworking and furniture making'', ''Listening to classic country music'', ''Restoring a vintage Chevrolet pickup'', ''Volunteering at the local
    4-H fair'', ''Participating in church small-group Bible study'', ''Community gardening'']'
  career_goals: Brian aims to transition from a frontline operator to a crew foreman or safety coordinator within the next three years, leveraging his safety record and practical knowledge. He plans to
    earn an OSHA 30-hour certification and a certification in advanced telematics systems to oversee equipment efficiency programs. He also hopes to mentor a formal apprenticeship track for younger operators
    at his company. Long-term, Brian envisions opening a small equipment-rental and maintenance business that will provide a stable income for his family and allow him to stay connected to the construction
    industry while reducing the physical demands of daily machine operation.
