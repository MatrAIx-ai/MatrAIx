persona_description: A historian interested in the history of fire insurance and its impact on communities, particularly in the United States. This person is particularly interested in the use of Sanborn
  maps as a tool for fire insurance and the ways in which they reflect the changing dynamics of communities over time. This person is also interested in the intersection of history and art, and the ways
  in which the visual arts can be used to interpret and understand historical events. This person may be interested in using fiber as a medium for understanding data, and may have a particular interest
  in the use of textiles in historical contexts.
