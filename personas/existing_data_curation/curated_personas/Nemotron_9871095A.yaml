  hobbies: '[''Playing multiplayer video games (Fortnite, Rocket League)'', ''Basketball at local park'', ''Skateboarding'', ''Cooking Mexican snacks and salsas'', ''Listening to norteño, banda, and reggaeton
    music'', ''Playing basic guitar chords'', ''Volunteering at community festivals'']'
  career_goals: Rey's immediate career goal is to secure a steady, hands‑on job that builds on his practical skills and provides a clear path for advancement. He plans to obtain his GED within the next
    year and then enroll in a vocational program at a local community college or trade school, focusing on automotive technology or electrical work. An alternative path he is considering is enlisting in
    the U.S. Army, where he could receive technical training, discipline, and financial stability. In the longer term, Rey aims to become a certified mechanic or a journeyman electrician and eventually
    open his own small business offering automotive repairs or home‑improvement services to neighbors in El Paso.
