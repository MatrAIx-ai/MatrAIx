  hobbies: '[''Yoga'', ''Hiking'', ''Journaling'', ''Trivia League'', ''Strategic Board Games'', ''Community Tutoring'', ''Gardening'', ''Cooking'']'
  career_goals: Brenda aims to move from a hands‑on surveillance officer to a supervisory or managerial role within a casino security department. She plans to earn a Certified Protection Professional (CPP)
    credential and complete a master's program in Criminal Justice to deepen her strategic understanding of threat mitigation. Long‑term, she envisions leading a regional security team, developing standardized
    training curricula for new hires, and eventually consulting for multiple gaming establishments to design robust, stress‑reducing security protocols.
