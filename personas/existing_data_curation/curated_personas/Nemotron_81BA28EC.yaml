personas:
  professional: Anaid Pintado, a veteran librarian and media collections specialist, leverages their meticulous cataloguing, bilingual communication, and critical eye for metadata to drive inclusive programming
    and digital innovation at the public library, while their competitive streak fuels relentless grant‑writing and a determined push to establish a landmark Salvadoran cultural archive.
  sports: Anaid Pintado, an avid hiker with the Cascades Trail Club, favors low‑impact cardio over competitive leagues, yet stays engaged with the Seattle Seahawks in football season and the Seattle Sounders
    during summer soccer, balancing outdoor adventure with casual team fandom.
  arts: Anaid Pintado immerses herself in Tacoma's art scene, regularly attending exhibitions featuring contemporary artists like Kehinde Wiley and folk creators such as Maria Martinez, while also leading
    spirited book club discussions on authors like Isabel Allende, enjoying theater productions at Seattle Repertory Theatre starring actors like Jeremy Piven, and curating a personal photography collection
    inspired by Dorothea Lange's street narratives.
  travel: Anaid Pintado prefers meticulously planned trips that blend nature and culture, having trekked the Cascades, explored San Francisco's tech museums, and journeyed to Oaxaca for its vibrant festivals,
    while dreaming of a future pilgrimage to Barcelona’s art districts, all balanced against a modest travel budget and occasional pre‑trip worry.
  culinary: Anaid Pintado, a seasoned home chef, delights in crafting authentic pupusas stuffed with cheese, loroco, and refried beans, and simmering tamales wrapped in banana leaves, often pairing them
    with fresh cilantro and a splash of lime, while occasionally experimenting with fusion twists that reveal a meticulous yet adventurous palate.
  core: Anaid Pintado blends relentless curiosity for multicultural arts with a competitive drive for library leadership, yet their habit of over‑scheduling and occasional worry‑filled rumination makes
    them both a powerhouse organizer and a self‑critical perfectionist.
background:
  cultural: Anaid grew up in a close‑knit Salvadoran family, where Spanish was spoken at home and traditions such as Día de los Muertos, Christmas tamales, and weekly family meals anchored her identity.
    After immigrating to the United States, she built a life in Tacoma, Washington, where she blends her Salvadoran heritage with the Pacific Northwest’s love of nature and community activism. She remains
    actively involved in the local Salvadoran diaspora, supporting cultural events, teaching Spanish language workshops, and advocating for representation of Latino voices in the library’s collections.
    Her Catholic upbringing and emphasis on family loyalty shape her values, while her appreciation for both Central American folk art and Northwest indigenous art informs her curatorial eye and community
    programming.
