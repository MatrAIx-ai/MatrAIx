  career_goals: Anaid aims to step into a senior leadership role within the public library system, such as Head Librarian or Director of Special Collections, where she can champion inclusive programming
    and digital innovation. She plans to establish a dedicated Salvadoran cultural archive that preserves diaspora stories, oral histories, and artifacts, leveraging grant funding and partnerships with
    local museums. Over the next five years, she intends to modernize the library’s media centre with interactive technologies like virtual reality exhibits, mentor emerging librarians—especially those
    from underrepresented backgrounds—and author a guide on best practices for multicultural collection development. Ultimately, she envisions leaving a lasting legacy of community empowerment, expanded
    access to multilingual resources, and a robust, technology‑forward library that reflects the cultural richness of Tacoma’s diverse population.
