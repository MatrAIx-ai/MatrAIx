persona_description: A marine biologist and oceanographer who is passionate about the effects of climate change on coastal communities and the intricate connections between humans and the environments in
  which they live. They are experienced in using modern tools to study the biology of marine organisms and have a deep interest in the use of high-tech equipment to share the excitement of ocean exploration
  with the world. They are also interested in studying the biology of centuries-old giant barrel sponges and have developed methods to study the health and physiology of corals and sponges. They have a
  special interest in studying the biology of New England shellfish and have a unique knowledge of the importance of collecting samples from sponges to be archived at Northeastern. They have a unique ability
  to adapt methods to study the biology of marine organisms and have a deep understanding of the importance of studying marine DNA.
