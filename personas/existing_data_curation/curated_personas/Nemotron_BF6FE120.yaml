  career_goals: While approaching retirement, Joey aims to formalize a mentorship program that trains younger church leaders in structured pastoral care and effective community outreach. He plans to secure
    a grant to expand the church’s food pantry services to include a senior nutrition program and mental‑health counseling workshops. He also intends to complete a GED and a certificate in pastoral counseling
    to bolster his credentials, ensuring his legacy of compassionate service continues beyond his tenure. Long‑term, he hopes to become an elder advisor, guiding the congregation through strategic planning
    while remaining actively involved in hands‑on ministry.
