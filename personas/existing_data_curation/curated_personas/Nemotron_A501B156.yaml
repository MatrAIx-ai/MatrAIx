  hobbies: '["Reading historical fiction and biographies","Participating in a book club","Gardening (herbs and flowers)","Visiting art galleries and museums","Volunteering as a museum docent","Genealogy
    research","Knitting and crochet","Walking in local parks","Shopping at farmer’s markets"]'
  career_goals: Although retired from formal employment, Vita aims to deepen her involvement in community service. She hopes to become a mentor for new volunteers at the Mount Laurel public library, sharing
    her research and organizational expertise. She also plans to document local history and family stories, eventually compiling a community oral‑history booklet. Pursuing a certification in senior‑center
    programming is a modest ambition that would enable her to design wellness workshops. In parallel, she wishes to maintain her mental well‑being by attending stress‑management classes and continuing education
    courses in art history.
