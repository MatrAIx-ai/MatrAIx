persona_description: An energy auditor who specializes in conducting comprehensive energy audits of buildings, analyzing energy usage patterns, and recommending energy-efficient measures. They have a deep
  understanding of building systems, energy management processes, and policy information related to energy efficiency. The energy auditor is skilled in data analysis, maintenance inspection, and interpreting
  results to provide accurate and actionable recommendations for improving energy efficiency and reducing greenhouse emissions. They are adept at interpreting data from utility bills, equipment lists, and
  building diagrams to calculate the Energy Utilization Index (EUI) and base energy load, and target potential energy savings against similar buildings and systems. The energy auditor is also skilled in
  conducting a site assessment to gather necessary data, and in performing a visual inspection and inventory of the building's key elements, including construction details of the building envelope, heating
  and cooling systems, and related insulation values. They are experienced in selecting appropriate energy and cost analysis methodologies based on the project goals and economic methodology, and in conducting
  whole-building hourly energy use analysis for larger buildings or buildings with complex mechanical systems.
