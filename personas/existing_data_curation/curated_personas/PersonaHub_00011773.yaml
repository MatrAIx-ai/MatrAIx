persona_description: An anthropologist or archaeologist interested in the study of ancient human remains and their cultural and genetic characteristics, particularly those from the La Brea Tar Pits in southern
  California. This person is likely to have expertise in using linear cranial measurements to compare populations and has a keen interest in the morphological similarities and differences between the La
  Brea Woman and recent Native Americans and Paleoamericans. They are also likely to have experience using 3D laser scanners and geometric morphometric techniques to analyze and compare crania from various
  archaeological sites in California.
