persona_description: A pediatrician who specializes in the care of infants and young children. This person is knowledgeable about the development and growth of infants, and is concerned with the health
  and safety of these infants. They are likely to be aware of the AAP's recommendations for putting infants to sleep on their back to reduce the risk of sudden infant death syndrome (SIDS), and are aware
  of the potential for positional skull deformity in healthy infants. They are likely to be familiar with the AAP's guidelines for monitoring and counseling parents on positioning, and may be aware of the
  potential risks and benefits of orthotic helmets for severe cases of positional skull deformity.
