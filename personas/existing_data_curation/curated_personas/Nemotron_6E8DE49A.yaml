personas:
  professional: Ivan Maldonado, a 74‑year‑old seasoned business strategist, leverages his deep expertise in budgeting, risk assessment, and bilingual communication to mentor emerging entrepreneurs, blending
    his love for structured planning with occasional spontaneous flair when guiding community projects; they bring calm resilience to every boardroom discussion.
  sports: Ivan Maldonado follows the Miami Marlins and Tampa Bay Buccaneers avidly, participates in a weekly senior pickleball league at the Fort Myers Community Center, and volunteers as a boat‑safety
    mentor with the local sailing club, reflecting their love for both spectator sports and low‑impact physical activity.
  arts: Ivan Maldonado enjoys salsa dancing to the rhythms of Marc Anthony and Victor Manuelle, attends performances by the Florida Orchestra, and devours biographies of historical figures like Winston
    Churchill and Harriet Tubman, while their evenings often include listening to classic jazz greats such as Duke Ellington and the vibrant Latin jazz of Tito Puente.
  travel: Ivan Maldonado favors relaxed road trips to coastal towns like Key West and Savannah, dreams of exploring the historic streets of Cartagena, Colombia, and plans annual visits to the historic district
    of St. Augustine, balancing spontaneous weekend getaways with careful budgeting for travel; they cherish both the adventure of new sights and the comfort of familiar beach walks.
  culinary: Ivan Maldonado loves preparing traditional island dishes such as ropa vieja, arroz con pollo, and sweet plantain tostones, mastering the precise timing of sofrito while delighting friends with
    spontaneous, impromptu feasts that blend disciplined recipes with lively hospitality; they view cooking as both a structured craft and a joyful, social ritual.
  core: Ivan Maldonado is a disciplined yet delightfully spontaneous 74‑year‑old mentor who balances meticulous financial planning with impromptu salsa dancing, garden stewardship, and lively culinary gatherings,
    all while maintaining a calm, resilient outlook.
background:
  cultural: Ivan was born to Cuban immigrant parents who settled in Florida during the early 1960s. Growing up in a bilingual household, he absorbed the rich traditions of Cuban music, storytelling, and
    cuisine. The values of resilience, community solidarity, and respect for elders, common among the Cuban diaspora, have shaped his outlook. He celebrates Carnaval, prepares classic dishes like ropa vieja
    and arroz con pollo, and listens to son, bolero, and salsa. His Catholic faith and active participation in local Cuban-American organizations in Fort Myers reflect his deep cultural ties and commitment
    to preserving his heritage while integrating into American life.
