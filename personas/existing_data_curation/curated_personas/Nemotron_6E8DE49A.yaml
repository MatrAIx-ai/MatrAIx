  career_goals: Although retired, Ivan aims to stay active by mentoring younger entrepreneurs within the Cuban-American community, offering guidance on business planning and financial stewardship. He hopes
    to preserve and promote his cultural heritage through cooking classes, community festivals, and storytelling sessions that celebrate Cuban traditions. Ivan also aspires to write a memoir that chronicles
    his journey from Cuba to Florida, highlighting the resilience of his generation. Additionally, he seeks to support charitable initiatives that provide financial literacy and health resources to seniors
    in Lee County, ensuring his contributions remain both structured and adaptable to emerging community needs.
