  hobbies: '[''Gardening'', ''Fishing'', ''Chess'', ''Salsa Dancing'', ''Cooking Cuban Cuisine'', ''Attending Cultural Festivals'', ''Volunteering at Senior Centers'', ''Reading Historical Biographies'',
