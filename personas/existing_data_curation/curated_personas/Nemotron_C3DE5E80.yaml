  career_goals: Kendel aims to advance into a lead machinist or shop supervisor role where she can guide a small team focused on custom artistic metalwork. She plans to earn advanced CNC programming certification
    and gain expertise in metal additive manufacturing to expand her creative capabilities. Ultimately, she hopes to launch a boutique studio that produces handcrafted metal sculptures and functional art
    for local galleries, festivals, and private commissions, while negotiating a flexible schedule that reduces stress and allows more time for community and family activities.
