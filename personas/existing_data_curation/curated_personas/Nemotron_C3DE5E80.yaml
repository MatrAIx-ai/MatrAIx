personas:
  professional: Kendel Vakil is an experienced precision machinist and CNC programmer who combines expert-level manual and CNC milling skills with a vibrant artistic sensibility, mentoring apprentices in
    a hands‑on, improvisational style; they maintain a relaxed approach to strict scheduling balanced by a fierce competitive drive to deliver flawless custom metal art, while their curiosity fuels unconventional
    engineering solutions.
  sports: Kendel Vakil enjoys regular sailing outings with the Sarasota Yacht Club, follows the Tampa Bay Buccaneers and Tampa Bay Lightning with enthusiastic fanfare, participates in seasonal beach volleyball
    leagues in the summer and modestly jogs with the Florida Gulf Coast Track Club in the cooler months; they approach fitness as a social activity rather than a rigid regimen.
  arts: Kendel Vakil immerses themselves in Sarasota’s creative pulse by frequenting galleries showcasing works by Yayoi Kusama and local muralist Bethany Alvarez, performing occasional spoken‑word pieces
    at open‑mic nights alongside poet Jesse Carter, crafting pottery inspired by the tactile aesthetics of studio artist Beth Lipman, and relishing indie concerts headlined by The War on Drugs and Phoebe
    Bridgers; they view each artistic encounter as a catalyst for their metal sculpture ideas.
  travel: Kendel Vakil prefers laid‑back yet culturally rich trips, meticulously planning weekend getaways to Key West and New Orleans for culinary and music immersion while budgeting for a dream abroad
    voyage to Reykjavik’s art scene and the historic ruins of Machu Picchu; they balance their love of spontaneous sailing excursions with the practicalities of a modest retirement fund.
  culinary: Kendel Vakil is a confident home‑cook who loves grilling fresh grouper with lime‑citrus glaze, braising shrimp étouffée with okra and filé, and crafting gnocchi tossed in sage‑brown butter,
    while their palate eagerly seeks out tropical mango salsa, smoked paprika‑seasoned sweet potatoes, and occasional visits to upscale restaurants for farm‑to‑table tasting menus featuring heirloom tomatoes
    and microgreens; they relish the creative process of plating as an extension of their artistic expression.
  core: Kendel Vakil blends a relentless curiosity for metalwork with a carefree, sometimes chaotic lifestyle, turning workshop mishaps into artistic breakthroughs while habitually losing track of appointments,
    yet they always resurface with a fresh sketch or a new sailboat tale.
background:
  cultural: Kendel identifies as a White American who grew up in a small Midwestern town before relocating to the Sun Belt. She embraces Southern hospitality tempered by the eclectic, arts‑focused lifestyle
    of Sarasota, Florida. Her family traditions include road trips across the United States and dining at classic American diners, while her adult life reflects Florida’s multicultural influences—exposure
    to Caribbean rhythms, Latin cuisine, and a vibrant visual arts scene. Her cultural outlook values self‑reliance, community involvement, a love of practical craftsmanship, and an appreciation for creative
    expression.
