  hobbies: '["sketching desert landscapes","watercolor painting","digital art (Procreate)","photography of desert scenes","reading science‑fiction and graphic novels","school art club participation","hiking
    and biking in the Sonoran Desert","visiting museums and cultural festivals","volunteering at the library art‑craft program"]'
  career_goals: Deborah aspires to merge her love for art and her curiosity about the world by pursuing a career as a concept artist and visual storyteller. She hopes to attend a specialized high school
    for the arts, followed by a Bachelor of Fine Arts in illustration or graphic design. Long‑term, she envisions working on environmental advocacy campaigns, creating compelling visual media that raise
    awareness about desert conservation. She also dreams of publishing her own graphic novel series that explores futuristic desert societies.
