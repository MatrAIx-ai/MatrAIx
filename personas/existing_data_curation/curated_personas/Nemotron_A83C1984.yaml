  career_goals: He aspires to become an astronaut to explore space, while also dreaming of being a veterinarian because he loves animals and wants to help them. He hopes to design and build a treehouse,
    blending creativity with hands‑on work, and aims to be a class helper and win the upcoming school science fair with a project about magnets.
