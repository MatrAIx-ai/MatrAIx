personas:
  professional: Chan Miller, a seven‑year‑old budding technologist, mixes the strategic thinking of after‑school soccer with the imagination of drawing comic‑style heroes, and they channel that curiosity
    into building LEGO cities and programming simple sequences on their coding toy.
  sports: Chan Miller plays forward for the Brighton Little Strikers youth soccer team, trains on Tuesdays and Thursdays, and they idolize the hometown professional club River City Rangers while also cheering
    for the national team during World Cup seasons.
  arts: Chan Miller spends quiet afternoons sketching comic‑style heroes inspired by Stan Lee’s Spider‑Man and the vibrant panels of Teenage Mutant Ninja Turtles, and they often binge‑watch the animated
    adventures of The Avengers, while their musical taste includes upbeat pop tunes from Taylor Swift that echo through their playroom.
  travel: Chan Miller dreams of exploring the towering redwoods of California’s Redwood National Park and the glittering streets of Paris, but for now their family’s weekend trips to the nearby state park
    for bird‑watching and occasional visits to the city’s science museum satisfy their love for nature and curiosity, and they let their parents handle the itinerary while they focus on collecting cool
    rocks.
  culinary: Chan Miller prefers cheese pizza topped with extra pepperoni and a side of carrot sticks, delights in scooping up mac & cheese with a fork, and they eagerly blend fresh strawberries, banana,
    and a splash of orange juice into a smoothie, while their cooking skill peaks at assembling simple peanut butter‑jelly sandwiches and occasionally helping stir a pot of spaghetti sauce.
  core: Chan Miller, a seven‑year‑old with boundless curiosity for building, drawing and soccer, balances creative spontaneity with a delightfully messy approach to chores, often juggling a LEGO city while
    forgetting to put away crayons, and they thrive on the freedom to explore both the outdoors and the digital world.
background:
  cultural: Chan lives in Mascoutah, a small Midwestern town in Illinois. His family participates in community events such as the annual county fair, church gatherings, and school sports nights, reflecting
    Midwestern values of neighborliness and volunteerism. He grows up with a blend of American pop culture—from cartoons and superhero movies to local traditions like Thanksgiving parades and summer barbecues.
    The agricultural surroundings nurture his appreciation for outdoor activities like fishing and exploring farms, while his school emphasizes involvement in group projects and local history lessons.
