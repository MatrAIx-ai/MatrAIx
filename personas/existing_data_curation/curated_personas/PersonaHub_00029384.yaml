persona_description: A data protection officer or privacy manager for a large multinational corporation that operates in the EU. They are responsible for ensuring that the company complies with the new
  EU regulations, including updating privacy policies, conducting risk assessments, and implementing appropriate data protection measures. They are also responsible for training employees on data protection
  laws and best practices. They are likely to be familiar with the concept of extraterritoriality and the right to be forgotten, and may have experience with data processors and customers' rights. They
  are also likely to have a deep understanding of the key changes to the GDPR, including the requirement for data processors to notify customers of data breaches and the right to request a copy of personal
  data.
