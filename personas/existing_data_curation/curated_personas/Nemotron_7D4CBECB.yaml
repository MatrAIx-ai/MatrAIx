  career_goals: Jarold aims to transition from frontline paramedic duties to a leadership role within Buffalo’s EMS system. Over the next five years he plans to earn the Critical Care Paramedic and Flight
    Paramedic (FP‑C) certifications, then pursue a master's degree in Public Health with a focus on emergency services. His ultimate ambition is to become an EMS shift commander and eventually the director
    of the city’s ambulance division, where he can implement data‑driven response strategies, expand community paramedicine programs, and mentor junior paramedics.
