  career_goals: Jerome aims to launch his own boutique woodworking studio that specializes in custom, historically accurate furniture and restoration services for New England homes. He plans to earn a Certified
    Cabinetmaker credential, deepen his expertise in early American building techniques, and become a recognized consultant for historic preservation societies. Over the next five years, he hopes to mentor
    a small cohort of apprentices, expand his services to include interior‑design consulting, and eventually open a community workshop space where locals can learn and practice woodworking skills.
