  career_goals: Paula plans to finish her undergraduate studies in Communications or Business Administration and transition into a community outreach or event‑planning role within a nonprofit organization
    or a corporate social responsibility department. She aims to leverage her sociable nature and organizational strengths to build robust stakeholder relationships and design impactful community programs.
    Over the next five years, she aspires to advance to a program manager position that combines strategic planning with direct community engagement, while maintaining a stable, structured work environment
    that supports ongoing professional growth and personal fulfillment.
