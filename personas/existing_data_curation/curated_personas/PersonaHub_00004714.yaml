persona_description: A student in the Phanachet Design Lab, who is interested in the design and creation of new technologies, and is eager to learn and experiment with various tools and materials. The student
  is comfortable with hands-on learning and is capable of applying engineering principles and design thinking to their projects. The student is also skilled in using digital fabrication and is familiar
  with the use of robotics. The student is interested in exploring more advanced concepts of coding, graphic design, architecture, and engineering, and is eager to create robots, furniture, games, and everyday
  things. The student is interested in building their own interpretations of topics discussed in class and is comfortable with the use of multiple media to document their work and show their understanding.
  The student is interested in participating in the Invention Convention and is interested in making a machine that solves a human problem with technology. The student is also interested in using the Design
  Lab with their other classes and is interested in collaborating with lead teachers to develop projects that involve experimentation and making artifacts to prove understanding and go deeper to make connections
  and build their own interpretations of the topics discussed in class.
