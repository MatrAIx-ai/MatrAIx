  hobbies: '[''Fishing'', ''Hiking on Ohio state trails'', ''Building and repairing vintage radios'', ''Reading forensic science and true‑crime literature'', ''Playing chess at the local community center'',
    ''Volunteering for neighborhood safety workshops'']'
  career_goals: George aims to achieve the rank of sergeant within the next three years and to eventually lead a specialized unit focused on cyber‑crime and data‑driven policing. He wants to spearhead a
    department-wide initiative that integrates predictive analytics to allocate resources more efficiently, thereby reducing crime rates in Canton while also improving officer well‑being. Long‑term, he
    envisions transitioning to a consultancy role advising municipal agencies on technology adoption and officer wellness programs before retirement.
