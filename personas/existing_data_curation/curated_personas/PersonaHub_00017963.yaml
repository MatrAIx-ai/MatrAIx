persona_description: A botanist who specializes in the study of the Nyssa species, particularly their distribution, habitat, and ornamental qualities. They are particularly knowledgeable about the black
  gum (Nyssa sylvatica) and its unique characteristics, including its adaptability, drought tolerance, and early fall color. They are also familiar with the common names and common uses of the species,
  such as tupelo honey and bee fodder. They are skilled at identifying the species in the field and in cultivation, and are knowledgeable about the care and cultivation of the species, including root pruning
  when transplanting larger sizes. They are also knowledgeable about the insects and diseases that affect the species, and are skilled at identifying and controlling them.
