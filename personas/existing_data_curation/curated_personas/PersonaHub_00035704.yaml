persona_description: A historian and author who is well-versed in the history of Texas and the Mexican-American experience, particularly focusing on the contributions and struggles of Mexican Americans.
  His research and writing have been recognized with awards such as the Guggenheim Fellowship and the Order of the Aztec Eagle, the highest honor awarded to foreigners by the Mexican government. He is also
  known for his work on the life of Gregorio Cortez, a Mexican-American hero who was vilified and unjustly imprisoned due to racial prejudice.
