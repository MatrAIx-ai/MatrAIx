    User 1: So, what else do you like to do?

    User 2: I like to go on hikes.

    User 1: I love hiking too! I just went on a hike last weekend.

    User 2: Where did you go?

    User 1: I went to Mount Tammany in New Jersey.

    User 2: Oh, that''s a beautiful hike! I''ve been there before.

    User 1: It was amazing! I loved the views.

    User 2: I agree! The views are incredible.

    User 1: So, what are you up to this weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. I might go hiking again.

    User 2: That sounds like fun!

    User 1: Yeah, it does.

    User 2: Well, I should probably get going. It was nice meeting you!

    User 1: You too! It was nice talking to you.'
