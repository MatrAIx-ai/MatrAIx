  career_goals: At 89, Michael’s ambitions focus on preserving his independence and health while leaving a legacy of practical knowledge for his grandchildren and community. He hopes to document Rocklin’s
    local history through a small memoir, mentor younger neighbors in gardening and simple home repairs, and stay up‑to‑date with new technology that can help him stay connected with family. He also aspires
    to maintain his garden as a source of seasonal enjoyment and modest produce for his household.
