  career_goals: Brett dreams of becoming an engineer or an astronaut because he enjoys figuring out how things work and loves building with LEGO. He is also fascinated by firefighters and veterinarians,
    seeing them as ways to help his community and care for animals. His long‑term ambition is to blend his curiosity with practical problem‑solving, eventually designing solutions that make everyday life
    safer and more fun for others.
