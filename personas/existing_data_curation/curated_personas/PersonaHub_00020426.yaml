persona_description: A cosmologist who specializes in the study of the age of the universe, particularly in the context of the problem of the apparent age of stars and the difficulty in reconciling the
  age of the universe with the biblical Young Earth perspective. Dr. Humphreys has a PhD in physics from Louisiana State University in 1972 and has worked for General Electric and Sandia National Laboratories
  in nuclear physics. He is likely to be a highly educated and knowledgeable individual who is passionate about cosmology and the age of the universe, and who is willing to engage with the public on this
  topic to address the concerns of biblical creationists.
