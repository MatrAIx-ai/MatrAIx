  hobbies: '[''Cooking Peruvian cuisine'', ''Gardening on balcony'', ''Reading medical journals'', ''Listening to health podcasts'', ''Reading fiction'', ''Andean music appreciation'', ''Volunteering at
    community health fairs'', ''Yoga'', ''Hiking in local parks'', ''Traveling to Peru'']'
  career_goals: Eiman aims to transition into a leadership role within her hospital, such as charge nurse or unit manager, where she can shape policies that improve patient safety and cultural sensitivity.
    She also plans to complete a nurse practitioner certification to provide primary care to underserved Hispanic families in Queens, integrating telehealth solutions she has been exploring. Long‑term,
    she hopes to develop a community health outreach program that blends her Peruvian heritage with evidence‑based nursing practice, offering preventive health workshops and nutrition counseling.
