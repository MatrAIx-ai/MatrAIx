personas:
  professional: Eiman Rivera, a seasoned registered nurse with a solid STEM foundation, excels at comprehensive patient assessments, IV therapy, wound management, and chronic disease education, leveraging
    bilingual fluency and health informatics to mentor junior staff while maintaining a calm, compassionate demeanor even under crisis.
  sports: Eiman Rivera, a regular participant in weekly yoga classes and a member of the Queens Outdoor Hikers club, enjoys weekend hikes in nearby parks, follows the New York Knicks for basketball and
    the New York Yankees for baseball, and occasionally joins community soccer pick‑up games during the summer.
  arts: Eiman Rivera, an avid listener of Andean folk music, frequently streams artists such as Susana Baca and Los Kjarkas, finds solace in magical‑realism novels by Gabriel García Márquez, and supports
    local theater productions featuring works by Lin‑Manuel Miranda.
  travel: Eiman Rivera, who blends flexible itineraries with occasional spur‑of‑the‑moment detours, has trekked the Andean highlands of Ecuador, explored the historic streets of Cartagena, savored coastal
    villages in Chile, and keeps a bucket list that includes a culinary tour of Kyoto and a hiking adventure in the Canadian Rockies.
  culinary: Eiman Rivera, a confident home chef, regularly prepares traditional coastal dishes like ceviche, causa, and lomo saltado, experimenting with quinoa, ají amarillo, and citrus marinades while
    sourcing fresh fish, Peru‑style potatoes, and locally grown herbs at the farmer’s market.
  core: Eiman Rivera balances a practical curiosity with spontaneous creativity, excelling in patient care and culinary experiments, yet frequently misplaces their house keys among the potted herbs on their
    balcony garden.
background:
  cultural: Eiman grew up in a Peruvian‑American household, with parents who immigrated from Lima. She was raised bilingual, celebrating holidays such as Día de la Independencia (July 28) and sharing traditional
    foods and music with her family. Living in Queens, she actively participates in the city’s vibrant Latino community, attending cultural events at the Peruvian Consulate and local festivals. Her heritage
    informs her nursing practice; she often serves as a cultural liaison for Spanish‑speaking patients, ensuring that care plans respect family values and dietary customs typical of Andean and coastal Peruvian
    cultures.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy'', ''Wound care'', ''Chronic disease education'', ''Bilingual communication (Spanish-English)'', ''Electronic health record (EHR) management'', ''Health
