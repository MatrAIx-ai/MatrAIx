  hobbies: '[''Sketching'', ''Watercolor painting'', ''Jewelry making'', ''Reading abstract philosophy'', ''Reading history of metalworking'', ''Book club'', ''Visiting art galleries'', ''Gardening (native
    prairie plants)'', ''Volunteering at community makerspace'', ''Mentoring youth in metalcraft'', ''Listening to classical piano music'', ''Knitting'']'
  career_goals: She aims to transition from full‑time industrial welding to a boutique studio focused on artistic metal sculpture and bespoke home‑decor commissions. Dianna hopes to lead workshops for local
    seniors and hobbyists, preserving the craft while fostering creativity. In the next five years she plans to exhibit her work in regional art fairs, collaborate with interior designers, and eventually
    mentor a small team of apprentices who share her curiosity for blending function with aesthetic expression. As she approaches retirement, she envisions a part‑time consultancy role, offering safety
    and technical expertise to small manufacturers.
