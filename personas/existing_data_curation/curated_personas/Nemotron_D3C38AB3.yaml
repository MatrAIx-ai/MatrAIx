personas:
  professional: Dianna Bowden, a veteran welder turned metal sculptor, leverages decades of MIG, TIG, and oxy‑acetylene expertise alongside AutoCAD precision to craft functional art while mentoring apprentices
    with a blend of safety rigor and whimsical imagination.
  sports: Dianna Bowden enjoys low‑impact fitness like weekend nature walks through prairie preserves, follows the local minor‑league baseball team, the Springfield Sluggers, and attends a senior yoga class
    at the community center to maintain flexibility for metalworking.
  arts: Dianna Bowden spends afternoons sketching watercolors of prairie landscapes, studies the metalwork of Alexander Calder, and finds solace in the piano sonatas of Beethoven while crafting intricate
    silver‑copper jewelry inspired by Gustav Klimt’s gilded motifs.
  travel: Dianna Bowden favors carefully planned solo road trips to art‑rich destinations such as the Art Institute of Chicago, the Badlands National Park for native flora inspiration, and a week‑long metalworking
    symposium in Florence, Italy, balancing wanderlust with a modest travel budget.
  culinary: Dianna Bowden delights in cooking simple, seasonal dishes like roasted beet and walnut salad, enjoys brewing herbal tea in a copper mug, and occasionally experiments with a copper‑pan paella,
    all while listening to classical piano to enhance the culinary experience.
  core: Dianna Bowden blends a lifetime of welding mastery with a quiet love for watercolor, philosophy, and prairie gardening, channeling curiosity into artistic metalwork while navigating retirement with
    disciplined finances and a penchant for occasional DIY splurges.
background:
  cultural: Dianna grew up in a Midwestern, White American family with German‑Irish ancestry in the suburbs of Wheeling, Illinois. The region’s blend of industrial heritage and close‑knit community values
    shaped her practical work ethic and modest demeanor. Family traditions include weekly Sunday dinners, seasonal celebrations such as Thanksgiving, and participation in a local Lutheran church, fostering
    a sense of communal responsibility. The cultural emphasis on self‑reliance and craftsmanship in the Midwest reinforced her respect for skilled trades while her curiosity about broader artistic and intellectual
    currents motivated her to blend these worlds.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Oxy‑acetylene brazing'', ''Soldering of electronic components'', ''Blueprint reading'', ''Metallurgy and material selection'', ''Artistic metal sculpture'',
