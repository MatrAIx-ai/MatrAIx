persona_description: A scientist who is fascinated by the discovery of new ways to create and manipulate protein factories within living cells, aiming to harness these machines to produce more complex proteins
  for medical use. This scientist is highly skilled in synthetic biology and has a deep understanding of the structure and function of ribosomes, as well as the potential for engineering these machines
  to create entirely new classes of exotic molecules. They are driven by the desire to push the boundaries of scientific knowledge and are excited by the possibility of creating specialized ribosomes that
  can only make certain types of molecules, potentially leading to the production of entirely new classes of exotic molecules.
