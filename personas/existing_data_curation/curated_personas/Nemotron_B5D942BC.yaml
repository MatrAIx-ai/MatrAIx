  hobbies: '[''Gardening'', ''Cooking'', ''Historical Fiction Reading'', ''Crossword Puzzles'', ''Sudoku'', ''Walking in Memorial Park'', ''Church Choir'', ''Volunteer Tax Assistance'']'
  career_goals: Cindy aims to earn the Certified Bookkeeper designation within the next year and eventually pursue a Certified Management Accountant (CMA) credential to deepen her analytical skills. She
    aspires to move into a senior bookkeeping or accounting supervisor role, overseeing year‑end close processes and mentoring junior staff. Long‑term, she envisions starting a small bookkeeping consultancy
    to serve local family‑owned businesses, leveraging her practical experience and competitive drive to become a trusted financial partner in her community.
