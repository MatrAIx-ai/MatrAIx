persona_description: A middle-aged white person who is concerned about the health and well-being of their skin. They are particularly concerned about the risk factors for Merkel cell carcinoma, such as
  chronic sun exposure and having another cancer. They are aware of the symptoms of Merkel cell carcinoma, such as a firm, shiny, flesh-colored or bluish-red bump, and are seeking information on the diagnosis,
  treatment, and prognosis of this rare and rapidly spreading skin cancer. They are looking for guidance on how to protect their skin from further exposure to sunlight and how to manage their symptoms if
  they are diagnosed with Merkel cell carcinoma.
