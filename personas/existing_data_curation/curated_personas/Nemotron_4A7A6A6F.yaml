  hobbies: '[''Photography'', ''Sketching and charcoal drawing'', ''Digital illustration'', ''Arduino/Raspberry Pi tinkering'', ''Hiking in the Santa Cruz Mountains'', ''Experimental cooking (fusion pierogi)'',
    ''Art gallery visits'', ''Small tech meet‑ups'', ''Reading science‑fiction'', ''Mindfulness meditation'']'
  career_goals: He aims to transition from line operator to process‑engineer role focused on sustainable packaging solutions. Over the next five years, he plans to earn a Six Sigma Green Belt certification,
    master advanced robotics integration, and lead a cross‑functional team that redesigns filler machines to reduce material waste by at least 15 %. He also hopes to patent a modular sensor system he’s
    prototyping, and eventually leverage his dual passion for technology and art to develop interactive packaging prototypes that enhance consumer experience. While ambitious, he balances these aspirations
    with a desire for flexible work arrangements that preserve his solitary creative time.
