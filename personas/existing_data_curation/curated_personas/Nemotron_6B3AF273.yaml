  hobbies: '[''Playing tag and group games'', ''LEGO building'', ''Jigsaw puzzles'', ''Basketball dribbling'', ''Storybooks about space'', ''Drawing cartoon characters'', ''Dancing to hip‑hop music'', ''Helping
    with simple cooking'', ''Participating in community block parties'']'
  career_goals: While still in kindergarten, Jonas already talks about becoming a 'community hero'—a firefighter who rescues people and a scientist who discovers how things work. He aims to be the best
    player on his neighborhood soccer team, win the school spelling bee, and later, as a grown‑up, lead a technology workshop for kids in the Bronx. His ambition is driven by a desire to excel, help others,
    and turn his curiosity into tangible achievements.
