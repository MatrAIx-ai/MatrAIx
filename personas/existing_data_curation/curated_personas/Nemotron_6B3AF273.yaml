personas:
  professional: Jonas Watkins is a budding junior architect of the sandbox, where they meticulously arrange play blocks into ordered cities, merging imaginative curiosity with a practical eye for stable
    structures, and consistently demand that every tower meets their exacting standards.
  sports: Jonas Watkins channels their boundless energy into the local Mini Sprinters soccer club, where they dominate the midfield with disciplined drill routines, and cheer loudly for the Chicago Cubs,
    insisting on a structured practice schedule that mirrors a mini‑coach mindset.
  arts: Jonas Watkins delights in the animated worlds of Pixar’s “Toy Story” and the sing‑along tunes of Disney’s “The Little Mermaid” soundtrack, while also humming along to Taylor Swift’s “Shake It Off”,
    shaping their playtime with vivid storytelling and a budding love for performance.
  travel: Jonas Watkins eagerly anticipates family road trips to the Grand Canyon and weekend outings to the seaside boardwalk, preferring meticulously planned itineraries that balance exciting exploration
    with familiar comforts, yet secretly dreams of sailing to the magical Kingdom of Disney.
  culinary: Jonas Watkins favours cheesy macaroni with a sprinkle of cheddar and peas, delights in bite‑sized pepperoni pizza slices, and often attempts to help stir the batter, though they sometimes over‑salt
    the soup in a quest for the perfect flavor.
  core: Jonas Watkins is a hyper‑organized, competitively spirited five‑year‑old whose insatiable curiosity is tempered by intense anxiety, a love for structured play, and a relentless pursuit of perfection
    in every sandbox project.
background:
  cultural: Jonas is raised in a tight‑knit African‑American family in the Bronx, where the rhythms of hip‑hop, gospel music, and street festivals shape his daily life. His relatives often gather for Sunday
    church services and summer block parties that feature soul food, dance battles, and storytelling traditions. The multicultural neighborhood exposes him to Spanish‑speaking peers and Caribbean cuisine,
    enriching his cultural awareness. These vibrant community ties foster his sociable nature, competitive spirit, and deep sense of belonging, while also teaching him the importance of resilience and mutual
    support.
attributes:
  skills: '[''Color and size sorting'', ''Alphabet recognition'', ''Counting to twenty'', ''Reading sight words'', ''Following multi-step instructions'', ''Team soccer basics'', ''Leadership in group games'',
