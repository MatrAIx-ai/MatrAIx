persona_description: A jazz musician who was deeply devoted to the music and lifestyle of the genre, often at the expense of a more lucrative career in commercial music. Wade was known for his hard living,
  hard talking, and dedication to his music, and he was one of the best-known musicians in Montreal in the 1930s and 1940s. He was also known for his addiction to heroin, which likely made it impossible
  for him to succeed in the larger market to the south. Wade was confined to Montreal, where he made his living on "the corner," and he was a member of the famous American trumpeter Loui Metcalfe's band
  for years.
