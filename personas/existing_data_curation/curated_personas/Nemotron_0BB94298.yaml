  career_goals: In retirement, Jennifer aims to channel her educational background into volunteer work that fosters lifelong learning. She plans to develop an intergenerational mentorship program at the
    local library, tutor seniors in digital literacy, and create a small reading group for adults. Jennifer also hopes to write a memoir reflecting on her teaching career and to complete a certification
    in mental‑health first aid to better support individuals coping with anxiety and distress. These goals combine her curiosity for new initiatives with a practical, community‑oriented mindset.
