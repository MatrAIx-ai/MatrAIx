  hobbies: '[''Reading historical nonfiction'', ''Writing poetry and short stories'', ''Playing acoustic guitar'', ''Cooking Nicaraguan cuisine'', ''Hiking local nature trails'', ''Meditation and journaling'',
    ''Community volunteering'', ''Photography'']'
  career_goals: Jose aims to progress to a senior leadership role, such as Director of Operations, within the next five years, overseeing larger divisions and driving efficiency improvements across the
    organization. He plans to enroll in a part‑time MBA program to deepen his business acumen and expand his strategic toolkit. A core ambition is to launch a mentorship initiative that supports young professionals
    from Latin American backgrounds, fostering inclusive career pathways. Jose also envisions establishing a boutique consulting practice focused on cultural integration and organizational development for
    nonprofit and public‑sector clients, while maintaining a balanced lifestyle that prioritizes mental well‑being and personal resilience.
