personas:
  professional: Jason Peltier, a seasoned professor of engineering education, merges their strong statistical modeling and data visualization expertise with a vivid imagination to create STEAM curricula
    that weave oil‑painting concepts into physics labs, while their reliable organization and sociable nature drive collaborative grant writing and mentorship, even as they sometimes overcommit to committee
    work at the expense of personal downtime.
  sports: Jason Peltier, an avid outdoors enthusiast, hikes the trails of the Watchung Reservation with their spouse on weekends, rides with the New Jersey Cycle Collective during spring and summer, and
    loyally follows the New York Mets as a seasonal baseball fan, balancing regular cardio with occasional yoga sessions while occasionally skipping workouts when grant deadlines loom.
  arts: Jason Peltier, a prolific oil‑ and watercolor painter inspired by the abstract expressions of Mark Rothko and the immersive installations of Yayoi Kusama, regularly contributes jazz piano improvisations
    at local jam sessions echoing Miles Davis and Thelonious Monk, participates in an improv theater troupe, and devours speculative fiction by Neal Stephenson and philosophical essays by Susan Sontag,
    weaving these artistic threads into their teaching and community makerspace workshops.
  travel: Jason Peltier, a meticulous yet spontaneous traveler, plans detailed itineraries for European art pilgrimages that include the Louvre in Paris, the Uffizi Gallery in Florence, and the Rijksmuseum
    in Amsterdam, yet they leave room for impromptu gallery openings, often traveling with their wife on short‑term trips that blend scholarly research with culinary exploration, and they keep a modest
    travel budget to fund these cultural excursions.
  culinary: Jason Peltier, an adventurous home chef with intermediate cooking skills, experiments with fusion dishes such as miso‑glazed salmon tacos, Pad Thai pizza, and ramen‑infused risotto, relishes
    fresh herbs like cilantro and basil, and while they sometimes over‑season or burn a sauce, they compensate by pairing meals with a curated selection of natural wines and hosting tasting evenings for
    friends.
  core: Jason Peltier, a 53‑year‑old interdisciplinary educator and creator, blends a disciplined, data‑driven approach to STEAM curriculum with a free‑spirited love for painting, jazz improvisation, and
    fusion cooking, occasionally overcommits to projects and forgets bill payments, yet their curiosity and collaborative spirit keep them at the heart of both academic and community life.
background:
  cultural: Jason is a third‑generation European‑American raised in suburban New Jersey. His family emphasizes education, community service, and a love for the arts, reflecting Mid‑Atlantic values of individualism
    and civic engagement. He has occasional French‑Canadian ancestry, which influences his appreciation for French cuisine and literature. Active in Mendham's historical society, he respects the town's
    colonial heritage while championing progressive, inclusive educational practices.
attributes:
  skills: '[''Interdisciplinary Curriculum Design'', ''Statistical Modeling'', ''Data Visualization'', ''Python Programming'', ''R Programming'', ''MATLAB'', ''Educational Technology Integration'', ''Learning
    Management Systems'', ''Virtual Lab Development'', ''Public Speaking'', ''Collaborative Learning Facilitation'', ''Student Mentorship'', ''Laboratory Management'', ''Grant Writing'', ''Academic Publishing'']'
  hobbies: '[''Oil Painting'', ''Watercolor Painting'', ''Abstract Art Exploration'', ''Jazz Piano'', ''Speculative Fiction Reading'', ''Philosophy Reading'', ''Creative Writing'', ''Hiking'', ''Cycling'',
    ''Makerspace Volunteering'', ''Improv Theater'', ''Travel to European Art Museums'', ''Fusion Cooking'', ''Board‑Game Hosting'']'
  career_goals: Jason aims to become the chair of his department and lead the creation of a campus-wide STEAM institute that blends art, design thinking, and engineering. He seeks a major research grant
    to investigate how art‑integrated pedagogy enhances STEM learning outcomes, and hopes to author a textbook on creative problem solving in engineering. Long‑term, he plans to earn a doctorate in education
    to deepen his research expertise, mentor future faculty leaders, expand community outreach programs in science and the arts, and eventually serve on a national advisory board shaping innovative education
    policy.
