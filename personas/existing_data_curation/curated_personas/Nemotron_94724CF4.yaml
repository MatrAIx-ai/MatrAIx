personas:
  professional: Michael Parke is a budding master builder who, inspired by the weekly library story hour and weekend family barbecues, spends hours constructing elaborate block towers that blend curiosity
    with practicality while keeping the play area meticulously organized yet flexible for spontaneous storylines.
  sports: Michael Parke, a tiny member of the Overland Park Little Tigers soccer club, practices dribbling after story hour, eagerly watches the Kansas City Chiefs on TV with the family, and cherishes backyard
    swing sessions as their favorite cardio activity.
  arts: Michael Parke delights in singing Raffi's 'Baby Beluga' and watching Sesame Street's Elmo, often drawing whimsical Dr. Seuss‑inspired creatures after library story hour, a creative outlet that shapes
    their playful imagination.
  travel: Michael Parke enjoys family trips like the Kansas City Zoo and a day at the St. Louis Gateway Arch, favors short drives over long flights, and dreams of someday exploring the magic of Disneyland.
  culinary: Michael Parke prefers creamy macaroni and cheese with a cheddar sprinkle, loves crisp apple slices and chicken nuggets, proudly feeds themselves with a tiny fork, yet notoriously rejects peas
    and overcooked broccoli.
  core: Michael Parke is a curious, organized toddler who balances playful construction with quiet routine, hoarding coins, dodging peas, and dreaming of big adventures.
background:
  cultural: Michael comes from a white, middle‑class family in the suburban community of Overland Park, Kansas. The region's Midwestern values of politeness, community involvement, and modesty shape his
    upbringing. He often participates in family-centered activities like weekend barbecues, church Sunday school, and library story hour, which reinforce a sense of belonging and respect for routine.
