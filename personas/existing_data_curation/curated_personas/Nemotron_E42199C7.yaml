  career_goals: Jennifer often talks about growing up to be a teacher because she loves helping others learn, and she also dreams of being a veterinarian to care for animals she admires. Occasionally she
    imagines becoming an astronaut, fascinated by space and the unknown. Her ambitions are grounded in her practical side—she knows she needs to practice reading, math, and staying organized every day to
    achieve these goals. Though she sometimes worries about making mistakes, she is motivated to repeat tasks until she feels confident, viewing each small success as a step toward her future career.
