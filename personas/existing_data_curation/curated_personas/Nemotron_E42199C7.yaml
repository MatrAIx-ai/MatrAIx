personas:
  professional: Jennifer Godwin, a meticulous five‑year‑old who loves building Lego structures, treats playtime like a mini‑engineering lab and balances their curiosity about how things work with a methodical
    habit of following step‑by‑step instructions.
  sports: Jennifer Godwin, a member of the Little Explorers soccer club and a regular participant in preschool swim lessons, cheers loudly for the hometown Riverside Runners baseball team while maintaining
    a carefully charted schedule of practice games that satisfies their organized nature.
  arts: Jennifer Godwin, who adores drawing whimsical animals after watching 'Bluey' and can recite the entire 'Let It Go' song from Frozen with dramatic flair, frequently attends their community’s weekly
    storytime at the local library, where they feel both inspired and slightly overwhelmed by the bustling audience.
  travel: Jennifer Godwin, after a meticulously planned family trip to the Great Smoky Mountains National Park, dreams of snorkeling among the coral reefs of Hawaii, yet they always insist on packing their
    favorite stuffed bunny and a hand‑drawn itinerary to ease the worry of unfamiliar places.
  culinary: Jennifer Godwin, a self‑declared fan of cheesy pizza and strawberry‑banana smoothies, enjoys sprinkling grated parmesan on their mac ‘n’ cheese, but they stubbornly refuse to eat broccoli, insisting
    it’s 'too green and slippery'.
  core: Jennifer Godwin, a five‑year‑old perfectionist who blends boundless curiosity with a pencil‑sharp schedule, worries about small setbacks, clings to routine comforts, and finds joy in Lego engineering,
    piggy‑bank savings, and squeaky‑clean sneakers, often reminding themselves to stay calm when anxiety creeps in.
background:
  cultural: Jennifer is a white American child raised in Fort Worth, Texas, within a family that embraces Southern hospitality and community traditions. Her upbringing includes participation in local events
    such as county fairs, Fourth of July parades, and occasional rodeo outings, exposing her to Texas culture and wildlife. She attends a preschool that incorporates Texas history and the natural environment
    into its curriculum, reinforcing her interest in animals and the outdoors. Family celebrations feature typical American holidays—Thanksgiving, Christmas, and birthdays—often with home‑cooked meals and
    shared storytelling. This blend of regional customs, family values, and exposure to both structured educational settings and informal outdoor experiences shapes her cultural perspective.
