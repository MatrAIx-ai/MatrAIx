persona_description: A political scientist and public policy analyst who is deeply concerned about the growing concentration of wealth and income in the hands of a few, and the potential consequences for
  democracy and the economy. They are also interested in the political and economic history of the United States, particularly the period from the late 19th century to the present, and how it relates to
  contemporary issues. They are aware of the role of campaign finance in perpetuating inequality and corruption, and are seeking ways to address these issues through political action and reform.
