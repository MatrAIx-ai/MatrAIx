persona_description: A financial advisor who specializes in behavioral finance, focusing on understanding and predicting how personality traits like overwhelm, distraction, risk-taking, optimism, and overconfidence
  can impact investment decisions. They aim to minimize the impact of these personality traits on financial decisions by finding a knowledgeable advisor or partner who has a different personality and seeking
  out contrary information to avoid repeating the same approach if it isn't working. They understand that personality traits are a fact of life but can be aware of them and minimize their impact.
