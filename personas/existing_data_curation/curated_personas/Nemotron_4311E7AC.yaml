  career_goals: Melissa aims to transition from an individual contributor to a technology leader who shapes product strategy and fosters a collaborative engineering culture. She aspires to become a lead
    architect or CTO of a mid‑size tech firm, where she can champion agile practices that balance flexibility with disciplined delivery. Recognizing her competitive drive, she plans to win regional hackathons,
    publish technical articles, and speak at conferences to build a personal brand. Long‑term, she dreams of establishing a community‑focused software incubator in Swannanoa that mentors aspiring developers
    from non‑traditional backgrounds, blending her love for mentorship, local culture, and innovative tech.
