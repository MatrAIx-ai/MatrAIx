persona_description: A geography professor who is interested in using social media to monitor the spread of influenza and improve public health response. His research interests include the use of social
  media in public health monitoring, the analysis of Twitter data to identify patterns and outbreaks, and the application of social media to improve healthcare delivery. He is funded by a National Science
  Foundation grant and is working on developing a social media monitoring program to improve the efficiency of public health response to influenza outbreaks. He envisions this program being applied to a
  range of public health issues, including heart attack and diabetes.
