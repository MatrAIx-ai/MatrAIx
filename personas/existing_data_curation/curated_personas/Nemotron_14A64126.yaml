personas:
  professional: Stephen Garzon is an aspiring software developer and DIY tech tutorial creator who blends a strategic gamer's planning skills with hands-on PC-building expertise, and whose relaxed, somewhat
    disorganized style pushes them toward flexible learning paths like community college courses and self-directed coding projects.
  sports: Stephen Garzon enjoys hiking the trails at Cherokee and Iroquois Parks, plays casual pickup soccer with the Louisville FC Youth Academy, follows the Louisville Bats minor league baseball team
    and the Kentucky Wildcats basketball program, and they prefer low-intensity weekend bike rides with the Louisville Mountain Biking Club over structured gym workouts.
  arts: Stephen Garzon spends evenings strumming acoustic guitar inspired by John Mayer and Ed Sheeran, they immerse themselves in sci-fi literature by authors like Isaac Asimov and N.K. Jemisin, and they
    channel their imagination into fan-fiction tributes to the Star Wars universe while occasionally watching performances by Lin-Manuel Miranda and listening to the soundtrack of Blade Runner 2049.
  travel: Stephen Garzon favors spontaneous weekend trips, often planning short drives to nearby natural spots like the Red River Gorge for hiking, dreaming of a future backpacking adventure across Japan's
    anime cafes and Kyoto historic shrines, while they balance limited teen finances and parental constraints by relying on school breaks and occasional family road trips to Chicago.
  culinary: Stephen Garzon enjoys snacking on spicy ramen with extra chili flakes, they also craft homemade pepperoni pizza on a pre-made crust, and experiment with avocado toast topped with feta and sun-dried
    tomatoes, though their cooking skill hovers between confident when assembling simple dishes and clueless when attempting more complex recipes like homemade sushi.
  core: Stephen Garzon is a curious yet laid-back teen who merges a love for strategy games, PC tinkering, and acoustic guitar with a habit of procrastinating on organization and budgeting, constantly seeking
    hands-on projects while dreaming of sharing those skills on a future DIY tech channel.
background:
  cultural: Stephen grew up in a suburban neighborhood of Louisville, Kentucky, within a predominantly white, middle‑class family that values self‑reliance and community ties. He is familiar with Southern
    hospitality blended with Midwestern practicality, often attending local events such as the Kentucky Derby festivities, high‑school football games, and community gatherings at the local church and library.
    His upbringing includes listening to a mix of classic rock, country, and bluegrass, and he appreciates the modest, down‑to‑earth lifestyle that emphasizes personal independence while staying connected
    to his community.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic coding (Python, HTML)'', ''Bicycle maintenance'', ''Basic carpentry'', ''Strategic gaming'', ''Creative writing'']'
  hobbies: '[''Playing strategy video games'', ''Building custom PCs'', ''Playing acoustic guitar'', ''Reading science-fiction novels'', ''Hiking local trails'', ''Tinkering with electronics'']'
  career_goals: Stephen aspires to finish his education through a GED or community college program and then pursue a career that blends his curiosity with practical skills. He is interested in becoming
    a software developer, working on game design, or entering an apprenticeship in automotive or mechanical technology where he can apply his hands‑on abilities. He also dreams of creating an online channel
    that offers DIY tech tutorials, giving him both creative freedom and the chance to share his knowledge with a small, engaged audience.
