persona_description: A music professor who conducts research on the relationship between music and math/reading, particularly in the context of multilevel models of the learning process. He is interested
  in the complex design of his study and its implications for educational practices, particularly in the area of music education. His research interests also include the development of general learning
  processes and the importance of developing a person's mind in all aspects of learning, rather than sacrificing one mode of learning for another.
