  career_goals: Manuel aspires to study engineering, with a particular interest in civil or environmental engineering focused on resilient infrastructure for coastal Puerto Rican communities. He plans to
    earn a scholarship—potentially through his athletic talent in basketball or baseball—to attend a university that offers strong engineering programs, such as the University of Puerto Rico or a mainland
    U.S. institution. In the longer term, he envisions launching a tech startup that creates practical apps for local businesses, combining his curiosity for new technologies with a pragmatic approach to
    real‑world problems. He also hopes to continue competing in sports at a collegiate level, using his competitive drive to achieve both academic and athletic success.
