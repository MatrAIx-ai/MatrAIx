personas:
  professional: An experienced school bus driver in Vermilion Parish, Donna Browning leverages three decades of defensive‑driving expertise, meticulous route planning, and CPR certification to keep children
    safe, while their methodical nature and love of routine make them a natural mentor for new drivers and a proactive member of the transportation safety committee.
  sports: A devoted supporter of the Vermilion Parish Bulldogs high school football team, a fan of the New Orleans Saints, and a member of the Bayou Teche Walking Club, Donna Browning maintains fitness
    by leisurely walking the Bayou Teche each morning, occasional volunteer coaching youth softball, and adhering to a routine of gentle stretching to keep their back pain at bay.
  arts: An enthusiastic participant in local cultural gatherings, Donna Browning knits intricate scarves while listening to the accordion melodies of Clifton Chenier and the jazz of Louis Armstrong, enjoys
    mystery novels by Agatha Christie, and occasionally attends the community theatre's production of "Our Town," finding these creative outlets a soothing counterbalance to their routine‑driven life.
  travel: When planning trips, Donna Browning prefers structured itineraries that include familiar Gulf Coast destinations like Lafayette and New Orleans for their festivals, while day‑dreaming about a
    future cruise to the Caribbean’s calm waters, yet they often postpone longer journeys due to budgeting concerns and a lingering reluctance to stray far from loved ones.
  culinary: A seasoned home‑cook, Donna Browning prepares authentic gumbo and jambalaya using Andouille sausage, okra, and home‑grown tomatoes, favors spicing dishes with cayenne and dried thyme, and delights
    in sharing their creations at church potlucks, though they sometimes over‑salt in a burst of enthusiasm.
  core: Donna Browning is a steadfast, routine‑loving bus driver turned mentor who balances meticulous organization with occasional anxiety‑driven quirks, savoring garden‑fresh Cajun cuisine, community
    sports, and quiet creative pursuits.
background:
  cultural: Donna was raised in New Iberia, Louisiana, a region where Cajun and Creole traditions intermingle with Southern American values. Although she identifies as white, her upbringing was steeped
    in the French‑Acadian heritage of Vermilion Parish, Catholic parish life, and the hospitality of a close‑knit community. Family gatherings centered on home‑cooked meals, church festivals, and local
    celebrations like Mardi Gras. This cultural mix reinforced her appreciation for practicality, routine, and strong community ties, which echo the traditional, reliable, and methodical outlook she carries
    today.
attributes:
  skills: '[''Safe, defensive driving'', ''Precise route planning'', ''Vehicle inspections and minor maintenance'', ''Child‑safety protocols'', ''CPR and first‑aid certification'', ''Emergency response'',
