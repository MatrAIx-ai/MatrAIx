    ''Safety compliance and documentation'', ''NATE certification preparation'', ''Basic carpentry and sheet‑metal work'']'
  hobbies: '[''Adult soccer league'', ''Desert hiking'', ''Off‑road mountain biking'', ''Classic car restoration'', ''Barbecue grilling and social gatherings'', ''Live classic‑rock concerts'', ''Community
    volunteer clean‑ups'', ''Arduino/Raspberry Pi smart‑home projects'', ''Attending HVAC trade shows and workshops'']'
  career_goals: Don aims to become a Master HVAC Technician by earning advanced NATE and EPA certifications and to take on a supervisory role as a service manager within the next five years. He is driven
    to lead a high‑performing team, streamline field operations, and introduce green‑technology solutions such as solar‑powered HVAC systems for desert homes. Ultimately, he envisions launching his own
    boutique HVAC contracting business focused on energy‑efficient installations and mentorship of new tradespeople, leveraging his competitive edge to build a reputable brand in the high‑desert region.
