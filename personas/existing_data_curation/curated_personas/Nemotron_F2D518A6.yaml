personas:
  professional: Don Roush, a seasoned HVAC&R mechanic with EPA Tier II certification, excels at designing ductwork, diagnosing complex system failures, and mentoring apprentices, applying their methodical
    planning and competitive drive to streamline projects and push for green‑technology adoption.
  sports: Don Roush dominates the local adult soccer league as a midfield captain for the Mojave Desert Mavericks, follows the Los Angeles Rams and Lakers religiously, and they complement team play with
    solo weekend mountain‑bike expeditions in the Mojave and seasonal trail runs with the Desert Trail Club, always tracking mileage with a Garmin watch.
  arts: Don Roush fuels his love for classic‑rock by attending live shows featuring the Rolling Stones, Led Zeppelin tribute bands, and local garage‑rock nights, and they also curate a vinyl collection
    and occasionally tinker with Arduino‑driven LED light displays synced to the music at his home gatherings.
  travel: Don Roush prefers road‑trip adventures that blend desert scenery with cultural stops, having recently driven to Sedona, Arizona for red‑rock hikes, trekked the Grand Canyon’s South Rim, and planning
    a future trip to Iceland to explore geothermal energy sites, while they budget travel expenses through a dedicated travel fund.
  culinary: Don Roush boasts a backyard grilling mastery that shines on smoked baby‑back ribs glazed with a chipotle‑honey sauce, grilled corn slathered in lime‑butter, and perfectly seared steaks seasoned
    with rosemary and cracked black pepper, while they experiment with DIY rubs using smoked paprika, cumin, and brown sugar.
  core: Don Roush is a methodical, competitive HVAC expert who channels their curiosity into hands‑on tech projects, stays active through soccer and biking, and constantly refines their grill skills while
    eyeing a future boutique business.
background:
  cultural: Don grew up in the high‑desert region of Southern California in a working‑class family that prized practical skills, self‑reliance, and community involvement. His cultural influences blend the
    traditional American work ethic with the laid‑back, outdoor‑oriented lifestyle of the Mojave. He values independence, hard work, and teamwork, while also embracing regional traditions such as Independence
    Day fireworks, Thanksgiving gatherings, and the local BBQ culture. This mix of blue‑collar heritage and desert lifestyle shapes his outlook and social connections.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration system maintenance'', ''Electrical wiring for HVAC'', ''Diagnostic tool usage'', ''Duct design and airflow calculation'', ''EPA Tier II refrigerant
