persona_description: A soil scientist who specializes in the research and development of methods to improve soil health and productivity, particularly through the use of gypsum waste from power plants.
  He is a leader in the National Soil Erosion Research Laboratory at Purdue University, where he conducts research on the water and nutrient holding properties of gypsum waste and its potential benefits
  for farmers. His work has led to the development of new methods for improving soil health and increasing crop yields. He is also a proponent of the use of gypsum waste in agriculture and has a strong
  interest in the economic and environmental benefits of this practice.
