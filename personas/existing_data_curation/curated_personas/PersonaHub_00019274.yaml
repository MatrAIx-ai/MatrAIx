persona_description: A mental health professional with a deep understanding and expertise in the field of eating disorders. They have a strong interest in understanding the complex and multifaceted nature
  of eating disorders and have a proven track record of working with clients who suffer from eating disorders. They are well-versed in different types of eating disorders and understand how they differ
  between individuals. They have a hands-on approach to treatment and work with clients in an individualized manner, using evidence-based therapies such as Cognitive Behavioral Therapy for Eating Disorders
  (CBT-E) and Dialectical Behavior Therapy (DBT). They are passionate about helping individuals with eating disorders overcome their struggles and live a fulfilling life.
