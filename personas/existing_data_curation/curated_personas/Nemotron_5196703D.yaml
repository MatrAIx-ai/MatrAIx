personas:
  professional: Sammy Sibley, a 31‑year‑old self‑taught illustrator and woodworker, blends hand‑drawn and digital art with practical carpentry to craft bespoke prints and furniture, leveraging a disciplined
    work ethic and an imaginative mindset to build a fledgling freelance business while balancing community obligations.
  sports: Sammy Sibley, a fan of the Arkansas Razorbacks football team and an occasional member of the Little Rock youth softball league, spends Saturday mornings fishing at Lake Ouachita and joins a local
    hiking club that meets for sunrise treks, using these low‑impact activities to stay fit without the pressure of competitive sports.
  arts: Sammy Sibley, who sketches landscapes inspired by J.M.W. Turner and creates ambient guitar arrangements echoing Nick Drake, regularly showcases digital illustrations on Instagram, volunteers at
    community poetry nights, and draws creative fuel from folk legends like Bob Dylan and the storytelling of Neil Gaiman.
  travel: Sammy Sibley, whose wanderlust balances budget constraints with a love for sunrise photography, has road‑tripped to the Great Smoky Mountains, spent a weekend in Austin for live music, and longs
    to visit the lavender fields of Provence while keeping a detailed itinerary in a battered notebook.
  culinary: Sammy Sibley, a modest cook who favors home‑grown heirloom tomatoes, expertly prepares chicken‑fried steak with spiced buttermilk gravy and bakes apple‑cinnamon crumble, yet admits to over‑indulging
    in late‑night soda while fiddling with a vintage cake‑mixing stand.
  core: Sammy Sibley is a solitary creative soul who channels lingering anxiety into intricate art and woodworking, juggling everyday responsibilities with a stubborn habit of staying up late sketching
    under the glow of a sunrise.
background:
  cultural: 'Sammy grew up in a small, predominantly white, working‑class community in Johnson County, Arkansas. His family background reflects typical Southern values: an emphasis on self‑reliance, close
    family ties, church involvement, and community solidarity. The local culture—high school football, county fairs, church potlucks, and a love for country and folk music—has shaped his worldview. While
    he embraces these roots, his curiosity drives him toward broader artistic and intellectual influences, pulling him between the comfort of his hometown and a desire to explore beyond its borders.'
attributes:
  skills: '[''Hand drawing'', ''Digital illustration (Procreate, Photoshop)'', ''Basic graphic design'', ''Acoustic guitar playing'', ''DIY woodworking'', ''Home repair'', ''Creative writing (short stories,
