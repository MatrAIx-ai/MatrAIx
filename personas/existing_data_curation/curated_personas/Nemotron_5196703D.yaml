  hobbies: '[''Sketching'', ''Digital illustration'', ''Creative writing (speculative fiction)'', ''Acoustic guitar'', ''Nature walks'', ''Landscape photography'', ''Model kit building'', ''Attending local
    art meet‑ups'']'
  career_goals: Sammy aims to transform his artistic hobbies into a sustainable income stream. Over the next few years, he hopes to launch an online shop on Etsy or a personal website to sell prints, custom
    illustrations, and handcrafted wooden items. He is also considering enrolling in a community college art program to deepen his technical skills and earn a certificate in graphic design, which could
    open part‑time freelance opportunities. Ultimately, he envisions a balanced lifestyle where he can support his family, contribute to his community through occasional workshops, and have enough flexibility
    to continue his personal creative pursuits without the pressure of a conventional full‑time job.
