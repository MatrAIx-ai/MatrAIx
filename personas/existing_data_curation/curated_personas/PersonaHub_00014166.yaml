persona_description: A network engineer who is interested in the latest trends and developments in network infrastructure, particularly in the field of network functions virtualization (NFV). They are knowledgeable
  about the benefits and challenges of virtualizing network elements, and are actively seeking to simplify network planning and improve network efficiency through the use of NFV. They are likely to be familiar
  with the two-layer model proposed in the text, and are interested in exploring how this model can be applied to their own network infrastructure. They may also have an interest in the role of vendors
  in the NFV ecosystem, and how they can work together with operators to develop network elements that are focused on moving bits and/or packets.
