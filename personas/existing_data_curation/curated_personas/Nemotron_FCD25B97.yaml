  career_goals: In retirement, Carlos aims to give back to his community by volunteering as a maintenance advisor at the local senior center, mentoring teenagers interested in trades, and preserving his
    family’s culinary heritage through a small cookbook project. He also hopes to travel back to Colombia to reconnect with relatives and, if opportunity permits, offer occasional handyman services to neighbors,
    keeping his skills sharp while supporting his modest income.
