personas:
  professional: Carlos Pou, a retired handyman and community mentor, leverages their bilingual fluency, carpentry expertise, and calm, pragmatic approach, and they provide maintenance advice at the local
    senior center while tutoring teenagers in DIY projects, occasionally translating for neighbors and overseeing small home‑repair tasks.
  sports: Carlos Pou enjoys walking their Labrador along the trails of Gwinnett County Parks, follows the Atlanta Braves and Atlanta Falcons for seasonal baseball and football excitement, and they participate
    in a senior tennis league at the local community center, balancing light exercise with a love for birdwatching.
  arts: Carlos Pou finds solace in playing classic vallenato recordings by Carlos Vives and Jorge Celedón, attends local salsa nights where they admire performances by Mariachi Estrella del Sur, and they
    regularly read poetry by Pablo Neruda, blending music and literature into their quiet evenings.
  travel: Carlos Pou prefers low‑key, well‑planned trips such as a weekend visit to Savannah’s historic squares or a leisurely cruise to the Caribbean islands, and they dream of a nostalgic return to the
    Andean highlands of their youth to reconnect with family and the hometown market where they first learned to bake empanadas.
  culinary: Carlos Pou expertly prepares arepas with cornmeal, cheese, and shredded chicken, simmers a hearty sancocho featuring plantains, yucca, and pork, and rolls golden empanadas stuffed with seasoned
    beef, potatoes, and olives, and they always pair meals with freshly brewed coffee and a touch of guava jam.
  core: Carlos Pou is a garden‑obsessed, bilingual retiree who calmly mentors teens in DIY projects, rarely misses a morning walk, yet they have an endearing habit of humming folk tunes while fixing leaky
    faucets.
background:
  cultural: Carlos is a first-generation Colombian immigrant who arrived in the United States in the early 1980s. He carries forward the warmth of Colombian family life, the Catholic faith, and the love
    of music and dance that define his heritage. Living in Lawrenceville, Georgia, he participates in local Latin cultural events, celebrates Colombian holidays such as Día de la Independencia and Semana
    Santa, and often serves as a cultural bridge, translating for Spanish‑speaking neighbors and teaching younger generations about Colombian customs, cuisine, and values. His identity blends Colombian
    traditions with the Southern hospitality of his adopted community.
