personas:
  professional: Eleazar Nieves, a budding teen technophile, merges a love for strategy video games, LEGO Technic engineering, and after‑school coding club projects into an emerging skill set in robotics
    and game design, where they casually lead small project groups and balance curiosity with a pragmatic, hands‑on approach.
  sports: Eleazar Nieves, a member of the local youth soccer club the Midtown Strikers, drifts between enthusiastic weekend matches and missed practices due to a relaxed schedule, while they proudly root
    for the nearby professional baseball team and enjoy virtual soccer tournaments on their console.
  arts: Eleazar Nieves channels creative energy into sketching comic strips inspired by the storytelling of Neil Gaiman and the visual style of Alex Ross, while their evenings are filled with practicing
    basic guitar chords to the backdrop of traditional folk tunes and contemporary Latin pop artists such as J Balvin and Carlos Vives.
  travel: Eleazar Nieves, who prefers low‑key adventures, has explored the natural wonders of the Grand Canyon on a school trip and dreams of visiting Tokyo for its anime culture and tech museums, often
    planning trips spontaneously with a few close friends while juggling school responsibilities.
  culinary: Eleazar Nieves, a beginner cook, loves whipping up simple tacos al pastor with fresh cilantro and lime, experimenting with homemade guacamole, yet their disorganized kitchen habits sometimes
    leave ingredients forgotten on the counter, turning meals into quick, improvised bites.
  core: Eleazar Nieves is a curious yet disorganized 13‑year‑old who transforms anxiety into inventive LEGO builds and comic sketches, while juggling a love of strategy games, sporadic savings, and a habit
    of procrastinating on obligations.
background:
  cultural: Eleazar is a second‑generation Mexican‑American raised in Fort Worth, Texas. He grows up speaking both Spanish and English, and his family celebrates Mexican traditions such as Día de los Muertos,
    Cinco de Mayo, and festive meals centered around tacos, tamales, and mole. He attends a local Catholic parish where community events blend Mexican customs with Texan hospitality. The vibrant Mexican
    community in Tarrant County provides him with cultural touchstones, while his daily life is shaped by the broader Texas environment, from school sports to regional music scenes. This dual cultural identity
    informs his bilingual abilities, his love for Mexican cuisine, and his desire to give back to both communities.
attributes:
  skills: '[''Basic coding (Scratch, introductory Python)'', ''DIY electronics and Arduino projects'', ''Bilingual communication (Spanish & English)'', ''Creative writing and storytelling'', ''Problem solving
    and scientific inquiry'', ''Graphic design basics using digital tools'']'
  hobbies: '[''Video gaming (strategy and puzzle games)'', ''LEGO Technic building and custom projects'', ''Sketching and comic art'', ''Reading sci‑fi and fantasy literature'', ''Playing guitar and exploring
    Latin music'', ''Robotics and coding club activities'']'
  career_goals: Eleazar aims to turn his curiosity into a future in technology. In the short term, he wants to excel in his high‑school STEM classes, build a portfolio of coding projects, and earn a spot
    on his school's robotics team. He hopes to secure a scholarship to a university with a strong computer‑engineering program, where he can pursue a degree in software engineering. Long‑term, he dreams
    of developing educational apps that make learning accessible to underserved communities, especially Spanish‑speaking youth. He also seeks financial stability for his family, so he favours career paths
    that combine creativity with solid job prospects. Aware of his tendency to worry, he plans to develop better time‑management habits to handle the pressures of higher education.
