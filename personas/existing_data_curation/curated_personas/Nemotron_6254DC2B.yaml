personas:
  professional: A self‑taught DIY content creator and budding e‑commerce entrepreneur, Kaitlyn Campos leverages their practical problem‑solving, digital media editing, and budget‑optimizing skills to produce
    tutorial videos and craft items while navigating a flexibility‑driven, deadline‑averse workflow that suits their spontaneous, competitive nature.
  sports: Kaitlyn Campos stays active through weekend hikes with the local Trail‑Blazers club, occasional pickleball matches at the community center, and avidly follows the regional baseball team—the River
    City Roosters—while favoring low‑impact cardio that aligns with their garden‑centric lifestyle.
  arts: Kaitlyn Campos blends their love of photography with an admiration for Ansel Adams' black‑and‑white landscapes, captures rustic farm scenes for a personal Instagram feed, and finds inspiration in
    the upcycling designs of DIY influencer Lauren Li, while devouring mystery novels by Tana French and nonfiction works by Mary Roach.
  travel: Kaitlyn Campos prefers low‑key, nature‑focused trips, having road‑tripped through the Oregon Coast to harvest seaweed for the garden, planning future visits to the lavender fields of Provence,
    and meticulously budgeting each journey using spreadsheet templates that mirror their DIY precision.
  culinary: Kaitlyn Campos experiments with garden‑fresh dishes like zucchini ricotta gnocchi, heirloom tomato gazpacho, and herb‑infused focaccia, mastering the art of seasonal cooking while accepting
    that their occasional over‑salting of soups reveals a competitive urge to perfect every flavor.
  core: Kaitlyn Campos is a curiosity‑driven, solitary problem‑solver who balances DIY creativity with frugal practicality, yet occasionally lets a competitive streak spark impulsive splurges and meticulous
    schedule avoidance.
background:
  cultural: Kaitlyn grew up in Paradise, Lancaster County, a region steeped in Pennsylvania Dutch heritage and rural American values of practicality, self‑reliance, and community cooperation. Though she
    identifies as white, her family background includes generations of small‑farm living, which cultivated a respect for hard work, frugality, and seasonal rhythms. The close‑knit nature of her hometown
    fostered a modest, reserved disposition, while local community events provided occasional opportunities for small‑group interactions. Her marriage reflects a partnership model common in the area, where
    she manages household operations and supports her spouse’s career, allowing her to pursue her own interests and personal growth.
attributes:
  skills: '[''DIY home repairs'', ''Furniture assembly'', ''Basic electrical troubleshooting'', ''Organic gardening'', ''Household budgeting'', ''Digital photo and video editing'', ''Critical analysis of
