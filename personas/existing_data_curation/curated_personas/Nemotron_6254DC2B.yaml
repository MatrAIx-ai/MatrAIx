  hobbies: '[''Puzzle solving (Sudoku, crosswords)'', ''Reading mystery & non‑fiction'', ''Experimental cooking with garden produce'', ''Organic gardening and foraging'', ''Landscape photography'', ''Small‑group
    craft circle (woodworking, upcycling)'']'
  career_goals: Kaitlyn aims to formalize her informal learning by obtaining a GED within the next year, which will open pathways for independent work. She plans to launch a small online store on platforms
    like Etsy, selling handcrafted home décor and garden accessories that reflect her practical aesthetic. Concurrently, she wants to develop a niche blog and YouTube channel focused on sustainable living,
    DIY projects, and budget‑friendly home improvements. Her long‑term ambition is to achieve financial self‑sufficiency while preserving the flexibility to work on her own schedule and maintain a low‑stress
    lifestyle.
