personas:
  professional: Diana Vera is a bilingual professor of Latin American visual culture who leverages their curiosity for abstract concepts and strong organizational skills to design interdisciplinary curricula
    that blend digital media, environmental humanities, and contemporary art, while funneling their imaginative flair into grant proposals and community‑center collaborations that bridge campus and local
    cultural institutions.
  sports: Diana Vera enjoys weekend paddle‑boarding at Fort Lauderdale’s coastal preserves, follows the Miami Heat and Tampa Bay Buccaneers with spirited loyalty, and participates in a local yoga‑and‑fitness
    club where they practice Vinyasa flow to stay flexible for long hours of lecturing.
  arts: Diana Vera immerses themselves in abstract painting and experimental poetry, drawing inspiration from artists like Julie Mehretu and poets such as Octavio Paz, while regularly attending gallery
    openings featuring emerging Latinx creators and performing at tango nights where the music of Astor Piazzolla fuels their creative process.
  travel: Diana Vera blends meticulous planning with spontaneous wanderlust, favoring trips that let them explore the literary cafés of the tango capital, the street art of Valparaíso, the historic sites
    of Granada, and the natural reefs of the Florida Keys, always budgeting travel costs through their research grant surplus.
  culinary: Diana Vera is an avid home chef who skillfully grills asado using wood‑smoked techniques, rolls hand‑made empanadas stuffed with spiced beef and chimichurri, and experiments with dulce de leche‑drizzled
    desserts, while their cooking skill level hovers between confident grillmaster and enthusiastic amateur.
  core: Diana Vera is a creatively driven academic who balances meticulous grant‑writing with impulsive art‑supply splurges, navigates hypertension through yoga, and channels their love of tango into both
    the classroom and the kitchen.
background:
  cultural: Born to Argentine parents, Diana grew up immersed in the rhythms of tango, the flavors of Argentine cuisine, and the rich literary traditions of Borges and Cortázar. Her bilingual upbringing
    fosters a keen sensitivity to the nuances of language and cultural identity, which she weaves into her teaching and creative work. Living in South Florida, she actively participates in the local Argentine
    community, celebrating national holidays, organizing cultural workshops, and serving as a cultural bridge that introduces U.S. students to Latin American perspectives. This blend of heritage and diaspora
    experience informs her worldview, emphasizing resilience, adaptability, and a deep appreciation for artistic expression across borders.
