  career_goals: Diana aims to secure a tenured professorship while establishing an interdisciplinary program that connects digital media, environmental humanities, and Latin American art. She plans to obtain
    a major research grant to investigate visual storytelling among immigrant communities, publish a monograph on contemporary Argentine artists in the diaspora, and become a department chair or program
    director to shape institutional policies that prioritize creative pedagogy. She also aspires to mentor junior faculty, expand community‑college collaborations with local galleries and cultural centers,
    and create a signature annual symposium that highlights innovative artistic practices across cultures.
