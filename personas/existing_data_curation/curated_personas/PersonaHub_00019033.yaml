persona_description: A coastal development and nonpoint source pollution researcher who is interested in understanding the impact of land uses and coastal water resource management on water quantity and
  quality. They are conducting research in the South Carolina lower coastal plain areas with shallow water tables, evaluating the efficacy of water resource management practices (BMPs) and establishing
  a comprehensive water quantity and quality monitoring program. They are collaborating with existing outreach programs to ensure that knowledge learned in their research is translated to the general public
  who have questions regarding coastal development, nonpoint source pollution, stormwater management practice selection and performance, and sustainable land use and development strategies.
