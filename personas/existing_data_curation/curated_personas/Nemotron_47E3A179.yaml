  career_goals: Mark aspires to graduate high school with a strong academic record or obtain a GED, then enroll in a community college program focused on information technology or health sciences. He is
    especially interested in a career as an IT support specialist or a medical technician, where he can combine his technical problem‑solving abilities with his natural compassion for helping others. In
    the meantime, he plans to continue volunteering at local after‑school programs and community centers, gaining experience in youth mentorship and digital‑literacy tutoring. Long‑term, he hopes to earn
    certifications such as CompTIA A+ and eventually work in a role that allows him to improve the technology access and health resources of his neighborhood.
