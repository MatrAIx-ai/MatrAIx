  hobbies: '[''Gardening (vegetables and flowers)'', ''Cooking Mexican and fusion dishes'', ''Knitting and crocheting'', ''Reading historical novels and biographies'', ''Walking on nature trails'', ''Participating
    in a small book club'', ''Volunteering at church and community center events'', ''Attending cultural festivals with family'', ''Doing puzzles (crossword, Sudoku)'']'
  career_goals: At this stage, Maria aims to solidify her role as a senior office manager, leveraging her experience to improve workflow efficiency and digital filing systems across the organization. She
    plans to obtain the Certified Administrative Professional (CAP) credential through an online course to formalize her expertise. Additionally, she hopes to transition gradually to a part‑time mentorship
    role where she can coach junior administrative assistants, while maintaining a balanced schedule that supports her health and reduces stress. Maria also aspires to give back to her community by offering
    volunteer administrative support to local nonprofit groups.
