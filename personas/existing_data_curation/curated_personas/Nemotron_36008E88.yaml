personas:
  professional: Michelle Duron, an 11‑year‑old student‑leader who thrives on routine and teamwork, coordinates school events like talent shows and potlucks with practical planning; they keep classmates
    motivated and maintain a harmonious vibe with a relaxed, flexible attitude.
  sports: Michelle Duron, an 11‑year‑old forward for Elmira Middle School’s soccer team and a weekend player with the Chemung Valley Soccer Club, channels their energetic, sociable nature into teamwork
    on the field, they cheer for the Buffalo Bills during football season, and they look up to Megan Rapinoe as a role model for collaboration and skill.
  arts: Michelle Duron, an 11‑year‑old choir singer who loves crafting friendship bracelets and baking cupcakes, immerses themselves in songs by Ariana Grande and Disney’s ‘Let It Go’, they draw inspiration
    from the bright colors of BTS’s album art for their bracelets, and they often bake chocolate‑chip cookies while humming the ‘Frozen’ soundtrack.
  travel: Michelle Duron, an 11‑year‑old adventure lover who enjoys weekend hikes along the Chemung River trail and family road trips to Niagara Falls and the Finger Lakes, they plan outings with a mix
    of familiar routes and new destinations, and they dream of someday visiting Disney World for a magical blend of fantasy and food.
  culinary: Michelle Duron, an 11‑year‑old budding baker who delights in making chocolate‑chip cookies, banana bread, and homemade pizza dough topped with fresh strawberries, they love experimenting with
    rainbow sprinkles and occasionally forget to clean the kitchen until reminded by their mom.
  core: Michelle Duron blends a love for routine soccer games, choir harmony, and community crafts with a friendly, compassionate streak that sometimes leads them to impulsive spending and occasional forgetfulness
    about chores, and they always try to make up for it with a bright smile.
background:
  cultural: Michelle comes from a white, middle‑class family in Waverly, a small rural town in Tioga County, New York. The community values traditional American customs, with strong emphasis on family gatherings,
    church participation, and local events such as the county fair, harvest festivals, and community potlucks. Growing up, she experiences the changing seasons through outdoor activities, school field trips
    to farms, and community service projects that reinforce cooperation and practical skills. Her cultural environment blends a respect for routine, a love of the outdoors, and a supportive, close‑knit
    small‑town atmosphere.
