  career_goals: Michelle dreams of a career that lets her help people and keep communities harmonious. She imagines becoming a teacher or a pediatric nurse, where she can combine her love for routine, compassion,
    and working with kids. She also thinks about roles like a community youth counselor or a volunteer coordinator for local animal shelters, as these would let her use her organizational talents and caring
    nature to make a difference. Long‑term, she hopes to create a supportive environment for children and families in her hometown or a similar close‑knit community.
