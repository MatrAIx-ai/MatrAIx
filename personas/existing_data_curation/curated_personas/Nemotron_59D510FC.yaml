  hobbies: '[''Intramural volleyball'', ''Group fitness classes'', ''Hiking in the Finger Lakes'', ''Community theater participation'', ''Book club hosting'', ''Seasonal cooking'', ''Travel planning'',
    ''Volunteering at local art festivals'']'
  career_goals: Stacy aims to move from first‑line supervisor to plant manager within the next five years. She plans to earn a Lean Six Sigma Black Belt certification and pursue an MBA focused on operations
    management. Her long‑term ambition is to oversee a multi‑site manufacturing network, champion sustainable production practices, and foster a culture of continuous learning. She also hopes to leverage
    her humanities background by developing employee engagement and communication programs that strengthen workplace community.
