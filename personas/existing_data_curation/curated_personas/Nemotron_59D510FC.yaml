personas:
  professional: Stacy Mabel, a 27‑year‑old manufacturing supervisor in the Greater Syracuse area, blends meticulous shift‑scheduling, Lean Six Sigma fundamentals, and a theater‑inspired collaborative flair
    to keep production lines humming while fostering a team culture that values punctuality, safety, and continuous learning.
  sports: Stacy Mabel fuels their active lifestyle through intramural volleyball at the local community center, high‑intensity interval training classes at a downtown gym, and avidly cheering on the Buffalo
    Bills and Syracuse Crunch, while also belonging to the Onondaga Spike volleyball club for weekly friendly competition.
  arts: Stacy Mabel channels their creative energy by volunteering backstage for Syracuse Stage productions, attending the Syracuse International Film Festival, and leading a book club that dives into contemporary
    works by Chimamanda Ngozi Adichie and Colson Whitehead, all while curating a playlist of indie folk artists like The Lumineers for inspiration.
  travel: Stacy Mabel meticulously crafts weekend itineraries that alternate between Finger Lakes wine tours, Adirondack High Peaks hikes, and short cross‑border trips to Toronto for theater festivals,
    while keeping a long‑term dream of backpacking through the Scottish Highlands on their color‑coded travel planner.
  culinary: Stacy Mabel delights in seasonal farm‑to‑table cooking, often preparing pan‑seared lake trout with fresh asparagus and rosemary‑infused lemon butter, followed by a warm apple crumble made with
    locally sourced Honeycrisp apples and a pinch of cinnamon, and they never miss the chance to experiment with heirloom tomatoes in a summer gazpacho.
  core: Stacy Mabel, a planner‑obsessed 27‑year‑old operations leader, balances rigorous efficiency at work with a love for community theater, weekend hikes, over‑caffeinated late‑night book club debates,
    and a habit of secretly binge‑watching classic sitcom reruns after everyone else has gone to bed, and they often find themselves juggling multiple calendars at once.
background:
  cultural: Stacy grew up in a middle‑class suburban family in the Greater Syracuse area. Her parents are descendants of Anglo‑American and Irish immigrants who settled in upstate New York in the early
    20th century. Raised in a Protestant (United Church of Christ) household, she attended public schools where she was introduced to a diverse mix of cultural traditions typical of the Northeastern United
    States. The region’s emphasis on community involvement, self‑reliance, and appreciation for the arts—highlighted by Syracuse’s vibrant music and theater scene—has shaped her worldview. She values punctuality,
    hard work, and collaborative spirit, reflecting the cultural ethos of her New York upbringing while also embracing the progressive, inclusive attitudes of her generation.
