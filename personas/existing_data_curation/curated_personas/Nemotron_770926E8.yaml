personas:
  professional: Joshua Arnett, a case manager and crisis‑intervention specialist in a busy community health clinic, blends his vivid imagination and strong interpersonal skills to design arts‑based workshops
    that empower underserved clients, while they juggle a relaxed, sometimes chaotic schedule that relies on last‑minute inspiration rather than rigid planning.
  sports: Joshua Arnett, an avid hiker of the White Mountains, joins a local weekend soccer league, follows the Boston Red Sox and New England Patriots religiously, and swaps seasons between trail running
    in spring and snowshoeing in winter, yet they sometimes skip scheduled gym sessions in favor of spontaneous jam nights.
  arts: Joshua Arnett paints abstract canvases inspired by Mark Rothko, creates digital illustrations in the style of Bee Lee for community health campaigns, strums acoustic guitar at improv theater gatherings
    while humming Sufjan Stevens, devours speculative fiction by Neal Stephenson and philosophy by Slavoj Žižek, and they weave these influences into a vibrant personal aesthetic.
  travel: Joshua Arnett prefers low‑key, immersion‑focused trips, having backpacked through the White Mountains, explored Portland’s food trucks, taken a weekend to Reykjavik’s music scene, and they now
    dream of wandering Kyoto’s temples and trekking Patagonia’s glaciers, always booking flights last minute to keep the itinerary fluid.
  culinary: Joshua Arnett, a self‑taught home chef, loves experimenting with global dishes like Korean bibimbap, Ethiopian injera with berbere sauce, and Japanese ramen, frequently using matcha, harissa,
    and tahini to add unexpected twists, and they revel in cooking class challenges that push their culinary confidence beyond the familiar.
  core: Joshua Arnett is a creatively driven, socially engaged case manager who balances spontaneous artistic pursuits with a slightly disorganized but heartfelt approach to life, and they often juggle
    anxiety with mindfulness and occasional impulsive spending.
background:
  cultural: Joshua comes from a white New England family with roots in the industrial towns of Essex County. Growing up in Peabody, he was immersed in a community that values civic engagement, hard work,
    and mutual support. The region’s mix of long‑standing Irish, Italian, and Portuguese heritage, combined with a growing Latino and Asian presence, shaped his appreciation for cultural diversity and informed
    his commitment to inclusive social work. He identifies with New England traditions—supporting local sports teams, celebrating seasonal festivals, and valuing education—while also embracing the progressive,
    arts‑focused spirit of the Greater Boston area.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Community Outreach'', ''Group Facilitation'', ''Arts-Based Therapy'', ''Client Advocacy'', ''Resource Navigation'', ''Mental Health Counseling'',
