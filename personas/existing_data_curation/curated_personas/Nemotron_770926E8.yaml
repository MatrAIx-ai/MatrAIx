  hobbies: '[''abstract painting'', ''digital illustration'', ''acoustic guitar'', ''improvisational theater'', ''reading speculative fiction'', ''hiking'', ''community volunteering'', ''live music attendance'',
    ''urban photography'', ''cooking classes'', ''mindfulness meditation'']'
  career_goals: Joshua aims to complete a Master of Social Work and become a Licensed Clinical Social Worker within the next three years, focusing on mental‑health services for underserved communities in
    Essex County. He aspires to design and lead an integrated arts‑therapy program that blends visual art, music, and storytelling into clinical practice. Long‑term, he hopes to advance to a program director
    role, shape regional health policy to address social determinants of health, and eventually launch a nonprofit that provides creative therapeutic opportunities for at‑risk youth while maintaining a
    balanced, self‑care‑oriented lifestyle.
