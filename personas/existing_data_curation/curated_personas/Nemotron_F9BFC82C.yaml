  hobbies: '[''gardening'', ''quilting'', ''crocheting'', ''visiting museums'', ''genealogy research'', ''community theater'', ''reading historical fiction'', ''listening to folk and gospel music'', ''baking'']'
  career_goals: Although Emily is retired from formal employment, she remains driven to contribute meaningfully to her community. Her primary ambition is to expand the senior art club at the local community
    center, fostering an environment where older adults can explore painting, crafts, and storytelling. She hopes to document the oral histories of long-time Floyd County residents, creating a small archive
    that can be shared with the county historical society. Emily also aspires to mentor her grandchildren in cooking and gardening, passing on practical skills while encouraging curiosity about nature and
    tradition. In the next few years, she wishes to learn digital photography to better capture her garden and family moments, with the goal of publishing a modest photo-essay book of local landscapes and
    community life.
