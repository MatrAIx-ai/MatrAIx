personas:
  professional: Emily Harris, a retired municipal clerk turned community arts facilitator, channels their meticulous planning and curiosity into expanding a senior art club and preserving local oral histories
    at the Floyd County historical society.
  sports: Emily Harris enjoys low-impact walking with the local senior walking club, occasionally attends Atlanta Braves baseball games and Atlanta Falcons football matches, and participates in the annual
    county fair's 5K fun run, and they prefer gentle exercise over strenuous sports.
  arts: Emily Harris finds inspiration in the folk harmonies of The Carter Family, the gospel power of Mahalia Jackson, and the bright landscapes of Georgia O'Keeffe, while they volunteer in senior theater
    productions of Tennessee Williams' plays and craft quilts that echo William Morris's intricate patterns.
  travel: Emily Harris prefers well-planned, leisurely road trips to historic Southern towns such as Savannah, Charleston, and the Blue Ridge Mountains, dreams of a photography pilgrimage to the Texas Hill
    Country and a summer visit to Beaufort, SC, and they budget travel around a modest fixed retirement income.
  culinary: Emily Harris excels at preparing classic Southern dishes like fried chicken, collard greens simmered with smoked turkey, buttery cornbread, and low-sugar peach cobbler made with heirloom peaches,
    while they also experiment with sweet-potato gnocchi and adapt recipes for reduced sodium.
  core: Emily Harris blends Southern hospitality with a planner's precision, turning garden chatter into a curated community archive while habitually humming gospel choruses as they bake and occasionally
    forgetting to water new seedlings during busy weeks.
background:
  cultural: Emily was born and raised in a small town in northern Georgia, growing up in a close-knit white Southern family with deep Baptist roots. Her upbringing emphasized hospitality, church involvement,
    and a strong sense of community responsibility. Family gatherings often centered around shared meals featuring fried chicken, collard greens, and cornbread, and storytelling sessions that preserved
    local folklore and family history. Emily’s cultural identity is shaped by Southern traditions such as church choirs, annual county fairs, and seasonal celebrations like the harvest festival. She values
    the Southern ideals of modesty, perseverance, and respect for elders, while also embracing the evolving cultural landscape of Rome, GA, where she enjoys a blend of historic charm and contemporary community
    initiatives.
