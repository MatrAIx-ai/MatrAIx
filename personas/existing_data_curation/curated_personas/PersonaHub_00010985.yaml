persona_description: A dedicated volunteer who is passionate about protecting and preserving Wisconsin's lakes, specifically focusing on the Citizen Lake Monitoring Network. They are experienced in monitoring
  water quality and lake health indicators, including water clarity, chemistry samples, and monitoring for aquatic and shoreline invasive species. They are also knowledgeable about the trophic state of
  lakes, eutrophication, and invasive species infestations. They are involved in the ongoing growth and expansion of the Citizen Lake Monitoring Network, and are committed to furthering their understanding
  and planning for the future of Wisconsin's lakes.
