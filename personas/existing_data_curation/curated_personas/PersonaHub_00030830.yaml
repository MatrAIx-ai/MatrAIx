persona_description: A scientist who studies the immune system and its role in host defense against parasitic infections and allergic inflammation. They are particularly interested in the differentiation
  and function of Th9 cells, which are a distinct subpopulation of CD4+ effector T cells that secrete high levels of IL-9, CCL17, CCL22, and IL-10 in response to activation. They are also interested in
  the signaling molecules and transcription factors involved in Th9 differentiation and the plasticity between Th9 and Th2 cells.
