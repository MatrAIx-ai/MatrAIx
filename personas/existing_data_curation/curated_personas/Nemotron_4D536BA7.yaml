    communication and public speaking'', ''Conflict resolution and mediation'', ''Negotiation with subcontractors and suppliers'', ''Mentoring and training of junior tradespeople'']'
  hobbies: '[''Attending art gallery openings and museum tours'', ''Volunteering as a docent or guide at local museums'', ''Participating in improv comedy and local theater'', ''Leading a Toastmasters public
    speaking club'', ''Playing pickup basketball and other recreational sports'', ''Hiking on local trails in the Appalachian foothills'', ''Woodworking and DIY home improvement projects'', ''Cooking and
    experimenting with international cuisines'', ''Traveling to explore different cultures and architecture'', ''Photography with vintage film camera'', ''Listening to podcasts on construction tech, architecture,
    and design'', ''Attending community cultural festivals and live music events'']'
  career_goals: Daniel aims to rise from first-line supervisor to senior construction manager overseeing large commercial and mixed-use developments within the next five years. He plans to earn the Certified
    Construction Manager (CCM) designation and complete a master's program in construction management or business administration to broaden his strategic expertise. Ultimately, he envisions launching his
    own boutique construction firm that integrates artistic design concepts and sustainable building practices, positioning himself as a thought leader who speaks at industry conferences and writes about
    the intersection of art and construction.
