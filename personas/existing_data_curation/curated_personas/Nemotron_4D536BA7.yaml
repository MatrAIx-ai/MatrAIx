personas:
  professional: Daniel Crayton leverages their construction supervision expertise and liberal‑arts eye for design to lead mixed‑trade crews on commercial projects, using clear, engaging communication to
    motivate workers while critically questioning subcontractor proposals and continuously proposing unconventional aesthetic solutions, all while targeting a senior construction manager role, CCM certification,
    and a future boutique firm that fuses art and sustainable building.
  sports: Daniel Crayton dominates pickup basketball at the local YMCA, hikes the Appalachian foothills on weekends, follows the Atlanta Falcons, Atlanta Hawks, and Atlanta United with fervor, and they
    belong to the Metro Atlanta Pickleball Club to sharpen agility during the off‑season.
  arts: Daniel Crayton volunteers as a docent at the High Museum of Art, performs with the Atlanta Improv Collective, presides over a Toastmasters club, and they regularly cite Andy Warhol, Kehinde Wiley,
    and Georgia O’Keeffe as artistic influences that inspire their creative problem‑solving on construction sites.
  travel: Daniel Crayton favors spontaneous travel that blends cultural immersion with culinary discovery, having explored Savannah’s historic squares, New Orleans’ jazz districts, Barcelona’s modernist
    architecture, and they now dream of a solo trek through Iceland’s volcanic landscapes to capture sunrise over the aurora borealis.
  culinary: Daniel Crayton delights in cooking international dishes such as Thai green curry with lemongrass, Spanish paella with saffron and chorizo, and Ethiopian injera seasoned with berbere spice, while
    also perfecting their signature Southern barbecued ribs glazed with smoked paprika and brown sugar.
  core: Daniel Crayton is a charismatic, art‑infused construction supervisor whose competitive drive coexists with a laid‑back, sometimes disorganized lifestyle, constantly seeking new creative challenges
    amid weekend barbecues and impromptu improv sessions.
background:
  cultural: Daniel grew up in the suburban outskirts of Atlanta, Georgia, within a middle-class white family that valued Southern hospitality, community church involvement, and a strong work ethic. The
    multicultural growth of Gwinnett County during his teenage years introduced him to a mosaic of cultures, sparking his lifelong curiosity for diverse artistic expressions and global cuisines. His liberal
    arts degree deepened his appreciation for European and American art traditions, while his Southern upbringing kept him connected to regional customs such as neighborhood barbecues, high school football
    Saturdays, and outdoor recreation. This blend of Southern roots and exposure to cultural diversity shapes his open-minded yet competitive worldview.
attributes:
  skills: '[''Construction site supervision'', ''Mixed-trade crew management'', ''OSHA safety compliance and inspections'', ''Blueprint reading and construction drawing interpretation'', ''On-site cost
