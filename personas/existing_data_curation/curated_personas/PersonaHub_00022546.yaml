persona_description: A Colombian photographer and filmmaker, born in Aracataca, Colombia, who lived in Mexico from 1939 until the early 1950s. He collaborated with a variety of artists, including Manuel
  Álvarez Bravo and Gabriel Figueroa on Mexican film projects and David Alfaro Siqueiros on the mural "Cuauhtemoc against the Myth". Through his insightful and familiar closeness to Frida Kahlo, he created
  photographs that show her daily life -in her "Blue House"- as well as those photographic portraits that offer an important documentary contribution to the understanding of her painted self-portraits.
  His images and artistic legacy are conserved and promoted by the Foundation Leo Matiz as an intense and suggestive breviary of the 20th century, which Matiz was able to communicate with beauty and expressive
  force.
