  hobbies: '["Kayaking", "Hiking", "Yoga", "Meditation", "Volunteer work (Habitat for Humanity, watershed clean‑ups)", "Reading (technical journals and contemporary fiction)", "Cooking (Mediterranean cuisine)",
    "Escape rooms", "Strategy board games"]'
  career_goals: Tabitha aims to obtain her Professional Engineer (PE) license within the next two years and progress to a senior project manager role overseeing large‑scale, climate‑resilient infrastructure
    projects for the City of Madison. She plans to pursue a Master’s degree focused on sustainable urban development, lead multidisciplinary teams that integrate green infrastructure and smart‑city technologies,
    and eventually take on departmental leadership to shape policy and standards. Additionally, she hopes to mentor junior engineers, contribute to professional societies such as ASCE, and actively participate
    in community planning initiatives that promote equitable and reliable public works.
