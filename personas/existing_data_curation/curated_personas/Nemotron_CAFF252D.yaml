personas:
  professional: Tabitha Hammouda is a civil engineer specializing in structural, transportation, and water‑resources design, leveraging AutoCAD Civil 3D, Revit, GIS, and SAP2000 to deliver meticulously
    modeled climate‑resilient projects; their methodical nature and assertive communication style enable them to manage complex schedules, negotiate stakeholder demands, and guide junior staff toward sustainable
    solutions.
  sports: Tabitha Hammouda is an avid kayaker with the Madison River Canoe Club, a dedicated trail hiker who frequents the Ice Age Trail, and a weekend yoga practitioner at Insight Yoga Studio; they cheer
    for the Green Bay Packers and support the Madison Mallards baseball team, balancing a structured fitness routine with spontaneous weekend excursions.
  arts: Tabitha Hammouda immerses themselves in contemporary fiction—currently devouring Ocean Vuong’s poetry collection—and delights in indie folk concerts, regularly attending shows by Bon Iver and Sufjan
    Stevens; they are a frequent visitor of the Madison Museum of Contemporary Art and enjoy board‑game nights that blend strategic thinking with social interaction, often inspired by narrative‑driven games
    like Betrayal at House on the Hill.
  travel: Tabitha Hammouda prefers meticulously planned trips that combine outdoor adventure with cultural exploration, having recently hiked the Fiordland tracks in New Zealand and kayaked the fjords of
    Iceland, while dreaming of a sustainable‑city tour of Copenhagen and a weekend getaway to the historic streets of Florence; budget constraints from their master’s program lead them to favor off‑season
    travel deals and short‑term rentals.
  culinary: Tabitha Hammouda enjoys cooking Mediterranean‑inspired dishes at an intermediate skill level, often preparing Greek moussaka, hummus with fresh pita, grilled branzino with lemon‑olive oil, and
    tabbouleh with mint, while sourcing ingredients like Kalamata olives and feta from local farmer’s markets; they occasionally resort to quick take‑out pizza during intense project deadlines.
  core: Tabitha Hammouda blends disciplined engineering precision with a love for outdoor pursuits, strategic games, and Mediterranean cooking, navigating life through careful planning, occasional splurges,
    and a steady commitment to sustainable community impact.
background:
  cultural: Tabitha was raised in Madison, Wisconsin, within a predominantly white, middle‑class environment, while her family carries a Lebanese‑Christian heritage. This blend introduced her to Mediterranean
    culinary traditions and an emphasis on education and communal responsibility. She celebrates typical American holidays such as Thanksgiving and the Fourth of July, and also participates in family gatherings
    featuring dishes like tabbouleh and baklava. Her upbringing merges Midwestern values of practicality, reliability, and organized living with a multicultural appreciation for diverse perspectives, shaping
    a pragmatic yet inclusive worldview.
attributes:
  skills: '["Structural design", "Transportation engineering", "Stormwater management", "AutoCAD Civil 3D", "Revit", "GIS mapping", "SAP2000 analysis", "Project management", "Cost estimation", "Regulatory
