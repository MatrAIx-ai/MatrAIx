  hobbies: '[''Playing piano'', ''Chess'', ''Solving puzzles (Sudoku, crosswords)'', ''Python coding'', ''LEGO robotics'', ''Model kit construction'', ''Reading non‑fiction (engineering, history)'', ''Nature
