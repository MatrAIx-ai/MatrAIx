  career_goals: Joshua aims to pursue a career that blends his love for structure, design, and technology. He is particularly interested in civil engineering, hoping to contribute to the preservation and
    modernization of historic infrastructure in Saratoga Springs, such as the racecourse and historic downtown buildings. He also considers software development as an alternative path, envisioning himself
    creating tools that support local community services. His short‑term goal is to earn a strong academic record in high school, especially in math and science, to qualify for a reputable engineering program
    at a college such as SUNY Albany or Cornell. Long‑term, he aspires to become a lead engineer or software architect, mentor younger students through STEM outreach, and possibly acquire professional certifications
    (e.g., FE for engineering).
