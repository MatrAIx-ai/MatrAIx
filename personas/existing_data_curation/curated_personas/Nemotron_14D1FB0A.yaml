  career_goals: He aims to advance to a regional sales director role within the next three years, overseeing multiple state territories and shaping strategic growth initiatives. His ambition includes implementing
    a digital sales enablement program to streamline quoting and order processing, and championing sustainable sourcing practices that align with his concern for community well-being. Long-term, he envisions
    launching his own distribution venture that partners with local Michigan manufacturers, providing them with national market access while fostering a collaborative, low-stress work culture for his team.
