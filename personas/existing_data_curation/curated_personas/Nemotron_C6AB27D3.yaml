    training and mentorship'']'
  hobbies: '[''Basketball (pickup games)'', ''Hiking in the Angeles National Forest'', ''Cooking traditional East Asian meals'', ''Attending community festivals'', ''Volunteering at local food banks'',
    ''DIY home improvement projects'', ''Exploring warehouse automation technology'', ''Listening to a mix of K‑pop, classic rock, and contemporary pop'', ''Socializing at local cafés with friends and family'']'
  career_goals: Gang aims to move from a front‑line material mover to a supervisory role within the next three years, pursuing certifications such as OSHA Forklift Trainer and Certified Logistics Associate.
    He plans to enroll part‑time in a bachelor's program in Supply Chain Management to deepen his strategic understanding. Long‑term, he envisions managing a mid‑size distribution center, integrating automation
    tools that improve efficiency while maintaining a safe, people‑focused work environment. He also hopes to mentor younger workers, especially those from immigrant backgrounds, helping them navigate career
    pathways in logistics.
