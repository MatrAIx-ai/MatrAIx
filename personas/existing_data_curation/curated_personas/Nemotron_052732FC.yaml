  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Urban photography'', ''Cycling around Minneapolis'', ''Improvisational theater'', ''Reading (fiction, non-fiction, educational theory)'',
    ''Cooking experimental dishes'', ''Board games (strategy)'', ''Hiking and nature walks'', ''Yoga and mindfulness journaling'']'
  career_goals: Stacey aims to pursue a master’s degree in curriculum and instruction within the next two years, focusing on STEAM integration. She hopes to transition into a curriculum specialist role
    in the Minneapolis school district, where she can design and support interdisciplinary programs that embed the arts and technology across grade levels. Ultimately, she aspires to become an instructional
    coach or assistant principal, championing flexible, inquiry-driven pedagogy and influencing district-wide policy to prioritize creative learning environments. She also dreams of publishing a series
    of classroom resources and speaking at regional education conferences.
