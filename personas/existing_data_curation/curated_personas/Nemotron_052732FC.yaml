personas:
  professional: Stacey Rice is a certified elementary/middle school teacher in Minneapolis who designs interdisciplinary, project-based STEAM units that blend art, technology, and inquiry, while her relaxed,
    flexible approach to planning and naturally competitive drive often lead to spontaneous, hands-on classroom experiments and a healthy dose of skepticism toward prescribed curricula.
  sports: Stacey Rice cycles the lakefront paths, hikes Minnehaha Falls on weekends, practices yoga at a downtown studio, and fervently roots for the Minnesota Timberwolves and Vikings while occasionally
    joining a community cycling club that meets Saturday mornings.
  arts: Stacey Rice intertwines her love for Minneapolis’s Walker Art Center, the Minneapolis Institute of Art, and local improv theater nights, while sketching watercolors in parks, snapping sunrise photographs,
    and drawing creative inspiration from Yayoi Kusama, Ansel Adams, and Sufjan Stevens.
  travel: Stacey Rice favors spontaneous, budget‑friendly escapades—weekending at a North Shore cabin, attending Chicago’s improv festival, and dreaming of an immersive cultural tour of Kyoto’s temples
    and tea houses—often booking last‑minute and relying on a modest travel fund.
  culinary: Stacey Rice enjoys crafting fusion dishes like gochujang‑marinated salmon tacos, kimchi quesadillas, and miso‑infused pad thai, while keeping a pantry stocked with turmeric, jalapeños, miso
    paste, and fresh herbs, and she often experiments with new flavors after a yoga session.
  core: Stacey Rice is a creatively curious, slightly disorganized 28‑year‑old educator who balances a passion for art, tech, and competition with a relaxed, flexible lifestyle and a competitive edge in
    professional growth.
background:
  cultural: Stacey grew up in Minneapolis, Minnesota, in a family with deep Midwestern roots and likely Scandinavian‑German ancestry, a common heritage in the region. The city’s emphasis on public education,
    outdoor recreation, and a thriving, diverse arts community shaped her values of inclusivity, community involvement, and a pragmatic work ethic. She participates in local traditions such as summer lake
    activities, winter festivals, and neighborhood potlucks, which reflect the cooperative spirit of the Twin Cities while also embracing the city’s multicultural influences that inspire her progressive,
    creative outlook on teaching.
attributes:
  skills: '[''Curriculum development'', ''Project-based learning design'', ''Differentiated instruction'', ''Educational technology integration'', ''Flexible, student-centered classroom management'', ''Assessment
