persona_description: An American history professor who specializes in the study of the impact of westward expansion on the New World. The professor is particularly interested in the economic, social, and
  cultural effects of American expansion on the indigenous peoples and the impact on the country's national identity. The professor's research interests include the economic development of the American
  West, the impact of westward expansion on Native American populations, and the role of the Louisiana Purchase in the expansion of the United States. The professor is also interested in the political and
  social implications of westward expansion on the United States and its relationships with European powers.
