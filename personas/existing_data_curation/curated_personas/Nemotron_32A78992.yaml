  hobbies: '[''Watercolor painting'', ''Modern sculpture appreciation'', ''Speculative fiction reading'', ''Poetry'', ''Gallery openings'', ''Yoga'', ''Coastal gardening'', ''Travel to historic art sites'',
    ''Mediterranean cooking'', ''Hosting literary salons'']'
  career_goals: She aims to launch a community‑based interdisciplinary art project that blends visual art and storytelling, mentor emerging artists, publish a collection of essays on contemporary art trends,
    and serve on the board of a local museum to shape cultural programming.
