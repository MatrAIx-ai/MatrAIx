personas:
  professional: Marjorie Rawlings, a seasoned interdisciplinary arts programmer in Southern California, leverages their humanities background and talent for storytelling to curate community exhibitions
    that weave watercolor, sculpture, and speculative fiction, while using their talkative, collaborative nature to mentor emerging artists and galvanize board discussions.
  sports: Marjorie Rawlings, a dedicated fan of the Los Angeles Lakers and the LA Dodgers, spends summer mornings playing water aerobics at a community pool, joins a senior tennis league at the local park
    for weekly matches, and volunteers as a timekeeper for the city's annual coastal 5K, blending their love of gentle competition with community involvement.
  arts: Marjorie Rawlings, a prolific watercolorist and avid attendee of gallery openings at The Broad, draws inspiration from Georgia O'Keeffe's desert palettes, Yayoi Kusama's immersive installations,
    and Anish Kapoor's kinetic sculptures, while devouring speculative fiction by N.K. Jemisin and poetry by Ocean Vuong, weaving these influences into their curatorial essays and literary salon discussions.
  travel: Marjorie Rawlings, who plans trips around art history, has explored the frescoes of Florence's Uffizi, the vibrant zellij mosaics of Marrakech, the tranquil Zen gardens of Kyoto, and dreams of
    a future pilgrimage to the ancient murals of Mexico City's San Ildefonso, preferring slow-paced, small-group tours that allow ample time for sketching and reflection, which aligns with their desire
    for mindful travel.
  culinary: Marjorie Rawlings, a passionate home chef, crafts Mediterranean meals like oven-baked moussaka, fresh spanakopita, and herb-infused hummus, favoring ingredients such as Kalamata olives, feta
    cheese, and rosemary sourced from their native coastal garden, and often pairs their cooking sessions with a glass of Chianti while exchanging stories at their living-room literary salon.
  core: Marjorie Rawlings blends a lifelong love of the arts with a sociable, talkative spirit, turning speculative fiction and watercolor into community projects while juggling a disciplined yet quirky
    approach to finance and health, reflecting their curious and resilient nature.
background:
  cultural: Marjorie's cultural background stems from a Midwestern American upbringing in a family that prized education and the arts. Earning a BA in humanities in the late 1970s, she was shaped by a period
    of social change that broadened her appreciation for diverse artistic traditions and progressive ideas. After relocating to Southern California, she embraced the region's vibrant, multicultural art
    scene, drawing inspiration from Native Californian heritage, Pacific Rim aesthetics, and West Coast experimental culture. Her lifelong exposure to literature, theater, and visual arts, combined with
    an independent lifestyle, fosters a worldview that celebrates creativity, community engagement, and intellectual curiosity.
