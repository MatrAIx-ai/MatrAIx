  career_goals: Reginald aims to transition from a hands‑on support role to a leadership position where he can shape IT strategy and service delivery for a mid‑size organization or a public sector agency
    in the Puget Sound region. He plans to earn certifications such as ITIL Expert, PMP, and Cisco CCNA to complement his business degree, positioning himself for roles like IT Operations Manager or Technology
    Services Director. A long‑term ambition is to mentor junior staff and underrepresented youth in technology, fostering a more inclusive IT community while ensuring that his team maintains a balance of
    reliable processes and innovative problem‑solving.
