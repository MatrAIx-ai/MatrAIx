  career_goals: Richard aims to advance to a senior administrative manager role where he can lead a small team and spearhead digital transformation projects for a nonprofit arts organization or local government
    agency. He plans to earn the Certified Administrative Professional (CAP) credential to formalize his expertise. Long‑term, he hopes to mentor younger employees, develop an office‑wide creativity program
    that integrates visual arts into routine communication, and possibly launch a consulting side‑business that helps small businesses modernize their administrative processes while preserving a personal,
    artistic touch.
