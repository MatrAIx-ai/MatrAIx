personas:
  professional: Stephanie Berg, an 18‑year‑old newly certified registered nurse with a bachelor’s degree in a STEM field, combines methodical patient assessment, IV therapy, and evidence‑based care with
    a budding expertise in health informatics, leveraging Python scripts on electronic health records to drive quality‑improvement projects while maintaining calm under pressure.
  sports: Stephanie Berg enjoys solo desert hikes on the trails around Gilbert, is a member of a local trail‑running club that meets on weekends, follows the Arizona Diamondbacks for baseball and the Phoenix
    Suns for basketball, and keeps fit by integrating yoga sessions into her daily routine, though they rarely join team sports due to a preference for small‑group activities.
  arts: Stephanie Berg finds creative balance in photography, capturing Arizona sunsets with a vintage Canon AE‑1, curates a quiet corner of the home for reading works ranging from Margaret Atwood to the
    latest medical breakthroughs, and listens to folk‑indie artists like Iron & Wine and Sufjan Stevens, which fuels their reflective mood during study breaks.
  travel: Stephanie Berg prefers low‑key, purposeful travel, having charted road trips to the Grand Canyon and Sedona for sunrise hikes, planning future visits to Kyoto for meditation retreats and to Reykjavik
    to chase the Northern Lights, while budgeting trips carefully to fit within the early stage of their married life.
  culinary: Stephanie Berg cultivates a rooftop herb garden where they harvest basil, cilantro, and lavender to craft fresh pesto, herbal teas, and seasonal quinoa salads, enjoys cooking simple yet nutritious
    meals like avocado toast with rosemary‑infused olive oil, but often forgets to defrost the freezer for a weekend dinner, leading to last‑minute takeout.
  core: Stephanie Berg is an analytically curious yet pragmatic 18‑year‑old nurse who balances data‑driven health informatics with tranquil solo pursuits, organized habits, and a quietly determined drive
    toward critical‑care excellence.
background:
  cultural: Stephanie was raised in a suburban white middle‑class family in the Phoenix metropolitan area. Her upbringing emphasized education, community service, and faith‑based values, with regular involvement
    in church activities and local volunteer health fairs. Living in Gilbert, she has been exposed to Arizona’s multicultural environment, appreciating Hispanic and Native American culinary traditions and
    community celebrations, which she often incorporates into family gatherings. Her cultural identity blends Midwestern‑American family values with the collaborative spirit of the Southwest.
attributes:
  skills: '[''Clinical assessment'', ''IV therapy'', ''Medication administration'', ''Electronic health record documentation'', ''Health data analysis'', ''Point‑of‑care ultrasound'', ''Telehealth platform
    troubleshooting'', ''Evidence‑based practice'', ''Patient education'', ''Emergency response'']'
  hobbies: '[''Reading scientific literature'', ''Python data analysis'', ''Yoga and meditation'', ''Rooftop gardening'', ''Hiking desert trails'', ''Photography'', ''Small book club'']'
  career_goals: Stephanie aims to become a certified critical care nurse within the next three years, pursuing CCRN certification and a specialty in emergency medicine. She plans to integrate health informatics
    into her practice, leading quality‑improvement initiatives that use data analytics to enhance patient safety. Long‑term, she intends to earn a Master of Science in Nursing with a focus on informatics,
    positioning herself to influence healthcare technology adoption at a system level—all while maintaining a supportive partnership with her spouse and balancing her early marriage commitments.
