persona_description: A water conservation expert who is concerned about the depletion of water resources and is working towards finding sustainable and judicious ways to conserve water. They are aware of
  the importance of afforestation and environment protection to mitigate water pollution and mitigate the damage caused by floods and heavy rainfall. They are also aware of the uses of water in various
  forms and are working towards efficient use of water, regulated and proper design of various irrigation and hydel systems, rainwater harvesting, water pollution prevention, population and use controls,
  and recycling or reuse of water coming from industries and domestic settlements. They are aware of the importance of water for all forms of life, including floral and faunal species, and human beings,
  and are working towards ensuring the availability of water resources for posterity.
