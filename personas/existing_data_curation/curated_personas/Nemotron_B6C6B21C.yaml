  career_goals: Norma dreams of turning her love for technology and storytelling into a career as a digital content creator and media strategist. She envisions running her own YouTube/TikTok channel where
    she reviews gadgets, shares DIY tutorials, and breaks down trending topics with a skeptical, data‑driven edge. In the longer term she hopes to study communications or computer science at a university
    that offers a strong STEM‑media program, earn a scholarship, and eventually lead a youth‑focused media startup that empowers other teens to create responsibly. She also keeps an eye on possible roles
    in sports media or event promotion, reflecting her competitive streak.
