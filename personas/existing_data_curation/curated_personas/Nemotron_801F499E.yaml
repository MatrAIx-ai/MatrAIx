  career_goals: Georgia aims to pursue a career that blends her love for interacting with people and a stable, routine‑driven environment. She is interested in becoming a hotel front‑desk manager or a hospitality
    services coordinator in Las Vegas, where she can use her organizational skills and outgoing personality to ensure smooth operations for guests. She also considers studying to become a certified nursing
    assistant, attracted by the practical, hands‑on nature of the work and the reliable schedule it offers. In the short term, she plans to earn her high school diploma, improve her academic standing, and
    secure a part‑time position in a local resort or community center to gain experience.
