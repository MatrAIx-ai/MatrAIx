personas:
  professional: Georgia Baldwin is a high‑school junior who merges her love of routine and teamwork by serving as the lead choreographer for her school’s cheerleading squad, applying the strategic thinking
    honed in competitive video games to devise precise routines and occasionally coordinating themed movie‑night events for classmates, reflecting her practical, competitive, and organized mindset.
  sports: Georgia Baldwin stays active as a varsity cheerleader and weekly community dancer, supplements workouts with brisk hikes at Red Rock Canyon, and passionately follows the Las Vegas Golden Knights
    and Las Vegas Aces, balancing structured team practices with a personal fitness routine driven by her competitive spirit.
  arts: Georgia Baldwin fuels her creative side by choreographing cheer routines to the beats of Beyoncé and K‑pop group BTS, enjoying indie film classics like Amélie during themed movie nights, and writing
    short stories inspired by the narrative style of author John Green, weaving structured performance with personal artistic expression.
  travel: Georgia Baldwin prefers structured weekend getaways, planning family‑friendly shows at the Bellagio and day hikes at Red Rock Canyon, while dreaming of a road trip to the Grand Canyon and a spring‑break
    visit to San Diego’s beach boardwalk, balancing budget constraints with a love for organized adventure.
  culinary: Georgia Baldwin enjoys the comfort of classic pepperoni pizza and homemade nachos with jalapeño topping, can whip up a quick smoothie using frozen berries and Greek yogurt, and often treats
    friends to caramel‑drizzled popcorn during movie nights, reflecting a practical yet occasionally indulgent palate.
  core: Georgia Baldwin blends a love for routine, competitive drive, and social flair into a life of cheer‑leading choreography, strategic gaming, and meticulously planned movie nights, while juggling
    anxiety‑fueled stress with a journal‑filled coping habit.
background:
  cultural: Georgia grew up in a predominantly white, middle‑class family in Las Vegas. Her parents work in the service industry, which exposed her early to hospitality norms and the importance of punctuality
    and customer service. The city's multicultural environment, with its blend of entertainment, tourism, and desert culture, has influenced her appreciation for organized events and community gatherings.
    While she identifies with mainstream American customs—celebrating holidays like Thanksgiving and the Fourth of July—she also embraces the local Las Vegas vibe, often attending family‑friendly shows
    and community festivals that emphasize fun, routine, and social connection.
