  hobbies: '[''Attending live music and open‑mic events'', ''Exploring local coffee roasts and brewing techniques'', ''Reading contemporary fiction and memoirs'', ''Hiking the Huron River trail'', ''Practicing
    yoga'', ''Home baking and seasonal recipe experiments'', ''Street photography of art and coffee shop interiors'']'
  career_goals: Kathleen aims to advance from hosting to a floor‑manager role within the next two years, learning the operational side of a café and overseeing staff scheduling and training. She plans to
    complete a hospitality management certificate at a local community college while continuing to work. Long‑term, she dreams of opening a small independent coffeehouse in Ypsilanti that emphasizes ethically
    sourced beans, community art showcases, and a flexible, welcoming atmosphere that reflects her blend of curiosity and practicality.
