personas:
  professional: An astute front‑of‑house specialist, Kathleen Moran blends Midwestern practicality with a curiosity for coffee trends, and they keep service smooth by reading the dining room flow, improvising
    schedules on the fly, and de‑escalating guest conflicts with a friendly, assertive tone.
  sports: A weekend hiker and casual jogger, Kathleen Moran frequents the Huron River trail, belongs to the Huron River Runners club, and cheers on the Michigan State Spartans football team and the Ypsilanti
    Musketeers semi‑pro soccer squad, balancing a relaxed approach to fitness with occasional yoga sessions for balance.
  arts: An avid participant in Ypsilanti’s indie music scene, Kathleen Moran attends open‑mic nights featuring local acts like The Shallow Graves, curates playlists that blend Sufjan Stevens, The National,
    and Detroit‑born jazz pianist Robert Glasper, and captures street‑art murals through photography, framing their creative expression with a keen eye for community‑driven aesthetics.
  travel: With a love for coffee‑centric road trips, Kathleen Moran pilots weekend getaways to Ann Arbor’s historic coffee houses, dreams of a summer trek through Portland’s brew districts, and keeps travel
    planning deliberately spontaneous, often booking last‑minute stays at boutique B&Bs rather than adhering to strict itineraries.
  culinary: An experimental home‑brewer, Kathleen Moran relishes crafting seasonal cold‑brew blends with oat milk and hints of Irish stout, bakes pumpkin‑spice scones and rustic sourdough loaves on weekends,
    and pairs their creations with ethically sourced beans, while admitting a habit of leaving coffee grounds on the kitchen counter for days.
  core: Kathleen Moran is a curiosity‑driven yet easy‑going hospitality professional who balances community‑focused coffee culture with a penchant for spontaneous creativity and occasional organizational
    lapses.
background:
  cultural: Kathleen was raised in the Midwest, growing up in a small-town environment near Ypsilanti, Michigan. Her family’s European roots—primarily Irish and German—instilled an appreciation for community
    gatherings, farm‑to‑table food, and a modest work ethic typical of the region. The local university vibe and diverse student population exposed her to a variety of cultural perspectives, encouraging
    an open‑minded curiosity about food, music, and art. This blend of Midwestern practicality, familial heritage, and exposure to Ypsilanti’s eclectic cultural scene shapes her values of friendliness,
    flexibility, and a willingness to learn.
attributes:
  skills: '[''Guest greeting and seating'', ''Reservation and wait‑list management'', ''POS system operation'', ''Basic barista techniques'', ''Menu and beverage knowledge'', ''Interpersonal communication'',
