persona_description: A historian who specializes in the study of European colonization and its impact on the Americas, particularly focusing on the role of print media in preserving and transmitting native
  cultures. Their research interests include the relationship between colonialism and the development of print culture, the impact of print media on native orality, and the ways in which native cultures
  have adapted to the new media landscape. They are also interested in the role of print media in shaping national identity and the legacy of colonialism in contemporary American culture.
