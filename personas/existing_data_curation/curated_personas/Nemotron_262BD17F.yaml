  hobbies: '[''Playing football'', ''Robotics club projects'', ''Hunting and fishing'', ''Biking'', ''Online competitive gaming'', ''Car maintenance'', ''Youth group volunteering'']'
  career_goals: He aspires to become a mechanical engineer specializing in agricultural machinery, combining his love for hands‑on work with a desire to innovate practical solutions for his community. In
    the long term, he hopes to open his own farm‑tech startup that designs affordable, eco‑friendly equipment for small‑scale farmers, while also keeping an option open to serve as a first‑responder in
    his hometown if needed.
