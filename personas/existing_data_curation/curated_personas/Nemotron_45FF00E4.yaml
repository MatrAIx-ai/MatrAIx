  hobbies: '[''Experimenting with new fabric combinations'', ''Traditional Mexican embroidery'', ''Cooking Tex-Mex dishes'', ''Attending local music festivals'', ''Nature walks along the Gulf Coast'', ''Reading
    fashion blogs'', ''Collecting vintage fabrics'', ''Yoga for relaxation'', ''Gardening'', ''Volunteering to teach sewing classes'']'
  career_goals: Xiomara aims to transform her modest home studio into a vibrant boutique that showcases a fusion of contemporary fashion and traditional Mexican textile art. She plans to launch a seasonal
    line of sustainable, locally sourced garments that honor her heritage while appealing to modern tastes. To achieve this, she intends to enroll in evening design courses at a community college, improve
    her organizational systems, and master advanced pattern‑making techniques. Building a stronger online presence through Instagram and a small e‑commerce site is a priority, as is joining the Port Isabel
    artisans' collective to network with fellow makers. Long‑term, she hopes to mentor young seamstresses, especially women from immigrant backgrounds, and to offer free sewing workshops at the local community
    center, thereby giving back to the community that shaped her.
