persona_description: A researcher and advocate for farmland biodiversity, specifically in developing countries where farmers lack access to modern technologies and inputs. The individual is interested in
  developing and implementing a comprehensive assessment tool for farmland biodiversity, which can help steer farmers towards more biodiversity-friendly practices and policymakers towards a broader view
  of agricultural policy. They are passionate about the connection between biodiversity, agriculture, and landscape services and are committed to improving the efficiency of programs that support farmland
  biodiversity. The individual has a background in biodiversity monitoring projects and is knowledgeable about the interactions between crops and wild species, which is crucial for investigating agricultural
  intensification that harms wild species as little as possible.
