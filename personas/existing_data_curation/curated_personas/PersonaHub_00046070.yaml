persona_description: A researcher and professor at Michigan State University who studies the relationship between violent video games and brain activity patterns. They are particularly interested in the
  neurobiological aspects of aggressive cognition and affect. They have conducted a functional magnetic resonance imaging study on 13 male participants who played a violent video game, and have found a
  causal link between the game play and brain activity patterns that are considered characteristic for aggressive cognitions and affects. They have also published their findings in the journal Media Psychology.
