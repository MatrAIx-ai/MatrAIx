persona_description: A historian and archaeologist who specializes in the study of prehistoric cultures, particularly those from the Near East. Her research interests include the Late Epipaleolithic culture,
  feasting practices, and the impact of human activity on ancient ecosystems. She is particularly interested in the role of agriculture and other human activities in shaping the evolution of conch shell
  sizes over time. She is also interested in the impact of social media on the dissemination of her research findings and the role of women in the geosciences.
