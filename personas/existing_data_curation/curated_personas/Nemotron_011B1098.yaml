  hobbies: '["Reading picture books and early readers", "Building LEGO sets", "Drawing and coloring", "Exploring backyard nature (collecting leaves and rocks)", "Helping with gardening", "Caring for the
    family dog", "Attending piano lessons", "Playing organized board games (e.g., Candy Land)", "Listening to children''s music"]'
  career_goals: Ann dreams of a future where she can help others and keep things running smoothly. She imagines becoming a teacher who creates a calm classroom for younger children, or a veterinarian who
    cares for animals in her community. Both paths appeal to her love of structure, responsibility, and making sure everyone feels safe and supported.
