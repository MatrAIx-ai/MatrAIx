personas:
  professional: Ann Windham, a 7-year-old budding engineer, loves constructing LEGO sets with exact instructions, turning her practical, structure-seeking personality into early design thinking, and they
    often organize the blocks by color and shape to build sturdy, imaginative creations.
  sports: Ann Windham spends Saturday mornings playing organized soccer with their local youth league, they cheer for the River City Cubs baseball team on TV, and join family hikes in the nearby woods,
    balancing structured team practice with spontaneous outdoor activity.
  arts: Ann Windham's artistic side shines when they draw woodland scenes inspired by Beatrix Potter while listening to the upbeat songs of Raffi and The Wiggles, and they never miss the weekly storytime
    at the neighborhood library where Mo Willems books are read aloud.
  travel: Ann Windham's travel dreams include family road trips to the nearby Redwood Trail State Park, a summer stay at a cabin in the Colorado mountains, and a future visit to the Disney Resort in Florida,
    and they prefer a well-planned itinerary with scheduled playtimes and snack breaks.
  culinary: Ann Windham delights in nibbling on homemade mac-and-cheese with sharp cheddar, crunchy carrot sticks, and blueberry muffins they help bake, and they proudly claim they can crack an egg without
    breaking the yolk, though they often over-spill the milk when measuring.
  core: Ann Windham is a meticulous 7-year-old who balances a love for LEGO construction and garden chores with a predictable allowance routine, occasional vitamin forgetfulness, and a habit of over-spilling
    milk while they dream of Disney adventures.
background:
  cultural: Ann grows up in a small, close‑knit community in rural Izard County, Arkansas. Her family’s traditions reflect Southern Appalachian values such as hospitality, respect for neighbors, and community
    participation. Weekly church attendance, local school events, and the county fair shape her sense of belonging. The quiet, predictable rhythm of small‑town life reinforces her preference for structure
    and harmony, while the surrounding natural landscape fosters her interest in outdoor exploration.
attributes:
  skills: '["Reading simple chapter books", "Basic addition and subtraction", "Organizing toys and books", "Following multi-step instructions", "Pet care basics (feeding and grooming dog)", "Building LEGO
