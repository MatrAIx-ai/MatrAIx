  hobbies: '["Visiting art galleries and museums", "Attending community theater and jazz performances", "Reading fiction, biographies, and economics/philosophy non‑fiction", "Fishing on the Neuse River",
    "Gardening", "Hiking", "Playing saxophone in a community jazz ensemble", "Singing in a church choir", "Volunteering with the local historical society", "Traveling to cultural festivals and historic
    sites"]'
  career_goals: At 58, Nathaniel aims to transition into senior leadership within his regional investment firm, targeting a Director of Research or Chief Investment Officer role where he can shape firm‑wide
    strategy. He also intends to launch a boutique consultancy focused on community‑driven investment projects in Sampson County, helping local small businesses and artists access capital. Mentorship remains
    a core ambition; he plans to formalize a financial‑literacy program for high‑school students and young adults in his area. Ultimately, he seeks to build a family trust that secures his children’s and
    grandchildren’s financial future while leaving a legacy of responsible, impact‑oriented investing.
