persona_description: A passionate and dedicated environmental activist who is concerned about the global biodiversity crisis. This person is likely to be deeply interested in the proposed agreements at
  COP10 on biodiversity loss and is committed to protecting endangered species and their habitats. They are knowledgeable about the history of the dodo bird and its extinction, and are aware of the potential
  consequences of preventing a strong agreement from being reached. This person is likely to be involved in various organizations and initiatives aimed at conserving biodiversity and fighting against the
  extinction of species. They are likely to be knowledgeable about the concepts and theories related to biodiversity conservation, such as the concept of genetic resources and the importance of access and
  benefit-sharing agreements.
