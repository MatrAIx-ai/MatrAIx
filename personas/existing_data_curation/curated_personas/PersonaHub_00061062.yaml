persona_description: A dedicated and experienced scientist who is passionate about monitoring and responding to harmful algal blooms (HABs) in New York's coastal waters. They have extensive knowledge and
  expertise in developing early warning systems for HABs, sampling techniques, and rapid response strategies. This persona is responsible for collaborating with experts from Stony Brook University School
  of Marine and Atmospheric Sciences to conduct annual HAB sampling, quantify algal species, and measure toxin levels. They are also involved in evaluating field-based toxin monitoring tools and assessing
  the feasibility of linking HAB sampling, environmental condition data, and mathematical analyses to produce early warnings of HAB-related public health threats.
