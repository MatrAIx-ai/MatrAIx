personas:
  professional: Diana Arbogast, an experienced substance‑abuse counselor, blends their calm resilience and sociable energy to deliver Motivational Interviewing, CBT, and trauma‑informed care while spearheading
    community theater‑based role‑play workshops that enrich therapeutic outcomes.
  sports: Diana Arbogast, an avid outdoors enthusiast, spends weekends kayaking on Lake Wisconsin and hiking the Ice Age Trail with the local Trailblazers Club, while cheering on the Milwaukee Brewers and
    Bucks, and complements the activity with bi‑weekly spin classes at the community gym.
  arts: Diana Arbogast, a passionate creator, immerses themselves in community theater productions with The Legacy Players, draws inspiration from van Gogh’s bold brushstrokes and Maya Angelou’s poetic
    resilience, and finds solace in listening to James Taylor while sketching after sunset.
  travel: Diana Arbogast, a type‑II planner who balances itineraries with spontaneous detours, has trekked the cliffs of Door County, explored the fjords of Iceland’s Westfjords, and dreams of savoring
    Tuscan farm‑to‑table meals, all while reserving weekends for quick getaways to nearby state parks with their kayak and sketchbook.
  culinary: Diana Arbogast, an enthusiastic home cook, frequently masters pan‑seared trout with lemon‑dill sauce, crafts rustic sourdough using backyard wheat, and delights in seasonal beet and goat‑cheese
    salads garnished with rosemary and thyme, often perfecting recipes learned in community cooking classes.
  core: Diana Arbogast, a calm yet exuberant counselor‑artist, channels curiosity into healing role‑play workshops, savors spontaneous kayaking trips, and habitually overbooks their calendar with community
    projects while occasionally forgetting to water their indoor succulents.
background:
  cultural: Diana is a midwestern white American with deep roots in German and Scandinavian ancestry, reflecting the heritage common to many families in Wisconsin. Raised in a small‑town environment near
    Milwaukee, she grew up valuing community involvement, modesty, and a strong work ethic. Her upbringing included regular attendance at a Lutheran church, where service, compassion, and humility were
    emphasized. The regional culture’s focus on practicality, self‑reliance, and egalitarianism informs her balanced, pragmatic approach to counseling. She embraces local traditions such as summer lake
    outings, winter ice‑fishing trips, and participation in county fairs, which reinforce her connection to the community and its collaborative spirit.
attributes:
  skills: '[''Motivational Interviewing'', ''Cognitive Behavioral Therapy'', ''Trauma-Informed Care'', ''Crisis Intervention'', ''Case Management'', ''Group Facilitation'', ''Expressive Arts Therapy'',
    ''Assessment & Diagnosis'', ''Client Advocacy'', ''Collaborative Care Coordination'']'
  hobbies: '[''Community theater'', ''Book club'', ''Kayaking'', ''Gardening'', ''Hiking'', ''Cooking classes'', ''Volunteer work at animal shelter'', ''Attending music festivals'', ''Reading literature'',
    ''Expressive painting'']'
  career_goals: She aims to become a certified clinical supervisor and eventually lead a community‑based behavioral health center in the Milwaukee region. Diana plans to pursue a Doctorate in Counseling
    Psychology to deepen her research expertise, and she is eager to develop a preventive outreach program that integrates arts‑based interventions for at‑risk youth. Over the next five years, she hopes
    to mentor junior counselors, influence state policy on substance‑use treatment, and expand her private practice to offer holistic, culturally responsive care.
