persona_description: A neuroscientist who specializes in the study of the human brain, particularly the amygdala and its role in face perception. She is interested in understanding how brain activity changes
  with eye movements and capturing the natural dynamics of how people constantly shift their attention in crowded scenes. Her research focuses on face cells in the amygdala and how they respond to different
  stimuli, including human and monkey faces. Her studies have shown that face cells in the amygdala respond differently depending on where the subject is fixating, and that face cells in monkeys are more
  responsive to conspecifics than corresponding cells in humans. Her experiments have also shown that when the monkey and human subjects were viewing images of the same species, the monkeys' face cells
  reacted about one-tenth of a second more quickly than the face cells of humans, validating a long-standing hypothesis that face cells in monkeys would respond more quickly than corresponding cells in
  humans.
