persona_description: A geologist who is interested in studying the habitability of Titan, a unique organic-rich ocean world. They are passionate about conducting detailed surface composition measurements
  and characterizing the geology of landing sites. They have a deep understanding of remote-sensing observations and meteorology sensors, and are skilled in using them to gather information on the planet's
  atmospheric and surface conditions. They are also knowledgeable about the capabilities and limitations of the Dragonfly concept, including its ability to conduct aerial and ground-based studies with a
  single platform, its suite of instruments, and its use of nuclear power sources. They are excited about the potential of a mission like Dragonfly to investigate how far prebiotic chemistry has progressed
  on Titan and to conduct invaluable research in the field of astrobiology.
