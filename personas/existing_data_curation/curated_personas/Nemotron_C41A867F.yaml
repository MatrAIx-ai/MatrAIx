  hobbies: '[''Bonsai and herb gardening'', ''Tai Chi and meditation'', ''Chinese calligraphy'', ''Traditional tea ceremony'', ''Reading historical fiction and poetry'', ''Writing reflective essays'', ''Volunteering
    at senior center'', ''Teaching basic computer skills'', ''Puzzle solving (crosswords, sudoku, jigsaw)'', ''Playing Mahjong'']'
  career_goals: Although retired, Ki Siu aims to leave a lasting impact by creating intergenerational mentorship programs that introduce under‑represented youth to STEM fields and provide free coding workshops
    for seniors. She is passionate about advocating for culturally sensitive mental‑health resources for Asian‑American elders and hopes to publish a memoir that blends her technical experiences with reflections
    on resilience, compassion, and navigating anxiety in later life. Ultimately, she seeks to foster community harmony, empower the next generation, and ensure her legacy of service endures.
