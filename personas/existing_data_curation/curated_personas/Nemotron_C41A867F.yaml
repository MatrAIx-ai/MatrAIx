personas:
  professional: Ki Siu, a retired STEM professional with a knack for translating complex code into simple lessons, now leads intergenerational coding workshops and mental‑health first‑aid sessions at a
    senior center, blending technical rigor with deep compassion.
  sports: Ki Siu enjoys gentle morning Tai Chi in the local park, participates in a senior walking club that explores the Santa Clara trails, and is a loyal fan of the San Jose Giants baseball team, attending
    games when mobility permits.
  arts: Ki Siu immerses herself in Chinese calligraphy, hosts small tea‑ceremony gatherings, and finds solace in reading historical fiction and poetry by Du Fu and Maya Angelou, while also appreciating
    the cello performances of Yo‑Yo Ma.
  travel: Ki Siu favors low‑impact travel, reminiscing about a past pilgrimage to her ancestral hometown in China, and now plans weekend trips to Napa Valley vineyards and annual visits to Yosemite’s tranquil
    groves, balancing curiosity with the comfort of familiar routines.
  culinary: Ki Siu delights in preparing steamed dumplings, aromatic jasmine tea, and a comforting bowl of congee with ginger and scallions, yet often forgets to limit sodium, leading to occasional cravings
    for salty snacks.
  core: Ki Siu is a 75‑year‑old mentor who fuses technical savvy, cultural traditions, and a compassionate, yet anxiety‑prone, outlook into a life of community service and quiet perseverance.
background:
  cultural: Ki Siu was born to Chinese immigrant parents who settled in the San Jose area in the early 1950s. Growing up in Santa Clara County, she navigated a bicultural world—balancing the collectivist
    values of her family, such as respect for elders, community harmony, and the importance of education, with the individualistic, innovation‑driven culture of the American Bay Area. She attended Mandarin
    school on weekends, celebrated Lunar New Year and the Mid‑Autumn Festival at home, and grew up on a diet of dim sum, steamed buns, and herbal teas. Her cultural heritage instilled a deep sense of duty
    to help others, which now manifests in her volunteer work and advocacy. At the same time, her American upbringing fostered curiosity and practicality, leading her to pursue a STEM degree and remain
    open to new ideas while honoring traditional practices.
