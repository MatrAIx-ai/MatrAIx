personas:
  professional: Susan Skipper, a retired home‑maintenance whiz turned community storyteller, blends practical DIY prowess with a spontaneous, solitary work style to fix neighbors’ leaky faucets on a whim
    while sharing oral histories at the Fort Myers public library whenever the mood strikes, and they relish the quiet satisfaction of solving problems on the spot.
  sports: Susan Skipper prefers low‑impact fitness, taking gentle strolls along the Caloosahatchee River and joining the Fort Myers Seniors Walking Club, while cheering on the Tampa Bay Rays in baseball
    and the Miami Heat during winter months, and they occasionally squeeze in a senior‑friendly community yoga class whenever the weather is pleasant.
  arts: Susan Skipper fills quiet afternoons with the swinging sounds of Glenn Miller and Benny Goodman, enjoys re‑reading classic films starring Katharine Hepburn, and channels personal creativity through
    knitting patterned scarves inspired by the Art Deco motifs admired in vintage postcards, all while they cherish the calm that music and craft bring to solitary moments.
  travel: Susan Skipper favors slow, contemplative travel, opting for short road trips to historic towns like Saint Augustine and Savannah, leisurely bird‑watching excursions in the Everglades, and occasional
    guided cruises to the Bahamas that accommodate their need for comfortable pacing and limited mobility.
  culinary: Susan Skipper, an accomplished home cook, savors Southern comfort foods such as chicken and dumplings and shrimp‑and‑grits, seasons them with garden‑fresh basil and oregano, delights in preparing
    herb‑infused lemonades and fresh peach cobbler for neighbors, and still indulges in a weekly lunch at the local farmers’ market stall for fresh tomatoes and heirloom corn, all while they take pride
    in adapting old family recipes with new garden harvests.
  core: Susan Skipper, a quietly curious octogenarian, stitches memories into knitted blankets, balances spontaneous bursts of DIY fixes with occasional bouts of anxiety, and never lets a puzzle—crossword
    or Sudoku—remain unsolved, traits that reveal their enduring blend of curiosity and resilience.
background:
  cultural: Susan grew up in a mid‑western white American family during the 1930s and 1940s, where Church attendance, community potlucks, and a strong work ethic were central values. Her parents emphasized
    self‑reliance, modesty, and the importance of family stories, which shaped her lifelong devotion to preserving memories. After marrying young and raising children, she moved to Florida in the 1970s,
    where she adopted the relaxed, sunny lifestyle of Fort Myers while retaining her Midwestern roots—enjoying Southern‑style cooking, church fellowship, and seasonal celebrations like Thanksgiving and
    Christmas. Her cultural identity blends traditional Protestant values, a respect for practical, hands‑on skills, and an appreciation for the natural beauty of Florida’s wetlands and coastal environment.
attributes:
  skills: '["Home maintenance (basic plumbing, carpentry)", "Gardening (herbs, native plants)", "Bird identification", "Cooking (comfort food, family recipes)", "Basic digital literacy (tablet, email, video
