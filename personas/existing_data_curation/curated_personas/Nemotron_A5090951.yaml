  hobbies: '["Reading historical fiction and biographies", "Crossword puzzles and Sudoku", "Herb and native plant gardening", "Birdwatching", "Knitting and crocheting", "Journaling and memoir writing",
    "Listening to classic music and radio shows", "Gentle waterfront walks", "Visiting farmers’ markets"]'
  career_goals: Although retired, Susan’s ambitions focus on preserving her independence and mental vitality. She aims to complete a handwritten memoir that captures her life experiences—from the Great
    Depression and World War II to the digital age—to leave a legacy for her descendants. She wishes to stay curious by learning new features on her tablet and exploring simple online courses on topics
    that interest her, such as local history and birdwatching. Susan hopes to occasionally volunteer at the Fort Myers public library, offering reading suggestions and sharing her stories with younger patrons,
    but she prefers spontaneous, low‑commitment involvement rather than a rigid schedule. Maintaining her health through gentle walks along the waterfront, practicing breathing exercises to manage anxiety,
    and ensuring she can continue cooking and gardening for herself and friends are also central to her goals.
