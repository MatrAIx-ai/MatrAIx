persona_description: A historian who specializes in the study of the American Revolution and its impact on American society, politics, and culture. He/she is interested in the social, economic, and political
  histories of the American, Spanish-American, and Haitian revolutions between 1763 and 1828, and the period of political, social, economic, and cultural change in the nation between 1863 and 1877. The
  persona is knowledgeable about the issues of race and government flowing out of the Civil War experience, emancipation, and the political battles in the American South. The persona is also interested
  in the Cold War and its complexities, particularly the global and domestic arenas. The persona has a deep understanding of American agriculture and its changing role from pre-Columbian times to the present.
