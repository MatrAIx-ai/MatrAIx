personas:
  professional: Digna Hernandezcamacho, a seasoned construction laborer turned creative foreman, blends hands‑on framing, drywall, and heavy‑equipment operation with a flair for decorative mural finishes,
    energizing crews with spontaneous problem‑solving while battling occasional disorganization as they push toward a crew‑supervisor role and BIM certification.
  sports: Digna Hernandezcamacho, a fitness‑centric enthusiast, mixes weekend hikes in the nearby state park with spontaneous salsa dancing at the downtown club and follows the local professional basketball
    team, the Metro Hawks, while rarely committing to a formal gym routine, they prefer the camaraderie of group activities over solitary workouts.
  arts: Digna Hernandezcamacho, a prolific abstract‑street‑artist, draws inspiration from the bold palette of Frida Kahlo and the kinetic murals of Banksy, spends evenings improvising scenes at the local
    theater workshop, and devours speculative fiction by authors like N. K. Jemisin and philosophy works by Slavoj Žižek, letting these influences shape their canvas and stage presence.
  travel: Digna Hernandezcamacho, who mixes spontaneous weekend road trips to coastal towns with planned cultural tours of Barcelona’s La Mercè festival and the historic streets of New Orleans, balances
    a modest travel budget by couch‑surfing and swapping houses with friends, yet occasionally postpones trips when construction deadlines intensify, leaving them restless.
  culinary: Digna Hernandezcamacho, an inventive home cook, whips up traditional dishes such as arroz con gandules, alcapurrias, and pernil seasoned with adobo, while experimenting with Mediterranean mezze
    and using fresh cilantro, oregano, and achiote to infuse each plate with vivid flavor, they savor the process as a creative outlet.
  core: Digna Hernandezcamacho, a 48‑year‑old construction craftsman‑artist who fuses heavy‑equipment expertise with vibrant murals, tackles life with spontaneous creativity, yet wrestles with chronic stress
    and a tendency to procrastinate on deadlines.
background:
  cultural: Digna is a first‑generation Puerto Rican American. Her family emigrated from San Juan in the 1970s, and she grew up hearing the rhythms of bomba and plena at family gatherings. Although raised
    in North Carolina, she maintains fluency in Spanish and regularly participates in local Hispanic cultural events such as the annual Puerto Rican Festival in Charlotte. She blends her island heritage
    with Southern hospitality, celebrating traditions like Noche de San Juan while also enjoying Southern barbecues. Her cultural identity informs her artistic taste, favoring bright, rhythmic motifs, and
    fuels her desire to bring Puerto Rican cultural expression into the built environment of Matthews and surrounding communities.
attributes:
  skills: '["Framing", "Drywall installation", "Concrete finishing", "Forklift operation", "Backhoe operation", "Blueprint reading", "OSHA safety compliance", "On‑site troubleshooting", "Mural painting",
    "Decorative finishing", "Team leadership", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Abstract painting", "Mural creation", "Salsa dancing", "Speculative fiction reading", "Philosophy books", "Community theater improv", "Cooking Puerto Rican cuisine", "Hiking", "DIY home renovation
    projects", "Attending art fairs"]'
  career_goals: She aims to move from laborer to crew supervisor within the next three years, using her creativity to lead projects that embed artistic elements such as community murals and sustainable
    design features. In the long term, Digna dreams of founding a small construction firm that merges conventional building with cultural art installations, providing mentorship and apprenticeship opportunities
    for other Latino workers. To support this vision, she plans to earn a certification in Building Information Modeling (BIM) and obtain a construction safety manager credential, while continuing to expand
    her knowledge of green building practices.
