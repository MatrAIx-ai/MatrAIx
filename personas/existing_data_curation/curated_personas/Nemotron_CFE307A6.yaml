  career_goals: Emily aims to progress to senior leadership in analytics and strategy, targeting a Director of Business Analytics or Chief Strategy Officer role within the next seven to ten years. She plans
    to deepen her expertise by earning an MBA focused on innovation and obtaining a Lean Six Sigma Black Belt certification. Her ambition includes leading large‑scale transformation projects that blend
    rigorous data insights with creative, design‑thinking approaches, while championing a workplace culture that prioritizes employee well‑being, collaboration, and harmony. Long‑term, Emily envisions founding
    a nonprofit that provides arts‑based education and career development resources to underserved youth in Los Angeles, leveraging her business acumen and passion for the arts.
