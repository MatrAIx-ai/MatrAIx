personas:
  professional: A budding young technologist, Laron Gittens channels their love for order and creativity into building intricate LEGO models and coding Scratch games, consistently planning each project
    step‑by‑step and sharing polished results with friends.
  sports: An enthusiastic middle school basketball player, Laron Gittens anchors the guard position on the school team, they admire the Los Angeles Lakers, and spend Saturdays at the local community center
    league, balancing competitive drive with teamwork and a structured practice schedule.
  arts: A gospel‑inspired music enthusiast, Laron Gittens fills their evenings with soulful R&B and church hymns, often humming along while assembling LEGO creations, and they cherish performances by artists
    like Marvin Gaye and Kirk Franklin, which fuel their creative imagination.
  travel: A curious young explorer, Laron Gittens enjoys family camping trips to the nearby pine forests, day‑excursions to the state science museum, and dreams of visiting the Kennedy Space Center, they
    plan each outing with a checklist to maximize learning and fun.
  culinary: A budding community garden chef, Laron Gittens loves tasting fresh carrots and tomatoes from the garden, helps stir simple veggie stir‑fry after school, and enjoys classic kid favorites like
    cheese pizza and peanut butter‑jelly sandwiches, though they sometimes forget to finish their vegetables.
  core: Laron Gittens is an organized, methodical ten‑year‑old who balances LEGO building, Scratch coding, basketball, and garden work while mindfully budgeting their allowance and indulging in gospel and
    R&B melodies.
background:
  cultural: Laron is an African American growing up in the small town of Aynor, South Carolina, where family, church, and community ties run deep. His family participates in regular Sunday services at the
    local Baptist church, where gospel music and communal fellowship shape his cultural experiences. He celebrates Southern traditions such as backyard barbecues, family reunions, and the annual Juneteenth
    parade that honors African American history. Stories from his grandparents about the Great Migration and the civil‑rights movement are woven into his understanding of identity and resilience. The local
    environment—beaches on the Atlantic coast, pine forests, and the close‑knit neighborly atmosphere—also influences his love for outdoor activities and community service.
