  career_goals: Laron dreams of turning his love for structure and building into a career as a civil engineer, designing safe bridges, playgrounds, and community spaces that reflect the needs of his hometown.
    He plans to strengthen his math and science foundations in middle school, join a robotics club, and attend a summer coding camp to gain deeper technical skills. In the longer term, he envisions earning
    a degree in engineering, contributing to infrastructure projects in South Carolina, and later mentoring younger students in his church’s youth programs. He also keeps an open ambition to help animals,
    considering a future as a veterinarian if he wants a more hands‑on, caring role.
