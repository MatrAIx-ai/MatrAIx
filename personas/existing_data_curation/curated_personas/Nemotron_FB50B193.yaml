  career_goals: Luis dreams of a future where he can merge his love for art and technology. He envisions becoming a multimedia artist or a game designer who creates immersive visual worlds that tell compelling
    stories. He is also intrigued by the idea of working as a museum curator or cultural programmer, enabling him to share diverse artistic traditions with his community. While these ambitions are still
    forming, he consistently seeks opportunities—like attending local art workshops or participating in coding clubs—that will let him explore these pathways with flexibility and independence.
