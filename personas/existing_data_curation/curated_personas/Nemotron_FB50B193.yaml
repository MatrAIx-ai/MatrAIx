personas:
  professional: Luis Mejia, an aspiring digital illustrator who blends graphic novel aesthetics with a love for spatial design, uses tools like Procreate and Scratch to craft characters while their relaxed
    approach to deadlines lets ideas flow freely, even if their workspace often looks like a colorful LEGO construction zone.
  sports: Luis Mejia, a dedicated member of the Union Stars youth soccer club who idolizes the New York Giants for their resilient defense and follows the New Jersey Devils for the excitement of fast‑paced
    ice hockey, spends weekends at the local community center's skate rink and occasionally joins a neighborhood basketball pickup game with friends.
  arts: Luis Mejia, a frequent visitor of the Newark Museum who draws inspiration from graphic novel masters like Alan Moore and anime director Hayao Miyazaki, curates personal playlists featuring folk
    ballads, indie pop from Tame Impala, and video‑game scores while sketching, and eagerly showcases animated shorts on Scratch to a small circle of classmates, reflecting a deep, eclectic artistic identity.
  travel: Luis Mejia, who has explored the historic streets of Washington, D.C., marveled at the exhibit halls of the Smithsonian, dreams of hiking the Andes for their breathtaking vistas, and plans a future
    family road trip to the sunny beaches of Florida’s Gulf Coast, balances a love for adventure with a careful eye on school schedules and limited travel budget.
  culinary: Luis Mejia, an enthusiastic home‑chef who loves assembling fresh empanadas filled with cheese and spinach and perfecting pastel de choclo— a sweet corn pudding— while experimenting with topping
    pizzas with jalapeños and pineapple, often practices knife skills while listening to upbeat indie tunes, yet sometimes forgets to clean the kitchen after cooking, showcasing both culinary curiosity
    and occasional messiness.
  core: Luis Mejia, a curious, calm 12‑year‑old who blends digital art, LEGO construction, and a love for folk rhythms into a uniquely organized‑chaos lifestyle, prefers quiet corners over crowds, and can
    spend hours lost in a sketch while a half‑finished homework page gathers dust.
background:
  cultural: Luis is the son of Chilean immigrants who have preserved many of their homeland's traditions while embracing life in Union, New Jersey. At home, Spanish is spoken alongside English, and family
    gatherings often feature Chilean dishes like empanadas and pastel de choclo. He celebrates Fiestas Patrias with music, dance, and storytelling about Chile's history, fostering a deep appreciation for
    his heritage. The blend of South American cultural influences and the diverse, artistic environment of the Newark‑Essex County area shapes Luis's worldview, encouraging him to explore both his roots
    and the broader multicultural tapestry of his community.
