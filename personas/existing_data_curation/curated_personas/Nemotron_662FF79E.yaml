  hobbies: '[''Watercolor painting and sketching'', ''Visiting art galleries and museums'', ''Reading science‑fiction and philosophy'', ''Improv comedy and community theater'', ''Hiking Connecticut state
    parks'', ''Yoga and mindfulness meditation'', ''Cooking and experimenting with world cuisines'', ''Volunteering at local shelters'', ''Participating in a book club'', ''Playing board games with friends'']'
  career_goals: Maya aspires to transition from her current file clerk role into a records‑management or business‑analysis position within the next three to five years. She plans to earn a Certified Records
    Manager (CRM) designation and enroll in a part‑time MBA program to deepen her strategic and analytical capabilities. Her long‑term ambition is to lead a departmental initiative that digitizes and optimizes
    Hartford‑based organizations’ document workflows, thereby reducing manual handling and enhancing information security. She also envisions eventually consulting for small businesses on workflow design,
    leveraging her blend of organizational expertise and creative problem‑solving.
