personas:
  professional: A seasoned CNC machinist, Nicholas Guthrie leverages two decades of precision engineering, meticulous GD&T expertise, and a methodical mentorship style to drive process improvements in his
    shop, while quietly positioning themselves for a supervisory role and eventual community-focused machine shop; they thrive on structured, predictable tasks and assert themselves calmly when safety or
    quality standards are at stake.
  sports: A steady-hand outdoorsman, Nicholas Guthrie spends early mornings fishing on Lake of the Ozarks, practices precision shooting at the Missouri Sportsmen's Association, joins seasonal deer hunts,
    and roots for the Kansas City Chiefs and St. Louis Cardinals on game day, while maintaining modest fitness through weekend walks and occasional gym sessions to stay limber for their carpentry projects,
    and they treat each target practice as a disciplined workout.
  arts: A hands-on creator, Nicholas Guthrie builds a detailed model railroad of historic Missouri lines, carves small folk-art pieces inspired by the style of William \"Billy\" Halperin, watches Ken Burns's
    documentaries on industrial America, and listens to Bob Dylan while tinkering in the garage, and they find artistic balance in meticulous craftsmanship.
  travel: An organized road-tripper, Nicholas Guthrie maps out carefully budgeted drives to railway museums in St. Louis and Chicago, seasonal hunting lodges in the Ozarks, and historic car shows in Michigan,
    while they save for a long-planned exploratory trip to the historic steam-rail routes of the Pacific Northwest, preferring structured itineraries over spontaneous tours.
  culinary: A practical home chef, Nicholas Guthrie favors pan-seared trout with lemon-dill butter, slow-smoked beef brisket seasoned with smoked paprika, and buttery cornmeal biscuits, mastering enough
    kitchen technique to perfect these dishes while they occasionally over-salt their sauces in the pursuit of bold flavor.
  core: Nicholas Guthrie, a methodical 46-year-old machinist with a dawn-fishing habit and a penchant for restoring vintage pickups, blends quiet precision with a steady drive to mentor others and someday
    run a community-focused shop, and they approach each challenge as a puzzle waiting to be solved.
background:
  cultural: Nicholas grew up in a farming community near Springfield, Missouri, as the son of third‑generation Midwesterners with mixed English and German ancestry. Raised in a Wesleyan Methodist congregation,
    he absorbed values of diligence, modesty, and community responsibility. The local culture emphasizes self‑reliance, respect for skilled trades, and participation in county fairs, church potlucks, and
    volunteer youth programs such as 4‑H, where he occasionally mentors kids in basic tool use. These Midwestern roots shape his preference for structure, reliability, and a quiet, purposeful lifestyle.
attributes:
  skills: '[''CNC milling operation'', ''CNC programming (G-code, conversational)'', ''Manual lathe operation'', ''Blueprint & 3D CAD interpretation'', ''GD&T application'', ''Precision measurement (CMM,
    micrometer)'', ''Preventive maintenance & troubleshooting'', ''Tool and fixture design'', ''Safety compliance (OSHA 10)'', ''Training & mentorship'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Classic car restoration'', ''Target shooting'', ''Hunting'', ''Model railroading'', ''Woodcarving'', ''Reading technical biographies'', ''Watching industrial documentaries'']'
  career_goals: Nicholas aims to leverage his structured work style into a leadership role on the shop floor. He plans to obtain a CNC Mentor certification and a lean‑manufacturing credential within the
    next two years, positioning himself for a shop supervisor or shift manager position. Long‑term, he hopes to open a small, community‑focused machine shop that offers custom parts to local agricultural
    businesses and provides apprenticeship opportunities for youth interested in skilled trades.
