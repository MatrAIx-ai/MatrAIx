personas:
  professional: Brandon Kelati, a senior operations strategist renowned for data‑driven decision making and creative problem‑solving, they lead cross‑functional teams, champion diversity initiatives, and
    mentor emerging leaders in Baltimore’s business ecosystem.
  sports: Brandon Kelati, an avid supporter of the Baltimore Ravens and Orioles who jogs along the Inner Harbor twice weekly, they belong to the Baltimore Running Club, play pickup basketball on weekends,
    and practice yoga to counterbalance the desk‑bound nature of their executive role.
  arts: Brandon Kelati, a regular at the Baltimore Museum of Art and the Hippodrome, they immerse themselves in contemporary exhibitions, study works by Kehinde Wiley and Ai Weiwei, capture street portraits
    inspired by Gordon Park’s humanistic lens, and unwind to live jazz performances by the Baltimore Symphony’s chamber groups.
  travel: Brandon Kelati, a culinary‑driven traveler who has explored the spice markets of Marrakech, the street tacos of Oaxaca, and the sushi districts of Tokyo, they plan trips around food festivals,
    balance budget constraints with occasional splurges on boutique hotels, and keep a growing list of destinations that includes Barcelona and Lisbon for their art‑rich neighborhoods.
  culinary: Brandon Kelati, a passionate home chef who perfects soul‑food classics like collard greens, smoked brisket, and sweet‑potato pie, they experiment with ingredients such as smoked paprika, okra,
    and caramelized onions, and host monthly dinner parties where friends sample their latest culinary twists.
  core: Brandon Kelati fuses strategic operational leadership with an insatiable curiosity for art and cuisine, navigating corporate challenges while indulging in street‑photography, soulful cooking, and
    mentorship, all with a modest penchant for impulsive camera purchases.
background:
  cultural: Brandon is an African American who grew up in Baltimore’s historic neighborhoods, where the city’s rich musical heritage, especially jazz and soul, shaped his early experiences. His family’s
    roots in church and community service fostered a strong sense of responsibility and collective uplift. He draws pride from Baltimore’s traditions of resilience and creativity, participating in local
    cultural festivals, supporting Black-owned businesses, and advocating for equitable economic opportunities. This cultural foundation informs both his professional ethos and his personal passions.
