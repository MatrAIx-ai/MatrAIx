  career_goals: Brandon aims to advance to a senior executive role, such as Director of Operations or Vice President, where he can shape corporate strategy and champion diversity and inclusion initiatives.
    He also aspires to mentor emerging leaders within his organization and eventually launch a consulting practice focused on organizational development and culturally responsive leadership. Deepening his
    impact on Baltimore’s business ecosystem through partnerships with local nonprofits and economic development programs is a key long‑term ambition.
