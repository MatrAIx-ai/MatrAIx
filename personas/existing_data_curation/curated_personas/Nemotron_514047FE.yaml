  career_goals: Warren aims to advance from his current receptionist role to an office manager position within the Sussex County administration. He plans to enroll in an associate’s program in Business
    Administration to solidify his knowledge of organizational leadership, and eventually pursue a bachelor’s degree in Public Administration. His long‑term ambition is to become a department supervisor,
    overseeing a team while maintaining the structured, efficient environment he values.
