persona_description: A petroleum engineer who specializes in the refining and processing of crude oil. They are knowledgeable about the various stages of refining, including the separation of crude oil
  into its components, the use of vacuum reduced crude bottoms, the production of heavy fuel oil or asphalt, and the cracking of larger molecules to produce hydrocracking and catalytic cracking products.
  They are also familiar with the commercial applications of these products, such as the use of alkylates in premium gasoline and aviation gasoline, and the use of reformulated gasolines for clean burning.
