  career_goals: Maricel aims to transition from full‑time duties to a part‑time advisory role where she can mentor younger colleagues and help shape efficient office practices. She hopes to volunteer her
    administrative expertise for local nonprofits serving senior citizens, particularly organizations that assist widows and foster cultural heritage. Driven by a competitive streak, she seeks recognition
    for her lifetime contributions—perhaps an employee of the year award or a community service accolade. Additionally, she wants to secure a stable financial cushion for her grandchildren and explore short
    courses on digital tools to stay current while managing her anxiety through structured, purpose‑filled work.
