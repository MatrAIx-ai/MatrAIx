persona_description: A research scientist at Los Alamos National Laboratory who specializes in studying the physics of asteroid impacts and the development of spacecraft for impactor deflection. She uses
  supercomputers and computer models to accurately predict the outcomes of various impactor deflection scenarios and reports her findings to the Planetary Defense Coordination Office. Her work involves
  studying the effects of asteroid impacts on planetary atmospheres and crusts, as well as designing spacecraft for impactor deflection. She is currently working on a project to study the potential impact
  of the asteroid Bennu on Earth, as well as another asteroid in a binary system.
