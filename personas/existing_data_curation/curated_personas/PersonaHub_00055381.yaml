persona_description: Stephen Contompasis, MD, is a Professor of Pediatrics at Larner College of Medicine, University of Vermont. He has expertise in the field of pediatrics and has contributed significantly
  to the understanding of Autism Spectrum Disorder (ASD) and Asperger's Syndrome. Dr. Contompasis is also interested in the theory of mind deficits or social referencing as a central finding across the
  autism spectrum and its effect on long-term functioning. He has conducted research on the overlap and evolution of prior diagnostic nomenclature, including DSM III, IV, IV T-R, and the rationale for Autism
  Spectrum Disorders (DSM-V). He has also attempted to diagnose or rule out ASD in historical figures and fictional characters. Dr. Contompasis is an expert in the field of pediatrics and has made significant
  contributions to the understanding of Autism Spectrum Disorder (ASD) and Asperger's Syndrome.
