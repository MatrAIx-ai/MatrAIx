  hobbies: '[''Street art exploration and sketching'', ''Traditional Mexican cooking and recipe experimentation'', ''Attending cultural festivals and community events'', ''Spontaneous road trips along the
    California coast'', ''Yoga and mindfulness practice'', ''Reading art history and Chicano literature'', ''DIY home décor and craft projects'', ''Informal photography of neighborhood life'', ''Collecting
    vintage postcards'']'
  career_goals: Adriana aspires to transform her artistic and culinary passions into a sustainable freelance career, such as opening a small studio that offers art classes, pop‑up cooking workshops, and
    sells handcrafted items and homemade sauces. She plans to earn her GED and pursue a certificate in community arts or culinary arts to formalize her talents while maintaining flexibility. Over the next
    several years, she hopes to launch a community art space in El Monte that showcases local Latino artists, hosts cultural festivals, and provides a supportive venue for youth learning creative skills.
    Additionally, she aims to become a cultural liaison who advocates for immigrant families, helping them access municipal resources and celebrate their heritage within the broader Los Angeles community.
