personas:
  professional: Adriana Nunez is a community‑focused freelance artist and culinary creator who blends sketching, mural work, and experimental cooking into pop‑up workshops, leveraging bilingual communication
    to bridge cultural gaps, yet often wrestles with deadlines and organization due to her spontaneous nature.
  sports: Adriana Nunez enjoys weekend runs along the Arroyo Seco, plays recreational soccer with the El Monte Warriors club, and cheers for the Los Angeles Dodgers and Los Angeles Lakers, balancing her
    fitness routine with yoga to stay flexible and manage stress.
  arts: Adriana Nunez is a passionate visual storyteller who captures El Monte’s vibrant street murals through sketching and photography, draws inspiration from Frida Kahlo’s surrealism and contemporary
    indie sounds like Café Tacvba, and creates papel picado and embroidered textiles that reflect her deep reverence for community traditions.
  travel: Adriana Nunez prefers spontaneous road trips along the Pacific Coast, often stopping in Laguna Beach for sunrise photography, exploring the historic streets of Santa Barbara, and dreaming of a
    future cultural immersion tour of Oaxaca’s artisan markets.
  culinary: Adriana Nunez excels at crafting homemade mole with ancho chilies, chocolate, and epazote, perfecting tamales stuffed with local pork and roasted pumpkin, and inventing zesty salsa verde using
    tomatillos and serrano peppers, all while hosting informal tasting gatherings for friends.
  core: Adriana Nunez is a curious, spontaneous creator who fuses art, food, and community advocacy, juggling bold ideas with occasional disorganization and a penchant for late‑night salsa experiments.
background:
  cultural: Adriana’s cultural background is rooted in her Mexican heritage; both of her parents immigrated from the state of Jalisco and raised her in a bilingual household in El Monte, California. Spanish
    was spoken at home, while English was used at school and in the broader community, giving her a bicultural perspective. Family traditions such as Día de los Muertos, Las Posadas, and weekly food-centered
    gatherings have deeply influenced her values and love for Mexican cuisine. She identifies with the broader Chicano/Latinx community, often participating in local mural projects, cultural festivals,
    and community center events that celebrate Mexican art, music, and folklore. Her Catholic upbringing and community-oriented upbringing instill a strong sense of responsibility toward preserving cultural
    identity while navigating life in the United States.
