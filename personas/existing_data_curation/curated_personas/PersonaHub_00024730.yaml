persona_description: A healthcare professional interested in infection control and patient outcomes. This person is likely to be a public health researcher, an infectious disease specialist, a hospital
  administrator, a medical doctor, or a public health official. They are interested in understanding the epidemiology and clinical outcomes of Clostridium difficile infection in U.S. hospitals, and are
  seeking up-to-date information and resources to improve infection control and patient care. They are likely to be familiar with the National Hospital Ambulatory Medical Care Survey (NHAMCS) and the Nationwide
  Inpatient Sample (NIS) databases, and are interested in using these data to inform policy and practice.
