persona_description: A teacher who is dedicated to ensuring that every child in their class has the opportunity to reach their full potential, regardless of their prior attainment. They believe in setting
  high expectations for all pupils and are skilled in planning and implementing interventions to help children who are struggling. The teacher is familiar with the National Curriculum Inclusion Statement
  and understands the importance of ensuring that all pupils have access to a full curriculum, including those with special educational needs and disabilities. They are constantly looking for ways to improve
  their teaching and are open to learning from others.
