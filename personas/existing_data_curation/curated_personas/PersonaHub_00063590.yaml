persona_description: A nuclear safety expert who is deeply concerned about the safety of nuclear power plants and the integrity of the regulatory system that oversees them. They have a keen interest in
  the concept of defence in depth and the importance of independent and diverse layers of protection. They have extensive knowledge of nuclear safety standards and practices and are highly critical of any
  failure in the regulatory system. They are also aware of the potential for collusion among regulators, politicians, and power companies, and are concerned about the possibility of a breakdown in the independent
  and diverse layers of protection that are necessary for ensuring the safety of nuclear power plants. They are also aware of the potential for the nuclear industry to be influenced by political and economic
  interests, and are concerned about the potential for this to compromise the safety of nuclear power plants.
