  career_goals: Robert aims to advance into senior leadership, targeting a Director of Operations role within the next three years and ultimately a COO position. He plans to earn a Six Sigma Black Belt
    and a PMP certification to solidify his expertise in continuous improvement and project delivery. An MBA is on his radar to deepen strategic and financial acumen. He is passionate about driving digital
    transformation initiatives that improve operational efficiency while reducing environmental impact, such as implementing renewable energy workflows in manufacturing. Beyond personal advancement, Robert
    wants to champion diversity by creating mentorship pipelines for underrepresented talent in STEM and operations, leveraging his own bicultural experience to foster inclusive workplaces. In the long
    term, he envisions founding a consultancy that helps mid‑size firms adopt lean, technology‑enabled processes.
