  hobbies: '[''Reading contemporary African American literature'', ''Writing reflective essays'', ''Cooking Southern‑Creole cuisine'', ''Gardening'', ''Hiking in Cedar Ridge Preserve'', ''Yoga'', ''Volunteering
    at youth mentorship program'', ''Leading a social‑justice book club'', ''Attending jazz concerts and arts festivals'', ''Genealogy research'', ''Traveling to Caribbean cultural sites'']'
  career_goals: She aims to become a senior partner within the next five years, leading a practice area that combines civil rights and family law to expand access to justice for under‑served communities
    in Ellis County. She plans to develop a pro‑bono clinic linked to the local bar association, and to earn certification in alternative dispute resolution. Long‑term, Jesula envisions serving as a district
    judge or policy advisor, influencing systemic reforms. She also seeks to publish scholarly articles on the intersection of law and cultural equity, and to mentor the next generation of Black attorneys,
    aligning her professional growth with her commitment to community empowerment.
