  career_goals: Although retired from formal employment, Harriette aims to stay actively involved in her community. She plans to expand her volunteer work at the Charlotte Regional Food Bank, mentor younger
    women through the local Chapter of Alpha Kappa Alpha, and document her family’s genealogy for future generations. She also dreams of turning her beloved pie recipes into a small home‑based bakery that
    supplies church events and local farmers’ markets, while continuing to lead the seasonal garden club at the senior center.
