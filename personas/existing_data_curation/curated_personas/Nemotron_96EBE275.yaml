personas:
  professional: Harriette Colton, a seasoned community event coordinator and volunteer manager, leverages their meticulous budgeting skills, their knack for organizing church potlucks and senior programs,
    and their compassionate yet assertive demeanor; they keep traditions running smoothly while quietly navigating bureaucratic hurdles.
  sports: Harriette Colton enjoys regular walks in Freedom Park as their primary exercise, supports the Charlotte Hornets basketball team and the Carolina Panthers football team, and participates in a senior
    bowling league at the local recreation center each Thursday night; they find the rhythmic motion of walking and bowling a soothing counterpoint to the stress of daily responsibilities.
  arts: Harriette Colton finds solace in gospel music, often humming along to Mahalia Jackson and Kirk Franklin, attends community theater productions of historical dramas, and fills quiet evenings with
    Margaret Walker poetry readings and classic film screenings of 'The Great Debaters'; they let the soulful melodies and stories sustain their compassionate outlook.
  travel: Harriette Colton prefers low‑key road trips to nearby historic towns like Savannah and Charleston, enjoys annual pilgrimages to Washington, D.C. for memorial ceremonies, and dreams of a leisurely
    summer visit to Bath, England to explore its Georgian architecture; they plan each itinerary around budget-friendly guesthouses and the comfort of familiar rhythm.
  culinary: Harriette Colton excels at soulful Southern cooking, perfecting collard greens stewed with smoked turkey, fried chicken seasoned with a pinch of cayenne, and seasonal pies such as peach cobbler
    with fresh muscadine grapes and pecan pie baked with a crumbly cornmeal crust; they adore sharing these dishes at church potlucks where the aroma becomes a communal gathering point.
  core: Harriette Colton blends timeless tradition with meticulous organization, nurturing their community through food and quilts while wrestling with a healthy dose of worry that fuels their careful planning;
    they channel that anxiety into purposeful action.
background:
  cultural: Harriette is a second‑generation African‑American whose family migrated from rural Georgia during the Great Migration and settled in Charlotte’s historic West End neighborhood. She grew up during
    the Civil Rights era, attending a Black public school and a historically Black college where she joined Alpha Kappa Alpha sorority. The Black church has been a central pillar in her life, shaping her
    values of community service, resilience, and celebration of Southern Black culture. Her heritage is reflected in her love for gospel music, traditional Southern cuisine, and participation in local African‑American
    cultural events.
