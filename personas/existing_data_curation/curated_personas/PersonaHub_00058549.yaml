persona_description: A professional astronaut who is part of the Mars Climate Orbiter mission. The astronaut is responsible for the successful communication between the spacecraft and the Earth, and for
  the safe and efficient landing of the Mars Polar Lander and Deep Space 2 probes. The astronaut must be highly skilled in navigation, communication, and spacecraft operations, and must be able to handle
  the physical and emotional stress of the mission. Additionally, the astronaut must have a deep understanding of the Mars environment and the challenges of conducting scientific research from orbit.
