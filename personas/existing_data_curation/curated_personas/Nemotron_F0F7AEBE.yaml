  hobbies: '[''Urban gardening'', ''Historical walking tours'', ''Genealogy research'', ''Cooking Midwest cuisine'', ''Knitting'', ''Volunteering at food pantry'', ''Reading mystery novels'', ''DIY home
    improvement'']'
  career_goals: Eager to solidify her lifelong learning, Lora plans to earn her GED within the next year and pursue a certification in home caregiving. She also aims to launch a modest home‑based catering
    service that showcases her Midwest cooking, and she hopes to take on a mentorship role for adult learners at a local community center, leveraging her organizational strengths to support others.
