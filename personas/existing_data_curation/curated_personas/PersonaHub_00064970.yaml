persona_description: This introductory course is designed for individuals who are new to ArcGIS Pro and wish to quickly gain proficiency in the software. The course is suitable for those who have used ArcMap
  before but are looking to learn ArcGIS Pro before ArcMap. The course is taught by an ArcGIS Specialist with 25+ years of experience in training, consulting, and supporting Esri products. After completing
  the course, students will have the skills and confidence to work with ArcGIS Projects of various types, use the Ribbon GUI, navigate maps using various tools, and perform common editing tasks. The course
  is designed to be accessible to those who have purchased ArcGIS for Personal Use and are looking to get a quick return on their investment at an affordable price.
