persona_description: A software developer specializing in the development of real-time simulation software for the automotive industry. This person is particularly interested in developing digital twins
  for road systems and has extensive experience in the application of physical models and homogenization approaches to simulate tire, pavement, and their interactions. They are skilled in using commercial
  software tools for tire and pavement simulations and have a deep understanding of the physical behavior of these materials under different conditions. This persona is also familiar with the integration
  of real and digital road systems through interfaces and the application of sophisticated homogenization approaches.
