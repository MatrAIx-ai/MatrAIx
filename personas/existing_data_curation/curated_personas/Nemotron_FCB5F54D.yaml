  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Genealogical research'', ''Reading historical fiction'', ''Nature walks and birdwatching'', ''Small-group church involvement'', ''Volunteer hospitality'',
    ''Puzzle solving'']'
  career_goals: Although retired from formal employment, Deanna aims to deepen her involvement in the Swanton community by leading the local historical society's oral‑history project, expanding the community
    garden, and organizing intergenerational workshops on traditional crafts and genealogy. She aspires to mentor younger volunteers, preserve her family's heritage through a written memoir, and maintain
    her own health and independence by staying active and engaged.
