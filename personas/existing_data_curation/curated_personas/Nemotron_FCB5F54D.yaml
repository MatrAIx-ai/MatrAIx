personas:
  professional: Deanna Kohl, a seasoned volunteer coordinator for Swanton's historical society, leverages her meticulous budgeting, event planning, and genealogical research skills to run the oral-history
    project and community-garden initiatives, applying her practical, structured mindset and gentle, cooperative disposition to mentor younger volunteers.
  sports: Deanna Kohl enjoys gentle morning walks with the Swanton Trails Club, roots for the Washington Capitals during hockey season, and attends the local senior softball league's occasional games, preferring
    low-impact exercise that harmonizes with her love of nature.
  arts: Deanna Kohl spends evenings listening to the Appalachian folk tunes of the Carter Family, weaving those melodies into her quilting rhythms while savoring the novels of Philippa Gregory and the classic
    films of Katharine Hepburn, which together shape her quiet, reflective artistic life.
  travel: Deanna Kohl favors carefully planned weekend getaways to nearby historic towns like Gettysburg and the Blue Ridge Parkway's scenic overlooks, while dreaming of a modest cultural tour of the Bavarian
    villages that echo her ancestral roots.
  culinary: Deanna Kohl delights in cooking hearty Appalachian fare, from simmering heirloom tomato and basil soup using garden harvest to baking buttery apple crumble pies with locally sourced cinnamon
    and nutmeg, showcasing her modest but confident kitchen skills.
  core: Deanna Kohl, a meticulous guardian of heritage and garden, balances her disciplined schedule with a quiet love for wildflower paths, an occasional habit of overwatering beloved roses, and a tendency
    to catalog every family story like a living archive.
background:
  cultural: Deanna is a white American who grew up in the Appalachian region of western Maryland. Her family's roots include German and English ancestry common to the area, and she was raised in a close‑knit,
    Protestant (Methodist) community that emphasized self‑reliance, modesty, and mutual aid. The cultural traditions of folk crafts, seasonal festivals, and a strong connection to the natural landscape
    inform her values of harmony, cooperation, and respect for heritage.
attributes:
  skills: '[''Organizational management'', ''Event planning and coordination'', ''Budgeting and financial oversight'', ''Record keeping'', ''Volunteer program management'', ''Horticulture and gardening'',
