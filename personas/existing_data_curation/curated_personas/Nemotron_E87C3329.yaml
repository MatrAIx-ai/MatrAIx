  career_goals: Although still in early childhood, Richard frequently talks about what he wants to be when he grows up. He dreams of becoming a teacher because he loves talking to others and sharing knowledge,
    and he also imagines himself as a scientist or engineer who can design things and explore how the world works. He aspires to lead a classroom or a community project where he can organize activities,
    help friends learn, and bring new ideas to life. His long‑term ambition is to combine his love of communication, practicality, and curiosity in a career that lets him both teach and create.
