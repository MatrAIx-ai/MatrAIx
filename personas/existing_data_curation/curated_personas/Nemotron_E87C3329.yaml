personas:
  professional: A budding engineer in the making, Richard loves turning LEGO bricks into intricate cityscapes, using methodical planning and a talkative, organized style that lets them coordinate block
    builds with classmates while dreaming of designing real bridges one day.
  sports: A spirited young athlete, Richard gleefully plays soccer for the Wellington Elementary Wildcats, tags friends on the playground in the fall, and avidly follows the Cleveland Browns and Cleveland
    Cavaliers, treating each game as an inspiration for their own backyard drills.
  arts: An enthusiastic performer, Richard belts out classic children’s songs by Raffi and The Wiggles, stages miniature theater scenes with LEGO figures and favorite picture‑book characters, and fills
    their notebook with doodles of cartoon heroes like Paw Patrol and Disney’s Mickey Mouse.
  travel: An inquisitive explorer, Richard has taken family road trips to the Cleveland Metroparks and Cedar Point amusement park, enjoys picnicking at nearby Lake Erie beaches, and dreams of visiting Washington,
    D.C.’s National Air and Space Museum to see real rockets.
  culinary: A budding foodie, Richard loves scooping scoops of mac and cheese topped with extra cheddar, munching on apple slices and carrot sticks, helping set the table for Fourth of July barbecues, and
    occasionally assisting Mom in buttering toast for their own snack.
  core: Richard is a curious, organized six‑year‑old who balances a love for LEGO engineering, soccer, and singing with a disciplined approach to chores, savings, and managing their seasonal allergies.
background:
  cultural: Richard is a White American child growing up in Wellington, a small town in Medina County, Ohio. His family participates in typical Midwestern community life, attending local school events,
    county fairs, and seasonal celebrations such as Fourth of July barbecues and Thanksgiving. The local public elementary school emphasizes cooperation, respect, and community service, reinforcing his
    sociable and cooperative nature. While his household may hold a blend of cultural traditions common in the region—such as listening to classic American folk music, celebrating holidays with family gatherings,
    and partaking in community volunteer activities—Richard’s upbringing also stresses practicality and organization, reflecting the broader Midwest values of reliability and modest ambition.
