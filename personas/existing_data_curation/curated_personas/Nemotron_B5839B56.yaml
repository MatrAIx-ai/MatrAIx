  hobbies: '[''Building block towers'', ''Interactive picture books'', ''Sensory play with water and sand'', ''Music and movement sessions'', ''Family cultural celebrations'', ''Nature walks in local parks'']'
  career_goals: As Sachiko grows, she aspires to channel her curiosity and practical mindset into a career that benefits others. Guided by her family's emphasis on education and community, she envisions
    becoming a pediatric nurse, an early‑childhood educator, or an environmental scientist—fields that combine hands‑on problem solving with tangible societal impact. She aims to maintain the organized,
    reliable approach she displays now, translating it into professional competence and compassionate service.
