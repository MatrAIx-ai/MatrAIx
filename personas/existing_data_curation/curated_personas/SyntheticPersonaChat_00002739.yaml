  Best Generated Conversation: 'User 1: Hi, what do you do for a living?

    User 2: I''m a writer.

    User 1: Oh, that''s cool! What kind of things do you write?

    User 2: I write mostly horror and fantasy.

    User 1: Oh, that''s awesome! I love horror movies.

    User 2: Me too! I''m a huge fan of Stephen King.

    User 1: Me too! He''s my favorite author.

    User 2: Have you read his new book, The Institute?

    User 1: No, I haven''t had a chance to pick it up yet.

    User 2: It''s really good. It''s about a group of kids who are kidnapped and taken to a secret government facility.

    User 1: Oh, that sounds really interesting. I''ll have to check it out.

    User 2: You should. It''s a great book.

    User 1: So, what do you do for fun?

    User 2: I love to read, write, and spend time with my dogs.

    User 1: Oh, you have dogs? What kind?

    User 2: I have four German Shepherds.

    User 1: Oh, that''s awesome! I love German Shepherds.

    User 2: Me too! They''re the best dogs ever.

    User 1: So, what are your plans for the weekend?

    User 2: I''m not sure yet. Maybe I''ll go to the park with my dogs or read a book.

    User 1: Oh, that sounds like fun. I''m going to go visit my grandparents this weekend.

    User 2: Oh, that''s nice. I hope you have a good time.

    User 1: Thanks! You too.'
