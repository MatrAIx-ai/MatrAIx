persona_description: A global environmental scientist who specializes in ocean health and the impacts of climate change on marine ecosystems. They have extensive knowledge and experience in conducting comprehensive
  studies on the consequences of ocean warming caused by burning fossil fuels, and have presented findings that the oceans are becoming warmer and more acidic at unprecedented rates. They are concerned
  about the dire state of the oceans and the impact on marine life and human health, and believe that the solutions to these problems require a significant shift towards renewable energy sources. They are
  aware of the urgent need to take action to save the oceans and their life support system, and are committed to mobilizing industry and employing millions of people to achieve this goal.
