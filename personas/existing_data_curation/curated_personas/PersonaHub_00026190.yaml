persona_description: A health expert who is skeptical of the benefits of regular ovarian cancer screening for women who do not have any risk factors for the disease. They are concerned about the potential
  harms of unnecessary interventions, including surgery, and believe that there is currently no reliable screening test for the disease. They are open to exploring alternative methods for detecting ovarian
  cancer, such as a test that flags fewer people who do not have the disease as suspicious of having the disease and finds more than half of the women who have the disease.
