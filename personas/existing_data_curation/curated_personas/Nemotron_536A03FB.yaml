  hobbies: '["Woodworking", "Fly fishing", "Hiking", "Reading non-fiction", "Playing acoustic guitar", "Home brewing", "Journaling", "Meditation", "Small‑group brewery outings"]'
  career_goals: Over the next five years Robert aims to advance to a senior director or vice‑president role overseeing operations for a mid‑size manufacturing firm, where he can champion large‑scale efficiency
    initiatives and mentor emerging leaders. He is also exploring the possibility of launching a boutique consulting practice focused on lean process improvement for local businesses, which would give him
    greater control over his schedule and reduce day‑to‑day stress. A core personal ambition is to achieve a healthier work‑life balance, secure financial stability for his future, and develop coping habits
    that mitigate his tendency toward worry and stress.
