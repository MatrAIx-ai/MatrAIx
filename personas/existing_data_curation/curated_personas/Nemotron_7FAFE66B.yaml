personas:
  professional: Ximena Hilario, an aspiring junior storyteller and meticulous LEGO urban planner, channels their vivid imagination into sketching fantasy heroes and building elaborate cityscapes, showcasing
    early talent for visual narrative, spatial reasoning, and disciplined project execution.
  sports: Ximena Hilario, a lively member of the local Under‑8 soccer league, models their play after favorite professional team FC Barcelona, dribbles on weekend matches at Central Park, and balances energetic
    practice with a disciplined warm‑up stretch routine learned from community coaches.
  arts: Ximena Hilario immerses themselves in artistic pursuits by sketching beloved fantasy characters, dancing to the reggaeton pulse of Bad Bunny and the salsa swing of Celia Cruz, and tapping imaginative
    drum beats on a child‑size percussion set while humming the melodies of Disney’s Frozen soundtrack.
  travel: Ximena Hilario dreams of trading backyard adventures for sun‑kissed days at the coastal town of San Juan del Sur, hopes to someday trek the stone paths of Machu Picchu, and currently fills travel
    cravings with weekend excursions to the city’s science museum and local nature park where they hunt for unique shells.
  culinary: Ximena Hilario eagerly helps prepare family recipes, mastering the fragrant rice‑and‑bean symphony of gallo pinto, the layered flavors of nacatamales, and the quick joy of cheese quesadillas
    topped with fresh mango salsa, all while proudly serving the dishes to friends at weekend playdates.
  core: Ximena Hilario is a bright, organized eight‑year‑old whose limitless imagination fuels a passion for sketching, LEGO city building, and rhythmic dancing, while their sociable spirit makes them the
    energetic heart of school, soccer fields, and family kitchens.
background:
  cultural: Ximena is a first‑generation Nicaraguan‑American growing up in a bilingual household where Spanish is spoken daily and English is used at school. Her family maintains Nicaraguan customs such
    as celebrating Semana Santa, preparing gallo pinto and nacatamales, and listening to folk music like marimba and palo de mayo. Living in Hialeah, she is surrounded by a vibrant Latin community that
    exposes her to Cuban and broader Caribbean influences, expanding her cultural repertoire. She attends a weekend Spanish enrichment program, participates in local cultural festivals, and takes pride
    in her heritage while embracing the multicultural environment of South Florida.
