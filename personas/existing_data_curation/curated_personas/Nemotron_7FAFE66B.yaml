    parks"]'
  career_goals: Ximena dreams of one day becoming an illustrator for children's books or a creative director who can bring her imaginative ideas to life. She is also fascinated by space and science, hoping
    to become an astronaut or a young scientist who discovers new worlds. At school she aspires to lead the art club, mentor younger classmates, and eventually combine her love for art, leadership, and
    community service in a career that inspires others.
