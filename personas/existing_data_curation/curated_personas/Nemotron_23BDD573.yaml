  hobbies: '[''Reading mystery novels'', ''Puzzle solving (crossword, sudoku)'', ''Journaling'', ''Gardening'', ''Cooking Chilean cuisine'', ''Yoga'', ''Solo hiking'', ''Watching documentaries'', ''Model
    building'', ''Listening to folk music'']'
  career_goals: Patricia aims to advance from a material mover to a supervisory role within the next three to five years. She plans to obtain an OSHA forklift certification renewal, complete a community-college
    associate program in logistics and supply chain management, and acquire a certification in Lean Warehouse Operations. Her ambition is to become a shift lead or warehouse supervisor, where she can apply
    her organized, detail-oriented approach to improve team performance, enhance safety metrics, and develop training programs for new hires. Long-term, she envisions a stable career that provides financial
    security for her family while allowing her to mentor others and continue refining operational processes.
