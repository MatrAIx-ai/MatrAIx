personas:
  professional: Paul Golson is a budding eSports competitor who merges disciplined strategic play in Fortnite and Rocket League with a hands-on inventive streak in Scratch coding and LEGO construction,
    and they channel their competitive and slightly skeptical nature into constant opponent analysis while maintaining a flexible, relaxed practice schedule.
  sports: Paul Golson dribbles for the Coeur d'Alene Community Center youth basketball league and his middle-school Tigers, dedicates weekends to pickup games and hiking, idolizes the Portland Trail Blazers
    for their fast-break style, pushes their vertical leap despite occasionally neglecting cool-downs, and they enjoy fishing trips as low-key cross-training.
  arts: Paul Golson channels their creativity through intricate LEGO builds and Scratch programming while vibing to synth-heavy scores by Jeremy Soule and the energetic pop of Imagine Dragons, frequently
    binge-watching gaming YouTubers like Markiplier for inspiration, and they regularly attend community fair performances featuring indie folk trio The Wildflower Collective.
  travel: Paul Golson loves spontaneous weekend camping along the Coeur d'Alene shoreline, dreams of backpacking through Yellowstone and Glacier National Parks, enjoys day trips to Seattle's Pike Place
    Market with their family, and they balance their adventure cravings with the practical need to stay within their parents' summer travel budget.
  culinary: Paul Golson prefers easy-going meals like pepperoni pizza, cheesy mac and cheese, and chicken nuggets, yet they proudly whip up fish tacos with fresh trout, lime, and cilantro after a lake day,
    showcasing their beginner-level cooking skills that blend family-style barbecues with a love for bold, citrusy ingredients.
  core: Paul Golson is a competitive, social teen whose love for gaming, basketball, and hands-on creation fuels a restless curiosity, even as their laid-back attitude and occasional skepticism keep them
    juggling structure and spontaneity.
background:
  cultural: Paul grew up in a predominantly white, middle-class neighborhood in Coeur d’Alene, Idaho, an area known for its scenic lake and forested mountains. The local culture emphasizes outdoor recreation,
    school sports, and community involvement, all of which have shaped his daily life. His family celebrates typical American holidays and values self-reliance, practical problem-solving, and a modest work
    ethic. The school environment reinforces a pragmatic approach to learning, while the close-knit community provides ample opportunities for group activities and volunteer projects.
