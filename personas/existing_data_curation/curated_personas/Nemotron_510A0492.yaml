  hobbies: '["Community theater","Book club","Hosting dinner parties","Gardening (vegetable and flower)","Cooking and recipe sharing","Volunteer work with reentry programs","Local history tours","Walking/hiking","Traveling
    (Midwest road trips)","Attending church socials","Bridge club","Art appreciation (museum visits)"]'
  career_goals: Mary aims to advance into a senior supervisory role where she can shape policy and program design for probation and correctional treatment services across the region. She envisions leading
    a collaborative reentry initiative that combines evidence‑based practices with community resources, securing grant funding to expand supportive housing and job‑training partnerships. Long‑term, she
    hopes to influence state legislation on restorative justice and to become a recognized speaker at professional conferences, sharing her pragmatic yet innovative approach. To support these goals, Mary
    plans to pursue a Master's in Social Work or Public Administration while continuing to mentor emerging professionals within her department.
