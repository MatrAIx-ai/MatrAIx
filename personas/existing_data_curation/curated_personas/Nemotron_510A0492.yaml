personas:
  professional: Mary Kelly is a seasoned probation and correctional services professional who excels at risk assessments, trauma-informed counseling, and data-driven program evaluation, using her talkative,
    sociable nature to build trust with clients and stakeholders while balancing her curiosity for new therapeutic approaches with a pragmatic focus on what works in a Midwestern setting.
  sports: Mary Kelly stays active through weekly walking tours of historic Normal neighborhoods, enjoys casual bowling nights with her book club, follows the Chicago Cubs and Chicago Bears with enthusiasm,
    and participates in a community garden fitness group, preferring low-impact activities that accommodate her knee concerns.
  arts: Mary Kelly is a vibrant community-theater enthusiast who shines in productions of classic plays like 'Our Town,' leads a historical-fiction book club, draws inspiration from the paintings of Georgia
    O'Keeffe and the music of Bob Dylan, and often weaves artistic themes into her dinner-party conversations.
  travel: Mary Kelly favors spontaneous weekend road trips across the Midwest, often detouring to historic sites such as the Abraham Lincoln Presidential Library in Springfield, the Indiana Dunes, and the
    river town of Galena, balancing her love for flexibility with occasional careful planning to accommodate her busy schedule.
  culinary: Mary Kelly delights in cooking with fresh garden produce, frequently preparing dishes like ratatouille, grilled salmon with dill, and corn chowder, mixing herbs such as basil, rosemary, and
    thyme, and loves hosting potluck dinners where lively discussion accompanies the shared meals.
  core: Mary Kelly blends a talkative, community-centered spirit with pragmatic curiosity, making her a compassionate yet slightly disorganized champion of reentry, the arts, and lifelong learning.
background:
  cultural: Mary grew up in a middle‑class, Irish‑American family in central Illinois, where the values of friendliness, hard work, and community service are deeply ingrained. Raised in the heart of McLean
    County, she experienced a blend of small‑town traditions—county fairs, high school sports, and church gatherings—alongside a strong Catholic heritage that emphasizes service and fellowship. Her bachelor's
    degree in the humanities broadened her perspective, fostering an appreciation for literature, history, and the arts, while reinforcing a respect for diverse viewpoints. This Midwestern upbringing, combined
    with her academic and professional experiences, shapes her pragmatic yet open‑minded outlook and her commitment to fostering inclusive, supportive environments for all members of her community.
