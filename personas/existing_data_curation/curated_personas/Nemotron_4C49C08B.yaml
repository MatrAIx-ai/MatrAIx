  career_goals: Nely aspires to become a senior director of community and mixed‑use property operations, where she can blend her managerial expertise with innovative, art‑centric programming. She aims to
    spearhead sustainability and prop‑tech initiatives in Phoenix’s growing residential complexes, develop culturally inclusive community events that reflect her Mexican heritage, and eventually launch
    her own boutique consultancy that designs engaging, socially vibrant living environments.
