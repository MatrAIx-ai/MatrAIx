  career_goals: As a six-year-old, Travis imagines big possibilities. He often talks about being an astronaut who can explore space, an artist who creates colorful murals, or a scientist who discovers new
    things. His calm confidence leads him to set simple, achievable goals, such as mastering a new level in his coding game, improving his soccer dribbling, and completing a large collaborative art project
    at school. He also expresses a desire to help his friends and family by sharing what he learns, hinting at an early ambition to become a teacher or mentor.
