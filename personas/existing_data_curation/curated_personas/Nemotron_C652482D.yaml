personas:
  professional: Travis Mccall is an aspiring junior engineer who loves building intricate LEGO vehicles, methodically plans each build, and envisions future inventions inspired by hands‑on museum workshops.
  sports: Travis Mccall plays on the Wilmington Little Lions U‑6 soccer team, idolizes the Philadelphia Eagles for their teamwork, and enjoys the after‑practice ritual of kicking a ball against the park
    fence while cheering for the local high‑school basketball squad.
  arts: Travis Mccall spends weekends at community art workshops, drawing vibrant scenes inspired by gospel rhythms and jazz classics like Ella Fitzgerald, while also creating simple beats on a miniature
    keyboard after listening to Stevie Wonder.
  travel: Travis Mccall prefers short family road trips, having explored the Philadelphia Museum of Art and the historic streets of Washington, D.C., and dreams of visiting the natural trails of Shenandoah
    National Park for leaf‑collecting adventures.
  culinary: Travis Mccall delights in homemade mac and cheese with crunchy breadcrumbs, loves the sweet taste of mango slices, and enjoys experimenting with colorful vegetable arranging on pizza, often
    helping to stir batter for pancakes.
  core: Travis Mccall blends a calm, methodical curiosity with a love for LEGO storytelling, leaf collections, and rhythmic music, while occasionally losing focus during long storytime sessions.
background:
  cultural: Travis is raised in a Black family rooted in the Wilmington, Delaware community. His parents celebrate African-American cultural traditions such as Juneteenth, Black History Month, and family
    storytelling sessions that incorporate oral histories and music. He attends a local public elementary school that emphasizes multicultural education and participates in community programs at the Wilmington
    Children’s Museum and the Delaware History Museum, where exhibits on African-American contributions inspire him. The neighborhood’s church and community center host art workshops and music gatherings,
    exposing Travis to gospel, jazz, and contemporary R&B in a supportive environment. This cultural tapestry nurtures his appreciation for art, music, and collective history while reinforcing values of
    resilience, respect, and curiosity.
