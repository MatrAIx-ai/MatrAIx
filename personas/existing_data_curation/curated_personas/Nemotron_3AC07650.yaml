personas:
  professional: Consuelo Robayo is a seasoned transit bus driver in Southern California who leverages bilingual fluency, meticulous vehicle inspections, and a keen eye for community murals to optimize routes,
    and now aims to transition into senior driver training and operations planning, where they can embed cultural landmarks into the public transit experience.
  sports: Consuelo Robayo follows the Los Angeles Dodgers and the LA Rams, participates in a local hiking club that tackles the San Bernardino peaks on weekends, and they stay active through morning garden
    work and occasional yoga, preferring solitary or small‑group outdoor activities over team sports.
  arts: Consuelo Robayo roams mural districts, collects vintage postcards, paints watercolors of urban scenes, and they read works by authors such as Sandra Cisneros and Juan Rulfo while listening to regional
    folk singers like Lila Downs, weaving these artistic experiences into daily conversations with passengers.
  travel: Consuelo Robayo prefers short road trips that combine art and nature, such as a weekend pilgrimage to the mural‑rich streets of Santa Ana, a sunrise hike in the San Gorgonio Wilderness, and an
    annual visit to the historic Mission San Juan Capistrano, and they plan itineraries on a flexible schedule that leaves room for spontaneous detours.
  culinary: Consuelo Robayo masters traditional Oaxacan cuisine, regularly preparing mole negro, tlayudas, and chapulines using ingredients like corn masa, dried chiles, epazote, and Oaxacan cheese, and
    they share these meals with family during community gatherings, while also experimenting with herb‑infused teas from their garden.
  core: Consuelo Robayo blends a disciplined, safety‑focused bus driving career with a spontaneous passion for murals, watercolor painting, and regional flavors, and they navigate life with quiet curiosity,
    competitive drive, and a habit of collecting postcards wherever the road leads.
background:
  cultural: Consuelo was raised in a Mexican‑American household in Southern California, where Spanish was spoken daily and Mexican customs blended with the multicultural environment of the Inland Empire.
    Her family originates from Oaxaca, and they celebrate traditions such as Día de los Muertos, quinceañeras, and communal cooking of regional dishes. She feels a deep connection to the vibrant Chicano
    art scene that decorates the streets of San Bernardino and Los Angeles, and she takes pride in preserving her heritage while navigating a bicultural identity that influences both her professional life
    and personal passions.
attributes:
  skills: '["Commercial driver''s license (CDL)", "Safe driving techniques", "Vehicle maintenance basics", "Bilingual communication (English-Spanish)", "Customer service", "Route optimization", "Crisis
