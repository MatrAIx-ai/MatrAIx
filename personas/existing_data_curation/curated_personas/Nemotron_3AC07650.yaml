  hobbies: '["Watercolor painting", "Visiting mural tours", "Reading Mexican and Chicano literature", "Cooking traditional Oaxacan dishes", "Listening to regional folk music", "Gardening", "Hiking in the
    San Bernardino Mountains", "Documentary film watching", "Participating in a small book club"]'
  career_goals: Consuelo aspires to transition from front‑line driving to a senior driver trainer role, where she can pass on her safety expertise and route‑planning insights to new drivers. Long‑term,
    she aims to move into a transit operations planning position, influencing schedule design and incorporating cultural landmarks—such as murals and historic sites—into routes to enrich passenger experience.
    Additionally, she hopes to launch a community‑focused art outreach program that partners local artists with the transit system to showcase culturally relevant artwork on buses and at stations.
