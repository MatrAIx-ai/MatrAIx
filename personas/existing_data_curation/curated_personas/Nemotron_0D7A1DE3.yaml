  hobbies: '[''road-trip photography'', ''street art exploration'', ''live music and open-mic attendance'', ''acoustic guitar playing'', ''vinyl record collecting'', ''Southern cooking'', ''community trivia
    nights'', ''video gaming'', ''science-fiction reading'']'
  career_goals: Andrew aims to move from a driver‑sales role to a supervisory position within a regional logistics firm, eventually managing a small fleet of trucks. He plans to complete an associate degree
    in logistics and supply chain management, obtain a CDL endorsement for hazardous materials, and later launch his own boutique transportation service that doubles as a mobile pop‑up gallery for emerging
    artists. His competitive drive fuels his ambition to become a recognized leader in the industry while achieving financial independence and creative fulfillment.
