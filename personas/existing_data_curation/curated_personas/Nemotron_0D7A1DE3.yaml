personas:
  professional: Andrew Scott, a heavy‑truck driver‑sales specialist who blends hands‑on mechanical troubleshooting, GPS‑based route optimization, and charismatic customer service with a relaxed, flexible
    planning style, using social‑media marketing to boost bookings while eyeing a supervisory role that will let them lead a small fleet and turn their logistics expertise into a mobile pop‑up gallery for
    emerging artists.
  sports: Andrew Scott, a fan of the Charleston Battery soccer team and the Clemson Tigers football program, joins a local beach‑volleyball league in summer, plays pickup basketball at the Charleston Recreation
    Center, and they ride with the Coastal Cyclists club on weekends, though their flexible schedule means workouts are often spontaneous rather than regimented.
  arts: Andrew Scott, who spends evenings at Wormsloe open‑mic nights strumming acoustic guitar, curates a personal collection of vintage Southern rock vinyl from the Allman Brothers and jazz legends like
    John Coltrane, and tours Charleston’s street‑art murals featuring works by local creator Mona Caron, and they find inspiration for both their photography and their dream of a mobile pop‑up gallery.
  travel: Andrew Scott, an impulsive road‑trip enthusiast, maps out routes on the fly using logistics software, has already photographed the historic squares of Savannah, the Blue Ridge Parkway’s fall foliage
    in Asheville, and New Orleans’ French Quarter, and now they hope to explore Lisbon’s vibrant graffiti scene while balancing a modest travel budget that prioritizes experience over luxury.
  culinary: Andrew Scott, a self‑taught Southern cook who masters smoky BBQ pork ribs glazed with bourbon and a signature shrimp‑and‑grits dish seasoned with smoked paprika, Andouille sausage, and fresh
    Gulf shrimp, and they enjoy experimenting with dry rubs including brown sugar, cumin, and cayenne, yet sometimes overcook when distracted by a new playlist.
  core: Andrew Scott is a talkative, art‑obsessed truck driver who blends logistics savvy with spontaneous road‑trip photography, vintage vinyl hunting, and a competitive drive for leadership, and they
    battle chronic worry while habitually abandoning detailed plans in favor of last‑minute improvisation.
background:
  cultural: Andrew was raised in a middle‑class white family in Summerville, South Carolina, a town steeped in Southern tradition and hospitality. His upbringing featured church‑centered community life,
    family gatherings centered around regional cuisine like BBQ and shrimp‑and‑grits, and a strong emphasis on personal independence and a relaxed approach to scheduling. The proximity to historic Charleston
    exposed him to a diverse arts scene that fueled his curiosity for unconventional ideas, while the rural outskirts of Dorchester County imparted practical skills in vehicle work and an appreciation for
    the region's agricultural roots. This cultural mix supports his sociable, flexible personality and shapes his artistic interests.
