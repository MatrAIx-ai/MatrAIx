personas:
  professional: Abdelwahab Joshi, a 30‑year‑old mechanical engineer, blends meticulous CAD modeling and finite‑element analysis with a hands‑on tinkering spirit, leading cross‑functional product teams while
    remaining adaptable to shifting project scopes, and they mentor junior engineers with a balance of structure and pragmatic flexibility.
  sports: Abdelwahab Joshi plays middle‑order batsman for a local cricket league, follows the New York Knicks for basketball and the New Jersey Devils for hockey, and spends weekend mornings hiking the
    Delaware Water Gap Trail, often testing a self‑designed modular backpack for gear durability.
  arts: Abdelwahab Joshi unwinds by strumming acoustic guitar to the tunes of John Mayer and Ed Sheeran, binge‑watches sci‑fi series like \"The Expanse\" and \"Westworld\", and attends community theater
    productions of Shakespeare’s plays, occasionally sharing a homemade playlist with fellow cricket teammates.
  travel: Abdelwahab Joshi favors short, well‑planned road trips to the Pocono Mountains and occasional tech‑focused overseas trips such as Maker Faire Berlin, balancing a budget‑conscious approach with
    a craving for hands‑on workshops and scenic hiking trails.
  culinary: Abdelwahab Joshi loves cooking aromatic chicken tikka masala, paneer butter masala, and experiments with masala‑spiced quinoa, relying on fresh cilantro, ginger, and roasted cumin, though they
    sometimes over‑spice dishes, prompting a quick remedy of a dollop of yogurt.
  core: Abdelwahab Joshi is a structured yet flexible mechanical engineer who channels curiosity into gadgets, guitar strings, and gourmet spices, balancing disciplined career goals with spontaneous hobbies
    and a pragmatic approach to money and health.
background:
  cultural: Abdelwahab is a first‑generation American whose parents emigrated from the Indian subcontinent, bringing a blend of South Asian traditions into his upbringing in Edison, New Jersey—a hub for
    the Indian‑American diaspora. The household observes major festivals such as Diwali, Eid, and Holi, and encourages fluency in both English and Hindi (or Gujarati). Family gatherings emphasize respect
    for elders, collective responsibility, and a strong emphasis on education and career achievement. This cultural milieu fosters Abdelwahab’s appreciation for structured planning, community orientation,
    and adaptability, allowing him to navigate both his heritage and the broader American context with ease.
