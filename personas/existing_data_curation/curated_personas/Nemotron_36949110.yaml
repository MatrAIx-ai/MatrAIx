  career_goals: Abdelwahab aims to progress into senior engineering leadership within the next five years, seeking a role where he can oversee end‑to‑end product development and mentor junior engineers.
    He plans to obtain his Professional Engineer (PE) license and pursue a master’s degree in engineering management to broaden his strategic perspective. Ultimately, he envisions directing large‑scale,
    sustainability‑focused projects for a manufacturing firm in New Jersey, while maintaining a work‑life balance that allows flexible schedules and occasional remote work.
