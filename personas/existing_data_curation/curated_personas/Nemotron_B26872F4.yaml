    of facility management software'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Southern and Texas barbecue cooking'', ''Reading mystery novels'', ''Church choir participation'', ''Community volunteering and youth mentorship'', ''Hiking on
    nature trails'', ''Genealogy research'', ''Listening to jazz and blues music'']'
  career_goals: Shenika aims to advance into a senior supervisory role, such as Facilities Manager, for a larger commercial or educational campus within Williamson County. She plans to obtain certifications
    in HVAC (EPA), OSHA safety, and a Certified Facility Manager (CFM) credential to solidify her expertise. Long‑term, she envisions launching her own small maintenance contracting business that offers
    affordable, reliable services to local homeowners and small businesses, while also mentoring younger workers—especially women of color—entering the trades. She is also interested in leading energy‑efficiency
    initiatives to reduce operational costs and environmental impact for the facilities she oversees.
