personas:
  professional: Shenika Carter is a seasoned facilities maintenance specialist in Williamson County, whose hands‑on expertise in HVAC, electrical, plumbing, carpentry, welding, and locksmithing—paired with
    a methodical, organized mindset—makes her the go‑to problem‑solver for complex repairs and preventive maintenance, and she is actively pursuing EPA, OSHA, and Certified Facility Manager certifications
    to qualify for a senior supervisory role.
  sports: Shenika Carter stays active by hiking the Balcones Canyonlands Preserve with a local senior walking club, roots for the Dallas Cowboys and Austin FC during football and soccer seasons, and occasionally
    joins a recreational softball league with friends from her church.
  arts: Shenika Carter expresses her creativity through vibrant quilting inspired by heirloom motifs, loses herself in mystery novels by Agatha Christie and Tana French, sings soulful gospel in her church
    choir, and finds artistic solace in the paintings of Georgia O'Keeffe and the music of the Mississippi Mass Choir.
  travel: Shenika Carter prefers road‑trip adventures that blend family history and culinary curiosity, having explored the historic streets of Savannah, the jazz‑filled French Quarter of New Orleans, and
    the genealogy archives in Washington, D.C., while dreaming of a leisurely week in Tuscany’s countryside for its wine and cuisine.
  culinary: Shenika Carter, an avid home chef, whips up smoky Texas‑style brisket and pork ribs seasoned with a brown‑sugar‑apple‑cider rub, sides up with collard greens flavored by smoked ham hocks, and
    fresh herb‑laden garden salads featuring heirloom tomatoes and basil, all while perfecting her family’s secret mayonnaise‑based barbecue sauce.
  core: Shenika Carter blends a methodical trades expertise with a vibrant creative spirit, juggling meticulous facility upkeep by day and colorful quilting, barbecue, and community choir by night, though
    she occasionally hoards tools and forgets to schedule dental appointments.
background:
  cultural: Shenika identifies as African American with deep Southern roots, having been raised in Texas during a time of significant social change. Her cultural identity is shaped by the strong sense of
    family, community, and faith that characterizes many Black Texan families. She carries forward traditions of soulful music, flavorful cooking, and storytelling passed down through generations. Active
    involvement in her local Baptist church reinforces values of service, resilience, and mutual support. As a Black woman in a traditionally male‑dominated trade, she embraces her role as a trailblazer,
    drawing inspiration from the legacy of perseverance and communal uplift that defines her cultural heritage.
