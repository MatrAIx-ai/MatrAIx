persona_description: A researcher and scientist with a passion for archaeology and radiocarbon dating, particularly interested in the Middle and Upper Palaeolithic of Europe, reservoir effects in 14C, and
  the application of Bayesian calibration methods to archaeological dating. They have expertise in direct radiocarbon dating and DNA analysis of archaeological samples, as well as the dating of novel sample
  types and sample pretreatment chemistry. They have a background in the study of carbon isotopes and have conducted research on the earliest directly dated rock paintings from southern Africa using AMS
  radiocarbon dating.
