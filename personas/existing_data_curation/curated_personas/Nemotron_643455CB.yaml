  career_goals: Looking ahead, Carmen aims to leverage her hands‑on experience to pursue a degree in hospitality management at a community college, with the long‑term ambition of becoming a restaurant manager
    and eventually opening her own farm‑to‑table café that highlights local Lancaster County produce. She is also interested in gaining certifications in food safety and barista skills, and she hopes to
    develop strong managerial and entrepreneurial skills while staying connected to her community through events and local sourcing.
