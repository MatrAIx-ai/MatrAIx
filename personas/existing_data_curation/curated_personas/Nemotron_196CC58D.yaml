  hobbies: '[''Fishing'', ''Gardening'', ''Historical non-fiction reading'', ''Genealogy research'', ''Chess'', ''Volunteer event coordination'']'
  career_goals: As he approaches retirement, Ashraf aims to shift from daily call handling to a mentorship and process-improvement role within his organization. He hopes to become a senior advisor or shift
    supervisor, where he can train new representatives, refine workflow documentation, and contribute to higher customer-satisfaction scores. Additionally, he plans to volunteer his customer-service expertise
    to local small businesses, helping them establish reliable communication practices.
