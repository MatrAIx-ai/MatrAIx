persona_description: A resource manager or conservationist who is interested in understanding and conserving riparian habitats, particularly those needed for the survival of the western yellow-billed cuckoo.
  This person may be working for a government agency, a non-profit organization, or a private company that manages natural resources. They may be familiar with the Endangered Species Act and have experience
  in habitat restoration and management. They are likely to have a strong background in ecology and environmental science, and may have worked on similar research projects in the past.
