personas:
  professional: Guillermo Mola, a disciplined middle‑school student, merges sketching, digital animation, and robotics club projects, aiming to become a multimedia engineer who builds interactive art installations
    while maintaining an organized workflow that satisfies high standards.
  sports: Guillermo Mola, an avid weekend hiker and youth soccer player for the Deer Park Tigers, roots for the Houston Astros and follows the Houston Rockets, channeling disciplined training into daily
    stretch routines and Saturday trail runs at the nearby nature preserve.
  arts: Guillermo Mola, a dedicated sketcher who idolizes Frida Kahlo and Diego Rivera while binge‑reading graphic novels by Alan Moore, also strums acoustic renditions of folk songs by Chavela Vargas and
    modern indie tracks by Vampire Weekend, weaving these influences into short digital animations.
  travel: Guillermo Mola, a curious explorer, has road‑tripped to San Antonio’s River Walk and taken a family vacation to Oaxaca’s markets, yet dreams of wandering Barcelona’s street murals and hiking the
    Grand Canyon, preferring meticulously planned itineraries mixed with spontaneous photo‑journalism stops.
  culinary: Guillermo Mola, a budding home‑chef, loves teaming up with family to roll handmade tortillas, simmer rich mole with ancho chilies and chocolate, and grill carnitas tacos, all while perfecting
    their salsa verde using fresh cilantro and tomatillos.
  core: Guillermo Mola is a disciplined teen artist‑engineer who blends cultural storytelling with robotics, but habitually stays up late sketching after homework, often forgetting to finish chores.
background:
  cultural: Guillermo was raised in a Mexican‑American household in Deer Park, Texas, where Spanish and English are spoken interchangeably at home. Family traditions such as celebrating Día de los Muertos,
    cooking authentic Mexican meals, and participating in local cultural festivals have shaped his identity. He attends a public middle school in Harris County, interacting with a diverse student body,
    while staying closely connected to his community’s Mexican roots through church gatherings, community centers, and visits to the nearby Houston Museum of Fine Arts, which often features Latin American
    exhibitions. This bicultural environment nurtures his appreciation for both Mexican artistic heritage—such as the works of Frida Kahlo and Diego Rivera—and contemporary American culture, influencing
    his creative outlook and personal values.
