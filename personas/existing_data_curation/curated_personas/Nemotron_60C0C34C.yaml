  hobbies: '[''Sketching and drawing'', ''Digital illustration and animation'', ''Guitar playing'', ''Cooking Mexican dishes'', ''Robotics club projects'', ''Journaling'', ''Reading graphic novels and sci‑fi'',
    ''Hiking and nature exploration'']'
  career_goals: Guillermo aspires to merge his passion for visual art with his disciplined, organized mindset by pursuing a career in graphic design and interactive media. He aims to attend a specialized
    arts high school, then earn a degree in graphic design or digital media where he can study user‑experience design, animation, and multimedia storytelling. Long‑term, he hopes to work as a UI/UX designer
    or creative director for a technology company that values cultural diversity and innovative ideas. He also envisions using his bilingual background to create designs that resonate with both Mexican‑American
    and broader audiences. Through continuous practice and portfolio development, Guillermo seeks to achieve a professional reputation for delivering aesthetically compelling and functionally clear visual
    solutions.
