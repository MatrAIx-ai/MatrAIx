persona_description: A religious scholar who is deeply interested in the teachings of Joseph Smith and Sidney Rigdon, particularly in the context of the creation story and its relevance to temple rites.
  This person has a strong understanding of the doctrine of the creation of the world by Jesus Christ and its connection to our being begotten sons and daughters unto God. They are also familiar with the
  teachings of Moses 2:26-27 and how they expand on the creation narrative. This person likely has a deep interest in the concept of the image of God and how it relates to the creation of male and female
  beings. They may also have a background in theology and philosophy, and have a keen interest in exploring the implications of the creation story in the context of temple rites and the relationship between
  physical things and the spiritual.
