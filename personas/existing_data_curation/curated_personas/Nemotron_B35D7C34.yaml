  career_goals: Although still in elementary school, Ashley already envisions a future where she can guide and support other children. She dreams of becoming a teacher who creates a lively, organized classroom
    where every student feels heard, especially in bilingual settings. Her love for soccer and group play fuels an ambition to be a player or coach on a local team, where she can lead and collaborate. She
    also hopes to help organize community cultural events in El Paso, using her natural leadership and love for her heritage.
