personas:
  professional: Ashley Delgado is a budding junior soccer player who combines a love for clear rules with spontaneous on‑field creativity, using their sociable energy to organize quick pick‑up games during
    recess while instinctively taking charge when teammates need direction.
  sports: Ashley Delgado plays on the local youth soccer league team, the Riverside Rovers, and eagerly watches the city’s professional basketball squad, the Hawks, cheering loudly during games and mimicking
    their moves during practice.
  arts: Ashley Delgado delights in drawing comic strips, practicing dance steps from family traditions, and listening to a blend of pop hits by Ariana Grande and local folk tunes by Mateo, often humming
    the melodies while coloring intricate designs.
  travel: Ashley Delgado loves family road trips to the seaside boardwalk, dreams of seeing the bright lights of Disneyland, and plans to visit the Grand Canyon next summer, preferring spontaneous stops
    at quirky roadside attractions over rigid itineraries.
  culinary: Ashley Delgado enjoys helping in the kitchen by assembling tacos with seasoned pork, fresh lime, and diced tomatoes for salsa, proudly topping each bite with cilantro, and boasts a budding skill
    in rolling homemade guacamole.
  core: Ashley Delgado is a lively, rule‑loving soccer enthusiast who swaps stickers compulsively, forgets to tidy up after play, but always brightens the group with spontaneous dance moves and a never‑ending
    enthusiasm for tasty tacos.
background:
  cultural: Ashley’s cultural background is rooted in her Mexican heritage, which is woven into daily life in her El Paso household. She speaks Spanish at home and English at school, seamlessly moving between
    the two languages. Family gatherings often feature traditional dishes like tamales and pozole, and seasonal celebrations such as Día de los Muertos and Cinco de Mayo are marked with music, dance, and
    vibrant decorations. Growing up on the U.S.–Mexico border, she experiences a blend of American and Mexican influences, fostering a strong sense of community, respect for elders, and pride in her heritage.
