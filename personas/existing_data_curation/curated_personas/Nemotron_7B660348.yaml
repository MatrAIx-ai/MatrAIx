  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Speculative fiction book club'', ''Nature walks/hiking'', ''Mindfulness meditation'', ''Journaling'', ''Ukulele playing'', ''Knitting'', ''Cooking'',
    ''Volunteering at community art program'']'
  career_goals: Christina aspires to complete a BFA in Visual Arts or an Art History degree while working part‑time, positioning herself for a role as an assistant curator at a regional museum or as an
    art therapist. She aims to combine her artistic talent with her empathetic nature by designing therapeutic art workshops for youth in her community. She also hopes to publish a collection of illustrated
    poetry and develop a modest freelance illustration practice that offers flexibility and financial stability, helping to mitigate her sensitivity to stress. Long‑term, she envisions contributing to cultural
    preservation projects that celebrate New England's heritage while maintaining a work-life balance that supports her mental well‑being.
