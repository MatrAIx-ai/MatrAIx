  hobbies: '["Abstract painting", "Creative writing (poetry & short stories)", "Digital photography", "Attending art galleries & science talks", "STEM mentoring", "Community gardening", "Experimental cooking",
    "Exploring historic New England sites", "Learning generative art software"]'
  career_goals: Kailyn aims to continue expanding her knowledge and sharing her curiosity with others. She aspires to develop a series of interdisciplinary workshops that combine scientific inquiry with
    artistic expression for senior and youth participants in Medford. She dreams of publishing an illustrated collection of speculative short stories that explore scientific concepts through narrative.
    Kailyn also hopes to contribute to local historical projects, documenting the stories of longtime Medford residents, and to volunteer as a mentor for emerging artists and coders. Though she is no longer
    pursuing formal employment, her ambition is to leave a lasting, creative legacy within her community and to keep learning new technologies such as AI‑assisted art tools.
