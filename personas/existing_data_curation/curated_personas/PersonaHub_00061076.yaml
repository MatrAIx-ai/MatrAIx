persona_description: A researcher at the University of Bath who specializes in developing new compounds that can be used in a wide range of materials to combat hospital bacteria, specifically focusing on
  the development of anti-bacterial plastics and coatings. They have a particular interest in understanding the genes and proteins that allow bacteria to become resistant to conventional antibiotics and
  have already made new compounds containing zinc, copper, and silver that have been effective against common hospital bacteria but are non-toxic to human cell growth.
