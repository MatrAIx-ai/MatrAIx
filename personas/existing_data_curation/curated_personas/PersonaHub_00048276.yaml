persona_description: A scientist or researcher who specializes in the development and testing of vaccines, particularly those based on cell culture systems and the use of baculoviruses. They are knowledgeable
  about the challenges and complexities involved in growing and testing vaccines, including the use of eggs as a source of material, and the potential implications of taking eggs out of the process for
  the production of flu vaccines. They are interested in the potential benefits of using insect cell lines for vaccine production and how it could be used to mitigate the risks associated with growing flu
  virus in eggs.
