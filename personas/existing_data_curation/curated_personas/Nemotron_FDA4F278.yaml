  career_goals: At this early stage Jenny’s goals focus on mastering foundational milestones that will support later independence and competence. She is eager to walk steadily, expand her vocabulary, and
    feel confident in small‑group settings like a preschool classroom. Her competitive streak shows in wanting to build the tallest block tower or be the first to finish a simple puzzle, hinting at a future
    ambition for a role that rewards practical problem‑solving and individual achievement—such as a technical, analytical, or project‑focused career. Ultimately, she aims to become self‑reliant and capable
    of navigating both new ideas and established routines.
