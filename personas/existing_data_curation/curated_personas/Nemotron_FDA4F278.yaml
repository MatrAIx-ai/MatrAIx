personas:
  professional: Jenny Wang, a one-year-old budding explorer of cause-and-effect, already demonstrates future engineer instincts by methodically stacking colorful blocks, balancing curiosity for new shapes
    with a practical focus on stable structures, and showing a surprisingly competitive streak when racing to finish a puzzle before a sibling, and they proudly point at the completed tower with a bright
    smile.
  sports: Jenny Wang, despite being a one‑year‑old, attends a toddler gymnastics class on Tuesdays, idolizes the local professional baseball team the Chicago Cubs during family TV time, cheers from the
    sidelines in a miniature Cubs cap while practicing crawling sprints in the backyard, and they proudly wave a tiny Cubs flag after each successful crawl.
  arts: Jenny Wang immerses in early musical delight, humming along to the classic Twist and Shout cover by the Beatles on children's playlists, enjoying the animated antics of Sesame Street’s Elmo, watching
    short Pixar shorts like Piper with wide‑eyed fascination, and they often clap enthusiastically after each familiar tune.
  travel: Jenny Wang's travel persona is that of a stroller‑bound explorer, loving weekend trips to the nearby botanical garden, eagerly looking forward to a family vacation at Disney World in Florida,
    dreaming of a future visit to the Eiffel Tower with their parents, and they often point at passing cars with an inquisitive gaze.
  culinary: Jenny Wang's culinary persona features a penchant for sweet potato puree seasoned lightly with a pinch of cinnamon, the occasional dab of avocado mash, and a growing fascination with crunchy
    baby puffs shaped like stars, though they notoriously throw half the mashed peas on the floor during mealtime, and they giggle at the mess they create.
  core: Jenny Wang, a one‑year‑old bundle of curious competitiveness, balances playful experimentation with practical caution, yet wrestles with intense bouts of anxiety that turn every new experience into
    both a thrilling and unsettling adventure, and they often retreat to a familiar blanket for comfort.
background:
  cultural: Jenny is raised in Youngsville, North Carolina, a small‑town Southern community. Her family’s daily life reflects regional values of close family ties, community participation, and a blend of
    modern and traditional influences. She attends local church gatherings, enjoys family meals that include Southern staples, and participates in community events such as the county fair and seasonal festivals.
    While her cultural setting is rooted in the broader Southern American context, her upbringing also incorporates contemporary elements like early childhood education programs and diverse media exposure,
    providing a balanced cultural foundation.
