personas:
  professional: Darla Singer, a budding digital storyteller, leverages Scratch to craft short animated narratives and tinkers with robotics kits, channeling their love for structure and problem‑solving
    into disciplined daily coding sessions.
  sports: Darla Singer, a member of the local Soccer Stars youth club and an avid fan of the Chicago Cubs, balances structured after‑school practice with weekend hikes, always sporting their lucky blue
    headband for extra confidence.
  arts: Darla Singer, a diligent piano student, spends evenings practicing Debussy's Arabesque while drawing inspiration from Yiruma's melodic piano pieces and the cinematic magic of Studio Ghibli’s Spirited
    Away, and eagerly devours fantasy sagas by Brandon Sanderson, showcasing their blend of artistic curiosity and disciplined practice.
  travel: Darla Singer, who prefers meticulously planned weekend getaways, enjoys revisiting the interactive exhibits at Boston’s Museum of Science and day trips to nearby state parks, while dreaming of
    a structured tour of Scotland’s historic castles.
  culinary: Darla Singer, an enthusiastic herb gardener, delights in whipping up basil pesto pasta and mint‑infused lemonade, yet often forgets to set the timer, resulting in occasional burnt toast, revealing
    their enthusiastic yet sometimes absent‑minded cooking style.
  core: Darla Singer balances a love for quiet creativity with disciplined routines, turning puzzles, piano, and Scratch animation into a structured yet imaginative world, while meticulously budgeting allowance
    and managing a mild allergy with proactive care.
background:
  cultural: Darla grew up in the suburban community of Matthews, North Carolina, a town with strong Southern hospitality and a close‑knit neighborhood feel. Her family is part of the local white middle‑class
