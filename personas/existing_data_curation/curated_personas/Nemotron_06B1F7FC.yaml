personas:
  professional: Sandra Jenkins, a 29‑year‑old teaching assistant known for seamlessly blending African‑American literature into literacy lessons, leverages her curiosity and relaxed yet compassionate style
    to mentor small groups and craft STEAM projects that keep elementary students engaged despite occasional disorganization.
  sports: Sandra Jenkins, a weekend bird‑watcher who follows the Georgia Bulldogs football team and participates in a local yoga circle, prefers gentle hikes on nearby nature trails over organized team
    sports, yet occasionally joins a community softball league for social interaction.
  arts: Sandra Jenkins, an avid watercolorist who captures Southern sunsets in a spontaneous style, regularly visits the Atlanta Art Fair, enjoys community theater productions of the play A Raisin in the
    Sun, and finds inspiration in the sounds of Nina Simone, John Coltrane, and Erykah Badu.
  travel: Sandra Jenkins, who favors low‑key road trips over elaborate itineraries, has explored New Orleans for its jazz heritage, spent a weekend in Savannah’s historic district, and dreams of hiking
    the Great Smoky Mountains while saving for a future theater‑filled visit to New York City.
  culinary: Sandra Jenkins, a moderately skilled home cook, frequently incorporates basil, thyme, and mint from her herb garden into dishes like lemon‑garlic quinoa bowls and Southern collard‑green wraps,
    and enjoys occasional indulgences of gumbo and soul‑food‑style fried chicken at local diners.
  core: Sandra Jenkins, a compassionate, art‑loving teaching assistant who blends literature into lessons, navigates life with a relaxed, slightly disorganized vibe, and balances community service with
    occasional impulsive art‑supply splurges.
background:
  cultural: Sandra is an African‑American woman raised in Molena, a small town in Upson County, Georgia. Her upbringing was centered around a close‑knit Black church community, where Sunday services, choir
    rehearsals, and fellowship gatherings emphasized compassion, cooperation, and shared heritage. Family stories of resilience—from the agricultural roots of her grandparents to the civil‑rights activism
    of older relatives—instilled a strong sense of identity and responsibility. Southern traditions such as soulful cooking, gospel music, and oral storytelling have shaped her worldview, while the region’s
    historic Black schools and community centers have reinforced the importance of education as a pathway to empowerment. This cultural tapestry influences her teaching philosophy, artistic interests, and
    dedication to fostering harmony and opportunity within her community.
attributes:
  skills: '[''Classroom management'', ''Literacy support'', ''Culturally responsive teaching'', ''Educational technology integration'', ''Collaborative teamwork'', ''Student mentorship'', ''Curriculum development
    (STEAM)'', ''Creative arts integration'', ''Conflict resolution'']'
  hobbies: '[''Reading African-American literature'', ''Watercolor painting'', ''Visiting art exhibitions'', ''Listening to jazz and gospel music'', ''Gardening'', ''Volunteering at community center'',
    ''Yoga and meditation'', ''Nature walks and birdwatching'']'
  career_goals: Sandra aims to earn her full teaching certification and transition from a teaching assistant to a lead classroom teacher within the next three years. She plans to pursue a master's degree
    in Curriculum and Instruction to deepen her expertise in inclusive pedagogy. Long‑term, she hopes to design and run an after‑school art program that provides creative outlets for elementary students
    in Molena and surrounding rural communities. Sandra is also interested in advocating for equitable resources in small‑town schools and eventually moving into educational consulting or school administration,
    where she can influence policy while preserving the flexibility and community focus she values.
