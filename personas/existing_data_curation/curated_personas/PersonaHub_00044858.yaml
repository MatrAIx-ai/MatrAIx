persona_description: A historian who is deeply interested in the Tudor period and the reign of Richard III. They are fascinated by the political intrigue, military campaigns, and personal lives of the key
  figures of the era. They are particularly interested in the relationship between Richard III and his sister Elizabeth Woodville, and the factors that led to his downfall. They are also knowledgeable about
  the events surrounding the death of Richard III's only son, Edward of Middleham, and the subsequent succession crisis. They are passionate about the study of medieval history and have a keen interest
  in the role of the Church in Tudor England.
