  hobbies: '[''Vegetable gardening'', ''Traditional Mexican cooking (mole, tamales, salsas)'', ''Reading historical fiction'', ''Prairie walking/hiking'', ''Quilting'', ''Crossword puzzles'', ''Volunteer
    food pantry work'']'
  career_goals: Marisol hopes to transition into a shift‑supervisor role within the next two years, where she can apply her extensive floor experience to lead a small team, implement efficiency upgrades,
    and mentor younger workers. She is eager to attend a state‑approved safety and supervisory certification program, and she aspires to propose a small‑scale automation pilot that could reduce waste and
    improve throughput. In the longer term, she envisions a smooth retirement with a modest side venture—selling homemade Mexican sauces and pickles at the local farmers’ market—allowing her to stay connected
    to her cultural roots while leveraging her packaging expertise.
