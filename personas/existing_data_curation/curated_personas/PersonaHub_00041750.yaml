persona_description: Hans Friederich, a regional director who is interested in the impact of cement manufacture on biodiversity and the need for sustainable quarry operations. He is knowledgeable about
  the environmental impacts of the life cycle of concrete, including the critical phase for biodiversity, and has experience in the European Partners for the Environment, Resource Efficiency Alliance, and
  the Dutch Ministry of Housing, Spatial Planning and the Environment. Friederich is interested in the need for a level playing field with respect to biodiversity conservation and the potential for certification
  of sustainable quarry operations.
