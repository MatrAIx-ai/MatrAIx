personas:
  professional: Yoana Plaza is a bilingual Nurse Practitioner who excels in primary and preventive care, applying meticulous documentation, evidence‑based protocols, and a competitive drive that consistently
    pushes patient‑satisfaction scores to the top while they rigorously vet new clinical guidelines before implementation.
  sports: Yoana Plaza stays active by leading hikes with the Falls Lake Trail Club, attending weekly yoga sessions at Sunrise Yoga Studio, cheering on the Carolina Hurricanes, Carolina Panthers, and Charlotte
    Hornets, and occasionally joining the Wake Forest Running Club’s 5K races to satisfy their competitive streak.
  arts: Yoana Plaza immerses themselves in the arts through salsa nights where they dance to the vibrant sounds of Marc Anthony and Celia Cruz, draw inspiration from Lin‑Manuel Miranda’s lyrical storytelling
    in ‘Hamilton,’ admire the bold colors of Frida Kahlo’s paintings, and stay updated on health‑tech innovations via podcasts like ‘The Doctor’s Farmacy.’
  travel: Yoana Plaza prefers meticulously planned short trips that fit their demanding clinic schedule, having explored the Blue Ridge Parkway’s overlooks, spent a weekend in Asheville’s art district,
    toured the historic streets of Charleston, and dreams of a culinary immersion in Oaxaca and a cultural stroll through Barcelona’s Gothic Quarter.
  culinary: Yoana Plaza delights in preparing classic dishes from their heritage, such as pozole with hominy and pork shoulder, grilled fish tacos topped with fresh cilantro, lime, and pickled radish, and
    reinvented enchiladas infused with roasted cauliflower and low‑fat cheese for a healthier twist, while they hand‑pick heirloom tomatoes, poblano peppers, and avocados from their garden.
  core: Yoana Plaza is a highly organized, competitive nurse practitioner who blends their disciplined work ethic with a passion for healthy cooking, community outreach, and vibrant cultural pursuits while
    juggling a busy professional life.
background:
  cultural: Yoana’s Mexican heritage is a central thread in her identity, shaping her values of familismo, respect, and community service. She grew up bilingual, celebrating traditions such as Día de los
    Muertos and other Mexican holidays while also embracing Southern customs in North Carolina. Her cultural competence allows her to connect deeply with Hispanic patients, using language and culturally
    relevant health education to improve outcomes. Yoana combines Mexican culinary traditions with local ingredients, often sharing these meals at family gatherings, reinforcing the importance of food in
    cultural health. Her background informs her professional ambition to reduce health disparities for Latino communities and to preserve cultural pride within a modern healthcare setting.
attributes:
  skills: '[''Primary care assessment'', ''Chronic disease management'', ''Telehealth consultations'', ''Bilingual Spanish‑English communication'', ''Patient education & health promotion'', ''Electronic
    health record mastery (Epic)'', ''Quality improvement and performance metrics'', ''Procedural skills (wound care, suturing)'', ''Leadership in interdisciplinary teams'', ''Evidence‑based protocol evaluation'']'
  hobbies: '[''Mexican cooking'', ''Salsa dancing'', ''Hiking'', ''Yoga'', ''Gardening'', ''Reading medical journals'', ''Volunteer health fair work'', ''Podcast listening (health & tech)'', ''Strategic
    board games'', ''Family gatherings'']'
  career_goals: Yoana aims to become a senior Family Nurse Practitioner and eventually a Clinical Director overseeing primary care services in Wake County, with a focus on underserved Hispanic populations.
    She plans to earn a Doctor of Nursing Practice (DNP) degree to deepen her expertise in health policy and community health program design. Her ambition includes launching a culturally tailored diabetes
    prevention program that combines evidence‑based care with Mexican dietary education. Yoana also seeks certification as a Certified Diabetes Educator and wishes to serve as a preceptor for nursing students,
    fostering the next generation of culturally competent clinicians. Ultimately, she wants to influence state health policy to improve access to care for bilingual patients while maintaining a balanced
    work‑life schedule with her family.
