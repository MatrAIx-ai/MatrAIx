  career_goals: Inspired by her love of art and curiosity about the world, Diane dreams of becoming an illustrator who creates picture books that spark imagination in other children. She also imagines herself
    as a scientist who explores nature and invents new gadgets, blending creativity with discovery. Occasionally she mentions wanting to help animals as a veterinarian, reflecting her compassionate side.
    Overall, she aspires to a future where she can express ideas visually, solve problems, and make a positive impact on others.
