personas:
  professional: Blossie Petitfrere is an aspiring junior architect who channels their love for building detailed LEGO models into designing imaginative structures, applying a methodical, organized mindset
    to every blueprint they sketch.
  sports: Blossie Petitfrere plays midfield for the Riverside Youth Soccer Club, drills intensely after school, models strategies after watching the US Women's National Soccer Team and cheers for the New
    York Yankees during weekend baseball games, and maintains a competitive edge by tracking personal performance stats in a notebook.
  arts: Blossie Petitfrere sketches scenes from the Magic Tree House series and nature, listens avidly to gospel legends like Kirk Franklin and CeCe Winans, and draws inspiration from illustrators such
    as Mary GrandPré, often incorporating these influences into their own artwork and bedtime reading rituals.
  travel: Blossie Petitfrere prefers structured family trips with clear itineraries, enjoys exploring nearby state parks and has visited the Smithsonian National Air and Space Museum, while dreaming of
    a summer adventure to the Grand Canyon and a future cultural tour of Paris to see the Eiffel Tower.
  culinary: Blossie Petitfrere loves the sweet, buttery flavor of their grandmother’s sweet potato pie spiced with cinnamon and nutmeg, enjoys assembling fresh garden salads with crisp carrots and tomatoes,
    and can whip up a simple mac and cheese using cheddar and a splash of milk, though they sometimes forget to wash their hands before cooking.
  core: Blossie Petitfrere is a meticulous, competitive ten‑year‑old who balances a love for LEGO engineering and soccer with a knack for organizing allowances, yet sometimes lets perfectionism turn into
    stubbornness when a puzzle piece won’t fit.
background:
  cultural: Blossie belongs to an African American family rooted in the rural South, with generations who have lived in Appomattox County, Virginia. The Petitfrere name reflects a distant French‑Creole
    ancestry that she learns about through family stories. Her upbringing emphasizes community, church fellowship, and Southern hospitality. Family gatherings feature soulful gospel music, traditional soul
    food, and storytelling that connect her to the history of the region, including the legacy of the Appomattox Court House. These cultural influences shape her values of perseverance, respect for elders,
    and pride in her heritage.
