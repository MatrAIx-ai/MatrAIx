  career_goals: Blossie dreams of becoming a veterinarian who works with wildlife in rural Virginia. She plans to maintain top grades throughout middle and high school, participate in science fairs, and
    join the school's STEM club to deepen her knowledge of biology and animal care. She also hopes to earn a scholarship that will allow her to attend a university with a strong pre‑veterinary program,
    and eventually run community outreach programs that teach other young people about caring for animals.
