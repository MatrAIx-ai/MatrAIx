personas:
  professional: Angela Livengood is a seasoned front‑desk specialist at the Tucson Public Library, known for their warm greeting style, adept handling of multi‑line phone systems, and pragmatic adoption
    of new office tools, and they now channel their sociable, slightly assertive personality into pursuing an office manager certification and leading a community‑outreach program that links library services
    with local senior‑center activities.
  sports: Angela Livengood stays fit by joining senior‑center line‑dancing classes, dancing salsa on occasion, trekking the trails of Saguaro National Park with a local hiking club, and cheering for the
    Arizona Diamondbacks and Tucson Roadrunners while they occasionally participate in community walking challenges.
  arts: Angela Livengood indulges in classic‑rock concert broadcasts featuring The Rolling Stones, Led Zeppelin, and Queen, immerses themselves in historical novels by Ken Follett and Hilary Mantel, and
    crafts handmade greeting cards with motifs inspired by local desert flora, allowing music, literature, and craft to weave through their daily life.
  travel: Angela Livengood prefers road‑trip getaways that blend desert scenery and cultural stops, having explored the Grand Canyon, Sedona’s red rocks, and Santa Fe’s art galleries, while they dream of
    crossing the border to visit Puerto Peñasco for a relaxed beach‑desert retreat.
  culinary: Angela Livengood loves preparing Southwestern dishes such as green‑chile stew with Hatch chiles, carne asada tacos topped with fresh cilantro and lime, roasted cactus paddles, and prickly‑pear
    salsa served on Sonoran‑style corn tortillas, often accompanied by a side of charred poblano peppers and a glass of local Arizona wine, reflecting their taste for bold flavors.
  core: Angela Livengood is a sociable, curiosity‑driven library front‑desk veteran whose love for dance, desert hikes, and classic rock fuels a flexible, slightly disorganized life, and they balance community
    service with a quietly assertive quest for leadership.
background:
  cultural: Angela grew up in a middle‑class white family in the Midwest before moving to Tucson in her early thirties, drawn by the warm climate and the vibrant blend of Native American, Hispanic, and
    Western frontier cultures. Over the decades, she has embraced Tucson’s unique cultural fabric, participating in local festivals such as Cinco de Mayo and the Tucson Gem & Mineral Show, while maintaining
    the values of independence and community service rooted in her upbringing. Her cultural perspective is a mix of traditional American values—hard work, modesty, and family loyalty—and an appreciation
    for the diverse traditions of the Southwest, including occasional involvement in community garden projects and celebrating regional art and music. This blend helps her connect with a wide range of people
    in her role as a receptionist and in her social circles.
attributes:
  skills: '[''Front‑desk reception'', ''Customer service'', ''Multiline phone management'', ''Interpersonal communication'', ''Conflict resolution'', ''Microsoft Office Suite'', ''Data entry'', ''Record‑keeping'',
    ''Basic Spanish conversational phrases'', ''Adaptability to changing priorities'']'
  hobbies: '[''Senior‑center dance classes'', ''Group hiking in desert trails'', ''Desert gardening (succulents, citrus)'', ''Volunteer at public library'', ''Cooking Southwestern cuisine'', ''Watching
    classic rock concerts'', ''Reading historical novels'', ''Handmade card crafting'']'
  career_goals: Angela aims to leverage her decades of front‑office experience to step into a supervisory or office manager role within the next few years. She plans to obtain a certificate in Office Administration
    from a local community college, which will formalize her practical knowledge and open pathways for mentorship responsibilities. She also hopes to spearhead a community‑outreach program at her workplace,
    connecting the office with local senior‑center activities and cultural events, thereby blending her sociable nature with a desire to give back. Long‑term, she envisions a semi‑retirement transition
    where she can continue part‑time as a community liaison, using her network and curiosity about local culture to support tourism information services.
