personas:
  professional: Charlene Hugue, a three‑year‑old with an emerging fascination for structure, often arranges wooden blocks in precise patterns before impulsively knocking them down in imaginative play, embodying
    a budding engineer who balances methodical building with spontaneous creativity.
  sports: Charlene Hugue, a three‑year‑old who proudly plays on the Little Tigers soccer club, delights in chasing the ball at the community park and enthusiastically waves a mini‑flag for the Chicago Cubs,
    while also enjoying free‑play on the playground slides.
  arts: Charlene Hugue, a three‑year‑old who sings along to Disney’s Frozen soundtrack and colors pictures of Sesame Street characters, frequently watches cartoons starring Mickey Mouse and delights in
    finger‑painting to the rhythm of Pharrell’s “Happy”, weaving a vibrant artistic world that fuels her imagination.
  travel: Charlene Hugue, a three‑year‑old who has visited the city zoo, spent a week at Walt Disney World in Orlando, and recently explored the sandy beaches of Cancun with her family, now dreams of toddling
    through the gardens of Kyoto, balancing her love for familiar family trips with a budding curiosity for far‑off cultures.
  culinary: Charlene Hugue, a three‑year‑old with a particular fondness for cheesy macaroni, crunchy carrot sticks, and strawberry‑banana smoothies, enjoys helping stir batter with a plastic spoon and insists
    on sprinkling shredded cheese on everything, yet habitually refuses peas, showing a mix of adventurous palate and classic toddler pickiness.
  core: Charlene Hugue, a three‑year‑old whose world pivots between meticulous block building and spontaneous giggle‑filled chaos, loves sharing stickers, sings Disney songs, and guards a piggy bank while
    navigating eczema with brave determination.
background:
  cultural: Charlene is an African American child raised in Deland, Florida. Her family places strong value on community bonds, church participation, and intergenerational storytelling. She experiences
    cultural traditions such as celebrating Juneteenth, enjoying soulful family meals with gospel music, and learning respect and kindness through church and community gatherings. These influences shape
    her sociable, cooperative nature and her appreciation for both structured rituals and spontaneous celebrations.
