  hobbies: '[''Building blocks'', ''Singing simple songs'', ''Dancing to music'', ''Drawing with crayons'', ''Playground activities'', ''Storytime books'', ''Group games with peers'', ''Church children’s
    activities'']'
  career_goals: Even at her young age, Charlene expresses imaginative ambitions. She often says she wants to be a teacher like her preschool caregiver, a dancer who moves to music, and a helpful adult who
    looks after friends and family. These aspirations reflect an early interest in caring roles, creativity, and community involvement.
