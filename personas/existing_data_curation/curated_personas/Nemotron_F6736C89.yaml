personas:
  professional: Maribel Ampudia, a Texas‑licensed nail artist with a background in cosmetic chemistry, channels their curiosity into crafting non‑toxic polish blends while applying practical sanitation
    protocols, runs the salon’s scheduling and inventory with disciplined organization yet flexible client accommodations, and competes fiercely for industry accolades through intricate 3D designs and bilingual
    client consultations.
  sports: Maribel Ampudia spends weekends trekking the Texas Hill Country with the Hill Country Hiking Society, follows the Dallas Cowboys and Texas Rangers avidly, joins a local co‑ed yoga studio for weekly
    Vinyasa sessions, and dabbles in recreational beach volleyball during summer trips to Corpus Christi, balancing competitive spirit with a preference for low‑impact endurance activities.
  arts: Maribel Ampudia channels their love for color theory into photography inspired by Annie Leibovitz’s portrait lighting, curates nail designs echoing Frida Kahlo’s bold motifs, enjoys listening to
    Lila Downs while crafting décor, and regularly attends the Austin City Limits festival and local Día de los Muertos celebrations, blending scientific curiosity with artistic flair.
  travel: Maribel Ampudia prefers meticulously planned eco‑friendly getaways, such as hiking in Sedona’s red rocks, exploring Oaxaca’s culinary markets for Mexican dish ideas, and a dream trip to Kyoto’s
    seasonal gardens to study natural pigments, balancing family‑friendly relaxation with solo photography adventures that fuel their nail‑art inspirations.
  culinary: Maribel Ampudia, an adept home‑chef, reimagines traditional Mexican staples—crafting chiles en nogada with avocado‑based nogada sauce, smoky chipotle‑infused mole drizzled over roasted cauliflower,
    and quinoa‑filled vegan tamales—while experimenting with seasonal pigments from beetroot and turmeric to create edible color palettes.
  core: Maribel Ampudia is a fiercely curious, competitively driven nail chemist who juggles meticulous salon management with a penchant for late‑night coffee‑fueled color experiments, a skeptical eye for
    trendy products, and a relentless quest to fuse Mexican heritage with sustainable beauty.
background:
  cultural: Maribel is a first‑generation Mexican‑American whose family roots trace back to Jalisco. Raised in a bilingual household in San Antonio, she celebrates Día de los Muertos, Cinco de Mayo, and
    family‑oriented religious holidays, and draws inspiration from Mexican folk art and vibrant regional colors in her nail designs. She remains closely connected to her extended family and participates
    in community events at the local parish and cultural center, blending Mexican heritage with the broader Texan Hispanic culture.
