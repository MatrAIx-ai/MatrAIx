  hobbies: '[''Cooking Southeast Asian dishes'', ''Garden cultivation'', ''Reading child development research'', ''Volunteering at community center'', ''Yoga practice'', ''Nature walks'', ''Traveling to
    heritage festivals'', ''Knitting'', ''Collecting traditional textiles'']'
  career_goals: Vanna aims to advance from center administrator to regional director of early childhood services within the next five years, pursuing a bachelor’s degree in Education Leadership to complement
    her associate’s credential. She is intent on securing a state‑wide grant to develop a multicultural enrichment program that highlights Southeast Asian heritage while fostering inclusive practices. Vanna
    also aspires to mentor emerging administrators, champion evidence‑based instructional strategies, and position her institution as a model for balanced, high‑quality early childhood education in the
    Gulf Coast region.
