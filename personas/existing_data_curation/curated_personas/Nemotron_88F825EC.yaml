personas:
  professional: Marie Yeager is a community childcare administrator who designs arts‑integrated early‑learning curricula, mentors staff with a collaborative and compassionate style, and leverages grant
    writing and event coordination expertise—though they are spontaneous and often scramble at the last minute to meet deadlines.
  sports: Marie Yeager embraces outdoor fitness by hiking the Lake Coeur d'Alene trail system and practicing yoga with the North Idaho Yoga Collective, while cheering on the Idaho Steelheads at the Catholic
    Charities Arena during hockey season and occasionally joining a weekend mountain‑bike group.
  arts: Marie Yeager cultivates an eclectic artistic life—painting vibrant acrylics inspired by Yayoi Kusama, performing ukulele renditions of Jack Johnson at neighborhood gatherings, volunteering onstage
    for local productions such as A Midsummer Night's Dream, and curating visits to galleries featuring Monet and contemporary Pacific Northwest artists, all of which fuel their creative curriculum designs.
  travel: Marie Yeager embarks on spontaneous road trips across the Pacific Northwest, has trekked the geysers of Yellowstone and explored the coffee culture of Portland, longs to wander the temples of
    Kyoto and sip Chianti in Tuscany, and they usually plan itineraries on a whim while balancing a modest travel budget.
  culinary: Marie Yeager delights in hosting dinner parties where they serve herb‑roasted salmon with a side of quinoa‑kale salad, freshly baked focaccia topped with rosemary from their garden, and their
    signature banana‑bread‑infused bourbon glaze, reflecting an intermediate cooking skill set and an affinity for seasonal, locally sourced ingredients.
  core: Marie Yeager is a talkative, art‑obsessed childcare leader who battles chronic worry with yoga, spontaneously splurges on creative projects, and thrives on turning community gatherings into vibrant,
    collaborative celebrations.
background:
  cultural: Marie grew up in a middle‑class family in the Pacific Northwest, with roots in the Midwest that emphasized community service, modesty, and a strong work ethic. Her family celebrated traditional
    American holidays and maintained a connection to the region’s outdoors‑oriented lifestyle. Living in Coeur d'Alene, Idaho, she has embraced the local culture of environmental stewardship, outdoor recreation,
    and a close‑knit community spirit. While her ethnic background is white, Marie actively seeks to learn about and include diverse cultural perspectives in her personal and professional life, reflecting
    her progressive values and commitment to fostering inclusive environments.
attributes:
  skills: '[''Early childhood curriculum development'', ''Arts integration in education'', ''Staff recruitment and mentorship'', ''Community partnership building'', ''Conflict resolution'', ''Public speaking
