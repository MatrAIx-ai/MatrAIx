  hobbies: '[''Painting (acrylics)'', ''Visiting art galleries and museums'', ''Hiking and nature walks'', ''Gardening'', ''Community theater acting'', ''Playing the ukulele'', ''Hosting dinner parties'',
    ''Reading diverse books'', ''Yoga and meditation'', ''Volunteering at local shelters'']'
  career_goals: Marie aspires to advance to a director role overseeing a network of community childcare centers where she can champion innovative, arts‑focused early learning programs. She is motivated
    to complete her bachelor's degree in Early Childhood Education to deepen her theoretical foundation and to obtain certification in nonprofit management. Long‑term, she hopes to launch a nonprofit that
    provides accessible, creative enrichment workshops for children and families in underserved areas of Idaho, while also advocating for mental‑health resources for educators. Marie aims to refine her
    organizational and deadline‑management skills so she can lead larger initiatives with greater impact.
