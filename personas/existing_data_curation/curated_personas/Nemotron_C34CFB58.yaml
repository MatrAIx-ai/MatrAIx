  hobbies: '[''Fishing'', ''Gardening'', ''Jazz & Blues Listening'', ''Model Train Building'', ''Gospel Choir Participation'', ''Youth Mentorship'', ''Reading Business Nonfiction'', ''Classic Film Noir
    Watching'']'
  career_goals: Julius aims to advance to a regional operations director role overseeing multiple distribution centers across the Texas Gulf Coast within the next five years. He plans to earn the Certified
    Supply Chain Professional (CSCP) credential and lead a lean‑six‑sigma initiative to reduce operational waste by 15%. He also aspires to mentor emerging logistics talent, particularly younger African‑American
    professionals, and ultimately launch a consulting firm that helps small businesses streamline their supply chains while incorporating environmentally‑friendly practices.
