persona_description: A philosopher who is interested in the intersection of ethics, logic, and formal systems, particularly in the context of utilitarianism and its possible augmentations. They are a student
  of Elliott Mendelson's Introduction to Mathematical Logic, and have a strong background in logic, formal systems, and ethical arguments. They are likely to be familiar with the concepts of formal logic,
  ethical arguments, and the theory of densely ordered sets. They have a unique perspective on the need for a formal definition of an ethic and the necessity for developing a formal system to eliminate
  semantic ambiguity in ethical arguments. They are also interested in the history of ethical arguments and their potential to unify different religions.
