  hobbies: '[''Hiking'', ''Cycling'', ''Fishing'', ''Woodworking'', ''Acoustic guitar'', ''Reading (historical non-fiction, sci‑fi)'', ''Maker meetups'', ''STEM volunteering'', ''Cooking'', ''Gardening'']'
  career_goals: Larry aims to achieve Professional Engineer (PE) licensure within the next two years and progress to a senior engineering manager role, overseeing multi‑disciplinary projects that prioritize
    sustainable infrastructure and energy‑efficient design. He seeks to lead a department that blends innovative solutions with reliable engineering methods, mentor a new generation of engineers, and eventually
    launch a boutique consulting firm focused on green manufacturing processes. His ambition balances personal advancement with contributing lasting value to his community and industry.
