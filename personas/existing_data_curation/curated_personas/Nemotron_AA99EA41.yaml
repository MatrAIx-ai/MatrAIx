  hobbies: '["Cooking traditional Southeast Asian dishes", "Reading contemporary fiction", "Journaling", "Gardening", "Walking in local nature trails", "Yoga", "Listening to acoustic music", "Volunteer
    work at community center"]'
  career_goals: Linh aims to solidify her foundation in accounting by completing an associate's degree in accounting and pursuing CPA certification within the next five years. She wants to progress from
    a bookkeeping clerk to a senior accountant role, specializing in tax preparation for small businesses. Long‑term, she envisions opening a boutique bookkeeping practice that serves the Southeast Asian
    entrepreneurial community in Phoenix, providing reliable financial services while maintaining a stable, routine‑driven work life. She values career stability, continuous skill development, and the opportunity
    to give back to her cultural community.
