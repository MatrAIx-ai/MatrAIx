  career_goals: As a retired matriarch, Sheona’s ambitions center on nurturing the next generation and preserving her family’s stories. She aims to compile a memoir of her life experiences and the local
    African‑American history of Heard County, sharing it with grandchildren and the community library. She hopes to expand the church’s small‑group outreach by mentoring younger volunteers and organizing
    intergenerational cooking workshops. Learning to use a tablet for digital storytelling and photo archiving is a personal goal. She also wishes to maintain her health and independence, enabling her to
    continue gardening, host family gatherings, and provide occasional assistance to neighbors in need.
