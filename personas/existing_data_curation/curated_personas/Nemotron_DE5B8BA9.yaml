personas:
  professional: Sheona Theodore, a retired community matriarch, channels her lifelong curiosity and practicality into leading her church’s choir, coordinating volunteer meal‑delivery programs, hosting weekly
    Bible study, and maintaining an award‑winning garden, all while using basic digital tools to stay connected and mediate neighborhood disputes with calm, compassionate guidance.
  sports: Sheona Theodore enjoys leisurely walks through Hogansville’s historic district, follows the local high school Panthers football games on weekend radio, cheered the Georgia Bulldogs during college
    basketball season, and participates in a small senior walking club that meets each Thursday, favoring low‑impact activity over competitive sports.
  arts: Sheona Theodore finds creative fulfillment in quilting intricate Log Cabin patterns, listening to gospel greats like Mahalia Jackson and jazz legends such as John Coltrane, and immersing herself
    in the melodies of her church choir, while also savoring the storytelling of historical fiction authors like Toni Morrison and Alex Haley.
  travel: Sheona Theodore prefers low‑key trips that blend family visits and historic exploration, having traveled by car to Savannah’s cobblestone streets, the Great Smoky Mountains for leaf‑watching,
    and a week‑long pilgrimage to Washington, D.C.’s Smithsonian museums, while dreaming of a future river cruise down the Mississippi to capture stories of river towns.
  culinary: Sheona Theodore cultivates heirloom vegetables like purple carrots and heirloom tomatoes, then transforms them into soul‑food staples such as collard greens seasoned with smoked turkey, fried
    catfish with hush‑puppies, and a perfectly caramelized sweet‑potato pie, all while preserving excess harvest in mason jars and occasionally over‑salting her famous cornbread.
  core: Sheona Theodore is a 74‑year‑old compassionate storyteller who weaves garden bounty, gospel harmony, and quilting craft into a life of quiet resilience, community service, and a lovingly imperfect
    devotion to preserving family heritage.
background:
  cultural: Sheona grew up as an African‑American woman in the rural South during the civil‑rights era, shaping a strong sense of community, resilience, and faith. Her family’s roots trace back to sharecroppers
    and church founders in Heard County, and traditions such as communal cooking, gospel singing, and storytelling have been central to her identity. The black church in Hogansville has served as a cultural
    hub, influencing her values of compassion, cooperation, and service. She carries forward Southern hospitality, the emphasis on family bonds, and the oral‑history tradition, while also embracing contemporary
    influences through technology to stay connected with younger relatives. Her cultural heritage informs her daily practices, from the foods she prepares to the ways she supports her neighbors.
