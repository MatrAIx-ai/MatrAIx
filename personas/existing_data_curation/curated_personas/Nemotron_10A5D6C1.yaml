  hobbies: '[''Fishing'', ''Hunting'', ''Softball league participation'', ''Attending local fairs and country‑music concerts'', ''Card games'', ''Gardening'', ''Regional history reading'']'
  career_goals: Although currently not employed, Steven aims to remain an active contributor to Bad Axe. He plans to launch a modest handyman side business to monetize his repair skills, offering services
    to neighbors and local seniors. He also aspires to take a leadership role on the town's community council or the local recreation board, where he can shape events and facilities. Mentoring younger community
    members in practical trades and possibly teaching a weekend workshop at the community center are key long‑term ambitions.
