  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Jazz piano'', ''Reading (science-fiction, philosophy, African-American history)'', ''Cooking Southern cuisine with creative twists'', ''Gardening
    (heirloom tomatoes)'', ''Walking his dogs'', ''Crosswords and Sudoku'', ''Volunteer tax assistance'', ''Python scripting for automation'', ''Data-visualization art projects'']'
  career_goals: Justin aims to advance to a senior accounting supervisor role within the next three years, earn the Certified Bookkeeper credential and eventually pursue the CPA designation to solidify
    his expertise. He envisions launching a boutique financial‑consulting practice that helps small businesses in Sumter County streamline their bookkeeping, adopt modern tech tools, and present their financial
    data creatively. He is also passionate about mentoring younger accountants, teaching part‑time courses at the local community college, and expanding his volunteer tax‑assistance program to reach more
    low‑income families. Ultimately, he seeks a balanced career that blends technical mastery, innovative problem‑solving, and community impact while allowing time for his artistic pursuits.
