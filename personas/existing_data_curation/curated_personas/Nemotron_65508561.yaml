  career_goals: Although retired from formal employment, Ana aims to channel her curiosity and artistic sensibility into meaningful community contributions. She hopes to curate a quarterly exhibition of
    local artists at the Vancouver Community Center, publish a series of articles on Pacific Northwest art history for the regional library's newsletter, and mentor a small group of aspiring painters through
    a loosely structured, flexible workshop. She also aspires to complete a personal memoir that intertwines her family genealogy with reflections on the evolving art scene, and she dreams of winning a
    local senior-artist competition to demonstrate that her competitive spirit can thrive at any age.
