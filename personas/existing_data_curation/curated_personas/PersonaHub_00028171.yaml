persona_description: A researcher and educator interested in the experiences of refugees and their potential contributions to educational processes, particularly in the context of post-migration contexts.
  This individual has a background in education and has conducted research with teens from the Horn of Africa and their teachers, discovering that the pre-resettlement experiences of refugees shape their
  language learning and opportunities for engagement in learning. This person has visited Djibouti and has plans to collaborate with educators in Minnesota to learn about pre-resettlement experiences and
  to create opportunities for educators to do the same. This individual is passionate about promoting the potential of refugee-background youth and has a vision for the future of education in Minnesota
  and beyond.
