personas:
  professional: Andrew Amengual, a 25‑year‑old full‑stack software engineer, blends a disciplined short‑sprint Agile approach with spontaneous tinkering on emerging tech, building Python‑driven prototypes
    on AWS, automating deployments with Docker, and constantly competing against himself to ship features faster, even if deadlines sometimes slip, and they relish turning ambiguous business problems into
    clean, functional code.
  sports: Andrew Amengual, 25, regularly hits the foothills for hiking and mountain biking, competes in weekend fly‑fishing tournaments on the Arkansas River, belongs to the Colorado Trail Riders club,
    and passionately roots for the Denver Broncos, Colorado Rockies, and Colorado Avalanche during their respective seasons, and they often unwind with a casual pickup basketball game after a long ride.
  arts: Andrew Amengual, 25, fuels his creative spark by immersing himself in science‑fiction novels by Neal Stephenson and Ann Leckie, blasting Daft Punk and Tame Impala while coding, and strategizing
    over Settlers of Catan (designed by Klaus Teuber), occasionally attending live indie shows featuring bands like Explosions in the Sky, and they find these artistic outlets essential for balancing their
    analytical mind.
  travel: Andrew Amengual, 25, prefers spur‑of‑the‑moment weekend trips over lengthy vacations, having trekked Banff’s alpine trails, explored Kyoto’s historic temples, fished in Iceland’s Þingvallavatn,
    and he dreams of a future backpacking adventure to Machu Picchu once his SaaS startup secures funding, and they often plan these escapes on a shoestring budget using flash‑sale sites.
  culinary: Andrew Amengual, 25, enjoys experimental cooking with his spouse, often crafting spicy miso ramen with hand‑rolled noodles, sous‑vide salmon finished with yuzu glaze, and matcha panna cotta
    topped with a drizzle of truffle oil, showcasing a solid yet playful culinary skill set that they refine during late‑night kitchen sessions after a hackathon.
  core: Andrew Amengual, a 25‑year‑old competitively driven coder, thrives on spontaneous tech tinkering, habitually burns the midnight oil on hackathons, hoards unused PC parts like trophies, and often
    lets deadlines slip despite a deep desire for structure, and they constantly balance order with improvisation.
background:
  cultural: Andrew grew up in a modest, family‑oriented community in Idaho, where the values of self‑reliance, hard work, and appreciation for the outdoors are prominent. As a white American with roots
    in the Pacific Northwest, he was exposed early to both traditional Midwestern work ethics and the growing tech culture of the region. His marriage and involvement in local community events, like county
    fairs and volunteer clean‑up days, reflect a blend of personal responsibility and communal participation. While his professional life aligns with modern, global tech trends, his personal life remains
    grounded in the regional emphasis on nature, practicality, and close‑knit family ties.
