  career_goals: Andrew aims to become a technical lead within the next three years, guiding a team that values both structure and creative freedom. He plans to deepen his expertise in cloud architecture
    and machine‑learning integration to design products that solve real‑world problems quickly. Ultimately, he aspires to launch his own SaaS startup that offers flexible, on‑demand data‑analysis tools
    for small businesses, allowing him to combine his competitive drive with his love for pragmatic, fast‑moving development cycles. He also hopes to earn professional certifications (AWS Solutions Architect,
    Certified Kubernetes Administrator) to solidify his credibility in the industry.
