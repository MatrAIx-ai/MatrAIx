  career_goals: Jonathan aims to move into a supervisory or production‑lead role within the next two years, obtaining additional certifications such as ServSafe Manager and Lean Six Sigma Green Belt. He
    is interested in integrating modest automation technologies to improve efficiency and hopes to eventually run a small, independent specialty food line that blends classic recipes with modern techniques.
    Mentoring younger workers and fostering a collaborative, safety‑first culture are also central to his long‑term ambitions.
