personas:
  professional: Barbara Nesbitt, a seasoned registered nurse with advanced clinical expertise and a flair for data‑driven quality improvement, leverages their meticulous, organized approach and imaginative
    problem‑solving to redesign EHR workflows, mentor junior staff, and spearhead evidence‑based protocols that blend medical precision with visual storytelling.
  sports: Barbara Nesbitt, a dedicated member of the Timucuan Trekking Society, embraces early‑morning hikes through the Preserve and weekend yoga sessions for flexibility, follows the Jacksonville Jaguars
    in football, cheers for the Jacksonville Jumbo Shrimp during summer series, and occasionally logs 5‑k runs with the Riverside Runners club to maintain cardiovascular health while balancing a busy clinical
    schedule.
  arts: Barbara Nesbitt channels her imagination into delicate watercolor landscapes inspired by Claude Monet and Georgia O'Keeffe, sketches precise medical illustrations echoing the style of Frank Netter,
    composes brief piano improvisations reminiscent of Debussy’s nocturnes, and finds literary solace in the poetry of Mary Oliver and the short stories of Ray Bradbury, often attending local gallery openings
    featuring emerging Floridian artists.
  travel: Barbara Nesbitt prefers meticulously planned, culture‑rich trips that blend photography opportunities with local culinary experiences, having captured sunrise over the Amalfi Coast, explored the
    historic streets of Savannah, and eagerly awaiting a future hiking expedition in the Canadian Rockies, all while balancing a modest travel budget that accommodates her professional responsibilities.
  culinary: Barbara Nesbitt, a confident home chef, delights in experimenting with international cuisines—frequently preparing Thai green curry with fresh lemongrass and galangal, mastering the art of handmade
    gnocchi with ricotta and sage, and sprinkling her herb garden’s basil and oregano into Mediterranean‑inspired salads—while savoring occasional fine‑dining experiences at Jacksonville’s Jefferson’s for
    its seasonal seafood dishes.
  core: Barbara Nesbitt blends clinical precision with artistic curiosity, occasionally sacrificing sleep to finish a watercolor piece or an Arduino prototype, yet remains steadfastly organized, financially
    disciplined, and passionately committed to improving patient education through visual storytelling.
background:
  cultural: Barbara grew up in a middle‑class, white family in the Jacksonville metropolitan area, immersed in Southern hospitality and community values. Her upbringing emphasized education, civic involvement,
    and close family ties, with regular participation in church and local volunteer initiatives. She enjoys the region’s culinary traditions—especially seafood and Southern comfort foods—while also seeking
    out the diverse cultural events Jacksonville offers, such as art festivals and multicultural celebrations. This blend of Southern roots and exposure to a growing, heterogeneous community informs her
    inclusive outlook, respect for varied perspectives, and desire to enhance health equity through her professional and personal endeavors.
