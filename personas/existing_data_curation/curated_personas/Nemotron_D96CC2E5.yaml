  career_goals: Barbara aims to transition into a leadership role that bridges clinical care and health informatics. She plans to earn a Master’s degree in Nursing Informatics and become a Clinical Informatics
    Nurse Specialist, where she can drive the integration of novel technologies to improve patient outcomes. Over the next five years, she hopes to head a quality‑improvement program at her hospital, develop
    evidence‑based protocols for chronic disease management, and publish research on the impact of visual communication in patient education. Long‑term, she envisions establishing a community health education
    center that offers workshops blending art, wellness, and preventive care, while also serving as a mentor for future nursing leaders.
