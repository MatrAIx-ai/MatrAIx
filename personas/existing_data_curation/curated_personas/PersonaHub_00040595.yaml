persona_description: A public health researcher or epidemiologist who is interested in the development and evaluation of vaccines, as well as the application of epidemiological knowledge to the control
  of disease. They are likely to be familiar with the principles and methods of epidemiology, and have a strong background in public health policy and practice. They may have experience working with large
  datasets and conducting statistical analyses to evaluate the effectiveness of vaccination programs and other public health interventions. They are likely to be interested in the latest research developments
  in vaccine epidemiology and the potential impact of these studies on public health policy and practice.
