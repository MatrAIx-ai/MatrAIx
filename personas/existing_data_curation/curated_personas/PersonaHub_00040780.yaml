persona_description: A veterinarian who specializes in the diagnosis and treatment of urinary tract infections in dogs and cats. They are knowledgeable in the diagnostic tests and treatments used to identify
  and treat these infections, as well as in the understanding of the anatomy and physiology of the urinary system. They are skilled in interpreting the results of urine tests, including the use of centrifugation
  and culture, and are familiar with the different types of urinary tract infections, including bladder and kidney infections. They are also aware of the potential complications and complications of urinary
  tract infections, including urinary tract stones and pyelonephritis.
