persona_description: A Brazilian professor at São Paulo State University (UNESP) in Rio Claro, Brazil, who specializes in the study of fire and its impact on vegetation in the Cerrado savanna, a unique
  type of savanna in South America. She has conducted research on postfire regeneration of the Cerrado and has found that the speed at which B. paradoxa flowers after being completely charred in a wildfire
  is a significant advantage for the plant, enabling it to flower, fructify and disperse windborne seeds in the open, with the soil uncovered and without barriers or competitors. The Cerrado has evolved
  through fire and is currently facing threats from expansion of the agricultural frontier, with large-scale monocultures and the intensive use of machinery and herbicides, leaving the soil completely clear
  and subject to invasion by signalgrass and molasses grass. The Cerrado is a unique type of savanna in South America, with a capacity to grow back and flower after burning, a key difference in comparison
  to African and Australian savannas.
