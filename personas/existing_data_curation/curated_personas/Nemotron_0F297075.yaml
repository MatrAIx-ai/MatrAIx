personas:
  professional: Oscar Barber, a budding LEGO engineer, channels their love for ordered construction and problem‑solving into helping their Cub Scout pack design intricate bridge projects, balancing meticulous
    planning with occasional assertive leadership when the group stalls.
  sports: Oscar Barber, a forward on his elementary school soccer team and member of the Wichita Youth Soccer Club, idolizes the disciplined play of the Kansas City Chiefs and often practices drills while
    cheering for the Chiefs on Sundays.
  arts: Oscar Barber expresses creativity by drawing cartoons inspired by Dr. Seuss, SpongeBob SquarePants, and the bold colors of Andy Warhol, and they eagerly collect illustrated books from the school
    library to fuel their imagination.
  travel: Oscar Barber prefers family‑planned road trips with a clear itinerary, enjoys the bustling Kansas State Fair each summer, loves splashing at Lake of the Ozarks, and dreams of saving enough allowance
    to visit Walt Disney World in Florida someday.
  culinary: Oscar Barber loves cheesy macaroni, chicken nuggets, corn on the cob, and assembling their own mini pizza with pepperoni and extra mozzarella, but they often skip vegetables unless their mother
    sneaks peas into the sauce.
  core: Oscar Barber is a meticulous LEGO architect who transforms anxiety into structured play, saves every spare cent for the next set, and occasionally forgets to eat vegetables while dreaming of building
    a real bridge someday.
background:
  cultural: Oscar is raised in a middle‑class, predominantly white suburb of Wichita, Kansas. His family embraces typical Midwestern American values such as hard work, community involvement, modesty, and
    respect for tradition. He experiences local cultural touchstones like the Kansas State Fair, high school football games, and a community-oriented school environment that blends modern American culture
    with the region's agricultural heritage.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizing school supplies'', ''Following structured daily routines'', ''Basic computer operation for educational games'', ''Collaborative
    group work'', ''Checklist creation and personal responsibility'']'
  hobbies: '[''LEGO building'', ''Reading series (Magic Tree House, Diary of a Wimpy Kid)'', ''Soccer (school team)'', ''Cub Scouts'', ''Cartoon drawing'', ''Journaling'']'
  career_goals: Oscar dreams of a career that offers clear steps, dependable outcomes, and a sense of helping others. He is fascinated by the idea of becoming a civil engineer who designs safe bridges and
    buildings, a firefighter who protects his community, or a veterinarian who cares for animals. Each of these paths appeals to his love of structure, practicality, and service.
