  hobbies: '[''Reading (Science & Psychology)'', ''Gardening'', ''Birdwatching'', ''Hiking with Small Group'', ''Knitting'', ''DIY Assistive Technology Projects'', ''Board Games with Close Friends'', ''Cooking
    Midwest Comfort Food'', ''Journaling'', ''Puzzle Solving'']'
  career_goals: Maysa aims to advance to a district‑wide Special Education Coordinator role where she can design inclusive STEM programs and mentor new teachers. She plans to earn a doctorate in Special
    Education Leadership to influence policy and secure grant funding for adaptive technology initiatives. Balancing her ambition with her family life, she also hopes to develop a workshop series that helps
    teachers incorporate flexible, low‑stress classroom structures.
