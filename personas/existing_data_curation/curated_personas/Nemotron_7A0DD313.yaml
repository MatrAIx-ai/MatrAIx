personas:
  professional: Maysa Thompson is a special education teacher who blends curiosity for STEM with pragmatic classroom strategies; they design individualized math and science instruction that incorporates
    assistive technology, evidence‑based behavior interventions, and data‑driven IEP monitoring, while their relaxed, sometimes disorganized approach fuels a collaborative, flexible planning style that
    empowers therapists, counselors, and parents alike.
  sports: Maysa Thompson enjoys low‑impact fitness, participating in a local hiking club that meets monthly to explore modest trails in nearby wetlands, while cheering on the Chicago Bears and Chicago Cubs,
    and occasionally slipping a restorative yoga session into a weekend to ease sore lower back from gardening.
  arts: Maysa Thompson finds creative solace in knitting while listening to folk singer Gillian Welch and the piano works of Debussy, and they often attend intimate poetry readings at a downtown coffee
    house featuring regional authors like Rebecca Solnit, allowing their solitary side to flourish amid modest artistic gatherings.
  travel: Maysa Thompson prefers curated, low‑stress getaways, planning weekend trips to nearby national parks such as Badlands and the Ozark National Forest with a meticulously packed garden‑fresh salad,
    while dreaming of a quiet retreat in Iceland’s Westfjords that balances adventure with the comfort of predictable itineraries.
  culinary: Maysa Thompson delights in cooking Midwestern comfort dishes like chicken pot pie, creamy macaroni and cheese, and cornbread, often elevating them with garden‑grown vegetables such as roasted
    beets and heirloom carrots, while their intermediate cooking skills enable them to experiment with spice blends like smoked paprika and fresh rosemary, though they occasionally over‑salt meals when
    stressed.
  core: Maysa Thompson is a curious yet relaxed special‑education advocate who nurtures solitary hobbies, juggles occasional financial forgetfulness, wrestles with anxiety, and secretly hoards emergency
    cash in a garden shed.
background:
  cultural: Maysa grew up in a Midwestern small‑town environment near Kalamazoo, shaped by community‑center gatherings, local farmers’ markets, and a family tradition of modest, practical values. Her white,
    Protestant‑rooted upbringing emphasized self‑reliance, respect for tradition, and a strong work ethic, while her college experiences in STEM broadened her worldview and fostered an appreciation for
    inclusive, evidence‑based education. She maintains connections to local cultural events such as county fairs and historical society meetings, integrating that regional identity into her teaching philosophy.
attributes:
  skills: '[''Differentiated Instruction'', ''IEP Development & Monitoring'', ''Assistive Technology Integration'', ''Data‑Driven Assessment'', ''Behavior Intervention Planning'', ''STEM Curriculum Adaptation
