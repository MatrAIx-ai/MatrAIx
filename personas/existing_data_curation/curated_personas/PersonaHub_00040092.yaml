persona_description: A historian who specializes in the exploration and interpretation of the history of the Franciscan missions in Alta California, particularly the life and work of Father Francisco Serra.
  His research interests include the social, economic, and cultural impacts of the missions on the indigenous peoples of the region, and the legacy of Serra's work on the cultural and intellectual landscape
  of the Americas. He is particularly interested in the role of the Franciscans as global, intellectual communities, and the ways in which their mission work shaped the course of history.
