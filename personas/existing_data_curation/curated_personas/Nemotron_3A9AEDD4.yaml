  hobbies: '["Reading speculative and classic literature", "Attending poetry slams and open-mic events", "Improvisational theater workshops", "Playing tabletop RPGs (e.g., Dungeons & Dragons)", "Sketching
    and collage art", "Hiking and kayaking in Maryland''s parks", "Listening to ambient/experimental music while writing", "Street photography", "Maintaining a personal literary blog"]'
  career_goals: Richard aims to publish his first novel—a speculative fiction work that blends surrealism with contemporary social themes—through a reputable literary agent within the next two years. He
    also plans to build a sustainable freelance writing career, contributing essays and features to literary magazines and online platforms. Long-term, he envisions creating a mixed-media storytelling brand
    that combines written narratives, graphic illustrations, and podcast episodes, allowing him to maintain creative flexibility while reaching a broader audience.
