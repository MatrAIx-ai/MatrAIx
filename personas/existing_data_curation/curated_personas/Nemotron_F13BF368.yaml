  career_goals: Mark aims to become a lead technician within his current company, earning NATE Master Specialist certification and an additional EPA Section 608 certification for advanced refrigerants.
    He plans to expand his expertise into green building technologies, focusing on solar‑assisted heating and high‑efficiency retrofits. Long‑term, he envisions launching a small, community‑focused HVAC
    business in Grays Harbor County that emphasizes sustainable solutions and provides apprenticeship opportunities for local youth. Throughout his career progression, he values stable work hours that support
    his personal responsibilities and ongoing professional development.
