  hobbies: '[''Basketball league'', ''Soccer club'', ''Arduino/Raspberry Pi tinkering'', ''Acoustic guitar playing'', ''Volunteer work at animal shelter'', ''Yoga'', ''Guided meditation'', ''Reading sci‑fi
    novels'', ''Board game nights'']'
  career_goals: Michael aims to move from his current customer service representative role into a supervisory position within the next two years, using his technical background to lead a hybrid support‑operations
    team. He plans to earn certifications such as ITIL Foundation and CompTIA A+ to broaden his expertise, then transition into a technical support engineer or product support manager role where he can
    design streamlined workflows that reduce both customer wait times and employee stress. In the longer term, he hopes to launch a small consultancy that helps Midwestern businesses optimize their customer
    service processes.
