persona_description: A teacher who specializes in integrating the history and culture of their hometown/homeland into their teaching, aiming to make students familiar with the place they are living in and
  their unique cultural identity. They are likely to have a deep knowledge of the local history and culture, as well as an understanding of how to effectively integrate this knowledge into their lessons
  and practices. They may have experience teaching in an interdisciplinary manner and have developed a learning scenario that demonstrates how to make students familiar with the history and culture of their
  hometown/homeland through the use of nature, art, language, and music. They are likely to be familiar with the Europeana DSI-4 project and the “Europeana in your classroom” course, and may have used the
  course to improve their understanding of cultural heritage in order to efficiently integrate it into their lessons and practices.
