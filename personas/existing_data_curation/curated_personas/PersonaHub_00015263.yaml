persona_description: An educational researcher who is interested in the field of educational technology and has a background in educational psychology, specifically focusing on the use of progressive inquiry
  learning models and software tools to support learning. They are currently working on the development of Fle3, a software tool that supports the progressive inquiry learning model, and have experience
  with other educational technology projects such as the future learning environment. They are interested in exploring the potential for software tools to support learning in a long-term and sustainable
  manner, and are open to the possibility of making software tools slower and better in order to achieve this goal.
