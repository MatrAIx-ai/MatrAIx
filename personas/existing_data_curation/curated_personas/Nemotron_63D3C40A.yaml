  career_goals: Joseph aims to obtain his GED and pursue certification as a community outreach coordinator, enabling him to take on a formal role within a non‑profit organization serving Stokes County.
    He also aspires to develop a small home‑based craft business focused on handcrafted wooden items and gardening supplies, leveraging his hands‑on skills and artistic sensibility. In the longer term,
    he hopes to lead larger community initiatives that promote environmental stewardship and access to the arts for underserved residents.
