  career_goals: As she approaches retirement, Jasmine aims to transition into a mentorship role, securing a part‑time consulting position where she can help small local businesses and non‑profits improve
    their administrative efficiency. She hopes to earn the Certified Administrative Professional (CAP) credential to formalize her expertise, and to develop a training manual for the office staff at the
    community health clinic where she volunteers. Ultimately, she wants to leave a legacy of organized, compassionate support for her community while ensuring a smooth handover for her successors.
