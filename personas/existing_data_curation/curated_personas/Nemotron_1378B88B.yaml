personas:
  professional: James Wallen is a performance technologist who blends live acting, motion‑capture, and generative soundscapes into immersive narratives, using Python scripting, DMX lighting, and empathetic
    leadership to direct a small interdisciplinary troupe producing site‑specific shows in Knoxville.
  sports: James Wallen is an avid hiker who explores the Appalachian Trail segments around the Great Smoky Mountains, a member of the Knoxville Outdoor Adventure Club, a supporter of the Tennessee Volunteers
    basketball and Nashville Predators hockey teams, and occasionally joins local ultimate frisbee pick‑up games.
  arts: James Wallen creates abstract mixed‑media paintings inspired by Mark Rothko’s color fields, plays acoustic folk guitar covering Sufjan Stevens and Joni Mitchell, composes generative music in SuperCollider,
    performs improv with a troupe that studies Del Close, and curates indie film nights featuring Charlie Kaufman’s works.
  travel: James Wallen prefers low‑key, nature‑focused weekend getaways, often backpacking the Blue Ridge Parkway, revisiting Asheville’s vibrant art scene, and dreaming of a future expedition to Iceland’s
    volcanic landscapes, while meticulously planning routes with the AllTrails app to balance adventure with budget constraints and traveling with their spouse.
  culinary: James Wallen enjoys simple farm‑to‑table meals, frequently cooking grilled trout with lemon‑dill sauce, roasted beet and goat cheese salad, and brewing pour‑over coffee with Ethiopian beans,
    while occasionally experimenting with homemade kombucha, though a tendency to over‑season sometimes leads to kitchen mishaps.
  core: James Wallen is a creatively restless yet meticulously organized 28‑year‑old who weaves technology, performance, and nature into a low‑stress, worry‑tinged lifestyle marked by impromptu art installations
    and a penchant for over‑thinking.
background:
  cultural: James grew up in a modest, middle‑class family on the outskirts of Knoxville, where Southern hospitality and community values were woven into daily life. His parents, both educators, emphasized
    academic achievement, leading him to pursue a bachelor's degree in a STEM field at the University of Tennessee. At the same time, he was immersed in the region's rich musical traditions—bluegrass, Appalachian
    folk, and church choirs—which sparked his early love for performance. The blend of rural Appalachian heritage and the vibrant, growing arts scene of Knoxville shaped his worldview, fostering a respect
    for tradition while encouraging experimentation. His marriage reinforces a collaborative, supportive household that values mutual growth. This cultural tapestry informs his artistic voice, which often
    weaves together local storytelling motifs with modern, abstract concepts.
attributes:
  skills: '[''Improvisational acting and character work'', ''Contemporary dance and movement'', ''Stage combat and stunt coordination'', ''Live sound engineering and mixing'', ''Lighting design and DMX
    programming'', ''Video projection and multimedia integration'', ''Python programming for interactive installations'', ''Performance data analysis and audience metrics'', ''Creative direction and choreography'',
    ''Collaborative team leadership and conflict resolution'']'
  hobbies: '[''Abstract mixed‑media painting'', ''Acoustic guitar playing and songwriting'', ''Reading speculative and science‑fiction literature'', ''Hiking in the Great Smoky Mountains'', ''Yoga and meditation
    for stress management'', ''Creating interactive art installations with Arduino/Raspberry Pi'', ''Participating in local improv comedy troupe'', ''Playing cooperative strategy board games'', ''Photography
    of natural landscapes'', ''Coding generative music scripts'']'
  career_goals: James aims to become a leading figure in the emerging field of performance technology, creating immersive, narrative‑driven shows that fuse live acting with interactive digital media. Over
    the next five years he plans to launch an interdisciplinary performance company in Knoxville that produces site‑specific works in the Great Smoky Mountains and urban venues, securing regional arts grants
    and partnerships with local musicians and visual artists. He aspires to develop a signature solo piece that explores abstract concepts of memory and identity, utilizing motion‑capture and generative
    soundscapes he programs himself. Long‑term, he hopes to transition into academia as an adjunct professor in a theatre‑technology program, mentoring students to blend technical rigor with artistic curiosity
    while maintaining a balanced, low‑stress lifestyle that supports his marriage.
