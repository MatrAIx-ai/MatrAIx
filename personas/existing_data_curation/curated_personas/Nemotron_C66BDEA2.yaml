  career_goals: 'Juan aims to transition from a senior DBA role to a lead data architect position within the next three years, overseeing the data strategy for a multi‑site organization in the Midwest.
    He plans to earn advanced certifications such as Microsoft Certified: Azure Data Engineer Associate and AWS Certified Database – Specialty, and to spearhead enterprise‑wide data‑governance programs
    that improve data quality and accessibility. In the longer term, Juan envisions founding a consultancy that helps small‑to‑mid‑size businesses modernize their data infrastructures while also mentoring
    the next generation of database professionals.'
