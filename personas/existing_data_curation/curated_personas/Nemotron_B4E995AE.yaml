  hobbies: '[''Visiting local art galleries and museums'', ''Painting and mixed-media art'', ''Pottery and ceramics classes'', ''Reading contemporary fiction and non-fiction (especially art history and
    psychology)'', ''Participating in a book club'', ''Volunteering at the community center and senior services'', ''Gardening and growing herbs'', ''Cooking experimental recipes'', ''Attending and performing
    in community theater productions'', ''Organizing neighborhood social events'', ''Practicing yoga and mindfulness for anxiety management'']'
  career_goals: Rochell aims to advance from a general office clerk to an office manager or senior administrative coordinator within her organization, leveraging her reliability and interpersonal strengths
    to lead a small team. She also seeks to blend her administrative expertise with her passion for the arts by pursuing a certification in arts administration or community program management. Over the
    next few years, she hopes to spearhead cultural outreach initiatives for local nonprofits, organize art‑focused events, and eventually transition into a role that allows her to curate community art
    programs while maintaining job stability and a supportive environment for her emotional well‑being.
