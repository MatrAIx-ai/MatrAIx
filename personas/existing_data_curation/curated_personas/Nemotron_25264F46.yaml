personas:
  professional: Howard Moran is a budding junior game developer who pairs their love for cartoon drawing with Scratch programming to create whimsical adventure games, meticulously planning each level in
    line with their organized, methodical nature while collaborating with peers in the school STEM club.
  sports: Howard Moran stays active by biking the Natchez Trace Trail, playing forward on their local youth soccer team in the Nashville Soccer Club, cheering for the Tennessee Titans and the Nashville
    Predators, and joining after‑school cross‑country runs, although they sometimes skip stretching before games, leading to occasional sore calves.
  arts: Howard Moran pours creative energy into sketching cartoons inspired by Mo Willems, painting cityscapes in the style of Edward Hopper, constructing intricate LEGO sculptures like those of Nathan Sawaya,
    and practicing beginner piano pieces by Beethoven and Yiruma while listening to Joe Hisaishi soundtracks, even though they sometimes leave crayon stains on the kitchen table.
  travel: Howard Moran loves family road trips to the Great Smoky Mountains National Park and historic New Orleans, dreams of seeing the Eiffel Tower and Machu Picchu someday, plans itineraries using a
    child‑friendly travel app, and prefers adventurous hikes over resort vacations, though they sometimes get restless on long car rides and request frequent snack stops.
  culinary: Howard Moran enjoys making homemade pizza topped with mozzarella, pepperoni, and fresh basil, whipping up banana pancakes with sliced strawberries for breakfast, experimenting with simple cucumber‑avocado
    sushi rolls, and secretly over‑salting their popcorn at movie nights, reflecting a budding but occasionally over‑enthusiastic cooking style.
  core: Howard Moran is a curious, organized 10‑year‑old who blends artistic imagination with methodical tinkering, turning every LEGO set, sketchbook, and Scratch project into a small adventure—though
    they sometimes lose track of time and forget to tidy up.
background:
  cultural: Howard grows up in Franklin, Tennessee, a suburban community known for its blend of Southern hospitality and a growing arts scene. His family participates in local traditions such as church
    gatherings, county fairs, and seasonal celebrations like Fourth of July fireworks, which have instilled values of community, politeness, and modesty. At school, he experiences a curriculum that emphasizes
    American history, including Civil War heritage, while also exposing him to multicultural perspectives through literature and media. The proximity to historic sites and music festivals provides him with
    an appreciation for both traditional Southern music and contemporary influences. These cultural touchstones shape his worldview, encouraging respect for tradition alongside an openness to new ideas.
