persona_description: A scientist who specializes in the field of cell biology and anatomy, particularly in the study of animal form and its evolution. He is known for proposing an alternative model of evolution
  that challenges the commonly held belief that survival is based on a change's functional advantage. His research interests include the genetics of the single-celled ancestors of animals, the physics of
  middle-scale materials, and the development of complex body forms in animals. He is a professor at the University of California, Berkeley, and has published his perspective article in the journal Science.
