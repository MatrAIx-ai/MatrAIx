persona_description: A cognitive psychologist who specializes in the study of eye movements and their role in mental processes, particularly in reading, driving, and scene perception. This individual is
  interested in investigating the controversies surrounding variations in eye movements associated with reading ability, the extent to which text is used by the guidance mechanism while reading, and the
  relationship between eye movements and the control of other body movements. They are also interested in the nature of the guidance mechanism itself, and the acquisition of complex perceptual-motor skills.
