  hobbies: '[''LEGO building'', ''Puzzle solving (jigsaws, Sudoku)'', ''Reading chapter‑book series'', ''Piano practice'', ''Organizing stuffed animals'', ''Gardening'', ''Caring for a pet rabbit'', ''Simple
    baking with family'']'
  career_goals: Andrea dreams of a future where she can combine her love for structure, helping others, and working with animals. In the short term she aims to be top of her class, join the school’s science
    club, and volunteer to read to younger students. Long‑term, she aspires to become a primary‑school teacher or a veterinarian, careers that let her create orderly learning environments or provide compassionate
    care while following clear, predictable routines.
