personas:
  professional: Herbert Moses is a veteran travel clerk whose three decades of mastering Sabre and Amadeus have made him a go‑to authority for precise itineraries, meticulous record‑keeping, and training
    new agents, and he now channels that methodical expertise toward a supervisory role that blends mentorship with process improvement.
  sports: Herbert Moses bowls competitively in his local league, cheers on the Birmingham High Bulldogs football team at Friday night games, follows the Tennessee Titans for NFL action, and plays occasional
    golf at the Rotary Club’s partner course, all while maintaining a friendly rivalry with league mates.
  arts: Herbert Moses unwinds by reading Southern historical nonfiction, listening to the blues of B.B. King and folk storytelling of John Prine, attending community theater productions at the Birmingham
    Playhouse, and collecting vintage Chevrolet brochures that double as art pieces.
  travel: Herbert Moses plans his road trips with the precision of a travel clerk, mapping out historic sites such as Monticello, Savannah’s Historic District, and The Alamo, budgeting each mileage and
    lodging detail, and dreams of a leisurely visit to Williamsburg and the Georgia coastal towns, all while keeping a notebook of itinerary tweaks.
  culinary: Herbert Moses loves cooking with garden fresh tomatoes, collard greens, and sweet corn, often preparing shrimp and grits, heirloom tomato salad with basil, and slow‑roasted pork shoulder with
    apples, while occasionally treating himself to a new vintage car restoration meal like a classic cheeseburger topped with homemade pickles.
  core: Herbert Moses is a methodical planner who blends a competitive spirit with community service, balances low‑risk investing with vintage car passions, and runs a tightly scheduled life that still
    finds room for historic road trips and Southern comforts.
background:
  cultural: Herbert is a white Southern American who was born and raised in the Birmingham area. His upbringing was shaped by traditional Southern values—strong family ties, community service, and a deep
    respect for local customs. He grew up attending a Baptist church, where he learned the importance of hospitality and civic responsibility. The heritage of the Deep South influences his love for regional
    history, Southern cuisine, and support for local high‑school sports. While he acknowledges the social changes that have taken place since his youth, he remains grounded in the practical, pragmatic mindset
    often associated with his generation in Alabama.
attributes:
  skills: '["Ticket reservation management", "Travel itinerary planning", "Customer service excellence", "Conflict resolution", "Logistics coordination", "Sabre/Amadeus reservation software proficiency",
