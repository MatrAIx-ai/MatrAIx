    performance tracking"]'
  hobbies: '["Bowling league participation", "Attending local high school football games", "Volunteering at church food pantry", "Rotary Club membership", "Weekend historic site tours", "Gardening", "Classic
    car restoration", "Reading Southern historical nonfiction", "Family road trips", "Chess sessions at the senior center"]'
  career_goals: Approaching retirement, Herbert aims to transition into a senior supervisory or consulting role where he can leverage his extensive operational knowledge to train the next generation of
    travel agents and improve agency efficiency. He is pursuing certification in travel management to formalize his expertise and hopes to lead a small team that specializes in group travel packages for
    senior citizens, combining his educational background with his industry experience. Additionally, he seeks to be recognized as a top performer in his current organization, setting new benchmarks for
    customer satisfaction and on‑time ticket processing.
