personas:
  professional: Kerry Ennis, a 57‑year‑old utilities customer‑service veteran, blends empathetic listening with pragmatic adoption of CRM tools to de‑escalate calls, mentors new agents, and is charting
    a path toward a supervisory role while completing an associate degree in Business Administration.
  sports: Kerry Ennis, a regular participant in the Greenville Walking Club, enjoys leisurely strolls along the Reedy River Trail, cheers on the Carolina Panthers each Sunday, and occasionally joins a senior‑level
    softball league organized by the local church.
  arts: Kerry Ennis, an avid reader of Southern historical novels by Margaret Mitchell and James Lee Burke, draws inspiration for her quilts from the vibrant tapestries of Faith Ringgold, and unwinds to
    the mellow harmonies of Alison Krauss while attending monthly literary talks at the Greenville County Library.
  travel: Kerry Ennis, who favors low‑key road trips with a herb‑filled cooler, has explored historic Charleston and Savannah, dreams of touring Shakespeare’s hometown in Stratford‑upon‑Avon, and plans
    a weekend retreat along Asheville’s Blue Ridge Parkway, always opting for modest lodgings to stretch a modest retirement budget.
  culinary: Kerry Ennis, a proficient home cook, seasons low‑country shrimp and grits with garden‑fresh thyme and rosemary, bakes peach cobbler using heirloom peaches from a local CSA, and swaps seed packets
    for new culinary experiments at the monthly farmers’ market.
  core: Kerry Ennis, a compassionate mentor who balances tech‑savvy curiosity with Southern‑rooted pragmatism, tends to over‑water her native plants while never missing a Sunday call on the senior support
    line.
background:
  cultural: Kerry was raised in the Upstate of South Carolina, immersed in Southern hospitality, church-centered community life, and a strong sense of family responsibility. Her upbringing in a Protestant
    (Baptist) household emphasized service, modesty, and mutual support, shaping her compassionate and cooperative nature. Living in Simpsonville, she enjoys the blend of small‑town charm and the growing
    cultural diversity of the Greenville County area. Traditions such as seasonal potlucks, church gatherings, and a love for the region's natural landscape—like the Piedmont foothills—inform her values
    and everyday interactions.
attributes:
  skills: '[''Effective Communication'', ''Active Listening'', ''Conflict Resolution'', ''CRM Software Proficiency (e.g., Salesforce, Zendesk)'', ''Problem Solving'', ''Multitasking'', ''Time Management'',
    ''Team Collaboration'', ''Technical Troubleshooting'', ''Training and Mentoring'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Volunteer Senior Support Hotline'', ''Reading Historical Fiction'', ''Hiking on Local Trails'', ''Journaling'', ''Attending Community History Lectures'']'
  career_goals: Kerry aims to transition from a pure representative role to a mentorship and training position, where she can share her practical knowledge with newer agents. She hopes to earn a supervisory
    title within the next two years, overseeing a small group of reps and contributing to process improvements. Completing her associate degree in Business Administration is also a personal milestone. Long‑term,
    she envisions a part‑time consulting role that assists nonprofit hotlines serving seniors and widowed individuals, blending her professional expertise with her compassionate drive to help others.
