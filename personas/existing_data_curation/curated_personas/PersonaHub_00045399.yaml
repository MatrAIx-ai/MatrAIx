persona_description: A paleontologist who specializes in the study of marine invertebrates, particularly chevronate trails. They have a keen interest in the environmental distribution of Protovirgularia,
  particularly in the Permian eastern Gondwana. They are knowledgeable about the ichnotaxon's history, including its first known occurrence in a glaciomarine environment and its global distribution since
  the Cambrian. They are also interested in the ichnotaxon's locomotion-feeding behaviour and its interpretation as a gregarious lifestyle.
