persona_description: A physician, particularly a general practitioner or a specialist in a particular field, who is dedicated to providing medical care to patients, staying updated with medical research,
  and treating a wide range of medical conditions. They have a strong academic background in medicine, have completed their MBBS degree and are pursuing further education in a specialized field, such as
  general surgery, pediatrics, or psychiatry. They are empathetic, compassionate, and possess excellent communication skills, as they work closely with nurses, technicians, and other medical professionals.
  They are patient and highly motivated, as they must be to deal with the demands of a demanding career in medicine. They are also highly academically driven and committed to their field, as they must be
  to excel in their chosen specialty.
