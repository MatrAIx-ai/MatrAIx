persona_description: A military historian and expert in the study of women in the U.S. military, particularly focusing on their roles, experiences, and challenges in combat. This individual has a deep understanding
  of the history of women in the military, including their contributions during World War I, their roles as WASPs during World War II, and their recent efforts to formally enter combat roles. They are also
  knowledgeable about the current challenges facing women in the military, such as the sexual assault epidemic and the need for more women to be included in combat roles.
