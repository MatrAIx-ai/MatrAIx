personas:
  professional: Terresa Bolognesi is a budding junior game designer who blends their penchant for Minecraft world‑building with strategic insights from chess, channeling their boundless curiosity and competitive
    edge into crafting imaginative level concepts for their after‑school art program, though their relaxed attitude toward deadlines often leaves sketches scattered across the bedroom floor.
  sports: Terresa Bolognesi kicks the ball as a midfielder for the local U‑11 soccer club, idolizes the creative play of San Diego Wave FC’s forwards, and when off the field they follow the San Diego Padres
    and LA Lakers, often debating game strategies with friends after school.
  arts: Terresa Bolognesi fills sketchbooks with lively doodles inspired by the graphic novel Amulet by Kazu Kibuishi and the whimsical worlds of Studio Ghibli, frequenting the San Diego Museum of Art to
    study bold color palettes, and they immerse themselves in the indie pop sounds of Owl City while drawing, making their artistic style a blend of fantasy storytelling and contemporary music vibes.
  travel: Terresa Bolognesi loves impromptu weekend trips to La Jolla Cove for tide‑pooling and coastal hikes, yet they dream of a future summer voyage to Tokyo’s Akihabara district to explore anime shops
    and bright neon streets, balancing their love for nature’s quiet with a curiosity for bustling city life.
  culinary: Terresa Bolognesi whips up homemade cheesy pepperoni pizza with a whole‑grain crust, pairs it with fresh guacamole and tortilla chips, and experiments with simple sushi rolls using cucumber,
    avocado, and cooked shrimp, though they often skip the veggies after an intense gaming session, leaving a lingering craving for crunchy carrots.
  core: Terresa Bolognesi is a curious, competitively spirited 10‑year‑old who transforms beach walks into sketchbook adventures, trades structured homework plans for spontaneous art projects, and secretly
    hoards superhero stickers in the hidden pocket of their sneakers.
background:
  cultural: Teresa comes from an Italian‑American family in El Cajon, where family gatherings often feature homemade pasta and traditions like celebrating Ferragosto. Growing up in the culturally diverse
    San Diego area, she has been exposed to a blend of Mediterranean heritage, Californian outdoor lifestyle, and neighboring Mexican‑American influences, shaping a broad appreciation for food, festivals,
    and community arts.
