  career_goals: David aims to fuse his artistic vision with technical expertise by pursuing a career in interactive media design, game development, or architectural visualization. He plans to apply to a
    specialized high‑school program that emphasizes visual arts and computer science, build a compelling portfolio, and ultimately earn a degree in game design, digital art, or architecture. His long‑term
    ambition is to create immersive, aesthetically striking digital experiences that blend storytelling, visual artistry, and user‑centered design, while earning scholarships that enable study at a top
    art‑tech university.
