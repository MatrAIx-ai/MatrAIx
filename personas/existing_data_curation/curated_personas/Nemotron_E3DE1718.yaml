  hobbies: '[''fishing'', ''hunting'', ''woodworking'', ''DIY home improvement'', ''reading non-fiction'', ''gardening'', ''car restoration'', ''watching sports'']'
  career_goals: Brandon aims to transition from a hands-on installer to a foreman or small-business owner within the next five years. He plans to obtain a Certified Drywall Installer credential and a Texas
    contractor’s license, which will enable him to bid on larger multi-unit housing projects. He also wants to develop more structured project-management skills, build a reliable crew, and eventually offer
    turnkey interior finishing services. Financially, he seeks a stable income that supports his independent lifestyle while allowing him to save for a modest retirement and possibly purchase a second property.
