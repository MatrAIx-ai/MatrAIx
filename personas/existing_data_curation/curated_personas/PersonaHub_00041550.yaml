persona_description: A professional engineer or technician who specializes in the design, installation, and maintenance of heat exchangers, particularly in the field of waste gas treatment and processing.
  They are skilled in the use of plate heat exchangers and have experience with various applications, including refrigeration, HVAC, chemical, metallurgy, mechanical, power, paper, textile, food, and grease
  processing industries. They are familiar with the key features and benefits of plate heat exchangers, such as high efficiency, compact structure, easy cleaning, long service life, and no liquid through,
  and are able to apply these technologies to solve complex industrial problems.
