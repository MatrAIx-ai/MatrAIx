personas:
  professional: Lee Hedman, an aspiring user experience researcher and sustainability‑focused product designer, blends curiosity‑driven Arduino tinkering with strong data‑visualization skills to rapidly
    prototype community‑centric solutions, while they channel occasional over‑worry into meticulous documentation and iterative refinements.
  sports: Lee Hedman, an avid weekend hiker who regularly explores Tilden and Sibley Lakes trails, also follows the Golden State Warriors and San Jose Earthquakes, joins the Berkeley Bicycle Club for monthly
    rides, and plays in a casual beach‑volleyball league each summer, balancing a relaxed fitness routine while they worry about maintaining consistent cardio training.
  arts: Lee Hedman, a regular at open‑mic nights at Café Stritch, draws creative inspiration from indie artists like Bon Iver and Björk, devours science‑fiction classics by Ursula K. Le Guin, and crafts
    Arduino‑driven interactive art installations reminiscent of Beeple’s digital work, all while they often engage in thoughtful discussions about philosophy and design.
  travel: Lee Hedman, who prefers spontaneous, budget‑conscious adventures over rigid itineraries, has hiked Yosemite’s misty trails, explored Portland’s bike‑friendly streets, camped under Iceland’s Northern
    Lights, and now dreams of trekking the Inca Trail to Machu Picchu and immersing themselves in Kyoto’s historic neighborhoods, balancing a strong desire for experiential learning with limited student‑loan
    finances, which they navigate with careful budgeting.
  culinary: Lee Hedman, an intermediate home chef who experiments with eclectic dishes such as Thai green curry with lemongrass, Ethiopian injera topped with spiced lentils, and Japanese okonomiyaki garnished
    with bonito flakes, sources fresh produce from the local community garden, relies on aromatic ingredients like miso, fresh herbs, and locally roasted coffee beans, and sometimes burns the edges of a
    soufflé when stress spikes, which they attribute to lingering anxiety.
  core: Lee Hedman, a 21‑year‑old tech‑savvy dreamer who balances restless curiosity with chronic worry, lives amid a cluttered workspace of Arduino parts, meditation cushions, and half‑finished design
    sketches, constantly juggling spontaneity and a need for structure, which they often struggle to reconcile.
background:
  cultural: Lee comes from a white, middle‑class American family with roots in northern European ancestry. His upbringing emphasized independence, self‑reliance, and a respect for education, typical of
    many suburban households. Moving to Berkeley for his associate's studies exposed him to the city’s progressive, activist‑driven culture, which has broadened his perspective on social equity, environmental
    sustainability, and community involvement. This blend of a traditional white American heritage and the inclusive, diverse atmosphere of the Bay Area shapes his worldview, giving him a pragmatic foundation
    while fostering openness to new ideas and a strong commitment to collaborative, socially conscious endeavors.
attributes:
  skills: '[''Python scripting'', ''Data visualization (Tableau/PowerBI)'', ''Basic web development (HTML, CSS, JavaScript)'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Problem solving and troubleshooting'',
