  hobbies: '[''Hiking in East Bay hills'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading science‑fiction and philosophy'', ''Cooking experimental recipes'', ''Attending open‑mic and live
    music events'', ''Volunteer work at community garden'', ''Participating in hackathons'', ''Graphic illustration and digital art'', ''Mindfulness meditation and journaling'', ''Playing indie video games'']'
  career_goals: Lee aims to turn his blend of technical curiosity and practical mindset into a career at the intersection of technology and social impact. He envisions roles such as user experience researcher,
    product designer, or sustainability analyst within progressive tech startups or nonprofit tech labs. Over the next few years, he plans to complete a bachelor's degree in Human‑Centered Design or Environmental
    Studies, acquire certifications in UX research, and build a portfolio of community‑focused projects. Ultimately, he hopes to launch his own social‑enterprise that leverages low‑cost tech solutions to
    empower local neighborhoods and promote environmental stewardship, while maintaining a flexible work environment that allows continuous learning and creative experimentation.
