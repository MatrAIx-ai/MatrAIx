personas:
  professional: Niki Crow, a junior Girl Scout project coordinator who channels her love for structure and neighborly service into organizing monthly park clean‑ups, demonstrates meticulous planning, reliable
    follow‑through, and compassionate teamwork, and dreams of becoming a community planner.
  sports: Niki Crow, an active participant in her community’s youth soccer league who also runs daily with the family dog, follows the Detroit Lions and Michigan State Spartans with enthusiastic game‑day
    rituals, and balances competitive play with a love for structured puzzles.
  arts: Niki Crow, a budding pianist who practices twice a week, sketches whimsical characters in their journal, devours realistic YA novels by authors like John Green, and finds inspiration in the folk‑rock
    sounds of The Lumineers and the storytelling of Pixar films.
  travel: Niki Crow, a road‑trip enthusiast who has visited Niagara Falls and Walt Disney World with family, dreams of exploring the historic monuments of Washington, D.C., and prefers meticulously planned
    itineraries that balance adventure with the comfort of familiar snacks and pit‑stop play‑time.
  culinary: Niki Crow, a budding home cook who adores making classic meatloaf, buttery corn on the cob at summer barbecues, and a perfect batch of chocolate chip cookies, while occasionally skipping vegetables
    like brussels sprouts but never passing up a slice of warm apple pie.
  core: Niki Crow, a 13‑year‑old whose meticulously ordered world of journals, puzzles, and community projects masks a persistent worry that fuels both their compassion and their quest for predictable peace.
background:
  cultural: Niki comes from a white, Midwestern American family rooted in Smiths Creek, Michigan, a small community in St. Clair County. Her ancestry includes German and Irish lineage common to the region.
    Growing up, she experienced the close‑knit, neighbor‑friendly culture of the Great Lakes area, where community gatherings, church events, and local holidays like Thanksgiving and the Fourth of July
    are central. The area's blue‑collar work ethic, emphasis on modesty, politeness, and helping neighbors shapes her values of reliability and compassion. This cultural environment reinforces her practical
    outlook while nurturing her desire to contribute positively to her community.
