  career_goals: Niki aspires to pursue a career that combines her love for helping others with a stable, structured environment. She plans to graduate high school with solid grades, attend a community college,
    and earn a nursing degree to become a pediatric nurse, allowing her to support children’s health directly. She also envisions volunteering as a peer‑support mentor for younger students and hopes to
    create a teen‑focused mental‑health outreach program in her community. Ultimately, Niki wants a reliable, compassionate profession where she can make a tangible difference while maintaining a predictable
    routine.
