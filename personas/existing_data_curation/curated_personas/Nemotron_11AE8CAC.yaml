  career_goals: Monica aims to attend an arts‑focused high school where she can build a professional portfolio and eventually study graphic design or animation. She hopes to become a multimedia artist who
    can blend illustration, storytelling, and motion graphics, and dreams of launching a YouTube channel that showcases her creative process and interviews local artists. In the longer term she envisions
    working at a creative studio or as a community arts coordinator, using her sociable nature to lead workshops and public events that celebrate diverse artistic expression.
