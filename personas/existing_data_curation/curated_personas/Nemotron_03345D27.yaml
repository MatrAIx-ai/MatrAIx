    and public speaking (one-to-one)'', ''Copy editing basics'', ''Market research and competitive analysis'']'
  hobbies: '[''Reading marketing case studies and psychology books'', ''Contemporary Mexican literature'', ''Cooking traditional Mexican dishes (tamales, mole)'', ''Yoga and mindfulness meditation'', ''Cycling
    and walking along the Chicago lakefront'', ''Puzzle solving and online chess'', ''Street photography with DSLR'', ''Attending small community cultural events (Día de los Muertos, poetry readings)'']'
  career_goals: She aims to move from an advertising sales agent to senior account manager within the next two years, targeting top-performing client portfolios. In the medium term, she aspires to become
    a regional advertising sales director, overseeing a team of agents and shaping sales strategies across the Midwest. To support that, she plans to earn advanced certifications in programmatic buying
    (e.g., IAB Certified), complete an MBA with a focus on marketing analytics, and develop expertise in emerging formats like connected TV and immersive AR ads. Ultimately, she envisions leading a high-impact
    media team or launching her own boutique agency that bridges U.S. and Latin American brands.
