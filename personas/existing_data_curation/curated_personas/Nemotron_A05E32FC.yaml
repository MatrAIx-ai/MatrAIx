personas:
  professional: Alan Estave is a personal care aide in West Palm Beach who leverages their love for routine, hands‑on problem solving, and competitive drive to consistently hit top client‑satisfaction scores,
    while eagerly working toward a CNA credential and a future home‑care business that mirrors their preference for stable, process‑driven care.
  sports: Alan Estave is a dedicated fan of the Miami Marlins and the Florida Panthers, spends weekend mornings casting lines on the Intracoastal Waterway, plays pick‑up basketball at the local YMCA when
    the weather permits, and belongs to a community fishing club that meets at the Palm Beach pier each Saturday.
  arts: Alan Estave unwinds with classic sitcom reruns like 'I Love Lucy' and 'The Andy Griffith Show', devours Agatha Christie mystery novels, and attends occasional community theater productions of 'Our
    Town', all while keeping a modest vinyl collection that includes The Beatles and Miles Davis.
  travel: Alan Estave prefers low‑key road trips that blend routine with surprise, having mapped out annual fishing excursions to the Florida Keys, a nostalgic visit to the Henry Ford Museum in Dearborn,
    and a dreamed‑for weekend getaway to the historic town of Savannah to explore its riverfront and culinary scene.
  culinary: Alan Estave's palate leans toward fresh seafood—grilled grouper with lime and cilantro—paired with garden‑grown tomatoes and basil, they can whip up a hearty shrimp scampi for friends, and they
    indulge in comfort classics like meatloaf with mashed potatoes, though their cooking skill is solid but not culinary‑artist level.
  core: Alan Estave balances a meticulous, routine‑driven work ethic with a love for spontaneous classic‑car tinkering, a competitive edge that fuels high client scores, and a relaxed approach to planning
    that sometimes leaves paperwork and bills in a temporary mess.
background:
  cultural: Alan grew up in a middle‑class white family in the South Florida suburbs, where traditional values and a respect for routine were emphasized. His upbringing blended a Protestant work ethic with
    the multicultural vibe of West Palm Beach, exposing him to Hispanic and Caribbean neighbors. This environment fostered his practical outlook, love of consistent daily patterns, and a modest openness
    to diverse cultural practices, especially in caregiving contexts.
attributes:
  skills: '[''personal hygiene assistance'', ''mobility and transfer support'', ''basic health monitoring'', ''medication reminder'', ''light housekeeping'', ''companion care'', ''patient safety and fall
