  hobbies: '[''fishing in the Intracoastal Waterway'', ''backyard gardening'', ''classic car restoration'', ''watching classic TV sitcoms'', ''reading mystery novels'', ''volunteering at a senior center'']'
  career_goals: Alan aims to formalize his caregiving experience by earning a Certified Nursing Assistant (CNA) credential within the next year. He hopes to advance to a lead aide position at his current
    agency, overseeing a small team and setting care protocols. Long‑term, he dreams of opening a modest home‑care service that emphasizes personalized, routine‑driven care for seniors in West Palm Beach,
    allowing him to combine his competitive drive with his love for stability and practicality.
