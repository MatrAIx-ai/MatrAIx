  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Balcony gardening'', ''Listening to salsa and plena music'', ''Salsa dancing'', ''Reading historical fiction'', ''Cooking Puerto Rican
    cuisine'', ''Journaling for emotional processing'', ''Volunteering at community cultural festivals'']'
  career_goals: Maria aims to obtain a Certified Quality Auditor (CQA) credential within the next two years to formalize her expertise and qualify for a senior quality assurance role. She hopes to lead
    a small team that develops more efficient sampling protocols, reducing waste while maintaining product safety. Maria also wants to introduce a workplace mindfulness program to help colleagues manage
    stress, drawing from her own experiences with anxiety. In the longer term, she envisions transitioning to a part‑time consultancy where she can advise local food producers on quality systems while dedicating
    more time to community art initiatives.
