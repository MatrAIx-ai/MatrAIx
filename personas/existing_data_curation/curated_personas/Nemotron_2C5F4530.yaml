  hobbies: '[''Oil painting'', ''Sketching'', ''Acoustic guitar playing'', ''Volunteering as museum docent'', ''Monthly trivia nights'', ''Organic gardening'', ''Bridge club'', ''Woodworking workshop'',
    ''Cooking traditional Mexican cuisine'', ''Traveling to Mexican cultural festivals'']'
  career_goals: Although retired from formal employment, Nicolas aims to leave a lasting legacy by establishing an intergenerational STEM‑art mentorship program at the Ottumwa community center, where he
    can blend his engineering background with his love of visual arts. He hopes to author a memoir that weaves together his Mexican heritage, his career in engineering, and the lessons learned from a lifetime
    of curiosity and competition. Nicolas also aspires to travel to Mexico to document family stories and traditional craftsmanship, eventually donating a small archive of photographs and recordings to
    a local museum. His overarching ambition is to inspire seniors and youth alike to embrace lifelong learning and creative problem‑solving.
