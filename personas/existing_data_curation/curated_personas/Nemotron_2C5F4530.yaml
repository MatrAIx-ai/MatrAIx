personas:
  professional: Nicolas Solis, a retired mechanical engineer with decades of experience designing agricultural equipment, they now leverage their data‑analysis expertise, bilingual technical writing, and
    hands‑on woodworking to spearhead an intergenerational STEM‑art mentorship program at the Ottumwa community center, where their curiosity and competitive drive shape rigorous project challenges and
    creative critiques.
  sports: Nicolas Solis, an avid walker who joins the Ottumwa Senior Fitness Walkers each spring and never misses a Saturday Iowa Hawkeyes football game, they balance low‑impact cardio with weekly bridge
    sessions for mental stamina, and they keep a modest stash of tennis balls for impromptu backyard rallies with grandchildren during summer.
  arts: Nicolas Solis, who paints oils inspired by the vibrant brushwork of Frida Kahlo and the dramatic chiaroscuro of Caravaggio, they strum acoustic renditions of Bob Dylan and James Taylor at community
    gatherings, and they regularly curate mini‑exhibits at the Wapello County Historical Museum featuring local folk artists and historic photographs.
  travel: Nicolas Solis, who favors flexible road trips and meticulously plans annual visits to family roots in Oaxaca, Mexico, they also enjoy weekend getaways to the historic river town of Natchez, Mississippi,
    and the scenic Wisconsin Dells, traveling with a well‑worn notebook to capture stories and photographs for a future community archive.
  culinary: Nicolas Solis, an enthusiastic home chef who expertly prepares mole poblano and hand‑made tamales using dried chilies, cumin, and heirloom tomatoes from their garden, they frequently garnish
    dishes with fresh cilantro, lime, and roasted pumpkin seeds, and they delight in sharing these meals at neighborhood potlucks and family celebrations.
  core: Nicolas Solis blends engineering precision with artistic spontaneity, tackling life with a competitive edge, a delightfully scattered notebook, and a habit of humming folk tunes while tending heirloom
    tomatoes.
background:
  cultural: Nicolas is a first‑generation Mexican American whose parents immigrated to the United States in the early 1950s. Raised in a bilingual household, he grew up celebrating Día de los Muertos, Las
    Posadas, and Mexican Independence Day, often preparing traditional foods and sharing stories of his family's hometown in Jalisco. His Mexican heritage influences his worldview, emphasizing family cohesion,
    respect for elders, and a strong work ethic. Though he has lived most of his adult life in Iowa, he maintains close ties with a vibrant Mexican community in the region, participating in cultural festivals,
    language exchange groups, and religious celebrations at the local Catholic parish. This blend of Mexican traditions and Midwestern values shapes his identity and informs his desire to preserve cultural
    knowledge for future generations.
