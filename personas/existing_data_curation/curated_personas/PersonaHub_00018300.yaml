persona_description: A Visual Basic 2008 programmer who seeks to understand and master the latest features and innovations in the language, as well as the associated platform features and programming techniques.
  This person is likely to be interested in learning about the latest updates in Visual Basic 2008, as well as the broader scope of programming with .NET 3.5, including the use of LINQ data queries, WPF,
  ASP.NET Ajax, WPF, and Silverlight-based rich Internet application development, as well as creating Web services with Windows Communication Foundation (WCF). This person is also likely to be interested
  in learning about object initializers, object anonymous types, implicitly typed local variables and arrays, delegates, lambda expressions, and extension methods, as well as the latest language features
  introduced in this edition.
