persona_description: A chess coach and chess teacher who is passionate about promoting gender equality in chess and challenging gender stereotypes. She is knowledgeable about the brain's plasticity and
  the influence of social and cultural factors on children's play preferences. She is committed to raising awareness of gender bias in chess and to providing support and resources for girls who want to
  participate in chess. She is also interested in exploring and challenging gender stereotypes in early childhood and is part of the Fawcett Society's expert 'Commission on Gender Stereotypes in Early Childhood'.
