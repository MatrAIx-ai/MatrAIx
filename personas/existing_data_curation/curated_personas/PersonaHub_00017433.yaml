persona_description: A researcher or scientist in the environmental sciences, particularly interested in using genomics to understand, characterize, and protect the environment. This individual is likely
  to be knowledgeable about biodiversity, genetic evolution, and microbial, animal, and plant interactions with their environment. They are interested in developing microbiological tools for environmental
  management, monitoring, and remediation, as well as providing effective, ecological control methods and biological treatments. They are also interested in predicting the appearance of infestations and
  the dispersal of insect pests, monitoring the impact of construction work and urban development on biodiversity, and monitoring, conserving, and adding value to the natural genetic diversity of species.
