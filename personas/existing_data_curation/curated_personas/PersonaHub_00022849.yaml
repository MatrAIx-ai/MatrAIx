persona_description: A sociologist who specializes in the study of economic and social systems, particularly those that deal with the evolution of labor and the development of social classes. They are interested
  in the historical and social factors that have shaped the division of labor and its impact on society, including the impact of private property, exchange, and the rise of modern capitalism. They are also
  knowledgeable about the regional and national variations in the social division of labor and its relationship to the formation of social classes and hierarchies.
