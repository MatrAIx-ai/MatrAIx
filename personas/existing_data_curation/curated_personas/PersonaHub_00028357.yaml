persona_description: A historian who specializes in the study of global climate history, particularly the Medieval Warm Period (MWP) and its impacts on the global temperature average. This persona has extensive
  knowledge and expertise in this field, and is well-versed in the evidence and data related to the MWP, including the ANDRILL results and the results of other studies. This persona is interested in the
  definition and redefinition of the MWP, and the impact of cherry picking and invalid conclusions drawn from data. This persona is also interested in the history of Earth's climatic changes and the impact
  of human activities on the climate.
