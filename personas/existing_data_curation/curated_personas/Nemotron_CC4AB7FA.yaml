  career_goals: William aims to transition into a technical lead or solutions architect role where he can shape the overall direction of projects while maintaining a stable, predictable work environment.
    He plans to earn advanced cloud certifications (e.g., Microsoft Azure Solutions Architect and AWS Certified Solutions Architect) to broaden his expertise. Mentoring is a key ambition; he wants to develop
    a structured onboarding program for junior developers to reduce onboarding anxiety and improve team cohesion. Additionally, he hopes to secure a partially remote schedule to better manage his anxiety
    and allow more personal time for self‑care and family. Long‑term, he envisions contributing to community‑focused tech initiatives in Green Bay, such as civic app development or digital inclusion programs.
