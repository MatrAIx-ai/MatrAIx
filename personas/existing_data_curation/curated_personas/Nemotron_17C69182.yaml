  hobbies: '[''gardening'', ''cooking traditional Serbian cuisine'', ''book club participation'', ''folk dancing (Balkan dances)'', ''volunteer work at historical society'', ''genealogy research'', ''senior
    travel group excursions'', ''yoga and gentle exercise'', ''digital literacy workshops'', ''community theater attendance'']'
  career_goals: Despina aims to deepen her involvement with the Syracuse senior community by leading intergenerational mentorship programs and establishing a local oral‑history archive that captures the
    experiences of older residents. She also aspires to complete a memoir documenting her family's migration story and to master digital storytelling tools, enabling her to share her cultural heritage with
    younger audiences. Additionally, she seeks to maintain her health through regular yoga, gentle hiking, and to develop strategies for managing worry and stress, ensuring a balanced and fulfilling retirement.
