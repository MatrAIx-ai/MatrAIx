  career_goals: Fred aims to deepen his clinical impact by completing a Bachelor of Science in Nursing and pursuing a Doctor of Nursing Practice with a focus on geriatric and holistic care. He envisions
    establishing a small community health clinic in Silver Lake that blends conventional medicine with art‑therapy programs to improve mental well‑being. Additionally, he aspires to become a clinical educator,
    mentoring future nurse practitioners and advocating for flexible, patient‑centered care models within the Indiana health system. His long‑term ambition includes serving on a regional health board to
    influence policy that supports rural health innovation.
