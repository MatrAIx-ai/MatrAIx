persona_description: A geographer or environmental scientist who specializes in landscape ecology, specifically focusing on the effects of human activities on wetland ecosystems. This individual has a deep
  understanding of the relationship between human development and the environment, and has conducted research on the spread of human infrastructure, the drying of wetlands, and the impact of shrub invasion
  on wetland areas. They are also skilled in spatial analysis and have developed software to overlay aerial photos on a computer, allowing them to precisely compare wetland areas from different time periods.
