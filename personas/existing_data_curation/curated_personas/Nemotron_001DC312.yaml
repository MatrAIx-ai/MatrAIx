    ''Multilingual Communication (English/Spanish)'']'
  hobbies: '[''Jazz Saxophone'', ''Community Jam Sessions'', ''Yoga'', ''Mindfulness Meditation'', ''Charity 5K Runs'', ''Reading African‑American Fiction'', ''Cooking Soul‑Food'', ''Mentoring High‑School
    Students'', ''Traveling to Cultural Festivals'', ''Attending Art Exhibitions'', ''Watching Houston Rockets and Astros Games'', ''Participating in Book Clubs'']'
  career_goals: Dr. Fisher aims to become a leader in health‑equity initiatives within the Houston metropolitan area, eventually serving as director of a department that integrates clinical care with community
    outreach. He plans to launch a nonprofit clinic that offers culturally tailored preventive services and incorporates arts‑based therapies for chronic disease management. Over the next decade, he also
    aspires to contribute to the medical humanities literature, author a book on narrative medicine, and mentor the next generation of physicians in socially responsible practice.
