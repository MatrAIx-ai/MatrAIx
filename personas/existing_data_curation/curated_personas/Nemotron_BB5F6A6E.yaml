personas:
  professional: Jayashree Mehta, an aspiring young visual storyteller, channels their curiosity and methodical planning into sketching detailed comic panels, coding interactive narratives in Scratch, and
    mastering violin pieces, all while preferring quiet, focused studio sessions over noisy group projects.
  sports: Jayashree Mehta enjoys brisk weekend nature walks and participates in a local youth soccer club that practices on Saturday mornings, while cheering on the Los Angeles Lakers in basketball and
    the New York Yankees in baseball, preferring low‑impact activities that fit their organized schedule.
  arts: Jayashree Mehta spends afternoons sketching scenes inspired by the vibrant brushwork of Frida Kahlo and the dreamy storytelling of Hayao Miyazaki, practices Bharatanatyam steps drawn from Alarmel
    Valli’s choreography, and delights in the violin performances of Lindsey Stirling, weaving these influences into a distinctive artistic voice.
  travel: Jayashree Mehta prefers carefully planned family outings, such as weekend visits to the nearby state park’s butterfly garden and day trips to the city’s hands‑on science museum, while dreaming
    of a future vacation to the Louvre in Paris and a nature trek in the Canadian Rockies, balancing schoolwork and a modest allowance.
  culinary: Jayashree Mehta assists with cooking aromatic dal‑tadka, fragrant vegetable biryani, and buttery naan at home, eagerly experimenting with cumin, coriander, and turmeric while also mastering
    simple chocolate chip cookies, and they savors the bright flavors of fresh mango slices after museum trips.
  core: Jayashree Mehta is a quietly curious 11‑year‑old who blends meticulous sketching, code‑crafted storybooks, and disciplined violin practice into a richly artistic world, though they often lose track
    of time and forget to eat lunch during museum expeditions.
background:
  cultural: Jayashree is a second‑generation Indian‑American whose parents immigrated from Gujarat. At home, Hindi and Gujarati are spoken, and the family celebrates Diwali, Holi, Navratri, and other festivals
    with traditional foods, lights, and cultural performances. They live in Pickerington, Ohio, a suburb with a growing South Asian community; they shop at a local Indian grocery, attend events at the nearby
    Hindu temple, and participate in cultural programs organized by the local Indian American Association. While fully integrated into American school life and community activities, Jayashree balances both
    identities, often wearing traditional attire for family celebrations while enjoying American school traditions such as field trips and sports days.
