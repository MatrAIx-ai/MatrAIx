  career_goals: Jayashree dreams of combining her love for art and her caring nature by eventually becoming a museum curator or art therapist who uses creative activities to help children express themselves.
    She is fascinated by multicultural art history and hopes to study art preservation and design, aiming to create inclusive exhibitions that celebrate both Indian and Western traditions. In the short
    term, she wants to build a strong portfolio, win school art awards, and deepen her knowledge of art history and digital design.
