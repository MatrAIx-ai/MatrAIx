    and exhibit coordination'']'
  career_goals: Martha’s professional ambition is to advance from her current clerk role to a senior court administrator position within the next five years. She plans to complete her bachelor’s degree
    in public administration, and obtain a Certified Records Manager (CRM) credential to deepen her expertise in information governance. Leveraging her passion for art, she hopes to spearhead a municipal
    Arts‑and‑Civic Engagement program that integrates local artists into public spaces and licensing events. Martha also aims to lead a department‑wide digital transformation project that replaces paper‑based
    filing with cloud‑based workflow systems, improving efficiency and reducing stress for staff. Additionally, she is committed to establishing a wellness initiative that provides mindfulness workshops
    and stress‑management resources for municipal employees, reflecting her personal experience with anxiety. By combining operational excellence with community‑focused creativity, she seeks to make a lasting
    positive impact on both her agency and the broader Orange County community.
