  hobbies: '["Custom mechanical projects", "Home automation", "Weightlifting", "Powerlifting competitions", "Chess", "Pick‑up basketball", "Live jazz and hip‑hop concerts", "Soul‑food cooking", "STEM mentorship"]'
  career_goals: Bobby aims to obtain his Professional Engineer (PE) license within the next two years and to advance to a senior mechanical‑design engineer role leading cross‑functional projects at a major
    manufacturing firm in Chicago. He seeks to specialize in sustainable product development, particularly in renewable‑energy hardware, and to drive cost‑effective, high‑performance designs. In the longer
    term, he aspires to a technical leadership position—such as engineering manager or director—where he can mentor younger engineers, influence strategic decisions, and eventually launch his own consultancy
    focused on lean, environmentally responsible engineering solutions.
