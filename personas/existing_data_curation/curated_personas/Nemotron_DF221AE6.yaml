  career_goals: Although retired, Eric aims to remain a dependable resource for his family and community. He plans to complete a written memoir and a detailed family genealogy, deepen his knowledge of sustainable
    gardening, and obtain a local certification for volunteer home‑repair mentorship. Maintaining his health and managing stress are top priorities, so he seeks to incorporate regular walking, mindfulness
    practices, and routine health check‑ups. He also hopes to travel modestly with his wife to historical sites in the Midwest, such as the Frank Lloyd Wright homes and the historic neighborhoods of Chicago.
