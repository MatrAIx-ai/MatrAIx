  career_goals: Shylaja aims to transition into senior leadership, targeting a director‑level role where she can shape company‑wide operational strategy and champion inclusive workplace practices. She intends
    to leverage her experience to spearhead digital transformation initiatives that balance innovation with operational reliability. Mentoring emerging talent, especially women and under‑represented groups,
    is a core ambition. In the longer term, she envisions establishing a community‑focused consulting practice that helps small businesses in the Bay Area improve efficiency while fostering employee well‑being.
