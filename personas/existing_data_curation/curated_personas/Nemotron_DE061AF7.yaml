personas:
  professional: An experienced fabrication specialist with a knack for turning eclectic ideas into functional prototypes, Rebekah Dixon blends MIG/TIG welding, CNC machining and blueprint interpretation
    with a relaxed, collaborative leadership style, and they guide small crews through complex builds while letting creativity and flexibility steer project priorities.
  sports: An outdoor‑focused fitness enthusiast, Rebekah Dixon powers through weekend hikes along the Columbia River Gorge and weekly rides with the Clark County Cycling Collective, cheers on the Portland
    Timbers on match days, and occasionally joins a local adult‑recreational softball league for a dose of team sport, while they keep a modest collection of trail‑ready gear.
  arts: A dedicated patron of the Pacific Northwest arts scene, Rebekah Dixon frequents gallery openings showcasing artists like Amy Hooker and James Murphy, curates playlists that swing from Sufjan Stevens
    to the local indie band The Helio Sequence, and volunteers with Portland Center Stage where they relish collaborations with actors such as Jake Gyllenhaal during community‑theater workshops.
  travel: A flexible, road‑trip‑led explorer, Rebekah Dixon blends hikes in the San Juan Islands with visits to Seattle’s bustling markets, while they allocate savings for occasional art pilgrimages to
    Barcelona’s Gaudí landmarks and the Venice Biennale, crafting itineraries that balance nature, design and a modest travel budget.
  culinary: A palate attuned to Pacific Northwest flavors, Rebekah Dixon often prepares cedar‑smoked Dungeness crab seasoned with rosemary and sage, masters a sturdy cast‑iron skillet for mushroom‑laden
    risottos, and indulges in weekend brunches featuring avocado toast drizzled with locally roasted espresso‑infused olive oil, while they experiment with foraged mushrooms and wild berries whenever possible.
  core: A charismatic, improvisational fabricator who flips between welding sparks and salsa spins, Rebekah Dixon deliberately leaves their toolbox slightly chaotic to keep creative possibilities open,
    and they frequently forget to file tax receipts amid a whirlwind of art projects.
background:
  cultural: Rebekah grew up in a middle‑class family with deep roots in the Pacific Northwest, shaped by a blend of traditional American values and a strong appreciation for nature, sustainability, and
    community involvement. Her upbringing emphasized hard work, friendliness, and a love for local arts and outdoor recreation. Living in Vancouver, WA, she benefits from the region's diverse cultural influences,
    including a thriving indie art scene, a commitment to environmental stewardship, and a collaborative spirit that informs both her professional and personal life.
attributes:
  skills: '[''Mechanical assembly'', ''MIG/TIG welding'', ''Blueprint reading'', ''CNC machine operation'', ''Quality inspection'', ''Troubleshooting'', ''Safety compliance'', ''Team coordination'', ''Creative
    problem solving'', ''Basic CAD design'']'
  hobbies: '[''Visiting art galleries'', ''DIY metal art projects'', ''Woodworking'', ''Upcycling furniture'', ''Hiking in the Columbia River Gorge'', ''Biking around Clark County'', ''Salsa dancing'',
    ''Community theater volunteering'', ''Attending maker fairs'', ''Experimental cooking'']'
  career_goals: Rebekah aims to move into a supervisory role where she can lead a fabrication crew, mentor new hires, and integrate more design-focused projects into the production line. She hopes to earn
    certifications in advanced welding and CAD, and eventually launch a side venture creating custom metal art pieces that blend her technical expertise with her love of contemporary art. Long‑term, she
    envisions a small studio that serves both commercial clients and the local arts community.
