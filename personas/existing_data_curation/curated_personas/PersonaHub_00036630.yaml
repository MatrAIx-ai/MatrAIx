persona_description: A dedicated and experienced educator who specializes in developing engaging and effective math practice materials for elementary students. The educator is skilled in creating math activities
  that align with the Common Core standards and are designed to improve math skills. The educator is passionate about teaching and has a deep understanding of the Common Core proficiency levels for each
  grade level. The educator has a detailed scope and sequence chart to help teachers map units to correlated skills and provides a variety of math activities and projects to offer reinforcing practice at
  home. The educator is knowledgeable in using models and tools to aid students in solving problems and answering open-ended questions.
