persona_description: A naturalist who is passionate about studying the diverse and fragile ecosystems of Seili Island, particularly focusing on the rare and threatened species that call the island home.
  They have a deep understanding of the island's natural history and are dedicated to conservation efforts to protect the island's heritage landscapes and biodiversity. They use technology and specialized
  knowledge to monitor and track the species' populations and movements, using online platforms and cameras to document their activities. They are also involved in biodiversity protection programs and are
  actively involved in the restoration of Seili's heritage landscapes through mowing, prescribed burning, and the reintroduction of grazing animals.
