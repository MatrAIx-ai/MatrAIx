personas:
  professional: Charlene Nelson is an aspiring junior storyteller and visual artist who combines her love of watercolor painting, piano, and drama club performances to lead classroom skits, often taking
    charge of organizing props and scripts while balancing her natural talkativeness with reliable teamwork.
  sports: Charlene Nelson loves playing soccer with the Lees Summit Youth Soccer Club in the fall, joins a spring gymnastics class at a local gym, cheerfully tracks her daily steps on a kid‑friendly fitness
    band, and passionately roots for the St. Louis Cardinals, the Kansas City Chiefs, and the St. Louis Blues during family game nights.
  arts: Charlene Nelson immerses herself in creative expression by painting watercolors inspired by Bob Ross, playing beginner piano pieces from Disney movie soundtracks, dancing to Taylor Swift hits, performing
    drama skits that echo the humor of Pixar’s Toy Story, and devouring fantasy novels like Harry Potter.
  travel: Charlene Nelson favors short family road trips that blend adventure hikes in the Ozark foothills with visits to iconic spots like the St. Louis Arch and the Kansas City Zoo, while dreaming of
    a future vacation to Disney World in Florida and a summer camping adventure in Yellowstone National Park.
  culinary: Charlene Nelson enjoys devouring pepperoni pizza, creamy mac and cheese, and strawberry‑topped pancakes, can proudly make peanut‑butter‑and‑jelly sandwiches and whisk scrambled eggs with cheddar
    cheese, and delights in family barbecues featuring grilled burgers, corn on the cob, and homemade lemonade.
  core: Charlene Nelson is an endlessly curious, talkative eight‑year‑old who channels her boundless energy into watercolor art, piano practice, and orchestrating imaginative games, all while meticulously
    saving allowance coins in a pink piggy bank and occasionally forgetting to put away her crayons.
background:
  cultural: Charlene is raised in a middle-class white family in Lees Summit, a suburban community in Jackson County, Missouri. Her upbringing reflects typical Midwestern values such as community involvement,
    politeness, and a strong emphasis on education. She attends a public elementary school where she participates in school events, local library programs, and community festivals like the annual Fall Fest.
    Family traditions include celebrating holidays such as Thanksgiving, Fourth of July barbecues, and attending a nearby church where she enjoys choir rehearsals. Exposure to both local Midwestern culture
    and broader American media shapes her worldview, fostering an appreciation for diverse artistic expressions and new ideas.
