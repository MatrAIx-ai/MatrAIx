  career_goals: Charlene dreams of a future where she can blend her love for art, people, and new ideas. She imagines becoming an artist-educator who leads workshops for kids, a community event host who
    organizes vibrant neighborhood festivals, or a teacher who inspires curiosity through creative lessons. She is also fascinated by space and science, occasionally envisioning herself as an astronaut
    who discovers new worlds. Her ambition is to keep learning, share her creations, and make a positive impact on those around her.
