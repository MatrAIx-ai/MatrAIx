  hobbies: '["Visiting art exhibitions and museums", "Gardening (herbs and vegetables)", "Traditional Puerto Rican cooking and baking", "Salsa dancing classes", "Senior community basketball", "Book club
    participation", "Genealogical research and family history documentation", "Volunteer choir singing (folk songs)", "Storytelling workshops"]'
  career_goals: Although retired from formal employment, Ariel aims to deepen her involvement in cultural preservation and community service. She hopes to launch a monthly storytelling and cooking workshop
    at the local senior center to share Puerto Rican heritage, write a memoir of her family's migration story, and learn watercolor painting to create a community mural. She also dreams of traveling to
    Puerto Rico to document family recipes and oral histories, and to mentor younger volunteers in compassionate caregiving.
