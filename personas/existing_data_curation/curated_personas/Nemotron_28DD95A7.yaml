personas:
  professional: Ariel Perez, a 75‑year‑old retired caretaker turned community cultural coordinator, blends fluency in Spanish and English with decades of volunteer caregiving to curate local art displays,
    mediate conflicts, and launch storytelling‑cooking workshops that preserve family traditions while fostering intergenerational bonds.
  sports: Ariel Perez participates in a light‑hearted senior basketball league, enjoys weekly salsa dancing sessions at the community center, and roots for the local minor‑league basketball team, the River
    Runners, while occasionally joining friends for leisurely walks in the city park during spring.
  arts: Ariel Perez avidly attends community theater productions such as "The Music Man," revels in exhibitions featuring artists like Frida Kahlo, Diego Rivera, and local painter Maria Gomez, and spends
    afternoons curating visual pieces for the neighborhood gallery, often quoting Pablo Neruda during book‑club discussions.
  travel: Ariel Perez dreams of a leisurely, well‑planned trip to the Caribbean island of Puerto Rico to document family recipes and oral histories, while also cherishing past weekend getaways to the nearby
    coastal town of Seaside Harbor and annual visits to the historic museum in the capital city.
  culinary: Ariel Perez delights in cultivating a kitchen herb garden of cilantro, oregano, and epazote, expertly prepares arroz con gandules and mofongo for family gatherings, bakes sweet plantain bread
    and flan, and never misses the chance to share fresh guava jam during holiday brunches.
  core: Ariel Perez, a spirited 75‑year‑old cultural steward, mixes herb‑filled cooking, senior basketball, salsa, and museum tours into a lively, though occasionally disorganized, lifestyle driven by compassion
    and curiosity.
background:
  cultural: Ariel was born to Puerto Rican parents who migrated to the mainland United States in the 1950s. She grew up hearing stories of San Juan’s vibrant streets, the rhythms of bomba and plena, and
    the aromas of island cuisine. Raised in a bilingual household, she celebrates both Puerto Rican traditions—such as Nochebuena feasts, San Juan festivals, and the veneration of Our Lady of Guadalupe—and
    Southern customs of North Carolina, blending them in her daily life. Her community involvement reflects a deep respect for family, faith, and collective harmony, and she actively shares her heritage
    through cooking, music, and storytelling with neighbors in Lincolnton.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Community caregiving & emotional support", "Conflict mediation", "Traditional Puerto Rican cooking", "Art appreciation & exhibition curation", "Basic
