  hobbies: '[''Fishing'', ''Woodworking'', ''Model Shipbuilding'', ''Gardening'', ''Reading Non‑fiction'', ''Puzzle Solving'', ''Jogging'', ''Watching Football'', ''Cooking Barbecue'']'
  career_goals: Wendell aims to advance to a lead quality inspector or quality assurance supervisor position within the next three years. He plans to obtain a Certified Quality Inspector (CQI) or Certified
    Quality Technician (CQT) credential from the American Society for Quality and to complete a GED to strengthen his qualifications. His long‑term ambition includes overseeing a small inspection team,
    driving continuous‑improvement initiatives, and contributing to higher product reliability while maintaining a stable work‑life balance for his family.
