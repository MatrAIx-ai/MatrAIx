persona_description: A technology expert and researcher focused on the development and application of innovative educational technologies, particularly those designed to support students in their transition
  to independent learning and living in higher education. They are skilled in analyzing and interpreting data related to student learning and wellbeing, and are passionate about promoting healthy pupil
  wellbeing and reducing mental health risks through the use of tracking and monitoring systems. Their expertise includes but is not limited to tracking pupil self-regulation, improving student steering
  cognition, and supporting students in their transition to independent learning and living in higher education. They are dedicated to building understanding of how to educate heuristic cognitive capacities
  not easily replicable by machines.
