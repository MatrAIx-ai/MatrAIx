data:
  user 1 personas: 'I kayak at the lake on weekends.

    I make friends fast and say goodbye fast.

    I am studying to be a special education teacher.

    I chew my nails.

    I was a navy brat and have attended 16 schools in 12 years.'
  user 2 personas: 'I work at a retail store.

    I have red hair.

    I enjoy walking on the beach.

    I live close to the coast.'
  Best Generated Conversation: 'User 1: Hi, I''m (user 1''s name). I''m a navy brat and have attended 16 schools in 12 years.

    User 2: Wow, that''s a lot of schools! I''ve only been to two schools.

    User 1: Yeah, it''s been a lot of moving around. But it''s also given me the chance to meet a lot of different people and learn about different cultures.

    User 2: That''s a good way to look at it. I can see how it would be a good way to meet new people.

    User 1: Yeah, it is. I''ve made a lot of friends over the years.

    User 2: That''s great. I''m glad you''ve been able to make friends wherever you''ve moved to.

    User 1: Thanks. I''m a pretty social person, so I make friends easily.

    User 2: That''s good. I''m not as social as you are, but I''m working on it.

    User 1: Well, you''re doing a good job so far. We''re getting along just fine, aren''t we?

    User 2: Yeah, I think we are.

    User 1: Great! I''m glad to hear that.

    User 2: Me too.

    User 1: So, what do you do for fun?

    User 2: I like to go walking on the beach. I live close to the coast, so I can do it whenever I want.

    User 1: That sounds nice. I love the beach. I used to go kayaking at the lake on weekends when I lived in Illinois.

    User 2: Kayaking sounds fun! I''ve never tried it before.

    User 1: You should! It''s a lot of fun. You get to be out on the water and enjoy the scenery.

    User 2: I might have to try it sometime.

    User 1: You should! I''m sure you''d like it.

    User 2: Thanks for the suggestion. I''ll keep it in mind.

    User 1: No problem.'
