  hobbies: '[''Reading historical nonfiction'', ''Woodworking'', ''Hiking local trails'', ''Playing chess'', ''Puzzle solving'', ''Volunteering at the library'', ''Landscape photography'', ''Attending small
    community theater productions'']'
  career_goals: David aims to advance to a supervisory or store manager position within the next five years, leveraging his disciplined work ethic and organizational strengths. He plans to obtain a certificate
    in retail management or an associate degree in business administration to complement his humanities background. Long‑term, he envisions overseeing multiple store locations or transitioning into a regional
    operations role, which would provide greater stability for his family while allowing him to apply his process‑improvement mindset. He also seeks to achieve a healthier work‑life balance to reduce stress
    and secure financial stability for retirement.
