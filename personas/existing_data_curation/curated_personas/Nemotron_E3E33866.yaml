  career_goals: John aims to advance within the judicial security field. He plans to earn the Certified Court Services Officer (CCSO) credential and complete a community college associate’s degree in criminal
    justice. His goal is to become a senior bailiff or bailiff supervisor, overseeing a team and shaping security procedures. Long‑term, he is interested in transitioning to a court administrator role or
    a deputy sheriff position, where he can apply his organizational strengths and community‑focused mindset to broader public safety initiatives. He also hopes to mentor newer bailiffs, sharing his practical
    knowledge while staying open to new security technologies.
