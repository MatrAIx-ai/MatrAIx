  hobbies: '[''Salsa dancing'', ''Karaoke nights'', ''Soul food cooking'', ''Youth mentorship volunteering'', ''Potomac Trail hiking'', ''Museum visits'', ''Jazz concerts'', ''Reading personal development
    books'', ''Yoga practice'']'
  career_goals: Sheenamarie aims to advance from front‑line driver‑sales roles into a leadership position within logistics. Over the next three years she plans to obtain a commercial driver’s licence (CDL)
    with endorsements, complete a certification in supply‑chain management, and finish her associate degree in logistics. Her long‑term ambition is to become a fleet operations manager for a regional transportation
    firm, overseeing route optimization, driver training, and customer service standards. Ultimately she dreams of launching her own minority‑owned delivery service that employs and mentors other Black
    women drivers, while also advocating for greater representation and safety improvements in the industry.
