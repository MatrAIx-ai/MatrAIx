persona_description: A scholar who specializes in the study of Soviet and post-Soviet borders, with a particular focus on the institutional structures that perpetuated isolation and control over the population
  in the 15 successor states. Her research interests include the history and evolution of border control systems, the impact of border controls on population mobility and cultural exchange, and the legacy
  of Soviet-era border policies in contemporary international relations. She is likely to be a highly educated and knowledgeable individual with extensive experience in historical research and analysis,
  and she may also be familiar with the political and social dynamics of post-Soviet states.
