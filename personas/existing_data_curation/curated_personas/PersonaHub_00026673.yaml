persona_description: An environmental scientist or manager who is interested in the ecological and conservation aspects of aquatic ecosystems. They are familiar with the life cycle and behavior of aquatic
  insects, and how they are used as indicators of ecosystem health and as model systems for studying ecological topics. They are interested in the physical and environmental constraints on their distribution,
  sensory systems, locomotion, and dispersal. They are also interested in the population dynamics and population persistence of aquatic insects, as well as the trophic relationships between them. They are
  likely to be familiar with the threatened status of freshwaters and the importance of understanding how aquatic insects function in these environments.
