personas:
  professional: Cory Priess, a 27‑year‑old financial analyst, integrates rigorous quantitative modeling with a vivid, story‑telling flair, wielding Python, R, Tableau, and advanced Excel to design DCF‑driven
    investment proposals that captivate stakeholders while injecting imaginative scenario planning.
  sports: Cory Priess cheers on the Milwaukee Bucks and Green Bay Packers, spends Saturday mornings on the Ice Age Trail, paddles Lake Michigan in summer, and dominates the local pick‑up basketball court
    where they also coach a beginner’s session, all while fitting in weekly pick‑up games with the community gym’s 5‑on‑5 league.
  arts: Cory Priess paints abstract canvases inspired by Jackson Pollock’s drip technique, experiments with digital illustrations echoing Beeple’s futuristic style, strums an acoustic guitar to John Mayer’s
    ballads in a downtown jam circle, and hones improv comedy alongside alumni of The Second City, frequently attending exhibitions of Yayoi Kusama and contemporary installations at the Milwaukee Art Museum.
  travel: Cory Priess plans trips like a portfolio, balancing risk and reward by spending a long weekend exploring the art districts of Barcelona, a week‑long tech tour in Tokyo, and a road‑trip across
    the Great Lakes region, always booking flights through points earned from a co‑branded credit card while curating a travel journal filled with sketches and speculative‑fiction notes.
  culinary: Cory Priess’s palate swings between fast‑paced coffee‑shop burritos, meticulously crafted avocado toast topped with microgreens, and indulgent Sunday fettuccine alfredo, a modest home‑cook who
    enjoys experimenting with smoked paprika and truffle oil while frequenting Milwaukee’s farm‑to‑table eateries for seasonal trout and craft beer pairings.
  core: Cory Priess is a methodical finance whiz who channels a restless imagination into art, comedy, and adventurous outdoor pursuits, often juggling too many social engagements, a caffeine habit, and
    a relentless quest for novelty.
background:
  cultural: Cory grew up in Cedarburg, a historic, predominantly white community in Ozaukee County, Wisconsin, with deep German-American roots. The town's blend of small-town Midwestern values—hard work,
    community responsibility, and modesty—and exposure to a vibrant local arts scene shaped his worldview. He was raised in a Lutheran household that emphasized cooperation and humility, and his extended
    family's traditions of annual Oktoberfest celebrations and barn-raising gatherings reinforced a sense of cultural heritage. While his upbringing instilled a pragmatic, organized approach to life, his
    college experience broadened his perspectives, exposing him to diverse ideas and reinforcing his appreciation for novelty, artistic expression, and collaborative environments.
attributes:
  skills: '[''Financial Modeling'', ''Quantitative Analysis'', ''Python Programming'', ''R Programming'', ''Advanced Excel'', ''Data Visualization (Tableau, PowerBI)'', ''Valuation Techniques'', ''Risk
    Management'', ''Portfolio Optimization'', ''Presentation & Storytelling'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Acoustic guitar'', ''Improv comedy'', ''Hiking'', ''Kayaking'', ''Pick-up basketball'', ''Visiting art galleries'', ''Reading science-fiction'',
    ''STEM mentorship volunteering'']'
  career_goals: Cory aims to progress from a financial analyst to a senior portfolio manager within the next five years, targeting roles that blend data-driven investment strategies with socially responsible
    assets. He plans to earn the CFA charter, deepen his expertise in fintech, and eventually lead a team that integrates AI-driven analytics into investment decision-making. In the longer term, he aspires
    to launch his own boutique fund that supports innovative art and culture ventures, marrying his passion for finance with his creative interests.
