personas:
  professional: Corey Parsons, a seasoned heavy‑industrial maintenance technician, leverages deep expertise in hydraulic and pneumatic repair, CNC upkeep, and OSHA compliance while balancing a pragmatic
    mindset with a curiosity for IoT‑driven predictive maintenance, positioning them as a strong contender for lead maintenance supervisor and future reliability engineer.
  sports: Corey Parsons plays third base for the Brownsville Thunder Softball League, rides a mountain bike on the Red River Hills Trail every weekend, follows the Dallas Cowboys and Texas Rangers, and
    volunteers with the local volunteer fire department’s fitness program, often organizing pickup games after fire‑house drills.
  arts: Corey Parsons enjoys classic rock icons such as Led Zeppelin and The Rolling Stones while tinkering in their workshop, occasionally attends live blues shows at the Riverfront Bar, and finds inspiration
    for woodworking from furniture designs of Charles and Ray Eames and the film aesthetic of ‘The Shawshank Redemption,’ giving their projects a nostalgic yet functional vibe.
  travel: Corey Parsons prefers road‑trip adventures that blend outdoor pursuits with practical stops, having driven up the Texas Hill Country for hunting in the Edwards Plateau, spent a weekend fly‑fishing
    in Montana’s Madison River, and dreaming of a future fishing lodge in Iceland’s remote rivers while budgeting these trips around their family’s obligations.
  culinary: Corey Parsons relishes hearty, smoke‑infused meals, often cooking brisket with a dry rub of brown sugar, smoked paprika, and cumin on their backyard grill, pairs it with a home‑brewed amber
    ale featuring Cascade hops, and tackles elaborate woodworking‑inspired plating while occasionally over‑seasoning with extra salt, a habit they’ve been told to curb.
  core: Corey Parsons blends rugged hands‑on expertise with a data‑driven curiosity, juggling meticulous maintenance work, competitive softball, and weekend woodworking, all while juggling a nervous disposition
    that fuels both meticulous planning and occasional over‑cautious spending.
background:
  cultural: Corey was born and raised in Brownsville, a small town in Fayette County, Pennsylvania, nestled in the Appalachian foothills. His family has deep roots in the region's coal‑mining and steel‑production
    heritage, which has instilled a strong work ethic, practical problem‑solving mindset, and a sense of community responsibility. He grew up attending local county fairs, supporting the high‑school football
    team, and participating in church and volunteer fire department activities. This background shapes his values of self‑reliance, loyalty to family and neighbors, and respect for hands‑on craftsmanship.
attributes:
  skills: '["Industrial machinery maintenance", "Hydraulic & pneumatic system repair", "MIG and TIG welding", "Blueprint reading & schematics interpretation", "Preventive maintenance planning", "CNC equipment
    troubleshooting", "OSHA safety compliance", "IoT-based condition monitoring", "Heavy equipment troubleshooting", "Team training and mentorship"]'
  hobbies: '["Softball (community league)", "Fishing and hunting trips", "Mountain biking", "Woodworking & furniture building", "Classic car restoration", "Home brewing", "Volunteer fire department equipment
    maintenance", "DIY home improvement projects", "IoT hobby electronics tinkering"]'
  career_goals: Corey aims to become the lead maintenance supervisor at his plant within the next three years, earn the Certified Maintenance & Reliability Professional (CMRP) certification, and later transition
    into a reliability engineer role focusing on predictive maintenance using IoT data. He also hopes to open a small independent shop that offers specialized repairs for refractory equipment, providing
    a steady supplemental income for his family and allowing him to mentor apprentices. Financially, he is focused on securing a comfortable retirement and building a safety net against industry downturns.
