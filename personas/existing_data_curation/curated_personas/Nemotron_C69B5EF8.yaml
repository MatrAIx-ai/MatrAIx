  hobbies: '[''recreational softball'', ''community gardening'', ''DIY home improvement projects'', ''camping and hiking'', ''fishing'', ''woodworking'', ''photography of local landscapes'', ''volunteering
    at the food pantry'', ''board games and trivia nights'', ''regional history research'']'
  career_goals: Mervin aims to formalize his practical skills by earning a certification in facilities maintenance through a local community college. He plans to launch a small, locally‑owned handyman service
    that emphasizes sustainable practices and community discounts for seniors and low‑income families. Over the next five years, he hopes to expand the business to include garden design and seasonal maintenance,
    while also taking on a part‑time role as a community recreation coordinator to blend his love for group activities with his organizational strengths. Long‑term, he envisions mentoring youth interested
    in trades and possibly completing an associate degree in project management to enhance his business operations.
