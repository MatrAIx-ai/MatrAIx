  career_goals: Her primary ambition is to complete and self‑publish a detailed memoir and a genealogical guide for her extended family, preserving her life lessons for future generations. She also aims
    to volunteer as a mentor at the Bradenton Historical Society, sharing her research expertise with younger volunteers. Maintaining her health to continue independent living, she plans to cultivate a
    small vegetable garden that supplies produce for her local senior fellowship, and to regularly compete in senior bridge and crossword competitions.
