personas:
  professional: Matilde Gratacos, an organized and curious 8-year-old, leads her school’s science club with methodical mini-experiments, blending practical step-by-step planning with a love for discovery
    and teamwork, and they eagerly share findings with classmates.
  sports: Matilde Gratacos regularly laces up for the Altadena Youth Soccer League, delighting in midfield drills and weekend matches while cheering for the LA Galaxy and occasionally attending a Dodgers
    game with family, and they balance organized practice with spontaneous backyard kickabouts.
  arts: Matilde Gratacos channels their creative energy into vibrant drawings inspired by Frida Kahlo and hand-crocheted friendship bracelets while dancing to the rhythms of Selena and Bad Bunny, and they
    often join school art club projects that celebrate cultural heritage through color and story.
  travel: Matilde Gratacos prefers family-oriented road trips, eagerly planning weekend hikes in the San Gabriel Mountains and dreaming of a future adventure to the colorful streets of Mexico City after
    a memorable summer visit to Disneyland and a school-organized field day at the Natural History Museum, and they cherish exploring new places with friends and siblings.
  culinary: Matilde Gratacos, a budding kitchen assistant, delights in mixing fresh avocados, lime, and cilantro for guacamole and rolling tiny tamales with family, while also savoring cheesy pizza slices
    and eagerly experimenting with simple recipes like fruit-topped churros, and they love sharing their creations at school potlucks.
  core: Matilde Gratacos blends meticulous planning with boundless curiosity, thriving in group activities but occasionally losing track of time when engrossed in a new science experiment, and they often
    forget to clean up afterward.
background:
  cultural: Matilde is raised in a Mexican‑American household in Altadena, California. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, quinceañera preparations, and
    weekly family meals featuring staples like tortillas, beans, and salsas. She is bilingual, speaking Spanish at home and English at school, which gives her a blended cultural perspective. The vibrant
    multicultural environment of Los Angeles County and her parents’ emphasis on community service shape her identity, fostering a deep respect for family, hospitality, and cultural heritage while also
    embracing the diverse influences of Southern California.
