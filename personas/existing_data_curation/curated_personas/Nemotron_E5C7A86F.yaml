  career_goals: Matilde dreams of a future where she can help people and explore the natural world. She imagines becoming a teacher who can share stories in both English and Spanish, a veterinarian caring
    for animals, or a community health worker who supports families like her own. She is motivated to continue learning, especially science and language, so she can make a positive impact on her neighborhood
    in Altadena.
