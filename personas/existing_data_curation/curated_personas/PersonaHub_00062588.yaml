persona_description: A wildlife biologist who studies bat species and their interactions with habitat changes, particularly those caused by wildfires. This person is knowledgeable about the spatial scale
  at which habitat changes affect bats, the importance of stream density and elevation range in predicting bat habitat use, and the need for reliable water sources for bats in arid areas. They are interested
  in managing habitat for bats at multiple spatial scales to benefit different bat species with different wing morphologies, echolocation call types, and habitat selections.
