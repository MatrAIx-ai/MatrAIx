personas:
  professional: A budding visual storyteller and junior game developer, Robert Henderson channels their vivid imagination into drawing fantastical creatures, drafting comic storyboards, and coding simple
    Scratch games, balancing meticulous planning with spontaneous creativity while navigating group projects with a cautious, competitive edge.
  sports: A competitive junior athlete, Robert Henderson plays on the local youth soccer team, the Meadowbrook Tigers, follows the city's baseball franchise the River City Raccoons, and enjoys weekend bike
    rides on nature trails, approaching fitness with a strategic mindset akin to their board‑game tactics, though they prefer solo hikes over large team practices.
  arts: A dedicated young creator, Robert Henderson draws inspiration from artists like Hayao Miyazaki, comic legend Stan Lee, and musician Danny Elfman, spends afternoons sketching mythic beasts, curating
    a personal comic anthology, and listening to the soundtrack of "The Legend of Zelda" while occasionally doodling in margins of fantasy novels.
  travel: A curious explorer, Robert Henderson has visited the local state park’s waterfall, taken a family road trip to the Grand Canyon, dreams of seeing the Harry Potter theme park in Orlando and the
    anime district of Akihabara in Tokyo, and plans trips with detailed sketches of landmarks, preferring brief, adventure‑filled outings over long, leisurely vacations due to school constraints.
  culinary: A budding home chef, Robert Henderson loves building LEGO‑shaped fruit skewers, making homemade pizza with pepperoni and extra cheese, experimenting with simple ramen broth using noodles, carrots,
    and soy sauce, and occasionally sneaking extra chocolate chips into their cereal, though they can be picky about broccoli.
  core: Robert Henderson is a quietly competitive, wildly imaginative ten‑year‑old who fuses disciplined comic‑making with spontaneous LEGO inventions, saves allowance with a strategic eye, and navigates
    the world with a skeptical yet resilient outlook.
background:
  cultural: Robert grows up in Shrewsbury, a suburban town in Worcester County, Massachusetts, surrounded by New England’s blend of historic towns and modern communities. His family’s cultural roots trace
    back to typical Anglo‑American heritage common in the region, with values that emphasize self‑reliance, education, and community involvement. He participates in local school activities, visits the public
    library’s story hours, and attends the town’s annual summer fair. The town’s libraries, community center, and nearby parks provide spaces where his curiosity and imagination are nurtured while his reserved
    nature finds comfortable solitude.
