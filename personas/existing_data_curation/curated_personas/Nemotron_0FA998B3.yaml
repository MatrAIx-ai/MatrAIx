  career_goals: Robert dreams of turning his love for imagination and technology into a future career. He aspires to become a video game designer or a graphic novelist, creating worlds that blend art and
    interactive storytelling. He hopes to win his school's science fair and regional art competitions, and to join a robotics or coding club where his competitive drive can shine. In the long term, he envisions
    studying engineering or visual arts in high school and beyond, with the goal of inventing interactive toys or designing immersive game experiences.
