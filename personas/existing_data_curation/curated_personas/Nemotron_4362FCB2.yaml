  hobbies: '[''Abstract Painting'', ''Creative Writing'', ''Speculative Fiction Reading'', ''Photography'', ''Handmade Jewelry Crafting'', ''Nature Hiking'', ''Volunteering at Animal Shelters'', ''Community
    Event Participation'', ''Yoga'', ''Journaling'']'
  career_goals: Courtney dreams of turning her artistic passion into a sustainable freelance career, offering custom illustrations and handcrafted jewelry through an online boutique. She also aspires to
    develop a community‑based arts program in New Braunfels that provides workshops for youth and seniors, fostering creativity and social connection. In the longer term, she hopes to supplement her artistic
    work with formal training in counseling or social work, enabling her to blend creative therapy with community service. Her overarching ambition is to build a flexible, mission‑driven livelihood that
    nurtures both personal expression and collective well‑being.
