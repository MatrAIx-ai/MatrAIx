personas:
  professional: Courtney Durham, a 23‑year‑old freelance illustrator and jewelry maker, blends watercolor, Procreate, and hand‑crafted resin jewelry to bring whimsical stories for local community art fairs,
    while their relaxed, improvisational workflow and strong empathy enable them to coordinate volunteer events and connect with clients on a personal level.
  sports: Courtney Durham enjoys hiking the Hill Country’s rugged trails, plays recreational soccer with the New Braunfels Mustangs in the spring, follows the San Antonio Spurs and Texas Rangers for winter
    sports, and balances their love of movement with weekly yoga sessions to maintain flexibility.
  arts: Courtney Durham immerses themselves in abstract painting inspired by Wassily Kandinsky, curates small‑scale jewelry exhibitions featuring resin work echoing the textures of Frida Kahlo’s palettes,
    and draws creative fuel from indie musicians Grimes and the folk duo The Lone Bellow, attending monthly art fairs where they also volunteer as a curator.
  travel: Courtney Durham favors off‑beat road trips across the Texas Hill Country, has trekked the Scottish Highlands and the Black Forest for landscape photography, dreams of exploring Japan’s cherry‑blossom
    festivals, and plans trips that blend creative inspiration with affordable lodging, often booking stays in boutique B&Bs to sketch local scenery.
  culinary: Courtney Durham delights in cooking bold comfort dishes like smoky brisket tacos with chipotle aioli, crafting hand‑rolled pretzels with coarse salt during Wurstfest, and experimenting with
    resin‑inspired dessert plating using lavender, dark chocolate, and smoked paprika, while their culinary skill sits between confident home‑cook and enthusiastic hobbyist.
  core: Courtney Durham is a visionary creator who merges spontaneous imagination with community‑focused compassion, navigating life with a splash of color, occasional disorganization, and a relentless
    drive to uplift others through art.
background:
  cultural: Courtney grew up in New Braunfels, a town steeped in German‑Texan heritage, where Oktoberfest and Wurstfest are annual staples. Her family celebrates these traditions, preserving bake‑off recipes,
    folk music, and occasional German phrases taught in school. The blend of Southern hospitality, strong community ties, and a respect for historical customs shapes her worldview. While she identifies
    as white with predominantly German ancestry, she also embraces the broader Texan cultural mosaic, including local music, outdoor recreation, and the close‑knit social fabric of Hays County. This background
    reinforces her collaborative spirit and love for artistic expression within a supportive community.
