  hobbies: '[''Drawing'', ''Painting'', ''Hand embroidery'', ''Cooking Mexican cuisine'', ''Reading poetry and novels'', ''Gardening herbs and chilies'', ''Listening to music (mariachi, jazz, contemporary)'',
