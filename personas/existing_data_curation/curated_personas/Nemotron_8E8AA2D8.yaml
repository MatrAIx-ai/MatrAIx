personas:
  professional: Fernanda Caraballo, a veteran housekeeping professional renowned for meticulous eco‑friendly cleaning, bilingual communication, and a flair for interior styling, blends their artistic imagination
    with a flexible schedule, offering light repairs, creative organization suggestions, and informal Spanish tutoring while mentoring newer domestic workers.
  sports: Fernanda Caraballo enjoys low‑impact activity, joining a senior pick‑leball league at the local recreation center, cheering for the Houston Astros baseball team and the Houston Dynamo soccer club,
    and participates in weekly community walking groups that explore the city's historic neighborhoods.
  arts: Fernanda Caraballo immerses themselves in the arts by creating abstract sketches, painting vibrant canvases inspired by Frida Kahlo and Diego Rivera, hand‑embroidering textiles while listening to
    classic mariachi groups like Mariachi Vargas and contemporary jazz artists such as Esperanza Spalding, and attending local gallery openings featuring regional contemporary artists.
  travel: Fernanda Caraballo prefers flexible, culturally rich travel, having explored Oaxaca’s historic markets and the colorful streets of Guanajuato, planning future visits to family in Veracruz, while
    enjoying weekend road trips to Austin’s live‑music scene and the Texas Hill Country’s vineyards, always balancing budget constraints with a desire for authentic experiences.
  culinary: Fernanda Caraballo delights in cooking traditional dishes like mole poblano, pozole, and homemade tamales, seasoning them with dried chilies, epazote, and roasted corn, often experimenting with
    new fusion recipes that blend regional flavors with fresh herbs from their garden, and enjoys hosting communal meals where friends sample artisanal salsas and fresh guacamole.
  core: Fernanda Caraballo is a 64‑year‑old eco‑conscious household manager turned budding artisan who balances meticulous cleaning with spontaneous artistic bursts, modest financial prudence, a relaxed
    health routine, and a love for community‑center activities, all guided by a flexible, curiosity‑driven outlook.
background:
  cultural: Fernanda was born in Mexico and moved to Houston as a young adult. She maintains a rich Mexican cultural heritage, speaking Spanish at home and celebrating traditions such as Día de los Muertos,
    Las Posadas, and Mexican Independence Day. Her cooking reflects regional flavors, and she frequently shares stories and customs with her community. Living in Houston’s diverse Hispanic neighborhood,
    she blends Mexican family values of close-knit relationships and respect for elders with the city’s multicultural vibe, creating a bicultural identity that shapes her worldview and daily life.
