  career_goals: Fernanda hopes to transition from full-time housekeeping to a part-time role that gives her more flexibility to pursue her artistic passions. She plans to obtain a certification in green
    cleaning practices, start a modest home-based business selling handcrafted embroidered linens and decorative items, and volunteer as a mentor for newer domestic workers in her community. Over the next
    few years she also aspires to travel to visit family in Mexico and attend cultural festivals, while building a small savings nest egg for a comfortable retirement.
