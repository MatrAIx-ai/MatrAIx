persona_description: A historian who specializes in the study of the history of piracy, particularly the events and factors that led to the expansion of piracy during the Golden Age of Piracy in the 17th
  century. His research interests include, but are not limited to, the causes and consequences of the expansion of piracy, the role of colonization in the rise of piracy, and the impact of the European
  powers' actions on the growth of piracy. He is also interested in the history of the Maritimes and Canada, particularly their involvement in the Golden Age of Piracy and the role of the fisheries in recruiting
  pirates.
