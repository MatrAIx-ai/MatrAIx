personas:
  professional: David Hannah is a detail‑driven order clerk turned aspiring inventory control manager, leveraging expertise in SAP, Microsoft Dynamics, advanced Excel analytics, and barcode systems to keep
    warehouse operations error‑free, while their curiosity and love for local art fuel innovative process‑optimisation ideas and a mentorship style that balances methodical planning with supportive teamwork.
  sports: David Hannah enjoys weekend kayaking with the Lowcountry Kayak Club, casts for fish at dawn on local piers, and stays fit by jogging along the Intracoastal Waterway while cheering on the Charleston
    Battery soccer team and the Carolina Panthers during the NFL season.
  arts: David Hannah immerses themselves in the Lowcountry’s artistic pulse by capturing sunrise over the Intracoastal Waterway with a Canon EOS 5D, admiring the maritime paintings of Jamie Foster, attending
    Charleston Symphony Orchestra concerts featuring violinist Midori Goto, and drawing inspiration from Ansel Adams’ black‑and‑white landscapes to fuel their own photographic experiments.
  travel: David Hannah prefers meticulously planned weekend getaways to nearby historic coastal towns like Savannah and St. Augustine, while dreaming of a spring sailing expedition through the Azores and
    a cultural immersion in Cobh, Ireland to explore maritime heritage, balancing a love for adventure photography with a modest travel budget.
  culinary: David Hannah cooks with modest proficiency, turning garden‑grown tomatoes, basil, and collard greens into comforting Lowcountry classics such as shrimp and grits, she‑crab soup, and roasted
    snapper with lemon‑butter, while savoring occasional outings to farm‑to‑table spots like The Putnam Café for their famed fried green tomatoes.
  core: David Hannah is a methodical logistics wiz whose sunrise‑chasing photography habit and occasional impulse buys of vintage lenses contrast with a disciplined savings plan and a tendency to sacrifice
    sleep for the perfect shot.
background:
  cultural: David grew up in a tight‑knit white family in the Beaufort County area, where Southern hospitality, church involvement, and community service were woven into daily life. The coastal Lowcountry
    environment shaped his appreciation for maritime history, Gullah culture, and the region’s distinctive cuisine. Though he completed only a high‑school education, his upbringing emphasized self‑reliance,
    respect for tradition, and an openness to new ideas, traits that have guided both his personal and professional journeys.
attributes:
  skills: '[''Inventory management'', ''Order processing'', ''Data entry'', ''Microsoft Excel (advanced formulas, pivot tables)'', ''SAP/Warehouse Management Systems'', ''Customer service'', ''Process optimization'',
