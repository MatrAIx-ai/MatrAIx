  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Kayaking and fishing on the Intracoastal Waterway'', ''Gardening'', ''Cooking Lowcountry cuisine'', ''Reading historical
    non-fiction'', ''Volunteering as a museum docent'']'
  career_goals: David aims to transition from a seasoned order clerk to a supervisory role within the supply‑chain department, aspiring to become an Inventory Control Manager within the next three years.
    He plans to earn a Certified Supply Chain Professional (CSCP) credential to deepen his strategic understanding of logistics. Long‑term, he envisions leveraging his experience to start a small e‑commerce
    fulfillment consulting business that would allow him flexible hours to pursue personal interests while supporting community initiatives for widowed seniors.
