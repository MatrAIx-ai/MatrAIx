personas:
  professional: Mei Lin is a visionary executive leader who integrates strategic planning, full P&L oversight, and design-thinking to create art-infused, sustainable business models, while they leverage
    a healthy skepticism and competitive drive to negotiate high-impact partnerships across industries.
  sports: Mei Lin enjoys weekend kayaking on the Hudson River, participates in a co-ed tennis league at Prospect Tennis Club, and follows the New York Knicks and New York Mets passionately, often using
    their competitive drive to set personal fitness goals that blend cardio with strength training.
  arts: Mei Lin curates a personal collection of contemporary works that blend Eastern and Western aesthetic sensibilities, featuring artists like Mark Bradford and Yoko Ono, exhibits abstract paintings
    inspired by jazz improvisations, regularly attends Brooklyn museum nights showcasing the likes of Ai Weiwei, and they actively participate in improv theatre workshops that echo the spontaneity of musicians
    such as Kamasi Washington and Nina Simone.
  travel: Mei Lin prefers meticulously planned design-focused trips, having explored Tokyo’s avant-garde galleries, Copenhagen’s sustainable architecture, and Milan’s fashion districts, while they eye future
    adventures to Helsinki’s design museums and Lisbon’s waterfront cafés, balancing a love for discovery with occasional budget constraints imposed by corporate board responsibilities.
  culinary: Mei Lin, a confident home chef, delights in crafting experimental fusion dishes such as miso-glazed salmon tacos, kimchi-infused mac & cheese, and matcha-citrus cheesecake, savoring ingredients
    like kombu, sriracha, and artisanal goat cheese, and they frequently dine out at Brooklyn’s avant-garde restaurants to source fresh inspiration.
  core: Mei Lin blends a competitive executive drive with a bohemian love of abstract art, juggling high-stakes boardroom negotiations and midnight jazz jam sessions, all while they habitually double-check
    every email for hidden motives.
background:
  cultural: 'Mei Tomomi Lin was born in Brooklyn to immigrant parents—her mother from Taiwan and her father from Japan—giving her a blended Chinese‑Japanese heritage. Bilingual in Mandarin and Japanese,
    she grew up navigating the values of filial piety, respect for tradition, and a strong work ethic while embracing the vibrant multiculturalism of New York City. Her family emphasized education and cultural
    preservation, which fostered Mei’s appreciation for East Asian art, philosophy, and culinary traditions. At the same time, the dynamic, entrepreneurial spirit of Brooklyn shaped her independent outlook
    and openness to novel ideas. This bicultural lens informs her leadership style: she merges Eastern principles of harmony and collective responsibility with Western emphasis on innovation, competition,
    and individual achievement.'
