  career_goals: Mei aims to propel her company into a global leader that fuses artistic innovation with mainstream commerce, expanding its footprint across Asia‑Pacific markets while deepening its presence
    in North America. She envisions launching a corporate venture fund to back creative‑tech startups, positioning her firm at the forefront of sustainable and culturally resonant product design. Driven
    by a competitive spirit, she seeks to outpace industry peers in market share and brand influence. Mei also plans to institutionalize a corporate arts incubator that nurtures internal creative talent,
    and she aspires to mentor the next generation of women entrepreneurs, eventually transitioning to a senior advisory role that shapes industry standards for responsible, innovative business practices.
