  hobbies: '[''Herb gardening'', ''Walking in local parks'', ''Reading historical fiction'', ''Tai Chi'', ''Knitting and crocheting'', ''Traditional Chinese music listening'', ''Community senior club activities'',
    ''Lunar New Year celebrations'', ''Volunteer work'']'
  career_goals: Hui's current career goals focus on personal enrichment and community contribution rather than professional advancement. She aims to lead weekly cooking workshops for seniors, preserving
    and sharing classic Chinese recipes. She wishes to document her family's oral history and compile a memoir that blends her East Asian heritage with her American life story. Maintaining her health is
    a priority; she plans to incorporate regular Tai Chi sessions and gentle walks into her routine. She also aspires to travel to at least two major Chinese cultural festivals in the United States each
    year, such as the Chinatown Lantern Festival in San Francisco and the Lunar New Year Parade in New York, to stay connected with broader cultural traditions. Ultimately, Hui hopes to mentor younger members
    of the Chinese community in Lansdale, offering guidance on cultural practices, language, and intergenerational bonding.
