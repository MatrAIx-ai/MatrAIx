  hobbies: '[''Reading picture books'', ''Coloring and drawing'', ''Solving jigsaw puzzles'', ''Building LEGO structures'', ''Dancing to Latin music'', ''Playing soccer'', ''Helping in the kitchen'', ''Community
    gardening'']'
  career_goals: Maria envisions a future where she can support and guide others, dreaming of becoming a teacher, school counselor, or community health worker. She wants to create structured, nurturing environments
    that help children succeed and feel safe, and she hopes to organize community events that promote health and education in her neighborhood.
