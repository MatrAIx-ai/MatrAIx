personas:
  professional: Maria Claudiocolon, a budding LEGO architect, channels her love for structure and predictability into designing intricate brick constructions that rival miniature cityscapes, applying her
    disciplined, achievement‑driven mindset to each build while encouraging her peers to follow clear step‑by‑step instructions.
  sports: Maria Claudiocolon shines as a midfield star on the Little Lions Soccer Club, where she follows the strategic playbook of the local professional team City FC, delights in the rhythmic footwork
    of salsa dancing after practices, and balances competitive spirit with a cooperative attitude that ensures every teammate feels included.
  arts: Maria Claudiocolon devotes evenings to coloring elaborate mandala designs, loses herself in picture books like 'The Little Engine That Could' and 'The Giving Tree' for their clear moral lessons,
    builds LEGO scenes inspired by the whimsical worlds of Disney's 'Frozen' and the vibrant illustrations of Eric Carle, and dances to the upbeat Latin rhythms of Ricky Martin while humming the tunes.
  travel: Maria Claudiocolon prefers itineraries that blend educational stops with playful breaks, recalling family trips to the Smithsonian in Washington D.C., a weekend beach day at Ocean Park, and a
    magical stay at Disney World, while dreaming of a future adventure to Barcelona's Park Güell where she can sketch the mosaic tiles and taste fresh fruit smoothies.
  culinary: Maria Claudiocolon loves helping stir the pot for simple island dishes such as rice and beans with plantain chips, proudly adds diced mango and pineapple to a fresh fruit salad, and proudly
    presents a perfectly melted cheese quesadilla seasoned with a pinch of cumin, all while meticulously arranging utensils in the kitchen to match her love for order.
  core: Maria Claudiocolon is a highly organized seven‑year‑old who blends a love for LEGO engineering, disciplined saving, allergy‑aware health habits, cooperative soccer play, vivid picture‑book storytelling,
    structured travel adventures, and precise cooking, all guided by a calm, compassionate spirit and a penchant for neatness.
background:
  cultural: Maria is raised in a bilingual Puerto Rican household in Harrisburg, Pennsylvania. Spanish is spoken at home alongside English, and she participates in cultural celebrations such as Three Kings
    Day and local Puerto Rican festivals. Family gatherings feature traditional foods like arroz con gandules and music such as salsa and bomba, influencing her love for dancing. She feels a strong connection
    to her heritage while also embracing the diverse community of her city.
