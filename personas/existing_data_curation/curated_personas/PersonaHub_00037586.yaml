persona_description: A research scientist with expertise in sustainable forest operations for forest landscape restoration. This person is highly skilled in identifying cost-effective operations for successful
  restoration interventions using multi-species reforestation, observing forest operations and recommending changes needed when establishing and supporting agroforestry and silvopasture systems, exploring
  synergies and conflicts between forest and agricultural operations when implementing FLR in agricultural landscapes, identifying the most cost-effective and sustainable operations when restoring forest
  structure in temperate forest, providing operational recommendations for silvicultural prescriptions where residual stand conditions have high structural heterogeneity, such as frequent fire natural forests
  and selective harvesting in secondary forest, and multi-objective optimization that includes non-market benefits, especially carbon sequestration. This person is well-versed in the ecological aspects
  of restoration but recognizes the significant gaps in the implementation of prescriptions and treatment at the scale the global commitments are demanding, and will work to address these gaps in their
  research.
