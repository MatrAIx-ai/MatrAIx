personas:
  professional: Marilou Hill is a budding teen coder and marine-conservation blogger who merges practical curiosity with creative storytelling by crafting interactive Python tutorials, curating coastal
    photography, and producing short videos that spotlight ocean health, all while coordinating beach-cleanup projects with the same organized enthusiasm they bring to school drama rehearsals.
  sports: Marilou Hill rides the winter waves with the Santa Monica Youth Surf Club, spikes the ball in the Coastal Beach Volleyball League during spring, follows the Los Angeles Dodgers, Los Angeles Lakers,
    and LA Galaxy avidly, and they balance a laid-back surf lifestyle with disciplined weekly conditioning that keeps them fit for the salty sprint of a beach match.
  arts: Marilou Hill dazzles onstage in her school drama club, channeling the improvisational flair of Zendaya and the lyrical rhythm of Billie Eilish, while immersing themselves in the speculative worlds
    of Neil Gaiman and N.K. Jemisin, snapping sunrise seascapes inspired by the color palettes of Hayao Miyazaki, and they weave those narratives into bite-size blog posts that fuse code and storytelling.
  travel: Marilou Hill prefers spontaneous weekend escapades to nearby coastal gems like Big Sur and Catalina Island, while dreaming of eco-focused adventures to Bali’s surf-rich beaches, New Zealand’s
    Bay of Islands, and Iceland’s dramatic cliffs, and they plan each trip with a mix of DIY itineraries and family-approved safety checklists.
  culinary: Marilou Hill, a self-taught kitchen enthusiast, often whips up avocado toast sprinkled with lemon zest, prepares vibrant ahi poke bowls brimming with seaweed, sesame oil, and mango, and they
    experiment with grilled mahi-mahi tacos seasoned with cumin and lime, all while perfecting their smoothie-bowl technique that blends coconut milk, berries, and chia seeds.
  core: Marilou Hill is a sun-kissed, drama-loving teen who balances her relentless curiosity about the ocean with a habit of forgetting to finish her skincare routine, and they turn every beach cleanup
    into a stage for community storytelling.
background:
  cultural: Marilou comes from a White, middle‑class family that has lived in Southern California for several generations. Growing up in San Diego, she absorbs the city’s coastal culture, celebrating typical
    American holidays while also engaging with the region’s multicultural atmosphere, such as local Spanish‑language festivals and community events at the Maritime Museum. Her family places a strong emphasis
    on education, volunteerism, and an active outdoor lifestyle, fostering her respect for nature, community harmony, and a pragmatic curiosity about the world.
