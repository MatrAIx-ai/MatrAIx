  hobbies: '["Drama Club (Acting & Improvisation)", "Surfing", "Volleyball", "Beach Clean-ups", "Reading Sci-Fi & Fantasy", "Photography (Coastal Landscapes)", "Creative Writing (Short Stories)", "Beginner
    Coding (Python)", "Blogging about Marine Life"]'
  career_goals: Marilou hopes to blend her love of the ocean, communication strengths, and community focus into a future career protecting coastal ecosystems and educating the public. She plans to pursue
    marine biology or environmental science in college, aiming for roles such as marine conservationist, science communicator, or environmental policy advocate. In the near term, she wants to lead a student
    environmental club, launch a blog or YouTube channel about marine life, and secure internships with local research labs or nonprofit NGOs.
