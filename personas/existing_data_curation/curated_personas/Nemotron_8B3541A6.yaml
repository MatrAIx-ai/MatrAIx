personas:
  professional: Pedro Diazmarrero is a 39‑year‑old interdisciplinary artist‑engineer who blends digital illustration, 3D modeling and Arduino‑driven kinetic sculptures with community heritage projects,
    leveraging their methodical planning and competitive drive to secure grants and run a thriving studio in Loíza.
  sports: Pedro Diazmarrero spends weekends tackling coastal hikes from Piñones to the cliffs of Fajardo, plays pick‑up beach volleyball with the Loíza Waves club, and cheers passionately for the Cangrejeros
    de Santurce baseball team during summer.
  arts: Pedro Diazmarrero curates pop‑up exhibitions inspired by James Turrell’s light installations and Beeple’s generative art, while mentoring youth in digital illustration, and channels the rhythmic
    energy of plena into sound‑design for interactive public sculptures.
  travel: Pedro Diazmarrero prefers immersive, project‑oriented travel, having trekked the cliffs of Cinque Terre, explored the street art of Berlin, and plans a month‑long research stay in Oaxaca to document
    indigenous music rituals, all while balancing studio responsibilities at home.
  culinary: Pedro Diazmarrero loves cooking traditional island dishes like mofongo with garlic‑infused sofrito, arroz con habichuelas, and occasional alcapurrias, mastering the perfect crunch of plantain
    chips, while experimenting with a modern twist by incorporating smoked paprika into a signature paella‑style rice dish.
  core: Pedro Diazmarrero is a methodical, socially vibrant creator who channels competitive energy into community art, obsessively tracks every espresso shot, and never can resist a late‑night camera walk
    through neon‑lit streets.
background:
  cultural: Pedro was born and raised in Loíza, a municipality celebrated for its Afro‑Puerto Rican roots, vibrant music, and strong communal ties. He grew up bilingual in Spanish and English, immersed
    in Catholic traditions, and deeply connected to the island’s oral histories, folklore, and rhythmic traditions such as bomba and plena. His family lineage blends Spanish colonial and African ancestry,
    shaping his appreciation for cultural hybridity. Pedro’s artistic practice is informed by this heritage, often incorporating local symbols, colors, and rhythms while also engaging with contemporary
    global art movements.
attributes:
  skills: '["Digital illustration", "3D modeling (Blender)", "Interactive installations", "Video editing (Adobe Premiere, After Effects)", "Sound design", "Adobe Creative Suite", "Unity game engine", "Python
    programming", "JavaScript for generative art", "CAD design", "Prototyping and fabrication", "Project management", "Community outreach", "Workshop facilitation", "Cultural heritage documentation"]'
  hobbies: '["Playing bomba drums", "Dancing plena", "Photography", "Hiking coastal trails", "Cooking traditional Puerto Rican cuisine", "Reading speculative fiction", "Arduino tinkering", "Volunteering
    in youth art programs", "Curating pop‑up exhibitions"]'
  career_goals: Pedro aims to become a leading interdisciplinary artist in Puerto Rico, known for fusing technology with Afro-Puerto Rican cultural motifs. Over the next five years, he plans to launch a
    community art studio in Loíza that hosts workshops, collaborative mural projects, and digital archives of local folklore. He seeks to secure national and international grants to develop large-scale
    interactive installations that celebrate the island’s musical heritage. In the long term, Pedro envisions teaching at a university or community college, mentoring emerging artists, and establishing
    a sustainable creative enterprise that produces socially engaged art for public spaces.
