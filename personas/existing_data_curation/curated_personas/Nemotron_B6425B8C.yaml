  career_goals: Although retired from full-time teaching, Jessica aims to stay influential in the field of education by serving on the board of a local educational nonprofit, advising the Wilmington school
    district on curriculum innovation, and spearheading intergenerational tutoring programs that pair seniors with elementary students. She also aspires to author a series of guidebooks on effective teaching
    strategies for adult learners, and to volunteer as a mentor for first-generation college students in the New Castle County community.
