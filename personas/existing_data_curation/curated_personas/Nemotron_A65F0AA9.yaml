  hobbies: '["Abstract painting", "Poetry writing", "Reading speculative fiction and philosophy", "Herb gardening", "Solitary nature walks", "Classical piano practice", "Calligraphy", "Genealogy research",
    "Crossword puzzles and Sudoku", "Attending quiet gallery exhibitions"]'
  career_goals: Wanda’s career ambitions are now framed as personal legacy projects rather than paid employment. She aims to complete a memoir titled “Quiet Currents” that weaves her memories of growing
    up in suburban Pennsylvania with reflections on art and solitude. She plans to publish a combined poetry and abstract‑art volume, seeking a small press that respects artistic integrity. As a lifelong
    lover of history, she intends to curate a community exhibition, “Ardmore Through Time,” and to lead a volunteer oral‑history project documenting senior residents’ stories for the local historical society.
    Additionally, she hopes to create an online digital archive of her family genealogy, applying her archival expertise. To deepen her knowledge, she plans to earn a certificate in archival studies or
    museum studies, and to attend occasional workshops in advanced painting techniques.
