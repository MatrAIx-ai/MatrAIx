personas:
  professional: An archival specialist and mixed‑media abstract painter, Wanda Jarrells leverages her meticulous research skills and quiet, competitive drive to plan and execute a community exhibition on
    local history, while they organize digital collections and self‑publish artistic booklets with methodical precision.
  sports: An avid solo hiker and loyal supporter of the Philadelphia Eagles, Wanda Jarrells joins a local walking club on weekend trails, follows the Phillies’ season, and they keep a modest fitness routine
    of daily nature walks that double as meditation.
  arts: A dedicated practitioner of abstract painting and poetry, Wanda Jarrells draws inspiration from Mark Rothko, Wallace Stevens, and Debussy, attends low‑key openings at the Philadelphia Museum of
    Art, and they practice calligraphy to hand‑letter each new poem.
  travel: A methodical planner of quiet getaways, Wanda Jarrells prefers weekend trips to the Hudson Valley, revisits ancestral towns in England for genealogy research, and they dream of a spring visit
    to Paris to explore historic libraries and cafés.
  culinary: A modest home chef with a herb garden, Wanda Jarrells frequently prepares rosemary‑infused roasted chicken, lentil soup with thyme, and fresh arugula salads topped with goat cheese, while they
    relish the ritual of chopping and seasoning as a meditative practice.
  core: Wanda Jarrells is a meticulous, introspective creator who turns solitary curiosity into art, archives, and legacy projects, even as they wrestle with perfectionist quirks and occasional self‑doubt.
background:
  cultural: Wanda comes from a middle‑class, white Anglo‑American background in the Greater Philadelphia suburbs. Born in 1966, she was raised by two high‑school teachers who emphasized education, self‑reliance,
    and community service. Growing up in Montgomery County exposed her to the region’s colonial heritage, Quaker‑influenced values of humility and quiet reflection, and a strong tradition of public libraries
    and local museums. Her family attended a Methodist church, where music and storytelling were part of weekly life, but she later gravitated toward a more secular, arts‑focused outlook. The cultural environment
    emphasized modesty, respect for privacy, and a love of learning—traits that continue to shape her solitary, intellectually curious lifestyle.
attributes:
  skills: '["Archival research and preservation", "Mixed‑media abstract painting", "Creative writing (poetry and reflective essays)", "Digital content organization and genealogy database management", "Project
