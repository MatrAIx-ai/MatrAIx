  career_goals: Claudia aims to transition from senior database architect to a strategic leadership role such as Director of Data Architecture or Chief Data Officer within the next five years. She seeks
    to shape enterprise‑wide data‑strategy roadmaps, champion robust data‑governance frameworks, and mentor a high‑performing data engineering team. To support this trajectory, she plans to earn the Certified
    Data Management Professional (CDMP) credential, publish case studies on cloud migration best practices, and speak at industry conferences like the Data Architecture Summit. Ultimately, she wants to
    influence how organizations leverage data for competitive advantage while preserving the structured, reliable environments she values.
