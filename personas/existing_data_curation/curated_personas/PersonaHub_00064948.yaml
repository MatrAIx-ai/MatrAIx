persona_description: A historian and archaeologist who specializes in the study of megalithic monuments, particularly those found in the British Isles and the Iberian Peninsula. This individual is knowledgeable
  about the evolution of these monuments from the Middle East, particularly in Egypt, to their use in burials and solar cults. They have a particular interest in the cultural and religious significance
  of these structures, as well as their historical and archaeological significance. They are skilled in the use of historical and archaeological evidence to understand the past and to make informed interpretations
  of these monuments.
