personas:
  professional: Latoya Chery, a 45-year-old full-stack software developer, blends deep expertise in React, Node.js, and cloud platforms with a practical curiosity for emerging microservice architectures,
    championing inclusive design principles and mentoring junior engineers while they navigate the competitive tech landscape with a keen eye on reliability and community impact.
  sports: Latoya Chery stays fit by early-morning runs with the Gateway Runners club, occasional pick-up basketball at the community center, and weekly yoga sessions at Zen Flow, while they cheer the St.
    Louis Cardinals in spring baseball, the Blues during hockey season, and support the City SC’s inaugural MLS campaign, blending a competitive drive with a habit of using fitness as a stress-relief outlet.
  arts: Latoya Chery nurtures their artistic side by strumming blues-infused melodies on an acoustic guitar, attending intimate jazz sets featuring the St. Louis Jazz Collective, photographing vibrant neighborhood
    murals, and diving into speculative fiction by Octavia Butler, while they draw inspiration from legends like Nina Simone and modern storytellers such as Kendrick Lamar.
  travel: Latoya Chery plans trips with a blend of meticulous budgeting and spontaneous curiosity, having explored the culinary streets of New Orleans during Mardi Gras, the historic sites of Ghana to connect
    with ancestral roots, the tech hubs of Tokyo during a conference, and the serene Blue Ridge Mountains of Asheville for a restorative retreat, all while they balance family commitments and a desire to
    gather stories for future community workshops.
  culinary: Latoya Chery, an adept home chef, transforms classic Southern dishes such as collard greens, black-eyed peas, and smoked turkey into health-conscious plates by incorporating quinoa, kale, and
    roasted sweet potatoes, often sourcing fresh produce from the St. Louis Farmers Market and experimenting with spice blends that honor soulful flavors while they keep meals low-sodium and nutrient-dense.
  core: Latoya Chery is a fiercely curious technologist who balances a competitive edge with deep community roots, turning anxiety into disciplined yoga practice, occasional impulsive jazz ticket splurges,
    and a relentless drive to uplift underrepresented voices in tech, as they continuously seek to merge code with cultural consciousness.
background:
  cultural: 'Latoya identifies as an African‑American woman whose family’s roots trace back to the Great Migration from the Mississippi Delta to St. Louis. Raised in a close‑knit extended family and an
    active church community, she grew up immersed in gospel music, southern soul cuisine, and the storytelling traditions of her elders. She celebrates cultural milestones such as Juneteenth and Kwanzaa,
    and participates in local African‑American arts festivals. Her heritage influences her professional ethos: she strives for representation in tech, incorporates inclusive design principles, and mentors
    other Black women to navigate the industry. The vibrant cultural mosaic of St. Louis County, with its historic neighborhoods and burgeoning Black entrepreneurial scene, continually informs her worldview,
    creativity, and commitment to community uplift.'
attributes:
  skills: '[''React'', ''Vue'', ''Node.js'', ''Django'', ''Spring Boot'', ''AWS'', ''Azure'', ''Docker'', ''Kubernetes'', ''Test‑Driven Development'', ''Jenkins'', ''GitHub Actions'', ''Terraform'', ''Python
    (pandas, NumPy)'', ''Algorithmic Problem Solving'', ''Code Review'', ''Mentoring'', ''Scrum'', ''Kanban'']'
  hobbies: '[''Acoustic Guitar (Blues/Soul)'', ''Jazz Concert Attendance'', ''Urban Gardening'', ''Soul Food Cooking with Health‑Conscious Twists'', ''Yoga and Guided Meditation'', ''Reflective Journaling'',
    ''Reading Speculative Fiction (Octavia Butler)'', ''Street Photography'', ''Volunteer Coding Mentor for High‑School Girls'', ''Black Tech Community Meetups'']'
  career_goals: Latoya aims to transition into a senior technical leadership role within the next three years, targeting positions such as Lead Engineer, Engineering Manager, or Solutions Architect. She
    is driven to spearhead initiatives that modernize legacy systems through microservices and cloud migration, while championing diversity and inclusion in tech. Long‑term, she aspires to launch a social‑impact
    startup that provides a mentorship platform for Black women in technology, and to become a recognized speaker at national conferences on inclusive engineering practices. She also plans to earn an AWS
    Solutions Architect certification and publish thought‑leadership articles on pragmatic software architecture.
