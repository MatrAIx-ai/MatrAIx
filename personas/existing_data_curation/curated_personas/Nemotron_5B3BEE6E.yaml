personas:
  professional: Arielle Peterson, a 20‑year‑old residential carpenter, blends precise framing and blueprint‑reading skills with a sociable leadership style, mentoring junior workers, meticulously budgeting
    project costs, and they are pursuing journeyman certification and a contractor’s license to eventually open a custom‑furniture workshop.
  sports: Arielle Peterson, a 20‑year‑old athlete‑at‑heart, they drift between community‑center basketball games on weekends, root for the local NBA team the Houston Rockets and follow the Texas A&M Aggies
    football season, while incorporating morning jogs and occasional yoga to stay limber for physically demanding carpentry work.
  arts: Arielle Peterson, a 20‑year‑old choir enthusiast, they blend gospel harmonies with a love for classic soul artists like Aretha Franklin and contemporary worship groups such as Elevation Worship,
    often humming melodies while woodworking, and they reserve evenings for local theater productions featuring regional talent.
  travel: Arielle Peterson, a 20‑year‑old explorer with a modest travel budget, they dream of a road‑trip along the Gulf Coast to savor New Orleans jazz and Charleston’s historic districts, have already
    visited Asheville’s craft‑beer scene, and they prefer carefully planned itineraries that balance adventure with the need to save for future certification fees.
  culinary: Arielle Peterson, a 20‑year‑old home cook, they excel at Southern comfort cuisine, perfecting fried chicken with a buttermilk brine, slow‑cooked collard greens seasoned with smoked turkey, and
    peach cobbler topped with a crunchy oat streusel, often using fresh herbs from their modest vegetable plot.
  core: Arielle Peterson, a 20‑year‑old carpenter who sings in a church choir, they balance a toolbox of hands‑on skills with a worry‑prone mind, a love for Southern comfort food, and a clear vision of
    owning a custom‑furniture workshop while mentoring other young women in the trade.
background:
  cultural: Arielle grew up in Jesup, a tight‑knit town in the heart of rural Georgia, where African‑American cultural traditions run deep. Her family’s roots in the local church have shaped her values
    of faith, communal support, and musical expression through gospel. The Southern Black experience—marked by resilience, storytelling, and a strong sense of community—guides her daily interactions. She
    draws on the culinary heritage of the Lowcountry, enjoying dishes passed down through generations, and she participates in local festivals that celebrate Black history and culture. As a Black woman
    in the carpentry trade, Arielle is conscious of the legacy of both the civil‑rights movement and the push for greater representation of women and minorities in skilled trades, which fuels her commitment
    to mentor others and give back through volunteer work.
