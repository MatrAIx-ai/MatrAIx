  career_goals: Arielle is focused on building a stable career that provides both financial security and creative fulfillment. In the next three to five years she aims to achieve journeyman‑carpenter certification
    and obtain her state contractor’s license, allowing her to lead larger residential projects and eventually launch her own small‑scale carpentry business. She envisions a workshop that offers custom
    furniture and home‑renovation services, and hopes to mentor other young women entering the trade. Long‑term, she aspires to become a foreman or site supervisor, balancing leadership responsibilities
    with a predictable schedule that supports her marriage and potential family plans.
