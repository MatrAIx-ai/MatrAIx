personas:
  professional: Masuma Viera is a clinical pharmacist who combines deep expertise in pharmacology, medication therapy management, and health informatics with a critically skeptical, highly organized, and
    energetic approach, leading multidisciplinary teams to implement evidence‑based safety protocols while constantly questioning standard practices to drive improvement.
  sports: Masuma Viera channels their energetic spirit into leading the Virginia Valiant Runners women’s running club, regularly completing the Virginia Marathon every October, and supporting local professional
    teams like the Washington Commanders and the Washington Capitals as part of an active fitness routine.
  arts: Masuma Viera enriches daily life by attending Washington Symphony Orchestra concerts, listening to jazz legends such as Herbie Hancock, following contemporary poet Rupi Kaur, and watching films
    by director Ava DuVernay, using these artistic experiences to balance the demands of a high‑pressure pharmacy career.
  travel: Masuma Viera plans family trips that blend structured itineraries with spontaneous culinary exploration, having recently trekked Bali’s rice terraces, savored Oaxaca street food, and now eyeing
    a wellness retreat in Kerala to study traditional health practices while keeping budget and school calendars in mind.
  culinary: Masuma Viera experiments in the kitchen by creating fusion dishes like spiced quinoa bowls with mango‑chili salsa, roasted cauliflower, and smoked paprika, while also refining classic spiced
    lentil stews using sous‑vide techniques, reflecting a high level of culinary skill that merges scientific precision with creative flair.
  core: Masuma Viera is a data‑driven pharmacy leader whose relentless curiosity and disciplined organization fuel patient safety innovation, yet a secret habit of late‑night culinary experiments and checking
    work emails at dinner table reveals a work‑life blend that’s both productive and occasionally chaotic.
background:
  cultural: Masuma is a first‑generation American of South Asian descent, raised in a family that values education, hospitality, and community service. Her parents immigrated from Bangladesh, and she grew
    up celebrating festivals such as Eid and Pohela Boishakh while navigating a multicultural environment in Virginia. Fluent in both English and Bengali, she bridges her heritage with her American identity
    by volunteering at local mosques, supporting multicultural events, and incorporating South Asian health perspectives into her pharmacy practice. This blend of cultural pride and adaptability informs
    her inclusive approach to patient care and community engagement.
