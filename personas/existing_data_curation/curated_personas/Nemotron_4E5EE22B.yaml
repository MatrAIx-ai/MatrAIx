  career_goals: Dakota hopes to deepen her community engagement by volunteering as an art facilitator at the local senior center, where she can lead small watercolor workshops and share her photography
    tips. She aspires to complete a memoir writing course offered by the regional library and eventually self‑publish a collection of family stories and local folklore. To address her sensitivity to stress,
    she plans to join a mindfulness group for seniors and explore gentle yoga classes. She also wishes to mentor younger residents in basic gardening and budgeting, fostering intergenerational connections
    while staying mentally active and emotionally balanced.
