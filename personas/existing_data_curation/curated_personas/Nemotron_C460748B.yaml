personas:
  professional: Sun Wo, an aspiring student council leader and budding event planner, channels their sociable energy and love for structure into organizing school dances, coordinating K‑pop flash mobs,
    and managing peer‑run fundraisers, demonstrating early project‑management skills and a knack for balancing creativity with practical logistics.
  sports: Sun Wo, an enthusiastic member of the junior soccer team who trains after school on Tuesdays and Thursdays, idolizes FC Barcelona’s midfield maestros, follows the Premier League cheering for Liverpool
    FC on weekends, and also dabbles in recreational basketball during summer camps.
  arts: Sun Wo, a devoted fan of K‑pop groups like BLACKPINK and BTS, spends weekends rehearsing intricate choreography with friends, reads graphic novels such as One Piece and My Hero Academia, and practices
    piano pieces by Yann Tiersen, integrating rhythmic precision from dancing into musical expression.
  travel: Sun Wo, who prefers meticulously planned family vacations, has explored the historic streets of Kyoto, the futuristic districts of Seoul, and enjoys day trips to the nearby national park for weekend
    hikes, all while maintaining a travel journal to catalog favorite snacks and cultural observations.
  culinary: Sun Wo, an enthusiastic home‑cook, spends evenings mastering dumpling fillings with pork, napa cabbage, ginger, and scallions, while also experimenting with kimchi pancakes and occasionally
    baking chocolate chip cookies, showcasing an intermediate skill level that impresses family members.
  core: Sun Wo balances a love for structure with spontaneous K‑pop flash mobs, often juggling school duties, soccer practice, and a half‑finished homework pile.
background:
  cultural: Sun Wo is a second‑generation East Asian American, with Chinese heritage. At home, Mandarin is spoken alongside English, and the family celebrates cultural events such as Chinese New Year and
    the Mid‑Autumn Festival, often preparing traditional foods and decorating the house. Her family places strong emphasis on education, respect for elders, and community harmony, values that influence
    her attentive and cooperative nature. Living in Plano, Texas, she blends these cultural traditions with typical American school life, participating in both community festivals and local extracurricular
    activities.
attributes:
