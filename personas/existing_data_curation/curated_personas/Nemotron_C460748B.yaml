  career_goals: She aspires to become a pediatric nurse or a community health advocate, driven by her desire to help others and support children's well‑being. In the short term, Sun Wo aims to join the
    school's health club, volunteer in local community events, and earn a certification in first aid. She also dreams of studying biomedical science in high school and eventually works toward a career where
    she can combine her caring nature with her analytical skills.
