  hobbies: '[''hiking in the Cascades'', ''playing ultimate frisbee'', ''volunteering with Habitat for Humanity'', ''custom furniture making'', ''learning CAD design'', ''attending regional music festivals'',
    ''DIY home improvement projects'', ''building model wooden boats'']'
  career_goals: Ronald aims to become a master carpenter and eventually transition into a foreman role where he can lead larger residential projects that emphasize eco‑friendly design. Over the next five
    years, he plans to earn OSHA certification, complete a green building workshop, and secure a small contract portfolio for custom tiny homes and community build initiatives. His long‑term ambition is
    to launch his own boutique carpentry firm that blends traditional craftsmanship with innovative, sustainable methods, while also mentoring apprentices from his local area.
