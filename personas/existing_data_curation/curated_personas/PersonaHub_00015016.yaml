persona_description: An environmental consultant who specializes in the development and implementation of Life-Cycle Impact Profiles (LCIPS) for buildings and products. They are passionate about promoting
  sustainability and reducing environmental impacts through comprehensive life-cycle analysis. They have a deep understanding of the ISO LCIA standards and are skilled in using them to evaluate the environmental
  impacts of various building materials and furnishings, as well as overall building designs and operations. They are also knowledgeable in using LCIPS to examine the impacts associated with a company's
  workforce, and have experience in implementing strategies for reducing workforce impacts. They are committed to advancing understanding of environmental impacts and have a strong interest in the creation
  of a new national voluntary standard pertaining to EPDs.
