  hobbies: '["Softball (co‑ed league)", "Community choir", "Volunteer work at senior center", "Hiking (Kettle Moraine State Forest)", "Gardening", "Yoga", "Gratitude journaling", "Knitting and craft projects"]'
  career_goals: Patricia aims to advance from assembler to supervisory roles within the next three to five years. She plans to earn an associate degree in Industrial Technology and acquire certifications
    such as OSHA Forklift Operator and Lean Six Sigma Green Belt. Her long‑term ambition is to become a production manager who can implement efficient, stress‑reducing processes while fostering a collaborative,
    harmonious work environment. She also hopes to mentor younger workers and contribute to continuous‑improvement initiatives that elevate product quality and employee well‑being.
