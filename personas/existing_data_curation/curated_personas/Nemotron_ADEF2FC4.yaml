  career_goals: At 81, David’s primary ambition is to stay healthy and active so he can continue supporting his wife and contributing to his community. He aims to document his family’s history through a
    memoir or recorded oral histories for his grandchildren. Maintaining his garden to provide fresh produce for his household and neighbors is a key goal. He wishes to volunteer regularly with the local
    historical society, sharing his knowledge of Dansville’s mid‑century development and mentoring younger volunteers. A modest long‑term goal is to ensure his estate supports his grandchildren’s education
    and that his home remains a welcoming space for family gatherings.
