  hobbies: '[''Community Volunteering'', ''Book Club'', ''Bridge (Competitive Card Game)'', ''Hiking'', ''Cycling'', ''Kayaking'', ''Cooking Workshops'', ''Wine Tasting'', ''Live Theater'', ''Yoga'', ''Journaling'']'
  career_goals: Driven by a competitive streak, Janiece aims to move into a senior director position within the next five years, overseeing regional operations and leading digital‑transformation initiatives
    that boost efficiency and profitability. She seeks to mentor emerging managers, establish a formal succession pipeline, and achieve measurable performance improvements. After securing an executive role,
    she plans to transition to consulting for small businesses and teach part‑time at a community college, while also contributing her expertise to Sacramento’s economic development programs and volunteer
    boards.
