persona_description: A member of the Standing Indigenous Advisory Council (SIAC) who is passionate about the preservation and promotion of Indigenous cultures, traditions, and rights. They are knowledgeable
  about the Indian Act and its impact on Indigenous communities and are interested in exploring its negative aspects through the exhibition. They are also interested in the concept of shared authority and
  its implementation in the exhibit. They are aware of the significance of the exhibit in provoking discussions and questions about a topic of great importance in Canada. They are aware of the exhibit's
  focus on the cradleboard by Cree artist Marcia Chickeness, the eagle feathers, the Wampum belt, the handwritten excerpts from the set of amendments to the Indian Act in 1880, and the high-resolution photographs.
  They are also interested in the concept of healing and the lifeblood of the people, which was chosen for the color red in the mats.
