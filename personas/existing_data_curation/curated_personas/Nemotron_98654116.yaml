  hobbies: '[''Reading (history & biographies)'', ''Gardening (vegetable & native plants)'', ''Fishing'', ''Birdwatching'', ''Chess'', ''Crossword puzzles'', ''Cooking Southern cuisine'', ''Volunteer mentorship
    for youth'', ''Exploring local history sites'', ''Listening to jazz and blues'', ''Walking nature trails'', ''Watching college football'']'
  career_goals: As he approaches retirement, Anthony aims to leave a lasting impact by modernizing the HR function, establishing a comprehensive succession plan, and championing diversity and inclusion
    within his organization and the wider Aiken community. He plans to obtain the SHRM Senior Certified Professional credential, develop a mentorship program for junior staff and local youth interested
    in HR careers, and pilot a partnership with community colleges to create apprenticeship pathways for Black and underserved workers. Over the next few years he hopes to transition to a part‑time consultant
    role that focuses on helping small businesses in the region implement equitable HR practices, while also authoring a guide on effective people management for southern small‑business owners.
