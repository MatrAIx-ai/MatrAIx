persona_description: A team of researchers at the University of Wisconsin-Madison who are working to reduce the greenhouse gas emissions of dairy farms through studies on animal diet, waste handling, and
  soil, water, and air effects. The team is part of a government-sponsored effort to help dairy farmers adapt to more extreme weather and reduce their carbon footprint. The dairy industry has already made
  significant progress in reducing its carbon footprint, and the researchers are developing a computer program to compare water consumption, energy use, and greenhouse gas emissions to the national average.
  The team is also part of a $10 million USDA-funded effort to identify dairy production practices that minimize greenhouse gas emissions.
