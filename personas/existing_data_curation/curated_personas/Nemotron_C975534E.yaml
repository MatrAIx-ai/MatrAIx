personas:
  professional: Darrell Swain, a seasoned surgical technologist with over 20 years in Union, MO, combines meticulous instrument preparation, strict sterile‑field management, and proactive mentorship with
    a relaxed attitude toward scheduling, allowing the OR to run like a well‑rehearsed play while still carving out time for spontaneous team‑building barbecues.
  sports: Darrell Swain, the third‑base regular for his town’s softball league, cheers for the Kansas City Chiefs on Sundays, roots for the St. Louis Cardinals, spends weekend mornings fishing for bass
    at Truman Lake, and hits the local community gym twice a week for weight‑training, preferring informal, social workouts to regimented plans.
  arts: Darrell Swain enjoys classic country and gospel, frequently listening to Johnny Cash, Dolly Parton, and the church choir, watches Bruce Springsteen concerts on DVD, and attends the nearby community
    theater’s productions of ‘Our Town’ and ‘The Glass Menagerie’ whenever his schedule permits.
  travel: Darrell Swain favors low‑key road trips that blend fishing and family time, such as annual weekend getaways to Dripping Springs, Texas, or exploring the Ozark National Forest, while dreaming of
    a summer sailing adventure among the Greek Islands and a cultural tour of Rome, yet he usually decides on the fly and books last‑minute deals.
  culinary: Darrell Swain is an intermediate backyard‑bbq chef who masters smoked pork ribs, grilled corn brushed with butter, and pepper‑laden tomato salsa made from home‑grown tomatoes and peppers, often
    finishing dishes with a splash of hickory‑smoked bourbon‑infused sauce.
  core: Darrell Swain blends OR precision with a laid‑back love of community, juggling surgical tech duties, spontaneous fishing trips, and backyard barbecues while occasionally letting a stray spreadsheet
    or a missed statin refill slip through the cracks.
background:
  cultural: Darrell grew up in a small Midwestern town in Missouri, shaped by the region’s values of self‑reliance, neighborly support, and community involvement. His family traditions emphasize hard work,
    hospitality, and participation in local events such as county fairs and church gatherings. He identifies with a rural American cultural heritage that celebrates outdoor activities like hunting, fishing,
    and gardening, while also embracing the inclusive social fabric of his hometown. These influences have fostered a strong sense of duty to his community, a respect for practical, hands‑on skills, and
    an appreciation for the simple, communal celebrations that mark life in the heartland.
attributes:
  skills: '[''Surgical instrument sterilization'',''Instrument preparation and handling'',''Patient positioning and skin preparation'',''Maintenance of sterile field'',''Intra‑operative assistance (passing
