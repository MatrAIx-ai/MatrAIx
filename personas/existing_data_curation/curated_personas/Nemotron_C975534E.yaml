    JCAHO)'',''Documentation of procedures and instrument counts'',''Team communication and coordination'',''Mentoring of new techs'',''Quality‑improvement initiatives'',''Emergency response in the OR'']'
  hobbies: '[''Community softball league'',''Fishing trips at Truman Lake'',''Backyard barbecues and potluck gatherings'',''Youth mentoring at church'',''Gardening (tomatoes, peppers)'',''Woodworking projects'']'
  career_goals: Looking ahead, Darrell aims to move into a lead surgical technologist or operating‑room manager role where he can shape protocols and mentor staff across the department. He plans to achieve
    Certified Surgical Technologist (CST) status and enroll in an associate program in perioperative technology to deepen his clinical knowledge. Long‑term, he hopes to transition into a clinical educator
    position at a local community college, sharing his practical expertise with the next generation of techs. Throughout his career progression, Darrell values maintaining a structured yet flexible work
    environment that supports team harmony and patient safety, while preserving enough work‑life balance to stay actively involved with his family and community.
