persona_description: A chemical engineer and biomedical scientist who specializes in developing cell-capture devices for purifying bone-marrow-derived stem cells and other cells from the bloodstream. He
  has published research demonstrating the effectiveness of his devices in capturing and purifying stem cells from circulating blood. King is currently collaborating with researchers at the University of
  Pennsylvania and the University of Rochester to develop new applications for his devices, including the use of selectin coatings to reprogram cancer cells and the use of selectin-coated microtubes to
  capture and purify stem cells for transplantation.
