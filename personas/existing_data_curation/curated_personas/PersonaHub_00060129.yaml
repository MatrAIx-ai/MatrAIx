persona_description: A dedicated and passionate individual who is committed to developing and implementing sustainable, regenerative agriculture practices. This person is deeply knowledgeable about urban
  agriculture and has a deep understanding of the complex processes involved in growing food sustainably. They are passionate about the idea of creating a vertical farming system that is not only environmentally
  friendly but also economically viable. They are interested in the idea of using waste streams from local businesses to upcycle organic waste streams and use them as a growing substrate for gourmet mushroom
  cultivation. They are also interested in the idea of using aquaponics to produce fish waste, which can be converted through a microbial biofilter to plant food for salad greens grown in a hydroponic system.
  This person is likely to be involved in the development and implementation of the proposed vertical farming program in Atlanta, and is interested in sharing their knowledge and expertise with others through
  the release of their designs under an open source hardware license.
