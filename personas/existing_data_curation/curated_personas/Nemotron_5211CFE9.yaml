personas:
  professional: Kay Tan, a senior management analyst specializing in data‑driven process optimization, combines their quantitative prowess in Excel, SQL, and Tableau with Lean Six Sigma methodology and
    a disciplined, skeptical mindset to deliver structured, actionable insights that satisfy senior leadership while maintaining a competitive edge.
  sports: Kay Tan stays fit through early‑morning yoga and weekend runs with the Indianapolis Running Club, while they cheer on the Indiana Pacers during basketball season and the Indianapolis Colts in
    the fall, preferring low‑key, structured workouts over competitive team sports.
  arts: Kay Tan channels their creative side through watercolor landscapes inspired by Winslow Homer, reflective photography of Hoosier nature preserves, and evenings immersed in the literary worlds of
    Kazuo Ishiguro and David McCullough, while a soft‑rock playlist featuring Sufjan Stevens and Debussy often scores their artistic sessions.
  travel: Kay Tan prefers meticulously planned, low‑key getaways that blend nature hikes with cultural immersion, having explored the rugged trails of Yellowstone and the historic streets of Prague, while
    they dream of a slow‑paced literary tour of the Scottish Highlands and a weekend retreat in the French countryside.
  culinary: Kay Tan, an adept home cook, loves crafting garden‑fresh salads with heirloom tomatoes, crisp lettuce, and feta, preparing rustic ratatouille featuring eggplant, zucchini, and fresh basil, while
    indulging in occasional weekend brunches of avocado toast and poached eggs, and they never shy away from a perfectly seared ribeye at a local steakhouse after a successful project.
  core: Kay Tan blends a disciplined, data‑driven mindset with a quiet love for watercolor and literary fiction, balancing a fiercely competitive work ethic with a habit of nightly journal reflections,
    and they occasionally indulge in impulsive splurges on art supplies.
background:
  cultural: Kay identifies as a white American descended from a mix of German and Irish heritage, raised in a modest, middle‑class family in Indiana. Her upbringing emphasized self‑reliance, community involvement,
    and a practical work ethic typical of the Midwest. While she respects her family's cultural traditions—such as holiday gatherings and a love for home‑cooked meals—her academic exposure to the arts and
    humanities has broadened her worldview, fostering an appreciation for diverse perspectives while maintaining a grounded, pragmatic outlook.
attributes:
  skills: '[''Advanced Excel'', ''SQL querying'', ''Data visualization (Tableau, PowerBI)'', ''Process mapping (Visio)'', ''Lean Six Sigma Green Belt'', ''Project management (Agile, Waterfall)'', ''Qualitative
