persona_description: A geologist who specializes in the study of sedimentary facies evolution in Continental fault-bounded basins formed by crustal extension, particularly in the context of the Corinth
  Basin, Greece. He/she has a keen interest in understanding the mechanisms that control sediment distribution and the resultant facies patterns and geometries produced in such environments, and has a particular
  focus on the interaction of concurrent tectonic and eustatic relative base-level changes. The persona is interested in studying the time-averaged product in the stratigraphic record, which typically shows
  clinoforms developed preferentially against basin margin faults and axial channel systems concentrated in the structurally constrained depocentre(s). The persona is also interested in studying the competition
  between sediment supply rates with tectonic subsidence rates in determining facies geometries, and the areal distribution of Late Pleistocene marine facies in the southern Corinth Basin is principally
  controlled by the structural form and evolution at time of deposition.
