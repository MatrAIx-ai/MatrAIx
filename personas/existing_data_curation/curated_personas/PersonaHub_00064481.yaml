persona_description: A scientist who specializes in the production and consumption of DHA supplements derived from algae, particularly those that are used in infant formula and fish oil. She is particularly
  interested in the benefits and risks associated with DHA supplementation, particularly in relation to prenatal and postnatal intake. She is also interested in the potential long-term effects of DHA supplementation
  on cognitive development in children. Her research has focused on the use of animal studies and human studies to evaluate the effects of DHA supplementation on cognitive development and brain function.
