  hobbies: '[''Watercolor painting'', ''Paper folding (origami)'', ''Quilting'', ''Group dance classes'', ''Book club reading'', ''Cooking Vietnamese and fusion dishes'', ''Gardening'', ''Yoga'', ''Genealogy
    research'']'
  career_goals: Although retired from formal employment, Chanly aims to deepen her impact within the Lafayette community. She aspires to establish a weekly intergenerational art and storytelling program
    that provides a safe space for seniors and youth to share experiences and create together. She also hopes to mentor younger volunteers in empathetic listening and cultural sensitivity, and she plans
    to collaborate with local health centers to develop support groups for seniors dealing with anxiety and loneliness. Her long‑term ambition is to see her community garden thrive as a therapeutic space
    that integrates art, horticulture, and cultural heritage.
