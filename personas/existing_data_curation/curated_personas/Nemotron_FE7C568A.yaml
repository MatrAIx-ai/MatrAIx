  hobbies: '["Reading historical fiction", "Gardening (vegetable and flower)", "Hiking on local trails", "Knitting and quilting", "Genealogy research", "Local history exploration", "Small book club participation",
    "Yoga and mindfulness journaling"]'
  career_goals: Georgia aims to leverage her decades of experience to mentor the next generation of retail leaders, possibly transitioning into a consulting role for small businesses in her region. She
    seeks to implement innovative, yet practical, training programs that improve employee retention and store profitability. Over the next few years, she hopes to achieve certification in lean management
    and perhaps teach part‑time courses on retail management at a community college. She also intends to secure a stable retirement while maintaining an active role in her community.
