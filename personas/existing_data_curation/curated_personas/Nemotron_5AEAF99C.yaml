personas:
  professional: Yanara Punales, a seasoned HR leader with three decades of talent acquisition, employee relations, and DEI expertise, channels their curiosity and competitive edge into designing innovative,
    arts‑inspired wellness programs while they balance meticulous compliance work with flexible, creative problem‑solving.
  sports: Yanara Punales enjoys low‑impact fitness, joining a senior walking club that tours historic Brooklyn neighborhoods each Saturday, cheering on the New York Knicks during winter basketball season
    and the New York Yankees in summer, while they occasionally compete in a recreational senior cycling group that tracks mileage on Strava.
  arts: Yanara Punales spends weekends painting watercolors inspired by the vibrant palettes of Frida Kahlo and the abstract forms of Yayoi Kusama, while they regularly visit MoMA, the Brooklyn Museum,
    and local Queens galleries to study works by Kehinde Wiley and contemporary Latin American artists, letting their curiosity shape both their artistic practice and their professional DEI initiatives.
  travel: Yanara Punales prefers carefully curated, culturally immersive trips, often planning month‑long itineraries that blend visits to historic neighborhoods in New York with weekend getaways to Antigua’s
    colonial streets, the highlands of Guatemala for family roots exploration, and occasional art‑focused pilgrimages to Barcelona’s Picasso Museum, while they balance a modest travel budget with a desire
    for authentic experiences.
  culinary: Yanara Punales, an adept home chef, delights in preparing traditional Guatemalan tamales stuffed with masa, shredded chicken, and roasted pepitas, as well as hearty pepian simmered with coriander,
    cumin, and roasted pumpkin seeds, often layering these flavors with fresh cilantro and avocado to share at community potlucks, and they take pride in perfecting the balance of spice and tenderness.
  core: Yanara Punales balances a sharp, skeptical eye for organizational loopholes with a quiet habit of sketching watercolor scenes on conference margins, all while they fiercely guard a clandestine stash
    of rare Guatemalan spices and occasionally sacrifice bedtime to finish a new painting.
background:
  cultural: Yanara was born in the highlands of Guatemala, where her family blended Ladino and indigenous Maya traditions. She grew up celebrating Semana Santa, Día de los Muertos, and the vibrant markets
    of her hometown, which instilled a deep appreciation for communal rituals and artistic expression. After moving to the United States in her early twenties, she retained fluency in Spanish and an active
    connection to Guatemalan culture through family gatherings and local diaspora events. In Ridgewood, she bridges her heritage with her American life, incorporating bilingual communication in the workplace
    and championing multicultural inclusion both professionally and in community activities.
attributes:
