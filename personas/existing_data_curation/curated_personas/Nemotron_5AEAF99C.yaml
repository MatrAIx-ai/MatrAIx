  hobbies: '[''Watercolor Painting'', ''Visiting Art Museums'', ''Cooking Guatemalan Cuisine'', ''Reading Latin American Literature'', ''Gardening'', ''Volunteer English Tutoring'', ''Attending Community
    Cultural Festivals'', ''Walking Tours of Ridgewood'', ''Gentle Yoga'', ''Listening to Classical Music'']'
  career_goals: Yanara aims to solidify her legacy as a strategic HR partner who champions inclusive and creatively engaging workplaces. She plans to obtain the SHRM‑Senior Certified Professional (SHRM‑SCP)
    credential, expand the company's arts‑based wellness initiatives, and mentor the next generation of HR leaders, especially those from underrepresented backgrounds. In the next five years, she aspires
    to transition into a consulting role focused on DEI strategy for nonprofit and cultural institutions in the Greater New York area, while also serving on community boards that promote workforce empowerment
    for immigrant populations.
