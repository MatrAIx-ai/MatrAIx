  hobbies: '["Hiking and trail exploring", "Camping trips", "Volunteering at museums and parks", "Photography", "Painting and sketching", "Community volleyball leagues", "Attending live music and local
    festivals", "DIY home improvement projects", "Exploring smart home technology", "Socializing at cafés and group outings"]'
  career_goals: Andrea aims to earn a journeyman electrician license within the next two years and advance to a supervisory or project management role in the construction and maintenance sector. She is
    particularly interested in specializing in sustainable energy solutions, such as solar panel installation and smart home automation. In the long term, she envisions launching her own small contracting
    business that emphasizes eco-friendly practices, community outreach, and mentorship for young tradespeople.
