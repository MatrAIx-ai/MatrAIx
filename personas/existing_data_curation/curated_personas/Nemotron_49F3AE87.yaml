personas:
  professional: Andrea Hashim, a 23‑year‑old aspiring journeyman electrician, leverages their solid foundation in electrical, HVAC, plumbing, and carpentry to solve complex on‑site problems while infusing
    sustainable energy ideas and a collaborative, curious spirit into every project.
  sports: Andrea Hashim spends weekends hiking and camping in the San Juan Mountains, joins a community‑center volleyball league in the spring, roots for the Colorado Avalanche and Denver Broncos, and they
    embrace seasonal cross‑training by snowshoeing in winter and trail‑running in summer.
  arts: Andrea Hashim fuels their creative side by attending local painting and photography workshops, curating a wall of Ansel Adams prints at home, and unwinding at live‑music venues to see indie acts
    like Tame Impala and local folk singer Josie Williams.
  travel: Andrea Hashim prefers adventure‑packed road trips, having already logged drives to Mesa Verde, the Grand Canyon, and Italy’s Monte Alpino trail, while they dream of a future trek through Patagonia’s
    Torres del Paine and a tech‑focused visit to Tokyo’s Akihabara district.
  culinary: Andrea Hashim loves cooking sustainable meals, often whipping up quinoa‑black bean tacos with fresh cilantro and lime, experimenting with Colorado green chili, and pairing their dishes with
    craft cold‑brew coffee, though they sometimes over‑salt when trying new recipes.
  core: Andrea Hashim, a restless 23‑year‑old with a knack for wiring homes and an insatiable curiosity for art, often forgets to water houseplants while they day‑dream about their next solar install.
background:
  cultural: Andrea was raised in a white, mid-western family of German-Irish heritage that settled in the Rocky Mountain region. Growing up in Cortez, Colorado, she experienced a blend of Western ranching
    culture, a vibrant Hispanic influence, and the rich traditions of the nearby Ute and Ancestral Pueblo peoples. Family values emphasized self-reliance, outdoor recreation, and community involvement.
    Frequent visits to regional art festivals and historic sites like Mesa Verde fostered her appreciation for indigenous art and storytelling, while local church and community events reinforced a sense
    of shared responsibility and cultural pride.
attributes:
  skills: '["Electrical wiring and troubleshooting", "HVAC system maintenance", "Plumbing repairs", "Basic carpentry", "Hand and power tool operation", "Blueprint and schematic reading", "Preventive maintenance
