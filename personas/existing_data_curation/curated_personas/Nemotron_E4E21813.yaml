personas:
  professional: Marcus Smith, a 14‑year‑old budding game developer, blends his love for structured LEGO Technic builds with coding in Scratch and beginner Python, channeling his practical mindset into designing
    rule‑driven games while volunteering at the community center to teach younger kids basic programming.
  sports: Marcus Smith, a 14‑year‑old point guard in the Cuyahoga County youth basketball league, passionately follows the Cleveland Browns and the Cleveland Cavaliers, often sporting a LeBron James jersey
    while cheering on the Browns at FirstEnergy Stadium on Sundays.
  arts: Marcus Smith, a 14‑year‑old who immerses himself in hip‑hop beats from Kendrick Lamar, soulful R&B from H.E.R., and the gospel harmonies heard at his church youth choir, also critiques classic jazz
    recordings by John Coltrane during study sessions and reads biographies of engineers like Elon Musk for inspiration.
  travel: Marcus Smith, a 14‑year‑old with a love for music‑rich destinations, has visited the Rock & Roll Hall of Fame in Cleveland, dreams of a road trip to New Orleans to experience its jazz scene, and
    hopes to explore Boston’s Freedom Trail on a school field trip while balancing travel costs with his allowance and family plans.
  culinary: Marcus Smith, a 14‑year‑old who enjoys cooking comfort foods, often makes macaroni and cheese with sharp cheddar, experiments with fried chicken seasoned with smoked paprika and hot sauce, and
    treats himself to warm cornbread drizzled with honey butter as a favorite snack.
  core: Marcus Smith is a structured, community‑oriented teen who balances coding, basketball, and church service, yet occasionally splurges on sneakers and procrastinates on homework until the last minute.
background:
  cultural: Marcus is an African American teen raised in Cleveland's historically Black neighborhoods, such as Hough and the surrounding West Side. His family maintains strong ties to the local church,
    where he participates in youth group activities and community outreach events. He is influenced by the city's rich musical heritage, especially gospel, jazz, and modern hip-hop, and he values the storytelling
    traditions of his community. Growing up in a city known for its sports culture, especially the Browns and the Cavaliers, Marcus shares a collective pride in local achievements. His experiences are shaped
    by both the challenges and the resilience of Black families in the Midwest, fostering a deep appreciation for education, mutual support, and civic responsibility.
