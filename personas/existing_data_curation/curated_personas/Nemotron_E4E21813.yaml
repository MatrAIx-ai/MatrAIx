  hobbies: '["Basketball", "Coding (Scratch, Python)", "LEGO Technic building", "Model kit assembly", "Reading non-fiction biographies", "Following Cleveland Browns", "Listening to hip-hop and R&B", "Volunteering
    at community center"]'
  career_goals: Marcus dreams of a career that merges his practical mindset with a desire to serve his community. He plans to complete high school, earn his GED if needed, and attend a community college
    program in civil engineering technology or construction management. His long-term ambition is to become a civil engineer who designs safe, accessible infrastructure such as parks, bridges, and public
    transit, enhancing the quality of life in Cleveland's neighborhoods. He is also interested in public safety roles, like becoming a police officer or firefighter, because they offer structured training
    and direct community impact, but his primary focus remains on engineering.
