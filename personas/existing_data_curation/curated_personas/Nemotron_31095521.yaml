personas:
  professional: Ashunti Brown is a budding problem‑solver who treats playtime like a mini‑career, applying the spatial planning skills of LEGO building, puzzle completion, and geometric coloring to imagine
    future roles in engineering or architecture, and their methodical, organized nature ensures they finish every project with precision.
  sports: Ashunti Brown delights in weekly dance class at the Little Stars Dance Club, cheers on the local youth soccer team while eagerly following the professional matches of FC Barcelona, enjoys ice
    skating at the community rink in winter, and splashes in the neighborhood pool during summer.
  arts: Ashunti Brown loves reading rhythmic picture books by Mo Willems, drawing precise geometric shapes while humming tunes from The Wiggles and Disney's Frozen, and they regularly visit the local children's
    museum to engage with interactive art installations.
  travel: Ashunti Brown dreams of a family road trip to the Grand Canyon after already enjoying a weekend visit to the nearby aquarium and a short ferry ride to a coastal beach, preferring carefully planned
    itineraries with plenty of quiet breaks for reading.
  culinary: Ashunti Brown helps prepare simple meals by measuring flour, sugar, and butter with a level teaspoon, often championing the creation of homemade macaroni and cheese, while they have a secret
    stash of chocolate chip cookies they sneak when no one watches.
  core: Ashunti Brown is a methodical, structured seven‑year‑old who balances a love for orderly creative pursuits with a quiet, cooperative spirit and a few quirky habits like compulsively sorting LEGO
    bricks by color.
background:
  cultural: Ashunti is raised in a close‑knit African‑American family in Fort Worth, Texas. Family gatherings often feature soul‑food dishes like collard greens and cornbread, and celebrations include Juneteenth
    and Kwanzaa, where stories of Black history are shared. She attends a local community center that offers after‑school programs emphasizing STEM and arts, reflecting the city’s commitment to cultural
    enrichment. Her parents encourage reading books by Black authors and participating in neighborhood events such as church picnics and library story hours, instilling pride in her heritage while also
    embracing the broader Texan community.
