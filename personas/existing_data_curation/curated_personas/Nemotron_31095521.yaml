  career_goals: Ashunti dreams of becoming a teacher because she likes the idea of a structured classroom where she can share knowledge and help other children learn. She also imagines herself as a librarian,
    keeping books in order and assisting kids to find the right stories. Her practical nature makes her think about jobs that involve clear steps and predictable outcomes.
