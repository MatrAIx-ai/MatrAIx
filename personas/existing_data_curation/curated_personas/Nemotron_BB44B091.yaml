  career_goals: Approaching retirement, Mia aims to solidify her legacy at the warehouse by mentoring newer employees and documenting best‑practice procedures. She hopes to obtain a certification in supply‑chain
    management to enhance her credibility and possibly transition into a part‑time consultant role for small local businesses. Additionally, she envisions using her organizational skills to help her community
    pantry streamline its inventory system, blending her professional expertise with personal values of service.
