personas:
  professional: Katherine Felmet, an aspiring junior architect and robotics enthusiast, channels her meticulous planning and imaginative flair into designing LEGO skyscrapers and coding simple line‑following
    robots, while her competitive streak drives her to perfect every detail.
  sports: Katherine Felmet, a budding soccer player for the local South Bay Troopers U‑9 league, cheers fervently for the Los Angeles Dodgers and Los Angeles Lakers, and squeezes in weekly gymnastics classes
    to stay agile, though they often prioritize chess practice over after‑school sports.
  arts: Katherine Felmet, a devoted member of the school art club, dives into sketching fantastical creatures inspired by Studio Ghibli and Alex Ross, spends weekends at the Getty Center absorbing impressionist
    works, and collects limited‑edition Harry Potter graphic novels, channeling that visual energy into elaborate LEGO dioramas.
  travel: Katherine Felmet, who loves planning neighborhood scavenger hunts, dreams of exploring the bustling streets of Tokyo and the historic missions of Santa Barbara, but most often embarks on family
    road trips to Disneyland and the San Diego Zoo, favoring carefully mapped itineraries over spontaneous wanderings.
  culinary: Katherine Felmet, an enthusiastic junior chef, whips up pepperoni pizza with extra mozzarella, experiments with avocado sushi rolls, and bakes chocolate chip cookies topped with sea salt, yet
    often forgets to clean the kitchen counter in the excitement of tasting their creations.
  core: Katherine Felmet, a nine‑year‑old imagination engine, balances meticulous LEGO engineering with fierce chess competition, while their worry‑prone heart fuels both relentless planning and occasional
    stress‑induced meltdowns.
background:
  cultural: Katherine grows up in a middle‑class white family in Temple City, California, a suburb known for its multicultural environment. Her household celebrates typical American holidays such as Thanksgiving,
    Fourth of July, and Christmas, while also participating in community events that reflect the city’s diverse Asian influences, like Lunar New Year festivals. The family values education, creativity,
    and active involvement in extracurricular activities, encouraging Katherine to explore both artistic pursuits and structured, goal‑driven projects.
