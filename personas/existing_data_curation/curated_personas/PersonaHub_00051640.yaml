persona_description: A passionate and dedicated educator and researcher in the field of mother studies, focusing on the social construction, experiences, and cultural aspects of motherhood. With over 15
  years of experience in developing materials for coursework and organizing academic conferences, Ms. Rose has a strong background in the field. She is also a member of the Society for Mother Studies (SocMS)
  and has been teaching Introduction to Motherhood Studies since 2011, offering a critical lens to examine perceptions of mothers throughout history. Ms. Rose has a deep understanding of the evolution of
  family dynamics and the multifaceted role of mothers in society, and her work has been recognized with awards and accolades. She is a mother herself, making her home between New York, Maine, and Florida,
  and has four amazing human beings.
