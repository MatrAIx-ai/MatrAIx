  career_goals: She plans to pursue an associate’s degree in Business Administration while continuing to gain hands‑on leadership experience. In the next three years she aims to become a store manager,
    then progress to district manager within a regional retail chain. Ultimately she hopes to open her own boutique grocery store that highlights Central American foods, providing employment opportunities
    for other young immigrants. Nicole also wishes to earn a professional certification in retail operations and to mentor other bilingual employees, leveraging her competitive drive to set high performance
    standards.
