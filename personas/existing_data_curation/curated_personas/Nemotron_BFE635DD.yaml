personas:
  professional: Nicole Cervantes is an 18‑year‑old shift manager at a local grocery store who uses bilingual communication and Excel analytics to streamline staff schedules and inventory, blending a practical,
    data‑focused approach with a curiosity for emerging retail tech, while their competitive nature drives them to set and exceed high performance benchmarks.
  sports: Nicole Cervantes maintains fitness by running along the Buffalo waterfront at sunrise and practicing yoga three times weekly to alleviate stress, while they enthusiastically support the Buffalo
    Bills and follow the New York Knicks, though their reserved nature keeps them away from organized team sports.
  arts: Nicole Cervantes expresses creativity through digital photography of urban street scenes, immerses themselves in contemporary novels and business self‑help books by authors such as Malcolm Gladwell
    and Isabel Allende, and relaxes to punta and reggaetón playlists featuring artists like Willimsson and J. Balvin, preferring solitary artistic pursuits over crowded venues.
  travel: Nicole Cervantes dreams of exploring the coastal towns of Central America to connect with family culinary roots, yet budget limits steer them toward affordable weekend road trips to Niagara Falls
    and the Finger Lakes, meticulously planning itineraries on spreadsheets while worrying about missing work shifts.
  culinary: Nicole Cervantes delights in preparing traditional dishes such as baleadas, sopa de caracol, and tamales for family gatherings, skillfully balancing spice and flavor with locally sourced corn
    tortillas, though stress sometimes leads them to over‑salt meals and rely on late‑night instant noodles as a quick, albeit less healthy, fix.
  core: Nicole Cervantes is an ambitious, bilingual retail manager whose competitive drive fuels data‑driven improvements, while anxiety and a penchant for perfectionism push them toward early runs, yoga,
    and cooking comforting family meals as personal sanctuaries.
background:
  cultural: Nicole was born to Honduran immigrant parents who settled in Buffalo’s East Side. She grew up speaking Spanish at home and English at school, navigating a bicultural identity that blends Central
    American traditions with Midwestern American life. Family celebrations often feature Honduran foods like tamales and horchata, and holidays such as Semana Santa are observed with community masses at
    the local Catholic church. In Buffalo, she participates in the annual Honduran Festival and volunteers with a nonprofit that assists recent immigrants with employment resources. Her cultural background
    informs her strong sense of family responsibility, her bilingual communication skills, and her desire to create opportunities for other members of the Hispanic community.
