  hobbies: '["Chess", "Puzzle Solving", "Reading Business Non‑Fiction", "Morning Jogging", "Cooking Southern Comfort Food", "Collecting Vintage Jazz and R&B Vinyl", "Small‑Group Men’s Fellowship", "Mentoring
    in African‑American Business Network"]'
  career_goals: John aims to advance to a Director of Sales role within the next three to five years, overseeing a multi‑state regional sales organization. He seeks to design a high‑performing, analytics‑centered
    sales team that consistently outperforms revenue targets while maintaining structured, predictable processes. Long‑term, he envisions launching his own sales consultancy focused on helping small and
    mid‑size businesses in the Southeast implement disciplined sales methodologies. Throughout his career progression, John balances his ambition for senior leadership and personal impact with a commitment
    to work‑life balance for his family.
