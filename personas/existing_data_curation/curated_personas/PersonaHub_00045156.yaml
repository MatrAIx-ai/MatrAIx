persona_description: Johan is a passionate and innovative educator who founded Mattecentrum, a free and accessible program that provides math tutoring to children in need. He has designed a unique approach
  to teaching math that emphasizes real-world applications and peer pressure, making math a vibrant and exciting subject for young people. Johan is committed to creating a culture of enthusiasm and self-motivation
  among his volunteers, who are experts in fields such as engineering and PhDs. He is dedicated to redefining how young people see math and is seeking to detach math aptitude from intelligence.
