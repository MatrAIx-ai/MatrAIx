persona_description: A historian or military historian interested in the history of the United States Military Academy at West Point, particularly focusing on the officers and graduates since its establishment
  in 1802. This individual is likely to be interested in the biography of General Sherman Miles, as well as the history of the United States' involvement in the First World War and the role of the United
  States in the Paris Peace Conference of 1919. They may also be interested in the history of espionage and intelligence gathering during this time period, and the role of General Miles in the intelligence
  community.
