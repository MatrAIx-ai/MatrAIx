personas:
  professional: Paola Mercado, a 57‑year‑old community program coordinator in Bonita Springs, leverages their bilingual fluency, horticultural know‑how, and hands‑on problem‑solving to design and lead a
    senior‑focused cultural exchange garden, while navigating a spontaneous, loosely structured workflow that sometimes challenges deadline adherence.
  sports: Paola Mercado enjoys sunrise beach walks, gentle yoga, and casual beach‑volleyball matches with the Bonita Springs Senior Fitness Club; they follow the Miami Dolphins and Orlando Magic for NFL
    and NBA excitement, and they occasionally join a local kayaking group for seasonal water‑paddle outings.
  arts: Paola Mercado captures Florida sunsets through photography, knits scarves inspired by the vibrant colors of Frida Kahlo’s paintings, sways to the salsa rhythms of Celia Cruz at small community dance
    gatherings, and they find solace in the historical novels of Isabel Allende and the classic films of Alfred Hitchcock.
  travel: Paola Mercado has explored the Galápagos Islands, strolled through Cartagena’s historic district, and taken weekend getaways to the Florida Keys, while dreaming of trekking Patagonia’s glaciers
    and visiting the tea plantations of Darjeeling; they prefer relaxed itineraries that allow ample time for birdwatching and sketching coastal vistas.
  culinary: Paola Mercado expertly prepares traditional ceviche, seco de chivo, and hand‑folded empanadas, while infusing Florida grouper and stone crab into fusion dishes seasoned with ají, cilantro, lime,
    and sweet plantains; their kitchen skill level is seasoned, though they sometimes let a simmering sauce scorch when juggling a knitting project.
  core: Paola Mercado blends a curiosity‑driven love of tropical gardening with a spontaneous talent for turning modest kitchen experiments into community‑wide flavors, and they never miss a sunrise on
    the beach—though their yarn stash often spills onto the patio.
background:
  cultural: Paola was born in Ecuador, likely in a coastal province such as Guayas, and migrated to the United States over thirty years ago. She grew up in a household where Spanish was the primary language
    and where family gatherings featured traditional music, dance, and cuisine. The values of respect for elders, strong familial bonds, and Catholic traditions remain central to her identity. In Bonita
    Springs, she preserves her heritage by cooking authentic Ecuadorian dishes, celebrating holidays like Día de los Difuntos and Carnival, and participating in the local Hispanic cultural association.
    She maintains close ties with her extended family in Ecuador through regular video calls, sending homemade foods, and sharing stories of her life in Florida. Her bicultural experience shapes her worldview,
    blending Andean hospitality with the laid‑back Floridian lifestyle.
