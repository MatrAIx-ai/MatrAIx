  career_goals: Con aims to progress from his current retail associate role to store manager within the next two years, leveraging his organizational skills and practical curiosity to improve store efficiency
    and customer experience. He plans to enroll in a bachelor’s program in Business Administration to deepen his strategic understanding of retail management. Long‑term, Con envisions becoming a district
    manager overseeing multiple locations, and eventually launching his own boutique that blends contemporary design with East‑Asian cultural aesthetics. He also hopes to integrate e‑commerce solutions
    into brick‑and‑mortar operations, staying ahead of industry trends while maintaining a people‑focused approach.
