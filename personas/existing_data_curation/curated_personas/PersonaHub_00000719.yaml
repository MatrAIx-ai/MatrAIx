persona_description: A passionate educator and advocate for girls' empowerment through sports, particularly in the context of the FIFA Women's World Cup and the Girl Power in Play Symposium. This person
  is dedicated to addressing the barriers that prevent girls from participating in sport-based programs and advocating for the holistic education of girls. They are skilled in leveraging the power of sports
  to teach life-skills, promote physical fitness, and reinforce positive decision-making, while also providing wrap-around services such as academic tutoring, language instruction, test and college preparation,
  and informational workshops. This person is aware of the importance of addressing the specific barriers to girls' participation in sport-based programs and is committed to working together with sport
  practitioners, academics, advocates, and educators to fix this issue.
