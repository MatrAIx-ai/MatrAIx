personas:
  professional: Marissa Green is a 23‑year‑old journeyman electrician known for meticulous NEC compliance, a growing expertise in solar photovoltaic installations and PLC automation, and a competitive drive
    that pushes her to mentor apprentices while aiming for a Master Electrician license within five years.
  sports: Marissa Green hikes regional state parks on weekends, participates in a local bouldering club, follows the Chicago Cubs and Indianapolis Colts for a mix of baseball and football excitement, and
    follows a disciplined strength‑training routine that balances cardio trail runs with circuit‑style weightlifting.
  arts: Marissa Green unwinds by listening to the ambient electronic sounds of Tycho, admiring Ansel Adams’ landscape photography, streaming indie documentaries on sustainable architecture, and occasionally
    sketching sunrise vistas with charcoal pencils.
  travel: Marissa Green prefers meticulously planned road trips to renewable‑energy showcase sites like the Solar Energy Research Institute in Colorado, yet dreams of backpacking through the Norwegian fjords
    to study offshore wind farms, balancing a tight budget with a thirst for hands‑on learning experiences.
  culinary: Marissa Green favors functional meals that fuel her active lifestyle, regularly cooking quinoa power bowls with roasted sweet potatoes, kale, and avocado, perfecting a spicy chickpea curry with
    cumin, coriander, and fresh ginger, but often skips meal‑prep during busy weeks, resorting to instant ramen.
  core: Marissa Green blends relentless curiosity for tech with a grounded practicality, tackles solar projects by day, masters chess strategies by night, and never misses a chance to tinker with an Arduino,
    even if it costs a night out with friends.
background:
  cultural: Marissa grew up in O'Fallon, Missouri, a suburban community in St. Charles County with a strong Midwestern work ethic. Her family traces roots to German and Irish immigrants, and she was raised
    with values emphasizing practicality, self‑reliance, and community responsibility. The local culture, characterized by modesty, punctuality, and a respect for established methods, meshes with her balanced
    curiosity and preference for reliable, proven approaches. While she respects traditional norms, she also embraces emerging technologies and sustainable practices, reflecting the region's gradual shift
    toward renewable energy and modern trade skills.
attributes:
  skills: '["Residential wiring","Commercial conduit installation","Blueprint & schematic interpretation","NEC compliance and safety inspections","Troubleshooting and diagnostics","Solar photovoltaic system
