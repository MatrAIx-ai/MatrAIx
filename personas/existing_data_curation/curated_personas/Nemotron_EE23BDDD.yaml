  hobbies: '["DIY electronics projects","Hiking and landscape photography","Competitive chess","Reading technical journals","Home‑improvement projects","Volunteering with Habitat for Humanity","Arduino
    programming","Gardening in a small backyard"]'
  career_goals: Marissa aims to earn her Master Electrician license within the next three to five years and obtain specialized certification in renewable energy installations, positioning herself to lead
    large‑scale solar projects in the Midwest. She aspires to become a foreman on commercial construction sites, leveraging her blend of technical expertise and competitive drive to manage crews efficiently.
    Long‑term, she envisions launching her own electrical contracting firm that focuses on sustainable building practices, while also serving as a mentor for women entering the trades.
