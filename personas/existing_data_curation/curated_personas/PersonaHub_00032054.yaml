persona_description: A scholar of literature and cultural studies, with a particular interest in the intersection of literary and statistical discourses. Proficient in the use of statistical methods and
  data analysis, they have a deep understanding of the ways in which mass print culture and the rise of information and media impacted literary practices and aesthetics. They are particularly interested
  in the ways in which aesthetics in an age of information and mass media can be both threatened and inspired by the accounting of literature, and how this can be seen in the case study of Robert Louis
  Stevenson’s Treasure Island and Steven Spielberg’s Raiders of the Lost Ark. They have a strong background in nineteenth-century American and British literature, and have a passion for interdisciplinary
  research and teaching.
