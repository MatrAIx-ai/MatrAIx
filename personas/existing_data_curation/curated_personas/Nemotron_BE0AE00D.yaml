personas:
  professional: Janet Perry, a lifelong community volunteer and seasoned home economist, leverages her practical household management and gardening expertise to lead senior‑center workshops, reflecting
    her structured yet flexible approach to service.
  sports: Janet Perry, an avid supporter of the Los Angeles Dodgers and the Anaheim Ducks, joins the Garden Grove senior softball league in spring, enjoys gentle morning walks in the local park, and participates
    in weekly low‑impact chair yoga classes at the senior center to stay active.
  arts: Janet Perry, who delights in the swing era of Benny Goodman and the classic films of Cary Grant, regularly attends community choir rehearsals, participates in a knitting circle that crafts blankets
    inspired by 1950s patterns, and enjoys occasional matinee performances at the nearby Segerstrom Center for the Arts.
  travel: Janet Perry, who prefers relaxed road trips with her grandchildren, fondly recalls a family visit to the Grand Canyon in 1995, dreams of exploring the historic streets of Savannah, Georgia, and
    enjoys short weekend outings to nearby Santa Monica for the beach and boardwalk.
  culinary: Janet Perry, a master of classic American comfort cooking, excels at baking apple pie with a flaky crust, preparing homemade meatloaf seasoned with sage, and often garnishes dishes with fresh
    basil from her garden, while delighting in potluck gatherings where she shares her signature chocolate chip cookies.
  core: Janet Perry blends steadfast routine with spontaneous kindness, tending her garden, leading community crafts, and cherishing family stories, all while occasionally forgetting appointments but never
    missing a Sunday choir.
background:
  cultural: 'Janet was born in 1940 and grew up in a mid‑century suburban white American household in Southern California. Her upbringing was shaped by the values of the post‑World War II era: hard work,
    family cohesion, community involvement, and a belief in the American Dream. Raised in a predominantly Protestant (or Catholic) family, she participated in church activities, holiday traditions, and
    community picnics that emphasized modesty, respect, and neighborly support. The cultural milieu of the 1950s—television sitcoms, classic rock ’n’ roll, and the rise of the suburban lifestyle—left lasting
    impressions on her tastes in music, food, and leisure. While she now lives in the diverse tapestry of Garden Grove, Orange County, she retains the cultural touchstones of her youth, such as classic
    American cuisine, holiday customs, and a reverence for community service, blending them with the multicultural flavors of her current neighborhood.'
