  career_goals: At 85, Janet’s primary ambition is to maintain her health, independence, and vibrant connection with family and community. She aims to stay active in the senior center by leading a seasonal
    gardening workshop and a weekly knitting group, sharing her practical knowledge with peers. Janet also wishes to deepen her digital literacy by learning more about social media platforms and creating
    a simple online collection of family recipes and stories for her grandchildren. Another goal is to document her personal history—capturing memories of growing up in post‑war America—in a brief memoir
    that can be passed down as a family legacy.
