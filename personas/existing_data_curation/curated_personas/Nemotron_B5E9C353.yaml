personas:
  professional: Rebecca Hawkins, a budding naturalist with a love for Lego engineering, spends weekends sketching insects and constructing detailed habitats, channeling their curiosity and practicality
    into early scientific exploration.
  sports: Rebecca Hawkins enjoys the excitement of watching the local Little League baseball team, follows the Seattle Seahawks on TV, participates in the neighborhood junior gymnastics club, and spends
    afternoons climbing, hopping, and exploring the park's playground equipment with friends, often encouraging them to try new swings while they cheer on their teammates.
  arts: Rebecca Hawkins delights in drawing forest animals, singing along to The Wiggles and Raffi's gentle melodies, replaying episodes of Sesame Street for the catchy alphabet songs, and mimicking the
    brush strokes of artist Eric Carle in their own crayons, letting these creative influences shape their quiet playtime.
  travel: Rebecca Hawkins has explored the nearby county park's butterfly garden, marveled at the giant sea turtles at the local aquarium, spent a memorable family weekend at the national zoo in Washington
    D.C., and now daydreams about soaring over the Great Barrier Reef on a future holiday, always preferring short trips with their parents and a small group of cousins.
  culinary: Rebecca Hawkins loves the buttery crunch of peanut butter and jelly sandwiches, the cheesy comfort of homemade mac and cheese, and the bright sweetness of apple slices sprinkled with cinnamon,
    often helping mom mix orange segments into a fruit salad or carefully arranging tiny carrot sticks like tiny soldiers on their plate.
  core: Rebecca Hawkins is a curious, nature-obsessed six-year-old who builds elaborate Lego ecosystems, insists on adding a drawn leaf to every picture, flits between intense focus and sudden disorganization,
    and can be found whispering secrets to their doll while occasionally leaving their crayons scattered across the living room.
background:
  cultural: Rebecca is raised in a white, middle‑class family in the suburban community of Frisco, Texas. Her upbringing blends the friendly, community‑oriented values common in North Texas with the broader
    American cultural traditions she experiences at school and through family celebrations of holidays like Thanksgiving, Christmas, and the Fourth of July. She attends a local elementary school and participates
    in community programs such as library story‑time and a kids’ soccer league. The family’s cultural environment emphasizes kindness, cooperation, and respect for diversity, encouraging Rebecca’s reserved
    yet considerate nature.
