  career_goals: Although only six, Rebecca enjoys imagining future roles that combine caring for others and exploring the world. She often says she wants to be a teacher who helps children learn, a veterinarian
    who cares for animals, or an astronaut who discovers new places. Her practical side leads her to envision jobs where she can apply hands‑on skills, such as a kindergarten aide or a junior scientist
    in a nature program. She aspires to grow her curiosity into expertise while staying kind and helpful to those around her.
