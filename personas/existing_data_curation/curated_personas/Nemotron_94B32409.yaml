  hobbies: '[''salsa dancing'', ''softball league'', ''volunteering at food pantry'', ''cooking Venezuelan cuisine'', ''hosting potluck gatherings'', ''Zumba fitness classes'', ''trail running'', ''reading
    industry magazines'', ''watching manufacturing documentaries'', ''DIY home improvement projects'']'
  career_goals: Sarah aims to translate her on-the-floor expertise into leadership. Over the next three to five years she plans to complete an associate’s degree in Industrial Technology and earn a Six
    Sigma Green Belt, positioning herself for a shift-lead or production-supervisor role at her current plant. She is eager to lead a team, leveraging her strong organizational skills and collaborative
    style to drive efficiency and safety improvements. Ultimately, Sarah envisions becoming a process-improvement specialist, where she can combine her curiosity for new manufacturing methods with practical
    problem-solving. She also hopes to mentor new employees, especially those from diverse backgrounds, and to secure a stable income that will allow her to purchase a home in the Cordova area.
