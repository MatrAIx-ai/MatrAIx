personas:
  professional: Sarah Tejero applies her hands‑on production‑line expertise and keen eye for lean processes to lead shift teams, coaching new hires while constantly fine‑tuning equipment performance with
    data‑driven insights, and they consistently model safety standards for the crew.
  sports: Sarah Tejero combines weekend co‑ed softball league battles with lively Zumba sessions, trails through nearby state parks for runs, and ardently supports the Birmingham Barons while cheering on
    the Alabama Crimson Tide during football season, and they view each game as a chance to unwind after a shift.
  arts: Sarah Tejero expresses cultural pride on the dance floor by mixing salsa steps to the rhythms of Celia Cruz and Marc Anthony, while also attending local theater productions like "Chicago" and curating
    playlists that blend classic Latin pop with modern indie hits, and they often host post‑dance gatherings to share new music discoveries.
  travel: Sarah Tejero fuels wanderlust with annual trips to the historic streets of Cartagena and a yearly weekend escape to the Great Smoky Mountains, yet they balance adventure with a modest travel budget,
    often using points from a travel credit card to stretch each journey, and they keep a travel journal to track lessons learned.
  culinary: Sarah Tejero showcases culinary skill by hand‑rolling arepas with cornmeal, stuffing them with shredded beef, black beans, and plantains for a pabellón‑style feast, while whipping up sweet cachapas
    using fresh corn, queso fresco, and a drizzle of caramelized sugar for friends, and they love to teach newcomers the art of perfect dough hydration.
  core: Sarah Tejero melds a meticulous, data‑driven work ethic with a vibrant social life, turning factory floors into classrooms, salsa nights into cultural showcases, and spare evenings into DIY home
    projects—often fueled by a love of spicy arepas and a habit of double‑checking inventory logs, and they never miss a chance to laugh at their own jokes during break time.
background:
  cultural: Sarah is a first-generation Venezuelan-American, born to parents who emigrated during the country’s economic crisis. She grew up speaking Spanish at home and English at school, making her fully
    bilingual and comfortable navigating both cultures. Family gatherings are centered around music, dance, and food, fostering a deep appreciation for Venezuelan traditions such as celebrating Independence
    Day with music and arepa feasts. While she has embraced life in Cordova, Tennessee—participating in local festivals and community events—she also maintains strong ties to the Venezuelan diaspora, attending
    cultural celebrations at the local Hispanic community center. Sarah’s heritage instills values of resilience, hospitality, and communal support, which she brings to her workplace and volunteer activities.
attributes:
  skills: '[''machine operation'', ''equipment troubleshooting'', ''quality inspection'', ''safety compliance (OSHA)'', ''forklift certification'', ''inventory management (ERP)'', ''process improvement
