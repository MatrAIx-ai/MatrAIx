personas:
  professional: Marquisha Gatt, a 16-year-old aspiring community program director and UX designer, combines her knack for meticulous scheduling, cheerleading leadership, and Scratch-based prototyping of
    simple robotics to craft user-friendly digital experiences for underserved students, reflecting her practical curiosity and competitive edge.
  sports: Marquisha Gatt, a 16-year-old cheerleader and basketball enthusiast, balances daily practice with weekend games for her community-center basketball league, follows the Alabama Crimson Tide football
    and the Montgomery Biscuits baseball seasons, and pushes her fitness by early-morning jogs and competitive drills, reflecting her energetic, competitive nature.
  arts: Marquisha Gatt, a 16-year-old TikTok creator, fuses hip-hop moves inspired by Beyonce and Lizzo with science-experiment visuals while referencing Angie Thomas’s YA novels and the StarTalk podcast
    in her captions, letting her dynamic personality shape a vibrant artistic identity.
  travel: Marquisha Gatt, a 16-year-old whose travel style mixes budget-friendly family road trips to Savannah and New Orleans with school-organized excursions to Washington, D.C., dreams of exploring Tokyo’s
    pop-culture hotspots, yet balances her wanderlust against a modest allowance and academic commitments.
  culinary: Marquisha Gatt, a 16-year-old kitchen collaborator, helps perfect collard greens seasoned with smoked paprika and a caramel-sweet sweet-potato pie scented with nutmeg while also experimenting
    with spicy chicken-and-waffle fusions and mastering basic knife skills for DIY cheer-squad apparel, embodying her love of Southern tradition and creative curiosity.
  core: Marquisha Gatt, a 16-year-old competitive cheerleader-engineer hybrid, turns every school project into a meticulously scheduled performance while juggling anxiety, TikTok fame, and a relentless
    drive to uplift her community.
background:
  cultural: Growing up in Montgomery, Alabama, Marquisha is deeply connected to the city's rich civil‑rights legacy and her family's Black Southern heritage. Family gatherings emphasize storytelling, respect
    for elders, and communal meals featuring Southern comfort foods. The church plays a central role in her life, influencing her love for gospel music, community service, and collective celebration of
    milestones like Juneteenth. Her cultural identity is shaped by the resilience and pride of the local African‑American community, inspiring her to honor leaders like Rosa Parks and Martin Luther King
    Jr. through her drive to advocate for social justice and empower other youth. The blend of Southern hospitality and a strong sense of community informs her outgoing nature, while her awareness of historic
    challenges fuels her competitive spirit and ambition to create a better future for herself and her neighborhood.
