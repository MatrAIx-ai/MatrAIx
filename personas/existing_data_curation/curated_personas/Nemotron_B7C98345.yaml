  career_goals: Marquisha aims to finish her high school education—either by completing the 9th grade or earning a GED—within the next two years, securing a scholarship to study at a state university. She
    envisions a career that blends her organizational talent, tech curiosity, and desire to uplift her community, such as becoming a community program director, a STEM educator for underserved youth, or
    a user‑experience designer focused on accessible digital tools. Driven by competition, she sets clear milestones for herself and seeks leadership roles that allow her to create tangible positive change
    in Montgomery.
