  career_goals: Even in retirement, Carlos aspires to leave a lasting legacy for his family and community. He plans to write and illustrate a memoir that chronicles his migration story and preserves cherished
    Mexican recipes for his grandchildren. He wishes to establish a small community garden where he can mentor neighbors in sustainable gardening practices. Carlos hopes to volunteer as a docent at the
    local museum, sharing his knowledge of regional history and organizing occasional showcases of Mexican folk art. He also aims to learn digital photography to document his garden and the surrounding
    landscape.
