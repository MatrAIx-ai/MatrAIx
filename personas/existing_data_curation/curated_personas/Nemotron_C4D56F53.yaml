personas:
  professional: Carlos Gomez, a retired high‑desert farmer and community storyteller, leverages decades of woodworking, heirloom gardening, and oral‑history expertise to mentor neighbors and organize local
    history talks, even as their relaxed, slightly disorganized nature leads to spontaneous, unplanned workshops.
  sports: Carlos Gomez enjoys low‑impact fitness like early‑morning walks along the Snake River, participates in the Malheur County Senior Walking Club, follows the Portland Trail Blazers and the Oregon
    Ducks, and occasionally joins a local senior softball league during spring.
  arts: Carlos Gomez paints watercolor desert scenes, collects and restores vintage tin folk figures, and finds inspiration in the emotive songs of Lila Downs and the bold murals of Diego Rivera that accompany
    their evenings of listening to classic folk music from their homeland.
  travel: Carlos Gomez prefers intimate road trips to nearby historic towns such as Boise and Santa Fe, dreams of exploring the ancient ruins of Machu Picchu, and plans a modest pilgrimage to the vineyards
    of the Willamette Valley to combine scenery with culinary inspiration.
  culinary: Carlos Gomez expertly prepares traditional corn‑based dishes like tamales and pozole, infusing them with Oregon herbs such as sage and hazelnuts, while regularly experimenting with fusion creations
    that pair smoked salmon with chipotle‑marinated vegetables.
  core: Carlos Gomez is a curious, solitary gardener‑artist who balances meticulous craft with a relaxed, sometimes forgetful approach to obligations, sprinkling daily life with storytelling, vintage art
    restoration, and a stubborn competitive streak.
background:
  cultural: Carlos was born in Mexico and moved to the United States as a young adult, settling in rural Oregon. He retains a strong Mexican cultural identity, celebrating Dia de los Muertos, Semana Santa,
    and other traditional holidays with his family. Spanish remains the language of his home, though he is also fluent in English. His cuisine reflects deep roots in Mexican culinary traditions, often preparing
    dishes like mole, tamales, and pozole with local ingredients. Living in Malheur County, he blends Mexican customs with the rhythms of a high‑desert, small‑town community, fostering a unique cross‑cultural
    perspective that colors his art appreciation, storytelling, and community involvement.
