personas:
  professional: Polly Hutto, a veteran senior‑center volunteer, leverages their practical, hands‑on skills in cooking, craft instruction, and empathetic listening to coordinate small events, while their
    love of routine keeps the schedule tidy even as they occasionally let paperwork slip.
  sports: Polly Hutto, a dedicated walker, joins the Prospect Park Seniors Walking Club, follows the New York Knicks and Brooklyn Nets for seasonal excitement, and incorporates gentle stretching after walks
    to ease joint stiffness, while avoiding high‑impact sports.
  arts: Polly Hutto, an avid listener of classical piano works by Debussy and Brahms, knits while watching Ken Burns documentaries and reads Agatha Christie mysteries, and admires the theater performances
    of Judi Dench and the paintings of Monet, letting these influences shape their creative projects.
  travel: Polly Hutto, a methodical traveler, prefers organized, low‑stress trips such as a week‑long heritage tour of New England’s colonial towns and a summer visit to Provence’s lavender fields for herb
    inspiration, always planning itineraries in advance and budgeting carefully, while limiting travel to a few trips a year due to health and financial considerations.
  culinary: Polly Hutto, a skilled home cook, delights in simmering chicken pot pie with fresh thyme and rosemary, canning heirloom tomatoes, and crafting herb‑infused olive oil, favoring classic comfort
    foods while experimenting with regional spice blends, though they sometimes over‑season soups in pursuit of flavor.
  core: Polly Hutto is a solitary, structure‑loving senior who weaves herbs, yarn, and legacy into a quiet, purposeful life, balancing practicality with occasional indulgent quirks.
background:
  cultural: Polly grew up in a working-class Irish-American family in Bushwick, Brooklyn, during the post-war era. Her parents emphasized self-reliance, modesty, and the importance of home-cooked meals,
    values that still shape her daily routines. The neighborhood’s tight-knit community and the multicultural tapestry of Brooklyn exposed her to a variety of traditions, yet she retained a strong connection
    to her own cultural heritage, celebrating holidays such as St. Patrick's Day and Christmas with familiar customs. Her cultural background instilled a practical outlook, a love for storytelling, and
    a sense of responsibility to help neighbors, which is reflected in her volunteer work.
