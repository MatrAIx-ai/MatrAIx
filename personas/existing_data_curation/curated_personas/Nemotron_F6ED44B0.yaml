  career_goals: Polly’s current goals center on maintaining a stable, independent lifestyle and deepening her contributions to her neighborhood. She aims to preserve her health through regular walks and
    balanced nutrition, and to continue volunteering at the senior center, eventually taking a mentorship role to teach younger volunteers basic caregiving and counseling skills. She wishes to document
    her family’s recipes and stories in a personal scrapbook, hoping to leave a tangible legacy for future generations. Additionally, Polly aspires to master a new knitting technique each year and to organize
    a quarterly craft circle for fellow seniors, fostering a quiet, supportive community.
