  career_goals: Kenneth aims to transition into a full‑time role that leverages his social strengths, curiosity, and practical problem‑solving abilities. Over the next two years, he hopes to secure a position
    in community outreach, event coordination, or hospitality management within Houston, while developing leadership skills to eventually supervise inclusive programs and mentor new team members. He also
    dreams of launching a small venture—such as a pop‑up workshop series or mobile coffee cart—that blends his love for local culture, DIY projects, and community engagement.
