  hobbies: '[''drawing & coloring'', ''watercolor painting'', ''LEGO building'', ''reading picture books'', ''collecting leaves & rocks'', ''crafting with natural items'', ''jigsaw puzzles'', ''memory matching
    games'', ''listening to classical music'', ''pretend play with close friends'']'
  career_goals: Although still at the beginning of her educational journey, Doris dreams of becoming an artist who can bring stories to life on canvas, perhaps one day working at a museum in Salem. She
    is also fascinated by space and invention, envisioning herself as an explorer who designs creative solutions to problems. Her competitive streak fuels a desire to excel in school activities like spelling
    bees and art contests, and she aspires to be recognized for her unique perspective and ability to think outside the box.
