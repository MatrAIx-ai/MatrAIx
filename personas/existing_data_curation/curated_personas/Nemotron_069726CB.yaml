personas:
  professional: Doris Ferrer, a budding mini-architect, constructs elaborate block cities with meticulous layout and playful twists, showcasing a curious mind, competitive streak, and a balance of order
    and imagination.
  sports: Doris Ferrer darts around the local Kids' Soccer Club, cheering for the Springfield Tigers and the Seattle Seahawks on TV, preferring solo drills over large scrimmages and often challenging peers
    to beat personal race times.
  arts: Doris Ferrer fills sketchbooks with whimsical characters inspired by Dr Seuss and Pixar, hums the tunes of Let It Go and Baby Shark, and proudly displays a print of Van Gogh's Starry Night on their
    wall, channeling curiosity and competitive perfectionism into daily drawing.
  travel: Doris Ferrer has visited Disneyland in Anaheim, the Gulf Coast beaches, and a grandparent's farm in Nebraska, and dreams of touring Neuschwanstein Castle in Germany and snorkeling the Great Barrier
    Reef, favouring well-planned itineraries over spontaneous trips.
  culinary: Doris Ferrer loves creamy macaroni and cheese with extra cheddar, dips apple slices in peanut butter, helps stir pancake batter, but stubbornly rejects broccoli, often negotiating extra dessert
    for finishing vegetables.
  core: Doris Ferrer is a fiercely curious five-year-old who balances meticulous play with imaginative leaps, worries about small setbacks, and channels a competitive edge into art, sports, and pocket-money
    management.
background:
  cultural: Doris grows up in Salem, Massachusetts, a historic New England community rich in early colonial and maritime heritage. Her family's white American roots blend traditions from New England Puritan
    values with modern American customs. She participates in local cultural experiences such as visits to the Peabody Essex Museum, community story‑time sessions at the Salem Public Library, and seasonal
    events like Salem Maritime Day and Fourth of July parades. Holiday celebrations reflect typical American customs—Thanksgiving dinner, Christmas decorations, and summer barbecues—while her family also
    cherishes storytelling about Salem’s historic past. The emphasis on education, modesty, and community responsibility in her environment shapes her outlook.
attributes:
  skills: '[''recognizing uppercase letters and simple sight-words'', ''counting to 20'', ''drawing and coloring with detail'', ''cutting with child-safe scissors'', ''assembling 30-piece puzzles'', ''building
