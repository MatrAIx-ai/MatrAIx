persona_description: A couple who is at risk of transmitting a known genetic abnormality to their children through in vitro fertilization (IVF). They are seeking to prevent heritable genetic disease and
  eliminate the dilemma of pregnancy termination following unfavorable prenatal diagnosis. They are considering preimplantation genetic diagnosis (PGD) as an alternative to current postconception diagnostic
  procedures (amniocentesis or chorionic villus sampling), which are frequently followed by the difficult decision of pregnancy termination if results are unfavorable. They are primary candidates for PGD.
