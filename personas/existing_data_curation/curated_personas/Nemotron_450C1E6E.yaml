personas:
  professional: Amy Ahearn is a meticulously organized three-year-old preschooler who arranges every block by shape and hue before building towering structures, and they treat each successful stack as a
    miniature achievement, reflecting their early drive for standards and disciplined play.
  sports: Amy Ahearn eagerly attends the Little Sprouts gymnastics class twice a week, cheers for the Chicago Cubs during family TV nights, and they practice kicking a soft soccer ball with the neighborhood
    Tiny Titans soccer group every Saturday, blending organized play with team spirit.
  arts: Amy Ahearn delights in listening to Raffi's 'Baby Beluga,' giggling with Sesame Street characters, and they spend quiet afternoons coloring pictures inspired by Van Gogh's Sunflowers reproductions
    at the local children's museum.
  travel: Amy Ahearn loved a weekend outing to the nearby zoo, a sunny day building sandcastles at Myrtle Beach, and they dream of a future family adventure to the fairy-tale castles of Disneyland Paris.
  culinary: Amy Ahearn prefers bite-size mac and cheese made with sharp cheddar, munches on fresh strawberry slices, dips carrot sticks into hummus, and they proudly stir banana-banana pancake batter with
    a wooden spoon on Sunday mornings.
  core: Amy Ahearn is a lively three-year-old who obsessively sorts toys by color, saves every spare coin, navigates doctor visits with calm confidence, and blends a love for soccer, art, and storytime
    while occasionally demanding bedtime stories before lights out.
background:
  cultural: Amy is a white child raised in Morrilton, a small town in Conway County, Arkansas. Her family reflects typical Southern values such as politeness, hospitality, and close community ties. She
    often participates in local traditions like Sunday school, church gatherings, and community events at the town’s library and park. Family meals feature Southern staples like biscuits, fried chicken,
    and sweet tea, and she enjoys hearing folk stories and songs that celebrate Arkansas’s natural heritage. The modest, close‑knit environment encourages her appreciation for sharing, harmony, and respect
    for others.
