  career_goals: Although only three, Amy loves to imagine future roles. She often pretends to be a teacher, a librarian, or an artist, showing an early fascination with sharing stories, keeping things organized,
    and creating beautiful pictures. She expresses a desire to help friends learn, keep a classroom tidy, and draw colorful artwork. These play‑time aspirations hint at future ambitions to work in education
    or a creative field where she can combine her love of art, organization, and caring for others.
