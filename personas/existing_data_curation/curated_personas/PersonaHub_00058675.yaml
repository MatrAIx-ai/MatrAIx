persona_description: A social scientist who is interested in the methods used to gain knowledge about human behavior, attitudes, and social phenomena. They are curious about how different cultures and societies
  come to know the things they accept as true and how they are influenced by tradition, authority, and empirical evidence. They are open to learning new methods and techniques for conducting research and
  are willing to question the validity of traditional knowledge and authority. They are interested in exploring the intersection of social science and culture, and are motivated by the desire to understand
  the complex and diverse social world.
