personas:
  professional: Maria Rosaberrios, an 8‑year‑old budding problem‑solver, channels a love for structured challenges into building intricate LEGO creations, mastering chess tactics against their older brother,
    and dreaming of a future as a marine‑themed adventure game designer.
  sports: Maria Rosaberrios, a member of the Seattle Wave Junior Swim Club who follows a strict weekly lap schedule, participates in a seasonal kids’ soccer league each fall, and avidly follows the Seattle
    Mariners, tallying home runs in a notebook, embodies a structured yet competitive approach to fitness.
  arts: Maria Rosaberrios delights in sketching tide‑pool creatures, composes simple recorder melodies inspired by the whimsical score of Disney’s The Little Mermaid, admires Pixar short films and Winslow
    Homer’s seascapes, and re‑watches the adventure series Spy Kids for its mystery vibes.
  travel: Maria Rosaberrios enjoys spontaneous weekend trips to nearby tide‑pooled beaches such as Monterey Bay, where they collect shells and sketch marine life, and dreams of a guided snorkeling adventure
    on the Great Barrier Reef, preferring low‑key family travel over tightly packed itineraries.
  culinary: Maria Rosaberrios favors simple, seawater‑inspired meals such as fish‑shaped crackers, macaroni and cheese with a pinch of sea salt, and proudly prepares a weekly “shell‑themed” fruit salad
    using strawberries, kiwi, and coconut flakes, though they often leave a trail of crumbs around their LEGO workspace.
  core: Maria Rosaberrios, an 8‑year‑old marine‑obsessed puzzle master, quietly dominates chess matches with their brother, thrives on solitary structured play, and has a quirky habit of misplacing LEGO
    bricks in the sand‑filled corners of their room.
background:
  cultural: Maria was born and raised in Patillas, a coastal municipality in the south of Puerto Rico often called 'La Perla del Sur.' Her family primarily speaks Spanish at home, and at school she receives
    instruction in both Spanish and English. She participates in community celebrations such as the annual patron saint festival, where traditional music like plena and bomba are performed and local dishes
    such as arroz con gandules, alcapurrias, and pinchos are enjoyed. Growing up near the sea and the nearby rainforest, she has developed a deep appreciation for the island’s natural environment. Her cultural
    heritage blends Spanish, African, and indigenous Taino influences, reflected in family stories, food, and the value placed on close intergenerational ties.
attributes:
  skills: '[''Reading fluency (Spanish)'', ''Basic English comprehension'', ''Elementary arithmetic'', ''Puzzle solving'', ''Digital literacy (tablet, Scratch Jr.)'', ''Observational drawing of nature'',
    ''Recorder playing'', ''Strategic game playing (chess)'']'
  hobbies: '[''Reading adventure and mystery books'', ''Building LEGO sets'', ''Solving jigsaw puzzles'', ''Collecting seashells'', ''Sketching nature'', ''Playing recorder'', ''Creating Scratch Jr. animations'',
    ''Playing chess'']'
  career_goals: Maria dreams of becoming a marine biologist who studies and protects the coral reefs and coastal waters around Patillas. She is fascinated by marine life and the scientific method, and she
    imagines conducting field research and laboratory analysis. She also hopes to create educational games that teach other children about ocean conservation, and she aspires to earn a scholarship to study
    science at the University of Puerto Rico.
