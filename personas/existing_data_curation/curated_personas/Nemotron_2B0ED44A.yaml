  hobbies: '[''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Practicing yoga and meditation'', ''Hiking in the Texas Hill Country'', ''Gardening'', ''Volunteering as a tutor at community
    centers'', ''Photography (urban landscapes)'', ''Watching soccer matches'', ''Reading self‑help and personal‑development books'']'
  career_goals: Leonardo aims to advance to a senior residential management role within the next five years, obtaining the Certified Residential Manager (CRM) credential and completing a bachelor’s degree
    in Social Work or Business Administration. He plans to design and implement comprehensive wellness programs that integrate mental‑health resources, mindfulness workshops, and culturally inclusive services
    for residents. Ultimately, he hopes to influence affordable‑housing policy in San Antonio and possibly launch his own community‑focused property‑management firm that prioritizes resident well‑being.
