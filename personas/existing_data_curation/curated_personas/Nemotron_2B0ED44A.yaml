personas:
  professional: Leonardo Gomez is a bilingual residential manager in San Antonio who leverages meticulous safety protocols, empathetic conflict mediation, and organized program coordination to create supportive
    living environments, while strategically pursuing a CRM credential and a degree to embed wellness initiatives into affordable housing.
  sports: Leonardo Gomez is a dedicated supporter of San Antonio FC, follows Liga MX broadly, volunteers as a youth soccer referee, hikes the Texas Hill Country trails with his local running club, and seeks
    balance between structured cardio sessions and relaxed weekend camping trips.
  arts: Leonardo Gomez channels his creative side through acoustic guitar, often covering John Mayer and José José, curates a collection of urban landscape photographs inspired by Steve McCurry, and regularly
    attends local gallery openings showcasing contemporary Mexican‑American artists.
  travel: Leonardo Gomez plans his trips with spreadsheets, enjoys weekend getaways to the Texas Hill Country vineyards, has road‑tripped to New Mexico's pueblos, longs to explore Oaxaca’s culinary scene,
    and dreams of a structured two‑week itinerary through Patagonia’s trekking routes, balancing budget constraints with a thirst for immersive cultural experiences.
  culinary: Leonardo Gomez cooks traditional dishes such as mole poblano, carnitas tacos, and pozole, meticulously selects fresh cilantro, epazote, and ancho chilies at farmers’ markets, and rates his own
    culinary success on a scale of “salsa” to “salsa roja” while occasionally indulging in late‑night queso fundido.
  core: Leonardo Gomez blends methodical organization with a restless mind, using yoga and cooking as anchors while juggling anxiety‑driven perfectionism and a habit of over‑checking spreadsheets late into
    the night.
background:
  cultural: Leonardo is a first‑generation Mexican‑American raised in a close‑knit neighborhood of West San Antonio. Fluent in both Spanish and English, he grew up immersed in Mexican cultural traditions
    such as Día de los Muertos, family gatherings around the kitchen, and the rhythms of regional music. His upbringing emphasized community solidarity, respect for elders, and a strong work ethic. Living
    in a diverse city, he blends his heritage with Texan influences, celebrating local festivals while maintaining deep ties to his family’s immigrant roots. This bicultural perspective informs his inclusive
    approach to residential advising and his commitment to fostering culturally responsive living spaces.
attributes:
  skills: '[''Conflict resolution'', ''Empathetic listening'', ''Bilingual communication (Spanish/English)'', ''Community building'', ''Crisis response'', ''Risk assessment'', ''Property management basics'',
