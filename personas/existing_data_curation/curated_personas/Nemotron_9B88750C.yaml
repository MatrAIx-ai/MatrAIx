  hobbies: '[''Book Club'', ''Community Gardening'', ''Birdwatching'', ''Amateur Astronomy'', ''Knitting'', ''Quilting'', ''Bridge (Card Game)'', ''Genealogy Research'', ''Cooking'', ''Hiking'']'
  career_goals: Although retired, Erin remains goal-oriented. She aspires to mentor high-school students interested in STEM through the local school's after-school program, develop a community garden that
    incorporates sustainable engineering practices, and expand digital-inclusion workshops for seniors at the Fulton Community Center. She also hopes to document oral histories of longtime Fulton residents
    for the county historical society, and ultimately author a memoir that blends her professional experiences with reflections on Midwestern life.
