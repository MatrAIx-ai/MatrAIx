  hobbies: '[''Rose gardening'', ''Birdwatching'', ''Watercolor painting'', ''Photography of rural scenes'', ''Reading historical biographies'', ''Chess'', ''Visiting art galleries'', ''Community theater
    attendance'', ''Genealogy research'', ''Model train building'', ''Listening to classical and jazz music'']'
  career_goals: Although retired, David aims to leave a lasting legacy by publishing a memoir that captures his experiences of rural Kansas life and the cultural shifts he witnessed. He wishes to curate
    a traveling exhibition of regional artwork, highlighting local artists to a broader audience. He plans to mentor younger community members through workshops on budgeting, gardening, and genealogy. Continuing
    his lifelong learning, David intends to attend art lectures, history seminars, and technology classes at the community college. He also aspires to serve as a docent at the Crawford County historical
    museum and contribute to preservation projects such as restoring the town park and documenting oral histories of long‑time residents.
