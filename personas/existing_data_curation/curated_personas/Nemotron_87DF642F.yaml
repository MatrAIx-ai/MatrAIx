personas:
  professional: David Whitehead, a retired community event coordinator turned volunteer mentor, blends his decades-long expertise in budget oversight, mechanical maintenance, and public speaking to guide
    younger volunteers while curating regional art exhibitions.
  sports: David Whitehead follows the Kansas City Chiefs and the Royals with avid loyalty, plays a weekly senior walking club at the local park, and joins a low-impact senior golf league every spring at
    the nearby country club.
  arts: David Whitehead paints delicate watercolor sunsets of the Kansas prairie, critiques exhibitions at the Nelson-Atkins Gallery, enjoys evenings listening to Beethoven's Ninth Symphony and Miles Davis's
    Kind of Blue, and regularly attends community theater productions starring local talent.
  travel: David Whitehead prefers relaxed road trips that combine photography and history, having captured the Civil War battlefield at Antietam, explored the Pueblo pueblo ruins in New Mexico, and planned
    a future pilgrimage to the art museums of New York City, always traveling with his vintage suitcase and a portable tea thermos.
  culinary: David Whitehead's culinary palate favors garden-fresh heirloom tomatoes, rosemary-infused roasted chicken, and sweet rhubarb-strawberry crisp, which he prepares in his modest kitchen while sipping
    Earl Grey tea and occasionally adding a dash of lavender honey for a nostalgic twist.
  core: David Whitehead is a meticulously organized, garden-loving storyteller who balances scholarly pursuits with artistic whims, often forgetting where he placed his reading glasses but never missing
    a chance to share a genealogical anecdote over a cup of tea.
background:
  cultural: David grew up in a mid‑western white working‑class family in Kansas, shaped by the values of self‑reliance, community service, and respect for tradition. He attended local public schools and
    pursued some college coursework at a state university, where he was exposed to liberal arts and history. Raised in a Protestant (Methodist) congregation, he maintains strong ties to his church and participates
    in town festivals that celebrate regional folk music and agricultural heritage. The cultural landscape of the 1950s–60s, including the space race and civil‑rights movement, broadened his worldview,
    fostering openness to new ideas while retaining a deep appreciation for the simple, steady rhythms of rural life.
attributes:
  skills: '[''Community event planning'', ''Budget management'', ''Mechanical repair'', ''Horticulture'', ''Art appreciation and critique'', ''Writing and editing'', ''Genealogy research'', ''Volunteer
