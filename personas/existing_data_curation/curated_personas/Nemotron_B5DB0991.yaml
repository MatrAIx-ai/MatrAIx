  career_goals: Paola aims to advance within the logistics field by moving into a supervisory or lead role in the warehouse, such as shift lead or inventory control specialist. She plans to earn a forklift
    certification and complete an OSHA safety trainer course, and she hopes to finish an associate degree in logistics or business administration that she began in college. Long-term, she envisions a transition
    to a logistics coordinator position where she can apply her operational knowledge to planning and scheduling. She also hopes to achieve financial stability that will allow her to start a small side
    business selling handmade knitted goods and home-cooked preserves at local farmers’ markets.
