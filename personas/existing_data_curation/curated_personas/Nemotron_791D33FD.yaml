  career_goals: Angel aims to advance to a senior paralegal or legal operations manager role within her firm, leading a team that streamlines case workflows and integrates cutting‑edge legal technology.
    She plans to earn a Certified Paralegal credential and a Legal Project Management certification, mentor junior staff, and champion initiatives that improve efficiency and client service. In the longer
    term, she envisions transitioning into a compliance or regulatory affairs position where her STEM background can support complex technical matters.
