  hobbies: '[''family barbecues and gatherings'', ''cooking traditional Southern and Caribbean dishes'', ''gardening and growing herbs'', ''DIY home improvement projects'', ''knitting and crocheting'',
    ''listening to gospel and R&B music'', ''volunteering at the local church'', ''walking her dog in neighborhood parks'', ''reading mystery novels'', ''learning about sustainable cleaning practices'']'
  career_goals: Lisa aims to earn her GED within the next year, obtain OSHA and IICRC certifications, and transition into a supervisory role such as shift lead or facilities coordinator. She aspires to
    eventually become a facilities manager, overseeing multiple sites and implementing sustainable cleaning initiatives. Additionally, she dreams of launching her own eco‑friendly cleaning business to provide
    reliable services and employment opportunities for her community while ensuring financial stability for her family.
