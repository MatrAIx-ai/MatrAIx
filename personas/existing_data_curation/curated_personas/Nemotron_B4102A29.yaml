personas:
  professional: Lisa Mitchell, a seasoned commercial floor care specialist with a knack for green cleaning technologies, leads detailed cleaning schedules, trains staff, and plans sustainable facility operations
    while balancing curiosity-driven innovation with meticulous practicality, and they consistently mentor newcomers to adopt eco‑friendly practices.
  sports: Lisa Mitchell, a loyal Dallas Cowboys fan who never misses a Sunday game, enjoys watching the Mavericks, participates in a local community softball league, walks her dog in the park for cardio,
    and they fit quick yoga sessions into evenings when the schedule allows.
  arts: Lisa Mitchell, who sings in her church choir, finds inspiration in gospel legends like Aretha Franklin and contemporary R&B stars such as Jill Scott, relaxes with Tana French mystery novels, knits
    hand‑made shawls while listening to soulful playlists, and they regularly attend productions at the Dallas Theater Center to nourish their creative spirit.
  travel: Lisa Mitchell, an avid road‑trip planner, enjoys weekend escapes to Texas Hill Country vineyards, annual trips to New Orleans for jazz and Creole cuisine, dreams of a Caribbean cruise to taste
    island spices, and they balance these trips with a modest budget and family responsibilities.
  culinary: Lisa Mitchell, an intermediate home chef, crafts soul‑food staples such as collard greens spiced with Scotch bonnet peppers, Jamaican‑inspired jerk chicken, sweet potato pie, and her signature
    cornbread, tends a backyard herb garden for fresh garnish, hosts church pot‑luck dinners where their mac & cheese steals the show, and they occasionally indulge in a late‑night snack of spicy empanadas.
  core: Lisa Mitchell blends methodical professionalism with community‑driven hospitality, turning meticulous floor‑care expertise into a sustainable business dream while nurturing a vibrant home life steeped
    in gospel music, garden‑fresh cooking, and modest, forward‑thinking finances, and they never miss an opportunity to volunteer at the local shelter.
background:
  cultural: Lisa is an African‑American woman raised in Texas, deeply rooted in Southern Black cultural traditions. Her upbringing emphasized church involvement, community solidarity, and family gatherings
    centered around soul food and music. She celebrates cultural milestones such as Juneteenth and participates in local Black heritage festivals in Dallas. While embracing Texan customs like barbecues
    and line dancing, she also maintains a strong connection to African American heritage through gospel music, church choirs, and storytelling. Her cultural identity informs her values of resilience, hospitality,
    and collective responsibility.
attributes:
  skills: '[''commercial floor cleaning'', ''chemical safety and handling'', ''inventory management'', ''team leadership'', ''time management'', ''basic plumbing and electrical repairs'', ''customer service'',
