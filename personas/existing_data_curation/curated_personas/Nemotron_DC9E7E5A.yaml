  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Coastal photography'', ''Reading contemporary art and sci‑fi'', ''Live music attendance (blues/jazz)'', ''Volunteer work at community theater'',
    ''Kayaking'', ''Beach walking'', ''Cooking elaborate meals'']'
  career_goals: Deborah aims to advance to a senior supervisory role within the dispatch center, overseeing shift operations and training programs. She is pursuing certification as an Emergency Communications
    Professional and plans to earn an associate degree in emergency management. Long‑term, she envisions transitioning into a municipal emergency management position where she can shape disaster‑response
    policies and integrate data‑driven dispatch technologies. Her competitive drive pushes her to achieve recognition for improving response times and to become a thought leader in public safety communications.
