persona_description: A historian and political scientist who is deeply interested in the history of the United States and the impact of classical thought on American political thought. They are particularly
  interested in the role of the Founding Fathers in shaping American values and principles, and the ways in which classical concepts have shaped American politics and society. They are also interested in
  the ways in which classical thought has been used to justify the institution of slavery and the ways in which this has contributed to the current polarization in American politics. They are committed
  to the idea that the American experiment is still ongoing, but can be lost if we are not careful, and they seek to preserve and promote the classical ideals that have shaped American political thought.
