personas:
  professional: Tho Antolin is a seasoned field service engineer specializing in ATM, POS, and multifunction printer maintenance, armed with CompTIA A+ and vendor certifications, who blends technical troubleshooting
    with an artistic flair by repurposing salvaged components into kinetic sculptures, and they navigate a spontaneous work style that occasionally challenges strict deadlines.
  sports: Tho Antolin enjoys hiking the Santa Cruz Mountains on weekends, follows the San Jose Sharks and Golden State Warriors loyally, participates in a local recreational soccer league with the Silicon
    Valley FC, and they prefer spontaneous, outdoors‑focused fitness over regimented gym routines, often using trail runs as both exercise and photography opportunities.
  arts: Tho Antolin immerses themselves in San Jose’s vibrant street‑art scene, regularly visiting murals by local talent like Nena and studying works of Banksy, builds kinetic sculptures from repurposed
    printer parts that flash to music, and they actively discuss experimental cinema at an indie‑film club, frequently citing Wong Kar‑wai and Alejandro González Iñárritu as inspirations.
  travel: Tho Antolin favors spontaneous road trips along the Pacific Coast, has explored Monterey, Big Sur, and the Redwood forests, plans a tech‑focused pilgrimage to Osaka and Kyoto in Japan, and they
    dream of revisiting their family’s island roots in Southeast Asia to blend culinary and cultural exploration with their love of photography.
  culinary: Tho Antolin loves cooking adobo, satay, and pho while experimenting with Californian twists like avocado‑lime salsa and locally sourced heirloom tomatoes, they possess a solid home‑chef skill
    set that allows them to craft fusion dishes such as quinoa‑biryani with miso glaze, and they frequently host communal meals that echo the storytelling tradition of family gatherings.
  core: Tho Antolin is a curious, art‑driven technologist who constantly juggles spontaneous creativity with occasional deadline‑driven chaos, channeling their love of community and perseverance into tinkering,
    cooking, and mentoring, while occasionally misplacing tools and forgetting appointments.
background:
  cultural: Tho was born to parents who immigrated from the Philippines in the late 1970s and grew up in a bilingual household in Santa Clara County. He celebrates cultural milestones such as Sinulog and
    Christmas with extended family gatherings that emphasize communal meals, respect for elders, and storytelling. At home, Tagalog and English blend seamlessly, shaping his communication style and reinforcing
    a respect for both collective responsibility and individual initiative. Living in the multicultural environment of the Bay Area, Tho has adopted a hybrid identity that blends traditional Southeast Asian
    values—like hospitality, perseverance, and reverence for craftsmanship—with the innovative, fast‑paced tech culture of Silicon Valley. This dual perspective informs his work ethic, his collaborative
    community involvement, and his willingness to experiment across cultural and technical boundaries.
attributes:
  skills: '[''ATM and POS hardware repair'', ''Multifunction printer and copier troubleshooting'', ''Electronic circuit diagnostics'', ''Soldering and component replacement'', ''Firmware updates and software
    configuration'', ''Basic networking (TCP/IP, Wi‑Fi)'', ''Technical documentation and service reporting'', ''CompTIA A+ certification'', ''Vendor‑specific service certification (Xerox/IBM)'', ''Prototyping
    with Arduino/Raspberry Pi'']'
  hobbies: '[''Street‑art exploration'', ''Electronic kinetic sculpture building'', ''Cooking traditional Southeast Asian and fusion dishes'', ''Hiking in Santa Cruz Mountains'', ''Urban photography'',
    ''Indie‑film club participation'', ''Volunteer computer‑literacy tutoring'']'
  career_goals: Tho aims to become a senior field service engineer with a leading office‑automation provider, leveraging his hands‑on experience to lead complex installations and mentor junior technicians.
    He plans to earn advanced certifications such as the Certified Service Engineer (CSE) from Xerox and a networking credential (e.g., Cisco CCNA) to broaden his expertise in connected devices. In the
    longer term, Tho hopes to launch a boutique repair and customization studio that offers rapid on‑site service while also creating art‑inspired tech installations for local galleries and coworking spaces.
    He sees this hybrid venture as a way to fuse his technical skill set with his passion for unconventional, creative projects, and to achieve greater autonomy and flexible scheduling that matches his
    spontaneous work style.
