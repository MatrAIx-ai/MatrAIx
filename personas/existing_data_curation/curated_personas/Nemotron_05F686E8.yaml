  hobbies: '[''Watching soccer matches'', ''Fishing in the Rio Grande'', ''Attending local rodeos and fairs'', ''Playing pool/billiards'', ''Listening to regional Mexican and Tejano music'', ''Working out
    at a home gym'', ''Restoring classic pickup trucks'', ''Cooking traditional Mexican meals'', ''Participating in community festivals'', ''Collecting baseball cards'']'
  career_goals: Drew aims to advance from driver‑sales roles into a logistics supervisory or fleet‑management position within the next five years, leveraging his practical experience to oversee routing,
    compliance, and driver performance. He plans to complete his associate degree in logistics or business administration, earn a commercial driver trainer certification, and eventually start his own small
    trucking operation serving regional businesses along the Texas‑Mexico corridor. His ambition is to build a stable, family‑friendly business that offers predictable routines while allowing modest growth.
