personas:
  professional: An experienced long‑haul commercial driver and sales liaison, Drew Guasch leverages meticulous route optimization, hands‑on mechanical troubleshooting, and persuasive negotiation to secure
    contracts while adhering to a routine‑driven, practical workflow that reflects they stay competitive yet reliable.
  sports: An avid soccer enthusiast, Drew Guasch follows Club América and FC Dallas games with friends, cheers on local high‑school football, and joins occasional white‑tailed deer hunting outings, while
    they balance their love for team sports with solo fitness sessions at the home gym.
  arts: Drew Guasch’s artistic side shines through a deep appreciation for regional Mexican and Tejano music, regularly spinning Los Tigres del Norte, Selena, and Bobby Pulido while attending live performances
    at the local bar’s Tejano night, and they occasionally enjoy classic country concerts at nearby venues.
  travel: Drew Guasch plans weekend road trips in his restored pickup, favoring nearby destinations like Nuevo Laredo, the Texas Hill Country vineyards, and occasional visits to Mexico City, while they
    balance adventure with a budget‑conscious, routine‑oriented schedule.
  culinary: Drew Guasch enjoys crafting classic Mexican dishes such as carnitas, tamales, and enchiladas, expertly seasoning pork shoulder with ancho chilies and fresh cilantro, and they take pride in serving
    these home‑cooked meals at family gatherings.
  core: Drew Guasch blends a pragmatic, routine‑driven work ethic with a love for soccer, classic trucks, and hearty Mexican cooking, and they juggle a competitive streak with a relaxed, home‑body vibe.
background:
  cultural: Drew grew up in a Mexican‑American household in Laredo, Texas, where bilingualism and bicultural traditions shaped his identity. He was raised with a blend of Mexican customs—such as celebrating
    Día de los Muertos, Mexican Independence Day, and family‑centered gatherings—and Texan influences, including a strong work ethic tied to cross‑border trade and regional pride. His family’s Catholic
    roots inform his respect for community rituals and holidays, while his daily life reflects the practical, down‑to‑earth values of the border region. This cultural tapestry informs his language use,
    food preferences, music taste, and his commitment to supporting local businesses and community events.
attributes:
  skills: '[''Long-haul truck driving'', ''Regional route planning & navigation'', ''Vehicle inspection & basic maintenance'', ''Customer relationship management'', ''Sales negotiation'', ''Cross-border
