  hobbies: '[''Reading (historical fiction, nature non‑fiction)'', ''Hiking and nature walks'', ''Birdwatching'', ''Organic gardening'', ''Knitting and crochet'', ''Baking (seasonal pies and breads)'',
    ''Photography (landscape and macro)'', ''Volunteering at the Puyallup Public Library'']'
  career_goals: Leanne aims to re‑enter the workforce in a part‑time role that blends her love for gardening with community service, such as a horticulture assistant or volunteer coordinator at a local
    community garden. She plans to pursue a horticulture certification through a community college program while gradually building a modest home‑based business selling handcrafted home décor and offering
    gardening workshops. Long‑term, she envisions creating a sustainable lifestyle brand that reflects her practical curiosity and commitment to harmony within her community.
