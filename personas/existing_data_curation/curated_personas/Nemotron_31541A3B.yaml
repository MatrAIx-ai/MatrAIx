  hobbies: '[''Reading (Educational Theory & Non-fiction)'', ''Blogging about Teaching Practices'', ''Indian Cooking'', ''Yoga and Meditation'', ''Running/Jogging'', ''Hiking in Bay Area Trails'', ''Puzzle
