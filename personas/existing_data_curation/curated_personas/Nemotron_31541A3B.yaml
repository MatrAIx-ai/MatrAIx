  career_goals: Within the next five years, Shefali aims to secure tenure and become a leading voice in evidence‑based curriculum innovation at her institution. She plans to establish a teaching‑and‑learning
    lab that leverages data analytics to refine instructional practices, obtain external research grants, and publish in top education journals. Ultimately, she aspires to assume an administrative role
    such as department chair or director of academic programs, where she can shape policy, mentor junior faculty, and expand inclusive learning opportunities for underrepresented students.
