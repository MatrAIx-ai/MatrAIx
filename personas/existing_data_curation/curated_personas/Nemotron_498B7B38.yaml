personas:
  professional: Marcus Hayes, a tech‑savvy teen on the cusp of earning his GED, merges his knack for diagnosing car engine noises with a growing expertise in network security and computer repair, and they
    channel their curiosity‑driven yet organized approach into troubleshooting friends' devices while laying the groundwork for a mobile auto‑detailing service.
  sports: Marcus Hayes, an avid pick‑up basketball player at the downtown community park and member of the Eastside Hoopers club, follows the Los Angeles Lakers closely, tailors his training around the
    NBA season, and they maintain a disciplined weekly routine of shooting drills, cardio runs, and occasional weekend games.
  arts: Marcus Hayes, a budding lyricist who riffs on beats by Kendrick Lamar, lays down verses inspired by H E R., and honors gospel roots through Kirk Franklin while devouring graphic novels such as 'Saga'
    and sketching street‑art motifs reminiscent of Banksy, and they weave these influences into nightly video‑editing sessions that fuse music, visual art, and storytelling.
  travel: Marcus Hayes, a 17‑year‑old with a modest travel budget, has explored the hiking trails of the Great Smoky Mountains with friends and dreams of a cultural immersion trip to Tokyo to experience
    its gaming arcades and sushi stalls, and they typically plan trips through careful online research, balancing adventure with cost‑effective accommodations like hostels or couch‑surfing.
  culinary: Marcus Hayes, a budding home cook who proudly prepares a flavorful mac and cheese loaded with bacon and a spicy miso ramen topped with pork belly, soft‑boiled egg, and nori, enjoys tossing together
    fresh avocado‑lime salads and mastering basic sous‑vide techniques, and they usually snack on classic pepperoni pizza while experimenting with new seasoning blends.
  core: Marcus Hayes blends a tech‑savvy curiosity with street‑ball swagger, juggling late‑night gaming marathons, impulsive sneaker drops, and occasional acne‑focused mirror checks, all while dreaming
    of turning his DIY electronics hobby into a community‑focused tech mentorship.
background:
  cultural: Marcus grew up as an African‑American teen in Acworth, Georgia, a suburb of Atlanta with a strong sense of community and Southern culture. His family places emphasis on church involvement, family
    gatherings, and mutual support, which have shaped his values of compassion and responsibility. He was exposed to a blend of Southern traditions—such as soul food, gospel music, and community festivals—while
    also embracing contemporary Black culture through hip‑hop, basketball, and digital media. Growing up in a predominantly Black neighborhood within Cobb County, Marcus benefits from close ties to local
    mentors, youth programs, and community centers that celebrate Black heritage and encourage upward mobility.
attributes:
  skills: '[''Computer basics (Microsoft Office, internet research)'', ''Smartphone troubleshooting'', ''Basic automotive maintenance (oil changes, tire rotation, minor diagnostics)'', ''Video editing with
    free software (Shotcut, DaVinci Resolve)'', ''Graphic design basics using Canva'', ''Basketball fundamentals and team coordination'', ''Problem‑solving and logical reasoning'', ''Collaborative work
    in small groups'']'
  hobbies: '[''Playing video games (e.g., Fortnite, NBA 2K)'', ''Listening to hip‑hop, R&B, and gospel music'', ''Pick‑up basketball at the local park'', ''Tinkering with electronics and basic coding'',
    ''Reading graphic novels'', ''Watching sci‑fi movies'', ''Sketching street‑art inspired designs'', ''Participating in church youth group events'']'
  career_goals: Marcus aims to earn his GED within the next year and then enroll in a community‑college program focused on information technology, with a particular interest in network security and computer
    repair. While he builds his technical credentials, he plans to start a small mobile auto‑detailing service that leverages his mechanical skills and his desire for an entrepreneurial path. His long‑term
    ambition is to achieve financial independence, support his family, and eventually mentor other youth in his neighborhood who face similar academic challenges.
