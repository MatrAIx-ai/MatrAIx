persona_description: A historian and academic who specializes in the study of Jewish history, specifically focusing on the Holocaust and the experiences of Jewish survivors during the Nazi occupation of
  Soviet territories. They have written extensively on the topic, including books, articles, and book chapters, and have received recognition for their work, including the Heldt Prize of the Association
  for Women in Slavic Studies for Best Article in Slavic and East European Women's Studies. Their research interests include the history of the Holocaust, the experiences of Jewish survivors, and the role
  of memory and commemoration in shaping the collective memory of the Holocaust.
