  career_goals: Although retired, Emmanuel aims to remain an active contributor to his community. He hopes to launch a weekly DIY home‑maintenance workshop for seniors at the local community center, sharing
    his practical knowledge while fostering confidence in participants. He also aspires to mentor younger volunteers, guiding them in project planning and interpersonal skills. A personal ambition is to
    write and self‑publish a memoir that intertwines his family’s French‑Canadian heritage with reflections on life lessons learned over seven decades. Emmanuel plans modest travel to historic New England
    sites to deepen his appreciation of regional history, and he wishes to sustain his health through regular walking and stress‑reduction practices.
