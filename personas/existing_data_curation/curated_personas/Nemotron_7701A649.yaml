  career_goals: Beatriz aims to advance within the supply‑chain field. In the next two years she plans to earn a forklift certification and complete an associate’s degree in logistics or business administration
    at a community college. Her long‑term ambition is to become a warehouse supervisor or logistics coordinator, overseeing inventory control and process optimization for a regional distribution center.
    She is also interested in obtaining certification in advanced WMS platforms (e.g., SAP, Oracle) and eventually leveraging her experience to help her family launch a small import‑export venture focused
    on Honduran food products in Texas.
