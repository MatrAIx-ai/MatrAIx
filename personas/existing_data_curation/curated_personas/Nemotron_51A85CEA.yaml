  hobbies: '["Drawing Mexican Folk Patterns", "Scratch Digital Storytelling", "Chess", "Hiking in Nature", "Listening to Mariachi and Latin Music", "Cooking Family Recipes (Tamales, Sopes)", "Building LEGO
    Sets", "Robotics Club Projects"]'
  career_goals: Javier's long‑term ambition is to become an architect‑engineer who designs spaces that celebrate Mexican cultural motifs while incorporating sustainable technology. He also hopes to work
    as a museum curator or interactive media creator, developing exhibits that educate visitors about Mexican folk art and scientific innovation. In the next few years, he aims to win his school’s science
    fair with a renewable‑energy project, earn advanced ranks in chess, and build a personal digital‑art portfolio that merges traditional motifs with modern technology.
