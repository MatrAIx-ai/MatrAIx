personas:
  professional: Javier is a budding technologist who channels curiosity into building LEGO robots, leading his school’s robotics club’s weekly design challenges with meticulous planning and a drive for
    perfect execution.
  sports: Javier is a keen participant in the local elementary soccer league, proudly wearing the City United Tigers jersey, and during school breaks they sprint up hiking trails to build stamina, balancing
    a competitive spirit on the field with a love for outdoor exercise, while they also cheer for the professional baseball team, the Toronto Blue Jays.
  arts: Javier delights in drawing intricate Mexican folk patterns, idolizes Frida Kahlo’s vibrant motifs, and syncs his creative sessions to the lively tunes of Mariachi Vargas de Tecalitlán and modern
    Latin pop star Bad Bunny, while also crafting stop‑motion stories in Scratch inspired by Pixar’s 'Coco'.
  travel: Javier dreams of exploring the ancient ruins of Teotihuacan after his summer hikes in nearby state parks, and they plan future family trips to the Grand Canyon and the coastal town of Puerto Vallarta,
    favoring structured itineraries drawn up in his coloring notebooks.
  culinary: Javier loves mastering family recipes like tamales and sopes, carefully mixing masa de maíz, pork, and chilies, while also perfecting a simple cheese quesadilla and a slice of pepperoni pizza,
    often adding a dash of coriander to his guacamole for extra zing.
  core: Javier is a disciplined, curiosity‑driven nine‑year‑old who blends a love for robotics, folk art, and meticulous planning into a uniquely competitive yet serenely resilient outlook.
background:
  cultural: Javier comes from a Mexican family that balances cultural traditions with life in Sulphur Springs, Texas. At home, Spanish is spoken alongside English, and he participates in celebrations such
    as Día de los Muertos, where the family creates altars and shares stories of ancestors. His parents teach him traditional Mexican cuisine and folk art, fostering an appreciation for vibrant colors and
    symbolic designs. Living in East Texas, he also experiences local customs, attends community fairs, and enjoys Texas‑style outdoor activities. This blend of Mexican heritage and Texan environment gives
    Javier a bicultural perspective that informs his art, music tastes, and social interactions.
