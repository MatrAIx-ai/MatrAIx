  career_goals: Robert aims to move into a supervisory role within the next five years, targeting a foreman or shift‑lead position where he can mentor newer workers and shape production processes. He plans
    to earn a Certified Welder credential and complete an associate’s degree in Manufacturing Technology through a local community college. Long‑term, he envisions opening a small, family‑run shop that
    specializes in custom metalwork and small‑batch plastic components, providing stable income and the ability to craft projects for his community.
