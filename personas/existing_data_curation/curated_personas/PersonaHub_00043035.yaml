persona_description: Krista Castillo is an American historian and educator who specializes in the period of Reconstruction in the United States, particularly in the context of the political cartoons and
  illustrations created by Thomas Nast. She has a background in history and military history, with a degree from Mount Union College and a master's degree from Austin Peay State University. She has worked
  as an Education Manager and Museum Coordinator at Fort Negley and has experience as a receptionist at the Pro Football Hall of Fame. She is a member of the Nashville Civil War Roundtable and has written
  for Civil War News. She has received recognition for her work in Women's History Month and has a passion for teaching history and sharing her knowledge with others.
