  hobbies: '[''cumbia and salsa dancing'', ''pickup soccer games'', ''competitive board games (Settlers of Catan)'', ''experimenting with Mexican recipes'', ''collecting vintage postcards'', ''attending
    cultural festivals'', ''listening to Latin pop and regional Mexican music'']'
  career_goals: Rosa aims to complete her GED within the next year and enroll in a culinary arts program or a community health worker certification, leveraging her cultural background and people‑skills.
    She envisions eventually opening a small catering boutique that serves traditional Mexican dishes for local events, while also providing health‑education workshops for the Mexican‑American community
    in Westchester. Achieving financial independence, creating a stable work routine that balances her flexible nature, and mastering stress‑management techniques are central to her long‑term ambition.
