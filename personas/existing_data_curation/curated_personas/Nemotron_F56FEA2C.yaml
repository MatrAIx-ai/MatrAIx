  career_goals: Although still a toddler, Lyna’s emerging compassion and desire to help others point toward future aspirations of becoming a nurturing caregiver—such as a preschool teacher, pediatric nurse,
    or community health advocate—where she can support children’s growth, promote harmony, and contribute to her neighborhood’s well‑being.
