personas:
  professional: Lyna Malvoisin, a two‑year‑old who meticulously lines up her building blocks by color before building towers, displays early signs of curiosity, practical planning, and organized reliability
    that point toward a future role in early childhood education or community caregiving.
  sports: Lyna Malvoisin loves racing around the Saint Cloud playground, proudly wears a tiny Minnesota Twins cap, and participates in the Saint Cloud Tiny Tots Soccer Club where she practices kicking a
    soft ball, embodying energetic group play and early skill development.
  arts: Lyna Malvoisin sings along to gospel tunes by Kirk Franklin and R&B hits by H.E.R., claps to Beyoncé’s Single Ladies in front of the living‑room mirror, and delights in picture‑book storytelling
    sessions with local storyteller Maya who shares vibrant folktales.
  travel: Lyna Malvoisin enjoys stroller‑friendly outings to Itasca State Park’s boardwalk, splurges on a weekend visit to the Mall of America, has taken a family road trip to Chicago’s Navy Pier, and dreams
    of one day toddling through Disney World’s Magic Kingdom.
  culinary: Lyna Malvoisin devours creamy macaroni‑and‑cheese, reaches eagerly for bite‑size sweet potato cubes, loves banana slices sprinkled with a pinch of cinnamon, and occasionally munches tender chicken
    tenders seasoned with a whisper of paprika, reflecting a palate shaped by soulful home‑cooked meals.
  core: Lyna Malvoisin is a bright‑eyed, organized two‑year‑old who lines up toys by color, saves pennies for a plush giraffe, sings gospel and R&B at story time, chases butterflies at the park, and stubbornly
    refuses bedtime snacks.
background:
  cultural: Lyna is a Black child raised in Saint Cloud, Minnesota, whose family honors African‑American heritage through music, food, and community gatherings. She grows up hearing soulful gospel and contemporary
    R&B, enjoys occasional family gatherings featuring soul food dishes, and participates in local cultural events that celebrate diversity, such as neighborhood story circles and multicultural festivals.
    The Midwest setting nurtures her love for outdoor play, while her family’s cultural traditions foster a strong sense of identity, community, and empathy.
