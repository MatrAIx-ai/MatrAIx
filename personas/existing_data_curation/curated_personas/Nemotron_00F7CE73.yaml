  career_goals: Although still very young, Roberto often talks about wanting to become an artist who paints bright pictures, an inventor who builds moving toys, or a storyteller who shares his imaginative
    adventures. He is fascinated by rockets and space, so he says he might be an astronaut one day. He also sets small personal goals, like learning to tie his shoes, reading picture books on his own, and
    mastering more complex building sets, which reflect his organized and methodical approach to future learning and career aspirations.
