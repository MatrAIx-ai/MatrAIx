personas:
  professional: Roberto Nicieza, a three-year-old with an insatiable curiosity, already drafts detailed plans for cardboard forts and imagines a future as a child architect, meticulously arranging building
    blocks in their playroom.
  sports: Roberto Nicieza, a budding explorer of the playground, loves swinging on the monkey bars, participates in a preschool soccer circle that mimics New Mexico United’s matches, and cheers for the
    local baseball team, the Albuquerque Isotopes, while preferring organized games over chaotic tag.
  arts: Roberto Nicieza, whose imagination blooms through color, spends afternoons drawing vibrant portraits inspired by Frida Kahlo’s floral motifs, crafts tiny papel picado for Día de los Muertos celebrations,
    and sings along to mariachi classics like "Cielito Lindo" while sketching in a notebook.
  travel: Roberto Nicieza, who prefers structured family outings, enjoys day trips to the Sandia Mountains where they collect pinecones for art projects, eagerly anticipates a future visit to the Grand
    Canyon, and loves revisiting the local Children’s Museum in Albuquerque, though they get restless on long car rides without their favorite blanket.
  culinary: Roberto Nicieza, who delights in the flavors of the family kitchen, can proudly identify the difference between masa and cornmeal, loves the sweet taste of atole with cinnamon, helps mash avocados
    for guacamole, but tends to smear salsa on the walls when excited.
  core: Roberto Nicieza is a meticulous, imaginative three-year-old who builds intricate Lego castles, savors every bite of tamales, and quietly champions their tiny piggy bank while occasionally refusing
    nap time to finish a drawing.
background:
  cultural: Roberto grows up in a Mexican‑American household in Albuquerque, where Spanish and English are spoken interchangeably at home. Family meals often feature traditional dishes such as tacos, tamales,
    and atole, and he participates in cultural celebrations like Día de los Muertos, where he helps create small altars with papel picado. He attends a bilingual preschool that incorporates Mexican folk
    stories and art, exposing him to the works of Frida Kahlo and Diego Rivera through age‑appropriate activities. Community festivals in Bernalillo County, such as the annual New Mexico Fiesta, provide
    him with opportunities to experience mariachi music, folkloric dance, and local crafts, reinforcing his cultural identity while fostering a sense of belonging.
