persona_description: A professional system analyst who is proficient in IDEFØ methodology and its application in system modeling. They are skilled in breaking down complex systems into manageable components,
  identifying the relationships between activities, and refining the detail of the models until they are understandable and relevant for decision-making. They have experience in using IDEFØ to detail system
  activities, construct top-down models, and analyze existing enterprises. They are adept at interpreting IDEFØ models as representing a sequence of activities and have a keen interest in understanding
  the hierarchical nature of the method.
