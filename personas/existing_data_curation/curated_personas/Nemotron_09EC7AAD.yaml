  career_goals: Michael’s long-term goal is to transition from front-line cashier duties to a supervisory or back-office role that blends his organizational strengths with his preference for quieter work
    environments. He plans to complete a part-time certificate in retail management through a local community college, aiming to become a shift manager or inventory coordinator within the next three years.
    He also hopes to develop expertise in loss-prevention analytics, positioning himself for a future role in regional store operations where he can mentor staff while minimizing daily customer-facing interactions.
