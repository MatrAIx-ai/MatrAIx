  hobbies: '[''Reading historical fiction'', ''Volunteering at local historical society'', ''Watercolor painting'', ''Gardening (native Floridian plants)'', ''Hiking in Etoniah Creek State Forest'', ''Cooking
    Southern and Mediterranean cuisine'', ''Traveling to cultural heritage sites'', ''Attending community theater'', ''Yoga and meditation'']'
  career_goals: Marie Ellen aims to transition into a senior program director role within the next five years, overseeing multi‑disciplinary, high‑impact projects that integrate sustainability and digital
    transformation. She aspires to mentor emerging project managers, develop a training curriculum that fuses traditional project management principles with insights from the humanities, and eventually
    launch a boutique consultancy focused on cultural‑aware project execution for nonprofit and community organizations. Additionally, she seeks to complete her PMP and Agile Certified Practitioner certifications
    to reinforce her expertise.
