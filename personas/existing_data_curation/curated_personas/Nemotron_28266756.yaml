personas:
  professional: Marie Coleman, a veteran project manager with expertise in Agile and Waterfall methodologies, blends meticulous risk assessment and budget control with a curiosity‑driven adaptability, allowing
    them to confidently steer cross‑functional teams through complex sustainability and digital transformation initiatives while assertively mentoring emerging talent.
  sports: Marie Coleman enjoys low‑impact fitness through yoga and regular hikes in Etoniah Creek State Forest, plays casual tennis at the local community center, and passionately follows the Tampa Bay
    Buccaneers, Orlando Magic, and Tampa Bay Lightning, often tuning into games after work while balancing solo jogs with occasional group runs in a senior running club.
  arts: Marie Coleman nurtures creative expression through watercolor paintings inspired by the tonal subtlety of John Singer Sargent, regularly volunteers at the Fleming Island Historical Society’s exhibitions,
    and attends community theater productions featuring local talent and classic works by August Wilson, while finding solace in the soothing melodies of Enya and the classical guitar of Andrés Segovia.
  travel: Marie Coleman favors meticulously planned heritage tours, having already explored the colonial streets of St. Augustine, the historic squares of Savannah, and the ancient ruins of Athens, while
    dreaming of a Mediterranean retreat in Seville to combine their love of history with culinary discovery, balancing travel budgets with a preference for off‑peak seasons to avoid crowds.
  culinary: Marie Coleman delights in crafting Southern comfort foods such as shrimp and grits and collard greens alongside Mediterranean staples like moussaka, tabbouleh, and baklava, skillfully balancing
    the use of fresh basil, oregano, and lemon zest in their kitchen, and often hosts potluck dinners for the historical society where their culinary creations serve as a bridge between regional flavors
    and cultural storytelling.
  core: Marie Coleman blends disciplined project leadership with a voracious appetite for historic narratives, balancing meticulous organization with spontaneous watercolor sessions, yet occasionally forgets
    to water their garden for weeks when a new initiative takes priority.
background:
  cultural: Marie Ellen grew up in a middle‑class American family in the Southeast, absorbing Southern values of community, hospitality, and respect for tradition while her humanities education fostered
    an openness to diverse perspectives. As a lifelong resident of Florida, she blends a relaxed coastal lifestyle with an appreciation for the region's natural environment and cultural heritage. Her marriage
    and active involvement in local volunteer groups reflect a strong sense of civic responsibility, and her personal interests demonstrate a balance between preserving cultural roots and embracing new
    ideas.
