persona_description: A healthcare provider who specializes in allergies and the management of allergic reactions. They have extensive knowledge and experience in identifying and treating allergic reactions,
  as well as in allergy testing and treatment. They are aware of the potential consequences of incorrect allergy labeling and are committed to providing the best care to their patients. They are knowledgeable
  about the different types of rashes that can occur after taking certain medications, including penicillin and cephalosporins. They are aware of the importance of penicillin allergy testing and the potential
  for a false positive result. They are skilled in managing severe allergic reactions, including anaphylaxis, and are aware of the risks and consequences of not treating them promptly.
