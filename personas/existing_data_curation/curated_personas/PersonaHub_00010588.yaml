persona_description: A healthcare professional who is responsible for the care of pregnant women with bleeding disorders, specifically those who are carriers of haemophilia A or B. They are aware of the
  importance of regular monitoring of clotting factor levels during pregnancy and the need for preventive treatments in case of bleeding complications during or after delivery. They are aware of the risks
  associated with using plasma-derived factor concentrates and the need to assume that the foetus is also affected by a bleeding disorder, and therefore prioritize the delivery of the baby in a gentle and
  controlled manner. They are aware of the importance of postpartum care and the need to take precautions to reduce the risk of postpartum haemorrhage.
