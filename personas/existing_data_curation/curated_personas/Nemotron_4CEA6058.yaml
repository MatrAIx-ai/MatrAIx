    ''Data analysis of student performance'', ''Mentoring and peer coaching'', ''Public speaking and workshop facilitation'', ''Extracurricular club leadership (Robotics, Coding, Science Olympiad)'', ''Collaborative
    lesson planning'']'
  hobbies: '[''Hiking in Shenandoah National Park'', ''Coaching youth soccer'', ''Playing acoustic guitar'', ''Cooking farm‑to‑table and Southern dishes'', ''Reading popular‑science books and listening
    to education podcasts'', ''Building model rockets with his children'', ''Participating in community science fairs'', ''Board‑game nights (strategy and cooperative games)'', ''Gardening a vegetable garden'',
    ''Volunteering at local historical reenactments'']'
  career_goals: Nelson aims to move into a leadership role within his school or district, such as STEM department chair or curriculum coordinator, where he can shape district‑wide science and technology
    programs. He plans to earn a master’s degree in STEM education to deepen his expertise in instructional design and equity. Long‑term, he envisions establishing a regional makerspace partnership that
    connects students, local businesses, and nearby military installations, providing hands‑on engineering experiences. He also hopes to mentor a cohort of new teachers and influence education policy at
    the state level while maintaining a healthy work‑life balance with his family.
