persona_description: A historian specializing in the study of ancient Germanic tribes, particularly their customs and traditions. His research interests include the origins and evolution of inheritance
  practices among these tribes, the impact of the Normans and Norse people on these customs, and the role of these customs in tracing the origin of the English people of certain districts. He is also interested
  in the migration patterns of ancient tribes and the influence of these migrations on the development of Germanic cultures.
