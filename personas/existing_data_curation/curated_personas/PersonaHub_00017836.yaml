persona_description: A researcher who studies the effects of nicotine on cancer cell growth and metastasis, particularly in the context of lung cancer. They are interested in the mechanisms by which nicotine
  promotes tumor growth and metastasis, and how nicotine patches can promote tumor re-growth and metastasis in mouse models of lung cancer. They are also interested in the potential impact of nicotine on
  human health and the risk of developing cancer in smokers.
