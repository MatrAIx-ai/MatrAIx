  hobbies: '[''Heritage vegetable gardening'', ''Quilt-making'', ''Reading African-American literature'', ''Blues and soul music appreciation'', ''Culinary experimentation with Southern cuisine'', ''Genealogy
    research'', ''Church choir participation'', ''Volunteering at senior community center'']'
  career_goals: In retirement Aria aims to leverage her business acumen to empower her community. She plans to launch an intergenerational mentorship program that pairs seniors with emerging Black entrepreneurs,
    fostering the exchange of experience and fresh ideas. She seeks to establish a modest grant fund to support local minority‑owned start‑ups, drawing on her network of regional banks and philanthropic
    partners. Aria also aspires to compile and publish an oral‑history of Memphis’ Black business pioneers, preserving stories for future generations. Ultimately, her ambition is to leave a lasting legacy
    of knowledge, support, and cultural pride.
