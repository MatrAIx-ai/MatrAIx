personas:
  professional: Aria Whitley, a former corporate strategist turned community mentor, blends decades of budgeting expertise with a spontaneous, low‑bureaucracy approach to launching intergenerational entrepreneurship
    programs, even though she sometimes lets deadlines slip.
  sports: Aria Whitley enjoys daily walks around Overton Park, follows the Memphis Redbirds baseball season, and participates in a senior bowling league, though she sometimes skips the warm‑up stretches
    before games.
  arts: Aria Whitley finds inspiration in B.B. King's blues, the soulful vocals of Sharon Jones, quilting with patterns reminiscent of Jacob Lawrence, and reading Toni Morrison, while she habitually hoards
    used library books instead of returning them.
  travel: Aria Whitley prefers weekend road trips to historic Mississippi River towns like Natchez and Vicksburg, has taken a river cruise to trace family roots, and dreams of a pilgrimage to New Orleans’
    French Quarter, but often postpones longer journeys due to health concerns.
  culinary: Aria Whitley prepares Southern staples such as collard greens flavored with smoked turkey, sweet‑potato pie, and okra gumbo seasoned with fresh cilantro and cumin, expertly balancing tradition
    and new flavors, though she sometimes over‑salts when experimenting.
  core: Aria Whitley is a gardening‑savvy, quilt‑making, gospel‑singing elder whose spontaneous generosity and occasional disorganization shape a life of community mentorship and cultural preservation.
background:
  cultural: Aria is a Black woman rooted in the rich cultural tapestry of Memphis, Tennessee. Her upbringing was shaped by the city's vibrant blues heritage, the close‑knit African‑American church community,
    and the legacy of civil‑rights activism. Family gatherings centered around soul food, storytelling, and gospel music, instilling values of respect for elders, communal support, and spiritual faith.
    She carries forward traditions of hospitality, resilience, and a keen awareness of the historical struggles and achievements of Black Mississippians. This cultural foundation informs her dedication
    to preserving local history, supporting Black-owned businesses, and fostering intergenerational connections within her community.
attributes:
  skills: '[''Strategic business planning'', ''Financial budgeting and analysis'', ''Mentorship and coaching'', ''Community outreach and program development'', ''Conflict resolution and mediation'', ''Event
