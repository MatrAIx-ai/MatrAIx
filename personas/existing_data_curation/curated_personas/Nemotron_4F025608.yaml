  career_goals: Marsha hopes to obtain her GED within the next twelve months and earn a forklift certification. Her long‑term goal is to transition from a floor‑level stocker to a supervisory role, such
    as inventory control lead or warehouse shift supervisor, where she can apply her knowledge of SOPs and her desire for a structured, predictable work environment. She also aims to develop her communication
    skills to manage small teams effectively while maintaining a low‑stress atmosphere. Eventually, she would like to explore a part‑time logistics or supply‑chain analyst position at a local distribution
    center, which would allow her to combine her hands‑on experience with more analytical tasks.
