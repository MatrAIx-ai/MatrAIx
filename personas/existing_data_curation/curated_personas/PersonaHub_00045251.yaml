persona_description: A scientist who specializes in the study of climate change and its impacts on the environment. They are concerned about the rising levels of global carbon dioxide emissions and the
  potential for the world to exceed the internationally-accepted warming target of 2 degrees Celsius. They are actively monitoring the latest data on carbon emissions and are aware of the urgency of the
  situation. They are optimistic about the need for large and concerted global mitigation efforts to avoid dangerous climate change and are aware of the potential risks of a 2 degrees Celsius warming target
  becoming unachievable. They are also aware of the potential consequences of global warming, including extreme heat-waves, declining global food stocks, loss of ecosystems and biodiversity, and life-threatening
  sea level rise.
