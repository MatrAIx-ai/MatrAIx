persona_description: A historian who specializes in the study of the impact of European settlement on New Zealand's environment, particularly the introduction of invasive plants and the responses of provincial
  governments to these threats. This person is deeply informed by the text, with a particular focus on the philosophical and cultural aspects of the concept of "weeds" and the ways in which they have shaped
  the natural environment of New Zealand. They are also likely to have a keen interest in the ways in which different cultures interpret and react to invasive plants, and how this has influenced the development
  of regulation and policy in response to these threats.
