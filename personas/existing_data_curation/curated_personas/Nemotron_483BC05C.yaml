personas:
  professional: Steven Burke is a budding game creator who crafts simple Scratch games, applying his keen spatial reasoning from LEGO building and his imaginative storytelling from fantasy novels, while
    his organized yet flexible approach helps him debug patiently and his sensitivity to stress sometimes leads to late‑night tinkering.
  sports: Steven Burke enjoys strolling the local nature trails of Fairfax County for low‑key cardio, playing on the West Springfield U‑10 soccer team, and cheering for the Washington Capitals during the
    hockey season, while preferring solo bike rides over organized basketball drills.
  arts: Steven Burke immerses themselves in drawing elaborate fantasy landscapes inspired by the works of J.K. Rowling and Studio Ghibli, attends youth art workshops at the Smithsonian American Art Museum,
    practices beginner piano pieces by Ludwig van Beethoven, and collects postcards of Monet’s water lilies as a source of quiet inspiration.
  travel: Steven Burke favors weekend family trips to Washington, D.C.’s Smithsonian museums and the shore town of Virginia Beach for sandcastle building, dreams of a future road trip to the Grand Canyon,
    yet prefers carefully planned itineraries over spontaneous wanderings, often packing a sketchbook for on‑the‑go drawing.
  culinary: Steven Burke delights in crafting simple cheese pizza slices at home, experimenting with toppings like pineapple and pepperoni, enjoys snack‑time peanut butter‑banana sandwiches, and occasionally
    tries his hand at baking chocolate chip cookies, though they often over‑mix the batter causing a chewy texture.
  core: Steven Burke is a quietly inventive ten‑year‑old whose imagination fuels detailed LEGO builds and Scratch games, yet their tendency to overthink leads to occasional midnight snack raids and a habit
    of doodling on worksheets.
background:
  cultural: Steven comes from a white, middle‑class family living in Falls Church, Virginia, a suburban community within Fairfax County known for its diverse population and proximity to the cultural resources
    of Washington, D.C. His upbringing blends traditional American holidays and family gatherings with exposure to multicultural events at local community centers and the nearby Smithsonian museums. The
    area's emphasis on education, outdoor recreation, and a strong sense of community service has fostered his appreciation for varied experiences and his desire to contribute positively to society. This
    environment nurtures both his individual curiosity and his cooperative, harmony‑seeking personality.
