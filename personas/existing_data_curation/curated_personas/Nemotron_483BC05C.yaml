  career_goals: Steven envisions a future where he can blend his love of art, curiosity about the natural world, and desire to help others. He dreams of becoming an illustrator of children’s books that
    inspire kindness and environmental stewardship, and also imagines a path as a science teacher or community educator who makes complex ideas accessible and fosters emotional well‑being in students. His
    goal is to create spaces where creativity and compassion intersect, reducing worry and stress for himself and his peers.
