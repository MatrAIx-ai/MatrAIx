personas:
  professional: Shari Preston, a seasoned radiologic technologist specializing in digital X‑ray, fluoroscopy, and CT imaging, consistently blends meticulous patient positioning and rigorous radiation safety
    with a calm, routine‑driven work style that values teamwork and flexibility, positioning them as a reliable pillar in the department while they pursue ARRT CT certification and future supervisory responsibilities.
  sports: Shari Preston keeps fit with their morning dog walks, participates in the neighborhood church’s casual softball league each spring, and roots for the Atlanta Falcons—squeezing in a few live games
    whenever their daytime shift permits.
  arts: Shari Preston channels their creative side through their role in the Baptist church choir, where they harmonize to the timeless sounds of Aretha Franklin and Marvin Gaye, and unwind with mystery
    novels by Agatha Christie and Gillian Flynn while binging classic R&B concerts featuring Stevie Wonder and Otis Redding.
  travel: Shari Preston opts for weekend road trips that fit around their daytime shifts, having already explored the historic charm of Charleston and the music‑rich streets of New Orleans, and they dream
    of a scenic drive along the Blue Ridge Parkway to combine family time with their love for Southern heritage.
  culinary: Shari Preston, a confident home cook, delights in crafting classic Southern and soul‑food staples such as fried catfish, collard greens simmered with smoked turkey, buttery cornbread, and peach
    cobbler, often incorporating fresh tomatoes, kale, and okra from their own garden into family potlucks and weekend feasts.
  core: Shari Preston balances steadfast routine with warm community ties, blending a calming presence in the radiology suite with a love for soulful cooking, choir harmonies, and modest, well‑planned living—though
    they occasionally let a few grocery receipts and dentist appointments slip through the cracks.
background:
  cultural: Shari grew up in a close‑knit African‑American community in the Research Triangle area of North Carolina. Her family traditions are steeped in Southern culture, church life, and the legacy of
    resilience and collective support that characterizes Black families in the South. She values the emphasis on family unity, hospitality, and community service that she learned from her grandparents.
    The local church, gospel music, and shared meals have shaped her worldview, reinforcing her cooperative and harmonious nature while honoring her cultural heritage.
attributes:
  skills: '[''Digital X‑ray operation'', ''Patient positioning and comfort'', ''Radiation safety and dose management'', ''Image quality assessment'', ''Basic anatomy for imaging'', ''PACS navigation and
    image archiving'', ''Team communication and collaboration'', ''Record keeping and documentation'', ''Equipment maintenance basics'', ''Quality control procedures'']'
  hobbies: '[''Southern cooking'', ''Backyard gardening'', ''Church choir singing'', ''Reading mystery novels'', ''Watching classic R&B concerts'', ''Walking her dog'', ''Attending community potlucks'']'
  career_goals: Shari aims to deepen her expertise by earning an ARRT certification in computed tomography and eventually becoming a lead technologist in her department. She hopes to take on a supervisory
    role that allows her to mentor new staff, streamline routine workflows, and promote a harmonious work environment. While she values professional growth, she also seeks to maintain a stable schedule
    that supports her family life, so she prefers daytime shifts and opportunities for continued education through hospital-sponsored training.
