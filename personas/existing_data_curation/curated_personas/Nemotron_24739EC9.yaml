  hobbies: '[''Salsa and Bachata Dancing'', ''Cooking Colombian Cuisine'', ''Gardening'', ''Walking in Local Parks'', ''Book Club'', ''Volunteering at Senior Center'', ''Attending Cultural Festivals'',
    ''Pottery Classes'', ''Travel to Colombia'']'
  career_goals: In retirement, Lisa aims to channel her business expertise into meaningful community contributions. She aspires to serve on the board of a Houston‑based nonprofit that supports Latino small‑business
    owners, mentor young entrepreneurs through a local business incubator, and lead fundraising campaigns for senior services. She also hopes to organize cultural exchange events that showcase Colombian
    art and cuisine, and plans to travel periodically to Colombia to reconnect with family and heritage.
