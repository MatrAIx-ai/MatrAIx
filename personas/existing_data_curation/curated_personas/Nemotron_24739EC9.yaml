personas:
  professional: Lisa Rivadulla, a retired strategic business consultant with a graduate degree in business, leverages decades of experience in budgeting, organizational development, and cross‑cultural communication
    to mentor emerging entrepreneurs, lead nonprofit fundraising, and serve on nonprofit boards, channeling their spontaneous yet practical mindset into flexible project coordination.
  sports: Lisa Rivadulla enjoys daily walks through Hermann Park, participates in a senior pickleball league, follows the Houston Astros baseball team and the Houston Dynamo soccer club, and impulsively
    signs up for seasonal community fitness challenges, balancing their love for low‑impact exercise with occasional competitive spirit.
  arts: Lisa Rivadulla immerses themselves in salsa and bachata nights, draws inspiration from musicians like Shakira and Carlos Vives and contemporary literary adaptations of Gabriel García Márquez, attends
    exhibitions at the Houston Museum of Fine Arts, and occasionally explores pottery under local ceramicist Mariela Lopez, weaving these cultural threads into their social gatherings.
  travel: Lisa Rivadulla favors purposeful travel that blends family reconnection and cultural curiosity, planning semi‑annual trips to the Caribbean coast of their ancestral homeland to wander historic
    streets of Cartagena while also enjoying weekend getaways to New Orleans for its jazz festivals and to Austin for live music, all financed through careful budgeting of their retirement savings.
  culinary: Lisa Rivadulla delights in preparing and sharing traditional dishes like cheese‑filled arepas, steaming sancocho broth with yucca and plantains, and cumin‑infused empanadas, cooking at an intermediate
    skill level that lets them host monthly potluck evenings featuring cornmeal, avocados, and tropical fruit desserts.
  core: Lisa Rivadulla blends seasoned strategic acumen with a spontaneous, community‑focused spirit, turning their love for dance, gardening, and mentorship into lively, sometimes improvisational contributions
    that keep them socially energized well into their seventies.
background:
  cultural: Lisa is a first‑generation Colombian‑American whose family immigrated to Houston in the early 1970s. Raised in a bilingual household, she grew up celebrating Colombian holidays such as Carnaval
    de Barranquilla and Día de la Independencia, while also embracing Texas traditions like barbecue gatherings and Fourth of July parades. Her Colombian heritage informs her love of music, dance, and communal
    meals, and she remains an active member of the Houston Colombian Cultural Association. She balances the warmth and collectivist values of her Colombian roots with the individualistic, entrepreneurial
    spirit she encountered in her business career, creating a nuanced cultural identity that enriches her social circles and community involvement.
