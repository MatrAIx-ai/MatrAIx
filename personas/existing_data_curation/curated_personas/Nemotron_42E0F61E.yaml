  career_goals: Emilia dreams of becoming a teacher one day because she enjoys helping friends understand new ideas and likes the structure of a classroom. She also imagines herself as a soccer star, aiming
    to win school tournaments, and sometimes says she wants to be a veterinarian to care for animals. Her competitive streak pushes her to set goals like mastering the alphabet before her peers, winning
    a soccer match, and earning a gold star for completing chores, reflecting her ambition to excel in any role she chooses.
