persona_description: A missionary who worked in Guyana, particularly in the Demerara and Berbice regions, where he established schools for free Africans and taught them to read, write, and Christian knowledge.
  He faced challenges from a group of Whites who opposed the attendance of non-Whites at the school, but continued to carry on his work despite the difficulties. His efforts were supported by the London
  Missionary Society, which helped him establish schools in New Amsterdam and Berbice. He was also involved in educating the children of the "upper class" in Demerara and later in Berbice, and was able
  to send his two daughters to England to boarding school. His work was important in the expansion of education in Guyana, particularly in the period before Emancipation, because it saw the necessity of
  educating Africans to meet the demands of the civil service and other employment areas following the granting of their freedom.
