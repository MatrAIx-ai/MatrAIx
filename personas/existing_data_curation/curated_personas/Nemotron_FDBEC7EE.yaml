    national parks'', ''Digital photography'', ''Crafting (knitting, quilting)'', ''Community theater attendance'']'
  career_goals: Although retired, Tamara aims to stay actively engaged in her community. She hopes to become a senior mentor at the Henderson community center, leading a weekly wellness and social‑connection
    group for older adults. She plans to complete an online genealogy course to document her family history for her grandchildren, and to learn basic digital photography to capture her garden and local
    trips. A long‑standing wish is to travel to Nevada’s national parks and scenic desert locations, sharing the experiences with her family. She also aspires to join the advisory board of a local food‑bank
    nonprofit, using her budgeting and coordination skills to improve program outreach.
